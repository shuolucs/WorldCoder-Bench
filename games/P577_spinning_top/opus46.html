<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinning Top Simulation</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body { margin: 0; overflow: hidden; }
canvas { display: block; }

#hud {
  position: fixed;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.6);
  color: #0f0;
  font-family: monospace;
  padding: 10px;
  border-radius: 6px;
  z-index: 100;
  pointer-events: none;
  font-size: 13px;
  line-height: 1.6;
}

#controls {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 14px;
  border-radius: 8px;
  z-index: 100;
  min-width: 240px;
  font-family: sans-serif;
  font-size: 13px;
}

#controls label {
  display: block;
  margin-bottom: 2px;
  margin-top: 8px;
}

#controls input[type="range"] {
  width: 100%;
}

#controls .val {
  float: right;
  color: #aef;
}

#controls .instructions {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.3);
  font-size: 11px;
  color: #ccc;
}
</style>
</head>
<body>

<div id="hud">
  <div>Spin Rate: <span id="hud-spinrate">0.00</span> rad/s</div>
  <div>Precession Rate: <span id="hud-precession">0.00</span> rad/s</div>
  <div>Tilt Angle: <span id="hud-tilt">0.00</span>°</div>
  <div>Status: <span id="hud-status">Ready</span></div>
  <div>Elapsed Time: <span id="hud-time">0.00</span>s</div>
  <div>Frame Count: <span id="hud-framecount">0</span></div>
  <div>Paused: <span id="hud-paused">No</span></div>
</div>

<div id="controls">
  <strong>Spinning Top Controls</strong>

  <label>Initial Spin Speed <span class="val" id="val-spinspeed">40</span> rad/s</label>
  <input type="range" id="slider-spinspeed" min="5" max="100" value="40" step="1">

  <label>Initial Tilt <span class="val" id="val-tilt">10</span>°</label>
  <input type="range" id="slider-tilt" min="1" max="45" value="10" step="1">

  <label>Friction <span class="val" id="val-friction">0.05</span></label>
  <input type="range" id="slider-friction" min="0.01" max="0.3" value="0.05" step="0.01">

  <label>Gravity Scale <span class="val" id="val-gravity">1.0</span></label>
  <input type="range" id="slider-gravity" min="0.1" max="3.0" value="1.0" step="0.1">

  <div class="instructions">
    <b>Space</b>: Launch/Reset &nbsp; <b>P</b>: Pause &nbsp; <b>R</b>: Reset
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---- Scene Setup ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f0e8);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(5, 6, 8);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1, 0);

// ---- Lights ----
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0xffffff, 0.3);
pointLight.position.set(-3, 5, -3);
scene.add(pointLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

// ---- Table ----
const tableGeo = new THREE.BoxGeometry(20, 0.3, 20);
const textureLoader = new THREE.TextureLoader();
const woodTexture = textureLoader.load(
  'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/textures/hardwood2_diffuse.jpg',
  (tex) => {
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(4, 4);
  }
);
const tableMat = new THREE.MeshPhongMaterial({ map: woodTexture, shininess: 30 });
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.y = 0;
table.receiveShadow = true;
scene.add(table);

// Table edge highlight
const edgeGeo = new THREE.EdgesGeometry(tableGeo);
const edgeMat = new THREE.LineBasicMaterial({ color: 0x8d6e63, linewidth: 1 });
const tableEdges = new THREE.LineSegments(edgeGeo, edgeMat);
tableEdges.position.copy(table.position);
scene.add(tableEdges);

// ---- Spinning Top Construction ----
const topGroup = new THREE.Group();

// Cone body (inverted: tip down)
const coneRadius = 1.0;
const coneHeight = 1.5;
const coneGeo = new THREE.ConeGeometry(coneRadius, coneHeight, 32);
const coneMat = new THREE.MeshPhongMaterial({ color: 0xc62828, shininess: 80, specular: 0x444444 });
const coneMesh = new THREE.Mesh(coneGeo, coneMat);
// Default cone: tip at top, base at bottom. We invert it so tip is at bottom.
coneMesh.rotation.x = Math.PI; // flip upside down
coneMesh.position.y = coneHeight / 2; // tip at y=0, base at y=coneHeight
coneMesh.castShadow = true;
topGroup.add(coneMesh);

// Stem
const stemRadius = 0.08;
const stemHeight = 0.8;
const stemGeo = new THREE.CylinderGeometry(stemRadius, stemRadius, stemHeight, 16);
const stemMat = new THREE.MeshPhongMaterial({ color: 0x424242, shininess: 60 });
const stemMesh = new THREE.Mesh(stemGeo, stemMat);
stemMesh.position.y = coneHeight + stemHeight / 2;
stemMesh.castShadow = true;
topGroup.add(stemMesh);

// Decorative bands
const bandGeo1 = new THREE.TorusGeometry(0.65, 0.04, 8, 32);
const bandMat1 = new THREE.MeshPhongMaterial({ color: 0xffd700, shininess: 100 });
const band1 = new THREE.Mesh(bandGeo1, bandMat1);
band1.rotation.x = Math.PI / 2;
band1.position.y = coneHeight * (1/3);
topGroup.add(band1);

const bandGeo2 = new THREE.TorusGeometry(0.35, 0.04, 8, 32);
const bandMat2 = new THREE.MeshPhongMaterial({ color: 0x1565c0, shininess: 100 });
const band2 = new THREE.Mesh(bandGeo2, bandMat2);
band2.rotation.x = Math.PI / 2;
band2.position.y = coneHeight * (2/3);
topGroup.add(band2);

// Tip point (small sphere at contact)
const tipGeo = new THREE.SphereGeometry(0.03, 8, 8);
const tipMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
const tipMesh = new THREE.Mesh(tipGeo, tipMat);
tipMesh.position.y = 0;
topGroup.add(tipMesh);

// Motion blur ring (semi-transparent)
const blurRingGeo = new THREE.TorusGeometry(0.85, 0.15, 8, 64);
const blurRingMat = new THREE.MeshBasicMaterial({ color: 0xc62828, transparent: true, opacity: 0 });
const blurRing = new THREE.Mesh(blurRingGeo, blurRingMat);
blurRing.rotation.x = Math.PI / 2;
blurRing.position.y = coneHeight * 0.3;
topGroup.add(blurRing);

// The topGroup pivot is at the tip (y=0 in local coords)
// We'll position the topGroup so the tip sits on the table surface (y = 0.15, top of table)
const tableTop = 0.15;

scene.add(topGroup);

// ---- Precession Trail ----
const MAX_TRAIL_POINTS = 500;
const trailPositions = new Float32Array(MAX_TRAIL_POINTS * 3);
const trailColors = new Float32Array(MAX_TRAIL_POINTS * 3);
const trailGeo = new THREE.BufferGeometry();
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
trailGeo.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
const trailMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.7 });
const trailLine = new THREE.Line(trailGeo, trailMat);
scene.add(trailLine);
let trailIndex = 0;
let trailCount = 0;

function addTrailPoint(x, z) {
  const idx = trailIndex * 3;
  trailPositions[idx] = x;
  trailPositions[idx + 1] = tableTop + 0.01;
  trailPositions[idx + 2] = z;
  trailColors[idx] = 0.2;
  trailColors[idx + 1] = 0.8;
  trailColors[idx + 2] = 0.2;
  trailIndex = (trailIndex + 1) % MAX_TRAIL_POINTS;
  if (trailCount < MAX_TRAIL_POINTS) trailCount++;
  trailGeo.setDrawRange(0, trailCount);
  trailGeo.attributes.position.needsUpdate = true;
  trailGeo.attributes.color.needsUpdate = true;
  // Fade older points
  for (let i = 0; i < trailCount; i++) {
    const age = (trailIndex - i + MAX_TRAIL_POINTS) % MAX_TRAIL_POINTS;
    const fade = Math.max(0, 1.0 - age / MAX_TRAIL_POINTS);
    trailColors[i * 3] = 0.2 * fade;
    trailColors[i * 3 + 1] = 0.8 * fade;
    trailColors[i * 3 + 2] = 0.2 * fade;
  }
}

function clearTrail() {
  trailIndex = 0;
  trailCount = 0;
  trailGeo.setDrawRange(0, 0);
}

// ---- Physics State ----
const DEG2RAD = Math.PI / 180;
const RAD2DEG = 180 / Math.PI;

const physics = {
  m: 0.5,
  R: coneRadius,
  h: coneHeight,
  g: 9.81,
  d: 0.75 * coneHeight, // distance from tip to CoM (3/4 from tip for cone)
  I_s: 0, // computed below
  I_t: 0,
  theta: 10 * DEG2RAD,     // tilt from vertical
  phi: 0,                   // azimuthal (precession) angle
  omega_s: 40,              // spin rate about symmetry axis
  omega_p: 0,               // precession rate
  theta_dot: 0,             // nutation velocity
  nutation_phase: 0,        // nutation oscillation phase
  nutation_amp: 0.02,       // nutation amplitude (radians)
  spinAngle: 0,             // accumulated spin angle for visual rotation
  friction: 0.05,
  gravityScale: 1.0,
  toppled: false,
  toppleAngle: 0,
  toppleAngVel: 0,
  launched: false,
  elapsedTime: 0,
};

// Compute moments of inertia
// For a solid cone: I_s = (3/10) * m * R^2
// I_t = (3/20) * m * R^2 + (3/80) * m * h^2 ... but let's use the given formulas
physics.I_s = 0.4 * physics.m * physics.R * physics.R; // 0.2
physics.I_t = 0.6 * physics.m * (physics.R * physics.R / 4 + physics.h * physics.h / 12); // more realistic

// ---- Slider Setup ----
const sliderSpin = document.getElementById('slider-spinspeed');
const sliderTilt = document.getElementById('slider-tilt');
const sliderFriction = document.getElementById('slider-friction');
const sliderGravity = document.getElementById('slider-gravity');

const valSpin = document.getElementById('val-spinspeed');
const valTilt = document.getElementById('val-tilt');
const valFriction = document.getElementById('val-friction');
const valGravity = document.getElementById('val-gravity');

sliderSpin.addEventListener('input', () => { valSpin.textContent = sliderSpin.value; });
sliderTilt.addEventListener('input', () => { valTilt.textContent = sliderTilt.value; });
sliderFriction.addEventListener('input', () => { valFriction.textContent = sliderFriction.value; });
sliderGravity.addEventListener('input', () => { valGravity.textContent = sliderGravity.value; });

// ---- State ----
let frameCount = 0;
let isPaused = false;
let trailTimer = 0;

function resetTop() {
  physics.theta = parseFloat(sliderTilt.value) * DEG2RAD;
  physics.phi = 0;
  physics.omega_s = parseFloat(sliderSpin.value);
  physics.theta_dot = 0;
  physics.nutation_phase = 0;
  physics.nutation_amp = 0.02;
  physics.spinAngle = 0;
  physics.friction = parseFloat(sliderFriction.value);
  physics.gravityScale = parseFloat(sliderGravity.value);
  physics.toppled = false;
  physics.toppleAngle = 0;
  physics.toppleAngVel = 0;
  physics.launched = true;
  physics.elapsedTime = 0;
  physics.omega_p = 0;
  clearTrail();
  trailTimer = 0;
}

// ---- Keyboard ----
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    resetTop();
  } else if (e.code === 'KeyP') {
    isPaused = !isPaused;
  } else if (e.code === 'KeyR') {
    resetTop();
    physics.launched = false;
  }
});

// ---- Physics Integration ----
function computeDerivatives(state, g_eff) {
  const { theta, phi, omega_s, theta_dot } = state;
  const { m, d, I_s, I_t } = physics;

  const sinTheta = Math.sin(theta);
  const cosTheta = Math.cos(theta);

  // Gravitational torque
  const tau_grav = m * g_eff * d * sinTheta;

  // Precession rate: omega_p = tau_grav / (I_s * omega_s * sinTheta) when sinTheta != 0
  // More accurately from Euler equations:
  // phi_dot = (m * g * d) / (I_s * omega_s) when theta is small
  // General: phi_dot = m*g*d / (I_s * omega_s * cos(theta) ... no
  // Standard steady precession: phi_dot = m*g*d / (I_s * omega_s) for small theta
  // For general theta: the precession rate from the Lagrangian approach
  
  let phi_dot = 0;
  if (Math.abs(omega_s) > 0.01 && Math.abs(sinTheta) > 0.001) {
    // Precession rate
    phi_dot = (m * g_eff * d) / (I_s * omega_s);
  }

  // Nutation: theta oscillates. The nutation frequency:
  const omega_n = Math.sqrt(Math.abs(m * g_eff * d / I_t));
  
  // Effective torque on theta: gravity tries to increase theta, gyroscopic effect resists
  // d(theta_dot)/dt = (m*g*d*sin(theta) - I_s*omega_s*phi_dot*sin(theta)) / I_t + damping
  // With steady precession substituted, the net torque on theta is zero on average,
  // but we add nutation as perturbation
  
  // More physical approach: 
  // theta_ddot = (sin(theta)/I_t) * (m*g*d - I_s * omega_s * phi_dot * cos(theta)) 
  //              + (I_t - I_s)*phi_dot^2*sin(theta)*cos(theta)/I_t
  // But for stability let's use a simpler effective model:
  
  // Restoring force toward equilibrium tilt + damping
  // The equilibrium condition gives the steady precession. Deviations cause nutation.
  
  // Let's compute theta_ddot more carefully:
  // From Lagrangian mechanics for symmetric top:
  // I_t * theta_ddot = I_t * phi_dot^2 * sin(theta)*cos(theta) 
  //                    - I_s * (omega_s + phi_dot*cos(theta)) * phi_dot * sin(theta)
  //                    + m*g*d*sin(theta)
  
  const psi_dot = omega_s; // spin about symmetry axis
  const L3 = I_s * (psi_dot + phi_dot * cosTheta); // conserved angular momentum component
  
  let theta_ddot = phi_dot * phi_dot * sinTheta * cosTheta
                   - (I_s / I_t) * (psi_dot + phi_dot * cosTheta) * phi_dot * sinTheta
                   + (m * g_eff * d * sinTheta) / I_t;
  
  // Add nutation damping
  theta_ddot -= 0.5 * theta_dot;

  // Friction on spin
  const omega_s_dot = -physics.friction * omega_s;

  return { phi_dot, theta_dot, theta_ddot, omega_s_dot };
}

function stepPhysics(dt) {
  if (!physics.launched || physics.toppled) return;

  const g_eff = physics.g * physics.gravityScale;
  const subSteps = 4;
  const subDt = dt / subSteps;

  for (let s = 0; s < subSteps; s++) {
    // RK2 (midpoint method)
    const state0 = {
      theta: physics.theta,
      phi: physics.phi,
      omega_s: physics.omega_s,
      theta_dot: physics.theta_dot,
    };

    const d0 = computeDerivatives(state0, g_eff);

    // Midpoint
    const stateM = {
      theta: state0.theta + d0.theta_dot * subDt * 0.5,
      phi: state0.phi + d0.phi_dot * subDt * 0.5,
      omega_s: state0.omega_s + d0.omega_s_dot * subDt * 0.5,
      theta_dot: state0.theta_dot + d0.theta_ddot * subDt * 0.5,
    };

    const dM = computeDerivatives(stateM, g_eff);

    physics.theta += dM.theta_dot * subDt;
    physics.phi += dM.phi_dot * subDt;
    physics.omega_s += dM.omega_s_dot * subDt;
    physics.theta_dot += dM.theta_ddot * subDt;
    physics.omega_p = dM.phi_dot;

    // Clamp theta
    if (physics.theta < 0.001) {
      physics.theta = 0.001;
      physics.theta_dot = Math.abs(physics.theta_dot) * 0.5;
    }

    // Spin angle for visual
    physics.spinAngle += physics.omega_s * subDt;

    // Check toppling conditions
    if (physics.theta > 80 * DEG2RAD || Math.abs(physics.omega_s) < 0.5) {
      if (physics.theta > 45 * DEG2RAD && Math.abs(physics.omega_s) < 2.0) {
        physics.toppled = true;
        physics.toppleAngle = physics.theta;
        physics.toppleAngVel = 2.0; // initial angular velocity for falling
        break;
      }
    }
  }

  physics.elapsedTime += dt;
}

function stepTopple(dt) {
  if (!physics.toppled) return;

  const g_eff = physics.g * physics.gravityScale;

  // Simple falling: theta increases toward PI/2
  physics.toppleAngVel += g_eff * 0.3 * dt; // gravity accelerates the fall
  physics.toppleAngle += physics.toppleAngVel * dt;
  physics.omega_s *= (1 - physics.friction * dt * 5); // rapid spin decay

  // Ground collision: when the body hits the table
  if (physics.toppleAngle >= Math.PI / 2) {
    physics.toppleAngle = Math.PI / 2;
    physics.toppleAngVel *= -0.2; // bounce damping
    if (Math.abs(physics.toppleAngVel) < 0.1) {
      physics.toppleAngVel = 0;
    }
    physics.omega_s *= 0.9;
  }

  physics.theta = physics.toppleAngle;
  physics.omega_s = Math.max(0, physics.omega_s);
  physics.omega_p *= 0.95;
  physics.phi += physics.omega_p * dt * 0.1;

  physics.elapsedTime += dt;
}

// ---- Update Top Visual ----
function updateTopVisual() {
  if (!physics.launched) {
    // Rest position: standing upright on table
    topGroup.position.set(0, tableTop, 0);
    topGroup.rotation.set(0, 0, 0);
    topGroup.quaternion.identity();
    return;
  }

  // The top's tip is at the contact point on the table
  // The symmetry axis direction is given by theta (tilt from vertical) and phi (azimuth)
  
  const theta = physics.theta;
  const phi = physics.phi;

  // Build orientation: 
  // 1. Start with top pointing up (along +Y)
  // 2. Tilt by theta around X axis
  // 3. Rotate by phi around Y axis
  // 4. Spin around own axis

  topGroup.position.set(0, tableTop, 0);

  const q = new THREE.Quaternion();
  
  // Precession (rotation around world Y)
  const qPhi = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), phi);
  
  // Nutation/tilt (rotation around local X after precession)
  const qTheta = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), theta);
  
  // Spin around own axis (local Y)
  const qSpin = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), physics.spinAngle);

  q.copy(qPhi).multiply(qTheta).multiply(qSpin);
  topGroup.quaternion.copy(q);

  // Motion blur effect
  const spinSpeed = Math.abs(physics.omega_s);
  const blurOpacity = THREE.MathUtils.clamp((spinSpeed - 5) / 30, 0, 0.4);
  blurRingMat.opacity = blurOpacity;

  // Band opacity (blur when spinning fast)
  const bandBlur = THREE.MathUtils.clamp(spinSpeed / 20, 0, 0.8);
  bandMat1.transparent = true;
  bandMat2.transparent = true;
  bandMat1.opacity = 1.0 - bandBlur * 0.3;
  bandMat2.opacity = 1.0 - bandBlur * 0.3;
}

// ---- HUD Update ----
const hudSpinRate = document.getElementById('hud-spinrate');
const hudPrecession = document.getElementById('hud-precession');
const hudTilt = document.getElementById('hud-tilt');
const hudStatus = document.getElementById('hud-status');
const hudTime = document.getElementById('hud-time');
const hudFrameCount = document.getElementById('hud-framecount');
const hudPaused = document.getElementById('hud-paused');

function getStatus() {
  if (!physics.launched) return "Ready";
  if (physics.toppled) return "Toppled";
  if (physics.theta > 30 * DEG2RAD || Math.abs(physics.omega_s) < 5) return "Wobbling";
  return "Spinning";
}

function getStatusKey() {
  if (!physics.launched) return "spinning";
  if (physics.toppled) return "toppled";
  if (physics.theta > 30 * DEG2RAD || Math.abs(physics.omega_s) < 5) return "wobbling";
  return "spinning";
}

function updateHUD() {
  hudSpinRate.textContent = physics.omega_s.toFixed(2);
  hudPrecession.textContent = (physics.omega_p || 0).toFixed(4);
  hudTilt.textContent = (physics.theta * RAD2DEG).toFixed(2);
  hudStatus.textContent = getStatus();
  hudTime.textContent = physics.elapsedTime.toFixed(2);
  hudFrameCount.textContent = frameCount;
  hudPaused.textContent = isPaused ? "Yes" : "No";
}

// ---- State Management ----
window.__3D_STATE__ = {};

function updateState() {
  const ke = 0.5 * physics.I_s * physics.omega_s * physics.omega_s;
  const tiltDeg = physics.theta * RAD2DEG;
  const azDeg = (physics.phi * RAD2DEG) % 360;

  const state = {
    frameCount: frameCount,
    isPaused: isPaused,
    spinRate: physics.omega_s,
    precessionRate: physics.omega_p || 0,
    tiltAngle: tiltDeg,
    azimuthAngle: azDeg,
    status: getStatusKey(),
    friction: parseFloat(sliderFriction.value),
    gravityScale: parseFloat(sliderGravity.value),
    initialSpinSpeed: parseFloat(sliderSpin.value),
    initialTilt: parseFloat(sliderTilt.value),
    elapsedTime: physics.elapsedTime,
    kineticEnergy: ke,
    isValid: true,
  };

  // Check for NaN/Infinity
  for (const key of Object.keys(state)) {
    const v = state[key];
    if (typeof v === 'number' && (!isFinite(v) || isNaN(v))) {
      state.isValid = false;
      break;
    }
  }

  window.__3D_STATE__ = state;
}

// ---- Animation Loop ----
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  frameCount++;

  const dt = Math.min(clock.getDelta(), 1 / 30);

  if (!isPaused && physics.launched) {
    // Read friction and gravity from sliders in real-time
    physics.friction = parseFloat(sliderFriction.value);
    physics.gravityScale = parseFloat(sliderGravity.value);

    if (!physics.toppled) {
      stepPhysics(dt);

      // Add trail points
      trailTimer += dt;
      if (trailTimer > 0.05) {
        trailTimer = 0;
        // Project the top's axis onto the table to get precession circle point
        const r = physics.d * Math.sin(physics.theta);
        const tx = r * Math.sin(physics.phi);
        const tz = r * Math.cos(physics.phi);
        addTrailPoint(tx, tz);
      }
    } else {
      stepTopple(dt);
    }
  }

  updateTopVisual();
  updateHUD();
  updateState();

  controls.update();
  renderer.render(scene, camera);
}

// ---- Window Resize ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---- Initial state ----
updateTopVisual();
updateHUD();
updateState();

// Auto-launch for immediate demo
resetTop();

animate();
</script>
