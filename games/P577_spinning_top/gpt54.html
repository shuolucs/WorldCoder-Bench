<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Spinning Top Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #f5f0e8;
      font-family: Arial, sans-serif;
    }

    #controls-panel {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 14px;
      border-radius: 8px;
      z-index: 100;
      min-width: 240px;
      box-sizing: border-box;
    }

    #controls-panel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .control-group {
      margin-bottom: 10px;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .control-group input[type="range"] {
      width: 100%;
    }

    .value {
      font-size: 12px;
      color: #ddd;
      margin-top: 2px;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      font-family: monospace;
      padding: 10px;
      border-radius: 6px;
      z-index: 100;
      pointer-events: none;
      min-width: 220px;
      line-height: 1.45;
    }

    #help {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.75);
      color: #222;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      z-index: 100;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div>Spin Rate: <span id="hud-spinrate">0.00</span></div>
    <div>Precession Rate: <span id="hud-precession">0.00</span></div>
    <div>Tilt Angle: <span id="hud-tilt">0.00</span></div>
    <div>Status: <span id="hud-status">Spinning</span></div>
    <div>Elapsed Time: <span id="hud-time">0.00</span></div>
    <div>Frame Count: <span id="hud-framecount">0</span></div>
    <div>Paused: <span id="hud-paused">No</span></div>
  </div>

  <div id="help">
    Space: Launch/Reset<br>
    P: Pause/Unpause<br>
    R: Reset
  </div>

  <div id="controls-panel">
    <h3>Top Controls</h3>

    <div class="control-group">
      <label for="slider-spinspeed">Initial Spin Speed</label>
      <input id="slider-spinspeed" type="range" min="5" max="100" step="1" value="40">
      <div class="value"><span id="value-spinspeed">40</span> rad/s</div>
    </div>

    <div class="control-group">
      <label for="slider-tilt">Initial Tilt</label>
      <input id="slider-tilt" type="range" min="1" max="45" step="1" value="10">
      <div class="value"><span id="value-tilt">10</span>°</div>
    </div>

    <div class="control-group">
      <label for="slider-friction">Friction</label>
      <input id="slider-friction" type="range" min="0.01" max="0.3" step="0.01" value="0.05">
      <div class="value"><span id="value-friction">0.05</span></div>
    </div>

    <div class="control-group">
      <label for="slider-gravity">Gravity Scale</label>
      <input id="slider-gravity" type="range" min="0.1" max="3.0" step="0.1" value="1.0">
      <div class="value"><span id="value-gravity">1.0</span>x</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ------------------------------------------------------------
    // Scene setup
    // ------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf5f0e8);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(5, 6, 8);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    // Lights
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.3, 50);
    pointLight.position.set(-3, 5, -3);
    scene.add(pointLight);

    const ambient = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambient);

    // ------------------------------------------------------------
    // Table
    // ------------------------------------------------------------
    const textureLoader = new THREE.TextureLoader();
    const woodTex = textureLoader.load(
      'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/textures/hardwood2_diffuse.jpg'
    );
    woodTex.wrapS = THREE.RepeatWrapping;
    woodTex.wrapT = THREE.RepeatWrapping;
    woodTex.repeat.set(4, 4);
    woodTex.colorSpace = THREE.SRGBColorSpace;

    const tableGroup = new THREE.Group();

    const tableMat = new THREE.MeshPhongMaterial({
      map: woodTex,
      shininess: 25
    });

    const table = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.3, 20),
      tableMat
    );
    table.position.y = -0.15;
    table.receiveShadow = true;
    table.castShadow = false;
    tableGroup.add(table);

    const edgeHighlight = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(20.01, 0.31, 20.01)),
      new THREE.LineBasicMaterial({ color: 0xcaa472, transparent: true, opacity: 0.25 })
    );
    edgeHighlight.position.copy(table.position);
    tableGroup.add(edgeHighlight);

    scene.add(tableGroup);

    // ------------------------------------------------------------
    // Top geometry
    // ------------------------------------------------------------
    const topRoot = new THREE.Group();
    scene.add(topRoot);

    const topPivot = new THREE.Group();
    topRoot.add(topPivot);

    const topSpinGroup = new THREE.Group();
    topPivot.add(topSpinGroup);

    const bodyMat = new THREE.MeshPhongMaterial({
      color: 0xc62828,
      shininess: 80,
      specular: 0x555555
    });

    const stemMat = new THREE.MeshPhongMaterial({
      color: 0x424242,
      shininess: 50
    });

    const goldMat = new THREE.MeshPhongMaterial({
      color: 0xffd700,
      shininess: 90
    });

    const blueMat = new THREE.MeshPhongMaterial({
      color: 0x1565c0,
      shininess: 90
    });

    // ConeGeometry points down by default, so translate so tip is at local y=0.
    const bodyGeo = new THREE.ConeGeometry(1.0, 1.5, 48, 1, false);
    bodyGeo.translate(0, 0.75, 0);
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.castShadow = true;
    body.receiveShadow = false;
    topSpinGroup.add(body);

    // Stem extends upward from top of cone
    const stemGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 24);
    stemGeo.translate(0, 1.5 + 0.4, 0);
    const stem = new THREE.Mesh(stemGeo, stemMat);
    stem.castShadow = true;
    topSpinGroup.add(stem);

    // Decorative rings
    function radiusAtY(y) {
      return 1.0 * (1 - y / 1.5);
    }

    const y1 = 0.5;
    const y2 = 1.0;
    const r1 = Math.max(0.08, radiusAtY(y1));
    const r2 = Math.max(0.08, radiusAtY(y2));

    const ring1 = new THREE.Mesh(
      new THREE.TorusGeometry(r1, 0.04, 12, 48),
      goldMat
    );
    ring1.position.y = y1;
    ring1.rotation.x = Math.PI / 2;
    ring1.castShadow = true;
    topSpinGroup.add(ring1);

    const ring2 = new THREE.Mesh(
      new THREE.TorusGeometry(r2, 0.035, 12, 48),
      blueMat
    );
    ring2.position.y = y2;
    ring2.rotation.x = Math.PI / 2;
    ring2.castShadow = true;
    topSpinGroup.add(ring2);

    // Motion blur ring
    const blurRing = new THREE.Mesh(
      new THREE.TorusGeometry(1.0, 0.08, 16, 96),
      new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.0,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      })
    );
    blurRing.rotation.x = Math.PI / 2;
    blurRing.position.y = 0.78;
    topSpinGroup.add(blurRing);

    // ------------------------------------------------------------
    // Precession trail
    // ------------------------------------------------------------
    const MAX_TRAIL = 220;
    const trailPositions = new Float32Array(MAX_TRAIL * 3);
    const trailColors = new Float32Array(MAX_TRAIL * 3);

    const trailGeo = new THREE.BufferGeometry();
    trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
    trailGeo.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));

    const trailMat = new THREE.LineBasicMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 0.9
    });

    const trailLine = new THREE.Line(trailGeo, trailMat);
    scene.add(trailLine);

    let trailPoints = [];

    function pushTrailPoint(v) {
      trailPoints.push(v.clone());
      if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
      refreshTrail();
    }

    function refreshTrail() {
      const len = trailPoints.length;
      for (let i = 0; i < MAX_TRAIL; i++) {
        const idx = i * 3;
        if (i < len) {
          const p = trailPoints[i];
          trailPositions[idx] = p.x;
          trailPositions[idx + 1] = p.y + 0.01;
          trailPositions[idx + 2] = p.z;

          const a = i / Math.max(1, len - 1);
          const c = 0.15 + 0.75 * a;
          trailColors[idx] = c;
          trailColors[idx + 1] = c * 0.9;
          trailColors[idx + 2] = c * 0.7;
        } else {
          trailPositions[idx] = 0;
          trailPositions[idx + 1] = -1000;
          trailPositions[idx + 2] = 0;
          trailColors[idx] = 0;
          trailColors[idx + 1] = 0;
          trailColors[idx + 2] = 0;
        }
      }
      trailGeo.attributes.position.needsUpdate = true;
      trailGeo.attributes.color.needsUpdate = true;
      trailGeo.setDrawRange(0, len);
      trailGeo.computeBoundingSphere();
    }

    // ------------------------------------------------------------
    // Physics parameters
    // ------------------------------------------------------------
    const params = {
      m: 0.5,
      R: 1.0,
      h: 1.5,
      d: 1.125,
      g: 9.81
    };
    params.I_s = 0.4 * params.m * params.R * params.R;
    params.I_t = 0.6 * params.m * (params.R * params.R / 4 + params.h * params.h / 12);

    // ------------------------------------------------------------
    // UI
    // ------------------------------------------------------------
    const sliderSpin = document.getElementById('slider-spinspeed');
    const sliderTilt = document.getElementById('slider-tilt');
    const sliderFriction = document.getElementById('slider-friction');
    const sliderGravity = document.getElementById('slider-gravity');

    const valueSpin = document.getElementById('value-spinspeed');
    const valueTilt = document.getElementById('value-tilt');
    const valueFriction = document.getElementById('value-friction');
    const valueGravity = document.getElementById('value-gravity');

    function dispatchInput(el) {
      el.dispatchEvent(new Event('input', { bubbles: true }));
    }

    sliderSpin.addEventListener('input', () => valueSpin.textContent = sliderSpin.value);
    sliderTilt.addEventListener('input', () => valueTilt.textContent = sliderTilt.value);
    sliderFriction.addEventListener('input', () => valueFriction.textContent = Number(sliderFriction.value).toFixed(2));
    sliderGravity.addEventListener('input', () => valueGravity.textContent = Number(sliderGravity.value).toFixed(1));

    dispatchInput(sliderSpin);
    dispatchInput(sliderTilt);
    dispatchInput(sliderFriction);
    dispatchInput(sliderGravity);

    // ------------------------------------------------------------
    // Simulation state
    // ------------------------------------------------------------
    const sim = {
      phi: 0,
      thetaMean: THREE.MathUtils.degToRad(Number(sliderTilt.value)),
      thetaOffset: 0,
      thetaVel: 0,
      theta: THREE.MathUtils.degToRad(Number(sliderTilt.value)),
      omega_s: Number(sliderSpin.value),
      omega_p: 0,
      spinVisualAngle: 0,
      elapsedTime: 0,
      frameCount: 0,
      isPaused: false,
      status: 'spinning',
      toppled: false,
      launchTime: performance.now(),

      // toppling/fall mode
      fallTheta: 0,
      fallOmega: 0,
      slideVel: new THREE.Vector3(),
      slidePos: new THREE.Vector3(0, 0, 0)
    };

    // ------------------------------------------------------------
    // Helpers
    // ------------------------------------------------------------
    const worldUp = new THREE.Vector3(0, 1, 0);
    const tmpAxis = new THREE.Vector3();
    const nVec = new THREE.Vector3();

    function currentGravity() {
      return params.g * Number(sliderGravity.value);
    }

    function currentFriction() {
      return Number(sliderFriction.value);
    }

    function computeOmegaP(theta, omega_s) {
      const g = currentGravity();
      const ws = Math.max(omega_s, 0.25);
      return (params.m * g * params.d * Math.sin(theta)) / (params.I_s * ws);
    }

    function updateTopTransform() {
      if (!sim.toppled) {
        nVec.set(
          Math.sin(sim.theta) * Math.cos(sim.phi),
          Math.cos(sim.theta),
          Math.sin(sim.theta) * Math.sin(sim.phi)
        ).normalize();

        topRoot.position.set(0, 0, 0);

        tmpAxis.crossVectors(worldUp, nVec);
        const axisLenSq = tmpAxis.lengthSq();
        if (axisLenSq < 1e-10) {
          topPivot.quaternion.identity();
        } else {
          tmpAxis.normalize();
          const angle = Math.acos(THREE.MathUtils.clamp(worldUp.dot(nVec), -1, 1));
          topPivot.quaternion.setFromAxisAngle(tmpAxis, angle);
        }

        topSpinGroup.rotation.y = sim.spinVisualAngle;
      } else {
        topRoot.position.copy(sim.slidePos);
        topPivot.rotation.set(0, 0, 0);
        topPivot.rotation.z = sim.fallTheta;
        topSpinGroup.rotation.y = sim.spinVisualAngle;
      }
    }

    function contactPointWorld() {
      if (!sim.toppled) {
        return new THREE.Vector3(0, 0, 0);
      }
      return new THREE.Vector3(sim.slidePos.x, 0, sim.slidePos.z);
    }

    function updateVisualEffects() {
      const speedNorm = THREE.MathUtils.clamp(sim.omega_s / 100, 0, 1);
      blurRing.material.opacity = speedNorm * 0.22;
      blurRing.visible = sim.omega_s > 20 && !sim.toppled;

      const ringBlur = THREE.MathUtils.clamp((sim.omega_s - 20) / 50, 0, 1);
      ring1.material.opacity = 1.0 - 0.45 * ringBlur;
      ring2.material.opacity = 1.0 - 0.45 * ringBlur;
      ring1.material.transparent = ringBlur > 0.01;
      ring2.material.transparent = ringBlur > 0.01;
    }

    function resetTrail() {
      trailPoints = [];
      refreshTrail();
    }

    function launchTop() {
      sim.phi = 0;
      sim.thetaMean = THREE.MathUtils.degToRad(Number(sliderTilt.value));
      sim.thetaOffset = 0;
      sim.thetaVel = 0;
      sim.theta = sim.thetaMean;
      sim.omega_s = Number(sliderSpin.value);
      sim.omega_p = computeOmegaP(sim.theta, sim.omega_s);
      sim.spinVisualAngle = 0;
      sim.elapsedTime = 0;
      sim.status = sim.theta < THREE.MathUtils.degToRad(20) ? 'spinning' : 'wobbling';
      sim.toppled = false;
      sim.fallTheta = sim.theta;
      sim.fallOmega = 0;
      sim.slideVel.set(0, 0, 0);
      sim.slidePos.set(0, 0, 0);
      sim.launchTime = performance.now();
      resetTrail();
      updateTopTransform();
      updateHUD();
    }

    function resetTop() {
      launchTop();
    }

    // ------------------------------------------------------------
    // Integrator
    // ------------------------------------------------------------
    function derivatives(state) {
      const friction = currentFriction();
      const g = currentGravity();

      const theta = state.theta;
      const thetaVel = state.thetaVel;
      const omega_s = state.omega_s;

      const omega_p = (params.m * g * params.d * Math.sin(theta)) / (params.I_s * Math.max(omega_s, 0.25));

      // Nutation: damped oscillation around a mean tilt that slowly grows as spin weakens
      const spinWeakness = 1 / Math.max(omega_s, 0.5);
      const targetMeanTheta = sim.thetaMean + 0.10 * spinWeakness * (g / params.g);
      const omega_n = Math.sqrt((params.m * g * params.d) / params.I_t);
      const damping = 0.85 + 0.8 * friction;

      const dTheta = thetaVel;
      const dThetaVel = -omega_n * omega_n * (theta - targetMeanTheta) - damping * thetaVel + 0.12 * omega_p * omega_p * Math.sin(theta);
      const dPhi = omega_p;
      const dOmegaS = -friction * omega_s;

      return { dTheta, dThetaVel, dPhi, dOmegaS, omega_p };
    }

    function integrateSpinning(dt) {
      const s1 = {
        theta: sim.theta,
        thetaVel: sim.thetaVel,
        phi: sim.phi,
        omega_s: sim.omega_s
      };

      const k1 = derivatives(s1);

      const mid = {
        theta: s1.theta + k1.dTheta * dt * 0.5,
        thetaVel: s1.thetaVel + k1.dThetaVel * dt * 0.5,
        phi: s1.phi + k1.dPhi * dt * 0.5,
        omega_s: s1.omega_s + k1.dOmegaS * dt * 0.5
      };

      const k2 = derivatives(mid);

      sim.theta += k2.dTheta * dt;
      sim.thetaVel += k2.dThetaVel * dt;
      sim.phi += k2.dPhi * dt;
      sim.omega_s += k2.dOmegaS * dt;
      sim.omega_s = Math.max(sim.omega_s, 0);

      sim.omega_p = computeOmegaP(sim.theta, sim.omega_s);
      sim.spinVisualAngle += sim.omega_s * dt;

      sim.theta = THREE.MathUtils.clamp(sim.theta, 0.001, THREE.MathUtils.degToRad(89.5));

      if (sim.omega_s < 1.0 || sim.theta > THREE.MathUtils.degToRad(80)) {
        sim.toppled = true;
        sim.status = 'toppled';
        sim.fallTheta = sim.theta;
        sim.slidePos.set(0, 0, 0);
        const lateral = new THREE.Vector3(Math.cos(sim.phi), 0, Math.sin(sim.phi)).multiplyScalar(Math.min(1.2, sim.omega_p * 0.06));
        sim.slideVel.copy(lateral);
      } else if (sim.theta > THREE.MathUtils.degToRad(18) || Math.abs(sim.thetaVel) > 0.4) {
        sim.status = 'wobbling';
      } else {
        sim.status = 'spinning';
      }
    }

    function integrateToppled(dt) {
      const g = currentGravity();
      const groundFriction = 1.8 + currentFriction() * 4.0;

      // Continue weak spin decay on its side
      sim.omega_s = Math.max(0, sim.omega_s - currentFriction() * 1.4 * sim.omega_s * dt);
      sim.spinVisualAngle += sim.omega_s * dt;

      // Fall to side
      const target = Math.PI / 2;
      const torque = 2.8 * (target - sim.fallTheta) + 0.25 * (g / params.g);
      sim.fallOmega += torque * dt;
      sim.fallOmega *= 0.96;
      sim.fallTheta += sim.fallOmega * dt;
      sim.fallTheta = Math.min(target, sim.fallTheta);

      // Slide and settle
      sim.slidePos.addScaledVector(sim.slideVel, dt);
      sim.slideVel.multiplyScalar(Math.max(0, 1 - groundFriction * dt));

      sim.theta = sim.fallTheta;
      sim.omega_p = 0;
      sim.status = 'toppled';
    }

    // ------------------------------------------------------------
    // HUD and external state
    // ------------------------------------------------------------
    const hudSpin = document.getElementById('hud-spinrate');
    const hudPrec = document.getElementById('hud-precession');
    const hudTilt = document.getElementById('hud-tilt');
    const hudStatus = document.getElementById('hud-status');
    const hudTime = document.getElementById('hud-time');
    const hudFrame = document.getElementById('hud-framecount');
    const hudPaused = document.getElementById('hud-paused');

    function updateHUD() {
      hudSpin.textContent = sim.omega_s.toFixed(2) + ' rad/s';
      hudPrec.textContent = sim.omega_p.toFixed(2) + ' rad/s';
      hudTilt.textContent = THREE.MathUtils.radToDeg(sim.theta).toFixed(2) + '°';
      hudStatus.textContent = sim.status.charAt(0).toUpperCase() + sim.status.slice(1);
      hudTime.textContent = sim.elapsedTime.toFixed(2) + ' s';
      hudFrame.textContent = sim.frameCount;
      hudPaused.textContent = sim.isPaused ? 'Yes' : 'No';

      const isValid =
        Number.isFinite(sim.omega_s) &&
        Number.isFinite(sim.omega_p) &&
        Number.isFinite(sim.theta) &&
        Number.isFinite(sim.phi) &&
        Number.isFinite(sim.elapsedTime);

      window.__3D_STATE__ = {
        frameCount: sim.frameCount,
        isPaused: sim.isPaused,
        spinRate: sim.omega_s,
        precessionRate: sim.omega_p,
        tiltAngle: THREE.MathUtils.radToDeg(sim.theta),
        azimuthAngle: THREE.MathUtils.radToDeg(sim.phi),
        status: sim.status,
        friction: currentFriction(),
        gravityScale: Number(sliderGravity.value),
        initialSpinSpeed: Number(sliderSpin.value),
        initialTilt: Number(sliderTilt.value),
        elapsedTime: sim.elapsedTime,
        kineticEnergy: 0.5 * params.I_s * sim.omega_s * sim.omega_s,
        isValid
      };
    }

    // ------------------------------------------------------------
    // Keyboard shortcuts
    // ------------------------------------------------------------
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        launchTop();
      } else if (e.key === 'p' || e.key === 'P') {
        sim.isPaused = !sim.isPaused;
        updateHUD();
      } else if (e.key === 'r' || e.key === 'R') {
        resetTop();
      }
    });

    // ------------------------------------------------------------
    // Animation loop
    // ------------------------------------------------------------
    let prevTime = performance.now();
    let trailAccumulator = 0;

    function animate(now) {
      requestAnimationFrame(animate);

      const dtReal = Math.min(0.05, (now - prevTime) / 1000);
      prevTime = now;

      controls.update();

      if (!sim.isPaused) {
        const substeps = 4;
        const dt = (1 / 60) / substeps;
        const advance = Math.min(dtReal, 1 / 20);
        const effectiveSubsteps = Math.max(1, Math.round(advance / dt));

        for (let i = 0; i < effectiveSubsteps; i++) {
          if (!sim.toppled) {
            integrateSpinning(dt);
          } else {
            integrateToppled(dt);
          }
          sim.elapsedTime += dt;

          trailAccumulator += dt;
          if (trailAccumulator >= 0.04) {
            trailAccumulator = 0;
            pushTrailPoint(contactPointWorld());
          }
        }
      }

      updateTopTransform();
      updateVisualEffects();

      sim.frameCount++;
      updateHUD();

      renderer.render(scene, camera);
    }

    // ------------------------------------------------------------
    // Resize
    // ------------------------------------------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initial launch
    launchTop();
    animate(performance.now());
  </script>
</body>
</html>
