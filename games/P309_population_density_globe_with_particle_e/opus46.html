<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Population Density Globe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a2e; font-family: Arial, sans-serif; }
  canvas { display: block; }

  #title {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
    pointer-events: none;
    z-index: 10;
  }

  #statsPanel {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.6);
    color: white;
    padding: 15px 20px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(100, 150, 255, 0.3);
    z-index: 10;
  }

  #buttonContainer {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    z-index: 10;
  }

  #buttonContainer button {
    padding: 10px 20px;
    background: rgba(34, 68, 170, 0.7);
    color: white;
    border: 1px solid rgba(100, 150, 255, 0.5);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s, transform 0.1s;
  }

  #buttonContainer button:hover {
    background: rgba(50, 100, 220, 0.9);
    transform: scale(1.05);
  }

  #buttonContainer button:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>

<div id="title">Population Density Globe</div>

<div id="statsPanel">
  <div id="statParticles">Particles: 2000</div>
  <div id="statRotate">Auto-Rotate: ON</div>
</div>

<div id="buttonContainer">
  <button id="btnToggleRotate">Toggle Rotation</button>
  <button id="btnToggleParticles">Toggle Particles</button>
  <button id="btnResetView">Reset View</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  particleCount: 2000,
  particlesVisible: true,
  autoRotate: true,
  cameraX: 0,
  cameraY: 2,
  cameraZ: 5,
  globeExists: false,
  corsetLoaded: false,
  corsetRotationY: 0,
  frameCount: 0
};

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 5, 5);
scene.add(directionalLight);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Globe
const globeGeometry = new THREE.SphereGeometry(1.5, 64, 64);
const globeMaterial = new THREE.MeshBasicMaterial({
  color: 0x2244aa,
  opacity: 0.3,
  transparent: true,
  wireframe: true
});
const globe = new THREE.Mesh(globeGeometry, globeMaterial);
scene.add(globe);
window.__3D_STATE__.globeExists = true;

// Population Density Particles
const PARTICLE_COUNT = 2000;
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);

const colorHigh = new THREE.Color(0xff3333);
const colorMedium = new THREE.Color(0xffaa33);
const colorLow = new THREE.Color(0x33ff66);

// Define cluster centers for high density regions (simulating population centers)
const clusterCenters = [
  { phi: Math.PI * 0.4, theta: Math.PI * 0.6 },   // East Asia
  { phi: Math.PI * 0.35, theta: Math.PI * 0.45 },  // South Asia
  { phi: Math.PI * 0.3, theta: Math.PI * 1.0 },    // Europe
  { phi: Math.PI * 0.55, theta: Math.PI * 1.7 },   // East US
  { phi: Math.PI * 0.6, theta: Math.PI * 0.55 },   // Southeast Asia
];

for (let i = 0; i < PARTICLE_COUNT; i++) {
  let phi, theta;
  let color;
  let size;

  const rand = Math.random();

  if (rand < 0.3) {
    // High density - clustered
    const cluster = clusterCenters[Math.floor(Math.random() * clusterCenters.length)];
    phi = cluster.phi + (Math.random() - 0.5) * 0.4;
    theta = cluster.theta + (Math.random() - 0.5) * 0.4;
    color = colorHigh;
    size = 2 + Math.random() * 2;
  } else if (rand < 0.7) {
    // Medium density
    phi = Math.random() * Math.PI;
    theta = Math.random() * Math.PI * 2;
    color = colorMedium;
    size = 1.5 + Math.random() * 1.5;
  } else {
    // Low density
    phi = Math.random() * Math.PI;
    theta = Math.random() * Math.PI * 2;
    color = colorLow;
    size = 1 + Math.random() * 1;
  }

  const radius = 1.52 + Math.random() * 0.05;
  const x = radius * Math.sin(phi) * Math.cos(theta);
  const y = radius * Math.cos(phi);
  const z = radius * Math.sin(phi) * Math.sin(theta);

  positions[i * 3] = x;
  positions[i * 3 + 1] = y;
  positions[i * 3 + 2] = z;

  colors[i * 3] = color.r;
  colors[i * 3 + 1] = color.g;
  colors[i * 3 + 2] = color.b;

  sizes[i] = size;
}

const particleGeometry = new THREE.BufferGeometry();
particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
particleGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const particleMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uPixelRatio: { value: renderer.getPixelRatio() }
  },
  vertexShader: `
    attribute float size;
    varying vec3 vColor;
    uniform float uTime;
    uniform float uPixelRatio;

    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      float pulse = 1.0 + 0.3 * sin(uTime * 2.0 + position.x * 10.0 + position.y * 10.0);
      gl_PointSize = size * pulse * uPixelRatio * (200.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;

    void main() {
      float dist = length(gl_PointCoord - vec2(0.5));
      if (dist > 0.5) discard;
      float alpha = 1.0 - smoothstep(0.3, 0.5, dist);
      gl_FragColor = vec4(vColor, alpha * 0.8);
    }
  `,
  transparent: true,
  vertexColors: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// Corset Model
let corsetModel = null;

const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Corset/glTF-Binary/Corset.glb',
  (gltf) => {
    corsetModel = gltf.scene;
    corsetModel.name = 'corsetMarker';
    corsetModel.scale.set(0.3, 0.3, 0.3);
    corsetModel.position.set(1.5, 0, 0);
    scene.add(corsetModel);
    window.__3D_STATE__.corsetLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Could not load Corset.glb:', error);
    // Create a fallback marker
    const fallbackGeo = new THREE.OctahedronGeometry(0.1, 0);
    const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff3300, emissiveIntensity: 0.5 });
    corsetModel = new THREE.Mesh(fallbackGeo, fallbackMat);
    corsetModel.name = 'corsetMarker';
    corsetModel.scale.set(0.3, 0.3, 0.3);
    corsetModel.position.set(1.5, 0, 0);
    scene.add(corsetModel);
    window.__3D_STATE__.corsetLoaded = true;
  }
);

// Add some atmospheric glow
const glowGeometry = new THREE.SphereGeometry(1.6, 32, 32);
const glowMaterial = new THREE.ShaderMaterial({
  uniforms: {
    viewVector: { value: camera.position }
  },
  vertexShader: `
    uniform vec3 viewVector;
    varying float intensity;
    void main() {
      vec3 vNormal = normalize(normalMatrix * normal);
      vec3 vNormel = normalize(normalMatrix * viewVector);
      intensity = pow(0.7 - dot(vNormal, vNormel), 2.0);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying float intensity;
    void main() {
      vec3 glow = vec3(0.1, 0.3, 0.8) * intensity;
      gl_FragColor = vec4(glow, intensity * 0.4);
    }
  `,
  side: THREE.BackSide,
  blending: THREE.AdditiveBlending,
  transparent: true
});
const glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
scene.add(glowMesh);

// UI References
const statParticles = document.getElementById('statParticles');
const statRotate = document.getElementById('statRotate');

// Button handlers
function toggleRotation() {
  controls.autoRotate = !controls.autoRotate;
  window.__3D_STATE__.autoRotate = controls.autoRotate;
  statRotate.textContent = 'Auto-Rotate: ' + (controls.autoRotate ? 'ON' : 'OFF');
}

function toggleParticles() {
  particles.visible = !particles.visible;
  window.__3D_STATE__.particlesVisible = particles.visible;
  statParticles.textContent = 'Particles: ' + (particles.visible ? '2000' : '0 (hidden)');
}

function resetView() {
  camera.position.set(0, 2, 5);
  camera.lookAt(0, 0, 0);
  controls.target.set(0, 0, 0);
  controls.update();
}

document.getElementById('btnToggleRotate').addEventListener('click', toggleRotation);
document.getElementById('btnToggleParticles').addEventListener('click', toggleParticles);
document.getElementById('btnResetView').addEventListener('click', resetView);

// Keyboard interactions
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'p') {
    toggleParticles();
  } else if (key === 'r') {
    resetView();
  } else if (key === ' ') {
    e.preventDefault();
    toggleRotation();
  }
});

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  particleMaterial.uniforms.uPixelRatio.value = renderer.getPixelRatio();
});

// Animation loop
const clock = new THREE.Clock();
let frameCount = 0;

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();

  // Update particle pulse
  particleMaterial.uniforms.uTime.value = elapsed;

  // Rotate corset model
  if (corsetModel) {
    corsetModel.rotation.y += 0.01;
    window.__3D_STATE__.corsetRotationY = corsetModel.rotation.y;
  }

  // Update glow
  glowMaterial.uniforms.viewVector.value = camera.position;

  // Update controls
  controls.update();

  // Update state
  window.__3D_STATE__.cameraX = camera.position.x;
  window.__3D_STATE__.cameraY = camera.position.y;
  window.__3D_STATE__.cameraZ = camera.position.z;
  window.__3D_STATE__.frameCount = frameCount;
  window.__3D_STATE__.globeExists = scene.children.includes(globe);

  // Render
  renderer.render(scene, camera);

  frameCount++;
}

animate();
</script>
</body>
</html>
