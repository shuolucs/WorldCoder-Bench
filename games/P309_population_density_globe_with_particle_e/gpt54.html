<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Population Density Globe</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #title {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 24px;
      z-index: 10;
      pointer-events: none;
    }

    #statsPanel {
      position: absolute;
      top: 16px;
      right: 16px;
      color: white;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 10;
      min-width: 150px;
      line-height: 1.6;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    button {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="title">Population Density Globe</div>

  <div id="statsPanel">
    <div id="particleStat">Particles: 2000</div>
    <div id="rotateStat">Auto-Rotate: ON</div>
  </div>

  <div id="controls">
    <button id="btnToggleRotate">Toggle Rotation</button>
    <button id="btnToggleParticles">Toggle Particles</button>
    <button id="btnResetView">Reset View</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const globeGeometry = new THREE.SphereGeometry(1.5, 64, 64);
    const globeMaterial = new THREE.MeshBasicMaterial({
      color: 0x2244aa,
      transparent: true,
      opacity: 0.3,
      wireframe: true
    });
    const globe = new THREE.Mesh(globeGeometry, globeMaterial);
    scene.add(globe);

    let corsetMarker = null;
    let corsetLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      "Corset.glb",
      (gltf) => {
        corsetMarker = gltf.scene;
        corsetMarker.name = "corsetMarker";
        corsetMarker.scale.set(0.3, 0.3, 0.3);
        corsetMarker.position.set(1.5, 0, 0);
        scene.add(corsetMarker);
        corsetLoaded = true;
      },
      undefined,
      (error) => {
        console.warn("Failed to load Corset.glb:", error);
      }
    );

    const PARTICLE_COUNT = 2000;
    const particleGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const sizes = new Float32Array(PARTICLE_COUNT);

    const colorHigh = new THREE.Color(0xff3333);
    const colorMedium = new THREE.Color(0xffaa33);
    const colorLow = new THREE.Color(0x33ff66);

    const radius = 1.5;

    function sphericalToCartesian(r, phi, theta) {
      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.cos(phi);
      const z = r * Math.sin(phi) * Math.sin(theta);
      return new THREE.Vector3(x, y, z);
    }

    const clusterCenters = [
      { phi: Math.PI * 0.45, theta: Math.PI * 0.15 },
      { phi: Math.PI * 0.55, theta: Math.PI * 1.25 },
      { phi: Math.PI * 0.35, theta: Math.PI * 1.8 },
      { phi: Math.PI * 0.62, theta: Math.PI * 0.8 }
    ];

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      let phi, theta, color;

      const ratio = i / PARTICLE_COUNT;

      if (ratio < 0.3) {
        const center = clusterCenters[Math.floor(Math.random() * clusterCenters.length)];
        phi = center.phi + (Math.random() - 0.5) * 0.35;
        theta = center.theta + (Math.random() - 0.5) * 0.5;
        color = colorHigh;
      } else if (ratio < 0.7) {
        phi = Math.acos(2 * Math.random() - 1);
        theta = Math.random() * Math.PI * 2;
        color = colorMedium;
      } else {
        phi = Math.acos(2 * Math.random() - 1);
        theta = Math.random() * Math.PI * 2;
        color = colorLow;
      }

      phi = Math.max(0.001, Math.min(Math.PI - 0.001, phi));

      const pos = sphericalToCartesian(radius, phi, theta);
      positions[i * 3] = pos.x;
      positions[i * 3 + 1] = pos.y;
      positions[i * 3 + 2] = pos.z;

      colors[i * 3] = color.r;
      colors[i * 3 + 1] = color.g;
      colors[i * 3 + 2] = color.b;

      sizes[i] = 1 + Math.random() * 3;
    }

    particleGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    particleGeometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
    particleGeometry.setAttribute("size", new THREE.BufferAttribute(sizes, 1));

    const particleMaterial = new THREE.ShaderMaterial({
      transparent: true,
      vertexColors: true,
      depthWrite: false,
      uniforms: {
        uTime: { value: 0.0 },
        uBaseScale: { value: 1.0 }
      },
      vertexShader: `
        attribute float size;
        varying vec3 vColor;
        uniform float uTime;
        uniform float uBaseScale;
        void main() {
          vColor = color;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          float pulse = 1.0 + 0.2 * sin(uTime + position.x * 8.0 + position.y * 8.0 + position.z * 8.0);
          gl_PointSize = size * pulse * uBaseScale * 2.0;
          gl_PointSize *= (300.0 / -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        void main() {
          vec2 coord = gl_PointCoord - vec2(0.5);
          float d = length(coord);
          if (d > 0.5) discard;
          gl_FragColor = vec4(vColor, 1.0 - d * 1.5);
        }
      `
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const particleStat = document.getElementById("particleStat");
    const rotateStat = document.getElementById("rotateStat");
    const btnToggleRotate = document.getElementById("btnToggleRotate");
    const btnToggleParticles = document.getElementById("btnToggleParticles");
    const btnResetView = document.getElementById("btnResetView");

    function resetView() {
      camera.position.set(0, 2, 5);
      controls.target.set(0, 0, 0);
      controls.update();
    }

    function toggleRotation() {
      controls.autoRotate = !controls.autoRotate;
      rotateStat.textContent = `Auto-Rotate: ${controls.autoRotate ? "ON" : "OFF"}`;
    }

    function toggleParticles() {
      particles.visible = !particles.visible;
    }

    btnToggleRotate.addEventListener("click", toggleRotation);
    btnToggleParticles.addEventListener("click", toggleParticles);
    btnResetView.addEventListener("click", resetView);

    window.addEventListener("keydown", (e) => {
      if (e.code === "KeyP") {
        toggleParticles();
      } else if (e.code === "KeyR") {
        resetView();
      } else if (e.code === "Space") {
        e.preventDefault();
        toggleRotation();
      }
    });

    window.__3D_STATE__ = {
      particleCount: 2000,
      particlesVisible: true,
      autoRotate: true,
      cameraX: camera.position.x,
      cameraY: camera.position.y,
      cameraZ: camera.position.z,
      globeExists: true,
      corsetLoaded: false,
      corsetRotationY: 0,
      frameCount: 0
    };

    function updateState() {
      window.__3D_STATE__.particleCount = PARTICLE_COUNT;
      window.__3D_STATE__.particlesVisible = particles.visible;
      window.__3D_STATE__.autoRotate = controls.autoRotate;
      window.__3D_STATE__.cameraX = camera.position.x;
      window.__3D_STATE__.cameraY = camera.position.y;
      window.__3D_STATE__.cameraZ = camera.position.z;
      window.__3D_STATE__.globeExists = scene.children.includes(globe);
      window.__3D_STATE__.corsetLoaded = corsetLoaded;
      window.__3D_STATE__.corsetRotationY = corsetMarker ? corsetMarker.rotation.y : 0;
      window.__3D_STATE__.frameCount += 1;
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const time = clock.getElapsedTime();
      particleMaterial.uniforms.uTime.value = time;

      if (corsetMarker) {
        corsetMarker.rotation.y += 0.01;
      }

      controls.update();

      particleStat.textContent = `Particles: ${PARTICLE_COUNT}`;
      rotateStat.textContent = `Auto-Rotate: ${controls.autoRotate ? "ON" : "OFF"}`;

      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
