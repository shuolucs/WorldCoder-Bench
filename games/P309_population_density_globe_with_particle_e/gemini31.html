<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Population Density Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #statsPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 14px;
            pointer-events: none;
            line-height: 1.5;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }
        button {
            background: rgba(34, 68, 170, 0.7);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: rgba(51, 102, 255, 0.8);
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="title">Population Density Globe</div>
    <div id="statsPanel">Particles: 2000<br>Auto-Rotate: ON</div>
    <div id="controls">
        <button id="btnToggleRotate">Toggle Rotation</button>
        <button id="btnToggleParticles">Toggle Particles</button>
        <button id="btnResetView">Reset View</button>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Initialize State
        window.__3D_STATE__ = {
            particleCount: 2000,
            particlesVisible: true,
            autoRotate: true,
            cameraX: 0,
            cameraY: 2,
            cameraZ: 5,
            globeExists: false,
            corsetLoaded: false,
            corsetRotationY: 0,
            frameCount: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // Globe
        const globeGeometry = new THREE.SphereGeometry(1.5, 64, 64);
        const globeMaterial = new THREE.MeshBasicMaterial({
            color: 0x2244aa,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const globe = new THREE.Mesh(globeGeometry, globeMaterial);
        scene.add(globe);
        window.__3D_STATE__.globeExists = true;

        // 3D Asset - Corset Model
        let corsetModel = null;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/Corset/glTF-Binary/Corset.glb',
            (gltf) => {
                corsetModel = gltf.scene;
                corsetModel.name = 'corsetMarker';
                corsetModel.scale.set(0.3, 0.3, 0.3);
                corsetModel.position.set(1.5, 0, 0);
                scene.add(corsetModel);
                window.__3D_STATE__.corsetLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // Population Density Particles
        const particleCount = 2000;
        const rawPositions = [];
        
        // Generate points using Fibonacci sphere for even distribution
        for (let i = 0; i < particleCount; i++) {
            const phi = Math.acos(-1 + (2 * i) / particleCount);
            const theta = Math.sqrt(particleCount * Math.PI) * phi;
            const r = 1.505; // Slightly above globe surface
            rawPositions.push(new THREE.Vector3(
                r * Math.cos(theta) * Math.sin(phi),
                r * Math.sin(theta) * Math.sin(phi),
                r * Math.cos(phi)
            ));
        }

        // Create clusters
        const numClusters = 4;
        const clusterCenters = [];
        for(let i=0; i<numClusters; i++) {
            clusterCenters.push(rawPositions[Math.floor(Math.random() * particleCount)]);
        }

        // Calculate distance to nearest cluster center for each point
        const pointData = rawPositions.map((pos, index) => {
            let minDist = Infinity;
            clusterCenters.forEach(center => {
                const dist = pos.distanceTo(center);
                if (dist < minDist) minDist = dist;
            });
            return { pos, dist: minDist, index };
        });

        // Sort by distance to assign density tiers
        pointData.sort((a, b) => a.dist - b.dist);

        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);

        const colorHigh = new THREE.Color(0xff3333);
        const colorMed = new THREE.Color(0xffaa33);
        const colorLow = new THREE.Color(0x33ff66);

        pointData.forEach((data, i) => {
            const idx = data.index;
            positions[idx * 3] = data.pos.x;
            positions[idx * 3 + 1] = data.pos.y;
            positions[idx * 3 + 2] = data.pos.z;

            sizes[idx] = 1 + Math.random() * 3; // Size 1-4

            let c;
            if (i < particleCount * 0.3) {
                c = colorHigh; // 30% High
            } else if (i < particleCount * 0.7) {
                c = colorMed;  // 40% Medium
            } else {
                c = colorLow;  // 30% Low
            }

            colors[idx * 3] = c.r;
            colors[idx * 3 + 1] = c.g;
            colors[idx * 3 + 2] = c.b;
        });

        const particlesGeometry = new THREE.BufferGeometry();
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
        particlesGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // Custom Shader Material for pulsing and per-particle size/color
        const particlesMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0.0 }
            },
            vertexShader: `
                attribute float size;
                attribute vec3 customColor;
                varying vec3 vColor;
                uniform float time;
                void main() {
                    vColor = customColor;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    // Pulse effect based on time and position
                    float pulse = 1.0 + 0.4 * sin(time * 3.0 + position.x * 5.0 + position.y * 3.0);
                    gl_PointSize = size * pulse * (10.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    // Make particles circular
                    vec2 xy = gl_PointCoord.xy - vec2(0.5);
                    float ll = length(xy);
                    if(ll > 0.5) discard;
                    gl_FragColor = vec4(vColor, 0.8);
                }
            `,
            transparent: true,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particleSystem);

        // UI Interaction Logic
        const statsPanel = document.getElementById('statsPanel');

        function updateStatsUI() {
            statsPanel.innerHTML = `Particles: ${window.__3D_STATE__.particleCount}<br>Auto-Rotate: ${window.__3D_STATE__.autoRotate ? 'ON' : 'OFF'}`;
        }

        function toggleRotation() {
            controls.autoRotate = !controls.autoRotate;
            window.__3D_STATE__.autoRotate = controls.autoRotate;
            updateStatsUI();
        }

        function toggleParticles() {
            particleSystem.visible = !particleSystem.visible;
            window.__3D_STATE__.particlesVisible = particleSystem.visible;
        }

        function resetView() {
            camera.position.set(0, 2, 5);
            controls.target.set(0, 0, 0);
        }

        // Button Listeners
        document.getElementById('btnToggleRotate').addEventListener('click', toggleRotation);
        document.getElementById('btnToggleParticles').addEventListener('click', toggleParticles);
        document.getElementById('btnResetView').addEventListener('click', resetView);

        // Keyboard Listeners
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyP') toggleParticles();
            if (e.code === 'KeyR') resetView();
            if (e.code === 'Space') {
                e.preventDefault(); // Prevent scrolling
                toggleRotation();
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();

            // Update controls
            controls.update();

            // Animate particles
            particlesMaterial.uniforms.time.value = elapsedTime;

            // Animate corset
            if (corsetModel) {
                corsetModel.rotation.y += 0.01;
                window.__3D_STATE__.corsetRotationY = corsetModel.rotation.y;
            }

            // Update State
            window.__3D_STATE__.cameraX = camera.position.x;
            window.__3D_STATE__.cameraY = camera.position.y;
            window.__3D_STATE__.cameraZ = camera.position.z;
            window.__3D_STATE__.frameCount++;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
