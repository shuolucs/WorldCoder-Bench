<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunglasses Virtual Try-On - Three.js</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #debug-overlay {
      position: fixed;
      top: 12px;
      right: 12px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.65);
      color: #d7f9ff;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.45;
      border-radius: 8px;
      z-index: 20;
      white-space: pre-line;
      min-width: 230px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    #toolbar {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 12px;
      z-index: 20;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      flex-wrap: wrap;
      justify-content: center;
    }

    #toolbar button {
      background: #16213e;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    #toolbar button:hover {
      background: #0f3460;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background: rgba(0,0,0,0.25);
      z-index: 10;
      font-size: 18px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Corset.glb...</div>

  <div id="debug-overlay"></div>

  <div id="toolbar">
    <button id="btn-reset">Reset</button>
    <button id="btn-drop">Drop</button>
    <button id="btn-lens">Change Lens</button>
    <button id="btn-wireframe">Toggle Wireframe</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.5, 3);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 1.5;
    controls.target.set(0, 0.7, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(2, 3, 2);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 20;
    dirLight.shadow.camera.left = -5;
    dirLight.shadow.camera.right = 5;
    dirLight.shadow.camera.top = 5;
    dirLight.shadow.camera.bottom = -5;
    scene.add(dirLight);

    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x2b2d42,
      roughness: 0.9,
      metalness: 0.05
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1;
    ground.receiveShadow = true;
    scene.add(ground);

    let mannequin = null;
    let mannequinMeshes = [];

    const loadingEl = document.getElementById('loading');
    const debugOverlay = document.getElementById('debug-overlay');

    const lensColors = ['#333333', '#8B4513', '#006400', '#00008B'];
    let lensColorIndex = 0;

    const sunglassesGroup = new THREE.Group();
    scene.add(sunglassesGroup);

    const frameMaterial = new THREE.MeshStandardMaterial({
      color: 0x111111,
      metalness: 0.4,
      roughness: 0.5
    });

    const lensMaterial = new THREE.MeshStandardMaterial({
      color: new THREE.Color(lensColors[lensColorIndex]),
      transparent: true,
      opacity: 0.55,
      roughness: 0.2,
      metalness: 0.1,
      side: THREE.DoubleSide
    });

    const leftFrame = new THREE.Mesh(
      new THREE.TorusGeometry(0.16, 0.025, 16, 48),
      frameMaterial
    );
    leftFrame.rotation.x = Math.PI / 2;
    leftFrame.position.set(-0.21, 0, 0);

    const rightFrame = new THREE.Mesh(
      new THREE.TorusGeometry(0.16, 0.025, 16, 48),
      frameMaterial
    );
    rightFrame.rotation.x = Math.PI / 2;
    rightFrame.position.set(0.21, 0, 0);

    const leftLens = new THREE.Mesh(
      new THREE.CircleGeometry(0.14, 48),
      lensMaterial
    );
    leftLens.position.set(-0.21, 0, 0);
    leftLens.rotation.y = Math.PI;

    const rightLens = new THREE.Mesh(
      new THREE.CircleGeometry(0.14, 48),
      lensMaterial
    );
    rightLens.position.set(0.21, 0, 0);
    rightLens.rotation.y = Math.PI;

    const bridge = new THREE.Mesh(
      new THREE.CylinderGeometry(0.018, 0.018, 0.12, 16),
      frameMaterial
    );
    bridge.rotation.z = Math.PI / 2;
    bridge.position.set(0, 0, 0);

    const leftArm = new THREE.Mesh(
      new THREECylinderSafe(0.01, 0.01, 0.35, 10),
      frameMaterial
    );
    leftArm.rotation.z = Math.PI / 2;
    leftArm.rotation.y = 0.35;
    leftArm.position.set(-0.37, 0.03, -0.12);

    const rightArm = new THREE.Mesh(
      new THREECylinderSafe(0.01, 0.01, 0.35, 10),
      frameMaterial
    );
    rightArm.rotation.z = Math.PI / 2;
    rightArm.rotation.y = -0.35;
    rightArm.position.set(0.37, 0.03, -0.12);

    sunglassesGroup.add(leftFrame, rightFrame, leftLens, rightLens, bridge, leftArm, rightArm);
    sunglassesGroup.position.set(0, 1.8, 0);
    sunglassesGroup.castShadow = true;
    sunglassesGroup.traverse(obj => {
      if (obj.isMesh) {
        obj.castShadow = true;
        obj.receiveShadow = false;
      }
    });

    function new THREECylinderSafe(r1, r2, h, seg) {
      return new THREE.CylinderGeometry(
        Number.isFinite(r1) ? r1 : 0.01,
        Number.isFinite(r2) ? r2 : 0.01,
        Number.isFinite(h) ? h : 0.1,
        Number.isFinite(seg) ? seg : 8
      );
    }

    const loader = new GLTFLoader();
    loader.load(
      'Corset.glb',
      (gltf) => {
        mannequin = gltf.scene;

        const box = new THREE.Box3().setFromObject(mannequin);
        const center = box.getCenter(new THREE.Vector3());
        mannequin.position.sub(center);

        mannequin.scale.setScalar(2.0);

        const scaledBox = new THREE.Box3().setFromObject(mannequin);
        const minY = scaledBox.min.y;
        mannequin.position.y += (-1 - minY);

        mannequin.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
            mannequinMeshes.push(obj);
          }
        });

        scene.add(mannequin);
        loadingEl.style.display = 'none';
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Failed to load Corset.glb:', err);
        loadingEl.textContent = 'Failed to load Corset.glb';
      }
    );

    const physics = {
      gravity: 9.81,
      velocityY: 0,
      placed: false,
      droppedFromPlaced: false,
      bouncedOnce: false,
      physicsSteps: 0,
      groundContactCount: 0
    };

    const initialSunglassesPosition = new THREE.Vector3(0, 1.8, 0);
    const headSnapPosition = new THREE.Vector3(0, 0.8, 0.34);
    const groundY = -1;
    const sunglassesBottomOffset = 0.18;

    window.__3D_STATE__ = {
      modelLoaded: false,
      sunglassesY: sunglassesGroup.position.y,
      sunglassesPlaced: physics.placed,
      velocityY: physics.velocityY,
      physicsSteps: physics.physicsSteps,
      debugVisible: true,
      lensColorIndex: lensColorIndex,
      wireframeEnabled: false,
      groundContactCount: physics.groundContactCount,
      sceneObjectCount: scene.children.length
    };

    let debugVisible = true;
    let wireframeEnabled = false;

    function resetSunglasses() {
      sunglassesGroup.position.copy(initialSunglassesPosition);
      sunglassesGroup.rotation.set(0, 0, 0);
      physics.velocityY = 0;
      physics.placed = false;
      physics.droppedFromPlaced = false;
      physics.bouncedOnce = false;
    }

    function detachAndDrop() {
      if (!physics.placed) return;
      physics.placed = false;
      physics.droppedFromPlaced = true;
      physics.bouncedOnce = false;
      physics.velocityY = 0;
    }

    function cycleLensColor() {
      lensColorIndex = (lensColorIndex + 1) % lensColors.length;
      lensMaterial.color.set(lensColors[lensColorIndex]);
    }

    function toggleWireframe() {
      wireframeEnabled = !wireframeEnabled;
      mannequinMeshes.forEach(mesh => {
        if (mesh.material) {
          if (Array.isArray(mesh.material)) {
            mesh.material.forEach(mat => {
              if (mat) mat.wireframe = wireframeEnabled;
            });
          } else {
            mesh.material.wireframe = wireframeEnabled;
          }
        }
      });
    }

    document.getElementById('btn-reset').addEventListener('click', resetSunglasses);
    document.getElementById('btn-drop').addEventListener('click', detachAndDrop);
    document.getElementById('btn-lens').addEventListener('click', cycleLensColor);
    document.getElementById('btn-wireframe').addEventListener('click', toggleWireframe);

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'd') {
        debugVisible = !debugVisible;
        debugOverlay.style.display = debugVisible ? 'block' : 'none';
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let lastTime = performance.now();
    let fps = 0;

    function safeNumber(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function updatePhysics(delta) {
      delta = safeNumber(delta, 0.016);
      if (delta <= 0) delta = 0.016;
      if (delta > 0.05) delta = 0.05;

      if (!physics.placed) {
        physics.velocityY = safeNumber(physics.velocityY, 0);
        physics.velocityY -= physics.gravity * delta;
        sunglassesGroup.position.y += physics.velocityY * delta;

        if (!physics.droppedFromPlaced) {
          if (sunglassesGroup.position.y <= headSnapPosition.y) {
            sunglassesGroup.position.copy(headSnapPosition);
            physics.velocityY = 0;
            physics.placed = true;
          }
        } else {
          const minAllowedY = groundY + sunglassesBottomOffset;

          if (sunglassesGroup.position.y <= minAllowedY) {
            sunglassesGroup.position.y = minAllowedY;
            physics.groundContactCount += 1;

            if (!physics.bouncedOnce && Math.abs(physics.velocityY) > 0.01) {
              physics.velocityY = Math.abs(physics.velocityY) * 0.3;
              physics.bouncedOnce = true;
            } else {
              physics.velocityY = 0;
            }
          }

          if (physics.bouncedOnce && sunglassesGroup.position.y <= minAllowedY + 0.001 && Math.abs(physics.velocityY) < 0.05) {
            sunglassesGroup.position.y = minAllowedY;
            physics.velocityY = 0;
          }
        }
      } else {
        sunglassesGroup.position.copy(headSnapPosition);
        physics.velocityY = 0;
      }

      sunglassesGroup.position.y = safeNumber(sunglassesGroup.position.y, initialSunglassesPosition.y);
      physics.velocityY = safeNumber(physics.velocityY, 0);
    }

    function updateDebugOverlay() {
      const p = sunglassesGroup.position;
      debugOverlay.textContent =
`Sunglasses Position:
x: ${safeNumber(p.x).toFixed(3)}
y: ${safeNumber(p.y).toFixed(3)}
z: ${safeNumber(p.z).toFixed(3)}
velocity_y: ${safeNumber(physics.velocityY).toFixed(3)}
physics steps: ${physics.physicsSteps}
placed: ${physics.placed}
fps: ${safeNumber(fps).toFixed(1)}`;
    }

    function updateState() {
      window.__3D_STATE__.modelLoaded = !!mannequin;
      window.__3D_STATE__.sunglassesY = safeNumber(sunglassesGroup.position.y);
      window.__3D_STATE__.sunglassesPlaced = !!physics.placed;
      window.__3D_STATE__.velocityY = safeNumber(physics.velocityY);
      window.__3D_STATE__.physicsSteps = physics.physicsSteps;
      window.__3D_STATE__.debugVisible = debugVisible;
      window.__3D_STATE__.lensColorIndex = lensColorIndex;
      window.__3D_STATE__.wireframeEnabled = wireframeEnabled;
      window.__3D_STATE__.groundContactCount = physics.groundContactCount;
      window.__3D_STATE__.sceneObjectCount = scene.children.length;
    }

    function animate(now) {
      requestAnimationFrame(animate);

      const delta = (now - lastTime) / 1000;
      lastTime = now;
      fps = delta > 0 ? 1 / delta : 0;

      physics.physicsSteps += 1;
      updatePhysics(delta);
      controls.update();
      updateDebugOverlay();
      updateState();
      renderer.render(scene, camera);
    }

    resetSunglasses();
    debugOverlay.style.display = 'block';
    requestAnimationFrame((t) => {
      lastTime = t;
      animate(t);
    });
  </script>
</body>
</html>
