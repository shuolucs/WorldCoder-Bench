<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Water Wheel Physics Debug</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a2a3a;
      font-family: sans-serif;
    }

    canvas {
      display: block;
    }

    #debug-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      font-family: monospace;
      padding: 10px;
      z-index: 100;
      white-space: pre-line;
      min-width: 220px;
    }

    #toggle-debug {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 101;
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="debug-overlay"></div>
  <button id="toggle-debug">Toggle Debug</button>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a2a3a');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const loader = new GLTFLoader();
    let helmetLoaded = false;
    loader.load(
      '._DamagedHelmet.glb',
      (gltf) => {
        gltf.scene.position.set(5, 2, 0);
        gltf.scene.scale.set(1.5, 1.5, 1.5);
        scene.add(gltf.scene);
        helmetLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load ._DamagedHelmet.glb', err);
      }
    );

    const wheelGroup = new THREE.Group();
    scene.add(wheelGroup);

    const axleMaterial = new THREE.MeshStandardMaterial({ color: '#8B4513' });
    const bladeMaterial = new THREE.MeshStandardMaterial({ color: '#A0522D' });
    const ringMaterial = new THREE.MeshStandardMaterial({ color: '#A0522D' });

    const axle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.5, 0.5, 1.5, 32),
      axleMaterial
    );
    axle.rotation.x = Math.PI / 2;
    wheelGroup.add(axle);

    const bladeMeshes = [];
    const bladeLocalAngles = [];
    const bladeRadius = 2.5;
    const bladeCount = 8;

    for (let i = 0; i < bladeCount; i++) {
      const angle = (i / bladeCount) * Math.PI * 2;
      bladeLocalAngles.push(angle);

      const blade = new THREE.Mesh(
        new THREE.BoxGeometry(2.5, 0.8, 0.15),
        bladeMaterial
      );

      const radialDistance = 1.85;
      blade.position.set(
        Math.cos(angle) * radialDistance,
        Math.sin(angle) * radialDistance,
        0
      );
      blade.rotation.z = angle;
      wheelGroup.add(blade);
      bladeMeshes.push(blade);
    }

    const ringGeometry = new THREE.TorusGeometry(2.5, 0.08, 12, 64);
    const ring1 = new THREE.Mesh(ringGeometry, ringMaterial);
    ring1.position.z = 0.8;
    wheelGroup.add(ring1);

    const ring2 = new THREE.Mesh(ringGeometry, ringMaterial);
    ring2.position.z = -0.8;
    wheelGroup.add(ring2);

    const maxParticles = 300;
    const spawnPerFrame = 5;
    const particleSource = new THREE.Vector3(-6, 8, 0);
    const gravity = -9.8;
    const particleSize = 0.15;

    const positions = new Float32Array(maxParticles * 3);
    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const particleMaterial = new THREE.PointsMaterial({
      color: '#4FC3F7',
      size: particleSize,
      sizeAttenuation: true
    });

    const particlePoints = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particlePoints);

    const particles = [];
    for (let i = 0; i < maxParticles; i++) {
      particles.push({
        active: false,
        x: particleSource.x,
        y: particleSource.y,
        z: particleSource.z,
        vx: 3.0,
        vy: 0
      });
      positions[i * 3 + 0] = particleSource.x;
      positions[i * 3 + 1] = particleSource.y;
      positions[i * 3 + 2] = particleSource.z;
    }

    let wheelAngularVelocity = 0;
    let wheelRotation = 0;
    let totalCollisions = 0;
    let energyTransferred = 0;
    let flowEnabled = true;
    let frictionEnabled = true;
    let debugVisible = true;
    let simulationTime = 0;
    let fps = 0;
    let brakeApplied = false;

    const debugOverlay = document.getElementById('debug-overlay');
    const toggleDebugBtn = document.getElementById('toggle-debug');

    toggleDebugBtn.addEventListener('click', () => {
      debugVisible = !debugVisible;
      debugOverlay.style.display = debugVisible ? 'block' : 'none';
    });

    function resetParticle(p) {
      p.active = true;
      p.x = particleSource.x;
      p.y = particleSource.y;
      p.z = particleSource.z;
      p.vx = 3.0;
      p.vy = 0;
    }

    function recycleAllParticles() {
      for (let i = 0; i < maxParticles; i++) {
        resetParticle(particles[i]);
      }
    }

    function resetSimulation() {
      wheelAngularVelocity = 0;
      wheelRotation = 0;
      totalCollisions = 0;
      energyTransferred = 0;
      simulationTime = 0;
      recycleAllParticles();
    }

    function activeParticleCount() {
      let count = 0;
      for (let i = 0; i < maxParticles; i++) {
        if (particles[i].active) count++;
      }
      return count;
    }

    function spawnParticles() {
      if (!flowEnabled) return;
      let spawned = 0;
      for (let i = 0; i < maxParticles && spawned < spawnPerFrame; i++) {
        if (!particles[i].active) {
          resetParticle(particles[i]);
          spawned++;
        }
      }
    }

    function particleHitsPaddle(px, py) {
      const r = Math.sqrt(px * px + py * py);
      if (r < 2.0 || r > 3.0) return false;

      const worldAngle = Math.atan2(py, px);
      const localAngle = normalizeAngle(worldAngle - wheelRotation);
      const zoneWidth = 0.28;

      for (let i = 0; i < bladeLocalAngles.length; i++) {
        const d = smallestAngleDifference(localAngle, bladeLocalAngles[i]);
        if (Math.abs(d) < zoneWidth) return true;
      }
      return false;
    }

    function normalizeAngle(a) {
      while (a < -Math.PI) a += Math.PI * 2;
      while (a > Math.PI) a -= Math.PI * 2;
      return a;
    }

    function smallestAngleDifference(a, b) {
      return normalizeAngle(a - b);
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        flowEnabled = !flowEnabled;
        e.preventDefault();
      } else if (e.code === 'KeyR') {
        resetSimulation();
      } else if (e.code === 'KeyB') {
        wheelAngularVelocity = 0;
        brakeApplied = true;
      } else if (e.code === 'KeyF') {
        frictionEnabled = !frictionEnabled;
      }
    });

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(wheelGroup.children, true);
      if (intersects.length > 0) {
        wheelAngularVelocity += 0.5;
        wheelAngularVelocity = Math.min(wheelAngularVelocity, 2.0);
      }
    });

    window.__3D_STATE__ = {
      wheelAngularVelocity: 0,
      wheelRotation: 0,
      particleCount: 0,
      totalCollisions: 0,
      energyTransferred: 0,
      flowEnabled: true,
      frictionEnabled: true,
      debugVisible: true,
      simulationTime: 0,
      helmetLoaded: false,
      fps: 0,
      maxParticles: 300,
      brakeApplied: false
    };

    const clock = new THREE.Clock();
    let lastFpsUpdate = 0;
    let frameCounter = 0;

    function updateParticles(dt) {
      spawnParticles();

      for (let i = 0; i < maxParticles; i++) {
        const p = particles[i];
        if (!p.active) continue;

        p.vy += gravity * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;

        if (particleHitsPaddle(p.x, p.y)) {
          wheelAngularVelocity += 0.005;
          if (wheelAngularVelocity > 2.0) wheelAngularVelocity = 2.0;
          totalCollisions++;
          energyTransferred = totalCollisions * 0.005;
          resetParticle(p);
        } else if (p.y < -5) {
          resetParticle(p);
        }

        positions[i * 3 + 0] = p.x;
        positions[i * 3 + 1] = p.y;
        positions[i * 3 + 2] = p.z;
      }

      particleGeometry.attributes.position.needsUpdate = true;
    }

    function updateWheel(dt) {
      wheelRotation += wheelAngularVelocity * dt;
      wheelGroup.rotation.z = wheelRotation;

      if (frictionEnabled) {
        wheelAngularVelocity *= 0.998;
      }

      if (wheelAngularVelocity > 2.0) wheelAngularVelocity = 2.0;
    }

    function updateDebug() {
      const pCount = activeParticleCount();
      debugOverlay.textContent =
`Angular Velocity: ${wheelAngularVelocity.toFixed(3)} rad/s
Particle Count: ${pCount}
Total Collisions: ${totalCollisions}
FPS: ${fps.toFixed(1)}
Energy Transferred: ${energyTransferred.toFixed(3)}
Simulation Time: ${simulationTime.toFixed(2)} s`;
    }

    function updateState() {
      window.__3D_STATE__.wheelAngularVelocity = wheelAngularVelocity;
      window.__3D_STATE__.wheelRotation = wheelRotation;
      window.__3D_STATE__.particleCount = activeParticleCount();
      window.__3D_STATE__.totalCollisions = totalCollisions;
      window.__3D_STATE__.energyTransferred = energyTransferred;
      window.__3D_STATE__.flowEnabled = flowEnabled;
      window.__3D_STATE__.frictionEnabled = frictionEnabled;
      window.__3D_STATE__.debugVisible = debugVisible;
      window.__3D_STATE__.simulationTime = simulationTime;
      window.__3D_STATE__.helmetLoaded = helmetLoaded;
      window.__3D_STATE__.fps = fps;
      window.__3D_STATE__.maxParticles = maxParticles;
      window.__3D_STATE__.brakeApplied = brakeApplied;
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      simulationTime += dt;

      frameCounter++;
      lastFpsUpdate += dt;
      if (lastFpsUpdate >= 0.5) {
        fps = frameCounter / lastFpsUpdate;
        frameCounter = 0;
        lastFpsUpdate = 0;
      }

      updateParticles(dt);
      updateWheel(dt);
      updateDebug();
      updateState();

      renderer.render(scene, camera);

      brakeApplied = false;
    }

    resetSimulation();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
