<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Water Wheel Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a2a3a;
            font-family: monospace;
        }
        #debug-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            pointer-events: none;
            min-width: 250px;
        }
        #toggle-debug {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 101;
            padding: 8px 12px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
        }
        #toggle-debug:hover {
            background-color: #555;
        }
        .hidden {
            display: none !important;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="debug-overlay"></div>
    <button id="toggle-debug">Toggle Debug</button>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            wheelAngularVelocity: 0,
            wheelRotation: 0,
            particleCount: 0,
            totalCollisions: 0,
            energyTransferred: 0,
            flowEnabled: true,
            frictionEnabled: true,
            debugVisible: true,
            simulationTime: 0,
            helmetLoaded: false,
            fps: 0,
            maxParticles: 300,
            brakeApplied: false
        };

        const state = window.__3D_STATE__;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a2a3a');

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Water Wheel Construction
        const wheelGroup = new THREE.Group();

        // Axle
        const axleGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 32);
        axleGeo.rotateX(Math.PI / 2);
        const axleMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const axle = new THREE.Mesh(axleGeo, axleMat);
        wheelGroup.add(axle);

        // Paddles
        const paddleGeo = new THREE.BoxGeometry(2.5, 0.15, 0.8);
        const paddleMat = new THREE.MeshStandardMaterial({ color: 0xA0522D });
        for (let i = 0; i < 8; i++) {
            const paddle = new THREE.Mesh(paddleGeo, paddleMat);
            const angle = (i / 8) * Math.PI * 2;
            paddle.position.x = Math.cos(angle) * 1.25;
            paddle.position.y = Math.sin(angle) * 1.25;
            paddle.rotation.z = angle;
            wheelGroup.add(paddle);
        }

        // Rings
        const ringGeo = new THREE.TorusGeometry(2.5, 0.05, 16, 100);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const ring1 = new THREE.Mesh(ringGeo, ringMat);
        ring1.position.z = 0.4;
        const ring2 = new THREE.Mesh(ringGeo, ringMat);
        ring2.position.z = -0.4;
        wheelGroup.add(ring1);
        wheelGroup.add(ring2);

        scene.add(wheelGroup);

        // GLTF Model
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
            (gltf) => {
                const helmet = gltf.scene;
                helmet.position.set(5, 2, 0);
                helmet.scale.set(1.5, 1.5, 1.5);
                scene.add(helmet);
                state.helmetLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // Particle System
        const positions = new Float32Array(state.maxParticles * 3);
        const velocities = new Float32Array(state.maxParticles * 3);
        let activeParticles = 0;

        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x4FC3F7, size: 0.15 });
        const particleSystem = new THREE.Points(particleGeo, particleMat);
        scene.add(particleSystem);

        function spawnParticle() {
            if (activeParticles < state.maxParticles) {
                const idx = activeParticles * 3;
                positions[idx] = -6;
                positions[idx + 1] = 8;
                positions[idx + 2] = 0;
                velocities[idx] = 3.0;
                velocities[idx + 1] = 0;
                velocities[idx + 2] = 0;
                activeParticles++;
            }
        }

        function resetParticle(i) {
            const idx = i * 3;
            positions[idx] = -6;
            positions[idx + 1] = 8;
            positions[idx + 2] = 0;
            velocities[idx] = 3.0;
            velocities[idx + 1] = 0;
            velocities[idx + 2] = 0;
        }

        // Controls & Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            if (event.target.id === 'toggle-debug') return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(wheelGroup.children, true);
            if (intersects.length > 0) {
                state.wheelAngularVelocity += 0.5;
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === ' ') {
                state.flowEnabled = !state.flowEnabled;
            } else if (key === 'r') {
                state.wheelAngularVelocity = 0;
                state.totalCollisions = 0;
                state.energyTransferred = 0;
                for (let i = 0; i < activeParticles; i++) resetParticle(i);
            } else if (key === 'b') {
                state.wheelAngularVelocity = 0;
                state.brakeApplied = true;
            } else if (key === 'f') {
                state.frictionEnabled = !state.frictionEnabled;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const debugOverlay = document.getElementById('debug-overlay');
        document.getElementById('toggle-debug').addEventListener('click', () => {
            state.debugVisible = !state.debugVisible;
            debugOverlay.classList.toggle('hidden', !state.debugVisible);
        });

        // Animation Loop
        const clock = new THREE.Clock();
        let frames = 0;
        let lastFpsTime = 0;

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            const elapsedTime = clock.getElapsedTime();
            state.simulationTime += dt;

            // FPS Calculation
            frames++;
            if (elapsedTime - lastFpsTime >= 1) {
                state.fps = frames;
                frames = 0;
                lastFpsTime = elapsedTime;
            }

            // Particle Spawning
            if (state.flowEnabled) {
                let spawnedThisFrame = 0;
                while (spawnedThisFrame < 5 && activeParticles < state.maxParticles) {
                    spawnParticle();
                    spawnedThisFrame++;
                }
            }

            // Physics Update
            for (let i = 0; i < activeParticles; i++) {
                const idx = i * 3;
                
                velocities[idx + 1] -= 9.8 * dt; // Gravity
                
                positions[idx] += velocities[idx] * dt;
                positions[idx + 1] += velocities[idx + 1] * dt;
                positions[idx + 2] += velocities[idx + 2] * dt;

                const x = positions[idx];
                const y = positions[idx + 1];
                const z = positions[idx + 2];
                const r = Math.sqrt(x * x + y * y);

                // Collision Detection
                if (r >= 2.0 && r <= 3.0 && x < 0 && y > 0 && Math.abs(z) < 0.5) {
                    state.wheelAngularVelocity += 0.005;
                    state.totalCollisions++;
                    state.energyTransferred = state.totalCollisions * 0.005;
                    resetParticle(i);
                } else if (y < -5) {
                    resetParticle(i);
                }
            }

            particleGeo.attributes.position.needsUpdate = true;
            particleGeo.setDrawRange(0, activeParticles);
            state.particleCount = activeParticles;

            // Wheel Physics
            if (state.frictionEnabled) {
                state.wheelAngularVelocity *= 0.998;
            }
            state.wheelAngularVelocity = Math.min(state.wheelAngularVelocity, 2.0);
            state.wheelRotation += state.wheelAngularVelocity * dt;
            wheelGroup.rotation.z = state.wheelRotation;

            // Update Debug Overlay
            if (state.debugVisible) {
                debugOverlay.innerHTML = `
                    <strong>Physics Debug</strong><br>
                    FPS: ${state.fps}<br>
                    Time: ${state.simulationTime.toFixed(1)}s<br>
                    <hr style="border-color:#444">
                    Ang Vel: ${state.wheelAngularVelocity.toFixed(3)} rad/s<br>
                    Particles: ${state.particleCount} / ${state.maxParticles}<br>
                    Collisions: ${state.totalCollisions}<br>
                    Energy: ${state.energyTransferred.toFixed(3)}<br>
                    <hr style="border-color:#444">
                    Flow (Space): ${state.flowEnabled ? 'ON' : 'OFF'}<br>
                    Friction (F): ${state.frictionEnabled ? 'ON' : 'OFF'}<br>
                    Model Loaded: ${state.helmetLoaded ? 'Yes' : 'No'}
                `;
            }

            controls.update();
            renderer.render(scene, camera);

            // Reset transient state
            if (state.brakeApplied) state.brakeApplied = false;
        }

        animate();
    </script>
</body>
</html>
