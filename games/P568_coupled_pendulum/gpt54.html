<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coupled Pendulums - Three.js</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1a1a2e 0%, #0f0f23 100%);
      color: #fff;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 230px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
    }

    #energy-panel {
      position: absolute;
      top: 20px;
      right: 16px;
      width: 180px;
      height: 270px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 12px;
      padding: 10px 10px 14px 10px;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    .energy-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: 24px;
      height: 230px;
      gap: 6px;
    }

    .energy-track {
      width: 18px;
      height: 200px;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .energy-bar {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 0px;
      border-radius: 10px;
      transition: height 0.05s linear;
    }

    .energy-label {
      font-size: 10px;
      text-align: center;
      color: #ddd;
      width: 30px;
      word-break: break-word;
    }

    #bar-ke-a { background: #ff4444; }
    #bar-pe-a { background: #992222; }
    #bar-ke-b { background: #4444ff; }
    #bar-pe-b { background: #222299; }
    #bar-spring { background: #44ff44; }
    #bar-total { background: #ffffff; }

    #controls {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(760px, calc(100vw - 24px));
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 16px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    .control-row {
      display: grid;
      grid-template-columns: 170px 1fr 60px;
      gap: 10px;
      align-items: center;
      margin: 8px 0;
    }

    .control-row label {
      font-size: 14px;
      color: #eee;
    }

    .control-row input[type="range"] {
      width: 100%;
    }

    .control-value {
      text-align: right;
      color: #9fe;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    #help {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      color: #ddd;
      z-index: 10;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div id="hud-theta-a">Pendulum A angle: 0.0°</div>
    <div id="hud-theta-b">Pendulum B angle: 0.0°</div>
    <div id="hud-energy-a">Energy A: 0.00</div>
    <div id="hud-energy-b">Energy B: 0.00</div>
    <div id="hud-total-energy">Total Energy: 0.00</div>
    <div id="hud-sim-time">Time: 0.0 s</div>
  </div>

  <div id="energy-panel">
    <div class="energy-col">
      <div class="energy-track"><div class="energy-bar" id="bar-ke-a"></div></div>
      <div class="energy-label">KE A</div>
    </div>
    <div class="energy-col">
      <div class="energy-track"><div class="energy-bar" id="bar-pe-a"></div></div>
      <div class="energy-label">PE A</div>
    </div>
    <div class="energy-col">
      <div class="energy-track"><div class="energy-bar" id="bar-ke-b"></div></div>
      <div class="energy-label">KE B</div>
    </div>
    <div class="energy-col">
      <div class="energy-track"><div class="energy-bar" id="bar-pe-b"></div></div>
      <div class="energy-label">PE B</div>
    </div>
    <div class="energy-col">
      <div class="energy-track"><div class="energy-bar" id="bar-spring"></div></div>
      <div class="energy-label">Spring</div>
    </div>
    <div class="energy-col">
      <div class="energy-track"><div class="energy-bar" id="bar-total"></div></div>
      <div class="energy-label">Total</div>
    </div>
  </div>

  <div id="controls">
    <div class="control-row">
      <label for="slider-stiffness">Spring stiffness k</label>
      <input id="slider-stiffness" type="range" min="0.5" max="20" step="0.5" value="5" />
      <div class="control-value" id="value-stiffness">5.0</div>
    </div>
    <div class="control-row">
      <label for="slider-length-a">Pendulum A length L<sub>A</sub></label>
      <input id="slider-length-a" type="range" min="2" max="8" step="0.1" value="5" />
      <div class="control-value" id="value-length-a">5.0</div>
    </div>
    <div class="control-row">
      <label for="slider-length-b">Pendulum B length L<sub>B</sub></label>
      <input id="slider-length-b" type="range" min="2" max="8" step="0.1" value="5" />
      <div class="control-value" id="value-length-b">5.0</div>
    </div>
  </div>

  <div id="help">Space: pause/resume &nbsp; R: reset &nbsp; T: toggle trails</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // Scene
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x111122, 20, 40);

    // Camera
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 4, 0);

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const warmLight = new THREE.PointLight(0xffcc88, 1.2, 100);
    warmLight.position.set(8, 12, 8);
    scene.add(warmLight);

    const coolLight = new THREE.PointLight(0x88aaff, 1.0, 100);
    coolLight.position.set(-10, 6, 10);
    scene.add(coolLight);

    // Ground-ish visual reference
    const grid = new THREE.GridHelper(20, 20, 0x334455, 0x223344);
    grid.position.y = 0;
    grid.material.transparent = true;
    grid.material.opacity = 0.22;
    scene.add(grid);

    // Constants
    const g = 9.81;
    const mA = 1.0;
    const mB = 1.0;
    const springAttachFraction = 0.5;
    const springDamping = 0.01;
    const pivotA = new THREE.Vector3(-2, 8, 0);
    const pivotB = new THREE.Vector3( 2, 8, 0);
    const zAxis = new THREE.Vector3(0, 0, 1);

    // State
    const state = {
      thetaA: Math.PI / 6,
      thetaB: 0,
      omegaA: 0,
      omegaB: 0,
      lengthA: 5.0,
      lengthB: 5.0,
      k: 5.0,
      simTime: 0,
      isPaused: false,
      frameCount: 0,
      showTrails: true
    };

    function resetSimulation() {
      state.thetaA = Math.PI / 6;
      state.thetaB = 0;
      state.omegaA = 0;
      state.omegaB = 0;
      state.simTime = 0;
      clearTrails();
    }

    // Support bar
    const supportGeo = new THREE.CylinderGeometry(0.12, 0.12, 10, 24);
    const supportMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.5, roughness: 0.4 });
    const supportBar = new THREE.Mesh(supportGeo, supportMat);
    supportBar.rotation.z = Math.PI / 2;
    supportBar.position.set(0, 8, 0);
    scene.add(supportBar);

    // Pivot markers
    const pivotGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const pivotMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
    const pivotMarkerA = new THREE.Mesh(pivotGeo, pivotMat);
    pivotMarkerA.position.copy(pivotA);
    const pivotMarkerB = new THREE.Mesh(pivotGeo, pivotMat);
    pivotMarkerB.position.copy(pivotB);
    scene.add(pivotMarkerA, pivotMarkerB);

    // Pendulum visuals
    const rodGeo = new THREE.CylinderGeometry(0.06, 0.06, 1, 16);
    const bobGeo = new THREE.SphereGeometry(0.3, 24, 24);

    const matA = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.35, metalness: 0.15 });
    const matB = new THREE.MeshStandardMaterial({ color: 0x4444ff, roughness: 0.35, metalness: 0.15 });

    const rodA = new THREE.Mesh(rodGeo, matA);
    const bobA = new THREE.Mesh(bobGeo, matA);
    const rodB = new THREE.Mesh(rodGeo, matB);
    const bobB = new THREE.Mesh(bobGeo, matB);

    scene.add(rodA, bobA, rodB, bobB);

    // Trails
    const maxTrailPoints = 500;
    const trailPositionsA = [];
    const trailPositionsB = [];

    const trailGeoA = new THREE.BufferGeometry();
    const trailGeoB = new THREE.BufferGeometry();

    const trailMatA = new THREE.LineBasicMaterial({ color: 0xff8888, transparent: true, opacity: 0.65 });
    const trailMatB = new THREE.LineBasicMaterial({ color: 0x8888ff, transparent: true, opacity: 0.65 });

    const trailLineA = new THREE.Line(trailGeoA, trailMatA);
    const trailLineB = new THREE.Line(trailGeoB, trailMatB);

    scene.add(trailLineA, trailLineB);

    function clearTrails() {
      trailPositionsA.length = 0;
      trailPositionsB.length = 0;
      updateTrailGeometry(trailGeoA, trailPositionsA);
      updateTrailGeometry(trailGeoB, trailPositionsB);
    }

    function updateTrailGeometry(geometry, arr) {
      const flat = new Float32Array(arr.length * 3);
      for (let i = 0; i < arr.length; i++) {
        flat[i * 3] = arr[i].x;
        flat[i * 3 + 1] = arr[i].y;
        flat[i * 3 + 2] = arr[i].z;
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(flat, 3));
      geometry.computeBoundingSphere();
    }

    function pushTrail(arr, p) {
      arr.push(p.clone());
      if (arr.length > maxTrailPoints) arr.shift();
    }

    // Spring line
    const springSegments = 100;
    const springPoints = new Float32Array((springSegments + 1) * 3);
    const springGeo = new THREE.BufferGeometry();
    springGeo.setAttribute('position', new THREE.BufferAttribute(springPoints, 3));
    const springMat = new THREE.LineBasicMaterial({ color: 0x44ff44, linewidth: 2 });
    const springLine = new THREE.Line(springGeo, springMat);
    scene.add(springLine);

    function getBobPosition(theta, L, pivot) {
      return new THREE.Vector3(
        pivot.x + L * Math.sin(theta),
        pivot.y - L * Math.cos(theta),
        pivot.z
      );
    }

    function getAttachPosition(theta, L, pivot) {
      const a = L * springAttachFraction;
      return new THREE.Vector3(
        pivot.x + a * Math.sin(theta),
        pivot.y - a * Math.cos(theta),
        pivot.z
      );
    }

    function getPointVelocity(theta, omega, rLen) {
      // r = [rLen sinθ, -rLen cosθ, 0]
      // v = d/dt r = [rLen cosθ ω, rLen sinθ ω, 0]
      return new THREE.Vector3(
        rLen * Math.cos(theta) * omega,
        rLen * Math.sin(theta) * omega,
        0
      );
    }

    function springRestLength(LA, LB) {
      const p1 = getAttachPosition(0, LA, pivotA);
      const p2 = getAttachPosition(0, LB, pivotB);
      return p1.distanceTo(p2);
    }

    function computeDerivatives(s) {
      const { thetaA, thetaB, omegaA, omegaB, lengthA: LA, lengthB: LB, k } = s;

      const IA = mA * LA * LA;
      const IB = mB * LB * LB;

      const rAttachA = springAttachFraction * LA;
      const rAttachB = springAttachFraction * LB;

      const pA = getAttachPosition(thetaA, LA, pivotA);
      const pB = getAttachPosition(thetaB, LB, pivotB);
      const vA = getPointVelocity(thetaA, omegaA, rAttachA);
      const vB = getPointVelocity(thetaB, omegaB, rAttachB);

      const delta = new THREE.Vector3().subVectors(pB, pA);
      const dist = Math.max(delta.length(), 1e-8);
      const dir = delta.clone().divideScalar(dist);
      const L0 = springRestLength(LA, LB);
      const displacement = dist - L0;

      const relVel = new THREE.Vector3().subVectors(vB, vA);
      const relSpeedAlongSpring = relVel.dot(dir);

      // Force on A toward B if stretched
      const forceMag = k * displacement + springDamping * relSpeedAlongSpring;
      const forceOnA = dir.clone().multiplyScalar(forceMag);
      const forceOnB = forceOnA.clone().multiplyScalar(-1);

      const rA = new THREE.Vector3(
        rAttachA * Math.sin(thetaA),
        -rAttachA * Math.cos(thetaA),
        0
      );
      const rB = new THREE.Vector3(
        rAttachB * Math.sin(thetaB),
        -rAttachB * Math.cos(thetaB),
        0
      );

      const tauSpringA = rA.clone().cross(forceOnA).dot(zAxis);
      const tauSpringB = rB.clone().cross(forceOnB).dot(zAxis);

      const tauGravityA = -mA * g * LA * Math.sin(thetaA);
      const tauGravityB = -mB * g * LB * Math.sin(thetaB);

      const alphaA = (tauGravityA + tauSpringA) / IA;
      const alphaB = (tauGravityB + tauSpringB) / IB;

      return {
        dthetaA: omegaA,
        dthetaB: omegaB,
        domegaA: alphaA,
        domegaB: alphaB
      };
    }

    function rk4Step(dt) {
      const s = {
        thetaA: state.thetaA,
        thetaB: state.thetaB,
        omegaA: state.omegaA,
        omegaB: state.omegaB,
        lengthA: state.lengthA,
        lengthB: state.lengthB,
        k: state.k
      };

      const k1 = computeDerivatives(s);

      const s2 = {
        ...s,
        thetaA: s.thetaA + 0.5 * dt * k1.dthetaA,
        thetaB: s.thetaB + 0.5 * dt * k1.dthetaB,
        omegaA: s.omegaA + 0.5 * dt * k1.domegaA,
        omegaB: s.omegaB + 0.5 * dt * k1.domegaB
      };
      const k2 = computeDerivatives(s2);

      const s3 = {
        ...s,
        thetaA: s.thetaA + 0.5 * dt * k2.dthetaA,
        thetaB: s.thetaB + 0.5 * dt * k2.dthetaB,
        omegaA: s.omegaA + 0.5 * dt * k2.domegaA,
        omegaB: s.omegaB + 0.5 * dt * k2.domegaB
      };
      const k3 = computeDerivatives(s3);

      const s4 = {
        ...s,
        thetaA: s.thetaA + dt * k3.dthetaA,
        thetaB: s.thetaB + dt * k3.dthetaB,
        omegaA: s.omegaA + dt * k3.domegaA,
        omegaB: s.omegaB + dt * k3.domegaB
      };
      const k4 = computeDerivatives(s4);

      state.thetaA += (dt / 6) * (k1.dthetaA + 2 * k2.dthetaA + 2 * k3.dthetaA + k4.dthetaA);
      state.thetaB += (dt / 6) * (k1.dthetaB + 2 * k2.dthetaB + 2 * k3.dthetaB + k4.dthetaB);
      state.omegaA += (dt / 6) * (k1.domegaA + 2 * k2.domegaA + 2 * k3.domegaA + k4.domegaA);
      state.omegaB += (dt / 6) * (k1.domegaB + 2 * k2.domegaB + 2 * k3.domegaB + k4.domegaB);

      state.simTime += dt;
    }

    function setRodTransform(mesh, pivot, bobPos) {
      const dir = new THREE.Vector3().subVectors(bobPos, pivot);
      const len = dir.length();
      mesh.position.copy(pivot).addScaledVector(dir, 0.5);
      mesh.scale.set(1, len, 1);
      const up = new THREE.Vector3(0, 1, 0);
      mesh.quaternion.setFromUnitVectors(up, dir.clone().normalize());
    }

    function updateSpringGeometry(p1, p2, displacement) {
      const pos = springGeo.attributes.position.array;
      const delta = new THREE.Vector3().subVectors(p2, p1);
      const len = delta.length();
      const tangent = delta.clone().normalize();

      let normal = new THREE.Vector3(0, 0, 1).cross(tangent);
      if (normal.lengthSq() < 1e-6) normal = new THREE.Vector3(0, 1, 0).cross(tangent);
      normal.normalize();

      const binormal = new THREE.Vector3().crossVectors(tangent, normal).normalize();

      const amp = Math.min(0.18, 0.06 + 0.015 * len);
      const coils = 10;

      for (let i = 0; i <= springSegments; i++) {
        const t = i / springSegments;
        const base = p1.clone().lerp(p2, t);

        const envelope = Math.sin(Math.PI * t);
        const phase = t * coils * Math.PI * 2;
        const offset = normal.clone().multiplyScalar(Math.sin(phase) * amp * envelope)
          .add(binormal.clone().multiplyScalar(Math.cos(phase) * amp * 0.35 * envelope));

        const point = base.add(offset);
        pos[i * 3] = point.x;
        pos[i * 3 + 1] = point.y;
        pos[i * 3 + 2] = point.z;
      }

      springGeo.attributes.position.needsUpdate = true;
      springGeo.computeBoundingSphere();

      if (Math.abs(displacement) < 0.03) {
        springMat.color.set(0x44ff44);
      } else if (displacement > 0) {
        springMat.color.set(0xffff44);
      } else {
        springMat.color.set(0xffaa44);
      }
    }

    function computeEnergies() {
      const LA = state.lengthA;
      const LB = state.lengthB;

      const keA = 0.5 * mA * (LA * state.omegaA) * (LA * state.omegaA);
      const keB = 0.5 * mB * (LB * state.omegaB) * (LB * state.omegaB);

      const peA = -mA * g * LA * Math.cos(state.thetaA);
      const peB = -mB * g * LB * Math.cos(state.thetaB);

      const attachA = getAttachPosition(state.thetaA, LA, pivotA);
      const attachB = getAttachPosition(state.thetaB, LB, pivotB);
      const L0 = springRestLength(LA, LB);
      const currentLength = attachA.distanceTo(attachB);
      const displacement = currentLength - L0;
      const springPE = 0.5 * state.k * displacement * displacement;

      const energyA = keA + peA;
      const energyB = keB + peB;
      const totalEnergy = energyA + energyB + springPE;

      return { keA, keB, peA, peB, springPE, energyA, energyB, totalEnergy, displacement };
    }

    // UI
    const sliderStiffness = document.getElementById('slider-stiffness');
    const sliderLengthA = document.getElementById('slider-length-a');
    const sliderLengthB = document.getElementById('slider-length-b');

    const valueStiffness = document.getElementById('value-stiffness');
    const valueLengthA = document.getElementById('value-length-a');
    const valueLengthB = document.getElementById('value-length-b');

    function updateSliderLabels() {
      valueStiffness.textContent = Number(state.k).toFixed(1);
      valueLengthA.textContent = Number(state.lengthA).toFixed(1);
      valueLengthB.textContent = Number(state.lengthB).toFixed(1);
    }

    sliderStiffness.addEventListener('input', () => {
      state.k = parseFloat(sliderStiffness.value);
      updateSliderLabels();
    });

    sliderLengthA.addEventListener('input', () => {
      state.lengthA = parseFloat(sliderLengthA.value);
      updateSliderLabels();
    });

    sliderLengthB.addEventListener('input', () => {
      state.lengthB = parseFloat(sliderLengthB.value);
      updateSliderLabels();
    });

    updateSliderLabels();

    // HUD refs
    const hudThetaA = document.getElementById('hud-theta-a');
    const hudThetaB = document.getElementById('hud-theta-b');
    const hudEnergyA = document.getElementById('hud-energy-a');
    const hudEnergyB = document.getElementById('hud-energy-b');
    const hudTotalEnergy = document.getElementById('hud-total-energy');
    const hudSimTime = document.getElementById('hud-sim-time');

    const energyBars = {
      keA: document.getElementById('bar-ke-a'),
      peA: document.getElementById('bar-pe-a'),
      keB: document.getElementById('bar-ke-b'),
      peB: document.getElementById('bar-pe-b'),
      spring: document.getElementById('bar-spring'),
      total: document.getElementById('bar-total')
    };

    function setBarHeight(el, value, maxValue) {
      const clamped = Math.max(0, value);
      const h = maxValue > 1e-8 ? Math.min(200, (clamped / maxValue) * 200) : 0;
      el.style.height = `${h}px`;
    }

    function updateHUDAndBars(energies, bobPosA, bobPosB) {
      hudThetaA.textContent = `Pendulum A angle: ${(state.thetaA * 180 / Math.PI).toFixed(1)}°`;
      hudThetaB.textContent = `Pendulum B angle: ${(state.thetaB * 180 / Math.PI).toFixed(1)}°`;
      hudEnergyA.textContent = `Energy A: ${energies.energyA.toFixed(2)}`;
      hudEnergyB.textContent = `Energy B: ${energies.energyB.toFixed(2)}`;
      hudTotalEnergy.textContent = `Total Energy: ${energies.totalEnergy.toFixed(2)}`;
      hudSimTime.textContent = `Time: ${state.simTime.toFixed(1)} s`;

      // Shift potential bars so they remain visual and positive-height.
      const peAVis = energies.peA - (-mA * g * state.lengthA);
      const peBVis = energies.peB - (-mB * g * state.lengthB);
      const totalVis = Math.abs(energies.totalEnergy);

      const scaleMax = Math.max(
        1,
        totalVis,
        energies.keA,
        energies.keB,
        peAVis,
        peBVis,
        energies.springPE
      );

      setBarHeight(energyBars.keA, energies.keA, scaleMax);
      setBarHeight(energyBars.peA, peAVis, scaleMax);
      setBarHeight(energyBars.keB, energies.keB, scaleMax);
      setBarHeight(energyBars.peB, peBVis, scaleMax);
      setBarHeight(energyBars.spring, energies.springPE, scaleMax);
      setBarHeight(energyBars.total, totalVis, scaleMax);

      window.__3D_STATE__ = {
        frameCount: state.frameCount,
        thetaA: state.thetaA,
        thetaB: state.thetaB,
        omegaA: state.omegaA,
        omegaB: state.omegaB,
        energyA: energies.energyA,
        energyB: energies.energyB,
        springEnergy: energies.springPE,
        totalEnergy: energies.totalEnergy,
        springStiffness: state.k,
        lengthA: state.lengthA,
        lengthB: state.lengthB,
        bobAPos: { x: bobPosA.x, y: bobPosA.y, z: bobPosA.z },
        bobBPos: { x: bobPosB.x, y: bobPosB.y, z: bobPosB.z },
        isPaused: state.isPaused,
        simTime: state.simTime
      };
    }

    // Keyboard
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        state.isPaused = !state.isPaused;
      } else if (e.key === 'r' || e.key === 'R') {
        resetSimulation();
      } else if (e.key === 't' || e.key === 'T') {
        state.showTrails = !state.showTrails;
        trailLineA.visible = state.showTrails;
        trailLineB.visible = state.showTrails;
      }
    });

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    let accumulator = 0;
    const fixedDt = 0.002;
    const maxFrameTime = 0.03;

    function animate() {
      requestAnimationFrame(animate);
      state.frameCount++;

      const delta = Math.min(clock.getDelta(), maxFrameTime);
      if (!state.isPaused) {
        accumulator += delta;
        const maxSteps = 10;
        let steps = 0;
        while (accumulator >= fixedDt && steps < maxSteps) {
          rk4Step(fixedDt);
          accumulator -= fixedDt;
          steps++;
        }
      }

      const bobPosA = getBobPosition(state.thetaA, state.lengthA, pivotA);
      const bobPosB = getBobPosition(state.thetaB, state.lengthB, pivotB);
      const attachPosA = getAttachPosition(state.thetaA, state.lengthA, pivotA);
      const attachPosB = getAttachPosition(state.thetaB, state.lengthB, pivotB);

      bobA.position.copy(bobPosA);
      bobB.position.copy(bobPosB);

      setRodTransform(rodA, pivotA, bobPosA);
      setRodTransform(rodB, pivotB, bobPosB);

      const L0 = springRestLength(state.lengthA, state.lengthB);
      const displacement = attachPosA.distanceTo(attachPosB) - L0;
      updateSpringGeometry(attachPosA, attachPosB, displacement);

      if (state.showTrails && !state.isPaused) {
        pushTrail(trailPositionsA, bobPosA);
        pushTrail(trailPositionsB, bobPosB);
        updateTrailGeometry(trailGeoA, trailPositionsA);
        updateTrailGeometry(trailGeoB, trailPositionsB);
      }

      const energies = computeEnergies();
      updateHUDAndBars(energies, bobPosA, bobPosB);

      controls.update();
      renderer.render(scene, camera);
    }

    resetSimulation();
    animate();
  </script>
</body>
</html>
