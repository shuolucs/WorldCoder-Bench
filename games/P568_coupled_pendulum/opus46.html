<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupled Pendulums - Beat Frequency Demonstration</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f23; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(10, 10, 30, 0.85);
    color: #ddd;
    padding: 15px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.8;
    border: 1px solid rgba(100, 100, 200, 0.3);
    min-width: 220px;
    backdrop-filter: blur(5px);
}
#hud .label { color: #888; }
#hud .val-a { color: #FF6666; font-weight: bold; }
#hud .val-b { color: #6666FF; font-weight: bold; }
#hud .val-total { color: #fff; font-weight: bold; }
#hud h3 { color: #aab; margin-bottom: 5px; font-size: 14px; border-bottom: 1px solid rgba(100,100,200,0.3); padding-bottom: 5px; }

#energy-panel {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(10, 10, 30, 0.85);
    color: #ddd;
    padding: 15px;
    border-radius: 10px;
    font-size: 11px;
    border: 1px solid rgba(100, 100, 200, 0.3);
    backdrop-filter: blur(5px);
    display: flex;
    gap: 8px;
    align-items: flex-end;
}
.energy-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}
.energy-bar-container {
    width: 28px;
    height: 200px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
}
.energy-bar {
    position: absolute;
    bottom: 0;
    width: 100%;
    border-radius: 3px;
    transition: height 0.05s linear;
}
#bar-ke-a { background: linear-gradient(to top, #FF4444, #FF6666); }
#bar-pe-a { background: linear-gradient(to top, #991111, #CC2222); }
#bar-ke-b { background: linear-gradient(to top, #4444FF, #6666FF); }
#bar-pe-b { background: linear-gradient(to top, #111199, #2222CC); }
#bar-spring { background: linear-gradient(to top, #22AA22, #44FF44); }
#bar-total { background: linear-gradient(to top, #aaa, #fff); }
.energy-label { font-size: 9px; text-align: center; color: #999; max-width: 35px; }

#controls {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.85);
    color: #ddd;
    padding: 15px 25px;
    border-radius: 10px;
    font-size: 13px;
    border: 1px solid rgba(100, 100, 200, 0.3);
    backdrop-filter: blur(5px);
    display: flex;
    gap: 30px;
    align-items: center;
}
.control-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
}
.control-group label {
    font-size: 11px;
    color: #999;
}
.control-group input[type="range"] {
    width: 150px;
    accent-color: #6666FF;
}
.control-group .val-display {
    font-size: 12px;
    color: #ccc;
    text-align: center;
}

#instructions {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    text-align: center;
}
</style>
</head>
<body>

<div id="hud">
    <h3>⚛ Coupled Pendulums</h3>
    <div><span class="label">θ_A: </span><span class="val-a" id="hud-theta-a">30.0°</span></div>
    <div><span class="label">θ_B: </span><span class="val-b" id="hud-theta-b">0.0°</span></div>
    <div><span class="label">Energy A: </span><span class="val-a" id="hud-energy-a">0.00</span> J</div>
    <div><span class="label">Energy B: </span><span class="val-b" id="hud-energy-b">0.00</span> J</div>
    <div><span class="label">Total E: </span><span class="val-total" id="hud-total-energy">0.00</span> J</div>
    <div><span class="label">Time: </span><span class="val-total" id="hud-sim-time">0.0</span> s</div>
</div>

<div id="energy-panel">
    <div class="energy-col">
        <div class="energy-bar-container"><div class="energy-bar" id="bar-ke-a"></div></div>
        <div class="energy-label">KE A</div>
    </div>
    <div class="energy-col">
        <div class="energy-bar-container"><div class="energy-bar" id="bar-pe-a"></div></div>
        <div class="energy-label">PE A</div>
    </div>
    <div class="energy-col">
        <div class="energy-bar-container"><div class="energy-bar" id="bar-ke-b"></div></div>
        <div class="energy-label">KE B</div>
    </div>
    <div class="energy-col">
        <div class="energy-bar-container"><div class="energy-bar" id="bar-pe-b"></div></div>
        <div class="energy-label">PE B</div>
    </div>
    <div class="energy-col">
        <div class="energy-bar-container"><div class="energy-bar" id="bar-spring"></div></div>
        <div class="energy-label">Spring</div>
    </div>
    <div class="energy-col">
        <div class="energy-bar-container"><div class="energy-bar" id="bar-total"></div></div>
        <div class="energy-label">Total</div>
    </div>
</div>

<div id="controls">
    <div class="control-group">
        <label>Spring Stiffness (k)</label>
        <input type="range" id="slider-stiffness" min="0.5" max="20" step="0.5" value="5">
        <div class="val-display" id="val-stiffness">5.0 N/m</div>
    </div>
    <div class="control-group">
        <label>Pendulum A Length</label>
        <input type="range" id="slider-length-a" min="2" max="8" step="0.1" value="5">
        <div class="val-display" id="val-length-a">5.0 m</div>
    </div>
    <div class="control-group">
        <label>Pendulum B Length</label>
        <input type="range" id="slider-length-b" min="2" max="8" step="0.1" value="5">
        <div class="val-display" id="val-length-b">5.0 m</div>
    </div>
</div>

<div id="instructions">Space: Pause/Resume | R: Reset | T: Toggle Trails</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2; canvas2d.height = 512;
const ctx2d = canvas2d.getContext('2d');
const grad = ctx2d.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0, '#1a1a2e');
grad.addColorStop(1, '#0f0f23');
ctx2d.fillStyle = grad;
ctx2d.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.PointLight(0xffaa44, 1.0, 50);
warmLight.position.set(8, 12, 5);
warmLight.castShadow = true;
scene.add(warmLight);

const coolLight = new THREE.PointLight(0x4488ff, 0.8, 50);
coolLight.position.set(-8, 10, -5);
scene.add(coolLight);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x111133);
gridHelper.position.y = -2;
scene.add(gridHelper);

// ============ SUPPORT BAR ============
const barGeom = new THREE.CylinderGeometry(0.08, 0.08, 10, 16);
const barMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6, roughness: 0.3 });
const supportBar = new THREE.Mesh(barGeom, barMat);
supportBar.rotation.z = Math.PI / 2;
supportBar.position.set(0, 8, 0);
scene.add(supportBar);

// Support brackets
const bracketGeom = new THREE.CylinderGeometry(0.05, 0.05, 1.5, 8);
const bracketMatA = new THREE.MeshStandardMaterial({ color: 0x666666 });
const bracketA = new THREE.Mesh(bracketGeom, bracketMatA);
bracketA.position.set(-2, 8.75, 0);
scene.add(bracketA);
const bracketB = new THREE.Mesh(bracketGeom, bracketMatA.clone());
bracketB.position.set(2, 8.75, 0);
scene.add(bracketB);

// ============ PENDULUM VISUALS ============
// Pendulum A (red)
const rodMatA = new THREE.MeshStandardMaterial({ color: 0xFF4444, metalness: 0.3, roughness: 0.5 });
const rodGeomA = new THREE.CylinderGeometry(0.04, 0.04, 1, 8);
const rodA = new THREE.Mesh(rodGeomA, rodMatA);
scene.add(rodA);

const bobGeomA = new THREE.SphereGeometry(0.3, 32, 32);
const bobMatA = new THREE.MeshStandardMaterial({ color: 0xFF4444, metalness: 0.4, roughness: 0.3 });
const bobA = new THREE.Mesh(bobGeomA, bobMatA);
bobA.castShadow = true;
scene.add(bobA);

// Pendulum B (blue)
const rodMatB = new THREE.MeshStandardMaterial({ color: 0x4444FF, metalness: 0.3, roughness: 0.5 });
const rodGeomB = new THREE.CylinderGeometry(0.04, 0.04, 1, 8);
const rodB = new THREE.Mesh(rodGeomB, rodMatB);
scene.add(rodB);

const bobGeomB = new THREE.SphereGeometry(0.3, 32, 32);
const bobMatB = new THREE.MeshStandardMaterial({ color: 0x4444FF, metalness: 0.4, roughness: 0.3 });
const bobB = new THREE.Mesh(bobGeomB, bobMatB);
bobB.castShadow = true;
scene.add(bobB);

// Spring attachment markers
const markerGeom = new THREE.SphereGeometry(0.06, 8, 8);
const markerMatA = new THREE.MeshBasicMaterial({ color: 0xFFAAAA });
const markerA = new THREE.Mesh(markerGeom, markerMatA);
scene.add(markerA);
const markerMatB = new THREE.MeshBasicMaterial({ color: 0xAAAAFF });
const markerB = new THREE.Mesh(markerGeom, markerMatB);
scene.add(markerB);

// ============ SPRING VISUAL ============
const springCoils = 20;
const springPointCount = springCoils * 12 + 1;
const springPositions = new Float32Array(springPointCount * 3);
const springGeometry = new THREE.BufferGeometry();
springGeometry.setAttribute('position', new THREE.BufferAttribute(springPositions, 3));
const springMaterial = new THREE.LineBasicMaterial({ color: 0x44FF44, linewidth: 2 });
const springLine = new THREE.Line(springGeometry, springMaterial);
scene.add(springLine);

// ============ TRAILS ============
const TRAIL_LENGTH = 500;
const trailPositionsA = new Float32Array(TRAIL_LENGTH * 3);
const trailPositionsB = new Float32Array(TRAIL_LENGTH * 3);
const trailColorsA = new Float32Array(TRAIL_LENGTH * 3);
const trailColorsB = new Float32Array(TRAIL_LENGTH * 3);

const trailGeomA = new THREE.BufferGeometry();
trailGeomA.setAttribute('position', new THREE.BufferAttribute(trailPositionsA, 3));
trailGeomA.setAttribute('color', new THREE.BufferAttribute(trailColorsA, 3));
const trailMatA = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true });
const trailLineA = new THREE.Line(trailGeomA, trailMatA);
scene.add(trailLineA);

const trailGeomB = new THREE.BufferGeometry();
trailGeomB.setAttribute('position', new THREE.BufferAttribute(trailPositionsB, 3));
trailGeomB.setAttribute('color', new THREE.BufferAttribute(trailColorsB, 3));
const trailMatB = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true });
const trailLineB = new THREE.Line(trailGeomB, trailMatB);
scene.add(trailLineB);

let trailIndex = 0;
let trailCount = 0;
let trailVisible = true;

function initTrails() {
    for (let i = 0; i < TRAIL_LENGTH; i++) {
        trailPositionsA[i * 3] = 0;
        trailPositionsA[i * 3 + 1] = 0;
        trailPositionsA[i * 3 + 2] = 0;
        trailPositionsB[i * 3] = 0;
        trailPositionsB[i * 3 + 1] = 0;
        trailPositionsB[i * 3 + 2] = 0;
    }
    trailIndex = 0;
    trailCount = 0;
}
initTrails();

function updateTrails(posA, posB) {
    trailPositionsA[trailIndex * 3] = posA.x;
    trailPositionsA[trailIndex * 3 + 1] = posA.y;
    trailPositionsA[trailIndex * 3 + 2] = posA.z;

    trailPositionsB[trailIndex * 3] = posB.x;
    trailPositionsB[trailIndex * 3 + 1] = posB.y;
    trailPositionsB[trailIndex * 3 + 2] = posB.z;

    trailIndex = (trailIndex + 1) % TRAIL_LENGTH;
    if (trailCount < TRAIL_LENGTH) trailCount++;

    // Update colors for fading
    for (let i = 0; i < TRAIL_LENGTH; i++) {
        let age;
        if (trailCount < TRAIL_LENGTH) {
            if (i < trailCount) {
                age = (i) / trailCount;
            } else {
                age = 0;
            }
        } else {
            let relIdx = (i - trailIndex + TRAIL_LENGTH) % TRAIL_LENGTH;
            age = relIdx / TRAIL_LENGTH;
        }
        trailColorsA[i * 3] = 1.0 * age;
        trailColorsA[i * 3 + 1] = 0.27 * age;
        trailColorsA[i * 3 + 2] = 0.27 * age;

        trailColorsB[i * 3] = 0.27 * age;
        trailColorsB[i * 3 + 1] = 0.27 * age;
        trailColorsB[i * 3 + 2] = 1.0 * age;
    }

    trailGeomA.attributes.position.needsUpdate = true;
    trailGeomA.attributes.color.needsUpdate = true;
    trailGeomB.attributes.position.needsUpdate = true;
    trailGeomB.attributes.color.needsUpdate = true;

    if (trailCount < TRAIL_LENGTH) {
        trailGeomA.setDrawRange(0, trailCount);
        trailGeomB.setDrawRange(0, trailCount);
    } else {
        trailGeomA.setDrawRange(0, TRAIL_LENGTH);
        trailGeomB.setDrawRange(0, TRAIL_LENGTH);
    }
}

// ============ PHYSICS STATE ============
const g = 9.81;
const springFraction = 0.5;
const damping = 0.01;

let pivotA = new THREE.Vector3(-2, 8, 0);
let pivotB = new THREE.Vector3(2, 8, 0);

let state = {
    thetaA: Math.PI / 6,
    thetaB: 0,
    omegaA: 0,
    omegaB: 0
};

let params = {
    k: 5.0,
    LA: 5.0,
    LB: 5.0,
    mA: 1.0,
    mB: 1.0
};

let isPaused = false;
let simTime = 0;
let frameCount = 0;

function getRestLength() {
    const attachA = new THREE.Vector3(
        pivotA.x + params.LA * springFraction * Math.sin(0),
        pivotA.y - params.LA * springFraction * Math.cos(0),
        0
    );
    const attachB = new THREE.Vector3(
        pivotB.x + params.LB * springFraction * Math.sin(0),
        pivotB.y - params.LB * springFraction * Math.cos(0),
        0
    );
    return attachA.distanceTo(attachB);
}

let restLength = getRestLength();

function getAttachmentPoints(tA, tB) {
    const rA = params.LA * springFraction;
    const rB = params.LB * springFraction;
    const pA = new THREE.Vector3(
        pivotA.x + rA * Math.sin(tA),
        pivotA.y - rA * Math.cos(tA),
        0
    );
    const pB = new THREE.Vector3(
        pivotB.x + rB * Math.sin(tB),
        pivotB.y - rB * Math.cos(tB),
        0
    );
    return { pA, pB };
}

function getBobPositions(tA, tB) {
    return {
        bobA: new THREE.Vector3(
            pivotA.x + params.LA * Math.sin(tA),
            pivotA.y - params.LA * Math.cos(tA),
            0
        ),
        bobB: new THREE.Vector3(
            pivotB.x + params.LB * Math.sin(tB),
            pivotB.y - params.LB * Math.cos(tB),
            0
        )
    };
}

function computeDerivatives(tA, oA, tB, oB) {
    const rA = params.LA * springFraction;
    const rB = params.LB * springFraction;

    // Attachment points
    const pAx = pivotA.x + rA * Math.sin(tA);
    const pAy = pivotA.y - rA * Math.cos(tA);
    const pBx = pivotB.x + rB * Math.sin(tB);
    const pBy = pivotB.y - rB * Math.cos(tB);

    const dx = pBx - pAx;
    const dy = pBy - pAy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const displacement = dist - restLength;

    // Spring force magnitude (positive = tension)
    const Fs = params.k * displacement;

    // Unit vector from A attachment to B attachment
    let ux = 0, uy = 0;
    if (dist > 1e-10) {
        ux = dx / dist;
        uy = dy / dist;
    }

    // Force on A attachment point (toward B if stretched)
    const FxA = Fs * ux;
    const FyA = Fs * uy;

    // Force on B attachment point (toward A if stretched)
    const FxB = -Fs * ux;
    const FyB = -Fs * uy;

    // Torque on pendulum A from spring
    // Arm from pivot A to attachment A: (rA*sin(tA), -rA*cos(tA))
    // Torque = r x F (z-component) = rx*Fy - ry*Fx
    const armAx = rA * Math.sin(tA);
    const armAy = -rA * Math.cos(tA);
    const tauSpringA = armAx * FyA - armAy * FxA;

    // Torque on pendulum B from spring
    const armBx = rB * Math.sin(tB);
    const armBy = -rB * Math.cos(tB);
    const tauSpringB = armBx * FyB - armBy * FxB;

    // Moments of inertia
    const IA = params.mA * params.LA * params.LA;
    const IB = params.mB * params.LB * params.LB;

    // Gravity torque
    const tauGravA = -params.mA * g * params.LA * Math.sin(tA);
    const tauGravB = -params.mB * g * params.LB * Math.sin(tB);

    // Damping torque
    const tauDampA = -damping * oA;
    const tauDampB = -damping * oB;

    const alphaA = (tauGravA + tauSpringA + tauDampA) / IA;
    const alphaB = (tauGravB + tauSpringB + tauDampB) / IB;

    return { dthetaA: oA, domegaA: alphaA, dthetaB: oB, domegaB: alphaB };
}

function rk4Step(dt) {
    const { thetaA: tA, omegaA: oA, thetaB: tB, omegaB: oB } = state;

    const k1 = computeDerivatives(tA, oA, tB, oB);

    const k2 = computeDerivatives(
        tA + 0.5 * dt * k1.dthetaA, oA + 0.5 * dt * k1.domegaA,
        tB + 0.5 * dt * k1.dthetaB, oB + 0.5 * dt * k1.domegaB
    );

    const k3 = computeDerivatives(
        tA + 0.5 * dt * k2.dthetaA, oA + 0.5 * dt * k2.domegaA,
        tB + 0.5 * dt * k2.dthetaB, oB + 0.5 * dt * k2.domegaB
    );

    const k4 = computeDerivatives(
        tA + dt * k3.dthetaA, oA + dt * k3.domegaA,
        tB + dt * k3.dthetaB, oB + dt * k3.domegaB
    );

    state.thetaA += (dt / 6) * (k1.dthetaA + 2 * k2.dthetaA + 2 * k3.dthetaA + k4.dthetaA);
    state.omegaA += (dt / 6) * (k1.domegaA + 2 * k2.domegaA + 2 * k3.domegaA + k4.domegaA);
    state.thetaB += (dt / 6) * (k1.dthetaB + 2 * k2.dthetaB + 2 * k3.dthetaB + k4.dthetaB);
    state.omegaB += (dt / 6) * (k1.domegaB + 2 * k2.domegaB + 2 * k3.domegaB + k4.domegaB);
}

// ============ ENERGY CALCULATIONS ============
function computeEnergies() {
    const { thetaA, omegaA, thetaB, omegaB } = state;

    const keA = 0.5 * params.mA * Math.pow(params.LA * omegaA, 2);
    const peA = -params.mA * g * params.LA * Math.cos(thetaA);

    const keB = 0.5 * params.mB * Math.pow(params.LB * omegaB, 2);
    const peB = -params.mB * g * params.LB * Math.cos(thetaB);

    const { pA, pB } = getAttachmentPoints(thetaA, thetaB);
    const dist = pA.distanceTo(pB);
    const displacement = dist - restLength;
    const springPE = 0.5 * params.k * displacement * displacement;

    return { keA, peA, keB, peB, springPE };
}

// ============ UI ELEMENTS ============
const sliderStiffness = document.getElementById('slider-stiffness');
const sliderLengthA = document.getElementById('slider-length-a');
const sliderLengthB = document.getElementById('slider-length-b');
const valStiffness = document.getElementById('val-stiffness');
const valLengthA = document.getElementById('val-length-a');
const valLengthB = document.getElementById('val-length-b');

sliderStiffness.addEventListener('input', () => {
    params.k = parseFloat(sliderStiffness.value);
    valStiffness.textContent = params.k.toFixed(1) + ' N/m';
});

sliderLengthA.addEventListener('input', () => {
    params.LA = parseFloat(sliderLengthA.value);
    valLengthA.textContent = params.LA.toFixed(1) + ' m';
    restLength = getRestLength();
});

sliderLengthB.addEventListener('input', () => {
    params.LB = parseFloat(sliderLengthB.value);
    valLengthB.textContent = params.LB.toFixed(1) + ' m';
    restLength = getRestLength();
});

// Keyboard controls
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
    } else if (e.code === 'KeyR') {
        resetSimulation();
    } else if (e.code === 'KeyT') {
        trailVisible = !trailVisible;
        trailLineA.visible = trailVisible;
        trailLineB.visible = trailVisible;
    }
});

function resetSimulation() {
    state.thetaA = Math.PI / 6;
    state.thetaB = 0;
    state.omegaA = 0;
    state.omegaB = 0;
    simTime = 0;
    restLength = getRestLength();
    initTrails();
}

// ============ UPDATE VISUALS ============
function updatePendulumVisuals() {
    const { thetaA, thetaB } = state;
    const { bobA: posA, bobB: posB } = getBobPositions(thetaA, thetaB);

    // Rod A
    const midA = new THREE.Vector3().addVectors(pivotA, posA).multiplyScalar(0.5);
    rodA.position.copy(midA);
    rodA.scale.y = params.LA;
    rodA.rotation.z = -thetaA;

    // Bob A
    bobA.position.copy(posA);

    // Rod B
    const midB = new THREE.Vector3().addVectors(pivotB, posB).multiplyScalar(0.5);
    rodB.position.copy(midB);
    rodB.scale.y = params.LB;
    rodB.rotation.z = -thetaB;

    // Bob B
    bobB.position.copy(posB);

    // Attachment markers
    const { pA, pB } = getAttachmentPoints(thetaA, thetaB);
    markerA.position.copy(pA);
    markerB.position.copy(pB);

    // Spring visual
    updateSpringVisual(pA, pB);

    return { posA, posB };
}

function updateSpringVisual(pA, pB) {
    const dir = new THREE.Vector3().subVectors(pB, pA);
    const length = dir.length();
    const displacement = length - restLength;

    // Color based on state
    if (Math.abs(displacement) < 0.05) {
        springMaterial.color.setHex(0x44FF44); // green - relaxed
    } else if (displacement > 0) {
        springMaterial.color.setHex(0xFFFF00); // yellow - stretched
    } else {
        springMaterial.color.setHex(0xFF8800); // orange - compressed
    }

    const unitDir = dir.clone().normalize();
    // Perpendicular direction (in the plane)
    const perp = new THREE.Vector3(0, 0, 1).cross(unitDir).normalize();
    if (perp.length() < 0.01) {
        perp.set(0, 1, 0);
    }

    const amplitude = 0.15;

    for (let i = 0; i < springPointCount; i++) {
        const t = i / (springPointCount - 1);
        const pos = new THREE.Vector3().lerpVectors(pA, pB, t);

        // Add coil displacement (sine wave)
        // Taper at ends
        let taper = 1;
        if (t < 0.05) taper = t / 0.05;
        else if (t > 0.95) taper = (1 - t) / 0.05;

        const coilAngle = t * springCoils * Math.PI * 2;
        const offset = Math.sin(coilAngle) * amplitude * taper;

        // Also add perpendicular in another direction for 3D coil look
        const perp2 = new THREE.Vector3().crossVectors(unitDir, perp).normalize();
        const offset2 = Math.cos(coilAngle) * amplitude * taper;

        pos.add(perp.clone().multiplyScalar(offset));
        pos.add(perp2.clone().multiplyScalar(offset2));

        springPositions[i * 3] = pos.x;
        springPositions[i * 3 + 1] = pos.y;
        springPositions[i * 3 + 2] = pos.z;
    }

    springGeometry.attributes.position.needsUpdate = true;
}

// ============ UPDATE HUD ============
function updateHUD(energies) {
    const { keA, peA, keB, peB, springPE } = energies;
    const energyA = keA + peA;
    const energyB = keB + peB;
    const totalEnergy = energyA + energyB + springPE;

    document.getElementById('hud-theta-a').textContent = (state.thetaA * 180 / Math.PI).toFixed(1) + '°';
    document.getElementById('hud-theta-b').textContent = (state.thetaB * 180 / Math.PI).toFixed(1) + '°';
    document.getElementById('hud-energy-a').textContent = energyA.toFixed(2);
    document.getElementById('hud-energy-b').textContent = energyB.toFixed(2);
    document.getElementById('hud-total-energy').textContent = totalEnergy.toFixed(2);
    document.getElementById('hud-sim-time').textContent = simTime.toFixed(1);

    // Energy bars - scale to total energy
    // We need a reference max. Use initial total energy + some margin
    const maxE = Math.abs(totalEnergy) * 1.5 + 1;

    // For PE, shift so that minimum PE (at rest) maps to 0
    // PE_i = -m*g*L*cos(theta), minimum is -m*g*L (at theta=0)
    // Shifted PE = PE - (-m*g*L) = m*g*L*(1 - cos(theta))
    const peAShifted = params.mA * g * params.LA * (1 - Math.cos(state.thetaA));
    const peBShifted = params.mB * g * params.LB * (1 - Math.cos(state.thetaB));
    const totalShifted = keA + peAShifted + keB + peBShifted + springPE;
    const maxBar = totalShifted * 1.3 + 0.5;

    const setBar = (id, val) => {
        const el = document.getElementById(id);
        const h = Math.min(200, Math.max(0, (val / maxBar) * 200));
        el.style.height = h + 'px';
    };

    setBar('bar-ke-a', keA);
    setBar('bar-pe-a', peAShifted);
    setBar('bar-ke-b', keB);
    setBar('bar-pe-b', peBShifted);
    setBar('bar-spring', springPE);
    setBar('bar-total', totalShifted);
}

// ============ STATE MANAGEMENT ============
window.__3D_STATE__ = {};

function updateState(energies) {
    const { keA, peA, keB, peB, springPE } = energies;
    const { bobA: posA, bobB: posB } = getBobPositions(state.thetaA, state.thetaB);

    window.__3D_STATE__ = {
        frameCount,
        thetaA: state.thetaA,
        thetaB: state.thetaB,
        omegaA: state.omegaA,
        omegaB: state.omegaB,
        energyA: keA + peA,
        energyB: keB + peB,
        springEnergy: springPE,
        totalEnergy: keA + peA + keB + peB + springPE,
        springStiffness: params.k,
        lengthA: params.LA,
        lengthB: params.LB,
        bobAPos: { x: posA.x, y: posA.y, z: posA.z },
        bobBPos: { x: posB.x, y: posB.y, z: posB.z },
        isPaused,
        simTime
    };
}

// ============ ANIMATION LOOP ============
const physDt = 0.002;
const maxSubsteps = 20;
let trailTimer = 0;

function animate() {
    requestAnimationFrame(animate);

    if (!isPaused) {
        // Fixed timestep physics with multiple substeps
        const substeps = maxSubsteps;
        for (let i = 0; i < substeps; i++) {
            rk4Step(physDt);
            simTime += physDt;
        }

        // Update trail every few frames
        trailTimer++;
        if (trailTimer % 2 === 0) {
            const { bobA: posA, bobB: posB } = getBobPositions(state.thetaA, state.thetaB);
            updateTrails(posA, posB);
        }
    }

    const positions = updatePendulumVisuals();
    const energies = computeEnergies();
    updateHUD(energies);
    updateState(energies);

    controls.update();
    renderer.render(scene, camera);
    frameCount++;
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
restLength = getRestLength();
animate();
</script>
