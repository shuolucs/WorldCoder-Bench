<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupled Pendulums Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #0f0f23);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 35, 0.8);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            z-index: 10;
            font-size: 14px;
            line-height: 1.6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .hud-row { display: flex; justify-content: space-between; gap: 20px; }
        .hud-label { color: #aaa; }
        .hud-value { font-weight: bold; font-family: monospace; }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 35, 0.8);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #333;
            z-index: 10;
            display: flex;
            gap: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .control-group label { font-size: 12px; color: #ccc; }
        .control-group input[type="range"] { cursor: pointer; }
        
        #instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #ddd;
            z-index: 10;
            pointer-events: none;
        }

        #energy-panel {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(15, 15, 35, 0.8);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            z-index: 10;
            display: flex;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .bar-container {
            width: 24px;
            height: 200px;
            background: #222;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            border: 1px solid #444;
        }
        .bar-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            transition: height 0.05s linear;
        }
        .bar-label {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            width: 40px;
        }
        
        /* Colors */
        .c-red { color: #FF4444; }
        .c-blue { color: #4444FF; }
        .bg-ke-a { background: #FF4444; }
        .bg-pe-a { background: #880000; }
        .bg-ke-b { background: #4444FF; }
        .bg-pe-b { background: #000088; }
        .bg-spring { background: #44FF44; }
        .bg-total { background: #FFFFFF; }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="instructions">
        Space: Pause/Resume | R: Reset | T: Toggle Trails | Drag to Rotate
    </div>

    <div id="hud">
        <div style="margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; font-weight: bold;">System State</div>
        <div class="hud-row"><span class="hud-label">Time:</span> <span class="hud-value" id="hud-sim-time">0.0 s</span></div>
        <div class="hud-row"><span class="hud-label c-red">Angle A:</span> <span class="hud-value c-red" id="hud-theta-a">0.0°</span></div>
        <div class="hud-row"><span class="hud-label c-blue">Angle B:</span> <span class="hud-value c-blue" id="hud-theta-b">0.0°</span></div>
        <div class="hud-row"><span class="hud-label c-red">Energy A:</span> <span class="hud-value c-red" id="hud-energy-a">0.00 J</span></div>
        <div class="hud-row"><span class="hud-label c-blue">Energy B:</span> <span class="hud-value c-blue" id="hud-energy-b">0.00 J</span></div>
        <div class="hud-row"><span class="hud-label">Total Energy:</span> <span class="hud-value" id="hud-total-energy">0.00 J</span></div>
    </div>

    <div id="energy-panel">
        <div class="bar-wrapper">
            <div class="bar-container"><div class="bar-fill bg-ke-a" id="bar-ke-a"></div></div>
            <div class="bar-label">KE A</div>
        </div>
        <div class="bar-wrapper">
            <div class="bar-container"><div class="bar-fill bg-pe-a" id="bar-pe-a"></div></div>
            <div class="bar-label">PE A</div>
        </div>
        <div class="bar-wrapper">
            <div class="bar-container"><div class="bar-fill bg-ke-b" id="bar-ke-b"></div></div>
            <div class="bar-label">KE B</div>
        </div>
        <div class="bar-wrapper">
            <div class="bar-container"><div class="bar-fill bg-pe-b" id="bar-pe-b"></div></div>
            <div class="bar-label">PE B</div>
        </div>
        <div class="bar-wrapper">
            <div class="bar-container"><div class="bar-fill bg-spring" id="bar-spring"></div></div>
            <div class="bar-label">Spring</div>
        </div>
        <div class="bar-wrapper" style="margin-left: 10px;">
            <div class="bar-container"><div class="bar-fill bg-total" id="bar-total"></div></div>
            <div class="bar-label">Total</div>
        </div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label>Stiffness (k): <span id="val-stiffness">5.0</span> N/m</label>
            <input type="range" id="slider-stiffness" min="0.5" max="20" step="0.5" value="5">
        </div>
        <div class="control-group">
            <label class="c-red">Length A: <span id="val-length-a">5.0</span> m</label>
            <input type="range" id="slider-length-a" min="2" max="8" step="0.1" value="5">
        </div>
        <div class="control-group">
            <label class="c-blue">Length B: <span id="val-length-b">5.0</span> m</label>
            <input type="range" id="slider-length-b" min="2" max="8" step="0.1" value="5">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            frameCount: 0,
            thetaA: 0, thetaB: 0,
            omegaA: 0, omegaB: 0,
            energyA: 0, energyB: 0, springEnergy: 0, totalEnergy: 0,
            springStiffness: 5.0, lengthA: 5.0, lengthB: 5.0,
            bobAPos: {x:0, y:0, z:0}, bobBPos: {x:0, y:0, z:0},
            isPaused: false, simTime: 0
        };

        // --- Physics Constants & Parameters ---
        const g = 9.81;
        const m_A = 1.0;
        const m_B = 1.0;
        const attachFraction = 0.5;
        const springDamping = 0.01;
        let L_rest = 4.0; // Calculated dynamically
        let maxInitialEnergy = 1; // For scaling bars

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // Background gradient is handled by CSS, make renderer transparent
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 3, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const warmLight = new THREE.PointLight(0xffddaa, 0.8, 50);
        warmLight.position.set(5, 10, 5);
        scene.add(warmLight);

        const coolLight = new THREE.PointLight(0xaaddff, 0.6, 50);
        coolLight.position.set(-5, 5, 10);
        scene.add(coolLight);

        // --- 3D Objects ---
        
        // Support Bar
        const barGeo = new THREE.CylinderGeometry(0.2, 0.2, 10, 16);
        const barMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
        const supportBar = new THREE.Mesh(barGeo, barMat);
        supportBar.rotation.z = Math.PI / 2;
        supportBar.position.set(0, 8, 0);
        scene.add(supportBar);

        // Pendulum Groups (Pivot points)
        const pivotA = new THREE.Group();
        pivotA.position.set(-2, 8, 0);
        scene.add(pivotA);

        const pivotB = new THREE.Group();
        pivotB.position.set(2, 8, 0);
        scene.add(pivotB);

        // Geometries & Materials
        const rodGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 8);
        rodGeo.translate(0, -0.5, 0); // Origin at top
        const bobGeo = new THREE.SphereGeometry(0.3, 32, 32);
        
        const matA = new THREE.MeshPhongMaterial({ color: 0xFF4444 });
        const matB = new THREE.MeshPhongMaterial({ color: 0x4444FF });

        // Pendulum A parts
        const rodA = new THREE.Mesh(rodGeo, matA);
        const bobA = new THREE.Mesh(bobGeo, matA);
        pivotA.add(rodA);
        pivotA.add(bobA);

        // Pendulum B parts
        const rodB = new THREE.Mesh(rodGeo, matB);
        const bobB = new THREE.Mesh(bobGeo, matB);
        pivotB.add(rodB);
        pivotB.add(bobB);

        // Spring
        const springMaterial = new THREE.LineBasicMaterial({ color: 0x44FF44, linewidth: 2 });
        const springGeometry = new THREE.BufferGeometry();
        const springLine = new THREE.Line(springGeometry, springMaterial);
        scene.add(springLine);

        // Trails
        const maxTrailPoints = 500;
        let showTrails = true;
        
        const trailGeoA = new THREE.BufferGeometry();
        const trailPosA = new Float32Array(maxTrailPoints * 3);
        const trailColA = new Float32Array(maxTrailPoints * 3);
        trailGeoA.setAttribute('position', new THREE.BufferAttribute(trailPosA, 3));
        trailGeoA.setAttribute('color', new THREE.BufferAttribute(trailColA, 3));
        const trailMatA = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.8 });
        const trailLineA = new THREE.Line(trailGeoA, trailMatA);
        scene.add(trailLineA);

        const trailGeoB = new THREE.BufferGeometry();
        const trailPosB = new Float32Array(maxTrailPoints * 3);
        const trailColB = new Float32Array(maxTrailPoints * 3);
        trailGeoB.setAttribute('position', new THREE.BufferAttribute(trailPosB, 3));
        trailGeoB.setAttribute('color', new THREE.BufferAttribute(trailColB, 3));
        const trailMatB = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.8 });
        const trailLineB = new THREE.Line(trailGeoB, trailMatB);
        scene.add(trailLineB);

        let trailIndex = 0;
        let trailCount = 0;

        // --- Physics Engine ---

        function calculateRestLength() {
            const L_A = window.__3D_STATE__.lengthA;
            const L_B = window.__3D_STATE__.lengthB;
            const yA = 8 - L_A * attachFraction;
            const yB = 8 - L_B * attachFraction;
            const dx = 4; // 2 - (-2)
            const dy = yB - yA;
            L_rest = Math.sqrt(dx*dx + dy*dy);
        }

        function getDerivatives(state) {
            const [thA, omA, thB, omB] = state;
            const L_A = window.__3D_STATE__.lengthA;
            const L_B = window.__3D_STATE__.lengthB;
            const k = window.__3D_STATE__.springStiffness;

            // Pivot positions
            const P_Ax = -2, P_Ay = 8;
            const P_Bx = 2, P_By = 8;

            // Attachment points
            const rAx = L_A * attachFraction * Math.sin(thA);
            const rAy = -L_A * attachFraction * Math.cos(thA);
            const rBx = L_B * attachFraction * Math.sin(thB);
            const rBy = -L_B * attachFraction * Math.cos(thB);

            const A_att_x = P_Ax + rAx;
            const A_att_y = P_Ay + rAy;
            const B_att_x = P_Bx + rBx;
            const B_att_y = P_By + rBy;

            // Spring vector
            const Sx = B_att_x - A_att_x;
            const Sy = B_att_y - A_att_y;
            const D = Math.sqrt(Sx*Sx + Sy*Sy);

            // Velocities of attachment points
            const vAx = -omA * rAy;
            const vAy = omA * rAx;
            const vBx = -omB * rBy;
            const vBy = omB * rBx;

            // Relative velocity along spring
            const vRelX = vBx - vAx;
            const vRelY = vBy - vAy;
            let D_dot = 0;
            if (D > 0.0001) {
                D_dot = (vRelX * Sx + vRelY * Sy) / D;
            }

            // Spring force magnitude (including damping)
            const Fs = -k * (D - L_rest) - springDamping * D_dot;

            // Force vectors
            let FsAx = 0, FsAy = 0;
            if (D > 0.0001) {
                FsAx = Fs * (Sx / D);
                FsAy = Fs * (Sy / D);
            }
            const FsBx = -FsAx;
            const FsBy = -FsAy;

            // Torques from spring
            const tau_sA = rAx * FsAy - rAy * FsAx;
            const tau_sB = rBx * FsBy - rBy * FsBx;

            // Angular accelerations
            const alphaA = (-m_A * g * L_A * Math.sin(thA) + tau_sA) / (m_A * L_A * L_A);
            const alphaB = (-m_B * g * L_B * Math.sin(thB) + tau_sB) / (m_B * L_B * L_B);

            return [omA, alphaA, omB, alphaB];
        }

        function rk4Step(dt) {
            const state = [
                window.__3D_STATE__.thetaA,
                window.__3D_STATE__.omegaA,
                window.__3D_STATE__.thetaB,
                window.__3D_STATE__.omegaB
            ];

            const k1 = getDerivatives(state);
            
            const state2 = state.map((s, i) => s + 0.5 * dt * k1[i]);
            const k2 = getDerivatives(state2);
            
            const state3 = state.map((s, i) => s + 0.5 * dt * k2[i]);
            const k3 = getDerivatives(state3);
            
            const state4 = state.map((s, i) => s + dt * k3[i]);
            const k4 = getDerivatives(state4);

            window.__3D_STATE__.thetaA += (dt / 6) * (k1[0] + 2*k2[0] + 2*k3[0] + k4[0]);
            window.__3D_STATE__.omegaA += (dt / 6) * (k1[1] + 2*k2[1] + 2*k3[1] + k4[1]);
            window.__3D_STATE__.thetaB += (dt / 6) * (k1[2] + 2*k2[2] + 2*k3[2] + k4[2]);
            window.__3D_STATE__.omegaB += (dt / 6) * (k1[3] + 2*k2[3] + 2*k3[3] + k4[3]);
        }

        function calculateEnergies() {
            const s = window.__3D_STATE__;
            
            // KE = 0.5 * m * (L * omega)^2
            const keA = 0.5 * m_A * Math.pow(s.lengthA * s.omegaA, 2);
            const keB = 0.5 * m_B * Math.pow(s.lengthB * s.omegaB, 2);
            
            // PE = m * g * L * (1 - cos(theta)) -> reference 0 at lowest point
            const peA = m_A * g * s.lengthA * (1 - Math.cos(s.thetaA));
            const peB = m_B * g * s.lengthB * (1 - Math.cos(s.thetaB));

            // Spring PE
            const P_Ax = -2, P_Ay = 8;
            const P_Bx = 2, P_By = 8;
            const A_att_x = P_Ax + s.lengthA * attachFraction * Math.sin(s.thetaA);
            const A_att_y = P_Ay - s.lengthA * attachFraction * Math.cos(s.thetaA);
            const B_att_x = P_Bx + s.lengthB * attachFraction * Math.sin(s.thetaB);
            const B_att_y = P_By - s.lengthB * attachFraction * Math.cos(s.thetaB);
            
            const dx = B_att_x - A_att_x;
            const dy = B_att_y - A_att_y;
            const D = Math.sqrt(dx*dx + dy*dy);
            
            const peSpring = 0.5 * s.springStiffness * Math.pow(D - L_rest, 2);

            s.energyA = keA + peA;
            s.energyB = keB + peB;
            s.springEnergy = peSpring;
            s.totalEnergy = keA + peA + keB + peB + peSpring;

            return { keA, peA, keB, peB, peSpring, total: s.totalEnergy, D };
        }

        function resetSimulation() {
            window.__3D_STATE__.thetaA = Math.PI / 6; // 30 degrees
            window.__3D_STATE__.thetaB = 0;
            window.__3D_STATE__.omegaA = 0;
            window.__3D_STATE__.omegaB = 0;
            window.__3D_STATE__.simTime = 0;
            
            calculateRestLength();
            const energies = calculateEnergies();
            maxInitialEnergy = energies.total;

            // Clear trails
            trailCount = 0;
            trailIndex = 0;
            trailGeoA.setDrawRange(0, 0);
            trailGeoB.setDrawRange(0, 0);
        }

        // --- Visual Updates ---

        function updateSpringGeometry(A_att, B_att, D) {
            const points = [];
            const turns = 15;
            const radius = 0.2;
            const segments = 150;

            const vec = new THREE.Vector3().subVectors(B_att, A_att);
            const dir = vec.clone().normalize();
            
            // Local axes for coil
            const up = new THREE.Vector3(0, 0, 1);
            const normal = new THREE.Vector3().crossVectors(dir, up).normalize();
            const binormal = new THREE.Vector3().crossVectors(dir, normal).normalize();

            for (let i = 0; i <= segments; i++) {
                const t = i / segments;
                const p = new THREE.Vector3().copy(A_att).addScaledVector(vec, t);
                
                // Taper ends
                const taper = Math.sin(t * Math.PI);
                const r = radius * taper;

                const angle = t * turns * Math.PI * 2;
                p.addScaledVector(normal, r * Math.cos(angle));
                p.addScaledVector(binormal, r * Math.sin(angle));
                
                points.push(p);
            }
            springGeometry.setFromPoints(points);

            // Color based on strain
            const strain = (D - L_rest) / L_rest;
            const color = new THREE.Color(0x44FF44); // Base Green
            if (strain > 0.02) {
                color.lerp(new THREE.Color(0xFFFF00), Math.min(strain * 10, 1)); // Yellow
            } else if (strain < -0.02) {
                color.lerp(new THREE.Color(0xFF8800), Math.min(-strain * 10, 1)); // Orange
            }
            springMaterial.color = color;
        }

        function updateTrails(posA, posB) {
            if (!showTrails) {
                trailGeoA.setDrawRange(0, 0);
                trailGeoB.setDrawRange(0, 0);
                return;
            }

            const idx = trailIndex * 3;
            
            trailPosA[idx] = posA.x; trailPosA[idx+1] = posA.y; trailPosA[idx+2] = posA.z;
            trailPosB[idx] = posB.x; trailPosB[idx+1] = posB.y; trailPosB[idx+2] = posB.z;

            trailIndex = (trailIndex + 1) % maxTrailPoints;
            if (trailCount < maxTrailPoints) trailCount++;

            // Update colors for fading effect
            const bgCol = new THREE.Color(0x1a1a2e);
            const colA = new THREE.Color(0xFF4444);
            const colB = new THREE.Color(0x4444FF);

            for (let i = 0; i < trailCount; i++) {
                // Calculate age (0 is newest, 1 is oldest)
                let ageIdx = (trailIndex - 1 - i);
                if (ageIdx < 0) ageIdx += maxTrailPoints;
                
                const age = i / maxTrailPoints;
                const cA = colA.clone().lerp(bgCol, age);
                const cB = colB.clone().lerp(bgCol, age);

                const cIdx = ageIdx * 3;
                trailColA[cIdx] = cA.r; trailColA[cIdx+1] = cA.g; trailColA[cIdx+2] = cA.b;
                trailColB[cIdx] = cB.r; trailColB[cIdx+1] = cB.g; trailColB[cIdx+2] = cB.b;
            }

            trailGeoA.attributes.position.needsUpdate = true;
            trailGeoA.attributes.color.needsUpdate = true;
            trailGeoA.setDrawRange(0, trailCount);

            trailGeoB.attributes.position.needsUpdate = true;
            trailGeoB.attributes.color.needsUpdate = true;
            trailGeoB.setDrawRange(0, trailCount);
        }

        function updateVisuals() {
            const s = window.__3D_STATE__;

            // Update Pendulum A
            pivotA.rotation.z = s.thetaA;
            rodA.scale.y = s.lengthA;
            bobA.position.y = -s.lengthA;

            // Update Pendulum B
            pivotB.rotation.z = s.thetaB;
            rodB.scale.y = s.lengthB;
            bobB.position.y = -s.lengthB;

            // Get world positions
            const posA = new THREE.Vector3();
            bobA.getWorldPosition(posA);
            s.bobAPos = { x: posA.x, y: posA.y, z: posA.z };

            const posB = new THREE.Vector3();
            bobB.getWorldPosition(posB);
            s.bobBPos = { x: posB.x, y: posB.y, z: posB.z };

            // Spring attachment points
            const attA = new THREE.Vector3(0, -s.lengthA * attachFraction, 0);
            pivotA.localToWorld(attA);
            const attB = new THREE.Vector3(0, -s.lengthB * attachFraction, 0);
            pivotB.localToWorld(attB);

            const energies = calculateEnergies();
            updateSpringGeometry(attA, attB, energies.D);
            
            if (!s.isPaused) {
                updateTrails(posA, posB);
            }

            return energies;
        }

        function updateUI(energies) {
            const s = window.__3D_STATE__;

            // HUD
            document.getElementById('hud-sim-time').textContent = s.simTime.toFixed(1) + ' s';
            document.getElementById('hud-theta-a').textContent = (s.thetaA * 180 / Math.PI).toFixed(1) + '°';
            document.getElementById('hud-theta-b').textContent = (s.thetaB * 180 / Math.PI).toFixed(1) + '°';
            document.getElementById('hud-energy-a').textContent = s.energyA.toFixed(2) + ' J';
            document.getElementById('hud-energy-b').textContent = s.energyB.toFixed(2) + ' J';
            document.getElementById('hud-total-energy').textContent = s.totalEnergy.toFixed(2) + ' J';

            // Energy Bars
            const scale = 100 / maxInitialEnergy;
            document.getElementById('bar-ke-a').style.height = Math.min(energies.keA * scale, 100) + '%';
            document.getElementById('bar-pe-a').style.height = Math.min(energies.peA * scale, 100) + '%';
            document.getElementById('bar-ke-b').style.height = Math.min(energies.keB * scale, 100) + '%';
            document.getElementById('bar-pe-b').style.height = Math.min(energies.peB * scale, 100) + '%';
            document.getElementById('bar-spring').style.height = Math.min(energies.peSpring * scale, 100) + '%';
            document.getElementById('bar-total').style.height = Math.min(energies.total * scale, 100) + '%';
        }

        // --- Event Listeners ---

        document.getElementById('slider-stiffness').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.springStiffness = val;
            document.getElementById('val-stiffness').textContent = val.toFixed(1);
        });

        document.getElementById('slider-length-a').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.lengthA = val;
            document.getElementById('val-length-a').textContent = val.toFixed(1);
            calculateRestLength();
        });

        document.getElementById('slider-length-b').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.lengthB = val;
            document.getElementById('val-length-b').textContent = val.toFixed(1);
            calculateRestLength();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            } else if (e.code === 'KeyR') {
                resetSimulation();
            } else if (e.code === 'KeyT') {
                showTrails = !showTrails;
                if (!showTrails) {
                    trailGeoA.setDrawRange(0, 0);
                    trailGeoB.setDrawRange(0, 0);
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---

        resetSimulation();

        const dt = 0.002;
        const substeps = 8; // 8 * 0.002 = 0.016s per frame (~60fps)

        function animate() {
            requestAnimationFrame(animate);

            if (!window.__3D_STATE__.isPaused) {
                for (let i = 0; i < substeps; i++) {
                    rk4Step(dt);
                    window.__3D_STATE__.simTime += dt;
                }
            }

            const energies = updateVisuals();
            updateUI(energies);

            controls.update();
            renderer.render(scene, camera);
            
            window.__3D_STATE__.frameCount++;
        }

        animate();
    </script>
</body>
</html>
