<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Fire Tornado</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #ui, #hud {
      position: absolute;
      left: 12px;
      background: rgba(20, 20, 20, 0.65);
      color: white;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
      z-index: 10;
      min-width: 220px;
    }

    #ui {
      top: 12px;
    }

    #hud {
      top: 220px;
    }

    .control-group {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    input[type="range"], select, button {
      width: 100%;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      padding: 6px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    .hud-row {
      font-size: 13px;
      margin: 4px 0;
    }

    .hint {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 8px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="control-group">
      <label for="intensitySlider">Intensity</label>
      <input id="intensitySlider" type="range" min="0.1" max="3.0" step="0.1" value="1.0" />
    </div>

    <div class="control-group">
      <label for="widthSlider">Width</label>
      <input id="widthSlider" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
    </div>

    <div class="control-group">
      <button id="toggleEmbers">Toggle Embers</button>
    </div>

    <div class="control-group">
      <label for="colorTheme">Color Theme</label>
      <select id="colorTheme">
        <option value="fire" selected>fire</option>
        <option value="blue">blue</option>
        <option value="green">green</option>
      </select>
    </div>

    <div class="hint">
      Keys: R = reset, P = pause, Space = burst<br/>
      Click canvas = spawn temporary fire ring
    </div>
  </div>

  <div id="hud">
    <div class="hud-row">FPS: <span id="fpsDisplay">0</span></div>
    <div class="hud-row">Active Particles: <span id="particleCount">0</span></div>
    <div class="hud-row">Tornado Height: <span id="tornadoHeight">0</span></div>
    <div class="hud-row">Intensity: <span id="intensityDisplay">1.0</span></div>
    <div class="hud-row">Animation: <span id="animState">playing</span></div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 5, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x331100, 0.3);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xff4400, 2.0, 100);
    pointLight.position.set(0, 5, 0);
    scene.add(pointLight);

    const groundGeo = new THREE.CircleGeometry(15, 64);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // UI refs
    const intensitySlider = document.getElementById("intensitySlider");
    const widthSlider = document.getElementById("widthSlider");
    const toggleEmbersBtn = document.getElementById("toggleEmbers");
    const colorThemeSelect = document.getElementById("colorTheme");

    const fpsDisplay = document.getElementById("fpsDisplay");
    const particleCountDisplay = document.getElementById("particleCount");
    const tornadoHeightDisplay = document.getElementById("tornadoHeight");
    const intensityDisplay = document.getElementById("intensityDisplay");
    const animStateDisplay = document.getElementById("animState");

    // State
    let intensity = 1.0;
    let widthMultiplier = 1.0;
    let embersVisible = true;
    let colorTheme = "fire";
    let isPaused = false;
    let isBursting = false;
    let burstTimer = 0;
    let frameCount = 0;
    let fps = 0;
    let fpsAccumulator = 0;
    let fpsFrames = 0;

    // Constants
    const MAIN_COUNT = 3000;
    const EMBER_COUNT = 500;
    const CLICK_BURST_COUNT = 50;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

    // Theme palettes
    const palettes = {
      fire: [
        new THREE.Color(0xffff66),
        new THREE.Color(0xff8800),
        new THREE.Color(0x660000)
      ],
      blue: [
        new THREE.Color(0x66ffff),
        new THREE.Color(0x2266ff),
        new THREE.Color(0x5500aa)
      ],
      green: [
        new THREE.Color(0xeeff66),
        new THREE.Color(0x33cc55),
        new THREE.Color(0x0b3d0b)
      ]
    };

    function lerpColor(c1, c2, t) {
      return c1.clone().lerp(c2, t);
    }

    function getThemeColor(normalizedHeight) {
      const p = palettes[colorTheme];
      if (normalizedHeight < 0.5) {
        return lerpColor(p[0], p[1], normalizedHeight / 0.5);
      }
      return lerpColor(p[1], p[2], (normalizedHeight - 0.5) / 0.5);
    }

    function vortexRadiusProfile(yNorm) {
      // Wider bottom (~3), narrow middle (~1.5), wider top (~2.5)
      // Base profile before width multiplier
      if (yNorm < 0.5) {
        return THREE.MathUtils.lerp(3.0, 1.5, yNorm / 0.5);
      }
      return THREE.MathUtils.lerp(1.5, 2.5, (yNorm - 0.5) / 0.5);
    }

    // Main tornado particles
    const mainPositions = new Float32Array(MAIN_COUNT * 3);
    const mainColors = new Float32Array(MAIN_COUNT * 3);
    const mainSizes = new Float32Array(MAIN_COUNT);

    const mainData = new Array(MAIN_COUNT);

    function spawnMainParticle(i, randomY = 0) {
      const ringRadius = THREE.MathUtils.lerp(1.5, 3.0, Math.random()) * widthMultiplier;
      const angle = Math.random() * Math.PI * 2;
      const y = randomY;
      const verticalSpeed = THREE.MathUtils.lerp(2.0, 5.0, Math.random());
      const maxLifetime = THREE.MathUtils.lerp(3.0, 6.0, Math.random());
      const size = THREE.MathUtils.lerp(8.0, 18.0, Math.random());

      mainData[i] = {
        angle,
        y,
        verticalSpeed,
        angularBase: THREE.MathUtils.lerp(2.5, 5.5, Math.random()),
        lifetime: 0.0001,
        maxLifetime,
        size,
        radiusOffset: THREE.MathUtils.lerp(-0.2, 0.2, Math.random()),
        ringRadius,
        velocity: new THREE.Vector3(0, verticalSpeed, 0)
      };

      const yNorm = THREE.MathUtils.clamp(y / 25, 0, 1);
      const radius = vortexRadiusProfile(yNorm) * widthMultiplier + mainData[i].radiusOffset;
      mainPositions[i * 3 + 0] = radius * Math.cos(angle);
      mainPositions[i * 3 + 1] = y;
      mainPositions[i * 3 + 2] = radius * Math.sin(angle);

      const col = getThemeColor(yNorm);
      mainColors[i * 3 + 0] = col.r;
      mainColors[i * 3 + 1] = col.g;
      mainColors[i * 3 + 2] = col.b;
      mainSizes[i] = size;
    }

    for (let i = 0; i < MAIN_COUNT; i++) {
      spawnMainParticle(i, Math.random() * 25);
      mainData[i].lifetime = Math.random() * mainData[i].maxLifetime;
    }

    const mainGeometry = new THREE.BufferGeometry();
    mainGeometry.setAttribute("position", new THREE.BufferAttribute(mainPositions, 3));
    mainGeometry.setAttribute("color", new THREE.BufferAttribute(mainColors, 3));
    mainGeometry.setAttribute("aSize", new THREE.BufferAttribute(mainSizes, 1));

    const mainMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uPixelRatio: { value: renderer.getPixelRatio() }
      },
      vertexShader: `
        attribute float aSize;
        varying vec3 vColor;
        void main() {
          vColor = color;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = aSize * uPixelRatio * (120.0 / -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        void main() {
          vec2 uv = gl_PointCoord - vec2(0.5);
          float d = length(uv);
          float alpha = smoothstep(0.5, 0.0, d);
          alpha *= 1.2;
          gl_FragColor = vec4(vColor, alpha);
        }
      `
    });

    const tornadoPoints = new THREE.Points(mainGeometry, mainMaterial);
    scene.add(tornadoPoints);

    // Embers
    const emberPositions = new Float32Array(EMBER_COUNT * 3);
    const emberColors = new Float32Array(EMBER_COUNT * 3);
    const emberSizes = new Float32Array(EMBER_COUNT);
    const emberData = new Array(EMBER_COUNT);

    function spawnEmber(i) {
      const h = Math.random() * 18 + 2;
      const angle = Math.random() * Math.PI * 2;
      const baseRadius = vortexRadiusProfile(h / 25) * widthMultiplier;
      const r = baseRadius + Math.random() * 0.8;
      const x = Math.cos(angle) * r;
      const z = Math.sin(angle) * r;

      const outward = new THREE.Vector3(x, 0, z).normalize().multiplyScalar(THREE.MathUtils.lerp(0.8, 2.5, Math.random()));
      const vy = THREE.MathUtils.lerp(0.5, 2.0, Math.random());

      emberData[i] = {
        velocity: new THREE.Vector3(outward.x, vy, outward.z),
        lifetime: 0.0001,
        maxLifetime: THREE.MathUtils.lerp(4.0, 8.0, Math.random())
      };

      emberPositions[i * 3 + 0] = x;
      emberPositions[i * 3 + 1] = h;
      emberPositions[i * 3 + 2] = z;

      const c = new THREE.Color(0xff6600);
      emberColors[i * 3 + 0] = c.r;
      emberColors[i * 3 + 1] = c.g;
      emberColors[i * 3 + 2] = c.b;
      emberSizes[i] = THREE.MathUtils.lerp(3.0, 7.0, Math.random());
    }

    for (let i = 0; i < EMBER_COUNT; i++) spawnEmber(i);

    const emberGeometry = new THREE.BufferGeometry();
    emberGeometry.setAttribute("position", new THREE.BufferAttribute(emberPositions, 3));
    emberGeometry.setAttribute("color", new THREE.BufferAttribute(emberColors, 3));
    emberGeometry.setAttribute("aSize", new THREE.BufferAttribute(emberSizes, 1));

    const emberMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uPixelRatio: { value: renderer.getPixelRatio() }
      },
      vertexShader: `
        attribute float aSize;
        varying vec3 vColor;
        void main() {
          vColor = color;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = aSize * uPixelRatio * (100.0 / -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        void main() {
          vec2 uv = gl_PointCoord - vec2(0.5);
          float d = length(uv);
          float alpha = smoothstep(0.5, 0.0, d);
          gl_FragColor = vec4(vColor, alpha);
        }
      `
    });

    const emberPoints = new THREE.Points(emberGeometry, emberMaterial);
    scene.add(emberPoints);

    // Temporary click particles
    const tempSystems = [];

    function spawnClickRing(worldPos) {
      const count = CLICK_BURST_COUNT;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const sizes = new Float32Array(count);
      const data = new Array(count);

      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const radius = 0.3 + Math.random() * 0.8;
        const x = worldPos.x + Math.cos(angle) * radius;
        const z = worldPos.z + Math.sin(angle) * radius;
        const y = 0.1 + Math.random() * 0.5;

        positions[i * 3 + 0] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;

        const c = getThemeColor(0.1);
        colors[i * 3 + 0] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;

        sizes[i] = THREE.MathUtils.lerp(6.0, 12.0, Math.random());

        const dir = new THREE.Vector3(Math.cos(angle), 1.5 + Math.random() * 2.0, Math.sin(angle))
          .normalize()
          .multiplyScalar(THREE.MathUtils.lerp(1.5, 4.0, Math.random()));

        data[i] = {
          velocity: dir,
          lifetime: 0,
          maxLifetime: 1.5 + Math.random() * 1.5
        };
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      geo.setAttribute("aSize", new THREE.BufferAttribute(sizes, 1));

      const mat = mainMaterial.clone();
      mat.uniforms = { uPixelRatio: { value: renderer.getPixelRatio() } };

      const pts = new THREE.Points(geo, mat);
      scene.add(pts);

      tempSystems.push({ points: pts, positions, data, geometry: geo, material: mat });
    }

    function updateTempSystems(dt) {
      for (let s = tempSystems.length - 1; s >= 0; s--) {
        const sys = tempSystems[s];
        let alive = 0;

        for (let i = 0; i < sys.data.length; i++) {
          const p = sys.data[i];
          p.lifetime += dt;
          if (p.lifetime < p.maxLifetime) {
            alive++;
            p.velocity.y -= 1.5 * dt;
            sys.positions[i * 3 + 0] += p.velocity.x * dt;
            sys.positions[i * 3 + 1] += p.velocity.y * dt;
            sys.positions[i * 3 + 2] += p.velocity.z * dt;
          } else {
            sys.positions[i * 3 + 1] = -999;
          }
        }

        sys.geometry.attributes.position.needsUpdate = true;

        if (alive === 0) {
          scene.remove(sys.points);
          sys.geometry.dispose();
          sys.material.dispose();
          tempSystems.splice(s, 1);
        }
      }
    }

    function resetAll() {
      intensity = 1.0;
      widthMultiplier = 1.0;
      colorTheme = "fire";
      embersVisible = true;
      isPaused = false;
      isBursting = false;
      burstTimer = 0;

      intensitySlider.value = "1.0";
      widthSlider.value = "1.0";
      colorThemeSelect.value = "fire";
      emberPoints.visible = true;
      animStateDisplay.textContent = "playing";

      for (let i = 0; i < MAIN_COUNT; i++) {
        spawnMainParticle(i, Math.random() * 25);
      }
      for (let i = 0; i < EMBER_COUNT; i++) {
        spawnEmber(i);
      }

      while (tempSystems.length) {
        const s = tempSystems.pop();
        scene.remove(s.points);
        s.geometry.dispose();
        s.material.dispose();
      }

      mainGeometry.attributes.position.needsUpdate = true;
      mainGeometry.attributes.color.needsUpdate = true;
      mainGeometry.attributes.aSize.needsUpdate = true;
      emberGeometry.attributes.position.needsUpdate = true;
    }

    intensitySlider.addEventListener("input", () => {
      intensity = parseFloat(intensitySlider.value);
    });

    widthSlider.addEventListener("input", () => {
      widthMultiplier = parseFloat(widthSlider.value);
    });

    toggleEmbersBtn.addEventListener("click", () => {
      embersVisible = !embersVisible;
      emberPoints.visible = embersVisible;
    });

    colorThemeSelect.addEventListener("change", () => {
      colorTheme = colorThemeSelect.value;
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "KeyR") {
        resetAll();
      } else if (e.code === "KeyP") {
        isPaused = !isPaused;
      } else if (e.code === "Space") {
        e.preventDefault();
        isBursting = true;
        burstTimer = 2.0;
      }
    });

    renderer.domElement.addEventListener("click", (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const point = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(groundPlane, point)) {
        spawnClickRing(point);
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      const pr = Math.min(window.devicePixelRatio, 2);
      renderer.setPixelRatio(pr);
      mainMaterial.uniforms.uPixelRatio.value = pr;
      emberMaterial.uniforms.uPixelRatio.value = pr;
    });

    window.__3D_STATE__ = {};

    const clock = new THREE.Clock();

    function updateMainParticles(dt) {
      let maxY = 0;
      let active = 0;

      const burstIntensity = isBursting ? 2.0 : 1.0;
      const effectiveIntensity = intensity * burstIntensity;

      for (let i = 0; i < MAIN_COUNT; i++) {
        const p = mainData[i];
        p.lifetime += dt;

        if (p.lifetime >= p.maxLifetime || p.y > 25) {
          // Burst mode simulates higher spawn activity by biasing more particles toward the base
          spawnMainParticle(i, Math.random() * (isBursting ? 3.0 : 1.0));
        }

        const yNorm = THREE.MathUtils.clamp(p.y / 25, 0, 1);
        const angularSpeed = (p.angularBase + yNorm * 6.0) * effectiveIntensity;
        p.angle += angularSpeed * dt;

        p.y += p.verticalSpeed * effectiveIntensity * dt;

        const radius = (vortexRadiusProfile(yNorm) * widthMultiplier) + p.radiusOffset + Math.sin(p.angle * 2.3 + i) * 0.05;

        const x = radius * Math.cos(p.angle);
        const z = radius * Math.sin(p.angle);

        mainPositions[i * 3 + 0] = x;
        mainPositions[i * 3 + 1] = p.y;
        mainPositions[i * 3 + 2] = z;

        const col = getThemeColor(THREE.MathUtils.clamp(p.y / 25, 0, 1));
        mainColors[i * 3 + 0] = col.r;
        mainColors[i * 3 + 1] = col.g;
        mainColors[i * 3 + 2] = col.b;

        active++;
        if (p.y > maxY) maxY = p.y;
      }

      mainGeometry.attributes.position.needsUpdate = true;
      mainGeometry.attributes.color.needsUpdate = true;

      return { active, maxY };
    }

    function updateEmbers(dt) {
      let active = 0;

      for (let i = 0; i < EMBER_COUNT; i++) {
        const e = emberData[i];
        e.lifetime += dt;

        if (e.lifetime >= e.maxLifetime || emberPositions[i * 3 + 1] < 0 || emberPositions[i * 3 + 1] > 30) {
          spawnEmber(i);
        }

        e.velocity.y -= 0.35 * dt;

        emberPositions[i * 3 + 0] += e.velocity.x * dt * intensity;
        emberPositions[i * 3 + 1] += e.velocity.y * dt;
        emberPositions[i * 3 + 2] += e.velocity.z * dt * intensity;

        active++;
      }

      emberGeometry.attributes.position.needsUpdate = true;
      return active;
    }

    function updateHUD(state) {
      fpsDisplay.textContent = state.fps.toFixed(1);
      particleCountDisplay.textContent = state.particleCount;
      tornadoHeightDisplay.textContent = state.tornadoMaxY.toFixed(2);
      intensityDisplay.textContent = state.intensity.toFixed(1);
      animStateDisplay.textContent = state.isPaused ? "paused" : "playing";
    }

    function animate() {
      requestAnimationFrame(animate);

      const dtRaw = clock.getDelta();
      const dt = Math.min(dtRaw, 0.033);

      controls.update();

      if (!isPaused) {
        if (isBursting) {
          burstTimer -= dt;
          if (burstTimer <= 0) {
            isBursting = false;
            burstTimer = 0;
          }
        }

        var mainStats = updateMainParticles(dt);
        var activeEmbers = updateEmbers(dt);
        updateTempSystems(dt);
      } else {
        var mainStats = {
          active: MAIN_COUNT,
          maxY: Math.max(...mainPositions.filter((_, idx) => idx % 3 === 1))
        };
        var activeEmbers = EMBER_COUNT;
      }

      renderer.render(scene, camera);

      frameCount++;
      fpsAccumulator += dtRaw;
      fpsFrames++;
      if (fpsAccumulator >= 0.5) {
        fps = fpsFrames / fpsAccumulator;
        fpsAccumulator = 0;
        fpsFrames = 0;
      }

      const pointsSystemsCount = scene.children.filter(obj => obj instanceof THREE.Points).length;

      window.__3D_STATE__ = {
        particleCount: mainStats.active,
        emberCount: activeEmbers,
        embersVisible,
        intensity,
        width: widthMultiplier,
        colorTheme,
        isPaused,
        isBursting,
        tornadoMaxY: mainStats.maxY,
        fps,
        groundPlaneExists: !!ground && scene.children.includes(ground),
        cameraDistance: camera.position.length(),
        totalParticlesSystems: pointsSystemsCount,
        frameCount,
        lightIntensity: pointLight.intensity
      };

      updateHUD(window.__3D_STATE__);
    }

    resetAll();
    animate();
  </script>
</body>
</html>
