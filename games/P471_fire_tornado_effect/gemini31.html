<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fire Tornado</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #webgl-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .panel {
            position: absolute;
            left: 20px;
            background: rgba(20, 20, 20, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            color: white;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        #hud {
            top: 20px;
            width: 220px;
        }
        #controls {
            top: 220px;
            width: 220px;
        }
        h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
            color: #ffaa00;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 13px;
        }
        .stat-value {
            font-weight: bold;
            color: #ffcc00;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #ff6600;
        }
        select, button {
            width: 100%;
            padding: 6px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        select:hover, button:hover {
            background: rgba(255, 100, 0, 0.3);
        }
        .instructions {
            margin-top: 15px;
            font-size: 11px;
            color: #aaa;
            line-height: 1.4;
        }
        .key {
            display: inline-block;
            background: #333;
            padding: 1px 5px;
            border-radius: 3px;
            color: #fff;
            border: 1px solid #555;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <canvas id="webgl-canvas"></canvas>

    <div id="hud" class="panel">
        <h3>System Status</h3>
        <div class="stat-row"><span>FPS:</span> <span id="fpsDisplay" class="stat-value">0</span></div>
        <div class="stat-row"><span>Particles:</span> <span id="particleCount" class="stat-value">0</span></div>
        <div class="stat-row"><span>Max Height:</span> <span id="tornadoHeight" class="stat-value">0.0</span></div>
        <div class="stat-row"><span>Intensity:</span> <span id="intensityDisplay" class="stat-value">1.0</span></div>
        <div class="stat-row"><span>State:</span> <span id="animState" class="stat-value">Playing</span></div>
    </div>

    <div id="controls" class="panel">
        <h3>Controls</h3>
        <div class="control-group">
            <label for="intensitySlider">Intensity</label>
            <input type="range" id="intensitySlider" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label for="widthSlider">Width</label>
            <input type="range" id="widthSlider" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label for="colorTheme">Color Theme</label>
            <select id="colorTheme">
                <option value="fire" selected>Fire</option>
                <option value="blue">Blue</option>
                <option value="green">Green</option>
            </select>
        </div>
        <div class="control-group">
            <button id="toggleEmbers">Toggle Embers</button>
        </div>
        <div class="instructions">
            <span class="key">R</span> Reset<br>
            <span class="key">P</span> Pause/Play<br>
            <span class="key">Space</span> Burst Mode<br>
            <span class="key">Click</span> Spawn Particles
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            particleCount: 0,
            emberCount: 0,
            embersVisible: true,
            intensity: 1.0,
            width: 1.0,
            colorTheme: 'fire',
            isPaused: false,
            isBursting: false,
            tornadoMaxY: 0,
            fps: 0,
            groundPlaneExists: false,
            cameraDistance: 0,
            totalParticlesSystems: 0,
            frameCount: 0,
            lightIntensity: 2.0
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000);

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Allow looking slightly below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0x331100, 0.3);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff4400, state.lightIntensity, 50);
        pointLight.position.set(0, 5, 0);
        scene.add(pointLight);

        // Ground
        const groundGeo = new THREE.CircleGeometry(15, 64);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);
        state.groundPlaneExists = true;

        // --- Shaders ---
        const particleVertexShader = `
            attribute float size;
            attribute vec3 customColor;
            varying vec3 vColor;
            void main() {
                vColor = customColor;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (40.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const particleFragmentShader = `
            varying vec3 vColor;
            void main() {
                float dist = length(gl_PointCoord - vec2(0.5));
                if (dist > 0.5) discard;
                // Soft edge
                float alpha = smoothstep(0.5, 0.1, dist);
                gl_FragColor = vec4(vColor, alpha);
            }
        `;

        const particleMaterial = new THREE.ShaderMaterial({
            vertexShader: particleVertexShader,
            fragmentShader: particleFragmentShader,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        // --- Color Themes ---
        const themes = {
            fire: [new THREE.Color(0xffff00), new THREE.Color(0xff6600), new THREE.Color(0x880000)],
            blue: [new THREE.Color(0x00ffff), new THREE.Color(0x0044ff), new THREE.Color(0x440088)],
            green: [new THREE.Color(0xffff00), new THREE.Color(0x00ff00), new THREE.Color(0x004400)]
        };

        function getParticleColor(y, themeName) {
            const colors = themes[themeName];
            const t = Math.max(0, Math.min(1, y / 25.0));
            const c = new THREE.Color();
            if (t < 0.5) {
                c.lerpColors(colors[0], colors[1], t * 2.0);
            } else {
                c.lerpColors(colors[1], colors[2], (t - 0.5) * 2.0);
            }
            return c;
        }

        // --- Tornado Particle System ---
        const TORNADO_COUNT = 3000;
        const tornadoGeo = new THREE.BufferGeometry();
        const tPos = new Float32Array(TORNADO_COUNT * 3);
        const tCol = new Float32Array(TORNADO_COUNT * 3);
        const tSize = new Float32Array(TORNADO_COUNT);
        const tData = [];

        function initTornadoParticle(i, isReset = false) {
            const y = isReset ? 0 : Math.random() * 25;
            tData[i] = {
                angle: Math.random() * Math.PI * 2,
                baseRadius: 1.5 + Math.random() * 1.5,
                y: y,
                vY: 2.0 + Math.random() * 3.0,
                vAngle: 1.5 + Math.random() * 2.0,
                life: isReset ? 0 : Math.random() * 5,
                maxLife: 3.0 + Math.random() * 4.0
            };
            tSize[i] = 3.0 + Math.random() * 4.0;
        }

        for (let i = 0; i < TORNADO_COUNT; i++) {
            initTornadoParticle(i, false);
        }

        tornadoGeo.setAttribute('position', new THREE.BufferAttribute(tPos, 3));
        tornadoGeo.setAttribute('customColor', new THREE.BufferAttribute(tCol, 3));
        tornadoGeo.setAttribute('size', new THREE.BufferAttribute(tSize, 1));

        const tornadoPoints = new THREE.Points(tornadoGeo, particleMaterial);
        scene.add(tornadoPoints);
        state.totalParticlesSystems++;

        // --- Ember Particle System ---
        const EMBER_COUNT = 500;
        const emberGeo = new THREE.BufferGeometry();
        const ePos = new Float32Array(EMBER_COUNT * 3);
        const eCol = new Float32Array(EMBER_COUNT * 3);
        const eSize = new Float32Array(EMBER_COUNT);
        const eData = [];

        const emberColor = new THREE.Color(0xff6600);

        function initEmberParticle(i) {
            eData[i] = {
                x: 0, y: 0, z: 0,
                vx: 0, vy: 0, vz: 0,
                life: Math.random() * 4,
                maxLife: 2.0 + Math.random() * 3.0
            };
            eSize[i] = 1.0 + Math.random() * 2.0;
            eCol[i*3] = emberColor.r;
            eCol[i*3+1] = emberColor.g;
            eCol[i*3+2] = emberColor.b;
        }

        for (let i = 0; i < EMBER_COUNT; i++) {
            initEmberParticle(i);
            eData[i].life = eData[i].maxLife; // Force respawn on first frame
        }

        emberGeo.setAttribute('position', new THREE.BufferAttribute(ePos, 3));
        emberGeo.setAttribute('customColor', new THREE.BufferAttribute(eCol, 3));
        emberGeo.setAttribute('size', new THREE.BufferAttribute(eSize, 1));

        const emberPoints = new THREE.Points(emberGeo, particleMaterial);
        scene.add(emberPoints);
        state.totalParticlesSystems++;

        // --- Click Burst Particle System ---
        const CLICK_COUNT = 500;
        const clickGeo = new THREE.BufferGeometry();
        const cPos = new Float32Array(CLICK_COUNT * 3);
        const cCol = new Float32Array(CLICK_COUNT * 3);
        const cSize = new Float32Array(CLICK_COUNT);
        const cData = [];
        let clickIndex = 0;

        for (let i = 0; i < CLICK_COUNT; i++) {
            cData[i] = { x: 0, y: -1000, z: 0, vx: 0, vy: 0, vz: 0, life: 0, maxLife: 0 };
            cSize[i] = 2.0 + Math.random() * 3.0;
            cPos[i*3+1] = -1000; // Hide initially
        }

        clickGeo.setAttribute('position', new THREE.BufferAttribute(cPos, 3));
        clickGeo.setAttribute('customColor', new THREE.BufferAttribute(cCol, 3));
        clickGeo.setAttribute('size', new THREE.BufferAttribute(cSize, 1));

        const clickPoints = new THREE.Points(clickGeo, particleMaterial);
        scene.add(clickPoints);
        state.totalParticlesSystems++;

        // --- Logic Functions ---
        function getVortexRadius(y) {
            // Wider at bottom (~3), narrow middle (~1.5), wider top (~2.5)
            if (y < 12.5) {
                return 1.5 + 1.5 * Math.pow((y - 12.5) / 12.5, 2);
            } else {
                return 1.5 + 1.0 * Math.pow((y - 12.5) / 12.5, 2);
            }
        }

        function spawnClickBurst(point) {
            const baseColor = themes[state.colorTheme][0];
            for (let i = 0; i < 50; i++) {
                const idx = (clickIndex + i) % CLICK_COUNT;
                const p = cData[idx];
                p.life = 0;
                p.maxLife = 1.0 + Math.random() * 1.5;
                p.x = point.x;
                p.y = point.y + 0.1;
                p.z = point.z;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = 2.0 + Math.random() * 4.0;
                p.vx = Math.cos(angle) * speed;
                p.vy = 2.0 + Math.random() * 4.0;
                p.vz = Math.sin(angle) * speed;

                cCol[idx*3] = baseColor.r;
                cCol[idx*3+1] = baseColor.g;
                cCol[idx*3+2] = baseColor.b;
            }
            clickIndex = (clickIndex + 50) % CLICK_COUNT;
            clickGeo.attributes.customColor.needsUpdate = true;
        }

        // --- Input Handling ---
        const ui = {
            intensity: document.getElementById('intensitySlider'),
            width: document.getElementById('widthSlider'),
            theme: document.getElementById('colorTheme'),
            embers: document.getElementById('toggleEmbers'),
            fps: document.getElementById('fpsDisplay'),
            pCount: document.getElementById('particleCount'),
            tHeight: document.getElementById('tornadoHeight'),
            iDisplay: document.getElementById('intensityDisplay'),
            aState: document.getElementById('animState')
        };

        ui.intensity.addEventListener('input', (e) => {
            state.intensity = parseFloat(e.target.value);
            ui.iDisplay.textContent = state.intensity.toFixed(1);
        });

        ui.width.addEventListener('input', (e) => {
            state.width = parseFloat(e.target.value);
        });

        ui.theme.addEventListener('change', (e) => {
            state.colorTheme = e.target.value;
            // Update point light color based on theme
            pointLight.color.copy(themes[state.colorTheme][1]);
            if(state.colorTheme === 'blue') pointLight.color.setHex(0x0044ff);
            if(state.colorTheme === 'green') pointLight.color.setHex(0x00ff00);
        });

        ui.embers.addEventListener('click', () => {
            state.embersVisible = !state.embersVisible;
            emberPoints.visible = state.embersVisible;
            ui.embers.style.background = state.embersVisible ? '' : 'rgba(255,0,0,0.3)';
        });

        let burstTimeout = null;
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                // Reset
                state.intensity = 1.0;
                state.width = 1.0;
                state.colorTheme = 'fire';
                ui.intensity.value = 1.0;
                ui.width.value = 1.0;
                ui.theme.value = 'fire';
                ui.iDisplay.textContent = '1.0';
                pointLight.color.setHex(0xff4400);
                for (let i = 0; i < TORNADO_COUNT; i++) initTornadoParticle(i, true);
                for (let i = 0; i < EMBER_COUNT; i++) eData[i].life = eData[i].maxLife;
            } else if (key === 'p') {
                state.isPaused = !state.isPaused;
                ui.aState.textContent = state.isPaused ? 'Paused' : 'Playing';
                ui.aState.style.color = state.isPaused ? '#ff4444' : '#ffcc00';
            } else if (e.code === 'Space') {
                if (!state.isBursting) {
                    state.isBursting = true;
                    if (burstTimeout) clearTimeout(burstTimeout);
                    burstTimeout = setTimeout(() => {
                        state.isBursting = false;
                    }, 2000);
                }
            }
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        window.addEventListener('click', (e) => {
            // Ignore clicks on UI
            if (e.target.closest('.panel')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                spawnClickBurst(intersects[0].point);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let frames = 0;
        let lastFpsTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent huge jumps
            const now = performance.now();
            frames++;

            if (now - lastFpsTime >= 1000) {
                state.fps = Math.round((frames * 1000) / (now - lastFpsTime));
                ui.fps.textContent = state.fps;
                frames = 0;
                lastFpsTime = now;
            }

            controls.update();
            state.cameraDistance = camera.position.length();

            if (!state.isPaused) {
                state.frameCount++;
                const currentIntensity = state.intensity * (state.isBursting ? 2.0 : 1.0);
                const currentWidth = state.width;
                
                let activeTornado = 0;
                let maxY = 0;

                // Update Tornado
                for (let i = 0; i < TORNADO_COUNT; i++) {
                    const p = tData[i];
                    // Burst mode ages particles faster to simulate higher turnover/spawn rate
                    p.life += dt * (state.isBursting ? 2.0 : 1.0);

                    if (p.life > p.maxLife || p.y > 25) {
                        initTornadoParticle(i, true);
                    }

                    if (p.life > 0) activeTornado++;

                    // Motion
                    const heightFactor = 1.0 + p.y * 0.1;
                    p.angle += p.vAngle * heightFactor * currentIntensity * dt;
                    p.y += p.vY * currentIntensity * dt;

                    if (p.y > maxY) maxY = p.y;

                    const rFactor = getVortexRadius(p.y);
                    const r = rFactor * currentWidth * (p.baseRadius / 3.0);

                    tPos[i*3] = r * Math.cos(p.angle);
                    tPos[i*3+1] = p.y;
                    tPos[i*3+2] = r * Math.sin(p.angle);

                    const col = getParticleColor(p.y, state.colorTheme);
                    tCol[i*3] = col.r;
                    tCol[i*3+1] = col.g;
                    tCol[i*3+2] = col.b;
                }
                
                tornadoGeo.attributes.position.needsUpdate = true;
                tornadoGeo.attributes.customColor.needsUpdate = true;
                
                state.particleCount = activeTornado;
                state.tornadoMaxY = maxY;

                // Update Embers
                let activeEmbers = 0;
                if (state.embersVisible) {
                    for (let i = 0; i < EMBER_COUNT; i++) {
                        const p = eData[i];
                        p.life += dt;

                        if (p.life > p.maxLife) {
                            p.life = 0;
                            p.y = Math.random() * 20;
                            const rFactor = getVortexRadius(p.y);
                            const r = rFactor * currentWidth + 0.5; // Spawn slightly outside
                            const angle = Math.random() * Math.PI * 2;
                            
                            p.x = r * Math.cos(angle);
                            p.z = r * Math.sin(angle);
                            
                            const speed = (1.0 + Math.random() * 2.0) * currentIntensity;
                            p.vx = Math.cos(angle) * speed;
                            p.vz = Math.sin(angle) * speed;
                            p.vy = -0.5 + Math.random() * 1.5;
                            
                            // Update color based on theme for embers too, or keep orange
                            const eColor = state.colorTheme === 'fire' ? new THREE.Color(0xff6600) : 
                                           state.colorTheme === 'blue' ? new THREE.Color(0x00aaff) : 
                                           new THREE.Color(0x88ff00);
                            eCol[i*3] = eColor.r; eCol[i*3+1] = eColor.g; eCol[i*3+2] = eColor.b;
                        }

                        if (p.life > 0) activeEmbers++;

                        p.x += p.vx * dt;
                        p.y += p.vy * dt;
                        p.z += p.vz * dt;
                        p.vy -= 0.5 * dt; // Gravity

                        ePos[i*3] = p.x;
                        ePos[i*3+1] = p.y;
                        ePos[i*3+2] = p.z;
                    }
                    emberGeo.attributes.position.needsUpdate = true;
                    emberGeo.attributes.customColor.needsUpdate = true;
                }
                state.emberCount = activeEmbers;

                // Update Click Bursts
                for (let i = 0; i < CLICK_COUNT; i++) {
                    const p = cData[i];
                    if (p.life < p.maxLife) {
                        p.life += dt;
                        p.x += p.vx * dt;
                        p.y += p.vy * dt;
                        p.z += p.vz * dt;
                        p.vy -= 5.0 * dt; // Stronger gravity for burst
                        
                        cPos[i*3] = p.x;
                        cPos[i*3+1] = p.y;
                        cPos[i*3+2] = p.z;
                    } else {
                        cPos[i*3+1] = -1000; // Hide
                    }
                }
                clickGeo.attributes.position.needsUpdate = true;

                // Update HUD
                ui.pCount.textContent = state.particleCount;
                ui.tHeight.textContent = state.tornadoMaxY.toFixed(1);
                
                // Light pulse effect
                pointLight.intensity = state.lightIntensity * currentIntensity * (1.0 + Math.sin(now * 0.01) * 0.1);
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
