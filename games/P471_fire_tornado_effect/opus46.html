<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fire Tornado</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    background: rgba(0, 0, 0, 0.7);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    pointer-events: none;
    min-width: 200px;
    border: 1px solid rgba(255, 100, 0, 0.3);
}

#hud span {
    color: #ff8844;
    font-weight: bold;
}

#controls {
    position: absolute;
    top: 200px;
    left: 10px;
    color: #fff;
    background: rgba(0, 0, 0, 0.7);
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 13px;
    min-width: 220px;
    border: 1px solid rgba(255, 100, 0, 0.3);
}

#controls label {
    display: block;
    margin-bottom: 4px;
    color: #ccc;
}

#controls input[type="range"] {
    width: 100%;
    margin-bottom: 12px;
    accent-color: #ff6600;
}

#controls select {
    width: 100%;
    padding: 5px;
    margin-bottom: 12px;
    background: rgba(30, 30, 30, 0.9);
    color: #fff;
    border: 1px solid #555;
    border-radius: 4px;
}

#controls button {
    width: 100%;
    padding: 8px;
    background: rgba(255, 100, 0, 0.3);
    color: #fff;
    border: 1px solid rgba(255, 100, 0, 0.5);
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    margin-bottom: 8px;
}

#controls button:hover {
    background: rgba(255, 100, 0, 0.5);
}

.control-group {
    margin-bottom: 4px;
}

.slider-value {
    float: right;
    color: #ff8844;
    font-weight: bold;
}

#shortcuts {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #888;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.6;
    border: 1px solid rgba(255, 100, 0, 0.2);
}

#shortcuts kbd {
    background: rgba(255, 255, 255, 0.1);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid #555;
}
</style>
</head>
<body>

<div id="hud">
    <div>FPS: <span id="fpsDisplay">0</span></div>
    <div>Particles: <span id="particleCount">0</span></div>
    <div>Tornado Height: <span id="tornadoHeight">0.0</span></div>
    <div>Intensity: <span id="intensityDisplay">1.0</span></div>
    <div>State: <span id="animState">playing</span></div>
</div>

<div id="controls">
    <div class="control-group">
        <label>Intensity <span class="slider-value" id="intensityVal">1.0</span></label>
        <input type="range" id="intensitySlider" min="0.1" max="3.0" step="0.1" value="1.0">
    </div>
    <div class="control-group">
        <label>Width <span class="slider-value" id="widthVal">1.0</span></label>
        <input type="range" id="widthSlider" min="0.5" max="3.0" step="0.1" value="1.0">
    </div>
    <div class="control-group">
        <label>Color Theme</label>
        <select id="colorTheme">
            <option value="fire">🔥 Fire (Yellow-Orange-Red)</option>
            <option value="blue">💎 Blue (Cyan-Blue-Purple)</option>
            <option value="green">🌿 Green (Yellow-Green-Dark)</option>
        </select>
    </div>
    <button id="toggleEmbers">Toggle Embers (ON)</button>
</div>

<div id="shortcuts">
    <kbd>R</kbd> Reset &nbsp; <kbd>P</kbd> Pause &nbsp; <kbd>Space</kbd> Burst &nbsp; <kbd>Click</kbd> Spawn ring
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    // ==================== SCENE SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 5, 0);
    controls.update();

    // Lights
    const ambientLight = new THREE.AmbientLight(0x331100, 0.3);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xff4400, 2.0, 50);
    pointLight.position.set(0, 5, 0);
    scene.add(pointLight);

    // Ground plane
    const groundGeom = new THREE.CircleGeometry(15, 64);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
    const ground = new THREE.Mesh(groundGeom, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // ==================== COLOR THEMES ====================
    const colorThemes = {
        fire: {
            bottom: new THREE.Color(1.0, 1.0, 0.2),   // bright yellow
            middle: new THREE.Color(1.0, 0.4, 0.0),    // orange
            top: new THREE.Color(0.5, 0.0, 0.0),       // dark red
            ember: new THREE.Color(0xff6600)
        },
        blue: {
            bottom: new THREE.Color(0.0, 1.0, 1.0),    // cyan
            middle: new THREE.Color(0.0, 0.3, 1.0),    // blue
            top: new THREE.Color(0.3, 0.0, 0.5),       // purple
            ember: new THREE.Color(0x4488ff)
        },
        green: {
            bottom: new THREE.Color(1.0, 1.0, 0.0),    // yellow
            middle: new THREE.Color(0.0, 0.8, 0.0),    // green
            top: new THREE.Color(0.0, 0.2, 0.0),       // dark green
            ember: new THREE.Color(0x44ff44)
        }
    };

    // ==================== PARTICLE TEXTURE ====================
    function createParticleTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
        gradient.addColorStop(0.7, 'rgba(255,200,100,0.3)');
        gradient.addColorStop(1, 'rgba(255,100,0,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 64, 64);
        const texture = new THREE.CanvasTexture(canvas);
        return texture;
    }

    const particleTexture = createParticleTexture();

    // ==================== VORTEX PROFILE ====================
    function getVortexRadius(normalizedY, widthMult) {
        // normalizedY: 0 at bottom, 1 at top (y=25)
        // wider at bottom (~3), narrow at middle (~1.5), wider at top (~2.5)
        const t = normalizedY;
        let radius;
        if (t < 0.4) {
            // bottom to middle: 3 -> 1.5
            const s = t / 0.4;
            radius = 3.0 - 1.5 * s;
        } else {
            // middle to top: 1.5 -> 2.5
            const s = (t - 0.4) / 0.6;
            radius = 1.5 + 1.0 * s;
        }
        return radius * widthMult;
    }

    // ==================== MAIN TORNADO PARTICLES ====================
    const MAIN_COUNT = 3000;
    const EMBER_COUNT = 500;
    const MAX_Y = 25;

    // Main particle data
    const mainPositions = new Float32Array(MAIN_COUNT * 3);
    const mainColors = new Float32Array(MAIN_COUNT * 3);
    const mainSizes = new Float32Array(MAIN_COUNT);

    // Custom attributes stored in arrays
    const mainAngles = new Float32Array(MAIN_COUNT);
    const mainRadii = new Float32Array(MAIN_COUNT);
    const mainVelY = new Float32Array(MAIN_COUNT);
    const mainAngularSpeed = new Float32Array(MAIN_COUNT);
    const mainLifetime = new Float32Array(MAIN_COUNT);
    const mainMaxLifetime = new Float32Array(MAIN_COUNT);
    const mainActive = new Uint8Array(MAIN_COUNT);

    function initMainParticle(i, widthMult) {
        const angle = Math.random() * Math.PI * 2;
        const baseRadius = (1.5 + Math.random() * 1.5) * widthMult;
        mainAngles[i] = angle;
        mainRadii[i] = baseRadius;
        mainPositions[i * 3] = Math.cos(angle) * baseRadius;
        mainPositions[i * 3 + 1] = Math.random() * 0.5;
        mainPositions[i * 3 + 2] = Math.sin(angle) * baseRadius;
        mainVelY[i] = 2.0 + Math.random() * 3.0;
        mainAngularSpeed[i] = 1.5 + Math.random() * 2.5;
        mainLifetime[i] = 0;
        mainMaxLifetime[i] = 3.0 + Math.random() * 4.0;
        mainSizes[i] = 15 + Math.random() * 25;
        mainActive[i] = 1;
        mainColors[i * 3] = 1.0;
        mainColors[i * 3 + 1] = 1.0;
        mainColors[i * 3 + 2] = 0.2;
    }

    const mainGeometry = new THREE.BufferGeometry();
    for (let i = 0; i < MAIN_COUNT; i++) {
        initMainParticle(i, 1.0);
        // Stagger initial lifetimes for a full tornado on start
        mainLifetime[i] = Math.random() * mainMaxLifetime[i];
        const y = mainVelY[i] * mainLifetime[i];
        if (y < MAX_Y) {
            const normalizedY = y / MAX_Y;
            const r = getVortexRadius(normalizedY, 1.0);
            mainPositions[i * 3] = Math.cos(mainAngles[i] + mainAngularSpeed[i] * mainLifetime[i]) * r;
            mainPositions[i * 3 + 1] = y;
            mainPositions[i * 3 + 2] = Math.sin(mainAngles[i] + mainAngularSpeed[i] * mainLifetime[i]) * r;
        }
    }

    mainGeometry.setAttribute('position', new THREE.BufferAttribute(mainPositions, 3));
    mainGeometry.setAttribute('color', new THREE.BufferAttribute(mainColors, 3));
    mainGeometry.setAttribute('size', new THREE.BufferAttribute(mainSizes, 1));

    const mainMaterial = new THREE.ShaderMaterial({
        uniforms: {
            uTexture: { value: particleTexture }
        },
        vertexShader: `
            attribute float size;
            attribute vec3 color;
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (200.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
                vAlpha = 1.0;
            }
        `,
        fragmentShader: `
            uniform sampler2D uTexture;
            varying vec3 vColor;
            void main() {
                vec4 texColor = texture2D(uTexture, gl_PointCoord);
                gl_FragColor = vec4(vColor * texColor.rgb, texColor.a);
            }
        `,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        vertexColors: true
    });

    const mainPoints = new THREE.Points(mainGeometry, mainMaterial);
    scene.add(mainPoints);

    // ==================== EMBER PARTICLES ====================
    const emberPositions = new Float32Array(EMBER_COUNT * 3);
    const emberColors = new Float32Array(EMBER_COUNT * 3);
    const emberSizes = new Float32Array(EMBER_COUNT);

    const emberVelX = new Float32Array(EMBER_COUNT);
    const emberVelY = new Float32Array(EMBER_COUNT);
    const emberVelZ = new Float32Array(EMBER_COUNT);
    const emberLifetime = new Float32Array(EMBER_COUNT);
    const emberMaxLifetime = new Float32Array(EMBER_COUNT);
    const emberActive = new Uint8Array(EMBER_COUNT);

    function initEmberParticle(i, widthMult) {
        const angle = Math.random() * Math.PI * 2;
        const height = 2 + Math.random() * 15;
        const normalizedY = height / MAX_Y;
        const r = getVortexRadius(normalizedY, widthMult);
        emberPositions[i * 3] = Math.cos(angle) * r;
        emberPositions[i * 3 + 1] = height;
        emberPositions[i * 3 + 2] = Math.sin(angle) * r;

        const outSpeed = 1.0 + Math.random() * 3.0;
        emberVelX[i] = Math.cos(angle) * outSpeed + (Math.random() - 0.5) * 2;
        emberVelY[i] = (Math.random() - 0.3) * 2.0;
        emberVelZ[i] = Math.sin(angle) * outSpeed + (Math.random() - 0.5) * 2;

        emberLifetime[i] = 0;
        emberMaxLifetime[i] = 3.0 + Math.random() * 5.0;
        emberSizes[i] = 4 + Math.random() * 8;
        emberActive[i] = 1;

        emberColors[i * 3] = 1.0;
        emberColors[i * 3 + 1] = 0.4;
        emberColors[i * 3 + 2] = 0.0;
    }

    const emberGeometry = new THREE.BufferGeometry();
    for (let i = 0; i < EMBER_COUNT; i++) {
        initEmberParticle(i, 1.0);
        emberLifetime[i] = Math.random() * emberMaxLifetime[i];
    }

    emberGeometry.setAttribute('position', new THREE.BufferAttribute(emberPositions, 3));
    emberGeometry.setAttribute('color', new THREE.BufferAttribute(emberColors, 3));
    emberGeometry.setAttribute('size', new THREE.BufferAttribute(emberSizes, 1));

    const emberMaterial = new THREE.ShaderMaterial({
        uniforms: {
            uTexture: { value: particleTexture }
        },
        vertexShader: `
            attribute float size;
            attribute vec3 color;
            varying vec3 vColor;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (200.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            uniform sampler2D uTexture;
            varying vec3 vColor;
            void main() {
                vec4 texColor = texture2D(uTexture, gl_PointCoord);
                gl_FragColor = vec4(vColor * texColor.rgb, texColor.a * 0.7);
            }
        `,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        vertexColors: true
    });

    const emberPoints = new THREE.Points(emberGeometry, emberMaterial);
    scene.add(emberPoints);

    // ==================== TEMPORARY PARTICLES (click spawned) ====================
    const TEMP_MAX = 500;
    const tempPositions = new Float32Array(TEMP_MAX * 3);
    const tempColors = new Float32Array(TEMP_MAX * 3);
    const tempSizes = new Float32Array(TEMP_MAX);
    const tempVelX = new Float32Array(TEMP_MAX);
    const tempVelY = new Float32Array(TEMP_MAX);
    const tempVelZ = new Float32Array(TEMP_MAX);
    const tempLifetime = new Float32Array(TEMP_MAX);
    const tempMaxLifetime = new Float32Array(TEMP_MAX);
    const tempActive = new Uint8Array(TEMP_MAX);
    let tempCount = 0;

    const tempGeometry = new THREE.BufferGeometry();
    tempGeometry.setAttribute('position', new THREE.BufferAttribute(tempPositions, 3));
    tempGeometry.setAttribute('color', new THREE.BufferAttribute(tempColors, 3));
    tempGeometry.setAttribute('size', new THREE.BufferAttribute(tempSizes, 1));

    const tempMaterial = new THREE.ShaderMaterial({
        uniforms: {
            uTexture: { value: particleTexture }
        },
        vertexShader: `
            attribute float size;
            attribute vec3 color;
            varying vec3 vColor;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (200.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
        fragmentShader: `
            uniform sampler2D uTexture;
            varying vec3 vColor;
            void main() {
                vec4 texColor = texture2D(uTexture, gl_PointCoord);
                gl_FragColor = vec4(vColor * texColor.rgb, texColor.a);
            }
        `,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        vertexColors: true
    });

    const tempPoints = new THREE.Points(tempGeometry, tempMaterial);
    scene.add(tempPoints);

    // ==================== STATE ====================
    let intensity = 1.0;
    let widthMult = 1.0;
    let colorTheme = 'fire';
    let isPaused = false;
    let isBursting = false;
    let embersVisible = true;
    let frameCount = 0;
    let fps = 0;
    let fpsFrames = 0;
    let fpsTime = 0;
    let tornadoMaxY = 0;

    window.__3D_STATE__ = {
        particleCount: 0,
        emberCount: 0,
        embersVisible: true,
        intensity: 1.0,
        width: 1.0,
        colorTheme: 'fire',
        isPaused: false,
        isBursting: false,
        tornadoMaxY: 0,
        fps: 0,
        groundPlaneExists: true,
        cameraDistance: 0,
        totalParticlesSystems: 3,
        frameCount: 0,
        lightIntensity: 2.0
    };

    // ==================== UI ELEMENTS ====================
    const intensitySlider = document.getElementById('intensitySlider');
    const widthSlider = document.getElementById('widthSlider');
    const colorThemeSelect = document.getElementById('colorTheme');
    const toggleEmbersBtn = document.getElementById('toggleEmbers');
    const fpsDisplay = document.getElementById('fpsDisplay');
    const particleCountDisplay = document.getElementById('particleCount');
    const tornadoHeightDisplay = document.getElementById('tornadoHeight');
    const intensityDisplay = document.getElementById('intensityDisplay');
    const animStateDisplay = document.getElementById('animState');
    const intensityVal = document.getElementById('intensityVal');
    const widthVal = document.getElementById('widthVal');

    intensitySlider.addEventListener('input', (e) => {
        intensity = parseFloat(e.target.value);
        intensityVal.textContent = intensity.toFixed(1);
    });

    widthSlider.addEventListener('input', (e) => {
        widthMult = parseFloat(e.target.value);
        widthVal.textContent = widthMult.toFixed(1);
    });

    colorThemeSelect.addEventListener('change', (e) => {
        colorTheme = e.target.value;
    });

    toggleEmbersBtn.addEventListener('click', () => {
        embersVisible = !embersVisible;
        emberPoints.visible = embersVisible;
        toggleEmbersBtn.textContent = `Toggle Embers (${embersVisible ? 'ON' : 'OFF'})`;
    });

    // ==================== KEYBOARD ====================
    document.addEventListener('keydown', (e) => {
        if (e.key === 'r' || e.key === 'R') {
            // Reset all
            intensity = 1.0;
            widthMult = 1.0;
            colorTheme = 'fire';
            isPaused = false;
            isBursting = false;
            embersVisible = true;
            emberPoints.visible = true;

            intensitySlider.value = 1.0;
            widthSlider.value = 1.0;
            colorThemeSelect.value = 'fire';
            intensityVal.textContent = '1.0';
            widthVal.textContent = '1.0';
            toggleEmbersBtn.textContent = 'Toggle Embers (ON)';

            for (let i = 0; i < MAIN_COUNT; i++) {
                initMainParticle(i, 1.0);
            }
            for (let i = 0; i < EMBER_COUNT; i++) {
                initEmberParticle(i, 1.0);
            }
            tempCount = 0;
            for (let i = 0; i < TEMP_MAX; i++) {
                tempActive[i] = 0;
                tempPositions[i * 3 + 1] = -100;
            }
        }

        if (e.key === 'p' || e.key === 'P') {
            isPaused = !isPaused;
        }

        if (e.key === ' ') {
            e.preventDefault();
            if (!isBursting) {
                isBursting = true;
                setTimeout(() => { isBursting = false; }, 2000);
            }
        }
    });

    // ==================== MOUSE CLICK ====================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(ground);

        let spawnPos = new THREE.Vector3(0, 0, 0);
        if (intersects.length > 0) {
            spawnPos = intersects[0].point;
        }

        // Spawn ring of 50 particles
        const theme = colorThemes[colorTheme];
        for (let j = 0; j < 50; j++) {
            let idx = -1;
            // Find inactive slot or use next
            for (let k = 0; k < TEMP_MAX; k++) {
                if (!tempActive[k]) { idx = k; break; }
            }
            if (idx === -1) {
                idx = tempCount % TEMP_MAX;
            }
            tempCount = Math.max(tempCount, idx + 1);
            if (tempCount > TEMP_MAX) tempCount = TEMP_MAX;

            const angle = (j / 50) * Math.PI * 2;
            const ringR = 1.5;
            tempPositions[idx * 3] = spawnPos.x + Math.cos(angle) * ringR;
            tempPositions[idx * 3 + 1] = 0.1;
            tempPositions[idx * 3 + 2] = spawnPos.z + Math.sin(angle) * ringR;

            tempVelX[idx] = Math.cos(angle) * 2 + (Math.random() - 0.5);
            tempVelY[idx] = 3 + Math.random() * 5;
            tempVelZ[idx] = Math.sin(angle) * 2 + (Math.random() - 0.5);

            tempLifetime[idx] = 0;
            tempMaxLifetime[idx] = 1.5 + Math.random() * 2.0;
            tempSizes[idx] = 10 + Math.random() * 20;
            tempActive[idx] = 1;

            tempColors[idx * 3] = theme.bottom.r;
            tempColors[idx * 3 + 1] = theme.bottom.g;
            tempColors[idx * 3 + 2] = theme.bottom.b;
        }

        tempGeometry.attributes.position.needsUpdate = true;
        tempGeometry.attributes.color.needsUpdate = true;
        tempGeometry.attributes.size.needsUpdate = true;
        tempGeometry.setDrawRange(0, tempCount);
    });

    // ==================== RESIZE ====================
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==================== ANIMATION ====================
    let lastTime = performance.now();
    const clock = new THREE.Clock();

    function getParticleColor(normalizedY, theme) {
        const colors = colorThemes[theme];
        const r = new THREE.Color();
        if (normalizedY < 0.5) {
            r.lerpColors(colors.bottom, colors.middle, normalizedY * 2);
        } else {
            r.lerpColors(colors.middle, colors.top, (normalizedY - 0.5) * 2);
        }
        return r;
    }

    function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;

        // FPS
        fpsFrames++;
        fpsTime += dt;
        if (fpsTime >= 0.5) {
            fps = Math.round(fpsFrames / fpsTime);
            fpsFrames = 0;
            fpsTime = 0;
        }

        if (!isPaused) {
            const effectiveIntensity = isBursting ? intensity * 2 : intensity;
            tornadoMaxY = 0;
            let activeMainCount = 0;

            // Update main tornado particles
            for (let i = 0; i < MAIN_COUNT; i++) {
                if (!mainActive[i]) continue;

                mainLifetime[i] += dt;
                const y = mainPositions[i * 3 + 1];

                if (mainLifetime[i] > mainMaxLifetime[i] || y > MAX_Y) {
                    initMainParticle(i, widthMult);
                    continue;
                }

                // Update Y
                mainPositions[i * 3 + 1] += mainVelY[i] * effectiveIntensity * dt;
                const newY = mainPositions[i * 3 + 1];

                if (newY > tornadoMaxY) tornadoMaxY = newY;

                // Update angle
                const heightFactor = 1.0 + (newY / MAX_Y) * 2.0;
                mainAngles[i] += mainAngularSpeed[i] * effectiveIntensity * heightFactor * dt;

                // Get vortex radius at this height
                const normalizedY = Math.min(newY / MAX_Y, 1.0);
                const vortexR = getVortexRadius(normalizedY, widthMult);

                // Add some turbulence
                const turbulence = Math.sin(mainLifetime[i] * 3 + i) * 0.3;
                const r = vortexR + turbulence;

                mainPositions[i * 3] = Math.cos(mainAngles[i]) * r;
                mainPositions[i * 3 + 2] = Math.sin(mainAngles[i]) * r;

                // Color based on height
                const col = getParticleColor(normalizedY, colorTheme);
                // Fade out near end of lifetime
                const lifeFade = 1.0 - Math.max(0, (mainLifetime[i] - mainMaxLifetime[i] * 0.7) / (mainMaxLifetime[i] * 0.3));
                mainColors[i * 3] = col.r * Math.max(0.1, lifeFade);
                mainColors[i * 3 + 1] = col.g * Math.max(0.1, lifeFade);
                mainColors[i * 3 + 2] = col.b * Math.max(0.1, lifeFade);

                // Size variation with height
                mainSizes[i] = (15 + Math.random() * 5) * (1.0 - normalizedY * 0.3);

                activeMainCount++;
            }

            mainGeometry.attributes.position.needsUpdate = true;
            mainGeometry.attributes.color.needsUpdate = true;
            mainGeometry.attributes.size.needsUpdate = true;

            // Update ember particles
            let activeEmberCount = 0;
            if (embersVisible) {
                const emberTheme = colorThemes[colorTheme].ember;
                for (let i = 0; i < EMBER_COUNT; i++) {
                    if (!emberActive[i]) continue;

                    emberLifetime[i] += dt;

                    if (emberLifetime[i] > emberMaxLifetime[i] || emberPositions[i * 3 + 1] < -1) {
                        initEmberParticle(i, widthMult);
                        continue;
                    }

                    emberPositions[i * 3] += emberVelX[i] * effectiveIntensity * dt;
                    emberPositions[i * 3 + 1] += emberVelY[i] * dt;
                    emberPositions[i * 3 + 2] += emberVelZ[i] * effectiveIntensity * dt;

                    // Gravity
                    emberVelY[i] -= 0.5 * dt;

                    // Fade
                    const fade = 1.0 - (emberLifetime[i] / emberMaxLifetime[i]);
                    emberColors[i * 3] = emberTheme.r * fade;
                    emberColors[i * 3 + 1] = emberTheme.g * fade;
                    emberColors[i * 3 + 2] = emberTheme.b * fade;

                    activeEmberCount++;
                }

                emberGeometry.attributes.position.needsUpdate = true;
                emberGeometry.attributes.color.needsUpdate = true;
                emberGeometry.attributes.size.needsUpdate = true;
            }

            // Update temp particles
            for (let i = 0; i < tempCount; i++) {
                if (!tempActive[i]) continue;

                tempLifetime[i] += dt;
                if (tempLifetime[i] > tempMaxLifetime[i]) {
                    tempActive[i] = 0;
                    tempPositions[i * 3 + 1] = -100;
                    continue;
                }

                tempPositions[i * 3] += tempVelX[i] * dt;
                tempPositions[i * 3 + 1] += tempVelY[i] * dt;
                tempPositions[i * 3 + 2] += tempVelZ[i] * dt;
                tempVelY[i] -= 2.0 * dt;

                const fade = 1.0 - (tempLifetime[i] / tempMaxLifetime[i]);
                const theme = colorThemes[colorTheme];
                const col = getParticleColor(1.0 - fade, colorTheme);
                tempColors[i * 3] = col.r * fade;
                tempColors[i * 3 + 1] = col.g * fade;
                tempColors[i * 3 + 2] = col.b * fade;
            }

            tempGeometry.attributes.position.needsUpdate = true;
            tempGeometry.attributes.color.needsUpdate = true;
            tempGeometry.attributes.size.needsUpdate = true;
            tempGeometry.setDrawRange(0, tempCount);

            // Flicker point light
            pointLight.intensity = 2.0 * effectiveIntensity + Math.sin(now * 0.01) * 0.3;
            pointLight.color.copy(colorThemes[colorTheme].middle);

            // Update HUD
            fpsDisplay.textContent = fps;
            particleCountDisplay.textContent = activeMainCount + (embersVisible ? activeEmberCount : 0);
            tornadoHeightDisplay.textContent = tornadoMaxY.toFixed(1);
            intensityDisplay.textContent = effectiveIntensity.toFixed(1);
            animStateDisplay.textContent = 'playing';

            // Update state
            const camDist = camera.position.length();
            let pointsSystems = 0;
            scene.traverse((obj) => { if (obj instanceof THREE.Points) pointsSystems++; });

            window.__3D_STATE__.particleCount = activeMainCount;
            window.__3D_STATE__.emberCount = embersVisible ? activeEmberCount : 0;
            window.__3D_STATE__.embersVisible = embersVisible;
            window.__3D_STATE__.intensity = intensity;
            window.__3D_STATE__.width = widthMult;
            window.__3D_STATE__.colorTheme = colorTheme;
            window.__3D_STATE__.isPaused = false;
            window.__3D_STATE__.isBursting = isBursting;
            window.__3D_STATE__.tornadoMaxY = tornadoMaxY;
            window.__3D_STATE__.fps = fps;
            window.__3D_STATE__.groundPlaneExists = true;
            window.__3D_STATE__.cameraDistance = camDist;
            window.__3D_STATE__.totalParticlesSystems = pointsSystems;
            window.__3D_STATE__.frameCount = frameCount;
            window.__3D_STATE__.lightIntensity = pointLight.intensity;
        } else {
            animStateDisplay.textContent = 'paused';
            window.__3D_STATE__.isPaused = true;

            // Still update non-animation state
            const camDist = camera.position.length();
            let pointsSystems = 0;
            scene.traverse((obj) => { if (obj instanceof THREE.Points) pointsSystems++; });
            window.__3D_STATE__.cameraDistance = camDist;
            window.__3D_STATE__.totalParticlesSystems = pointsSystems;
            window.__3D_STATE__.frameCount = frameCount;
            window.__3D_STATE__.fps = fps;
            window.__3D_STATE__.embersVisible = embersVisible;
            window.__3D_STATE__.intensity = intensity;
            window.__3D_STATE__.width = widthMult;
            window.__3D_STATE__.colorTheme = colorTheme;
            window.__3D_STATE__.lightIntensity = pointLight.intensity;
        }

        frameCount++;
        controls.update();
        renderer.render(scene, camera);
    }

    animate();
})();
</script>
</body>
</html>
