<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Ski Downhill Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #9fd3ff;
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }

    .hud {
      position: absolute;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      font-size: 20px;
      font-weight: bold;
      z-index: 10;
      user-select: none;
      pointer-events: none;
    }

    #hud-speed { top: 12px; left: 16px; }
    #hud-timer { top: 12px; left: 50%; transform: translateX(-50%); }
    #hud-score { top: 12px; right: 16px; }
    #hud-gates { bottom: 16px; left: 50%; transform: translateX(-50%); }
    #hud-collisions { top: 48px; right: 16px; }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.25);
      text-shadow: 0 2px 6px rgba(0,0,0,0.9);
      z-index: 20;
      font-size: 32px;
      font-weight: bold;
      padding: 20px;
      white-space: pre-line;
    }

    #controls {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      color: white;
      font-size: 14px;
      background: rgba(0,0,0,0.25);
      padding: 10px 12px;
      border-radius: 8px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud-speed" class="hud">Speed: 0.00</div>
  <div id="hud-timer" class="hud">00:00.00</div>
  <div id="hud-score" class="hud">Score: 0</div>
  <div id="hud-gates" class="hud">0/20</div>
  <div id="hud-collisions" class="hud">Crashes: 0</div>

  <div id="overlay">Press SPACE to Start</div>

  <div id="controls">
    SPACE: Start<br>
    LEFT / A: Move left<br>
    RIGHT / D: Move right<br>
    P: Pause<br>
    R: Reset
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9fd3ff);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(20, 40, 20);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const slopeAngle = THREE.MathUtils.degToRad(15);
    const slopeLength = 520;
    const slopeWidth = 50;

    const snowMat = new THREE.MeshPhongMaterial({
      color: 0xeaf7ff,
      shininess: 10
    });

    const terrain = new THREE.Mesh(
      new THREE.PlaneGeometry(slopeWidth, slopeLength, 10, 50),
      snowMat
    );
    terrain.rotation.x = -Math.PI / 2 - slopeAngle;
    terrain.position.set(0, 0, -slopeLength / 2);
    terrain.receiveShadow = true;
    scene.add(terrain);

    const finishLine = new THREE.Mesh(
      new THREE.BoxGeometry(14, 0.3, 2),
      new THREE.MeshPhongMaterial({ color: 0xffd400 })
    );
    finishLine.castShadow = true;
    scene.add(finishLine);

    const finishZ = -450;

    function getSurfaceY(z) {
      return Math.tan(slopeAngle) * (-z);
    }

    function updateFinishLine() {
      finishLine.position.set(0, getSurfaceY(finishZ) + 0.2, finishZ);
    }
    updateFinishLine();

    const skierGroup = new THREE.Group();
    scene.add(skierGroup);

    let skierModel = null;
    let skierLoaded = false;

    const fallbackSkier = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 1.5, 0.6),
      new THREE.MeshPhongMaterial({ color: 0x3366ff })
    );
    fallbackSkier.castShadow = true;
    skierGroup.add(fallbackSkier);

    const loader = new GLTFLoader();
    loader.load(
      'soldier.glb',
      (gltf) => {
        if (fallbackSkier.parent) skierGroup.remove(fallbackSkier);

        skierModel = gltf.scene;
        skierModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        const box = new THREE.Box3().setFromObject(skierModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const height = Math.max(size.y, 0.001);
        const scale = 1.5 / height;
        skierModel.scale.setScalar(scale);

        const newBox = new THREE.Box3().setFromObject(skierModel);
        const minY = newBox.min.y;
        skierModel.position.y -= minY;

        skierGroup.add(skierModel);
        skierLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load soldier.glb, using fallback skier.', err);
      }
    );

    const gates = [];
    const trees = [];
    const gateZs = [];
    const totalGates = 20;

    function createGate(z) {
      const gateGroup = new THREE.Group();
      const poleGeo = new THREE.CylinderGeometry(0.15, 0.15, 3, 10);
      const poleMat = new THREE.MeshPhongMaterial({ color: 0xff2222 });

      const leftPole = new THREE.Mesh(poleGeo, poleMat);
      const rightPole = new THREE.Mesh(poleGeo, poleMat);
      leftPole.castShadow = true;
      rightPole.castShadow = true;

      const gateX = (Math.random() - 0.5) * 12;
      const leftX = gateX - 3;
      const rightX = gateX + 3;
      const y = getSurfaceY(z) + 1.5;

      leftPole.position.set(leftX, y, z);
      rightPole.position.set(rightX, y, z);

      gateGroup.add(leftPole, rightPole);
      scene.add(gateGroup);

      return {
        group: gateGroup,
        z,
        leftX,
        rightX,
        passed: false,
        centerX: gateX
      };
    }

    for (let i = 1; i <= totalGates; i++) {
      const z = -20 * i;
      gateZs.push(z);
      gates.push(createGate(z));
    }

    function createTree(x, z) {
      const tree = new THREE.Group();

      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.25, 1.2, 8),
        new THREE.MeshPhongMaterial({ color: 0x8b5a2b })
      );
      trunk.castShadow = true;

      const leaves = new THREE.Mesh(
        new THREE.ConeGeometry(1.0, 2.5, 10),
        new THREE.MeshPhongMaterial({ color: 0x1f8f3a })
      );
      leaves.castShadow = true;

      const y = getSurfaceY(z);
      trunk.position.set(x, y + 0.6, z);
      leaves.position.set(x, y + 2.2, z);

      tree.add(trunk, leaves);
      scene.add(tree);

      return {
        group: tree,
        x,
        z,
        radius: 0.9
      };
    }

    for (let i = 0; i < 10; i++) {
      let z, x, valid = false, tries = 0;
      while (!valid && tries < 100) {
        z = -30 - Math.random() * 360;
        x = -14 + Math.random() * 28;
        valid = true;

        for (const gate of gates) {
          if (Math.abs(z - gate.z) < 6 && x > gate.leftX - 1 && x < gate.rightX + 1) {
            valid = false;
            break;
          }
        }
        tries++;
      }
      trees.push(createTree(x, z));
    }

    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.code === 'Space') {
        if (gameState === 'ready') startGame();
      }
      if (e.key.toLowerCase() === 'p') {
        if (gameState === 'playing') {
          gameState = 'paused';
        } else if (gameState === 'paused') {
          gameState = 'playing';
        }
        updateOverlay();
      }
      if (e.key.toLowerCase() === 'r') {
        resetGame();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    let gameState = 'ready';
    let speed = 0;
    let score = 0;
    let gatesPassed = 0;
    let gatesMissed = 0;
    let collisions = 0;
    let elapsedTime = 0;
    let invincibleFrames = 0;
    let previousPlayerZ = 0;

    const player = {
      x: 0,
      z: 0
    };

    function resetGame() {
      gameState = 'ready';
      speed = 0;
      score = 0;
      gatesPassed = 0;
      gatesMissed = 0;
      collisions = 0;
      elapsedTime = 0;
      invincibleFrames = 0;
      player.x = 0;
      player.z = 0;
      previousPlayerZ = 0;

      for (const gate of gates) gate.passed = false;

      updateOverlay();
      updateHUD();
      updatePlayerTransform();
    }

    function startGame() {
      gameState = 'playing';
      updateOverlay();
    }

    function updateOverlay() {
      const overlay = document.getElementById('overlay');
      if (gameState === 'ready') {
        overlay.style.display = 'flex';
        overlay.textContent = 'Press SPACE to Start';
      } else if (gameState === 'paused') {
        overlay.style.display = 'flex';
        overlay.textContent = 'Paused';
      } else if (gameState === 'finished') {
        overlay.style.display = 'flex';
        overlay.textContent =
          `Finished!\nTime: ${formatTime(elapsedTime)}\nScore: ${score}\nGates Passed: ${gatesPassed}/${totalGates}\nPress R to Reset`;
      } else if (gameState === 'crashed') {
        overlay.style.display = 'flex';
        overlay.textContent =
          `Too many crashes!\nScore: ${score}\nTime: ${formatTime(elapsedTime)}\nPress R to Reset`;
      } else {
        overlay.style.display = 'none';
      }
    }

    function formatTime(t) {
      const mins = Math.floor(t / 60);
      const secs = Math.floor(t % 60);
      const cs = Math.floor((t - Math.floor(t)) * 100);
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
    }

    function updateHUD() {
      document.getElementById('hud-speed').textContent = `Speed: ${speed.toFixed(2)}`;
      document.getElementById('hud-timer').textContent = formatTime(elapsedTime);
      document.getElementById('hud-score').textContent = `Score: ${score}`;
      document.getElementById('hud-gates').textContent = `${gatesPassed}/${totalGates}`;
      document.getElementById('hud-collisions').textContent = `Crashes: ${collisions}`;
    }

    function updatePlayerTransform() {
      const y = getSurfaceY(player.z);
      skierGroup.position.set(player.x, y, player.z);
      skierGroup.rotation.set(0, Math.PI, 0);

      if (skierLoaded && skierModel) {
        skierModel.rotation.y = 0;
      }

      if (invincibleFrames > 0) {
        skierGroup.traverse(obj => {
          if (obj.isMesh) obj.visible = Math.floor(invincibleFrames / 5) % 2 === 0;
        });
      } else {
        skierGroup.traverse(obj => {
          if (obj.isMesh) obj.visible = true;
        });
      }
    }

    function updateCamera() {
      const y = getSurfaceY(player.z);
      const camTarget = new THREE.Vector3(player.x, y + 2.0, player.z - 8);
      const camPos = new THREE.Vector3(player.x, y + 6.5, player.z + 12);

      camera.position.lerp(camPos, 0.12);
      camera.lookAt(camTarget);
    }

    function checkTreeCollisions() {
      if (invincibleFrames > 0) return;

      const playerRadius = 0.7;
      for (const tree of trees) {
        const dx = player.x - tree.x;
        const dz = player.z - tree.z;
        const distSq = dx * dx + dz * dz;
        const hitDist = playerRadius + tree.radius;
        if (distSq < hitDist * hitDist) {
          speed *= 0.5;
          collisions++;
          invincibleFrames = 60;
          if (collisions >= 5) {
            gameState = 'crashed';
            updateOverlay();
          }
          break;
        }
      }
    }

    function checkGates() {
      for (const gate of gates) {
        if (!gate.passed && previousPlayerZ > gate.z && player.z <= gate.z) {
          gate.passed = true;
          if (player.x > gate.leftX && player.x < gate.rightX) {
            gatesPassed++;
            score += 50;
          } else {
            gatesMissed++;
          }
        }
      }
    }

    function gameUpdate() {
      if (gameState === 'playing') {
        elapsedTime += 1 / 60;
        previousPlayerZ = player.z;

        speed += 0.02;
        if (speed > 2.0) speed = 2.0;
        speed *= 0.998;

        if (keys['arrowleft'] || keys['a']) player.x -= 0.15;
        if (keys['arrowright'] || keys['d']) player.x += 0.15;
        player.x = THREE.MathUtils.clamp(player.x, -15, 15);

        player.z -= speed;

        if (invincibleFrames > 0) invincibleFrames--;

        checkTreeCollisions();
        checkGates();

        if (player.z <= finishZ) {
          gameState = 'finished';
          updateOverlay();
        }
      }

      updatePlayerTransform();
      updateCamera();
      updateHUD();

      window.__3D_STATE__ = {
        gameState,
        speed,
        score,
        gatesPassed,
        gatesMissed,
        totalGates,
        collisions,
        playerX: player.x,
        playerZ: player.z,
        elapsedTime,
        skierLoaded,
        obstacleCount: trees.length
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      gameUpdate();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetGame();
    animate();
  </script>
</body>
</html>
