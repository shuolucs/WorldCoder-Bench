<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 客厅漫游</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }
    canvas { display: block; }

    #hud {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0,0,0,0.45);
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.6;
      font-size: 14px;
      min-width: 220px;
      user-select: none;
    }
    #help {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0,0,0,0.45);
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.6;
      font-size: 13px;
      max-width: 360px;
    }
    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 14px;
      height: 14px;
      margin-left: -7px;
      margin-top: -7px;
      z-index: 9;
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.9);
    }
    #crosshair::before {
      left: 6px;
      top: 0;
      width: 2px;
      height: 14px;
    }
    #crosshair::after {
      left: 0;
      top: 6px;
      width: 14px;
      height: 2px;
    }
    #lockTip {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      color: white;
      background: rgba(0,0,0,0.35);
      text-align: center;
      cursor: pointer;
    }
    #lockTip .panel {
      background: rgba(20,20,20,0.8);
      padding: 20px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>相机位置: <span id="camPos">0, 0, 0</span></div>
    <div>家具数量: <span id="furnitureCount">0</span></div>
    <div>开启光源数: <span id="lightsOn">0</span></div>
  </div>

  <div id="help">
    单击页面进入漫游。<br>
    WASD 移动，鼠标查看。<br>
    再次单击：可点击落地灯切换开关、点击电视屏幕切换开关。<br>
    ESC 退出鼠标锁定。
  </div>

  <div id="crosshair"></div>

  <div id="lockTip">
    <div class="panel">
      <div style="font-size:20px; margin-bottom:8px;">进入 3D 客厅漫游</div>
      <div>点击此处锁定鼠标</div>
    </div>
  </div>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    const ROOM = {
      minX: 0,
      maxX: 8,
      minZ: 0,
      maxZ: 6,
      floorY: 0,
      ceilY: 3
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xaec6d8);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(1.2, 1.68, 1.2);
    window.__fpCamera__ = camera;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new PointerLockControls(camera, document.body);
    scene.add(controls.getObject());

    const lockTip = document.getElementById('lockTip');
    lockTip.addEventListener('click', () => controls.lock());
    controls.addEventListener('lock', () => lockTip.style.display = 'none');
    controls.addEventListener('unlock', () => lockTip.style.display = 'flex');

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
    scene.add(ambientLight);

    const ceilingLight = new THREE.PointLight(0xfff4d6, 1.2, 16, 2);
    ceilingLight.position.set(4, 2.75, 3);
    ceilingLight.castShadow = true;
    ceilingLight.shadow.mapSize.set(1024, 1024);
    scene.add(ceilingLight);

    const ceilingLightMesh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.18, 0.18, 0.08, 24),
      new THREE.MeshStandardMaterial({ color: 0xf5f0dc, emissive: 0x665533, emissiveIntensity: 0.4 })
    );
    ceilingLightMesh.position.copy(ceilingLight.position);
    scene.add(ceilingLightMesh);

    const floorMat = new THREE.MeshStandardMaterial({ color: 0x9b6b3f, roughness: 0.75, metalness: 0.05 });
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xe7e2da, roughness: 0.95 });
    const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xf3f3f0, roughness: 1.0 });

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(8, 6), floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(4, 0, 3);
    floor.receiveShadow = true;
    scene.add(floor);

    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(8, 6), ceilingMat);
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.set(4, 3, 3);
    scene.add(ceiling);

    const wallThickness = 0.08;

    const wall1 = new THREE.Mesh(new THREE.BoxGeometry(8, 3, wallThickness), wallMat);
    wall1.position.set(4, 1.5, 0);
    scene.add(wall1);

    const wall2 = new THREE.Mesh(new THREE.BoxGeometry(8, 3, wallThickness), wallMat);
    wall2.position.set(4, 1.5, 6);
    scene.add(wall2);

    const wall3 = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, 3, 6), wallMat);
    wall3.position.set(0, 1.5, 3);
    scene.add(wall3);

    const wall4 = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, 3, 6), wallMat);
    wall4.position.set(8, 1.5, 3);
    scene.add(wall4);

    const skirtingMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
    function addSkirting(x, y, z, sx, sy, sz) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), skirtingMat);
      m.position.set(x, y, z);
      scene.add(m);
    }
    addSkirting(4, 0.06, 0.05, 8, 0.12, 0.04);
    addSkirting(4, 0.06, 5.95, 8, 0.12, 0.04);
    addSkirting(0.05, 0.06, 3, 0.04, 0.12, 6);
    addSkirting(7.95, 0.06, 3, 0.04, 0.12, 6);

    const furniture = [];
    const furnitureBoxes = [];
    const clickable = [];
    let lampOn = true;
    let tvOn = true;

    function addAABB(name, minX, maxX, minY, maxY, minZ, maxZ) {
      furnitureBoxes.push({ name, minX, maxX, minY, maxY, minZ, maxZ });
    }

    function registerFurniture(name, object3D, box) {
      furniture.push({ name, object3D });
      if (box) addAABB(name, box.minX, box.maxX, box.minY, box.maxY, box.minZ, box.maxZ);
    }

    function makeBox(w, h, d, color, roughness = 0.8) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        new THREE.MeshStandardMaterial({ color, roughness })
      );
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function makeCylinder(rt, rb, h, seg, color, roughness = 0.8) {
      const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(rt, rb, h, seg),
        new THREE.MeshStandardMaterial({ color, roughness })
      );
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    const rug = makeCylinder(1.25, 1.25, 0.03, 40, 0x7c8aa6, 0.95);
    rug.position.set(4.2, 0.015, 3.2);
    scene.add(rug);
    registerFurniture('rug', rug, {
      minX: 4.2 - 1.25, maxX: 4.2 + 1.25,
      minY: 0, maxY: 0.05,
      minZ: 3.2 - 1.25, maxZ: 3.2 + 1.25
    });

    const sofa = new THREE.Group();
    sofa.add(Object.assign(makeBox(2.2, 0.35, 0.9, 0x6e7f8d), { position: new THREE.Vector3(0, 0.2, 0) }));
    sofa.add(Object.assign(makeBox(2.2, 0.7, 0.18, 0x5f6f7a), { position: new THREE.Vector3(0, 0.55, -0.36) }));
    sofa.add(Object.assign(makeBox(0.18, 0.55, 0.9, 0x5f6f7a), { position: new THREE.Vector3(-1.01, 0.48, 0) }));
    sofa.add(Object.assign(makeBox(0.18, 0.55, 0.9, 0x5f6f7a), { position: new THREE.Vector3(1.01, 0.48, 0) }));
    sofa.add(Object.assign(makeBox(0.62, 0.22, 0.55, 0x8a9aa7), { position: new THREE.Vector3(-0.65, 0.53, 0.05) }));
    sofa.add(Object.assign(makeBox(0.62, 0.22, 0.55, 0x8a9aa7), { position: new THREE.Vector3(0, 0.53, 0.05) }));
    sofa.add(Object.assign(makeBox(0.62, 0.22, 0.55, 0x8a9aa7), { position: new THREE.Vector3(0.65, 0.53, 0.05) }));
    sofa.position.set(4.2, 0, 4.95);
    scene.add(sofa);
    registerFurniture('sofa', sofa, {
      minX: 4.2 - 1.1, maxX: 4.2 + 1.1,
      minY: 0, maxY: 1.1,
      minZ: 4.95 - 0.45, maxZ: 4.95 + 0.45
    });

    const coffeeTable = new THREE.Group();
    coffeeTable.add(Object.assign(makeBox(1.2, 0.08, 0.6, 0x5a3825), { position: new THREE.Vector3(0, 0.38, 0) }));
    const legPos = [[-0.5, 0.19, -0.22], [0.5, 0.19, -0.22], [-0.5, 0.19, 0.22], [0.5, 0.19, 0.22]];
    legPos.forEach(([x, y, z]) => {
      const leg = makeBox(0.06, 0.38, 0.06, 0x3d2619);
      leg.position.set(x, y, z);
      coffeeTable.add(leg);
    });
    coffeeTable.position.set(4.2, 0, 3.25);
    scene.add(coffeeTable);
    registerFurniture('coffeeTable', coffeeTable, {
      minX: 4.2 - 0.6, maxX: 4.2 + 0.6,
      minY: 0, maxY: 0.5,
      minZ: 3.25 - 0.3, maxZ: 3.25 + 0.3
    });

    const tvGroup = new THREE.Group();
    const tvFrame = makeBox(1.5, 0.9, 0.06, 0x111111, 0.4);
    tvFrame.position.set(0, 0, 0);
    const tvScreen = new THREE.Mesh(
      new THREE.PlaneGeometry(1.34, 0.74),
      new THREE.MeshStandardMaterial({
        color: 0x224477,
        emissive: 0x2266ff,
        emissiveIntensity: 1.2,
        roughness: 0.25
      })
    );
    tvScreen.position.set(0, 0, 0.035);
    tvGroup.add(tvFrame, tvScreen);
    tvGroup.position.set(4, 1.45, 0.09);
    scene.add(tvGroup);
    clickable.push(tvScreen);
    registerFurniture('tv', tvGroup, {
      minX: 4 - 0.75, maxX: 4 + 0.75,
      minY: 1.0, maxY: 1.9,
      minZ: 0.02, maxZ: 0.18
    });

    const shelf = new THREE.Group();
    shelf.add(Object.assign(makeBox(1.1, 1.9, 0.32, 0x6d4c34), { position: new THREE.Vector3(0, 0.95, 0) }));
    shelf.add(Object.assign(makeBox(1.02, 0.06, 0.28, 0xb48b68), { position: new THREE.Vector3(0, 1.55, 0) }));
    shelf.add(Object.assign(makeBox(1.02, 0.06, 0.28, 0xb48b68), { position: new THREE.Vector3(0, 1.05, 0) }));
    shelf.add(Object.assign(makeBox(1.02, 0.06, 0.28, 0xb48b68), { position: new THREE.Vector3(0, 0.55, 0) }));
    for (let i = 0; i < 8; i++) {
      const book = makeBox(0.08, 0.28 + (i % 3) * 0.05, 0.18, [0xb53d3d, 0x3d6bb5, 0x4d8d57, 0xc9a227][i % 4], 0.85);
      const row = i < 4 ? 1.58 : 1.08;
      book.position.set(-0.35 + (i % 4) * 0.22, row, 0.02);
      shelf.add(book);
    }
    shelf.position.set(7.15, 0, 1.35);
    scene.add(shelf);
    registerFurniture('bookshelf', shelf, {
      minX: 7.15 - 0.55, maxX: 7.15 + 0.55,
      minY: 0, maxY: 1.95,
      minZ: 1.35 - 0.16, maxZ: 1.35 + 0.16
    });

    function createChair(name, x, z, rotY = 0) {
      const chair = new THREE.Group();
      chair.add(Object.assign(makeBox(0.55, 0.08, 0.55, 0x79553a), { position: new THREE.Vector3(0, 0.45, 0) }));
      chair.add(Object.assign(makeBox(0.55, 0.6, 0.08, 0x6b4a33), { position: new THREE.Vector3(0, 0.74, -0.235) }));
      [[-0.22, 0.22], [0.22, 0.22], [-0.22, -0.22], [0.22, -0.22]].forEach(([lx, lz]) => {
        const leg = makeBox(0.06, 0.45, 0.06, 0x4b3324);
        leg.position.set(lx, 0.225, lz);
        chair.add(leg);
      });
      chair.position.set(x, 0, z);
      chair.rotation.y = rotY;
      scene.add(chair);
      registerFurniture(name, chair, {
        minX: x - 0.38, maxX: x + 0.38,
        minY: 0, maxY: 1.1,
        minZ: z - 0.38, maxZ: z + 0.38
      });
    }

    createChair('chair1', 2.4, 2.65, Math.PI * 0.15);
    createChair('chair2', 5.95, 2.2, -Math.PI * 0.25);

    const lamp = new THREE.Group();
    const lampBase = makeCylinder(0.18, 0.22, 0.05, 24, 0x444444, 0.7);
    lampBase.position.set(0, 0.025, 0);
    const lampPole = makeCylinder(0.035, 0.035, 1.35, 20, 0x666666, 0.4);
    lampPole.position.set(0, 0.7, 0);
    const lampHead = makeCylinder(0.16, 0.12, 0.32, 24, 0xd9d0b8, 0.8);
    lampHead.position.set(0, 1.52, 0);
    lamp.add(lampBase, lampPole, lampHead);
    lamp.position.set(1.15, 0, 4.85);
    scene.add(lamp);
    clickable.push(lampBase, lampPole, lampHead);

    const lampSpot = new THREE.SpotLight(0xffe4b3, 2.2, 8, Math.PI / 5, 0.35, 1.2);
    lampSpot.position.set(1.15, 1.6, 4.85);
    lampSpot.target.position.set(2.1, 0.05, 4.0);
    lampSpot.castShadow = true;
    lampSpot.shadow.mapSize.set(1024, 1024);
    scene.add(lampSpot);
    scene.add(lampSpot.target);

    registerFurniture('floorLamp', lamp, {
      minX: 1.15 - 0.24, maxX: 1.15 + 0.24,
      minY: 0, maxY: 1.75,
      minZ: 4.85 - 0.24, maxZ: 4.85 + 0.24
    });

    furniture.forEach(f => {
      f.object3D.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });
    });

    const camPosEl = document.getElementById('camPos');
    const furnitureCountEl = document.getElementById('furnitureCount');
    const lightsOnEl = document.getElementById('lightsOn');

    function getFurnitureList() {
      return furniture.map(f => {
        const p = new THREE.Vector3();
        f.object3D.getWorldPosition(p);
        return {
          name: f.name,
          x: Number(p.x.toFixed(3)),
          y: Number(p.y.toFixed(3)),
          z: Number(p.z.toFixed(3))
        };
      });
    }

    function updateTVState() {
      if (tvOn) {
        tvScreen.material.color.set(0x224477);
        tvScreen.material.emissive.set(0x2266ff);
        tvScreen.material.emissiveIntensity = 1.2;
      } else {
        tvScreen.material.color.set(0x050505);
        tvScreen.material.emissive.set(0x000000);
        tvScreen.material.emissiveIntensity = 0.0;
      }
    }

    function updateLampState() {
      lampSpot.intensity = lampOn ? 2.2 : 0.0;
      lampHead.material.emissive = new THREE.Color(lampOn ? 0x5a4a22 : 0x000000);
      lampHead.material.emissiveIntensity = lampOn ? 0.9 : 0.0;
    }

    function calcLightsOn() {
      return 1 + (lampOn ? 1 : 0);
    }

    window.__3D_STATE__ = {
      cameraPos: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
      furnitureCount: furniture.length,
      furnitureList: getFurnitureList(),
      lightsOn: calcLightsOn(),
      lampOn,
      tvOn
    };

    furnitureCountEl.textContent = String(furniture.length);

    function updateState() {
      const p = controls.getObject().position;
      camPosEl.textContent = `${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)}`;
      lightsOnEl.textContent = String(calcLightsOn());

      window.__3D_STATE__.cameraPos = {
        x: Number(p.x.toFixed(4)),
        y: Number(p.y.toFixed(4)),
        z: Number(p.z.toFixed(4))
      };
      window.__3D_STATE__.furnitureCount = furniture.length;
      window.__3D_STATE__.furnitureList = getFurnitureList();
      window.__3D_STATE__.lightsOn = calcLightsOn();
      window.__3D_STATE__.lampOn = lampOn;
      window.__3D_STATE__.tvOn = tvOn;
    }

    updateTVState();
    updateLampState();
    updateState();

    const keys = { w: false, a: false, s: false, d: false };
    document.addEventListener('keydown', (e) => {
      switch (e.code) {
        case 'KeyW': keys.w = true; break;
        case 'KeyA': keys.a = true; break;
        case 'KeyS': keys.s = true; break;
        case 'KeyD': keys.d = true; break;
      }
    });
    document.addEventListener('keyup', (e) => {
      switch (e.code) {
        case 'KeyW': keys.w = false; break;
        case 'KeyA': keys.a = false; break;
        case 'KeyS': keys.s = false; break;
        case 'KeyD': keys.d = false; break;
      }
    });

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(0, 0);

    document.addEventListener('click', () => {
      if (!controls.isLocked) return;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(clickable, false);
      if (!hits.length) return;

      const obj = hits[0].object;
      if (obj === tvScreen) {
        tvOn = !tvOn;
        updateTVState();
        updateState();
      } else {
        lampOn = !lampOn;
        updateLampState();
        updateState();
      }
    });

    const playerRadius = 0.22;
    const playerHeight = 1.68;
    const moveSpeed = 2.4;
    const clock = new THREE.Clock();

    function intersectsAABB(px, pz, box) {
      return (
        px + playerRadius > box.minX &&
        px - playerRadius < box.maxX &&
        pz + playerRadius > box.minZ &&
        pz - playerRadius < box.maxZ
      );
    }

    function resolveCollisions(oldPos, newPos) {
      const p = newPos.clone();

      p.x = THREE.MathUtils.clamp(p.x, ROOM.minX + playerRadius, ROOM.maxX - playerRadius);
      p.z = THREE.MathUtils.clamp(p.z, ROOM.minZ + playerRadius, ROOM.maxZ - playerRadius);
      p.y = playerHeight;

      for (const box of furnitureBoxes) {
        if (!intersectsAABB(p.x, p.z, box)) continue;

        const tryX = new THREE.Vector3(p.x, playerHeight, oldPos.z);
        const tryZ = new THREE.Vector3(oldPos.x, playerHeight, p.z);

        const hitX = intersectsAABB(tryX.x, tryX.z, box);
        const hitZ = intersectsAABB(tryZ.x, tryZ.z, box);

        if (!hitX) {
          p.z = oldPos.z;
        } else if (!hitZ) {
          p.x = oldPos.x;
        } else {
          p.x = oldPos.x;
          p.z = oldPos.z;

          const leftPen = Math.abs((p.x + playerRadius) - box.minX);
          const rightPen = Math.abs(box.maxX - (p.x - playerRadius));
          const nearPen = Math.abs((p.z + playerRadius) - box.minZ);
          const farPen = Math.abs(box.maxZ - (p.z - playerRadius));
          const minPen = Math.min(leftPen, rightPen, nearPen, farPen);

          if (minPen === leftPen) p.x = box.minX - playerRadius;
          else if (minPen === rightPen) p.x = box.maxX + playerRadius;
          else if (minPen === nearPen) p.z = box.minZ - playerRadius;
          else p.z = box.maxZ + playerRadius;
        }

        p.x = THREE.MathUtils.clamp(p.x, ROOM.minX + playerRadius, ROOM.maxX - playerRadius);
        p.z = THREE.MathUtils.clamp(p.z, ROOM.minZ + playerRadius, ROOM.maxZ - playerRadius);
      }

      return p;
    }

    function movePlayer(delta) {
      if (!controls.isLocked) return;

      const obj = controls.getObject();
      const oldPos = obj.position.clone();

      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);
      forward.y = 0;
      forward.normalize();

      const right = new THREE.Vector3(forward.z, 0, -forward.x).normalize();

      const move = new THREE.Vector3();
      if (keys.w) move.add(forward);
      if (keys.s) move.sub(forward);
      if (keys.d) move.add(right);
      if (keys.a) move.sub(right);

      if (move.lengthSq() > 0) {
        move.normalize().multiplyScalar(moveSpeed * delta);
        const desired = oldPos.clone().add(move);
        desired.y = playerHeight;
        const resolved = resolveCollisions(oldPos, desired);
        obj.position.copy(resolved);
      } else {
        obj.position.y = playerHeight;
      }
    }

    scene.add(new THREE.HemisphereLight(0xbfd8ff, 0x5c4632, 0.18));

    const backDeco = makeBox(1.6, 0.45, 0.35, 0x7a573f);
    backDeco.position.set(4, 0.225, 0.45);
    scene.add(backDeco);

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);
      movePlayer(delta);
      updateState();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
