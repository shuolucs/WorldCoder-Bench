<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Living Room</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 10px; left: 10px; z-index: 100;
    color: #fff; background: rgba(0,0,0,0.6); padding: 12px 16px;
    border-radius: 8px; font-size: 14px; line-height: 1.8;
    pointer-events: none;
  }
  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 20px; height: 20px; z-index: 100; pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.7);
  }
  #crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
  #crosshair::after { width: 20px; height: 2px; top: 9px; left: 0; }
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: #fff; cursor: pointer;
  }
  #overlay h1 { font-size: 32px; margin-bottom: 16px; }
  #overlay p { font-size: 18px; opacity: 0.8; }
</style>
</head>
<body>

<div id="hud">
  <div>Camera: <span id="camPos">0, 0, 0</span></div>
  <div>Furniture: <span id="furnitureCount">0</span></div>
  <div>Lights On: <span id="lightsOn">0</span></div>
</div>

<div id="crosshair"></div>

<div id="overlay">
  <h1>🏠 3D Living Room</h1>
  <p>Click to enter — WASD to move, Mouse to look</p>
  <p>Click lamp or TV to interact</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 10, 20);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 50);
camera.position.set(4, 1.6, 3);
window.__fpCamera__ = camera;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// ============ STATE ============
let lampOn = true;
let tvOn = true;
const furnitureList = [];
const furnitureBBoxes = [];
const interactables = [];

window.__3D_STATE__ = {
  cameraPos: { x: 4, y: 1.6, z: 3 },
  furnitureCount: 0,
  furnitureList: [],
  lightsOn: 3,
  lampOn: true,
  tvOn: true
};

// ============ TEXTURES (procedural) ============
function createWoodTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 60; i++) {
    ctx.strokeStyle = `rgba(${100 + Math.random()*50}, ${60 + Math.random()*30}, ${10 + Math.random()*20}, ${0.15 + Math.random()*0.15})`;
    ctx.lineWidth = 1 + Math.random() * 3;
    ctx.beginPath();
    const y = Math.random() * 256;
    ctx.moveTo(0, y);
    for (let x = 0; x < 256; x += 10) {
      ctx.lineTo(x, y + Math.sin(x * 0.02) * 5 + (Math.random() - 0.5) * 3);
    }
    ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4, 4);
  return tex;
}

function createWallTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#E8E0D0';
  ctx.fillRect(0, 0, 128, 128);
  for (let i = 0; i < 500; i++) {
    ctx.fillStyle = `rgba(${200 + Math.random()*55}, ${190 + Math.random()*55}, ${170 + Math.random()*55}, 0.3)`;
    ctx.fillRect(Math.random()*128, Math.random()*128, 2, 2);
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2, 1);
  return tex;
}

function createCarpetTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(128, 128, 20, 128, 128, 128);
  grad.addColorStop(0, '#8B2252');
  grad.addColorStop(0.5, '#6B1842');
  grad.addColorStop(1, '#4B1032');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 256, 256);
  // decorative pattern
  ctx.strokeStyle = 'rgba(255,200,150,0.3)';
  ctx.lineWidth = 2;
  for (let r = 30; r < 130; r += 25) {
    ctx.beginPath();
    ctx.arc(128, 128, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  return new THREE.CanvasTexture(canvas);
}

function createFabricTexture(baseColor) {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = baseColor;
  ctx.fillRect(0, 0, 64, 64);
  for (let i = 0; i < 200; i++) {
    ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.08})`;
    ctx.fillRect(Math.random()*64, Math.random()*64, 1, 1);
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

// ============ MATERIALS ============
const floorMat = new THREE.MeshStandardMaterial({ map: createWoodTexture(), roughness: 0.6, metalness: 0.1 });
const wallMat = new THREE.MeshStandardMaterial({ map: createWallTexture(), roughness: 0.9, metalness: 0.0 });
const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xF5F5F0, roughness: 1.0, metalness: 0.0 });

// ============ ROOM ============
// Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(8, 6), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(4, 0, 3);
floor.receiveShadow = true;
scene.add(floor);

// Ceiling
const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(8, 6), ceilingMat);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.set(4, 3, 3);
scene.add(ceiling);

// Walls
function addWall(w, h, px, py, pz, ry) {
  const wall = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat);
  wall.position.set(px, py, pz);
  wall.rotation.y = ry;
  wall.receiveShadow = true;
  scene.add(wall);
}
// Back wall (z=0)
addWall(8, 3, 4, 1.5, 0, 0);
// Front wall (z=6)
addWall(8, 3, 4, 1.5, 6, Math.PI);
// Left wall (x=0)
addWall(6, 3, 0, 1.5, 3, Math.PI / 2);
// Right wall (x=8)
addWall(6, 3, 8, 1.5, 3, -Math.PI / 2);

// ============ LIGHTS ============
// Ambient
const ambientLight = new THREE.AmbientLight(0x404050, 0.4);
scene.add(ambientLight);

// Ceiling point light
const ceilingLight = new THREE.PointLight(0xFFF5E0, 1.5, 15, 1.5);
ceilingLight.position.set(4, 2.9, 3);
ceilingLight.castShadow = true;
ceilingLight.shadow.mapSize.set(1024, 1024);
scene.add(ceilingLight);

// Ceiling light fixture
const fixtureMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, emissive: 0xFFF5E0, emissiveIntensity: 0.5 });
const fixture = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, 0.08, 16), fixtureMat);
fixture.position.set(4, 2.96, 3);
scene.add(fixture);

// Floor lamp spotlight
const lampSpot = new THREE.SpotLight(0xFFE4B5, 3, 8, Math.PI / 4, 0.5, 1.5);
lampSpot.position.set(0.6, 2.2, 0.6);
lampSpot.target.position.set(0.6, 0, 0.6);
lampSpot.castShadow = true;
scene.add(lampSpot);
scene.add(lampSpot.target);

// ============ FURNITURE HELPERS ============
function addBox(parent, w, h, d, x, y, z, mat) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  parent.add(mesh);
  return mesh;
}

function registerFurniture(group, name) {
  scene.add(group);
  const box = new THREE.Box3().setFromObject(group);
  furnitureBBoxes.push(box);
  const center = new THREE.Vector3();
  box.getCenter(center);
  furnitureList.push({ name, x: +center.x.toFixed(2), y: +center.y.toFixed(2), z: +center.z.toFixed(2) });
}

// ============ 1. SOFA ============
function createSofa() {
  const group = new THREE.Group();
  const fabricTex = createFabricTexture('#3A5A8C');
  const sofaMat = new THREE.MeshStandardMaterial({ map: fabricTex, roughness: 0.85, metalness: 0.0 });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x2A3A5C, roughness: 0.9 });

  // Seat
  addBox(group, 2.2, 0.35, 0.8, 0, 0.35, 0, sofaMat);
  // Back
  addBox(group, 2.2, 0.6, 0.15, 0, 0.75, -0.35, darkMat);
  // Left arm
  addBox(group, 0.15, 0.45, 0.8, -1.05, 0.55, 0, darkMat);
  // Right arm
  addBox(group, 0.15, 0.45, 0.8, 1.05, 0.55, 0, darkMat);
  // Legs
  const legMat = new THREE.MeshStandardMaterial({ color: 0x3C2415, roughness: 0.7 });
  for (const [lx, lz] of [[-0.9, 0.3], [0.9, 0.3], [-0.9, -0.3], [0.9, -0.3]]) {
    addBox(group, 0.08, 0.18, 0.08, lx, 0.09, lz, legMat);
  }
  // Cushions
  const cushionMat = new THREE.MeshStandardMaterial({ color: 0x4A6A9C, roughness: 0.9 });
  addBox(group, 0.65, 0.12, 0.6, -0.55, 0.58, 0.05, cushionMat);
  addBox(group, 0.65, 0.12, 0.6, 0.55, 0.58, 0.05, cushionMat);

  group.position.set(4, 0, 5.2);
  return group;
}
const sofa = createSofa();
registerFurniture(sofa, 'sofa');

// ============ 2. COFFEE TABLE ============
function createCoffeeTable() {
  const group = new THREE.Group();
  const topMat = new THREE.MeshStandardMaterial({ color: 0x6B4226, roughness: 0.5, metalness: 0.1 });
  const legMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.3, metalness: 0.6 });

  addBox(group, 1.2, 0.06, 0.6, 0, 0.4, 0, topMat);
  // Glass shelf
  const glassMat = new THREE.MeshStandardMaterial({ color: 0x88CCEE, transparent: true, opacity: 0.3, roughness: 0.1 });
  addBox(group, 1.0, 0.03, 0.5, 0, 0.2, 0, glassMat);
  // Legs
  for (const [lx, lz] of [[-0.5, 0.22], [0.5, 0.22], [-0.5, -0.22], [0.5, -0.22]]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.4, 8), legMat);
    leg.position.set(lx, 0.2, lz);
    leg.castShadow = true;
    group.add(leg);
  }

  group.position.set(4, 0, 3.8);
  return group;
}
const coffeeTable = createCoffeeTable();
registerFurniture(coffeeTable, 'coffeeTable');

// ============ 3. TV ============
let tvScreenMesh;
function createTV() {
  const group = new THREE.Group();
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3, metalness: 0.5 });
  const screenMat = new THREE.MeshStandardMaterial({
    color: 0x000011,
    emissive: 0x0044FF,
    emissiveIntensity: 0.8,
    roughness: 0.1,
    metalness: 0.3
  });

  // Frame
  addBox(group, 1.8, 1.0, 0.08, 0, 1.5, 0, frameMat);
  // Screen
  const screen = new THREE.Mesh(new THREE.PlaneGeometry(1.65, 0.88), screenMat);
  screen.position.set(0, 1.5, 0.045);
  screen.castShadow = false;
  group.add(screen);
  tvScreenMesh = screen;
  screen.userData.interactType = 'tv';
  interactables.push(screen);

  // Stand
  addBox(group, 0.3, 0.15, 0.2, 0, 0.92, 0, frameMat);
  // TV cabinet
  const cabinetMat = new THREE.MeshStandardMaterial({ color: 0x4A3728, roughness: 0.6 });
  addBox(group, 2.0, 0.5, 0.45, 0, 0.55, 0, cabinetMat);
  addBox(group, 2.0, 0.04, 0.45, 0, 0.82, 0, cabinetMat);

  group.position.set(4, 0, 0.25);
  return group;
}
const tv = createTV();
registerFurniture(tv, 'tv');

// ============ 4. BOOKSHELF ============
function createBookshelf() {
  const group = new THREE.Group();
  const woodMat = new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.7 });

  // Sides
  addBox(group, 0.04, 2.0, 0.35, -0.5, 1.0, 0, woodMat);
  addBox(group, 0.04, 2.0, 0.35, 0.5, 1.0, 0, woodMat);
  // Back
  addBox(group, 1.04, 2.0, 0.02, 0, 1.0, -0.165, woodMat);
  // Shelves
  for (let i = 0; i < 5; i++) {
    addBox(group, 1.04, 0.04, 0.35, 0, i * 0.5, 0, woodMat);
  }
  // Books
  const bookColors = [0xCC3333, 0x3366CC, 0x33AA55, 0xDD8833, 0x8833AA, 0xCC6699];
  for (let shelf = 0; shelf < 4; shelf++) {
    let bx = -0.4;
    for (let b = 0; b < 4 + Math.floor(Math.random() * 3); b++) {
      const bw = 0.04 + Math.random() * 0.06;
      const bh = 0.25 + Math.random() * 0.2;
      const bookMat = new THREE.MeshStandardMaterial({ color: bookColors[b % bookColors.length], roughness: 0.8 });
      addBox(group, bw, bh, 0.2, bx + bw / 2, shelf * 0.5 + 0.02 + bh / 2, 0.03, bookMat);
      bx += bw + 0.02;
      if (bx > 0.35) break;
    }
  }

  group.position.set(0.3, 0, 1.5);
  return group;
}
const bookshelf = createBookshelf();
registerFurniture(bookshelf, 'bookshelf');

// ============ 5. FLOOR LAMP ============
let lampGroup;
function createFloorLamp() {
  const group = new THREE.Group();
  const metalMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.8 });
  const shadeMat = new THREE.MeshStandardMaterial({
    color: 0xFFE4B5,
    emissive: 0xFFE4B5,
    emissiveIntensity: 0.4,
    roughness: 0.8,
    side: THREE.DoubleSide
  });

  // Base
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.18, 0.05, 16), metalMat);
  base.position.set(0, 0.025, 0);
  base.castShadow = true;
  group.add(base);

  // Pole
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 2.0, 8), metalMat);
  pole.position.set(0, 1.05, 0);
  pole.castShadow = true;
  group.add(pole);

  // Shade
  const shade = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.22, 0.3, 16, 1, true), shadeMat);
  shade.position.set(0, 2.15, 0);
  shade.castShadow = true;
  group.add(shade);

  // Top cap
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.02, 16), metalMat);
  cap.position.set(0, 2.31, 0);
  group.add(cap);

  // Make all children interactable
  group.traverse(child => {
    if (child.isMesh) {
      child.userData.interactType = 'lamp';
      interactables.push(child);
    }
  });

  group.position.set(0.6, 0, 0.6);
  lampGroup = group;
  return group;
}
const floorLamp = createFloorLamp();
registerFurniture(floorLamp, 'floorLamp');

// ============ 6. CHAIR 1 ============
function createChair(px, pz, rotY) {
  const group = new THREE.Group();
  const woodMat = new THREE.MeshStandardMaterial({ color: 0x6B4226, roughness: 0.6 });
  const seatMat = new THREE.MeshStandardMaterial({ color: 0xAA6633, roughness: 0.8 });

  // Seat
  addBox(group, 0.45, 0.05, 0.45, 0, 0.45, 0, seatMat);
  // Back
  addBox(group, 0.45, 0.5, 0.04, 0, 0.75, -0.21, woodMat);
  // Legs
  for (const [lx, lz] of [[-0.18, 0.18], [0.18, 0.18], [-0.18, -0.18], [0.18, -0.18]]) {
    addBox(group, 0.04, 0.45, 0.04, lx, 0.225, lz, woodMat);
  }
  // Cushion
  const cushionMat = new THREE.MeshStandardMaterial({ color: 0xCC8844, roughness: 0.9 });
  addBox(group, 0.38, 0.06, 0.38, 0, 0.5, 0, cushionMat);

  group.position.set(px, 0, pz);
  group.rotation.y = rotY;
  return group;
}
const chair1 = createChair(2.2, 3.5, Math.PI / 6);
registerFurniture(chair1, 'chair1');

// ============ 7. CHAIR 2 ============
const chair2 = createChair(5.8, 3.5, -Math.PI / 6);
registerFurniture(chair2, 'chair2');

// ============ 8. CARPET ============
function createCarpet() {
  const group = new THREE.Group();
  const carpetTex = createCarpetTexture();
  const carpetMat = new THREE.MeshStandardMaterial({ map: carpetTex, roughness: 1.0, metalness: 0.0 });
  const carpet = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.02, 32), carpetMat);
  carpet.position.set(0, 0.01, 0);
  carpet.receiveShadow = true;
  group.add(carpet);
  group.position.set(4, 0, 3.8);
  return group;
}
const carpet = createCarpet();
registerFurniture(carpet, 'carpet');

// ============ CONTROLS ============
const controls = new PointerLockControls(camera, document.body);

const overlay = document.getElementById('overlay');
overlay.addEventListener('click', () => {
  controls.lock();
});
controls.addEventListener('lock', () => {
  overlay.style.display = 'none';
});
controls.addEventListener('unlock', () => {
  overlay.style.display = 'flex';
});

const keys = { w: false, a: false, s: false, d: false };
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k in keys) keys[k] = true;
});
document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k in keys) keys[k] = false;
});

// ============ RAYCASTER FOR INTERACTION ============
const raycaster = new THREE.Raycaster();
raycaster.far = 5;

document.addEventListener('click', () => {
  if (!controls.isLocked) return;

  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const hits = raycaster.intersectObjects(interactables, false);
  if (hits.length > 0) {
    const hit = hits[0].object;
    if (hit.userData.interactType === 'lamp') {
      toggleLamp();
    } else if (hit.userData.interactType === 'tv') {
      toggleTV();
    }
  }
});

function toggleLamp() {
  lampOn = !lampOn;
  lampSpot.intensity = lampOn ? 3 : 0;
  // Update lamp shade emissive
  lampGroup.traverse(child => {
    if (child.isMesh && child.material.emissive) {
      if (child.geometry.type === 'CylinderGeometry' && child.material.emissiveIntensity !== undefined) {
        // shade
        if (child.material.color.getHex() === 0xFFE4B5) {
          child.material.emissiveIntensity = lampOn ? 0.4 : 0.0;
        }
      }
    }
  });
  updateState();
}

function toggleTV() {
  tvOn = !tvOn;
  if (tvScreenMesh) {
    tvScreenMesh.material.emissive.setHex(tvOn ? 0x0044FF : 0x000000);
    tvScreenMesh.material.emissiveIntensity = tvOn ? 0.8 : 0.0;
    tvScreenMesh.material.color.setHex(tvOn ? 0x000011 : 0x050505);
  }
  updateState();
}

function countLightsOn() {
  let count = 1; // ceiling always on
  if (lampOn) count++;
  return count;
}

function updateState() {
  window.__3D_STATE__.lampOn = lampOn;
  window.__3D_STATE__.tvOn = tvOn;
  window.__3D_STATE__.lightsOn = countLightsOn();
  document.getElementById('lightsOn').textContent = window.__3D_STATE__.lightsOn;
}

// ============ COLLISION ============
const PLAYER_RADIUS = 0.25;
const PLAYER_HEIGHT = 1.6;
const ROOM_MIN = new THREE.Vector3(PLAYER_RADIUS, PLAYER_HEIGHT, PLAYER_RADIUS);
const ROOM_MAX = new THREE.Vector3(8 - PLAYER_RADIUS, PLAYER_HEIGHT, 6 - PLAYER_RADIUS);

function clampToRoom(pos) {
  pos.x = Math.max(ROOM_MIN.x, Math.min(ROOM_MAX.x, pos.x));
  pos.y = PLAYER_HEIGHT;
  pos.z = Math.max(ROOM_MIN.z, Math.min(ROOM_MAX.z, pos.z));
}

function resolveAABBCollision(pos) {
  for (const bbox of furnitureBBoxes) {
    // Expand bbox by player radius
    const minX = bbox.min.x - PLAYER_RADIUS;
    const maxX = bbox.max.x + PLAYER_RADIUS;
    const minZ = bbox.min.z - PLAYER_RADIUS;
    const maxZ = bbox.max.z + PLAYER_RADIUS;

    // Only collide if furniture is at player height range
    if (bbox.max.y < 0.3) continue; // skip very low items like carpet

    if (pos.x > minX && pos.x < maxX && pos.z > minZ && pos.z < maxZ) {
      // Find minimum push-out direction
      const pushLeft = pos.x - minX;
      const pushRight = maxX - pos.x;
      const pushBack = pos.z - minZ;
      const pushFront = maxZ - pos.z;

      const minPush = Math.min(pushLeft, pushRight, pushBack, pushFront);

      if (minPush === pushLeft) pos.x = minX;
      else if (minPush === pushRight) pos.x = maxX;
      else if (minPush === pushBack) pos.z = minZ;
      else pos.z = maxZ;
    }
  }
}

// ============ HUD UPDATE ============
const camPosEl = document.getElementById('camPos');
const furnitureCountEl = document.getElementById('furnitureCount');
const lightsOnEl = document.getElementById('lightsOn');

window.__3D_STATE__.furnitureCount = furnitureList.length;
window.__3D_STATE__.furnitureList = furnitureList;
furnitureCountEl.textContent = furnitureList.length;
lightsOnEl.textContent = countLightsOn();

// ============ DECORATIVE DETAILS ============
// Add some wall decorations
function addPainting(x, y, z, w, h, rotY) {
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.5 });
  const canvasMat = new THREE.MeshStandardMaterial({ color: 0x2255AA, roughness: 0.9 });

  const frameGroup = new THREE.Group();
  // Frame
  const frame = new THREE.Mesh(new THREE.BoxGeometry(w + 0.06, h + 0.06, 0.04), frameMat);
  frameGroup.add(frame);
  // Canvas
  const cvs = new THREE.Mesh(new THREE.PlaneGeometry(w, h), canvasMat);
  cvs.position.z = 0.025;
  frameGroup.add(cvs);

  frameGroup.position.set(x, y, z);
  frameGroup.rotation.y = rotY;
  scene.add(frameGroup);
}
addPainting(2, 1.8, 0.05, 0.8, 0.6, 0);
addPainting(6, 1.8, 0.05, 0.6, 0.8, 0);
addPainting(0.05, 1.6, 4, 0.7, 0.5, Math.PI / 2);

// Baseboard
const baseboardMat = new THREE.MeshStandardMaterial({ color: 0xEEEEE0, roughness: 0.8 });
function addBaseboard(w, px, py, pz, ry) {
  const bb = new THREE.Mesh(new THREE.BoxGeometry(w, 0.1, 0.02), baseboardMat);
  bb.position.set(px, py, pz);
  bb.rotation.y = ry;
  scene.add(bb);
}
addBaseboard(8, 4, 0.05, 0.01, 0);
addBaseboard(8, 4, 0.05, 5.99, Math.PI);
addBaseboard(6, 0.01, 0.05, 3, Math.PI / 2);
addBaseboard(6, 7.99, 0.05, 3, -Math.PI / 2);

// ============ ANIMATION LOOP ============
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const speed = 3.0;

  if (controls.isLocked) {
    direction.set(0, 0, 0);
    if (keys.w) direction.z -= 1;
    if (keys.s) direction.z += 1;
    if (keys.a) direction.x -= 1;
    if (keys.d) direction.x += 1;
    direction.normalize();

    // Move in camera direction
    const forward = new THREE.Vector3();
    camera.getWorldDirection(forward);
    forward.y = 0;
    forward.normalize();

    const right = new THREE.Vector3();
    right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

    const move = new THREE.Vector3();
    move.addScaledVector(forward, -direction.z * speed * delta);
    move.addScaledVector(right, direction.x * speed * delta);

    camera.position.add(move);

    // Collision
    clampToRoom(camera.position);
    resolveAABBCollision(camera.position);
  }

  // Update state
  window.__3D_STATE__.cameraPos.x = +camera.position.x.toFixed(3);
  window.__3D_STATE__.cameraPos.y = +camera.position.y.toFixed(3);
  window.__3D_STATE__.cameraPos.z = +camera.position.z.toFixed(3);

  camPosEl.textContent = `${camera.position.x.toFixed(2)}, ${camera.position.y.toFixed(2)}, ${camera.position.z.toFixed(2)}`;

  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial state sync
updateState();
</script>
