<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Stock Market Landscape</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0f0f23; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud-ticker {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(15, 15, 35, 0.9);
    border: 1px solid #333366;
    border-radius: 8px;
    padding: 15px;
    color: #e0e0e0;
    font-size: 13px;
    min-width: 220px;
    backdrop-filter: blur(10px);
}

#hud-ticker h3 {
    color: #7777ff;
    margin-bottom: 10px;
    font-size: 14px;
    border-bottom: 1px solid #333366;
    padding-bottom: 5px;
}

.ticker-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px solid rgba(51, 51, 102, 0.3);
}

.ticker-name { font-weight: bold; }
.ticker-up { color: #00ff88; }
.ticker-down { color: #ff4444; }
.market-cap { margin-top: 8px; padding-top: 8px; border-top: 1px solid #333366; color: #ffaa00; font-weight: bold; }

#hud-detail {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(15, 15, 35, 0.9);
    border: 1px solid #333366;
    border-radius: 8px;
    padding: 15px;
    color: #e0e0e0;
    font-size: 13px;
    min-width: 240px;
    backdrop-filter: blur(10px);
    display: none;
}

#hud-detail h3 {
    color: #7777ff;
    margin-bottom: 10px;
    font-size: 14px;
    border-bottom: 1px solid #333366;
    padding-bottom: 5px;
}

#hud-detail .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
}

#sparkline-container {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid #333366;
}

#sparkline-canvas {
    width: 210px;
    height: 50px;
    border: 1px solid #333366;
    border-radius: 4px;
}

#hud-leaderboard {
    position: absolute;
    bottom: 15px;
    left: 15px;
    background: rgba(15, 15, 35, 0.9);
    border: 1px solid #333366;
    border-radius: 8px;
    padding: 15px;
    color: #e0e0e0;
    font-size: 13px;
    min-width: 280px;
    backdrop-filter: blur(10px);
}

#hud-leaderboard h3 {
    color: #7777ff;
    margin-bottom: 10px;
    font-size: 14px;
    border-bottom: 1px solid #333366;
    padding-bottom: 5px;
}

.leader-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid rgba(51, 51, 102, 0.3);
}

.leader-rank { color: #ffaa00; width: 25px; }
.leader-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }

.btn-container {
    position: absolute;
    bottom: 15px;
    right: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.btn-container button {
    background: rgba(15, 15, 35, 0.9);
    border: 1px solid #333366;
    border-radius: 6px;
    color: #e0e0e0;
    padding: 10px 20px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
}

.btn-container button:hover {
    background: rgba(50, 50, 100, 0.9);
    border-color: #7777ff;
}

#pause-indicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ffaa00;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
    display: none;
    pointer-events: none;
}

.tick-info {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: #666;
    font-size: 12px;
    font-family: 'Courier New', monospace;
}
</style>
</head>
<body>

<div id="hud-ticker">
    <h3>📊 MARKET TICKER</h3>
    <div id="ticker-content"></div>
    <div class="market-cap" id="market-cap-display">Market Cap: $0</div>
</div>

<div id="hud-detail">
    <h3>📈 STOCK DETAIL</h3>
    <div id="detail-content"></div>
    <div id="sparkline-container">
        <canvas id="sparkline-canvas" width="210" height="50"></canvas>
    </div>
</div>

<div id="hud-leaderboard">
    <h3>🏆 PLAYER LEADERBOARD</h3>
    <div id="leaderboard-content"></div>
</div>

<div class="btn-container">
    <button id="btn-trails">Toggle Trails</button>
    <button id="btn-speed">Speed Up ⚡</button>
</div>

<div id="pause-indicator">⏸ PAUSED</div>
<div class="tick-info" id="tick-info">Tick: 0 | Interval: 2000ms</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    // ==================== STATE ====================
    const STOCK_NAMES = ['AAPL', 'GOOG', 'TSLA', 'AMZN', 'MSFT'];
    const INITIAL_HEIGHTS = [10, 15, 8, 12, 20];
    const STOCK_COLORS = [0x00ff88, 0xff4444, 0x44aaff, 0xffaa00, 0xaa44ff];
    const STOCK_COLOR_HEX = ['#00ff88', '#ff4444', '#44aaff', '#ffaa00', '#aa44ff'];
    const PLAYER_COLORS = [0xff6b6b, 0x4ecdc4, 0x45b7d1, 0xf9ca24];
    const PLAYER_COLOR_HEX = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24'];
    const PLAYER_NAMES = ['Player1', 'Player2', 'Player3', 'Player4'];
    const X_POSITIONS = [-20, -10, 0, 10, 20];

    const state = {
        stockPrices: INITIAL_HEIGHTS.map(h => h * 10),
        stockNames: [...STOCK_NAMES],
        towerHeights: [...INITIAL_HEIGHTS],
        selectedStock: -1,
        paused: false,
        tickCount: 0,
        playerValues: [0, 0, 0, 0],
        playerPortfolios: [],
        trailsEnabled: false,
        tickInterval: 2000,
        totalMarketCap: 0,
        priceHistory: STOCK_NAMES.map((_, i) => [INITIAL_HEIGHTS[i] * 10]),
        initialized: false
    };

    // Initialize player portfolios
    for (let i = 0; i < 4; i++) {
        state.playerPortfolios.push([]);
        for (let j = 0; j < 5; j++) {
            state.playerPortfolios[i].push(Math.floor(Math.random() * 11));
        }
    }

    window.__3D_STATE__ = state;

    // ==================== THREE.JS SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f0f23);
    scene.fog = new THREE.FogExp2(0x0f0f23, 0.008);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2.1;
    controls.minDistance = 15;
    controls.maxDistance = 120;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 40, 20);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // Ground grid
    const gridHelper = new THREE.GridHelper(100, 100, 0x1a1a2e, 0x1a1a2e);
    scene.add(gridHelper);

    // Ground plane
    const groundGeo = new THREE.PlaneGeometry(100, 100);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x0a0a1e, transparent: true, opacity: 0.8 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.1;
    ground.receiveShadow = true;
    scene.add(ground);

    // ==================== HELPER: Create Text Sprite ====================
    function createTextSprite(text, fontSize, color, bgColor) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256;
        canvas.height = 128;

        if (bgColor) {
            ctx.fillStyle = bgColor;
            const r = 10;
            ctx.beginPath();
            ctx.moveTo(r, 0);
            ctx.lineTo(canvas.width - r, 0);
            ctx.quadraticCurveTo(canvas.width, 0, canvas.width, r);
            ctx.lineTo(canvas.width, canvas.height - r);
            ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - r, canvas.height);
            ctx.lineTo(r, canvas.height);
            ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - r);
            ctx.lineTo(0, r);
            ctx.quadraticCurveTo(0, 0, r, 0);
            ctx.closePath();
            ctx.fill();
        }

        ctx.font = `bold ${fontSize}px Courier New`;
        ctx.fillStyle = color || '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const lines = text.split('\n');
        const lineHeight = fontSize + 4;
        const startY = canvas.height / 2 - (lines.length - 1) * lineHeight / 2;
        lines.forEach((line, i) => {
            ctx.fillText(line, canvas.width / 2, startY + i * lineHeight);
        });

        const texture = new THREE.CanvasTexture(canvas);
        texture.needsUpdate = true;
        const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.scale.set(8, 4, 1);
        sprite.userData.canvas = canvas;
        sprite.userData.ctx = ctx;
        sprite.userData.texture = texture;
        return sprite;
    }

    function updateTextSprite(sprite, text, fontSize, color, bgColor) {
        const canvas = sprite.userData.canvas;
        const ctx = sprite.userData.ctx;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (bgColor) {
            ctx.fillStyle = bgColor;
            const r = 10;
            ctx.beginPath();
            ctx.moveTo(r, 0);
            ctx.lineTo(canvas.width - r, 0);
            ctx.quadraticCurveTo(canvas.width, 0, canvas.width, r);
            ctx.lineTo(canvas.width, canvas.height - r);
            ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - r, canvas.height);
            ctx.lineTo(r, canvas.height);
            ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - r);
            ctx.lineTo(0, r);
            ctx.quadraticCurveTo(0, 0, r, 0);
            ctx.closePath();
            ctx.fill();
        }

        ctx.font = `bold ${fontSize}px Courier New`;
        ctx.fillStyle = color || '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const lines = text.split('\n');
        const lineHeight = fontSize + 4;
        const startY = canvas.height / 2 - (lines.length - 1) * lineHeight / 2;
        lines.forEach((line, i) => {
            ctx.fillText(line, canvas.width / 2, startY + i * lineHeight);
        });

        sprite.userData.texture.needsUpdate = true;
    }

    // ==================== STOCK TOWERS ====================
    const towers = [];
    const towerMeshes = [];
    const towerLabels = [];
    const towerOutlines = [];
    const targetHeights = [...INITIAL_HEIGHTS];
    const flashTimers = [];

    for (let i = 0; i < 5; i++) {
        const height = INITIAL_HEIGHTS[i];
        const geo = new THREE.BoxGeometry(4, height, 4);
        const mat = new THREE.MeshStandardMaterial({
            color: STOCK_COLORS[i],
            emissive: 0x000000,
            metalness: 0.3,
            roughness: 0.7,
            transparent: true,
            opacity: 0.85
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(X_POSITIONS[i], height / 2, 0);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData.stockIndex = i;
        scene.add(mesh);
        towerMeshes.push(mesh);

        // Glow base
        const baseGeo = new THREE.BoxGeometry(5, 0.3, 5);
        const baseMat = new THREE.MeshStandardMaterial({
            color: STOCK_COLORS[i],
            emissive: STOCK_COLORS[i],
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.6
        });
        const baseMesh = new THREE.Mesh(baseGeo, baseMat);
        baseMesh.position.set(X_POSITIONS[i], 0.15, 0);
        scene.add(baseMesh);

        // Label
        const label = createTextSprite(`${STOCK_NAMES[i]}\n$${(height * 10).toFixed(0)}`, 28, STOCK_COLOR_HEX[i], 'rgba(10,10,30,0.8)');
        label.position.set(X_POSITIONS[i], height + 4, 0);
        scene.add(label);
        towerLabels.push(label);

        // Wireframe outline (hidden by default)
        const outlineGeo = new THREE.BoxGeometry(4.2, height + 0.2, 4.2);
        const outlineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0 });
        const outline = new THREE.Mesh(outlineGeo, outlineMat);
        outline.position.copy(mesh.position);
        scene.add(outline);
        towerOutlines.push(outline);

        flashTimers.push(0);

        towers.push({
            mesh, label, outline,
            currentHeight: height,
            baseColor: STOCK_COLORS[i]
        });
    }

    // ==================== PLAYERS ====================
    const players = [];
    const playerLabels = [];
    const playerTrails = [];
    const trailPositions = [];

    for (let i = 0; i < 4; i++) {
        const geo = new THREE.SphereGeometry(1.5, 16, 16);
        const mat = new THREE.MeshStandardMaterial({
            color: PLAYER_COLORS[i],
            emissive: PLAYER_COLORS[i],
            emissiveIntensity: 0.3,
            metalness: 0.5,
            roughness: 0.3
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.castShadow = true;
        scene.add(mesh);

        const label = createTextSprite(`${PLAYER_NAMES[i]}\n$0`, 24, PLAYER_COLOR_HEX[i], 'rgba(10,10,30,0.8)');
        label.scale.set(6, 3, 1);
        scene.add(label);
        playerLabels.push(label);

        // Trail
        const trailGeo = new THREE.BufferGeometry();
        const trailPositionArray = new Float32Array(50 * 3);
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositionArray, 3));
        trailGeo.setDrawRange(0, 0);
        const trailMat = new THREE.LineBasicMaterial({
            color: PLAYER_COLORS[i],
            transparent: true,
            opacity: 0.4
        });
        const trailLine = new THREE.Line(trailGeo, trailMat);
        trailLine.visible = false;
        scene.add(trailLine);
        playerTrails.push(trailLine);
        trailPositions.push([]);

        players.push({
            mesh,
            label,
            trail: trailLine,
            radius: 12 + i * 4,
            speed: 0.3 + i * 0.15,
            angle: (Math.PI * 2 / 4) * i
        });
    }

    // ==================== RAYCASTER FOR CLICK ====================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onMouseClick(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(towerMeshes);

        if (intersects.length > 0) {
            const idx = intersects[0].object.userData.stockIndex;
            selectStock(idx);
        }
    }

    renderer.domElement.addEventListener('click', onMouseClick);

    function selectStock(idx) {
        // Deselect previous
        if (state.selectedStock >= 0) {
            towerOutlines[state.selectedStock].material.opacity = 0;
        }

        state.selectedStock = idx;

        if (idx >= 0 && idx < 5) {
            towerOutlines[idx].material.opacity = 0.8;
            document.getElementById('hud-detail').style.display = 'block';
            updateDetailPanel();
        } else {
            document.getElementById('hud-detail').style.display = 'none';
        }
    }

    // ==================== KEYBOARD ====================
    document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'p') {
            state.paused = !state.paused;
            document.getElementById('pause-indicator').style.display = state.paused ? 'block' : 'none';
        } else if (key >= '1' && key <= '5') {
            selectStock(parseInt(key) - 1);
        } else if (key === 'r') {
            resetSimulation();
        }
    });

    function resetSimulation() {
        for (let i = 0; i < 5; i++) {
            targetHeights[i] = INITIAL_HEIGHTS[i];
            state.stockPrices[i] = INITIAL_HEIGHTS[i] * 10;
            state.priceHistory[i] = [INITIAL_HEIGHTS[i] * 10];
        }
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 5; j++) {
                state.playerPortfolios[i][j] = Math.floor(Math.random() * 11);
            }
            trailPositions[i] = [];
            const attr = playerTrails[i].geometry.getAttribute('position');
            for (let k = 0; k < 50 * 3; k++) attr.array[k] = 0;
            attr.needsUpdate = true;
            playerTrails[i].geometry.setDrawRange(0, 0);
        }
        state.tickCount = 0;
        state.tickInterval = 2000;
        updatePlayerValues();
        updateHUD();
    }

    // ==================== BUTTONS ====================
    document.getElementById('btn-trails').addEventListener('click', () => {
        state.trailsEnabled = !state.trailsEnabled;
        playerTrails.forEach(trail => {
            trail.visible = state.trailsEnabled;
        });
        document.getElementById('btn-trails').textContent = state.trailsEnabled ? 'Hide Trails' : 'Toggle Trails';
    });

    document.getElementById('btn-speed').addEventListener('click', () => {
        state.tickInterval = Math.max(500, state.tickInterval / 2);
        document.getElementById('btn-speed').textContent = `Speed Up ⚡ (${state.tickInterval}ms)`;
    });

    // ==================== MARKET SIMULATION ====================
    let lastTickTime = 0;

    function marketTick() {
        if (state.paused) return;

        state.tickCount++;

        for (let i = 0; i < 5; i++) {
            const change = 1 + (Math.random() * 0.16 - 0.08); // -8% to +8%
            let newHeight = towers[i].currentHeight * change;
            newHeight = Math.max(2, Math.min(40, newHeight));
            targetHeights[i] = newHeight;

            const newPrice = newHeight * 10;
            const oldPrice = state.stockPrices[i];
            state.stockPrices[i] = newPrice;

            // Price history
            state.priceHistory[i].push(newPrice);
            if (state.priceHistory[i].length > 10) state.priceHistory[i].shift();

            // Flash
            if (newPrice > oldPrice) {
                towerMeshes[i].material.emissive.setHex(0x00ff00);
            } else {
                towerMeshes[i].material.emissive.setHex(0xff0000);
            }
            flashTimers[i] = 0.5;
        }

        // Player trading
        for (let p = 0; p < 4; p++) {
            const stockIdx = Math.floor(Math.random() * 5);
            const amount = Math.floor(Math.random() * 3) + 1;
            if (Math.random() > 0.5) {
                state.playerPortfolios[p][stockIdx] += amount;
            } else {
                state.playerPortfolios[p][stockIdx] = Math.max(0, state.playerPortfolios[p][stockIdx] - amount);
            }
        }

        updatePlayerValues();
        updateHUD();
    }

    function updatePlayerValues() {
        state.totalMarketCap = 0;
        for (let i = 0; i < 5; i++) {
            state.totalMarketCap += state.stockPrices[i];
        }

        for (let p = 0; p < 4; p++) {
            let val = 0;
            for (let i = 0; i < 5; i++) {
                val += state.playerPortfolios[p][i] * state.stockPrices[i];
            }
            state.playerValues[p] = val;
        }
    }

    // ==================== HUD UPDATE ====================
    function updateHUD() {
        // Ticker
        let tickerHTML = '';
        for (let i = 0; i < 5; i++) {
            const price = state.stockPrices[i];
            const history = state.priceHistory[i];
            const prevPrice = history.length >= 2 ? history[history.length - 2] : price;
            const change = ((price - prevPrice) / prevPrice * 100);
            const cls = change >= 0 ? 'ticker-up' : 'ticker-down';
            const arrow = change >= 0 ? '▲' : '▼';
            tickerHTML += `<div class="ticker-row">
                <span class="ticker-name" style="color:${STOCK_COLOR_HEX[i]}">${STOCK_NAMES[i]}</span>
                <span class="${cls}">$${price.toFixed(1)} ${arrow}${Math.abs(change).toFixed(1)}%</span>
            </div>`;
        }
        document.getElementById('ticker-content').innerHTML = tickerHTML;
        document.getElementById('market-cap-display').textContent = `Market Cap: $${state.totalMarketCap.toFixed(0)}`;

        // Detail panel
        if (state.selectedStock >= 0) {
            updateDetailPanel();
        }

        // Leaderboard
        const sorted = state.playerValues.map((v, i) => ({ idx: i, val: v })).sort((a, b) => b.val - a.val);
        let lbHTML = '';
        sorted.forEach((p, rank) => {
            lbHTML += `<div class="leader-row">
                <span class="leader-rank">#${rank + 1}</span>
                <span><span class="leader-dot" style="background:${PLAYER_COLOR_HEX[p.idx]}"></span>${PLAYER_NAMES[p.idx]}</span>
                <span style="color:#00ff88">$${p.val.toFixed(0)}</span>
            </div>`;
        });
        document.getElementById('leaderboard-content').innerHTML = lbHTML;

        // Tick info
        document.getElementById('tick-info').textContent = `Tick: ${state.tickCount} | Interval: ${state.tickInterval}ms`;
    }

    function updateDetailPanel() {
        const i = state.selectedStock;
        if (i < 0) return;

        const price = state.stockPrices[i];
        const history = state.priceHistory[i];
        const prevPrice = history.length >= 2 ? history[history.length - 2] : price;
        const change = ((price - prevPrice) / prevPrice * 100);
        const cls = change >= 0 ? 'ticker-up' : 'ticker-down';

        let html = `
            <div class="detail-row"><span>Name:</span><span style="color:${STOCK_COLOR_HEX[i]}">${STOCK_NAMES[i]}</span></div>
            <div class="detail-row"><span>Price:</span><span>$${price.toFixed(2)}</span></div>
            <div class="detail-row"><span>Change:</span><span class="${cls}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</span></div>
            <div class="detail-row"><span>Height:</span><span>${targetHeights[i].toFixed(1)}</span></div>
        `;
        document.getElementById('detail-content').innerHTML = html;

        // Sparkline
        drawSparkline(history, STOCK_COLOR_HEX[i]);
    }

    function drawSparkline(data, color) {
        const canvas = document.getElementById('sparkline-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (data.length < 2) return;

        const min = Math.min(...data);
        const max = Math.max(...data);
        const range = max - min || 1;
        const padding = 5;
        const w = canvas.width - padding * 2;
        const h = canvas.height - padding * 2;

        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();

        data.forEach((val, idx) => {
            const x = padding + (idx / (data.length - 1)) * w;
            const y = padding + h - ((val - min) / range) * h;
            if (idx === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Fill gradient
        ctx.lineTo(padding + w, padding + h);
        ctx.lineTo(padding, padding + h);
        ctx.closePath();
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, color + '44');
        grad.addColorStop(1, color + '00');
        ctx.fillStyle = grad;
        ctx.fill();
    }

    // ==================== PARTICLES ====================
    const particleCount = 200;
    const particleGeo = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleSpeeds = [];
    for (let i = 0; i < particleCount; i++) {
        particlePositions[i * 3] = (Math.random() - 0.5) * 100;
        particlePositions[i * 3 + 1] = Math.random() * 50;
        particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 100;
        particleSpeeds.push(0.02 + Math.random() * 0.05);
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0x4444aa, size: 0.3, transparent: true, opacity: 0.5 });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // ==================== ANIMATION LOOP ====================
    const clock = new THREE.Clock();
    let elapsed = 0;

    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();
        elapsed += delta;

        // Market tick
        if (!state.paused) {
            lastTickTime += delta * 1000;
            if (lastTickTime >= state.tickInterval) {
                lastTickTime = 0;
                marketTick();
            }
        }

        // Update tower heights (lerp)
        for (let i = 0; i < 5; i++) {
            const tower = towers[i];
            const target = targetHeights[i];
            tower.currentHeight += (target - tower.currentHeight) * 0.05;
            state.towerHeights[i] = tower.currentHeight;

            // Rebuild geometry
            const h = tower.currentHeight;
            tower.mesh.geometry.dispose();
            tower.mesh.geometry = new THREE.BoxGeometry(4, h, 4);
            tower.mesh.position.y = h / 2;

            // Update outline
            towerOutlines[i].geometry.dispose();
            towerOutlines[i].geometry = new THREE.BoxGeometry(4.2, h + 0.2, 4.2);
            towerOutlines[i].position.y = h / 2;

            // Update label
            const price = tower.currentHeight * 10;
            updateTextSprite(towerLabels[i], `${STOCK_NAMES[i]}\n$${price.toFixed(0)}`, 28, STOCK_COLOR_HEX[i], 'rgba(10,10,30,0.8)');
            towerLabels[i].position.y = h + 4;

            // Flash decay
            if (flashTimers[i] > 0) {
                flashTimers[i] -= delta;
                const intensity = Math.max(0, flashTimers[i] / 0.5);
                const currentEmissive = tower.mesh.material.emissive;
                currentEmissive.r *= intensity;
                currentEmissive.g *= intensity;
                currentEmissive.b *= intensity;
            } else {
                tower.mesh.material.emissive.setHex(0x000000);
            }
        }

        // Update players
        for (let p = 0; p < 4; p++) {
            const player = players[p];
            if (!state.paused) {
                player.angle += player.speed * delta;
            }

            const x = Math.cos(player.angle) * player.radius;
            const z = Math.sin(player.angle) * player.radius;
            const targetY = 3 + (state.playerValues[p] / (state.totalMarketCap || 1)) * 22;
            const clampedY = Math.max(3, Math.min(25, targetY));

            player.mesh.position.x += (x - player.mesh.position.x) * 0.1;
            player.mesh.position.z += (z - player.mesh.position.z) * 0.1;
            player.mesh.position.y += (clampedY - player.mesh.position.y) * 0.05;

            // Label
            updateTextSprite(playerLabels[p], `${PLAYER_NAMES[p]}\n$${state.playerValues[p].toFixed(0)}`, 22, PLAYER_COLOR_HEX[p], 'rgba(10,10,30,0.7)');
            playerLabels[p].position.set(player.mesh.position.x, player.mesh.position.y + 3, player.mesh.position.z);

            // Trail
            if (state.trailsEnabled) {
                trailPositions[p].push(player.mesh.position.x, player.mesh.position.y, player.mesh.position.z);
                if (trailPositions[p].length > 50 * 3) {
                    trailPositions[p].splice(0, 3);
                }

                const attr = playerTrails[p].geometry.getAttribute('position');
                const arr = trailPositions[p];
                for (let k = 0; k < arr.length; k++) {
                    attr.array[k] = arr[k];
                }
                attr.needsUpdate = true;
                playerTrails[p].geometry.setDrawRange(0, arr.length / 3);
            }
        }

        // Particles
        const posAttr = particles.geometry.getAttribute('position');
        for (let i = 0; i < particleCount; i++) {
            posAttr.array[i * 3 + 1] += particleSpeeds[i];
            if (posAttr.array[i * 3 + 1] > 50) {
                posAttr.array[i * 3 + 1] = 0;
            }
        }
        posAttr.needsUpdate = true;

        controls.update();
        renderer.render(scene, camera);
    }

    // ==================== RESIZE ====================
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==================== INIT ====================
    updatePlayerValues();
    updateHUD();
    state.initialized = true;
    animate();
})();
</script>
</body>
</html>
