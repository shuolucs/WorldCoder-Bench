<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Stock Market Landscape</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f0f23;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud-panel {
            position: absolute;
            background: rgba(15, 15, 35, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        #hud-ticker {
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .ticker-item {
            display: flex;
            justify-content: space-between;
            width: 150px;
            font-size: 14px;
        }
        .ticker-total {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-weight: bold;
            color: #f9ca24;
        }
        #hud-detail {
            top: 20px;
            right: 20px;
            width: 200px;
            display: none;
        }
        #hud-detail h2 {
            margin: 0 0 10px 0;
            font-size: 20px;
        }
        #sparkline-container {
            margin-top: 10px;
            width: 100%;
            height: 60px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }
        #hud-leaderboard {
            bottom: 20px;
            left: 20px;
            width: 220px;
        }
        #hud-leaderboard h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #aaa;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
            align-items: center;
        }
        .color-box {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        #controls-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        button.active {
            background: rgba(68, 170, 255, 0.4);
            border-color: #44aaff;
        }
        #instructions {
            position: absolute;
            bottom: 80px;
            right: 20px;
            text-align: right;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            pointer-events: none;
        }
        .up { color: #00ff88; }
        .down { color: #ff4444; }
    </style>
    <!-- Import Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud-ticker" class="hud-panel"></div>

    <div id="hud-detail" class="hud-panel">
        <h2 id="detail-name">STOCK</h2>
        <div id="detail-price" style="font-size: 24px; font-weight: bold;">$0.00</div>
        <div id="detail-change" style="font-size: 14px; margin-bottom: 10px;">0.00%</div>
        <div style="font-size: 12px; color: #aaa;">Last 10 Ticks</div>
        <canvas id="sparkline-container" width="200" height="60"></canvas>
    </div>

    <div id="hud-leaderboard" class="hud-panel">
        <h3>Leaderboard</h3>
        <div id="leaderboard-content"></div>
    </div>

    <div id="instructions">
        Click Tower or 1-5 to select<br>
        P: Pause/Resume | R: Reset
    </div>

    <div id="controls-panel">
        <button id="btn-trails">Toggle Trails</button>
        <button id="btn-speed">Speed Up</button>
    </div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            stockPrices: [100, 150, 80, 120, 200],
            stockNames: ['AAPL', 'GOOG', 'TSLA', 'AMZN', 'MSFT'],
            towerHeights: [10, 15, 8, 12, 20],
            selectedStock: -1,
            paused: false,
            tickCount: 0,
            playerValues: [0, 0, 0, 0],
            playerPortfolios: [],
            trailsEnabled: false,
            tickInterval: 2000,
            totalMarketCap: 0,
            priceHistory: [[], [], [], [], []],
            initialized: false
        };

        const INITIAL_STATE = JSON.parse(JSON.stringify(window.__3D_STATE__));
        const TOWER_COLORS = [0x00ff88, 0xff4444, 0x44aaff, 0xffaa00, 0xaa44ff];
        const PLAYER_COLORS = [0xff6b6b, 0x4ecdc4, 0x45b7d1, 0xf9ca24];
        const PLAYER_NAMES = ['Player1', 'Player2', 'Player3', 'Player4'];
        const PLAYER_RADII = [12, 16, 20, 24];
        const PLAYER_SPEEDS = [0.005, 0.008, 0.004, 0.006];

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0f0f23');

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 40, 20);
        scene.add(dirLight);

        // Ground
        const gridHelper = new THREE.GridHelper(100, 100, 0x1a1a2e, 0x1a1a2e);
        scene.add(gridHelper);

        // --- Objects ---
        const towers = [];
        const players = [];
        let tickTimer;

        // Helper: Create Text Sprite
        function createTextSprite(text, color = '#ffffff', fontSize = 32) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 128;
            
            context.font = `bold ${fontSize}px Arial`;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillStyle = color;
            context.fillText(text, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(10, 5, 1);
            sprite.userData = { canvas, context, texture, color, fontSize };
            return sprite;
        }

        function updateTextSprite(sprite, text) {
            const { canvas, context, texture, color, fontSize } = sprite.userData;
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.font = `bold ${fontSize}px Arial`;
            context.fillStyle = color;
            context.fillText(text, canvas.width / 2, canvas.height / 2);
            texture.needsUpdate = true;
        }

        // Initialize Towers
        const towerGeometry = new THREE.BoxGeometry(4, 1, 4);
        towerGeometry.translate(0, 0.5, 0); // Pivot at bottom

        for (let i = 0; i < 5; i++) {
            const material = new THREE.MeshStandardMaterial({ 
                color: TOWER_COLORS[i],
                roughness: 0.4,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(towerGeometry, material);
            mesh.position.set(-20 + i * 10, 0, 0);
            mesh.scale.y = window.__3D_STATE__.towerHeights[i];
            mesh.userData = { index: i, targetHeight: window.__3D_STATE__.towerHeights[i], flashTimer: 0 };
            
            // Wireframe highlight
            const edges = new THREE.EdgesGeometry(towerGeometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 }));
            line.visible = false;
            mesh.add(line);
            mesh.userData.outline = line;

            // Label
            const label = createTextSprite(`${window.__3D_STATE__.stockNames[i]}\n$${window.__3D_STATE__.stockPrices[i].toFixed(0)}`);
            label.position.set(mesh.position.x, mesh.scale.y + 3, mesh.position.z);
            scene.add(label);

            towers.push({ mesh, label });
            scene.add(mesh);

            window.__3D_STATE__.priceHistory[i].push(window.__3D_STATE__.stockPrices[i]);
        }

        // Initialize Players
        const playerGeometry = new THREE.SphereGeometry(1.5, 16, 16);
        for (let i = 0; i < 4; i++) {
            const material = new THREE.MeshStandardMaterial({ color: PLAYER_COLORS[i] });
            const mesh = new THREE.Mesh(playerGeometry, material);
            
            // Init portfolio
            const portfolio = [];
            for(let j=0; j<5; j++) portfolio.push(Math.floor(Math.random() * 11));
            window.__3D_STATE__.playerPortfolios.push(portfolio);

            // Trail
            const trailGeo = new THREE.BufferGeometry();
            const trailPositions = new Float32Array(50 * 3);
            trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
            const trailMat = new THREE.LineBasicMaterial({ color: PLAYER_COLORS[i], transparent: true, opacity: 0.5 });
            const trail = new THREE.Line(trailGeo, trailMat);
            trail.visible = false;
            scene.add(trail);

            const label = createTextSprite(PLAYER_NAMES[i], '#ffffff', 24);
            scene.add(label);

            players.push({ 
                mesh, 
                label, 
                trail, 
                trailHistory: [],
                angle: Math.random() * Math.PI * 2,
                targetY: 3
            });
            scene.add(mesh);
        }

        // --- Logic ---

        function calculatePlayerValues() {
            for (let i = 0; i < 4; i++) {
                let val = 0;
                for (let j = 0; j < 5; j++) {
                    val += window.__3D_STATE__.playerPortfolios[i][j] * window.__3D_STATE__.stockPrices[j];
                }
                window.__3D_STATE__.playerValues[i] = val;
            }
        }

        function updateTotalCap() {
            window.__3D_STATE__.totalMarketCap = window.__3D_STATE__.stockPrices.reduce((a, b) => a + b, 0);
        }

        function marketTick() {
            if (window.__3D_STATE__.paused) return;

            window.__3D_STATE__.tickCount++;

            // Update Stocks
            for (let i = 0; i < 5; i++) {
                const changePercent = (Math.random() * 0.16) - 0.08; // -8% to +8%
                const oldPrice = window.__3D_STATE__.stockPrices[i];
                let newPrice = oldPrice * (1 + changePercent);
                
                // Clamp height (2 to 40) -> Price (20 to 400)
                if (newPrice < 20) newPrice = 20;
                if (newPrice > 400) newPrice = 400;

                window.__3D_STATE__.stockPrices[i] = newPrice;
                const newHeight = newPrice / 10;
                window.__3D_STATE__.towerHeights[i] = newHeight;
                towers[i].mesh.userData.targetHeight = newHeight;

                // Flash effect
                towers[i].mesh.userData.flashTimer = 0.5;
                towers[i].mesh.userData.flashColor = changePercent >= 0 ? 0x00ff00 : 0xff0000;

                // History
                window.__3D_STATE__.priceHistory[i].push(newPrice);
                if (window.__3D_STATE__.priceHistory[i].length > 10) {
                    window.__3D_STATE__.priceHistory[i].shift();
                }
            }

            // Update Players (Trading)
            for (let i = 0; i < 4; i++) {
                const stockIdx = Math.floor(Math.random() * 5);
                const isBuy = Math.random() > 0.5;
                const amount = Math.floor(Math.random() * 3) + 1;

                if (isBuy) {
                    window.__3D_STATE__.playerPortfolios[i][stockIdx] += amount;
                } else {
                    window.__3D_STATE__.playerPortfolios[i][stockIdx] = Math.max(0, window.__3D_STATE__.playerPortfolios[i][stockIdx] - amount);
                }
            }

            calculatePlayerValues();
            updateTotalCap();
            updateUI();

            tickTimer = setTimeout(marketTick, window.__3D_STATE__.tickInterval);
        }

        // --- UI Updates ---
        function updateUI() {
            // Ticker
            let tickerHTML = '';
            for (let i = 0; i < 5; i++) {
                const price = window.__3D_STATE__.stockPrices[i];
                const hist = window.__3D_STATE__.priceHistory[i];
                const prev = hist.length > 1 ? hist[hist.length - 2] : price;
                const cls = price >= prev ? 'up' : 'down';
                tickerHTML += `
                    <div class="ticker-item">
                        <span style="color: #${TOWER_COLORS[i].toString(16).padStart(6,'0')}">${window.__3D_STATE__.stockNames[i]}</span>
                        <span class="${cls}">$${price.toFixed(2)}</span>
                    </div>`;
            }
            tickerHTML += `<div class="ticker-total">MKT CAP: $${window.__3D_STATE__.totalMarketCap.toFixed(2)}</div>`;
            document.getElementById('hud-ticker').innerHTML = tickerHTML;

            // Leaderboard
            const sortedPlayers = players.map((p, i) => ({
                id: i,
                name: PLAYER_NAMES[i],
                val: window.__3D_STATE__.playerValues[i],
                color: PLAYER_COLORS[i]
            })).sort((a, b) => b.val - a.val);

            let lbHTML = '';
            sortedPlayers.forEach(p => {
                lbHTML += `
                    <div class="leaderboard-item">
                        <div><span class="color-box" style="background: #${p.color.toString(16).padStart(6,'0')}"></span>${p.name}</div>
                        <div>$${p.val.toFixed(0)}</div>
                    </div>`;
            });
            document.getElementById('leaderboard-content').innerHTML = lbHTML;

            // Detail Panel
            const selIdx = window.__3D_STATE__.selectedStock;
            const detailPanel = document.getElementById('hud-detail');
            if (selIdx !== -1) {
                detailPanel.style.display = 'block';
                const price = window.__3D_STATE__.stockPrices[selIdx];
                const hist = window.__3D_STATE__.priceHistory[selIdx];
                const prev = hist.length > 1 ? hist[hist.length - 2] : price;
                const change = ((price - prev) / prev) * 100;
                
                document.getElementById('detail-name').innerText = window.__3D_STATE__.stockNames[selIdx];
                document.getElementById('detail-name').style.color = '#' + TOWER_COLORS[selIdx].toString(16).padStart(6,'0');
                document.getElementById('detail-price').innerText = `$${price.toFixed(2)}`;
                
                const changeEl = document.getElementById('detail-change');
                changeEl.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                changeEl.className = change >= 0 ? 'up' : 'down';

                drawSparkline(hist, change >= 0 ? '#00ff88' : '#ff4444');
            } else {
                detailPanel.style.display = 'none';
            }
        }

        function drawSparkline(data, color) {
            const canvas = document.getElementById('sparkline-container');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (data.length < 2) return;

            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;
            const stepX = canvas.width / (data.length - 1);

            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';

            for (let i = 0; i < data.length; i++) {
                const x = i * stepX;
                const y = canvas.height - ((data[i] - min) / range) * (canvas.height - 10) - 5;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function selectStock(index) {
            window.__3D_STATE__.selectedStock = index;
            towers.forEach((t, i) => {
                t.mesh.userData.outline.visible = (i === index);
            });
            updateUI();
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            if (event.target.tagName === 'BUTTON') return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(towers.map(t => t.mesh));
            if (intersects.length > 0) {
                selectStock(intersects[0].object.userData.index);
            } else {
                selectStock(-1);
            }
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'p') {
                window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
                if (!window.__3D_STATE__.paused) {
                    clearTimeout(tickTimer);
                    marketTick();
                }
            } else if (key >= '1' && key <= '5') {
                selectStock(parseInt(key) - 1);
            } else if (key === 'r') {
                resetSimulation();
            }
        });

        document.getElementById('btn-trails').addEventListener('click', (e) => {
            window.__3D_STATE__.trailsEnabled = !window.__3D_STATE__.trailsEnabled;
            e.target.classList.toggle('active');
            players.forEach(p => {
                p.trail.visible = window.__3D_STATE__.trailsEnabled;
                if (!window.__3D_STATE__.trailsEnabled) p.trailHistory = [];
            });
        });

        document.getElementById('btn-speed').addEventListener('click', () => {
            window.__3D_STATE__.tickInterval = Math.max(500, window.__3D_STATE__.tickInterval / 2);
            clearTimeout(tickTimer);
            if (!window.__3D_STATE__.paused) marketTick();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function resetSimulation() {
            clearTimeout(tickTimer);
            Object.assign(window.__3D_STATE__, JSON.parse(JSON.stringify(INITIAL_STATE)));
            
            // Re-init portfolios
            window.__3D_STATE__.playerPortfolios = [];
            for (let i = 0; i < 4; i++) {
                const portfolio = [];
                for(let j=0; j<5; j++) portfolio.push(Math.floor(Math.random() * 11));
                window.__3D_STATE__.playerPortfolios.push(portfolio);
            }
            
            for (let i = 0; i < 5; i++) {
                window.__3D_STATE__.priceHistory[i] = [window.__3D_STATE__.stockPrices[i]];
                towers[i].mesh.userData.targetHeight = window.__3D_STATE__.towerHeights[i];
            }
            
            selectStock(-1);
            calculatePlayerValues();
            updateTotalCap();
            updateUI();
            marketTick();
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            controls.update();

            // Animate Towers
            for (let i = 0; i < 5; i++) {
                const t = towers[i];
                // Lerp height
                t.mesh.scale.y += (t.mesh.userData.targetHeight - t.mesh.scale.y) * 5 * delta;
                
                // Update Label
                t.label.position.y = t.mesh.scale.y + 3;
                updateTextSprite(t.label, `${window.__3D_STATE__.stockNames[i]}\n$${window.__3D_STATE__.stockPrices[i].toFixed(0)}`);

                // Flash effect
                if (t.mesh.userData.flashTimer > 0) {
                    t.mesh.userData.flashTimer -= delta;
                    t.mesh.material.emissive.setHex(t.mesh.userData.flashColor);
                    t.mesh.material.emissiveIntensity = (t.mesh.userData.flashTimer / 0.5);
                } else {
                    t.mesh.material.emissive.setHex(0x000000);
                }
            }

            // Animate Players
            // Map portfolio value (approx 0-5000) to Y height (3-25)
            const maxExpectedVal = 5000; 
            
            for (let i = 0; i < 4; i++) {
                const p = players[i];
                p.angle += PLAYER_SPEEDS[i];
                
                const x = Math.cos(p.angle) * PLAYER_RADII[i];
                const z = Math.sin(p.angle) * PLAYER_RADII[i];
                
                let targetY = 3 + (window.__3D_STATE__.playerValues[i] / maxExpectedVal) * 22;
                targetY = Math.max(3, Math.min(25, targetY));
                p.targetY = targetY;
                
                const currentY = p.mesh.position.y;
                const newY = currentY + (targetY - currentY) * 2 * delta;

                p.mesh.position.set(x, newY, z);
                p.label.position.set(x, newY + 2.5, z);
                updateTextSprite(p.label, `${PLAYER_NAMES[i]}\n$${window.__3D_STATE__.playerValues[i].toFixed(0)}`);

                // Trails
                if (window.__3D_STATE__.trailsEnabled) {
                    p.trailHistory.push(p.mesh.position.clone());
                    if (p.trailHistory.length > 50) p.trailHistory.shift();
                    
                    const positions = p.trail.geometry.attributes.position.array;
                    for (let j = 0; j < p.trailHistory.length; j++) {
                        positions[j * 3] = p.trailHistory[j].x;
                        positions[j * 3 + 1] = p.trailHistory[j].y;
                        positions[j * 3 + 2] = p.trailHistory[j].z;
                    }
                    p.trail.geometry.setDrawRange(0, p.trailHistory.length);
                    p.trail.geometry.attributes.position.needsUpdate = true;
                }
            }

            renderer.render(scene, camera);
        }

        // Init
        calculatePlayerValues();
        updateTotalCap();
        updateUI();
        window.__3D_STATE__.initialized = true;
        marketTick();
        animate();

    </script>
</body>
</html>
