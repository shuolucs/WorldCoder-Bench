<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Stock Market Landscape</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0f0f23;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    .hud {
      position: absolute;
      background: rgba(10, 12, 24, 0.78);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      z-index: 10;
    }
    #hud-ticker {
      top: 12px;
      left: 12px;
      width: 360px;
      font-size: 13px;
      line-height: 1.5;
    }
    #hud-detail {
      top: 12px;
      right: 12px;
      width: 280px;
      min-height: 140px;
      font-size: 13px;
    }
    #hud-leaderboard {
      left: 50%;
      transform: translateX(-50%);
      bottom: 12px;
      width: 420px;
      font-size: 13px;
      text-align: left;
    }
    #controls {
      position: absolute;
      right: 12px;
      bottom: 12px;
      display: flex;
      gap: 10px;
      z-index: 11;
    }
    button {
      background: #1f2940;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #2a3654;
    }
    .title {
      font-weight: bold;
      margin-bottom: 6px;
      color: #cfd8ff;
    }
    .small {
      opacity: 0.8;
      font-size: 12px;
    }
    canvas.sparkline {
      width: 100%;
      height: 50px;
      display: block;
      margin-top: 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud-ticker" class="hud"></div>
    <div id="hud-detail" class="hud"></div>
    <div id="hud-leaderboard" class="hud"></div>
    <div id="controls">
      <button id="btn-trails">Toggle Trails</button>
      <button id="btn-speed">Speed Up</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const hudTicker = document.getElementById('hud-ticker');
    const hudDetail = document.getElementById('hud-detail');
    const hudLeaderboard = document.getElementById('hud-leaderboard');
    const btnTrails = document.getElementById('btn-trails');
    const btnSpeed = document.getElementById('btn-speed');

    const STOCK_NAMES = ['AAPL', 'GOOG', 'TSLA', 'AMZN', 'MSFT'];
    const INITIAL_HEIGHTS = [10, 15, 8, 12, 20];
    const STOCK_COLORS = ['#00ff88', '#ff4444', '#44aaff', '#ffaa00', '#aa44ff'];
    const TOWER_X = [-20, -10, 0, 10, 20];

    const PLAYER_NAMES = ['Player1', 'Player2', 'Player3', 'Player4'];
    const PLAYER_COLORS = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24'];
    const PLAYER_RADII = [12, 16, 20, 24];
    const PLAYER_SPEEDS = [0.55, 0.42, 0.33, 0.25];

    const state = window.__3D_STATE__ = {
      stockPrices: INITIAL_HEIGHTS.map(h => h * 10),
      stockNames: [...STOCK_NAMES],
      towerHeights: [...INITIAL_HEIGHTS],
      selectedStock: -1,
      paused: false,
      tickCount: 0,
      playerValues: [0, 0, 0, 0],
      playerPortfolios: [],
      trailsEnabled: false,
      tickInterval: 2000,
      totalMarketCap: 0,
      priceHistory: INITIAL_HEIGHTS.map(h => Array(10).fill(h * 10)),
      initialized: false
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0f0f23');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 6, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 40, 20);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(100, 20, new THREE.Color('#1a1a2e'), new THREE.Color('#1a1a2e'));
    grid.position.y = 0.01;
    scene.add(grid);

    const basePlane = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshPhongMaterial({ color: '#111321', side: THREE.DoubleSide, transparent: true, opacity: 0.55 })
    );
    basePlane.rotation.x = -Math.PI / 2;
    scene.add(basePlane);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const clock = new THREE.Clock();

    function hexToColor(hex) {
      return new THREE.Color(hex);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function createTextSprite(text, opts = {}) {
      const canvas = document.createElement('canvas');
      canvas.width = opts.width || 512;
      canvas.height = opts.height || 128;
      const ctx = canvas.getContext('2d');

      const bg = opts.bg || 'rgba(10,12,24,0.75)';
      const border = opts.border || 'rgba(255,255,255,0.18)';
      const color = opts.color || '#ffffff';
      const font = opts.font || 'bold 34px Arial';

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const radius = 18;
      ctx.fillStyle = bg;
      ctx.strokeStyle = border;
      ctx.lineWidth = 4;
      roundRect(ctx, 2, 2, canvas.width - 4, canvas.height - 4, radius, true, true);

      ctx.fillStyle = color;
      ctx.font = font;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(opts.scaleX || 10, opts.scaleY || 2.5, 1);
      sprite.userData.canvas = canvas;
      sprite.userData.ctx = ctx;
      sprite.userData.texture = texture;
      sprite.userData.style = { bg, border, color, font };
      return sprite;
    }

    function updateTextSprite(sprite, text) {
      const canvas = sprite.userData.canvas;
      const ctx = sprite.userData.ctx;
      const texture = sprite.userData.texture;
      const { bg, border, color, font } = sprite.userData.style;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = bg;
      ctx.strokeStyle = border;
      ctx.lineWidth = 4;
      roundRect(ctx, 2, 2, canvas.width - 4, canvas.height - 4, 18, true, true);

      ctx.fillStyle = color;
      ctx.font = font;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      texture.needsUpdate = true;
    }

    function roundRect(ctx, x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    const towers = [];
    const towerTargets = [...INITIAL_HEIGHTS];
    const pulseData = INITIAL_HEIGHTS.map(() => ({ active: false, color: new THREE.Color(), t: 0 }));
    let selectedOutline = null;

    for (let i = 0; i < 5; i++) {
      const h = INITIAL_HEIGHTS[i];
      const geom = new THREE.BoxGeometry(4, h, 4);
      const mat = new THREE.MeshPhongMaterial({
        color: STOCK_COLORS[i],
        emissive: 0x000000,
        emissiveIntensity: 0.0,
        shininess: 60
      });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(TOWER_X[i], h / 2, 0);
      mesh.userData.stockIndex = i;
      scene.add(mesh);

      const label = createTextSprite(`${STOCK_NAMES[i]} $${(h * 10).toFixed(0)}`, {
        scaleX: 12,
        scaleY: 3
      });
      label.position.set(TOWER_X[i], h + 3, 0);
      scene.add(label);

      towers.push({
        mesh,
        material: mat,
        label,
        currentHeight: h,
        targetHeight: h,
        baseColor: hexToColor(STOCK_COLORS[i])
      });
    }

    function createOutlineForTower(index) {
      if (selectedOutline) {
        scene.remove(selectedOutline);
        selectedOutline.geometry.dispose();
        selectedOutline.material.dispose();
        selectedOutline = null;
      }
      if (index < 0 || index >= towers.length) return;

      const tw = towers[index];
      const edges = new THREE.EdgesGeometry(tw.mesh.geometry);
      const line = new THREE.LineSegments(
        edges,
        new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95 })
      );
      line.position.copy(tw.mesh.position);
      line.scale.copy(tw.mesh.scale);
      scene.add(line);
      selectedOutline = line;
    }

    function rebuildTowerGeometry(i, newHeight) {
      const t = towers[i];
      t.mesh.geometry.dispose();
      t.mesh.geometry = new THREE.BoxGeometry(4, newHeight, 4);
      t.mesh.position.y = newHeight / 2;
      t.label.position.y = newHeight + 3;
      if (state.selectedStock === i) createOutlineForTower(i);
    }

    const players = [];

    function randomPortfolio() {
      return Array.from({ length: 5 }, () => randomInt(0, 10));
    }

    for (let i = 0; i < 4; i++) {
      const portfolio = randomPortfolio();
      state.playerPortfolios.push(portfolio);

      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(1.5, 24, 24),
        new THREE.MeshPhongMaterial({
          color: PLAYER_COLORS[i],
          shininess: 80
        })
      );
      scene.add(mesh);

      const label = createTextSprite(`${PLAYER_NAMES[i]} $0`, {
        width: 512,
        height: 100,
        scaleX: 9,
        scaleY: 2.2,
        font: 'bold 28px Arial'
      });
      scene.add(label);

      const trailPositions = new Float32Array(50 * 3);
      const trailGeometry = new THREE.BufferGeometry();
      trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
      trailGeometry.setDrawRange(0, 0);

      const trailMaterial = new THREE.LineBasicMaterial({
        color: PLAYER_COLORS[i],
        transparent: true,
        opacity: 0.65
      });

      const trail = new THREE.Line(trailGeometry, trailMaterial);
      trail.visible = false;
      scene.add(trail);

      players.push({
        name: PLAYER_NAMES[i],
        color: PLAYER_COLORS[i],
        mesh,
        label,
        radius: PLAYER_RADII[i],
        speed: PLAYER_SPEEDS[i],
        angle: i * Math.PI / 2,
        portfolio,
        value: 0,
        targetY: 3,
        trail,
        trailHistory: []
      });
    }

    function computePortfolioValue(portfolio) {
      let total = 0;
      for (let i = 0; i < 5; i++) total += portfolio[i] * state.stockPrices[i];
      return total;
    }

    function updatePlayerValues() {
      const vals = [];
      for (let i = 0; i < players.length; i++) {
        const v = computePortfolioValue(players[i].portfolio);
        players[i].value = v;
        vals.push(v);
      }
      state.playerValues = vals;

      const minV = Math.min(...vals, 0);
      const maxV = Math.max(...vals, 1);
      for (let i = 0; i < players.length; i++) {
        const n = maxV === minV ? 0.5 : (players[i].value - minV) / (maxV - minV);
        players[i].targetY = 3 + n * 22;
        updateTextSprite(players[i].label, `${players[i].name} $${players[i].value.toFixed(0)}`);
      }
    }

    function updateMarketCap() {
      state.totalMarketCap = state.stockPrices.reduce((a, b) => a + b, 0);
    }

    function setSelectedStock(index) {
      state.selectedStock = index;
      createOutlineForTower(index);
      updateHUD();
    }

    function resetSimulation() {
      state.stockPrices = INITIAL_HEIGHTS.map(h => h * 10);
      state.towerHeights = [...INITIAL_HEIGHTS];
      state.priceHistory = INITIAL_HEIGHTS.map(h => Array(10).fill(h * 10));
      state.tickCount = 0;
      state.selectedStock = -1;

      for (let i = 0; i < towers.length; i++) {
        towers[i].currentHeight = INITIAL_HEIGHTS[i];
        towers[i].targetHeight = INITIAL_HEIGHTS[i];
        rebuildTowerGeometry(i, INITIAL_HEIGHTS[i]);
        towers[i].material.color.copy(towers[i].baseColor);
        towers[i].material.emissive.set(0x000000);
        towers[i].material.emissiveIntensity = 0;
        updateTextSprite(towers[i].label, `${STOCK_NAMES[i]} $${state.stockPrices[i].toFixed(0)}`);
      }

      for (let i = 0; i < players.length; i++) {
        const pf = randomPortfolio();
        players[i].portfolio = pf;
        state.playerPortfolios[i] = [...pf];
        players[i].trailHistory = [];
        players[i].trail.geometry.setDrawRange(0, 0);
      }

      if (selectedOutline) {
        scene.remove(selectedOutline);
        selectedOutline.geometry.dispose();
        selectedOutline.material.dispose();
        selectedOutline = null;
      }

      updateMarketCap();
      updatePlayerValues();
      updateHUD();
    }

    function pulseTower(index, up) {
      pulseData[index].active = true;
      pulseData[index].t = 0;
      pulseData[index].color = new THREE.Color(up ? '#00ff66' : '#ff2244');
    }

    function marketTick() {
      if (state.paused) return;

      for (let i = 0; i < 5; i++) {
        const oldPrice = state.stockPrices[i];
        const pct = (Math.random() * 16 - 8) / 100;
        let newPrice = oldPrice * (1 + pct);
        let newHeight = clamp(newPrice / 10, 2, 40);
        newPrice = newHeight * 10;

        state.stockPrices[i] = newPrice;
        state.towerHeights[i] = newHeight;
        towers[i].targetHeight = newHeight;

        state.priceHistory[i].push(newPrice);
        if (state.priceHistory[i].length > 10) state.priceHistory[i].shift();

        pulseTower(i, newPrice >= oldPrice);
      }

      for (let p = 0; p < players.length; p++) {
        const stockIndex = randomInt(0, 4);
        const amount = randomInt(1, 3);
        const buy = Math.random() > 0.5;
        if (buy) {
          players[p].portfolio[stockIndex] += amount;
        } else {
          players[p].portfolio[stockIndex] = Math.max(0, players[p].portfolio[stockIndex] - amount);
        }
        state.playerPortfolios[p] = [...players[p].portfolio];
      }

      state.tickCount++;
      updateMarketCap();
      updatePlayerValues();
      updateHUD();
    }

    let tickTimer = null;
    function startTickLoop() {
      if (tickTimer) clearInterval(tickTimer);
      tickTimer = setInterval(marketTick, state.tickInterval);
    }

    function drawSparkline(prices) {
      const w = 250, h = 50;
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.className = 'sparkline';
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, h - 1);
      ctx.lineTo(w, h - 1);
      ctx.stroke();

      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const pad = 6;

      ctx.strokeStyle = '#7dd3fc';
      ctx.lineWidth = 2;
      ctx.beginPath();

      prices.forEach((v, i) => {
        const x = pad + (i / Math.max(1, prices.length - 1)) * (w - pad * 2);
        const y = max === min ? h / 2 : h - pad - ((v - min) / (max - min)) * (h - pad * 2);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      return canvas.outerHTML;
    }

    function updateHUD() {
      const tickerRows = STOCK_NAMES.map((name, i) => {
        const hist = state.priceHistory[i];
        const prev = hist.length > 1 ? hist[hist.length - 2] : hist[hist.length - 1];
        const change = prev ? ((state.stockPrices[i] - prev) / prev) * 100 : 0;
        const color = change >= 0 ? '#69f0ae' : '#ff8a80';
        return `<div><strong style="color:${STOCK_COLORS[i]}">${name}</strong>: $${state.stockPrices[i].toFixed(2)} <span style="color:${color}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</span></div>`;
      }).join('');

      hudTicker.innerHTML = `
        <div class="title">Market Ticker</div>
        ${tickerRows}
        <div style="margin-top:6px"><strong>Total Market Cap:</strong> $${state.totalMarketCap.toFixed(2)}</div>
        <div class="small">Ticks: ${state.tickCount} | ${state.paused ? 'Paused' : 'Running'} | Interval: ${state.tickInterval}ms</div>
      `;

      if (state.selectedStock >= 0) {
        const i = state.selectedStock;
        const prices = state.priceHistory[i];
        const prev = prices.length > 1 ? prices[prices.length - 2] : prices[prices.length - 1];
        const pct = prev ? ((state.stockPrices[i] - prev) / prev) * 100 : 0;
        hudDetail.innerHTML = `
          <div class="title">Selected Stock</div>
          <div><strong>${STOCK_NAMES[i]}</strong></div>
          <div>Price: $${state.stockPrices[i].toFixed(2)}</div>
          <div>Change: <span style="color:${pct >= 0 ? '#69f0ae' : '#ff8a80'}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</span></div>
          <div>Height: ${state.towerHeights[i].toFixed(2)}</div>
          <div class="small" style="margin-top:6px">Last 10 prices</div>
          ${drawSparkline(prices)}
        `;
      } else {
        hudDetail.innerHTML = `
          <div class="title">Selected Stock</div>
          <div>No stock selected.</div>
          <div class="small" style="margin-top:6px">Click a tower or press keys 1-5.</div>
        `;
      }

      const ranked = players
        .map((p, i) => ({ name: p.name, value: p.value, color: PLAYER_COLORS[i] }))
        .sort((a, b) => b.value - a.value);

      hudLeaderboard.innerHTML = `
        <div class="title">Player Leaderboard</div>
        ${ranked.map((p, i) => `<div>${i + 1}. <span style="color:${p.color}"><strong>${p.name}</strong></span> — $${p.value.toFixed(2)}</div>`).join('')}
      `;
    }

    function onPointerClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(towers.map(t => t.mesh));
      if (intersects.length > 0) {
        const idx = intersects[0].object.userData.stockIndex;
        setSelectedStock(idx);
      }
    }

    renderer.domElement.addEventListener('click', onPointerClick);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'p') {
        state.paused = !state.paused;
        updateHUD();
      } else if (key === 'r') {
        resetSimulation();
      } else if (['1', '2', '3', '4', '5'].includes(e.key)) {
        setSelectedStock(parseInt(e.key, 10) - 1);
      }
    });

    btnTrails.addEventListener('click', () => {
      state.trailsEnabled = !state.trailsEnabled;
      for (const p of players) p.trail.visible = state.trailsEnabled;
    });

    btnSpeed.addEventListener('click', () => {
      state.tickInterval = Math.max(500, Math.floor(state.tickInterval / 2));
      startTickLoop();
      updateHUD();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateMarketCap();
    updatePlayerValues();
    updateHUD();
    startTickLoop();

    function updateTrail(player) {
      if (!state.trailsEnabled) return;

      const pos = player.mesh.position.clone();
      player.trailHistory.push(pos);
      if (player.trailHistory.length > 50) player.trailHistory.shift();

      const arr = player.trail.geometry.attributes.position.array;
      for (let i = 0; i < player.trailHistory.length; i++) {
        arr[i * 3 + 0] = player.trailHistory[i].x;
        arr[i * 3 + 1] = player.trailHistory[i].y;
        arr[i * 3 + 2] = player.trailHistory[i].z;
      }
      player.trail.geometry.setDrawRange(0, player.trailHistory.length);
      player.trail.geometry.attributes.position.needsUpdate = true;
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const elapsed = clock.elapsedTime;

      for (let i = 0; i < towers.length; i++) {
        const t = towers[i];
        t.currentHeight = THREE.MathUtils.lerp(t.currentHeight, t.targetHeight, 0.08);
        rebuildTowerGeometry(i, t.currentHeight);
        updateTextSprite(t.label, `${STOCK_NAMES[i]} $${(t.currentHeight * 10).toFixed(0)}`);

        const pulse = pulseData[i];
        if (pulse.active) {
          pulse.t += dt;
          const k = pulse.t / 0.5;
          const strength = Math.max(0, 1 - k);
          t.material.emissive.copy(pulse.color);
          t.material.emissiveIntensity = strength * 0.9;
          if (k >= 1) {
            pulse.active = false;
            t.material.emissive.set(0x000000);
            t.material.emissiveIntensity = 0;
          }
        }
      }

      for (let i = 0; i < players.length; i++) {
        const p = players[i];
        p.angle += dt * p.speed;
        const x = Math.cos(p.angle + elapsed * 0.08) * p.radius;
        const z = Math.sin(p.angle + elapsed * 0.08) * p.radius;
        p.mesh.position.x = x;
        p.mesh.position.z = z;
        p.mesh.position.y = THREE.MathUtils.lerp(p.mesh.position.y || 3, p.targetY, 0.05);

        p.label.position.set(x, p.mesh.position.y + 3, z);
        updateTrail(p);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    state.initialized = true;
    animate();
  </script>
</body>
</html>
