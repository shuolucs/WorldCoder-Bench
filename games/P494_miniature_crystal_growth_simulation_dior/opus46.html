<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal Growth Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a0a2e; }
  canvas { display: block; }
  
  #ui-panel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 5, 30, 0.85);
    border: 1px solid rgba(170, 136, 255, 0.3);
    border-radius: 8px;
    padding: 15px 20px;
    color: #ffffff;
    font-family: monospace;
    font-size: 13px;
    min-width: 220px;
    backdrop-filter: blur(5px);
    z-index: 10;
  }
  
  #ui-panel h3 {
    margin-bottom: 10px;
    color: #aa88ff;
    font-size: 14px;
    border-bottom: 1px solid rgba(170, 136, 255, 0.3);
    padding-bottom: 6px;
  }
  
  .stat-line {
    margin: 4px 0;
    color: #ccccee;
  }
  
  .stat-value {
    color: #44ffaa;
  }
  
  .btn-row {
    margin-top: 10px;
    display: flex;
    gap: 8px;
  }
  
  .btn {
    padding: 6px 14px;
    border: 1px solid rgba(170, 136, 255, 0.5);
    background: rgba(170, 136, 255, 0.15);
    color: #ddccff;
    font-family: monospace;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .btn:hover {
    background: rgba(170, 136, 255, 0.35);
    color: #ffffff;
  }
  
  .btn:active {
    background: rgba(170, 136, 255, 0.5);
  }
  
  .slider-row {
    margin-top: 10px;
  }
  
  .slider-row label {
    display: block;
    margin-bottom: 4px;
    color: #ccccee;
  }
  
  .slider-row input[type="range"] {
    width: 100%;
    accent-color: #aa88ff;
  }
  
  .hint {
    margin-top: 10px;
    font-size: 10px;
    color: #887799;
    border-top: 1px solid rgba(170, 136, 255, 0.2);
    padding-top: 6px;
  }
</style>
</head>
<body>

<div id="ui-panel">
  <h3>🔮 Crystal Diorama</h3>
  <div class="stat-line">Crystals: <span class="stat-value" id="stat-crystals">0</span></div>
  <div class="stat-line">Wave: <span class="stat-value" id="stat-wave">0/4</span></div>
  <div class="stat-line">Growth Speed: <span class="stat-value" id="stat-speed">1.0x</span></div>
  <div class="stat-line">Glow Mode: <span class="stat-value" id="stat-glow">OFF</span></div>
  <div class="btn-row">
    <button class="btn" id="btn-grow">Grow Crystals</button>
    <button class="btn" id="btn-reset">Reset</button>
  </div>
  <div class="slider-row">
    <label>Speed: <span id="speed-label">1.0x</span></label>
    <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
  </div>
  <div class="hint">Keys: [G] Grow | [R] Reset | Click helmet to toggle glow</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  crystalCount: 0,
  currentWave: 0,
  maxWaves: 4,
  growthSpeed: 1.0,
  helmetLoaded: false,
  helmetRotation: 0,
  glowMode: false,
  averageCrystalHeight: 0,
  totalCrystalTargetHeight: 0,
  isGrowing: false
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0a2e);
scene.fog = new THREE.FogExp2(0x1a0a2e, 0.04);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);
controls.minDistance = 3;
controls.maxDistance = 15;

// Lights
const ambientLight = new THREE.AmbientLight(0x4444aa, 0.3);
scene.add(ambientLight);

const pointLight1 = new THREE.PointLight(0xaa88ff, 2, 20);
pointLight1.position.set(3, 6, 3);
pointLight1.castShadow = true;
pointLight1.shadow.mapSize.set(1024, 1024);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x44ffaa, 1.5, 15);
pointLight2.position.set(-3, 4, -2);
scene.add(pointLight2);

// Ground plane
const groundGeom = new THREE.CircleGeometry(6, 64);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x222233,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Hexagonal pedestal
const pedestalGeom = new THREE.CylinderGeometry(1.2, 1.2, 0.8, 6);
const pedestalMat = new THREE.MeshStandardMaterial({
  color: 0x333344,
  metalness: 0.7,
  roughness: 0.3
});
const pedestal = new THREE.Mesh(pedestalGeom, pedestalMat);
pedestal.position.y = 0.4;
pedestal.castShadow = true;
pedestal.receiveShadow = true;
scene.add(pedestal);

// Pedestal top ring detail
const ringGeom = new THREE.TorusGeometry(1.2, 0.03, 8, 6);
const ringMat = new THREE.MeshStandardMaterial({
  color: 0xaa88ff,
  emissive: 0xaa88ff,
  emissiveIntensity: 0.3,
  metalness: 0.9,
  roughness: 0.1
});
const ring = new THREE.Mesh(ringGeom, ringMat);
ring.position.y = 0.8;
ring.rotation.x = -Math.PI / 2;
scene.add(ring);

// Helmet
let helmetModel = null;
let helmetMeshes = [];

const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
  (gltf) => {
    helmetModel = gltf.scene;
    helmetModel.position.set(0, 1.2, 0);
    helmetModel.scale.set(0.8, 0.8, 0.8);
    helmetModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        helmetMeshes.push(child);
      }
    });
    scene.add(helmetModel);
    state.helmetLoaded = true;
  },
  undefined,
  (error) => {
    console.error('Error loading helmet:', error);
    // Create fallback helmet shape
    const fallbackGeom = new THREE.SphereGeometry(0.6, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.7);
    const fallbackMat = new THREE.MeshStandardMaterial({
      color: 0x888888,
      metalness: 0.8,
      roughness: 0.3
    });
    helmetModel = new THREE.Mesh(fallbackGeom, fallbackMat);
    helmetModel.position.set(0, 1.2, 0);
    helmetModel.scale.set(0.8, 0.8, 0.8);
    helmetModel.castShadow = true;
    helmetMeshes.push(helmetModel);
    scene.add(helmetModel);
    state.helmetLoaded = true;
  }
);

// Crystal system
const crystals = [];
const crystalColors = [0xff44ff, 0x44ffff, 0x88ff44, 0xffaa22, 0xaa44ff];
const crystalGroup = new THREE.Group();
scene.add(crystalGroup);

function createCrystalGeometry() {
  // Elongated octahedron: two cones mirrored
  const topCone = new THREE.ConeGeometry(0.12, 0.5, 6, 1);
  const bottomCone = new THREE.ConeGeometry(0.12, 0.2, 6, 1);
  bottomCone.rotateX(Math.PI);
  bottomCone.translate(0, -0.1, 0);
  topCone.translate(0, 0.25, 0);
  
  const merged = new THREE.BufferGeometry();
  // Merge manually by combining both
  // Actually, let's use a group approach per crystal
  return { topHeight: 0.5, bottomHeight: 0.2 };
}

function createCrystal(position, targetHeight, color) {
  const group = new THREE.Group();
  
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    transparent: true,
    opacity: 0.7,
    emissive: color,
    emissiveIntensity: 0.5,
    metalness: 0.9,
    roughness: 0.1,
    side: THREE.DoubleSide
  });
  
  // Top cone (main crystal body)
  const topGeom = new THREE.ConeGeometry(0.1, 1, 6, 1);
  const topMesh = new THREE.Mesh(topGeom, mat);
  topMesh.position.y = 0.5;
  group.add(topMesh);
  
  // Bottom cone (smaller base)
  const bottomGeom = new THREE.ConeGeometry(0.1, 0.3, 6, 1);
  const bottomMesh = new THREE.Mesh(bottomGeom, mat);
  bottomMesh.rotation.x = Math.PI;
  bottomMesh.position.y = -0.15;
  group.add(bottomMesh);
  
  group.position.copy(position);
  
  // Random slight tilt
  group.rotation.x = (Math.random() - 0.5) * 0.3;
  group.rotation.z = (Math.random() - 0.5) * 0.3;
  
  // Start tiny
  group.scale.set(0.1, 0.1, 0.1);
  
  const crystalData = {
    group: group,
    material: mat,
    currentHeight: 0.1,
    targetHeight: targetHeight,
    scaleTarget: targetHeight,
    color: color,
    phase: Math.random() * Math.PI * 2 // for shimmer
  };
  
  group.castShadow = true;
  crystalGroup.add(group);
  crystals.push(crystalData);
  
  return crystalData;
}

function spawnWave(waveNumber) {
  if (waveNumber > 4 || waveNumber < 1) return;
  
  const radius = waveNumber + 1; // wave 1: radius 2, wave 2: radius 3, etc.
  const count = Math.floor(5 + Math.random() * 4); // 5-8 crystals
  const maxAllowed = 30 - crystals.length;
  const actualCount = Math.min(count, maxAllowed);
  
  if (actualCount <= 0) return;
  
  for (let i = 0; i < actualCount; i++) {
    const angle = (i / actualCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const r = radius + (Math.random() - 0.5) * 0.6;
    const x = Math.cos(angle) * r;
    const z = Math.sin(angle) * r;
    const y = 0;
    
    const targetHeight = 0.5 + Math.random() * 1.5;
    const color = crystalColors[Math.floor(Math.random() * crystalColors.length)];
    
    createCrystal(new THREE.Vector3(x, y, z), targetHeight, color);
  }
  
  state.currentWave = waveNumber;
}

let currentWaveIndex = 0;

function growCrystals() {
  if (currentWaveIndex >= 4) return;
  currentWaveIndex++;
  spawnWave(currentWaveIndex);
}

function resetCrystals() {
  for (const crystal of crystals) {
    crystalGroup.remove(crystal.group);
    crystal.group.traverse((child) => {
      if (child.isMesh) {
        child.geometry.dispose();
        child.material.dispose();
      }
    });
  }
  crystals.length = 0;
  currentWaveIndex = 0;
  state.currentWave = 0;
  state.glowMode = false;
  updateGlowMode();
}

function updateGlowMode() {
  const intensity = state.glowMode ? 2.0 : 0.5;
  for (const crystal of crystals) {
    crystal.material.emissiveIntensity = intensity;
  }
}

// Raycaster for helmet click
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  if (helmetMeshes.length > 0) {
    const intersects = raycaster.intersectObjects(helmetMeshes, true);
    if (intersects.length > 0) {
      state.glowMode = !state.glowMode;
      updateGlowMode();
    }
  }
});

// UI bindings
document.getElementById('btn-grow').addEventListener('click', growCrystals);
document.getElementById('btn-reset').addEventListener('click', resetCrystals);

const speedSlider = document.getElementById('speed-slider');
speedSlider.addEventListener('input', () => {
  state.growthSpeed = parseFloat(speedSlider.value);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'g' || e.key === 'G') growCrystals();
  if (e.key === 'r' || e.key === 'R') resetCrystals();
});

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Particle dust (ambient atmosphere)
const particleCount = 200;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 12;
  particlePositions[i * 3 + 1] = Math.random() * 6;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 12;
}
particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xaa88ff,
  size: 0.03,
  transparent: true,
  opacity: 0.6
});
const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  const time = clock.getElapsedTime();
  
  controls.update();
  
  // Rotate helmet
  if (helmetModel) {
    helmetModel.rotation.y += 0.005;
    state.helmetRotation = helmetModel.rotation.y;
  }
  
  // Grow crystals
  let anyGrowing = false;
  let totalHeight = 0;
  let totalTargetHeight = 0;
  
  for (const crystal of crystals) {
    const growRate = 0.02 * state.growthSpeed;
    
    if (crystal.currentHeight < crystal.targetHeight - 0.01) {
      crystal.currentHeight += (crystal.targetHeight - crystal.currentHeight) * growRate;
      anyGrowing = true;
    } else {
      crystal.currentHeight = crystal.targetHeight;
    }
    
    const s = crystal.currentHeight;
    crystal.group.scale.set(s * 0.5, s, s * 0.5);
    crystal.group.position.y = s * 0.5;
    
    // Shimmer effect
    const shimmer = Math.sin(time * 2 + crystal.phase) * 0.1 + 0.9;
    crystal.material.opacity = 0.7 * shimmer;
    
    totalHeight += crystal.currentHeight;
    totalTargetHeight += crystal.targetHeight;
  }
  
  // Animate particles
  const positions = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3 + 1] += 0.003;
    if (positions[i * 3 + 1] > 6) positions[i * 3 + 1] = 0;
  }
  particles.geometry.attributes.position.needsUpdate = true;
  
  // Subtle light animation
  pointLight1.intensity = 2 + Math.sin(time * 0.5) * 0.3;
  pointLight2.intensity = 1.5 + Math.sin(time * 0.7 + 1) * 0.2;
  
  // Ring glow pulse
  ringMat.emissiveIntensity = 0.3 + Math.sin(time) * 0.15;
  
  // Update state
  state.crystalCount = crystals.length;
  state.isGrowing = anyGrowing;
  state.averageCrystalHeight = crystals.length > 0 ? totalHeight / crystals.length : 0;
  state.totalCrystalTargetHeight = totalTargetHeight;
  
  // Update UI
  document.getElementById('stat-crystals').textContent = state.crystalCount;
  document.getElementById('stat-wave').textContent = `${state.currentWave}/${state.maxWaves}`;
  document.getElementById('stat-speed').textContent = `${state.growthSpeed.toFixed(1)}x`;
  document.getElementById('speed-label').textContent = `${state.growthSpeed.toFixed(1)}x`;
  document.getElementById('stat-glow').textContent = state.glowMode ? 'ON' : 'OFF';
  
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
