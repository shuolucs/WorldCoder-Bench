<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal Growth Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a0a2e;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px;
      background: rgba(10, 10, 20, 0.75);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      z-index: 10;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    #ui button,
    #ui input[type="range"] {
      width: 100%;
      margin-top: 8px;
    }

    #ui button {
      padding: 8px;
      background: #2a1f44;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      cursor: pointer;
    }

    #ui button:hover {
      background: #3a2a5e;
    }

    #stats {
      margin-top: 10px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .label {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="growBtn">Grow Crystals</button>
    <button id="resetBtn">Reset</button>

    <div class="label">Growth Speed</div>
    <input id="speedSlider" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />

    <div id="stats"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a0a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 4, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;

    // Lights
    const ambientLight = new THREE.AmbientLight(0x4444aa, 0.3);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight(0xaa88ff, 2, 30);
    pointLight1.position.set(3, 6, 3);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0x44ffaa, 1.5, 30);
    pointLight2.position.set(-3, 4, -2);
    scene.add(pointLight2);

    // Ground
    const groundGeometry = new THREE.CylinderGeometry(6, 6, 0.2, 64);
    const groundMaterial = new THREE.MeshStandardMaterial({
      color: 0x222233,
      metalness: 0.2,
      roughness: 0.9
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.position.y = -0.1;
    ground.receiveShadow = true;
    scene.add(ground);

    // Pedestal
    const pedestalGeometry = new THREE.CylinderGeometry(1.2, 1.2, 0.8, 6);
    const pedestalMaterial = new THREE.MeshStandardMaterial({
      color: 0x333344,
      metalness: 0.7,
      roughness: 0.3
    });
    const pedestal = new THREE.Mesh(pedestalGeometry, pedestalMaterial);
    pedestal.position.set(0, 0.4, 0);
    scene.add(pedestal);

    // Helmet
    const loader = new GLTFLoader();
    let helmet = null;
    let helmetRoot = null;
    let helmetLoaded = false;

    loader.load(
      'DamagedHelmet.glb',
      (gltf) => {
        helmetRoot = gltf.scene;
        helmetRoot.position.set(0, 1.2, 0);
        helmetRoot.scale.setScalar(0.8);
        scene.add(helmetRoot);

        helmet = helmetRoot;
        helmetLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Failed to load DamagedHelmet.glb:', err);
      }
    );

    // Crystal system
    const crystalPalette = [
      0xff44ff,
      0x44ffff,
      0x88ff44,
      0xffaa22,
      0xaa44ff
    ];

    const crystals = [];
    const crystalGroup = new THREE.Group();
    scene.add(crystalGroup);

    let currentWave = 0;
    const maxWaves = 4;
    let growthSpeed = 1.0;
    let glowMode = false;

    function createCrystalGeometry() {
      const top = new THREE.ConeGeometry(0.18, 0.5, 4);
      const bottom = new THREE.ConeGeometry(0.18, 0.5, 4);
      bottom.rotateZ(Math.PI);
      bottom.translate(0, -0.5, 0);
      top.translate(0, 0.5, 0);

      const topPos = top.attributes.position;
      const bottomPos = bottom.attributes.position;

      const positions = [];
      for (let i = 0; i < topPos.count; i++) {
        positions.push(topPos.getX(i), topPos.getY(i), topPos.getZ(i));
      }
      for (let i = 0; i < bottomPos.count; i++) {
        positions.push(bottomPos.getX(i), bottomPos.getY(i), bottomPos.getZ(i));
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.computeVertexNormals();
      return geometry;
    }

    const baseCrystalGeometry = createCrystalGeometry();

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function randomInt(min, max) {
      return Math.floor(randomRange(min, max + 1));
    }

    function createCrystal(position, targetHeight, colorHex) {
      const color = new THREE.Color(colorHex);
      const material = new THREE.MeshStandardMaterial({
        color: color.clone().multiplyScalar(0.8),
        emissive: color,
        emissiveIntensity: glowMode ? 2.0 : 0.5,
        transparent: true,
        opacity: 0.7,
        metalness: 0.9,
        roughness: 0.1
      });

      const mesh = new THREE.Mesh(baseCrystalGeometry, material);
      mesh.position.copy(position);
      mesh.rotation.y = randomRange(0, Math.PI * 2);
      mesh.rotation.z = randomRange(-0.12, 0.12);
      mesh.scale.set(
        randomRange(0.7, 1.3),
        0.1,
        randomRange(0.7, 1.3)
      );

      crystalGroup.add(mesh);

      const crystal = {
        mesh,
        currentHeight: 0.1,
        targetHeight,
        colorHex
      };

      crystals.push(crystal);
      return crystal;
    }

    function spawnWave() {
      if (currentWave >= maxWaves || crystals.length >= 30) return;

      currentWave += 1;

      const radiusMap = [2, 3, 4, 5];
      const ringRadius = radiusMap[currentWave - 1];
      const count = Math.min(randomInt(5, 8), 30 - crystals.length);
      const angleOffset = randomRange(0, Math.PI * 2);

      for (let i = 0; i < count; i++) {
        const angle = angleOffset + (i / count) * Math.PI * 2 + randomRange(-0.2, 0.2);
        const radius = ringRadius + randomRange(-0.25, 0.25);
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const y = 0.1;
        const targetHeight = randomRange(0.5, 2.0);
        const colorHex = crystalPalette[randomInt(0, crystalPalette.length - 1)];

        createCrystal(new THREE.Vector3(x, y, z), targetHeight, colorHex);
      }
    }

    function resetCrystals() {
      for (const crystal of crystals) {
        crystalGroup.remove(crystal.mesh);
        crystal.mesh.geometry.dispose();
        crystal.mesh.material.dispose();
      }
      crystals.length = 0;
      currentWave = 0;
      glowMode = false;
    }

    function updateGlowMode() {
      for (const crystal of crystals) {
        crystal.mesh.material.emissiveIntensity = glowMode ? 2.0 : 0.5;
      }
    }

    // UI
    const growBtn = document.getElementById('growBtn');
    const resetBtn = document.getElementById('resetBtn');
    const speedSlider = document.getElementById('speedSlider');
    const stats = document.getElementById('stats');

    growBtn.addEventListener('click', spawnWave);
    resetBtn.addEventListener('click', resetCrystals);

    speedSlider.addEventListener('input', () => {
      growthSpeed = parseFloat(speedSlider.value);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'g' || e.key === 'G') spawnWave();
      if (e.key === 'r' || e.key === 'R') resetCrystals();
    });

    // Raycasting for helmet click
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    window.addEventListener('pointerdown', (event) => {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);

      if (helmetRoot) {
        const intersects = raycaster.intersectObject(helmetRoot, true);
        if (intersects.length > 0) {
          glowMode = !glowMode;
          updateGlowMode();
        }
      }
    });

    // State exposure
    window.__3D_STATE__ = {
      crystalCount: 0,
      currentWave: 0,
      maxWaves: 4,
      growthSpeed: 1.0,
      helmetLoaded: false,
      helmetRotation: 0,
      glowMode: false,
      averageCrystalHeight: 0,
      totalCrystalTargetHeight: 0,
      isGrowing: false
    };

    function updateHUD(avgHeight, totalTargetHeight, isGrowing) {
      stats.textContent =
`Crystals: ${crystals.length}
Wave: ${currentWave}/${maxWaves}
Growth Speed: ${growthSpeed.toFixed(1)}x
Glow Mode: ${glowMode ? 'ON' : 'OFF'}
Helmet Loaded: ${helmetLoaded ? 'YES' : 'NO'}
Avg Height: ${avgHeight.toFixed(2)}
Target Sum: ${totalTargetHeight.toFixed(2)}
Growing: ${isGrowing ? 'YES' : 'NO'}`;
    }

    function updateState(avgHeight, totalTargetHeight, isGrowing) {
      window.__3D_STATE__.crystalCount = crystals.length;
      window.__3D_STATE__.currentWave = currentWave;
      window.__3D_STATE__.maxWaves = maxWaves;
      window.__3D_STATE__.growthSpeed = growthSpeed;
      window.__3D_STATE__.helmetLoaded = helmetLoaded;
      window.__3D_STATE__.helmetRotation = helmet ? helmet.rotation.y : 0;
      window.__3D_STATE__.glowMode = glowMode;
      window.__3D_STATE__.averageCrystalHeight = avgHeight;
      window.__3D_STATE__.totalCrystalTargetHeight = totalTargetHeight;
      window.__3D_STATE__.isGrowing = isGrowing;
    }

    function animate() {
      requestAnimationFrame(animate);

      controls.update();

      if (helmet) {
        helmet.rotation.y += 0.005;
      }

      let totalHeight = 0;
      let totalTargetHeight = 0;
      let isGrowing = false;

      for (const crystal of crystals) {
        crystal.currentHeight = THREE.MathUtils.lerp(
          crystal.currentHeight,
          crystal.targetHeight,
          0.02 * growthSpeed
        );

        if (Math.abs(crystal.currentHeight - crystal.targetHeight) > 0.01) {
          isGrowing = true;
        } else {
          crystal.currentHeight = crystal.targetHeight;
        }

        crystal.mesh.scale.y = crystal.currentHeight;
        totalHeight += crystal.currentHeight;
        totalTargetHeight += crystal.targetHeight;
      }

      const avgHeight = crystals.length > 0 ? totalHeight / crystals.length : 0;

      updateHUD(avgHeight, totalTargetHeight, isGrowing);
      updateState(avgHeight, totalTargetHeight, isGrowing);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
