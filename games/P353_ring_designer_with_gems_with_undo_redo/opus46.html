<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring Designer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    background: #1a1a2e;
    font-family: 'Raleway', sans-serif;
    color: #fff;
  }

  canvas { display: block; }

  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  #ui-overlay > * {
    pointer-events: auto;
  }

  #top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    text-align: center;
    padding: 16px 20px;
    background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0) 100%);
  }

  #top-bar h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #controls-panel {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(26, 26, 46, 0.9);
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 12px;
    padding: 20px;
    width: 220px;
    backdrop-filter: blur(10px);
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #FFD700;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    padding-bottom: 6px;
  }

  .gem-palette {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .gem-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }

  .gem-btn:hover {
    transform: scale(1.15);
    box-shadow: 0 0 15px currentColor;
  }

  .gem-btn.selected {
    border-color: #FFD700;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
    transform: scale(1.1);
  }

  .gem-btn[data-gem="ruby"] { background: radial-gradient(circle at 30% 30%, #ff4466, #FF0033, #990022); }
  .gem-btn[data-gem="emerald"] { background: radial-gradient(circle at 30% 30%, #33ff99, #00CC66, #006633); }
  .gem-btn[data-gem="sapphire"] { background: radial-gradient(circle at 30% 30%, #3366ff, #0033FF, #001a99); }
  .gem-btn[data-gem="diamond"] { background: radial-gradient(circle at 30% 30%, #ffffff, #ddddff, #aaaacc); }
  .gem-btn[data-gem="amethyst"] { background: radial-gradient(circle at 30% 30%, #cc66ff, #9933FF, #5500aa); }

  .slot-selector {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
    justify-content: center;
  }

  .slot-btn {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #ccc;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Raleway', sans-serif;
  }

  .slot-btn:hover {
    background: rgba(255, 215, 0, 0.15);
    border-color: rgba(255, 215, 0, 0.4);
  }

  .slot-btn.selected {
    background: rgba(255, 215, 0, 0.25);
    border-color: #FFD700;
    color: #FFD700;
    font-weight: 700;
  }

  .slot-btn.occupied {
    position: relative;
  }

  .slot-btn.occupied::after {
    content: '';
    position: absolute;
    bottom: 2px; right: 2px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #FFD700;
  }

  .action-buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 18px;
  }

  .action-btn {
    padding: 8px 16px;
    border: 1px solid rgba(255, 215, 0, 0.3);
    border-radius: 6px;
    background: rgba(255, 215, 0, 0.08);
    color: #FFD700;
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }

  .action-btn:hover:not(:disabled) {
    background: rgba(255, 215, 0, 0.2);
    border-color: #FFD700;
  }

  .action-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .action-btn.danger {
    border-color: rgba(255, 50, 50, 0.3);
    color: #ff5555;
    background: rgba(255, 50, 50, 0.08);
  }

  .action-btn.danger:hover:not(:disabled) {
    background: rgba(255, 50, 50, 0.2);
    border-color: #ff5555;
  }

  .history-row {
    display: flex;
    gap: 8px;
  }

  .history-row .action-btn {
    flex: 1;
  }

  #hud {
    position: absolute;
    right: 20px;
    top: 70px;
    background: rgba(26, 26, 46, 0.9);
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 12px;
    padding: 16px 20px;
    backdrop-filter: blur(10px);
    min-width: 180px;
  }

  .hud-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 12px;
    color: #aaa;
  }

  .hud-item .label {
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 10px;
  }

  .hud-item .value {
    color: #FFD700;
    font-weight: 500;
    font-size: 14px;
  }

  #keyboard-hints {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  .key-hint kbd {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: 'Raleway', sans-serif;
    font-size: 10px;
    margin-right: 4px;
  }
</style>
</head>
<body>

<div id="ui-overlay">
  <div id="top-bar">
    <h1>✦ Ring Designer ✦</h1>
  </div>

  <div id="controls-panel">
    <div class="section-title">Gem Type</div>
    <div class="gem-palette">
      <button class="gem-btn selected" data-gem="ruby" title="Ruby"></button>
      <button class="gem-btn" data-gem="emerald" title="Emerald"></button>
      <button class="gem-btn" data-gem="sapphire" title="Sapphire"></button>
      <button class="gem-btn" data-gem="diamond" title="Diamond"></button>
      <button class="gem-btn" data-gem="amethyst" title="Amethyst"></button>
    </div>

    <div class="section-title">Slot</div>
    <div class="slot-selector">
      <button class="slot-btn selected" data-slot="0">1</button>
      <button class="slot-btn" data-slot="1">2</button>
      <button class="slot-btn" data-slot="2">3</button>
      <button class="slot-btn" data-slot="3">4</button>
      <button class="slot-btn" data-slot="4">5</button>
      <button class="slot-btn" data-slot="5">6</button>
    </div>

    <div class="section-title">Actions</div>
    <div class="action-buttons">
      <button class="action-btn" id="addGemBtn">✦ Add Gem</button>
      <button class="action-btn" id="removeGemBtn">✧ Remove Gem</button>
      <div class="history-row">
        <button class="action-btn" id="undoBtn" disabled>↩ Undo</button>
        <button class="action-btn" id="redoBtn" disabled>↪ Redo</button>
      </div>
      <button class="action-btn danger" id="clearAllBtn">✕ Clear All</button>
    </div>
  </div>

  <div id="hud">
    <div class="section-title">Status</div>
    <div class="hud-item"><span class="label">Gems</span><span class="value" id="hud-gems">0</span></div>
    <div class="hud-item"><span class="label">History</span><span class="value" id="hud-history">0</span></div>
    <div class="hud-item"><span class="label">Position</span><span class="value" id="hud-position">0</span></div>
    <div class="hud-item"><span class="label">Last Action</span><span class="value" id="hud-action">none</span></div>
    <div class="hud-item"><span class="label">Auto-Rotate</span><span class="value" id="hud-rotate">ON</span></div>
  </div>

  <div id="keyboard-hints">
    <span class="key-hint"><kbd>Z</kbd> Undo</span>
    <span class="key-hint"><kbd>Y</kbd> Redo</span>
    <span class="key-hint"><kbd>R</kbd> Toggle Rotation</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── GEM COLORS ───
const GEM_COLORS = {
  ruby:     { color: 0xFF0033, emissive: 0x660011 },
  emerald:  { color: 0x00CC66, emissive: 0x004422 },
  sapphire: { color: 0x0033FF, emissive: 0x001166 },
  diamond:  { color: 0xFFFFFF, emissive: 0x222233 },
  amethyst: { color: 0x9933FF, emissive: 0x330066 }
};

// ─── STATE ───
window.__3D_STATE__ = {
  selectedGemType: 'ruby',
  selectedSlot: 0,
  slots: [null, null, null, null, null, null],
  gemCount: 0,
  historyLength: 0,
  historyPosition: 0,
  canUndo: false,
  canRedo: false,
  ringRotationY: 0,
  fishLoaded: false,
  lastAction: 'none',
  ringAutoRotate: true
};

const state = window.__3D_STATE__;

// ─── HISTORY ───
let history = [];
let historyPos = -1;

function pushAction(action) {
  // Discard future history
  history = history.slice(0, historyPos + 1);
  history.push(action);
  historyPos++;
  updateHistoryState();
}

function updateHistoryState() {
  state.historyLength = history.length;
  state.historyPosition = historyPos + 1;
  state.canUndo = historyPos >= 0;
  state.canRedo = historyPos < history.length - 1;
  document.getElementById('undoBtn').disabled = !state.canUndo;
  document.getElementById('redoBtn').disabled = !state.canRedo;
  updateHUD();
}

// ─── SCENE SETUP ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// ─── LIGHTS ───
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

const pointLight = new THREE.PointLight(0xffeedd, 0.6);
pointLight.position.set(-3, 3, -3);
scene.add(pointLight);

// Extra sparkle lights
const sparkleLight1 = new THREE.PointLight(0xFFD700, 0.3);
sparkleLight1.position.set(2, 2, 2);
scene.add(sparkleLight1);

const sparkleLight2 = new THREE.PointLight(0xaaccff, 0.2);
sparkleLight2.position.set(-2, 1, -2);
scene.add(sparkleLight2);

// ─── CONTROLS ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 2;
controls.maxDistance = 10;

// ─── RING ───
const ringGroup = new THREE.Group();
scene.add(ringGroup);

const ringGeometry = new THREE.TorusGeometry(1.0, 0.15, 32, 100);
const ringMaterial = new THREE.MeshStandardMaterial({
  color: 0xFFD700,
  metalness: 0.9,
  roughness: 0.1
});
const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
ringMesh.rotateX(Math.PI / 2);
ringGroup.add(ringMesh);

// ─── GEM SLOT POSITIONS ───
// 6 slots evenly distributed from -60° to +60° in 24° increments along the top of the torus
const slotPositions = [];
const R = 1.0; // major radius
const r = 0.15; // minor radius

for (let i = 0; i < 6; i++) {
  const angleDeg = -60 + i * 24;
  const angleRad = (angleDeg * Math.PI) / 180;
  
  // Position on the outer surface of the torus (top)
  // The ring is rotated by PI/2 around X, so we need to account for that
  // In the torus's local space (before rotation), the torus lies in XY plane
  // After rotateX(PI/2), it lies in XZ plane
  // We want gems on the outer top surface
  
  const x = (R + r) * Math.cos(angleRad);
  const z = (R + r) * Math.sin(angleRad);
  const y = 0; // on the ring plane, which after rotation becomes the top
  
  // Since the ring is rotated PI/2 around X, we transform:
  // local (x, y, z) -> world (x, -z, y)
  // But the ring is inside ringGroup, so gems added to ringGroup use the group's local space
  // The ring mesh itself is rotated, but the group is not
  // So we need the world-space position of the gem on the torus surface
  
  // The torus after rotation: it lies in the XZ plane (like a ring on a table)
  // The top of the torus tube is at y = r
  // Points on the top of the torus:
  const px = R * Math.cos(angleRad);
  const py = r; // top of the tube
  const pz = R * Math.sin(angleRad);
  
  slotPositions.push(new THREE.Vector3(px, py, pz));
}

// ─── GEM MESHES ───
const gemMeshes = [null, null, null, null, null, null];

function createGemMesh(gemType) {
  const gemData = GEM_COLORS[gemType];
  const geometry = new THREE.OctahedronGeometry(0.1, 2);
  
  const matProps = {
    color: gemData.color,
    emissive: gemData.emissive,
    emissiveIntensity: 0.3,
    metalness: 0.1,
    roughness: 0.05,
    clearcoat: 1.0,
    clearcoatRoughness: 0.05
  };
  
  if (gemType === 'diamond') {
    matProps.transmission = 0.9;
    matProps.ior = 2.42;
    matProps.thickness = 0.5;
    matProps.transparent = true;
    matProps.opacity = 0.9;
  }
  
  const material = new THREE.MeshPhysicalMaterial(matProps);
  const mesh = new THREE.Mesh(geometry, material);
  return mesh;
}

function placeGem(slotIndex, gemType) {
  // Remove existing gem if any
  if (gemMeshes[slotIndex]) {
    ringGroup.remove(gemMeshes[slotIndex]);
    gemMeshes[slotIndex].geometry.dispose();
    gemMeshes[slotIndex].material.dispose();
    gemMeshes[slotIndex] = null;
  }
  
  const mesh = createGemMesh(gemType);
  const pos = slotPositions[slotIndex];
  mesh.position.copy(pos);
  
  // Orient gem to point outward from ring center
  const outDir = new THREE.Vector3(pos.x, 0, pos.z).normalize();
  mesh.lookAt(pos.x + outDir.x, pos.y + 1, pos.z + outDir.z);
  
  ringGroup.add(mesh);
  gemMeshes[slotIndex] = mesh;
  state.slots[slotIndex] = gemType;
  updateGemCount();
}

function removeGem(slotIndex) {
  if (gemMeshes[slotIndex]) {
    ringGroup.remove(gemMeshes[slotIndex]);
    gemMeshes[slotIndex].geometry.dispose();
    gemMeshes[slotIndex].material.dispose();
    gemMeshes[slotIndex] = null;
  }
  state.slots[slotIndex] = null;
  updateGemCount();
}

function updateGemCount() {
  state.gemCount = state.slots.filter(s => s !== null).length;
  updateSlotButtons();
  updateHUD();
}

// ─── LOAD FISH MODEL ───
const loader = new GLTFLoader();
loader.load('._BarramundiFish.glb', (gltf) => {
  const fish = gltf.scene;
  fish.name = 'fishBase';
  fish.scale.set(0.3, 0.3, 0.3);
  fish.position.set(0, -1.5, 0);
  scene.add(fish);
  state.fishLoaded = true;
  updateHUD();
}, undefined, (error) => {
  console.log('Fish model not found, creating placeholder base');
  // Create a decorative aquatic base as fallback
  const baseGroup = new THREE.Group();
  baseGroup.name = 'fishBase';
  baseGroup.position.set(0, -1.5, 0);
  
  // Stylized fish shape
  const bodyGeom = new THREE.ConeGeometry(0.2, 0.8, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2288aa, metalness: 0.6, roughness: 0.3 });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.rotation.z = Math.PI / 2;
  baseGroup.add(body);
  
  const tailGeom = new THREE.ConeGeometry(0.15, 0.3, 4);
  const tail = new THREE.Mesh(tailGeom, bodyMat);
  tail.position.set(-0.5, 0, 0);
  tail.rotation.z = -Math.PI / 2;
  baseGroup.add(tail);
  
  // Pedestal
  const pedestalGeom = new THREE.CylinderGeometry(0.5, 0.6, 0.15, 32);
  const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x333355, metalness: 0.8, roughness: 0.2 });
  const pedestal = new THREE.Mesh(pedestalGeom, pedestalMat);
  pedestal.position.set(0, -0.3, 0);
  baseGroup.add(pedestal);
  
  baseGroup.scale.set(0.3, 0.3, 0.3);
  scene.add(baseGroup);
  state.fishLoaded = true;
  updateHUD();
});

// ─── ACTIONS ───
function doAddGem(slot, gemType) {
  const prevGem = state.slots[slot];
  if (prevGem !== null) return false; // slot occupied
  
  pushAction({
    type: 'add',
    slot: slot,
    gemType: gemType,
    previousState: null
  });
  
  placeGem(slot, gemType);
  state.lastAction = `add:${gemType}:${slot}`;
  updateHUD();
  return true;
}

function doRemoveGem(slot) {
  const prevGem = state.slots[slot];
  if (prevGem === null) return false; // slot empty
  
  pushAction({
    type: 'remove',
    slot: slot,
    gemType: prevGem,
    previousState: prevGem
  });
  
  removeGem(slot);
  state.lastAction = `remove:${prevGem}:${slot}`;
  updateHUD();
  return true;
}

function doClearAll() {
  const prevSlots = [...state.slots];
  if (prevSlots.every(s => s === null)) return false;
  
  pushAction({
    type: 'clear',
    slot: -1,
    gemType: null,
    previousState: prevSlots
  });
  
  for (let i = 0; i < 6; i++) {
    removeGem(i);
  }
  
  state.lastAction = 'clear';
  updateHUD();
  return true;
}

function doUndo() {
  if (historyPos < 0) return;
  
  const action = history[historyPos];
  historyPos--;
  
  switch (action.type) {
    case 'add':
      removeGem(action.slot);
      break;
    case 'remove':
      placeGem(action.slot, action.previousState);
      break;
    case 'clear':
      for (let i = 0; i < 6; i++) {
        if (action.previousState[i]) {
          placeGem(i, action.previousState[i]);
        } else {
          removeGem(i);
        }
      }
      break;
  }
  
  state.lastAction = 'undo';
  updateHistoryState();
}

function doRedo() {
  if (historyPos >= history.length - 1) return;
  
  historyPos++;
  const action = history[historyPos];
  
  switch (action.type) {
    case 'add':
      placeGem(action.slot, action.gemType);
      break;
    case 'remove':
      removeGem(action.slot);
      break;
    case 'clear':
      for (let i = 0; i < 6; i++) {
        removeGem(i);
      }
      break;
  }
  
  state.lastAction = 'redo';
  updateHistoryState();
}

// ─── UI UPDATES ───
function updateSlotButtons() {
  document.querySelectorAll('.slot-btn').forEach(btn => {
    const slot = parseInt(btn.dataset.slot);
    btn.classList.toggle('occupied', state.slots[slot] !== null);
    btn.classList.toggle('selected', slot === state.selectedSlot);
  });
}

function updateHUD() {
  document.getElementById('hud-gems').textContent = state.gemCount;
  document.getElementById('hud-history').textContent = state.historyLength;
  document.getElementById('hud-position').textContent = state.historyPosition;
  document.getElementById('hud-action').textContent = state.lastAction;
  document.getElementById('hud-rotate').textContent = state.ringAutoRotate ? 'ON' : 'OFF';
}

// ─── EVENT LISTENERS ───
document.querySelectorAll('.gem-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.gem-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.selectedGemType = btn.dataset.gem;
  });
});

document.querySelectorAll('.slot-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.selectedSlot = parseInt(btn.dataset.slot);
    updateSlotButtons();
  });
});

document.getElementById('addGemBtn').addEventListener('click', () => {
  doAddGem(state.selectedSlot, state.selectedGemType);
});

document.getElementById('removeGemBtn').addEventListener('click', () => {
  doRemoveGem(state.selectedSlot);
});

document.getElementById('undoBtn').addEventListener('click', doUndo);
document.getElementById('redoBtn').addEventListener('click', doRedo);
document.getElementById('clearAllBtn').addEventListener('click', doClearAll);

document.addEventListener('keydown', (e) => {
  if (e.key === 'z' || e.key === 'Z') {
    doUndo();
  } else if (e.key === 'y' || e.key === 'Y') {
    doRedo();
  } else if (e.key === 'r' || e.key === 'R') {
    state.ringAutoRotate = !state.ringAutoRotate;
    updateHUD();
  }
});

// ─── RESIZE ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── ANIMATION ───
function animate() {
  requestAnimationFrame(animate);
  
  if (state.ringAutoRotate) {
    ringGroup.rotation.y += 0.005;
  }
  state.ringRotationY = ringGroup.rotation.y;
  
  // Gem sparkle animation
  gemMeshes.forEach((mesh, i) => {
    if (mesh) {
      mesh.rotation.y += 0.02;
      mesh.rotation.x += 0.01;
      // Subtle floating
      const basePos = slotPositions[i];
      mesh.position.y = basePos.y + Math.sin(Date.now() * 0.003 + i) * 0.01;
    }
  });
  
  controls.update();
  renderer.render(scene, camera);
}

// ─── INIT ───
updateHistoryState();
updateHUD();
updateSlotButtons();
animate();
</script>
</body>
