<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ring Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }
        .pointer-events-auto {
            pointer-events: auto;
        }
        #top-bar {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        #top-bar h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .panel {
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #left-panel {
            position: absolute;
            left: 0;
            top: 70px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #right-panel {
            position: absolute;
            right: 0;
            top: 70px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 250px;
        }
        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        .gem-palette {
            display: flex;
            gap: 10px;
        }
        .gem-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .gem-btn:hover { transform: scale(1.1); }
        .gem-btn.active { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        .slot-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .slot-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .slot-btn:hover { background: rgba(255,255,255,0.2); }
        .slot-btn.active { background: #4a4e69; border-color: #fff; }
        
        .action-btn {
            background: #2a2d43;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-bottom: 10px;
        }
        .action-btn:hover:not(:disabled) { background: #4a4e69; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .action-btn.primary { background: #4caf50; border-color: #4caf50; }
        .action-btn.primary:hover:not(:disabled) { background: #45a049; }
        .action-btn.danger { background: #f44336; border-color: #f44336; }
        .action-btn.danger:hover:not(:disabled) { background: #da190b; }

        .hud-info {
            font-size: 13px;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .hud-value { font-weight: bold; color: #fff; }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="top-bar" class="pointer-events-auto">
            <h1>Ring Designer</h1>
        </div>
        
        <div id="left-panel" class="panel pointer-events-auto">
            <div>
                <div class="section-title">Select Gem</div>
                <div class="gem-palette">
                    <button class="gem-btn active" data-gem="ruby" style="background: #FF0033;"></button>
                    <button class="gem-btn" data-gem="emerald" style="background: #00CC66;"></button>
                    <button class="gem-btn" data-gem="sapphire" style="background: #0033FF;"></button>
                    <button class="gem-btn" data-gem="diamond" style="background: #FFFFFF;"></button>
                    <button class="gem-btn" data-gem="amethyst" style="background: #9933FF;"></button>
                </div>
            </div>
            
            <div style="margin-top: 10px;">
                <div class="section-title">Select Slot</div>
                <div class="slot-selector">
                    <button class="slot-btn active" data-slot="0">1</button>
                    <button class="slot-btn" data-slot="1">2</button>
                    <button class="slot-btn" data-slot="2">3</button>
                    <button class="slot-btn" data-slot="3">4</button>
                    <button class="slot-btn" data-slot="4">5</button>
                    <button class="slot-btn" data-slot="5">6</button>
                </div>
            </div>
        </div>

        <div id="right-panel" class="panel pointer-events-auto">
            <div>
                <div class="section-title">Actions</div>
                <button id="addGemBtn" class="action-btn primary">Add Gem</button>
                <button id="removeGemBtn" class="action-btn danger">Remove Gem</button>
                <div style="display: flex; gap: 10px;">
                    <button id="undoBtn" class="action-btn" disabled>Undo (Z)</button>
                    <button id="redoBtn" class="action-btn" disabled>Redo (Y)</button>
                </div>
                <button id="clearAllBtn" class="action-btn">Clear All</button>
            </div>
            
            <div style="margin-top: 10px;">
                <div class="section-title">HUD</div>
                <div class="hud-info"><span>Total Gems:</span> <span id="hud-count" class="hud-value">0</span></div>
                <div class="hud-info"><span>History Length:</span> <span id="hud-history" class="hud-value">0</span></div>
                <div class="hud-info"><span>Stack Position:</span> <span id="hud-pos" class="hud-value">0</span></div>
            </div>
        </div>

        <div class="controls-hint">
            Left Click + Drag to Rotate | Scroll to Zoom | Press 'R' to toggle auto-rotation
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            selectedGemType: 'ruby',
            selectedSlot: 0,
            slots: [null, null, null, null, null, null],
            gemCount: 0,
            historyLength: 0,
            historyPosition: 0,
            canUndo: false,
            canRedo: false,
            ringRotationY: 0,
            fishLoaded: false,
            lastAction: 'none',
            ringAutoRotate: true
        };

        const historyStack = [];

        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // Background handled by CSS, set renderer to transparent
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 10;

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.6);
        pointLight.position.set(-3, 3, -3);
        scene.add(pointLight);

        // --- MATERIALS ---
        const gemMaterials = {
            ruby: new THREE.MeshPhysicalMaterial({ color: 0xFF0033, metalness: 0.1, roughness: 0.1, transmission: 0.6, thickness: 0.5 }),
            emerald: new THREE.MeshPhysicalMaterial({ color: 0x00CC66, metalness: 0.1, roughness: 0.1, transmission: 0.6, thickness: 0.5 }),
            sapphire: new THREE.MeshPhysicalMaterial({ color: 0x0033FF, metalness: 0.1, roughness: 0.1, transmission: 0.6, thickness: 0.5 }),
            diamond: new THREE.MeshPhysicalMaterial({ color: 0xFFFFFF, metalness: 0.0, roughness: 0.0, transmission: 0.9, thickness: 0.5, ior: 2.4 }),
            amethyst: new THREE.MeshPhysicalMaterial({ color: 0x9933FF, metalness: 0.1, roughness: 0.1, transmission: 0.6, thickness: 0.5 })
        };

        // --- SCENE OBJECTS ---
        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        // Ring Base
        const ringGeo = new THREE.TorusGeometry(1.0, 0.15, 32, 100);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.1 });
        const ringMesh = new THREE.Mesh(ringGeo, ringMat);
        ringMesh.rotation.x = Math.PI / 2; // As requested
        ringGroup.add(ringMesh);

        // Rotate group so the "top" (local +Y of unrotated torus, which becomes -Z) faces the camera (+Z)
        ringGroup.rotation.y = Math.PI;

        // Gems
        const gemGeo = new THREE.OctahedronGeometry(0.1, 2);
        const gemMeshes = [];
        const slotPositions = [];
        
        // 6 slots, -60 to +60 degrees, 24 deg increments
        const startAngle = -60;
        const increment = 24;
        const radius = 1.15; // 1.0 (major) + 0.15 (minor)

        for (let i = 0; i < 6; i++) {
            const angleDeg = startAngle + (i * increment);
            const angleRad = angleDeg * Math.PI / 180;
            
            // Calculate position on the Torus surface
            const x = radius * Math.sin(angleRad);
            const y = radius * Math.cos(angleRad);
            const z = 0;
            
            slotPositions.push(new THREE.Vector3(x, y, z));

            const gemMesh = new THREE.Mesh(gemGeo, gemMaterials.ruby);
            gemMesh.position.set(x, y, z);
            gemMesh.visible = false;
            
            // Add to ringMesh so it inherits the rotateX(PI/2)
            ringMesh.add(gemMesh);
            gemMeshes.push(gemMesh);
        }

        // Load GLTF
        const loader = new GLTFLoader();
        loader.load('._BarramundiFish.glb', (gltf) => {
            const fish = gltf.scene;
            fish.scale.set(0.3, 0.3, 0.3);
            fish.position.set(0, -1.5, 0);
            fish.name = 'fishBase';
            scene.add(fish);
            window.__3D_STATE__.fishLoaded = true;
        }, undefined, (error) => {
            console.warn('GLTF model not found or failed to load. Proceeding without it.', error);
        });

        // --- LOGIC & UI UPDATES ---
        function updateSceneFromState() {
            let count = 0;
            for (let i = 0; i < 6; i++) {
                const gemType = window.__3D_STATE__.slots[i];
                if (gemType) {
                    gemMeshes[i].visible = true;
                    gemMeshes[i].material = gemMaterials[gemType];
                    count++;
                } else {
                    gemMeshes[i].visible = false;
                }
            }
            window.__3D_STATE__.gemCount = count;
            updateHUD();
        }

        function updateHUD() {
            const state = window.__3D_STATE__;
            state.historyLength = historyStack.length;
            state.canUndo = state.historyPosition > 0;
            state.canRedo = state.historyPosition < historyStack.length;

            document.getElementById('hud-count').innerText = state.gemCount;
            document.getElementById('hud-history').innerText = state.historyLength;
            document.getElementById('hud-pos').innerText = state.historyPosition;

            document.getElementById('undoBtn').disabled = !state.canUndo;
            document.getElementById('redoBtn').disabled = !state.canRedo;
        }

        function pushHistory(action) {
            const state = window.__3D_STATE__;
            // Discard future history if we are not at the end
            if (state.historyPosition < historyStack.length) {
                historyStack.splice(state.historyPosition);
            }
            historyStack.push(action);
            state.historyPosition++;
        }

        // --- ACTIONS ---
        function addGem() {
            const state = window.__3D_STATE__;
            const slot = state.selectedSlot;
            const type = state.selectedGemType;
            const prev = state.slots[slot];

            if (prev !== type) {
                pushHistory({ type: 'add', slot: slot, gemType: type, previousState: prev });
                state.slots[slot] = type;
                state.lastAction = `add:${type}:${slot}`;
                updateSceneFromState();
            }
        }

        function removeGem() {
            const state = window.__3D_STATE__;
            const slot = state.selectedSlot;
            const prev = state.slots[slot];

            if (prev !== null) {
                pushHistory({ type: 'remove', slot: slot, gemType: null, previousState: prev });
                state.slots[slot] = null;
                state.lastAction = `remove:${prev}:${slot}`;
                updateSceneFromState();
            }
        }

        function clearAll() {
            const state = window.__3D_STATE__;
            if (state.gemCount > 0) {
                pushHistory({ type: 'clear', previousState: [...state.slots] });
                state.slots.fill(null);
                state.lastAction = 'clear';
                updateSceneFromState();
            }
        }

        function undo() {
            const state = window.__3D_STATE__;
            if (state.canUndo) {
                state.historyPosition--;
                const action = historyStack[state.historyPosition];
                
                if (action.type === 'add' || action.type === 'remove') {
                    state.slots[action.slot] = action.previousState;
                } else if (action.type === 'clear') {
                    state.slots = [...action.previousState];
                }
                
                state.lastAction = 'undo';
                updateSceneFromState();
            }
        }

        function redo() {
            const state = window.__3D_STATE__;
            if (state.canRedo) {
                const action = historyStack[state.historyPosition];
                
                if (action.type === 'add') {
                    state.slots[action.slot] = action.gemType;
                } else if (action.type === 'remove') {
                    state.slots[action.slot] = null;
                } else if (action.type === 'clear') {
                    state.slots.fill(null);
                }
                
                state.historyPosition++;
                state.lastAction = 'redo';
                updateSceneFromState();
            }
        }

        // --- EVENT LISTENERS ---
        document.querySelectorAll('.gem-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.gem-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                window.__3D_STATE__.selectedGemType = e.target.dataset.gem;
            });
        });

        document.querySelectorAll('.slot-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                window.__3D_STATE__.selectedSlot = parseInt(e.target.dataset.slot);
            });
        });

        document.getElementById('addGemBtn').addEventListener('click', addGem);
        document.getElementById('removeGemBtn').addEventListener('click', removeGem);
        document.getElementById('clearAllBtn').addEventListener('click', clearAll);
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('redoBtn').addEventListener('click', redo);

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'z') undo();
            if (e.key.toLowerCase() === 'y') redo();
            if (e.key.toLowerCase() === 'r') {
                window.__3D_STATE__.ringAutoRotate = !window.__3D_STATE__.ringAutoRotate;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (window.__3D_STATE__.ringAutoRotate) {
                ringGroup.rotation.y += 0.005;
            }
            window.__3D_STATE__.ringRotationY = ringGroup.rotation.y;

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize
        updateSceneFromState();
        animate();
    </script>
</body>
</html>
