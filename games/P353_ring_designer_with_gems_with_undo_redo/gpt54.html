<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ring Designer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #1a1a2e 0%, #111122 100%);
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0));
      pointer-events: none;
    }

    .title {
      font-size: 30px;
      letter-spacing: 1px;
      font-weight: 500;
      color: #f5df8f;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .panel {
      position: absolute;
      top: 72px;
      left: 20px;
      width: 320px;
      background: rgba(15, 15, 30, 0.72);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      pointer-events: auto;
    }

    .section {
      margin-bottom: 14px;
    }

    .section h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      font-weight: 600;
      color: #d9d9f3;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .palette, .slots, .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .gem-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      cursor: pointer;
      outline: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .gem-btn.selected {
      transform: scale(1.08);
      border-color: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
    }

    .slot-btn, .action-btn {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #2a2a45;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .slot-btn {
      min-width: 42px;
      height: 42px;
    }

    .slot-btn.selected {
      background: #f0c94d;
      color: #111;
      font-weight: bold;
    }

    .action-btn:hover, .slot-btn:hover, .gem-btn:hover {
      transform: translateY(-1px);
    }

    .action-btn {
      background: #3a3a66;
      flex: 1 1 calc(50% - 10px);
    }

    .action-btn.primary {
      background: #b68b1f;
      color: #111;
      font-weight: 700;
    }

    .hud {
      position: absolute;
      right: 20px;
      bottom: 20px;
      min-width: 260px;
      background: rgba(15, 15, 30, 0.72);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 16px;
      backdrop-filter: blur(8px);
      pointer-events: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.7;
    }

    .hint {
      margin-top: 10px;
      opacity: 0.8;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="ui">
      <div class="topbar">
        <div class="title">Ring Designer</div>
      </div>

      <div class="panel">
        <div class="section">
          <h3>Gem Palette</h3>
          <div class="palette">
            <button class="gem-btn selected" data-gem="ruby" title="Ruby" style="background:#FF0033;"></button>
            <button class="gem-btn" data-gem="emerald" title="Emerald" style="background:#00CC66;"></button>
            <button class="gem-btn" data-gem="sapphire" title="Sapphire" style="background:#0033FF;"></button>
            <button class="gem-btn" data-gem="diamond" title="Diamond" style="background:#FFFFFF;"></button>
            <button class="gem-btn" data-gem="amethyst" title="Amethyst" style="background:#9933FF;"></button>
          </div>
        </div>

        <div class="section">
          <h3>Select Slot</h3>
          <div class="slots">
            <button class="slot-btn selected" data-slot="0">1</button>
            <button class="slot-btn" data-slot="1">2</button>
            <button class="slot-btn" data-slot="2">3</button>
            <button class="slot-btn" data-slot="3">4</button>
            <button class="slot-btn" data-slot="4">5</button>
            <button class="slot-btn" data-slot="5">6</button>
          </div>
        </div>

        <div class="section">
          <h3>Actions</h3>
          <div class="actions">
            <button id="addGemBtn" class="action-btn primary">Add Gem</button>
            <button id="removeGemBtn" class="action-btn">Remove Gem</button>
            <button id="undoBtn" class="action-btn">Undo</button>
            <button id="redoBtn" class="action-btn">Redo</button>
            <button id="clearAllBtn" class="action-btn" style="flex-basis:100%;">Clear All</button>
          </div>
        </div>
      </div>

      <div class="hud" id="hud">
        <div>Total Gems: <span id="hudGemCount">0</span></div>
        <div>History Length: <span id="hudHistoryLength">0</span></div>
        <div>History Position: <span id="hudHistoryPosition">0</span></div>
        <div>Last Action: <span id="hudLastAction">none</span></div>
        <div>Fish Loaded: <span id="hudFishLoaded">false</span></div>
        <div>Auto Rotate: <span id="hudAutoRotate">true</span></div>
        <div class="hint">Keys: Z = Undo, Y = Redo, R = Toggle Rotation</div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.6, 20);
    pointLight.position.set(-3, 3, -3);
    scene.add(pointLight);

    const ringGroup = new THREE.Group();
    scene.add(ringGroup);

    const ringGeometry = new THREE.TorusGeometry(1.0, 0.15, 32, 100);
    const ringMaterial = new THREE.MeshStandardMaterial({
      color: 0xFFD700,
      metalness: 0.9,
      roughness: 0.1
    });
    const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
    ringMesh.rotation.x = Math.PI / 2;
    ringGroup.add(ringMesh);

    const gemHolder = new THREE.Group();
    ringGroup.add(gemHolder);

    const gemConfig = {
      ruby:     { color: 0xFF0033 },
      emerald:  { color: 0x00CC66 },
      sapphire: { color: 0x0033FF },
      diamond:  { color: 0xFFFFFF, transmission: 0.9, transparent: true, opacity: 0.95 },
      amethyst: { color: 0x9933FF }
    };

    const gemMeshes = new Array(6).fill(null);

    function createGemMesh(type) {
      const cfg = gemConfig[type];
      const materialParams = {
        color: cfg.color,
        metalness: 0.05,
        roughness: 0.05,
        transmission: cfg.transmission || 0.0,
        transparent: cfg.transparent || false,
        opacity: cfg.opacity || 1.0,
        thickness: 0.8,
        ior: 2.2,
        clearcoat: 1.0,
        clearcoatRoughness: 0.0
      };
      const mesh = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.1, 2),
        new THREE.MeshPhysicalMaterial(materialParams)
      );
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      return mesh;
    }

    const slotPositions = [];
    const anglesDeg = [-60, -36, -12, 12, 36, 60];
    const ringRadius = 1.0;
    const tubeRadius = 0.15;
    const gemOffset = 0.08;

    for (let i = 0; i < anglesDeg.length; i++) {
      const theta = THREE.MathUtils.degToRad(anglesDeg[i]);
      const x = ringRadius * Math.sin(theta);
      const y = ringRadius * Math.cos(theta);
      const z = tubeRadius + gemOffset;
      slotPositions.push(new THREE.Vector3(x, y, z));
    }

    function orientGem(mesh, pos) {
      mesh.position.copy(pos);
      mesh.lookAt(pos.clone().multiplyScalar(2));
      mesh.rotateX(Math.PI / 4);
    }

    const loader = new GLTFLoader();
    loader.load(
      '._BarramundiFish.glb',
      (gltf) => {
        const fish = gltf.scene;
        fish.name = 'fishBase';
        fish.scale.setScalar(0.3);
        fish.position.set(0, -1.5, 0);
        scene.add(fish);
        window.__3D_STATE__.fishLoaded = true;
        updateHUD();
      },
      undefined,
      () => {
        window.__3D_STATE__.fishLoaded = false;
        updateHUD();
      }
    );

    const history = [];
    let historyPosition = 0;

    const state = {
      selectedGemType: 'ruby',
      selectedSlot: 0,
      slots: new Array(6).fill(null),
      gemCount: 0,
      historyLength: 0,
      historyPosition: 0,
      canUndo: false,
      canRedo: false,
      ringRotationY: 0,
      fishLoaded: false,
      lastAction: 'none',
      ringAutoRotate: true
    };

    window.__3D_STATE__ = state;

    function syncState() {
      state.gemCount = state.slots.filter(Boolean).length;
      state.historyLength = history.length;
      state.historyPosition = historyPosition;
      state.canUndo = historyPosition > 0;
      state.canRedo = historyPosition < history.length;
      state.ringRotationY = ringGroup.rotation.y;
    }

    function updateHUD() {
      syncState();
      document.getElementById('hudGemCount').textContent = state.gemCount;
      document.getElementById('hudHistoryLength').textContent = state.historyLength;
      document.getElementById('hudHistoryPosition').textContent = state.historyPosition;
      document.getElementById('hudLastAction').textContent = state.lastAction;
      document.getElementById('hudFishLoaded').textContent = String(state.fishLoaded);
      document.getElementById('hudAutoRotate').textContent = String(state.ringAutoRotate);
    }

    function renderSlots() {
      for (let i = 0; i < 6; i++) {
        if (gemMeshes[i]) {
          gemHolder.remove(gemMeshes[i]);
          gemMeshes[i].geometry.dispose();
          gemMeshes[i].material.dispose();
          gemMeshes[i] = null;
        }

        const gemType = state.slots[i];
        if (gemType) {
          const gem = createGemMesh(gemType);
          orientGem(gem, slotPositions[i]);
          gem.userData.slot = i;
          gem.userData.gemType = gemType;
          gemHolder.add(gem);
          gemMeshes[i] = gem;
        }
      }
      syncState();
      updateHUD();
    }

    function recordAction(action) {
      if (historyPosition < history.length) {
        history.splice(historyPosition);
      }
      history.push(action);
      historyPosition = history.length;
    }

    function addGem(slot, gemType, record = true) {
      if (state.slots[slot] !== null) return false;
      if (record) {
        recordAction({
          type: 'add',
          slot,
          gemType,
          previousState: state.slots.slice()
        });
      }
      state.slots[slot] = gemType;
      state.lastAction = `add:${gemType}:${slot}`;
      renderSlots();
      return true;
    }

    function removeGem(slot, record = true) {
      if (state.slots[slot] === null) return false;
      const gemType = state.slots[slot];
      if (record) {
        recordAction({
          type: 'remove',
          slot,
          gemType,
          previousState: state.slots.slice()
        });
      }
      state.slots[slot] = null;
      state.lastAction = `remove:${gemType}:${slot}`;
      renderSlots();
      return true;
    }

    function clearAll(record = true) {
      if (state.slots.every(v => v === null)) return false;
      if (record) {
        recordAction({
          type: 'clear',
          slot: null,
          gemType: null,
          previousState: state.slots.slice()
        });
      }
      state.slots = new Array(6).fill(null);
      state.lastAction = 'clear';
      renderSlots();
      return true;
    }

    function applyAction(action) {
      if (action.type === 'add') {
        state.slots[action.slot] = action.gemType;
      } else if (action.type === 'remove') {
        state.slots[action.slot] = null;
      } else if (action.type === 'clear') {
        state.slots = new Array(6).fill(null);
      }
      renderSlots();
    }

    function revertAction(action) {
      state.slots = action.previousState.slice();
      renderSlots();
    }

    function undo() {
      if (historyPosition <= 0) return;
      historyPosition--;
      const action = history[historyPosition];
      revertAction(action);
      state.lastAction = 'undo';
      updateHUD();
    }

    function redo() {
      if (historyPosition >= history.length) return;
      const action = history[historyPosition];
      applyAction(action);
      historyPosition++;
      state.lastAction = 'redo';
      updateHUD();
    }

    const gemButtons = document.querySelectorAll('.gem-btn');
    gemButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        gemButtons.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        state.selectedGemType = btn.dataset.gem;
        updateHUD();
      });
    });

    const slotButtons = document.querySelectorAll('.slot-btn');
    slotButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        slotButtons.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        state.selectedSlot = Number(btn.dataset.slot);
        updateHUD();
      });
    });

    document.getElementById('addGemBtn').addEventListener('click', () => {
      addGem(state.selectedSlot, state.selectedGemType, true);
    });

    document.getElementById('removeGemBtn').addEventListener('click', () => {
      removeGem(state.selectedSlot, true);
    });

    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('redoBtn').addEventListener('click', redo);
    document.getElementById('clearAllBtn').addEventListener('click', () => clearAll(true));

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'z') {
        undo();
      } else if (key === 'y') {
        redo();
      } else if (key === 'r') {
        state.ringAutoRotate = !state.ringAutoRotate;
        updateHUD();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      if (state.ringAutoRotate) {
        ringGroup.rotation.y += 0.005;
      }

      controls.update();
      state.ringRotationY = ringGroup.rotation.y;
      updateHUD();
      renderer.render(scene, camera);
    }

    renderSlots();
    animate();
  </script>
</body>
</html>
