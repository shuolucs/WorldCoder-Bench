<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Basketball Free Throw Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 10;
}

#score-display {
    position: absolute;
    top: 15px;
    left: 20px;
    color: white;
    font-size: 22px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#difficulty-display {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#streak-display {
    position: absolute;
    top: 15px;
    right: 20px;
    color: white;
    font-size: 22px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#aim-display {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-size: 16px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}

#wind-display {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #88ccff;
    font-size: 16px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}

#power-bar-container {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 200px;
    border: 2px solid white;
    background: rgba(0,0,0,0.5);
    border-radius: 4px;
    overflow: hidden;
}

#power-bar-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
    transition: none;
}

#power-label {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%) translateY(115px);
    color: white;
    font-size: 14px;
    text-align: center;
    width: 30px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}

#reset-btn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 30px;
    font-size: 16px;
    background: #cc3333;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    pointer-events: all;
    z-index: 20;
}
#reset-btn:hover { background: #ff4444; }

#instructions {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: #ccc;
    font-size: 14px;
    text-align: center;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    pointer-events: none;
}

#message {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
}
</style>
</head>
<body>

<div id="hud">
    <div id="score-display">Score: 0 / 0</div>
    <div id="difficulty-display">Difficulty: 1</div>
    <div id="streak-display">Streak: 0</div>
    <div id="aim-display">Aim: 0.00 rad</div>
    <div id="wind-display">Wind: 0.0 m/s</div>
    <div id="power-bar-container">
        <div id="power-bar-fill"></div>
    </div>
    <div id="power-label">0%</div>
    <div id="message"></div>
    <div id="instructions">HOLD SPACE to charge, RELEASE to shoot | ← → to aim</div>
    <button id="reset-btn">Reset Game</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
    // ==================== STATE ====================
    const state = {
        score: 0,
        totalShots: 0,
        difficulty: 1,
        consecutiveMakes: 0,
        consecutiveMisses: 0,
        ballPosition: { x: 0, y: 2, z: 8 },
        ballVelocity: { x: 0, y: 0, z: 0 },
        ballActive: false,
        power: 0,
        aimOffset: 0,
        hoopPosition: { x: 0, y: 3.05, z: -5 },
        windSpeed: 0,
        fishLoaded: false,
        fishPosition: { x: 3, y: 0.5, z: -3 },
        gameTime: 0,
        lastShotResult: 'none'
    };
    window.__3D_STATE__ = state;

    // ==================== SCENE SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 20, 50);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 4, -5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    scene.add(dirLight);

    // ==================== COURT FLOOR ====================
    const floorGeom = new THREE.BoxGeometry(40, 0.2, 30);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const floor = new THREE.Mesh(floorGeom, floorMat);
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    // Court lines
    const lineGeom = new THREE.PlaneGeometry(8, 0.05);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const freeThrowLine = new THREE.Mesh(lineGeom, lineMat);
    freeThrowLine.rotation.x = -Math.PI / 2;
    freeThrowLine.position.set(0, 0.11, 8);
    scene.add(freeThrowLine);

    // Free throw circle
    const circleGeom = new THREE.RingGeometry(1.8, 1.85, 32);
    const circleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
    const freeThrowCircle = new THREE.Mesh(circleGeom, circleMat);
    freeThrowCircle.rotation.x = -Math.PI / 2;
    freeThrowCircle.position.set(0, 0.11, 8);
    scene.add(freeThrowCircle);

    // Key/lane lines
    const laneGeom = new THREE.PlaneGeometry(0.05, 13);
    const laneLeft = new THREE.Mesh(laneGeom, lineMat);
    laneLeft.rotation.x = -Math.PI / 2;
    laneLeft.position.set(-2, 0.11, 1.5);
    scene.add(laneLeft);
    const laneRight = new THREE.Mesh(laneGeom, lineMat);
    laneRight.rotation.x = -Math.PI / 2;
    laneRight.position.set(2, 0.11, 1.5);
    scene.add(laneRight);

    // ==================== BASKETBALL HOOP ====================
    const hoopGroup = new THREE.Group();

    // Hoop ring (torus)
    const hoopGeom = new THREE.TorusGeometry(0.6, 0.05, 16, 32);
    const hoopMat = new THREE.MeshStandardMaterial({ color: 0xFF6600, metalness: 0.6, roughness: 0.3 });
    const hoop = new THREE.Mesh(hoopGeom, hoopMat);
    hoop.rotation.x = -Math.PI / 2;
    hoop.position.set(0, 3.05, -5);
    hoop.castShadow = true;
    hoopGroup.add(hoop);

    // Net (simple cylinder wireframe)
    const netGeom = new THREE.CylinderGeometry(0.55, 0.35, 0.6, 12, 4, true);
    const netMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.6 });
    const net = new THREE.Mesh(netGeom, netMat);
    net.position.set(0, 2.75, -5);
    hoopGroup.add(net);

    // Pole
    const poleGeom = new THREE.CylinderGeometry(0.1, 0.1, 3.05, 16);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.5, roughness: 0.4 });
    const pole = new THREE.Mesh(poleGeom, poleMat);
    pole.position.set(0, 1.525, -5.5);
    pole.castShadow = true;
    hoopGroup.add(pole);

    // Backboard
    const backboardGeom = new THREE.BoxGeometry(1.8, 1.2, 0.1);
    const backboardMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
    const backboard = new THREE.Mesh(backboardGeom, backboardMat);
    backboard.position.set(0, 3.5, -5.6);
    backboard.castShadow = true;
    hoopGroup.add(backboard);

    // Backboard outline
    const outlineGeom = new THREE.EdgesGeometry(backboardGeom);
    const outlineMat = new THREE.LineBasicMaterial({ color: 0xff0000 });
    const backboardOutline = new THREE.LineSegments(outlineGeom, outlineMat);
    backboardOutline.position.copy(backboard.position);
    hoopGroup.add(backboardOutline);

    // Small square on backboard
    const squareGeom = new THREE.EdgesGeometry(new THREE.BoxGeometry(0.6, 0.45, 0.11));
    const squareMat = new THREE.LineBasicMaterial({ color: 0xff0000 });
    const square = new THREE.LineSegments(squareGeom, squareMat);
    square.position.set(0, 3.35, -5.6);
    hoopGroup.add(square);

    scene.add(hoopGroup);

    const originalBackboardScale = { x: 1.8, y: 1.2 };

    // ==================== BASKETBALL ====================
    const ballGeom = new THREE.SphereGeometry(0.24, 32, 32);
    const ballMat = new THREE.MeshStandardMaterial({ color: 0xFF8C00, roughness: 0.7 });
    const ball = new THREE.Mesh(ballGeom, ballMat);
    ball.position.set(0, 2, 8);
    ball.castShadow = true;
    scene.add(ball);

    // Ball lines (seams)
    const seamGeom = new THREE.TorusGeometry(0.24, 0.005, 8, 32);
    const seamMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
    const seam1 = new THREE.Mesh(seamGeom, seamMat);
    ball.add(seam1);
    const seam2 = new THREE.Mesh(seamGeom, seamMat);
    seam2.rotation.y = Math.PI / 2;
    ball.add(seam2);

    // Ball shadow on floor
    const shadowGeom = new THREE.CircleGeometry(0.3, 16);
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
    const ballShadow = new THREE.Mesh(shadowGeom, shadowMat);
    ballShadow.rotation.x = -Math.PI / 2;
    ballShadow.position.y = 0.11;
    scene.add(ballShadow);

    // ==================== AIMING GUIDE ====================
    const aimLineGeom = new THREE.BufferGeometry();
    const aimPoints = [];
    for (let i = 0; i < 50; i++) aimPoints.push(0, 0, 0);
    aimLineGeom.setAttribute('position', new THREE.Float32BufferAttribute(aimPoints, 3));
    const aimLineMat = new THREE.LineBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.4 });
    const aimLine = new THREE.Line(aimLineGeom, aimLineMat);
    scene.add(aimLine);

    // ==================== FISH MASCOT ====================
    let fishModel = null;
    let fishMixer = null;

    const loader = new THREE.GLTFLoader();
    loader.load(
        '._BarramundiFish.glb',
        function(gltf) {
            fishModel = gltf.scene;
            fishModel.scale.set(0.8, 0.8, 0.8);
            fishModel.position.set(3, 0.5, -3);
            scene.add(fishModel);
            state.fishLoaded = true;
            state.fishPosition = { x: 3, y: 0.5, z: -3 };

            if (gltf.animations && gltf.animations.length > 0) {
                fishMixer = new THREE.AnimationMixer(fishModel);
                gltf.animations.forEach(clip => {
                    fishMixer.clipAction(clip).play();
                });
            }
        },
        undefined,
        function(error) {
            console.log('Fish model not found, creating placeholder fish');
            createPlaceholderFish();
        }
    );

    function createPlaceholderFish() {
        const fishGroup = new THREE.Group();

        // Body
        const bodyGeom = new THREE.SphereGeometry(0.3, 16, 12);
        bodyGeom.scale(1.5, 0.8, 0.6);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4488ff });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        fishGroup.add(body);

        // Tail
        const tailGeom = new THREE.ConeGeometry(0.2, 0.4, 8);
        const tailMat = new THREE.MeshStandardMaterial({ color: 0x3377dd });
        const tail = new THREE.Mesh(tailGeom, tailMat);
        tail.rotation.z = Math.PI / 2;
        tail.position.x = -0.5;
        fishGroup.add(tail);

        // Eye
        const eyeGeom = new THREE.SphereGeometry(0.06, 8, 8);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const eye1 = new THREE.Mesh(eyeGeom, eyeMat);
        eye1.position.set(0.25, 0.1, 0.18);
        fishGroup.add(eye1);
        const eye2 = new THREE.Mesh(eyeGeom, eyeMat);
        eye2.position.set(0.25, 0.1, -0.18);
        fishGroup.add(eye2);

        const pupilGeom = new THREE.SphereGeometry(0.03, 8, 8);
        const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const pupil1 = new THREE.Mesh(pupilGeom, pupilMat);
        pupil1.position.set(0.3, 0.1, 0.2);
        fishGroup.add(pupil1);
        const pupil2 = new THREE.Mesh(pupilGeom, pupilMat);
        pupil2.position.set(0.3, 0.1, -0.2);
        fishGroup.add(pupil2);

        // Fin
        const finGeom = new THREE.ConeGeometry(0.15, 0.25, 6);
        const finMat = new THREE.MeshStandardMaterial({ color: 0x3377dd });
        const fin = new THREE.Mesh(finGeom, finMat);
        fin.position.set(0, 0.25, 0);
        fishGroup.add(fin);

        fishGroup.scale.set(0.8, 0.8, 0.8);
        fishGroup.position.set(3, 0.5, -3);
        scene.add(fishGroup);
        fishModel = fishGroup;
        state.fishLoaded = true;
        state.fishPosition = { x: 3, y: 0.5, z: -3 };
    }

    // ==================== PARTICLES ====================
    const particles = [];

    function createScoreParticles(pos) {
        for (let i = 0; i < 30; i++) {
            const geom = new THREE.SphereGeometry(0.05, 4, 4);
            const mat = new THREE.MeshBasicMaterial({
                color: Math.random() > 0.5 ? 0xFFD700 : 0xFF6600,
                transparent: true
            });
            const p = new THREE.Mesh(geom, mat);
            p.position.copy(pos);
            p.userData.vel = new THREE.Vector3(
                (Math.random() - 0.5) * 5,
                Math.random() * 5 + 2,
                (Math.random() - 0.5) * 5
            );
            p.userData.life = 1.5;
            scene.add(p);
            particles.push(p);
        }
    }

    function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.userData.life -= dt;
            if (p.userData.life <= 0) {
                scene.remove(p);
                particles.splice(i, 1);
                continue;
            }
            p.position.x += p.userData.vel.x * dt;
            p.position.y += p.userData.vel.y * dt;
            p.position.z += p.userData.vel.z * dt;
            p.userData.vel.y -= 9.81 * dt;
            p.material.opacity = p.userData.life / 1.5;
        }
    }

    // ==================== GAME VARIABLES ====================
    const GRAVITY = -9.81;
    const FREE_THROW_POS = new THREE.Vector3(0, 2, 8);
    const HOOP_BASE_POS = new THREE.Vector3(0, 3.05, -5);

    let ballVelocity = new THREE.Vector3(0, 0, 0);
    let ballActive = false;
    let charging = false;
    let power = 0;
    let aimOffset = 0;
    let scored = false;
    let resetTimer = null;
    let gameTime = 0;
    let windSpeed = 0;
    let messageTimer = null;

    const keysDown = {};

    // ==================== DOM ELEMENTS ====================
    const scoreDisplay = document.getElementById('score-display');
    const difficultyDisplay = document.getElementById('difficulty-display');
    const streakDisplay = document.getElementById('streak-display');
    const aimDisplay = document.getElementById('aim-display');
    const windDisplay = document.getElementById('wind-display');
    const powerBarFill = document.getElementById('power-bar-fill');
    const powerLabel = document.getElementById('power-label');
    const messageEl = document.getElementById('message');

    // ==================== INPUT ====================
    document.addEventListener('keydown', (e) => {
        keysDown[e.code] = true;
        if (e.code === 'Space' && !ballActive && !charging) {
            e.preventDefault();
            charging = true;
            power = 0;
        }
        if (e.code === 'ArrowLeft') {
            e.preventDefault();
            if (!ballActive) aimOffset -= 0.05;
        }
        if (e.code === 'ArrowRight') {
            e.preventDefault();
            if (!ballActive) aimOffset += 0.05;
        }
    });

    document.addEventListener('keyup', (e) => {
        keysDown[e.code] = false;
        if (e.code === 'Space' && charging && !ballActive) {
            e.preventDefault();
            charging = false;
            shootBall();
        }
    });

    document.getElementById('reset-btn').addEventListener('click', resetGame);

    // ==================== SHOOTING ====================
    function shootBall() {
        const launchSpeed = 5 + (power / 100) * 10; // 5 to 15 m/s
        const vertAngle = 55 * Math.PI / 180;

        const vY = launchSpeed * Math.sin(vertAngle);
        const vHoriz = launchSpeed * Math.cos(vertAngle);
        const vX = vHoriz * Math.sin(aimOffset);
        const vZ = -vHoriz * Math.cos(aimOffset);

        ballVelocity.set(vX, vY, vZ);
        ballActive = true;
        scored = false;
        state.totalShots++;
        state.lastShotResult = 'none';
    }

    function resetBall() {
        ball.position.copy(FREE_THROW_POS);
        ballVelocity.set(0, 0, 0);
        ballActive = false;
        power = 0;
        charging = false;
        scored = false;
        if (resetTimer) {
            clearTimeout(resetTimer);
            resetTimer = null;
        }
    }

    function resetGame() {
        state.score = 0;
        state.totalShots = 0;
        state.difficulty = 1;
        state.consecutiveMakes = 0;
        state.consecutiveMisses = 0;
        state.lastShotResult = 'none';
        aimOffset = 0;
        windSpeed = 0;
        resetBall();
        showMessage('');
    }

    function showMessage(text, duration) {
        messageEl.textContent = text;
        messageEl.style.opacity = text ? '1' : '0';
        if (messageTimer) clearTimeout(messageTimer);
        if (duration) {
            messageTimer = setTimeout(() => {
                messageEl.style.opacity = '0';
            }, duration);
        }
    }

    // ==================== DIFFICULTY ====================
    function updateDifficulty() {
        if (state.consecutiveMakes > 0 && state.consecutiveMakes % 2 === 0) {
            state.difficulty = Math.min(5, state.difficulty + 1);
        }
        if (state.consecutiveMisses > 0 && state.consecutiveMisses % 2 === 0) {
            state.difficulty = Math.max(1, state.difficulty - 1);
        }
    }

    function getDifficultyColor(d) {
        const colors = ['#00ff00', '#88ff00', '#ffff00', '#ff8800', '#ff0000'];
        return colors[d - 1] || '#ffffff';
    }

    // ==================== ANIMATION LOOP ====================
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.05);
        gameTime += dt;
        state.gameTime = gameTime;

        // Power charging
        if (charging && !ballActive) {
            power += (100 / 2) * dt; // 2 seconds to full
            if (power > 100) power = power % 100;
        }
        state.power = power;
        state.aimOffset = aimOffset;

        // Update power bar
        powerBarFill.style.height = power + '%';
        powerLabel.textContent = Math.round(power) + '%';

        // Wind based on difficulty
        const diff = state.difficulty;
        if (diff === 1) {
            windSpeed = 0;
        } else if (diff === 2) {
            windSpeed = 0.5;
        } else if (diff === 3) {
            windSpeed = 1.0;
        } else if (diff === 4) {
            windSpeed = (Math.random() * 3 - 1.5);
        } else if (diff === 5) {
            windSpeed = (Math.random() * 4 - 2);
        }
        state.windSpeed = windSpeed;

        // Hoop sway
        let hoopSwayX = 0;
        if (diff >= 3) {
            let amplitude, period;
            if (diff === 3) { amplitude = 0.3; period = 3; }
            else if (diff === 4) { amplitude = 0.5; period = 2; }
            else { amplitude = 0.7; period = 1.5; }
            hoopSwayX = amplitude * Math.sin(gameTime * 2 * Math.PI / period);
        }
        hoop.position.x = HOOP_BASE_POS.x + hoopSwayX;
        net.position.x = HOOP_BASE_POS.x + hoopSwayX;

        // Backboard size for difficulty 5
        if (diff === 5) {
            backboard.scale.set(1.2 / 1.8, 0.8 / 1.2, 1);
        } else {
            backboard.scale.set(1, 1, 1);
        }

        state.hoopPosition = { x: hoop.position.x, y: hoop.position.y, z: hoop.position.z };

        // Ball physics
        if (ballActive) {
            // Apply wind
            if (diff >= 2) {
                ballVelocity.x += windSpeed * dt;
            }

            // Gravity
            ballVelocity.y += GRAVITY * dt;

            // Update position
            ball.position.x += ballVelocity.x * dt;
            ball.position.y += ballVelocity.y * dt;
            ball.position.z += ballVelocity.z * dt;

            // Ball rotation
            ball.rotation.x += ballVelocity.z * dt * 2;
            ball.rotation.z -= ballVelocity.x * dt * 2;

            // Floor bounce
            if (ball.position.y < 0.24) {
                ball.position.y = 0.24;
                ballVelocity.y *= -0.6;
                ballVelocity.x *= 0.8;
                ballVelocity.z *= 0.8;

                if (Math.abs(ballVelocity.y) < 0.5) {
                    ballVelocity.y = 0;
                }
            }

            // Backboard collision
            const bbX = backboard.position.x + hoopSwayX;
            const bbMinX = bbX - (diff === 5 ? 0.6 : 0.9);
            const bbMaxX = bbX + (diff === 5 ? 0.6 : 0.9);
            const bbMinY = backboard.position.y - (diff === 5 ? 0.4 : 0.6);
            const bbMaxY = backboard.position.y + (diff === 5 ? 0.4 : 0.6);
            const bbZ = backboard.position.z;

            if (ball.position.z < bbZ + 0.3 && ball.position.z > bbZ - 0.3 &&
                ball.position.x > bbMinX && ball.position.x < bbMaxX &&
                ball.position.y > bbMinY && ball.position.y < bbMaxY &&
                ballVelocity.z < 0) {
                ballVelocity.z *= -0.5;
                ball.position.z = bbZ + 0.35;
            }

            // Rim collision (simplified)
            const rimRadius = 0.6;
            const rimCenter = new THREE.Vector2(hoop.position.x, hoop.position.z);
            const ballXZ = new THREE.Vector2(ball.position.x, ball.position.z);
            const distToRimCenter = rimCenter.distanceTo(ballXZ);

            if (Math.abs(ball.position.y - hoop.position.y) < 0.15) {
                if (Math.abs(distToRimCenter - rimRadius) < 0.15) {
                    // Bounce off rim
                    const dir = ballXZ.clone().sub(rimCenter).normalize();
                    const dot = ballVelocity.x * dir.x + ballVelocity.z * dir.y;
                    ballVelocity.x -= 1.5 * dot * dir.x;
                    ballVelocity.z -= 1.5 * dot * dir.y;
                    ballVelocity.y *= 0.7;
                }
            }

            // Scoring detection
            if (!scored) {
                const dx = Math.abs(ball.position.x - hoop.position.x);
                const dz = Math.abs(ball.position.z - hoop.position.z);
                const dy = Math.abs(ball.position.y - hoop.position.y);

                if (dx < 0.5 && dz < 0.5 && dy < 0.3 && ballVelocity.y < 0) {
                    scored = true;
                    state.score++;
                    state.consecutiveMakes++;
                    state.consecutiveMisses = 0;
                    state.lastShotResult = 'made';
                    updateDifficulty();
                    showMessage('SWISH! 🏀', 1500);
                    createScoreParticles(ball.position.clone());

                    // Fish celebration
                    if (fishModel) {
                        fishModel.userData.celebrating = true;
                        fishModel.userData.celebrateTime = 0;
                    }
                }
            }

            // Check if ball stopped or out of bounds
            const speed = ballVelocity.length();
            const outOfBounds = Math.abs(ball.position.x) > 15 || Math.abs(ball.position.z) > 20 || ball.position.y < -2;
            const stopped = speed < 0.3 && ball.position.y < 0.5;

            if ((stopped || outOfBounds) && !resetTimer) {
                if (!scored && state.lastShotResult === 'none') {
                    state.consecutiveMisses++;
                    state.consecutiveMakes = 0;
                    state.lastShotResult = 'missed';
                    updateDifficulty();
                    showMessage('Miss!', 1500);
                }
                resetTimer = setTimeout(() => {
                    resetBall();
                }, 2000);
            }
        }

        // Update ball shadow
        ballShadow.position.x = ball.position.x;
        ballShadow.position.z = ball.position.z;
        const shadowScale = Math.max(0.3, 1 - ball.position.y / 10);
        ballShadow.scale.set(shadowScale, shadowScale, shadowScale);
        ballShadow.material.opacity = 0.3 * shadowScale;

        // Aim guide (trajectory preview)
        if (!ballActive) {
            const previewSpeed = 5 + (power / 100) * 10;
            const vertAngle = 55 * Math.PI / 180;
            const pvY = previewSpeed * Math.sin(vertAngle);
            const pvHoriz = previewSpeed * Math.cos(vertAngle);
            const pvX = pvHoriz * Math.sin(aimOffset);
            const pvZ = -pvHoriz * Math.cos(aimOffset);

            const positions = aimLine.geometry.attributes.position.array;
            let px = ball.position.x, py = ball.position.y, pz = ball.position.z;
            let vx = pvX, vy = pvY, vz = pvZ;
            const step = 0.05;
            const numPoints = 50;

            for (let i = 0; i < numPoints; i++) {
                positions[i * 3] = px;
                positions[i * 3 + 1] = py;
                positions[i * 3 + 2] = pz;
                px += vx * step;
                py += vy * step;
                pz += vz * step;
                vy += GRAVITY * step;
            }
            aimLine.geometry.attributes.position.needsUpdate = true;
            aimLine.visible = true;
        } else {
            aimLine.visible = false;
        }

        // Fish animation
        if (fishModel) {
            const baseY = 0.5;
            const bobAmplitude = 0.15;
            let fishY = baseY + Math.sin(gameTime * 2) * bobAmplitude;

            if (fishModel.userData.celebrating) {
                fishModel.userData.celebrateTime += dt;
                fishY += Math.sin(fishModel.userData.celebrateTime * 10) * 0.3;
                fishModel.rotation.y += dt * 5;
                if (fishModel.userData.celebrateTime > 2) {
                    fishModel.userData.celebrating = false;
                }
            } else {
                fishModel.rotation.y = Math.sin(gameTime * 0.5) * 0.3;
            }

            fishModel.position.y = fishY;
            state.fishPosition = {
                x: fishModel.position.x,
                y: fishModel.position.y,
                z: fishModel.position.z
            };

            if (fishMixer) fishMixer.update(dt);
        }

        // Update particles
        updateParticles(dt);

        // Update state
        state.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
        state.ballVelocity = { x: ballVelocity.x, y: ballVelocity.y, z: ballVelocity.z };
        state.ballActive = ballActive;
        state.difficulty = state.difficulty;

        // Update HUD
        scoreDisplay.textContent = `Score: ${state.score} / ${state.totalShots}`;

        difficultyDisplay.textContent = `Difficulty: ${state.difficulty}`;
        difficultyDisplay.style.color = getDifficultyColor(state.difficulty);

        if (state.consecutiveMakes > 0) {
            streakDisplay.textContent = `Streak: +${state.consecutiveMakes}`;
            streakDisplay.style.color = '#00ff00';
        } else if (state.consecutiveMisses > 0) {
            streakDisplay.textContent = `Streak: -${state.consecutiveMisses}`;
            streakDisplay.style.color = '#ff4444';
        } else {
            streakDisplay.textContent = 'Streak: 0';
            streakDisplay.style.color = '#ffffff';
        }

        aimDisplay.textContent = `Aim: ${aimOffset.toFixed(2)} rad`;

        if (state.difficulty >= 2) {
            windDisplay.textContent = `Wind: ${windSpeed.toFixed(1)} m/s ${windSpeed > 0 ? '→' : windSpeed < 0 ? '←' : ''}`;
            windDisplay.style.display = 'block';
        } else {
            windDisplay.style.display = 'none';
        }

        renderer.render(scene, camera);
    }

    // ==================== RESIZE ====================
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start
    animate();
})();
</script>
</body>
</html>
