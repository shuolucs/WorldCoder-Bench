<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Basketball Free Throw Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #score {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
    }

    #difficulty {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
    }

    #streak {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
      text-align: right;
    }

    #aim {
      position: absolute;
      top: 52px;
      right: 16px;
      font-size: 16px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
      text-align: right;
    }

    #powerContainer {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 200px;
      border: 2px solid white;
      background: rgba(255,255,255,0.1);
      pointer-events: none;
    }

    #powerFill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(to top, #00ff66, #ffee00, #ff3300);
    }

    #powerLabel {
      position: absolute;
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
      white-space: nowrap;
    }

    #instructions {
      position: absolute;
      bottom: 70px;
      left: 16px;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
      max-width: 360px;
    }

    #resetBtn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;
      padding: 10px 18px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: #ffffff;
      color: #111;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }

    #message {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 2px 6px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score">Score: 0 / 0</div>
    <div id="difficulty">Difficulty: 1</div>
    <div id="streak">Streak: 0</div>
    <div id="aim">Aim Offset: 0.00 rad</div>

    <div id="powerContainer">
      <div id="powerFill"></div>
    </div>
    <div id="powerLabel">Power: 0%</div>

    <div id="instructions">
      <strong>Controls</strong><br />
      Hold <strong>SPACE</strong> to charge power, release to shoot.<br />
      Use <strong>LEFT / RIGHT</strong> arrows to adjust aim.
    </div>

    <div id="message"></div>

    <button id="resetBtn">Reset Game</button>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 4, -5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    // Court floor
    const floor = new THREE.Mesh(
      new THREE.BoxGeometry(40, 0.2, 30),
      new THREE.MeshStandardMaterial({ color: 0x8B4513 })
    );
    floor.position.set(0, 0, 0);
    scene.add(floor);

    // Court lines
    const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
    const freeThrowLinePoints = [
      new THREE.Vector3(-2, 0.11, 8),
      new THREE.Vector3(2, 0.11, 8),
    ];
    const freeThrowLineGeom = new THREE.BufferGeometry().setFromPoints(freeThrowLinePoints);
    const freeThrowLine = new THREE.Line(freeThrowLineGeom, lineMat);
    scene.add(freeThrowLine);

    // Hoop system
    const hoopGroup = new THREE.Group();
    scene.add(hoopGroup);

    const baseHoopPos = new THREE.Vector3(0, 3.05, -5);

    const hoop = new THREE.Mesh(
      new THREE.TorusGeometry(0.6, 0.05, 16, 64),
      new THREE.MeshStandardMaterial({ color: 0xFF6600 })
    );
    hoop.rotation.x = Math.PI / 2;
    hoop.position.copy(baseHoopPos);
    hoopGroup.add(hoop);

    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.1, 0.1, 3.05, 16),
      new THREE.MeshStandardMaterial({ color: 0x888888 })
    );
    pole.position.set(0, 1.525, -5.5);
    hoopGroup.add(pole);

    let backboard = new THREE.Mesh(
      new THREE.BoxGeometry(1.8, 1.2, 0.1),
      new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    backboard.position.set(0, 3.5, -5.6);
    hoopGroup.add(backboard);

    // Ball
    const ballStart = new THREE.Vector3(0, 2, 8);
    const ballRadius = 0.24;
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(ballRadius, 32, 32),
      new THREE.MeshStandardMaterial({ color: 0xFF8C00 })
    );
    ball.position.copy(ballStart);
    scene.add(ball);

    // Fish mascot
    const loader = new GLTFLoader();
    let fish = null;
    let fishBasePos = new THREE.Vector3(3, 0.5, -3);
    let fishReactTimer = 0;

    loader.load(
      "._BarramundiFish.glb",
      (gltf) => {
        fish = gltf.scene;
        fish.scale.set(0.8, 0.8, 0.8);
        fish.position.copy(fishBasePos);
        fish.rotation.y = -Math.PI / 2;
        scene.add(fish);
        state.fishLoaded = true;
      },
      undefined,
      () => {
        // fallback fish if asset fails
        const fallback = new THREE.Mesh(
          new THREE.SphereGeometry(0.4, 16, 16),
          new THREE.MeshStandardMaterial({ color: 0x66ccff })
        );
        fallback.scale.set(1.3, 0.8, 0.6);
        fallback.position.copy(fishBasePos);
        fish = fallback;
        scene.add(fish);
        state.fishLoaded = false;
      }
    );

    // UI refs
    const scoreEl = document.getElementById("score");
    const difficultyEl = document.getElementById("difficulty");
    const streakEl = document.getElementById("streak");
    const aimEl = document.getElementById("aim");
    const powerFillEl = document.getElementById("powerFill");
    const powerLabelEl = document.getElementById("powerLabel");
    const resetBtn = document.getElementById("resetBtn");
    const messageEl = document.getElementById("message");

    // Game state
    const gravity = -9.81;
    const verticalAngle = THREE.MathUtils.degToRad(55);

    let ballVelocity = new THREE.Vector3(0, 0, 0);
    let ballActive = false;
    let shotScored = false;
    let shotResolved = false;
    let resetTimer = null;

    let charging = false;
    let chargeStartTime = 0;
    let currentPower = 0; // 0..100
    let aimOffset = 0; // radians

    let score = 0;
    let totalShots = 0;
    let difficulty = 1;
    let consecutiveMakes = 0;
    let consecutiveMisses = 0;
    let lastShotResult = "none";

    let hoopCurrentPos = baseHoopPos.clone();
    let windSpeed = 0;

    const clock = new THREE.Clock();

    const state = {
      score: 0,
      totalShots: 0,
      difficulty: 1,
      consecutiveMakes: 0,
      consecutiveMisses: 0,
      ballPosition: { x: ball.position.x, y: ball.position.y, z: ball.position.z },
      ballVelocity: { x: 0, y: 0, z: 0 },
      ballActive: false,
      power: 0,
      aimOffset: 0,
      hoopPosition: { x: hoop.position.x, y: hoop.position.y, z: hoop.position.z },
      windSpeed: 0,
      fishLoaded: false,
      fishPosition: { x: fishBasePos.x, y: fishBasePos.y, z: fishBasePos.z },
      gameTime: 0,
      lastShotResult: "none"
    };
    window.__3D_STATE__ = state;

    function difficultyColor(level) {
      const colors = {
        1: "#00cc44",
        2: "#99cc00",
        3: "#ffcc00",
        4: "#ff8800",
        5: "#ff3333"
      };
      return colors[level] || "#ffffff";
    }

    function updateBackboardForDifficulty() {
      hoopGroup.remove(backboard);
      const geom = difficulty === 5
        ? new THREE.BoxGeometry(1.2, 0.8, 0.1)
        : new THREE.BoxGeometry(1.8, 1.2, 0.1);

      backboard = new THREE.Mesh(
        geom,
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      backboard.position.set(0, 3.5, -5.6);
      hoopGroup.add(backboard);
    }

    function updateHUD() {
      scoreEl.textContent = `Score: ${score} / ${totalShots}`;
      difficultyEl.textContent = `Difficulty: ${difficulty}`;
      difficultyEl.style.color = difficultyColor(difficulty);

      if (consecutiveMakes > 0) {
        streakEl.textContent = `Streak: +${consecutiveMakes}`;
        streakEl.style.color = "#66ff66";
      } else if (consecutiveMisses > 0) {
        streakEl.textContent = `Streak: -${consecutiveMisses}`;
        streakEl.style.color = "#ff6666";
      } else {
        streakEl.textContent = "Streak: 0";
        streakEl.style.color = "#ffffff";
      }

      aimEl.textContent = `Aim Offset: ${aimOffset.toFixed(2)} rad`;
      powerFillEl.style.height = `${currentPower}%`;
      powerLabelEl.textContent = `Power: ${Math.round(currentPower)}%`;
    }

    function showMessage(text, color = "#fff") {
      messageEl.textContent = text;
      messageEl.style.color = color;
      messageEl.style.opacity = "1";
      clearTimeout(showMessage._timer);
      showMessage._timer = setTimeout(() => {
        messageEl.style.opacity = "0";
      }, 1000);
    }

    function updateDifficultyOnResult(made) {
      if (made) {
        consecutiveMakes++;
        consecutiveMisses = 0;
        if (consecutiveMakes > 0 && consecutiveMakes % 2 === 0) {
          difficulty = Math.min(5, difficulty + 1);
          updateBackboardForDifficulty();
          showMessage(`Difficulty Up: ${difficulty}`, "#ffee66");
        }
      } else {
        consecutiveMisses++;
        consecutiveMakes = 0;
        if (consecutiveMisses > 0 && consecutiveMisses % 2 === 0) {
          difficulty = Math.max(1, difficulty - 1);
          updateBackboardForDifficulty();
          showMessage(`Difficulty Down: ${difficulty}`, "#66ccff");
        }
      }
    }

    function resetBall() {
      ball.position.copy(ballStart);
      ballVelocity.set(0, 0, 0);
      ballActive = false;
      shotScored = false;
      shotResolved = false;
      currentPower = 0;
      if (resetTimer) {
        clearTimeout(resetTimer);
        resetTimer = null;
      }
    }

    function scheduleResetIfNeeded() {
      if (resetTimer) return;
      resetTimer = setTimeout(() => {
        resetBall();
      }, 2000);
    }

    function resolveShotIfNeeded(made) {
      if (shotResolved) return;
      shotResolved = true;
      lastShotResult = made ? "made" : "missed";
      if (made) {
        score++;
        showMessage("SCORE!", "#66ff66");
        fishReactTimer = 1.0;
      } else {
        showMessage("MISS", "#ff6666");
      }
      updateDifficultyOnResult(made);
      scheduleResetIfNeeded();
    }

    function shootBall() {
      if (ballActive) return;

      const powerSpeed = 5 + (currentPower / 100) * 10; // 5..15
      const dirX = Math.sin(aimOffset) * Math.cos(verticalAngle);
      const dirY = Math.sin(verticalAngle);
      const dirZ = -Math.cos(aimOffset) * Math.cos(verticalAngle);

      ballVelocity.set(
        dirX * powerSpeed,
        dirY * powerSpeed,
        dirZ * powerSpeed
      );

      ballActive = true;
      shotScored = false;
      shotResolved = false;
      totalShots++;
      lastShotResult = "none";
    }

    function resetGame() {
      score = 0;
      totalShots = 0;
      difficulty = 1;
      consecutiveMakes = 0;
      consecutiveMisses = 0;
      lastShotResult = "none";
      aimOffset = 0;
      updateBackboardForDifficulty();
      resetBall();
      updateHUD();
      showMessage("Game Reset", "#ffffff");
    }

    resetBtn.addEventListener("click", resetGame);

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        if (!charging && !ballActive) {
          charging = true;
          chargeStartTime = performance.now();
        }
      }

      if (e.code === "ArrowLeft" && !ballActive) {
        aimOffset -= 0.05;
      }

      if (e.code === "ArrowRight" && !ballActive) {
        aimOffset += 0.05;
      }

      aimOffset = THREE.MathUtils.clamp(aimOffset, -0.8, 0.8);
      updateHUD();
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        if (charging && !ballActive) {
          charging = false;
          shootBall();
        }
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updatePowerCharge(now) {
      if (!charging || ballActive) return;
      const elapsed = (now - chargeStartTime) / 1000;
      const cycle = (elapsed % 2) / 2; // 0..1 over 2 seconds
      currentPower = cycle * 100;
    }

    function updateHoopAndWind(time) {
      let swayAmp = 0;
      let swayPeriod = 3;
      let hoopOffsetX = 0;

      switch (difficulty) {
        case 1:
          windSpeed = 0;
          break;
        case 2:
          windSpeed = 0.5;
          break;
        case 3:
          windSpeed = 1.0;
          swayAmp = 0.3;
          swayPeriod = 3;
          break;
        case 4:
          windSpeed = THREE.MathUtils.randFloat(-1.5, 1.5);
          swayAmp = 0.5;
          swayPeriod = 2;
          break;
        case 5:
          windSpeed = THREE.MathUtils.randFloat(-2, 2);
          swayAmp = 0.7;
          swayPeriod = 1.5;
          break;
      }

      if (swayAmp > 0) {
        hoopOffsetX = Math.sin((time * Math.PI * 2) / swayPeriod) * swayAmp;
      }

      hoopCurrentPos.set(baseHoopPos.x + hoopOffsetX, baseHoopPos.y, baseHoopPos.z);

      hoop.position.set(hoopCurrentPos.x, hoopCurrentPos.y, hoopCurrentPos.z);
      pole.position.x = hoopOffsetX;
      backboard.position.x = hoopOffsetX;
    }

    function updateBallPhysics(dt) {
      if (!ballActive) return;

      // Wind
      if (difficulty === 2 || difficulty === 3) {
        ballVelocity.x += windSpeed * dt;
      } else if (difficulty === 4 || difficulty === 5) {
        ballVelocity.x += windSpeed * dt;
      }

      // Integrate
      ball.position.x += ballVelocity.x * dt;
      ball.position.y += ballVelocity.y * dt;
      ball.position.z += ballVelocity.z * dt;
      ballVelocity.y += gravity * dt;

      // Floor bounce
      if (ball.position.y < ballRadius) {
        ball.position.y = ballRadius;

        if (Math.abs(ballVelocity.y) > 0.1) {
          ballVelocity.y *= -0.6;
          ballVelocity.x *= 0.8;
          ballVelocity.z *= 0.8;
        }

        const speed = ballVelocity.length();
        if (speed < 0.3) {
          ballVelocity.set(0, 0, 0);
          ballActive = false;
          if (!shotResolved) resolveShotIfNeeded(false);
        }
      }

      // Scoring
      const withinHoop =
        Math.abs(ball.position.x - hoopCurrentPos.x) < 0.5 &&
        Math.abs(ball.position.z - hoopCurrentPos.z) < 0.5 &&
        Math.abs(ball.position.y - hoopCurrentPos.y) < 0.3 &&
        ballVelocity.y < 0;

      if (withinHoop && !shotScored) {
        shotScored = true;
        resolveShotIfNeeded(true);
      }

      // Out of bounds
      if (
        Math.abs(ball.position.x) > 15 ||
        Math.abs(ball.position.z) > 20 ||
        ball.position.y < -2
      ) {
        ballActive = false;
        if (!shotResolved) resolveShotIfNeeded(false);
      }

      // If ball went clearly past hoop without scoring, mark as miss once descending far enough
      if (!shotResolved && ball.position.z < hoopCurrentPos.z - 2 && ball.position.y < 2.5) {
        resolveShotIfNeeded(false);
      }
    }

    function updateFish(time, dt) {
      if (!fish) return;

      const bob = Math.sin(time * 2.5) * 0.15;
      let reactBoost = 0;

      if (fishReactTimer > 0) {
        fishReactTimer -= dt;
        reactBoost = Math.sin(time * 20) * 0.15;
        fish.rotation.z = Math.sin(time * 18) * 0.2;
      } else {
        fish.rotation.z = 0;
      }

      fish.position.set(
        fishBasePos.x,
        fishBasePos.y + bob + reactBoost,
        fishBasePos.z
      );
    }

    function updateState(elapsedTime) {
      state.score = score;
      state.totalShots = totalShots;
      state.difficulty = difficulty;
      state.consecutiveMakes = consecutiveMakes;
      state.consecutiveMisses = consecutiveMisses;
      state.ballPosition = {
        x: ball.position.x,
        y: ball.position.y,
        z: ball.position.z
      };
      state.ballVelocity = {
        x: ballVelocity.x,
        y: ballVelocity.y,
        z: ballVelocity.z
      };
      state.ballActive = ballActive;
      state.power = currentPower;
      state.aimOffset = aimOffset;
      state.hoopPosition = {
        x: hoopCurrentPos.x,
        y: hoopCurrentPos.y,
        z: hoopCurrentPos.z
      };
      state.windSpeed = windSpeed;
      state.fishLoaded = !!fish && !!fish.parent && state.fishLoaded === true ? true : false;
      state.fishPosition = fish
        ? { x: fish.position.x, y: fish.position.y, z: fish.position.z }
        : { x: fishBasePos.x, y: fishBasePos.y, z: fishBasePos.z };
      state.gameTime = elapsedTime;
      state.lastShotResult = lastShotResult;

      window.__3D_STATE__ = state;
    }

    updateHUD();
    updateBackboardForDifficulty();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);
      const elapsedTime = clock.elapsedTime;
      const now = performance.now();

      updatePowerCharge(now);
      updateHoopAndWind(elapsedTime);
      updateBallPhysics(dt);
      updateFish(elapsedTime, dt);
      updateHUD();
      updateState(elapsedTime);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
