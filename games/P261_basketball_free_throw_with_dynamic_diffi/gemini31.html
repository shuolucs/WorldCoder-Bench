<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Basketball Free Throw</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .hud-center {
            text-align: center;
        }
        .hud-left, .hud-right {
            width: 200px;
        }
        .hud-right {
            text-align: right;
        }
        #power-container {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 5px;
            display: flex;
            flex-direction: column-reverse;
        }
        #power-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
            transition: height 0.05s linear;
        }
        #power-label {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
        #aim-label {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
        #controls-help {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            text-align: center;
            text-shadow: 1px 1px 2px black;
        }
        #reset-btn {
            pointer-events: auto;
            align-self: center;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #ff4444;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        #reset-btn:hover {
            background-color: #cc0000;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div class="hud-top">
            <div class="hud-left" id="score-display">Score: 0 / 0</div>
            <div class="hud-center" id="difficulty-display" style="color: #00ff00;">Difficulty: 1</div>
            <div class="hud-right" id="streak-display">Streak: 0</div>
        </div>
        
        <div id="power-container">
            <div id="power-fill"></div>
            <div id="power-label">0%</div>
        </div>

        <div id="controls-help">
            Hold SPACE to charge power<br>
            LEFT/RIGHT arrows to aim
        </div>
        <div id="aim-label">Aim: 0.00 rad</div>

        <button id="reset-btn">Reset Game</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Game State ---
        window.__3D_STATE__ = {
            score: 0,
            totalShots: 0,
            difficulty: 1,
            consecutiveMakes: 0,
            consecutiveMisses: 0,
            ballPosition: { x: 0, y: 2, z: 8 },
            ballVelocity: { x: 0, y: 0, z: 0 },
            ballActive: false,
            power: 0,
            aimOffset: 0,
            hoopPosition: { x: 0, y: 3.05, z: -5 },
            windSpeed: 0,
            fishLoaded: false,
            fishPosition: { x: 3, y: 0.5, z: -3 },
            gameTime: 0,
            lastShotResult: 'none'
        };

        // --- Constants ---
        const GRAVITY = -9.81;
        const BALL_RADIUS = 0.24;
        const START_POS = new THREE.Vector3(0, 2, 8);
        const HOOP_CENTER = new THREE.Vector3(0, 3.05, -5);
        const LAUNCH_ANGLE = 55 * (Math.PI / 180);

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 4, -5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        // --- Court Floor ---
        const floorGeo = new THREE.BoxGeometry(40, 0.2, 30);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -0.1; // Top surface at y=0
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Hoop Group ---
        const hoopGroup = new THREE.Group();
        scene.add(hoopGroup);

        // Ring
        const ringGeo = new THREE.TorusGeometry(0.6, 0.05, 16, 32);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xFF6600 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.set(0, 3.05, -5);
        ring.rotation.x = Math.PI / 2;
        ring.castShadow = true;
        hoopGroup.add(ring);

        // Pole
        const poleGeo = new THREE.CylinderGeometry(0.1, 0.1, 3.05, 16);
        const poleMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
        const pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.set(0, 1.525, -5.5);
        pole.castShadow = true;
        hoopGroup.add(pole);

        // Backboard
        const boardGeo = new THREE.BoxGeometry(1.8, 1.2, 0.1);
        const boardMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const backboard = new THREE.Mesh(boardGeo, boardMat);
        backboard.position.set(0, 3.5, -5.6);
        backboard.castShadow = true;
        hoopGroup.add(backboard);

        // --- Basketball ---
        const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ 
            color: 0xFF8C00, 
            roughness: 0.4,
            map: createBasketballTexture() // Simple procedural texture
        });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.copy(START_POS);
        ball.castShadow = true;
        scene.add(ball);

        // Procedural lines for basketball
        function createBasketballTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#FF8C00';
            ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(0, 256); ctx.lineTo(512, 256);
            ctx.moveTo(256, 0); ctx.lineTo(256, 512);
            ctx.stroke();
            const tex = new THREE.CanvasTexture(canvas);
            return tex;
        }

        // --- Mascot (Fish) ---
        let fishModel = null;
        const loader = new GLTFLoader();
        loader.load(
            '._BarramundiFish.glb',
            (gltf) => {
                fishModel = gltf.scene;
                fishModel.scale.set(0.8, 0.8, 0.8);
                fishModel.position.set(3, 0.5, -3);
                
                // Fix materials if needed
                fishModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                scene.add(fishModel);
                window.__3D_STATE__.fishLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load fish model. Continuing without it.', error);
            }
        );

        // --- Game Variables ---
        const clock = new THREE.Clock();
        let ballVelocity = new THREE.Vector3(0, 0, 0);
        let isBallActive = false;
        let isCharging = false;
        let power = 0;
        let powerDir = 1;
        let aimOffset = 0;
        let hasScoredThisShot = false;
        let isResetting = false;
        let currentWind = 0;

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (!isBallActive && !isResetting) {
                    isCharging = true;
                }
            } else if (e.code === 'ArrowLeft') {
                if (!isBallActive && !isResetting) {
                    aimOffset = Math.max(-0.5, aimOffset - 0.05);
                    updateAimUI();
                }
            } else if (e.code === 'ArrowRight') {
                if (!isBallActive && !isResetting) {
                    aimOffset = Math.min(0.5, aimOffset + 0.05);
                    updateAimUI();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && isCharging) {
                isCharging = false;
                shoot();
            }
        });

        document.getElementById('reset-btn').addEventListener('click', resetGameFull);

        // --- Game Logic ---
        function shoot() {
            isBallActive = true;
            hasScoredThisShot = false;
            window.__3D_STATE__.lastShotResult = 'none';
            
            // Calculate launch velocity
            const speed = 5 + (power / 100) * 10; // 5 to 15 m/s
            
            // Spherical to Cartesian conversion
            const vY = speed * Math.sin(LAUNCH_ANGLE);
            const vXZ = speed * Math.cos(LAUNCH_ANGLE);
            const vX = vXZ * Math.sin(aimOffset);
            const vZ = -vXZ * Math.cos(aimOffset); // Negative because shooting towards -z
            
            ballVelocity.set(vX, vY, vZ);
            
            // Set wind for this shot based on difficulty
            const diff = window.__3D_STATE__.difficulty;
            if (diff === 1) currentWind = 0;
            else if (diff === 2) currentWind = 0.5;
            else if (diff === 3) currentWind = 1.0;
            else if (diff === 4) currentWind = (Math.random() * 3) - 1.5;
            else if (diff === 5) currentWind = (Math.random() * 4) - 2.0;

            window.__3D_STATE__.windSpeed = currentWind;
            
            // Reset power bar
            power = 0;
            powerDir = 1;
            updatePowerUI();
        }

        function scoreBasket() {
            hasScoredThisShot = true;
            window.__3D_STATE__.score++;
            
            // Fish reaction (spin)
            if (fishModel) {
                fishModel.rotation.y += Math.PI * 2;
            }
        }

        function handleShotEnd() {
            if (isResetting) return;
            isResetting = true;
            
            window.__3D_STATE__.totalShots++;
            
            if (hasScoredThisShot) {
                window.__3D_STATE__.lastShotResult = 'made';
                window.__3D_STATE__.consecutiveMakes++;
                window.__3D_STATE__.consecutiveMisses = 0;
                
                if (window.__3D_STATE__.consecutiveMakes % 2 === 0) {
                    window.__3D_STATE__.difficulty = Math.min(5, window.__3D_STATE__.difficulty + 1);
                }
            } else {
                window.__3D_STATE__.lastShotResult = 'missed';
                window.__3D_STATE__.consecutiveMisses++;
                window.__3D_STATE__.consecutiveMakes = 0;
                
                if (window.__3D_STATE__.consecutiveMisses % 2 === 0) {
                    window.__3D_STATE__.difficulty = Math.max(1, window.__3D_STATE__.difficulty - 1);
                }
            }
            
            updateHUD();
            
            setTimeout(() => {
                ball.position.copy(START_POS);
                ballVelocity.set(0, 0, 0);
                isBallActive = false;
                isResetting = false;
                hasScoredThisShot = false;
                
                // Reset hoop rotation if it was spinning
                if (fishModel) fishModel.rotation.y = 0;
                
            }, 2000);
        }

        function resetGameFull() {
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.totalShots = 0;
            window.__3D_STATE__.difficulty = 1;
            window.__3D_STATE__.consecutiveMakes = 0;
            window.__3D_STATE__.consecutiveMisses = 0;
            window.__3D_STATE__.lastShotResult = 'none';
            
            ball.position.copy(START_POS);
            ballVelocity.set(0, 0, 0);
            isBallActive = false;
            isResetting = false;
            isCharging = false;
            power = 0;
            aimOffset = 0;
            
            updateHUD();
            updateAimUI();
            updatePowerUI();
        }

        // --- UI Updates ---
        function updatePowerUI() {
            const fill = document.getElementById('power-fill');
            const label = document.getElementById('power-label');
            fill.style.height = `${power}%`;
            label.innerText = `${Math.floor(power)}%`;
        }

        function updateAimUI() {
            document.getElementById('aim-label').innerText = `Aim: ${aimOffset.toFixed(2)} rad`;
        }

        function updateHUD() {
            const state = window.__3D_STATE__;
            document.getElementById('score-display').innerText = `Score: ${state.score} / ${state.totalShots}`;
            
            const diffEl = document.getElementById('difficulty-display');
            diffEl.innerText = `Difficulty: ${state.difficulty}`;
            const colors = ['#00ff00', '#adff2f', '#ffff00', '#ffa500', '#ff0000'];
            diffEl.style.color = colors[state.difficulty - 1];
            
            const streakEl = document.getElementById('streak-display');
            if (state.consecutiveMakes > 0) {
                streakEl.innerText = `Streak: +${state.consecutiveMakes}`;
                streakEl.style.color = '#00ff00';
            } else if (state.consecutiveMisses > 0) {
                streakEl.innerText = `Streak: -${state.consecutiveMisses}`;
                streakEl.style.color = '#ff4444';
            } else {
                streakEl.innerText = `Streak: 0`;
                streakEl.style.color = 'white';
            }
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent physics explosions
            window.__3D_STATE__.gameTime += dt;
            const time = window.__3D_STATE__.gameTime;

            // Power Charging
            if (isCharging) {
                power += powerDir * dt * 50; // 0 to 100 in 2 seconds
                if (power >= 100) {
                    power = 100;
                    powerDir = -1;
                } else if (power <= 0) {
                    power = 0;
                    powerDir = 1;
                }
                updatePowerUI();
            }

            // Difficulty Effects (Hoop Sway & Backboard Size)
            const diff = window.__3D_STATE__.difficulty;
            let swayAmp = 0, swayFreq = 0;
            
            if (diff === 3) { swayAmp = 0.3; swayFreq = Math.PI * 2 / 3; }
            else if (diff === 4) { swayAmp = 0.5; swayFreq = Math.PI * 2 / 2; }
            else if (diff === 5) { swayAmp = 0.7; swayFreq = Math.PI * 2 / 1.5; }
            
            hoopGroup.position.x = Math.sin(time * swayFreq) * swayAmp;
            
            if (diff === 5) {
                backboard.scale.set(1.2/1.8, 0.8/1.2, 1);
            } else {
                backboard.scale.set(1, 1, 1);
            }

            // Fish Animation
            if (fishModel) {
                fishModel.position.y = 0.5 + Math.sin(time * 2) * 0.2;
                window.__3D_STATE__.fishPosition = { x: fishModel.position.x, y: fishModel.position.y, z: fishModel.position.z };
            }

            // Physics
            if (isBallActive) {
                const prevY = ball.position.y;
                
                // Apply wind (acceleration per frame normalized to dt)
                // "adds +X m/s ... each frame" -> assuming 60fps, this is X * 60 m/s^2
                ballVelocity.x += currentWind * dt * 60;
                
                // Apply gravity
                ballVelocity.y += GRAVITY * dt;
                
                // Update position
                ball.position.addScaledVector(ballVelocity, dt);
                
                // Floor Collision
                if (ball.position.y < BALL_RADIUS) {
                    ball.position.y = BALL_RADIUS;
                    ballVelocity.y *= -0.6; // Restitution
                    ballVelocity.x *= 0.8;  // Friction
                    ballVelocity.z *= 0.8;
                    
                    // Stop condition
                    if (ballVelocity.lengthSq() < 0.1) {
                        ballVelocity.set(0,0,0);
                        handleShotEnd();
                    }
                }
                
                // Out of bounds
                if (Math.abs(ball.position.x) > 15 || Math.abs(ball.position.z) > 20 || ball.position.y < -2) {
                    handleShotEnd();
                }
                
                // Scoring Logic
                if (ballVelocity.y < 0 && !hasScoredThisShot) {
                    const hX = hoopGroup.position.x;
                    const hY = 3.05;
                    const hZ = -5;
                    
                    const dx = Math.abs(ball.position.x - hX);
                    const dz = Math.abs(ball.position.z - hZ);
                    const dy = Math.abs(ball.position.y - hY);
                    
                    if (dx < 0.5 && dz < 0.5 && dy < 0.3) {
                        // Ensure it crossed the plane
                        if (prevY > hY && ball.position.y <= hY) {
                            scoreBasket();
                        }
                    }
                }
                
                // Ball rotation based on velocity
                ball.rotation.x += ballVelocity.z * dt;
                ball.rotation.z -= ballVelocity.x * dt;
            }

            // Update State Object
            window.__3D_STATE__.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
            window.__3D_STATE__.ballVelocity = { x: ballVelocity.x, y: ballVelocity.y, z: ballVelocity.z };
            window.__3D_STATE__.ballActive = isBallActive;
            window.__3D_STATE__.power = power;
            window.__3D_STATE__.aimOffset = aimOffset;
            window.__3D_STATE__.hoopPosition = { x: hoopGroup.position.x, y: 3.05, z: -5 };

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        updateHUD();
        animate();

    </script>
</body>
</html>
