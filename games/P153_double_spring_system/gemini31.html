<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Spring System Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: monospace;
            color: #ffffff;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
            min-width: 250px;
        }
        .hud-line {
            margin: 5px 0;
        }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 4px;
            font-family: monospace;
        }
        button:hover {
            background: #45a049;
        }
        .instructions {
            font-size: 12px;
            color: #aaaaaa;
            margin-top: 10px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div class="hud-line" id="hud-state">State: PAUSED</div>
        <div class="hud-line" id="hud-time">Time: 0.00 s</div>
        <div class="hud-line" id="hud-m1">Mass 1: Y=2.50, Vy=0.00</div>
        <div class="hud-line" id="hud-m2">Mass 2: Y=0.50, Vy=0.00</div>
        <div class="hud-line" id="hud-energy">Total Energy: 0.00</div>
        <div class="hud-line" id="hud-gravity">Gravity: ON</div>
        <div class="hud-line" id="hud-damping">Damping: ON</div>
    </div>
    <div id="controls">
        <button id="btn-reset">Reset (R)</button>
        <div class="instructions">
            Space: Pause/Resume<br>
            G: Toggle Gravity<br>
            D: Toggle Damping<br>
            1: Impulse +5 to M1<br>
            2: Impulse -5 to M2<br>
            Click Mass: Select<br>
            Up/Down: Move Selected
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            paused: true,
            time: 0,
            mass1Y: 2.5,
            mass1Vy: 0,
            mass2Y: 0.5,
            mass2Vy: 0,
            gravityOn: true,
            dampingOn: true,
            totalEnergy: 0,
            spring1Length: 1.5,
            spring2Length: 1.5,
            selectedMass: 0, // 0=none, 1=mass1, 2=mass2
            frameCount: 0
        };

        const state = window.__3D_STATE__;

        // --- Physics Constants ---
        const anchorY = 4.0;
        const m1 = 2.0;
        const m2 = 1.5;
        const k1 = 30.0;
        const k2 = 20.0;
        const L1 = 1.5;
        const L2 = 1.5;
        const g = 9.81;
        const dampingCoef = 0.05;
        const dt = 1 / 60;

        // --- Initial Conditions ---
        const initialY1 = 2.5;
        const initialY2 = 0.5;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Objects ---
        // Ground
        const groundGeo = new THREE.BoxGeometry(20, 0.1, 5);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x333355 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.y = -3;
        scene.add(ground);

        // Anchor
        const anchorGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const anchorMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const anchor = new THREE.Mesh(anchorGeo, anchorMat);
        anchor.position.set(0, anchorY, 0);
        scene.add(anchor);

        // Mass 1
        const mass1Geo = new THREE.SphereGeometry(0.4, 32, 32);
        const mass1Mat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        const mass1Mesh = new THREE.Mesh(mass1Geo, mass1Mat);
        mass1Mesh.position.set(0, state.mass1Y, 0);
        scene.add(mass1Mesh);

        // Mass 2 (Michelle Model)
        const mass2Group = new THREE.Group();
        mass2Group.position.set(0, state.mass2Y, 0);
        scene.add(mass2Group);

        // Hitbox for Mass 2 to make raycasting reliable
        const mass2HitBoxGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const mass2HitBoxMat = new THREE.MeshBasicMaterial({ visible: false });
        const mass2HitBox = new THREE.Mesh(mass2HitBoxGeo, mass2HitBoxMat);
        mass2Group.add(mass2HitBox);

        let michelleModel = null;
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Michelle.glb', (gltf) => {
            michelleModel = gltf.scene;
            
            // Calculate bounding box to scale to ~0.8 units tall
            const box = new THREE.Box3().setFromObject(michelleModel);
            const height = box.max.y - box.min.y;
            const scale = 0.8 / height;
            michelleModel.scale.set(scale, scale, scale);
            
            // Center vertically relative to group origin
            michelleModel.position.y = -(box.max.y + box.min.y) / 2 * scale;
            
            mass2Group.add(michelleModel);
        });

        // --- Springs ---
        function createSpringGeometry() {
            const segments = 20;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array((segments + 1) * 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            return geometry;
        }

        function updateSpringGeometry(geometry, yStart, yEnd) {
            const segments = 20;
            const positions = geometry.attributes.position.array;
            const width = 0.2;
            
            for (let i = 0; i <= segments; i++) {
                const t = i / segments;
                const y = yStart + t * (yEnd - yStart);
                let x = 0;
                if (i > 0 && i < segments) {
                    x = (i % 2 === 0) ? width : -width;
                }
                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = 0;
            }
            geometry.attributes.position.needsUpdate = true;
        }

        const spring1Geo = createSpringGeometry();
        const spring1Mat = new THREE.LineBasicMaterial({ color: 0xffff00 });
        const spring1Line = new THREE.Line(spring1Geo, spring1Mat);
        scene.add(spring1Line);

        const spring2Geo = createSpringGeometry();
        const spring2Mat = new THREE.LineBasicMaterial({ color: 0x00ffff });
        const spring2Line = new THREE.Line(spring2Geo, spring2Mat);
        scene.add(spring2Line);

        // --- Raycaster for Selection ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([mass1Mesh, mass2HitBox]);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (object === mass1Mesh) {
                    state.selectedMass = 1;
                } else if (object === mass2HitBox) {
                    state.selectedMass = 2;
                }
            } else {
                state.selectedMass = 0;
            }
            updateSelectionVisuals();
        });

        function updateSelectionVisuals() {
            // Mass 1
            if (state.selectedMass === 1) {
                mass1Mat.emissive.setHex(0x555555);
            } else {
                mass1Mat.emissive.setHex(0x000000);
            }

            // Mass 2
            if (michelleModel) {
                michelleModel.traverse((child) => {
                    if (child.isMesh && child.material) {
                        if (state.selectedMass === 2) {
                            child.material.emissive.setHex(0x555555);
                        } else {
                            child.material.emissive.setHex(0x000000);
                        }
                    }
                });
            }
        }

        // --- Interactions ---
        function resetSimulation() {
            state.mass1Y = initialY1;
            state.mass1Vy = 0;
            state.mass2Y = initialY2;
            state.mass2Vy = 0;
            state.time = 0;
            state.frameCount = 0;
            state.paused = false;
        }

        document.getElementById('btn-reset').addEventListener('click', resetSimulation);

        window.addEventListener('keydown', (event) => {
            switch (event.key) {
                case ' ':
                    state.paused = !state.paused;
                    break;
                case 'r':
                case 'R':
                    resetSimulation();
                    break;
                case 'g':
                case 'G':
                    state.gravityOn = !state.gravityOn;
                    break;
                case 'd':
                case 'D':
                    state.dampingOn = !state.dampingOn;
                    break;
                case '1':
                    state.mass1Vy += 5;
                    break;
                case '2':
                    state.mass2Vy -= 5;
                    break;
                case 'ArrowUp':
                    if (state.paused) {
                        if (state.selectedMass === 1) {
                            state.mass1Y += 0.3;
                            state.mass1Vy = 0;
                        } else if (state.selectedMass === 2) {
                            state.mass2Y += 0.3;
                            state.mass2Vy = 0;
                        }
                    }
                    break;
                case 'ArrowDown':
                    if (state.paused) {
                        if (state.selectedMass === 1) {
                            state.mass1Y -= 0.3;
                            state.mass1Vy = 0;
                        } else if (state.selectedMass === 2) {
                            state.mass2Y -= 0.3;
                            state.mass2Vy = 0;
                        }
                    }
                    break;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics Engine ---
        function updatePhysics() {
            if (state.paused) return;

            const currentG = state.gravityOn ? g : 0;
            const currentD = state.dampingOn ? dampingCoef : 0;

            // Calculate stretches
            const stretch1 = (anchorY - state.mass1Y) - L1;
            const stretch2 = (state.mass1Y - state.mass2Y) - L2;

            // Forces
            const F_s1_on_1 = k1 * stretch1;
            const F_s2_on_1 = -k2 * stretch2;
            const F_g1 = -m1 * currentG;
            const F_d1 = -currentD * state.mass1Vy;
            const F1 = F_s1_on_1 + F_s2_on_1 + F_g1 + F_d1;

            const F_s2_on_2 = k2 * stretch2;
            const F_g2 = -m2 * currentG;
            const F_d2 = -currentD * state.mass2Vy;
            const F2 = F_s2_on_2 + F_g2 + F_d2;

            // Euler Integration
            state.mass1Vy += (F1 / m1) * dt;
            state.mass2Vy += (F2 / m2) * dt;

            state.mass1Y += state.mass1Vy * dt;
            state.mass2Y += state.mass2Vy * dt;

            state.time += dt;
            state.frameCount++;
        }

        function calculateEnergy() {
            const currentG = state.gravityOn ? g : 0;
            
            const ke = 0.5 * m1 * state.mass1Vy * state.mass1Vy + 0.5 * m2 * state.mass2Vy * state.mass2Vy;
            const pe_g = m1 * currentG * state.mass1Y + m2 * currentG * state.mass2Y;
            
            const stretch1 = Math.abs(anchorY - state.mass1Y) - L1;
            const pe_s1 = 0.5 * k1 * stretch1 * stretch1;
            
            const stretch2 = Math.abs(state.mass1Y - state.mass2Y) - L2;
            const pe_s2 = 0.5 * k2 * stretch2 * stretch2;

            state.totalEnergy = ke + pe_g + pe_s1 + pe_s2;
        }

        // --- Update Loop ---
        const hudState = document.getElementById('hud-state');
        const hudTime = document.getElementById('hud-time');
        const hudM1 = document.getElementById('hud-m1');
        const hudM2 = document.getElementById('hud-m2');
        const hudEnergy = document.getElementById('hud-energy');
        const hudGravity = document.getElementById('hud-gravity');
        const hudDamping = document.getElementById('hud-damping');

        function updateHUD() {
            hudState.innerText = `State: ${state.paused ? 'PAUSED' : 'RUNNING'}`;
            hudTime.innerText = `Time: ${state.time.toFixed(2)} s`;
            hudM1.innerText = `Mass 1: Y=${state.mass1Y.toFixed(2)}, Vy=${state.mass1Vy.toFixed(2)}`;
            hudM2.innerText = `Mass 2: Y=${state.mass2Y.toFixed(2)}, Vy=${state.mass2Vy.toFixed(2)}`;
            hudEnergy.innerText = `Total Energy: ${state.totalEnergy.toFixed(2)}`;
            hudGravity.innerText = `Gravity: ${state.gravityOn ? 'ON' : 'OFF'}`;
            hudDamping.innerText = `Damping: ${state.dampingOn ? 'ON' : 'OFF'}`;
        }

        function animate() {
            requestAnimationFrame(animate);

            updatePhysics();
            calculateEnergy();

            // Update Visuals
            mass1Mesh.position.y = state.mass1Y;
            mass2Group.position.y = state.mass2Y;

            state.spring1Length = Math.abs(anchorY - state.mass1Y);
            state.spring2Length = Math.abs(state.mass1Y - state.mass2Y);

            updateSpringGeometry(spring1Geo, anchorY, state.mass1Y);
            updateSpringGeometry(spring2Geo, state.mass1Y, state.mass2Y);

            updateHUD();

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
