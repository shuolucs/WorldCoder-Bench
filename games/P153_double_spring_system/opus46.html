<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Spring System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #00ff88;
    background: rgba(0,0,0,0.75);
    padding: 15px 20px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.7;
    border: 1px solid #00ff8844;
    min-width: 280px;
    pointer-events: none;
    z-index: 10;
  }
  #hud .label { color: #888; }
  #hud .value { color: #00ff88; font-weight: bold; }
  #hud .state-paused { color: #ff4444; }
  #hud .state-running { color: #44ff44; }
  #hud .title { color: #ffffff; font-size: 15px; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; }
  #btn-reset {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 10px 25px;
    background: #ff4444;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s;
  }
  #btn-reset:hover { background: #ff6666; }
  #controls-help {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #666;
    font-size: 11px;
    line-height: 1.6;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="hud"></div>
<button id="btn-reset">Reset</button>
<div id="controls-help">
  [SPACE] Pause/Resume &nbsp; [R] Reset &nbsp; [G] Toggle Gravity &nbsp; [D] Toggle Damping<br>
  [1] Impulse Mass1 Up &nbsp; [2] Impulse Mass2 Down &nbsp; [Click] Select Mass &nbsp; [↑↓] Move Selected
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Ground plane
const groundGeo = new THREE.BoxGeometry(20, 0.1, 5);
const groundMat = new THREE.MeshPhongMaterial({ color: 0x333355 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.y = -3;
ground.receiveShadow = true;
scene.add(ground);

// ============ PHYSICS CONSTANTS ============
const ANCHOR_Y = 4.0;
const K1 = 30.0;
const K2 = 20.0;
const L1 = 1.5;
const L2 = 1.5;
const M1 = 2.0;
const M2 = 1.5;
const G = 9.81;
const DAMPING = 0.05;
const DT = 1.0 / 60.0;

// ============ STATE ============
let mass1Y = 2.5;
let mass1Vy = 0;
let mass2Y = 0.5;
let mass2Vy = 0;
let paused = true;
let gravityOn = true;
let dampingOn = true;
let simTime = 0;
let frameCount = 0;
let selectedMass = 0;
let totalEnergy = 0;
let spring1Length = 0;
let spring2Length = 0;

const INIT_MASS1_Y = 2.5;
const INIT_MASS2_Y = 0.5;

// ============ 3D OBJECTS ============

// Anchor
const anchorGeo = new THREE.SphereGeometry(0.2, 16, 16);
const anchorMat = new THREE.MeshPhongMaterial({ color: 0xff0000, emissive: 0x440000 });
const anchorMesh = new THREE.Mesh(anchorGeo, anchorMat);
anchorMesh.position.set(0, ANCHOR_Y, 0);
scene.add(anchorMesh);

// Mass 1 (blue sphere)
const mass1Geo = new THREE.SphereGeometry(0.4, 32, 32);
const mass1Mat = new THREE.MeshPhongMaterial({ color: 0x4488ff, emissive: 0x000000 });
const mass1Mesh = new THREE.Mesh(mass1Geo, mass1Mat);
mass1Mesh.position.set(0, mass1Y, 0);
mass1Mesh.castShadow = true;
mass1Mesh.userData.massId = 1;
scene.add(mass1Mesh);

// Mass 2 placeholder (will be replaced by Michelle model)
const mass2Group = new THREE.Group();
mass2Group.position.set(0, mass2Y, 0);
scene.add(mass2Group);

// Fallback sphere for mass 2
const mass2FallbackGeo = new THREE.SphereGeometry(0.4, 32, 32);
const mass2FallbackMat = new THREE.MeshPhongMaterial({ color: 0xff88ff, emissive: 0x000000 });
const mass2FallbackMesh = new THREE.Mesh(mass2FallbackGeo, mass2FallbackMat);
mass2FallbackMesh.userData.massId = 2;
mass2Group.add(mass2FallbackMesh);

let michelleModel = null;
let mass2Clickables = [mass2FallbackMesh];

// Load Michelle.glb
const loader = new GLTFLoader();
loader.load(
  'Michelle.glb',
  (gltf) => {
    michelleModel = gltf.scene;
    
    // Calculate bounding box to scale
    const box = new THREE.Box3().setFromObject(michelleModel);
    const height = box.max.y - box.min.y;
    const targetHeight = 0.8;
    const scale = targetHeight / height;
    michelleModel.scale.setScalar(scale);
    
    // Recalculate after scaling
    const box2 = new THREE.Box3().setFromObject(michelleModel);
    const centerY = (box2.max.y + box2.min.y) / 2;
    michelleModel.position.y = -centerY * 1;
    
    michelleModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.userData.massId = 2;
        mass2Clickables.push(child);
      }
    });
    
    mass2Group.remove(mass2FallbackMesh);
    mass2Group.add(michelleModel);
    mass2Clickables = [];
    michelleModel.traverse((child) => {
      if (child.isMesh) {
        mass2Clickables.push(child);
      }
    });
    
    console.log('Michelle.glb loaded successfully');
  },
  undefined,
  (error) => {
    console.warn('Could not load Michelle.glb, using fallback sphere:', error);
  }
);

// ============ SPRING VISUALS ============
function createSpringGeometry(segments) {
  const points = [];
  for (let i = 0; i <= segments; i++) {
    points.push(new THREE.Vector3(0, 0, 0));
  }
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  return geometry;
}

const SPRING_SEGMENTS = 40;
const spring1Geo = createSpringGeometry(SPRING_SEGMENTS);
const spring1Mat = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 2 });
const spring1Line = new THREE.Line(spring1Geo, spring1Mat);
scene.add(spring1Line);

const spring2Geo = createSpringGeometry(SPRING_SEGMENTS);
const spring2Mat = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 });
const spring2Line = new THREE.Line(spring2Geo, spring2Mat);
scene.add(spring2Line);

function updateSpringVisual(line, topY, bottomY, segments, amplitude) {
  const positions = line.geometry.attributes.position.array;
  const length = topY - bottomY;
  const zigzagAmplitude = amplitude * Math.min(1, Math.abs(length) / 0.5);
  
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const y = topY - t * (topY - bottomY);
    let x = 0;
    let z = 0;
    
    // First and last segments are straight leads
    if (i > 1 && i < segments - 1) {
      const zigzagPhase = ((i - 2) / (segments - 4)) * Math.PI * 10;
      x = Math.sin(zigzagPhase) * zigzagAmplitude;
      z = Math.cos(zigzagPhase) * zigzagAmplitude * 0.3;
    }
    
    positions[i * 3] = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = z;
  }
  
  line.geometry.attributes.position.needsUpdate = true;
}

// ============ RAYCASTER FOR CLICKING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  // Check mass 1
  const intersects1 = raycaster.intersectObject(mass1Mesh);
  
  // Check mass 2
  const allMass2Objects = [];
  mass2Group.traverse((child) => {
    if (child.isMesh) allMass2Objects.push(child);
  });
  const intersects2 = raycaster.intersectObjects(allMass2Objects, true);
  
  if (intersects1.length > 0 && (intersects2.length === 0 || intersects1[0].distance <= intersects2[0].distance)) {
    selectMass(1);
  } else if (intersects2.length > 0) {
    selectMass(2);
  } else {
    selectMass(0);
  }
});

function selectMass(id) {
  selectedMass = id;
  
  // Reset emissive on mass 1
  mass1Mat.emissive.setHex(0x000000);
  
  // Reset emissive on mass 2
  mass2Group.traverse((child) => {
    if (child.isMesh && child.material) {
      if (Array.isArray(child.material)) {
        child.material.forEach(m => { if (m.emissive) m.emissive.setHex(0x000000); });
      } else {
        if (child.material.emissive) child.material.emissive.setHex(0x000000);
      }
    }
  });
  
  if (id === 1) {
    mass1Mat.emissive.setHex(0x444400);
  } else if (id === 2) {
    mass2Group.traverse((child) => {
      if (child.isMesh && child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(m => { if (m.emissive) m.emissive.setHex(0x444400); });
        } else {
          if (child.material.emissive) child.material.emissive.setHex(0x444400);
        }
      }
    });
  }
}

// ============ KEYBOARD INPUT ============
document.addEventListener('keydown', (event) => {
  const key = event.code;
  
  if (key === 'Space') {
    event.preventDefault();
    paused = !paused;
  } else if (key === 'KeyR') {
    resetSimulation();
  } else if (key === 'KeyG') {
    gravityOn = !gravityOn;
  } else if (key === 'Digit1') {
    mass1Vy += 5.0;
  } else if (key === 'Digit2') {
    mass2Vy -= 5.0;
  } else if (key === 'KeyD') {
    dampingOn = !dampingOn;
  } else if (key === 'ArrowUp') {
    event.preventDefault();
    if (selectedMass === 1) {
      mass1Y += 0.3;
      mass1Vy = 0;
    } else if (selectedMass === 2) {
      mass2Y += 0.3;
      mass2Vy = 0;
    }
  } else if (key === 'ArrowDown') {
    event.preventDefault();
    if (selectedMass === 1) {
      mass1Y -= 0.3;
      mass1Vy = 0;
    } else if (selectedMass === 2) {
      mass2Y -= 0.3;
      mass2Vy = 0;
    }
  }
});

// ============ RESET ============
function resetSimulation() {
  mass1Y = INIT_MASS1_Y;
  mass1Vy = 0;
  mass2Y = INIT_MASS2_Y;
  mass2Vy = 0;
  simTime = 0;
  frameCount = 0;
  paused = true;
  selectMass(0);
}

document.getElementById('btn-reset').addEventListener('click', resetSimulation);

// ============ PHYSICS STEP ============
function physicsStep() {
  const g = gravityOn ? G : 0;
  const damp = dampingOn ? DAMPING : 0;
  
  // Spring 1: anchor to mass1
  const dx1 = ANCHOR_Y - mass1Y;
  const dist1 = Math.abs(dx1);
  const dir1 = dx1 > 0 ? 1 : (dx1 < 0 ? -1 : 0);
  const springForce1 = K1 * (dist1 - L1) * dir1;
  
  // Spring 2: mass1 to mass2
  const dx2 = mass1Y - mass2Y;
  const dist2 = Math.abs(dx2);
  const dir2 = dx2 > 0 ? 1 : (dx2 < 0 ? -1 : 0);
  const springForce2 = K2 * (dist2 - L2) * dir2;
  
  // Forces on mass 1
  const F1 = springForce1 - springForce2 - M1 * g - damp * mass1Vy;
  
  // Forces on mass 2
  const F2 = springForce2 - M2 * g - damp * mass2Vy;
  
  // Euler integration
  const a1 = F1 / M1;
  const a2 = F2 / M2;
  
  mass1Vy += a1 * DT;
  mass2Vy += a2 * DT;
  
  mass1Y += mass1Vy * DT;
  mass2Y += mass2Vy * DT;
  
  // Ground collision (simple)
  const groundLevel = -2.95;
  if (mass1Y < groundLevel + 0.4) {
    mass1Y = groundLevel + 0.4;
    mass1Vy = Math.abs(mass1Vy) * 0.3;
  }
  if (mass2Y < groundLevel + 0.4) {
    mass2Y = groundLevel + 0.4;
    mass2Vy = Math.abs(mass2Vy) * 0.3;
  }
  
  simTime += DT;
  frameCount++;
}

// ============ ENERGY CALCULATION ============
function calculateEnergy() {
  const g = gravityOn ? G : 0;
  
  const KE = 0.5 * M1 * mass1Vy * mass1Vy + 0.5 * M2 * mass2Vy * mass2Vy;
  const PE_gravity = M1 * g * mass1Y + M2 * g * mass2Y;
  
  const s1Len = Math.abs(ANCHOR_Y - mass1Y);
  const s2Len = Math.abs(mass1Y - mass2Y);
  
  const PE_spring1 = 0.5 * K1 * (s1Len - L1) * (s1Len - L1);
  const PE_spring2 = 0.5 * K2 * (s2Len - L2) * (s2Len - L2);
  
  spring1Length = s1Len;
  spring2Length = s2Len;
  totalEnergy = KE + PE_gravity + PE_spring1 + PE_spring2;
  
  return totalEnergy;
}

// ============ HUD UPDATE ============
const hudEl = document.getElementById('hud');

function updateHUD() {
  const stateClass = paused ? 'state-paused' : 'state-running';
  const stateText = paused ? 'PAUSED' : 'RUNNING';
  
  hudEl.innerHTML = `
    <div class="title">⚡ Double Spring System</div>
    <span class="label">State:</span> <span class="${stateClass}">${stateText}</span><br>
    <span class="label">Time:</span> <span class="value">${simTime.toFixed(2)}s</span><br>
    <br>
    <span class="label">Mass 1 Y:</span> <span class="value">${mass1Y.toFixed(2)}</span> &nbsp; <span class="label">Vy:</span> <span class="value">${mass1Vy.toFixed(2)}</span><br>
    <span class="label">Mass 2 Y:</span> <span class="value">${mass2Y.toFixed(2)}</span> &nbsp; <span class="label">Vy:</span> <span class="value">${mass2Vy.toFixed(2)}</span><br>
    <br>
    <span class="label">Total Energy:</span> <span class="value">${totalEnergy.toFixed(2)}</span><br>
    <span class="label">Gravity:</span> <span class="value">${gravityOn ? 'ON' : 'OFF'}</span> &nbsp; <span class="label">Damping:</span> <span class="value">${dampingOn ? 'ON' : 'OFF'}</span><br>
    <span class="label">Selected:</span> <span class="value">${selectedMass === 0 ? 'None' : 'Mass ' + selectedMass}</span>
  `;
}

// ============ WINDOW STATE ============
window.__3D_STATE__ = {};

function updateWindowState() {
  window.__3D_STATE__ = {
    paused,
    time: simTime,
    mass1Y,
    mass1Vy,
    mass2Y,
    mass2Vy,
    gravityOn,
    dampingOn,
    totalEnergy,
    spring1Length,
    spring2Length,
    selectedMass,
    frameCount
  };
}

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);
  
  if (!paused) {
    physicsStep();
  }
  
  calculateEnergy();
  
  // Update mesh positions
  mass1Mesh.position.y = mass1Y;
  mass2Group.position.y = mass2Y;
  
  // Update spring visuals
  updateSpringVisual(spring1Line, ANCHOR_Y, mass1Y, SPRING_SEGMENTS, 0.15);
  updateSpringVisual(spring2Line, mass1Y, mass2Y, SPRING_SEGMENTS, 0.15);
  
  // Update HUD
  updateHUD();
  updateWindowState();
  
  controls.update();
  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
calculateEnergy();
updateHUD();
updateWindowState();
animate();

</script>
</body>
</html>
