<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projectile Motion with Air Drag</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 250px;
}
#hud .label { color: #aaa; }
#hud .value { color: #0f0; font-weight: bold; }

#controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    padding: 15px 25px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}
#controls label { font-size: 13px; }
#controls input[type="range"] {
    width: 120px;
    cursor: pointer;
}
#controls button {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.2s;
}
#launchBtn {
    background: #4CAF50;
    color: white;
}
#launchBtn:hover { background: #45a049; }
#resetBtn {
    background: #f44336;
    color: white;
}
#resetBtn:hover { background: #da190b; }
.slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">Position: </span><span class="value" id="hudPos">(-20.00, 0.50)</span></div>
    <div><span class="label">Velocity: </span><span class="value" id="hudVel">0.00 m/s</span></div>
    <div><span class="label">Flight Time: </span><span class="value" id="hudTime">0.00 s</span></div>
    <div><span class="label">Particles: </span><span class="value" id="hudParticles">0</span></div>
    <div><span class="label">Max Height: </span><span class="value" id="hudMaxH">0.00 m</span></div>
    <div><span class="label">Camera Follow: </span><span class="value" id="hudCam">OFF</span></div>
</div>

<div id="controls">
    <div class="slider-group">
        <label>Angle: <span id="angleLabel">45</span>°</label>
        <input type="range" id="angleSlider" min="10" max="80" step="1" value="45">
    </div>
    <div class="slider-group">
        <label>Speed: <span id="speedLabel">25</span> m/s</label>
        <input type="range" id="speedSlider" min="5" max="50" step="1" value="25">
    </div>
    <button id="launchBtn">Launch</button>
    <button id="resetBtn">Reset</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 80, 150);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 10, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7d3a, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(100, 50, 0x444444, 0x555555);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// --- Physics Constants ---
const g = 9.81;
const Cd = 0.47;
const rho = 1.225;
const A = 0.01;
const mass = 1.0;
const dt = 1 / 60;

// --- State ---
const launchPos = new THREE.Vector3(-20, 0.5, 0);

let projectilePos = launchPos.clone();
let projectileVel = new THREE.Vector3(0, 0, 0);
let launched = false;
let landed = false;
let flightTime = 0;
let maxHeight = 0;
let impactX = null;
let cameraFollow = false;
let modelLoaded = false;

// State object
window.__3D_STATE__ = {
    launched: false,
    landed: false,
    projectilePos: { x: launchPos.x, y: launchPos.y, z: launchPos.z },
    projectileVel: { x: 0, y: 0, z: 0 },
    speed: 0,
    launchAngle: 45,
    launchSpeed: 25,
    flightTime: 0,
    particleCount: 0,
    cameraFollow: false,
    trailPointCount: 0,
    impactX: null,
    modelLoaded: false,
    dragEnabled: true,
    maxHeight: 0
};

// --- Load Model ---
let projectileModel = null;
const loader = new GLTFLoader();

// Create a fallback sphere in case model fails
function createFallbackProjectile() {
    const geo = new THREE.SphereGeometry(0.5, 16, 16);
    const mat = new THREE.MeshStandardMaterial({ color: 0xff6600 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    return mesh;
}

let projectileObject = createFallbackProjectile();
projectileObject.position.copy(launchPos);
scene.add(projectileObject);

loader.load(
    'https://threejs.org/examples/models/gltf/facecap.glb',
    (gltf) => {
        scene.remove(projectileObject);
        projectileModel = gltf.scene;
        projectileModel.scale.set(0.5, 0.5, 0.5);
        projectileModel.position.copy(launchPos);
        projectileModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });
        projectileObject = projectileModel;
        scene.add(projectileObject);
        modelLoaded = true;
        window.__3D_STATE__.modelLoaded = true;
        console.log('facecap.glb loaded successfully');
    },
    undefined,
    (error) => {
        console.warn('Failed to load facecap.glb, using fallback sphere:', error);
        modelLoaded = true;
        window.__3D_STATE__.modelLoaded = true;
    }
);

// --- Trajectory Lines ---
// Red trail (actual path with drag)
const trailPoints = [];
const trailGeometry = new THREE.BufferGeometry();
const trailMaterial = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 });
const trailLine = new THREE.Line(trailGeometry, trailMaterial);
scene.add(trailLine);

// Blue ideal trajectory (no drag)
let idealLine = null;

function computeIdealTrajectory(speed, angleDeg) {
    const angleRad = angleDeg * Math.PI / 180;
    const vx = speed * Math.cos(angleRad);
    const vy = speed * Math.sin(angleRad);
    const points = [];
    const totalTime = (2 * vy) / g;
    const steps = 200;

    for (let i = 0; i <= steps; i++) {
        const t = (i / steps) * totalTime * 1.1;
        const x = launchPos.x + vx * t;
        const y = launchPos.y + vy * t - 0.5 * g * t * t;
        if (y < 0 && i > 0) break;
        points.push(new THREE.Vector3(x, Math.max(y, 0), 0));
    }
    return points;
}

function drawIdealTrajectory(speed, angleDeg) {
    if (idealLine) scene.remove(idealLine);
    const points = computeIdealTrajectory(speed, angleDeg);
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.5, linewidth: 2 });
    idealLine = new THREE.Line(geo, mat);
    scene.add(idealLine);
}

// --- Particle System ---
const MAX_PARTICLES = 500;
const particles = [];

// Create circle texture for particles
function createCircleTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.5, 'rgba(255,255,255,0.8)');
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 32, 32);
    return new THREE.CanvasTexture(canvas);
}

const particleTexture = createCircleTexture();

class Particle {
    constructor() {
        const spriteMat = new THREE.SpriteMaterial({
            map: particleTexture,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        this.sprite = new THREE.Sprite(spriteMat);
        this.sprite.scale.set(0.3, 0.3, 0.3);
        this.sprite.visible = false;
        this.active = false;
        this.life = 0;
        this.maxLife = 1.5;
        this.velocity = new THREE.Vector3();
        scene.add(this.sprite);
    }

    emit(pos, vel, color, size, maxLife) {
        this.sprite.position.copy(pos);
        this.velocity.copy(vel);
        this.sprite.material.color.copy(color);
        this.sprite.scale.set(size, size, size);
        this.life = 0;
        this.maxLife = maxLife || 1.5;
        this.active = true;
        this.sprite.visible = true;
        this.sprite.material.opacity = 1;
    }

    update(dt) {
        if (!this.active) return;
        this.life += dt;
        if (this.life >= this.maxLife) {
            this.active = false;
            this.sprite.visible = false;
            return;
        }
        // Gravity on particles
        this.velocity.y -= g * 0.3 * dt;
        this.sprite.position.addScaledVector(this.velocity, dt);
        // Fade
        const t = this.life / this.maxLife;
        this.sprite.material.opacity = 1 - t;
        // Color: orange to transparent
        const r = 1.0;
        const gVal = 0.6 * (1 - t);
        const b = 0.1 * (1 - t);
        this.sprite.material.color.setRGB(r, gVal, b);
    }
}

// Pre-create particle pool
for (let i = 0; i < MAX_PARTICLES; i++) {
    particles.push(new Particle());
}

let particleIndex = 0;

function emitParticle(pos, vel, color, size, maxLife) {
    const p = particles[particleIndex % MAX_PARTICLES];
    p.emit(pos, vel || new THREE.Vector3(), color || new THREE.Color(1, 0.5, 0), size || 0.3, maxLife || 1.5);
    particleIndex++;
}

function emitImpactBurst(pos) {
    for (let i = 0; i < 50; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 0.5; // hemisphere
        const speed = 2 + Math.random() * 5;
        const vel = new THREE.Vector3(
            Math.cos(theta) * Math.sin(phi) * speed,
            Math.cos(phi) * speed,
            Math.sin(theta) * Math.sin(phi) * speed
        );
        emitParticle(pos.clone(), vel, new THREE.Color(1, 1, 1), 0.2 + Math.random() * 0.3, 1.0 + Math.random() * 0.5);
    }
}

function getActiveParticleCount() {
    let count = 0;
    for (const p of particles) {
        if (p.active) count++;
    }
    return count;
}

// --- UI Elements ---
const angleSlider = document.getElementById('angleSlider');
const speedSlider = document.getElementById('speedSlider');
const angleLabel = document.getElementById('angleLabel');
const speedLabel = document.getElementById('speedLabel');
const launchBtn = document.getElementById('launchBtn');
const resetBtn = document.getElementById('resetBtn');

const hudPos = document.getElementById('hudPos');
const hudVel = document.getElementById('hudVel');
const hudTime = document.getElementById('hudTime');
const hudParticles = document.getElementById('hudParticles');
const hudMaxH = document.getElementById('hudMaxH');
const hudCam = document.getElementById('hudCam');

angleSlider.addEventListener('input', () => {
    angleLabel.textContent = angleSlider.value;
    window.__3D_STATE__.launchAngle = parseInt(angleSlider.value);
    if (!launched) drawIdealTrajectory(parseInt(speedSlider.value), parseInt(angleSlider.value));
});

speedSlider.addEventListener('input', () => {
    speedLabel.textContent = speedSlider.value;
    window.__3D_STATE__.launchSpeed = parseInt(speedSlider.value);
    if (!launched) drawIdealTrajectory(parseInt(speedSlider.value), parseInt(angleSlider.value));
});

launchBtn.addEventListener('click', () => {
    if (launched && !landed) return;
    resetState();
    launch();
});

resetBtn.addEventListener('click', () => {
    resetState();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'c' || e.key === 'C') {
        cameraFollow = !cameraFollow;
        window.__3D_STATE__.cameraFollow = cameraFollow;
        if (!cameraFollow) {
            camera.position.set(0, 10, 30);
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);
        }
    }
});

function resetState() {
    launched = false;
    landed = false;
    flightTime = 0;
    maxHeight = 0;
    impactX = null;

    projectilePos.copy(launchPos);
    projectileVel.set(0, 0, 0);
    projectileObject.position.copy(launchPos);

    // Clear trail
    trailPoints.length = 0;
    trailGeometry.setFromPoints([launchPos.clone()]);

    // Clear ideal line
    if (idealLine) {
        scene.remove(idealLine);
        idealLine = null;
    }

    // Deactivate particles
    for (const p of particles) {
        p.active = false;
        p.sprite.visible = false;
    }
    particleIndex = 0;

    // Draw ideal trajectory preview
    drawIdealTrajectory(parseInt(speedSlider.value), parseInt(angleSlider.value));

    updateState();
}

function launch() {
    const angle = parseInt(angleSlider.value);
    const speed = parseInt(speedSlider.value);
    const angleRad = angle * Math.PI / 180;

    projectileVel.set(
        speed * Math.cos(angleRad),
        speed * Math.sin(angleRad),
        0
    );

    launched = true;
    landed = false;
    flightTime = 0;
    maxHeight = launchPos.y;
    impactX = null;

    trailPoints.length = 0;
    trailPoints.push(projectilePos.clone());

    drawIdealTrajectory(speed, angle);
    updateState();
}

function updateState() {
    const state = window.__3D_STATE__;
    state.launched = launched;
    state.landed = landed;
    state.projectilePos = { x: projectilePos.x, y: projectilePos.y, z: projectilePos.z };
    state.projectileVel = { x: projectileVel.x, y: projectileVel.y, z: projectileVel.z };
    state.speed = projectileVel.length();
    state.launchAngle = parseInt(angleSlider.value);
    state.launchSpeed = parseInt(speedSlider.value);
    state.flightTime = flightTime;
    state.particleCount = getActiveParticleCount();
    state.cameraFollow = cameraFollow;
    state.trailPointCount = trailPoints.length;
    state.impactX = impactX;
    state.maxHeight = maxHeight;
    state.dragEnabled = true;
}

// --- Animation Loop ---
function animate() {
    requestAnimationFrame(animate);

    if (launched && !landed) {
        // Compute drag force
        const speed = projectileVel.length();
        const dragMag = 0.5 * Cd * rho * A * speed * speed;
        const dragForce = projectileVel.clone().normalize().multiplyScalar(-dragMag);

        // Semi-implicit Euler
        // Update velocity first
        const accel = new THREE.Vector3(0, -g, 0).add(dragForce.divideScalar(mass));
        projectileVel.addScaledVector(accel, dt);

        // Update position
        projectilePos.addScaledVector(projectileVel, dt);

        flightTime += dt;

        // Track max height
        if (projectilePos.y > maxHeight) {
            maxHeight = projectilePos.y;
        }

        // Ground collision
        if (projectilePos.y <= 0) {
            projectilePos.y = 0;
            landed = true;
            impactX = projectilePos.x;
            projectileVel.set(0, 0, 0);
            emitImpactBurst(projectilePos.clone());
        }

        // Update model position
        projectileObject.position.copy(projectilePos);

        // Rotate model based on velocity direction
        if (speed > 0.1) {
            const angle = Math.atan2(projectileVel.y, projectileVel.x);
            projectileObject.rotation.z = angle;
        }

        // Trail
        trailPoints.push(projectilePos.clone());
        trailGeometry.setFromPoints(trailPoints);

        // Emit trail particle
        const pVel = new THREE.Vector3(
            (Math.random() - 0.5) * 0.5,
            (Math.random() - 0.5) * 0.5,
            (Math.random() - 0.5) * 0.5
        );
        emitParticle(projectilePos.clone(), pVel, new THREE.Color(1, 0.5, 0), 0.2, 1.5);
    }

    // Update particles
    for (const p of particles) {
        if (p.active) p.update(dt);
    }

    // Camera follow
    if (cameraFollow && launched) {
        const targetPos = projectilePos.clone().add(new THREE.Vector3(-5, 3, 10));
        camera.position.lerp(targetPos, 0.05);
        controls.target.lerp(projectilePos.clone(), 0.05);
    }

    controls.update();

    // Update HUD
    hudPos.textContent = `(${projectilePos.x.toFixed(2)}, ${projectilePos.y.toFixed(2)})`;
    hudVel.textContent = `${projectileVel.length().toFixed(2)} m/s`;
    hudTime.textContent = `${flightTime.toFixed(2)} s`;
    const pCount = getActiveParticleCount();
    hudParticles.textContent = pCount;
    hudMaxH.textContent = `${maxHeight.toFixed(2)} m`;
    hudCam.textContent = cameraFollow ? 'ON' : 'OFF';

    updateState();

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial setup
drawIdealTrajectory(25, 45);
animate();

</script>
</body>
</html>
