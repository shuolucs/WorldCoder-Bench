<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectile Motion Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            color: #fff;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #444;
        }
        #hud div {
            margin-bottom: 5px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border: 1px solid #444;
        }
        .control-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            font-size: 14px;
        }
        button:hover {
            background: #45a049;
        }
        #resetBtn {
            background: #f44336;
        }
        #resetBtn:hover {
            background: #da190b;
        }
        input[type=range] {
            cursor: pointer;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="hud">
        <div id="hud-pos">Pos: 0.00, 0.00</div>
        <div id="hud-vel">Vel: 0.00 m/s</div>
        <div id="hud-time">Time: 0.00 s</div>
        <div id="hud-particles">Particles: 0</div>
        <div style="margin-top: 10px; color: #aaa; font-size: 11px;">Press 'C' to toggle Camera Follow</div>
    </div>

    <div id="controls">
        <div class="control-row">
            <div class="slider-group">
                <label id="angleLabel">Angle: 45°</label>
                <input type="range" id="angleSlider" min="10" max="80" step="1" value="45">
            </div>
            <div class="slider-group">
                <label id="speedLabel">Speed: 25 m/s</label>
                <input type="range" id="speedSlider" min="5" max="50" step="1" value="25">
            </div>
        </div>
        <div class="control-row">
            <button id="launchBtn">Launch</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            launched: false,
            landed: false,
            projectilePos: { x: -20, y: 0.5, z: 0 },
            projectileVel: { x: 0, y: 0, z: 0 },
            speed: 0,
            launchAngle: 45,
            launchSpeed: 25,
            flightTime: 0,
            particleCount: 0,
            cameraFollow: false,
            trailPointCount: 0,
            impactX: null,
            modelLoaded: false,
            dragEnabled: true,
            maxHeight: 0.5
        };

        const state = window.__3D_STATE__;

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const defaultCamPos = new THREE.Vector3(0, 10, 30);
        const defaultLookAt = new THREE.Vector3(0, 0, 0);
        const currentLookAt = new THREE.Vector3(0, 0, 0);
        camera.position.copy(defaultCamPos);
        camera.lookAt(defaultLookAt);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Lights
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        // Ground & Grid
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(100, 100, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- PROJECTILE ---
        const projectileGroup = new THREE.Group();
        projectileGroup.position.set(state.projectilePos.x, state.projectilePos.y, state.projectilePos.z);
        scene.add(projectileGroup);

        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/facecap.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            // Adjust model position if origin is not centered
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            
            projectileGroup.add(model);
            state.modelLoaded = true;
        });

        // --- TRAJECTORIES ---
        // Actual Trajectory (Red)
        const actualMat = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 });
        const actualGeo = new THREE.BufferGeometry();
        const actualLine = new THREE.Line(actualGeo, actualMat);
        scene.add(actualLine);
        let actualPoints = [];

        // Ideal Trajectory (Blue, Transparent)
        const idealMat = new THREE.LineBasicMaterial({ color: 0x0088ff, transparent: true, opacity: 0.5 });
        const idealGeo = new THREE.BufferGeometry();
        const idealLine = new THREE.Line(idealGeo, idealMat);
        scene.add(idealLine);

        function updateIdealTrajectory() {
            const points = [];
            const v0 = state.launchSpeed;
            const angleRad = state.launchAngle * Math.PI / 180;
            const vx = v0 * Math.cos(angleRad);
            const vy = v0 * Math.sin(angleRad);
            const g = 9.81;
            
            let t = 0;
            let x = -20;
            let y = 0.5;
            
            while (y >= 0 && t < 20) { // safety limit
                points.push(new THREE.Vector3(x, y, 0));
                t += 0.05;
                x = -20 + vx * t;
                y = 0.5 + vy * t - 0.5 * g * t * t;
            }
            if (y < 0) {
                // interpolate exact hit point
                const tHit = (vy + Math.sqrt(vy*vy + 2*g*0.5)) / g;
                points.push(new THREE.Vector3(-20 + vx * tHit, 0, 0));
            }
            idealLine.geometry.setFromPoints(points);
        }
        updateIdealTrajectory();

        // --- PARTICLE SYSTEM ---
        const MAX_PARTICLES = 1000; // 500 trail + 50 impact + buffer
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(MAX_PARTICLES * 3);
        const pCol = new Float32Array(MAX_PARTICLES * 3);
        const pOpa = new Float32Array(MAX_PARTICLES);

        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
        pGeo.setAttribute('opacity', new THREE.BufferAttribute(pOpa, 1));

        const particleVertexShader = `
            attribute float opacity;
            varying float vOpacity;
            varying vec3 vColor;
            void main() {
                vOpacity = opacity;
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 100.0 / -mvPosition.z;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        const particleFragmentShader = `
            varying float vOpacity;
            varying vec3 vColor;
            void main() {
                vec2 coord = gl_PointCoord - vec2(0.5);
                if(length(coord) > 0.5) discard;
                gl_FragColor = vec4(vColor, vOpacity);
            }
        `;

        const particleMat = new THREE.ShaderMaterial({
            vertexShader: particleVertexShader,
            fragmentShader: particleFragmentShader,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(pGeo, particleMat);
        scene.add(particleSystem);

        const particles = [];
        for (let i = 0; i < MAX_PARTICLES; i++) {
            particles.push({ active: false, life: 0, maxLife: 1, vel: new THREE.Vector3(), type: 'trail' });
        }

        function emitTrailParticle(pos) {
            let p = particles.find(p => !p.active);
            if (!p) {
                // Recycle oldest trail particle
                const trailParticles = particles.filter(p => p.type === 'trail' && p.active);
                if(trailParticles.length > 0) {
                    p = trailParticles.reduce((oldest, curr) => curr.life > oldest.life ? curr : oldest);
                }
            }
            
            if (p) {
                p.active = true;
                p.life = 0;
                p.maxLife = 1.5;
                p.type = 'trail';
                p.vel.set((Math.random()-0.5)*0.5, -0.5 - Math.random()*0.5, (Math.random()-0.5)*0.5);
                
                const idx = particles.indexOf(p);
                pPos[idx*3] = pos.x; pPos[idx*3+1] = pos.y; pPos[idx*3+2] = pos.z;
                pCol[idx*3] = 1.0; pCol[idx*3+1] = 0.5; pCol[idx*3+2] = 0.0; // Orange
                pOpa[idx] = 1.0;
            }
        }

        function triggerImpactParticles(pos) {
            let emitted = 0;
            for (let i = 0; i < MAX_PARTICLES && emitted < 50; i++) {
                const p = particles[i];
                if (!p.active) {
                    p.active = true;
                    p.life = 0;
                    p.maxLife = 0.5 + Math.random() * 0.5;
                    p.type = 'impact';
                    
                    const phi = Math.acos(Math.random()); // Upper hemisphere
                    const theta = Math.random() * 2 * Math.PI;
                    const speed = 5 + Math.random() * 10;
                    
                    p.vel.set(
                        speed * Math.sin(phi) * Math.cos(theta),
                        speed * Math.cos(phi),
                        speed * Math.sin(phi) * Math.sin(theta)
                    );
                    
                    pPos[i*3] = pos.x; pPos[i*3+1] = pos.y; pPos[i*3+2] = pos.z;
                    pCol[i*3] = 1.0; pCol[i*3+1] = 1.0; pCol[i*3+2] = 1.0; // White
                    pOpa[i] = 1.0;
                    emitted++;
                }
            }
        }

        function updateParticles(dt) {
            let activeCount = 0;
            for (let i = 0; i < MAX_PARTICLES; i++) {
                const p = particles[i];
                if (p.active) {
                    p.life += dt;
                    if (p.life >= p.maxLife) {
                        p.active = false;
                        pOpa[i] = 0;
                    } else {
                        activeCount++;
                        pPos[i*3] += p.vel.x * dt;
                        pPos[i*3+1] += p.vel.y * dt;
                        pPos[i*3+2] += p.vel.z * dt;
                        
                        if (p.type === 'impact') {
                            p.vel.y -= 9.81 * dt; // Gravity for impact particles
                        }
                        
                        pOpa[i] = 1.0 - (p.life / p.maxLife);
                    }
                }
            }
            pGeo.attributes.position.needsUpdate = true;
            pGeo.attributes.opacity.needsUpdate = true;
            state.particleCount = activeCount;
        }

        // --- PHYSICS ---
        const PHYSICS_DT = 1 / 60;
        const g = 9.81;
        const Cd = 0.47;
        const rho = 1.225;
        const A = 0.01;
        const m = 1.0;

        function physicsStep(dt) {
            if (!state.launched || state.landed) return;

            const pos = projectileGroup.position;
            const vel = state.projectileVel;

            const vMag = Math.sqrt(vel.x*vel.x + vel.y*vel.y + vel.z*vel.z);
            state.speed = vMag;

            // Quadratic Drag: F = -0.5 * Cd * rho * A * |v| * v
            const dragCoeff = -0.5 * Cd * rho * A * vMag;
            const Fd_x = dragCoeff * vel.x;
            const Fd_y = dragCoeff * vel.y;
            const Fd_z = dragCoeff * vel.z;

            // Acceleration: a = F/m + g
            const ax = Fd_x / m;
            const ay = (Fd_y / m) - g;
            const az = Fd_z / m;

            // Semi-implicit Euler
            vel.x += ax * dt;
            vel.y += ay * dt;
            vel.z += az * dt;

            pos.x += vel.x * dt;
            pos.y += vel.y * dt;
            pos.z += vel.z * dt;

            state.flightTime += dt;
            if (pos.y > state.maxHeight) state.maxHeight = pos.y;

            // Ground Collision
            if (pos.y <= 0.5) {
                pos.y = 0.5;
                state.landed = true;
                state.impactX = pos.x;
                state.speed = 0;
                triggerImpactParticles(pos);
            }

            // Update Trajectory Line
            actualPoints.push(pos.clone());
            actualLine.geometry.setFromPoints(actualPoints);
            state.trailPointCount = actualPoints.length;

            // Emit Trail
            emitTrailParticle(pos);

            // Update State
            state.projectilePos.x = pos.x;
            state.projectilePos.y = pos.y;
            state.projectilePos.z = pos.z;
        }

        // --- UI & INTERACTIONS ---
        const angleSlider = document.getElementById('angleSlider');
        const speedSlider = document.getElementById('speedSlider');
        const angleLabel = document.getElementById('angleLabel');
        const speedLabel = document.getElementById('speedLabel');

        angleSlider.addEventListener('input', (e) => {
            state.launchAngle = parseFloat(e.target.value);
            angleLabel.innerText = `Angle: ${state.launchAngle}°`;
            updateIdealTrajectory();
        });

        speedSlider.addEventListener('input', (e) => {
            state.launchSpeed = parseFloat(e.target.value);
            speedLabel.innerText = `Speed: ${state.launchSpeed} m/s`;
            updateIdealTrajectory();
        });

        document.getElementById('launchBtn').addEventListener('click', () => {
            if (state.launched && !state.landed) return;

            state.launched = true;
            state.landed = false;
            state.flightTime = 0;
            state.maxHeight = 0.5;
            state.impactX = null;

            projectileGroup.position.set(-20, 0.5, 0);
            actualPoints = [projectileGroup.position.clone()];
            actualLine.geometry.setFromPoints(actualPoints);

            const angleRad = state.launchAngle * Math.PI / 180;
            const v0 = state.launchSpeed;
            state.projectileVel.x = v0 * Math.cos(angleRad);
            state.projectileVel.y = v0 * Math.sin(angleRad);
            state.projectileVel.z = 0;

            // Clear existing particles
            particles.forEach((p, i) => { p.active = false; pOpa[i] = 0; });
            pGeo.attributes.opacity.needsUpdate = true;
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            state.launched = false;
            state.landed = false;
            state.flightTime = 0;
            state.speed = 0;
            
            projectileGroup.position.set(-20, 0.5, 0);
            state.projectilePos = { x: -20, y: 0.5, z: 0 };
            state.projectileVel = { x: 0, y: 0, z: 0 };
            
            actualPoints = [];
            actualLine.geometry.setFromPoints(actualPoints);
            
            particles.forEach((p, i) => { p.active = false; pOpa[i] = 0; });
            pGeo.attributes.opacity.needsUpdate = true;
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'c') {
                state.cameraFollow = !state.cameraFollow;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateHUD() {
            document.getElementById('hud-pos').innerText = `Pos: ${state.projectilePos.x.toFixed(2)}, ${state.projectilePos.y.toFixed(2)}`;
            document.getElementById('hud-vel').innerText = `Vel: ${state.speed.toFixed(2)} m/s`;
            document.getElementById('hud-time').innerText = `Time: ${state.flightTime.toFixed(2)} s`;
            document.getElementById('hud-particles').innerText = `Particles: ${state.particleCount}`;
        }

        // --- MAIN LOOP ---
        let lastTime = performance.now();
        let accumulator = 0;

        function animate(time) {
            requestAnimationFrame(animate);

            const delta = (time - lastTime) / 1000;
            lastTime = time;
            
            // Cap delta to prevent spiral of death on lag
            const frameTime = Math.min(delta, 0.1);
            accumulator += frameTime;

            while (accumulator >= PHYSICS_DT) {
                physicsStep(PHYSICS_DT);
                accumulator -= PHYSICS_DT;
            }

            updateParticles(frameTime);
            updateHUD();

            // Camera Logic
            if (state.cameraFollow) {
                const offset = new THREE.Vector3(-8, 5, 15);
                const targetPos = projectileGroup.position.clone().add(offset);
                camera.position.lerp(targetPos, 0.1);
                currentLookAt.lerp(projectileGroup.position, 0.1);
                camera.lookAt(currentLookAt);
            } else {
                camera.position.lerp(defaultCamPos, 0.05);
                currentLookAt.lerp(defaultLookAt, 0.05);
                camera.lookAt(currentLookAt);
            }

            // Rotate projectile slightly for visual effect if flying
            if (state.launched && !state.landed && state.modelLoaded) {
                projectileGroup.children[0].rotation.x += 0.1;
                projectileGroup.children[0].rotation.y += 0.05;
            } else if (state.modelLoaded) {
                projectileGroup.children[0].rotation.set(0,0,0);
            }

            renderer.render(scene, camera);
        }

        animate(performance.now());

    </script>
</body>
</html>
