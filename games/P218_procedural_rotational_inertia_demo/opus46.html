<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotational Inertia Physics Demo</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #000;
  }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.75);
    color: #00ff88;
    padding: 20px 25px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(0, 255, 136, 0.3);
    backdrop-filter: blur(10px);
    min-width: 280px;
    z-index: 10;
  }
  #hud h2 {
    margin: 0 0 10px 0;
    font-size: 18px;
    color: #fff;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 8px;
  }
  #hud .label {
    color: #aaa;
    font-size: 12px;
  }
  #hud .value {
    color: #00ff88;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    font-size: 16px;
  }
  #hud .paused-true {
    color: #ff4444;
  }
  #hud .paused-false {
    color: #00ff88;
  }
  #controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 10;
  }
  #applyTorqueBtn {
    background: linear-gradient(135deg, #ff6b35, #ff4444);
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
  }
  #applyTorqueBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(255, 107, 53, 0.6);
  }
  #applyTorqueBtn:active {
    transform: scale(0.98);
  }
  #keybinds {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.75);
    color: #ccc;
    padding: 15px 20px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 2;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  #keybinds h3 {
    margin: 0 0 5px 0;
    color: #fff;
    font-size: 15px;
  }
  #keybinds kbd {
    background: rgba(255,255,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
  }
  #title-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 10px;
    z-index: 5;
    pointer-events: none;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="hud">
  <h2>⚙ Rotational Inertia</h2>
  <div><span class="label">Angular Velocity (ω):</span><br><span class="value" id="hud-omega">0.000</span> <span class="label">rad/s</span></div>
  <div><span class="label">Moment of Inertia (I):</span><br><span class="value" id="hud-inertia">0.000</span> <span class="label">kg·m²</span></div>
  <div><span class="label">Angular Momentum (L):</span><br><span class="value" id="hud-momentum">0.000</span> <span class="label">kg·m²/s</span></div>
  <div><span class="label">Mass Radius (r):</span><br><span class="value" id="hud-radius">0.0</span> <span class="label">m</span></div>
  <div><span class="label">Paused:</span> <span class="value" id="hud-paused">false</span></div>
</div>

<div id="keybinds">
  <h3>🎮 Controls</h3>
  <kbd>I</kbd> Move masses inward<br>
  <kbd>O</kbd> Move masses outward<br>
  <kbd>B</kbd> Apply brake (−30% L)<br>
  <kbd>R</kbd> Reset simulation<br>
  <kbd>Space</kbd> Pause / Resume
</div>

<div id="controls">
  <button id="applyTorqueBtn">🔄 Apply Torque</button>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
const INITIAL_R = 1.0;
const INITIAL_OMEGA = 2.0;
const I_BASE = 2.0;
const MASS = 1.0;
const MASS_COUNT = 2;
const MIN_R = 0.5;
const MAX_R = 3.5;
const R_STEP = 0.5;

let massRadius = INITIAL_R;
let omega = INITIAL_OMEGA;
let momentOfInertia = I_BASE + MASS_COUNT * MASS * massRadius * massRadius;
let angularMomentum = momentOfInertia * omega;
let paused = false;
let brakeCount = 0;
let torqueCount = 0;
let robotLoaded = false;

function safeNum(v) { return (isNaN(v) || !isFinite(v)) ? 0 : v; }

window.__3D_STATE__ = {
  omega: safeNum(omega),
  momentOfInertia: safeNum(momentOfInertia),
  angularMomentum: safeNum(angularMomentum),
  massRadius: safeNum(massRadius),
  paused: paused,
  turntableAngle: 0,
  robotLoaded: false,
  massCount: MASS_COUNT,
  brakeCount: 0,
  torqueCount: 0
};

function updateState() {
  momentOfInertia = I_BASE + MASS_COUNT * MASS * massRadius * massRadius;
  omega = angularMomentum / momentOfInertia;

  window.__3D_STATE__.omega = safeNum(omega);
  window.__3D_STATE__.momentOfInertia = safeNum(momentOfInertia);
  window.__3D_STATE__.angularMomentum = safeNum(angularMomentum);
  window.__3D_STATE__.massRadius = safeNum(massRadius);
  window.__3D_STATE__.paused = paused;
  window.__3D_STATE__.turntableAngle = safeNum(turntable ? turntable.rotation.y : 0);
  window.__3D_STATE__.robotLoaded = robotLoaded;
  window.__3D_STATE__.massCount = MASS_COUNT;
  window.__3D_STATE__.brakeCount = brakeCount;
  window.__3D_STATE__.torqueCount = torqueCount;
}

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 40);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x002244, 0.3);
scene.add(hemiLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x555566,
  roughness: 0.8,
  metalness: 0.2
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(30, 30, 0x333344, 0x222233);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// --- Turntable ---
const turntableGeo = new THREE.CylinderGeometry(4, 4, 0.2, 64);
const turntableMat = new THREE.MeshStandardMaterial({
  color: 0x2244aa,
  roughness: 0.3,
  metalness: 0.6
});
const turntable = new THREE.Mesh(turntableGeo, turntableMat);
turntable.position.y = 0.1;
turntable.castShadow = true;
turntable.receiveShadow = true;
scene.add(turntable);

// Turntable ring decoration
const ringGeo = new THREE.TorusGeometry(4, 0.05, 8, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x66aaff, emissive: 0x2255aa, emissiveIntensity: 0.5 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI / 2;
ring.position.y = 0.21;
turntable.add(ring);

// Center axis marker
const axisGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 16);
const axisMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xaa8800, emissiveIntensity: 0.3 });
const axisMarker = new THREE.Mesh(axisGeo, axisMat);
axisMarker.position.y = 0.35;
turntable.add(axisMarker);

// --- Masses ---
const massMat = new THREE.MeshStandardMaterial({
  color: 0xff3333,
  roughness: 0.2,
  metalness: 0.5,
  emissive: 0x441111,
  emissiveIntensity: 0.2
});
const massGeo = new THREE.SphereGeometry(0.4, 32, 32);

const mass1 = new THREE.Mesh(massGeo, massMat);
mass1.castShadow = true;
mass1.position.set(massRadius, 0.5, 0);
turntable.add(mass1);

const mass2 = new THREE.Mesh(massGeo, massMat);
mass2.castShadow = true;
mass2.position.set(-massRadius, 0.5, 0);
turntable.add(mass2);

// Connecting rods (visual)
const rodMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.3 });

function createRod() {
  const geo = new THREE.CylinderGeometry(0.03, 0.03, 1, 8);
  geo.rotateZ(Math.PI / 2);
  const rod = new THREE.Mesh(geo, rodMat);
  rod.castShadow = true;
  return rod;
}

const rod1 = createRod();
turntable.add(rod1);
const rod2 = createRod();
turntable.add(rod2);

function updateMassPositions() {
  mass1.position.set(massRadius, 0.5, 0);
  mass2.position.set(-massRadius, 0.5, 0);

  rod1.position.set(massRadius / 2, 0.3, 0);
  rod1.scale.x = massRadius;
  rod2.position.set(-massRadius / 2, 0.3, 0);
  rod2.scale.x = massRadius;
}
updateMassPositions();

// --- Trail particles ---
const trailParticles = [];
const trailGeo = new THREE.SphereGeometry(0.05, 8, 8);
const trailMat = new THREE.MeshBasicMaterial({ color: 0xff6666, transparent: true, opacity: 0.6 });

function spawnTrail() {
  if (paused) return;
  const worldPos1 = new THREE.Vector3();
  const worldPos2 = new THREE.Vector3();
  mass1.getWorldPosition(worldPos1);
  mass2.getWorldPosition(worldPos2);

  [worldPos1, worldPos2].forEach(pos => {
    const p = new THREE.Mesh(trailGeo, trailMat.clone());
    p.position.copy(pos);
    p.userData.life = 1.0;
    scene.add(p);
    trailParticles.push(p);
  });

  // Limit trail count
  while (trailParticles.length > 200) {
    const old = trailParticles.shift();
    scene.remove(old);
    old.geometry.dispose();
    old.material.dispose();
  }
}

function updateTrails(dt) {
  for (let i = trailParticles.length - 1; i >= 0; i--) {
    const p = trailParticles[i];
    p.userData.life -= dt * 0.8;
    p.material.opacity = Math.max(0, p.userData.life * 0.6);
    p.scale.setScalar(Math.max(0.01, p.userData.life));
    if (p.userData.life <= 0) {
      scene.remove(p);
      p.geometry.dispose();
      p.material.dispose();
      trailParticles.splice(i, 1);
    }
  }
}

// --- Load Robot ---
const loader = new GLTFLoader();

// Create a placeholder robot in case the model fails to load
function createPlaceholderRobot() {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.BoxGeometry(0.8, 1.0, 0.5);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4488cc, metalness: 0.6, roughness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 1.2;
  body.castShadow = true;
  group.add(body);

  // Head
  const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
  const headMat = new THREE.MeshStandardMaterial({ color: 0x66aadd, metalness: 0.6, roughness: 0.3 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 2.0;
  head.castShadow = true;
  group.add(head);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.06, 8, 8);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 1 });
  const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
  eye1.position.set(-0.12, 2.05, 0.26);
  group.add(eye1);
  const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
  eye2.position.set(0.12, 2.05, 0.26);
  group.add(eye2);

  // Arms
  const armGeo = new THREE.BoxGeometry(0.2, 0.8, 0.2);
  const armMat = new THREE.MeshStandardMaterial({ color: 0x3377aa, metalness: 0.6, roughness: 0.3 });
  const arm1 = new THREE.Mesh(armGeo, armMat);
  arm1.position.set(-0.6, 1.1, 0);
  arm1.castShadow = true;
  group.add(arm1);
  const arm2 = new THREE.Mesh(armGeo, armMat);
  arm2.position.set(0.6, 1.1, 0);
  arm2.castShadow = true;
  group.add(arm2);

  // Legs
  const legGeo = new THREE.BoxGeometry(0.25, 0.7, 0.25);
  const legMat = new THREE.MeshStandardMaterial({ color: 0x335588, metalness: 0.6, roughness: 0.3 });
  const leg1 = new THREE.Mesh(legGeo, legMat);
  leg1.position.set(-0.2, 0.45, 0);
  leg1.castShadow = true;
  group.add(leg1);
  const leg2 = new THREE.Mesh(legGeo, legMat);
  leg2.position.set(0.2, 0.45, 0);
  leg2.castShadow = true;
  group.add(leg2);

  // Antenna
  const antGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 8);
  const antMat = new THREE.MeshStandardMaterial({ color: 0xffcc00 });
  const ant = new THREE.Mesh(antGeo, antMat);
  ant.position.y = 2.4;
  group.add(ant);
  const tipGeo = new THREE.SphereGeometry(0.06, 8, 8);
  const tipMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff0000, emissiveIntensity: 0.5 });
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.position.y = 2.55;
  group.add(tip);

  return group;
}

let robotModel = null;

loader.load(
  'robot.glb',
  (gltf) => {
    robotModel = gltf.scene;
    // Scale to ~2 units tall
    const box = new THREE.Box3().setFromObject(robotModel);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2.0 / maxDim;
    robotModel.scale.setScalar(scale);

    // Recompute bounding box after scale
    const box2 = new THREE.Box3().setFromObject(robotModel);
    robotModel.position.y = -box2.min.y + 0.2;

    robotModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    turntable.add(robotModel);
    robotLoaded = true;
    window.__3D_STATE__.robotLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Could not load robot.glb, using placeholder:', error);
    robotModel = createPlaceholderRobot();
    turntable.add(robotModel);
    robotLoaded = true;
    window.__3D_STATE__.robotLoaded = true;
  }
);

// Also set a timeout fallback
setTimeout(() => {
  if (!robotLoaded) {
    console.warn('Robot load timeout, using placeholder');
    robotModel = createPlaceholderRobot();
    turntable.add(robotModel);
    robotLoaded = true;
    window.__3D_STATE__.robotLoaded = true;
  }
}, 3000);

// --- Decorative elements ---
// Speed indicator arrows on turntable
const arrowShape = new THREE.Shape();
arrowShape.moveTo(0, 0);
arrowShape.lineTo(0.3, 0.15);
arrowShape.lineTo(0.1, 0.15);
arrowShape.lineTo(0.1, 0.4);
arrowShape.lineTo(-0.1, 0.4);
arrowShape.lineTo(-0.1, 0.15);
arrowShape.lineTo(-0.3, 0.15);
arrowShape.lineTo(0, 0);

// --- HUD Update ---
const hudOmega = document.getElementById('hud-omega');
const hudInertia = document.getElementById('hud-inertia');
const hudMomentum = document.getElementById('hud-momentum');
const hudRadius = document.getElementById('hud-radius');
const hudPaused = document.getElementById('hud-paused');

function updateHUD() {
  hudOmega.textContent = safeNum(omega).toFixed(3);
  hudInertia.textContent = safeNum(momentOfInertia).toFixed(3);
  hudMomentum.textContent = safeNum(angularMomentum).toFixed(3);
  hudRadius.textContent = safeNum(massRadius).toFixed(1);
  hudPaused.textContent = paused ? 'true' : 'false';
  hudPaused.className = 'value ' + (paused ? 'paused-true' : 'paused-false');
}

// --- Interactions ---
function moveMassesOut() {
  massRadius = Math.min(MAX_R, massRadius + R_STEP);
  updateMassPositions();
  momentOfInertia = I_BASE + MASS_COUNT * MASS * massRadius * massRadius;
  omega = angularMomentum / momentOfInertia;
  updateState();
}

function moveMassesIn() {
  massRadius = Math.max(MIN_R, massRadius - R_STEP);
  updateMassPositions();
  momentOfInertia = I_BASE + MASS_COUNT * MASS * massRadius * massRadius;
  omega = angularMomentum / momentOfInertia;
  updateState();
}

function applyBrake() {
  angularMomentum *= 0.7;
  omega = angularMomentum / momentOfInertia;
  brakeCount++;
  updateState();
}

function applyTorque() {
  angularMomentum *= 1.2;
  omega = angularMomentum / momentOfInertia;
  torqueCount++;
  updateState();
}

function resetSimulation() {
  massRadius = INITIAL_R;
  omega = INITIAL_OMEGA;
  momentOfInertia = I_BASE + MASS_COUNT * MASS * massRadius * massRadius;
  angularMomentum = momentOfInertia * omega;
  paused = false;
  brakeCount = 0;
  torqueCount = 0;
  turntable.rotation.y = 0;
  updateMassPositions();
  updateState();
}

function togglePause() {
  paused = !paused;
  updateState();
}

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'o') moveMassesOut();
  else if (key === 'i') moveMassesIn();
  else if (key === 'b') applyBrake();
  else if (key === 'r') resetSimulation();
  else if (key === ' ') {
    e.preventDefault();
    togglePause();
  }
});

document.getElementById('applyTorqueBtn').addEventListener('click', applyTorque);

// --- Animation ---
const clock = new THREE.Clock();
let trailTimer = 0;

function animate() {
  requestAnimationFrame(animate);

  let dt = clock.getDelta();
  dt = Math.min(dt, 1 / 30);

  controls.update();

  if (!paused) {
    turntable.rotation.y += omega * dt;

    // Trail spawning
    trailTimer += dt;
    if (trailTimer > 0.05 && Math.abs(omega) > 0.1) {
      spawnTrail();
      trailTimer = 0;
    }
  }

  updateTrails(dt);

  // Pulsing glow on masses based on speed
  const speedFactor = Math.min(1, Math.abs(omega) / 10);
  massMat.emissiveIntensity = 0.2 + speedFactor * 0.8;

  updateState();
  updateHUD();

  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize state
updateState();
updateHUD();
animate();
</script>
</body>
</html>
