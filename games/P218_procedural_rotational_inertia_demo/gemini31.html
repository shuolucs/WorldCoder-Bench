<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotational Inertia Physics Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
            z-index: 10;
            border: 1px solid #00ff00;
        }
        #hud div {
            margin-bottom: 5px;
            font-size: 14px;
        }
        #applyTorqueBtn {
            margin-top: 10px;
            padding: 8px 12px;
            background: #00ff00;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            pointer-events: auto;
            border-radius: 3px;
        }
        #applyTorqueBtn:hover {
            background: #00cc00;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div>Angular Velocity (&omega;): <span id="val-omega">0.000</span> rad/s</div>
        <div>Moment of Inertia (I): <span id="val-i">0.000</span></div>
        <div>Angular Momentum (L): <span id="val-l">0.000</span></div>
        <div>Mass Radius (r): <span id="val-r">0.0</span></div>
        <div>Paused: <span id="val-paused">false</span></div>
        <button id="applyTorqueBtn">Apply Torque</button>
    </div>

    <div id="instructions">
        Controls:<br>
        [O] Move masses Outward (+I, -&omega;)<br>
        [I] Move masses Inward (-I, +&omega;)<br>
        [B] Apply Brake (-30% L)<br>
        [R] Reset Simulation<br>
        [Space] Toggle Pause
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            omega: 0,
            momentOfInertia: 0,
            angularMomentum: 0,
            massRadius: 0,
            paused: false,
            turntableAngle: 0,
            robotLoaded: false,
            massCount: 2,
            brakeCount: 0,
            torqueCount: 0
        };

        // --- Physics Variables ---
        const I_base = 2.0;
        const m = 1.0;
        let r = 1.0;
        let omega = 2.0;
        let L = 0;
        let paused = false;

        function calculateInertia(radius) {
            return I_base + 2 * m * radius * radius;
        }

        function initPhysics() {
            r = 1.0;
            omega = 2.0;
            L = calculateInertia(r) * omega;
        }

        function updatePhysicsFromRadius() {
            const currentI = calculateInertia(r);
            omega = L / currentI;
        }

        initPhysics();

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Objects ---
        // Ground
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        // Turntable
        const turntableGeo = new THREE.CylinderGeometry(4, 4, 0.2, 64);
        const turntableMat = new THREE.MeshStandardMaterial({ color: 0x4488ff, roughness: 0.4, metalness: 0.2 });
        const turntable = new THREE.Mesh(turntableGeo, turntableMat);
        turntable.position.y = 0.1;
        scene.add(turntable);

        // Add some markings to turntable to make rotation obvious
        const markGeo = new THREE.BoxGeometry(8, 0.21, 0.2);
        const markMat = new THREE.MeshBasicMaterial({ color: 0x2244aa });
        const mark = new THREE.Mesh(markGeo, markMat);
        turntable.add(mark);

        // Masses
        const massGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const massMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.3, metalness: 0.1 });
        
        const mass1 = new THREE.Mesh(massGeo, massMat);
        const mass2 = new THREE.Mesh(massGeo, massMat);
        
        turntable.add(mass1);
        turntable.add(mass2);

        function updateMassPositions() {
            // Local Y: 0.1 (half cylinder height) + 0.4 (sphere radius) = 0.5
            mass1.position.set(r, 0.5, 0);
            mass2.position.set(-r, 0.5, 0);
        }
        updateMassPositions();

        // Robot Model
        const loader = new GLTFLoader();
        loader.load(
            'robot.glb',
            (gltf) => {
                const model = gltf.scene;
                
                // Scale to roughly 2 units tall
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const scale = 2.0 / size.y;
                model.scale.set(scale, scale, scale);
                
                // Center and place on turntable
                const center = box.getCenter(new THREE.Vector3());
                model.position.set(-center.x * scale, 0.1, -center.z * scale);
                
                const wrapper = new THREE.Group();
                wrapper.add(model);
                turntable.add(wrapper);
                
                window.__3D_STATE__.robotLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load robot.glb, using fallback geometry.', error);
                // Fallback axis marker
                const fbGeo = new THREE.CylinderGeometry(0.2, 0.2, 2, 16);
                const fbMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
                const fb = new THREE.Mesh(fbGeo, fbMat);
                fb.position.y = 1.1; // 0.1 + 1.0
                turntable.add(fb);
            }
        );

        // --- Interactions ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'o') {
                r = Math.min(3.5, r + 0.5);
                updatePhysicsFromRadius();
                updateMassPositions();
            } else if (key === 'i') {
                r = Math.max(0.5, r - 0.5);
                updatePhysicsFromRadius();
                updateMassPositions();
            } else if (key === 'b') {
                L *= 0.7; // Reduce L by 30%
                updatePhysicsFromRadius();
                window.__3D_STATE__.brakeCount++;
            } else if (key === 'r') {
                initPhysics();
                updateMassPositions();
            } else if (key === ' ') {
                paused = !paused;
            }
        });

        document.getElementById('applyTorqueBtn').addEventListener('click', () => {
            L *= 1.2; // Increase L by 20%
            updatePhysicsFromRadius();
            window.__3D_STATE__.torqueCount++;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        // DOM Elements
        const elOmega = document.getElementById('val-omega');
        const elI = document.getElementById('val-i');
        const elL = document.getElementById('val-l');
        const elR = document.getElementById('val-r');
        const elPaused = document.getElementById('val-paused');

        function animate() {
            requestAnimationFrame(animate);

            let dt = clock.getDelta();
            if (dt > 1/30) dt = 1/30; // Cap dt

            if (!paused) {
                turntable.rotation.y += omega * dt;
            }

            // Update HUD
            const currentI = calculateInertia(r);
            elOmega.textContent = omega.toFixed(3);
            elI.textContent = currentI.toFixed(3);
            elL.textContent = L.toFixed(3);
            elR.textContent = r.toFixed(1);
            elPaused.textContent = paused;

            // Update State
            window.__3D_STATE__.omega = isNaN(omega) ? 0 : omega;
            window.__3D_STATE__.momentOfInertia = isNaN(currentI) ? 0 : currentI;
            window.__3D_STATE__.angularMomentum = isNaN(L) ? 0 : L;
            window.__3D_STATE__.massRadius = isNaN(r) ? 0 : r;
            window.__3D_STATE__.paused = paused;
            window.__3D_STATE__.turntableAngle = isNaN(turntable.rotation.y) ? 0 : turntable.rotation.y;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
