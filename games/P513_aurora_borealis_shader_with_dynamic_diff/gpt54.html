<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora Borealis - Three.js</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
      font-size: 14px;
      z-index: 100;
      line-height: 1.5;
      background: rgba(0, 0, 0, 0.25);
      padding: 8px 10px;
      border-radius: 6px;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Difficulty: <span id="hud-difficulty">1</span></div>
    <div>Speed: <span id="hud-speed">1.0</span></div>
    <div>Intensity: <span id="hud-intensity">1.0</span></div>
    <div>WaveCount: <span id="hud-waves">3</span></div>
    <div>ColorShift: <span id="hud-color">0.0</span></div>
    <div>Paused: <span id="hud-paused">false</span></div>
    <div>Pulse Active: <span id="hud-pulse">false</span></div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0, 2);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const hud = {
      difficulty: document.getElementById('hud-difficulty'),
      speed: document.getElementById('hud-speed'),
      intensity: document.getElementById('hud-intensity'),
      waves: document.getElementById('hud-waves'),
      color: document.getElementById('hud-color'),
      paused: document.getElementById('hud-paused'),
      pulse: document.getElementById('hud-pulse')
    };

    const difficultySettings = {
      1: { waveCount: 3, speed: 1.0, intensity: 1.0, noise: 0.0 },
      2: { waveCount: 4, speed: 1.5, intensity: 1.2, noise: 0.0 },
      3: { waveCount: 5, speed: 2.0, intensity: 1.5, noise: 0.08 },
      4: { waveCount: 6, speed: 3.0, intensity: 2.0, noise: 0.16 },
      5: { waveCount: 7, speed: 4.0, intensity: 2.5, noise: 0.28 }
    };

    const state = {
      difficulty: 1,
      paused: false,
      colorShift: 0.0,
      elapsedTime: 0,
      frameCount: 0,
      pulseActive: false,
      pulseStartTime: 0,
      pulseDuration: 1.0,
      pulseBoost: 0.0,
      baseIntensity: 1.0,
      speed: 1.0,
      waveCount: 3
    };

    const auroraGeometry = new THREE.PlaneGeometry(4, 2, 128, 64);

    const auroraMaterial = new THREE.ShaderMaterial({
      transparent: true,
      side: THREE.DoubleSide,
      uniforms: {
        uTime: { value: 0.0 },
        uIntensity: { value: 1.0 },
        uSpeed: { value: 1.0 },
        uColorShift: { value: 0.0 },
        uWaveCount: { value: 3 },
        uDifficulty: { value: 1 },
        uNoiseAmount: { value: 0.0 }
      },
      vertexShader: `
        uniform float uTime;
        uniform float uSpeed;
        varying vec2 vUv;

        void main() {
          vUv = uv;
          vec3 pos = position;
          float wave = sin(pos.x * 3.0 + uTime * 1.5 * uSpeed) * 0.05;
          wave += sin(pos.x * 7.0 + uTime * 0.9 * uSpeed) * 0.025;
          pos.y += wave;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform float uIntensity;
        uniform float uSpeed;
        uniform float uColorShift;
        uniform int uWaveCount;
        uniform int uDifficulty;
        uniform float uNoiseAmount;
        varying vec2 vUv;

        float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
        }

        float noise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);

          float a = hash(i);
          float b = hash(i + vec2(1.0, 0.0));
          float c = hash(i + vec2(0.0, 1.0));
          float d = hash(i + vec2(1.0, 1.0));

          vec2 u = f * f * (3.0 - 2.0 * f);

          return mix(a, b, u.x) +
                 (c - a) * u.y * (1.0 - u.x) +
                 (d - b) * u.x * u.y;
        }

        vec3 auroraPalette(float t) {
          vec3 green = vec3(0.1, 1.0, 0.45);
          vec3 blue = vec3(0.1, 0.5, 1.0);
          vec3 purple = vec3(0.65, 0.2, 1.0);

          float shift = fract(t + uColorShift);
          vec3 c1 = mix(green, blue, smoothstep(0.0, 0.5, shift));
          vec3 c2 = mix(blue, purple, smoothstep(0.5, 1.0, shift));
          return mix(c1, c2, step(0.5, shift));
        }

        void main() {
          vec2 uv = vUv;
          float t = uTime;

          if (uDifficulty >= 5) {
            uv.x += sin(t * 0.4) * 0.05;
            uv.y += cos(t * 0.35) * 0.03;
          }

          float waveSum = 0.0;
          float amplitude = 1.0;
          float totalAmp = 0.0;

          for (int i = 0; i < 7; i++) {
            if (i >= uWaveCount) break;

            float fi = float(i);
            float freq = 3.0 + fi * 2.1;
            float phase = t * uSpeed * (0.6 + fi * 0.18);
            float w = sin(uv.x * freq * 3.14159 + phase);
            waveSum += (w * 0.5 + 0.5) * amplitude;
            totalAmp += amplitude;
            amplitude *= 0.72;
          }

          waveSum /= max(totalAmp, 0.0001);

          float curtain = smoothstep(0.0, 0.85, uv.y + waveSum * 0.35);
          float band = 1.0 - abs((uv.y - 0.5) - (waveSum - 0.5)) * 2.2;
          band = clamp(band, 0.0, 1.0);

          float n = 0.0;
          if (uDifficulty >= 3) {
            n = noise(uv * (8.0 + float(uDifficulty) * 2.0) + vec2(t * 0.3, t * 0.15));
            n = (n - 0.5) * 2.0;
          }

          float shimmer = sin((uv.x + uv.y * 0.8) * 18.0 - t * 2.0) * 0.08;
          float alpha = curtain * band + shimmer;
          alpha += n * uNoiseAmount;
          alpha = clamp(alpha, 0.0, 1.0);

          float colorT = uv.y + waveSum * 0.3;
          if (uDifficulty >= 5) {
            colorT += sin(t * 0.8) * 0.15;
          }

          vec3 color = auroraPalette(colorT);
          color *= (0.5 + waveSum * 0.9);
          color *= uIntensity;

          gl_FragColor = vec4(color, alpha * 0.85);
        }
      `
    });

    const auroraMesh = new THREE.Mesh(auroraGeometry, auroraMaterial);
    auroraMesh.position.set(0, 0.5, 0);
    scene.add(auroraMesh);

    const groundGeometry = new THREE.PlaneGeometry(4, 4);
    const groundMaterial = new THREE.MeshBasicMaterial({
      color: 0x222222,
      side: THREE.DoubleSide
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.5;
    scene.add(ground);

    const starGroup = new THREE.Group();
    const starGeometry = new THREE.SphereGeometry(0.005, 8, 8);
    const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

    for (let i = 0; i < 50; i++) {
      const star = new THREE.Mesh(starGeometry, starMaterial);
      star.position.set(
        THREE.MathUtils.randFloatSpread(3.6),
        THREE.MathUtils.randFloat(0.1, 1.7),
        THREE.MathUtils.randFloat(-0.2, 0.2)
      );
      starGroup.add(star);
    }
    scene.add(starGroup);

    function applyDifficulty(level) {
      state.difficulty = THREE.MathUtils.clamp(level, 1, 5);
      const config = difficultySettings[state.difficulty];
      state.baseIntensity = config.intensity;
      state.speed = config.speed;
      state.waveCount = config.waveCount;

      auroraMaterial.uniforms.uDifficulty.value = state.difficulty;
      auroraMaterial.uniforms.uSpeed.value = state.speed;
      auroraMaterial.uniforms.uWaveCount.value = state.waveCount;
      auroraMaterial.uniforms.uNoiseAmount.value = config.noise;
    }

    function resetState() {
      state.paused = false;
      state.colorShift = 0.0;
      state.elapsedTime = 0;
      state.pulseActive = false;
      state.pulseStartTime = 0;
      state.pulseBoost = 0.0;
      auroraMaterial.uniforms.uTime.value = 0.0;
      auroraMaterial.uniforms.uColorShift.value = 0.0;
      applyDifficulty(1);
    }

    function triggerPulse() {
      state.pulseActive = true;
      state.pulseStartTime = performance.now() / 1000;
      state.pulseBoost = 1.0;
    }

    window.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '5') {
        applyDifficulty(parseInt(e.key, 10));
      } else if (e.key === 'ArrowUp') {
        applyDifficulty(state.difficulty + 1);
      } else if (e.key === 'ArrowDown') {
        applyDifficulty(state.difficulty - 1);
      } else if (e.key === 'c' || e.key === 'C') {
        state.colorShift += 0.2;
        if (state.colorShift >= 1.0) state.colorShift = 0.0;
        auroraMaterial.uniforms.uColorShift.value = state.colorShift;
      } else if (e.code === 'Space') {
        e.preventDefault();
        state.paused = !state.paused;
      } else if (e.key === 'r' || e.key === 'R') {
        resetState();
      }
    });

    renderer.domElement.addEventListener('click', () => {
      triggerPulse();
    });

    window.__3D_STATE__ = {};

    const clock = new THREE.Clock();

    function updateHUD(currentIntensity) {
      hud.difficulty.textContent = state.difficulty;
      hud.speed.textContent = state.speed.toFixed(1);
      hud.intensity.textContent = currentIntensity.toFixed(2);
      hud.waves.textContent = state.waveCount;
      hud.color.textContent = state.colorShift.toFixed(1);
      hud.paused.textContent = String(state.paused);
      hud.pulse.textContent = String(state.pulseActive);
    }

    function updateExposedState(currentIntensity) {
      window.__3D_STATE__ = {
        difficulty: state.difficulty,
        speed: state.speed,
        intensity: currentIntensity,
        baseIntensity: state.baseIntensity,
        waveCount: state.waveCount,
        colorShift: Number(state.colorShift.toFixed(1)),
        paused: state.paused,
        elapsedTime: state.elapsedTime,
        pulseActive: state.pulseActive,
        starCount: starGroup.children.length,
        frameCount: state.frameCount,
        meshExists: scene.children.includes(auroraMesh),
        groundExists: scene.children.includes(ground)
      };
    }

    applyDifficulty(1);
    auroraMaterial.uniforms.uColorShift.value = state.colorShift;

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (!state.paused) {
        state.elapsedTime += delta * state.speed;
      }

      auroraMaterial.uniforms.uTime.value = state.elapsedTime;

      if (state.pulseActive) {
        const now = performance.now() / 1000;
        const elapsedPulse = now - state.pulseStartTime;
        if (elapsedPulse >= state.pulseDuration) {
          state.pulseActive = false;
          state.pulseBoost = 0.0;
        } else {
          state.pulseBoost = 1.0 - (elapsedPulse / state.pulseDuration);
        }
      }

      const currentIntensity = THREE.MathUtils.clamp(
        state.baseIntensity + state.pulseBoost,
        0.2,
        3.0
      );

      auroraMaterial.uniforms.uIntensity.value = currentIntensity;
      auroraMaterial.uniforms.uSpeed.value = state.speed;
      auroraMaterial.uniforms.uWaveCount.value = state.waveCount;
      auroraMaterial.uniforms.uDifficulty.value = state.difficulty;
      auroraMaterial.uniforms.uColorShift.value = state.colorShift;

      updateHUD(currentIntensity);
      state.frameCount++;
      updateExposedState(currentIntensity);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
