<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Aurora Borealis</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
        #hud div {
            margin-bottom: 5px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="hud">
        <div>Difficulty: <span id="hud-difficulty"></span></div>
        <div>Speed: <span id="hud-speed"></span></div>
        <div>Intensity: <span id="hud-intensity"></span></div>
        <div>Waves: <span id="hud-waves"></span></div>
        <div>Color Shift: <span id="hud-color"></span></div>
        <div>Paused: <span id="hud-paused"></span></div>
        <div>Pulse Active: <span id="hud-pulse"></span></div>
        <div style="margin-top: 10px; font-size: 10px; color: #aaa;">
            [1-5] Difficulty | [Up/Down] Adjust Diff | [C] Color Shift<br>
            [Space] Pause | [R] Reset | [Click] Pulse
        </div>
    </div>

    <script>
        // State Management
        window.__3D_STATE__ = {
            difficulty: 1,
            speed: 1.0,
            intensity: 1.0,
            baseIntensity: 1.0,
            waveCount: 3,
            colorShift: 0.0,
            paused: false,
            elapsedTime: 0.0,
            pulseActive: false,
            starCount: 50,
            frameCount: 0,
            meshExists: false,
            groundExists: false
        };

        let pulseTimer = 0;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 2);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Ground Plane
        const groundGeo = new THREE.PlaneGeometry(4, 4);
        const groundMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        scene.add(ground);
        window.__3D_STATE__.groundExists = true;

        // Stars
        const starGeo = new THREE.SphereGeometry(0.005, 8, 8);
        const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for (let i = 0; i < window.__3D_STATE__.starCount; i++) {
            const star = new THREE.Mesh(starGeo, starMat);
            star.position.x = (Math.random() - 0.5) * 4;
            star.position.y = Math.random() * 1.5; // Upper half
            star.position.z = (Math.random() - 0.5) * 2;
            scene.add(star);
        }

        // Aurora Shader
        const vertexShader = `
            varying vec2 vUv;
            uniform float uTime;
            uniform float uSpeed;
            void main() {
                vUv = uv;
                vec3 pos = position;
                pos.y += sin(pos.x * 5.0 + uTime * uSpeed) * 0.1;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            uniform float uTime;
            uniform float uIntensity;
            uniform float uSpeed;
            uniform float uColorShift;
            uniform int uWaveCount;
            uniform int uDifficulty;

            // Pseudo-random noise
            float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                vec2 u = f * f * (3.0 - 2.0 * f);
                return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                           mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
            }

            vec3 hueShift(vec3 color, float hue) {
                const vec3 k = vec3(0.57735, 0.57735, 0.57735);
                float cosAngle = cos(hue * 6.28318);
                return vec3(color * cosAngle + cross(k, color) * sin(hue * 6.28318) + k * dot(k, color) * (1.0 - cosAngle));
            }

            void main() {
                vec2 uv = vUv;
                float wave = 0.0;
                float n = 0.0;

                if (uDifficulty >= 3) n += noise(uv * 10.0 + uTime) * 0.1;
                if (uDifficulty >= 4) n += noise(uv * 20.0 - uTime) * 0.2;
                if (uDifficulty >= 5) n += noise(uv * 40.0 + uTime * 2.0) * 0.3;

                for(int i = 1; i <= 7; i++) {
                    if(i > uWaveCount) break;
                    float fi = float(i);
                    float freq = fi * 1.5;
                    wave += sin(uv.x * freq + uTime * uSpeed + n) * (1.0 / fi);
                }

                wave = wave * 0.5 + 0.5; // Normalize somewhat

                vec3 colBottom = vec3(0.0, 1.0, 0.3); // Green
                vec3 colMid = vec3(0.0, 0.4, 1.0);    // Blue
                vec3 colTop = vec3(0.6, 0.0, 1.0);    // Purple

                vec3 color = mix(colBottom, colMid, smoothstep(0.0, 0.5, uv.y));
                color = mix(color, colTop, smoothstep(0.5, 1.0, uv.y));

                float shift = uColorShift;
                if (uDifficulty == 5) shift += uTime * 0.05;
                color = hueShift(color, shift);

                // Soft edges
                float edgeFade = smoothstep(0.0, 0.2, uv.x) * smoothstep(1.0, 0.8, uv.x) * 
                                 smoothstep(0.0, 0.2, uv.y) * smoothstep(1.0, 0.8, uv.y);

                vec3 finalColor = color * wave * uIntensity * edgeFade;
                
                gl_FragColor = vec4(finalColor, edgeFade * wave * 0.8);
            }
        `;

        const uniforms = {
            uTime: { value: 0.0 },
            uIntensity: { value: 1.0 },
            uSpeed: { value: 1.0 },
            uColorShift: { value: 0.0 },
            uWaveCount: { value: 3 },
            uDifficulty: { value: 1 }
        };

        const auroraMat = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.DoubleSide
        });

        const auroraGeo = new THREE.PlaneGeometry(4, 2, 128, 64);
        const auroraMesh = new THREE.Mesh(auroraGeo, auroraMat);
        auroraMesh.position.set(0, 0.5, 0);
        scene.add(auroraMesh);
        window.__3D_STATE__.meshExists = true;

        // Difficulty Logic
        function setDifficulty(level) {
            const state = window.__3D_STATE__;
            state.difficulty = Math.max(1, Math.min(5, level));
            switch(state.difficulty) {
                case 1: state.waveCount = 3; state.speed = 1.0; state.baseIntensity = 1.0; break;
                case 2: state.waveCount = 4; state.speed = 1.5; state.baseIntensity = 1.2; break;
                case 3: state.waveCount = 5; state.speed = 2.0; state.baseIntensity = 1.5; break;
                case 4: state.waveCount = 6; state.speed = 3.0; state.baseIntensity = 2.0; break;
                case 5: state.waveCount = 7; state.speed = 4.0; state.baseIntensity = 2.5; break;
            }
        }

        // Interactions
        window.addEventListener('keydown', (e) => {
            const state = window.__3D_STATE__;
            if (e.key >= '1' && e.key <= '5') setDifficulty(parseInt(e.key));
            if (e.key === 'ArrowUp') setDifficulty(state.difficulty + 1);
            if (e.key === 'ArrowDown') setDifficulty(state.difficulty - 1);
            if (e.key === 'c' || e.key === 'C') {
                state.colorShift += 0.2;
                if (state.colorShift >= 0.95) state.colorShift = 0.0;
            }
            if (e.key === ' ') state.paused = !state.paused;
            if (e.key === 'r' || e.key === 'R') {
                state.colorShift = 0.0;
                state.paused = false;
                setDifficulty(1);
            }
        });

        window.addEventListener('click', () => {
            window.__3D_STATE__.pulseActive = true;
            pulseTimer = 1.0;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // DOM Elements
        const elDiff = document.getElementById('hud-difficulty');
        const elSpeed = document.getElementById('hud-speed');
        const elInt = document.getElementById('hud-intensity');
        const elWaves = document.getElementById('hud-waves');
        const elColor = document.getElementById('hud-color');
        const elPaused = document.getElementById('hud-paused');
        const elPulse = document.getElementById('hud-pulse');

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const state = window.__3D_STATE__;

            if (!state.paused) {
                state.elapsedTime += delta * state.speed;
            }

            // Pulse Logic
            if (state.pulseActive) {
                pulseTimer -= delta;
                if (pulseTimer <= 0) {
                    pulseTimer = 0;
                    state.pulseActive = false;
                }
                state.intensity = state.baseIntensity + pulseTimer; // Boost up to +1.0
            } else {
                state.intensity = state.baseIntensity;
            }

            // Update Uniforms
            uniforms.uTime.value = state.elapsedTime;
            uniforms.uIntensity.value = state.intensity;
            uniforms.uSpeed.value = state.speed;
            uniforms.uColorShift.value = state.colorShift;
            uniforms.uWaveCount.value = state.waveCount;
            uniforms.uDifficulty.value = state.difficulty;

            // Update HUD
            elDiff.innerText = state.difficulty;
            elSpeed.innerText = state.speed.toFixed(1);
            elInt.innerText = state.intensity.toFixed(2);
            elWaves.innerText = state.waveCount;
            elColor.innerText = state.colorShift.toFixed(1);
            elPaused.innerText = state.paused;
            elPulse.innerText = state.pulseActive;

            // Update State Object
            state.colorShift = Math.round(state.colorShift * 10) / 10;
            state.frameCount++;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
