<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Borealis</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #000;
}
canvas {
    display: block;
}
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: monospace;
    font-size: 14px;
    z-index: 100;
    pointer-events: none;
    line-height: 1.6;
}
</style>
</head>
<body>

<div id="hud">
    Difficulty: <span id="hud-difficulty">1</span><br>
    Speed: <span id="hud-speed">1.0</span><br>
    Intensity: <span id="hud-intensity">1.0</span><br>
    Waves: <span id="hud-waves">3</span><br>
    ColorShift: <span id="hud-color">0.0</span><br>
    Paused: <span id="hud-paused">false</span><br>
    Pulse: <span id="hud-pulse">false</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 2);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Difficulty presets
    const difficultyPresets = {
        1: { waveCount: 3, speed: 1.0, intensity: 1.0, noise: 0.0 },
        2: { waveCount: 4, speed: 1.5, intensity: 1.2, noise: 0.0 },
        3: { waveCount: 5, speed: 2.0, intensity: 1.5, noise: 0.3 },
        4: { waveCount: 6, speed: 3.0, intensity: 2.0, noise: 0.6 },
        5: { waveCount: 7, speed: 4.0, intensity: 2.5, noise: 1.0 }
    };

    // State
    let state = {
        difficulty: 1,
        speed: 1.0,
        baseIntensity: 1.0,
        waveCount: 3,
        colorShift: 0.0,
        paused: false,
        elapsedTime: 0.0,
        pulseActive: false,
        pulseBoost: 0.0,
        pulseTimer: 0.0,
        frameCount: 0,
        noise: 0.0
    };

    // Aurora shader
    const vertexShader = `
        uniform float uTime;
        uniform float uSpeed;
        varying vec2 vUv;
        void main() {
            vUv = uv;
            vec3 pos = position;
            pos.y += sin(pos.x * 3.0 + uTime * uSpeed * 0.5) * 0.05;
            pos.y += sin(pos.x * 5.0 - uTime * uSpeed * 0.3) * 0.03;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    `;

    const fragmentShader = `
        uniform float uTime;
        uniform float uIntensity;
        uniform float uSpeed;
        uniform float uColorShift;
        uniform int uWaveCount;
        uniform int uDifficulty;
        uniform float uNoise;
        varying vec2 vUv;

        // Simple hash-based noise
        float hash(vec2 p) {
            p = fract(p * vec2(123.34, 456.21));
            p += dot(p, p + 45.32);
            return fract(p.x * p.y);
        }

        float noise2d(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            float a = hash(i);
            float b = hash(i + vec2(1.0, 0.0));
            float c = hash(i + vec2(0.0, 1.0));
            float d = hash(i + vec2(1.0, 1.0));
            return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }

        float fbm(vec2 p) {
            float val = 0.0;
            float amp = 0.5;
            for(int i = 0; i < 4; i++) {
                val += amp * noise2d(p);
                p *= 2.0;
                amp *= 0.5;
            }
            return val;
        }

        vec3 hsv2rgb(vec3 c) {
            vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
            vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
            return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
        }

        void main() {
            vec2 uv = vUv;
            float t = uTime * uSpeed;

            // Noise perturbation
            float noiseVal = 0.0;
            if(uNoise > 0.0) {
                noiseVal = fbm(uv * 5.0 + t * 0.3) * uNoise * 0.15;
            }

            float aurora = 0.0;
            for(int i = 0; i < 7; i++) {
                if(i >= uWaveCount) break;
                float fi = float(i);
                float freq = 3.0 + fi * 2.5;
                float phase = fi * 1.3;
                float wave = sin(uv.x * freq + t * (0.5 + fi * 0.2) + phase);
                wave += sin(uv.x * freq * 0.7 - t * (0.3 + fi * 0.15) + phase * 0.5);
                wave *= 0.5;

                float center = 0.5 + wave * 0.15 + noiseVal;
                float dist = abs(uv.y - center);
                float glow = exp(-dist * (8.0 + fi * 2.0));
                aurora += glow * (1.0 / float(uWaveCount));
            }

            aurora *= uIntensity;

            // Color based on position and colorShift
            float hue = uColorShift;
            vec3 green = vec3(0.1, 0.9, 0.3);
            vec3 blue = vec3(0.1, 0.3, 0.9);
            vec3 purple = vec3(0.6, 0.1, 0.8);

            float colorMix = uv.y + uColorShift;
            colorMix = fract(colorMix);

            vec3 col;
            if(colorMix < 0.33) {
                col = mix(green, blue, colorMix / 0.33);
            } else if(colorMix < 0.66) {
                col = mix(blue, purple, (colorMix - 0.33) / 0.33);
            } else {
                col = mix(purple, green, (colorMix - 0.66) / 0.34);
            }

            // Color cycling for difficulty 5
            if(uDifficulty >= 5) {
                float cycleHue = fract(uTime * 0.1 + uv.x * 0.3);
                vec3 cycleColor = hsv2rgb(vec3(cycleHue, 0.8, 1.0));
                col = mix(col, cycleColor, 0.4);
            }

            // Vertical fade - aurora should be visible in middle, fade at edges
            float vertFade = smoothstep(0.0, 0.3, uv.y) * smoothstep(1.0, 0.7, uv.y);
            aurora *= vertFade;

            vec3 finalColor = col * aurora;

            // Add subtle background glow
            float bgGlow = exp(-abs(uv.y - 0.5) * 3.0) * 0.05 * uIntensity;
            finalColor += col * bgGlow * 0.3;

            gl_FragColor = vec4(finalColor, aurora * 0.9 + bgGlow * 0.1);
        }
    `;

    const auroraMaterial = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        uniforms: {
            uTime: { value: 0.0 },
            uIntensity: { value: 1.0 },
            uSpeed: { value: 1.0 },
            uColorShift: { value: 0.0 },
            uWaveCount: { value: 3 },
            uDifficulty: { value: 1 },
            uNoise: { value: 0.0 }
        },
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false
    });

    const auroraGeometry = new THREE.PlaneGeometry(4, 2, 128, 64);
    const auroraMesh = new THREE.Mesh(auroraGeometry, auroraMaterial);
    auroraMesh.position.set(0, 0.5, 0);
    scene.add(auroraMesh);

    // Ground plane
    const groundGeometry = new THREE.PlaneGeometry(4, 4);
    const groundMaterial = new THREE.MeshBasicMaterial({ color: 0x222222 });
    const groundMesh = new THREE.Mesh(groundGeometry, groundMaterial);
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.position.y = -0.5;
    scene.add(groundMesh);

    // Stars
    const starCount = 50;
    const starGeometry = new THREE.SphereGeometry(0.005, 4, 4);
    const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const stars = [];
    for (let i = 0; i < starCount; i++) {
        const star = new THREE.Mesh(starGeometry, starMaterial);
        star.position.set(
            (Math.random() - 0.5) * 3.5,
            Math.random() * 1.5 + 0.1,
            -0.5 + Math.random() * 0.5
        );
        scene.add(star);
        stars.push(star);
    }

    // HUD elements
    const hudDifficulty = document.getElementById('hud-difficulty');
    const hudSpeed = document.getElementById('hud-speed');
    const hudIntensity = document.getElementById('hud-intensity');
    const hudWaves = document.getElementById('hud-waves');
    const hudColor = document.getElementById('hud-color');
    const hudPaused = document.getElementById('hud-paused');
    const hudPulse = document.getElementById('hud-pulse');

    // State management
    window.__3D_STATE__ = {
        difficulty: 1,
        speed: 1.0,
        intensity: 1.0,
        baseIntensity: 1.0,
        waveCount: 3,
        colorShift: 0.0,
        paused: false,
        elapsedTime: 0.0,
        pulseActive: false,
        starCount: starCount,
        frameCount: 0,
        meshExists: true,
        groundExists: true
    };

    function setDifficulty(level) {
        level = Math.max(1, Math.min(5, level));
        state.difficulty = level;
        const preset = difficultyPresets[level];
        state.waveCount = preset.waveCount;
        state.speed = preset.speed;
        state.baseIntensity = preset.intensity;
        state.noise = preset.noise;
    }

    function resetAll() {
        setDifficulty(1);
        state.colorShift = 0.0;
        state.paused = false;
        state.elapsedTime = 0.0;
        state.pulseActive = false;
        state.pulseBoost = 0.0;
        state.pulseTimer = 0.0;
    }

    // Keyboard input
    document.addEventListener('keydown', function(e) {
        const key = e.key;
        if (key >= '1' && key <= '5') {
            setDifficulty(parseInt(key));
        } else if (key === 'ArrowUp') {
            e.preventDefault();
            setDifficulty(state.difficulty + 1);
        } else if (key === 'ArrowDown') {
            e.preventDefault();
            setDifficulty(state.difficulty - 1);
        } else if (key === 'c' || key === 'C') {
            state.colorShift = parseFloat((state.colorShift + 0.2).toFixed(1));
            if (state.colorShift >= 1.0) {
                state.colorShift = 0.0;
            }
        } else if (key === ' ') {
            e.preventDefault();
            state.paused = !state.paused;
        } else if (key === 'r' || key === 'R') {
            resetAll();
        }
    });

    // Click pulse
    renderer.domElement.addEventListener('click', function() {
        state.pulseActive = true;
        state.pulseBoost = 1.0;
        state.pulseTimer = 1.0;
    });

    // Resize
    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation
    let lastTime = performance.now();

    function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const deltaTime = (now - lastTime) / 1000.0;
        lastTime = now;

        // Update time
        if (!state.paused) {
            state.elapsedTime += deltaTime * state.speed;
        }

        // Handle pulse
        if (state.pulseActive) {
            state.pulseTimer -= deltaTime;
            if (state.pulseTimer <= 0) {
                state.pulseActive = false;
                state.pulseBoost = 0.0;
                state.pulseTimer = 0.0;
            } else {
                state.pulseBoost = state.pulseTimer; // linear fade from 1.0 to 0.0
            }
        }

        // Calculate effective intensity
        const effectiveIntensity = state.baseIntensity + state.pulseBoost;

        // Update uniforms
        auroraMaterial.uniforms.uTime.value = state.elapsedTime;
        auroraMaterial.uniforms.uIntensity.value = effectiveIntensity;
        auroraMaterial.uniforms.uSpeed.value = state.speed;
        auroraMaterial.uniforms.uColorShift.value = state.colorShift;
        auroraMaterial.uniforms.uWaveCount.value = state.waveCount;
        auroraMaterial.uniforms.uDifficulty.value = state.difficulty;
        auroraMaterial.uniforms.uNoise.value = state.noise;

        // Update HUD
        hudDifficulty.textContent = state.difficulty;
        hudSpeed.textContent = state.speed.toFixed(1);
        hudIntensity.textContent = effectiveIntensity.toFixed(1);
        hudWaves.textContent = state.waveCount;
        hudColor.textContent = state.colorShift.toFixed(1);
        hudPaused.textContent = state.paused ? 'true' : 'false';
        hudPulse.textContent = state.pulseActive ? 'true' : 'false';

        // Update global state
        state.frameCount++;
        window.__3D_STATE__.difficulty = state.difficulty;
        window.__3D_STATE__.speed = state.speed;
        window.__3D_STATE__.intensity = effectiveIntensity;
        window.__3D_STATE__.baseIntensity = state.baseIntensity;
        window.__3D_STATE__.waveCount = state.waveCount;
        window.__3D_STATE__.colorShift = parseFloat(state.colorShift.toFixed(1));
        window.__3D_STATE__.paused = state.paused;
        window.__3D_STATE__.elapsedTime = state.elapsedTime;
        window.__3D_STATE__.pulseActive = state.pulseActive;
        window.__3D_STATE__.starCount = starCount;
        window.__3D_STATE__.frameCount = state.frameCount;
        window.__3D_STATE__.meshExists = scene.children.indexOf(auroraMesh) !== -1;
        window.__3D_STATE__.groundExists = scene.children.indexOf(groundMesh) !== -1;

        // Make stars twinkle subtly
        for (let i = 0; i < stars.length; i++) {
            const s = stars[i];
            const twinkle = 0.5 + 0.5 * Math.sin(state.elapsedTime * 2.0 + i * 1.7);
            s.material.opacity = twinkle;
        }

        renderer.render(scene, camera);
    }

    animate();

})();
</script>
</body>
</html>
