<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Social Network Cluster Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(68, 136, 255, 0.4);
    border-radius: 12px;
    padding: 20px;
    color: #ccd;
    font-size: 14px;
    line-height: 1.8;
    min-width: 240px;
    backdrop-filter: blur(10px);
    z-index: 10;
    transition: opacity 0.3s;
  }

  #hud h3 {
    color: #4488ff;
    margin-bottom: 10px;
    font-size: 16px;
    border-bottom: 1px solid rgba(68, 136, 255, 0.3);
    padding-bottom: 8px;
  }

  #hud .label {
    color: #889;
    font-size: 12px;
  }

  #hud .value {
    color: #eef;
    font-weight: bold;
  }

  .status-on { color: #44ff44 !important; }
  .status-off { color: #ff4444 !important; }

  #button-container {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    z-index: 10;
  }

  #button-container button {
    padding: 12px 28px;
    border: 1px solid rgba(68, 136, 255, 0.5);
    border-radius: 8px;
    background: rgba(10, 10, 40, 0.85);
    color: #ccd;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }

  #button-container button:hover {
    background: rgba(68, 136, 255, 0.3);
    border-color: #4488ff;
    color: #fff;
  }

  #button-container button:active {
    transform: scale(0.95);
  }

  #instructions {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    color: #556;
    font-size: 12px;
    text-align: center;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>📊 Network Status</h3>
  <div><span class="label">Nodes: </span><span class="value" id="hud-node-count">29</span></div>
  <div><span class="label">Edges: </span><span class="value" id="hud-edge-count">28</span></div>
  <div><span class="label">Selected Cluster: </span><span class="value" id="hud-selected-cluster">None</span></div>
  <div><span class="label">Force Simulation: </span><span class="value status-off" id="hud-force-status">OFF</span></div>
</div>

<div id="instructions">
  [F] Toggle Force &nbsp;|&nbsp; [R] Reset Camera &nbsp;|&nbsp; [H] Toggle HUD &nbsp;|&nbsp; Click cluster centers to select
</div>

<div id="button-container">
  <button id="btn-add-node">➕ Add Node</button>
  <button id="btn-remove-node">➖ Remove Node</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
  totalNodes: 29,
  totalEdges: 28,
  selectedCluster: -1,
  forceSimActive: false,
  hubModelLoaded: false,
  clusterCounts: [6, 6, 6, 6],
  cameraPosition: { x: 0, y: 30, z: 60 },
  hudVisible: true,
  hubPosition: { x: 0, y: 0, z: 0 }
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 30, 60);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(20, 40, 30);
scene.add(dirLight);

// --- Grid ---
const gridHelper = new THREE.GridHelper(100, 20, 0x222244, 0x222244);
gridHelper.position.y = 0;
scene.add(gridHelper);

// --- Hub Model ---
let hubModel = null;
const hubPosition = new THREE.Vector3(0, 0, 0);

const loader = new GLTFLoader();
loader.load(
  'PrimaryIonDrive.glb',
  (gltf) => {
    hubModel = gltf.scene;
    hubModel.position.copy(hubPosition);
    hubModel.scale.set(2, 2, 2);
    scene.add(hubModel);
    state.hubModelLoaded = true;
    state.hubPosition = { x: hubPosition.x, y: hubPosition.y, z: hubPosition.z };

    // Draw center-to-hub edges now
    drawCenterToHubEdges();
  },
  undefined,
  (error) => {
    console.warn('GLB load failed, creating placeholder hub:', error);
    // Create a placeholder
    const geo = new THREE.IcosahedronGeometry(2, 2);
    const mat = new THREE.MeshStandardMaterial({ color: 0xaabbff, emissive: 0x223355, metalness: 0.7, roughness: 0.3 });
    hubModel = new THREE.Mesh(geo, mat);
    hubModel.position.copy(hubPosition);
    scene.add(hubModel);
    state.hubModelLoaded = true;
    state.hubPosition = { x: hubPosition.x, y: hubPosition.y, z: hubPosition.z };
    drawCenterToHubEdges();
  }
);

// --- Cluster Data ---
const clusterColors = [0xff4444, 0x44ff44, 0x4488ff, 0xffcc44];
const clusterCenterPositions = [
  new THREE.Vector3(15, 0, 0),
  new THREE.Vector3(-15, 0, 0),
  new THREE.Vector3(0, 0, 15),
  new THREE.Vector3(0, 0, -15)
];

const clusters = []; // { centerMesh, peripheralNodes: [{mesh, edge, basePosition}], centerToHubEdge, color }

// --- Create Clusters ---
for (let c = 0; c < 4; c++) {
  const color = clusterColors[c];
  const centerPos = clusterCenterPositions[c];

  // Cluster center node
  const centerGeo = new THREE.SphereGeometry(1.2, 32, 32);
  const centerMat = new THREE.MeshStandardMaterial({
    color: color,
    emissive: new THREE.Color(color).multiplyScalar(0.3),
    metalness: 0.4,
    roughness: 0.5,
    transparent: true,
    opacity: 1.0
  });
  const centerMesh = new THREE.Mesh(centerGeo, centerMat);
  centerMesh.position.copy(centerPos);
  centerMesh.userData = { type: 'clusterCenter', clusterIndex: c };
  scene.add(centerMesh);

  const cluster = {
    centerMesh,
    peripheralNodes: [],
    centerToHubEdge: null,
    color
  };

  // Peripheral nodes
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2;
    const px = centerPos.x + Math.cos(angle) * 6;
    const pz = centerPos.z + Math.sin(angle) * 6;
    const basePosition = new THREE.Vector3(px, 0, pz);

    const pGeo = new THREE.SphereGeometry(0.5, 24, 24);
    const pMat = new THREE.MeshStandardMaterial({
      color: color,
      emissive: new THREE.Color(color).multiplyScalar(0.2),
      metalness: 0.3,
      roughness: 0.6,
      transparent: true,
      opacity: 1.0
    });
    const pMesh = new THREE.Mesh(pGeo, pMat);
    pMesh.position.copy(basePosition);
    pMesh.userData = { type: 'peripheral', clusterIndex: c };
    scene.add(pMesh);

    // Edge from peripheral to center
    const edgeGeo = new THREE.BufferGeometry().setFromPoints([basePosition, centerPos]);
    const edgeMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.6 });
    const edge = new THREE.Line(edgeGeo, edgeMat);
    scene.add(edge);

    cluster.peripheralNodes.push({ mesh: pMesh, edge, basePosition: basePosition.clone() });
  }

  clusters.push(cluster);
}

// --- Center-to-Hub Edges ---
const centerToHubEdges = [];

function drawCenterToHubEdges() {
  // Remove old ones if any
  centerToHubEdges.forEach(e => scene.remove(e));
  centerToHubEdges.length = 0;

  for (let c = 0; c < 4; c++) {
    const centerPos = clusters[c].centerMesh.position;
    const edgeGeo = new THREE.BufferGeometry().setFromPoints([centerPos.clone(), hubPosition.clone()]);
    const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
    const edge = new THREE.Line(edgeGeo, edgeMat);
    scene.add(edge);
    clusters[c].centerToHubEdge = edge;
    centerToHubEdges.push(edge);
  }
}

// --- Raycaster for clicking ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const centerMeshes = clusters.map(c => c.centerMesh);
  const intersects = raycaster.intersectObjects(centerMeshes);

  if (intersects.length > 0) {
    const clickedCluster = intersects[0].object.userData.clusterIndex;

    if (state.selectedCluster === clickedCluster) {
      // Deselect
      state.selectedCluster = -1;
      restoreAllClusters();
    } else {
      state.selectedCluster = clickedCluster;
      highlightCluster(clickedCluster);
    }
  }
}

function highlightCluster(index) {
  for (let c = 0; c < 4; c++) {
    const cluster = clusters[c];
    if (c === index) {
      // Selected cluster: scale peripheral nodes up
      cluster.centerMesh.material.opacity = 1.0;
      cluster.peripheralNodes.forEach(pn => {
        pn.mesh.scale.set(1.5, 1.5, 1.5);
        pn.mesh.material.opacity = 1.0;
        pn.edge.material.opacity = 0.8;
      });
      if (cluster.centerToHubEdge) cluster.centerToHubEdge.material.opacity = 0.6;
    } else {
      // Non-selected: semi-transparent
      cluster.centerMesh.material.opacity = 0.3;
      cluster.peripheralNodes.forEach(pn => {
        pn.mesh.scale.set(1, 1, 1);
        pn.mesh.material.opacity = 0.3;
        pn.edge.material.opacity = 0.15;
      });
      if (cluster.centerToHubEdge) cluster.centerToHubEdge.material.opacity = 0.15;
    }
  }
}

function restoreAllClusters() {
  for (let c = 0; c < 4; c++) {
    const cluster = clusters[c];
    cluster.centerMesh.material.opacity = 1.0;
    cluster.peripheralNodes.forEach(pn => {
      pn.mesh.scale.set(1, 1, 1);
      pn.mesh.material.opacity = 1.0;
      pn.edge.material.opacity = 0.6;
    });
    if (cluster.centerToHubEdge) cluster.centerToHubEdge.material.opacity = 0.4;
  }
}

renderer.domElement.addEventListener('click', onMouseClick);

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === 'f') {
    state.forceSimActive = !state.forceSimActive;
  } else if (key === 'r') {
    camera.position.set(0, 30, 60);
    controls.target.set(0, 0, 0);
    controls.update();
  } else if (key === 'h') {
    state.hudVisible = !state.hudVisible;
    document.getElementById('hud').style.opacity = state.hudVisible ? '1' : '0';
    document.getElementById('hud').style.pointerEvents = state.hudVisible ? 'auto' : 'none';
  }
});

// --- Add/Remove Node Buttons ---
document.getElementById('btn-add-node').addEventListener('click', () => {
  if (state.selectedCluster < 0 || state.selectedCluster > 3) return;

  const c = state.selectedCluster;
  const cluster = clusters[c];
  const centerPos = cluster.centerMesh.position;
  const color = cluster.color;

  // Random position near cluster center
  const angle = Math.random() * Math.PI * 2;
  const dist = 4 + Math.random() * 4;
  const px = centerPos.x + Math.cos(angle) * dist;
  const pz = centerPos.z + Math.sin(angle) * dist;
  const basePosition = new THREE.Vector3(px, 0, pz);

  const pGeo = new THREE.SphereGeometry(0.5, 24, 24);
  const pMat = new THREE.MeshStandardMaterial({
    color: color,
    emissive: new THREE.Color(color).multiplyScalar(0.2),
    metalness: 0.3,
    roughness: 0.6,
    transparent: true,
    opacity: 1.0
  });
  const pMesh = new THREE.Mesh(pGeo, pMat);
  pMesh.position.copy(basePosition);
  pMesh.userData = { type: 'peripheral', clusterIndex: c };

  // If cluster is selected, scale up
  if (state.selectedCluster === c) {
    pMesh.scale.set(1.5, 1.5, 1.5);
  }

  scene.add(pMesh);

  const edgeGeo = new THREE.BufferGeometry().setFromPoints([basePosition, centerPos.clone()]);
  const edgeMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.6 });
  const edge = new THREE.Line(edgeGeo, edgeMat);
  scene.add(edge);

  cluster.peripheralNodes.push({ mesh: pMesh, edge, basePosition: basePosition.clone() });

  state.clusterCounts[c]++;
  state.totalNodes++;
  state.totalEdges++;

  // Re-apply highlight if selected
  if (state.selectedCluster >= 0) {
    highlightCluster(state.selectedCluster);
  }
});

document.getElementById('btn-remove-node').addEventListener('click', () => {
  if (state.selectedCluster < 0 || state.selectedCluster > 3) return;

  const c = state.selectedCluster;
  const cluster = clusters[c];

  if (cluster.peripheralNodes.length === 0) return;

  const removed = cluster.peripheralNodes.pop();
  scene.remove(removed.mesh);
  scene.remove(removed.edge);
  removed.mesh.geometry.dispose();
  removed.mesh.material.dispose();
  removed.edge.geometry.dispose();
  removed.edge.material.dispose();

  state.clusterCounts[c]--;
  state.totalNodes--;
  state.totalEdges--;
});

// --- HUD Update ---
function updateHUD() {
  document.getElementById('hud-node-count').textContent = state.totalNodes;
  document.getElementById('hud-edge-count').textContent = state.totalEdges;
  document.getElementById('hud-selected-cluster').textContent = state.selectedCluster >= 0 ? state.selectedCluster : 'None';

  const forceEl = document.getElementById('hud-force-status');
  forceEl.textContent = state.forceSimActive ? 'ON' : 'OFF';
  forceEl.className = 'value ' + (state.forceSimActive ? 'status-on' : 'status-off');
}

// --- Animation ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();

  // Force simulation: oscillate peripheral nodes
  if (state.forceSimActive) {
    for (let c = 0; c < 4; c++) {
      const cluster = clusters[c];
      const centerPos = cluster.centerMesh.position;

      cluster.peripheralNodes.forEach((pn, i) => {
        const phase = i * 1.3 + c * 2.1;
        const dx = Math.sin(elapsed * 1.2 + phase) * 1.0;
        const dz = Math.cos(elapsed * 0.9 + phase * 0.7) * 1.0;

        pn.mesh.position.x = pn.basePosition.x + dx;
        pn.mesh.position.z = pn.basePosition.z + dz;

        // Update edge
        const positions = pn.edge.geometry.attributes.position.array;
        positions[0] = pn.mesh.position.x;
        positions[1] = pn.mesh.position.y;
        positions[2] = pn.mesh.position.z;
        positions[3] = centerPos.x;
        positions[4] = centerPos.y;
        positions[5] = centerPos.z;
        pn.edge.geometry.attributes.position.needsUpdate = true;
      });
    }
  }

  // Rotate hub model gently
  if (hubModel) {
    hubModel.rotation.y += 0.005;
  }

  // Update state
  state.cameraPosition = {
    x: parseFloat(camera.position.x.toFixed(2)),
    y: parseFloat(camera.position.y.toFixed(2)),
    z: parseFloat(camera.position.z.toFixed(2))
  };

  controls.update();
  updateHUD();
  renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
