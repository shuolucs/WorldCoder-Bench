<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Social Network Cluster Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid #334466;
            padding: 15px;
            border-radius: 8px;
            color: #e0e0e0;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #hud h3 {
            margin: 0 0 10px 0;
            color: #ffffff;
            font-size: 16px;
            border-bottom: 1px solid #334466;
            padding-bottom: 5px;
        }
        .hud-row {
            margin-bottom: 5px;
            font-size: 14px;
        }
        .hud-label {
            font-weight: bold;
            color: #88aaff;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }
        button {
            background: #223355;
            color: white;
            border: 1px solid #446699;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #334477;
        }
        button:active {
            transform: scale(0.95);
        }
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid #334466;
            padding: 15px;
            border-radius: 8px;
            color: #aaa;
            font-size: 12px;
            pointer-events: none;
            text-align: right;
        }
        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            color: #fff;
            font-family: monospace;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h3>Network Stats</h3>
        <div class="hud-row"><span class="hud-label">Nodes:</span> <span id="hud-node-count">29</span></div>
        <div class="hud-row"><span class="hud-label">Edges:</span> <span id="hud-edge-count">28</span></div>
        <div class="hud-row"><span class="hud-label">Selected Cluster:</span> <span id="hud-selected-cluster">None</span></div>
        <div class="hud-row"><span class="hud-label">Force Sim:</span> <span id="hud-force-status">OFF</span></div>
    </div>

    <div id="instructions">
        <div class="hud-row">Click Center Node to Select</div>
        <div class="hud-row"><span class="key">F</span> Toggle Force Sim</div>
        <div class="hud-row"><span class="key">R</span> Reset Camera</div>
        <div class="hud-row"><span class="key">H</span> Toggle HUD</div>
    </div>

    <div id="controls">
        <button id="btn-add-node">Add Node</button>
        <button id="btn-remove-node">Remove Node</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            totalNodes: 29,
            totalEdges: 28,
            selectedCluster: -1,
            forceSimActive: false,
            hubModelLoaded: false,
            clusterCounts: [6, 6, 6, 6],
            cameraPosition: { x: 0, y: 30, z: 60 },
            hudVisible: true,
            hubPosition: { x: 0, y: 0, z: 0 }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 60);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(20, 40, 30);
        scene.add(directionalLight);

        // Grid
        const gridHelper = new THREE.GridHelper(100, 20, 0x222244, 0x222244);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // --- Data Structures ---
        const clusterColors = [0xff4444, 0x44ff44, 0x4488ff, 0xffcc44];
        const clusterCentersPos = [
            new THREE.Vector3(15, 0, 0),
            new THREE.Vector3(-15, 0, 0),
            new THREE.Vector3(0, 0, 15),
            new THREE.Vector3(0, 0, -15)
        ];
        
        const clusters = [];
        const centerMeshes = []; // For raycasting
        let hubModel = null;

        // Geometries
        const centerGeo = new THREE.SphereGeometry(1.2, 32, 32);
        const periGeo = new THREE.SphereGeometry(0.5, 16, 16);

        // --- Asset Loading ---
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/PrimaryIonDrive.glb',
            (gltf) => {
                hubModel = gltf.scene;
                hubModel.scale.set(2, 2, 2);
                hubModel.position.set(0, 0, 0);
                scene.add(hubModel);
                window.__3D_STATE__.hubModelLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading GLB:', error)
        );

        // --- Graph Generation ---
        function createGraph() {
            for (let i = 0; i < 4; i++) {
                const color = clusterColors[i];
                const centerPos = clusterCentersPos[i];

                // Center Node
                const centerMat = new THREE.MeshStandardMaterial({ 
                    color: color, 
                    transparent: true, 
                    opacity: 1.0,
                    roughness: 0.4,
                    metalness: 0.3
                });
                const centerMesh = new THREE.Mesh(centerGeo, centerMat);
                centerMesh.position.copy(centerPos);
                centerMesh.userData = { isCenter: true, clusterIndex: i };
                scene.add(centerMesh);
                centerMeshes.push(centerMesh);

                // Edge to Hub
                const hubEdgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1.0 });
                const hubEdgeGeo = new THREE.BufferGeometry().setFromPoints([centerPos, new THREE.Vector3(0, 0, 0)]);
                const hubEdge = new THREE.Line(hubEdgeGeo, hubEdgeMat);
                scene.add(hubEdge);

                const clusterData = {
                    centerMesh,
                    hubEdge,
                    peripheralNodes: [],
                    color,
                    index: i
                };

                // Peripheral Nodes
                for (let j = 0; j < 6; j++) {
                    const angle = (j / 6) * Math.PI * 2;
                    addNodeToCluster(clusterData, angle);
                }
                clusters.push(clusterData);
            }
        }

        function addNodeToCluster(clusterData, angle) {
            const centerPos = clusterCentersPos[clusterData.index];
            const radius = 6;
            const x = centerPos.x + Math.cos(angle) * radius;
            const z = centerPos.z + Math.sin(angle) * radius;
            const basePos = new THREE.Vector3(x, 0, z);

            const mat = new THREE.MeshStandardMaterial({ 
                color: clusterData.color, 
                transparent: true, 
                opacity: 1.0,
                roughness: 0.6,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(periGeo, mat);
            mesh.position.copy(basePos);
            scene.add(mesh);

            const edgeMat = new THREE.LineBasicMaterial({ color: clusterData.color, transparent: true, opacity: 1.0 });
            const edgeGeo = new THREE.BufferGeometry().setFromPoints([basePos, centerPos]);
            const edge = new THREE.Line(edgeGeo, edgeMat);
            scene.add(edge);

            clusterData.peripheralNodes.push({
                mesh,
                edge,
                basePos,
                phaseX: Math.random() * Math.PI * 2,
                phaseY: Math.random() * Math.PI * 2,
                phaseZ: Math.random() * Math.PI * 2
            });
        }

        createGraph();

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateHighlightState() {
            const sel = window.__3D_STATE__.selectedCluster;
            
            clusters.forEach((c, i) => {
                const isSelected = (sel === i);
                const isNoneSelected = (sel === -1);
                const opacity = (isSelected || isNoneSelected) ? 1.0 : 0.3;
                const scale = isSelected ? 1.5 : 1.0;

                c.centerMesh.material.opacity = opacity;
                c.hubEdge.material.opacity = opacity;

                c.peripheralNodes.forEach(p => {
                    p.mesh.material.opacity = opacity;
                    p.edge.material.opacity = opacity;
                    
                    // Animate scale smoothly in render loop, but set target here
                    p.targetScale = scale;
                });
            });
        }

        window.addEventListener('click', (event) => {
            if (event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(centerMeshes);

            if (intersects.length > 0) {
                const clickedIndex = intersects[0].object.userData.clusterIndex;
                if (window.__3D_STATE__.selectedCluster === clickedIndex) {
                    window.__3D_STATE__.selectedCluster = -1; // Deselect
                } else {
                    window.__3D_STATE__.selectedCluster = clickedIndex; // Select
                }
                updateHighlightState();
            }
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'f') {
                window.__3D_STATE__.forceSimActive = !window.__3D_STATE__.forceSimActive;
            } else if (key === 'r') {
                camera.position.set(0, 30, 60);
                camera.lookAt(0, 0, 0);
                controls.target.set(0, 0, 0);
            } else if (key === 'h') {
                window.__3D_STATE__.hudVisible = !window.__3D_STATE__.hudVisible;
                document.getElementById('hud').style.display = window.__3D_STATE__.hudVisible ? 'block' : 'none';
                document.getElementById('instructions').style.display = window.__3D_STATE__.hudVisible ? 'block' : 'none';
            }
        });

        document.getElementById('btn-add-node').addEventListener('click', () => {
            const sel = window.__3D_STATE__.selectedCluster;
            if (sel !== -1) {
                const angle = Math.random() * Math.PI * 2;
                addNodeToCluster(clusters[sel], angle);
                
                window.__3D_STATE__.totalNodes++;
                window.__3D_STATE__.totalEdges++;
                window.__3D_STATE__.clusterCounts[sel]++;
                
                // Apply current highlight state to new node
                updateHighlightState();
            }
        });

        document.getElementById('btn-remove-node').addEventListener('click', () => {
            const sel = window.__3D_STATE__.selectedCluster;
            if (sel !== -1 && clusters[sel].peripheralNodes.length > 0) {
                const nodeData = clusters[sel].peripheralNodes.pop();
                
                scene.remove(nodeData.mesh);
                scene.remove(nodeData.edge);
                nodeData.mesh.geometry.dispose();
                nodeData.mesh.material.dispose();
                nodeData.edge.geometry.dispose();
                nodeData.edge.material.dispose();

                window.__3D_STATE__.totalNodes--;
                window.__3D_STATE__.totalEdges--;
                window.__3D_STATE__.clusterCounts[sel]--;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize highlight state targets
        clusters.forEach(c => c.peripheralNodes.forEach(p => p.targetScale = 1.0));

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            controls.update();

            // Update Nodes (Force Sim & Scaling)
            clusters.forEach(c => {
                c.peripheralNodes.forEach(p => {
                    // Smooth scaling
                    if (p.targetScale !== undefined) {
                        p.mesh.scale.lerp(new THREE.Vector3(p.targetScale, p.targetScale, p.targetScale), 0.1);
                    }

                    // Force Simulation
                    if (window.__3D_STATE__.forceSimActive) {
                        p.mesh.position.x = p.basePos.x + Math.sin(time * 2.0 + p.phaseX) * 1.0;
                        p.mesh.position.y = p.basePos.y + Math.sin(time * 1.5 + p.phaseY) * 1.0;
                        p.mesh.position.z = p.basePos.z + Math.sin(time * 2.2 + p.phaseZ) * 1.0;
                    } else {
                        p.mesh.position.lerp(p.basePos, 0.1);
                    }

                    // Update Edge Geometry
                    const positions = p.edge.geometry.attributes.position.array;
                    positions[0] = p.mesh.position.x;
                    positions[1] = p.mesh.position.y;
                    positions[2] = p.mesh.position.z;
                    p.edge.geometry.attributes.position.needsUpdate = true;
                });
            });

            // Update State Object
            window.__3D_STATE__.cameraPosition.x = camera.position.x;
            window.__3D_STATE__.cameraPosition.y = camera.position.y;
            window.__3D_STATE__.cameraPosition.z = camera.position.z;

            // Update HUD DOM
            if (window.__3D_STATE__.hudVisible) {
                document.getElementById('hud-node-count').innerText = window.__3D_STATE__.totalNodes;
                document.getElementById('hud-edge-count').innerText = window.__3D_STATE__.totalEdges;
                document.getElementById('hud-selected-cluster').innerText = window.__3D_STATE__.selectedCluster === -1 ? 'None' : window.__3D_STATE__.selectedCluster;
                document.getElementById('hud-force-status').innerText = window.__3D_STATE__.forceSimActive ? 'ON' : 'OFF';
                document.getElementById('hud-force-status').style.color = window.__3D_STATE__.forceSimActive ? '#44ff44' : '#ff4444';
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
