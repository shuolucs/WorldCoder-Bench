<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Social Network Cluster Visualization</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(10, 14, 30, 0.8);
      border: 1px solid rgba(120, 160, 255, 0.25);
      border-radius: 8px;
      z-index: 10;
      min-width: 220px;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.35);
    }

    #hud h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #bcd3ff;
      letter-spacing: 0.4px;
    }

    #hud .row {
      font-size: 13px;
      line-height: 1.7;
    }

    #controls {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    button {
      padding: 10px 16px;
      border: 1px solid rgba(120, 160, 255, 0.35);
      border-radius: 8px;
      background: rgba(18, 24, 48, 0.88);
      color: #ffffff;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    button:hover {
      background: rgba(36, 50, 90, 0.95);
      border-color: rgba(160, 200, 255, 0.55);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    #hint {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      font-size: 12px;
      color: rgba(220, 230, 255, 0.85);
      background: rgba(10, 14, 30, 0.65);
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(120, 160, 255, 0.2);
      line-height: 1.6;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <h3>Network HUD</h3>
      <div class="row">Total Nodes: <span id="hud-node-count">29</span></div>
      <div class="row">Total Edges: <span id="hud-edge-count">28</span></div>
      <div class="row">Selected Cluster: <span id="hud-selected-cluster">None</span></div>
      <div class="row">Force Simulation: <span id="hud-force-status">OFF</span></div>
    </div>

    <div id="hint">
      Click cluster center to select/deselect<br />
      F = Toggle force simulation<br />
      R = Reset camera<br />
      H = Toggle HUD
    </div>

    <div id="controls">
      <button id="btn-add-node">Add Node</button>
      <button id="btn-remove-node">Remove Node</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 30, 60);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('app').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(20, 40, 30);
    scene.add(directionalLight);

    const grid = new THREE.GridHelper(100, 20, 0x222244, 0x222244);
    grid.position.y = 0;
    grid.material.transparent = true;
    grid.material.opacity = 0.35;
    scene.add(grid);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const hud = document.getElementById('hud');
    const hudNodeCount = document.getElementById('hud-node-count');
    const hudEdgeCount = document.getElementById('hud-edge-count');
    const hudSelectedCluster = document.getElementById('hud-selected-cluster');
    const hudForceStatus = document.getElementById('hud-force-status');
    const btnAddNode = document.getElementById('btn-add-node');
    const btnRemoveNode = document.getElementById('btn-remove-node');

    const INITIAL_CAMERA_POS = new THREE.Vector3(0, 30, 60);
    const HUB_POS = new THREE.Vector3(0, 0, 0);

    let selectedCluster = -1;
    let forceSimActive = false;
    let hudVisible = true;
    let hubModelLoaded = false;
    let hubModel = null;

    const hubFallback = new THREE.Mesh(
      new THREE.SphereGeometry(1.1, 24, 24),
      new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0x223344,
        metalness: 0.2,
        roughness: 0.5,
        transparent: true,
        opacity: 0.12
      })
    );
    hubFallback.position.copy(HUB_POS);
    scene.add(hubFallback);

    const clusterColors = [0xff4444, 0x44ff44, 0x4488ff, 0xffcc44];
    const clusterCenterPositions = [
      new THREE.Vector3(15, 0, 0),
      new THREE.Vector3(-15, 0, 0),
      new THREE.Vector3(0, 0, 15),
      new THREE.Vector3(0, 0, -15)
    ];

    const clusters = [];

    function createSphere(radius, color, transparent = true, opacity = 1) {
      const geometry = new THREE.SphereGeometry(radius, 24, 24);
      const material = new THREE.MeshStandardMaterial({
        color,
        transparent,
        opacity,
        metalness: 0.15,
        roughness: 0.55
      });
      const mesh = new THREE.Mesh(geometry, material);
      return mesh;
    }

    function createLine(start, end, color) {
      const geometry = new THREE.BufferGeometry().setFromPoints([start.clone(), end.clone()]);
      const material = new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity: 1
      });
      const line = new THREE.Line(geometry, material);
      scene.add(line);
      return line;
    }

    function updateLine(line, start, end) {
      const pos = line.geometry.attributes.position.array;
      pos[0] = start.x; pos[1] = start.y; pos[2] = start.z;
      pos[3] = end.x;   pos[4] = end.y;   pos[5] = end.z;
      line.geometry.attributes.position.needsUpdate = true;
      line.geometry.computeBoundingSphere();
    }

    function generateClusters() {
      for (let i = 0; i < 4; i++) {
        const color = clusterColors[i];
        const centerPos = clusterCenterPositions[i].clone();

        const centerMesh = createSphere(1.2, color, true, 1);
        centerMesh.position.copy(centerPos);
        centerMesh.userData = { type: 'clusterCenter', clusterIndex: i };
        scene.add(centerMesh);

        const centerToHubLine = createLine(centerPos, HUB_POS, 0xffffff);

        const cluster = {
          index: i,
          color,
          center: centerMesh,
          centerBasePosition: centerPos.clone(),
          centerToHubLine,
          peripherals: []
        };

        for (let j = 0; j < 6; j++) {
          const angle = (j / 6) * Math.PI * 2;
          const basePos = new THREE.Vector3(
            centerPos.x + Math.cos(angle) * 6,
            0,
            centerPos.z + Math.sin(angle) * 6
          );

          const nodeMesh = createSphere(0.5, color, true, 1);
          nodeMesh.position.copy(basePos);
          scene.add(nodeMesh);

          const edge = createLine(nodeMesh.position, centerMesh.position, color);

          cluster.peripherals.push({
            mesh: nodeMesh,
            basePosition: basePos.clone(),
            angle,
            phase: Math.random() * Math.PI * 2,
            radialOffset: Math.random() * Math.PI * 2,
            edge,
            added: false
          });
        }

        clusters.push(cluster);
      }
    }

    generateClusters();

    const loader = new GLTFLoader();
    loader.load(
      'PrimaryIonDrive.glb',
      (gltf) => {
        hubModel = gltf.scene;
        hubModel.position.set(0, 0, 0);
        hubModel.scale.set(2, 2, 2);
        scene.add(hubModel);
        hubModelLoaded = true;
      },
      undefined,
      (error) => {
        console.warn('Failed to load PrimaryIonDrive.glb:', error);
      }
    );

    function getHubPosition() {
      if (hubModel) return hubModel.position;
      return hubFallback.position;
    }

    function getTotalPeripheralCount() {
      return clusters.reduce((sum, c) => sum + c.peripherals.length, 0);
    }

    function getTotalNodes() {
      return 1 + 4 + getTotalPeripheralCount();
    }

    function getTotalEdges() {
      return getTotalPeripheralCount() + 4;
    }

    function updateHUD() {
      hudNodeCount.textContent = String(getTotalNodes());
      hudEdgeCount.textContent = String(getTotalEdges());
      hudSelectedCluster.textContent = selectedCluster === -1 ? 'None' : String(selectedCluster);
      hudForceStatus.textContent = forceSimActive ? 'ON' : 'OFF';
    }

    function applyClusterSelectionVisuals() {
      for (const cluster of clusters) {
        const isSelected = selectedCluster === cluster.index;
        const hasSelection = selectedCluster !== -1;

        const centerOpacity = !hasSelection || isSelected ? 1 : 0.3;
        cluster.center.material.opacity = centerOpacity;
        cluster.center.material.transparent = true;

        cluster.centerToHubLine.material.opacity = !hasSelection || isSelected ? 1 : 0.3;

        for (const p of cluster.peripherals) {
          p.mesh.scale.setScalar(isSelected ? 1.5 : 1.0);
          p.mesh.material.opacity = !hasSelection || isSelected ? 1 : 0.3;
          p.mesh.material.transparent = true;
          p.edge.material.opacity = !hasSelection || isSelected ? 1 : 0.3;
        }
      }
    }

    function addPeripheralNodeToSelectedCluster() {
      if (selectedCluster === -1) return;

      const cluster = clusters[selectedCluster];
      const centerPos = cluster.center.position.clone();

      const randomAngle = Math.random() * Math.PI * 2;
      const randomRadius = 3 + Math.random() * 3;
      const basePos = new THREE.Vector3(
        centerPos.x + Math.cos(randomAngle) * randomRadius,
        0,
        centerPos.z + Math.sin(randomAngle) * randomRadius
      );

      const nodeMesh = createSphere(0.5, cluster.color, true, 1);
      nodeMesh.position.copy(basePos);
      scene.add(nodeMesh);

      const edge = createLine(nodeMesh.position, cluster.center.position, cluster.color);

      cluster.peripherals.push({
        mesh: nodeMesh,
        basePosition: basePos.clone(),
        angle: randomAngle,
        phase: Math.random() * Math.PI * 2,
        radialOffset: Math.random() * Math.PI * 2,
        edge,
        added: true
      });

      applyClusterSelectionVisuals();
      updateHUD();
    }

    function removePeripheralNodeFromSelectedCluster() {
      if (selectedCluster === -1) return;

      const cluster = clusters[selectedCluster];
      if (cluster.peripherals.length <= 0) return;

      const removed = cluster.peripherals.pop();
      scene.remove(removed.mesh);
      removed.mesh.geometry.dispose();
      removed.mesh.material.dispose();

      scene.remove(removed.edge);
      removed.edge.geometry.dispose();
      removed.edge.material.dispose();

      applyClusterSelectionVisuals();
      updateHUD();
    }

    btnAddNode.addEventListener('click', addPeripheralNodeToSelectedCluster);
    btnRemoveNode.addEventListener('click', removePeripheralNodeFromSelectedCluster);

    window.addEventListener('click', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const centerMeshes = clusters.map(c => c.center);
      const intersects = raycaster.intersectObjects(centerMeshes, false);

      if (intersects.length > 0) {
        const obj = intersects[0].object;
        const idx = obj.userData.clusterIndex;
        selectedCluster = selectedCluster === idx ? -1 : idx;
        applyClusterSelectionVisuals();
        updateHUD();
      }
    });

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();

      if (key === 'f') {
        forceSimActive = !forceSimActive;
        updateHUD();
      } else if (key === 'r') {
        camera.position.copy(INITIAL_CAMERA_POS);
        controls.target.set(0, 0, 0);
        camera.lookAt(0, 0, 0);
        controls.update();
      } else if (key === 'h') {
        hudVisible = !hudVisible;
        hud.style.display = hudVisible ? 'block' : 'none';
      }
    });

    function updateForceSimulation(elapsed) {
      for (const cluster of clusters) {
        for (let i = 0; i < cluster.peripherals.length; i++) {
          const p = cluster.peripherals[i];

          if (forceSimActive) {
            const dx = Math.cos(elapsed * 1.2 + p.phase) * 0.7;
            const dz = Math.sin(elapsed * 1.5 + p.radialOffset) * 0.7;
            const dy = Math.sin(elapsed * 1.1 + p.phase) * 0.15;
            p.mesh.position.set(
              p.basePosition.x + dx,
              p.basePosition.y + dy,
              p.basePosition.z + dz
            );
          } else {
            p.mesh.position.lerp(p.basePosition, 0.12);
          }

          updateLine(p.edge, p.mesh.position, cluster.center.position);
        }

        updateLine(cluster.centerToHubLine, cluster.center.position, getHubPosition());
      }
    }

    window.__3D_STATE__ = {
      totalNodes: 29,
      totalEdges: 28,
      selectedCluster: -1,
      forceSimActive: false,
      hubModelLoaded: false,
      clusterCounts: [6, 6, 6, 6],
      cameraPosition: { x: 0, y: 30, z: 60 },
      hudVisible: true,
      hubPosition: { x: 0, y: 0, z: 0 }
    };

    function updateState() {
      const hubPos = getHubPosition();
      window.__3D_STATE__.totalNodes = getTotalNodes();
      window.__3D_STATE__.totalEdges = getTotalEdges();
      window.__3D_STATE__.selectedCluster = selectedCluster;
      window.__3D_STATE__.forceSimActive = forceSimActive;
      window.__3D_STATE__.hubModelLoaded = hubModelLoaded;
      window.__3D_STATE__.clusterCounts = clusters.map(c => c.peripherals.length);
      window.__3D_STATE__.cameraPosition = {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      };
      window.__3D_STATE__.hudVisible = hudVisible;
      window.__3D_STATE__.hubPosition = {
        x: hubPos.x,
        y: hubPos.y,
        z: hubPos.z
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      updateForceSimulation(elapsed);

      controls.update();
      updateHUD();
      updateState();

      renderer.render(scene, camera);
    }

    applyClusterSelectionVisuals();
    updateHUD();
    updateState();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
