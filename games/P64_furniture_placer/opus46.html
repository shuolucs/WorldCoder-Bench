<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交互式房间家具摆放系统</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#ui-overlay {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
  width: 100%;
  height: 100%;
}

#catalog {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(20, 20, 40, 0.92);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 16px;
  pointer-events: auto;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  min-width: 180px;
}

#catalog h3 {
  color: #fff;
  font-size: 15px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  text-align: center;
  letter-spacing: 1px;
}

.catalog-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  margin: 4px 0;
  border-radius: 8px;
  cursor: pointer;
  color: #ccc;
  font-size: 13px;
  transition: all 0.2s;
  border: 1px solid transparent;
}

.catalog-item:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border-color: rgba(255,255,255,0.2);
}

.catalog-item.active {
  background: rgba(100, 140, 255, 0.3);
  color: #fff;
  border-color: rgba(100, 140, 255, 0.5);
}

.catalog-icon {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

#controls-panel {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(20, 20, 40, 0.92);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 16px;
  pointer-events: auto;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  min-width: 200px;
}

#controls-panel h3 {
  color: #fff;
  font-size: 15px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  text-align: center;
}

.control-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 8px 0;
  color: #ccc;
  font-size: 13px;
}

.control-row label {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}

#snapToggle {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: #648cff;
}

.btn {
  padding: 8px 16px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  color: #ccc;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
  width: 100%;
  margin: 4px 0;
}

.btn:hover {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border-color: rgba(255,255,255,0.3);
}

#saveBtn { border-color: rgba(100, 200, 100, 0.4); }
#saveBtn:hover { background: rgba(100, 200, 100, 0.2); }
#loadBtn { border-color: rgba(100, 140, 255, 0.4); }
#loadBtn:hover { background: rgba(100, 140, 255, 0.2); }

#status-bar {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20, 20, 40, 0.9);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 10px 24px;
  pointer-events: none;
  color: #aaa;
  font-size: 12px;
  backdrop-filter: blur(10px);
  text-align: center;
  white-space: nowrap;
}

#status-bar span { color: #fff; font-weight: 600; }

.shortcuts {
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.1);
  font-size: 11px;
  color: #888;
  line-height: 1.8;
}

.shortcuts kbd {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 3px;
  padding: 1px 5px;
  font-family: monospace;
  color: #ccc;
}

#toast {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(20, 20, 40, 0.95);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  padding: 12px 24px;
  color: #fff;
  font-size: 14px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 100;
}

#toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="ui-overlay">
  <div id="catalog">
    <h3>🏠 家具目录</h3>
    <div class="catalog-item" data-type="sofa" onclick="selectCatalog('sofa', this)">
      <div class="catalog-icon" style="background:rgba(139,69,19,0.3)">🛋️</div>
      <div>沙发 Sofa</div>
    </div>
    <div class="catalog-item" data-type="table" onclick="selectCatalog('table', this)">
      <div class="catalog-icon" style="background:rgba(222,184,135,0.3)">🪑</div>
      <div>桌子 Table</div>
    </div>
    <div class="catalog-item" data-type="chair" onclick="selectCatalog('chair', this)">
      <div class="catalog-icon" style="background:rgba(101,67,33,0.3)">💺</div>
      <div>椅子 Chair</div>
    </div>
    <div class="catalog-item" data-type="lamp" onclick="selectCatalog('lamp', this)">
      <div class="catalog-icon" style="background:rgba(250,235,215,0.3)">💡</div>
      <div>台灯 Lamp</div>
    </div>
    <div class="catalog-item" data-type="bookshelf" onclick="selectCatalog('bookshelf', this)">
      <div class="catalog-icon" style="background:rgba(92,51,23,0.3)">📚</div>
      <div>书架 Bookshelf</div>
    </div>
    <div class="catalog-item" data-type="bed" onclick="selectCatalog('bed', this)">
      <div class="catalog-icon" style="background:rgba(176,196,222,0.3)">🛏️</div>
      <div>床 Bed</div>
    </div>
  </div>

  <div id="controls-panel">
    <h3>⚙️ 控制面板</h3>
    <div class="control-row">
      <label>
        <input type="checkbox" id="snapToggle">
        网格对齐 (0.5m)
      </label>
    </div>
    <button class="btn" id="saveBtn" onclick="saveLayout()">💾 保存布局</button>
    <button class="btn" id="loadBtn" onclick="loadLayout()">📂 读取布局</button>
    <div class="shortcuts">
      <kbd>R</kbd> 旋转选中家具 90°<br>
      <kbd>Del</kbd> 删除选中家具<br>
      点击目录 → 点击地面放置
    </div>
  </div>

  <div id="status-bar">
    家具数量: <span id="countDisplay">0</span> | 
    模式: <span id="modeDisplay">浏览</span> | 
    选中: <span id="selectDisplay">无</span>
  </div>

  <div id="toast"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ GLOBALS ============
let scene, camera, renderer, controls;
let groundMesh;
let furnitureList = []; // { group, type, aabb }
let selectedIndex = null;
let placementMode = null; // null or furniture type string
let isDragging = false;
let dragStartPos = null;
let dragOriginalPos = null;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const ROOM_W = 10, ROOM_H = 8, WALL_HEIGHT = 3, WALL_THICK = 0.1;
let highlightMaterials = new Map();

// ============ STATE ============
window.__3D_STATE__ = {
  furnitureCount: 0,
  furniture: [],
  selectedIndex: null,
  snapEnabled: false,
  roomSize: { w: 10, h: 8 }
};

function updateState() {
  window.__3D_STATE__.furnitureCount = furnitureList.length;
  window.__3D_STATE__.furniture = furnitureList.map(f => ({
    type: f.type,
    x: f.group.position.x,
    y: f.group.position.y,
    z: f.group.position.z,
    rotation: f.group.rotation.y
  }));
  window.__3D_STATE__.selectedIndex = selectedIndex;
  window.__3D_STATE__.snapEnabled = document.getElementById('snapToggle').checked;

  document.getElementById('countDisplay').textContent = furnitureList.length;
  document.getElementById('modeDisplay').textContent = placementMode ? `放置 ${placementMode}` : (isDragging ? '拖拽中' : '浏览');
  document.getElementById('selectDisplay').textContent = selectedIndex !== null ? `${furnitureList[selectedIndex].type} #${selectedIndex}` : '无';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// ============ INIT ============
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(8, 10, 12);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.insertBefore(renderer.domElement, document.getElementById('ui-overlay'));

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 0, 0);
  controls.maxPolarAngle = Math.PI / 2.05;

  // Lights
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(2048, 2048);
  dirLight.shadow.camera.left = -10;
  dirLight.shadow.camera.right = 10;
  dirLight.shadow.camera.top = 10;
  dirLight.shadow.camera.bottom = -10;
  dirLight.shadow.camera.near = 0.1;
  dirLight.shadow.camera.far = 30;
  dirLight.shadow.bias = -0.001;
  scene.add(dirLight);

  const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambLight);

  buildRoom();
  setupEvents();
  updateState();
  animate();
}

// ============ ROOM ============
function buildRoom() {
  // Ground
  const groundGeo = new THREE.PlaneGeometry(ROOM_W, ROOM_H);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0xd4a373, roughness: 0.8 });
  groundMesh = new THREE.Mesh(groundGeo, groundMat);
  groundMesh.rotation.x = -Math.PI / 2;
  groundMesh.receiveShadow = true;
  groundMesh.name = 'ground';
  scene.add(groundMesh);

  // Grid helper on ground
  const gridHelper = new THREE.GridHelper(Math.max(ROOM_W, ROOM_H), Math.max(ROOM_W, ROOM_H) * 2, 0x000000, 0x000000);
  gridHelper.position.y = 0.001;
  gridHelper.material.opacity = 0.08;
  gridHelper.material.transparent = true;
  scene.add(gridHelper);

  const wallMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f0, roughness: 0.9 });

  // Back wall (z = -ROOM_H/2)
  const backWall = new THREE.Mesh(new THREE.BoxGeometry(ROOM_W + WALL_THICK * 2, WALL_HEIGHT, WALL_THICK), wallMat);
  backWall.position.set(0, WALL_HEIGHT / 2, -ROOM_H / 2 - WALL_THICK / 2);
  backWall.receiveShadow = true;
  backWall.name = 'wall';
  scene.add(backWall);

  // Front wall (z = +ROOM_H/2)
  const frontWall = new THREE.Mesh(new THREE.BoxGeometry(ROOM_W + WALL_THICK * 2, WALL_HEIGHT, WALL_THICK), wallMat);
  frontWall.position.set(0, WALL_HEIGHT / 2, ROOM_H / 2 + WALL_THICK / 2);
  frontWall.receiveShadow = true;
  frontWall.name = 'wall';
  scene.add(frontWall);

  // Left wall (x = -ROOM_W/2)
  const leftWall = new THREE.Mesh(new THREE.BoxGeometry(WALL_THICK, WALL_HEIGHT, ROOM_H), wallMat);
  leftWall.position.set(-ROOM_W / 2 - WALL_THICK / 2, WALL_HEIGHT / 2, 0);
  leftWall.receiveShadow = true;
  leftWall.name = 'wall';
  scene.add(leftWall);

  // Right wall (x = +ROOM_W/2)
  const rightWall = new THREE.Mesh(new THREE.BoxGeometry(WALL_THICK, WALL_HEIGHT, ROOM_H), wallMat);
  rightWall.position.set(ROOM_W / 2 + WALL_THICK / 2, WALL_HEIGHT / 2, 0);
  rightWall.receiveShadow = true;
  rightWall.name = 'wall';
  scene.add(rightWall);
}

// ============ FURNITURE CREATORS ============
function createSofa() {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.7 });

  // Seat
  const seat = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 0.8), mat);
  seat.position.set(0, 0.2, 0);
  seat.castShadow = true;
  seat.receiveShadow = true;
  group.add(seat);

  // Backrest
  const back = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 0.15), mat);
  back.position.set(0, 0.4 + 0.3, -0.8 / 2 + 0.15 / 2);
  back.castShadow = true;
  back.receiveShadow = true;
  group.add(back);

  group.userData.type = 'sofa';
  return group;
}

function createTable() {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0xDEB887, roughness: 0.6 });

  // Top
  const top = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.8), mat);
  top.position.set(0, 0.7 + 0.025, 0);
  top.castShadow = true;
  top.receiveShadow = true;
  group.add(top);

  // Legs
  const legGeo = new THREE.BoxGeometry(0.05, 0.7, 0.05);
  const offsets = [
    [-1.2/2 + 0.05, 0.35, -0.8/2 + 0.05],
    [1.2/2 - 0.05, 0.35, -0.8/2 + 0.05],
    [-1.2/2 + 0.05, 0.35, 0.8/2 - 0.05],
    [1.2/2 - 0.05, 0.35, 0.8/2 - 0.05]
  ];
  offsets.forEach(([x, y, z]) => {
    const leg = new THREE.Mesh(legGeo, mat);
    leg.position.set(x, y, z);
    leg.castShadow = true;
    group.add(leg);
  });

  group.userData.type = 'table';
  return group;
}

function createChair() {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0x654321, roughness: 0.7 });

  // Seat
  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.5), mat);
  seat.position.set(0, 0.45 + 0.025, 0);
  seat.castShadow = true;
  seat.receiveShadow = true;
  group.add(seat);

  // Legs
  const legGeo = new THREE.BoxGeometry(0.05, 0.45, 0.05);
  const offsets = [
    [-0.2, 0.225, -0.2],
    [0.2, 0.225, -0.2],
    [-0.2, 0.225, 0.2],
    [0.2, 0.225, 0.2]
  ];
  offsets.forEach(([x, y, z]) => {
    const leg = new THREE.Mesh(legGeo, mat);
    leg.position.set(x, y, z);
    leg.castShadow = true;
    group.add(leg);
  });

  // Backrest
  const back = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.05), mat);
  back.position.set(0, 0.475 + 0.25, -0.5/2 + 0.025);
  back.castShadow = true;
  group.add(back);

  group.userData.type = 'chair';
  return group;
}

function createLamp() {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0xFAEBD7, roughness: 0.5 });

  // Base
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.05, 16), mat);
  base.position.set(0, 0.025, 0);
  base.castShadow = true;
  group.add(base);

  // Pole
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.6, 8), mat);
  pole.position.set(0, 0.05 + 0.3, 0);
  pole.castShadow = true;
  group.add(pole);

  // Shade
  const shade = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.25, 16), mat);
  shade.position.set(0, 0.05 + 0.6 + 0.125, 0);
  shade.castShadow = true;
  group.add(shade);

  // Point light
  const light = new THREE.PointLight(0xffdd88, 0.5, 3);
  light.position.set(0, 0.05 + 0.6 + 0.125, 0);
  group.add(light);

  group.userData.type = 'lamp';
  return group;
}

function createBookshelf() {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0x5C3317, roughness: 0.8 });

  const w = 0.8, h = 1.5, d = 0.3, thick = 0.03;

  // Left side
  const left = new THREE.Mesh(new THREE.BoxGeometry(thick, h, d), mat);
  left.position.set(-w/2 + thick/2, h/2, 0);
  left.castShadow = true;
  group.add(left);

  // Right side
  const right = new THREE.Mesh(new THREE.BoxGeometry(thick, h, d), mat);
  right.position.set(w/2 - thick/2, h/2, 0);
  right.castShadow = true;
  group.add(right);

  // Back
  const back = new THREE.Mesh(new THREE.BoxGeometry(w, h, thick), mat);
  back.position.set(0, h/2, -d/2 + thick/2);
  back.castShadow = true;
  group.add(back);

  // 4 shelves (bottom, 3 middle, top)
  for (let i = 0; i <= 4; i++) {
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(w, thick, d), mat);
    shelf.position.set(0, i * (h / 4), 0);
    shelf.castShadow = true;
    shelf.receiveShadow = true;
    group.add(shelf);
  }

  group.userData.type = 'bookshelf';
  return group;
}

function createBed() {
  const group = new THREE.Group();
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.7 });
  const mattressMat = new THREE.MeshStandardMaterial({ color: 0xB0C4DE, roughness: 0.6 });

  // Frame
  const frame = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.4, 1.6), frameMat);
  frame.position.set(0, 0.2, 0);
  frame.castShadow = true;
  frame.receiveShadow = true;
  group.add(frame);

  // Mattress
  const mattress = new THREE.Mesh(new THREE.BoxGeometry(2, 0.3, 1.5), mattressMat);
  mattress.position.set(0, 0.4 + 0.15, 0);
  mattress.castShadow = true;
  mattress.receiveShadow = true;
  group.add(mattress);

  // Headboard
  const headboard = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.8, 1.5), frameMat);
  headboard.position.set(-2.1/2 + 0.025, 0.4, 0);
  headboard.castShadow = true;
  group.add(headboard);

  group.userData.type = 'bed';
  return group;
}

function createFurniture(type) {
  switch (type) {
    case 'sofa': return createSofa();
    case 'table': return createTable();
    case 'chair': return createChair();
    case 'lamp': return createLamp();
    case 'bookshelf': return createBookshelf();
    case 'bed': return createBed();
  }
  return null;
}

// ============ AABB ============
function getAABB(group) {
  const box = new THREE.Box3().setFromObject(group);
  return box;
}

function checkCollision(group, excludeIndex) {
  const box = getAABB(group);
  for (let i = 0; i < furnitureList.length; i++) {
    if (i === excludeIndex) continue;
    const otherBox = getAABB(furnitureList[i].group);
    // Shrink slightly to avoid false positives from touching
    box.min.addScalar(0.001);
    box.max.subScalar(0.001);
    if (box.intersectsBox(otherBox)) {
      box.min.subScalar(0.001);
      box.max.addScalar(0.001);
      return true;
    }
    box.min.subScalar(0.001);
    box.max.addScalar(0.001);
  }
  return false;
}

function isInsideRoom(group) {
  const box = getAABB(group);
  const halfW = ROOM_W / 2;
  const halfH = ROOM_H / 2;
  return box.min.x >= -halfW && box.max.x <= halfW &&
         box.min.z >= -halfH && box.max.z <= halfH;
}

function snapPosition(x, z) {
  if (document.getElementById('snapToggle').checked) {
    x = Math.round(x / 0.5) * 0.5;
    z = Math.round(z / 0.5) * 0.5;
  }
  return { x, z };
}

// ============ SELECTION ============
function selectFurniture(index) {
  deselectFurniture();
  if (index === null || index < 0 || index >= furnitureList.length) {
    selectedIndex = null;
    updateState();
    return;
  }
  selectedIndex = index;
  const group = furnitureList[index].group;

  group.traverse(child => {
    if (child.isMesh) {
      if (!highlightMaterials.has(child.uuid)) {
        highlightMaterials.set(child.uuid, child.material);
      }
      child.material = child.material.clone();
      child.material.emissive = new THREE.Color(0x3366ff);
      child.material.emissiveIntensity = 0.3;
    }
  });

  updateState();
}

function deselectFurniture() {
  if (selectedIndex !== null && selectedIndex < furnitureList.length) {
    const group = furnitureList[selectedIndex].group;
    group.traverse(child => {
      if (child.isMesh && highlightMaterials.has(child.uuid)) {
        child.material = highlightMaterials.get(child.uuid);
        highlightMaterials.delete(child.uuid);
      }
    });
  }
  selectedIndex = null;
  updateState();
}

// ============ PLACEMENT ============
function placeFurniture(type, x, z, rotY = 0) {
  const group = createFurniture(type);
  if (!group) return false;

  const snapped = snapPosition(x, z);
  group.position.set(snapped.x, 0, snapped.z);
  group.rotation.y = rotY;

  // Check bounds and collision
  if (!isInsideRoom(group) || checkCollision(group, -1)) {
    showToast('⚠️ 无法放置：碰撞或超出边界');
    return false;
  }

  scene.add(group);
  furnitureList.push({ group, type });
  updateState();
  return true;
}

// ============ EVENTS ============
function getMouseNDC(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function getGroundIntersection(event) {
  getMouseNDC(event);
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(groundMesh);
  if (intersects.length > 0) return intersects[0].point;
  return null;
}

function getFurnitureAtMouse(event) {
  getMouseNDC(event);
  raycaster.setFromCamera(mouse, camera);

  for (let i = furnitureList.length - 1; i >= 0; i--) {
    const meshes = [];
    furnitureList[i].group.traverse(child => {
      if (child.isMesh) meshes.push(child);
    });
    const intersects = raycaster.intersectObjects(meshes, false);
    if (intersects.length > 0) return i;
  }
  return null;
}

let mouseDownPos = { x: 0, y: 0 };
let mouseDownTime = 0;
let potentialDrag = false;

function setupEvents() {
  const canvas = renderer.domElement;

  canvas.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    mouseDownPos = { x: e.clientX, y: e.clientY };
    mouseDownTime = Date.now();

    if (placementMode) return; // handled in mouseup

    const furnitureIdx = getFurnitureAtMouse(e);
    if (furnitureIdx !== null && furnitureIdx === selectedIndex) {
      // Start drag
      potentialDrag = true;
      const pt = getGroundIntersection(e);
      if (pt) {
        dragStartPos = pt.clone();
        dragOriginalPos = furnitureList[selectedIndex].group.position.clone();
      }
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    if (potentialDrag && selectedIndex !== null && dragStartPos) {
      const dx = Math.abs(e.clientX - mouseDownPos.x);
      const dy = Math.abs(e.clientY - mouseDownPos.y);
      if (dx > 3 || dy > 3) {
        if (!isDragging) {
          isDragging = true;
          controls.enabled = false;
          updateState();
        }
      }
    }

    if (isDragging && selectedIndex !== null) {
      const pt = getGroundIntersection(e);
      if (pt && dragStartPos) {
        const delta = pt.clone().sub(dragStartPos);
        let newX = dragOriginalPos.x + delta.x;
        let newZ = dragOriginalPos.z + delta.z;

        const snapped = snapPosition(newX, newZ);
        newX = snapped.x;
        newZ = snapped.z;

        const group = furnitureList[selectedIndex].group;
        const oldPos = group.position.clone();
        group.position.set(newX, 0, newZ);

        if (!isInsideRoom(group) || checkCollision(group, selectedIndex)) {
          group.position.copy(oldPos);
        }
        updateState();
      }
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    if (e.button !== 0) return;

    const dx = Math.abs(e.clientX - mouseDownPos.x);
    const dy = Math.abs(e.clientY - mouseDownPos.y);
    const isClick = dx < 5 && dy < 5 && (Date.now() - mouseDownTime) < 300;

    if (isDragging) {
      isDragging = false;
      potentialDrag = false;
      dragStartPos = null;
      dragOriginalPos = null;
      controls.enabled = true;
      updateState();
      return;
    }

    potentialDrag = false;
    dragStartPos = null;
    dragOriginalPos = null;

    if (!isClick) return;

    // Placement mode
    if (placementMode) {
      const pt = getGroundIntersection(e);
      if (pt) {
        if (placeFurniture(placementMode, pt.x, pt.z)) {
          showToast(`✅ 已放置 ${placementMode}`);
        }
      }
      placementMode = null;
      document.querySelectorAll('.catalog-item').forEach(el => el.classList.remove('active'));
      updateState();
      return;
    }

    // Selection
    const furnitureIdx = getFurnitureAtMouse(e);
    if (furnitureIdx !== null) {
      selectFurniture(furnitureIdx);
    } else {
      deselectFurniture();
    }
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') {
      if (selectedIndex !== null) {
        const group = furnitureList[selectedIndex].group;
        const oldRot = group.rotation.y;
        group.rotation.y += Math.PI / 2;

        if (!isInsideRoom(group) || checkCollision(group, selectedIndex)) {
          group.rotation.y = oldRot;
          showToast('⚠️ 旋转后碰撞或超出边界');
        } else {
          showToast('🔄 旋转 90°');
        }
        updateState();
      }
    }

    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (selectedIndex !== null) {
        e.preventDefault();
        const type = furnitureList[selectedIndex].type;
        // Clean up highlight materials
        const group = furnitureList[selectedIndex].group;
        group.traverse(child => {
          if (child.isMesh) highlightMaterials.delete(child.uuid);
        });
        scene.remove(group);
        furnitureList.splice(selectedIndex, 1);
        selectedIndex = null;
        showToast(`🗑️ 已删除 ${type}`);
        updateState();
      }
    }

    if (e.key === 'Escape') {
      if (placementMode) {
        placementMode = null;
        document.querySelectorAll('.catalog-item').forEach(el => el.classList.remove('active'));
        updateState();
      } else {
        deselectFurniture();
      }
    }
  });

  // Snap toggle
  document.getElementById('snapToggle').addEventListener('change', () => {
    updateState();
    showToast(document.getElementById('snapToggle').checked ? '📐 网格对齐已开启' : '📐 网格对齐已关闭');
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ============ CATALOG ============
window.selectCatalog = function(type, el) {
  deselectFurniture();
  document.querySelectorAll('.catalog-item').forEach(item => item.classList.remove('active'));
  if (placementMode === type) {
    placementMode = null;
    updateState();
    return;
  }
  placementMode = type;
  el.classList.add('active');
  showToast(`📦 点击地面放置 ${type}`);
  updateState();
};

// ============ SAVE / LOAD ============
window.saveLayout = function() {
  const data = furnitureList.map(f => ({
    type: f.type,
    x: f.group.position.x,
    y: f.group.position.y,
    z: f.group.position.z,
    rotation: f.group.rotation.y
  }));
  localStorage.setItem('furnitureLayout', JSON.stringify(data));
  showToast(`💾 已保存 ${data.length} 件家具`);
};

window.loadLayout = function() {
  const raw = localStorage.getItem('furnitureLayout');
  if (!raw) {
    showToast('⚠️ 没有找到存档');
    return;
  }
  try {
    const data = JSON.parse(raw);

    // Clear existing
    deselectFurniture();
    furnitureList.forEach(f => {
      f.group.traverse(child => {
        if (child.isMesh) highlightMaterials.delete(child.uuid);
      });
      scene.remove(f.group);
    });
    furnitureList = [];

    // Recreate
    data.forEach(item => {
      const group = createFurniture(item.type);
      if (group) {
        group.position.set(item.x, item.y || 0, item.z);
        group.rotation.y = item.rotation || 0;
        scene.add(group);
        furnitureList.push({ group, type: item.type });
      }
    });

    showToast(`📂 已加载 ${furnitureList.length} 件家具`);
    updateState();
  } catch (e) {
    showToast('⚠️ 存档数据损坏');
  }
};

// ============ ANIMATE ============
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// ============ START ============
init();
</script>
</body>
