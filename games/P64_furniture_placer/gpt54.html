<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 房间家具摆放系统</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.95);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      min-width: 220px;
    }

    #ui h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    #catalog {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .catalog-item {
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      text-align: center;
      font-size: 14px;
      transition: all 0.2s ease;
      user-select: none;
    }

    .catalog-item:hover {
      background: #eaf4ff;
      border-color: #66aaff;
    }

    .catalog-item.active {
      background: #cfe7ff;
      border-color: #2d7ff9;
      color: #114a9f;
      font-weight: bold;
    }

    .controls-row {
      margin: 8px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 7px 10px;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: white;
      cursor: pointer;
    }

    button:hover {
      background: #f0f0f0;
    }

    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #333;
      line-height: 1.5;
      white-space: pre-line;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h3>家具目录 Catalog</h3>
      <div id="catalog">
        <div class="catalog-item" data-type="sofa">沙发 Sofa</div>
        <div class="catalog-item" data-type="table">桌子 Table</div>
        <div class="catalog-item" data-type="chair">椅子 Chair</div>
        <div class="catalog-item" data-type="lamp">台灯 Lamp</div>
        <div class="catalog-item" data-type="bookshelf">书架 Bookshelf</div>
        <div class="catalog-item" data-type="bed">床 Bed</div>
      </div>

      <div class="controls-row">
        <label>
          <input type="checkbox" id="snapToggle" />
          网格对齐 0.5m
        </label>
      </div>

      <div class="controls-row">
        <button id="saveBtn">保存布局</button>
        <button id="loadBtn">读取布局</button>
      </div>

      <div id="status">
        操作说明：
        1. 点击目录后进入放置模式
        2. 点击地面放置家具
        3. 点击家具可选中并拖动
        4. 按 R 旋转 90°
        5. 按 Delete / Backspace 删除
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const ROOM_W = 10;
    const ROOM_D = 8;
    const WALL_H = 3;
    const WALL_T = 0.1;
    const GRID_SIZE = 0.5;
    const STORAGE_KEY = 'furnitureLayout';

    const app = document.getElementById('app');
    const catalogEl = document.getElementById('catalog');
    const snapToggle = document.getElementById('snapToggle');
    const saveBtn = document.getElementById('saveBtn');
    const loadBtn = document.getElementById('loadBtn');
    const statusEl = document.getElementById('status');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf2f2f2);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(8, 8, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2 - 0.05;
    controls.minDistance = 4;
    controls.maxDistance = 25;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -12;
    dirLight.shadow.camera.right = 12;
    dirLight.shadow.camera.top = 12;
    dirLight.shadow.camera.bottom = -12;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    scene.add(dirLight);

    const roomGroup = new THREE.Group();
    scene.add(roomGroup);

    const floorMat = new THREE.MeshStandardMaterial({
      color: '#d4a373',
      roughness: 0.8
    });
    const floorGeo = new THREE.PlaneGeometry(ROOM_W, ROOM_D);
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    floor.name = 'floor';
    roomGroup.add(floor);

    const wallMat = new THREE.MeshStandardMaterial({ color: '#ffffff' });

    function createWall(w, h, d, x, y, z) {
      const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
      wall.position.set(x, y, z);
      wall.castShadow = true;
      wall.receiveShadow = true;
      roomGroup.add(wall);
    }

    createWall(ROOM_W, WALL_H, WALL_T, 0, WALL_H / 2, -ROOM_D / 2 - WALL_T / 2);
    createWall(ROOM_W, WALL_H, WALL_T, 0, WALL_H / 2, ROOM_D / 2 + WALL_T / 2);
    createWall(WALL_T, WALL_H, ROOM_D, -ROOM_W / 2 - WALL_T / 2, WALL_H / 2, 0);
    createWall(WALL_T, WALL_H, ROOM_D, ROOM_W / 2 + WALL_T / 2, WALL_H / 2, 0);

    const gridHelper = new THREE.GridHelper(ROOM_W, ROOM_W / GRID_SIZE, 0x888888, 0xcccccc);
    gridHelper.position.y = 0.001;
    scene.add(gridHelper);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const furnitureItems = [];
    let selectedFurniture = null;
    let placementType = null;
    let isDragging = false;
    let dragOffset = new THREE.Vector3();
    let dragStartPosition = new THREE.Vector3();

    const highlightColor = new THREE.Color(0x4da3ff);

    function makeShadow(mesh) {
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function applyMaterialStore(obj) {
      obj.traverse((child) => {
        if (child.isMesh) {
          child.userData.originalColor = child.material.color.clone();
        }
      });
    }

    function setSelectedVisual(obj, selected) {
      obj.traverse((child) => {
        if (!child.isMesh) return;
        if (selected) {
          child.material.color.copy(child.userData.originalColor).lerp(highlightColor, 0.25);
          child.material.emissive = child.material.emissive || new THREE.Color(0x000000);
          child.material.emissive.setHex(0x111111);
        } else {
          child.material.color.copy(child.userData.originalColor);
          if (child.material.emissive) child.material.emissive.setHex(0x000000);
        }
      });
    }

    function createSofa() {
      const g = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: '#8B4513' });

      const seat = makeShadow(new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 0.8), mat));
      seat.position.set(0, 0.2, 0);

      const back = makeShadow(new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 0.15), mat));
      back.position.set(0, 0.7, -0.325);

      g.add(seat, back);
      g.userData.type = 'sofa';
      return g;
    }

    function createTable() {
      const g = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: '#DEB887' });

      const top = makeShadow(new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.8), mat));
      top.position.set(0, 0.725, 0);
      g.add(top);

      const legGeo = new THREE.BoxGeometry(0.05, 0.7, 0.05);
      const legPos = [
        [-0.55, 0.35, -0.35],
        [0.55, 0.35, -0.35],
        [-0.55, 0.35, 0.35],
        [0.55, 0.35, 0.35],
      ];
      legPos.forEach(([x, y, z]) => {
        const leg = makeShadow(new THREE.Mesh(legGeo, mat));
        leg.position.set(x, y, z);
        g.add(leg);
      });

      g.userData.type = 'table';
      return g;
    }

    function createChair() {
      const g = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: '#654321' });

      const seat = makeShadow(new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.5), mat));
      seat.position.set(0, 0.475, 0);
      g.add(seat);

      const legGeo = new THREE.BoxGeometry(0.05, 0.45, 0.05);
      const legPos = [
        [-0.225, 0.225, -0.225],
        [0.225, 0.225, -0.225],
        [-0.225, 0.225, 0.225],
        [0.225, 0.225, 0.225],
      ];
      legPos.forEach(([x, y, z]) => {
        const leg = makeShadow(new THREE.Mesh(legGeo, mat));
        leg.position.set(x, y, z);
        g.add(leg);
      });

      const back = makeShadow(new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.05), mat));
      back.position.set(0, 0.725, -0.225);
      g.add(back);

      g.userData.type = 'chair';
      return g;
    }

    function createLamp() {
      const g = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: '#FAEBD7' });

      const base = makeShadow(new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.05, 24), mat));
      base.position.set(0, 0.025, 0);
      g.add(base);

      const pole = makeShadow(new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.6, 16), mat));
      pole.position.set(0, 0.35, 0);
      g.add(pole);

      const shade = makeShadow(new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.25, 24), mat));
      shade.position.set(0, 0.775, 0);
      shade.rotation.x = Math.PI;
      g.add(shade);

      const light = new THREE.PointLight(0xffdd88, 0.5, 3);
      light.position.set(0, 0.72, 0);
      g.add(light);

      g.userData.type = 'lamp';
      return g;
    }

    function createBookshelf() {
      const g = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: '#5C3317' });

      const sideGeo = new THREE.BoxGeometry(0.05, 1.5, 0.3);
      const left = makeShadow(new THREE.Mesh(sideGeo, mat));
      left.position.set(-0.375, 0.75, 0);

      const right = makeShadow(new THREE.Mesh(sideGeo, mat));
      right.position.set(0.375, 0.75, 0);

      const shelfGeo = new THREE.BoxGeometry(0.8, 0.05, 0.3);
      const shelfYs = [0.025, 0.5, 0.95, 1.4];
      const shelves = shelfYs.map(y => {
        const s = makeShadow(new THREE.Mesh(shelfGeo, mat));
        s.position.set(0, y, 0);
        return s;
      });

      const back = makeShadow(new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.5, 0.03), mat));
      back.position.set(0, 0.75, -0.135);

      g.add(left, right, back, ...shelves);
      g.userData.type = 'bookshelf';
      return g;
    }

    function createBed() {
      const g = new THREE.Group();

      const frameMat = new THREE.MeshStandardMaterial({ color: '#8B7355' });
      const mattressMat = new THREE.MeshStandardMaterial({ color: '#B0C4DE' });

      const frame = makeShadow(new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.4, 1.6), frameMat));
      frame.position.set(0, 0.2, 0);
      g.add(frame);

      const mattress = makeShadow(new THREE.Mesh(new THREE.BoxGeometry(2, 0.3, 1.5), mattressMat));
      mattress.position.set(0, 0.55, 0);
      g.add(mattress);

      const headboard = makeShadow(new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.8, 1.5), frameMat));
      headboard.position.set(-1.025, 0.4, 0);
      g.add(headboard);

      g.userData.type = 'bed';
      return g;
    }

    function createFurnitureByType(type) {
      let obj = null;
      switch (type) {
        case 'sofa': obj = createSofa(); break;
        case 'table': obj = createTable(); break;
        case 'chair': obj = createChair(); break;
        case 'lamp': obj = createLamp(); break;
        case 'bookshelf': obj = createBookshelf(); break;
        case 'bed': obj = createBed(); break;
        default: return null;
      }
      applyMaterialStore(obj);
      obj.userData.type = type;
      return obj;
    }

    function alignFurnitureToGround(obj) {
      obj.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(obj);
      const minY = box.min.y;
      obj.position.y -= minY;
      obj.updateMatrixWorld(true);
    }

    function getBox(obj) {
      obj.updateMatrixWorld(true);
      return new THREE.Box3().setFromObject(obj);
    }

    function snapValue(v) {
      return Math.round(v / GRID_SIZE) * GRID_SIZE;
    }

    function applySnap(position) {
      if (!snapToggle.checked) return position;
      position.x = snapValue(position.x);
      position.z = snapValue(position.z);
      return position;
    }

    function clampFurnitureInsideRoom(obj) {
      obj.updateMatrixWorld(true);
      const box = getBox(obj);

      const minX = -ROOM_W / 2;
      const maxX = ROOM_W / 2;
      const minZ = -ROOM_D / 2;
      const maxZ = ROOM_D / 2;

      let dx = 0;
      let dz = 0;

      if (box.min.x < minX) dx = minX - box.min.x;
      if (box.max.x > maxX) dx = maxX - box.max.x;
      if (box.min.z < minZ) dz = minZ - box.min.z;
      if (box.max.z > maxZ) dz = maxZ - box.max.z;

      obj.position.x += dx;
      obj.position.z += dz;
      obj.updateMatrixWorld(true);
    }

    function isInsideRoom(obj) {
      const box = getBox(obj);
      return (
        box.min.x >= -ROOM_W / 2 &&
        box.max.x <= ROOM_W / 2 &&
        box.min.z >= -ROOM_D / 2 &&
        box.max.z <= ROOM_D / 2
      );
    }

    function intersectsOthers(targetObj) {
      const targetBox = getBox(targetObj);
      for (const item of furnitureItems) {
        if (item === targetObj) continue;
        const otherBox = getBox(item);
        if (targetBox.intersectsBox(otherBox)) {
          return true;
        }
      }
      return false;
    }

    function canPlaceOrMove(obj) {
      if (!isInsideRoom(obj)) return false;
      if (intersectsOthers(obj)) return false;
      return true;
    }

    function addFurniture(type, x, z, rotation = 0) {
      const obj = createFurnitureByType(type);
      if (!obj) return false;

      obj.rotation.y = rotation;
      obj.position.set(x, 0, z);
      alignFurnitureToGround(obj);
      applySnap(obj.position);
      alignFurnitureToGround(obj);
      clampFurnitureInsideRoom(obj);
      alignFurnitureToGround(obj);

      if (!canPlaceOrMove(obj)) {
        return false;
      }

      scene.add(obj);
      furnitureItems.push(obj);
      selectFurniture(obj);
      update3DState();
      return true;
    }

    function selectFurniture(obj) {
      if (selectedFurniture === obj) return;

      if (selectedFurniture) {
        setSelectedVisual(selectedFurniture, false);
      }

      selectedFurniture = obj || null;

      if (selectedFurniture) {
        setSelectedVisual(selectedFurniture, true);
      }

      update3DState();
    }

    function deleteSelectedFurniture() {
      if (!selectedFurniture) return;
      const idx = furnitureItems.indexOf(selectedFurniture);
      if (idx >= 0) {
        scene.remove(selectedFurniture);
        furnitureItems.splice(idx, 1);
      }
      selectedFurniture = null;
      update3DState();
    }

    function rotateSelectedFurniture() {
      if (!selectedFurniture) return;

      const prevRot = selectedFurniture.rotation.y;
      const prevPos = selectedFurniture.position.clone();

      selectedFurniture.rotation.y += Math.PI / 2;
      alignFurnitureToGround(selectedFurniture);
      clampFurnitureInsideRoom(selectedFurniture);
      alignFurnitureToGround(selectedFurniture);

      if (!canPlaceOrMove(selectedFurniture)) {
        selectedFurniture.rotation.y = prevRot;
        selectedFurniture.position.copy(prevPos);
        alignFurnitureToGround(selectedFurniture);
      }

      update3DState();
    }

    function updateMouse(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function getFloorIntersection(event) {
      updateMouse(event);
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(floor, false);
      return hits.length ? hits[0] : null;
    }

    function getFurnitureIntersection(event) {
      updateMouse(event);
      raycaster.setFromCamera(mouse, camera);
      const meshes = [];
      furnitureItems.forEach(item => {
        item.traverse(child => {
          if (child.isMesh) meshes.push(child);
        });
      });

      const hits = raycaster.intersectObjects(meshes, false);
      if (!hits.length) return null;

      let obj = hits[0].object;
      while (obj && !furnitureItems.includes(obj)) {
        obj = obj.parent;
      }
      return obj || null;
    }

    function setPlacementMode(type) {
      placementType = type;
      [...catalogEl.querySelectorAll('.catalog-item')].forEach(el => {
        el.classList.toggle('active', el.dataset.type === type);
      });
      updateStatus();
    }

    function clearPlacementMode() {
      placementType = null;
      [...catalogEl.querySelectorAll('.catalog-item')].forEach(el => el.classList.remove('active'));
      updateStatus();
    }

    function updateStatus() {
      statusEl.textContent =
`操作说明：
1. 点击目录后进入放置模式
2. 点击地面放置家具
3. 点击家具可选中并拖动
4. 按 R 旋转 90°
5. 按 Delete / Backspace 删除

当前模式: ${placementType ? `放置 ${placementType}` : '普通选择'}
已放置家具: ${furnitureItems.length}
网格对齐: ${snapToggle.checked ? '开启' : '关闭'}`;
    }

    function update3DState() {
      window.__3D_STATE__ = {
        furnitureCount: furnitureItems.length,
        furniture: furnitureItems.map(item => ({
          type: item.userData.type,
          x: Number(item.position.x.toFixed(3)),
          y: Number(item.position.y.toFixed(3)),
          z: Number(item.position.z.toFixed(3)),
          rotation: Number(item.rotation.y.toFixed(6))
        })),
        selectedIndex: selectedFurniture ? furnitureItems.indexOf(selectedFurniture) : null,
        snapEnabled: snapToggle.checked,
        roomSize: { w: 10, h: 8 }
      };
      updateStatus();
    }

    catalogEl.addEventListener('click', (e) => {
      const item = e.target.closest('.catalog-item');
      if (!item) return;
      setPlacementMode(item.dataset.type);
      selectFurniture(null);
    });

    snapToggle.addEventListener('change', () => {
      update3DState();
    });

    saveBtn.addEventListener('click', () => {
      const data = furnitureItems.map(item => ({
        type: item.userData.type,
        position: {
          x: item.position.x,
          y: item.position.y,
          z: item.position.z
        },
        rotation: item.rotation.y
      }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      updateStatus();
    });

    loadBtn.addEventListener('click', () => {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;

      try {
        const data = JSON.parse(raw);

        furnitureItems.forEach(item => scene.remove(item));
        furnitureItems.length = 0;
        selectedFurniture = null;

        for (const entry of data) {
          const obj = createFurnitureByType(entry.type);
          if (!obj) continue;

          obj.position.set(entry.position.x, entry.position.y ?? 0, entry.position.z);
          obj.rotation.y = entry.rotation || 0;
          alignFurnitureToGround(obj);

          if (snapToggle.checked) {
            applySnap(obj.position);
            alignFurnitureToGround(obj);
          }

          clampFurnitureInsideRoom(obj);
          alignFurnitureToGround(obj);

          if (!canPlaceOrMove(obj)) {
            continue;
          }

          scene.add(obj);
          furnitureItems.push(obj);
        }

        update3DState();
      } catch (err) {
        console.error('读取布局失败:', err);
      }
    });

    renderer.domElement.addEventListener('mousedown', (event) => {
      if (event.button !== 0) return;

      const furnitureHit = getFurnitureIntersection(event);
      if (furnitureHit) {
        selectFurniture(furnitureHit);

        const floorHit = getFloorIntersection(event);
        if (floorHit && selectedFurniture) {
          isDragging = true;
          controls.enabled = false;
          dragStartPosition.copy(selectedFurniture.position);
          dragOffset.copy(selectedFurniture.position).sub(floorHit.point);
          dragOffset.y = 0;
        }
        return;
      }

      const floorHit = getFloorIntersection(event);
      if (!floorHit) {
        selectFurniture(null);
        return;
      }

      if (placementType) {
        const point = floorHit.point.clone();
        applySnap(point);

        const ok = addFurniture(placementType, point.x, point.z, 0);
        if (ok) {
          clearPlacementMode();
        }
      } else {
        selectFurniture(null);
      }
    });

    window.addEventListener('mousemove', (event) => {
      if (!isDragging || !selectedFurniture) return;

      const floorHit = getFloorIntersection(event);
      if (!floorHit) return;

      const nextPos = floorHit.point.clone().add(dragOffset);
      nextPos.y = selectedFurniture.position.y;
      applySnap(nextPos);

      const prevPos = selectedFurniture.position.clone();

      selectedFurniture.position.copy(nextPos);
      alignFurnitureToGround(selectedFurniture);
      clampFurnitureInsideRoom(selectedFurniture);
      alignFurnitureToGround(selectedFurniture);

      if (!canPlaceOrMove(selectedFurniture)) {
        selectedFurniture.position.copy(prevPos);
        alignFurnitureToGround(selectedFurniture);
      }

      update3DState();
    });

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        controls.enabled = true;

        if (selectedFurniture) {
          if (!canPlaceOrMove(selectedFurniture)) {
            selectedFurniture.position.copy(dragStartPosition);
            alignFurnitureToGround(selectedFurniture);
          }
        }

        update3DState();
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'r' || event.key === 'R') {
        rotateSelectedFurniture();
      } else if (event.key === 'Delete' || event.key === 'Backspace') {
        event.preventDefault();
        deleteSelectedFurniture();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    update3DState();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
