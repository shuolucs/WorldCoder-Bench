<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Lens Optics Education Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            min-width: 250px;
            pointer-events: auto;
        }
        #hud-panel h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #88ccff;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .hud-value {
            font-family: monospace;
            color: #ffcc00;
        }
        #hud-image-type {
            display: block;
            margin-top: 10px;
            padding: 5px;
            text-align: center;
            background: #333;
            border-radius: 4px;
            font-weight: bold;
        }
        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }
        button {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        button:hover {
            background: #666;
        }
        button:active {
            background: #88ccff;
            color: #000;
        }
        .full-width {
            grid-column: span 2;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #aaa;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            text-align: center;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="container"></div>
    <div id="loading">Loading Avocado Model...</div>
    
    <div id="hud-panel">
        <h2>Optics Data</h2>
        <div class="hud-row"><span>Object Dist (do):</span> <span id="hud-do" class="hud-value">12.00</span></div>
        <div class="hud-row"><span>Image Dist (di):</span> <span id="hud-di" class="hud-value">0.00</span></div>
        <div class="hud-row"><span>Magnification (m):</span> <span id="hud-mag" class="hud-value">0.00</span></div>
        <div class="hud-row"><span>Focal Length (f):</span> <span id="hud-focal" class="hud-value">5.00</span></div>
        <div id="hud-image-type">Real Image</div>
        
        <div class="controls">
            <button id="btn-focal-up">Increase f (+)</button>
            <button id="btn-focal-down">Decrease f (-)</button>
            <button id="btn-save">Save State (S)</button>
            <button id="btn-load">Load State (L)</button>
            <button id="btn-toggle-rays" class="full-width">Toggle Rays (R)</button>
            <button id="btn-reset" class="full-width">Reset</button>
        </div>
    </div>

    <div id="instructions">
        Drag object along bench | Arrow Up/Down to move | Scroll to zoom | Left click drag to rotate camera
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            objectZ: -12,
            focalLength: 5.0,
            objectDistance: 12,
            imageDistance: 0,
            magnification: 0,
            imageVisible: false,
            imageZ: 0,
            raysVisible: true,
            savedStateExists: false,
            avocadoLoaded: false,
            rayCount: 0,
            imageScaleY: 1,
            hudDoValue: 0,
            hudDiValue: 0,
            hudMagValue: 0,
            stateVersion: 0
        };

        // --- Globals ---
        let scene, camera, renderer, controls;
        let objectGroup, imageGroup;
        let rayLines = [];
        let focalPointNear, focalPointFar;
        
        const OPTICAL_AXIS_Y = 0.85; // Height of the optical axis
        const OBJECT_HEIGHT = 1.5;
        const Y_TIP = OPTICAL_AXIS_Y + (OBJECT_HEIGHT / 2); // 1.6

        // Dragging state
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(1, 0, 0), 0);
        let isDragging = false;

        init();
        animate();

        function init() {
            const container = document.getElementById('container');

            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            scene.fog = new THREE.Fog(0x111111, 20, 100);

            // Camera setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 20);
            camera.lookAt(0, 0, 0);

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, OPTICAL_AXIS_Y, 0);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 10, 10);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 10;
            dirLight.shadow.camera.bottom = -10;
            dirLight.shadow.camera.left = -25;
            dirLight.shadow.camera.right = 25;
            scene.add(dirLight);

            // Optical Bench
            const benchGeo = new THREE.BoxGeometry(2, 0.2, 50);
            const benchMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
            const bench = new THREE.Mesh(benchGeo, benchMat);
            bench.position.set(0, 0, 0); // Centered at y=0. Top surface is at y=0.1
            bench.receiveShadow = true;
            scene.add(bench);

            // Grid on bench
            const gridHelper = new THREE.GridHelper(50, 50, 0x666666, 0x222222);
            gridHelper.position.y = 0.11;
            scene.add(gridHelper);

            // Lens
            const lensGeo = new THREE.BoxGeometry(4, 4, 0.1);
            const lensMat = new THREE.MeshPhysicalMaterial({ 
                color: 0x88ccff, 
                transparent: true, 
                opacity: 0.5,
                transmission: 0.8,
                roughness: 0.1,
                side: THREE.DoubleSide
            });
            const lens = new THREE.Mesh(lensGeo, lensMat);
            lens.position.set(0, OPTICAL_AXIS_Y, 0);
            scene.add(lens);

            // Focal Point Markers
            const fpGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const fpMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
            focalPointNear = new THREE.Mesh(fpGeo, fpMat);
            focalPointFar = new THREE.Mesh(fpGeo, fpMat);
            scene.add(focalPointNear);
            scene.add(focalPointFar);

            // Ray Lines setup
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 2 });
            for (let i = 0; i < 3; i++) {
                const lineGeo = new THREE.BufferGeometry();
                const line = new THREE.Line(lineGeo, lineMat);
                rayLines.push(line);
                scene.add(line);
            }

            // Load Avocado Model
            const loader = new GLTFLoader();
            loader.load(
                'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb',
                (gltf) => {
                    const model = gltf.scene;
                    
                    // Enable shadows
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    // Calculate bounding box to scale and center
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const center = box.getCenter(new THREE.Vector3());
                    
                    // Scale to roughly 1.5 units tall
                    const scaleFactor = OBJECT_HEIGHT / size.y;
                    model.scale.set(scaleFactor, scaleFactor, scaleFactor);
                    
                    // Center the model locally around y=0
                    model.position.y = -center.y * scaleFactor;
                    model.position.x = -center.x * scaleFactor;
                    model.position.z = -center.z * scaleFactor;

                    // Create Object Group
                    objectGroup = new THREE.Group();
                    objectGroup.add(model);
                    // Place group on optical axis
                    objectGroup.position.set(0, OPTICAL_AXIS_Y, window.__3D_STATE__.objectZ);
                    scene.add(objectGroup);

                    // Create Image Group (Clone)
                    imageGroup = objectGroup.clone();
                    // Ensure materials are cloned if we wanted to change them, but sharing is fine here
                    scene.add(imageGroup);

                    window.__3D_STATE__.avocadoLoaded = true;
                    document.getElementById('loading').style.display = 'none';
                    
                    updateOptics();
                },
                undefined,
                (error) => {
                    console.error('Error loading model:', error);
                    document.getElementById('loading').innerText = 'Error loading model.';
                }
            );

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            
            // Dragging events
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', onPointerUp);

            // Keyboard events
            window.addEventListener('keydown', onKeyDown);

            // UI Buttons
            document.getElementById('btn-focal-up').addEventListener('click', () => changeFocalLength(1));
            document.getElementById('btn-focal-down').addEventListener('click', () => changeFocalLength(-1));
            document.getElementById('btn-save').addEventListener('click', saveState);
            document.getElementById('btn-load').addEventListener('click', loadState);
            document.getElementById('btn-reset').addEventListener('click', resetState);
            document.getElementById('btn-toggle-rays').addEventListener('click', toggleRays);

            // Initial check for saved state
            window.__3D_STATE__.savedStateExists = !!localStorage.getItem('lensOpticsSave');
        }

        function updateOptics() {
            const state = window.__3D_STATE__;
            const f = state.focalLength;
            let objZ = state.objectZ;
            
            // Clamp objectZ
            objZ = Math.max(-25, Math.min(-2, objZ));
            state.objectZ = objZ;

            const do_dist = Math.abs(objZ);
            state.objectDistance = do_dist;

            let di, m;
            
            // Handle do == f gracefully
            if (Math.abs(do_dist - f) < 0.001) {
                di = Infinity;
                m = Infinity;
            } else {
                // Thin lens equation: 1/f = 1/do + 1/di  =>  di = (f * do) / (do - f)
                di = (f * do_dist) / (do_dist - f);
                // Magnification: m = -di / do
                m = -di / do_dist;
            }

            state.imageDistance = di;
            state.magnification = m;

            // Update Object Position
            if (objectGroup) {
                objectGroup.position.z = objZ;
            }

            // Update Image Position and Scale
            if (imageGroup) {
                if (di > 0 && di !== Infinity) {
                    imageGroup.visible = true;
                    imageGroup.position.z = di;
                    // Apply magnification. Negative m flips on Y axis.
                    imageGroup.scale.set(Math.abs(m), m, Math.abs(m));
                    
                    state.imageVisible = true;
                    state.imageZ = di;
                    state.imageScaleY = m;
                } else {
                    imageGroup.visible = false;
                    state.imageVisible = false;
                    state.imageZ = 0;
                    state.imageScaleY = 0;
                }
            }

            // Update Focal Point Markers
            focalPointNear.position.set(0, OPTICAL_AXIS_Y, -f);
            focalPointFar.position.set(0, OPTICAL_AXIS_Y, f);

            updateRays();
        }

        function updateRays() {
            const state = window.__3D_STATE__;
            
            if (!state.raysVisible || !state.avocadoLoaded) {
                rayLines.forEach(r => r.visible = false);
                state.rayCount = 0;
                return;
            }

            const f = state.focalLength;
            const objZ = state.objectZ;
            const y_axis = OPTICAL_AXIS_Y;
            const y_tip = Y_TIP;
            const dy = y_tip - y_axis; // 0.75

            // Ray 1: Parallel to axis, bends through far focal point
            // Slope after lens: (y_axis - y_tip) / (f - 0) = -dy / f
            const slope1 = -dy / f;
            const endZ1 = 30;
            const endY1 = y_tip + slope1 * endZ1;
            const pts1 = [
                new THREE.Vector3(0, y_tip, objZ),
                new THREE.Vector3(0, y_tip, 0),
                new THREE.Vector3(0, endY1, endZ1)
            ];
            rayLines[0].geometry.setFromPoints(pts1);
            rayLines[0].visible = true;

            // Ray 2: Through optical center (straight line)
            // Slope: (y_axis - y_tip) / (0 - objZ) = -dy / -objZ = dy / objZ
            const slope2 = dy / objZ;
            const endZ2 = 30;
            const endY2 = y_axis + slope2 * endZ2;
            const pts2 = [
                new THREE.Vector3(0, y_tip, objZ),
                new THREE.Vector3(0, y_axis, 0),
                new THREE.Vector3(0, endY2, endZ2)
            ];
            rayLines[1].geometry.setFromPoints(pts2);
            rayLines[1].visible = true;

            // Ray 3: Through near focal point, bends parallel
            // Only draw if object is not exactly at focal point
            if (Math.abs(objZ + f) > 0.01) {
                // Slope before lens: (y_axis - y_tip) / (-f - objZ) = -dy / -(f + objZ) = dy / (f + objZ)
                const slope3 = dy / (f + objZ);
                // Intersection with lens at z=0: y = y_tip + slope3 * (0 - objZ)
                const y_lens = y_tip - slope3 * objZ;
                const endZ3 = 30;
                const pts3 = [
                    new THREE.Vector3(0, y_tip, objZ),
                    new THREE.Vector3(0, y_lens, 0),
                    new THREE.Vector3(0, y_lens, endZ3)
                ];
                rayLines[2].geometry.setFromPoints(pts3);
                rayLines[2].visible = true;
                state.rayCount = 3;
            } else {
                rayLines[2].visible = false;
                state.rayCount = 2;
            }
        }

        function updateHUD() {
            const state = window.__3D_STATE__;
            
            const doStr = state.objectDistance.toFixed(2);
            const diStr = state.imageDistance === Infinity ? 'Infinity' : state.imageDistance.toFixed(2);
            const magStr = state.magnification === Infinity ? 'Infinity' : state.magnification.toFixed(2);
            const fStr = state.focalLength.toFixed(2);

            document.getElementById('hud-do').innerText = doStr;
            document.getElementById('hud-di').innerText = diStr;
            document.getElementById('hud-mag').innerText = magStr;
            document.getElementById('hud-focal').innerText = fStr;

            const typeEl = document.getElementById('hud-image-type');
            if (state.imageDistance === Infinity) {
                typeEl.innerText = 'No Image (at focus)';
                typeEl.style.color = '#ffaa00';
            } else if (state.imageVisible) {
                typeEl.innerText = 'Real Image';
                typeEl.style.color = '#88ff88';
            } else {
                typeEl.innerText = 'Virtual Image';
                typeEl.style.color = '#ff8888';
            }

            // Update state values for external inspection
            state.hudDoValue = parseFloat(doStr);
            state.hudDiValue = state.imageDistance === Infinity ? Infinity : parseFloat(diStr);
            state.hudMagValue = state.magnification === Infinity ? Infinity : parseFloat(magStr);
            state.savedStateExists = !!localStorage.getItem('lensOpticsSave');
        }

        // --- Interaction Handlers ---

        function onPointerDown(event) {
            if (!window.__3D_STATE__.avocadoLoaded) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            // Check intersection with objectGroup
            const intersects = raycaster.intersectObject(objectGroup, true);
            if (intersects.length > 0) {
                isDragging = true;
                controls.enabled = false;
                document.body.style.cursor = 'ew-resize';
            }
        }

        function onPointerMove(event) {
            if (!isDragging) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, target);
            
            if (target) {
                window.__3D_STATE__.objectZ = target.z;
                updateOptics();
            }
        }

        function onPointerUp() {
            isDragging = false;
            controls.enabled = true;
            document.body.style.cursor = 'default';
        }

        function onKeyDown(event) {
            const state = window.__3D_STATE__;
            switch(event.key.toLowerCase()) {
                case 'arrowup':
                    state.objectZ += 0.5;
                    updateOptics();
                    break;
                case 'arrowdown':
                    state.objectZ -= 0.5;
                    updateOptics();
                    break;
                case 'r':
                    toggleRays();
                    break;
                case 's':
                    saveState();
                    break;
                case 'l':
                    loadState();
                    break;
            }
        }

        function changeFocalLength(delta) {
            let f = window.__3D_STATE__.focalLength + delta;
            f = Math.max(2, Math.min(15, f));
            window.__3D_STATE__.focalLength = f;
            updateOptics();
        }

        function toggleRays() {
            window.__3D_STATE__.raysVisible = !window.__3D_STATE__.raysVisible;
            updateOptics();
        }

        function saveState() {
            const state = window.__3D_STATE__;
            state.stateVersion++;
            const data = {
                objectZ: state.objectZ,
                focalLength: state.focalLength,
                raysVisible: state.raysVisible,
                stateVersion: state.stateVersion
            };
            localStorage.setItem('lensOpticsSave', JSON.stringify(data));
            state.savedStateExists = true;
            
            // Visual feedback
            const btn = document.getElementById('btn-save');
            const origText = btn.innerText;
            btn.innerText = 'Saved!';
            setTimeout(() => btn.innerText = origText, 1000);
        }

        function loadState() {
            const dataStr = localStorage.getItem('lensOpticsSave');
            if (dataStr) {
                try {
                    const data = JSON.parse(dataStr);
                    const state = window.__3D_STATE__;
                    state.objectZ = data.objectZ;
                    state.focalLength = data.focalLength;
                    state.raysVisible = data.raysVisible;
                    state.stateVersion = data.stateVersion;
                    updateOptics();
                    
                    const btn = document.getElementById('btn-load');
                    const origText = btn.innerText;
                    btn.innerText = 'Loaded!';
                    setTimeout(() => btn.innerText = origText, 1000);
                } catch (e) {
                    console.error("Failed to load state", e);
                }
            }
        }

        function resetState() {
            const state = window.__3D_STATE__;
            state.objectZ = -12;
            state.focalLength = 5.0;
            state.raysVisible = true;
            updateOptics();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateHUD();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
