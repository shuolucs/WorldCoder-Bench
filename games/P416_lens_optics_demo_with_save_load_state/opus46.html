<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lens Optics Education Demo</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #hud-panel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 30, 0.85);
    color: #e0e0e0;
    padding: 20px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 260px;
    border: 1px solid rgba(136, 204, 255, 0.3);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
  }
  #hud-panel h3 {
    margin: 0 0 10px 0;
    color: #88ccff;
    font-size: 16px;
    border-bottom: 1px solid rgba(136, 204, 255, 0.3);
    padding-bottom: 8px;
  }
  #hud-panel .hud-row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
  }
  #hud-panel .hud-label { color: #aaa; }
  #hud-panel .hud-value { color: #fff; font-weight: bold; }
  #hud-image-type {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: bold;
    margin-top: 5px;
  }
  .real-image { background: #2d5a2d; color: #88ff88; }
  .virtual-image { background: #5a2d2d; color: #ff8888; }
  .btn-group {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .btn-group button {
    padding: 6px 12px;
    border: 1px solid rgba(136, 204, 255, 0.4);
    background: rgba(136, 204, 255, 0.1);
    color: #88ccff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  .btn-group button:hover {
    background: rgba(136, 204, 255, 0.25);
    border-color: #88ccff;
  }
  .btn-group button:active {
    transform: scale(0.95);
  }
  #instructions {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.8);
    color: #888;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="hud-panel">
  <h3>🔬 Lens Optics Lab</h3>
  <div class="hud-row">
    <span class="hud-label">Object Distance (do):</span>
    <span class="hud-value" id="hud-do">12.00</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Image Distance (di):</span>
    <span class="hud-value" id="hud-di">0.00</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Magnification (m):</span>
    <span class="hud-value" id="hud-mag">0.00</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Focal Length (f):</span>
    <span class="hud-value" id="hud-focal">5.00</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Image Type:</span>
    <span id="hud-image-type" class="real-image">Real Image</span>
  </div>
  <div class="btn-group">
    <button id="btn-focal-up">f +1</button>
    <button id="btn-focal-down">f -1</button>
    <button id="btn-toggle-rays">Toggle Rays</button>
  </div>
  <div class="btn-group">
    <button id="btn-save">💾 Save</button>
    <button id="btn-load">📂 Load</button>
    <button id="btn-reset">🔄 Reset</button>
  </div>
</div>

<div id="instructions">
  ↑↓ Move Object | R Toggle Rays | S Save | L Load | Drag Avocado along Z-axis
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
const state = {
  objectZ: -12,
  focalLength: 5.0,
  raysVisible: true,
  stateVersion: 0,
  avocadoLoaded: false
};

window.__3D_STATE__ = {
  objectZ: -12,
  focalLength: 5.0,
  objectDistance: 12,
  imageDistance: 0,
  magnification: 0,
  imageVisible: false,
  imageZ: 0,
  raysVisible: true,
  savedStateExists: localStorage.getItem('lensOpticsSave') !== null,
  avocadoLoaded: false,
  rayCount: 0,
  imageScaleY: 1,
  hudDoValue: 12,
  hudDiValue: 0,
  hudMagValue: 0,
  stateVersion: 0
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 60);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 10, 10);
dirLight.castShadow = true;
scene.add(dirLight);

// Grid helper for reference
const gridHelper = new THREE.GridHelper(50, 50, 0x333355, 0x222244);
gridHelper.position.y = -0.1;
scene.add(gridHelper);

// --- Optical Bench ---
const benchGeom = new THREE.BoxGeometry(2, 0.2, 50);
const benchMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5, roughness: 0.5 });
const bench = new THREE.Mesh(benchGeom, benchMat);
bench.position.set(0, 0, 0);
bench.receiveShadow = true;
scene.add(bench);

// Bench markings
for (let z = -25; z <= 25; z += 5) {
  const tickGeom = new THREE.BoxGeometry(2.1, 0.22, 0.05);
  const tickMat = new THREE.MeshBasicMaterial({ color: 0x666666 });
  const tick = new THREE.Mesh(tickGeom, tickMat);
  tick.position.set(0, 0.01, z);
  scene.add(tick);
}

// --- Lens ---
const lensGeom = new THREE.PlaneGeometry(0.1, 4);
const lensMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff,
  transparent: true,
  opacity: 0.5,
  side: THREE.DoubleSide,
  metalness: 0.1,
  roughness: 0.1,
  transmission: 0.5
});
const lens = new THREE.Mesh(lensGeom, lensMat);
lens.position.set(0, 2, 0);
scene.add(lens);

// Lens border ring
const lensRingGeom = new THREE.RingGeometry(1.9, 2.05, 32);
const lensRingMat = new THREE.MeshBasicMaterial({ color: 0x88ccff, side: THREE.DoubleSide });
const lensRing = new THREE.Mesh(lensRingGeom, lensRingMat);
lensRing.position.set(0, 2, 0);
scene.add(lensRing);

// Lens label
const lensDiscGeom = new THREE.CircleGeometry(2, 32);
const lensDiscMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff,
  transparent: true,
  opacity: 0.15,
  side: THREE.DoubleSide
});
const lensDisc = new THREE.Mesh(lensDiscGeom, lensDiscMat);
lensDisc.position.set(0, 2, 0);
scene.add(lensDisc);

// Focal point markers
function createFocalMarker(z) {
  const markerGeom = new THREE.SphereGeometry(0.15, 16, 16);
  const markerMat = new THREE.MeshBasicMaterial({ color: 0xff8800 });
  const marker = new THREE.Mesh(markerGeom, markerMat);
  marker.position.set(0, 0.2, z);
  return marker;
}

let focalMarkerNear = createFocalMarker(-state.focalLength);
let focalMarkerFar = createFocalMarker(state.focalLength);
scene.add(focalMarkerNear);
scene.add(focalMarkerFar);

// Optical axis line
const axisGeom = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0, 1.5, -25),
  new THREE.Vector3(0, 1.5, 25)
]);
const axisMat = new THREE.LineBasicMaterial({ color: 0x555577 });
const axisLine = new THREE.Line(axisGeom, axisMat);
scene.add(axisLine);

// --- Avocado Loading ---
let avocadoObject = null;
let avocadoImage = null;
let avocadoObjectHeight = 1.5;
const objectTipY = 1.5; // approximate tip height of the object above bench

const loader = new GLTFLoader();
const avocadoUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/Avocado/glTF-Binary/Avocado.glb';

loader.load(avocadoUrl, (gltf) => {
  avocadoObject = gltf.scene;

  // Compute bounding box to scale properly
  const box = new THREE.Box3().setFromObject(avocadoObject);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scaleFactor = 1.5 / maxDim;
  avocadoObject.scale.set(scaleFactor * 15, scaleFactor * 15, scaleFactor * 15);

  // Recompute after scaling
  const box2 = new THREE.Box3().setFromObject(avocadoObject);
  const minY = box2.min.y;
  avocadoObject.position.set(0, -minY + 0.1, state.objectZ);

  avocadoObject.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
    }
  });

  scene.add(avocadoObject);

  // Clone for image
  avocadoImage = avocadoObject.clone();
  scene.add(avocadoImage);

  state.avocadoLoaded = true;
  window.__3D_STATE__.avocadoLoaded = true;

  updateOptics();
}, undefined, (error) => {
  console.error('Error loading Avocado model:', error);
  // Fallback: create a simple object
  createFallbackObject();
});

function createFallbackObject() {
  const group = new THREE.Group();

  // Body
  const bodyGeom = new THREE.SphereGeometry(0.5, 16, 16);
  bodyGeom.scale(0.6, 1, 0.6);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a7c3f });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.position.y = 0.8;
  group.add(body);

  // Stem
  const stemGeom = new THREE.CylinderGeometry(0.05, 0.05, 0.3);
  const stemMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const stem = new THREE.Mesh(stemGeom, stemMat);
  stem.position.y = 1.45;
  group.add(stem);

  // Arrow on top to show orientation
  const arrowGeom = new THREE.ConeGeometry(0.15, 0.3, 8);
  const arrowMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
  const arrow = new THREE.Mesh(arrowGeom, arrowMat);
  arrow.position.y = 1.7;
  group.add(arrow);

  group.position.set(0, 0.1, state.objectZ);
  avocadoObject = group;
  scene.add(avocadoObject);

  avocadoImage = group.clone();
  scene.add(avocadoImage);

  state.avocadoLoaded = true;
  window.__3D_STATE__.avocadoLoaded = true;
  updateOptics();
}

// --- Ray Lines ---
let rayLines = [];
const rayMaterial = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 2 });

function clearRays() {
  rayLines.forEach(line => scene.remove(line));
  rayLines = [];
}

function createRays() {
  clearRays();

  if (!state.raysVisible || !avocadoObject) return;

  const doVal = Math.abs(state.objectZ);
  const f = state.focalLength;
  const objZ = state.objectZ;
  const tipY = objectTipY + 0.1; // tip of the object
  const lensZ = 0;

  // Compute image
  const diDenom = (1 / f - 1 / doVal);
  let di;
  if (Math.abs(diDenom) < 0.0001) {
    di = 10000; // effectively infinity
  } else {
    di = 1 / diDenom;
  }
  const m = -di / doVal;
  const imageTipY = objectTipY + m * (tipY - objectTipY);

  // Ray 1: Parallel to axis from object tip, then through far focal point
  {
    const points = [
      new THREE.Vector3(0, tipY, objZ),
      new THREE.Vector3(0, tipY, lensZ),
    ];
    if (di > 0) {
      // Real image: ray goes through focal point to image
      points.push(new THREE.Vector3(0, objectTipY, f)); // through focal point at axis height... 
      // Actually, parallel ray bends through focal point on image side
      // The ray hits the lens at height tipY, then goes through focal point (0, axisY, f)
      // and continues to the image
      const focalZ = f;
      // Direction from (0, tipY, 0) to (0, axisY, focalZ) where axisY is the axis height
      const axisY = objectTipY; // optical axis height
      // Actually for a thin lens, a ray parallel to the axis refracts through the focal point
      // Focal point is on the axis at z = f
      // So the ray goes from (0, tipY, 0) toward (0, axisY, f) and beyond
      const dirY = axisY - tipY;
      const dirZ = focalZ;
      const extend = 25;
      const t = extend / dirZ;
      points.length = 2; // reset
      points[0] = new THREE.Vector3(0, tipY, objZ);
      points[1] = new THREE.Vector3(0, tipY, lensZ);
      points.push(new THREE.Vector3(0, tipY + dirY * t, lensZ + dirZ * t));
    } else {
      // Virtual image: ray appears to diverge from virtual focal point
      const axisY = objectTipY;
      const focalZ = f;
      const dirY = axisY - tipY;
      const dirZ = focalZ;
      const extend = 25;
      const t = extend / dirZ;
      points.push(new THREE.Vector3(0, tipY + dirY * t, lensZ + dirZ * t));
    }
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(geom, rayMaterial);
    scene.add(line);
    rayLines.push(line);
  }

  // Ray 2: Through center of lens (straight line)
  {
    const axisY = objectTipY;
    const centerY = axisY; // center of lens is on the axis
    // Ray from object tip through lens center goes straight
    const dirY = centerY - tipY;
    const dirZ = lensZ - objZ;
    const len = Math.sqrt(dirY * dirY + dirZ * dirZ);
    const normY = dirY / len;
    const normZ = dirZ / len;
    const extend = 30;

    const points = [
      new THREE.Vector3(0, tipY - normY * (extend * Math.abs(objZ) / dirZ), objZ - extend),
      new THREE.Vector3(0, tipY, objZ),
      new THREE.Vector3(0, tipY + normY * extend, objZ + normZ * extend)
    ];
    // Simpler: just go from object tip through center and extend
    const points2 = [
      new THREE.Vector3(0, tipY, objZ),
      new THREE.Vector3(0, centerY, lensZ),
      new THREE.Vector3(0, centerY - (tipY - centerY), lensZ + (lensZ - objZ))
    ];
    // Even simpler: direction from tip to center, extend far
    const dx = 0;
    const dy = centerY - tipY;
    const dz = lensZ - objZ;
    const t2 = 25 / dz;
    const points3 = [
      new THREE.Vector3(0, tipY, objZ),
      new THREE.Vector3(0, tipY + dy * t2, objZ + dz * t2)
    ];

    const geom = new THREE.BufferGeometry().setFromPoints(points3);
    const line = new THREE.Line(geom, rayMaterial);
    scene.add(line);
    rayLines.push(line);
  }

  // Ray 3: Through near focal point, then parallel after lens
  {
    const axisY = objectTipY;
    const nearFocalZ = -f;
    // Ray from object tip aimed at near focal point
    // Direction from tip to near focal point
    const dy = axisY - tipY;
    const dz = nearFocalZ - objZ;

    // Find where this ray hits the lens (z=0)
    const t = (lensZ - objZ) / dz;
    const hitY = tipY + dy * t;

    const points = [
      new THREE.Vector3(0, tipY, objZ),
      new THREE.Vector3(0, hitY, lensZ),
      new THREE.Vector3(0, hitY, lensZ + 25) // exits parallel to axis
    ];

    const geom = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(geom, rayMaterial);
    scene.add(line);
    rayLines.push(line);
  }
}

// --- Optics Computation ---
function updateOptics() {
  const doVal = Math.abs(state.objectZ);
  const f = state.focalLength;

  // Thin lens equation: 1/f = 1/do + 1/di => di = 1/(1/f - 1/do) = do*f/(do-f)
  let di;
  const denom = doVal - f;
  if (Math.abs(denom) < 0.001) {
    di = 100000; // near infinity
  } else {
    di = (doVal * f) / denom;
  }

  const m = -di / doVal;
  const isReal = di > 0 && isFinite(di) && Math.abs(di) < 10000;

  // Update object position
  if (avocadoObject) {
    avocadoObject.position.z = state.objectZ;
  }

  // Update image
  if (avocadoImage) {
    if (isReal) {
      avocadoImage.visible = true;
      avocadoImage.position.z = di;

      // Scale: m = -di/do, negative means inverted
      const absM = Math.abs(m);
      avocadoImage.scale.copy(avocadoObject.scale);
      avocadoImage.scale.x *= absM;
      avocadoImage.scale.y *= m; // negative flips
      avocadoImage.scale.z *= absM;

      // Position Y: if inverted, need to adjust
      const box = new THREE.Box3().setFromObject(avocadoObject);
      const objMinY = box.min.y;
      if (m < 0) {
        // Inverted image
        const imgBox = new THREE.Box3().setFromObject(avocadoImage);
        avocadoImage.position.y = avocadoObject.position.y;
      } else {
        avocadoImage.position.y = avocadoObject.position.y;
      }
      avocadoImage.position.x = 0;
    } else {
      avocadoImage.visible = false;
    }
  }

  // Update focal markers
  focalMarkerNear.position.z = -f;
  focalMarkerFar.position.z = f;

  // Update rays
  createRays();

  // Update HUD
  const hudDo = document.getElementById('hud-do');
  const hudDi = document.getElementById('hud-di');
  const hudMag = document.getElementById('hud-mag');
  const hudFocal = document.getElementById('hud-focal');
  const hudImageType = document.getElementById('hud-image-type');

  const displayDi = Math.abs(di) > 9999 ? '∞' : di.toFixed(2);
  const displayM = Math.abs(di) > 9999 ? '∞' : m.toFixed(2);

  hudDo.textContent = doVal.toFixed(2);
  hudDi.textContent = displayDi;
  hudMag.textContent = displayM;
  hudFocal.textContent = f.toFixed(2);

  if (isReal) {
    hudImageType.textContent = 'Real Image';
    hudImageType.className = 'real-image';
  } else {
    hudImageType.textContent = 'Virtual Image';
    hudImageType.className = 'virtual-image';
  }

  // Update global state
  window.__3D_STATE__.objectZ = state.objectZ;
  window.__3D_STATE__.focalLength = state.focalLength;
  window.__3D_STATE__.objectDistance = doVal;
  window.__3D_STATE__.imageDistance = Math.abs(di) > 9999 ? Infinity : di;
  window.__3D_STATE__.magnification = Math.abs(di) > 9999 ? Infinity : m;
  window.__3D_STATE__.imageVisible = isReal;
  window.__3D_STATE__.imageZ = isReal ? di : 0;
  window.__3D_STATE__.raysVisible = state.raysVisible;
  window.__3D_STATE__.savedStateExists = localStorage.getItem('lensOpticsSave') !== null;
  window.__3D_STATE__.avocadoLoaded = state.avocadoLoaded;
  window.__3D_STATE__.rayCount = state.raysVisible ? rayLines.length : 0;
  window.__3D_STATE__.imageScaleY = avocadoImage && avocadoObject ? m : 0;
  window.__3D_STATE__.hudDoValue = parseFloat(hudDo.textContent) || 0;
  window.__3D_STATE__.hudDiValue = parseFloat(hudDi.textContent) || 0;
  window.__3D_STATE__.hudMagValue = parseFloat(hudMag.textContent) || 0;
  window.__3D_STATE__.stateVersion = state.stateVersion;
}

// --- Dragging ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false;
let dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

renderer.domElement.addEventListener('pointerdown', (e) => {
  if (!avocadoObject) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObject(avocadoObject, true);
  if (intersects.length > 0) {
    isDragging = true;
    controls.enabled = false;
    // Create a drag plane perpendicular to camera but along Z
    const camDir = new THREE.Vector3();
    camera.getWorldDirection(camDir);
    dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -intersects[0].point.y);
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!isDragging || !avocadoObject) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const intersection = new THREE.Vector3();
  raycaster.ray.intersectPlane(dragPlane, intersection);
  if (intersection) {
    let newZ = Math.max(-25, Math.min(-2, intersection.z));
    state.objectZ = newZ;
    updateOptics();
  }
});

renderer.domElement.addEventListener('pointerup', () => {
  isDragging = false;
  controls.enabled = true;
});

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowUp':
      e.preventDefault();
      state.objectZ = Math.min(-2, state.objectZ + 0.5);
      updateOptics();
      break;
    case 'ArrowDown':
      e.preventDefault();
      state.objectZ = Math.max(-25, state.objectZ - 0.5);
      updateOptics();
      break;
    case 'r':
    case 'R':
      toggleRays();
      break;
    case 's':
    case 'S':
      saveState();
      break;
    case 'l':
    case 'L':
      loadState();
      break;
  }
});

// --- Button Handlers ---
document.getElementById('btn-focal-up').addEventListener('click', () => {
  state.focalLength = Math.min(15, state.focalLength + 1.0);
  updateOptics();
});

document.getElementById('btn-focal-down').addEventListener('click', () => {
  state.focalLength = Math.max(2, state.focalLength - 1.0);
  updateOptics();
});

document.getElementById('btn-toggle-rays').addEventListener('click', toggleRays);
document.getElementById('btn-save').addEventListener('click', saveState);
document.getElementById('btn-load').addEventListener('click', loadState);
document.getElementById('btn-reset').addEventListener('click', resetState);

function toggleRays() {
  state.raysVisible = !state.raysVisible;
  if (!state.raysVisible) {
    clearRays();
    window.__3D_STATE__.rayCount = 0;
  }
  updateOptics();
}

function saveState() {
  state.stateVersion++;
  const saveData = {
    objectZ: state.objectZ,
    focalLength: state.focalLength,
    raysVisible: state.raysVisible,
    stateVersion: state.stateVersion
  };
  localStorage.setItem('lensOpticsSave', JSON.stringify(saveData));
  window.__3D_STATE__.savedStateExists = true;
  window.__3D_STATE__.stateVersion = state.stateVersion;
  updateOptics();
}

function loadState() {
  const data = localStorage.getItem('lensOpticsSave');
  if (!data) return;
  try {
    const parsed = JSON.parse(data);
    state.objectZ = parsed.objectZ;
    state.focalLength = parsed.focalLength;
    state.raysVisible = parsed.raysVisible;
    state.stateVersion = parsed.stateVersion;
    updateOptics();
  } catch (e) {
    console.error('Failed to load state:', e);
  }
}

function resetState() {
  state.objectZ = -12;
  state.focalLength = 5.0;
  state.raysVisible = true;
  updateOptics();
}

// --- Window Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();
updateOptics();
</script>
</body>
