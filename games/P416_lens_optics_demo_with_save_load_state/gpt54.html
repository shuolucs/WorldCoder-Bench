<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thin Lens Optics Demo</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #hud-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 240px;
      z-index: 10;
      line-height: 1.5;
      font-size: 14px;
    }

    #hud-panel .row {
      margin: 2px 0;
    }

    #hud-panel .label {
      display: inline-block;
      width: 130px;
      color: #bbb;
    }

    #controls {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      padding: 8px 10px;
      background: #1f1f1f;
      color: white;
      border: 1px solid #555;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #2b2b2b;
    }

    #help {
      margin-top: 10px;
      color: #aaa;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="hud-panel">
    <div class="row"><span class="label">Object distance:</span> <span id="hud-do">12.00</span></div>
    <div class="row"><span class="label">Image distance:</span> <span id="hud-di">8.57</span></div>
    <div class="row"><span class="label">Magnification:</span> <span id="hud-mag">-0.71</span></div>
    <div class="row"><span class="label">Focal length:</span> <span id="hud-focal">5.00</span></div>
    <div class="row"><span class="label">Image type:</span> <span id="hud-image-type">Real Image</span></div>

    <div id="controls">
      <button id="btn-focal-up">Increase Focal Length</button>
      <button id="btn-focal-down">Decrease Focal Length</button>
      <button id="btn-save">Save State</button>
      <button id="btn-load">Load State</button>
      <button id="btn-reset">Reset</button>
      <button id="btn-toggle-rays">Toggle Rays</button>
    </div>

    <div id="help">
      Drag avocado along bench • Arrow Up/Down move object • R toggle rays • S save • L load
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);

    const directional = new THREE.DirectionalLight(0xffffff, 0.8);
    directional.position.set(10, 10, 10);
    scene.add(directional);

    const benchGeo = new THREE.BoxGeometry(2, 0.2, 50);
    const benchMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
    const bench = new THREE.Mesh(benchGeo, benchMat);
    bench.position.set(0, 0, 0);
    scene.add(bench);

    const lensGeo = new THREE.PlaneGeometry(0.1, 4);
    const lensMat = new THREE.MeshStandardMaterial({
      color: 0x88ccff,
      transparent: true,
      opacity: 0.5,
      side: THREE.DoubleSide
    });
    const lens = new THREE.Mesh(lensGeo, lensMat);
    lens.position.set(0, 2, 0);
    scene.add(lens);

    const axisMat = new THREE.LineBasicMaterial({ color: 0x666666 });
    const axisPts = [
      new THREE.Vector3(0, 1.0, -25),
      new THREE.Vector3(0, 1.0, 25)
    ];
    const axisGeom = new THREE.BufferGeometry().setFromPoints(axisPts);
    const axisLine = new THREE.Line(axisGeom, axisMat);
    scene.add(axisLine);

    const state = {
      objectZ: -12,
      focalLength: 5.0,
      objectDistance: 12,
      imageDistance: 0,
      magnification: 0,
      imageVisible: false,
      imageZ: 0,
      raysVisible: true,
      avocadoLoaded: false,
      stateVersion: 0
    };

    window.__3D_STATE__ = {};

    const hudDo = document.getElementById("hud-do");
    const hudDi = document.getElementById("hud-di");
    const hudMag = document.getElementById("hud-mag");
    const hudFocal = document.getElementById("hud-focal");
    const hudImageType = document.getElementById("hud-image-type");

    const btnFocalUp = document.getElementById("btn-focal-up");
    const btnFocalDown = document.getElementById("btn-focal-down");
    const btnSave = document.getElementById("btn-save");
    const btnLoad = document.getElementById("btn-load");
    const btnReset = document.getElementById("btn-reset");
    const btnToggleRays = document.getElementById("btn-toggle-rays");

    let avocadoObject = null;
    let avocadoImage = null;
    let objectBox = new THREE.Box3();
    let dragPlane = new THREE.Plane(new THREE.Vector3(1, 0, 0), 0);
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let dragging = false;
    let dragOffsetZ = 0;

    const rayGroup = new THREE.Group();
    scene.add(rayGroup);

    function clampObjectZ(z) {
      return THREE.MathUtils.clamp(z, -25, -2);
    }

    function clearRays() {
      while (rayGroup.children.length > 0) {
        const c = rayGroup.children[0];
        rayGroup.remove(c);
        if (c.geometry) c.geometry.dispose();
        if (c.material) c.material.dispose();
      }
    }

    function addRay(points) {
      const mat = new THREE.LineBasicMaterial({ color: 0xffff00 });
      const geom = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(geom, mat);
      rayGroup.add(line);
    }

    function getObjectTipWorld() {
      if (!avocadoObject) return new THREE.Vector3(0, 2.5, state.objectZ);
      objectBox.setFromObject(avocadoObject);
      const centerX = (objectBox.min.x + objectBox.max.x) * 0.5;
      const tipY = objectBox.max.y;
      const centerZ = (objectBox.min.z + objectBox.max.z) * 0.5;
      return new THREE.Vector3(centerX, tipY, centerZ);
    }

    function computeOptics() {
      const f = state.focalLength;
      const doVal = Math.abs(state.objectZ);
      state.objectDistance = doVal;

      const eps = 1e-6;
      if (Math.abs(doVal - f) < eps) {
        state.imageDistance = Infinity;
        state.magnification = -Infinity;
        state.imageVisible = false;
        state.imageZ = 0;
        return;
      }

      const denom = (1 / f) - (1 / doVal);
      if (!Number.isFinite(denom) || Math.abs(denom) < eps) {
        state.imageDistance = Infinity;
        state.magnification = -Infinity;
        state.imageVisible = false;
        state.imageZ = 0;
        return;
      }

      const di = 1 / denom;
      const m = -di / doVal;

      state.imageDistance = di;
      state.magnification = m;
      state.imageVisible = di > 0 && Number.isFinite(di);
      state.imageZ = state.imageVisible ? di : 0;
    }

    function updateImageModel() {
      if (!avocadoObject || !avocadoImage) return;

      if (!state.imageVisible || !Number.isFinite(state.imageDistance) || !Number.isFinite(state.magnification)) {
        avocadoImage.visible = false;
        return;
      }

      const absM = Math.abs(state.magnification);
      avocadoImage.visible = true;
      avocadoImage.position.set(0, 0, state.imageDistance);
      avocadoImage.scale.set(absM, state.magnification, absM);
    }

    function updateRays() {
      clearRays();
      if (!state.raysVisible || !avocadoObject) return;

      const objTip = getObjectTipWorld();
      const lensCenter = new THREE.Vector3(0, objTip.y, 0);
      const opticalAxisY = 1.0;
      const focalNear = new THREE.Vector3(0, opticalAxisY, -state.focalLength);
      const focalFar = new THREE.Vector3(0, opticalAxisY, state.focalLength);

      const farZ = 25;
      const imagePoint = state.imageVisible && Number.isFinite(state.imageDistance)
        ? new THREE.Vector3(0, opticalAxisY + (objTip.y - opticalAxisY) * state.magnification, state.imageDistance)
        : null;

      // Ray 1: parallel to axis, then through far focal point
      {
        const p1 = objTip.clone();
        const p2 = new THREE.Vector3(0, objTip.y, 0);
        if (state.imageVisible && imagePoint) {
          addRay([p1, p2, imagePoint]);
        } else {
          const dir = focalFar.clone().sub(p2).normalize();
          const p3 = p2.clone().add(dir.multiplyScalar(farZ));
          addRay([p1, p2, p3]);
        }
      }

      // Ray 2: through center of lens straight
      {
        const p1 = objTip.clone();
        const p2 = new THREE.Vector3(0, opticalAxisY, 0);
        const dir = p2.clone().sub(p1).normalize();
        const p0 = p1.clone();
        const p3 = p2.clone().add(dir.multiplyScalar(farZ));
        addRay([p0, p2, p3]);
      }

      // Ray 3: through near focal point, then parallel to axis
      {
        const p1 = objTip.clone();
        const p2 = new THREE.Vector3(0, opticalAxisY, 0);
        const lineDir = p2.clone().sub(focalNear).normalize();
        const t = (0 - p1.x) / (lineDir.x === 0 ? 1e-6 : lineDir.x);
        let throughLensPoint = p1.clone().add(lineDir.clone().multiplyScalar(t));
        throughLensPoint.x = 0;

        const pLens = new THREE.Vector3(0, throughLensPoint.y, 0);
        const p3 = new THREE.Vector3(0, throughLensPoint.y, farZ);
        addRay([p1, pLens, p3]);
      }
    }

    function updateHUD() {
      hudDo.textContent = Number.isFinite(state.objectDistance) ? state.objectDistance.toFixed(2) : "∞";
      hudDi.textContent = Number.isFinite(state.imageDistance) ? state.imageDistance.toFixed(2) : "∞";
      hudMag.textContent = Number.isFinite(state.magnification) ? state.magnification.toFixed(2) : "∞";
      hudFocal.textContent = state.focalLength.toFixed(2);
      hudImageType.textContent = state.imageVisible ? "Real Image" : "Virtual Image";
    }

    function updateStateExposure() {
      window.__3D_STATE__ = {
        objectZ: state.objectZ,
        focalLength: state.focalLength,
        objectDistance: state.objectDistance,
        imageDistance: state.imageDistance,
        magnification: state.magnification,
        imageVisible: state.imageVisible,
        imageZ: state.imageZ,
        raysVisible: state.raysVisible,
        savedStateExists: localStorage.getItem("lensOpticsSave") !== null,
        avocadoLoaded: state.avocadoLoaded,
        rayCount: state.raysVisible ? rayGroup.children.length : 0,
        imageScaleY: avocadoImage ? avocadoImage.scale.y : 0,
        hudDoValue: parseFloat(hudDo.textContent),
        hudDiValue: hudDi.textContent === "∞" ? Infinity : parseFloat(hudDi.textContent),
        hudMagValue: hudMag.textContent === "∞" ? Infinity : parseFloat(hudMag.textContent),
        stateVersion: state.stateVersion
      };
    }

    function applySceneState() {
      if (avocadoObject) avocadoObject.position.z = state.objectZ;
      computeOptics();
      updateImageModel();
      updateRays();
      updateHUD();
      updateStateExposure();
    }

    function saveState() {
      state.stateVersion += 1;
      const data = {
        objectZ: state.objectZ,
        focalLength: state.focalLength,
        raysVisible: state.raysVisible,
        stateVersion: state.stateVersion
      };
      localStorage.setItem("lensOpticsSave", JSON.stringify(data));
      updateStateExposure();
    }

    function loadState() {
      const raw = localStorage.getItem("lensOpticsSave");
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        state.objectZ = clampObjectZ(Number.isFinite(data.objectZ) ? data.objectZ : -12);
        state.focalLength = THREE.MathUtils.clamp(
          Number.isFinite(data.focalLength) ? data.focalLength : 5,
          2,
          15
        );
        state.raysVisible = !!data.raysVisible;
        state.stateVersion = Number.isInteger(data.stateVersion) ? data.stateVersion : 0;
        applySceneState();
      } catch (e) {
        console.warn("Failed to load saved state:", e);
      }
    }

    function resetState() {
      state.objectZ = -12;
      state.focalLength = 5;
      state.raysVisible = true;
      applySceneState();
    }

    btnFocalUp.addEventListener("click", () => {
      state.focalLength = Math.min(15, state.focalLength + 1);
      applySceneState();
    });

    btnFocalDown.addEventListener("click", () => {
      state.focalLength = Math.max(2, state.focalLength - 1);
      applySceneState();
    });

    btnSave.addEventListener("click", saveState);
    btnLoad.addEventListener("click", loadState);
    btnReset.addEventListener("click", resetState);
    btnToggleRays.addEventListener("click", () => {
      state.raysVisible = !state.raysVisible;
      applySceneState();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") {
        state.objectZ = clampObjectZ(state.objectZ + 0.5);
        applySceneState();
      } else if (e.key === "ArrowDown") {
        state.objectZ = clampObjectZ(state.objectZ - 0.5);
        applySceneState();
      } else if (e.key.toLowerCase() === "r") {
        state.raysVisible = !state.raysVisible;
        applySceneState();
      } else if (e.key.toLowerCase() === "s") {
        saveState();
      } else if (e.key.toLowerCase() === "l") {
        loadState();
      }
    });

    function pointerToNDC(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    renderer.domElement.addEventListener("pointerdown", (event) => {
      if (!avocadoObject) return;
      pointerToNDC(event);
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObject(avocadoObject, true);
      if (intersects.length > 0) {
        dragging = true;
        controls.enabled = false;

        const hitPoint = intersects[0].point.clone();
        dragOffsetZ = state.objectZ - hitPoint.z;
      }
    });

    renderer.domElement.addEventListener("pointermove", (event) => {
      if (!dragging) return;

      pointerToNDC(event);
      raycaster.setFromCamera(mouse, camera);
      const hit = new THREE.Vector3();

      if (raycaster.ray.intersectPlane(dragPlane, hit)) {
        state.objectZ = clampObjectZ(hit.z + dragOffsetZ);
        applySceneState();
      }
    });

    function endDrag() {
      dragging = false;
      controls.enabled = true;
    }

    renderer.domElement.addEventListener("pointerup", endDrag);
    renderer.domElement.addEventListener("pointerleave", endDrag);

    const loader = new GLTFLoader();
    loader.load(
      "Avocado.glb",
      (gltf) => {
        avocadoObject = gltf.scene;
        scene.add(avocadoObject);

        objectBox.setFromObject(avocadoObject);
        const size = new THREE.Vector3();
        objectBox.getSize(size);
        const scaleFactor = 1.5 / Math.max(size.y, 0.0001);
        avocadoObject.scale.setScalar(scaleFactor);
        objectBox.setFromObject(avocadoObject);

        const postSize = new THREE.Vector3();
        objectBox.getSize(postSize);
        objectBox.setFromObject(avocadoObject);

        avocadoObject.position.set(0, 0, state.objectZ);

        objectBox.setFromObject(avocadoObject);
        const minY = objectBox.min.y;
        avocadoObject.position.y += -minY;
        avocadoObject.position.x = 0;

        avocadoImage = avocadoObject.clone(true);
        scene.add(avocadoImage);

        state.avocadoLoaded = true;
        applySceneState();
      },
      undefined,
      (err) => {
        console.warn("Failed to load Avocado.glb, using fallback geometry.", err);

        const group = new THREE.Group();
        const body = new THREE.Mesh(
          new THREE.SphereGeometry(0.6, 32, 24),
          new THREE.MeshStandardMaterial({ color: 0x6b8e23 })
        );
        body.scale.y = 1.3;
        body.position.y = 0.9;

        const pit = new THREE.Mesh(
          new THREE.SphereGeometry(0.22, 24, 16),
          new THREE.MeshStandardMaterial({ color: 0x7a3b12 })
        );
        pit.position.set(0.15, 0.5, 0.45);

        group.add(body, pit);
        avocadoObject = group;
        scene.add(avocadoObject);

        objectBox.setFromObject(avocadoObject);
        const size = new THREE.Vector3();
        objectBox.getSize(size);
        const scaleFactor = 1.5 / Math.max(size.y, 0.0001);
        avocadoObject.scale.setScalar(scaleFactor);

        avocadoObject.position.set(0, 0, state.objectZ);
        objectBox.setFromObject(avocadoObject);
        avocadoObject.position.y += -objectBox.min.y;
        avocadoObject.position.x = 0;

        avocadoImage = avocadoObject.clone(true);
        scene.add(avocadoImage);

        state.avocadoLoaded = true;
        applySceneState();
      }
    );

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    applySceneState();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateStateExposure();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
