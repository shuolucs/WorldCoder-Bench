<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Network Topology Graph</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
    }

    #uiPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(18, 18, 32, 0.82);
      border: 1px solid rgba(120, 120, 180, 0.35);
      border-radius: 10px;
      padding: 12px;
      color: #e8e8ff;
      min-width: 180px;
      box-shadow: 0 0 16px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
    }

    #uiPanel button {
      display: block;
      width: 100%;
      margin: 6px 0;
      padding: 8px 10px;
      background: #1d2240;
      color: #f0f4ff;
      border: 1px solid #4c5aa0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    #uiPanel button:hover {
      background: #2a3260;
    }

    #statusLabel {
      margin-top: 10px;
      font-size: 13px;
      color: #99ffcc;
    }

    #help {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(18, 18, 32, 0.72);
      border: 1px solid rgba(120, 120, 180, 0.25);
      border-radius: 10px;
      padding: 10px 12px;
      color: #cfd6ff;
      font-size: 13px;
      line-height: 1.45;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <div id="uiPanel">
    <button id="saveBtn">Save State</button>
    <button id="loadBtn">Load State</button>
    <button id="resetBtn">Reset</button>
    <div id="statusLabel">Ready</div>
  </div>

  <div id="help">
    <strong>Controls</strong><br/>
    Click node: select<br/>
    D: toggle active/inactive<br/>
    A: add edge between last two selected nodes<br/>
    R: remove all edges from selected node
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 15, 25);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(40, 20, 0x222244, 0x222244);
    grid.position.y = 0;
    grid.material.opacity = 0.4;
    grid.material.transparent = true;
    scene.add(grid);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const statusLabel = document.getElementById("statusLabel");

    const defaultNodeDefs = [
      { index: 0, name: "Router", type: "router", pos: [0, 3, 0], color: 0xff4444 },
      { index: 1, name: "Server-1", type: "server", pos: [-5, 2, -3], color: 0x44ff44 },
      { index: 2, name: "Server-2", type: "server", pos: [5, 2, -3], color: 0x44ff44 },
      { index: 3, name: "WS-1", type: "workstation", pos: [-7, 1, 3], color: 0x4488ff },
      { index: 4, name: "WS-2", type: "workstation", pos: [7, 1, 3], color: 0x4488ff },
      { index: 5, name: "WS-3", type: "workstation", pos: [-3, 1, 7], color: 0x4488ff },
      { index: 6, name: "Mobile", type: "mobile", pos: [3, 0, 7], color: 0xffffff },
      { index: 7, name: "Firewall", type: "firewall", pos: [0, 2, -6], color: 0xffaa00 },
    ];

    const defaultEdges = [
      [0,1],[0,2],[0,7],[1,3],[1,5],[2,4],[2,6],[7,1],[7,2]
    ];

    window.__3D_STATE__ = {
      nodeCount: 8,
      edgeCount: 9,
      selectedNodeIndex: -1,
      lastSelectedNodeIndex: -1,
      nodesActive: new Array(8).fill(true),
      edgeList: defaultEdges.map(e => [...e]),
      activePacketCount: 0,
      stateSaved: false,
      stateLoaded: false,
      mobileNodeLoaded: false,
      cameraDistance: camera.position.distanceTo(new THREE.Vector3(0,0,0))
    };

    const nodes = [];
    const nodeObjects = [];
    const labels = [];
    const packets = [];
    let edgeObjects = [];
    let mobileTemplate = null;
    let packetSpawnTimer = 0;

    function makeLabelSprite(text) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 96;
      const ctx = canvas.getContext("2d");

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(10,10,26,0.75)";
      ctx.fillRect(8, 20, 240, 52);
      ctx.strokeStyle = "rgba(0,255,200,0.6)";
      ctx.lineWidth = 2;
      ctx.strokeRect(8, 20, 240, 52);

      ctx.font = "28px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#ffffff";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(4, 1.5, 1);
      return sprite;
    }

    function createNodeMesh(def) {
      let mesh;

      if (def.type === "router") {
        mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.8, 32, 32),
          new THREE.MeshStandardMaterial({
            color: def.color,
            emissive: 0x000000,
            emissiveIntensity: 1
          })
        );
      } else if (def.type === "server") {
        mesh = new THREE.Mesh(
          new THREE.BoxGeometry(1, 1.5, 1),
          new THREE.MeshStandardMaterial({
            color: def.color,
            emissive: 0x000000,
            emissiveIntensity: 1
          })
        );
      } else if (def.type === "workstation") {
        mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.5, 24, 24),
          new THREE.MeshStandardMaterial({
            color: def.color,
            emissive: 0x000000,
            emissiveIntensity: 1
          })
        );
      } else if (def.type === "firewall") {
        mesh = new THREE.Mesh(
          new THREE.OctahedronGeometry(0.7),
          new THREE.MeshStandardMaterial({
            color: def.color,
            emissive: 0x000000,
            emissiveIntensity: 1,
            flatShading: true
          })
        );
      } else {
        mesh = new THREE.Mesh(
          new THREE.BoxGeometry(1, 0.5, 2),
          new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0x000000,
            emissiveIntensity: 1
          })
        );
      }

      mesh.position.set(...def.pos);
      mesh.userData.nodeIndex = def.index;
      mesh.userData.baseColor = def.color;
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      return mesh;
    }

    function applyMaterialStateToObject(obj, nodeIndex) {
      const active = window.__3D_STATE__.nodesActive[nodeIndex];
      const selected = window.__3D_STATE__.selectedNodeIndex === nodeIndex;

      obj.traverse((child) => {
        if (child.isMesh && child.material) {
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(mat => {
            if (mat.color) {
              const baseColor = child.userData.baseColor ?? obj.userData.baseColor ?? defaultNodeDefs[nodeIndex].color;
              mat.color.setHex(active ? baseColor : 0x555555);
            }
            if ("emissive" in mat) {
              if (selected) {
                mat.emissive.setHex(0xffff66);
                mat.emissiveIntensity = 0.9;
              } else {
                mat.emissive.setHex(active ? 0x111111 : 0x000000);
                mat.emissiveIntensity = active ? 0.25 : 0.05;
              }
            }
          });
        }
      });
    }

    function createNodes() {
      for (const def of defaultNodeDefs) {
        if (def.type === "mobile") {
          const placeholder = new THREE.Group();
          placeholder.position.set(...def.pos);
          placeholder.userData.nodeIndex = def.index;
          placeholder.userData.baseColor = def.color;

          const helperMesh = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 0.4, 2),
            new THREE.MeshStandardMaterial({
              color: 0xffffff,
              emissive: 0x000000,
              emissiveIntensity: 1
            })
          );
          helperMesh.userData.baseColor = 0xffffff;
          placeholder.add(helperMesh);
          scene.add(placeholder);
          nodes[def.index] = placeholder;
          nodeObjects.push(placeholder);

          const label = makeLabelSprite(def.name);
          label.position.set(def.pos[0], def.pos[1] + 1.5, def.pos[2]);
          labels[def.index] = label;
          scene.add(label);
        } else {
          const mesh = createNodeMesh(def);
          mesh.userData.baseColor = def.color;
          scene.add(mesh);
          nodes[def.index] = mesh;
          nodeObjects.push(mesh);

          const label = makeLabelSprite(def.name);
          let yOffset = 1.3;
          if (def.type === "server") yOffset = 1.7;
          if (def.type === "router") yOffset = 1.6;
          if (def.type === "firewall") yOffset = 1.5;
          label.position.set(def.pos[0], def.pos[1] + yOffset, def.pos[2]);
          labels[def.index] = label;
          scene.add(label);
        }
      }

      updateAllNodeVisuals();
    }

    function loadMobileModel() {
      const loader = new GLTFLoader();
      loader.load(
        "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/ToyCar/glTF-Binary/ToyCar.glb",
        (gltf) => {
          mobileTemplate = gltf.scene;
          mobileTemplate.scale.setScalar(2.0);

          const old = nodes[6];
          const pos = old.position.clone();
          scene.remove(old);

          const mobile = mobileTemplate.clone(true);
          mobile.position.copy(pos);
          mobile.userData.nodeIndex = 6;
          mobile.userData.baseColor = 0xffffff;

          mobile.traverse((child) => {
            if (child.isMesh) {
              child.userData.baseColor = 0xffffff;
              child.material = child.material.clone();
            }
          });

          scene.add(mobile);
          nodes[6] = mobile;
          const idx = nodeObjects.indexOf(old);
          if (idx >= 0) nodeObjects[idx] = mobile;

          window.__3D_STATE__.mobileNodeLoaded = true;
          updateAllNodeVisuals();
          updateEdges();
        },
        undefined,
        () => {
          window.__3D_STATE__.mobileNodeLoaded = false;
        }
      );
    }

    function getNodePosition(index) {
      return nodes[index].position.clone();
    }

    function edgeKey(a, b) {
      return a < b ? `${a}-${b}` : `${b}-${a}`;
    }

    function createEdgeObject(i, j) {
      const p1 = getNodePosition(i);
      const p2 = getNodePosition(j);

      const geometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);

      const bothActive = window.__3D_STATE__.nodesActive[i] && window.__3D_STATE__.nodesActive[j];

      let line;
      if (bothActive) {
        const material = new THREE.LineBasicMaterial({
          color: 0x00ffaa,
          transparent: true,
          opacity: 0.6
        });
        line = new THREE.Line(geometry, material);
      } else {
        const material = new THREE.LineDashedMaterial({
          color: 0x557777,
          transparent: true,
          opacity: 0.3,
          dashSize: 0.5,
          gapSize: 0.3
        });
        line = new THREE.Line(geometry, material);
        line.computeLineDistances();
      }

      line.userData = { i, j, key: edgeKey(i, j) };
      scene.add(line);
      return line;
    }

    function clearEdges() {
      edgeObjects.forEach(edge => {
        scene.remove(edge);
        edge.geometry.dispose();
        edge.material.dispose();
      });
      edgeObjects = [];
    }

    function updateEdges() {
      clearEdges();
      for (const [i, j] of window.__3D_STATE__.edgeList) {
        const edge = createEdgeObject(i, j);
        edgeObjects.push(edge);
      }
      window.__3D_STATE__.edgeCount = window.__3D_STATE__.edgeList.length;
    }

    function updateAllNodeVisuals() {
      for (let i = 0; i < nodes.length; i++) {
        applyMaterialStateToObject(nodes[i], i);
        const labelPos = getNodePosition(i);
        let yOffset = 1.4;
        if (i === 0) yOffset = 1.6;
        if (i === 1 || i === 2) yOffset = 1.8;
        if (i === 6) yOffset = 1.6;
        labels[i].position.set(labelPos.x, labelPos.y + yOffset, labelPos.z);
      }
    }

    function setSelectedNode(index) {
      if (index === window.__3D_STATE__.selectedNodeIndex) return;
      window.__3D_STATE__.lastSelectedNodeIndex = window.__3D_STATE__.selectedNodeIndex;
      window.__3D_STATE__.selectedNodeIndex = index;
      updateAllNodeVisuals();
    }

    function toggleSelectedNodeActive() {
      const i = window.__3D_STATE__.selectedNodeIndex;
      if (i < 0) return;
      window.__3D_STATE__.nodesActive[i] = !window.__3D_STATE__.nodesActive[i];
      updateAllNodeVisuals();
      updateEdges();
    }

    function addEdgeBetweenLastTwoSelected() {
      const a = window.__3D_STATE__.lastSelectedNodeIndex;
      const b = window.__3D_STATE__.selectedNodeIndex;
      if (a < 0 || b < 0 || a === b) return;

      const exists = window.__3D_STATE__.edgeList.some(([i, j]) => edgeKey(i, j) === edgeKey(a, b));
      if (!exists) {
        window.__3D_STATE__.edgeList.push([a, b]);
        updateEdges();
      }
    }

    function removeEdgesForSelected() {
      const s = window.__3D_STATE__.selectedNodeIndex;
      if (s < 0) return;
      window.__3D_STATE__.edgeList = window.__3D_STATE__.edgeList.filter(([i, j]) => i !== s && j !== s);
      updateEdges();
    }

    function serializeState() {
      return JSON.stringify({
        nodePositions: nodes.map(n => [n.position.x, n.position.y, n.position.z]),
        nodesActive: [...window.__3D_STATE__.nodesActive],
        edgeList: window.__3D_STATE__.edgeList.map(e => [...e]),
        selectedNodeIndex: window.__3D_STATE__.selectedNodeIndex,
        lastSelectedNodeIndex: window.__3D_STATE__.lastSelectedNodeIndex
      });
    }

    function applySavedState(saved) {
      if (!saved) return;
      if (saved.nodePositions && saved.nodePositions.length === nodes.length) {
        saved.nodePositions.forEach((p, i) => {
          nodes[i].position.set(p[0], p[1], p[2]);
        });
      }

      if (saved.nodesActive && saved.nodesActive.length === nodes.length) {
        window.__3D_STATE__.nodesActive = [...saved.nodesActive];
      }

      if (saved.edgeList) {
        window.__3D_STATE__.edgeList = saved.edgeList.map(e => [...e]);
      }

      window.__3D_STATE__.selectedNodeIndex = typeof saved.selectedNodeIndex === "number" ? saved.selectedNodeIndex : -1;
      window.__3D_STATE__.lastSelectedNodeIndex = typeof saved.lastSelectedNodeIndex === "number" ? saved.lastSelectedNodeIndex : -1;

      updateAllNodeVisuals();
      updateEdges();
      window.__3D_STATE__.stateLoaded = true;
      statusLabel.textContent = "Loaded!";
    }

    function resetState() {
      defaultNodeDefs.forEach(def => {
        nodes[def.index].position.set(...def.pos);
      });

      window.__3D_STATE__.nodeCount = 8;
      window.__3D_STATE__.edgeCount = defaultEdges.length;
      window.__3D_STATE__.selectedNodeIndex = -1;
      window.__3D_STATE__.lastSelectedNodeIndex = -1;
      window.__3D_STATE__.nodesActive = new Array(8).fill(true);
      window.__3D_STATE__.edgeList = defaultEdges.map(e => [...e]);
      window.__3D_STATE__.activePacketCount = packets.length;
      window.__3D_STATE__.stateSaved = false;
      window.__3D_STATE__.stateLoaded = false;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

      updateAllNodeVisuals();
      updateEdges();
      statusLabel.textContent = "Ready";
    }

    function saveState() {
      const json = serializeState();
      window.__3D_SAVED_STATE__ = json;
      localStorage.setItem("networkTopology", json);
      window.__3D_STATE__.stateSaved = true;
      window.__3D_STATE__.stateLoaded = false;
      statusLabel.textContent = "Saved!";
    }

    function loadState() {
      const raw = window.__3D_SAVED_STATE__ || localStorage.getItem("networkTopology");
      if (!raw) {
        statusLabel.textContent = "Ready";
        return;
      }
      try {
        const parsed = JSON.parse(raw);
        applySavedState(parsed);
      } catch (e) {
        statusLabel.textContent = "Ready";
      }
    }

    function findIntersectedNode(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const intersectables = [];
      nodes.forEach(node => {
        node.traverse?.((child) => {
          if (child.isMesh) intersectables.push(child);
        });
        if (node.isMesh) intersectables.push(node);
      });

      const intersects = raycaster.intersectObjects(intersectables, true);
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && obj.userData.nodeIndex === undefined && obj.parent) obj = obj.parent;
        if (obj && obj.userData.nodeIndex !== undefined) return obj.userData.nodeIndex;
      }
      return -1;
    }

    function spawnPacket() {
      const activeEdges = window.__3D_STATE__.edgeList.filter(([i, j]) =>
        window.__3D_STATE__.nodesActive[i] && window.__3D_STATE__.nodesActive[j]
      );

      if (activeEdges.length === 0) return;

      const [i, j] = activeEdges[Math.floor(Math.random() * activeEdges.length)];
      const forward = Math.random() > 0.5;
      const start = getNodePosition(forward ? i : j);
      const end = getNodePosition(forward ? j : i);

      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 16, 16),
        new THREE.MeshStandardMaterial({
          color: 0x00ffff,
          emissive: 0x00ffff,
          emissiveIntensity: 1.5
        })
      );
      mesh.position.copy(start);
      scene.add(mesh);

      packets.push({
        mesh,
        start,
        end,
        t: 0,
        duration: 1.0
      });

      window.__3D_STATE__.activePacketCount = packets.length;
    }

    function updatePackets(delta) {
      for (let i = packets.length - 1; i >= 0; i--) {
        const p = packets[i];
        p.t += delta / p.duration;
        if (p.t >= 1) {
          scene.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          packets.splice(i, 1);
        } else {
          p.mesh.position.lerpVectors(p.start, p.end, p.t);
        }
      }
      window.__3D_STATE__.activePacketCount = packets.length;
    }

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();

      controls.update();

      edgeObjects.forEach(edge => {
        const bothActive = window.__3D_STATE__.nodesActive[edge.userData.i] && window.__3D_STATE__.nodesActive[edge.userData.j];
        if (edge.material.transparent) {
          if (bothActive) {
            edge.material.opacity = 0.55 + 0.25 * Math.sin(elapsed * 2.5);
          } else {
            edge.material.opacity = 0.2 + 0.08 * Math.sin(elapsed * 2.5);
          }
        }
        if (edge.computeLineDistances && edge.material.isLineDashedMaterial) {
          edge.computeLineDistances();
        }
      });

      packetSpawnTimer += delta;
      if (packetSpawnTimer >= 2.0) {
        packetSpawnTimer = 0;
        spawnPacket();
      }

      updatePackets(delta);

      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));
      renderer.render(scene, camera);
    }

    renderer.domElement.addEventListener("click", (event) => {
      const idx = findIntersectedNode(event);
      if (idx >= 0) setSelectedNode(idx);
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (key === "d") {
        toggleSelectedNodeActive();
      } else if (key === "a") {
        addEdgeBetweenLastTwoSelected();
      } else if (key === "r") {
        removeEdgesForSelected();
      }
    });

    document.getElementById("saveBtn").addEventListener("click", saveState);
    document.getElementById("loadBtn").addEventListener("click", loadState);
    document.getElementById("resetBtn").addEventListener("click", resetState);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    createNodes();
    loadMobileModel();
    updateEdges();
    animate();
  </script>
</body>
</html>
