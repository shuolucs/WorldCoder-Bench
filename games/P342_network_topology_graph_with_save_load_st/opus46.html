<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Network Topology Graph</title>
<style>
  body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a1a; }
  canvas { display: block; }
  #uiPanel {
    position: fixed; top: 15px; right: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(0, 255, 170, 0.3);
    border-radius: 10px;
    padding: 20px;
    color: #ccc;
    min-width: 200px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 255, 170, 0.1);
    z-index: 100;
  }
  #uiPanel h3 {
    margin: 0 0 15px 0;
    color: #00ffaa;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(0, 255, 170, 0.2);
    padding-bottom: 10px;
  }
  #uiPanel button {
    display: block; width: 100%; padding: 10px 15px;
    margin: 8px 0; border: 1px solid rgba(0, 255, 170, 0.4);
    background: rgba(0, 255, 170, 0.1);
    color: #00ffaa; cursor: pointer;
    border-radius: 5px; font-size: 13px;
    transition: all 0.3s;
    font-weight: 600;
  }
  #uiPanel button:hover {
    background: rgba(0, 255, 170, 0.25);
    box-shadow: 0 0 10px rgba(0, 255, 170, 0.2);
  }
  #resetBtn { border-color: rgba(255, 68, 68, 0.4) !important; color: #ff4444 !important; background: rgba(255, 68, 68, 0.1) !important; }
  #resetBtn:hover { background: rgba(255, 68, 68, 0.25) !important; }
  #statusLabel {
    margin-top: 12px; padding: 8px 12px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 4px; font-size: 12px;
    text-align: center; color: #88ffcc;
    border: 1px solid rgba(0, 255, 170, 0.15);
  }
  #infoPanel {
    position: fixed; bottom: 15px; left: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(0, 255, 170, 0.2);
    border-radius: 8px;
    padding: 12px 16px;
    color: #888;
    font-size: 11px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
  }
  #infoPanel span { color: #00ffaa; font-weight: bold; }
</style>
</head>
<body>

<div id="uiPanel">
  <h3>Network Control</h3>
  <button id="saveBtn">💾 Save State</button>
  <button id="loadBtn">📂 Load State</button>
  <button id="resetBtn">🔄 Reset</button>
  <div id="statusLabel">Ready</div>
</div>

<div id="infoPanel">
  <span>Click</span> — Select node &nbsp;|&nbsp;
  <span>D</span> — Toggle active &nbsp;|&nbsp;
  <span>A</span> — Add edge &nbsp;|&nbsp;
  <span>R</span> — Remove edges
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ DEFAULT CONFIG ============
const DEFAULT_NODES = [
  { name: 'Router',   type: 'router',      pos: [0, 3, 0],    color: 0xff4444 },
  { name: 'Server-1', type: 'server',       pos: [-5, 2, -3],  color: 0x44ff44 },
  { name: 'Server-2', type: 'server',       pos: [5, 2, -3],   color: 0x44ff44 },
  { name: 'WS-1',     type: 'workstation',  pos: [-7, 1, 3],   color: 0x4488ff },
  { name: 'WS-2',     type: 'workstation',  pos: [7, 1, 3],    color: 0x4488ff },
  { name: 'WS-3',     type: 'workstation',  pos: [-3, 1, 7],   color: 0x4488ff },
  { name: 'Mobile',   type: 'mobile',       pos: [3, 0, 7],    color: 0x4488ff },
  { name: 'Firewall', type: 'firewall',     pos: [0, 2, -6],   color: 0xffaa00 },
];

const DEFAULT_EDGES = [[0,1],[0,2],[0,7],[1,3],[1,5],[2,4],[2,6],[7,1],[7,2]];

// ============ STATE ============
window.__3D_STATE__ = {
  nodeCount: 8,
  edgeCount: 9,
  selectedNodeIndex: -1,
  lastSelectedNodeIndex: -1,
  nodesActive: Array(8).fill(true),
  edgeList: DEFAULT_EDGES.map(e => [...e]),
  activePacketCount: 0,
  stateSaved: false,
  stateLoaded: false,
  mobileNodeLoaded: false,
  cameraDistance: 0,
};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 25);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 2, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);

// Add a subtle point light for atmosphere
const pointLight = new THREE.PointLight(0x00ffaa, 0.3, 50);
pointLight.position.set(0, 10, 0);
scene.add(pointLight);

// Grid
const gridHelper = new THREE.GridHelper(40, 20, 0x222244, 0x222244);
gridHelper.material.opacity = 0.4;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// ============ NODE MESHES ============
const nodeMeshes = [];
const nodeLabels = [];
const nodeGroups = []; // group per node for easier management
const originalColors = [];
let mobileNodeModel = null;

function createTextSprite(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 28px Segoe UI, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00ffaa';
  ctx.shadowColor = '#00ffaa';
  ctx.shadowBlur = 8;
  ctx.fillText(text, 128, 40);

  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3, 0.75, 1);
  return sprite;
}

function createNodeMesh(nodeData, index) {
  const group = new THREE.Group();
  group.position.set(...nodeData.pos);
  let mesh;

  switch(nodeData.type) {
    case 'router':
      mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.8, 32, 32),
        new THREE.MeshStandardMaterial({ color: nodeData.color, emissive: nodeData.color, emissiveIntensity: 0.2, metalness: 0.5, roughness: 0.3 })
      );
      break;
    case 'server':
      mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1.5, 1),
        new THREE.MeshStandardMaterial({ color: nodeData.color, emissive: nodeData.color, emissiveIntensity: 0.15, metalness: 0.6, roughness: 0.3 })
      );
      break;
    case 'workstation':
      mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 24, 24),
        new THREE.MeshStandardMaterial({ color: nodeData.color, emissive: nodeData.color, emissiveIntensity: 0.15, metalness: 0.4, roughness: 0.4 })
      );
      break;
    case 'mobile':
      // Placeholder sphere until model loads
      mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 24, 24),
        new THREE.MeshStandardMaterial({ color: nodeData.color, emissive: nodeData.color, emissiveIntensity: 0.15, transparent: true, opacity: 0.3 })
      );
      break;
    case 'firewall':
      mesh = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.7),
        new THREE.MeshStandardMaterial({ color: nodeData.color, emissive: nodeData.color, emissiveIntensity: 0.2, metalness: 0.5, roughness: 0.3 })
      );
      break;
  }

  mesh.userData.nodeIndex = index;
  mesh.castShadow = true;
  group.add(mesh);

  // Glow ring
  const glowGeo = new THREE.RingGeometry(1.0, 1.3, 32);
  const glowMat = new THREE.MeshBasicMaterial({ color: nodeData.color, transparent: true, opacity: 0.0, side: THREE.DoubleSide });
  const glowRing = new THREE.Mesh(glowGeo, glowMat);
  glowRing.rotation.x = -Math.PI / 2;
  glowRing.position.y = -0.5;
  glowRing.userData.isGlow = true;
  group.add(glowRing);

  // Label
  const label = createTextSprite(nodeData.name);
  label.position.y = nodeData.type === 'server' ? 1.5 : (nodeData.type === 'router' ? 1.5 : 1.2);
  group.add(label);
  nodeLabels.push(label);

  scene.add(group);
  nodeMeshes.push(mesh);
  nodeGroups.push(group);
  originalColors.push(nodeData.color);
}

// Create all nodes
DEFAULT_NODES.forEach((n, i) => createNodeMesh(n, i));

// Load ToyCar.glb for mobile node
const gltfLoader = new GLTFLoader();
gltfLoader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/ToyCar/glTF-Binary/ToyCar.glb',
  (gltf) => {
    mobileNodeModel = gltf.scene;
    mobileNodeModel.scale.set(2.0, 2.0, 2.0);
    // Normalize position within group
    mobileNodeModel.position.set(0, 0, 0);

    // Make the placeholder invisible
    const mobileGroup = nodeGroups[6];
    const placeholder = nodeMeshes[6];
    placeholder.material.opacity = 0;
    placeholder.material.transparent = true;

    mobileGroup.add(mobileNodeModel);
    window.__3D_STATE__.mobileNodeLoaded = true;
    console.log('ToyCar.glb loaded successfully');
  },
  undefined,
  (error) => {
    console.warn('Failed to load ToyCar.glb:', error);
    // Keep placeholder visible
    nodeMeshes[6].material.opacity = 1.0;
    nodeMeshes[6].material.color.set(0x4488ff);
  }
);

// ============ EDGES ============
let edgeLines = [];
let edgeMaterials = [];

function getNodeWorldPos(index) {
  return nodeGroups[index].position.clone();
}

function buildEdges() {
  // Remove old edges
  edgeLines.forEach(l => scene.remove(l));
  edgeLines = [];
  edgeMaterials = [];

  const state = window.__3D_STATE__;
  state.edgeList.forEach(([i, j]) => {
    const p1 = getNodeWorldPos(i);
    const p2 = getNodeWorldPos(j);
    const geo = new THREE.BufferGeometry().setFromPoints([p1, p2]);

    const bothActive = state.nodesActive[i] && state.nodesActive[j];
    const mat = new THREE.LineBasicMaterial({
      color: bothActive ? 0x00ffaa : 0x333333,
      transparent: true,
      opacity: bothActive ? 0.6 : 0.2,
    });

    const line = new THREE.Line(geo, mat);
    line.userData.edgeIndices = [i, j];
    line.userData.active = bothActive;
    scene.add(line);
    edgeLines.push(line);
    edgeMaterials.push(mat);
  });
}

buildEdges();

// ============ SELECTION ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function selectNode(index) {
  const state = window.__3D_STATE__;

  // Deselect previous
  if (state.selectedNodeIndex >= 0 && state.selectedNodeIndex < nodeMeshes.length) {
    const prevGroup = nodeGroups[state.selectedNodeIndex];
    prevGroup.children.forEach(c => {
      if (c.userData.isGlow) {
        c.material.opacity = 0;
      }
    });
    const prevMesh = nodeMeshes[state.selectedNodeIndex];
    if (prevMesh.material.emissiveIntensity !== undefined) {
      prevMesh.material.emissiveIntensity = 0.15;
    }
  }

  state.lastSelectedNodeIndex = state.selectedNodeIndex;
  state.selectedNodeIndex = index;

  // Highlight new
  if (index >= 0 && index < nodeMeshes.length) {
    const group = nodeGroups[index];
    group.children.forEach(c => {
      if (c.userData.isGlow) {
        c.material.opacity = 0.5;
        c.material.color.set(state.nodesActive[index] ? originalColors[index] : 0x555555);
      }
    });
    const mesh = nodeMeshes[index];
    if (mesh.material.emissiveIntensity !== undefined) {
      mesh.material.emissiveIntensity = 0.6;
    }
  }
}

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Collect all clickable meshes
  const clickables = [];
  nodeGroups.forEach((g, idx) => {
    g.traverse(child => {
      if (child.isMesh && !child.userData.isGlow) {
        child.userData.nodeIndex = idx;
        clickables.push(child);
      }
    });
  });

  const intersects = raycaster.intersectObjects(clickables, false);
  if (intersects.length > 0) {
    const hit = intersects[0].object;
    let nodeIdx = hit.userData.nodeIndex;
    // Walk up to find nodeIndex if not directly on mesh
    if (nodeIdx === undefined) {
      let parent = hit.parent;
      while (parent) {
        if (parent.userData && parent.userData.nodeIndex !== undefined) {
          nodeIdx = parent.userData.nodeIndex;
          break;
        }
        parent = parent.parent;
      }
    }
    if (nodeIdx !== undefined) {
      selectNode(nodeIdx);
    }
  }
});

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
  const state = window.__3D_STATE__;
  const key = e.key.toLowerCase();

  if (key === 'd') {
    // Toggle active
    if (state.selectedNodeIndex >= 0) {
      const idx = state.selectedNodeIndex;
      state.nodesActive[idx] = !state.nodesActive[idx];
      const mesh = nodeMeshes[idx];
      if (state.nodesActive[idx]) {
        mesh.material.color.set(originalColors[idx]);
        if (mesh.material.emissive) mesh.material.emissive.set(originalColors[idx]);
      } else {
        mesh.material.color.set(0x555555);
        if (mesh.material.emissive) mesh.material.emissive.set(0x222222);
      }
      // Also update mobile model materials if it's node 6
      if (idx === 6 && mobileNodeModel) {
        mobileNodeModel.traverse(child => {
          if (child.isMesh) {
            if (!child.userData.origColor) {
              child.userData.origColor = child.material.color.getHex();
            }
            if (!state.nodesActive[idx]) {
              child.material.color.set(0x555555);
            } else {
              child.material.color.set(child.userData.origColor);
            }
          }
        });
      }
      buildEdges();
      selectNode(idx); // refresh glow
    }
  }

  if (key === 'a') {
    // Add edge between last two selected
    const a = state.lastSelectedNodeIndex;
    const b = state.selectedNodeIndex;
    if (a >= 0 && b >= 0 && a !== b) {
      const exists = state.edgeList.some(([i, j]) => (i === a && j === b) || (i === b && j === a));
      if (!exists) {
        state.edgeList.push([a, b]);
        state.edgeCount = state.edgeList.length;
        buildEdges();
        setStatus('Edge added: ' + DEFAULT_NODES[a].name + ' ↔ ' + DEFAULT_NODES[b].name);
      }
    }
  }

  if (key === 'r') {
    // Remove all edges connected to selected
    if (state.selectedNodeIndex >= 0) {
      const idx = state.selectedNodeIndex;
      state.edgeList = state.edgeList.filter(([i, j]) => i !== idx && j !== idx);
      state.edgeCount = state.edgeList.length;
      buildEdges();
      setStatus('Edges removed from ' + DEFAULT_NODES[idx].name);
    }
  }
});

// ============ PACKETS ============
const packets = [];

function spawnPacket() {
  const state = window.__3D_STATE__;
  // Find active edges
  const activeEdges = state.edgeList.filter(([i, j]) => state.nodesActive[i] && state.nodesActive[j]);
  if (activeEdges.length === 0) return;

  const edge = activeEdges[Math.floor(Math.random() * activeEdges.length)];
  const start = getNodeWorldPos(edge[0]);
  const end = getNodeWorldPos(edge[1]);

  // Randomly reverse direction
  if (Math.random() > 0.5) {
    [start.x, start.y, start.z, end.x, end.y, end.z] = [end.x, end.y, end.z, start.x, start.y, start.z];
  }

  const geo = new THREE.SphereGeometry(0.15, 12, 12);
  const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 1.0 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(start);

  // Add glow
  const glowGeo = new THREE.SphereGeometry(0.3, 12, 12);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  mesh.add(glow);

  scene.add(mesh);
  packets.push({ mesh, start: start.clone(), end: end.clone(), t: 0, duration: 1.0 });
  state.activePacketCount = packets.length;
}

let packetTimer = 0;

// ============ SAVE / LOAD / RESET ============
function setStatus(msg) {
  document.getElementById('statusLabel').textContent = msg;
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const state = window.__3D_STATE__;
  const saveData = {
    nodesActive: [...state.nodesActive],
    edgeList: state.edgeList.map(e => [...e]),
    selectedNodeIndex: state.selectedNodeIndex,
    lastSelectedNodeIndex: state.lastSelectedNodeIndex,
    nodePositions: nodeGroups.map(g => [g.position.x, g.position.y, g.position.z]),
  };
  const json = JSON.stringify(saveData);
  window.__3D_SAVED_STATE__ = json;
  localStorage.setItem('networkTopology', json);
  state.stateSaved = true;
  state.stateLoaded = false;
  setStatus('💾 Saved!');
  setTimeout(() => setStatus('Ready'), 2000);
});

document.getElementById('loadBtn').addEventListener('click', () => {
  const json = window.__3D_SAVED_STATE__ || localStorage.getItem('networkTopology');
  if (!json) {
    setStatus('⚠ No saved state found');
    setTimeout(() => setStatus('Ready'), 2000);
    return;
  }
  const saveData = JSON.parse(json);
  applyState(saveData);
  const state = window.__3D_STATE__;
  state.stateLoaded = true;
  state.stateSaved = false;
  setStatus('📂 Loaded!');
  setTimeout(() => setStatus('Ready'), 2000);
});

document.getElementById('resetBtn').addEventListener('click', () => {
  const resetData = {
    nodesActive: Array(8).fill(true),
    edgeList: DEFAULT_EDGES.map(e => [...e]),
    selectedNodeIndex: -1,
    lastSelectedNodeIndex: -1,
    nodePositions: DEFAULT_NODES.map(n => [...n.pos]),
  };
  applyState(resetData);
  window.__3D_STATE__.stateSaved = false;
  window.__3D_STATE__.stateLoaded = false;
  setStatus('🔄 Reset!');
  setTimeout(() => setStatus('Ready'), 2000);
});

function applyState(saveData) {
  const state = window.__3D_STATE__;

  // Deselect current
  if (state.selectedNodeIndex >= 0) {
    selectNode(-1);
  }

  // Restore positions
  if (saveData.nodePositions) {
    saveData.nodePositions.forEach((pos, i) => {
      if (i < nodeGroups.length) {
        nodeGroups[i].position.set(pos[0], pos[1], pos[2]);
      }
    });
  }

  // Restore active status
  state.nodesActive = [...saveData.nodesActive];
  state.nodesActive.forEach((active, i) => {
    if (i < nodeMeshes.length) {
      const mesh = nodeMeshes[i];
      if (active) {
        mesh.material.color.set(originalColors[i]);
        if (mesh.material.emissive) mesh.material.emissive.set(originalColors[i]);
      } else {
        mesh.material.color.set(0x555555);
        if (mesh.material.emissive) mesh.material.emissive.set(0x222222);
      }
      // Handle mobile model
      if (i === 6 && mobileNodeModel) {
        mobileNodeModel.traverse(child => {
          if (child.isMesh) {
            if (!active) {
              child.material.color.set(0x555555);
            } else if (child.userData.origColor) {
              child.material.color.set(child.userData.origColor);
            }
          }
        });
      }
    }
  });

  // Restore edges
  state.edgeList = saveData.edgeList.map(e => [...e]);
  state.edgeCount = state.edgeList.length;
  buildEdges();

  // Restore selection
  state.selectedNodeIndex = saveData.selectedNodeIndex;
  state.lastSelectedNodeIndex = saveData.lastSelectedNodeIndex;
  if (state.selectedNodeIndex >= 0) {
    selectNode(state.selectedNodeIndex);
  }
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  controls.update();

  // Update camera distance
  window.__3D_STATE__.cameraDistance = camera.position.length();

  // Pulse edge opacity
  edgeMaterials.forEach((mat, i) => {
    if (edgeLines[i].userData.active) {
      mat.opacity = 0.3 + 0.25 * (1 + Math.sin(elapsed * 2 + i * 0.5));
    }
  });

  // Rotate firewall
  if (nodeMeshes[7]) {
    nodeMeshes[7].rotation.y += delta * 0.5;
  }

  // Subtle float for router
  if (nodeGroups[0]) {
    nodeMeshes[0].position.y = Math.sin(elapsed * 1.5) * 0.15;
  }

  // Glow ring pulse for selected
  const state = window.__3D_STATE__;
  if (state.selectedNodeIndex >= 0) {
    const group = nodeGroups[state.selectedNodeIndex];
    group.children.forEach(c => {
      if (c.userData.isGlow) {
        c.material.opacity = 0.3 + 0.2 * Math.sin(elapsed * 3);
        c.rotation.z = elapsed * 0.5;
      }
    });
  }

  // Spawn packets
  packetTimer += delta;
  if (packetTimer >= 2.0) {
    packetTimer = 0;
    spawnPacket();
  }

  // Update packets
  for (let i = packets.length - 1; i >= 0; i--) {
    const p = packets[i];
    p.t += delta / p.duration;
    if (p.t >= 1.0) {
      scene.remove(p.mesh);
      packets.splice(i, 1);
    } else {
      p.mesh.position.lerpVectors(p.start, p.end, p.t);
      // Arc upward
      p.mesh.position.y += Math.sin(p.t * Math.PI) * 0.8;
      // Fade out near end
      p.mesh.material.opacity = p.t > 0.8 ? (1 - p.t) * 5 : 1.0;
    }
  }
  state.activePacketCount = packets.length;

  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
