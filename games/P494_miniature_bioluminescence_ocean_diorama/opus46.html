<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioluminescent Ocean Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #050520; }
  canvas { display: block; }
  #hud {
    position: fixed;
    top: 15px;
    left: 15px;
    color: #88ccff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    background: rgba(0, 10, 30, 0.7);
    padding: 10px 15px;
    border-radius: 8px;
    border: 1px solid rgba(100, 180, 255, 0.2);
    z-index: 100;
    pointer-events: none;
    text-shadow: 0 0 8px rgba(0, 200, 255, 0.5);
  }
  #controls-info {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: #6699aa;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    background: rgba(0, 10, 30, 0.7);
    padding: 8px 15px;
    border-radius: 8px;
    border: 1px solid rgba(100, 180, 255, 0.15);
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 0 5px rgba(0, 150, 200, 0.3);
  }
</style>
</head>
<body>
<div id="hud">Particles: 50 | Theme: cyan | Clicks: 0 | Night: off</div>
<div id="controls-info">B:Glow N:Night W:Wave J:Pulse R:Rotate C:Color P:Pause Click:Ripple</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  particleCount: 50,
  bioBoost: false,
  nightMode: false,
  waveCount: 0,
  jellyfishPulseCount: 0,
  soldierRotation: 0,
  currentThemeIndex: 0,
  currentThemeName: 'cyan',
  particlesPaused: false,
  clickCount: 0,
  jellyfishCount: 8,
  soldierLoaded: false,
  ambientIntensity: 0.15,
  cameraDistance: 12
};

const themes = [
  { name: 'cyan', color: 0x00ffff },
  { name: 'purple', color: 0xaa00ff },
  { name: 'green', color: 0x00ff88 },
  { name: 'gold', color: 0xffaa00 }
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050520);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 5;
controls.maxDistance = 25;

// Lights
const ambientLight = new THREE.AmbientLight(0x334466, 0.15);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0x223355, 0.3);
dirLight.position.set(2, 8, 3);
scene.add(dirLight);

// Glass bowl
const bowlGeom = new THREE.SphereGeometry(6, 64, 64, 0, Math.PI * 2, 0, Math.PI * 0.6);
const bowlMat = new THREE.MeshPhysicalMaterial({
  transparent: true,
  opacity: 0.15,
  roughness: 0.05,
  transmission: 0.9,
  color: 0x88ccff,
  side: THREE.DoubleSide,
  depthWrite: false
});
const bowl = new THREE.Mesh(bowlGeom, bowlMat);
scene.add(bowl);

// Bowl rim glow
const rimGeom = new THREE.TorusGeometry(6 * Math.sin(Math.PI * 0.6), 0.05, 16, 64);
const rimMat = new THREE.MeshBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3 });
const rim = new THREE.Mesh(rimGeom, rimMat);
rim.position.y = 6 * Math.cos(Math.PI * 0.6);
rim.rotation.x = -Math.PI / 2;
scene.add(rim);

// Water surface with animated shader
const waterGeom = new THREE.CircleGeometry(5.8, 64);
const waterShaderMat = new THREE.ShaderMaterial({
  transparent: true,
  side: THREE.DoubleSide,
  uniforms: {
    uTime: { value: 0 },
    uColor: { value: new THREE.Color(0x041525) },
    uWaveAmplitude: { value: 0.0 },
    uRippleCenter: { value: new THREE.Vector2(0, 0) },
    uRippleTime: { value: -10.0 }
  },
  vertexShader: `
    uniform float uTime;
    uniform float uWaveAmplitude;
    uniform vec2 uRippleCenter;
    uniform float uRippleTime;
    varying vec2 vUv;
    varying vec3 vPos;
    void main() {
      vUv = uv;
      vec3 pos = position;
      float wave = sin(pos.x * 2.0 + uTime * 1.5) * 0.03 + cos(pos.y * 3.0 + uTime * 1.2) * 0.02;
      wave += sin(pos.x * 4.0 - uTime * 2.0) * 0.015 + cos(pos.y * 5.0 + uTime * 0.8) * 0.01;
      wave += uWaveAmplitude * sin(pos.x * 3.0 + uTime * 4.0) * cos(pos.y * 2.0 + uTime * 3.0);
      
      float rippleDist = distance(pos.xy, uRippleCenter);
      float rippleAge = uTime - uRippleTime;
      if (rippleAge < 3.0 && rippleAge > 0.0) {
        float ripple = sin(rippleDist * 10.0 - rippleAge * 5.0) * 0.05 * max(0.0, 1.0 - rippleAge / 3.0) * max(0.0, 1.0 - rippleDist * 0.3);
        wave += ripple;
      }
      
      vPos = pos;
      pos.z += wave;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3 uColor;
    varying vec2 vUv;
    varying vec3 vPos;
    void main() {
      float edge = 1.0 - smoothstep(4.5, 5.8, length(vPos.xy));
      vec3 col = uColor;
      col += 0.02 * sin(vPos.x * 5.0 + uTime) * vec3(0.0, 0.3, 0.5);
      col += 0.015 * cos(vPos.y * 4.0 + uTime * 0.7) * vec3(0.0, 0.2, 0.4);
      gl_FragColor = vec4(col, 0.75 * edge);
    }
  `
});
const water = new THREE.Mesh(waterGeom, waterShaderMat);
water.rotation.x = -Math.PI / 2;
water.position.y = 1.5;
scene.add(water);

// Rocky island
const islandGeom = new THREE.IcosahedronGeometry(1.2, 2);
const positions = islandGeom.attributes.position;
for (let i = 0; i < positions.count; i++) {
  const x = positions.getX(i);
  const y = positions.getY(i);
  const z = positions.getZ(i);
  positions.setX(i, x + (Math.random() - 0.5) * 0.15);
  positions.setY(i, y + (Math.random() - 0.5) * 0.1);
  positions.setZ(i, z + (Math.random() - 0.5) * 0.15);
}
islandGeom.computeVertexNormals();
const islandMat = new THREE.MeshStandardMaterial({ color: 0x554433, roughness: 0.9, flatShading: true });
const island = new THREE.Mesh(islandGeom, islandMat);
island.scale.set(1, 0.5, 1);
island.position.set(0, 1.8, 0);
scene.add(island);

// Small rocks around island
for (let i = 0; i < 6; i++) {
  const rockGeom = new THREE.IcosahedronGeometry(0.2 + Math.random() * 0.2, 1);
  const rock = new THREE.Mesh(rockGeom, islandMat.clone());
  const angle = (i / 6) * Math.PI * 2;
  rock.position.set(Math.cos(angle) * 1.3, 1.5 + Math.random() * 0.2, Math.sin(angle) * 1.3);
  rock.scale.set(1, 0.5 + Math.random() * 0.3, 1);
  scene.add(rock);
}

// Ocean floor
const floorGeom = new THREE.CircleGeometry(5.5, 64);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x443322, roughness: 1.0 });
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -3;
scene.add(floor);

// Small coral/seaweed decorations on floor
for (let i = 0; i < 12; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 1.5 + Math.random() * 3.5;
  const coralGeom = new THREE.ConeGeometry(0.1 + Math.random() * 0.15, 0.3 + Math.random() * 0.5, 5);
  const coralColor = [0x00aa66, 0x006644, 0x884466, 0x446688][Math.floor(Math.random() * 4)];
  const coralMat = new THREE.MeshStandardMaterial({ color: coralColor, emissive: coralColor, emissiveIntensity: 0.1 });
  const coral = new THREE.Mesh(coralGeom, coralMat);
  coral.position.set(Math.cos(angle) * r, -2.8, Math.sin(angle) * r);
  scene.add(coral);
}

// Bioluminescent particles
const particles = [];
const particleBaseColors = [0x00ffff, 0x0066ff, 0x00ff66];

function createParticle(x, y, z, isBurst = false, burstDir = null) {
  const colorIdx = Math.floor(Math.random() * 3);
  const themeColor = new THREE.Color(themes[window.__3D_STATE__.currentThemeIndex].color);
  const baseColor = isBurst ? themeColor : new THREE.Color(particleBaseColors[colorIdx]);
  
  const geom = new THREE.SphereGeometry(0.05, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ color: baseColor, transparent: true, opacity: 0.8 });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(x, y, z);
  
  const light = new THREE.PointLight(baseColor, 0.1, 2);
  mesh.add(light);
  scene.add(mesh);
  
  const particle = {
    mesh,
    light,
    baseColor: baseColor.clone(),
    speed: 0.005 + Math.random() * 0.01,
    phase: Math.random() * Math.PI * 2,
    xDrift: (Math.random() - 0.5) * 0.003,
    zDrift: (Math.random() - 0.5) * 0.003,
    isBurst,
    burstDir: burstDir ? burstDir.clone() : null,
    burstLife: isBurst ? 3.0 : -1,
    burstAge: 0,
    originalY: y
  };
  
  particles.push(particle);
  return particle;
}

// Initial 50 particles
for (let i = 0; i < 50; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = Math.random() * 5;
  const x = Math.cos(angle) * r;
  const z = Math.sin(angle) * r;
  const y = -2 + Math.random() * 3.4;
  createParticle(x, y, z);
}

// Jellyfish
const jellyfish = [];

function createJellyfish(x, y, z) {
  const group = new THREE.Group();
  
  const themeColor = new THREE.Color(themes[window.__3D_STATE__.currentThemeIndex].color);
  const jellyColor = themeColor.clone().lerp(new THREE.Color(0xffffff), 0.2);
  
  // Dome
  const domeGeom = new THREE.SphereGeometry(0.3, 16, 8, 0, Math.PI * 2, 0, Math.PI * 0.5);
  const domeMat = new THREE.MeshStandardMaterial({
    color: jellyColor,
    emissive: jellyColor,
    emissiveIntensity: 0.5,
    transparent: true,
    opacity: 0.6,
    side: THREE.DoubleSide
  });
  const dome = new THREE.Mesh(domeGeom, domeMat);
  group.add(dome);
  
  // Tentacles
  const tentacles = [];
  for (let t = 0; t < 4; t++) {
    const tentGeom = new THREE.CylinderGeometry(0.01, 0.005, 0.5 + Math.random() * 0.3, 4);
    const tentMat = new THREE.MeshStandardMaterial({
      color: jellyColor,
      emissive: jellyColor,
      emissiveIntensity: 0.3,
      transparent: true,
      opacity: 0.4
    });
    const tent = new THREE.Mesh(tentGeom, tentMat);
    const angle = (t / 4) * Math.PI * 2;
    tent.position.set(Math.cos(angle) * 0.12, -0.3, Math.sin(angle) * 0.12);
    group.add(tent);
    tentacles.push(tent);
  }
  
  // Inner glow light
  const glow = new THREE.PointLight(jellyColor, 0.3, 3);
  group.add(glow);
  
  group.position.set(x, y, z);
  scene.add(group);
  
  return {
    group,
    dome,
    domeMat,
    tentacles,
    glow,
    baseColor: jellyColor.clone(),
    phase: Math.random() * Math.PI * 2,
    bobSpeed: 0.3 + Math.random() * 0.3,
    driftX: (Math.random() - 0.5) * 0.002,
    driftZ: (Math.random() - 0.5) * 0.002,
    originalY: y,
    pulseScale: 1.0,
    pulseTarget: 1.0,
    pulseTime: 0
  };
}

for (let i = 0; i < 8; i++) {
  const angle = Math.random() * Math.PI * 2;
  const r = 1 + Math.random() * 3.5;
  const x = Math.cos(angle) * r;
  const z = Math.sin(angle) * r;
  const y = -2 + Math.random() * 2.5;
  jellyfish.push(createJellyfish(x, y, z));
}

// Soldier model
let soldierModel = null;
const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Soldier.glb',
  (gltf) => {
    soldierModel = gltf.scene;
    soldierModel.scale.set(0.015, 0.015, 0.015);
    soldierModel.position.set(0, 2.3, 0);
    soldierModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
      }
    });
    scene.add(soldierModel);
    window.__3D_STATE__.soldierLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Could not load soldier.glb, creating placeholder:', error);
    // Create a placeholder soldier figure
    const soldierGroup = new THREE.Group();
    
    // Body
    const bodyGeom = new THREE.CylinderGeometry(0.15, 0.12, 0.5, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x334422 });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.25;
    soldierGroup.add(body);
    
    // Head
    const headGeom = new THREE.SphereGeometry(0.1, 8, 8);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xddaa88 });
    const head = new THREE.Mesh(headGeom, headMat);
    head.position.y = 0.6;
    soldierGroup.add(head);
    
    // Helmet
    const helmetGeom = new THREE.SphereGeometry(0.12, 8, 8, 0, Math.PI * 2, 0, Math.PI * 0.5);
    const helmetMat = new THREE.MeshStandardMaterial({ color: 0x445533 });
    const helmet = new THREE.Mesh(helmetGeom, helmetMat);
    helmet.position.y = 0.65;
    soldierGroup.add(helmet);
    
    // Legs
    for (let side = -1; side <= 1; side += 2) {
      const legGeom = new THREE.CylinderGeometry(0.05, 0.05, 0.3, 6);
      const leg = new THREE.Mesh(legGeom, bodyMat);
      leg.position.set(side * 0.07, -0.05, 0);
      soldierGroup.add(leg);
    }
    
    // Arms
    for (let side = -1; side <= 1; side += 2) {
      const armGeom = new THREE.CylinderGeometry(0.03, 0.03, 0.35, 6);
      const arm = new THREE.Mesh(armGeom, bodyMat);
      arm.position.set(side * 0.2, 0.25, 0);
      arm.rotation.z = side * 0.2;
      soldierGroup.add(arm);
    }
    
    // Rifle
    const rifleGeom = new THREE.CylinderGeometry(0.015, 0.015, 0.6, 4);
    const rifleMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const rifle = new THREE.Mesh(rifleGeom, rifleMat);
    rifle.position.set(0.22, 0.3, 0.05);
    rifle.rotation.z = 0.15;
    soldierGroup.add(rifle);
    
    soldierGroup.position.set(0, 2.3, 0);
    soldierModel = soldierGroup;
    scene.add(soldierModel);
    window.__3D_STATE__.soldierLoaded = true;
  }
);

// Fog for underwater feel
scene.fog = new THREE.FogExp2(0x050520, 0.02);

// Raycaster for click interaction
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Wave animation state
let waveActive = false;
let waveStartTime = 0;

// Jellyfish pulse state
let jellyfishPulsing = false;
let jellyfishPulseStart = 0;

// Animation clock
const clock = new THREE.Clock();

// Click handler
renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(water);
  
  if (intersects.length > 0) {
    const point = intersects[0].point;
    
    // Set ripple center in local coords
    const localPoint = water.worldToLocal(point.clone());
    waterShaderMat.uniforms.uRippleCenter.value.set(localPoint.x, localPoint.y);
    waterShaderMat.uniforms.uRippleTime.value = clock.getElapsedTime();
    
    // Spawn 10 burst particles
    for (let i = 0; i < 10; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 0.5 + Math.random() * 1.0;
      const dir = new THREE.Vector3(
        Math.cos(angle) * speed,
        -0.5 - Math.random() * 1.0,
        Math.sin(angle) * speed
      );
      createParticle(point.x, point.y - 0.2, point.z, true, dir);
    }
    
    window.__3D_STATE__.clickCount++;
    window.__3D_STATE__.particleCount = particles.length;
  }
});

// Key handlers
document.addEventListener('keydown', (event) => {
  const key = event.key.toLowerCase();
  const state = window.__3D_STATE__;
  
  switch (key) {
    case 'b':
      state.bioBoost = !state.bioBoost;
      break;
      
    case 'n':
      state.nightMode = !state.nightMode;
      if (state.nightMode) {
        ambientLight.intensity = 0.02;
        dirLight.intensity = 0.05;
      } else {
        ambientLight.intensity = 0.15;
        dirLight.intensity = 0.3;
      }
      state.ambientIntensity = ambientLight.intensity;
      break;
      
    case 'w':
      waveActive = true;
      waveStartTime = clock.getElapsedTime();
      state.waveCount++;
      break;
      
    case 'j':
      jellyfishPulsing = true;
      jellyfishPulseStart = clock.getElapsedTime();
      state.jellyfishPulseCount++;
      jellyfish.forEach(j => {
        j.pulseTarget = 1.3;
        j.pulseTime = clock.getElapsedTime();
      });
      break;
      
    case 'r':
      if (soldierModel) {
        state.soldierRotation = (state.soldierRotation + 90) % 360;
      }
      break;
      
    case 'c':
      state.currentThemeIndex = (state.currentThemeIndex + 1) % themes.length;
      state.currentThemeName = themes[state.currentThemeIndex].name;
      const newColor = new THREE.Color(themes[state.currentThemeIndex].color);
      // Update existing particles
      particles.forEach(p => {
        if (!p.isBurst) {
          const mix = newColor.clone().lerp(p.baseColor, 0.3);
          p.mesh.material.color.copy(mix);
          p.light.color.copy(mix);
        }
      });
      // Update jellyfish
      jellyfish.forEach(j => {
        const jColor = newColor.clone().lerp(new THREE.Color(0xffffff), 0.2);
        j.domeMat.color.copy(jColor);
        j.domeMat.emissive.copy(jColor);
        j.glow.color.copy(jColor);
        j.baseColor.copy(jColor);
        j.tentacles.forEach(t => {
          t.material.color.copy(jColor);
          t.material.emissive.copy(jColor);
        });
      });
      break;
      
    case 'p':
      state.particlesPaused = !state.particlesPaused;
      break;
  }
});

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// HUD update
const hudEl = document.getElementById('hud');

function updateHUD() {
  const s = window.__3D_STATE__;
  hudEl.textContent = `Particles: ${s.particleCount} | Theme: ${s.currentThemeName} | Clicks: ${s.clickCount} | Night: ${s.nightMode ? 'on' : 'off'}`;
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  
  const time = clock.getElapsedTime();
  const delta = clock.getDelta();
  const state = window.__3D_STATE__;
  
  controls.update();
  
  // Update water shader
  waterShaderMat.uniforms.uTime.value = time;
  
  // Wave animation
  if (waveActive) {
    const waveAge = time - waveStartTime;
    if (waveAge < 2.0) {
      waterShaderMat.uniforms.uWaveAmplitude.value = Math.sin(waveAge * Math.PI / 2.0) * 0.15;
    } else {
      waterShaderMat.uniforms.uWaveAmplitude.value = 0;
      waveActive = false;
    }
  }
  
  // Update particles
  const bioMultiplier = state.bioBoost ? 3.0 : 1.0;
  
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    
    if (p.isBurst) {
      p.burstAge += 0.016;
      if (p.burstAge >= p.burstLife) {
        scene.remove(p.mesh);
        particles.splice(i, 1);
        continue;
      }
      const fade = 1.0 - (p.burstAge / p.burstLife);
      p.mesh.material.opacity = fade * 0.8;
      p.light.intensity = fade * 0.15 * bioMultiplier;
      
      if (!state.particlesPaused) {
        p.mesh.position.x += p.burstDir.x * 0.016;
        p.mesh.position.y += p.burstDir.y * 0.016;
        p.mesh.position.z += p.burstDir.z * 0.016;
        p.burstDir.multiplyScalar(0.97);
      }
    } else {
      if (!state.particlesPaused) {
        p.mesh.position.y += p.speed;
        p.mesh.position.x += Math.sin(time * 0.5 + p.phase) * p.xDrift;
        p.mesh.position.z += Math.cos(time * 0.3 + p.phase) * p.zDrift;
        
        if (p.mesh.position.y > 1.4) {
          p.mesh.position.y = -2;
          const angle = Math.random() * Math.PI * 2;
          const r = Math.random() * 5;
          p.mesh.position.x = Math.cos(angle) * r;
          p.mesh.position.z = Math.sin(angle) * r;
        }
      }
      
      // Pulsing glow
      const pulse = 0.5 + 0.5 * Math.sin(time * 2 + p.phase);
      p.light.intensity = (0.05 + pulse * 0.1) * bioMultiplier;
      p.mesh.material.opacity = 0.5 + pulse * 0.5;
    }
  }
  
  // Update jellyfish
  jellyfish.forEach(j => {
    if (!state.particlesPaused) {
      j.group.position.y = j.originalY + Math.sin(time * j.bobSpeed + j.phase) * 0.3;
      j.group.position.x += j.driftX;
      j.group.position.z += j.driftZ;
      
      // Boundary check
      const dist = Math.sqrt(j.group.position.x ** 2 + j.group.position.z ** 2);
      if (dist > 4.5) {
        j.driftX *= -1;
        j.driftZ *= -1;
      }
      if (j.group.position.y > 1.0) j.originalY -= 0.01;
      if (j.group.position.y < -2.5) j.originalY += 0.01;
    }
    
    // Tentacle animation
    j.tentacles.forEach((t, idx) => {
      t.rotation.x = Math.sin(time * 2 + idx * 0.5 + j.phase) * 0.3;
      t.rotation.z = Math.cos(time * 1.5 + idx * 0.7 + j.phase) * 0.2;
    });
    
    // Dome pulsing
    const domePulse = 0.8 + 0.2 * Math.sin(time * 1.5 + j.phase);
    j.group.scale.x = domePulse;
    j.group.scale.z = domePulse;
    
    // Jellyfish pulse (J key)
    if (j.pulseTarget > 1.0) {
      const pulseAge = time - j.pulseTime;
      if (pulseAge < 0.5) {
        const s = 1.0 + 0.3 * Math.sin(pulseAge / 0.5 * Math.PI);
        j.group.scale.set(s * domePulse, s, s * domePulse);
      } else if (pulseAge < 1.0) {
        const s = 1.0 + 0.3 * Math.sin((1.0 - (pulseAge - 0.5) / 0.5) * Math.PI * 0.5);
        j.group.scale.set(s * domePulse, s, s * domePulse);
      } else {
        j.pulseTarget = 1.0;
      }
    }
    
    // Bio boost emissive
    const emissiveIntensity = state.bioBoost ? 1.5 : 0.5;
    j.domeMat.emissiveIntensity = emissiveIntensity * (0.7 + 0.3 * Math.sin(time * 2 + j.phase));
    j.glow.intensity = (state.bioBoost ? 0.8 : 0.3) * (0.7 + 0.3 * Math.sin(time * 2 + j.phase));
  });
  
  // Soldier rotation
  if (soldierModel) {
    const targetRot = (state.soldierRotation * Math.PI) / 180;
    const currentRot = soldierModel.rotation.y;
    const diff = targetRot - currentRot;
    if (Math.abs(diff) > 0.01) {
      soldierModel.rotation.y += diff * 0.1;
    } else {
      soldierModel.rotation.y = targetRot;
    }
  }
  
  // Update state
  state.particleCount = particles.length;
  state.ambientIntensity = ambientLight.intensity;
  state.cameraDistance = camera.position.length();
  state.jellyfishCount = jellyfish.length;
  
  // Ensure NaN-free
  Object.keys(state).forEach(key => {
    if (typeof state[key] === 'number' && isNaN(state[key])) {
      state[key] = 0;
    }
  });
  
  updateHUD();
  renderer.render(scene, camera);
}

animate();
</script>
