<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miniature Bioluminescent Ocean Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at top, #0a1030 0%, #050520 60%, #02020a 100%);
      font-family: Arial, sans-serif;
      color: #dff6ff;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 14px;
      background: rgba(5, 10, 25, 0.45);
      border: 1px solid rgba(136, 204, 255, 0.25);
      border-radius: 10px;
      font-size: 14px;
      backdrop-filter: blur(4px);
      pointer-events: none;
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.08);
    }

    #controls-info {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 14px;
      background: rgba(5, 10, 25, 0.45);
      border: 1px solid rgba(136, 204, 255, 0.2);
      border-radius: 10px;
      font-size: 13px;
      backdrop-filter: blur(4px);
      pointer-events: none;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="hud">Loading...</div>
  <div id="controls-info">B:Glow N:Night W:Wave J:Pulse R:Rotate C:Color P:Pause Click:Ripple</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050520);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.5, 0);

    const ambientLight = new THREE.AmbientLight(0x334466, 0.15);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0x223355, 0.3);
    directionalLight.position.set(2, 8, 3);
    scene.add(directionalLight);

    const themes = [
      { name: "cyan", color: 0x00ffff },
      { name: "purple", color: 0xaa00ff },
      { name: "green", color: 0x00ff88 },
      { name: "gold", color: 0xffaa00 }
    ];

    const state = {
      particleCount: 50,
      bioBoost: false,
      nightMode: false,
      waveCount: 0,
      jellyfishPulseCount: 0,
      soldierRotation: 0,
      currentThemeIndex: 0,
      currentThemeName: "cyan",
      particlesPaused: false,
      clickCount: 0,
      jellyfishCount: 8,
      soldierLoaded: false,
      ambientIntensity: 0.15,
      cameraDistance: camera.position.length()
    };
    window.__3D_STATE__ = { ...state };

    const hud = document.getElementById("hud");

    function sanitizeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function updateHUD() {
      hud.textContent =
        `Particles: ${state.particleCount} | Theme: ${state.currentThemeName} | Clicks: ${state.clickCount} | Night: ${state.nightMode ? "on" : "off"}`;
    }

    // Bowl
    const bowlGeometry = new THREE.SphereGeometry(6, 64, 64, 0, Math.PI * 2, 0, Math.PI * 0.6);
    const bowlMaterial = new THREE.MeshPhysicalMaterial({
      transparent: true,
      opacity: 0.15,
      roughness: 0.05,
      transmission: 0.9,
      color: 0x88ccff,
      side: THREE.DoubleSide
    });
    const bowl = new THREE.Mesh(bowlGeometry, bowlMaterial);
    scene.add(bowl);

    // Ocean floor
    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(5.5, 64),
      new THREE.MeshStandardMaterial({
        color: 0x443322,
        roughness: 1,
        metalness: 0
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -3;
    scene.add(floor);

    // Rocky island
    const island = new THREE.Mesh(
      new THREE.IcosahedronGeometry(1.2, 2),
      new THREE.MeshStandardMaterial({
        color: 0x554433,
        roughness: 0.95,
        metalness: 0.05
      })
    );
    island.scale.set(1, 0.5, 1);
    island.position.set(0, 1.8, 0);
    scene.add(island);

    // Water with shader
    const rippleUniforms = {
      uTime: { value: 0 },
      uBaseColor: { value: new THREE.Color(0x041525) },
      uWaveBoost: { value: 0 },
      uRippleCenters: { value: [new THREE.Vector2(9999, 9999), new THREE.Vector2(9999, 9999), new THREE.Vector2(9999, 9999), new THREE.Vector2(9999, 9999)] },
      uRippleTimes: { value: [9999, 9999, 9999, 9999] }
    };

    const waterMaterial = new THREE.ShaderMaterial({
      transparent: true,
      side: THREE.DoubleSide,
      uniforms: rippleUniforms,
      vertexShader: `
        uniform float uTime;
        uniform float uWaveBoost;
        uniform vec2 uRippleCenters[4];
        uniform float uRippleTimes[4];
        varying vec2 vUv;
        varying float vWave;

        void main() {
          vUv = uv;
          vec3 p = position;
          float t = uTime;

          float radial = length(p.xz);
          float gentle = sin(p.x * 2.5 + t * 1.2) * 0.05 + cos(p.y * 2.0 + p.z * 2.5 + t * 0.9) * 0.03;
          float largeWave = sin(radial * 4.0 - t * 4.0) * 0.12 * uWaveBoost;
          float rippleHeight = 0.0;

          for (int i = 0; i < 4; i++) {
            vec2 c = uRippleCenters[i];
            float rt = uRippleTimes[i];
            float age = t - rt;
            if (age >= 0.0 && age < 3.0) {
              float d = distance(p.xz, c);
              rippleHeight += sin(16.0 * d - age * 8.0) * exp(-2.2 * d) * (1.0 - age / 3.0) * 0.18;
            }
          }

          p.y += gentle + largeWave + rippleHeight;
          vWave = gentle + largeWave + rippleHeight;

          gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 uBaseColor;
        varying vec2 vUv;
        varying float vWave;

        void main() {
          float glow = 0.35 + abs(vWave) * 3.5;
          vec3 color = uBaseColor + vec3(0.0, 0.18, 0.22) * glow;
          float alpha = 0.72;
          gl_FragColor = vec4(color, alpha);
        }
      `
    });

    const water = new THREE.Mesh(new THREE.CircleGeometry(5.8, 64), waterMaterial);
    water.rotation.x = -Math.PI / 2;
    water.position.y = 1.5;
    scene.add(water);

    // Soldier
    const loader = new GLTFLoader();
    let soldier = null;

    loader.load(
      "soldier.glb",
      (gltf) => {
        soldier = gltf.scene;
        soldier.scale.setScalar(0.015);
        soldier.position.set(0, 2.3, 0);
        soldier.rotation.y = Math.PI;
        scene.add(soldier);
        state.soldierLoaded = true;
      },
      undefined,
      () => {
        const fallback = new THREE.Group();
        const body = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.08, 0.2, 4, 8),
          new THREE.MeshStandardMaterial({ color: 0x777777 })
        );
        const head = new THREE.Mesh(
          new THREE.SphereGeometry(0.06, 12, 12),
          new THREE.MeshStandardMaterial({ color: 0x999999 })
        );
        head.position.y = 0.2;
        fallback.add(body, head);
        fallback.scale.setScalar(1);
        fallback.position.set(0, 2.3, 0);
        fallback.rotation.y = Math.PI;
        scene.add(fallback);
        soldier = fallback;
        state.soldierLoaded = false;
      }
    );

    // Particles
    const particles = [];
    const burstParticles = [];
    const underwaterGroup = new THREE.Group();
    scene.add(underwaterGroup);

    const baseCycleColors = [0x00ffff, 0x0066ff, 0x00ff66];

    function randomUnderwaterPosition() {
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.sqrt(Math.random()) * 5;
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      const y = -2 + Math.random() * 3.4;
      return new THREE.Vector3(x, y, z);
    }

    function getThemeColor(i = 0) {
      const c = themes[state.currentThemeIndex]?.color ?? themes[0].color;
      return new THREE.Color(c);
    }

    function createParticle(pos = null, colorHex = null) {
      const color = new THREE.Color(colorHex ?? baseCycleColors[particles.length % baseCycleColors.length]);
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.05, 10, 10),
        new THREE.MeshStandardMaterial({
          color,
          emissive: color.clone(),
          emissiveIntensity: 1.2,
          roughness: 0.2,
          metalness: 0.0
        })
      );
      const light = new THREE.PointLight(color, 0.1, 2);
      const p = pos ? pos.clone() : randomUnderwaterPosition();
      mesh.position.copy(p);
      light.position.copy(p);
      underwaterGroup.add(mesh);
      underwaterGroup.add(light);

      const particle = {
        mesh,
        light,
        velocity: new THREE.Vector3(
          (Math.random() - 0.5) * 0.004,
          0.003 + Math.random() * 0.006,
          (Math.random() - 0.5) * 0.004
        ),
        baseIntensity: 0.1,
        color,
        reset() {
          const np = randomUnderwaterPosition();
          mesh.position.copy(np);
          light.position.copy(np);
        }
      };
      particles.push(particle);
      return particle;
    }

    for (let i = 0; i < 50; i++) createParticle();

    // Jellyfish
    const jellyfish = [];
    const jellyfishMaterial = new THREE.MeshStandardMaterial({
      color: 0x88ccff,
      emissive: new THREE.Color(themes[0].color),
      emissiveIntensity: 1.2,
      transparent: true,
      opacity: 0.85,
      roughness: 0.3,
      metalness: 0.0
    });

    function createJellyfish() {
      const group = new THREE.Group();

      const dome = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 16, 8, 0, Math.PI * 2, 0, Math.PI * 0.5),
        jellyfishMaterial.clone()
      );
      dome.rotation.x = Math.PI;
      group.add(dome);

      for (let i = 0; i < 4; i++) {
        const tentacle = new THREE.Mesh(
          new THREE.CylinderGeometry(0.015, 0.025, 0.45, 8, 1, false),
          new THREE.MeshStandardMaterial({
            color: 0x88ddff,
            emissive: new THREE.Color(themes[0].color),
            emissiveIntensity: 0.8,
            transparent: true,
            opacity: 0.75
          })
        );
        const a = (i / 4) * Math.PI * 2;
        tentacle.position.set(Math.cos(a) * 0.12, -0.22, Math.sin(a) * 0.12);
        group.add(tentacle);
      }

      const pos = randomUnderwaterPosition();
      pos.y = -2 + Math.random() * 2.8;
      group.position.copy(pos);

      underwaterGroup.add(group);

      jellyfish.push({
        group,
        baseScale: 1,
        pulse: 0,
        offset: Math.random() * Math.PI * 2,
        speed: 0.4 + Math.random() * 0.6,
        drift: new THREE.Vector3(
          (Math.random() - 0.5) * 0.003,
          0.001 + Math.random() * 0.002,
          (Math.random() - 0.5) * 0.003
        )
      });
    }

    for (let i = 0; i < 8; i++) createJellyfish();

    // Click ripple + burst
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let rippleIndex = 0;

    function addRipple(point) {
      rippleUniforms.uRippleCenters.value[rippleIndex].set(point.x, point.z);
      rippleUniforms.uRippleTimes.value[rippleIndex] = clock.getElapsedTime();
      rippleIndex = (rippleIndex + 1) % 4;
    }

    function spawnBurstParticles(origin) {
      const burstColor = getThemeColor();
      for (let i = 0; i < 10; i++) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 10, 10),
          new THREE.MeshStandardMaterial({
            color: burstColor,
            emissive: burstColor.clone(),
            emissiveIntensity: 1.5,
            transparent: true,
            opacity: 1
          })
        );
        const light = new THREE.PointLight(burstColor, 0.2, 2);
        mesh.position.copy(origin);
        light.position.copy(origin);

        const dir = new THREE.Vector3(
          (Math.random() - 0.5),
          Math.random() * 0.8,
          (Math.random() - 0.5)
        ).normalize().multiplyScalar(0.03 + Math.random() * 0.04);

        underwaterGroup.add(mesh);
        underwaterGroup.add(light);

        burstParticles.push({
          mesh,
          light,
          velocity: dir,
          life: 3,
          maxLife: 3
        });
      }
      state.particleCount += 10;
    }

    renderer.domElement.addEventListener("click", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(water);

      if (intersects.length > 0) {
        const point = intersects[0].point.clone();
        addRipple(point);
        spawnBurstParticles(point);
        state.clickCount++;
        updateHUD();
      }
    });

    let waveBoostTimer = 0;

    function setTheme(index) {
      state.currentThemeIndex = ((index % themes.length) + themes.length) % themes.length;
      state.currentThemeName = themes[state.currentThemeIndex].name;
      const themeColor = new THREE.Color(themes[state.currentThemeIndex].color);

      particles.forEach((p, i) => {
        const fallbackColor = new THREE.Color(baseCycleColors[i % baseCycleColors.length]);
        const finalColor = state.currentThemeIndex === 0 ? fallbackColor : themeColor;
        p.color.copy(finalColor);
        p.mesh.material.color.copy(finalColor);
        p.mesh.material.emissive.copy(finalColor);
        p.light.color.copy(finalColor);
      });

      burstParticles.forEach((p) => {
        p.mesh.material.color.copy(themeColor);
        p.mesh.material.emissive.copy(themeColor);
        p.light.color.copy(themeColor);
      });

      jellyfish.forEach((j) => {
        j.group.traverse((obj) => {
          if (obj.isMesh && obj.material) {
            if (obj.material.emissive) obj.material.emissive.copy(themeColor);
          }
        });
      });

      updateHUD();
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "b") {
        state.bioBoost = !state.bioBoost;
      } else if (key === "n") {
        state.nightMode = !state.nightMode;
        ambientLight.intensity = state.nightMode ? 0.02 : 0.15;
        directionalLight.intensity = state.nightMode ? 0.05 : 0.3;
      } else if (key === "w") {
        waveBoostTimer = 2;
        state.waveCount++;
      } else if (key === "j") {
        jellyfish.forEach(j => j.pulse = 1);
        state.jellyfishPulseCount++;
      } else if (key === "r") {
        if (soldier) {
          soldier.rotation.y -= Math.PI / 2;
          state.soldierRotation = (state.soldierRotation + 90) % 360;
        }
      } else if (key === "c") {
        setTheme(state.currentThemeIndex + 1);
      } else if (key === "p") {
        state.particlesPaused = !state.particlesPaused;
      }

      updateHUD();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      const delta = Math.min(clock.getDelta(), 0.033);

      controls.update();

      rippleUniforms.uTime.value = elapsed;

      if (waveBoostTimer > 0) {
        waveBoostTimer -= delta;
        rippleUniforms.uWaveBoost.value = Math.max(waveBoostTimer / 2, 0);
      } else {
        rippleUniforms.uWaveBoost.value = 0;
      }

      const intensityMul = state.bioBoost ? 3 : 1;

      if (!state.particlesPaused) {
        particles.forEach((p) => {
          p.mesh.position.add(p.velocity);
          p.light.position.copy(p.mesh.position);

          p.mesh.position.x += Math.sin(elapsed * 0.8 + p.mesh.position.z) * 0.001;
          p.mesh.position.z += Math.cos(elapsed * 0.7 + p.mesh.position.x) * 0.0015;

          if (p.mesh.position.y > 1.4 || p.mesh.position.length() > 5.4) {
            p.reset();
          }
        });

        jellyfish.forEach((j, idx) => {
          j.group.position.add(j.drift);
          j.group.position.y += Math.sin(elapsed * j.speed + j.offset) * 0.002;
          j.group.rotation.y += 0.003;

          const horiz = Math.sqrt(j.group.position.x * j.group.position.x + j.group.position.z * j.group.position.z);
          if (j.group.position.y > 1.3) j.group.position.y = -2.2;
          if (j.group.position.y < -2.7) j.group.position.y = -2.7;
          if (horiz > 5.0) {
            j.group.position.x *= 0.9;
            j.group.position.z *= 0.9;
            j.drift.x *= -1;
            j.drift.z *= -1;
          }

          if (j.pulse > 0) {
            j.pulse -= delta;
          }
          const pulseT = Math.max(j.pulse, 0);
          const pulseScale = pulseT > 0 ? 1 + Math.sin((1 - pulseT) * Math.PI) * 0.3 : 1;
          j.group.scale.setScalar(pulseScale);
        });
      }

      burstParticles.forEach((p, i) => {
        p.life -= delta;
        if (!state.particlesPaused) {
          p.mesh.position.add(p.velocity);
          p.velocity.multiplyScalar(0.99);
          p.velocity.y -= 0.0004;
          p.light.position.copy(p.mesh.position);
        }

        const alpha = Math.max(p.life / p.maxLife, 0);
        p.mesh.material.opacity = alpha;
        p.light.intensity = 0.2 * alpha * intensityMul;

        if (p.life <= 0) {
          underwaterGroup.remove(p.mesh);
          underwaterGroup.remove(p.light);
          burstParticles.splice(i, 1);
        }
      });

      particles.forEach((p, i) => {
        const flicker = 0.08 + 0.04 * Math.sin(elapsed * 2 + i);
        p.light.intensity = (p.baseIntensity + flicker) * intensityMul;
        p.mesh.material.emissiveIntensity = 1.2 * intensityMul;
      });

      jellyfish.forEach((j, i) => {
        j.group.traverse((obj) => {
          if (obj.isMesh && obj.material && "emissiveIntensity" in obj.material) {
            obj.material.emissiveIntensity = (obj.geometry.type.includes("Cylinder") ? 0.8 : 1.2) * intensityMul;
          }
        });
      });

      state.ambientIntensity = sanitizeNumber(ambientLight.intensity, 0.15);
      state.cameraDistance = sanitizeNumber(camera.position.distanceTo(new THREE.Vector3(0, 0, 0)), 0);
      state.particleCount = sanitizeNumber(particles.length + burstParticles.length, 0);
      state.jellyfishCount = sanitizeNumber(jellyfish.length, 8);
      state.currentThemeIndex = sanitizeNumber(state.currentThemeIndex, 0);
      state.waveCount = sanitizeNumber(state.waveCount, 0);
      state.jellyfishPulseCount = sanitizeNumber(state.jellyfishPulseCount, 0);
      state.soldierRotation = sanitizeNumber(state.soldierRotation, 0) % 360;
      state.clickCount = sanitizeNumber(state.clickCount, 0);

      window.__3D_STATE__ = {
        particleCount: state.particleCount,
        bioBoost: !!state.bioBoost,
        nightMode: !!state.nightMode,
        waveCount: state.waveCount,
        jellyfishPulseCount: state.jellyfishPulseCount,
        soldierRotation: state.soldierRotation,
        currentThemeIndex: Math.max(0, Math.min(3, state.currentThemeIndex)),
        currentThemeName: state.currentThemeName || "cyan",
        particlesPaused: !!state.particlesPaused,
        clickCount: state.clickCount,
        jellyfishCount: state.jellyfishCount,
        soldierLoaded: !!state.soldierLoaded,
        ambientIntensity: state.ambientIntensity,
        cameraDistance: state.cameraDistance
      };

      updateHUD();
      renderer.render(scene, camera);
    }

    setTheme(0);
    updateHUD();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
