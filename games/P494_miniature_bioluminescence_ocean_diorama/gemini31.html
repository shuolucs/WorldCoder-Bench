<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniature Bioluminescent Ocean Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #88ccff;
            background: rgba(5, 5, 32, 0.7);
            padding: 10px;
            border: 1px solid #223355;
            border-radius: 5px;
            pointer-events: none;
            text-shadow: 0 0 5px #00ffff;
        }
        #controls-info {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #88ccff;
            background: rgba(5, 5, 32, 0.7);
            padding: 10px 20px;
            border: 1px solid #223355;
            border-radius: 5px;
            pointer-events: none;
            text-align: center;
            font-size: 14px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">Initializing...</div>
    <div id="controls-info">B:Glow N:Night W:Wave J:Pulse R:Rotate C:Color P:Pause Click:Ripple</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            particleCount: 50,
            bioBoost: false,
            nightMode: false,
            waveCount: 0,
            jellyfishPulseCount: 0,
            soldierRotation: 0,
            currentThemeIndex: 0,
            currentThemeName: 'cyan',
            particlesPaused: false,
            clickCount: 0,
            jellyfishCount: 8,
            soldierLoaded: false,
            ambientIntensity: 0.15,
            cameraDistance: 12
        };

        const themes = [
            { name: 'cyan', color: 0x00ffff },
            { name: 'purple', color: 0xaa00ff },
            { name: 'green', color: 0x00ff88 },
            { name: 'gold', color: 0xffaa00 }
        ];

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050520);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 30;
        controls.minDistance = 5;

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0x334466, 0.15);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0x223355, 0.3);
        dirLight.position.set(2, 8, 3);
        scene.add(dirLight);

        // --- ENVIRONMENT ---
        // Glass Bowl
        const bowlGeo = new THREE.SphereGeometry(6, 64, 64, 0, Math.PI * 2, 0, Math.PI * 0.6);
        const bowlMat = new THREE.MeshPhysicalMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.15,
            roughness: 0.05,
            transmission: 0.9,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const bowl = new THREE.Mesh(bowlGeo, bowlMat);
        scene.add(bowl);

        // Ocean Floor
        const floorGeo = new THREE.CircleGeometry(5.5, 64);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x443322, roughness: 0.9 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -3;
        scene.add(floor);

        // Rocky Island
        const islandGeo = new THREE.IcosahedronGeometry(1.2, 2);
        const islandMat = new THREE.MeshStandardMaterial({ color: 0x554433, roughness: 0.8 });
        const island = new THREE.Mesh(islandGeo, islandMat);
        island.scale.set(1, 0.5, 1);
        island.position.set(0, 1.8, 0);
        scene.add(island);

        // Water Surface (Custom Shader)
        const waterGeo = new THREE.CircleGeometry(5.8, 64);
        const waterUniforms = {
            time: { value: 0 },
            waveAmp: { value: 0.05 },
            baseColor: { value: new THREE.Color(0x041525) }
        };
        const waterMat = new THREE.ShaderMaterial({
            uniforms: waterUniforms,
            vertexShader: `
                uniform float time;
                uniform float waveAmp;
                varying vec2 vUv;
                varying float vElevation;
                void main() {
                    vUv = uv;
                    vec3 pos = position;
                    float elevation = sin(pos.x * 2.0 + time) * 0.05 + cos(pos.y * 2.0 + time) * 0.05;
                    elevation += sin(pos.x * 1.0 + time * 2.0) * waveAmp;
                    pos.z += elevation;
                    vElevation = elevation;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 baseColor;
                varying float vElevation;
                void main() {
                    float mixRatio = (vElevation + 0.1) * 3.0;
                    vec3 finalColor = mix(baseColor, vec3(0.1, 0.3, 0.5), mixRatio);
                    gl_FragColor = vec4(finalColor, 0.85);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.position.y = 1.5;
        scene.add(water);

        // --- ENTITIES ---
        // Soldier
        let soldierModel = null;
        const loader = new GLTFLoader();
        loader.load(
            'soldier.glb',
            (gltf) => {
                soldierModel = gltf.scene;
                soldierModel.scale.set(0.015, 0.015, 0.015);
                soldierModel.position.set(0, 2.3, 0);
                scene.add(soldierModel);
                window.__3D_STATE__.soldierLoaded = true;
            },
            undefined,
            (error) => {
                // Fallback dummy if file not found
                const dummyGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.6, 8);
                const dummyMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                soldierModel = new THREE.Mesh(dummyGeo, dummyMat);
                soldierModel.position.set(0, 2.3, 0);
                scene.add(soldierModel);
                window.__3D_STATE__.soldierLoaded = true;
            }
        );

        // Particles
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.05, 8, 8);
        
        function createParticle(x, y, z, isBurst = false) {
            const colorHex = themes[window.__3D_STATE__.currentThemeIndex].color;
            const mat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 1 });
            const mesh = new THREE.Mesh(particleGeo, mat);
            mesh.position.set(x, y, z);
            
            const light = new THREE.PointLight(colorHex, window.__3D_STATE__.bioBoost ? 0.3 : 0.1, 2);
            light.position.copy(mesh.position);
            
            scene.add(mesh);
            scene.add(light);
            
            const p = {
                mesh,
                light,
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * (isBurst ? 0.1 : 0.01),
                    isBurst ? (Math.random() * 0.05 + 0.02) : (Math.random() * 0.01 + 0.005),
                    (Math.random() - 0.5) * (isBurst ? 0.1 : 0.01)
                ),
                isBurst,
                life: isBurst ? 3.0 : Infinity,
                maxLife: 3.0
            };
            particles.push(p);
        }

        // Initial 50 particles
        for (let i = 0; i < 50; i++) {
            const r = Math.random() * 4.5;
            const theta = Math.random() * Math.PI * 2;
            createParticle(
                r * Math.cos(theta),
                -2 + Math.random() * 3.4,
                r * Math.sin(theta)
            );
        }

        // Jellyfish
        const jellyfishList = [];
        const jellyDomeGeo = new THREE.SphereGeometry(0.3, 16, 8, 0, Math.PI * 2, 0, Math.PI * 0.5);
        const jellyTentacleGeo = new THREE.CylinderGeometry(0.02, 0.01, 0.6, 4);
        jellyTentacleGeo.translate(0, -0.3, 0);

        for (let i = 0; i < 8; i++) {
            const group = new THREE.Group();
            const colorHex = themes[window.__3D_STATE__.currentThemeIndex].color;
            const mat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                emissive: colorHex,
                emissiveIntensity: 0.5,
                transparent: true,
                opacity: 0.8,
                roughness: 0.2
            });

            const dome = new THREE.Mesh(jellyDomeGeo, mat);
            group.add(dome);

            for (let j = 0; j < 4; j++) {
                const tentacle = new THREE.Mesh(jellyTentacleGeo, mat);
                const angle = (j / 4) * Math.PI * 2;
                tentacle.position.set(Math.cos(angle) * 0.15, 0, Math.sin(angle) * 0.15);
                group.add(tentacle);
            }

            const r = Math.random() * 4;
            const theta = Math.random() * Math.PI * 2;
            group.position.set(r * Math.cos(theta), -1.5 + Math.random() * 2.5, r * Math.sin(theta));
            
            // Store base Y for floating animation
            group.userData.baseY = group.position.y;
            group.userData.phase = Math.random() * Math.PI * 2;
            
            scene.add(group);
            jellyfishList.push(group);
        }

        // Ripples
        const ripples = [];
        const rippleGeo = new THREE.RingGeometry(0.1, 0.2, 32);
        rippleGeo.rotateX(-Math.PI / 2);

        // --- INTERACTIONS ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        let waveActive = false;
        let waveStartTime = 0;
        let pulseActive = false;
        let pulseStartTime = 0;

        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(water);
            
            if (intersects.length > 0) {
                const p = intersects[0].point;
                window.__3D_STATE__.clickCount++;
                
                // Spawn burst particles
                for (let i = 0; i < 10; i++) {
                    createParticle(p.x, p.y - 0.1, p.z, true);
                    window.__3D_STATE__.particleCount++;
                }

                // Create visual ripple
                const rMat = new THREE.MeshBasicMaterial({ 
                    color: themes[window.__3D_STATE__.currentThemeIndex].color, 
                    transparent: true, 
                    opacity: 0.8,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });
                const ripple = new THREE.Mesh(rippleGeo, rMat);
                ripple.position.copy(p);
                ripple.position.y += 0.01; // slightly above water
                scene.add(ripple);
                ripples.push({ mesh: ripple, life: 1.0, maxLife: 1.0 });
            }
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const state = window.__3D_STATE__;

            if (key === 'b') {
                state.bioBoost = !state.bioBoost;
                updateColorsAndLights();
            } else if (key === 'n') {
                state.nightMode = !state.nightMode;
                ambientLight.intensity = state.nightMode ? 0.02 : 0.15;
                dirLight.intensity = state.nightMode ? 0.05 : 0.3;
                state.ambientIntensity = ambientLight.intensity;
            } else if (key === 'w') {
                waveActive = true;
                waveStartTime = clock.getElapsedTime();
                state.waveCount++;
            } else if (key === 'j') {
                pulseActive = true;
                pulseStartTime = clock.getElapsedTime();
                state.jellyfishPulseCount++;
            } else if (key === 'r') {
                if (soldierModel) {
                    soldierModel.rotation.y -= Math.PI / 2;
                    state.soldierRotation = (state.soldierRotation + 90) % 360;
                }
            } else if (key === 'c') {
                state.currentThemeIndex = (state.currentThemeIndex + 1) % themes.length;
                state.currentThemeName = themes[state.currentThemeIndex].name;
                updateColorsAndLights();
            } else if (key === 'p') {
                state.particlesPaused = !state.particlesPaused;
            }
        });

        function updateColorsAndLights() {
            const state = window.__3D_STATE__;
            const colorHex = themes[state.currentThemeIndex].color;
            
            particles.forEach(p => {
                p.mesh.material.color.setHex(colorHex);
                p.light.color.setHex(colorHex);
                p.light.intensity = (state.bioBoost ? 0.3 : 0.1) * (p.isBurst ? (p.life/p.maxLife) : 1);
            });

            jellyfishList.forEach(j => {
                j.children.forEach(child => {
                    child.material.emissive.setHex(colorHex);
                    child.material.emissiveIntensity = state.bioBoost ? 1.5 : 0.5;
                });
            });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();
        const hud = document.getElementById('hud');

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const state = window.__3D_STATE__;

            controls.update();

            // Water animation
            waterUniforms.time.value = time;
            if (waveActive) {
                const elapsed = time - waveStartTime;
                if (elapsed < 2.0) {
                    waterUniforms.waveAmp.value = 0.05 + Math.sin(elapsed * Math.PI) * 0.15;
                } else {
                    waveActive = false;
                    waterUniforms.waveAmp.value = 0.05;
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                
                if (!state.particlesPaused) {
                    p.mesh.position.add(p.velocity);
                    p.light.position.copy(p.mesh.position);
                }

                if (p.isBurst) {
                    if (!state.particlesPaused) p.life -= delta;
                    const ratio = Math.max(0, p.life / p.maxLife);
                    p.mesh.material.opacity = ratio;
                    p.light.intensity = (state.bioBoost ? 0.3 : 0.1) * ratio;
                    
                    if (p.life <= 0) {
                        scene.remove(p.mesh);
                        scene.remove(p.light);
                        p.mesh.material.dispose();
                        p.light.dispose();
                        particles.splice(i, 1);
                        state.particleCount--;
                    }
                } else {
                    if (!state.particlesPaused && p.mesh.position.y > 1.4) {
                        p.mesh.position.y = -2;
                        const r = Math.random() * 4.5;
                        const theta = Math.random() * Math.PI * 2;
                        p.mesh.position.x = r * Math.cos(theta);
                        p.mesh.position.z = r * Math.sin(theta);
                    }
                }
            }

            // Jellyfish
            jellyfishList.forEach(j => {
                if (!state.particlesPaused) {
                    j.position.y = j.userData.baseY + Math.sin(time * 2 + j.userData.phase) * 0.2;
                }
            });

            if (pulseActive) {
                const elapsed = time - pulseStartTime;
                if (elapsed < 1.0) {
                    const scale = 1.0 + Math.sin(elapsed * Math.PI) * 0.3;
                    jellyfishList.forEach(j => j.scale.set(scale, scale, scale));
                } else {
                    pulseActive = false;
                    jellyfishList.forEach(j => j.scale.set(1, 1, 1));
                }
            }

            // Ripples
            for (let i = ripples.length - 1; i >= 0; i--) {
                const r = ripples[i];
                r.life -= delta;
                if (r.life <= 0) {
                    scene.remove(r.mesh);
                    r.mesh.material.dispose();
                    ripples.splice(i, 1);
                } else {
                    const progress = 1.0 - (r.life / r.maxLife);
                    const scale = 1.0 + progress * 5.0;
                    r.mesh.scale.set(scale, scale, scale);
                    r.mesh.material.opacity = 0.8 * (r.life / r.maxLife);
                }
            }

            // Update State
            state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            // Update HUD
            hud.innerHTML = `Particles: ${state.particleCount} | Theme: ${state.currentThemeName} | Clicks: ${state.clickCount} | Night: ${state.nightMode ? 'ON' : 'OFF'}`;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
