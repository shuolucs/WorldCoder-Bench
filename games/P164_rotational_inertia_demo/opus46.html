<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotational Inertia Demonstration</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 100;
    background: rgba(0, 0, 0, 0.75);
    color: #ffffff;
    padding: 18px 22px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 300px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
}

#hud .title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
    color: #66aaff;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    padding-bottom: 6px;
}

#hud .label {
    color: #aaaacc;
}

#hud .value {
    color: #ffffff;
    font-weight: bold;
    font-family: 'Courier New', monospace;
}

#hud .conservation-on {
    color: #44ff88;
    font-weight: bold;
}

#hud .conservation-off {
    color: #ff6666;
    font-weight: bold;
}

#controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 12px;
    align-items: center;
}

#controls button {
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#toggle-spin {
    background: linear-gradient(135deg, #3366cc, #5588ee);
    color: white;
}

#toggle-spin:hover {
    background: linear-gradient(135deg, #4477dd, #66aaff);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(51, 102, 204, 0.4);
}

#freeze-btn {
    background: linear-gradient(135deg, #cc3333, #ee5555);
    color: white;
}

#freeze-btn:hover {
    background: linear-gradient(135deg, #dd4444, #ff6666);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(204, 51, 51, 0.4);
}

#instructions {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    background: rgba(0, 0, 0, 0.6);
    color: #aaaacc;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    text-align: center;
    white-space: nowrap;
}

#instructions span {
    color: #66aaff;
    font-weight: bold;
}

#loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 200;
    color: white;
    font-size: 20px;
    background: rgba(0,0,0,0.8);
    padding: 20px 40px;
    border-radius: 10px;
}
</style>
</head>
<body>

<div id="loading">Loading 3D Model...</div>

<div id="hud">
    <div class="title">⚙ Rotational Inertia Demo</div>
    <div id="hud-content"></div>
</div>

<div id="instructions">
    <span>A/D</span> Apply Torque &nbsp;|&nbsp;
    <span>B</span> Brake &nbsp;|&nbsp;
    <span>R</span> Reset &nbsp;|&nbsp;
    <span>↑/↓</span> Mass Radius &nbsp;|&nbsp;
    <span>C</span> Conservation Mode
</div>

<div id="controls">
    <button id="toggle-spin">⚡ Impulse Spin</button>
    <button id="freeze-btn">🛑 Freeze</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ STATE ============
const state = {
    angularVelocity: 0,
    momentOfInertia: 1.5,
    appliedTorque: 0,
    massRadius: 0.5,
    angularMomentum: 0,
    kineticEnergy: 0,
    conservationMode: false,
    platformRotationY: 0,
    isSpinning: false,
    frictionCoeff: 0.3,
    shoeLoaded: false,
    massCount: 4,
    brakeCount: 0,
    resetCount: 0
};
window.__3D_STATE__ = state;

// Physics constants
const baseMOI = 1.0;
const massPerSphere = 0.5;
const torqueValue = 5.0;
const maxAngularVelocity = 20;
const maxDt = 1 / 30;

// Key state
const keys = {};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);
controls.update();

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x6688cc, 0x443322, 0.6);
scene.add(hemiLight);

// ============ GROUND ============
const groundGeom = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x444444,
    roughness: 0.9,
    metalness: 0.1
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(50, 50, 0x555555, 0x333333);
gridHelper.position.y = 0.005;
scene.add(gridHelper);

// ============ PLATFORM ============
const platformGroup = new THREE.Group();
scene.add(platformGroup);

const platformGeom = new THREE.CylinderGeometry(2, 2, 0.15, 64);
const platformMat = new THREE.MeshStandardMaterial({
    color: 0x3366cc,
    roughness: 0.3,
    metalness: 0.6
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = 0.075;
platform.castShadow = true;
platform.receiveShadow = true;
platformGroup.add(platform);

// Platform edge ring for visual flair
const ringGeom = new THREE.TorusGeometry(2, 0.03, 16, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x5599ff, emissive: 0x2244aa, emissiveIntensity: 0.3 });
const ring = new THREE.Mesh(ringGeom, ringMat);
ring.rotation.x = Math.PI / 2;
ring.position.y = 0.15;
platformGroup.add(ring);

// ============ POINT MASSES ============
const massSpheres = [];
const massSphereGeom = new THREE.SphereGeometry(0.15, 32, 32);
const massSphereMat = new THREE.MeshStandardMaterial({
    color: 0xff4444,
    roughness: 0.3,
    metalness: 0.5,
    emissive: 0xff2222,
    emissiveIntensity: 0.15
});

for (let i = 0; i < 4; i++) {
    const sphere = new THREE.Mesh(massSphereGeom, massSphereMat);
    sphere.castShadow = true;
    const angle = (i * Math.PI * 2) / 4;
    sphere.userData.angle = angle;
    sphere.position.y = 0.15 + 0.15;
    platformGroup.add(sphere);
    massSpheres.push(sphere);
}

function updateMassPositions() {
    for (let i = 0; i < massSpheres.length; i++) {
        const angle = massSpheres[i].userData.angle;
        massSpheres[i].position.x = Math.cos(angle) * state.massRadius;
        massSpheres[i].position.z = Math.sin(angle) * state.massRadius;
    }
}

function recalculateMOI() {
    state.momentOfInertia = baseMOI + 4 * massPerSphere * state.massRadius * state.massRadius;
}

updateMassPositions();
recalculateMOI();

// ============ LOAD SHOE MODEL ============
let shoeModel = null;
const loader = new GLTFLoader();

loader.load(
    'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@main/2.0/MaterialsVariantsShoe/glTF-Binary/MaterialsVariantsShoe.glb',
    (gltf) => {
        shoeModel = gltf.scene;

        // Calculate bounding box to scale and center
        const box = new THREE.Box3().setFromObject(shoeModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const center = new THREE.Vector3();
        box.getCenter(center);

        // Scale to fit ~1.5 units wide
        const maxDim = Math.max(size.x, size.y, size.z);
        const scaleFactor = 1.5 / maxDim;
        shoeModel.scale.setScalar(scaleFactor);

        // Recalculate after scaling
        const box2 = new THREE.Box3().setFromObject(shoeModel);
        const center2 = new THREE.Vector3();
        box2.getCenter(center2);
        const size2 = new THREE.Vector3();
        box2.getSize(size2);

        // Center on platform
        shoeModel.position.x = -center2.x;
        shoeModel.position.z = -center2.z;
        shoeModel.position.y = 0.15 - box2.min.y;

        shoeModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        platformGroup.add(shoeModel);
        state.shoeLoaded = true;

        document.getElementById('loading').style.display = 'none';
    },
    (progress) => {
        if (progress.total > 0) {
            const pct = Math.round((progress.loaded / progress.total) * 100);
            document.getElementById('loading').textContent = `Loading 3D Model... ${pct}%`;
        }
    },
    (error) => {
        console.error('Error loading model:', error);
        document.getElementById('loading').textContent = 'Model load failed. Demo continues without shoe.';
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 2000);
    }
);

// ============ INPUT HANDLING ============
window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (keys[key]) return; // Already held
    keys[key] = true;

    if (key === 'b') {
        state.angularVelocity *= 0.5;
        state.brakeCount++;
    }

    if (key === 'r') {
        resetState();
        state.resetCount++;
    }

    if (key === 'c') {
        state.conservationMode = !state.conservationMode;
        if (state.conservationMode) {
            state.angularMomentum = state.momentOfInertia * state.angularVelocity;
        }
    }

    if (e.key === 'ArrowUp') {
        e.preventDefault();
        changeMassRadius(0.1);
    }

    if (e.key === 'ArrowDown') {
        e.preventDefault();
        changeMassRadius(-0.1);
    }
});

window.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
    // Also handle arrow keys by actual key name
    if (e.key === 'ArrowUp') keys['arrowup'] = false;
    if (e.key === 'ArrowDown') keys['arrowdown'] = false;
});

function changeMassRadius(delta) {
    const oldMOI = state.momentOfInertia;
    const oldOmega = state.angularVelocity;
    const L = oldMOI * oldOmega;

    state.massRadius = Math.max(0.2, Math.min(1.8, state.massRadius + delta));
    state.massRadius = Math.round(state.massRadius * 10) / 10;

    recalculateMOI();
    updateMassPositions();

    if (state.conservationMode) {
        state.angularVelocity = L / state.momentOfInertia;
        state.angularVelocity = Math.max(-maxAngularVelocity, Math.min(maxAngularVelocity, state.angularVelocity));
    }
}

function resetState() {
    state.angularVelocity = 0;
    state.appliedTorque = 0;
    state.massRadius = 0.5;
    state.conservationMode = false;
    state.platformRotationY = 0;
    platformGroup.rotation.y = 0;
    recalculateMOI();
    updateMassPositions();
}

// Buttons
document.getElementById('toggle-spin').addEventListener('click', () => {
    state.angularVelocity += 3.0;
    state.angularVelocity = Math.max(-maxAngularVelocity, Math.min(maxAngularVelocity, state.angularVelocity));
});

document.getElementById('freeze-btn').addEventListener('click', () => {
    state.angularVelocity = 0;
});

// ============ HUD ============
const hudContent = document.getElementById('hud-content');

function updateHUD() {
    state.angularMomentum = state.momentOfInertia * state.angularVelocity;
    state.kineticEnergy = 0.5 * state.momentOfInertia * state.angularVelocity * state.angularVelocity;
    state.isSpinning = Math.abs(state.angularVelocity) > 0.01;
    state.platformRotationY = platformGroup.rotation.y;

    const consClass = state.conservationMode ? 'conservation-on' : 'conservation-off';
    const consText = state.conservationMode ? 'ON' : 'OFF';

    hudContent.innerHTML = `
        <span class="label">Angular Velocity:</span> <span class="value">${state.angularVelocity.toFixed(2)} rad/s</span><br>
        <span class="label">Moment of Inertia:</span> <span class="value">${state.momentOfInertia.toFixed(3)} kg·m²</span><br>
        <span class="label">Applied Torque:</span> <span class="value">${state.appliedTorque.toFixed(1)} N·m</span><br>
        <span class="label">Mass Radius:</span> <span class="value">${state.massRadius.toFixed(1)} units</span><br>
        <span class="label">Angular Momentum:</span> <span class="value">${state.angularMomentum.toFixed(3)} kg·m²/s</span><br>
        <span class="label">Conservation Mode:</span> <span class="${consClass}">${consText}</span><br>
        <span class="label">Kinetic Energy:</span> <span class="value">${state.kineticEnergy.toFixed(3)} J</span>
    `;
}

// ============ ANIMATION LOOP ============
let lastTime = performance.now();

function animate(currentTime) {
    requestAnimationFrame(animate);

    let dt = (currentTime - lastTime) / 1000;
    lastTime = currentTime;
    dt = Math.min(dt, maxDt);

    // Determine applied torque from keys
    state.appliedTorque = 0;
    if (keys['a']) state.appliedTorque += torqueValue;
    if (keys['d']) state.appliedTorque -= torqueValue;

    // Friction torque
    const frictionTorque = -state.frictionCoeff * state.angularVelocity;

    // Angular acceleration
    const angularAcceleration = (state.appliedTorque + frictionTorque) / state.momentOfInertia;

    // Update angular velocity
    state.angularVelocity += angularAcceleration * dt;

    // Clamp
    state.angularVelocity = Math.max(-maxAngularVelocity, Math.min(maxAngularVelocity, state.angularVelocity));

    // Snap to zero if very slow and no torque
    if (Math.abs(state.angularVelocity) < 0.01 && state.appliedTorque === 0) {
        state.angularVelocity = 0;
    }

    // Update rotation
    platformGroup.rotation.y += state.angularVelocity * dt;

    // Update ring glow based on speed
    const speedRatio = Math.abs(state.angularVelocity) / maxAngularVelocity;
    ringMat.emissiveIntensity = 0.3 + speedRatio * 2.0;

    // Mass sphere pulsing
    const pulse = 0.15 + Math.sin(currentTime * 0.005) * 0.02;
    massSpheres.forEach(s => s.scale.setScalar(1 + speedRatio * 0.3));

    // Update controls
    controls.update();

    // Update HUD
    updateHUD();

    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
requestAnimationFrame(animate);
</script>
</body>
</html>
