<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotational Inertia Demonstration</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: monospace;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            line-height: 1.5;
            min-width: 300px;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #3366cc;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-family: inherit;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #4477dd;
        }
        button:active {
            background: #2255bb;
        }
        .highlight {
            color: #ffaa00;
        }
        .on { color: #44ff44; }
        .off { color: #ff4444; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud"></div>
    <div class="controls">
        <button id="toggle-spin">Add Impulse (+3 rad/s)</button>
        <button id="freeze-btn">Freeze (0 rad/s)</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));

        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8, metalness: 0.2 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Grid Helper
        const grid = new THREE.GridHelper(50, 50, 0x000000, 0x000000);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // --- ROTATIONAL PLATFORM ---
        const platformGroup = new THREE.Group();
        scene.add(platformGroup);

        const platformGeo = new THREE.CylinderGeometry(2, 2, 0.15, 64);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x3366cc, roughness: 0.4, metalness: 0.1 });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = 0.075;
        platformGroup.add(platform);

        // --- MASS DISTRIBUTION SYSTEM ---
        const masses = [];
        const massGeo = new THREE.SphereGeometry(0.15, 32, 32);
        const massMat = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.3, metalness: 0.2 });
        
        for (let i = 0; i < 4; i++) {
            const mass = new THREE.Mesh(massGeo, massMat);
            platformGroup.add(mass);
            masses.push(mass);
        }

        // --- PHYSICS STATE ---
        const baseMOI = 1.0;
        const massPerSphere = 0.5;
        const frictionCoeff = 0.3;
        
        let massRadius = 0.5;
        let momentOfInertia = baseMOI + 4 * massPerSphere * massRadius * massRadius;
        let angularVelocity = 0;
        let appliedTorque = 0;
        let conservationMode = false;
        
        let shoeLoaded = false;
        let brakeCount = 0;
        let resetCount = 0;

        const keys = { a: false, d: false };

        // Initialize mass positions
        updateMassPositions();

        // --- LOAD MODEL ---
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/MaterialsVariantsShoe/glTF-Binary/MaterialsVariantsShoe.glb',
            (gltf) => {
                const shoe = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(shoe);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                const maxDim = Math.max(size.x, size.z);
                const scale = 1.5 / maxDim;
                shoe.scale.setScalar(scale);
                
                shoe.position.x = -center.x * scale;
                shoe.position.z = -center.z * scale;
                shoe.position.y = -center.y * scale + 0.15; 
                
                platformGroup.add(shoe);
                shoeLoaded = true;
            }
        );

        // --- LOGIC FUNCTIONS ---
        function updateMassPositions() {
            const yPos = 0.15 + 0.15; // Platform top + sphere radius
            masses[0].position.set(massRadius, yPos, 0);
            masses[1].position.set(-massRadius, yPos, 0);
            masses[2].position.set(0, yPos, massRadius);
            masses[3].position.set(0, yPos, -massRadius);
        }

        function setMassRadius(newRadius) {
            newRadius = Math.max(0.2, Math.min(1.8, newRadius));
            if (Math.abs(newRadius - massRadius) < 0.001) return;

            const oldMOI = momentOfInertia;
            massRadius = newRadius;
            momentOfInertia = baseMOI + 4 * massPerSphere * massRadius * massRadius;

            if (conservationMode) {
                angularVelocity = (oldMOI * angularVelocity) / momentOfInertia;
                angularVelocity = Math.max(-20, Math.min(20, angularVelocity));
            }

            updateMassPositions();
        }

        function reset() {
            angularVelocity = 0;
            appliedTorque = 0;
            conservationMode = false;
            setMassRadius(0.5);
            platformGroup.rotation.y = 0;
            resetCount++;
        }

        // --- EVENT LISTENERS ---
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'a') keys.a = true;
            if (k === 'd') keys.d = true;
            if (k === 'b') {
                angularVelocity *= 0.5;
                brakeCount++;
            }
            if (k === 'r') reset();
            if (k === 'c') conservationMode = !conservationMode;
            
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                setMassRadius(massRadius + 0.1);
            }
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                setMassRadius(massRadius - 0.1);
            }
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'a') keys.a = false;
            if (k === 'd') keys.d = false;
        });

        document.getElementById('toggle-spin').addEventListener('click', () => {
            angularVelocity += 3.0;
            angularVelocity = Math.max(-20, Math.min(20, angularVelocity));
        });

        document.getElementById('freeze-btn').addEventListener('click', () => {
            angularVelocity = 0;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();
        const hudElement = document.getElementById('hud');

        function animate() {
            requestAnimationFrame(animate);

            let dt = clock.getDelta();
            dt = Math.min(dt, 1/30);

            // Physics Update
            appliedTorque = 0;
            if (keys.a) appliedTorque += 5.0;
            if (keys.d) appliedTorque -= 5.0;

            const frictionTorque = -frictionCoeff * angularVelocity;
            const angularAcceleration = (appliedTorque + frictionTorque) / momentOfInertia;

            angularVelocity += angularAcceleration * dt;
            angularVelocity = Math.max(-20, Math.min(20, angularVelocity));

            if (Math.abs(angularVelocity) < 0.01 && appliedTorque === 0) {
                angularVelocity = 0;
            }

            platformGroup.rotation.y += angularVelocity * dt;

            // Calculations for HUD/State
            const L = momentOfInertia * angularVelocity;
            const KE = 0.5 * momentOfInertia * angularVelocity * angularVelocity;
            const isSpinning = Math.abs(angularVelocity) > 0.01;

            // Update HUD
            hudElement.innerHTML = `
                <div style="font-size: 16px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px;">Rotational Dynamics</div>
                Angular Velocity: <span class="highlight">${angularVelocity.toFixed(2)}</span> rad/s<br>
                Moment of Inertia: <span class="highlight">${momentOfInertia.toFixed(3)}</span> kg·m²<br>
                Applied Torque: <span class="highlight">${appliedTorque.toFixed(1)}</span> N·m<br>
                Mass Radius: <span class="highlight">${massRadius.toFixed(1)}</span> units<br>
                Angular Momentum: <span class="highlight">${L.toFixed(3)}</span><br>
                Kinetic Energy: <span class="highlight">${KE.toFixed(3)}</span><br>
                Conservation Mode: <span class="${conservationMode ? 'on' : 'off'}">${conservationMode ? 'ON' : 'OFF'}</span><br>
                <div style="margin-top: 15px; font-size: 12px; color: #aaa;">
                    [A]/[D]: Apply Torque (+/- 5 N·m)<br>
                    [Up]/[Down]: Adjust Mass Radius<br>
                    [C]: Toggle Conservation Mode<br>
                    [B]: Brake (Halve Velocity)<br>
                    [R]: Reset
                </div>
            `;

            // Update Global State
            window.__3D_STATE__ = {
                angularVelocity,
                momentOfInertia,
                appliedTorque,
                massRadius,
                angularMomentum: L,
                kineticEnergy: KE,
                conservationMode,
                platformRotationY: platformGroup.rotation.y,
                isSpinning,
                frictionCoeff,
                shoeLoaded,
                massCount: 4,
                brakeCount,
                resetCount
            };

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
