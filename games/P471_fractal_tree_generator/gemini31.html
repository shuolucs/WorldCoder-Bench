<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fractal Tree Generator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 320px;
            background: rgba(10, 10, 30, 0.85);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
            max-height: 95vh;
            overflow-y: auto;
        }
        h1 {
            font-size: 1.2rem;
            margin: 0 0 15px 0;
            text-align: center;
            color: #4CAF50;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 4px;
            color: #ccc;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #4CAF50;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        button {
            flex: 1 1 45%;
            background: #2a2a4a;
            color: #fff;
            border: 1px solid #4a4a7a;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        button:hover {
            background: #3a3a6a;
        }
        button.active {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        #stats {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #333;
            font-size: 0.85rem;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }
        #branchInfo {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #FFD700;
            color: #FFD700;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -150%);
            z-index: 10;
        }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: #4a4a7a; border-radius: 3px; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <h1>Fractal Tree Generator</h1>
        
        <div class="control-group">
            <label><span>Depth</span> <span id="val-depth">5</span></label>
            <input type="range" id="in-depth" min="1" max="8" step="1" value="5">
        </div>
        <div class="control-group">
            <label><span>Branch Length</span> <span id="val-length">3.0</span></label>
            <input type="range" id="in-length" min="0.5" max="6.0" step="0.1" value="3.0">
        </div>
        <div class="control-group">
            <label><span>Branch Angle</span> <span id="val-angle">30°</span></label>
            <input type="range" id="in-angle" min="10" max="60" step="1" value="30">
        </div>
        <div class="control-group">
            <label><span>Length Decay</span> <span id="val-ldecay">0.70</span></label>
            <input type="range" id="in-ldecay" min="0.4" max="0.9" step="0.01" value="0.7">
        </div>
        <div class="control-group">
            <label><span>Radius Decay</span> <span id="val-rdecay">0.65</span></label>
            <input type="range" id="in-rdecay" min="0.3" max="0.85" step="0.01" value="0.65">
        </div>

        <div class="btn-group">
            <button id="generateBtn" style="flex-basis: 100%; background: #4CAF50; border-color: #4CAF50;">Generate Tree</button>
            <button id="windBtn">Toggle Wind (W)</button>
            <button id="leavesBtn" class="active">Toggle Leaves</button>
            <button id="randomizeBtn" style="flex-basis: 100%;">Randomize (R)</button>
        </div>

        <div id="stats">
            <span id="stat-branches">Branches: 0</span>
            <span id="stat-leaves">Leaves: 0</span>
        </div>
    </div>

    <div id="branchInfo">Depth: 1</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            depth: 5,
            branchLength: 3.0,
            branchAngle: 30,
            lengthDecay: 0.7,
            radiusDecay: 0.65,
            totalBranches: 0,
            totalLeaves: 0,
            windEnabled: false,
            leavesVisible: true,
            selectedBranchDepth: -1,
            treeGenerated: false,
            cameraDistance: 0,
            animationRunning: true
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0a0a2e');
        scene.fog = new THREE.Fog('#1a1a3e', 15, 60); // Horizon effect

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 5, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Allow looking slightly below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // Ground
        const groundGeom = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a3a1a,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Tree Generation Assets ---
        let treeGroup = new THREE.Group();
        scene.add(treeGroup);

        // Base geometries (reused and scaled)
        const baseCylinderGeom = new THREE.CylinderGeometry(1, 1, 1, 8);
        baseCylinderGeom.translate(0, 0.5, 0); // Pivot at bottom
        const leafGeom = new THREE.SphereGeometry(0.15, 8, 8);

        // Materials
        const colorTrunk = new THREE.Color('#8B4513');
        const colorTip = new THREE.Color('#228B22');
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.6 });
        const highlightMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0x665500 });

        let branchMaterials = [];
        let branchMeshes = [];
        let leafMeshes = [];
        let animatedBranches = [];

        function updateMaterials() {
            branchMaterials.forEach(m => m.dispose());
            branchMaterials = [];
            for (let i = 1; i <= state.depth; i++) {
                const ratio = (i - 1) / Math.max(1, state.depth - 1);
                const color = new THREE.Color().copy(colorTrunk).lerp(colorTip, ratio);
                branchMaterials.push(new THREE.MeshStandardMaterial({ 
                    color: color,
                    roughness: 0.9,
                    metalness: 0.1
                }));
            }
        }

        function generateTree() {
            // Clear existing
            scene.remove(treeGroup);
            treeGroup = new THREE.Group();
            scene.add(treeGroup);
            
            branchMeshes = [];
            leafMeshes = [];
            animatedBranches = [];
            state.totalBranches = 0;
            state.totalLeaves = 0;
            
            if(selectedMesh) {
                selectedMesh = null;
                infoDiv.style.display = 'none';
                state.selectedBranchDepth = -1;
            }

            updateMaterials();

            // Start recursive build
            const trunk = buildBranch(1, state.branchLength, 0.3);
            treeGroup.add(trunk);

            state.treeGenerated = true;
            updateStatsUI();
            applyLeavesVisibility();
        }

        function buildBranch(level, length, radius) {
            const pivot = new THREE.Group();
            pivot.userData = { level: level, baseRotation: new THREE.Euler() };
            
            // Create Mesh
            const mesh = new THREE.Mesh(baseCylinderGeom, branchMaterials[level - 1]);
            mesh.scale.set(radius * state.radiusDecay, length, radius);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { level: level, origMat: branchMaterials[level - 1] };
            
            pivot.add(mesh);
            branchMeshes.push(mesh);
            state.totalBranches++;

            if (level < state.depth) {
                // Branching
                const numChildren = Math.random() > 0.5 ? 2 : 3; // 2 or 3 children
                const angleRad = THREE.MathUtils.degToRad(state.branchAngle);
                const twistOffset = Math.random() * Math.PI; // Randomize rotation around Y

                for (let i = 0; i < numChildren; i++) {
                    const childLength = length * state.lengthDecay;
                    const childRadius = radius * state.radiusDecay;
                    const child = buildBranch(level + 1, childLength, childRadius);
                    
                    child.position.y = length;
                    
                    // Distribute evenly around Y axis, pitch outward by angleRad
                    const yaw = (Math.PI * 2 / numChildren) * i + twistOffset;
                    child.rotation.set(angleRad, yaw, 0, 'YXZ');
                    
                    // Store base rotation for wind animation
                    child.userData.baseRotation.copy(child.rotation);
                    
                    pivot.add(child);
                    animatedBranches.push(child);
                }
            } else {
                // Terminal branch - add leaf
                const leaf = new THREE.Mesh(leafGeom, leafMat);
                leaf.position.y = length;
                leaf.castShadow = true;
                pivot.add(leaf);
                leafMeshes.push(leaf);
                state.totalLeaves++;
            }

            return pivot;
        }

        // --- UI & Interaction ---
        const ui = {
            depth: document.getElementById('in-depth'),
            length: document.getElementById('in-length'),
            angle: document.getElementById('in-angle'),
            ldecay: document.getElementById('in-ldecay'),
            rdecay: document.getElementById('in-rdecay'),
            valDepth: document.getElementById('val-depth'),
            valLength: document.getElementById('val-length'),
            valAngle: document.getElementById('val-angle'),
            valLdecay: document.getElementById('val-ldecay'),
            valRdecay: document.getElementById('val-rdecay'),
            genBtn: document.getElementById('generateBtn'),
            windBtn: document.getElementById('windBtn'),
            leavesBtn: document.getElementById('leavesBtn'),
            randBtn: document.getElementById('randomizeBtn'),
            statBranches: document.getElementById('stat-branches'),
            statLeaves: document.getElementById('stat-leaves')
        };

        const infoDiv = document.getElementById('branchInfo');

        function updateUIFromState() {
            ui.depth.value = state.depth;
            ui.length.value = state.branchLength;
            ui.angle.value = state.branchAngle;
            ui.ldecay.value = state.lengthDecay;
            ui.rdecay.value = state.radiusDecay;

            ui.valDepth.innerText = state.depth;
            ui.valLength.innerText = state.branchLength.toFixed(1);
            ui.valAngle.innerText = state.branchAngle + '°';
            ui.valLdecay.innerText = state.lengthDecay.toFixed(2);
            ui.valRdecay.innerText = state.radiusDecay.toFixed(2);

            ui.windBtn.classList.toggle('active', state.windEnabled);
            ui.leavesBtn.classList.toggle('active', state.leavesVisible);
        }

        function updateStatsUI() {
            ui.statBranches.innerText = `Branches: ${state.totalBranches}`;
            ui.statLeaves.innerText = `Leaves: ${state.totalLeaves}`;
        }

        function readStateFromUI() {
            state.depth = parseInt(ui.depth.value);
            state.branchLength = parseFloat(ui.length.value);
            state.branchAngle = parseFloat(ui.angle.value);
            state.lengthDecay = parseFloat(ui.ldecay.value);
            state.radiusDecay = parseFloat(ui.rdecay.value);
            updateUIFromState();
        }

        // Event Listeners for Sliders
        ['depth', 'length', 'angle', 'ldecay', 'rdecay'].forEach(key => {
            ui[key].addEventListener('input', readStateFromUI);
            // Optional: auto-generate on slider release
            ui[key].addEventListener('change', generateTree);
        });

        // Buttons
        ui.genBtn.addEventListener('click', generateTree);
        
        ui.windBtn.addEventListener('click', () => {
            state.windEnabled = !state.windEnabled;
            updateUIFromState();
            if(!state.windEnabled) resetWind();
        });

        ui.leavesBtn.addEventListener('click', () => {
            state.leavesVisible = !state.leavesVisible;
            updateUIFromState();
            applyLeavesVisibility();
        });

        ui.randBtn.addEventListener('click', randomize);

        function randomize() {
            state.depth = Math.floor(Math.random() * 5) + 3; // 3-7
            state.branchLength = (Math.random() * 4.0 + 1.0); // 1.0 - 5.0
            state.branchAngle = Math.floor(Math.random() * 40) + 15; // 15 - 55
            state.lengthDecay = (Math.random() * 0.3 + 0.5); // 0.5 - 0.8
            state.radiusDecay = (Math.random() * 0.3 + 0.5); // 0.5 - 0.8
            updateUIFromState();
            generateTree();
        }

        function applyLeavesVisibility() {
            leafMeshes.forEach(leaf => leaf.visible = state.leavesVisible);
        }

        function resetWind() {
            animatedBranches.forEach(branch => {
                branch.rotation.copy(branch.userData.baseRotation);
            });
        }

        // Raycasting
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedMesh = null;

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI
            if(event.target.closest('#ui-panel')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(branchMeshes);

            if (intersects.length > 0) {
                if (selectedMesh) {
                    selectedMesh.material = selectedMesh.userData.origMat;
                }
                selectedMesh = intersects[0].object;
                selectedMesh.material = highlightMat;
                state.selectedBranchDepth = selectedMesh.userData.level;
                
                infoDiv.innerText = `Depth: ${state.selectedBranchDepth}`;
                infoDiv.style.display = 'block';
                infoDiv.style.left = event.clientX + 'px';
                infoDiv.style.top = event.clientY + 'px';
            } else {
                if (selectedMesh) {
                    selectedMesh.material = selectedMesh.userData.origMat;
                    selectedMesh = null;
                    state.selectedBranchDepth = -1;
                    infoDiv.style.display = 'none';
                }
            }
        });

        // Keyboard
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                randomize();
            } else if (key === 'w') {
                state.windEnabled = !state.windEnabled;
                updateUIFromState();
                if(!state.windEnabled) resetWind();
            } else if (key === '+' || key === '=') {
                if (state.depth < 8) {
                    state.depth++;
                    updateUIFromState();
                    generateTree();
                }
            } else if (key === '-') {
                if (state.depth > 1) {
                    state.depth--;
                    updateUIFromState();
                    generateTree();
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            if (!state.animationRunning) return;
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            controls.update();
            state.cameraDistance = camera.position.distanceTo(controls.target);

            if (state.windEnabled) {
                const windSpeed = time * 1.5;
                animatedBranches.forEach(branch => {
                    const level = branch.userData.level;
                    // Higher branches sway more
                    const amplitude = 0.02 * level;
                    // Phase offset based on position to make it look organic
                    const phase = branch.position.x * 0.5 + branch.position.y * 0.5;
                    
                    const swayX = Math.sin(windSpeed + phase) * amplitude;
                    const swayZ = Math.cos(windSpeed * 0.8 + phase) * amplitude * 0.5;

                    branch.rotation.x = branch.userData.baseRotation.x + swayX;
                    branch.rotation.z = branch.userData.baseRotation.z + swayZ;
                });
            }

            renderer.render(scene, camera);
        }

        // Initialize
        updateUIFromState();
        generateTree();
        animate();

    </script>
</body>
</html>
