<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fractal Tree Generator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a0a2e 0%, #1a1a3e 100%);
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 290px;
      padding: 14px;
      background: rgba(10, 10, 20, 0.75);
      color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      z-index: 10;
      user-select: none;
    }

    #ui h2 {
      margin: 0 0 12px 0;
      font-size: 20px;
      color: #cfe8cf;
    }

    .control {
      margin-bottom: 10px;
    }

    .control label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #d8f0d8;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2d5a2d;
      color: white;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    button:hover {
      background: #3d7a3d;
    }

    #generateBtn {
      grid-column: span 2;
      background: #4b6cb7;
    }

    #generateBtn:hover {
      background: #5d7ed0;
    }

    #stats {
      margin-top: 12px;
      font-size: 13px;
      color: #f0f0f0;
      line-height: 1.5;
    }

    #branchInfo {
      position: absolute;
      bottom: 14px;
      left: 14px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.7);
      color: #ffd700;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
      min-width: 160px;
    }

    #help {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.55);
      color: #ddd;
      border-radius: 8px;
      font-size: 12px;
      z-index: 10;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h2>Fractal Tree Generator</h2>

    <div class="control">
      <label for="depth">Depth: <span id="depthValue">5</span></label>
      <input id="depth" type="range" min="1" max="8" step="1" value="5">
    </div>

    <div class="control">
      <label for="branchLength">Branch Length: <span id="branchLengthValue">3.0</span></label>
      <input id="branchLength" type="range" min="0.5" max="6.0" step="0.1" value="3.0">
    </div>

    <div class="control">
      <label for="branchAngle">Branch Angle: <span id="branchAngleValue">30</span>°</label>
      <input id="branchAngle" type="range" min="10" max="60" step="1" value="30">
    </div>

    <div class="control">
      <label for="lengthDecay">Length Decay: <span id="lengthDecayValue">0.70</span></label>
      <input id="lengthDecay" type="range" min="0.4" max="0.9" step="0.01" value="0.7">
    </div>

    <div class="control">
      <label for="radiusDecay">Radius Decay: <span id="radiusDecayValue">0.65</span></label>
      <input id="radiusDecay" type="range" min="0.3" max="0.85" step="0.01" value="0.65">
    </div>

    <div class="buttons">
      <button id="generateBtn">Generate Tree</button>
      <button id="windBtn">Toggle Wind</button>
      <button id="leavesBtn">Toggle Leaves</button>
      <button id="randomizeBtn">Randomize</button>
    </div>

    <div id="stats">
      <div>Branches: <span id="branchCount">0</span></div>
      <div>Leaves: <span id="leafCount">0</span></div>
    </div>
  </div>

  <div id="branchInfo">Selected Branch Depth: None</div>

  <div id="help">
    <strong>Keyboard</strong><br>
    R = Randomize<br>
    W = Toggle Wind<br>
    + = Increase Depth<br>
    - = Decrease Depth
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    let scene, camera, renderer, controls;
    let treeGroup = new THREE.Group();
    let branchObjects = [];
    let leafObjects = [];
    let selectedBranch = null;
    let clock = new THREE.Clock();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const trunkColor = new THREE.Color('#8B4513');
    const tipColor = new THREE.Color('#228B22');
    const highlightColor = new THREE.Color('#FFD700');

    const params = {
      depth: 5,
      branchLength: 3.0,
      branchAngle: 30,
      lengthDecay: 0.7,
      radiusDecay: 0.65,
      trunkRadius: 0.3,
      windEnabled: false,
      leavesVisible: true
    };

    window.__3D_STATE__ = {
      depth: params.depth,
      branchLength: params.branchLength,
      branchAngle: params.branchAngle,
      lengthDecay: params.lengthDecay,
      radiusDecay: params.radiusDecay,
      totalBranches: 0,
      totalLeaves: 0,
      windEnabled: false,
      leavesVisible: true,
      selectedBranchDepth: -1,
      treeGenerated: false,
      cameraDistance: 0,
      animationRunning: true
    };

    const ui = {
      depth: document.getElementById('depth'),
      branchLength: document.getElementById('branchLength'),
      branchAngle: document.getElementById('branchAngle'),
      lengthDecay: document.getElementById('lengthDecay'),
      radiusDecay: document.getElementById('radiusDecay'),

      depthValue: document.getElementById('depthValue'),
      branchLengthValue: document.getElementById('branchLengthValue'),
      branchAngleValue: document.getElementById('branchAngleValue'),
      lengthDecayValue: document.getElementById('lengthDecayValue'),
      radiusDecayValue: document.getElementById('radiusDecayValue'),

      branchCount: document.getElementById('branchCount'),
      leafCount: document.getElementById('leafCount'),
      branchInfo: document.getElementById('branchInfo'),

      generateBtn: document.getElementById('generateBtn'),
      windBtn: document.getElementById('windBtn'),
      leavesBtn: document.getElementById('leavesBtn'),
      randomizeBtn: document.getElementById('randomizeBtn')
    };

    init();
    generateTree();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color('#0a0a2e');

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 8, 20);
      camera.lookAt(0, 5, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 5, 0);
      controls.enableDamping = true;

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(10, 20, 10);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.width = 2048;
      directionalLight.shadow.mapSize.height = 2048;
      directionalLight.shadow.camera.left = -25;
      directionalLight.shadow.camera.right = 25;
      directionalLight.shadow.camera.top = 25;
      directionalLight.shadow.camera.bottom = -25;
      directionalLight.shadow.camera.near = 1;
      directionalLight.shadow.camera.far = 100;
      scene.add(directionalLight);

      const groundGeo = new THREE.PlaneGeometry(50, 50);
      const groundMat = new THREE.MeshPhongMaterial({ color: '#1a3a1a' });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      ground.receiveShadow = true;
      scene.add(ground);

      scene.add(treeGroup);

      setupUI();
      setupEvents();
      updateState();
    }

    function setupUI() {
      const sliderBindings = [
        ['depth', v => parseInt(v), v => v],
        ['branchLength', v => parseFloat(v), v => Number(v).toFixed(1)],
        ['branchAngle', v => parseFloat(v), v => v],
        ['lengthDecay', v => parseFloat(v), v => Number(v).toFixed(2)],
        ['radiusDecay', v => parseFloat(v), v => Number(v).toFixed(2)]
      ];

      sliderBindings.forEach(([key, parser, formatter]) => {
        ui[key].addEventListener('input', () => {
          params[key] = parser(ui[key].value);
          ui[key + 'Value'].textContent = formatter(ui[key].value);
          updateState();
        });
      });

      ui.generateBtn.addEventListener('click', generateTree);
      ui.windBtn.addEventListener('click', toggleWind);
      ui.leavesBtn.addEventListener('click', toggleLeaves);
      ui.randomizeBtn.addEventListener('click', randomizeParams);
    }

    function setupEvents() {
      window.addEventListener('resize', onWindowResize);
      renderer.domElement.addEventListener('pointerdown', onPointerDown);

      window.addEventListener('keydown', (e) => {
        if (e.key === 'r' || e.key === 'R') {
          randomizeParams();
        } else if (e.key === 'w' || e.key === 'W') {
          toggleWind();
        } else if (e.key === '+' || e.key === '=') {
          params.depth = Math.min(8, params.depth + 1);
          syncUIFromParams();
          generateTree();
        } else if (e.key === '-') {
          params.depth = Math.max(1, params.depth - 1);
          syncUIFromParams();
          generateTree();
        }
      });
    }

    function syncUIFromParams() {
      ui.depth.value = params.depth;
      ui.branchLength.value = params.branchLength;
      ui.branchAngle.value = params.branchAngle;
      ui.lengthDecay.value = params.lengthDecay;
      ui.radiusDecay.value = params.radiusDecay;

      ui.depthValue.textContent = params.depth;
      ui.branchLengthValue.textContent = params.branchLength.toFixed(1);
      ui.branchAngleValue.textContent = params.branchAngle;
      ui.lengthDecayValue.textContent = params.lengthDecay.toFixed(2);
      ui.radiusDecayValue.textContent = params.radiusDecay.toFixed(2);

      updateState();
    }

    function clearTree() {
      if (selectedBranch) {
        selectedBranch = null;
      }
      ui.branchInfo.textContent = 'Selected Branch Depth: None';
      window.__3D_STATE__.selectedBranchDepth = -1;

      while (treeGroup.children.length > 0) {
        const child = treeGroup.children[0];
        treeGroup.remove(child);

        if (child.geometry) child.geometry.dispose();

        if (child.material) {
          if (Array.isArray(child.material)) {
            child.material.forEach(m => m.dispose());
          } else {
            child.material.dispose();
          }
        }
      }

      branchObjects = [];
      leafObjects = [];
    }

    function generateTree() {
      clearTree();

      const startPos = new THREE.Vector3(0, 0, 0);
      const startDir = new THREE.Vector3(0, 1, 0);

      createBranch({
        position: startPos,
        direction: startDir,
        length: params.branchLength,
        radius: params.trunkRadius,
        depthRemaining: params.depth,
        level: 0,
        parent: treeGroup
      });

      leafObjects.forEach(leaf => {
        leaf.visible = params.leavesVisible;
      });

      ui.branchCount.textContent = branchObjects.length;
      ui.leafCount.textContent = leafObjects.length;

      window.__3D_STATE__.treeGenerated = true;
      updateState();
    }

    function createBranch({ position, direction, length, radius, depthRemaining, level, parent }) {
      const t = level / Math.max(1, params.depth);
      const branchColor = trunkColor.clone().lerp(tipColor, t);

      const geometry = new THREE.CylinderGeometry(
        Math.max(0.01, radius * params.radiusDecay),
        radius,
        length,
        8
      );

      const material = new THREE.MeshStandardMaterial({
        color: branchColor,
        roughness: 0.9,
        metalness: 0.05
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      const branchGroup = new THREE.Group();
      branchGroup.position.copy(position);

      const up = new THREE.Vector3(0, 1, 0);
      const quat = new THREE.Quaternion().setFromUnitVectors(up, direction.clone().normalize());
      branchGroup.quaternion.copy(quat);

      mesh.position.y = length / 2;
      branchGroup.add(mesh);

      branchGroup.userData = {
        level,
        baseRotationZ: 0,
        baseRotationX: 0
      };

      mesh.userData = {
        isBranch: true,
        level,
        originalColor: branchColor.clone(),
        branchGroup
      };

      parent.add(branchGroup);
      branchObjects.push(mesh);

      const endPoint = position.clone().add(direction.clone().normalize().multiplyScalar(length));

      if (depthRemaining <= 1) {
        const leafGeo = new THREE.SphereGeometry(0.15, 10, 10);
        const leafMat = new THREE.MeshStandardMaterial({ color: '#33aa33' });
        const leaf = new THREE.Mesh(leafGeo, leafMat);
        leaf.position.copy(endPoint);
        leaf.castShadow = true;
        leaf.receiveShadow = true;
        leaf.visible = params.leavesVisible;
        treeGroup.add(leaf);
        leafObjects.push(leaf);
        return;
      }

      const childCount = 2 + Math.floor(Math.random() * 2); // 2 or 3
      for (let i = 0; i < childCount; i++) {
        const childDir = direction.clone().normalize();

        const angleRad = THREE.MathUtils.degToRad(params.branchAngle);
        const spread = (i - (childCount - 1) / 2) * 0.55;

        const rotAxis1 = new THREE.Vector3(
          Math.random() * 2 - 1,
          0,
          Math.random() * 2 - 1
        ).normalize();

        if (rotAxis1.lengthSq() < 0.001) rotAxis1.set(1, 0, 0);

        const rotQuat1 = new THREE.Quaternion().setFromAxisAngle(
          rotAxis1,
          angleRad * (0.75 + Math.random() * 0.5)
        );

        const rotQuat2 = new THREE.Quaternion().setFromAxisAngle(
          direction.clone().normalize(),
          spread + (Math.random() - 0.5) * 0.4
        );

        childDir.applyQuaternion(rotQuat1).applyQuaternion(rotQuat2).normalize();

        createBranch({
          position: endPoint,
          direction: childDir,
          length: length * params.lengthDecay,
          radius: Math.max(0.02, radius * params.radiusDecay),
          depthRemaining: depthRemaining - 1,
          level: level + 1,
          parent: branchGroup
        });
      }
    }

    function toggleWind() {
      params.windEnabled = !params.windEnabled;
      updateState();
    }

    function toggleLeaves() {
      params.leavesVisible = !params.leavesVisible;
      leafObjects.forEach(leaf => leaf.visible = params.leavesVisible);
      updateState();
    }

    function randomizeParams() {
      params.depth = randomInt(1, 8);
      params.branchLength = randomFloat(0.5, 6.0, 1);
      params.branchAngle = randomInt(10, 60);
      params.lengthDecay = randomFloat(0.4, 0.9, 2);
      params.radiusDecay = randomFloat(0.3, 0.85, 2);

      syncUIFromParams();
      generateTree();
    }

    function updateWind(time) {
      if (!params.windEnabled) return;

      treeGroup.traverse(obj => {
        if (obj.type === 'Group' && obj.userData && typeof obj.userData.level === 'number') {
          const level = obj.userData.level;
          const amp = 0.015 + level * 0.008;
          const speed = 1.2;
          obj.rotation.z = Math.sin(time * speed + level * 0.7) * amp;
          obj.rotation.x = Math.cos(time * speed * 0.85 + level * 0.45) * amp * 0.6;
        }
      });
    }

    function onPointerDown(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(branchObjects, false);

      if (intersects.length > 0) {
        selectBranch(intersects[0].object);
      } else {
        clearSelection();
      }
    }

    function selectBranch(branch) {
      if (selectedBranch === branch) return;

      clearSelection();
      selectedBranch = branch;
      selectedBranch.material.color.copy(highlightColor);

      const depthLevel = branch.userData.level;
      ui.branchInfo.textContent = `Selected Branch Depth: ${depthLevel}`;
      window.__3D_STATE__.selectedBranchDepth = depthLevel;
    }

    function clearSelection() {
      if (selectedBranch) {
        const orig = selectedBranch.userData.originalColor;
        selectedBranch.material.color.copy(orig);
      }
      selectedBranch = null;
      ui.branchInfo.textContent = 'Selected Branch Depth: None';
      window.__3D_STATE__.selectedBranchDepth = -1;
    }

    function updateState() {
      window.__3D_STATE__.depth = params.depth;
      window.__3D_STATE__.branchLength = params.branchLength;
      window.__3D_STATE__.branchAngle = params.branchAngle;
      window.__3D_STATE__.lengthDecay = params.lengthDecay;
      window.__3D_STATE__.radiusDecay = params.radiusDecay;
      window.__3D_STATE__.totalBranches = branchObjects.length;
      window.__3D_STATE__.totalLeaves = leafObjects.length;
      window.__3D_STATE__.windEnabled = params.windEnabled;
      window.__3D_STATE__.leavesVisible = params.leavesVisible;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.animationRunning = true;

      ui.branchCount.textContent = branchObjects.length;
      ui.leafCount.textContent = leafObjects.length;
    }

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      updateWind(elapsed);
      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomFloat(min, max, decimals = 2) {
      const value = min + Math.random() * (max - min);
      return parseFloat(value.toFixed(decimals));
    }
  </script>
</body>
</html>
