<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal Tree Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #controlPanel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 200, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0ff;
    width: 280px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    max-height: 95vh;
    overflow-y: auto;
  }

  #controlPanel h2 {
    text-align: center;
    margin-bottom: 15px;
    font-size: 16px;
    color: #88ff88;
    text-shadow: 0 0 10px rgba(136, 255, 136, 0.3);
    border-bottom: 1px solid rgba(100, 100, 200, 0.3);
    padding-bottom: 10px;
  }

  .slider-group {
    margin-bottom: 12px;
  }

  .slider-group label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
    color: #b0b0e0;
  }

  .slider-group label span.val {
    color: #88ff88;
    font-weight: bold;
  }

  input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(100, 100, 200, 0.3);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #88ff88;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(136, 255, 136, 0.5);
  }

  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #88ff88;
    cursor: pointer;
    border: none;
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }

  .btn-row button {
    padding: 8px 6px;
    border: 1px solid rgba(100, 100, 200, 0.4);
    border-radius: 6px;
    background: rgba(30, 30, 80, 0.8);
    color: #e0e0ff;
    cursor: pointer;
    font-size: 11px;
    font-weight: bold;
    transition: all 0.2s;
  }

  .btn-row button:hover {
    background: rgba(60, 60, 140, 0.8);
    border-color: #88ff88;
    color: #88ff88;
  }

  .btn-row button.active {
    background: rgba(34, 139, 34, 0.4);
    border-color: #88ff88;
    color: #88ff88;
  }

  #stats {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(100, 100, 200, 0.3);
    font-size: 12px;
    color: #b0b0e0;
  }

  #stats div {
    margin-bottom: 4px;
  }

  #stats span {
    color: #88ff88;
    font-weight: bold;
  }

  #branchInfo {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 46, 0.9);
    border: 1px solid rgba(255, 215, 0, 0.5);
    border-radius: 8px;
    padding: 10px 20px;
    color: #FFD700;
    font-size: 14px;
    font-weight: bold;
    display: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 2px 10px rgba(255, 215, 0, 0.2);
  }

  #controlPanel::-webkit-scrollbar {
    width: 4px;
  }
  #controlPanel::-webkit-scrollbar-track {
    background: transparent;
  }
  #controlPanel::-webkit-scrollbar-thumb {
    background: rgba(136, 255, 136, 0.3);
    border-radius: 2px;
  }
</style>
</head>
<body>

<div id="controlPanel">
  <h2>🌳 Fractal Tree Generator</h2>

  <div class="slider-group">
    <label>Depth <span class="val" id="depthVal">5</span></label>
    <input type="range" id="depthSlider" min="1" max="8" step="1" value="5">
  </div>

  <div class="slider-group">
    <label>Branch Length <span class="val" id="branchLengthVal">3.0</span></label>
    <input type="range" id="branchLengthSlider" min="0.5" max="6.0" step="0.1" value="3.0">
  </div>

  <div class="slider-group">
    <label>Branch Angle <span class="val" id="branchAngleVal">30°</span></label>
    <input type="range" id="branchAngleSlider" min="10" max="60" step="1" value="30">
  </div>

  <div class="slider-group">
    <label>Length Decay <span class="val" id="lengthDecayVal">0.70</span></label>
    <input type="range" id="lengthDecaySlider" min="0.4" max="0.9" step="0.01" value="0.7">
  </div>

  <div class="slider-group">
    <label>Radius Decay <span class="val" id="radiusDecayVal">0.65</span></label>
    <input type="range" id="radiusDecaySlider" min="0.3" max="0.85" step="0.01" value="0.65">
  </div>

  <div class="btn-row">
    <button id="generateBtn">🌱 Generate</button>
    <button id="windBtn">💨 Wind</button>
    <button id="leavesBtn">🍃 Leaves</button>
    <button id="randomizeBtn">🎲 Random</button>
  </div>

  <div id="stats">
    <div>Branches: <span id="branchCount">0</span></div>
    <div>Leaves: <span id="leafCount">0</span></div>
  </div>
</div>

<div id="branchInfo"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function() {
  // State
  window.__3D_STATE__ = {
    depth: 5,
    branchLength: 3.0,
    branchAngle: 30,
    lengthDecay: 0.7,
    radiusDecay: 0.65,
    totalBranches: 0,
    totalLeaves: 0,
    windEnabled: false,
    leavesVisible: true,
    selectedBranchDepth: -1,
    treeGenerated: false,
    cameraDistance: 0,
    animationRunning: true
  };

  const state = window.__3D_STATE__;

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a2e);

  // Add fog for atmosphere
  scene.fog = new THREE.FogExp2(0x0a0a2e, 0.015);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 8, 20);
  camera.lookAt(0, 5, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 5, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.update();

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 20, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 60;
  dirLight.shadow.camera.left = -20;
  dirLight.shadow.camera.right = 20;
  dirLight.shadow.camera.top = 20;
  dirLight.shadow.camera.bottom = -5;
  dirLight.shadow.bias = -0.001;
  scene.add(dirLight);

  // Subtle fill light
  const fillLight = new THREE.DirectionalLight(0x4466aa, 0.2);
  fillLight.position.set(-10, 10, -10);
  scene.add(fillLight);

  // Ground plane
  const groundGeom = new THREE.PlaneGeometry(50, 50);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x1a3a1a,
    roughness: 0.9,
    metalness: 0.0
  });
  const ground = new THREE.Mesh(groundGeom, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  ground.receiveShadow = true;
  scene.add(ground);

  // Tree group
  let treeGroup = new THREE.Group();
  scene.add(treeGroup);

  // Track branches and leaves
  let branchMeshes = [];
  let leafMeshes = [];
  let branchDataMap = new Map(); // mesh -> { depth, originalRotation }
  let selectedBranch = null;
  let originalMaterial = null;
  const highlightMaterial = new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xFFD700, emissiveIntensity: 0.3 });

  // Color helpers
  const trunkColor = new THREE.Color(0x8B4513);
  const tipColor = new THREE.Color(0x228B22);

  function lerpColor(c1, c2, t) {
    const r = c1.r + (c2.r - c1.r) * t;
    const g = c1.g + (c2.g - c1.g) * t;
    const b = c1.b + (c2.b - c1.b) * t;
    return new THREE.Color(r, g, b);
  }

  function generateTree() {
    // Clear old tree
    while (treeGroup.children.length > 0) {
      const child = treeGroup.children[0];
      treeGroup.remove(child);
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
      // Recursively dispose
      child.traverse(function(obj) {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) obj.material.dispose();
      });
    }

    branchMeshes = [];
    leafMeshes = [];
    branchDataMap.clear();
    selectedBranch = null;
    originalMaterial = null;
    state.selectedBranchDepth = -1;

    const depth = state.depth;
    const branchLength = state.branchLength;
    const branchAngle = state.branchAngle * Math.PI / 180;
    const lengthDecay = state.lengthDecay;
    const radiusDecay = state.radiusDecay;
    const trunkRadius = 0.3;

    let branchCount = 0;
    let leafCount = 0;

    function createBranch(parentGroup, currentDepth, length, radius) {
      // Create branch cylinder
      const geom = new THREE.CylinderGeometry(radius * radiusDecay, radius, length, 8, 1);
      // Shift geometry so bottom is at origin
      geom.translate(0, length / 2, 0);

      const t = currentDepth / depth;
      const color = lerpColor(trunkColor, tipColor, t);
      const mat = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.8,
        metalness: 0.1
      });

      const mesh = new THREE.Mesh(geom, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      // Create a pivot group for this branch
      const branchGroup = new THREE.Group();
      branchGroup.add(mesh);
      parentGroup.add(branchGroup);

      branchMeshes.push(mesh);
      branchDataMap.set(mesh, {
        depth: currentDepth,
        group: branchGroup,
        originalRotation: { x: 0, y: 0, z: 0 }
      });
      branchCount++;

      if (currentDepth < depth) {
        // Determine number of child branches (2-3)
        const numChildren = currentDepth === 0 ? 3 : (Math.random() < 0.4 ? 3 : 2);
        const childLength = length * lengthDecay;
        const childRadius = radius * radiusDecay;

        for (let i = 0; i < numChildren; i++) {
          const childGroup = new THREE.Group();
          // Position at top of current branch
          childGroup.position.set(0, length, 0);

          // Rotate for branching
          const angle = branchAngle * (0.7 + Math.random() * 0.6);
          const yRot = (Math.PI * 2 / numChildren) * i + (Math.random() - 0.5) * 0.5;

          childGroup.rotation.z = angle * (i % 2 === 0 ? 1 : -1) * (0.8 + Math.random() * 0.4);
          childGroup.rotation.y = yRot;
          childGroup.rotation.x = (Math.random() - 0.5) * angle * 0.5;

          branchGroup.add(childGroup);

          createBranch(childGroup, currentDepth + 1, childLength, childRadius);
        }
      } else {
        // Terminal branch - add leaf
        const leafGeom = new THREE.SphereGeometry(0.15, 6, 6);
        const leafMat = new THREE.MeshStandardMaterial({
          color: 0x228B22,
          roughness: 0.6,
          metalness: 0.0,
          emissive: 0x114411,
          emissiveIntensity: 0.1
        });
        const leaf = new THREE.Mesh(leafGeom, leafMat);
        leaf.position.set(0, length, 0);
        leaf.castShadow = true;
        branchGroup.add(leaf);
        leafMeshes.push(leaf);
        leafCount++;
      }
    }

    createBranch(treeGroup, 0, branchLength, trunkRadius);

    state.totalBranches = branchCount;
    state.totalLeaves = leafCount;
    state.treeGenerated = true;

    document.getElementById('branchCount').textContent = branchCount;
    document.getElementById('leafCount').textContent = leafCount;

    updateLeavesVisibility();
  }

  function updateLeavesVisibility() {
    leafMeshes.forEach(leaf => {
      leaf.visible = state.leavesVisible;
    });
  }

  // UI Elements
  const depthSlider = document.getElementById('depthSlider');
  const branchLengthSlider = document.getElementById('branchLengthSlider');
  const branchAngleSlider = document.getElementById('branchAngleSlider');
  const lengthDecaySlider = document.getElementById('lengthDecaySlider');
  const radiusDecaySlider = document.getElementById('radiusDecaySlider');

  const depthVal = document.getElementById('depthVal');
  const branchLengthVal = document.getElementById('branchLengthVal');
  const branchAngleVal = document.getElementById('branchAngleVal');
  const lengthDecayVal = document.getElementById('lengthDecayVal');
  const radiusDecayVal = document.getElementById('radiusDecayVal');

  function updateSliderDisplays() {
    depthVal.textContent = depthSlider.value;
    branchLengthVal.textContent = parseFloat(branchLengthSlider.value).toFixed(1);
    branchAngleVal.textContent = branchAngleSlider.value + '°';
    lengthDecayVal.textContent = parseFloat(lengthDecaySlider.value).toFixed(2);
    radiusDecayVal.textContent = parseFloat(radiusDecaySlider.value).toFixed(2);

    state.depth = parseInt(depthSlider.value);
    state.branchLength = parseFloat(branchLengthSlider.value);
    state.branchAngle = parseFloat(branchAngleSlider.value);
    state.lengthDecay = parseFloat(lengthDecaySlider.value);
    state.radiusDecay = parseFloat(radiusDecaySlider.value);
  }

  depthSlider.addEventListener('input', updateSliderDisplays);
  branchLengthSlider.addEventListener('input', updateSliderDisplays);
  branchAngleSlider.addEventListener('input', updateSliderDisplays);
  lengthDecaySlider.addEventListener('input', updateSliderDisplays);
  radiusDecaySlider.addEventListener('input', updateSliderDisplays);

  document.getElementById('generateBtn').addEventListener('click', function() {
    updateSliderDisplays();
    generateTree();
  });

  document.getElementById('windBtn').addEventListener('click', function() {
    state.windEnabled = !state.windEnabled;
    this.classList.toggle('active', state.windEnabled);
    this.textContent = state.windEnabled ? '💨 Wind ON' : '💨 Wind';
  });

  document.getElementById('leavesBtn').addEventListener('click', function() {
    state.leavesVisible = !state.leavesVisible;
    this.classList.toggle('active', !state.leavesVisible);
    this.textContent = state.leavesVisible ? '🍃 Leaves' : '🍃 No Leaves';
    updateLeavesVisibility();
  });

  document.getElementById('randomizeBtn').addEventListener('click', randomize);

  function randomize() {
    depthSlider.value = Math.floor(Math.random() * 8) + 1;
    branchLengthSlider.value = (Math.random() * 5.5 + 0.5).toFixed(1);
    branchAngleSlider.value = Math.floor(Math.random() * 51) + 10;
    lengthDecaySlider.value = (Math.random() * 0.5 + 0.4).toFixed(2);
    radiusDecaySlider.value = (Math.random() * 0.55 + 0.3).toFixed(2);
    updateSliderDisplays();
    generateTree();
  }

  // Raycaster for clicking
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const branchInfoDiv = document.getElementById('branchInfo');

  renderer.domElement.addEventListener('click', function(event) {
    // Ignore clicks on UI
    if (event.target !== renderer.domElement) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(branchMeshes, false);

    // Deselect previous
    if (selectedBranch && originalMaterial) {
      selectedBranch.material = originalMaterial;
      selectedBranch = null;
      originalMaterial = null;
    }

    if (intersects.length > 0) {
      const mesh = intersects[0].object;
      const data = branchDataMap.get(mesh);
      if (data) {
        originalMaterial = mesh.material;
        mesh.material = highlightMaterial;
        selectedBranch = mesh;
        state.selectedBranchDepth = data.depth;

        branchInfoDiv.textContent = `Branch Depth: ${data.depth} / ${state.depth}`;
        branchInfoDiv.style.display = 'block';

        setTimeout(() => {
          branchInfoDiv.style.display = 'none';
        }, 3000);
      }
    } else {
      state.selectedBranchDepth = -1;
      branchInfoDiv.style.display = 'none';
    }
  });

  // Keyboard controls
  document.addEventListener('keydown', function(event) {
    const key = event.key.toLowerCase();
    if (key === 'r') {
      randomize();
    } else if (key === 'w') {
      document.getElementById('windBtn').click();
    } else if (key === '+' || key === '=') {
      const current = parseInt(depthSlider.value);
      if (current < 8) {
        depthSlider.value = current + 1;
        updateSliderDisplays();
        generateTree();
      }
    } else if (key === '-' || key === '_') {
      const current = parseInt(depthSlider.value);
      if (current > 1) {
        depthSlider.value = current - 1;
        updateSliderDisplays();
        generateTree();
      }
    }
  });

  // Wind animation
  function applyWind(time) {
    if (!state.windEnabled) return;

    branchMeshes.forEach(mesh => {
      const data = branchDataMap.get(mesh);
      if (data && data.depth > 0) {
        const group = data.group;
        const amplitude = data.depth * 0.008;
        const speed = 1.5;
        const offset = data.depth * 0.7;

        const windX = Math.sin(time * speed + offset) * amplitude;
        const windZ = Math.cos(time * speed * 0.7 + offset * 1.3) * amplitude * 0.5;

        group.rotation.x += windX * 0.02;
        group.rotation.z += windZ * 0.02;
      }
    });
  }

  function resetWind() {
    // We handle wind as additive, so we need to track and reset
    // Actually let's use a different approach - store base rotations
  }

  // Resize handler
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation loop
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);

    const time = clock.getElapsedTime();

    // Wind effect - reset and reapply each frame for smooth animation
    if (state.windEnabled) {
      branchMeshes.forEach(mesh => {
        const data = branchDataMap.get(mesh);
        if (data && data.depth > 0) {
          const group = data.group;
          const amplitude = (data.depth / state.depth) * 0.06;
          const speed = 2.0;
          const offset = data.depth * 0.8 + mesh.id * 0.1;

          // Store original rotation on first wind frame
          if (data.baseRotX === undefined) {
            data.baseRotX = group.rotation.x;
            data.baseRotZ = group.rotation.z;
          }

          const windX = Math.sin(time * speed + offset) * amplitude;
          const windZ = Math.cos(time * speed * 0.6 + offset * 1.5) * amplitude * 0.7;

          group.rotation.x = data.baseRotX + windX;
          group.rotation.z = data.baseRotZ + windZ;
        }
      });
    } else {
      // Reset to base rotations when wind is off
      branchMeshes.forEach(mesh => {
        const data = branchDataMap.get(mesh);
        if (data && data.baseRotX !== undefined) {
          const group = data.group;
          group.rotation.x = data.baseRotX;
          group.rotation.z = data.baseRotZ;
          delete data.baseRotX;
          delete data.baseRotZ;
        }
      });
    }

    controls.update();

    // Update camera distance
    state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

    renderer.render(scene, camera);
  }

  // Initialize
  updateSliderDisplays();
  generateTree();
  animate();

})();
</script>
</body>
</html>
