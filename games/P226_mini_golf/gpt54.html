<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Mini Golf</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 18px;
      line-height: 1.5;
      z-index: 10;
      user-select: none;
    }

    #power-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 20px;
      border: 2px solid white;
      background: rgba(0,0,0,0.35);
      border-radius: 10px;
      overflow: hidden;
      z-index: 10;
    }

    #power-fill {
      width: 0%;
      height: 100%;
      background: limegreen;
      transition: width 0.03s linear;
    }

    #results-screen {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0,0,0,0.55);
    }

    #results-panel {
      background: white;
      color: #222;
      padding: 28px 36px;
      border-radius: 14px;
      text-align: center;
      min-width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #results-panel h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    #results-panel p {
      margin: 0 0 20px;
      font-size: 20px;
    }

    #play-again-btn {
      border: none;
      background: #2e8b57;
      color: white;
      padding: 12px 22px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    #play-again-btn:hover {
      background: #236b43;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hole-label">Hole: 1/3</div>
    <div id="strokes-label">Strokes: 0</div>
    <div id="par-label">Par: 2</div>
    <div id="total-label">Total: 0</div>
  </div>

  <div id="power-container">
    <div id="power-fill"></div>
  </div>

  <div id="results-screen">
    <div id="results-panel">
      <h1>Course Complete!</h1>
      <p id="results-text">Total Strokes: 0</p>
      <button id="play-again-btn">Play Again</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#87CEEB");

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 12, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.left = -50;
    dirLight.shadow.camera.right = 50;
    dirLight.shadow.camera.top = 50;
    dirLight.shadow.camera.bottom = -50;
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 100;
    scene.add(dirLight);

    const hud = {
      hole: document.getElementById("hole-label"),
      strokes: document.getElementById("strokes-label"),
      par: document.getElementById("par-label"),
      total: document.getElementById("total-label"),
      powerFill: document.getElementById("power-fill"),
      resultsScreen: document.getElementById("results-screen"),
      resultsText: document.getElementById("results-text"),
      playAgainBtn: document.getElementById("play-again-btn"),
    };

    const GREEN = 0x3fa34d;
    const BROWN = 0x8b5a2b;
    const RED = 0xcc3333;
    const DARK = 0x111111;

    const ballRadius = 0.2;
    const wallHeight = 0.6;
    const wallThickness = 0.4;

    const courseObjects = [];
    const collidersByHole = [[], [], []];
    const obstacleCollidersByHole = [[], [], []];
    const cupMeshes = [];
    let windmillGroup = null;
    let windmillBlade = null;
    let windmillAngle = 0;

    const holes = [
      {
        par: 2,
        tee: new THREE.Vector3(0, ballRadius, 7),
        cup: new THREE.Vector3(0, 0.01, -7),
        camPos: new THREE.Vector3(0, 12, 12),
        camLook: new THREE.Vector3(0, 0, 0),
      },
      {
        par: 3,
        tee: new THREE.Vector3(20, ballRadius, 4),
        cup: new THREE.Vector3(25, 0.01, -3),
        camPos: new THREE.Vector3(20, 12, 12),
        camLook: new THREE.Vector3(20, 0, 0),
      },
      {
        par: 3,
        tee: new THREE.Vector3(40, ballRadius, 9),
        cup: new THREE.Vector3(40, 0.01, -9),
        camPos: new THREE.Vector3(40, 12, 12),
        camLook: new THREE.Vector3(40, 0, 0),
      }
    ];

    function addCourseObject(mesh) {
      mesh.receiveShadow = true;
      mesh.castShadow = false;
      scene.add(mesh);
      courseObjects.push(mesh);
      return mesh;
    }

    function createFairway(x, z, w, l) {
      const geo = new THREE.BoxGeometry(w, 0.2, l);
      const mat = new THREE.MeshStandardMaterial({ color: GREEN });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, -0.1, z);
      addCourseObject(mesh);
      return mesh;
    }

    function createWall(x, z, w, l, holeIndex) {
      const geo = new THREE.BoxGeometry(w, wallHeight, l);
      const mat = new THREE.MeshStandardMaterial({ color: BROWN });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, wallHeight / 2 - 0.01, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      courseObjects.push(mesh);

      collidersByHole[holeIndex].push({
        type: "aabb",
        minX: x - w / 2,
        maxX: x + w / 2,
        minZ: z - l / 2,
        maxZ: z + l / 2,
        mesh
      });

      return mesh;
    }

    function createObstacle(x, y, z, w, h, l, color, holeIndex) {
      const geo = new THREE.BoxGeometry(w, h, l);
      const mat = new THREE.MeshStandardMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      courseObjects.push(mesh);

      obstacleCollidersByHole[holeIndex].push({
        type: "aabb",
        minX: x - w / 2,
        maxX: x + w / 2,
        minZ: z - l / 2,
        maxZ: z + l / 2,
        mesh
      });

      return mesh;
    }

    function createCup(position) {
      const geo = new THREE.CylinderGeometry(0.3, 0.3, 0.03, 24);
      const mat = new THREE.MeshStandardMaterial({ color: DARK });
      const cup = new THREE.Mesh(geo, mat);
      cup.position.set(position.x, 0.015, position.z);
      cup.receiveShadow = true;
      scene.add(cup);
      cupMeshes.push(cup);
      return cup;
    }

    function buildHole1() {
      const i = 0;
      createFairway(0, 0, 4, 16);

      createWall(0, -8, 4.4, wallThickness, i);
      createWall(0, 8, 4.4, wallThickness, i);
      createWall(-2.2, 0, wallThickness, 16, i);
      createWall(2.2, 0, wallThickness, 16, i);

      createCup(holes[i].cup);
    }

    function buildHole2() {
      const i = 1;
      createFairway(20, 0, 4, 10);
      createFairway(23, -3, 10, 4);

      createWall(20, 5, 4.4, wallThickness, i);
      createWall(18, 0, wallThickness, 10, i);
      createWall(22, 2, wallThickness, 6, i);

      createWall(23, -5, 10.4, wallThickness, i);
      createWall(28, -3, wallThickness, 4, i);
      createWall(23, -1, 10.4, wallThickness, i);

      createObstacle(22.1, 0.25, -0.9, 1, 0.5, 1, RED, i);

      createCup(holes[i].cup);
    }

    function buildHole3() {
      const i = 2;
      createFairway(40, 0, 4, 20);

      createWall(40, -10, 4.4, wallThickness, i);
      createWall(40, 10, 4.4, wallThickness, i);
      createWall(37.8, 0, wallThickness, 20, i);
      createWall(42.2, 0, wallThickness, 20, i);

      const postGeo = new THREE.CylinderGeometry(0.12, 0.12, 1.5, 16);
      const postMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
      const post = new THREE.Mesh(postGeo, postMat);
      post.position.set(40, 0.75, 0);
      post.castShadow = true;
      post.receiveShadow = true;
      scene.add(post);
      courseObjects.push(post);

      windmillGroup = new THREE.Group();
      windmillGroup.position.set(40, 0.8, 0);

      const armGeo = new THREE.BoxGeometry(3, 0.12, 0.18);
      const armMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0 });
      windmillBlade = new THREE.Mesh(armGeo, armMat);
      windmillBlade.castShadow = true;
      windmillBlade.receiveShadow = true;
      windmillGroup.add(windmillBlade);
      scene.add(windmillGroup);
      courseObjects.push(windmillGroup);

      createCup(holes[i].cup);
    }

    buildHole1();
    buildHole2();
    buildHole3();

    const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
    const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const ball = new THREE.Mesh(ballGeo, ballMat);
    ball.castShadow = true;
    ball.receiveShadow = true;
    scene.add(ball);

    const arrowGroup = new THREE.Group();
    const shaft = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.03, 1.2, 8),
      new THREE.MeshStandardMaterial({ color: 0xffff00 })
    );
    shaft.rotation.z = Math.PI / 2;
    shaft.position.x = 0.6;

    const head = new THREE.Mesh(
      new THREE.ConeGeometry(0.1, 0.25, 12),
      new THREE.MeshStandardMaterial({ color: 0xffaa00 })
    );
    head.rotation.z = -Math.PI / 2;
    head.position.x = 1.25;

    arrowGroup.add(shaft);
    arrowGroup.add(head);
    arrowGroup.position.y = 0.35;
    scene.add(arrowGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let currentHole = 0;
    let holeStrokes = 0;
    let totalStrokes = 0;
    let ballVelocity = new THREE.Vector3(0, 0, 0);
    let aimAngle = -Math.PI / 2;
    let charging = false;
    let chargeTime = 0;
    let power = 0;
    let sinking = false;
    let sinkTimer = 0;
    let holeSunk = false;
    let advancingHole = false;
    let gameComplete = false;
    let resultsVisible = false;

    let cameraTransition = {
      active: false,
      t: 0,
      duration: 1,
      fromPos: camera.position.clone(),
      toPos: holes[0].camPos.clone(),
      fromLook: new THREE.Vector3(0, 0, 0),
      toLook: holes[0].camLook.clone()
    };

    function resetBallToHole(index) {
      ball.position.copy(holes[index].tee);
      ball.scale.set(1, 1, 1);
      ball.visible = true;
      ballVelocity.set(0, 0, 0);
      sinking = false;
      sinkTimer = 0;
      holeSunk = false;
    }

    function startCameraTransition(index) {
      const currentLook = new THREE.Vector3();
      camera.getWorldDirection(currentLook);
      currentLook.multiplyScalar(10).add(camera.position);

      cameraTransition.active = true;
      cameraTransition.t = 0;
      cameraTransition.fromPos = camera.position.clone();
      cameraTransition.toPos = holes[index].camPos.clone();
      cameraTransition.fromLook = currentLook.clone();
      cameraTransition.toLook = holes[index].camLook.clone();
    }

    function updateHUD() {
      hud.hole.textContent = `Hole: ${currentHole + 1}/3`;
      hud.strokes.textContent = `Strokes: ${holeStrokes}`;
      hud.par.textContent = `Par: ${holes[currentHole].par}`;
      hud.total.textContent = `Total: ${totalStrokes}`;
    }

    function updatePowerBar() {
      hud.powerFill.style.width = `${power * 100}%`;
      const r = Math.floor(255 * power);
      const g = Math.floor(255 * (1 - power));
      hud.powerFill.style.background = `rgb(${r}, ${g}, 0)`;
    }

    function getBallSpeed() {
      return Math.sqrt(ballVelocity.x * ballVelocity.x + ballVelocity.z * ballVelocity.z);
    }

    function isBallMoving() {
      return getBallSpeed() >= 0.01;
    }

    function setMouseFromEvent(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function updateAimFromMouse(event) {
      if (gameComplete || sinking || advancingHole || isBallMoving()) return;

      setMouseFromEvent(event);
      raycaster.setFromCamera(mouse, camera);

      const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
      const point = new THREE.Vector3();
      raycaster.ray.intersectPlane(plane, point);

      const dx = point.x - ball.position.x;
      const dz = point.z - ball.position.z;
      if (dx !== 0 || dz !== 0) {
        aimAngle = Math.atan2(dz, dx) + Math.PI;
      }
    }

    function reflectAgainstAABB(collider) {
      const bx = ball.position.x;
      const bz = ball.position.z;

      const closestX = THREE.MathUtils.clamp(bx, collider.minX, collider.maxX);
      const closestZ = THREE.MathUtils.clamp(bz, collider.minZ, collider.maxZ);

      const dx = bx - closestX;
      const dz = bz - closestZ;
      const distSq = dx * dx + dz * dz;

      if (distSq < ballRadius * ballRadius) {
        const overlap = ballRadius - Math.sqrt(distSq || 0.00001);

        let normalX = 0;
        let normalZ = 0;

        if (Math.abs(dx) > Math.abs(dz)) {
          normalX = dx >= 0 ? 1 : -1;
        } else if (Math.abs(dz) > 0) {
          normalZ = dz >= 0 ? 1 : -1;
        } else {
          const centerX = (collider.minX + collider.maxX) / 2;
          const centerZ = (collider.minZ + collider.maxZ) / 2;
          if (Math.abs(bx - centerX) > Math.abs(bz - centerZ)) {
            normalX = bx >= centerX ? 1 : -1;
          } else {
            normalZ = bz >= centerZ ? 1 : -1;
          }
        }

        ball.position.x += normalX * overlap;
        ball.position.z += normalZ * overlap;

        if (normalX !== 0) ballVelocity.x *= -0.7;
        if (normalZ !== 0) ballVelocity.z *= -0.7;
      }
    }

    function handleCollisions() {
      const wallColliders = collidersByHole[currentHole];
      const obstacleColliders = obstacleCollidersByHole[currentHole];

      for (const c of wallColliders) reflectAgainstAABB(c);
      for (const c of obstacleColliders) reflectAgainstAABB(c);

      if (currentHole === 2 && windmillBlade) {
        const localBall = ball.position.clone().sub(windmillGroup.position);
        const bladeAngle = windmillAngle;
        const axis = new THREE.Vector2(Math.cos(bladeAngle), Math.sin(bladeAngle));
        const perp = new THREE.Vector2(-axis.y, axis.x);
        const p = new THREE.Vector2(localBall.x, localBall.z);

        const along = p.dot(axis);
        const side = p.dot(perp);

        const halfLen = 1.5;
        const halfThickness = 0.16;

        if (Math.abs(along) <= halfLen + ballRadius && Math.abs(side) <= halfThickness + ballRadius) {
          const hitStrength = 0.22;
          ballVelocity.x += perp.x * (side >= 0 ? 1 : -1) * (3 + Math.abs(Math.sin(windmillAngle)) * 2);
          ballVelocity.z += perp.y * (side >= 0 ? 1 : -1) * (3 + Math.abs(Math.sin(windmillAngle)) * 2);
          ball.position.x += perp.x * (side >= 0 ? 1 : -1) * hitStrength;
          ball.position.z += perp.y * (side >= 0 ? 1 : -1) * hitStrength;
        }
      }
    }

    function checkCup() {
      if (sinking || holeSunk || gameComplete) return;
      const cup = holes[currentHole].cup;
      const dx = ball.position.x - cup.x;
      const dz = ball.position.z - cup.z;
      const d = Math.sqrt(dx * dx + dz * dz);

      if (d <= 0.35 && getBallSpeed() < 0.5) {
        sinking = true;
        holeSunk = true;
        sinkTimer = 0;
        ballVelocity.set(0, 0, 0);
      }
    }

    function advanceHoleOrFinish() {
      if (currentHole < 2) {
        currentHole++;
        holeStrokes = 0;
        resetBallToHole(currentHole);
        startCameraTransition(currentHole);
        advancingHole = false;
        updateHUD();
      } else {
        gameComplete = true;
        resultsVisible = true;
        hud.resultsText.textContent = `Total Strokes: ${totalStrokes}`;
        hud.resultsScreen.style.display = "flex";
        advancingHole = false;
      }
    }

    function resetGame() {
      currentHole = 0;
      holeStrokes = 0;
      totalStrokes = 0;
      charging = false;
      chargeTime = 0;
      power = 0;
      sinking = false;
      sinkTimer = 0;
      holeSunk = false;
      advancingHole = false;
      gameComplete = false;
      resultsVisible = false;
      aimAngle = -Math.PI / 2;
      windmillAngle = 0;
      hud.resultsScreen.style.display = "none";
      updatePowerBar();
      resetBallToHole(0);
      camera.position.copy(new THREE.Vector3(0, 12, 15));
      camera.lookAt(holes[0].camLook);
      startCameraTransition(0);
      updateHUD();
    }

    window.addEventListener("mousemove", (e) => {
      updateAimFromMouse(e);
    });

    window.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;
      if (gameComplete || sinking || advancingHole || isBallMoving()) return;
      charging = true;
      chargeTime = 0;
    });

    window.addEventListener("mouseup", (e) => {
      if (e.button !== 0) return;
      if (!charging) return;
      charging = false;

      if (gameComplete || sinking || advancingHole || isBallMoving()) return;

      const speed = power * 15;
      if (speed > 0.05) {
        ballVelocity.x = Math.cos(aimAngle) * speed;
        ballVelocity.z = Math.sin(aimAngle) * speed;
        holeStrokes++;
        totalStrokes++;
        updateHUD();
      }

      power = 0;
      updatePowerBar();
    });

    hud.playAgainBtn.addEventListener("click", resetGame);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function updateCamera(dt) {
      if (!cameraTransition.active) return;

      cameraTransition.t += dt;
      const a = Math.min(cameraTransition.t / cameraTransition.duration, 1);
      const pos = new THREE.Vector3().lerpVectors(cameraTransition.fromPos, cameraTransition.toPos, a);
      const look = new THREE.Vector3().lerpVectors(cameraTransition.fromLook, cameraTransition.toLook, a);

      camera.position.copy(pos);
      camera.lookAt(look);

      if (a >= 1) {
        cameraTransition.active = false;
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);

      windmillAngle += 1.5 * dt;
      if (windmillGroup) {
        windmillGroup.rotation.y = windmillAngle;
      }

      if (charging && !gameComplete && !sinking && !advancingHole && !isBallMoving()) {
        chargeTime += dt;
        const cycle = (chargeTime % 4) / 2;
        power = cycle <= 1 ? cycle : 2 - cycle;
      } else if (!charging && !isBallMoving()) {
        power = 0;
      }
      updatePowerBar();

      if (!sinking && !gameComplete) {
        if (isBallMoving()) {
          ball.position.x += ballVelocity.x * dt;
          ball.position.z += ballVelocity.z * dt;

          handleCollisions();

          ballVelocity.x *= 0.985;
          ballVelocity.z *= 0.985;

          if (getBallSpeed() < 0.01) {
            ballVelocity.set(0, 0, 0);
          }

          checkCup();
        }
      }

      if (sinking) {
        sinkTimer += dt;
        const t = Math.min(sinkTimer / 0.3, 1);
        const s = 1 - t;
        ball.scale.set(s, s, s);
        ball.position.y = ballRadius * s;

        if (t >= 1) {
          ball.visible = false;
          sinking = false;
          advancingHole = true;
          setTimeout(() => {
            advanceHoleOrFinish();
          }, 1000);
        }
      }

      arrowGroup.visible = !gameComplete && !sinking && !advancingHole && !isBallMoving();
      if (arrowGroup.visible) {
        arrowGroup.position.set(ball.position.x, ball.position.y + 0.15, ball.position.z);
        arrowGroup.rotation.y = -aimAngle;
      }

      updateCamera(dt);

      window.__3D_STATE__ = {
        ballPosition: { x: ball.position.x, y: ball.position.y, z: ball.position.z },
        ballVelocity: { x: ballVelocity.x, y: ballVelocity.y, z: ballVelocity.z },
        ballSpeed: getBallSpeed(),
        ballMoving: isBallMoving(),
        currentHole: currentHole + 1,
        holeStrokes,
        totalStrokes,
        holePar: holes[currentHole]?.par ?? 0,
        holeSunk,
        power,
        aimAngle,
        gameComplete,
        windmillAngle,
        resultsVisible,
        ballRadius: 0.2,
        holePositions: holes.map(h => ({ x: h.cup.x, z: h.cup.z }))
      };

      renderer.render(scene, camera);
    }

    resetGame();
    animate();
  </script>
</body>
</html>
