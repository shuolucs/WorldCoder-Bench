<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Mini Golf</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #power-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 10px;
            overflow: hidden;
            pointer-events: none;
            display: none;
        }
        #power-bar {
            width: 0%;
            height: 100%;
            background-color: hsl(120, 100%, 50%);
        }
        #results-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
        }
        #results-screen h1 {
            margin-top: 0;
            color: #333;
        }
        #results-screen p {
            font-size: 24px;
            color: #555;
            margin-bottom: 30px;
        }
        #play-again-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #play-again-btn:hover {
            background: #45a049;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            font-size: 14px;
        }
    </style>
    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        Hole: <span id="h-hole">1</span>/3 | 
        Strokes: <span id="h-strokes">0</span> | 
        Par: <span id="h-par">2</span> | 
        Total: <span id="h-total">0</span>
    </div>

    <div id="power-container">
        <div id="power-bar"></div>
    </div>

    <div id="instructions">
        Move mouse to aim.<br>Hold Left Click for power.<br>Release to shoot.
    </div>

    <div id="results-screen">
        <h1>Course Complete!</h1>
        <p>Total Strokes: <span id="r-total">0</span></p>
        <button id="play-again-btn">Play Again</button>
    </div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            ballPosition: { x: 0, y: 0.2, z: 7 },
            ballVelocity: { x: 0, y: 0, z: 0 },
            ballSpeed: 0,
            ballMoving: false,
            currentHole: 1,
            holeStrokes: 0,
            totalStrokes: 0,
            holePar: 2,
            holeSunk: false,
            power: 0,
            aimAngle: 0,
            gameComplete: false,
            windmillAngle: 0,
            resultsVisible: false,
            ballRadius: 0.2,
            holePositions: [
                { x: 0, z: -7 },
                { x: 28, z: -3 },
                { x: 40, z: -9 }
            ]
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Materials ---
        const matGreen = new THREE.MeshStandardMaterial({ color: 0x2e8b57, roughness: 0.8 });
        const matWall = new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.9 });
        const matObstacle = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.7 });
        const matCup = new THREE.MeshBasicMaterial({ color: 0x112211 });
        const matWindmill = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.5 });

        // --- Course Construction ---
        const aabbs = []; // For collision detection
        const courseGroup = new THREE.Group();
        scene.add(courseGroup);

        function addBox(x, y, z, w, h, d, material, isWall = true) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, material);
            mesh.position.set(x, y, z);
            mesh.receiveShadow = true;
            if (isWall) mesh.castShadow = true;
            courseGroup.add(mesh);

            if (isWall) {
                aabbs.push({
                    minX: x - w / 2, maxX: x + w / 2,
                    minZ: z - d / 2, maxZ: z + d / 2
                });
            }
            return mesh;
        }

        function addCup(x, z) {
            const geo = new THREE.CircleGeometry(0.3, 32);
            const mesh = new THREE.Mesh(geo, matCup);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.set(x, 0.01, z);
            courseGroup.add(mesh);
        }

        // Hole 1 (Par 2)
        addBox(0, -0.25, 0, 4, 0.5, 16, matGreen, false); // Floor
        addBox(-2.25, 0.25, 0, 0.5, 0.5, 16, matWall); // Left wall
        addBox(2.25, 0.25, 0, 0.5, 0.5, 16, matWall); // Right wall
        addBox(0, 0.25, -8.25, 5, 0.5, 0.5, matWall); // Top wall
        addBox(0, 0.25, 8.25, 5, 0.5, 0.5, matWall); // Bottom wall
        addCup(0, -7);

        // Hole 2 (Par 3)
        addBox(20, -0.25, 0, 4, 0.5, 10, matGreen, false); // Floor vertical
        addBox(26, -0.25, -3, 8, 0.5, 4, matGreen, false); // Floor horizontal
        addBox(17.75, 0.25, 0, 0.5, 0.5, 10, matWall); // Left
        addBox(20, 0.25, 5.25, 5, 0.5, 0.5, matWall); // Bottom
        addBox(22.25, 0.25, 2, 0.5, 0.5, 6, matWall); // Inner corner vertical
        addBox(24, 0.25, -5.25, 12.5, 0.5, 0.5, matWall); // Top
        addBox(30.25, 0.25, -3, 0.5, 0.5, 4, matWall); // Far right
        addBox(26.25, 0.25, -0.75, 7.5, 0.5, 0.5, matWall); // Inner corner horizontal
        addBox(22.5, 0.25, -0.5, 1, 0.5, 1, matObstacle); // Obstacle
        addCup(28, -3);

        // Hole 3 (Par 3)
        addBox(40, -0.25, 0, 4, 0.5, 20, matGreen, false); // Floor
        addBox(37.75, 0.25, 0, 0.5, 0.5, 20, matWall); // Left
        addBox(42.25, 0.25, 0, 0.5, 0.5, 20, matWall); // Right
        addBox(40, 0.25, -10.25, 5, 0.5, 0.5, matWall); // Top
        addBox(40, 0.25, 10.25, 5, 0.5, 0.5, matWall); // Bottom
        addCup(40, -9);

        // Windmill
        const windmillGroup = new THREE.Group();
        windmillGroup.position.set(40, 0, 0);
        courseGroup.add(windmillGroup);
        
        const postGeo = new THREE.CylinderGeometry(0.2, 0.2, 1, 16);
        const post = new THREE.Mesh(postGeo, matWindmill);
        post.position.y = 0.5;
        post.castShadow = true;
        windmillGroup.add(post);

        const bladesGroup = new THREE.Group();
        bladesGroup.position.y = 0.2; // Sweeping just above ground
        windmillGroup.add(bladesGroup);

        const bladeGeo = new THREE.BoxGeometry(3, 0.2, 0.2);
        const blade = new THREE.Mesh(bladeGeo, matObstacle);
        blade.castShadow = true;
        bladesGroup.add(blade);

        // --- Game Objects ---
        const ballGeo = new THREE.SphereGeometry(state.ballRadius, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
        const ballMesh = new THREE.Mesh(ballGeo, ballMat);
        ballMesh.castShadow = true;
        scene.add(ballMesh);

        // Aim Arrow
        const arrowGeo = new THREE.ConeGeometry(0.1, 0.6, 16);
        arrowGeo.translate(0, 0.3, 0);
        arrowGeo.rotateX(Math.PI / 2);
        const arrowMat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.8 });
        const arrowMesh = new THREE.Mesh(arrowGeo, arrowMat);
        scene.add(arrowMesh);

        // Invisible plane for raycasting
        const planeGeo = new THREE.PlaneGeometry(1000, 1000);
        planeGeo.rotateX(-Math.PI / 2);
        const planeMesh = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({visible: false}));
        scene.add(planeMesh);

        // --- Camera Logic ---
        const cameraTargets = [
            { pos: new THREE.Vector3(0, 12, 15), look: new THREE.Vector3(0, 0, 0) },
            { pos: new THREE.Vector3(24, 15, 10), look: new THREE.Vector3(24, 0, -1) },
            { pos: new THREE.Vector3(40, 12, 15), look: new THREE.Vector3(40, 0, 0) }
        ];
        
        let currentCamPos = cameraTargets[0].pos.clone();
        let currentCamLook = cameraTargets[0].look.clone();
        camera.position.copy(currentCamPos);
        camera.lookAt(currentCamLook);

        // --- Input & Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isMouseDown = false;
        let powerDir = 1;

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('mousedown', (e) => {
            if (e.button !== 0 || state.ballMoving || state.holeSunk || state.gameComplete) return;
            isMouseDown = true;
            state.power = 0;
            powerDir = 1;
            document.getElementById('power-container').style.display = 'block';
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button !== 0 || !isMouseDown) return;
            isMouseDown = false;
            document.getElementById('power-container').style.display = 'none';
            
            // Shoot
            const speed = state.power * 15;
            state.ballVelocity.x = Math.sin(state.aimAngle) * speed;
            state.ballVelocity.z = Math.cos(state.aimAngle) * speed;
            
            state.holeStrokes++;
            state.totalStrokes++;
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('play-again-btn').addEventListener('click', resetGame);

        // --- Game Logic Functions ---
        function updateHUD() {
            document.getElementById('h-hole').innerText = state.currentHole;
            document.getElementById('h-strokes').innerText = state.holeStrokes;
            document.getElementById('h-par').innerText = state.holePar;
            document.getElementById('h-total').innerText = state.totalStrokes;
        }

        function setupHole(holeNum) {
            state.currentHole = holeNum;
            state.holeStrokes = 0;
            state.holeSunk = false;
            
            if (holeNum === 1) {
                state.ballPosition = { x: 0, y: 0.2, z: 7 };
                state.holePar = 2;
            } else if (holeNum === 2) {
                state.ballPosition = { x: 20, y: 0.2, z: 4 };
                state.holePar = 3;
            } else if (holeNum === 3) {
                state.ballPosition = { x: 40, y: 0.2, z: 9 };
                state.holePar = 3;
            }
            
            state.ballVelocity = { x: 0, y: 0, z: 0 };
            ballMesh.scale.setScalar(1);
            updateHUD();
        }

        function resetGame() {
            state.totalStrokes = 0;
            state.gameComplete = false;
            state.resultsVisible = false;
            document.getElementById('results-screen').style.display = 'none';
            setupHole(1);
        }

        function checkSunk() {
            if (state.holeSunk) return;
            
            const cupPos = state.holePositions[state.currentHole - 1];
            const dx = state.ballPosition.x - cupPos.x;
            const dz = state.ballPosition.z - cupPos.z;
            const dist = Math.sqrt(dx*dx + dz*dz);

            if (dist < 0.35 && state.ballSpeed < 0.5) {
                state.holeSunk = true;
                state.ballVelocity = {x:0, y:0, z:0};
                
                // Sink animation & transition
                let scale = 1;
                const sinkAnim = setInterval(() => {
                    scale -= 0.1;
                    if (scale <= 0) {
                        scale = 0;
                        clearInterval(sinkAnim);
                        setTimeout(() => {
                            if (state.currentHole < 3) {
                                setupHole(state.currentHole + 1);
                            } else {
                                state.gameComplete = true;
                                state.resultsVisible = true;
                                document.getElementById('r-total').innerText = state.totalStrokes;
                                document.getElementById('results-screen').style.display = 'block';
                            }
                        }, 1000);
                    }
                    ballMesh.scale.setScalar(scale);
                }, 30);
            }
        }

        function resolveAABBCollision(bx, bz, radius) {
            for (const aabb of aabbs) {
                const closestX = Math.max(aabb.minX, Math.min(bx, aabb.maxX));
                const closestZ = Math.max(aabb.minZ, Math.min(bz, aabb.maxZ));
                
                const dx = bx - closestX;
                const dz = bz - closestZ;
                const distSq = dx*dx + dz*dz;

                if (distSq < radius * radius) {
                    const dist = Math.sqrt(distSq);
                    let nx = 0, nz = 0;
                    
                    if (dist === 0) {
                        // Deep penetration fallback
                        const dLeft = bx - aabb.minX;
                        const dRight = aabb.maxX - bx;
                        const dTop = bz - aabb.minZ;
                        const dBottom = aabb.maxZ - bz;
                        const minD = Math.min(dLeft, dRight, dTop, dBottom);
                        if (minD === dLeft) nx = -1;
                        else if (minD === dRight) nx = 1;
                        else if (minD === dTop) nz = -1;
                        else nz = 1;
                    } else {
                        nx = dx / dist;
                        nz = dz / dist;
                    }

                    // Push out
                    const pen = radius - dist;
                    state.ballPosition.x += nx * pen;
                    state.ballPosition.z += nz * pen;

                    // Reflect velocity
                    const dot = state.ballVelocity.x * nx + state.ballVelocity.z * nz;
                    state.ballVelocity.x = (state.ballVelocity.x - 2 * dot * nx) * 0.7;
                    state.ballVelocity.z = (state.ballVelocity.z - 2 * dot * nz) * 0.7;
                    
                    // Update bx, bz for subsequent checks
                    bx = state.ballPosition.x;
                    bz = state.ballPosition.z;
                }
            }
        }

        function resolveWindmillCollision() {
            if (state.currentHole !== 3) return;

            const wx = 40, wz = 0;
            const angle = state.windmillAngle;
            const ux = Math.cos(angle);
            const uz = Math.sin(angle);
            
            const px = state.ballPosition.x - wx;
            const pz = state.ballPosition.z - wz;
            
            // Project ball onto blade line
            let t = px * ux + pz * uz;
            t = Math.max(-1.5, Math.min(1.5, t)); // Blade length 3 (1.5 each side)
            
            const cx = t * ux;
            const cz = t * uz;
            
            const dx = px - cx;
            const dz = pz - cz;
            const distSq = dx*dx + dz*dz;
            
            const hitRadius = state.ballRadius + 0.1; // 0.1 is half blade width

            if (distSq < hitRadius * hitRadius) {
                const dist = Math.sqrt(distSq);
                let nx = dx / dist;
                let nz = dz / dist;
                if (dist === 0) { nx = -uz; nz = ux; } // Fallback normal

                // Push out
                const pen = hitRadius - dist;
                state.ballPosition.x += nx * pen;
                state.ballPosition.z += nz * pen;

                // Deflect
                const dot = state.ballVelocity.x * nx + state.ballVelocity.z * nz;
                state.ballVelocity.x = (state.ballVelocity.x - 2 * dot * nx) * 0.7;
                state.ballVelocity.z = (state.ballVelocity.z - 2 * dot * nz) * 0.7;

                // Add blade velocity (omega * r)
                const omega = 1.5;
                const bladeVx = -uz * omega * t;
                const bladeVz = ux * omega * t;
                
                state.ballVelocity.x += bladeVx * 0.5;
                state.ballVelocity.z += bladeVz * 0.5;
            }
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();

        setupHole(1);

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            // Windmill animation
            state.windmillAngle += 1.5 * dt;
            bladesGroup.rotation.y = -state.windmillAngle; // Negative to match math

            // Physics
            state.ballSpeed = Math.sqrt(state.ballVelocity.x**2 + state.ballVelocity.z**2);
            state.ballMoving = state.ballSpeed >= 0.01;

            if (state.ballMoving && !state.holeSunk) {
                // Move
                state.ballPosition.x += state.ballVelocity.x * dt;
                state.ballPosition.z += state.ballVelocity.z * dt;

                // Friction
                state.ballVelocity.x *= 0.985;
                state.ballVelocity.z *= 0.985;

                // Stop if very slow
                if (state.ballSpeed < 0.01) {
                    state.ballVelocity.x = 0;
                    state.ballVelocity.z = 0;
                }

                // Collisions
                resolveAABBCollision(state.ballPosition.x, state.ballPosition.z, state.ballRadius);
                resolveWindmillCollision();
                
                checkSunk();
            }

            // Update Ball Mesh
            ballMesh.position.set(state.ballPosition.x, state.ballPosition.y, state.ballPosition.z);

            // Aiming
            if (!state.ballMoving && !state.holeSunk && !state.gameComplete) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(planeMesh);
                if (intersects.length > 0) {
                    const pt = intersects[0].point;
                    state.aimAngle = Math.atan2(state.ballPosition.x - pt.x, state.ballPosition.z - pt.z);
                }
                arrowMesh.visible = true;
                arrowMesh.position.copy(ballMesh.position);
                arrowMesh.rotation.y = state.aimAngle;
            } else {
                arrowMesh.visible = false;
            }

            // Power Bar
            if (isMouseDown) {
                state.power += (dt / 2) * powerDir; // 2 seconds to fill
                if (state.power >= 1) { state.power = 1; powerDir = -1; }
                if (state.power <= 0) { state.power = 0; powerDir = 1; }
                
                const bar = document.getElementById('power-bar');
                bar.style.width = (state.power * 100) + '%';
                const hue = (1 - state.power) * 120;
                bar.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;
            }

            // Camera Lerp
            const targetCam = cameraTargets[state.currentHole - 1];
            currentCamPos.lerp(targetCam.pos, 3 * dt);
            currentCamLook.lerp(targetCam.look, 3 * dt);
            camera.position.copy(currentCamPos);
            camera.lookAt(currentCamLook);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
