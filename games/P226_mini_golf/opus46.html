<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Golf</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: Arial, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #fff;
    font-size: 18px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    line-height: 1.6;
    pointer-events: none;
}
#power-bar-container {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 20px;
    border: 2px solid #fff;
    border-radius: 4px;
    background: rgba(0,0,0,0.4);
    overflow: hidden;
    pointer-events: none;
}
#power-bar-fill {
    width: 0%;
    height: 100%;
    background: green;
    transition: none;
}
#power-label {
    position: absolute;
    bottom: 55px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 14px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    pointer-events: none;
}
#results-screen {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 40px 60px;
    border-radius: 12px;
    text-align: center;
    font-size: 22px;
    z-index: 100;
}
#results-screen h2 {
    margin-bottom: 15px;
    font-size: 32px;
}
#results-screen p {
    margin-bottom: 25px;
    font-size: 24px;
}
#play-again-btn {
    padding: 12px 30px;
    font-size: 20px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #4CAF50;
    color: #fff;
    transition: background 0.2s;
}
#play-again-btn:hover {
    background: #45a049;
}
</style>
</head>
<body>
<div id="hud">
    <div id="hud-hole">Hole: 1/3</div>
    <div id="hud-strokes">Strokes: 0</div>
    <div id="hud-par">Par: 2</div>
    <div id="hud-total">Total: 0</div>
</div>
<div id="power-label">Power</div>
<div id="power-bar-container">
    <div id="power-bar-fill"></div>
</div>
<div id="results-screen">
    <h2>Course Complete!</h2>
    <p id="results-text">Total Strokes: 0</p>
    <button id="play-again-btn">Play Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    // ==================== SCENE SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 12, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 100;
    dirLight.shadow.camera.left = -50;
    dirLight.shadow.camera.right = 50;
    dirLight.shadow.camera.top = 50;
    dirLight.shadow.camera.bottom = -50;
    scene.add(dirLight);

    // ==================== MATERIALS ====================
    const greenMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4e });
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const redMat = new THREE.MeshStandardMaterial({ color: 0xcc2222 });
    const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const grayMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
    const arrowMat = new THREE.MeshStandardMaterial({ color: 0xffff00 });

    // ==================== COURSE DATA ====================
    const holeData = [
        { par: 2, tee: { x: 0, z: 7 }, cup: { x: 0, z: -7 }, center: { x: 0, z: 0 } },
        { par: 3, tee: { x: 20, z: 4 }, cup: { x: 27, z: -3 }, center: { x: 23, z: -1 } },
        { par: 3, tee: { x: 40, z: 9 }, cup: { x: 40, z: -9 }, center: { x: 40, z: 0 } }
    ];

    // Wall collision data: each wall is {x, z, hw, hd} (center, half-width, half-depth) and a normal direction
    // We'll store walls as axis-aligned boxes for collision
    const walls = []; // {minX, maxX, minZ, maxZ, mesh}
    const obstacles = []; // same format

    function createWall(x, y, z, w, h, d) {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mesh = new THREE.Mesh(geo, wallMat);
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        walls.push({
            minX: x - w/2, maxX: x + w/2,
            minZ: z - d/2, maxZ: z + d/2,
            minY: 0, maxY: h,
            mesh: mesh
        });
        return mesh;
    }

    function createObstacle(x, y, z, w, h, d, mat) {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mesh = new THREE.Mesh(geo, mat || redMat);
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        obstacles.push({
            minX: x - w/2, maxX: x + w/2,
            minZ: z - d/2, maxZ: z + d/2,
            minY: 0, maxY: h,
            mesh: mesh
        });
        return mesh;
    }

    // ==================== HOLE 1: Simple straight ====================
    // Fairway: 4 wide x 16 long at (0, 0, 0)
    const fairway1 = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 16), greenMat);
    fairway1.position.set(0, -0.05, 0);
    fairway1.receiveShadow = true;
    scene.add(fairway1);

    // Walls for hole 1
    const wallH = 0.5;
    const wallT = 0.3;
    // Left wall
    createWall(-2 - wallT/2, wallH/2, 0, wallT, wallH, 16);
    // Right wall
    createWall(2 + wallT/2, wallH/2, 0, wallT, wallH, 16);
    // Top wall (far end, z=-8)
    createWall(0, wallH/2, -8 - wallT/2, 4 + wallT*2, wallH, wallT);
    // Bottom wall (near end, z=8)
    createWall(0, wallH/2, 8 + wallT/2, 4 + wallT*2, wallH, wallT);

    // ==================== HOLE 2: L-shaped ====================
    // Vertical part: 4 wide x 10 long at x=20, z=0 (z from -5 to 5)
    const fairway2a = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 10), greenMat);
    fairway2a.position.set(20, -0.05, 0);
    fairway2a.receiveShadow = true;
    scene.add(fairway2a);

    // Horizontal part: 10 wide x 4 long, turning right
    // The vertical part goes from x=18 to x=22, z=-5 to z=5
    // The horizontal part extends from x=22 to x=30, z=-5 to z=-1
    // Actually let me reconsider the L-shape layout:
    // Vertical: x=18..22, z=-5..5 (center x=20, z=0)
    // Horizontal: x=22..30, z=-5..-1 (center x=26, z=-3), 8 wide x 4 long
    const fairway2b = new THREE.Mesh(new THREE.BoxGeometry(8, 0.1, 4), greenMat);
    fairway2b.position.set(26, -0.05, -3);
    fairway2b.receiveShadow = true;
    scene.add(fairway2b);

    // Tee at (20, 0, 4), Cup at (29, 0, -3) - far end of horizontal
    holeData[1].tee = { x: 20, z: 4 };
    holeData[1].cup = { x: 29, z: -3 };
    holeData[1].center = { x: 24, z: -1 };

    // Walls for hole 2 - L shape
    // Left wall of vertical part: x=18-wallT/2, z from -5 to 5
    createWall(18 - wallT/2, wallH/2, 0, wallT, wallH, 10);
    // Right wall of vertical part (only top portion, z from -1 to 5): x=22+wallT/2
    createWall(22 + wallT/2, wallH/2, 2, wallT, wallH, 6); // z from -1 to 5
    // Top wall of vertical part: z=5+wallT/2
    createWall(20, wallH/2, 5 + wallT/2, 4 + wallT*2, wallH, wallT);
    // Bottom wall of vertical part (left portion): z=-5-wallT/2, from x=18 to x=22
    createWall(20, wallH/2, -5 - wallT/2, 4 + wallT*2, wallH, wallT);
    // But the bottom of vertical connects to horizontal, so bottom wall should only be on left side
    // Actually: the vertical goes z=-5..5, horizontal goes z=-5..-1
    // So at z=-5, the wall goes from x=18 to x=30 (full bottom)
    // Let me redo walls properly:

    // Clear last 3 walls and redo
    // Remove last 4 walls
    for (let i = 0; i < 4; i++) {
        const w = walls.pop();
        scene.remove(w.mesh);
    }

    // Hole 2 boundary:
    // The L-shape: vertical x=18..22, z=-5..5; horizontal x=22..30, z=-5..-1
    // Outer walls:
    // Left of vertical: x=18, z=-5..5
    createWall(18 - wallT/2, wallH/2, 0, wallT, wallH, 10 + wallT);
    // Top of vertical: z=5, x=18..22
    createWall(20, wallH/2, 5 + wallT/2, 4 + wallT*2, wallH, wallT);
    // Right of vertical (upper): x=22, z=-1..5
    createWall(22 + wallT/2, wallH/2, 2, wallT, wallH, 6);
    // Top of horizontal: z=-1, x=22..30
    createWall(26, wallH/2, -1 + wallT/2, 8 + wallT, wallH, wallT);
    // Right of horizontal: x=30, z=-5..-1
    createWall(30 + wallT/2, wallH/2, -3, wallT, wallH, 4 + wallT*2);
    // Bottom of L: z=-5, x=18..30
    createWall(24, wallH/2, -5 - wallT/2, 12 + wallT*2, wallH, wallT);

    // Obstacle in corner of L (at the inner corner around x=22, z=-1)
    createObstacle(21.5, 0.25, -1.5, 1, 0.5, 1, redMat);

    // ==================== HOLE 3: Straight with windmill ====================
    // Fairway: 4 wide x 20 long at x=40, z=0
    const fairway3 = new THREE.Mesh(new THREE.BoxGeometry(4, 0.1, 20), greenMat);
    fairway3.position.set(40, -0.05, 0);
    fairway3.receiveShadow = true;
    scene.add(fairway3);

    // Walls for hole 3
    createWall(38 - wallT/2, wallH/2, 0, wallT, wallH, 20);
    createWall(42 + wallT/2, wallH/2, 0, wallT, wallH, 20);
    createWall(40, wallH/2, -10 - wallT/2, 4 + wallT*2, wallH, wallT);
    createWall(40, wallH/2, 10 + wallT/2, 4 + wallT*2, wallH, wallT);

    // Windmill
    const windmillGroup = new THREE.Group();
    windmillGroup.position.set(40, 0, 0);
    scene.add(windmillGroup);

    // Post
    const postGeo = new THREE.CylinderGeometry(0.15, 0.15, 1.5, 8);
    const postMesh = new THREE.Mesh(postGeo, grayMat);
    postMesh.position.y = 0.75;
    postMesh.castShadow = true;
    windmillGroup.add(postMesh);

    // Blade pivot
    const bladePivot = new THREE.Group();
    bladePivot.position.set(0, 0.25, 0);
    windmillGroup.add(bladePivot);

    // Two blades
    const bladeGeo = new THREE.BoxGeometry(3, 0.15, 0.3);
    const bladeMesh = new THREE.Mesh(bladeGeo, grayMat);
    bladeMesh.castShadow = true;
    bladePivot.add(bladeMesh);

    // Second blade perpendicular
    const bladeMesh2 = new THREE.Mesh(bladeGeo, grayMat);
    bladeMesh2.rotation.y = Math.PI / 2;
    bladeMesh2.castShadow = true;
    bladePivot.add(bladeMesh2);

    let windmillAngle = 0;

    // ==================== CUPS ====================
    const cups = [];
    holeData.forEach((h, i) => {
        const cupGeo = new THREE.CircleGeometry(0.3, 32);
        const cupMesh = new THREE.Mesh(cupGeo, darkMat);
        cupMesh.rotation.x = -Math.PI / 2;
        cupMesh.position.set(h.cup.x, 0.01, h.cup.z);
        scene.add(cupMesh);
        cups.push(cupMesh);

        // Tee marker
        const teeGeo = new THREE.CircleGeometry(0.15, 16);
        const teeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const teeMesh = new THREE.Mesh(teeGeo, teeMat);
        teeMesh.rotation.x = -Math.PI / 2;
        teeMesh.position.set(h.tee.x, 0.01, h.tee.z);
        scene.add(teeMesh);
    });

    // ==================== GROUND ====================
    const groundGeo = new THREE.PlaneGeometry(200, 200);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7d44 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.1;
    ground.receiveShadow = true;
    scene.add(ground);

    // ==================== BALL ====================
    const ballGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const ball = new THREE.Mesh(ballGeo, whiteMat);
    ball.castShadow = true;
    ball.position.set(0, 0.2, 7);
    scene.add(ball);

    let ballVel = { x: 0, y: 0, z: 0 };
    let ballMoving = false;

    // ==================== AIM ARROW ====================
    const arrowGroup = new THREE.Group();
    scene.add(arrowGroup);

    // Arrow shaft
    const shaftGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 8);
    const shaftMesh = new THREE.Mesh(shaftGeo, arrowMat);
    shaftMesh.position.z = -0.75;
    shaftMesh.rotation.x = Math.PI / 2;
    arrowGroup.add(shaftMesh);

    // Arrow head
    const headGeo = new THREE.ConeGeometry(0.12, 0.3, 8);
    const headMesh = new THREE.Mesh(headGeo, arrowMat);
    headMesh.position.z = -1.6;
    headMesh.rotation.x = -Math.PI / 2;
    arrowGroup.add(headMesh);

    arrowGroup.position.y = 0.2;

    // ==================== GAME STATE ====================
    let currentHole = 0; // 0-indexed internally
    let holeStrokes = 0;
    let totalStrokes = 0;
    let holeSunk = false;
    let power = 0;
    let aimAngle = 0;
    let gameComplete = false;
    let mouseDown = false;
    let mouseX = 0;
    let mouseZ = 0;
    let powerDirection = 1;
    let sinkingBall = false;
    let sinkTimer = 0;
    let transitioningHole = false;
    let transitionTimer = 0;
    let cameraFrom = new THREE.Vector3();
    let cameraTo = new THREE.Vector3();
    let cameraLookFrom = new THREE.Vector3();
    let cameraLookTo = new THREE.Vector3();
    let resultsVisible = false;

    // Raycaster for mouse
    const raycaster = new THREE.Raycaster();
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const mouseNDC = new THREE.Vector2();

    function getCameraForHole(holeIdx) {
        const h = holeData[holeIdx];
        return {
            pos: new THREE.Vector3(h.center.x, 12, h.center.z + 12),
            look: new THREE.Vector3(h.center.x, 0, h.center.z)
        };
    }

    function resetToHole(holeIdx) {
        currentHole = holeIdx;
        holeStrokes = 0;
        holeSunk = false;
        sinkingBall = false;
        const h = holeData[holeIdx];
        ball.position.set(h.tee.x, 0.2, h.tee.z);
        ball.scale.set(1, 1, 1);
        ball.visible = true;
        ballVel = { x: 0, y: 0, z: 0 };
        ballMoving = false;
        updateHUD();
    }

    function updateHUD() {
        document.getElementById('hud-hole').textContent = `Hole: ${currentHole + 1}/3`;
        document.getElementById('hud-strokes').textContent = `Strokes: ${holeStrokes}`;
        document.getElementById('hud-par').textContent = `Par: ${holeData[currentHole].par}`;
        document.getElementById('hud-total').textContent = `Total: ${totalStrokes}`;
    }

    // ==================== INPUT ====================
    window.addEventListener('mousemove', (e) => {
        mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;

        if (!ballMoving && !sinkingBall && !gameComplete && !transitioningHole) {
            raycaster.setFromCamera(mouseNDC, camera);
            const intersect = new THREE.Vector3();
            raycaster.ray.intersectPlane(groundPlane, intersect);
            if (intersect) {
                mouseX = intersect.x;
                mouseZ = intersect.z;
                // Aim opposite to mouse direction
                const dx = ball.position.x - intersect.x;
                const dz = ball.position.z - intersect.z;
                aimAngle = Math.atan2(dx, dz);
            }
        }
    });

    window.addEventListener('mousedown', (e) => {
        if (e.button === 0 && !ballMoving && !sinkingBall && !gameComplete && !transitioningHole) {
            mouseDown = true;
            power = 0;
            powerDirection = 1;
        }
    });

    window.addEventListener('mouseup', (e) => {
        if (e.button === 0 && mouseDown && !ballMoving && !sinkingBall && !gameComplete && !transitioningHole) {
            mouseDown = false;
            if (power > 0.01) {
                const speed = power * 15;
                ballVel.x = Math.sin(aimAngle) * speed;
                ballVel.z = Math.cos(aimAngle) * speed;
                ballMoving = true;
                holeStrokes++;
                totalStrokes++;
                updateHUD();
            }
            power = 0;
            updatePowerBar();
        }
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    document.getElementById('play-again-btn').addEventListener('click', () => {
        document.getElementById('results-screen').style.display = 'none';
        resultsVisible = false;
        gameComplete = false;
        totalStrokes = 0;
        resetToHole(0);
        const cam = getCameraForHole(0);
        camera.position.copy(cam.pos);
        camera.lookAt(cam.look);
    });

    function updatePowerBar() {
        const fill = document.getElementById('power-bar-fill');
        fill.style.width = (power * 100) + '%';
        // Color from green to red
        const r = Math.floor(255 * power);
        const g = Math.floor(255 * (1 - power));
        fill.style.background = `rgb(${r},${g},0)`;
    }

    // ==================== COLLISION ====================
    function ballWallCollision() {
        const br = 0.2;
        const bx = ball.position.x;
        const bz = ball.position.z;

        const allBoxes = [...walls, ...obstacles];

        for (const box of allBoxes) {
            // Find closest point on box to ball
            const closestX = Math.max(box.minX, Math.min(bx, box.maxX));
            const closestZ = Math.max(box.minZ, Math.min(bz, box.maxZ));

            const dx = bx - closestX;
            const dz = bz - closestZ;
            const dist = Math.sqrt(dx * dx + dz * dz);

            if (dist < br && dist > 0) {
                // Normal from box to ball
                const nx = dx / dist;
                const nz = dz / dist;

                // Push ball out
                ball.position.x = closestX + nx * br;
                ball.position.z = closestZ + nz * br;

                // Reflect velocity
                const dot = ballVel.x * nx + ballVel.z * nz;
                if (dot < 0) {
                    ballVel.x -= 2 * dot * nx;
                    ballVel.z -= 2 * dot * nz;
                    ballVel.x *= 0.7;
                    ballVel.z *= 0.7;
                }
            } else if (dist === 0) {
                // Ball center is inside box, push out along velocity
                // Determine which face is closest
                const dLeft = bx - box.minX;
                const dRight = box.maxX - bx;
                const dTop = bz - box.minZ;
                const dBottom = box.maxZ - bz;
                const minD = Math.min(dLeft, dRight, dTop, dBottom);

                if (minD === dLeft) {
                    ball.position.x = box.minX - br;
                    if (ballVel.x > 0) { ballVel.x = -ballVel.x * 0.7; ballVel.z *= 0.7; }
                } else if (minD === dRight) {
                    ball.position.x = box.maxX + br;
                    if (ballVel.x < 0) { ballVel.x = -ballVel.x * 0.7; ballVel.z *= 0.7; }
                } else if (minD === dTop) {
                    ball.position.z = box.minZ - br;
                    if (ballVel.z > 0) { ballVel.z = -ballVel.z * 0.7; ballVel.x *= 0.7; }
                } else {
                    ball.position.z = box.maxZ + br;
                    if (ballVel.z < 0) { ballVel.z = -ballVel.z * 0.7; ballVel.x *= 0.7; }
                }
            }
        }
    }

    function windmillCollision() {
        // Check collision with windmill blades
        // Blades are at windmill position (40, 0.25, 0), rotating around Y
        const wx = 40, wz = 0, wy = 0.25;
        const bx = ball.position.x, bz = ball.position.z;
        const br = 0.2;

        // Check if ball is at blade height
        if (ball.position.y - br > wy + 0.15 || ball.position.y + br < wy - 0.15) return;

        // For each blade direction (4 arms due to 2 perpendicular blades)
        const angles = [windmillAngle, windmillAngle + Math.PI/2, windmillAngle + Math.PI, windmillAngle + 3*Math.PI/2];

        for (const angle of angles) {
            // Blade extends from center to 1.5 units in direction angle
            const bladeEndX = wx + Math.sin(angle) * 1.5;
            const bladeEndZ = wz + Math.cos(angle) * 1.5;

            // Find closest point on blade segment to ball
            const segDx = bladeEndX - wx;
            const segDz = bladeEndZ - wz;
            const segLen = 1.5;

            const t = Math.max(0, Math.min(1, ((bx - wx) * segDx + (bz - wz) * segDz) / (segLen * segLen)));
            const closestX = wx + t * segDx;
            const closestZ = wz + t * segDz;

            const dx = bx - closestX;
            const dz = bz - closestZ;
            const dist = Math.sqrt(dx * dx + dz * dz);

            const bladeRadius = 0.15 + br;
            if (dist < bladeRadius && dist > 0) {
                // Push ball out
                const nx = dx / dist;
                const nz = dz / dist;
                ball.position.x = closestX + nx * bladeRadius;
                ball.position.z = closestZ + nz * bladeRadius;

                // Blade velocity at contact point (tangential)
                const bladeSpeed = 1.5 * t * 1.5; // angular_vel * radius
                const tangentX = Math.cos(angle) * bladeSpeed;
                const tangentZ = -Math.sin(angle) * bladeSpeed;

                // Reflect and add blade velocity
                const dot = ballVel.x * nx + ballVel.z * nz;
                if (dot < 0) {
                    ballVel.x -= 2 * dot * nx;
                    ballVel.z -= 2 * dot * nz;
                }
                ballVel.x = ballVel.x * 0.7 + tangentX * 0.5;
                ballVel.z = ballVel.z * 0.7 + tangentZ * 0.5;

                ballMoving = true;
                break;
            }
        }
    }

    // ==================== ANIMATION LOOP ====================
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.05);

        // Windmill rotation
        windmillAngle += 1.5 * dt;
        bladePivot.rotation.y = windmillAngle;

        // Power bar
        if (mouseDown && !ballMoving && !sinkingBall && !gameComplete) {
            power += powerDirection * dt / 2; // 0 to 1 in 2 seconds
            if (power >= 1) { power = 1; powerDirection = -1; }
            if (power <= 0) { power = 0; powerDirection = 1; }
            updatePowerBar();
        }

        // Ball physics
        if (ballMoving && !sinkingBall) {
            ball.position.x += ballVel.x * dt;
            ball.position.z += ballVel.z * dt;
            ball.position.y = 0.2;

            // Friction
            const frictionPerFrame = Math.pow(0.985, dt * 60);
            ballVel.x *= frictionPerFrame;
            ballVel.z *= frictionPerFrame;

            // Collisions
            ballWallCollision();
            windmillCollision();

            const speed = Math.sqrt(ballVel.x * ballVel.x + ballVel.z * ballVel.z);
            if (speed < 0.01) {
                ballVel.x = 0;
                ballVel.z = 0;
                ballMoving = false;
            }

            // Check cup
            const h = holeData[currentHole];
            const cupDx = ball.position.x - h.cup.x;
            const cupDz = ball.position.z - h.cup.z;
            const cupDist = Math.sqrt(cupDx * cupDx + cupDz * cupDz);
            if (cupDist < 0.35 && speed < 0.5) {
                holeSunk = true;
                sinkingBall = true;
                sinkTimer = 0;
                ballVel.x = 0;
                ballVel.z = 0;
                ballMoving = false;
                ball.position.x = h.cup.x;
                ball.position.z = h.cup.z;
            }
        }

        // Sinking animation
        if (sinkingBall) {
            sinkTimer += dt;
            const t = Math.min(sinkTimer / 0.3, 1);
            const s = 1 - t;
            ball.scale.set(s, s, s);
            ball.position.y = 0.2 * s;

            if (sinkTimer > 0.3 && !transitioningHole) {
                // After 1 second, advance
                if (sinkTimer > 1.3) {
                    if (currentHole < 2) {
                        // Transition to next hole
                        transitioningHole = true;
                        transitionTimer = 0;
                        const camNow = getCameraForHole(currentHole);
                        const camNext = getCameraForHole(currentHole + 1);
                        cameraFrom.copy(camera.position);
                        cameraTo.copy(camNext.pos);
                        cameraLookFrom.copy(camNow.look);
                        cameraLookTo.copy(camNext.look);
                        currentHole++;
                        holeStrokes = 0;
                        holeSunk = false;
                        const nh = holeData[currentHole];
                        ball.position.set(nh.tee.x, 0.2, nh.tee.z);
                        ball.scale.set(1, 1, 1);
                        ball.visible = true;
                        sinkingBall = false;
                        updateHUD();
                    } else {
                        // Game complete
                        gameComplete = true;
                        sinkingBall = false;
                        resultsVisible = true;
                        document.getElementById('results-text').textContent = `Total Strokes: ${totalStrokes}`;
                        document.getElementById('results-screen').style.display = 'block';
                    }
                }
            }
        }

        // Camera transition
        if (transitioningHole) {
            transitionTimer += dt;
            const t = Math.min(transitionTimer / 1.0, 1);
            const ease = t * t * (3 - 2 * t); // smoothstep
            camera.position.lerpVectors(cameraFrom, cameraTo, ease);
            const lookTarget = new THREE.Vector3().lerpVectors(cameraLookFrom, cameraLookTo, ease);
            camera.lookAt(lookTarget);
            if (t >= 1) {
                transitioningHole = false;
            }
        }

        // Aim arrow
        if (!ballMoving && !sinkingBall && !gameComplete && !transitioningHole) {
            arrowGroup.visible = true;
            arrowGroup.position.x = ball.position.x;
            arrowGroup.position.z = ball.position.z;
            arrowGroup.rotation.y = aimAngle;
        } else {
            arrowGroup.visible = false;
        }

        // Update state
        const speed = Math.sqrt(ballVel.x * ballVel.x + ballVel.z * ballVel.z);
        window.__3D_STATE__ = {
            ballPosition: { x: ball.position.x, y: ball.position.y, z: ball.position.z },
            ballVelocity: { x: ballVel.x, y: ballVel.y, z: ballVel.z },
            ballSpeed: speed,
            ballMoving: speed >= 0.01,
            currentHole: currentHole + 1,
            holeStrokes: holeStrokes,
            totalStrokes: totalStrokes,
            holePar: holeData[currentHole].par,
            holeSunk: holeSunk,
            power: power,
            aimAngle: aimAngle,
            gameComplete: gameComplete,
            windmillAngle: windmillAngle,
            resultsVisible: resultsVisible,
            ballRadius: 0.2,
            holePositions: holeData.map(h => ({ x: h.cup.x, z: h.cup.z }))
        };

        renderer.render(scene, camera);
    }

    // Initialize camera
    const initCam = getCameraForHole(0);
    camera.position.copy(initCam.pos);
    camera.lookAt(initCam.look);

    updateHUD();
    animate();
})();
</script>
</body>
