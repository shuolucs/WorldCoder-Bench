<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Kaleidoscope</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; }
canvas { display: block; }
#hud-panel {
    position: fixed;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.7);
    color: #ffffff;
    padding: 15px 20px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.8;
    z-index: 100;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(5px);
    min-width: 200px;
}
#hud-panel div { white-space: nowrap; }
#hud-pause {
    color: #ff4444;
    font-weight: bold;
    font-size: 16px;
}
#instructions {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.7);
    color: rgba(255, 255, 255, 0.7);
    padding: 10px 20px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    text-align: center;
    z-index: 100;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}
#instructions span {
    margin: 0 10px;
}
#instructions kbd {
    background: rgba(255, 255, 255, 0.15);
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid rgba(255, 255, 255, 0.2);
}
</style>
</head>
<body>

<div id="hud-panel">
    <div id="hud-speed">Speed: 1.00x</div>
    <div id="hud-time">Time: 0.00s</div>
    <div id="hud-symmetry">Symmetry: 6-fold</div>
    <div id="hud-color-mode">Mode: rainbow</div>
    <div id="hud-pause"></div>
    <div id="hud-snapshots">Snapshots: 0</div>
</div>

<div id="instructions">
    <span><kbd>↑</kbd>/<kbd>↓</kbd> Speed</span>
    <span><kbd>Space</kbd> Pause</span>
    <span><kbd>R</kbd> Reset</span>
    <span><kbd>S</kbd> Snapshot</span>
    <span><kbd>4</kbd><kbd>6</kbd><kbd>8</kbd> Symmetry</span>
    <span><kbd>C</kbd> Color Mode</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    // State
    const state = {
        timeSpeed: 1.0,
        elapsedTime: 0,
        isPaused: false,
        symmetryFold: 6,
        colorMode: 'rainbow',
        snapshotCount: 0,
        shapeCount: 0,
        shapesPositionsValid: true,
        prePauseSpeed: 1.0
    };
    window.__3D_STATE__ = state;

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.5;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.0);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    // Kaleidoscope group
    const kaleidoscopeGroup = new THREE.Group();
    scene.add(kaleidoscopeGroup);

    // Base shape definitions
    const shapeConfigs = [
        { type: 'torusknot', radius: 1.5, speedFactor: 0.7, offset: 0, scale: 0.25, p: 2, q: 3 },
        { type: 'icosahedron', radius: 2.5, speedFactor: 0.5, offset: Math.PI * 0.4, scale: 0.3 },
        { type: 'octahedron', radius: 3.5, speedFactor: 0.35, offset: Math.PI * 0.8, scale: 0.28 },
        { type: 'torusknot', radius: 4.5, speedFactor: 0.25, offset: Math.PI * 1.2, scale: 0.22, p: 3, q: 2 },
        { type: 'icosahedron', radius: 5.5, speedFactor: 0.18, offset: Math.PI * 1.6, scale: 0.35 }
    ];

    // Create geometry for each shape type
    function createGeometry(config) {
        switch (config.type) {
            case 'torusknot':
                return new THREE.TorusKnotGeometry(0.4, 0.15, 64, 16, config.p || 2, config.q || 3);
            case 'icosahedron':
                return new THREE.IcosahedronGeometry(0.4, 1);
            case 'octahedron':
                return new THREE.OctahedronGeometry(0.4, 0);
            default:
                return new THREE.IcosahedronGeometry(0.4, 1);
        }
    }

    // Base shapes and their clones
    let baseShapes = [];
    let allMeshes = [];

    function getColor(index, time, mode) {
        const t = time * 0.3 + index * 0.5;
        switch (mode) {
            case 'rainbow': {
                const hue = (t * 0.1) % 1;
                return new THREE.Color().setHSL(hue, 0.9, 0.5);
            }
            case 'monochrome': {
                const lightness = 0.2 + 0.4 * (0.5 + 0.5 * Math.sin(t));
                return new THREE.Color().setHSL(0.6, 0.8, lightness);
            }
            case 'fire': {
                const phase = (0.5 + 0.5 * Math.sin(t)) ;
                const hue = 0.0 + phase * 0.1; // red to yellow
                const sat = 0.9;
                const light = 0.3 + phase * 0.3;
                return new THREE.Color().setHSL(hue, sat, light);
            }
            default:
                return new THREE.Color(0xffffff);
        }
    }

    function getEmissiveColor(index, time, mode) {
        const t = time * 0.3 + index * 0.5;
        switch (mode) {
            case 'rainbow': {
                const hue = (t * 0.1 + 0.05) % 1;
                return new THREE.Color().setHSL(hue, 1.0, 0.4);
            }
            case 'monochrome': {
                const lightness = 0.1 + 0.3 * (0.5 + 0.5 * Math.sin(t + 0.5));
                return new THREE.Color().setHSL(0.62, 0.9, lightness);
            }
            case 'fire': {
                const phase = (0.5 + 0.5 * Math.sin(t + 0.3));
                const hue = 0.02 + phase * 0.08;
                return new THREE.Color().setHSL(hue, 1.0, 0.3 + phase * 0.2);
            }
            default:
                return new THREE.Color(0x000000);
        }
    }

    function buildKaleidoscope() {
        // Clear existing
        while (kaleidoscopeGroup.children.length > 0) {
            const child = kaleidoscopeGroup.children[0];
            kaleidoscopeGroup.remove(child);
            if (child.traverse) {
                child.traverse(obj => {
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) obj.material.dispose();
                });
            }
        }
        baseShapes = [];
        allMeshes = [];

        const foldCount = state.symmetryFold;
        const angleStep = (Math.PI * 2) / foldCount;

        shapeConfigs.forEach((config, shapeIndex) => {
            const geometry = createGeometry(config);
            const baseInfo = {
                config: config,
                meshes: [],
                materials: []
            };

            for (let i = 0; i < foldCount; i++) {
                const material = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: 0x000000,
                    emissiveIntensity: 0.8,
                    metalness: 0.6,
                    roughness: 0.2,
                });

                const mesh = new THREE.Mesh(geometry, material);
                mesh.scale.setScalar(config.scale);

                // Create a pivot group for rotation symmetry
                const pivot = new THREE.Group();
                pivot.rotation.z = angleStep * i;
                pivot.add(mesh);
                kaleidoscopeGroup.add(pivot);

                baseInfo.meshes.push({ mesh, pivot, foldIndex: i });
                baseInfo.materials.push(material);
                allMeshes.push(mesh);
            }

            baseShapes.push(baseInfo);
        });

        state.shapeCount = baseShapes.length * foldCount;
    }

    buildKaleidoscope();

    // HUD elements
    const hudSpeed = document.getElementById('hud-speed');
    const hudTime = document.getElementById('hud-time');
    const hudSymmetry = document.getElementById('hud-symmetry');
    const hudColorMode = document.getElementById('hud-color-mode');
    const hudPause = document.getElementById('hud-pause');
    const hudSnapshots = document.getElementById('hud-snapshots');

    function updateHUD() {
        hudSpeed.textContent = `Speed: ${state.timeSpeed.toFixed(2)}x`;
        hudTime.textContent = `Time: ${state.elapsedTime.toFixed(2)}s`;
        hudSymmetry.textContent = `Symmetry: ${state.symmetryFold}-fold`;
        hudColorMode.textContent = `Mode: ${state.colorMode}`;
        hudPause.textContent = state.isPaused ? 'PAUSED' : '';
        hudSnapshots.textContent = `Snapshots: ${state.snapshotCount}`;
    }

    // Color modes
    const colorModes = ['rainbow', 'monochrome', 'fire'];
    let colorModeIndex = 0;

    // Key handling
    document.addEventListener('keydown', (e) => {
        switch (e.code) {
            case 'ArrowUp':
                e.preventDefault();
                if (!state.isPaused) {
                    state.timeSpeed = Math.min(3.0, state.timeSpeed + 0.25);
                }
                break;
            case 'ArrowDown':
                e.preventDefault();
                if (!state.isPaused) {
                    state.timeSpeed = Math.max(-2.0, state.timeSpeed - 0.25);
                }
                break;
            case 'Space':
                e.preventDefault();
                if (state.isPaused) {
                    state.isPaused = false;
                    state.timeSpeed = state.prePauseSpeed;
                } else {
                    state.prePauseSpeed = state.timeSpeed;
                    state.isPaused = true;
                    state.timeSpeed = 0;
                }
                break;
            case 'KeyR':
                state.elapsedTime = 0;
                state.timeSpeed = 1.0;
                state.isPaused = false;
                state.prePauseSpeed = 1.0;
                break;
            case 'KeyS':
                state.snapshotCount++;
                break;
            case 'Digit4':
            case 'Numpad4':
                state.symmetryFold = 4;
                buildKaleidoscope();
                break;
            case 'Digit6':
            case 'Numpad6':
                state.symmetryFold = 6;
                buildKaleidoscope();
                break;
            case 'Digit8':
            case 'Numpad8':
                state.symmetryFold = 8;
                buildKaleidoscope();
                break;
            case 'KeyC':
                colorModeIndex = (colorModeIndex + 1) % colorModes.length;
                state.colorMode = colorModes[colorModeIndex];
                break;
        }
    });

    // Window resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation
    let lastTimestamp = 0;

    function animate(timestamp) {
        requestAnimationFrame(animate);

        const deltaMs = timestamp - lastTimestamp;
        lastTimestamp = timestamp;
        const delta = Math.min(deltaMs / 1000, 0.1); // cap delta

        // Update elapsed time
        if (!state.isPaused) {
            state.elapsedTime += delta * state.timeSpeed;
        }

        const time = state.elapsedTime;

        // Update shapes
        let positionsValid = true;

        baseShapes.forEach((baseInfo, shapeIndex) => {
            const config = baseInfo.config;
            const x = config.radius * Math.cos(time * config.speedFactor + config.offset);
            const y = config.radius * Math.sin(time * config.speedFactor + config.offset);

            // Check for NaN
            if (isNaN(x) || isNaN(y)) {
                positionsValid = false;
            }

            baseInfo.meshes.forEach((entry, foldIndex) => {
                const mesh = entry.mesh;
                mesh.position.set(x, y, 0);

                // Self rotation
                mesh.rotation.x = time * (0.5 + shapeIndex * 0.2);
                mesh.rotation.y = time * (0.3 + shapeIndex * 0.15);
                mesh.rotation.z = time * (0.2 + shapeIndex * 0.1);
            });

            // Update colors
            baseInfo.materials.forEach((material, i) => {
                const color = getColor(shapeIndex + i * 0.3, time, state.colorMode);
                const emissive = getEmissiveColor(shapeIndex + i * 0.3, time, state.colorMode);
                material.color.copy(color);
                material.emissive.copy(emissive);
            });
        });

        state.shapesPositionsValid = positionsValid;

        // Rotate entire kaleidoscope slowly
        kaleidoscopeGroup.rotation.z = time * 0.05;

        // Update state
        state.shapeCount = baseShapes.reduce((sum, b) => sum + b.meshes.length, 0);

        updateHUD();

        renderer.render(scene, camera);
    }

    requestAnimationFrame((ts) => {
        lastTimestamp = ts;
        animate(ts);
    });
})();
</script>
</body>
</html>
