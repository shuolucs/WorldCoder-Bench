<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Kaleidoscope Time Control</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.45);
      color: white;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      min-width: 180px;
      backdrop-filter: blur(4px);
    }

    #instructions {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      font-size: 13px;
      text-align: center;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    .paused {
      color: #ff8080;
      font-weight: bold;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="hud-panel">
    <div id="hud-speed">Speed: 1.00x</div>
    <div id="hud-time">Time: 0.00s</div>
    <div id="hud-symmetry">Symmetry: 6-fold</div>
    <div id="hud-color-mode">Mode: rainbow</div>
    <div id="hud-pause"></div>
    <div id="hud-snapshots">Snapshots: 0</div>
  </div>

  <div id="instructions">
    ↑/↓ Speed | Space Pause | R Reset | S Snapshot | 4/6/8 Symmetry | C Color Mode
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { EffectComposer } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js";
    import { RenderPass } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a1a");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.0);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.15,
      0.6,
      0.2
    );
    composer.addPass(bloomPass);

    const kaleidoscopeGroup = new THREE.Group();
    scene.add(kaleidoscopeGroup);

    const radii = [1.5, 2.5, 3.5, 4.5, 5.5];
    const baseShapeData = [];
    const snapshots = [];

    let elapsedTime = 0;
    let timeSpeed = 1.0;
    let prePauseSpeed = 1.0;
    let isPaused = false;
    let symmetryFold = 6;
    let colorMode = "rainbow";
    let snapshotCount = 0;

    const colorModes = ["rainbow", "monochrome", "fire"];

    const hud = {
      speed: document.getElementById("hud-speed"),
      time: document.getElementById("hud-time"),
      symmetry: document.getElementById("hud-symmetry"),
      colorMode: document.getElementById("hud-color-mode"),
      pause: document.getElementById("hud-pause"),
      snapshots: document.getElementById("hud-snapshots"),
    };

    function createGeometryByIndex(i) {
      const type = i % 3;
      if (type === 0) return new THREE.TorusKnotGeometry(0.32, 0.1, 96, 12);
      if (type === 1) return new THREE.IcosahedronGeometry(0.42, 0);
      return new THREE.OctahedronGeometry(0.45, 0);
    }

    function createMaterial() {
      return new THREE.MeshStandardMaterial({
        color: new THREE.Color(1, 1, 1),
        emissive: new THREE.Color(0.2, 0.2, 0.2),
        emissiveIntensity: 1.8,
        metalness: 0.25,
        roughness: 0.35
      });
    }

    function getAnimatedColor(index, time) {
      const c = new THREE.Color();
      if (colorMode === "rainbow") {
        const hue = (time * 0.08 + index * 0.12) % 1;
        c.setHSL(hue, 0.95, 0.55);
      } else if (colorMode === "monochrome") {
        const t = 0.35 + 0.25 * Math.sin(time * 1.2 + index * 1.7);
        c.setRGB(0.15 + t * 0.2, 0.35 + t * 0.35, 0.8 + t * 0.2);
      } else {
        const palette = [
          new THREE.Color("#ff3300"),
          new THREE.Color("#ff7700"),
          new THREE.Color("#ffcc33"),
        ];
        const a = palette[index % palette.length];
        const b = palette[(index + 1) % palette.length];
        c.copy(a).lerp(b, 0.5 + 0.5 * Math.sin(time * 1.8 + index));
      }
      return c;
    }

    function clearKaleidoscope() {
      while (kaleidoscopeGroup.children.length > 0) {
        const child = kaleidoscopeGroup.children.pop();
        if (child.parent) child.parent.remove(child);
      }
      baseShapeData.length = 0;
    }

    function buildKaleidoscope() {
      clearKaleidoscope();

      for (let i = 0; i < 5; i++) {
        const geometry = createGeometryByIndex(i);
        const speedFactor = 0.5 + i * 0.28;
        const offset = i * 0.9;
        const selfRot = {
          x: 0.6 + i * 0.17,
          y: 0.7 + i * 0.21,
          z: 0.45 + i * 0.13
        };

        const clones = [];

        for (let fold = 0; fold < symmetryFold; fold++) {
          const material = createMaterial();
          const mesh = new THREE.Mesh(geometry, material);
          mesh.rotation.z = (Math.PI * 2 / symmetryFold) * fold;
          kaleidoscopeGroup.add(mesh);
          clones.push(mesh);
        }

        baseShapeData.push({
          radius: radii[i],
          speedFactor,
          offset,
          selfRot,
          clones,
        });
      }
    }

    function updateShapes(time) {
      const angleStep = (Math.PI * 2) / symmetryFold;

      for (let i = 0; i < baseShapeData.length; i++) {
        const data = baseShapeData[i];
        const orbitAngle = time * data.speedFactor + data.offset;
        const localX = data.radius * Math.cos(orbitAngle);
        const localY = data.radius * Math.sin(orbitAngle);
        const color = getAnimatedColor(i, time);

        for (let fold = 0; fold < data.clones.length; fold++) {
          const mesh = data.clones[fold];
          const a = fold * angleStep;
          const x = localX * Math.cos(a) - localY * Math.sin(a);
          const y = localX * Math.sin(a) + localY * Math.cos(a);

          mesh.position.set(x, y, 0);
          mesh.rotation.x = time * data.selfRot.x + fold * 0.12;
          mesh.rotation.y = time * data.selfRot.y + i * 0.2;
          mesh.rotation.z = time * data.selfRot.z + a;

          mesh.material.color.copy(color);
          mesh.material.emissive.copy(color).multiplyScalar(0.7);
        }
      }

      kaleidoscopeGroup.rotation.z = time * 0.12;
    }

    function applySnapshot() {
      const snapshot = [];

      for (let i = 0; i < baseShapeData.length; i++) {
        const data = baseShapeData[i];
        for (let j = 0; j < data.clones.length; j++) {
          const mesh = data.clones[j];
          snapshot.push({
            position: mesh.position.clone(),
            rotation: mesh.rotation.clone(),
            color: mesh.material.color.clone(),
            emissive: mesh.material.emissive.clone()
          });
        }
      }

      snapshots.push(snapshot);
      snapshotCount = snapshots.length;
    }

    function resetState() {
      elapsedTime = 0;
      timeSpeed = 1.0;
      prePauseSpeed = 1.0;
      isPaused = false;
    }

    function cycleColorMode() {
      const idx = colorModes.indexOf(colorMode);
      colorMode = colorModes[(idx + 1) % colorModes.length];
    }

    function setSymmetry(fold) {
      symmetryFold = fold;
      buildKaleidoscope();
      updateShapes(elapsedTime);
    }

    function updateHUD() {
      hud.speed.textContent = `Speed: ${timeSpeed.toFixed(2)}x`;
      hud.time.textContent = `Time: ${elapsedTime.toFixed(2)}s`;
      hud.symmetry.textContent = `Symmetry: ${symmetryFold}-fold`;
      hud.colorMode.textContent = `Mode: ${colorMode}`;
      hud.pause.textContent = isPaused ? "PAUSED" : "";
      hud.pause.className = isPaused ? "paused" : "";
      hud.snapshots.textContent = `Snapshots: ${snapshotCount}`;
    }

    function validateShapePositions() {
      for (const data of baseShapeData) {
        for (const mesh of data.clones) {
          const p = mesh.position;
          if (!Number.isFinite(p.x) || !Number.isFinite(p.y) || !Number.isFinite(p.z)) {
            return false;
          }
        }
      }
      return true;
    }

    function updateGlobalState() {
      window.__3D_STATE__ = {
        timeSpeed,
        elapsedTime,
        isPaused,
        symmetryFold,
        colorMode,
        snapshotCount,
        shapeCount: 5 * symmetryFold,
        shapesPositionsValid: validateShapePositions(),
        prePauseSpeed
      };
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "ArrowUp") {
        if (isPaused) {
          isPaused = false;
          timeSpeed = prePauseSpeed;
        }
        timeSpeed = Math.min(3.0, timeSpeed + 0.25);
        prePauseSpeed = timeSpeed;
      }

      if (e.code === "ArrowDown") {
        if (isPaused) {
          isPaused = false;
          timeSpeed = prePauseSpeed;
        }
        timeSpeed = Math.max(-2.0, timeSpeed - 0.25);
        prePauseSpeed = timeSpeed;
      }

      if (e.code === "Space") {
        e.preventDefault();
        if (!isPaused) {
          prePauseSpeed = timeSpeed;
          timeSpeed = 0;
          isPaused = true;
        } else {
          isPaused = false;
          timeSpeed = prePauseSpeed;
        }
      }

      if (e.code === "KeyR") {
        resetState();
      }

      if (e.code === "KeyS") {
        applySnapshot();
      }

      if (e.code === "Digit4") setSymmetry(4);
      if (e.code === "Digit6") setSymmetry(6);
      if (e.code === "Digit8") setSymmetry(8);

      if (e.code === "KeyC") {
        cycleColorMode();
      }

      updateHUD();
      updateGlobalState();
    });

    const clock = new THREE.Clock();

    buildKaleidoscope();
    updateShapes(elapsedTime);
    updateHUD();
    updateGlobalState();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      elapsedTime += delta * timeSpeed;

      updateShapes(elapsedTime);
      updateHUD();
      updateGlobalState();

      composer.render();
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
