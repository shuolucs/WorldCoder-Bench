<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioluminescent Ocean</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #000511;
  }
  canvas { display: block; }
  #toggleGlow {
    position: absolute;
    top: 20px;
    left: 20px;
    background: #003355;
    color: #00ffcc;
    border: 1px solid #00ffcc;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 14px;
    z-index: 10;
  }
  #toggleGlow:hover {
    background: #004466;
  }
  #info {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: #00ffcc;
    font-family: monospace;
    font-size: 12px;
    opacity: 0.7;
    z-index: 10;
  }
</style>
</head>
<body>

<button id="toggleGlow">Toggle Glow</button>
<div id="info">Press C: cycle colors | Press W: toggle wave intensity</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.174.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.174.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
  sceneReady: false,
  flamingoLoaded: false,
  flamingoY: 8,
  flamingoRotationY: 0,
  particleCount: 500,
  glowVisible: true,
  colorIndex: 0,
  currentColor: '#00ffcc',
  waveMode: 'calm',
  cameraZ: 40,
  frameCount: 0
};
window.__3D_STATE__ = state;

const colors = ['#00ffcc', '#ff00ff', '#ffff00'];
let waveAmplitude = 0.5;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000511);
scene.fog = new THREE.FogExp2(0x000511, 0.008);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 15, 40);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0x001133, 0.3);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0x003366, 0.4);
directionalLight.position.set(0, 20, 0);
directionalLight.target.position.set(0, 0, 0);
scene.add(directionalLight);
scene.add(directionalLight.target);

// Ocean surface
const oceanGeometry = new THREE.PlaneGeometry(200, 200, 100, 100);
const oceanMaterial = new THREE.MeshStandardMaterial({
  color: 0x001030,
  transparent: true,
  opacity: 0.7,
  metalness: 0.3,
  roughness: 0.6,
  side: THREE.DoubleSide
});
const ocean = new THREE.Mesh(oceanGeometry, oceanMaterial);
ocean.rotation.x = -Math.PI / 2;
ocean.position.y = 0;
scene.add(ocean);

// Bioluminescence particles
const particleCount = 500;
const particleGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const velocities = new Float32Array(particleCount * 3);
const offsets = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 160;     // x: -80 to 80
  positions[i * 3 + 1] = Math.random() * 4 - 2;        // y: -2 to 2
  positions[i * 3 + 2] = (Math.random() - 0.5) * 160;  // z: -80 to 80
  velocities[i * 3] = (Math.random() - 0.5) * 0.02;
  velocities[i * 3 + 1] = Math.random() * 0.01 + 0.005;
  velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.02;
  offsets[i] = Math.random() * Math.PI * 2;
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const particleMaterial = new THREE.PointsMaterial({
  size: 0.3,
  color: new THREE.Color(0x00ffcc),
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// Flamingo
let flamingo = null;
let mixer = null;
const clock = new THREE.Clock();

const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Flamingo.glb',
  (gltf) => {
    flamingo = gltf.scene;
    flamingo.position.set(0, 8, 0);
    flamingo.scale.set(0.05, 0.05, 0.05);

    flamingo.traverse((child) => {
      if (child.isMesh) {
        child.material = child.material.clone();
        child.material.emissive = new THREE.Color(0xff6688);
        child.material.emissiveIntensity = 0.5;
      }
    });

    scene.add(flamingo);

    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(flamingo);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play();
    }

    state.flamingoLoaded = true;
    state.sceneReady = true;
  },
  undefined,
  (error) => {
    console.error('Error loading flamingo:', error);
    // Still mark scene as ready even if model fails
    state.sceneReady = true;
  }
);

// Additional atmospheric elements - underwater caustic light effect
const causticLight = new THREE.PointLight(0x00ffcc, 0.5, 50);
causticLight.position.set(0, -3, 0);
scene.add(causticLight);

// Toggle Glow button
document.getElementById('toggleGlow').addEventListener('click', () => {
  state.glowVisible = !state.glowVisible;
  particles.visible = state.glowVisible;
});

// Key events
document.addEventListener('keydown', (e) => {
  if (e.key === 'c' || e.key === 'C') {
    state.colorIndex = (state.colorIndex + 1) % 3;
    state.currentColor = colors[state.colorIndex];
    particleMaterial.color.set(state.currentColor);
    causticLight.color.set(state.currentColor);
  }
  if (e.key === 'w' || e.key === 'W') {
    if (state.waveMode === 'calm') {
      state.waveMode = 'intense';
      waveAmplitude = 2.0;
    } else {
      state.waveMode = 'calm';
      waveAmplitude = 0.5;
    }
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const time = clock.getElapsedTime();
  state.frameCount++;

  // Update particles
  const pos = particleGeometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    const i3 = i * 3;
    // Sine wave drift
    pos[i3] += Math.sin(time + offsets[i]) * 0.02 * waveAmplitude;
    pos[i3 + 1] += velocities[i3 + 1] * waveAmplitude * 2;
    pos[i3 + 2] += Math.cos(time * 0.7 + offsets[i]) * 0.02 * waveAmplitude;

    // Reset if above y=5
    if (pos[i3 + 1] > 5) {
      pos[i3] = (Math.random() - 0.5) * 160;
      pos[i3 + 1] = -2;
      pos[i3 + 2] = (Math.random() - 0.5) * 160;
    }
  }
  particleGeometry.attributes.position.needsUpdate = true;

  // Animate ocean surface vertices
  const oceanPos = oceanGeometry.attributes.position.array;
  for (let i = 0; i < oceanPos.length; i += 3) {
    const x = oceanPos[i];
    const y = oceanPos[i + 1];
    oceanPos[i + 2] = Math.sin(x * 0.05 + time * 0.5) * waveAmplitude * 0.3 +
                       Math.cos(y * 0.05 + time * 0.3) * waveAmplitude * 0.2;
  }
  oceanGeometry.attributes.position.needsUpdate = true;
  oceanGeometry.computeVertexNormals();

  // Flamingo rotation and animation
  if (flamingo) {
    flamingo.rotation.y += 0.005;
    state.flamingoRotationY = flamingo.rotation.y;
    state.flamingoY = flamingo.position.y;
  }

  if (mixer) {
    mixer.update(delta);
  }

  // Caustic light animation
  causticLight.intensity = 0.3 + Math.sin(time * 2) * 0.2;
  causticLight.position.x = Math.sin(time * 0.5) * 10;
  causticLight.position.z = Math.cos(time * 0.5) * 10;

  // Update state
  state.cameraZ = camera.position.z;

  // Update controls
  controls.update();

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
