<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bioluminescent Ocean Flamingo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000511;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #toggleGlow {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #003355;
      color: #00ffcc;
      border: 1px solid #00ffcc;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
      z-index: 10;
    }

    #toggleGlow:hover {
      filter: brightness(1.15);
    }
  </style>
</head>
<body>
  <button id="toggleGlow">Toggle Glow</button>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.174.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.174.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.174.0/examples/jsm/loaders/GLTFLoader.js';

    const state = {
      sceneReady: false,
      flamingoLoaded: false,
      flamingoY: 0,
      flamingoRotationY: 0,
      particleCount: 500,
      glowVisible: true,
      colorIndex: 0,
      currentColor: '#00ffcc',
      waveMode: 'calm',
      cameraZ: 40,
      frameCount: 0,
      particleSystemExists: false
    };

    window.__3D_STATE__ = state;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#000511');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 15, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight('#001133', 0.3);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight('#003366', 0.4);
    directionalLight.position.set(0, 20, 0);
    directionalLight.target.position.set(0, 0, 0);
    scene.add(directionalLight);
    scene.add(directionalLight.target);

    const oceanGeometry = new THREE.PlaneGeometry(200, 200);
    const oceanMaterial = new THREE.MeshStandardMaterial({
      color: '#001030',
      transparent: true,
      opacity: 0.7,
      metalness: 0.2,
      roughness: 0.7,
      side: THREE.DoubleSide
    });
    const ocean = new THREE.Mesh(oceanGeometry, oceanMaterial);
    ocean.rotation.x = -Math.PI / 2;
    ocean.position.y = 0;
    scene.add(ocean);

    const particleCount = 500;
    const particleGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleBaseX = new Float32Array(particleCount);
    const particleBaseZ = new Float32Array(particleCount);
    const particleOffsets = new Float32Array(particleCount);
    const particleSpeeds = new Float32Array(particleCount);

    for (let i = 0; i < particleCount; i++) {
      const x = THREE.MathUtils.randFloat(-80, 80);
      const y = THREE.MathUtils.randFloat(-2, 2);
      const z = THREE.MathUtils.randFloat(-80, 80);

      particlePositions[i * 3] = x;
      particlePositions[i * 3 + 1] = y;
      particlePositions[i * 3 + 2] = z;

      particleBaseX[i] = x;
      particleBaseZ[i] = z;
      particleOffsets[i] = Math.random() * Math.PI * 2;
      particleSpeeds[i] = THREE.MathUtils.randFloat(0.003, 0.015);
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

    const particleMaterial = new THREE.PointsMaterial({
      color: '#00ffcc',
      size: 0.3,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);
    state.particleSystemExists = true;

    const colorCycle = ['#00ffcc', '#ff00ff', '#ffff00'];

    const toggleButton = document.getElementById('toggleGlow');
    toggleButton.addEventListener('click', () => {
      state.glowVisible = !state.glowVisible;
      particles.visible = state.glowVisible;
    });

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();

      if (key === 'c') {
        state.colorIndex = (state.colorIndex + 1) % colorCycle.length;
        state.currentColor = colorCycle[state.colorIndex];
        particleMaterial.color.set(state.currentColor);
      }

      if (key === 'w') {
        state.waveMode = state.waveMode === 'calm' ? 'intense' : 'calm';
      }
    });

    const loader = new GLTFLoader();
    const clock = new THREE.Clock();

    let flamingo = null;
    let mixer = null;

    loader.load(
      'flamingo.glb',
      (gltf) => {
        flamingo = gltf.scene;
        flamingo.position.set(0, 8, 0);
        flamingo.scale.set(0.05, 0.05, 0.05);

        flamingo.traverse((child) => {
          if (child.isMesh && child.material) {
            const materials = Array.isArray(child.material) ? child.material : [child.material];
            materials.forEach((mat) => {
              if ('emissive' in mat) {
                mat.emissive = new THREE.Color('#ff6688');
                mat.emissiveIntensity = 0.5;
              }
            });
          }
        });

        scene.add(flamingo);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(flamingo);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
        }

        state.flamingoLoaded = true;
        state.sceneReady = true;
      },
      undefined,
      (error) => {
        console.error('Error loading flamingo.glb:', error);
        state.sceneReady = true;
      }
    );

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();
      const amplitude = state.waveMode === 'calm' ? 0.5 : 2.0;

      const positions = particleGeometry.attributes.position.array;

      for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;

        positions[idx + 1] += particleSpeeds[i];

        positions[idx] = particleBaseX[i] + Math.sin(elapsed + particleOffsets[i]) * amplitude;
        positions[idx + 2] = particleBaseZ[i] + Math.cos(elapsed * 0.8 + particleOffsets[i]) * amplitude;

        if (positions[idx + 1] > 5) {
          positions[idx + 1] = -2;
          particleBaseX[i] = THREE.MathUtils.randFloat(-80, 80);
          particleBaseZ[i] = THREE.MathUtils.randFloat(-80, 80);
          positions[idx] = particleBaseX[i];
          positions[idx + 2] = particleBaseZ[i];
        }
      }

      particleGeometry.attributes.position.needsUpdate = true;

      if (flamingo) {
        flamingo.rotation.y += 0.005;
        state.flamingoY = flamingo.getWorldPosition(new THREE.Vector3()).y;
        state.flamingoRotationY = flamingo.rotation.y;
      }

      if (mixer) {
        mixer.update(delta);
      }

      controls.update();

      state.cameraZ = camera.position.z;
      state.frameCount += 1;
      state.particleCount = particleCount;
      state.currentColor = colorCycle[state.colorIndex];

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      state.cameraZ = camera.position.z;
    });
  </script>
</body>
</html>
