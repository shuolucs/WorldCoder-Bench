<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioluminescent Ocean</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000511;
            font-family: sans-serif;
        }
        #toggleGlow {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #003355;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            z-index: 10;
            transition: all 0.3s ease;
        }
        #toggleGlow:hover {
            background: #004477;
            box-shadow: 0 0 10px #00ffcc;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.174.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.174.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <button id="toggleGlow">Toggle Glow</button>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Initialize State
        window.__3D_STATE__ = {
            sceneReady: false,
            flamingoLoaded: false,
            flamingoY: 8,
            flamingoRotationY: 0,
            particleCount: 500,
            glowVisible: true,
            colorIndex: 0,
            currentColor: '#00ffcc',
            waveMode: 'calm',
            cameraZ: 40,
            frameCount: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000511);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x001133, 0.3);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0x003366, 0.4);
        directionalLight.position.set(0, 10, 0);
        directionalLight.target.position.set(0, 0, 0);
        scene.add(directionalLight);
        scene.add(directionalLight.target);

        // Ocean Plane
        const oceanGeometry = new THREE.PlaneGeometry(200, 200);
        const oceanMaterial = new THREE.MeshStandardMaterial({
            color: 0x001030,
            transparent: true,
            opacity: 0.7,
            roughness: 0.3,
            metalness: 0.8
        });
        const ocean = new THREE.Mesh(oceanGeometry, oceanMaterial);
        ocean.rotation.x = -Math.PI / 2;
        scene.add(ocean);

        // Bioluminescence Particles
        const particleCount = window.__3D_STATE__.particleCount;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const basePositions = new Float32Array(particleCount * 3);
        const phases = new Float32Array(particleCount);

        for (let i = 0; i < particleCount; i++) {
            const x = (Math.random() - 0.5) * 160;
            const y = (Math.random() * 7) - 2; // -2 to 5
            const z = (Math.random() - 0.5) * 160;
            
            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;
            
            basePositions[i * 3] = x;
            basePositions[i * 3 + 1] = y;
            basePositions[i * 3 + 2] = z;
            
            phases[i] = Math.random() * Math.PI * 2;
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.3,
            color: 0x00ffcc,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        // Flamingo Model
        let flamingo;
        let mixer;
        const loader = new GLTFLoader();
        
        loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/models/gltf/Flamingo.glb', (gltf) => {
            flamingo = gltf.scene;
            flamingo.position.set(0, 8, 0);
            flamingo.scale.set(0.05, 0.05, 0.05);

            flamingo.traverse((child) => {
                if (child.isMesh) {
                    child.material.emissive = new THREE.Color(0xff6688);
                    child.material.emissiveIntensity = 0.5;
                }
            });

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(flamingo);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
            }

            scene.add(flamingo);
            window.__3D_STATE__.flamingoLoaded = true;
            window.__3D_STATE__.sceneReady = true;
        });

        // Interactions
        const colors = [0x00ffcc, 0xff00ff, 0xffff00];
        const colorStrings = ['#00ffcc', '#ff00ff', '#ffff00'];

        document.getElementById('toggleGlow').addEventListener('click', () => {
            particles.visible = !particles.visible;
            window.__3D_STATE__.glowVisible = particles.visible;
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === 'c') {
                let newIndex = (window.__3D_STATE__.colorIndex + 1) % 3;
                window.__3D_STATE__.colorIndex = newIndex;
                window.__3D_STATE__.currentColor = colorStrings[newIndex];
                particleMaterial.color.setHex(colors[newIndex]);
            } else if (key === 'w') {
                window.__3D_STATE__.waveMode = window.__3D_STATE__.waveMode === 'calm' ? 'intense' : 'calm';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Update Flamingo
            if (mixer) {
                mixer.update(delta);
            }
            if (flamingo) {
                flamingo.rotation.y += 0.005;
                window.__3D_STATE__.flamingoRotationY = flamingo.rotation.y;
                window.__3D_STATE__.flamingoY = flamingo.position.y;
            }

            // Update Particles
            if (particles.visible) {
                const posAttribute = particles.geometry.attributes.position;
                const posArray = posAttribute.array;
                const amplitude = window.__3D_STATE__.waveMode === 'calm' ? 0.5 : 2.0;

                for (let i = 0; i < particleCount; i++) {
                    // Upward drift
                    posArray[i * 3 + 1] += 0.015;
                    if (posArray[i * 3 + 1] > 5) {
                        posArray[i * 3 + 1] = -2;
                    }

                    // Sideways sine wave
                    posArray[i * 3] = basePositions[i * 3] + Math.sin(time + phases[i]) * amplitude;
                    posArray[i * 3 + 2] = basePositions[i * 3 + 2] + Math.cos(time + phases[i]) * amplitude;
                }
                posAttribute.needsUpdate = true;
            }

            controls.update();

            // Update State
            window.__3D_STATE__.cameraZ = camera.position.z;
            window.__3D_STATE__.frameCount++;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
