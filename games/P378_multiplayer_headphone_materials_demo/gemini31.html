<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer Headphone Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .panel {
            pointer-events: auto;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 15px;
        }
        #player-count {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }
        .dot {
            width: 10px;
            height: 10px;
            background-color: #44ff44;
            border-radius: 50%;
            box-shadow: 0 0 8px #44ff44;
        }
        #top-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        button.active {
            background: rgba(100, 150, 255, 0.4);
            border-color: rgba(100, 150, 255, 0.8);
        }
        #material-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #material-selector {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            padding: 15px 25px;
        }
        .swatch-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.2s, border-color 0.2s;
        }
        .swatch-container:hover .swatch {
            transform: scale(1.1);
            border-color: white;
        }
        .swatch-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="player-count" class="panel">
            <div class="dot"></div>
            <span>Players Online: 3</span>
        </div>

        <div id="material-label" class="panel">Current: Matte Black</div>

        <div id="top-controls">
            <button id="btn-rotate" class="active">Rotate (R)</button>
            <button id="btn-wireframe">Wireframe (W)</button>
        </div>

        <div id="material-selector" class="panel">
            <div class="swatch-container" id="btn-matte-black">
                <div class="swatch" style="background-color: #1a1a1a;"></div>
                <span class="swatch-label">Matte Black</span>
            </div>
            <div class="swatch-container" id="btn-brushed-silver">
                <div class="swatch" style="background-color: #c0c0c0;"></div>
                <span class="swatch-label">Silver</span>
            </div>
            <div class="swatch-container" id="btn-rose-gold">
                <div class="swatch" style="background-color: #b76e79;"></div>
                <span class="swatch-label">Rose Gold</span>
            </div>
            <div class="swatch-container" id="btn-ocean-blue">
                <div class="swatch" style="background-color: #1e3a5f;"></div>
                <span class="swatch-label">Ocean Blue</span>
            </div>
        </div>

        <div id="loading">Loading Environment...</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            currentMaterial: 'matte_black',
            autoRotate: true,
            wireframeMode: false,
            playerCount: 3,
            headphoneScale: 1.0,
            materialChangeCount: 0,
            playerPositions: [],
            cameraDistance: 5,
            backdropVisible: false,
            headphoneGroupExists: true,
            currentMaterialColor: '#1a1a1a'
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // Background handled by CSS + alpha renderer
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0.5, 0);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const warmLight = new THREE.DirectionalLight(0xffeedd, 0.8);
        warmLight.position.set(5, 5, 5);
        warmLight.castShadow = true;
        warmLight.shadow.mapSize.width = 1024;
        warmLight.shadow.mapSize.height = 1024;
        scene.add(warmLight);

        const coolLight = new THREE.DirectionalLight(0xaaccff, 0.5);
        coolLight.position.set(-3, 3, -3);
        scene.add(coolLight);

        // --- GROUND ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            roughness: 0.2, 
            metalness: 0.8 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -1;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- MODEL LOADING (BACKDROP) ---
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/LittlestTokyo.glb', (gltf) => {
            const model = gltf.scene;
            model.position.set(0, -1, -3);
            model.scale.set(0.005, 0.005, 0.005);
            
            // Dim the backdrop slightly
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    if(child.material) {
                        child.material.color.multiplyScalar(0.5);
                    }
                }
            });
            
            scene.add(model);
            document.getElementById('loading').style.opacity = '0';
            
            window.__3D_STATE__.modelLoaded = true;
            window.__3D_STATE__.backdropVisible = true;
        });

        // --- MATERIALS ---
        const materialPresets = {
            matte_black: { mat: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0.1 }), name: 'Matte Black', hex: '#1a1a1a' },
            brushed_silver: { mat: new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.3, metalness: 0.9 }), name: 'Brushed Silver', hex: '#c0c0c0' },
            rose_gold: { mat: new THREE.MeshStandardMaterial({ color: 0xb76e79, roughness: 0.4, metalness: 0.8 }), name: 'Rose Gold', hex: '#b76e79' },
            ocean_blue: { mat: new THREE.MeshStandardMaterial({ color: 0x1e3a5f, roughness: 0.5, metalness: 0.6 }), name: 'Ocean Blue', hex: '#1e3a5f' }
        };
        const cushionMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 1.0, metalness: 0.0 });

        // --- PROCEDURAL HEADPHONE ---
        const headphoneGroup = new THREE.Group();
        headphoneGroup.name = 'headphoneGroup';
        scene.add(headphoneGroup);

        const bodyMeshes = [];

        // Ear Cups
        const cupGeo = new THREE.TorusGeometry(0.35, 0.15, 16, 32);
        const leftCup = new THREE.Mesh(cupGeo, materialPresets.matte_black.mat);
        leftCup.position.set(-0.7, 0.5, 0);
        leftCup.rotation.y = Math.PI / 2;
        leftCup.castShadow = true;
        
        const rightCup = new THREE.Mesh(cupGeo, materialPresets.matte_black.mat);
        rightCup.position.set(0.7, 0.5, 0);
        rightCup.rotation.y = Math.PI / 2;
        rightCup.castShadow = true;

        bodyMeshes.push(leftCup, rightCup);
        headphoneGroup.add(leftCup, rightCup);

        // Cushions
        const cushionGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.08, 32);
        const leftCushion = new THREE.Mesh(cushionGeo, cushionMat);
        leftCushion.position.set(-0.58, 0.5, 0);
        leftCushion.rotation.z = Math.PI / 2;
        
        const rightCushion = new THREE.Mesh(cushionGeo, cushionMat);
        rightCushion.position.set(0.58, 0.5, 0);
        rightCushion.rotation.z = Math.PI / 2;

        headphoneGroup.add(leftCushion, rightCushion);

        // Headband Curve
        class HeadbandCurve extends THREE.Curve {
            constructor() { super(); }
            getPoint(t, optionalTarget = new THREE.Vector3()) {
                const x = -0.7 + t * 1.4;
                const y = -1.428 * (x * x) + 1.2;
                const z = 0;
                return optionalTarget.set(x, y, z);
            }
        }
        const headbandGeo = new THREE.TubeGeometry(new HeadbandCurve(), 32, 0.08, 12, false);
        const headband = new THREE.Mesh(headbandGeo, materialPresets.matte_black.mat);
        headband.castShadow = true;
        bodyMeshes.push(headband);
        headphoneGroup.add(headband);

        // --- MULTIPLAYER SIMULATION ---
        const players = [];
        const playerConfigs = [
            { id: 'P1', color: 0xff4444, start: [1.5, 1, 1], speed: 0.5, radius: 1.8, yOffset: 1, yAmp: 0.2 },
            { id: 'P2', color: 0x44ff44, start: [-1.5, 0.5, 1.5], speed: 0.7, radius: 2.2, yOffset: 0.5, yAmp: 0.3 },
            { id: 'P3', color: 0x4444ff, start: [0, 1.5, -1], speed: 0.3, radius: 1.5, yOffset: 1.5, yAmp: 0.1 }
        ];

        function createTextSprite(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'black';
            ctx.shadowBlur = 4;
            ctx.fillText(text, 64, 48);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(0.4, 0.2, 1);
            sprite.position.y = 0.15;
            return sprite;
        }

        playerConfigs.forEach((cfg, index) => {
            const group = new THREE.Group();
            
            const sphereGeo = new THREE.SphereGeometry(0.05, 16, 16);
            const sphereMat = new THREE.MeshBasicMaterial({ color: cfg.color });
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            
            const glowMat = new THREE.MeshBasicMaterial({ color: cfg.color, transparent: true, opacity: 0.3, depthWrite: false });
            const glow = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), glowMat);
            
            const sprite = createTextSprite(cfg.id);
            
            group.add(sphere, glow, sprite);
            group.position.set(...cfg.start);
            scene.add(group);
            
            players.push({ group, cfg, angle: index * (Math.PI * 2 / 3) });
        });

        // --- ANIMATION EFFECTS ---
        const rings = [];
        function spawnSelectionRing(position, colorHex) {
            const geo = new THREE.RingGeometry(0.1, 0.15, 32);
            const mat = new THREE.MeshBasicMaterial({ 
                color: new THREE.Color(colorHex), 
                transparent: true, 
                opacity: 1, 
                side: THREE.DoubleSide,
                depthTest: false
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(position);
            scene.add(mesh);
            rings.push({ mesh, age: 0 });
        }

        let isPulsing = false;
        let pulseTime = 0;

        // --- INTERACTION LOGIC ---
        function setMaterial(matKey) {
            if (!materialPresets[matKey]) return;
            
            const preset = materialPresets[matKey];
            bodyMeshes.forEach(mesh => {
                mesh.material = preset.mat;
                mesh.material.wireframe = window.__3D_STATE__.wireframeMode;
            });
            
            document.getElementById('material-label').innerText = `Current: ${preset.name}`;
            
            // Update State
            window.__3D_STATE__.currentMaterial = matKey;
            window.__3D_STATE__.currentMaterialColor = preset.hex;
            window.__3D_STATE__.materialChangeCount++;

            // Multiplayer effect
            const randomPlayer = players[Math.floor(Math.random() * players.length)];
            spawnSelectionRing(randomPlayer.group.position, preset.hex);
        }

        // UI Listeners
        document.getElementById('btn-matte-black').addEventListener('click', () => setMaterial('matte_black'));
        document.getElementById('btn-brushed-silver').addEventListener('click', () => setMaterial('brushed_silver'));
        document.getElementById('btn-rose-gold').addEventListener('click', () => setMaterial('rose_gold'));
        document.getElementById('btn-ocean-blue').addEventListener('click', () => setMaterial('ocean_blue'));

        const btnRotate = document.getElementById('btn-rotate');
        btnRotate.addEventListener('click', () => {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            btnRotate.classList.toggle('active', window.__3D_STATE__.autoRotate);
        });

        const btnWireframe = document.getElementById('btn-wireframe');
        btnWireframe.addEventListener('click', () => {
            window.__3D_STATE__.wireframeMode = !window.__3D_STATE__.wireframeMode;
            btnWireframe.classList.toggle('active', window.__3D_STATE__.wireframeMode);
            
            const currentMat = materialPresets[window.__3D_STATE__.currentMaterial].mat;
            currentMat.wireframe = window.__3D_STATE__.wireframeMode;
            cushionMat.wireframe = window.__3D_STATE__.wireframeMode;
        });

        // Keyboard Listeners
        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case '1': setMaterial('matte_black'); break;
                case '2': setMaterial('brushed_silver'); break;
                case '3': setMaterial('rose_gold'); break;
                case '4': setMaterial('ocean_blue'); break;
                case 'r': btnRotate.click(); break;
                case 'w': btnWireframe.click(); break;
            }
        });

        // Raycaster for Headphone Click
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (e) => {
            // Ignore if clicking UI
            if(e.target.closest('.panel') || e.target.tagName === 'BUTTON') return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(headphoneGroup.children);
            
            if(intersects.length > 0) {
                isPulsing = true;
                pulseTime = 0;
            }
        });

        // Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();

            // Auto Rotate
            if (window.__3D_STATE__.autoRotate) {
                headphoneGroup.rotation.y += 0.5 * delta;
            }

            // Pulse Animation
            if (isPulsing) {
                pulseTime += delta;
                const duration = 0.3;
                if (pulseTime < duration / 2) {
                    const scale = 1.0 + (pulseTime / (duration / 2)) * 0.1;
                    headphoneGroup.scale.setScalar(scale);
                } else if (pulseTime < duration) {
                    const scale = 1.1 - ((pulseTime - duration / 2) / (duration / 2)) * 0.1;
                    headphoneGroup.scale.setScalar(scale);
                } else {
                    headphoneGroup.scale.setScalar(1.0);
                    isPulsing = false;
                }
            }

            // Player Orbits
            players.forEach(p => {
                p.angle += p.cfg.speed * delta;
                p.group.position.x = Math.cos(p.angle) * p.cfg.radius;
                p.group.position.z = Math.sin(p.angle) * p.cfg.radius;
                p.group.position.y = p.cfg.yOffset + Math.sin(time * 2 + p.angle) * p.cfg.yAmp;
            });

            // Ring Animations
            for (let i = rings.length - 1; i >= 0; i--) {
                const r = rings[i];
                r.age += delta * 2;
                r.mesh.scale.setScalar(1 + r.age * 2);
                r.mesh.material.opacity = 1 - r.age;
                r.mesh.lookAt(camera.position);
                
                if (r.age > 1) {
                    scene.remove(r.mesh);
                    r.mesh.geometry.dispose();
                    r.mesh.material.dispose();
                    rings.splice(i, 1);
                }
            }

            // Update State Object
            window.__3D_STATE__.headphoneScale = headphoneGroup.scale.x;
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));
            window.__3D_STATE__.playerPositions = players.map(p => ({
                x: p.group.position.x, 
                y: p.group.position.y, 
                z: p.group.position.z
            }));

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
