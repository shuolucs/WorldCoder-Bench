<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Multiplayer Headphone Materials Demo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      pointer-events: none;
    }

    #player-count {
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }

    .online-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #44ff88;
      box-shadow: 0 0 10px #44ff88;
      flex: 0 0 auto;
    }

    #material-label {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 18px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;
      pointer-events: auto;
    }

    #top-controls {
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .control-btn {
      background: rgba(0,0,0,0.4);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
      backdrop-filter: blur(6px);
    }

    .control-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .control-btn.active {
      border-color: rgba(68,255,136,0.7);
      box-shadow: 0 0 0 1px rgba(68,255,136,0.35) inset;
    }

    #material-panel {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 18px;
      padding: 14px 18px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }

    .swatch-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 72px;
    }

    .swatch-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.45);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      outline: none;
    }

    .swatch-btn:hover {
      transform: scale(1.08);
    }

    .swatch-btn.active {
      border-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.14);
    }

    .swatch-label {
      font-size: 11px;
      color: rgba(255,255,255,0.92);
      text-align: center;
      line-height: 1.15;
    }

    @media (max-width: 700px) {
      #material-panel {
        gap: 12px;
        padding: 12px;
      }
      .swatch-wrap {
        min-width: 64px;
      }
      .swatch-label {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="player-count" class="hud">
      <span class="online-dot"></span>
      <span>Players Online: 3</span>
    </div>

    <div id="material-label" class="hud">Current: Matte Black</div>

    <div id="top-controls" class="hud">
      <button id="btn-rotate" class="control-btn active">Rotate: ON</button>
      <button id="btn-wireframe" class="control-btn">Wireframe: OFF</button>
    </div>

    <div id="material-panel">
      <div class="swatch-wrap">
        <button id="btn-matte-black" class="swatch-btn active" style="background:#1a1a1a;" title="Matte Black"></button>
        <div class="swatch-label">Matte Black</div>
      </div>
      <div class="swatch-wrap">
        <button id="btn-brushed-silver" class="swatch-btn" style="background:#c0c0c0;" title="Brushed Silver"></button>
        <div class="swatch-label">Brushed Silver</div>
      </div>
      <div class="swatch-wrap">
        <button id="btn-rose-gold" class="swatch-btn" style="background:#b76e79;" title="Rose Gold"></button>
        <div class="swatch-label">Rose Gold</div>
      </div>
      <div class="swatch-wrap">
        <button id="btn-ocean-blue" class="swatch-btn" style="background:#1e3a5f;" title="Ocean Blue"></button>
        <div class="swatch-label">Ocean Blue</div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.5, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirWarm = new THREE.DirectionalLight(0xffeedd, 0.8);
    dirWarm.position.set(5, 5, 5);
    dirWarm.castShadow = true;
    scene.add(dirWarm);

    const dirCool = new THREE.DirectionalLight(0xaaccff, 0.5);
    dirCool.position.set(-3, 3, -3);
    scene.add(dirCool);

    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x222222,
      roughness: 0.25,
      metalness: 0.35
    });
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      groundMat
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1;
    ground.receiveShadow = true;
    scene.add(ground);

    const groundGlow = new THREE.Mesh(
      new THREE.CircleGeometry(3, 64),
      new THREE.MeshBasicMaterial({
        color: 0x334455,
        transparent: true,
        opacity: 0.12
      })
    );
    groundGlow.rotation.x = -Math.PI / 2;
    groundGlow.position.set(0, -0.995, 0);
    scene.add(groundGlow);

    const materialPresets = {
      matte_black: {
        label: "Matte Black",
        color: "#1a1a1a",
        roughness: 0.9,
        metalness: 0.1
      },
      brushed_silver: {
        label: "Brushed Silver",
        color: "#c0c0c0",
        roughness: 0.3,
        metalness: 0.9
      },
      rose_gold: {
        label: "Rose Gold",
        color: "#b76e79",
        roughness: 0.4,
        metalness: 0.8
      },
      ocean_blue: {
        label: "Ocean Blue",
        color: "#1e3a5f",
        roughness: 0.5,
        metalness: 0.6
      }
    };

    const cushionMaterial = new THREE.MeshStandardMaterial({
      color: "#2a2a2a",
      roughness: 1.0,
      metalness: 0.0
    });

    let currentMaterialKey = "matte_black";
    let autoRotate = true;
    let wireframeMode = false;
    let materialChangeCount = 0;
    let modelLoaded = false;
    let backdropVisible = false;

    const headphoneGroup = new THREE.Group();
    headphoneGroup.name = "headphoneGroup";
    scene.add(headphoneGroup);

    const bodyMeshes = [];
    const cushionMeshes = [];

    function createBodyMaterial(key) {
      const preset = materialPresets[key];
      return new THREE.MeshStandardMaterial({
        color: preset.color,
        roughness: preset.roughness,
        metalness: preset.metalness,
        wireframe: wireframeMode
      });
    }

    let activeBodyMaterial = createBodyMaterial(currentMaterialKey);

    function addBodyMesh(mesh) {
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      bodyMeshes.push(mesh);
      headphoneGroup.add(mesh);
    }

    function addCushionMesh(mesh) {
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      cushionMeshes.push(mesh);
      headphoneGroup.add(mesh);
    }

    const leftCup = new THREE.Mesh(
      new THREE.TorusGeometry(0.35, 0.15, 16, 32),
      activeBodyMaterial
    );
    leftCup.position.set(-0.7, 0.5, 0);
    leftCup.rotation.y = Math.PI / 2;
    addBodyMesh(leftCup);

    const rightCup = new THREE.Mesh(
      new THREE.TorusGeometry(0.35, 0.15, 16, 32),
      activeBodyMaterial
    );
    rightCup.position.set(0.7, 0.5, 0);
    rightCup.rotation.y = Math.PI / 2;
    addBodyMesh(rightCup);

    class HeadbandCurve extends THREE.Curve {
      getPoint(t) {
        const start = new THREE.Vector3(-0.7, 0.85, 0);
        const control = new THREE.Vector3(0, 1.75, 0);
        const end = new THREE.Vector3(0.7, 0.85, 0);
        const p = new THREE.Vector3();
        p.set(
          (1 - t) * (1 - t) * start.x + 2 * (1 - t) * t * control.x + t * t * end.x,
          (1 - t) * (1 - t) * start.y + 2 * (1 - t) * t * control.y + t * t * end.y,
          (1 - t) * (1 - t) * start.z + 2 * (1 - t) * t * control.z + t * t * end.z
        );
        return p;
      }
    }

    const headband = new THREE.Mesh(
      new THREE.TubeGeometry(new HeadbandCurve(), 48, 0.08, 12, false),
      activeBodyMaterial
    );
    addBodyMesh(headband);

    const leftPad = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.3, 0.08, 32),
      cushionMaterial
    );
    leftPad.position.set(-0.7, 0.5, 0);
    leftPad.rotation.z = Math.PI / 2;
    addCushionMesh(leftPad);

    const rightPad = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.3, 0.08, 32),
      cushionMaterial
    );
    rightPad.position.set(0.7, 0.5, 0);
    rightPad.rotation.z = Math.PI / 2;
    addCushionMesh(rightPad);

    headphoneGroup.position.set(0, 0, 0);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    let pulseAnim = null;

    function triggerHeadphonePulse() {
      pulseAnim = {
        start: performance.now(),
        duration: 300
      };
    }

    function makeLabelSprite(text, color = "#ffffff") {
      const canvas = document.createElement("canvas");
      canvas.width = 128;
      canvas.height = 64;
      const ctx = canvas.getContext("2d");

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      roundRect(ctx, 10, 10, 108, 44, 12);
      ctx.fill();

      ctx.font = "bold 28px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = color;
      ctx.fillText(text, 64, 34);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true
      });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(0.45, 0.225, 1);
      return sprite;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    const players = [
      {
        id: "P1",
        color: "#ff4444",
        start: new THREE.Vector3(1.5, 1, 1),
        radius: 1.55,
        speed: 0.45,
        yBase: 1.0,
        yAmp: 0.18,
        phase: 0.0
      },
      {
        id: "P2",
        color: "#44ff44",
        start: new THREE.Vector3(-1.5, 0.5, 1.5),
        radius: 1.9,
        speed: 0.32,
        yBase: 0.7,
        yAmp: 0.14,
        phase: 2.1
      },
      {
        id: "P3",
        color: "#4444ff",
        start: new THREE.Vector3(0, 1.5, -1),
        radius: 1.35,
        speed: 0.58,
        yBase: 1.3,
        yAmp: 0.22,
        phase: 4.0
      }
    ];

    const playerGroup = new THREE.Group();
    scene.add(playerGroup);

    players.forEach((p) => {
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.05, 16, 16),
        new THREE.MeshStandardMaterial({
          color: p.color,
          emissive: p.color,
          emissiveIntensity: 0.35,
          roughness: 0.4,
          metalness: 0.2
        })
      );
      sphere.position.copy(p.start);
      playerGroup.add(sphere);
      p.mesh = sphere;

      const label = makeLabelSprite(p.id, "#ffffff");
      label.position.set(0, 0.18, 0);
      sphere.add(label);
      p.label = label;
    });

    const selectionRings = [];
    function spawnSelectionRing(position, color) {
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.06, 0.085, 32),
        new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 0.9,
          side: THREE.DoubleSide,
          depthWrite: false
        })
      );
      ring.position.copy(position);
      ring.lookAt(camera.position);
      ring.userData = {
        start: performance.now(),
        duration: 700
      };
      scene.add(ring);
      selectionRings.push(ring);
    }

    const gltfLoader = new GLTFLoader();
    let backdropModel = null;

    gltfLoader.load(
      "LittlestTokyo.glb",
      (gltf) => {
        backdropModel = gltf.scene;

        const fitBox = new THREE.Box3().setFromObject(backdropModel);
        const fitSize = new THREE.Vector3();
        fitBox.getSize(fitSize);
        const fitMax = Math.max(fitSize.x, fitSize.y, fitSize.z) || 1;
        const fitScale = 2 / fitMax;
        backdropModel.scale.setScalar(fitScale);

        const centeredBox = new THREE.Box3().setFromObject(backdropModel);
        const centeredCenter = new THREE.Vector3();
        centeredBox.getCenter(centeredCenter);
        backdropModel.position.sub(centeredCenter);

        backdropModel.scale.setScalar(0.005);
        backdropModel.position.set(0, -1, -3);

        backdropModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        scene.add(backdropModel);
        modelLoaded = true;
        backdropVisible = true;
        updateState();
      },
      undefined,
      (err) => {
        console.warn("Failed to load LittlestTokyo.glb", err);
        modelLoaded = false;
        backdropVisible = false;
        updateState();
      }
    );

    const btnRotate = document.getElementById("btn-rotate");
    const btnWireframe = document.getElementById("btn-wireframe");
    const materialLabel = document.getElementById("material-label");

    const swatchButtons = {
      matte_black: document.getElementById("btn-matte-black"),
      brushed_silver: document.getElementById("btn-brushed-silver"),
      rose_gold: document.getElementById("btn-rose-gold"),
      ocean_blue: document.getElementById("btn-ocean-blue")
    };

    function updateMaterialButtons() {
      Object.entries(swatchButtons).forEach(([key, btn]) => {
        btn.classList.toggle("active", key === currentMaterialKey);
      });
    }

    function updateTopButtons() {
      btnRotate.textContent = `Rotate: ${autoRotate ? "ON" : "OFF"}`;
      btnRotate.classList.toggle("active", autoRotate);

      btnWireframe.textContent = `Wireframe: ${wireframeMode ? "ON" : "OFF"}`;
      btnWireframe.classList.toggle("active", wireframeMode);
    }

    function applyMaterial(key) {
      if (!materialPresets[key]) return;

      currentMaterialKey = key;
      materialChangeCount += 1;

      const nextMat = createBodyMaterial(key);

      bodyMeshes.forEach((mesh) => {
        mesh.material = nextMat;
      });

      if (activeBodyMaterial) activeBodyMaterial.dispose?.();
      activeBodyMaterial = nextMat;

      materialLabel.textContent = `Current: ${materialPresets[key].label}`;
      updateMaterialButtons();

      const chosenPlayer = players[Math.floor(Math.random() * players.length)];
      spawnSelectionRing(chosenPlayer.mesh.position.clone(), materialPresets[key].color);

      updateState();
    }

    function toggleRotate() {
      autoRotate = !autoRotate;
      updateTopButtons();
      updateState();
    }

    function toggleWireframe() {
      wireframeMode = !wireframeMode;
      bodyMeshes.forEach((mesh) => {
        if (mesh.material) mesh.material.wireframe = wireframeMode;
      });
      updateTopButtons();
      updateState();
    }

    swatchButtons.matte_black.addEventListener("click", () => applyMaterial("matte_black"));
    swatchButtons.brushed_silver.addEventListener("click", () => applyMaterial("brushed_silver"));
    swatchButtons.rose_gold.addEventListener("click", () => applyMaterial("rose_gold"));
    swatchButtons.ocean_blue.addEventListener("click", () => applyMaterial("ocean_blue"));

    btnRotate.addEventListener("click", toggleRotate);
    btnWireframe.addEventListener("click", toggleWireframe);

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "1") applyMaterial("matte_black");
      if (key === "2") applyMaterial("brushed_silver");
      if (key === "3") applyMaterial("rose_gold");
      if (key === "4") applyMaterial("ocean_blue");
      if (key === "r") toggleRotate();
      if (key === "w") toggleWireframe();
    });

    renderer.domElement.addEventListener("pointerdown", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(headphoneGroup.children, true);
      if (intersects.length > 0) {
        triggerHeadphonePulse();
      }
    });

    window.__3D_STATE__ = {};

    function updateState() {
      window.__3D_STATE__ = {
        modelLoaded,
        currentMaterial: currentMaterialKey,
        autoRotate,
        wireframeMode,
        playerCount: 3,
        headphoneScale: Number(headphoneGroup.scale.x.toFixed(3)),
        materialChangeCount,
        playerPositions: players.map((p) => ({
          x: Number(p.mesh.position.x.toFixed(3)),
          y: Number(p.mesh.position.y.toFixed(3)),
          z: Number(p.mesh.position.z.toFixed(3))
        })),
        cameraDistance: Number(camera.position.distanceTo(new THREE.Vector3(0, 0, 0)).toFixed(3)),
        backdropVisible,
        headphoneGroupExists: !!headphoneGroup,
        currentMaterialColor: materialPresets[currentMaterialKey].color
      };
    }

    updateMaterialButtons();
    updateTopButtons();
    updateState();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();

      if (autoRotate) {
        headphoneGroup.rotation.y += 0.5 * delta;
      }

      if (pulseAnim) {
        const t = (performance.now() - pulseAnim.start) / pulseAnim.duration;
        if (t >= 1) {
          headphoneGroup.scale.setScalar(1.0);
          pulseAnim = null;
        } else {
          const pulse = Math.sin(t * Math.PI) * 0.1;
          const s = 1.0 + pulse;
          headphoneGroup.scale.setScalar(s);
        }
      }

      players.forEach((p, i) => {
        const a = elapsed * p.speed + p.phase;
        const x = Math.cos(a) * p.radius;
        const z = Math.sin(a) * (p.radius * 0.75);
        const y = p.yBase + Math.sin(a * 1.7 + i) * p.yAmp;
        p.mesh.position.set(x, y, z);
      });

      for (let i = selectionRings.length - 1; i >= 0; i--) {
        const ring = selectionRings[i];
        const t = (performance.now() - ring.userData.start) / ring.userData.duration;
        if (t >= 1) {
          scene.remove(ring);
          ring.geometry.dispose();
          ring.material.dispose();
          selectionRings.splice(i, 1);
          continue;
        }
        const scale = 1 + t * 8;
        ring.scale.setScalar(scale);
        ring.material.opacity = 0.9 * (1 - t);
        ring.lookAt(camera.position);
      }

      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateState();
    });
  </script>
</body>
</html>
