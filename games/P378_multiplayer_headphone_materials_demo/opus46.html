<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Multiplayer Headphone Materials Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#material-label {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  background: rgba(0,0,0,0.6);
  padding: 8px 24px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  z-index: 100;
  letter-spacing: 0.5px;
}

#player-count {
  position: fixed;
  top: 20px;
  left: 20px;
  color: #fff;
  font-size: 14px;
  background: rgba(0,0,0,0.6);
  padding: 8px 16px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 8px;
}

#player-count .dot {
  width: 8px;
  height: 8px;
  background: #44ff44;
  border-radius: 50%;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.top-right-controls {
  position: fixed;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 10px;
  z-index: 100;
}

.toggle-btn {
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  background: rgba(0,0,0,0.6);
  padding: 8px 16px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: all 0.3s;
  user-select: none;
}

.toggle-btn:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.3);
}

.toggle-btn.active {
  background: rgba(100,180,255,0.3);
  border-color: rgba(100,180,255,0.5);
}

#material-panel {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  z-index: 100;
  background: rgba(0,0,0,0.6);
  padding: 16px 28px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}

.material-swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: transform 0.2s;
}

.material-swatch:hover {
  transform: scale(1.15);
}

.material-swatch .circle {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  transition: all 0.3s;
}

.material-swatch.active .circle {
  border: 3px solid #fff;
  box-shadow: 0 0 12px rgba(255,255,255,0.4);
}

.material-swatch .label {
  color: rgba(255,255,255,0.7);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.material-swatch.active .label {
  color: #fff;
}

#loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(26,26,46,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  color: #fff;
  font-size: 16px;
  transition: opacity 0.5s;
}

#loading-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-right: 12px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <span>Loading scene...</span>
</div>

<div id="material-label">Current: Matte Black</div>

<div id="player-count">
  <div class="dot"></div>
  Players Online: 3
</div>

<div class="top-right-controls">
  <div id="btn-rotate" class="toggle-btn active" onclick="toggleRotation()">🔄 Rotate: ON</div>
  <div id="btn-wireframe" class="toggle-btn" onclick="toggleWireframe()">🔲 Wireframe: OFF</div>
</div>

<div id="material-panel">
  <div id="btn-matte-black" class="material-swatch active" onclick="selectMaterial('matte_black')">
    <div class="circle" style="background: #1a1a1a;"></div>
    <div class="label">Matte Black</div>
  </div>
  <div id="btn-brushed-silver" class="material-swatch" onclick="selectMaterial('brushed_silver')">
    <div class="circle" style="background: #c0c0c0;"></div>
    <div class="label">Brushed Silver</div>
  </div>
  <div id="btn-rose-gold" class="material-swatch" onclick="selectMaterial('rose_gold')">
    <div class="circle" style="background: #b76e79;"></div>
    <div class="label">Rose Gold</div>
  </div>
  <div id="btn-ocean-blue" class="material-swatch" onclick="selectMaterial('ocean_blue')">
    <div class="circle" style="background: #1e3a5f;"></div>
    <div class="label">Ocean Blue</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// State
window.__3D_STATE__ = {
  modelLoaded: false,
  currentMaterial: 'matte_black',
  autoRotate: true,
  wireframeMode: false,
  playerCount: 3,
  headphoneScale: 1.0,
  materialChangeCount: 0,
  playerPositions: [
    { x: 1.5, y: 1, z: 1 },
    { x: -1.5, y: 0.5, z: 1.5 },
    { x: 0, y: 1.5, z: -1 }
  ],
  cameraDistance: 5,
  backdropVisible: false,
  headphoneGroupExists: false,
  currentMaterialColor: '#1a1a1a'
};

// Scene
const scene = new THREE.Scene();

// Background gradient
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0.5, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.DirectionalLight(0xffeedd, 0.8);
warmLight.position.set(5, 5, 5);
warmLight.castShadow = true;
warmLight.shadow.mapSize.set(1024, 1024);
scene.add(warmLight);

const coolLight = new THREE.DirectionalLight(0xaaccff, 0.5);
coolLight.position.set(-3, 3, -3);
scene.add(coolLight);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x222222,
  roughness: 0.3,
  metalness: 0.8
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1;
ground.receiveShadow = true;
scene.add(ground);

// Material presets
const materialPresets = {
  matte_black: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0.1 }),
  brushed_silver: new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.3, metalness: 0.9 }),
  rose_gold: new THREE.MeshStandardMaterial({ color: 0xb76e79, roughness: 0.4, metalness: 0.8 }),
  ocean_blue: new THREE.MeshStandardMaterial({ color: 0x1e3a5f, roughness: 0.5, metalness: 0.6 })
};

const materialColors = {
  matte_black: '#1a1a1a',
  brushed_silver: '#c0c0c0',
  rose_gold: '#b76e79',
  ocean_blue: '#1e3a5f'
};

const materialNames = {
  matte_black: 'Matte Black',
  brushed_silver: 'Brushed Silver',
  rose_gold: 'Rose Gold',
  ocean_blue: 'Ocean Blue'
};

const cushionMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 1.0, metalness: 0.0 });

// Headphone group
const headphoneGroup = new THREE.Group();
headphoneGroup.name = 'headphoneGroup';

const bodyParts = [];

// Ear cups
const earCupGeom = new THREE.TorusGeometry(0.35, 0.15, 16, 32);
const leftCup = new THREE.Mesh(earCupGeom, materialPresets.matte_black.clone());
leftCup.position.set(-0.7, 0.5, 0);
leftCup.rotation.y = Math.PI / 2;
leftCup.castShadow = true;
headphoneGroup.add(leftCup);
bodyParts.push(leftCup);

const rightCup = new THREE.Mesh(earCupGeom, materialPresets.matte_black.clone());
rightCup.position.set(0.7, 0.5, 0);
rightCup.rotation.y = Math.PI / 2;
rightCup.castShadow = true;
headphoneGroup.add(rightCup);
bodyParts.push(rightCup);

// Headband curve
class HeadbandCurve extends THREE.Curve {
  getPoint(t) {
    const angle = Math.PI * t;
    const x = -0.7 + 1.4 * t;
    const y = 0.5 + 0.7 * Math.sin(angle);
    const z = 0;
    return new THREE.Vector3(x, y, z);
  }
}

const headbandCurve = new HeadbandCurve();
const headbandGeom = new THREE.TubeGeometry(headbandCurve, 32, 0.04, 12, false);
const headband = new THREE.Mesh(headbandGeom, materialPresets.matte_black.clone());
headband.castShadow = true;
headphoneGroup.add(headband);
bodyParts.push(headband);

// Inner headband padding
class InnerBandCurve extends THREE.Curve {
  getPoint(t) {
    const angle = Math.PI * t;
    const x = -0.5 + 1.0 * t;
    const y = 0.5 + 0.6 * Math.sin(angle);
    const z = 0;
    return new THREE.Vector3(x, y, z);
  }
}

const innerBandCurve = new InnerBandCurve();
const innerBandGeom = new THREE.TubeGeometry(innerBandCurve, 32, 0.025, 8, false);
const innerBand = new THREE.Mesh(innerBandGeom, cushionMaterial.clone());
headphoneGroup.add(innerBand);

// Ear cup outer shells (disc-like covers)
const shellGeom = new THREE.CylinderGeometry(0.32, 0.32, 0.12, 32);
const leftShell = new THREE.Mesh(shellGeom, materialPresets.matte_black.clone());
leftShell.position.set(-0.7, 0.5, 0);
leftShell.rotation.z = Math.PI / 2;
leftShell.castShadow = true;
headphoneGroup.add(leftShell);
bodyParts.push(leftShell);

const rightShell = new THREE.Mesh(shellGeom, materialPresets.matte_black.clone());
rightShell.position.set(0.7, 0.5, 0);
rightShell.rotation.z = Math.PI / 2;
rightShell.castShadow = true;
headphoneGroup.add(rightShell);
bodyParts.push(rightShell);

// Cushion pads
const cushionGeom = new THREE.CylinderGeometry(0.3, 0.3, 0.08, 32);
const leftCushion = new THREE.Mesh(cushionGeom, cushionMaterial.clone());
leftCushion.position.set(-0.58, 0.5, 0);
leftCushion.rotation.z = Math.PI / 2;
headphoneGroup.add(leftCushion);

const rightCushion = new THREE.Mesh(cushionGeom, cushionMaterial.clone());
rightCushion.position.set(0.58, 0.5, 0);
rightCushion.rotation.z = Math.PI / 2;
headphoneGroup.add(rightCushion);

// Connector arms
const armGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 8);
const leftArm = new THREE.Mesh(armGeom, materialPresets.matte_black.clone());
leftArm.position.set(-0.7, 0.75, 0);
headphoneGroup.add(leftArm);
bodyParts.push(leftArm);

const rightArm = new THREE.Mesh(armGeom, materialPresets.matte_black.clone());
rightArm.position.set(0.7, 0.75, 0);
headphoneGroup.add(rightArm);
bodyParts.push(rightArm);

scene.add(headphoneGroup);
window.__3D_STATE__.headphoneGroupExists = true;

// Player cursors
const playerColors = [0xff4444, 0x44ff44, 0x4444ff];
const playerLabels = ['P1', 'P2', 'P3'];
const playerStartPositions = [
  new THREE.Vector3(1.5, 1, 1),
  new THREE.Vector3(-1.5, 0.5, 1.5),
  new THREE.Vector3(0, 1.5, -1)
];

const playerSpheres = [];
const playerOrbitParams = [
  { radius: 1.8, speed: 0.3, yOffset: 0.8, yAmplitude: 0.3, phase: 0 },
  { radius: 2.0, speed: 0.2, yOffset: 0.6, yAmplitude: 0.4, phase: Math.PI * 0.66 },
  { radius: 1.5, speed: 0.25, yOffset: 1.0, yAmplitude: 0.2, phase: Math.PI * 1.33 }
];

function createTextSprite(text, color) {
  const c = document.createElement('canvas');
  c.width = 128;
  c.height = 64;
  const cx = c.getContext('2d');
  cx.fillStyle = color;
  cx.font = 'bold 36px Arial';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(text, 64, 32);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.4, 0.2, 1);
  return sprite;
}

for (let i = 0; i < 3; i++) {
  const sphereGeom = new THREE.SphereGeometry(0.05, 16, 16);
  const sphereMat = new THREE.MeshStandardMaterial({
    color: playerColors[i],
    emissive: playerColors[i],
    emissiveIntensity: 0.5,
    roughness: 0.3,
    metalness: 0.5
  });
  const sphere = new THREE.Mesh(sphereGeom, sphereMat);
  sphere.position.copy(playerStartPositions[i]);

  const colorHex = '#' + new THREE.Color(playerColors[i]).getHexString();
  const label = createTextSprite(playerLabels[i], colorHex);
  label.position.y = 0.15;
  sphere.add(label);

  // Glow
  const glowGeom = new THREE.SphereGeometry(0.08, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: playerColors[i],
    transparent: true,
    opacity: 0.3
  });
  const glow = new THREE.Mesh(glowGeom, glowMat);
  sphere.add(glow);

  scene.add(sphere);
  playerSpheres.push(sphere);
}

// Selection ring effect
const selectionRings = [];

function createSelectionRing(position) {
  const ringGeom = new THREE.RingGeometry(0.1, 0.15, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 1.0,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.position.copy(position);
  ring.lookAt(camera.position);
  ring.userData = { life: 1.0, speed: 2.0 };
  scene.add(ring);
  selectionRings.push(ring);
}

// Load backdrop model
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/libs/draco/gltf/');

const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

let mixer = null;

gltfLoader.load(
  'https://threejs.org/examples/models/gltf/LittlestTokyo.glb',
  (gltf) => {
    const model = gltf.scene;
    model.position.set(0, -1, -3);
    model.scale.set(0.005, 0.005, 0.005);
    scene.add(model);

    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play();
    }

    window.__3D_STATE__.modelLoaded = true;
    window.__3D_STATE__.backdropVisible = true;

    document.getElementById('loading-overlay').classList.add('hidden');
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.warn('Could not load LittlestTokyo.glb:', error);
    window.__3D_STATE__.modelLoaded = false;
    document.getElementById('loading-overlay').classList.add('hidden');
  }
);

// Raycaster for clicking headphone
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Scale pulse animation
let scalePulseActive = false;
let scalePulseTime = 0;
const scalePulseDuration = 0.3;

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(headphoneGroup.children, true);

  if (intersects.length > 0 && !scalePulseActive) {
    scalePulseActive = true;
    scalePulseTime = 0;
  }
});

// Material selection
function applyMaterial(presetName) {
  const mat = materialPresets[presetName];
  bodyParts.forEach(part => {
    part.material.color.copy(mat.color);
    part.material.roughness = mat.roughness;
    part.material.metalness = mat.metalness;
    part.material.wireframe = window.__3D_STATE__.wireframeMode;
    part.material.needsUpdate = true;
  });

  window.__3D_STATE__.currentMaterial = presetName;
  window.__3D_STATE__.currentMaterialColor = materialColors[presetName];
  window.__3D_STATE__.materialChangeCount++;

  document.getElementById('material-label').textContent = 'Current: ' + materialNames[presetName];

  // Update swatch active states
  document.querySelectorAll('.material-swatch').forEach(s => s.classList.remove('active'));
  const btnId = 'btn-' + presetName.replace('_', '-');
  document.getElementById(btnId).classList.add('active');

  // Selection ring at random player
  const randomPlayer = playerSpheres[Math.floor(Math.random() * 3)];
  createSelectionRing(randomPlayer.position.clone());
}

window.selectMaterial = function(name) {
  applyMaterial(name);
};

window.toggleRotation = function() {
  window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
  const btn = document.getElementById('btn-rotate');
  if (window.__3D_STATE__.autoRotate) {
    btn.textContent = '🔄 Rotate: ON';
    btn.classList.add('active');
  } else {
    btn.textContent = '🔄 Rotate: OFF';
    btn.classList.remove('active');
  }
};

window.toggleWireframe = function() {
  window.__3D_STATE__.wireframeMode = !window.__3D_STATE__.wireframeMode;
  const btn = document.getElementById('btn-wireframe');
  if (window.__3D_STATE__.wireframeMode) {
    btn.textContent = '🔲 Wireframe: ON';
    btn.classList.add('active');
  } else {
    btn.textContent = '🔲 Wireframe: OFF';
    btn.classList.remove('active');
  }

  bodyParts.forEach(part => {
    part.material.wireframe = window.__3D_STATE__.wireframeMode;
  });
};

// Keyboard controls
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === '1') applyMaterial('matte_black');
  else if (key === '2') applyMaterial('brushed_silver');
  else if (key === '3') applyMaterial('rose_gold');
  else if (key === '4') applyMaterial('ocean_blue');
  else if (key === 'r') window.toggleRotation();
  else if (key === 'w') window.toggleWireframe();
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Update mixer
  if (mixer) mixer.update(delta);

  // Auto-rotate headphone
  if (window.__3D_STATE__.autoRotate) {
    headphoneGroup.rotation.y += 0.5 * delta;
  }

  // Scale pulse
  if (scalePulseActive) {
    scalePulseTime += delta;
    const t = scalePulseTime / scalePulseDuration;
    if (t >= 1.0) {
      scalePulseActive = false;
      headphoneGroup.scale.set(1, 1, 1);
      window.__3D_STATE__.headphoneScale = 1.0;
    } else {
      const scale = 1.0 + 0.1 * Math.sin(t * Math.PI);
      headphoneGroup.scale.set(scale, scale, scale);
      window.__3D_STATE__.headphoneScale = scale;
    }
  }

  // Animate player cursors
  for (let i = 0; i < 3; i++) {
    const p = playerOrbitParams[i];
    const angle = elapsed * p.speed + p.phase;
    const x = Math.cos(angle) * p.radius;
    const z = Math.sin(angle) * p.radius;
    const y = p.yOffset + Math.sin(elapsed * p.speed * 1.5 + p.phase) * p.yAmplitude;

    playerSpheres[i].position.set(x, y, z);

    window.__3D_STATE__.playerPositions[i] = {
      x: parseFloat(x.toFixed(3)),
      y: parseFloat(y.toFixed(3)),
      z: parseFloat(z.toFixed(3))
    };
  }

  // Update selection rings
  for (let i = selectionRings.length - 1; i >= 0; i--) {
    const ring = selectionRings[i];
    ring.userData.life -= delta * ring.userData.speed;
    if (ring.userData.life <= 0) {
      scene.remove(ring);
      ring.geometry.dispose();
      ring.material.dispose();
      selectionRings.splice(i, 1);
    } else {
      const s = 1 + (1 - ring.userData.life) * 3;
      ring.scale.set(s, s, s);
      ring.material.opacity = ring.userData.life;
      ring.lookAt(camera.position);
    }
  }

  // Update camera distance
  window.__3D_STATE__.cameraDistance = parseFloat(camera.position.length().toFixed(3));

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Hide loading after a timeout if model doesn't load
setTimeout(() => {
  document.getElementById('loading-overlay').classList.add('hidden');
}, 10000);

</script>
</body>
</html>
