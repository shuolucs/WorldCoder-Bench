<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Parkour Runner</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .hud-element {
            position: absolute;
            padding: 15px;
        }
        #top-left { top: 0; left: 0; }
        #top-center { top: 0; left: 50%; transform: translateX(-50%); }
        #top-right { top: 0; right: 0; }
        #bottom-left { bottom: 0; left: 0; }
        #bottom-center {
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            color: gold;
            text-shadow: 2px 2px 4px #000;
            display: none;
        }
        #resetBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            pointer-events: auto;
            padding: 10px 20px;
            font-size: 1.1rem;
            background-color: #FF4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        #resetBtn:hover {
            background-color: #ff6666;
        }
        #controls-help {
            position: absolute;
            bottom: 60px;
            right: 20px;
            font-size: 0.9rem;
            text-align: right;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-layer">
        <div id="top-left" class="hud-element">Platform: <span id="hud-platform">1/8</span></div>
        <div id="top-center" class="hud-element">Time: <span id="hud-time">0.0s</span></div>
        <div id="top-right" class="hud-element">Falls: <span id="hud-falls">0</span></div>
        <div id="bottom-left" class="hud-element">Undo: <span id="hud-undo">0</span> | Redo: <span id="hud-redo">0</span></div>
        <div id="bottom-center" class="hud-element" id="goalMsg">GOAL REACHED!</div>
        <div id="controls-help" class="hud-element">
            WASD / Arrows : Move<br>
            Space : Jump<br>
            Z : Undo | Y : Redo
        </div>
        <button id="resetBtn">Reset Game</button>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.152.0/build/three.module.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.152.0/examples/jsm/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            playerPosition: { x: 0, y: 0, z: 0 },
            playerVelocity: { x: 0, y: 0, z: 0 },
            currentPlatform: 0,
            isGrounded: true,
            fallCount: 0,
            elapsedTime: 0,
            undoStackSize: 0,
            redoStackSize: 0,
            goalReached: false,
            platformCount: 8,
            totalPlatforms: [],
            gameActive: true,
            historyRecordCount: 0
        };

        // --- Game Variables ---
        let undoStack = [];
        let redoStack = [];
        let snapshotTimer = 0;
        const keys = {};
        const clock = new THREE.Clock();
        const GRAVITY = -15;
        const MOVE_SPEED = 5;
        const JUMP_VELOCITY = 8;

        // --- Scene Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 40;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7d44 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -5;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Platforms ---
        const platforms = [];
        let currentX = 0;
        for (let i = 0; i < 8; i++) {
            const platGeo = new THREE.BoxGeometry(2, 0.4, 2);
            const platMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const platform = new THREE.Mesh(platGeo, platMat);
            platform.castShadow = true;
            platform.receiveShadow = true;

            let y = i === 0 ? 1 : 1 + Math.random() * 5;
            let z = i === 0 ? 0 : (Math.random() - 0.5) * 4;

            platform.position.set(currentX, y, z);
            scene.add(platform);
            platforms.push(platform);
            window.__3D_STATE__.totalPlatforms.push({ x: currentX, y: y, z: z });

            currentX += 3.5 + Math.random() * 1.5;
        }

        // --- Goal Object (GLTF) ---
        const loader = new GLTFLoader();
        const goalUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/ABeautifulGame/glTF-Binary/ABeautifulGame.glb';
        
        loader.load(goalUrl, (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            const lastPlat = platforms[7].position;
            model.position.set(lastPlat.x, lastPlat.y + 0.2, lastPlat.z);
            scene.add(model);
        }, undefined, (error) => {
            console.warn("Could not load ABeautifulGame.glb, using fallback trophy.", error);
            const fbGeo = new THREE.OctahedronGeometry(0.8);
            const fbMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8, roughness: 0.2 });
            const fb = new THREE.Mesh(fbGeo, fbMat);
            fb.castShadow = true;
            const lastPlat = platforms[7].position;
            fb.position.set(lastPlat.x, lastPlat.y + 1.0, lastPlat.z);
            scene.add(fb);
        });

        // --- Player ---
        const playerGroup = new THREE.Group();
        
        const cylGeo = new THREE.CylinderGeometry(0.3, 0.3, 1, 8);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0xFF4444 });
        const cylinder = new THREE.Mesh(cylGeo, playerMat);
        cylinder.position.y = 0.5;
        cylinder.castShadow = true;
        
        const sphGeo = new THREE.SphereGeometry(0.3);
        const sphere = new THREE.Mesh(sphGeo, playerMat);
        sphere.position.y = 1.0;
        sphere.castShadow = true;

        playerGroup.add(cylinder);
        playerGroup.add(sphere);
        scene.add(playerGroup);

        const playerVelocity = new THREE.Vector3();

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            keys[key] = true;
            keys[e.code] = true;

            // Clear redo stack on new action
            if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(key)) {
                if (redoStack.length > 0) redoStack = [];
            }

            if (key === 'z') undo();
            if (key === 'y') redo();
            
            if (key === ' ' && window.__3D_STATE__.isGrounded && window.__3D_STATE__.gameActive) {
                playerVelocity.y = JUMP_VELOCITY;
                window.__3D_STATE__.isGrounded = false;
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            keys[e.code] = false;
        });

        // --- Undo / Redo Logic ---
        function takeSnapshot() {
            if (undoStack.length >= 50) undoStack.shift();
            undoStack.push({
                pos: playerGroup.position.clone(),
                vel: playerVelocity.clone(),
                plat: window.__3D_STATE__.currentPlatform,
                grounded: window.__3D_STATE__.isGrounded
            });
            window.__3D_STATE__.historyRecordCount++;
        }

        function undo() {
            if (undoStack.length > 0 && window.__3D_STATE__.gameActive) {
                redoStack.push({
                    pos: playerGroup.position.clone(),
                    vel: playerVelocity.clone(),
                    plat: window.__3D_STATE__.currentPlatform,
                    grounded: window.__3D_STATE__.isGrounded
                });
                applyState(undoStack.pop());
            }
        }

        function redo() {
            if (redoStack.length > 0 && window.__3D_STATE__.gameActive) {
                undoStack.push({
                    pos: playerGroup.position.clone(),
                    vel: playerVelocity.clone(),
                    plat: window.__3D_STATE__.currentPlatform,
                    grounded: window.__3D_STATE__.isGrounded
                });
                applyState(redoStack.pop());
            }
        }

        function applyState(state) {
            playerGroup.position.copy(state.pos);
            playerVelocity.copy(state.vel);
            window.__3D_STATE__.currentPlatform = state.plat;
            window.__3D_STATE__.isGrounded = state.grounded;
        }

        // --- Reset Logic ---
        function resetPlayer() {
            playerGroup.position.set(platforms[0].position.x, platforms[0].position.y + 0.2, platforms[0].position.z);
            playerVelocity.set(0, 0, 0);
            window.__3D_STATE__.isGrounded = true;
            window.__3D_STATE__.currentPlatform = 0;
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            resetPlayer();
            window.__3D_STATE__.fallCount = 0;
            window.__3D_STATE__.elapsedTime = 0;
            window.__3D_STATE__.goalReached = false;
            window.__3D_STATE__.gameActive = true;
            undoStack = [];
            redoStack = [];
            window.__3D_STATE__.historyRecordCount = 0;
            snapshotTimer = 0;
            document.getElementById('bottom-center').style.display = 'none';
        });

        // Initialize Player Position
        resetPlayer();

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent huge jumps on lag

            if (window.__3D_STATE__.gameActive) {
                window.__3D_STATE__.elapsedTime += dt;

                // Movement
                let moveX = 0;
                let moveZ = 0;
                if (keys['arrowleft'] || keys['a']) moveX -= 1;
                if (keys['arrowright'] || keys['d']) moveX += 1;
                if (keys['arrowup'] || keys['w']) moveZ -= 1;
                if (keys['arrowdown'] || keys['s']) moveZ += 1;

                const moveDir = new THREE.Vector3(moveX, 0, moveZ);
                if (moveDir.lengthSq() > 0) moveDir.normalize();

                playerVelocity.x = moveDir.x * MOVE_SPEED;
                playerVelocity.z = moveDir.z * MOVE_SPEED;

                // Gravity
                playerVelocity.y += GRAVITY * dt;

                // Apply Velocity
                playerGroup.position.x += playerVelocity.x * dt;
                playerGroup.position.y += playerVelocity.y * dt;
                playerGroup.position.z += playerVelocity.z * dt;

                // Collision Detection
                window.__3D_STATE__.isGrounded = false;
                let nearestPlat = -1;
                let minDist = Infinity;

                for (let i = 0; i < platforms.length; i++) {
                    const p = platforms[i];
                    const dx = Math.abs(playerGroup.position.x - p.position.x);
                    const dz = Math.abs(playerGroup.position.z - p.position.z);
                    
                    const dist = dx * dx + dz * dz;
                    if (dist < minDist) {
                        minDist = dist;
                        nearestPlat = i;
                    }

                    // AABB Check (Platform is 2x2, so half-width is 1.0)
                    if (dx < 1.0 && dz < 1.0) {
                        const platTop = p.position.y + 0.2;
                        // Check if player bottom is crossing platform top
                        if (playerGroup.position.y <= platTop && playerGroup.position.y >= platTop - 0.5) {
                            if (playerVelocity.y <= 0) {
                                playerGroup.position.y = platTop;
                                playerVelocity.y = 0;
                                window.__3D_STATE__.isGrounded = true;
                                window.__3D_STATE__.currentPlatform = i;
                            }
                        }
                    }
                }

                // Fall Check
                if (playerGroup.position.y < -5) {
                    window.__3D_STATE__.fallCount++;
                    resetPlayer();
                }

                // Goal Check
                if (window.__3D_STATE__.currentPlatform === 7 && window.__3D_STATE__.isGrounded) {
                    window.__3D_STATE__.goalReached = true;
                    window.__3D_STATE__.gameActive = false;
                    document.getElementById('bottom-center').style.display = 'block';
                }

                // Snapshot Timer
                snapshotTimer += dt;
                if (snapshotTimer >= 0.5) {
                    takeSnapshot();
                    snapshotTimer = 0;
                }

                // Update HUD display platform (use nearest if airborne)
                const displayPlat = window.__3D_STATE__.isGrounded ? window.__3D_STATE__.currentPlatform : nearestPlat;
                document.getElementById('hud-platform').innerText = `${Math.max(1, displayPlat + 1)}/8`;
            }

            // Camera Follow
            camera.position.x = THREE.MathUtils.lerp(camera.position.x, playerGroup.position.x, 0.1);
            camera.position.y = 8;
            camera.position.z = 15;
            camera.lookAt(camera.position.x, 0, 0);

            // Update HUD
            document.getElementById('hud-time').innerText = window.__3D_STATE__.elapsedTime.toFixed(1) + 's';
            document.getElementById('hud-falls').innerText = window.__3D_STATE__.fallCount;
            document.getElementById('hud-undo').innerText = undoStack.length;
            document.getElementById('hud-redo').innerText = redoStack.length;

            // Update Global State Object
            window.__3D_STATE__.playerPosition.x = playerGroup.position.x;
            window.__3D_STATE__.playerPosition.y = playerGroup.position.y;
            window.__3D_STATE__.playerPosition.z = playerGroup.position.z;
            window.__3D_STATE__.playerVelocity.x = playerVelocity.x;
            window.__3D_STATE__.playerVelocity.y = playerVelocity.y;
            window.__3D_STATE__.playerVelocity.z = playerVelocity.z;
            window.__3D_STATE__.undoStackSize = undoStack.length;
            window.__3D_STATE__.redoStackSize = redoStack.length;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
