<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parkour Runner - Undo/Redo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#hud {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
pointer-events: none;
color: white;
text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}
#hud > div { pointer-events: auto; }
.hud-top-left {
position: absolute; top: 15px; left: 15px;
font-size: 20px; font-weight: bold;
}
.hud-top-center {
position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
font-size: 22px; font-weight: bold;
}
.hud-top-right {
position: absolute; top: 15px; right: 15px;
font-size: 20px; font-weight: bold;
}
.hud-bottom-left {
position: absolute; bottom: 15px; left: 15px;
font-size: 16px; opacity: 0.9;
}
.hud-bottom-center {
position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
font-size: 36px; font-weight: bold; color: gold;
text-shadow: 2px 2px 6px rgba(0,0,0,0.9), 0 0 20px rgba(255,215,0,0.5);
display: none;
}
#resetBtn {
position: absolute; bottom: 15px; right: 15px;
padding: 10px 20px;
font-size: 16px; font-weight: bold;
background: linear-gradient(135deg, #e74c3c, #c0392b);
color: white; border: 2px solid #fff;
border-radius: 8px; cursor: pointer;
pointer-events: auto;
transition: all 0.2s;
}
#resetBtn:hover {
background: linear-gradient(135deg, #ff6b6b, #e74c3c);
transform: scale(1.05);
}
.controls-help {
position: absolute; bottom: 55px; right: 15px;
font-size: 11px; opacity: 0.7;
text-align: right; line-height: 1.6;
pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
<div class="hud-top-left" id="platformDisplay">Platform: 1/8</div>
<div class="hud-top-center" id="timeDisplay">Time: 0.0s</div>
<div class="hud-top-right" id="fallDisplay">Falls: 0</div>
<div class="hud-bottom-left" id="undoRedoDisplay">Undo: 0 | Redo: 0</div>
<div class="hud-bottom-center" id="goalMessage">🏆 GOAL REACHED! 🏆</div>
<button id="resetBtn">Reset Game</button>
<div class="controls-help">
WASD/Arrows: Move | Space: Jump<br>
Z: Undo | Y: Redo
</div>
</div>

<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.152.2/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
}
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -25;
dirLight.shadow.camera.right = 25;
dirLight.shadow.camera.top = 25;
dirLight.shadow.camera.bottom = -25;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3a7d44, 0.3);
scene.add(hemiLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7d44, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1;
ground.receiveShadow = true;
scene.add(ground);

// Platforms
const platformPositions = [
{ x: 0, y: 1.5, z: 0 },
{ x: 3.5, y: 2.5, z: -1 },
{ x: 7, y: 3.0, z: 0.5 },
{ x: 10.5, y: 2.0, z: -0.5 },
{ x: 14, y: 4.0, z: 1 },
{ x: 17.5, y: 3.5, z: -1.5 },
{ x: 21, y: 5.0, z: 0 },
{ x: 24.5, y: 6.0, z: -0.5 }
];

const platforms = [];
const platformMat = new THREE.MeshStandardMaterial({
color: 0x8B4513,
roughness: 0.7,
metalness: 0.1
});

platformPositions.forEach((pos, i) => {
const geo = new THREE.BoxGeometry(2, 0.4, 2);
const mesh = new THREE.Mesh(geo, platformMat.clone());
mesh.position.set(pos.x, pos.y, pos.z);
mesh.castShadow = true;
mesh.receiveShadow = true;
scene.add(mesh);
platforms.push(mesh);

// Add edge glow for visibility
const edgeGeo = new THREE.BoxGeometry(2.05, 0.42, 2.05);
const edgeMat = new THREE.MeshStandardMaterial({
color: i === 7 ? 0xFFD700 : 0xA0522D,
emissive: i === 7 ? 0xFFD700 : 0x000000,
emissiveIntensity: i === 7 ? 0.3 : 0,
transparent: true,
opacity: 0.3
});
const edge = new THREE.Mesh(edgeGeo, edgeMat);
edge.position.copy(mesh.position);
scene.add(edge);

// Platform number indicator
const numCanvas = document.createElement('canvas');
numCanvas.width = 64; numCanvas.height = 64;
const ctx = numCanvas.getContext('2d');
ctx.fillStyle = '#ffffff';
ctx.font = 'bold 40px Arial';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText((i + 1).toString(), 32, 32);
const numTex = new THREE.CanvasTexture(numCanvas);
const numMat = new THREE.SpriteMaterial({ map: numTex, transparent: true, opacity: 0.8 });
const numSprite = new THREE.Sprite(numMat);
numSprite.position.set(pos.x, pos.y + 1.0, pos.z);
numSprite.scale.set(0.6, 0.6, 0.6);
scene.add(numSprite);
});

// Player
const playerGroup = new THREE.Group();

const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 1, 8);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0xFF4444, roughness: 0.4, metalness: 0.2 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 0.5;
body.castShadow = true;
playerGroup.add(body);

const headGeo = new THREE.SphereGeometry(0.3, 8, 8);
const headMat = new THREE.MeshStandardMaterial({ color: 0xFF4444, roughness: 0.4, metalness: 0.2 });
const head = new THREE.Mesh(headGeo, headMat);
head.position.y = 1.15;
head.castShadow = true;
playerGroup.add(head);

// Eyes
const eyeGeo = new THREE.SphereGeometry(0.06, 6, 6);
const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
leftEye.position.set(-0.12, 1.2, 0.25);
playerGroup.add(leftEye);
const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
rightEye.position.set(0.12, 1.2, 0.25);
playerGroup.add(rightEye);

const pupilGeo = new THREE.SphereGeometry(0.03, 6, 6);
const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
leftPupil.position.set(-0.12, 1.2, 0.3);
playerGroup.add(leftPupil);
const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
rightPupil.position.set(0.12, 1.2, 0.3);
playerGroup.add(rightPupil);

scene.add(playerGroup);

// Game state
let playerPosition = { x: platformPositions[0].x, y: platformPositions[0].y + 0.2 + 0.0, z: platformPositions[0].z };
let playerVelocity = { x: 0, y: 0, z: 0 };
let isGrounded = false;
let currentPlatform = 0;
let fallCount = 0;
let elapsedTime = 0;
let gameActive = true;
let goalReached = false;

const GRAVITY = -15;
const MOVE_SPEED = 5;
const JUMP_SPEED = 8;
const MAX_UNDO = 50;

let undoStack = [];
let redoStack = [];
let historyRecordCount = 0;
let lastSnapshotTime = 0;

// Input
const keys = {};
window.addEventListener('keydown', (e) => {
keys[e.code] = true;
if (e.code === 'Space') e.preventDefault();

if (e.code === 'KeyZ' && !e.ctrlKey) {
performUndo();
}
if (e.code === 'KeyY' && !e.ctrlKey) {
performRedo();
}
});
window.addEventListener('keyup', (e) => {
keys[e.code] = false;
});

// Load trophy model
let trophyModel = null;
const loader = new GLTFLoader();
loader.load(
'https://threejs.org/examples/models/gltf/ABeautifulGame.glb',
(gltf) => {
trophyModel = gltf.scene;
trophyModel.scale.set(0.5, 0.5, 0.5);
const lastPlat = platformPositions[7];
trophyModel.position.set(lastPlat.x, lastPlat.y + 0.2, lastPlat.z);
trophyModel.traverse((child) => {
if (child.isMesh) {
child.castShadow = true;
child.receiveShadow = true;
}
});
scene.add(trophyModel);
},
undefined,
(error) => {
console.warn('Could not load GLB model, creating fallback trophy:', error);
// Fallback trophy
const trophyGroup = new THREE.Group();
const cupGeo = new THREE.CylinderGeometry(0.3, 0.2, 0.6, 8);
const cupMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8, roughness: 0.2 });
const cup = new THREE.Mesh(cupGeo, cupMat);
cup.position.y = 0.5;
cup.castShadow = true;
trophyGroup.add(cup);

const baseGeo = new THREE.CylinderGeometry(0.25, 0.3, 0.15, 8);
const base = new THREE.Mesh(baseGeo, cupMat);
base.position.y = 0.075;
base.castShadow = true;
trophyGroup.add(base);

const starGeo = new THREE.OctahedronGeometry(0.15);
const starMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xFFAA00, emissiveIntensity: 0.5 });
const star = new THREE.Mesh(starGeo, starMat);
star.position.y = 0.95;
star.castShadow = true;
trophyGroup.add(star);

const lastPlat = platformPositions[7];
trophyGroup.position.set(lastPlat.x, lastPlat.y + 0.2, lastPlat.z);
scene.add(trophyGroup);
trophyModel = trophyGroup;
}
);

// Particle system for effects
const particleGeo = new THREE.BufferGeometry();
const particleCount = 100;
const particlePositions = new Float32Array(particleCount * 3);
const particleVelocities = [];
const particleLifetimes = new Float32Array(particleCount);
for (let i = 0; i < particleCount; i++) {
particlePositions[i * 3] = 0;
particlePositions[i * 3 + 1] = -100;
particlePositions[i * 3 + 2] = 0;
particleVelocities.push({ x: 0, y: 0, z: 0 });
particleLifetimes[i] = 0;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xFFD700, size: 0.15, transparent: true, opacity: 0.8 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

let nextParticle = 0;
function emitParticles(pos, count, color) {
particleMat.color.set(color || 0xFFD700);
for (let i = 0; i < count; i++) {
const idx = nextParticle % particleCount;
nextParticle++;
particlePositions[idx * 3] = pos.x + (Math.random() - 0.5) * 0.5;
particlePositions[idx * 3 + 1] = pos.y + Math.random() * 0.5;
particlePositions[idx * 3 + 2] = pos.z + (Math.random() - 0.5) * 0.5;
particleVelocities[idx] = {
x: (Math.random() - 0.5) * 3,
y: Math.random() * 5 + 2,
z: (Math.random() - 0.5) * 3
};
particleLifetimes[idx] = 1.0;
}
particleGeo.attributes.position.needsUpdate = true;
}

function updateParticles(dt) {
for (let i = 0; i < particleCount; i++) {
if (particleLifetimes[i] > 0) {
particleLifetimes[i] -= dt * 2;
particlePositions[i * 3] += particleVelocities[i].x * dt;
particlePositions[i * 3 + 1] += particleVelocities[i].y * dt;
particlePositions[i * 3 + 2] += particleVelocities[i].z * dt;
particleVelocities[i].y -= 5 * dt;
if (particleLifetimes[i] <= 0) {
particlePositions[i * 3 + 1] = -100;
}
}
}
particleGeo.attributes.position.needsUpdate = true;
}

// Snapshot functions
function createSnapshot() {
return {
position: { x: playerPosition.x, y: playerPosition.y, z: playerPosition.z },
velocity: { x: playerVelocity.x, y: playerVelocity.y, z: playerVelocity.z },
currentPlatform: currentPlatform,
isGrounded: isGrounded
};
}

function applySnapshot(snapshot) {
playerPosition.x = snapshot.position.x;
playerPosition.y = snapshot.position.y;
playerPosition.z = snapshot.position.z;
playerVelocity.x = snapshot.velocity.x;
playerVelocity.y = snapshot.velocity.y;
playerVelocity.z = snapshot.velocity.z;
currentPlatform = snapshot.currentPlatform;
isGrounded = snapshot.isGrounded;
}

function saveSnapshot() {
const snapshot = createSnapshot();
undoStack.push(snapshot);
if (undoStack.length > MAX_UNDO) {
undoStack.shift();
}
redoStack = [];
historyRecordCount++;
}

function performUndo() {
if (undoStack.length > 0) {
const currentState = createSnapshot();
redoStack.push(currentState);
const prev = undoStack.pop();
applySnapshot(prev);
emitParticles(playerPosition, 10, 0x4488FF);
}
}

function performRedo() {
if (redoStack.length > 0) {
const currentState = createSnapshot();
undoStack.push(currentState);
const next = redoStack.pop();
applySnapshot(next);
emitParticles(playerPosition, 10, 0x44FF88);
}
}

// Platform collision
function checkPlatformCollision() {
let onPlatform = false;
let bestPlatform = -1;
let bestY = -Infinity;

for (let i = 0; i < platformPositions.length; i++) {
const plat = platformPositions[i];
const platTop = plat.y + 0.2; // half height of platform
const dx = Math.abs(playerPosition.x - plat.x);
const dz = Math.abs(playerPosition.z - plat.z);

if (dx < 1.0 && dz < 1.0) {
const playerBottom = playerPosition.y;
if (playerBottom >= platTop - 0.3 && playerBottom <= platTop + 0.5 && playerVelocity.y <= 0) {
if (platTop > bestY) {
bestY = platTop;
bestPlatform = i;
onPlatform = true;
}
}
}
}

if (onPlatform) {
playerPosition.y = bestY;
playerVelocity.y = 0;
isGrounded = true;
currentPlatform = bestPlatform;
} else {
isGrounded = false;
}

return onPlatform;
}

function findNearestPlatform() {
let minDist = Infinity;
let nearest = -1;
for (let i = 0; i < platformPositions.length; i++) {
const plat = platformPositions[i];
const dist = Math.sqrt(
(playerPosition.x - plat.x) ** 2 +
(playerPosition.y - plat.y) ** 2 +
(playerPosition.z - plat.z) ** 2
);
if (dist < minDist) {
minDist = dist;
nearest = i;
}
}
return nearest;
}

function resetPlayer() {
playerPosition.x = platformPositions[0].x;
playerPosition.y = platformPositions[0].y + 0.2;
playerPosition.z = platformPositions[0].z;
playerVelocity.x = 0;
playerVelocity.y = 0;
playerVelocity.z = 0;
isGrounded = true;
currentPlatform = 0;
}

function resetGame() {
resetPlayer();
fallCount = 0;
elapsedTime = 0;
goalReached = false;
gameActive = true;
undoStack = [];
redoStack = [];
historyRecordCount = 0;
lastSnapshotTime = 0;
document.getElementById('goalMessage').style.display = 'none';
}

document.getElementById('resetBtn').addEventListener('click', resetGame);

// Initialize player position
resetPlayer();

// HUD elements
const platformDisplay = document.getElementById('platformDisplay');
const timeDisplay = document.getElementById('timeDisplay');
const fallDisplay = document.getElementById('fallDisplay');
const undoRedoDisplay = document.getElementById('undoRedoDisplay');
const goalMessage = document.getElementById('goalMessage');

// Window state
window.__3D_STATE__ = {};

function updateState() {
window.__3D_STATE__ = {
playerPosition: { x: playerPosition.x, y: playerPosition.y, z: playerPosition.z },
playerVelocity: { x: playerVelocity.x, y: playerVelocity.y, z: playerVelocity.z },
currentPlatform: currentPlatform,
isGrounded: isGrounded,
fallCount: fallCount,
elapsedTime: elapsedTime,
undoStackSize: undoStack.length,
redoStackSize: redoStack.length,
goalReached: goalReached,
platformCount: 8,
totalPlatforms: platformPositions.map(p => ({ x: p.x, y: p.y, z: p.z })),
gameActive: gameActive,
historyRecordCount: historyRecordCount
};
}

// Animation loop
const clock = new THREE.Clock();
let prevActionState = false;

function animate() {
requestAnimationFrame(animate);

const dt = Math.min(clock.getDelta(), 0.05);

if (gameActive && !goalReached) {
elapsedTime += dt;
}

// Input handling
let moving = false;
if (gameActive) {
if (keys['ArrowLeft'] || keys['KeyA']) {
playerVelocity.x = -MOVE_SPEED;
moving = true;
} else if (keys['ArrowRight'] || keys['KeyD']) {
playerVelocity.x = MOVE_SPEED;
moving = true;
} else {
playerVelocity.x = 0;
}

if (keys['ArrowUp'] || keys['KeyW']) {
playerVelocity.z = -MOVE_SPEED;
moving = true;
} else if (keys['ArrowDown'] || keys['KeyS']) {
playerVelocity.z = MOVE_SPEED;
moving = true;
} else {
playerVelocity.z = 0;
}

if ((keys['Space']) && isGrounded) {
playerVelocity.y = JUMP_SPEED;
isGrounded = false;
emitParticles(playerPosition, 5, 0xFFFFFF);

// Clear redo on new action
if (redoStack.length > 0) {
redoStack = [];
}
}
}

// Gravity
if (!isGrounded) {
playerVelocity.y += GRAVITY * dt;
}

// Update position
playerPosition.x += playerVelocity.x * dt;
playerPosition.y += playerVelocity.y * dt;
playerPosition.z += playerVelocity.z * dt;

// Platform collision
checkPlatformCollision();

// Fall detection
if (playerPosition.y < -5) {
fallCount++;
resetPlayer();
emitParticles(playerPosition, 15, 0xFF4444);
}

// Goal detection
if (currentPlatform === 7 && !goalReached) {
goalReached = true;
goalMessage.style.display = 'block';
emitParticles(platformPositions[7], 30, 0xFFD700);
}

// Snapshot recording
if (gameActive) {
lastSnapshotTime += dt;
if (lastSnapshotTime >= 0.5) {
lastSnapshotTime = 0;
saveSnapshot();
}

// Clear redo on new movement action
if (moving && !prevActionState && redoStack.length > 0) {
redoStack = [];
}
prevActionState = moving;
}

// Update player visual
playerGroup.position.set(playerPosition.x, playerPosition.y, playerPosition.z);

// Player tilt based on movement
const targetRotZ = playerVelocity.x !== 0 ? -playerVelocity.x * 0.05 : 0;
const targetRotX = playerVelocity.z !== 0 ? playerVelocity.z * 0.05 : 0;
playerGroup.rotation.z += (targetRotZ - playerGroup.rotation.z) * 0.1;
playerGroup.rotation.x += (targetRotX - playerGroup.rotation.x) * 0.1;

// Camera follow
const camTargetX = playerPosition.x;
const camTargetY = playerPosition.y + 6;
const camTargetZ = playerPosition.z + 12;
camera.position.x += (camTargetX - camera.position.x) * 0.05;
camera.position.y += (camTargetY - camera.position.y) * 0.05;
camera.position.z += (camTargetZ - camera.position.z) * 0.05;
camera.lookAt(playerPosition.x, playerPosition.y + 1, playerPosition.z);

// Rotate trophy
if (trophyModel) {
trophyModel.rotation.y += dt * 0.5;
}

// Animate goal platform
if (platforms[7]) {
platforms[7].material.emissive = new THREE.Color(0xFFD700);
platforms[7].material.emissiveIntensity = 0.2 + Math.sin(elapsedTime * 3) * 0.15;
}

// Update particles
updateParticles(dt);

// Goal celebration particles
if (goalReached) {
if (Math.random() < 0.3) {
emitParticles({
x: platformPositions[7].x + (Math.random() - 0.5) * 2,
y: platformPositions[7].y + 1,
z: platformPositions[7].z + (Math.random() - 0.5) * 2
}, 2, 0xFFD700);
}
}

// Update HUD
const displayPlatform = currentPlatform >= 0 ? currentPlatform + 1 : findNearestPlatform() + 1;
platformDisplay.textContent = `Platform: ${displayPlatform}/8`;
timeDisplay.textContent = `Time: ${elapsedTime.toFixed(1)}s`;
fallDisplay.textContent = `Falls: ${fallCount}`;
undoRedoDisplay.textContent = `Undo: ${undoStack.length} | Redo: ${redoStack.length}`;

// Update state
updateState();

renderer.render(scene, camera);
}

animate();

// Resize handler
window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
