<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js Parkour Runner with Undo/Redo</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      font-size: 20px;
      font-weight: bold;
    }

    #platformHud {
      position: absolute;
      top: 16px;
      left: 16px;
    }

    #timeHud {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
    }

    #fallsHud {
      position: absolute;
      top: 16px;
      right: 16px;
    }

    #undoHud {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-size: 18px;
    }

    #goalHud {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: gold;
      font-size: 32px;
      letter-spacing: 1px;
      display: none;
    }

    #resetBtn {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #ffffff;
      color: #222;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }

    #resetBtn:hover {
      background: #f0f0f0;
    }

    #help {
      position: fixed;
      left: 16px;
      top: 54px;
      z-index: 5;
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      line-height: 1.4;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="hud">
    <div id="platformHud">Platform: 1/8</div>
    <div id="timeHud">Time: 0.0s</div>
    <div id="fallsHud">Falls: 0</div>
    <div id="undoHud">Undo: 0 | Redo: 0</div>
    <div id="goalHud">GOAL REACHED!</div>
  </div>

  <div id="help">
    Move: Arrow Keys / WASD<br />
    Jump: Space<br />
    Undo: Z<br />
    Redo: Y
  </div>

  <button id="resetBtn">Reset Game</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.152.2/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.152.2/examples/jsm/loaders/GLTFLoader.js";

    let scene, camera, renderer, clock;
    let player, playerBody, playerHead;
    let ground;
    let trophy = null;

    const platforms = [];
    const platformPositions = [
      new THREE.Vector3(0, 1.2, 0),
      new THREE.Vector3(3.5, 2.1, -0.7),
      new THREE.Vector3(7.0, 3.0, 0.6),
      new THREE.Vector3(10.6, 4.2, -1.0),
      new THREE.Vector3(14.0, 2.8, 1.1),
      new THREE.Vector3(17.7, 5.0, -0.4),
      new THREE.Vector3(21.1, 3.7, 0.9),
      new THREE.Vector3(24.8, 5.6, 0.0)
    ];

    const keys = {};
    const gravity = -15;
    const moveSpeed = 5;
    const jumpSpeed = 8;
    const playerRadius = 0.3;
    const playerHeight = 1.6; // total visual height approx
    const platformHalfSize = 1.0;
    const platformThickness = 0.4;

    let currentPlatform = 0;
    let isGrounded = true;
    let fallCount = 0;
    let elapsedTime = 0;
    let goalReached = false;
    let gameActive = true;
    let historyRecordCount = 0;

    let saveTimer = 0;
    const snapshotInterval = 0.5;
    const undoStack = [];
    const redoStack = [];
    const maxHistory = 50;

    const playerVelocity = new THREE.Vector3(0, 0, 0);
    const startPosition = new THREE.Vector3(
      platformPositions[0].x,
      platformPositions[0].y + platformThickness / 2 + playerHeight / 2,
      platformPositions[0].z
    );

    const platformHud = document.getElementById("platformHud");
    const timeHud = document.getElementById("timeHud");
    const fallsHud = document.getElementById("fallsHud");
    const undoHud = document.getElementById("undoHud");
    const goalHud = document.getElementById("goalHud");
    const resetBtn = document.getElementById("resetBtn");

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        200
      );
      camera.position.set(0, 8, 15);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(5, 10, 5);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      dirLight.shadow.camera.left = -30;
      dirLight.shadow.camera.right = 30;
      dirLight.shadow.camera.top = 30;
      dirLight.shadow.camera.bottom = -30;
      dirLight.shadow.camera.near = 0.5;
      dirLight.shadow.camera.far = 80;
      scene.add(dirLight);

      createGround();
      createPlatforms();
      createPlayer();
      loadGoalModel();

      saveSnapshot(true);
      updateHUD();
      updateStateObject();

      window.addEventListener("resize", onWindowResize);
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      resetBtn.addEventListener("click", resetGame);
    }

    function createGround() {
      const groundGeo = new THREE.PlaneGeometry(100, 100);
      const groundMat = new THREE.MeshStandardMaterial({ color: "#3a7d44" });
      ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);
    }

    function createPlatforms() {
      const platformGeo = new THREE.BoxGeometry(2, 0.4, 2);
      const platformMat = new THREE.MeshStandardMaterial({ color: "#8B4513" });

      for (let i = 0; i < platformPositions.length; i++) {
        const mesh = new THREE.Mesh(platformGeo, platformMat);
        mesh.position.copy(platformPositions[i]);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        platforms.push(mesh);
      }
    }

    function createPlayer() {
      player = new THREE.Group();

      const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 1, 8);
      const headGeo = new THREE.SphereGeometry(0.3, 16, 16);
      const playerMat = new THREE.MeshStandardMaterial({ color: "#FF4444" });

      playerBody = new THREE.Mesh(bodyGeo, playerMat);
      playerBody.position.y = 0.5;
      playerBody.castShadow = true;
      playerBody.receiveShadow = true;

      playerHead = new THREE.Mesh(headGeo, playerMat);
      playerHead.position.y = 1.15;
      playerHead.castShadow = true;
      playerHead.receiveShadow = true;

      player.add(playerBody);
      player.add(playerHead);
      player.position.copy(startPosition);

      scene.add(player);
    }

    function loadGoalModel() {
      const loader = new GLTFLoader();

      loader.load(
        "ABeautifulGame.glb",
        (gltf) => {
          trophy = gltf.scene;
          trophy.scale.set(0.5, 0.5, 0.5);

          const finalPlatform = platformPositions[7];
          trophy.position.set(
            finalPlatform.x,
            finalPlatform.y + platformThickness / 2 + 0.2,
            finalPlatform.z
          );

          trophy.traverse((obj) => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
            }
          });

          scene.add(trophy);
        },
        undefined,
        () => {
          // Fallback decorative trophy if GLB fails to load
          const finalPlatform = platformPositions[7];
          const fallback = new THREE.Mesh(
            new THREE.TorusKnotGeometry(0.35, 0.12, 100, 16),
            new THREE.MeshStandardMaterial({
              color: 0xffd700,
              metalness: 0.8,
              roughness: 0.2
            })
          );
          fallback.position.set(
            finalPlatform.x,
            finalPlatform.y + platformThickness / 2 + 0.8,
            finalPlatform.z
          );
          fallback.castShadow = true;
          fallback.receiveShadow = true;
          trophy = fallback;
          scene.add(trophy);
        }
      );
    }

    function onKeyDown(e) {
      const key = e.key.toLowerCase();

      if (["arrowleft", "arrowright", "arrowup", "arrowdown", " ", "a", "d", "w", "s", "z", "y"].includes(key)) {
        e.preventDefault();
      }

      if (key === "z") {
        undo();
        return;
      }

      if (key === "y") {
        redo();
        return;
      }

      if (key === " " && isGrounded && gameActive) {
        clearRedoOnNewAction();
        playerVelocity.y = jumpSpeed;
        isGrounded = false;
      }

      keys[key] = true;
    }

    function onKeyUp(e) {
      keys[e.key.toLowerCase()] = false;
    }

    function clearRedoOnNewAction() {
      if (redoStack.length > 0) {
        redoStack.length = 0;
      }
    }

    function getSnapshot() {
      return {
        position: {
          x: player.position.x,
          y: player.position.y,
          z: player.position.z
        },
        velocity: {
          x: playerVelocity.x,
          y: playerVelocity.y,
          z: playerVelocity.z
        },
        currentPlatform,
        isGrounded
      };
    }

    function applySnapshot(snapshot) {
      player.position.set(
        snapshot.position.x,
        snapshot.position.y,
        snapshot.position.z
      );
      playerVelocity.set(
        snapshot.velocity.x,
        snapshot.velocity.y,
        snapshot.velocity.z
      );
      currentPlatform = snapshot.currentPlatform;
      isGrounded = snapshot.isGrounded;
      goalReached = currentPlatform === 7 && isGrounded;
    }

    function saveSnapshot(force = false) {
      if (!force && !gameActive) return;

      const snapshot = getSnapshot();

      if (!force && undoStack.length > 0) {
        const prev = undoStack[undoStack.length - 1];
        const dx = Math.abs(prev.position.x - snapshot.position.x);
        const dy = Math.abs(prev.position.y - snapshot.position.y);
        const dz = Math.abs(prev.position.z - snapshot.position.z);
        const dv = Math.abs(prev.velocity.x - snapshot.velocity.x) +
                   Math.abs(prev.velocity.y - snapshot.velocity.y) +
                   Math.abs(prev.velocity.z - snapshot.velocity.z);
        if (dx + dy + dz + dv < 0.01 && prev.currentPlatform === snapshot.currentPlatform && prev.isGrounded === snapshot.isGrounded) {
          return;
        }
      }

      undoStack.push(snapshot);
      if (undoStack.length > maxHistory) {
        undoStack.shift();
      }
      historyRecordCount++;
    }

    function undo() {
      if (undoStack.length <= 1) return;

      const current = getSnapshot();
      redoStack.push(current);

      undoStack.pop();
      const previous = undoStack[undoStack.length - 1];
      applySnapshot(previous);
      updateHUD();
      updateStateObject();
    }

    function redo() {
      if (redoStack.length === 0) return;

      const snap = redoStack.pop();
      undoStack.push(getSnapshot());
      if (undoStack.length > maxHistory) undoStack.shift();
      applySnapshot(snap);
      updateHUD();
      updateStateObject();
    }

    function handleMovement(delta) {
      let moveX = 0;
      let moveZ = 0;
      let movementAction = false;

      if (keys["arrowleft"] || keys["a"]) {
        moveX -= moveSpeed;
        movementAction = true;
      }
      if (keys["arrowright"] || keys["d"]) {
        moveX += moveSpeed;
        movementAction = true;
      }
      if (keys["arrowup"] || keys["w"]) {
        moveZ -= moveSpeed;
        movementAction = true;
      }
      if (keys["arrowdown"] || keys["s"]) {
        moveZ += moveSpeed;
        movementAction = true;
      }

      if (movementAction) {
        clearRedoOnNewAction();
      }

      player.position.x += moveX * delta;
      player.position.z += moveZ * delta;
    }

    function resolvePlatformCollision(prevY) {
      isGrounded = false;
      let landedPlatform = -1;
      const playerBottom = player.position.y - playerHeight / 2;

      for (let i = 0; i < platforms.length; i++) {
        const p = platforms[i];
        const topY = p.position.y + platformThickness / 2;

        const withinX = Math.abs(player.position.x - p.position.x) <= platformHalfSize;
        const withinZ = Math.abs(player.position.z - p.position.z) <= platformHalfSize;
        const wasAboveTop = prevY - playerHeight / 2 >= topY - 0.15;
        const nearTop = playerBottom <= topY + 0.2 && playerBottom >= topY - 0.45;

        if (withinX && withinZ && wasAboveTop && nearTop && playerVelocity.y <= 0) {
          player.position.y = topY + playerHeight / 2;
          playerVelocity.y = 0;
          isGrounded = true;
          landedPlatform = i;
          break;
        }
      }

      currentPlatform = landedPlatform;

      if (!isGrounded) {
        currentPlatform = findNearestPlatform();
      }
    }

    function findNearestPlatform() {
      let nearest = -1;
      let bestDist = Infinity;

      for (let i = 0; i < platformPositions.length; i++) {
        const p = platformPositions[i];
        const dx = player.position.x - p.x;
        const dy = player.position.y - (p.y + platformThickness / 2 + playerHeight / 2);
        const dz = player.position.z - p.z;
        const dist = dx * dx + dy * dy + dz * dz;
        if (dist < bestDist) {
          bestDist = dist;
          nearest = i;
        }
      }

      return isGrounded ? nearest : (player.position.y < -4 ? -1 : nearest);
    }

    function resetToStartFromFall() {
      fallCount++;
      player.position.copy(startPosition);
      playerVelocity.set(0, 0, 0);
      currentPlatform = 0;
      isGrounded = true;
      goalReached = false;
      saveSnapshot(true);
    }

    function checkGoal() {
      if (currentPlatform === 7 && isGrounded) {
        goalReached = true;
      }
    }

    function updateCamera() {
      const targetPos = new THREE.Vector3(
        player.position.x,
        player.position.y + 3.5,
        player.position.z + 10
      );
      camera.position.lerp(targetPos, 0.06);
      camera.lookAt(player.position.x + 2, player.position.y, player.position.z);
    }

    function updateHUD() {
      const displayPlatform = currentPlatform >= 0 ? currentPlatform + 1 : "-";
      platformHud.textContent = `Platform: ${displayPlatform}/8`;
      timeHud.textContent = `Time: ${elapsedTime.toFixed(1)}s`;
      fallsHud.textContent = `Falls: ${fallCount}`;
      undoHud.textContent = `Undo: ${Math.max(undoStack.length - 1, 0)} | Redo: ${redoStack.length}`;
      goalHud.style.display = goalReached ? "block" : "none";
    }

    function updateStateObject() {
      window.__3D_STATE__ = {
        playerPosition: {
          x: player.position.x,
          y: player.position.y,
          z: player.position.z
        },
        playerVelocity: {
          x: playerVelocity.x,
          y: playerVelocity.y,
          z: playerVelocity.z
        },
        currentPlatform: currentPlatform >= 0 && currentPlatform < 8 ? currentPlatform : -1,
        isGrounded,
        fallCount,
        elapsedTime,
        undoStackSize: Math.max(undoStack.length - 1, 0),
        redoStackSize: redoStack.length,
        goalReached,
        platformCount: 8,
        totalPlatforms: platformPositions.map(p => ({ x: p.x, y: p.y, z: p.z })),
        gameActive,
        historyRecordCount
      };
    }

    function resetGame() {
      player.position.copy(startPosition);
      playerVelocity.set(0, 0, 0);
      currentPlatform = 0;
      isGrounded = true;
      fallCount = 0;
      elapsedTime = 0;
      goalReached = false;
      gameActive = true;
      historyRecordCount = 0;
      saveTimer = 0;
      undoStack.length = 0;
      redoStack.length = 0;
      for (const k in keys) keys[k] = false;
      saveSnapshot(true);
      updateHUD();
      updateStateObject();
      clock.getDelta();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);

      if (gameActive) {
        elapsedTime += delta;
        saveTimer += delta;

        const prevY = player.position.y;

        handleMovement(delta);

        playerVelocity.y += gravity * delta;
        player.position.y += playerVelocity.y * delta;

        resolvePlatformCollision(prevY);

        if (player.position.y < -5) {
          resetToStartFromFall();
        }

        checkGoal();

        if (saveTimer >= snapshotInterval) {
          saveSnapshot(false);
          saveTimer = 0;
        }
      }

      if (trophy && trophy !== null && trophy.rotation) {
        trophy.rotation.y += 0.01;
      }

      updateCamera();
      updateHUD();
      updateStateObject();

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
