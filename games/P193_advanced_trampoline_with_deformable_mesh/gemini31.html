<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Trampoline Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        #top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
        }
        #top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
            text-align: right;
        }
        #top-center {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
        }
        #bottom-center {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
        }
        #bottom-left {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 16px;
            color: #aaaaaa;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #444488;
            color: white;
            border: 2px solid #ffffff;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #6666aa;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui">
        <div id="top-left">Score: <span id="score">0</span></div>
        <div id="top-right">
            Bounces: <span id="bounces">0</span><br>
            Combo: <span id="combo">1.0x</span>
        </div>
        <div id="top-center">
            <button id="resetBtn">Reset</button>
        </div>
        <div id="bottom-center">
            Height: <span id="height">6.0</span>m | Max: <span id="maxHeight">6.0</span>m
        </div>
        <div id="bottom-left">
            WASD/Arrows to move
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 15, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Trampoline Structure ---
        const frameMat = new THREE.MeshPhongMaterial({ color: 0x444488 });
        const legMat = new THREE.MeshPhongMaterial({ color: 0x666666 });

        // Frame bars
        const barGeoX = new THREE.BoxGeometry(6, 0.3, 0.3);
        const barGeoZ = new THREE.BoxGeometry(0.3, 0.3, 5.4);
        
        const bar1 = new THREE.Mesh(barGeoX, frameMat);
        bar1.position.set(0, 2, 2.85);
        bar1.castShadow = true;
        scene.add(bar1);

        const bar2 = new THREE.Mesh(barGeoX, frameMat);
        bar2.position.set(0, 2, -2.85);
        bar2.castShadow = true;
        scene.add(bar2);

        const bar3 = new THREE.Mesh(barGeoZ, frameMat);
        bar3.position.set(2.85, 2, 0);
        bar3.castShadow = true;
        scene.add(bar3);

        const bar4 = new THREE.Mesh(barGeoZ, frameMat);
        bar4.position.set(-2.85, 2, 0);
        bar4.castShadow = true;
        scene.add(bar4);

        // Legs
        const legGeo = new THREE.BoxGeometry(0.3, 2, 0.3);
        const legPositions = [
            [2.85, 1, 2.85], [-2.85, 1, 2.85],
            [2.85, 1, -2.85], [-2.85, 1, -2.85]
        ];
        legPositions.forEach(pos => {
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(...pos);
            leg.castShadow = true;
            scene.add(leg);
        });

        // Deformable Surface
        const surfaceGeo = new THREE.PlaneGeometry(5.4, 5.4, 20, 20);
        const surfaceMat = new THREE.MeshPhongMaterial({ color: 0x2288ff, side: THREE.DoubleSide });
        const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
        surface.rotation.x = -Math.PI / 2;
        surface.position.y = 2;
        surface.receiveShadow = true;
        scene.add(surface);

        const wireframeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.3 });
        const wireframe = new THREE.Mesh(surfaceGeo, wireframeMat);
        wireframe.rotation.x = -Math.PI / 2;
        wireframe.position.y = 2;
        scene.add(wireframe);

        // --- Ball ---
        const ballRadius = 0.4;
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.castShadow = true;
        scene.add(ball);

        // --- Physics & State Variables ---
        const gravity = -9.8;
        const trampolineY = 2.0;
        const springK = 25;
        const maxBounceVel = 12;
        const restitution = 1.05;

        let ballPos = new THREE.Vector3(0, 6, 0);
        let ballVel = new THREE.Vector3(0, 0, 0);
        let isFallen = false;
        let wasInContact = false;
        let isInContact = false;

        let bounceCount = 0;
        let score = 0;
        const combos = [1.0, 1.5, 2.0, 2.5, 3.0];
        let comboIndex = 0;
        let flightMaxHeight = 6.0;
        let overallMaxHeight = 6.0;
        let meshDeformation = 0;

        const clock = new THREE.Clock();

        // Input handling
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // UI Elements
        const elScore = document.getElementById('score');
        const elBounces = document.getElementById('bounces');
        const elCombo = document.getElementById('combo');
        const elHeight = document.getElementById('height');
        const elMaxHeight = document.getElementById('maxHeight');
        
        document.getElementById('resetBtn').addEventListener('click', resetSimulation);

        function resetSimulation() {
            ballPos.set(0, 6, 0);
            ballVel.set(0, 0, 0);
            isFallen = false;
            wasInContact = false;
            isInContact = false;
            bounceCount = 0;
            score = 0;
            comboIndex = 0;
            flightMaxHeight = 6.0;
            overallMaxHeight = 6.0;
            
            const positions = surfaceGeo.attributes.position.array;
            for (let i = 2; i < positions.length; i += 3) {
                positions[i] = 0;
            }
            surfaceGeo.attributes.position.needsUpdate = true;
            surfaceGeo.computeVertexNormals();
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            let dt = clock.getDelta();
            if (dt > 0.033) dt = 0.033; // Cap at ~30fps

            // Lateral Movement
            let ax = 0, az = 0;
            if (keys.w || keys.ArrowUp) az -= 5;
            if (keys.s || keys.ArrowDown) az += 5;
            if (keys.a || keys.ArrowLeft) ax -= 5;
            if (keys.d || keys.ArrowRight) ax += 5;

            ballVel.x += ax * dt;
            ballVel.z += az * dt;

            // Damping
            ballVel.x *= 0.95;
            ballVel.z *= 0.95;

            // Clamp lateral speed
            const speedSq = ballVel.x * ballVel.x + ballVel.z * ballVel.z;
            if (speedSq > 16) {
                const speed = Math.sqrt(speedSq);
                ballVel.x = (ballVel.x / speed) * 4;
                ballVel.z = (ballVel.z / speed) * 4;
            }

            // Vertical Physics
            ballVel.y += gravity * dt;
            
            ballPos.x += ballVel.x * dt;
            ballPos.y += ballVel.y * dt;
            ballPos.z += ballVel.z * dt;

            const bottomY = ballPos.y - ballRadius;
            wasInContact = isInContact;
            isInContact = false;

            // Check fall off
            if (!isFallen) {
                if (Math.abs(ballPos.x) > 3 || Math.abs(ballPos.z) > 3) {
                    if (bottomY <= trampolineY) {
                        isFallen = true;
                    }
                } else if (bottomY <= trampolineY) {
                    isInContact = true;
                }
            }

            if (isInContact) {
                const penetration = trampolineY - bottomY;
                const springForce = springK * penetration;
                ballVel.y += springForce * dt;
            }

            // Ground collision
            if (bottomY < 0) {
                ballPos.y = ballRadius;
                ballVel.y = 0;
                ballVel.x = 0;
                ballVel.z = 0;
            }

            // Restitution & Scoring on leaving trampoline
            if (wasInContact && !isInContact && ballVel.y > 0) {
                ballVel.y *= restitution;
                if (ballVel.y > maxBounceVel) ballVel.y = maxBounceVel;
            }

            // Scoring on landing
            if (!wasInContact && isInContact) {
                bounceCount++;
                
                const latDist = Math.sqrt(ballPos.x * ballPos.x + ballPos.z * ballPos.z);
                if (latDist > 1.0) {
                    comboIndex = 0;
                }
                
                const currentMultiplier = combos[comboIndex];
                score += Math.round(flightMaxHeight * 10) * currentMultiplier;
                
                if (latDist <= 1.0) {
                    comboIndex = Math.min(comboIndex + 1, 4);
                }
                
                flightMaxHeight = ballPos.y;
            }

            // Track heights
            if (!isInContact) {
                if (ballPos.y > flightMaxHeight) flightMaxHeight = ballPos.y;
                if (ballPos.y > overallMaxHeight) overallMaxHeight = ballPos.y;
            }

            // Update Mesh Deformation
            meshDeformation = 0;
            const positions = surfaceGeo.attributes.position.array;
            
            for (let i = 0; i < positions.length; i += 3) {
                const vx = positions[i];
                const vy = positions[i+1]; // local Y is world -Z
                const worldX = vx;
                const worldZ = -vy;

                let targetZ = 0; // local Z is world Y offset

                if (isInContact) {
                    const dx = worldX - ballPos.x;
                    const dz = worldZ - ballPos.z;
                    const distSq = dx * dx + dz * dz;
                    
                    if (distSq < 4.0) {
                        const dist = Math.sqrt(distSq);
                        const falloff = Math.exp(-(dist * dist) / 0.8);
                        const pen = trampolineY - bottomY;
                        if (pen > 0) {
                            targetZ = -Math.min(pen, 1.5) * falloff;
                        }
                    }
                }

                if (isInContact && targetZ < positions[i+2]) {
                    positions[i+2] = targetZ; // Snap down
                } else {
                    positions[i+2] += (targetZ - positions[i+2]) * 0.1; // Lerp back up
                }
                
                if (Math.abs(positions[i+2]) > meshDeformation) {
                    meshDeformation = Math.abs(positions[i+2]);
                }
            }
            
            surfaceGeo.attributes.position.needsUpdate = true;
            surfaceGeo.computeVertexNormals();

            // Update Ball Mesh
            ball.position.copy(ballPos);

            // Update UI
            elScore.innerText = Math.round(score);
            elBounces.innerText = bounceCount;
            elCombo.innerText = combos[comboIndex].toFixed(1) + 'x';
            elHeight.innerText = ballPos.y.toFixed(1);
            elMaxHeight.innerText = overallMaxHeight.toFixed(1);

            // Update Global State
            window.__3D_STATE__ = {
                ballPosition: { x: ballPos.x, y: ballPos.y, z: ballPos.z },
                ballVelocity: { x: ballVel.x, y: ballVel.y, z: ballVel.z },
                bounceCount: bounceCount,
                score: score,
                comboMultiplier: combos[comboIndex],
                currentHeight: ballPos.y,
                maxHeight: overallMaxHeight,
                meshDeformation: meshDeformation,
                isOnTrampoline: isInContact,
                isFallen: isFallen,
                isSimulationRunning: true,
                lateralDistance: Math.sqrt(ballPos.x * ballPos.x + ballPos.z * ballPos.z)
            };

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        animate();
    </script>
</body>
</html>
