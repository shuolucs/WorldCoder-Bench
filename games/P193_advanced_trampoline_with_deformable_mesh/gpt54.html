<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Trampoline Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      z-index: 10;
    }

    #score {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 24px;
    }

    #stats {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 20px;
      text-align: right;
    }

    #heightInfo {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
    }

    #instructions {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-size: 16px;
      opacity: 0.9;
    }

    #resetBtn {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: auto;
      padding: 8px 16px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #ffffff;
      color: #111;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    #resetBtn:hover {
      background: #eaeaea;
    }

    #message {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      color: #ffdddd;
      text-align: center;
    }
  </style>
</head>
<body>
  <button id="resetBtn">Reset</button>

  <div id="hud">
    <div id="score">Score: 0</div>
    <div id="stats">Bounces: 0<br>Combo: 1.0x</div>
    <div id="heightInfo">Height: 6.0m | Max: 6.0m</div>
    <div id="instructions">WASD/Arrows to move</div>
    <div id="message"></div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 15, 5);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(2048, 2048);
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 50;
    directionalLight.shadow.camera.left = -20;
    directionalLight.shadow.camera.right = 20;
    directionalLight.shadow.camera.top = 20;
    directionalLight.shadow.camera.bottom = -20;
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshPhongMaterial({ color: 0x333333 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const trampolineGroup = new THREE.Group();
    scene.add(trampolineGroup);

    const frameMaterial = new THREE.MeshPhongMaterial({
      color: 0x444488,
      shininess: 100
    });

    const legMaterial = new THREE.MeshPhongMaterial({
      color: 0x666666,
      shininess: 80
    });

    const barThickness = 0.3;
    const frameSize = 6;
    const frameY = 2;

    function createBar(w, h, d, x, y, z) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        frameMaterial
      );
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      trampolineGroup.add(mesh);
    }

    createBar(6, barThickness, barThickness, 0, frameY, -3);
    createBar(6, barThickness, barThickness, 0, frameY, 3);
    createBar(barThickness, barThickness, 6, -3, frameY, 0);
    createBar(barThickness, barThickness, 6, 3, frameY, 0);

    function createLeg(x, z) {
      const leg = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, 2, 0.3),
        legMaterial
      );
      leg.position.set(x, 1, z);
      leg.castShadow = true;
      leg.receiveShadow = true;
      trampolineGroup.add(leg);
    }

    createLeg(-3, -3);
    createLeg(3, -3);
    createLeg(-3, 3);
    createLeg(3, 3);

    const surfaceGeometry = new THREE.PlaneGeometry(5.4, 5.4, 20, 20);
    surfaceGeometry.rotateX(-Math.PI / 2);

    const surfaceMaterial = new THREE.MeshPhongMaterial({
      color: 0x2288ff,
      side: THREE.DoubleSide,
      shininess: 80
    });

    const trampolineSurface = new THREE.Mesh(surfaceGeometry, surfaceMaterial);
    trampolineSurface.position.y = frameY;
    trampolineSurface.receiveShadow = true;
    trampolineSurface.castShadow = true;
    trampolineGroup.add(trampolineSurface);

    const wireframe = new THREE.LineSegments(
      new THREE.WireframeGeometry(surfaceGeometry),
      new THREE.LineBasicMaterial({ color: 0xbbe0ff, transparent: true, opacity: 0.65 })
    );
    wireframe.position.copy(trampolineSurface.position);
    trampolineGroup.add(wireframe);

    const positionAttr = surfaceGeometry.attributes.position;
    const originalPositions = new Float32Array(positionAttr.array.length);
    originalPositions.set(positionAttr.array);

    const tempVec = new THREE.Vector3();

    const ballRadius = 0.4;
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(ballRadius, 32, 32),
      new THREE.MeshPhongMaterial({ color: 0xff4444 })
    );
    ball.position.set(0, 6, 0);
    ball.castShadow = true;
    ball.receiveShadow = true;
    scene.add(ball);

    const gravity = -9.8;
    const springK = 25;
    const restitution = 1.05;
    const maxBounceVelocity = 12;
    const trampolineTopY = 2;
    const moveAccel = 5;
    const maxHorizontalSpeed = 4;
    const horizontalDamping = 0.95;

    const velocity = new THREE.Vector3(0, 0, 0);

    let bounceCount = 0;
    let score = 0;
    let comboMultiplier = 1.0;
    let maxHeightOverall = ball.position.y;
    let currentBouncePeak = ball.position.y;
    let lastBouncePeak = ball.position.y;
    let wasOnTrampoline = false;
    let isOnTrampoline = false;
    let isFallen = false;
    let isSimulationRunning = true;
    let bouncePeakTracking = true;

    const keys = {};
    window.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
    });
    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    const scoreEl = document.getElementById("score");
    const statsEl = document.getElementById("stats");
    const heightEl = document.getElementById("heightInfo");
    const messageEl = document.getElementById("message");
    const resetBtn = document.getElementById("resetBtn");

    function resetSurface() {
      positionAttr.array.set(originalPositions);
      positionAttr.needsUpdate = true;
      surfaceGeometry.computeVertexNormals();
      if (wireframe.geometry) wireframe.geometry.dispose();
      wireframe.geometry = new THREE.WireframeGeometry(surfaceGeometry);
    }

    function resetSimulation() {
      ball.position.set(0, 6, 0);
      velocity.set(0, 0, 0);
      bounceCount = 0;
      score = 0;
      comboMultiplier = 1.0;
      maxHeightOverall = ball.position.y;
      currentBouncePeak = ball.position.y;
      lastBouncePeak = ball.position.y;
      wasOnTrampoline = false;
      isOnTrampoline = false;
      isFallen = false;
      isSimulationRunning = true;
      bouncePeakTracking = true;
      messageEl.textContent = "";
      resetSurface();
      updateHUD();
      updateState(0);
    }

    resetBtn.addEventListener("click", resetSimulation);

    function getInputDirection() {
      let x = 0;
      let z = 0;
      if (keys["arrowleft"] || keys["a"]) x -= 1;
      if (keys["arrowright"] || keys["d"]) x += 1;
      if (keys["arrowup"] || keys["w"]) z -= 1;
      if (keys["arrowdown"] || keys["s"]) z += 1;
      const dir = new THREE.Vector2(x, z);
      if (dir.lengthSq() > 1) dir.normalize();
      return dir;
    }

    function deformSurface(ballX, ballZ, impactStrength) {
      let maxDep = 0;
      const influenceRadius = 2.0;
      const maxDepression = Math.min(1.5, 0.3 + impactStrength * 0.12);

      for (let i = 0; i < positionAttr.count; i++) {
        const ix = i * 3;
        const localX = originalPositions[ix];
        const localY = originalPositions[ix + 1];
        const localZ = originalPositions[ix + 2];

        const worldX = localX;
        const worldZ = localZ;

        const dx = worldX - ballX;
        const dz = worldZ - ballZ;
        const dist = Math.sqrt(dx * dx + dz * dz);

        let targetY = localY;
        if (dist < influenceRadius) {
          const t = dist / influenceRadius;
          const gaussian = Math.exp(-4 * t * t);
          const depression = maxDepression * gaussian;
          targetY = localY - depression;
          if (depression > maxDep) maxDep = depression;
        } else {
          const currentY = positionAttr.array[ix + 1];
          targetY = THREE.MathUtils.lerp(currentY, localY, 0.1);
        }

        positionAttr.array[ix] = localX;
        positionAttr.array[ix + 1] = targetY;
        positionAttr.array[ix + 2] = localZ;
      }

      positionAttr.needsUpdate = true;
      surfaceGeometry.computeVertexNormals();
      if (wireframe.geometry) wireframe.geometry.dispose();
      wireframe.geometry = new THREE.WireframeGeometry(surfaceGeometry);

      return maxDep;
    }

    function relaxSurface() {
      let maxDisplacement = 0;
      for (let i = 0; i < positionAttr.count; i++) {
        const ix = i * 3;
        const currentY = positionAttr.array[ix + 1];
        const originalY = originalPositions[ix + 1];
        const newY = THREE.MathUtils.lerp(currentY, originalY, 0.1);
        positionAttr.array[ix + 1] = newY;
        const disp = Math.abs(newY - originalY);
        if (disp > maxDisplacement) maxDisplacement = disp;
      }
      positionAttr.needsUpdate = true;
      surfaceGeometry.computeVertexNormals();
      if (wireframe.geometry) wireframe.geometry.dispose();
      wireframe.geometry = new THREE.WireframeGeometry(surfaceGeometry);
      return maxDisplacement;
    }

    function getSurfaceDepressionAt(x, z) {
      const influenceRadius = 2.0;
      let maxEffect = 0;
      for (let i = 0; i < positionAttr.count; i++) {
        const ix = i * 3;
        const vx = positionAttr.array[ix];
        const vy = positionAttr.array[ix + 1];
        const vz = positionAttr.array[ix + 2];
        const dx = vx - x;
        const dz = vz - z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < influenceRadius) {
          const dep = -vy;
          const weight = Math.exp(-2 * (dist / influenceRadius) ** 2);
          maxEffect = Math.max(maxEffect, dep * weight);
        }
      }
      return maxEffect;
    }

    function updateHUD() {
      scoreEl.textContent = `Score: ${Math.round(score)}`;
      statsEl.innerHTML = `Bounces: ${bounceCount}<br>Combo: ${comboMultiplier.toFixed(1)}x`;
      heightEl.textContent = `Height: ${ball.position.y.toFixed(1)}m | Max: ${maxHeightOverall.toFixed(1)}m`;
    }

    function updateState(meshDeformation) {
      const lateralDistance = Math.sqrt(ball.position.x * ball.position.x + ball.position.z * ball.position.z);
      window.__3D_STATE__ = {
        ballPosition: { x: ball.position.x, y: ball.position.y, z: ball.position.z },
        ballVelocity: { x: velocity.x, y: velocity.y, z: velocity.z },
        bounceCount,
        score: Math.round(score),
        comboMultiplier,
        currentHeight: ball.position.y,
        maxHeight: maxHeightOverall,
        meshDeformation,
        isOnTrampoline,
        isFallen,
        isSimulationRunning,
        lateralDistance
      };
    }

    function endRound() {
      isFallen = true;
      isSimulationRunning = false;
      messageEl.textContent = "You fell off the trampoline! Press Reset to play again.";
    }

    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);

      let dt = (now - lastTime) / 1000;
      lastTime = now;
      dt = Math.min(dt || 0.016, 0.033);

      let meshDeformation = 0;

      if (isSimulationRunning) {
        const input = getInputDirection();

        velocity.x += input.x * moveAccel * dt;
        velocity.z += input.z * moveAccel * dt;

        const horizSpeed = Math.sqrt(velocity.x * velocity.x + velocity.z * velocity.z);
        if (horizSpeed > maxHorizontalSpeed) {
          const scale = maxHorizontalSpeed / horizSpeed;
          velocity.x *= scale;
          velocity.z *= scale;
        }

        velocity.x *= horizontalDamping;
        velocity.z *= horizontalDamping;

        velocity.y += gravity * dt;

        ball.position.x += velocity.x * dt;
        ball.position.y += velocity.y * dt;
        ball.position.z += velocity.z * dt;

        if (ball.position.y > currentBouncePeak) currentBouncePeak = ball.position.y;
        if (ball.position.y > maxHeightOverall) maxHeightOverall = ball.position.y;

        const lateralDistance = Math.sqrt(ball.position.x * ball.position.x + ball.position.z * ball.position.z);
        const overTrampolineBounds = Math.abs(ball.position.x) <= 3 && Math.abs(ball.position.z) <= 3;

        const ballBottom = ball.position.y - ballRadius;
        const contactThreshold = trampolineTopY + 0.02;

        isOnTrampoline = overTrampolineBounds && ballBottom <= contactThreshold && velocity.y <= 0.5 && ball.position.y > 1.0;

        if (isOnTrampoline) {
          const impactStrength = Math.abs(velocity.y);
          meshDeformation = deformSurface(ball.position.x, ball.position.z, impactStrength);

          const effectiveCompression = Math.min(1.5, Math.max(0.05, (trampolineTopY - ballBottom) + meshDeformation));
          const springForce = springK * effectiveCompression;
          velocity.y += springForce * dt;

          if (ballBottom < trampolineTopY - meshDeformation * 0.6) {
            ball.position.y = trampolineTopY + ballRadius - meshDeformation * 0.35;
          }

          if (velocity.y > 0.5 && !wasOnTrampoline) {
            // no-op safeguard
          }

          if (velocity.y > 0 && !wasOnTrampoline) {
            bounceCount++;

            lastBouncePeak = currentBouncePeak;
            const basePoints = Math.round(lastBouncePeak * 10);

            if (lateralDistance <= 1) {
              comboMultiplier = Math.min(3.0, comboMultiplier + 0.5);
            } else {
              comboMultiplier = 1.0;
            }

            score += basePoints * comboMultiplier;
            currentBouncePeak = ball.position.y;

            velocity.y *= restitution;
            velocity.y = Math.min(velocity.y, maxBounceVelocity);
          }

          if (velocity.y > 0 && wasOnTrampoline) {
            velocity.y = Math.min(velocity.y * restitution, maxBounceVelocity);
          }
        } else {
          meshDeformation = relaxSurface();
        }

        if (!wasOnTrampoline && isOnTrampoline && velocity.y < 0) {
          // impact detection at touchdown
          bouncePeakTracking = false;
        }

        if (wasOnTrampoline && !isOnTrampoline && velocity.y > 0) {
          bouncePeakTracking = true;
          currentBouncePeak = ball.position.y;
        }

        wasOnTrampoline = isOnTrampoline;

        if (!overTrampolineBounds && ball.position.y <= trampolineTopY + 0.5) {
          // off trampoline at trampoline level -> falling off
          if (ball.position.y > 0) {
            isOnTrampoline = false;
          }
        }

        if ((Math.abs(ball.position.x) > 3 || Math.abs(ball.position.z) > 3) && ball.position.y <= 2.2) {
          isOnTrampoline = false;
        }

        if ((Math.abs(ball.position.x) > 3 || Math.abs(ball.position.z) > 3) && ball.position.y - ballRadius <= 0) {
          ball.position.y = ballRadius;
          velocity.set(0, 0, 0);
          endRound();
        }

        if (ball.position.y - ballRadius < 0 && !isFallen) {
          if (Math.abs(ball.position.x) > 3 || Math.abs(ball.position.z) > 3) {
            ball.position.y = ballRadius;
            velocity.set(0, 0, 0);
            endRound();
          } else {
            ball.position.y = ballRadius;
            velocity.y = 0;
          }
        }
      } else {
        meshDeformation = relaxSurface();
      }

      updateHUD();
      updateState(meshDeformation);
      renderer.render(scene, camera);
    }

    resetSimulation();
    requestAnimationFrame(animate);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
