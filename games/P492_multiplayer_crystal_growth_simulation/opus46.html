<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Multiplayer Crystal Growth Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#player-panel {
  position: fixed;
  top: 20px;
  left: 20px;
  background: rgba(10, 10, 30, 0.85);
  border: 1px solid rgba(100, 100, 200, 0.3);
  border-radius: 12px;
  padding: 16px 20px;
  color: #ccc;
  min-width: 200px;
  backdrop-filter: blur(10px);
  z-index: 10;
}

#player-panel h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #667;
  margin-bottom: 10px;
}

#player-panel .player-name {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}

#player-panel .color-indicator {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: inline-block;
  box-shadow: 0 0 8px currentColor;
}

#player-panel .stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 3px 0;
  color: #99a;
}

#player-panel .stat-row span:last-child {
  color: #dde;
  font-weight: 600;
}

#stats-panel {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(10, 10, 30, 0.85);
  border: 1px solid rgba(100, 100, 200, 0.3);
  border-radius: 12px;
  padding: 16px 20px;
  color: #ccc;
  min-width: 200px;
  backdrop-filter: blur(10px);
  z-index: 10;
}

#stats-panel h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #667;
  margin-bottom: 10px;
}

#stats-panel .stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 3px 0;
  color: #99a;
}

#stats-panel .stat-row span:last-child {
  color: #dde;
  font-weight: 600;
}

.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: bold;
}

.status-active { background: rgba(68, 255, 100, 0.2); color: #4f4; }
.status-paused { background: rgba(255, 200, 68, 0.2); color: #fc4; }
.status-resonance { background: rgba(180, 68, 255, 0.2); color: #b4f; }

#button-bar {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 10;
}

#button-bar button {
  background: rgba(10, 10, 30, 0.85);
  border: 1px solid rgba(100, 100, 200, 0.3);
  border-radius: 8px;
  padding: 10px 20px;
  color: #aab;
  font-size: 13px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.2s;
  font-family: inherit;
}

#button-bar button:hover {
  background: rgba(30, 30, 60, 0.9);
  border-color: rgba(140, 140, 255, 0.5);
  color: #dde;
}

#button-bar button.active {
  border-color: rgba(180, 68, 255, 0.6);
  color: #b4f;
  box-shadow: 0 0 12px rgba(180, 68, 255, 0.2);
}

#controls-help {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(150, 150, 180, 0.5);
  font-size: 11px;
  text-align: center;
  z-index: 10;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="player-panel">
  <h3>Active Player</h3>
  <div class="player-name" id="player-name-display">
    <span class="color-indicator" id="player-color"></span>
    <span id="player-name-text">Azure</span>
  </div>
  <div class="stat-row"><span>Crystals</span><span id="player-crystals">0</span></div>
  <div class="stat-row"><span>Segments</span><span id="player-segments">0</span></div>
</div>

<div id="stats-panel">
  <h3>Simulation Stats</h3>
  <div class="stat-row"><span>Total Crystals</span><span id="total-crystals">0</span></div>
  <div class="stat-row"><span>Total Segments</span><span id="total-segments">0</span></div>
  <div class="stat-row"><span>Growth Mode</span><span id="growth-mode">fractal</span></div>
  <div class="stat-row"><span>Status</span><span id="status-badge"><span class="status-badge status-active">Growing</span></span></div>
  <div class="stat-row"><span>Resonance</span><span id="resonance-badge"><span class="status-badge" style="background:rgba(100,100,100,0.2);color:#888;">Off</span></span></div>
  <div class="stat-row"><span>Frozen</span><span id="frozen-count">0</span></div>
</div>

<div id="button-bar">
  <button id="btn-pause">⏸ Pause</button>
  <button id="btn-resonance">✦ Resonance</button>
  <button id="btn-clear-all">✕ Clear All</button>
</div>

<div id="controls-help">
  Click: Place Crystal &nbsp;|&nbsp; TAB: Switch Player &nbsp;|&nbsp; SPACE: Pause &nbsp;|&nbsp; R: Resonance &nbsp;|&nbsp; F: Freeze &nbsp;|&nbsp; D: Delete &nbsp;|&nbsp; 1/2: Growth Mode
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {

// State
window.__3D_STATE__ = {
  activePlayer: 1,
  player1Crystals: 0,
  player2Crystals: 0,
  player1Segments: 0,
  player2Segments: 0,
  totalCrystals: 0,
  totalSegments: 0,
  growthMode: 'fractal',
  isPaused: false,
  isResonance: false,
  growthSpeed: 500,
  frozenCount: 0,
  lastAction: '',
  crystalPositions: [],
  sceneReady: false
};

const STATE = window.__3D_STATE__;

const players = {
  1: { color: 0x44aaff, name: 'Azure' },
  2: { color: 0xff44aa, name: 'Rose' }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x0a0a1a, 1, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x8844ff, 0.6, 50);
pointLight.position.set(0, 5, 0);
scene.add(pointLight);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(40, 40, 40, 40);
const groundMat = new THREE.MeshBasicMaterial({
  color: 0x222244,
  transparent: true,
  opacity: 0.3,
  wireframe: true,
  side: THREE.DoubleSide
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

// Invisible ground for raycasting
const groundPlaneGeom = new THREE.PlaneGeometry(40, 40);
const groundPlaneMat = new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide });
const groundPlane = new THREE.Mesh(groundPlaneGeom, groundPlaneMat);
groundPlane.rotation.x = -Math.PI / 2;
groundPlane.position.y = 0;
scene.add(groundPlane);

// Crystal data
const crystals = []; // Array of crystal objects

class Crystal {
  constructor(x, z, player) {
    this.x = x;
    this.z = z;
    this.player = player;
    this.color = new THREE.Color(players[player].color);
    this.group = new THREE.Group();
    this.group.position.set(x, 0, z);
    this.segments = [];
    this.growthQueue = [];
    this.frozen = false;
    this.segmentCount = 0;
    this.maxSegments = 30;
    this.maxHeight = 12;
    this.lastGrowthTime = 0;

    scene.add(this.group);

    // Add initial seed
    this.addSegment(new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 1, 0), null);
  }

  addSegment(position, direction, parent) {
    if (this.segmentCount >= this.maxSegments) return;
    if (position.y + this.group.position.y > this.maxHeight) return;

    const radius = 0.3 + Math.random() * 0.5;
    const geom = new THREE.OctahedronGeometry(radius, 0);

    const mat = new THREE.MeshPhysicalMaterial({
      color: this.color.clone(),
      transmission: 0.6,
      roughness: 0.1,
      metalness: 0.2,
      emissive: this.color.clone().multiplyScalar(0.15),
      emissiveIntensity: STATE.isResonance ? 0.5 : 0.15,
      transparent: true,
      opacity: 0.85,
      side: THREE.DoubleSide
    });

    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.copy(position);

    // Slight random rotation for organic look
    mesh.rotation.set(
      Math.random() * Math.PI * 0.3,
      Math.random() * Math.PI * 2,
      Math.random() * Math.PI * 0.3
    );

    // Scale animation
    mesh.scale.set(0.01, 0.01, 0.01);

    this.group.add(mesh);

    const segment = {
      mesh,
      position: position.clone(),
      direction: direction.clone().normalize(),
      radius,
      children: [],
      parent,
      grown: false
    };

    this.segments.push(segment);
    this.segmentCount++;

    // Update state
    if (this.player === 1) STATE.player1Segments++;
    else STATE.player2Segments++;
    STATE.totalSegments++;

    // Add to growth queue
    this.growthQueue.push(segment);

    return segment;
  }

  grow() {
    if (this.frozen) return;
    if (this.segmentCount >= this.maxSegments) return;

    // Find segments that haven't grown children yet
    const ungrown = this.growthQueue.filter(s => !s.grown);
    if (ungrown.length === 0) return;

    const segment = ungrown[0];
    segment.grown = true;

    const branchCount = STATE.growthMode === 'linear' ? 1 : Math.floor(1 + Math.random() * 3);

    for (let i = 0; i < branchCount; i++) {
      if (this.segmentCount >= this.maxSegments) break;

      const angle = (15 + Math.random() * 30) * Math.PI / 180;
      const rotAxis = new THREE.Vector3(
        Math.random() - 0.5,
        Math.random() * 0.3,
        Math.random() - 0.5
      ).normalize();

      const newDir = segment.direction.clone().applyAxisAngle(rotAxis, angle).normalize();
      // Bias upward
      newDir.y = Math.abs(newDir.y) * 0.8 + 0.4;
      newDir.normalize();

      const length = 0.6 + Math.random() * 0.8;
      const newPos = segment.position.clone().add(newDir.clone().multiplyScalar(length));

      if (newPos.y > this.maxHeight) continue;

      const child = this.addSegment(newPos, newDir, segment);
      if (child) {
        segment.children.push(child);
      }
    }
  }

  freeze() {
    this.frozen = true;
    // Mix 30% white into color
    this.segments.forEach(seg => {
      const mat = seg.mesh.material;
      const c = mat.color.clone();
      c.lerp(new THREE.Color(0xffffff), 0.3);
      mat.color = c;
      mat.emissive = c.clone().multiplyScalar(0.1);
      mat.needsUpdate = true;
    });
  }

  setResonance(active) {
    this.segments.forEach(seg => {
      seg.mesh.material.emissiveIntensity = active ? 0.5 : 0.15;
    });
  }

  update(time) {
    // Animate segment scales
    this.segments.forEach(seg => {
      if (seg.mesh.scale.x < 1) {
        seg.mesh.scale.x = Math.min(1, seg.mesh.scale.x + 0.05);
        seg.mesh.scale.y = Math.min(1, seg.mesh.scale.y + 0.05);
        seg.mesh.scale.z = Math.min(1, seg.mesh.scale.z + 0.05);
      }
      // Subtle floating animation
      if (!this.frozen) {
        seg.mesh.rotation.y += 0.002;
      }
    });
  }

  remove() {
    // Remove segments count from state
    const count = this.segmentCount;
    if (this.player === 1) STATE.player1Segments -= count;
    else STATE.player2Segments -= count;
    STATE.totalSegments -= count;

    scene.remove(this.group);

    // Dispose geometries and materials
    this.segments.forEach(seg => {
      seg.mesh.geometry.dispose();
      seg.mesh.material.dispose();
    });
  }
}

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Place crystal on click
renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(groundPlane);

  if (intersects.length > 0) {
    const point = intersects[0].point;
    // Clamp to ground bounds
    const cx = Math.max(-19, Math.min(19, point.x));
    const cz = Math.max(-19, Math.min(19, point.z));

    const crystal = new Crystal(cx, cz, STATE.activePlayer);
    crystals.push(crystal);

    if (STATE.activePlayer === 1) STATE.player1Crystals++;
    else STATE.player2Crystals++;
    STATE.totalCrystals++;

    STATE.crystalPositions.push({ x: cx, z: cz, player: STATE.activePlayer });
    STATE.lastAction = 'placed_crystal';
    updateHUD();
  }
});

// Keyboard controls
document.addEventListener('keydown', (event) => {
  switch (event.code) {
    case 'Tab':
      event.preventDefault();
      STATE.activePlayer = STATE.activePlayer === 1 ? 2 : 1;
      STATE.lastAction = 'switched_player';
      updateHUD();
      break;

    case 'Space':
      event.preventDefault();
      STATE.isPaused = !STATE.isPaused;
      STATE.lastAction = 'toggled_pause';
      updateHUD();
      break;

    case 'KeyR':
      STATE.isResonance = !STATE.isResonance;
      STATE.growthSpeed = STATE.isResonance ? 250 : 500;
      crystals.forEach(c => c.setResonance(STATE.isResonance));
      STATE.lastAction = 'activated_resonance';
      updateHUD();
      break;

    case 'KeyF': {
      // Freeze nearest crystal to camera center
      raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      let nearest = null;
      let nearestDist = Infinity;
      crystals.forEach(c => {
        if (c.frozen) return;
        const pos = new THREE.Vector3(c.x, 0, c.z);
        const dist = raycaster.ray.distanceToPoint(pos);
        if (dist < nearestDist) {
          nearestDist = dist;
          nearest = c;
        }
      });
      if (nearest) {
        nearest.freeze();
        STATE.frozenCount++;
        STATE.lastAction = 'froze_crystal';
        updateHUD();
      }
      break;
    }

    case 'KeyD': {
      // Delete last placed crystal of active player
      for (let i = crystals.length - 1; i >= 0; i--) {
        if (crystals[i].player === STATE.activePlayer) {
          const c = crystals[i];
          c.remove();
          crystals.splice(i, 1);

          if (STATE.activePlayer === 1) STATE.player1Crystals--;
          else STATE.player2Crystals--;
          STATE.totalCrystals--;

          if (c.frozen) STATE.frozenCount--;

          // Remove from positions
          for (let j = STATE.crystalPositions.length - 1; j >= 0; j--) {
            if (STATE.crystalPositions[j].x === c.x && STATE.crystalPositions[j].z === c.z && STATE.crystalPositions[j].player === c.player) {
              STATE.crystalPositions.splice(j, 1);
              break;
            }
          }

          STATE.lastAction = 'deleted_crystal';
          updateHUD();
          break;
        }
      }
      break;
    }

    case 'Digit1':
      STATE.growthMode = 'linear';
      STATE.lastAction = 'set_linear';
      updateHUD();
      break;

    case 'Digit2':
      STATE.growthMode = 'fractal';
      STATE.lastAction = 'set_fractal';
      updateHUD();
      break;
  }
});

// Button handlers
document.getElementById('btn-pause').addEventListener('click', () => {
  STATE.isPaused = !STATE.isPaused;
  STATE.lastAction = 'toggled_pause';
  updateHUD();
});

document.getElementById('btn-resonance').addEventListener('click', () => {
  STATE.isResonance = !STATE.isResonance;
  STATE.growthSpeed = STATE.isResonance ? 250 : 500;
  crystals.forEach(c => c.setResonance(STATE.isResonance));
  STATE.lastAction = 'activated_resonance';
  updateHUD();
});

document.getElementById('btn-clear-all').addEventListener('click', () => {
  crystals.forEach(c => c.remove());
  crystals.length = 0;
  STATE.player1Crystals = 0;
  STATE.player2Crystals = 0;
  STATE.player1Segments = 0;
  STATE.player2Segments = 0;
  STATE.totalCrystals = 0;
  STATE.totalSegments = 0;
  STATE.frozenCount = 0;
  STATE.crystalPositions = [];
  STATE.lastAction = 'cleared_all';
  updateHUD();
});

// HUD update
function updateHUD() {
  const p = players[STATE.activePlayer];
  const colorHex = '#' + new THREE.Color(p.color).getHexString();

  document.getElementById('player-name-text').textContent = p.name;
  document.getElementById('player-color').style.backgroundColor = colorHex;
  document.getElementById('player-color').style.color = colorHex;

  const pCrystals = STATE.activePlayer === 1 ? STATE.player1Crystals : STATE.player2Crystals;
  const pSegments = STATE.activePlayer === 1 ? STATE.player1Segments : STATE.player2Segments;
  document.getElementById('player-crystals').textContent = pCrystals;
  document.getElementById('player-segments').textContent = pSegments;

  document.getElementById('total-crystals').textContent = STATE.totalCrystals;
  document.getElementById('total-segments').textContent = STATE.totalSegments;
  document.getElementById('growth-mode').textContent = STATE.growthMode;
  document.getElementById('frozen-count').textContent = STATE.frozenCount;

  if (STATE.isPaused) {
    document.getElementById('status-badge').innerHTML = '<span class="status-badge status-paused">Paused</span>';
  } else {
    document.getElementById('status-badge').innerHTML = '<span class="status-badge status-active">Growing</span>';
  }

  if (STATE.isResonance) {
    document.getElementById('resonance-badge').innerHTML = '<span class="status-badge status-resonance">Active</span>';
    document.getElementById('btn-resonance').classList.add('active');
  } else {
    document.getElementById('resonance-badge').innerHTML = '<span class="status-badge" style="background:rgba(100,100,100,0.2);color:#888;">Off</span>';
    document.getElementById('btn-resonance').classList.remove('active');
  }

  document.getElementById('btn-pause').textContent = STATE.isPaused ? '▶ Resume' : '⏸ Pause';
  if (STATE.isPaused) {
    document.getElementById('btn-pause').classList.add('active');
  } else {
    document.getElementById('btn-pause').classList.remove('active');
  }
}

// Add some particle effects
const particleCount = 200;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 40;
  particlePositions[i * 3 + 1] = Math.random() * 15;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
  particleSizes[i] = Math.random() * 2 + 0.5;
}

particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeom.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
  color: 0x6644aa,
  size: 0.08,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

// Growth timer
let lastGrowthTime = 0;

// Animation loop
function animate(time) {
  requestAnimationFrame(animate);

  controls.update();

  // Grow crystals
  if (!STATE.isPaused) {
    const growthInterval = STATE.growthSpeed;
    if (time - lastGrowthTime > growthInterval) {
      lastGrowthTime = time;
      crystals.forEach(c => {
        if (!c.frozen) {
          c.grow();
        }
      });
      // Update segment counts in HUD periodically
      updateHUD();
    }
  }

  // Update crystals
  crystals.forEach(c => c.update(time));

  // Animate particles
  const positions = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3 + 1] += 0.003 + Math.sin(time * 0.001 + i) * 0.002;
    if (positions[i * 3 + 1] > 15) {
      positions[i * 3 + 1] = 0;
    }
  }
  particles.geometry.attributes.position.needsUpdate = true;
  particles.rotation.y += 0.0002;

  // Point light subtle animation
  pointLight.intensity = 0.6 + Math.sin(time * 0.002) * 0.1;
  if (STATE.isResonance) {
    pointLight.intensity = 1.0 + Math.sin(time * 0.004) * 0.3;
    pointLight.color.setHex(0xaa66ff);
  } else {
    pointLight.color.setHex(0x8844ff);
  }

  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize
updateHUD();
STATE.sceneReady = true;
animate(0);

})();
</script>
</body>
</html>
