<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Multiplayer Crystal Growth Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: #e8ecff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    .hud {
      position: fixed;
      z-index: 10;
      backdrop-filter: blur(8px);
      background: rgba(12, 14, 30, 0.68);
      border: 1px solid rgba(120, 140, 255, 0.2);
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(80, 80, 180, 0.15);
      padding: 12px 14px;
      user-select: none;
    }

    #player-panel {
      top: 12px;
      left: 12px;
      min-width: 230px;
    }

    #stats-panel {
      top: 12px;
      right: 12px;
      min-width: 260px;
      text-align: left;
    }

    #button-bar {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(12, 14, 30, 0.72);
      border: 1px solid rgba(120, 140, 255, 0.2);
      box-shadow: 0 0 20px rgba(80, 80, 180, 0.15);
      backdrop-filter: blur(8px);
    }

    button {
      appearance: none;
      border: 1px solid rgba(160, 180, 255, 0.25);
      background: linear-gradient(180deg, rgba(60, 70, 120, 0.95), rgba(35, 40, 80, 0.95));
      color: #eef2ff;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.12s ease, filter 0.12s ease, border-color 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
      border-color: rgba(190, 210, 255, 0.45);
    }

    button:active {
      transform: translateY(0);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      line-height: 1.3;
      font-size: 14px;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow: 0 0 10px rgba(255,255,255,0.15);
      flex: 0 0 auto;
    }

    .hint {
      opacity: 0.8;
      font-size: 12px;
      margin-top: 8px;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="player-panel" class="hud"></div>
  <div id="stats-panel" class="hud"></div>

  <div id="button-bar">
    <button id="btn-pause">Pause / Resume</button>
    <button id="btn-resonance">Resonance</button>
    <button id="btn-clear-all">Clear All</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const app = document.getElementById("app");
    const playerPanel = document.getElementById("player-panel");
    const statsPanel = document.getElementById("stats-panel");
    const btnPause = document.getElementById("btn-pause");
    const btnResonance = document.getElementById("btn-resonance");
    const btnClearAll = document.getElementById("btn-clear-all");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.Fog(0x0a0a1a, 1, 80);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(0, 12, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);

    const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 15, 10);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0x8844ff, 0.6, 50, 2);
    pointLight.position.set(0, 5, 0);
    scene.add(pointLight);

    const grid = new THREE.GridHelper(40, 40, 0x222244, 0x222244);
    grid.material.transparent = true;
    grid.material.opacity = 0.3;
    scene.add(grid);

    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.MeshBasicMaterial({
      color: 0x111122,
      transparent: true,
      opacity: 0.0,
      side: THREE.DoubleSide
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.name = "ground";
    scene.add(ground);

    const players = {
      1: { name: "Azure", color: 0x44aaff, crystals: [], crystalCount: 0, segmentCount: 0 },
      2: { name: "Rose", color: 0xff44aa, crystals: [], crystalCount: 0, segmentCount: 0 }
    };

    const state = {
      activePlayer: 1,
      player1Crystals: 0,
      player2Crystals: 0,
      player1Segments: 0,
      player2Segments: 0,
      totalCrystals: 0,
      totalSegments: 0,
      growthMode: "fractal",
      isPaused: false,
      isResonance: false,
      growthSpeed: 500,
      frozenCount: 0,
      lastAction: "initialized",
      crystalPositions: [],
      sceneReady: false
    };

    window.__3D_STATE__ = state;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let crystalIdCounter = 1;
    const allCrystals = [];

    function hex(color) {
      return "#" + color.toString(16).padStart(6, "0");
    }

    function mixWithWhite(colorHex, amount = 0.3) {
      const c = new THREE.Color(colorHex);
      c.lerp(new THREE.Color(0xffffff), amount);
      return c;
    }

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function randomInt(min, max) {
      return Math.floor(randomRange(min, max + 1));
    }

    function createCrystal(playerId, position) {
      const player = players[playerId];
      const group = new THREE.Group();
      group.position.copy(position);
      scene.add(group);

      const crystal = {
        id: crystalIdCounter++,
        playerId,
        color: player.color,
        name: player.name,
        group,
        segments: [],
        activeTips: [],
        totalSegments: 0,
        maxSegments: 30,
        maxHeight: 12,
        isFrozen: false,
        isFinished: false,
        lastGrowTime: performance.now(),
        createdAt: performance.now(),
        seedPosition: new THREE.Vector3(position.x, position.y, position.z)
      };

      player.crystals.push(crystal);
      allCrystals.push(crystal);
      addSegment(crystal, new THREE.Vector3(0, 0.55, 0), new THREE.Vector3(0, 1, 0), null);

      recalcCounts();
      state.lastAction = "placed_crystal";
      updateHUD();
      return crystal;
    }

    function createMaterial(baseColor) {
      return new THREE.MeshPhysicalMaterial({
        color: baseColor,
        transmission: 0.6,
        roughness: 0.1,
        metalness: 0.2,
        transparent: true,
        opacity: 0.95,
        thickness: 0.8,
        ior: 1.25,
        emissive: new THREE.Color(baseColor).multiplyScalar(0.12),
        emissiveIntensity: state.isResonance ? 0.5 : 0.12
      });
    }

    function addSegment(crystal, localPos, direction, parentTip) {
      if (crystal.totalSegments >= crystal.maxSegments) {
        crystal.isFinished = true;
        return null;
      }

      if (localPos.y > crystal.maxHeight) {
        return null;
      }

      const radius = randomRange(0.3, 0.8);
      const geometry = new THREE.OctahedronGeometry(radius, 0);
      const material = createMaterial(crystal.color);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(localPos);

      const up = new THREE.Vector3(0, 1, 0);
      const dirNorm = direction.clone().normalize();
      const quat = new THREE.Quaternion().setFromUnitVectors(up, dirNorm);
      mesh.quaternion.copy(quat);
      mesh.rotation.z += randomRange(-0.35, 0.35);

      crystal.group.add(mesh);

      const seg = {
        mesh,
        position: localPos.clone(),
        direction: dirNorm.clone(),
        radius
      };

      crystal.segments.push(seg);
      crystal.totalSegments++;

      if (parentTip) {
        const idx = crystal.activeTips.indexOf(parentTip);
        if (idx !== -1) crystal.activeTips.splice(idx, 1);
      }

      const newTip = {
        position: localPos.clone(),
        direction: dirNorm.clone(),
        depth: parentTip ? parentTip.depth + 1 : 0
      };

      crystal.activeTips.push(newTip);
      return newTip;
    }

    function rotateVectorByAngles(baseDir, yaw, pitch) {
      const dir = baseDir.clone().normalize();
      const axis = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0, 1, 0));
      if (axis.lengthSq() < 0.0001) axis.set(1, 0, 0);
      axis.normalize();

      const qPitch = new THREE.Quaternion().setFromAxisAngle(axis, pitch);
      const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw);

      return dir.applyQuaternion(qPitch).applyQuaternion(qYaw).normalize();
    }

    function growthBranchesPerStep() {
      return state.growthMode === "linear" ? 1 : randomInt(1, 3);
    }

    function growCrystal(crystal) {
      if (state.isPaused || crystal.isFrozen || crystal.isFinished) return;
      if (crystal.totalSegments >= crystal.maxSegments) {
        crystal.isFinished = true;
        return;
      }
      if (crystal.activeTips.length === 0) {
        crystal.isFinished = true;
        return;
      }

      const branches = growthBranchesPerStep();
      const availableTips = [...crystal.activeTips];
      if (availableTips.length === 0) return;

      for (let i = 0; i < branches; i++) {
        if (crystal.totalSegments >= crystal.maxSegments) break;
        if (crystal.activeTips.length === 0) break;

        const tip = availableTips[Math.floor(Math.random() * availableTips.length)] || crystal.activeTips[Math.floor(Math.random() * crystal.activeTips.length)];
        if (!tip) break;

        const angleDeg = randomRange(15, 45);
        const pitch = THREE.MathUtils.degToRad(angleDeg * (Math.random() < 0.5 ? 1 : -1));
        const yaw = randomRange(-Math.PI, Math.PI);

        let childDir;
        if (state.growthMode === "linear") {
          childDir = tip.direction.clone().lerp(new THREE.Vector3(0, 1, 0), 0.35).normalize();
        } else {
          childDir = rotateVectorByAngles(tip.direction, yaw, pitch);
          if (childDir.y < 0.2) childDir.y = 0.2;
          childDir.normalize();
        }

        const stepLen = randomRange(0.45, 0.95);
        const nextPos = tip.position.clone().add(childDir.clone().multiplyScalar(stepLen));

        if (nextPos.y > crystal.maxHeight) {
          const idx = crystal.activeTips.indexOf(tip);
          if (idx !== -1) crystal.activeTips.splice(idx, 1);
          continue;
        }

        addSegment(crystal, nextPos, childDir, tip);
      }

      recalcCounts();
      updateHUD();
    }

    function updateGrowth() {
      const now = performance.now();
      for (const crystal of allCrystals) {
        if (crystal.isFrozen || crystal.isFinished || state.isPaused) continue;
        if (now - crystal.lastGrowTime >= state.growthSpeed) {
          crystal.lastGrowTime = now;
          growCrystal(crystal);
        }
      }
    }

    function recalcCounts() {
      players[1].crystalCount = players[1].crystals.length;
      players[2].crystalCount = players[2].crystals.length;
      players[1].segmentCount = players[1].crystals.reduce((s, c) => s + c.totalSegments, 0);
      players[2].segmentCount = players[2].crystals.reduce((s, c) => s + c.totalSegments, 0);

      state.player1Crystals = players[1].crystalCount;
      state.player2Crystals = players[2].crystalCount;
      state.player1Segments = players[1].segmentCount;
      state.player2Segments = players[2].segmentCount;
      state.totalCrystals = state.player1Crystals + state.player2Crystals;
      state.totalSegments = state.player1Segments + state.player2Segments;
      state.frozenCount = allCrystals.filter(c => c.isFrozen).length;
      state.crystalPositions = allCrystals.map(c => ({
        x: Number(c.seedPosition.x.toFixed(2)),
        z: Number(c.seedPosition.z.toFixed(2)),
        player: c.playerId
      }));
    }

    function updateHUD() {
      const active = players[state.activePlayer];
      playerPanel.innerHTML = `
        <div class="title">Active Player</div>
        <div class="row">
          <span class="swatch" style="background:${hex(active.color)}"></span>
          <strong>${active.name}</strong>
        </div>
        <div class="row">Crystals: <span class="mono">${active.crystalCount}</span></div>
        <div class="row">Segments: <span class="mono">${active.segmentCount}</span></div>
        <div class="hint">Click ground to place seed · TAB switch player</div>
      `;

      statsPanel.innerHTML = `
        <div class="title">Simulation Stats</div>
        <div class="row">Total Crystals: <span class="mono">${state.totalCrystals}</span></div>
        <div class="row">Total Segments: <span class="mono">${state.totalSegments}</span></div>
        <div class="row">Growth Mode: <span class="mono">${state.growthMode}</span></div>
        <div class="row">Paused: <span class="mono">${state.isPaused}</span></div>
        <div class="row">Resonance: <span class="mono">${state.isResonance}</span></div>
        <div class="row">Frozen: <span class="mono">${state.frozenCount}</span></div>
        <div class="row">Speed: <span class="mono">${state.growthSpeed}ms</span></div>
        <div class="row">Last Action: <span class="mono">${state.lastAction}</span></div>
      `;

      btnPause.textContent = state.isPaused ? "Resume Growth" : "Pause Growth";
      btnResonance.textContent = state.isResonance ? "Disable Resonance" : "Enable Resonance";
    }

    function removeCrystal(crystal) {
      for (const seg of crystal.segments) {
        seg.mesh.geometry.dispose();
        seg.mesh.material.dispose();
      }

      scene.remove(crystal.group);

      const player = players[crystal.playerId];
      const pIdx = player.crystals.indexOf(crystal);
      if (pIdx !== -1) player.crystals.splice(pIdx, 1);

      const aIdx = allCrystals.indexOf(crystal);
      if (aIdx !== -1) allCrystals.splice(aIdx, 1);

      recalcCounts();
      updateHUD();
    }

    function togglePause() {
      state.isPaused = !state.isPaused;
      state.lastAction = "toggled_pause";
      updateHUD();
    }

    function toggleResonance() {
      state.isResonance = !state.isResonance;
      state.growthSpeed = state.isResonance ? 250 : 500;

      for (const crystal of allCrystals) {
        for (const seg of crystal.segments) {
          seg.mesh.material.emissiveIntensity = state.isResonance ? 0.5 : 0.12;
        }
      }

      state.lastAction = state.isResonance ? "activated_resonance" : "deactivated_resonance";
      updateHUD();
    }

    function switchPlayer() {
      state.activePlayer = state.activePlayer === 1 ? 2 : 1;
      state.lastAction = "switched_player";
      updateHUD();
    }

    function setGrowthMode(mode) {
      state.growthMode = mode;
      state.lastAction = mode === "linear" ? "set_linear" : "set_fractal";
      updateHUD();
    }

    function freezeNearestCrystalToCenter() {
      if (allCrystals.length === 0) return;

      const centerNDC = new THREE.Vector3(0, 0, 0);
      let nearest = null;
      let best = Infinity;

      for (const crystal of allCrystals) {
        const worldPos = crystal.group.getWorldPosition(new THREE.Vector3());
        const projected = worldPos.clone().project(camera);
        const dist = Math.sqrt(
          (projected.x - centerNDC.x) ** 2 +
          (projected.y - centerNDC.y) ** 2
        );
        if (dist < best) {
          best = dist;
          nearest = crystal;
        }
      }

      if (!nearest || nearest.isFrozen) return;

      nearest.isFrozen = true;
      const frozenColor = mixWithWhite(nearest.color, 0.3);
      for (const seg of nearest.segments) {
        seg.mesh.material.color.copy(frozenColor);
        seg.mesh.material.emissive.copy(frozenColor.clone().multiplyScalar(0.12));
      }

      recalcCounts();
      state.lastAction = "froze_crystal";
      updateHUD();
    }

    function deleteLastPlacedCrystalOfActivePlayer() {
      const player = players[state.activePlayer];
      if (player.crystals.length === 0) return;
      const crystal = player.crystals[player.crystals.length - 1];
      removeCrystal(crystal);
      state.lastAction = "deleted_crystal";
      updateHUD();
    }

    function clearAllCrystals() {
      const copy = [...allCrystals];
      for (const crystal of copy) removeCrystal(crystal);

      players[1].crystals = [];
      players[2].crystals = [];
      recalcCounts();
      state.lastAction = "cleared_all";
      updateHUD();
    }

    function onPointerDown(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(ground, false);
      if (hits.length > 0) {
        const hit = hits[0].point.clone();
        hit.y = 0;
        createCrystal(state.activePlayer, hit);
      }
    }

    function onKeyDown(event) {
      const key = event.key.toLowerCase();

      if (event.key === "Tab") {
        event.preventDefault();
        switchPlayer();
        return;
      }

      if (event.code === "Space") {
        event.preventDefault();
        togglePause();
        return;
      }

      if (key === "r") {
        toggleResonance();
        return;
      }

      if (key === "f") {
        freezeNearestCrystalToCenter();
        return;
      }

      if (key === "d") {
        deleteLastPlacedCrystalOfActivePlayer();
        return;
      }

      if (key === "1") {
        setGrowthMode("linear");
        return;
      }

      if (key === "2") {
        setGrowthMode("fractal");
        return;
      }
    }

    btnPause.addEventListener("click", togglePause);
    btnResonance.addEventListener("click", toggleResonance);
    btnClearAll.addEventListener("click", clearAllCrystals);

    renderer.domElement.addEventListener("pointerdown", onPointerDown);
    window.addEventListener("keydown", onKeyDown);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      updateGrowth();

      const t = performance.now() * 0.001;
      pointLight.position.x = Math.sin(t * 0.8) * 4;
      pointLight.position.z = Math.cos(t * 0.8) * 4;

      for (const crystal of allCrystals) {
        for (const seg of crystal.segments) {
          seg.mesh.rotation.y += 0.0025;
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }

    recalcCounts();
    updateHUD();
    state.sceneReady = true;
    animate();
  </script>
</body>
</html>
