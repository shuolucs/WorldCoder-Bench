<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Multiplayer Crystal Growth</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        #player-panel {
            top: 20px;
            left: 20px;
        }
        #stats-panel {
            top: 20px;
            right: 20px;
            text-align: right;
        }
        #controls-panel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-line { margin: 5px 0; font-size: 14px; }
        .value { font-weight: bold; }
        .player-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        button:hover { background: rgba(255, 255, 255, 0.2); }
        button:active { background: rgba(255, 255, 255, 0.3); }
        .active-btn { background: rgba(136, 68, 255, 0.4); border-color: #8844ff; }
        #instructions {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="player-panel" class="panel">
        <h2>Active Player</h2>
        <div class="stat-line">
            <span id="p-indicator" class="player-indicator"></span>
            <span id="p-name" class="value" style="font-size: 18px;"></span>
        </div>
        <div class="stat-line">Crystals: <span id="p-crystals" class="value">0</span></div>
        <div class="stat-line">Segments: <span id="p-segments" class="value">0</span></div>
    </div>

    <div id="stats-panel" class="panel">
        <h2>Global Stats</h2>
        <div class="stat-line">Total Crystals: <span id="s-crystals" class="value">0</span></div>
        <div class="stat-line">Total Segments: <span id="s-segments" class="value">0</span></div>
        <div class="stat-line">Growth Mode: <span id="s-mode" class="value">Fractal</span></div>
        <div class="stat-line">Status: <span id="s-status" class="value">Growing</span></div>
        <div class="stat-line">Resonance: <span id="s-resonance" class="value">Off</span></div>
    </div>

    <div id="controls-panel">
        <button id="btn-pause">Pause (SPACE)</button>
        <button id="btn-resonance">Resonance (R)</button>
        <button id="btn-clear-all">Clear All</button>
    </div>

    <div id="instructions">
        Click Ground: Place Seed | TAB: Switch Player | F: Freeze Center Crystal | D: Delete Last | 1/2: Linear/Fractal Mode
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            activePlayer: 1,
            player1Crystals: 0,
            player2Crystals: 0,
            player1Segments: 0,
            player2Segments: 0,
            totalCrystals: 0,
            totalSegments: 0,
            growthMode: 'fractal',
            isPaused: false,
            isResonance: false,
            growthSpeed: 500,
            frozenCount: 0,
            lastAction: 'initialized',
            crystalPositions: [],
            sceneReady: false
        };

        const players = {
            1: { id: 1, name: 'Azure', color: 0x44aaff },
            2: { id: 2, name: 'Rose', color: 0xff44aa }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.Fog(0x0a0a1a, 1, 80);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x8844ff, 0.6, 50);
        pointLight.position.set(0, 5, 0);
        scene.add(pointLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(40, 40);
        const groundMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0 }); // Invisible plane for raycasting
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(40, 40, 0x222244, 0x222244);
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);

        // --- Crystal System ---
        const crystals = [];
        const playerCrystals = { 1: [], 2: [] };
        let lastGrowTime = 0;

        class Crystal {
            constructor(position, playerId) {
                this.playerId = playerId;
                this.player = players[playerId];
                this.group = new THREE.Group();
                this.group.position.copy(position);
                scene.add(this.group);
                
                this.segments = [];
                this.tips = [{ pos: new THREE.Vector3(0, 0, 0), dir: new THREE.Vector3(0, 1, 0) }];
                this.isFrozen = false;
                
                // Unique material per crystal for individual freezing
                this.material = new THREE.MeshPhysicalMaterial({
                    color: this.player.color,
                    transmission: 0.6,
                    opacity: 1,
                    transparent: true,
                    roughness: 0.1,
                    metalness: 0.2,
                    emissive: this.player.color,
                    emissiveIntensity: window.__3D_STATE__.isResonance ? 0.5 : 0.0
                });

                crystals.push(this);
                playerCrystals[playerId].push(this);
                
                updateState({
                    [`player${playerId}Crystals`]: playerCrystals[playerId].length,
                    totalCrystals: crystals.length,
                    lastAction: 'placed_crystal'
                });
                updateCrystalPositions();
                
                // Initial growth step
                this.growStep();
            }

            growStep() {
                if (this.isFrozen || this.segments.length >= 30 || this.tips.length === 0) return;

                const currentTips = [...this.tips];
                this.tips = [];
                let segmentsAdded = 0;

                for (const tip of currentTips) {
                    if (this.segments.length + segmentsAdded >= 30) break;
                    if (this.group.position.y + tip.pos.y > 12) continue; // Max height check

                    const radius = 0.3 + Math.random() * 0.5;
                    const geo = new THREE.OctahedronGeometry(radius, 0);
                    const mesh = new THREE.Mesh(geo, this.material);
                    
                    // Position segment
                    const segPos = tip.pos.clone().add(tip.dir.clone().multiplyScalar(radius));
                    mesh.position.copy(segPos);
                    
                    // Align segment
                    const up = new THREE.Vector3(0, 1, 0);
                    mesh.quaternion.setFromUnitVectors(up, tip.dir);
                    
                    // Store reference for raycasting
                    mesh.userData.crystal = this;

                    this.group.add(mesh);
                    this.segments.push(mesh);
                    segmentsAdded++;

                    // Generate new tips
                    const numBranches = window.__3D_STATE__.growthMode === 'linear' ? 1 : Math.floor(Math.random() * 3) + 1;
                    const nextBasePos = segPos.clone().add(tip.dir.clone().multiplyScalar(radius));

                    for (let i = 0; i < numBranches; i++) {
                        let newDir = tip.dir.clone();
                        if (numBranches > 1 || Math.random() > 0.5) {
                            // Branching angle 15-45 degrees
                            const angle = (15 + Math.random() * 30) * THREE.MathUtils.DEG2RAD;
                            // Random orthogonal axis
                            const axis = new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).cross(newDir).normalize();
                            if (axis.lengthSq() > 0.001) {
                                newDir.applyAxisAngle(axis, angle).normalize();
                            }
                        }
                        // Bias slightly upwards
                        newDir.lerp(new THREE.Vector3(0, 1, 0), 0.2).normalize();
                        this.tips.push({ pos: nextBasePos, dir: newDir });
                    }
                }

                if (segmentsAdded > 0) {
                    const p1Segs = playerCrystals[1].reduce((sum, c) => sum + c.segments.length, 0);
                    const p2Segs = playerCrystals[2].reduce((sum, c) => sum + c.segments.length, 0);
                    updateState({
                        player1Segments: p1Segs,
                        player2Segments: p2Segs,
                        totalSegments: p1Segs + p2Segs
                    });
                }
            }

            freeze() {
                if (this.isFrozen) return;
                this.isFrozen = true;
                this.material.color.lerp(new THREE.Color(0xffffff), 0.3);
                this.material.emissive.lerp(new THREE.Color(0xffffff), 0.3);
                updateState({ 
                    frozenCount: window.__3D_STATE__.frozenCount + 1,
                    lastAction: 'froze_crystal'
                });
            }

            destroy() {
                this.group.children.forEach(child => {
                    child.geometry.dispose();
                });
                this.material.dispose();
                scene.remove(this.group);
            }
        }

        // --- Interaction & Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName === 'BUTTON') return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                new Crystal(intersects[0].point, window.__3D_STATE__.activePlayer);
            }
        });

        window.addEventListener('keydown', (event) => {
            const state = window.__3D_STATE__;
            
            switch(event.code) {
                case 'Tab':
                    event.preventDefault();
                    updateState({ 
                        activePlayer: state.activePlayer === 1 ? 2 : 1,
                        lastAction: 'switched_player'
                    });
                    break;
                case 'Space':
                    event.preventDefault();
                    togglePause();
                    break;
                case 'KeyR':
                    toggleResonance();
                    break;
                case 'KeyF':
                    freezeCenterCrystal();
                    break;
                case 'KeyD':
                    deleteLastCrystal();
                    break;
                case 'Digit1':
                    updateState({ growthMode: 'linear', lastAction: 'set_linear' });
                    break;
                case 'Digit2':
                    updateState({ growthMode: 'fractal', lastAction: 'set_fractal' });
                    break;
            }
        });

        // Button Listeners
        document.getElementById('btn-pause').addEventListener('click', togglePause);
        document.getElementById('btn-resonance').addEventListener('click', toggleResonance);
        document.getElementById('btn-clear-all').addEventListener('click', clearAll);

        function togglePause() {
            const isPaused = !window.__3D_STATE__.isPaused;
            updateState({ isPaused, lastAction: 'toggled_pause' });
            document.getElementById('btn-pause').classList.toggle('active-btn', isPaused);
            document.getElementById('btn-pause').innerText = isPaused ? 'Resume (SPACE)' : 'Pause (SPACE)';
        }

        function toggleResonance() {
            const isResonance = !window.__3D_STATE__.isResonance;
            updateState({ 
                isResonance, 
                growthSpeed: isResonance ? 250 : 500,
                lastAction: 'activated_resonance'
            });
            
            document.getElementById('btn-resonance').classList.toggle('active-btn', isResonance);
            
            crystals.forEach(c => {
                if (!c.isFrozen) {
                    c.material.emissiveIntensity = isResonance ? 0.5 : 0.0;
                }
            });
        }

        function freezeCenterCrystal() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            // Intersect all crystal meshes
            const meshes = crystals.flatMap(c => c.segments);
            const intersects = raycaster.intersectObjects(meshes);
            
            if (intersects.length > 0) {
                const crystal = intersects[0].object.userData.crystal;
                if (crystal) crystal.freeze();
            }
        }

        function deleteLastCrystal() {
            const pid = window.__3D_STATE__.activePlayer;
            const list = playerCrystals[pid];
            if (list.length > 0) {
                const crystal = list.pop();
                
                // Remove from main list
                const index = crystals.indexOf(crystal);
                if (index > -1) crystals.splice(index, 1);
                
                // Update frozen count if needed
                if (crystal.isFrozen) {
                    updateState({ frozenCount: window.__3D_STATE__.frozenCount - 1 });
                }

                crystal.destroy();
                
                // Recalculate segments
                const p1Segs = playerCrystals[1].reduce((sum, c) => sum + c.segments.length, 0);
                const p2Segs = playerCrystals[2].reduce((sum, c) => sum + c.segments.length, 0);
                
                updateState({
                    [`player${pid}Crystals`]: list.length,
                    totalCrystals: crystals.length,
                    player1Segments: p1Segs,
                    player2Segments: p2Segs,
                    totalSegments: p1Segs + p2Segs,
                    lastAction: 'deleted_crystal'
                });
                updateCrystalPositions();
            }
        }

        function clearAll() {
            crystals.forEach(c => c.destroy());
            crystals.length = 0;
            playerCrystals[1] = [];
            playerCrystals[2] = [];
            
            updateState({
                player1Crystals: 0, player2Crystals: 0,
                player1Segments: 0, player2Segments: 0,
                totalCrystals: 0, totalSegments: 0,
                frozenCount: 0, lastAction: 'cleared_all',
                crystalPositions: []
            });
        }

        // --- State & HUD Updates ---
        function updateState(newState) {
            Object.assign(window.__3D_STATE__, newState);
            updateHUD();
        }

        function updateCrystalPositions() {
            window.__3D_STATE__.crystalPositions = crystals.map(c => ({
                x: c.group.position.x,
                z: c.group.position.z,
                player: c.playerId
            }));
        }

        function updateHUD() {
            const state = window.__3D_STATE__;
            const p = players[state.activePlayer];
            
            // Player Panel
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-name').style.color = '#' + p.color.toString(16).padStart(6, '0');
            document.getElementById('p-indicator').style.backgroundColor = '#' + p.color.toString(16).padStart(6, '0');
            document.getElementById('p-crystals').innerText = state[`player${state.activePlayer}Crystals`];
            document.getElementById('p-segments').innerText = state[`player${state.activePlayer}Segments`];
            
            // Stats Panel
            document.getElementById('s-crystals').innerText = state.totalCrystals;
            document.getElementById('s-segments').innerText = state.totalSegments;
            document.getElementById('s-mode').innerText = state.growthMode.charAt(0).toUpperCase() + state.growthMode.slice(1);
            document.getElementById('s-status').innerText = state.isPaused ? 'Paused' : 'Growing';
            document.getElementById('s-status').style.color = state.isPaused ? '#ffaa44' : '#44ffaa';
            document.getElementById('s-resonance').innerText = state.isResonance ? 'Active' : 'Off';
            document.getElementById('s-resonance').style.color = state.isResonance ? '#8844ff' : '#fff';
        }

        // --- Animation Loop ---
        function animate(time) {
            requestAnimationFrame(animate);
            controls.update();

            const state = window.__3D_STATE__;
            if (!state.isPaused && time - lastGrowTime > state.growthSpeed) {
                crystals.forEach(c => c.growStep());
                lastGrowTime = time;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Init
        updateState({ sceneReady: true });
        requestAnimationFrame(animate);

    </script>
</body>
</html>
