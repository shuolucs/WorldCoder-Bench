<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Golf Putting Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #fff;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 220px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  #hud h3 {
    margin-bottom: 8px;
    font-size: 18px;
    color: #4ecca3;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 5px;
  }
  #hud .label { color: #aaa; }
  #hud .value { color: #fff; font-weight: bold; }
  #status-text {
    margin-top: 10px;
    padding: 8px;
    background: rgba(78, 204, 163, 0.2);
    border-radius: 5px;
    text-align: center;
    font-weight: bold;
    color: #4ecca3;
  }

  #power-bar {
    position: absolute;
    top: 20px;
    left: 260px;
    width: 30px;
    height: 200px;
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    padding: 5px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  #power-bar-inner {
    width: 100%;
    border-radius: 6px;
    position: absolute;
    bottom: 5px;
    left: 0;
    width: calc(100% - 10px);
    margin: 0 5px;
    transition: height 0.1s, background 0.1s;
  }
  #power-bar-label {
    position: absolute;
    bottom: -25px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 11px;
    white-space: nowrap;
  }

  #debug-panel {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #0f0;
    background: rgba(0, 0, 0, 0.85);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    line-height: 1.8;
    min-width: 250px;
    border: 1px solid rgba(0, 255, 0, 0.3);
    display: none;
  }
  #debug-panel h4 {
    color: #0f0;
    margin-bottom: 5px;
    border-bottom: 1px solid rgba(0,255,0,0.3);
    padding-bottom: 3px;
  }

  #controls-help {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    background: rgba(0,0,0,0.6);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    text-align: center;
    backdrop-filter: blur(5px);
  }
  #controls-help span { color: #4ecca3; font-weight: bold; }

  .sunk-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ffd700;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4);
    text-align: center;
    pointer-events: none;
    display: none;
    animation: sunkPulse 1s ease-in-out infinite alternate;
  }
  @keyframes sunkPulse {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.1); }
  }
</style>
</head>
<body>

<div id="hud">
  <h3>⛳ Golf Putting</h3>
  <div><span class="label">Strokes:</span> <span class="value" id="stroke-count">0</span></div>
  <div><span class="label">Power:</span> <span class="value" id="power-display">3.0</span></div>
  <div><span class="label">Aim:</span> <span class="value" id="aim-display">0°</span></div>
  <div id="status-text">Aim and shoot!</div>
</div>

<div id="power-bar">
  <div id="power-bar-inner"></div>
  <div id="power-bar-label">PWR</div>
</div>

<div id="debug-panel">
  <h4>🔧 DEBUG</h4>
  <div>Pos: (<span id="dbg-x">0.00</span>, <span id="dbg-z">0.00</span>)</div>
  <div>Speed: <span id="dbg-speed">0.000</span></div>
  <div>Aim: <span id="dbg-aim">0.00</span>°</div>
  <div>State: <span id="dbg-state">aiming</span></div>
  <div>Trail dots: <span id="dbg-trail">0</span></div>
  <div>Vel: (<span id="dbg-vx">0.000</span>, <span id="dbg-vz">0.000</span>)</div>
</div>

<div id="controls-help">
  <span>←→</span> Aim &nbsp;|&nbsp; <span>↑↓</span> Power &nbsp;|&nbsp; <span>SPACE</span> Shoot &nbsp;|&nbsp; <span>R</span> Reset &nbsp;|&nbsp; <span>D</span> Debug
</div>

<div class="sunk-overlay" id="sunk-overlay"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // ==================== SCENE SETUP ====================
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.Fog(0x1a1a2e, 25, 50);

  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 8, 12);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Lighting
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -15;
  dirLight.shadow.camera.right = 15;
  dirLight.shadow.camera.top = 20;
  dirLight.shadow.camera.bottom = -20;
  scene.add(dirLight);

  const ambientLight = new THREE.AmbientLight(0x404040);
  scene.add(ambientLight);

  // Add a subtle hemisphere light for better ambiance
  const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x2d5a27, 0.3);
  scene.add(hemiLight);

  // ==================== GREEN (GROUND) ====================
  const greenWidth = 20;
  const greenLength = 30;

  // Create grass texture with canvas
  const grassCanvas = document.createElement('canvas');
  grassCanvas.width = 512;
  grassCanvas.height = 512;
  const grassCtx = grassCanvas.getContext('2d');
  grassCtx.fillStyle = '#2d7a3a';
  grassCtx.fillRect(0, 0, 512, 512);

  // Add subtle grass pattern
  for (let i = 0; i < 5000; i++) {
    const x = Math.random() * 512;
    const y = Math.random() * 512;
    const brightness = 40 + Math.random() * 30;
    grassCtx.fillStyle = `rgb(${brightness}, ${100 + Math.random() * 40}, ${brightness})`;
    grassCtx.fillRect(x, y, 1, 3);
  }

  // Add grid lines
  grassCtx.strokeStyle = 'rgba(255,255,255,0.05)';
  grassCtx.lineWidth = 1;
  for (let i = 0; i <= 512; i += 32) {
    grassCtx.beginPath();
    grassCtx.moveTo(i, 0);
    grassCtx.lineTo(i, 512);
    grassCtx.stroke();
    grassCtx.beginPath();
    grassCtx.moveTo(0, i);
    grassCtx.lineTo(512, i);
    grassCtx.stroke();
  }

  const grassTexture = new THREE.CanvasTexture(grassCanvas);
  grassTexture.wrapS = THREE.RepeatWrapping;
  grassTexture.wrapT = THREE.RepeatWrapping;
  grassTexture.repeat.set(4, 6);

  const greenGeo = new THREE.PlaneGeometry(greenWidth, greenLength);
  const greenMat = new THREE.MeshStandardMaterial({
    map: grassTexture,
    color: 0x2d7a3a,
    roughness: 0.9,
    metalness: 0.0
  });
  const greenMesh = new THREE.Mesh(greenGeo, greenMat);
  greenMesh.rotation.x = -Math.PI / 2;
  greenMesh.receiveShadow = true;
  scene.add(greenMesh);

  // ==================== WALLS/BUMPERS ====================
  const wallHeight = 0.3;
  const wallThickness = 0.3;
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a5c2a, roughness: 0.8 });

  function createWall(w, h, d, x, y, z) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mesh = new THREE.Mesh(geo, wallMat);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    return mesh;
  }

  // Left wall
  createWall(wallThickness, wallHeight, greenLength, -greenWidth / 2 - wallThickness / 2, wallHeight / 2, 0);
  // Right wall
  createWall(wallThickness, wallHeight, greenLength, greenWidth / 2 + wallThickness / 2, wallHeight / 2, 0);
  // Far wall
  createWall(greenWidth + wallThickness * 2, wallHeight, wallThickness, 0, wallHeight / 2, -greenLength / 2 - wallThickness / 2);
  // Near wall
  createWall(greenWidth + wallThickness * 2, wallHeight, wallThickness, 0, wallHeight / 2, greenLength / 2 + wallThickness / 2);

  // Wall boundaries for physics (inner edges)
  const wallMinX = -greenWidth / 2;
  const wallMaxX = greenWidth / 2;
  const wallMinZ = -greenLength / 2;
  const wallMaxZ = greenLength / 2;

  // ==================== HOLE ====================
  const holeX = 0;
  const holeZ = -6;
  const holeRadius = 0.4;

  // Dark hole circle
  const holeGeo = new THREE.CylinderGeometry(holeRadius, holeRadius, 0.02, 32);
  const holeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1.0 });
  const holeMesh = new THREE.Mesh(holeGeo, holeMat);
  holeMesh.position.set(holeX, 0.01, holeZ);
  scene.add(holeMesh);

  // Hole rim
  const rimGeo = new THREE.TorusGeometry(holeRadius, 0.03, 8, 32);
  const rimMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const rimMesh = new THREE.Mesh(rimGeo, rimMat);
  rimMesh.rotation.x = -Math.PI / 2;
  rimMesh.position.set(holeX, 0.02, holeZ);
  scene.add(rimMesh);

  // Flag pole
  const poleGeo = new THREE.CylinderGeometry(0.03, 0.03, 2, 8);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.5 });
  const poleMesh = new THREE.Mesh(poleGeo, poleMat);
  poleMesh.position.set(holeX, 1.0, holeZ);
  poleMesh.castShadow = true;
  scene.add(poleMesh);

  // Red triangular flag
  const flagShape = new THREE.Shape();
  flagShape.moveTo(0, 0);
  flagShape.lineTo(0.8, 0.2);
  flagShape.lineTo(0, 0.4);
  flagShape.lineTo(0, 0);
  const flagGeo = new THREE.ShapeGeometry(flagShape);
  const flagMat = new THREE.MeshStandardMaterial({ color: 0xff2222, side: THREE.DoubleSide });
  const flagMesh = new THREE.Mesh(flagGeo, flagMat);
  flagMesh.position.set(holeX + 0.03, 1.6, holeZ);
  flagMesh.castShadow = true;
  scene.add(flagMesh);

  // ==================== GOLF BALL ====================
  const ballRadius = 0.15;
  const startX = 0;
  const startZ = 8;

  const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
  const ballMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.3,
    metalness: 0.1
  });
  const ballMesh = new THREE.Mesh(ballGeo, ballMat);
  ballMesh.position.set(startX, ballRadius, startZ);
  ballMesh.castShadow = true;
  scene.add(ballMesh);

  // Ball shadow (fake circular shadow on ground)
  const shadowGeo = new THREE.CircleGeometry(0.12, 16);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
  const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
  shadowMesh.rotation.x = -Math.PI / 2;
  shadowMesh.position.set(startX, 0.005, startZ);
  scene.add(shadowMesh);

  // ==================== AIM ARROW ====================
  const aimDir = new THREE.Vector3(0, 0, -1);
  const aimArrow = new THREE.ArrowHelper(aimDir, ballMesh.position.clone(), 2, 0xffff00, 0.3, 0.15);
  scene.add(aimArrow);

  // Power indicator line (dashed)
  const powerLineGeo = new THREE.BufferGeometry();
  const powerLineMat = new THREE.LineDashedMaterial({ color: 0xff6600, dashSize: 0.2, gapSize: 0.1 });
  const powerLine = new THREE.Line(powerLineGeo, powerLineMat);
  scene.add(powerLine);

  // ==================== DEBUG ELEMENTS ====================
  let velocityArrow = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(), 1, 0xff0000);
  velocityArrow.visible = false;
  scene.add(velocityArrow);

  const trailDots = [];
  const trailGroup = new THREE.Group();
  scene.add(trailGroup);

  // ==================== GAME STATE ====================
  let ballX = startX;
  let ballZ = startZ;
  let ballVX = 0;
  let ballVZ = 0;
  let aimAngle = 0; // 0 = toward -Z
  let power = 3.0;
  let strokeCount = 0;
  let gameState = 'aiming'; // 'aiming' | 'rolling' | 'sunk'
  let debugMode = false;
  let ballSunk = false;
  let trailDotCount = 0;
  let frameCount = 0;

  const keysDown = {};

  // ==================== STATE EXPOSURE ====================
  window.__3D_STATE__ = {
    ballX, ballZ, ballVX, ballVZ, ballSpeed: 0,
    aimAngle, power, strokeCount, gameState,
    debugMode, ballSunk, trailDotCount
  };

  function updateGlobalState() {
    const speed = Math.sqrt(ballVX * ballVX + ballVZ * ballVZ);
    window.__3D_STATE__.ballX = ballX;
    window.__3D_STATE__.ballZ = ballZ;
    window.__3D_STATE__.ballVX = ballVX;
    window.__3D_STATE__.ballVZ = ballVZ;
    window.__3D_STATE__.ballSpeed = speed;
    window.__3D_STATE__.aimAngle = aimAngle;
    window.__3D_STATE__.power = power;
    window.__3D_STATE__.strokeCount = strokeCount;
    window.__3D_STATE__.gameState = gameState;
    window.__3D_STATE__.debugMode = debugMode;
    window.__3D_STATE__.ballSunk = ballSunk;
    window.__3D_STATE__.trailDotCount = trailDotCount;
  }

  // ==================== INPUT HANDLING ====================
  document.addEventListener('keydown', (e) => {
    keysDown[e.code] = true;

    if (e.code === 'Space') {
      e.preventDefault();
      if (gameState === 'aiming') {
        shoot();
      }
    }

    if (e.code === 'KeyR') {
      resetGame();
    }

    if (e.code === 'KeyD') {
      debugMode = !debugMode;
      document.getElementById('debug-panel').style.display = debugMode ? 'block' : 'none';
      velocityArrow.visible = debugMode;
      if (!debugMode) {
        clearTrail();
      }
    }
  });

  document.addEventListener('keyup', (e) => {
    keysDown[e.code] = false;
  });

  // ==================== GAME FUNCTIONS ====================
  function shoot() {
    const dirX = Math.sin(aimAngle);
    const dirZ = -Math.cos(aimAngle);
    ballVX = power * dirX;
    ballVZ = power * dirZ;
    gameState = 'rolling';
    strokeCount++;
    clearTrail();
    updateHUD();
  }

  function resetGame() {
    ballX = startX;
    ballZ = startZ;
    ballVX = 0;
    ballVZ = 0;
    aimAngle = 0;
    power = 3.0;
    strokeCount = 0;
    gameState = 'aiming';
    ballSunk = false;
    clearTrail();
    document.getElementById('sunk-overlay').style.display = 'none';
    updateHUD();
  }

  function clearTrail() {
    for (const dot of trailDots) {
      trailGroup.remove(dot);
      dot.geometry.dispose();
      dot.material.dispose();
    }
    trailDots.length = 0;
    trailDotCount = 0;
  }

  function addTrailDot(x, z) {
    const dotGeo = new THREE.SphereGeometry(0.03, 6, 6);
    const dotMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.set(x, 0.03, z);
    trailGroup.add(dot);
    trailDots.push(dot);
    trailDotCount++;
  }

  // ==================== HUD UPDATE ====================
  function updateHUD() {
    document.getElementById('stroke-count').textContent = strokeCount;
    document.getElementById('power-display').textContent = power.toFixed(1);
    document.getElementById('aim-display').textContent = (aimAngle * 180 / Math.PI).toFixed(1) + '°';

    let statusText = '';
    if (gameState === 'aiming') {
      statusText = 'Aim and shoot!';
    } else if (gameState === 'rolling') {
      statusText = 'Rolling...';
    } else if (gameState === 'sunk') {
      if (strokeCount === 1) {
        statusText = 'Hole in 1! 🎉';
      } else {
        statusText = `Sunk in ${strokeCount} strokes! 🎉`;
      }
    }
    document.getElementById('status-text').textContent = statusText;

    // Power bar
    const powerFraction = (power - 0.1) / (10.0 - 0.1);
    const barHeight = powerFraction * 190;
    const r = Math.min(255, Math.floor(powerFraction * 2 * 255));
    const g = Math.min(255, Math.floor((1 - powerFraction) * 2 * 255));
    const powerBarInner = document.getElementById('power-bar-inner');
    powerBarInner.style.height = barHeight + 'px';
    powerBarInner.style.background = `rgb(${r}, ${g}, 50)`;
  }

  function updateDebugPanel() {
    if (!debugMode) return;
    const speed = Math.sqrt(ballVX * ballVX + ballVZ * ballVZ);
    document.getElementById('dbg-x').textContent = ballX.toFixed(2);
    document.getElementById('dbg-z').textContent = ballZ.toFixed(2);
    document.getElementById('dbg-speed').textContent = speed.toFixed(3);
    document.getElementById('dbg-aim').textContent = (aimAngle * 180 / Math.PI).toFixed(2);
    document.getElementById('dbg-state').textContent = gameState;
    document.getElementById('dbg-trail').textContent = trailDotCount;
    document.getElementById('dbg-vx').textContent = ballVX.toFixed(3);
    document.getElementById('dbg-vz').textContent = ballVZ.toFixed(3);
  }

  // ==================== PHYSICS UPDATE ====================
  function updatePhysics(dt) {
    if (gameState !== 'rolling') return;

    // Update position
    ballX += ballVX * dt;
    ballZ += ballVZ * dt;

    // Friction (0.985 per frame at 60fps, adjust for dt)
    const frictionPerFrame = 0.985;
    const frictionFactor = Math.pow(frictionPerFrame, dt * 60);
    ballVX *= frictionFactor;
    ballVZ *= frictionFactor;

    // Wall bouncing
    const ballEdge = ballRadius;
    if (ballX - ballEdge < wallMinX) {
      ballX = wallMinX + ballEdge;
      ballVX = -ballVX * 0.7;
    }
    if (ballX + ballEdge > wallMaxX) {
      ballX = wallMaxX - ballEdge;
      ballVX = -ballVX * 0.7;
    }
    if (ballZ - ballEdge < wallMinZ) {
      ballZ = wallMinZ + ballEdge;
      ballVZ = -ballVZ * 0.7;
    }
    if (ballZ + ballEdge > wallMaxZ) {
      ballZ = wallMaxZ - ballEdge;
      ballVZ = -ballVZ * 0.7;
    }

    // Speed check
    const speed = Math.sqrt(ballVX * ballVX + ballVZ * ballVZ);

    // Hole detection
    const distToHole = Math.sqrt((ballX - holeX) ** 2 + (ballZ - holeZ) ** 2);
    if (distToHole < 0.35 && speed < 2.0) {
      // Ball sunk!
      gameState = 'sunk';
      ballSunk = true;
      ballVX = 0;
      ballVZ = 0;
      ballX = holeX;
      ballZ = holeZ;

      const overlay = document.getElementById('sunk-overlay');
      if (strokeCount === 1) {
        overlay.textContent = '⛳ Hole in 1! ⛳';
      } else {
        overlay.textContent = `⛳ Sunk in ${strokeCount}! ⛳`;
      }
      overlay.style.display = 'block';
      updateHUD();
      return;
    }

    // Ball stops
    if (speed < 0.01) {
      ballVX = 0;
      ballVZ = 0;
      gameState = 'aiming';
      updateHUD();
    }

    // Trail dots
    if (debugMode && frameCount % 5 === 0) {
      addTrailDot(ballX, ballZ);
    }
  }

  // ==================== HANDLE CONTINUOUS INPUT ====================
  function handleInput() {
    if (gameState === 'aiming') {
      if (keysDown['ArrowLeft']) {
        aimAngle += 0.05;
      }
      if (keysDown['ArrowRight']) {
        aimAngle -= 0.05;
      }
      if (keysDown['ArrowUp']) {
        power = Math.min(10.0, power + 0.05);
      }
      if (keysDown['ArrowDown']) {
        power = Math.max(0.1, power - 0.05);
      }
    }
  }

  // ==================== RENDER LOOP ====================
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05); // Cap dt
    frameCount++;

    handleInput();
    updatePhysics(dt);

    // Update ball mesh position
    ballMesh.position.set(ballX, ballSunk ? -0.1 : ballRadius, ballZ);
    shadowMesh.position.set(ballX, 0.005, ballZ);

    // Update aim arrow
    if (gameState === 'aiming') {
      const dirX = Math.sin(aimAngle);
      const dirZ = -Math.cos(aimAngle);
      aimArrow.position.copy(ballMesh.position);
      aimArrow.setDirection(new THREE.Vector3(dirX, 0, dirZ).normalize());
      aimArrow.setLength(1.5 + power * 0.2, 0.3, 0.15);
      aimArrow.visible = true;

      // Update power line
      const linePoints = [];
      const steps = 20;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const len = power * 0.3 * t;
        linePoints.push(new THREE.Vector3(
          ballX + dirX * len,
          0.05,
          ballZ + dirZ * len
        ));
      }
      powerLine.geometry.dispose();
      powerLine.geometry = new THREE.BufferGeometry().setFromPoints(linePoints);
      powerLine.computeLineDistances();
      powerLine.visible = true;
    } else {
      aimArrow.visible = false;
      powerLine.visible = false;
    }

    // Update velocity debug arrow
    if (debugMode && gameState === 'rolling') {
      const speed = Math.sqrt(ballVX * ballVX + ballVZ * ballVZ);
      if (speed > 0.01) {
        velocityArrow.position.copy(ballMesh.position);
        velocityArrow.setDirection(new THREE.Vector3(ballVX, 0, ballVZ).normalize());
        velocityArrow.setLength(speed * 0.5, 0.2, 0.1);
        velocityArrow.visible = true;
      } else {
        velocityArrow.visible = false;
      }
    } else if (!debugMode) {
      velocityArrow.visible = false;
    }

    // Animate flag slightly
    flagMesh.rotation.y = Math.sin(Date.now() * 0.003) * 0.1;

    // Update HUD
    updateHUD();
    updateDebugPanel();
    updateGlobalState();

    renderer.render(scene, camera);
  }

  // ==================== WINDOW RESIZE ====================
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ==================== START ====================
  updateHUD();
  animate();

})();
</script>
</body>
</html>
