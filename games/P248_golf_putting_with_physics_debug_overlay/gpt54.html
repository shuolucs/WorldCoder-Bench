<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Golf Putting Game - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1b2a1b;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 8px;
      min-width: 220px;
      z-index: 10;
      line-height: 1.5;
    }

    #power-bar {
      width: 220px;
      height: 16px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      margin-top: 8px;
      overflow: hidden;
    }

    #power-fill {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #26d926, #ffd000, #ff3030);
      border-radius: 10px;
      transition: width 0.1s linear;
    }

    #debug-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      color: #fff;
      background: rgba(90, 0, 0, 0.65);
      padding: 12px 14px;
      border-radius: 8px;
      min-width: 220px;
      z-index: 10;
      line-height: 1.5;
      display: none;
      white-space: pre-line;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: #fff;
      background: rgba(0,0,0,0.4);
      padding: 10px 12px;
      border-radius: 8px;
      z-index: 10;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="stroke-text">Strokes: 0</div>
    <div id="power-text">Power: 3.0</div>
    <div id="status-text">Aim and shoot!</div>
    <div id="power-bar"><div id="power-fill"></div></div>
  </div>

  <div id="debug-panel"></div>

  <div id="help">
    <strong>Controls</strong><br>
    Left/Right: Aim<br>
    Up/Down: Power<br>
    Space: Shoot<br>
    R: Reset<br>
    D: Toggle Debug
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87b8e6);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    // Lighting
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    // Ground
    const groundGroup = new THREE.Group();
    scene.add(groundGroup);

    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x2f9e44,
      roughness: 0.95,
      metalness: 0.0
    });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 30), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    groundGroup.add(ground);

    // Subtle grid lines
    const grid = new THREE.GridHelper(20, 20, 0x5ecb70, 0x4ab35a);
    grid.position.y = 0.002;
    grid.material.transparent = true;
    grid.material.opacity = 0.18;
    groundGroup.add(grid);

    const grid2 = new THREE.GridHelper(30, 30, 0x63d87a, 0x63d87a);
    grid2.rotation.y = Math.PI / 2;
    grid2.position.y = 0.003;
    grid2.scale.set(0.6667, 1, 1.5);
    grid2.material.transparent = true;
    grid2.material.opacity = 0.08;
    groundGroup.add(grid2);

    // Walls / bumpers
    const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x228b22 });
    const wallHeight = 0.3;
    const wallThickness = 0.4;
    const halfW = 10;
    const halfL = 15;

    function createWall(w, h, d, x, y, z) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, h, d),
        wallMaterial
      );
      mesh.position.set(x, y, z);
      scene.add(mesh);
      return mesh;
    }

    createWall(20, wallHeight, wallThickness, 0, wallHeight / 2, -halfL);
    createWall(20, wallHeight, wallThickness, 0, wallHeight / 2, halfL);
    createWall(wallThickness, wallHeight, 30, -halfW, wallHeight / 2, 0);
    createWall(wallThickness, wallHeight, 30, halfW, wallHeight / 2, 0);

    // Hole
    const holePos = new THREE.Vector3(0, 0.01, -6);
    const hole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.4, 0.4, 0.02, 32),
      new THREE.MeshStandardMaterial({ color: 0x111111 })
    );
    hole.position.copy(holePos);
    scene.add(hole);

    // Flag pole
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.03, 2, 12),
      new THREE.MeshStandardMaterial({ color: 0xdddddd })
    );
    pole.position.set(holePos.x, 1.0, holePos.z);
    scene.add(pole);

    // Flag
    const flagShape = new THREE.Shape();
    flagShape.moveTo(0, 0.25);
    flagShape.lineTo(0.6, 0.12);
    flagShape.lineTo(0, 0);
    flagShape.lineTo(0, 0.25);

    const flagGeom = new THREE.ShapeGeometry(flagShape);
    const flagMat = new THREE.MeshStandardMaterial({ color: 0xff2222, side: THREE.DoubleSide });
    const flag = new THREE.Mesh(flagGeom, flagMat);
    flag.position.set(holePos.x + 0.03, 1.65, holePos.z);
    scene.add(flag);

    // Ball
    const ballRadius = 0.15;
    const startPos = new THREE.Vector3(0, ballRadius, 8);
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(ballRadius, 32, 32),
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, metalness: 0.0 })
    );
    ball.position.copy(startPos);
    scene.add(ball);

    // Aiming arrow
    const aimDir = new THREE.Vector3(0, 0, -1);
    const aimArrow = new THREE.ArrowHelper(aimDir.clone(), ball.position.clone(), 1.5, 0xffff00, 0.4, 0.25);
    scene.add(aimArrow);

    // Velocity debug arrow
    const velArrow = new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), ball.position.clone(), 0, 0xff0000, 0.3, 0.18);
    velArrow.visible = false;
    scene.add(velArrow);

    // HUD refs
    const strokeText = document.getElementById("stroke-text");
    const powerText = document.getElementById("power-text");
    const statusText = document.getElementById("status-text");
    const powerFill = document.getElementById("power-fill");
    const debugPanel = document.getElementById("debug-panel");

    // Game state
    let ballVX = 0;
    let ballVZ = 0;
    let aimAngle = 0; // 0 points toward -Z
    let power = 3.0;
    let strokeCount = 0;
    let gameState = "aiming"; // aiming | rolling | sunk
    let debugMode = false;
    let ballSunk = false;

    let trailDots = [];
    let trailFrameCounter = 0;

    const fixedDT = 1 / 60;
    const frictionPerFrame = 0.985;

    function updateAimArrow() {
      const dir = new THREE.Vector3(Math.sin(aimAngle), 0, -Math.cos(aimAngle)).normalize();
      aimArrow.position.copy(ball.position);
      aimArrow.setDirection(dir);
      aimArrow.setLength(1 + power * 0.25, 0.35, 0.2);
      aimArrow.visible = (gameState === "aiming");
    }

    function updateVelocityArrow() {
      const speed = Math.hypot(ballVX, ballVZ);
      velArrow.position.copy(ball.position);
      if (speed > 0.0001 && debugMode) {
        const dir = new THREE.Vector3(ballVX, 0, ballVZ).normalize();
        velArrow.setDirection(dir);
        velArrow.setLength(Math.min(2.5, speed * 0.6), 0.25, 0.15);
        velArrow.visible = true;
      } else {
        velArrow.visible = false;
      }
    }

    function clearTrail() {
      for (const dot of trailDots) scene.remove(dot);
      trailDots = [];
      trailFrameCounter = 0;
    }

    function addTrailDot() {
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.03, 10, 10),
        new THREE.MeshStandardMaterial({ color: 0xff3333 })
      );
      dot.position.set(ball.position.x, 0.03, ball.position.z);
      scene.add(dot);
      trailDots.push(dot);
    }

    function updateHUD() {
      strokeText.textContent = `Strokes: ${strokeCount}`;
      powerText.textContent = `Power: ${power.toFixed(1)}`;

      if (gameState === "aiming") {
        statusText.textContent = "Aim and shoot!";
      } else if (gameState === "rolling") {
        statusText.textContent = "Rolling...";
      } else if (gameState === "sunk") {
        statusText.textContent = strokeCount === 1 ? `Hole in 1!` : `Sunk in ${strokeCount} strokes!`;
      }

      const pct = ((power - 0.1) / (10.0 - 0.1)) * 100;
      powerFill.style.width = `${Math.max(0, Math.min(100, pct))}%`;
    }

    function updateDebugPanel() {
      if (!debugMode) {
        debugPanel.style.display = "none";
        return;
      }
      debugPanel.style.display = "block";

      const speed = Math.hypot(ballVX, ballVZ);
      debugPanel.textContent =
        `Ball position: (${ball.position.x.toFixed(2)}, ${ball.position.z.toFixed(2)})\n` +
        `Ball speed: ${speed.toFixed(3)}\n` +
        `Aim angle: ${(THREE.MathUtils.radToDeg(aimAngle)).toFixed(2)}°\n` +
        `State: ${gameState}`;
    }

    function updateStateExpose() {
      window.__3D_STATE__ = {
        ballX: ball.position.x,
        ballZ: ball.position.z,
        ballVX: ballVX,
        ballVZ: ballVZ,
        ballSpeed: Math.hypot(ballVX, ballVZ),
        aimAngle: aimAngle,
        power: power,
        strokeCount: strokeCount,
        gameState: gameState,
        debugMode: debugMode,
        ballSunk: ballSunk,
        trailDotCount: (debugMode && gameState === "rolling") ? trailDots.length : 0
      };
    }

    function resetGame() {
      ball.position.copy(startPos);
      ballVX = 0;
      ballVZ = 0;
      aimAngle = 0;
      power = 3.0;
      strokeCount = 0;
      gameState = "aiming";
      ballSunk = false;
      clearTrail();
      updateAimArrow();
      updateVelocityArrow();
      updateHUD();
      updateDebugPanel();
      updateStateExpose();
    }

    function shoot() {
      if (gameState !== "aiming") return;
      const dirX = Math.sin(aimAngle);
      const dirZ = -Math.cos(aimAngle);
      ballVX = dirX * power;
      ballVZ = dirZ * power;
      strokeCount++;
      gameState = "rolling";
      ballSunk = false;
      trailFrameCounter = 0;
      updateHUD();
    }

    function sinkBall() {
      ballVX = 0;
      ballVZ = 0;
      gameState = "sunk";
      ballSunk = true;
      ball.position.set(holePos.x, ballRadius * 0.35, holePos.z);
      updateHUD();
    }

    function physicsStep() {
      if (gameState !== "rolling") return;

      // Position update
      ball.position.x += ballVX * fixedDT;
      ball.position.z += ballVZ * fixedDT;

      // Wall boundaries for ball center
      const minX = -halfW + ballRadius + wallThickness * 0.5;
      const maxX = halfW - ballRadius - wallThickness * 0.5;
      const minZ = -halfL + ballRadius + wallThickness * 0.5;
      const maxZ = halfL - ballRadius - wallThickness * 0.5;

      // Bounce X
      if (ball.position.x < minX) {
        ball.position.x = minX;
        ballVX = -ballVX * 0.7;
      } else if (ball.position.x > maxX) {
        ball.position.x = maxX;
        ballVX = -ballVX * 0.7;
      }

      // Bounce Z
      if (ball.position.z < minZ) {
        ball.position.z = minZ;
        ballVZ = -ballVZ * 0.7;
      } else if (ball.position.z > maxZ) {
        ball.position.z = maxZ;
        ballVZ = -ballVZ * 0.7;
      }

      // Friction converted for fixed 60fps step
      ballVX *= frictionPerFrame;
      ballVZ *= frictionPerFrame;

      const speed = Math.hypot(ballVX, ballVZ);

      // Debug trail every 5 frames while rolling
      if (debugMode) {
        trailFrameCounter++;
        if (trailFrameCounter % 5 === 0) addTrailDot();
      }

      // Hole detection
      const dx = ball.position.x - holePos.x;
      const dz = ball.position.z - holePos.z;
      const distToHole = Math.hypot(dx, dz);
      if (distToHole <= 0.35 && speed < 2.0) {
        sinkBall();
        return;
      }

      // Stop threshold
      if (speed < 0.01) {
        ballVX = 0;
        ballVZ = 0;
        gameState = "aiming";
      }
    }

    window.addEventListener("keydown", (e) => {
      const key = e.code;

      if (key === "ArrowLeft") {
        e.preventDefault();
        if (gameState === "aiming") aimAngle += 0.05;
      } else if (key === "ArrowRight") {
        e.preventDefault();
        if (gameState === "aiming") aimAngle -= 0.05;
      } else if (key === "ArrowUp") {
        e.preventDefault();
        if (gameState === "aiming") power = Math.min(10.0, power + 0.5);
      } else if (key === "ArrowDown") {
        e.preventDefault();
        if (gameState === "aiming") power = Math.max(0.1, power - 0.5);
      } else if (key === "Space") {
        e.preventDefault();
        shoot();
      } else if (key === "KeyR") {
        e.preventDefault();
        resetGame();
      } else if (key === "KeyD") {
        e.preventDefault();
        debugMode = !debugMode;
        if (!debugMode) {
          velArrow.visible = false;
          clearTrail();
        }
      }

      updateAimArrow();
      updateHUD();
      updateDebugPanel();
      updateStateExpose();
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let accumulator = 0;
    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);

      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;
      accumulator += dt;

      while (accumulator >= fixedDT) {
        physicsStep();
        accumulator -= fixedDT;
      }

      updateAimArrow();
      updateVelocityArrow();
      updateHUD();
      updateDebugPanel();
      updateStateExpose();

      renderer.render(scene, camera);
    }

    resetGame();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
