<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Golf Putting Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            min-width: 200px;
            border: 1px solid #555;
        }
        #hud h2 { margin: 0 0 10px 0; font-size: 18px; color: #aaffaa; }
        .hud-row { margin-bottom: 5px; font-size: 14px; }
        #power-bar-container {
            width: 100%;
            height: 15px;
            background: #333;
            border: 1px solid #fff;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        #power-bar {
            width: 30%;
            height: 100%;
            background: #00ff00;
            transition: width 0.1s, background-color 0.1s;
        }
        #debug-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            display: none;
            min-width: 200px;
            border: 1px solid #00ff00;
            font-size: 12px;
        }
        #debug-panel h3 { margin: 0 0 10px 0; font-size: 14px; border-bottom: 1px solid #00ff00; padding-bottom: 5px; }
        .debug-row { margin-bottom: 4px; }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #ddd;
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
        }
        .key { background: #eee; color: #000; padding: 2px 6px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="hud">
        <h2>Mini Golf</h2>
        <div class="hud-row">Strokes: <span id="hud-strokes">0</span></div>
        <div class="hud-row">Status: <span id="hud-status" style="color: #ffffaa;">Aim and shoot!</span></div>
        <div class="hud-row" style="margin-top: 10px;">Power: <span id="hud-power">3.0</span></div>
        <div id="power-bar-container"><div id="power-bar"></div></div>
    </div>

    <div id="debug-panel">
        <h3>Physics Debug</h3>
        <div class="debug-row">Pos: (<span id="dbg-posx">0.00</span>, <span id="dbg-posz">8.00</span>)</div>
        <div class="debug-row">Speed: <span id="dbg-speed">0.000</span></div>
        <div class="debug-row">Aim Angle: <span id="dbg-angle">0</span>°</div>
        <div class="debug-row">State: <span id="dbg-state">aiming</span></div>
        <div class="debug-row">Trail Dots: <span id="dbg-trail">0</span></div>
    </div>

    <div id="instructions">
        Aim: <span class="key">←</span> <span class="key">→</span> | 
        Power: <span class="key">↑</span> <span class="key">↓</span> | 
        Shoot: <span class="key">SPACE</span> | 
        Reset: <span class="key">R</span> | 
        Debug: <span class="key">D</span>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            ballX: 0,
            ballZ: 8,
            ballVX: 0,
            ballVZ: 0,
            ballSpeed: 0,
            aimAngle: 0,
            power: 3.0,
            strokeCount: 0,
            gameState: 'aiming', // 'aiming', 'rolling', 'sunk'
            debugMode: false,
            ballSunk: false,
            trailDotCount: 0
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // --- Environment ---
        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d8a3e, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid lines (subtle)
        const gridHelper = new THREE.GridHelper(30, 30, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.1;
        gridHelper.material.transparent = true;
        gridHelper.position.y = 0.001;
        scene.add(gridHelper);

        // Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x1e5c29 });
        const wallThickness = 0.5;
        const wallHeight = 0.3;

        const createWall = (w, d, x, z) => {
            const geo = new THREE.BoxGeometry(w, wallHeight, d);
            const mesh = new THREE.Mesh(geo, wallMat);
            mesh.position.set(x, wallHeight / 2, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        };

        createWall(20 + wallThickness*2, wallThickness, 0, -15 - wallThickness/2); // Top
        createWall(20 + wallThickness*2, wallThickness, 0, 15 + wallThickness/2);  // Bottom
        createWall(wallThickness, 30, -10 - wallThickness/2, 0);                   // Left
        createWall(wallThickness, 30, 10 + wallThickness/2, 0);                    // Right

        // Hole
        const holeRadius = 0.4;
        const holeGeo = new THREE.CylinderGeometry(holeRadius, holeRadius, 0.02, 32);
        const holeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
        const hole = new THREE.Mesh(holeGeo, holeMat);
        hole.position.set(0, 0.01, -6);
        scene.add(hole);

        // Flag Pole
        const poleGeo = new THREE.CylinderGeometry(0.03, 0.03, 2);
        const poleMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
        const pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.set(0, 1, -6);
        pole.castShadow = true;
        scene.add(pole);

        // Flag
        const flagShape = new THREE.Shape();
        flagShape.moveTo(0, 0);
        flagShape.lineTo(0.6, 0.25);
        flagShape.lineTo(0, 0.5);
        const flagGeo = new THREE.ShapeGeometry(flagShape);
        const flagMat = new THREE.MeshStandardMaterial({ color: 0xff0000, side: THREE.DoubleSide });
        const flag = new THREE.Mesh(flagGeo, flagMat);
        flag.position.set(0, 1.4, -6);
        flag.castShadow = true;
        scene.add(flag);

        // --- Golf Ball ---
        const ballRadius = 0.15;
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.castShadow = true;
        scene.add(ball);

        // --- Helpers ---
        const aimArrow = new THREE.ArrowHelper(new THREE.Vector3(0,0,-1), ball.position, 2, 0xffff00, 0.3, 0.2);
        scene.add(aimArrow);

        const debugArrow = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), ball.position, 1, 0xff0000, 0.2, 0.1);
        debugArrow.visible = false;
        scene.add(debugArrow);

        const trailGroup = new THREE.Group();
        scene.add(trailGroup);
        const trailGeo = new THREE.SphereGeometry(0.03, 8, 8);
        const trailMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

        // --- Physics Variables ---
        const startPos = new THREE.Vector3(0, ballRadius, 8);
        let ballPos = startPos.clone();
        let ballVel = new THREE.Vector2(0, 0);
        let frameCount = 0;
        
        // Use a fixed dt for position updates to make power scale well with the green size
        const dt = 0.05; 

        // --- Functions ---
        function resetGame() {
            ballPos.copy(startPos);
            ballVel.set(0, 0);
            state.aimAngle = 0;
            state.power = 3.0;
            state.strokeCount = 0;
            state.gameState = 'aiming';
            state.ballSunk = false;
            
            // Clear trail
            while(trailGroup.children.length > 0){ 
                trailGroup.remove(trailGroup.children[0]); 
            }
            state.trailDotCount = 0;
            
            updateHUD();
        }

        function shoot() {
            if (state.gameState !== 'aiming') return;
            
            const dirX = -Math.sin(state.aimAngle);
            const dirZ = -Math.cos(state.aimAngle);
            
            ballVel.x = dirX * state.power;
            ballVel.y = dirZ * state.power;
            
            state.gameState = 'rolling';
            state.strokeCount++;
            
            // Clear trail for new shot
            while(trailGroup.children.length > 0){ 
                trailGroup.remove(trailGroup.children[0]); 
            }
            state.trailDotCount = 0;
            
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('hud-strokes').innerText = state.strokeCount;
            document.getElementById('hud-power').innerText = state.power.toFixed(1);
            
            const statusEl = document.getElementById('hud-status');
            if (state.gameState === 'aiming') {
                statusEl.innerText = 'Aim and shoot!';
                statusEl.style.color = '#ffffaa';
            } else if (state.gameState === 'rolling') {
                statusEl.innerText = 'Rolling...';
                statusEl.style.color = '#aaaaff';
            } else if (state.gameState === 'sunk') {
                statusEl.innerText = state.strokeCount === 1 ? 'Hole in 1!' : `Sunk in ${state.strokeCount} strokes!`;
                statusEl.style.color = '#aaffaa';
            }

            const powerBar = document.getElementById('power-bar');
            const percent = (state.power / 10.0) * 100;
            powerBar.style.width = `${percent}%`;
            
            // Color from green to red
            const hue = 120 - ((state.power - 0.1) / 9.9) * 120;
            powerBar.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;
        }

        function updateDebugPanel() {
            if (!state.debugMode) return;
            document.getElementById('dbg-posx').innerText = state.ballX.toFixed(2);
            document.getElementById('dbg-posz').innerText = state.ballZ.toFixed(2);
            document.getElementById('dbg-speed').innerText = state.ballSpeed.toFixed(3);
            document.getElementById('dbg-angle').innerText = (state.aimAngle * 180 / Math.PI).toFixed(1);
            document.getElementById('dbg-state').innerText = state.gameState;
            document.getElementById('dbg-trail').innerText = state.trailDotCount;
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (state.gameState === 'aiming') {
                if (e.key === 'ArrowLeft') {
                    state.aimAngle += 0.05;
                } else if (e.key === 'ArrowRight') {
                    state.aimAngle -= 0.05;
                } else if (e.key === 'ArrowUp') {
                    state.power = Math.min(10.0, state.power + 0.5);
                    updateHUD();
                } else if (e.key === 'ArrowDown') {
                    state.power = Math.max(0.1, state.power - 0.5);
                    updateHUD();
                } else if (e.key === ' ' || e.code === 'Space') {
                    shoot();
                }
            }
            
            if (e.key === 'r' || e.key === 'R') {
                resetGame();
            } else if (e.key === 'd' || e.key === 'D') {
                state.debugMode = !state.debugMode;
                document.getElementById('debug-panel').style.display = state.debugMode ? 'block' : 'none';
                trailGroup.visible = state.debugMode;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        resetGame();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            frameCount++;

            if (state.gameState === 'rolling') {
                // Physics update
                ballPos.x += ballVel.x * dt;
                ballPos.z += ballVel.y * dt;
                
                // Friction
                ballVel.multiplyScalar(0.985);
                
                // Wall Bouncing
                const boundX = 10 - ballRadius;
                const boundZ = 15 - ballRadius;
                
                if (ballPos.x < -boundX) { ballPos.x = -boundX; ballVel.x *= -0.7; }
                if (ballPos.x > boundX) { ballPos.x = boundX; ballVel.x *= -0.7; }
                if (ballPos.z < -boundZ) { ballPos.z = -boundZ; ballVel.y *= -0.7; }
                if (ballPos.z > boundZ) { ballPos.z = boundZ; ballVel.y *= -0.7; }

                const speed = ballVel.length();

                // Hole Detection
                const distToHole = Math.hypot(ballPos.x - 0, ballPos.z - (-6));
                if (distToHole < 0.35 && speed < 2.0) {
                    state.gameState = 'sunk';
                    state.ballSunk = true;
                    ballVel.set(0, 0);
                    ballPos.x = 0;
                    ballPos.z = -6;
                    ballPos.y = -0.05; // Drop into hole slightly
                    updateHUD();
                } 
                // Stop condition
                else if (speed < 0.01) {
                    ballVel.set(0, 0);
                    state.gameState = 'aiming';
                    updateHUD();
                }

                // Trail
                if (state.debugMode && frameCount % 5 === 0) {
                    const dot = new THREE.Mesh(trailGeo, trailMat);
                    dot.position.copy(ballPos);
                    dot.position.y = 0.02; // slightly above ground
                    trailGroup.add(dot);
                    state.trailDotCount++;
                }
            }

            // Update Meshes
            ball.position.copy(ballPos);

            // Update Aim Arrow
            if (state.gameState === 'aiming') {
                aimArrow.visible = true;
                aimArrow.position.copy(ballPos);
                const dir = new THREE.Vector3(-Math.sin(state.aimAngle), 0, -Math.cos(state.aimAngle));
                aimArrow.setDirection(dir);
                aimArrow.setLength(1 + state.power * 0.2);
            } else {
                aimArrow.visible = false;
            }

            // Update Debug Arrow
            if (state.debugMode && state.gameState === 'rolling' && ballVel.lengthSq() > 0.001) {
                debugArrow.visible = true;
                debugArrow.position.copy(ballPos);
                const dir = new THREE.Vector3(ballVel.x, 0, ballVel.y).normalize();
                debugArrow.setDirection(dir);
                debugArrow.setLength(ballVel.length() * 0.5 + 0.5);
            } else {
                debugArrow.visible = false;
            }

            // Update State Object
            state.ballX = ballPos.x;
            state.ballZ = ballPos.z;
            state.ballVX = ballVel.x;
            state.ballVZ = ballVel.y;
            state.ballSpeed = ballVel.length();

            // Update Debug UI
            if (state.debugMode) {
                updateDebugPanel();
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
