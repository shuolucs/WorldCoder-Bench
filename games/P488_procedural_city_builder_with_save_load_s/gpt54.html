<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural City Builder</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border-radius: 8px;
      z-index: 10;
      min-width: 180px;
      line-height: 1.5;
      font-size: 14px;
    }

    #toolbar {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      border-radius: 10px;
      z-index: 10;
    }

    button {
      border: none;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      background: #f0f0f0;
    }

    button.active {
      background: #ffd166;
      font-weight: bold;
    }

    button.demolish-on {
      background: #ff6b6b;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-gold">Gold: 1000</div>
    <div id="hud-buildings">Buildings: 0</div>
    <div id="hud-income">Income/tick: 0</div>
    <div id="hud-selected">Selected: house</div>
  </div>

  <div id="toolbar">
    <button id="btn-house" class="active">House</button>
    <button id="btn-tower">Tower</button>
    <button id="btn-factory">Factory</button>
    <button id="btn-demolish">Demolish: OFF</button>
    <button id="btn-save">Save</button>
    <button id="btn-load">Load</button>
    <button id="btn-clear">Clear</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(15, 20, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x87CEEB);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const GRID_SIZE = 10;
    const CELL_SIZE = 2;
    const HALF_WORLD = (GRID_SIZE * CELL_SIZE) / 2; // 10
    const BUILD_MIN = -8;
    const BUILD_MAX = 8;

    const groundGeo = new THREE.PlaneGeometry(GRID_SIZE * CELL_SIZE, GRID_SIZE * CELL_SIZE);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a7c4f });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.name = 'ground';
    scene.add(ground);

    const gridPoints = [];
    for (let i = -HALF_WORLD; i <= HALF_WORLD; i += CELL_SIZE) {
      gridPoints.push(new THREE.Vector3(i, 0.01, -HALF_WORLD), new THREE.Vector3(i, 0.01, HALF_WORLD));
      gridPoints.push(new THREE.Vector3(-HALF_WORLD, 0.01, i), new THREE.Vector3(HALF_WORLD, 0.01, i));
    }
    const gridGeo = new THREE.BufferGeometry().setFromPoints(gridPoints);
    const gridMat = new THREE.LineBasicMaterial({ color: 0x1f3d21 });
    const gridLines = new THREE.LineSegments(gridGeo, gridMat);
    scene.add(gridLines);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const hudGold = document.getElementById('hud-gold');
    const hudBuildings = document.getElementById('hud-buildings');
    const hudIncome = document.getElementById('hud-income');
    const hudSelected = document.getElementById('hud-selected');

    const btnHouse = document.getElementById('btn-house');
    const btnTower = document.getElementById('btn-tower');
    const btnFactory = document.getElementById('btn-factory');
    const btnDemolish = document.getElementById('btn-demolish');
    const btnSave = document.getElementById('btn-save');
    const btnLoad = document.getElementById('btn-load');
    const btnClear = document.getElementById('btn-clear');

    const BUILDING_TYPES = {
      house: {
        size: [1.5, 2, 1.5],
        color: 0xCC8844,
        cost: 100,
        income: 10
      },
      tower: {
        size: [1, 5, 1],
        color: 0x6688CC,
        cost: 250,
        income: 25
      },
      factory: {
        size: [1.8, 3, 1.8],
        color: 0x888888,
        cost: 400,
        income: 50
      }
    };

    let selectedType = 'house';
    let demolishMode = false;
    let gold = 1000;
    let totalIncome = 0;
    let lastPlacedType = null;
    let nextBuildingId = 1;

    const buildings = [];
    const occupancy = new Map();

    let fox = null;
    let foxMixer = null;
    let foxLoaded = false;
    let foxDirection = 1;
    const foxSpeed = 2;

    function occupancyKey(gridX, gridZ) {
      return `${gridX},${gridZ}`;
    }

    function worldToGrid(value) {
      return Math.round(value / CELL_SIZE) * CELL_SIZE;
    }

    function clampToBuildArea(value) {
      return Math.max(BUILD_MIN, Math.min(BUILD_MAX, value));
    }

    function setSelectedButton() {
      [btnHouse, btnTower, btnFactory].forEach(btn => btn.classList.remove('active'));
      if (selectedType === 'house') btnHouse.classList.add('active');
      if (selectedType === 'tower') btnTower.classList.add('active');
      if (selectedType === 'factory') btnFactory.classList.add('active');
    }

    function getIncomeRate() {
      return buildings.reduce((sum, b) => sum + BUILDING_TYPES[b.userData.type].income, 0);
    }

    function updateHUD() {
      hudGold.textContent = `Gold: ${gold}`;
      hudBuildings.textContent = `Buildings: ${buildings.length}`;
      hudIncome.textContent = `Income/tick: ${getIncomeRate()}`;
      hudSelected.textContent = `Selected: ${selectedType}`;
      btnDemolish.textContent = `Demolish: ${demolishMode ? 'ON' : 'OFF'}`;
      btnDemolish.classList.toggle('demolish-on', demolishMode);
      updateExposedState();
    }

    function updateExposedState() {
      const foxX = fox ? Number(fox.position.x.toFixed(2)) : 0;
      const foxZ = fox ? Number(fox.position.z.toFixed(2)) : 0;

      window.__3D_STATE__ = {
        buildingCount: buildings.length,
        gold,
        selectedType,
        demolishMode,
        foxPositionX: foxX,
        foxPositionZ: foxZ,
        foxLoaded,
        buildings: buildings.map(b => ({
          id: b.userData.buildingId,
          type: b.userData.type,
          gridX: b.userData.gridX,
          gridZ: b.userData.gridZ,
          cost: b.userData.cost
        })),
        savedStateExists: !!localStorage.getItem('cityState'),
        totalIncome,
        lastPlacedType,
        incomeRate: getIncomeRate()
      };
    }

    function createBuilding(type, gridX, gridZ, idOverride = null) {
      const def = BUILDING_TYPES[type];
      const [w, h, d] = def.size;

      const geom = new THREE.BoxGeometry(w, h, d);
      const mat = new THREE.MeshLambertMaterial({ color: def.color });
      const mesh = new THREE.Mesh(geom, mat);

      mesh.position.set(gridX, h / 2, gridZ);
      mesh.castShadow = false;
      mesh.receiveShadow = true;

      const buildingId = idOverride !== null ? idOverride : nextBuildingId++;
      if (idOverride !== null && idOverride >= nextBuildingId) {
        nextBuildingId = idOverride + 1;
      }

      mesh.userData = {
        buildingId,
        type,
        gridX,
        gridZ,
        cost: def.cost,
        income: def.income
      };

      scene.add(mesh);
      buildings.push(mesh);
      occupancy.set(occupancyKey(gridX, gridZ), mesh);

      return mesh;
    }

    function placeBuilding(gridX, gridZ) {
      const key = occupancyKey(gridX, gridZ);
      if (occupancy.has(key)) return;

      const def = BUILDING_TYPES[selectedType];
      if (gold < def.cost) return;

      gold -= def.cost;
      createBuilding(selectedType, gridX, gridZ);
      lastPlacedType = selectedType;
      updateHUD();
    }

    function removeBuilding(mesh) {
      const refund = Math.floor(mesh.userData.cost * 0.5);
      gold += refund;

      occupancy.delete(occupancyKey(mesh.userData.gridX, mesh.userData.gridZ));
      const idx = buildings.indexOf(mesh);
      if (idx !== -1) buildings.splice(idx, 1);

      scene.remove(mesh);
      mesh.geometry.dispose();
      mesh.material.dispose();

      updateHUD();
    }

    function clearBuildings() {
      for (const b of buildings) {
        scene.remove(b);
        b.geometry.dispose();
        b.material.dispose();
      }
      buildings.length = 0;
      occupancy.clear();
      updateHUD();
    }

    function resetCity() {
      clearBuildings();
      gold = 1000;
      totalIncome = 0;
      lastPlacedType = null;
      nextBuildingId = 1;
      if (fox) fox.position.set(0, 0, 0);
      updateHUD();
    }

    function saveState() {
      const state = {
        buildings: buildings.map(b => ({
          id: b.userData.buildingId,
          type: b.userData.type,
          gridX: b.userData.gridX,
          gridZ: b.userData.gridZ
        })),
        gold,
        foxPosition: fox ? { x: fox.position.x, y: fox.position.y, z: fox.position.z } : { x: 0, y: 0, z: 0 }
      };
      localStorage.setItem('cityState', JSON.stringify(state));
      updateExposedState();
    }

    function loadState() {
      const raw = localStorage.getItem('cityState');
      if (!raw) return;

      try {
        const state = JSON.parse(raw);
        clearBuildings();

        gold = typeof state.gold === 'number' ? state.gold : 1000;
        totalIncome = 0;
        lastPlacedType = null;
        nextBuildingId = 1;

        if (Array.isArray(state.buildings)) {
          for (const b of state.buildings) {
            if (BUILDING_TYPES[b.type]) {
              createBuilding(b.type, b.gridX, b.gridZ, b.id);
            }
          }
        }

        if (fox && state.foxPosition) {
          fox.position.set(
            state.foxPosition.x ?? 0,
            state.foxPosition.y ?? 0,
            state.foxPosition.z ?? 0
          );
        }

        updateHUD();
      } catch (e) {
        console.error('Failed to load cityState:', e);
      }
    }

    btnHouse.addEventListener('click', () => {
      selectedType = 'house';
      setSelectedButton();
      updateHUD();
    });

    btnTower.addEventListener('click', () => {
      selectedType = 'tower';
      setSelectedButton();
      updateHUD();
    });

    btnFactory.addEventListener('click', () => {
      selectedType = 'factory';
      setSelectedButton();
      updateHUD();
    });

    btnDemolish.addEventListener('click', () => {
      demolishMode = !demolishMode;
      updateHUD();
    });

    btnSave.addEventListener('click', saveState);
    btnLoad.addEventListener('click', loadState);
    btnClear.addEventListener('click', resetCity);

    renderer.domElement.addEventListener('pointerdown', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      if (demolishMode) {
        const buildingHits = raycaster.intersectObjects(buildings, false);
        if (buildingHits.length > 0) {
          removeBuilding(buildingHits[0].object);
        }
        return;
      }

      const hits = raycaster.intersectObject(ground);
      if (hits.length === 0) return;

      const point = hits[0].point;
      let gridX = clampToBuildArea(worldToGrid(point.x));
      let gridZ = clampToBuildArea(worldToGrid(point.z));

      if (Math.abs(gridX) > BUILD_MAX || Math.abs(gridZ) > BUILD_MAX) return;

      placeBuilding(gridX, gridZ);
    });

    setInterval(() => {
      let tickIncome = 0;
      for (const b of buildings) {
        tickIncome += BUILDING_TYPES[b.userData.type].income;
      }
      if (tickIncome > 0) {
        gold += tickIncome;
        totalIncome += tickIncome;
        updateHUD();
      }
    }, 5000);

    const loader = new GLTFLoader();
    loader.load(
      'Fox.glb',
      (gltf) => {
        fox = gltf.scene;
        fox.scale.setScalar(0.02);
        fox.position.set(0, 0, 0);
        scene.add(fox);

        if (gltf.animations && gltf.animations.length > 0) {
          foxMixer = new THREE.AnimationMixer(fox);
          const action = foxMixer.clipAction(gltf.animations[0]);
          action.play();
        }

        foxLoaded = true;
        updateHUD();
      },
      undefined,
      (err) => {
        console.error('Failed to load Fox.glb:', err);
        updateHUD();
      }
    );

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (foxMixer) foxMixer.update(delta);

      if (fox) {
        fox.position.x += foxDirection * foxSpeed * delta;

        if (fox.position.x >= 8) {
          fox.position.x = 8;
          foxDirection = -1;
          fox.rotation.y = Math.PI / 2;
        } else if (fox.position.x <= -8) {
          fox.position.x = -8;
          foxDirection = 1;
          fox.rotation.y = -Math.PI / 2;
        } else {
          fox.rotation.y = foxDirection === 1 ? -Math.PI / 2 : Math.PI / 2;
        }
      }

      controls.update();
      updateExposedState();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    setSelectedButton();
    updateHUD();
    animate();
  </script>
</body>
</html>
