<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kitchen Cabinet Planner</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-top {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            pointer-events: auto;
            min-width: 600px;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #4a90e2;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #357abd; }
        button:active { transform: scale(0.95); }
        button.active { background: #2c3e50; box-shadow: 0 0 0 2px #fff, 0 0 0 4px #2c3e50; }
        button.danger { background: #e74c3c; }
        button.danger:hover { background: #c0392b; }
        
        #stats {
            display: flex;
            gap: 20px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }
        #ui-bottom {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-weight: bold;
            color: #333;
        }
        .instructions {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-top">
        <div class="button-group">
            <button id="btn-base">Add Base Cabinet</button>
            <button id="btn-wall">Add Wall Cabinet</button>
            <button id="btn-tall">Add Tall Cabinet</button>
            <button id="btn-remove" class="danger">Remove Last</button>
            <button id="btn-clear" class="danger">Clear All</button>
        </div>
        <div id="stats">
            <span id="stat-count">Cabinets: 0</span>
            <span id="stat-cost">Total Cost: $0</span>
        </div>
    </div>

    <div class="instructions">
        Click floor or use LEFT/RIGHT arrows + ENTER to place.<br>
        Press 'D' to toggle door on last placed cabinet.
    </div>

    <div id="ui-bottom">
        Selected X Position: <span id="val-x">0</span>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            cabinetCount: 0,
            totalCost: 0,
            selectedType: null,
            lastPlacedX: null,
            lastPlacedType: null,
            ghostVisible: false,
            doorOpen: false,
            particlesEmitted: 0,
            cameraDistance: 0,
            cabinetTypes: { base: 0, wall: 0, tall: 0 }
        };

        const CABINET_SPECS = {
            base: { w: 1, h: 1, d: 0.6, y: 0, color: 0x8B4513, cost: 150 },
            wall: { w: 1, h: 0.8, d: 0.4, y: 2.2, color: 0x654321, cost: 120 },
            tall: { w: 1, h: 2.2, d: 0.6, y: 0, color: 0x5C4033, cost: 280 }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#f0f0f0');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minPolarAngle = 0.2;
        controls.maxPolarAngle = 1.4;
        controls.target.set(0, 1, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- Environment ---
        // Floor
        const floorGeo = new THREE.PlaneGeometry(10, 10);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xb5a48a, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Back Wall
        const wallGeo = new THREE.BoxGeometry(10, 4, 0.2);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xe8e0d4, roughness: 0.9 });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 2, -2);
        wall.receiveShadow = true;
        wall.castShadow = true;
        scene.add(wall);

        // --- Application Logic ---
        let cabinets = [];
        let ghostCabinet = null;
        let currentX = 0;
        let particles = [];
        const clock = new THREE.Clock();

        // Materials for particles
        const particleTex = createCircleTexture();
        const goldMat = new THREE.SpriteMaterial({ map: particleTex, color: 0xFFD700, transparent: true, blending: THREE.AdditiveBlending });
        const redMat = new THREE.SpriteMaterial({ map: particleTex, color: 0xFF4444, transparent: true, blending: THREE.AdditiveBlending });

        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            return new THREE.CanvasTexture(canvas);
        }

        function buildCabinetMesh(type, isGhost = false) {
            const spec = CABINET_SPECS[type];
            const group = new THREE.Group();

            const matParams = { color: spec.color, roughness: 0.7 };
            if (isGhost) {
                matParams.transparent = true;
                matParams.opacity = 0.5;
                matParams.depthWrite = false;
            }
            const material = new THREE.MeshStandardMaterial(matParams);

            // Main Body
            const bodyGeo = new THREE.BoxGeometry(spec.w, spec.h, spec.d);
            const body = new THREE.Mesh(bodyGeo, material);
            body.position.y = spec.h / 2;
            if (!isGhost) {
                body.castShadow = true;
                body.receiveShadow = true;
            }
            group.add(body);

            // Door Pivot Group (Left edge)
            const doorPivot = new THREE.Group();
            doorPivot.position.set(-spec.w / 2, spec.h / 2, spec.d / 2 + 0.005);
            group.add(doorPivot);

            // Door Panel
            const doorGeo = new THREE.BoxGeometry(spec.w - 0.02, spec.h - 0.02, 0.02);
            const door = new THREE.Mesh(doorGeo, material);
            door.position.set(spec.w / 2, 0, 0.01);
            if (!isGhost) {
                door.castShadow = true;
                door.receiveShadow = true;
            }
            doorPivot.add(door);

            // Handle
            const handleGeo = new THREE.SphereGeometry(0.04, 16, 16);
            const handleMat = new THREE.MeshStandardMaterial({ 
                color: 0xdddddd, metalness: 0.8, roughness: 0.2,
                transparent: isGhost, opacity: isGhost ? 0.5 : 1
            });
            const handle = new THREE.Mesh(handleGeo, handleMat);
            handle.position.set(spec.w - 0.1, 0, 0.04);
            if (!isGhost) handle.castShadow = true;
            doorPivot.add(handle);

            group.userData = { type, doorPivot, doorOpen: false };
            return group;
        }

        function updateGhost() {
            if (ghostCabinet) {
                scene.remove(ghostCabinet);
                ghostCabinet = null;
            }
            
            if (window.__3D_STATE__.selectedType) {
                ghostCabinet = buildCabinetMesh(window.__3D_STATE__.selectedType, true);
                const spec = CABINET_SPECS[window.__3D_STATE__.selectedType];
                ghostCabinet.position.set(currentX, spec.y, 0);
                scene.add(ghostCabinet);
                window.__3D_STATE__.ghostVisible = true;
            } else {
                window.__3D_STATE__.ghostVisible = false;
            }
            document.getElementById('val-x').innerText = currentX.toFixed(1);
        }

        function emitParticles(position, isRed, count) {
            const baseMat = isRed ? redMat : goldMat;
            for (let i = 0; i < count; i++) {
                const sprite = new THREE.Sprite(baseMat.clone());
                sprite.scale.set(0.15, 0.15, 1);
                
                // Random position slightly around center
                sprite.position.copy(position);
                sprite.position.x += (Math.random() - 0.5) * 0.5;
                sprite.position.y += (Math.random() - 0.5) * 0.5 + 0.5;
                sprite.position.z += (Math.random() - 0.5) * 0.5;

                // Explosion velocity
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 3,
                    Math.random() * 3 + 1,
                    (Math.random() - 0.5) * 3
                );

                scene.add(sprite);
                particles.push({ mesh: sprite, velocity, age: 0, life: 1.5 });
            }
            window.__3D_STATE__.particlesEmitted += count;
        }

        function placeCabinet(x) {
            const type = window.__3D_STATE__.selectedType;
            if (!type) return;

            const spec = CABINET_SPECS[type];
            const cabinet = buildCabinetMesh(type, false);
            cabinet.position.set(x, spec.y, 0);
            scene.add(cabinet);
            cabinets.push(cabinet);

            emitParticles(cabinet.position.clone(), false, 30);

            window.__3D_STATE__.lastPlacedX = x;
            window.__3D_STATE__.lastPlacedType = type;
            
            // Deselect after placement
            selectType(null);
            updateState();
        }

        function removeLastCabinet() {
            if (cabinets.length === 0) return;
            const cabinet = cabinets.pop();
            
            // Emit from center of cabinet
            const pos = cabinet.position.clone();
            pos.y += CABINET_SPECS[cabinet.userData.type].h / 2;
            emitParticles(pos, true, 20);

            scene.remove(cabinet);
            updateState();
        }

        function clearAll() {
            cabinets.forEach(c => scene.remove(c));
            cabinets = [];
            updateState();
        }

        function toggleDoor() {
            if (cabinets.length === 0) return;
            const lastCab = cabinets[cabinets.length - 1];
            lastCab.userData.doorOpen = !lastCab.userData.doorOpen;
            window.__3D_STATE__.doorOpen = lastCab.userData.doorOpen;
        }

        function updateState() {
            const state = window.__3D_STATE__;
            state.cabinetCount = cabinets.length;
            state.totalCost = 0;
            state.cabinetTypes = { base: 0, wall: 0, tall: 0 };

            cabinets.forEach(cab => {
                const type = cab.userData.type;
                state.totalCost += CABINET_SPECS[type].cost;
                state.cabinetTypes[type]++;
            });

            if (cabinets.length > 0) {
                state.doorOpen = cabinets[cabinets.length - 1].userData.doorOpen;
            } else {
                state.doorOpen = false;
            }

            // Update DOM
            document.getElementById('stat-count').innerText = `Cabinets: ${state.cabinetCount}`;
            document.getElementById('stat-cost').innerText = `Total Cost: $${state.totalCost}`;
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

        function selectType(type) {
            window.__3D_STATE__.selectedType = type;
            document.querySelectorAll('#ui-top button').forEach(b => b.classList.remove('active'));
            if (type) document.getElementById(`btn-${type}`).classList.add('active');
            updateGhost();
        }

        // UI Listeners
        document.getElementById('btn-base').addEventListener('click', () => selectType('base'));
        document.getElementById('btn-wall').addEventListener('click', () => selectType('wall'));
        document.getElementById('btn-tall').addEventListener('click', () => selectType('tall'));
        document.getElementById('btn-remove').addEventListener('click', removeLastCabinet);
        document.getElementById('btn-clear').addEventListener('click', clearAll);

        // Mouse/Raycast Listeners
        window.addEventListener('mousemove', (e) => {
            if (!window.__3D_STATE__.selectedType) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(floorPlane, intersectPoint);
            
            if (intersectPoint) {
                let snappedX = Math.round(intersectPoint.x);
                snappedX = Math.max(-4, Math.min(4, snappedX));
                if (snappedX !== currentX) {
                    currentX = snappedX;
                    updateGhost();
                }
            }
        });

        window.addEventListener('click', (e) => {
            // Ignore clicks on UI
            if (e.target.tagName === 'BUTTON' || e.target.closest('#ui-top') || e.target.closest('#ui-bottom')) return;
            if (window.__3D_STATE__.selectedType) {
                placeCabinet(currentX);
            }
        });

        // Keyboard Listeners
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                currentX = Math.max(-4, currentX - 1);
                updateGhost();
            } else if (e.key === 'ArrowRight') {
                currentX = Math.min(4, currentX + 1);
                updateGhost();
            } else if (e.key === 'Enter') {
                if (window.__3D_STATE__.selectedType) placeCabinet(currentX);
            } else if (e.key === 'd' || e.key === 'D') {
                toggleDoor();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            controls.update();

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.age += delta;
                if (p.age >= p.life) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                } else {
                    // Gravity effect
                    p.velocity.y -= 5 * delta;
                    p.mesh.position.addScaledVector(p.velocity, delta);
                    p.mesh.material.opacity = 1 - (p.age / p.life);
                }
            }

            // Update Door Animations
            const doorSpeed = (Math.PI / 2) / 0.3; // 90 deg in 0.3s
            cabinets.forEach(cab => {
                const pivot = cab.userData.doorPivot;
                const targetAngle = cab.userData.doorOpen ? Math.PI / 2 : 0;
                
                if (pivot.rotation.y < targetAngle) {
                    pivot.rotation.y = Math.min(targetAngle, pivot.rotation.y + doorSpeed * delta);
                } else if (pivot.rotation.y > targetAngle) {
                    pivot.rotation.y = Math.max(targetAngle, pivot.rotation.y - doorSpeed * delta);
                }
            });

            // Update State
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            renderer.render(scene, camera);
        }

        // Init
        updateState();
        animate();

    </script>
</body>
</html>
