<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Bowling Game with Time Control</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #fff;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 20px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 220px;
}

#hud .label {
    color: #aaa;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#hud .value {
    color: #00d4ff;
    font-weight: bold;
    font-size: 16px;
}

#hud .score-big {
    font-size: 28px;
    color: #ffcc00;
}

#controls {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
}

#controls button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#controls button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

#btn-pause { background: #e74c3c; color: white; }
#btn-slowmo { background: #9b59b6; color: white; }
#btn-normal { background: #2ecc71; color: white; }
#btn-fastfwd { background: #e67e22; color: white; }
#btn-reset { background: #3498db; color: white; }

#instructions {
    position: absolute;
    top: 15px;
    right: 15px;
    color: #fff;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 20px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}

#instructions h3 {
    color: #ffcc00;
    margin-bottom: 5px;
}

#instructions kbd {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
}

#replay-cam-label {
    position: absolute;
    color: #fff;
    background: rgba(255, 100, 100, 0.8);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    pointer-events: none;
    display: none;
}

.phase-aiming { color: #2ecc71 !important; }
.phase-rolling { color: #e67e22 !important; }
.phase-finished { color: #e74c3c !important; }
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">Score</span><br><span class="value score-big" id="hud-score">0</span></div>
    <div><span class="label">Phase</span> <span class="value" id="hud-phase">aiming</span></div>
    <div><span class="label">Pins Remaining</span> <span class="value" id="hud-pins-remaining">10</span></div>
    <div><span class="label">Aim</span> <span class="value" id="hud-aim">0.0</span></div>
    <div><span class="label">Power</span> <span class="value" id="hud-power">5</span></div>
    <div><span class="label">Time Scale</span> <span class="value" id="hud-timescale">1.0x</span></div>
</div>

<div id="instructions">
    <h3>Controls</h3>
    <kbd>←</kbd> <kbd>→</kbd> Aim<br>
    <kbd>↑</kbd> <kbd>↓</kbd> Power<br>
    <kbd>Space</kbd> Launch<br>
    Use buttons for time control
</div>

<div id="replay-cam-label">📹 REPLAY CAM</div>

<div id="controls">
    <button id="btn-pause">⏸ Pause</button>
    <button id="btn-slowmo">🐌 Slow-Mo</button>
    <button id="btn-normal">▶ Normal</button>
    <button id="btn-fastfwd">⏩ Fast</button>
    <button id="btn-reset">🔄 Reset</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0x404060, 1.5);
scene.add(ambientLight);

const pointLight1 = new THREE.PointLight(0xff6600, 1, 20);
pointLight1.position.set(-3, 4, -5);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x0066ff, 0.8, 20);
pointLight2.position.set(3, 4, 5);
scene.add(pointLight2);

// Floor
const floorGeo = new THREE.PlaneGeometry(40, 40);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.5;
floor.receiveShadow = true;
scene.add(floor);

// Bowling lane
const laneGeo = new THREE.BoxGeometry(3, 0.2, 20);
const laneMat = new THREE.MeshStandardMaterial({
    color: 0x8B6914,
    roughness: 0.3,
    metalness: 0.1
});
const lane = new THREE.Mesh(laneGeo, laneMat);
lane.position.set(0, -0.1, 0);
lane.receiveShadow = true;
scene.add(lane);

// Lane markings
const arrowGeo = new THREE.PlaneGeometry(0.05, 2);
const arrowMat = new THREE.MeshStandardMaterial({ color: 0x5a4010, roughness: 0.5 });
for (let i = -3; i <= 3; i++) {
    const arrow = new THREE.Mesh(arrowGeo, arrowMat);
    arrow.rotation.x = -Math.PI / 2;
    arrow.position.set(i * 0.3, 0.01, 3);
    scene.add(arrow);
}

// Foul line
const foulGeo = new THREE.PlaneGeometry(3, 0.05);
const foulMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 });
const foulLine = new THREE.Mesh(foulGeo, foulMat);
foulLine.rotation.x = -Math.PI / 2;
foulLine.position.set(0, 0.01, 5);
scene.add(foulLine);

// Gutters
const gutterGeo = new THREE.BoxGeometry(0.5, 0.15, 20);
const gutterMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
const gutterLeft = new THREE.Mesh(gutterGeo, gutterMat);
gutterLeft.position.set(-1.75, -0.15, 0);
gutterLeft.receiveShadow = true;
scene.add(gutterLeft);

const gutterRight = new THREE.Mesh(gutterGeo, gutterMat);
gutterRight.position.set(1.75, -0.15, 0);
gutterRight.receiveShadow = true;
scene.add(gutterRight);

// Side rails
const railGeo = new THREE.BoxGeometry(0.1, 0.3, 20);
const railMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5 });
const railLeft = new THREE.Mesh(railGeo, railMat);
railLeft.position.set(-2.05, 0, 0);
scene.add(railLeft);
const railRight = new THREE.Mesh(railGeo, railMat);
railRight.position.set(2.05, 0, 0);
scene.add(railRight);

// Pin creation
const pins = [];
const pinStates = [];
const pinOriginalPositions = [];
const pinOriginalRotations = [];

function createPin(x, z) {
    const group = new THREE.Group();

    // Pin body (simplified bowling pin shape)
    const bodyGeo = new THREE.CylinderGeometry(0.1, 0.15, 0.4, 12);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.1 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.2;
    body.castShadow = true;
    group.add(body);

    // Pin neck
    const neckGeo = new THREE.CylinderGeometry(0.06, 0.1, 0.15, 12);
    const neck = new THREE.Mesh(neckGeo, bodyMat);
    neck.position.y = 0.45;
    neck.castShadow = true;
    group.add(neck);

    // Pin head
    const headGeo = new THREE.SphereGeometry(0.07, 12, 8);
    const head = new THREE.Mesh(headGeo, bodyMat);
    head.position.y = 0.55;
    head.castShadow = true;
    group.add(head);

    // Red stripes
    const stripeGeo = new THREE.TorusGeometry(0.11, 0.015, 8, 16);
    const stripeMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
    const stripe1 = new THREE.Mesh(stripeGeo, stripeMat);
    stripe1.position.y = 0.38;
    stripe1.rotation.x = Math.PI / 2;
    group.add(stripe1);
    const stripe2 = new THREE.Mesh(stripeGeo, stripeMat);
    stripe2.position.y = 0.42;
    stripe2.rotation.x = Math.PI / 2;
    group.add(stripe2);

    group.position.set(x, 0, z);
    scene.add(group);
    return group;
}

// Standard pin arrangement
const pinPositions = [
    // Row 1: 1 pin
    { x: 0, z: -8 },
    // Row 2: 2 pins
    { x: -0.25, z: -8.6 },
    { x: 0.25, z: -8.6 },
    // Row 3: 3 pins
    { x: -0.5, z: -9.2 },
    { x: 0, z: -9.2 },
    { x: 0.5, z: -9.2 },
    // Row 4: 4 pins
    { x: -0.75, z: -9.8 },
    { x: -0.25, z: -9.8 },
    { x: 0.25, z: -9.8 },
    { x: 0.75, z: -9.8 }
];

pinPositions.forEach((pos, i) => {
    const pin = createPin(pos.x, pos.z);
    pins.push(pin);
    pinStates.push(true); // true = standing
    pinOriginalPositions.push({ x: pos.x, y: 0, z: pos.z });
    pinOriginalRotations.push({ x: 0, y: 0, z: 0 });
});

// Bowling ball
const ballGeo = new THREE.SphereGeometry(0.3, 32, 32);
const ballMat = new THREE.MeshStandardMaterial({
    color: 0x1a3a8a,
    roughness: 0.2,
    metalness: 0.6
});
const ball = new THREE.Mesh(ballGeo, ballMat);
ball.position.set(0, 0.3, 8);
ball.castShadow = true;
scene.add(ball);

// Ball finger holes
const holeGeo = new THREE.CircleGeometry(0.04, 16);
const holeMat = new THREE.MeshStandardMaterial({ color: 0x0a1a4a });
for (let i = 0; i < 3; i++) {
    const hole = new THREE.Mesh(holeGeo, holeMat);
    const angle = (i / 3) * Math.PI * 0.5 + 0.3;
    hole.position.set(Math.cos(angle) * 0.15, 0.3 + Math.sin(angle) * 0.15, 0);
    hole.lookAt(hole.position.clone().add(new THREE.Vector3(0, 0, 1)));
    ball.add(hole);
}

// Aim indicator arrow
const aimArrowGeo = new THREE.ConeGeometry(0.1, 0.5, 8);
const aimArrowMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x003300 });
const aimArrow = new THREE.Mesh(aimArrowGeo, aimArrowMat);
aimArrow.rotation.x = Math.PI / 2;
aimArrow.position.set(0, 0.5, 7.2);
scene.add(aimArrow);

// Power indicator bar
const powerBarGroup = new THREE.Group();
const powerBarBg = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 2, 0.1),
    new THREE.MeshStandardMaterial({ color: 0x333333 })
);
powerBarBg.position.set(2.5, 1, 8);
powerBarGroup.add(powerBarBg);

const powerBarFill = new THREE.Mesh(
    new THREE.BoxGeometry(0.12, 1, 0.12),
    new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x003300 })
);
powerBarFill.position.set(2.5, 0.5, 8);
powerBarGroup.add(powerBarFill);
scene.add(powerBarGroup);

// Load GLTF model
let modelLoaded = false;
const loader = new GLTFLoader();
const replayCamLabel = document.getElementById('replay-cam-label');

// Try to load the model, but don't fail if it's not available
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/AntiqueCamera/glTF-Binary/AntiqueCamera.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.5, 0.5, 0.5);
        model.position.set(4, 1, 5);
        model.castShadow = true;
        scene.add(model);
        modelLoaded = true;
        replayCamLabel.style.display = 'block';
    },
    undefined,
    (error) => {
        console.warn('Could not load AntiqueCamera.glb, creating placeholder:', error);
        // Create a placeholder camera prop
        const camGroup = new THREE.Group();
        const camBody = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 0.5, 0.8),
            new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6 })
        );
        camGroup.add(camBody);
        const camLens = new THREE.Mesh(
            new THREE.CylinderGeometry(0.15, 0.2, 0.4, 16),
            new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8 })
        );
        camLens.rotation.x = Math.PI / 2;
        camLens.position.z = 0.6;
        camGroup.add(camLens);
        const camTripod = new THREE.Mesh(
            new THREE.CylinderGeometry(0.03, 0.03, 1, 8),
            new THREE.MeshStandardMaterial({ color: 0x654321 })
        );
        camTripod.position.y = -0.7;
        camGroup.add(camTripod);
        camGroup.position.set(4, 1, 5);
        camGroup.scale.set(0.5, 0.5, 0.5);
        scene.add(camGroup);
        modelLoaded = true;
        replayCamLabel.style.display = 'block';
    }
);

// Game state
let timeScale = 1.0;
let aimValue = 0;
let power = 5;
let ballLaunched = false;
let ballVelocity = { x: 0, y: 0, z: 0 };
let pinsKnocked = 0;
let score = 0;
let phase = 'aiming';
let gutterBall = false;

// Pin fall animation tracking
const pinFallAnimations = [];

// Initialize global state
window.__3D_STATE__ = {
    ballPosition: { x: 0, y: 0.3, z: 8 },
    ballVelocity: { x: 0, y: 0, z: 0 },
    ballLaunched: false,
    pinsKnocked: 0,
    pinsRemaining: 10,
    score: 0,
    timeScale: 1.0,
    aimValue: 0,
    power: 5,
    phase: 'aiming',
    gutterBall: false,
    modelLoaded: false,
    pinStates: [true, true, true, true, true, true, true, true, true, true]
};

// HUD elements
const hudScore = document.getElementById('hud-score');
const hudPhase = document.getElementById('hud-phase');
const hudPinsRemaining = document.getElementById('hud-pins-remaining');
const hudAim = document.getElementById('hud-aim');
const hudPower = document.getElementById('hud-power');
const hudTimescale = document.getElementById('hud-timescale');

// Button handlers
document.getElementById('btn-pause').addEventListener('click', () => { timeScale = 0.0; });
document.getElementById('btn-slowmo').addEventListener('click', () => { timeScale = 0.25; });
document.getElementById('btn-normal').addEventListener('click', () => { timeScale = 1.0; });
document.getElementById('btn-fastfwd').addEventListener('click', () => { timeScale = 3.0; });
document.getElementById('btn-reset').addEventListener('click', resetGame);

// Keyboard input
document.addEventListener('keydown', (e) => {
    if (phase === 'aiming') {
        switch (e.code) {
            case 'ArrowLeft':
                aimValue = Math.max(-2, aimValue - 0.2);
                aimValue = Math.round(aimValue * 10) / 10;
                break;
            case 'ArrowRight':
                aimValue = Math.min(2, aimValue + 0.2);
                aimValue = Math.round(aimValue * 10) / 10;
                break;
            case 'ArrowUp':
                power = Math.min(10, power + 1);
                break;
            case 'ArrowDown':
                power = Math.max(1, power - 1);
                break;
            case 'Space':
                e.preventDefault();
                launchBall();
                break;
        }
    }
});

function launchBall() {
    if (phase !== 'aiming') return;
    ballLaunched = true;
    phase = 'rolling';
    ballVelocity = {
        x: aimValue * 0.5,
        y: 0,
        z: -power * 0.8
    };
    aimArrow.visible = false;
    powerBarGroup.visible = false;
}

function resetGame() {
    ball.position.set(0, 0.3, 8);
    ballVelocity = { x: 0, y: 0, z: 0 };
    ballLaunched = false;
    phase = 'aiming';
    gutterBall = false;
    pinsKnocked = 0;
    score = 0;
    aimValue = 0;
    power = 5;
    aimArrow.visible = true;
    powerBarGroup.visible = true;

    pins.forEach((pin, i) => {
        pin.position.set(pinOriginalPositions[i].x, pinOriginalPositions[i].y, pinOriginalPositions[i].z);
        pin.rotation.set(0, 0, 0);
        pinStates[i] = true;
    });

    pinFallAnimations.length = 0;
}

// Update aim arrow position and rotation
function updateAimIndicator() {
    if (phase === 'aiming') {
        aimArrow.position.x = ball.position.x + aimValue * 0.3;
        aimArrow.position.z = ball.position.z - 0.8;
        aimArrow.rotation.z = -aimValue * 0.3;

        // Update power bar
        const powerNorm = power / 10;
        powerBarFill.scale.y = powerNorm;
        powerBarFill.position.y = powerNorm * 0.5 + 0.0;

        // Color based on power
        const r = powerNorm;
        const g = 1 - powerNorm;
        powerBarFill.material.color.setRGB(r, g, 0);
        powerBarFill.material.emissive.setRGB(r * 0.3, g * 0.3, 0);
    }
}

// Physics update
function updatePhysics(dt) {
    if (!ballLaunched || phase === 'finished' || phase === 'aiming') return;

    const scaledDt = dt * timeScale;
    if (scaledDt === 0) return;

    // Update ball position
    ball.position.x += ballVelocity.x * scaledDt;
    ball.position.y += ballVelocity.y * scaledDt;
    ball.position.z += ballVelocity.z * scaledDt;

    // Ball rotation for visual effect
    ball.rotation.x -= ballVelocity.z * scaledDt * 2;
    ball.rotation.z -= ballVelocity.x * scaledDt * 2;

    // Friction
    const friction = 0.995;
    ballVelocity.x *= Math.pow(friction, scaledDt * 60);
    ballVelocity.z *= Math.pow(friction, scaledDt * 60);

    // Gutter detection
    if (!gutterBall && (ball.position.x < -1.5 || ball.position.x > 1.5)) {
        gutterBall = true;
        ballVelocity.y = -2;
    }

    if (gutterBall) {
        ball.position.y += ballVelocity.y * scaledDt;
        if (ball.position.y < -0.5) {
            ball.position.y = -0.5;
            ballVelocity.y = 0;
            ballVelocity.x *= 0.9;
            ballVelocity.z *= 0.95;
        }
    }

    // Pin collision
    pins.forEach((pin, i) => {
        if (!pinStates[i]) return;

        const dx = ball.position.x - pin.position.x;
        const dz = ball.position.z - pin.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 0.5) {
            pinStates[i] = false;
            pinsKnocked++;
            score++;

            // Calculate knock direction
            const knockDirX = dx / dist;
            const knockDirZ = dz / dist;

            // Start fall animation
            pinFallAnimations.push({
                index: i,
                progress: 0,
                dirX: knockDirX,
                dirZ: knockDirZ,
                speed: Math.sqrt(ballVelocity.x * ballVelocity.x + ballVelocity.z * ballVelocity.z) * 0.3
            });

            // Slow ball slightly on hit
            ballVelocity.x *= 0.95;
            ballVelocity.z *= 0.95;

            // Chain reaction: check nearby pins
            pins.forEach((otherPin, j) => {
                if (j === i || !pinStates[j]) return;
                const odx = pin.position.x - otherPin.position.x;
                const odz = pin.position.z - otherPin.position.z;
                const odist = Math.sqrt(odx * odx + odz * odz);
                if (odist < 0.6) {
                    // Nearby pin gets knocked too with some delay
                    setTimeout(() => {
                        if (pinStates[j]) {
                            pinStates[j] = false;
                            pinsKnocked++;
                            score++;
                            pinFallAnimations.push({
                                index: j,
                                progress: 0,
                                dirX: -odx / odist,
                                dirZ: -odz / odist,
                                speed: 1.5
                            });
                        }
                    }, 100 / Math.max(timeScale, 0.01));
                }
            });
        }
    });

    // Animate falling pins
    pinFallAnimations.forEach((anim) => {
        if (anim.progress >= 1) return;
        anim.progress += scaledDt * (2 + anim.speed);
        if (anim.progress > 1) anim.progress = 1;

        const pin = pins[anim.index];
        const t = anim.progress;
        const eased = 1 - Math.pow(1 - t, 3); // ease out cubic

        pin.rotation.x = eased * (Math.PI / 2) * -anim.dirZ;
        pin.rotation.z = eased * (Math.PI / 2) * anim.dirX;
        pin.position.x = pinOriginalPositions[anim.index].x + anim.dirX * eased * 0.3;
        pin.position.z = pinOriginalPositions[anim.index].z + anim.dirZ * eased * 0.3;
        pin.position.y = pinOriginalPositions[anim.index].y - eased * 0.15;
    });

    // Check if ball stopped
    const velMag = Math.sqrt(
        ballVelocity.x * ballVelocity.x +
        ballVelocity.y * ballVelocity.y +
        ballVelocity.z * ballVelocity.z
    );

    if (ball.position.z < -10 || (velMag < 0.01 && ballLaunched)) {
        phase = 'finished';
        ballVelocity = { x: 0, y: 0, z: 0 };
    }
}

// Update replay cam label position
function updateReplayCamLabel() {
    const camPos = new THREE.Vector3(4, 1.5, 5);
    const projected = camPos.clone().project(camera);

    if (projected.z < 1) {
        const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
        replayCamLabel.style.left = x + 'px';
        replayCamLabel.style.top = (y - 30) + 'px';
    }
}

// Update HUD
function updateHUD() {
    hudScore.textContent = score;
    hudPhase.textContent = phase;
    hudPhase.className = 'value phase-' + phase;
    hudPinsRemaining.textContent = (10 - pinsKnocked);
    hudAim.textContent = aimValue.toFixed(1);
    hudPower.textContent = power;
    hudTimescale.textContent = timeScale.toFixed(2) + 'x';

    // Update global state
    window.__3D_STATE__ = {
        ballPosition: { x: ball.position.x, y: ball.position.y, z: ball.position.z },
        ballVelocity: { x: ballVelocity.x, y: ballVelocity.y, z: ballVelocity.z },
        ballLaunched: ballLaunched,
        pinsKnocked: pinsKnocked,
        pinsRemaining: 10 - pinsKnocked,
        score: score,
        timeScale: timeScale,
        aimValue: aimValue,
        power: power,
        phase: phase,
        gutterBall: gutterBall,
        modelLoaded: modelLoaded,
        pinStates: [...pinStates]
    };
}

// Particles for pin hits
const particles = [];
function spawnParticles(position) {
    for (let i = 0; i < 5; i++) {
        const geo = new THREE.SphereGeometry(0.03, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
        const p = new THREE.Mesh(geo, mat);
        p.position.copy(position);
        p.userData.vel = new THREE.Vector3(
            (Math.random() - 0.5) * 3,
            Math.random() * 3,
            (Math.random() - 0.5) * 3
        );
        p.userData.life = 1.0;
        scene.add(p);
        particles.push(p);
    }
}

function updateParticles(dt) {
    const scaledDt = dt * timeScale;
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.position.add(p.userData.vel.clone().multiplyScalar(scaledDt));
        p.userData.vel.y -= 9.8 * scaledDt;
        p.userData.life -= scaledDt * 2;
        p.material.opacity = p.userData.life;
        p.material.transparent = true;
        if (p.userData.life <= 0) {
            scene.remove(p);
            particles.splice(i, 1);
        }
    }
}

// Track previous pin states for particle spawning
let prevPinsKnocked = 0;

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.05);

    controls.update();
    updateAimIndicator();
    updatePhysics(dt);
    updateParticles(dt);
    updateReplayCamLabel();

    // Spawn particles when new pins are knocked
    if (pinsKnocked > prevPinsKnocked) {
        for (let i = 0; i < pins.length; i++) {
            if (!pinStates[i]) {
                spawnParticles(pins[i].position.clone().add(new THREE.Vector3(0, 0.3, 0)));
            }
        }
        prevPinsKnocked = pinsKnocked;
    }

    updateHUD();

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
