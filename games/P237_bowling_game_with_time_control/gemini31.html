<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bowling Game with Time Control</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .hud-panel h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #4da6ff;
        }
        .hud-row {
            margin-bottom: 5px;
            font-size: 14px;
        }
        .hud-value {
            font-weight: bold;
            color: #ffd700;
        }
        .controls {
            pointer-events: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            max-width: 250px;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        button:active {
            background: #777;
        }
        #btn-reset {
            background: #8b0000;
            border-color: #ff0000;
            margin-top: 10px;
            width: 100%;
        }
        #btn-reset:hover {
            background: #a50000;
        }
        .instructions {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
            line-height: 1.4;
        }
        #camera-label {
            position: absolute;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -50%);
            border: 1px solid #4da6ff;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-container">
        <div class="hud-panel">
            <h2>Game Status</h2>
            <div class="hud-row">Phase: <span id="hud-phase" class="hud-value">aiming</span></div>
            <div class="hud-row">Score: <span id="hud-score" class="hud-value">0</span></div>
            <div class="hud-row">Pins Remaining: <span id="hud-pins-remaining" class="hud-value">10</span></div>
        </div>

        <div class="hud-panel">
            <h2>Player Controls</h2>
            <div class="hud-row">Aim (L/R): <span id="hud-aim" class="hud-value">0.0</span></div>
            <div class="hud-row">Power (U/D): <span id="hud-power" class="hud-value">5</span></div>
            <div class="instructions">
                Use Arrow Keys to Aim/Power.<br>
                Press SPACEBAR to Launch.
            </div>
        </div>

        <div class="hud-panel controls">
            <h2>Time Control</h2>
            <div class="hud-row" style="width: 100%; margin-bottom: 10px;">
                Speed: <span id="hud-timescale" class="hud-value">1.0x</span>
            </div>
            <button id="btn-slowmo">Slow Mo (0.25x)</button>
            <button id="btn-normal">Normal (1.0x)</button>
            <button id="btn-fastfwd">Fast Fwd (3.0x)</button>
            <button id="btn-pause">Pause (0.0x)</button>
            <button id="btn-reset">Reset Frame</button>
        </div>
    </div>

    <div id="camera-label">Replay Cam</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            ballPosition: { x: 0, y: 0.3, z: 8 },
            ballVelocity: { x: 0, y: 0, z: 0 },
            ballLaunched: false,
            pinsKnocked: 0,
            pinsRemaining: 10,
            score: 0,
            timeScale: 1.0,
            aimValue: 0,
            power: 5,
            phase: 'aiming',
            gutterBall: false,
            modelLoaded: false,
            pinStates: Array(10).fill(true)
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        scene.add(dirLight);

        // --- Objects ---
        // Lane
        const laneGeo = new THREE.BoxGeometry(3, 0.2, 20);
        const laneMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.4 });
        const lane = new THREE.Mesh(laneGeo, laneMat);
        lane.position.set(0, -0.1, 0);
        lane.receiveShadow = true;
        scene.add(lane);

        // Gutters
        const gutterGeo = new THREE.BoxGeometry(0.5, 0.1, 20);
        const gutterMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const gutterL = new THREE.Mesh(gutterGeo, gutterMat);
        gutterL.position.set(-1.75, -0.15, 0);
        gutterL.receiveShadow = true;
        scene.add(gutterL);
        
        const gutterR = new THREE.Mesh(gutterGeo, gutterMat);
        gutterR.position.set(1.75, -0.15, 0);
        gutterR.receiveShadow = true;
        scene.add(gutterR);

        // Pins
        const pins = [];
        const pinGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.6, 16);
        const pinMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
        
        const pinPositions = [
            { x: 0, z: -8 }, // Row 1
            { x: -0.25, z: -8.6 }, { x: 0.25, z: -8.6 }, // Row 2
            { x: -0.5, z: -9.2 }, { x: 0, z: -9.2 }, { x: 0.5, z: -9.2 }, // Row 3
            { x: -0.75, z: -9.8 }, { x: -0.25, z: -9.8 }, { x: 0.25, z: -9.8 }, { x: 0.75, z: -9.8 } // Row 4
        ];

        pinPositions.forEach((pos, index) => {
            const pin = new THREE.Mesh(pinGeo, pinMat);
            pin.position.set(pos.x, 0.3, pos.z);
            pin.castShadow = true;
            pin.receiveShadow = true;
            pin.userData = { id: index, initialPos: new THREE.Vector3(pos.x, 0.3, pos.z) };
            scene.add(pin);
            pins.push(pin);
        });

        // Ball
        const ballGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0x00008b, roughness: 0.3, metalness: 0.2 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.set(state.ballPosition.x, state.ballPosition.y, state.ballPosition.z);
        ball.castShadow = true;
        scene.add(ball);

        // Antique Camera Model
        let cameraModel = null;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/AntiqueCamera/glTF-Binary/AntiqueCamera.glb',
            (gltf) => {
                cameraModel = gltf.scene;
                cameraModel.scale.set(0.5, 0.5, 0.5);
                cameraModel.position.set(4, 1, 5);
                // Point camera towards pins
                cameraModel.lookAt(0, 0, -8);
                
                cameraModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                scene.add(cameraModel);
                state.modelLoaded = true;
                document.getElementById('camera-label').style.display = 'block';
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (state.phase !== 'aiming') return;

            switch(e.code) {
                case 'ArrowLeft':
                    state.aimValue = Math.max(-2, state.aimValue - 0.2);
                    updateHUD();
                    break;
                case 'ArrowRight':
                    state.aimValue = Math.min(2, state.aimValue + 0.2);
                    updateHUD();
                    break;
                case 'ArrowUp':
                    state.power = Math.min(10, state.power + 1);
                    updateHUD();
                    break;
                case 'ArrowDown':
                    state.power = Math.max(1, state.power - 1);
                    updateHUD();
                    break;
                case 'Space':
                    launchBall();
                    break;
            }
        });

        function launchBall() {
            state.phase = 'rolling';
            state.ballLaunched = true;
            state.ballVelocity = {
                x: state.aimValue * 0.5,
                y: 0,
                z: -state.power * 0.8
            };
            updateHUD();
        }

        // --- UI Controls ---
        document.getElementById('btn-slowmo').addEventListener('click', () => setTimeScale(0.25));
        document.getElementById('btn-normal').addEventListener('click', () => setTimeScale(1.0));
        document.getElementById('btn-fastfwd').addEventListener('click', () => setTimeScale(3.0));
        document.getElementById('btn-pause').addEventListener('click', () => setTimeScale(0.0));
        document.getElementById('btn-reset').addEventListener('click', resetGame);

        function setTimeScale(scale) {
            state.timeScale = scale;
            updateHUD();
        }

        function resetGame() {
            // Reset State
            state.ballPosition = { x: 0, y: 0.3, z: 8 };
            state.ballVelocity = { x: 0, y: 0, z: 0 };
            state.ballLaunched = false;
            state.pinsKnocked = 0;
            state.pinsRemaining = 10;
            state.score = 0;
            state.aimValue = 0;
            state.power = 5;
            state.phase = 'aiming';
            state.gutterBall = false;
            state.pinStates.fill(true);

            // Reset 3D Objects
            ball.position.set(state.ballPosition.x, state.ballPosition.y, state.ballPosition.z);
            
            pins.forEach((pin, i) => {
                pin.position.copy(pin.userData.initialPos);
                pin.rotation.set(0, 0, 0);
            });

            updateHUD();
        }

        function updateHUD() {
            document.getElementById('hud-phase').innerText = state.phase;
            document.getElementById('hud-score').innerText = state.score;
            document.getElementById('hud-pins-remaining').innerText = state.pinsRemaining;
            document.getElementById('hud-aim').innerText = state.aimValue.toFixed(1);
            document.getElementById('hud-power').innerText = state.power;
            document.getElementById('hud-timescale').innerText = state.timeScale.toFixed(2) + 'x';
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const rawDelta = clock.getDelta();
            const dt = rawDelta * state.timeScale;

            if (state.phase === 'rolling' && dt > 0) {
                // Move Ball
                ball.position.x += state.ballVelocity.x * dt;
                ball.position.z += state.ballVelocity.z * dt;

                // Gutter Detection
                if (!state.gutterBall && (ball.position.x < -1.5 || ball.position.x > 1.5)) {
                    state.gutterBall = true;
                    ball.position.y = -0.5; // Drop into gutter
                    state.ballVelocity.x = 0; // Stop sideways movement
                    state.ballVelocity.z = 0; // Stop forward motion as per requirements
                }

                // Pin Collision
                if (!state.gutterBall) {
                    pins.forEach((pin, i) => {
                        if (state.pinStates[i]) {
                            const dx = ball.position.x - pin.position.x;
                            const dz = ball.position.z - pin.position.z;
                            const dist = Math.sqrt(dx * dx + dz * dz);

                            if (dist < 0.5) { // Collision threshold
                                state.pinStates[i] = false;
                                state.pinsKnocked++;
                                state.score++;
                                state.pinsRemaining--;
                                
                                // Knock down animation state
                                pin.rotation.x = -Math.PI / 2;
                                pin.position.y = 0.15; // Adjust to lie flat
                                pin.position.z -= 0.2; // Push back slightly
                                
                                updateHUD();
                            }
                        }
                    });
                }

                // Stop Condition
                const speed = Math.sqrt(state.ballVelocity.x**2 + state.ballVelocity.z**2);
                if (ball.position.z < -10 || (state.ballLaunched && speed < 0.01)) {
                    state.phase = 'finished';
                    state.ballVelocity = { x: 0, y: 0, z: 0 };
                    updateHUD();
                }
            }

            // Sync State Object
            state.ballPosition.x = ball.position.x;
            state.ballPosition.y = ball.position.y;
            state.ballPosition.z = ball.position.z;

            // Update Camera Label Position
            if (state.modelLoaded && cameraModel) {
                const label = document.getElementById('camera-label');
                const vector = new THREE.Vector3();
                
                // Get world position of the camera model
                cameraModel.getWorldPosition(vector);
                // Move label slightly above the model
                vector.y += 1.5; 
                
                // Project to 2D screen space
                vector.project(camera);
                
                const x = (vector.x * .5 + .5) * window.innerWidth;
                const y = (vector.y * -.5 + .5) * window.innerHeight;
                
                // Only show if in front of camera
                if (vector.z < 1) {
                    label.style.left = `${x}px`;
                    label.style.top = `${y}px`;
                    label.style.display = 'block';
                } else {
                    label.style.display = 'none';
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize HUD
        updateHUD();
        
        // Start Loop
        animate();
    </script>
</body>
</html>
