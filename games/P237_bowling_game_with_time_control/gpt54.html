<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Bowling Game with Time Control</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      padding: 12px;
      border-radius: 10px;
      min-width: 220px;
    }

    #ui h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    #hud div {
      margin: 4px 0;
      font-size: 14px;
    }

    #controls {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    button {
      background: #2b6cb0;
      color: white;
      border: none;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #3b82f6;
    }

    #help {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.4;
      color: #ddd;
    }

    #replay-label {
      position: absolute;
      z-index: 15;
      padding: 4px 8px;
      background: rgba(255,255,255,0.85);
      color: #111;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      pointer-events: none;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h2>Bowling Time Control</h2>
    <div id="hud">
      <div>Time Scale: <span id="hud-timescale">1.0</span></div>
      <div>Aim: <span id="hud-aim">0.0</span></div>
      <div>Power: <span id="hud-power">5</span></div>
      <div>Score: <span id="hud-score">0</span></div>
      <div>Pins Remaining: <span id="hud-pins-remaining">10</span></div>
      <div>Phase: <span id="hud-phase">aiming</span></div>
    </div>

    <div id="controls">
      <button id="btn-slowmo">Slow Motion</button>
      <button id="btn-normal">Normal</button>
      <button id="btn-fastfwd">Fast Forward</button>
      <button id="btn-pause">Pause</button>
      <button id="btn-reset">Reset</button>
    </div>

    <div id="help">
      ←/→ Aim<br>
      ↑/↓ Power<br>
      Space = Launch
    </div>
  </div>

  <div id="replay-label">Replay Cam</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls, clock;
    let lane, ball, replayCamModel;
    const pins = [];

    let ballVelocity = { x: 0, y: 0, z: 0 };
    let ballLaunched = false;
    let gutterBall = false;
    let timeScale = 1.0;
    let aimValue = 0.0;
    let power = 5;
    let score = 0;
    let phase = 'aiming';
    let modelLoaded = false;

    const laneHalfWidth = 1.5;
    const ballStart = new THREE.Vector3(0, 0.3, 8);
    const replayLabel = document.getElementById('replay-label');

    const hudTimeScale = document.getElementById('hud-timescale');
    const hudAim = document.getElementById('hud-aim');
    const hudPower = document.getElementById('hud-power');
    const hudScore = document.getElementById('hud-score');
    const hudPinsRemaining = document.getElementById('hud-pins-remaining');
    const hudPhase = document.getElementById('hud-phase');

    const pinBasePositions = [
      { x: 0.0,  z: -8.0 },                // Row 1
      { x: -0.25, z: -8.6 }, { x: 0.25, z: -8.6 }, // Row 2
      { x: -0.5, z: -9.2 }, { x: 0.0, z: -9.2 }, { x: 0.5, z: -9.2 }, // Row 3
      { x: -0.75, z: -9.8 }, { x: -0.25, z: -9.8 }, { x: 0.25, z: -9.8 }, { x: 0.75, z: -9.8 } // Row 4
    ];

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x20252f);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 5, 12);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, 0);
      controls.update();

      clock = new THREE.Clock();

      const ambient = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(5, 10, 5);
      scene.add(dirLight);

      createGround();
      createLane();
      createGutters();
      createBall();
      createPins();
      loadReplayCameraModel();

      setupUI();
      setupKeyboard();
      updateHUD();
      updateState();

      window.addEventListener('resize', onResize);
      animate();
    }

    function createGround() {
      const groundGeo = new THREE.PlaneGeometry(40, 40);
      const groundMat = new THREE.MeshStandardMaterial({ color: 0x3b3b3b });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.11;
      scene.add(ground);
    }

    function createLane() {
      const laneGeo = new THREE.BoxGeometry(3, 0.2, 20);
      const laneMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
      lane = new THREE.Mesh(laneGeo, laneMat);
      lane.position.set(0, -0.1, 0);
      scene.add(lane);
    }

    function createGutters() {
      const gutterMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1c });
      const gutterGeo = new THREE.BoxGeometry(0.5, 0.15, 20);

      const leftGutter = new THREE.Mesh(gutterGeo, gutterMat);
      leftGutter.position.set(-1.75, -0.125, 0);

      const rightGutter = new THREE.Mesh(gutterGeo, gutterMat);
      rightGutter.position.set(1.75, -0.125, 0);

      scene.add(leftGutter, rightGutter);
    }

    function createBall() {
      const ballGeo = new THREE.SphereGeometry(0.3, 32, 32);
      const ballMat = new THREE.MeshStandardMaterial({ color: 0x103a7a, metalness: 0.2, roughness: 0.4 });
      ball = new THREE.Mesh(ballGeo, ballMat);
      ball.position.copy(ballStart);
      scene.add(ball);
    }

    function createPins() {
      const pinGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.6, 20);
      const pinMat = new THREE.MeshStandardMaterial({ color: 0xffffff });

      pinBasePositions.forEach((pos, i) => {
        const pin = new THREE.Mesh(pinGeo, pinMat);
        pin.position.set(pos.x, 0.3, pos.z);
        pin.userData = {
          standing: true,
          index: i,
          baseX: pos.x,
          baseZ: pos.z
        };
        scene.add(pin);
        pins.push(pin);
      });
    }

    function loadReplayCameraModel() {
      const loader = new GLTFLoader();
      loader.load(
        'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/AntiqueCamera/glTF-Binary/AntiqueCamera.glb',
        (gltf) => {
          replayCamModel = gltf.scene;
          replayCamModel.scale.set(0.5, 0.5, 0.5);
          replayCamModel.position.set(4, 1, 5);
          scene.add(replayCamModel);
          modelLoaded = true;
        },
        undefined,
        () => {
          const fallback = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, 0.5, 0.5),
            new THREE.MeshStandardMaterial({ color: 0x666666 })
          );
          fallback.position.set(4, 1, 5);
          scene.add(fallback);
          replayCamModel = fallback;
          modelLoaded = false;
        }
      );
    }

    function setupUI() {
      document.getElementById('btn-slowmo').addEventListener('click', () => setTimeScale(0.25));
      document.getElementById('btn-normal').addEventListener('click', () => setTimeScale(1.0));
      document.getElementById('btn-fastfwd').addEventListener('click', () => setTimeScale(3.0));
      document.getElementById('btn-pause').addEventListener('click', () => setTimeScale(0.0));
      document.getElementById('btn-reset').addEventListener('click', resetGame);
    }

    function setupKeyboard() {
      window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft' && phase === 'aiming') {
          aimValue = Math.max(-2, +(aimValue - 0.2).toFixed(1));
          updateHUD();
        }
        if (e.code === 'ArrowRight' && phase === 'aiming') {
          aimValue = Math.min(2, +(aimValue + 0.2).toFixed(1));
          updateHUD();
        }
        if (e.code === 'ArrowUp' && phase === 'aiming') {
          power = Math.min(10, power + 1);
          updateHUD();
        }
        if (e.code === 'ArrowDown' && phase === 'aiming') {
          power = Math.max(1, power - 1);
          updateHUD();
        }
        if (e.code === 'Space') {
          e.preventDefault();
          launchBall();
        }
      });
    }

    function setTimeScale(value) {
      timeScale = value;
      updateHUD();
    }

    function launchBall() {
      if (ballLaunched || phase !== 'aiming') return;
      ballVelocity = {
        x: aimValue * 0.5,
        y: 0,
        z: -power * 0.8
      };
      ballLaunched = true;
      gutterBall = false;
      phase = 'rolling';
      updateHUD();
    }

    function resetGame() {
      ball.position.copy(ballStart);
      ballVelocity = { x: 0, y: 0, z: 0 };
      ballLaunched = false;
      gutterBall = false;
      score = 0;
      phase = 'aiming';

      pins.forEach((pin) => {
        pin.position.set(pin.userData.baseX, 0.3, pin.userData.baseZ);
        pin.rotation.set(0, 0, 0);
        pin.userData.standing = true;
      });

      updateHUD();
      updateState();
    }

    function knockDownPin(pin) {
      if (!pin.userData.standing) return;
      pin.userData.standing = false;
      pin.rotation.x = Math.PI / 2;
      pin.position.y = 0.15;
      score += 1;
    }

    function getPinsKnocked() {
      return pins.filter(p => !p.userData.standing).length;
    }

    function getPinsRemaining() {
      return pins.filter(p => p.userData.standing).length;
    }

    function updatePhysics(dt) {
      if (!ballLaunched || phase !== 'rolling' || dt <= 0) return;

      ball.position.x += ballVelocity.x * dt;
      ball.position.y += ballVelocity.y * dt;
      ball.position.z += ballVelocity.z * dt;

      ball.rotation.x += (-ballVelocity.z) * dt * 2.5;
      ball.rotation.z += (-ballVelocity.x) * dt * 2.5;

      if (!gutterBall && (ball.position.x < -laneHalfWidth || ball.position.x > laneHalfWidth)) {
        gutterBall = true;
        ball.position.y = -0.5;
        ballVelocity.z = 0;
        ballVelocity.x *= 0.2;
      }

      pins.forEach((pin) => {
        if (!pin.userData.standing) return;
        const dx = ball.position.x - pin.userData.baseX;
        const dz = ball.position.z - pin.userData.baseZ;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist <= 0.5 && ball.position.y >= 0) {
          knockDownPin(pin);
        }
      });

      ballVelocity.x *= 0.995;
      ballVelocity.z *= 0.995;

      const speed = Math.sqrt(
        ballVelocity.x * ballVelocity.x +
        ballVelocity.y * ballVelocity.y +
        ballVelocity.z * ballVelocity.z
      );

      if (ball.position.z < -10 || speed < 0.01 || (gutterBall && Math.abs(ballVelocity.x) < 0.01)) {
        ballVelocity = { x: 0, y: 0, z: 0 };
        phase = 'finished';
      }
    }

    function updateHUD() {
      hudTimeScale.textContent = timeScale.toFixed(2);
      hudAim.textContent = aimValue.toFixed(1);
      hudPower.textContent = power;
      hudScore.textContent = score;
      hudPinsRemaining.textContent = getPinsRemaining();
      hudPhase.textContent = phase;
    }

    function updateReplayLabel() {
      if (!replayCamModel) {
        replayLabel.style.display = 'none';
        return;
      }

      const pos = replayCamModel.position.clone();
      pos.y += 0.8;
      pos.project(camera);

      const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;

      const visible = pos.z < 1;
      replayLabel.style.display = visible ? 'block' : 'none';
      replayLabel.style.left = `${x}px`;
      replayLabel.style.top = `${y}px`;
    }

    function updateState() {
      const pinsKnocked = getPinsKnocked();
      window.__3D_STATE__ = {
        ballPosition: {
          x: ball.position.x,
          y: ball.position.y,
          z: ball.position.z
        },
        ballVelocity: {
          x: ballVelocity.x,
          y: ballVelocity.y,
          z: ballVelocity.z
        },
        ballLaunched,
        pinsKnocked,
        pinsRemaining: 10 - pinsKnocked,
        score,
        timeScale,
        aimValue,
        power,
        phase,
        gutterBall,
        modelLoaded,
        pinStates: pins.map(pin => pin.userData.standing)
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const rawDt = clock.getDelta();
      const dt = rawDt * timeScale;

      updatePhysics(dt);
      updateHUD();
      updateReplayLabel();
      updateState();

      controls.update();
      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
  </script>
</body>
</html>
