<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>候鸟迁徙路径可视化</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #87b7e3;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.7;
      font-size: 14px;
      min-width: 220px;
      user-select: none;
    }

    #controlsPanel {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
    }

    #controlsPanel label {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #timeScale {
      width: 220px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>已飞行距离：<span id="distance">0%</span></div>
      <div>群体展开度：<span id="spread">0.00</span></div>
      <div>时间倍率：<span id="timeValue">1.00</span></div>
      <div>跟踪鸟编号：<span id="trackedBird">-1</span></div>
    </div>

    <div id="controlsPanel">
      <label>
        时间倍率
        <input id="timeScale" type="range" min="0.5" max="5" step="0.1" value="1" />
      </label>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('app');
    const distanceEl = document.getElementById('distance');
    const spreadEl = document.getElementById('spread');
    const timeValueEl = document.getElementById('timeValue');
    const trackedBirdEl = document.getElementById('trackedBird');
    const timeScaleSlider = document.getElementById('timeScale');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9fd0ff);
    scene.fog = new THREE.Fog(0x9fd0ff, 120, 260);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(40, 30, 90);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(50, 10, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.HemisphereLight(0xffffff, 0x557755, 1.2);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(60, 80, 20);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -150;
    dirLight.shadow.camera.right = 150;
    dirLight.shadow.camera.top = 150;
    dirLight.shadow.camera.bottom = -150;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(300, 300),
      new THREE.MeshStandardMaterial({
        color: 0x5ea04f,
        roughness: 0.95,
        metalness: 0.0
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(300, 30, 0x4d6b4d, 0x6f8f6f);
    grid.position.y = 0.02;
    scene.add(grid);

    const curvePoints = [
      new THREE.Vector3(0, 10, 0),
      new THREE.Vector3(20, 12, 20),
      new THREE.Vector3(40, 8, 40),
      new THREE.Vector3(60, 15, 20),
      new THREE.Vector3(80, 10, 0),
      new THREE.Vector3(100, 12, -20)
    ];

    const migrationCurve = new THREE.CatmullRomCurve3(curvePoints);
    const pathLength = migrationCurve.getLength();

    const tube = new THREE.Mesh(
      new THREE.TubeGeometry(migrationCurve, 200, 0.35, 12, false),
      new THREE.MeshStandardMaterial({
        color: 0xffcc66,
        emissive: 0x553300,
        roughness: 0.5,
        metalness: 0.1
      })
    );
    scene.add(tube);

    const linePoints = migrationCurve.getPoints(300);
    const lineGeom = new THREE.BufferGeometry().setFromPoints(linePoints);
    const line = new THREE.Line(
      lineGeom,
      new THREE.LineBasicMaterial({ color: 0xffffff })
    );
    scene.add(line);

    const loader = new GLTFLoader();
    const clock = new THREE.Clock();

    const birdCount = 6;
    const birds = [];
    let mixers = [];
    let modelLoaded = false;
    let trackedBird = -1;

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    let timeScale = parseFloat(timeScaleSlider.value);

    timeScaleSlider.addEventListener('input', () => {
      timeScale = parseFloat(timeScaleSlider.value);
      timeValueEl.textContent = timeScale.toFixed(2);
    });

    timeValueEl.textContent = timeScale.toFixed(2);

    function setInitialState() {
      window.__3D_STATE__ = {
        modelLoaded: false,
        birdCount: 6,
        leadDistance: 0,
        spread: 0,
        timeScale,
        trackedBird: -1
      };
    }
    setInitialState();

    function cloneModelWithSkins(source) {
      return source.clone(true);
    }

    function createBirds(gltf) {
      const baseScene = gltf.scene;
      const animations = gltf.animations || [];

      for (let i = 0; i < birdCount; i++) {
        const birdRoot = cloneModelWithSkins(baseScene);
        birdRoot.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        const scale = 0.9 + Math.random() * 0.25;
        birdRoot.scale.setScalar(scale);

        scene.add(birdRoot);

        const mixer = new THREE.AnimationMixer(birdRoot);
        mixers.push(mixer);

        animations.forEach(clip => {
          mixer.clipAction(clip).play();
        });

        const speed = 5 * (1 + (Math.random() * 0.4 - 0.2));
        const offsetMeters = i * 8.0;
        const progress = ((pathLength - offsetMeters) / pathLength) % 1;

        const birdData = {
          index: i,
          root: birdRoot,
          mixer,
          speed,
          progress: progress < 0 ? progress + 1 : progress
        };

        birdRoot.userData.birdIndex = i;
        birds.push(birdData);
      }

      modelLoaded = true;
    }

    loader.load(
      'assets/stork.glb',
      (gltf) => {
        createBirds(gltf);
      },
      undefined,
      (err) => {
        console.error('模型加载失败:', err);

        const fallback = new THREE.Group();
        const body = new THREE.Mesh(
          new THREE.ConeGeometry(0.8, 2.8, 8),
          new THREE.MeshStandardMaterial({ color: 0xffffff })
        );
        body.rotation.z = -Math.PI / 2;
        fallback.add(body);

        const wingL = new THREE.Mesh(
          new THREE.BoxGeometry(2.8, 0.1, 0.8),
          new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        wingL.position.set(0, 0, 1.0);
        fallback.add(wingL);

        const wingR = wingL.clone();
        wingR.position.z = -1.0;
        fallback.add(wingR);

        createBirds({ scene: fallback, animations: [] });
      }
    );

    function updateBirdTransforms(dt) {
      const up = new THREE.Vector3(0, 1, 0);

      for (const bird of birds) {
        const deltaProgress = (bird.speed * dt * timeScale) / pathLength;
        bird.progress = (bird.progress + deltaProgress) % 1;

        const pos = migrationCurve.getPointAt(bird.progress);
        const tangent = migrationCurve.getTangentAt(bird.progress).normalize();

        bird.root.position.copy(pos);

        const target = pos.clone().add(tangent);
        bird.root.lookAt(target);

        const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), tangent);
        const bankAxis = tangent.clone().cross(up).normalize();
        const bankAmount = THREE.MathUtils.clamp(-migrationCurve.getTangentAt((bird.progress + 0.01) % 1).y * 0.8, -0.25, 0.25);
        const bankQuat = new THREE.Quaternion().setFromAxisAngle(
          bankAxis.lengthSq() > 0 ? bankAxis : up,
          bankAmount
        );
        bird.root.quaternion.copy(quat.multiply(bankQuat));
      }
    }

    function updateCameraFollow() {
      if (trackedBird < 0 || !birds[trackedBird]) return;

      const bird = birds[trackedBird];
      const tangent = migrationCurve.getTangentAt(bird.progress).normalize();
      const birdPos = bird.root.position.clone();

      const desiredPos = birdPos.clone()
        .add(tangent.clone().multiplyScalar(-12))
        .add(new THREE.Vector3(0, 5, 0));

      camera.position.lerp(desiredPos, 0.08);

      const lookTarget = birdPos.clone().add(tangent.clone().multiplyScalar(8));
      camera.lookAt(lookTarget);
    }

    function updateHUD() {
      let leadDistance = 0;
      let spread = 0;

      if (birds.length > 0) {
        const sorted = [...birds].sort((a, b) => b.progress - a.progress);
        leadDistance = sorted[0].progress;

        let minP = Infinity;
        let maxP = -Infinity;
        for (const bird of birds) {
          minP = Math.min(minP, bird.progress);
          maxP = Math.max(maxP, bird.progress);
        }
        spread = (maxP - minP) * pathLength;
      }

      distanceEl.textContent = `${(leadDistance * 100).toFixed(1)}%`;
      spreadEl.textContent = spread.toFixed(2);
      timeValueEl.textContent = timeScale.toFixed(2);
      trackedBirdEl.textContent = String(trackedBird);

      window.__3D_STATE__ = {
        modelLoaded,
        birdCount,
        leadDistance,
        spread,
        timeScale,
        trackedBird
      };
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);

      const clickable = [];
      for (const bird of birds) {
        bird.root.traverse(obj => {
          if (obj.isMesh) clickable.push(obj);
        });
      }

      const intersects = raycaster.intersectObjects(clickable, true);

      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && obj.userData.birdIndex === undefined && obj.parent) {
          obj = obj.parent;
        }

        if (obj && obj.userData.birdIndex !== undefined) {
          trackedBird = obj.userData.birdIndex;
          controls.enabled = false;
          return;
        }
      }

      trackedBird = -1;
      controls.enabled = true;
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();

      for (const mixer of mixers) {
        mixer.update(dt * timeScale);
      }

      if (birds.length > 0) {
        updateBirdTransforms(dt);
      }

      if (trackedBird >= 0) {
        updateCameraFollow();
      } else {
        controls.update();
      }

      updateHUD();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
