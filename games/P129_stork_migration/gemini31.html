<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>候鸟迁徙路径可视化</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #hud span {
            font-weight: bold;
            color: #4CAF50;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #controls input[type="range"] {
            cursor: pointer;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="hud">
        <div>已飞行距离: <span id="distance">0.0%</span></div>
        <div>群体展开度: <span id="spread">0.0m</span></div>
        <div>时间倍率: <span id="timeValue">1.0x</span></div>
        <div>跟踪鸟编号: <span id="trackedBird">-1</span></div>
    </div>
    
    <div id="controls">
        <label for="timeScale">时间倍率</label>
        <input type="range" id="timeScale" min="0.5" max="5" step="0.1" value="1">
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

        // 初始化全局状态
        window.__3D_STATE__ = {
            modelLoaded: false,
            birdCount: 6,
            leadDistance: 0,
            spread: 0,
            timeScale: 1,
            trackedBird: -1
        };

        // 场景设置
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(50, 30, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(50, 10, 10);
        controls.enableDamping = true;

        // 光照
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        scene.add(dirLight);

        // 地形
        const groundGeo = new THREE.PlaneGeometry(500, 500);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3b7a33, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 迁徙路径
        const points = [
            new THREE.Vector3(0, 10, 0),
            new THREE.Vector3(20, 12, 20),
            new THREE.Vector3(40, 8, 40),
            new THREE.Vector3(60, 15, 20),
            new THREE.Vector3(80, 10, 0),
            new THREE.Vector3(100, 12, -20)
        ];
        const curve = new THREE.CatmullRomCurve3(points);
        const pathLength = curve.getLength();

        const tubeGeo = new THREE.TubeGeometry(curve, 100, 0.15, 8, false);
        const tubeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
        const tube = new THREE.Mesh(tubeGeo, tubeMat);
        scene.add(tube);

        // 鸟类实例
        const birds = [];
        const clock = new THREE.Clock();
        const loader = new GLTFLoader();

        loader.load('assets/stork.glb', (gltf) => {
            window.__3D_STATE__.modelLoaded = true;
            const baseModel = gltf.scene;
            const animations = gltf.animations;

            for (let i = 0; i < 6; i++) {
                const model = SkeletonUtils.clone(baseModel);
                model.scale.set(0.02, 0.02, 0.02);
                model.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                    }
                });

                const mixer = new THREE.AnimationMixer(model);
                const action = mixer.clipAction(animations[0]);
                // 随机化动画起始时间，避免动作完全同步
                action.startAt(Math.random());
                action.play();

                // 基础速度 5 m/s ± 20% (4 ~ 6 m/s)
                const speed = 5 * (1 + (Math.random() * 0.4 - 0.2));
                const progressSpeed = speed / pathLength;
                
                // 初始位置前后间隔分布
                const initialProgress = (0.1 - i * 0.02 + 1) % 1;

                birds.push({
                    id: i,
                    mesh: model,
                    mixer: mixer,
                    progress: initialProgress,
                    progressSpeed: progressSpeed
                });

                scene.add(model);
            }
        });

        // 交互：射线检测
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName === 'INPUT') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            const birdMeshes = birds.map(b => b.mesh);
            const intersects = raycaster.intersectObjects(birdMeshes, true);

            if (intersects.length > 0) {
                let hitObj = intersects[0].object;
                let foundIndex = -1;
                
                for (let i = 0; i < birds.length; i++) {
                    birds[i].mesh.traverse(child => {
                        if (child === hitObj) foundIndex = i;
                    });
                    if (foundIndex !== -1) break;
                }
                
                window.__3D_STATE__.trackedBird = foundIndex;
            } else {
                window.__3D_STATE__.trackedBird = -1;
            }
        });

        // 窗口缩放
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // DOM 元素引用
        const elDistance = document.getElementById('distance');
        const elSpread = document.getElementById('spread');
        const elTimeValue = document.getElementById('timeValue');
        const elTrackedBird = document.getElementById('trackedBird');
        const elTimeScale = document.getElementById('timeScale');

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const timeScale = parseFloat(elTimeScale.value);
            window.__3D_STATE__.timeScale = timeScale;

            let maxProgress = -1;
            let minProgress = 2;

            // 更新鸟类
            birds.forEach((bird) => {
                bird.mixer.update(delta * timeScale);
                
                bird.progress += bird.progressSpeed * delta * timeScale;
                if (bird.progress > 1) bird.progress -= 1;

                if (bird.progress > maxProgress) maxProgress = bird.progress;
                if (bird.progress < minProgress) minProgress = bird.progress;

                const pos = curve.getPointAt(bird.progress);
                const tangent = curve.getTangentAt(bird.progress);

                bird.mesh.position.copy(pos);
                
                // 朝向切线方向
                const lookAtTarget = pos.clone().add(tangent);
                bird.mesh.lookAt(lookAtTarget);
            });

            // 更新状态与 HUD
            if (birds.length > 0) {
                window.__3D_STATE__.leadDistance = maxProgress;
                // 简单计算展开度（忽略跨越起点/终点时的跳变）
                window.__3D_STATE__.spread = (maxProgress - minProgress) * pathLength;

                elDistance.innerText = (maxProgress * 100).toFixed(1) + '%';
                elSpread.innerText = window.__3D_STATE__.spread.toFixed(1) + 'm';
            }
            
            elTimeValue.innerText = timeScale.toFixed(1) + 'x';
            elTrackedBird.innerText = window.__3D_STATE__.trackedBird;

            // 摄像机跟踪逻辑
            if (window.__3D_STATE__.trackedBird !== -1 && birds[window.__3D_STATE__.trackedBird]) {
                const targetBird = birds[window.__3D_STATE__.trackedBird];
                const birdPos = targetBird.mesh.position;
                const birdTangent = curve.getTangentAt(targetBird.progress);
                
                // 摄像机位于鸟的后上方
                const idealOffset = birdTangent.clone().multiplyScalar(-12).add(new THREE.Vector3(0, 4, 0));
                const idealPos = birdPos.clone().add(idealOffset);
                
                camera.position.lerp(idealPos, 0.05);
                controls.target.lerp(birdPos, 0.1);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
