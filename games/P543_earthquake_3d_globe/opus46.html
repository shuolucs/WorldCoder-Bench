<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Earthquake Wave Propagation Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000011; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #00ff88;
    font-size: 13px;
    background: rgba(0, 10, 20, 0.85);
    padding: 15px 20px;
    border-radius: 8px;
    border: 1px solid rgba(0, 255, 136, 0.3);
    line-height: 1.8;
    pointer-events: none;
    min-width: 240px;
}

#hud div { display: flex; justify-content: space-between; }
#hud span.label { color: #88aacc; }
#hud span.value { color: #00ff88; font-weight: bold; }

#controls {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaccee;
    font-size: 12px;
    background: rgba(0, 10, 20, 0.85);
    padding: 15px 25px;
    border-radius: 8px;
    border: 1px solid rgba(100, 150, 200, 0.3);
    display: flex;
    gap: 30px;
    align-items: center;
}

#controls label { display: flex; flex-direction: column; align-items: center; gap: 5px; }
#controls input[type="range"] {
    width: 120px;
    accent-color: #00ff88;
}

#instructions {
    position: absolute;
    top: 15px;
    right: 15px;
    color: #667788;
    font-size: 11px;
    background: rgba(0, 10, 20, 0.85);
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid rgba(100, 150, 200, 0.2);
    line-height: 1.8;
}
#instructions kbd {
    background: rgba(100, 150, 200, 0.2);
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid rgba(100, 150, 200, 0.3);
    color: #aaccee;
}
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="hud">
    <div><span class="label">Active Quakes:</span> <span class="value" id="hud-quakes">0</span></div>
    <div><span class="label">Latest Magnitude:</span> <span class="value" id="hud-magnitude">0.0</span></div>
    <div><span class="label">P-Wave Radius:</span> <span class="value" id="hud-pwave">0.0</span></div>
    <div><span class="label">S-Wave Radius:</span> <span class="value" id="hud-swave">0.0</span></div>
    <div><span class="label">Auto-Rotate:</span> <span class="value" id="hud-rotate">ON</span></div>
    <div><span class="label">Status:</span> <span class="value" id="hud-paused">Playing</span></div>
</div>

<div id="instructions">
    <div><kbd>Click</kbd> Globe to trigger earthquake</div>
    <div><kbd>C</kbd> Clear all earthquakes</div>
    <div><kbd>Space</kbd> Pause / Play</div>
    <div><kbd>A</kbd> Toggle auto-rotate</div>
</div>

<div id="controls">
    <label>
        Magnitude
        <input type="range" id="slider-magnitude" min="1" max="9" step="0.5" value="5">
        <span id="mag-val">5.0</span>
    </label>
    <label>
        Wave Speed
        <input type="range" id="slider-wave-speed" min="0.5" max="3.0" step="0.1" value="1.0">
        <span id="speed-val">1.0</span>
    </label>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
window.__3D_STATE__ = {
    activeQuakes: 0,
    latestMagnitude: 0,
    latestPWaveRadius: 0,
    latestSWaveRadius: 0,
    autoRotate: true,
    isPaused: false,
    magnitude: 5,
    waveSpeedMultiplier: 1.0,
    frameCount: 0,
    globeValid: true,
    totalWaveEnergy: 0
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000011);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0x223344, 0.3);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 10, 10);
scene.add(dirLight);

// --- 3D Noise (simplex-like) ---
// Simple hash-based 3D noise
function hash3(x, y, z) {
    let n = Math.sin(x * 127.1 + y * 311.7 + z * 74.7) * 43758.5453;
    return n - Math.floor(n);
}

function smoothNoise3D(x, y, z) {
    const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
    const fx = x - ix, fy = y - iy, fz = z - iz;
    const ux = fx * fx * (3 - 2 * fx);
    const uy = fy * fy * (3 - 2 * fy);
    const uz = fz * fz * (3 - 2 * fz);

    const v000 = hash3(ix, iy, iz);
    const v100 = hash3(ix+1, iy, iz);
    const v010 = hash3(ix, iy+1, iz);
    const v110 = hash3(ix+1, iy+1, iz);
    const v001 = hash3(ix, iy, iz+1);
    const v101 = hash3(ix+1, iy, iz+1);
    const v011 = hash3(ix, iy+1, iz+1);
    const v111 = hash3(ix+1, iy+1, iz+1);

    const x00 = v000 + ux * (v100 - v000);
    const x10 = v010 + ux * (v110 - v010);
    const x01 = v001 + ux * (v101 - v001);
    const x11 = v011 + ux * (v111 - v011);

    const y0 = x00 + uy * (x10 - x00);
    const y1 = x01 + uy * (x11 - x01);

    return y0 + uz * (y1 - y0);
}

function fbm3D(x, y, z, octaves = 4) {
    let val = 0, amp = 0.5, freq = 1;
    for (let i = 0; i < octaves; i++) {
        val += amp * smoothNoise3D(x * freq, y * freq, z * freq);
        amp *= 0.5;
        freq *= 2.0;
    }
    return val;
}

// --- Globe ---
const GLOBE_RADIUS = 6;
const globeGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 128, 64);
const posAttr = globeGeometry.getAttribute('position');
const vertexCount = posAttr.count;

// Store original positions
const originalPositions = new Float32Array(posAttr.array.length);
originalPositions.set(posAttr.array);

// Generate colors
const colors = new Float32Array(vertexCount * 3);
const landThreshold = 0.48;

for (let i = 0; i < vertexCount; i++) {
    const x = originalPositions[i * 3];
    const y = originalPositions[i * 3 + 1];
    const z = originalPositions[i * 3 + 2];

    const nx = x / GLOBE_RADIUS;
    const ny = y / GLOBE_RADIUS;
    const nz = z / GLOBE_RADIUS;

    const noiseVal = fbm3D(nx * 2.5 + 0.5, ny * 2.5 + 1.3, nz * 2.5 + 2.7, 5);

    let r, g, b;
    if (noiseVal > landThreshold) {
        // Land
        const t = (noiseVal - landThreshold) / (1 - landThreshold);
        if (t < 0.3) {
            r = 0.15 + t * 0.5; g = 0.45 + t * 0.3; b = 0.1;
        } else if (t < 0.7) {
            r = 0.35 + (t - 0.3) * 0.6; g = 0.5 - (t - 0.3) * 0.3; b = 0.1 + (t - 0.3) * 0.1;
        } else {
            r = 0.6 + (t - 0.7) * 0.5; g = 0.4 - (t - 0.7) * 0.2; b = 0.15 + (t - 0.7) * 0.1;
        }
    } else {
        // Ocean
        const t = noiseVal / landThreshold;
        r = 0.02 + t * 0.05;
        g = 0.05 + t * 0.15;
        b = 0.25 + t * 0.35;
    }

    colors[i * 3] = r;
    colors[i * 3 + 1] = g;
    colors[i * 3 + 2] = b;
}

globeGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const globeMaterial = new THREE.MeshPhongMaterial({
    vertexColors: true,
    shininess: 15,
    specular: new THREE.Color(0x222233)
});

const globe = new THREE.Mesh(globeGeometry, globeMaterial);
scene.add(globe);

// Wireframe overlay
const wireGeometry = new THREE.SphereGeometry(GLOBE_RADIUS + 0.01, 36, 18);
const wireMaterial = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    wireframe: true,
    transparent: true,
    opacity: 0.05
});
const wireframe = new THREE.Mesh(wireGeometry, wireMaterial);
globe.add(wireframe);

// Atmosphere glow
const atmosGeometry = new THREE.SphereGeometry(GLOBE_RADIUS * 1.03, 64, 32);
const atmosMaterial = new THREE.ShaderMaterial({
    vertexShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        void main() {
            float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.5);
            gl_FragColor = vec4(0.3, 0.6, 1.0, intensity * 0.4);
        }
    `,
    transparent: true,
    side: THREE.BackSide,
    depthWrite: false
});
const atmosphere = new THREE.Mesh(atmosGeometry, atmosMaterial);
scene.add(atmosphere);

// Stars
const starsGeometry = new THREE.BufferGeometry();
const starPositions = new Float32Array(3000 * 3);
for (let i = 0; i < 3000; i++) {
    starPositions[i * 3] = (Math.random() - 0.5) * 200;
    starPositions[i * 3 + 1] = (Math.random() - 0.5) * 200;
    starPositions[i * 3 + 2] = (Math.random() - 0.5) * 200;
}
starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 });
scene.add(new THREE.Points(starsGeometry, starsMaterial));

// --- Earthquake System ---
const earthquakes = [];
const MAX_QUAKES = 5;
const QUAKE_LIFETIME = 10;
const P_WAVE_SPEED = 6;
const S_WAVE_SPEED = 3.5;

class Earthquake {
    constructor(epicenter, magnitude) {
        this.epicenter = epicenter.clone().normalize(); // unit vector on sphere
        this.magnitude = magnitude;
        this.amplitude = magnitude * 0.05;
        this.time = 0;
        this.alive = true;

        // Epicenter marker
        this.marker = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xffff00 })
        );
        const pos = this.epicenter.clone().multiplyScalar(GLOBE_RADIUS + 0.1);
        this.marker.position.copy(pos);
        globe.add(this.marker);

        // P-wave ring
        this.pWaveRing = this.createWaveRing(0x4488ff);
        globe.add(this.pWaveRing);

        // S-wave ring
        this.sWaveRing = this.createWaveRing(0xff4444);
        globe.add(this.sWaveRing);

        this.pWaveRadius = 0;
        this.sWaveRadius = 0;
    }

    createWaveRing(color) {
        const ringGeometry = new THREE.TorusGeometry(0.01, 0.03, 8, 128);
        const ringMaterial = new THREE.MeshBasicMaterial({
            color: color,
            transparent: true,
            opacity: 0.9,
            depthTest: true
        });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.visible = false;
        return ring;
    }

    update(dt, speedMultiplier) {
        this.time += dt * speedMultiplier;

        if (this.time > QUAKE_LIFETIME) {
            this.alive = false;
            return;
        }

        const fadeStart = QUAKE_LIFETIME * 0.6;
        const fadeFactor = this.time > fadeStart ? 1 - (this.time - fadeStart) / (QUAKE_LIFETIME - fadeStart) : 1;

        // P-wave
        this.pWaveRadius = P_WAVE_SPEED * this.time * speedMultiplier / speedMultiplier; // radius in surface distance
        this.pWaveRadius = P_WAVE_SPEED * speedMultiplier * this.time / speedMultiplier;
        // Actually: radius = speed * time (where speed is already multiplied)
        this.pWaveRadius = P_WAVE_SPEED * this.time;

        // S-wave
        this.sWaveRadius = S_WAVE_SPEED * this.time;

        // Update ring visuals
        this.updateRing(this.pWaveRing, this.pWaveRadius, fadeFactor);
        this.updateRing(this.sWaveRing, this.sWaveRadius, fadeFactor);

        // Marker pulse
        const pulse = 1 + 0.3 * Math.sin(this.time * 8) * fadeFactor;
        this.marker.scale.setScalar(pulse);
        this.marker.material.opacity = fadeFactor;
        this.marker.material.transparent = true;
    }

    updateRing(ring, surfaceRadius, fadeFactor) {
        // Convert surface distance to angle on sphere
        const angle = surfaceRadius / GLOBE_RADIUS;

        if (angle < 0.01 || angle > Math.PI) {
            ring.visible = false;
            return;
        }

        ring.visible = true;

        // Ring radius in 3D space
        const ringRadius3D = GLOBE_RADIUS * Math.sin(angle);
        const ringHeight = GLOBE_RADIUS * Math.cos(angle);

        if (ringRadius3D < 0.01) {
            ring.visible = false;
            return;
        }

        // Recreate torus geometry for current radius
        ring.geometry.dispose();
        const tubeRadius = Math.max(0.02, 0.06 * fadeFactor * this.amplitude * 3);
        ring.geometry = new THREE.TorusGeometry(ringRadius3D, tubeRadius, 8, 128);

        // Position ring: center at ringHeight along epicenter axis
        const epicenterDir = this.epicenter.clone();

        // Create a basis: ring lies in plane perpendicular to epicenter direction
        ring.position.copy(epicenterDir.clone().multiplyScalar(ringHeight));

        // Orient ring to face along epicenter direction
        ring.lookAt(epicenterDir.clone().multiplyScalar(ringHeight + 1));

        ring.material.opacity = Math.max(0, fadeFactor * 0.8 * Math.exp(-0.08 * surfaceRadius));
    }

    getAmplitudeAt(vertexNormal) {
        // Angular distance from epicenter
        const dot = this.epicenter.dot(vertexNormal);
        const angle = Math.acos(Math.min(1, Math.max(-1, dot)));
        const surfaceDist = angle * GLOBE_RADIUS;

        let totalAmp = 0;

        // P-wave contribution
        const pDist = Math.abs(surfaceDist - this.pWaveRadius);
        const pWidth = 0.8;
        if (pDist < pWidth * 3) {
            const pAmp = this.amplitude * Math.exp(-0.15 * surfaceDist) *
                         Math.exp(-(pDist * pDist) / (2 * pWidth * pWidth)) *
                         Math.cos(pDist * 8);
            totalAmp += pAmp;
        }

        // S-wave contribution
        const sDist = Math.abs(surfaceDist - this.sWaveRadius);
        const sWidth = 1.2;
        if (sDist < sWidth * 3) {
            const sAmp = this.amplitude * 1.5 * Math.exp(-0.15 * surfaceDist) *
                         Math.exp(-(sDist * sDist) / (2 * sWidth * sWidth)) *
                         Math.cos(sDist * 5);
            totalAmp += sAmp;
        }

        // Fade over lifetime
        const fadeStart = QUAKE_LIFETIME * 0.5;
        if (this.time > fadeStart) {
            totalAmp *= 1 - (this.time - fadeStart) / (QUAKE_LIFETIME - fadeStart);
        }

        return totalAmp;
    }

    dispose() {
        globe.remove(this.marker);
        globe.remove(this.pWaveRing);
        globe.remove(this.sWaveRing);
        this.marker.geometry.dispose();
        this.marker.material.dispose();
        this.pWaveRing.geometry.dispose();
        this.pWaveRing.material.dispose();
        this.sWaveRing.geometry.dispose();
        this.sWaveRing.material.dispose();
    }
}

// --- Raycaster ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(globe, false);

    if (intersects.length > 0) {
        const point = intersects[0].point;
        // Convert to globe local space
        const localPoint = globe.worldToLocal(point.clone());
        const magnitude = parseFloat(document.getElementById('slider-magnitude').value);

        // Remove oldest if at max
        if (earthquakes.length >= MAX_QUAKES) {
            const oldest = earthquakes.shift();
            oldest.dispose();
        }

        const quake = new Earthquake(localPoint.normalize(), magnitude);
        earthquakes.push(quake);
    }
});

// --- Keyboard ---
let autoRotate = true;
let isPaused = false;

document.addEventListener('keydown', (e) => {
    if (e.code === 'KeyC') {
        while (earthquakes.length > 0) {
            earthquakes.pop().dispose();
        }
        // Reset vertices
        posAttr.array.set(originalPositions);
        posAttr.needsUpdate = true;
        globeGeometry.computeVertexNormals();
    }
    if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
    }
    if (e.code === 'KeyA') {
        autoRotate = !autoRotate;
    }
});

// --- Sliders ---
const magSlider = document.getElementById('slider-magnitude');
const speedSlider = document.getElementById('slider-wave-speed');
const magVal = document.getElementById('mag-val');
const speedVal = document.getElementById('speed-val');

magSlider.addEventListener('input', () => {
    magVal.textContent = parseFloat(magSlider.value).toFixed(1);
});
speedSlider.addEventListener('input', () => {
    speedVal.textContent = parseFloat(speedSlider.value).toFixed(1);
});

// --- HUD Elements ---
const hudQuakes = document.getElementById('hud-quakes');
const hudMagnitude = document.getElementById('hud-magnitude');
const hudPwave = document.getElementById('hud-pwave');
const hudSwave = document.getElementById('hud-swave');
const hudRotate = document.getElementById('hud-rotate');
const hudPaused = document.getElementById('hud-paused');

// --- Vertex normal cache ---
const vertexNormals = new Float32Array(vertexCount * 3);
for (let i = 0; i < vertexCount; i++) {
    const x = originalPositions[i * 3];
    const y = originalPositions[i * 3 + 1];
    const z = originalPositions[i * 3 + 2];
    const len = Math.sqrt(x * x + y * y + z * z);
    vertexNormals[i * 3] = x / len;
    vertexNormals[i * 3 + 1] = y / len;
    vertexNormals[i * 3 + 2] = z / len;
}

// --- Animation ---
const clock = new THREE.Clock();
let frameCount = 0;
const tempNormal = new THREE.Vector3();

function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    const speedMultiplier = parseFloat(speedSlider.value);

    if (!isPaused) {
        // Auto-rotate
        if (autoRotate) {
            globe.rotation.y += 0.1 * dt;
        }

        // Update earthquakes
        for (const quake of earthquakes) {
            quake.update(dt, speedMultiplier);
        }

        // Remove dead quakes
        for (let i = earthquakes.length - 1; i >= 0; i--) {
            if (!earthquakes[i].alive) {
                earthquakes[i].dispose();
                earthquakes.splice(i, 1);
            }
        }

        // Displace vertices
        let totalEnergy = 0;
        let globeValid = true;

        if (earthquakes.length > 0) {
            for (let i = 0; i < vertexCount; i++) {
                tempNormal.set(
                    vertexNormals[i * 3],
                    vertexNormals[i * 3 + 1],
                    vertexNormals[i * 3 + 2]
                );

                let totalDisplacement = 0;
                for (const quake of earthquakes) {
                    const amp = quake.getAmplitudeAt(tempNormal);
                    totalDisplacement += amp;
                    totalEnergy += Math.abs(amp);
                }

                const ox = originalPositions[i * 3];
                const oy = originalPositions[i * 3 + 1];
                const oz = originalPositions[i * 3 + 2];

                posAttr.array[i * 3] = ox + tempNormal.x * totalDisplacement;
                posAttr.array[i * 3 + 1] = oy + tempNormal.y * totalDisplacement;
                posAttr.array[i * 3 + 2] = oz + tempNormal.z * totalDisplacement;

                if (isNaN(posAttr.array[i * 3]) || isNaN(posAttr.array[i * 3 + 1]) || isNaN(posAttr.array[i * 3 + 2])) {
                    globeValid = false;
                }
            }
            posAttr.needsUpdate = true;
            globeGeometry.computeVertexNormals();
        } else {
            // Reset to original
            let needsReset = false;
            for (let i = 0; i < posAttr.array.length; i++) {
                if (posAttr.array[i] !== originalPositions[i]) {
                    needsReset = true;
                    break;
                }
            }
            if (needsReset) {
                posAttr.array.set(originalPositions);
                posAttr.needsUpdate = true;
                globeGeometry.computeVertexNormals();
            }
        }

        // Update state
        const latestQuake = earthquakes.length > 0 ? earthquakes[earthquakes.length - 1] : null;

        window.__3D_STATE__.activeQuakes = earthquakes.length;
        window.__3D_STATE__.latestMagnitude = latestQuake ? parseFloat(latestQuake.magnitude.toFixed(1)) : 0;
        window.__3D_STATE__.latestPWaveRadius = latestQuake ? parseFloat(latestQuake.pWaveRadius.toFixed(2)) : 0;
        window.__3D_STATE__.latestSWaveRadius = latestQuake ? parseFloat(latestQuake.sWaveRadius.toFixed(2)) : 0;
        window.__3D_STATE__.autoRotate = autoRotate;
        window.__3D_STATE__.isPaused = isPaused;
        window.__3D_STATE__.magnitude = parseFloat(magSlider.value);
        window.__3D_STATE__.waveSpeedMultiplier = parseFloat(speedSlider.value);
        window.__3D_STATE__.frameCount = frameCount;
        window.__3D_STATE__.globeValid = globeValid;
        window.__3D_STATE__.totalWaveEnergy = parseFloat(totalEnergy.toFixed(3));

        // Update HUD
        hudQuakes.textContent = earthquakes.length;
        hudMagnitude.textContent = latestQuake ? latestQuake.magnitude.toFixed(1) : '0.0';
        hudPwave.textContent = latestQuake ? latestQuake.pWaveRadius.toFixed(1) : '0.0';
        hudSwave.textContent = latestQuake ? latestQuake.sWaveRadius.toFixed(1) : '0.0';
        hudRotate.textContent = autoRotate ? 'ON' : 'OFF';
        hudPaused.textContent = isPaused ? 'Paused' : 'Playing';
    } else {
        // Still update state when paused
        const latestQuake = earthquakes.length > 0 ? earthquakes[earthquakes.length - 1] : null;
        window.__3D_STATE__.isPaused = isPaused;
        window.__3D_STATE__.autoRotate = autoRotate;
        window.__3D_STATE__.frameCount = frameCount;
        window.__3D_STATE__.magnitude = parseFloat(magSlider.value);
        window.__3D_STATE__.waveSpeedMultiplier = parseFloat(speedSlider.value);
        hudPaused.textContent = 'Paused';
        hudRotate.textContent = autoRotate ? 'ON' : 'OFF';
    }

    controls.update();
    renderer.render(scene, camera);
    frameCount++;
}

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
