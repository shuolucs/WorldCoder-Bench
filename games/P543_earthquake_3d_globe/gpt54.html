<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Earthquake Wave Propagation Simulator</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000011;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #e8f2ff;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 18, 35, 0.72);
      border: 1px solid rgba(140, 180, 255, 0.22);
      border-radius: 12px;
      padding: 12px 14px;
      backdrop-filter: blur(8px);
      min-width: 270px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    #hud h2 {
      margin: 0 0 10px 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #bcd7ff;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 13px;
      margin: 5px 0;
    }

    .label {
      opacity: 0.8;
    }

    .value {
      font-weight: 700;
      color: #ffffff;
    }

    #controlsPanel {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(140, 180, 255, 0.16);
    }

    .control-group {
      margin: 10px 0;
    }

    .control-group label {
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
      color: #cfe2ff;
    }

    .control-inline {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      width: 180px;
      accent-color: #66aaff;
    }

    .hint {
      margin-top: 10px;
      font-size: 11px;
      line-height: 1.45;
      opacity: 0.78;
    }

    #titleBadge {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      background: rgba(10, 18, 35, 0.62);
      border: 1px solid rgba(140, 180, 255, 0.18);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      letter-spacing: 0.03em;
      color: #d7e6ff;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div id="hud">
    <h2>Earthquake Wave HUD</h2>

    <div class="row"><span class="label">Active quakes</span><span class="value" id="hud-quakes">0</span></div>
    <div class="row"><span class="label">Latest magnitude</span><span class="value" id="hud-magnitude">0.0</span></div>
    <div class="row"><span class="label">P-wave radius</span><span class="value" id="hud-pwave">0.0</span></div>
    <div class="row"><span class="label">S-wave radius</span><span class="value" id="hud-swave">0.0</span></div>
    <div class="row"><span class="label">Auto-rotate</span><span class="value" id="hud-rotate">ON</span></div>
    <div class="row"><span class="label">Paused</span><span class="value" id="hud-paused">Playing</span></div>

    <div id="controlsPanel">
      <div class="control-group">
        <label for="slider-magnitude">Next earthquake magnitude</label>
        <div class="control-inline">
          <input id="slider-magnitude" type="range" min="1" max="9" step="0.5" value="5" />
          <span class="value" id="mag-readout">5.0</span>
        </div>
      </div>

      <div class="control-group">
        <label for="slider-wave-speed">Wave speed multiplier</label>
        <div class="control-inline">
          <input id="slider-wave-speed" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
          <span class="value" id="speed-readout">1.0</span>
        </div>
      </div>

      <div class="hint">
        Click globe: create quake<br>
        C: clear quakes &nbsp;|&nbsp; Space: pause/play &nbsp;|&nbsp; A: auto-rotate
      </div>
    </div>
  </div>

  <div id="titleBadge">3D Seismic Globe Simulator</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ----------------------------
    // Basic setup
    // ----------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000011);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x223344, 0.3);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 10, 10);
    scene.add(dirLight);

    // ----------------------------
    // UI elements
    // ----------------------------
    const magnitudeSlider = document.getElementById('slider-magnitude');
    const speedSlider = document.getElementById('slider-wave-speed');
    const magReadout = document.getElementById('mag-readout');
    const speedReadout = document.getElementById('speed-readout');

    const hudQuakes = document.getElementById('hud-quakes');
    const hudMagnitude = document.getElementById('hud-magnitude');
    const hudPwave = document.getElementById('hud-pwave');
    const hudSwave = document.getElementById('hud-swave');
    const hudRotate = document.getElementById('hud-rotate');
    const hudPaused = document.getElementById('hud-paused');

    magnitudeSlider.addEventListener('input', () => {
      magReadout.textContent = Number(magnitudeSlider.value).toFixed(1);
    });
    speedSlider.addEventListener('input', () => {
      speedReadout.textContent = Number(speedSlider.value).toFixed(1);
    });
    magReadout.textContent = Number(magnitudeSlider.value).toFixed(1);
    speedReadout.textContent = Number(speedSlider.value).toFixed(1);

    // ----------------------------
    // Utility noise
    // ----------------------------
    function fract(x) {
      return x - Math.floor(x);
    }

    function hash3(x, y, z) {
      return fract(Math.sin(x * 127.1 + y * 311.7 + z * 74.7) * 43758.5453123);
    }

    function smoothstep(t) {
      return t * t * (3 - 2 * t);
    }

    function valueNoise3D(x, y, z) {
      const xi = Math.floor(x), yi = Math.floor(y), zi = Math.floor(z);
      const xf = x - xi, yf = y - yi, zf = z - zi;

      const u = smoothstep(xf);
      const v = smoothstep(yf);
      const w = smoothstep(zf);

      function h(ix, iy, iz) {
        return hash3(ix, iy, iz);
      }

      const n000 = h(xi, yi, zi);
      const n100 = h(xi + 1, yi, zi);
      const n010 = h(xi, yi + 1, zi);
      const n110 = h(xi + 1, yi + 1, zi);
      const n001 = h(xi, yi, zi + 1);
      const n101 = h(xi + 1, yi, zi + 1);
      const n011 = h(xi, yi + 1, zi + 1);
      const n111 = h(xi + 1, yi + 1, zi + 1);

      const x00 = THREE.MathUtils.lerp(n000, n100, u);
      const x10 = THREE.MathUtils.lerp(n010, n110, u);
      const x01 = THREE.MathUtils.lerp(n001, n101, u);
      const x11 = THREE.MathUtils.lerp(n011, n111, u);

      const y0 = THREE.MathUtils.lerp(x00, x10, v);
      const y1 = THREE.MathUtils.lerp(x01, x11, v);

      return THREE.MathUtils.lerp(y0, y1, w);
    }

    function fbm3(x, y, z, octaves = 5) {
      let value = 0;
      let amp = 0.5;
      let freq = 1.0;
      let sumAmp = 0;

      for (let i = 0; i < octaves; i++) {
        value += valueNoise3D(x * freq, y * freq, z * freq) * amp;
        sumAmp += amp;
        amp *= 0.5;
        freq *= 2.0;
      }

      return value / sumAmp;
    }

    // ----------------------------
    // Globe
    // ----------------------------
    const GLOBE_RADIUS = 6;
    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const globeGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 128, 64);
    const positionAttr = globeGeometry.attributes.position;
    const vertexCount = positionAttr.count;

    const basePositions = new Float32Array(positionAttr.array.length);
    basePositions.set(positionAttr.array);

    const colorArray = new Float32Array(vertexCount * 3);
    const vertexNormalsBase = new Float32Array(positionAttr.array.length);

    for (let i = 0; i < vertexCount; i++) {
      const x = basePositions[i * 3 + 0];
      const y = basePositions[i * 3 + 1];
      const z = basePositions[i * 3 + 2];

      const v = new THREE.Vector3(x, y, z).normalize();
      vertexNormalsBase[i * 3 + 0] = v.x;
      vertexNormalsBase[i * 3 + 1] = v.y;
      vertexNormalsBase[i * 3 + 2] = v.z;

      const n = fbm3(v.x * 2.7 + 10.0, v.y * 2.7 + 5.0, v.z * 2.7 - 7.0, 6);
      const m = fbm3(v.x * 6.0 - 13.0, v.y * 6.0 + 9.0, v.z * 6.0 + 3.0, 4);
      const heightSignal = n * 0.8 + m * 0.2;

      let color = new THREE.Color();

      if (heightSignal > 0.52) {
        const elev = THREE.MathUtils.clamp((heightSignal - 0.52) / 0.28, 0, 1);
        const lowLand = new THREE.Color(0x3f8f4f);
        const highLand = new THREE.Color(0x8d7456);
        const snow = new THREE.Color(0xdde6d8);
        color.copy(lowLand).lerp(highLand, elev);
        if (elev > 0.75) color.lerp(snow, (elev - 0.75) / 0.25 * 0.5);
      } else {
        const depth = THREE.MathUtils.clamp((0.52 - heightSignal) / 0.52, 0, 1);
        const shallow = new THREE.Color(0x1c5d99);
        const deep = new THREE.Color(0x0a2342);
        color.copy(shallow).lerp(deep, depth);
      }

      colorArray[i * 3 + 0] = color.r;
      colorArray[i * 3 + 1] = color.g;
      colorArray[i * 3 + 2] = color.b;
    }

    globeGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

    const globeMaterial = new THREE.MeshStandardMaterial({
      vertexColors: true,
      roughness: 0.95,
      metalness: 0.02
    });

    const globeMesh = new THREE.Mesh(globeGeometry, globeMaterial);
    globeGroup.add(globeMesh);

    const wireframe = new THREE.LineSegments(
      new THREE.WireframeGeometry(new THREE.SphereGeometry(GLOBE_RADIUS * 1.001, 32, 16)),
      new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.05
      })
    );
    globeGroup.add(wireframe);

    // ----------------------------
    // Quake rendering group
    // ----------------------------
    const quakeGroup = new THREE.Group();
    globeGroup.add(quakeGroup);

    // ----------------------------
    // Quake state
    // ----------------------------
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const tempVecA = new THREE.Vector3();
    const tempVecB = new THREE.Vector3();
    const tempQuat = new THREE.Quaternion();

    let earthquakes = [];
    let autoRotate = true;
    let isPaused = false;
    let frameCount = 0;
    let latestMagnitudeValue = 0;
    let latestPWaveRadiusValue = 0;
    let latestSWaveRadiusValue = 0;

    function makeEpicenterMarker(positionWorld) {
      const g = new THREE.SphereGeometry(0.15, 18, 18);
      const m = new THREE.MeshBasicMaterial({ color: 0xffee55 });
      const mesh = new THREE.Mesh(g, m);
      mesh.position.copy(positionWorld.clone().normalize().multiplyScalar(GLOBE_RADIUS + 0.02));
      quakeGroup.add(mesh);
      return mesh;
    }

    function createWaveRing(colorHex) {
      const ringRadius = 1.0;
      const tube = 0.04;
      const radialSegments = 12;
      const tubularSegments = 192;
      const geom = new THREE.TorusGeometry(ringRadius, tube, radialSegments, tubularSegments);
      const mat = new THREE.MeshBasicMaterial({
        color: colorHex,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      const mesh = new THREE.Mesh(geom, mat);
      quakeGroup.add(mesh);
      return mesh;
    }

    function addEarthquake(pointWorld) {
      const mag = Number(magnitudeSlider.value);
      const A0 = mag * 0.05;

      const epicenter = pointWorld.clone().normalize();
      const marker = makeEpicenterMarker(pointWorld);
      const pRing = createWaveRing(0x4488ff);
      const sRing = createWaveRing(0xff4444);

      const up = new THREE.Vector3(0, 0, 1);
      const q = new THREE.Quaternion().setFromUnitVectors(up, epicenter);

      const quake = {
        startTime: clock.getElapsedTime(),
        epicenter,
        marker,
        pRing,
        sRing,
        magnitude: mag,
        A0,
        quat: q
      };

      earthquakes.push(quake);
      while (earthquakes.length > 5) {
        removeEarthquake(earthquakes[0]);
        earthquakes.shift();
      }

      latestMagnitudeValue = mag;
    }

    function removeEarthquake(quake) {
      if (quake.marker) {
        quakeGroup.remove(quake.marker);
        quake.marker.geometry.dispose();
        quake.marker.material.dispose();
      }
      if (quake.pRing) {
        quakeGroup.remove(quake.pRing);
        quake.pRing.geometry.dispose();
        quake.pRing.material.dispose();
      }
      if (quake.sRing) {
        quakeGroup.remove(quake.sRing);
        quake.sRing.geometry.dispose();
        quake.sRing.material.dispose();
      }
    }

    function clearEarthquakes() {
      for (const q of earthquakes) removeEarthquake(q);
      earthquakes = [];
      latestPWaveRadiusValue = 0;
      latestSWaveRadiusValue = 0;
    }

    // ----------------------------
    // Surface ring positioning
    // ----------------------------
    function updateRingOnSphere(mesh, epicenter, quat, geodesicRadius, colorOpacity) {
      const theta = geodesicRadius / GLOBE_RADIUS;

      if (theta <= 0.0001 || theta >= Math.PI - 0.0001) {
        mesh.visible = false;
        return;
      }

      mesh.visible = true;

      const circleRadius = GLOBE_RADIUS * Math.sin(theta);
      const centerDist = GLOBE_RADIUS * Math.cos(theta);

      mesh.position.copy(epicenter).multiplyScalar(centerDist);
      mesh.quaternion.copy(quat);
      mesh.scale.set(circleRadius, circleRadius, 1);
      mesh.material.opacity = colorOpacity;
    }

    // ----------------------------
    // Interaction
    // ----------------------------
    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(globeMesh, false);
      if (hits.length > 0) {
        addEarthquake(hits[0].point);
      }
    }
    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyC') {
        clearEarthquakes();
      } else if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (e.code === 'KeyA') {
        autoRotate = !autoRotate;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ----------------------------
    // Animation / displacement
    // ----------------------------
    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      activeQuakes: 0,
      latestMagnitude: 0,
      latestPWaveRadius: 0,
      latestSWaveRadius: 0,
      autoRotate: true,
      isPaused: false,
      magnitude: Number(magnitudeSlider.value),
      waveSpeedMultiplier: Number(speedSlider.value),
      frameCount: 0,
      globeValid: true,
      totalWaveEnergy: 0
    };

    function updateQuakes(simTime) {
      const speedMul = Number(speedSlider.value);
      const pSpeed = 6.0 * speedMul;
      const sSpeed = 3.5 * speedMul;

      latestPWaveRadiusValue = 0;
      latestSWaveRadiusValue = 0;

      for (let i = earthquakes.length - 1; i >= 0; i--) {
        const q = earthquakes[i];
        const age = simTime - q.startTime;

        if (age > 10) {
          removeEarthquake(q);
          earthquakes.splice(i, 1);
          continue;
        }

        const fade = Math.exp(-age * 0.35);
        const pulse = 1 + 0.25 * Math.sin(age * 8.0);
        q.marker.scale.setScalar(pulse);
        q.marker.material.opacity = 0.9 * fade;

        const pRadius = pSpeed * age;
        const sRadius = sSpeed * age;

        updateRingOnSphere(q.pRing, q.epicenter, q.quat, pRadius, 0.8 * fade);
        updateRingOnSphere(q.sRing, q.epicenter, q.quat, sRadius, 0.8 * fade);

        if (i === earthquakes.length - 1) {
          latestPWaveRadiusValue = pRadius;
          latestSWaveRadiusValue = sRadius;
        }
      }
    }

    function displaceGlobe(simTime) {
      const positions = globeGeometry.attributes.position.array;
      let valid = true;
      let totalWaveEnergy = 0;

      const speedMul = Number(speedSlider.value);
      const pSpeed = 6.0 * speedMul;
      const sSpeed = 3.5 * speedMul;

      const waveWidth = 0.22;

      for (let i = 0; i < vertexCount; i++) {
        const nx = vertexNormalsBase[i * 3 + 0];
        const ny = vertexNormalsBase[i * 3 + 1];
        const nz = vertexNormalsBase[i * 3 + 2];

        let displacement = 0;

        for (let q = 0; q < earthquakes.length; q++) {
          const quake = earthquakes[q];
          const age = simTime - quake.startTime;
          if (age < 0 || age > 10) continue;

          const decayTime = Math.exp(-age * 0.2);

          const dot = THREE.MathUtils.clamp(
            nx * quake.epicenter.x + ny * quake.epicenter.y + nz * quake.epicenter.z,
            -1, 1
          );

          const angularDist = Math.acos(dot);
          const surfaceDist = angularDist * GLOBE_RADIUS;

          const pFront = pSpeed * age;
          const sFront = sSpeed * age;

          const baseAmp = quake.A0 * Math.exp(-0.15 * surfaceDist) * decayTime;

          const pBand = Math.exp(-Math.pow((surfaceDist - pFront) / waveWidth, 2));
          const sBand = Math.exp(-Math.pow((surfaceDist - sFront) / waveWidth, 2));

          const pContribution = baseAmp * pBand;
          const sContribution = baseAmp * 0.85 * sBand;

          displacement += pContribution + sContribution;
          totalWaveEnergy += pContribution + sContribution;
        }

        const r = GLOBE_RADIUS + displacement;
        positions[i * 3 + 0] = nx * r;
        positions[i * 3 + 1] = ny * r;
        positions[i * 3 + 2] = nz * r;

        if (!Number.isFinite(positions[i * 3 + 0]) ||
            !Number.isFinite(positions[i * 3 + 1]) ||
            !Number.isFinite(positions[i * 3 + 2])) {
          valid = false;
        }
      }

      globeGeometry.attributes.position.needsUpdate = true;
      globeGeometry.computeVertexNormals();

      return { valid, totalWaveEnergy };
    }

    function updateHUD() {
      hudQuakes.textContent = earthquakes.length;
      hudMagnitude.textContent = latestMagnitudeValue.toFixed(1);
      hudPwave.textContent = latestPWaveRadiusValue.toFixed(1);
      hudSwave.textContent = latestSWaveRadiusValue.toFixed(1);
      hudRotate.textContent = autoRotate ? 'ON' : 'OFF';
      hudPaused.textContent = isPaused ? 'Paused' : 'Playing';
    }

    // ----------------------------
    // Loop
    // ----------------------------
    let simTime = 0;
    let prevElapsed = 0;

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const elapsed = clock.getElapsedTime();
      let dt = elapsed - prevElapsed;
      prevElapsed = elapsed;
      dt = Math.min(dt, 0.05);

      if (!isPaused) {
        simTime += dt;
      }

      if (!isPaused && autoRotate) {
        globeGroup.rotation.y += 0.1 * dt;
      }

      updateQuakes(simTime);
      const displacementState = displaceGlobe(simTime);

      controls.update();
      updateHUD();

      window.__3D_STATE__ = {
        activeQuakes: earthquakes.length,
        latestMagnitude: Number(latestMagnitudeValue.toFixed(1)),
        latestPWaveRadius: Number(latestPWaveRadiusValue.toFixed(2)),
        latestSWaveRadius: Number(latestSWaveRadiusValue.toFixed(2)),
        autoRotate,
        isPaused,
        magnitude: Number(magnitudeSlider.value),
        waveSpeedMultiplier: Number(speedSlider.value),
        frameCount,
        globeValid: displacementState.valid,
        totalWaveEnergy: Number(displacementState.totalWaveEnergy.toFixed(3))
      };

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
