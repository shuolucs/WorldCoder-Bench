<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Earthquake Wave Propagation Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000011;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }
        #hud {
            top: 20px;
            left: 20px;
            min-width: 200px;
        }
        #controls {
            top: 20px;
            right: 20px;
            min-width: 250px;
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #88bbff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(100, 150, 255, 0.3);
            padding-bottom: 5px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .stat-label {
            color: #aaa;
        }
        .stat-value {
            font-weight: bold;
            color: #fff;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #aaa;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .instructions {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
            line-height: 1.5;
        }
        .key {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            color: #fff;
            font-family: monospace;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud" class="panel">
        <h2>Simulation Status</h2>
        <div class="stat-row"><span class="stat-label">Active Quakes:</span> <span id="hud-quakes" class="stat-value">0</span></div>
        <div class="stat-row"><span class="stat-label">Latest Mag:</span> <span id="hud-magnitude" class="stat-value">0.0</span></div>
        <div class="stat-row"><span class="stat-label">P-Wave Radius:</span> <span id="hud-pwave" class="stat-value">0.0</span></div>
        <div class="stat-row"><span class="stat-label">S-Wave Radius:</span> <span id="hud-swave" class="stat-value">0.0</span></div>
        <div class="stat-row"><span class="stat-label">Auto-Rotate:</span> <span id="hud-rotate" class="stat-value">ON</span></div>
        <div class="stat-row"><span class="stat-label">Status:</span> <span id="hud-paused" class="stat-value">Playing</span></div>
    </div>

    <div id="controls" class="panel">
        <h2>Controls</h2>
        <div class="control-group">
            <label for="slider-magnitude">Next Magnitude: <span id="val-magnitude">5.0</span></label>
            <input type="range" id="slider-magnitude" min="1" max="9" step="0.5" value="5">
        </div>
        <div class="control-group">
            <label for="slider-wave-speed">Wave Speed Multiplier: <span id="val-wave-speed">1.0x</span></label>
            <input type="range" id="slider-wave-speed" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="instructions">
            • <b>Click Globe</b> to trigger earthquake<br>
            • <span class="key">Space</span> Pause / Play<br>
            • <span class="key">A</span> Toggle Auto-Rotate<br>
            • <span class="key">C</span> Clear all earthquakes
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            activeQuakes: 0,
            latestMagnitude: 0,
            latestPWaveRadius: 0,
            latestSWaveRadius: 0,
            autoRotate: true,
            isPaused: false,
            magnitude: 5.0,
            waveSpeedMultiplier: 1.0,
            frameCount: 0,
            globeValid: true,
            totalWaveEnergy: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000011);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 8;
        controls.maxDistance = 50;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x223344, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        // --- Globe Generation ---
        const GLOBE_RADIUS = 6;
        const SEGMENTS_W = 128;
        const SEGMENTS_H = 64;
        
        const geometry = new THREE.SphereGeometry(GLOBE_RADIUS, SEGMENTS_W, SEGMENTS_H);
        
        // Store original positions for CPU displacement
        const basePositions = new Float32Array(geometry.attributes.position.array);
        const baseColors = new Float32Array(geometry.attributes.position.count * 3);

        // Simple 3D noise function for procedural terrain
        function simpleNoise(x, y, z) {
            let n = Math.sin(x * 1.5) + Math.sin(y * 1.5) + Math.sin(z * 1.5);
            n += 0.5 * Math.sin(x * 3.0 + y * 3.0);
            n += 0.25 * Math.sin(x * 6.0 + z * 6.0);
            return n / 3.0; // roughly -1 to 1
        }

        const colorLand1 = new THREE.Color(0x228b22); // Forest Green
        const colorLand2 = new THREE.Color(0x8b4513); // Saddle Brown
        const colorOcean1 = new THREE.Color(0x000033); // Deep Ocean
        const colorOcean2 = new THREE.Color(0x0066cc); // Shallow Ocean

        const tempVec3 = new THREE.Vector3();
        const tempColor = new THREE.Color();

        for (let i = 0; i < geometry.attributes.position.count; i++) {
            tempVec3.fromArray(basePositions, i * 3);
            let n = simpleNoise(tempVec3.x, tempVec3.y, tempVec3.z);
            
            if (n > 0.05) {
                // Land
                let mix = Math.min(1, (n - 0.05) * 3);
                tempColor.copy(colorLand1).lerp(colorLand2, mix);
            } else {
                // Ocean
                let mix = Math.min(1, (n + 1) / 1.05);
                tempColor.copy(colorOcean1).lerp(colorOcean2, mix);
            }
            
            baseColors[i * 3] = tempColor.r;
            baseColors[i * 3 + 1] = tempColor.g;
            baseColors[i * 3 + 2] = tempColor.b;
        }

        geometry.setAttribute('color', new THREE.BufferAttribute(baseColors, 3));

        const material = new THREE.MeshPhongMaterial({
            vertexColors: true,
            shininess: 5,
            flatShading: false
        });

        const globeMesh = new THREE.Mesh(geometry, material);
        scene.add(globeMesh);

        // Wireframe overlay
        const wireMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.05
        });
        const wireMesh = new THREE.Mesh(geometry, wireMaterial);
        globeMesh.add(wireMesh); // Add as child so it shares transforms and geometry updates

        // --- Earthquake Mechanics ---
        let quakes = [];
        let simTime = 0;
        const clock = new THREE.Clock();

        const P_WAVE_SPEED_BASE = 6.0;
        const S_WAVE_SPEED_BASE = 3.5;
        const MAX_QUAKES = 5;
        const QUAKE_LIFETIME = 10.0;

        const pWaveColor = new THREE.Color(0x4488ff);
        const sWaveColor = new THREE.Color(0xff4444);

        const markerGeometry = new THREE.SphereGeometry(0.15, 16, 16);
        const markerMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });

        function triggerEarthquake(intersectPoint) {
            // Convert world point to local point on the globe
            const localPoint = globeMesh.worldToLocal(intersectPoint.clone());
            const normal = localPoint.clone().normalize();

            const marker = new THREE.Mesh(markerGeometry, markerMaterial);
            marker.position.copy(localPoint);
            globeMesh.add(marker);

            const quake = {
                localPoint: localPoint,
                normal: normal,
                startTime: simTime,
                magnitude: window.__3D_STATE__.magnitude,
                marker: marker
            };

            quakes.push(quake);

            if (quakes.length > MAX_QUAKES) {
                const oldQuake = quakes.shift();
                globeMesh.remove(oldQuake.marker);
                oldQuake.marker.geometry.dispose();
                oldQuake.marker.material.dispose();
            }

            window.__3D_STATE__.latestMagnitude = quake.magnitude;
        }

        function clearEarthquakes() {
            quakes.forEach(q => {
                globeMesh.remove(q.marker);
                q.marker.geometry.dispose();
                q.marker.material.dispose();
            });
            quakes = [];
            window.__3D_STATE__.latestPWaveRadius = 0;
            window.__3D_STATE__.latestSWaveRadius = 0;
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI panels
            if (event.target.closest('.panel')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(globeMesh);

            if (intersects.length > 0) {
                triggerEarthquake(intersects[0].point);
            }
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'c' || event.key === 'C') {
                clearEarthquakes();
            } else if (event.key === 'a' || event.key === 'A') {
                window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            } else if (event.key === ' ') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
                event.preventDefault();
            }
        });

        // UI Listeners
        document.getElementById('slider-magnitude').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.magnitude = val;
            document.getElementById('val-magnitude').innerText = val.toFixed(1);
        });

        document.getElementById('slider-wave-speed').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.waveSpeedMultiplier = val;
            document.getElementById('val-wave-speed').innerText = val.toFixed(1) + 'x';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation & Simulation Loop ---
        const posAttr = geometry.attributes.position;
        const colAttr = geometry.attributes.color;
        
        const baseVec = new THREE.Vector3();
        const normVec = new THREE.Vector3();
        const currentVec = new THREE.Vector3();
        const baseColVec = new THREE.Vector3();

        function getPulse(dist, radius, thickness) {
            const diff = dist - radius;
            return Math.exp(-diff * diff * thickness);
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            window.__3D_STATE__.frameCount++;

            if (!window.__3D_STATE__.isPaused) {
                simTime += delta;
                if (window.__3D_STATE__.autoRotate) {
                    globeMesh.rotation.y += 0.1 * delta;
                }
            }

            // Cleanup old quakes
            for (let i = quakes.length - 1; i >= 0; i--) {
                const age = simTime - quakes[i].startTime;
                if (age > QUAKE_LIFETIME) {
                    globeMesh.remove(quakes[i].marker);
                    quakes[i].marker.geometry.dispose();
                    quakes[i].marker.material.dispose();
                    quakes.splice(i, 1);
                }
            }

            // Update markers
            quakes.forEach(q => {
                const age = simTime - q.startTime;
                const scale = 1.0 + 0.5 * Math.sin(age * 10);
                q.marker.scale.set(scale, scale, scale);
                // Fade out marker
                q.marker.material.opacity = Math.max(0, 1.0 - age / QUAKE_LIFETIME);
                q.marker.material.transparent = true;
            });

            let totalEnergy = 0;
            let hasNaN = false;
            let latestPRad = 0;
            let latestSRad = 0;

            const speedMult = window.__3D_STATE__.waveSpeedMultiplier;

            // Update latest radii for HUD
            if (quakes.length > 0) {
                const latestQ = quakes[quakes.length - 1];
                const age = simTime - latestQ.startTime;
                latestPRad = P_WAVE_SPEED_BASE * speedMult * age;
                latestSRad = S_WAVE_SPEED_BASE * speedMult * age;
            }

            // CPU Vertex Displacement and Coloring
            if (!window.__3D_STATE__.isPaused || quakes.length > 0) {
                for (let i = 0; i < posAttr.count; i++) {
                    baseVec.fromArray(basePositions, i * 3);
                    normVec.copy(baseVec).normalize();

                    let totalDisp = 0;
                    let pIntensityTotal = 0;
                    let sIntensityTotal = 0;

                    for (let j = 0; j < quakes.length; j++) {
                        const q = quakes[j];
                        const age = simTime - q.startTime;
                        if (age < 0) continue;

                        // Great circle distance
                        let dot = normVec.dot(q.normal);
                        dot = Math.max(-1.0, Math.min(1.0, dot));
                        const dist = GLOBE_RADIUS * Math.acos(dot);

                        const pRad = P_WAVE_SPEED_BASE * speedMult * age;
                        const sRad = S_WAVE_SPEED_BASE * speedMult * age;

                        // Fade out over lifetime
                        const fade = Math.max(0, 1.0 - age / QUAKE_LIFETIME);
                        
                        // Amplitude = A0 * exp(-0.15 * distance)
                        const amp = (q.magnitude * 0.05) * Math.exp(-0.15 * dist) * fade;

                        const pPulse = getPulse(dist, pRad, 8.0);
                        const sPulse = getPulse(dist, sRad, 8.0);

                        totalDisp += amp * (pPulse + sPulse);
                        pIntensityTotal += pPulse * amp;
                        sIntensityTotal += sPulse * amp;
                    }

                    totalEnergy += totalDisp;

                    // Apply displacement
                    currentVec.copy(baseVec).addScaledVector(normVec, totalDisp);
                    if (isNaN(currentVec.x) || isNaN(currentVec.y) || isNaN(currentVec.z)) {
                        hasNaN = true;
                    }
                    posAttr.setXYZ(i, currentVec.x, currentVec.y, currentVec.z);

                    // Apply color
                    baseColVec.fromArray(baseColors, i * 3);
                    
                    // Scale intensities for visual clarity
                    const pMix = Math.min(1.0, pIntensityTotal * 8.0);
                    const sMix = Math.min(1.0, sIntensityTotal * 8.0);

                    tempColor.setRGB(baseColVec.x, baseColVec.y, baseColVec.z);
                    if (pMix > 0) tempColor.lerp(pWaveColor, pMix);
                    if (sMix > 0) tempColor.lerp(sWaveColor, sMix);

                    colAttr.setXYZ(i, tempColor.r, tempColor.g, tempColor.b);
                }

                posAttr.needsUpdate = true;
                colAttr.needsUpdate = true;
                geometry.computeVertexNormals();
            }

            // Update State Object
            window.__3D_STATE__.activeQuakes = quakes.length;
            window.__3D_STATE__.latestPWaveRadius = Math.round(latestPRad * 100) / 100;
            window.__3D_STATE__.latestSWaveRadius = Math.round(latestSRad * 100) / 100;
            window.__3D_STATE__.globeValid = !hasNaN;
            window.__3D_STATE__.totalWaveEnergy = Math.round(totalEnergy * 1000) / 1000;

            // Update HUD DOM
            document.getElementById('hud-quakes').innerText = window.__3D_STATE__.activeQuakes;
            document.getElementById('hud-magnitude').innerText = window.__3D_STATE__.latestMagnitude.toFixed(1);
            document.getElementById('hud-pwave').innerText = window.__3D_STATE__.latestPWaveRadius.toFixed(1);
            document.getElementById('hud-swave').innerText = window.__3D_STATE__.latestSWaveRadius.toFixed(1);
            document.getElementById('hud-rotate').innerText = window.__3D_STATE__.autoRotate ? 'ON' : 'OFF';
            document.getElementById('hud-paused').innerText = window.__3D_STATE__.isPaused ? 'Paused' : 'Playing';
            document.getElementById('hud-paused').style.color = window.__3D_STATE__.isPaused ? '#ffaa00' : '#00ffaa';

            controls.update();
            renderer.render(scene, camera);
        }

        // Start loop
        animate();

    </script>
</body>
</html>
