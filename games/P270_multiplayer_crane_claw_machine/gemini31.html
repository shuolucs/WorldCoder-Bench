<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Crane Claw Machine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }
        .score {
            font-size: 32px;
            font-weight: bold;
        }
        #p1-score { color: #ff4444; }
        #p2-score { color: #4444ff; }
        #game-status {
            font-size: 48px;
            color: #ffff00;
            text-align: center;
            flex-grow: 1;
            margin: 0 20px;
        }
        .info-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            font-size: 20px;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            color: #fff;
            font-size: 16px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
        }
        #p1-controls { left: 20px; border: 2px solid #ff4444; }
        #p2-controls { right: 20px; border: 2px solid #4444ff; }
        #reset-btn {
            pointer-events: auto;
            padding: 10px 20px;
            font-size: 20px;
            font-family: inherit;
            font-weight: bold;
            background-color: #ffaa00;
            color: #000;
            border: 2px solid #fff;
            border-radius: 8px;
            cursor: pointer;
            text-shadow: none;
            transition: transform 0.1s;
        }
        #reset-btn:active {
            transform: scale(0.95);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="hud">
        <div class="top-bar">
            <div id="p1-score" class="score">P1: 0</div>
            <div class="info-panel">
                <div id="game-status">PLAYING</div>
                <div id="game-timer">Time: 0.0s</div>
                <div id="prizes-left">Prizes Left: 6</div>
                <button id="reset-btn" style="margin-top: 10px;">Reset Game</button>
            </div>
            <div id="p2-score" class="score">P2: 0</div>
        </div>
        <div id="p1-controls" class="controls">P1: WASD to move<br>SPACE to grab</div>
        <div id="p2-controls" class="controls">P2: Arrows to move<br>ENTER to grab</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            p1: { x: -2, y: 9, z: 0, score: 0, isGrabbing: false, hasPrize: false, clawState: 'idle' },
            p2: { x: 2, y: 9, z: 0, score: 0, isGrabbing: false, hasPrize: false, clawState: 'idle' },
            prizes: [],
            prizesRemaining: 6,
            gameStatus: 'PLAYING',
            gameTime: 0,
            craneCollisionCount: 0,
            totalGrabAttempts: 0,
            successfulGrabs: 0,
            animationsPlaying: false
        };

        const state = window.__3D_STATE__;
        const prizeInitialPositions = [
            [-2, 0.5, -1], [-1, 0.5, 1], [0, 0.5, -1.5],
            [1, 0.5, 0.5], [2, 0.5, -0.5], [0, 0.5, 1.5]
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 14);
        camera.lookAt(0, 4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        const warmSpot = new THREE.SpotLight(0xffddaa, 200);
        warmSpot.position.set(2, 12, 2);
        warmSpot.angle = Math.PI / 4;
        warmSpot.penumbra = 0.5;
        warmSpot.castShadow = true;
        scene.add(warmSpot);

        const coolSpot = new THREE.SpotLight(0xaaddff, 200);
        coolSpot.position.set(-2, 12, -2);
        coolSpot.angle = Math.PI / 4;
        coolSpot.penumbra = 0.5;
        coolSpot.castShadow = true;
        scene.add(coolSpot);

        const pLight1 = new THREE.PointLight(0xff0055, 50, 10);
        pLight1.position.set(-3, 8, -2);
        scene.add(pLight1);

        const pLight2 = new THREE.PointLight(0x0055ff, 50, 10);
        pLight2.position.set(3, 8, 2);
        scene.add(pLight2);

        const pLight3 = new THREE.PointLight(0x00ff55, 50, 10);
        pLight3.position.set(0, 8, 0);
        scene.add(pLight3);

        // --- Environment ---
        // Cabinet Glass
        const cabGeo = new THREE.BoxGeometry(8, 10, 6);
        const cabMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transmission: 0.5,
            opacity: 1,
            transparent: true,
            roughness: 0.1,
            metalness: 0.1,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const cabinet = new THREE.Mesh(cabGeo, cabMat);
        cabinet.position.y = 5;
        scene.add(cabinet);

        // Cabinet Frame (Edges)
        const edges = new THREE.EdgesGeometry(cabGeo);
        const frame = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x333333, linewidth: 2 }));
        frame.position.y = 5;
        scene.add(frame);

        // Floor
        const floorGeo = new THREE.PlaneGeometry(8, 6);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x228b22, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Chutes
        const chuteGeo = new THREE.BoxGeometry(2, 0.1, 2);
        const chuteMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        
        const chute1 = new THREE.Mesh(chuteGeo, chuteMat);
        chute1.position.set(-5, 0.5, 0);
        chute1.rotation.z = -Math.PI / 8;
        scene.add(chute1);

        const chute2 = new THREE.Mesh(chuteGeo, chuteMat);
        chute2.position.set(5, 0.5, 0);
        chute2.rotation.z = Math.PI / 8;
        scene.add(chute2);

        // --- Cranes ---
        function createCrane(colorHex, startX) {
            const group = new THREE.Group();
            group.position.set(startX, 9, 0);

            const rail = new THREE.Mesh(new THREE.BoxGeometry(1, 0.1, 0.5), new THREE.MeshStandardMaterial({color: 0x888888}));
            group.add(rail);

            const clawGroup = new THREE.Group();
            group.add(clawGroup);

            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.2, 16), new THREE.MeshStandardMaterial({color: colorHex}));
            clawGroup.add(base);

            const prongs = [];
            for(let i=0; i<3; i++) {
                const prong = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.8, 8), new THREE.MeshStandardMaterial({color: 0xcccccc}));
                prong.position.y = -0.4;
                prong.castShadow = true;
                
                const pivot = new THREE.Group();
                const angle = (i / 3) * Math.PI * 2;
                pivot.position.set(Math.cos(angle)*0.2, -0.1, Math.sin(angle)*0.2);
                pivot.rotation.y = -angle;
                pivot.rotation.z = Math.PI / 6; // Open
                
                pivot.add(prong);
                clawGroup.add(pivot);
                prongs.push(pivot);
            }

            const stringGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)]);
            const string = new THREE.Line(stringGeo, new THREE.LineBasicMaterial({color: 0xffffff}));
            group.add(string);

            scene.add(group);

            return { group, clawGroup, prongs, string, colorHex, state: 'idle', hasPrize: false, targetPrize: null, startX };
        }

        const crane1 = createCrane(0xff0000, -2);
        const crane2 = createCrane(0x0000ff, 2);

        // --- Prizes ---
        const mixers = [];
        const loader = new GLTFLoader();
        
        loader.load('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/models/gltf/BoxAnimated.glb', (gltf) => {
            prizeInitialPositions.forEach((pos, i) => {
                const model = gltf.scene.clone();
                model.scale.set(0.5, 0.5, 0.5);
                model.position.set(pos[0], pos[1], pos[2]);
                
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(model);

                const mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach((clip) => {
                    mixer.clipAction(clip).play();
                });
                mixers.push(mixer);

                state.prizes.push({
                    id: i,
                    x: pos[0], y: pos[1], z: pos[2],
                    collected: false,
                    collectedBy: null,
                    mesh: model,
                    mixer: mixer
                });
            });
            state.animationsPlaying = true;
        });

        // --- Input Handling ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter'].includes(e.code)) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        document.getElementById('reset-btn').addEventListener('click', resetGame);

        // --- Game Logic ---
        const clock = new THREE.Clock();

        function updateCraneLogic(crane, pState, controls, delta) {
            // Update String Visuals
            const positions = crane.string.geometry.attributes.position.array;
            positions[4] = crane.clawGroup.position.y;
            crane.string.geometry.attributes.position.needsUpdate = true;

            if (state.gameStatus !== 'PLAYING') return;

            if (crane.state === 'idle') {
                const speed = 3 * delta;
                let moved = false;
                if (keys[controls.up]) { crane.group.position.z -= speed; moved = true; }
                if (keys[controls.down]) { crane.group.position.z += speed; moved = true; }
                if (keys[controls.left]) { crane.group.position.x -= speed; moved = true; }
                if (keys[controls.right]) { crane.group.position.x += speed; moved = true; }

                if (moved) {
                    crane.group.position.x = THREE.MathUtils.clamp(crane.group.position.x, -3.5, 3.5);
                    crane.group.position.z = THREE.MathUtils.clamp(crane.group.position.z, -2.5, 2.5);
                }

                if (keys[controls.grab]) {
                    crane.state = 'descending';
                    state.totalGrabAttempts++;
                }
            } else if (crane.state === 'descending') {
                crane.clawGroup.position.y -= 7.5 * delta; // 9 to 1.5 is 7.5 units. 1 sec duration.
                if (crane.clawGroup.position.y <= -7.5) {
                    crane.clawGroup.position.y = -7.5;
                    
                    // Grab Check
                    let grabbed = null;
                    for (let p of state.prizes) {
                        if (!p.collected) {
                            const dist = Math.hypot(crane.group.position.x - p.x, crane.group.position.z - p.z);
                            if (dist < 1.0 && Math.random() < 0.7) {
                                grabbed = p;
                                break;
                            }
                        }
                    }

                    if (grabbed) {
                        crane.hasPrize = true;
                        crane.targetPrize = grabbed;
                        grabbed.collected = true; // Reserve it
                        crane.clawGroup.add(grabbed.mesh);
                        grabbed.mesh.position.set(0, -0.8, 0);
                        state.successfulGrabs++;
                    }

                    // Close prongs
                    crane.prongs.forEach(p => p.rotation.z = 0);
                    crane.state = 'ascending';
                }
            } else if (crane.state === 'ascending') {
                crane.clawGroup.position.y += 7.5 * delta;
                if (crane.clawGroup.position.y >= 0) {
                    crane.clawGroup.position.y = 0;
                    if (crane.hasPrize) {
                        crane.state = 'moving_to_chute';
                    } else {
                        crane.state = 'idle';
                        crane.prongs.forEach(p => p.rotation.z = Math.PI / 6);
                    }
                }
            } else if (crane.state === 'moving_to_chute') {
                const targetX = crane.colorHex === 0xff0000 ? -4 : 4;
                const dir = Math.sign(targetX - crane.group.position.x);
                crane.group.position.x += dir * 3 * delta;
                
                if (Math.abs(crane.group.position.x - targetX) < 0.1) {
                    crane.group.position.x = targetX;
                    
                    // Drop
                    scene.add(crane.targetPrize.mesh);
                    crane.targetPrize.mesh.position.set(targetX, 0.5, crane.group.position.z);
                    crane.targetPrize.collectedBy = crane.colorHex === 0xff0000 ? 1 : 2;
                    
                    pState.score += 10;
                    state.prizesRemaining--;

                    crane.hasPrize = false;
                    crane.targetPrize = null;
                    crane.state = 'idle';
                    crane.prongs.forEach(p => p.rotation.z = Math.PI / 6);
                }
            }

            // Sync State
            pState.x = crane.group.position.x;
            pState.y = crane.group.position.y + crane.clawGroup.position.y;
            pState.z = crane.group.position.z;
            pState.isGrabbing = crane.state !== 'idle';
            pState.hasPrize = crane.hasPrize;
            pState.clawState = crane.state;
        }

        function handleCollisions() {
            const dist = Math.hypot(crane1.group.position.x - crane2.group.position.x, crane1.group.position.z - crane2.group.position.z);
            if (dist < 1.5) {
                state.craneCollisionCount++;
                const dx = crane2.group.position.x - crane1.group.position.x;
                const dz = crane2.group.position.z - crane1.group.position.z;
                const len = Math.hypot(dx, dz) || 1;
                const nx = dx / len;
                const nz = dz / len;

                crane1.group.position.x -= nx * 0.25;
                crane1.group.position.z -= nz * 0.25;
                crane2.group.position.x += nx * 0.25;
                crane2.group.position.z += nz * 0.25;

                crane1.group.position.x = THREE.MathUtils.clamp(crane1.group.position.x, -3.5, 3.5);
                crane1.group.position.z = THREE.MathUtils.clamp(crane1.group.position.z, -2.5, 2.5);
                crane2.group.position.x = THREE.MathUtils.clamp(crane2.group.position.x, -3.5, 3.5);
                crane2.group.position.z = THREE.MathUtils.clamp(crane2.group.position.z, -2.5, 2.5);
            }
        }

        function checkWinCondition() {
            if (state.gameStatus !== 'PLAYING') return;

            if (state.p1.score >= 30) state.gameStatus = 'P1 WINS!';
            else if (state.p2.score >= 30) state.gameStatus = 'P2 WINS!';
            else if (state.prizesRemaining === 0) {
                if (state.p1.score > state.p2.score) state.gameStatus = 'P1 WINS!';
                else if (state.p2.score > state.p1.score) state.gameStatus = 'P2 WINS!';
                else state.gameStatus = 'TIE!';
            }
        }

        function updateHUD() {
            document.getElementById('p1-score').innerText = `P1: ${state.p1.score}`;
            document.getElementById('p2-score').innerText = `P2: ${state.p2.score}`;
            document.getElementById('game-status').innerText = state.gameStatus;
            document.getElementById('game-timer').innerText = `Time: ${state.gameTime.toFixed(1)}s`;
            document.getElementById('prizes-left').innerText = `Prizes Left: ${state.prizesRemaining}`;
        }

        function resetGame() {
            state.p1.score = 0;
            state.p2.score = 0;
            state.prizesRemaining = 6;
            state.gameStatus = 'PLAYING';
            state.gameTime = 0;
            state.craneCollisionCount = 0;
            state.totalGrabAttempts = 0;
            state.successfulGrabs = 0;

            [crane1, crane2].forEach(c => {
                c.group.position.set(c.startX, 9, 0);
                c.clawGroup.position.y = 0;
                c.state = 'idle';
                c.hasPrize = false;
                c.targetPrize = null;
                c.prongs.forEach(p => p.rotation.z = Math.PI / 6);
            });

            state.prizes.forEach((p, i) => {
                p.collected = false;
                p.collectedBy = null;
                p.x = prizeInitialPositions[i][0];
                p.y = prizeInitialPositions[i][1];
                p.z = prizeInitialPositions[i][2];
                scene.add(p.mesh);
                p.mesh.position.set(p.x, p.y, p.z);
            });
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            
            if (state.gameStatus === 'PLAYING') {
                state.gameTime += delta;
            }

            mixers.forEach(mixer => mixer.update(delta));

            updateCraneLogic(crane1, state.p1, {up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD', grab: 'Space'}, delta);
            updateCraneLogic(crane2, state.p2, {up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', grab: 'Enter'}, delta);
            
            handleCollisions();
            checkWinCondition();
            
            // Sync prize positions to state
            state.prizes.forEach(p => {
                if (!p.collected || (p.collected && !p.collectedBy)) {
                    // If not collected, or currently in claw (collected but not dropped in chute)
                    const pos = new THREE.Vector3();
                    p.mesh.getWorldPosition(pos);
                    p.x = pos.x;
                    p.y = pos.y;
                    p.z = pos.z;
                }
            });

            updateHUD();

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
