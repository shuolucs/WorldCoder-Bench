<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Crane Claw Machine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}
#p1-score {
    color: #ff4444;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,68,68,0.8), 2px 2px 4px rgba(0,0,0,0.8);
    text-align: left;
}
#p2-score {
    color: #4488ff;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(68,136,255,0.8), 2px 2px 4px rgba(0,0,0,0.8);
    text-align: right;
}
#center-hud {
    text-align: center;
}
#game-status {
    color: #ffdd00;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 15px rgba(255,221,0,0.8), 2px 2px 4px rgba(0,0,0,0.8);
}
#game-timer {
    color: #ffffff;
    font-size: 20px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    margin-top: 5px;
}
#prizes-left {
    color: #00ff88;
    font-size: 18px;
    text-shadow: 0 0 8px rgba(0,255,136,0.6), 2px 2px 4px rgba(0,0,0,0.8);
    margin-top: 5px;
}
#reset-btn {
    pointer-events: all;
    margin-top: 15px;
    padding: 10px 25px;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(135deg, #ff6600, #ff3300);
    color: white;
    border: 2px solid #ffaa00;
    border-radius: 8px;
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    box-shadow: 0 0 15px rgba(255,102,0,0.5);
    transition: all 0.2s;
}
#reset-btn:hover {
    background: linear-gradient(135deg, #ff8800, #ff5500);
    box-shadow: 0 0 25px rgba(255,102,0,0.8);
    transform: scale(1.05);
}
#controls-info {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-size: 14px;
    text-align: center;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    pointer-events: none;
}
.player-label {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 3px;
}
</style>
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>
</head>
<body>

<div id="hud">
    <div>
        <div class="player-label" style="color:#ff6666;">PLAYER 1 (WASD + Space)</div>
        <div id="p1-score">Score: 0</div>
    </div>
    <div id="center-hud">
        <div id="game-status">PLAYING</div>
        <div id="game-timer">Time: 0.0s</div>
        <div id="prizes-left">Prizes Left: 6</div>
        <button id="reset-btn">Reset Game</button>
    </div>
    <div>
        <div class="player-label" style="color:#6699ff;">PLAYER 2 (Arrows + Enter)</div>
        <div id="p2-score">Score: 0</div>
    </div>
</div>

<div id="controls-info">
    P1: WASD to move, Space to grab &nbsp;|&nbsp; P2: Arrow Keys to move, Enter to grab
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0a2e);
scene.fog = new THREE.FogExp2(0x1a0a2e, 0.015);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 14);
camera.lookAt(0, 4, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const spotLight1 = new THREE.SpotLight(0xffcc88, 2.0);
spotLight1.position.set(-3, 14, 2);
spotLight1.target.position.set(0, 0, 0);
spotLight1.angle = Math.PI / 4;
spotLight1.penumbra = 0.5;
spotLight1.castShadow = true;
spotLight1.shadow.mapSize.set(1024, 1024);
scene.add(spotLight1);
scene.add(spotLight1.target);

const spotLight2 = new THREE.SpotLight(0x88ccff, 2.0);
spotLight2.position.set(3, 14, -2);
spotLight2.target.position.set(0, 0, 0);
spotLight2.angle = Math.PI / 4;
spotLight2.penumbra = 0.5;
spotLight2.castShadow = true;
spotLight2.shadow.mapSize.set(1024, 1024);
scene.add(spotLight2);
scene.add(spotLight2.target);

// Colorful point lights for arcade feel
const pointLight1 = new THREE.PointLight(0xff00ff, 1.0, 10);
pointLight1.position.set(-3, 5, 0);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x00ffff, 1.0, 10);
pointLight2.position.set(3, 5, 0);
scene.add(pointLight2);

const pointLight3 = new THREE.PointLight(0xffff00, 0.8, 8);
pointLight3.position.set(0, 3, 2);
scene.add(pointLight3);

const pointLight4 = new THREE.PointLight(0x00ff00, 0.6, 8);
pointLight4.position.set(0, 7, -2);
scene.add(pointLight4);

// Glass cabinet
const cabinetWidth = 8, cabinetHeight = 10, cabinetDepth = 6;
const glassMaterial = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    transmission: 0.5,
    roughness: 0.1,
    metalness: 0.0,
    transparent: true,
    opacity: 0.3,
    side: THREE.DoubleSide,
    depthWrite: false
});

function createWall(w, h, px, py, pz, rx, ry, rz) {
    const geo = new THREE.PlaneGeometry(w, h);
    const mesh = new THREE.Mesh(geo, glassMaterial);
    mesh.position.set(px, py, pz);
    mesh.rotation.set(rx || 0, ry || 0, rz || 0);
    return mesh;
}

// Front wall
scene.add(createWall(cabinetWidth, cabinetHeight, 0, cabinetHeight / 2, cabinetDepth / 2, 0, 0, 0));
// Back wall
scene.add(createWall(cabinetWidth, cabinetHeight, 0, cabinetHeight / 2, -cabinetDepth / 2, 0, Math.PI, 0));
// Left wall
scene.add(createWall(cabinetDepth, cabinetHeight, -cabinetWidth / 2, cabinetHeight / 2, 0, 0, Math.PI / 2, 0));
// Right wall
scene.add(createWall(cabinetDepth, cabinetHeight, cabinetWidth / 2, cabinetHeight / 2, 0, 0, -Math.PI / 2, 0));
// Top wall
scene.add(createWall(cabinetWidth, cabinetDepth, 0, cabinetHeight, 0, Math.PI / 2, 0, 0));

// Cabinet frame edges
const frameMaterial = new THREE.MeshStandardMaterial({ color: 0x333344, metalness: 0.8, roughness: 0.3 });
function createEdge(length, px, py, pz, axis) {
    const geo = new THREE.BoxGeometry(
        axis === 'x' ? length : 0.15,
        axis === 'y' ? length : 0.15,
        axis === 'z' ? length : 0.15
    );
    const mesh = new THREE.Mesh(geo, frameMaterial);
    mesh.position.set(px, py, pz);
    mesh.castShadow = true;
    return mesh;
}

const hw = cabinetWidth / 2, hh = cabinetHeight, hd = cabinetDepth / 2;
// Vertical edges
scene.add(createEdge(hh, -hw, hh / 2, -hd, 'y'));
scene.add(createEdge(hh, hw, hh / 2, -hd, 'y'));
scene.add(createEdge(hh, -hw, hh / 2, hd, 'y'));
scene.add(createEdge(hh, hw, hh / 2, hd, 'y'));
// Top horizontal edges
scene.add(createEdge(cabinetWidth, 0, hh, -hd, 'x'));
scene.add(createEdge(cabinetWidth, 0, hh, hd, 'x'));
scene.add(createEdge(cabinetDepth, -hw, hh, 0, 'z'));
scene.add(createEdge(cabinetDepth, hw, hh, 0, 'z'));
// Bottom horizontal edges
scene.add(createEdge(cabinetWidth, 0, 0, -hd, 'x'));
scene.add(createEdge(cabinetWidth, 0, 0, hd, 'x'));
scene.add(createEdge(cabinetDepth, -hw, 0, 0, 'z'));
scene.add(createEdge(cabinetDepth, hw, 0, 0, 'z'));

// Floor
const floorGeo = new THREE.PlaneGeometry(cabinetWidth, cabinetDepth);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x228833, roughness: 0.9, metalness: 0.0 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0.01;
floor.receiveShadow = true;
scene.add(floor);

// Ground plane outside
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 1.0 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.1;
ground.receiveShadow = true;
scene.add(ground);

// Overhead rails
const railMat = new THREE.MeshStandardMaterial({ color: 0x888899, metalness: 0.9, roughness: 0.2 });
// X-axis rails
const railGeoX = new THREE.CylinderGeometry(0.08, 0.08, cabinetWidth - 0.5, 8);
const rail1 = new THREE.Mesh(railGeoX, railMat);
rail1.rotation.z = Math.PI / 2;
rail1.position.set(0, 9.5, -2);
scene.add(rail1);
const rail2 = new THREE.Mesh(railGeoX.clone(), railMat);
rail2.rotation.z = Math.PI / 2;
rail2.position.set(0, 9.5, 2);
scene.add(rail2);

// Z-axis rails (per crane)
const railGeoZ = new THREE.CylinderGeometry(0.06, 0.06, cabinetDepth - 0.5, 8);

// Prize chutes
function createChute(x, color) {
    const chuteGroup = new THREE.Group();
    // Ramp
    const rampGeo = new THREE.BoxGeometry(2, 0.1, 2.5);
    const rampMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.5, roughness: 0.4 });
    const ramp = new THREE.Mesh(rampGeo, rampMat);
    ramp.position.set(x, 2, 0);
    ramp.rotation.z = x > 0 ? -0.4 : 0.4;
    chuteGroup.add(ramp);

    // Side walls of chute
    const sideGeo = new THREE.BoxGeometry(0.1, 1.5, 2.5);
    const side1 = new THREE.Mesh(sideGeo, rampMat);
    side1.position.set(x - (x > 0 ? -1 : 1), 2.5, 0);
    chuteGroup.add(side1);

    // Collection bin
    const binGeo = new THREE.BoxGeometry(2, 1.5, 2.5);
    const binMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.6, transparent: true, opacity: 0.6 });
    const bin = new THREE.Mesh(binGeo, binMat);
    bin.position.set(x + (x > 0 ? 0.8 : -0.8), 0.75, 0);
    chuteGroup.add(bin);

    return chuteGroup;
}

scene.add(createChute(-5, 0x882222));
scene.add(createChute(5, 0x222288));

// Claw creation
function createClaw(color) {
    const clawGroup = new THREE.Group();

    // Main body
    const bodyGeo = new THREE.CylinderGeometry(0.25, 0.3, 0.5, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.castShadow = true;
    clawGroup.add(body);

    // Cable
    const cableGeo = new THREE.CylinderGeometry(0.03, 0.03, 1, 6);
    const cableMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.5 });
    const cable = new THREE.Mesh(cableGeo, cableMat);
    cable.position.y = 0.5;
    clawGroup.add(cable);
    clawGroup.userData.cable = cable;

    // Prongs (3 cones)
    const prongs = [];
    for (let i = 0; i < 3; i++) {
        const prongGroup = new THREE.Group();
        const prongGeo = new THREE.ConeGeometry(0.06, 0.6, 6);
        const prongMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.8, roughness: 0.2 });
        const prong = new THREE.Mesh(prongGeo, prongMat);
        prong.position.y = -0.3;
        prong.castShadow = true;
        prongGroup.add(prong);

        const angle = (i / 3) * Math.PI * 2;
        prongGroup.position.x = Math.cos(angle) * 0.2;
        prongGroup.position.z = Math.sin(angle) * 0.2;
        prongGroup.position.y = -0.25;
        prongGroup.userData.baseAngle = angle;
        prongGroup.userData.defaultX = prongGroup.position.x;
        prongGroup.userData.defaultZ = prongGroup.position.z;

        clawGroup.add(prongGroup);
        prongs.push(prongGroup);
    }
    clawGroup.userData.prongs = prongs;
    clawGroup.userData.prongOpenAmount = 1.0; // 1 = open, 0 = closed

    // Carriage (the part that rides on rails)
    const carriageGeo = new THREE.BoxGeometry(0.6, 0.2, 0.6);
    const carriageMat = new THREE.MeshStandardMaterial({ color: 0x555566, metalness: 0.8, roughness: 0.3 });
    const carriage = new THREE.Mesh(carriageGeo, carriageMat);
    carriage.position.y = 1.0;
    clawGroup.add(carriage);

    // Z-rail for this crane
    const zRail = new THREE.Mesh(railGeoZ.clone(), railMat);
    zRail.position.y = 1.0;
    clawGroup.add(zRail);

    return clawGroup;
}

function updateClawProngs(claw, openAmount) {
    const prongs = claw.userData.prongs;
    claw.userData.prongOpenAmount = openAmount;
    for (const prong of prongs) {
        const spread = openAmount * 0.3;
        const angle = prong.userData.baseAngle;
        prong.position.x = Math.cos(angle) * (0.05 + spread);
        prong.position.z = Math.sin(angle) * (0.05 + spread);
        // Tilt prongs outward when open
        prong.rotation.x = Math.sin(angle) * openAmount * 0.4;
        prong.rotation.z = -Math.cos(angle) * openAmount * 0.4;
    }
}

// Create cranes
const crane1 = createClaw(0xff3333);
crane1.position.set(-2, 9, 0);
scene.add(crane1);

const crane2 = createClaw(0x3366ff);
crane2.position.set(2, 9, 0);
scene.add(crane2);

updateClawProngs(crane1, 1.0);
updateClawProngs(crane2, 1.0);

// Prize positions
const prizePositions = [
    { x: -2, y: 0.5, z: -1 },
    { x: -1, y: 0.5, z: 1 },
    { x: 0, y: 0.5, z: -1.5 },
    { x: 1, y: 0.5, z: 0.5 },
    { x: 2, y: 0.5, z: -0.5 },
    { x: 0, y: 0.5, z: 1.5 }
];

// Load prizes
const loader = new GLTFLoader();
const prizes = [];
const mixers = [];
let animationsPlaying = false;
let prizeTemplate = null;

// Fallback prize creation
function createFallbackPrize(pos, index) {
    const group = new THREE.Group();
    const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
    const colors = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff, 0x44ffff];
    const mat = new THREE.MeshStandardMaterial({
        color: colors[index % colors.length],
        metalness: 0.3,
        roughness: 0.5
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    group.add(mesh);

    // Add a ribbon/bow on top
    const ribbonGeo = new THREE.TorusGeometry(0.2, 0.05, 8, 12);
    const ribbonMat = new THREE.MeshStandardMaterial({ color: 0xffdd00, metalness: 0.5 });
    const ribbon = new THREE.Mesh(ribbonGeo, ribbonMat);
    ribbon.position.y = 0.45;
    ribbon.rotation.x = Math.PI / 2;
    group.add(ribbon);

    group.position.set(pos.x, pos.y, pos.z);
    group.scale.set(0.5, 0.5, 0.5);
    group.userData = {
        index: index,
        collected: false,
        collectedBy: null,
        originalPos: { ...pos },
        attachedToCrane: null
    };
    scene.add(group);
    prizes.push(group);
}

// Try loading GLTF
let gltfLoaded = false;

loader.load(
    'BoxAnimated.glb',
    (gltf) => {
        gltfLoaded = true;
        prizeTemplate = gltf;
        for (let i = 0; i < prizePositions.length; i++) {
            const pos = prizePositions[i];
            const model = gltf.scene.clone();
            model.position.set(pos.x, pos.y, pos.z);
            model.scale.set(0.5, 0.5, 0.5);
            model.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            model.userData = {
                index: i,
                collected: false,
                collectedBy: null,
                originalPos: { ...pos },
                attachedToCrane: null
            };
            scene.add(model);
            prizes.push(model);

            if (gltf.animations && gltf.animations.length > 0) {
                const mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach(clip => {
                    mixer.clipAction(clip).play();
                });
                mixers.push(mixer);
                animationsPlaying = true;
            }
        }
    },
    undefined,
    (error) => {
        console.warn('Could not load BoxAnimated.glb, using fallback prizes:', error);
        for (let i = 0; i < prizePositions.length; i++) {
            createFallbackPrize(prizePositions[i], i);
        }
        // Animate fallback prizes with simple rotation
        animationsPlaying = true;
    }
);

// If loading takes too long, create fallbacks
setTimeout(() => {
    if (prizes.length === 0) {
        console.warn('GLTF load timeout, using fallback prizes');
        for (let i = 0; i < prizePositions.length; i++) {
            createFallbackPrize(prizePositions[i], i);
        }
        animationsPlaying = true;
    }
}, 5000);

// Player state
const SPEED = 3;
const X_MIN = -3.5, X_MAX = 3.5, Z_MIN = -2.5, Z_MAX = 2.5;
const RAIL_Y = 9;
const GRAB_BOTTOM_Y = 1.5;
const GRAB_DURATION = 1.0;
const GRAB_DISTANCE = 1.0;
const GRAB_SUCCESS_RATE = 0.7;

function createPlayerState(startX, startZ, playerNum) {
    return {
        x: startX,
        y: RAIL_Y,
        z: startZ,
        score: 0,
        isGrabbing: false,
        hasPrize: false,
        clawState: 'idle',
        crane: playerNum === 1 ? crane1 : crane2,
        grabTimer: 0,
        grabPhase: 0, // 0=idle, 1=descending, 2=closing, 3=ascending, 4=moving_to_chute, 5=dropping
        grabbedPrize: null,
        chuteX: playerNum === 1 ? -4 : 4,
        playerNum: playerNum
    };
}

let p1 = createPlayerState(-2, 0, 1);
let p2 = createPlayerState(2, 0, 2);

// Input handling
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    e.preventDefault();
});
window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
    e.preventDefault();
});

// Game state
let gameStatus = 'PLAYING';
let gameTime = 0;
let craneCollisionCount = 0;
let totalGrabAttempts = 0;
let successfulGrabs = 0;

// State exposure
window.__3D_STATE__ = {
    p1: { x: p1.x, y: p1.y, z: p1.z, score: 0, isGrabbing: false, hasPrize: false, clawState: 'idle' },
    p2: { x: p2.x, y: p2.y, z: p2.z, score: 0, isGrabbing: false, hasPrize: false, clawState: 'idle' },
    prizes: prizePositions.map(p => ({ x: p.x, y: p.y, z: p.z, collected: false, collectedBy: null })),
    prizesRemaining: 6,
    gameStatus: 'PLAYING',
    gameTime: 0,
    craneCollisionCount: 0,
    totalGrabAttempts: 0,
    successfulGrabs: 0,
    animationsPlaying: false
};

// HUD elements
const p1ScoreEl = document.getElementById('p1-score');
const p2ScoreEl = document.getElementById('p2-score');
const gameStatusEl = document.getElementById('game-status');
const gameTimerEl = document.getElementById('game-timer');
const prizesLeftEl = document.getElementById('prizes-left');
const resetBtn = document.getElementById('reset-btn');

// Grab logic
function startGrab(player) {
    if (player.clawState !== 'idle' || gameStatus !== 'PLAYING') return;
    player.isGrabbing = true;
    player.clawState = 'descending';
    player.grabTimer = 0;
    player.grabPhase = 1;
    totalGrabAttempts++;
    updateClawProngs(player.crane, 1.0); // Open prongs
}

function updateGrab(player, dt) {
    if (player.clawState === 'idle') return;

    player.grabTimer += dt;

    if (player.clawState === 'descending') {
        const t = Math.min(player.grabTimer / GRAB_DURATION, 1.0);
        player.y = RAIL_Y - (RAIL_Y - GRAB_BOTTOM_Y) * t;

        // Smoothly open prongs during descent
        updateClawProngs(player.crane, 1.0);

        if (t >= 1.0) {
            player.clawState = 'ascending';
            player.grabTimer = 0;

            // Check for prize grab
            let closestPrize = null;
            let closestDist = Infinity;
            for (const prize of prizes) {
                if (prize.userData.collected) continue;
                const dx = player.x - prize.userData.originalPos.x;
                const dz = player.z - prize.userData.originalPos.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < closestDist) {
                    closestDist = dist;
                    closestPrize = prize;
                }
            }

            if (closestPrize && closestDist < GRAB_DISTANCE) {
                // 70% success rate
                if (Math.random() < GRAB_SUCCESS_RATE) {
                    player.hasPrize = true;
                    player.grabbedPrize = closestPrize;
                    closestPrize.userData.attachedToCrane = player.playerNum;
                    successfulGrabs++;
                }
            }

            // Close prongs
            updateClawProngs(player.crane, 0.0);
        }
    } else if (player.clawState === 'ascending') {
        const t = Math.min(player.grabTimer / GRAB_DURATION, 1.0);
        player.y = GRAB_BOTTOM_Y + (RAIL_Y - GRAB_BOTTOM_Y) * t;

        // Move grabbed prize with claw
        if (player.hasPrize && player.grabbedPrize) {
            player.grabbedPrize.position.set(player.x, player.y - 0.8, player.z);
        }

        if (t >= 1.0) {
            if (player.hasPrize) {
                player.clawState = 'moving_to_chute';
                player.grabTimer = 0;
            } else {
                player.clawState = 'idle';
                player.isGrabbing = false;
                player.grabTimer = 0;
                updateClawProngs(player.crane, 1.0);
            }
        }
    } else if (player.clawState === 'moving_to_chute') {
        const moveSpeed = 4;
        const dx = player.chuteX - player.x;
        const dz = 0 - player.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist > 0.1) {
            const nx = dx / dist;
            const nz = dz / dist;
            player.x += nx * moveSpeed * dt;
            player.z += nz * moveSpeed * dt;
        } else {
            player.x = player.chuteX;
            player.z = 0;
            // Drop prize
            if (player.grabbedPrize) {
                player.grabbedPrize.userData.collected = true;
                player.grabbedPrize.userData.collectedBy = player.playerNum;
                player.grabbedPrize.userData.attachedToCrane = null;
                // Move prize to chute area
                const dropX = player.playerNum === 1 ? -5.8 : 5.8;
                player.grabbedPrize.position.set(dropX, 0.5, (Math.random() - 0.5) * 1.5);
                player.grabbedPrize.visible = true;
                player.score += 10;
            }
            player.hasPrize = false;
            player.grabbedPrize = null;
            player.clawState = 'idle';
            player.isGrabbing = false;
            player.grabTimer = 0;
            updateClawProngs(player.crane, 1.0);

            // Check win condition
            checkWinCondition();
        }

        // Move grabbed prize with claw
        if (player.hasPrize && player.grabbedPrize) {
            player.grabbedPrize.position.set(player.x, player.y - 0.8, player.z);
        }
    }

    // Update cable length
    const cableLength = RAIL_Y + 0.5 - player.y;
    if (player.crane.userData.cable) {
        player.crane.userData.cable.scale.y = Math.max(cableLength, 0.1);
        player.crane.userData.cable.position.y = cableLength / 2 + 0.25;
    }
}

function checkWinCondition() {
    if (gameStatus !== 'PLAYING') return;

    const remaining = prizes.filter(p => !p.userData.collected).length;

    if (p1.score >= 30) {
        gameStatus = 'P1 WINS!';
    } else if (p2.score >= 30) {
        gameStatus = 'P2 WINS!';
    } else if (remaining === 0) {
        if (p1.score > p2.score) gameStatus = 'P1 WINS!';
        else if (p2.score > p1.score) gameStatus = 'P2 WINS!';
        else gameStatus = 'TIE!';
    }
}

function handleCraneCollision() {
    const dx = p2.x - p1.x;
    const dz = p2.z - p1.z;
    const dist = Math.sqrt(dx * dx + dz * dz);

    if (dist < 1.5 && dist > 0.001) {
        craneCollisionCount++;
        const nx = dx / dist;
        const nz = dz / dist;
        const repel = 0.5;

        if (p1.clawState === 'idle') {
            p1.x -= nx * repel * 0.5;
            p1.z -= nz * repel * 0.5;
        }
        if (p2.clawState === 'idle') {
            p2.x += nx * repel * 0.5;
            p2.z += nz * repel * 0.5;
        }

        // Clamp
        p1.x = Math.max(X_MIN, Math.min(X_MAX, p1.x));
        p1.z = Math.max(Z_MIN, Math.min(Z_MAX, p1.z));
        p2.x = Math.max(X_MIN, Math.min(X_MAX, p2.x));
        p2.z = Math.max(Z_MIN, Math.min(Z_MAX, p2.z));
    }
}

function resetGame() {
    gameStatus = 'PLAYING';
    gameTime = 0;
    craneCollisionCount = 0;
    totalGrabAttempts = 0;
    successfulGrabs = 0;

    p1.x = -2; p1.y = RAIL_Y; p1.z = 0;
    p1.score = 0; p1.isGrabbing = false; p1.hasPrize = false;
    p1.clawState = 'idle'; p1.grabTimer = 0; p1.grabbedPrize = null;

    p2.x = 2; p2.y = RAIL_Y; p2.z = 0;
    p2.score = 0; p2.isGrabbing = false; p2.hasPrize = false;
    p2.clawState = 'idle'; p2.grabTimer = 0; p2.grabbedPrize = null;

    updateClawProngs(crane1, 1.0);
    updateClawProngs(crane2, 1.0);

    for (let i = 0; i < prizes.length; i++) {
        const prize = prizes[i];
        const pos = prizePositions[i];
        prize.position.set(pos.x, pos.y, pos.z);
        prize.userData.collected = false;
        prize.userData.collectedBy = null;
        prize.userData.attachedToCrane = null;
        prize.visible = true;
    }
}

resetBtn.addEventListener('click', resetGame);

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.05);

    if (gameStatus === 'PLAYING') {
        gameTime += dt;
    }

    // Update animation mixers
    for (const mixer of mixers) {
        mixer.update(dt);
    }

    // Animate fallback prizes (rotation)
    if (!gltfLoaded) {
        for (const prize of prizes) {
            if (!prize.userData.collected && !prize.userData.attachedToCrane) {
                prize.rotation.y += dt * 1.5;
                prize.position.y = prize.userData.originalPos.y + Math.sin(gameTime * 2 + prize.userData.index) * 0.1;
            }
        }
    }

    // Player 1 input (WASD + Space)
    if (gameStatus === 'PLAYING' && p1.clawState === 'idle') {
        if (keys['KeyW']) p1.z -= SPEED * dt;
        if (keys['KeyS']) p1.z += SPEED * dt;
        if (keys['KeyA']) p1.x -= SPEED * dt;
        if (keys['KeyD']) p1.x += SPEED * dt;
        p1.x = Math.max(X_MIN, Math.min(X_MAX, p1.x));
        p1.z = Math.max(Z_MIN, Math.min(Z_MAX, p1.z));
    }
    if (keys['Space'] && p1.clawState === 'idle' && gameStatus === 'PLAYING') {
        startGrab(p1);
        keys['Space'] = false;
    }

    // Player 2 input (Arrows + Enter)
    if (gameStatus === 'PLAYING' && p2.clawState === 'idle') {
        if (keys['ArrowUp']) p2.z -= SPEED * dt;
        if (keys['ArrowDown']) p2.z += SPEED * dt;
        if (keys['ArrowLeft']) p2.x -= SPEED * dt;
        if (keys['ArrowRight']) p2.x += SPEED * dt;
        p2.x = Math.max(X_MIN, Math.min(X_MAX, p2.x));
        p2.z = Math.max(Z_MIN, Math.min(Z_MAX, p2.z));
    }
    if (keys['Enter'] && p2.clawState === 'idle' && gameStatus === 'PLAYING') {
        startGrab(p2);
        keys['Enter'] = false;
    }

    // Update grabs
    updateGrab(p1, dt);
    updateGrab(p2, dt);

    // Crane collision
    handleCraneCollision();

    // Update crane positions
    crane1.position.set(p1.x, p1.y, p1.z);
    crane2.position.set(p2.x, p2.y, p2.z);

    // Update cable lengths for idle state
    if (p1.clawState === 'idle') {
        if (crane1.userData.cable) {
            crane1.userData.cable.scale.y = 1;
            crane1.userData.cable.position.y = 0.5;
        }
    }
    if (p2.clawState === 'idle') {
        if (crane2.userData.cable) {
            crane2.userData.cable.scale.y = 1;
            crane2.userData.cable.position.y = 0.5;
        }
    }

    // Animate point lights for arcade feel
    pointLight1.intensity = 0.8 + Math.sin(gameTime * 3) * 0.3;
    pointLight2.intensity = 0.8 + Math.sin(gameTime * 3 + 2) * 0.3;
    pointLight3.intensity = 0.6 + Math.sin(gameTime * 2.5 + 1) * 0.2;
    pointLight4.intensity = 0.5 + Math.sin(gameTime * 4) * 0.2;

    // Update HUD
    p1ScoreEl.textContent = `Score: ${p1.score}`;
    p2ScoreEl.textContent = `Score: ${p2.score}`;
    gameStatusEl.textContent = gameStatus;
    gameTimerEl.textContent = `Time: ${gameTime.toFixed(1)}s`;
    const remaining = prizes.filter(p => !p.userData.collected).length;
    prizesLeftEl.textContent = `Prizes Left: ${remaining}`;

    // Update game status color
    if (gameStatus === 'P1 WINS!') {
        gameStatusEl.style.color = '#ff4444';
    } else if (gameStatus === 'P2 WINS!') {
        gameStatusEl.style.color = '#4488ff';
    } else if (gameStatus === 'TIE!') {
        gameStatusEl.style.color = '#ff88ff';
    } else {
        gameStatusEl.style.color = '#ffdd00';
    }

    // Update __3D_STATE__
    const state = window.__3D_STATE__;
    state.p1 = {
        x: p1.x, y: p1.y, z: p1.z,
        score: p1.score,
        isGrabbing: p1.isGrabbing,
        hasPrize: p1.hasPrize,
        clawState: p1.clawState
    };
    state.p2 = {
        x: p2.x, y: p2.y, z: p2.z,
        score: p2.score,
        isGrabbing: p2.isGrabbing,
        hasPrize: p2.hasPrize,
        clawState: p2.clawState
    };
    state.prizes = prizes.map((p, i) => ({
        x: p.position.x,
        y: p.position.y,
        z: p.position.z,
        collected: p.userData.collected,
        collectedBy: p.userData.collectedBy
    }));
    state.prizesRemaining = remaining;
    state.gameStatus = gameStatus;
    state.gameTime = gameTime;
    state.craneCollisionCount = craneCollisionCount;
    state.totalGrabAttempts = totalGrabAttempts;
    state.successfulGrabs = successfulGrabs;
    state.animationsPlaying = animationsPlaying;

    renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
