<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ring Designer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: "Georgia", "Times New Roman", serif;
      background: linear-gradient(to bottom, #1a1a1a, #4a4a4a);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      box-sizing: border-box;
      padding: 14px 18px;
      background: rgba(10, 10, 10, 0.45);
      color: #fff;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    #title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      align-items: center;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      padding: 8px 10px;
      border-radius: 10px;
    }

    select, button, input[type="range"] {
      background: #222;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    label, span {
      font-size: 14px;
    }

    #priceDisplay {
      font-weight: bold;
      color: #ffd700;
      min-width: 120px;
      display: inline-block;
    }

    #slotDisplay {
      min-width: 80px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui">
      <div id="title">Ring Designer</div>
      <div class="controls">
        <div class="control-group">
          <label for="bandMaterialSelect">Band Material</label>
          <select id="bandMaterialSelect">
            <option value="gold">gold</option>
            <option value="silver">silver</option>
            <option value="rose_gold">rose_gold</option>
          </select>
        </div>

        <div class="control-group">
          <label for="gemTypeSelect">Gem Type</label>
          <select id="gemTypeSelect">
            <option value="diamond">diamond</option>
            <option value="ruby">ruby</option>
            <option value="emerald">emerald</option>
            <option value="sapphire">sapphire</option>
          </select>
        </div>

        <div class="control-group">
          <label>Selected Gem Slot</label>
          <span id="slotDisplay">1</span>
        </div>

        <div class="control-group">
          <button id="placeGemBtn">Place Gem</button>
          <button id="removeGemBtn">Remove Gem</button>
          <button id="clearAllBtn">Clear All</button>
        </div>

        <div class="control-group">
          <label for="rotateToggle">Rotate Ring</label>
          <input type="checkbox" id="rotateToggle" />
        </div>

        <div class="control-group">
          <label for="ringSizeSlider">Ring Size</label>
          <input id="ringSizeSlider" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
          <span id="ringSizeValue">1.0</span>
        </div>

        <div class="control-group">
          <span id="priceDisplay">$500</span>
        </div>

        <div class="control-group">
          <button id="exportBtn">Export Config</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
    import { RGBELoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/RGBELoader.js";

    const app = document.getElementById("app");

    const bandMaterialSelect = document.getElementById("bandMaterialSelect");
    const gemTypeSelect = document.getElementById("gemTypeSelect");
    const slotDisplay = document.getElementById("slotDisplay");
    const placeGemBtn = document.getElementById("placeGemBtn");
    const removeGemBtn = document.getElementById("removeGemBtn");
    const clearAllBtn = document.getElementById("clearAllBtn");
    const rotateToggle = document.getElementById("rotateToggle");
    const ringSizeSlider = document.getElementById("ringSizeSlider");
    const ringSizeValue = document.getElementById("ringSizeValue");
    const priceDisplay = document.getElementById("priceDisplay");
    const exportBtn = document.getElementById("exportBtn");

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    app.appendChild(renderer.domElement);

    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    new RGBELoader()
      .setPath("https://threejs.org/examples/textures/equirectangular/")
      .load("royal_esplanade_1k.hdr", (hdr) => {
        const envMap = pmremGenerator.fromEquirectangular(hdr).texture;
        scene.environment = envMap;
        hdr.dispose();
        pmremGenerator.dispose();
      });

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.6, 0);

    const gemDefinitions = {
      diamond: { color: "#FFFFFF", emissive: "#AAAAFF", price: 1000 },
      ruby: { color: "#FF0033", emissive: "#FF0000", price: 750 },
      emerald: { color: "#00CC44", emissive: "#00FF44", price: 600 },
      sapphire: { color: "#0033FF", emissive: "#0000FF", price: 800 }
    };

    const bandDefinitions = {
      gold: { color: "#FFD700", price: 500 },
      silver: { color: "#C0C0C0", price: 200 },
      rose_gold: { color: "#B76E79", price: 350 }
    };

    const ringGroup = new THREE.Group();
    scene.add(ringGroup);

    const ringBandMaterial = new THREE.MeshStandardMaterial({
      color: bandDefinitions.gold.color,
      metalness: 0.9,
      roughness: 0.1
    });

    const ringBandGeometry = new THREE.TorusGeometry(1.0, 0.15, 32, 64);
    const ringBand = new THREE.Mesh(ringBandGeometry, ringBandMaterial);
    ringBand.rotation.x = Math.PI / 2;
    ringBand.position.set(0, 0, 0);
    ringBand.castShadow = true;
    ringBand.receiveShadow = true;
    ringGroup.add(ringBand);

    const crownAnchor = new THREE.Group();
    crownAnchor.position.set(0, 1.0, 0);
    ringGroup.add(crownAnchor);

    const gemGroup = new THREE.Group();
    ringGroup.add(gemGroup);

    const gemSlots = [];
    const gemAnglesDeg = [-50, -30, -10, 10, 30, 50];
    const torusRadius = 1.0;

    const gemGeometry = new THREE.OctahedronGeometry(0.08, 0);

    gemAnglesDeg.forEach((deg, index) => {
      const angle = THREE.MathUtils.degToRad(deg);
      const x = Math.sin(angle) * torusRadius;
      const y = Math.cos(angle) * torusRadius;
      const z = 0;

      const material = new THREE.MeshStandardMaterial({
        color: gemDefinitions.diamond.color,
        emissive: gemDefinitions.diamond.emissive,
        emissiveIntensity: 0.8,
        metalness: 0.2,
        roughness: 0.05
      });

      const gem = new THREE.Mesh(gemGeometry, material);
      gem.position.set(x, y, z);
      gem.visible = false;
      gem.userData.slotIndex = index;
      gemGroup.add(gem);
      gemSlots.push(gem);
    });

    const selectionIndicator = new THREE.Mesh(
      new THREE.SphereGeometry(0.13, 16, 16),
      new THREE.MeshBasicMaterial({
        color: 0xffffaa,
        wireframe: true
      })
    );
    gemGroup.add(selectionIndicator);

    const loader = new GLTFLoader();
    let facecapModel = null;

    loader.load(
      "facecap.glb",
      (gltf) => {
        facecapModel = gltf.scene;
        facecapModel.scale.setScalar(0.3);
        facecapModel.position.set(0, 0, 0);
        crownAnchor.add(facecapModel);
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (error) => {
        console.warn("Failed to load facecap.glb", error);
        window.__3D_STATE__.modelLoaded = false;
      }
    );

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    window.__3D_STATE__ = {
      bandMaterial: "gold",
      gemType: "diamond",
      selectedSlot: 0,
      gems: Array.from({ length: 6 }, () => ({ type: null, visible: false })),
      gemCount: 0,
      ringScale: 1.0,
      totalPrice: 500,
      isRotating: false,
      rotationAngle: 0,
      modelLoaded: false,
      exported: false,
      bandColor: bandDefinitions.gold.color
    };

    function updateSlotDisplay() {
      slotDisplay.textContent = String(window.__3D_STATE__.selectedSlot + 1);
    }

    function updateSelectionIndicator() {
      const slot = gemSlots[window.__3D_STATE__.selectedSlot];
      selectionIndicator.position.copy(slot.position);
    }

    function computePrice() {
      const state = window.__3D_STATE__;
      let total = bandDefinitions[state.bandMaterial].price;
      for (const gem of state.gems) {
        if (gem.visible && gem.type) {
          total += gemDefinitions[gem.type].price;
        }
      }
      state.gemCount = state.gems.filter(g => g.visible).length;
      state.totalPrice = total;
      priceDisplay.textContent = `$${total}`;
    }

    function applyBandMaterial(materialName) {
      const def = bandDefinitions[materialName];
      ringBandMaterial.color.set(def.color);
      window.__3D_STATE__.bandMaterial = materialName;
      window.__3D_STATE__.bandColor = def.color;
      computePrice();
    }

    function setSelectedGemType(type) {
      gemTypeSelect.value = type;
      window.__3D_STATE__.gemType = type;
    }

    function selectSlot(index) {
      const normalized = (index + gemSlots.length) % gemSlots.length;
      window.__3D_STATE__.selectedSlot = normalized;
      updateSlotDisplay();
      updateSelectionIndicator();
    }

    function placeGemInSlot(slotIndex, gemType) {
      const gem = gemSlots[slotIndex];
      const def = gemDefinitions[gemType];
      gem.material.color.set(def.color);
      gem.material.emissive.set(def.emissive);
      gem.visible = true;

      window.__3D_STATE__.gems[slotIndex] = {
        type: gemType,
        visible: true
      };

      computePrice();
    }

    function removeGemFromSlot(slotIndex) {
      const gem = gemSlots[slotIndex];
      gem.visible = false;

      window.__3D_STATE__.gems[slotIndex] = {
        type: null,
        visible: false
      };

      computePrice();
    }

    function clearAllGems() {
      for (let i = 0; i < gemSlots.length; i++) {
        gemSlots[i].visible = false;
        window.__3D_STATE__.gems[i] = { type: null, visible: false };
      }
      computePrice();
    }

    bandMaterialSelect.addEventListener("change", (e) => {
      applyBandMaterial(e.target.value);
    });

    gemTypeSelect.addEventListener("change", (e) => {
      setSelectedGemType(e.target.value);
    });

    placeGemBtn.addEventListener("click", () => {
      placeGemInSlot(window.__3D_STATE__.selectedSlot, window.__3D_STATE__.gemType);
    });

    removeGemBtn.addEventListener("click", () => {
      removeGemFromSlot(window.__3D_STATE__.selectedSlot);
    });

    clearAllBtn.addEventListener("click", () => {
      clearAllGems();
    });

    rotateToggle.addEventListener("change", (e) => {
      window.__3D_STATE__.isRotating = e.target.checked;
    });

    ringSizeSlider.addEventListener("input", (e) => {
      const scale = parseFloat(e.target.value);
      ringGroup.scale.setScalar(scale);
      ringSizeValue.textContent = scale.toFixed(1);
      window.__3D_STATE__.ringScale = scale;
    });

    exportBtn.addEventListener("click", () => {
      window.__3D_STATE__.exported = true;
      console.log("Export Config:", JSON.parse(JSON.stringify(window.__3D_STATE__)));
    });

    renderer.domElement.addEventListener("pointerdown", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects([ringBand, ...gemSlots], true);

      if (intersects.length > 0) {
        selectSlot(window.__3D_STATE__.selectedSlot + 1);
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") {
        selectSlot(window.__3D_STATE__.selectedSlot - 1);
      } else if (event.key === "ArrowRight") {
        selectSlot(window.__3D_STATE__.selectedSlot + 1);
      } else if (event.key === "ArrowUp") {
        const options = Object.keys(gemDefinitions);
        let idx = options.indexOf(window.__3D_STATE__.gemType);
        idx = (idx + 1) % options.length;
        setSelectedGemType(options[idx]);
      } else if (event.key === "ArrowDown") {
        const options = Object.keys(gemDefinitions);
        let idx = options.indexOf(window.__3D_STATE__.gemType);
        idx = (idx - 1 + options.length) % options.length;
        setSelectedGemType(options[idx]);
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    applyBandMaterial("gold");
    setSelectedGemType("diamond");
    selectSlot(0);
    computePrice();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      if (window.__3D_STATE__.isRotating) {
        ringGroup.rotation.y += 0.01;
      }

      window.__3D_STATE__.rotationAngle = ringGroup.rotation.y;

      const pulse = 1 + 0.18 * Math.sin(elapsed * 4.0);
      selectionIndicator.scale.setScalar(pulse);

      updateSelectionIndicator();
      computePrice();
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
