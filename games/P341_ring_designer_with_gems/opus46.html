<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring Designer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    background: #1a1a2e;
    font-family: 'Lato', sans-serif;
    color: #e0e0e0;
  }

  canvas { display: block; }

  #ui-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #top-bar {
    pointer-events: auto;
    text-align: center;
    padding: 15px 0 10px;
    background: linear-gradient(180deg, rgba(20,20,40,0.95) 0%, rgba(20,20,40,0) 100%);
  }

  #top-bar h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #FFD700;
    text-shadow: 0 0 20px rgba(255,215,0,0.3);
  }

  #controls-panel {
    pointer-events: auto;
    position: absolute;
    right: 20px;
    top: 70px;
    width: 260px;
    background: rgba(15,15,30,0.92);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 12px;
    padding: 20px;
    backdrop-filter: blur(10px);
  }

  .control-group {
    margin-bottom: 14px;
  }

  .control-group label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #999;
    margin-bottom: 5px;
  }

  select, input[type="range"] {
    width: 100%;
    padding: 8px 10px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  select:hover, input[type="range"]:hover {
    border-color: rgba(255,215,0,0.4);
  }

  select option {
    background: #1a1a2e;
    color: #e0e0e0;
  }

  input[type="range"] {
    -webkit-appearance: none;
    height: 6px;
    padding: 0;
    border-radius: 3px;
    background: rgba(255,255,255,0.1);
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #FFD700;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
  }

  .slot-display {
    font-size: 18px;
    font-weight: 700;
    color: #FFD700;
    text-align: center;
    padding: 6px;
    background: rgba(255,215,0,0.08);
    border-radius: 6px;
  }

  .btn-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  button {
    pointer-events: auto;
    flex: 1;
    min-width: 70px;
    padding: 8px 6px;
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 6px;
    background: rgba(255,215,0,0.1);
    color: #FFD700;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  button:hover {
    background: rgba(255,215,0,0.25);
    border-color: #FFD700;
    box-shadow: 0 0 12px rgba(255,215,0,0.2);
  }

  #clearAllBtn {
    border-color: rgba(255,80,80,0.3);
    background: rgba(255,80,80,0.1);
    color: #ff6666;
  }

  #clearAllBtn:hover {
    background: rgba(255,80,80,0.25);
    border-color: #ff6666;
  }

  #exportBtn {
    width: 100%;
    margin-top: 4px;
    border-color: rgba(100,200,255,0.3);
    background: rgba(100,200,255,0.1);
    color: #88ccff;
  }

  #exportBtn:hover {
    background: rgba(100,200,255,0.25);
    border-color: #88ccff;
  }

  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .checkbox-group input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: #FFD700;
    cursor: pointer;
  }

  .checkbox-group span {
    font-size: 13px;
  }

  #priceDisplay {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #FFD700;
    padding: 10px;
    background: rgba(255,215,0,0.06);
    border-radius: 8px;
    border: 1px solid rgba(255,215,0,0.15);
    font-family: 'Playfair Display', serif;
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 12px 0;
  }

  #slot-indicators {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 6px;
  }

  .slot-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .slot-dot.selected {
    border-color: #FFD700;
    box-shadow: 0 0 10px rgba(255,215,0,0.4);
  }

  .slot-dot.filled {
    background: rgba(255,255,255,0.15);
  }

  .size-value {
    text-align: center;
    font-size: 12px;
    color: #999;
    margin-top: 3px;
  }
</style>
</head>
<body>

<div id="ui-overlay">
  <div id="top-bar">
    <h1>✦ Ring Designer ✦</h1>
  </div>

  <div id="controls-panel">
    <div class="control-group">
      <label>Band Material</label>
      <select id="bandMaterialSelect">
        <option value="gold">Gold — $500</option>
        <option value="silver">Silver — $200</option>
        <option value="rose_gold">Rose Gold — $350</option>
      </select>
    </div>

    <div class="control-group">
      <label>Gem Type</label>
      <select id="gemTypeSelect">
        <option value="diamond">Diamond — $1,000</option>
        <option value="ruby">Ruby — $750</option>
        <option value="emerald">Emerald — $600</option>
        <option value="sapphire">Sapphire — $800</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Selected Gem Slot</label>
      <div class="slot-display" id="slotLabel">Slot 1</div>
      <div id="slot-indicators">
        <div class="slot-dot selected" data-slot="0">1</div>
        <div class="slot-dot" data-slot="1">2</div>
        <div class="slot-dot" data-slot="2">3</div>
        <div class="slot-dot" data-slot="3">4</div>
        <div class="slot-dot" data-slot="4">5</div>
        <div class="slot-dot" data-slot="5">6</div>
      </div>
    </div>

    <div class="control-group btn-row">
      <button id="placeGemBtn">Place Gem</button>
      <button id="removeGemBtn">Remove</button>
    </div>

    <div class="control-group">
      <button id="clearAllBtn" style="width:100%">Clear All Gems</button>
    </div>

    <div class="divider"></div>

    <div class="control-group checkbox-group">
      <input type="checkbox" id="rotateToggle" checked>
      <span>Auto-Rotate Ring</span>
    </div>

    <div class="control-group">
      <label>Ring Size</label>
      <input type="range" id="ringSizeSlider" min="0.5" max="2.0" step="0.1" value="1.0">
      <div class="size-value" id="sizeValue">1.0×</div>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Total Price</label>
      <div id="priceDisplay">$500</div>
    </div>

    <button id="exportBtn">Export Configuration</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── Constants ───
const GEM_TYPES = {
  diamond:  { color: 0xFFFFFF, emissive: 0xAAAAFF },
  ruby:     { color: 0xFF0033, emissive: 0xFF0000 },
  emerald:  { color: 0x00CC44, emissive: 0x00FF44 },
  sapphire: { color: 0x0033FF, emissive: 0x0000FF }
};

const BAND_MATERIALS = {
  gold:      { color: 0xFFD700, hex: '#FFD700', price: 500 },
  silver:    { color: 0xC0C0C0, hex: '#C0C0C0', price: 200 },
  rose_gold: { color: 0xB76E79, hex: '#B76E79', price: 350 }
};

const GEM_PRICES = { diamond: 1000, ruby: 750, emerald: 600, sapphire: 800 };

const GEM_ANGLES_DEG = [-50, -30, -10, 10, 30, 50];

// ─── State ───
window.__3D_STATE__ = {
  bandMaterial: 'gold',
  gemType: 'diamond',
  selectedSlot: 0,
  gems: Array.from({length: 6}, () => ({ type: null, visible: false })),
  gemCount: 0,
  ringScale: 1.0,
  totalPrice: 500,
  isRotating: true,
  rotationAngle: 0,
  modelLoaded: false,
  exported: false,
  bandColor: '#FFD700'
};

const state = window.__3D_STATE__;

// ─── Scene Setup ───
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2; canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const grad = ctx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0, '#0a0a1a');
grad.addColorStop(0.5, '#1a1a2e');
grad.addColorStop(1, '#2a2a3e');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
document.body.prepend(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Extra fill lights for ring sparkle
const fillLight1 = new THREE.PointLight(0xffeedd, 0.5, 20);
fillLight1.position.set(-3, 3, -3);
scene.add(fillLight1);

const fillLight2 = new THREE.PointLight(0xddeeff, 0.3, 20);
fillLight2.position.set(3, -2, 4);
scene.add(fillLight2);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0.3, 0);
controls.update();

// ─── Ring Group ───
const ringGroup = new THREE.Group();
scene.add(ringGroup);

// Ring band (torus)
const torusGeom = new THREE.TorusGeometry(1.0, 0.15, 32, 64);
const bandMat = new THREE.MeshStandardMaterial({
  color: 0xFFD700,
  metalness: 0.9,
  roughness: 0.1
});
const ringBand = new THREE.Mesh(torusGeom, bandMat);
ringBand.rotation.x = Math.PI / 2;
ringBand.castShadow = true;
ringBand.receiveShadow = true;
ringGroup.add(ringBand);

// ─── Gem Slots ───
const gemMeshes = [];
const gemSlotPositions = [];

GEM_ANGLES_DEG.forEach((angleDeg, i) => {
  const angleRad = THREE.MathUtils.degToRad(angleDeg);
  // Position on top of the torus ring
  // The torus is rotated PI/2 on X, so the top is at Y = radius = 1.0
  // We place gems on the outer surface of the torus at the top
  const torusRadius = 1.0;
  const tubeRadius = 0.15;

  // In the torus's local space (before rotation), the tube circle goes around.
  // After rotating PI/2 on X, the torus lies upright.
  // Top of torus: parametric position
  // theta = angle around the main ring (in XZ plane after rotation)
  // phi = angle around the tube cross-section (0 = outer)
  
  // For the top semicircle, we use the angleDeg as theta
  // phi = 0 means outermost point of tube
  // After X rotation by PI/2:
  // x = (R + r*cos(phi)) * cos(theta)
  // z = (R + r*cos(phi)) * sin(theta)  -> but torus rotated, so this becomes y
  // y = r * sin(phi) -> becomes z
  
  // Actually let's just compute positions on the top of the upright torus
  // The torus after rotation sits upright in XY plane
  // Points on the outer top: 
  const theta = angleRad;
  const x = Math.sin(theta) * torusRadius;
  const y = Math.cos(theta) * torusRadius;
  const z = 0;
  
  // Offset outward from center (along the direction from center of tube)
  const dirX = Math.sin(theta);
  const dirY = Math.cos(theta);
  const px = x + dirX * tubeRadius;
  const py = y + dirY * tubeRadius;
  const pz = z;

  gemSlotPositions.push(new THREE.Vector3(px, py, pz));

  const gemGeom = new THREE.OctahedronGeometry(0.08, 0);
  const gemMat = new THREE.MeshStandardMaterial({
    color: 0xFFFFFF,
    emissive: 0xAAAAFF,
    emissiveIntensity: 0.5,
    metalness: 0.3,
    roughness: 0.1,
    transparent: true,
    opacity: 0.9
  });
  const gem = new THREE.Mesh(gemGeom, gemMat);
  gem.position.copy(gemSlotPositions[i]);
  gem.visible = false;
  gem.castShadow = true;
  ringGroup.add(gem);
  gemMeshes.push(gem);
});

// ─── Selection Indicator ───
const selectorGeom = new THREE.SphereGeometry(0.12, 16, 16);
const selectorMat = new THREE.MeshBasicMaterial({
  color: 0xFFD700,
  wireframe: true,
  transparent: true,
  opacity: 0.6
});
const selector = new THREE.Mesh(selectorGeom, selectorMat);
selector.position.copy(gemSlotPositions[0]);
ringGroup.add(selector);

// ─── Load facecap.glb ───
const loader = new GLTFLoader();
let loadedModel = null;

loader.load('facecap.glb',
  (gltf) => {
    loadedModel = gltf.scene;
    loadedModel.scale.set(0.3, 0.3, 0.3);
    loadedModel.position.set(0, 1.0, 0);
    loadedModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    ringGroup.add(loadedModel);
    state.modelLoaded = true;
    console.log('facecap.glb loaded successfully');
  },
  (progress) => {
    // loading progress
  },
  (error) => {
    console.warn('Could not load facecap.glb, adding placeholder:', error.message || error);
    // Create a decorative placeholder crown/setting
    const crownGroup = new THREE.Group();
    
    // Base setting
    const settingGeom = new THREE.CylinderGeometry(0.2, 0.3, 0.15, 8);
    const settingMat = new THREE.MeshStandardMaterial({
      color: 0xFFD700,
      metalness: 0.9,
      roughness: 0.1
    });
    const setting = new THREE.Mesh(settingGeom, settingMat);
    crownGroup.add(setting);

    // Prongs
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      const prongGeom = new THREE.ConeGeometry(0.03, 0.25, 4);
      const prong = new THREE.Mesh(prongGeom, settingMat.clone());
      prong.position.set(
        Math.cos(angle) * 0.18,
        0.15,
        Math.sin(angle) * 0.18
      );
      crownGroup.add(prong);
    }

    // Center gem holder
    const holderGeom = new THREE.SphereGeometry(0.1, 8, 8);
    const holderMat = new THREE.MeshStandardMaterial({
      color: 0xFFFFFF,
      emissive: 0xAAAAFF,
      emissiveIntensity: 0.3,
      metalness: 0.5,
      roughness: 0.05,
      transparent: true,
      opacity: 0.8
    });
    const holder = new THREE.Mesh(holderGeom, holderMat);
    holder.position.y = 0.2;
    crownGroup.add(holder);

    crownGroup.scale.set(0.3, 0.3, 0.3);
    crownGroup.position.set(0, 1.0, 0);
    ringGroup.add(crownGroup);
    loadedModel = crownGroup;
    state.modelLoaded = true;
  }
);

// ─── Floor / Platform ───
const platformGeom = new THREE.CylinderGeometry(2.5, 2.5, 0.05, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x111122,
  metalness: 0.8,
  roughness: 0.3
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = -1.2;
platform.receiveShadow = true;
scene.add(platform);

// ─── Raycaster ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// ─── UI References ───
const bandSelect = document.getElementById('bandMaterialSelect');
const gemSelect = document.getElementById('gemTypeSelect');
const slotLabel = document.getElementById('slotLabel');
const placeBtn = document.getElementById('placeGemBtn');
const removeBtn = document.getElementById('removeGemBtn');
const clearBtn = document.getElementById('clearAllBtn');
const rotateToggle = document.getElementById('rotateToggle');
const sizeSlider = document.getElementById('ringSizeSlider');
const sizeValue = document.getElementById('sizeValue');
const priceDisplay = document.getElementById('priceDisplay');
const exportBtn = document.getElementById('exportBtn');
const slotDots = document.querySelectorAll('.slot-dot');

// ─── Helper Functions ───
function updateSlotUI() {
  slotLabel.textContent = `Slot ${state.selectedSlot + 1}`;
  slotDots.forEach((dot, i) => {
    dot.classList.toggle('selected', i === state.selectedSlot);
    dot.classList.toggle('filled', state.gems[i].visible);
    if (state.gems[i].visible && state.gems[i].type) {
      const gt = GEM_TYPES[state.gems[i].type];
      dot.style.backgroundColor = '#' + new THREE.Color(gt.color).getHexString();
    } else {
      dot.style.backgroundColor = '';
    }
  });
  selector.position.copy(gemSlotPositions[state.selectedSlot]);
}

function updatePrice() {
  let total = BAND_MATERIALS[state.bandMaterial].price;
  state.gems.forEach(g => {
    if (g.visible && g.type) {
      total += GEM_PRICES[g.type];
    }
  });
  state.totalPrice = total;
  priceDisplay.textContent = `$${total.toLocaleString()}`;
}

function updateGemCount() {
  state.gemCount = state.gems.filter(g => g.visible).length;
}

function selectSlot(index) {
  state.selectedSlot = ((index % 6) + 6) % 6;
  updateSlotUI();
}

function placeGem() {
  const slot = state.selectedSlot;
  const type = state.gemType;
  const gt = GEM_TYPES[type];

  gemMeshes[slot].material.color.setHex(gt.color);
  gemMeshes[slot].material.emissive.setHex(gt.emissive);
  gemMeshes[slot].material.emissiveIntensity = 0.5;
  gemMeshes[slot].visible = true;

  state.gems[slot] = { type: type, visible: true };
  updateGemCount();
  updatePrice();
  updateSlotUI();
}

function removeGem() {
  const slot = state.selectedSlot;
  gemMeshes[slot].visible = false;
  state.gems[slot] = { type: null, visible: false };
  updateGemCount();
  updatePrice();
  updateSlotUI();
}

function clearAllGems() {
  for (let i = 0; i < 6; i++) {
    gemMeshes[i].visible = false;
    state.gems[i] = { type: null, visible: false };
  }
  updateGemCount();
  updatePrice();
  updateSlotUI();
}

function changeBandMaterial(matName) {
  state.bandMaterial = matName;
  const bm = BAND_MATERIALS[matName];
  bandMat.color.setHex(bm.color);
  state.bandColor = bm.hex;
  updatePrice();
}

// ─── Event Listeners ───
bandSelect.addEventListener('change', (e) => {
  changeBandMaterial(e.target.value);
});

gemSelect.addEventListener('change', (e) => {
  state.gemType = e.target.value;
});

placeBtn.addEventListener('click', placeGem);
removeBtn.addEventListener('click', removeGem);
clearBtn.addEventListener('click', clearAllGems);

rotateToggle.addEventListener('change', (e) => {
  state.isRotating = e.target.checked;
});

sizeSlider.addEventListener('input', (e) => {
  const val = parseFloat(e.target.value);
  state.ringScale = val;
  ringGroup.scale.set(val, val, val);
  sizeValue.textContent = `${val.toFixed(1)}×`;
});

exportBtn.addEventListener('click', () => {
  const config = {
    bandMaterial: state.bandMaterial,
    bandColor: state.bandColor,
    ringScale: state.ringScale,
    gems: state.gems.map((g, i) => ({
      slot: i + 1,
      type: g.type,
      placed: g.visible
    })),
    gemCount: state.gemCount,
    totalPrice: state.totalPrice
  };
  console.log('=== Ring Configuration Export ===');
  console.log(JSON.stringify(config, null, 2));
  state.exported = true;
  
  // Visual feedback
  exportBtn.textContent = '✓ Exported!';
  exportBtn.style.borderColor = '#44ff88';
  exportBtn.style.color = '#44ff88';
  setTimeout(() => {
    exportBtn.textContent = 'Export Configuration';
    exportBtn.style.borderColor = '';
    exportBtn.style.color = '';
  }, 2000);
});

slotDots.forEach(dot => {
  dot.addEventListener('click', () => {
    selectSlot(parseInt(dot.dataset.slot));
  });
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    selectSlot(state.selectedSlot - 1);
  } else if (e.key === 'ArrowRight') {
    selectSlot(state.selectedSlot + 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const options = gemSelect.options;
    let idx = gemSelect.selectedIndex - 1;
    if (idx < 0) idx = options.length - 1;
    gemSelect.selectedIndex = idx;
    state.gemType = gemSelect.value;
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    const options = gemSelect.options;
    let idx = gemSelect.selectedIndex + 1;
    if (idx >= options.length) idx = 0;
    gemSelect.selectedIndex = idx;
    state.gemType = gemSelect.value;
  }
});

// Click raycasting on ring
renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(ringBand);
  
  if (intersects.length > 0) {
    selectSlot(state.selectedSlot + 1);
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation Loop ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();

  // Auto rotation
  if (state.isRotating) {
    ringGroup.rotation.y += 0.01;
    state.rotationAngle = ringGroup.rotation.y;
  }

  // Pulse selector
  const pulse = 1.0 + 0.3 * Math.sin(elapsed * 4);
  selector.scale.set(pulse, pulse, pulse);
  selectorMat.opacity = 0.3 + 0.3 * Math.sin(elapsed * 3);

  // Gem sparkle animation
  gemMeshes.forEach((gem, i) => {
    if (gem.visible) {
      gem.rotation.y = elapsed * 2 + i;
      gem.material.emissiveIntensity = 0.3 + 0.3 * Math.sin(elapsed * 3 + i * 1.5);
    }
  });

  controls.update();
  renderer.render(scene, camera);
}

// Initialize
updateSlotUI();
updatePrice();
animate();
</script>
