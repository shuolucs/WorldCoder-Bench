<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ring Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #2a2a2a, #888888);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(20, 20, 20, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }
        h1 {
            margin: 0 0 20px 0;
            font-size: 24px;
            font-weight: 300;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 12px;
            margin-bottom: 5px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        select, button, input[type="range"] {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }
        select option {
            background: #333;
            color: #fff;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        button:active {
            background: rgba(255, 255, 255, 0.3);
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .checkbox-group {
            flex-direction: row;
            align-items: center;
            gap: 10px;
        }
        .checkbox-group input {
            cursor: pointer;
        }
        #slotLabel {
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
            color: #ffd700;
        }
        #priceDisplay {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: #4CAF50;
        }
        #exportBtn {
            background: #2196F3;
            border: none;
            font-weight: bold;
        }
        #exportBtn:hover {
            background: #1976D2;
        }
        .instructions {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-container">
        <h1>Ring Designer</h1>
        
        <div class="control-group">
            <label for="bandMaterialSelect">Band Material</label>
            <select id="bandMaterialSelect">
                <option value="gold">Gold</option>
                <option value="silver">Silver</option>
                <option value="rose_gold">Rose Gold</option>
            </select>
        </div>

        <div class="control-group">
            <label for="gemTypeSelect">Gem Type</label>
            <select id="gemTypeSelect">
                <option value="diamond">Diamond</option>
                <option value="ruby">Ruby</option>
                <option value="emerald">Emerald</option>
                <option value="sapphire">Sapphire</option>
            </select>
        </div>

        <div id="slotLabel">Selected Gem Slot: 1</div>

        <div class="btn-row">
            <button id="placeGemBtn">Place Gem</button>
            <button id="removeGemBtn">Remove Gem</button>
        </div>
        <button id="clearAllBtn" style="margin-bottom: 15px;">Clear All</button>

        <div class="control-group checkbox-group">
            <input type="checkbox" id="rotateToggle">
            <label for="rotateToggle" style="margin:0;">Rotate Ring</label>
        </div>

        <div class="control-group">
            <label for="ringSizeSlider">Ring Size</label>
            <input type="range" id="ringSizeSlider" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>

        <div id="priceDisplay">Total Price: $500</div>

        <button id="exportBtn">Export Config</button>

        <div class="instructions">
            Click ring or use Left/Right arrows to select slot.<br>
            Up/Down arrows to change gem type.<br>
            Drag to rotate camera. Scroll to zoom.
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            bandMaterial: 'gold',
            gemType: 'diamond',
            selectedSlot: 0,
            gems: Array(6).fill(null).map(() => ({ type: null, visible: false })),
            gemCount: 0,
            ringScale: 1.0,
            totalPrice: 500,
            isRotating: false,
            rotationAngle: 0,
            modelLoaded: false,
            exported: false,
            bandColor: '#FFD700'
        };

        // --- Data Dictionaries ---
        const bandData = {
            gold: { color: 0xFFD700, price: 500 },
            silver: { color: 0xC0C0C0, price: 200 },
            rose_gold: { color: 0xB76E79, price: 350 }
        };

        const gemData = {
            diamond: { color: 0xFFFFFF, emissive: 0xAAAAFF, price: 1000 },
            ruby: { color: 0xFF0033, emissive: 0xFF0000, price: 750 },
            emerald: { color: 0x00CC44, emissive: 0x00FF44, price: 600 },
            sapphire: { color: 0x0033FF, emissive: 0x0000FF, price: 800 }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Main Group
        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        // --- Objects ---
        
        // Ring Band
        const torusGeo = new THREE.TorusGeometry(1.0, 0.15, 32, 64);
        const torusMat = new THREE.MeshStandardMaterial({ 
            color: bandData.gold.color, 
            metalness: 0.9, 
            roughness: 0.1 
        });
        const torusMesh = new THREE.Mesh(torusGeo, torusMat);
        // Note: Keeping it in XY plane so it sits upright relative to the camera and facecap position
        ringGroup.add(torusMesh);

        // Facecap Model
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/facecap.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.3, 0.3, 0.3);
            model.position.set(0, 1.0, 0);
            
            // Apply a golden material to the loaded model to match the theme
            model.traverse((child) => {
                if (child.isMesh) {
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0xFFD700,
                        metalness: 0.8,
                        roughness: 0.2
                    });
                }
            });

            ringGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.error('Error loading facecap model:', error);
        });

        // Gems & Slots
        const gemMeshes = [];
        const angles = [-50, -30, -10, 10, 30, 50];
        
        angles.forEach((angleDeg) => {
            const rad = angleDeg * Math.PI / 180;
            const gemGeo = new THREE.OctahedronGeometry(0.08, 0);
            const gemMat = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, 
                emissive: 0x000000,
                metalness: 0.8,
                roughness: 0.1
            });
            const gem = new THREE.Mesh(gemGeo, gemMat);
            
            // Position on the top semicircle of the upright torus
            gem.position.set(Math.sin(rad) * 1.0, Math.cos(rad) * 1.0, 0);
            
            // Orient gem outward
            gem.rotation.z = -rad;
            gem.visible = false;
            
            ringGroup.add(gem);
            gemMeshes.push(gem);
        });

        // Selection Indicator
        const indGeo = new THREE.SphereGeometry(0.12, 16, 16);
        const indMat = new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true, transparent: true, opacity: 0.8 });
        const indicator = new THREE.Mesh(indGeo, indMat);
        ringGroup.add(indicator);

        // --- Logic & UI Updates ---

        const ui = {
            bandMaterialSelect: document.getElementById('bandMaterialSelect'),
            gemTypeSelect: document.getElementById('gemTypeSelect'),
            slotLabel: document.getElementById('slotLabel'),
            placeGemBtn: document.getElementById('placeGemBtn'),
            removeGemBtn: document.getElementById('removeGemBtn'),
            clearAllBtn: document.getElementById('clearAllBtn'),
            rotateToggle: document.getElementById('rotateToggle'),
            ringSizeSlider: document.getElementById('ringSizeSlider'),
            priceDisplay: document.getElementById('priceDisplay'),
            exportBtn: document.getElementById('exportBtn')
        };

        function updatePrice() {
            const state = window.__3D_STATE__;
            let total = bandData[state.bandMaterial].price;
            state.gemCount = 0;
            state.gems.forEach(gem => {
                if (gem.visible && gem.type) {
                    total += gemData[gem.type].price;
                    state.gemCount++;
                }
            });
            state.totalPrice = total;
            ui.priceDisplay.innerText = `Total Price: $${total}`;
        }

        function updateIndicator() {
            const state = window.__3D_STATE__;
            const targetGem = gemMeshes[state.selectedSlot];
            indicator.position.copy(targetGem.position);
            ui.slotLabel.innerText = `Selected Gem Slot: ${state.selectedSlot + 1}`;
        }

        function selectSlot(index) {
            window.__3D_STATE__.selectedSlot = index;
            updateIndicator();
        }

        // Initial setup
        updateIndicator();
        updatePrice();

        // --- Event Listeners ---

        ui.bandMaterialSelect.addEventListener('change', (e) => {
            const mat = e.target.value;
            window.__3D_STATE__.bandMaterial = mat;
            window.__3D_STATE__.bandColor = '#' + bandData[mat].color.toString(16).padStart(6, '0');
            torusMat.color.setHex(bandData[mat].color);
            updatePrice();
        });

        ui.gemTypeSelect.addEventListener('change', (e) => {
            window.__3D_STATE__.gemType = e.target.value;
        });

        ui.placeGemBtn.addEventListener('click', () => {
            const state = window.__3D_STATE__;
            const slot = state.selectedSlot;
            const type = state.gemType;
            
            state.gems[slot] = { type: type, visible: true };
            
            const mesh = gemMeshes[slot];
            mesh.visible = true;
            mesh.material.color.setHex(gemData[type].color);
            mesh.material.emissive.setHex(gemData[type].emissive);
            
            updatePrice();
        });

        ui.removeGemBtn.addEventListener('click', () => {
            const state = window.__3D_STATE__;
            const slot = state.selectedSlot;
            
            state.gems[slot] = { type: null, visible: false };
            gemMeshes[slot].visible = false;
            
            updatePrice();
        });

        ui.clearAllBtn.addEventListener('click', () => {
            const state = window.__3D_STATE__;
            for (let i = 0; i < 6; i++) {
                state.gems[i] = { type: null, visible: false };
                gemMeshes[i].visible = false;
            }
            updatePrice();
        });

        ui.rotateToggle.addEventListener('change', (e) => {
            window.__3D_STATE__.isRotating = e.target.checked;
        });

        ui.ringSizeSlider.addEventListener('input', (e) => {
            const scale = parseFloat(e.target.value);
            window.__3D_STATE__.ringScale = scale;
            ringGroup.scale.set(scale, scale, scale);
        });

        ui.exportBtn.addEventListener('click', () => {
            window.__3D_STATE__.exported = true;
            console.log("--- Ring Configuration Export ---");
            console.log(JSON.stringify(window.__3D_STATE__, null, 2));
            alert("Configuration exported to console!");
        });

        // Raycasting for ring clicks
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            // Ignore clicks on UI
            if (e.target.closest('#ui-container')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            // Intersect only with the torus band
            const intersects = raycaster.intersectObject(torusMesh);
            
            if (intersects.length > 0) {
                const nextSlot = (window.__3D_STATE__.selectedSlot + 1) % 6;
                selectSlot(nextSlot);
            }
        });

        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            const state = window.__3D_STATE__;
            if (e.key === 'ArrowLeft') {
                selectSlot((state.selectedSlot - 1 + 6) % 6);
            } else if (e.key === 'ArrowRight') {
                selectSlot((state.selectedSlot + 1) % 6);
            } else if (e.key === 'ArrowUp') {
                ui.gemTypeSelect.selectedIndex = Math.max(0, ui.gemTypeSelect.selectedIndex - 1);
                ui.gemTypeSelect.dispatchEvent(new Event('change'));
            } else if (e.key === 'ArrowDown') {
                ui.gemTypeSelect.selectedIndex = Math.min(ui.gemTypeSelect.options.length - 1, ui.gemTypeSelect.selectedIndex + 1);
                ui.gemTypeSelect.dispatchEvent(new Event('change'));
            }
        });

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();

            const state = window.__3D_STATE__;

            if (state.isRotating) {
                ringGroup.rotation.y += 0.01;
                state.rotationAngle = ringGroup.rotation.y;
            }

            // Pulse indicator
            const time = clock.getElapsedTime();
            const pulseScale = 1 + Math.sin(time * 5) * 0.15;
            indicator.scale.setScalar(pulseScale);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
