<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Whack-a-Mole</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }
        h1 {
            font-size: 64px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #fff;
        }
        button {
            padding: 15px 40px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, background-color 0.2s;
        }
        button:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #gameOverOverlay {
            display: none;
        }
        #finalScore {
            font-size: 36px;
            margin-bottom: 30px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="scoreDisplay">Score: 0</div>
        <div id="timerDisplay">Time: 30s</div>
        <div id="comboDisplay">Combo: 0x</div>
        <div id="whackedDisplay">Whacked: 0</div>
        <div id="missesDisplay">Misses: 0</div>
    </div>

    <div id="startOverlay" class="overlay">
        <h1>Whack-a-Parrot</h1>
        <button id="startBtn">Start Game</button>
    </div>

    <div id="gameOverOverlay" class="overlay">
        <h1>Game Over</h1>
        <div id="finalScore">Final Score: 0</div>
        <button id="restartBtn">Restart</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameState: 'idle', // 'idle' | 'playing' | 'gameover'
            score: 0,
            timeRemaining: 30,
            combo: 0,
            whacked: 0,
            misses: 0,
            totalSpawned: 0,
            visibleParrots: [],
            malletY: 3,
            parrotPositions: Array(9).fill(-2),
            spawnInterval: 1000,
            modelLoaded: false,
            holeCount: 9
        };

        const state = window.__3D_STATE__;

        // --- DOM Elements ---
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const whackedDisplay = document.getElementById('whackedDisplay');
        const missesDisplay = document.getElementById('missesDisplay');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreDisplay = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB); // Sky blue
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x228B22 }); // Green
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Holes
        const holes = [];
        const holeGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.3, 32);
        const holeMat = new THREE.MeshLambertMaterial({ color: 0x3e2723 }); // Dark brown
        
        for (let i = 0; i < 9; i++) {
            const row = Math.floor(i / 3);
            const col = i % 3;
            const x = (col - 1) * 3;
            const z = (row - 1) * 3;
            
            const hole = new THREE.Mesh(holeGeo, holeMat);
            hole.position.set(x, 0, z);
            scene.add(hole);
            holes.push(hole);
        }

        // --- Parrots ---
        const parrots = [];
        const loader = new GLTFLoader();
        
        loader.load('Parrot.glb', (gltf) => {
            state.modelLoaded = true;
            const baseModel = gltf.scene;
            
            for (let i = 0; i < 9; i++) {
                const clone = baseModel.clone();
                clone.scale.set(0.015, 0.015, 0.015);
                
                const row = Math.floor(i / 3);
                const col = i % 3;
                const x = (col - 1) * 3;
                const z = (row - 1) * 3;
                
                clone.position.set(x, -2, z);
                scene.add(clone);
                
                parrots.push({
                    mesh: clone,
                    state: 'hidden', // hidden, popping, visible, hiding, whacked
                    timer: 0,
                    index: i
                });
            }
            
            if (startBtn.innerText === 'Loading...') {
                startBtn.innerText = 'Start Game';
                startBtn.disabled = false;
            }
        }, undefined, (error) => {
            console.error('Error loading model:', error);
            startBtn.innerText = 'Error Loading Model';
        });

        if (!state.modelLoaded) {
            startBtn.innerText = 'Loading...';
            startBtn.disabled = true;
        }

        // --- Mallet ---
        const malletGroup = new THREE.Group();
        
        const handleGeo = new THREE.CylinderGeometry(0.1, 0.1, 2);
        const handleMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
        const handle = new THREE.Mesh(handleGeo, handleMat);
        handle.position.y = 1;
        
        const headGeo = new THREE.BoxGeometry(1, 0.6, 0.6);
        const headMat = new THREE.MeshLambertMaterial({ color: 0x5c4033 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 0;
        
        malletGroup.add(handle);
        malletGroup.add(head);
        
        // Rotate mallet to look like it's being held
        malletGroup.rotation.x = Math.PI / 2;
        malletGroup.position.y = 3;
        scene.add(malletGroup);

        const malletAnim = {
            state: 'idle', // idle, swinging
            timer: 0
        };

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('mousedown', () => {
            if (state.gameState !== 'playing') return;

            // Trigger mallet swing
            if (malletAnim.state === 'idle') {
                malletAnim.state = 'swinging';
                malletAnim.timer = 0;
            }

            raycaster.setFromCamera(mouse, camera);

            // Check parrot hits
            let hitParrot = false;
            for (let i = 0; i < 9; i++) {
                const p = parrots[i];
                if (p.state === 'visible' || p.state === 'popping') {
                    const intersects = raycaster.intersectObject(p.mesh, true);
                    if (intersects.length > 0) {
                        hitParrot = true;
                        
                        // Calculate score
                        state.combo++;
                        const multiplier = Math.min(state.combo, 3);
                        state.score += 10 * multiplier;
                        state.whacked++;
                        
                        // Change state to whacked
                        p.state = 'whacked';
                        p.timer = 0;
                        break; // Only hit one parrot per click
                    }
                }
            }

            // Check miss
            if (!hitParrot) {
                const intersects = raycaster.intersectObjects([ground, ...holes]);
                if (intersects.length > 0) {
                    state.score = Math.max(0, state.score - 2);
                    state.combo = 0;
                    state.misses++;
                }
            }
            
            updateHUD();
        });

        // --- Game Logic ---
        let lastTime = performance.now();
        let spawnTimer = 0;
        let gameTimer = 0;

        function startGame() {
            state.gameState = 'playing';
            state.score = 0;
            state.timeRemaining = 30;
            state.combo = 0;
            state.whacked = 0;
            state.misses = 0;
            state.totalSpawned = 0;
            state.spawnInterval = 1000;
            
            spawnTimer = 0;
            gameTimer = 0;
            lastTime = performance.now();

            // Reset parrots
            parrots.forEach(p => {
                p.state = 'hidden';
                p.timer = 0;
                p.mesh.position.y = -2;
                p.mesh.scale.set(0.015, 0.015, 0.015);
                p.mesh.rotation.y = 0;
            });

            startOverlay.style.display = 'none';
            gameOverOverlay.style.display = 'none';
            updateHUD();
        }

        function endGame() {
            state.gameState = 'gameover';
            
            // Hide all parrots
            parrots.forEach(p => {
                p.state = 'hidden';
                p.mesh.position.y = -2;
            });

            finalScoreDisplay.innerText = `Final Score: ${state.score}`;
            gameOverOverlay.style.display = 'flex';
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        function updateHUD() {
            scoreDisplay.innerText = `Score: ${state.score}`;
            timerDisplay.innerText = `Time: ${Math.ceil(state.timeRemaining)}s`;
            comboDisplay.innerText = `Combo: ${state.combo}x`;
            whackedDisplay.innerText = `Whacked: ${state.whacked}`;
            missesDisplay.innerText = `Misses: ${state.misses}`;
        }

        function spawnParrots() {
            const availableHoles = parrots.filter(p => p.state === 'hidden');
            if (availableHoles.length === 0) return;

            const numToSpawn = Math.floor(Math.random() * 3) + 1; // 1 to 3
            const actualSpawn = Math.min(numToSpawn, availableHoles.length);

            // Shuffle available holes
            for (let i = availableHoles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [availableHoles[i], availableHoles[j]] = [availableHoles[j], availableHoles[i]];
            }

            for (let i = 0; i < actualSpawn; i++) {
                const p = availableHoles[i];
                p.state = 'popping';
                p.timer = 0;
                state.totalSpawned++;
            }
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const currentTime = performance.now();
            const dt = (currentTime - lastTime) / 1000; // delta time in seconds
            lastTime = currentTime;

            if (state.gameState === 'playing') {
                // Game Timer
                gameTimer += dt;
                state.timeRemaining = Math.max(0, 30 - gameTimer);
                
                if (state.timeRemaining <= 0) {
                    endGame();
                }

                // Difficulty Ramp
                if (state.timeRemaining <= 10) {
                    state.spawnInterval = 500;
                } else if (state.timeRemaining <= 20) {
                    state.spawnInterval = 750;
                } else {
                    state.spawnInterval = 1000;
                }

                // Spawning
                spawnTimer += dt * 1000;
                if (spawnTimer >= state.spawnInterval) {
                    spawnParrots();
                    spawnTimer = 0;
                }
                
                // Update HUD every frame to keep timer smooth
                updateHUD();
            }

            // Update Parrots
            state.visibleParrots = [];
            for (let i = 0; i < 9; i++) {
                if (!state.modelLoaded) break;
                
                const p = parrots[i];
                
                if (p.state === 'popping') {
                    p.timer += dt;
                    const t = Math.min(p.timer / 0.3, 1);
                    p.mesh.position.y = -2 + t * 3; // -2 to 1.0
                    if (t === 1) {
                        p.state = 'visible';
                        p.timer = 0;
                    }
                } else if (p.state === 'visible') {
                    p.timer += dt;
                    p.mesh.rotation.y += 1 * dt; // Rotate 1 rad/s
                    if (p.timer >= 2.0) {
                        p.state = 'hiding';
                        p.timer = 0;
                    }
                } else if (p.state === 'hiding') {
                    p.timer += dt;
                    const t = Math.min(p.timer / 0.2, 1);
                    p.mesh.position.y = 1.0 - t * 3; // 1.0 to -2
                    if (t === 1) {
                        p.state = 'hidden';
                        p.timer = 0;
                        p.mesh.rotation.y = 0;
                    }
                } else if (p.state === 'whacked') {
                    p.timer += dt;
                    const t = Math.min(p.timer / 0.15, 1);
                    // Scale 0.015 -> 0.025 -> 0.015
                    let scale;
                    if (t < 0.5) {
                        scale = 0.015 + (t / 0.5) * 0.010;
                    } else {
                        scale = 0.025 - ((t - 0.5) / 0.5) * 0.010;
                    }
                    p.mesh.scale.set(scale, scale, scale);
                    
                    if (t === 1) {
                        p.state = 'hidden';
                        p.timer = 0;
                        p.mesh.position.y = -2;
                        p.mesh.scale.set(0.015, 0.015, 0.015);
                    }
                }

                // Update state arrays
                state.parrotPositions[i] = p.mesh ? p.mesh.position.y : -2;
                if (state.parrotPositions[i] > 0) {
                    state.visibleParrots.push(i);
                }
            }

            // Update Mallet Position (Follow Mouse)
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);
            if (intersects.length > 0) {
                // Smooth follow or direct set
                malletGroup.position.x = intersects[0].point.x;
                malletGroup.position.z = intersects[0].point.z;
            }

            // Update Mallet Animation
            if (malletAnim.state === 'swinging') {
                malletAnim.timer += dt;
                const t = Math.min(malletAnim.timer / 0.2, 1);
                
                // y from 3 to 0.5 and back
                let y;
                let rotX;
                if (t < 0.5) {
                    const nt = t / 0.5;
                    y = 3 - nt * 2.5;
                    rotX = Math.PI/2 - nt * (Math.PI/4); // Tilt forward
                } else {
                    const nt = (t - 0.5) / 0.5;
                    y = 0.5 + nt * 2.5;
                    rotX = Math.PI/4 + nt * (Math.PI/4); // Tilt back
                }
                
                malletGroup.position.y = y;
                malletGroup.rotation.x = rotX;

                if (t === 1) {
                    malletAnim.state = 'idle';
                    malletGroup.position.y = 3;
                    malletGroup.rotation.x = Math.PI / 2;
                }
            }
            
            state.malletY = malletGroup.position.y;

            // Ensure no NaNs in state
            state.score = isNaN(state.score) ? 0 : state.score;
            state.timeRemaining = isNaN(state.timeRemaining) ? 0 : state.timeRemaining;

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start loop
        animate();
    </script>
</body>
</html>
