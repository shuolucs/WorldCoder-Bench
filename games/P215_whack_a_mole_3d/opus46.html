<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Whack-a-Mole</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Arial', sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    pointer-events: none;
    z-index: 10;
}

#hud > div {
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

#scoreDisplay { color: #FFD700; }
#timerDisplay { color: #FF6B6B; }
#comboDisplay { color: #00FF88; }
#whackedDisplay { color: #87CEEB; }
#missesDisplay { color: #FF8C00; }

#startBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 50px;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    color: white;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    z-index: 20;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s;
}

#startBtn:hover { transform: translate(-50%, -50%) scale(1.1); }

#gameOverOverlay {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 30;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#gameOverOverlay.show {
    display: flex;
}

#gameOverOverlay h1 {
    color: #FF6B6B;
    font-size: 64px;
    margin-bottom: 20px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

#gameOverOverlay .final-score {
    color: #FFD700;
    font-size: 36px;
    margin-bottom: 10px;
}

#gameOverOverlay .stats {
    color: #fff;
    font-size: 22px;
    margin-bottom: 30px;
}

#restartBtn {
    padding: 15px 40px;
    font-size: 24px;
    font-weight: bold;
    background: linear-gradient(135deg, #00FF88, #00CC6A);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s;
}

#restartBtn:hover { transform: scale(1.1); }

#loadingText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    color: white;
    font-size: 24px;
    z-index: 25;
    display: none;
}
</style>
</head>
<body>

<div id="hud">
    <div id="scoreDisplay">Score: 0</div>
    <div id="timerDisplay">Time: 30s</div>
    <div id="comboDisplay">Combo: 0x</div>
    <div id="whackedDisplay">Whacked: 0</div>
    <div id="missesDisplay">Misses: 0</div>
</div>

<button id="startBtn" style="display:none;">Start Game</button>

<div id="loadingText">Loading...</div>

<div id="gameOverOverlay">
    <h1>Game Over!</h1>
    <div class="final-score" id="finalScore">Final Score: 0</div>
    <div class="stats" id="finalStats">Whacked: 0 | Misses: 0</div>
    <button id="restartBtn">Restart</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
let gameState = 'idle';
let score = 0;
let timeRemaining = 30;
let combo = 0;
let whacked = 0;
let misses = 0;
let totalSpawned = 0;
let spawnInterval = 1000;
let modelLoaded = false;

const parrotYPositions = new Array(9).fill(-2);
const parrotVisible = new Array(9).fill(false);
const parrotAnimations = new Array(9).fill(null);
const parrotHideTimeouts = new Array(9).fill(null);
const parrotWhackAnimations = new Array(9).fill(null);

let malletY = 3;
let malletAnimating = false;

// --- Three.js Setup ---
const scene = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setClearColor(0x87CEEB);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 10);
camera.lookAt(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Ground
const groundGeom = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Holes
const holePositions = [];
const holes = [];
for (let i = 0; i < 9; i++) {
    const row = Math.floor(i / 3);
    const col = i % 3;
    const x = (col - 1) * 3;
    const z = (row - 1) * 3;
    holePositions.push(new THREE.Vector3(x, 0, z));

    const holeGeom = new THREE.CylinderGeometry(0.8, 0.8, 0.3, 32);
    const holeMat = new THREE.MeshStandardMaterial({ color: 0x3E2723 });
    const holeMesh = new THREE.Mesh(holeGeom, holeMat);
    holeMesh.position.set(x, 0.05, z);
    holeMesh.receiveShadow = true;
    scene.add(holeMesh);
    holes.push(holeMesh);
}

// Mallet
const malletGroup = new THREE.Group();
const handleGeom = new THREE.CylinderGeometry(0.08, 0.08, 2, 16);
const handleMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
const handle = new THREE.Mesh(handleGeom, handleMat);
handle.position.y = 1;
malletGroup.add(handle);

const headGeom = new THREE.BoxGeometry(0.6, 0.5, 0.6);
const headMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
const headMesh = new THREE.Mesh(headGeom, headMat);
headMesh.position.y = 2.1;
malletGroup.add(headMesh);

malletGroup.position.y = malletY;
scene.add(malletGroup);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

// Parrot loading
const parrotClones = [];
const parrotMixers = [];
let parrotTemplate = null;

const loadingText = document.getElementById('loadingText');
loadingText.style.display = 'block';

const loader = new GLTFLoader();
loader.load('Parrot.glb', (gltf) => {
    parrotTemplate = gltf;
    
    for (let i = 0; i < 9; i++) {
        const clone = gltf.scene.clone(true);
        clone.scale.set(0.015, 0.015, 0.015);
        clone.position.set(holePositions[i].x, -2, holePositions[i].z);
        
        // Setup animation mixer for clone
        let mixer = null;
        if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(clone);
            const clip = gltf.animations[0];
            const action = mixer.clipAction(clip);
            action.play();
        }
        parrotMixers.push(mixer);
        
        scene.add(clone);
        parrotClones.push(clone);
    }
    
    modelLoaded = true;
    loadingText.style.display = 'none';
    document.getElementById('startBtn').style.display = 'block';
}, undefined, (error) => {
    console.error('Error loading Parrot.glb:', error);
    loadingText.textContent = 'Error loading model. Check console.';
});

// --- UI Elements ---
const scoreDisplay = document.getElementById('scoreDisplay');
const timerDisplay = document.getElementById('timerDisplay');
const comboDisplay = document.getElementById('comboDisplay');
const whackedDisplay = document.getElementById('whackedDisplay');
const missesDisplay = document.getElementById('missesDisplay');
const startBtn = document.getElementById('startBtn');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const restartBtn = document.getElementById('restartBtn');
const finalScore = document.getElementById('finalScore');
const finalStats = document.getElementById('finalStats');

function updateHUD() {
    scoreDisplay.textContent = `Score: ${score}`;
    timerDisplay.textContent = `Time: ${timeRemaining}s`;
    comboDisplay.textContent = `Combo: ${combo}x`;
    whackedDisplay.textContent = `Whacked: ${whacked}`;
    missesDisplay.textContent = `Misses: ${misses}`;
}

// --- Game Logic ---
let gameTimer = null;
let spawnTimer = null;
let gameStartTime = 0;

function startGame() {
    gameState = 'playing';
    score = 0;
    timeRemaining = 30;
    combo = 0;
    whacked = 0;
    misses = 0;
    totalSpawned = 0;
    spawnInterval = 1000;
    
    startBtn.style.display = 'none';
    gameOverOverlay.classList.remove('show');
    
    // Hide all parrots
    for (let i = 0; i < 9; i++) {
        parrotYPositions[i] = -2;
        parrotVisible[i] = false;
        if (parrotClones[i]) {
            parrotClones[i].position.y = -2;
            parrotClones[i].scale.set(0.015, 0.015, 0.015);
        }
        if (parrotHideTimeouts[i]) {
            clearTimeout(parrotHideTimeouts[i]);
            parrotHideTimeouts[i] = null;
        }
        parrotAnimations[i] = null;
        parrotWhackAnimations[i] = null;
    }
    
    gameStartTime = performance.now();
    
    updateHUD();
    
    // Timer countdown
    gameTimer = setInterval(() => {
        if (gameState !== 'playing') return;
        timeRemaining--;
        if (timeRemaining <= 0) {
            timeRemaining = 0;
            endGame();
        }
        updateHUD();
    }, 1000);
    
    // Start spawning
    scheduleSpawn();
}

function scheduleSpawn() {
    if (gameState !== 'playing') return;
    
    // Difficulty ramp
    const elapsed = (performance.now() - gameStartTime) / 1000;
    if (elapsed >= 20) {
        spawnInterval = 500;
    } else if (elapsed >= 10) {
        spawnInterval = 750;
    } else {
        spawnInterval = 1000;
    }
    
    spawnTimer = setTimeout(() => {
        if (gameState !== 'playing') return;
        spawnParrots();
        scheduleSpawn();
    }, spawnInterval);
}

function spawnParrots() {
    const availableHoles = [];
    for (let i = 0; i < 9; i++) {
        if (!parrotVisible[i]) {
            availableHoles.push(i);
        }
    }
    
    if (availableHoles.length === 0) return;
    
    const count = Math.min(1 + Math.floor(Math.random() * 3), availableHoles.length);
    
    // Shuffle and pick
    for (let j = availableHoles.length - 1; j > 0; j--) {
        const k = Math.floor(Math.random() * (j + 1));
        [availableHoles[j], availableHoles[k]] = [availableHoles[k], availableHoles[j]];
    }
    
    for (let n = 0; n < count; n++) {
        const idx = availableHoles[n];
        popUpParrot(idx);
    }
}

function popUpParrot(idx) {
    if (parrotVisible[idx]) return;
    
    parrotVisible[idx] = true;
    totalSpawned++;
    
    // Animate up
    const startTime = performance.now();
    const startY = -2;
    const endY = 1.0;
    const duration = 300;
    
    parrotAnimations[idx] = { startTime, startY, endY, duration, type: 'up' };
    
    // Auto-hide after 2000ms
    parrotHideTimeouts[idx] = setTimeout(() => {
        if (parrotVisible[idx] && gameState === 'playing') {
            hideParrot(idx);
        }
    }, 2000);
}

function hideParrot(idx) {
    if (!parrotVisible[idx]) return;
    
    parrotVisible[idx] = false;
    
    if (parrotHideTimeouts[idx]) {
        clearTimeout(parrotHideTimeouts[idx]);
        parrotHideTimeouts[idx] = null;
    }
    
    // Animate down
    const startTime = performance.now();
    const startY = parrotYPositions[idx];
    const endY = -2;
    const duration = 200;
    
    parrotAnimations[idx] = { startTime, startY, endY, duration, type: 'down' };
}

function whackParrot(idx) {
    if (!parrotVisible[idx] || gameState !== 'playing') return;
    
    combo++;
    if (combo > 3) combo = 3;
    
    const points = combo * 10;
    score += points;
    whacked++;
    
    // Whack animation (scale up then hide)
    const startTime = performance.now();
    parrotWhackAnimations[idx] = { startTime, duration: 150, phase: 'up' };
    
    // Clear auto-hide
    if (parrotHideTimeouts[idx]) {
        clearTimeout(parrotHideTimeouts[idx]);
        parrotHideTimeouts[idx] = null;
    }
    
    // After whack animation, hide
    setTimeout(() => {
        parrotWhackAnimations[idx] = null;
        if (parrotClones[idx]) {
            parrotClones[idx].scale.set(0.015, 0.015, 0.015);
        }
        hideParrot(idx);
    }, 150);
    
    // Mark as not visible immediately for game logic (prevent double-click)
    parrotVisible[idx] = false;
    // But keep it visually present during whack animation, re-mark
    // Actually, let's set a flag so it can't be clicked again
    // We already set parrotVisible[idx] = false, so it won't be clickable
    
    updateHUD();
}

function handleMiss() {
    if (gameState !== 'playing') return;
    combo = 0;
    score = Math.max(0, score - 2);
    misses++;
    updateHUD();
}

function endGame() {
    gameState = 'gameover';
    
    if (gameTimer) {
        clearInterval(gameTimer);
        gameTimer = null;
    }
    if (spawnTimer) {
        clearTimeout(spawnTimer);
        spawnTimer = null;
    }
    
    // Hide all parrots
    for (let i = 0; i < 9; i++) {
        if (parrotVisible[i]) {
            hideParrot(i);
        }
    }
    
    finalScore.textContent = `Final Score: ${score}`;
    finalStats.textContent = `Whacked: ${whacked} | Misses: ${misses} | Total Spawned: ${totalSpawned}`;
    gameOverOverlay.classList.add('show');
    
    updateHUD();
}

function resetGame() {
    gameState = 'idle';
    score = 0;
    timeRemaining = 30;
    combo = 0;
    whacked = 0;
    misses = 0;
    totalSpawned = 0;
    spawnInterval = 1000;
    
    for (let i = 0; i < 9; i++) {
        parrotYPositions[i] = -2;
        parrotVisible[i] = false;
        if (parrotClones[i]) {
            parrotClones[i].position.y = -2;
            parrotClones[i].scale.set(0.015, 0.015, 0.015);
        }
        if (parrotHideTimeouts[i]) {
            clearTimeout(parrotHideTimeouts[i]);
            parrotHideTimeouts[i] = null;
        }
        parrotAnimations[i] = null;
        parrotWhackAnimations[i] = null;
    }
    
    gameOverOverlay.classList.remove('show');
    updateHUD();
    
    startGame();
}

// --- Event Listeners ---
startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', resetGame);

// Mouse move for mallet
window.addEventListener('mousemove', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersectPoint = new THREE.Vector3();
    raycaster.ray.intersectPlane(groundPlane, intersectPoint);
    
    if (intersectPoint) {
        malletGroup.position.x = intersectPoint.x;
        malletGroup.position.z = intersectPoint.z;
    }
});

// Click handler
window.addEventListener('click', (event) => {
    if (gameState !== 'playing') return;
    
    // Animate mallet down
    if (!malletAnimating) {
        malletAnimating = true;
        const startTime = performance.now();
        const animateMallet = () => {
            const elapsed = performance.now() - startTime;
            const duration = 200;
            const t = Math.min(elapsed / duration, 1);
            
            if (t < 0.5) {
                // Going down
                malletY = 3 - (2.5 * (t * 2));
            } else {
                // Going up
                malletY = 0.5 + (2.5 * ((t - 0.5) * 2));
            }
            
            malletGroup.position.y = malletY;
            
            if (t < 1) {
                requestAnimationFrame(animateMallet);
            } else {
                malletY = 3;
                malletGroup.position.y = 3;
                malletAnimating = false;
            }
        };
        requestAnimationFrame(animateMallet);
    }
    
    // Raycast for parrot hit
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    
    // Check parrot hits
    let hitParrot = false;
    for (let i = 0; i < 9; i++) {
        if (parrotVisible[i] && parrotClones[i]) {
            const intersects = raycaster.intersectObject(parrotClones[i], true);
            if (intersects.length > 0) {
                whackParrot(i);
                hitParrot = true;
                break;
            }
        }
    }
    
    if (!hitParrot) {
        // Check if clicked on ground/hole area
        const intersectPoint = new THREE.Vector3();
        raycaster.ray.intersectPlane(groundPlane, intersectPoint);
        if (intersectPoint) {
            handleMiss();
        }
    }
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const now = performance.now();
    const delta = clock.getDelta();
    
    // Update parrot animations
    for (let i = 0; i < 9; i++) {
        if (!parrotClones[i]) continue;
        
        // Position animation
        const anim = parrotAnimations[i];
        if (anim) {
            const elapsed = now - anim.startTime;
            const t = Math.min(elapsed / anim.duration, 1);
            
            // Ease out
            const eased = 1 - Math.pow(1 - t, 2);
            parrotYPositions[i] = anim.startY + (anim.endY - anim.startY) * eased;
            parrotClones[i].position.y = parrotYPositions[i];
            
            if (t >= 1) {
                parrotYPositions[i] = anim.endY;
                parrotClones[i].position.y = anim.endY;
                parrotAnimations[i] = null;
            }
        }
        
        // Whack scale animation
        const whackAnim = parrotWhackAnimations[i];
        if (whackAnim) {
            const elapsed = now - whackAnim.startTime;
            const t = Math.min(elapsed / whackAnim.duration, 1);
            
            if (t < 0.5) {
                const s = 0.015 + (0.025 - 0.015) * (t * 2);
                parrotClones[i].scale.set(s, s, s);
            } else {
                const s = 0.025 - (0.025 - 0.015) * ((t - 0.5) * 2);
                parrotClones[i].scale.set(s, s, s);
            }
        }
        
        // Rotate visible parrots
        if (parrotYPositions[i] > 0) {
            parrotClones[i].rotation.y += 1.0 * delta;
        }
    }
    
    // Update animation mixers
    for (let i = 0; i < parrotMixers.length; i++) {
        if (parrotMixers[i]) {
            parrotMixers[i].update(delta);
        }
    }
    
    // Update state
    const visibleParrots = [];
    for (let i = 0; i < 9; i++) {
        if (parrotYPositions[i] > 0) {
            visibleParrots.push(i);
        }
    }
    
    window.__3D_STATE__ = {
        gameState,
        score,
        timeRemaining,
        combo,
        whacked,
        misses,
        totalSpawned,
        visibleParrots,
        malletY: malletGroup.position.y,
        parrotPositions: [...parrotYPositions],
        spawnInterval,
        modelLoaded,
        holeCount: 9
    };
    
    renderer.render(scene, camera);
}

animate();
updateHUD();
</script>
</body>
</html>
