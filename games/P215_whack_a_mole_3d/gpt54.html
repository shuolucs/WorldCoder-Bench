<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Whack-a-Mole - Parrot Edition</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      font-size: 20px;
      pointer-events: none;
    }

    .hud-item, #controls {
      background: rgba(0,0,0,0.25);
      padding: 8px 12px;
      border-radius: 8px;
      pointer-events: auto;
    }

    #controls button, #gameOverOverlay button {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #ffcc00;
      color: #222;
      font-weight: bold;
    }

    #controls button:hover, #gameOverOverlay button:hover {
      background: #ffd633;
    }

    #gameOverOverlay {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      align-items: center;
      justify-content: center;
    }

    #gameOverOverlay .panel {
      background: white;
      color: #222;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      min-width: 280px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #gameOverOverlay h1 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    #gameOverText {
      margin-bottom: 20px;
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="controls">
      <button id="startBtn">Start Game</button>
    </div>
    <div id="scoreDisplay" class="hud-item">Score: 0</div>
    <div id="timerDisplay" class="hud-item">Time: 30s</div>
    <div id="comboDisplay" class="hud-item">Combo: 0x</div>
    <div id="whackedDisplay" class="hud-item">Whacked: 0</div>
    <div id="missesDisplay" class="hud-item">Misses: 0</div>
  </div>

  <div id="gameOverOverlay">
    <div class="panel">
      <h1>Game Over</h1>
      <div id="gameOverText">Final Score: 0</div>
      <button id="restartBtn">Restart</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 12, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x87CEEB);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const groundGeometry = new THREE.PlaneGeometry(20, 20);
    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x3fa34d });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    ground.name = "ground";
    scene.add(ground);

    const holes = [];
    const holePositions = [];
    const holeGeometry = new THREE.CylinderGeometry(0.8, 0.8, 0.3, 32);
    const holeMaterial = new THREE.MeshStandardMaterial({ color: 0x4b2e1f });

    for (let i = 0; i < 9; i++) {
      const row = Math.floor(i / 3);
      const col = i % 3;
      const x = (col - 1) * 3;
      const z = (row - 1) * 3;

      const hole = new THREE.Mesh(holeGeometry, holeMaterial);
      hole.position.set(x, -0.15, z);
      hole.name = `hole_${i}`;
      scene.add(hole);
      holes.push(hole);
      holePositions.push(new THREE.Vector3(x, 0, z));
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const loader = new GLTFLoader();

    let parrotTemplate = null;
    const parrots = [];

    const hiddenY = -2;
    const visibleY = 1.0;
    const baseScaleValue = 0.015;
    const hitScaleValue = 0.025;

    const groundPlaneForCursor = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const cursorIntersection = new THREE.Vector3();

    const mallet = new THREE.Group();
    const handleGeo = new THREE.CylinderGeometry(0.08, 0.08, 2.0, 16);
    const handleMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
    const handle = new THREE.Mesh(handleGeo, handleMat);
    handle.rotation.z = Math.PI / 6;
    handle.position.set(0, 0.8, 0);

    const headGeo = new THREE.BoxGeometry(0.8, 0.35, 0.35);
    const headMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.rotation.z = Math.PI / 6;
    head.position.set(0.45, 1.5, 0);

    mallet.add(handle);
    mallet.add(head);
    mallet.position.set(0, 3, 0);
    scene.add(mallet);

    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const gameOverOverlay = document.getElementById("gameOverOverlay");
    const gameOverText = document.getElementById("gameOverText");

    const scoreDisplay = document.getElementById("scoreDisplay");
    const timerDisplay = document.getElementById("timerDisplay");
    const comboDisplay = document.getElementById("comboDisplay");
    const whackedDisplay = document.getElementById("whackedDisplay");
    const missesDisplay = document.getElementById("missesDisplay");

    const game = {
      state: "idle",
      score: 0,
      timeRemaining: 30,
      combo: 0,
      whacked: 0,
      misses: 0,
      totalSpawned: 0,
      spawnInterval: 1000,
      gameDuration: 30,
      gameStartTime: 0,
      lastSpawnTime: 0
    };

    window.__3D_STATE__ = {
      gameState: "idle",
      score: 0,
      timeRemaining: 30,
      combo: 0,
      whacked: 0,
      misses: 0,
      totalSpawned: 0,
      visibleParrots: [],
      malletY: 3,
      parrotPositions: Array(9).fill(hiddenY),
      spawnInterval: 1000,
      modelLoaded: false,
      holeCount: 9
    };

    function createParrotState(index, model) {
      const clone = model.clone(true);
      clone.position.set(holePositions[index].x, hiddenY, holePositions[index].z);
      clone.scale.setScalar(baseScaleValue);
      clone.rotation.set(0, 0, 0);

      clone.traverse((child) => {
        child.userData.parrotIndex = index;
      });

      scene.add(clone);

      return {
        index,
        object: clone,
        currentY: hiddenY,
        visible: false,
        logicalVisible: false,
        state: "hidden",
        animStartTime: 0,
        animDuration: 0,
        fromY: hiddenY,
        toY: hiddenY,
        hideAt: null,
        scaleAnim: null
      };
    }

    loader.load(
      "Parrot.glb",
      (gltf) => {
        parrotTemplate = gltf.scene;
        for (let i = 0; i < 9; i++) {
          parrots.push(createParrotState(i, parrotTemplate));
        }
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (error) => {
        console.error("Failed to load Parrot.glb:", error);
      }
    );

    function clampNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${game.score}`;
      timerDisplay.textContent = `Time: ${game.timeRemaining}s`;
      comboDisplay.textContent = `Combo: ${game.combo}x`;
      whackedDisplay.textContent = `Whacked: ${game.whacked}`;
      missesDisplay.textContent = `Misses: ${game.misses}`;
    }

    function resetParrot(parrot) {
      parrot.currentY = hiddenY;
      parrot.object.position.y = hiddenY;
      parrot.visible = false;
      parrot.logicalVisible = false;
      parrot.state = "hidden";
      parrot.animStartTime = 0;
      parrot.animDuration = 0;
      parrot.fromY = hiddenY;
      parrot.toY = hiddenY;
      parrot.hideAt = null;
      parrot.scaleAnim = null;
      parrot.object.scale.setScalar(baseScaleValue);
    }

    function resetGame() {
      game.state = "idle";
      game.score = 0;
      game.timeRemaining = 30;
      game.combo = 0;
      game.whacked = 0;
      game.misses = 0;
      game.totalSpawned = 0;
      game.spawnInterval = 1000;
      game.gameStartTime = 0;
      game.lastSpawnTime = 0;

      for (const parrot of parrots) {
        resetParrot(parrot);
      }

      gameOverOverlay.style.display = "none";
      updateHUD();
    }

    function startGame() {
      if (!window.__3D_STATE__.modelLoaded) return;

      game.state = "playing";
      game.score = 0;
      game.timeRemaining = 30;
      game.combo = 0;
      game.whacked = 0;
      game.misses = 0;
      game.totalSpawned = 0;
      game.spawnInterval = 1000;
      game.gameStartTime = performance.now();
      game.lastSpawnTime = performance.now();

      for (const parrot of parrots) {
        resetParrot(parrot);
      }

      gameOverOverlay.style.display = "none";
      updateHUD();
    }

    function endGame() {
      game.state = "gameover";
      game.timeRemaining = 0;

      for (const parrot of parrots) {
        hideParrot(parrot, performance.now(), true);
      }

      gameOverText.textContent = `Final Score: ${game.score}`;
      gameOverOverlay.style.display = "flex";
      updateHUD();
    }

    function popUpParrot(parrot, now) {
      if (!parrot || parrot.logicalVisible) return;
      parrot.logicalVisible = true;
      parrot.visible = true;
      parrot.state = "popping";
      parrot.animStartTime = now;
      parrot.animDuration = 300;
      parrot.fromY = clampNumber(parrot.object.position.y, hiddenY);
      parrot.toY = visibleY;
      parrot.hideAt = now + 2000;
      game.totalSpawned++;
    }

    function hideParrot(parrot, now, immediate = false) {
      if (!parrot) return;

      if (immediate) {
        resetParrot(parrot);
        return;
      }

      parrot.logicalVisible = false;
      parrot.state = "hiding";
      parrot.animStartTime = now;
      parrot.animDuration = 200;
      parrot.fromY = clampNumber(parrot.object.position.y, hiddenY);
      parrot.toY = hiddenY;
      parrot.hideAt = null;
    }

    function trySpawnParrots(now) {
      if (game.state !== "playing") return;
      if (parrots.length !== 9) return;

      const elapsedSec = (now - game.gameStartTime) / 1000;
      if (elapsedSec >= 20) game.spawnInterval = 500;
      else if (elapsedSec >= 10) game.spawnInterval = 750;
      else game.spawnInterval = 1000;

      if (now - game.lastSpawnTime < game.spawnInterval) return;

      game.lastSpawnTime = now;

      const available = parrots.filter(p => !p.logicalVisible);
      if (available.length === 0) return;

      const spawnCount = Math.min(
        available.length,
        1 + Math.floor(Math.random() * 3)
      );

      for (let i = available.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [available[i], available[j]] = [available[j], available[i]];
      }

      for (let i = 0; i < spawnCount; i++) {
        popUpParrot(available[i], now);
      }
    }

    function animateParrots(now, deltaSec) {
      for (const parrot of parrots) {
        if (!parrot || !parrot.object) continue;

        if (parrot.state === "popping" || parrot.state === "hiding") {
          const duration = Math.max(1, clampNumber(parrot.animDuration, 1));
          const t = THREE.MathUtils.clamp((now - parrot.animStartTime) / duration, 0, 1);
          const y = THREE.MathUtils.lerp(
            clampNumber(parrot.fromY, hiddenY),
            clampNumber(parrot.toY, hiddenY),
            t
          );
          parrot.currentY = clampNumber(y, hiddenY);
          parrot.object.position.y = parrot.currentY;

          if (t >= 1) {
            if (parrot.state === "popping") {
              parrot.state = "visible";
              parrot.visible = true;
              parrot.currentY = visibleY;
              parrot.object.position.y = visibleY;
            } else if (parrot.state === "hiding") {
              resetParrot(parrot);
            }
          }
        }

        if (parrot.state === "visible") {
          parrot.object.rotation.y += 1.0 * deltaSec;

          if (game.state === "playing" && parrot.hideAt !== null && now >= parrot.hideAt) {
            hideParrot(parrot, now, false);
          }
        }

        if (parrot.scaleAnim) {
          const sa = parrot.scaleAnim;
          const t = THREE.MathUtils.clamp((now - sa.startTime) / sa.duration, 0, 1);
          let scale;
          if (t < 0.5) {
            scale = THREE.MathUtils.lerp(sa.from, sa.peak, t * 2);
          } else {
            scale = THREE.MathUtils.lerp(sa.peak, sa.to, (t - 0.5) * 2);
          }
          scale = clampNumber(scale, baseScaleValue);
          parrot.object.scale.setScalar(scale);

          if (t >= 1) {
            parrot.object.scale.setScalar(baseScaleValue);
            parrot.scaleAnim = null;
          }
        }

        if (!Number.isFinite(parrot.object.position.y)) {
          parrot.object.position.y = hiddenY;
          parrot.currentY = hiddenY;
        }
      }
    }

    function updateTimer(now) {
      if (game.state !== "playing") return;
      const elapsed = (now - game.gameStartTime) / 1000;
      const remaining = Math.max(0, Math.ceil(game.gameDuration - elapsed));
      game.timeRemaining = remaining;

      if (elapsed >= game.gameDuration) {
        endGame();
      }
    }

    function getHitPointsFromCombo() {
      if (game.combo <= 0) return 10;
      if (game.combo === 1) return 20;
      return 30;
    }

    function screenToMouse(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function updateMalletPositionFromMouse() {
      raycaster.setFromCamera(mouse, camera);
      if (raycaster.ray.intersectPlane(groundPlaneForCursor, cursorIntersection)) {
        mallet.position.x = clampNumber(cursorIntersection.x, 0);
        mallet.position.z = clampNumber(cursorIntersection.z, 0);
      }
    }

    let malletAnim = null;

    function swingMallet(now) {
      malletAnim = {
        startTime: now,
        duration: 200,
        upY: 3,
        downY: 0.5
      };
    }

    function updateMallet(now) {
      if (!malletAnim) {
        mallet.position.y = clampNumber(mallet.position.y, 3);
        return;
      }

      const t = THREE.MathUtils.clamp((now - malletAnim.startTime) / malletAnim.duration, 0, 1);
      let y;
      if (t < 0.5) {
        y = THREE.MathUtils.lerp(malletAnim.upY, malletAnim.downY, t * 2);
      } else {
        y = THREE.MathUtils.lerp(malletAnim.downY, malletAnim.upY, (t - 0.5) * 2);
      }
      mallet.position.y = clampNumber(y, 3);

      if (t >= 1) {
        mallet.position.y = 3;
        malletAnim = null;
      }
    }

    function handleClick(event) {
      screenToMouse(event);
      updateMalletPositionFromMouse();
      const now = performance.now();
      swingMallet(now);

      raycaster.setFromCamera(mouse, camera);

      const parrotObjects = [];
      for (const p of parrots) {
        if (p && p.logicalVisible && p.object) {
          parrotObjects.push(p.object);
        }
      }

      const parrotHits = raycaster.intersectObjects(parrotObjects, true);

      if (game.state === "playing" && parrotHits.length > 0) {
        let parrotIndex = null;
        let obj = parrotHits[0].object;
        while (obj) {
          if (obj.userData && obj.userData.parrotIndex !== undefined) {
            parrotIndex = obj.userData.parrotIndex;
            break;
          }
          obj = obj.parent;
        }

        if (parrotIndex !== null && parrots[parrotIndex] && parrots[parrotIndex].logicalVisible) {
          const parrot = parrots[parrotIndex];
          game.combo = Math.min(game.combo + 1, 3);
          const points = getHitPointsFromCombo();
          game.score += points;
          game.whacked += 1;

          parrot.scaleAnim = {
            startTime: now,
            duration: 150,
            from: baseScaleValue,
            peak: hitScaleValue,
            to: baseScaleValue
          };

          hideParrot(parrot, now, false);
          updateHUD();
          return;
        }
      }

      raycaster.setFromCamera(mouse, camera);
      const missHits = raycaster.intersectObjects([ground, ...holes], false);

      if (game.state === "playing" && missHits.length > 0) {
        game.score = Math.max(0, game.score - 2);
        game.misses += 1;
        game.combo = 0;
        updateHUD();
      }
    }

    window.addEventListener("mousemove", (event) => {
      screenToMouse(event);
      updateMalletPositionFromMouse();
    });

    window.addEventListener("click", handleClick);

    startBtn.addEventListener("click", () => {
      startGame();
    });

    restartBtn.addEventListener("click", () => {
      resetGame();
      startGame();
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateExposedState() {
      const visibleParrots = [];
      const parrotPositions = [];

      for (let i = 0; i < 9; i++) {
        const p = parrots[i];
        const y = p && p.object ? clampNumber(p.object.position.y, hiddenY) : hiddenY;
        parrotPositions.push(y);
        if (y > 0) visibleParrots.push(i);
      }

      window.__3D_STATE__.gameState = game.state;
      window.__3D_STATE__.score = game.score;
      window.__3D_STATE__.timeRemaining = game.timeRemaining;
      window.__3D_STATE__.combo = game.combo;
      window.__3D_STATE__.whacked = game.whacked;
      window.__3D_STATE__.misses = game.misses;
      window.__3D_STATE__.totalSpawned = game.totalSpawned;
      window.__3D_STATE__.visibleParrots = visibleParrots;
      window.__3D_STATE__.malletY = clampNumber(mallet.position.y, 3);
      window.__3D_STATE__.parrotPositions = parrotPositions;
      window.__3D_STATE__.spawnInterval = game.spawnInterval;
      window.__3D_STATE__.modelLoaded = !!parrotTemplate && parrots.length === 9;
      window.__3D_STATE__.holeCount = 9;
    }

    updateHUD();

    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);

      const deltaSec = Math.max(0, Math.min(0.1, (now - lastTime) / 1000));
      lastTime = now;

      updateTimer(now);
      trySpawnParrots(now);
      animateParrots(now, deltaSec);
      updateMallet(now);
      updateExposedState();

      renderer.render(scene, camera);
    }

    resetGame();
    animate(performance.now());
  </script>
</body>
</html>
