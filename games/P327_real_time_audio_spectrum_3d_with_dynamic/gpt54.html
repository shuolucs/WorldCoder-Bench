<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Audio Spectrum Visualizer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.5;
      font-size: 14px;
      z-index: 10;
      min-width: 220px;
    }

    #controls {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    button {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(4px);
    }

    button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Difficulty: <span id="difficultyDisplay">1</span></div>
    <div>Elapsed Time: <span id="timeDisplay">0</span>s</div>
    <div>Active Particles: <span id="particleDisplay">100</span></div>
    <div>Average Bar Height: <span id="avgHeightDisplay">0.00</span></div>
    <div>FPS: <span id="fpsDisplay">0</span></div>
  </div>

  <div id="controls">
    <button id="variantBtn">Next Variant</button>
    <button id="pauseBtn">Toggle Pause</button>
  </div>

  <div id="help">
    Keys: 1-5 set difficulty, R resets difficulty/timer, Space pauses
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { GLTFExporter } from 'https://unpkg.com/three@0.160.0/examples/jsm/exporters/GLTFExporter.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    const difficultyDisplay = document.getElementById('difficultyDisplay');
    const timeDisplay = document.getElementById('timeDisplay');
    const particleDisplay = document.getElementById('particleDisplay');
    const avgHeightDisplay = document.getElementById('avgHeightDisplay');
    const fpsDisplay = document.getElementById('fpsDisplay');
    const variantBtn = document.getElementById('variantBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    let shoeGroup = new THREE.Group();
    scene.add(shoeGroup);

    let shoeLoaded = false;
    let difficultyLevel = 1;
    let isPaused = false;
    let elapsedTime = 0;
    let currentVariantIndex = 0;
    let variantMaterials = [];
    let originalMaterials = [];
    let autoDifficultyAccumulator = 0;

    const BAR_COUNT = 64;
    const bars = [];
    const barHeights = new Array(BAR_COUNT).fill(1);
    const barRadius = 4;

    const barGeometry = new THREE.BoxGeometry(0.15, 1, 0.15);

    for (let i = 0; i < BAR_COUNT; i++) {
      const angle = (i / BAR_COUNT) * Math.PI * 2;
      const color = new THREE.Color().setHSL(i / BAR_COUNT, 0.8, 0.5);
      const material = new THREE.MeshStandardMaterial({ color });
      const bar = new THREE.Mesh(barGeometry, material);

      bar.position.x = Math.cos(angle) * barRadius;
      bar.position.z = Math.sin(angle) * barRadius;
      bar.position.y = 0.5;
      bar.scale.y = 1;
      scene.add(bar);
      bars.push(bar);
    }

    const MAX_PARTICLES = 500;
    const particlePositions = new Float32Array(MAX_PARTICLES * 3);
    for (let i = 0; i < MAX_PARTICLES; i++) {
      particlePositions[i * 3 + 0] = 0;
      particlePositions[i * 3 + 1] = -100;
      particlePositions[i * 3 + 2] = 0;
    }

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

    const particleMaterial = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.05,
      transparent: true,
      opacity: 0.7,
      depthWrite: false
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    function getHeightMultiplier(level) {
      return level;
    }

    function getRotationSpeed(level) {
      return 0.5 * level;
    }

    function getActiveParticleCount(level) {
      return level * 100;
    }

    function setDifficulty(level, resetTimer = false) {
      difficultyLevel = Math.max(1, Math.min(5, level));
      if (resetTimer) {
        elapsedTime = 0;
        autoDifficultyAccumulator = 0;
      }
      updateHUD(0, 0);
    }

    function cloneMaterial(mat, hueShift = 0) {
      if (!mat || !mat.clone) return mat;
      const cloned = mat.clone();
      if (cloned.color) {
        const hsl = { h: 0, s: 0, l: 0 };
        cloned.color.getHSL(hsl);
        cloned.color.setHSL((hsl.h + hueShift) % 1, hsl.s, Math.min(0.85, hsl.l));
      }
      if (cloned.emissive) {
        const ehsl = { h: 0, s: 0, l: 0 };
        cloned.emissive.getHSL(ehsl);
        cloned.emissive.setHSL((ehsl.h + hueShift) % 1, ehsl.s, ehsl.l);
      }
      return cloned;
    }

    function gatherMeshMaterials(root) {
      const meshes = [];
      root.traverse(obj => {
        if (obj.isMesh) meshes.push(obj);
      });
      return meshes;
    }

    function buildVariantMaterials(root) {
      const meshes = gatherMeshMaterials(root);
      originalMaterials = meshes.map(mesh => mesh.material);

      const variants = [];
      if (meshes.length > 0) {
        const shifts = [0, 0.18, 0.38, 0.62];
        for (let v = 0; v < shifts.length; v++) {
          const mats = meshes.map(mesh => {
            if (Array.isArray(mesh.material)) {
              return mesh.material.map(m => cloneMaterial(m, shifts[v]));
            }
            return cloneMaterial(mesh.material, shifts[v]);
          });
          variants.push(mats);
        }
      }
      return variants;
    }

    function applyVariant(index) {
      const meshes = gatherMeshMaterials(shoeGroup);
      if (variantMaterials.length === 0 || meshes.length === 0) {
        currentVariantIndex = 0;
        return;
      }
      currentVariantIndex = ((index % variantMaterials.length) + variantMaterials.length) % variantMaterials.length;
      meshes.forEach((mesh, idx) => {
        mesh.material = variantMaterials[currentVariantIndex][idx];
      });
    }

    const loader = new GLTFLoader();
    loader.load(
      'MaterialsVariantsShoe.glb',
      (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 2 / maxDim;
        model.scale.setScalar(scale);

        model.position.sub(center.multiplyScalar(scale));

        shoeGroup.add(model);

        variantMaterials = buildVariantMaterials(shoeGroup);
        applyVariant(0);

        shoeLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load MaterialsVariantsShoe.glb:', err);

        const fallback = new THREE.Mesh(
          new THREE.TorusKnotGeometry(0.7, 0.22, 128, 16),
          new THREE.MeshStandardMaterial({ color: 0x88aaff, metalness: 0.3, roughness: 0.5 })
        );
        shoeGroup.add(fallback);

        variantMaterials = buildVariantMaterials(shoeGroup);
        applyVariant(0);

        shoeLoaded = true;
      }
    );

    variantBtn.addEventListener('click', () => {
      if (variantMaterials.length > 0) {
        applyVariant(currentVariantIndex + 1);
      } else {
        currentVariantIndex = 0;
      }
    });

    function togglePause() {
      isPaused = !isPaused;
    }

    pauseBtn.addEventListener('click', togglePause);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        togglePause();
      }
      if (e.key >= '1' && e.key <= '5') {
        setDifficulty(parseInt(e.key, 10));
      }
      if (e.key === 'r' || e.key === 'R') {
        setDifficulty(1, true);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.__3D_STATE__ = {
      shoeLoaded: false,
      shoeRotationY: 0,
      difficultyLevel: 1,
      elapsedTime: 0,
      barCount: BAR_COUNT,
      avgBarHeight: 0,
      maxBarHeight: 0,
      activeParticles: 100,
      isPaused: false,
      variantIndex: 0,
      cameraDistance: camera.position.length(),
      heightMultiplier: 1,
      fpsValue: 0,
      barHeights: [...barHeights]
    };

    let lastTime = performance.now();
    let fpsAccum = 0;
    let fpsFrames = 0;
    let fpsValue = 0;

    function updateHUD(avgHeight, activeParticles) {
      difficultyDisplay.textContent = String(difficultyLevel);
      timeDisplay.textContent = String(Math.floor(elapsedTime));
      particleDisplay.textContent = String(activeParticles);
      avgHeightDisplay.textContent = avgHeight.toFixed(2);
      fpsDisplay.textContent = String(Math.round(fpsValue));
    }

    function animate(now) {
      requestAnimationFrame(animate);

      const rawDelta = Math.min((now - lastTime) / 1000, 0.1);
      lastTime = now;

      fpsAccum += rawDelta;
      fpsFrames += 1;
      if (fpsAccum >= 0.5) {
        fpsValue = fpsFrames / fpsAccum;
        fpsAccum = 0;
        fpsFrames = 0;
      }

      controls.update();

      const dt = isPaused ? 0 : rawDelta;

      if (!isPaused) {
        elapsedTime += dt;
        autoDifficultyAccumulator += dt;
        while (autoDifficultyAccumulator >= 10) {
          autoDifficultyAccumulator -= 10;
          if (difficultyLevel < 5) difficultyLevel += 1;
        }
      }

      const heightMultiplier = getHeightMultiplier(difficultyLevel);
      const rotationSpeed = getRotationSpeed(difficultyLevel);
      const activeParticles = getActiveParticleCount(difficultyLevel);

      if (!isPaused) {
        shoeGroup.rotation.y += dt * rotationSpeed;
      }

      let sumHeight = 0;
      let maxHeight = 0;

      const t = elapsedTime;

      for (let i = 0; i < BAR_COUNT; i++) {
        const h = 0.2 + Math.abs(Math.sin(t * (1 + i * 0.1) + i * 0.3)) * heightMultiplier;
        bars[i].scale.y = h;
        bars[i].position.y = h / 2;
        barHeights[i] = h;
        sumHeight += h;
        if (h > maxHeight) maxHeight = h;
      }

      const avgHeight = sumHeight / BAR_COUNT;

      const pos = particleGeometry.attributes.position.array;
      for (let i = 0; i < MAX_PARTICLES; i++) {
        const idx = i * 3;
        if (i < activeParticles) {
          const p = i / activeParticles;
          const angle = t * (0.7 + difficultyLevel * 0.15) + p * Math.PI * 8;
          const radius = 3.5 + Math.sin(t * 1.5 + p * Math.PI * 6) * 1.5;
          const y = 1 + Math.sin(t * 1.2 + p * Math.PI * 10) * 3.0;
          pos[idx + 0] = Math.cos(angle) * radius;
          pos[idx + 1] = y;
          pos[idx + 2] = Math.sin(angle) * radius;
        } else {
          pos[idx + 0] = 0;
          pos[idx + 1] = -100;
          pos[idx + 2] = 0;
        }
      }
      particleGeometry.attributes.position.needsUpdate = true;

      updateHUD(avgHeight, activeParticles);

      window.__3D_STATE__.shoeLoaded = shoeLoaded;
      window.__3D_STATE__.shoeRotationY = shoeGroup.rotation.y;
      window.__3D_STATE__.difficultyLevel = difficultyLevel;
      window.__3D_STATE__.elapsedTime = elapsedTime;
      window.__3D_STATE__.barCount = BAR_COUNT;
      window.__3D_STATE__.avgBarHeight = avgHeight;
      window.__3D_STATE__.maxBarHeight = maxHeight;
      window.__3D_STATE__.activeParticles = activeParticles;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.variantIndex = currentVariantIndex;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.heightMultiplier = heightMultiplier;
      window.__3D_STATE__.fpsValue = fpsValue;
      window.__3D_STATE__.barHeights = [...barHeights];

      renderer.render(scene, camera);
    }

    updateHUD(0, 100);
    animate(performance.now());
  </script>
</body>
</html>
