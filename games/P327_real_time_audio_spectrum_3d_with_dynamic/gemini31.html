<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Audio Spectrum Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: monospace;
            color: white;
        }
        canvas {
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
        }
        #ui-container div {
            margin-bottom: 5px;
        }
        #controls-container {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            transition: background 0.2s;
            pointer-events: auto;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 12px;
            color: #aaa;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <div id="difficultyDisplay">Difficulty: 1</div>
        <div id="timeDisplay">Time: 0s</div>
        <div id="particleDisplay">Particles: 100</div>
        <div id="avgHeightDisplay">Avg Height: 0.00</div>
        <div id="fpsDisplay">FPS: 0</div>
    </div>

    <div id="controls-container">
        <button id="variantBtn">Next Variant</button>
        <button id="pauseBtn">Toggle Pause</button>
    </div>

    <div id="instructions">
        Controls: Orbit Mouse | Keys 1-5: Set Difficulty | R: Reset | Space: Pause
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Initialization
        window.__3D_STATE__ = {
            shoeLoaded: false,
            shoeRotationY: 0,
            difficultyLevel: 1,
            elapsedTime: 0,
            barCount: 64,
            avgBarHeight: 0,
            maxBarHeight: 0,
            activeParticles: 100,
            isPaused: false,
            variantIndex: 0,
            cameraDistance: 8,
            heightMultiplier: 1,
            fpsValue: 0,
            barHeights: new Array(64).fill(0)
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // Variables
        let shoeModelWrapper = new THREE.Group();
        scene.add(shoeModelWrapper);
        let shoeMesh = null;
        let availableVariants = [];
        
        let time = 0;
        let elapsedTime = 0;
        let lastDifficultyIncreaseTime = 0;
        let difficulty = 1;
        let isPaused = false;
        let currentVariantIndex = 0;

        // Load Shoe Model
        const loader = new GLTFLoader();
        const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/MaterialsVariantsShoe/glTF-Binary/MaterialsVariantsShoe.glb';
        
        loader.load(modelUrl, (gltf) => {
            shoeMesh = gltf.scene;
            
            // Center and scale
            const box = new THREE.Box3().setFromObject(shoeMesh);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2 / maxDim;
            
            shoeMesh.scale.setScalar(scale);
            shoeMesh.position.sub(center.multiplyScalar(scale));
            
            shoeModelWrapper.add(shoeMesh);
            window.__3D_STATE__.shoeLoaded = true;

            // Extract Variants
            if (gltf.userData.variants) {
                availableVariants = gltf.userData.variants;
            }
        });

        // Spectrum Bars
        const bars = [];
        const barGroup = new THREE.Group();
        const numBars = 64;
        const radius = 4;

        for (let i = 0; i < numBars; i++) {
            const geometry = new THREE.BoxGeometry(0.15, 1, 0.15);
            const material = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(i / numBars, 0.8, 0.5)
            });
            const bar = new THREE.Mesh(geometry, material);
            
            const angle = (i / numBars) * Math.PI * 2;
            bar.position.x = Math.cos(angle) * radius;
            bar.position.z = Math.sin(angle) * radius;
            bar.position.y = 0.5; // Base at y=0
            
            bars.push(bar);
            barGroup.add(bar);
        }
        scene.add(barGroup);

        // Particle System
        const maxParticles = 500;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(maxParticles * 3);
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        
        const particleMat = new THREE.PointsMaterial({
            size: 0.05,
            color: 0xffffff,
            transparent: true,
            opacity: 0.7
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // Input Handling
        window.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '5') {
                difficulty = parseInt(e.key);
                lastDifficultyIncreaseTime = elapsedTime;
            }
            if (e.key.toLowerCase() === 'r') {
                difficulty = 1;
                elapsedTime = 0;
                time = 0;
                lastDifficultyIncreaseTime = 0;
            }
            if (e.key === ' ') {
                isPaused = !isPaused;
            }
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPaused = !isPaused;
        });

        document.getElementById('variantBtn').addEventListener('click', () => {
            if (availableVariants.length > 0) {
                currentVariantIndex = (currentVariantIndex + 1) % availableVariants.length;
                const variantName = availableVariants[currentVariantIndex];
                
                if (shoeMesh) {
                    shoeMesh.traverse((child) => {
                        if (child.isMesh && child.userData.variantMaterials) {
                            const newMat = child.userData.variantMaterials.get(variantName);
                            if (newMat) child.material = newMat;
                        }
                    });
                }
            } else {
                currentVariantIndex++;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        let lastTime = performance.now();
        let frames = 0;
        let lastFpsTime = lastTime;
        let fps = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            const now = performance.now();
            const rawDelta = (now - lastTime) / 1000;
            lastTime = now;

            // FPS Calculation
            frames++;
            if (now - lastFpsTime >= 1000) {
                fps = frames;
                frames = 0;
                lastFpsTime = now;
            }

            const delta = isPaused ? 0 : rawDelta;
            time += delta;
            elapsedTime += delta;

            // Dynamic Difficulty
            if (!isPaused && elapsedTime - lastDifficultyIncreaseTime >= 10) {
                if (difficulty < 5) {
                    difficulty++;
                    lastDifficultyIncreaseTime = elapsedTime;
                }
            }

            const heightMultiplier = difficulty;
            const shoeRotationSpeed = 0.5 + (difficulty - 1) * 0.5;
            const activeParticles = difficulty * 100;

            // Animations
            if (!isPaused) {
                shoeModelWrapper.rotation.y += shoeRotationSpeed * delta;
            }

            let sumHeight = 0;
            let maxHeight = 0;
            const currentBarHeights = [];

            for (let i = 0; i < numBars; i++) {
                const bar = bars[i];
                if (!isPaused) {
                    const scaleY = 0.2 + Math.abs(Math.sin(time * (1 + i * 0.1) + i * 0.3)) * heightMultiplier;
                    bar.scale.y = scaleY;
                    bar.position.y = scaleY / 2;
                }
                sumHeight += bar.scale.y;
                maxHeight = Math.max(maxHeight, bar.scale.y);
                currentBarHeights.push(bar.scale.y);
            }
            
            const avgHeight = sumHeight / numBars;

            if (!isPaused) {
                const positions = particles.geometry.attributes.position.array;
                for (let i = 0; i < maxParticles; i++) {
                    if (i < activeParticles) {
                        const t = time * 0.5 + i * 0.1;
                        const r = 3.5 + Math.sin(t * 2.1) * 1.5;
                        const yPos = 1 + Math.sin(t * 1.5) * 3;
                        
                        positions[i * 3] = Math.cos(t) * r;
                        positions[i * 3 + 1] = yPos;
                        positions[i * 3 + 2] = Math.sin(t) * r;
                    } else {
                        positions[i * 3] = 0;
                        positions[i * 3 + 1] = -100;
                        positions[i * 3 + 2] = 0;
                    }
                }
                particles.geometry.attributes.position.needsUpdate = true;
            }

            // Update UI
            document.getElementById('difficultyDisplay').innerText = `Difficulty: ${difficulty}`;
            document.getElementById('timeDisplay').innerText = `Time: ${Math.floor(elapsedTime)}s`;
            document.getElementById('particleDisplay').innerText = `Particles: ${activeParticles}`;
            document.getElementById('avgHeightDisplay').innerText = `Avg Height: ${avgHeight.toFixed(2)}`;
            document.getElementById('fpsDisplay').innerText = `FPS: ${fps}`;

            // Update State
            window.__3D_STATE__ = {
                shoeLoaded: window.__3D_STATE__.shoeLoaded,
                shoeRotationY: shoeModelWrapper.rotation.y,
                difficultyLevel: difficulty,
                elapsedTime: elapsedTime,
                barCount: numBars,
                avgBarHeight: avgHeight,
                maxBarHeight: maxHeight,
                activeParticles: activeParticles,
                isPaused: isPaused,
                variantIndex: currentVariantIndex,
                cameraDistance: camera.position.distanceTo(new THREE.Vector3(0,0,0)),
                heightMultiplier: heightMultiplier,
                fpsValue: fps,
                barHeights: currentBarHeights
            };

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
