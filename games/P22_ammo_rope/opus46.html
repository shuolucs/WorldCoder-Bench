<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P22 - 3D Rope Physics (Verlet Integration)</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 15px; left: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 140, 255, 0.3);
    border-radius: 12px;
    padding: 18px 22px;
    color: #e0e0ff;
    backdrop-filter: blur(10px);
    min-width: 240px;
    z-index: 10;
  }
  #ui h2 {
    font-size: 16px; margin-bottom: 14px;
    color: #8cacff; letter-spacing: 1px;
    border-bottom: 1px solid rgba(100, 140, 255, 0.2);
    padding-bottom: 8px;
  }
  .control-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .control-row label { font-size: 13px; color: #aab; }
  .control-row span { font-size: 13px; color: #8cacff; min-width: 36px; text-align: right; }
  input[type="range"] {
    width: 120px; accent-color: #6688ff;
  }
  #windToggle {
    background: rgba(60, 80, 160, 0.5);
    border: 1px solid rgba(100, 140, 255, 0.4);
    color: #c0d0ff; padding: 6px 16px;
    border-radius: 6px; cursor: pointer;
    font-size: 13px; transition: all 0.2s;
  }
  #windToggle:hover { background: rgba(80, 100, 200, 0.7); }
  #windToggle.active {
    background: rgba(80, 180, 120, 0.6);
    border-color: rgba(80, 200, 140, 0.6);
    color: #c0ffd0;
  }
  #info {
    position: absolute; bottom: 15px; left: 15px;
    background: rgba(10, 10, 30, 0.75);
    border: 1px solid rgba(100, 140, 255, 0.2);
    border-radius: 8px; padding: 10px 16px;
    color: #889; font-size: 12px;
    backdrop-filter: blur(8px);
  }
</style>
</head>
<body>

<div id="ui">
  <h2>🪢 Rope Physics</h2>
  <div class="control-row">
    <label>Stiffness</label>
    <input type="range" id="stiffness" min="0.5" max="1.0" step="0.01" value="0.85">
    <span id="stiffVal">0.85</span>
  </div>
  <div class="control-row">
    <label>Wind</label>
    <button id="windToggle">OFF</button>
  </div>
</div>

<div id="info">Left-click drag: grab rope &nbsp;|&nbsp; Right-click drag: orbit &nbsp;|&nbsp; Scroll: zoom</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1e);
scene.fog = new THREE.FogExp2(0x0a0a1e, 0.03);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(6, 5, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// OrbitControls - right mouse button for orbit
const controls = new OrbitControls(camera, renderer.domElement);
controls.mouseButtons = {
  LEFT: null,  // We handle left click for grabbing
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.ROTATE
};
controls.touches = {
  ONE: null,
  TWO: THREE.TOUCH.DOLLY_ROTATE
};
controls.target.set(0, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x334466, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
dirLight.position.set(8, 15, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 40;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x4466ff, 2, 30);
pointLight.position.set(-5, 8, -3);
scene.add(pointLight);

const pointLight2 = new THREE.PointLight(0xff6644, 1, 20);
pointLight2.position.set(5, 3, 5);
scene.add(pointLight2);

// ============ GROUND ============
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a2e,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(30, 30, 0x222244, 0x181830);
gridHelper.position.y = -1.99;
scene.add(gridHelper);

// Ceiling indicator
const ceilingGeo = new THREE.BoxGeometry(1.5, 0.15, 1.5);
const ceilingMat = new THREE.MeshStandardMaterial({ color: 0x445588, roughness: 0.5, metalness: 0.3 });
const ceilingBlock = new THREE.Mesh(ceilingGeo, ceilingMat);
ceilingBlock.position.set(0, 5.1, 0);
ceilingBlock.castShadow = true;
scene.add(ceilingBlock);

// ============ ROPE PHYSICS ============
const SEGMENT_COUNT = 30;
const TOP_PIN = new THREE.Vector3(0, 5, 0);
const GRAVITY = new THREE.Vector3(0, -9.81, 0);
const REST_LENGTH = 0.25;
const CONSTRAINT_ITERATIONS = 8;
const FIXED_DT = 1 / 60;
const SUB_STEPS = 2;

let windEnabled = false;
let stiffness = 0.85;
let simTime = 0;

// Particle data
const positions = [];
const prevPositions = [];
const pinned = [];

for (let i = 0; i <= SEGMENT_COUNT; i++) {
  const p = new THREE.Vector3(
    TOP_PIN.x,
    TOP_PIN.y - i * REST_LENGTH,
    TOP_PIN.z
  );
  positions.push(p.clone());
  prevPositions.push(p.clone());
  pinned.push(i === 0);
}

// ============ ROPE VISUALS ============
const sphereGeo = new THREE.SphereGeometry(0.06, 12, 8);
const sphereMat = new THREE.MeshStandardMaterial({
  color: 0xff8844,
  roughness: 0.3,
  metalness: 0.6,
  emissive: 0x331100,
  emissiveIntensity: 0.3
});

const pinMat = new THREE.MeshStandardMaterial({
  color: 0x44aaff,
  roughness: 0.2,
  metalness: 0.8,
  emissive: 0x112244,
  emissiveIntensity: 0.5
});

const sphereMeshes = [];
for (let i = 0; i <= SEGMENT_COUNT; i++) {
  const mesh = new THREE.Mesh(sphereGeo, i === 0 ? pinMat : sphereMat);
  mesh.castShadow = true;
  mesh.userData.particleIndex = i;
  scene.add(mesh);
  sphereMeshes.push(mesh);
}

// Cylinder segments
const cylGeo = new THREE.CylinderGeometry(0.035, 0.035, 1, 8, 1);
const cylMat = new THREE.MeshStandardMaterial({
  color: 0xcc7733,
  roughness: 0.4,
  metalness: 0.5,
  emissive: 0x221100,
  emissiveIntensity: 0.2
});

const cylMeshes = [];
for (let i = 0; i < SEGMENT_COUNT; i++) {
  const mesh = new THREE.Mesh(cylGeo, cylMat);
  mesh.castShadow = true;
  scene.add(mesh);
  cylMeshes.push(mesh);
}

// ============ PHYSICS STEP ============
const tempVec = new THREE.Vector3();
const tempVec2 = new THREE.Vector3();

function simulate(dt) {
  const subDt = dt / SUB_STEPS;

  for (let sub = 0; sub < SUB_STEPS; sub++) {
    // Wind force
    const windForce = new THREE.Vector3();
    if (windEnabled) {
      const t = simTime * 2;
      windForce.set(
        3.0 + Math.sin(t * 1.3) * 1.5,
        Math.sin(t * 0.7) * 0.5,
        Math.cos(t * 0.9) * 1.0
      );
    }

    // Verlet integration
    for (let i = 0; i <= SEGMENT_COUNT; i++) {
      if (pinned[i]) continue;
      if (i === grabbedIndex) continue;

      const pos = positions[i];
      const prev = prevPositions[i];

      // velocity = pos - prev
      tempVec.copy(pos).sub(prev);

      // Damping
      tempVec.multiplyScalar(0.998);

      // Store current pos
      prev.copy(pos);

      // Update position
      pos.add(tempVec);

      // Gravity
      pos.x += GRAVITY.x * subDt * subDt;
      pos.y += GRAVITY.y * subDt * subDt;
      pos.z += GRAVITY.z * subDt * subDt;

      // Wind
      if (windEnabled) {
        pos.x += windForce.x * subDt * subDt;
        pos.y += windForce.y * subDt * subDt;
        pos.z += windForce.z * subDt * subDt;
      }

      // Floor collision
      if (pos.y < -1.9) {
        pos.y = -1.9;
        prev.y = pos.y;
      }

      // NaN safety
      if (!isFinite(pos.x) || !isFinite(pos.y) || !isFinite(pos.z)) {
        pos.copy(prev);
      }
    }

    // Distance constraints
    for (let iter = 0; iter < CONSTRAINT_ITERATIONS; iter++) {
      for (let i = 0; i < SEGMENT_COUNT; i++) {
        const p1 = positions[i];
        const p2 = positions[i + 1];

        tempVec.copy(p2).sub(p1);
        const dist = tempVec.length();

        if (dist < 1e-8) continue;

        const diff = (dist - REST_LENGTH) / dist;
        const correction = diff * stiffness * 0.5;

        if (!pinned[i] && i !== grabbedIndex) {
          p1.x += tempVec.x * correction;
          p1.y += tempVec.y * correction;
          p1.z += tempVec.z * correction;
        }
        if (!pinned[i + 1] && (i + 1) !== grabbedIndex) {
          p2.x -= tempVec.x * correction;
          p2.y -= tempVec.y * correction;
          p2.z -= tempVec.z * correction;
        }
      }

      // Enforce pinned
      positions[0].copy(TOP_PIN);

      // Enforce grabbed
      if (grabbedIndex >= 0 && grabTarget) {
        positions[grabbedIndex].copy(grabTarget);
      }
    }
  }

  simTime += dt;
}

// ============ UPDATE VISUALS ============
const axis = new THREE.Vector3();
const up = new THREE.Vector3(0, 1, 0);

function updateVisuals() {
  for (let i = 0; i <= SEGMENT_COUNT; i++) {
    sphereMeshes[i].position.copy(positions[i]);
    // Scale grabbed particle
    const s = (i === grabbedIndex) ? 1.8 : 1.0;
    sphereMeshes[i].scale.setScalar(s);
  }

  for (let i = 0; i < SEGMENT_COUNT; i++) {
    const p1 = positions[i];
    const p2 = positions[i + 1];

    tempVec.copy(p2).sub(p1);
    const len = tempVec.length();

    const mid = tempVec2.copy(p1).add(p2).multiplyScalar(0.5);
    cylMeshes[i].position.copy(mid);
    cylMeshes[i].scale.set(1, len, 1);

    // Orient cylinder
    if (len > 1e-6) {
      axis.copy(tempVec).normalize();
      const quat = new THREE.Quaternion();
      quat.setFromUnitVectors(up, axis);
      cylMeshes[i].quaternion.copy(quat);
    }
  }
}

// ============ MOUSE INTERACTION ============
const raycaster = new THREE.Raycaster();
raycaster.params.Mesh = { threshold: 0.15 };
const mouse = new THREE.Vector2();
let grabbedIndex = -1;
let grabTarget = null;
let grabPlane = new THREE.Plane();
let isMouseDown = false;

function getMouseNDC(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function findClosestParticle(event) {
  getMouseNDC(event);
  raycaster.setFromCamera(mouse, camera);

  let bestDist = Infinity;
  let bestIdx = -1;

  for (let i = 0; i <= SEGMENT_COUNT; i++) {
    // Project particle to screen and check distance to ray
    const p = positions[i];
    tempVec.copy(p).sub(raycaster.ray.origin);
    const t = tempVec.dot(raycaster.ray.direction);
    if (t < 0) continue;

    const closest = tempVec2.copy(raycaster.ray.origin).addScaledVector(raycaster.ray.direction, t);
    const dist = closest.distanceTo(p);

    if (dist < 0.5 && dist < bestDist) {
      bestDist = dist;
      bestIdx = i;
    }
  }

  return bestIdx;
}

renderer.domElement.addEventListener('mousedown', (event) => {
  if (event.button !== 0) return; // Only left click

  const idx = findClosestParticle(event);
  if (idx >= 0 && idx !== 0) { // Don't grab the pinned top
    grabbedIndex = idx;
    grabTarget = positions[idx].clone();
    isMouseDown = true;

    // Create grab plane facing camera
    const camDir = new THREE.Vector3();
    camera.getWorldDirection(camDir);
    grabPlane.setFromNormalAndCoplanarPoint(camDir.negate(), positions[idx]);

    // Disable orbit controls during grab
    controls.enabled = false;
  }
});

renderer.domElement.addEventListener('mousemove', (event) => {
  if (!isMouseDown || grabbedIndex < 0) return;

  getMouseNDC(event);
  raycaster.setFromCamera(mouse, camera);

  const intersection = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(grabPlane, intersection)) {
    grabTarget.copy(intersection);
  }
});

renderer.domElement.addEventListener('mouseup', (event) => {
  if (event.button !== 0) return;
  grabbedIndex = -1;
  grabTarget = null;
  isMouseDown = false;
  controls.enabled = true;
});

// Touch support
renderer.domElement.addEventListener('touchstart', (event) => {
  if (event.touches.length !== 1) return;
  const touch = event.touches[0];
  const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY, button: 0 };

  const idx = findClosestParticle(fakeEvent);
  if (idx >= 0 && idx !== 0) {
    grabbedIndex = idx;
    grabTarget = positions[idx].clone();
    isMouseDown = true;

    const camDir = new THREE.Vector3();
    camera.getWorldDirection(camDir);
    grabPlane.setFromNormalAndCoplanarPoint(camDir.negate(), positions[idx]);
    controls.enabled = false;
    event.preventDefault();
  }
}, { passive: false });

renderer.domElement.addEventListener('touchmove', (event) => {
  if (!isMouseDown || grabbedIndex < 0) return;
  const touch = event.touches[0];
  getMouseNDC({ clientX: touch.clientX, clientY: touch.clientY });
  raycaster.setFromCamera(mouse, camera);

  const intersection = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(grabPlane, intersection)) {
    grabTarget.copy(intersection);
  }
  event.preventDefault();
}, { passive: false });

renderer.domElement.addEventListener('touchend', () => {
  grabbedIndex = -1;
  grabTarget = null;
  isMouseDown = false;
  controls.enabled = true;
});

// ============ UI ============
const stiffnessSlider = document.getElementById('stiffness');
const stiffValSpan = document.getElementById('stiffVal');
const windToggleBtn = document.getElementById('windToggle');

stiffnessSlider.addEventListener('input', () => {
  stiffness = parseFloat(stiffnessSlider.value);
  stiffValSpan.textContent = stiffness.toFixed(2);
});

windToggleBtn.addEventListener('click', () => {
  windEnabled = !windEnabled;
  windToggleBtn.textContent = windEnabled ? 'ON' : 'OFF';
  windToggleBtn.classList.toggle('active', windEnabled);
});

// ============ STATE EXPOSURE ============
window.__3D_STATE__ = {};

function updateState() {
  // Compute average stretch
  let totalStretch = 0;
  for (let i = 0; i < SEGMENT_COUNT; i++) {
    const dist = positions[i].distanceTo(positions[i + 1]);
    totalStretch += dist / REST_LENGTH;
  }
  const avgStretch = totalStretch / SEGMENT_COUNT;

  const bottom = positions[SEGMENT_COUNT];

  window.__3D_STATE__ = {
    segmentCount: SEGMENT_COUNT,
    topPin: { x: TOP_PIN.x, y: TOP_PIN.y, z: TOP_PIN.z },
    bottomPos: { x: bottom.x, y: bottom.y, z: bottom.z },
    avgStretch: avgStretch,
    windEnabled: windEnabled,
    stiffness: stiffness,
    simTime: simTime
  };
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);

  simulate(FIXED_DT);
  updateVisuals();
  updateState();

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
