<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P22_ammo_rope - Three.js Verlet Rope</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #87a9c4;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(20, 24, 32, 0.72);
      color: #fff;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      user-select: none;
      min-width: 220px;
    }

    #ui h3 {
      margin: 0 0 8px 0;
      font-size: 15px;
      font-weight: 700;
    }

    #ui .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 14px;
    }

    #ui label {
      flex: 0 0 auto;
    }

    #stiffness {
      width: 140px;
    }

    #windToggle {
      cursor: pointer;
    }

    #hint {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.45;
      color: #d7e5ff;
    }

    #readout {
      margin-top: 8px;
      font-size: 12px;
      color: #cfe7d8;
      line-height: 1.45;
      white-space: pre-line;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h3>P22_ammo_rope</h3>

      <div class="row">
        <label for="stiffness">刚度</label>
        <input id="stiffness" type="range" min="0.5" max="1.0" step="0.01" value="0.92" />
        <span id="stiffnessValue">0.92</span>
      </div>

      <div class="row">
        <label for="windToggle">风</label>
        <input id="windToggle" type="checkbox" />
        <span id="windLabel">关闭</span>
      </div>

      <div id="hint">
        左键拖拽空白处：旋转视角<br>
        Shift + 左键点击绳索：抓取并拖拽质点<br>
        滚轮：缩放
      </div>

      <div id="readout"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('app');
    const stiffnessEl = document.getElementById('stiffness');
    const stiffnessValueEl = document.getElementById('stiffnessValue');
    const windToggleEl = document.getElementById('windToggle');
    const windLabelEl = document.getElementById('windLabel');
    const readoutEl = document.getElementById('readout');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9ec9ee);
    scene.fog = new THREE.Fog(0x9ec9ee, 18, 42);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(7, 6, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2.2, 0);

    const hemi = new THREE.HemisphereLight(0xddeeff, 0x556655, 1.25);
    scene.add(hemi);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.35);
    dirLight.position.set(6, 10, 7);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x7f9276,
      roughness: 0.95,
      metalness: 0.02
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI * 0.5;
    ground.position.y = -2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(40, 40, 0x334455, 0x667788);
    grid.position.y = -1.999;
    scene.add(grid);

    const ceilingGeo = new THREE.BoxGeometry(2.2, 0.25, 2.2);
    const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xc8c8cf, roughness: 0.8 });
    const ceiling = new THREE.Mesh(ceilingGeo, ceilingMat);
    ceiling.position.set(0, 5.2, 0);
    ceiling.castShadow = true;
    ceiling.receiveShadow = true;
    scene.add(ceiling);

    const pinMarker = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0x331100 })
    );
    pinMarker.castShadow = true;
    scene.add(pinMarker);

    const ropeGroup = new THREE.Group();
    scene.add(ropeGroup);

    const segmentCount = 30;
    const topPin = new THREE.Vector3(0, 5, 0);
    const ropeLength = 9.0;
    const restLength = ropeLength / segmentCount;
    const pointRadius = 0.085;
    const ropeRadius = 0.045;
    const gravity = new THREE.Vector3(0, -9.81, 0);
    const windVec = new THREE.Vector3(6.0, 0, 1.2);
    const damping = 0.998;
    const floorY = -1.85;
    const constraintIterations = 8;

    pinMarker.position.copy(topPin);

    class Particle {
      constructor(position, pinned = false) {
        this.position = position.clone();
        this.previous = position.clone();
        this.acceleration = new THREE.Vector3();
        this.pinned = pinned;
        this.pinPosition = pinned ? position.clone() : null;
        this.invMass = pinned ? 0 : 1;
      }

      addForce(force) {
        if (this.invMass === 0) return;
        this.acceleration.add(force);
      }

      integrate(dt) {
        if (this.invMass === 0) {
          this.position.copy(this.pinPosition);
          this.previous.copy(this.pinPosition);
          this.acceleration.set(0, 0, 0);
          return;
        }

        const temp = this.position.clone();
        const velocity = this.position.clone().sub(this.previous).multiplyScalar(damping);
        this.position.add(velocity).add(this.acceleration.clone().multiplyScalar(dt * dt));
        this.previous.copy(temp);
        this.acceleration.set(0, 0, 0);

        if (!Number.isFinite(this.position.x) || !Number.isFinite(this.position.y) || !Number.isFinite(this.position.z)) {
          this.position.set(0, 0, 0);
          this.previous.set(0, 0, 0);
        }
      }
    }

    const particles = [];
    for (let i = 0; i <= segmentCount; i++) {
      const t = i / segmentCount;
      const pos = new THREE.Vector3(
        topPin.x,
        topPin.y - ropeLength * t,
        topPin.z
      );
      particles.push(new Particle(pos, i === 0));
    }

    const sphereGeo = new THREE.SphereGeometry(pointRadius, 16, 16);
    const sphereMatPinned = new THREE.MeshStandardMaterial({ color: 0xffaa55, roughness: 0.5 });
    const sphereMat = new THREE.MeshStandardMaterial({ color: 0x4b2e83, roughness: 0.45, metalness: 0.1 });

    const pointMeshes = [];
    for (let i = 0; i < particles.length; i++) {
      const mesh = new THREE.Mesh(sphereGeo, i === 0 ? sphereMatPinned : sphereMat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.particleIndex = i;
      ropeGroup.add(mesh);
      pointMeshes.push(mesh);
    }

    const cylGeo = new THREE.CylinderGeometry(ropeRadius, ropeRadius, 1, 10, 1, false);
    const cylMat = new THREE.MeshStandardMaterial({ color: 0xe6d3a6, roughness: 0.75, metalness: 0.05 });

    const linkMeshes = [];
    for (let i = 0; i < segmentCount; i++) {
      const mesh = new THREE.Mesh(cylGeo, cylMat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      ropeGroup.add(mesh);
      linkMeshes.push(mesh);
    }

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const dragPlane = new THREE.Plane();
    const dragHit = new THREE.Vector3();
    const cameraDir = new THREE.Vector3();
    let grabbedIndex = -1;
    let simTime = 0;

    function updatePointer(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function beginDrag(event) {
      updatePointer(event);
      raycaster.setFromCamera(pointer, camera);

      const intersects = raycaster.intersectObjects(pointMeshes, false);
      if (intersects.length === 0) return false;

      const hit = intersects.find(it => it.object.userData.particleIndex > 0);
      if (!hit) return false;

      grabbedIndex = hit.object.userData.particleIndex;
      controls.enabled = false;

      camera.getWorldDirection(cameraDir);
      dragPlane.setFromNormalAndCoplanarPoint(cameraDir.clone().normalize(), hit.point.clone());

      const p = particles[grabbedIndex];
      p.position.copy(hit.point);
      p.previous.copy(hit.point);
      return true;
    }

    function updateDrag(event) {
      if (grabbedIndex < 0) return;
      updatePointer(event);
      raycaster.setFromCamera(pointer, camera);

      if (raycaster.ray.intersectPlane(dragPlane, dragHit)) {
        const p = particles[grabbedIndex];
        p.position.copy(dragHit);
        p.previous.copy(dragHit);
      }
    }

    function endDrag() {
      grabbedIndex = -1;
      controls.enabled = true;
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (event.button !== 0) return;

      if (event.shiftKey) {
        const dragged = beginDrag(event);
        if (dragged) {
          renderer.domElement.setPointerCapture(event.pointerId);
        }
      }
    });

    renderer.domElement.addEventListener('pointermove', (event) => {
      updateDrag(event);
    });

    renderer.domElement.addEventListener('pointerup', () => {
      endDrag();
    });

    renderer.domElement.addEventListener('pointercancel', () => {
      endDrag();
    });

    stiffnessEl.addEventListener('input', () => {
      stiffnessValueEl.textContent = Number(stiffnessEl.value).toFixed(2);
    });

    windToggleEl.addEventListener('change', () => {
      windLabelEl.textContent = windToggleEl.checked ? '开启' : '关闭';
    });

    stiffnessValueEl.textContent = Number(stiffnessEl.value).toFixed(2);
    windLabelEl.textContent = windToggleEl.checked ? '开启' : '关闭';

    function solveDistanceConstraints(stiffness) {
      for (let iter = 0; iter < constraintIterations; iter++) {
        particles[0].position.copy(topPin);
        particles[0].previous.copy(topPin);

        if (grabbedIndex === 0) {
          particles[0].position.copy(topPin);
          particles[0].previous.copy(topPin);
        }

        for (let i = 0; i < segmentCount; i++) {
          const p1 = particles[i];
          const p2 = particles[i + 1];
          const delta = new THREE.Vector3().subVectors(p2.position, p1.position);
          let dist = delta.length();

          if (!Number.isFinite(dist) || dist < 1e-8) {
            delta.set(0, restLength, 0);
            dist = restLength;
          }

          const diff = (dist - restLength) / dist;
          const correction = delta.multiplyScalar(0.5 * stiffness * diff);

          if (p1.invMass === 0 && p2.invMass === 0) {
            // do nothing
          } else if (p1.invMass === 0) {
            p2.position.sub(correction.multiplyScalar(2));
          } else if (p2.invMass === 0) {
            p1.position.add(correction.multiplyScalar(2));
          } else if (i + 1 === grabbedIndex) {
            p1.position.add(correction.multiplyScalar(2));
          } else if (i === grabbedIndex) {
            p2.position.sub(correction.multiplyScalar(2));
          } else {
            p1.position.add(correction);
            p2.position.sub(correction);
          }
        }

        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];

          if (i === 0) {
            p.position.copy(topPin);
            p.previous.copy(topPin);
            continue;
          }

          if (i === grabbedIndex) continue;

          if (p.position.y < floorY) {
            p.position.y = floorY;
          }

          if (!Number.isFinite(p.position.x) || !Number.isFinite(p.position.y) || !Number.isFinite(p.position.z)) {
            p.position.set(0, 0, 0);
            p.previous.copy(p.position);
          }

          const maxAbs = 1000;
          p.position.x = THREE.MathUtils.clamp(p.position.x, -maxAbs, maxAbs);
          p.position.y = THREE.MathUtils.clamp(p.position.y, -maxAbs, maxAbs);
          p.position.z = THREE.MathUtils.clamp(p.position.z, -maxAbs, maxAbs);
        }
      }
    }

    function stepSimulation(dt) {
      const stiffness = Number(stiffnessEl.value);
      const windEnabled = windToggleEl.checked;

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        if (i === 0) {
          p.position.copy(topPin);
          p.previous.copy(topPin);
          continue;
        }

        if (i === grabbedIndex) {
          p.acceleration.set(0, 0, 0);
          continue;
        }

        p.addForce(gravity);
        if (windEnabled) {
          p.addForce(windVec);
        }
      }

      for (let i = 0; i < particles.length; i++) {
        particles[i].integrate(dt);
      }

      solveDistanceConstraints(stiffness);
      simTime += dt;
    }

    const up = new THREE.Vector3(0, 1, 0);
    const mid = new THREE.Vector3();
    const dir = new THREE.Vector3();
    const quat = new THREE.Quaternion();

    function updateVisuals() {
      for (let i = 0; i < particles.length; i++) {
        pointMeshes[i].position.copy(particles[i].position);
      }

      for (let i = 0; i < segmentCount; i++) {
        const a = particles[i].position;
        const b = particles[i + 1].position;

        mid.copy(a).add(b).multiplyScalar(0.5);
        dir.subVectors(b, a);
        const len = Math.max(dir.length(), 1e-6);

        linkMeshes[i].position.copy(mid);
        quat.setFromUnitVectors(up, dir.clone().normalize());
        linkMeshes[i].quaternion.copy(quat);
        linkMeshes[i].scale.set(1, len, 1);
      }
    }

    function computeAvgStretch() {
      let sum = 0;
      for (let i = 0; i < segmentCount; i++) {
        const len = particles[i].position.distanceTo(particles[i + 1].position);
        sum += len / restLength;
      }
      return sum / segmentCount;
    }

    function updateState() {
      const avgStretch = computeAvgStretch();
      const bottom = particles[particles.length - 1].position;
      const stiffness = Number(stiffnessEl.value);
      const windEnabled = windToggleEl.checked;

      window.__3D_STATE__ = {
        segmentCount,
        topPin: { x: topPin.x, y: topPin.y, z: topPin.z },
        bottomPos: { x: bottom.x, y: bottom.y, z: bottom.z },
        avgStretch,
        windEnabled,
        stiffness,
        simTime
      };

      readoutEl.textContent =
        `bottom: (${bottom.x.toFixed(2)}, ${bottom.y.toFixed(2)}, ${bottom.z.toFixed(2)})\n` +
        `avgStretch: ${avgStretch.toFixed(4)}\n` +
        `simTime: ${simTime.toFixed(2)} s`;
    }

    window.__3D_STATE__ = {
      segmentCount,
      topPin: { x: topPin.x, y: topPin.y, z: topPin.z },
      bottomPos: { x: 0, y: 0, z: 0 },
      avgStretch: 1,
      windEnabled: windToggleEl.checked,
      stiffness: Number(stiffnessEl.value),
      simTime: 0
    };

    const clock = new THREE.Clock();
    let accumulator = 0;
    const fixedDt = 1 / 60;
    const maxSubsteps = 4;

    function animate() {
      requestAnimationFrame(animate);

      let frameDt = clock.getDelta();
      frameDt = Math.min(frameDt, 0.0333);
      accumulator += frameDt;

      let steps = 0;
      while (accumulator >= fixedDt && steps < maxSubsteps) {
        stepSimulation(fixedDt);
        accumulator -= fixedDt;
        steps++;
      }

      updateVisuals();
      updateState();
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateVisuals();
    updateState();
    animate();
  </script>
</body>
</html>
