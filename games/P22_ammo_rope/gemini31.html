<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Verlet Rope Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            z-index: 100;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: inline-block;
            width: 80px;
        }
        input[type="range"] {
            vertical-align: middle;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }
        button.active {
            background: #f44336;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="control-group">
            <label for="stiffness">Stiffness:</label>
            <input type="range" id="stiffness" min="0.5" max="1.0" step="0.01" value="1.0">
            <span id="stiffness-val">1.00</span>
        </div>
        <div class="control-group">
            <button id="windToggle">Wind: OFF</button>
        </div>
        <div style="font-size: 0.8em; color: #aaa; margin-top: 10px;">
            Drag particles to interact.<br>
            Rotate camera with mouse.
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuration ---
        const segmentCount = 30;
        const numParticles = segmentCount + 1;
        const ropeLength = 10;
        const restLength = ropeLength / segmentCount;
        const constraintIterations = 15;
        const gravity = new THREE.Vector3(0, -9.81, 0);
        const topPin = new THREE.Vector3(0, 5, 0);
        const fixedDt = 0.016; // Fixed timestep for physics stability

        // --- State ---
        let windEnabled = false;
        let simTime = 0;
        let draggedParticleIndex = -1;

        // --- Physics Data ---
        const particles = [];
        for (let i = 0; i < numParticles; i++) {
            const pos = new THREE.Vector3(topPin.x, topPin.y - i * restLength, topPin.z);
            particles.push({
                pos: pos.clone(),
                oldPos: pos.clone(),
                acc: new THREE.Vector3(0, 0, 0),
                mass: i === 0 ? 0 : 1, // 0 mass means pinned
                radius: 0.15
            });
        }

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        scene.fog = new THREE.Fog(0x222222, 20, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(15, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.update();

        // --- Lighting & Environment ---
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x333333);
        gridHelper.position.y = -6;
        scene.add(gridHelper);

        // --- Visuals (Meshes) ---
        const particleMeshes = [];
        const segmentMeshes = [];

        const sphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0xff5555, roughness: 0.4 });
        const pinnedMat = new THREE.MeshStandardMaterial({ color: 0x55ff55, roughness: 0.4 });
        const draggedMat = new THREE.MeshStandardMaterial({ color: 0xffff55, roughness: 0.4 });

        const cylGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 8);
        // Shift cylinder geometry so origin is at bottom, makes scaling easier
        cylGeo.translate(0, 0.5, 0);
        const cylMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.7 });

        for (let i = 0; i < numParticles; i++) {
            const mesh = new THREE.Mesh(sphereGeo, i === 0 ? pinnedMat : sphereMat);
            mesh.castShadow = true;
            mesh.userData.index = i;
            scene.add(mesh);
            particleMeshes.push(mesh);

            if (i < segmentCount) {
                const segMesh = new THREE.Mesh(cylGeo, cylMat);
                segMesh.castShadow = true;
                scene.add(segMesh);
                segmentMeshes.push(segMesh);
            }
        }

        // --- Interaction (Raycasting & Dragging) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane();
        const intersection = new THREE.Vector3();

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(particleMeshes);
            if (intersects.length > 0) {
                const hit = intersects[0];
                draggedParticleIndex = hit.object.userData.index;
                controls.enabled = false;
                
                // Create a plane facing camera at the particle's position
                dragPlane.setFromNormalAndCoplanarPoint(
                    camera.getWorldDirection(new THREE.Vector3()).negate(),
                    particles[draggedParticleIndex].pos
                );
                
                if (draggedParticleIndex !== 0) {
                    particleMeshes[draggedParticleIndex].material = draggedMat;
                }
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (draggedParticleIndex !== -1) {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                if (raycaster.ray.intersectPlane(dragPlane, intersection)) {
                    const p = particles[draggedParticleIndex];
                    p.pos.copy(intersection);
                    p.oldPos.copy(intersection); // Prevent velocity buildup while dragging
                }
            }
        });

        window.addEventListener('pointerup', () => {
            if (draggedParticleIndex !== -1) {
                if (draggedParticleIndex !== 0) {
                    particleMeshes[draggedParticleIndex].material = sphereMat;
                }
                draggedParticleIndex = -1;
                controls.enabled = true;
            }
        });

        // --- UI Events ---
        const stiffnessSlider = document.getElementById('stiffness');
        const stiffnessValDisplay = document.getElementById('stiffness-val');
        stiffnessSlider.addEventListener('input', (e) => {
            stiffnessValDisplay.textContent = parseFloat(e.target.value).toFixed(2);
        });

        const windBtn = document.getElementById('windToggle');
        windBtn.addEventListener('click', () => {
            windEnabled = !windEnabled;
            windBtn.textContent = windEnabled ? 'Wind: ON' : 'Wind: OFF';
            windBtn.classList.toggle('active', windEnabled);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics Simulation ---
        function simulate(dt) {
            const stiffness = parseFloat(stiffnessSlider.value);
            const windForce = new THREE.Vector3(0, 0, 0);

            if (windEnabled) {
                // Procedural wind based on time and position
                const time = simTime;
                windForce.set(
                    Math.sin(time * 2.0) * 8 + 12, // Base wind + gust
                    Math.cos(time * 1.5) * 2,
                    Math.sin(time * 1.2) * 5
                );
            }

            // 1. Integration (Verlet)
            for (let i = 0; i < numParticles; i++) {
                const p = particles[i];
                if (p.mass === 0 || i === draggedParticleIndex) continue;

                p.acc.copy(gravity);
                if (windEnabled) {
                    // Add some variation per particle
                    const localWind = windForce.clone().multiplyScalar(1 + Math.sin(p.pos.y + simTime) * 0.2);
                    p.acc.add(localWind);
                }

                const temp = p.pos.clone();
                const vel = p.pos.clone().sub(p.oldPos);
                vel.multiplyScalar(0.99); // Damping

                p.pos.add(vel).add(p.acc.multiplyScalar(dt * dt));
                p.oldPos.copy(temp);
            }

            // 2. Constraints (Distance Relaxation)
            for (let iter = 0; iter < constraintIterations; iter++) {
                for (let i = 0; i < segmentCount; i++) {
                    const p1 = particles[i];
                    const p2 = particles[i + 1];

                    const delta = p2.pos.clone().sub(p1.pos);
                    const dist = delta.length();
                    
                    if (dist === 0) continue;

                    const diff = (dist - restLength) / dist;
                    // Apply stiffness weight
                    const correction = delta.multiplyScalar(0.5 * diff * stiffness);

                    if (p1.mass !== 0 && i !== draggedParticleIndex) {
                        p1.pos.add(correction);
                    }
                    if (p2.mass !== 0 && (i + 1) !== draggedParticleIndex) {
                        p2.pos.sub(correction);
                    }
                }
                
                // Enforce pin strictly
                particles[0].pos.copy(topPin);
            }
        }

        // --- Main Loop ---
        const upVector = new THREE.Vector3(0, 1, 0);

        function animate() {
            requestAnimationFrame(animate);

            // Physics step
            simulate(fixedDt);
            simTime += fixedDt;

            // Update Visuals
            let totalStretch = 0;

            for (let i = 0; i < numParticles; i++) {
                particleMeshes[i].position.copy(particles[i].pos);

                if (i < segmentCount) {
                    const p1 = particles[i].pos;
                    const p2 = particles[i + 1].pos;
                    const segMesh = segmentMeshes[i];

                    const dir = p2.clone().sub(p1);
                    const dist = dir.length();
                    
                    totalStretch += dist / restLength;

                    // Position at p1, point to p2, scale length
                    segMesh.position.copy(p1);
                    if (dist > 0.0001) {
                        segMesh.quaternion.setFromUnitVectors(upVector, dir.normalize());
                    }
                    segMesh.scale.set(1, dist, 1);
                }
            }

            // --- State Exposure ---
            window.__3D_STATE__ = {
                segmentCount: segmentCount,
                topPin: { x: topPin.x, y: topPin.y, z: topPin.z },
                bottomPos: { 
                    x: particles[numParticles - 1].pos.x, 
                    y: particles[numParticles - 1].pos.y, 
                    z: particles[numParticles - 1].pos.z 
                },
                avgStretch: totalStretch / segmentCount,
                windEnabled: windEnabled,
                stiffness: parseFloat(stiffnessSlider.value),
                simTime: simTime
            };

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
