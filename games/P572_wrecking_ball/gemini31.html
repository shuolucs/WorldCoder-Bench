<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrecking Ball Demolition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #555;
        }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #555;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: inline-block;
            width: 120px;
        }
        input[type="range"] {
            vertical-align: middle;
        }
        .val-display {
            display: inline-block;
            width: 30px;
            text-align: right;
        }
        .instructions {
            margin-top: 15px;
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <div>Boxes Standing: <span id="hud-boxes-standing">30</span></div>
        <div>Boxes Fallen: <span id="hud-boxes-fallen">0</span></div>
        <div>Ball Speed: <span id="hud-ball-speed">0.0</span> m/s</div>
        <div>Ball Height: <span id="hud-ball-height">0.0</span> m</div>
        <div>Swings: <span id="hud-swings">0</span></div>
        <div>Chain Length: <span id="hud-chain-length">8.0</span> m</div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-chain">Chain Length:</label>
            <input type="range" id="slider-chain" min="4" max="10" step="0.5" value="8">
            <span class="val-display" id="val-chain">8.0</span>
        </div>
        <div class="control-group">
            <label for="slider-attach">Attach X:</label>
            <input type="range" id="slider-attach" min="-4" max="4" step="0.5" value="0">
            <span class="val-display" id="val-attach">0.0</span>
        </div>
        <div class="control-group">
            <label for="slider-mass">Ball Mass:</label>
            <input type="range" id="slider-mass" min="20" max="100" step="5" value="50">
            <span class="val-display" id="val-mass">50</span>
        </div>
        <div class="instructions">
            [SPACE] Hold to pull back, release to swing<br>
            [R] Rebuild Wall<br>
            [N] Reset All
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            frameCount: 0,
            boxesStanding: 30,
            boxesFallen: 0,
            totalBoxes: 30,
            ballPos: { x: 0, y: 0, z: 0 },
            ballSpeed: 0,
            ballMass: 50,
            chainLength: 8,
            attachX: 0,
            swingCount: 0,
            isPulledBack: false,
            particleCount: 15,
            isPaused: false,
            simTime: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        // Background Gradient
        const canvas = document.createElement('canvas');
        canvas.width = 2; canvas.height = 512;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 512);
        gradient.addColorStop(0, '#87CEEB'); // Sky
        gradient.addColorStop(1, '#D4C5A9'); // Dusty ground
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 2, 512);
        const bgTexture = new THREE.CanvasTexture(canvas);
        bgTexture.colorSpace = THREE.SRGBColorSpace;
        scene.background = bgTexture;
        scene.fog = new THREE.FogExp2('#D4C5A9', 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 10, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 3, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffeedd, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        sunLight.shadow.camera.left = -15;
        sunLight.shadow.camera.right = 15;
        sunLight.shadow.camera.top = 15;
        sunLight.shadow.camera.bottom = -15;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x88bbff, 0.5);
        fillLight.position.set(-10, 5, -10);
        scene.add(fillLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8, metalness: 0.2 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Crane Arm ---
        const steelMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.6, metalness: 0.5 });
        
        const poleGeo = new THREE.BoxGeometry(0.5, 12, 0.5);
        const pole = new THREE.Mesh(poleGeo, steelMat);
        pole.position.set(-8, 6, 0);
        pole.castShadow = true;
        pole.receiveShadow = true;
        scene.add(pole);

        const boomGeo = new THREE.BoxGeometry(16, 0.4, 0.4);
        const boom = new THREE.Mesh(boomGeo, steelMat);
        boom.position.set(0, 12, 0);
        boom.castShadow = true;
        boom.receiveShadow = true;
        scene.add(boom);

        // --- Texture Generation for Crates ---
        function createCrateTexture() {
            const c = document.createElement('canvas');
            c.width = 256; c.height = 256;
            const cx = c.getContext('2d');
            cx.fillStyle = '#8b5a2b'; cx.fillRect(0,0,256,256);
            cx.strokeStyle = '#5c3a18'; cx.lineWidth = 12;
            cx.strokeRect(6,6,244,244);
            cx.beginPath(); cx.moveTo(6,6); cx.lineTo(250,250); cx.stroke();
            cx.beginPath(); cx.moveTo(250,6); cx.lineTo(6,250); cx.stroke();
            const tex = new THREE.CanvasTexture(c);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }
        const crateTexture = createCrateTexture();
        const crateMat = new THREE.MeshStandardMaterial({ map: crateTexture, roughness: 0.9 });
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);

        // --- Physics Data Structures ---
        class Box {
            constructor(x, y, z) {
                this.mesh = new THREE.Mesh(boxGeo, crateMat);
                this.mesh.castShadow = true;
                this.mesh.receiveShadow = true;
                scene.add(this.mesh);

                this.pos = new THREE.Vector3(x, y, z);
                this.originalPos = this.pos.clone();
                this.vel = new THREE.Vector3();
                this.quat = new THREE.Quaternion();
                this.angVel = new THREE.Vector3();
                
                this.mass = 2.0;
                this.size = 1.0;
                this.isStatic = false;
                
                this.updateMesh();
            }

            updateMesh() {
                this.mesh.position.copy(this.pos);
                this.mesh.quaternion.copy(this.quat);
            }

            reset() {
                this.pos.copy(this.originalPos);
                this.vel.set(0,0,0);
                this.quat.identity();
                this.angVel.set(0,0,0);
                this.updateMesh();
            }
        }

        const boxes = [];
        function buildWall() {
            boxes.forEach(b => scene.remove(b.mesh));
            boxes.length = 0;
            for (let row = 0; row < 6; row++) {
                for (let col = 0; col < 5; col++) {
                    let x = 5 + (Math.random() - 0.5) * 0.02;
                    let y = 0.5 + row * 1.0;
                    let z = (col - 2) * 1.0 + (Math.random() - 0.5) * 0.02;
                    boxes.push(new Box(x, y, z));
                }
            }
        }
        buildWall();

        // --- Verlet Chain & Ball ---
        const N = 15;
        let chainLength = 8.0;
        let segmentLength = chainLength / N;
        let attachX = 0;
        let ballMass = 50.0;
        
        const particles = [];
        for(let i=0; i<N; i++) {
            particles.push({
                pos: new THREE.Vector3(attachX, 12 - i * segmentLength, 0),
                oldPos: new THREE.Vector3(attachX, 12 - i * segmentLength, 0)
            });
        }

        // Chain Visualization
        const chainGeo = new THREE.BufferGeometry();
        const chainPositions = new Float32Array(N * 3);
        chainGeo.setAttribute('position', new THREE.BufferAttribute(chainPositions, 3));
        const chainMat = new THREE.LineBasicMaterial({ color: 0x222222, linewidth: 3 });
        const chainLine = new THREE.Line(chainGeo, chainMat);
        scene.add(chainLine);

        // Ball Visualization
        const ballGeo = new THREE.SphereGeometry(0.8, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.4, metalness: 0.8 });
        const ballMesh = new THREE.Mesh(ballGeo, ballMat);
        ballMesh.castShadow = true;
        ballMesh.receiveShadow = true;
        scene.add(ballMesh);

        function resetChain() {
            for(let i=0; i<N; i++) {
                particles[i].pos.set(attachX, 12 - i * segmentLength, 0);
                particles[i].oldPos.copy(particles[i].pos);
            }
        }

        // --- Physics Engine ---
        const dt = 0.008; // Fixed timestep as requested
        const gravity = -9.81;

        function resolveBoxBox(b1, b2) {
            // Simplified AABB collision
            let dx = b2.pos.x - b1.pos.x;
            let dy = b2.pos.y - b1.pos.y;
            let dz = b2.pos.z - b1.pos.z;

            let intersectX = b1.size - Math.abs(dx);
            let intersectY = b1.size - Math.abs(dy);
            let intersectZ = b1.size - Math.abs(dz);

            if (intersectX > 0 && intersectY > 0 && intersectZ > 0) {
                let min = Math.min(intersectX, intersectY, intersectZ);
                let normal = new THREE.Vector3();
                if (min === intersectX) normal.set(Math.sign(dx), 0, 0);
                else if (min === intersectY) normal.set(0, Math.sign(dy), 0);
                else normal.set(0, 0, Math.sign(dz));

                // Position correction
                let correction = normal.clone().multiplyScalar(min * 0.5);
                b1.pos.sub(correction);
                b2.pos.add(correction);

                // Velocity resolution
                let relVel = b2.vel.clone().sub(b1.vel);
                let velAlongNormal = relVel.dot(normal);

                if (velAlongNormal < 0) {
                    let e = 0.2; // Restitution
                    let j = -(1 + e) * velAlongNormal / (1/b1.mass + 1/b2.mass);
                    let impulse = normal.clone().multiplyScalar(j);
                    
                    b1.vel.sub(impulse.clone().divideScalar(b1.mass));
                    b2.vel.add(impulse.clone().divideScalar(b2.mass));

                    // Friction
                    let tangent = relVel.clone().sub(normal.clone().multiplyScalar(velAlongNormal)).normalize();
                    let jt = -relVel.dot(tangent) / (1/b1.mass + 1/b2.mass);
                    let mu = 0.4;
                    let frictionImpulse = tangent.multiplyScalar(Math.max(-j*mu, Math.min(j*mu, jt)));
                    
                    b1.vel.sub(frictionImpulse.clone().divideScalar(b1.mass));
                    b2.vel.add(frictionImpulse.clone().divideScalar(b2.mass));
                }
            }
        }

        function resolveBallBox(ballP, ballVel, box) {
            // Sphere-AABB
            let closestX = Math.max(box.pos.x - 0.5, Math.min(ballP.pos.x, box.pos.x + 0.5));
            let closestY = Math.max(box.pos.y - 0.5, Math.min(ballP.pos.y, box.pos.y + 0.5));
            let closestZ = Math.max(box.pos.z - 0.5, Math.min(ballP.pos.z, box.pos.z + 0.5));

            let dx = ballP.pos.x - closestX;
            let dy = ballP.pos.y - closestY;
            let dz = ballP.pos.z - closestZ;
            let distSq = dx*dx + dy*dy + dz*dz;
            let radius = 0.8;

            if (distSq < radius*radius && distSq > 0) {
                let dist = Math.sqrt(distSq);
                let normal = new THREE.Vector3(dx, dy, dz).normalize();

                let relVel = box.vel.clone().sub(ballVel);
                let velAlongNormal = relVel.dot(normal);

                if (velAlongNormal < 0) {
                    let e = 0.3;
                    let j = -(1 + e) * velAlongNormal / (1/box.mass + 1/ballMass);
                    let impulse = normal.clone().multiplyScalar(j);

                    // Apply to box
                    box.vel.add(impulse.clone().divideScalar(box.mass));

                    // Angular impulse
                    let contactPoint = new THREE.Vector3(closestX, closestY, closestZ);
                    let r = contactPoint.clone().sub(box.pos);
                    let torque = r.cross(impulse);
                    box.angVel.add(torque.multiplyScalar(1 / (box.mass * 0.166))); // I approx

                    // Return velocity change for ball
                    return impulse.clone().divideScalar(ballMass);
                }
            }
            return null;
        }

        function stepPhysics() {
            // 1. Verlet Integration for Chain
            if (window.__3D_STATE__.isPulledBack) {
                let targetX = attachX - chainLength * 0.7;
                let targetY = 12 - chainLength * 0.3;
                for(let i=0; i<N; i++) {
                    let t = i / (N-1);
                    particles[i].pos.set(
                        attachX + (targetX - attachX) * t,
                        12 + (targetY - 12) * t,
                        0
                    );
                    particles[i].oldPos.copy(particles[i].pos);
                }
            } else {
                for(let i=1; i<N; i++) {
                    let p = particles[i];
                    let vel = p.pos.clone().sub(p.oldPos);
                    vel.multiplyScalar(0.999); // Damping
                    p.oldPos.copy(p.pos);
                    p.pos.add(vel);
                    p.pos.y += gravity * dt * dt;
                }

                // Constraints (8 iterations)
                for(let iter=0; iter<8; iter++) {
                    particles[0].pos.set(attachX, 12, 0);
                    for(let i=0; i<N-1; i++) {
                        let p1 = particles[i];
                        let p2 = particles[i+1];
                        let delta = p2.pos.clone().sub(p1.pos);
                        let dist = delta.length();
                        if (dist === 0) continue;
                        let diff = (dist - segmentLength) / dist;
                        let offset = delta.multiplyScalar(0.5 * diff);
                        if (i > 0) p1.pos.add(offset);
                        p2.pos.sub(offset);
                    }
                }
            }

            let ballP = particles[N-1];
            let ballVel = ballP.pos.clone().sub(ballP.oldPos).divideScalar(dt);

            // 2. Box Physics
            for(let box of boxes) {
                // Gravity
                box.vel.y += gravity * dt;
                
                // Sleep threshold to stabilize stacks
                if (box.vel.lengthSq() < 0.001 && box.angVel.lengthSq() < 0.001 && box.pos.y < 0.55) {
                    box.vel.set(0,0,0);
                    box.angVel.set(0,0,0);
                }

                box.pos.add(box.vel.clone().multiplyScalar(dt));

                // Floor collision
                if (box.pos.y < 0.5) {
                    box.pos.y = 0.5;
                    box.vel.y *= -0.3;
                    box.vel.x *= 0.6; // Friction
                    box.vel.z *= 0.6;
                    box.angVel.multiplyScalar(0.8);
                }

                // Rotation update
                if (box.angVel.lengthSq() > 0) {
                    let qVel = new THREE.Quaternion(
                        box.angVel.x * dt * 0.5,
                        box.angVel.y * dt * 0.5,
                        box.angVel.z * dt * 0.5,
                        0
                    );
                    qVel.multiply(box.quat);
                    box.quat.x += qVel.x; box.quat.y += qVel.y; box.quat.z += qVel.z; box.quat.w += qVel.w;
                    box.quat.normalize();
                }

                // Damping
                box.vel.multiplyScalar(0.98);
                box.angVel.multiplyScalar(0.95);
            }

            // 3. Collisions
            for(let i=0; i<boxes.length; i++) {
                for(let j=i+1; j<boxes.length; j++) {
                    resolveBoxBox(boxes[i], boxes[j]);
                }
            }

            let totalBallVelChange = new THREE.Vector3();
            for(let box of boxes) {
                let dv = resolveBallBox(ballP, ballVel, box);
                if (dv) totalBallVelChange.add(dv);
            }
            
            // Apply reaction to ball via Verlet oldPos
            if (totalBallVelChange.lengthSq() > 0 && !window.__3D_STATE__.isPulledBack) {
                // Limit reaction to prevent explosion
                if (totalBallVelChange.length() > 10) totalBallVelChange.normalize().multiplyScalar(10);
                ballP.oldPos.add(totalBallVelChange.multiplyScalar(dt));
            }

            window.__3D_STATE__.simTime += dt;
        }

        // --- Controls & Events ---
        document.getElementById('slider-chain').addEventListener('input', (e) => {
            chainLength = parseFloat(e.target.value);
            segmentLength = chainLength / N;
            document.getElementById('val-chain').innerText = chainLength.toFixed(1);
            window.__3D_STATE__.chainLength = chainLength;
        });

        document.getElementById('slider-attach').addEventListener('input', (e) => {
            attachX = parseFloat(e.target.value);
            document.getElementById('val-attach').innerText = attachX.toFixed(1);
            window.__3D_STATE__.attachX = attachX;
        });

        document.getElementById('slider-mass').addEventListener('input', (e) => {
            ballMass = parseFloat(e.target.value);
            document.getElementById('val-mass').innerText = ballMass;
            window.__3D_STATE__.ballMass = ballMass;
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !window.__3D_STATE__.isPulledBack) {
                window.__3D_STATE__.isPulledBack = true;
            }
            if (e.code === 'KeyR') {
                boxes.forEach(b => b.reset());
            }
            if (e.code === 'KeyN') {
                boxes.forEach(b => b.reset());
                resetChain();
                window.__3D_STATE__.swingCount = 0;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.isPulledBack = false;
                window.__3D_STATE__.swingCount++;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        let accumulator = 0;
        let lastTime = performance.now();

        function animate(time) {
            requestAnimationFrame(animate);

            let frameTime = (time - lastTime) / 1000;
            lastTime = time;
            if (frameTime > 0.1) frameTime = 0.1;

            accumulator += frameTime;
            // Multiple substeps per frame for stability
            while (accumulator >= dt) {
                stepPhysics();
                accumulator -= dt;
            }

            // Update Visuals
            boxes.forEach(b => b.updateMesh());
            
            const positions = chainLine.geometry.attributes.position.array;
            for(let i=0; i<N; i++) {
                positions[i*3] = particles[i].pos.x;
                positions[i*3+1] = particles[i].pos.y;
                positions[i*3+2] = particles[i].pos.z;
            }
            chainLine.geometry.attributes.position.needsUpdate = true;
            
            ballMesh.position.copy(particles[N-1].pos);

            controls.update();
            renderer.render(scene, camera);

            // Update State & HUD
            let standing = 0;
            let fallen = 0;
            for(let b of boxes) {
                let dx = Math.abs(b.pos.x - b.originalPos.x);
                let dy = Math.abs(b.pos.y - b.originalPos.y);
                let dz = Math.abs(b.pos.z - b.originalPos.z);
                
                let up = new THREE.Vector3(0,1,0).applyQuaternion(b.quat);
                let tilt = up.angleTo(new THREE.Vector3(0,1,0));

                if (dx < 0.5 && dy < 0.5 && dz < 0.5 && tilt < (30 * Math.PI / 180)) {
                    standing++;
                } else {
                    fallen++;
                }
            }

            let ballP = particles[N-1];
            let speed = ballP.pos.clone().sub(ballP.oldPos).divideScalar(dt).length();

            window.__3D_STATE__.frameCount++;
            window.__3D_STATE__.boxesStanding = standing;
            window.__3D_STATE__.boxesFallen = fallen;
            window.__3D_STATE__.ballPos = { x: ballP.pos.x, y: ballP.pos.y, z: ballP.pos.z };
            window.__3D_STATE__.ballSpeed = speed;

            document.getElementById('hud-boxes-standing').innerText = standing;
            document.getElementById('hud-boxes-fallen').innerText = fallen;
            document.getElementById('hud-ball-speed').innerText = speed.toFixed(1);
            document.getElementById('hud-ball-height').innerText = ballP.pos.y.toFixed(1);
            document.getElementById('hud-swings').innerText = window.__3D_STATE__.swingCount;
            document.getElementById('hud-chain-length').innerText = chainLength.toFixed(1);
        }

        animate(performance.now());
    </script>
</body>
</html>
