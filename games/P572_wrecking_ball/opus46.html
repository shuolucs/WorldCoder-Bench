<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wrecking Ball Demolition</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#hud {
  position: absolute; top: 10px; left: 10px;
  background: rgba(0,0,0,0.7); color: #fff; padding: 12px 16px;
  border-radius: 8px; font-size: 13px; line-height: 1.8;
  min-width: 220px; pointer-events: none;
}
#hud span { color: #FFD700; font-weight: bold; }
#controls {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); color: #fff; padding: 12px 20px;
  border-radius: 8px; font-size: 12px; display: flex; gap: 20px; align-items: center;
}
#controls label { display: flex; flex-direction: column; align-items: center; gap: 2px; }
#controls input[type=range] { width: 100px; }
#instructions {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.7); color: #ccc; padding: 10px 14px;
  border-radius: 8px; font-size: 12px; line-height: 1.6;
}
#instructions kbd { background: #555; padding: 1px 5px; border-radius: 3px; color: #fff; }
</style>
</head>
<body>

<div id="hud">
  <div>Boxes Standing: <span id="hud-boxes-standing">30</span></div>
  <div>Boxes Fallen: <span id="hud-boxes-fallen">0</span></div>
  <div>Ball Speed: <span id="hud-ball-speed">0.0</span> m/s</div>
  <div>Ball Height: <span id="hud-ball-height">0.0</span> m</div>
  <div>Swings: <span id="hud-swings">0</span></div>
  <div>Chain Length: <span id="hud-chain-length">8.0</span> m</div>
</div>

<div id="controls">
  <label>Chain Length
    <input type="range" id="slider-chain" min="4" max="10" step="0.5" value="8">
    <span id="val-chain">8.0</span>
  </label>
  <label>Attach Point X
    <input type="range" id="slider-attach" min="-4" max="4" step="0.5" value="0">
    <span id="val-attach">0.0</span>
  </label>
  <label>Ball Mass
    <input type="range" id="slider-mass" min="20" max="100" step="5" value="50">
    <span id="val-mass">50</span>
  </label>
</div>

<div id="instructions">
  <kbd>Space</kbd> Hold to pull back, release to swing<br>
  <kbd>R</kbd> Rebuild wall<br>
  <kbd>N</kbd> Reset everything
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2; canvas2d.height = 256;
const ctx2d = canvas2d.getContext('2d');
const grad = ctx2d.createLinearGradient(0, 0, 0, 256);
grad.addColorStop(0, '#87CEEB');
grad.addColorStop(1, '#D4C5A9');
ctx2d.fillStyle = grad;
ctx2d.fillRect(0, 0, 2, 256);
const bgTex = new THREE.CanvasTexture(canvas2d);
scene.background = bgTex;

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(15, 10, 15);
camera.lookAt(0, 3, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 3, 0);

// Lights
const sunLight = new THREE.DirectionalLight(0xFFF5E0, 1.5);
sunLight.position.set(10, 20, 8);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -20; sunLight.shadow.camera.right = 20;
sunLight.shadow.camera.top = 20; sunLight.shadow.camera.bottom = -5;
sunLight.shadow.camera.near = 1; sunLight.shadow.camera.far = 50;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

const ambientLight = new THREE.AmbientLight(0xFFE4B5, 0.4);
scene.add(ambientLight);

const fillLight = new THREE.DirectionalLight(0x8899BB, 0.5);
fillLight.position.set(-10, 8, -8);
scene.add(fillLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(60, 60);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9, metalness: 0.1 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ============ CRANE ============
const steelMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.7 });

const poleGeo = new THREE.BoxGeometry(0.5, 12, 0.5);
const pole = new THREE.Mesh(poleGeo, steelMat);
pole.position.set(-8, 6, 0);
pole.castShadow = true;
scene.add(pole);

const boomGeo = new THREE.BoxGeometry(16, 0.4, 0.4);
const boom = new THREE.Mesh(boomGeo, steelMat);
boom.position.set(0, 12, 0);
boom.castShadow = true;
scene.add(boom);

// Diagonal support
const supportGeo = new THREE.BoxGeometry(0.2, 0.2, 10);
const support = new THREE.Mesh(supportGeo, steelMat);
const sx = -8, sy = 12, ex = -4, ey = 6;
support.position.set((sx+ex)/2, (sy+ey)/2, 0);
const angle = Math.atan2(sy - ey, ex - sx);
support.rotation.z = angle;
support.scale.z = 0.01;
const len = Math.sqrt((sx-ex)**2 + (sy-ey)**2);
support.scale.set(1, 1, 1);
support.geometry.dispose();
support.geometry = new THREE.BoxGeometry(len, 0.2, 0.2);
support.rotation.z = angle;
support.castShadow = true;
scene.add(support);

// ============ CRATE TEXTURE ============
function createCrateTexture() {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const cx = c.getContext('2d');
  cx.fillStyle = '#C4943A';
  cx.fillRect(0, 0, 128, 128);
  cx.strokeStyle = '#8B6914';
  cx.lineWidth = 4;
  cx.strokeRect(4, 4, 120, 120);
  cx.strokeRect(20, 20, 88, 88);
  cx.beginPath();
  cx.moveTo(4, 4); cx.lineTo(20, 20);
  cx.moveTo(124, 4); cx.lineTo(108, 20);
  cx.moveTo(4, 124); cx.lineTo(20, 108);
  cx.moveTo(124, 124); cx.lineTo(108, 108);
  cx.stroke();
  cx.lineWidth = 2;
  cx.beginPath();
  cx.moveTo(20, 64); cx.lineTo(108, 64);
  cx.moveTo(64, 20); cx.lineTo(64, 108);
  cx.stroke();
  // Add some noise/grain
  for (let i = 0; i < 300; i++) {
    const px = Math.random() * 128;
    const py = Math.random() * 128;
    cx.fillStyle = `rgba(0,0,0,${Math.random() * 0.15})`;
    cx.fillRect(px, py, 2, 2);
  }
  return new THREE.CanvasTexture(c);
}
const crateTexture = createCrateTexture();
crateTexture.wrapS = crateTexture.wrapT = THREE.RepeatWrapping;

// ============ PARAMETERS ============
let chainLength = 8;
let attachX = 0;
let ballMass = 50;
const N_PARTICLES = 15;
const BOX_COLS = 5;
const BOX_ROWS = 6;
const BOX_SIZE = 1.0;
const BOX_MASS = 2.0;
const GRAVITY = 9.81;
const DT = 0.008;
const CONSTRAINT_ITERS = 8;
const BALL_RADIUS = 0.8;
const RESTITUTION = 0.3;

let swingCount = 0;
let isPulledBack = false;
let wasPulledBack = false;
let isPaused = false;
let simTime = 0;
let frameCount = 0;

// ============ CHAIN (VERLET) ============
class Particle {
  constructor(x, y, z, pinned = false) {
    this.pos = new THREE.Vector3(x, y, z);
    this.oldPos = new THREE.Vector3(x, y, z);
    this.acc = new THREE.Vector3(0, 0, 0);
    this.pinned = pinned;
  }
}

let particles = [];
let chainMeshes = [];
let ballMesh;

const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 32, 24);
const ballMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.3, metalness: 0.8 });
ballMesh = new THREE.Mesh(ballGeo, ballMat);
ballMesh.castShadow = true;
scene.add(ballMesh);

function getAttachPoint() {
  return new THREE.Vector3(attachX, 12, 0);
}

function initChain() {
  // Remove old chain meshes
  chainMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); });
  chainMeshes = [];
  
  particles = [];
  const ap = getAttachPoint();
  const segLen = chainLength / N_PARTICLES;
  
  for (let i = 0; i <= N_PARTICLES; i++) {
    const t = i / N_PARTICLES;
    const p = new Particle(ap.x, ap.y - t * chainLength, ap.z, i === 0);
    particles.push(p);
  }
  
  // Create chain segment meshes
  const chainGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 6);
  const chainMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.3, metalness: 0.9 });
  
  for (let i = 0; i < N_PARTICLES; i++) {
    const mesh = new THREE.Mesh(chainGeo, chainMat);
    mesh.castShadow = true;
    scene.add(mesh);
    chainMeshes.push(mesh);
  }
}

function updateChainVisuals() {
  for (let i = 0; i < N_PARTICLES; i++) {
    const a = particles[i].pos;
    const b = particles[i + 1].pos;
    const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
    const dir = new THREE.Vector3().subVectors(b, a);
    const len = dir.length();
    
    chainMeshes[i].position.copy(mid);
    chainMeshes[i].scale.y = len;
    
    if (len > 0.001) {
      const up = new THREE.Vector3(0, 1, 0);
      const quat = new THREE.Quaternion().setFromUnitVectors(up, dir.normalize());
      chainMeshes[i].quaternion.copy(quat);
    }
  }
  
  // Ball at last particle
  const lastP = particles[particles.length - 1];
  ballMesh.position.copy(lastP.pos);
}

function simulateChain(dt) {
  const segLen = chainLength / N_PARTICLES;
  
  // Apply gravity and integrate
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.pinned) {
      p.pos.copy(getAttachPoint());
      p.oldPos.copy(p.pos);
      continue;
    }
    
    const vel = new THREE.Vector3().subVectors(p.pos, p.oldPos);
    vel.multiplyScalar(0.999); // damping
    
    p.oldPos.copy(p.pos);
    p.acc.set(0, -GRAVITY, 0);
    
    p.pos.add(vel);
    p.pos.addScaledVector(p.acc, dt * dt);
  }
  
  // Distance constraints
  for (let iter = 0; iter < CONSTRAINT_ITERS; iter++) {
    for (let i = 0; i < particles.length - 1; i++) {
      const a = particles[i];
      const b = particles[i + 1];
      const diff = new THREE.Vector3().subVectors(b.pos, a.pos);
      const dist = diff.length();
      if (dist < 0.0001) continue;
      const error = (dist - segLen) / dist;
      const correction = diff.multiplyScalar(error * 0.5);
      
      if (!a.pinned) a.pos.add(correction);
      if (!b.pinned) b.pos.sub(correction);
      if (a.pinned) b.pos.sub(correction);
      if (b.pinned) a.pos.add(correction);
    }
    
    // Floor constraint for ball (last particle)
    const last = particles[particles.length - 1];
    if (last.pos.y < BALL_RADIUS) {
      last.pos.y = BALL_RADIUS;
    }
    
    // Floor constraint for chain particles
    for (let i = 1; i < particles.length - 1; i++) {
      if (particles[i].pos.y < 0.05) {
        particles[i].pos.y = 0.05;
      }
    }
  }
}

function getBallVelocity(dt) {
  const last = particles[particles.length - 1];
  return new THREE.Vector3().subVectors(last.pos, last.oldPos).divideScalar(dt);
}

function getBallSpeed(dt) {
  return getBallVelocity(dt).length();
}

// ============ BOXES ============
class PhysBox {
  constructor(x, y, z) {
    this.origPos = new THREE.Vector3(x, y, z);
    this.pos = new THREE.Vector3(x, y, z);
    this.vel = new THREE.Vector3(0, 0, 0);
    this.quat = new THREE.Quaternion();
    this.angVel = new THREE.Vector3(0, 0, 0);
    this.mass = BOX_MASS;
    this.halfSize = BOX_SIZE / 2;
    this.isActive = true;
    
    const geo = new THREE.BoxGeometry(BOX_SIZE, BOX_SIZE, BOX_SIZE);
    const mat = new THREE.MeshStandardMaterial({ 
      map: crateTexture, roughness: 0.7, metalness: 0.1 
    });
    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.castShadow = true;
    this.mesh.receiveShadow = true;
    scene.add(this.mesh);
  }
  
  updateMesh() {
    this.mesh.position.copy(this.pos);
    this.mesh.quaternion.copy(this.quat);
  }
  
  dispose() {
    scene.remove(this.mesh);
    this.mesh.geometry.dispose();
    this.mesh.material.dispose();
  }
  
  isStanding() {
    const dx = Math.abs(this.pos.x - this.origPos.x);
    const dy = Math.abs(this.pos.y - this.origPos.y);
    const dz = Math.abs(this.pos.z - this.origPos.z);
    if (dx > 0.5 || dy > 0.5 || dz > 0.5) return false;
    
    // Check tilt: up vector through quaternion
    const up = new THREE.Vector3(0, 1, 0).applyQuaternion(this.quat);
    const dot = up.dot(new THREE.Vector3(0, 1, 0));
    return dot > Math.cos(30 * Math.PI / 180); // < 30 degrees tilt
  }
}

let boxes = [];

function initWall() {
  boxes.forEach(b => b.dispose());
  boxes = [];
  
  const wallX = 5;
  const startZ = -(BOX_COLS - 1) * BOX_SIZE / 2;
  
  for (let row = 0; row < BOX_ROWS; row++) {
    for (let col = 0; col < BOX_COLS; col++) {
      const x = wallX + (Math.random() - 0.5) * 0.04;
      const y = BOX_SIZE / 2 + row * BOX_SIZE + (Math.random() - 0.5) * 0.04;
      const z = startZ + col * BOX_SIZE + (Math.random() - 0.5) * 0.04;
      boxes.push(new PhysBox(x, y, z));
    }
  }
}

function simulateBoxes(dt) {
  const hs = BOX_SIZE / 2;
  
  for (const box of boxes) {
    // Gravity
    box.vel.y -= GRAVITY * dt;
    
    // Damping
    box.vel.multiplyScalar(0.98);
    box.angVel.multiplyScalar(0.95);
    
    // Integrate position
    box.pos.addScaledVector(box.vel, dt);
    
    // Integrate rotation
    if (box.angVel.lengthSq() > 0.0001) {
      const angSpeed = box.angVel.length();
      const axis = box.angVel.clone().normalize();
      const dq = new THREE.Quaternion().setFromAxisAngle(axis, angSpeed * dt);
      box.quat.premultiply(dq);
      box.quat.normalize();
    }
    
    // Floor collision
    if (box.pos.y < hs) {
      box.pos.y = hs;
      if (box.vel.y < 0) {
        box.vel.y *= -RESTITUTION;
        // Friction
        box.vel.x *= 0.6;
        box.vel.z *= 0.6;
        box.angVel.multiplyScalar(0.8);
      }
    }
    
    // Keep in bounds
    if (box.pos.x < -25) box.pos.x = -25;
    if (box.pos.x > 25) box.pos.x = 25;
    if (box.pos.z < -25) box.pos.z = -25;
    if (box.pos.z > 25) box.pos.z = 25;
  }
  
  // Box-box collisions (AABB)
  for (let i = 0; i < boxes.length; i++) {
    for (let j = i + 1; j < boxes.length; j++) {
      const a = boxes[i];
      const b = boxes[j];
      
      const dx = a.pos.x - b.pos.x;
      const dy = a.pos.y - b.pos.y;
      const dz = a.pos.z - b.pos.z;
      
      const overlapX = BOX_SIZE - Math.abs(dx);
      const overlapY = BOX_SIZE - Math.abs(dy);
      const overlapZ = BOX_SIZE - Math.abs(dz);
      
      if (overlapX > 0 && overlapY > 0 && overlapZ > 0) {
        // Find minimum penetration axis
        let minOverlap = overlapX;
        let normal = new THREE.Vector3(dx > 0 ? 1 : -1, 0, 0);
        
        if (overlapY < minOverlap) {
          minOverlap = overlapY;
          normal.set(0, dy > 0 ? 1 : -1, 0);
        }
        if (overlapZ < minOverlap) {
          minOverlap = overlapZ;
          normal.set(0, 0, dz > 0 ? 1 : -1);
        }
        
        // Separate
        const sep = minOverlap * 0.5;
        a.pos.addScaledVector(normal, sep);
        b.pos.addScaledVector(normal, -sep);
        
        // Relative velocity
        const relVel = new THREE.Vector3().subVectors(a.vel, b.vel);
        const velAlongNormal = relVel.dot(normal);
        
        if (velAlongNormal < 0) {
          const e = 0.2;
          const j = -(1 + e) * velAlongNormal / (1 / a.mass + 1 / b.mass);
          const impulse = normal.clone().multiplyScalar(j);
          a.vel.addScaledVector(impulse, 1 / a.mass);
          b.vel.addScaledVector(impulse, -1 / b.mass);
          
          // Friction
          const tangent = relVel.clone().addScaledVector(normal, -velAlongNormal);
          if (tangent.lengthSq() > 0.0001) {
            tangent.normalize();
            const jt = -relVel.dot(tangent) / (1 / a.mass + 1 / b.mass);
            const mu = 0.4;
            const maxFriction = mu * Math.abs(j);
            const frictionJ = Math.max(-maxFriction, Math.min(maxFriction, jt));
            const frictionImpulse = tangent.multiplyScalar(frictionJ);
            a.vel.addScaledVector(frictionImpulse, 1 / a.mass);
            b.vel.addScaledVector(frictionImpulse, -1 / b.mass);
          }
          
          // Angular impulse (simplified)
          const contactA = normal.clone().multiplyScalar(-hs);
          const torqueA = new THREE.Vector3().crossVectors(contactA, impulse.clone().multiplyScalar(1/a.mass));
          a.angVel.addScaledVector(torqueA, 0.3);
          
          const contactB = normal.clone().multiplyScalar(hs);
          const torqueB = new THREE.Vector3().crossVectors(contactB, impulse.clone().multiplyScalar(-1/b.mass));
          b.angVel.addScaledVector(torqueB, 0.3);
        }
      }
    }
  }
}

// ============ BALL-BOX COLLISION ============
function ballBoxCollisions(dt) {
  const ballP = particles[particles.length - 1];
  const ballPos = ballP.pos;
  const ballVel = new THREE.Vector3().subVectors(ballP.pos, ballP.oldPos).divideScalar(dt);
  
  for (const box of boxes) {
    // Sphere-AABB test
    const hs = BOX_SIZE / 2;
    const closest = new THREE.Vector3(
      Math.max(box.pos.x - hs, Math.min(ballPos.x, box.pos.x + hs)),
      Math.max(box.pos.y - hs, Math.min(ballPos.y, box.pos.y + hs)),
      Math.max(box.pos.z - hs, Math.min(ballPos.z, box.pos.z + hs))
    );
    
    const diff = new THREE.Vector3().subVectors(ballPos, closest);
    const dist = diff.length();
    
    if (dist < BALL_RADIUS && dist > 0.0001) {
      const normal = diff.normalize();
      const penetration = BALL_RADIUS - dist;
      
      // Separate
      ballP.pos.addScaledVector(normal, penetration * 0.3);
      box.pos.addScaledVector(normal, -penetration * 0.7);
      
      // Relative velocity
      const relVel = new THREE.Vector3().subVectors(ballVel, box.vel);
      const velAlongNormal = relVel.dot(normal);
      
      if (velAlongNormal < 0) {
        const e = RESTITUTION;
        const j = -(1 + e) * velAlongNormal / (1 / ballMass + 1 / box.mass);
        const impulse = normal.clone().multiplyScalar(j);
        
        // Apply to box
        box.vel.addScaledVector(impulse, 1 / box.mass);
        
        // Apply reaction to ball (via Verlet - adjust oldPos)
        const ballImpulseVel = impulse.clone().multiplyScalar(-1 / ballMass);
        ballP.oldPos.addScaledVector(ballImpulseVel, -dt);
        
        // Angular impulse on box
        const contactPoint = closest.clone().sub(box.pos);
        const torque = new THREE.Vector3().crossVectors(contactPoint, impulse.clone().multiplyScalar(1/box.mass));
        const I_box = box.mass * BOX_SIZE * BOX_SIZE / 6; // moment of inertia of cube
        box.angVel.addScaledVector(torque, 1 / I_box);
      }
    }
  }
}

// ============ PULL BACK MECHANICS ============
function pullBackBall() {
  const ap = getAttachPoint();
  const targetX = ap.x - chainLength * 0.7;
  const targetY = ap.y - chainLength * 0.3;
  const targetZ = 0;
  
  const last = particles[particles.length - 1];
  const target = new THREE.Vector3(targetX, targetY, targetZ);
  
  // Smoothly move toward target
  last.pos.lerp(target, 0.1);
  last.oldPos.copy(last.pos);
  
  // Also adjust intermediate particles
  for (let i = 1; i < particles.length - 1; i++) {
    const t = i / (particles.length - 1);
    const ap2 = getAttachPoint();
    const interp = new THREE.Vector3().lerpVectors(ap2, target, t);
    particles[i].pos.lerp(interp, 0.05);
    particles[i].oldPos.copy(particles[i].pos);
  }
}

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (!isPulledBack) {
      isPulledBack = true;
    }
  }
  if (e.code === 'KeyR') {
    initWall();
  }
  if (e.code === 'KeyN') {
    initWall();
    initChain();
    swingCount = 0;
    simTime = 0;
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
  if (e.code === 'Space') {
    if (isPulledBack) {
      isPulledBack = false;
      wasPulledBack = true;
      swingCount++;
    }
  }
});

// Sliders
const sliderChain = document.getElementById('slider-chain');
const sliderAttach = document.getElementById('slider-attach');
const sliderMass = document.getElementById('slider-mass');

sliderChain.addEventListener('input', () => {
  chainLength = parseFloat(sliderChain.value);
  document.getElementById('val-chain').textContent = chainLength.toFixed(1);
  initChain();
});

sliderAttach.addEventListener('input', () => {
  attachX = parseFloat(sliderAttach.value);
  document.getElementById('val-attach').textContent = attachX.toFixed(1);
  initChain();
});

sliderMass.addEventListener('input', () => {
  ballMass = parseFloat(sliderMass.value);
  document.getElementById('val-mass').textContent = ballMass;
});

// ============ INIT ============
initChain();
initWall();

// ============ STATE ============
window.__3D_STATE__ = {
  frameCount: 0,
  boxesStanding: 30,
  boxesFallen: 0,
  totalBoxes: 30,
  ballPos: { x: 0, y: 0, z: 0 },
  ballSpeed: 0,
  ballMass: ballMass,
  chainLength: chainLength,
  attachX: attachX,
  swingCount: 0,
  isPulledBack: false,
  particleCount: N_PARTICLES + 1,
  isPaused: false,
  simTime: 0
};

function updateState() {
  let standing = 0;
  let fallen = 0;
  for (const box of boxes) {
    if (box.isStanding()) standing++;
    else fallen++;
  }
  
  const bp = particles[particles.length - 1].pos;
  const speed = getBallSpeed(DT);
  
  window.__3D_STATE__ = {
    frameCount: frameCount,
    boxesStanding: standing,
    boxesFallen: fallen,
    totalBoxes: boxes.length,
    ballPos: { x: bp.x, y: bp.y, z: bp.z },
    ballSpeed: speed,
    ballMass: ballMass,
    chainLength: chainLength,
    attachX: attachX,
    swingCount: swingCount,
    isPulledBack: isPulledBack,
    particleCount: particles.length,
    isPaused: isPaused,
    simTime: simTime
  };
  
  // Update HUD
  document.getElementById('hud-boxes-standing').textContent = standing;
  document.getElementById('hud-boxes-fallen').textContent = fallen;
  document.getElementById('hud-ball-speed').textContent = speed.toFixed(1);
  document.getElementById('hud-ball-height').textContent = bp.y.toFixed(1);
  document.getElementById('hud-swings').textContent = swingCount;
  document.getElementById('hud-chain-length').textContent = chainLength.toFixed(1);
}

// ============ ANIMATION LOOP ============
const SUBSTEPS = 3;

function animate() {
  requestAnimationFrame(animate);
  frameCount++;
  
  if (!isPaused) {
    for (let s = 0; s < SUBSTEPS; s++) {
      if (isPulledBack) {
        pullBackBall();
        // Still run constraints
        const segLen = chainLength / N_PARTICLES;
        for (let iter = 0; iter < CONSTRAINT_ITERS; iter++) {
          for (let i = 0; i < particles.length - 1; i++) {
            const a = particles[i];
            const b = particles[i + 1];
            const diff = new THREE.Vector3().subVectors(b.pos, a.pos);
            const dist = diff.length();
            if (dist < 0.0001) continue;
            const error = (dist - segLen) / dist;
            const correction = diff.multiplyScalar(error * 0.5);
            if (!a.pinned) a.pos.add(correction);
            if (!b.pinned) b.pos.sub(correction);
            if (a.pinned) b.pos.sub(correction);
          }
        }
      } else {
        simulateChain(DT);
      }
      
      simulateBoxes(DT);
      ballBoxCollisions(DT);
      
      simTime += DT;
    }
  }
  
  // Update visuals
  updateChainVisuals();
  for (const box of boxes) {
    box.updateMesh();
  }
  
  updateState();
  controls.update();
  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
