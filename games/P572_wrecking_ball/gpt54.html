<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Wrecking Ball Demolition</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #111;
    }

    body {
      position: relative;
    }

    #bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, #D4C5A9 0%, #b8c3c8 35%, #87CEEB 100%);
      z-index: 0;
    }

    canvas {
      display: block;
      position: relative;
      z-index: 1;
    }

    #hud, #controls {
      position: absolute;
      left: 12px;
      color: #fff;
      background: rgba(20, 20, 20, 0.45);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 12px;
      z-index: 2;
      min-width: 240px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.2);
    }

    #hud { top: 12px; }
    #controls { top: 220px; }

    #hud h3, #controls h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .row {
      margin: 4px 0;
      font-size: 13px;
      line-height: 1.35;
    }

    .control-group {
      margin: 8px 0 10px 0;
    }

    .control-group label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .control-group input[type="range"] {
      width: 220px;
    }

    .hint {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 6px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="bg"></div>

  <div id="hud">
    <h3>Demolition HUD</h3>
    <div class="row" id="hud-boxes-standing">Boxes standing: 0</div>
    <div class="row" id="hud-boxes-fallen">Boxes fallen: 0</div>
    <div class="row" id="hud-ball-speed">Ball speed: 0.0 m/s</div>
    <div class="row" id="hud-ball-height">Ball height: 0.0</div>
    <div class="row" id="hud-swings">Swings: 0</div>
    <div class="row" id="hud-chain-length">Chain length: 8.0</div>
  </div>

  <div id="controls">
    <h3>Controls</h3>

    <div class="control-group">
      <label for="slider-chain">Chain Length: <span id="value-chain">8.0</span></label>
      <input id="slider-chain" type="range" min="4" max="10" step="0.5" value="8">
    </div>

    <div class="control-group">
      <label for="slider-attach">Attachment X: <span id="value-attach">0.0</span></label>
      <input id="slider-attach" type="range" min="-4" max="4" step="0.5" value="0">
    </div>

    <div class="control-group">
      <label for="slider-mass">Ball Mass: <span id="value-mass">50</span> kg</label>
      <input id="slider-mass" type="range" min="20" max="100" step="5" value="50">
    </div>

    <div class="hint">
      Hold <b>Space</b> to pull back, release to swing<br>
      Press <b>R</b> to rebuild wall<br>
      Press <b>N</b> to reset everything
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // -----------------------------
    // Basic Setup
    // -----------------------------
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xcbb99b, 30, 70);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(15, 10, 15);
    camera.lookAt(0, 3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 3, 0);
    controls.enableDamping = true;

    // -----------------------------
    // Lighting
    // -----------------------------
    const ambient = new THREE.AmbientLight(0xffe2b8, 0.55);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xfff1d2, 1.2);
    sun.position.set(10, 18, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -25;
    sun.shadow.camera.right = 25;
    sun.shadow.camera.top = 25;
    sun.shadow.camera.bottom = -25;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 60;
    scene.add(sun);

    const fill = new THREE.DirectionalLight(0xbfd6ff, 0.45);
    fill.position.set(-12, 8, -10);
    scene.add(fill);

    // -----------------------------
    // Ground
    // -----------------------------
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x8a8a86,
      roughness: 0.95,
      metalness: 0.05
    });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // -----------------------------
    // Crane
    // -----------------------------
    const craneMaterial = new THREE.MeshStandardMaterial({
      color: 0x44484d,
      roughness: 0.6,
      metalness: 0.7
    });

    const pole = new THREE.Mesh(new THREE.BoxGeometry(0.5, 12, 0.5), craneMaterial);
    pole.position.set(-8, 6, 0);
    pole.castShadow = true;
    pole.receiveShadow = true;
    scene.add(pole);

    const boom = new THREE.Mesh(new THREE.BoxGeometry(16, 0.4, 0.4), craneMaterial);
    boom.position.set(0, 12, 0);
    boom.castShadow = true;
    boom.receiveShadow = true;
    scene.add(boom);

    const attachMarker = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 12, 12),
      new THREE.MeshStandardMaterial({ color: 0xffaa33, emissive: 0x442200 })
    );
    attachMarker.castShadow = true;
    scene.add(attachMarker);

    // -----------------------------
    // Texture / Materials
    // -----------------------------
    const texLoader = new THREE.TextureLoader();
    const crateTexture = texLoader.load(
      'https://threejs.org/examples/textures/crate.gif'
    );
    crateTexture.colorSpace = THREE.SRGBColorSpace;
    crateTexture.wrapS = crateTexture.wrapT = THREE.RepeatWrapping;

    const boxMaterial = new THREE.MeshStandardMaterial({
      map: crateTexture,
      roughness: 0.75,
      metalness: 0.02
    });

    const ballMaterial = new THREE.MeshStandardMaterial({
      color: 0x3f4348,
      roughness: 0.4,
      metalness: 0.85
    });

    const chainMaterial = new THREE.MeshStandardMaterial({
      color: 0x2c2f33,
      roughness: 0.6,
      metalness: 0.8
    });

    // -----------------------------
    // Constants / State
    // -----------------------------
    const G = 9.81;
    const DT = 0.008;
    const SUBSTEPS = 2;
    const CONSTRAINT_ITERS = 8;

    const BOX_SIZE = 1;
    const BOX_HALF = BOX_SIZE * 0.5;
    const BOX_MASS = 2.0;
    const BALL_RADIUS = 0.8;

    let frameCount = 0;
    let simTime = 0;
    let swingCount = 0;
    let isPaused = false;
    let isPulledBack = false;

    let chainLength = 8;
    let attachX = 0;
    let ballMass = 50;
    const particleCount = 15;

    const attachPoint = new THREE.Vector3(attachX, 12, 0);

    // -----------------------------
    // Chain particles
    // -----------------------------
    let particles = [];
    let segmentLength = chainLength / particleCount;

    function initChain(atRest = true) {
      particles = [];
      segmentLength = chainLength / particleCount;

      for (let i = 0; i < particleCount; i++) {
        const pos = new THREE.Vector3(
          attachPoint.x,
          attachPoint.y - i * segmentLength,
          0
        );
        particles.push({
          pos: pos.clone(),
          oldPos: pos.clone(),
          acc: new THREE.Vector3(),
          pinned: i === 0
        });
      }

      if (!atRest) {
        pullBackBall();
      }
    }

    function pullBackBall() {
      isPulledBack = true;
      const target = new THREE.Vector3(
        attachPoint.x - chainLength * 0.7,
        attachPoint.y - chainLength * 0.3,
        0
      );

      for (let i = 0; i < particleCount; i++) {
        const t = i / (particleCount - 1);
        const p = new THREE.Vector3().lerpVectors(attachPoint, target, t);
        particles[i].pos.copy(p);
        particles[i].oldPos.copy(p);
      }
      particles[0].pos.copy(attachPoint);
      particles[0].oldPos.copy(attachPoint);
    }

    // -----------------------------
    // Chain render
    // -----------------------------
    const chainGroup = new THREE.Group();
    scene.add(chainGroup);
    const chainSegments = [];
    const segmentGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 8);

    for (let i = 0; i < particleCount - 1; i++) {
      const seg = new THREE.Mesh(segmentGeo, chainMaterial);
      seg.castShadow = true;
      seg.receiveShadow = true;
      chainGroup.add(seg);
      chainSegments.push(seg);
    }

    const ballMesh = new THREE.Mesh(
      new THREE.SphereGeometry(BALL_RADIUS, 32, 32),
      ballMaterial
    );
    ballMesh.castShadow = true;
    ballMesh.receiveShadow = true;
    scene.add(ballMesh);

    // -----------------------------
    // Wall / boxes
    // -----------------------------
    const boxes = [];
    const wallGroup = new THREE.Group();
    scene.add(wallGroup);

    const boxGeo = new THREE.BoxGeometry(1, 1, 1);

    function createBoxBody(x, y, z, row, col) {
      const mesh = new THREE.Mesh(boxGeo, boxMaterial);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.set(x, y, z);
      wallGroup.add(mesh);

      const body = {
        mesh,
        size: new THREE.Vector3(1, 1, 1),
        half: new THREE.Vector3(0.5, 0.5, 0.5),
        position: new THREE.Vector3(x, y, z),
        velocity: new THREE.Vector3(),
        rotation: new THREE.Euler(0, 0, 0),
        quaternion: new THREE.Quaternion(),
        angularVelocity: new THREE.Vector3(),
        mass: BOX_MASS,
        invMass: 1 / BOX_MASS,
        isStatic: false,
        originalPosition: new THREE.Vector3(x, y, z),
        row,
        col
      };
      return body;
    }

    function clearWall() {
      while (wallGroup.children.length) {
        const c = wallGroup.children.pop();
        c.geometry.dispose?.();
      }
      boxes.length = 0;
    }

    function rebuildWall() {
      clearWall();

      const cols = 5;
      const rows = 6;
      const x = 5;
      const zSpacing = 1.05;
      const ySpacing = 1.0;
      const zStart = -(cols - 1) * zSpacing * 0.5;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const jitterX = (Math.random() * 0.04 - 0.02);
          const jitterY = (Math.random() * 0.04 - 0.02);
          const jitterZ = (Math.random() * 0.04 - 0.02);

          const bx = x + jitterX;
          const by = 0.5 + row * ySpacing + jitterY;
          const bz = zStart + col * zSpacing + jitterZ;

          boxes.push(createBoxBody(bx, by, bz, row, col));
        }
      }
    }

    // -----------------------------
    // Physics helpers
    // -----------------------------
    const tempVec = new THREE.Vector3();
    const tempVec2 = new THREE.Vector3();
    const tempVec3 = new THREE.Vector3();
    const tempQuat = new THREE.Quaternion();
    const boxInertia = (1 / 6) * BOX_MASS * (BOX_SIZE * BOX_SIZE + BOX_SIZE * BOX_SIZE);

    function getBallPosition() {
      return particles[particleCount - 1].pos;
    }

    function getBallVelocity() {
      return tempVec.subVectors(
        particles[particleCount - 1].pos,
        particles[particleCount - 1].oldPos
      ).divideScalar(DT);
    }

    function applyReactionToBall(normal, impulseMag) {
      const reaction = tempVec2.copy(normal).multiplyScalar((impulseMag / Math.max(ballMass, 1)) * 0.22 * DT);
      for (let i = Math.max(1, particleCount - 3); i < particleCount; i++) {
        particles[i].oldPos.add(reaction);
      }
    }

    function satisfyChainConstraints() {
      particles[0].pos.copy(attachPoint);

      for (let iter = 0; iter < CONSTRAINT_ITERS; iter++) {
        particles[0].pos.copy(attachPoint);

        for (let i = 0; i < particleCount - 1; i++) {
          const p1 = particles[i];
          const p2 = particles[i + 1];

          tempVec.subVectors(p2.pos, p1.pos);
          const dist = tempVec.length() || 1e-6;
          const error = dist - segmentLength;
          const corr = tempVec.multiplyScalar(error / dist);

          if (p1.pinned) {
            p2.pos.addScaledVector(corr, -1);
          } else {
            p1.pos.addScaledVector(corr, 0.5);
            p2.pos.addScaledVector(corr, -0.5);
          }
        }

        particles[0].pos.copy(attachPoint);
      }
    }

    function stepChain(dt) {
      if (isPulledBack) {
        pullBackBall();
        return;
      }

      for (let i = 1; i < particleCount; i++) {
        const p = particles[i];
        p.acc.set(0, -G, 0);

        const current = p.pos.clone();
        const vel = p.pos.clone().sub(p.oldPos).multiplyScalar(0.999);
        p.pos.add(vel).addScaledVector(p.acc, dt * dt);
        p.oldPos.copy(current);
      }

      satisfyChainConstraints();

      const bp = getBallPosition();
      if (bp.y < BALL_RADIUS) {
        bp.y = BALL_RADIUS;
        const p = particles[particleCount - 1];
        const vx = p.pos.x - p.oldPos.x;
        const vz = p.pos.z - p.oldPos.z;
        p.oldPos.set(
          p.pos.x - vx * 0.92,
          p.pos.y,
          p.pos.z - vz * 0.92
        );
      }
    }

    function boxAABBOverlap(a, b) {
      const dx = b.position.x - a.position.x;
      const px = (a.half.x + b.half.x) - Math.abs(dx);
      if (px <= 0) return null;

      const dy = b.position.y - a.position.y;
      const py = (a.half.y + b.half.y) - Math.abs(dy);
      if (py <= 0) return null;

      const dz = b.position.z - a.position.z;
      const pz = (a.half.z + b.half.z) - Math.abs(dz);
      if (pz <= 0) return null;

      return { dx, dy, dz, px, py, pz };
    }

    function resolveBoxBox(a, b) {
      const o = boxAABBOverlap(a, b);
      if (!o) return;

      let normal = new THREE.Vector3();
      let penetration = o.px;

      if (o.px <= o.py && o.px <= o.pz) {
        normal.set(Math.sign(o.dx) || 1, 0, 0);
        penetration = o.px;
      } else if (o.py <= o.px && o.py <= o.pz) {
        normal.set(0, Math.sign(o.dy) || 1, 0);
        penetration = o.py;
      } else {
        normal.set(0, 0, Math.sign(o.dz) || 1);
        penetration = o.pz;
      }

      const totalInvMass = a.invMass + b.invMass;
      if (totalInvMass <= 0) return;

      const correction = penetration / totalInvMass;
      a.position.addScaledVector(normal, -correction * a.invMass * 0.5);
      b.position.addScaledVector(normal, correction * b.invMass * 0.5);

      tempVec.subVectors(b.velocity, a.velocity);
      const velAlongNormal = tempVec.dot(normal);
      if (velAlongNormal > 0) return;

      const e = 0.08;
      let j = -(1 + e) * velAlongNormal;
      j /= totalInvMass;

      const impulse = tempVec2.copy(normal).multiplyScalar(j);
      a.velocity.addScaledVector(impulse, -a.invMass);
      b.velocity.addScaledVector(impulse, b.invMass);

      const tangent = tempVec3.copy(tempVec).sub(normal.clone().multiplyScalar(velAlongNormal));
      if (tangent.lengthSq() > 1e-8) {
        tangent.normalize();
        let jt = -tempVec.dot(tangent);
        jt /= totalInvMass;
        const mu = 0.4;
        jt = THREE.MathUtils.clamp(jt, -j * mu, j * mu);

        const frictionImpulse = tangent.multiplyScalar(jt);
        a.velocity.addScaledVector(frictionImpulse, -a.invMass);
        b.velocity.addScaledVector(frictionImpulse, b.invMass);
      }

      const contactOffsetA = b.position.clone().sub(a.position).multiplyScalar(0.5);
      const contactOffsetB = a.position.clone().sub(b.position).multiplyScalar(0.5);
      a.angularVelocity.add(contactOffsetA.cross(impulse).multiplyScalar(1 / boxInertia * 0.05));
      b.angularVelocity.add(contactOffsetB.cross(impulse).multiplyScalar(1 / boxInertia * 0.05));
    }

    function resolveBallBox(box) {
      const ballPos = getBallPosition();
      const closest = new THREE.Vector3(
        THREE.MathUtils.clamp(ballPos.x, box.position.x - BOX_HALF, box.position.x + BOX_HALF),
        THREE.MathUtils.clamp(ballPos.y, box.position.y - BOX_HALF, box.position.y + BOX_HALF),
        THREE.MathUtils.clamp(ballPos.z, box.position.z - BOX_HALF, box.position.z + BOX_HALF)
      );

      const diff = tempVec.subVectors(ballPos, closest);
      const distSq = diff.lengthSq();

      if (distSq > BALL_RADIUS * BALL_RADIUS) return;

      let normal;
      let dist = Math.sqrt(Math.max(distSq, 1e-8));
      if (dist < 1e-4) {
        normal = new THREE.Vector3().subVectors(ballPos, box.position);
        if (normal.lengthSq() < 1e-8) normal.set(1, 0.2, 0);
        normal.normalize();
        dist = 0.0001;
      } else {
        normal = diff.clone().divideScalar(dist);
      }

      const penetration = BALL_RADIUS - dist;
      box.position.addScaledVector(normal, penetration + 0.001);

      const ballVel = getBallVelocity().clone();
      const relVel = ballVel.clone().sub(box.velocity);
      const vRelDotN = relVel.dot(normal);

      if (vRelDotN >= 0) return;

      const e = 0.3;
      const j = -(1 + e) * vRelDotN / ((1 / ballMass) + (1 / box.mass));
      const impulse = normal.clone().multiplyScalar(j);

      box.velocity.addScaledVector(impulse, 1 / box.mass);

      const contactPoint = closest.clone();
      const r = contactPoint.sub(box.position);
      const angularImpulse = r.clone().cross(impulse).multiplyScalar(1 / boxInertia);
      box.angularVelocity.add(angularImpulse);

      const scatter = new THREE.Vector3(
        (Math.random() - 0.5) * 0.6,
        Math.random() * 0.25,
        (Math.random() - 0.5) * 0.6
      );
      box.velocity.add(scatter);

      applyReactionToBall(normal, j);
    }

    function stepBoxes(dt) {
      for (const b of boxes) {
        if (b.isStatic) continue;

        b.velocity.y -= G * dt;

        b.position.addScaledVector(b.velocity, dt);

        b.rotation.x += b.angularVelocity.x * dt;
        b.rotation.y += b.angularVelocity.y * dt;
        b.rotation.z += b.angularVelocity.z * dt;

        if (b.position.y < BOX_HALF) {
          b.position.y = BOX_HALF;

          if (b.velocity.y < 0) b.velocity.y *= -0.08;

          b.velocity.x *= 0.6;
          b.velocity.z *= 0.6;

          const floorMu = 0.6;
          b.angularVelocity.x *= (1 - floorMu * 0.08);
          b.angularVelocity.z *= (1 - floorMu * 0.08);
        }

        b.velocity.multiplyScalar(0.98);
        b.angularVelocity.multiplyScalar(0.95);

        if (
          b.position.y <= BOX_HALF + 0.01 &&
          b.velocity.lengthSq() < 0.0008 &&
          b.angularVelocity.lengthSq() < 0.0008
        ) {
          b.velocity.set(0, 0, 0);
          b.angularVelocity.set(0, 0, 0);
        }
      }

      for (let i = 0; i < boxes.length; i++) {
        for (let j = i + 1; j < boxes.length; j++) {
          resolveBoxBox(boxes[i], boxes[j]);
        }
      }

      for (const b of boxes) {
        resolveBallBox(b);
      }

      for (const b of boxes) {
        tempQuat.setFromEuler(b.rotation);
        b.quaternion.copy(tempQuat);
        b.mesh.position.copy(b.position);
        b.mesh.quaternion.copy(b.quaternion);
      }
    }

    function updateChainMeshes() {
      for (let i = 0; i < chainSegments.length; i++) {
        const a = particles[i].pos;
        const b = particles[i + 1].pos;
        const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
        const dir = new THREE.Vector3().subVectors(b, a);
        const len = dir.length();

        chainSegments[i].position.copy(mid);
        chainSegments[i].scale.set(1, len, 1);
        chainSegments[i].quaternion.setFromUnitVectors(
          new THREE.Vector3(0, 1, 0),
          dir.normalize()
        );
      }

      ballMesh.position.copy(getBallPosition());
      attachMarker.position.copy(attachPoint);
    }

    // -----------------------------
    // Classification / HUD / State
    // -----------------------------
    function boxTiltDegrees(box) {
      const up = new THREE.Vector3(0, 1, 0).applyQuaternion(box.quaternion);
      const dot = THREE.MathUtils.clamp(up.dot(new THREE.Vector3(0, 1, 0)), -1, 1);
      return THREE.MathUtils.radToDeg(Math.acos(dot));
    }

    function classifyBoxes() {
      let standing = 0;
      let fallen = 0;

      for (const b of boxes) {
        const tilt = boxTiltDegrees(b);
        const inPos =
          Math.abs(b.position.x - b.originalPosition.x) <= 0.5 &&
          Math.abs(b.position.z - b.originalPosition.z) <= 0.5 &&
          Math.abs(b.position.y - b.originalPosition.y) <= 0.5 &&
          tilt < 30;

        if (inPos) standing++;
        else fallen++;
      }

      return { standing, fallen };
    }

    const hudStanding = document.getElementById('hud-boxes-standing');
    const hudFallen = document.getElementById('hud-boxes-fallen');
    const hudBallSpeed = document.getElementById('hud-ball-speed');
    const hudBallHeight = document.getElementById('hud-ball-height');
    const hudSwings = document.getElementById('hud-swings');
    const hudChainLength = document.getElementById('hud-chain-length');

    function updateHUD() {
      const cls = classifyBoxes();
      const ballPos = getBallPosition();
      const speed = getBallVelocity().length();

      hudStanding.textContent = `Boxes standing: ${cls.standing}`;
      hudFallen.textContent = `Boxes fallen: ${cls.fallen}`;
      hudBallSpeed.textContent = `Ball speed: ${speed.toFixed(1)} m/s`;
      hudBallHeight.textContent = `Ball height: ${ballPos.y.toFixed(1)}`;
      hudSwings.textContent = `Swings: ${swingCount}`;
      hudChainLength.textContent = `Chain length: ${chainLength.toFixed(1)}`;

      window.__3D_STATE__ = {
        frameCount,
        boxesStanding: cls.standing,
        boxesFallen: cls.fallen,
        totalBoxes: 30,
        ballPos: { x: ballPos.x, y: ballPos.y, z: ballPos.z },
        ballSpeed: speed,
        ballMass: ballMass,
        chainLength: chainLength,
        attachX: attachX,
        swingCount: swingCount,
        isPulledBack: isPulledBack,
        particleCount: particleCount,
        isPaused: isPaused,
        simTime: simTime
      };
    }

    // -----------------------------
    // UI
    // -----------------------------
    const sliderChain = document.getElementById('slider-chain');
    const sliderAttach = document.getElementById('slider-attach');
    const sliderMass = document.getElementById('slider-mass');

    const valueChain = document.getElementById('value-chain');
    const valueAttach = document.getElementById('value-attach');
    const valueMass = document.getElementById('value-mass');

    function syncUI() {
      valueChain.textContent = Number(chainLength).toFixed(1);
      valueAttach.textContent = Number(attachX).toFixed(1);
      valueMass.textContent = String(ballMass);
    }

    sliderChain.addEventListener('input', () => {
      chainLength = parseFloat(sliderChain.value);
      segmentLength = chainLength / particleCount;
      syncUI();
      if (isPulledBack) pullBackBall();
    });

    sliderAttach.addEventListener('input', () => {
      attachX = parseFloat(sliderAttach.value);
      attachPoint.set(attachX, 12, 0);
      syncUI();
      if (isPulledBack) pullBackBall();
    });

    sliderMass.addEventListener('input', () => {
      ballMass = parseFloat(sliderMass.value);
      syncUI();
    });

    // -----------------------------
    // Reset functions
    // -----------------------------
    function resetBall(rest = true) {
      attachPoint.set(attachX, 12, 0);
      initChain(rest);
    }

    function resetEverything() {
      swingCount = 0;
      isPulledBack = false;
      resetBall(true);
      rebuildWall();
    }

    // -----------------------------
    // Input
    // -----------------------------
    const keysDown = new Set();

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!keysDown.has('Space')) {
          keysDown.add('Space');
          pullBackBall();
        }
      }

      if (e.code === 'KeyR') {
        rebuildWall();
      }

      if (e.code === 'KeyN') {
        resetEverything();
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (keysDown.has('Space')) {
          keysDown.delete('Space');
          if (isPulledBack) {
            isPulledBack = false;
            swingCount++;
          }
        }
      }
    });

    // -----------------------------
    // Resize
    // -----------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // -----------------------------
    // Init
    // -----------------------------
    rebuildWall();
    resetBall(true);
    syncUI();
    updateChainMeshes();
    updateHUD();

    // -----------------------------
    // Animation
    // -----------------------------
    function animate() {
      requestAnimationFrame(animate);

      frameCount++;

      if (!isPaused) {
        for (let s = 0; s < SUBSTEPS; s++) {
          stepChain(DT);
          stepBoxes(DT);
          simTime += DT;
        }
      }

      updateChainMeshes();
      updateHUD();
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
