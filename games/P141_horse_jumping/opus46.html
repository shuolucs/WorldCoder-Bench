<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horse Jumping Race</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #fff;
  background: rgba(0,0,0,0.7);
  padding: 16px 24px;
  border-radius: 12px;
  font-size: 16px;
  line-height: 1.8;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  min-width: 200px;
}
#hud .label { color: #aaa; font-size: 13px; }
#hud .value { color: #fff; font-weight: bold; font-size: 18px; }
#hud .score-val { color: #ffd700; font-size: 22px; }
#hud .fault-val { color: #ff6b6b; }
#instructions {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  background: rgba(0,0,0,0.7);
  padding: 12px 28px;
  border-radius: 30px;
  font-size: 16px;
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(8px);
  text-align: center;
}
#instructions kbd {
  background: rgba(255,255,255,0.2);
  padding: 3px 10px;
  border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.3);
}
#message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-size: 36px;
  font-weight: bold;
  text-shadow: 0 0 20px rgba(0,0,0,0.8);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
#startScreen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  z-index: 100;
}
#startScreen h1 { font-size: 48px; margin-bottom: 20px; color: #ffd700; }
#startScreen p { font-size: 18px; margin-bottom: 30px; color: #ccc; }
#startBtn {
  padding: 14px 40px;
  font-size: 20px;
  background: #ffd700;
  color: #000;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  transition: transform 0.2s;
}
#startBtn:hover { transform: scale(1.05); }
#endScreen {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  z-index: 100;
}
#endScreen h1 { font-size: 42px; margin-bottom: 10px; color: #ffd700; }
#endScreen .final-score { font-size: 64px; font-weight: bold; color: #ffd700; margin: 10px 0; }
#endScreen p { font-size: 18px; color: #ccc; margin: 5px 0; }
#restartBtn {
  margin-top: 25px;
  padding: 14px 40px;
  font-size: 20px;
  background: #ffd700;
  color: #000;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  transition: transform 0.2s;
}
#restartBtn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div id="hud">
  <div><span class="label">Score</span><br><span class="value score-val" id="score">0</span></div>
  <div><span class="label">Cleared</span><br><span class="value" id="cleared">0 / 6</span></div>
  <div><span class="label">Faults</span><br><span class="value fault-val" id="faults">0</span></div>
  <div><span class="label">Speed</span><br><span class="value" id="speed">0 m/s</span></div>
</div>

<div id="instructions">Press <kbd>SPACE</kbd> to jump over hurdles!</div>

<div id="message"></div>

<div id="startScreen">
  <h1>🏇 Horse Jumping Race</h1>
  <p>Time your jumps to clear all 6 hurdles!</p>
  <button id="startBtn">START RACE</button>
</div>

<div id="endScreen">
  <h1>🏁 Race Complete!</h1>
  <div class="final-score" id="finalScore">0</div>
  <p id="finalCleared">Hurdles Cleared: 0/6</p>
  <p id="finalFaults">Faults: 0</p>
  <button id="restartBtn">RACE AGAIN</button>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
let gameState = 'start'; // start, playing, stopped, ended
let score = 0;
let hurdlesCleared = 0;
let faults = 0;
let currentSpeed = 0;
const BASE_SPEED = 6;
let horsePosition = -5; // start position along Z axis (track goes in -Z direction, but we'll use +Z)
let isJumping = false;
let jumpVy = 0;
let jumpY = 0;
const JUMP_INITIAL_VY = 8;
const GRAVITY = 15;
let stoppedTimer = 0;
let modelLoaded = false;

// Track config
const TRACK_LENGTH = 60;
const HURDLE_HEIGHTS = [0.5, 0.8, 1.0, 1.2, 1.0, 1.5];
const HURDLE_SPACING = TRACK_LENGTH / (HURDLE_HEIGHTS.length + 1);
const HURDLE_POSITIONS = HURDLE_HEIGHTS.map((h, i) => (i + 1) * HURDLE_SPACING);

// Hurdle state
let hurdles = [];
let hurdleStates = []; // 'standing', 'cleared', 'fallen', 'collided'
let hurdleFallAngles = [];
let processedHurdles = [];

// Horse model
let horseMesh = null;
let horseMixer = null;
let horseAnimations = [];

// Three.js setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 40, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(-4, 3, -3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(10, 15, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -30;
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far = 60;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.4);
scene.add(hemiLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(20, TRACK_LENGTH + 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a7c3f, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, 0, TRACK_LENGTH / 2);
ground.receiveShadow = true;
scene.add(ground);

// Track surface (sand/dirt)
const trackGeo = new THREE.PlaneGeometry(4, TRACK_LENGTH + 10);
const trackMat = new THREE.MeshStandardMaterial({ color: 0xc4a35a, roughness: 0.95 });
const track = new THREE.Mesh(trackGeo, trackMat);
track.rotation.x = -Math.PI / 2;
track.position.set(0, 0.01, TRACK_LENGTH / 2);
track.receiveShadow = true;
scene.add(track);

// Track stripes
for (let i = 0; i <= TRACK_LENGTH; i += 2) {
  const stripeGeo = new THREE.PlaneGeometry(4, 0.15);
  const stripeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
  const stripe = new THREE.Mesh(stripeGeo, stripeMat);
  stripe.rotation.x = -Math.PI / 2;
  stripe.position.set(0, 0.02, i);
  scene.add(stripe);
}

// Track side rails
for (let side of [-1, 1]) {
  const railGeo = new THREE.BoxGeometry(0.08, 0.3, TRACK_LENGTH + 10);
  const railMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
  const rail = new THREE.Mesh(railGeo, railMat);
  rail.position.set(side * 2.1, 0.15, TRACK_LENGTH / 2);
  rail.castShadow = true;
  scene.add(rail);
}

// Distance markers
for (let i = 0; i <= TRACK_LENGTH; i += 10) {
  const markerGeo = new THREE.BoxGeometry(0.3, 0.6, 0.3);
  const markerMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
  for (let side of [-1, 1]) {
    const marker = new THREE.Mesh(markerGeo, markerMat);
    marker.position.set(side * 2.5, 0.3, i);
    marker.castShadow = true;
    scene.add(marker);
  }
}

// Trees/decoration
function createTree(x, z) {
  const group = new THREE.Group();
  const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 1.5, 8);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 0.75;
  trunk.castShadow = true;
  group.add(trunk);

  const leavesGeo = new THREE.SphereGeometry(1, 8, 8);
  const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e });
  const leaves = new THREE.Mesh(leavesGeo, leavesMat);
  leaves.position.y = 2.2;
  leaves.castShadow = true;
  group.add(leaves);

  group.position.set(x, 0, z);
  scene.add(group);
}

for (let i = 0; i < 20; i++) {
  const side = Math.random() > 0.5 ? 1 : -1;
  createTree(side * (4 + Math.random() * 4), Math.random() * (TRACK_LENGTH + 10));
}

// Create hurdles
function createHurdle(height, posZ, index) {
  const group = new THREE.Group();

  // Two posts
  const postHeight = height + 0.3;
  const postGeo = new THREE.BoxGeometry(0.08, postHeight, 0.08);
  const postMat = new THREE.MeshStandardMaterial({ color: 0xffffff });

  const leftPost = new THREE.Mesh(postGeo, postMat);
  leftPost.position.set(-0.8, postHeight / 2, 0);
  leftPost.castShadow = true;
  group.add(leftPost);

  const rightPost = new THREE.Mesh(postGeo, postMat);
  rightPost.position.set(0.8, postHeight / 2, 0);
  rightPost.castShadow = true;
  group.add(rightPost);

  // Horizontal bars (the actual hurdle)
  const barGroup = new THREE.Group();
  const numBars = Math.max(1, Math.ceil(height / 0.3));
  for (let b = 0; b < numBars; b++) {
    const barY = height - b * 0.25;
    if (barY < 0.15) break;
    const barGeo = new THREE.BoxGeometry(1.8, 0.08, 0.06);
    const colors = [0xff0000, 0xffffff, 0xff4444, 0xffcc00];
    const barMat = new THREE.MeshStandardMaterial({ color: colors[b % colors.length] });
    const bar = new THREE.Mesh(barGeo, barMat);
    bar.position.set(0, barY, 0);
    bar.castShadow = true;
    barGroup.add(bar);
  }
  group.add(barGroup);
  group.userData.barGroup = barGroup;

  group.position.set(0, 0, posZ);
  scene.add(group);

  return group;
}

function initHurdles() {
  // Remove old hurdles
  hurdles.forEach(h => scene.remove(h));
  hurdles = [];
  hurdleStates = [];
  hurdleFallAngles = [];
  processedHurdles = [];

  for (let i = 0; i < HURDLE_HEIGHTS.length; i++) {
    const h = createHurdle(HURDLE_HEIGHTS[i], HURDLE_POSITIONS[i], i);
    hurdles.push(h);
    hurdleStates.push('standing');
    hurdleFallAngles.push(0);
    processedHurdles.push(false);
  }
}

initHurdles();

// Create a simple horse model (fallback if GLB doesn't load)
function createSimpleHorse() {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.BoxGeometry(0.6, 0.7, 1.4);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.set(0, 1.1, 0);
  body.castShadow = true;
  group.add(body);

  // Neck
  const neckGeo = new THREE.BoxGeometry(0.3, 0.7, 0.3);
  const neck = new THREE.Mesh(neckGeo, bodyMat);
  neck.position.set(0, 1.6, 0.55);
  neck.rotation.x = -0.4;
  neck.castShadow = true;
  group.add(neck);

  // Head
  const headGeo = new THREE.BoxGeometry(0.25, 0.35, 0.5);
  const head = new THREE.Mesh(headGeo, bodyMat);
  head.position.set(0, 1.9, 0.8);
  head.castShadow = true;
  group.add(head);

  // Legs
  const legGeo = new THREE.BoxGeometry(0.12, 0.7, 0.12);
  const legMat = new THREE.MeshStandardMaterial({ color: 0x654321 });
  const legPositions = [
    [-0.2, 0.35, 0.45],
    [0.2, 0.35, 0.45],
    [-0.2, 0.35, -0.45],
    [0.2, 0.35, -0.45]
  ];
  const legs = [];
  legPositions.forEach(pos => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(...pos);
    leg.castShadow = true;
    group.add(leg);
    legs.push(leg);
  });
  group.userData.legs = legs;

  // Tail
  const tailGeo = new THREE.BoxGeometry(0.08, 0.5, 0.08);
  const tailMat = new THREE.MeshStandardMaterial({ color: 0x2a1506 });
  const tail = new THREE.Mesh(tailGeo, tailMat);
  tail.position.set(0, 1.2, -0.8);
  tail.rotation.x = 0.5;
  group.add(tail);
  group.userData.tail = tail;

  // Mane
  const maneGeo = new THREE.BoxGeometry(0.05, 0.4, 0.5);
  const mane = new THREE.Mesh(maneGeo, tailMat);
  mane.position.set(0, 1.7, 0.4);
  group.add(mane);

  group.scale.set(1.2, 1.2, 1.2);
  return group;
}

// Load horse model
const loader = new GLTFLoader();
let useSimpleHorse = false;

function setupHorse(model) {
  horseMesh = model;
  horseMesh.position.set(0, 0, horsePosition);
  horseMesh.castShadow = true;
  horseMesh.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
    }
  });
  scene.add(horseMesh);
  modelLoaded = true;
}

loader.load('assets/horse.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.01, 0.01, 0.01); // Adjust scale as needed

    if (gltf.animations && gltf.animations.length > 0) {
      horseMixer = new THREE.AnimationMixer(model);
      horseAnimations = gltf.animations;
      const runAction = horseMixer.clipAction(horseAnimations[0]);
      runAction.play();
    }

    setupHorse(model);
  },
  undefined,
  (error) => {
    console.warn('Could not load horse.glb, using simple horse model', error);
    useSimpleHorse = true;
    const simpleHorse = createSimpleHorse();
    setupHorse(simpleHorse);
  }
);

// Also create simple horse as immediate fallback
setTimeout(() => {
  if (!modelLoaded) {
    useSimpleHorse = true;
    const simpleHorse = createSimpleHorse();
    setupHorse(simpleHorse);
  }
}, 2000);

// Rider on horse
function createRider() {
  const group = new THREE.Group();

  // Torso
  const torsoGeo = new THREE.BoxGeometry(0.35, 0.5, 0.25);
  const torsoMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
  const torso = new THREE.Mesh(torsoGeo, torsoMat);
  torso.position.set(0, 0.25, 0);
  torso.castShadow = true;
  group.add(torso);

  // Head
  const headGeo = new THREE.SphereGeometry(0.12, 8, 8);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.set(0, 0.6, 0);
  group.add(head);

  // Helmet
  const helmetGeo = new THREE.SphereGeometry(0.14, 8, 8, 0, Math.PI * 2, 0, Math.PI / 2);
  const helmetMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
  const helmet = new THREE.Mesh(helmetGeo, helmetMat);
  helmet.position.set(0, 0.62, 0);
  group.add(helmet);

  return group;
}

const rider = createRider();
rider.position.set(0, 1.6, 0);
// Will be added to horse when horse is loaded

// Input
let spacePressed = false;
let jumpQueued = false;

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!spacePressed) {
      spacePressed = true;
      if (gameState === 'playing' && !isJumping && stoppedTimer <= 0) {
        jumpQueued = true;
      }
    }
  }
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'Space') {
    spacePressed = false;
  }
});

// UI
const scoreEl = document.getElementById('score');
const clearedEl = document.getElementById('cleared');
const faultsEl = document.getElementById('faults');
const speedEl = document.getElementById('speed');
const messageEl = document.getElementById('message');
const startScreen = document.getElementById('startScreen');
const endScreen = document.getElementById('endScreen');

function showMessage(text, duration = 1500, color = '#fff') {
  messageEl.textContent = text;
  messageEl.style.color = color;
  messageEl.style.opacity = 1;
  setTimeout(() => { messageEl.style.opacity = 0; }, duration);
}

function updateHUD() {
  scoreEl.textContent = score;
  clearedEl.textContent = `${hurdlesCleared} / 6`;
  faultsEl.textContent = faults;
  speedEl.textContent = `${currentSpeed.toFixed(1)} m/s`;
}

// Start button
document.getElementById('startBtn').addEventListener('click', () => {
  startScreen.style.display = 'none';
  gameState = 'playing';
  currentSpeed = BASE_SPEED;
});

document.getElementById('restartBtn').addEventListener('click', () => {
  endScreen.style.display = 'none';
  resetGame();
  gameState = 'playing';
  currentSpeed = BASE_SPEED;
});

function resetGame() {
  score = 0;
  hurdlesCleared = 0;
  faults = 0;
  horsePosition = -5;
  isJumping = false;
  jumpVy = 0;
  jumpY = 0;
  currentSpeed = 0;
  stoppedTimer = 0;
  jumpQueued = false;
  initHurdles();
  if (horseMesh) {
    horseMesh.position.set(0, 0, horsePosition);
  }
  updateHUD();
}

// Particle effects
const particles = [];

function createParticles(position, color = 0xffd700, count = 15) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.05, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 4,
      Math.random() * 5,
      (Math.random() - 0.5) * 4
    );
    scene.add(mesh);
    particles.push({ mesh, vel, life: 1.0 });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vel.y -= 10 * dt;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    p.life -= dt * 1.5;
    p.mesh.material.opacity = p.life;
    p.mesh.material.transparent = true;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }
}

// Simple leg animation for fallback horse
let legAnimTime = 0;

function animateSimpleHorse(dt) {
  if (!horseMesh || !useSimpleHorse) return;
  if (currentSpeed > 0 && !isJumping) {
    legAnimTime += dt * currentSpeed * 2;
    const legs = horseMesh.userData.legs;
    if (legs) {
      legs[0].rotation.x = Math.sin(legAnimTime) * 0.5;
      legs[1].rotation.x = Math.sin(legAnimTime + Math.PI) * 0.5;
      legs[2].rotation.x = Math.sin(legAnimTime + Math.PI) * 0.5;
      legs[3].rotation.x = Math.sin(legAnimTime) * 0.5;
    }
    if (horseMesh.userData.tail) {
      horseMesh.userData.tail.rotation.x = 0.5 + Math.sin(legAnimTime * 0.5) * 0.2;
    }
  }
}

// Game loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);

  if (horseMixer) {
    horseMixer.update(dt * (currentSpeed / BASE_SPEED));
  }

  if (gameState === 'playing') {
    // Stopped timer (after collision)
    if (stoppedTimer > 0) {
      stoppedTimer -= dt;
      currentSpeed = 0;
      if (stoppedTimer <= 0) {
        currentSpeed = BASE_SPEED;
        stoppedTimer = 0;
      }
    } else {
      currentSpeed = BASE_SPEED;
    }

    // Move horse forward
    if (currentSpeed > 0) {
      horsePosition += currentSpeed * dt;
    }

    // Jump
    if (jumpQueued && !isJumping && stoppedTimer <= 0) {
      isJumping = true;
      jumpVy = JUMP_INITIAL_VY;
      jumpY = 0;
      jumpQueued = false;
    }

    if (isJumping) {
      jumpVy -= GRAVITY * dt;
      jumpY += jumpVy * dt;
      if (jumpY <= 0) {
        jumpY = 0;
        isJumping = false;
        jumpVy = 0;
      }
    }

    // Update horse position
    if (horseMesh) {
      horseMesh.position.z = horsePosition;
      horseMesh.position.y = jumpY;

      // Slight rotation during jump
      if (isJumping) {
        horseMesh.rotation.x = -jumpVy * 0.02;
      } else {
        horseMesh.rotation.x = 0;
      }

      // Add rider to horse if not already
      if (!horseMesh.userData.riderAdded) {
        horseMesh.add(rider);
        horseMesh.userData.riderAdded = true;
      }
    }

    // Check hurdle interactions
    for (let i = 0; i < hurdles.length; i++) {
      if (processedHurdles[i]) continue;

      const hurdleZ = HURDLE_POSITIONS[i];
      const hurdleHeight = HURDLE_HEIGHTS[i];
      const distToHurdle = hurdleZ - horsePosition;

      // Horse is at the hurdle (within collision range)
      if (distToHurdle < 0.8 && distToHurdle > -0.8) {
        if (isJumping) {
          // Check if jump height is enough
          if (jumpY >= hurdleHeight * 0.7) {
            // Clean jump!
            // Check timing: was the jump initiated close enough?
            hurdleStates[i] = 'cleared';
            processedHurdles[i] = true;
            score += 10;
            hurdlesCleared++;
            showMessage('Perfect! +10', 1000, '#ffd700');
            createParticles(new THREE.Vector3(0, hurdleHeight, hurdleZ), 0xffd700);
          } else {
            // Jumped but not high enough - knock over
            hurdleStates[i] = 'fallen';
            processedHurdles[i] = true;
            score -= 5;
            faults++;
            showMessage('Knocked! -5', 1000, '#ff6b6b');
            createParticles(new THREE.Vector3(0, hurdleHeight, hurdleZ), 0xff4444, 10);
          }
        } else {
          // Didn't jump - collision!
          hurdleStates[i] = 'collided';
          processedHurdles[i] = true;
          score -= 10;
          faults++;
          stoppedTimer = 2.0;
          currentSpeed = 0;
          showMessage('Crash! -10 (2s penalty)', 2000, '#ff0000');
          createParticles(new THREE.Vector3(0, hurdleHeight / 2, hurdleZ), 0xff0000, 20);
        }
      }
    }

    // Animate fallen hurdles
    for (let i = 0; i < hurdles.length; i++) {
      if (hurdleStates[i] === 'fallen' || hurdleStates[i] === 'collided') {
        if (hurdleFallAngles[i] < Math.PI / 2) {
          hurdleFallAngles[i] += dt * 3;
          const barGroup = hurdles[i].userData.barGroup;
          if (barGroup) {
            barGroup.rotation.x = hurdleFallAngles[i];
            barGroup.position.z += dt * 2;
            barGroup.position.y -= dt * 1;
          }
        }
      }
    }

    // Animate simple horse legs
    animateSimpleHorse(dt);

    // Check if race is over
    if (horsePosition > TRACK_LENGTH + 3) {
      gameState = 'ended';
      currentSpeed = 0;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('finalCleared').textContent = `Hurdles Cleared: ${hurdlesCleared}/6`;
      document.getElementById('finalFaults').textContent = `Faults: ${faults}`;
      endScreen.style.display = 'flex';
    }
  }

  // Update particles
  updateParticles(dt);

  // Camera follow
  if (horseMesh) {
    const targetCamPos = new THREE.Vector3(
      -3.5,
      3 + jumpY * 0.3,
      horsePosition - 4
    );
    camera.position.lerp(targetCamPos, 0.05);
    const lookTarget = new THREE.Vector3(0, 1.2 + jumpY * 0.5, horsePosition + 3);
    camera.lookAt(lookTarget);

    // Move directional light with horse
    dirLight.position.set(horsePosition * 0 + 10, 15, horsePosition + 5);
    dirLight.target.position.set(0, 0, horsePosition);
    dirLight.target.updateMatrixWorld();
  }

  // Update HUD
  updateHUD();

  // Update state
  window.__3D_STATE__ = {
    modelLoaded,
    score,
    hurdlesCleared,
    faults,
    speed: currentSpeed,
    position: horsePosition,
    isJumping
  };

  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize state
window.__3D_STATE__ = {
  modelLoaded: false,
  score: 0,
  hurdlesCleared: 0,
  faults: 0,
  speed: 0,
  position: 0,
  isJumping: false
};

animate();
</script>
</body>
</html>
