<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 马术跳跃赛</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #87c8ff;
      font-family: Arial, sans-serif;
    }
    #hud {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.8;
      font-size: 14px;
      min-width: 180px;
    }
    #tip {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 10;
      color: #fff;
      background: rgba(0,0,0,0.45);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div>得分：<span id="score">0</span></div>
    <div>已通过障碍：<span id="cleared">0</span></div>
    <div>失误数：<span id="faults">0</span></div>
    <div>当前速度：<span id="speed">6.0</span> m/s</div>
  </div>
  <div id="tip">空格键跳跃</div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, clock, controls;
    let horseRoot, horseMixer;
    let modelLoaded = false;

    const laneZ = 0;
    const trackLength = 60;
    const baseSpeed = 6;
    let currentSpeed = baseSpeed;

    let score = 0;
    let hurdlesCleared = 0;
    let faults = 0;

    let racePosition = 0;

    let isJumping = false;
    let jumpY = 0;
    let jumpVy = 0;
    const jumpInitVy = 8;
    const gravity = 15;

    let stopUntil = 0;

    const hurdles = [];
    let horseBodyHeight = 1.2;
    let horseLength = 2.0;

    const hudScore = document.getElementById('score');
    const hudCleared = document.getElementById('cleared');
    const hudFaults = document.getElementById('faults');
    const hudSpeed = document.getElementById('speed');

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87c8ff);
      scene.fog = new THREE.Fog(0x87c8ff, 35, 100);

      clock = new THREE.Clock();

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        300
      );
      camera.position.set(-8, 6, 10);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(10, 1.5, 0);
      controls.enableDamping = true;
      controls.enablePan = false;
      controls.minDistance = 8;
      controls.maxDistance = 30;
      controls.maxPolarAngle = Math.PI * 0.48;

      const ambient = new THREE.HemisphereLight(0xffffff, 0x6f8f5f, 1.1);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(15, 25, 12);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(2048, 2048);
      dirLight.shadow.camera.left = -50;
      dirLight.shadow.camera.right = 50;
      dirLight.shadow.camera.top = 50;
      dirLight.shadow.camera.bottom = -50;
      dirLight.shadow.camera.near = 1;
      dirLight.shadow.camera.far = 100;
      scene.add(dirLight);

      createTrack();
      createEnvironment();
      createHurdles();
      createFallbackHorse();
      loadHorseModel();

      window.addEventListener('resize', onResize);
      window.addEventListener('keydown', onKeyDown);

      updateHUD();
      update3DState();
    }

    function createTrack() {
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(trackLength + 20, 18),
        new THREE.MeshStandardMaterial({ color: 0x4f9c4f })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      const laneMatA = new THREE.MeshStandardMaterial({ color: 0xd9c27a });
      const laneMatB = new THREE.MeshStandardMaterial({ color: 0xc9b068 });

      const stripeLength = 3;
      const stripeCount = Math.ceil(trackLength / stripeLength);

      for (let i = 0; i < stripeCount; i++) {
        const seg = new THREE.Mesh(
          new THREE.BoxGeometry(stripeLength, 0.02, 4),
          i % 2 === 0 ? laneMatA : laneMatB
        );
        seg.position.set(i * stripeLength + stripeLength / 2, 0.01, laneZ);
        seg.receiveShadow = true;
        scene.add(seg);
      }

      const railMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const leftRail = new THREE.Mesh(
        new THREE.BoxGeometry(trackLength + 4, 0.15, 0.15),
        railMat
      );
      leftRail.position.set(trackLength / 2, 0.35, -2.2);
      scene.add(leftRail);

      const rightRail = new THREE.Mesh(
        new THREE.BoxGeometry(trackLength + 4, 0.15, 0.15),
        railMat
      );
      rightRail.position.set(trackLength / 2, 0.35, 2.2);
      scene.add(rightRail);
    }

    function createEnvironment() {
      const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x7a4f2a });
      const treeLeafMat = new THREE.MeshStandardMaterial({ color: 0x2f7d32 });

      for (let i = 0; i < 18; i++) {
        const x = -10 + i * 4.5;
        for (const z of [-7, 7]) {
          const trunk = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2, 0.25, 1.6, 8),
            treeTrunkMat
          );
          trunk.position.set(x + (Math.random() - 0.5) * 1.5, 0.8, z + (Math.random() - 0.5));
          trunk.castShadow = true;
          trunk.receiveShadow = true;
          scene.add(trunk);

          const crown = new THREE.Mesh(
            new THREE.SphereGeometry(0.9 + Math.random() * 0.4, 10, 10),
            treeLeafMat
          );
          crown.position.set(trunk.position.x, 2.0, trunk.position.z);
          crown.castShadow = true;
          scene.add(crown);
        }
      }
    }

    function createFallbackHorse() {
      horseRoot = new THREE.Group();

      const brown = new THREE.MeshStandardMaterial({ color: 0x6b4328 });
      const dark = new THREE.MeshStandardMaterial({ color: 0x3d2416 });

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(2.2, 1.2, 0.8),
        brown
      );
      body.position.y = 1.4;
      body.castShadow = true;
      horseRoot.add(body);

      const neck = new THREE.Mesh(
        new THREE.BoxGeometry(0.45, 0.9, 0.4),
        brown
      );
      neck.position.set(1.0, 1.95, 0);
      neck.rotation.z = -0.5;
      neck.castShadow = true;
      horseRoot.add(neck);

      const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.45, 0.35),
        dark
      );
      head.position.set(1.4, 2.15, 0);
      head.castShadow = true;
      horseRoot.add(head);

      const legGeo = new THREE.BoxGeometry(0.2, 1.2, 0.2);
      const legOffsets = [
        [-0.7, 0.6, -0.25],
        [-0.7, 0.6,  0.25],
        [ 0.7, 0.6, -0.25],
        [ 0.7, 0.6,  0.25]
      ];
      legOffsets.forEach(([x, y, z]) => {
        const leg = new THREE.Mesh(legGeo, dark);
        leg.position.set(x, y, z);
        leg.castShadow = true;
        horseRoot.add(leg);
      });

      horseRoot.position.set(0, 0, laneZ);
      horseRoot.traverse(obj => {
        if (obj.isMesh) obj.castShadow = true;
      });

      scene.add(horseRoot);
    }

    function loadHorseModel() {
      const loader = new GLTFLoader();
      loader.load(
        'assets/horse.glb',
        (gltf) => {
          scene.remove(horseRoot);

          horseRoot = gltf.scene;
          horseRoot.position.set(0, 0, laneZ);
          horseRoot.scale.setScalar(1.2);

          const box = new THREE.Box3().setFromObject(horseRoot);
          const size = new THREE.Vector3();
          box.getSize(size);
          if (size.y > 0.1) horseBodyHeight = size.y * 0.55;
          if (size.x > 0.1) horseLength = size.x;

          horseRoot.traverse((obj) => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
            }
          });

          scene.add(horseRoot);

          if (gltf.animations && gltf.animations.length > 0) {
            horseMixer = new THREE.AnimationMixer(horseRoot);

            let runClip = gltf.animations.find(a =>
              /run|gallop|walk|idle/i.test(a.name)
            );
            if (!runClip) runClip = gltf.animations[0];

            const action = horseMixer.clipAction(runClip);
            action.play();
          }

          modelLoaded = true;
        },
        undefined,
        (err) => {
          console.warn('horse.glb 加载失败，使用简化马模型继续运行。', err);
          modelLoaded = false;
        }
      );
    }

    function createHurdles() {
      const heights = [0.5, 0.8, 1.0, 1.2, 1.0, 1.5];
      const spacing = trackLength / (heights.length + 1);

      for (let i = 0; i < heights.length; i++) {
        const x = spacing * (i + 1);
        const h = heights[i];
        const hurdle = buildHurdle(x, h, i);
        hurdles.push(hurdle);
        scene.add(hurdle.group);
      }
    }

    function buildHurdle(x, height, index) {
      const group = new THREE.Group();
      group.position.set(x, 0, laneZ);

      const postMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
      const barMat = new THREE.MeshStandardMaterial({ color: index % 2 ? 0xffffff : 0xff4444 });

      const leftPost = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, height + 0.4, 0.12),
        postMat
      );
      leftPost.position.set(0, (height + 0.4) / 2, -0.9);
      leftPost.castShadow = true;
      group.add(leftPost);

      const rightPost = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, height + 0.4, 0.12),
        postMat
      );
      rightPost.position.set(0, (height + 0.4) / 2, 0.9);
      rightPost.castShadow = true;
      group.add(rightPost);

      const bar = new THREE.Mesh(
        new THREE.BoxGeometry(0.18, 0.08, 1.75),
        barMat
      );
      bar.position.set(0, height, 0);
      bar.castShadow = true;
      group.add(bar);

      const lowerBar = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.06, 1.75),
        new THREE.MeshStandardMaterial({ color: 0x3366ff })
      );
      lowerBar.position.set(0, Math.max(0.2, height * 0.5), 0);
      lowerBar.castShadow = true;
      group.add(lowerBar);

      return {
        x,
        height,
        group,
        bar,
        lowerBar,
        judged: false,
        cleared: false,
        knocked: false,
        pendingFromJump: false,
        fallProgress: 0,
        fallStarted: false,
        stopHit: false
      };
    }

    function onKeyDown(e) {
      if (e.code === 'Space') {
        e.preventDefault();
        tryJump();
      }
    }

    function tryJump() {
      const now = performance.now() / 1000;
      if (isJumping || now < stopUntil) return;

      isJumping = true;
      jumpVy = jumpInitVy;

      const next = getNextUnjudgedHurdle();
      if (next) {
        const dist = next.x - racePosition;
        if (dist >= 0 && dist < 1) {
          next.pendingFromJump = true;
        }
      }
    }

    function getNextUnjudgedHurdle() {
      for (const h of hurdles) {
        if (!h.judged) return h;
      }
      return null;
    }

    function updateJump(dt) {
      if (!isJumping) return;

      jumpVy -= gravity * dt;
      jumpY += jumpVy * dt;

      if (jumpY <= 0) {
        jumpY = 0;
        jumpVy = 0;
        isJumping = false;
      }
    }

    function updateHorse(dt, elapsed) {
      if (!horseRoot) return;

      if (!modelLoaded) {
        const bob = Math.sin(elapsed * 10) * 0.03;
        horseRoot.rotation.z = 0;
        horseRoot.position.set(racePosition, jumpY + bob, laneZ);

        const legs = horseRoot.children.filter(m => m.isMesh).slice(-4);
        legs.forEach((leg, i) => {
          leg.rotation.z = Math.sin(elapsed * 12 + i * Math.PI / 2) * 0.35;
        });
      } else {
        horseRoot.position.x = racePosition;
        horseRoot.position.y = jumpY;
        horseRoot.position.z = laneZ;
        horseRoot.rotation.y = 0;
      }
    }

    function updateRace(dt, nowSec) {
      currentSpeed = nowSec < stopUntil ? 0 : baseSpeed;
      racePosition += currentSpeed * dt;
      racePosition = Math.min(racePosition, trackLength + 4);
    }

    function updateHurdles(dt, nowSec) {
      for (const h of hurdles) {
        if (h.knocked) {
          animateFallenHurdle(h, dt);
        }

        if (h.judged) continue;

        const horseFrontX = racePosition + horseLength * 0.25;
        const passedPlane = horseFrontX >= h.x;

        if (!passedPlane) continue;

        const horseClearHeight = jumpY + horseBodyHeight;

        if (h.pendingFromJump) {
          if (horseClearHeight > h.height + 0.15) {
            h.judged = true;
            h.cleared = true;
            score += 10;
            hurdlesCleared += 1;
          } else {
            h.judged = true;
            h.knocked = true;
            score -= 5;
            faults += 1;
            startHurdleFall(h);
          }
          h.pendingFromJump = false;
        } else {
          if (jumpY > 0.05) {
            if (horseClearHeight > h.height + 0.15) {
              h.judged = true;
              h.cleared = true;
              hurdlesCleared += 1;
            } else {
              h.judged = true;
              h.knocked = true;
              score -= 5;
              faults += 1;
              startHurdleFall(h);
            }
          } else {
            h.judged = true;
            h.stopHit = true;
            score -= 10;
            faults += 1;
            stopUntil = Math.max(stopUntil, nowSec + 2);
          }
        }
      }
    }

    function startHurdleFall(h) {
      if (h.fallStarted) return;
      h.fallStarted = true;
      h.fallProgress = 0;
    }

    function animateFallenHurdle(h, dt) {
      if (!h.fallStarted) return;
      h.fallProgress += dt * 2.5;

      const t = Math.min(h.fallProgress, 1);
      h.bar.rotation.z = -Math.PI * 0.5 * t;
      h.bar.position.y = h.height - h.height * 0.7 * t;
      h.bar.position.x = 0.2 * t;

      h.lowerBar.rotation.z = -Math.PI * 0.35 * t;
      h.lowerBar.position.y = Math.max(0.08, Math.max(0.2, h.height * 0.5) - h.height * 0.4 * t);
    }

    function updateCamera() {
      const desired = new THREE.Vector3(racePosition - 8, 5.5, 10);
      camera.position.lerp(desired, 0.06);

      const target = new THREE.Vector3(racePosition + 8, 1.5 + jumpY * 0.3, 0);
      controls.target.lerp(target, 0.08);
      controls.update();
    }

    function updateHUD() {
      hudScore.textContent = String(score);
      hudCleared.textContent = String(hurdlesCleared);
      hudFaults.textContent = String(faults);
      hudSpeed.textContent = currentSpeed.toFixed(1);
    }

    function update3DState() {
      window.__3D_STATE__ = {
        modelLoaded,
        score,
        hurdlesCleared,
        faults,
        speed: currentSpeed,
        position: racePosition,
        isJumping
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.elapsedTime;
      const nowSec = performance.now() / 1000;

      if (horseMixer) horseMixer.update(dt);

      updateJump(dt);
      updateRace(dt, nowSec);
      updateHorse(dt, elapsed);
      updateHurdles(dt, nowSec);
      updateCamera();
      updateHUD();
      update3DState();

      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
</html>
