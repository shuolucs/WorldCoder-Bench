<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalanche Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#hud {
position: absolute;
top: 0; left: 0; width: 100%; height: 100%;
pointer-events: none;
color: white;
text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}
#hud > div { pointer-events: auto; }
.hud-left {
position: absolute; top: 15px; left: 15px;
}
.hud-right {
position: absolute; top: 15px; right: 15px;
text-align: right;
}
.hud-bottom-center {
position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
text-align: center;
}
.hud-bottom-right {
position: absolute; bottom: 20px; right: 15px;
}
.hud-text {
font-size: 24px;
margin-bottom: 6px;
font-weight: 600;
}
#reset-btn {
pointer-events: auto;
padding: 10px 24px;
font-size: 16px;
background: #e74c3c;
color: white;
border: none;
border-radius: 6px;
cursor: pointer;
font-weight: 600;
transition: background 0.2s;
}
#reset-btn:hover { background: #c0392b; }
#status-display {
font-size: 28px;
font-weight: 700;
padding: 8px 20px;
background: rgba(0,0,0,0.5);
border-radius: 8px;
display: inline-block;
}
.instructions {
position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
font-size: 13px;
color: rgba(255,255,255,0.7);
text-align: center;
white-space: nowrap;
}
</style>
</head>
<body>

<div id="hud">
<div class="hud-left">
<div class="hud-text" id="score-display">Score: 0</div>
<div class="hud-text" id="boulder-display">Boulders Remaining: 20</div>
<div class="hud-text" id="barrier-token-display">Barrier Tokens: 2</div>
</div>
<div class="hud-right">
<div class="hud-text" id="time-display">Time: 0.0s</div>
<div class="hud-text" id="shield-display">Shield HP: 0/3</div>
</div>
<div class="hud-bottom-center">
<div class="instructions">SPACE: Start/Pause | R: Reset | Click barrier to select, Arrow keys to move | B: Spawn barrier | S: Toggle shield</div>
<div id="status-display">Status: READY</div>
</div>
<div class="hud-bottom-right">
<button id="reset-btn">Reset</button>
</div>
</div>

<script type="importmap">
{
"imports": {
"three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Constants
const TERRAIN_ANGLE_DEG = 25;
const TERRAIN_ANGLE_RAD = THREE.MathUtils.degToRad(TERRAIN_ANGLE_DEG);
const GRAVITY = 9.8;
const GRAVITY_ALONG_SLOPE = GRAVITY * Math.sin(TERRAIN_ANGLE_RAD);
const FRICTION_COEFF = 0.15;
const FRICTION_DECEL = GRAVITY * Math.cos(TERRAIN_ANGLE_RAD) * FRICTION_COEFF;
const NUM_BOULDERS = 20;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 80, 150);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 40, 60);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lighting
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(10, 50, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

const hemiLight = new THREE.HemisphereLight(0xaaddff, 0x445566, 0.5);
scene.add(hemiLight);

// Noise function using sin/cos combinations
function noise2D(x, z) {
    let val = 0;
    val += Math.sin(x * 0.15) * Math.cos(z * 0.12) * 3.0;
    val += Math.sin(x * 0.3 + 1.5) * Math.cos(z * 0.25 + 0.8) * 1.5;
    val += Math.cos(x * 0.08 + z * 0.1) * 2.0;
    val += Math.sin(x * 0.5 + 2.0) * Math.sin(z * 0.4 + 1.0) * 0.8;
    val += Math.cos(x * 0.7) * Math.sin(z * 0.6) * 0.4;
    return val;
}

// Terrain
const terrainGeom = new THREE.PlaneGeometry(100, 100, 64, 64);
const posAttr = terrainGeom.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
    const x = posAttr.getX(i);
    const z = posAttr.getY(i);
    const displacement = noise2D(x, z);
    posAttr.setZ(i, displacement);
}
terrainGeom.computeVertexNormals();

const terrainMat = new THREE.MeshStandardMaterial({
    color: 0xf0f0f0,
    roughness: 0.9,
    metalness: 0.0,
    flatShading: true,
    vertexColors: false,
});

// Add vertex colors for snowy look
const colors = new Float32Array(posAttr.count * 3);
for (let i = 0; i < posAttr.count; i++) {
    const h = posAttr.getZ(i);
    const grey = 0.85 + h * 0.02;
    colors[i * 3] = Math.min(1, Math.max(0.6, grey));
    colors[i * 3 + 1] = Math.min(1, Math.max(0.6, grey));
    colors[i * 3 + 2] = Math.min(1, Math.max(0.65, grey + 0.05));
}
terrainGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
terrainMat.vertexColors = true;

const terrain = new THREE.Mesh(terrainGeom, terrainMat);
terrain.receiveShadow = true;
// Rotate to tilt: the plane is in XY, we rotate around X so it tilts
// PlaneGeometry is in XY plane, normal along Z. We want it tilted.
terrain.rotation.x = -Math.PI / 2 + TERRAIN_ANGLE_RAD;
// Position so top edge ~y=30, bottom ~y=-10
terrain.position.set(0, 10, -5);
scene.add(terrain);

// Function to get terrain height at world position
function getTerrainHeight(worldX, worldZ) {
    // Transform world coords to terrain local coords
    const invMatrix = new THREE.Matrix4().copy(terrain.matrixWorld).invert();
    const localPos = new THREE.Vector3(worldX, 0, worldZ);

    // We need to find the Y on the terrain surface for given world X, Z
    // The terrain is a tilted plane. We'll use raycasting.
    const raycaster = new THREE.Raycaster();
    raycaster.set(new THREE.Vector3(worldX, 50, worldZ), new THREE.Vector3(0, -1, 0));
    const intersects = raycaster.intersectObject(terrain);
    if (intersects.length > 0) {
        return intersects[0].point.y;
    }
    return null;
}

// Stork model
let storkModel = null;
let storkMixer = null;
const storkBasePos = new THREE.Vector3(0, 5, 0);
let storkModelLoaded = false;

// Create a placeholder stork (bird-like shape)
function createPlaceholderStork() {
    const group = new THREE.Group();

    // Body
    const bodyGeom = new THREE.CapsuleGeometry(0.5, 1.5, 8, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.rotation.z = Math.PI / 2;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeom = new THREE.SphereGeometry(0.35, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const head = new THREE.Mesh(headGeom, headMat);
    head.position.set(1.2, 0.3, 0);
    head.castShadow = true;
    group.add(head);

    // Beak
    const beakGeom = new THREE.ConeGeometry(0.1, 0.6, 8);
    const beakMat = new THREE.MeshStandardMaterial({ color: 0xff6600 });
    const beak = new THREE.Mesh(beakGeom, beakMat);
    beak.rotation.z = -Math.PI / 2;
    beak.position.set(1.7, 0.3, 0);
    group.add(beak);

    // Legs
    const legGeom = new THREE.CylinderGeometry(0.05, 0.05, 1.2, 8);
    const legMat = new THREE.MeshStandardMaterial({ color: 0xff3300 });
    const leg1 = new THREE.Mesh(legGeom, legMat);
    leg1.position.set(-0.2, -1.0, 0.2);
    group.add(leg1);
    const leg2 = new THREE.Mesh(legGeom, legMat);
    leg2.position.set(-0.2, -1.0, -0.2);
    group.add(leg2);

    // Wings
    const wingGeom = new THREE.BoxGeometry(0.8, 0.05, 1.2);
    const wingMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const wing1 = new THREE.Mesh(wingGeom, wingMat);
    wing1.position.set(0, 0.4, 0.8);
    wing1.rotation.x = 0.1;
    group.add(wing1);
    const wing2 = new THREE.Mesh(wingGeom, wingMat);
    wing2.position.set(0, 0.4, -0.8);
    wing2.rotation.x = -0.1;
    group.add(wing2);

    // Tail
    const tailGeom = new THREE.BoxGeometry(0.3, 0.05, 0.6);
    const tailMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const tail = new THREE.Mesh(tailGeom, tailMat);
    tail.position.set(-1.2, 0.2, 0);
    group.add(tail);

    return group;
}

// Try loading GLTF, fall back to placeholder
const loader = new GLTFLoader();
try {
    loader.load('._stork.glb',
        (gltf) => {
            storkModel = gltf.scene;
            storkModel.scale.set(2, 2, 2);
            storkModel.position.copy(storkBasePos);
            storkModel.castShadow = true;
            storkModel.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
            scene.add(storkModel);
            storkModelLoaded = true;
            if (gltf.animations && gltf.animations.length > 0) {
                storkMixer = new THREE.AnimationMixer(storkModel);
                storkMixer.clipAction(gltf.animations[0]).play();
            }
            updateState();
        },
        undefined,
        (err) => {
            console.log('GLTF load failed, using placeholder stork');
            storkModel = createPlaceholderStork();
            storkModel.scale.set(2, 2, 2);
            storkModel.position.copy(storkBasePos);
            scene.add(storkModel);
            storkModelLoaded = true;
            updateState();
        }
    );
} catch (e) {
    storkModel = createPlaceholderStork();
    storkModel.scale.set(2, 2, 2);
    storkModel.position.copy(storkBasePos);
    scene.add(storkModel);
    storkModelLoaded = true;
}

// Stork flash state
let storkFlashTime = 0;
let storkOriginalMaterials = [];

function flashStorkRed() {
    storkFlashTime = 0.5;
    if (storkModel) {
        storkModel.traverse(c => {
            if (c.isMesh) {
                if (!c.userData.origColor) {
                    c.userData.origColor = c.material.color.clone();
                }
                c.material = c.material.clone();
                c.material.color.set(0xff0000);
                c.material.emissive = new THREE.Color(0xff0000);
                c.material.emissiveIntensity = 0.5;
            }
        });
    }
}

function restoreStorkColor() {
    if (storkModel) {
        storkModel.traverse(c => {
            if (c.isMesh && c.userData.origColor) {
                c.material.color.copy(c.userData.origColor);
                c.material.emissive = new THREE.Color(0x000000);
                c.material.emissiveIntensity = 0;
            }
        });
    }
}

// Snow Boulders
const boulders = [];
const boulderMeshes = [];

function createBoulders() {
    for (let i = 0; i < NUM_BOULDERS; i++) {
        const radius = 0.5 + Math.random() * 1.0;
        const geom = new THREE.SphereGeometry(radius, 12, 12);
        // Add some irregularity
        const pos = geom.attributes.position;
        for (let j = 0; j < pos.count; j++) {
            const x = pos.getX(j);
            const y = pos.getY(j);
            const z = pos.getZ(j);
            const noise = 1 + (Math.sin(x * 5) * Math.cos(y * 5) * Math.sin(z * 5)) * 0.15;
            pos.setXYZ(j, x * noise, y * noise, z * noise);
        }
        geom.computeVertexNormals();

        const mat = new THREE.MeshStandardMaterial({
            color: 0xf5f5ff,
            roughness: 0.8,
            metalness: 0.0,
        });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        const startX = (Math.random() - 0.5) * 60;
        const startZ = -35 + Math.random() * 10;
        const startY = 28 + Math.random() * 4;

        mesh.position.set(startX, startY, startZ);
        scene.add(mesh);
        boulderMeshes.push(mesh);

        boulders.push({
            mesh: mesh,
            radius: radius,
            velocity: new THREE.Vector3(0, 0, 0),
            active: true,
            collected: false,
            startPos: new THREE.Vector3(startX, startY, startZ),
        });
    }
}

createBoulders();

// Barriers
const barriers = [];
const barrierMeshes = [];

function createBarrier(x, y, z) {
    const geom = new THREE.BoxGeometry(8, 3, 1);
    const mat = new THREE.MeshStandardMaterial({
        color: 0x8B4513,
        roughness: 0.9,
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.position.set(x, y, z);
    scene.add(mesh);
    barrierMeshes.push(mesh);
    barriers.push({
        mesh: mesh,
        selected: false,
        startPos: new THREE.Vector3(x, y, z),
    });
    return mesh;
}

// Initial barriers at strategic positions on the slope
createBarrier(-10, 18, -15);
createBarrier(5, 12, -5);
createBarrier(-3, 8, 5);

// Safe Zone
const safeZoneGeom = new THREE.PlaneGeometry(10, 10);
const safeZoneMat = new THREE.MeshStandardMaterial({
    color: 0x00ff00,
    transparent: true,
    opacity: 0.35,
    side: THREE.DoubleSide,
});
const safeZone = new THREE.Mesh(safeZoneGeom, safeZoneMat);
safeZone.rotation.x = -Math.PI / 2;
safeZone.position.set(0, -8, 20);
scene.add(safeZone);

// Safe zone border
const safeZoneBorderGeom = new THREE.EdgesGeometry(safeZoneGeom);
const safeZoneBorderMat = new THREE.LineBasicMaterial({ color: 0x00ff00 });
const safeZoneBorder = new THREE.LineSegments(safeZoneBorderGeom, safeZoneBorderMat);
safeZoneBorder.rotation.x = -Math.PI / 2;
safeZoneBorder.position.set(0, -7.9, 20);
scene.add(safeZoneBorder);

// Shield
let shieldMesh = null;
function createShield() {
    const geom = new THREE.SphereGeometry(4, 32, 32);
    const mat = new THREE.MeshStandardMaterial({
        color: 0x4488ff,
        transparent: true,
        opacity: 0.25,
        side: THREE.DoubleSide,
        emissive: 0x2244aa,
        emissiveIntensity: 0.3,
    });
    shieldMesh = new THREE.Mesh(geom, mat);
    shieldMesh.visible = false;
    scene.add(shieldMesh);
}
createShield();

// Particle effects for impacts
const impactParticles = [];

function createImpactEffect(position, color = 0xffffff) {
    const count = 15;
    for (let i = 0; i < count; i++) {
        const geom = new THREE.SphereGeometry(0.1 + Math.random() * 0.15, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color: color });
        const p = new THREE.Mesh(geom, mat);
        p.position.copy(position);
        const vel = new THREE.Vector3(
            (Math.random() - 0.5) * 8,
            Math.random() * 6,
            (Math.random() - 0.5) * 8
        );
        scene.add(p);
        impactParticles.push({ mesh: p, velocity: vel, life: 1.0 });
    }
}

// State
const state = {
    simulationRunning: false,
    simulationTime: 0,
    score: 0,
    bouldersRemaining: NUM_BOULDERS,
    bouldersCollected: 0,
    storkHits: 0,
    storkAlive: true,
    shieldActive: false,
    shieldHP: 3,
    barrierCount: 3,
    barrierTokens: 2,
    selectedBarrierIndex: -1,
    storkPosition: { x: 0, y: 5, z: 0 },
    averageBoulderSpeed: 0,
    status: 'READY',
    terrainAngleDeg: TERRAIN_ANGLE_DEG,
    gravityAccel: GRAVITY_ALONG_SLOPE,
    frictionCoeff: FRICTION_COEFF,
    boulderPositions: [],
    storkModelLoaded: false,
};

window.__3D_STATE__ = state;

function updateState() {
    state.bouldersRemaining = boulders.filter(b => b.active && !b.collected).length;
    state.bouldersCollected = boulders.filter(b => b.collected).length;
    state.barrierCount = barriers.length;
    state.storkModelLoaded = storkModelLoaded;
    if (storkModel) {
        state.storkPosition = {
            x: parseFloat(storkModel.position.x.toFixed(2)),
            y: parseFloat(storkModel.position.y.toFixed(2)),
            z: parseFloat(storkModel.position.z.toFixed(2)),
        };
    }
    state.boulderPositions = boulders.filter(b => b.active).map(b => ({
        x: parseFloat(b.mesh.position.x.toFixed(2)),
        y: parseFloat(b.mesh.position.y.toFixed(2)),
        z: parseFloat(b.mesh.position.z.toFixed(2)),
    }));

    // Average boulder speed
    const activeBoulders = boulders.filter(b => b.active && !b.collected);
    if (activeBoulders.length > 0) {
        const totalSpeed = activeBoulders.reduce((sum, b) => sum + b.velocity.length(), 0);
        state.averageBoulderSpeed = parseFloat((totalSpeed / activeBoulders.length).toFixed(2));
    } else {
        state.averageBoulderSpeed = 0;
    }

    state.simulationTime = parseFloat(state.simulationTime.toFixed(1));

    // Update HUD
    document.getElementById('score-display').textContent = `Score: ${state.score}`;
    document.getElementById('time-display').textContent = `Time: ${state.simulationTime.toFixed(1)}s`;
    document.getElementById('boulder-display').textContent = `Boulders Remaining: ${state.bouldersRemaining}`;
    document.getElementById('shield-display').textContent = `Shield HP: ${state.shieldHP}/3`;
    document.getElementById('barrier-token-display').textContent = `Barrier Tokens: ${state.barrierTokens}`;
    document.getElementById('status-display').textContent = `Status: ${state.status}`;

    // Color status
    const statusEl = document.getElementById('status-display');
    switch (state.status) {
        case 'READY': statusEl.style.color = '#aaffaa'; break;
        case 'RUNNING': statusEl.style.color = '#ffff88'; break;
        case 'PAUSED': statusEl.style.color = '#ffaa44'; break;
        case 'COMPLETE': statusEl.style.color = '#ff6666'; break;
    }
}

// Physics update
function updatePhysics(dt) {
    if (!state.simulationRunning) return;

    state.simulationTime += dt;

    // Slope direction in world space
    // The terrain slopes downward from high Y to low Y, and from negative Z to positive Z
    // Gravity component along slope
    const slopeDir = new THREE.Vector3(0, -Math.sin(TERRAIN_ANGLE_RAD), Math.cos(TERRAIN_ANGLE_RAD)).normalize();
    const gravAccel = GRAVITY_ALONG_SLOPE;
    const frictionDecel = FRICTION_DECEL;

    let anyActive = false;

    for (const boulder of boulders) {
        if (!boulder.active || boulder.collected) continue;
        anyActive = true;

        // Apply gravity along slope
        boulder.velocity.x += 0 * dt;
        boulder.velocity.y += -gravAccel * Math.sin(TERRAIN_ANGLE_RAD) * dt * 0.5;
        boulder.velocity.z += gravAccel * Math.cos(TERRAIN_ANGLE_RAD) * dt * 0.5;

        // Simplified: main motion is downhill
        boulder.velocity.y -= gravAccel * 0.4 * dt;
        boulder.velocity.z += gravAccel * 0.3 * dt;

        // Apply friction
        const speed = boulder.velocity.length();
        if (speed > 0.01) {
            const frictionForce = frictionDecel * dt;
            const newSpeed = Math.max(0, speed - frictionForce);
            boulder.velocity.normalize().multiplyScalar(newSpeed);
        }

        // Add some random lateral drift
        boulder.velocity.x += (Math.random() - 0.5) * 0.3 * dt;

        // Update position
        boulder.mesh.position.add(boulder.velocity.clone().multiplyScalar(dt));

        // Rolling rotation
        const axis = new THREE.Vector3(-boulder.velocity.z, 0, boulder.velocity.x).normalize();
        if (axis.length() > 0.001) {
            const angularSpeed = speed / boulder.radius;
            boulder.mesh.rotateOnWorldAxis(axis, angularSpeed * dt);
        }

        // Clamp to terrain surface
        const th = getTerrainHeight(boulder.mesh.position.x, boulder.mesh.position.z);
        if (th !== null) {
            if (boulder.mesh.position.y < th + boulder.radius * 0.5) {
                boulder.mesh.position.y = th + boulder.radius * 0.5;
                // Dampen vertical velocity
                if (boulder.velocity.y < 0) {
                    boulder.velocity.y *= -0.2;
                }
            }
        }

        // Check barrier collisions
        for (const barrier of barriers) {
            const bPos = boulder.mesh.position;
            const barPos = barrier.mesh.position;
            const dx = bPos.x - barPos.x;
            const dy = bPos.y - barPos.y;
            const dz = bPos.z - barPos.z;

            // Simple AABB-sphere collision
            const halfW = 4, halfH = 1.5, halfD = 0.5;
            const closestX = Math.max(barPos.x - halfW, Math.min(bPos.x, barPos.x + halfW));
            const closestY = Math.max(barPos.y - halfH, Math.min(bPos.y, barPos.y + halfH));
            const closestZ = Math.max(barPos.z - halfD, Math.min(bPos.z, barPos.z + halfD));

            const distSq = (bPos.x - closestX) ** 2 + (bPos.y - closestY) ** 2 + (bPos.z - closestZ) ** 2;
            if (distSq < boulder.radius * boulder.radius) {
                // Deflect
                boulder.velocity.multiplyScalar(0.2); // lose 80%
                boulder.velocity.x += (Math.random() - 0.5) * 4; // deflect sideways
                boulder.velocity.z *= -0.3;
                // Push out
                boulder.mesh.position.z = barPos.z - halfD - boulder.radius - 0.1;
                createImpactEffect(boulder.mesh.position.clone(), 0xccccff);
            }
        }

        // Check stork collision
        if (storkModel && state.storkAlive) {
            const dist = boulder.mesh.position.distanceTo(storkModel.position);

            // Check shield first
            if (state.shieldActive && dist < 4) {
                // Shield absorbs hit
                state.shieldHP--;
                state.score += 25;
                boulder.active = false;
                boulder.mesh.visible = false;
                createImpactEffect(boulder.mesh.position.clone(), 0x4488ff);

                if (state.shieldHP <= 0) {
                    state.shieldActive = false;
                    shieldMesh.visible = false;
                }
            } else if (dist < 3) {
                // Hit stork
                state.storkHits++;
                state.score -= 50;
                flashStorkRed();
                boulder.active = false;
                boulder.mesh.visible = false;
                createImpactEffect(storkModel.position.clone(), 0xff0000);

                if (state.storkHits >= 5) {
                    state.storkAlive = false;
                }
            }
        }

        // Check safe zone collection
        const sp = boulder.mesh.position;
        if (sp.x > -5 && sp.x < 5 && sp.z > 15 && sp.z < 25 && sp.y < -5) {
            boulder.collected = true;
            boulder.active = false;
            boulder.mesh.visible = false;
            state.score += 10;
            createImpactEffect(sp.clone(), 0x00ff00);
        }

        // Check if boulder went off terrain
        if (sp.y < -20 || sp.x < -55 || sp.x > 55 || sp.z > 55 || sp.z < -55) {
            boulder.active = false;
            boulder.mesh.visible = false;
        }
    }

    // Check completion
    const activeBoulders = boulders.filter(b => b.active && !b.collected);
    if (activeBoulders.length === 0 || !state.storkAlive) {
        state.status = 'COMPLETE';
        state.simulationRunning = false;
    }

    updateState();
}

// Update particles
function updateParticles(dt) {
    for (let i = impactParticles.length - 1; i >= 0; i--) {
        const p = impactParticles[i];
        p.velocity.y -= 9.8 * dt;
        p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
        p.life -= dt * 2;
        p.mesh.material.opacity = Math.max(0, p.life);
        p.mesh.material.transparent = true;
        p.mesh.scale.setScalar(p.life);

        if (p.life <= 0) {
            scene.remove(p.mesh);
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
            impactParticles.splice(i, 1);
        }
    }
}

// Reset
function resetSimulation() {
    state.simulationRunning = false;
    state.simulationTime = 0;
    state.score = 0;
    state.storkHits = 0;
    state.storkAlive = true;
    state.shieldActive = false;
    state.shieldHP = 3;
    state.barrierTokens = 2;
    state.selectedBarrierIndex = -1;
    state.status = 'READY';
    storkFlashTime = 0;

    // Reset boulders
    for (const boulder of boulders) {
        boulder.mesh.position.copy(boulder.startPos);
        boulder.velocity.set(0, 0, 0);
        boulder.active = true;
        boulder.collected = false;
        boulder.mesh.visible = true;
        boulder.mesh.rotation.set(0, 0, 0);
    }

    // Remove extra barriers (keep first 3)
    while (barriers.length > 3) {
        const b = barriers.pop();
        scene.remove(b.mesh);
        b.mesh.geometry.dispose();
        b.mesh.material.dispose();
        barrierMeshes.pop();
    }

    // Reset barrier positions
    const defaultPositions = [
        new THREE.Vector3(-10, 18, -15),
        new THREE.Vector3(5, 12, -5),
        new THREE.Vector3(-3, 8, 5),
    ];
    for (let i = 0; i < barriers.length; i++) {
        barriers[i].mesh.position.copy(barriers[i].startPos);
        barriers[i].selected = false;
        barriers[i].mesh.material.color.set(0x8B4513);
    }

    // Reset shield
    shieldMesh.visible = false;

    // Reset stork
    if (storkModel) {
        storkModel.position.copy(storkBasePos);
        restoreStorkColor();
    }

    // Clear particles
    for (const p of impactParticles) {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
    }
    impactParticles.length = 0;

    updateState();
}

// Input handling
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

document.addEventListener('keydown', (e) => {
    switch (e.code) {
        case 'Space':
            e.preventDefault();
            if (state.status === 'COMPLETE') return;
            if (state.status === 'READY' || state.status === 'PAUSED') {
                state.simulationRunning = true;
                state.status = 'RUNNING';
            } else if (state.status === 'RUNNING') {
                state.simulationRunning = false;
                state.status = 'PAUSED';
            }
            updateState();
            break;

        case 'KeyR':
            resetSimulation();
            break;

        case 'KeyB':
            if (state.barrierTokens > 0) {
                state.barrierTokens--;
                createBarrier(0, 15, 0);
                updateState();
            }
            break;

        case 'KeyS':
            if (!state.shieldActive && state.shieldHP > 0 && state.storkAlive) {
                state.shieldActive = true;
                shieldMesh.visible = true;
            } else if (state.shieldActive) {
                state.shieldActive = false;
                shieldMesh.visible = false;
            }
            updateState();
            break;

        case 'ArrowLeft':
            e.preventDefault();
            if (state.selectedBarrierIndex >= 0 && state.selectedBarrierIndex < barriers.length) {
                barriers[state.selectedBarrierIndex].mesh.position.x -= 2;
            }
            break;

        case 'ArrowRight':
            e.preventDefault();
            if (state.selectedBarrierIndex >= 0 && state.selectedBarrierIndex < barriers.length) {
                barriers[state.selectedBarrierIndex].mesh.position.x += 2;
            }
            break;

        case 'ArrowUp':
            e.preventDefault();
            if (state.selectedBarrierIndex >= 0 && state.selectedBarrierIndex < barriers.length) {
                barriers[state.selectedBarrierIndex].mesh.position.z -= 2;
            }
            break;

        case 'ArrowDown':
            e.preventDefault();
            if (state.selectedBarrierIndex >= 0 && state.selectedBarrierIndex < barriers.length) {
                barriers[state.selectedBarrierIndex].mesh.position.z += 2;
            }
            break;
    }
});

renderer.domElement.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(barrierMeshes);

    // Deselect all
    for (let i = 0; i < barriers.length; i++) {
        barriers[i].selected = false;
        barriers[i].mesh.material.color.set(0x8B4513);
    }
    state.selectedBarrierIndex = -1;

    if (intersects.length > 0) {
        const clickedMesh = intersects[0].object;
        const idx = barrierMeshes.indexOf(clickedMesh);
        if (idx >= 0) {
            barriers[idx].selected = true;
            barriers[idx].mesh.material.color.set(0xffff00);
            state.selectedBarrierIndex = idx;
        }
    }
    updateState();
});

document.getElementById('reset-btn').addEventListener('click', resetSimulation);

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Snowfall particles (ambient)
const snowParticles = [];
const snowGeom = new THREE.BufferGeometry();
const snowCount = 500;
const snowPositions = new Float32Array(snowCount * 3);
for (let i = 0; i < snowCount; i++) {
    snowPositions[i * 3] = (Math.random() - 0.5) * 120;
    snowPositions[i * 3 + 1] = Math.random() * 60;
    snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 120;
}
snowGeom.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
const snowMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.3,
    transparent: true,
    opacity: 0.7,
});
const snowPoints = new THREE.Points(snowGeom, snowMat);
scene.add(snowPoints);

function updateSnow(dt) {
    const positions = snowPoints.geometry.attributes.position.array;
    for (let i = 0; i < snowCount; i++) {
        positions[i * 3 + 1] -= dt * 3;
        positions[i * 3] += Math.sin(Date.now() * 0.001 + i) * dt * 0.5;
        if (positions[i * 3 + 1] < -15) {
            positions[i * 3 + 1] = 50 + Math.random() * 10;
            positions[i * 3] = (Math.random() - 0.5) * 120;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 120;
        }
    }
    snowPoints.geometry.attributes.position.needsUpdate = true;
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.05);
    const elapsed = clock.elapsedTime;

    controls.update();

    // Stork bobbing
    if (storkModel && state.storkAlive) {
        storkModel.position.y = storkBasePos.y + Math.sin(elapsed * Math.PI) * 0.3;
    }

    // Stork flash
    if (storkFlashTime > 0) {
        storkFlashTime -= dt;
        if (storkFlashTime <= 0) {
            restoreStorkColor();
        }
    }

    // Stork dead effect
    if (storkModel && !state.storkAlive) {
        storkModel.rotation.z = Math.PI / 2;
        storkModel.position.y = storkBasePos.y - 1;
    }

    // Shield position
    if (shieldMesh && storkModel) {
        shieldMesh.position.copy(storkModel.position);
        if (state.shieldActive) {
            shieldMesh.material.opacity = 0.2 + Math.sin(elapsed * 3) * 0.1;
        }
    }

    // Stork mixer
    if (storkMixer) {
        storkMixer.update(dt);
    }

    // Physics
    updatePhysics(dt);

    // Particles
    updateParticles(dt);

    // Snow
    updateSnow(dt);

    // Safe zone pulse
    safeZoneMat.opacity = 0.25 + Math.sin(elapsed * 2) * 0.1;

    renderer.render(scene, camera);
}

updateState();
animate();

</script>
