<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Avalanche Simulation</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    canvas { display: block; }

    #hud {
        position: absolute;
        top: 15px;
        left: 15px;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        padding: 15px 20px;
        border-radius: 10px;
        font-size: 14px;
        line-height: 1.8;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        min-width: 220px;
    }

    #hud .label {
        color: #aaa;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    #hud .value {
        color: #4fc3f7;
        font-weight: bold;
    }

    #hud .status-on { color: #66bb6a; }
    #hud .status-off { color: #ef5350; }

    #controls {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(0, 0, 0, 0.7);
        padding: 15px 25px;
        border-radius: 12px;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #controls button {
        padding: 10px 22px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    #startBtn {
        background: linear-gradient(135deg, #e53935, #ff7043);
        color: white;
        box-shadow: 0 3px 10px rgba(229, 57, 53, 0.3);
    }

    #startBtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(229, 57, 53, 0.5);
    }

    #startBtn:disabled {
        background: #555;
        box-shadow: none;
        transform: none;
        cursor: not-allowed;
    }

    #resetBtn {
        background: linear-gradient(135deg, #1e88e5, #42a5f5);
        color: white;
        box-shadow: 0 3px 10px rgba(30, 136, 229, 0.3);
    }

    #resetBtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(30, 136, 229, 0.5);
    }

    .slider-container {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #fff;
        font-size: 13px;
    }

    .slider-container label {
        white-space: nowrap;
    }

    #speedSlider {
        -webkit-appearance: none;
        width: 120px;
        height: 6px;
        border-radius: 3px;
        background: linear-gradient(90deg, #42a5f5, #ff7043);
        outline: none;
    }

    #speedSlider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: white;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    #speedValue {
        color: #4fc3f7;
        font-weight: bold;
        min-width: 30px;
    }

    .keyboard-hints {
        position: absolute;
        top: 15px;
        right: 15px;
        background: rgba(0, 0, 0, 0.7);
        color: #aaa;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 12px;
        line-height: 2;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .keyboard-hints kbd {
        background: rgba(255,255,255,0.15);
        padding: 2px 8px;
        border-radius: 4px;
        color: #fff;
        font-family: monospace;
        font-size: 13px;
    }
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">Active Particles: </span><span class="value" id="hudActive">0</span></div>
    <div><span class="label">Sim Time: </span><span class="value" id="hudTime">0.00s</span></div>
    <div><span class="label">Gravity: </span><span id="hudGravity" class="status-on">ON</span></div>
    <div><span class="label">Wind: </span><span id="hudWind" class="status-off">OFF</span></div>
</div>

<div class="keyboard-hints">
    <kbd>G</kbd> Toggle Gravity<br>
    <kbd>W</kbd> Toggle Wind
</div>

<div id="controls">
    <button id="startBtn">Trigger Avalanche</button>
    <button id="resetBtn">Reset</button>
    <div class="slider-container">
        <label for="speedSlider">Speed:</label>
        <input type="range" id="speedSlider" min="0.1" max="3.0" step="0.1" value="1.0">
        <span id="speedValue">1.0x</span>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Add fog for atmosphere
scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 30, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10, 40, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// Hemisphere light for better outdoor feel
const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x8B7355, 0.3);
scene.add(hemiLight);

// Terrain height function
function getTerrainHeight(x) {
    return 20 * (1 - (x + 40) / 80);
}

// Terrain
const terrainGeo = new THREE.PlaneGeometry(80, 80, 64, 64);
terrainGeo.rotateX(-Math.PI / 2);

const posAttr = terrainGeo.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
    const x = posAttr.getX(i);
    const z = posAttr.getZ(i);
    const baseHeight = getTerrainHeight(x);
    const noise = Math.sin(x * 0.3) * Math.cos(z * 0.2) * 1.5 +
                  Math.sin(x * 0.7 + z * 0.5) * 0.5;
    posAttr.setY(i, baseHeight + noise);
}
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshStandardMaterial({
    color: 0x8B7355,
    roughness: 0.9,
    metalness: 0.05,
    flatShading: false
});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.receiveShadow = true;
scene.add(terrain);

// Snow layer on top of terrain (slightly offset)
const snowGeo = new THREE.PlaneGeometry(80, 80, 64, 64);
snowGeo.rotateX(-Math.PI / 2);
const snowPosAttr = snowGeo.attributes.position;
for (let i = 0; i < snowPosAttr.count; i++) {
    const x = snowPosAttr.getX(i);
    const z = snowPosAttr.getZ(i);
    const baseHeight = getTerrainHeight(x);
    const noise = Math.sin(x * 0.3) * Math.cos(z * 0.2) * 1.5 +
                  Math.sin(x * 0.7 + z * 0.5) * 0.5;
    // Snow only on upper portion
    const snowCoverage = Math.max(0, (baseHeight - 5) / 15);
    snowPosAttr.setY(i, baseHeight + noise + 0.15 * snowCoverage);
}
snowGeo.computeVertexNormals();

const snowMat = new THREE.MeshStandardMaterial({
    color: 0xEEEEFF,
    roughness: 0.6,
    metalness: 0.0,
    transparent: true,
    opacity: 0.7
});
const snowLayer = new THREE.Mesh(snowGeo, snowMat);
snowLayer.receiveShadow = true;
scene.add(snowLayer);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 5, 0);

// Load GLTF model or fallback
const obstaclePos = new THREE.Vector3(15, 0, 0);
let modelLoaded = false;
let obstacleObject = null;

const loader = new GLTFLoader();
loader.load(
    '._BrainStem.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(3, 3, 3);
        const h = getTerrainHeight(obstaclePos.x);
        model.position.set(obstaclePos.x, h, obstaclePos.z);
        model.castShadow = true;
        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(model);
        obstacleObject = model;
        modelLoaded = true;
        window.__3D_STATE__.modelLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('GLTF load failed, using fallback box:', error);
        const fallbackGeo = new THREE.BoxGeometry(3, 6, 3);
        const fallbackMat = new THREE.MeshStandardMaterial({
            color: 0xcc3333,
            roughness: 0.5,
            metalness: 0.3
        });
        const fallback = new THREE.Mesh(fallbackGeo, fallbackMat);
        const h = getTerrainHeight(obstaclePos.x);
        fallback.position.set(obstaclePos.x, h + 3, obstaclePos.z);
        fallback.castShadow = true;
        fallback.receiveShadow = true;
        scene.add(fallback);
        obstacleObject = fallback;
        modelLoaded = false;
        window.__3D_STATE__.modelLoaded = false;
    }
);

// Avalanche particles
const PARTICLE_COUNT = 200;
const particles = [];
const particleVelocities = [];
const particleHitObstacle = new Set();

const particleGeo = new THREE.SphereGeometry(0.3, 8, 6);
const particleMat = new THREE.MeshStandardMaterial({
    color: 0xF0F0FF,
    roughness: 0.3,
    metalness: 0.0,
    emissive: 0x222233,
    emissiveIntensity: 0.1
});

for (let i = 0; i < PARTICLE_COUNT; i++) {
    const mesh = new THREE.Mesh(particleGeo, particleMat);
    mesh.castShadow = true;
    mesh.visible = false;
    const z = (Math.random() - 0.5) * 30; // -15 to 15
    const x = -30;
    const y = getTerrainHeight(x) + 1;
    mesh.position.set(x, y, z);
    scene.add(mesh);
    particles.push(mesh);
    particleVelocities.push({ x: 0, y: 0, z: 0 });
}

// State
let gravityEnabled = true;
let windEnabled = false;
let avalancheTriggered = false;
let wavesReleased = 0;
let particlesReleased = 0;
let simTime = 0;
let simRunning = false;
let particlesHitObstacleCount = 0;

// State object
window.__3D_STATE__ = {
    particlesActive: 0,
    particlesReleased: 0,
    simTime: 0,
    gravityEnabled: true,
    windEnabled: false,
    speedMultiplier: 1.0,
    avalancheTriggered: false,
    wavesReleased: 0,
    modelLoaded: false,
    avgParticleX: 0,
    avgParticleSpeed: 0,
    particlesHitObstacle: 0
};

// UI elements
const hudActive = document.getElementById('hudActive');
const hudTime = document.getElementById('hudTime');
const hudGravity = document.getElementById('hudGravity');
const hudWind = document.getElementById('hudWind');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const speedSlider = document.getElementById('speedSlider');
const speedValue = document.getElementById('speedValue');

// Speed slider
speedSlider.addEventListener('input', () => {
    const val = parseFloat(speedSlider.value);
    speedValue.textContent = val.toFixed(1) + 'x';
    window.__3D_STATE__.speedMultiplier = val;
});

// Start button
let waveIntervalId = null;
startBtn.addEventListener('click', () => {
    if (avalancheTriggered) return;
    avalancheTriggered = true;
    simRunning = true;
    startBtn.disabled = true;
    window.__3D_STATE__.avalancheTriggered = true;

    let waveIndex = 0;
    function releaseWave() {
        if (waveIndex >= 4) {
            clearInterval(waveIntervalId);
            return;
        }
        const start = waveIndex * 50;
        const end = start + 50;
        for (let i = start; i < end && i < PARTICLE_COUNT; i++) {
            particles[i].visible = true;
            const z = (Math.random() - 0.5) * 30;
            const x = -30 + (Math.random() - 0.5) * 4;
            const y = getTerrainHeight(x) + 0.5 + Math.random() * 2;
            particles[i].position.set(x, y, z);
            particleVelocities[i].x = Math.random() * 2 + 1;
            particleVelocities[i].y = Math.random() * 1;
            particleVelocities[i].z = (Math.random() - 0.5) * 2;
            particlesReleased++;
        }
        waveIndex++;
        wavesReleased = waveIndex;
        window.__3D_STATE__.wavesReleased = wavesReleased;
        window.__3D_STATE__.particlesReleased = particlesReleased;
    }

    releaseWave();
    waveIntervalId = setInterval(releaseWave, 500);
});

// Reset button
resetBtn.addEventListener('click', () => {
    if (waveIntervalId) {
        clearInterval(waveIntervalId);
        waveIntervalId = null;
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles[i].visible = false;
        const z = (Math.random() - 0.5) * 30;
        const x = -30;
        const y = getTerrainHeight(x) + 1;
        particles[i].position.set(x, y, z);
        particleVelocities[i].x = 0;
        particleVelocities[i].y = 0;
        particleVelocities[i].z = 0;
    }

    avalancheTriggered = false;
    simRunning = false;
    wavesReleased = 0;
    particlesReleased = 0;
    simTime = 0;
    particlesHitObstacleCount = 0;
    particleHitObstacle.clear();
    startBtn.disabled = false;

    window.__3D_STATE__.avalancheTriggered = false;
    window.__3D_STATE__.wavesReleased = 0;
    window.__3D_STATE__.particlesReleased = 0;
    window.__3D_STATE__.simTime = 0;
    window.__3D_STATE__.particlesHitObstacle = 0;
});

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.key === 'g' || e.key === 'G') {
        gravityEnabled = !gravityEnabled;
        window.__3D_STATE__.gravityEnabled = gravityEnabled;
        hudGravity.textContent = gravityEnabled ? 'ON' : 'OFF';
        hudGravity.className = gravityEnabled ? 'status-on' : 'status-off';
    }
    if (e.key === 'w' || e.key === 'W') {
        // Prevent if typing in input
        if (document.activeElement === speedSlider) return;
        windEnabled = !windEnabled;
        window.__3D_STATE__.windEnabled = windEnabled;
        hudWind.textContent = windEnabled ? 'ON' : 'OFF';
        hudWind.className = windEnabled ? 'status-on' : 'status-off';
    }
});

// Animation
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const rawDt = clock.getDelta();
    const speedMult = parseFloat(speedSlider.value);
    const dt = Math.min(rawDt, 0.05) * speedMult;

    controls.update();

    if (simRunning) {
        simTime += dt;

        let activeCount = 0;
        let totalX = 0;
        let totalSpeed = 0;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            if (!particles[i].visible) continue;

            const vel = particleVelocities[i];
            const pos = particles[i].position;

            // Gravity
            if (gravityEnabled) {
                vel.y += -9.8 * dt;
            }

            // Slope force (push downhill in +X)
            vel.x += 4.0 * dt;

            // Wind
            if (windEnabled) {
                vel.z += 2.0 * dt;
            }

            // Friction
            vel.x *= 0.995;
            vel.y *= 0.995;
            vel.z *= 0.995;

            // Update position
            pos.x += vel.x * dt;
            pos.y += vel.y * dt;
            pos.z += vel.z * dt;

            // Terrain collision
            const terrainH = getTerrainHeight(pos.x);
            if (pos.y < terrainH) {
                pos.y = terrainH;
                vel.y = 0;
                // Add slight bounce/spread
                vel.z += (Math.random() - 0.5) * 0.3;
            }

            // Obstacle collision
            const dx = pos.x - obstaclePos.x;
            const dy = pos.y - (getTerrainHeight(obstaclePos.x) + 3);
            const dz = pos.z - obstaclePos.z;
            const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
            if (dist < 4) {
                vel.x *= 0.5;
                vel.z += (Math.random() - 0.5) * 4;
                if (!particleHitObstacle.has(i)) {
                    particleHitObstacle.add(i);
                    particlesHitObstacleCount++;
                }
            }

            // Deactivation
            if (pos.x > 40 || pos.y < -5) {
                particles[i].visible = false;
                continue;
            }

            // Scale particles slightly based on speed for visual effect
            const speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y + vel.z * vel.z);
            const s = 0.8 + Math.min(speed * 0.05, 0.5);
            particles[i].scale.set(s, s, s);

            activeCount++;
            totalX += pos.x;
            totalSpeed += speed;
        }

        // Update HUD
        hudActive.textContent = activeCount;
        hudTime.textContent = simTime.toFixed(2) + 's';

        // Update state
        window.__3D_STATE__.particlesActive = activeCount;
        window.__3D_STATE__.simTime = simTime;
        window.__3D_STATE__.avgParticleX = activeCount > 0 ? totalX / activeCount : 0;
        window.__3D_STATE__.avgParticleSpeed = activeCount > 0 ? totalSpeed / activeCount : 0;
        window.__3D_STATE__.particlesHitObstacle = particlesHitObstacleCount;
    }

    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
