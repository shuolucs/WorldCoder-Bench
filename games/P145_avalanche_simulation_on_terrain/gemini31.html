<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Avalanche Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
        }
        button#resetBtn {
            background-color: #f44336;
        }
        button:hover {
            opacity: 0.9;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div>Active Particles: <span id="hud-active">0</span></div>
        <div>Sim Time: <span id="hud-time">0.00</span>s</div>
        <div>Gravity: <span id="hud-gravity">ON</span> (Press 'G')</div>
        <div>Wind: <span id="hud-wind">OFF</span> (Press 'W')</div>
    </div>

    <div id="controls">
        <button id="startBtn">Trigger Avalanche</button>
        <button id="resetBtn">Reset</button>
        <div class="slider-container">
            <label for="speedSlider">Speed:</label>
            <input type="range" id="speedSlider" min="0.1" max="3.0" step="0.1" value="1.0">
            <span id="speedValue">1.0x</span>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            particlesActive: 0,
            particlesReleased: 0,
            simTime: 0,
            gravityEnabled: true,
            windEnabled: false,
            speedMultiplier: 1.0,
            avalancheTriggered: false,
            wavesReleased: 0,
            modelLoaded: false,
            avgParticleX: 0,
            avgParticleSpeed: 0,
            particlesHitObstacle: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB');

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lights
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 40, 20);
        scene.add(dirLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        // Terrain
        const terrainGeo = new THREE.PlaneGeometry(80, 80, 64, 64);
        terrainGeo.rotateX(-Math.PI / 2);
        const posAttr = terrainGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            const x = posAttr.getX(i);
            const z = posAttr.getZ(i);
            // Base linear slope + simple sine wave for visual texture
            const y = 20 * (1 - (x + 40) / 80) + Math.sin(x * 0.5) * 0.5 + Math.sin(z * 0.5) * 0.5;
            posAttr.setY(i, y);
        }
        terrainGeo.computeVertexNormals();
        const terrainMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.8 });
        const terrain = new THREE.Mesh(terrainGeo, terrainMat);
        scene.add(terrain);

        // Model Loading
        const loader = new GLTFLoader();
        const obstaclePos = new THREE.Vector3(15, 0, 0);
        
        loader.load(
            '._BrainStem.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(3, 3, 3);
                model.position.copy(obstaclePos);
                scene.add(model);
                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            (error) => {
                // Fallback
                const boxGeo = new THREE.BoxGeometry(3, 6, 3);
                const boxMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.copy(obstaclePos);
                box.position.y += 3; // Rest on ground
                scene.add(box);
                window.__3D_STATE__.modelLoaded = false;
            }
        );

        // Avalanche Particle System
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.3, 8, 8);
        const particleMat = new THREE.MeshStandardMaterial({ color: 0xF0F0FF, roughness: 0.2 });

        for (let i = 0; i < 200; i++) {
            const mesh = new THREE.Mesh(particleGeo, particleMat);
            mesh.visible = false;
            scene.add(mesh);
            particles.push({
                mesh: mesh,
                vel: new THREE.Vector3(0, 0, 0),
                active: false,
                hitObstacle: false
            });
        }

        // Interaction Logic
        let waveInterval = null;

        function releaseWave() {
            const state = window.__3D_STATE__;
            if (state.wavesReleased >= 4) {
                clearInterval(waveInterval);
                return;
            }

            const startIndex = state.wavesReleased * 50;
            for (let i = startIndex; i < startIndex + 50; i++) {
                if (i >= particles.length) break;
                const p = particles[i];
                p.mesh.position.set(-30, 18, (Math.random() - 0.5) * 30);
                p.vel.set(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
                p.mesh.visible = true;
                p.active = true;
                p.hitObstacle = false;
                state.particlesReleased++;
            }
            state.wavesReleased++;
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            if (window.__3D_STATE__.avalancheTriggered) return;
            window.__3D_STATE__.avalancheTriggered = true;
            releaseWave(); // First wave immediately
            waveInterval = setInterval(releaseWave, 500);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (waveInterval) clearInterval(waveInterval);
            
            const state = window.__3D_STATE__;
            state.particlesActive = 0;
            state.particlesReleased = 0;
            state.simTime = 0;
            state.avalancheTriggered = false;
            state.wavesReleased = 0;
            state.particlesHitObstacle = 0;
            state.avgParticleX = 0;
            state.avgParticleSpeed = 0;

            particles.forEach(p => {
                p.active = false;
                p.mesh.visible = false;
                p.hitObstacle = false;
                p.vel.set(0, 0, 0);
            });
        });

        document.getElementById('speedSlider').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.speedMultiplier = val;
            document.getElementById('speedValue').innerText = val.toFixed(1) + 'x';
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'g') {
                window.__3D_STATE__.gravityEnabled = !window.__3D_STATE__.gravityEnabled;
            }
            if (e.key.toLowerCase() === 'w') {
                window.__3D_STATE__.windEnabled = !window.__3D_STATE__.windEnabled;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function updateHUD() {
            const state = window.__3D_STATE__;
            document.getElementById('hud-active').innerText = state.particlesActive;
            document.getElementById('hud-time').innerText = state.simTime.toFixed(2);
            document.getElementById('hud-gravity').innerText = state.gravityEnabled ? 'ON' : 'OFF';
            document.getElementById('hud-wind').innerText = state.windEnabled ? 'ON' : 'OFF';
        }

        function animate() {
            requestAnimationFrame(animate);

            const rawDt = clock.getDelta();
            const state = window.__3D_STATE__;
            const dt = rawDt * state.speedMultiplier;

            if (state.avalancheTriggered) {
                state.simTime += dt;
            }

            let activeCount = 0;
            let sumX = 0;
            let sumSpeed = 0;

            particles.forEach(p => {
                if (!p.active) return;

                // Physics
                if (state.gravityEnabled) {
                    p.vel.y -= 9.8 * dt;
                }
                
                p.vel.x += 4.0 * dt; // Slope force

                if (state.windEnabled) {
                    p.vel.z += 2.0 * dt;
                }

                p.vel.multiplyScalar(0.995); // Friction

                p.mesh.position.addScaledVector(p.vel, dt);

                // Terrain Collision
                const h = 20 * (1 - (p.mesh.position.x + 40) / 80);
                if (p.mesh.position.y < h) {
                    p.mesh.position.y = h;
                    p.vel.y = 0;
                }

                // Obstacle Collision
                if (p.mesh.position.distanceTo(obstaclePos) < 4) {
                    p.vel.x *= 0.5;
                    p.vel.z += (Math.random() - 0.5) * 2.0;
                    if (!p.hitObstacle) {
                        p.hitObstacle = true;
                        state.particlesHitObstacle++;
                    }
                }

                // Deactivation
                if (p.mesh.position.x > 40 || p.mesh.position.y < -5) {
                    p.active = false;
                    p.mesh.visible = false;
                } else {
                    activeCount++;
                    sumX += p.mesh.position.x;
                    sumSpeed += p.vel.length();
                }
            });

            state.particlesActive = activeCount;
            state.avgParticleX = activeCount > 0 ? sumX / activeCount : 0;
            state.avgParticleSpeed = activeCount > 0 ? sumSpeed / activeCount : 0;

            updateHUD();
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
