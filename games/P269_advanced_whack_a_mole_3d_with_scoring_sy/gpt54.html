<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Whack-a-Mole</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      color: white;
      font-size: 24px;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 14px;
      border-radius: 8px;
      z-index: 10;
      user-select: none;
    }

    #scoreDisplay {
      top: 16px;
      left: 16px;
    }

    #comboDisplay {
      top: 64px;
      left: 16px;
    }

    #ratioDisplay {
      top: 112px;
      left: 16px;
    }

    #timerDisplay {
      top: 16px;
      right: 16px;
    }

    #startBtn {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 24px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ffcc33;
      color: #222;
      font-weight: bold;
    }

    #startBtn:hover {
      background: #ffd95e;
    }

    #gameOverOverlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      z-index: 30;
      text-align: center;
    }

    #gameOverOverlay h1 {
      margin: 0 0 16px;
      font-size: 56px;
    }

    #gameOverOverlay p {
      margin: 0 0 24px;
      font-size: 32px;
    }

    #restartBtn {
      font-size: 24px;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #4caf50;
      color: white;
      font-weight: bold;
    }

    #restartBtn:hover {
      background: #62c766;
    }
  </style>
</head>
<body>
  <div id="scoreDisplay" class="hud">Score: 0</div>
  <div id="comboDisplay" class="hud">Combo: 0x</div>
  <div id="ratioDisplay" class="hud">Hits: 0 | Misses: 0</div>
  <div id="timerDisplay" class="hud">Time: 60s</div>

  <button id="startBtn">Start Game</button>

  <div id="gameOverOverlay">
    <h1>Game Over</h1>
    <p id="finalScoreText">Final Score: 0</p>
    <button id="restartBtn">Play Again</button>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scoreDisplay = document.getElementById('scoreDisplay');
    const comboDisplay = document.getElementById('comboDisplay');
    const ratioDisplay = document.getElementById('ratioDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScoreText = document.getElementById('finalScoreText');
    const restartBtn = document.getElementById('restartBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 8, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 1.2;
    controls.minDistance = 5;
    controls.maxDistance = 20;
    controls.target.set(0, 0, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: '#2d5a1e' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const holePositions = [
      new THREE.Vector3(-3, 0, -3),
      new THREE.Vector3(0, 0, -3),
      new THREE.Vector3(3, 0, -3),
      new THREE.Vector3(-3, 0, 0),
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(3, 0, 0),
      new THREE.Vector3(-3, 0, 3),
      new THREE.Vector3(0, 0, 3),
      new THREE.Vector3(3, 0, 3)
    ];

    const holeMeshes = [];
    const holeGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.1, 32);
    const holeMat = new THREE.MeshStandardMaterial({ color: 0x3b2314 });

    for (let i = 0; i < holePositions.length; i++) {
      const hole = new THREE.Mesh(holeGeo, holeMat);
      hole.position.copy(holePositions[i]);
      hole.castShadow = false;
      hole.receiveShadow = true;
      scene.add(hole);
      holeMeshes.push(hole);
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const hiddenY = -1.5;
    const upY = 0.8;

    let phase = 'idle';
    let score = 0;
    let timeRemaining = 60;
    let combo = 0;
    let hitCount = 0;
    let missCount = 0;
    let totalMolesSpawned = 0;
    let difficultyTier = 1;
    let lastHitIndex = -1;
    let gameStartTime = 0;
    let nextSpawnTime = Infinity;
    let gameEndTime = 0;

    const moles = [];
    const clickableMoles = [];
    const particles = [];
    let baseMoleScene = null;

    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      phase: 'idle',
      score: 0,
      timeRemaining: 60,
      combo: 0,
      hitCount: 0,
      missCount: 0,
      molesUp: 0,
      totalMolesSpawned: 0,
      difficultyTier: 1,
      moleStates: new Array(9).fill(false),
      lastHitIndex: -1,
      gameOverShown: false
    };

    function deepCloneGltfScene(source) {
      return source.clone(true);
    }

    function createFallbackMole() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.45, 24, 24),
        new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
      );
      body.castShadow = true;
      body.receiveShadow = true;
      body.position.y = 0.45;
      group.add(body);

      const nose = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffb6a3 })
      );
      nose.position.set(0, 0.42, 0.38);
      nose.castShadow = true;
      group.add(nose);

      const eyeGeo = new THREE.SphereGeometry(0.04, 12, 12);
      const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

      const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
      eyeL.position.set(-0.12, 0.56, 0.34);
      group.add(eyeL);

      const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
      eyeR.position.set(0.12, 0.56, 0.34);
      group.add(eyeR);

      return group;
    }

    function prepareModel(model) {
      model.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });
      model.scale.set(0.5, 0.5, 0.5);
      return model;
    }

    function createMolesFromModel(modelTemplate) {
      for (let i = 0; i < 9; i++) {
        const root = new THREE.Group();
        root.position.set(holePositions[i].x, hiddenY, holePositions[i].z);

        const model = prepareModel(deepCloneGltfScene(modelTemplate));
        root.add(model);

        scene.add(root);

        const mole = {
          index: i,
          root,
          model,
          isUp: false,
          isAnimating: false,
          retreating: false,
          animation: null,
          upUntil: 0,
          bonkAnim: null
        };

        moles.push(mole);
        clickableMoles.push(root);
      }
    }

    function loadMoles() {
      const loader = new GLTFLoader();
      loader.load(
        'facecap.glb',
        (gltf) => {
          baseMoleScene = gltf.scene;
          createMolesFromModel(baseMoleScene);
        },
        undefined,
        () => {
          baseMoleScene = createFallbackMole();
          createMolesFromModel(baseMoleScene);
        }
      );
    }

    function setHUD() {
      scoreDisplay.textContent = `Score: ${score}`;
      comboDisplay.textContent = `Combo: ${combo}x`;
      ratioDisplay.textContent = `Hits: ${hitCount} | Misses: ${missCount}`;
      timerDisplay.textContent = `Time: ${timeRemaining}s`;
    }

    function resetGame() {
      phase = 'idle';
      score = 0;
      timeRemaining = 60;
      combo = 0;
      hitCount = 0;
      missCount = 0;
      totalMolesSpawned = 0;
      difficultyTier = 1;
      lastHitIndex = -1;
      gameStartTime = 0;
      nextSpawnTime = Infinity;
      gameEndTime = 0;

      for (const mole of moles) {
        mole.isUp = false;
        mole.isAnimating = false;
        mole.retreating = false;
        mole.animation = null;
        mole.upUntil = 0;
        mole.bonkAnim = null;
        mole.root.position.y = hiddenY;
        mole.root.scale.set(1, 1, 1);
      }

      for (const p of particles) {
        scene.remove(p.mesh);
      }
      particles.length = 0;

      gameOverOverlay.style.display = 'none';
      startBtn.style.display = 'block';
      setHUD();
    }

    function startGame() {
      if (moles.length < 9) return;

      score = 0;
      timeRemaining = 60;
      combo = 0;
      hitCount = 0;
      missCount = 0;
      totalMolesSpawned = 0;
      difficultyTier = 1;
      lastHitIndex = -1;
      phase = 'playing';

      const now = performance.now();
      gameStartTime = now;
      gameEndTime = gameStartTime + 60000;
      nextSpawnTime = now;

      for (const mole of moles) {
        mole.isUp = false;
        mole.isAnimating = false;
        mole.retreating = false;
        mole.animation = null;
        mole.upUntil = 0;
        mole.bonkAnim = null;
        mole.root.position.y = hiddenY;
        mole.root.scale.set(1, 1, 1);
      }

      for (const p of particles) {
        scene.remove(p.mesh);
      }
      particles.length = 0;

      gameOverOverlay.style.display = 'none';
      startBtn.style.display = 'none';
      setHUD();
    }

    function endGame() {
      phase = 'ended';
      nextSpawnTime = Infinity;
      timeRemaining = 0;

      for (const mole of moles) {
        if (mole.isUp || mole.isAnimating) {
          retreatMole(mole, 200);
        }
      }

      finalScoreText.textContent = `Final Score: ${score}`;
      gameOverOverlay.style.display = 'flex';
      startBtn.style.display = 'none';
      setHUD();
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function animateMoleY(mole, fromY, toY, duration, onComplete = null) {
      mole.isAnimating = true;
      mole.animation = {
        start: performance.now(),
        duration,
        fromY,
        toY,
        onComplete
      };
    }

    function popUpMole(mole, stayDuration) {
      mole.isUp = true;
      mole.retreating = false;
      mole.upUntil = performance.now() + stayDuration;
      animateMoleY(mole, mole.root.position.y, upY, 300, () => {
        mole.isAnimating = false;
      });
      totalMolesSpawned++;
    }

    function retreatMole(mole, duration = 200) {
      if (mole.retreating) return;
      mole.retreating = true;
      mole.isUp = false;
      mole.upUntil = 0;
      animateMoleY(mole, mole.root.position.y, hiddenY, duration, () => {
        mole.isAnimating = false;
        mole.retreating = false;
        mole.root.scale.set(1, 1, 1);
      });
    }

    function getDifficultySettings(elapsedSec) {
      if (elapsedSec < 20) {
        return { tier: 1, minSpawn: 1, maxSpawn: 1, stay: 1200 };
      }
      if (elapsedSec < 40) {
        return { tier: 2, minSpawn: 1, maxSpawn: 2, stay: 1000 };
      }
      return { tier: 3, minSpawn: 1, maxSpawn: 3, stay: 800 };
    }

    function deterministicSpawn(now) {
      const elapsedSec = Math.floor((now - gameStartTime) / 1000);
      const settings = getDifficultySettings(elapsedSec);
      difficultyTier = settings.tier;

      const available = moles.filter(m => !m.isUp && !m.retreating && m.root.position.y <= 0);
      if (available.length === 0) return;

      const maxSpawnCount = Math.min(settings.maxSpawn, available.length);
      const minSpawnCount = Math.min(settings.minSpawn, maxSpawnCount);
      const spawnCount = minSpawnCount + Math.floor(Math.random() * (maxSpawnCount - minSpawnCount + 1));

      const chosen = [];
      const pool = available.slice();

      for (let i = 0; i < spawnCount; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        chosen.push(pool[idx]);
        pool.splice(idx, 1);
      }

      for (const mole of chosen) {
        popUpMole(mole, settings.stay);
      }
    }

    function bonkEffect(mole) {
      mole.bonkAnim = {
        start: performance.now(),
        duration: 160
      };
    }

    function spawnHitParticles(position) {
      for (let i = 0; i < 8; i++) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.08, 8, 8),
          new THREE.MeshStandardMaterial({
            color: 0xffdd33,
            transparent: true,
            opacity: 1
          })
        );
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        mesh.position.copy(position);
        scene.add(mesh);

        const angle = (Math.PI * 2 * i) / 8;
        const speed = 1.2 + Math.random() * 0.8;
        const vy = 1.0 + Math.random() * 1.0;

        particles.push({
          mesh,
          velocity: new THREE.Vector3(Math.cos(angle) * speed, vy, Math.sin(angle) * speed),
          life: 0.45,
          maxLife: 0.45
        });
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        if (p.life <= 0) {
          scene.remove(p.mesh);
          particles.splice(i, 1);
          continue;
        }
        p.velocity.y -= 3.5 * dt;
        p.mesh.position.addScaledVector(p.velocity, dt);
        p.mesh.material.opacity = p.life / p.maxLife;
      }
    }

    function handleHit(mole) {
      combo += 1;
      let points = 10;
      if (combo >= 3) {
        points = 10 + combo * 5;
      }
      score += points;
      hitCount += 1;
      lastHitIndex = mole.index;

      bonkEffect(mole);
      spawnHitParticles(new THREE.Vector3(
        mole.root.position.x,
        Math.max(mole.root.position.y, 0.4) + 0.3,
        mole.root.position.z
      ));
      retreatMole(mole, 200);
      setHUD();
    }

    function handleMiss() {
      missCount += 1;
      combo = 0;
      setHUD();
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (phase !== 'playing' || moles.length < 9) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(clickableMoles, true);

      let hitMole = null;
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !clickableMoles.includes(obj)) {
          obj = obj.parent;
        }
        if (obj) {
          hitMole = moles.find(m => m.root === obj);
        }
      }

      if (hitMole && hitMole.isUp && hitMole.root.position.y > 0) {
        handleHit(hitMole);
      } else {
        handleMiss();
      }
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', () => {
      resetGame();
      startGame();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
    });

    loadMoles();
    resetGame();

    function updateMoles(now) {
      for (const mole of moles) {
        if (mole.animation) {
          const t = Math.min((now - mole.animation.start) / mole.animation.duration, 1);
          const eased = easeOutCubic(t);
          mole.root.position.y = THREE.MathUtils.lerp(mole.animation.fromY, mole.animation.toY, eased);

          if (t >= 1) {
            const complete = mole.animation.onComplete;
            mole.animation = null;
            if (complete) complete();
          }
        }

        if (mole.bonkAnim) {
          const t = Math.min((now - mole.bonkAnim.start) / mole.bonkAnim.duration, 1);
          const pulse = t < 0.5 ? t / 0.5 : (1 - t) / 0.5;
          const sx = THREE.MathUtils.lerp(1, 0.7, pulse);
          const sy = THREE.MathUtils.lerp(1, 0.3, pulse);
          const sz = THREE.MathUtils.lerp(1, 0.7, pulse);
          mole.root.scale.set(sx, sy, sz);

          if (t >= 1) {
            mole.bonkAnim = null;
            mole.root.scale.set(1, 1, 1);
          }
        }

        if (phase === 'playing' && mole.isUp && !mole.retreating && now >= mole.upUntil) {
          retreatMole(mole, 200);
        }
      }
    }

    function updateGameState(now) {
      if (phase === 'playing') {
        const elapsedMs = now - gameStartTime;
        const elapsedSec = Math.floor(elapsedMs / 1000);
        timeRemaining = Math.max(0, 60 - elapsedSec);

        const settings = getDifficultySettings(elapsedSec);
        difficultyTier = settings.tier;

        if (now >= gameEndTime) {
          endGame();
        } else if (now >= nextSpawnTime) {
          deterministicSpawn(now);
          nextSpawnTime += 1500;
        }
      }
    }

    function syncState() {
      const moleStates = moles.length === 9
        ? moles.map(m => m.root.position.y > 0)
        : new Array(9).fill(false);

      const molesUp = moleStates.filter(Boolean).length;

      window.__3D_STATE__.phase = phase;
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.timeRemaining = timeRemaining;
      window.__3D_STATE__.combo = combo;
      window.__3D_STATE__.hitCount = hitCount;
      window.__3D_STATE__.missCount = missCount;
      window.__3D_STATE__.molesUp = molesUp;
      window.__3D_STATE__.totalMolesSpawned = totalMolesSpawned;
      window.__3D_STATE__.difficultyTier = difficultyTier;
      window.__3D_STATE__.moleStates = moleStates;
      window.__3D_STATE__.lastHitIndex = lastHitIndex;
      window.__3D_STATE__.gameOverShown = gameOverOverlay.style.display !== 'none';
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      const now = performance.now();

      updateGameState(now);
      updateMoles(now);
      updateParticles(dt);
      controls.update();

      if (phase === 'playing' || phase === 'ended' || phase === 'idle') {
        setHUD();
      }

      syncState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
