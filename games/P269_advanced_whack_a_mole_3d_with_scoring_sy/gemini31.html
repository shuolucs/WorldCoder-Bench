<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Whack-a-Mole</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            color: white;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
        }
        #scoreDisplay { top: 20px; left: 20px; }
        #comboDisplay { top: 70px; left: 20px; }
        #ratioDisplay { top: 120px; left: 20px; font-size: 18px; }
        #timerDisplay { top: 20px; right: 20px; }
        
        #startBtn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #d35400;
            border: 2px solid #e67e22;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: background-color 0.2s, transform 0.1s;
            z-index: 10;
        }
        #startBtn:hover { background-color: #e67e22; }
        #startBtn:active { transform: translateX(-50%) scale(0.95); }
        #startBtn:disabled { background-color: #7f8c8d; border-color: #95a5a6; cursor: not-allowed; }

        #gameOverOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #gameOverOverlay h1 { font-size: 64px; margin-bottom: 10px; color: #e74c3c; }
        #gameOverOverlay p { font-size: 32px; margin: 10px 0; }
        #restartBtn {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 24px;
            color: white;
            background-color: #27ae60;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #restartBtn:hover { background-color: #2ecc71; }

        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 30;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="loading">Loading Models...</div>
    
    <button id="startBtn" style="display: none;">Start Game</button>
    
    <div id="scoreDisplay" class="hud">Score: 0</div>
    <div id="comboDisplay" class="hud">Combo: 0</div>
    <div id="ratioDisplay" class="hud">Hits: 0 | Misses: 0</div>
    <div id="timerDisplay" class="hud">Time: 60s</div>

    <div id="gameOverOverlay">
        <h1>Game Over!</h1>
        <p id="finalScore">Final Score: 0</p>
        <p id="finalStats">Hits: 0 | Misses: 0</p>
        <button id="restartBtn">Play Again</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            phase: 'idle', // 'idle' | 'playing' | 'ended'
            score: 0,
            timeRemaining: 60,
            combo: 0,
            hitCount: 0,
            missCount: 0,
            molesUp: 0,
            totalMolesSpawned: 0,
            difficultyTier: 1,
            moleStates: Array(9).fill(false),
            lastHitIndex: -1,
            gameOverShown: false
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky blue

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.minPolarAngle = 0.3;
        controls.maxPolarAngle = 1.2;
        controls.minDistance = 5;
        controls.maxDistance = 20;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Holes ---
        const holePositions = [
            new THREE.Vector3(-3, 0, -3), new THREE.Vector3(0, 0, -3), new THREE.Vector3(3, 0, -3),
            new THREE.Vector3(-3, 0, 0),  new THREE.Vector3(0, 0, 0),  new THREE.Vector3(3, 0, 0),
            new THREE.Vector3(-3, 0, 3),  new THREE.Vector3(0, 0, 3),  new THREE.Vector3(3, 0, 3)
        ];
        
        const holeGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.1, 32);
        const holeMat = new THREE.MeshStandardMaterial({ color: 0x3d2314 });
        
        holePositions.forEach(pos => {
            const hole = new THREE.Mesh(holeGeo, holeMat);
            hole.position.copy(pos);
            hole.receiveShadow = true;
            scene.add(hole);
        });

        // --- Moles ---
        const moles = [];
        const moleGroup = new THREE.Group();
        let modelLoaded = false;

        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/facecap.glb', (gltf) => {
            const baseModel = gltf.scene;
            
            // Center and adjust model
            const box = new THREE.Box3().setFromObject(baseModel);
            const center = box.getCenter(new THREE.Vector3());
            baseModel.position.sub(center);
            baseModel.position.y += (box.max.y - box.min.y) / 2; // Align bottom to 0

            baseModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            for (let i = 0; i < 9; i++) {
                const clone = baseModel.clone();
                const group = new THREE.Group();
                group.add(clone);
                
                group.position.copy(holePositions[i]);
                group.position.y = -1.5;
                group.scale.set(0.5, 0.5, 0.5);
                
                // Tag meshes for raycasting
                group.traverse((child) => {
                    if (child.isMesh) child.userData.moleIndex = i;
                });

                scene.add(group);
                
                moles.push({
                    index: i,
                    mesh: group,
                    state: 'hidden', // hidden, popping, up, retreating
                    animStart: 0,
                    stayDuration: 0,
                    bonkStart: 0
                });
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('startBtn').style.display = 'block';
            modelLoaded = true;
        }, undefined, (error) => {
            console.error("Error loading model:", error);
            document.getElementById('loading').innerText = "Error loading model. Please refresh.";
        });

        // --- Particles ---
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.1, 8, 8);
        const particleMat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true });

        function spawnParticles(position) {
            for (let i = 0; i < 8; i++) {
                const mesh = new THREE.Mesh(particleGeo, particleMat.clone());
                mesh.position.copy(position);
                mesh.position.y += 0.5; // Spawn slightly above center
                
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 8,
                    Math.random() * 5 + 2,
                    (Math.random() - 0.5) * 8
                );
                
                scene.add(mesh);
                particles.push({ mesh, velocity, life: 1.0 });
            }
        }

        // --- Game Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let lastSpawnTime = 0;
        let gameTimer = 0;

        function updateDifficulty() {
            if (state.timeRemaining > 40) {
                state.difficultyTier = 1;
            } else if (state.timeRemaining > 20) {
                state.difficultyTier = 2;
            } else {
                state.difficultyTier = 3;
            }
        }

        function spawnMoles(now) {
            if (now - lastSpawnTime > 1500) {
                lastSpawnTime = now;
                
                let numToSpawn = 1;
                let stayTime = 1200;

                if (state.difficultyTier === 2) {
                    numToSpawn = Math.floor(Math.random() * 2) + 1; // 1-2
                    stayTime = 1000;
                } else if (state.difficultyTier === 3) {
                    numToSpawn = Math.floor(Math.random() * 3) + 1; // 1-3
                    stayTime = 800;
                }

                const hiddenMoles = moles.filter(m => m.state === 'hidden');
                
                // Shuffle array
                for (let i = hiddenMoles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [hiddenMoles[i], hiddenMoles[j]] = [hiddenMoles[j], hiddenMoles[i]];
                }

                const spawnCount = Math.min(numToSpawn, hiddenMoles.length);
                for (let i = 0; i < spawnCount; i++) {
                    const mole = hiddenMoles[i];
                    mole.state = 'popping';
                    mole.animStart = now;
                    mole.stayDuration = stayTime;
                    state.totalMolesSpawned++;
                }
            }
        }

        function handleHit(moleIndex, now) {
            const mole = moles[moleIndex];
            if (mole.state === 'up' || mole.state === 'popping') {
                // Hit!
                state.hitCount++;
                state.combo++;
                state.lastHitIndex = moleIndex;
                
                let points = 10;
                if (state.combo >= 3) {
                    points += state.combo * 5;
                }
                state.score += points;

                // Trigger effects
                mole.state = 'retreating';
                mole.animStart = now;
                mole.bonkStart = now;
                
                spawnParticles(mole.mesh.position);
                updateHUD();
            }
        }

        function handleMiss() {
            state.missCount++;
            state.combo = 0;
            updateHUD();
        }

        function onPointerDown(event) {
            if (state.phase !== 'playing') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Intersect against moles and ground
            const interactables = [...moles.map(m => m.mesh), ground];
            const intersects = raycaster.intersectObjects(interactables, true);

            if (intersects.length > 0) {
                const hitObj = intersects[0].object;
                if (hitObj === ground) {
                    handleMiss();
                } else if (hitObj.userData.moleIndex !== undefined) {
                    handleHit(hitObj.userData.moleIndex, performance.now());
                } else {
                    // Fallback if clicked on a part of mole without userData
                    let parent = hitObj.parent;
                    let found = false;
                    while (parent) {
                        if (parent.userData && parent.userData.moleIndex !== undefined) {
                            handleHit(parent.userData.moleIndex, performance.now());
                            found = true;
                            break;
                        }
                        parent = parent.parent;
                    }
                    if (!found) handleMiss();
                }
            } else {
                handleMiss();
            }
        }

        window.addEventListener('pointerdown', onPointerDown);

        // --- UI & Flow ---
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        
        const scoreDisplay = document.getElementById('scoreDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const ratioDisplay = document.getElementById('ratioDisplay');
        const timerDisplay = document.getElementById('timerDisplay');

        function updateHUD() {
            scoreDisplay.innerText = `Score: ${state.score}`;
            comboDisplay.innerText = `Combo: ${state.combo}`;
            ratioDisplay.innerText = `Hits: ${state.hitCount} | Misses: ${state.missCount}`;
            timerDisplay.innerText = `Time: ${Math.ceil(state.timeRemaining)}s`;
        }

        function startGame() {
            state.phase = 'playing';
            state.score = 0;
            state.timeRemaining = 60;
            state.combo = 0;
            state.hitCount = 0;
            state.missCount = 0;
            state.totalMolesSpawned = 0;
            state.lastHitIndex = -1;
            state.gameOverShown = false;
            
            startBtn.style.display = 'none';
            gameOverOverlay.style.visibility = 'hidden';
            gameOverOverlay.style.opacity = 0;
            
            lastSpawnTime = performance.now();
            gameTimer = performance.now();
            
            updateHUD();
        }

        function endGame() {
            state.phase = 'ended';
            state.gameOverShown = true;
            
            // Hide all moles
            moles.forEach(m => {
                if (m.state !== 'hidden') {
                    m.state = 'retreating';
                    m.animStart = performance.now();
                }
            });

            document.getElementById('finalScore').innerText = `Final Score: ${state.score}`;
            document.getElementById('finalStats').innerText = `Hits: ${state.hitCount} | Misses: ${state.missCount}`;
            
            gameOverOverlay.style.visibility = 'visible';
            gameOverOverlay.style.opacity = 1;
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const now = performance.now();

            if (state.phase === 'playing') {
                // Timer logic
                state.timeRemaining = 60 - ((now - gameTimer) / 1000);
                if (state.timeRemaining <= 0) {
                    state.timeRemaining = 0;
                    endGame();
                } else {
                    updateDifficulty();
                    spawnMoles(now);
                    timerDisplay.innerText = `Time: ${Math.ceil(state.timeRemaining)}s`;
                }
            }

            // Mole Animations
            let currentMolesUp = 0;
            
            moles.forEach((mole, i) => {
                // Y Position Animation
                if (mole.state === 'popping') {
                    let progress = (now - mole.animStart) / 300;
                    if (progress >= 1) {
                        mole.mesh.position.y = 0.8;
                        mole.state = 'up';
                        mole.animStart = now; // Reset for stay duration
                    } else {
                        // Ease out cubic
                        let ease = 1 - Math.pow(1 - progress, 3);
                        mole.mesh.position.y = -1.5 + (2.3 * ease);
                    }
                } else if (mole.state === 'up') {
                    if (now - mole.animStart > mole.stayDuration && state.phase === 'playing') {
                        mole.state = 'retreating';
                        mole.animStart = now;
                    }
                } else if (mole.state === 'retreating') {
                    let progress = (now - mole.animStart) / 200;
                    if (progress >= 1) {
                        mole.mesh.position.y = -1.5;
                        mole.state = 'hidden';
                    } else {
                        mole.mesh.position.y = 0.8 - (2.3 * progress);
                    }
                }

                // Bonk Scale Animation
                if (mole.bonkStart > 0) {
                    let bProg = (now - mole.bonkStart) / 150;
                    if (bProg >= 1) {
                        mole.mesh.scale.set(0.5, 0.5, 0.5);
                        mole.bonkStart = 0;
                    } else if (bProg < 0.5) {
                        // Scale to 0.7, 0.3, 0.7
                        let p = bProg * 2;
                        mole.mesh.scale.set(0.5 + 0.2*p, 0.5 - 0.2*p, 0.5 + 0.2*p);
                    } else {
                        // Scale back to 0.5, 0.5, 0.5
                        let p = (bProg - 0.5) * 2;
                        mole.mesh.scale.set(0.7 - 0.2*p, 0.3 + 0.2*p, 0.7 - 0.2*p);
                    }
                }

                // Update state array
                const isVisible = mole.mesh.position.y > 0;
                state.moleStates[i] = isVisible;
                if (isVisible) currentMolesUp++;
            });

            state.molesUp = currentMolesUp;

            // Particle Animation
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.life -= delta * 2; // Fade out over 0.5s
                
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    p.mesh.geometry.dispose();
                    particles.splice(i, 1);
                } else {
                    // Gravity effect
                    p.velocity.y -= 15 * delta;
                    p.mesh.position.addScaledVector(p.velocity, delta);
                    p.mesh.material.opacity = p.life;
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
