<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Whack-a-Mole</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }

#startBtn {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 40px;
    font-size: 24px;
    font-weight: bold;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    z-index: 100;
    transition: background 0.2s;
}
#startBtn:hover { background: #ff8833; }

#scoreDisplay, #timerDisplay, #comboDisplay, #ratioDisplay {
    position: absolute;
    color: white;
    font-size: 24px;
    padding: 8px 16px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 8px;
    z-index: 50;
}

#scoreDisplay { top: 20px; left: 20px; }
#comboDisplay { top: 60px; left: 20px; }
#ratioDisplay { top: 100px; left: 20px; }
#timerDisplay { top: 20px; right: 20px; }

#gameOverOverlay {
    display: none;
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8);
    z-index: 200;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    font-size: 36px;
}
#gameOverOverlay.visible {
    display: flex;
}
#gameOverOverlay h1 { font-size: 64px; margin-bottom: 20px; color: #ff6600; }
#gameOverOverlay p { margin: 10px 0; font-size: 28px; }
#restartBtn {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 24px;
    font-weight: bold;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
#restartBtn:hover { background: #ff8833; }
</style>
</head>
<body>

<button id="startBtn">Start Game</button>

<div id="scoreDisplay">Score: 0</div>
<div id="comboDisplay">Combo: x0</div>
<div id="ratioDisplay">Hits: 0 | Misses: 0</div>
<div id="timerDisplay">Time: 60s</div>

<div id="gameOverOverlay">
    <h1>Game Over!</h1>
    <p id="finalScore">Final Score: 0</p>
    <p id="finalStats">Hits: 0 | Misses: 0</p>
    <p id="finalAccuracy">Accuracy: 0%</p>
    <button id="restartBtn">Play Again</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
    phase: 'idle',
    score: 0,
    timeRemaining: 60,
    combo: 0,
    hitCount: 0,
    missCount: 0,
    molesUp: 0,
    totalMolesSpawned: 0,
    difficultyTier: 1,
    moleStates: [false, false, false, false, false, false, false, false, false],
    lastHitIndex: -1,
    gameOverShown: false
};
window.__3D_STATE__ = state;

// --- DOM Elements ---
const startBtn = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const timerDisplay = document.getElementById('timerDisplay');
const comboDisplay = document.getElementById('comboDisplay');
const ratioDisplay = document.getElementById('ratioDisplay');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const finalScore = document.getElementById('finalScore');
const finalStats = document.getElementById('finalStats');
const finalAccuracy = document.getElementById('finalAccuracy');
const restartBtn = document.getElementById('restartBtn');

// --- Three.js Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 20, 40);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// --- Controls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.minPolarAngle = 0.3;
controls.maxPolarAngle = 1.2;
controls.minDistance = 5;
controls.maxDistance = 20;
controls.target.set(0, 0, 0);
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// --- Hole Positions ---
const holePositions = [
    new THREE.Vector3(-3, 0, -3),
    new THREE.Vector3(0, 0, -3),
    new THREE.Vector3(3, 0, -3),
    new THREE.Vector3(-3, 0, 0),
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(3, 0, 0),
    new THREE.Vector3(-3, 0, 3),
    new THREE.Vector3(0, 0, 3),
    new THREE.Vector3(3, 0, 3)
];

// --- Create Holes ---
const holes = [];
const holeMat = new THREE.MeshStandardMaterial({ color: 0x3b1f0a });
holePositions.forEach((pos, i) => {
    const holeGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.1, 32);
    const hole = new THREE.Mesh(holeGeo, holeMat);
    hole.position.copy(pos);
    hole.position.y = 0.05;
    hole.receiveShadow = true;
    scene.add(hole);
    holes.push(hole);

    // Add a dark inner circle for depth effect
    const innerGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.12, 32);
    const innerMat = new THREE.MeshStandardMaterial({ color: 0x1a0d00 });
    const inner = new THREE.Mesh(innerGeo, innerMat);
    inner.position.copy(pos);
    inner.position.y = 0.04;
    scene.add(inner);
});

// --- Mole Creation (Fallback if GLB fails) ---
const moles = [];
const moleData = [];
let moleModelLoaded = false;

function createFallbackMole() {
    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.CylinderGeometry(0.35, 0.4, 0.8, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.4;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(0.35, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0x9B5523 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.0;
    head.castShadow = true;
    group.add(head);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.12, 1.05, 0.28);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.12, 1.05, 0.28);
    group.add(rightEye);

    // Nose
    const noseGeo = new THREE.SphereGeometry(0.1, 8, 8);
    const noseMat = new THREE.MeshStandardMaterial({ color: 0xff6699 });
    const nose = new THREE.Mesh(noseGeo, noseMat);
    nose.position.set(0, 0.92, 0.32);
    group.add(nose);

    // Teeth
    const toothGeo = new THREE.BoxGeometry(0.06, 0.08, 0.04);
    const toothMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const leftTooth = new THREE.Mesh(toothGeo, toothMat);
    leftTooth.position.set(-0.05, 0.82, 0.32);
    group.add(leftTooth);
    const rightTooth = new THREE.Mesh(toothGeo, toothMat);
    rightTooth.position.set(0.05, 0.82, 0.32);
    group.add(rightTooth);

    return group;
}

function initMoles(templateModel) {
    for (let i = 0; i < 9; i++) {
        let mole;
        if (templateModel) {
            mole = templateModel.clone();
            mole.scale.set(0.5, 0.5, 0.5);
        } else {
            mole = createFallbackMole();
            mole.scale.set(0.5, 0.5, 0.5);
        }

        mole.position.copy(holePositions[i]);
        mole.position.y = -1.5;

        mole.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        scene.add(mole);
        moles.push(mole);
        moleData.push({
            isUp: false,
            isAnimating: false,
            targetY: -1.5,
            currentY: -1.5,
            animSpeed: 0,
            stayTimer: 0,
            wasHit: false,
            bonkTimer: 0,
            originalScale: new THREE.Vector3(0.5, 0.5, 0.5)
        });
    }
}

// Try loading GLTF model
const loader = new GLTFLoader();
let modelLoadAttempted = false;

function tryLoadModel() {
    loader.load(
        'facecap.glb',
        (gltf) => {
            moleModelLoaded = true;
            modelLoadAttempted = true;
            const model = gltf.scene;
            initMoles(model);
        },
        undefined,
        (error) => {
            console.warn('Could not load facecap.glb, using fallback mole model:', error);
            modelLoadAttempted = true;
            initMoles(null);
        }
    );
}

// Start with a timeout fallback
tryLoadModel();
setTimeout(() => {
    if (!modelLoadAttempted) {
        modelLoadAttempted = true;
        initMoles(null);
    }
}, 3000);

// --- Particles ---
const particles = [];

function spawnParticles(position) {
    const colors = [0xffff00, 0xffaa00, 0xff6600, 0xffdd44];
    for (let i = 0; i < 8; i++) {
        const geo = new THREE.SphereGeometry(0.08, 8, 8);
        const mat = new THREE.MeshStandardMaterial({
            color: colors[Math.floor(Math.random() * colors.length)],
            emissive: colors[Math.floor(Math.random() * colors.length)],
            emissiveIntensity: 0.5
        });
        const particle = new THREE.Mesh(geo, mat);
        particle.position.copy(position);
        particle.position.y += 0.5;

        const angle = (i / 8) * Math.PI * 2 + Math.random() * 0.5;
        const speed = 2 + Math.random() * 3;
        particle.userData.velocity = new THREE.Vector3(
            Math.cos(angle) * speed,
            3 + Math.random() * 3,
            Math.sin(angle) * speed
        );
        particle.userData.life = 1.0;
        particle.userData.decay = 1.5 + Math.random() * 0.5;

        scene.add(particle);
        particles.push(particle);
    }
}

function updateParticles(delta) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.userData.velocity.y -= 9.8 * delta;
        p.position.add(p.userData.velocity.clone().multiplyScalar(delta));
        p.userData.life -= p.userData.decay * delta;

        const s = Math.max(0, p.userData.life);
        p.scale.setScalar(s);
        p.material.opacity = s;
        p.material.transparent = true;

        if (p.userData.life <= 0) {
            scene.remove(p);
            p.geometry.dispose();
            p.material.dispose();
            particles.splice(i, 1);
        }
    }
}

// --- Raycaster ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
    if (state.phase !== 'playing') return;
    if (moles.length === 0) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // Check moles
    let hitMole = false;
    for (let i = 0; i < 9; i++) {
        if (!moleData[i].isUp || moleData[i].wasHit) continue;

        const intersects = raycaster.intersectObject(moles[i], true);
        if (intersects.length > 0) {
            hitMole = true;
            onMoleHit(i);
            break;
        }
    }

    if (!hitMole) {
        // Check if clicked on ground or empty space
        const groundIntersects = raycaster.intersectObjects([ground, ...holes], true);
        // Any click that doesn't hit a mole is a miss
        state.missCount++;
        state.combo = 0;
    }
}

function onMoleHit(index) {
    const data = moleData[index];
    data.wasHit = true;

    state.hitCount++;
    state.combo++;
    state.lastHitIndex = index;

    // Score calculation
    let points = 10;
    if (state.combo >= 3) {
        points = 10 + state.combo * 5;
    }
    state.score += points;

    // Bonk effect
    data.bonkTimer = 0.15;
    moles[index].scale.set(0.7, 0.3, 0.7);

    // Particles
    spawnParticles(moles[index].position);

    // Start retreating
    data.targetY = -1.5;
    data.animSpeed = 1.0 / 0.2; // 200ms retreat
    data.isAnimating = true;
    data.stayTimer = 0;
}

renderer.domElement.addEventListener('click', onMouseClick);

// --- Game Timer ---
let gameTimer = 0;
let spawnTimer = 0;
const SPAWN_INTERVAL = 1.5;
const GAME_DURATION = 60;

function startGame() {
    state.phase = 'playing';
    state.score = 0;
    state.timeRemaining = 60;
    state.combo = 0;
    state.hitCount = 0;
    state.missCount = 0;
    state.molesUp = 0;
    state.totalMolesSpawned = 0;
    state.difficultyTier = 1;
    state.moleStates = [false, false, false, false, false, false, false, false, false];
    state.lastHitIndex = -1;
    state.gameOverShown = false;

    gameTimer = 0;
    spawnTimer = 0;

    // Reset all moles
    for (let i = 0; i < 9; i++) {
        if (moleData[i]) {
            moleData[i].isUp = false;
            moleData[i].isAnimating = false;
            moleData[i].targetY = -1.5;
            moleData[i].currentY = -1.5;
            moleData[i].stayTimer = 0;
            moleData[i].wasHit = false;
            moleData[i].bonkTimer = 0;
        }
        if (moles[i]) {
            moles[i].position.y = -1.5;
            moles[i].scale.set(0.5, 0.5, 0.5);
        }
    }

    startBtn.style.display = 'none';
    gameOverOverlay.classList.remove('visible');
}

function endGame() {
    state.phase = 'ended';
    state.gameOverShown = true;

    const totalClicks = state.hitCount + state.missCount;
    const accuracy = totalClicks > 0 ? Math.round((state.hitCount / totalClicks) * 100) : 0;

    finalScore.textContent = `Final Score: ${state.score}`;
    finalStats.textContent = `Hits: ${state.hitCount} | Misses: ${state.missCount}`;
    finalAccuracy.textContent = `Accuracy: ${accuracy}%`;

    gameOverOverlay.classList.add('visible');
}

function getDifficultyParams(elapsed) {
    if (elapsed < 20) {
        state.difficultyTier = 1;
        return { maxMoles: 1, stayDuration: 1.2 };
    } else if (elapsed < 40) {
        state.difficultyTier = 2;
        return { maxMoles: 2, stayDuration: 1.0 };
    } else {
        state.difficultyTier = 3;
        return { maxMoles: 3, stayDuration: 0.8 };
    }
}

function spawnMoles() {
    if (moles.length === 0) return;

    const elapsed = gameTimer;
    const { maxMoles, stayDuration } = getDifficultyParams(elapsed);

    const count = 1 + Math.floor(Math.random() * maxMoles);

    const available = [];
    for (let i = 0; i < 9; i++) {
        if (!moleData[i].isUp && !moleData[i].isAnimating) {
            available.push(i);
        }
    }

    // Shuffle
    for (let i = available.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [available[i], available[j]] = [available[j], available[i]];
    }

    const toSpawn = Math.min(count, available.length);
    for (let k = 0; k < toSpawn; k++) {
        const idx = available[k];
        const data = moleData[idx];

        data.isUp = true;
        data.wasHit = false;
        data.targetY = 0.8;
        data.animSpeed = 1.0 / 0.3; // 300ms pop up
        data.isAnimating = true;
        data.stayTimer = stayDuration;
        data.bonkTimer = 0;

        state.totalMolesSpawned++;
    }
}

// --- Start / Restart ---
startBtn.addEventListener('click', () => {
    if (moles.length > 0) {
        startGame();
    }
});

restartBtn.addEventListener('click', () => {
    startGame();
});

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = Math.min(clock.getDelta(), 0.1);

    controls.update();

    if (state.phase === 'playing') {
        gameTimer += delta;
        state.timeRemaining = Math.max(0, Math.ceil(GAME_DURATION - gameTimer));

        if (gameTimer >= GAME_DURATION) {
            endGame();
        } else {
            // Spawn timer
            spawnTimer += delta;
            if (spawnTimer >= SPAWN_INTERVAL) {
                spawnTimer -= SPAWN_INTERVAL;
                spawnMoles();
            }
        }
    }

    // Update moles
    let molesUpCount = 0;
    for (let i = 0; i < moles.length; i++) {
        const data = moleData[i];
        const mole = moles[i];

        // Bonk effect
        if (data.bonkTimer > 0) {
            data.bonkTimer -= delta;
            if (data.bonkTimer <= 0) {
                data.bonkTimer = 0;
                mole.scale.set(0.5, 0.5, 0.5);
            }
        }

        // Animation
        if (data.isAnimating) {
            const diff = data.targetY - data.currentY;
            const step = data.animSpeed * delta;

            if (Math.abs(diff) < step * 1.5) {
                data.currentY = data.targetY;
                data.isAnimating = false;

                if (data.targetY <= -1.4) {
                    data.isUp = false;
                    data.wasHit = false;
                }
            } else {
                // Ease-out for popping up
                if (diff > 0) {
                    const t = 1 - (data.currentY - (-1.5)) / (data.targetY - (-1.5));
                    const easeStep = step * (0.5 + t * 1.5);
                    data.currentY += Math.min(easeStep, Math.abs(diff));
                } else {
                    data.currentY += Math.sign(diff) * step;
                }
            }

            mole.position.y = data.currentY;
        }

        // Stay timer (only if up and not hit and not animating down)
        if (data.isUp && !data.wasHit && data.targetY > 0) {
            data.stayTimer -= delta;
            if (data.stayTimer <= 0) {
                // Retreat
                data.targetY = -1.5;
                data.animSpeed = 1.0 / 0.2;
                data.isAnimating = true;
            }
        }

        // Track state
        const isVisible = data.currentY > 0;
        state.moleStates[i] = isVisible;
        if (isVisible) molesUpCount++;
    }
    state.molesUp = molesUpCount;

    // Update particles
    updateParticles(delta);

    // Update HUD
    scoreDisplay.textContent = `Score: ${state.score}`;
    timerDisplay.textContent = `Time: ${state.timeRemaining}s`;
    comboDisplay.textContent = `Combo: x${state.combo}`;
    ratioDisplay.textContent = `Hits: ${state.hitCount} | Misses: ${state.missCount}`;

    renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Wait for moles to be ready before showing start button
function checkReady() {
    if (moles.length === 9) {
        startBtn.style.display = 'block';
    } else {
        requestAnimationFrame(checkReady);
    }
}
checkReady();
</script>
</body>
</html>
