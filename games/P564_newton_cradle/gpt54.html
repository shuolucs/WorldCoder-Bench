<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Newton's Cradle - Three.js</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(10, 10, 20, 0.78);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 310px;
      z-index: 10;
      font-size: 13px;
      line-height: 1.5;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    #controls-ui {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(10, 10, 20, 0.78);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 280px;
      z-index: 10;
      font-size: 13px;
      line-height: 1.6;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    .row {
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      color: #d8d8e8;
    }

    input[type="range"] {
      width: 100%;
    }

    .value {
      color: #8fd3ff;
      font-weight: bold;
    }

    .keys {
      margin-top: 8px;
      color: #c7c7d7;
      font-size: 12px;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div><strong>Newton's Cradle HUD</strong></div>
      <div>Ball angles: <span id="hud-angles"></span></div>
      <div>Total energy: <span id="hud-energy"></span></div>
      <div>Collisions: <span id="hud-collisions"></span></div>
      <div>Pull count: <span id="hud-pull"></span></div>
      <div>Paused: <span id="hud-paused"></span></div>
      <div>Energy loss: <span id="hud-loss"></span></div>
    </div>

    <div id="controls-ui">
      <div class="row">
        <label for="slider-pull-count">Pull count: <span class="value" id="pull-count-value">1</span></label>
        <input id="slider-pull-count" type="range" min="1" max="3" step="1" value="1" />
      </div>
      <div class="row">
        <label for="slider-pull-angle">Pull angle: <span class="value" id="pull-angle-value">30°</span></label>
        <input id="slider-pull-angle" type="range" min="10" max="60" step="5" value="30" />
      </div>
      <div class="keys">
        <div><strong>Keys</strong></div>
        <div>T = release pulled ball(s)</div>
        <div>R = reset</div>
        <div>Space = pause/play</div>
        <div>1-5 = pull individual balls to current angle</div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('app').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x445566, 0.4);
    scene.add(ambient);

    const directional = new THREE.DirectionalLight(0xffffff, 0.8);
    directional.position.set(5, 10, 5);
    scene.add(directional);

    const envScene = new THREE.Scene();
    envScene.background = new THREE.Color(0x2a2a40);
    const envLight1 = new THREE.DirectionalLight(0xffffff, 1.4);
    envLight1.position.set(10, 10, 10);
    envScene.add(envLight1);
    const envLight2 = new THREE.DirectionalLight(0x88aaff, 0.8);
    envLight2.position.set(-10, 4, -6);
    envScene.add(envLight2);
    const envAmbient = new THREE.AmbientLight(0x666688, 0.7);
    envScene.add(envAmbient);
    const pmrem = new THREE.PMREMGenerator(renderer);
    const envMap = pmrem.fromScene(envScene, 0.04).texture;
    scene.environment = envMap;

    const metalMat = new THREE.MeshStandardMaterial({
      color: 0xaaaaaa,
      metalness: 0.9,
      roughness: 0.2
    });

    const platformMat = new THREE.MeshStandardMaterial({
      color: 0x333344,
      metalness: 0.8,
      roughness: 0.35
    });

    const ballMat = new THREE.MeshStandardMaterial({
      color: 0xcccccc,
      metalness: 0.95,
      roughness: 0.1,
      envMap: envMap,
      envMapIntensity: 1.2
    });

    const stringMat = new THREE.MeshStandardMaterial({
      color: 0xdddddd,
      metalness: 0.2,
      roughness: 0.75
    });

    const platform = new THREE.Mesh(
      new THREE.BoxGeometry(6, 0.1, 3),
      platformMat
    );
    platform.position.set(0, 0, 0);
    scene.add(platform);

    const leftSupport = new THREE.Mesh(new THREE.BoxGeometry(0.1, 4, 0.1), metalMat);
    leftSupport.position.set(-2.5, 2, 0);
    scene.add(leftSupport);

    const rightSupport = new THREE.Mesh(new THREE.BoxGeometry(0.1, 4, 0.1), metalMat);
    rightSupport.position.set(2.5, 2, 0);
    scene.add(rightSupport);

    const topBar = new THREE.Mesh(new THREE.BoxGeometry(5, 0.1, 0.1), metalMat);
    topBar.position.set(0, 4, 0);
    scene.add(topBar);

    const BALL_COUNT = 5;
    const RADIUS = 0.35;
    const DIAMETER = RADIUS * 2;
    const L = 2.5;
    const G = 9.81;
    const RESTITUTION = 0.999;
    const STEP_DAMPING = 0.9995;
    const SUBSTEPS = 8;
    const MAX_DT = 1 / 30;

    const restXs = [-1.4, -0.7, 0, 0.7, 1.4];
    const topY = 4;
    const restY = topY - L;

    const balls = [];
    const pivots = [];
    const stringPairs = [];

    function createStringCylinder() {
      return new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 1, 8), stringMat);
    }

    for (let i = 0; i < BALL_COUNT; i++) {
      const pivotOffset = 0.09;

      const pivotLeft = new THREE.Vector3(restXs[i] - pivotOffset, topY, 0);
      const pivotRight = new THREE.Vector3(restXs[i] + pivotOffset, topY, 0);
      pivots.push({ left: pivotLeft.clone(), right: pivotRight.clone() });

      const ballMesh = new THREE.Mesh(
        new THREE.SphereGeometry(RADIUS, 48, 48),
        ballMat
      );
      scene.add(ballMesh);

      const s1 = createStringCylinder();
      const s2 = createStringCylinder();
      scene.add(s1, s2);

      stringPairs.push([s1, s2]);

      balls.push({
        mesh: ballMesh,
        theta: 0,
        omega: 0,
        alpha: 0,
        xRest: restXs[i],
        position: new THREE.Vector3(),
        released: true
      });
    }

    let totalCollisions = 0;
    let frameCount = 0;
    let isPaused = false;
    let initialEnergy = 0;
    let lastTime = performance.now();

    const sliderPullCount = document.getElementById('slider-pull-count');
    const sliderPullAngle = document.getElementById('slider-pull-angle');
    const pullCountValue = document.getElementById('pull-count-value');
    const pullAngleValue = document.getElementById('pull-angle-value');

    const hudAngles = document.getElementById('hud-angles');
    const hudEnergy = document.getElementById('hud-energy');
    const hudCollisions = document.getElementById('hud-collisions');
    const hudPull = document.getElementById('hud-pull');
    const hudPaused = document.getElementById('hud-paused');
    const hudLoss = document.getElementById('hud-loss');

    function degToRad(d) { return d * Math.PI / 180; }
    function radToDeg(r) { return r * 180 / Math.PI; }

    function getPullCount() {
      return parseInt(sliderPullCount.value, 10);
    }

    function getPullAngleDeg() {
      return parseFloat(sliderPullAngle.value);
    }

    function updateSliderLabels() {
      pullCountValue.textContent = String(getPullCount());
      pullAngleValue.textContent = `${getPullAngleDeg()}°`;
    }

    function setBallTransform(i) {
      const ball = balls[i];
      const x = ball.xRest + L * Math.sin(ball.theta);
      const y = topY - L * Math.cos(ball.theta);
      const z = 0;
      ball.position.set(x, y, z);
      ball.mesh.position.copy(ball.position);

      const [s1, s2] = stringPairs[i];
      const p = pivots[i];

      updateCylinderBetween(s1, p.left, ball.position);
      updateCylinderBetween(s2, p.right, ball.position);
    }

    function updateCylinderBetween(mesh, start, end) {
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = dir.length();

      mesh.position.copy(mid);
      mesh.scale.set(1, len, 1);

      const up = new THREE.Vector3(0, 1, 0);
      const quat = new THREE.Quaternion().setFromUnitVectors(up, dir.clone().normalize());
      mesh.setRotationFromQuaternion(quat);
    }

    function updateAllTransforms() {
      for (let i = 0; i < BALL_COUNT; i++) setBallTransform(i);
    }

    function resetToPulledConfiguration() {
      const count = getPullCount();
      const angle = degToRad(getPullAngleDeg());

      for (let i = 0; i < BALL_COUNT; i++) {
        balls[i].theta = 0;
        balls[i].omega = 0;
        balls[i].alpha = 0;
        balls[i].released = true;
      }

      for (let i = 0; i < count; i++) {
        balls[i].theta = angle;
        balls[i].omega = 0;
        balls[i].alpha = 0;
        balls[i].released = false;
      }

      updateAllTransforms();
      totalCollisions = 0;
      initialEnergy = computeTotalEnergy();
    }

    function releasePulledBalls() {
      for (let i = 0; i < BALL_COUNT; i++) {
        balls[i].released = true;
      }
      initialEnergy = computeTotalEnergy();
    }

    function pullSingleBall(index) {
      const angle = degToRad(getPullAngleDeg());
      for (let i = 0; i < BALL_COUNT; i++) {
        balls[i].theta = 0;
        balls[i].omega = 0;
        balls[i].alpha = 0;
        balls[i].released = true;
      }
      balls[index].theta = angle;
      balls[index].released = false;
      updateAllTransforms();
      totalCollisions = 0;
      initialEnergy = computeTotalEnergy();
    }

    function computeTotalEnergy() {
      let e = 0;
      for (let i = 0; i < BALL_COUNT; i++) {
        const b = balls[i];
        const v = L * b.omega;
        const ke = 0.5 * v * v;
        const pe = G * L * (1 - Math.cos(b.theta));
        e += ke + pe;
      }
      return e;
    }

    function processCollisions() {
      for (let i = 0; i < BALL_COUNT - 1; i++) {
        const a = balls[i];
        const b = balls[i + 1];

        const dx = b.position.x - a.position.x;
        const dy = b.position.y - a.position.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist <= DIAMETER + 1e-4) {
          const va = L * a.omega * Math.cos(a.theta);
          const vb = L * b.omega * Math.cos(b.theta);
          const rel = vb - va;

          if (rel < 0) {
            const oa = a.omega;
            const ob = b.omega;
            a.omega = ob * RESTITUTION;
            b.omega = oa * RESTITUTION;

            const overlap = DIAMETER - dist;
            if (overlap > 0) {
              const correction = overlap * 0.5;
              a.theta -= correction / L;
              b.theta += correction / L;
            }

            totalCollisions++;
            setBallTransform(i);
            setBallTransform(i + 1);
          }
        }
      }
    }

    function stepPhysics(dt) {
      const subDt = dt / SUBSTEPS;

      for (let step = 0; step < SUBSTEPS; step++) {
        for (let i = 0; i < BALL_COUNT; i++) {
          const b = balls[i];

          if (!b.released) {
            b.omega = 0;
            b.alpha = 0;
            continue;
          }

          b.alpha = -(G / L) * Math.sin(b.theta);
          b.omega += b.alpha * subDt;
          b.theta += b.omega * subDt;
          b.omega *= STEP_DAMPING;
        }

        updateAllTransforms();
        processCollisions();
      }
    }

    function updateHUD() {
      const anglesDeg = balls.map(b => radToDeg(b.theta).toFixed(1)).join(', ');
      const totalEnergy = computeTotalEnergy();
      const loss = initialEnergy > 1e-8 ? ((initialEnergy - totalEnergy) / initialEnergy) * 100 : 0;

      hudAngles.textContent = anglesDeg;
      hudEnergy.textContent = totalEnergy.toFixed(3);
      hudCollisions.textContent = String(totalCollisions);
      hudPull.textContent = String(getPullCount());
      hudPaused.textContent = isPaused ? 'Paused' : 'Playing';
      hudLoss.textContent = `${loss.toFixed(2)}%`;
    }

    function updateState() {
      const totalEnergy = computeTotalEnergy();
      const loss = initialEnergy > 1e-8 ? ((initialEnergy - totalEnergy) / initialEnergy) * 100 : 0;
      const ballAngles = balls.map(b => Number(b.theta.toFixed(4)));
      const ballOmegas = balls.map(b => Number(b.omega.toFixed(4)));
      const ballsValid = [...ballAngles, ...ballOmegas].every(v => Number.isFinite(v));

      window.__3D_STATE__ = {
        ballAngles,
        ballOmegas,
        totalEnergy: Number(totalEnergy.toFixed(4)),
        totalCollisions,
        pullCount: getPullCount(),
        pullAngle: getPullAngleDeg(),
        isPaused,
        frameCount,
        ballsValid,
        energyLossPercent: Number(loss.toFixed(3))
      };
    }

    sliderPullCount.addEventListener('input', () => {
      updateSliderLabels();
      resetToPulledConfiguration();
    });

    sliderPullAngle.addEventListener('input', () => {
      updateSliderLabels();
      resetToPulledConfiguration();
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 't') {
        releasePulledBalls();
      } else if (key === 'r') {
        resetToPulledConfiguration();
      } else if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (['1','2','3','4','5'].includes(e.key)) {
        const idx = parseInt(e.key, 10) - 1;
        pullSingleBall(idx);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateSliderLabels();
    resetToPulledConfiguration();

    function animate(now) {
      requestAnimationFrame(animate);
      frameCount++;

      const dt = Math.min((now - lastTime) / 1000, MAX_DT);
      lastTime = now;

      controls.update();

      if (!isPaused) {
        stepPhysics(dt);
      } else {
        updateAllTransforms();
      }

      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    requestAnimationFrame((t) => {
      lastTime = t;
      animate(t);
    });
  </script>
</body>
</html>
