<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laptop Design Comparison</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
      transition: background 0.4s ease;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .title {
      position: absolute;
      top: 16px;
      left: 16px;
      color: white;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.3px;
      z-index: 10;
      user-select: none;
    }

    .top-right {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .bottom-center {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      flex-wrap: wrap;
      justify-content: center;
    }

    .specs-panel {
      position: absolute;
      top: 60px;
      right: 16px;
      width: 200px;
      min-height: 150px;
      padding: 14px;
      background: rgba(20, 24, 40, 0.8);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: white;
      z-index: 10;
      backdrop-filter: blur(8px);
      box-sizing: border-box;
      transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease;
    }

    .specs-panel h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .spec-line {
      margin: 8px 0;
      font-size: 14px;
      opacity: 0.95;
    }

    button {
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.2s ease, background 0.25s ease, color 0.25s ease;
      backdrop-filter: blur(6px);
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.2);
    }

    button.active {
      background: rgba(90, 140, 255, 0.5);
    }

    body.light-theme {
      background: linear-gradient(to bottom, #f0f0f5, #e0e0ea);
    }

    body.light-theme .title {
      color: #1d2230;
    }

    body.light-theme button {
      background: rgba(30, 40, 70, 0.08);
      color: #1d2230;
    }

    body.light-theme button:hover {
      background: rgba(30, 40, 70, 0.16);
    }

    body.light-theme button.active {
      background: rgba(90, 140, 255, 0.35);
      color: #111;
    }

    body.light-theme .specs-panel {
      background: rgba(255,255,255,0.72);
      color: #1d2230;
      border-color: rgba(30,40,70,0.12);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title">Laptop Design Comparison</div>

    <div class="top-right">
      <button id="compareBtn">Compare All</button>
      <button id="themeBtn">Toggle Theme</button>
    </div>

    <div class="specs-panel" id="specsPanel">
      <h3 id="specName">ProPower</h3>
      <div class="spec-line" id="specWeight">Weight: 2.1kg</div>
      <div class="spec-line" id="specThickness">Thickness: 0.15</div>
    </div>

    <div class="bottom-center">
      <button data-index="0" id="btn0">UltraSlim</button>
      <button data-index="1" id="btn1" class="active">ProPower</button>
      <button data-index="2" id="btn2">CreatorEdge</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.getElementById('app').appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirWarm = new THREE.DirectionalLight(0xfff5e6, 0.8);
    dirWarm.position.set(5, 10, 5);
    scene.add(dirWarm);

    const dirCool = new THREE.DirectionalLight(0xe6f0ff, 0.4);
    dirCool.position.set(-5, 5, -5);
    scene.add(dirCool);

    // Floor
    const floorMaterial = new THREE.MeshStandardMaterial({
      color: '#222233',
      metalness: 0.8,
      roughness: 0.3
    });
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      floorMaterial
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    scene.add(floor);

    // Backdrop model
    let backdropModel = null;
    const loader = new GLTFLoader();

    // State
    const laptopData = [
      {
        name: 'UltraSlim',
        weight: '0.95kg',
        thickness: '0.08',
        bodySize: [2.4, 0.08, 1.6],
        screenSize: [2.3, 1.5, 0.03],
        color: '#c0c0c0',
        emissive: '#0066ff',
        position: new THREE.Vector3(-3, 0.5, 0)
      },
      {
        name: 'ProPower',
        weight: '2.1kg',
        thickness: '0.15',
        bodySize: [2.6, 0.15, 1.8],
        screenSize: [2.5, 1.6, 0.04],
        color: '#404040',
        emissive: '#00ff66',
        position: new THREE.Vector3(0, 0.5, 0)
      },
      {
        name: 'CreatorEdge',
        weight: '1.6kg',
        thickness: '0.12',
        bodySize: [2.5, 0.12, 1.7],
        screenSize: [2.4, 1.55, 0.035],
        color: '#b76e79',
        emissive: '#9933ff',
        position: new THREE.Vector3(3, 0.5, 0)
      }
    ];

    const laptops = [];
    let selectedLaptop = 1;
    let compareMode = false;
    let darkTheme = true;
    let compareRotation = 0;

    window.__3D_STATE__ = {
      selectedLaptop: 1,
      lidAngle: 110,
      rotationY: 0,
      compareMode: false,
      darkTheme: true,
      laptopScales: [0.8, 1.3, 0.8],
      modelLoaded: false,
      laptopPositionsY: [0.5, 1.0, 0.5],
      specsVisible: 'ProPower'
    };

    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function createLaptop(config, index) {
      const root = new THREE.Group();
      root.position.copy(config.position);
      scene.add(root);

      const bodyMat = new THREE.MeshStandardMaterial({
        color: config.color,
        metalness: 0.7,
        roughness: 0.35
      });

      const screenFrameMat = new THREE.MeshStandardMaterial({
        color: config.color,
        metalness: 0.65,
        roughness: 0.35
      });

      const screenGlowMat = new THREE.MeshStandardMaterial({
        color: '#111111',
        emissive: config.emissive,
        emissiveIntensity: 1.4,
        metalness: 0.15,
        roughness: 0.2
      });

      const [bw, bh, bd] = config.bodySize;
      const [sw, sh, sd] = config.screenSize;

      const base = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), bodyMat);
      base.position.y = bh / 2;
      root.add(base);

      const hinge = new THREE.Group();
      hinge.position.set(0, bh, -bd / 2);
      root.add(hinge);

      const screenGroup = new THREE.Group();
      hinge.add(screenGroup);

      const screenFrame = new THREE.Mesh(new THREE.BoxGeometry(sw, sh, sd), screenFrameMat);
      screenFrame.position.set(0, sh / 2, -sd / 2);
      screenGroup.add(screenFrame);

      const screenInner = new THREE.Mesh(
        new THREE.PlaneGeometry(sw * 0.9, sh * 0.88),
        screenGlowMat
      );
      screenInner.position.set(0, sh / 2, sd / 2 + 0.002);
      screenGroup.add(screenInner);

      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(1.55, 0.06, 16, 64),
        new THREE.MeshStandardMaterial({
          color: config.emissive,
          emissive: config.emissive,
          emissiveIntensity: 1.5,
          transparent: true,
          opacity: 0.95,
          metalness: 0.5,
          roughness: 0.25
        })
      );
      ring.rotation.x = Math.PI / 2;
      ring.position.set(0, 0.03, 0);
      ring.visible = false;
      root.add(ring);

      const laptop = {
        index,
        name: config.name,
        root,
        base,
        hinge,
        screenGroup,
        ring,
        bodyHeight: bh,
        bodyDepth: bd,
        currentScale: index === selectedLaptop ? 1.3 : 0.8,
        targetScale: index === selectedLaptop ? 1.3 : 0.8,
        currentY: config.position.y + (index === selectedLaptop ? 0.5 : 0),
        targetY: config.position.y + (index === selectedLaptop ? 0.5 : 0),
        baseY: config.position.y,
        lidAngleDeg: 110,
        rotationY: 0
      };

      laptop.root.scale.setScalar(laptop.currentScale);
      laptop.root.position.y = laptop.currentY;
      setLidAngle(laptop, 110);
      return laptop;
    }

    function setLidAngle(laptop, angleDeg) {
      laptop.lidAngleDeg = THREE.MathUtils.clamp(angleDeg, 0, 170);
      laptop.hinge.rotation.x = degToRad(180 - laptop.lidAngleDeg);
    }

    laptopData.forEach((cfg, i) => {
      const laptop = createLaptop(cfg, i);
      laptops.push(laptop);
    });

    laptops[selectedLaptop].ring.visible = true;

    loader.load(
      'collision-world.glb',
      (gltf) => {
        backdropModel = gltf.scene;
        const box = new THREE.Box3().setFromObject(backdropModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 4 / maxDim;
        backdropModel.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(backdropModel);
        const center = new THREE.Vector3();
        scaledBox.getCenter(center);
        backdropModel.position.sub(center);
        backdropModel.position.add(new THREE.Vector3(0, 0, -3));

        backdropModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
            if (child.material) {
              if (Array.isArray(child.material)) {
                child.material.forEach((m) => {
                  m.transparent = true;
                  m.opacity = 0.3;
                  m.depthWrite = false;
                });
              } else {
                child.material.transparent = true;
                child.material.opacity = 0.3;
                child.material.depthWrite = false;
              }
            }
          }
        });

        scene.add(backdropModel);
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      () => {
        window.__3D_STATE__.modelLoaded = false;
      }
    );

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function updateSpecsPanel(index) {
      const data = laptopData[index];
      document.getElementById('specName').textContent = data.name;
      document.getElementById('specWeight').textContent = `Weight: ${data.weight}`;
      document.getElementById('specThickness').textContent = `Thickness: ${data.thickness}`;
    }

    function updateButtons() {
      [0,1,2].forEach(i => {
        document.getElementById(`btn${i}`).classList.toggle('active', i === selectedLaptop && !compareMode);
      });
      document.getElementById('compareBtn').classList.toggle('active', compareMode);
    }

    function selectLaptop(index) {
      if (compareMode) return;
      selectedLaptop = index;
      updateSpecsPanel(index);
      updateButtons();

      laptops.forEach((lap, i) => {
        lap.targetScale = i === selectedLaptop ? 1.3 : 0.8;
        lap.targetY = lap.baseY + (i === selectedLaptop ? 0.5 : 0);
        lap.ring.visible = i === selectedLaptop;
      });
    }

    function toggleCompareMode() {
      compareMode = !compareMode;
      if (compareMode) {
        laptops.forEach((lap) => {
          lap.targetScale = 1.0;
          lap.targetY = lap.baseY;
          lap.ring.visible = false;
        });
      } else {
        laptops.forEach((lap, i) => {
          lap.targetScale = i === selectedLaptop ? 1.3 : 0.8;
          lap.targetY = lap.baseY + (i === selectedLaptop ? 0.5 : 0);
          lap.ring.visible = i === selectedLaptop;
        });
      }
      updateButtons();
    }

    function toggleTheme() {
      darkTheme = !darkTheme;
      document.body.classList.toggle('light-theme', !darkTheme);
      floor.material.color.set(darkTheme ? '#222233' : '#ddddee');
    }

    function getIntersectedLaptop(clientX, clientY) {
      pointer.x = (clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);

      const meshes = [];
      laptops.forEach((lap) => {
        lap.root.traverse((obj) => {
          if (obj.isMesh && obj !== lap.ring) meshes.push(obj);
        });
      });

      const intersects = raycaster.intersectObjects(meshes, false);
      if (!intersects.length) return null;

      let obj = intersects[0].object;
      while (obj && obj.parent) {
        const found = laptops.find(l => {
          let current = obj;
          while (current) {
            if (current === l.root) return true;
            current = current.parent;
          }
          return false;
        });
        if (found) return found.index;
        obj = obj.parent;
      }
      return null;
    }

    renderer.domElement.addEventListener('pointerdown', (e) => {
      const idx = getIntersectedLaptop(e.clientX, e.clientY);
      if (idx !== null) selectLaptop(idx);
    });

    document.querySelectorAll('.bottom-center button[data-index]').forEach(btn => {
      btn.addEventListener('click', () => {
        selectLaptop(Number(btn.dataset.index));
      });
    });

    document.getElementById('compareBtn').addEventListener('click', toggleCompareMode);
    document.getElementById('themeBtn').addEventListener('click', toggleTheme);

    window.addEventListener('keydown', (e) => {
      if (compareMode) return;
      const lap = laptops[selectedLaptop];
      if (!lap) return;

      if (e.key === 'ArrowLeft') {
        lap.rotationY += degToRad(15);
      } else if (e.key === 'ArrowRight') {
        lap.rotationY -= degToRad(15);
      } else if (e.key === 'ArrowUp') {
        setLidAngle(lap, lap.lidAngleDeg + 10);
      } else if (e.key === 'ArrowDown') {
        setLidAngle(lap, lap.lidAngleDeg - 10);
      }
    });

    updateSpecsPanel(selectedLaptop);
    updateButtons();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      const dt = clock.getDelta();
      const smooth = 1 - Math.exp(-dt * 6);

      if (compareMode) {
        compareRotation += 0.5 * dt;
      }

      laptops.forEach((lap, i) => {
        lap.currentScale = THREE.MathUtils.lerp(lap.currentScale, lap.targetScale, smooth);
        lap.root.scale.setScalar(lap.currentScale);

        let floatOffset = 0;
        if (!compareMode && i === selectedLaptop) {
          floatOffset = Math.sin(elapsed * Math.PI * 2 * 1.0) * 0.05;
        }

        lap.currentY = THREE.MathUtils.lerp(lap.currentY, lap.targetY + floatOffset, smooth);
        lap.root.position.set(laptopData[i].position.x, lap.currentY, laptopData[i].position.z);

        if (compareMode) {
          lap.root.rotation.y = compareRotation;
        } else {
          lap.root.rotation.y = THREE.MathUtils.lerp(lap.root.rotation.y, lap.rotationY, smooth);
        }

        lap.ring.rotation.z += dt * 0.8;
      });

      window.__3D_STATE__.selectedLaptop = selectedLaptop;
      window.__3D_STATE__.lidAngle = laptops[selectedLaptop].lidAngleDeg;
      window.__3D_STATE__.rotationY = laptops[selectedLaptop].rotationY;
      window.__3D_STATE__.compareMode = compareMode;
      window.__3D_STATE__.darkTheme = darkTheme;
      window.__3D_STATE__.laptopScales = laptops.map(l => Number(l.currentScale.toFixed(3)));
      window.__3D_STATE__.laptopPositionsY = laptops.map(l => Number(l.root.position.y.toFixed(3)));
      window.__3D_STATE__.specsVisible = laptopData[selectedLaptop].name;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
