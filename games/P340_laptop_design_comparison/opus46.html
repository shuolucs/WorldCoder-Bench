<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laptop Design Comparison</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#title {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    z-index: 10;
}

#bottom-buttons {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    z-index: 10;
}

.laptop-btn {
    padding: 10px 24px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 14px;
    font-weight: 600;
    border-radius: 25px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}

.laptop-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.6);
}

.laptop-btn.active {
    background: rgba(255,255,255,0.3);
    border-color: white;
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
}

#top-right-buttons {
    position: absolute;
    top: 20px;
    right: 220px;
    display: flex;
    gap: 10px;
    z-index: 10;
}

.action-btn {
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 13px;
    border-radius: 20px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}

.action-btn:hover {
    background: rgba(255,255,255,0.25);
}

.action-btn.active-mode {
    background: rgba(100,200,255,0.3);
    border-color: rgba(100,200,255,0.8);
}

#specs-panel {
    position: absolute;
    top: 20px;
    right: 10px;
    width: 200px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 20px;
    color: white;
    z-index: 10;
}

#specs-panel h3 {
    font-size: 16px;
    margin-bottom: 15px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

.spec-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 13px;
}

.spec-label {
    color: rgba(255,255,255,0.6);
}

.spec-value {
    font-weight: 600;
}

#specs-panel .color-swatch {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: inline-block;
    border: 2px solid rgba(255,255,255,0.3);
    vertical-align: middle;
}

#controls-hint {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    z-index: 10;
    text-align: center;
}
</style>
</head>
<body>

<div id="title">Laptop Design Comparison</div>

<div id="bottom-buttons">
    <button class="laptop-btn" data-index="0" onclick="selectLaptop(0)">UltraSlim</button>
    <button class="laptop-btn active" data-index="1" onclick="selectLaptop(1)">ProPower</button>
    <button class="laptop-btn" data-index="2" onclick="selectLaptop(2)">CreatorEdge</button>
</div>

<div id="top-right-buttons">
    <button class="action-btn" id="compare-btn" onclick="toggleCompare()">Compare All</button>
    <button class="action-btn" id="theme-btn" onclick="toggleTheme()">Toggle Theme</button>
</div>

<div id="specs-panel">
    <h3 id="spec-name">ProPower</h3>
    <div class="spec-row">
        <span class="spec-label">Weight</span>
        <span class="spec-value" id="spec-weight">2.1 kg</span>
    </div>
    <div class="spec-row">
        <span class="spec-label">Thickness</span>
        <span class="spec-value" id="spec-thickness">15 mm</span>
    </div>
    <div class="spec-row">
        <span class="spec-label">Body Size</span>
        <span class="spec-value" id="spec-body">2.6 × 1.8</span>
    </div>
    <div class="spec-row">
        <span class="spec-label">Screen</span>
        <span class="spec-value" id="spec-screen">2.5 × 1.6</span>
    </div>
    <div class="spec-row">
        <span class="spec-label">Color</span>
        <span class="spec-value" id="spec-color"><span class="color-swatch" id="spec-swatch" style="background:#404040"></span></span>
    </div>
    <div class="spec-row">
        <span class="spec-label">Lid Angle</span>
        <span class="spec-value" id="spec-lid">110°</span>
    </div>
</div>

<div id="controls-hint">← → Rotate &nbsp;|&nbsp; ↑ ↓ Open/Close Lid &nbsp;|&nbsp; Click to Select</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Background
const darkTopColor = new THREE.Color('#1a1a2e');
const darkBottomColor = new THREE.Color('#16213e');
const lightTopColor = new THREE.Color('#f0f0f5');
const lightBottomColor = new THREE.Color('#e0e0ea');

function createBackground(topColor, bottomColor) {
    const canvas = document.createElement('canvas');
    canvas.width = 2;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 512);
    gradient.addColorStop(0, topColor);
    gradient.addColorStop(1, bottomColor);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 2, 512);
    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
}

scene.background = createBackground('#1a1a2e', '#16213e');

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xfff5e6, 0.8);
dirLight1.position.set(5, 10, 5);
dirLight1.castShadow = true;
dirLight1.shadow.mapSize.set(1024, 1024);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xe6f0ff, 0.4);
dirLight2.position.set(-5, 5, -5);
scene.add(dirLight2);

// Floor
const floorGeom = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({
    color: 0x222233,
    metalness: 0.8,
    roughness: 0.3
});
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
floor.receiveShadow = true;
scene.add(floor);

// Laptop specs data
const laptopSpecs = [
    {
        name: 'UltraSlim',
        bodySize: [2.4, 0.08, 1.6],
        screenSize: [2.3, 1.5, 0.03],
        color: '#c0c0c0',
        screenEmissive: '#0066ff',
        position: [-3, 0.5, 0],
        weight: '0.95 kg',
        thickness: '8 mm'
    },
    {
        name: 'ProPower',
        bodySize: [2.6, 0.15, 1.8],
        screenSize: [2.5, 1.6, 0.04],
        color: '#404040',
        screenEmissive: '#00ff66',
        position: [0, 0.5, 0],
        weight: '2.1 kg',
        thickness: '15 mm'
    },
    {
        name: 'CreatorEdge',
        bodySize: [2.5, 0.12, 1.7],
        screenSize: [2.4, 1.55, 0.035],
        color: '#b76e79',
        screenEmissive: '#9933ff',
        position: [3, 0.5, 0],
        weight: '1.6 kg',
        thickness: '12 mm'
    }
];

// Create procedural laptops
const laptopGroups = [];
const laptopBases = [];
const laptopScreenPivots = [];
const laptopLidAngles = [110, 110, 110];
const laptopTargetScales = [0.8, 1.3, 0.8];
const laptopCurrentScales = [0.8, 1.3, 0.8];
const laptopBaseYPositions = [0.5, 1.0, 0.5];
const laptopTargetYPositions = [0.5, 1.0, 0.5];
const laptopCurrentYPositions = [0.5, 1.0, 0.5];
const laptopRotationsY = [0, 0, 0];
const selectionRings = [];

function createLaptop(spec, index) {
    const group = new THREE.Group();
    group.position.set(spec.position[0], spec.position[1], spec.position[2]);

    // Base
    const baseGeom = new THREE.BoxGeometry(spec.bodySize[0], spec.bodySize[1], spec.bodySize[2]);
    const baseMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(spec.color),
        metalness: 0.6,
        roughness: 0.3
    });
    const base = new THREE.Mesh(baseGeom, baseMat);
    base.position.y = spec.bodySize[1] / 2;
    base.castShadow = true;
    base.receiveShadow = true;
    base.userData = { laptopIndex: index };
    group.add(base);
    laptopBases.push(base);

    // Keyboard detail on base top
    const kbGeom = new THREE.PlaneGeometry(spec.bodySize[0] * 0.85, spec.bodySize[2] * 0.6);
    const kbMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(spec.color).multiplyScalar(0.7),
        metalness: 0.3,
        roughness: 0.6
    });
    const keyboard = new THREE.Mesh(kbGeom, kbMat);
    keyboard.rotation.x = -Math.PI / 2;
    keyboard.position.y = spec.bodySize[1] + 0.001;
    keyboard.position.z = -spec.bodySize[2] * 0.05;
    keyboard.userData = { laptopIndex: index };
    group.add(keyboard);

    // Trackpad
    const tpGeom = new THREE.PlaneGeometry(spec.bodySize[0] * 0.3, spec.bodySize[2] * 0.25);
    const tpMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(spec.color).multiplyScalar(0.8),
        metalness: 0.5,
        roughness: 0.2
    });
    const trackpad = new THREE.Mesh(tpGeom, tpMat);
    trackpad.rotation.x = -Math.PI / 2;
    trackpad.position.y = spec.bodySize[1] + 0.002;
    trackpad.position.z = spec.bodySize[2] * 0.3;
    trackpad.userData = { laptopIndex: index };
    group.add(trackpad);

    // Screen pivot at back edge of base
    const screenPivot = new THREE.Group();
    screenPivot.position.set(0, spec.bodySize[1], -spec.bodySize[2] / 2);
    group.add(screenPivot);

    // Screen panel
    const screenGeom = new THREE.BoxGeometry(spec.screenSize[0], spec.screenSize[1], spec.screenSize[2]);
    const screenBackMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(spec.color),
        metalness: 0.6,
        roughness: 0.3
    });
    const screenMesh = new THREE.Mesh(screenGeom, screenBackMat);
    screenMesh.position.y = spec.screenSize[1] / 2;
    screenMesh.castShadow = true;
    screenMesh.userData = { laptopIndex: index };
    screenPivot.add(screenMesh);

    // Screen display (front face)
    const displayGeom = new THREE.PlaneGeometry(spec.screenSize[0] * 0.92, spec.screenSize[1] * 0.9);
    const displayMat = new THREE.MeshStandardMaterial({
        color: '#111111',
        emissive: new THREE.Color(spec.screenEmissive),
        emissiveIntensity: 0.5,
        metalness: 0.1,
        roughness: 0.2
    });
    const display = new THREE.Mesh(displayGeom, displayMat);
    display.position.y = spec.screenSize[1] / 2;
    display.position.z = spec.screenSize[2] / 2 + 0.001;
    display.userData = { laptopIndex: index };
    screenPivot.add(display);

    // Set initial lid angle
    const angleRad = (110 * Math.PI) / 180;
    screenPivot.rotation.x = -(Math.PI - angleRad);

    laptopScreenPivots.push(screenPivot);

    // Selection ring
    const ringGeom = new THREE.TorusGeometry(1.5, 0.03, 16, 64);
    const ringMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(spec.screenEmissive),
        emissive: new THREE.Color(spec.screenEmissive),
        emissiveIntensity: 1.0,
        transparent: true,
        opacity: 0
    });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.02;
    group.add(ring);
    selectionRings.push(ring);

    scene.add(group);
    laptopGroups.push(group);
}

laptopSpecs.forEach((spec, i) => createLaptop(spec, i));

// Load GLTF model
let modelLoaded = false;
const loader = new GLTFLoader();
loader.load(
    'collision-world.glb',
    (gltf) => {
        const model = gltf.scene;
        // Calculate bounding box and scale to fit 4x4x4
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 4 / maxDim;
        model.scale.setScalar(scale);

        // Center and position
        const newBox = new THREE.Box3().setFromObject(model);
        const center = newBox.getCenter(new THREE.Vector3());
        model.position.sub(center);
        model.position.set(model.position.x, model.position.y, model.position.z - 3);

        // Make semi-transparent
        model.traverse((child) => {
            if (child.isMesh) {
                child.material = child.material.clone();
                child.material.transparent = true;
                child.material.opacity = 0.3;
            }
        });

        scene.add(model);
        modelLoaded = true;
    },
    undefined,
    (error) => {
        console.log('GLTF model not found, continuing without backdrop:', error.message || error);
        modelLoaded = false;
    }
);

// State
let selectedLaptop = 1;
let compareMode = false;
let darkTheme = true;

// Initialize state
window.__3D_STATE__ = {
    selectedLaptop: 1,
    lidAngle: 110,
    rotationY: 0,
    compareMode: false,
    darkTheme: true,
    laptopScales: [0.8, 1.3, 0.8],
    modelLoaded: false,
    laptopPositionsY: [0.5, 1.0, 0.5],
    specsVisible: 'ProPower'
};

// Selection
function selectLaptop(index) {
    if (compareMode) return;
    selectedLaptop = index;

    // Update button states
    document.querySelectorAll('.laptop-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
    });

    // Set target scales and positions
    for (let i = 0; i < 3; i++) {
        if (i === index) {
            laptopTargetScales[i] = 1.3;
            laptopTargetYPositions[i] = 1.0;
        } else {
            laptopTargetScales[i] = 0.8;
            laptopTargetYPositions[i] = 0.5;
        }
    }

    updateSpecsPanel(index);
}
window.selectLaptop = selectLaptop;

function updateSpecsPanel(index) {
    const spec = laptopSpecs[index];
    document.getElementById('spec-name').textContent = spec.name;
    document.getElementById('spec-weight').textContent = spec.weight;
    document.getElementById('spec-thickness').textContent = spec.thickness;
    document.getElementById('spec-body').textContent = `${spec.bodySize[0]} × ${spec.bodySize[2]}`;
    document.getElementById('spec-screen').textContent = `${spec.screenSize[0]} × ${spec.screenSize[1]}`;
    document.getElementById('spec-swatch').style.background = spec.color;
    document.getElementById('spec-lid').textContent = `${laptopLidAngles[index]}°`;
}

// Compare mode
function toggleCompare() {
    compareMode = !compareMode;
    document.getElementById('compare-btn').classList.toggle('active-mode', compareMode);

    if (compareMode) {
        for (let i = 0; i < 3; i++) {
            laptopTargetScales[i] = 1.0;
            laptopTargetYPositions[i] = 0.5;
        }
    } else {
        selectLaptop(selectedLaptop);
    }
}
window.toggleCompare = toggleCompare;

// Theme toggle
function toggleTheme() {
    darkTheme = !darkTheme;
    if (darkTheme) {
        scene.background = createBackground('#1a1a2e', '#16213e');
        floorMat.color.set(0x222233);
    } else {
        scene.background = createBackground('#f0f0f5', '#e0e0ea');
        floorMat.color.set(0xddddee);
    }
}
window.toggleTheme = toggleTheme;

// Keyboard controls
document.addEventListener('keydown', (e) => {
    if (compareMode) return;

    switch (e.key) {
        case 'ArrowLeft':
            laptopRotationsY[selectedLaptop] -= (15 * Math.PI) / 180;
            break;
        case 'ArrowRight':
            laptopRotationsY[selectedLaptop] += (15 * Math.PI) / 180;
            break;
        case 'ArrowUp':
            laptopLidAngles[selectedLaptop] = Math.min(170, laptopLidAngles[selectedLaptop] + 10);
            updateLidAngle(selectedLaptop);
            updateSpecsPanel(selectedLaptop);
            break;
        case 'ArrowDown':
            laptopLidAngles[selectedLaptop] = Math.max(0, laptopLidAngles[selectedLaptop] - 10);
            updateLidAngle(selectedLaptop);
            updateSpecsPanel(selectedLaptop);
            break;
    }
    e.preventDefault();
});

function updateLidAngle(index) {
    const angleRad = (laptopLidAngles[index] * Math.PI) / 180;
    laptopScreenPivots[index].rotation.x = -(Math.PI - angleRad);
}

// Raycaster for click selection
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    if (compareMode) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // Collect all laptop meshes
    const allMeshes = [];
    laptopGroups.forEach((group) => {
        group.traverse((child) => {
            if (child.isMesh && child.userData.laptopIndex !== undefined) {
                allMeshes.push(child);
            }
        });
    });

    const intersects = raycaster.intersectObjects(allMeshes);
    if (intersects.length > 0) {
        const idx = intersects[0].object.userData.laptopIndex;
        if (idx !== undefined) {
            selectLaptop(idx);
        }
    }
});

// OrbitControls (limited)
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 4;
controls.maxDistance = 15;
controls.target.set(0, 0.5, 0);

// Animation
const clock = new THREE.Clock();
let compareRotation = 0;

function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    const time = clock.getElapsedTime();

    // Lerp scales and positions
    for (let i = 0; i < 3; i++) {
        laptopCurrentScales[i] += (laptopTargetScales[i] - laptopCurrentScales[i]) * Math.min(1, dt * 4);
        laptopCurrentYPositions[i] += (laptopTargetYPositions[i] - laptopCurrentYPositions[i]) * Math.min(1, dt * 4);

        const s = laptopCurrentScales[i];
        laptopGroups[i].scale.set(s, s, s);

        let yPos = laptopCurrentYPositions[i];

        // Floating animation for selected laptop (not in compare mode)
        if (!compareMode && i === selectedLaptop) {
            yPos += Math.sin(time * Math.PI * 2) * 0.05;
        }

        laptopGroups[i].position.y = yPos;

        // Rotation
        if (compareMode) {
            compareRotation += 0.5 * dt;
            laptopGroups[i].rotation.y = compareRotation;
        } else {
            // Lerp rotation
            const targetRot = laptopRotationsY[i];
            const currentRot = laptopGroups[i].rotation.y;
            laptopGroups[i].rotation.y += (targetRot - currentRot) * Math.min(1, dt * 6);
        }

        // Selection ring
        const ringTargetOpacity = (!compareMode && i === selectedLaptop) ? 0.8 : 0;
        selectionRings[i].material.opacity += (ringTargetOpacity - selectionRings[i].material.opacity) * Math.min(1, dt * 5);

        if (!compareMode && i === selectedLaptop) {
            selectionRings[i].rotation.z = time * 0.5;
        }
    }

    // Update state
    window.__3D_STATE__.selectedLaptop = selectedLaptop;
    window.__3D_STATE__.lidAngle = laptopLidAngles[selectedLaptop];
    window.__3D_STATE__.rotationY = laptopRotationsY[selectedLaptop];
    window.__3D_STATE__.compareMode = compareMode;
    window.__3D_STATE__.darkTheme = darkTheme;
    window.__3D_STATE__.laptopScales = [...laptopCurrentScales];
    window.__3D_STATE__.modelLoaded = modelLoaded;
    window.__3D_STATE__.laptopPositionsY = laptopGroups.map(g => g.position.y);
    window.__3D_STATE__.specsVisible = laptopSpecs[selectedLaptop].name;

    controls.update();
    renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize specs panel
updateSpecsPanel(1);
</script>
</body>
</html>
