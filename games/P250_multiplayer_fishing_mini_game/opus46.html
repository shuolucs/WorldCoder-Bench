<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Fishing Mini-Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#hud {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
}
#p1score {
  position: absolute; top: 15px; left: 20px;
  color: #ff4444; font-size: 22px; font-weight: bold;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}
#p2score {
  position: absolute; top: 15px; right: 20px;
  color: #4488ff; font-size: 22px; font-weight: bold;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}
#turnInfo {
  position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
  color: #fff; font-size: 20px; font-weight: bold;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
  text-align: center;
}
#phaseInfo {
  position: absolute; top: 45px; left: 50%; transform: translateX(-50%);
  color: #ffe066; font-size: 18px; font-weight: bold;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
}
#instructions {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  color: #fff; font-size: 16px; font-weight: 500;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
  text-align: center;
  background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 8px;
}
#resetBtn {
  position: absolute; bottom: 20px; right: 20px;
  pointer-events: all; cursor: pointer;
  background: #e74c3c; color: #fff; border: none;
  padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: bold;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
#resetBtn:hover { background: #c0392b; }
#winnerOverlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: none; justify-content: center; align-items: center;
  background: rgba(0,0,0,0.65);
  pointer-events: all;
}
#winnerOverlay.show { display: flex; }
#winnerBox {
  background: rgba(255,255,255,0.95); padding: 40px 60px; border-radius: 16px;
  text-align: center; box-shadow: 0 4px 30px rgba(0,0,0,0.4);
}
#winnerBox h1 { font-size: 36px; margin-bottom: 10px; }
#winnerBox p { font-size: 20px; margin-bottom: 20px; }
#winnerBox button {
  cursor: pointer; background: #27ae60; color: #fff; border: none;
  padding: 12px 30px; border-radius: 8px; font-size: 16px; font-weight: bold;
}
#winnerBox button:hover { background: #219a52; }
#catchMsg {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: #fff; font-size: 28px; font-weight: bold;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
  display: none;
}
</style>
</head>
<body>

<div id="hud">
  <div id="p1score">Player 1 Score: 0</div>
  <div id="p2score">Player 2 Score: 0</div>
  <div id="turnInfo">Turn: 1/16</div>
  <div id="phaseInfo">Phase: AIM</div>
  <div id="instructions">Use A/D to aim, SPACE to cast</div>
  <div id="catchMsg"></div>
  <button id="resetBtn">Reset Game</button>
  <div id="winnerOverlay">
    <div id="winnerBox">
      <h1 id="winnerText">Player 1 Wins!</h1>
      <p id="winnerScores"></p>
      <button id="playAgainBtn">Play Again</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ========== SCENE SETUP ==========
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 12, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.insertBefore(renderer.domElement, document.getElementById('hud'));

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -25;
dirLight.shadow.camera.right = 25;
dirLight.shadow.camera.top = 25;
dirLight.shadow.camera.bottom = -25;
scene.add(dirLight);

// Water surface
const waterGeo = new THREE.PlaneGeometry(40, 40);
const waterMat = new THREE.MeshPhongMaterial({
  color: 0x1a6ea0, opacity: 0.7, transparent: true, side: THREE.DoubleSide
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = 0;
water.receiveShadow = true;
scene.add(water);

// Shore
const shoreGeo = new THREE.PlaneGeometry(40, 10);
const shoreMat = new THREE.MeshPhongMaterial({ color: 0x6b8e23, side: THREE.DoubleSide });
const shore = new THREE.Mesh(shoreGeo, shoreMat);
shore.rotation.x = -Math.PI / 2;
shore.position.set(0, -0.5, 17);
shore.receiveShadow = true;
scene.add(shore);

// Shore edge detail
const shoreEdgeGeo = new THREE.PlaneGeometry(40, 3);
const shoreEdgeMat = new THREE.MeshPhongMaterial({ color: 0x8B7355, side: THREE.DoubleSide });
const shoreEdge = new THREE.Mesh(shoreEdgeGeo, shoreEdgeMat);
shoreEdge.rotation.x = -Math.PI / 2;
shoreEdge.position.set(0, -0.3, 13);
shoreEdge.receiveShadow = true;
scene.add(shoreEdge);

// ========== FOX MODEL ==========
let foxMixer = null;
let foxLoaded = false;

const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Fox.glb',
  (gltf) => {
    const fox = gltf.scene;
    fox.position.set(8, -0.5, 18);
    fox.scale.set(0.04, 0.04, 0.04);
    fox.rotation.y = -Math.PI / 2;
    fox.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(fox);
    foxLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      foxMixer = new THREE.AnimationMixer(fox);
      // Try to find Survey or Idle animation, fallback to first
      let clip = gltf.animations.find(a => a.name.toLowerCase().includes('survey'))
        || gltf.animations.find(a => a.name.toLowerCase().includes('idle'))
        || gltf.animations[0];
      const action = foxMixer.clipAction(clip);
      action.play();
    }
  },
  undefined,
  (err) => {
    console.warn('Fox model failed to load:', err);
    // Create placeholder
    const placeholderGeo = new THREE.ConeGeometry(0.5, 1.5, 8);
    const placeholderMat = new THREE.MeshPhongMaterial({ color: 0xff8800 });
    const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
    placeholder.position.set(8, 0.25, 18);
    scene.add(placeholder);
    foxLoaded = true;
  }
);

// ========== PLAYERS ==========
function createPlayer(color, x) {
  const group = new THREE.Group();

  // Body (cylinder)
  const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.5, 12);
  const bodyMat = new THREE.MeshPhongMaterial({ color, emissive: 0x000000 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.75;
  body.castShadow = true;
  group.add(body);

  // Head (sphere)
  const headGeo = new THREE.SphereGeometry(0.35, 12, 12);
  const headMat = new THREE.MeshPhongMaterial({ color: 0xffdbac });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.8;
  head.castShadow = true;
  group.add(head);

  // Hat
  const hatGeo = new THREE.CylinderGeometry(0.15, 0.45, 0.3, 12);
  const hatMat = new THREE.MeshPhongMaterial({ color });
  const hat = new THREE.Mesh(hatGeo, hatMat);
  hat.position.y = 2.15;
  group.add(hat);

  // Rod
  const rodGeo = new THREE.CylinderGeometry(0.03, 0.03, 3, 6);
  const rodMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
  const rod = new THREE.Mesh(rodGeo, rodMat);
  rod.position.set(0.3, 1.5, -0.5);
  rod.rotation.x = -0.4;
  group.add(rod);

  group.position.set(x, -0.5, 15);

  return { group, bodyMat, body };
}

const p1Data = createPlayer(0xff4444, -5);
const p2Data = createPlayer(0x4488ff, 5);
scene.add(p1Data.group);
scene.add(p2Data.group);

// ========== FISHING LINES & BOBBERS ==========
function createBobber() {
  const geo = new THREE.SphereGeometry(0.15, 8, 8);
  const mat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.visible = false;
  scene.add(mesh);
  return mesh;
}

function createFishingLine() {
  const points = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, 0)];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0xffffff });
  const line = new THREE.Line(geo, mat);
  line.visible = false;
  scene.add(line);
  return line;
}

const p1Bobber = createBobber();
const p2Bobber = createBobber();
const p1Line = createFishingLine();
const p2Line = createFishingLine();

// ========== RETICLE ==========
const reticleGeo = new THREE.RingGeometry(0.8, 1.0, 32);
const reticleMat = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
const reticle = new THREE.Mesh(reticleGeo, reticleMat);
reticle.rotation.x = -Math.PI / 2;
reticle.position.y = 0.05;
reticle.visible = false;
scene.add(reticle);

// Inner dot
const reticleDotGeo = new THREE.CircleGeometry(0.15, 16);
const reticleDotMat = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
const reticleDot = new THREE.Mesh(reticleDotGeo, reticleDotMat);
reticleDot.rotation.x = -Math.PI / 2;
reticleDot.position.y = 0.06;
reticleDot.visible = false;
scene.add(reticleDot);

// ========== FISH SYSTEM ==========
const fishColors = [0xFFD700, 0xC0C0C0, 0x32CD32, 0xFF8C00, 0xFF69B4, 0x00CED1, 0x9370DB, 0xDC143C];

let fishArray = [];

function createFish() {
  fishArray.forEach(f => scene.remove(f.mesh));
  fishArray = [];

  for (let i = 0; i < 8; i++) {
    const size = Math.floor(Math.random() * 5) + 1;
    const scale = 0.2 + size * 0.06;

    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.SphereGeometry(scale, 8, 6);
    bodyGeo.scale(1.8, 0.8, 1);
    const bodyMat = new THREE.MeshPhongMaterial({ color: fishColors[i] });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    group.add(body);

    // Tail
    const tailGeo = new THREE.ConeGeometry(scale * 0.6, scale * 1.0, 4);
    const tailMat = new THREE.MeshPhongMaterial({ color: fishColors[i] });
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.rotation.z = Math.PI / 2;
    tail.position.x = scale * 1.5;
    group.add(tail);

    // Eye
    const eyeGeo = new THREE.SphereGeometry(scale * 0.15, 6, 6);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(-scale * 0.8, scale * 0.3, scale * 0.5);
    group.add(eye);

    const x = (Math.random() * 30) - 15;
    const z = (Math.random() * 25) - 15;
    group.position.set(x, -0.3, z);
    group.castShadow = true;

    scene.add(group);

    const dirAngle = Math.random() * Math.PI * 2;
    fishArray.push({
      id: i,
      mesh: group,
      size,
      caught: false,
      caughtBy: null,
      vx: Math.cos(dirAngle) * 2,
      vz: Math.sin(dirAngle) * 2,
      dirTimer: Math.random() * 2 + 1,
      speed: 1.5 + Math.random() * 1
    });
  }
}

createFish();

// ========== GAME STATE ==========
let gameState = {
  activePlayer: 1,
  phase: 'AIM',
  turn: 1,
  p1Score: 0,
  p2Score: 0,
  bobberX: 0,
  bobberTargetZ: 0,
  fishCaught: 0,
  lastCatchSize: 0,
  gameOver: false,
  winner: 0,
  castTimer: 0,
  reelTimer: 0,
  hookedFish: null,
  catchMsgTimer: 0,
  catchMsgText: ''
};

const MAX_TURNS = 16;

function resetGame() {
  gameState = {
    activePlayer: 1,
    phase: 'AIM',
    turn: 1,
    p1Score: 0,
    p2Score: 0,
    bobberX: 0,
    bobberTargetZ: 0,
    fishCaught: 0,
    lastCatchSize: 0,
    gameOver: false,
    winner: 0,
    castTimer: 0,
    reelTimer: 0,
    hookedFish: null,
    catchMsgTimer: 0,
    catchMsgText: ''
  };

  createFish();
  p1Bobber.visible = false;
  p2Bobber.visible = false;
  p1Line.visible = false;
  p2Line.visible = false;
  reticle.visible = true;
  reticleDot.visible = true;

  p1Data.bodyMat.emissive.setHex(0x330000);
  p2Data.bodyMat.emissive.setHex(0x000000);

  document.getElementById('winnerOverlay').classList.remove('show');
  document.getElementById('catchMsg').style.display = 'none';

  updateReticlePosition();
}

function getActivePlayerData() {
  return gameState.activePlayer === 1 ? p1Data : p2Data;
}

function getActiveBobber() {
  return gameState.activePlayer === 1 ? p1Bobber : p2Bobber;
}

function getActiveLine() {
  return gameState.activePlayer === 1 ? p1Line : p2Line;
}

function getPlayerPos() {
  const d = getActivePlayerData();
  return d.group.position.clone().add(new THREE.Vector3(0.3, 2.5, -0.5));
}

function updateReticlePosition() {
  const playerPos = getActivePlayerData().group.position;
  gameState.bobberX = playerPos.x;
  gameState.bobberTargetZ = 5;
  reticle.position.set(gameState.bobberX, 0.05, gameState.bobberTargetZ);
  reticleDot.position.set(gameState.bobberX, 0.06, gameState.bobberTargetZ);
}

function updateLine(line, from, to) {
  const positions = line.geometry.attributes.position;
  positions.setXYZ(0, from.x, from.y, from.z);
  positions.setXYZ(1, to.x, to.y, to.z);
  positions.needsUpdate = true;
}

// ========== INPUT ==========
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' && gameState.phase === 'AIM' && !gameState.gameOver) {
    e.preventDefault();
    startCast();
  }
});
window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});

function startCast() {
  gameState.phase = 'CAST';
  gameState.castTimer = 0;
  reticle.visible = false;
  reticleDot.visible = false;

  const bobber = getActiveBobber();
  const startPos = getPlayerPos();
  bobber.position.copy(startPos);
  bobber.visible = true;

  const line = getActiveLine();
  line.visible = true;
}

function startReel() {
  gameState.phase = 'REEL';
  gameState.reelTimer = 0;

  const bobber = getActiveBobber();
  const bobberPos = bobber.position;

  // Find closest uncaught fish within 3 units
  let closest = null;
  let closestDist = Infinity;

  for (const fish of fishArray) {
    if (fish.caught) continue;
    const dx = fish.mesh.position.x - bobberPos.x;
    const dz = fish.mesh.position.z - bobberPos.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 3 && dist < closestDist) {
      closest = fish;
      closestDist = dist;
    }
  }

  if (closest) {
    gameState.hookedFish = closest;
    gameState.lastCatchSize = closest.size;
    showCatchMsg(`Caught a fish! Size: ${closest.size} 🐟`);
  } else {
    gameState.hookedFish = null;
    gameState.lastCatchSize = 0;
    showCatchMsg('No catch! 😞');
  }
}

function showCatchMsg(text) {
  gameState.catchMsgText = text;
  gameState.catchMsgTimer = 0;
  const el = document.getElementById('catchMsg');
  el.textContent = text;
  el.style.display = 'block';
}

function endTurn() {
  const bobber = getActiveBobber();
  const line = getActiveLine();
  bobber.visible = false;
  line.visible = false;

  document.getElementById('catchMsg').style.display = 'none';

  if (gameState.hookedFish) {
    const fish = gameState.hookedFish;
    fish.caught = true;
    fish.caughtBy = gameState.activePlayer;
    fish.mesh.visible = false;
    gameState.fishCaught++;

    if (gameState.activePlayer === 1) {
      gameState.p1Score += fish.size;
    } else {
      gameState.p2Score += fish.size;
    }
    gameState.hookedFish = null;
  }

  // Check end conditions
  if (gameState.fishCaught >= 8 || gameState.turn >= MAX_TURNS) {
    endGame();
    return;
  }

  // Switch player
  gameState.turn++;
  gameState.activePlayer = gameState.activePlayer === 1 ? 2 : 1;
  gameState.phase = 'AIM';

  // Update emissive
  if (gameState.activePlayer === 1) {
    p1Data.bodyMat.emissive.setHex(0x330000);
    p2Data.bodyMat.emissive.setHex(0x000000);
  } else {
    p1Data.bodyMat.emissive.setHex(0x000000);
    p2Data.bodyMat.emissive.setHex(0x000033);
  }

  reticle.visible = true;
  reticleDot.visible = true;
  updateReticlePosition();
}

function endGame() {
  gameState.phase = 'ENDED';
  gameState.gameOver = true;

  if (gameState.p1Score > gameState.p2Score) {
    gameState.winner = 1;
  } else if (gameState.p2Score > gameState.p1Score) {
    gameState.winner = 2;
  } else {
    gameState.winner = 'tie';
  }

  reticle.visible = false;
  reticleDot.visible = false;

  const overlay = document.getElementById('winnerOverlay');
  const winText = document.getElementById('winnerText');
  const winScores = document.getElementById('winnerScores');

  if (gameState.winner === 'tie') {
    winText.textContent = "It's a Tie! 🎣";
    winText.style.color = '#333';
  } else if (gameState.winner === 1) {
    winText.textContent = 'Player 1 Wins! 🏆';
    winText.style.color = '#ff4444';
  } else {
    winText.textContent = 'Player 2 Wins! 🏆';
    winText.style.color = '#4488ff';
  }
  winScores.textContent = `P1: ${gameState.p1Score} pts | P2: ${gameState.p2Score} pts | Fish caught: ${gameState.fishCaught}/8`;

  overlay.classList.add('show');
}

// ========== BUTTONS ==========
document.getElementById('resetBtn').addEventListener('click', resetGame);
document.getElementById('playAgainBtn').addEventListener('click', resetGame);

// ========== EXPOSE STATE ==========
window.__3D_STATE__ = {};

function updateExposedState() {
  window.__3D_STATE__ = {
    activePlayer: gameState.activePlayer,
    phase: gameState.phase,
    turn: gameState.turn,
    p1Score: gameState.p1Score,
    p2Score: gameState.p2Score,
    bobberX: gameState.bobberX,
    fishCount: 8,
    fishCaught: gameState.fishCaught,
    lastCatchSize: gameState.lastCatchSize,
    gameOver: gameState.gameOver,
    winner: gameState.winner,
    foxLoaded: foxLoaded,
    fishPositions: fishArray.map(f => ({
      x: f.mesh.position.x,
      z: f.mesh.position.z,
      caught: f.caught
    })),
    reticleVisible: reticle.visible
  };
}

// ========== UPDATE HUD ==========
function updateHUD() {
  document.getElementById('p1score').textContent = `Player 1 Score: ${gameState.p1Score}`;
  document.getElementById('p2score').textContent = `Player 2 Score: ${gameState.p2Score}`;
  document.getElementById('turnInfo').textContent = `Turn: ${gameState.turn}/${MAX_TURNS}`;

  const phaseEl = document.getElementById('phaseInfo');
  const playerColor = gameState.activePlayer === 1 ? '#ff6666' : '#66aaff';
  phaseEl.innerHTML = `<span style="color:${playerColor}">Player ${gameState.activePlayer}</span> — Phase: ${gameState.phase}`;

  const instrEl = document.getElementById('instructions');
  switch (gameState.phase) {
    case 'AIM':
      instrEl.textContent = '🎯 Use A/D to aim left/right, W/S for depth, SPACE to cast';
      break;
    case 'CAST':
      instrEl.textContent = '🎣 Casting...';
      break;
    case 'REEL':
      instrEl.textContent = '🐟 Reeling in...';
      break;
    case 'ENDED':
      instrEl.textContent = '🏆 Game Over!';
      break;
  }
}

// ========== ANIMATION LOOP ==========
const clock = new THREE.Clock();

// Initialize
p1Data.bodyMat.emissive.setHex(0x330000);
reticle.visible = true;
reticleDot.visible = true;
updateReticlePosition();

// Water animation - add some simple wave vertices
const waterVertices = waterGeo.attributes.position.array.slice();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Fox animation
  if (foxMixer) foxMixer.update(delta);

  // Water wave animation
  const posAttr = waterGeo.attributes.position;
  for (let i = 0; i < posAttr.count; i++) {
    const x = waterVertices[i * 3];
    const y = waterVertices[i * 3 + 1];
    const waveZ = Math.sin(x * 0.5 + elapsed * 1.5) * 0.15 + Math.cos(y * 0.3 + elapsed * 1.2) * 0.1;
    posAttr.setZ(i, waveZ);
  }
  posAttr.needsUpdate = true;
  waterGeo.computeVertexNormals();

  // Fish movement
  for (const fish of fishArray) {
    if (fish.caught) continue;

    fish.dirTimer -= delta;
    if (fish.dirTimer <= 0) {
      const angle = Math.random() * Math.PI * 2;
      fish.vx = Math.cos(angle) * fish.speed;
      fish.vz = Math.sin(angle) * fish.speed;
      fish.dirTimer = 2 + Math.random();
    }

    fish.mesh.position.x += fish.vx * delta;
    fish.mesh.position.z += fish.vz * delta;

    // Bounds
    if (fish.mesh.position.x < -15) { fish.mesh.position.x = -15; fish.vx = Math.abs(fish.vx); }
    if (fish.mesh.position.x > 15) { fish.mesh.position.x = 15; fish.vx = -Math.abs(fish.vx); }
    if (fish.mesh.position.z < -15) { fish.mesh.position.z = -15; fish.vz = Math.abs(fish.vz); }
    if (fish.mesh.position.z > 10) { fish.mesh.position.z = 10; fish.vz = -Math.abs(fish.vz); }

    // Face direction
    fish.mesh.rotation.y = Math.atan2(fish.vx, fish.vz);

    // Bobbing
    fish.mesh.position.y = -0.3 + Math.sin(elapsed * 2 + fish.id) * 0.1;
  }

  // Reticle pulse
  if (reticle.visible) {
    const pulse = 0.9 + Math.sin(elapsed * 4) * 0.1;
    reticle.scale.set(pulse, pulse, pulse);
  }

  // Game phase logic
  if (!gameState.gameOver) {
    if (gameState.phase === 'AIM') {
      const moveSpeed = 10;
      if (keys['a'] || keys['arrowleft']) {
        gameState.bobberX -= moveSpeed * delta;
      }
      if (keys['d'] || keys['arrowright']) {
        gameState.bobberX += moveSpeed * delta;
      }
      if (keys['w'] || keys['arrowup']) {
        gameState.bobberTargetZ -= moveSpeed * delta;
      }
      if (keys['s'] || keys['arrowdown']) {
        gameState.bobberTargetZ += moveSpeed * delta;
      }

      gameState.bobberX = Math.max(-15, Math.min(15, gameState.bobberX));
      gameState.bobberTargetZ = Math.max(-15, Math.min(10, gameState.bobberTargetZ));

      reticle.position.set(gameState.bobberX, 0.05, gameState.bobberTargetZ);
      reticleDot.position.set(gameState.bobberX, 0.06, gameState.bobberTargetZ);
    }

    if (gameState.phase === 'CAST') {
      gameState.castTimer += delta;
      const t = Math.min(gameState.castTimer / 1.0, 1.0);

      const bobber = getActiveBobber();
      const startPos = getPlayerPos();
      const endPos = new THREE.Vector3(gameState.bobberX, 0.1, gameState.bobberTargetZ);

      // Arc trajectory
      const arcHeight = 5;
      bobber.position.lerpVectors(startPos, endPos, t);
      bobber.position.y += Math.sin(t * Math.PI) * arcHeight;

      // Update line
      const line = getActiveLine();
      const rodTip = getPlayerPos();
      updateLine(line, rodTip, bobber.position);

      if (t >= 1.0) {
        bobber.position.copy(endPos);
        startReel();
      }
    }

    if (gameState.phase === 'REEL') {
      gameState.reelTimer += delta;

      const bobber = getActiveBobber();
      const line = getActiveLine();

      if (gameState.hookedFish) {
        const totalTime = 1.5;
        const t = Math.min(gameState.reelTimer / totalTime, 1.0);

        const fishStartPos = new THREE.Vector3(gameState.bobberX, 0.1, gameState.bobberTargetZ);
        const playerPos = getPlayerPos();

        bobber.position.lerpVectors(fishStartPos, playerPos, t);
        bobber.position.y += Math.sin(t * Math.PI) * 2;

        gameState.hookedFish.mesh.position.copy(bobber.position);
        gameState.hookedFish.mesh.position.y -= 0.3;

        updateLine(line, getPlayerPos(), bobber.position);

        if (t >= 1.0) {
          endTurn();
        }
      } else {
        // No catch - wait 1 second
        const rodTip = getPlayerPos();
        updateLine(line, rodTip, bobber.position);

        // Bobber bobbing
        bobber.position.y = 0.1 + Math.sin(elapsed * 5) * 0.05;

        if (gameState.reelTimer >= 1.5) {
          endTurn();
        }
      }
    }
  }

  // Catch message fade
  if (gameState.catchMsgTimer !== null) {
    gameState.catchMsgTimer += delta;
  }

  // Player idle animation (subtle bob)
  p1Data.group.position.y = -0.5 + Math.sin(elapsed * 1.5) * 0.03;
  p2Data.group.position.y = -0.5 + Math.sin(elapsed * 1.5 + 1) * 0.03;

  updateHUD();
  updateExposedState();

  renderer.render(scene, camera);
}

animate();
</script>
