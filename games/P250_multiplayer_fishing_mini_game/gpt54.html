<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplayer Fishing Mini-Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #87CEEB;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      font-weight: bold;
    }

    #p1Score {
      position: absolute;
      top: 12px;
      left: 16px;
      color: #ff5555;
      font-size: 22px;
    }

    #p2Score {
      position: absolute;
      top: 12px;
      right: 16px;
      color: #55aaff;
      font-size: 22px;
    }

    #turnInfo {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      text-align: center;
    }

    #instructions {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      text-align: center;
      max-width: 70vw;
    }

    #message {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      color: #fff8b0;
      text-align: center;
    }

    #resetBtn {
      position: absolute;
      bottom: 16px;
      right: 16px;
      pointer-events: auto;
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #ffffffdd;
      color: #222;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    #resetBtn:hover {
      background: white;
    }

    #winnerOverlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.5);
      pointer-events: auto;
    }

    #winnerCard {
      background: rgba(255,255,255,0.95);
      color: #222;
      padding: 32px 48px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    #winnerText {
      font-size: 42px;
      margin-bottom: 12px;
    }

    #winnerSub {
      font-size: 22px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="p1Score">Player 1 Score: 0</div>
    <div id="turnInfo">Turn: 1/16<br>Phase: AIM</div>
    <div id="p2Score">Player 2 Score: 0</div>
    <div id="message"></div>
    <div id="instructions">P1 AIM: Use A/D to move target, SPACE to cast</div>
    <button id="resetBtn">Reset Game</button>
  </div>

  <div id="winnerOverlay">
    <div id="winnerCard">
      <div id="winnerText">Winner</div>
      <div id="winnerSub"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, clock;
    let water, shore;
    let players = {};
    let fish = [];
    let fishIdCounter = 0;
    let reticle;
    let fox, foxMixer = null;
    let ambientLight, directionalLight;

    const ui = {
      p1Score: document.getElementById('p1Score'),
      p2Score: document.getElementById('p2Score'),
      turnInfo: document.getElementById('turnInfo'),
      instructions: document.getElementById('instructions'),
      message: document.getElementById('message'),
      resetBtn: document.getElementById('resetBtn'),
      winnerOverlay: document.getElementById('winnerOverlay'),
      winnerText: document.getElementById('winnerText'),
      winnerSub: document.getElementById('winnerSub')
    };

    const PHASES = {
      AIM: 'AIM',
      CAST: 'CAST',
      REEL: 'REEL',
      ENDED: 'ENDED'
    };

    const game = {
      activePlayer: 1,
      phase: PHASES.AIM,
      turn: 1,
      maxTurns: 16,
      p1Score: 0,
      p2Score: 0,
      bobberX: 0,
      fishCount: 8,
      fishCaught: 0,
      lastCatchSize: 0,
      gameOver: false,
      winner: 0,
      foxLoaded: false,
      reticleVisible: true,
      aimTarget: new THREE.Vector3(-5, 0.02, 2),
      castStart: null,
      castEnd: null,
      castElapsed: 0,
      reelElapsed: 0,
      reelDuration: 1.5,
      hookedFish: null,
      messageTimer: 0
    };

    window.__3D_STATE__ = {
      activePlayer: 1,
      phase: 'AIM',
      turn: 1,
      p1Score: 0,
      p2Score: 0,
      bobberX: 0,
      fishCount: 8,
      fishCaught: 0,
      lastCatchSize: 0,
      gameOver: false,
      winner: 0,
      foxLoaded: false,
      fishPositions: [],
      reticleVisible: true
    };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color('#87CEEB');

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
      camera.position.set(0, 12, 20);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(10, 15, 10);
      directionalLight.castShadow = true;
      directionalLight.shadow.mapSize.set(1024, 1024);
      scene.add(directionalLight);

      createEnvironment();
      createPlayers();
      createReticle();
      spawnFish();
      loadFox();
      setupEvents();
      setActivePlayerVisuals();
      resetBobberTarget();
      updateUI();
    }

    function createEnvironment() {
      const waterGeo = new THREE.PlaneGeometry(40, 40);
      const waterMat = new THREE.MeshPhongMaterial({
        color: '#1a6ea0',
        opacity: 0.7,
        transparent: true,
        side: THREE.DoubleSide
      });
      water = new THREE.Mesh(waterGeo, waterMat);
      water.rotation.x = -Math.PI / 2;
      water.position.y = 0;
      water.receiveShadow = true;
      scene.add(water);

      const shoreGeo = new THREE.PlaneGeometry(40, 10);
      const shoreMat = new THREE.MeshPhongMaterial({
        color: '#7c9b4e',
        side: THREE.DoubleSide
      });
      shore = new THREE.Mesh(shoreGeo, shoreMat);
      shore.rotation.x = -Math.PI / 2;
      shore.position.set(0, -0.5, 22);
      shore.receiveShadow = true;
      scene.add(shore);

      const sandGeo = new THREE.BoxGeometry(40, 0.5, 4);
      const sandMat = new THREE.MeshPhongMaterial({ color: '#8b6b3f' });
      const sand = new THREE.Mesh(sandGeo, sandMat);
      sand.position.set(0, -0.25, 18);
      sand.receiveShadow = true;
      scene.add(sand);
    }

    function createPlayerMesh(color) {
      let mesh;
      if (THREE.CapsuleGeometry) {
        mesh = new THREE.Mesh(
          new THREE.CapsuleGeometry(0.6, 1.2, 6, 12),
          new THREE.MeshStandardMaterial({
            color,
            emissive: 0x000000,
            emissiveIntensity: 0.0
          })
        );
      } else {
        mesh = new THREE.Mesh(
          new THREE.CylinderGeometry(0.6, 0.6, 2.0, 16),
          new THREE.MeshStandardMaterial({
            color,
            emissive: 0x000000,
            emissiveIntensity: 0.0
          })
        );
      }
      mesh.castShadow = true;
      return mesh;
    }

    function createPlayers() {
      players[1] = createPlayer(1, 0xff3333, new THREE.Vector3(-5, 0.5, 15));
      players[2] = createPlayer(2, 0x3366ff, new THREE.Vector3(5, 0.5, 15));
    }

    function createPlayer(id, color, position) {
      const mesh = createPlayerMesh(color);
      mesh.position.copy(position);
      scene.add(mesh);

      const bobber = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      bobber.castShadow = true;
      bobber.position.set(position.x, 1.2, position.z - 2);
      scene.add(bobber);

      const lineMat = new THREE.LineBasicMaterial({ color: 0x111111 });
      const lineGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(position.x, 1.2, position.z),
        bobber.position.clone()
      ]);
      const line = new THREE.Line(lineGeo, lineMat);
      scene.add(line);

      return {
        id,
        mesh,
        bobber,
        line,
        home: position.clone(),
        color
      };
    }

    function updatePlayerLine(player) {
      const start = new THREE.Vector3(player.home.x, 1.2, player.home.z);
      const end = player.bobber.position.clone();
      player.line.geometry.dispose();
      player.line.geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
    }

    function createReticle() {
      const geo = new THREE.RingGeometry(0.45, 0.7, 32);
      const mat = new THREE.MeshBasicMaterial({
        color: 0xffff00,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.9
      });
      reticle = new THREE.Mesh(geo, mat);
      reticle.rotation.x = -Math.PI / 2;
      reticle.position.set(-5, 0.03, 2);
      scene.add(reticle);
    }

    function spawnFish() {
      clearFish();
      const colors = [0xd4af37, 0xc0c0c0, 0x33aa55, 0xff8833];

      for (let i = 0; i < game.fishCount; i++) {
        const size = randInt(1, 5);
        const color = colors[Math.floor(Math.random() * colors.length)];

        const fishGroup = new THREE.Group();

        const body = new THREE.Mesh(
          new THREE.SphereGeometry(0.35 + size * 0.03, 16, 12),
          new THREE.MeshStandardMaterial({ color, metalness: 0.2, roughness: 0.7 })
        );
        body.scale.set(1.6, 0.8, 0.8);
        fishGroup.add(body);

        const tail = new THREE.Mesh(
          new THREE.ConeGeometry(0.22 + size * 0.02, 0.4, 12),
          new THREE.MeshStandardMaterial({ color })
        );
        tail.rotation.z = Math.PI / 2;
        tail.position.x = -0.65;
        fishGroup.add(tail);

        const fishObj = {
          id: fishIdCounter++,
          mesh: fishGroup,
          size,
          caught: false,
          caughtBy: null,
          dir: new THREE.Vector3(Math.random() * 2 - 1, 0, Math.random() * 2 - 1).normalize(),
          speed: 1.8 + Math.random() * 0.6,
          turnTimer: 2 + Math.random(),
          wiggleOffset: Math.random() * Math.PI * 2
        };

        fishGroup.position.set(
          randRange(-15, 15),
          -0.5,
          randRange(-15, 10)
        );
        fishGroup.castShadow = true;
        fishGroup.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = false;
          }
        });

        scene.add(fishGroup);
        fish.push(fishObj);
      }
    }

    function clearFish() {
      for (const f of fish) {
        scene.remove(f.mesh);
      }
      fish = [];
    }

    function loadFox() {
      const loader = new GLTFLoader();
      loader.load(
        'Fox.glb',
        (gltf) => {
          fox = gltf.scene;
          fox.position.set(8, 0, 18);
          fox.scale.set(0.04, 0.04, 0.04);
          fox.rotation.y = Math.PI + 0.3;
          fox.traverse(obj => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
            }
          });
          scene.add(fox);

          if (gltf.animations && gltf.animations.length > 0) {
            foxMixer = new THREE.AnimationMixer(fox);
            let clip = gltf.animations.find(a =>
              a.name.toLowerCase().includes('idle') ||
              a.name.toLowerCase().includes('survey')
            ) || gltf.animations[0];
            foxMixer.clipAction(clip).play();
          }

          game.foxLoaded = true;
        },
        undefined,
        (err) => {
          console.warn('Fox.glb failed to load:', err);
          game.foxLoaded = false;
        }
      );
    }

    function setupEvents() {
      window.addEventListener('resize', onResize);
      window.addEventListener('keydown', onKeyDown);
      ui.resetBtn.addEventListener('click', resetGame);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onKeyDown(e) {
      if (game.gameOver) return;
      if (game.phase !== PHASES.AIM) return;

      const moveStep = 1.2;

      if (e.code === 'KeyA') {
        game.bobberX = THREE.MathUtils.clamp(game.bobberX - moveStep, -15, 15);
        updateAimTarget();
      } else if (e.code === 'KeyD') {
        game.bobberX = THREE.MathUtils.clamp(game.bobberX + moveStep, -15, 15);
        updateAimTarget();
      } else if (e.code === 'Space') {
        startCast();
      }
    }

    function updateAimTarget() {
      const player = players[game.activePlayer];
      game.aimTarget.set(game.bobberX, 0.02, 2);
      reticle.position.set(game.bobberX, 0.03, 2);
      player.bobber.position.set(player.home.x, 1.2, player.home.z - 2);
      updatePlayerLine(player);
    }

    function resetBobberTarget() {
      const player = players[game.activePlayer];
      game.bobberX = player.home.x;
      updateAimTarget();
    }

    function startCast() {
      if (game.phase !== PHASES.AIM) return;

      game.phase = PHASES.CAST;
      game.reticleVisible = false;
      reticle.visible = false;

      const player = players[game.activePlayer];
      game.castStart = player.bobber.position.clone();
      game.castEnd = new THREE.Vector3(game.bobberX, 0.2, 2);
      game.castElapsed = 0;
      updateUI();
    }

    function updateCast(dt) {
      const player = players[game.activePlayer];
      game.castElapsed += dt;
      const t = Math.min(game.castElapsed / 1.0, 1);

      const pos = new THREE.Vector3().lerpVectors(game.castStart, game.castEnd, t);
      pos.y += Math.sin(t * Math.PI) * 2.0;
      player.bobber.position.copy(pos);
      updatePlayerLine(player);

      if (t >= 1) {
        player.bobber.position.copy(game.castEnd);
        updatePlayerLine(player);
        startReel();
      }
    }

    function startReel() {
      game.phase = PHASES.REEL;
      game.reelElapsed = 0;
      game.hookedFish = findClosestCatchableFish(players[game.activePlayer].bobber.position);
      if (game.hookedFish) {
        game.lastCatchSize = game.hookedFish.size;
        game.hookedFish.caught = true;
        game.hookedFish.caughtBy = game.activePlayer;
      } else {
        game.lastCatchSize = 0;
        showMessage('No catch!', 1.0);
      }
      updateUI();
    }

    function updateReel(dt) {
      const player = players[game.activePlayer];
      game.reelElapsed += dt;
      const t = Math.min(game.reelElapsed / game.reelDuration, 1);

      const reelStart = game.castEnd.clone();
      const reelEnd = new THREE.Vector3(player.home.x, 1.2, player.home.z - 2);
      const bobberPos = new THREE.Vector3().lerpVectors(reelStart, reelEnd, t);
      bobberPos.y += Math.sin((1 - t) * Math.PI) * 0.4;
      player.bobber.position.copy(bobberPos);
      updatePlayerLine(player);

      if (game.hookedFish) {
        const fishPos = new THREE.Vector3().lerpVectors(reelStart, reelEnd, t);
        fishPos.y = bobberPos.y - 0.2;
        game.hookedFish.mesh.position.copy(fishPos);
        game.hookedFish.mesh.rotation.y += dt * 8;
      }

      if (t >= 1) {
        if (game.hookedFish) {
          if (game.activePlayer === 1) game.p1Score += game.hookedFish.size;
          else game.p2Score += game.hookedFish.size;

          game.fishCaught++;
          scene.remove(game.hookedFish.mesh);
          showMessage(`Player ${game.activePlayer} caught a size ${game.hookedFish.size} fish!`, 1.2);
          game.hookedFish = null;
        }

        endTurn();
      }
    }

    function findClosestCatchableFish(pos) {
      let best = null;
      let bestDist = Infinity;
      for (const f of fish) {
        if (f.caught) continue;
        const d = f.mesh.position.distanceTo(pos);
        if (d <= 3 && d < bestDist) {
          bestDist = d;
          best = f;
        }
      }
      return best;
    }

    function endTurn() {
      if (checkGameEnd()) return;

      game.activePlayer = game.activePlayer === 1 ? 2 : 1;
      game.turn++;

      if (checkGameEnd()) return;

      game.phase = PHASES.AIM;
      game.reticleVisible = true;
      reticle.visible = true;
      setActivePlayerVisuals();
      resetBobberTarget();
      updateUI();
    }

    function checkGameEnd() {
      if (game.fishCaught >= game.fishCount || game.turn >= game.maxTurns) {
        game.phase = PHASES.ENDED;
        game.gameOver = true;
        game.reticleVisible = false;
        reticle.visible = false;

        if (game.p1Score > game.p2Score) game.winner = 1;
        else if (game.p2Score > game.p1Score) game.winner = 2;
        else game.winner = 'tie';

        showWinner();
        updateUI();
        return true;
      }
      return false;
    }

    function showWinner() {
      let text = 'Tie Game!';
      if (game.winner === 1) text = 'Player 1 Wins!';
      if (game.winner === 2) text = 'Player 2 Wins!';

      ui.winnerText.textContent = text;
      ui.winnerSub.textContent = `Final Score — P1: ${game.p1Score} | P2: ${game.p2Score}`;
      ui.winnerOverlay.style.display = 'flex';
    }

    function hideWinner() {
      ui.winnerOverlay.style.display = 'none';
    }

    function showMessage(msg, duration = 1.0) {
      ui.message.textContent = msg;
      game.messageTimer = duration;
    }

    function updateMessages(dt) {
      if (game.messageTimer > 0) {
        game.messageTimer -= dt;
        if (game.messageTimer <= 0) {
          ui.message.textContent = '';
        }
      }
    }

    function setActivePlayerVisuals() {
      [1, 2].forEach(id => {
        const mat = players[id].mesh.material;
        if (id === game.activePlayer && !game.gameOver) {
          mat.emissive.setHex(players[id].color);
          mat.emissiveIntensity = 0.4;
        } else {
          mat.emissive.setHex(0x000000);
          mat.emissiveIntensity = 0.0;
        }
      });
    }

    function updateFish(dt, elapsed) {
      for (const f of fish) {
        if (f.caught) continue;

        f.turnTimer -= dt;
        if (f.turnTimer <= 0) {
          f.turnTimer = 2 + Math.random();
          f.dir.set(Math.random() * 2 - 1, 0, Math.random() * 2 - 1).normalize();
        }

        f.mesh.position.x += f.dir.x * f.speed * dt;
        f.mesh.position.z += f.dir.z * f.speed * dt;
        f.mesh.position.y = -0.5 + Math.sin(elapsed * 4 + f.wiggleOffset) * 0.08;

        if (f.mesh.position.x < -15 || f.mesh.position.x > 15) {
          f.dir.x *= -1;
          f.mesh.position.x = THREE.MathUtils.clamp(f.mesh.position.x, -15, 15);
        }
        if (f.mesh.position.z < -15 || f.mesh.position.z > 10) {
          f.dir.z *= -1;
          f.mesh.position.z = THREE.MathUtils.clamp(f.mesh.position.z, -15, 10);
        }

        f.mesh.rotation.y = Math.atan2(f.dir.x, f.dir.z);
      }
    }

    function updateUI() {
      ui.p1Score.textContent = `Player 1 Score: ${game.p1Score}`;
      ui.p2Score.textContent = `Player 2 Score: ${game.p2Score}`;
      ui.turnInfo.innerHTML = `Turn: ${Math.min(game.turn, game.maxTurns)}/${game.maxTurns}<br>Phase: ${game.phase}`;

      if (game.phase === PHASES.AIM) {
        ui.instructions.textContent = `P${game.activePlayer} AIM: Use A/D to move target, SPACE to cast`;
      } else if (game.phase === PHASES.CAST) {
        ui.instructions.textContent = `P${game.activePlayer} CASTING...`;
      } else if (game.phase === PHASES.REEL) {
        ui.instructions.textContent = `P${game.activePlayer} REELING...`;
      } else {
        ui.instructions.textContent = `Game Over. Press Reset Game to play again.`;
      }

      setActivePlayerVisuals();
    }

    function resetGame() {
      game.activePlayer = 1;
      game.phase = PHASES.AIM;
      game.turn = 1;
      game.p1Score = 0;
      game.p2Score = 0;
      game.bobberX = -5;
      game.fishCaught = 0;
      game.lastCatchSize = 0;
      game.gameOver = false;
      game.winner = 0;
      game.reticleVisible = true;
      game.castStart = null;
      game.castEnd = null;
      game.castElapsed = 0;
      game.reelElapsed = 0;
      game.hookedFish = null;
      game.messageTimer = 0;

      hideWinner();
      ui.message.textContent = '';

      spawnFish();

      for (const id of [1, 2]) {
        const p = players[id];
        p.bobber.position.set(p.home.x, 1.2, p.home.z - 2);
        updatePlayerLine(p);
      }

      reticle.visible = true;
      setActivePlayerVisuals();
      resetBobberTarget();
      updateUI();
    }

    function updateState() {
      window.__3D_STATE__ = {
        activePlayer: game.activePlayer,
        phase: game.phase,
        turn: game.turn,
        p1Score: game.p1Score,
        p2Score: game.p2Score,
        bobberX: game.bobberX,
        fishCount: game.fishCount,
        fishCaught: game.fishCaught,
        lastCatchSize: game.lastCatchSize,
        gameOver: game.gameOver,
        winner: game.winner,
        foxLoaded: game.foxLoaded,
        fishPositions: fish.map(f => ({
          x: Number(f.mesh.position.x.toFixed(2)),
          z: Number(f.mesh.position.z.toFixed(2)),
          caught: f.caught
        })),
        reticleVisible: game.reticleVisible
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const elapsed = clock.elapsedTime;

      if (foxMixer) foxMixer.update(dt);
      updateMessages(dt);
      updateFish(dt, elapsed);

      if (!game.gameOver) {
        if (game.phase === PHASES.AIM) {
          reticle.visible = true;
          game.reticleVisible = true;
          reticle.position.x = game.bobberX;
        } else if (game.phase === PHASES.CAST) {
          updateCast(dt);
        } else if (game.phase === PHASES.REEL) {
          updateReel(dt);
        }
      }

      updateState();
      renderer.render(scene, camera);
    }

    function randRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function randInt(min, max) {
      return Math.floor(randRange(min, max + 1));
    }
  </script>
</body>
</html>
