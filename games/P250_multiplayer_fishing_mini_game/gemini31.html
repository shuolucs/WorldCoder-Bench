<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer 3D Fishing Mini-Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }
        .score-box {
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
        }
        #p1-score { color: #ff5555; }
        #p2-score { color: #5555ff; }
        .center-info {
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
        }
        #turn-info { font-size: 20px; font-weight: bold; }
        #phase-info { font-size: 18px; color: #ffd700; margin-top: 5px; }
        .bottom-bar {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 100%;
            position: relative;
        }
        #instructions {
            font-size: 22px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            border-radius: 30px;
            text-align: center;
        }
        #reset-btn {
            position: absolute;
            right: 0;
            bottom: 0;
            pointer-events: auto;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background: #444;
            color: white;
            border: 2px solid #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #reset-btn:hover { background: #666; }
        #message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            background: rgba(0,0,0,0.8);
            padding: 30px 60px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 4px solid #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        #no-catch-msg {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: bold;
            color: #ff4444;
            opacity: 0;
            transition: opacity 0.2s;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div class="top-bar">
            <div class="score-box" id="p1-score">Player 1 Score: 0</div>
            <div class="center-info">
                <div id="turn-info">Turn: 1/16</div>
                <div id="phase-info">Phase: AIM</div>
            </div>
            <div class="score-box" id="p2-score">Player 2 Score: 0</div>
        </div>
        
        <div id="no-catch-msg">No catch!</div>

        <div class="bottom-bar">
            <div id="instructions">P1: Use A/D to aim, SPACE to cast</div>
            <button id="reset-btn">Reset Game</button>
        </div>
    </div>

    <div id="message-overlay">
        <div id="winner-text">Player 1 Wins!</div>
        <div style="font-size: 24px; margin-top: 10px; color: #aaa;">Click Reset to play again</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        const state = {
            activePlayer: 1,
            phase: 'AIM', // AIM, CAST, REEL, ENDED
            turn: 1,
            p1Score: 0,
            p2Score: 0,
            bobberX: 0,
            fishCount: 8,
            fishCaught: 0,
            lastCatchSize: 0,
            gameOver: false,
            winner: 0,
            foxLoaded: false,
            fishPositions: [],
            reticleVisible: true
        };
        window.__3D_STATE__ = state;

        // --- Scene Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB');

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        scene.add(dirLight);

        // Environment
        const waterGeo = new THREE.PlaneGeometry(40, 40);
        const waterMat = new THREE.MeshPhongMaterial({ 
            color: 0x1a6ea0, 
            opacity: 0.7, 
            transparent: true,
            shininess: 80
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.position.y = 0;
        water.receiveShadow = true;
        scene.add(water);

        const shoreGeo = new THREE.PlaneGeometry(40, 10);
        const shoreMat = new THREE.MeshPhongMaterial({ color: 0x556b2f });
        const shore = new THREE.Mesh(shoreGeo, shoreMat);
        shore.rotation.x = -Math.PI / 2;
        shore.position.set(0, -0.5, 22);
        shore.receiveShadow = true;
        scene.add(shore);

        // --- Fox Mascot ---
        let mixer;
        const gltfLoader = new GLTFLoader();
        gltfLoader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/Fox/glTF-Binary/Fox.glb', (gltf) => {
            const fox = gltf.scene;
            fox.position.set(8, 0, 18);
            fox.scale.set(0.04, 0.04, 0.04);
            fox.rotation.y = Math.PI;
            
            fox.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(fox);
            mixer = new THREE.AnimationMixer(fox);
            if (gltf.animations.length > 0) {
                mixer.clipAction(gltf.animations[0]).play(); // Idle/Survey
            }
            state.foxLoaded = true;
        });

        // --- Players ---
        const p1Mat = new THREE.MeshPhongMaterial({ color: 0xff0000, emissive: 0x550000 });
        const p2Mat = new THREE.MeshPhongMaterial({ color: 0x0000ff, emissive: 0x000000 });
        const capsuleGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);

        const p1 = new THREE.Mesh(capsuleGeo, p1Mat);
        p1.position.set(-5, 0.5, 15);
        p1.castShadow = true;
        scene.add(p1);

        const p2 = new THREE.Mesh(capsuleGeo, p2Mat);
        p2.position.set(5, 0.5, 15);
        p2.castShadow = true;
        scene.add(p2);

        // Fishing Gear
        const bobberGeo = new THREE.SphereGeometry(0.2, 8, 8);
        const bobberMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const bobber = new THREE.Mesh(bobberGeo, bobberMat);
        scene.add(bobber);

        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
        const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const line = new THREE.Line(lineGeo, lineMat);
        scene.add(line);

        const reticleGeo = new THREE.RingGeometry(0.8, 1, 16);
        const reticleMat = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide });
        const reticle = new THREE.Mesh(reticleGeo, reticleMat);
        reticle.rotation.x = -Math.PI / 2;
        reticle.position.y = 0.05;
        scene.add(reticle);

        // --- Fish System ---
        const fishes = [];
        const fishColors = [0xffd700, 0xc0c0c0, 0x00ff00, 0xffa500];
        const fishGeo = new THREE.SphereGeometry(0.3, 16, 8);

        function spawnFish() {
            for (let i = 0; i < 8; i++) {
                const size = Math.floor(Math.random() * 5) + 1;
                const mat = new THREE.MeshPhongMaterial({ color: fishColors[i % 4] });
                const mesh = new THREE.Mesh(fishGeo, mat);
                
                // Make it look like an ellipsoid fish
                mesh.scale.set(1, 0.5, 2);
                const scaleMult = 0.5 + (size * 0.15);
                mesh.scale.multiplyScalar(scaleMult);
                
                mesh.position.set(
                    (Math.random() - 0.5) * 30, // x: -15 to 15
                    -0.5,
                    (Math.random() - 0.5) * 25 - 2.5 // z: -15 to 10
                );
                mesh.castShadow = true;
                scene.add(mesh);

                fishes.push({
                    id: i,
                    mesh: mesh,
                    size: size,
                    caught: false,
                    caughtBy: 0,
                    target: new THREE.Vector3(),
                    timer: 0
                });
            }
        }
        spawnFish();

        // --- Game Logic Variables ---
        let castProgress = 0;
        let reelProgress = 0;
        let hookedFish = null;
        const targetZ = 0; // Fixed casting distance on Z axis

        function getActivePlayerMesh() {
            return state.activePlayer === 1 ? p1 : p2;
        }

        function updatePlayerGlow() {
            if (state.activePlayer === 1) {
                p1Mat.emissive.setHex(0x550000);
                p2Mat.emissive.setHex(0x000000);
            } else {
                p1Mat.emissive.setHex(0x000000);
                p2Mat.emissive.setHex(0x000055);
            }
        }

        function resetBobber() {
            const pMesh = getActivePlayerMesh();
            bobber.position.copy(pMesh.position);
            bobber.position.y += 1; // Top of player
            state.bobberX = pMesh.position.x;
        }

        function startCast() {
            state.phase = 'CAST';
            castProgress = 0;
            state.reticleVisible = false;
            updateUI();
        }

        function startReel() {
            state.phase = 'REEL';
            reelProgress = 0;
            
            // Check for catch
            let closest = null;
            let minD = 3;
            
            fishes.forEach(f => {
                if (f.caught) return;
                const d = Math.hypot(f.mesh.position.x - bobber.position.x, f.mesh.position.z - bobber.position.z);
                if (d < minD) {
                    minD = d;
                    closest = f;
                }
            });

            if (closest) {
                closest.caught = true;
                closest.caughtBy = state.activePlayer;
                hookedFish = closest;
                state.lastCatchSize = closest.size;
            } else {
                state.lastCatchSize = 0;
                showNoCatchMessage();
            }
            updateUI();
        }

        function endTurn() {
            if (hookedFish) {
                if (state.activePlayer === 1) state.p1Score += hookedFish.size;
                else state.p2Score += hookedFish.size;
                state.fishCaught++;
                hookedFish.mesh.visible = false;
                hookedFish = null;
            }

            if (state.activePlayer === 2) {
                state.turn++;
            }
            state.activePlayer = state.activePlayer === 1 ? 2 : 1;

            if (state.turn > 16 || state.fishCaught >= 8) {
                endGame();
            } else {
                state.phase = 'AIM';
                state.reticleVisible = true;
                resetBobber();
                updatePlayerGlow();
                updateUI();
            }
        }

        function endGame() {
            state.phase = 'ENDED';
            state.gameOver = true;
            state.reticleVisible = false;
            
            if (state.p1Score > state.p2Score) state.winner = 1;
            else if (state.p2Score > state.p1Score) state.winner = 2;
            else state.winner = 'tie';

            updateUI();
            
            const overlay = document.getElementById('message-overlay');
            const winnerText = document.getElementById('winner-text');
            overlay.style.display = 'block';
            
            if (state.winner === 'tie') {
                winnerText.innerText = "It's a Tie!";
                winnerText.style.color = "#fff";
            } else {
                winnerText.innerText = `Player ${state.winner} Wins!`;
                winnerText.style.color = state.winner === 1 ? "#ff5555" : "#5555ff";
            }
        }

        function resetGame() {
            state.activePlayer = 1;
            state.phase = 'AIM';
            state.turn = 1;
            state.p1Score = 0;
            state.p2Score = 0;
            state.fishCaught = 0;
            state.gameOver = false;
            state.winner = 0;
            state.reticleVisible = true;

            fishes.forEach(f => {
                f.caught = false;
                f.caughtBy = 0;
                f.mesh.visible = true;
                f.mesh.position.set(
                    (Math.random() - 0.5) * 30,
                    -0.5,
                    (Math.random() - 0.5) * 25 - 2.5
                );
            });

            document.getElementById('message-overlay').style.display = 'none';
            resetBobber();
            updatePlayerGlow();
            updateUI();
        }

        // --- Input ---
        window.addEventListener('keydown', (e) => {
            if (state.gameOver || state.phase !== 'AIM') return;
            
            const speed = 0.5;
            if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') {
                state.bobberX = Math.max(-15, state.bobberX - speed);
            }
            if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') {
                state.bobberX = Math.min(15, state.bobberX + speed);
            }
            if (e.key === ' ') {
                startCast();
            }
        });

        document.getElementById('reset-btn').addEventListener('click', resetGame);

        // --- UI Updates ---
        function updateUI() {
            document.getElementById('p1-score').innerText = `Player 1 Score: ${state.p1Score}`;
            document.getElementById('p2-score').innerText = `Player 2 Score: ${state.p2Score}`;
            document.getElementById('turn-info').innerText = `Turn: ${Math.min(state.turn, 16)}/16`;
            document.getElementById('phase-info').innerText = `Phase: ${state.phase}`;
            
            const inst = document.getElementById('instructions');
            if (state.phase === 'AIM') {
                inst.innerText = `P${state.activePlayer}: Use A/D to aim, SPACE to cast`;
                inst.style.color = state.activePlayer === 1 ? '#ffaaaa' : '#aaaaff';
            } else if (state.phase === 'CAST') {
                inst.innerText = "Casting...";
                inst.style.color = '#fff';
            } else if (state.phase === 'REEL') {
                inst.innerText = hookedFish ? `Hooked a size ${hookedFish.size} fish!` : "Reeling in...";
                inst.style.color = hookedFish ? '#aaffaa' : '#fff';
            } else {
                inst.innerText = "Game Over";
            }
        }

        function showNoCatchMessage() {
            const msg = document.getElementById('no-catch-msg');
            msg.style.opacity = 1;
            setTimeout(() => { msg.style.opacity = 0; }, 1000);
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        resetBobber();
        updatePlayerGlow();
        updateUI();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (mixer) mixer.update(delta);

            const pMesh = getActivePlayerMesh();
            const pTop = pMesh.position.clone();
            pTop.y += 1;

            // Phase Logic
            if (state.phase === 'AIM') {
                reticle.visible = true;
                reticle.position.set(state.bobberX, 0.05, targetZ);
                bobber.position.copy(pTop);
            } else {
                reticle.visible = false;
            }

            if (state.phase === 'CAST') {
                castProgress += delta; // 1 second cast
                if (castProgress >= 1) {
                    castProgress = 1;
                    startReel();
                } else {
                    const start = pTop;
                    const end = new THREE.Vector3(state.bobberX, 0, targetZ);
                    bobber.position.lerpVectors(start, end, castProgress);
                    // Add arc
                    bobber.position.y += Math.sin(castProgress * Math.PI) * 4;
                }
            }

            if (state.phase === 'REEL') {
                reelProgress += delta / 1.5; // 1.5 second reel
                if (reelProgress >= 1) {
                    reelProgress = 1;
                    endTurn();
                } else {
                    const start = new THREE.Vector3(state.bobberX, 0, targetZ);
                    const end = pTop;
                    bobber.position.lerpVectors(start, end, reelProgress);
                    
                    if (hookedFish) {
                        hookedFish.mesh.position.copy(bobber.position);
                        hookedFish.mesh.position.y -= 0.2; // Hang below bobber
                    }
                }
            }

            // Update Line
            if (state.phase !== 'ENDED') {
                const positions = line.geometry.attributes.position.array;
                positions[0] = pTop.x; positions[1] = pTop.y; positions[2] = pTop.z;
                positions[3] = bobber.position.x; positions[4] = bobber.position.y; positions[5] = bobber.position.z;
                line.geometry.attributes.position.needsUpdate = true;
                line.visible = true;
            } else {
                line.visible = false;
                bobber.visible = false;
            }

            // Fish Movement
            state.fishPositions = [];
            fishes.forEach(f => {
                if (!f.caught) {
                    f.timer -= delta;
                    if (f.timer <= 0) {
                        f.target.set(
                            (Math.random() - 0.5) * 30,
                            -0.5,
                            (Math.random() - 0.5) * 25 - 2.5
                        );
                        f.timer = 2 + Math.random();
                    }
                    
                    const dir = new THREE.Vector3().subVectors(f.target, f.mesh.position);
                    if (dir.length() > 0.1) {
                        dir.normalize();
                        f.mesh.position.addScaledVector(dir, 2 * delta);
                        
                        // Smooth rotation
                        const targetRotation = Math.atan2(dir.x, dir.z);
                        let diff = targetRotation - f.mesh.rotation.y;
                        // Normalize diff to -PI to PI
                        diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                        f.mesh.rotation.y += diff * delta * 5;
                    }
                }
                
                state.fishPositions.push({
                    x: f.mesh.position.x,
                    z: f.mesh.position.z,
                    caught: f.caught
                });
            });

            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
