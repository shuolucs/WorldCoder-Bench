<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Print Slicer Visualization</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.55);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 280px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    #ui h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .control-group {
      margin-bottom: 10px;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .control-group input[type="range"] {
      width: 100%;
    }

    #hud {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.55);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 220px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 1.6;
    }

    #help {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.55);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      backdrop-filter: blur(4px);
    }

    .value {
      color: #8fd3ff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>3D Slicer Controls</h2>

      <div class="control-group">
        <label for="slider-height">Slice Height</label>
        <input id="slider-height" type="range" min="0" max="1" step="0.01" value="0.5" />
      </div>

      <div class="control-group">
        <label for="slider-layer-height">Layer Height</label>
        <input id="slider-layer-height" type="range" min="0.05" max="0.5" step="0.01" value="0.2" />
      </div>
    </div>

    <div id="hud">
      <div>Slice height: <span id="hud-height" class="value">0.00</span></div>
      <div>Layer number: <span id="hud-layer" class="value">0</span></div>
      <div>Total layers: <span id="hud-layers" class="value">0</span></div>
      <div>Layer height: <span id="hud-lh" class="value">0.20</span></div>
      <div>Model loaded: <span id="hud-model" class="value">No</span></div>
      <div>Mode: <span id="hud-mode" class="value">Slice</span></div>
    </div>

    <div id="help">
      <div><b>A</b> animate slice</div>
      <div><b>S</b> stop animation</div>
      <div><b>T</b> toggle Slice / Solid mode</div>
      <div><b>R</b> reset slice to bottom</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const sliderHeight = document.getElementById('slider-height');
    const sliderLayerHeight = document.getElementById('slider-layer-height');

    const hudHeight = document.getElementById('hud-height');
    const hudLayer = document.getElementById('hud-layer');
    const hudLayers = document.getElementById('hud-layers');
    const hudLh = document.getElementById('hud-lh');
    const hudModel = document.getElementById('hud-model');
    const hudMode = document.getElementById('hud-mode');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(5, 5, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.localClippingEnabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    const ambientLight = new THREE.AmbientLight(0x556677, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(6, 20, 0x666688, 0x444466);
    grid.position.y = 0;
    scene.add(grid);

    const planeGeom = new THREE.PlaneGeometry(10, 10);
    const planeMat = new THREE.MeshBasicMaterial({
      color: 0x4488ff,
      transparent: true,
      opacity: 0.2,
      side: THREE.DoubleSide,
      depthWrite: false
    });
    const cuttingPlaneMesh = new THREE.Mesh(planeGeom, planeMat);
    cuttingPlaneMesh.rotation.x = -Math.PI / 2;
    scene.add(cuttingPlaneMesh);

    const layerStackGroup = new THREE.Group();
    scene.add(layerStackGroup);

    const modelRoot = new THREE.Group();
    scene.add(modelRoot);

    let model = null;
    let modelLoaded = false;
    let modelMinY = 0;
    let modelMaxY = 1;
    let sliceHeight = 0.5;
    let layerHeight = parseFloat(sliderLayerHeight.value);
    let isSliceMode = true;
    let isAnimating = false;
    let animationStartTime = 0;
    let animationDuration = 5000;
    let frameCount = 0;

    const visibleClipPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);
    const slicePlaneTop = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);
    const slicePlaneBottom = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

    const originalMaterials = new Map();
    const transparentMaterials = new Map();
    const sliceMaterials = new Map();
    const lineMaterialPool = [];

    function roundTo(value, digits = 3) {
      const p = Math.pow(10, digits);
      return Math.round(value * p) / p;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function updatePlaneConstants() {
      visibleClipPlane.constant = sliceHeight;
      slicePlaneTop.constant = sliceHeight + 0.02;
      slicePlaneBottom.constant = -(sliceHeight - 0.02);
      cuttingPlaneMesh.position.y = sliceHeight;
    }

    function setModelMaterialsForMode() {
      if (!model) return;

      model.traverse((obj) => {
        if (!obj.isMesh) return;

        if (isSliceMode) {
          obj.material = transparentMaterials.get(obj);
          obj.renderOrder = 1;
        } else {
          obj.material = originalMaterials.get(obj);
          obj.renderOrder = 1;
        }
      });
    }

    function clearLayerStack() {
      while (layerStackGroup.children.length > 0) {
        const child = layerStackGroup.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      }
    }

    function createSliceBandAtY(y, color = 0xffaa33, thickness = 0.012, opacity = 0.55) {
      if (!model) return null;

      const group = new THREE.Group();

      model.traverse((obj) => {
        if (!obj.isMesh || !obj.geometry) return;

        const geom = obj.geometry;
        const edges = new THREE.EdgesGeometry(geom, 20);
        const mat = new THREE.LineBasicMaterial({
          color,
          transparent: true,
          opacity,
          clippingPlanes: [
            new THREE.Plane(new THREE.Vector3(0, -1, 0), y + thickness),
            new THREE.Plane(new THREE.Vector3(0, 1, 0), -(y - thickness))
          ],
          clipIntersection: true
        });

        const lines = new THREE.LineSegments(edges, mat);
        lines.position.copy(obj.position);
        lines.quaternion.copy(obj.quaternion);
        lines.scale.copy(obj.scale);
        lines.renderOrder = 3;
        group.add(lines);
      });

      return group;
    }

    function rebuildLayerStack() {
      clearLayerStack();
      if (!modelLoaded || !isSliceMode) return;

      const total = Math.max(0, Math.floor((sliceHeight - modelMinY) / layerHeight));
      for (let i = 0; i <= total; i++) {
        const y = modelMinY + i * layerHeight;
        if (y > sliceHeight + 1e-6 || y > modelMaxY + 1e-6) break;
        const band = createSliceBandAtY(y, 0xffaa33, 0.008, 0.22);
        if (band) layerStackGroup.add(band);
      }
    }

    function updateHUD() {
      const totalLayers = modelLoaded ? Math.max(1, Math.floor((modelMaxY - modelMinY) / layerHeight) + 1) : 0;
      const layerNumber = modelLoaded ? Math.floor((sliceHeight - modelMinY) / layerHeight) + 1 : 0;

      hudHeight.textContent = modelLoaded ? sliceHeight.toFixed(2) : '0.00';
      hudLayer.textContent = modelLoaded ? Math.max(1, layerNumber) : '0';
      hudLayers.textContent = totalLayers;
      hudLh.textContent = layerHeight.toFixed(2);
      hudModel.textContent = modelLoaded ? 'Yes' : 'No';
      hudMode.textContent = isSliceMode ? 'Slice' : 'Solid';
    }

    function updateState() {
      const totalLayers = modelLoaded ? Math.max(1, Math.floor((modelMaxY - modelMinY) / layerHeight) + 1) : 0;
      const layerNumber = modelLoaded ? Math.floor((sliceHeight - modelMinY) / layerHeight) + 1 : 0;
      const sliceValid = modelLoaded ? (sliceHeight >= modelMinY && sliceHeight <= modelMaxY) : false;

      window.__3D_STATE__ = {
        sliceHeight: roundTo(sliceHeight, 3),
        layerNumber: modelLoaded ? Math.max(1, layerNumber) : 0,
        totalLayers,
        layerHeight: roundTo(layerHeight, 3),
        modelLoaded,
        isSliceMode,
        isAnimating,
        modelMinY: roundTo(modelMinY, 3),
        modelMaxY: roundTo(modelMaxY, 3),
        frameCount,
        sliceValid
      };
    }

    function updateSliderFromSlice() {
      sliderHeight.value = sliceHeight.toString();
    }

    function updateSliceVisuals() {
      updatePlaneConstants();
      rebuildLayerStack();
      updateHUD();
    }

    function normalizeModel(root) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const scale = 3 / maxDim;
      root.scale.setScalar(scale);

      const scaledBox = new THREE.Box3().setFromObject(root);
      const scaledCenter = new THREE.Vector3();
      const scaledSize = new THREE.Vector3();
      scaledBox.getCenter(scaledCenter);
      scaledBox.getSize(scaledSize);

      root.position.x -= scaledCenter.x;
      root.position.z -= scaledCenter.z;

      const boxAfterXZ = new THREE.Box3().setFromObject(root);
      root.position.y -= boxAfterXZ.min.y;

      const finalBox = new THREE.Box3().setFromObject(root);
      modelMinY = finalBox.min.y;
      modelMaxY = finalBox.max.y;

      sliderHeight.min = modelMinY.toString();
      sliderHeight.max = modelMaxY.toString();
      sliceHeight = modelMinY + (modelMaxY - modelMinY) * 0.5;
      sliderHeight.value = sliceHeight.toString();
    }

    function prepareModelMaterials(root) {
      root.traverse((obj) => {
        if (!obj.isMesh) return;

        let baseMat;
        if (Array.isArray(obj.material)) {
          baseMat = obj.material[0].clone();
        } else {
          baseMat = obj.material ? obj.material.clone() : new THREE.MeshStandardMaterial({ color: 0xcccccc });
        }

        baseMat.clippingPlanes = [];
        baseMat.clipShadows = true;
        originalMaterials.set(obj, baseMat);

        const transparentMat = baseMat.clone();
        transparentMat.transparent = true;
        transparentMat.opacity = 0.3;
        transparentMat.depthWrite = false;
        transparentMat.side = THREE.DoubleSide;
        transparentMat.clippingPlanes = [];
        transparentMaterials.set(obj, transparentMat);

        const sliceMat = new THREE.MeshBasicMaterial({
          color: 0xff4444,
          transparent: true,
          opacity: 1.0,
          side: THREE.DoubleSide,
          clippingPlanes: [slicePlaneTop, slicePlaneBottom],
          clipIntersection: true,
          depthWrite: false
        });
        sliceMaterials.set(obj, sliceMat);

        obj.castShadow = false;
        obj.receiveShadow = false;
      });
    }

    function loadModel() {
      const loader = new GLTFLoader();
      loader.load(
        'Duck.glb',
        (gltf) => {
          model = gltf.scene;
          modelRoot.add(model);

          normalizeModel(model);
          prepareModelMaterials(model);
          setModelMaterialsForMode();

          modelLoaded = true;
          controls.target.set(0, (modelMaxY - modelMinY) * 0.5, 0);
          controls.update();

          updateSliceVisuals();
          updateState();
        },
        undefined,
        (err) => {
          console.error('Failed to load Duck.glb:', err);
        }
      );
    }

    sliderHeight.addEventListener('input', () => {
      if (!modelLoaded) return;
      sliceHeight = clamp(parseFloat(sliderHeight.value), modelMinY, modelMaxY);
      isAnimating = false;
      updateSliceVisuals();
    });

    sliderLayerHeight.addEventListener('input', () => {
      layerHeight = parseFloat(sliderLayerHeight.value);
      updateSliceVisuals();
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'a' && modelLoaded) {
        isAnimating = true;
        animationStartTime = performance.now() - ((sliceHeight - modelMinY) / Math.max(0.0001, (modelMaxY - modelMinY))) * animationDuration;
      }

      if (key === 's') {
        isAnimating = false;
      }

      if (key === 't') {
        isSliceMode = !isSliceMode;
        setModelMaterialsForMode();
        cuttingPlaneMesh.visible = isSliceMode;
        if (!isSliceMode) clearLayerStack();
        else rebuildLayerStack();
        updateHUD();
      }

      if (key === 'r' && modelLoaded) {
        isAnimating = false;
        sliceHeight = modelMinY;
        updateSliderFromSlice();
        updateSliceVisuals();
      }
    });

    function renderModelSlicePass() {
      if (!model || !isSliceMode) return;

      model.traverse((obj) => {
        if (!obj.isMesh) return;
        obj.material = transparentMaterials.get(obj);
      });

      renderer.clippingPlanes = [visibleClipPlane];
      renderer.render(scene, camera);

      model.traverse((obj) => {
        if (!obj.isMesh) return;
        obj.material = sliceMaterials.get(obj);
        obj.renderOrder = 4;
      });

      renderer.clippingPlanes = [];
      renderer.render(scene, camera);

      model.traverse((obj) => {
        if (!obj.isMesh) return;
        obj.material = transparentMaterials.get(obj);
        obj.renderOrder = 1;
      });
    }

    function renderSolidPass() {
      if (!model) {
        renderer.clippingPlanes = [];
        renderer.render(scene, camera);
        return;
      }

      model.traverse((obj) => {
        if (!obj.isMesh) return;
        obj.material = originalMaterials.get(obj);
      });

      renderer.clippingPlanes = [];
      renderer.render(scene, camera);
    }

    function animate(now) {
      requestAnimationFrame(animate);
      frameCount++;

      controls.update();

      if (modelLoaded && isAnimating) {
        const t = clamp((now - animationStartTime) / animationDuration, 0, 1);
        sliceHeight = THREE.MathUtils.lerp(modelMinY, modelMaxY, t);
        updateSliderFromSlice();
        updateSliceVisuals();
        if (t >= 1) isAnimating = false;
      }

      updateState();

      renderer.clear();
      if (isSliceMode) {
        renderModelSlicePass();
      } else {
        renderSolidPass();
      }
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    cuttingPlaneMesh.visible = true;
    updateHUD();
    updateState();
    loadModel();
    animate();
  </script>
</body>
</html>
