<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Print Slicer Visualization</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(68, 136, 255, 0.4);
    border-radius: 8px;
    padding: 15px 20px;
    color: #c0d0e0;
    font-size: 13px;
    line-height: 1.8;
    min-width: 240px;
    backdrop-filter: blur(5px);
}

#hud .title {
    color: #4488ff;
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(68, 136, 255, 0.3);
    padding-bottom: 6px;
}

#hud .label { color: #8899aa; }
#hud .value { color: #ffffff; float: right; }

#controls {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(68, 136, 255, 0.4);
    border-radius: 8px;
    padding: 15px 25px;
    color: #c0d0e0;
    font-size: 12px;
    backdrop-filter: blur(5px);
    display: flex;
    gap: 30px;
    align-items: center;
}

#controls .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

#controls label { color: #8899aa; font-size: 11px; }

input[type="range"] {
    -webkit-appearance: none;
    width: 200px;
    height: 6px;
    background: rgba(68, 136, 255, 0.3);
    border-radius: 3px;
    outline: none;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: #4488ff;
    border-radius: 50%;
    cursor: pointer;
}

#keys-help {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(68, 136, 255, 0.4);
    border-radius: 8px;
    padding: 12px 16px;
    color: #8899aa;
    font-size: 11px;
    line-height: 2;
    backdrop-filter: blur(5px);
}

#keys-help kbd {
    background: rgba(68, 136, 255, 0.2);
    border: 1px solid rgba(68, 136, 255, 0.4);
    border-radius: 3px;
    padding: 1px 6px;
    color: #4488ff;
    font-family: 'Courier New', monospace;
}
</style>
</head>
<body>

<div id="hud">
    <div class="title">🔧 Slicer Info</div>
    <div><span class="label">Slice Height:</span> <span class="value" id="hud-height">0.00</span></div>
    <div><span class="label">Layer:</span> <span class="value" id="hud-layer">0</span></div>
    <div><span class="label">Total Layers:</span> <span class="value" id="hud-layers">0</span></div>
    <div><span class="label">Layer Height:</span> <span class="value" id="hud-lh">0.20</span></div>
    <div><span class="label">Model Loaded:</span> <span class="value" id="hud-model">No</span></div>
    <div><span class="label">Mode:</span> <span class="value" id="hud-mode">Slice</span></div>
</div>

<div id="keys-help">
    <kbd>A</kbd> Animate slice<br>
    <kbd>S</kbd> Stop animation<br>
    <kbd>T</kbd> Toggle mode<br>
    <kbd>R</kbd> Reset to bottom
</div>

<div id="controls">
    <div class="control-group">
        <label>Slice Height</label>
        <input type="range" id="slider-height" min="0" max="3" step="0.01" value="1.5">
    </div>
    <div class="control-group">
        <label>Layer Height</label>
        <input type="range" id="slider-layer-height" min="0.05" max="0.5" step="0.01" value="0.2">
    </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
let modelLoaded = false;
let isSliceMode = true;
let isAnimating = false;
let modelMinY = 0;
let modelMaxY = 3;
let frameCount = 0;
let animStartTime = 0;
let loadedModel = null;
let modelMeshes = [];
let originalMaterials = new Map();

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(5, 5, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.localClippingEnabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0x556677, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
scene.add(directionalLight);

// Grid
const gridHelper = new THREE.GridHelper(6, 20);
gridHelper.position.y = 0;
scene.add(gridHelper);

// Cutting plane visual
const planeGeometry = new THREE.PlaneGeometry(10, 10);
const planeMaterial = new THREE.MeshBasicMaterial({
    color: 0x4488ff,
    transparent: true,
    opacity: 0.2,
    side: THREE.DoubleSide,
    depthWrite: false
});
const cuttingPlane = new THREE.Mesh(planeGeometry, planeMaterial);
cuttingPlane.rotation.x = -Math.PI / 2;
cuttingPlane.position.y = 1.5;
scene.add(cuttingPlane);

// Clipping planes
const clipPlaneAbove = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);
const clipPlaneBelow = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

// Cross-section group for the thin slice highlight
let crossSectionGroup = new THREE.Group();
scene.add(crossSectionGroup);

// Layer stack group
let layerStackGroup = new THREE.Group();
scene.add(layerStackGroup);

// Sliders
const sliderHeight = document.getElementById('slider-height');
const sliderLayerHeight = document.getElementById('slider-layer-height');

// HUD elements
const hudHeight = document.getElementById('hud-height');
const hudLayer = document.getElementById('hud-layer');
const hudLayers = document.getElementById('hud-layers');
const hudLH = document.getElementById('hud-lh');
const hudModel = document.getElementById('hud-model');
const hudMode = document.getElementById('hud-mode');

// State object
window.__3D_STATE__ = {
    sliceHeight: 1.5,
    layerNumber: 0,
    totalLayers: 0,
    layerHeight: 0.2,
    modelLoaded: false,
    isSliceMode: true,
    isAnimating: false,
    modelMinY: 0,
    modelMaxY: 3,
    frameCount: 0,
    sliceValid: false
};

// Create a demo model (box + cylinder) as fallback
function createDemoModel() {
    const group = new THREE.Group();

    // Base box
    const boxGeo = new THREE.BoxGeometry(1.5, 1.0, 1.5);
    const boxMat = new THREE.MeshPhongMaterial({ color: 0xffaa00 });
    const box = new THREE.Mesh(boxGeo, boxMat);
    box.position.y = 0.5;
    group.add(box);

    // Cylinder on top
    const cylGeo = new THREE.CylinderGeometry(0.4, 0.6, 1.2, 32);
    const cylMat = new THREE.MeshPhongMaterial({ color: 0xff6600 });
    const cyl = new THREE.Mesh(cylGeo, cylMat);
    cyl.position.y = 1.6;
    group.add(cyl);

    // Sphere on top
    const sphereGeo = new THREE.SphereGeometry(0.35, 32, 32);
    const sphereMat = new THREE.MeshPhongMaterial({ color: 0xff4400 });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    sphere.position.y = 2.55;
    group.add(sphere);

    // Torus ring
    const torusGeo = new THREE.TorusGeometry(0.7, 0.1, 16, 32);
    const torusMat = new THREE.MeshPhongMaterial({ color: 0xffcc00 });
    const torus = new THREE.Mesh(torusGeo, torusMat);
    torus.position.y = 1.0;
    torus.rotation.x = Math.PI / 2;
    group.add(torus);

    return group;
}

function normalizeModel(object) {
    const box = new THREE.Box3().setFromObject(object);
    const size = new THREE.Vector3();
    const center = new THREE.Vector3();
    box.getSize(size);
    box.getCenter(center);

    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 3 / maxDim;

    object.scale.multiplyScalar(scale);
    
    // Recompute after scale
    const box2 = new THREE.Box3().setFromObject(object);
    const center2 = new THREE.Vector3();
    const size2 = new THREE.Vector3();
    box2.getCenter(center2);
    box2.getSize(size2);

    object.position.x -= center2.x;
    object.position.z -= center2.z;
    object.position.y -= box2.min.y;

    // Final bounding box
    const finalBox = new THREE.Box3().setFromObject(object);
    modelMinY = parseFloat(finalBox.min.y.toFixed(3));
    modelMaxY = parseFloat(finalBox.max.y.toFixed(3));

    // Update slider
    sliderHeight.min = modelMinY;
    sliderHeight.max = modelMaxY;
    sliderHeight.value = (modelMinY + modelMaxY) / 2;
}

function setupModelMeshes(object) {
    modelMeshes = [];
    originalMaterials.clear();

    object.traverse((child) => {
        if (child.isMesh) {
            modelMeshes.push(child);
            originalMaterials.set(child, child.material.clone());
        }
    });
}

function setModelTransparent(transparent) {
    modelMeshes.forEach((mesh) => {
        if (transparent) {
            const origMat = originalMaterials.get(mesh);
            const newMat = origMat.clone();
            newMat.transparent = true;
            newMat.opacity = 0.3;
            newMat.depthWrite = false;
            newMat.clippingPlanes = [];
            mesh.material = newMat;
        } else {
            const origMat = originalMaterials.get(mesh);
            mesh.material = origMat.clone();
            mesh.material.clippingPlanes = [];
        }
    });
}

function createCrossSectionMeshes(sliceY) {
    // Clear previous
    while (crossSectionGroup.children.length > 0) {
        const child = crossSectionGroup.children[0];
        crossSectionGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
    }

    if (!loadedModel || !isSliceMode) return;

    const thickness = 0.02;
    const clipAbove = new THREE.Plane(new THREE.Vector3(0, -1, 0), sliceY + thickness);
    const clipBelow = new THREE.Plane(new THREE.Vector3(0, 1, 0), -(sliceY - thickness));

    modelMeshes.forEach((mesh) => {
        const geo = mesh.geometry.clone();
        const mat = new THREE.MeshBasicMaterial({
            color: 0xff4444,
            opacity: 1.0,
            transparent: false,
            clippingPlanes: [clipAbove, clipBelow],
            clipIntersection: false,
            side: THREE.DoubleSide
        });

        const crossMesh = new THREE.Mesh(geo, mat);
        
        // Copy world transform
        mesh.updateWorldMatrix(true, false);
        crossMesh.applyMatrix4(mesh.matrixWorld);
        
        crossSectionGroup.add(crossMesh);
    });
}

function createLayerStack(sliceY, layerHeight) {
    // Clear previous
    while (layerStackGroup.children.length > 0) {
        const child = layerStackGroup.children[0];
        layerStackGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
    }

    if (!loadedModel || !isSliceMode) return;

    const thickness = 0.005;

    // Show layers below current slice
    for (let y = modelMinY + layerHeight; y < sliceY - layerHeight * 0.5; y += layerHeight) {
        const clipAbove = new THREE.Plane(new THREE.Vector3(0, -1, 0), y + thickness);
        const clipBelow = new THREE.Plane(new THREE.Vector3(0, 1, 0), -(y - thickness));

        // Calculate color based on height (gradient from blue to green)
        const t = (y - modelMinY) / (modelMaxY - modelMinY);
        const color = new THREE.Color().setHSL(0.55 - t * 0.25, 0.8, 0.5);

        modelMeshes.forEach((mesh) => {
            const geo = mesh.geometry.clone();
            const mat = new THREE.MeshBasicMaterial({
                color: color,
                opacity: 0.6,
                transparent: true,
                clippingPlanes: [clipAbove, clipBelow],
                clipIntersection: false,
                side: THREE.DoubleSide,
                depthWrite: false
            });

            const layerMesh = new THREE.Mesh(geo, mat);
            mesh.updateWorldMatrix(true, false);
            layerMesh.applyMatrix4(mesh.matrixWorld);
            layerStackGroup.add(layerMesh);
        });
    }
}

// Load GLB model
const loader = new GLTFLoader();
loader.load('Duck.glb', (gltf) => {
    loadedModel = gltf.scene;
    normalizeModel(loadedModel);
    setupModelMeshes(loadedModel);
    scene.add(loadedModel);
    modelLoaded = true;

    if (isSliceMode) {
        setModelTransparent(true);
    }

    const currentHeight = parseFloat(sliderHeight.value);
    createCrossSectionMeshes(currentHeight);
    createLayerStack(currentHeight, parseFloat(sliderLayerHeight.value));
}, undefined, (error) => {
    console.warn('Could not load Duck.glb, using demo model:', error);
    loadedModel = createDemoModel();
    normalizeModel(loadedModel);
    setupModelMeshes(loadedModel);
    scene.add(loadedModel);
    modelLoaded = true;

    if (isSliceMode) {
        setModelTransparent(true);
    }

    const currentHeight = parseFloat(sliderHeight.value);
    createCrossSectionMeshes(currentHeight);
    createLayerStack(currentHeight, parseFloat(sliderLayerHeight.value));
});

// Slider events
let needsSliceUpdate = true;

sliderHeight.addEventListener('input', () => {
    needsSliceUpdate = true;
    if (isAnimating) {
        isAnimating = false;
    }
});

sliderLayerHeight.addEventListener('input', () => {
    needsSliceUpdate = true;
});

// Keyboard events
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    
    if (key === 'a') {
        isAnimating = true;
        animStartTime = performance.now();
        // Start from current position or bottom
        sliderHeight.value = modelMinY;
        needsSliceUpdate = true;
    } else if (key === 's') {
        isAnimating = false;
    } else if (key === 't') {
        isSliceMode = !isSliceMode;
        if (loadedModel) {
            if (isSliceMode) {
                setModelTransparent(true);
                cuttingPlane.visible = true;
                needsSliceUpdate = true;
            } else {
                setModelTransparent(false);
                cuttingPlane.visible = false;
                // Clear cross section and layers
                while (crossSectionGroup.children.length > 0) {
                    const child = crossSectionGroup.children[0];
                    crossSectionGroup.remove(child);
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                }
                while (layerStackGroup.children.length > 0) {
                    const child = layerStackGroup.children[0];
                    layerStackGroup.remove(child);
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                }
            }
        }
    } else if (key === 'r') {
        isAnimating = false;
        sliderHeight.value = modelMinY;
        needsSliceUpdate = true;
    }
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Throttle expensive operations
let lastSliceUpdate = 0;
const SLICE_UPDATE_INTERVAL = 50; // ms

// Animation loop
function animate(time) {
    requestAnimationFrame(animate);
    frameCount++;

    const layerHeight = parseFloat(sliderLayerHeight.value);

    // Handle animation
    if (isAnimating) {
        const elapsed = (time - animStartTime) / 1000;
        const duration = 5;
        const t = Math.min(elapsed / duration, 1);
        const currentY = modelMinY + t * (modelMaxY - modelMinY);
        sliderHeight.value = currentY;
        needsSliceUpdate = true;

        if (t >= 1) {
            isAnimating = false;
        }
    }

    const sliceY = parseFloat(sliderHeight.value);

    // Update cutting plane position
    cuttingPlane.position.y = sliceY;

    // Update cross-section and layers (throttled)
    if (needsSliceUpdate && modelLoaded && isSliceMode) {
        const now = performance.now();
        if (now - lastSliceUpdate > SLICE_UPDATE_INTERVAL) {
            createCrossSectionMeshes(sliceY);
            createLayerStack(sliceY, layerHeight);
            lastSliceUpdate = now;
            needsSliceUpdate = false;
        }
    }

    // Compute HUD values
    const currentLayerNumber = Math.max(1, Math.floor((sliceY - modelMinY) / layerHeight) + 1);
    const totalLayers = Math.max(1, Math.ceil((modelMaxY - modelMinY) / layerHeight));
    const sliceValid = sliceY >= modelMinY && sliceY <= modelMaxY;

    // Update HUD
    hudHeight.textContent = sliceY.toFixed(2);
    hudLayer.textContent = currentLayerNumber;
    hudLayers.textContent = totalLayers;
    hudLH.textContent = layerHeight.toFixed(2);
    hudModel.textContent = modelLoaded ? 'Yes' : 'No';
    hudMode.textContent = isSliceMode ? 'Slice' : 'Solid';

    // Update state
    window.__3D_STATE__ = {
        sliceHeight: parseFloat(sliceY.toFixed(3)),
        layerNumber: currentLayerNumber,
        totalLayers: totalLayers,
        layerHeight: layerHeight,
        modelLoaded: modelLoaded,
        isSliceMode: isSliceMode,
        isAnimating: isAnimating,
        modelMinY: parseFloat(modelMinY.toFixed(3)),
        modelMaxY: parseFloat(modelMaxY.toFixed(3)),
        frameCount: frameCount,
        sliceValid: sliceValid
    };

    controls.update();
    renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
