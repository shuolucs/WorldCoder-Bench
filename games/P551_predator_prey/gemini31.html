<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Predator-Prey Ecosystem</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #88bbdd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .overlay {
            position: absolute;
            background: rgba(20, 30, 40, 0.85);
            color: #eee;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #hud {
            top: 15px;
            left: 15px;
            pointer-events: none;
            min-width: 180px;
        }
        #controls {
            top: 15px;
            right: 15px;
        }
        h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #fff;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .stat-value {
            font-weight: bold;
            color: #4da6ff;
        }
        .control-group {
            margin-top: 15px;
        }
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        input[type=range] {
            width: 100px;
            margin: 0 10px;
        }
        .instructions {
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
            margin-top: 10px;
        }
        kbd {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            color: #fff;
            font-family: monospace;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 20px;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud" class="overlay">
        <h3>Ecosystem Status</h3>
        <div class="stat-row"><span>Foxes:</span> <span id="hud-foxes" class="stat-value">0</span></div>
        <div class="stat-row"><span>Storks:</span> <span id="hud-storks" class="stat-value">0</span></div>
        <div class="stat-row"><span>Catches:</span> <span id="hud-catches" class="stat-value">0</span></div>
        <div class="stat-row"><span>Births:</span> <span id="hud-births" class="stat-value">0</span></div>
        <div class="stat-row"><span>Deaths:</span> <span id="hud-deaths" class="stat-value">0</span></div>
        <div class="stat-row"><span>Models Loaded:</span> <span id="hud-models" class="stat-value" style="color:#ff6666">No</span></div>
    </div>

    <div id="controls" class="overlay">
        <h3>Simulation Controls</h3>
        <div class="control-group">
            <div class="control-row">
                <label>Fox Speed</label>
                <input type="range" id="slider-fox-speed" min="1" max="8" step="0.5" value="4">
                <span id="val-fox-speed">4.0</span>
            </div>
            <div class="control-row">
                <label>Stork Speed</label>
                <input type="range" id="slider-stork-speed" min="1" max="6" step="0.5" value="3">
                <span id="val-stork-speed">3.0</span>
            </div>
        </div>
        <div class="instructions">
            <kbd>Space</kbd> Pause / Play<br>
            <kbd>R</kbd> Reset Ecosystem<br>
            <kbd>F</kbd> Spawn 1 Fox<br>
            <kbd>S</kbd> Spawn 5 Storks
        </div>
    </div>

    <div id="loading">Loading Models...</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            foxCount: 0,
            storkCount: 0,
            totalCatches: 0,
            totalBirths: 0,
            totalDeaths: 0,
            modelsLoaded: false,
            isPaused: false,
            foxSpeed: 4,
            storkSpeed: 3,
            frameCount: 0,
            animalsValid: true,
            avgFoxEnergy: 0,
            avgStorkEnergy: 0
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x88bbdd);
        scene.fog = new THREE.FogExp2(0x88bbdd, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 35);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x668877, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(10, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 30;
        dirLight.shadow.camera.bottom = -30;
        dirLight.shadow.camera.left = -30;
        dirLight.shadow.camera.right = 30;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Environment ---
        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x44aa44 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Ground Texture
        const texLoader = new THREE.TextureLoader();
        texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/brick_diffuse.jpg', (texture) => {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(8, 8);
            groundMat.map = texture;
            groundMat.needsUpdate = true;
        });

        // Procedural Trees
        const treeTrunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 1, 8);
        const treeTopGeo = new THREE.ConeGeometry(1.2, 2.5, 8);
        const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5c4033 });
        const topMat = new THREE.MeshLambertMaterial({ color: 0x2d5a27 });

        for (let i = 0; i < 20; i++) {
            const h = 1.5 + Math.random() * 1.5;
            const x = (Math.random() - 0.5) * 46;
            const z = (Math.random() - 0.5) * 46;

            const trunk = new THREE.Mesh(treeTrunkGeo, trunkMat);
            trunk.scale.y = h;
            trunk.position.set(x, h / 2, z);
            trunk.castShadow = true;
            trunk.receiveShadow = true;

            const top = new THREE.Mesh(treeTopGeo, topMat);
            top.position.set(x, h + 1.25, z);
            top.castShadow = true;
            top.receiveShadow = true;

            scene.add(trunk);
            scene.add(top);
        }

        // Food Patches
        const foodPatches = [];
        const patchGeo = new THREE.CircleGeometry(1.5, 16);
        const patchMat = new THREE.MeshBasicMaterial({ color: 0x66ff66, transparent: true, opacity: 0.4, depthWrite: false });
        for (let i = 0; i < 10; i++) {
            const patch = new THREE.Mesh(patchGeo, patchMat);
            patch.rotation.x = -Math.PI / 2;
            patch.position.set((Math.random() - 0.5) * 40, 0.02, (Math.random() - 0.5) * 40);
            scene.add(patch);
            foodPatches.push(patch.position);
        }

        // --- Ecosystem Logic ---
        let foxes = [];
        let storks = [];
        let foxBaseModel = null;
        let storkBaseModel = null;

        class Animal {
            constructor(type, position) {
                this.type = type;
                this.position = position.clone();
                this.position.y = 0;
                this.velocity = new THREE.Vector3((Math.random() - 0.5) * 2, 0, (Math.random() - 0.5) * 2).normalize();
                this.acceleration = new THREE.Vector3();
                
                this.maxSpeed = type === 'fox' ? state.foxSpeed : state.storkSpeed;
                this.maxForce = type === 'fox' ? 6.0 : 8.0;
                this.energy = type === 'fox' ? 60 : 80;
                this.wanderTheta = Math.random() * Math.PI * 2;

                // Setup Mesh
                this.group = new THREE.Group();
                this.group.position.copy(this.position);
                
                let baseData = type === 'fox' ? foxBaseModel : storkBaseModel;
                let clonedScene = SkeletonUtils.clone(baseData.scene);
                
                // Models usually face +Z, lookAt uses -Z. Rotate 180 deg to fix backwards walking.
                clonedScene.rotation.y = Math.PI;
                
                this.group.add(clonedScene);
                scene.add(this.group);

                // Setup Animation
                this.mixer = new THREE.AnimationMixer(clonedScene);
                if (baseData.animations && baseData.animations.length > 0) {
                    // Fox: 0:Survey, 1:Walk, 2:Run. Stork: 0:Fly
                    let animIndex = type === 'fox' ? 1 : 0;
                    if (!baseData.animations[animIndex]) animIndex = 0;
                    this.action = this.mixer.clipAction(baseData.animations[animIndex]);
                    this.action.play();
                }
            }

            applyForce(force) {
                this.acceleration.add(force);
            }

            seek(target) {
                let desired = target.clone().sub(this.position);
                desired.y = 0;
                let dist = desired.length();
                if (dist === 0) return new THREE.Vector3();
                desired.normalize().multiplyScalar(this.maxSpeed);
                let steer = desired.sub(this.velocity);
                steer.clampLength(0, this.maxForce);
                return steer;
            }

            flee(target) {
                let desired = this.position.clone().sub(target);
                desired.y = 0;
                let dist = desired.length();
                if (dist === 0) return new THREE.Vector3();
                desired.normalize().multiplyScalar(this.maxSpeed);
                let steer = desired.sub(this.velocity);
                steer.clampLength(0, this.maxForce);
                return steer;
            }

            wander() {
                this.wanderTheta += (Math.random() - 0.5) * 0.5;
                let circleCenter = this.velocity.clone().normalize().multiplyScalar(2.0);
                let displacement = new THREE.Vector3(Math.cos(this.wanderTheta), 0, Math.sin(this.wanderTheta)).multiplyScalar(1.5);
                let target = this.position.clone().add(circleCenter).add(displacement);
                return this.seek(target);
            }

            separate(boids, minDistance) {
                let steer = new THREE.Vector3();
                let count = 0;
                for (let other of boids) {
                    if (other === this) continue;
                    let d = this.position.distanceTo(other.position);
                    if (d > 0 && d < minDistance) {
                        let diff = this.position.clone().sub(other.position);
                        diff.normalize().divideScalar(d); // Weight by distance
                        steer.add(diff);
                        count++;
                    }
                }
                if (count > 0) {
                    steer.divideScalar(count);
                    steer.normalize().multiplyScalar(this.maxSpeed);
                    steer.sub(this.velocity);
                    steer.clampLength(0, this.maxForce);
                }
                return steer;
            }

            boundaries() {
                let desired = null;
                const d = 23;
                if (this.position.x < -d) desired = new THREE.Vector3(this.maxSpeed, 0, this.velocity.z);
                else if (this.position.x > d) desired = new THREE.Vector3(-this.maxSpeed, 0, this.velocity.z);
                
                if (this.position.z < -d) {
                    desired = desired || new THREE.Vector3(this.velocity.x, 0, 0);
                    desired.z = this.maxSpeed;
                } else if (this.position.z > d) {
                    desired = desired || new THREE.Vector3(this.velocity.x, 0, 0);
                    desired.z = -this.maxSpeed;
                }

                if (desired !== null) {
                    desired.normalize().multiplyScalar(this.maxSpeed);
                    let steer = desired.sub(this.velocity);
                    steer.clampLength(0, this.maxForce);
                    return steer;
                }
                return new THREE.Vector3();
            }

            update(dt) {
                this.maxSpeed = this.type === 'fox' ? state.foxSpeed : state.storkSpeed;

                this.velocity.add(this.acceleration.clone().multiplyScalar(dt));
                this.velocity.clampLength(0, this.maxSpeed);
                this.position.add(this.velocity.clone().multiplyScalar(dt));
                this.acceleration.set(0, 0, 0);

                this.group.position.copy(this.position);
                
                if (this.velocity.lengthSq() > 0.001) {
                    let target = this.position.clone().add(this.velocity);
                    this.group.lookAt(target);
                }

                if (this.mixer) {
                    this.mixer.update(dt);
                    if (this.action) {
                        // Adjust animation speed based on movement speed
                        this.action.timeScale = Math.max(0.2, this.velocity.length() / this.maxSpeed);
                    }
                }
            }

            destroy() {
                scene.remove(this.group);
            }
        }

        function spawnFox(pos) {
            if (!state.modelsLoaded) return;
            foxes.push(new Animal('fox', pos));
        }

        function spawnStork(pos) {
            if (!state.modelsLoaded) return;
            storks.push(new Animal('stork', pos));
        }

        function randomPos() {
            return new THREE.Vector3((Math.random() - 0.5) * 40, 0, (Math.random() - 0.5) * 40);
        }

        function resetEcosystem() {
            foxes.forEach(f => f.destroy());
            storks.forEach(s => s.destroy());
            foxes = [];
            storks = [];
            state.totalCatches = 0;
            state.totalBirths = 0;
            state.totalDeaths = 0;
            
            if (state.modelsLoaded) {
                for (let i = 0; i < 5; i++) spawnFox(randomPos());
                for (let i = 0; i < 20; i++) spawnStork(randomPos());
            }
        }

        // --- Asset Loading ---
        const loader = new GLTFLoader();
        let modelsToLoad = 2;

        function checkLoadComplete() {
            modelsToLoad--;
            if (modelsToLoad === 0) {
                state.modelsLoaded = true;
                document.getElementById('hud-models').innerText = 'Yes';
                document.getElementById('hud-models').style.color = '#66ff66';
                document.getElementById('loading').style.opacity = '0';
                resetEcosystem();
            }
        }

        function scaleToFit(object, targetSize) {
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = targetSize / maxDim;
            object.scale.setScalar(scale);
            
            // Enable shadows
            object.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
        }

        // Load Fox
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Fox/glTF-Binary/Fox.glb', (gltf) => {
            scaleToFit(gltf.scene, 0.5);
            foxBaseModel = { scene: gltf.scene, animations: gltf.animations };
            checkLoadComplete();
        });

        // Load Stork
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Stork.glb', (gltf) => {
            scaleToFit(gltf.scene, 0.4);
            // Stork model is slightly elevated, center it vertically
            const box = new THREE.Box3().setFromObject(gltf.scene);
            gltf.scene.position.y -= box.min.y;
            storkBaseModel = { scene: gltf.scene, animations: gltf.animations };
            checkLoadComplete();
        });

        // --- Controls & UI ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                state.isPaused = !state.isPaused;
                e.preventDefault();
            }
            if (e.code === 'KeyR') resetEcosystem();
            if (e.code === 'KeyF') spawnFox(randomPos());
            if (e.code === 'KeyS') {
                for (let i = 0; i < 5; i++) spawnStork(randomPos());
            }
        });

        document.getElementById('slider-fox-speed').addEventListener('input', (e) => {
            state.foxSpeed = parseFloat(e.target.value);
            document.getElementById('val-fox-speed').innerText = state.foxSpeed.toFixed(1);
        });

        document.getElementById('slider-stork-speed').addEventListener('input', (e) => {
            state.storkSpeed = parseFloat(e.target.value);
            document.getElementById('val-stork-speed').innerText = state.storkSpeed.toFixed(1);
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function updateSimulation(dt) {
            if (state.isPaused || !state.modelsLoaded) return;

            // 1. Energy Drain & Food Patches
            foxes.forEach(f => f.energy -= dt);
            storks.forEach(s => {
                s.energy -= dt;
                for (let p of foodPatches) {
                    if (s.position.distanceTo(p) < 1.5) {
                        s.energy += 5 * dt;
                        s.energy = Math.min(s.energy, 100);
                        break;
                    }
                }
            });

            // 2. Steering Behaviors
            foxes.forEach(fox => {
                let nearestStork = null;
                let minDist = Infinity;
                storks.forEach(stork => {
                    let d = fox.position.distanceTo(stork.position);
                    if (d < minDist) { minDist = d; nearestStork = stork; }
                });

                let force = new THREE.Vector3();
                if (nearestStork && minDist < 15) {
                    // Pursue
                    let predictionTime = minDist / fox.maxSpeed;
                    let target = nearestStork.position.clone().add(nearestStork.velocity.clone().multiplyScalar(predictionTime));
                    force.add(fox.seek(target).multiplyScalar(1.5));
                } else {
                    force.add(fox.wander().multiplyScalar(1.0));
                }
                force.add(fox.separate(foxes, 3).multiplyScalar(1.5));
                force.add(fox.boundaries().multiplyScalar(2.0));
                fox.applyForce(force);
            });

            storks.forEach(stork => {
                let nearestFox = null;
                let minDist = Infinity;
                foxes.forEach(fox => {
                    let d = stork.position.distanceTo(fox.position);
                    if (d < minDist) { minDist = d; nearestFox = fox; }
                });

                let force = new THREE.Vector3();
                if (nearestFox && minDist < 8) {
                    force.add(stork.flee(nearestFox.position).multiplyScalar(2.0));
                } else {
                    force.add(stork.wander().multiplyScalar(1.0));
                }
                force.add(stork.separate(storks, 2).multiplyScalar(1.5));
                force.add(stork.boundaries().multiplyScalar(2.0));
                stork.applyForce(force);
            });

            // 3. Update Positions
            foxes.forEach(f => f.update(dt));
            storks.forEach(s => s.update(dt));

            // 4. Ecosystem Rules (Hunting, Starvation, Reproduction)
            
            // Hunting
            for (let i = foxes.length - 1; i >= 0; i--) {
                let fox = foxes[i];
                for (let j = storks.length - 1; j >= 0; j--) {
                    let stork = storks[j];
                    if (fox.position.distanceTo(stork.position) < 0.8) {
                        stork.destroy();
                        storks.splice(j, 1);
                        fox.energy = Math.min(fox.energy + 30, 100);
                        state.totalCatches++;
                        break; // Fox eats one per frame
                    }
                }
            }

            // Starvation
            for (let i = foxes.length - 1; i >= 0; i--) {
                if (foxes[i].energy <= 0) {
                    foxes[i].destroy();
                    foxes.splice(i, 1);
                    state.totalDeaths++;
                }
            }
            for (let i = storks.length - 1; i >= 0; i--) {
                if (storks[i].energy <= 0) {
                    storks[i].destroy();
                    storks.splice(i, 1);
                    state.totalDeaths++;
                }
            }

            // Reproduction
            foxes.forEach(f => {
                if (f.energy > 70 && foxes.length < 30) {
                    f.energy = 40;
                    let offset = new THREE.Vector3((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2);
                    spawnFox(f.position.clone().add(offset));
                    state.totalBirths++;
                }
            });
            storks.forEach(s => {
                if (s.energy > 70 && storks.length < 30) {
                    s.energy = 40;
                    let offset = new THREE.Vector3((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2);
                    spawnStork(s.position.clone().add(offset));
                    state.totalBirths++;
                }
            });
        }

        function updateStateAndUI() {
            state.frameCount++;
            state.foxCount = foxes.length;
            state.storkCount = storks.length;
            
            let foxE = 0, storkE = 0;
            let valid = true;
            
            foxes.forEach(f => { 
                foxE += f.energy; 
                if (Number.isNaN(f.position.x)) valid = false; 
            });
            storks.forEach(s => { 
                storkE += s.energy; 
                if (Number.isNaN(s.position.x)) valid = false; 
            });

            state.avgFoxEnergy = foxes.length ? Math.round((foxE / foxes.length) * 10) / 10 : 0;
            state.avgStorkEnergy = storks.length ? Math.round((storkE / storks.length) * 10) / 10 : 0;
            state.animalsValid = valid;

            // Update DOM
            document.getElementById('hud-foxes').innerText = state.foxCount;
            document.getElementById('hud-storks').innerText = state.storkCount;
            document.getElementById('hud-catches').innerText = state.totalCatches;
            document.getElementById('hud-births').innerText = state.totalBirths;
            document.getElementById('hud-deaths').innerText = state.totalDeaths;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            let dt = clock.getDelta();
            if (dt > 0.1) dt = 0.1; // Cap dt to prevent huge jumps if tab is inactive

            updateSimulation(dt);
            controls.update();
            updateStateAndUI();
            
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
