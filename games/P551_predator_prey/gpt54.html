<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Predator-Prey Ecosystem</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #88bbdd;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      color: white;
      background: rgba(0,0,0,0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 260px;
      backdrop-filter: blur(4px);
    }
    #hud div, #controls-panel div {
      margin: 4px 0;
      font-size: 14px;
    }
    #controls-panel {
      margin-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.25);
      padding-top: 8px;
    }
    label {
      display: block;
      margin-top: 8px;
      font-size: 13px;
    }
    input[type="range"] {
      width: 100%;
    }
    #help {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.9;
      line-height: 1.35;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="ui">
    <div id="hud">
      <div>Foxes: <span id="hud-foxes">0</span></div>
      <div>Storks: <span id="hud-storks">0</span></div>
      <div>Catches: <span id="hud-catches">0</span></div>
      <div>Births: <span id="hud-births">0</span></div>
      <div>Deaths: <span id="hud-deaths">0</span></div>
      <div>Models loaded: <span id="hud-models">No</span></div>
    </div>

    <div id="controls-panel">
      <label for="slider-fox-speed">
        Fox speed: <span id="fox-speed-value">4</span>
      </label>
      <input id="slider-fox-speed" type="range" min="1" max="8" step="0.5" value="4" />

      <label for="slider-stork-speed">
        Stork speed: <span id="stork-speed-value">3</span>
      </label>
      <input id="slider-stork-speed" type="range" min="1" max="6" step="0.5" value="3" />

      <div id="help">
        Space = pause/play<br/>
        R = reset<br/>
        F = add 1 fox<br/>
        S = add 5 storks
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls, clock;
    let mixers = [];
    let frameCount = 0;
    let isPaused = false;
    let modelsLoaded = false;

    const WORLD_HALF = 23;
    const INITIAL_FOXES = 5;
    const INITIAL_STORKS = 20;
    const MAX_FOXES = 30;
    const MAX_STORKS = 30;

    const foxes = [];
    const storks = [];
    const foodPatches = [];

    let totalCatches = 0;
    let totalBirths = 0;
    let totalDeaths = 0;

    let foxTemplate = null;
    let storkTemplate = null;
    let foxAnimations = [];
    let storkAnimations = [];

    const textureLoader = new THREE.TextureLoader();
    const gltfLoader = new GLTFLoader();

    const sliderFoxSpeed = document.getElementById('slider-fox-speed');
    const sliderStorkSpeed = document.getElementById('slider-stork-speed');
    const foxSpeedValue = document.getElementById('fox-speed-value');
    const storkSpeedValue = document.getElementById('stork-speed-value');

    const hudFoxes = document.getElementById('hud-foxes');
    const hudStorks = document.getElementById('hud-storks');
    const hudCatches = document.getElementById('hud-catches');
    const hudBirths = document.getElementById('hud-births');
    const hudDeaths = document.getElementById('hud-deaths');
    const hudModels = document.getElementById('hud-models');

    const foxColor = new THREE.Color(0xcc7744);
    const storkColor = new THREE.Color(0xffffff);

    const tempVec = new THREE.Vector3();
    const upAxis = new THREE.Vector3(0, 1, 0);
    const centerVec = new THREE.Vector3(0, 0, 0);

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x88bbdd);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
      camera.position.set(0, 25, 35);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, 0);
      controls.enableDamping = true;

      clock = new THREE.Clock();

      const ambient = new THREE.AmbientLight(0x668877, 0.5);
      scene.add(ambient);

      const dir = new THREE.DirectionalLight(0xffffff, 0.7);
      dir.position.set(10, 15, 10);
      dir.castShadow = true;
      scene.add(dir);

      createGround();
      createTrees();
      createFoodPatches();

      loadModels().then(() => {
        modelsLoaded = true;
        hudModels.textContent = 'Yes';
        resetEcosystem();
      }).catch((err) => {
        console.error('Model load failed, using procedural fallback.', err);
        modelsLoaded = false;
        hudModels.textContent = 'No';
        resetEcosystem();
      });

      sliderFoxSpeed.addEventListener('input', () => {
        foxSpeedValue.textContent = sliderFoxSpeed.value;
      });

      sliderStorkSpeed.addEventListener('input', () => {
        storkSpeedValue.textContent = sliderStorkSpeed.value;
      });

      window.addEventListener('resize', onResize);
      window.addEventListener('keydown', onKeyDown);

      window.__3D_STATE__ = {};
    }

    function createGround() {
      const groundGeo = new THREE.PlaneGeometry(50, 50);
      const tex = textureLoader.load('brick_diffuse.jpg');
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(8, 8);
      tex.colorSpace = THREE.SRGBColorSpace;

      const groundMat = new THREE.MeshStandardMaterial({
        map: tex,
        color: 0x44aa44
      });

      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      ground.receiveShadow = true;
      scene.add(ground);
    }

    function createTrees() {
      for (let i = 0; i < 20; i++) {
        const x = randRange(-22, 22);
        const z = randRange(-22, 22);
        const h = randRange(1.5, 3);

        const group = new THREE.Group();

        const trunk = new THREE.Mesh(
          new THREE.CylinderGeometry(0.12, 0.18, h * 0.55, 8),
          new THREE.MeshStandardMaterial({ color: 0x7a4f2b })
        );
        trunk.position.y = h * 0.275;
        trunk.castShadow = true;
        group.add(trunk);

        const top = new THREE.Mesh(
          new THREE.ConeGeometry(h * 0.35, h, 10),
          new THREE.MeshStandardMaterial({ color: 0x2e7d32 })
        );
        top.position.y = h * 0.95;
        top.castShadow = true;
        group.add(top);

        group.position.set(x, 0, z);
        scene.add(group);
      }
    }

    function createFoodPatches() {
      const geo = new THREE.CircleGeometry(1.1, 24);
      const mat = new THREE.MeshBasicMaterial({ color: 0x33dd55, transparent: true, opacity: 0.7, side: THREE.DoubleSide });

      for (let i = 0; i < 10; i++) {
        const mesh = new THREE.Mesh(geo, mat.clone());
        mesh.rotation.x = -Math.PI / 2;
        mesh.position.set(randRange(-20, 20), 0.02, randRange(-20, 20));
        scene.add(mesh);

        foodPatches.push({
          mesh,
          position: mesh.position.clone(),
          radius: 1.1
        });
      }
    }

    async function loadModels() {
      const [foxGLTF, storkGLTF] = await Promise.all([
        loadGLB('Fox.glb'),
        loadGLB('stork.glb')
      ]);

      foxTemplate = foxGLTF.scene;
      storkTemplate = storkGLTF.scene;
      foxAnimations = foxGLTF.animations || [];
      storkAnimations = storkGLTF.animations || [];

      foxTemplate.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });

      storkTemplate.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });
    }

    function loadGLB(url) {
      return new Promise((resolve, reject) => {
        gltfLoader.load(url, resolve, undefined, reject);
      });
    }

    function clearAnimals() {
      [...foxes, ...storks].forEach(a => {
        if (a.mixer) {
          const idx = mixers.indexOf(a.mixer);
          if (idx >= 0) mixers.splice(idx, 1);
          a.mixer.stopAllAction();
        }
        scene.remove(a.object);
      });
      foxes.length = 0;
      storks.length = 0;
    }

    function resetEcosystem() {
      clearAnimals();
      totalCatches = 0;
      totalBirths = 0;
      totalDeaths = 0;

      for (let i = 0; i < INITIAL_FOXES; i++) spawnFox();
      for (let i = 0; i < INITIAL_STORKS; i++) spawnStork();

      updateHUD();
    }

    function spawnFox(position = null, energy = 60) {
      if (foxes.length >= MAX_FOXES) return null;
      const animal = createAnimal('fox', position, energy);
      foxes.push(animal);
      scene.add(animal.object);
      return animal;
    }

    function spawnStork(position = null, energy = 80) {
      if (storks.length >= MAX_STORKS) return null;
      const animal = createAnimal('stork', position, energy);
      storks.push(animal);
      scene.add(animal.object);
      return animal;
    }

    function createAnimal(type, position = null, energy = 50) {
      let object;
      let mixer = null;
      let animations = [];

      if (type === 'fox' && foxTemplate) {
        object = foxTemplate.clone(true);
        object.scale.setScalar(0.5);
        animations = foxAnimations;
      } else if (type === 'stork' && storkTemplate) {
        object = storkTemplate.clone(true);
        object.scale.setScalar(0.4);
        animations = storkAnimations;
      } else {
        object = createFallbackAnimal(type);
      }

      object.position.copy(position || randomGroundPosition());
      object.position.y = 0;

      const angle = Math.random() * Math.PI * 2;
      const velocity = new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle)).multiplyScalar(1 + Math.random());

      if (animations.length > 0) {
        mixer = new THREE.AnimationMixer(object);
        const clip = chooseAnimation(animations);
        if (clip) {
          const action = mixer.clipAction(clip);
          action.play();
        }
        mixers.push(mixer);
      }

      return {
        type,
        object,
        velocity,
        acceleration: new THREE.Vector3(),
        energy,
        maxSpeed: type === 'fox' ? parseFloat(sliderFoxSpeed.value) : parseFloat(sliderStorkSpeed.value),
        maxForce: type === 'fox' ? 7.0 : 6.0,
        wanderAngle: Math.random() * Math.PI * 2,
        mixer,
        alive: true,
        age: 0
      };
    }

    function createFallbackAnimal(type) {
      const group = new THREE.Group();
      if (type === 'fox') {
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(0.8, 0.45, 1.2),
          new THREE.MeshStandardMaterial({ color: foxColor })
        );
        body.position.y = 0.45;
        const head = new THREE.Mesh(
          new THREE.BoxGeometry(0.45, 0.35, 0.45),
          new THREE.MeshStandardMaterial({ color: 0xdd8855 })
        );
        head.position.set(0, 0.6, 0.75);
        group.add(body, head);
      } else {
        const body = new THREE.Mesh(
          new THREE.CylinderGeometry(0.14, 0.18, 1.0, 8),
          new THREE.MeshStandardMaterial({ color: storkColor })
        );
        body.position.y = 0.8;
        const neck = new THREE.Mesh(
          new THREE.CylinderGeometry(0.05, 0.05, 0.6, 6),
          new THREE.MeshStandardMaterial({ color: 0xeeeeee })
        );
        neck.position.set(0, 1.35, 0.15);
        const beak = new THREE.Mesh(
          new THREE.ConeGeometry(0.05, 0.3, 6),
          new THREE.MeshStandardMaterial({ color: 0xdd9933 })
        );
        beak.rotation.x = Math.PI / 2;
        beak.position.set(0, 1.35, 0.45);
        group.add(body, neck, beak);
      }
      group.traverse(o => {
        if (o.isMesh) {
          o.castShadow = true;
          o.receiveShadow = true;
        }
      });
      return group;
    }

    function chooseAnimation(anims) {
      if (!anims || anims.length === 0) return null;
      const preferred = anims.find(a => /walk|run|idle/i.test(a.name));
      return preferred || anims[0];
    }

    function randomGroundPosition() {
      return new THREE.Vector3(randRange(-20, 20), 0, randRange(-20, 20));
    }

    function randRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onKeyDown(e) {
      const key = e.key.toLowerCase();
      if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (key === 'r') {
        resetEcosystem();
      } else if (key === 'f') {
        spawnFox();
      } else if (key === 's') {
        for (let i = 0; i < 5; i++) spawnStork();
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      controls.update();

      if (!isPaused) {
        for (const mixer of mixers) mixer.update(dt);
        updateSimulation(dt);
      }

      frameCount++;
      updateHUD();
      update3DState();

      renderer.render(scene, camera);
    }

    function updateSimulation(dt) {
      const foxSpeed = parseFloat(sliderFoxSpeed.value);
      const storkSpeed = parseFloat(sliderStorkSpeed.value);

      for (const fox of foxes) fox.maxSpeed = foxSpeed;
      for (const stork of storks) stork.maxSpeed = storkSpeed;

      updateStorks(dt);
      updateFoxes(dt);
      handleHunting();
      handleFood(dt);
      handleEnergyAndLife(dt);
      handleReproduction();
      cleanupDead();
    }

    function updateStorks(dt) {
      for (const stork of storks) {
        if (!stork.alive) continue;
        stork.age += dt;
        stork.acceleration.set(0, 0, 0);

        const nearestFox = getNearestAnimal(stork, foxes);
        let steer = new THREE.Vector3();

        if (nearestFox && nearestFox.distance < 8) {
          steer.add(flee(stork, nearestFox.animal.object.position).multiplyScalar(2.6));
        } else {
          steer.add(wander(stork, dt).multiplyScalar(1.1));
        }

        steer.add(separation(stork, storks, 2).multiplyScalar(1.8));
        steer.add(boundaryForce(stork).multiplyScalar(2.0));

        applyForce(stork, steer);
        integrateAnimal(stork, dt);
      }
    }

    function updateFoxes(dt) {
      for (const fox of foxes) {
        if (!fox.alive) continue;
        fox.age += dt;
        fox.acceleration.set(0, 0, 0);

        const nearestStork = getNearestAnimal(fox, storks);
        let steer = new THREE.Vector3();

        if (nearestStork && nearestStork.distance < 15) {
          const predicted = nearestStork.animal.object.position.clone().add(
            nearestStork.animal.velocity.clone().multiplyScalar(0.6)
          );
          steer.add(seek(fox, predicted).multiplyScalar(2.4));
        } else {
          steer.add(wander(fox, dt).multiplyScalar(1.0));
        }

        steer.add(separation(fox, foxes, 3).multiplyScalar(1.6));
        steer.add(boundaryForce(fox).multiplyScalar(2.0));

        applyForce(fox, steer);
        integrateAnimal(fox, dt);
      }
    }

    function handleHunting() {
      for (const fox of foxes) {
        if (!fox.alive) continue;
        for (const stork of storks) {
          if (!stork.alive) continue;
          const d = fox.object.position.distanceTo(stork.object.position);
          if (d <= 0.8) {
            stork.alive = false;
            fox.energy = Math.min(100, fox.energy + 30);
            totalCatches++;
          }
        }
      }
    }

    function handleFood(dt) {
      for (const stork of storks) {
        if (!stork.alive) continue;
        for (const patch of foodPatches) {
          const dx = stork.object.position.x - patch.position.x;
          const dz = stork.object.position.z - patch.position.z;
          if (dx * dx + dz * dz <= patch.radius * patch.radius) {
            stork.energy = Math.min(100, stork.energy + 5 * dt);
            break;
          }
        }
      }
    }

    function handleEnergyAndLife(dt) {
      for (const fox of foxes) {
        if (!fox.alive) continue;
        fox.energy -= 1 * dt;
        if (fox.energy <= 0) {
          fox.alive = false;
          totalDeaths++;
        }
      }

      for (const stork of storks) {
        if (!stork.alive) continue;
        stork.energy -= 1 * dt;
        if (stork.energy <= 0) {
          stork.alive = false;
          totalDeaths++;
        }
      }
    }

    function handleReproduction() {
      const foxBabies = [];
      const storkBabies = [];

      for (const fox of foxes) {
        if (!fox.alive) continue;
        if (fox.energy > 70 && foxes.length + foxBabies.length < MAX_FOXES) {
          fox.energy = 40;
          const pos = fox.object.position.clone().add(new THREE.Vector3(randRange(-1,1),0,randRange(-1,1)));
          foxBabies.push({ position: clampToWorld(pos), energy: 40 });
          totalBirths++;
        }
      }

      for (const stork of storks) {
        if (!stork.alive) continue;
        if (stork.energy > 70 && storks.length + storkBabies.length < MAX_STORKS) {
          stork.energy = 40;
          const pos = stork.object.position.clone().add(new THREE.Vector3(randRange(-1,1),0,randRange(-1,1)));
          storkBabies.push({ position: clampToWorld(pos), energy: 40 });
          totalBirths++;
        }
      }

      foxBabies.forEach(b => spawnFox(b.position, b.energy));
      storkBabies.forEach(b => spawnStork(b.position, b.energy));
    }

    function cleanupDead() {
      for (let i = foxes.length - 1; i >= 0; i--) {
        if (!foxes[i].alive) {
          removeAnimal(foxes, i);
        }
      }
      for (let i = storks.length - 1; i >= 0; i--) {
        if (!storks[i].alive) {
          removeAnimal(storks, i);
        }
      }
    }

    function removeAnimal(arr, index) {
      const animal = arr[index];
      if (animal.mixer) {
        animal.mixer.stopAllAction();
        const idx = mixers.indexOf(animal.mixer);
        if (idx >= 0) mixers.splice(idx, 1);
      }
      scene.remove(animal.object);
      arr.splice(index, 1);
    }

    function applyForce(animal, force) {
      force.clampLength(0, animal.maxForce);
      animal.acceleration.add(force);
    }

    function integrateAnimal(animal, dt) {
      animal.velocity.add(animal.acceleration.clone().multiplyScalar(dt));
      animal.velocity.y = 0;

      if (animal.velocity.lengthSq() > animal.maxSpeed * animal.maxSpeed) {
        animal.velocity.setLength(animal.maxSpeed);
      }

      animal.object.position.add(animal.velocity.clone().multiplyScalar(dt));
      animal.object.position.y = 0;

      clampToWorld(animal.object.position);

      if (animal.velocity.lengthSq() > 0.0001) {
        const dir = animal.velocity.clone().normalize();
        const yaw = Math.atan2(dir.x, dir.z);
        animal.object.rotation.set(0, yaw, 0);
      }
    }

    function seek(animal, targetPos) {
      const desired = targetPos.clone().sub(animal.object.position);
      desired.y = 0;
      if (desired.lengthSq() === 0) return new THREE.Vector3();
      desired.setLength(animal.maxSpeed);
      return desired.sub(animal.velocity);
    }

    function flee(animal, targetPos) {
      const desired = animal.object.position.clone().sub(targetPos);
      desired.y = 0;
      if (desired.lengthSq() === 0) {
        desired.set(randRange(-1,1), 0, randRange(-1,1));
      }
      desired.setLength(animal.maxSpeed);
      return desired.sub(animal.velocity);
    }

    function wander(animal, dt) {
      animal.wanderAngle += randRange(-1, 1) * 1.5 * dt;

      const circleDist = 2.0;
      const circleRadius = 1.2;

      const forward = animal.velocity.lengthSq() > 0.01
        ? animal.velocity.clone().normalize()
        : new THREE.Vector3(Math.cos(animal.wanderAngle), 0, Math.sin(animal.wanderAngle));

      const circleCenter = forward.multiplyScalar(circleDist);
      const displacement = new THREE.Vector3(
        Math.cos(animal.wanderAngle) * circleRadius,
        0,
        Math.sin(animal.wanderAngle) * circleRadius
      );

      return circleCenter.add(displacement);
    }

    function separation(animal, group, desiredDist) {
      const steer = new THREE.Vector3();
      let count = 0;

      for (const other of group) {
        if (other === animal || !other.alive) continue;
        const d = animal.object.position.distanceTo(other.object.position);
        if (d > 0 && d < desiredDist) {
          const diff = animal.object.position.clone().sub(other.object.position);
          diff.y = 0;
          diff.normalize().divideScalar(d);
          steer.add(diff);
          count++;
        }
      }

      if (count > 0) steer.divideScalar(count);
      if (steer.lengthSq() > 0) {
        steer.setLength(animal.maxSpeed);
        steer.sub(animal.velocity);
      }
      return steer;
    }

    function boundaryForce(animal) {
      const p = animal.object.position;
      const steer = new THREE.Vector3();

      const margin = 4;
      if (p.x > WORLD_HALF - margin) steer.x -= (p.x - (WORLD_HALF - margin)) / margin;
      if (p.x < -WORLD_HALF + margin) steer.x += ((-WORLD_HALF + margin) - p.x) / margin;
      if (p.z > WORLD_HALF - margin) steer.z -= (p.z - (WORLD_HALF - margin)) / margin;
      if (p.z < -WORLD_HALF + margin) steer.z += ((-WORLD_HALF + margin) - p.z) / margin;

      if (steer.lengthSq() > 0) {
        steer.setLength(animal.maxSpeed);
        steer.sub(animal.velocity);
      }
      return steer;
    }

    function getNearestAnimal(animal, group) {
      let nearest = null;
      let bestDist = Infinity;
      for (const other of group) {
        if (!other.alive) continue;
        const d = animal.object.position.distanceTo(other.object.position);
        if (d < bestDist) {
          bestDist = d;
          nearest = other;
        }
      }
      return nearest ? { animal: nearest, distance: bestDist } : null;
    }

    function clampToWorld(pos) {
      pos.x = THREE.MathUtils.clamp(pos.x, -WORLD_HALF, WORLD_HALF);
      pos.z = THREE.MathUtils.clamp(pos.z, -WORLD_HALF, WORLD_HALF);
      pos.y = 0;
      return pos;
    }

    function updateHUD() {
      hudFoxes.textContent = foxes.length;
      hudStorks.textContent = storks.length;
      hudCatches.textContent = totalCatches;
      hudBirths.textContent = totalBirths;
      hudDeaths.textContent = totalDeaths;
      hudModels.textContent = modelsLoaded ? 'Yes' : 'No';
    }

    function update3DState() {
      const animals = [...foxes, ...storks];
      const animalsValid = animals.every(a =>
        Number.isFinite(a.object.position.x) &&
        Number.isFinite(a.object.position.y) &&
        Number.isFinite(a.object.position.z)
      );

      const avgFoxEnergy = foxes.length
        ? round1(foxes.reduce((s, a) => s + a.energy, 0) / foxes.length)
        : 0;

      const avgStorkEnergy = storks.length
        ? round1(storks.reduce((s, a) => s + a.energy, 0) / storks.length)
        : 0;

      window.__3D_STATE__ = {
        foxCount: foxes.length,
        storkCount: storks.length,
        totalCatches,
        totalBirths,
        totalDeaths,
        modelsLoaded,
        isPaused,
        foxSpeed: parseFloat(sliderFoxSpeed.value),
        storkSpeed: parseFloat(sliderStorkSpeed.value),
        frameCount,
        animalsValid,
        avgFoxEnergy,
        avgStorkEnergy
      };
    }

    function round1(n) {
      return Math.round(n * 10) / 10;
    }
  </script>
</body>
</html>
