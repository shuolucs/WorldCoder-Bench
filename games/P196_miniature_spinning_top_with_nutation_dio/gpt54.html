<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duck Spinning Top Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #202020;
      font-family: monospace;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      background: #000000aa;
      color: white;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-line;
      border-radius: 8px;
      user-select: none;
      z-index: 10;
      min-width: 240px;
    }

    #slowBtn {
      position: absolute;
      top: 180px;
      left: 12px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #ffffffdd;
      color: #111;
      font-family: monospace;
      cursor: pointer;
      z-index: 10;
    }

    #slowBtn:hover {
      background: #fff;
    }

    #help {
      position: absolute;
      right: 12px;
      bottom: 12px;
      padding: 8px 10px;
      background: #00000088;
      color: #eee;
      border-radius: 8px;
      font-size: 12px;
      z-index: 10;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <button id="slowBtn">Slow Motion</button>
  <div id="help">
    SPACE: start/boost · F: friction · R: reset · ↑/↓: tilt · G: gravity
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2a2a);
    scene.fog = new THREE.Fog(0x2a2a2a, 12, 24);

    // Camera
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 8);
    camera.lookAt(0, 0, 0);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    scene.add(dirLight);

    // Table platform
    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    const tableGeo = new THREE.CylinderGeometry(4, 4, 0.25, 96);
    const tableMat = new THREE.MeshStandardMaterial({
      color: 0x8B4513,
      roughness: 0.9,
      metalness: 0.05
    });
    const table = new THREE.Mesh(tableGeo, tableMat);
    table.position.y = -0.125;
    table.receiveShadow = true;
    table.castShadow = false;
    tableGroup.add(table);

    // Ring pattern on table
    const ringGroup = new THREE.Group();
    ringGroup.position.y = 0.002;
    tableGroup.add(ringGroup);

    for (let r = 0.6; r <= 3.6; r += 0.5) {
      const ringGeo = new THREE.RingGeometry(r - 0.015, r + 0.015, 96);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0xc28b5a,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.28
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ringGroup.add(ring);
    }

    // Radial reference lines
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      const points = [
        new THREE.Vector3(Math.cos(a) * 0.4, 0.003, Math.sin(a) * 0.4),
        new THREE.Vector3(Math.cos(a) * 3.7, 0.003, Math.sin(a) * 3.7)
      ];
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(
        geo,
        new THREE.LineBasicMaterial({ color: 0xd6a06e, transparent: true, opacity: 0.18 })
      );
      ringGroup.add(line);
    }

    // Duck model hierarchy:
    // pivotY: sits at contact point on table
    //  - tiltX: nutation tilt
    //      - spinY: spin around duck up axis
    //          - duckRoot
    const pivotY = new THREE.Group();
    const tiltX = new THREE.Group();
    const spinY = new THREE.Group();
    const duckRoot = new THREE.Group();

    pivotY.position.set(0, 0, 0);
    scene.add(pivotY);
    pivotY.add(tiltX);
    tiltX.add(spinY);
    spinY.add(duckRoot);

    let duckModel = null;
    let duckLoaded = false;
    let duckPositionY = 0.3; // default COM/contact offset

    // Physical parameters
    const I1 = 0.5;
    const I2 = 0.5;
    const I3 = 0.2;
    const mass = 1.0;
    const d = 0.3;

    const gravities = [
      { label: 'Earth', value: 9.81 },
      { label: 'Moon', value: 1.62 },
      { label: 'Jupiter', value: 24.79 }
    ];

    // Simulation state
    const sim = {
      phi: 0,
      theta: 0.3,
      psi: 0,

      phiDot: 0,
      thetaDot: 0,
      psiDot: 0,

      tiltSetting: 0.3,
      frictionEnabled: true,
      timeScale: 1.0,
      gravityIndex: 0,
      simTime: 0,
      boostCount: 0
    };

    function currentGravity() {
      return gravities[sim.gravityIndex].value;
    }

    function currentGravityLabel() {
      return gravities[sim.gravityIndex].label;
    }

    function computeInitialPrecessionRate(theta, spinRate, g) {
      const s = Math.max(0.01, Math.sin(theta));
      const c = Math.cos(theta);

      // Use the regular precession quadratic for symmetric top:
      // I1 cos(theta) * phi^2 - I3 * spinRate * phi + m g d = 0
      const A = I1 * c;
      const B = -I3 * spinRate;
      const C = mass * g * d;

      if (Math.abs(A) < 1e-6) {
        return (mass * g * d) / Math.max(1e-6, I3 * spinRate);
      }

      const disc = B * B - 4 * A * C;

      if (disc >= 0) {
        const sqrtDisc = Math.sqrt(disc);
        const p1 = (-B - sqrtDisc) / (2 * A);
        const p2 = (-B + sqrtDisc) / (2 * A);

        const candidates = [p1, p2].filter(v => Number.isFinite(v) && v >= 0);
        if (candidates.length) return Math.min(...candidates);
      }

      // Fallback slow-precession approximation
      return (mass * g * d) / Math.max(1e-6, I3 * spinRate);
    }

    function resetSimulation() {
      sim.phi = 0;
      sim.theta = sim.tiltSetting;
      sim.psi = 0;
      sim.thetaDot = 0;
      sim.psiDot = 0;
      sim.phiDot = 0;
      sim.simTime = 0;
      applyVisualTransform();
      updateStateExport();
    }

    function startTop() {
      if (sim.psiDot > 0.1) {
        sim.psiDot += 10.0;
        sim.boostCount++;
      } else {
        sim.theta = sim.tiltSetting;
        sim.thetaDot = 0;
        sim.psi = 0;
        sim.phi = 0;
        sim.psiDot = 30.0;
        sim.phiDot = computeInitialPrecessionRate(sim.theta, sim.psiDot, currentGravity());
        sim.simTime = 0;
      }
      updateStateExport();
    }

    function rotationalEnergyApprox() {
      const theta = sim.theta;
      const phiDot = sim.phiDot;
      const thetaDot = sim.thetaDot;
      const psiDot = sim.psiDot;

      const omega3 = psiDot + phiDot * Math.cos(theta);
      const transverseSq = thetaDot * thetaDot + (phiDot * Math.sin(theta)) ** 2;

      const T = 0.5 * I1 * transverseSq + 0.5 * I3 * omega3 * omega3;
      const V = mass * currentGravity() * d * Math.cos(theta);
      return T + V;
    }

    function applyVisualTransform() {
      pivotY.rotation.y = sim.phi;
      tiltX.rotation.x = sim.theta;
      spinY.rotation.y = sim.psi;

      // Keep COM at height d above contact point when upright.
      // With tilt around X and spin around local Y, placing the duck
      // at y=d makes the body pivot around the contact point visually.
      duckRoot.position.set(0, d, 0);
    }

    function updateStateExport() {
      window.__3D_STATE__ = {
        spinRate: sim.psiDot,
        precessionRate: sim.phiDot,
        nutationAngle: sim.theta,
        nutationAngleDeg: THREE.MathUtils.radToDeg(sim.theta),
        phi: sim.phi,
        psi: sim.psi,
        gravity: currentGravity(),
        gravityLabel: currentGravityLabel(),
        frictionEnabled: sim.frictionEnabled,
        timeScale: sim.timeScale,
        isSpinning: sim.psiDot > 0.1,
        hasFallenOver: sim.theta > Math.PI / 2 - 0.1,
        simTime: sim.simTime,
        duckLoaded,
        boostCount: sim.boostCount,
        tiltSetting: sim.tiltSetting,
        duckPositionY: duckRoot.position.y,
        energyApprox: rotationalEnergyApprox()
      };
    }

    function updateHUD() {
      const hud = document.getElementById('hud');
      hud.textContent =
`Spin Rate      : ${sim.psiDot.toFixed(2)} rad/s
Precession Rate: ${sim.phiDot.toFixed(2)} rad/s
Nutation Angle : ${THREE.MathUtils.radToDeg(sim.theta).toFixed(1)} deg
Gravity        : ${currentGravityLabel()}
Friction       : ${sim.frictionEnabled ? 'ON' : 'OFF'}
Time Scale     : ${sim.timeScale.toFixed(1)}
Sim Time       : ${sim.simTime.toFixed(1)} s`;
    }

    // Load Duck.glb
    const loader = new GLTFLoader();
    loader.load(
      './Duck.glb',
      (gltf) => {
        duckModel = gltf.scene;
        duckLoaded = true;

        const box = new THREE.Box3().setFromObject(duckModel);
        const size = new THREE.Vector3();
        box.getSize(size);

        const maxHeight = Math.max(size.y, 1e-5);
        const scale = 0.5 / maxHeight;
        duckModel.scale.setScalar(scale);

        // Recompute box after scaling
        const scaledBox = new THREE.Box3().setFromObject(duckModel);
        const scaledSize = new THREE.Vector3();
        const scaledCenter = new THREE.Vector3();
        scaledBox.getSize(scaledSize);
        scaledBox.getCenter(scaledCenter);

        // Center x/z and place bottom near local origin.
        // Then duckRoot lifts it to y=d.
        duckModel.position.x -= scaledCenter.x;
        duckModel.position.z -= scaledCenter.z;
        duckModel.position.y -= scaledBox.min.y;

        duckModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        spinY.add(duckModel);

        const finalBox = new THREE.Box3().setFromObject(duckModel);
        const finalSize = new THREE.Vector3();
        finalBox.getSize(finalSize);

        // Keep a pleasant miniature look.
        duckPositionY = duckRoot.position.y;

        updateStateExport();
      },
      undefined,
      (err) => {
        console.error('Failed to load Duck.glb:', err);

        // Fallback placeholder
        const fallback = new THREE.Mesh(
          new THREE.ConeGeometry(0.18, 0.5, 24),
          new THREE.MeshStandardMaterial({ color: 0xffcc44, roughness: 0.7 })
        );
        fallback.castShadow = true;
        fallback.receiveShadow = true;
        fallback.position.y = 0.25;
        spinY.add(fallback);
        duckLoaded = false;
        updateStateExport();
      }
    );

    // Shadow catcher floor around table
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(12, 64),
      new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 1.0, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.126;
    ground.receiveShadow = true;
    scene.add(ground);

    // Physics integrator using Euler-angle dynamics
    const fixedDt = 1 / 120;
    let accumulator = 0;
    let lastTime = performance.now() / 1000;

    function stepSimulation(dt) {
      const g = currentGravity();
      const spinning = sim.psiDot > 0.1;

      if (spinning) {
        sim.simTime += dt;
      }

      // Friction on spin
      if (sim.frictionEnabled && sim.psiDot > 0) {
        sim.psiDot = Math.max(0, sim.psiDot - 0.5 * dt);
      }

      // Stronger wobble at low spin
      let wobbleFactor = 1.0;
      if (sim.psiDot < 5.0) {
        wobbleFactor = 1.0 + (5.0 - sim.psiDot) * 0.35;
      }

      // When almost stopped, fall over gradually
      if (sim.psiDot < 1.0) {
        const target = Math.PI / 2;
        const fallRate = 0.9 + (1.0 - sim.psiDot) * 1.5;
        sim.theta += (target - sim.theta) * Math.min(1, fallRate * dt);
        sim.thetaDot *= 0.96;
        sim.phiDot *= 0.98;
        sim.psi += sim.psiDot * dt;
        sim.phi += sim.phiDot * dt;
        applyVisualTransform();
        updateStateExport();
        return;
      }

      // Approximate conserved quantity for body-axis angular momentum
      const pPsi = I3 * (sim.psiDot + sim.phiDot * Math.cos(sim.theta));

      // Effective precession rate from gravitational torque and spin stabilization
      const slowPrec = (mass * g * d) / Math.max(0.5, I3 * sim.psiDot);
      const regularPrec = computeInitialPrecessionRate(
        Math.max(0.05, sim.theta),
        sim.psiDot,
        g
      );
      const blend = THREE.MathUtils.clamp((sim.psiDot - 2.0) / 15.0, 0, 1);
      const targetPhiDot = THREE.MathUtils.lerp(slowPrec, regularPrec, blend);

      // Nutation equation approximation from Lagrange top:
      // theta¨ ~ sin(theta)/I1 * (I1 phiDot^2 cos(theta) - pPsi*phiDot + mgd)
      const thetaAcc =
        (Math.sin(sim.theta) / I1) *
        (I1 * sim.phiDot * sim.phiDot * Math.cos(sim.theta) - pPsi * sim.phiDot + mass * g * d);

      // Add low-spin wobble amplification
      const wobbleDrive = wobbleFactor * thetaAcc;

      // Relax precession toward target
      sim.phiDot += (targetPhiDot - sim.phiDot) * Math.min(1, 2.5 * dt);

      // Integrate nutation
      sim.thetaDot += wobbleDrive * dt;
      sim.thetaDot *= Math.max(0.0, 1.0 - 0.08 * dt); // mild damping
      sim.theta += sim.thetaDot * dt;

      // Clamp theta and bounce to create visible nutation bounds
      const thetaMinBase = 0.03;
      const extraAmp = sim.psiDot < 5.0 ? (5.0 - sim.psiDot) * 0.08 : 0.0;
      const thetaMin = Math.max(thetaMinBase, sim.tiltSetting - (0.15 + extraAmp));
      const thetaMax = Math.min(1.35, sim.tiltSetting + (0.18 + extraAmp * 1.5));

      if (sim.theta < thetaMin) {
        sim.theta = thetaMin;
        sim.thetaDot *= -0.92;
      } else if (sim.theta > thetaMax && sim.psiDot >= 1.0) {
        sim.theta = thetaMax;
        sim.thetaDot *= -0.92;
      }

      // Update angles
      sim.phi += sim.phiDot * dt;
      sim.psi += sim.psiDot * dt;

      applyVisualTransform();
      updateStateExport();
    }

    // Controls/UI
    document.getElementById('slowBtn').addEventListener('click', () => {
      sim.timeScale = sim.timeScale === 1.0 ? 0.2 : 1.0;
      updateStateExport();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        startTop();
      } else if (e.code === 'KeyF') {
        sim.frictionEnabled = !sim.frictionEnabled;
      } else if (e.code === 'KeyR') {
        resetSimulation();
      } else if (e.code === 'ArrowUp') {
        sim.tiltSetting = THREE.MathUtils.clamp(sim.tiltSetting + 0.05, 0.05, 1.2);
        resetSimulation();
      } else if (e.code === 'ArrowDown') {
        sim.tiltSetting = THREE.MathUtils.clamp(sim.tiltSetting - 0.05, 0.05, 1.2);
        resetSimulation();
      } else if (e.code === 'KeyG') {
        sim.gravityIndex = (sim.gravityIndex + 1) % gravities.length;
        if (sim.psiDot > 0.1) {
          sim.phiDot = computeInitialPrecessionRate(sim.theta, sim.psiDot, currentGravity());
        }
      }
      updateStateExport();
    });

    // Initial transform/state
    applyVisualTransform();
    updateStateExport();
    updateHUD();

    // Animate
    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now() / 1000;
      let frameDt = now - lastTime;
      lastTime = now;

      frameDt = Math.min(frameDt, 0.05);
      accumulator += frameDt * sim.timeScale;

      while (accumulator >= fixedDt) {
        stepSimulation(fixedDt);
        accumulator -= fixedDt;
      }

      controls.update();
      updateHUD();
      renderer.render(scene, camera);
    }
    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
