<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Duck Top Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #000000aa;
            color: #ffffff;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
            line-height: 1.5;
            font-size: 14px;
            min-width: 250px;
        }
        #controls-help {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #000000aa;
            color: #aaaaaa;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
            line-height: 1.5;
            font-size: 12px;
            text-align: right;
        }
        .btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: #444;
            color: white;
            border: 1px solid #666;
            padding: 10px 20px;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #666;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div>Spin Rate: <span id="hud-spin">0.00</span> rad/s</div>
        <div>Precession: <span id="hud-prec">0.00</span> rad/s</div>
        <div>Nutation: <span id="hud-nut">0.0</span>&deg;</div>
        <div>Gravity: <span id="hud-grav">Earth</span></div>
        <div>Friction: <span id="hud-fric">ON</span></div>
        <div>Time Scale: <span id="hud-time">1.0</span>x</div>
        <div>Sim Time: <span id="hud-sim">0.0</span>s</div>
    </div>

    <div id="controls-help">
        <b>CONTROLS</b><br>
        [SPACE] Launch / Boost<br>
        [F] Toggle Friction<br>
        [R] Reset Simulation<br>
        [Up/Down] Adjust Initial Tilt<br>
        [G] Cycle Gravity
    </div>

    <button id="btn-slowmo" class="btn">Toggle Slow Motion</button>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            spinRate: 0,
            precessionRate: 0,
            nutationAngle: 0.3,
            nutationAngleDeg: 17.18,
            phi: 0,
            psi: 0,
            gravity: 9.81,
            gravityLabel: 'Earth',
            frictionEnabled: true,
            timeScale: 1.0,
            isSpinning: false,
            hasFallenOver: false,
            simTime: 0,
            duckLoaded: false,
            boostCount: 0,
            tiltSetting: 0.3,
            duckPositionY: 0,
            energyApprox: 0
        };
        const state = window.__3D_STATE__;

        // Physics state: [theta, phi, psi, dTheta, dPhi, dPsi]
        let physicsState = [state.tiltSetting, 0, 0, 0, 0, 0];

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 10, 25);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below table
        controls.minDistance = 2;
        controls.maxDistance = 15;

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -6;
        dirLight.shadow.camera.right = 6;
        dirLight.shadow.camera.top = 6;
        dirLight.shadow.camera.bottom = -6;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- ENVIRONMENT ---
        // Table surface
        const tableGeo = new THREE.CylinderGeometry(4, 4, 0.2, 64);
        const tableMat = new THREE.MeshStandardMaterial({ 
            color: 0x8B4513,
            roughness: 0.7,
            metalness: 0.1
        });
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.y = -0.1;
        table.receiveShadow = true;
        scene.add(table);

        // Grid/Ring pattern
        const polarGrid = new THREE.PolarGridHelper(4, 16, 8, 64, 0x000000, 0x000000);
        polarGrid.position.y = 0.01;
        polarGrid.material.opacity = 0.15;
        polarGrid.material.transparent = true;
        scene.add(polarGrid);

        // --- DUCK MODEL ---
        const duckGroup = new THREE.Group();
        scene.add(duckGroup);

        const loader = new GLTFLoader();
        loader.load('./Duck.glb', (gltf) => {
            const duck = gltf.scene;
            
            // Calculate bounding box to scale and position
            const box = new THREE.Box3().setFromObject(duck);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            // Scale to roughly 0.5 units tall
            const scale = 0.5 / size.y;
            duck.scale.setScalar(scale);
            
            // Position so the bottom center is exactly at the origin of duckGroup
            duck.position.x = -center.x * scale;
            duck.position.y = -box.min.y * scale;
            duck.position.z = -center.z * scale;

            duck.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            duckGroup.add(duck);
            state.duckLoaded = true;
            state.duckPositionY = duck.position.y;
            
            // Initial rotation setup
            updateDuckRotation();
        }, undefined, (error) => {
            console.error('Error loading Duck.glb:', error);
            // Fallback to a simple cone if model fails to load
            const coneGeo = new THREE.ConeGeometry(0.2, 0.5, 16);
            coneGeo.translate(0, 0.25, 0);
            const coneMat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
            const cone = new THREE.Mesh(coneGeo, coneMat);
            cone.castShadow = true;
            cone.receiveShadow = true;
            duckGroup.add(cone);
            state.duckLoaded = true;
        });

        // --- PHYSICS ENGINE ---
        const timeStep = 1 / 120;
        let accumulator = 0;

        function getDerivatives(s, frictionOn, g) {
            let [theta, phi, psi, dTheta, dPhi, dPsi] = s;
            
            // Prevent singularity at theta = 0
            let sinTheta = Math.sin(theta);
            if (Math.abs(sinTheta) < 1e-5) sinTheta = 1e-5 * Math.sign(sinTheta) || 1e-5;
            let cosTheta = Math.cos(theta);

            // Physical parameters
            const I1 = 0.5;
            const I3 = 0.2;
            const m = 1.0;
            const d = 0.3;

            // Equations of motion derived from Lagrangian
            let ddTheta = (dPhi * dPhi * sinTheta * cosTheta) 
                        - (I3 / I1) * dPhi * sinTheta * (dPsi + dPhi * cosTheta) 
                        + (m * g * d / I1) * sinTheta;

            let ddPhi = (I3 * (dPsi + dPhi * cosTheta) * dTheta - 2 * I1 * dPhi * dTheta * cosTheta) / (I1 * sinTheta);

            // Friction applied to spin
            let frictionAcc = 0;
            if (frictionOn && dPsi > 0) {
                frictionAcc = -0.5;
            } else if (frictionOn && dPsi < 0) {
                frictionAcc = 0.5;
            }

            let ddPsi = frictionAcc - ddPhi * cosTheta + dPhi * dTheta * sinTheta;

            // Wobble enhancement and fall over logic
            if (dPsi < 5 && dPsi > 0.1) {
                // Natural physics handles most wobble, but we add slight damping to precession to destabilize
                ddPhi -= dPhi * 0.05; 
            }

            if (dPsi < 1.0) {
                // Force fall over
                ddTheta += (Math.PI / 2 - theta) * 5.0 - dTheta * 2.0;
                ddPhi -= dPhi * 2.0;
                ddPsi -= dPsi * 2.0;
            }

            // Floor collision
            if (theta >= Math.PI / 2 && dTheta > 0) {
                ddTheta = -dTheta / timeStep; // Stop penetration
            }

            return [dTheta, dPhi, dPsi, ddTheta, ddPhi, ddPsi];
        }

        function stepPhysics(dt) {
            // Runge-Kutta 4th Order Integration
            let k1 = getDerivatives(physicsState, state.frictionEnabled, state.gravity);
            let s2 = physicsState.map((v, i) => v + k1[i] * dt / 2);
            
            let k2 = getDerivatives(s2, state.frictionEnabled, state.gravity);
            let s3 = physicsState.map((v, i) => v + k2[i] * dt / 2);
            
            let k3 = getDerivatives(s3, state.frictionEnabled, state.gravity);
            let s4 = physicsState.map((v, i) => v + k3[i] * dt);
            
            let k4 = getDerivatives(s4, state.frictionEnabled, state.gravity);
            
            for (let i = 0; i < 6; i++) {
                physicsState[i] += (dt / 6) * (k1[i] + 2*k2[i] + 2*k3[i] + k4[i]);
            }

            // Constraints
            if (physicsState[0] > Math.PI / 2) {
                physicsState[0] = Math.PI / 2;
                if (physicsState[3] > 0) physicsState[3] = 0;
            }
            if (physicsState[0] < 0) {
                physicsState[0] = 0;
                if (physicsState[3] < 0) physicsState[3] = 0;
            }

            // Check if completely fallen
            if (physicsState[0] >= Math.PI / 2 - 0.02 && Math.abs(physicsState[5]) < 0.1) {
                physicsState[5] = 0;
                physicsState[4] = 0;
                physicsState[3] = 0;
                state.isSpinning = false;
                state.hasFallenOver = true;
            }

            // Update global state
            state.nutationAngle = physicsState[0];
            state.nutationAngleDeg = physicsState[0] * 180 / Math.PI;
            state.phi = physicsState[1];
            state.psi = physicsState[2];
            state.precessionRate = physicsState[4];
            state.spinRate = physicsState[5];
            state.simTime += dt;

            // Energy approximation
            const I1 = 0.5, I3 = 0.2, m = 1.0, d = 0.3;
            const th = physicsState[0], dth = physicsState[3], dph = physicsState[4], dps = physicsState[5];
            const T = 0.5 * I1 * (dth*dth + dph*dph*Math.sin(th)*Math.sin(th)) + 0.5 * I3 * Math.pow(dps + dph*Math.cos(th), 2);
            const V = m * state.gravity * d * Math.cos(th);
            state.energyApprox = T + V;
        }

        function updateDuckRotation() {
            // Compose rotation: Y(phi) * X(theta) * Y(psi)
            const qPhi = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), state.phi);
            const qTheta = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), state.nutationAngle);
            const qPsi = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), state.psi);
            
            const finalQ = new THREE.Quaternion();
            finalQ.copy(qPhi).multiply(qTheta).multiply(qPsi);
            
            duckGroup.quaternion.copy(finalQ);
        }

        // --- INTERACTIONS ---
        function resetSimulation() {
            physicsState = [state.tiltSetting, 0, 0, 0, 0, 0];
            state.isSpinning = false;
            state.hasFallenOver = false;
            state.simTime = 0;
            state.boostCount = 0;
            state.spinRate = 0;
            state.precessionRate = 0;
            state.nutationAngle = state.tiltSetting;
            state.nutationAngleDeg = state.tiltSetting * 180 / Math.PI;
            state.phi = 0;
            state.psi = 0;
            updateDuckRotation();
        }

        function startSpinning() {
            if (!state.isSpinning && !state.hasFallenOver) {
                physicsState[5] = 30; // Initial spin rate
                state.isSpinning = true;
            } else if (state.isSpinning) {
                physicsState[5] += 10; // Boost
                state.boostCount++;
            }
        }

        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'Space':
                    startSpinning();
                    break;
                case 'KeyF':
                    state.frictionEnabled = !state.frictionEnabled;
                    break;
                case 'KeyR':
                    resetSimulation();
                    break;
                case 'ArrowUp':
                    state.tiltSetting = Math.max(0.05, state.tiltSetting - 0.05);
                    resetSimulation();
                    break;
                case 'ArrowDown':
                    state.tiltSetting = Math.min(1.2, state.tiltSetting + 0.05);
                    resetSimulation();
                    break;
                case 'KeyG':
                    const gravities = [
                        { l: 'Earth', v: 9.81 },
                        { l: 'Moon', v: 1.62 },
                        { l: 'Jupiter', v: 24.79 }
                    ];
                    let idx = gravities.findIndex(g => g.l === state.gravityLabel);
                    idx = (idx + 1) % gravities.length;
                    state.gravityLabel = gravities[idx].l;
                    state.gravity = gravities[idx].v;
                    break;
            }
        });

        document.getElementById('btn-slowmo').addEventListener('click', () => {
            state.timeScale = state.timeScale === 1.0 ? 0.2 : 1.0;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- UI UPDATE ---
        const elSpin = document.getElementById('hud-spin');
        const elPrec = document.getElementById('hud-prec');
        const elNut = document.getElementById('hud-nut');
        const elGrav = document.getElementById('hud-grav');
        const elFric = document.getElementById('hud-fric');
        const elTime = document.getElementById('hud-time');
        const elSim = document.getElementById('hud-sim');

        function updateHUD() {
            elSpin.innerText = state.spinRate.toFixed(2);
            elPrec.innerText = state.precessionRate.toFixed(2);
            elNut.innerText = state.nutationAngleDeg.toFixed(1);
            elGrav.innerText = state.gravityLabel;
            elFric.innerText = state.frictionEnabled ? 'ON' : 'OFF';
            elTime.innerText = state.timeScale.toFixed(1);
            elSim.innerText = state.simTime.toFixed(1);
        }

        // --- MAIN LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            let delta = clock.getDelta();
            
            // Cap delta to avoid spiral of death if tab is inactive
            if (delta > 0.1) delta = 0.1; 
            
            delta *= state.timeScale;
            accumulator += delta;

            while (accumulator >= timeStep) {
                if (state.isSpinning || state.hasFallenOver) {
                    stepPhysics(timeStep);
                }
                accumulator -= timeStep;
            }

            if (state.duckLoaded) {
                updateDuckRotation();
            }

            controls.update();
            updateHUD();
            renderer.render(scene, camera);
        }

        // Initialize rotation before starting loop
        updateDuckRotation();
        animate();

    </script>
</body>
</html>
