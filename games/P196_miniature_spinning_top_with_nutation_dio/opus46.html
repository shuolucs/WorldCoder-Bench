<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinning Top Diorama</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #000000aa;
    color: white;
    font-family: monospace;
    font-size: 13px;
    padding: 12px 16px;
    border-radius: 8px;
    line-height: 1.6;
    pointer-events: none;
    min-width: 260px;
  }
  #slowMotionBtn {
    position: absolute;
    top: 280px;
    left: 10px;
    background: #333;
    color: white;
    font-family: monospace;
    font-size: 13px;
    padding: 8px 16px;
    border: 1px solid #666;
    border-radius: 4px;
    cursor: pointer;
  }
  #slowMotionBtn:hover { background: #555; }
  #instructions {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: #000000aa;
    color: #aaa;
    font-family: monospace;
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 6px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="hud"></div>
<button id="slowMotionBtn">Slow Motion: OFF</button>
<div id="instructions">
  SPACE: Launch/Boost | F: Toggle Friction | R: Reset<br>
  ↑/↓: Adjust Tilt | G: Cycle Gravity | Slow Motion: Button
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a3e);
scene.fog = new THREE.Fog(0x2a2a3e, 15, 30);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
scene.add(dirLight);

// Hemisphere light for nicer ambient
const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x8B4513, 0.2);
scene.add(hemiLight);

// --- Table Surface ---
const tableGeometry = new THREE.CylinderGeometry(4, 4, 0.15, 64);
const tableMaterial = new THREE.MeshStandardMaterial({
  color: 0x8B4513,
  roughness: 0.7,
  metalness: 0.1
});
const table = new THREE.Mesh(tableGeometry, tableMaterial);
table.position.y = -0.075;
table.receiveShadow = true;
scene.add(table);

// Circular ring patterns on table
for (let i = 1; i <= 3; i++) {
  const ringGeometry = new THREE.RingGeometry(i * 1.1 - 0.02, i * 1.1 + 0.02, 64);
  const ringMaterial = new THREE.MeshStandardMaterial({
    color: 0x6B3410,
    roughness: 0.8,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeometry, ringMaterial);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.001;
  scene.add(ring);
}

// Center dot
const dotGeom = new THREE.CircleGeometry(0.05, 16);
const dotMat = new THREE.MeshStandardMaterial({ color: 0x5a2d0c, side: THREE.DoubleSide });
const dot = new THREE.Mesh(dotGeom, dotMat);
dot.rotation.x = -Math.PI / 2;
dot.position.y = 0.002;
scene.add(dot);

// Table edge bevel
const edgeGeom = new THREE.TorusGeometry(4, 0.08, 8, 64);
const edgeMat = new THREE.MeshStandardMaterial({ color: 0x6B3410, roughness: 0.6 });
const edge = new THREE.Mesh(edgeGeom, edgeMat);
edge.rotation.x = Math.PI / 2;
edge.position.y = 0.0;
scene.add(edge);

// --- OrbitControls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0.5, 0);
controls.update();

// --- Physics State ---
const gravities = [
  { value: 9.81, label: 'Earth' },
  { value: 1.62, label: 'Moon' },
  { value: 24.79, label: 'Jupiter' }
];
let gravityIndex = 0;

const physics = {
  I1: 0.5,    // transverse moment of inertia
  I3: 0.2,    // spin axis moment of inertia
  mass: 1.0,
  d: 0.3,     // distance from contact to COM

  // Euler angles
  phi: 0,       // precession
  theta: 0.3,   // nutation
  psi: 0,       // spin

  // Angular velocities
  dphidt: 0,
  dthetadt: 0,
  dpsidt: 0,

  frictionEnabled: true,
  timeScale: 1.0,
  simTime: 0,
  isSpinning: false,
  hasFallenOver: false,
  boostCount: 0,
  tiltSetting: 0.3,

  get gravity() { return gravities[gravityIndex].value; },
  get gravityLabel() { return gravities[gravityIndex].label; }
};

function initPhysics() {
  physics.phi = 0;
  physics.theta = physics.tiltSetting;
  physics.psi = 0;
  physics.dpsidt = 0;
  physics.dphidt = 0;
  physics.dthetadt = 0;
  physics.simTime = 0;
  physics.isSpinning = false;
  physics.hasFallenOver = false;
  physics.boostCount = 0;
}

function launchTop() {
  if (!physics.isSpinning || physics.dpsidt < 0.1) {
    physics.phi = 0;
    physics.theta = physics.tiltSetting;
    physics.psi = 0;
    physics.dpsidt = 30;
    physics.dthetadt = 0;
    physics.isSpinning = true;
    physics.hasFallenOver = false;

    // Compute initial precession rate for steady precession as starting point
    const { I1, I3, mass, d, theta } = physics;
    const g = physics.gravity;
    const sinTheta = Math.sin(theta);
    if (Math.abs(sinTheta) > 0.001) {
      // Approximate steady precession: dphi/dt ≈ mgh / (I3 * dpsidt * cos(theta)) for fast top
      // More precisely: I1 * dphidt * sin(theta) * cos(theta) - I3 * (dpsidt + dphidt*cos(theta)) * dphidt * sin(theta) + mgd*sin(theta) = 0
      // For fast spinning top: dphidt ≈ mgd / (I3 * dpsidt)
      physics.dphidt = (mass * g * d) / (I3 * physics.dpsidt);
    } else {
      physics.dphidt = 0;
    }
  } else {
    // Boost
    physics.dpsidt += 10;
    physics.boostCount++;
  }
}

function computeDerivatives(theta, dtheta, phi, dphi, psi, dpsi) {
  const { I1, I3, mass, d } = physics;
  const g = physics.gravity;

  const sinTheta = Math.sin(theta);
  const cosTheta = Math.cos(theta);

  // Conserved quantities for symmetric top:
  // p_phi = I1 * dphi * sin^2(theta) + I3 * (dpsi + dphi*cos(theta)) * cos(theta)
  // p_psi = I3 * (dpsi + dphi*cos(theta))
  // But we integrate Euler's equations directly:

  // For a symmetric top with Euler angles (phi, theta, psi):
  // I1 * d²theta/dt² = I1 * dphi² * sin(theta)*cos(theta) - I3 * (dpsi + dphi*cos(theta)) * dphi * sin(theta) + m*g*d*sin(theta)
  // d/dt[I1 * dphi * sin²(theta) + I3*(dpsi + dphi*cos(theta))*cos(theta)] = 0  (p_phi conserved)
  // d/dt[I3*(dpsi + dphi*cos(theta))] = 0  (p_psi conserved)

  // From p_psi conservation: I3 * (dpsi + dphi*cos(theta)) = const = L3
  const L3 = I3 * (dpsi + dphi * cosTheta);

  // From p_phi conservation: p_phi = I1 * dphi * sin²(theta) + L3 * cos(theta) = const
  const p_phi = I1 * dphi * sinTheta * sinTheta + L3 * cosTheta;

  // theta equation:
  const ddtheta = (I1 * dphi * dphi * sinTheta * cosTheta
                   - L3 * dphi * sinTheta
                   + mass * g * d * sinTheta) / I1;

  // From p_phi: dphi = (p_phi - L3*cos(theta)) / (I1 * sin²(theta))
  // From p_psi: dpsi = L3/I3 - dphi*cos(theta)
  // These are used to update dphi and dpsi from conserved quantities

  return { ddtheta, L3, p_phi };
}

const FIXED_DT = 1.0 / 120.0;
let accumulator = 0;

function stepPhysics(frameDt) {
  if (!physics.isSpinning) return;
  if (physics.hasFallenOver) return;

  const scaledDt = frameDt * physics.timeScale;
  accumulator += scaledDt;

  while (accumulator >= FIXED_DT) {
    accumulator -= FIXED_DT;
    integrateStep(FIXED_DT);
  }
}

function integrateStep(dt) {
  const { I1, I3, mass, d } = physics;
  const g = physics.gravity;

  let { theta, dthetadt, phi, dphidt, psi, dpsidt } = physics;

  const sinTheta = Math.sin(theta);
  const cosTheta = Math.cos(theta);

  // Conserved angular momenta (recomputed each step for numerical stability with friction)
  const L3 = I3 * (dpsidt + dphidt * cosTheta);
  const p_phi = I1 * dphidt * sinTheta * sinTheta + L3 * cosTheta;

  // Theta equation of motion
  const ddtheta = (I1 * dphidt * dphidt * sinTheta * cosTheta
                   - L3 * dphidt * sinTheta
                   + mass * g * d * sinTheta) / I1;

  // RK4 for theta
  const k1_theta = dthetadt;
  const k1_dtheta = ddtheta;

  const theta2 = theta + 0.5 * dt * k1_theta;
  const dtheta2 = dthetadt + 0.5 * dt * k1_dtheta;
  const sin2 = Math.sin(theta2);
  const cos2 = Math.cos(theta2);
  // Recompute dphi from conserved quantities at theta2
  const sinSq2 = sin2 * sin2;
  let dphi2 = sinSq2 > 0.0001 ? (p_phi - L3 * cos2) / (I1 * sinSq2) : dphidt;
  const k2_dtheta = (I1 * dphi2 * dphi2 * sin2 * cos2 - L3 * dphi2 * sin2 + mass * g * d * sin2) / I1;
  const k2_theta = dtheta2;

  const theta3 = theta + 0.5 * dt * k2_theta;
  const dtheta3 = dthetadt + 0.5 * dt * k2_dtheta;
  const sin3 = Math.sin(theta3);
  const cos3 = Math.cos(theta3);
  const sinSq3 = sin3 * sin3;
  let dphi3 = sinSq3 > 0.0001 ? (p_phi - L3 * cos3) / (I1 * sinSq3) : dphidt;
  const k3_dtheta = (I1 * dphi3 * dphi3 * sin3 * cos3 - L3 * dphi3 * sin3 + mass * g * d * sin3) / I1;
  const k3_theta = dtheta3;

  const theta4 = theta + dt * k3_theta;
  const dtheta4 = dthetadt + dt * k3_dtheta;
  const sin4 = Math.sin(theta4);
  const cos4 = Math.cos(theta4);
  const sinSq4 = sin4 * sin4;
  let dphi4 = sinSq4 > 0.0001 ? (p_phi - L3 * cos4) / (I1 * sinSq4) : dphidt;
  const k4_dtheta = (I1 * dphi4 * dphi4 * sin4 * cos4 - L3 * dphi4 * sin4 + mass * g * d * sin4) / I1;
  const k4_theta = dtheta4;

  // Update theta and dthetadt
  physics.theta += (dt / 6.0) * (k1_theta + 2 * k2_theta + 2 * k3_theta + k4_theta);
  physics.dthetadt += (dt / 6.0) * (k1_dtheta + 2 * k2_dtheta + 2 * k3_dtheta + k4_dtheta);

  // Clamp theta
  if (physics.theta < 0.001) {
    physics.theta = 0.001;
    physics.dthetadt = Math.abs(physics.dthetadt);
  }

  // Update phi from conserved p_phi
  const newSinTheta = Math.sin(physics.theta);
  const newCosTheta = Math.cos(physics.theta);
  const newSinSq = newSinTheta * newSinTheta;

  if (newSinSq > 0.0001) {
    physics.dphidt = (p_phi - L3 * newCosTheta) / (I1 * newSinSq);
  }
  physics.phi += physics.dphidt * dt;

  // Update psi from L3 conservation
  physics.dpsidt = L3 / I3 - physics.dphidt * newCosTheta;
  physics.psi += physics.dpsidt * dt;

  // Apply friction to spin
  if (physics.frictionEnabled) {
    const frictionRate = 0.5; // rad/s per second
    const spinSign = Math.sign(physics.dpsidt);

    // When spin is low, increase wobble
    if (Math.abs(physics.dpsidt) < 5 && Math.abs(physics.dpsidt) > 1) {
      // Add nutation energy (wobble increases)
      physics.dthetadt += 0.3 * dt * Math.sin(physics.simTime * 5);
    }

    // Apply friction
    if (Math.abs(physics.dpsidt) > 0.01) {
      physics.dpsidt -= spinSign * frictionRate * dt;
    }

    // When spin is very low, top falls over
    if (Math.abs(physics.dpsidt) < 1 && physics.isSpinning) {
      physics.dthetadt += 2.0 * dt;
    }
  }

  // Check if fallen over
  if (physics.theta > Math.PI / 2 - 0.1) {
    physics.theta = Math.PI / 2 - 0.1;
    physics.hasFallenOver = true;
    physics.dthetadt = 0;
    physics.dphidt = 0;
    physics.dpsidt *= 0.95; // slow down spin when fallen
  }

  physics.simTime += dt;

  // Update spinning status
  physics.isSpinning = Math.abs(physics.dpsidt) > 0.1 || !physics.hasFallenOver;
  if (physics.hasFallenOver && Math.abs(physics.dpsidt) < 0.1) {
    physics.isSpinning = false;
  }
}

// --- Duck Model ---
let duckModel = null;
let duckLoaded = false;
let duckPivot = new THREE.Group();
scene.add(duckPivot);

const loader = new GLTFLoader();
loader.load('./Duck.glb', (gltf) => {
  duckModel = gltf.scene;

  // Compute bounding box to scale properly
  const box = new THREE.Box3().setFromObject(duckModel);
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 0.5 / maxDim;
  duckModel.scale.set(scale, scale, scale);

  // Recalculate after scaling
  const box2 = new THREE.Box3().setFromObject(duckModel);
  const center = new THREE.Vector3();
  box2.getCenter(center);

  // Center the duck so its base is at origin of pivot
  duckModel.position.set(-center.x, -box2.min.y, -center.z);

  duckModel.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  duckPivot.add(duckModel);
  duckLoaded = true;
  console.log('Duck.glb loaded successfully');
}, undefined, (error) => {
  console.error('Error loading Duck.glb:', error);
  // Create fallback spinning top geometry
  const topGroup = new THREE.Group();

  // Cone body
  const coneGeom = new THREE.ConeGeometry(0.15, 0.35, 16);
  const coneMat = new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.3, metalness: 0.5 });
  const cone = new THREE.Mesh(coneGeom, coneMat);
  cone.position.y = 0.175;
  cone.castShadow = true;
  topGroup.add(cone);

  // Sphere on top
  const sphereGeom = new THREE.SphereGeometry(0.08, 16, 16);
  const sphereMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.3, metalness: 0.5 });
  const sphere = new THREE.Mesh(sphereGeom, sphereMat);
  sphere.position.y = 0.4;
  sphere.castShadow = true;
  topGroup.add(sphere);

  // Tip
  const tipGeom = new THREE.ConeGeometry(0.02, 0.1, 8);
  const tipMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 });
  const tip = new THREE.Mesh(tipGeom, tipMat);
  tip.rotation.x = Math.PI;
  tip.position.y = -0.02;
  topGroup.add(tip);

  duckModel = topGroup;
  duckPivot.add(duckModel);
  duckLoaded = true;
});

// --- Apply rotation to duck ---
const quatPhi = new THREE.Quaternion();
const quatTheta = new THREE.Quaternion();
const quatPsi = new THREE.Quaternion();
const yAxis = new THREE.Vector3(0, 1, 0);
const xAxis = new THREE.Vector3(1, 0, 0);

function updateDuckRotation() {
  // Compose rotation: phi around world Y, then theta around local X, then psi around local Y
  quatPhi.setFromAxisAngle(yAxis, physics.phi);
  quatTheta.setFromAxisAngle(xAxis, physics.theta);
  quatPsi.setFromAxisAngle(yAxis, physics.psi);

  // Combined: R = R_phi * R_theta * R_psi
  const combined = new THREE.Quaternion();
  combined.copy(quatPhi);
  combined.multiply(quatTheta);
  combined.multiply(quatPsi);

  duckPivot.quaternion.copy(combined);

  // Position: the contact point is at origin, COM is at distance d along symmetry axis
  // The duck base should touch the table
  duckPivot.position.set(0, 0, 0);
}

// --- Compute approximate energy ---
function computeEnergy() {
  const { I1, I3, mass, d, theta, dphidt, dthetadt, dpsidt } = physics;
  const g = physics.gravity;
  const cosTheta = Math.cos(theta);
  const sinTheta = Math.sin(theta);

  // Kinetic energy of rotation
  const T = 0.5 * I1 * (dthetadt * dthetadt + dphidt * dphidt * sinTheta * sinTheta)
          + 0.5 * I3 * Math.pow(dpsidt + dphidt * cosTheta, 2);

  // Potential energy
  const V = mass * g * d * cosTheta;

  return T + V;
}

// --- State exposure ---
window.__3D_STATE__ = {};

function updateState() {
  const s = window.__3D_STATE__;
  s.spinRate = physics.dpsidt;
  s.precessionRate = physics.dphidt;
  s.nutationAngle = physics.theta;
  s.nutationAngleDeg = physics.theta * 180 / Math.PI;
  s.phi = physics.phi;
  s.psi = physics.psi;
  s.gravity = physics.gravity;
  s.gravityLabel = physics.gravityLabel;
  s.frictionEnabled = physics.frictionEnabled;
  s.timeScale = physics.timeScale;
  s.isSpinning = physics.isSpinning;
  s.hasFallenOver = physics.hasFallenOver;
  s.simTime = physics.simTime;
  s.duckLoaded = duckLoaded;
  s.boostCount = physics.boostCount;
  s.tiltSetting = physics.tiltSetting;
  s.duckPositionY = duckPivot.position.y;
  s.energyApprox = computeEnergy();
}

// --- HUD ---
const hudEl = document.getElementById('hud');
const slowBtn = document.getElementById('slowMotionBtn');

function updateHUD() {
  hudEl.innerHTML = `
Spin Rate:       ${physics.dpsidt.toFixed(2)} rad/s
Precession Rate: ${physics.dphidt.toFixed(2)} rad/s
Nutation Angle:  ${(physics.theta * 180 / Math.PI).toFixed(1)}°
Gravity:         ${physics.gravityLabel} (${physics.gravity})
Friction:        ${physics.frictionEnabled ? 'ON' : 'OFF'}
Time Scale:      ${physics.timeScale.toFixed(1)}x
Sim Time:        ${physics.simTime.toFixed(1)}s
${physics.hasFallenOver ? '⚠ TOP HAS FALLEN OVER' : ''}
${!physics.isSpinning && !physics.hasFallenOver ? 'Press SPACE to launch' : ''}
  `.trim();
}

// --- Input Handling ---
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    launchTop();
  } else if (e.code === 'KeyF') {
    physics.frictionEnabled = !physics.frictionEnabled;
  } else if (e.code === 'KeyR') {
    initPhysics();
  } else if (e.code === 'ArrowUp') {
    e.preventDefault();
    physics.tiltSetting = Math.min(1.2, physics.tiltSetting + 0.05);
    initPhysics();
  } else if (e.code === 'ArrowDown') {
    e.preventDefault();
    physics.tiltSetting = Math.max(0.05, physics.tiltSetting - 0.05);
    initPhysics();
  } else if (e.code === 'KeyG') {
    gravityIndex = (gravityIndex + 1) % gravities.length;
  }
});

slowBtn.addEventListener('click', () => {
  if (physics.timeScale === 1.0) {
    physics.timeScale = 0.2;
    slowBtn.textContent = 'Slow Motion: ON';
  } else {
    physics.timeScale = 1.0;
    slowBtn.textContent = 'Slow Motion: OFF';
  }
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Shadow under the top (contact point indicator) ---
const shadowGeom = new THREE.CircleGeometry(0.15, 32);
const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
const shadowDisc = new THREE.Mesh(shadowGeom, shadowMat);
shadowDisc.rotation.x = -Math.PI / 2;
shadowDisc.position.y = 0.003;
scene.add(shadowDisc);

// --- Trail effect for precession visualization ---
const trailGeom = new THREE.BufferGeometry();
const trailPositions = new Float32Array(300 * 3);
trailGeom.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
const trailMat = new THREE.LineBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.4 });
const trailLine = new THREE.Line(trailGeom, trailMat);
scene.add(trailLine);
let trailIndex = 0;
let trailCount = 0;
let lastTrailTime = 0;

// --- Init ---
initPhysics();

// --- Animation Loop ---
const clock = new THREE.Clock();
let hudTimer = 0;

function animate() {
  requestAnimationFrame(animate);

  const frameDt = Math.min(clock.getDelta(), 0.05); // cap at 50ms

  // Physics
  stepPhysics(frameDt);

  // Update duck rotation
  updateDuckRotation();

  // Trail - track the top of the duck's symmetry axis
  if (physics.isSpinning && physics.simTime - lastTrailTime > 0.02) {
    const tipDir = new THREE.Vector3(0, 0.5, 0);
    tipDir.applyQuaternion(duckPivot.quaternion);
    const tipPos = tipDir.add(duckPivot.position);

    const posArr = trailGeom.attributes.position.array;
    const idx = (trailIndex % 300) * 3;
    posArr[idx] = tipPos.x;
    posArr[idx + 1] = tipPos.y;
    posArr[idx + 2] = tipPos.z;
    trailIndex++;
    trailCount = Math.min(trailCount + 1, 300);
    trailGeom.attributes.position.needsUpdate = true;
    trailGeom.setDrawRange(0, trailCount);
    lastTrailTime = physics.simTime;
  }

  // Update HUD periodically
  hudTimer += frameDt;
  if (hudTimer > 0.05) {
    hudTimer = 0;
    updateHUD();
    updateState();
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
