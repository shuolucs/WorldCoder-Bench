<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backpack Feature Explorer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #title {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.5px;
      z-index: 10;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
      pointer-events: none;
    }

    #controls {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    button {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(8px);
      transition: background 0.2s ease, transform 0.15s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.2);
    }

    button:active {
      transform: scale(0.98);
    }

    #info-panel {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 320px;
      max-width: 80vw;
      color: white;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px 18px;
      text-align: center;
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
      font-size: 15px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="title">Backpack Feature Explorer</div>

    <div id="controls">
      <button id="toggle-rotation-btn">Toggle Rotation</button>
      <button id="reset-btn">Reset View</button>
    </div>

    <div id="info-panel">Click a hotspot to explore features</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const infoPanel = document.getElementById("info-panel");
    const resetBtn = document.getElementById("reset-btn");
    const toggleRotationBtn = document.getElementById("toggle-rotation-btn");

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    const initialCameraPosition = new THREE.Vector3(0, 1.5, 4);
    camera.position.copy(initialCameraPosition);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 2;
    controls.maxDistance = 8;

    // Gradient background via shader plane rendered behind scene
    const bgScene = new THREE.Scene();
    const bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const bgMaterial = new THREE.ShaderMaterial({
      depthWrite: false,
      depthTest: false,
      uniforms: {
        topColor: { value: new THREE.Color("#1a1a2e") },
        bottomColor: { value: new THREE.Color("#16213e") }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = vec4(position.xy, 0.0, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        void main() {
          vec3 color = mix(bottomColor, topColor, vUv.y);
          gl_FragColor = vec4(color, 1.0);
        }
      `
    });
    const bgQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMaterial);
    bgScene.add(bgQuad);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const warmLight = new THREE.DirectionalLight(0xffeedd, 0.8);
    warmLight.position.set(-3, 4, 2);
    scene.add(warmLight);

    const coolLight = new THREE.DirectionalLight(0xaaccff, 0.5);
    coolLight.position.set(3, -2, 2);
    scene.add(coolLight);

    // Ground plane
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(2, 64),
      new THREE.MeshStandardMaterial({
        color: "#222233",
        roughness: 0.95,
        metalness: 0.05,
        transparent: true,
        opacity: 0.9
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.02;
    scene.add(ground);

    // Root group for model + hotspots
    const productRoot = new THREE.Group();
    scene.add(productRoot);

    let model = null;
    let autoRotating = true;
    let activeFeature = "none";
    const clock = new THREE.Clock();

    // Hotspots
    const hotspotData = [
      {
        name: "Material",
        description: "Premium waterproof nylon with reinforced stitching",
        position: new THREE.Vector3(0.5, 1.0, 0.5),
        color: new THREE.Color("#ffdd00")
      },
      {
        name: "Compartments",
        description: "Three spacious compartments with padded laptop sleeve",
        position: new THREE.Vector3(-0.5, 0.5, 0.5),
        color: new THREE.Color("#00ddff")
      },
      {
        name: "Straps",
        description: "Ergonomic padded straps with adjustable chest buckle",
        position: new THREE.Vector3(0, 1.5, -0.3),
        color: new THREE.Color("#ff00dd")
      }
    ];

    const hotspots = [];
    const hotspotPulseOffsets = [0, 1.8, 3.2];

    function createHotspot(data, index) {
      const group = new THREE.Group();
      group.position.copy(data.position);
      group.userData = {
        isHotspot: true,
        feature: data.name,
        description: data.description,
        color: data.color
      };

      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 24, 24),
        new THREE.MeshStandardMaterial({
          color: data.color,
          emissive: data.color,
          emissiveIntensity: 1.6,
          roughness: 0.2,
          metalness: 0.1
        })
      );

      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.13, 24, 24),
        new THREE.MeshBasicMaterial({
          color: data.color,
          transparent: true,
          opacity: 0.18
        })
      );

      group.add(glow);
      group.add(sphere);
      group.userData.pulseOffset = hotspotPulseOffsets[index] || 0;

      hotspots.push(group);
      productRoot.add(group);
    }

    hotspotData.forEach(createHotspot);

    // GLTF load
    const loader = new GLTFLoader();
    loader.load(
      "coffeemat.glb",
      (gltf) => {
        model = gltf.scene;

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        model.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 2 / maxDim;
        model.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(model);
        const scaledCenter = new THREE.Vector3();
        const scaledSize = new THREE.Vector3();
        scaledBox.getCenter(scaledCenter);
        scaledBox.getSize(scaledSize);

        model.position.x -= scaledCenter.x;
        model.position.y -= scaledCenter.y;
        model.position.z -= scaledCenter.z;

        const finalBox = new THREE.Box3().setFromObject(model);
        model.position.y -= finalBox.min.y - (-1.0);

        productRoot.add(model);
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (error) => {
        console.error("Failed to load coffeemat.glb:", error);
      }
    );

    // Raycasting
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    // Particle system
    const activeBursts = [];

    function spawnParticleBurst(worldPosition, color) {
      const particleCount = 50;
      const burstGroup = new THREE.Group();
      scene.add(burstGroup);

      const particles = [];
      const geometry = new THREE.SphereGeometry(0.025, 8, 8);

      for (let i = 0; i < particleCount; i++) {
        const material = new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 1
        });

        const particle = new THREE.Mesh(geometry, material);
        particle.position.copy(worldPosition);

        const dir = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.3) * 2,
          (Math.random() - 0.5) * 2
        ).normalize();

        const speed = 0.6 + Math.random() * 1.4;

        particles.push({
          mesh: particle,
          velocity: dir.multiplyScalar(speed),
          life: 1.5,
          maxLife: 1.5
        });

        burstGroup.add(particle);
      }

      activeBursts.push({ group: burstGroup, particles });
    }

    function updateParticles(delta) {
      for (let i = activeBursts.length - 1; i >= 0; i--) {
        const burst = activeBursts[i];
        let aliveCount = 0;

        for (let j = burst.particles.length - 1; j >= 0; j--) {
          const p = burst.particles[j];
          p.life -= delta;

          if (p.life <= 0) {
            burst.group.remove(p.mesh);
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
            burst.particles.splice(j, 1);
            continue;
          }

          aliveCount++;
          p.mesh.position.addScaledVector(p.velocity, delta);
          p.velocity.multiplyScalar(0.985);
          p.velocity.y -= 0.25 * delta;

          const alpha = p.life / p.maxLife;
          p.mesh.material.opacity = alpha;
          p.mesh.scale.setScalar(0.7 + alpha * 0.6);
        }

        if (aliveCount === 0) {
          scene.remove(burst.group);
          activeBursts.splice(i, 1);
        }
      }
    }

    function onClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(hotspots, true);

      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.isHotspot) obj = obj.parent;
        if (!obj) return;

        const { feature, description, color } = obj.userData;
        activeFeature = feature;
        infoPanel.innerHTML = `<strong>${feature}</strong><br>${description}`;

        const worldPos = new THREE.Vector3();
        obj.getWorldPosition(worldPos);
        spawnParticleBurst(worldPos, color);
      }
    }

    renderer.domElement.addEventListener("click", onClick);

    // Buttons
    resetBtn.addEventListener("click", () => {
      camera.position.copy(initialCameraPosition);
      controls.target.set(0, 0.8, 0);
      controls.update();
      infoPanel.textContent = "Click a hotspot to explore features";
      activeFeature = "none";
    });

    toggleRotationBtn.addEventListener("click", () => {
      autoRotating = !autoRotating;
    });

    // State exposure
    window.__3D_STATE__ = {
      modelLoaded: false,
      autoRotating: true,
      rotationAngle: 0,
      activeFeature: "none",
      particlesActive: false,
      particleCount: 0,
      hotspotCount: 3,
      cameraDistance: camera.position.length()
    };

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      if (autoRotating) {
        productRoot.rotation.y += 0.3 * delta;
      }

      hotspots.forEach((hotspot, i) => {
        const t = elapsed * 3 + hotspot.userData.pulseOffset;
        const scale = 1.0 + 0.2 * Math.sin(t);
        hotspot.scale.setScalar(scale);
      });

      updateParticles(delta);
      controls.update();

      // Update state
      let totalParticles = 0;
      activeBursts.forEach(b => totalParticles += b.particles.length);

      window.__3D_STATE__.modelLoaded = window.__3D_STATE__.modelLoaded || !!model;
      window.__3D_STATE__.autoRotating = autoRotating;
      window.__3D_STATE__.rotationAngle = productRoot.rotation.y;
      window.__3D_STATE__.activeFeature = activeFeature;
      window.__3D_STATE__.particlesActive = activeBursts.length > 0;
      window.__3D_STATE__.particleCount = totalParticles;
      window.__3D_STATE__.hotspotCount = hotspots.length;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

      renderer.autoClear = false;
      renderer.clear();
      renderer.render(bgScene, bgCamera);
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
