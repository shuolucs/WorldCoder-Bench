<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backpack Feature Explorer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #info-panel {
            background: rgba(22, 33, 62, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px 25px;
            text-align: center;
            max-width: 400px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        #info-panel strong {
            display: block;
            font-size: 18px;
            margin-bottom: 5px;
            color: #fff;
        }
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <h1>Backpack Feature Explorer</h1>
        <div id="info-panel">Click a hotspot to explore features</div>
    </div>
    <div class="controls">
        <button id="reset-btn">Reset View</button>
        <button id="toggle-rotation-btn">Toggle Rotation</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            autoRotating: true,
            rotationAngle: 0,
            activeFeature: 'none',
            particlesActive: false,
            particleCount: 0,
            hotspotCount: 3,
            cameraDistance: 4
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0); // Transparent to show CSS gradient
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const warmLight = new THREE.DirectionalLight(0xffeedd, 0.8);
        warmLight.position.set(-5, 5, 5);
        scene.add(warmLight);

        const coolLight = new THREE.DirectionalLight(0xaaccff, 0.5);
        coolLight.position.set(5, -2, 5);
        scene.add(coolLight);

        // --- Ground Plane ---
        const groundGeo = new THREE.CircleGeometry(2, 64);
        const groundMat = new THREE.MeshBasicMaterial({ color: 0x222233 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -1.05; // Slightly below the 2-unit bounding box
        scene.add(ground);

        // --- Model & Hotspots Group ---
        const modelGroup = new THREE.Group();
        scene.add(modelGroup);

        // --- Load Model ---
        const loader = new GLTFLoader();
        loader.load('coffeemat.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center and scale to fit 2-unit bounding box
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2 / maxDim;
            model.scale.setScalar(scale);
            
            model.position.sub(center.multiplyScalar(scale));
            
            modelGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.error('Error loading model:', error);
            // Fallback: create a box if model fails to load so the app still functions
            const geo = new THREE.BoxGeometry(1.5, 2, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            const mesh = new THREE.Mesh(geo, mat);
            modelGroup.add(mesh);
            window.__3D_STATE__.modelLoaded = true;
        });

        // --- Hotspots ---
        const hotspots = [];
        const hotspotData = [
            { name: 'Material', pos: [0.5, 1.0, 0.5], color: 0xffdd00, desc: 'Premium waterproof nylon with reinforced stitching' },
            { name: 'Compartments', pos: [-0.5, 0.5, 0.5], color: 0x00ddff, desc: 'Three spacious compartments with padded laptop sleeve' },
            { name: 'Straps', pos: [0, 1.5, -0.3], color: 0xff00dd, desc: 'Ergonomic padded straps with adjustable chest buckle' }
        ];

        const hotspotGeo = new THREE.SphereGeometry(0.08, 32, 32);
        hotspotData.forEach(data => {
            const mat = new THREE.MeshBasicMaterial({ color: data.color });
            const mesh = new THREE.Mesh(hotspotGeo, mat);
            mesh.position.set(...data.pos);
            mesh.userData = { name: data.name, desc: data.desc, color: data.color };
            modelGroup.add(mesh);
            hotspots.push(mesh);
        });

        // --- Particle System ---
        let particleSystem = null;
        let particleLife = 0;
        const maxParticleLife = 1.5;

        function spawnParticles(worldPosition, colorHex) {
            if (particleSystem) {
                scene.remove(particleSystem);
                particleSystem.geometry.dispose();
                particleSystem.material.dispose();
            }

            const particleCount = 50;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = worldPosition.x;
                positions[i * 3 + 1] = worldPosition.y;
                positions[i * 3 + 2] = worldPosition.z;

                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                ).normalize().multiplyScalar(Math.random() * 2 + 0.5);
                velocities.push(velocity);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: colorHex,
                size: 0.06,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            particleSystem.userData = { velocities: velocities };
            scene.add(particleSystem);

            particleLife = maxParticleLife;
            window.__3D_STATE__.particlesActive = true;
            window.__3D_STATE__.particleCount = particleCount;
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const infoPanel = document.getElementById('info-panel');

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI buttons
            if (event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(hotspots);

            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const data = hit.userData;

                // Update UI
                infoPanel.innerHTML = `<strong>${data.name}</strong>${data.desc}`;
                infoPanel.style.borderColor = '#' + data.color.toString(16).padStart(6, '0');

                // Spawn Particles
                const worldPos = new THREE.Vector3();
                hit.getWorldPosition(worldPos);
                spawnParticles(worldPos, data.color);

                // Update State
                window.__3D_STATE__.activeFeature = data.name;
            }
        });

        // --- UI Controls ---
        document.getElementById('reset-btn').addEventListener('click', () => {
            camera.position.set(0, 1.5, 4);
            controls.target.set(0, 0, 0);
            infoPanel.innerHTML = 'Click a hotspot to explore features';
            infoPanel.style.borderColor = 'rgba(255, 255, 255, 0.2)';
            window.__3D_STATE__.activeFeature = 'none';
        });

        document.getElementById('toggle-rotation-btn').addEventListener('click', () => {
            window.__3D_STATE__.autoRotating = !window.__3D_STATE__.autoRotating;
        });

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Auto-rotation
            if (window.__3D_STATE__.autoRotating) {
                modelGroup.rotation.y += 0.3 * delta;
            }

            // Hotspot pulsing
            const pulseScale = 1.0 + 0.2 * Math.sin(time * 4); // Oscillates between 0.8 and 1.2
            hotspots.forEach(h => h.scale.setScalar(pulseScale));

            // Particle animation
            if (particleSystem && particleLife > 0) {
                particleLife -= delta;
                const positions = particleSystem.geometry.attributes.position.array;
                const velocities = particleSystem.userData.velocities;

                for (let i = 0; i < window.__3D_STATE__.particleCount; i++) {
                    positions[i * 3] += velocities[i].x * delta;
                    positions[i * 3 + 1] += velocities[i].y * delta;
                    positions[i * 3 + 2] += velocities[i].z * delta;
                }
                
                particleSystem.geometry.attributes.position.needsUpdate = true;
                particleSystem.material.opacity = Math.max(0, particleLife / maxParticleLife);

                if (particleLife <= 0) {
                    scene.remove(particleSystem);
                    particleSystem.geometry.dispose();
                    particleSystem.material.dispose();
                    particleSystem = null;
                    window.__3D_STATE__.particlesActive = false;
                    window.__3D_STATE__.particleCount = 0;
                }
            }

            controls.update();

            // Update State Object
            window.__3D_STATE__.rotationAngle = modelGroup.rotation.y;
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
