<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backpack Feature Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #title {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 24px;
    font-weight: 600;
    text-align: center;
    pointer-events: none;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    letter-spacing: 1px;
  }

  #info-panel {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 40, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 16px 28px;
    color: white;
    text-align: center;
    min-width: 350px;
    max-width: 500px;
    transition: all 0.3s ease;
  }

  #info-panel .feature-name {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  #info-panel .feature-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    line-height: 1.4;
  }

  #reset-btn, #toggle-rotation-btn {
    position: absolute;
    top: 20px;
    background: rgba(20, 20, 40, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 10px 18px;
    color: white;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  #reset-btn:hover, #toggle-rotation-btn:hover {
    background: rgba(40, 40, 70, 0.95);
    border-color: rgba(255,255,255,0.4);
  }

  #reset-btn { right: 20px; }
  #toggle-rotation-btn { right: 140px; }
</style>
</head>
<body>

<div id="title">Backpack Feature Explorer</div>

<div id="info-panel">
  <div class="feature-desc">Click a hotspot to explore features</div>
</div>

<button id="reset-btn">Reset View</button>
<button id="toggle-rotation-btn">Toggle Rotation</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
window.__3D_STATE__ = {
  modelLoaded: false,
  autoRotating: true,
  rotationAngle: 0,
  activeFeature: 'none',
  particlesActive: false,
  particleCount: 0,
  hotspotCount: 3,
  cameraDistance: 0
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();

// Background gradient
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 2;
bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const gradient = bgCtx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
bgCtx.fillStyle = gradient;
bgCtx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(bgCanvas);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
const initialCameraPos = new THREE.Vector3(0, 1.5, 4);
camera.position.copy(initialCameraPos);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.DirectionalLight(0xffeedd, 0.8);
warmLight.position.set(-3, 4, 2);
warmLight.castShadow = true;
scene.add(warmLight);

const coolLight = new THREE.DirectionalLight(0xaaccff, 0.5);
coolLight.position.set(3, -2, -2);
scene.add(coolLight);

// Ground plane
const groundGeom = new THREE.CircleGeometry(2, 64);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x222233,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Model container
const modelGroup = new THREE.Group();
scene.add(modelGroup);

// Hotspot data
const hotspotData = [
  { name: 'Material', position: new THREE.Vector3(0.5, 1.0, 0.5), color: 0xffdd00, desc: 'Premium waterproof nylon with reinforced stitching' },
  { name: 'Compartments', position: new THREE.Vector3(-0.5, 0.5, 0.5), color: 0x00ddff, desc: 'Three spacious compartments with padded laptop sleeve' },
  { name: 'Straps', position: new THREE.Vector3(0, 1.5, -0.3), color: 0xff00dd, desc: 'Ergonomic padded straps with adjustable chest buckle' }
];

const hotspots = [];

function createHotspot(data) {
  const group = new THREE.Group();

  // Core sphere
  const coreGeom = new THREE.SphereGeometry(0.08, 16, 16);
  const coreMat = new THREE.MeshBasicMaterial({ color: data.color });
  const core = new THREE.Mesh(coreGeom, coreMat);
  group.add(core);

  // Glow sphere
  const glowGeom = new THREE.SphereGeometry(0.12, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: data.color,
    transparent: true,
    opacity: 0.3
  });
  const glow = new THREE.Mesh(glowGeom, glowMat);
  group.add(glow);

  // Outer ring
  const ringGeom = new THREE.RingGeometry(0.12, 0.15, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: data.color,
    transparent: true,
    opacity: 0.4,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.lookAt(camera.position);
  group.add(ring);

  group.position.copy(data.position);
  group.userData = { name: data.name, color: data.color, desc: data.desc, ring: ring };

  modelGroup.add(group);
  hotspots.push(group);
}

hotspotData.forEach(d => createHotspot(d));

// Particles
const particles = [];

function spawnParticles(position, color) {
  const worldPos = new THREE.Vector3();
  position.getWorldPosition(worldPos);

  for (let i = 0; i < 50; i++) {
    const geom = new THREE.SphereGeometry(0.02, 6, 6);
    const mat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 1.0
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.copy(worldPos);

    const velocity = new THREE.Vector3(
      (Math.random() - 0.5) * 3,
      (Math.random() - 0.5) * 3,
      (Math.random() - 0.5) * 3
    );

    mesh.userData = {
      velocity: velocity,
      life: 1.5,
      maxLife: 1.5
    };

    scene.add(mesh);
    particles.push(mesh);
  }

  state.particlesActive = true;
}

function updateParticles(delta) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const ud = p.userData;

    ud.life -= delta;

    if (ud.life <= 0) {
      scene.remove(p);
      p.geometry.dispose();
      p.material.dispose();
      particles.splice(i, 1);
      continue;
    }

    const t = ud.life / ud.maxLife;
    p.material.opacity = t;
    p.scale.setScalar(t);

    p.position.add(ud.velocity.clone().multiplyScalar(delta));
    ud.velocity.multiplyScalar(0.97);
  }

  state.particleCount = particles.length;
  state.particlesActive = particles.length > 0;
}

// Load model
const loader = new GLTFLoader();
loader.load('coffeemat.glb',
  (gltf) => {
    const model = gltf.scene;

    // Compute bounding box and scale to fit within 2 units
    const box = new THREE.Box3().setFromObject(model);
    const size = new THREE.Vector3();
    box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2 / maxDim;
    model.scale.setScalar(scale);

    // Center the model
    const boxScaled = new THREE.Box3().setFromObject(model);
    const center = new THREE.Vector3();
    boxScaled.getCenter(center);
    model.position.sub(center);

    // Adjust so bottom sits on ground
    const boxFinal = new THREE.Box3().setFromObject(model);
    model.position.y -= boxFinal.min.y;

    modelGroup.add(model);

    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    state.modelLoaded = true;
    console.log('Model loaded successfully');
  },
  (progress) => {
    console.log('Loading:', (progress.loaded / (progress.total || 1) * 100).toFixed(1) + '%');
  },
  (error) => {
    console.warn('Model load error, creating placeholder:', error);
    // Create a placeholder backpack shape
    const backpackGroup = new THREE.Group();

    // Main body
    const bodyGeom = new THREE.BoxGeometry(0.8, 1.2, 0.5);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.7 });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.7;
    body.castShadow = true;
    backpackGroup.add(body);

    // Top flap
    const flapGeom = new THREE.BoxGeometry(0.82, 0.2, 0.52);
    const flapMat = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.7 });
    const flap = new THREE.Mesh(flapGeom, flapMat);
    flap.position.set(0, 1.4, 0);
    flap.castShadow = true;
    backpackGroup.add(flap);

    // Front pocket
    const pocketGeom = new THREE.BoxGeometry(0.6, 0.5, 0.1);
    const pocketMat = new THREE.MeshStandardMaterial({ color: 0x3a4a5a, roughness: 0.6 });
    const pocket = new THREE.Mesh(pocketGeom, pocketMat);
    pocket.position.set(0, 0.45, 0.3);
    pocket.castShadow = true;
    backpackGroup.add(pocket);

    // Straps
    const strapGeom = new THREE.BoxGeometry(0.1, 1.0, 0.05);
    const strapMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8 });
    const strapL = new THREE.Mesh(strapGeom, strapMat);
    strapL.position.set(-0.3, 0.9, -0.28);
    strapL.castShadow = true;
    backpackGroup.add(strapL);

    const strapR = new THREE.Mesh(strapGeom, strapMat);
    strapR.position.set(0.3, 0.9, -0.28);
    strapR.castShadow = true;
    backpackGroup.add(strapR);

    // Handle
    const handleGeom = new THREE.TorusGeometry(0.1, 0.025, 8, 16, Math.PI);
    const handleMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8 });
    const handle = new THREE.Mesh(handleGeom, handleMat);
    handle.position.set(0, 1.55, 0);
    handle.rotation.x = Math.PI;
    handle.castShadow = true;
    backpackGroup.add(handle);

    modelGroup.add(backpackGroup);
    state.modelLoaded = true;
  }
);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onPointerClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check hotspot intersections
  const hotspotMeshes = [];
  hotspots.forEach(h => {
    h.traverse(child => {
      if (child.isMesh) {
        child.userData.parentHotspot = h;
        hotspotMeshes.push(child);
      }
    });
  });

  const intersects = raycaster.intersectObjects(hotspotMeshes, false);

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const hotspot = hit.userData.parentHotspot;
    if (hotspot && hotspot.userData.name) {
      selectFeature(hotspot);
    }
  }
}

function selectFeature(hotspot) {
  const data = hotspot.userData;
  state.activeFeature = data.name;

  // Update info panel
  const panel = document.getElementById('info-panel');
  panel.innerHTML = `
    <div class="feature-name" style="color: #${new THREE.Color(data.color).getHexString()}">${data.name}</div>
    <div class="feature-desc">${data.desc}</div>
  `;

  // Spawn particles
  spawnParticles(hotspot, data.color);
}

renderer.domElement.addEventListener('click', onPointerClick);

// Reset button
document.getElementById('reset-btn').addEventListener('click', () => {
  camera.position.copy(initialCameraPos);
  controls.target.set(0, 0, 0);
  controls.update();

  state.activeFeature = 'none';

  const panel = document.getElementById('info-panel');
  panel.innerHTML = '<div class="feature-desc">Click a hotspot to explore features</div>';
});

// Toggle rotation button
document.getElementById('toggle-rotation-btn').addEventListener('click', () => {
  state.autoRotating = !state.autoRotating;
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Auto rotation
  if (state.autoRotating) {
    modelGroup.rotation.y += 0.3 * delta;
  }
  state.rotationAngle = modelGroup.rotation.y;

  // Hotspot pulse
  hotspots.forEach((h, i) => {
    const pulse = 1.0 + 0.2 * Math.sin(elapsed * 3 + i * 2.1);
    h.scale.setScalar(pulse);

    // Make ring face camera
    if (h.userData.ring) {
      h.userData.ring.lookAt(camera.position);
    }
  });

  // Update particles
  updateParticles(delta);

  // Update state
  state.cameraDistance = camera.position.length();
  state.hotspotCount = hotspots.length;

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
