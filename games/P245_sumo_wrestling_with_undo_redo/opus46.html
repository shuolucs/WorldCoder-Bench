<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sumo Wrestling Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#p1score {
    position: absolute; top: 20px; left: 20px;
    color: #ff4444; font-size: 24px; font-weight: bold;
    text-shadow: 0 0 10px rgba(255,68,68,0.5);
}
#p2score {
    position: absolute; top: 20px; right: 20px;
    color: #4444ff; font-size: 24px; font-weight: bold;
    text-shadow: 0 0 10px rgba(68,68,255,0.5);
}
#turninfo {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    color: #ffffff; font-size: 20px; font-weight: bold; text-align: center;
    text-shadow: 0 0 8px rgba(255,255,255,0.3);
}
#dirinfo {
    position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
    color: #ffdd57; font-size: 18px; text-align: center;
}
#historyinfo {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    color: #aaaaaa; font-size: 14px; text-align: center;
}
#instructions {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
    color: #777777; font-size: 12px; text-align: center; white-space: nowrap;
}
#winmsg {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: gold; font-size: 64px; font-weight: bold;
    text-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4);
    display: none; text-align: center;
}
#activeIndicator {
    position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
    font-size: 16px; font-weight: bold;
}
</style>
</head>
<body>
<div id="hud">
    <div id="p1score">Player 1 Score: 0</div>
    <div id="p2score">Player 2 Score: 0</div>
    <div id="turninfo">Turn: 1 | Active: Player 1</div>
    <div id="dirinfo">Direction: [none]</div>
    <div id="activeIndicator" style="color: #ff4444;">⬇ Player 1's Turn ⬇</div>
    <div id="historyinfo">History: 1 states | Redo: 0 states</div>
    <div id="instructions">Arrow Keys: Choose Direction | Space: Charge | Z: Undo | Y: Redo | R: Reset</div>
    <div id="winmsg"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    // ============ THREE.JS SCENE SETUP ============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 30, 60);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 12, 18);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    // Extra fill light
    const fillLight = new THREE.DirectionalLight(0x8888ff, 0.2);
    fillLight.position.set(-5, 5, -5);
    scene.add(fillLight);

    // ============ DOHYO (Ring) ============
    const dohyoGeom = new THREE.CylinderGeometry(5, 5, 0.2, 64);
    const dohyoMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c, roughness: 0.8 });
    const dohyo = new THREE.Mesh(dohyoGeom, dohyoMat);
    dohyo.position.y = 0.1;
    dohyo.receiveShadow = true;
    scene.add(dohyo);

    // White boundary ring
    const torusGeom = new THREE.TorusGeometry(4.8, 0.05, 16, 100);
    const torusMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
    const boundaryRing = new THREE.Mesh(torusGeom, torusMat);
    boundaryRing.rotation.x = -Math.PI / 2;
    boundaryRing.position.y = 0.21;
    scene.add(boundaryRing);

    // Inner decorative lines
    const innerRingGeom = new THREE.TorusGeometry(2.5, 0.03, 16, 64);
    const innerRingMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, opacity: 0.5, transparent: true });
    const innerRing = new THREE.Mesh(innerRingGeom, innerRingMat);
    innerRing.rotation.x = -Math.PI / 2;
    innerRing.position.y = 0.21;
    scene.add(innerRing);

    // Ground plane beneath dohyo
    const groundGeom = new THREE.PlaneGeometry(50, 50);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 1.0 });
    const ground = new THREE.Mesh(groundGeom, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    scene.add(ground);

    // ============ WRESTLER CREATION ============
    function createWrestler(color) {
        const group = new THREE.Group();

        // Body (cylinder)
        const bodyGeom = new THREE.CylinderGeometry(0.6, 0.6, 0.8, 32);
        const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4, metalness: 0.1 });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.position.y = 0.4;
        body.castShadow = true;
        group.add(body);

        // Head (sphere)
        const headGeom = new THREE.SphereGeometry(0.7, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4, metalness: 0.1 });
        const head = new THREE.Mesh(headGeom, headMat);
        head.position.y = 1.1;
        head.castShadow = true;
        group.add(head);

        // Belt (torus around body)
        const beltGeom = new THREE.TorusGeometry(0.62, 0.06, 8, 32);
        const beltMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6 });
        const belt = new THREE.Mesh(beltGeom, beltMat);
        belt.position.y = 0.5;
        belt.rotation.x = Math.PI / 2;
        group.add(belt);

        // Eyes
        const eyeGeom = new THREE.SphereGeometry(0.08, 16, 16);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const pupilGeom = new THREE.SphereGeometry(0.04, 16, 16);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });

        const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
        leftEye.position.set(-0.25, 1.2, 0.6);
        group.add(leftEye);
        const leftPupil = new THREE.Mesh(pupilGeom, pupilMat);
        leftPupil.position.set(-0.25, 1.2, 0.66);
        group.add(leftPupil);

        const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
        rightEye.position.set(0.25, 1.2, 0.6);
        group.add(rightEye);
        const rightPupil = new THREE.Mesh(pupilGeom, pupilMat);
        rightPupil.position.set(0.25, 1.2, 0.66);
        group.add(rightPupil);

        group.mass = 1.0;
        return group;
    }

    const player1 = createWrestler(0xcc3333);
    const player2 = createWrestler(0x3333cc);
    scene.add(player1);
    scene.add(player2);

    // Direction arrow indicator
    const arrowGroup = new THREE.Group();
    const arrowBodyGeom = new THREE.CylinderGeometry(0.05, 0.05, 1.0, 8);
    const arrowMat = new THREE.MeshStandardMaterial({ color: 0xffdd57, emissive: 0xffdd57, emissiveIntensity: 0.5 });
    const arrowBody = new THREE.Mesh(arrowBodyGeom, arrowMat);
    arrowBody.position.y = 0.5;
    arrowGroup.add(arrowBody);
    const arrowHeadGeom = new THREE.ConeGeometry(0.15, 0.3, 8);
    const arrowHead = new THREE.Mesh(arrowHeadGeom, arrowMat);
    arrowHead.position.y = 1.1;
    arrowGroup.add(arrowHead);
    arrowGroup.visible = false;
    scene.add(arrowGroup);

    // ============ GAME STATE ============
    const STARTING_P1 = { x: -2, z: 0 };
    const STARTING_P2 = { x: 2, z: 0 };
    const RING_RADIUS = 5.0;
    const COLLISION_DIST = 1.4;
    const MOVE_DIST = 1.0;
    const PUSH_DIST = 1.5;
    const FRICTION = 0.1;
    const MAX_HISTORY = 50;
    const WIN_SCORE = 3;

    let gameState = {
        p1x: STARTING_P1.x, p1z: STARTING_P1.z,
        p2x: STARTING_P2.x, p2z: STARTING_P2.z,
        p1Score: 0, p2Score: 0,
        turnNumber: 1,
        activePlayer: 1,
        gameOver: false,
        winner: 0
    };

    let direction = 'none';
    let historyStack = [];
    let redoStack = [];
    let lastAction = 'none';

    // Animation state
    let animating = false;
    let animTargets = null;
    let animProgress = 0;
    let animStartPositions = null;
    let animCallback = null;

    function cloneState(s) {
        return {
            p1x: s.p1x, p1z: s.p1z,
            p2x: s.p2x, p2z: s.p2z,
            p1Score: s.p1Score, p2Score: s.p2Score,
            turnNumber: s.turnNumber,
            activePlayer: s.activePlayer,
            gameOver: s.gameOver,
            winner: s.winner
        };
    }

    function pushHistory() {
        historyStack.push(cloneState(gameState));
        if (historyStack.length > MAX_HISTORY) {
            historyStack.shift();
        }
    }

    function distFromOrigin(x, z) {
        return Math.sqrt(x * x + z * z);
    }

    function distBetween(x1, z1, x2, z2) {
        return Math.sqrt((x1 - x2) * (x1 - x2) + (z1 - z2) * (z1 - z2));
    }

    function getDirectionVector(dir) {
        switch (dir) {
            case 'up': return { x: 0, z: -1 };
            case 'down': return { x: 0, z: 1 };
            case 'left': return { x: -1, z: 0 };
            case 'right': return { x: 1, z: 0 };
            default: return { x: 0, z: 0 };
        }
    }

    function applyFriction(px, pz) {
        const d = distFromOrigin(px, pz);
        if (d > 0.001 && d <= RING_RADIUS) {
            const pullAmount = Math.min(FRICTION, d);
            const nx = -px / d;
            const nz = -pz / d;
            return { x: px + nx * pullAmount, z: pz + nz * pullAmount };
        }
        return { x: px, z: pz };
    }

    function resetPositions() {
        gameState.p1x = STARTING_P1.x;
        gameState.p1z = STARTING_P1.z;
        gameState.p2x = STARTING_P2.x;
        gameState.p2z = STARTING_P2.z;
    }

    function executeCharge() {
        if (gameState.gameOver || direction === 'none' || animating) return;

        pushHistory();
        redoStack = [];

        const dir = getDirectionVector(direction);
        let ap = gameState.activePlayer;

        let apx, apz, opx, opz;
        if (ap === 1) {
            apx = gameState.p1x; apz = gameState.p1z;
            opx = gameState.p2x; opz = gameState.p2z;
        } else {
            apx = gameState.p2x; apz = gameState.p2z;
            opx = gameState.p1x; opz = gameState.p1z;
        }

        // Move active player
        let newApx = apx + dir.x * MOVE_DIST;
        let newApz = apz + dir.z * MOVE_DIST;

        // Check collision
        const dist = distBetween(newApx, newApz, opx, opz);
        let newOpx = opx;
        let newOpz = opz;
        if (dist < COLLISION_DIST) {
            newOpx = opx + dir.x * PUSH_DIST;
            newOpz = opz + dir.z * PUSH_DIST;
        }

        // Apply friction
        const fAp = applyFriction(newApx, newApz);
        newApx = fAp.x; newApz = fAp.z;
        const fOp = applyFriction(newOpx, newOpz);
        newOpx = fOp.x; newOpz = fOp.z;

        // Store targets for animation
        const startPositions = {
            p1x: gameState.p1x, p1z: gameState.p1z,
            p2x: gameState.p2x, p2z: gameState.p2z
        };

        if (ap === 1) {
            gameState.p1x = parseFloat(newApx.toFixed(4));
            gameState.p1z = parseFloat(newApz.toFixed(4));
            gameState.p2x = parseFloat(newOpx.toFixed(4));
            gameState.p2z = parseFloat(newOpz.toFixed(4));
        } else {
            gameState.p2x = parseFloat(newApx.toFixed(4));
            gameState.p2z = parseFloat(newApz.toFixed(4));
            gameState.p1x = parseFloat(newOpx.toFixed(4));
            gameState.p1z = parseFloat(newOpz.toFixed(4));
        }

        // Check ring-out
        const p1Out = distFromOrigin(gameState.p1x, gameState.p1z) > RING_RADIUS;
        const p2Out = distFromOrigin(gameState.p2x, gameState.p2z) > RING_RADIUS;

        let roundReset = false;
        if (p1Out && !p2Out) {
            gameState.p2Score++;
            roundReset = true;
        } else if (p2Out && !p1Out) {
            gameState.p1Score++;
            roundReset = true;
        } else if (p1Out && p2Out) {
            // Both out - active player's opponent scores
            if (ap === 1) gameState.p2Score++;
            else gameState.p1Score++;
            roundReset = true;
        }

        if (roundReset) {
            if (gameState.p1Score >= WIN_SCORE) {
                gameState.gameOver = true;
                gameState.winner = 1;
            } else if (gameState.p2Score >= WIN_SCORE) {
                gameState.gameOver = true;
                gameState.winner = 2;
            }
        }

        // Start animation
        animating = true;
        animProgress = 0;
        animStartPositions = startPositions;
        animTargets = {
            p1x: gameState.p1x, p1z: gameState.p1z,
            p2x: gameState.p2x, p2z: gameState.p2z
        };
        animCallback = function() {
            if (roundReset && !gameState.gameOver) {
                resetPositions();
                syncVisuals();
            }
            // Advance turn
            if (!gameState.gameOver) {
                gameState.activePlayer = gameState.activePlayer === 1 ? 2 : 1;
                gameState.turnNumber++;
            }
            direction = 'none';
            lastAction = 'charge';
            updateHUD();
            updateGlobalState();
        };

        lastAction = 'charge';
        updateHUD();
        updateGlobalState();
    }

    function undo() {
        if (historyStack.length === 0 || animating) return;
        redoStack.push(cloneState(gameState));
        gameState = historyStack.pop();
        direction = 'none';
        lastAction = 'undo';
        syncVisuals();
        updateHUD();
        updateGlobalState();
    }

    function redo() {
        if (redoStack.length === 0 || animating) return;
        historyStack.push(cloneState(gameState));
        gameState = redoStack.pop();
        direction = 'none';
        lastAction = 'redo';
        syncVisuals();
        updateHUD();
        updateGlobalState();
    }

    function resetGame() {
        if (animating) return;
        gameState = {
            p1x: STARTING_P1.x, p1z: STARTING_P1.z,
            p2x: STARTING_P2.x, p2z: STARTING_P2.z,
            p1Score: 0, p2Score: 0,
            turnNumber: 1,
            activePlayer: 1,
            gameOver: false,
            winner: 0
        };
        direction = 'none';
        historyStack = [];
        redoStack = [];
        pushHistory();
        lastAction = 'reset';
        syncVisuals();
        updateHUD();
        updateGlobalState();
    }

    function syncVisuals() {
        player1.position.set(gameState.p1x, 0.6, gameState.p1z);
        player2.position.set(gameState.p2x, 0.6, gameState.p2z);
    }

    function updateArrow() {
        if (direction === 'none' || gameState.gameOver) {
            arrowGroup.visible = false;
            return;
        }
        arrowGroup.visible = true;
        const ap = gameState.activePlayer === 1 ? player1 : player2;
        arrowGroup.position.set(ap.position.x, 2.5, ap.position.z);

        switch (direction) {
            case 'up':
                arrowGroup.rotation.set(0, 0, 0);
                arrowGroup.rotation.x = Math.PI / 2;
                break;
            case 'down':
                arrowGroup.rotation.set(0, 0, 0);
                arrowGroup.rotation.x = -Math.PI / 2;
                break;
            case 'left':
                arrowGroup.rotation.set(0, 0, 0);
                arrowGroup.rotation.z = Math.PI / 2;
                break;
            case 'right':
                arrowGroup.rotation.set(0, 0, 0);
                arrowGroup.rotation.z = -Math.PI / 2;
                break;
        }
    }

    function updateHUD() {
        document.getElementById('p1score').textContent = 'Player 1 Score: ' + gameState.p1Score;
        document.getElementById('p2score').textContent = 'Player 2 Score: ' + gameState.p2Score;
        document.getElementById('turninfo').textContent = 'Turn: ' + gameState.turnNumber + ' | Active: Player ' + gameState.activePlayer;
        document.getElementById('dirinfo').textContent = 'Direction: [' + direction + ']';
        document.getElementById('historyinfo').textContent = 'History: ' + historyStack.length + ' states | Redo: ' + redoStack.length + ' states';

        const indicator = document.getElementById('activeIndicator');
        if (gameState.activePlayer === 1) {
            indicator.style.color = '#ff4444';
            indicator.textContent = '⬇ Player 1\'s Turn ⬇';
        } else {
            indicator.style.color = '#4444ff';
            indicator.textContent = '⬇ Player 2\'s Turn ⬇';
        }

        const winmsg = document.getElementById('winmsg');
        if (gameState.gameOver) {
            winmsg.style.display = 'block';
            winmsg.textContent = 'Player ' + gameState.winner + ' Wins!';
            indicator.textContent = '🏆 Game Over 🏆';
            indicator.style.color = 'gold';
        } else {
            winmsg.style.display = 'none';
        }
    }

    function safeNum(v, decimals) {
        const n = parseFloat(v);
        if (isNaN(n)) return 0;
        return parseFloat(n.toFixed(decimals));
    }

    function updateGlobalState() {
        const d = distBetween(gameState.p1x, gameState.p1z, gameState.p2x, gameState.p2z);
        window.__3D_STATE__ = {
            player1X: safeNum(gameState.p1x, 2),
            player1Z: safeNum(gameState.p1z, 2),
            player2X: safeNum(gameState.p2x, 2),
            player2Z: safeNum(gameState.p2z, 2),
            player1Score: gameState.p1Score || 0,
            player2Score: gameState.p2Score || 0,
            turnNumber: gameState.turnNumber || 1,
            activePlayer: gameState.activePlayer || 1,
            direction: direction || 'none',
            historySize: historyStack.length || 0,
            redoSize: redoStack.length || 0,
            gameOver: !!gameState.gameOver,
            winner: gameState.winner || 0,
            lastAction: lastAction || 'none',
            player1InRing: distFromOrigin(gameState.p1x, gameState.p1z) <= RING_RADIUS,
            player2InRing: distFromOrigin(gameState.p2x, gameState.p2z) <= RING_RADIUS,
            distanceBetween: safeNum(d, 2)
        };
    }

    // ============ INPUT ============
    document.addEventListener('keydown', function(e) {
        if (animating) return;

        switch (e.key) {
            case 'ArrowUp':
                e.preventDefault();
                if (!gameState.gameOver) direction = 'up';
                break;
            case 'ArrowDown':
                e.preventDefault();
                if (!gameState.gameOver) direction = 'down';
                break;
            case 'ArrowLeft':
                e.preventDefault();
                if (!gameState.gameOver) direction = 'left';
                break;
            case 'ArrowRight':
                e.preventDefault();
                if (!gameState.gameOver) direction = 'right';
                break;
            case ' ':
                e.preventDefault();
                executeCharge();
                break;
            case 'z':
            case 'Z':
                undo();
                break;
            case 'y':
            case 'Y':
                redo();
                break;
            case 'r':
            case 'R':
                resetGame();
                break;
        }
        updateArrow();
        updateHUD();
        updateGlobalState();
    });

    // ============ ANIMATION & RENDER LOOP ============
    let time = 0;
    const clock = new THREE.Clock();

    function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        time += delta;

        // Animate wrestlers bobbing
        const bob1 = Math.sin(time * 2.0) * 0.05;
        const bob2 = Math.sin(time * 2.0 + Math.PI) * 0.05;

        if (animating && animTargets && animStartPositions) {
            animProgress += delta * 3.0; // animation speed
            if (animProgress >= 1.0) {
                animProgress = 1.0;
                animating = false;
                syncVisuals();
                if (animCallback) {
                    animCallback();
                    animCallback = null;
                }
            } else {
                const t = easeInOutCubic(animProgress);
                const p1x = animStartPositions.p1x + (animTargets.p1x - animStartPositions.p1x) * t;
                const p1z = animStartPositions.p1z + (animTargets.p1z - animStartPositions.p1z) * t;
                const p2x = animStartPositions.p2x + (animTargets.p2x - animStartPositions.p2x) * t;
                const p2z = animStartPositions.p2z + (animTargets.p2z - animStartPositions.p2z) * t;
                player1.position.set(p1x, 0.6 + bob1, p1z);
                player2.position.set(p2x, 0.6 + bob2, p2z);
            }
        } else {
            player1.position.y = 0.6 + bob1;
            player2.position.y = 0.6 + bob2;
        }

        // Rotate active player slightly for emphasis
        if (!gameState.gameOver) {
            const activeWrestler = gameState.activePlayer === 1 ? player1 : player2;
            activeWrestler.rotation.y = Math.sin(time * 3.0) * 0.1;
        }

        // Update arrow position
        if (arrowGroup.visible && !animating) {
            const ap = gameState.activePlayer === 1 ? player1 : player2;
            arrowGroup.position.set(ap.position.x, 2.5 + Math.sin(time * 4) * 0.1, ap.position.z);
        }

        // Boundary ring pulse
        boundaryRing.material.emissive = new THREE.Color(0xffffff);
        boundaryRing.material.emissiveIntensity = 0.1 + Math.sin(time * 2) * 0.05;

        renderer.render(scene, camera);
    }

    // ============ WINDOW RESIZE ============
    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ============ INITIALIZE ============
    pushHistory();
    syncVisuals();
    updateHUD();
    updateGlobalState();
    animate();

})();
</script>
</body>
</html>
