<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sumo Wrestling</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }
        .score {
            font-size: 28px;
            font-weight: bold;
        }
        #p1-score { color: #ff6666; }
        #p2-score { color: #6666ff; }
        .center-info {
            text-align: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 10px;
        }
        #direction-display {
            font-size: 32px;
            margin-top: 5px;
            color: #ffffaa;
        }
        .bottom-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            color: white;
        }
        .stats {
            font-size: 18px;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.4);
            padding: 5px 15px;
            border-radius: 5px;
        }
        .instructions {
            font-size: 16px;
            color: #dddddd;
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 5px;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            color: gold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8), 0 0 20px rgba(255,215,0,0.5);
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud">
    <div class="top-row">
        <div id="p1-score" class="score">Player 1 Score: 0</div>
        <div class="center-info">
            <div id="turn-info">Turn: 1 | Active: Player 1</div>
            <div id="direction-display">Direction: NONE</div>
        </div>
        <div id="p2-score" class="score">Player 2 Score: 0</div>
    </div>
    
    <div class="bottom-row">
        <div class="stats" id="stack-stats">History: 0 states | Redo: 0 states</div>
        <div class="instructions">
            Arrows: Set Direction | Space: Charge | Z: Undo | Y: Redo | R: Reset
        </div>
    </div>
</div>

<div id="game-over">Player X Wins!</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- Global State ---
    window.__3D_STATE__ = {
        player1X: -2.0, player1Z: 0.0,
        player2X: 2.0, player2Z: 0.0,
        player1Score: 0, player2Score: 0,
        turnNumber: 1, activePlayer: 1,
        direction: 'none',
        historySize: 0, redoSize: 0,
        gameOver: false, winner: 0,
        lastAction: 'none',
        player1InRing: true, player2InRing: true,
        distanceBetween: 4.0
    };

    // --- Game Logic State ---
    let state = {
        p1: { x: -2, z: 0 },
        p2: { x: 2, z: 0 },
        p1Score: 0,
        p2Score: 0,
        turn: 1,
        active: 1,
        gameOver: false,
        winner: 0
    };
    
    let historyStack = [];
    let redoStack = [];
    let currentDirection = 'none';
    let lastAction = 'none';

    // --- Three.js Setup ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 12, 18);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // Dohyo (Ground)
    const groundGeo = new THREE.CylinderGeometry(5, 5, 0.2, 64);
    const groundMat = new THREE.MeshPhongMaterial({ color: 0xd2b48c });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.position.y = 0;
    scene.add(ground);

    // Boundary Ring
    const ringGeo = new THREE.TorusGeometry(4.8, 0.05, 16, 64);
    const ringMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 0.125; // Slightly above ground
    scene.add(ring);

    // Players
    function createWrestler(color) {
        const group = new THREE.Group();
        
        const cylGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.8, 32);
        const mat = new THREE.MeshPhongMaterial({ color: color });
        const cyl = new THREE.Mesh(cylGeo, mat);
        cyl.position.y = 0.4; // Base at 0
        
        const sphGeo = new THREE.SphereGeometry(0.7, 32, 32);
        const sph = new THREE.Mesh(sphGeo, mat);
        sph.position.y = 0.8; // On top of cylinder
        
        group.add(cyl);
        group.add(sph);
        group.position.y = 0.6; // Starting Y as per prompt
        
        return group;
    }

    const player1 = createWrestler(0xcc3333);
    scene.add(player1);

    const player2 = createWrestler(0x3333cc);
    scene.add(player2);

    // --- Game Logic Functions ---

    function cloneState(s) {
        return JSON.parse(JSON.stringify(s));
    }

    function saveState() {
        historyStack.push(cloneState(state));
        if (historyStack.length > 50) {
            historyStack.shift();
        }
        redoStack = [];
    }

    function loadState(s) {
        state = cloneState(s);
        updateMeshes();
        updateHUD();
    }

    function resetRound() {
        state.p1 = { x: -2, z: 0 };
        state.p2 = { x: 2, z: 0 };
        currentDirection = 'none';
        updateMeshes();
    }

    function resetGame() {
        state = {
            p1: { x: -2, z: 0 },
            p2: { x: 2, z: 0 },
            p1Score: 0,
            p2Score: 0,
            turn: 1,
            active: 1,
            gameOver: false,
            winner: 0
        };
        historyStack = [];
        redoStack = [];
        currentDirection = 'none';
        lastAction = 'reset';
        document.getElementById('game-over').style.display = 'none';
        updateMeshes();
        updateHUD();
    }

    function undo() {
        if (historyStack.length > 0) {
            redoStack.push(cloneState(state));
            const prevState = historyStack.pop();
            loadState(prevState);
            lastAction = 'undo';
            currentDirection = 'none';
        }
    }

    function redo() {
        if (redoStack.length > 0) {
            historyStack.push(cloneState(state));
            const nextState = redoStack.pop();
            loadState(nextState);
            lastAction = 'redo';
            currentDirection = 'none';
        }
    }

    function applyFriction(pos) {
        const dist = Math.hypot(pos.x, pos.z);
        if (dist <= 5.0 && dist > 0) {
            const moveDist = Math.min(0.1, dist);
            pos.x -= (pos.x / dist) * moveDist;
            pos.z -= (pos.z / dist) * moveDist;
        }
    }

    function executeCharge() {
        if (state.gameOver || currentDirection === 'none') return;

        saveState();
        lastAction = 'charge';

        let dx = 0, dz = 0;
        if (currentDirection === 'up') dz = -1;
        if (currentDirection === 'down') dz = 1;
        if (currentDirection === 'left') dx = -1;
        if (currentDirection === 'right') dx = 1;

        const activePos = state.active === 1 ? state.p1 : state.p2;
        const oppPos = state.active === 1 ? state.p2 : state.p1;

        // Move active player
        activePos.x += dx * 1.0;
        activePos.z += dz * 1.0;

        // Check collision
        const dist = Math.hypot(activePos.x - oppPos.x, activePos.z - oppPos.z);
        if (dist < 1.4) {
            // Push opponent
            oppPos.x += dx * 1.5;
            oppPos.z += dz * 1.5;
        }

        // Apply friction
        applyFriction(state.p1);
        applyFriction(state.p2);

        // Check Ring-out
        const p1Dist = Math.hypot(state.p1.x, state.p1.z);
        const p2Dist = Math.hypot(state.p2.x, state.p2.z);
        
        let roundEnded = false;

        if (p1Dist > 5.0 && p2Dist <= 5.0) {
            state.p2Score++;
            roundEnded = true;
        } else if (p2Dist > 5.0 && p1Dist <= 5.0) {
            state.p1Score++;
            roundEnded = true;
        } else if (p1Dist > 5.0 && p2Dist > 5.0) {
            // Both out, no points, just reset
            roundEnded = true;
        }

        if (state.p1Score >= 3) {
            state.gameOver = true;
            state.winner = 1;
        } else if (state.p2Score >= 3) {
            state.gameOver = true;
            state.winner = 2;
        }

        if (roundEnded && !state.gameOver) {
            resetRound();
        }

        // Next turn
        if (!state.gameOver) {
            state.turn++;
            state.active = state.active === 1 ? 2 : 1;
            currentDirection = 'none';
        }

        updateMeshes();
        updateHUD();
    }

    // --- Input Handling ---
    window.addEventListener('keydown', (e) => {
        if (state.gameOver && e.code !== 'KeyR' && e.code !== 'KeyZ' && e.code !== 'KeyY') return;

        switch(e.code) {
            case 'ArrowUp': currentDirection = 'up'; break;
            case 'ArrowDown': currentDirection = 'down'; break;
            case 'ArrowLeft': currentDirection = 'left'; break;
            case 'ArrowRight': currentDirection = 'right'; break;
            case 'Space': 
                e.preventDefault(); // Prevent scrolling
                executeCharge(); 
                break;
            case 'KeyZ': undo(); break;
            case 'KeyY': redo(); break;
            case 'KeyR': resetGame(); break;
        }
        updateHUD();
    });

    // --- Updates ---
    function updateMeshes() {
        player1.position.x = state.p1.x;
        player1.position.z = state.p1.z;
        
        player2.position.x = state.p2.x;
        player2.position.z = state.p2.z;
    }

    function getDirectionArrow() {
        switch(currentDirection) {
            case 'up': return '↑ (UP)';
            case 'down': return '↓ (DOWN)';
            case 'left': return '← (LEFT)';
            case 'right': return '→ (RIGHT)';
            default: return 'NONE';
        }
    }

    function updateHUD() {
        document.getElementById('p1-score').innerText = `Player 1 Score: ${state.p1Score}`;
        document.getElementById('p2-score').innerText = `Player 2 Score: ${state.p2Score}`;
        
        const activeColor = state.active === 1 ? '#ff6666' : '#6666ff';
        document.getElementById('turn-info').innerHTML = `Turn: ${state.turn} | Active: <span style="color:${activeColor}">Player ${state.active}</span>`;
        
        document.getElementById('direction-display').innerText = `Direction: ${getDirectionArrow()}`;
        
        document.getElementById('stack-stats').innerText = `History: ${historyStack.length} states | Redo: ${redoStack.length} states`;

        const goDiv = document.getElementById('game-over');
        if (state.gameOver) {
            goDiv.innerText = `Player ${state.winner} Wins!`;
            goDiv.style.display = 'block';
        } else {
            goDiv.style.display = 'none';
        }
    }

    function updateGlobalState() {
        const p1Dist = Math.hypot(state.p1.x, state.p1.z);
        const p2Dist = Math.hypot(state.p2.x, state.p2.z);
        const distBetween = Math.hypot(state.p1.x - state.p2.x, state.p1.z - state.p2.z);

        window.__3D_STATE__ = {
            player1X: Number(state.p1.x.toFixed(2)),
            player1Z: Number(state.p1.z.toFixed(2)),
            player2X: Number(state.p2.x.toFixed(2)),
            player2Z: Number(state.p2.z.toFixed(2)),
            player1Score: state.p1Score,
            player2Score: state.p2Score,
            turnNumber: state.turn,
            activePlayer: state.active,
            direction: currentDirection,
            historySize: historyStack.length,
            redoSize: redoStack.length,
            gameOver: state.gameOver,
            winner: state.winner,
            lastAction: lastAction,
            player1InRing: p1Dist <= 5.0,
            player2InRing: p2Dist <= 5.0,
            distanceBetween: Number(distBetween.toFixed(2))
        };
    }

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initial setup
    updateMeshes();
    updateHUD();

    // --- Render Loop ---
    function animate() {
        requestAnimationFrame(animate);
        updateGlobalState();
        renderer.render(scene, camera);
    }
    animate();

</script>
</body>
</html>
