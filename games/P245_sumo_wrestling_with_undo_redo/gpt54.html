<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sumo Wrestling - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      user-select: none;
    }
    .score {
      position: absolute;
      top: 12px;
      font-size: 22px;
      font-weight: bold;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    }
    #p1Score {
      left: 16px;
      color: #ff6666;
    }
    #p2Score {
      right: 16px;
      color: #6666ff;
    }
    #topCenter {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
      white-space: nowrap;
    }
    #directionDisplay {
      margin-top: 6px;
      font-size: 18px;
      color: #ffd166;
    }
    #historyDisplay {
      position: absolute;
      bottom: 42px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    }
    #instructions {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #ddd;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
      text-align: center;
      max-width: 95vw;
    }
    #winnerBanner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 54px;
      font-weight: 900;
      color: gold;
      text-shadow: 0 0 12px rgba(255,215,0,0.4), 0 3px 10px rgba(0,0,0,0.8);
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="p1Score" class="score">Player 1 Score: 0</div>
    <div id="p2Score" class="score">Player 2 Score: 0</div>

    <div id="topCenter">
      <div id="turnDisplay">Turn: 1 | Active: Player 1</div>
      <div id="directionDisplay">Direction: none</div>
    </div>

    <div id="historyDisplay">History: 1 states | Redo: 0 states</div>

    <div id="winnerBanner">Player 1 Wins!</div>

    <div id="instructions">
      Arrow Keys: choose direction &nbsp;|&nbsp; Space: charge &nbsp;|&nbsp; Z: undo &nbsp;|&nbsp; Y: redo &nbsp;|&nbsp; R: reset
    </div>
  </div>

  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    (() => {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x20252b);

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 12, 18);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 10, 5);
      scene.add(dirLight);

      // Ground / Dohyo
      const dohyoGeo = new THREE.CylinderGeometry(5, 5, 0.2, 64);
      const dohyoMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c });
      const dohyo = new THREE.Mesh(dohyoGeo, dohyoMat);
      dohyo.position.set(0, -0.1, 0);
      scene.add(dohyo);

      const boundaryGeo = new THREE.TorusGeometry(4.8, 0.05, 16, 100);
      const boundaryMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
      const boundary = new THREE.Mesh(boundaryGeo, boundaryMat);
      boundary.rotation.x = Math.PI / 2;
      boundary.position.y = 0.02;
      scene.add(boundary);

      // Optional simple floor around dohyo
      const baseGeo = new THREE.CircleGeometry(10, 64);
      const baseMat = new THREE.MeshStandardMaterial({ color: 0x4f5b4a });
      const base = new THREE.Mesh(baseGeo, baseMat);
      base.rotation.x = -Math.PI / 2;
      base.position.y = -0.101;
      scene.add(base);

      function createWrestler(color) {
        const group = new THREE.Group();

        const bodyGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.8, 32);
        const headGeo = new THREE.SphereGeometry(0.7, 32, 32);
        const mat = new THREE.MeshStandardMaterial({ color });

        const body = new THREE.Mesh(bodyGeo, mat);
        body.position.y = 0.4;

        const head = new THREE.Mesh(headGeo, mat);
        head.position.y = 1.2;

        group.add(body);
        group.add(head);

        return group;
      }

      const player1Mesh = createWrestler(0xcc3333);
      const player2Mesh = createWrestler(0x3333cc);
      scene.add(player1Mesh, player2Mesh);

      const START_P1 = { x: -2, z: 0 };
      const START_P2 = { x:  2, z: 0 };
      const RING_RADIUS = 5.0;
      const COLLISION_DIST = 1.4;

      const game = {
        player1: { x: START_P1.x, z: START_P1.z, mass: 1.0 },
        player2: { x: START_P2.x, z: START_P2.z, mass: 1.0 },
        player1Score: 0,
        player2Score: 0,
        turnNumber: 1,
        activePlayer: 1,
        direction: 'none',
        gameOver: false,
        winner: 0,
        lastAction: 'none',
        history: [],
        redo: []
      };

      function safeNum(n, fallback = 0) {
        return Number.isFinite(n) ? n : fallback;
      }

      function round2(n) {
        return Number(safeNum(n).toFixed(2));
      }

      function distanceXZ(a, b) {
        const dx = safeNum(a.x) - safeNum(b.x);
        const dz = safeNum(a.z) - safeNum(b.z);
        return Math.sqrt(dx * dx + dz * dz);
      }

      function distOrigin(p) {
        const x = safeNum(p.x);
        const z = safeNum(p.z);
        return Math.sqrt(x * x + z * z);
      }

      function inRing(p) {
        return distOrigin(p) <= RING_RADIUS;
      }

      function normalize2D(x, z) {
        const len = Math.sqrt(x * x + z * z);
        if (!Number.isFinite(len) || len <= 0) return { x: 0, z: 0 };
        return { x: x / len, z: z / len };
      }

      function directionVector(dir) {
        switch (dir) {
          case 'up': return { x: 0, z: -1 };
          case 'down': return { x: 0, z: 1 };
          case 'left': return { x: -1, z: 0 };
          case 'right': return { x: 1, z: 0 };
          default: return { x: 0, z: 0 };
        }
      }

      function arrowSymbol(dir) {
        switch (dir) {
          case 'up': return '↑';
          case 'down': return '↓';
          case 'left': return '←';
          case 'right': return '→';
          default: return 'none';
        }
      }

      function applyPositions() {
        player1Mesh.position.set(safeNum(game.player1.x), 0, safeNum(game.player1.z));
        player2Mesh.position.set(safeNum(game.player2.x), 0, safeNum(game.player2.z));
      }

      function createSnapshot() {
        return {
          player1: { x: round2(game.player1.x), z: round2(game.player1.z), mass: 1.0 },
          player2: { x: round2(game.player2.x), z: round2(game.player2.z), mass: 1.0 },
          player1Score: game.player1Score | 0,
          player2Score: game.player2Score | 0,
          turnNumber: game.turnNumber | 0,
          activePlayer: game.activePlayer === 2 ? 2 : 1,
          direction: ['up','down','left','right'].includes(game.direction) ? game.direction : 'none',
          gameOver: !!game.gameOver,
          winner: [0,1,2].includes(game.winner) ? game.winner : 0,
          lastAction: game.lastAction || 'none'
        };
      }

      function restoreSnapshot(snap) {
        if (!snap) return;
        game.player1.x = safeNum(snap.player1.x, START_P1.x);
        game.player1.z = safeNum(snap.player1.z, START_P1.z);
        game.player1.mass = 1.0;

        game.player2.x = safeNum(snap.player2.x, START_P2.x);
        game.player2.z = safeNum(snap.player2.z, START_P2.z);
        game.player2.mass = 1.0;

        game.player1Score = snap.player1Score | 0;
        game.player2Score = snap.player2Score | 0;
        game.turnNumber = Math.max(1, snap.turnNumber | 0);
        game.activePlayer = snap.activePlayer === 2 ? 2 : 1;
        game.direction = ['up','down','left','right'].includes(snap.direction) ? snap.direction : 'none';
        game.gameOver = !!snap.gameOver;
        game.winner = [0,1,2].includes(snap.winner) ? snap.winner : 0;
        game.lastAction = snap.lastAction || 'none';

        applyPositions();
        updateHUD();
        update3DState();
      }

      function pushHistory() {
        game.history.push(createSnapshot());
        if (game.history.length > 50) {
          game.history.shift();
        }
      }

      function resetRoundPositions() {
        game.player1.x = START_P1.x;
        game.player1.z = START_P1.z;
        game.player2.x = START_P2.x;
        game.player2.z = START_P2.z;
      }

      function frictionTowardCenter(player) {
        if (!inRing(player)) return;
        const dir = normalize2D(-player.x, -player.z);
        player.x = safeNum(player.x) + dir.x * 0.1;
        player.z = safeNum(player.z) + dir.z * 0.1;
      }

      function checkRingOutAndScore() {
        const p1Out = !inRing(game.player1);
        const p2Out = !inRing(game.player2);

        if (!p1Out && !p2Out) return;

        if (p1Out && !p2Out) {
          game.player2Score += 1;
        } else if (p2Out && !p1Out) {
          game.player1Score += 1;
        } else {
          // If both somehow go out, no score; reset round.
        }

        if (game.player1Score >= 3) {
          game.gameOver = true;
          game.winner = 1;
        } else if (game.player2Score >= 3) {
          game.gameOver = true;
          game.winner = 2;
        }

        resetRoundPositions();
      }

      function executeCharge() {
        if (game.gameOver) return;
        const dirVec = directionVector(game.direction);
        if (dirVec.x === 0 && dirVec.z === 0) return;

        const active = game.activePlayer === 1 ? game.player1 : game.player2;
        const opponent = game.activePlayer === 1 ? game.player2 : game.player1;

        active.x += dirVec.x * 1.0;
        active.z += dirVec.z * 1.0;

        if (distanceXZ(active, opponent) < COLLISION_DIST) {
          opponent.x += dirVec.x * 1.5;
          opponent.z += dirVec.z * 1.5;
        }

        checkRingOutAndScore();

        if (!game.gameOver) {
          frictionTowardCenter(game.player1);
          frictionTowardCenter(game.player2);
          checkRingOutAndScore();
        }

        if (!game.gameOver) {
          game.turnNumber += 1;
          game.activePlayer = game.activePlayer === 1 ? 2 : 1;
        }

        game.lastAction = 'charge';
        applyPositions();
        pushHistory();
        game.redo = [];
        updateHUD();
        update3DState();
      }

      function undo() {
        if (game.history.length <= 1) return;
        const current = game.history.pop();
        game.redo.push(current);
        const prev = game.history[game.history.length - 1];
        restoreSnapshot(prev);
        game.lastAction = 'undo';
        if (game.history.length > 0) {
          game.history[game.history.length - 1].lastAction = 'undo';
        }
        updateHUD();
        update3DState();
      }

      function redo() {
        if (game.redo.length === 0) return;
        const snap = game.redo.pop();
        snap.lastAction = 'redo';
        game.history.push(snap);
        if (game.history.length > 50) {
          game.history.shift();
        }
        restoreSnapshot(snap);
        game.lastAction = 'redo';
        updateHUD();
        update3DState();
      }

      function fullReset() {
        game.player1.x = START_P1.x;
        game.player1.z = START_P1.z;
        game.player2.x = START_P2.x;
        game.player2.z = START_P2.z;
        game.player1Score = 0;
        game.player2Score = 0;
        game.turnNumber = 1;
        game.activePlayer = 1;
        game.direction = 'none';
        game.gameOver = false;
        game.winner = 0;
        game.lastAction = 'reset';
        game.history = [];
        game.redo = [];
        applyPositions();
        pushHistory();
        updateHUD();
        update3DState();
      }

      const p1ScoreEl = document.getElementById('p1Score');
      const p2ScoreEl = document.getElementById('p2Score');
      const turnDisplayEl = document.getElementById('turnDisplay');
      const directionDisplayEl = document.getElementById('directionDisplay');
      const historyDisplayEl = document.getElementById('historyDisplay');
      const winnerBannerEl = document.getElementById('winnerBanner');

      function updateHUD() {
        p1ScoreEl.textContent = `Player 1 Score: ${game.player1Score}`;
        p2ScoreEl.textContent = `Player 2 Score: ${game.player2Score}`;
        turnDisplayEl.textContent = `Turn: ${game.turnNumber} | Active: Player ${game.activePlayer}`;
        directionDisplayEl.textContent = `Direction: ${arrowSymbol(game.direction)}`;
        historyDisplayEl.textContent = `History: ${game.history.length} states | Redo: ${game.redo.length} states`;

        if (game.gameOver && game.winner) {
          winnerBannerEl.style.display = 'block';
          winnerBannerEl.textContent = `Player ${game.winner} Wins!`;
        } else {
          winnerBannerEl.style.display = 'none';
        }
      }

      function update3DState() {
        const dist = distanceXZ(game.player1, game.player2);
        window.__3D_STATE__ = {
          player1X: round2(game.player1.x),
          player1Z: round2(game.player1.z),
          player2X: round2(game.player2.x),
          player2Z: round2(game.player2.z),
          player1Score: game.player1Score | 0,
          player2Score: game.player2Score | 0,
          turnNumber: Math.max(1, game.turnNumber | 0),
          activePlayer: game.activePlayer === 2 ? 2 : 1,
          direction: ['up','down','left','right'].includes(game.direction) ? game.direction : 'none',
          historySize: game.history.length | 0,
          redoSize: game.redo.length | 0,
          gameOver: !!game.gameOver,
          winner: [0,1,2].includes(game.winner) ? game.winner : 0,
          lastAction: ['charge','undo','redo','reset','none'].includes(game.lastAction) ? game.lastAction : 'none',
          player1InRing: inRing(game.player1),
          player2InRing: inRing(game.player2),
          distanceBetween: round2(dist)
        };
      }

      window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();

        if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' ', 'z', 'y', 'r'].includes(key) || e.code === 'Space') {
          e.preventDefault();
        }

        if (key === 'arrowup') {
          game.direction = 'up';
          game.lastAction = 'none';
          updateHUD();
          update3DState();
        } else if (key === 'arrowdown') {
          game.direction = 'down';
          game.lastAction = 'none';
          updateHUD();
          update3DState();
        } else if (key === 'arrowleft') {
          game.direction = 'left';
          game.lastAction = 'none';
          updateHUD();
          update3DState();
        } else if (key === 'arrowright') {
          game.direction = 'right';
          game.lastAction = 'none';
          updateHUD();
          update3DState();
        } else if (key === ' ' || e.code === 'Space') {
          executeCharge();
        } else if (key === 'z') {
          undo();
        } else if (key === 'y') {
          redo();
        } else if (key === 'r') {
          fullReset();
        }
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      fullReset();

      function animate() {
        requestAnimationFrame(animate);

        player1Mesh.rotation.y += 0.01;
        player2Mesh.rotation.y -= 0.01;

        renderer.render(scene, camera);
      }

      animate();
    })();
  </script>
</body>
</html>
