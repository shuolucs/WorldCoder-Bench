<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sound Wave Propagation Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#controls-panel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(0, 200, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0e0;
    min-width: 260px;
    backdrop-filter: blur(10px);
    z-index: 10;
}

#controls-panel h2 {
    color: #00d4ff;
    font-size: 16px;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(0, 200, 255, 0.2);
    padding-bottom: 8px;
}

.control-group {
    margin-bottom: 14px;
}

.control-group label {
    display: block;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.control-group .value-display {
    color: #00d4ff;
    font-weight: bold;
}

input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(0, 200, 255, 0.2);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #00d4ff;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
}

input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #00d4ff;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
}

#btn-play {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #00d4ff, #0088aa);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s;
}

#btn-play:hover {
    background: linear-gradient(135deg, #00e8ff, #00aacc);
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
}

.keyboard-hints {
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px solid rgba(0, 200, 255, 0.2);
    font-size: 11px;
    color: #777;
    line-height: 1.8;
}

.keyboard-hints kbd {
    background: rgba(0, 200, 255, 0.15);
    border: 1px solid rgba(0, 200, 255, 0.3);
    border-radius: 4px;
    padding: 1px 6px;
    color: #00d4ff;
    font-family: monospace;
    font-size: 11px;
}

#hud-stats {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(0, 200, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0e0;
    min-width: 220px;
    backdrop-filter: blur(10px);
    z-index: 10;
}

#hud-stats h2 {
    color: #00d4ff;
    font-size: 16px;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(0, 200, 255, 0.2);
    padding-bottom: 8px;
}

.stat-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 13px;
}

.stat-row .stat-label {
    color: #888;
}

.stat-row .stat-value {
    color: #00d4ff;
    font-weight: bold;
    font-family: 'Courier New', monospace;
}

.status-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
}

.status-on { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
.status-off { background: #ff4444; box-shadow: 0 0 6px #ff4444; }
</style>
</head>
<body>

<div id="controls-panel">
    <h2>🔊 Wave Controls</h2>
    <div class="control-group">
        <button id="btn-play">Play</button>
    </div>
    <div class="control-group">
        <label>Frequency: <span class="value-display" id="label-freq">1.0</span> Hz</label>
        <input type="range" id="slider-freq" min="0.5" max="3.0" step="0.1" value="1.0">
    </div>
    <div class="control-group">
        <label>Speed: <span class="value-display" id="label-speed">3.0</span> units/s</label>
        <input type="range" id="slider-speed" min="1.0" max="6.0" step="0.5" value="3.0">
    </div>
    <div class="keyboard-hints">
        <kbd>R</kbd> Reset simulation<br>
        <kbd>D</kbd> Toggle diffraction<br>
        <kbd>M</kbd> Move source<br>
        <kbd>Click</kbd> model → wireframe
    </div>
</div>

<div id="hud-stats">
    <h2>📊 Statistics</h2>
    <div class="stat-row">
        <span class="stat-label">Active Rings</span>
        <span class="stat-value" id="stat-active">0</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Total Spawned</span>
        <span class="stat-value" id="stat-total">0</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Sim Time</span>
        <span class="stat-value" id="stat-time">0.0s</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Diffraction Count</span>
        <span class="stat-value" id="stat-diffraction">0</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Diffraction</span>
        <span class="stat-value" id="stat-diff-status"><span class="status-indicator status-on"></span>ON</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Wireframe</span>
        <span class="stat-value" id="stat-wire-status"><span class="status-indicator status-off"></span>OFF</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Source Pos</span>
        <span class="stat-value" id="stat-source">(-8, 2, 0)</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Model</span>
        <span class="stat-value" id="stat-model">Loading...</span>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1e);
scene.fog = new THREE.FogExp2(0x0a0a1e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1.5, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.set(2048, 2048);
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -15;
directionalLight.shadow.camera.right = 15;
directionalLight.shadow.camera.top = 15;
directionalLight.shadow.camera.bottom = -15;
scene.add(directionalLight);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x222233,
    roughness: 0.8,
    metalness: 0.2
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper for visual reference
const gridHelper = new THREE.GridHelper(40, 40, 0x333355, 0x222244);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ============ SOUND SOURCE ============
const sourcePositions = [
    new THREE.Vector3(-8, 2, 0),
    new THREE.Vector3(0, 2, 8),
    new THREE.Vector3(8, 2, 0),
    new THREE.Vector3(0, 2, -8)
];
let sourceIndex = 0;

const sourceGeom = new THREE.SphereGeometry(0.3, 32, 32);
const sourceMat = new THREE.MeshStandardMaterial({
    color: 0xffdd00,
    emissive: 0xffaa00,
    emissiveIntensity: 1.5,
    roughness: 0.2,
    metalness: 0.5
});
const sourceMesh = new THREE.Mesh(sourceGeom, sourceMat);
sourceMesh.position.copy(sourcePositions[sourceIndex]);
sourceMesh.castShadow = true;
scene.add(sourceMesh);

// Source glow
const sourceGlowGeom = new THREE.SphereGeometry(0.5, 32, 32);
const sourceGlowMat = new THREE.MeshBasicMaterial({
    color: 0xffdd00,
    transparent: true,
    opacity: 0.2
});
const sourceGlow = new THREE.Mesh(sourceGlowGeom, sourceGlowMat);
sourceMesh.add(sourceGlow);

// Source point light
const sourceLight = new THREE.PointLight(0xffaa00, 2, 8);
sourceMesh.add(sourceLight);

// ============ MODEL ============
let nefertitiModel = null;
let modelLoaded = false;
let wireframeMode = false;
let originalMaterials = [];
const modelBoundingRadius = 1.5;
const modelPosition = new THREE.Vector3(0, 1.5, 0);

// Create a placeholder while model loads
const placeholderGeom = new THREE.CylinderGeometry(0.8, 1.0, 3, 32);
const placeholderMat = new THREE.MeshStandardMaterial({
    color: 0xccaa77,
    roughness: 0.6,
    metalness: 0.3
});
const placeholder = new THREE.Mesh(placeholderGeom, placeholderMat);
placeholder.position.copy(modelPosition);
placeholder.castShadow = true;
scene.add(placeholder);

const loader = new GLTFLoader();
loader.load(
    'Nefertiti.glb',
    (gltf) => {
        nefertitiModel = gltf.scene;
        nefertitiModel.position.copy(modelPosition);
        nefertitiModel.scale.set(0.03, 0.03, 0.03);
        nefertitiModel.castShadow = true;
        nefertitiModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                originalMaterials.push({ mesh: child, material: child.material.clone() });
            }
        });
        scene.remove(placeholder);
        scene.add(nefertitiModel);
        modelLoaded = true;
        document.getElementById('stat-model').textContent = 'Loaded ✓';
    },
    (progress) => {
        const pct = progress.total > 0 ? Math.round(progress.loaded / progress.total * 100) : '...';
        document.getElementById('stat-model').textContent = `${pct}%`;
    },
    (error) => {
        console.warn('Could not load Nefertiti.glb, using placeholder:', error);
        modelLoaded = true;
        nefertitiModel = placeholder;
        originalMaterials.push({ mesh: placeholder, material: placeholderMat.clone() });
        document.getElementById('stat-model').textContent = 'Placeholder';
    }
);

// ============ WAVE SYSTEM ============
const maxDistance = 15;
const maxRings = 10;
const maxDiffractionRings = 10;

let primaryRings = [];
let diffractionRings = [];
let isPlaying = false;
let frequency = 1.0;
let speed = 3.0;
let simTime = 0;
let timeSinceLastSpawn = 0;
let totalSpawned = 0;
let diffractionCount = 0;
let diffractionEnabled = true;

function createRingMesh(initialRadius) {
    const geom = new THREE.TorusGeometry(initialRadius, 0.05, 8, 64);
    const mat = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        transparent: true,
        opacity: 1.0,
        side: THREE.DoubleSide
    });
    // Add emissive glow effect
    mat.emissive = new THREE.Color(0x00ffff);
    const mesh = new THREE.Mesh(geom, mat);
    mesh.rotation.x = -Math.PI / 2; // Lie flat in XZ plane
    return mesh;
}

function spawnPrimaryRing() {
    const ring = {
        mesh: createRingMesh(0.1),
        radius: 0.1,
        origin: sourceMesh.position.clone(),
        isDiffraction: false,
        hasDiffracted: false,
        alive: true
    };
    ring.mesh.position.set(ring.origin.x, ring.origin.y, ring.origin.z);
    scene.add(ring.mesh);
    primaryRings.push(ring);
    totalSpawned++;
}

function spawnDiffractionRing(origin) {
    const ring = {
        mesh: createRingMesh(0.1),
        radius: 0.1,
        origin: origin.clone(),
        isDiffraction: true,
        hasDiffracted: false,
        alive: true
    };
    // Make diffraction rings a different color
    ring.mesh.material.color.set(0xff66ff);
    ring.mesh.position.set(ring.origin.x, ring.origin.y, ring.origin.z);
    scene.add(ring.mesh);
    diffractionRings.push(ring);
    diffractionCount++;
}

function updateRing(ring, dt) {
    if (!ring.alive) return;

    ring.radius += speed * dt;

    // Update geometry by disposing old and creating new
    ring.mesh.geometry.dispose();
    ring.mesh.geometry = new THREE.TorusGeometry(ring.radius, 0.05, 8, 64);

    // Update opacity based on distance
    const opacity = Math.max(0, 1 - ring.radius / maxDistance);
    ring.mesh.material.opacity = opacity;

    // Check if ring should be removed
    if (ring.radius >= maxDistance) {
        ring.alive = false;
        scene.remove(ring.mesh);
        ring.mesh.geometry.dispose();
        ring.mesh.material.dispose();
        return;
    }

    // Check diffraction for primary rings
    if (!ring.isDiffraction && !ring.hasDiffracted && diffractionEnabled && !wireframeMode) {
        // Calculate distance from ring origin to model position in XZ plane
        const dx = modelPosition.x - ring.origin.x;
        const dz = modelPosition.z - ring.origin.z;
        const distToModel = Math.sqrt(dx * dx + dz * dz);

        // Check if ring radius has reached the model
        if (ring.radius >= distToModel - modelBoundingRadius && ring.radius <= distToModel + modelBoundingRadius) {
            ring.hasDiffracted = true;
            spawnDiffractionRing(new THREE.Vector3(modelPosition.x, ring.origin.y, modelPosition.z));
        }
    }
}

function removeDeadRings() {
    primaryRings = primaryRings.filter(r => r.alive);
    diffractionRings = diffractionRings.filter(r => r.alive);
}

function clearAllRings() {
    [...primaryRings, ...diffractionRings].forEach(ring => {
        scene.remove(ring.mesh);
        ring.mesh.geometry.dispose();
        ring.mesh.material.dispose();
    });
    primaryRings = [];
    diffractionRings = [];
}

function resetSimulation() {
    clearAllRings();
    simTime = 0;
    timeSinceLastSpawn = 0;
    totalSpawned = 0;
    diffractionCount = 0;
    isPlaying = false;
    document.getElementById('btn-play').textContent = 'Play';
}

// ============ UI HANDLERS ============
const btnPlay = document.getElementById('btn-play');
const sliderFreq = document.getElementById('slider-freq');
const sliderSpeed = document.getElementById('slider-speed');
const labelFreq = document.getElementById('label-freq');
const labelSpeed = document.getElementById('label-speed');

btnPlay.addEventListener('click', () => {
    isPlaying = !isPlaying;
    btnPlay.textContent = isPlaying ? 'Pause' : 'Play';
});

sliderFreq.addEventListener('input', (e) => {
    frequency = parseFloat(e.target.value);
    labelFreq.textContent = frequency.toFixed(1);
});

sliderSpeed.addEventListener('input', (e) => {
    speed = parseFloat(e.target.value);
    labelSpeed.textContent = speed.toFixed(1);
});

document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'r') {
        resetSimulation();
    } else if (key === 'd') {
        diffractionEnabled = !diffractionEnabled;
        const el = document.getElementById('stat-diff-status');
        if (diffractionEnabled) {
            el.innerHTML = '<span class="status-indicator status-on"></span>ON';
        } else {
            el.innerHTML = '<span class="status-indicator status-off"></span>OFF';
        }
    } else if (key === 'm') {
        sourceIndex = (sourceIndex + 1) % sourcePositions.length;
        sourceMesh.position.copy(sourcePositions[sourceIndex]);
    }
});

// Click on model for wireframe toggle
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const target = nefertitiModel || placeholder;
    if (!target) return;

    const intersects = raycaster.intersectObject(target, true);
    if (intersects.length > 0) {
        wireframeMode = !wireframeMode;
        target.traverse((child) => {
            if (child.isMesh) {
                if (wireframeMode) {
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0x00ffff,
                        wireframe: true,
                        emissive: 0x004444,
                        emissiveIntensity: 0.5
                    });
                } else {
                    const orig = originalMaterials.find(o => o.mesh === child);
                    if (orig) {
                        child.material.dispose();
                        child.material = orig.material.clone();
                    }
                }
            }
        });
        const el = document.getElementById('stat-wire-status');
        if (wireframeMode) {
            el.innerHTML = '<span class="status-indicator status-on"></span>ON';
        } else {
            el.innerHTML = '<span class="status-indicator status-off"></span>OFF';
        }
    }
});

// ============ STATE ============
window.__3D_STATE__ = {
    isPlaying: false,
    frequency: 1.0,
    speed: 3.0,
    activeRings: 0,
    totalSpawned: 0,
    simTime: 0,
    diffractionEnabled: true,
    diffractionCount: 0,
    sourcePosition: { x: -8, y: 2, z: 0 },
    sourceIndex: 0,
    modelLoaded: false,
    wireframeMode: false,
    maxRingRadius: 0,
    paused: true
};

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    controls.update();

    // Animate source glow
    const t = clock.getElapsedTime();
    sourceGlowMat.opacity = 0.15 + 0.1 * Math.sin(t * 3);
    sourceLight.intensity = 1.5 + 0.5 * Math.sin(t * 4);

    if (isPlaying) {
        simTime += dt;
        timeSinceLastSpawn += dt;

        // Spawn new rings based on frequency
        const spawnInterval = 1.0 / frequency;
        while (timeSinceLastSpawn >= spawnInterval) {
            timeSinceLastSpawn -= spawnInterval;
            if (primaryRings.length < maxRings) {
                spawnPrimaryRing();
            }
        }

        // Update all rings
        primaryRings.forEach(ring => updateRing(ring, dt));
        diffractionRings.forEach(ring => updateRing(ring, dt));

        // Clean up dead rings
        removeDeadRings();
    }

    // Calculate max ring radius
    let maxRingRadius = 0;
    primaryRings.forEach(r => {
        if (r.alive && r.radius > maxRingRadius) maxRingRadius = r.radius;
    });

    // Update HUD
    const activeCount = primaryRings.filter(r => r.alive).length + diffractionRings.filter(r => r.alive).length;
    document.getElementById('stat-active').textContent = activeCount;
    document.getElementById('stat-total').textContent = totalSpawned;
    document.getElementById('stat-time').textContent = simTime.toFixed(1) + 's';
    document.getElementById('stat-diffraction').textContent = diffractionCount;

    const sp = sourceMesh.position;
    document.getElementById('stat-source').textContent = `(${sp.x}, ${sp.y}, ${sp.z})`;

    // Update global state
    window.__3D_STATE__ = {
        isPlaying,
        frequency,
        speed,
        activeRings: primaryRings.filter(r => r.alive).length,
        totalSpawned,
        simTime,
        diffractionEnabled,
        diffractionCount,
        sourcePosition: { x: sp.x, y: sp.y, z: sp.z },
        sourceIndex,
        modelLoaded,
        wireframeMode,
        maxRingRadius,
        paused: !isPlaying
    };

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
