<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Sound Wave Propagation - Nefertiti Diffraction</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0e0f14;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #controls-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(20, 24, 34, 0.78);
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      min-width: 240px;
      backdrop-filter: blur(4px);
    }

    #controls-panel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 700;
    }

    .control-group {
      margin-bottom: 10px;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #d7e3ff;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      width: 150px;
    }

    button {
      background: #2d7ef7;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #4c92f8;
    }

    .hint {
      font-size: 12px;
      color: #b8c4dc;
      line-height: 1.4;
      margin-top: 8px;
    }

    #hud-stats {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(20, 24, 34, 0.78);
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      min-width: 220px;
      backdrop-filter: blur(4px);
      font-size: 13px;
      line-height: 1.5;
    }

    #loading {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      background: rgba(0,0,0,0.55);
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="controls-panel">
      <h3>Sound Wave Controls</h3>

      <div class="control-group">
        <button id="btn-play">Play</button>
      </div>

      <div class="control-group">
        <label for="slider-freq">Frequency: <span id="label-freq">1.0</span> Hz</label>
        <div class="control-row">
          <input id="slider-freq" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
        </div>
      </div>

      <div class="control-group">
        <label for="slider-speed">Wave Speed: <span id="label-speed">3.0</span> units/s</label>
        <div class="control-row">
          <input id="slider-speed" type="range" min="1.0" max="6.0" step="0.5" value="3.0" />
        </div>
      </div>

      <div class="hint">
        Keys:<br>
        <strong>R</strong> Reset<br>
        <strong>D</strong> Toggle diffraction<br>
        <strong>M</strong> Move source<br>
        Click Nefertiti to toggle wireframe
      </div>
    </div>

    <div id="hud-stats">
      <div><strong>HUD Stats</strong></div>
      <div id="stats-content"></div>
    </div>

    <div id="loading">Loading Nefertiti.glb...</div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const btnPlay = document.getElementById("btn-play");
    const sliderFreq = document.getElementById("slider-freq");
    const sliderSpeed = document.getElementById("slider-speed");
    const labelFreq = document.getElementById("label-freq");
    const labelSpeed = document.getElementById("label-speed");
    const statsContent = document.getElementById("stats-content");
    const loadingEl = document.getElementById("loading");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0e0f14);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // Ground
    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.95, metalness: 0.05 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // Grid helper for education context
    const grid = new THREE.GridHelper(40, 40, 0x334455, 0x223344);
    grid.position.y = 0.001;
    scene.add(grid);

    // Source positions cycle
    const sourcePositions = [
      new THREE.Vector3(-8, 2, 0),
      new THREE.Vector3(0, 2, 8),
      new THREE.Vector3(8, 2, 0),
      new THREE.Vector3(0, 2, -8)
    ];

    // Sound source
    const emitterGeo = new THREE.SphereGeometry(0.3, 24, 24);
    const emitterMat = new THREE.MeshStandardMaterial({
      color: 0xffee22,
      emissive: 0xffdd00,
      emissiveIntensity: 1.8
    });
    const emitter = new THREE.Mesh(emitterGeo, emitterMat);
    let sourceIndex = 0;
    emitter.position.copy(sourcePositions[sourceIndex]);
    scene.add(emitter);

    // Optional source glow
    const sourceGlow = new THREE.PointLight(0xffee66, 1.2, 8);
    sourceGlow.position.copy(emitter.position);
    scene.add(sourceGlow);

    // Nefertiti model
    const loader = new GLTFLoader();
    let nefertitiModel = null;
    let modelLoaded = false;
    let wireframeMode = false;
    const modelPosition = new THREE.Vector3(0, 1.5, 0);
    const modelRingOrigin = new THREE.Vector3(0, 2.0, 0); // used for diffraction ring spawn
    const modelBoundingRadius = 1.5;

    loader.load(
      "Nefertiti.glb",
      (gltf) => {
        nefertitiModel = gltf.scene;
        nefertitiModel.position.copy(modelPosition);
        nefertitiModel.scale.setScalar(0.03);
        scene.add(nefertitiModel);
        modelLoaded = true;
        loadingEl.style.display = "none";

        nefertitiModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = true;
            if (Array.isArray(child.material)) {
              child.material = child.material.map(mat => mat.clone());
            } else if (child.material) {
              child.material = child.material.clone();
            }
          }
        });
      },
      undefined,
      (err) => {
        console.warn("Could not load Nefertiti.glb:", err);
        loadingEl.textContent = "Could not load Nefertiti.glb";
      }
    );

    // Ring system
    const MAX_PRIMARY_RINGS = 10;
    const maxDistance = 15;
    const activePrimaryRings = [];
    const activeSecondaryRings = [];

    let totalSpawned = 0;
    let diffractionCount = 0;

    function createRing(color = 0x00ffff) {
      const geo = new THREE.TorusGeometry(1, 0.05, 8, 64);
      const mat = new THREE.MeshStandardMaterial({
        color,
        emissive: color,
        emissiveIntensity: 1.5,
        transparent: true,
        opacity: 1,
        roughness: 0.25,
        metalness: 0.1
      });
      const ring = new THREE.Mesh(geo, mat);
      ring.rotation.x = Math.PI / 2; // lie flat in XZ plane
      ring.visible = false;
      ring.userData = {
        active: false,
        radius: 0.1,
        origin: new THREE.Vector3(),
        isSecondary: false,
        diffractionSpawned: false
      };
      scene.add(ring);
      return ring;
    }

    const primaryPool = Array.from({ length: MAX_PRIMARY_RINGS }, () => createRing(0x00ffff));

    function getAvailablePrimaryRing() {
      return primaryPool.find(r => !r.userData.active) || null;
    }

    function spawnPrimaryRing() {
      const ring = getAvailablePrimaryRing();
      if (!ring) return;

      ring.userData.active = true;
      ring.userData.radius = 0.1;
      ring.userData.origin.copy(emitter.position);
      ring.userData.isSecondary = false;
      ring.userData.diffractionSpawned = false;
      ring.position.copy(emitter.position);
      ring.scale.setScalar(0.1);
      ring.visible = true;
      ring.material.opacity = 1.0;
      activePrimaryRings.push(ring);
      totalSpawned++;
    }

    function spawnSecondaryRing(origin) {
      const ring = createRing(0x88ffff);
      ring.userData.active = true;
      ring.userData.radius = 0.08;
      ring.userData.origin.copy(origin);
      ring.userData.isSecondary = true;
      ring.userData.diffractionSpawned = true;
      ring.position.copy(origin);
      ring.scale.setScalar(0.08);
      ring.visible = true;
      ring.material.opacity = 0.9;
      activeSecondaryRings.push(ring);
      diffractionCount++;
    }

    function deactivateRing(ring, primaryArray = null, secondaryArray = null) {
      ring.userData.active = false;
      ring.visible = false;
      if (primaryArray) {
        const idx = primaryArray.indexOf(ring);
        if (idx >= 0) primaryArray.splice(idx, 1);
      }
      if (secondaryArray) {
        const idx = secondaryArray.indexOf(ring);
        if (idx >= 0) secondaryArray.splice(idx, 1);
        scene.remove(ring);
        ring.geometry.dispose();
        ring.material.dispose();
      }
    }

    // Simulation state
    let isPlaying = false;
    let frequency = parseFloat(sliderFreq.value);
    let speed = parseFloat(sliderSpeed.value);
    let simTime = 0;
    let spawnAccumulator = 0;
    let diffractionEnabled = true;

    function resetSimulation() {
      isPlaying = false;
      btnPlay.textContent = "Play";
      simTime = 0;
      spawnAccumulator = 0;
      totalSpawned = 0;
      diffractionCount = 0;

      [...activePrimaryRings].forEach(r => deactivateRing(r, activePrimaryRings, null));
      [...activeSecondaryRings].forEach(r => deactivateRing(r, null, activeSecondaryRings));
    }

    // UI
    btnPlay.addEventListener("click", () => {
      isPlaying = !isPlaying;
      btnPlay.textContent = isPlaying ? "Pause" : "Play";
    });

    sliderFreq.addEventListener("input", () => {
      frequency = parseFloat(sliderFreq.value);
      labelFreq.textContent = frequency.toFixed(1);
    });

    sliderSpeed.addEventListener("input", () => {
      speed = parseFloat(sliderSpeed.value);
      labelSpeed.textContent = speed.toFixed(1);
    });

    labelFreq.textContent = frequency.toFixed(1);
    labelSpeed.textContent = speed.toFixed(1);

    // Keyboard interactions
    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "r") {
        resetSimulation();
      } else if (key === "d") {
        diffractionEnabled = !diffractionEnabled;
      } else if (key === "m") {
        sourceIndex = (sourceIndex + 1) % sourcePositions.length;
        emitter.position.copy(sourcePositions[sourceIndex]);
        sourceGlow.position.copy(emitter.position);
      }
    });

    // Raycaster for clicking model
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function setWireframeOnModel(enabled) {
      wireframeMode = enabled;
      if (!nefertitiModel) return;
      nefertitiModel.traverse((child) => {
        if (child.isMesh && child.material) {
          if (Array.isArray(child.material)) {
            child.material.forEach(mat => mat.wireframe = enabled);
          } else {
            child.material.wireframe = enabled;
          }
        }
      });
    }

    renderer.domElement.addEventListener("click", (event) => {
      if (!nefertitiModel) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const clickableMeshes = [];
      nefertitiModel.traverse((child) => {
        if (child.isMesh) clickableMeshes.push(child);
      });

      const intersects = raycaster.intersectObjects(clickableMeshes, true);
      if (intersects.length > 0) {
        setWireframeOnModel(!wireframeMode);
      }
    });

    // Update ring visual
    function updateRing(ring, dt, isPrimary) {
      ring.userData.radius += speed * dt;
      const radius = ring.userData.radius;
      ring.scale.set(radius, radius, radius);

      const distance = radius;
      ring.material.opacity = Math.max(0, 1 - distance / maxDistance);

      if (isPrimary) {
        const effectiveDiffractionAllowed = diffractionEnabled && !wireframeMode;
        if (
          effectiveDiffractionAllowed &&
          !ring.userData.diffractionSpawned &&
          Math.abs(radius - ring.userData.origin.distanceTo(modelRingOrigin)) <= speed * dt + modelBoundingRadius
        ) {
          ring.userData.diffractionSpawned = true;
          spawnSecondaryRing(modelRingOrigin);
        }
      }

      if (radius >= maxDistance) {
        if (isPrimary) {
          deactivateRing(ring, activePrimaryRings, null);
        } else {
          deactivateRing(ring, null, activeSecondaryRings);
        }
      }
    }

    function updateHUD() {
      const maxRingRadius = activePrimaryRings.reduce((m, r) => Math.max(m, r.userData.radius), 0);

      statsContent.innerHTML = `
        Active primary rings: ${activePrimaryRings.length}<br>
        Total primary spawned: ${totalSpawned}<br>
        Simulation time: ${simTime.toFixed(1)} s<br>
        Diffraction count: ${diffractionCount}<br>
        Diffraction: ${diffractionEnabled ? "ON" : "OFF"}<br>
        Model wireframe: ${wireframeMode ? "ON" : "OFF"}
      `;

      window.__3D_STATE__ = {
        isPlaying,
        frequency,
        speed,
        activeRings: activePrimaryRings.length,
        totalSpawned,
        simTime,
        diffractionEnabled,
        diffractionCount,
        sourcePosition: {
          x: emitter.position.x,
          y: emitter.position.y,
          z: emitter.position.z
        },
        sourceIndex,
        modelLoaded,
        wireframeMode,
        maxRingRadius,
        paused: !isPlaying
      };
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      controls.update();

      if (isPlaying) {
        simTime += dt;
        spawnAccumulator += dt;

        const spawnInterval = 1 / frequency;
        while (spawnAccumulator >= spawnInterval) {
          spawnPrimaryRing();
          spawnAccumulator -= spawnInterval;
        }

        for (let i = activePrimaryRings.length - 1; i >= 0; i--) {
          updateRing(activePrimaryRings[i], dt, true);
        }

        for (let i = activeSecondaryRings.length - 1; i >= 0; i--) {
          updateRing(activeSecondaryRings[i], dt, false);
        }
      }

      // Subtle source pulse
      const pulse = 1 + (isPlaying ? 0.08 * Math.sin(performance.now() * 0.008) : 0);
      emitter.scale.setScalar(pulse);

      updateHUD();
      renderer.render(scene, camera);
    }

    updateHUD();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
