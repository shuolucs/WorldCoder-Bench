<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sound Wave Propagation Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(20, 25, 35, 0.85);
            color: #e0e0e0;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #334;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            user-select: none;
        }
        #controls-panel {
            top: 15px;
            left: 15px;
            width: 260px;
        }
        #hud-stats {
            top: 15px;
            right: 15px;
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95em;
            line-height: 1.5;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 1.2em;
            color: #fff;
            border-bottom: 1px solid #445;
            padding-bottom: 5px;
        }
        button {
            background: #0078d7;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 15px;
        }
        button:hover {
            background: #005a9e;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .shortcuts {
            margin-top: 20px;
            font-size: 0.8em;
            color: #aaa;
            line-height: 1.6;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 4px;
        }
        .shortcuts span {
            color: #fff;
            font-weight: bold;
        }
        .stat-value {
            color: #00ffff;
            font-weight: bold;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="controls-panel" class="panel">
        <h2>Wave Controls</h2>
        <button id="btn-play">Play</button>
        
        <div class="control-group">
            <label>Frequency: <span id="label-freq">1.0 Hz</span></label>
            <input type="range" id="slider-freq" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>
        
        <div class="control-group">
            <label>Speed: <span id="label-speed">3.0 u/s</span></label>
            <input type="range" id="slider-speed" min="1.0" max="6.0" step="0.5" value="3.0">
        </div>

        <div class="shortcuts">
            <div><span>[R]</span> Reset Simulation</div>
            <div><span>[D]</span> Toggle Diffraction</div>
            <div><span>[M]</span> Move Sound Source</div>
            <div><span>Click Model</span> Toggle Wireframe</div>
        </div>
    </div>

    <div id="hud-stats" class="panel">
        <div>Active Rings: <span id="stat-active" class="stat-value">0</span></div>
        <div>Total Spawned: <span id="stat-total" class="stat-value">0</span></div>
        <div>Sim Time: <span id="stat-time" class="stat-value">0.0</span>s</div>
        <div>Diffractions: <span id="stat-diff" class="stat-value">0</span></div>
        <div style="margin-top: 10px; border-top: 1px solid #445; padding-top: 5px;">
            Diffraction Mode: <span id="stat-dmode" class="stat-value">ON</span>
        </div>
        <div>Wireframe Mode: <span id="stat-wire" class="stat-value">OFF</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            isPlaying: false,
            frequency: 1.0,
            speed: 3.0,
            activeRings: 0,
            totalSpawned: 0,
            simTime: 0,
            diffractionEnabled: true,
            diffractionCount: 0,
            sourcePosition: { x: -8, y: 2, z: 0 },
            sourceIndex: 0,
            modelLoaded: false,
            wireframeMode: false,
            maxRingRadius: 0,
            paused: true
        };

        const state = window.__3D_STATE__;
        const MAX_DISTANCE = 15;
        const sourcePositions = [
            new THREE.Vector3(-8, 2, 0),
            new THREE.Vector3(0, 2, 8),
            new THREE.Vector3(8, 2, 0),
            new THREE.Vector3(0, 2, -8)
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lighting ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Environment ---
        const groundGeo = new THREE.PlaneGeometry(40, 40);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- Objects ---
        // Sound Source
        const sourceGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const sourceMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const sourceMesh = new THREE.Mesh(sourceGeo, sourceMat);
        sourceMesh.position.copy(sourcePositions[0]);
        scene.add(sourceMesh);

        // Model Loading
        let nefertitiModel = null;
        const loader = new GLTFLoader();
        
        // Fallback geometry in case the file is not present locally
        const createFallbackModel = () => {
            const group = new THREE.Group();
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1, 1, 32), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
            base.position.y = 0.5;
            const bust = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
            bust.position.y = 2;
            group.add(base);
            group.add(bust);
            return group;
        };

        loader.load(
            'Nefertiti.glb',
            (gltf) => {
                nefertitiModel = gltf.scene;
                nefertitiModel.position.set(0, 1.5, 0);
                nefertitiModel.scale.set(0.03, 0.03, 0.03);
                scene.add(nefertitiModel);
                state.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn("Could not load 'Nefertiti.glb'. Using fallback geometry for demonstration.");
                nefertitiModel = createFallbackModel();
                scene.add(nefertitiModel);
                state.modelLoaded = true;
            }
        );

        // --- Wave System ---
        class WavePool {
            constructor(maxSize, isDiffraction = false) {
                this.pool = [];
                this.isDiffraction = isDiffraction;
                
                for (let i = 0; i < maxSize; i++) {
                    const material = new THREE.MeshBasicMaterial({
                        color: 0x00ffff,
                        transparent: true,
                        opacity: 0,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });
                    
                    const mesh = new THREE.Mesh(new THREE.BufferGeometry(), material);
                    mesh.rotation.x = Math.PI / 2;
                    mesh.visible = false;
                    scene.add(mesh);
                    
                    this.pool.push({
                        active: false,
                        radius: 0.1,
                        mesh: mesh,
                        sourcePos: new THREE.Vector3(),
                        hasDiffracted: false
                    });
                }
            }

            spawn(position) {
                const wave = this.pool.find(w => !w.active);
                if (wave) {
                    wave.active = true;
                    wave.radius = 0.1;
                    wave.hasDiffracted = false;
                    wave.sourcePos.copy(position);
                    wave.mesh.position.copy(position);
                    wave.mesh.visible = true;
                    this.updateGeometry(wave);
                    return wave;
                }
                return null;
            }

            updateGeometry(wave) {
                if (wave.mesh.geometry) {
                    wave.mesh.geometry.dispose();
                }
                wave.mesh.geometry = new THREE.TorusGeometry(wave.radius, 0.05, 8, 64);
            }

            reset() {
                this.pool.forEach(wave => {
                    wave.active = false;
                    wave.mesh.visible = false;
                });
            }
        }

        const primaryWaves = new WavePool(10, false);
        const diffractionWaves = new WavePool(10, true);

        // --- Interaction Logic ---
        const btnPlay = document.getElementById('btn-play');
        const sliderFreq = document.getElementById('slider-freq');
        const sliderSpeed = document.getElementById('slider-speed');
        const labelFreq = document.getElementById('label-freq');
        const labelSpeed = document.getElementById('label-speed');

        const togglePlay = () => {
            state.isPlaying = !state.isPlaying;
            state.paused = !state.isPlaying;
            btnPlay.innerText = state.isPlaying ? 'Pause' : 'Play';
            btnPlay.style.background = state.isPlaying ? '#d83b01' : '#0078d7';
            if (state.isPlaying) clock.getDelta(); // Reset delta to avoid jump
        };

        btnPlay.addEventListener('click', togglePlay);

        sliderFreq.addEventListener('input', (e) => {
            state.frequency = parseFloat(e.target.value);
            labelFreq.innerText = `${state.frequency.toFixed(1)} Hz`;
        });

        sliderSpeed.addEventListener('input', (e) => {
            state.speed = parseFloat(e.target.value);
            labelSpeed.innerText = `${state.speed.toFixed(1)} u/s`;
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                // Reset
                state.isPlaying = false;
                state.paused = true;
                btnPlay.innerText = 'Play';
                btnPlay.style.background = '#0078d7';
                state.simTime = 0;
                state.totalSpawned = 0;
                state.diffractionCount = 0;
                state.activeRings = 0;
                state.maxRingRadius = 0;
                lastSpawnTime = 0;
                primaryWaves.reset();
                diffractionWaves.reset();
            } else if (key === 'd') {
                // Toggle Diffraction
                state.diffractionEnabled = !state.diffractionEnabled;
            } else if (key === 'm') {
                // Move Source
                state.sourceIndex = (state.sourceIndex + 1) % sourcePositions.length;
                const newPos = sourcePositions[state.sourceIndex];
                sourceMesh.position.copy(newPos);
                state.sourcePosition = { x: newPos.x, y: newPos.y, z: newPos.z };
            }
        });

        // Raycaster for model clicking
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            // Ignore UI clicks
            if (e.target.closest('.panel')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            if (nefertitiModel) {
                const intersects = raycaster.intersectObject(nefertitiModel, true);
                if (intersects.length > 0) {
                    state.wireframeMode = !state.wireframeMode;
                    nefertitiModel.traverse((child) => {
                        if (child.isMesh && child.material) {
                            child.material.wireframe = state.wireframeMode;
                        }
                    });
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();
        let lastSpawnTime = 0;

        function updateHUD() {
            document.getElementById('stat-active').innerText = state.activeRings;
            document.getElementById('stat-total').innerText = state.totalSpawned;
            document.getElementById('stat-time').innerText = state.simTime.toFixed(1);
            document.getElementById('stat-diff').innerText = state.diffractionCount;
            
            const dModeEl = document.getElementById('stat-dmode');
            dModeEl.innerText = state.diffractionEnabled ? 'ON' : 'OFF';
            dModeEl.style.color = state.diffractionEnabled ? '#00ff00' : '#ff4444';
            
            const wModeEl = document.getElementById('stat-wire');
            wModeEl.innerText = state.wireframeMode ? 'ON' : 'OFF';
            wModeEl.style.color = state.wireframeMode ? '#00ff00' : '#ff4444';
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (state.isPlaying) {
                state.simTime += delta;

                // Spawn primary waves
                const spawnInterval = 1.0 / state.frequency;
                if (state.simTime - lastSpawnTime >= spawnInterval) {
                    if (primaryWaves.spawn(sourceMesh.position)) {
                        state.totalSpawned++;
                    }
                    lastSpawnTime = state.simTime;
                }

                let currentActive = 0;
                let currentMaxRadius = 0;

                // Update primary waves
                primaryWaves.pool.forEach(wave => {
                    if (wave.active) {
                        wave.radius += state.speed * delta;
                        
                        if (wave.radius >= MAX_DISTANCE) {
                            wave.active = false;
                            wave.mesh.visible = false;
                        } else {
                            currentActive++;
                            currentMaxRadius = Math.max(currentMaxRadius, wave.radius);
                            primaryWaves.updateGeometry(wave);
                            wave.mesh.material.opacity = Math.max(0, 1 - wave.radius / MAX_DISTANCE);

                            // Diffraction Logic
                            // Calculate distance from source to model (approx origin x=0, z=0)
                            const distToModel = new THREE.Vector2(wave.sourcePos.x, wave.sourcePos.z).distanceTo(new THREE.Vector2(0, 0));
                            
                            if (!wave.hasDiffracted && wave.radius >= distToModel) {
                                wave.hasDiffracted = true;
                                if (state.diffractionEnabled && !state.wireframeMode) {
                                    // Spawn diffraction ring at model position (0, 2, 0)
                                    if (diffractionWaves.spawn(new THREE.Vector3(0, 2, 0))) {
                                        state.diffractionCount++;
                                    }
                                }
                            }
                        }
                    }
                });

                // Update diffraction waves
                diffractionWaves.pool.forEach(wave => {
                    if (wave.active) {
                        wave.radius += state.speed * delta;
                        if (wave.radius >= MAX_DISTANCE) {
                            wave.active = false;
                            wave.mesh.visible = false;
                        } else {
                            currentActive++;
                            currentMaxRadius = Math.max(currentMaxRadius, wave.radius);
                            diffractionWaves.updateGeometry(wave);
                            wave.mesh.material.opacity = Math.max(0, 1 - wave.radius / MAX_DISTANCE);
                        }
                    }
                });

                state.activeRings = currentActive;
                state.maxRingRadius = currentMaxRadius;
            }

            updateHUD();
            controls.update();
            renderer.render(scene, camera);
        }

        // Start loop
        animate();
    </script>
</body>
</html>
