<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Billiard Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid #333;
        }
        #hud span {
            font-weight: bold;
            color: #4da6ff;
        }
        #controls-help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #ccc;
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 12px;
        }
        #power-bar-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }
        #power-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            transition: width 0.05s;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="container"></div>
    
    <div id="hud">
        <div>Balls on table: <span id="hud-balls">16</span></div>
        <div>Pocketed: <span id="hud-pocketed">0</span></div>
        <div>Shots: <span id="hud-shots">0</span></div>
        <div>Cue Speed: <span id="hud-cue-speed">0.000</span></div>
        <div>All Stopped: <span id="hud-stopped">Yes</span></div>
        <div>Last Pocketed: <span id="hud-last-pocket">None</span></div>
    </div>

    <div id="controls-help">
        Mouse: Aim | Click & Drag Down: Power | Release: Shoot<br>
        [R]: Re-rack | [C]: Reset Cue Ball | [Space]: Toggle Camera
    </div>

    <div id="power-bar-container">
        <div id="power-bar"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            ballsOnTable: 16,
            pocketedCount: 0,
            shotCount: 0,
            cueBallSpeed: 0,
            allStopped: true,
            lastPocketed: -1,
            aimAngle: 0,
            power: 0,
            frameCount: 0,
            ballsValid: true,
            totalKE: 0
        };

        // --- Constants ---
        const BALL_RADIUS = 0.05;
        const TABLE_Y = 0.75;
        const BALL_Y = TABLE_Y + BALL_RADIUS;
        const TABLE_WIDTH = 3.6;
        const TABLE_LENGTH = 1.8;
        const RAIL_WIDTH = 0.12;
        const POCKET_RADIUS = 0.08;
        const POCKET_EXCLUSION = 0.12; // Distance from pocket center where cushion bounce is disabled
        
        // Physics
        const DT = 1 / 120;
        const SUBSTEPS = 2;
        const RESTITUTION = 0.95;
        const CUSHION_RESTITUTION = 0.7;
        const FRICTION = 1.5;
        const STOP_VELOCITY = 0.001;

        // --- Scene Setup ---
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 6);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0.5, 0);
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.enableDamping = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x445544, 0.3);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffeedd, 2.0);
        spotLight.position.set(0, 6, 0);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 2048;
        spotLight.shadow.mapSize.height = 2048;
        spotLight.shadow.camera.near = 1;
        spotLight.shadow.camera.far = 10;
        scene.add(spotLight);

        // --- Table Construction ---
        const tableGroup = new THREE.Group();
        scene.add(tableGroup);

        // Surface
        const surfaceGeo = new THREE.BoxGeometry(TABLE_WIDTH, 0.1, TABLE_LENGTH);
        const surfaceMat = new THREE.MeshStandardMaterial({ color: 0x0a6e0a, roughness: 0.8 });
        const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
        surface.position.y = TABLE_Y - 0.05;
        surface.receiveShadow = true;
        tableGroup.add(surface);

        // Rails
        const railMat = new THREE.MeshStandardMaterial({ color: 0x664422, roughness: 0.6 });
        const railH = 0.15;
        
        const longRailGeo = new THREE.BoxGeometry(TABLE_WIDTH + RAIL_WIDTH*2, railH, RAIL_WIDTH);
        const shortRailGeo = new THREE.BoxGeometry(RAIL_WIDTH, railH, TABLE_LENGTH);

        const railN = new THREE.Mesh(longRailGeo, railMat);
        railN.position.set(0, TABLE_Y + railH/2 - 0.05, -TABLE_LENGTH/2 - RAIL_WIDTH/2);
        railN.castShadow = true; railN.receiveShadow = true;
        
        const railS = new THREE.Mesh(longRailGeo, railMat);
        railS.position.set(0, TABLE_Y + railH/2 - 0.05, TABLE_LENGTH/2 + RAIL_WIDTH/2);
        railS.castShadow = true; railS.receiveShadow = true;

        const railE = new THREE.Mesh(shortRailGeo, railMat);
        railE.position.set(TABLE_WIDTH/2 + RAIL_WIDTH/2, TABLE_Y + railH/2 - 0.05, 0);
        railE.castShadow = true; railE.receiveShadow = true;

        const railW = new THREE.Mesh(shortRailGeo, railMat);
        railW.position.set(-TABLE_WIDTH/2 - RAIL_WIDTH/2, TABLE_Y + railH/2 - 0.05, 0);
        railW.castShadow = true; railW.receiveShadow = true;

        tableGroup.add(railN, railS, railE, railW);

        // Pockets
        const pocketCenters = [
            new THREE.Vector2(-TABLE_WIDTH/2, -TABLE_LENGTH/2),
            new THREE.Vector2(0, -TABLE_LENGTH/2),
            new THREE.Vector2(TABLE_WIDTH/2, -TABLE_LENGTH/2),
            new THREE.Vector2(-TABLE_WIDTH/2, TABLE_LENGTH/2),
            new THREE.Vector2(0, TABLE_LENGTH/2),
            new THREE.Vector2(TABLE_WIDTH/2, TABLE_LENGTH/2)
        ];

        const pocketGeo = new THREE.CylinderGeometry(POCKET_RADIUS, POCKET_RADIUS, 0.11, 32);
        const pocketMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        pocketCenters.forEach(p => {
            const pocket = new THREE.Mesh(pocketGeo, pocketMat);
            pocket.position.set(p.x, TABLE_Y - 0.05, p.y);
            tableGroup.add(pocket);
        });

        // Legs
        const legGeo = new THREE.CylinderGeometry(0.06, 0.06, TABLE_Y, 16);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x332211 });
        const legPos = [
            [-TABLE_WIDTH/2 + 0.2, -TABLE_LENGTH/2 + 0.2],
            [TABLE_WIDTH/2 - 0.2, -TABLE_LENGTH/2 + 0.2],
            [-TABLE_WIDTH/2 + 0.2, TABLE_LENGTH/2 - 0.2],
            [TABLE_WIDTH/2 - 0.2, TABLE_LENGTH/2 - 0.2]
        ];
        legPos.forEach(p => {
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(p[0], TABLE_Y/2, p[1]);
            leg.castShadow = true;
            tableGroup.add(leg);
        });

        // --- Balls ---
        const balls = [];
        const ballColors = [
            0xffffff, // 0: Cue
            0xddcc00, // 1: Yellow
            0x0000cc, // 2: Blue
            0xcc0000, // 3: Red
            0x660066, // 4: Purple
            0xff6600, // 5: Orange
            0x008800, // 6: Green
            0x800000, // 7: Maroon
            0x111111, // 8: Black
            0xddcc00, 0x0000cc, 0xcc0000, 0x660066, 0xff6600, 0x008800, 0x800000 // 9-15 Stripes
        ];

        function createStripeTexture(colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 256, 128);
            ctx.fillStyle = '#' + colorHex.toString(16).padStart(6, '0');
            ctx.fillRect(0, 32, 256, 64);
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
        
        for (let i = 0; i <= 15; i++) {
            let mat;
            if (i === 0 || i === 8 || i < 9) {
                mat = new THREE.MeshStandardMaterial({ 
                    color: ballColors[i], roughness: 0.2, metalness: 0.1 
                });
            } else {
                mat = new THREE.MeshStandardMaterial({ 
                    map: createStripeTexture(ballColors[i]), roughness: 0.2, metalness: 0.1 
                });
            }

            const mesh = new THREE.Mesh(ballGeo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            balls.push({
                id: i,
                mesh: mesh,
                pos: new THREE.Vector2(),
                vel: new THREE.Vector2(),
                active: true
            });
        }

        function rackBalls() {
            // Cue ball
            balls[0].pos.set(0, 0.6);
            balls[0].vel.set(0, 0);
            balls[0].active = true;

            const startZ = -0.5;
            const spacing = BALL_RADIUS * 2.01;
            const rowH = spacing * Math.sqrt(3) / 2;

            // Standard 8-ball rack pattern (simplified)
            const order = [1, 9, 2, 10, 8, 3, 11, 4, 12, 5, 13, 14, 6, 15, 7];
            let idx = 0;

            for (let row = 0; row < 5; row++) {
                const z = startZ - row * rowH;
                const startX = -row * spacing / 2;
                for (let col = 0; col <= row; col++) {
                    const x = startX + col * spacing;
                    const ballId = order[idx++];
                    balls[ballId].pos.set(x, z);
                    balls[ballId].vel.set(0, 0);
                    balls[ballId].active = true;
                }
            }

            // Reset state
            window.__3D_STATE__.pocketedCount = 0;
            window.__3D_STATE__.ballsOnTable = 16;
            window.__3D_STATE__.lastPocketed = -1;
            
            updateMeshPositions();
        }

        function updateMeshPositions() {
            balls.forEach(b => {
                if (b.active) {
                    b.mesh.position.set(b.pos.x, BALL_Y, b.pos.y);
                } else {
                    // Hide pocketed balls
                    b.mesh.position.set(b.id * 0.12 - 0.9, 0.2, TABLE_LENGTH/2 + 0.3);
                }
            });
        }

        rackBalls();

        // --- Cue Stick ---
        const cueGeo = new THREE.CylinderGeometry(0.01, 0.015, 2, 16);
        cueGeo.translate(0, 1, 0); // Pivot at tip
        cueGeo.rotateX(Math.PI / 2); // Align with Z
        const cueMat = new THREE.MeshStandardMaterial({ color: 0xaa8844, roughness: 0.4 });
        const cueStick = new THREE.Mesh(cueGeo, cueMat);
        scene.add(cueStick);

        // --- Interaction & Aiming ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tablePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -BALL_Y);
        
        let isAiming = false;
        let isDragging = false;
        let dragStartY = 0;
        let currentPower = 0;
        const MAX_POWER = 15;

        const powerBarContainer = document.getElementById('power-bar-container');
        const powerBar = document.getElementById('power-bar');

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (window.__3D_STATE__.allStopped && balls[0].active && !isDragging) {
                raycaster.setFromCamera(mouse, camera);
                const target = new THREE.Vector3();
                if (raycaster.ray.intersectPlane(tablePlane, target)) {
                    window.__3D_STATE__.aimAngle = Math.atan2(target.z - balls[0].pos.y, target.x - balls[0].pos.x);
                }
            }

            if (isDragging) {
                const deltaY = e.clientY - dragStartY;
                currentPower = Math.max(0, Math.min(MAX_POWER, deltaY * 0.05));
                window.__3D_STATE__.power = currentPower;
                powerBar.style.width = `${(currentPower / MAX_POWER) * 100}%`;
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (window.__3D_STATE__.allStopped && balls[0].active && e.button === 0) {
                isDragging = true;
                dragStartY = e.clientY;
                currentPower = 0;
                powerBarContainer.style.display = 'block';
                powerBar.style.width = '0%';
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (isDragging) {
                isDragging = false;
                powerBarContainer.style.display = 'none';
                
                if (currentPower > 0.5) {
                    // Shoot
                    const angle = window.__3D_STATE__.aimAngle;
                    // Reverse angle because aim is towards target, cue hits from behind
                    balls[0].vel.x = -Math.cos(angle) * currentPower;
                    balls[0].vel.y = -Math.sin(angle) * currentPower; // y is z in 2D
                    
                    window.__3D_STATE__.shotCount++;
                    window.__3D_STATE__.allStopped = false;
                }
                currentPower = 0;
                window.__3D_STATE__.power = 0;
            }
        });

        // Keyboard controls
        let isTopDown = false;
        const defaultCamPos = new THREE.Vector3(0, 8, 6);
        const topDownCamPos = new THREE.Vector3(0, 10, 0);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyR') {
                rackBalls();
            } else if (e.code === 'KeyC') {
                if (!balls[0].active || window.__3D_STATE__.allStopped) {
                    balls[0].pos.set(0, 0.6);
                    balls[0].vel.set(0, 0);
                    balls[0].active = true;
                    if(window.__3D_STATE__.lastPocketed === 0) window.__3D_STATE__.lastPocketed = -1;
                    updateMeshPositions();
                }
            } else if (e.code === 'Space') {
                isTopDown = !isTopDown;
                if (isTopDown) {
                    camera.position.copy(topDownCamPos);
                    controls.target.set(0, 0, 0);
                } else {
                    camera.position.copy(defaultCamPos);
                    controls.target.set(0, 0.5, 0);
                }
                controls.update();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics Engine ---
        function checkPocket(ball) {
            for (let i = 0; i < pocketCenters.length; i++) {
                if (ball.pos.distanceTo(pocketCenters[i]) < POCKET_RADIUS) {
                    ball.active = false;
                    ball.vel.set(0, 0);
                    window.__3D_STATE__.pocketedCount++;
                    window.__3D_STATE__.ballsOnTable--;
                    window.__3D_STATE__.lastPocketed = ball.id;
                    return true;
                }
            }
            return false;
        }

        function isNearPocket(pos) {
            for (let i = 0; i < pocketCenters.length; i++) {
                if (pos.distanceTo(pocketCenters[i]) < POCKET_EXCLUSION) return true;
            }
            return false;
        }

        function stepPhysics(dt) {
            const boundX = TABLE_WIDTH / 2 - BALL_RADIUS;
            const boundZ = TABLE_LENGTH / 2 - BALL_RADIUS;

            // Move and friction
            balls.forEach(b => {
                if (!b.active) return;

                b.pos.addScaledVector(b.vel, dt);
                
                const speed = b.vel.length();
                if (speed > 0) {
                    const drop = FRICTION * dt;
                    const multiplier = Math.max(0, speed - drop) / speed;
                    b.vel.multiplyScalar(multiplier);
                }

                if (b.vel.lengthSq() < STOP_VELOCITY * STOP_VELOCITY) {
                    b.vel.set(0, 0);
                }

                // Visual rolling (spin)
                if (speed > 0) {
                    const omega = speed / BALL_RADIUS;
                    const axis = new THREE.Vector3(-b.vel.y, 0, b.vel.x).normalize();
                    b.mesh.rotateOnWorldAxis(axis, omega * dt);
                }
            });

            // Collisions
            for (let i = 0; i < balls.length; i++) {
                const b1 = balls[i];
                if (!b1.active) continue;

                // Pocket check
                if (checkPocket(b1)) continue;

                // Cushion collision
                if (!isNearPocket(b1.pos)) {
                    if (b1.pos.x > boundX) {
                        b1.pos.x = boundX;
                        b1.vel.x *= -CUSHION_RESTITUTION;
                        // Simple spin transfer approximation (reduce parallel velocity)
                        b1.vel.y *= 0.9; 
                    } else if (b1.pos.x < -boundX) {
                        b1.pos.x = -boundX;
                        b1.vel.x *= -CUSHION_RESTITUTION;
                        b1.vel.y *= 0.9;
                    }

                    if (b1.pos.y > boundZ) {
                        b1.pos.y = boundZ;
                        b1.vel.y *= -CUSHION_RESTITUTION;
                        b1.vel.x *= 0.9;
                    } else if (b1.pos.y < -boundZ) {
                        b1.pos.y = -boundZ;
                        b1.vel.y *= -CUSHION_RESTITUTION;
                        b1.vel.x *= 0.9;
                    }
                }

                // Ball-Ball collision
                for (let j = i + 1; j < balls.length; j++) {
                    const b2 = balls[j];
                    if (!b2.active) continue;

                    const distSq = b1.pos.distanceToSquared(b2.pos);
                    const minDist = BALL_RADIUS * 2;

                    if (distSq < minDist * minDist) {
                        const dist = Math.sqrt(distSq);
                        const normal = new THREE.Vector2().subVectors(b1.pos, b2.pos).normalize();
                        
                        // Positional correction to prevent sinking
                        const overlap = minDist - dist;
                        const correction = normal.clone().multiplyScalar(overlap / 2);
                        b1.pos.add(correction);
                        b2.pos.sub(correction);

                        // Velocity resolution
                        const relVel = new THREE.Vector2().subVectors(b1.vel, b2.vel);
                        const velAlongNormal = relVel.dot(normal);

                        if (velAlongNormal < 0) {
                            const jImpulse = -(1 + RESTITUTION) * velAlongNormal / 2; // mass = 1
                            const impulse = normal.clone().multiplyScalar(jImpulse);
                            
                            b1.vel.add(impulse);
                            b2.vel.sub(impulse);
                        }
                    }
                }
            }
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            window.__3D_STATE__.frameCount++;

            // Physics substeps
            for (let i = 0; i < SUBSTEPS; i++) {
                stepPhysics(DT / SUBSTEPS);
            }

            updateMeshPositions();

            // Update State & HUD
            let allStopped = true;
            let totalKE = 0;
            let valid = true;

            balls.forEach(b => {
                if (b.active) {
                    if (b.vel.lengthSq() > 0) allStopped = false;
                    totalKE += 0.5 * b.vel.lengthSq(); // mass = 1
                    if (isNaN(b.pos.x) || isNaN(b.pos.y)) valid = false;
                }
            });

            window.__3D_STATE__.allStopped = allStopped;
            window.__3D_STATE__.totalKE = parseFloat(totalKE.toFixed(4));
            window.__3D_STATE__.ballsValid = valid;
            window.__3D_STATE__.cueBallSpeed = parseFloat(balls[0].vel.length().toFixed(4));

            // Update Cue Stick Visuals
            if (allStopped && balls[0].active) {
                cueStick.visible = true;
                const angle = window.__3D_STATE__.aimAngle;
                const offsetDist = BALL_RADIUS + 0.05 + currentPower * 0.05;
                
                // Position cue behind ball
                cueStick.position.set(
                    balls[0].pos.x + Math.cos(angle) * offsetDist,
                    BALL_Y + 0.05, // slightly elevated
                    balls[0].pos.y + Math.sin(angle) * offsetDist
                );
                
                // Look at cue ball
                cueStick.lookAt(balls[0].mesh.position);
            } else {
                cueStick.visible = false;
            }

            // Update DOM HUD
            document.getElementById('hud-balls').innerText = window.__3D_STATE__.ballsOnTable;
            document.getElementById('hud-pocketed').innerText = window.__3D_STATE__.pocketedCount;
            document.getElementById('hud-shots').innerText = window.__3D_STATE__.shotCount;
            document.getElementById('hud-cue-speed').innerText = window.__3D_STATE__.cueBallSpeed.toFixed(3);
            document.getElementById('hud-stopped').innerText = allStopped ? 'Yes' : 'No';
            document.getElementById('hud-last-pocket').innerText = window.__3D_STATE__.lastPocketed === -1 ? 'None' : window.__3D_STATE__.lastPocketed;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
