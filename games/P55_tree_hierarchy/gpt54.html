<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 径向树</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1020;
      color: #e5eefc;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: 320px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(10, 16, 32, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    #panel h1 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
    }
    #panel .hint {
      font-size: 12px;
      line-height: 1.45;
      opacity: 0.82;
      margin-bottom: 10px;
    }
    #searchFilter {
      width: 100%;
      box-sizing: border-box;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      outline: none;
      margin-bottom: 10px;
    }
    #searchFilter::placeholder {
      color: rgba(255,255,255,0.45);
    }
    #stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      font-size: 12px;
    }
    #stats div {
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
    }
    #tooltip {
      position: absolute;
      z-index: 20;
      pointer-events: none;
      transform: translate(12px, 12px);
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 12px;
      white-space: nowrap;
      display: none;
      border: 1px solid rgba(255,255,255,0.12);
    }
    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="panel">
      <h1>3D 径向/层次树</h1>
      <div class="hint">
        点击节点可展开/折叠子树。<br>
        拖拽旋转，滚轮缩放，右键平移。<br>
        搜索按 label 过滤；不匹配分支会隐藏。
      </div>
      <input id="searchFilter" type="text" placeholder="按节点 label 搜索..." />
      <div id="stats">
        <div>总节点: <span id="nodeCount">50</span></div>
        <div>当前可见: <span id="visibleNodes">0</span></div>
        <div>展开节点: <span id="expandedNodes">0</span></div>
        <div>选中节点: <span id="selectedNode">无</span></div>
      </div>
    </div>
    <div id="tooltip"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const tooltip = document.getElementById('tooltip');
    const searchInput = document.getElementById('searchFilter');
    const nodeCountEl = document.getElementById('nodeCount');
    const visibleNodesEl = document.getElementById('visibleNodes');
    const expandedNodesEl = document.getElementById('expandedNodes');
    const selectedNodeEl = document.getElementById('selectedNode');

    const TREE_DATA = {
      id: 'root',
      label: '总部',
      children: [
        {
          id: 'd1',
          label: '研发中心',
          children: [
            {
              id: 'd1-1',
              label: '平台组',
              children: [
                { id: 'd1-1-1', label: 'API Gateway' },
                { id: 'd1-1-2', label: 'Auth Service' },
                { id: 'd1-1-3', label: 'Config Center' }
              ]
            },
            {
              id: 'd1-2',
              label: '前端组',
              children: [
                { id: 'd1-2-1', label: 'Web App' },
                { id: 'd1-2-2', label: 'Design System' },
                { id: 'd1-2-3', label: 'Portal UI' }
              ]
            },
            {
              id: 'd1-3',
              label: '数据组',
              children: [
                { id: 'd1-3-1', label: 'ETL Pipeline' },
                { id: 'd1-3-2', label: 'Realtime Compute' },
                { id: 'd1-3-3', label: 'Warehouse Model' }
              ]
            }
          ]
        },
        {
          id: 'd2',
          label: '产品中心',
          children: [
            {
              id: 'd2-1',
              label: '企业产品',
              children: [
                { id: 'd2-1-1', label: 'CRM Suite' },
                { id: 'd2-1-2', label: 'Workflow Engine' },
                { id: 'd2-1-3', label: 'Knowledge Base' }
              ]
            },
            {
              id: 'd2-2',
              label: '用户体验',
              children: [
                { id: 'd2-2-1', label: 'Research Lab' },
                { id: 'd2-2-2', label: 'Interaction Spec' },
                { id: 'd2-2-3', label: 'Visual Language' }
              ]
            },
            {
              id: 'd2-3',
              label: '移动产品',
              children: [
                { id: 'd2-3-1', label: 'iOS Client' },
                { id: 'd2-3-2', label: 'Android Client' },
                { id: 'd2-3-3', label: 'Mini Program' }
              ]
            }
          ]
        },
        {
          id: 'd3',
          label: '市场中心',
          children: [
            {
              id: 'd3-1',
              label: '品牌组',
              children: [
                { id: 'd3-1-1', label: 'Brand Campaign' },
                { id: 'd3-1-2', label: 'Content Studio' },
                { id: 'd3-1-3', label: 'Media Relation' }
              ]
            },
            {
              id: 'd3-2',
              label: '增长组',
              children: [
                { id: 'd3-2-1', label: 'SEO Program' },
                { id: 'd3-2-2', label: 'Ad Operations' },
                { id: 'd3-2-3', label: 'Referral Loop' }
              ]
            },
            {
              id: 'd3-3',
              label: '区域市场',
              children: [
                { id: 'd3-3-1', label: 'North Region' },
                { id: 'd3-3-2', label: 'South Region' },
                { id: 'd3-3-3', label: 'Oversea Market' }
              ]
            }
          ]
        },
        {
          id: 'd4',
          label: '运营中心',
          children: [
            {
              id: 'd4-1',
              label: '客户成功',
              children: [
                { id: 'd4-1-1', label: 'Onboarding' },
                { id: 'd4-1-2', label: 'Renewal Desk' },
                { id: 'd4-1-3', label: 'Training Hub' }
              ]
            },
            {
              id: 'd4-2',
              label: '服务交付',
              children: [
                { id: 'd4-2-1', label: 'Project PMO' },
                { id: 'd4-2-2', label: 'Solution Delivery' },
                { id: 'd4-2-3', label: 'Support L2' }
              ]
            },
            {
              id: 'd4-3',
              label: '质量管理',
              children: [
                { id: 'd4-3-1', label: 'Process Audit' },
                { id: 'd4-3-2', label: 'Risk Control' },
                { id: 'd4-3-3', label: 'Compliance Desk' }
              ]
            }
          ]
        }
      ]
    };
    // 1(root) + 4 + 12 + 33 = 50

    const nodeMap = new Map();
    const allNodes = [];

    function buildTreeMeta(node, parent = null, depth = 0, siblingIndex = 0) {
      node.parent = parent;
      node.depth = depth;
      node.siblingIndex = siblingIndex;
      node.children = node.children || [];
      node.expanded = depth < 2; // 初始展开到深度 1 的内部节点；可见节点 < 50
      node.match = true;
      node.visible = false;
      node.searchVisible = true;
      node.position = new THREE.Vector3();
      node.descendants = countDescendants(node);
      nodeMap.set(node.id, node);
      allNodes.push(node);
      node.children.forEach((child, i) => buildTreeMeta(child, node, depth + 1, i));
    }

    function countDescendants(node) {
      if (!node.children || node.children.length === 0) return 0;
      let count = node.children.length;
      for (const child of node.children) count += countDescendants(child);
      return count;
    }

    buildTreeMeta(TREE_DATA);
    const NODE_COUNT = allNodes.length;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);
    scene.fog = new THREE.Fog(0x0b1020, 120, 320);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 65, 120);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 10, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 1.1));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.15);
    dirLight.position.set(60, 80, 40);
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.55);
    fillLight.position.set(-50, 30, -40);
    scene.add(fillLight);

    const grid = new THREE.GridHelper(260, 26, 0x2e3f72, 0x1a2540);
    grid.position.y = -30;
    scene.add(grid);

    const rootAnchor = new THREE.Group();
    scene.add(rootAnchor);

    const nodeGroup = new THREE.Group();
    const edgeGroup = new THREE.Group();
    rootAnchor.add(edgeGroup);
    rootAnchor.add(nodeGroup);

    const sphereGeo = new THREE.SphereGeometry(1, 22, 18);
    const edgeMaterialVisible = new THREE.MeshStandardMaterial({
      color: 0x7aa2ff,
      roughness: 0.55,
      metalness: 0.1,
      transparent: true,
      opacity: 0.95
    });
    const edgeMaterialMuted = new THREE.MeshStandardMaterial({
      color: 0x33415f,
      roughness: 0.9,
      metalness: 0,
      transparent: true,
      opacity: 0.22
    });

    function colorByDepth(depth) {
      const colors = [0xffd166, 0x7bdff2, 0xb2f7ef, 0xcdb4db, 0xa0c4ff];
      return colors[Math.min(depth, colors.length - 1)];
    }

    for (const node of allNodes) {
      const radius = node.depth === 0 ? 2.8 : node.children.length ? 2.0 : 1.35;
      const geo = node.depth === 0
        ? new THREE.IcosahedronGeometry(radius, 1)
        : new THREE.SphereGeometry(radius, 20, 16);

      const mat = new THREE.MeshStandardMaterial({
        color: colorByDepth(node.depth),
        emissive: 0x000000,
        roughness: 0.45,
        metalness: 0.15,
        transparent: true,
        opacity: 1
      });

      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData.nodeId = node.id;
      mesh.userData.type = 'node';
      node.mesh = mesh;
      node.baseColor = new THREE.Color(colorByDepth(node.depth));
      nodeGroup.add(mesh);

      if (node.parent) {
        const cylGeo = new THREE.CylinderGeometry(0.22, 0.22, 1, 10, 1, false);
        const edge = new THREE.Mesh(cylGeo, edgeMaterialVisible.clone());
        edge.userData.type = 'edge';
        edge.userData.from = node.parent.id;
        edge.userData.to = node.id;
        node.edge = edge;
        edgeGroup.add(edge);
      }
    }

    function setCylinderBetweenPoints(mesh, start, end) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = dir.length();
      if (len < 0.0001) {
        mesh.visible = false;
        return;
      }
      mesh.visible = true;
      mesh.position.copy(start).add(end).multiplyScalar(0.5);
      mesh.scale.set(1, len, 1);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
    }

    function layoutTree() {
      TREE_DATA.position.set(0, 0, 0);
      layoutChildren(TREE_DATA, 26, Math.PI * 2, Math.PI * 0.12, Math.PI * 0.42, 1);
      updateMeshes();
    }

    function layoutChildren(parent, radius, azSpan, polarMin, polarMax, level) {
      const children = parent.children || [];
      const count = children.length;
      if (!count) return;

      const baseAzimuth = parent.depth === 0
        ? 0
        : Math.atan2(parent.position.z, parent.position.x);

      const startAz = baseAzimuth - azSpan / 2;
      const nextRadius = radius * 0.72 + 8;

      for (let i = 0; i < count; i++) {
        const child = children[i];
        const t = count === 1 ? 0.5 : i / (count - 1);
        const az = startAz + azSpan * (count === 1 ? 0.5 : t);

        const polarCenter = polarMin + (polarMax - polarMin) * (0.25 + 0.5 * ((i + 1) / (count + 1)));
        const polarJitter = (i % 2 === 0 ? -1 : 1) * 0.08;
        const polar = polarCenter + polarJitter;

        const x = parent.position.x + radius * Math.sin(polar) * Math.cos(az);
        const y = parent.position.y + radius * Math.cos(polar) - 2.5;
        const z = parent.position.z + radius * Math.sin(polar) * Math.sin(az);
        child.position.set(x, y, z);

        const childAzSpan = Math.max(0.65, azSpan * 0.58);
        const childPolarMin = Math.min(Math.PI - 0.25, polar + 0.18);
        const childPolarMax = Math.min(Math.PI - 0.12, polar + 0.62);

        layoutChildren(child, nextRadius, childAzSpan, childPolarMin, childPolarMax, level + 1);
      }
    }

    function updateMeshes() {
      for (const node of allNodes) {
        node.mesh.position.copy(node.position);
        if (node.edge) {
          setCylinderBetweenPoints(node.edge, node.parent.position, node.position);
        }
      }
    }

    function computeSearchVisibility(node, q) {
      const query = q.trim().toLowerCase();
      if (!query) {
        for (const n of allNodes) {
          n.match = true;
          n.searchVisible = true;
        }
        return true;
      }

      function dfs(n) {
        const selfMatch = n.label.toLowerCase().includes(query);
        let childAny = false;
        for (const c of n.children) childAny = dfs(c) || childAny;
        n.match = selfMatch;
        n.searchVisible = selfMatch || childAny;
        return n.searchVisible;
      }
      return dfs(node);
    }

    function applyVisibility() {
      let visibleNodes = 0;
      let expandedNodes = 0;

      function walk(node, ancestorsExpanded, forceVisibleBySearchPath) {
        const parentVisible = node.parent ? node.parent.visible : true;
        const allowedByCollapse = node.parent ? (ancestorsExpanded && node.parent.expanded) : true;

        node.visible = parentVisible && allowedByCollapse && node.searchVisible && forceVisibleBySearchPath;

        if (node.visible) visibleNodes++;
        if (node.children.length > 0 && node.expanded) expandedNodes++;

        const childForce = node.visible;
        for (const child of node.children) {
          walk(child, node.visible, childForce);
        }
      }

      TREE_DATA.visible = TREE_DATA.searchVisible;
      if (TREE_DATA.visible) visibleNodes++;
      if (TREE_DATA.children.length > 0 && TREE_DATA.expanded) expandedNodes++;
      for (const child of TREE_DATA.children) {
        walk(child, TREE_DATA.visible, TREE_DATA.visible);
      }

      for (const node of allNodes) {
        const mesh = node.mesh;
        const isVisible = !!node.visible;
        mesh.visible = isVisible;

        if (node.edge) {
          node.edge.visible = isVisible && node.parent.visible;
        }

        if (isVisible) {
          const selected = state.selectedNode === node.id;
          const muted = !node.match && state.searchFilter.trim() !== '';
          mesh.material.color.copy(node.baseColor);
          mesh.material.emissive.setHex(selected ? 0x3355ff : 0x000000);
          mesh.material.opacity = muted ? 0.28 : 1.0;
          mesh.scale.setScalar(selected ? 1.35 : 1.0);

          if (node.edge) {
            node.edge.material.color.setHex(muted ? 0x33415f : 0x7aa2ff);
            node.edge.material.opacity = muted ? 0.18 : 0.95;
          }
        }
      }

      state.visibleNodes = visibleNodes;
      state.expandedNodes = expandedNodes;
      syncState();
    }

    const state = {
      nodeCount: NODE_COUNT,
      visibleNodes: 0,
      expandedNodes: 0,
      selectedNode: null,
      searchFilter: ''
    };

    function syncState() {
      window.__3D_STATE__ = {
        nodeCount: state.nodeCount,
        visibleNodes: state.visibleNodes,
        expandedNodes: state.expandedNodes,
        selectedNode: state.selectedNode,
        searchFilter: state.searchFilter
      };
      nodeCountEl.textContent = String(state.nodeCount);
      visibleNodesEl.textContent = String(state.visibleNodes);
      expandedNodesEl.textContent = String(state.expandedNodes);
      selectedNodeEl.textContent = state.selectedNode ?? '无';
    }

    function refresh() {
      computeSearchVisibility(TREE_DATA, state.searchFilter);
      applyVisibility();
    }

    layoutTree();
    refresh();

    searchInput.addEventListener('input', (e) => {
      state.searchFilter = e.target.value || '';
      refresh();
    });

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredNode = null;

    function getIntersections(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const meshes = allNodes.map(n => n.mesh).filter(m => m.visible);
      return raycaster.intersectObjects(meshes, false);
    }

    renderer.domElement.addEventListener('pointermove', (event) => {
      const hits = getIntersections(event);
      if (hits.length > 0) {
        const id = hits[0].object.userData.nodeId;
        hoveredNode = nodeMap.get(id);
        tooltip.style.display = 'block';
        tooltip.style.left = `${event.clientX}px`;
        tooltip.style.top = `${event.clientY}px`;
        tooltip.textContent = `${hoveredNode.label} [${hoveredNode.id}] 深度:${hoveredNode.depth}${hoveredNode.children.length ? ` 子节点:${hoveredNode.children.length}` : ''}`;
      } else {
        hoveredNode = null;
        tooltip.style.display = 'none';
      }
    });

    renderer.domElement.addEventListener('pointerleave', () => {
      hoveredNode = null;
      tooltip.style.display = 'none';
    });

    renderer.domElement.addEventListener('click', (event) => {
      const hits = getIntersections(event);
      if (hits.length === 0) {
        state.selectedNode = null;
        refresh();
        return;
      }

      const id = hits[0].object.userData.nodeId;
      const node = nodeMap.get(id);
      state.selectedNode = node.id;

      if (node.children.length > 0) {
        node.expanded = !node.expanded;
      }

      refresh();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      for (const node of allNodes) {
        if (!node.mesh.visible) continue;
        const selected = state.selectedNode === node.id;
        const pulse = selected ? 1 + Math.sin(t * 4.5) * 0.06 : 1;
        node.mesh.scale.setScalar(selected ? 1.35 * pulse : 1.0);
      }

      rootAnchor.rotation.y = Math.sin(t * 0.08) * 0.06;
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
