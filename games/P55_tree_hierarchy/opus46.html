<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Radial Tree Layout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    display: flex; flex-direction: column; gap: 10px;
  }
  #searchFilter {
    padding: 10px 14px; width: 280px; border: 1px solid #444;
    border-radius: 8px; background: rgba(20,20,40,0.9); color: #eee;
    font-size: 14px; outline: none; backdrop-filter: blur(10px);
  }
  #searchFilter::placeholder { color: #777; }
  #searchFilter:focus { border-color: #6af; box-shadow: 0 0 8px rgba(100,170,255,0.3); }
  #stats {
    padding: 10px 14px; width: 280px; border-radius: 8px;
    background: rgba(20,20,40,0.85); color: #ccc; font-size: 12px;
    line-height: 1.8; backdrop-filter: blur(10px); border: 1px solid #333;
  }
  #stats span { color: #6cf; font-weight: bold; }
  #tooltip {
    position: absolute; display: none; padding: 8px 14px;
    background: rgba(10,10,30,0.95); color: #fff; border-radius: 6px;
    font-size: 13px; pointer-events: none; border: 1px solid #6af;
    backdrop-filter: blur(8px); white-space: nowrap;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="ui">
  <input type="text" id="searchFilter" placeholder="🔍 Search nodes by label..." />
  <div id="stats">
    Nodes: <span id="statTotal">50</span> |
    Visible: <span id="statVisible">50</span> |
    Expanded: <span id="statExpanded">0</span> |
    Selected: <span id="statSelected">none</span>
  </div>
</div>
<div id="tooltip"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ TREE DATA (50 nodes, max depth 4) ============
const treeData = {
  id: 1, label: "Root", children: [
    { id: 2, label: "Engineering", children: [
      { id: 6, label: "Frontend", children: [
        { id: 20, label: "React Team", children: [
          { id: 40, label: "Alice" },
          { id: 41, label: "Bob" },
          { id: 42, label: "Carol" }
        ]},
        { id: 21, label: "Vue Team", children: [
          { id: 43, label: "Dave" },
          { id: 44, label: "Eve" }
        ]},
        { id: 22, label: "Angular Dev" }
      ]},
      { id: 7, label: "Backend", children: [
        { id: 23, label: "API Team", children: [
          { id: 45, label: "Frank" },
          { id: 46, label: "Grace" }
        ]},
        { id: 24, label: "Database", children: [
          { id: 47, label: "Heidi" }
        ]},
        { id: 25, label: "DevOps" }
      ]},
      { id: 8, label: "QA", children: [
        { id: 26, label: "Manual QA" },
        { id: 27, label: "Automation" }
      ]}
    ]},
    { id: 3, label: "Design", children: [
      { id: 9, label: "UI Design", children: [
        { id: 28, label: "Web UI" },
        { id: 29, label: "Mobile UI" },
        { id: 30, label: "Icons" }
      ]},
      { id: 10, label: "UX Research", children: [
        { id: 31, label: "Surveys" },
        { id: 32, label: "Analytics" }
      ]},
      { id: 11, label: "Branding" }
    ]},
    { id: 4, label: "Marketing", children: [
      { id: 12, label: "Content", children: [
        { id: 33, label: "Blog" },
        { id: 34, label: "Video" }
      ]},
      { id: 13, label: "SEO", children: [
        { id: 35, label: "On-Page" },
        { id: 36, label: "Link Build" }
      ]},
      { id: 14, label: "Social Media" },
      { id: 15, label: "Email Mktg" }
    ]},
    { id: 5, label: "Operations", children: [
      { id: 16, label: "HR", children: [
        { id: 37, label: "Recruiting" },
        { id: 38, label: "Training" }
      ]},
      { id: 17, label: "Finance", children: [
        { id: 39, label: "Accounting" },
        { id: 48, label: "Payroll" }
      ]},
      { id: 18, label: "Legal" },
      { id: 19, label: "Facilities", children: [
        { id: 49, label: "Maintenance" },
        { id: 50, label: "Security" }
      ]}
    ]}
  ]
};

// ============ FLATTEN & SETUP ============
const nodeMap = new Map();
const expandedSet = new Set();
const allNodes = [];

function flattenTree(node, parent = null, depth = 0) {
  const n = {
    id: node.id, label: node.label, depth,
    parent: parent ? parent.id : null,
    children: (node.children || []).map(c => c.id),
    hasChildren: !!(node.children && node.children.length > 0),
    position: new THREE.Vector3(),
    targetPosition: new THREE.Vector3(),
    visible: true,
    matchesFilter: true,
    grayed: false
  };
  nodeMap.set(n.id, n);
  allNodes.push(n);
  if (n.hasChildren) expandedSet.add(n.id);
  if (node.children) {
    node.children.forEach(c => flattenTree(c, node, depth + 1));
  }
}
flattenTree(treeData);

// ============ STATE ============
window.__3D_STATE__ = {
  nodeCount: 50,
  visibleNodes: 50,
  expandedNodes: 0,
  selectedNode: null,
  searchFilter: ""
};

function updateState() {
  let vis = 0, exp = 0;
  allNodes.forEach(n => { if (n.visible && !n.grayed) vis++; });
  // Count visible nodes including grayed for visibleNodes
  vis = 0;
  allNodes.forEach(n => { if (n.visible) vis++; });
  expandedSet.forEach(id => {
    const n = nodeMap.get(id);
    if (n && n.visible && n.hasChildren) exp++;
  });
  window.__3D_STATE__.visibleNodes = vis;
  window.__3D_STATE__.expandedNodes = exp;
  document.getElementById('statTotal').textContent = 50;
  document.getElementById('statVisible').textContent = vis;
  document.getElementById('statExpanded').textContent = exp;
  document.getElementById('statSelected').textContent = window.__3D_STATE__.selectedNode || 'none';
}

// ============ LAYOUT ============
const LAYER_HEIGHT = 3.5;
const BASE_RADIUS = 2.5;

function computeLayout() {
  // Determine visible nodes
  allNodes.forEach(n => n.visible = false);
  function markVisible(id) {
    const n = nodeMap.get(id);
    if (!n) return;
    n.visible = true;
    if (n.hasChildren && expandedSet.has(n.id)) {
      n.children.forEach(cid => markVisible(cid));
    }
  }
  markVisible(1);

  // Radial layout
  function layoutNode(id, angleStart, angleEnd, depth) {
    const n = nodeMap.get(id);
    if (!n || !n.visible) return;

    const angleMid = (angleStart + angleEnd) / 2;
    const radius = depth * BASE_RADIUS * (1 + depth * 0.3);
    n.targetPosition.set(
      Math.cos(angleMid) * radius,
      -depth * LAYER_HEIGHT,
      Math.sin(angleMid) * radius
    );

    if (n.hasChildren && expandedSet.has(n.id)) {
      const visChildren = n.children.filter(cid => {
        const cn = nodeMap.get(cid);
        return cn && cn.visible;
      });
      if (visChildren.length > 0) {
        const angleRange = angleEnd - angleStart;
        const childAngleStep = angleRange / visChildren.length;
        visChildren.forEach((cid, i) => {
          layoutNode(cid, angleStart + i * childAngleStep, angleStart + (i + 1) * childAngleStep, depth + 1);
        });
      }
    }
  }
  layoutNode(1, 0, Math.PI * 2, 0);
}

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(12, 15, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 60;
controls.target.set(0, -5, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x334466, 1.2);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x6688ff, 1, 50);
pointLight.position.set(0, 5, 0);
scene.add(pointLight);

// ============ DEPTH COLORS ============
const depthColors = [
  new THREE.Color(0xff6b6b),
  new THREE.Color(0x4ecdc4),
  new THREE.Color(0x45b7d1),
  new THREE.Color(0xf9ca24),
  new THREE.Color(0xa29bfe)
];
const grayColor = new THREE.Color(0x333344);
const selectedColor = new THREE.Color(0xff44ff);

// ============ NODE MESHES ============
const nodeGroup = new THREE.Group();
scene.add(nodeGroup);
const edgeGroup = new THREE.Group();
scene.add(edgeGroup);

const nodeMeshes = new Map();
const sphereGeo = new THREE.SphereGeometry(0.35, 24, 24);
const leafGeo = new THREE.SphereGeometry(0.22, 16, 16);

allNodes.forEach(n => {
  const geo = n.hasChildren ? sphereGeo : leafGeo;
  const mat = new THREE.MeshPhongMaterial({
    color: depthColors[n.depth] || depthColors[4],
    emissive: (depthColors[n.depth] || depthColors[4]).clone().multiplyScalar(0.15),
    shininess: 80,
    transparent: true,
    opacity: 1
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = { nodeId: n.id };
  mesh.visible = false;
  nodeGroup.add(mesh);
  nodeMeshes.set(n.id, mesh);
});

// Labels using sprites
const labelSprites = new Map();
function createLabel(text) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 256;
  canvas.height = 64;
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 256, 64);
  ctx.font = 'bold 24px Segoe UI, Arial';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(2.5, 0.6, 1);
  return sprite;
}

allNodes.forEach(n => {
  const sprite = createLabel(n.label);
  sprite.visible = false;
  nodeGroup.add(sprite);
  labelSprites.set(n.id, sprite);
});

// Edge lines
const edgeLineMat = new THREE.LineBasicMaterial({ color: 0x446688, transparent: true, opacity: 0.6 });
const edgeMeshes = [];

function rebuildEdges() {
  edgeMeshes.forEach(e => { edgeGroup.remove(e); e.geometry.dispose(); });
  edgeMeshes.length = 0;

  allNodes.forEach(n => {
    if (!n.visible || !n.parent) return;
    const pn = nodeMap.get(n.parent);
    if (!pn || !pn.visible) return;

    const pm = nodeMeshes.get(n.parent);
    const cm = nodeMeshes.get(n.id);
    if (!pm || !cm) return;

    const geo = new THREE.BufferGeometry().setFromPoints([
      pm.position.clone(),
      cm.position.clone()
    ]);
    const mat = edgeLineMat.clone();
    if (n.grayed) { mat.color.set(0x222233); mat.opacity = 0.2; }
    const line = new THREE.Line(geo, mat);
    edgeGroup.add(line);
    edgeMeshes.push(line);
  });
}

// ============ ANIMATION ============
let animating = false;
let animProgress = 1;

function startAnimation() {
  animating = true;
  animProgress = 0;
}

function updatePositions(dt) {
  if (!animating) return;
  animProgress = Math.min(1, animProgress + dt * 3);
  const t = easeOutCubic(animProgress);

  allNodes.forEach(n => {
    const mesh = nodeMeshes.get(n.id);
    const label = labelSprites.get(n.id);
    if (!mesh) return;

    if (n.visible) {
      mesh.visible = true;
      label.visible = true;
      mesh.position.lerp(n.targetPosition, t * 0.3 + 0.05);
      label.position.copy(mesh.position).add(new THREE.Vector3(0, 0.55, 0));

      const targetOpacity = n.grayed ? 0.15 : 1;
      mesh.material.opacity += (targetOpacity - mesh.material.opacity) * 0.1;
      label.material.opacity = mesh.material.opacity;

      if (!n.grayed) {
        if (window.__3D_STATE__.selectedNode === n.id) {
          mesh.material.emissive.lerp(selectedColor, 0.1);
        } else {
          const baseEmissive = (depthColors[n.depth] || depthColors[4]).clone().multiplyScalar(0.15);
          mesh.material.emissive.lerp(baseEmissive, 0.1);
        }
        mesh.material.color.lerp(depthColors[n.depth] || depthColors[4], 0.1);
      } else {
        mesh.material.color.lerp(grayColor, 0.1);
        mesh.material.emissive.lerp(new THREE.Color(0x000000), 0.1);
      }
    } else {
      mesh.material.opacity *= 0.9;
      label.material.opacity *= 0.9;
      if (mesh.material.opacity < 0.01) {
        mesh.visible = false;
        label.visible = false;
      }
    }
  });

  if (animProgress >= 1) {
    animating = false;
    // Snap hidden
    allNodes.forEach(n => {
      const mesh = nodeMeshes.get(n.id);
      const label = labelSprites.get(n.id);
      if (!n.visible) {
        mesh.visible = false;
        label.visible = false;
      }
    });
  }

  rebuildEdges();
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

// ============ SEARCH / FILTER ============
const searchInput = document.getElementById('searchFilter');
searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim().toLowerCase();
  window.__3D_STATE__.searchFilter = searchInput.value.trim();

  if (!query) {
    allNodes.forEach(n => { n.matchesFilter = true; n.grayed = false; });
  } else {
    allNodes.forEach(n => {
      n.matchesFilter = n.label.toLowerCase().includes(query);
      n.grayed = true;
    });
    // Highlight matching nodes and their ancestors
    function highlightAncestors(id) {
      const n = nodeMap.get(id);
      if (!n) return;
      n.grayed = false;
      if (n.parent) highlightAncestors(n.parent);
    }
    // Also highlight descendants of matching nodes
    function highlightDescendants(id) {
      const n = nodeMap.get(id);
      if (!n) return;
      n.grayed = false;
      if (n.hasChildren) n.children.forEach(cid => highlightDescendants(cid));
    }
    allNodes.forEach(n => {
      if (n.matchesFilter) {
        highlightAncestors(n.id);
        highlightDescendants(n.id);
      }
    });
  }

  computeLayout();
  startAnimation();
  updateState();
});

// ============ CLICK / SELECT ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const meshes = [];
  nodeMeshes.forEach(m => { if (m.visible) meshes.push(m); });
  const intersects = raycaster.intersectObjects(meshes);

  if (intersects.length > 0) {
    const nodeId = intersects[0].object.userData.nodeId;
    const n = nodeMap.get(nodeId);
    window.__3D_STATE__.selectedNode = nodeId;

    if (n && n.hasChildren) {
      if (expandedSet.has(nodeId)) {
        // Collapse: remove this node and all descendants from expanded
        function collapseDescendants(id) {
          expandedSet.delete(id);
          const nd = nodeMap.get(id);
          if (nd && nd.hasChildren) nd.children.forEach(cid => collapseDescendants(cid));
        }
        collapseDescendants(nodeId);
      } else {
        expandedSet.add(nodeId);
      }
      computeLayout();
      startAnimation();
    }
    updateState();
  }
});

// Hover tooltip
renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const meshes = [];
  nodeMeshes.forEach(m => { if (m.visible) meshes.push(m); });
  const intersects = raycaster.intersectObjects(meshes);

  if (intersects.length > 0) {
    const nodeId = intersects[0].object.userData.nodeId;
    const n = nodeMap.get(nodeId);
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    const status = n.hasChildren ? (expandedSet.has(n.id) ? '📂' : '📁') : '📄';
    tooltip.innerHTML = `${status} <b>${n.label}</b><br>ID: ${n.id} | Depth: ${n.depth}`;
    renderer.domElement.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
});

// ============ PARTICLES BACKGROUND ============
const particleCount = 300;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 60;
  particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 40 - 5;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x334466, size: 0.08, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============ GLOW RINGS for expanded nodes ============
const ringGeo = new THREE.RingGeometry(0.45, 0.55, 32);
const ringMeshes = new Map();
allNodes.forEach(n => {
  if (n.hasChildren) {
    const mat = new THREE.MeshBasicMaterial({
      color: depthColors[n.depth] || depthColors[4],
      transparent: true, opacity: 0.3, side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, mat);
    ring.rotation.x = -Math.PI / 2;
    ring.visible = false;
    nodeGroup.add(ring);
    ringMeshes.set(n.id, ring);
  }
});

// ============ INIT ============
computeLayout();
// Set initial positions immediately
allNodes.forEach(n => {
  const mesh = nodeMeshes.get(n.id);
  const label = labelSprites.get(n.id);
  if (n.visible) {
    mesh.position.copy(n.targetPosition);
    mesh.visible = true;
    label.position.copy(n.targetPosition).add(new THREE.Vector3(0, 0.55, 0));
    label.visible = true;
  }
});
rebuildEdges();
startAnimation();
updateState();

// ============ RENDER LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  controls.update();
  updatePositions(dt);

  // Animate rings
  const time = clock.getElapsedTime();
  ringMeshes.forEach((ring, id) => {
    const n = nodeMap.get(id);
    const mesh = nodeMeshes.get(id);
    if (n.visible && expandedSet.has(id)) {
      ring.visible = true;
      ring.position.copy(mesh.position);
      ring.material.opacity = 0.2 + Math.sin(time * 2 + id) * 0.1;
      const s = 1 + Math.sin(time * 1.5 + id * 0.5) * 0.1;
      ring.scale.set(s, s, s);
    } else {
      ring.visible = false;
    }
  });

  // Gentle node bobbing
  allNodes.forEach(n => {
    if (n.visible) {
      const mesh = nodeMeshes.get(n.id);
      mesh.position.y = n.targetPosition.y + Math.sin(time * 0.8 + n.id * 0.3) * 0.05;
      const label = labelSprites.get(n.id);
      label.position.y = mesh.position.y + 0.55;
    }
  });

  // Rotate particles slowly
  particles.rotation.y += dt * 0.01;

  renderer.render(scene, camera);
}
animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
