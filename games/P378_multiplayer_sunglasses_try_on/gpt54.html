<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplayer Sunglasses Try-On</title>
  <style>
    :root {
      --bg1: #f2f2f2;
      --bg2: #ffffff;
      --panel-bg: rgba(255,255,255,0.88);
      --text: #1d1d1f;
      --muted: #666;
      --blue: #4A90D9;
      --red: #D94A4A;
      --accent: #222;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, var(--bg1), var(--bg2));
      color: var(--text);
    }

    body.screenshot-active .ui-hide {
      display: none !important;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #scene-container {
      position: absolute;
      inset: 0;
    }

    #top-banner {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 22px;
      border-radius: 14px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      font-size: 22px;
      font-weight: 700;
      z-index: 20;
      text-align: center;
      min-width: 320px;
    }

    .side-panel {
      position: absolute;
      top: 80px;
      width: 250px;
      padding: 16px;
      border-radius: 16px;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
      z-index: 20;
    }

    #panel-left {
      left: 16px;
      border: 3px solid var(--blue);
    }

    #panel-right {
      right: 16px;
      border: 3px solid var(--red);
    }

    .panel-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
    }

    .style-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0;
    }

    button, input[type="range"] {
      width: 100%;
    }

    .style-btn,
    .action-btn,
    #compare-toggle,
    #screenshot-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 10px;
      cursor: pointer;
      font-weight: 600;
      background: #f3f4f6;
      color: var(--text);
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    }

    .style-btn:hover,
    .action-btn:hover,
    #compare-toggle:hover,
    #screenshot-btn:hover {
      transform: translateY(-1px);
      background: #e8ebef;
    }

    .style-btn.selected {
      background: #222;
      color: white;
      outline: 3px solid #ffd166;
    }

    .action-btn.remove {
      margin-top: 8px;
      background: #fff0f0;
      color: #a11;
    }

    .label {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
    }

    .current-style {
      margin-top: 6px;
      font-weight: 700;
      font-size: 16px;
      min-height: 20px;
    }

    .slider-wrap {
      margin-top: 14px;
    }

    input[type="range"] {
      margin-top: 8px;
      accent-color: #333;
    }

    #bottom-controls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 20;
    }

    #compare-toggle.active,
    #screenshot-btn.active {
      background: #111;
      color: #fff;
    }

    #hint-box {
      position: absolute;
      bottom: 18px;
      right: 18px;
      z-index: 20;
      background: rgba(255,255,255,0.8);
      padding: 12px 14px;
      border-radius: 12px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.06);
      font-size: 12px;
      line-height: 1.5;
      color: #444;
      max-width: 240px;
    }

    @media (max-width: 900px) {
      .side-panel {
        width: 220px;
        top: 74px;
      }
      #top-banner {
        font-size: 18px;
        min-width: auto;
        width: calc(100% - 32px);
      }
    }

    @media (max-width: 720px) {
      .side-panel {
        position: absolute;
        width: calc(50% - 20px);
        top: auto;
        bottom: 80px;
      }
      #panel-left { left: 10px; }
      #panel-right { right: 10px; }
      #hint-box { display: none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container"></div>

    <div id="top-banner" class="ui-hide">Multiplayer Sunglasses Try-On</div>

    <div id="panel-left" class="side-panel ui-hide">
      <div class="panel-title">Player 1</div>
      <div class="style-grid">
        <button class="style-btn" id="p1-style-0">Aviator</button>
        <button class="style-btn" id="p1-style-1">Wayfarer</button>
        <button class="style-btn" id="p1-style-2">Round</button>
        <button class="style-btn" id="p1-style-3">Sport</button>
      </div>
      <button class="action-btn remove" id="p1-remove">Remove Glasses</button>
      <div class="slider-wrap">
        <div class="label">Lens Tint Opacity</div>
        <input id="p1-opacity" type="range" min="0.1" max="1.0" step="0.1" value="0.5" />
      </div>
      <div class="label">Current Style</div>
      <div class="current-style" id="p1-current-label">None</div>
    </div>

    <div id="panel-right" class="side-panel ui-hide">
      <div class="panel-title">Player 2</div>
      <div class="style-grid">
        <button class="style-btn" id="p2-style-0">Aviator</button>
        <button class="style-btn" id="p2-style-1">Wayfarer</button>
        <button class="style-btn" id="p2-style-2">Round</button>
        <button class="style-btn" id="p2-style-3">Sport</button>
      </div>
      <button class="action-btn remove" id="p2-remove">Remove Glasses</button>
      <div class="slider-wrap">
        <div class="label">Lens Tint Opacity</div>
        <input id="p2-opacity" type="range" min="0.1" max="1.0" step="0.1" value="0.5" />
      </div>
      <div class="label">Current Style</div>
      <div class="current-style" id="p2-current-label">None</div>
    </div>

    <div id="bottom-controls" class="ui-hide">
      <button id="compare-toggle">Compare Mode</button>
      <button id="screenshot-btn">Screenshot Mode</button>
    </div>

    <div id="hint-box" class="ui-hide">
      <strong>Keyboard</strong><br />
      P1: 1,2,3,4 / Q remove<br />
      P2: 7,8,9,0 / P remove
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const STYLE_NAMES = ['Aviator','Wayfarer','Round','Sport'];

    window.__3D_STATE__ = {
      modelsLoaded: false,
      player1Style: -1,
      player2Style: -1,
      player1Opacity: 0.5,
      player2Opacity: 0.5,
      compareMode: false,
      screenshotMode: false,
      player1Rotation: 0,
      player2Rotation: 0,
      styleNames: [...STYLE_NAMES],
      player1GlassesVisible: false,
      player2GlassesVisible: false
    };

    const container = document.getElementById('scene-container');

    const scene = new THREE.Scene();

    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 2;
    bgCanvas.height = 256;
    const bgCtx = bgCanvas.getContext('2d');
    const gradient = bgCtx.createLinearGradient(0, 0, 0, 256);
    gradient.addColorStop(0, '#ececec');
    gradient.addColorStop(1, '#ffffff');
    bgCtx.fillStyle = gradient;
    bgCtx.fillRect(0, 0, 2, 256);
    const bgTexture = new THREE.CanvasTexture(bgCanvas);
    scene.background = bgTexture;

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 3);
    camera.lookAt(0, 1.2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);
    controls.minPolarAngle = Math.PI / 2 - THREE.MathUtils.degToRad(30);
    controls.maxPolarAngle = Math.PI / 2 + THREE.MathUtils.degToRad(30);
    controls.minDistance = 2.2;
    controls.maxDistance = 5.5;

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dir1.position.set(1, 2, 1);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.4);
    dir2.position.set(-1, 1.5, 0.5);
    scene.add(dir2);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(6, 64),
      new THREE.MeshStandardMaterial({ color: 0xf3f3f3, roughness: 1, metalness: 0 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    scene.add(floor);

    const players = {
      p1: {
        root: null,
        glassesAnchor: null,
        currentGlasses: null,
        style: -1,
        opacity: 0.5,
        position: new THREE.Vector3(-1.2, 0, 0),
        rotationTargetDeg: 0
      },
      p2: {
        root: null,
        glassesAnchor: null,
        currentGlasses: null,
        style: -1,
        opacity: 0.5,
        position: new THREE.Vector3(1.2, 0, 0),
        rotationTargetDeg: 0
      }
    };

    function makeLensMaterial(color, opacity = 0.5) {
      return new THREE.MeshPhysicalMaterial({
        color,
        transparent: true,
        opacity,
        roughness: 0.1,
        metalness: 0.0,
        transmission: 0.15,
        thickness: 0.02
      });
    }

    function makeFrameMaterial(color, metalness = 0.6, roughness = 0.35) {
      return new THREE.MeshStandardMaterial({ color, metalness, roughness });
    }

    function applyOpacityToGroup(group, opacity) {
      group.traverse((obj) => {
        if (obj.isMesh && obj.userData.isLens && obj.material) {
          obj.material.opacity = opacity;
          obj.material.transparent = true;
          obj.material.needsUpdate = true;
        }
      });
    }

    function createAviator(opacity = 0.5) {
      const g = new THREE.Group();
      const frameMat = makeFrameMaterial(0xd4af37, 0.9, 0.25);
      const lensMat = makeLensMaterial('#8B4513', opacity);

      const lensGeo = new THREE.SphereGeometry(0.13, 24, 24);
      const leftLens = new THREE.Mesh(lensGeo, lensMat.clone());
      leftLens.scale.set(0.82, 1.08, 0.28);
      leftLens.position.set(-0.16, 0, 0);
      leftLens.userData.isLens = true;

      const rightLens = leftLens.clone();
      rightLens.material = lensMat.clone();
      rightLens.position.x = 0.16;

      const leftFrame = new THREE.Mesh(
        new THREE.TorusGeometry(0.11, 0.01, 12, 40),
        frameMat
      );
      leftFrame.scale.set(0.9, 1.12, 1);
      leftFrame.position.set(-0.16, 0, 0.01);

      const rightFrame = leftFrame.clone();
      rightFrame.position.x = 0.16;

      const bridge = new THREE.Mesh(
        new THREE.CylinderGeometry(0.008, 0.008, 0.08, 12),
        frameMat
      );
      bridge.rotation.z = Math.PI / 2;
      bridge.position.set(0, 0.04, 0.03);

      const topBar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.006, 0.006, 0.38, 12),
        frameMat
      );
      topBar.rotation.z = Math.PI / 2;
      topBar.position.set(0, 0.12, 0.03);

      const leftTemple = new THREE.Mesh(
        new THREE.BoxGeometry(0.02, 0.02, 0.32),
        frameMat
      );
      leftTemple.position.set(-0.30, 0.02, -0.12);
      leftTemple.rotation.y = 0.25;

      const rightTemple = leftTemple.clone();
      rightTemple.position.x = 0.30;
      rightTemple.rotation.y = -0.25;

      g.add(leftLens, rightLens, leftFrame, rightFrame, bridge, topBar, leftTemple, rightTemple);
      return g;
    }

    function createWayfarer(opacity = 0.5) {
      const g = new THREE.Group();
      const frameMat = makeFrameMaterial(0x111111, 0.2, 0.7);
      const lensMat = makeLensMaterial('#1a1a2e', opacity);

      const lensGeo = new THREE.BoxGeometry(0.22, 0.14, 0.03);
      const leftLens = new THREE.Mesh(lensGeo, lensMat.clone());
      leftLens.position.set(-0.16, 0, 0.01);
      leftLens.rotation.z = -0.08;
      leftLens.userData.isLens = true;

      const rightLens = new THREE.Mesh(lensGeo, lensMat.clone());
      rightLens.position.set(0.16, 0, 0.01);
      rightLens.rotation.z = 0.08;
      rightLens.userData.isLens = true;

      const leftFrame = new THREE.Mesh(
        new THREE.BoxGeometry(0.27, 0.19, 0.04),
        frameMat
      );
      leftFrame.position.set(-0.16, 0, 0);
      leftFrame.rotation.z = -0.08;

      const rightFrame = new THREE.Mesh(
        new THREE.BoxGeometry(0.27, 0.19, 0.04),
        frameMat
      );
      rightFrame.position.set(0.16, 0, 0);
      rightFrame.rotation.z = 0.08;

      const bridge = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.03, 0.03),
        frameMat
      );
      bridge.position.set(0, 0.03, 0.01);

      const leftTemple = new THREE.Mesh(
        new THREE.BoxGeometry(0.03, 0.03, 0.34),
        frameMat
      );
      leftTemple.position.set(-0.31, 0.03, -0.12);
      leftTemple.rotation.y = 0.2;

      const rightTemple = leftTemple.clone();
      rightTemple.position.x = 0.31;
      rightTemple.rotation.y = -0.2;

      g.add(leftFrame, rightFrame, leftLens, rightLens, bridge, leftTemple, rightTemple);
      return g;
    }

    function createRound(opacity = 0.5) {
      const g = new THREE.Group();
      const frameMat = makeFrameMaterial(0x444444, 0.45, 0.45);
      const lensMat = makeLensMaterial('#FF6B6B', opacity);

      const lensGeo = new THREE.SphereGeometry(0.11, 24, 24);
      const leftLens = new THREE.Mesh(lensGeo, lensMat.clone());
      leftLens.scale.set(1, 1, 0.25);
      leftLens.position.set(-0.16, 0, 0);
      leftLens.userData.isLens = true;

      const rightLens = new THREE.Mesh(lensGeo, lensMat.clone());
      rightLens.scale.set(1, 1, 0.25);
      rightLens.position.set(0.16, 0, 0);
      rightLens.userData.isLens = true;

      const leftFrame = new THREE.Mesh(
        new THREE.TorusGeometry(0.12, 0.008, 10, 48),
        frameMat
      );
      leftFrame.position.set(-0.16, 0, 0.01);

      const rightFrame = leftFrame.clone();
      rightFrame.position.x = 0.16;

      const bridge = new THREE.Mesh(
        new THREE.CylinderGeometry(0.005, 0.005, 0.07, 10),
        frameMat
      );
      bridge.rotation.z = Math.PI / 2;
      bridge.position.set(0, 0.01, 0.01);

      const leftTemple = new THREE.Mesh(
        new THREE.BoxGeometry(0.015, 0.015, 0.32),
        frameMat
      );
      leftTemple.position.set(-0.28, 0, -0.12);
      leftTemple.rotation.y = 0.2;

      const rightTemple = leftTemple.clone();
      rightTemple.position.x = 0.28;
      rightTemple.rotation.y = -0.2;

      g.add(leftLens, rightLens, leftFrame, rightFrame, bridge, leftTemple, rightTemple);
      return g;
    }

    function createSport(opacity = 0.5) {
      const g = new THREE.Group();
      const frameMat = makeFrameMaterial(0x202020, 0.35, 0.5);
      const lensMat = makeLensMaterial('#00CED1', opacity);

      const visor = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.14, 0.04),
        lensMat.clone()
      );
      visor.position.set(0, 0, 0.01);
      visor.rotation.y = 0.0;
      visor.userData.isLens = true;

      const leftWing = new THREE.Mesh(
        new THREE.BoxGeometry(0.16, 0.14, 0.04),
        lensMat.clone()
      );
      leftWing.position.set(-0.23, 0, -0.015);
      leftWing.rotation.y = 0.45;
      leftWing.userData.isLens = true;

      const rightWing = new THREE.Mesh(
        new THREE.BoxGeometry(0.16, 0.14, 0.04),
        lensMat.clone()
      );
      rightWing.position.set(0.23, 0, -0.015);
      rightWing.rotation.y = -0.45;
      rightWing.userData.isLens = true;

      const topFrame = new THREE.Mesh(
        new THREE.BoxGeometry(0.54, 0.03, 0.03),
        frameMat
      );
      topFrame.position.set(0, 0.08, 0.02);

      const bridge = new THREE.Mesh(
        new THREE.BoxGeometry(0.07, 0.04, 0.03),
        frameMat
      );
      bridge.position.set(0, 0, 0.025);

      const leftTemple = new THREE.Mesh(
        new THREE.BoxGeometry(0.022, 0.022, 0.34),
        frameMat
      );
      leftTemple.position.set(-0.33, 0.02, -0.12);
      leftTemple.rotation.y = 0.3;

      const rightTemple = leftTemple.clone();
      rightTemple.position.x = 0.33;
      rightTemple.rotation.y = -0.3;

      g.add(visor, leftWing, rightWing, topFrame, bridge, leftTemple, rightTemple);
      return g;
    }

    function createGlasses(styleIndex, opacity) {
      switch (styleIndex) {
        case 0: return createAviator(opacity);
        case 1: return createWayfarer(opacity);
        case 2: return createRound(opacity);
        case 3: return createSport(opacity);
        default: return null;
      }
    }

    function updateSelectedButtons(playerKey) {
      const playerNum = playerKey === 'p1' ? '1' : '2';
      const currentStyle = players[playerKey].style;
      for (let i = 0; i < 4; i++) {
        const btn = document.getElementById(`p${playerNum}-style-${i}`);
        btn.classList.toggle('selected', i === currentStyle);
      }
    }

    function updateLabels() {
      document.getElementById('p1-current-label').textContent =
        players.p1.style === -1 ? 'None' : STYLE_NAMES[players.p1.style];
      document.getElementById('p2-current-label').textContent =
        players.p2.style === -1 ? 'None' : STYLE_NAMES[players.p2.style];
    }

    function updateState() {
      window.__3D_STATE__.player1Style = players.p1.style;
      window.__3D_STATE__.player2Style = players.p2.style;
      window.__3D_STATE__.player1Opacity = players.p1.opacity;
      window.__3D_STATE__.player2Opacity = players.p2.opacity;
      window.__3D_STATE__.player1Rotation = Math.round(THREE.MathUtils.radToDeg(players.p1.root?.rotation.y || 0));
      window.__3D_STATE__.player2Rotation = Math.round(THREE.MathUtils.radToDeg(players.p2.root?.rotation.y || 0));
      window.__3D_STATE__.player1GlassesVisible = !!players.p1.currentGlasses;
      window.__3D_STATE__.player2GlassesVisible = !!players.p2.currentGlasses;
    }

    function attachGlasses(playerKey, styleIndex) {
      const player = players[playerKey];
      if (!player.glassesAnchor) return;

      if (player.currentGlasses) {
        player.glassesAnchor.remove(player.currentGlasses);
        player.currentGlasses.traverse(obj => {
          if (obj.isMesh) {
            obj.geometry?.dispose?.();
            if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose?.());
            else obj.material?.dispose?.();
          }
        });
        player.currentGlasses = null;
      }

      if (styleIndex === -1) {
        player.style = -1;
        updateSelectedButtons(playerKey);
        updateLabels();
        updateState();
        return;
      }

      const glasses = createGlasses(styleIndex, player.opacity);
      glasses.position.set(0, 1.55, 0.15);
      glasses.rotation.set(0, 0, 0);
      player.glassesAnchor.add(glasses);
      player.currentGlasses = glasses;
      player.style = styleIndex;

      updateSelectedButtons(playerKey);
      updateLabels();
      updateState();
    }

    function setOpacity(playerKey, opacity) {
      players[playerKey].opacity = opacity;
      if (players[playerKey].currentGlasses) {
        applyOpacityToGroup(players[playerKey].currentGlasses, opacity);
      }
      updateState();
    }

    function setCompareMode(active) {
      window.__3D_STATE__.compareMode = active;
      players.p1.rotationTargetDeg = active ? 30 : 0;
      players.p2.rotationTargetDeg = active ? -30 : 0;
      document.getElementById('compare-toggle').classList.toggle('active', active);
      updateState();
    }

    function setScreenshotMode(active) {
      window.__3D_STATE__.screenshotMode = active;
      document.body.classList.toggle('screenshot-active', active);
      document.getElementById('screenshot-btn').classList.toggle('active', active);
      updateState();
    }

    const loader = new GLTFLoader();

    function createFallbackRobot() {
      const root = new THREE.Group();

      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd9dde3, roughness: 0.7, metalness: 0.1 });
      const darkMat = new THREE.MeshStandardMaterial({ color: 0x98a2ad, roughness: 0.8, metalness: 0.05 });

      const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.28, 0.7, 8, 16), bodyMat);
      torso.position.y = 0.75;

      const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 32, 32), bodyMat);
      head.position.y = 1.55;
      head.scale.set(0.95, 1.05, 0.92);

      const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.12, 16), darkMat);
      neck.position.y = 1.22;

      root.add(torso, head, neck);
      return root;
    }

    function setupPlayerModels(baseModel) {
      const p1 = baseModel.clone(true);
      const p2 = baseModel.clone(true);

      p1.position.copy(players.p1.position);
      p2.position.copy(players.p2.position);

      p1.scale.set(1, 1, 1);
      p2.scale.set(1, 1, 1);

      const a1 = new THREE.Group();
      const a2 = new THREE.Group();

      p1.add(a1);
      p2.add(a2);

      players.p1.root = p1;
      players.p2.root = p2;
      players.p1.glassesAnchor = a1;
      players.p2.glassesAnchor = a2;

      scene.add(p1, p2);

      window.__3D_STATE__.modelsLoaded = true;
      updateState();
    }

    loader.load(
      'robot.glb',
      (gltf) => {
        const model = gltf.scene;
        setupPlayerModels(model);
      },
      undefined,
      () => {
        const fallback = createFallbackRobot();
        setupPlayerModels(fallback);
      }
    );

    for (let i = 0; i < 4; i++) {
      document.getElementById(`p1-style-${i}`).addEventListener('click', () => attachGlasses('p1', i));
      document.getElementById(`p2-style-${i}`).addEventListener('click', () => attachGlasses('p2', i));
    }

    document.getElementById('p1-remove').addEventListener('click', () => attachGlasses('p1', -1));
    document.getElementById('p2-remove').addEventListener('click', () => attachGlasses('p2', -1));

    document.getElementById('p1-opacity').addEventListener('input', (e) => {
      setOpacity('p1', parseFloat(e.target.value));
    });

    document.getElementById('p2-opacity').addEventListener('input', (e) => {
      setOpacity('p2', parseFloat(e.target.value));
    });

    document.getElementById('compare-toggle').addEventListener('click', () => {
      setCompareMode(!window.__3D_STATE__.compareMode);
    });

    document.getElementById('screenshot-btn').addEventListener('click', () => {
      setScreenshotMode(!window.__3D_STATE__.screenshotMode);
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === '1') attachGlasses('p1', 0);
      if (key === '2') attachGlasses('p1', 1);
      if (key === '3') attachGlasses('p1', 2);
      if (key === '4') attachGlasses('p1', 3);
      if (key === 'q') attachGlasses('p1', -1);

      if (key === '7') attachGlasses('p2', 0);
      if (key === '8') attachGlasses('p2', 1);
      if (key === '9') attachGlasses('p2', 2);
      if (key === '0') attachGlasses('p2', 3);
      if (key === 'p') attachGlasses('p2', -1);
    });

    function animate() {
      requestAnimationFrame(animate);

      if (players.p1.root) {
        const target = THREE.MathUtils.degToRad(players.p1.rotationTargetDeg);
        players.p1.root.rotation.y = THREE.MathUtils.lerp(players.p1.root.rotation.y, target, 0.08);
      }

      if (players.p2.root) {
        const target = THREE.MathUtils.degToRad(players.p2.rotationTargetDeg);
        players.p2.root.rotation.y = THREE.MathUtils.lerp(players.p2.root.rotation.y, target, 0.08);
      }

      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateLabels();
    updateSelectedButtons('p1');
    updateSelectedButtons('p2');
    updateState();
  </script>
</body>
</html>
