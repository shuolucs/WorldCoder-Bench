<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Sunglasses Try-On</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; }
#canvas-container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 0; }
canvas { display: block; }

.top-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  text-align: center; padding: 12px 20px;
  background: linear-gradient(135deg, rgba(74,144,217,0.9), rgba(217,74,74,0.9));
  color: white; font-size: 22px; font-weight: 700; letter-spacing: 1px;
  backdrop-filter: blur(10px);
  box-shadow: 0 2px 20px rgba(0,0,0,0.2);
}

.side-panel {
  position: fixed; top: 70px; z-index: 10;
  width: 200px; padding: 15px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  transition: opacity 0.3s, transform 0.3s;
}
.side-panel.left { left: 15px; border: 2px solid #4A90D9; }
.side-panel.right { right: 15px; border: 2px solid #D94A4A; }

.panel-title {
  font-size: 16px; font-weight: 700; margin-bottom: 10px;
  text-align: center; padding-bottom: 8px;
  border-bottom: 2px solid #eee;
}
.left .panel-title { color: #4A90D9; }
.right .panel-title { color: #D94A4A; }

.style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }

.style-btn {
  padding: 10px 5px; border: 2px solid #ddd; border-radius: 8px;
  background: white; cursor: pointer; font-size: 11px; font-weight: 600;
  text-align: center; transition: all 0.2s;
  color: #555;
}
.style-btn:hover { border-color: #999; background: #f5f5f5; transform: scale(1.03); }
.style-btn.active { border-color: #4A90D9; background: #e8f0fe; color: #4A90D9; }
.right .style-btn.active { border-color: #D94A4A; background: #fde8e8; color: #D94A4A; }

.remove-btn {
  width: 100%; padding: 8px; border: 2px solid #e74c3c; border-radius: 8px;
  background: white; color: #e74c3c; cursor: pointer; font-size: 12px;
  font-weight: 600; margin-bottom: 10px; transition: all 0.2s;
}
.remove-btn:hover { background: #e74c3c; color: white; }

.slider-container { margin-bottom: 8px; }
.slider-label { font-size: 11px; color: #777; margin-bottom: 4px; display: block; }
.opacity-slider { width: 100%; cursor: pointer; accent-color: #4A90D9; }
.right .opacity-slider { accent-color: #D94A4A; }

.current-label {
  text-align: center; font-size: 13px; font-weight: 600; color: #333;
  padding: 6px; background: #f0f0f0; border-radius: 6px;
}

.bottom-controls {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; gap: 12px;
}
.bottom-btn {
  padding: 10px 24px; border: none; border-radius: 25px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; box-shadow: 0 3px 12px rgba(0,0,0,0.15);
}
#compare-toggle {
  background: linear-gradient(135deg, #4A90D9, #357ABD);
  color: white;
}
#compare-toggle:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(74,144,217,0.4); }
#compare-toggle.active { background: linear-gradient(135deg, #e74c3c, #c0392b); }

#screenshot-btn {
  background: linear-gradient(135deg, #2ecc71, #27ae60);
  color: white;
}
#screenshot-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(46,204,113,0.4); }

body.screenshot-active .side-panel,
body.screenshot-active .top-banner,
body.screenshot-active .bottom-controls { opacity: 0; pointer-events: none; }

.key-hint { font-size: 9px; color: #aaa; margin-top: 2px; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div class="top-banner">🕶️ Multiplayer Sunglasses Try-On</div>

<div class="side-panel left">
  <div class="panel-title">Player 1</div>
  <div class="style-grid">
    <button class="style-btn" id="p1-style-0">✈️ Aviator<div class="key-hint">Key: 1</div></button>
    <button class="style-btn" id="p1-style-1">◼ Wayfarer<div class="key-hint">Key: 2</div></button>
    <button class="style-btn" id="p1-style-2">⭕ Round<div class="key-hint">Key: 3</div></button>
    <button class="style-btn" id="p1-style-3">🏃 Sport<div class="key-hint">Key: 4</div></button>
  </div>
  <button class="remove-btn" id="p1-remove">✕ Remove Glasses <span class="key-hint">(Q)</span></button>
  <div class="slider-container">
    <label class="slider-label">Lens Tint Opacity</label>
    <input type="range" class="opacity-slider" id="p1-opacity" min="0.1" max="1.0" step="0.1" value="0.5">
  </div>
  <div class="current-label" id="p1-current-label">No Glasses</div>
</div>

<div class="side-panel right">
  <div class="panel-title">Player 2</div>
  <div class="style-grid">
    <button class="style-btn" id="p2-style-0">✈️ Aviator<div class="key-hint">Key: 7</div></button>
    <button class="style-btn" id="p2-style-1">◼ Wayfarer<div class="key-hint">Key: 8</div></button>
    <button class="style-btn" id="p2-style-2">⭕ Round<div class="key-hint">Key: 9</div></button>
    <button class="style-btn" id="p2-style-3">🏃 Sport<div class="key-hint">Key: 0</div></button>
  </div>
  <button class="remove-btn" id="p2-remove">✕ Remove Glasses <span class="key-hint">(P)</span></button>
  <div class="slider-container">
    <label class="slider-label">Lens Tint Opacity</label>
    <input type="range" class="opacity-slider" id="p2-opacity" min="0.1" max="1.0" step="0.1" value="0.5">
  </div>
  <div class="current-label" id="p2-current-label">No Glasses</div>
</div>

<div class="bottom-controls">
  <button class="bottom-btn" id="compare-toggle">👥 Compare Mode</button>
  <button class="bottom-btn" id="screenshot-btn">📸 Screenshot Mode</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  modelsLoaded: false,
  player1Style: -1,
  player2Style: -1,
  player1Opacity: 0.5,
  player2Opacity: 0.5,
  compareMode: false,
  screenshotMode: false,
  player1Rotation: 0,
  player2Rotation: 0,
  styleNames: ['Aviator', 'Wayfarer', 'Round', 'Sport'],
  player1GlassesVisible: false,
  player2GlassesVisible: false
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2; canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const grad = ctx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0, '#ffffff');
grad.addColorStop(1, '#d0d0d0');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight1.position.set(1, 2, 1);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
dirLight2.position.set(-1, 1.5, 0.5);
scene.add(dirLight2);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minPolarAngle = THREE.MathUtils.degToRad(60);
controls.maxPolarAngle = THREE.MathUtils.degToRad(120);
controls.target.set(0, 1, 0);
controls.update();

// Floor
const floorGeo = new THREE.CircleGeometry(4, 64);
const floorMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.8 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.01;
floor.receiveShadow = true;
scene.add(floor);

// Player containers
const player1Group = new THREE.Group();
player1Group.position.set(-1.2, 0, 0);
scene.add(player1Group);

const player2Group = new THREE.Group();
player2Group.position.set(1.2, 0, 0);
scene.add(player2Group);

// Glasses containers
let player1Glasses = null;
let player2Glasses = null;
let player1LensMaterials = [];
let player2LensMaterials = [];

// Sunglasses creation functions
function createAviator(tintColor, opacity) {
  const group = new THREE.Group();
  const lensMaterials = [];

  const frameMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, metalness: 0.8, roughness: 0.2 });
  const lensMat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(tintColor), transparent: true, opacity: opacity,
    metalness: 0.1, roughness: 0.1, transmission: 0.3
  });
  lensMaterials.push(lensMat);

  // Left lens
  const lensGeo = new THREE.SphereGeometry(0.12, 32, 32);
  const leftLens = new THREE.Mesh(lensGeo, lensMat);
  leftLens.scale.set(1, 1.2, 0.3);
  leftLens.position.set(-0.08, 0, 0.02);
  group.add(leftLens);

  // Right lens
  const rightLens = new THREE.Mesh(lensGeo, lensMat);
  rightLens.scale.set(1, 1.2, 0.3);
  rightLens.position.set(0.08, 0, 0.02);
  group.add(rightLens);

  // Left frame
  const frameGeo = new THREE.TorusGeometry(0.12, 0.006, 16, 32);
  const leftFrame = new THREE.Mesh(frameGeo, frameMat);
  leftFrame.scale.set(1, 1.2, 1);
  leftFrame.position.set(-0.08, 0, 0.02);
  group.add(leftFrame);

  // Right frame
  const rightFrame = new THREE.Mesh(frameGeo, frameMat);
  rightFrame.scale.set(1, 1.2, 1);
  rightFrame.position.set(0.08, 0, 0.02);
  group.add(rightFrame);

  // Bridge
  const bridgeGeo = new THREE.CylinderGeometry(0.004, 0.004, 0.06, 8);
  const bridge = new THREE.Mesh(bridgeGeo, frameMat);
  bridge.rotation.z = Math.PI / 2;
  bridge.position.set(0, 0.02, 0.06);
  group.add(bridge);

  // Temples (arms)
  const templeGeo = new THREE.CylinderGeometry(0.004, 0.003, 0.25, 8);
  const leftTemple = new THREE.Mesh(templeGeo, frameMat);
  leftTemple.rotation.x = Math.PI / 2;
  leftTemple.position.set(-0.19, 0.01, -0.1);
  group.add(leftTemple);

  const rightTemple = new THREE.Mesh(templeGeo, frameMat);
  rightTemple.rotation.x = Math.PI / 2;
  rightTemple.position.set(0.19, 0.01, -0.1);
  group.add(rightTemple);

  return { group, lensMaterials };
}

function createWayfarer(tintColor, opacity) {
  const group = new THREE.Group();
  const lensMaterials = [];

  const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.4 });
  const lensMat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(tintColor), transparent: true, opacity: opacity,
    metalness: 0.0, roughness: 0.1, transmission: 0.2
  });
  lensMaterials.push(lensMat);

  // Left lens
  const lensGeo = new THREE.BoxGeometry(0.14, 0.1, 0.02);
  const leftLens = new THREE.Mesh(lensGeo, lensMat);
  leftLens.position.set(-0.085, 0, 0.02);
  group.add(leftLens);

  // Right lens
  const rightLens = new THREE.Mesh(lensGeo, lensMat);
  rightLens.position.set(0.085, 0, 0.02);
  group.add(rightLens);

  // Left frame
  const frameGeo = new THREE.BoxGeometry(0.16, 0.12, 0.025);
  const frameEdgeGeo = new THREE.EdgesGeometry(frameGeo);
  // Thick frame using box with hole effect
  const leftFrameOuter = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.12, 0.015), frameMat);
  leftFrameOuter.position.set(-0.085, 0, 0.01);
  group.add(leftFrameOuter);
  const leftFrameInner = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.09, 0.02), new THREE.MeshStandardMaterial({ color: 0x1a1a2e, transparent: true, opacity: 0 }));
  leftFrameInner.position.set(-0.085, 0, 0.015);

  const rightFrameOuter = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.12, 0.015), frameMat);
  rightFrameOuter.position.set(0.085, 0, 0.01);
  group.add(rightFrameOuter);

  // Top bar
  const topBar = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.02, 0.015), frameMat);
  topBar.position.set(0, 0.055, 0.01);
  group.add(topBar);

  // Bridge
  const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.02, 0.015), frameMat);
  bridge.position.set(0, 0, 0.015);
  group.add(bridge);

  // Temples
  const templeGeo = new THREE.BoxGeometry(0.012, 0.012, 0.25);
  const leftTemple = new THREE.Mesh(templeGeo, frameMat);
  leftTemple.position.set(-0.17, 0.02, -0.11);
  group.add(leftTemple);

  const rightTemple = new THREE.Mesh(templeGeo, frameMat);
  rightTemple.position.set(0.17, 0.02, -0.11);
  group.add(rightTemple);

  return { group, lensMaterials };
}

function createRound(tintColor, opacity) {
  const group = new THREE.Group();
  const lensMaterials = [];

  const frameMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.6, roughness: 0.3 });
  const lensMat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(tintColor), transparent: true, opacity: opacity,
    metalness: 0.0, roughness: 0.05, transmission: 0.4
  });
  lensMaterials.push(lensMat);

  // Left lens
  const lensGeo = new THREE.SphereGeometry(0.08, 32, 32);
  const leftLens = new THREE.Mesh(lensGeo, lensMat);
  leftLens.scale.set(1, 1, 0.2);
  leftLens.position.set(-0.09, 0, 0.02);
  group.add(leftLens);

  // Right lens
  const rightLens = new THREE.Mesh(lensGeo, lensMat);
  rightLens.scale.set(1, 1, 0.2);
  rightLens.position.set(0.09, 0, 0.02);
  group.add(rightLens);

  // Left frame ring
  const ringGeo = new THREE.TorusGeometry(0.08, 0.004, 16, 48);
  const leftRing = new THREE.Mesh(ringGeo, frameMat);
  leftRing.position.set(-0.09, 0, 0.02);
  group.add(leftRing);

  // Right frame ring
  const rightRing = new THREE.Mesh(ringGeo, frameMat);
  rightRing.position.set(0.09, 0, 0.02);
  group.add(rightRing);

  // Bridge
  const bridgeCurve = new THREE.CylinderGeometry(0.003, 0.003, 0.04, 8);
  const bridge = new THREE.Mesh(bridgeCurve, frameMat);
  bridge.rotation.z = Math.PI / 2;
  bridge.position.set(0, 0.02, 0.04);
  group.add(bridge);

  // Temples
  const templeGeo = new THREE.CylinderGeometry(0.003, 0.002, 0.25, 8);
  const leftTemple = new THREE.Mesh(templeGeo, frameMat);
  leftTemple.rotation.x = Math.PI / 2;
  leftTemple.position.set(-0.165, 0.005, -0.1);
  group.add(leftTemple);

  const rightTemple = new THREE.Mesh(templeGeo, frameMat);
  rightTemple.rotation.x = Math.PI / 2;
  rightTemple.position.set(0.165, 0.005, -0.1);
  group.add(rightTemple);

  return { group, lensMaterials };
}

function createSport(tintColor, opacity) {
  const group = new THREE.Group();
  const lensMaterials = [];

  const frameMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.5 });
  const lensMat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(tintColor), transparent: true, opacity: opacity,
    metalness: 0.1, roughness: 0.05, transmission: 0.3
  });
  lensMaterials.push(lensMat);

  // Left lens - angled/wrapped
  const lensGeo = new THREE.BoxGeometry(0.14, 0.08, 0.02);
  const leftLens = new THREE.Mesh(lensGeo, lensMat);
  leftLens.position.set(-0.09, 0, 0.02);
  leftLens.rotation.y = 0.2;
  group.add(leftLens);

  // Right lens
  const rightLens = new THREE.Mesh(lensGeo, lensMat);
  rightLens.position.set(0.09, 0, 0.02);
  rightLens.rotation.y = -0.2;
  group.add(rightLens);

  // Continuous bridge/top frame
  const bridgeGeo = new THREE.BoxGeometry(0.36, 0.015, 0.015);
  const topFrame = new THREE.Mesh(bridgeGeo, frameMat);
  topFrame.position.set(0, 0.04, 0.02);
  group.add(topFrame);

  // Bottom frame
  const bottomFrame = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.01, 0.012), frameMat);
  bottomFrame.position.set(0, -0.04, 0.02);
  group.add(bottomFrame);

  // Bridge center
  const bridgeCenter = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.015, 0.015), frameMat);
  bridgeCenter.position.set(0, 0.01, 0.03);
  group.add(bridgeCenter);

  // Temples
  const templeGeo = new THREE.BoxGeometry(0.01, 0.01, 0.28);
  const leftTemple = new THREE.Mesh(templeGeo, frameMat);
  leftTemple.position.set(-0.175, 0.01, -0.12);
  group.add(leftTemple);

  const rightTemple = new THREE.Mesh(templeGeo, frameMat);
  rightTemple.position.set(0.175, 0.01, -0.12);
  group.add(rightTemple);

  return { group, lensMaterials };
}

const glassesCreators = [createAviator, createWayfarer, createRound, createSport];
const tintColors = ['#8B4513', '#1a1a2e', '#FF6B6B', '#00CED1'];

// Create mannequin heads as fallback
function createMannequinHead() {
  const group = new THREE.Group();

  const skinMat = new THREE.MeshStandardMaterial({ color: 0xf5d0b0, roughness: 0.6 });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x333333 });

  // Head
  const headGeo = new THREE.SphereGeometry(0.22, 32, 32);
  const head = new THREE.Mesh(headGeo, skinMat);
  head.scale.set(1, 1.15, 1);
  head.position.y = 1.55;
  group.add(head);

  // Neck
  const neckGeo = new THREE.CylinderGeometry(0.08, 0.1, 0.15, 16);
  const neck = new THREE.Mesh(neckGeo, skinMat);
  neck.position.y = 1.28;
  group.add(neck);

  // Body/shoulders
  const bodyGeo = new THREE.CylinderGeometry(0.2, 0.18, 0.5, 16);
  const body = new THREE.Mesh(bodyGeo, new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.5 }));
  body.position.y = 0.95;
  group.add(body);

  // Torso
  const torsoGeo = new THREE.CylinderGeometry(0.18, 0.15, 0.6, 16);
  const torso = new THREE.Mesh(torsoGeo, new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.5 }));
  torso.position.y = 0.45;
  group.add(torso);

  // Base
  const baseGeo = new THREE.CylinderGeometry(0.2, 0.25, 0.15, 32);
  const base = new THREE.Mesh(baseGeo, new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3, metalness: 0.5 }));
  base.position.y = 0.075;
  group.add(base);

  // Nose
  const noseGeo = new THREE.ConeGeometry(0.03, 0.06, 8);
  const nose = new THREE.Mesh(noseGeo, skinMat);
  nose.rotation.x = Math.PI / 2;
  nose.position.set(0, 1.5, 0.22);
  group.add(nose);

  // Eyes (subtle indentations)
  const eyeGeo = new THREE.SphereGeometry(0.025, 16, 16);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xe8c0a0, roughness: 0.8 });
  const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
  leftEye.position.set(-0.08, 1.57, 0.19);
  group.add(leftEye);
  const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
  rightEye.position.set(0.08, 1.57, 0.19);
  group.add(rightEye);

  // Ears
  const earGeo = new THREE.SphereGeometry(0.04, 16, 16);
  const leftEar = new THREE.Mesh(earGeo, skinMat);
  leftEar.scale.set(0.5, 1, 0.7);
  leftEar.position.set(-0.22, 1.53, 0);
  group.add(leftEar);
  const rightEar = new THREE.Mesh(earGeo, skinMat);
  rightEar.scale.set(0.5, 1, 0.7);
  rightEar.position.set(0.22, 1.53, 0);
  group.add(rightEar);

  // Hair
  const hairGeo = new THREE.SphereGeometry(0.23, 32, 32, 0, Math.PI * 2, 0, Math.PI * 0.6);
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.8 });
  const hair = new THREE.Mesh(hairGeo, hairMat);
  hair.scale.set(1, 1.15, 1);
  hair.position.y = 1.57;
  group.add(hair);

  return group;
}

// Glasses Y offset for head positioning
const GLASSES_Y_OFFSET = 1.55;
const GLASSES_Z_OFFSET = 0.15;

// Load models or use fallback
let modelsReady = false;

function setupFallbackModels() {
  const head1 = createMannequinHead();
  player1Group.add(head1);

  const head2 = createMannequinHead();
  player2Group.add(head2);

  modelsReady = true;
  state.modelsLoaded = true;
}

// Try loading robot.glb
const loader = new GLTFLoader();
let loadAttempted = false;

loader.load('robot.glb', (gltf) => {
  loadAttempted = true;
  const model1 = gltf.scene;
  model1.scale.set(1, 1, 1);
  player1Group.add(model1);

  const model2 = model1.clone();
  model2.scale.set(1, 1, 1);
  player2Group.add(model2);

  modelsReady = true;
  state.modelsLoaded = true;
}, undefined, (error) => {
  loadAttempted = true;
  console.log('robot.glb not found, using fallback mannequin heads');
  setupFallbackModels();
});

// Fallback timeout
setTimeout(() => {
  if (!loadAttempted) {
    console.log('Loading timeout, using fallback mannequin heads');
    setupFallbackModels();
  }
}, 3000);

// Apply glasses to player
function applyGlasses(player, styleIndex) {
  const playerGroup = player === 1 ? player1Group : player2Group;
  const opacity = player === 1 ? state.player1Opacity : state.player2Opacity;

  // Remove existing glasses
  removeGlasses(player);

  const { group, lensMaterials } = glassesCreators[styleIndex](tintColors[styleIndex], opacity);
  group.position.set(0, GLASSES_Y_OFFSET, GLASSES_Z_OFFSET);
  group.name = 'glasses';
  playerGroup.add(group);

  if (player === 1) {
    player1Glasses = group;
    player1LensMaterials = lensMaterials;
    state.player1Style = styleIndex;
    state.player1GlassesVisible = true;
  } else {
    player2Glasses = group;
    player2LensMaterials = lensMaterials;
    state.player2Style = styleIndex;
    state.player2GlassesVisible = true;
  }

  updateUI();
}

function removeGlasses(player) {
  const playerGroup = player === 1 ? player1Group : player2Group;
  const existing = playerGroup.getObjectByName('glasses');
  if (existing) {
    playerGroup.remove(existing);
    existing.traverse((child) => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material.dispose();
      }
    });
  }

  if (player === 1) {
    player1Glasses = null;
    player1LensMaterials = [];
    state.player1Style = -1;
    state.player1GlassesVisible = false;
  } else {
    player2Glasses = null;
    player2LensMaterials = [];
    state.player2Style = -1;
    state.player2GlassesVisible = false;
  }

  updateUI();
}

function updateOpacity(player, opacity) {
  const materials = player === 1 ? player1LensMaterials : player2LensMaterials;
  materials.forEach(mat => { mat.opacity = opacity; });

  if (player === 1) state.player1Opacity = opacity;
  else state.player2Opacity = opacity;
}

function updateUI() {
  // Update style buttons
  for (let i = 0; i < 4; i++) {
    const p1Btn = document.getElementById(`p1-style-${i}`);
    const p2Btn = document.getElementById(`p2-style-${i}`);
    p1Btn.classList.toggle('active', state.player1Style === i);
    p2Btn.classList.toggle('active', state.player2Style === i);
  }

  // Update labels
  const p1Label = document.getElementById('p1-current-label');
  const p2Label = document.getElementById('p2-current-label');
  p1Label.textContent = state.player1Style >= 0 ? `🕶️ ${state.styleNames[state.player1Style]}` : 'No Glasses';
  p2Label.textContent = state.player2Style >= 0 ? `🕶️ ${state.styleNames[state.player2Style]}` : 'No Glasses';
}

// Event listeners - Style buttons
for (let p = 1; p <= 2; p++) {
  for (let s = 0; s < 4; s++) {
    document.getElementById(`p${p}-style-${s}`).addEventListener('click', () => {
      applyGlasses(p, s);
    });
  }

  document.getElementById(`p${p}-remove`).addEventListener('click', () => {
    removeGlasses(p);
  });

  document.getElementById(`p${p}-opacity`).addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    updateOpacity(p, val);
  });
}

// Compare mode
let compareActive = false;
document.getElementById('compare-toggle').addEventListener('click', () => {
  compareActive = !compareActive;
  state.compareMode = compareActive;
  document.getElementById('compare-toggle').classList.toggle('active', compareActive);

  if (compareActive) {
    state.player1Rotation = 30;
    state.player2Rotation = -30;
  } else {
    state.player1Rotation = 0;
    state.player2Rotation = 0;
  }
});

// Screenshot mode
document.getElementById('screenshot-btn').addEventListener('click', () => {
  state.screenshotMode = !state.screenshotMode;
  document.body.classList.toggle('screenshot-active', state.screenshotMode);
});

// Keyboard controls
document.addEventListener('keydown', (e) => {
  const key = e.key;
  switch (key) {
    case '1': applyGlasses(1, 0); break;
    case '2': applyGlasses(1, 1); break;
    case '3': applyGlasses(1, 2); break;
    case '4': applyGlasses(1, 3); break;
    case 'q': case 'Q': removeGlasses(1); break;
    case '7': applyGlasses(2, 0); break;
    case '8': applyGlasses(2, 1); break;
    case '9': applyGlasses(2, 2); break;
    case '0': applyGlasses(2, 3); break;
    case 'p': case 'P': removeGlasses(2); break;
  }
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  controls.update();

  // Smooth rotation for compare mode
  const targetP1Rot = THREE.MathUtils.degToRad(state.player1Rotation);
  const targetP2Rot = THREE.MathUtils.degToRad(state.player2Rotation);

  player1Group.rotation.y += (targetP1Rot - player1Group.rotation.y) * 0.08;
  player2Group.rotation.y += (targetP2Rot - player2Group.rotation.y) * 0.08;

  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
