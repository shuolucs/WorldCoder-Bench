<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Sunglasses Try-On</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0e0e0 0%, #ffffff 100%);
            color: #333;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .ui-panel {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        #top-banner {
            align-self: center;
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .side-panels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            flex-grow: 1;
            align-items: center;
        }
        .player-panel {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #panel-p1 { border: 3px solid #4A90D9; }
        #panel-p2 { border: 3px solid #D94A4A; }
        
        .panel-header {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        #panel-p1 .panel-header { color: #4A90D9; }
        #panel-p2 .panel-header { color: #D94A4A; }

        .style-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #f0f0f0;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover { background: #e0e0e0; }
        button.active {
            background: #333;
            color: white;
        }
        .remove-btn {
            width: 100%;
            background: #ffdddd;
            color: #d00000;
        }
        .remove-btn:hover { background: #ffcccc; }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-group label { font-size: 12px; font-weight: bold; }
        input[type=range] { width: 100%; }
        
        .current-label {
            text-align: center;
            font-style: italic;
            font-size: 14px;
            color: #666;
            min-height: 20px;
        }

        .bottom-controls {
            align-self: center;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }
        .action-btn {
            padding: 12px 24px;
            font-size: 16px;
            background: #333;
            color: white;
            border-radius: 25px;
        }
        .action-btn.active {
            background: #4CAF50;
        }

        /* Screenshot Mode */
        body.screenshot-active .ui-layer {
            display: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div id="top-banner" class="ui-panel">Multiplayer Sunglasses Try-On</div>

        <div class="side-panels">
            <!-- Player 1 Panel -->
            <div id="panel-p1" class="ui-panel player-panel">
                <div class="panel-header">Player 1</div>
                <div class="style-grid">
                    <button id="p1-style-0">Aviator (1)</button>
                    <button id="p1-style-1">Wayfarer (2)</button>
                    <button id="p1-style-2">Round (3)</button>
                    <button id="p1-style-3">Sport (4)</button>
                </div>
                <button id="p1-remove" class="remove-btn">Remove Glasses (Q)</button>
                <div class="control-group">
                    <label for="p1-opacity">Lens Opacity</label>
                    <input type="range" id="p1-opacity" min="0.1" max="1.0" step="0.1" value="0.5">
                </div>
                <div id="p1-current-label" class="current-label">None</div>
            </div>

            <!-- Player 2 Panel -->
            <div id="panel-p2" class="ui-panel player-panel">
                <div class="panel-header">Player 2</div>
                <div class="style-grid">
                    <button id="p2-style-0">Aviator (7)</button>
                    <button id="p2-style-1">Wayfarer (8)</button>
                    <button id="p2-style-2">Round (9)</button>
                    <button id="p2-style-3">Sport (0)</button>
                </div>
                <button id="p2-remove" class="remove-btn">Remove Glasses (P)</button>
                <div class="control-group">
                    <label for="p2-opacity">Lens Opacity</label>
                    <input type="range" id="p2-opacity" min="0.1" max="1.0" step="0.1" value="0.5">
                </div>
                <div id="p2-current-label" class="current-label">None</div>
            </div>
        </div>

        <div class="bottom-controls">
            <button id="compare-toggle" class="ui-panel action-btn">Compare Mode</button>
            <button id="screenshot-btn" class="ui-panel action-btn">Screenshot Mode</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelsLoaded: false,
            player1Style: -1,
            player2Style: -1,
            player1Opacity: 0.5,
            player2Opacity: 0.5,
            compareMode: false,
            screenshotMode: false,
            player1Rotation: 0,
            player2Rotation: 0,
            styleNames: ['Aviator', 'Wayfarer', 'Round', 'Sport'],
            player1GlassesVisible: false,
            player2GlassesVisible: false
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.2, 0);
        // Limit vertical rotation between -30 and 30 degrees from horizontal
        controls.minPolarAngle = Math.PI / 2 - THREE.MathUtils.degToRad(30);
        controls.maxPolarAngle = Math.PI / 2 + THREE.MathUtils.degToRad(30);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(1, 2, 1);
        dirLight1.castShadow = true;
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight2.position.set(-1, 1.5, 0.5);
        scene.add(dirLight2);

        // --- Models ---
        let p1Model = new THREE.Group();
        let p2Model = new THREE.Group();
        p1Model.position.set(-1.2, 0, 0);
        p2Model.position.set(1.2, 0, 0);
        scene.add(p1Model);
        scene.add(p2Model);

        let p1GlassesMount = new THREE.Group();
        let p2GlassesMount = new THREE.Group();
        p1GlassesMount.position.set(0, 1.55, 0.15);
        p2GlassesMount.position.set(0, 1.55, 0.15);
        p1Model.add(p1GlassesMount);
        p2Model.add(p2GlassesMount);

        // Fallback dummy head creation
        function createDummyHead() {
            const headGroup = new THREE.Group();
            const headGeo = new THREE.CylinderGeometry(0.5, 0.4, 1.2, 32);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.6 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.0;
            head.castShadow = true;
            headGroup.add(head);
            
            const noseGeo = new THREE.ConeGeometry(0.1, 0.2, 16);
            const nose = new THREE.Mesh(noseGeo, headMat);
            nose.position.set(0, 1.1, 0.5);
            nose.rotation.x = Math.PI / 2;
            headGroup.add(nose);
            
            return headGroup;
        }

        // Load GLTF
        const loader = new GLTFLoader();
        loader.load(
            'robot.glb',
            (gltf) => {
                const model = gltf.scene;
                // Normalize scale if needed, assuming scale 1.0 is fine based on prompt
                
                const p1Mesh = model.clone();
                const p2Mesh = model.clone();
                
                p1Model.add(p1Mesh);
                p2Model.add(p2Mesh);
                
                state.modelsLoaded = true;
            },
            undefined,
            (error) => {
                console.warn("Could not load 'robot.glb', using fallback dummy heads.", error);
                p1Model.add(createDummyHead());
                p2Model.add(createDummyHead());
                state.modelsLoaded = true;
            }
        );

        // --- Sunglasses Generation ---
        function createGlasses(styleIndex, opacity) {
            const group = new THREE.Group();
            const lenses = [];
            
            const lensMat = new THREE.MeshPhysicalMaterial({ 
                transmission: 1, 
                opacity: opacity, 
                transparent: true, 
                roughness: 0.1, 
                metalness: 0.1,
                side: THREE.DoubleSide
            });
            
            const frameMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7 });

            if (styleIndex === 0) { // Aviator
                lensMat.color.setHex(0x8B4513);
                frameMat.color.setHex(0xFFD700);
                frameMat.metalness = 0.8;
                frameMat.roughness = 0.2;

                const lensGeo = new THREE.SphereGeometry(0.18, 32, 32);
                const lLens = new THREE.Mesh(lensGeo, lensMat); lLens.scale.z = 0.1; lLens.position.set(-0.22, 0, 0);
                const rLens = new THREE.Mesh(lensGeo, lensMat); rLens.scale.z = 0.1; rLens.position.set(0.22, 0, 0);
                lenses.push(lLens, rLens);

                const frameGeo = new THREE.TorusGeometry(0.19, 0.015, 16, 50);
                const lFrame = new THREE.Mesh(frameGeo, frameMat); lFrame.position.set(-0.22, 0, 0); lFrame.scale.z = 0.5;
                const rFrame = new THREE.Mesh(frameGeo, frameMat); rFrame.position.set(0.22, 0, 0); rFrame.scale.z = 0.5;
                
                const bridge = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.15), frameMat);
                bridge.rotation.z = Math.PI / 2; bridge.position.set(0, 0.08, 0);
                
                group.add(lLens, rLens, lFrame, rFrame, bridge);

            } else if (styleIndex === 1) { // Wayfarer
                lensMat.color.setHex(0x1a1a2e);
                
                const lensGeo = new THREE.BoxGeometry(0.35, 0.25, 0.02);
                const lLens = new THREE.Mesh(lensGeo, lensMat); lLens.position.set(-0.22, 0, 0);
                const rLens = new THREE.Mesh(lensGeo, lensMat); rLens.position.set(0.22, 0, 0);
                lenses.push(lLens, rLens);

                const frameGeo = new THREE.TorusGeometry(0.22, 0.04, 4, 4);
                const lFrame = new THREE.Mesh(frameGeo, frameMat); lFrame.rotation.z = Math.PI / 4; lFrame.position.set(-0.22, 0, 0); lFrame.scale.z = 0.5;
                const rFrame = new THREE.Mesh(frameGeo, frameMat); rFrame.rotation.z = Math.PI / 4; rFrame.position.set(0.22, 0, 0); rFrame.scale.z = 0.5;
                
                const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.06, 0.04), frameMat);
                bridge.position.set(0, 0.05, 0);
                
                group.add(lLens, rLens, lFrame, rFrame, bridge);

            } else if (styleIndex === 2) { // Round
                lensMat.color.setHex(0xFF6B6B);
                frameMat.color.setHex(0xaaaaaa);
                frameMat.metalness = 0.9;
                frameMat.roughness = 0.1;

                const lensGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.01, 32);
                const lLens = new THREE.Mesh(lensGeo, lensMat); lLens.rotation.x = Math.PI / 2; lLens.position.set(-0.22, 0, 0);
                const rLens = new THREE.Mesh(lensGeo, lensMat); rLens.rotation.x = Math.PI / 2; rLens.position.set(0.22, 0, 0);
                lenses.push(lLens, rLens);

                const frameGeo = new THREE.TorusGeometry(0.19, 0.015, 16, 50);
                const lFrame = new THREE.Mesh(frameGeo, frameMat); lFrame.position.set(-0.22, 0, 0);
                const rFrame = new THREE.Mesh(frameGeo, frameMat); rFrame.position.set(0.22, 0, 0);
                
                const bridge = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.15), frameMat);
                bridge.rotation.z = Math.PI / 2; bridge.position.set(0, 0, 0);
                
                group.add(lLens, rLens, lFrame, rFrame, bridge);

            } else if (styleIndex === 3) { // Sport
                lensMat.color.setHex(0x00CED1);
                
                const lensGeo = new THREE.BoxGeometry(0.4, 0.2, 0.02);
                const lLens = new THREE.Mesh(lensGeo, lensMat); lLens.position.set(-0.2, 0, 0.05); lLens.rotation.y = 0.3;
                const rLens = new THREE.Mesh(lensGeo, lensMat); rLens.position.set(0.2, 0, 0.05); rLens.rotation.y = -0.3;
                lenses.push(lLens, rLens);

                const topFrameGeo = new THREE.BoxGeometry(0.85, 0.05, 0.06);
                const topFrame = new THREE.Mesh(topFrameGeo, frameMat);
                topFrame.position.set(0, 0.1, 0.02);
                
                group.add(lLens, rLens, topFrame);
            }

            group.userData.lenses = lenses;
            return group;
        }

        // --- Logic & Interactions ---
        
        function updateGlassesOpacity(playerNum) {
            const mount = playerNum === 1 ? p1GlassesMount : p2GlassesMount;
            const opacity = playerNum === 1 ? state.player1Opacity : state.player2Opacity;
            
            if (mount.children.length > 0) {
                const glasses = mount.children[0];
                glasses.userData.lenses.forEach(lens => {
                    lens.material.opacity = opacity;
                });
            }
        }

        function applyStyle(playerNum, styleIndex) {
            const mount = playerNum === 1 ? p1GlassesMount : p2GlassesMount;
            const opacity = playerNum === 1 ? state.player1Opacity : state.player2Opacity;
            
            // Clear existing
            while(mount.children.length > 0){ 
                mount.remove(mount.children[0]); 
            }

            if (styleIndex >= 0 && styleIndex <= 3) {
                const glasses = createGlasses(styleIndex, opacity);
                mount.add(glasses);
                if(playerNum === 1) {
                    state.player1Style = styleIndex;
                    state.player1GlassesVisible = true;
                } else {
                    state.player2Style = styleIndex;
                    state.player2GlassesVisible = true;
                }
            }
            updateUI();
        }

        function removeGlasses(playerNum) {
            const mount = playerNum === 1 ? p1GlassesMount : p2GlassesMount;
            while(mount.children.length > 0){ 
                mount.remove(mount.children[0]); 
            }
            if(playerNum === 1) {
                state.player1Style = -1;
                state.player1GlassesVisible = false;
            } else {
                state.player2Style = -1;
                state.player2GlassesVisible = false;
            }
            updateUI();
        }

        function updateUI() {
            // Update active buttons
            for(let i=0; i<4; i++) {
                document.getElementById(`p1-style-${i}`).classList.toggle('active', state.player1Style === i);
                document.getElementById(`p2-style-${i}`).classList.toggle('active', state.player2Style === i);
            }

            // Update labels
            document.getElementById('p1-current-label').innerText = state.player1Style >= 0 ? state.styleNames[state.player1Style] : 'None';
            document.getElementById('p2-current-label').innerText = state.player2Style >= 0 ? state.styleNames[state.player2Style] : 'None';

            // Update Compare button
            document.getElementById('compare-toggle').classList.toggle('active', state.compareMode);
        }

        // --- Event Listeners ---

        // Style Buttons
        for(let i=0; i<4; i++) {
            document.getElementById(`p1-style-${i}`).addEventListener('click', () => applyStyle(1, i));
            document.getElementById(`p2-style-${i}`).addEventListener('click', () => applyStyle(2, i));
        }

        // Remove Buttons
        document.getElementById('p1-remove').addEventListener('click', () => removeGlasses(1));
        document.getElementById('p2-remove').addEventListener('click', () => removeGlasses(2));

        // Opacity Sliders
        document.getElementById('p1-opacity').addEventListener('input', (e) => {
            state.player1Opacity = parseFloat(e.target.value);
            updateGlassesOpacity(1);
        });
        document.getElementById('p2-opacity').addEventListener('input', (e) => {
            state.player2Opacity = parseFloat(e.target.value);
            updateGlassesOpacity(2);
        });

        // Compare Toggle
        document.getElementById('compare-toggle').addEventListener('click', () => {
            state.compareMode = !state.compareMode;
            updateUI();
        });

        // Screenshot Toggle
        document.getElementById('screenshot-btn').addEventListener('click', () => {
            state.screenshotMode = true;
            document.body.classList.add('screenshot-active');
            
            // Auto exit screenshot mode after 3 seconds or on click
            const exitScreenshot = () => {
                state.screenshotMode = false;
                document.body.classList.remove('screenshot-active');
                window.removeEventListener('click', exitScreenshot);
            };
            setTimeout(() => {
                window.addEventListener('click', exitScreenshot);
            }, 100);
        });

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            if(state.screenshotMode) return;
            const key = e.key.toLowerCase();
            
            // Player 1
            if(['1','2','3','4'].includes(key)) applyStyle(1, parseInt(key)-1);
            if(key === 'q') removeGlasses(1);
            
            // Player 2
            if(['7','8','9','0'].includes(key)) {
                const map = {'7':0, '8':1, '9':2, '0':3};
                applyStyle(2, map[key]);
            }
            if(key === 'p') removeGlasses(2);
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();

            // Handle Compare Mode Rotations
            const targetP1Rot = state.compareMode ? Math.PI / 6 : 0; // +30 deg
            const targetP2Rot = state.compareMode ? -Math.PI / 6 : 0; // -30 deg

            p1Model.rotation.y = THREE.MathUtils.lerp(p1Model.rotation.y, targetP1Rot, 0.1);
            p2Model.rotation.y = THREE.MathUtils.lerp(p2Model.rotation.y, targetP2Rot, 0.1);
            
            state.player1Rotation = THREE.MathUtils.radToDeg(p1Model.rotation.y);
            state.player2Rotation = THREE.MathUtils.radToDeg(p2Model.rotation.y);

            renderer.render(scene, camera);
        }

        // Initialize UI state
        updateUI();
        animate();

    </script>
</body>
</html>
