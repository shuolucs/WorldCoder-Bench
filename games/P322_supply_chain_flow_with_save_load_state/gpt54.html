<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Supply Chain Flow</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .label {
      position: absolute;
      color: white;
      font-size: 14px;
      font-weight: bold;
      transform: translate(-50%, -50%);
      pointer-events: none;
      text-shadow: 0 0 6px rgba(0,0,0,0.8);
      white-space: nowrap;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.45);
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      min-width: 180px;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    #controls button {
      padding: 10px 20px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      background: #e94560;
      color: white;
      transition: opacity 0.2s ease, transform 0.1s ease;
    }

    #controls button:hover {
      opacity: 0.9;
    }

    #controls button:active {
      transform: scale(0.98);
    }

    #shipBtn { background: #e94560; }
    #resetBtn { background: #0f3460; }
    #saveBtn { background: #533483; }
    #loadBtn { background: #2d6a4f; }
  </style>
</head>
<body>
  <div id="hud">
    <div><strong>Segment:</strong> <span id="segmentLabel">Supplier</span></div>
    <div><strong>Shipment Count:</strong> <span id="shipmentCountLabel">0</span></div>
  </div>

  <div id="supplierLabel" class="label">Supplier</div>
  <div id="warehouseLabel" class="label">Warehouse</div>
  <div id="retailerLabel" class="label">Retailer</div>

  <div id="controls">
    <button id="shipBtn">Ship</button>
    <button id="resetBtn">Reset</button>
    <button id="saveBtn">Save State</button>
    <button id="loadBtn">Load State</button>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.159.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.159.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.159.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 15, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 15, 10);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({ color: '#16213e' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const stationData = [
      { name: 'Supplier', color: '#e94560', position: new THREE.Vector3(-10, 0.5, 0) },
      { name: 'Warehouse', color: '#0f3460', position: new THREE.Vector3(0, 0.5, 0) },
      { name: 'Retailer', color: '#533483', position: new THREE.Vector3(10, 0.5, 0) }
    ];

    const stationMeshes = [];

    stationData.forEach((station) => {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(2, 1, 2),
        new THREE.MeshStandardMaterial({ color: station.color })
      );
      mesh.position.copy(station.position);
      scene.add(mesh);
      stationMeshes.push(mesh);
    });

    function createDashedPath(startX, endX) {
      const points = [
        new THREE.Vector3(startX, 0.1, 0),
        new THREE.Vector3(endX, 0.1, 0)
      ];
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineDashedMaterial({
        color: 0xffffff,
        dashSize: 0.8,
        gapSize: 0.4
      });
      const line = new THREE.Line(geometry, material);
      line.computeLineDistances();
      scene.add(line);
    }

    createDashedPath(-10, 0);
    createDashedPath(0, 10);

    const labelEls = {
      Supplier: document.getElementById('supplierLabel'),
      Warehouse: document.getElementById('warehouseLabel'),
      Retailer: document.getElementById('retailerLabel')
    };

    const hudSegment = document.getElementById('segmentLabel');
    const hudShipmentCount = document.getElementById('shipmentCountLabel');

    const shipBtn = document.getElementById('shipBtn');
    const resetBtn = document.getElementById('resetBtn');
    const saveBtn = document.getElementById('saveBtn');
    const loadBtn = document.getElementById('loadBtn');

    const loader = new GLTFLoader();

    let carTemplate = null;
    let shipmentCar = null;

    let currentSegment = 0;
    let isMoving = false;
    let shipmentCount = 0;
    let stateSaved = false;
    let stateLoaded = false;
    let sceneReady = false;

    const speed = 3;
    const stationXs = [-10, 0, 10];
    let moveTargetX = stationXs[0];

    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      carPositionX: -10,
      carPositionY: 0.3,
      currentSegment: 0,
      isMoving: false,
      shipmentCount: 0,
      stationCount: 3,
      stateSaved: false,
      stateLoaded: false,
      sceneReady: false
    };

    function getSegmentLabel() {
      if (isMoving) {
        if (moveTargetX === 0) return 'Warehouse';
        if (moveTargetX === 10) return 'Retailer';
      }
      if (currentSegment <= 0) return 'Supplier';
      if (currentSegment === 1) return 'Warehouse';
      return 'Retailer';
    }

    function updateHUD() {
      hudSegment.textContent = getSegmentLabel();
      hudShipmentCount.textContent = shipmentCount;
    }

    function updateLabels() {
      stationData.forEach((station) => {
        const pos = station.position.clone();
        pos.y += 2;

        pos.project(camera);

        const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;

        const el = labelEls[station.name];
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
      });
    }

    function updateState() {
      window.__3D_STATE__.carPositionX = shipmentCar ? shipmentCar.position.x : stationXs[0];
      window.__3D_STATE__.carPositionY = shipmentCar ? shipmentCar.position.y : 0.3;
      window.__3D_STATE__.currentSegment = currentSegment;
      window.__3D_STATE__.isMoving = isMoving;
      window.__3D_STATE__.shipmentCount = shipmentCount;
      window.__3D_STATE__.stationCount = 3;
      window.__3D_STATE__.stateSaved = stateSaved;
      window.__3D_STATE__.stateLoaded = stateLoaded;
      window.__3D_STATE__.sceneReady = sceneReady;
    }

    function placeCarAtSupplier() {
      if (!shipmentCar) return;
      shipmentCar.position.set(-10, 0.3, 0);
      shipmentCar.rotation.set(0, 0, 0);
    }

    function startShipping() {
      if (!shipmentCar || !sceneReady || isMoving) return;
      if (currentSegment >= 2) return;

      moveTargetX = stationXs[currentSegment + 1];
      isMoving = true;
      shipmentCount += 1;
      updateHUD();
    }

    function resetState() {
      if (!shipmentCar) return;
      isMoving = false;
      currentSegment = 0;
      moveTargetX = stationXs[0];
      placeCarAtSupplier();
      updateHUD();
    }

    function saveState() {
      if (!shipmentCar) return;
      const state = {
        carPosition: {
          x: shipmentCar.position.x,
          y: shipmentCar.position.y,
          z: shipmentCar.position.z
        },
        currentSegment,
        shipmentCount,
        isMoving,
        moveTargetX
      };
      localStorage.setItem('supplyChainState', JSON.stringify(state));
      stateSaved = true;
      updateState();
    }

    function loadState() {
      if (!shipmentCar) return;
      const raw = localStorage.getItem('supplyChainState');
      if (!raw) return;

      try {
        const state = JSON.parse(raw);
        shipmentCar.position.set(
          state.carPosition?.x ?? -10,
          state.carPosition?.y ?? 0.3,
          state.carPosition?.z ?? 0
        );
        currentSegment = state.currentSegment ?? 0;
        shipmentCount = state.shipmentCount ?? 0;
        isMoving = state.isMoving ?? false;
        moveTargetX = state.moveTargetX ?? stationXs[Math.min(currentSegment, 2)];
        shipmentCar.rotation.set(0, 0, 0);
        stateLoaded = true;
        updateHUD();
        updateState();
      } catch (e) {
        console.error('Failed to load state:', e);
      }
    }

    shipBtn.addEventListener('click', startShipping);
    resetBtn.addEventListener('click', resetState);
    saveBtn.addEventListener('click', saveState);
    loadBtn.addEventListener('click', loadState);

    loader.load(
      'https://threejs.org/examples/models/gltf/ToyCar.glb',
      (gltf) => {
        carTemplate = gltf.scene;
        shipmentCar = carTemplate.clone(true);
        shipmentCar.scale.set(8, 8, 8);
        shipmentCar.position.set(-10, 0.3, 0);
        shipmentCar.rotation.y = 0;
        scene.add(shipmentCar);

        sceneReady = true;
        updateHUD();
        updateState();
      },
      undefined,
      (error) => {
        console.error('Error loading ToyCar.glb:', error);
      }
    );

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (shipmentCar && isMoving) {
        const dir = Math.sign(moveTargetX - shipmentCar.position.x);
        shipmentCar.position.x += dir * speed * delta;

        if (Math.abs(moveTargetX - shipmentCar.position.x) <= 0.1 || dir === 0) {
          shipmentCar.position.x = moveTargetX;
          shipmentCar.position.y = 0.3;
          isMoving = false;
          currentSegment = Math.min(currentSegment + 1, 2);
        }
      }

      controls.update();
      updateLabels();
      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
