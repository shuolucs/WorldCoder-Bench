<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Supply Chain Flow Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: Arial, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.65);
    color: #fff;
    padding: 15px 20px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 180px;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  #hud .label { color: #aaa; font-size: 12px; }
  #hud .value { color: #fff; font-weight: bold; }

  #buttons {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
  }
  #buttons button {
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    color: #fff;
    transition: all 0.2s ease;
  }
  #shipBtn { background: #e94560; }
  #shipBtn:hover { background: #ff6b81; }
  #resetBtn { background: #0f3460; }
  #resetBtn:hover { background: #1a5276; }
  #saveBtn { background: #533483; }
  #saveBtn:hover { background: #6c44a2; }
  #loadBtn { background: #2d6a4f; }
  #loadBtn:hover { background: #40916c; }

  .station-label {
    position: absolute;
    color: #fff;
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    pointer-events: none;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
    transform: translate(-50%, -100%);
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="hud">
  <div><span class="label">Current Station: </span><span class="value" id="hudStation">Supplier</span></div>
  <div><span class="label">Shipments: </span><span class="value" id="hudShipments">0</span></div>
</div>

<div id="buttons">
  <button id="shipBtn">Ship</button>
  <button id="resetBtn">Reset</button>
  <button id="saveBtn">Save State</button>
  <button id="loadBtn">Load State</button>
</div>

<div class="station-label" id="labelSupplier">📦 Supplier</div>
<div class="station-label" id="labelWarehouse">🏭 Warehouse</div>
<div class="station-label" id="labelRetailer">🏪 Retailer</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const stationPositions = [
  { x: -10, y: 0.5, z: 0, name: 'Supplier' },
  { x: 0, y: 0.5, z: 0, name: 'Warehouse' },
  { x: 10, y: 0.5, z: 0, name: 'Retailer' }
];

const state = {
  carPositionX: -10,
  carPositionY: 0.3,
  currentSegment: 0,
  isMoving: false,
  shipmentCount: 0,
  stationCount: 3,
  stateSaved: false,
  stateLoaded: false,
  sceneReady: false
};

window.__3D_STATE__ = state;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 15, 20);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 15, 10);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Ground
const groundGeom = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x16213e });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Stations
const stationColors = [0xe94560, 0x0f3460, 0x533483];
const stationMeshes = [];

stationPositions.forEach((pos, i) => {
  const geom = new THREE.BoxGeometry(2, 1, 2);
  const mat = new THREE.MeshStandardMaterial({ color: stationColors[i] });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(pos.x, pos.y, pos.z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  stationMeshes.push(mesh);
});

// Dashed path lines
function createDashedLine(from, to) {
  const points = [new THREE.Vector3(from.x, 0.1, from.z), new THREE.Vector3(to.x, 0.1, to.z)];
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineDashedMaterial({
    color: 0xffffff,
    dashSize: 0.5,
    gapSize: 0.3,
    linewidth: 1
  });
  const line = new THREE.Line(geometry, material);
  line.computeLineDistances();
  return line;
}

scene.add(createDashedLine(stationPositions[0], stationPositions[1]));
scene.add(createDashedLine(stationPositions[1], stationPositions[2]));

// Load Toy Car
let carModel = null;
let targetX = null;
const speed = 3; // units per second

const loader = new GLTFLoader();
loader.load('https://threejs.org/examples/models/gltf/ToyCar.glb', (gltf) => {
  carModel = gltf.scene;
  carModel.scale.set(8, 8, 8);
  carModel.position.set(-10, 0.3, 0);
  // Rotate to face +X direction
  carModel.rotation.y = Math.PI / 2;
  carModel.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  scene.add(carModel);
  state.sceneReady = true;
}, undefined, (error) => {
  console.error('Error loading ToyCar.glb:', error);
});

// Button handlers
document.getElementById('shipBtn').addEventListener('click', () => {
  if (!carModel || state.isMoving) return;
  if (state.currentSegment >= 2) return; // Already at Retailer

  const nextSegment = state.currentSegment + 1;
  targetX = stationPositions[nextSegment].x;
  state.isMoving = true;
  state.shipmentCount++;
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!carModel) return;
  state.isMoving = false;
  targetX = null;
  state.currentSegment = 0;
  state.carPositionX = stationPositions[0].x;
  state.carPositionY = 0.3;
  carModel.position.set(state.carPositionX, state.carPositionY, 0);
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const saveData = {
    carPositionX: state.carPositionX,
    carPositionY: state.carPositionY,
    currentSegment: state.currentSegment,
    shipmentCount: state.shipmentCount,
    isMoving: state.isMoving,
    targetX: targetX
  };
  localStorage.setItem('supplyChainState', JSON.stringify(saveData));
  state.stateSaved = true;
});

document.getElementById('loadBtn').addEventListener('click', () => {
  const raw = localStorage.getItem('supplyChainState');
  if (!raw || !carModel) return;
  try {
    const saveData = JSON.parse(raw);
    state.carPositionX = saveData.carPositionX;
    state.carPositionY = saveData.carPositionY;
    state.currentSegment = saveData.currentSegment;
    state.shipmentCount = saveData.shipmentCount;
    state.isMoving = saveData.isMoving;
    targetX = saveData.targetX;
    carModel.position.set(state.carPositionX, state.carPositionY, 0);
    state.stateLoaded = true;
  } catch (e) {
    console.error('Failed to load state:', e);
  }
});

// Label positioning
const labelElements = [
  document.getElementById('labelSupplier'),
  document.getElementById('labelWarehouse'),
  document.getElementById('labelRetailer')
];

function updateLabels() {
  stationPositions.forEach((pos, i) => {
    const vec = new THREE.Vector3(pos.x, pos.y + 1.5, pos.z);
    vec.project(camera);
    const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;
    labelElements[i].style.left = x + 'px';
    labelElements[i].style.top = y + 'px';

    // Hide if behind camera
    if (vec.z > 1) {
      labelElements[i].style.display = 'none';
    } else {
      labelElements[i].style.display = 'block';
    }
  });
}

// HUD update
function updateHUD() {
  const names = ['Supplier', 'Warehouse', 'Retailer'];
  document.getElementById('hudStation').textContent = names[state.currentSegment] || 'Supplier';
  document.getElementById('hudShipments').textContent = state.shipmentCount;
}

// Animation
let lastTime = performance.now();

function animate(time) {
  requestAnimationFrame(animate);

  const delta = (time - lastTime) / 1000;
  lastTime = time;

  controls.update();

  // Move car
  if (carModel && state.isMoving && targetX !== null) {
    const currentX = carModel.position.x;
    const direction = Math.sign(targetX - currentX);
    const step = speed * delta * direction;
    let newX = currentX + step;

    if (Math.abs(targetX - newX) < 0.1 || (direction > 0 && newX >= targetX) || (direction < 0 && newX <= targetX)) {
      newX = targetX;
      state.isMoving = false;
      state.currentSegment = state.currentSegment + 1;
      targetX = null;
    }

    carModel.position.x = newX;
    state.carPositionX = newX;
    state.carPositionY = carModel.position.y;
  } else if (carModel) {
    state.carPositionX = carModel.position.x;
    state.carPositionY = carModel.position.y;
  }

  updateLabels();
  updateHUD();
  renderer.render(scene, camera);
}

requestAnimationFrame(animate);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
