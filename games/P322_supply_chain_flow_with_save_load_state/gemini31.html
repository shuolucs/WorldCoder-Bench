<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Supply Chain Flow</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            min-width: 200px;
        }
        #hud h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #4facfe;
        }
        #hud p {
            margin: 5px 0;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s, transform 0.1s;
            color: white;
        }
        button:active {
            transform: scale(0.95);
        }
        #shipBtn { background-color: #e94560; }
        #shipBtn:hover { background-color: #ff5c77; }
        #resetBtn { background-color: #533483; }
        #resetBtn:hover { background-color: #6b46a3; }
        #saveBtn { background-color: #0f3460; }
        #saveBtn:hover { background-color: #1a4b87; }
        #loadBtn { background-color: #16213e; border: 1px solid #4facfe; }
        #loadBtn:hover { background-color: #233561; }
        
        .station-label {
            position: absolute;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h3>Supply Chain Status</h3>
        <p>Location: <span id="hud-location">Supplier</span></p>
        <p>Shipments: <span id="hud-shipments">0</span></p>
    </div>

    <div id="labels-container"></div>

    <div id="controls">
        <button id="shipBtn">Ship</button>
        <button id="resetBtn">Reset</button>
        <button id="saveBtn">Save State</button>
        <button id="loadBtn">Load State</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            carPositionX: -10,
            carPositionY: 0.3,
            currentSegment: 0,
            isMoving: false,
            shipmentCount: 0,
            stationCount: 3,
            stateSaved: false,
            stateLoaded: false,
            sceneReady: false
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(40, 40);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x16213e });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Stations Data
        const stationsData = [
            { name: 'Supplier', color: 0xe94560, x: -10 },
            { name: 'Warehouse', color: 0x0f3460, x: 0 },
            { name: 'Retailer', color: 0x533483, x: 10 }
        ];

        const labelsContainer = document.getElementById('labels-container');
        const stationLabels = [];

        // Create Stations and Labels
        const boxGeo = new THREE.BoxGeometry(2, 1, 2);
        stationsData.forEach(data => {
            const mat = new THREE.MeshStandardMaterial({ color: data.color });
            const mesh = new THREE.Mesh(boxGeo, mat);
            mesh.position.set(data.x, 0.5, 0);
            scene.add(mesh);

            // HTML Label
            const labelDiv = document.createElement('div');
            labelDiv.className = 'station-label';
            labelDiv.textContent = data.name;
            labelsContainer.appendChild(labelDiv);
            stationLabels.push({ element: labelDiv, pos: new THREE.Vector3(data.x, 1.5, 0) });
        });

        // Paths (Dashed Lines)
        const pathPoints = [];
        stationsData.forEach(data => pathPoints.push(new THREE.Vector3(data.x, 0.1, 0)));
        const pathGeo = new THREE.BufferGeometry().setFromPoints(pathPoints);
        const pathMat = new THREE.LineDashedMaterial({
            color: 0xffffff,
            linewidth: 1,
            scale: 1,
            dashSize: 0.5,
            gapSize: 0.5
        });
        const pathLine = new THREE.Line(pathGeo, pathMat);
        pathLine.computeLineDistances();
        scene.add(pathLine);

        // Toy Car
        let car;
        let targetX = -10;
        const carSpeed = 3; // units per second

        const loader = new GLTFLoader();
        loader.load('https://threejs.org/examples/models/gltf/ToyCar.glb', (gltf) => {
            const originalCar = gltf.scene;
            car = originalCar.clone();
            car.scale.set(8, 8, 8);
            car.position.set(-10, 0.3, 0);
            car.rotation.y = Math.PI / 2; // Face +X
            scene.add(car);
            window.__3D_STATE__.sceneReady = true;
        });

        // UI Elements
        const hudLocation = document.getElementById('hud-location');
        const hudShipments = document.getElementById('hud-shipments');

        // Interactions
        document.getElementById('shipBtn').addEventListener('click', () => {
            if (!window.__3D_STATE__.sceneReady || !car) return;
            
            if (!window.__3D_STATE__.isMoving && window.__3D_STATE__.currentSegment < 2) {
                window.__3D_STATE__.isMoving = true;
                targetX = stationsData[window.__3D_STATE__.currentSegment + 1].x;
                window.__3D_STATE__.shipmentCount++;
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (!window.__3D_STATE__.sceneReady || !car) return;
            
            window.__3D_STATE__.isMoving = false;
            window.__3D_STATE__.currentSegment = 0;
            car.position.x = stationsData[0].x;
            targetX = stationsData[0].x;
        });

        document.getElementById('saveBtn').addEventListener('click', () => {
            if (!window.__3D_STATE__.sceneReady || !car) return;

            const stateToSave = {
                carPositionX: car.position.x,
                currentSegment: window.__3D_STATE__.currentSegment,
                shipmentCount: window.__3D_STATE__.shipmentCount,
                isMoving: window.__3D_STATE__.isMoving
            };
            localStorage.setItem('supplyChainState', JSON.stringify(stateToSave));
            window.__3D_STATE__.stateSaved = true;
        });

        document.getElementById('loadBtn').addEventListener('click', () => {
            if (!window.__3D_STATE__.sceneReady || !car) return;

            const savedState = localStorage.getItem('supplyChainState');
            if (savedState) {
                const parsed = JSON.parse(savedState);
                car.position.x = parsed.carPositionX;
                window.__3D_STATE__.currentSegment = parsed.currentSegment;
                window.__3D_STATE__.shipmentCount = parsed.shipmentCount;
                window.__3D_STATE__.isMoving = parsed.isMoving;
                
                if (parsed.isMoving && parsed.currentSegment < 2) {
                    targetX = stationsData[parsed.currentSegment + 1].x;
                } else {
                    targetX = car.position.x;
                }
                window.__3D_STATE__.stateLoaded = true;
            }
        });

        // Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = clock.getDelta();
            controls.update();

            // Car Movement Logic
            if (window.__3D_STATE__.sceneReady && car && window.__3D_STATE__.isMoving) {
                const dir = Math.sign(targetX - car.position.x);
                car.position.x += dir * carSpeed * dt;

                if (Math.abs(car.position.x - targetX) < 0.1) {
                    car.position.x = targetX;
                    window.__3D_STATE__.isMoving = false;
                    window.__3D_STATE__.currentSegment++;
                }
            }

            // Update State Object
            if (car) {
                window.__3D_STATE__.carPositionX = car.position.x;
                window.__3D_STATE__.carPositionY = car.position.y;
            }

            // Update HUD
            let locationText = stationsData[window.__3D_STATE__.currentSegment]?.name || "Retailer";
            if (window.__3D_STATE__.isMoving) {
                locationText = `Moving to ${stationsData[window.__3D_STATE__.currentSegment + 1].name}`;
            }
            hudLocation.textContent = locationText;
            hudShipments.textContent = window.__3D_STATE__.shipmentCount;

            // Update HTML Labels Position
            stationLabels.forEach(label => {
                const vector = label.pos.clone();
                vector.project(camera);
                
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
                
                if (vector.z < 1) {
                    label.element.style.display = 'block';
                    label.element.style.left = `${x}px`;
                    label.element.style.top = `${y}px`;
                } else {
                    label.element.style.display = 'none';
                }
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
