<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Air Hockey</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    z-index: 10;
    background: rgba(0,0,0,0.5);
    padding: 10px 30px;
    border-radius: 10px;
}
#newGameBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 10px 20px;
    font-size: 16px;
    font-weight: bold;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    z-index: 10;
}
#newGameBtn:hover { background: #45a049; }
#debug {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: #aaa;
    font-size: 14px;
    z-index: 10;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 5px;
}
#gameOverOverlay {
    display: none;
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 20;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
#gameOverOverlay.active { display: flex; }
#gameOverOverlay h1 {
    color: #ff5722;
    font-size: 64px;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
    margin-bottom: 20px;
}
#gameOverOverlay p {
    color: white;
    font-size: 32px;
    margin-bottom: 30px;
}
#gameOverOverlay button {
    padding: 15px 40px;
    font-size: 20px;
    font-weight: bold;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>
<body>
<div id="hud">Player: 0 | AI: 0</div>
<button id="newGameBtn">New Game</button>
<div id="debug">Puck Speed: 0.000</div>
<div id="gameOverOverlay">
    <h1>GAME OVER</h1>
    <p id="winnerText">Player Wins!</p>
    <button onclick="resetGame()">Play Again</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
    playerScore: 0,
    aiScore: 0,
    puckX: 0, puckZ: 0,
    puckVX: 0, puckVZ: 0,
    puckSpeed: 0,
    playerPaddleX: 0, playerPaddleZ: 5,
    aiPaddleX: 0, aiPaddleZ: -5,
    gameOver: false,
    winner: '',
    goalPause: false,
    dragonLoaded: false,
    dragonRotationY: 0,
    frameCount: 0,
    maxPuckSpeed: 0.3,
    tableWidth: 10,
    tableLength: 16
};
window.__3D_STATE__ = state;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(0, 10, 0);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Table surface
const tableGeom = new THREE.BoxGeometry(10, 0.3, 16);
const tableMat = new THREE.MeshStandardMaterial({ color: 0x1a237e });
const table = new THREE.Mesh(tableGeom, tableMat);
table.position.set(0, 0, 0);
table.receiveShadow = true;
scene.add(table);

// White boundary lines on table surface
const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x444444 });

// Center line
const centerLineGeom = new THREE.BoxGeometry(10, 0.01, 0.05);
const centerLine = new THREE.Mesh(centerLineGeom, lineMat);
centerLine.position.set(0, 0.16, 0);
scene.add(centerLine);

// Center circle
const circleGeom = new THREE.RingGeometry(1.5, 1.55, 64);
const circleMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, emissive: 0x444444 });
const centerCircle = new THREE.Mesh(circleGeom, circleMat);
centerCircle.rotation.x = -Math.PI / 2;
centerCircle.position.set(0, 0.16, 0);
scene.add(centerCircle);

// Boundary lines (outer)
const boundaryLines = [
    { w: 10, d: 0.05, x: 0, z: -7.975 },
    { w: 10, d: 0.05, x: 0, z: 7.975 },
    { w: 0.05, d: 16, x: -4.975, z: 0 },
    { w: 0.05, d: 16, x: 4.975, z: 0 },
];
boundaryLines.forEach(l => {
    const g = new THREE.BoxGeometry(l.w, 0.01, l.d);
    const m = new THREE.Mesh(g, lineMat);
    m.position.set(l.x, 0.16, l.z);
    scene.add(m);
});

// Walls
const wallMat = new THREE.MeshStandardMaterial({ color: 0x424242 });
const wallHeight = 0.5;
const wallThick = 0.3;

// Side walls
const sideWallGeom = new THREE.BoxGeometry(wallThick, wallHeight, 16);
const leftWall = new THREE.Mesh(sideWallGeom, wallMat);
leftWall.position.set(-5.15, wallHeight / 2, 0);
leftWall.castShadow = true;
scene.add(leftWall);

const rightWall = new THREE.Mesh(sideWallGeom, wallMat);
rightWall.position.set(5.15, wallHeight / 2, 0);
rightWall.castShadow = true;
scene.add(rightWall);

// End walls with goal openings
// Goal width = 3, centered. So wall segments on each side: from X=-5 to X=-1.5 and X=1.5 to X=5
const endWallSideWidth = (10 - 3) / 2; // 3.5
const endWallGeom = new THREE.BoxGeometry(endWallSideWidth, wallHeight, wallThick);

// Back wall (Z = -8)
const backWallLeft = new THREE.Mesh(endWallGeom, wallMat);
backWallLeft.position.set(-5 + endWallSideWidth / 2, wallHeight / 2, -8.15);
backWallLeft.castShadow = true;
scene.add(backWallLeft);

const backWallRight = new THREE.Mesh(endWallGeom, wallMat);
backWallRight.position.set(5 - endWallSideWidth / 2, wallHeight / 2, -8.15);
backWallRight.castShadow = true;
scene.add(backWallRight);

// Front wall (Z = 8)
const frontWallLeft = new THREE.Mesh(endWallGeom, wallMat);
frontWallLeft.position.set(-5 + endWallSideWidth / 2, wallHeight / 2, 8.15);
frontWallLeft.castShadow = true;
scene.add(frontWallLeft);

const frontWallRight = new THREE.Mesh(endWallGeom, wallMat);
frontWallRight.position.set(5 - endWallSideWidth / 2, wallHeight / 2, 8.15);
frontWallRight.castShadow = true;
scene.add(frontWallRight);

// Goal indicators (red areas behind goals)
const goalIndicatorGeom = new THREE.BoxGeometry(3, 0.05, 1);
const goalIndicatorMat = new THREE.MeshStandardMaterial({ color: 0xff1744, emissive: 0x880000 });
const goalBack = new THREE.Mesh(goalIndicatorGeom, goalIndicatorMat);
goalBack.position.set(0, 0.025, -8.5);
scene.add(goalBack);
const goalFront = new THREE.Mesh(goalIndicatorGeom, goalIndicatorMat);
goalFront.position.set(0, 0.025, 8.5);
scene.add(goalFront);

// Goal net walls (sides of goal openings)
const goalSideGeom = new THREE.BoxGeometry(wallThick, wallHeight, 1);
// Back goal sides
const bgls = new THREE.Mesh(goalSideGeom, wallMat);
bgls.position.set(-1.5, wallHeight / 2, -8.5);
scene.add(bgls);
const bgrs = new THREE.Mesh(goalSideGeom, wallMat);
bgrs.position.set(1.5, wallHeight / 2, -8.5);
scene.add(bgrs);
// Back goal back wall
const bgbw = new THREE.BoxGeometry(3 + wallThick, wallHeight, wallThick);
const bgb = new THREE.Mesh(bgbw, wallMat);
bgb.position.set(0, wallHeight / 2, -9.15);
scene.add(bgb);

// Front goal sides
const fgls = new THREE.Mesh(goalSideGeom, wallMat);
fgls.position.set(-1.5, wallHeight / 2, 8.5);
scene.add(fgls);
const fgrs = new THREE.Mesh(goalSideGeom, wallMat);
fgrs.position.set(1.5, wallHeight / 2, 8.5);
scene.add(fgrs);
// Front goal back wall
const fgb = new THREE.Mesh(bgbw, wallMat);
fgb.position.set(0, wallHeight / 2, 9.15);
scene.add(fgb);

// Puck
const puckRadius = 0.4;
const puckHeight = 0.15;
const puckGeom = new THREE.CylinderGeometry(puckRadius, puckRadius, puckHeight, 32);
const puckMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000 });
const puck = new THREE.Mesh(puckGeom, puckMat);
puck.position.set(0, 0.225, 0);
puck.castShadow = true;
scene.add(puck);

// Player paddle
const paddleRadius = 0.6;
const paddleHeight = 0.2;
const playerPaddleGeom = new THREE.CylinderGeometry(paddleRadius, paddleRadius, paddleHeight, 32);
const playerPaddleMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, emissive: 0x1B5E20 });
const playerPaddle = new THREE.Mesh(playerPaddleGeom, playerPaddleMat);
playerPaddle.position.set(0, 0.25, 5);
playerPaddle.castShadow = true;
scene.add(playerPaddle);

// AI paddle
const aiPaddleGeom = new THREE.CylinderGeometry(paddleRadius, paddleRadius, paddleHeight, 32);
const aiPaddleMat = new THREE.MeshStandardMaterial({ color: 0xFFEB3B, emissive: 0x827717 });
const aiPaddle = new THREE.Mesh(aiPaddleGeom, aiPaddleMat);
aiPaddle.position.set(0, 0.25, -5);
aiPaddle.castShadow = true;
scene.add(aiPaddle);

// Paddle handle decorations
const handleGeom = new THREE.CylinderGeometry(0.25, 0.25, 0.3, 32);
const playerHandleMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
const playerHandle = new THREE.Mesh(handleGeom, playerHandleMat);
playerHandle.position.set(0, 0.4, 5);
scene.add(playerHandle);

const aiHandleMat = new THREE.MeshStandardMaterial({ color: 0xF9A825 });
const aiHandle = new THREE.Mesh(handleGeom, aiHandleMat);
aiHandle.position.set(0, 0.4, -5);
scene.add(aiHandle);

// Dragon model
let dragonModel = null;
const loader = new GLTFLoader();
loader.load(
    'DragonAttenuation.glb',
    (gltf) => {
        dragonModel = gltf.scene;
        const box = new THREE.Box3().setFromObject(dragonModel);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 1.5 / maxDim;
        dragonModel.scale.set(scale, scale, scale);
        
        const center = box.getCenter(new THREE.Vector3());
        dragonModel.position.set(
            5 - center.x * scale,
            3 - center.y * scale,
            0 - center.z * scale
        );
        
        scene.add(dragonModel);
        state.dragonLoaded = true;
    },
    undefined,
    (error) => {
        console.log('Dragon model not found, adding placeholder');
        // Placeholder trophy
        const trophyGroup = new THREE.Group();
        const baseGeom = new THREE.CylinderGeometry(0.4, 0.5, 0.3, 32);
        const trophyMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8, roughness: 0.2 });
        const base = new THREE.Mesh(baseGeom, trophyMat);
        trophyGroup.add(base);
        
        const cupGeom = new THREE.CylinderGeometry(0.5, 0.3, 0.8, 32);
        const cup = new THREE.Mesh(cupGeom, trophyMat);
        cup.position.y = 0.55;
        trophyGroup.add(cup);
        
        const starGeom = new THREE.OctahedronGeometry(0.3);
        const star = new THREE.Mesh(starGeom, trophyMat);
        star.position.y = 1.2;
        trophyGroup.add(star);
        
        trophyGroup.position.set(5, 3, 0);
        scene.add(trophyGroup);
        dragonModel = trophyGroup;
        state.dragonLoaded = true;
    }
);

// Floor
const floorGeom = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.5;
floor.receiveShadow = true;
scene.add(floor);

// Game variables
let puckVX = 0, puckVZ = 0;
let prevPlayerX = 0, prevPlayerZ = 5;
let playerTargetX = 0, playerTargetZ = 5;
let goalPauseTimer = 0;
const friction = 0.998;
const restitution = 0.9;
const maxSpeed = 0.3;
const winScore = 5;

// Mouse tracking
const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
const tablePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -0.15);

window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersection = new THREE.Vector3();
    raycaster.ray.intersectPlane(tablePlane, intersection);
    
    if (intersection) {
        playerTargetX = THREE.MathUtils.clamp(intersection.x, -4.1, 4.1);
        playerTargetZ = THREE.MathUtils.clamp(intersection.z, 0.6, 7.2);
    }
});

// Keyboard
window.addEventListener('keydown', (e) => {
    if (e.code === 'KeyR') {
        resetGame();
    }
    if (e.code === 'Space') {
        e.preventDefault();
        launchPuck();
    }
});

document.getElementById('newGameBtn').addEventListener('click', resetGame);

function launchPuck() {
    const speed = Math.sqrt(puckVX * puckVX + puckVZ * puckVZ);
    if (speed < 0.01 && !state.goalPause && !state.gameOver) {
        const angle = (Math.random() - 0.5) * Math.PI * 0.5;
        puckVX = Math.sin(angle) * 0.15;
        puckVZ = -Math.cos(angle) * 0.15;
    }
}

function resetGame() {
    state.playerScore = 0;
    state.aiScore = 0;
    state.gameOver = false;
    state.winner = '';
    state.goalPause = false;
    goalPauseTimer = 0;
    
    puck.position.set(0, 0.225, 0);
    puckVX = 0;
    puckVZ = 0;
    
    playerPaddle.position.set(0, 0.25, 5);
    playerHandle.position.set(0, 0.4, 5);
    playerTargetX = 0;
    playerTargetZ = 5;
    prevPlayerX = 0;
    prevPlayerZ = 5;
    
    aiPaddle.position.set(0, 0.25, -5);
    aiHandle.position.set(0, 0.4, -5);
    
    document.getElementById('gameOverOverlay').classList.remove('active');
    updateHUD();
}

function resetAfterGoal() {
    puck.position.set(0, 0.225, 0);
    puckVX = 0;
    puckVZ = 0;
    
    playerPaddle.position.set(0, 0.25, 5);
    playerHandle.position.set(0, 0.4, 5);
    playerTargetX = 0;
    playerTargetZ = 5;
    prevPlayerX = 0;
    prevPlayerZ = 5;
    
    aiPaddle.position.set(0, 0.25, -5);
    aiHandle.position.set(0, 0.4, -5);
}

function updateHUD() {
    document.getElementById('hud').textContent = `Player: ${state.playerScore} | AI: ${state.aiScore}`;
}

function checkPaddleCollision(paddleMesh, paddleVX, paddleVZ) {
    const dx = puck.position.x - paddleMesh.position.x;
    const dz = puck.position.z - paddleMesh.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const minDist = puckRadius + paddleRadius;
    
    if (dist < minDist && dist > 0) {
        // Normalize collision direction
        const nx = dx / dist;
        const nz = dz / dist;
        
        // Separate puck from paddle
        puck.position.x = paddleMesh.position.x + nx * minDist;
        puck.position.z = paddleMesh.position.z + nz * minDist;
        
        // Reflect velocity
        const dot = puckVX * nx + puckVZ * nz;
        if (dot < 0) {
            puckVX -= 2 * dot * nx;
            puckVZ -= 2 * dot * nz;
        }
        
        // Add paddle velocity influence
        puckVX += paddleVX * 0.5;
        puckVZ += paddleVZ * 0.5;
        
        // Cap speed
        const speed = Math.sqrt(puckVX * puckVX + puckVZ * puckVZ);
        if (speed > maxSpeed) {
            puckVX = (puckVX / speed) * maxSpeed;
            puckVZ = (puckVZ / speed) * maxSpeed;
        }
        
        // Ensure minimum speed after hit
        const newSpeed = Math.sqrt(puckVX * puckVX + puckVZ * puckVZ);
        if (newSpeed < 0.05) {
            puckVX = nx * 0.1;
            puckVZ = nz * 0.1;
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    state.frameCount++;
    
    // Dragon rotation
    if (dragonModel) {
        dragonModel.rotation.y += 0.01;
        state.dragonRotationY = dragonModel.rotation.y;
        // Hover effect
        dragonModel.position.y = 3 + Math.sin(state.frameCount * 0.02) * 0.2;
    }
    
    if (state.gameOver) {
        renderer.render(scene, camera);
        return;
    }
    
    // Goal pause
    if (state.goalPause) {
        goalPauseTimer--;
        if (goalPauseTimer <= 0) {
            state.goalPause = false;
            resetAfterGoal();
            
            if (state.playerScore >= winScore || state.aiScore >= winScore) {
                state.gameOver = true;
                state.winner = state.playerScore >= winScore ? 'player' : 'ai';
                document.getElementById('winnerText').textContent = 
                    state.winner === 'player' ? 'Player Wins!' : 'AI Wins!';
                document.getElementById('gameOverOverlay').classList.add('active');
            }
        }
        updateState();
        renderer.render(scene, camera);
        return;
    }
    
    // Store previous paddle position for velocity calculation
    const oldPlayerX = playerPaddle.position.x;
    const oldPlayerZ = playerPaddle.position.z;
    
    // Move player paddle toward target
    playerPaddle.position.x += (playerTargetX - playerPaddle.position.x) * 0.3;
    playerPaddle.position.z += (playerTargetZ - playerPaddle.position.z) * 0.3;
    playerHandle.position.x = playerPaddle.position.x;
    playerHandle.position.z = playerPaddle.position.z;
    
    const playerVX = playerPaddle.position.x - oldPlayerX;
    const playerVZ = playerPaddle.position.z - oldPlayerZ;
    
    // AI behavior
    const oldAiX = aiPaddle.position.x;
    const oldAiZ = aiPaddle.position.z;
    
    // AI tracks puck X with smoothing
    const aiTargetX = THREE.MathUtils.clamp(puck.position.x, -4.1, 4.1);
    aiPaddle.position.x += (aiTargetX - aiPaddle.position.x) * 0.03;
    
    // AI Z movement
    if (puck.position.z < 0) {
        // Puck in AI half, move toward it
        const aiTargetZ = THREE.MathUtils.clamp(puck.position.z + 0.5, -7.2, -0.6);
        aiPaddle.position.z += (aiTargetZ - aiPaddle.position.z) * 0.03;
    } else {
        // Return to default position
        aiPaddle.position.z += (-5 - aiPaddle.position.z) * 0.03;
    }
    
    // Clamp AI paddle
    aiPaddle.position.x = THREE.MathUtils.clamp(aiPaddle.position.x, -4.1, 4.1);
    aiPaddle.position.z = THREE.MathUtils.clamp(aiPaddle.position.z, -7.2, -0.6);
    aiHandle.position.x = aiPaddle.position.x;
    aiHandle.position.z = aiPaddle.position.z;
    
    const aiVX = aiPaddle.position.x - oldAiX;
    const aiVZ = aiPaddle.position.z - oldAiZ;
    
    // Apply friction
    puckVX *= friction;
    puckVZ *= friction;
    
    // Move puck
    puck.position.x += puckVX;
    puck.position.z += puckVZ;
    
    // Wall collisions - side walls
    const wallXLimit = 4.7;
    if (puck.position.x - puckRadius < -wallXLimit) {
        puck.position.x = -wallXLimit + puckRadius;
        puckVX = Math.abs(puckVX) * restitution;
    }
    if (puck.position.x + puckRadius > wallXLimit) {
        puck.position.x = wallXLimit - puckRadius;
        puckVX = -Math.abs(puckVX) * restitution;
    }
    
    // End wall collisions
    const wallZLimit = 7.7;
    const goalHalfWidth = 1.5;
    
    // Back wall (Z = -8 side)
    if (puck.position.z - puckRadius < -wallZLimit) {
        if (Math.abs(puck.position.x) < goalHalfWidth) {
            // Goal! Player scores
            if (puck.position.z < -8) {
                state.playerScore++;
                updateHUD();
                state.goalPause = true;
                goalPauseTimer = 60; // ~1 second at 60fps
                puckVX = 0;
                puckVZ = 0;
            }
        } else {
            puck.position.z = -wallZLimit + puckRadius;
            puckVZ = Math.abs(puckVZ) * restitution;
        }
    }
    
    // Front wall (Z = 8 side)
    if (puck.position.z + puckRadius > wallZLimit) {
        if (Math.abs(puck.position.x) < goalHalfWidth) {
            // Goal! AI scores
            if (puck.position.z > 8) {
                state.aiScore++;
                updateHUD();
                state.goalPause = true;
                goalPauseTimer = 60;
                puckVX = 0;
                puckVZ = 0;
            }
        } else {
            puck.position.z = wallZLimit - puckRadius;
            puckVZ = -Math.abs(puckVZ) * restitution;
        }
    }
    
    // Paddle collisions
    checkPaddleCollision(playerPaddle, playerVX, playerVZ);
    checkPaddleCollision(aiPaddle, aiVX, aiVZ);
    
    // Cap puck speed
    const speed = Math.sqrt(puckVX * puckVX + puckVZ * puckVZ);
    if (speed > maxSpeed) {
        puckVX = (puckVX / speed) * maxSpeed;
        puckVZ = (puckVZ / speed) * maxSpeed;
    }
    
    // Stop very slow puck
    if (speed < 0.0005) {
        puckVX = 0;
        puckVZ = 0;
    }
    
    updateState();
    
    // Debug display
    document.getElementById('debug').textContent = `Puck Speed: ${state.puckSpeed.toFixed(4)}`;
    
    renderer.render(scene, camera);
}

function updateState() {
    state.puckX = puck.position.x;
    state.puckZ = puck.position.z;
    state.puckVX = puckVX;
    state.puckVZ = puckVZ;
    state.puckSpeed = Math.sqrt(puckVX * puckVX + puckVZ * puckVZ);
    state.playerPaddleX = playerPaddle.position.x;
    state.playerPaddleZ = playerPaddle.position.z;
    state.aiPaddleX = aiPaddle.position.x;
    state.aiPaddleZ = aiPaddle.position.z;
}

window.resetGame = resetGame;

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
