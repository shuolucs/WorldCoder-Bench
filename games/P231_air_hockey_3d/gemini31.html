<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Air Hockey</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
        }
        #score-board {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 30px;
            border-radius: 10px;
            border: 2px solid #fff;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            margin: 0 auto;
        }
        #new-game-btn {
            pointer-events: auto;
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s, transform 0.1s;
        }
        #new-game-btn:hover {
            background: #45a049;
        }
        #new-game-btn:active {
            transform: translateY(2px);
        }
        #bottom-bar {
            padding: 20px;
        }
        #debug-info {
            background: rgba(0, 0, 0, 0.5);
            color: #0f0;
            padding: 8px 12px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            display: inline-block;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        #game-over-title {
            color: #fff;
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #fff;
        }
        #winner-text {
            color: #ffd700;
            font-size: 36px;
            margin-bottom: 40px;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            text-align: right;
            font-size: 14px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="top-bar">
            <div style="width: 120px;"></div> <!-- Spacer -->
            <div id="score-board">Player: 0 | AI: 0</div>
            <button id="new-game-btn">New Game</button>
        </div>
        <div id="bottom-bar">
            <div id="debug-info">Speed: 0.00</div>
        </div>
        <div id="controls-hint">
            Mouse: Move Paddle<br>
            Space: Launch Puck<br>
            R: Reset Game
        </div>
    </div>

    <div id="game-over-screen">
        <div id="game-over-title">GAME OVER</div>
        <div id="winner-text"></div>
        <button id="new-game-btn-overlay" style="pointer-events: auto; background: #4CAF50; color: white; border: none; padding: 15px 30px; font-size: 24px; font-weight: bold; border-radius: 8px; cursor: pointer;">Play Again</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            playerScore: 0,
            aiScore: 0,
            puckX: 0, puckZ: 0,
            puckVX: 0, puckVZ: 0,
            puckSpeed: 0,
            playerPaddleX: 0, playerPaddleZ: 5,
            aiPaddleX: 0, aiPaddleZ: -5,
            gameOver: false,
            winner: '',
            goalPause: false,
            dragonLoaded: false,
            dragonRotationY: 0,
            frameCount: 0,
            maxPuckSpeed: 0.3,
            tableWidth: 10,
            tableLength: 16
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(0, 10, 0);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- Table Construction ---
        const tableGroup = new THREE.Group();
        scene.add(tableGroup);

        // Playing surface
        const surfaceGeo = new THREE.BoxGeometry(10, 0.3, 16);
        const surfaceMat = new THREE.MeshPhongMaterial({ color: 0x1a237e, shininess: 80 });
        const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
        surface.position.y = 0; // Top surface is at Y = 0.15
        surface.receiveShadow = true;
        tableGroup.add(surface);

        // Lines
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        // Center line
        const centerLine = new THREE.Mesh(new THREE.BoxGeometry(10, 0.01, 0.1), lineMat);
        centerLine.position.y = 0.155;
        tableGroup.add(centerLine);

        // Center circle
        const circleGeo = new THREE.RingGeometry(1.4, 1.5, 32);
        const circle = new THREE.Mesh(circleGeo, lineMat);
        circle.rotation.x = -Math.PI / 2;
        circle.position.y = 0.155;
        tableGroup.add(circle);

        // Goal creases
        const creaseGeo = new THREE.RingGeometry(1.9, 2.0, 32, 1, 0, Math.PI);
        const crease1 = new THREE.Mesh(creaseGeo, lineMat);
        crease1.rotation.x = -Math.PI / 2;
        crease1.position.set(0, 0.155, -8);
        tableGroup.add(crease1);

        const crease2 = new THREE.Mesh(creaseGeo, lineMat);
        crease2.rotation.x = -Math.PI / 2;
        crease2.rotation.z = Math.PI;
        crease2.position.set(0, 0.155, 8);
        tableGroup.add(crease2);

        // Walls
        const wallMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const wallHeight = 0.5;
        const wallThick = 0.3;
        const wallY = 0.15 + wallHeight / 2;

        const leftWall = new THREE.Mesh(new THREE.BoxGeometry(wallThick, wallHeight, 16 + wallThick*2), wallMat);
        leftWall.position.set(-5.15, wallY, 0);
        leftWall.castShadow = true;
        tableGroup.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.BoxGeometry(wallThick, wallHeight, 16 + wallThick*2), wallMat);
        rightWall.position.set(5.15, wallY, 0);
        rightWall.castShadow = true;
        tableGroup.add(rightWall);

        const topWall1 = new THREE.Mesh(new THREE.BoxGeometry(3.5, wallHeight, wallThick), wallMat);
        topWall1.position.set(-3.25, wallY, -8.15);
        topWall1.castShadow = true;
        tableGroup.add(topWall1);

        const topWall2 = new THREE.Mesh(new THREE.BoxGeometry(3.5, wallHeight, wallThick), wallMat);
        topWall2.position.set(3.25, wallY, -8.15);
        topWall2.castShadow = true;
        tableGroup.add(topWall2);

        const bottomWall1 = new THREE.Mesh(new THREE.BoxGeometry(3.5, wallHeight, wallThick), wallMat);
        bottomWall1.position.set(-3.25, wallY, 8.15);
        bottomWall1.castShadow = true;
        tableGroup.add(bottomWall1);

        const bottomWall2 = new THREE.Mesh(new THREE.BoxGeometry(3.5, wallHeight, wallThick), wallMat);
        bottomWall2.position.set(3.25, wallY, 8.15);
        bottomWall2.castShadow = true;
        tableGroup.add(bottomWall2);

        // --- Game Objects ---
        const puckRadius = 0.4;
        const puckGeo = new THREE.CylinderGeometry(puckRadius, puckRadius, 0.15, 32);
        const puckMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const puck = new THREE.Mesh(puckGeo, puckMat);
        puck.position.set(0, 0.225, 0);
        puck.castShadow = true;
        scene.add(puck);

        const paddleRadius = 0.6;
        const paddleGeo = new THREE.CylinderGeometry(paddleRadius, paddleRadius, 0.2, 32);
        
        const playerMat = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
        const playerPaddle = new THREE.Mesh(paddleGeo, playerMat);
        playerPaddle.position.set(0, 0.25, 5);
        playerPaddle.castShadow = true;
        scene.add(playerPaddle);

        const aiMat = new THREE.MeshPhongMaterial({ color: 0xffff00 });
        const aiPaddle = new THREE.Mesh(paddleGeo, aiMat);
        aiPaddle.position.set(0, 0.25, -5);
        aiPaddle.castShadow = true;
        scene.add(aiPaddle);

        // --- GLTF Model ---
        let dragonModel;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DragonAttenuation/glTF-Binary/DragonAttenuation.glb',
            (gltf) => {
                dragonModel = gltf.scene;
                dragonModel.scale.set(1.5, 1.5, 1.5);
                dragonModel.position.set(5, 3, 0);
                
                // Center the model's pivot
                const box = new THREE.Box3().setFromObject(dragonModel);
                const center = box.getCenter(new THREE.Vector3());
                dragonModel.position.sub(center);
                dragonModel.position.add(new THREE.Vector3(5, 3, 0));

                scene.add(dragonModel);
                state.dragonLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // --- Input Handling ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const planeY = new THREE.Plane(new THREE.Vector3(0, 1, 0), -0.15);
        const targetPlayerPos = new THREE.Vector3(0, 0.25, 5);

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(planeY, targetPlayerPos);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function resetGame() {
            state.playerScore = 0;
            state.aiScore = 0;
            state.gameOver = false;
            state.winner = '';
            document.getElementById('game-over-screen').style.display = 'none';
            updateScoreUI();
            resetPositions();
        }

        function resetPositions() {
            puck.position.set(0, 0.225, 0);
            state.puckVX = 0;
            state.puckVZ = 0;
            playerPaddle.position.set(0, 0.25, 5);
            aiPaddle.position.set(0, 0.25, -5);
            targetPlayerPos.set(0, 0.25, 5);
        }

        function launchPuck() {
            const speed = Math.sqrt(state.puckVX**2 + state.puckVZ**2);
            if (speed < 0.01 && !state.gameOver && !state.goalPause) {
                const angle = (Math.random() - 0.5) * Math.PI / 2; // Random angle towards AI
                state.puckVX = Math.sin(angle) * 0.15;
                state.puckVZ = -Math.cos(angle) * 0.15;
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') resetGame();
            if (e.code === 'Space') launchPuck();
        });

        document.getElementById('new-game-btn').addEventListener('click', resetGame);
        document.getElementById('new-game-btn-overlay').addEventListener('click', resetGame);

        // --- Physics & Logic ---
        let prevPlayerPos = new THREE.Vector3().copy(playerPaddle.position);
        let prevAiPos = new THREE.Vector3().copy(aiPaddle.position);

        function handlePaddleCollision(paddle, prevPos) {
            const dx = puck.position.x - paddle.position.x;
            const dz = puck.position.z - paddle.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            const minDist = puckRadius + paddleRadius;

            if (dist < minDist && dist > 0) {
                // Resolve penetration
                const nx = dx / dist;
                const nz = dz / dist;
                puck.position.x = paddle.position.x + nx * minDist;
                puck.position.z = paddle.position.z + nz * minDist;

                // Calculate paddle velocity
                const pVx = paddle.position.x - prevPos.x;
                const pVz = paddle.position.z - prevPos.z;

                // Relative velocity
                const rvx = state.puckVX - pVx;
                const rvz = state.puckVZ - pVz;

                // Dot product
                const dot = rvx * nx + rvz * nz;

                if (dot < 0) {
                    // Reflect puck velocity
                    state.puckVX -= 2 * dot * nx;
                    state.puckVZ -= 2 * dot * nz;

                    // Add paddle influence
                    state.puckVX += pVx * 0.5;
                    state.puckVZ += pVz * 0.5;
                }
            }
        }

        function scoreGoal(scorer) {
            if (state.goalPause || state.gameOver) return;
            
            if (scorer === 'player') state.playerScore++;
            else state.aiScore++;
            
            updateScoreUI();
            state.goalPause = true;

            if (state.playerScore >= 5 || state.aiScore >= 5) {
                state.gameOver = true;
                state.winner = state.playerScore >= 5 ? 'Player' : 'AI';
                document.getElementById('winner-text').innerText = `${state.winner} Wins!`;
                document.getElementById('game-over-screen').style.display = 'flex';
            } else {
                setTimeout(() => {
                    resetPositions();
                    state.goalPause = false;
                }, 1000);
            }
        }

        function updateScoreUI() {
            document.getElementById('score-board').innerText = `Player: ${state.playerScore} | AI: ${state.aiScore}`;
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            state.frameCount++;

            if (!state.gameOver && !state.goalPause) {
                // Save previous positions
                prevPlayerPos.copy(playerPaddle.position);
                prevAiPos.copy(aiPaddle.position);

                // --- Player Movement ---
                playerPaddle.position.x = targetPlayerPos.x;
                playerPaddle.position.z = targetPlayerPos.z;
                
                // Clamp Player
                playerPaddle.position.x = THREE.MathUtils.clamp(playerPaddle.position.x, -4.1, 4.1);
                playerPaddle.position.z = THREE.MathUtils.clamp(playerPaddle.position.z, 0.6, 7.2);

                // --- AI Movement ---
                aiPaddle.position.x = THREE.MathUtils.lerp(aiPaddle.position.x, puck.position.x, 0.03);
                if (puck.position.z < 0) {
                    aiPaddle.position.z = THREE.MathUtils.lerp(aiPaddle.position.z, puck.position.z, 0.03);
                } else {
                    aiPaddle.position.z = THREE.MathUtils.lerp(aiPaddle.position.z, -5, 0.03);
                }
                
                // Clamp AI
                aiPaddle.position.x = THREE.MathUtils.clamp(aiPaddle.position.x, -4.1, 4.1);
                aiPaddle.position.z = THREE.MathUtils.clamp(aiPaddle.position.z, -7.2, -0.6);

                // --- Puck Physics ---
                puck.position.x += state.puckVX;
                puck.position.z += state.puckVZ;

                // Friction
                state.puckVX *= 0.998;
                state.puckVZ *= 0.998;

                // Wall Collisions
                if (puck.position.x > 4.7) {
                    puck.position.x = 4.7;
                    state.puckVX *= -0.9;
                } else if (puck.position.x < -4.7) {
                    puck.position.x = -4.7;
                    state.puckVX *= -0.9;
                }

                if (puck.position.z > 7.7) {
                    if (Math.abs(puck.position.x) < 1.5) {
                        if (puck.position.z > 8.4) scoreGoal('ai');
                    } else {
                        puck.position.z = 7.7;
                        state.puckVZ *= -0.9;
                    }
                } else if (puck.position.z < -7.7) {
                    if (Math.abs(puck.position.x) < 1.5) {
                        if (puck.position.z < -8.4) scoreGoal('player');
                    } else {
                        puck.position.z = -7.7;
                        state.puckVZ *= -0.9;
                    }
                }

                // Paddle Collisions
                handlePaddleCollision(playerPaddle, prevPlayerPos);
                handlePaddleCollision(aiPaddle, prevAiPos);

                // Speed Cap
                const speedSq = state.puckVX**2 + state.puckVZ**2;
                if (speedSq > state.maxPuckSpeed**2) {
                    const speed = Math.sqrt(speedSq);
                    state.puckVX = (state.puckVX / speed) * state.maxPuckSpeed;
                    state.puckVZ = (state.puckVZ / speed) * state.maxPuckSpeed;
                }
            }

            // --- Update Dragon ---
            if (dragonModel) {
                dragonModel.rotation.y += 0.01;
                state.dragonRotationY = dragonModel.rotation.y;
            }

            // --- Update State Object ---
            state.puckX = puck.position.x;
            state.puckZ = puck.position.z;
            state.puckSpeed = Math.sqrt(state.puckVX**2 + state.puckVZ**2);
            state.playerPaddleX = playerPaddle.position.x;
            state.playerPaddleZ = playerPaddle.position.z;
            state.aiPaddleX = aiPaddle.position.x;
            state.aiPaddleZ = aiPaddle.position.z;

            // --- Update UI ---
            document.getElementById('debug-info').innerText = `Speed: ${state.puckSpeed.toFixed(3)}`;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
