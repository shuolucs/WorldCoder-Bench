<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Pump Cycle - Educational Visualization</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a2e; }
canvas { display: block; }

#control-panel {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 16px;
    color: #fff;
    z-index: 100;
    min-width: 220px;
    backdrop-filter: blur(10px);
}

#control-panel button {
    display: block;
    width: 100%;
    padding: 8px 12px;
    margin: 6px 0;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
}

#control-panel button:hover {
    background: rgba(255, 255, 255, 0.25);
}

#control-panel label {
    display: block;
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
}

#slider-speed {
    width: 100%;
    margin-top: 4px;
    accent-color: #ff6688;
}

.speed-value {
    font-size: 12px;
    color: #ff6688;
}

#phase-label {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 12px 30px;
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    z-index: 100;
    text-align: center;
    backdrop-filter: blur(10px);
    letter-spacing: 1px;
}

#info-panel {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 16px;
    color: #fff;
    z-index: 100;
    min-width: 200px;
    backdrop-filter: blur(10px);
}

#info-panel div {
    margin: 6px 0;
    font-size: 14px;
}

#info-panel .label {
    color: #888;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#info-panel .value {
    color: #ff6688;
    font-size: 18px;
    font-weight: bold;
}

.chamber-labels {
    position: absolute;
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    pointer-events: none;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
    z-index: 50;
}
</style>
</head>
<body>

<div id="control-panel">
    <div style="font-size: 16px; font-weight: bold; margin-bottom: 10px; color: #ff6688;">❤️ Heart Controls</div>
    <button id="btn-play-pause">▶ Play</button>
    <button id="btn-next-phase">⏭ Next Phase</button>
    <button id="btn-reset">🔄 Reset</button>
    <label>Speed: <span class="speed-value" id="speed-value">1.0x</span></label>
    <input type="range" id="slider-speed" min="0.5" max="3.0" step="0.1" value="1.0">
    <hr style="border-color: rgba(255,255,255,0.1); margin: 12px 0;">
    <button id="btn-save">💾 Save State</button>
    <button id="btn-load">📂 Load State</button>
    <div style="font-size: 11px; color: #666; margin-top: 8px;">
        Keys: Space, N, R, S, L
    </div>
</div>

<div id="phase-label">DIASTOLE_RIGHT</div>

<div id="info-panel">
    <div>
        <div class="label">Cycle Count</div>
        <div class="value" id="cycle-count">0</div>
    </div>
    <div>
        <div class="label">Heart Rate</div>
        <div class="value" id="bpm-display">7.5 BPM</div>
    </div>
    <div>
        <div class="label">Parrot Location</div>
        <div class="value" id="parrot-info">RA</div>
    </div>
    <div>
        <div class="label">Phase Progress</div>
        <div class="value" id="progress-display">0%</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Scene Setup ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x0a0a2e);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.03);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 8);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

const pointLight1 = new THREE.PointLight(0xff6688, 0.5, 20);
pointLight1.position.set(-2, 0, 3);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x6688ff, 0.5, 20);
pointLight2.position.set(2, 0, 3);
scene.add(pointLight2);

// --- Chamber Definitions ---
const chamberDefs = {
    RA: { position: new THREE.Vector3(-2, 1.5, 0), color: 0xcc3333, radius: 0.8, label: 'Right Atrium' },
    RV: { position: new THREE.Vector3(-2, -1.5, 0), color: 0x991111, radius: 1.0, label: 'Right Ventricle' },
    LA: { position: new THREE.Vector3(2, 1.5, 0), color: 0x3333cc, radius: 0.8, label: 'Left Atrium' },
    LV: { position: new THREE.Vector3(2, -1.5, 0), color: 0x111199, radius: 1.0, label: 'Left Ventricle' }
};

const chambers = {};
const chamberMeshes = {};

// Create chamber spheres
Object.entries(chamberDefs).forEach(([key, def]) => {
    const geo = new THREE.SphereGeometry(def.radius, 32, 32);
    const mat = new THREE.MeshPhongMaterial({
        color: def.color,
        transparent: true,
        opacity: 0.4,
        side: THREE.DoubleSide,
        shininess: 80,
        specular: 0x444444
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(def.position);
    scene.add(mesh);
    chambers[key] = { mesh, def, baseScale: 1.0, currentScale: 1.0 };
    chamberMeshes[key] = mesh;

    // Add wireframe
    const wireGeo = new THREE.SphereGeometry(def.radius * 1.01, 16, 16);
    const wireMat = new THREE.MeshBasicMaterial({
        color: def.color,
        wireframe: true,
        transparent: true,
        opacity: 0.15
    });
    const wireMesh = new THREE.Mesh(wireGeo, wireMat);
    mesh.add(wireMesh);

    // Add label sprite
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(key, 128, 28);
    ctx.font = '16px Arial';
    ctx.fillStyle = '#ccc';
    ctx.fillText(def.label, 128, 52);
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.copy(def.position);
    sprite.position.y += def.radius + 0.5;
    sprite.scale.set(2, 0.5, 1);
    scene.add(sprite);
});

// --- Tube Paths ---
const pathDefs = [
    { from: 'RA', to: 'RV', midPoints: [new THREE.Vector3(-3, 0, 0.5)], color: 0xff6688 },
    { from: 'RV', to: 'LA', midPoints: [new THREE.Vector3(-3, -3, 1), new THREE.Vector3(0, -3.5, 2), new THREE.Vector3(3, -3, 1)], color: 0xff88aa, label: 'Lungs' },
    { from: 'LA', to: 'LV', midPoints: [new THREE.Vector3(3, 0, 0.5)], color: 0x6688ff },
    { from: 'LV', to: 'RA', midPoints: [new THREE.Vector3(3, 3, 1), new THREE.Vector3(0, 3.5, 2), new THREE.Vector3(-3, 3, 1)], color: 0x8888ff, label: 'Body' }
];

const paths = {};
const pathCurves = {};

pathDefs.forEach((pd, i) => {
    const fromPos = chamberDefs[pd.from].position;
    const toPos = chamberDefs[pd.to].position;
    const points = [fromPos.clone(), ...pd.midPoints.map(p => p.clone()), toPos.clone()];
    const curve = new THREE.CatmullRomCurve3(points);
    const key = `${pd.from}_${pd.to}`;
    pathCurves[key] = curve;

    const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.08, 8, false);
    const tubeMat = new THREE.MeshPhongMaterial({
        color: pd.color,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide
    });
    const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
    scene.add(tubeMesh);
    paths[key] = tubeMesh;

    // Add flow particles along tube
    const particleCount = 20;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    for (let j = 0; j < particleCount; j++) {
        const t = j / particleCount;
        const p = curve.getPoint(t);
        positions[j * 3] = p.x;
        positions[j * 3 + 1] = p.y;
        positions[j * 3 + 2] = p.z;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({
        color: pd.color,
        size: 0.05,
        transparent: true,
        opacity: 0.5
    });
    const particleSystem = new THREE.Points(particleGeo, particleMat);
    scene.add(particleSystem);

    // Label for long paths
    if (pd.label) {
        const midT = 0.5;
        const midP = curve.getPoint(midT);
        const lCanvas = document.createElement('canvas');
        lCanvas.width = 256;
        lCanvas.height = 48;
        const lCtx = lCanvas.getContext('2d');
        lCtx.fillStyle = pd.color === 0xff88aa ? '#ff88aa' : '#8888ff';
        lCtx.font = 'bold 24px Arial';
        lCtx.textAlign = 'center';
        lCtx.fillText(`→ ${pd.label} →`, 128, 32);
        const lTex = new THREE.CanvasTexture(lCanvas);
        const lSpriteMat = new THREE.SpriteMaterial({ map: lTex, transparent: true, opacity: 0.7 });
        const lSprite = new THREE.Sprite(lSpriteMat);
        lSprite.position.copy(midP);
        lSprite.position.z += 0.5;
        lSprite.scale.set(2, 0.4, 1);
        scene.add(lSprite);
    }
});

// --- Background grid ---
const gridHelper = new THREE.GridHelper(20, 20, 0x222255, 0x111133);
gridHelper.position.y = -4;
scene.add(gridHelper);

// --- Parrot ---
let parrot = null;
let parrotMixer = null;
let parrotLoaded = false;

const loader = new GLTFLoader();
loader.load(
    'https://threejs.org/examples/models/gltf/Parrot.glb',
    (gltf) => {
        parrot = gltf.scene;
        parrot.scale.set(0.01, 0.01, 0.01);
        parrot.position.copy(chamberDefs.RA.position);
        scene.add(parrot);
        parrotLoaded = true;

        if (gltf.animations && gltf.animations.length > 0) {
            parrotMixer = new THREE.AnimationMixer(parrot);
            const action = parrotMixer.clipAction(gltf.animations[0]);
            action.play();
        }

        // Add glow around parrot
        const glowGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0xffaa44,
            transparent: true,
            opacity: 0.15
        });
        const glowMesh = new THREE.Mesh(glowGeo, glowMat);
        parrot.add(glowMesh);
        glowMesh.scale.set(30, 30, 30);
    },
    undefined,
    (error) => {
        console.error('Error loading Parrot.glb:', error);
        // Create fallback sphere
        const fallbackGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const fallbackMat = new THREE.MeshPhongMaterial({ color: 0xffaa00, emissive: 0xff6600, emissiveIntensity: 0.3 });
        parrot = new THREE.Mesh(fallbackGeo, fallbackMat);
        parrot.position.copy(chamberDefs.RA.position);
        scene.add(parrot);
        parrotLoaded = true;
    }
);

// --- State ---
const PHASE_NAMES = ['DIASTOLE_RIGHT', 'SYSTOLE_RIGHT', 'LUNG_TRANSIT', 'SYSTOLE_LEFT'];
const PHASE_TRANSITIONS = [
    { parrotFrom: 'RA', parrotTo: 'RA', pathKey: null, chamberActions: { RA: 1.3, RV: 1.0, LA: 1.0, LV: 1.0 } },
    { parrotFrom: 'RA', parrotTo: 'RV', pathKey: 'RA_RV', chamberActions: { RA: 0.7, RV: 1.3, LA: 1.0, LV: 1.0 } },
    { parrotFrom: 'RV', parrotTo: 'LA', pathKey: 'RV_LA', chamberActions: { RA: 1.0, RV: 0.7, LA: 1.3, LV: 1.0 } },
    { parrotFrom: 'LA', parrotTo: 'LV', pathKey: 'LA_LV', chamberActions: { RA: 1.0, RV: 1.0, LA: 0.7, LV: 1.3 } }
];
// After phase 3, transition LV->RA uses pathKey 'LV_RA'

let state = {
    currentPhase: 0,
    isPlaying: false,
    speedMultiplier: 1.0,
    cycleCount: 0,
    phaseProgress: 0.0,
    phaseTime: 0.0,
    phaseDuration: 2.0,
    chamberScales: { RA: 1.0, RV: 1.0, LA: 1.0, LV: 1.0 },
    targetChamberScales: { RA: 1.3, RV: 1.0, LA: 1.0, LV: 1.0 },
    prevChamberScales: { RA: 1.0, RV: 1.0, LA: 1.0, LV: 1.0 }
};

function getParrotChamber() {
    const phase = PHASE_TRANSITIONS[state.currentPhase];
    if (state.phaseProgress > 0 && state.phaseProgress < 1 && phase.pathKey) {
        return `TRANSIT_${phase.parrotFrom}_${phase.parrotTo}`;
    }
    if (state.phaseProgress >= 1 || !phase.pathKey) {
        if (state.currentPhase === 0) return 'RA';
        return phase.parrotTo;
    }
    return phase.parrotFrom;
}

function getBPM() {
    return 60 / (state.phaseDuration * 4 / state.speedMultiplier);
}

function updateState3D() {
    const parrotPos = parrot ? { x: parrot.position.x, y: parrot.position.y, z: parrot.position.z } : { x: 0, y: 0, z: 0 };
    window.__3D_STATE__ = {
        currentPhase: state.currentPhase,
        phaseName: PHASE_NAMES[state.currentPhase],
        isPlaying: state.isPlaying,
        speedMultiplier: state.speedMultiplier,
        cycleCount: state.cycleCount,
        bpm: getBPM(),
        parrotPosition: parrotPos,
        parrotChamber: getParrotChamber(),
        chamberScales: { ...state.chamberScales },
        savedStateExists: localStorage.getItem('heartPumpState') !== null,
        phaseProgress: state.phaseProgress,
        parrotLoaded: parrotLoaded
    };
}

function updateUI() {
    document.getElementById('phase-label').textContent = PHASE_NAMES[state.currentPhase];
    document.getElementById('cycle-count').textContent = state.cycleCount;
    document.getElementById('bpm-display').textContent = getBPM().toFixed(1) + ' BPM';
    document.getElementById('parrot-info').textContent = getParrotChamber();
    document.getElementById('progress-display').textContent = (state.phaseProgress * 100).toFixed(0) + '%';
    document.getElementById('btn-play-pause').textContent = state.isPlaying ? '⏸ Pause' : '▶ Play';
}

function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function setPhase(phaseIndex) {
    state.currentPhase = phaseIndex;
    state.phaseTime = 0;
    state.phaseProgress = 0;

    const transition = PHASE_TRANSITIONS[phaseIndex];

    // Store previous scales and set targets
    state.prevChamberScales = { ...state.chamberScales };
    state.targetChamberScales = { ...transition.chamberActions };
}

function advancePhase() {
    // Complete current phase
    state.phaseProgress = 1.0;
    applyPhaseProgress(1.0);

    let nextPhase = (state.currentPhase + 1) % 4;
    if (nextPhase === 0) {
        state.cycleCount++;
    }
    setPhase(nextPhase);
}

function applyPhaseProgress(progress) {
    const t = easeInOutCubic(progress);
    const transition = PHASE_TRANSITIONS[state.currentPhase];

    // Interpolate chamber scales
    Object.keys(state.chamberScales).forEach(key => {
        const from = state.prevChamberScales[key];
        const to = state.targetChamberScales[key];
        state.chamberScales[key] = from + (to - from) * t;
    });

    // Apply scales to meshes
    Object.entries(chambers).forEach(([key, ch]) => {
        const s = state.chamberScales[key];
        ch.mesh.scale.set(s, s, s);
        // Pulse opacity based on scale
        ch.mesh.material.opacity = 0.3 + (s - 0.7) * 0.3;
    });

    // Move parrot
    if (parrot) {
        if (transition.pathKey && pathCurves[transition.pathKey]) {
            const curve = pathCurves[transition.pathKey];
            const point = curve.getPoint(t);
            parrot.position.copy(point);

            // Orient parrot along path
            if (t < 0.99) {
                const tangent = curve.getTangent(t);
                const lookAt = point.clone().add(tangent);
                parrot.lookAt(lookAt);
            }
        } else if (state.currentPhase === 0) {
            // Parrot stays at RA, maybe bob
            const raPos = chamberDefs.RA.position;
            parrot.position.set(raPos.x, raPos.y + Math.sin(progress * Math.PI * 2) * 0.1, raPos.z);
        }
    }
}

function handleTransitionBetweenPhases() {
    // When transitioning from phase 3 back to phase 0, move parrot from LV to RA
    if (state.currentPhase === 0 && state.phaseProgress === 0 && parrot) {
        // Check if parrot is at LV (just finished phase 3)
        const lvPos = chamberDefs.LV.position;
        const raPos = chamberDefs.RA.position;
        const dist = parrot.position.distanceTo(lvPos);
        if (dist < 0.5 && state.cycleCount > 0) {
            // Snap to RA via the LV_RA path at t=1
            parrot.position.copy(raPos);
        }
    }
}

// Special handling: after phase 3 ends, we need to move parrot from LV to RA
// We'll do this as part of the phase 0 start
let transitioningToRA = false;
let transitionToRAProgress = 0;

function resetState() {
    state.currentPhase = 0;
    state.isPlaying = false;
    state.phaseTime = 0;
    state.phaseProgress = 0;
    state.cycleCount = 0;
    state.chamberScales = { RA: 1.0, RV: 1.0, LA: 1.0, LV: 1.0 };
    state.prevChamberScales = { RA: 1.0, RV: 1.0, LA: 1.0, LV: 1.0 };
    state.targetChamberScales = { RA: 1.3, RV: 1.0, LA: 1.0, LV: 1.0 };
    transitioningToRA = false;
    transitionToRAProgress = 0;

    // Reset chamber visuals
    Object.entries(chambers).forEach(([key, ch]) => {
        ch.mesh.scale.set(1, 1, 1);
        ch.mesh.material.opacity = 0.4;
    });

    if (parrot) {
        parrot.position.copy(chamberDefs.RA.position);
    }

    updateUI();
}

function saveState() {
    const saveData = {
        currentPhase: state.currentPhase,
        isPlaying: state.isPlaying,
        speedMultiplier: state.speedMultiplier,
        cycleCount: state.cycleCount,
        phaseProgress: state.phaseProgress,
        phaseTime: state.phaseTime,
        chamberScales: { ...state.chamberScales },
        prevChamberScales: { ...state.prevChamberScales },
        targetChamberScales: { ...state.targetChamberScales },
        transitioningToRA,
        transitionToRAProgress
    };
    localStorage.setItem('heartPumpState', JSON.stringify(saveData));
}

function loadState() {
    const data = localStorage.getItem('heartPumpState');
    if (!data) return;
    try {
        const saved = JSON.parse(data);
        state.currentPhase = saved.currentPhase;
        state.isPlaying = saved.isPlaying;
        state.speedMultiplier = saved.speedMultiplier;
        state.cycleCount = saved.cycleCount;
        state.phaseProgress = saved.phaseProgress;
        state.phaseTime = saved.phaseTime;
        state.chamberScales = saved.chamberScales;
        state.prevChamberScales = saved.prevChamberScales;
        state.targetChamberScales = saved.targetChamberScales;
        transitioningToRA = saved.transitioningToRA || false;
        transitionToRAProgress = saved.transitionToRAProgress || 0;

        document.getElementById('slider-speed').value = state.speedMultiplier;
        document.getElementById('speed-value').textContent = state.speedMultiplier.toFixed(1) + 'x';

        // Apply current state
        applyPhaseProgress(state.phaseProgress);
        updateUI();
    } catch (e) {
        console.error('Failed to load state:', e);
    }
}

// --- Initialize phase ---
setPhase(0);

// --- Event Listeners ---
document.getElementById('btn-play-pause').addEventListener('click', () => {
    state.isPlaying = !state.isPlaying;
    updateUI();
});

document.getElementById('btn-next-phase').addEventListener('click', () => {
    if (!state.isPlaying) {
        advancePhase();
        applyPhaseProgress(0);
        updateUI();
    }
});

document.getElementById('btn-reset').addEventListener('click', () => {
    resetState();
});

document.getElementById('slider-speed').addEventListener('input', (e) => {
    state.speedMultiplier = parseFloat(e.target.value);
    document.getElementById('speed-value').textContent = state.speedMultiplier.toFixed(1) + 'x';
});

document.getElementById('btn-save').addEventListener('click', saveState);
document.getElementById('btn-load').addEventListener('click', loadState);

document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.code) {
        case 'Space':
            e.preventDefault();
            state.isPlaying = !state.isPlaying;
            updateUI();
            break;
        case 'KeyN':
            if (!state.isPlaying) {
                advancePhase();
                applyPhaseProgress(0);
                updateUI();
            }
            break;
        case 'KeyR':
            resetState();
            break;
        case 'KeyS':
            saveState();
            break;
        case 'KeyL':
            loadState();
            break;
    }
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();
let lastPhaseWas3 = false;

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    // Update parrot animation mixer
    if (parrotMixer) {
        parrotMixer.update(delta);
    }

    controls.update();

    if (state.isPlaying) {
        // Handle LV->RA transition
        if (transitioningToRA) {
            transitionToRAProgress += (delta * state.speedMultiplier) / state.phaseDuration;
            if (transitionToRAProgress >= 1) {
                transitionToRAProgress = 1;
                transitioningToRA = false;
                if (parrot) parrot.position.copy(chamberDefs.RA.position);
                setPhase(0);
            } else {
                const t = easeInOutCubic(transitionToRAProgress);
                const curve = pathCurves['LV_RA'];
                if (curve && parrot) {
                    const point = curve.getPoint(t);
                    parrot.position.copy(point);
                    if (t < 0.99) {
                        const tangent = curve.getTangent(t);
                        parrot.lookAt(point.clone().add(tangent));
                    }
                }
            }
        } else {
            state.phaseTime += delta * state.speedMultiplier;
            state.phaseProgress = Math.min(state.phaseTime / state.phaseDuration, 1.0);

            applyPhaseProgress(state.phaseProgress);

            if (state.phaseProgress >= 1.0) {
                if (state.currentPhase === 3) {
                    // Need to transition parrot from LV to RA
                    state.cycleCount++;
                    transitioningToRA = true;
                    transitionToRAProgress = 0;
                    // Reset chamber scales for transition
                    state.prevChamberScales = { ...state.chamberScales };
                    state.targetChamberScales = { RA: 1.0, RV: 1.0, LA: 1.0, LV: 1.0 };
                } else {
                    advancePhase();
                }
            }
        }
    }

    // Animate chamber pulse glow
    const time = clock.elapsedTime;
    Object.entries(chambers).forEach(([key, ch]) => {
        const s = state.chamberScales[key];
        const pulse = 1 + Math.sin(time * 3) * 0.01 * s;
        ch.mesh.scale.set(s * pulse, s * pulse, s * pulse);
    });

    // Parrot rotation when stationary
    if (parrot && !state.isPlaying && !transitioningToRA) {
        parrot.rotation.y += delta * 0.5;
    }

    updateState3D();
    updateUI();

    renderer.render(scene, camera);
}

// Initialize state
window.__3D_STATE__ = {};
updateState3D();
updateUI();

animate();
</script>
