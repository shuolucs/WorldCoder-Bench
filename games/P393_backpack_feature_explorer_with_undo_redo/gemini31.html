<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Backpack Feature Explorer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .interactive {
            pointer-events: auto;
        }
        #toolbar {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            background: #444;
            border-color: #777;
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .theme-switcher {
            display: flex;
            gap: 5px;
            align-items: center;
            margin-left: 10px;
            border-left: 1px solid #555;
            padding-left: 15px;
        }
        .theme-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            padding: 0;
            border: 2px solid transparent;
        }
        .theme-btn.active {
            border-color: #fff;
        }
        #featurePanel {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 320px;
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            transition: opacity 0.3s ease;
        }
        #featurePanel.visible {
            display: block;
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translate(20px, -50%); }
            to { opacity: 1; transform: translate(0, -50%); }
        }
        #featureName {
            margin: 0 0 10px 0;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #colorSwatch {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px currentColor;
        }
        #featureDesc {
            font-size: 14px;
            line-height: 1.5;
            color: #ccc;
            margin-bottom: 20px;
        }
        #toggleFeatureBtn {
            width: 100%;
            background: #2a2a35;
            border-color: #444;
        }
        #toggleFeatureBtn.disabled-state {
            background: #4a2525;
            border-color: #ff6b6b;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="toolbar" class="interactive">
            <button id="undoBtn" disabled>Undo (<span id="undoCount">0</span>)</button>
            <button id="redoBtn" disabled>Redo (<span id="redoCount">0</span>)</button>
            <button id="spinBtn">Spin: OFF</button>
            <div class="theme-switcher">
                <button id="themeDark" class="theme-btn active" style="background: linear-gradient(#1a1a2e, #16213e)"></button>
                <button id="themeLight" class="theme-btn" style="background: linear-gradient(#f0f0f0, #ffffff)"></button>
                <button id="themeBlue" class="theme-btn" style="background: linear-gradient(#0c2461, #1e3799)"></button>
            </div>
        </div>

        <div id="featurePanel" class="interactive">
            <h2 id="featureName"><div id="colorSwatch"></div> <span id="nameText">Feature Name</span></h2>
            <p id="featureDesc">Feature description goes here.</p>
            <button id="toggleFeatureBtn">Disable Feature</button>
        </div>
    </div>

    <script>
        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            selectedFeature: 0,
            featureStates: [true, true, true, true, true],
            undoStackSize: 0,
            redoStackSize: 0,
            currentTheme: 'dark',
            isSpinning: false,
            cameraDistance: 0,
            hotspotScales: [1, 1, 1, 1, 1],
            featurePanelVisible: false,
            totalActions: 0
        };

        // --- DATA ---
        const featuresData = [
            { id: 1, name: 'LED Panel', desc: 'Integrated LED matrix for nighttime visibility. 360-degree illumination.', pos: [0.3, 1.6, 0.3], color: 0xff6b6b },
            { id: 2, name: 'Solar Charger', desc: 'Flexible solar panel generates 15W. Charges devices on the go.', pos: [-0.3, 1.8, 0.1], color: 0xffd93d },
            { id: 3, name: 'GPS Module', desc: 'Built-in GPS with offline maps. SOS beacon capability.', pos: [0.0, 1.0, 0.4], color: 0x6bcb77 },
            { id: 4, name: 'Water Filter', desc: 'Integrated 0.1 micron filter. Purifies 1000L before replacement.', pos: [0.25, 0.5, 0.35], color: 0x4d96ff },
            { id: 5, name: 'Hidden Pocket', desc: 'RFID-blocking compartment. Fits passport and cards securely.', pos: [-0.25, 0.7, 0.3], color: 0x9b59b6 }
        ];

        const themes = {
            dark: { top: '#1a1a2e', bottom: '#16213e', ground: 0x111111 },
            light: { top: '#f0f0f0', bottom: '#ffffff', ground: 0xcccccc },
            blue: { top: '#0c2461', bottom: '#1e3799', ground: 0x0a1a3a }
        };

        // --- UNDO/REDO SYSTEM ---
        class CommandManager {
            constructor() {
                this.undoStack = [];
                this.redoStack = [];
            }
            execute(command) {
                command.execute();
                this.undoStack.push(command);
                this.redoStack = [];
                window.__3D_STATE__.totalActions++;
                updateUI();
            }
            undo() {
                if (this.undoStack.length === 0) return;
                const command = this.undoStack.pop();
                command.undo();
                this.redoStack.push(command);
                updateUI();
            }
            redo() {
                if (this.redoStack.length === 0) return;
                const command = this.redoStack.pop();
                command.execute();
                this.undoStack.push(command);
                updateUI();
            }
        }
        const cmdManager = new CommandManager();

        class SelectFeatureCmd {
            constructor(oldId, newId) { this.oldId = oldId; this.newId = newId; }
            execute() { applySelectFeature(this.newId); }
            undo() { applySelectFeature(this.oldId); }
        }

        class ToggleFeatureCmd {
            constructor(featureIndex, oldState, newState) {
                this.index = featureIndex; this.oldState = oldState; this.newState = newState;
            }
            execute() { applyToggleFeature(this.index, this.newState); }
            undo() { applyToggleFeature(this.index, this.oldState); }
        }

        class ChangeThemeCmd {
            constructor(oldTheme, newTheme) { this.oldTheme = oldTheme; this.newTheme = newTheme; }
            execute() { applyTheme(this.newTheme); }
            undo() { applyTheme(this.oldTheme); }
        }

        class ToggleSpinCmd {
            constructor(oldState, newState) { this.oldState = oldState; this.newState = newState; }
            execute() { applySpin(this.newState); }
            undo() { applySpin(this.oldState); }
        }

        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.minPolarAngle = 0.3;
        controls.maxPolarAngle = 2.5;
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(3, 5, 4);
        scene.add(dirLight);
        const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambLight);

        // Ground
        const groundGeo = new THREE.CircleGeometry(2, 64);
        const groundMat = new THREE.MeshStandardMaterial({ color: themes.dark.ground, roughness: 0.2, metalness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        // Model Group & Hotspots
        const modelGroup = new THREE.Group();
        scene.add(modelGroup);
        const hotspots = [];

        // Background Generator
        function createGradientTexture(topColor, bottomColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 2; canvas.height = 512;
            const context = canvas.getContext('2d');
            const gradient = context.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0, topColor);
            gradient.addColorStop(1, bottomColor);
            context.fillStyle = gradient;
            context.fillRect(0, 0, 2, 512);
            return new THREE.CanvasTexture(canvas);
        }

        // Load Model
        const loader = new THREE.GLTFLoader();
        loader.load('robot.glb', (gltf) => {
            setupModel(gltf.scene);
        }, undefined, (error) => {
            console.warn("Could not load 'robot.glb', using fallback geometry.", error);
            // Fallback geometry to ensure scene is runnable
            const geo = new THREE.BoxGeometry(1, 2, 0.8);
            const mat = new THREE.MeshStandardMaterial({ color: 0x555566, roughness: 0.4 });
            const mesh = new THREE.Mesh(geo, mat);
            setupModel(mesh);
        });

        function setupModel(model) {
            const box = new THREE.Box3().setFromObject(model);
            const height = box.max.y - box.min.y;
            const scale = 2.0 / height;
            model.scale.setScalar(scale);
            
            box.setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            model.position.y = -box.min.y; // Rest on ground

            modelGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;

            // Add Hotspots
            featuresData.forEach((f, index) => {
                const geo = new THREE.SphereGeometry(0.06, 32, 32);
                const mat = new THREE.MeshStandardMaterial({
                    color: f.color,
                    emissive: f.color,
                    emissiveIntensity: 0.5,
                    transparent: true,
                    opacity: 1
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(...f.pos);
                mesh.userData = { id: f.id, index: index };
                modelGroup.add(mesh);
                hotspots.push(mesh);
            });
        }

        // --- INTERACTION LOGIC ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        container.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(hotspots);

            const currentId = window.__3D_STATE__.selectedFeature;
            let newId = 0;

            if (intersects.length > 0) {
                newId = intersects[0].object.userData.id;
            }

            if (currentId !== newId) {
                cmdManager.execute(new SelectFeatureCmd(currentId, newId));
            }
        });

        // --- ACTION APPLIERS ---
        function applySelectFeature(id) {
            window.__3D_STATE__.selectedFeature = id;
            window.__3D_STATE__.featurePanelVisible = (id !== 0);
            updateUI();
        }

        function applyToggleFeature(index, state) {
            window.__3D_STATE__.featureStates[index] = state;
            updateUI();
        }

        function applyTheme(themeName) {
            window.__3D_STATE__.currentTheme = themeName;
            const t = themes[themeName];
            scene.background = createGradientTexture(t.top, t.bottom);
            ground.material.color.setHex(t.ground);
            updateUI();
        }

        function applySpin(state) {
            window.__3D_STATE__.isSpinning = state;
            updateUI();
        }

        // --- UI UPDATES ---
        const ui = {
            undoBtn: document.getElementById('undoBtn'),
            redoBtn: document.getElementById('redoBtn'),
            undoCount: document.getElementById('undoCount'),
            redoCount: document.getElementById('redoCount'),
            spinBtn: document.getElementById('spinBtn'),
            panel: document.getElementById('featurePanel'),
            fName: document.getElementById('nameText'),
            fDesc: document.getElementById('featureDesc'),
            fSwatch: document.getElementById('colorSwatch'),
            toggleBtn: document.getElementById('toggleFeatureBtn'),
            themeBtns: {
                dark: document.getElementById('themeDark'),
                light: document.getElementById('themeLight'),
                blue: document.getElementById('themeBlue')
            }
        };

        function updateUI() {
            const state = window.__3D_STATE__;
            
            // Toolbar
            ui.undoBtn.disabled = state.undoStackSize === 0;
            ui.redoBtn.disabled = state.redoStackSize === 0;
            ui.undoCount.textContent = state.undoStackSize;
            ui.redoCount.textContent = state.redoStackSize;
            
            ui.spinBtn.textContent = `Spin: ${state.isSpinning ? 'ON' : 'OFF'}`;
            ui.spinBtn.style.background = state.isSpinning ? '#4d96ff' : '';

            // Themes
            Object.keys(ui.themeBtns).forEach(k => ui.themeBtns[k].classList.remove('active'));
            if(ui.themeBtns[state.currentTheme]) ui.themeBtns[state.currentTheme].classList.add('active');

            // Panel
            if (state.featurePanelVisible && state.selectedFeature > 0) {
                const feature = featuresData.find(f => f.id === state.selectedFeature);
                const fIndex = feature.id - 1;
                const isEnabled = state.featureStates[fIndex];

                ui.fName.textContent = feature.name;
                ui.fDesc.textContent = feature.desc;
                ui.fSwatch.style.color = '#' + feature.color.toString(16).padStart(6, '0');
                ui.fSwatch.style.backgroundColor = '#' + feature.color.toString(16).padStart(6, '0');
                
                ui.toggleBtn.textContent = isEnabled ? 'Disable Feature' : 'Enable Feature';
                if(isEnabled) ui.toggleBtn.classList.remove('disabled-state');
                else ui.toggleBtn.classList.add('disabled-state');

                ui.panel.classList.add('visible');
            } else {
                ui.panel.classList.remove('visible');
            }
        }

        // --- DOM EVENT LISTENERS ---
        ui.undoBtn.addEventListener('click', () => cmdManager.undo());
        ui.redoBtn.addEventListener('click', () => cmdManager.redo());
        
        ui.spinBtn.addEventListener('click', () => {
            cmdManager.execute(new ToggleSpinCmd(window.__3D_STATE__.isSpinning, !window.__3D_STATE__.isSpinning));
        });

        ui.toggleBtn.addEventListener('click', () => {
            const id = window.__3D_STATE__.selectedFeature;
            if (id > 0) {
                const index = id - 1;
                const currentState = window.__3D_STATE__.featureStates[index];
                cmdManager.execute(new ToggleFeatureCmd(index, currentState, !currentState));
            }
        });

        Object.keys(ui.themeBtns).forEach(theme => {
            ui.themeBtns[theme].addEventListener('click', () => {
                if (window.__3D_STATE__.currentTheme !== theme) {
                    cmdManager.execute(new ChangeThemeCmd(window.__3D_STATE__.currentTheme, theme));
                }
            });
        });

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                cmdManager.undo();
            } else if (e.ctrlKey && e.key.toLowerCase() === 'y') {
                e.preventDefault();
                cmdManager.redo();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- INITIALIZATION ---
        applyTheme('dark');
        updateUI();

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (window.__3D_STATE__.isSpinning) {
                modelGroup.rotation.y += 0.5 * delta;
            }

            // Update Hotspots Visuals
            hotspots.forEach((mesh) => {
                const index = mesh.userData.index;
                const isActive = window.__3D_STATE__.selectedFeature === mesh.userData.id;
                const isEnabled = window.__3D_STATE__.featureStates[index];

                if (isActive) {
                    mesh.scale.setScalar(1.5);
                    mesh.material.emissiveIntensity = isEnabled ? 1.0 : 0.2;
                } else {
                    const pulse = 1.0 + 0.2 * Math.sin(time * Math.PI * 2);
                    mesh.scale.setScalar(pulse);
                    mesh.material.emissiveIntensity = isEnabled ? 0.5 : 0.0;
                }

                if (!isEnabled) {
                    mesh.material.opacity = 0.3;
                } else {
                    mesh.material.opacity = 1.0;
                }

                window.__3D_STATE__.hotspotScales[index] = mesh.scale.x;
            });

            // Update State
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);
            window.__3D_STATE__.undoStackSize = cmdManager.undoStack.length;
            window.__3D_STATE__.redoStackSize = cmdManager.redoStack.length;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
