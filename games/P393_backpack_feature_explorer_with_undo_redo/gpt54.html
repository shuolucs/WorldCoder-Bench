<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Smart Backpack Feature Explorer</title>
  <style>
    :root {
      --panel-bg: rgba(20, 24, 35, 0.9);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #f5f7fb;
      --muted: #b8c0d4;
      --accent: #6ea8fe;
      --toolbar-bg: rgba(10, 12, 20, 0.75);
      --btn-bg: rgba(255, 255, 255, 0.08);
      --btn-hover: rgba(255, 255, 255, 0.16);
      --btn-border: rgba(255, 255, 255, 0.14);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background: #16213e;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
    }

    #toolbar {
      position: fixed;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--toolbar-bg);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      z-index: 20;
      flex-wrap: wrap;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spacer {
      flex: 1;
    }

    button {
      appearance: none;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
    }

    button:hover:not(:disabled) {
      background: var(--btn-hover);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .theme-btn {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      padding: 0;
      border: 2px solid rgba(255,255,255,0.55);
    }

    #themeDark { background: linear-gradient(180deg, #1a1a2e, #16213e); }
    #themeLight { background: linear-gradient(180deg, #f0f0f0, #ffffff); }
    #themeBlue { background: linear-gradient(180deg, #0c2461, #1e3799); }

    .active-toggle {
      outline: 2px solid rgba(110, 168, 254, 0.9);
      background: rgba(110, 168, 254, 0.18);
    }

    #featurePanel {
      position: fixed;
      top: 82px;
      right: 14px;
      width: 320px;
      min-height: 220px;
      padding: 18px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      z-index: 20;
      display: none;
    }

    #featurePanel.visible {
      display: block;
    }

    #featureName {
      margin: 0 0 10px;
      font-size: 1.45rem;
    }

    #featureDesc {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.5;
    }

    .swatch-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      color: var(--muted);
    }

    #colorSwatch {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .hint {
      position: fixed;
      left: 14px;
      bottom: 14px;
      padding: 10px 12px;
      background: rgba(10, 12, 20, 0.65);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      color: var(--muted);
      z-index: 20;
      font-size: 0.92rem;
      backdrop-filter: blur(8px);
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="toolbar">
    <div class="group">
      <button id="undoBtn" disabled>Undo</button>
      <span class="badge">Undo: <span id="undoCount">0</span></span>
      <button id="redoBtn" disabled>Redo</button>
      <span class="badge">Redo: <span id="redoCount">0</span></span>
    </div>

    <div class="group">
      <button id="spinBtn">Spin</button>
    </div>

    <div class="group">
      <span class="badge">Theme</span>
      <button class="theme-btn active-toggle" id="themeDark" title="Dark theme"></button>
      <button class="theme-btn" id="themeLight" title="Light theme"></button>
      <button class="theme-btn" id="themeBlue" title="Blue theme"></button>
    </div>

    <div class="spacer"></div>
    <div class="badge">3D Backpack Feature Explorer</div>
  </div>

  <div id="featurePanel">
    <h2 id="featureName"></h2>
    <p id="featureDesc"></p>
    <div class="swatch-row">
      <div id="colorSwatch"></div>
      <span>Feature color</span>
    </div>
    <button id="toggleFeatureBtn">Toggle Feature</button>
  </div>

  <div class="hint">Click glowing hotspots to inspect features. Ctrl+Z / Ctrl+Y for undo/redo.</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const featurePanel = document.getElementById("featurePanel");
    const featureName = document.getElementById("featureName");
    const featureDesc = document.getElementById("featureDesc");
    const colorSwatch = document.getElementById("colorSwatch");
    const toggleFeatureBtn = document.getElementById("toggleFeatureBtn");
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const undoCount = document.getElementById("undoCount");
    const redoCount = document.getElementById("redoCount");
    const spinBtn = document.getElementById("spinBtn");
    const themeDarkBtn = document.getElementById("themeDark");
    const themeLightBtn = document.getElementById("themeLight");
    const themeBlueBtn = document.getElementById("themeBlue");

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 3.5);
    camera.lookAt(0, 1.0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 2.5;
    controls.target.set(0, 1.0, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(3, 5, 4);
    scene.add(dirLight);

    const groundGeometry = new THREE.CircleGeometry(2, 64);
    const groundMaterial = new THREE.MeshStandardMaterial({
      color: 0x111111,
      roughness: 0.25,
      metalness: 0.65
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const shadowRing = new THREE.Mesh(
      new THREE.RingGeometry(1.2, 1.95, 64),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.03, side: THREE.DoubleSide })
    );
    shadowRing.rotation.x = -Math.PI / 2;
    shadowRing.position.y = 0.001;
    scene.add(shadowRing);

    const modelRoot = new THREE.Group();
    scene.add(modelRoot);

    let loadedModel = null;

    const features = [
      {
        id: 1,
        name: "LED Panel",
        desc: "Integrated LED matrix for nighttime visibility. 360-degree illumination.",
        color: "#ff6b6b",
        position: new THREE.Vector3(0.3, 1.6, 0.3)
      },
      {
        id: 2,
        name: "Solar Charger",
        desc: "Flexible solar panel generates 15W. Charges devices on the go.",
        color: "#ffd93d",
        position: new THREE.Vector3(-0.3, 1.8, 0.1)
      },
      {
        id: 3,
        name: "GPS Module",
        desc: "Built-in GPS with offline maps. SOS beacon capability.",
        color: "#6bcb77",
        position: new THREE.Vector3(0.0, 1.0, 0.4)
      },
      {
        id: 4,
        name: "Water Filter",
        desc: "Integrated 0.1 micron filter. Purifies 1000L before replacement.",
        color: "#4d96ff",
        position: new THREE.Vector3(0.25, 0.5, 0.35)
      },
      {
        id: 5,
        name: "Hidden Pocket",
        desc: "RFID-blocking compartment. Fits passport and cards securely.",
        color: "#9b59b6",
        position: new THREE.Vector3(-0.25, 0.7, 0.3)
      }
    ];

    const hotspotGroup = new THREE.Group();
    scene.add(hotspotGroup);

    const hotspots = [];
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const clock = new THREE.Clock();

    const state = {
      selectedFeature: 0,
      featureStates: [true, true, true, true, true],
      currentTheme: "dark",
      isSpinning: false,
      totalActions: 0
    };

    const undoStack = [];
    const redoStack = [];

    window.__3D_STATE__ = {
      modelLoaded: false,
      selectedFeature: 0,
      featureStates: [true, true, true, true, true],
      undoStackSize: 0,
      redoStackSize: 0,
      currentTheme: "dark",
      isSpinning: false,
      cameraDistance: camera.position.length(),
      hotspotScales: [1, 1, 1, 1, 1],
      featurePanelVisible: false,
      totalActions: 0
    };

    const themes = {
      dark: {
        top: "#1a1a2e",
        bottom: "#16213e",
        ground: "#111111"
      },
      light: {
        top: "#f0f0f0",
        bottom: "#ffffff",
        ground: "#cccccc"
      },
      blue: {
        top: "#0c2461",
        bottom: "#1e3799",
        ground: "#0a1a3a"
      }
    };

    function createGradientTexture(topColor, bottomColor) {
      const canvas = document.createElement("canvas");
      canvas.width = 2;
      canvas.height = 512;
      const ctx = canvas.getContext("2d");
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, topColor);
      gradient.addColorStop(1, bottomColor);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    let currentBgTexture = null;

    function applyTheme(themeName) {
      const theme = themes[themeName];
      if (!theme) return;
      if (currentBgTexture) currentBgTexture.dispose();
      currentBgTexture = createGradientTexture(theme.top, theme.bottom);
      scene.background = currentBgTexture;
      groundMaterial.color.set(theme.ground);
      state.currentTheme = themeName;
      updateThemeButtons();
    }

    function updateThemeButtons() {
      [themeDarkBtn, themeLightBtn, themeBlueBtn].forEach(btn => btn.classList.remove("active-toggle"));
      if (state.currentTheme === "dark") themeDarkBtn.classList.add("active-toggle");
      if (state.currentTheme === "light") themeLightBtn.classList.add("active-toggle");
      if (state.currentTheme === "blue") themeBlueBtn.classList.add("active-toggle");
    }

    function createHotspots() {
      features.forEach((feature, index) => {
        const geometry = new THREE.SphereGeometry(0.06, 24, 24);
        const material = new THREE.MeshStandardMaterial({
          color: feature.color,
          emissive: new THREE.Color(feature.color),
          emissiveIntensity: 0.9,
          metalness: 0.25,
          roughness: 0.3,
          transparent: true,
          opacity: 1
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(feature.position);
        mesh.userData.hotspotIndex = index + 1;

        const glow = new THREE.PointLight(feature.color, 0.8, 0.8, 2);
        glow.position.set(0, 0, 0);
        mesh.add(glow);

        hotspotGroup.add(mesh);
        hotspots.push(mesh);
      });
    }

    function refreshHotspotVisuals() {
      hotspots.forEach((hotspot, i) => {
        const enabled = state.featureStates[i];
        const selected = state.selectedFeature === (i + 1);
        const baseColor = features[i].color;
        hotspot.material.color.set(baseColor);
        hotspot.material.emissive.set(baseColor);
        hotspot.material.emissiveIntensity = selected ? 2.0 : (enabled ? 0.9 : 0.18);
        hotspot.material.opacity = enabled ? 1.0 : 0.28;

        hotspot.children.forEach(child => {
          if (child.isPointLight) {
            child.intensity = selected ? 1.8 : (enabled ? 0.8 : 0.15);
          }
        });
      });

      if (state.selectedFeature > 0) {
        const feature = features[state.selectedFeature - 1];
        featureName.textContent = feature.name;
        featureDesc.textContent = feature.desc;
        colorSwatch.style.background = feature.color;
        toggleFeatureBtn.textContent = state.featureStates[state.selectedFeature - 1]
          ? "Disable Feature"
          : "Enable Feature";
        featurePanel.classList.add("visible");
      } else {
        featurePanel.classList.remove("visible");
      }
    }

    function updateToolbar() {
      undoCount.textContent = String(undoStack.length);
      redoCount.textContent = String(redoStack.length);
      undoBtn.disabled = undoStack.length === 0;
      redoBtn.disabled = redoStack.length === 0;

      if (state.isSpinning) spinBtn.classList.add("active-toggle");
      else spinBtn.classList.remove("active-toggle");
    }

    function applySnapshot(snapshot) {
      state.selectedFeature = snapshot.selectedFeature;
      state.featureStates = [...snapshot.featureStates];
      state.currentTheme = snapshot.currentTheme;
      state.isSpinning = snapshot.isSpinning;
      applyTheme(state.currentTheme);
      refreshHotspotVisuals();
      updateToolbar();
    }

    function captureSnapshot() {
      return {
        selectedFeature: state.selectedFeature,
        featureStates: [...state.featureStates],
        currentTheme: state.currentTheme,
        isSpinning: state.isSpinning
      };
    }

    function performAction(mutator) {
      const before = captureSnapshot();
      mutator();
      const after = captureSnapshot();

      if (JSON.stringify(before) === JSON.stringify(after)) return;

      undoStack.push(before);
      redoStack.length = 0;
      state.totalActions += 1;
      refreshHotspotVisuals();
      updateToolbar();
    }

    function undo() {
      if (!undoStack.length) return;
      const current = captureSnapshot();
      const prev = undoStack.pop();
      redoStack.push(current);
      applySnapshot(prev);
    }

    function redo() {
      if (!redoStack.length) return;
      const current = captureSnapshot();
      const next = redoStack.pop();
      undoStack.push(current);
      applySnapshot(next);
    }

    function selectFeature(featureId) {
      performAction(() => {
        state.selectedFeature = featureId;
      });
    }

    function toggleSelectedFeature() {
      if (state.selectedFeature === 0) return;
      performAction(() => {
        const idx = state.selectedFeature - 1;
        state.featureStates[idx] = !state.featureStates[idx];
      });
    }

    function changeTheme(themeName) {
      if (state.currentTheme === themeName) return;
      performAction(() => {
        state.currentTheme = themeName;
        applyTheme(themeName);
      });
    }

    function toggleSpin() {
      performAction(() => {
        state.isSpinning = !state.isSpinning;
      });
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(hotspots, false);

      if (intersects.length > 0) {
        const selected = intersects[0].object.userData.hotspotIndex;
        selectFeature(selected);
      }
    }

    createHotspots();
    applyTheme("dark");
    refreshHotspotVisuals();
    updateToolbar();

    const loader = new GLTFLoader();
    loader.load(
      "robot.glb",
      (gltf) => {
        loadedModel = gltf.scene;
        modelRoot.add(loadedModel);

        const box = new THREE.Box3().setFromObject(loadedModel);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        loadedModel.position.sub(center);

        const height = size.y || 1;
        const scale = 2.0 / height;
        loadedModel.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(loadedModel);
        const size2 = new THREE.Vector3();
        const center2 = new THREE.Vector3();
        box2.getSize(size2);
        box2.getCenter(center2);

        loadedModel.position.x -= center2.x;
        loadedModel.position.y -= box2.min.y;
        loadedModel.position.z -= center2.z;

        controls.target.set(0, 1.0, 0);
        controls.update();

        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.error("Failed to load robot.glb", err);
      }
    );

    renderer.domElement.addEventListener("pointerdown", onPointerDown);

    toggleFeatureBtn.addEventListener("click", toggleSelectedFeature);
    undoBtn.addEventListener("click", undo);
    redoBtn.addEventListener("click", redo);
    spinBtn.addEventListener("click", toggleSpin);
    themeDarkBtn.addEventListener("click", () => changeTheme("dark"));
    themeLightBtn.addEventListener("click", () => changeTheme("light"));
    themeBlueBtn.addEventListener("click", () => changeTheme("blue"));

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (e.ctrlKey && key === "z") {
        e.preventDefault();
        undo();
      } else if (e.ctrlKey && key === "y") {
        e.preventDefault();
        redo();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateExposedState() {
      window.__3D_STATE__.selectedFeature = state.selectedFeature;
      window.__3D_STATE__.featureStates = [...state.featureStates];
      window.__3D_STATE__.undoStackSize = undoStack.length;
      window.__3D_STATE__.redoStackSize = redoStack.length;
      window.__3D_STATE__.currentTheme = state.currentTheme;
      window.__3D_STATE__.isSpinning = state.isSpinning;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.hotspotScales = hotspots.map(h => h.scale.x);
      window.__3D_STATE__.featurePanelVisible = featurePanel.classList.contains("visible");
      window.__3D_STATE__.totalActions = state.totalActions;
    }

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();

      if (state.isSpinning && modelRoot) {
        modelRoot.rotation.y += 0.5 * delta;
      }

      hotspots.forEach((hotspot, i) => {
        const pulse = 1.0 + 0.2 * Math.sin(elapsed * Math.PI * 2 + i * 0.8);
        const selectedBoost = state.selectedFeature === (i + 1) ? 1.5 : 1.0;
        hotspot.scale.setScalar(pulse * selectedBoost);
      });

      controls.update();
      updateExposedState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
