<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Backpack Feature Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

#toolbar .title {
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    margin-right: 20px;
    white-space: nowrap;
}

.toolbar-btn {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}
.toolbar-btn:hover { background: rgba(255,255,255,0.15); }
.toolbar-btn.disabled { opacity: 0.4; cursor: default; pointer-events: none; }
.toolbar-btn.active { background: rgba(100,200,255,0.3); border-color: rgba(100,200,255,0.5); }

.stack-count {
    background: rgba(255,255,255,0.15);
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    min-width: 20px;
    text-align: center;
}

.separator {
    width: 1px;
    height: 30px;
    background: rgba(255,255,255,0.15);
    margin: 0 4px;
}

.theme-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.2s;
}
.theme-btn:hover { transform: scale(1.15); }
.theme-btn.active-theme { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.4); }

#themeDark { background: linear-gradient(135deg, #1a1a2e, #16213e); }
#themeLight { background: linear-gradient(135deg, #f0f0f0, #ffffff); }
#themeBlue { background: linear-gradient(135deg, #0c2461, #1e3799); }

#featurePanel {
    position: fixed;
    right: -340px;
    top: 76px;
    width: 320px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(15px);
    border-radius: 16px;
    padding: 28px;
    color: #fff;
    z-index: 100;
    transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#featurePanel.visible { right: 20px; }

#featurePanel h2 {
    font-size: 22px;
    margin-bottom: 4px;
    font-weight: 700;
}

#colorSwatch {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    margin: 12px 0 16px 0;
}

#featureDesc {
    font-size: 14px;
    line-height: 1.6;
    color: rgba(255,255,255,0.8);
    margin-bottom: 20px;
}

#toggleFeatureBtn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
#toggleFeatureBtn.enabled {
    background: linear-gradient(135deg, #6bcb77, #4d96ff);
    color: #fff;
}
#toggleFeatureBtn.disabled-feature {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5);
}

#closePanel {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 22px;
    cursor: pointer;
    transition: color 0.2s;
}
#closePanel:hover { color: #fff; }

#loadingOverlay {
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s;
}
#loadingOverlay.hidden { opacity: 0; pointer-events: none; }
.loader {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #4d96ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.feature-number {
    display: inline-block;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    text-align: center;
    line-height: 24px;
    font-size: 12px;
    font-weight: 700;
    margin-right: 8px;
    vertical-align: middle;
}
</style>
</head>
<body>

<div id="loadingOverlay"><div class="loader"></div></div>

<div id="toolbar">
    <span class="title">🎒 Backpack Explorer</span>
    <button class="toolbar-btn disabled" id="undoBtn" title="Undo (Ctrl+Z)">
        ↩ Undo <span class="stack-count" id="undoCount">0</span>
    </button>
    <button class="toolbar-btn disabled" id="redoBtn" title="Redo (Ctrl+Y)">
        ↪ Redo <span class="stack-count" id="redoCount">0</span>
    </button>
    <div class="separator"></div>
    <button class="toolbar-btn" id="spinBtn">🔄 Spin</button>
    <div class="separator"></div>
    <div id="themeDark" class="theme-btn active-theme" title="Dark Theme"></div>
    <div id="themeLight" class="theme-btn" title="Light Theme"></div>
    <div id="themeBlue" class="theme-btn" title="Blue Theme"></div>
</div>

<div id="featurePanel">
    <button id="closePanel">✕</button>
    <h2 id="featureName">Feature Name</h2>
    <div id="colorSwatch"></div>
    <p id="featureDesc">Description goes here.</p>
    <button id="toggleFeatureBtn" class="enabled">✓ Feature Enabled</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
window.__3D_STATE__ = {
    modelLoaded: false,
    selectedFeature: 0,
    featureStates: [true, true, true, true, true],
    undoStackSize: 0,
    redoStackSize: 0,
    currentTheme: 'dark',
    isSpinning: false,
    cameraDistance: 3.5,
    hotspotScales: [1, 1, 1, 1, 1],
    featurePanelVisible: false,
    totalActions: 0
};

const undoStack = [];
const redoStack = [];

// ============ FEATURE DATA ============
const features = [
    { name: 'LED Panel', pos: new THREE.Vector3(0.3, 1.6, 0.3), color: '#ff6b6b', desc: 'Integrated LED matrix for nighttime visibility. 360-degree illumination.' },
    { name: 'Solar Charger', pos: new THREE.Vector3(-0.3, 1.8, 0.1), color: '#ffd93d', desc: 'Flexible solar panel generates 15W. Charges devices on the go.' },
    { name: 'GPS Module', pos: new THREE.Vector3(0.0, 1.0, 0.4), color: '#6bcb77', desc: 'Built-in GPS with offline maps. SOS beacon capability.' },
    { name: 'Water Filter', pos: new THREE.Vector3(0.25, 0.5, 0.35), color: '#4d96ff', desc: 'Integrated 0.1 micron filter. Purifies 1000L before replacement.' },
    { name: 'Hidden Pocket', pos: new THREE.Vector3(-0.25, 0.7, 0.3), color: '#9b59b6', desc: 'RFID-blocking compartment. Fits passport and cards securely.' }
];

const themes = {
    dark: { top: '#1a1a2e', bottom: '#16213e', ground: '#111111' },
    light: { top: '#f0f0f0', bottom: '#ffffff', ground: '#cccccc' },
    blue: { top: '#0c2461', bottom: '#1e3799', ground: '#0a1a3a' }
};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Background
function setBackground(topColor, bottomColor) {
    const canvas = document.createElement('canvas');
    canvas.width = 2;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 512);
    gradient.addColorStop(0, topColor);
    gradient.addColorStop(1, bottomColor);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 2, 512);
    const texture = new THREE.CanvasTexture(canvas);
    scene.background = texture;
}
setBackground('#1a1a2e', '#16213e');

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(3, 5, 4);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -3;
dirLight.shadow.camera.right = 3;
dirLight.shadow.camera.top = 3;
dirLight.shadow.camera.bottom = -3;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
fillLight.position.set(-3, 2, -2);
scene.add(fillLight);

// Ground plane
const groundGeom = new THREE.CircleGeometry(2, 64);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x111111,
    metalness: 0.8,
    roughness: 0.3,
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.minPolarAngle = 0.3;
controls.maxPolarAngle = 2.5;
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0.8, 0);
controls.update();

// ============ HOTSPOTS ============
const hotspots = [];
const hotspotMeshes = [];

features.forEach((f, i) => {
    const geom = new THREE.SphereGeometry(0.06, 16, 16);
    const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(f.color),
        emissive: new THREE.Color(f.color),
        emissiveIntensity: 0.6,
        metalness: 0.3,
        roughness: 0.2,
        transparent: true,
        opacity: 0.9
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.copy(f.pos);
    mesh.userData.hotspotIndex = i;
    scene.add(mesh);
    hotspotMeshes.push(mesh);

    // Outer glow ring
    const ringGeom = new THREE.RingGeometry(0.08, 0.12, 32);
    const ringMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(f.color),
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.position.copy(f.pos);
    ring.lookAt(camera.position);
    scene.add(ring);

    hotspots.push({ mesh, ring, feature: f, index: i, enabled: true, active: false });
});

// ============ LOAD MODEL ============
let model = null;
const loader = new GLTFLoader();
loader.load('robot.glb', (gltf) => {
    model = gltf.scene;
    
    // Calculate bounding box and scale
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    
    const targetHeight = 2.0;
    const scale = targetHeight / size.y;
    model.scale.setScalar(scale);
    
    // Recalculate after scaling
    const box2 = new THREE.Box3().setFromObject(model);
    const center2 = box2.getCenter(new THREE.Vector3());
    model.position.x = -center2.x;
    model.position.z = -center2.z;
    model.position.y = -box2.min.y;
    
    model.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
        }
    });
    
    scene.add(model);
    window.__3D_STATE__.modelLoaded = true;
    
    setTimeout(() => {
        document.getElementById('loadingOverlay').classList.add('hidden');
    }, 500);
}, undefined, (error) => {
    console.error('Error loading model:', error);
    // Still hide loading overlay
    window.__3D_STATE__.modelLoaded = false;
    setTimeout(() => {
        document.getElementById('loadingOverlay').classList.add('hidden');
    }, 500);
});

// ============ UNDO/REDO SYSTEM ============
function pushAction(action) {
    undoStack.push(action);
    redoStack.length = 0;
    window.__3D_STATE__.totalActions++;
    updateUndoRedoUI();
}

function performUndo() {
    if (undoStack.length === 0) return;
    const action = undoStack.pop();
    redoStack.push(action);
    reverseAction(action);
    updateUndoRedoUI();
}

function performRedo() {
    if (redoStack.length === 0) return;
    const action = redoStack.pop();
    undoStack.push(action);
    applyAction(action);
    updateUndoRedoUI();
}

function reverseAction(action) {
    switch (action.type) {
        case 'select':
            selectHotspotDirect(action.prevSelected);
            break;
        case 'toggle':
            toggleFeatureDirect(action.featureIndex, action.prevState);
            break;
        case 'theme':
            applyThemeDirect(action.prevTheme);
            break;
        case 'spin':
            setSpinDirect(action.prevSpin);
            break;
    }
}

function applyAction(action) {
    switch (action.type) {
        case 'select':
            selectHotspotDirect(action.newSelected);
            break;
        case 'toggle':
            toggleFeatureDirect(action.featureIndex, action.newState);
            break;
        case 'theme':
            applyThemeDirect(action.newTheme);
            break;
        case 'spin':
            setSpinDirect(action.newSpin);
            break;
    }
}

function updateUndoRedoUI() {
    window.__3D_STATE__.undoStackSize = undoStack.length;
    window.__3D_STATE__.redoStackSize = redoStack.length;
    
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');
    document.getElementById('undoCount').textContent = undoStack.length;
    document.getElementById('redoCount').textContent = redoStack.length;
    
    if (undoStack.length === 0) undoBtn.classList.add('disabled');
    else undoBtn.classList.remove('disabled');
    
    if (redoStack.length === 0) redoBtn.classList.add('disabled');
    else redoBtn.classList.remove('disabled');
}

// ============ ACTIONS (Direct - no undo tracking) ============
function selectHotspotDirect(index) {
    // index: 0 = none, 1-5 = hotspot
    window.__3D_STATE__.selectedFeature = index;
    
    hotspots.forEach((h, i) => {
        h.active = (i + 1 === index);
    });
    
    if (index === 0) {
        hidePanel();
    } else {
        showPanel(index - 1);
    }
}

function toggleFeatureDirect(featureIndex, state) {
    window.__3D_STATE__.featureStates[featureIndex] = state;
    hotspots[featureIndex].enabled = state;
    
    // Update panel if this feature is currently selected
    if (window.__3D_STATE__.selectedFeature === featureIndex + 1) {
        updatePanelToggleButton(featureIndex);
    }
}

function applyThemeDirect(themeName) {
    window.__3D_STATE__.currentTheme = themeName;
    const t = themes[themeName];
    setBackground(t.top, t.bottom);
    groundMat.color.set(t.ground);
    
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active-theme'));
    document.getElementById('theme' + themeName.charAt(0).toUpperCase() + themeName.slice(1)).classList.add('active-theme');
}

function setSpinDirect(spinning) {
    window.__3D_STATE__.isSpinning = spinning;
    const btn = document.getElementById('spinBtn');
    if (spinning) btn.classList.add('active');
    else btn.classList.remove('active');
}

// ============ USER ACTIONS (with undo tracking) ============
function selectHotspot(index) {
    const prev = window.__3D_STATE__.selectedFeature;
    if (prev === index) return;
    pushAction({ type: 'select', prevSelected: prev, newSelected: index });
    selectHotspotDirect(index);
}

function toggleFeature(featureIndex) {
    const prev = window.__3D_STATE__.featureStates[featureIndex];
    const next = !prev;
    pushAction({ type: 'toggle', featureIndex, prevState: prev, newState: next });
    toggleFeatureDirect(featureIndex, next);
}

function changeTheme(themeName) {
    const prev = window.__3D_STATE__.currentTheme;
    if (prev === themeName) return;
    pushAction({ type: 'theme', prevTheme: prev, newTheme: themeName });
    applyThemeDirect(themeName);
}

function toggleSpin() {
    const prev = window.__3D_STATE__.isSpinning;
    const next = !prev;
    pushAction({ type: 'spin', prevSpin: prev, newSpin: next });
    setSpinDirect(next);
}

// ============ PANEL ============
function showPanel(featureIdx) {
    const f = features[featureIdx];
    document.getElementById('featureName').innerHTML = `<span class="feature-number" style="background:${f.color}">${featureIdx + 1}</span>${f.name}`;
    document.getElementById('featureDesc').textContent = f.desc;
    document.getElementById('colorSwatch').style.background = `linear-gradient(90deg, ${f.color}, ${f.color}88)`;
    updatePanelToggleButton(featureIdx);
    document.getElementById('featurePanel').classList.add('visible');
    window.__3D_STATE__.featurePanelVisible = true;
}

function hidePanel() {
    document.getElementById('featurePanel').classList.remove('visible');
    window.__3D_STATE__.featurePanelVisible = false;
}

function updatePanelToggleButton(featureIdx) {
    const btn = document.getElementById('toggleFeatureBtn');
    const enabled = window.__3D_STATE__.featureStates[featureIdx];
    if (enabled) {
        btn.className = 'enabled';
        btn.textContent = '✓ Feature Enabled';
    } else {
        btn.className = 'disabled-feature';
        btn.textContent = '✗ Feature Disabled';
    }
}

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    
    const meshes = hotspotMeshes.filter((m, i) => true);
    const intersects = raycaster.intersectObjects(meshes);
    
    if (intersects.length > 0) {
        const idx = intersects[0].object.userData.hotspotIndex;
        selectHotspot(idx + 1);
    }
});

// ============ EVENT LISTENERS ============
document.getElementById('undoBtn').addEventListener('click', performUndo);
document.getElementById('redoBtn').addEventListener('click', performRedo);
document.getElementById('spinBtn').addEventListener('click', toggleSpin);
document.getElementById('closePanel').addEventListener('click', () => selectHotspot(0));

document.getElementById('toggleFeatureBtn').addEventListener('click', () => {
    const sel = window.__3D_STATE__.selectedFeature;
    if (sel >= 1 && sel <= 5) {
        toggleFeature(sel - 1);
    }
});

document.getElementById('themeDark').addEventListener('click', () => changeTheme('dark'));
document.getElementById('themeLight').addEventListener('click', () => changeTheme('light'));
document.getElementById('themeBlue').addEventListener('click', () => changeTheme('blue'));

document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'z') {
        e.preventDefault();
        performUndo();
    }
    if (e.ctrlKey && e.key === 'y') {
        e.preventDefault();
        performRedo();
    }
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const time = clock.getElapsedTime();
    const delta = clock.getDelta();
    
    controls.update();
    
    // Model spin
    if (model && window.__3D_STATE__.isSpinning) {
        model.rotation.y += 0.5 * (1/60);
    }
    
    // Hotspot animations
    hotspots.forEach((h, i) => {
        // Pulse
        const pulsePhase = time * Math.PI * 2 + i * 1.2;
        const pulseScale = 0.8 + 0.4 * (0.5 + 0.5 * Math.sin(pulsePhase));
        
        let finalScale = pulseScale;
        
        // Active state
        if (h.active) {
            finalScale *= 1.5;
            h.mesh.material.emissiveIntensity = 1.2 + 0.3 * Math.sin(time * 5);
        } else {
            h.mesh.material.emissiveIntensity = 0.6;
        }
        
        // Disabled state
        if (!h.enabled) {
            h.mesh.material.opacity = 0.25;
            h.ring.material.opacity = 0.08;
            h.mesh.material.emissiveIntensity = 0.1;
        } else {
            h.mesh.material.opacity = 0.9;
            h.ring.material.opacity = 0.3;
        }
        
        h.mesh.scale.setScalar(finalScale);
        h.ring.scale.setScalar(finalScale);
        h.ring.lookAt(camera.position);
        
        window.__3D_STATE__.hotspotScales[i] = finalScale;
    });
    
    // Update state
    window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
    
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
