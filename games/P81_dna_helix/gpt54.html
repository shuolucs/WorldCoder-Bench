<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js DNA 双螺旋</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b1020;
      color: #e8ecff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 16, 32, 0.78);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 280px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #ui h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .row {
      margin: 10px 0;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #cfd8ff;
    }

    input[type="range"] {
      width: 100%;
    }

    button {
      width: 100%;
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      background: #4f7cff;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #678dff;
    }

    #baseInfo {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      font-size: 13px;
      line-height: 1.5;
      min-height: 42px;
    }

    #legend {
      margin-top: 10px;
      font-size: 12px;
      color: #c9d2ff;
      line-height: 1.6;
    }

    .swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <h2>DNA 双螺旋</h2>

    <div class="row">
      <label for="rotSpeed">旋转速度 <span id="rotSpeedVal"></span></label>
      <input id="rotSpeed" type="range" min="0" max="0.1" step="0.001" value="0.01" />
    </div>

    <div class="row">
      <label for="spacing">碱基对间距 <span id="spacingVal"></span></label>
      <input id="spacing" type="range" min="0.6" max="2.4" step="0.01" value="1.2" />
    </div>

    <div class="row">
      <button id="unwindBtn">切换解旋动画</button>
    </div>

    <div id="baseInfo">点击某个碱基对以查看信息</div>

    <div id="legend">
      <div><span class="swatch" style="background:#ff5a5a;"></span>A</div>
      <div><span class="swatch" style="background:#57d65c;"></span>T</div>
      <div><span class="swatch" style="background:#4f86ff;"></span>G</div>
      <div><span class="swatch" style="background:#ffd84d;"></span>C</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('app');
    const rotSpeedEl = document.getElementById('rotSpeed');
    const spacingEl = document.getElementById('spacing');
    const unwindBtn = document.getElementById('unwindBtn');
    const baseInfo = document.getElementById('baseInfo');
    const rotSpeedVal = document.getElementById('rotSpeedVal');
    const spacingVal = document.getElementById('spacingVal');

    const sequence = "ATCGATCGAATCGATCGATC"; // 20
    const basePairCount = 20;
    const helixRadius = 2.2;
    const turns = 4.0;
    const angleStep = (Math.PI * 2 * turns) / (basePairCount - 1);

    const colors = {
      A: new THREE.Color(0xff5a5a),
      T: new THREE.Color(0x57d65c),
      G: new THREE.Color(0x4f86ff),
      C: new THREE.Color(0xffd84d),
      backbone1: new THREE.Color(0xb8c7ff),
      backbone2: new THREE.Color(0xd7b3ff),
      connector: new THREE.Color(0xdde6ff),
      highlight: new THREE.Color(0xffffff)
    };

    let rotSpeed = parseFloat(rotSpeedEl.value);
    let spacing = parseFloat(spacingEl.value);
    let selectedBase = null;
    let isUnwinding = false;
    let unwindProgress = 0;

    rotSpeedVal.textContent = rotSpeed.toFixed(3);
    spacingVal.textContent = spacing.toFixed(2);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);
    scene.fog = new THREE.Fog(0x0b1020, 18, 55);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 6, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 1.4);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 1.3);
    dir1.position.set(8, 10, 10);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0x88aaff, 0.8);
    dir2.position.set(-8, -4, -6);
    scene.add(dir2);

    const dnaGroup = new THREE.Group();
    scene.add(dnaGroup);

    const backboneGroup = new THREE.Group();
    const basePairGroup = new THREE.Group();
    dnaGroup.add(backboneGroup);
    dnaGroup.add(basePairGroup);

    let backboneMesh1 = null;
    let backboneMesh2 = null;

    const pairObjects = [];

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clickableObjects = [];

    function getComplement(base) {
      if (base === 'A') return 'T';
      if (base === 'T') return 'A';
      if (base === 'G') return 'C';
      return 'G';
    }

    function getBaseY(index, spacingValue) {
      return (index - (basePairCount - 1) / 2) * spacingValue;
    }

    function getHelixPoint(index, strandPhase, spacingValue, unwindAmount = 0) {
      const theta = index * angleStep + strandPhase;
      const y = getBaseY(index, spacingValue);
      const separation = 4.0 * unwindAmount;
      const axialShift = strandPhase === 0 ? -separation : separation;
      const radialScale = 1 + 0.55 * unwindAmount;

      return new THREE.Vector3(
        Math.cos(theta) * helixRadius * radialScale + axialShift,
        y,
        Math.sin(theta) * helixRadius * radialScale
      );
    }

    class HelixCurve extends THREE.Curve {
      constructor(phase, spacingValue, unwindAmount) {
        super();
        this.phase = phase;
        this.spacingValue = spacingValue;
        this.unwindAmount = unwindAmount;
      }

      getPoint(t, target = new THREE.Vector3()) {
        const idx = t * (basePairCount - 1);
        const theta = idx * angleStep + this.phase;
        const y = ((idx) - (basePairCount - 1) / 2) * this.spacingValue;
        const separation = 4.0 * this.unwindAmount;
        const axialShift = this.phase === 0 ? -separation : separation;
        const radialScale = 1 + 0.55 * this.unwindAmount;

        return target.set(
          Math.cos(theta) * helixRadius * radialScale + axialShift,
          y,
          Math.sin(theta) * helixRadius * radialScale
        );
      }
    }

    function createBackboneMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness: 0.35,
        metalness: 0.1
      });
    }

    function rebuildBackbones() {
      if (backboneMesh1) {
        backboneMesh1.geometry.dispose();
        backboneGroup.remove(backboneMesh1);
      }
      if (backboneMesh2) {
        backboneMesh2.geometry.dispose();
        backboneGroup.remove(backboneMesh2);
      }

      const curve1 = new HelixCurve(0, spacing, unwindProgress);
      const curve2 = new HelixCurve(Math.PI, spacing, unwindProgress);

      const tubularSegments = 300;
      const radius = 0.16;
      const radialSegments = 10;

      const geo1 = new THREE.TubeGeometry(curve1, tubularSegments, radius, radialSegments, false);
      const geo2 = new THREE.TubeGeometry(curve2, tubularSegments, radius, radialSegments, false);

      backboneMesh1 = new THREE.Mesh(geo1, createBackboneMaterial(colors.backbone1));
      backboneMesh2 = new THREE.Mesh(geo2, createBackboneMaterial(colors.backbone2));

      backboneGroup.add(backboneMesh1, backboneMesh2);
    }

    function makeCylinderBetweenPoints(start, end, radius, material) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = dir.length();
      const geometry = new THREE.CylinderGeometry(radius, radius, len, 14);
      const mesh = new THREE.Mesh(geometry, material);

      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      mesh.position.copy(midpoint);

      const up = new THREE.Vector3(0, 1, 0);
      mesh.quaternion.setFromUnitVectors(up, dir.clone().normalize());

      return mesh;
    }

    function buildBasePairs() {
      for (const obj of pairObjects) {
        obj.group.traverse((child) => {
          if (child.isMesh && child.geometry) child.geometry.dispose();
        });
        basePairGroup.remove(obj.group);
      }
      pairObjects.length = 0;
      clickableObjects.length = 0;

      for (let i = 0; i < basePairCount; i++) {
        const leftBase = sequence[i];
        const rightBase = getComplement(leftBase);

        const pairGroup = new THREE.Group();
        pairGroup.userData.baseIndex = i;
        pairGroup.userData.leftBase = leftBase;
        pairGroup.userData.rightBase = rightBase;

        const p1 = getHelixPoint(i, 0, spacing, unwindProgress);
        const p2 = getHelixPoint(i, Math.PI, spacing, unwindProgress);

        const connectorMat = new THREE.MeshStandardMaterial({
          color: colors.connector,
          emissive: 0x000000,
          roughness: 0.4,
          metalness: 0.1
        });
        const connector = makeCylinderBetweenPoints(p1, p2, 0.07, connectorMat);
        connector.userData.baseIndex = i;

        const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
        const center = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
        const halfLen = p1.distanceTo(p2) * 0.23;
        const baseRadius = 0.22;

        const leftPos = center.clone().addScaledVector(dir, -halfLen);
        const rightPos = center.clone().addScaledVector(dir, halfLen);

        const sphereGeo = new THREE.SphereGeometry(baseRadius, 18, 18);

        const leftMat = new THREE.MeshStandardMaterial({
          color: colors[leftBase],
          emissive: 0x000000,
          roughness: 0.35,
          metalness: 0.08
        });

        const rightMat = new THREE.MeshStandardMaterial({
          color: colors[rightBase],
          emissive: 0x000000,
          roughness: 0.35,
          metalness: 0.08
        });

        const leftSphere = new THREE.Mesh(sphereGeo, leftMat);
        const rightSphere = new THREE.Mesh(sphereGeo, rightMat);

        leftSphere.position.copy(leftPos);
        rightSphere.position.copy(rightPos);

        leftSphere.userData.baseIndex = i;
        rightSphere.userData.baseIndex = i;
        connector.userData.baseIndex = i;

        pairGroup.add(connector, leftSphere, rightSphere);
        basePairGroup.add(pairGroup);

        pairObjects.push({
          index: i,
          group: pairGroup,
          connector,
          leftSphere,
          rightSphere,
          leftBase,
          rightBase
        });

        clickableObjects.push(connector, leftSphere, rightSphere);
      }

      applySelectionHighlight();
    }

    function updateGeometry() {
      rebuildBackbones();
      buildBasePairs();
    }

    function applySelectionHighlight() {
      for (const pair of pairObjects) {
        const selected = pair.index === selectedBase;
        pair.leftSphere.material.emissive.set(selected ? 0x333333 : 0x000000);
        pair.rightSphere.material.emissive.set(selected ? 0x333333 : 0x000000);
        pair.connector.material.emissive.set(selected ? 0x444444 : 0x000000);

        pair.leftSphere.scale.setScalar(selected ? 1.35 : 1);
        pair.rightSphere.scale.setScalar(selected ? 1.35 : 1);
        pair.connector.scale.set(selected ? 1.15 : 1, 1, selected ? 1.15 : 1);
      }
    }

    function updateBaseInfo() {
      if (selectedBase == null) {
        baseInfo.textContent = '点击某个碱基对以查看信息';
        return;
      }
      const leftBase = sequence[selectedBase];
      const rightBase = getComplement(leftBase);
      baseInfo.innerHTML = `
        索引: <b>${selectedBase}</b><br>
        碱基对: <b>${leftBase}-${rightBase}</b>
      `;
    }

    rotSpeedEl.addEventListener('input', () => {
      rotSpeed = parseFloat(rotSpeedEl.value);
      rotSpeedVal.textContent = rotSpeed.toFixed(3);
    });

    spacingEl.addEventListener('input', () => {
      spacing = parseFloat(spacingEl.value);
      spacingVal.textContent = spacing.toFixed(2);
      updateGeometry();
    });

    unwindBtn.addEventListener('click', () => {
      isUnwinding = !isUnwinding;
    });

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(clickableObjects, false);

      if (hits.length > 0) {
        selectedBase = hits[0].object.userData.baseIndex;
      } else {
        selectedBase = null;
      }

      applySelectionHighlight();
      updateBaseInfo();
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    updateGeometry();
    updateBaseInfo();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();

      if (isUnwinding) {
        unwindProgress = Math.min(1, unwindProgress + dt * 0.35);
      } else {
        unwindProgress = Math.max(0, unwindProgress - dt * 0.35);
      }

      dnaGroup.rotation.y += rotSpeed;

      updateGeometry();

      controls.update();
      renderer.render(scene, camera);

      window.__3D_STATE__ = {
        basePairCount,
        sequence,
        rotSpeed,
        spacing,
        selectedBase,
        isUnwinding,
        helixRadius
      };
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
