<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Double Helix</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, sans-serif; color: #fff; }
canvas { display: block; }

#controls {
  position: fixed;
  top: 20px;
  left: 20px;
  background: rgba(10, 10, 30, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(100, 140, 255, 0.3);
  border-radius: 12px;
  padding: 20px;
  z-index: 10;
  min-width: 260px;
}

#controls h2 {
  font-size: 16px;
  margin-bottom: 16px;
  color: #8ab4ff;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.control-group {
  margin-bottom: 14px;
}

.control-group label {
  display: block;
  font-size: 12px;
  color: #aac;
  margin-bottom: 6px;
}

.control-group input[type="range"] {
  width: 100%;
  accent-color: #5588ff;
  cursor: pointer;
}

.control-group .value-display {
  font-size: 11px;
  color: #77a;
  float: right;
  margin-top: -18px;
}

#unwindBtn {
  width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, #3355cc, #5577ff);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.5px;
}

#unwindBtn:hover {
  background: linear-gradient(135deg, #4466dd, #6688ff);
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(85, 119, 255, 0.4);
}

#unwindBtn.active {
  background: linear-gradient(135deg, #cc3355, #ff5577);
}

#unwindBtn.active:hover {
  background: linear-gradient(135deg, #dd4466, #ff6688);
  box-shadow: 0 4px 15px rgba(255, 85, 119, 0.4);
}

#baseInfo {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 10, 30, 0.9);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(100, 140, 255, 0.3);
  border-radius: 10px;
  padding: 14px 28px;
  z-index: 10;
  font-size: 14px;
  text-align: center;
  transition: opacity 0.3s, transform 0.3s;
  opacity: 0;
  pointer-events: none;
}

#baseInfo.visible {
  opacity: 1;
}

#baseInfo .pair-label {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 3px;
  margin-bottom: 4px;
}

#baseInfo .pair-index {
  font-size: 11px;
  color: #88a;
}

.legend {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid rgba(100, 140, 255, 0.15);
}

.legend-title {
  font-size: 11px;
  color: #88a;
  margin-bottom: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  margin-bottom: 4px;
  font-size: 12px;
}

.legend-color {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  margin-right: 8px;
  display: inline-block;
}

.sequence-display {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid rgba(100, 140, 255, 0.15);
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: #77a;
  word-break: break-all;
  line-height: 1.6;
}
</style>
</head>
<body>

<div id="controls">
  <h2>🧬 DNA Helix</h2>
  
  <div class="control-group">
    <label>Rotation Speed <span class="value-display" id="rotSpeedVal">0.50</span></label>
    <input type="range" id="rotSpeed" min="0" max="2" step="0.01" value="0.5">
  </div>
  
  <div class="control-group">
    <label>Base Pair Spacing <span class="value-display" id="spacingVal">1.50</span></label>
    <input type="range" id="spacing" min="0.5" max="3" step="0.05" value="1.5">
  </div>
  
  <button id="unwindBtn">🔓 Unwind DNA</button>
  
  <div class="legend">
    <div class="legend-title">Base Pair Colors</div>
    <div class="legend-item"><span class="legend-color" style="background:#ff4466;"></span> A (Adenine)</div>
    <div class="legend-item"><span class="legend-color" style="background:#44dd66;"></span> T (Thymine)</div>
    <div class="legend-item"><span class="legend-color" style="background:#4488ff;"></span> G (Guanine)</div>
    <div class="legend-item"><span class="legend-color" style="background:#ffcc22;"></span> C (Cytosine)</div>
  </div>
  
  <div class="sequence-display" id="seqDisplay"></div>
</div>

<div id="baseInfo">
  <div class="pair-label" id="pairLabel">A — T</div>
  <div class="pair-index" id="pairIndex">Base Pair #0</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const SEQUENCE = "ATCGATCGAATCGATCGATCG";
const BASE_PAIR_COUNT = 20;
const HELIX_RADIUS = 2.5;

const BASE_COLORS = {
  'A': new THREE.Color(0xff4466),
  'T': new THREE.Color(0x44dd66),
  'G': new THREE.Color(0x4488ff),
  'C': new THREE.Color(0xffcc22)
};

const COMPLEMENT = { 'A': 'T', 'T': 'A', 'G': 'C', 'C': 'G' };

const BASE_NAMES = {
  'A': 'Adenine', 'T': 'Thymine', 'G': 'Guanine', 'C': 'Cytosine'
};

// State
let rotSpeed = 0.5;
let spacing = 1.5;
let selectedBase = null;
let isUnwinding = false;
let unwindProgress = 0;
let helixRadius = HELIX_RADIUS;

window.__3D_STATE__ = {
  basePairCount: BASE_PAIR_COUNT,
  sequence: SEQUENCE.substring(0, 20),
  rotSpeed,
  spacing,
  selectedBase: null,
  isUnwinding: false,
  helixRadius: HELIX_RADIUS
};

// Scene setup
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(8, 5, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0x334466, 0.8);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0x8888ff, 1.5);
dirLight1.position.set(5, 10, 5);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xff8866, 0.8);
dirLight2.position.set(-5, -5, 10);
scene.add(dirLight2);

const pointLight = new THREE.PointLight(0x5577ff, 2, 50);
pointLight.position.set(0, 0, 0);
scene.add(pointLight);

// DNA Group
const dnaGroup = new THREE.Group();
scene.add(dnaGroup);

// Materials
const backboneMat1 = new THREE.MeshPhysicalMaterial({
  color: 0x6699ff,
  metalness: 0.3,
  roughness: 0.4,
  emissive: 0x112244,
  emissiveIntensity: 0.3,
  clearcoat: 0.5
});

const backboneMat2 = new THREE.MeshPhysicalMaterial({
  color: 0xff6699,
  metalness: 0.3,
  roughness: 0.4,
  emissive: 0x441122,
  emissiveIntensity: 0.3,
  clearcoat: 0.5
});

const highlightMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  emissive: 0xffffff,
  emissiveIntensity: 1.0,
  metalness: 0.5,
  roughness: 0.2
});

// Store references for rebuilding
let backboneMesh1 = null;
let backboneMesh2 = null;
let basePairObjects = [];
let baseSphereObjects = [];
let backboneNodeSpheres1 = [];
let backboneNodeSpheres2 = [];

function getHelixPoint(t, phase, unwind, radius) {
  const angle = t * Math.PI * 2 * 2 + phase;
  const separation = unwind * 3;
  const phaseDir = phase === 0 ? 1 : -1;
  const x = (radius + separation * phaseDir) * Math.cos(angle);
  const z = (radius + separation * phaseDir) * Math.sin(angle);
  const y = t * spacing * BASE_PAIR_COUNT;
  return new THREE.Vector3(x, y, z);
}

function buildDNA() {
  // Clear previous
  while (dnaGroup.children.length > 0) {
    const child = dnaGroup.children[0];
    dnaGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material && child.material !== backboneMat1 && child.material !== backboneMat2 && child.material !== highlightMat) {
      child.material.dispose();
    }
  }
  basePairObjects = [];
  baseSphereObjects = [];
  backboneNodeSpheres1 = [];
  backboneNodeSpheres2 = [];

  const totalHeight = spacing * BASE_PAIR_COUNT;
  const curvePoints1 = [];
  const curvePoints2 = [];
  const segments = 200;

  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    curvePoints1.push(getHelixPoint(t, 0, unwindProgress, helixRadius));
    curvePoints2.push(getHelixPoint(t, Math.PI, unwindProgress, helixRadius));
  }

  const curve1 = new THREE.CatmullRomCurve3(curvePoints1);
  const curve2 = new THREE.CatmullRomCurve3(curvePoints2);

  const tubeGeo1 = new THREE.TubeGeometry(curve1, segments, 0.15, 8, false);
  const tubeGeo2 = new THREE.TubeGeometry(curve2, segments, 0.15, 8, false);

  backboneMesh1 = new THREE.Mesh(tubeGeo1, backboneMat1);
  backboneMesh2 = new THREE.Mesh(tubeGeo2, backboneMat2);
  dnaGroup.add(backboneMesh1);
  dnaGroup.add(backboneMesh2);

  // Base pairs
  const sphereGeo = new THREE.SphereGeometry(0.25, 16, 12);
  const cylinderGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 8);

  for (let i = 0; i < BASE_PAIR_COUNT; i++) {
    const t = (i + 0.5) / BASE_PAIR_COUNT;
    const p1 = getHelixPoint(t, 0, unwindProgress, helixRadius);
    const p2 = getHelixPoint(t, Math.PI, unwindProgress, helixRadius);

    const base1 = SEQUENCE[i];
    const base2 = COMPLEMENT[base1];

    const color1 = BASE_COLORS[base1].clone();
    const color2 = BASE_COLORS[base2].clone();

    // Spheres at backbone connection points
    const sphereMat1 = new THREE.MeshPhysicalMaterial({
      color: color1,
      emissive: color1.clone().multiplyScalar(0.3),
      metalness: 0.4,
      roughness: 0.3,
      clearcoat: 0.8
    });
    const sphereMat2 = new THREE.MeshPhysicalMaterial({
      color: color2,
      emissive: color2.clone().multiplyScalar(0.3),
      metalness: 0.4,
      roughness: 0.3,
      clearcoat: 0.8
    });

    const sphere1 = new THREE.Mesh(sphereGeo, sphereMat1);
    sphere1.position.copy(p1);
    sphere1.userData = { baseIndex: i, type: 'base' };
    dnaGroup.add(sphere1);

    const sphere2 = new THREE.Mesh(sphereGeo, sphereMat2);
    sphere2.position.copy(p2);
    sphere2.userData = { baseIndex: i, type: 'base' };
    dnaGroup.add(sphere2);

    baseSphereObjects.push(sphere1, sphere2);

    // Connecting cylinder (base pair bond)
    const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
    const dir = new THREE.Vector3().subVectors(p2, p1);
    const length = dir.length();

    // Create segmented bond (hydrogen bond visualization)
    const bondSegments = 3;
    const segLength = length / (bondSegments * 2 - 1);
    const bondGroup = new THREE.Group();
    bondGroup.userData = { baseIndex: i, type: 'bond' };

    for (let s = 0; s < bondSegments; s++) {
      const frac = (s * 2 + 0.5) / (bondSegments * 2 - 1);
      const segPos = new THREE.Vector3().lerpVectors(p1, p2, frac);

      const bondColor = new THREE.Color().lerpColors(color1, color2, frac);
      const segMat = new THREE.MeshPhysicalMaterial({
        color: bondColor,
        emissive: bondColor.clone().multiplyScalar(0.15),
        metalness: 0.2,
        roughness: 0.5,
        transparent: true,
        opacity: 0.85
      });

      const segGeo = new THREE.CylinderGeometry(0.06, 0.06, segLength * 0.8, 6);
      const segMesh = new THREE.Mesh(segGeo, segMat);
      segMesh.position.copy(segPos);

      // Orient cylinder along direction
      const axis = new THREE.Vector3(0, 1, 0);
      const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, dir.clone().normalize());
      segMesh.quaternion.copy(quaternion);

      bondGroup.add(segMesh);
    }

    dnaGroup.add(bondGroup);
    basePairObjects.push({ group: bondGroup, sphere1, sphere2, index: i, mat1: sphereMat1, mat2: sphereMat2 });
  }

  // Backbone node spheres (small spheres along backbone at base pair positions)
  const smallSphereGeo = new THREE.SphereGeometry(0.18, 10, 8);
  for (let i = 0; i < BASE_PAIR_COUNT; i++) {
    const t = (i + 0.5) / BASE_PAIR_COUNT;
    const p1 = getHelixPoint(t, 0, unwindProgress, helixRadius);
    const p2 = getHelixPoint(t, Math.PI, unwindProgress, helixRadius);

    const ns1 = new THREE.Mesh(smallSphereGeo, backboneMat1.clone());
    ns1.position.copy(p1);
    ns1.userData = { baseIndex: i, type: 'base' };
    dnaGroup.add(ns1);
    backboneNodeSpheres1.push(ns1);

    const ns2 = new THREE.Mesh(smallSphereGeo, backboneMat2.clone());
    ns2.position.copy(p2);
    ns2.userData = { baseIndex: i, type: 'base' };
    dnaGroup.add(ns2);
    backboneNodeSpheres2.push(ns2);
  }

  // Center the DNA
  const centerY = spacing * BASE_PAIR_COUNT / 2;
  dnaGroup.position.y = -centerY;

  // Add particles around DNA
  addParticles(centerY);
}

let particleSystem = null;

function addParticles(centerY) {
  if (particleSystem) {
    scene.remove(particleSystem);
    particleSystem.geometry.dispose();
    particleSystem.material.dispose();
  }

  const particleCount = 500;
  const positions = new Float32Array(particleCount * 3);
  const colors = new Float32Array(particleCount * 3);

  for (let i = 0; i < particleCount; i++) {
    const r = 8 + Math.random() * 15;
    const theta = Math.random() * Math.PI * 2;
    const y = (Math.random() - 0.5) * spacing * BASE_PAIR_COUNT * 1.5;

    positions[i * 3] = r * Math.cos(theta);
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = r * Math.sin(theta);

    const c = new THREE.Color().setHSL(0.6 + Math.random() * 0.15, 0.5, 0.4 + Math.random() * 0.3);
    colors[i * 3] = c.r;
    colors[i * 3 + 1] = c.g;
    colors[i * 3 + 2] = c.b;
  }

  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  pGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const pMat = new THREE.PointsMaterial({
    size: 0.08,
    vertexColors: true,
    transparent: true,
    opacity: 0.6,
    sizeAttenuation: true
  });

  particleSystem = new THREE.Points(pGeo, pMat);
  particleSystem.position.y = -centerY;
  scene.add(particleSystem);
}

buildDNA();

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Collect all clickable objects
  const clickables = [];
  basePairObjects.forEach(bp => {
    clickables.push(bp.sphere1, bp.sphere2);
    bp.group.children.forEach(c => clickables.push(c));
  });
  backboneNodeSpheres1.forEach(s => clickables.push(s));
  backboneNodeSpheres2.forEach(s => clickables.push(s));

  const intersects = raycaster.intersectObjects(clickables, true);

  if (intersects.length > 0) {
    let obj = intersects[0].object;
    let baseIndex = null;

    // Walk up to find userData
    while (obj) {
      if (obj.userData && obj.userData.baseIndex !== undefined) {
        baseIndex = obj.userData.baseIndex;
        break;
      }
      obj = obj.parent;
    }

    if (baseIndex !== null && baseIndex >= 0 && baseIndex < BASE_PAIR_COUNT) {
      selectBase(baseIndex);
      return;
    }
  }

  // Clicked nothing - deselect
  deselectBase();
}

function selectBase(index) {
  // Restore previous selection
  deselectBase();

  selectedBase = index;

  const bp = basePairObjects[index];
  if (bp) {
    bp.sphere1.scale.setScalar(1.5);
    bp.sphere2.scale.setScalar(1.5);

    // Glow effect
    bp.sphere1.material.emissiveIntensity = 1.0;
    bp.sphere2.material.emissiveIntensity = 1.0;
  }

  // Show info
  const base1 = SEQUENCE[index];
  const base2 = COMPLEMENT[base1];
  const infoEl = document.getElementById('baseInfo');
  const labelEl = document.getElementById('pairLabel');
  const indexEl = document.getElementById('pairIndex');

  labelEl.innerHTML = `<span style="color:${BASE_COLORS[base1].getStyle()}">${base1}</span> — <span style="color:${BASE_COLORS[base2].getStyle()}">${base2}</span>`;
  indexEl.textContent = `Base Pair #${index} | ${BASE_NAMES[base1]} — ${BASE_NAMES[base2]}`;
  infoEl.classList.add('visible');

  window.__3D_STATE__.selectedBase = index;
}

function deselectBase() {
  if (selectedBase !== null) {
    const bp = basePairObjects[selectedBase];
    if (bp) {
      bp.sphere1.scale.setScalar(1.0);
      bp.sphere2.scale.setScalar(1.0);
      bp.sphere1.material.emissiveIntensity = 0.3;
      bp.sphere2.material.emissiveIntensity = 0.3;
    }
  }
  selectedBase = null;
  document.getElementById('baseInfo').classList.remove('visible');
  window.__3D_STATE__.selectedBase = null;
}

renderer.domElement.addEventListener('click', onMouseClick);

// Controls
const rotSpeedSlider = document.getElementById('rotSpeed');
const spacingSlider = document.getElementById('spacing');
const unwindBtn = document.getElementById('unwindBtn');

rotSpeedSlider.addEventListener('input', (e) => {
  rotSpeed = parseFloat(e.target.value);
  document.getElementById('rotSpeedVal').textContent = rotSpeed.toFixed(2);
  window.__3D_STATE__.rotSpeed = rotSpeed;
});

spacingSlider.addEventListener('input', (e) => {
  spacing = parseFloat(e.target.value);
  document.getElementById('spacingVal').textContent = spacing.toFixed(2);
  window.__3D_STATE__.spacing = spacing;
  buildDNA();
  if (selectedBase !== null) selectBase(selectedBase);
});

unwindBtn.addEventListener('click', () => {
  isUnwinding = !isUnwinding;
  unwindBtn.textContent = isUnwinding ? '🔒 Rewind DNA' : '🔓 Unwind DNA';
  unwindBtn.classList.toggle('active', isUnwinding);
  window.__3D_STATE__.isUnwinding = isUnwinding;
});

// Sequence display
const seqDisplay = document.getElementById('seqDisplay');
let seqHTML = '';
for (let i = 0; i < BASE_PAIR_COUNT; i++) {
  const b = SEQUENCE[i];
  seqHTML += `<span style="color:${BASE_COLORS[b].getStyle()}">${b}</span>`;
}
seqDisplay.innerHTML = `5' ${seqHTML} 3'`;

// Animation
const clock = new THREE.Clock();
let needsRebuild = false;
let lastUnwindProgress = 0;

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Unwind animation
  const targetUnwind = isUnwinding ? 1.0 : 0.0;
  const prevProgress = unwindProgress;
  unwindProgress += (targetUnwind - unwindProgress) * delta * 2.0;
  unwindProgress = THREE.MathUtils.clamp(unwindProgress, 0, 1);

  if (Math.abs(unwindProgress - prevProgress) > 0.001) {
    needsRebuild = true;
  }

  if (needsRebuild) {
    buildDNA();
    if (selectedBase !== null) selectBase(selectedBase);
    needsRebuild = false;
  }

  // Rotation
  dnaGroup.rotation.y += rotSpeed * delta;
  if (particleSystem) {
    particleSystem.rotation.y += rotSpeed * delta * 0.3;
  }

  // Pulsing glow on selected base
  if (selectedBase !== null) {
    const bp = basePairObjects[selectedBase];
    if (bp) {
      const pulse = 1.2 + Math.sin(elapsed * 4) * 0.3;
      bp.sphere1.scale.setScalar(pulse);
      bp.sphere2.scale.setScalar(pulse);
    }
  }

  // Subtle backbone animation
  basePairObjects.forEach((bp, i) => {
    const breathe = 1.0 + Math.sin(elapsed * 2 + i * 0.3) * 0.02;
    if (i !== selectedBase) {
      bp.sphere1.scale.setScalar(breathe);
      bp.sphere2.scale.setScalar(breathe);
    }
  });

  controls.update();

  // Update state
  window.__3D_STATE__.rotSpeed = rotSpeed;
  window.__3D_STATE__.spacing = spacing;
  window.__3D_STATE__.selectedBase = selectedBase;
  window.__3D_STATE__.isUnwinding = isUnwinding;
  window.__3D_STATE__.helixRadius = helixRadius;
  window.__3D_STATE__.basePairCount = BASE_PAIR_COUNT;
  window.__3D_STATE__.sequence = SEQUENCE.substring(0, 20);

  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
