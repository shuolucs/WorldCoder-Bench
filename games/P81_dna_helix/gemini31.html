<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js DNA Double Helix</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 15, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        .control-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 250px;
        }
        label {
            font-size: 14px;
            color: #aaa;
        }
        input[type="range"] {
            width: 140px;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #2a4b8d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 15px;
        }
        button:hover {
            background: #3a60b5;
        }
        #baseInfo {
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .highlight-text {
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="control-group">
            <label for="rotSpeed">Rotation Speed</label>
            <input type="range" id="rotSpeed" min="0" max="0.05" step="0.001" value="0.01">
        </div>
        <div class="control-group">
            <label for="spacing">Base Spacing</label>
            <input type="range" id="spacing" min="0.5" max="2.5" step="0.05" value="1.2">
        </div>
        <button id="unwindBtn">Toggle Unwind</button>
        <div id="baseInfo">Click a base pair</div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            basePairCount: 20,
            sequence: "ATCGATCGAATCGATCGATC",
            rotSpeed: 0.01,
            spacing: 1.2,
            selectedBase: null,
            isUnwinding: false,
            helixRadius: 2.5
        };

        const state = window.__3D_STATE__;
        let unwindProgress = 0;
        let lastSpacing = state.spacing;
        let lastUnwindProgress = unwindProgress;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 35);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight1.position.set(10, 20, 10);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0x88aaff, 1.0);
        dirLight2.position.set(-10, -20, -10);
        scene.add(dirLight2);

        // --- DNA Materials & Data ---
        const colors = {
            'A': 0xff3333, // Red
            'T': 0x33ff33, // Green
            'C': 0x3333ff, // Blue
            'G': 0xffff33  // Yellow
        };
        const pairs = { 'A': 'T', 'T': 'A', 'C': 'G', 'G': 'C' };

        const matBackbone = new THREE.MeshStandardMaterial({ 
            color: 0xdddddd, 
            roughness: 0.3, 
            metalness: 0.2 
        });

        const matBases = {
            'A': new THREE.MeshStandardMaterial({ color: colors['A'], roughness: 0.4 }),
            'T': new THREE.MeshStandardMaterial({ color: colors['T'], roughness: 0.4 }),
            'C': new THREE.MeshStandardMaterial({ color: colors['C'], roughness: 0.4 }),
            'G': new THREE.MeshStandardMaterial({ color: colors['G'], roughness: 0.4 })
        };

        // --- DNA Construction ---
        const dnaGroup = new THREE.Group();
        scene.add(dnaGroup);

        const backbone1 = new THREE.Mesh(new THREE.BufferGeometry(), matBackbone);
        const backbone2 = new THREE.Mesh(new THREE.BufferGeometry(), matBackbone);
        dnaGroup.add(backbone1);
        dnaGroup.add(backbone2);

        const basePairsData = [];
        const interactableMeshes = [];
        const cylinderGeo = new THREE.CylinderGeometry(0.25, 0.25, 1, 16);
        cylinderGeo.translate(0, 0.5, 0); // Pivot at base

        for (let i = 0; i < state.basePairCount; i++) {
            const typeL = state.sequence[i];
            const typeR = pairs[typeL];

            const leftMesh = new THREE.Mesh(cylinderGeo, matBases[typeL].clone());
            const rightMesh = new THREE.Mesh(cylinderGeo, matBases[typeR].clone());

            leftMesh.userData = { index: i, type: typeL, isLeft: true };
            rightMesh.userData = { index: i, type: typeR, isLeft: false };

            dnaGroup.add(leftMesh);
            dnaGroup.add(rightMesh);
            interactableMeshes.push(leftMesh, rightMesh);

            basePairsData.push({ leftMesh, rightMesh, index: i });
        }

        function updateDNA() {
            const points1 = [];
            const points2 = [];
            const angleStep = (Math.PI * 2) / 10; // 10 base pairs per full turn
            const startY = - (state.basePairCount - 1) * state.spacing / 2;

            for (let i = 0; i < state.basePairCount; i++) {
                // Unwind logic: reduce twist, increase separation
                const twist = angleStep * i * (1 - unwindProgress);
                const separation = unwindProgress * 3.0; 

                const y = startY + i * state.spacing;

                const x1 = Math.cos(twist) * state.helixRadius - separation;
                const z1 = Math.sin(twist) * state.helixRadius;
                const p1 = new THREE.Vector3(x1, y, z1);
                points1.push(p1);

                const x2 = Math.cos(twist + Math.PI) * state.helixRadius + separation;
                const z2 = Math.sin(twist + Math.PI) * state.helixRadius;
                const p2 = new THREE.Vector3(x2, y, z2);
                points2.push(p2);

                // Update base pairs
                const bp = basePairsData[i];
                const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);

                // Left half
                const distL = p1.distanceTo(mid);
                bp.leftMesh.position.copy(p1);
                bp.leftMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), mid.clone().sub(p1).normalize());
                bp.leftMesh.scale.set(1, distL, 1);

                // Right half
                const distR = p2.distanceTo(mid);
                bp.rightMesh.position.copy(p2);
                bp.rightMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), mid.clone().sub(p2).normalize());
                bp.rightMesh.scale.set(1, distR, 1);
            }

            // Update backbones
            if (backbone1.geometry) backbone1.geometry.dispose();
            if (backbone2.geometry) backbone2.geometry.dispose();

            const curve1 = new THREE.CatmullRomCurve3(points1);
            const curve2 = new THREE.CatmullRomCurve3(points2);

            backbone1.geometry = new THREE.TubeGeometry(curve1, 100, 0.4, 12, false);
            backbone2.geometry = new THREE.TubeGeometry(curve2, 100, 0.4, 12, false);
        }

        // Initial build
        updateDNA();

        // --- Interaction ---
        const rotSpeedSlider = document.getElementById('rotSpeed');
        const spacingSlider = document.getElementById('spacing');
        const unwindBtn = document.getElementById('unwindBtn');
        const baseInfoDiv = document.getElementById('baseInfo');

        rotSpeedSlider.addEventListener('input', (e) => {
            state.rotSpeed = parseFloat(e.target.value);
        });

        spacingSlider.addEventListener('input', (e) => {
            state.spacing = parseFloat(e.target.value);
        });

        unwindBtn.addEventListener('click', () => {
            state.isUnwinding = !state.isUnwinding;
            unwindBtn.innerText = state.isUnwinding ? "Rewind DNA" : "Toggle Unwind";
            unwindBtn.style.background = state.isUnwinding ? "#8d2a2a" : "#2a4b8d";
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('#ui-container')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableMeshes);

            if (intersects.length > 0) {
                selectBase(intersects[0].object.userData.index);
            } else {
                selectBase(null);
            }
        });

        function selectBase(index) {
            state.selectedBase = index;
            
            interactableMeshes.forEach(mesh => {
                if (mesh.userData.index === index) {
                    mesh.material.emissive.setHex(0x555555);
                } else {
                    mesh.material.emissive.setHex(0x000000);
                }
            });

            if (index !== null) {
                const typeL = state.sequence[index];
                const typeR = pairs[typeL];
                baseInfoDiv.innerHTML = `Index: <span class="highlight-text">${index}</span> | Pair: <span class="highlight-text">${typeL} - ${typeR}</span>`;
            } else {
                baseInfoDiv.innerHTML = "Click a base pair";
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Handle Unwind Animation
            const targetUnwind = state.isUnwinding ? 1 : 0;
            unwindProgress += (targetUnwind - unwindProgress) * 0.05;

            // Rebuild geometry only if parameters changed
            if (Math.abs(state.spacing - lastSpacing) > 0.001 || Math.abs(unwindProgress - lastUnwindProgress) > 0.001) {
                updateDNA();
                lastSpacing = state.spacing;
                lastUnwindProgress = unwindProgress;
            }

            // Rotation
            dnaGroup.rotation.y += state.rotSpeed;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
