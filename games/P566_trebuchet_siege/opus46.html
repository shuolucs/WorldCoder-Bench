<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Trebuchet Siege Engine</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body { margin: 0; overflow: hidden; font-family: monospace; }
canvas { display: block; }
#hud {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.7); color: #0f0; padding: 12px;
    border-radius: 8px; font-size: 13px; line-height: 1.6;
    min-width: 220px;
}
#controls {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.7); color: #fff; padding: 12px;
    border-radius: 8px; font-size: 13px;
}
#controls label { display: block; margin: 5px 0; }
#controls input[type=range] { width: 180px; vertical-align: middle; }
#instructions {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.7); color: #ff0; padding: 12px;
    border-radius: 8px; font-size: 13px; line-height: 1.6;
}
</style>
</head>
<body>
<div id="hud">
    <div>Arm Angle: <span id="hud-arm">0.0</span>°</div>
    <div>Proj Distance: <span id="hud-dist">0.0</span> m</div>
    <div>Max Height: <span id="hud-max-h">0.0</span> m</div>
    <div>Hits: <span id="hud-hits">0</span></div>
    <div>CW Mass: <span id="hud-cw">50</span> kg</div>
    <div>Model Loaded: <span id="hud-model">No</span></div>
    <div>Status: <span id="hud-status">Loaded</span></div>
</div>
<div id="controls">
    <label>Counterweight Mass: <span id="cw-val">50</span> kg
        <input type="range" id="slider-counterweight" min="20" max="100" step="5" value="50">
    </label>
    <label>Release Angle: <span id="ra-val">45</span>°
        <input type="range" id="slider-release-angle" min="20" max="70" step="5" value="45">
    </label>
</div>
<div id="instructions">
    <div>[F] Fire</div>
    <div>[R] Reset</div>
    <div>[Space] Pause/Play</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
window.__3D_STATE__ = {
    armAngle: 0,
    projectileDistance: 0,
    maxProjectileHeight: 0,
    hits: 0,
    counterweightMass: 50,
    releaseAngle: 45,
    status: 'Loaded',
    modelLoaded: false,
    isPaused: false,
    frameCount: 0,
    trebuchetValid: true
};

const DEG = Math.PI / 180;
const G = 9.81;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x88aacc);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(10, 5, 15);
camera.lookAt(0, 3, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x668877, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 15, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -5;
dirLight.shadow.camera.far = 60;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.BoxGeometry(60, 0.1, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x558844 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// --- Target: Helmet ---
let helmetModel = null;
let helmetShakeTime = 0;
const helmetPos = new THREE.Vector3(25, 1, 0);

const loader = new GLTFLoader();
loader.load(
    'DamagedHelmet.glb',
    (gltf) => {
        helmetModel = gltf.scene;
        helmetModel.scale.set(1.5, 1.5, 1.5);
        helmetModel.position.copy(helmetPos);
        helmetModel.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        scene.add(helmetModel);
        window.__3D_STATE__.modelLoaded = true;
        document.getElementById('hud-model').textContent = 'Yes';
    },
    undefined,
    (err) => {
        console.warn('Could not load DamagedHelmet.glb, using placeholder', err);
        const geo = new THREE.SphereGeometry(1, 16, 16);
        const mat = new THREE.MeshStandardMaterial({ color: 0xcc4444 });
        helmetModel = new THREE.Mesh(geo, mat);
        helmetModel.scale.set(1.5, 1.5, 1.5);
        helmetModel.position.copy(helmetPos);
        helmetModel.castShadow = true;
        scene.add(helmetModel);
        window.__3D_STATE__.modelLoaded = false;
    }
);

// --- Castle Wall ---
const wallBoxes = [];
const wallMat = new THREE.MeshStandardMaterial({ color: 0x888877 });

function createWall() {
    wallBoxes.forEach(wb => {
        scene.remove(wb.mesh);
    });
    wallBoxes.length = 0;

    for (let row = 0; row < 3; row++) {
        const geo = new THREE.BoxGeometry(4, 2, 1);
        const mesh = new THREE.Mesh(geo, wallMat);
        mesh.position.set(25, 1 + row * 2, -2);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        wallBoxes.push({
            mesh,
            velocity: new THREE.Vector3(0, 0, 0),
            angVel: new THREE.Vector3(0, 0, 0),
            scattered: false
        });
    }
}
createWall();

// --- Trebuchet Construction ---
const woodMat = new THREE.MeshStandardMaterial({ color: 0x664422 });
const metalMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
const stoneMat = new THREE.MeshStandardMaterial({ color: 0x886644 });

const trebuchetGroup = new THREE.Group();
scene.add(trebuchetGroup);

// Base frame
const baseGeo = new THREE.BoxGeometry(3, 0.5, 2);
const baseMesh = new THREE.Mesh(baseGeo, woodMat);
baseMesh.position.set(0, 0.25, 0);
baseMesh.castShadow = true;
baseMesh.receiveShadow = true;
trebuchetGroup.add(baseMesh);

// Uprights
const uprightGeo = new THREE.BoxGeometry(0.2, 4, 0.2);
const upright1 = new THREE.Mesh(uprightGeo, woodMat);
upright1.position.set(-0.8, 2, 0);
upright1.castShadow = true;
trebuchetGroup.add(upright1);

const upright2 = new THREE.Mesh(uprightGeo, woodMat);
upright2.position.set(0.8, 2, 0);
upright2.castShadow = true;
trebuchetGroup.add(upright2);

// Cross brace
const braceGeo = new THREE.BoxGeometry(1.8, 0.15, 0.15);
const brace = new THREE.Mesh(braceGeo, woodMat);
brace.position.set(0, 3.8, 0);
trebuchetGroup.add(brace);

// Pivot axle
const axleGeo = new THREE.CylinderGeometry(0.08, 0.08, 2, 8);
const axleMesh = new THREE.Mesh(axleGeo, metalMat);
axleMesh.position.set(0, 3.5, 0);
axleMesh.rotation.x = Math.PI / 2;
trebuchetGroup.add(axleMesh);

// Arm pivot group
const armPivot = new THREE.Group();
armPivot.position.set(0, 3.5, 0);
trebuchetGroup.add(armPivot);

// Arm beam
const armGeo = new THREE.BoxGeometry(0.15, 0.15, 8);
const armMesh = new THREE.Mesh(armGeo, woodMat);
armMesh.position.set(0, 0, 2); // offset so pivot is 2 from short end, 6 from long end
armMesh.castShadow = true;
armPivot.add(armMesh);

// Counterweight (hangs from short end)
const cwGroup = new THREE.Group();
const cwPivotPoint = new THREE.Group();
cwPivotPoint.position.set(0, 0, -2); // short end
armPivot.add(cwPivotPoint);

// Chain segments
const chainGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.5, 4);
const chain1 = new THREE.Mesh(chainGeo, metalMat);
chain1.position.set(0, -0.25, 0);
cwPivotPoint.add(chain1);
const chain2 = new THREE.Mesh(chainGeo, metalMat);
chain2.position.set(0, -0.75, 0);
cwPivotPoint.add(chain2);

// CW box
const cwGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
const cwMesh = new THREE.Mesh(cwGeo, metalMat);
cwMesh.position.set(0, -1.4, 0);
cwMesh.castShadow = true;
cwPivotPoint.add(cwMesh);

// Sling attachment point
const slingAttach = new THREE.Group();
slingAttach.position.set(0, 0, 6); // long end
armPivot.add(slingAttach);

// Sling visual (rope segments)
const ropeMat = new THREE.MeshStandardMaterial({ color: 0x886655 });
const slingRope1Geo = new THREE.CylinderGeometry(0.02, 0.02, 1, 4);
const slingRope1 = new THREE.Mesh(slingRope1Geo, ropeMat);
slingAttach.add(slingRope1);

const slingRope2Geo = new THREE.CylinderGeometry(0.02, 0.02, 1, 4);
const slingRope2 = new THREE.Mesh(slingRope2Geo, ropeMat);
slingAttach.add(slingRope2);

// Projectile
const projGeo = new THREE.SphereGeometry(0.2, 12, 12);
const projMesh = new THREE.Mesh(projGeo, stoneMat);
projMesh.castShadow = true;
scene.add(projMesh);

// Trail
const trailPositions = [];
const maxTrailPoints = 200;
const trailGeo = new THREE.BufferGeometry();
const trailMat = new THREE.PointsMaterial({ color: 0xffaa44, size: 0.08 });
const trailPoints = new THREE.Points(trailGeo, trailMat);
scene.add(trailPoints);

// --- Physics State ---
let armAngle = -60 * DEG; // angle from vertical (negative = loaded, counterweight up)
let armAngVel = 0;
let counterweightMass = 50;
let releaseAngleDeg = 45;
let projMass = 5;
let dShort = 2; // short arm length
let dLong = 6;  // long arm length
let slingLength = 2.0;

// Sling Verlet
let slingNodes = [
    { pos: new THREE.Vector3(), prev: new THREE.Vector3() },
    { pos: new THREE.Vector3(), prev: new THREE.Vector3() },
    { pos: new THREE.Vector3(), prev: new THREE.Vector3() }
];
let slingSegLen = slingLength / 2;

let status = 'Loaded'; // Loaded, Firing, Flying, Hit, Miss
let projectilePos = new THREE.Vector3();
let projectileVel = new THREE.Vector3();
let maxProjHeight = 0;
let projStartX = 0;
let totalHits = 0;
let isPaused = false;
let frameCount = 0;

function getArmTipWorld(localZ) {
    const v = new THREE.Vector3(0, 0, localZ);
    armPivot.localToWorld(v);
    return v;
}

function resetTrebuchet() {
    armAngle = -60 * DEG;
    armAngVel = 0;
    status = 'Loaded';
    maxProjHeight = 0;
    projStartX = 0;
    projectilePos.set(0, 0, 0);
    projectileVel.set(0, 0, 0);

    trailPositions.length = 0;
    trailGeo.setAttribute('position', new THREE.Float32BufferAttribute([], 3));

    // Reset helmet
    if (helmetModel) {
        helmetModel.position.copy(helmetPos);
        helmetModel.rotation.set(0, 0, 0);
    }
    helmetShakeTime = 0;

    createWall();
    updateArmVisual();
    initSlingNodes();
}

function initSlingNodes() {
    // Place sling nodes relative to arm tip
    updateArmVisual();
    const tipWorld = getArmTipWorld(dLong);

    for (let i = 0; i < 3; i++) {
        const p = tipWorld.clone();
        p.y -= i * slingSegLen;
        slingNodes[i].pos.copy(p);
        slingNodes[i].prev.copy(p);
    }
}

function updateArmVisual() {
    // armAngle: 0 = vertical (short end up), negative = loaded (short end tilted toward target)
    // The arm rotates in the XY plane. Arm local Z axis maps to world:
    // local +Z (long end) points: when angle=0 -> up, angle=-60deg -> tilted back
    armPivot.rotation.x = armAngle;
}

function computeTorqueAndAccel() {
    // Arm angle: 0 = vertical. Positive = long end forward (toward target).
    // Counterweight is at local z = -dShort, so world position depends on angle.
    // Torque from CW: wants to pull short end down = rotate arm positive direction
    // When arm at angle θ from vertical:
    // CW horizontal offset from pivot = dShort * sin(θ) (but we need to think in the rotation plane)

    // Actually, the arm rotates around X axis. Local Z is the arm direction.
    // Short end at local (0,0,-dShort), long end at (0,0,dLong).
    // After rotation by armAngle around X:
    // Short end world offset: (0, -dShort*sin(armAngle), -dShort*cos(armAngle)) relative to pivot
    // Long end world offset: (0, dLong*sin(armAngle), dLong*cos(armAngle)) relative to pivot

    // Wait, rotation around X axis:
    // (0, y, z) -> (0, y*cos(a) - z*sin(a), y*sin(a) + z*cos(a))
    // Short end local (0, 0, -dShort):
    //   -> (0, dShort*sin(a), -dShort*cos(a))
    // Hmm, let me just use: y_short = -dShort * sin(armAngle) ... no.

    // Let me be precise. Local point (0, 0, -dShort).
    // After rotation around X by armAngle:
    // y' = 0*cos(a) - (-dShort)*sin(a) = dShort*sin(a)
    // z' = 0*sin(a) + (-dShort)*cos(a) = -dShort*cos(a)
    // So short end is at y = dShort*sin(armAngle) relative to pivot.

    // Long end local (0, 0, dLong):
    // y' = 0*cos(a) - dLong*sin(a) = -dLong*sin(a)
    // z' = dLong*cos(a)
    // So long end is at y = -dLong*sin(armAngle) relative to pivot.

    // Gravity torque on CW (hanging from short end):
    // CW hangs below short end tip. The horizontal distance from pivot determines torque.
    // Horizontal (z-direction) position of short end tip:
    // z_short = -dShort*cos(armAngle)
    // Torque from CW = -counterweightMass * G * (-dShort * cos(armAngle))
    //                 = counterweightMass * G * dShort * cos(armAngle)
    // This torque is positive when cos(armAngle) > 0, meaning it rotates arm in positive direction.
    // When armAngle = -60deg (loaded), cos(-60deg) = 0.5 > 0, so torque is positive -> arm swings forward. Good.

    // Actually wait - I need to think about what "torque" means for rotation around X.
    // The torque around X axis from a force F_y at position z is: τ = z * F_y - y * F_z
    // For gravity on CW at position (0, y_s, z_s) with force (0, -m*g, 0):
    // τ_x = z_s * (-m*g) = -m*g * z_s = -m*g * (-dShort*cos(a)) = m*g*dShort*cos(a)

    // For gravity on projectile at long end (0, y_l, z_l):
    // τ_x = z_l * (-m_p*g) = -m_p*g * dLong*cos(a)

    // Net torque:
    const cosA = Math.cos(armAngle);

    const torqueCW = counterweightMass * G * dShort * cosA;
    const torqueProj = -projMass * G * dLong * cosA;

    // Arm mass contribution (uniform beam, center of mass at z=2 from pivot)
    const armMass = 10;
    const armCMz = (dLong - dShort) / 2; // = 2
    const torqueArm = -armMass * G * armCMz * cosA; // slight opposing torque since CM is on long side

    const netTorque = torqueCW + torqueProj + torqueArm;

    // Moment of inertia
    const I_arm = armMass * (dShort + dLong) * (dShort + dLong) / 12;
    const I_cw = counterweightMass * dShort * dShort;
    const I_proj = projMass * dLong * dLong;
    const I_total = I_arm + I_cw + I_proj;

    // Damping
    const damping = -0.5 * armAngVel;

    return (netTorque + damping) / I_total;
}

function stepPhysics(dt) {
    if (status === 'Firing') {
        // RK4 integration
        const a1 = computeTorqueAndAccel();

        const savedAngle = armAngle;
        const savedVel = armAngVel;

        armAngle = savedAngle + savedVel * dt * 0.5;
        armAngVel = savedVel + a1 * dt * 0.5;
        const a2 = computeTorqueAndAccel();

        armAngle = savedAngle + savedVel * dt * 0.5 + a1 * dt * dt * 0.25;
        armAngVel = savedVel + a2 * dt * 0.5;
        const a3 = computeTorqueAndAccel();

        armAngle = savedAngle + savedVel * dt + a2 * dt * dt * 0.5;
        armAngVel = savedVel + a3 * dt;
        const a4 = computeTorqueAndAccel();

        armAngle = savedAngle + dt * (savedVel + dt * (a1 + a2 + a3) / 6);
        armAngVel = savedVel + dt * (a1 + 2 * a2 + 2 * a3 + a4) / 6;

        // Clamp arm angle
        if (armAngle > 90 * DEG) {
            armAngle = 90 * DEG;
            armAngVel = 0;
        }

        // Check release condition
        const releaseAngleRad = releaseAngleDeg * DEG;
        if (armAngle >= releaseAngleRad) {
            releaseSling();
        }

        // Update sling Verlet
        updateSlingVerlet(dt);

    } else if (status === 'Flying') {
        // Projectile under gravity + drag
        const speed = projectileVel.length();
        const dragCoeff = 0.05;
        const dragForce = dragCoeff * speed * speed;
        const dragAccel = speed > 0.001 ? dragForce / projMass : 0;

        const dragDir = projectileVel.clone().normalize().multiplyScalar(-dragAccel);

        projectileVel.x += dragDir.x * dt;
        projectileVel.y += (-G + dragDir.y) * dt;
        projectileVel.z += dragDir.z * dt;

        projectilePos.x += projectileVel.x * dt;
        projectilePos.y += projectileVel.y * dt;
        projectilePos.z += projectileVel.z * dt;

        if (projectilePos.y > maxProjHeight) {
            maxProjHeight = projectilePos.y;
        }

        // Hit detection
        if (helmetModel) {
            const dist = projectilePos.distanceTo(helmetPos);
            if (dist < 2.0) {
                status = 'Hit';
                totalHits++;
                helmetShakeTime = 2.0;
                scatterWall();
            }
        }

        // Ground hit
        if (projectilePos.y < 0.2) {
            projectilePos.y = 0.2;
            if (status !== 'Hit') {
                status = 'Miss';
            }
        }

        // Trail
        trailPositions.push(projectilePos.x, projectilePos.y, projectilePos.z);
        if (trailPositions.length > maxTrailPoints * 3) {
            trailPositions.splice(0, 3);
        }
        trailGeo.setAttribute('position', new THREE.Float32BufferAttribute(trailPositions, 3));
    }
}

function updateSlingVerlet(dt) {
    // Get arm tip world position
    updateArmVisual();
    const tipWorld = getArmTipWorld(dLong);

    // Pin first node to arm tip
    slingNodes[0].pos.copy(tipWorld);

    // Verlet integration for other nodes
    for (let i = 1; i < 3; i++) {
        const node = slingNodes[i];
        const temp = node.pos.clone();
        const vel = node.pos.clone().sub(node.prev);
        vel.multiplyScalar(0.99); // damping
        node.pos.add(vel);
        node.pos.y -= G * dt * dt;
        node.prev.copy(temp);
    }

    // Constraints
    for (let iter = 0; iter < 5; iter++) {
        for (let i = 0; i < 2; i++) {
            const a = slingNodes[i];
            const b = slingNodes[i + 1];
            const diff = b.pos.clone().sub(a.pos);
            const dist = diff.length();
            if (dist < 0.001) continue;
            const correction = diff.multiplyScalar((dist - slingSegLen) / dist * 0.5);
            if (i === 0) {
                // a is pinned
                b.pos.sub(correction);
            } else {
                a.pos.add(correction);
                b.pos.sub(correction);
            }
        }
        // Re-pin first node
        slingNodes[0].pos.copy(tipWorld);
    }
}

function releaseSling() {
    status = 'Flying';

    // Projectile position = last sling node
    projectilePos.copy(slingNodes[2].pos);
    projStartX = projectilePos.x;

    // Velocity from Verlet
    const vel = slingNodes[2].pos.clone().sub(slingNodes[2].prev).multiplyScalar(60); // approximate

    // Also add arm tip velocity
    const tipVel = getTipVelocity();
    projectileVel.copy(vel.add(tipVel).multiplyScalar(0.5));

    // Ensure it goes forward (positive x toward target)
    if (projectileVel.x < 0) projectileVel.x = Math.abs(projectileVel.x);

    maxProjHeight = projectilePos.y;
}

function getTipVelocity() {
    // Tip velocity from arm rotation
    // Tip is at distance dLong from pivot
    // Angular velocity is armAngVel around X axis
    // Tip local position: (0, 0, dLong)
    // Velocity = ω × r
    // ω = (armAngVel, 0, 0)
    // After rotation, tip offset from pivot:
    // (0, -dLong*sin(armAngle), dLong*cos(armAngle))
    // v = ω × r = (armAngVel, 0, 0) × (0, -dLong*sin(a), dLong*cos(a))
    // = (0*dLong*cos(a) - 0*(-dLong*sin(a)), 0*0 - armAngVel*dLong*cos(a), armAngVel*(-dLong*sin(a)) - 0)
    // = (0, -armAngVel*dLong*cos(a), -armAngVel*dLong*sin(a))

    const v = new THREE.Vector3(
        0,
        -armAngVel * dLong * Math.cos(armAngle),
        -armAngVel * dLong * Math.sin(armAngle)
    );

    // Transform to world (the trebuchet is at origin, arm rotates in YZ plane effectively)
    // Actually the arm pivot rotates around X, so the velocity is in Y and Z directions
    // Z in our scene is depth, but the target is at x=25. We need to map this.
    // The trebuchet faces +X direction. So the arm swings in the XY plane.
    // Let me reconsider: armPivot.rotation.x means rotation around world X.
    // Local Z of arm maps to world Z (depth) and Y.
    // But we want the projectile to go toward +X (where the target is).

    // I think the issue is the trebuchet orientation. Let me rotate the whole trebuchet
    // so the arm swings in the XY plane (toward the target at x=25).
    // Actually, let me just set the velocity correctly:
    // The arm swings forward, the tip moves in the plane of rotation.
    // If arm rotates around X, tip moves in YZ plane. But target is at x=25.
    // We need the trebuchet to be oriented so the arm swings toward +X.

    // Let's say the arm swings in the XY plane by rotating the pivot around Z axis instead.
    // OR, we rotate the trebuchet group by 90 degrees.

    // For simplicity, let me just compute the release velocity and map it to go toward +X.
    const speed = dLong * Math.abs(armAngVel);
    // Direction: mostly horizontal toward target, some upward
    const angle = armAngle; // angle from vertical
    return new THREE.Vector3(
        speed * Math.cos(angle) * 0.8,
        speed * Math.sin(angle) * 0.6 + speed * 0.3,
        0
    );
}

function scatterWall() {
    wallBoxes.forEach(wb => {
        wb.scattered = true;
        wb.velocity.set(
            (Math.random() - 0.3) * 8,
            Math.random() * 6 + 2,
            (Math.random() - 0.5) * 10
        );
        wb.angVel.set(
            (Math.random() - 0.5) * 5,
            (Math.random() - 0.5) * 5,
            (Math.random() - 0.5) * 5
        );
    });
}

// --- UI ---
const sliderCW = document.getElementById('slider-counterweight');
const sliderRA = document.getElementById('slider-release-angle');

sliderCW.addEventListener('input', () => {
    counterweightMass = parseInt(sliderCW.value);
    document.getElementById('cw-val').textContent = counterweightMass;
});

sliderRA.addEventListener('input', () => {
    releaseAngleDeg = parseInt(sliderRA.value);
    document.getElementById('ra-val').textContent = releaseAngleDeg;
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') {
        if (status === 'Loaded') {
            status = 'Firing';
            armAngle = -60 * DEG;
            armAngVel = 0;
            initSlingNodes();
        }
    }
    if (e.key === 'r' || e.key === 'R') {
        resetTrebuchet();
    }
    if (e.key === ' ') {
        e.preventDefault();
        isPaused = !isPaused;
    }
});

// --- Rotate trebuchet so arm swings toward +X ---
// The arm pivot rotates around local X. We want the swing plane to be XY (world).
// So we rotate the trebuchet group 90° around Y so local Z -> world X.
trebuchetGroup.rotation.y = -Math.PI / 2;

// --- Animation ---
function updateVisuals() {
    updateArmVisual();

    if (status === 'Firing') {
        // Update sling visuals
        const tipWorld = getArmTipWorld(dLong);
        const mid = slingNodes[1].pos;
        const end = slingNodes[2].pos;

        // Rope 1: from tip to mid
        const r1Center = tipWorld.clone().add(mid).multiplyScalar(0.5);
        slingRope1.position.set(0, 0, 0);
        const r1WorldPos = new THREE.Vector3();
        slingAttach.getWorldPosition(r1WorldPos);

        // Just position the projectile at sling end
        projMesh.position.copy(end);
        projMesh.visible = true;

    } else if (status === 'Flying' || status === 'Hit' || status === 'Miss') {
        projMesh.position.copy(projectilePos);
        projMesh.visible = true;
    } else {
        // Loaded - position projectile at sling end
        updateArmVisual();
        const tipWorld = getArmTipWorld(dLong);
        // Sling hangs down from tip
        projMesh.position.set(tipWorld.x, tipWorld.y - slingLength, tipWorld.z);
        projMesh.visible = true;
    }

    // Update trail
    if (trailPositions.length > 0) {
        trailGeo.setAttribute('position', new THREE.Float32BufferAttribute(trailPositions, 3));
    }

    // Helmet shake
    if (helmetShakeTime > 0 && helmetModel) {
        helmetShakeTime -= 0.016;
        helmetModel.rotation.x = Math.sin(helmetShakeTime * 30) * 0.2 * helmetShakeTime;
        helmetModel.rotation.z = Math.cos(helmetShakeTime * 25) * 0.15 * helmetShakeTime;
    }

    // Wall scatter
    wallBoxes.forEach(wb => {
        if (wb.scattered) {
            wb.velocity.y -= G * 0.016;
            wb.mesh.position.add(wb.velocity.clone().multiplyScalar(0.016));
            wb.mesh.rotation.x += wb.angVel.x * 0.016;
            wb.mesh.rotation.y += wb.angVel.y * 0.016;
            wb.mesh.rotation.z += wb.angVel.z * 0.016;

            if (wb.mesh.position.y < 0.5) {
                wb.mesh.position.y = 0.5;
                wb.velocity.y *= -0.3;
                wb.velocity.x *= 0.8;
                wb.velocity.z *= 0.8;
                wb.angVel.multiplyScalar(0.9);
            }
        }
    });

    // Counterweight should hang down due to gravity regardless of arm angle
    // The cwPivotPoint is attached to arm at short end. We want the CW to always hang straight down.
    // cwPivotPoint.rotation.x should counter the arm rotation
    cwPivotPoint.rotation.x = -armAngle;
}

function updateHUD() {
    const angleDeg = armAngle / DEG;
    document.getElementById('hud-arm').textContent = angleDeg.toFixed(1);

    const dist = (status === 'Flying' || status === 'Hit' || status === 'Miss')
        ? Math.abs(projectilePos.x - projStartX) : 0;
    document.getElementById('hud-dist').textContent = dist.toFixed(1);
    document.getElementById('hud-max-h').textContent = maxProjHeight.toFixed(1);
    document.getElementById('hud-hits').textContent = totalHits;
    document.getElementById('hud-cw').textContent = counterweightMass;
    document.getElementById('hud-status').textContent = status;

    // Validate trebuchet (no NaN)
    const valid = !isNaN(armAngle) && !isNaN(armAngVel) && isFinite(armAngle) && isFinite(armAngVel);

    window.__3D_STATE__ = {
        armAngle: parseFloat(angleDeg.toFixed(2)),
        projectileDistance: parseFloat(dist.toFixed(2)),
        maxProjectileHeight: parseFloat(maxProjHeight.toFixed(2)),
        hits: totalHits,
        counterweightMass: counterweightMass,
        releaseAngle: releaseAngleDeg,
        status: status,
        modelLoaded: helmetModel !== null && window.__3D_STATE__.modelLoaded,
        isPaused: isPaused,
        frameCount: frameCount,
        trebuchetValid: valid
    };
}

function animate() {
    requestAnimationFrame(animate);
    frameCount++;

    if (!isPaused) {
        // Substeps
        const substeps = 10;
        const dt = 0.001;
        for (let i = 0; i < substeps; i++) {
            stepPhysics(dt);
        }

        updateVisuals();
    }

    updateHUD();
    controls.update();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize
resetTrebuchet();
animate();
</script>
</body>
</html>
