<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trebuchet Siege Engine - Three.js</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #88aacc;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.55);
      color: white;
      padding: 12px;
      border-radius: 8px;
      min-width: 260px;
    }
    #ui label {
      display: block;
      margin: 8px 0 4px;
      font-size: 14px;
    }
    #ui input[type=range] {
      width: 100%;
    }
    #hud {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.5;
    }
    #help {
      margin-top: 8px;
      font-size: 12px;
      color: #d8e8ef;
    }
  </style>
</head>
<body>
  <div id="ui">
    <label>
      Counterweight Mass: <span id="cw-value">50</span> kg
      <input id="slider-counterweight" type="range" min="20" max="100" step="5" value="50">
    </label>

    <label>
      Release Angle: <span id="release-value">45</span>°
      <input id="slider-release-angle" type="range" min="20" max="70" step="5" value="45">
    </label>

    <div id="hud">
      <div>Arm angle: <span id="hud-arm">0.0</span>°</div>
      <div>Projectile distance: <span id="hud-dist">0.0</span></div>
      <div>Max height: <span id="hud-max-h">0.0</span></div>
      <div>Hits: <span id="hud-hits">0</span></div>
      <div>CW mass: <span id="hud-cw">50</span></div>
      <div>Model loaded: <span id="hud-model">No</span></div>
    </div>

    <div id="help">
      F = Fire<br>
      R = Reset<br>
      Space = Pause / Play
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x88aacc);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(10, 5, 15);
    camera.lookAt(0, 3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 3, 0);
    controls.update();

    const ambient = new THREE.AmbientLight(0x668877, 0.5);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 15, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 80;
    dirLight.shadow.camera.left = -30;
    dirLight.shadow.camera.right = 30;
    dirLight.shadow.camera.top = 30;
    dirLight.shadow.camera.bottom = -30;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.BoxGeometry(60, 0.2, 40),
      new THREE.MeshStandardMaterial({ color: 0x558844 })
    );
    ground.position.set(0, -0.1, 0);
    ground.receiveShadow = true;
    scene.add(ground);

    const g = 9.81;
    const dt = 0.001;
    const substeps = 10;
    const mProj = 1.0;
    const dShort = 2.0;
    const dLong = 6.0;
    const armMass = 5.0;
    const armLength = 8.0;
    const Iarm = (1 / 12) * armMass * armLength * armLength;
    const dragCoeff = 0.05;

    const pivotPos = new THREE.Vector3(0, 3.5, 0);

    const woodMat = new THREE.MeshStandardMaterial({ color: 0x664422 });
    const metalMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
    const stoneMat = new THREE.MeshStandardMaterial({ color: 0x888877 });
    const projMat = new THREE.MeshStandardMaterial({ color: 0x886644 });

    let targetHelmet = null;
    let modelLoaded = false;
    let hitShakeTime = 0;
    let wallBlocks = [];
    let wallVelocities = [];
    let wallAngularVel = [];
    let trailDots = [];
    let trailPositions = [];
    let hits = 0;
    let frameCount = 0;
    let maxProjectileHeight = 0;
    let launchOrigin = new THREE.Vector3();
    let targetCenter = new THREE.Vector3(25, 1, 0);

    const state = {
      counterweightMass: 50,
      releaseAngleDeg: 45,
      isPaused: false,
      status: 'Loaded',
      fired: false,
      released: false,
      hitRegistered: false,
      armAngle: THREE.MathUtils.degToRad(-60),
      armOmega: 0,
      projectilePos: new THREE.Vector3(),
      projectileVel: new THREE.Vector3(),
      freeProjectile: false
    };

    window.__3D_STATE__ = {};

    const ui = {
      cwSlider: document.getElementById('slider-counterweight'),
      releaseSlider: document.getElementById('slider-release-angle'),
      cwValue: document.getElementById('cw-value'),
      releaseValue: document.getElementById('release-value'),
      hudArm: document.getElementById('hud-arm'),
      hudDist: document.getElementById('hud-dist'),
      hudMaxH: document.getElementById('hud-max-h'),
      hudHits: document.getElementById('hud-hits'),
      hudCw: document.getElementById('hud-cw'),
      hudModel: document.getElementById('hud-model')
    };

    ui.cwSlider.addEventListener('input', () => {
      state.counterweightMass = Number(ui.cwSlider.value);
      ui.cwValue.textContent = state.counterweightMass;
    });

    ui.releaseSlider.addEventListener('input', () => {
      state.releaseAngleDeg = Number(ui.releaseSlider.value);
      ui.releaseValue.textContent = state.releaseAngleDeg;
    });

    const trebuchet = new THREE.Group();
    scene.add(trebuchet);

    const base = new THREE.Mesh(
      new THREE.BoxGeometry(3, 0.5, 2),
      woodMat
    );
    base.position.set(0, 0.25, 0);
    base.castShadow = true;
    base.receiveShadow = true;
    trebuchet.add(base);

    const uprightGeom = new THREE.BoxGeometry(0.2, 4, 0.2);
    const leftUpright = new THREE.Mesh(uprightGeom, woodMat);
    leftUpright.position.set(-0.8, 2, 0);
    leftUpright.castShadow = true;
    trebuchet.add(leftUpright);

    const rightUpright = new THREE.Mesh(uprightGeom, woodMat);
    rightUpright.position.set(0.8, 2, 0);
    rightUpright.castShadow = true;
    trebuchet.add(rightUpright);

    const axle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.08, 1.8, 16),
      metalMat
    );
    axle.rotation.z = Math.PI / 2;
    axle.position.copy(pivotPos);
    axle.castShadow = true;
    trebuchet.add(axle);

    const armPivot = new THREE.Group();
    armPivot.position.copy(pivotPos);
    trebuchet.add(armPivot);

    const arm = new THREE.Mesh(
      new THREE.BoxGeometry(0.15, 8, 0.15),
      woodMat
    );
    arm.position.set(0, 2, 0);
    arm.castShadow = true;
    arm.receiveShadow = true;
    armPivot.add(arm);

    const shortMarker = new THREE.Object3D();
    shortMarker.position.set(0, -2, 0);
    armPivot.add(shortMarker);

    const longMarker = new THREE.Object3D();
    longMarker.position.set(0, 6, 0);
    armPivot.add(longMarker);

    const cwAnchor = new THREE.Object3D();
    cwAnchor.position.set(0, -2, 0);
    armPivot.add(cwAnchor);

    const cwChain = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.03, 1.0, 8),
      metalMat
    );
    cwChain.castShadow = true;
    scene.add(cwChain);

    const counterweight = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 0.8, 0.8),
      metalMat
    );
    counterweight.castShadow = true;
    counterweight.receiveShadow = true;
    scene.add(counterweight);

    const slingRoot = new THREE.Object3D();
    slingRoot.position.set(0, 6, 0);
    armPivot.add(slingRoot);

    const slingSeg1 = new THREE.Mesh(
      new THREE.CylinderGeometry(0.025, 0.025, 1.0, 8),
      metalMat
    );
    slingSeg1.castShadow = true;
    scene.add(slingSeg1);

    const slingSeg2 = new THREE.Mesh(
      new THREE.CylinderGeometry(0.025, 0.025, 1.0, 8),
      metalMat
    );
    slingSeg2.castShadow = true;
    scene.add(slingSeg2);

    const projectile = new THREE.Mesh(
      new THREE.SphereGeometry(0.2, 20, 20),
      projMat
    );
    projectile.castShadow = true;
    scene.add(projectile);

    let slingPoints = [
      new THREE.Vector3(),
      new THREE.Vector3(),
      new THREE.Vector3()
    ];
    let slingPrev = [
      new THREE.Vector3(),
      new THREE.Vector3(),
      new THREE.Vector3()
    ];

    function resetSling() {
      const root = getLongTipPosition();
      slingPoints[0].copy(root);
      slingPoints[1].copy(root).add(new THREE.Vector3(0.3, -1.0, 0));
      slingPoints[2].copy(root).add(new THREE.Vector3(0.6, -2.0, 0));
      for (let i = 0; i < 3; i++) slingPrev[i].copy(slingPoints[i]);
      state.projectilePos.copy(slingPoints[2]);
      projectile.position.copy(state.projectilePos);
    }

    function segmentToMesh(a, b, mesh) {
      const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
      const dir = new THREE.Vector3().subVectors(b, a);
      const len = dir.length();
      mesh.position.copy(mid);
      mesh.scale.set(1, len, 1);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
    }

    function getLongTipPosition() {
      return longMarker.getWorldPosition(new THREE.Vector3());
    }

    function getShortTipPosition() {
      return shortMarker.getWorldPosition(new THREE.Vector3());
    }

    function updateCounterweightVisual() {
      const anchor = getShortTipPosition();
      const down = new THREE.Vector3(0, -1, 0);
      const cwPos = anchor.clone().addScaledVector(down, 1.0);
      counterweight.position.copy(cwPos);

      const mid = anchor.clone().lerp(cwPos, 0.5);
      cwChain.position.copy(mid);
      cwChain.scale.set(1, 1.0, 1);
      cwChain.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), cwPos.clone().sub(anchor).normalize());
    }

    function updateSlingAttached() {
      const root = getLongTipPosition();
      slingPoints[0].copy(root);

      for (let i = 1; i < 3; i++) {
        const vel = slingPoints[i].clone().sub(slingPrev[i]);
        slingPrev[i].copy(slingPoints[i]);
        slingPoints[i].add(vel);
        slingPoints[i].y -= g * dt * dt;
      }

      for (let iter = 0; iter < 6; iter++) {
        slingPoints[0].copy(root);

        constrainSegment(0, 1, 1.0);
        constrainSegment(1, 2, 1.0);
      }

      state.projectilePos.copy(slingPoints[2]);
      projectile.position.copy(state.projectilePos);
      segmentToMesh(slingPoints[0], slingPoints[1], slingSeg1);
      segmentToMesh(slingPoints[1], slingPoints[2], slingSeg2);
    }

    function constrainSegment(i, j, length) {
      const delta = new THREE.Vector3().subVectors(slingPoints[j], slingPoints[i]);
      const dist = delta.length();
      if (dist < 1e-8) return;
      const diff = (dist - length) / dist;
      if (i === 0) {
        slingPoints[j].addScaledVector(delta, -diff);
      } else {
        slingPoints[i].addScaledVector(delta, 0.5 * diff);
        slingPoints[j].addScaledVector(delta, -0.5 * diff);
      }
    }

    function armDerivatives(angle, omega) {
      const tauCw = state.counterweightMass * g * dShort * Math.cos(angle);
      const tauProj = mProj * g * dLong * Math.cos(angle);
      const netTau = tauCw - tauProj;
      const Itotal = Iarm + state.counterweightMass * dShort * dShort + mProj * dLong * dLong;
      const alpha = netTau / Itotal;
      return { dAngle: omega, dOmega: alpha };
    }

    function rk4Step(h) {
      const a = state.armAngle;
      const w = state.armOmega;

      const k1 = armDerivatives(a, w);
      const k2 = armDerivatives(a + 0.5 * h * k1.dAngle, w + 0.5 * h * k1.dOmega);
      const k3 = armDerivatives(a + 0.5 * h * k2.dAngle, w + 0.5 * h * k2.dOmega);
      const k4 = armDerivatives(a + h * k3.dAngle, w + h * k3.dOmega);

      state.armAngle += (h / 6) * (k1.dAngle + 2 * k2.dAngle + 2 * k3.dAngle + k4.dAngle);
      state.armOmega += (h / 6) * (k1.dOmega + 2 * k2.dOmega + 2 * k3.dOmega + k4.dOmega);
    }

    function updateArmVisual() {
      armPivot.rotation.z = state.armAngle;
    }

    function releaseProjectile() {
      if (state.released) return;
      state.released = true;
      state.freeProjectile = true;
      state.status = 'Flying';

      const root = getLongTipPosition();
      const tangent = new THREE.Vector3(-Math.cos(state.armAngle), Math.sin(state.armAngle), 0).normalize();
      const armTipVel = tangent.multiplyScalar(state.armOmega * dLong);
      const slingVel = state.projectilePos.clone().sub(slingPrev[2]).divideScalar(dt);
      state.projectileVel.copy(armTipVel.add(slingVel.multiplyScalar(0.6)));
      launchOrigin.copy(state.projectilePos);
    }

    function updateFreeProjectile(h) {
      const v = state.projectileVel.clone();
      const speed = v.length();
      let drag = new THREE.Vector3();
      if (speed > 1e-8) {
        drag.copy(v).normalize().multiplyScalar(-dragCoeff * speed * speed / mProj);
      }
      const acc = new THREE.Vector3(0, -g, 0).add(drag);
      state.projectileVel.addScaledVector(acc, h);
      state.projectilePos.addScaledVector(state.projectileVel, h);
      projectile.position.copy(state.projectilePos);

      if (state.projectilePos.y > maxProjectileHeight) maxProjectileHeight = state.projectilePos.y;

      if (trailPositions.length === 0 || trailPositions[trailPositions.length - 1].distanceToSquared(state.projectilePos) > 0.02) {
        trailPositions.push(state.projectilePos.clone());
        const dot = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 8, 8),
          new THREE.MeshBasicMaterial({ color: 0x222222 })
        );
        dot.position.copy(state.projectilePos);
        scene.add(dot);
        trailDots.push(dot);
        if (trailDots.length > 200) {
          const old = trailDots.shift();
          scene.remove(old);
          trailPositions.shift();
        }
      }

      if (!state.hitRegistered && modelLoaded) {
        const dist = state.projectilePos.distanceTo(targetCenter);
        if (dist < 2.0) {
          registerHit();
        }
      }

      if (!state.hitRegistered && (state.projectilePos.y < 0.15 || state.projectilePos.x > 50 || Math.abs(state.projectilePos.z) > 25)) {
        state.status = 'Miss';
      }
    }

    function registerHit() {
      state.hitRegistered = true;
      state.status = 'Hit';
      hits++;
      hitShakeTime = 0.8;
      for (let i = 0; i < wallBlocks.length; i++) {
        wallVelocities[i].set(
          (Math.random() - 0.5) * 6 + 1.5,
          Math.random() * 6 + 2,
          (Math.random() - 0.5) * 6
        );
        wallAngularVel[i].set(
          (Math.random() - 0.5) * 6,
          (Math.random() - 0.5) * 6,
          (Math.random() - 0.5) * 6
        );
      }
    }

    function createWall() {
      const positions = [1, 3, 5];
      for (let i = 0; i < 3; i++) {
        const block = new THREE.Mesh(
          new THREE.BoxGeometry(4, 2, 1),
          stoneMat
        );
        block.position.set(25, positions[i], -1.2);
        block.castShadow = true;
        block.receiveShadow = true;
        scene.add(block);
        wallBlocks.push(block);
        wallVelocities.push(new THREE.Vector3());
        wallAngularVel.push(new THREE.Vector3());
      }
    }

    function resetWall() {
      const positions = [1, 3, 5];
      for (let i = 0; i < wallBlocks.length; i++) {
        wallBlocks[i].position.set(25, positions[i], -1.2);
        wallBlocks[i].rotation.set(0, 0, 0);
        wallVelocities[i].set(0, 0, 0);
        wallAngularVel[i].set(0, 0, 0);
      }
    }

    function updateWall(h) {
      for (let i = 0; i < wallBlocks.length; i++) {
        const v = wallVelocities[i];
        if (v.lengthSq() > 0.00001 || wallBlocks[i].position.y > 1.0) {
          v.y -= g * h;
          wallBlocks[i].position.addScaledVector(v, h);
          wallBlocks[i].rotation.x += wallAngularVel[i].x * h;
          wallBlocks[i].rotation.y += wallAngularVel[i].y * h;
          wallBlocks[i].rotation.z += wallAngularVel[i].z * h;

          if (wallBlocks[i].position.y < 1.0) {
            wallBlocks[i].position.y = 1.0;
            if (v.y < 0) v.y *= -0.2;
            v.x *= 0.96;
            v.z *= 0.96;
            wallAngularVel[i].multiplyScalar(0.97);
          }
        }
      }
    }

    createWall();

    const loader = new GLTFLoader();
    loader.load(
      'DamagedHelmet.glb',
      (gltf) => {
        targetHelmet = gltf.scene;
        targetHelmet.scale.setScalar(1.5);
        targetHelmet.position.set(25, 1, 0);
        targetHelmet.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(targetHelmet);
        modelLoaded = true;
        targetCenter.set(25, 1, 0);
      },
      undefined,
      () => {
        modelLoaded = false;
      }
    );

    function resetTrail() {
      for (const dot of trailDots) scene.remove(dot);
      trailDots = [];
      trailPositions = [];
    }

    function resetSimulation() {
      state.fired = false;
      state.released = false;
      state.freeProjectile = false;
      state.hitRegistered = false;
      state.status = 'Loaded';
      state.armAngle = THREE.MathUtils.degToRad(-60);
      state.armOmega = 0;
      maxProjectileHeight = 0;
      launchOrigin.set(0, 0, 0);
      resetTrail();
      resetWall();
      updateArmVisual();
      resetSling();
      updateCounterweightVisual();
      projectile.visible = true;
      slingSeg1.visible = true;
      slingSeg2.visible = true;
      if (targetHelmet) {
        targetHelmet.position.set(25, 1, 0);
        targetHelmet.rotation.set(0, 0, 0);
      }
    }

    function fire() {
      if (state.status === 'Loaded' || state.status === 'Miss' || state.status === 'Hit') {
        resetSimulation();
        state.fired = true;
        state.status = 'Firing';
      }
    }

    function updateHitShake(h) {
      if (targetHelmet && hitShakeTime > 0) {
        hitShakeTime -= h;
        const mag = 0.12;
        targetHelmet.position.set(
          25 + (Math.random() - 0.5) * mag,
          1 + (Math.random() - 0.5) * mag,
          (Math.random() - 0.5) * mag
        );
      } else if (targetHelmet) {
        targetHelmet.position.set(25, 1, 0);
      }
    }

    function updateHUD() {
      const armDeg = THREE.MathUtils.radToDeg(state.armAngle);
      const dist = state.freeProjectile
        ? Math.abs(state.projectilePos.x - launchOrigin.x)
        : 0;

      ui.hudArm.textContent = armDeg.toFixed(1);
      ui.hudDist.textContent = dist.toFixed(1);
      ui.hudMaxH.textContent = maxProjectileHeight.toFixed(1);
      ui.hudHits.textContent = String(hits);
      ui.hudCw.textContent = String(state.counterweightMass);
      ui.hudModel.textContent = modelLoaded ? 'Yes' : 'No';
    }

    function updateExposedState() {
      const armDeg = THREE.MathUtils.radToDeg(state.armAngle);
      const projDist = state.freeProjectile
        ? Math.abs(state.projectilePos.x - launchOrigin.x)
        : 0;

      const valid =
        Number.isFinite(state.armAngle) &&
        Number.isFinite(state.armOmega) &&
        Number.isFinite(state.projectilePos.x) &&
        Number.isFinite(state.projectilePos.y) &&
        Number.isFinite(state.projectilePos.z) &&
        Number.isFinite(state.projectileVel.x) &&
        Number.isFinite(state.projectileVel.y) &&
        Number.isFinite(state.projectileVel.z);

      window.__3D_STATE__ = {
        armAngle: Number(armDeg.toFixed(2)),
        projectileDistance: Number(projDist.toFixed(2)),
        maxProjectileHeight: Number(maxProjectileHeight.toFixed(2)),
        hits,
        counterweightMass: state.counterweightMass,
        releaseAngle: state.releaseAngleDeg,
        status: state.status,
        modelLoaded,
        isPaused: state.isPaused,
        frameCount,
        trebuchetValid: valid
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      if (!state.isPaused) {
        for (let s = 0; s < substeps; s++) {
          if (state.fired && !state.released) {
            rk4Step(dt);
            updateArmVisual();
            updateSlingAttached();
            updateCounterweightVisual();

            const releaseThreshold = THREE.MathUtils.degToRad(state.releaseAngleDeg);
            if (state.armAngle >= releaseThreshold) {
              releaseProjectile();
              slingSeg1.visible = false;
              slingSeg2.visible = false;
            }
          } else if (!state.fired) {
            updateArmVisual();
            updateSlingAttached();
            updateCounterweightVisual();
          } else if (state.freeProjectile) {
            updateArmVisual();
            updateCounterweightVisual();
            updateFreeProjectile(dt);
          }

          updateWall(dt);
          updateHitShake(dt);
        }
      }

      updateHUD();
      updateExposedState();
      renderer.render(scene, camera);
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyF') fire();
      if (e.code === 'KeyR') resetSimulation();
      if (e.code === 'Space') {
        e.preventDefault();
        state.isPaused = !state.isPaused;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    state.counterweightMass = Number(ui.cwSlider.value);
    state.releaseAngleDeg = Number(ui.releaseSlider.value);
    resetSimulation();
    animate();
  </script>
</body>
</html>
