<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Ring Designer</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
}
canvas {
    display: block;
}
#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #FFD700;
    background: rgba(0, 0, 0, 0.7);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid rgba(255, 215, 0, 0.3);
    min-width: 200px;
}
#hud h2 {
    margin-bottom: 10px;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 2px;
}
#score-display, #gem-count {
    font-size: 16px;
    margin: 8px 0;
    color: #e0e0e0;
}
#score-display span, #gem-count span {
    color: #FFD700;
    font-weight: bold;
}
#completion-msg {
    display: none;
    color: #00FF80;
    font-size: 20px;
    font-weight: bold;
    margin-top: 12px;
    text-align: center;
    animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.05); }
}
#gem-buttons {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
}
.gem-btn {
    padding: 12px 24px;
    border: 3px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
.gem-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}
.gem-btn.selected {
    border-color: #fff;
    box-shadow: 0 0 15px rgba(255,255,255,0.5);
    transform: translateY(-3px);
}
#btn-ruby {
    background: linear-gradient(135deg, #FF0040, #cc0033);
}
#btn-emerald {
    background: linear-gradient(135deg, #00FF80, #00cc66);
}
#btn-sapphire {
    background: linear-gradient(135deg, #0040FF, #0033cc);
}
#btn-diamond {
    background: linear-gradient(135deg, #FFFFFF, #ccccff);
    color: #333;
    text-shadow: none;
}
#btn-clear {
    background: linear-gradient(135deg, #666, #444);
    padding: 12px 20px;
    border: 2px solid #888;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
    transition: all 0.3s ease;
}
#btn-clear:hover {
    background: linear-gradient(135deg, #888, #666);
    transform: translateY(-2px);
}
#btn-randomize {
    background: linear-gradient(135deg, #FF6B00, #cc5500);
    padding: 12px 20px;
    border: 2px solid #FF8C00;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
    transition: all 0.3s ease;
}
#btn-randomize:hover {
    background: linear-gradient(135deg, #FF8C00, #FF6B00);
    transform: translateY(-2px);
}
#instructions {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #aaa;
    background: rgba(0, 0, 0, 0.6);
    padding: 15px;
    border-radius: 10px;
    font-size: 13px;
    max-width: 220px;
    line-height: 1.5;
    border: 1px solid rgba(255,255,255,0.1);
}
#instructions h3 {
    color: #FFD700;
    margin-bottom: 8px;
}
</style>
</head>
<body>

<div id="hud">
    <h2>💍 Ring Designer</h2>
    <div id="score-display">Design Score: <span>0</span></div>
    <div id="gem-count">Gems Placed: <span>0/6</span></div>
    <div id="completion-msg">✨ Ring Complete! ✨</div>
</div>

<div id="instructions">
    <h3>How to Use</h3>
    1. Select a gem type below<br>
    2. Click on an empty slot on the ring<br>
    3. Fill all 6 slots to complete!<br>
    <br>
    🖱️ Drag to rotate<br>
    🔍 Scroll to zoom
</div>

<div id="gem-buttons">
    <button class="gem-btn" id="btn-ruby">💎 Ruby</button>
    <button class="gem-btn" id="btn-emerald">💎 Emerald</button>
    <button class="gem-btn" id="btn-sapphire">💎 Sapphire</button>
    <button class="gem-btn" id="btn-diamond">💎 Diamond</button>
    <button id="btn-clear">🗑️ Clear All</button>
    <button id="btn-randomize">🎲 Randomize</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Initialize state immediately
window.__3D_STATE__ = {
    selectedGemType: null,
    gemSlots: [null, null, null, null, null, null],
    totalScore: 0,
    gemsPlaced: 0,
    designComplete: false,
    modelLoaded: false,
    ringColor: '#FFD700'
};

const gemTypes = {
    ruby: { color: 0xFF0040, emissive: 0x330010, score: 10 },
    emerald: { color: 0x00FF80, emissive: 0x003320, score: 15 },
    sapphire: { color: 0x0040FF, emissive: 0x001033, score: 20 },
    diamond: { color: 0xFFFFFF, emissive: 0xAAAAFF, score: 30 }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Additional lights for better ring appearance
const pointLight1 = new THREE.PointLight(0xFFD700, 0.5, 20);
pointLight1.position.set(-3, 3, 3);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x4444FF, 0.3, 20);
pointLight2.position.set(3, 2, -3);
scene.add(pointLight2);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0.5, 0);
controls.update();

// Ring
const ringGeometry = new THREE.TorusGeometry(1.2, 0.15, 16, 100);
const ringMaterial = new THREE.MeshStandardMaterial({
    color: 0xFFD700,
    metalness: 0.9,
    roughness: 0.2
});
const ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = Math.PI / 2;
ring.position.set(0, 0, 0);
ring.castShadow = true;
ring.receiveShadow = true;
scene.add(ring);

// Ground plane for reference
const groundGeometry = new THREE.CircleGeometry(4, 64);
const groundMaterial = new THREE.MeshStandardMaterial({
    color: 0x111122,
    metalness: 0.5,
    roughness: 0.8
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// Gem slots
const slotMeshes = [];
const gemMeshes = [];
const slotPositions = [];

for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2;
    const x = Math.cos(angle) * 1.2;
    const z = Math.sin(angle) * 1.2;
    const y = 0.15;

    slotPositions.push({ x, y, z, angle });

    // Empty slot indicator
    const slotGeometry = new THREE.SphereGeometry(0.08, 16, 16);
    const slotMaterial = new THREE.MeshStandardMaterial({
        color: 0x333333,
        metalness: 0.3,
        roughness: 0.7
    });
    const slotMesh = new THREE.Mesh(slotGeometry, slotMaterial);
    slotMesh.position.set(x, y, z);
    slotMesh.userData = { slotIndex: i, isSlot: true };
    scene.add(slotMesh);
    slotMeshes.push(slotMesh);
    gemMeshes.push(null);
}

// Load GLTF model
const loader = new GLTFLoader();
loader.load(
    '._DamagedHelmet.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.5, 0.5, 0.5);
        model.position.set(0, 2, 0);
        scene.add(model);
        window.__3D_STATE__.modelLoaded = true;
        console.log('Model loaded successfully');
    },
    (progress) => {
        console.log('Loading model...', (progress.loaded / progress.total * 100).toFixed(1) + '%');
    },
    (error) => {
        console.warn('Could not load GLTF model, adding placeholder:', error);
        // Add a placeholder decorative object
        const placeholderGroup = new THREE.Group();

        const sphereGeo = new THREE.IcosahedronGeometry(0.5, 2);
        const sphereMat = new THREE.MeshStandardMaterial({
            color: 0x8844aa,
            metalness: 0.7,
            roughness: 0.3,
            wireframe: false
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        placeholderGroup.add(sphere);

        // Add wireframe overlay
        const wireMat = new THREE.MeshBasicMaterial({
            color: 0xFFD700,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const wireSphere = new THREE.Mesh(sphereGeo, wireMat);
        wireSphere.scale.set(1.02, 1.02, 1.02);
        placeholderGroup.add(wireSphere);

        placeholderGroup.position.set(0, 2, 0);
        placeholderGroup.userData.isPlaceholder = true;
        scene.add(placeholderGroup);
        window.__3D_STATE__.modelLoaded = true;
    }
);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function updateState() {
    const state = window.__3D_STATE__;
    let score = 0;
    let count = 0;
    for (let i = 0; i < 6; i++) {
        if (state.gemSlots[i]) {
            score += state.gemSlots[i].score;
            count++;
        }
    }
    state.totalScore = score;
    state.gemsPlaced = count;
    state.designComplete = count === 6;

    // Update UI
    document.querySelector('#score-display span').textContent = score;
    document.querySelector('#gem-count span').textContent = `${count}/6`;

    const completionMsg = document.getElementById('completion-msg');
    if (state.designComplete) {
        completionMsg.style.display = 'block';
    } else {
        completionMsg.style.display = 'none';
    }
}

function placeGem(slotIndex, gemType) {
    const state = window.__3D_STATE__;
    if (state.gemSlots[slotIndex] !== null) return;
    if (!gemTypes[gemType]) return;

    const gemInfo = gemTypes[gemType];
    const pos = slotPositions[slotIndex];

    // Create gem mesh
    const gemGeometry = new THREE.IcosahedronGeometry(0.1, 0);
    const gemMaterial = new THREE.MeshStandardMaterial({
        color: gemInfo.color,
        emissive: gemInfo.emissive || 0x000000,
        emissiveIntensity: gemType === 'diamond' ? 0.5 : 0.3,
        metalness: 0.4,
        roughness: 0.1,
        transparent: gemType === 'diamond',
        opacity: gemType === 'diamond' ? 0.9 : 1.0
    });
    const gemMesh = new THREE.Mesh(gemGeometry, gemMaterial);
    gemMesh.position.set(pos.x, pos.y, pos.z);
    gemMesh.userData = { slotIndex: slotIndex, isGem: true, gemType: gemType };
    scene.add(gemMesh);

    // Hide slot indicator
    slotMeshes[slotIndex].visible = false;

    // Store gem mesh
    gemMeshes[slotIndex] = gemMesh;

    // Update state
    state.gemSlots[slotIndex] = { type: gemType, score: gemInfo.score };
    updateState();
}

function removeGem(slotIndex) {
    const state = window.__3D_STATE__;
    if (state.gemSlots[slotIndex] === null) return;

    // Remove gem mesh
    if (gemMeshes[slotIndex]) {
        scene.remove(gemMeshes[slotIndex]);
        gemMeshes[slotIndex].geometry.dispose();
        gemMeshes[slotIndex].material.dispose();
        gemMeshes[slotIndex] = null;
    }

    // Show slot indicator
    slotMeshes[slotIndex].visible = true;

    // Update state
    state.gemSlots[slotIndex] = null;
    updateState();
}

function clearAll() {
    for (let i = 0; i < 6; i++) {
        removeGem(i);
    }
}

function randomize() {
    const types = Object.keys(gemTypes);
    for (let i = 0; i < 6; i++) {
        if (window.__3D_STATE__.gemSlots[i] === null) {
            const randomType = types[Math.floor(Math.random() * types.length)];
            placeGem(i, randomType);
        }
    }
}

function getNextEmptySlot() {
    for (let i = 0; i < 6; i++) {
        if (window.__3D_STATE__.gemSlots[i] === null) {
            return i;
        }
    }
    return -1;
}

// Button event listeners
const gemButtons = {
    'btn-ruby': 'ruby',
    'btn-emerald': 'emerald',
    'btn-sapphire': 'sapphire',
    'btn-diamond': 'diamond'
};

Object.entries(gemButtons).forEach(([btnId, gemType]) => {
    document.getElementById(btnId).addEventListener('click', () => {
        const state = window.__3D_STATE__;

        // Toggle selection
        if (state.selectedGemType === gemType) {
            state.selectedGemType = null;
        } else {
            state.selectedGemType = gemType;
        }

        // Update button highlights
        document.querySelectorAll('.gem-btn').forEach(btn => btn.classList.remove('selected'));
        if (state.selectedGemType) {
            document.getElementById(btnId).classList.add('selected');
        }
    });
});

document.getElementById('btn-clear').addEventListener('click', clearAll);
document.getElementById('btn-randomize').addEventListener('click', randomize);

// Click handler for placing gems
renderer.domElement.addEventListener('click', (event) => {
    const state = window.__3D_STATE__;
    if (!state.selectedGemType) return;
    if (state.designComplete) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // Check intersection with slot meshes and ring
    const allTargets = [...slotMeshes.filter(s => s.visible), ring];
    const intersects = raycaster.intersectObjects(allTargets, false);

    if (intersects.length > 0) {
        const hit = intersects[0].object;

        if (hit.userData && hit.userData.isSlot) {
            // Clicked directly on a slot
            placeGem(hit.userData.slotIndex, state.selectedGemType);
        } else {
            // Clicked on ring or nearby - place in next available slot
            const nextSlot = getNextEmptySlot();
            if (nextSlot !== -1) {
                placeGem(nextSlot, state.selectedGemType);
            }
        }
    }
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const elapsed = clock.getElapsedTime();

    // Rotate placeholder model if present
    scene.traverse((child) => {
        if (child.userData && child.userData.isPlaceholder) {
            child.rotation.y = elapsed * 0.5;
            child.rotation.z = Math.sin(elapsed * 0.3) * 0.1;
        }
    });

    // Animate gems - gentle floating and rotation
    for (let i = 0; i < 6; i++) {
        if (gemMeshes[i]) {
            const pos = slotPositions[i];
            gemMeshes[i].position.y = pos.y + Math.sin(elapsed * 2 + i) * 0.02;
            gemMeshes[i].rotation.y = elapsed * 1.5 + i;
            gemMeshes[i].rotation.x = Math.sin(elapsed + i) * 0.3;
        }
    }

    // Subtle ring glow animation via emissive
    const glowIntensity = 0.05 + Math.sin(elapsed * 1.5) * 0.03;
    ringMaterial.emissive = new THREE.Color(0xFFD700);
    ringMaterial.emissiveIntensity = glowIntensity;

    controls.update();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize state display
updateState();

// Start animation
animate();
</script>
</body>
</html>
