<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Ring Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .panel {
            background: rgba(15, 15, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #FFD700;
        }
        #hud p {
            margin: 5px 0;
            font-size: 1rem;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .divider {
            width: 2px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 5px;
        }
        button {
            padding: 10px 20px;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            transition: all 0.2s ease;
            outline: none;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        button:active {
            transform: translateY(0);
        }
        .gem-btn.active {
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
            transform: scale(1.05);
        }
        #btn-ruby { background-color: #FF0040; }
        #btn-emerald { background-color: #00FF80; }
        #btn-sapphire { background-color: #0040FF; }
        #btn-diamond { 
            background-color: #FFFFFF; 
            color: #333; 
            text-shadow: none; 
        }
        #btn-diamond.active {
            border-color: #0040FF;
            box-shadow: 0 0 15px #AAAAFF;
        }
        .action-btn {
            background-color: #3a3a5a;
            border: 1px solid #555;
        }
        .action-btn:hover {
            background-color: #4a4a6a;
        }
        #completion-msg {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #FFD700;
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.4);
            display: none;
            pointer-events: none;
            text-align: center;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #aaa;
            font-size: 0.9rem;
            text-align: right;
            max-width: 250px;
        }
    </style>
    
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="hud" class="panel">
            <h2>Ring Designer</h2>
            <p id="score-display">Design Score: 0</p>
            <p id="gem-count">Gems Placed: 0/6</p>
        </div>

        <div id="instructions" class="panel">
            Select a gem below, then click on the gold ring to place it in the next available slot.
        </div>

        <div id="completion-msg">Ring Complete!</div>

        <div id="controls" class="panel">
            <button id="btn-ruby" class="gem-btn" data-type="ruby">Ruby</button>
            <button id="btn-emerald" class="gem-btn" data-type="emerald">Emerald</button>
            <button id="btn-sapphire" class="gem-btn" data-type="sapphire">Sapphire</button>
            <button id="btn-diamond" class="gem-btn" data-type="diamond">Diamond</button>
            
            <div class="divider"></div>
            
            <button id="btn-randomize" class="action-btn">Randomize</button>
            <button id="btn-clear" class="action-btn">Clear All</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            selectedGemType: null,
            gemSlots: [null, null, null, null, null, null],
            totalScore: 0,
            gemsPlaced: 0,
            designComplete: false,
            modelLoaded: false,
            ringColor: '#FFD700'
        };

        const GEM_DATA = {
            ruby: { color: 0xFF0040, score: 10, emissive: 0x000000 },
            emerald: { color: 0x00FF80, score: 15, emissive: 0x000000 },
            sapphire: { color: 0x0040FF, score: 20, emissive: 0x000000 },
            diamond: { color: 0xFFFFFF, score: 30, emissive: 0xAAAAFF }
        };

        function updateState(newState) {
            window.__3D_STATE__ = { ...window.__3D_STATE__, ...newState };
            renderUI();
        }

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 10;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- 3D OBJECTS ---
        
        // 1. Centerpiece Model
        const gltfLoader = new GLTFLoader();
        gltfLoader.load('._DamagedHelmet.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            model.position.set(0, 2, 0);
            scene.add(model);
            updateState({ modelLoaded: true });
        }, undefined, (error) => {
            console.warn('GLTF Model could not be loaded. Ensure "._DamagedHelmet.glb" is in the same directory.', error);
        });

        // 2. Procedural Ring
        const ringGeometry = new THREE.TorusGeometry(1.2, 0.15, 16, 100);
        const ringMaterial = new THREE.MeshStandardMaterial({
            color: new THREE.Color(window.__3D_STATE__.ringColor),
            metalness: 0.9,
            roughness: 0.2
        });
        const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
        ringMesh.rotation.x = Math.PI / 2;
        scene.add(ringMesh);

        // 3. Gem Slots
        const slotGroup = new THREE.Group();
        scene.add(slotGroup);
        const slotMeshes = [];
        const radius = 1.2;
        const yOffset = 0.15; // Sit on top of the ring

        function createEmptySlotMesh(x, z) {
            const geo = new THREE.SphereGeometry(0.08, 16, 16);
            const mat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, yOffset, z);
            return mesh;
        }

        function createGemMesh(type, x, z) {
            const data = GEM_DATA[type];
            const geo = new THREE.IcosahedronGeometry(0.1, 0);
            const mat = new THREE.MeshStandardMaterial({
                color: data.color,
                emissive: data.emissive,
                emissiveIntensity: 0.5,
                metalness: 0.8,
                roughness: 0.1,
                flatShading: true
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, yOffset, z);
            // Add slight random rotation for better look
            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            return mesh;
        }

        // Initialize slots
        for (let i = 0; i < 6; i++) {
            const angle = i * (Math.PI * 2 / 6);
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const mesh = createEmptySlotMesh(x, z);
            slotGroup.add(mesh);
            slotMeshes.push(mesh);
        }

        // --- INTERACTION LOGIC ---
        
        function placeGemAt(index, type) {
            const oldMesh = slotMeshes[index];
            const x = oldMesh.position.x;
            const z = oldMesh.position.z;
            
            slotGroup.remove(oldMesh);
            oldMesh.geometry.dispose();
            oldMesh.material.dispose();

            const newMesh = createGemMesh(type, x, z);
            slotGroup.add(newMesh);
            slotMeshes[index] = newMesh;
        }

        function resetSlotAt(index) {
            const oldMesh = slotMeshes[index];
            const x = oldMesh.position.x;
            const z = oldMesh.position.z;
            
            slotGroup.remove(oldMesh);
            oldMesh.geometry.dispose();
            oldMesh.material.dispose();

            const newMesh = createEmptySlotMesh(x, z);
            slotGroup.add(newMesh);
            slotMeshes[index] = newMesh;
        }

        // Raycasting
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName !== 'CANVAS') return;

            const state = window.__3D_STATE__;
            if (!state.selectedGemType || state.designComplete) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            // Raycast against the ring
            const intersects = raycaster.intersectObject(ringMesh);
            
            if (intersects.length > 0) {
                const nextEmptyIndex = state.gemSlots.findIndex(slot => slot === null);
                
                if (nextEmptyIndex !== -1) {
                    const type = state.selectedGemType;
                    const score = GEM_DATA[type].score;
                    
                    const newSlots = [...state.gemSlots];
                    newSlots[nextEmptyIndex] = { type, score };
                    
                    placeGemAt(nextEmptyIndex, type);
                    
                    const newPlaced = state.gemsPlaced + 1;
                    updateState({
                        gemSlots: newSlots,
                        gemsPlaced: newPlaced,
                        totalScore: state.totalScore + score,
                        designComplete: newPlaced === 6
                    });
                }
            }
        });

        // --- UI EVENT LISTENERS ---
        
        document.querySelectorAll('.gem-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const type = e.target.dataset.type;
                updateState({ selectedGemType: type });
            });
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            for (let i = 0; i < 6; i++) {
                if (window.__3D_STATE__.gemSlots[i] !== null) {
                    resetSlotAt(i);
                }
            }
            updateState({
                gemSlots: [null, null, null, null, null, null],
                totalScore: 0,
                gemsPlaced: 0,
                designComplete: false
            });
        });

        document.getElementById('btn-randomize').addEventListener('click', () => {
            const state = window.__3D_STATE__;
            if (state.designComplete) return;

            const types = Object.keys(GEM_DATA);
            let newSlots = [...state.gemSlots];
            let addedScore = 0;
            let addedCount = 0;

            for (let i = 0; i < 6; i++) {
                if (newSlots[i] === null) {
                    const randomType = types[Math.floor(Math.random() * types.length)];
                    newSlots[i] = { type: randomType, score: GEM_DATA[randomType].score };
                    placeGemAt(i, randomType);
                    addedScore += GEM_DATA[randomType].score;
                    addedCount++;
                }
            }

            if (addedCount > 0) {
                const newPlaced = state.gemsPlaced + addedCount;
                updateState({
                    gemSlots: newSlots,
                    gemsPlaced: newPlaced,
                    totalScore: state.totalScore + addedScore,
                    designComplete: newPlaced === 6
                });
            }
        });

        // --- UI RENDERER ---
        
        function renderUI() {
            const state = window.__3D_STATE__;
            
            document.getElementById('score-display').innerText = `Design Score: ${state.totalScore}`;
            document.getElementById('gem-count').innerText = `Gems Placed: ${state.gemsPlaced}/6`;

            document.querySelectorAll('.gem-btn').forEach(btn => {
                if (btn.dataset.type === state.selectedGemType) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            const msg = document.getElementById('completion-msg');
            if (state.designComplete) {
                msg.style.display = 'block';
            } else {
                msg.style.display = 'none';
            }
        }

        // Initial UI render
        renderUI();

        // --- WINDOW RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            
            // Slowly rotate the slot group for a dynamic display
            slotGroup.rotation.y = time * 0.1;
            ringMesh.rotation.z = -time * 0.1; // Counter rotate ring to match slots visually

            // Animate gems slightly
            slotMeshes.forEach((mesh, index) => {
                if (window.__3D_STATE__.gemSlots[index] !== null) {
                    mesh.rotation.x += 0.01;
                    mesh.rotation.y += 0.02;
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
