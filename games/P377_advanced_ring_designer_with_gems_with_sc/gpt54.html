<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Ring Designer</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.45);
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      z-index: 10;
      min-width: 180px;
    }

    #hud div {
      margin: 6px 0;
      font-size: 16px;
    }

    #completion-msg {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 140, 0.15);
      border: 1px solid rgba(0, 255, 140, 0.55);
      color: #9cffc9;
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: bold;
      letter-spacing: 0.5px;
      z-index: 10;
      display: none;
    }

    #controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 12px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 10;
    }

    button {
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      min-width: 96px;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }

    button:hover {
      transform: translateY(-2px);
    }

    button.selected {
      border-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.2), 0 6px 18px rgba(255,255,255,0.15);
    }

    #btn-ruby { background: #FF0040; }
    #btn-emerald { background: #00AA66; }
    #btn-sapphire { background: #0040FF; }
    #btn-diamond {
      background: linear-gradient(135deg, #ffffff, #bfc8ff);
      color: #111;
    }

    #btn-clear {
      background: #444;
    }

    #btn-randomize {
      background: #7a4cff;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score-display">Design Score: 0</div>
    <div id="gem-count">Gems Placed: 0/6</div>
  </div>

  <div id="completion-msg">Ring Complete!</div>

  <div id="controls">
    <button id="btn-ruby">Ruby</button>
    <button id="btn-emerald">Emerald</button>
    <button id="btn-sapphire">Sapphire</button>
    <button id="btn-diamond">Diamond</button>
    <button id="btn-clear">Clear All</button>
    <button id="btn-randomize">Randomize</button>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    // Initialize required state immediately
    window.__3D_STATE__ = {
      selectedGemType: null,
      gemSlots: [null, null, null, null, null, null],
      totalScore: 0,
      gemsPlaced: 0,
      designComplete: false,
      modelLoaded: false,
      ringColor: '#FFD700'
    };

    const GEM_TYPES = {
      ruby:    { color: '#FF0040', score: 10 },
      emerald: { color: '#00FF80', score: 15 },
      sapphire:{ color: '#0040FF', score: 20 },
      diamond: { color: '#FFFFFF', emissive: '#AAAAFF', score: 30 }
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.5, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // Decorative centerpiece/reference GLTF model
    const loader = new GLTFLoader();
    loader.load(
      '._DamagedHelmet.glb',
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(0.5);
        model.position.set(0, 2, 0);
        scene.add(model);
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load GLTF model:', err);
      }
    );

    // Ring
    const ringGeometry = new THREE.TorusGeometry(1.2, 0.15, 16, 100);
    const ringMaterial = new THREE.MeshStandardMaterial({
      color: window.__3D_STATE__.ringColor,
      metalness: 0.9,
      roughness: 0.2
    });
    const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
    ringMesh.rotation.x = Math.PI / 2;
    ringMesh.position.set(0, 0, 0);
    scene.add(ringMesh);

    // Invisible click target over ring area
    const ringClickTarget = new THREE.Mesh(
      new THREE.CylinderGeometry(1.6, 1.6, 0.5, 48),
      new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.0, depthWrite: false })
    );
    ringClickTarget.position.set(0, 0, 0);
    scene.add(ringClickTarget);

    // Gem slot system
    const slotRadius = 1.2;
    const slotCount = 6;
    const slotMeshes = [];
    const gemMeshes = new Array(slotCount).fill(null);
    const slotMarkerGeometry = new THREE.SphereGeometry(0.08, 20, 20);
    const slotMarkerMaterial = new THREE.MeshStandardMaterial({
      color: '#333333',
      roughness: 0.8,
      metalness: 0.1
    });

    const gemGeometry = new THREE.IcosahedronGeometry(0.1, 0);

    function getSlotPosition(index) {
      const angle = (index / slotCount) * Math.PI * 2;
      const x = Math.cos(angle) * slotRadius;
      const z = Math.sin(angle) * slotRadius;
      const y = 0.16;
      return new THREE.Vector3(x, y, z);
    }

    for (let i = 0; i < slotCount; i++) {
      const slot = new THREE.Mesh(slotMarkerGeometry, slotMarkerMaterial.clone());
      slot.position.copy(getSlotPosition(i));
      scene.add(slot);
      slotMeshes.push(slot);
    }

    // UI refs
    const scoreDisplay = document.getElementById('score-display');
    const gemCountDisplay = document.getElementById('gem-count');
    const completionMsg = document.getElementById('completion-msg');

    const btnRuby = document.getElementById('btn-ruby');
    const btnEmerald = document.getElementById('btn-emerald');
    const btnSapphire = document.getElementById('btn-sapphire');
    const btnDiamond = document.getElementById('btn-diamond');
    const btnClear = document.getElementById('btn-clear');
    const btnRandomize = document.getElementById('btn-randomize');

    const gemButtons = {
      ruby: btnRuby,
      emerald: btnEmerald,
      sapphire: btnSapphire,
      diamond: btnDiamond
    };

    function syncState() {
      const slots = window.__3D_STATE__.gemSlots;
      const gemsPlaced = slots.filter(Boolean).length;
      const totalScore = slots.reduce((sum, g) => sum + (g ? g.score : 0), 0);
      const designComplete = gemsPlaced === slotCount;

      window.__3D_STATE__.gemsPlaced = gemsPlaced;
      window.__3D_STATE__.totalScore = totalScore;
      window.__3D_STATE__.designComplete = designComplete;

      scoreDisplay.textContent = `Design Score: ${totalScore}`;
      gemCountDisplay.textContent = `Gems Placed: ${gemsPlaced}/6`;
      completionMsg.style.display = designComplete ? 'block' : 'none';

      Object.entries(gemButtons).forEach(([type, btn]) => {
        btn.classList.toggle('selected', window.__3D_STATE__.selectedGemType === type);
      });
    }

    function setSelectedGem(type) {
      window.__3D_STATE__.selectedGemType = type;
      syncState();
    }

    function createGemMesh(type) {
      const gem = GEM_TYPES[type];
      const material = new THREE.MeshStandardMaterial({
        color: gem.color,
        emissive: gem.emissive || '#000000',
        emissiveIntensity: gem.emissive ? 0.45 : 0,
        metalness: 0.25,
        roughness: 0.1
      });
      return new THREE.Mesh(gemGeometry, material);
    }

    function placeGemInSlot(index, type) {
      if (index < 0 || index >= slotCount) return;
      if (window.__3D_STATE__.gemSlots[index]) return;

      const gemData = {
        type,
        score: GEM_TYPES[type].score
      };

      const gemMesh = createGemMesh(type);
      gemMesh.position.copy(getSlotPosition(index));
      gemMesh.position.y = 0.22;
      gemMesh.rotation.set(Math.random(), Math.random(), Math.random());
      scene.add(gemMesh);

      gemMeshes[index] = gemMesh;
      window.__3D_STATE__.gemSlots[index] = gemData;
      slotMeshes[index].visible = false;

      syncState();
    }

    function placeNextAvailableGem(type) {
      const nextIndex = window.__3D_STATE__.gemSlots.findIndex(slot => slot === null);
      if (nextIndex !== -1) {
        placeGemInSlot(nextIndex, type);
      }
    }

    function clearAllGems() {
      for (let i = 0; i < slotCount; i++) {
        if (gemMeshes[i]) {
          scene.remove(gemMeshes[i]);
          gemMeshes[i].geometry.dispose();
          gemMeshes[i].material.dispose();
          gemMeshes[i] = null;
        }
        window.__3D_STATE__.gemSlots[i] = null;
        slotMeshes[i].visible = true;
      }
      window.__3D_STATE__.designComplete = false;
      window.__3D_STATE__.totalScore = 0;
      window.__3D_STATE__.gemsPlaced = 0;
      syncState();
    }

    function randomizeEmptySlots() {
      const types = Object.keys(GEM_TYPES);
      for (let i = 0; i < slotCount; i++) {
        if (!window.__3D_STATE__.gemSlots[i]) {
          const randomType = types[Math.floor(Math.random() * types.length)];
          placeGemInSlot(i, randomType);
        }
      }
      syncState();
    }

    btnRuby.addEventListener('click', () => setSelectedGem('ruby'));
    btnEmerald.addEventListener('click', () => setSelectedGem('emerald'));
    btnSapphire.addEventListener('click', () => setSelectedGem('sapphire'));
    btnDiamond.addEventListener('click', () => setSelectedGem('diamond'));
    btnClear.addEventListener('click', clearAllGems);
    btnRandomize.addEventListener('click', randomizeEmptySlots);

    // Raycasting interaction
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function onPointerDown(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObject(ringClickTarget);

      if (intersects.length > 0) {
        if (window.__3D_STATE__.selectedGemType && !window.__3D_STATE__.designComplete) {
          placeNextAvailableGem(window.__3D_STATE__.selectedGemType);
        }
      }
    }

    window.addEventListener('pointerdown', onPointerDown);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    syncState();

    function animate() {
      requestAnimationFrame(animate);

      for (let i = 0; i < gemMeshes.length; i++) {
        if (gemMeshes[i]) {
          gemMeshes[i].rotation.y += 0.01;
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
