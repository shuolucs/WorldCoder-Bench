<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laptop Comparator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#uiPanel {
    position: fixed;
    top: 0;
    left: 0;
    width: 250px;
    height: 100vh;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    color: #e0e0e0;
    padding: 20px;
    overflow-y: auto;
    z-index: 100;
    border-right: 1px solid rgba(255,255,255,0.1);
}

#uiPanel h1 {
    font-size: 18px;
    margin-bottom: 20px;
    color: #fff;
    text-align: center;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

.control-group {
    margin-bottom: 16px;
}

.control-group label {
    display: block;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.radio-group {
    display: flex;
    gap: 10px;
}

.radio-group label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    font-size: 14px;
    color: #ddd;
    text-transform: none;
    letter-spacing: 0;
}

input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    outline: none;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #4a9eff;
    cursor: pointer;
}

input[type="color"] {
    width: 100%;
    height: 35px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    padding: 2px;
}

select {
    width: 100%;
    padding: 8px;
    background: rgba(255,255,255,0.1);
    color: #e0e0e0;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    font-size: 13px;
    outline: none;
}

select option {
    background: #1a1a2e;
    color: #e0e0e0;
}

.btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    transition: all 0.2s;
}

.btn-save {
    background: #2d6a4f;
    color: #fff;
}
.btn-save:hover { background: #40916c; }

.btn-load {
    background: #1d3557;
    color: #fff;
}
.btn-load:hover { background: #457b9d; }

.btn-reset {
    background: #6c1d1d;
    color: #fff;
}
.btn-reset:hover { background: #9b2226; }

#statusText {
    font-size: 11px;
    color: #7a7a9a;
    text-align: center;
    margin-top: 10px;
    min-height: 16px;
    transition: color 0.3s;
}

.angle-display {
    font-size: 12px;
    color: #4a9eff;
    text-align: right;
    margin-top: 2px;
}
</style>
</head>
<body>

<div id="uiPanel">
    <h1>💻 Laptop Comparator</h1>

    <div class="control-group">
        <label>Select Laptop</label>
        <div class="radio-group">
            <label>
                <input type="radio" name="laptopSelect" value="A" checked id="radioA">
                Laptop A
            </label>
            <label>
                <input type="radio" name="laptopSelect" value="B" id="radioB">
                Laptop B
            </label>
        </div>
    </div>

    <div class="control-group">
        <label>Screen Angle</label>
        <input type="range" id="angleSlider" min="0" max="180" value="110">
        <div class="angle-display" id="angleDisplay">110°</div>
    </div>

    <div class="control-group">
        <label>Base Color</label>
        <input type="color" id="colorPicker" value="#333333">
    </div>

    <div class="control-group">
        <label>Screen Brightness</label>
        <select id="brightnessSelect">
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
        </select>
    </div>

    <div class="control-group" style="margin-top: 24px;">
        <button class="btn btn-save" id="saveBtn">💾 Save State</button>
        <button class="btn btn-load" id="loadBtn">📂 Load State</button>
        <button class="btn btn-reset" id="resetBtn">🔄 Reset</button>
    </div>

    <div id="statusText">Ready</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ DEFAULTS ============
const DEFAULTS = {
    laptopA: { screenAngle: 110, baseColor: '#333333', brightness: 'Medium' },
    laptopB: { screenAngle: 110, baseColor: '#c0c0c0', brightness: 'Medium' }
};

const BRIGHTNESS_MAP = { Low: 0.1, Medium: 0.3, High: 0.6 };

// ============ STATE ============
const state = {
    selectedLaptop: 'A',
    laptopA: { screenAngle: 110, targetAngle: 110, baseColor: '#333333', brightness: 'Medium' },
    laptopB: { screenAngle: 110, targetAngle: 110, baseColor: '#c0c0c0', brightness: 'Medium' },
    mascotLoaded: false,
    mascotRotationY: 0,
    lastAction: 'initialized'
};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0.5, 0);

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xfff5e6, 0.8);
dirLight1.position.set(5, 10, 5);
dirLight1.castShadow = true;
dirLight1.shadow.mapSize.set(1024, 1024);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xe6f0ff, 0.3);
dirLight2.position.set(-5, 5, -5);
scene.add(dirLight2);

// ============ GROUND PLANE ============
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a2e,
    roughness: 0.8,
    metalness: 0.2
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(20, 40, 0x2a2a4a, 0x1a1a3a);
gridHelper.position.y = 0.001;
scene.add(gridHelper);

// ============ LAPTOP CREATION ============
function createLaptop(config) {
    const group = new THREE.Group();

    // Base
    const baseGeo = new THREE.BoxGeometry(config.baseWidth, config.baseHeight, config.baseDepth);
    const baseMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(config.baseColor),
        roughness: 0.4,
        metalness: 0.6
    });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.position.y = config.baseHeight / 2;
    base.castShadow = true;
    base.receiveShadow = true;
    group.add(base);

    // Keyboard detail
    const kbGeo = new THREE.BoxGeometry(config.baseWidth * 0.8, 0.005, config.baseDepth * 0.5);
    const kbMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
    const keyboard = new THREE.Mesh(kbGeo, kbMat);
    keyboard.position.y = config.baseHeight + 0.003;
    keyboard.position.z = 0.1;
    group.add(keyboard);

    // Trackpad
    const tpGeo = new THREE.BoxGeometry(config.baseWidth * 0.3, 0.005, config.baseDepth * 0.2);
    const tpMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.5 });
    const trackpad = new THREE.Mesh(tpGeo, tpMat);
    trackpad.position.y = config.baseHeight + 0.003;
    trackpad.position.z = config.baseDepth * 0.35;
    group.add(trackpad);

    // Screen hinge pivot
    const hingePivot = new THREE.Group();
    hingePivot.position.set(0, config.baseHeight, -config.baseDepth / 2);
    group.add(hingePivot);

    // Screen
    const screenGeo = new THREE.BoxGeometry(config.screenWidth, config.screenHeight, config.screenThickness);
    const screenMat = new THREE.MeshStandardMaterial({
        color: 0x111122,
        emissive: new THREE.Color(0x1a1a3e),
        emissiveIntensity: 0.3,
        roughness: 0.1,
        metalness: 0.3
    });
    const screen = new THREE.Mesh(screenGeo, screenMat);
    screen.position.y = config.screenHeight / 2;
    screen.position.z = -config.screenThickness / 2;
    screen.castShadow = true;
    hingePivot.add(screen);

    // Screen bezel (frame)
    const bezelGeo = new THREE.BoxGeometry(config.screenWidth + 0.05, config.screenHeight + 0.05, config.screenThickness + 0.01);
    const bezelMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(config.baseColor).multiplyScalar(0.8),
        roughness: 0.4,
        metalness: 0.6
    });
    const bezel = new THREE.Mesh(bezelGeo, bezelMat);
    bezel.position.copy(screen.position);
    bezel.position.z -= 0.005;
    hingePivot.add(bezel);

    // Highlight wireframe (initially invisible)
    const highlightGeo = new THREE.BoxGeometry(config.baseWidth + 0.1, config.baseHeight + 0.1, config.baseDepth + 0.1);
    const highlightMat = new THREE.MeshBasicMaterial({
        color: 0x4a9eff,
        wireframe: true,
        transparent: true,
        opacity: 0
    });
    const highlight = new THREE.Mesh(highlightGeo, highlightMat);
    highlight.position.y = config.baseHeight / 2;
    group.add(highlight);

    return { group, base, screen, screenMat, baseMat, bezelMat, hingePivot, highlight, highlightMat, config };
}

const laptopAConfig = {
    baseWidth: 3, baseHeight: 0.15, baseDepth: 2,
    screenWidth: 2.8, screenHeight: 1.8, screenThickness: 0.05,
    baseColor: '#333333'
};

const laptopBConfig = {
    baseWidth: 3.2, baseHeight: 0.12, baseDepth: 2.1,
    screenWidth: 3.0, screenHeight: 1.9, screenThickness: 0.04,
    baseColor: '#c0c0c0'
};

const laptopA = createLaptop(laptopAConfig);
laptopA.group.position.set(-2.5, 0, 0);
scene.add(laptopA.group);

const laptopB = createLaptop(laptopBConfig);
laptopB.group.position.set(2.5, 0, 0);
scene.add(laptopB.group);

// Labels
function createLabel(text, position) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.fillRect(0, 0, 256, 64);
    ctx.font = 'bold 32px Segoe UI';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.fillText(text, 128, 42);
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.7 });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.copy(position);
    sprite.scale.set(1.5, 0.375, 1);
    return sprite;
}

scene.add(createLabel('Laptop A', new THREE.Vector3(-2.5, 2.5, 0)));
scene.add(createLabel('Laptop B', new THREE.Vector3(2.5, 2.5, 0)));

// Set initial screen angles
function setScreenAngle(laptop, angleDeg) {
    const angleRad = THREE.MathUtils.degToRad(THREE.MathUtils.clamp(angleDeg, 0, 180));
    laptop.hingePivot.rotation.x = -(Math.PI - angleRad);
}

setScreenAngle(laptopA, 110);
setScreenAngle(laptopB, 110);

// ============ MASCOT ============
let mascot = null;
const loader = new GLTFLoader();
loader.load('stork.glb',
    (gltf) => {
        mascot = gltf.scene;
        const box = new THREE.Box3().setFromObject(mascot);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 0.5 / maxDim;
        mascot.scale.setScalar(scale);

        const newBox = new THREE.Box3().setFromObject(mascot);
        const center = newBox.getCenter(new THREE.Vector3());
        mascot.position.sub(center);

        const wrapper = new THREE.Group();
        wrapper.add(mascot);
        wrapper.position.set(0, 0.25, -2);
        scene.add(wrapper);
        mascot = wrapper;

        state.mascotLoaded = true;
        updateGlobalState();
        setStatus('Mascot loaded');
    },
    undefined,
    (error) => {
        console.warn('Could not load stork.glb, creating placeholder mascot');
        // Create a placeholder bird-like shape
        const mascotGroup = new THREE.Group();

        // Body
        const bodyGeo = new THREE.SphereGeometry(0.12, 16, 12);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        mascotGroup.add(body);

        // Head
        const headGeo = new THREE.SphereGeometry(0.07, 12, 10);
        const head = new THREE.Mesh(headGeo, bodyMat);
        head.position.set(0, 0.12, 0.08);
        mascotGroup.add(head);

        // Beak
        const beakGeo = new THREE.ConeGeometry(0.02, 0.08, 8);
        const beakMat = new THREE.MeshStandardMaterial({ color: 0xff6600 });
        const beak = new THREE.Mesh(beakGeo, beakMat);
        beak.rotation.x = Math.PI / 2;
        beak.position.set(0, 0.12, 0.18);
        mascotGroup.add(beak);

        // Legs
        const legGeo = new THREE.CylinderGeometry(0.008, 0.008, 0.15);
        const legMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
        const leg1 = new THREE.Mesh(legGeo, legMat);
        leg1.position.set(0.04, -0.18, 0);
        mascotGroup.add(leg1);
        const leg2 = new THREE.Mesh(legGeo, legMat);
        leg2.position.set(-0.04, -0.18, 0);
        mascotGroup.add(leg2);

        mascotGroup.scale.setScalar(2);
        mascotGroup.position.set(0, 0.4, -2);
        scene.add(mascotGroup);
        mascot = mascotGroup;

        state.mascotLoaded = true;
        updateGlobalState();
        setStatus('Placeholder mascot created');
    }
);

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getAllMeshes(group) {
    const meshes = [];
    group.traverse(child => {
        if (child.isMesh) meshes.push(child);
    });
    return meshes;
}

renderer.domElement.addEventListener('click', (event) => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const meshesA = getAllMeshes(laptopA.group);
    const meshesB = getAllMeshes(laptopB.group);

    const intersectsA = raycaster.intersectObjects(meshesA, true);
    const intersectsB = raycaster.intersectObjects(meshesB, true);

    if (intersectsA.length > 0 && (intersectsB.length === 0 || intersectsA[0].distance < intersectsB[0].distance)) {
        selectLaptop('A');
    } else if (intersectsB.length > 0) {
        selectLaptop('B');
    }
});

// ============ UI CONTROLS ============
const radioA = document.getElementById('radioA');
const radioB = document.getElementById('radioB');
const angleSlider = document.getElementById('angleSlider');
const angleDisplay = document.getElementById('angleDisplay');
const colorPicker = document.getElementById('colorPicker');
const brightnessSelect = document.getElementById('brightnessSelect');
const saveBtn = document.getElementById('saveBtn');
const loadBtn = document.getElementById('loadBtn');
const resetBtn = document.getElementById('resetBtn');
const statusText = document.getElementById('statusText');

function setStatus(msg) {
    statusText.textContent = msg;
    statusText.style.color = '#4a9eff';
    setTimeout(() => { statusText.style.color = '#7a7a9a'; }, 2000);
    state.lastAction = msg;
    updateGlobalState();
}

function getSelectedState() {
    return state.selectedLaptop === 'A' ? state.laptopA : state.laptopB;
}

function getSelectedLaptopObj() {
    return state.selectedLaptop === 'A' ? laptopA : laptopB;
}

function selectLaptop(which) {
    state.selectedLaptop = which;
    if (which === 'A') radioA.checked = true;
    else radioB.checked = true;
    updateUIFromState();
    setStatus(`Selected Laptop ${which}`);
}

function updateUIFromState() {
    const s = getSelectedState();
    angleSlider.value = s.screenAngle;
    angleDisplay.textContent = `${Math.round(s.screenAngle)}°`;
    colorPicker.value = s.baseColor;
    brightnessSelect.value = s.brightness;
}

radioA.addEventListener('change', () => { if (radioA.checked) selectLaptop('A'); });
radioB.addEventListener('change', () => { if (radioB.checked) selectLaptop('B'); });

angleSlider.addEventListener('input', () => {
    const angle = parseFloat(angleSlider.value) || 0;
    const clamped = THREE.MathUtils.clamp(angle, 0, 180);
    const s = getSelectedState();
    s.screenAngle = clamped;
    s.targetAngle = clamped;
    angleDisplay.textContent = `${Math.round(clamped)}°`;
    state.lastAction = 'angle_changed';
    updateGlobalState();
});

colorPicker.addEventListener('input', () => {
    const color = colorPicker.value;
    const s = getSelectedState();
    s.baseColor = color;
    const laptop = getSelectedLaptopObj();
    laptop.baseMat.color.set(color);
    laptop.bezelMat.color.set(new THREE.Color(color).multiplyScalar(0.8));
    state.lastAction = 'color_changed';
    setStatus('Color changed');
});

brightnessSelect.addEventListener('change', () => {
    const val = brightnessSelect.value;
    const s = getSelectedState();
    s.brightness = val;
    const laptop = getSelectedLaptopObj();
    laptop.screenMat.emissiveIntensity = BRIGHTNESS_MAP[val];
    state.lastAction = 'brightness_changed';
    setStatus(`Brightness: ${val}`);
});

saveBtn.addEventListener('click', () => {
    const saveData = {
        laptopA: { ...state.laptopA },
        laptopB: { ...state.laptopB },
        selectedLaptop: state.selectedLaptop
    };
    delete saveData.laptopA.targetAngle;
    delete saveData.laptopB.targetAngle;
    localStorage.setItem('laptopCompareState', JSON.stringify(saveData));
    state.lastAction = 'saved';
    setStatus('State saved!');
});

loadBtn.addEventListener('click', () => {
    const data = localStorage.getItem('laptopCompareState');
    if (!data) {
        setStatus('No saved state found');
        return;
    }
    try {
        const parsed = JSON.parse(data);
        applyLoadedState(parsed);
        state.lastAction = 'loaded';
        setStatus('State loaded!');
    } catch (e) {
        setStatus('Error loading state');
    }
});

resetBtn.addEventListener('click', () => {
    state.laptopA = { screenAngle: 110, targetAngle: 110, baseColor: '#333333', brightness: 'Medium' };
    state.laptopB = { screenAngle: 110, targetAngle: 110, baseColor: '#c0c0c0', brightness: 'Medium' };
    state.selectedLaptop = 'A';

    applyStateToLaptop(laptopA, state.laptopA);
    applyStateToLaptop(laptopB, state.laptopB);
    radioA.checked = true;
    updateUIFromState();
    state.lastAction = 'reset';
    setStatus('Reset to defaults');
});

function applyLoadedState(parsed) {
    if (parsed.laptopA) {
        state.laptopA.screenAngle = THREE.MathUtils.clamp(parsed.laptopA.screenAngle || 110, 0, 180);
        state.laptopA.targetAngle = state.laptopA.screenAngle;
        state.laptopA.baseColor = parsed.laptopA.baseColor || '#333333';
        state.laptopA.brightness = parsed.laptopA.brightness || 'Medium';
    }
    if (parsed.laptopB) {
        state.laptopB.screenAngle = THREE.MathUtils.clamp(parsed.laptopB.screenAngle || 110, 0, 180);
        state.laptopB.targetAngle = state.laptopB.screenAngle;
        state.laptopB.baseColor = parsed.laptopB.baseColor || '#c0c0c0';
        state.laptopB.brightness = parsed.laptopB.brightness || 'Medium';
    }
    if (parsed.selectedLaptop) state.selectedLaptop = parsed.selectedLaptop;

    applyStateToLaptop(laptopA, state.laptopA);
    applyStateToLaptop(laptopB, state.laptopB);

    if (state.selectedLaptop === 'A') radioA.checked = true;
    else radioB.checked = true;
    updateUIFromState();
}

function applyStateToLaptop(laptop, s) {
    laptop.baseMat.color.set(s.baseColor);
    laptop.bezelMat.color.set(new THREE.Color(s.baseColor).multiplyScalar(0.8));
    laptop.screenMat.emissiveIntensity = BRIGHTNESS_MAP[s.brightness] || 0.3;
    setScreenAngle(laptop, s.screenAngle);
}

// ============ GLOBAL STATE ============
function updateGlobalState() {
    const savedData = localStorage.getItem('laptopCompareState');
    window.__3D_STATE__ = {
        selectedLaptop: state.selectedLaptop,
        laptopA_screenAngle: state.laptopA.screenAngle || 0,
        laptopB_screenAngle: state.laptopB.screenAngle || 0,
        laptopA_baseColor: state.laptopA.baseColor || '#333333',
        laptopB_baseColor: state.laptopB.baseColor || '#c0c0c0',
        laptopA_brightness: state.laptopA.brightness || 'Medium',
        laptopB_brightness: state.laptopB.brightness || 'Medium',
        savedStateExists: !!savedData,
        lastAction: state.lastAction || '',
        mascotLoaded: state.mascotLoaded,
        mascotRotationY: state.mascotRotationY || 0,
        cameraDistance: camera.position.length() || 0
    };
}

// ============ ANIMATION ============
const clock = new THREE.Clock();
let highlightTime = 0;

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    controls.update();

    // Mascot rotation
    if (mascot) {
        mascot.rotation.y += 0.5 * delta;
        state.mascotRotationY = mascot.rotation.y;
    }

    // Smooth screen angle lerp
    const lerpFactor = 1 - Math.pow(0.001, delta); // smooth ~0.3s
    
    // Laptop A angle
    const currentAngleA = THREE.MathUtils.radToDeg(-(laptopA.hingePivot.rotation.x + Math.PI));
    const targetA = state.laptopA.targetAngle;
    if (Math.abs(currentAngleA - targetA) > 0.1) {
        const newAngle = THREE.MathUtils.lerp(currentAngleA, targetA, lerpFactor);
        setScreenAngle(laptopA, newAngle);
    } else {
        setScreenAngle(laptopA, targetA);
    }

    // Laptop B angle
    const currentAngleB = THREE.MathUtils.radToDeg(-(laptopB.hingePivot.rotation.x + Math.PI));
    const targetB = state.laptopB.targetAngle;
    if (Math.abs(currentAngleB - targetB) > 0.1) {
        const newAngle = THREE.MathUtils.lerp(currentAngleB, targetB, lerpFactor);
        setScreenAngle(laptopB, newAngle);
    } else {
        setScreenAngle(laptopB, targetB);
    }

    // Highlight animation
    highlightTime += delta;
    const pulseOpacity = 0.15 + 0.1 * Math.sin(highlightTime * 3);

    if (state.selectedLaptop === 'A') {
        laptopA.highlightMat.opacity = pulseOpacity;
        laptopA.highlightMat.color.set(0x4a9eff);
        laptopB.highlightMat.opacity = 0;
    } else {
        laptopB.highlightMat.opacity = pulseOpacity;
        laptopB.highlightMat.color.set(0x4a9eff);
        laptopA.highlightMat.opacity = 0;
    }

    // Screen glow pulse for selected
    const selectedLaptop = getSelectedLaptopObj();
    const baseIntensity = BRIGHTNESS_MAP[getSelectedState().brightness] || 0.3;
    selectedLaptop.screenMat.emissiveIntensity = baseIntensity + 0.05 * Math.sin(elapsed * 2);

    updateGlobalState();
    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
updateUIFromState();
updateGlobalState();
animate();

</script>
</body>
</html>
