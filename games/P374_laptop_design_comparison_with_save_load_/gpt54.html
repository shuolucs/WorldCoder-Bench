<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laptop Comparator</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #uiPanel {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 250px;
      padding: 16px;
      background: rgba(10, 12, 20, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #uiPanel h2 {
      margin: 0 0 14px 0;
      font-size: 20px;
      font-weight: 700;
    }

    .control-group {
      margin-bottom: 14px;
    }

    .control-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #d9def7;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    input[type="range"] {
      width: 100%;
    }

    input[type="color"],
    select,
    button {
      width: 100%;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      padding: 8px 10px;
      box-sizing: border-box;
    }

    input[type="color"] {
      height: 40px;
      padding: 4px;
    }

    button {
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
      margin-bottom: 8px;
    }

    button:hover {
      background: rgba(255,255,255,0.16);
    }

    button:active {
      transform: scale(0.99);
    }

    #statusText {
      font-size: 12px;
      color: #b8c4ff;
      min-height: 18px;
      margin-top: 8px;
    }

    .hint {
      font-size: 11px;
      color: #9aa5d8;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="uiPanel">
      <h2>Laptop Comparator</h2>

      <div class="control-group">
        <label>Active Laptop</label>
        <div class="row">
          <input type="radio" id="radioA" name="activeLaptop" value="A" checked />
          <label for="radioA" style="margin:0;">Laptop A</label>
        </div>
        <div class="row">
          <input type="radio" id="radioB" name="activeLaptop" value="B" />
          <label for="radioB" style="margin:0;">Laptop B</label>
        </div>
      </div>

      <div class="control-group">
        <label for="angleSlider">Screen Angle: <span id="angleValue">110</span>°</label>
        <input id="angleSlider" type="range" min="0" max="180" step="1" value="110" />
      </div>

      <div class="control-group">
        <label for="colorPicker">Base Color</label>
        <input id="colorPicker" type="color" value="#333333" />
      </div>

      <div class="control-group">
        <label for="brightnessSelect">Screen Brightness</label>
        <select id="brightnessSelect">
          <option value="Low">Low</option>
          <option value="Medium" selected>Medium</option>
          <option value="High">High</option>
        </select>
      </div>

      <div class="control-group">
        <button id="saveBtn">Save State</button>
        <button id="loadBtn">Load State</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div id="statusText">Ready.</div>
      <div class="hint">Tip: Click a laptop in the 3D scene to select it.</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const angleSlider = document.getElementById('angleSlider');
    const angleValue = document.getElementById('angleValue');
    const colorPicker = document.getElementById('colorPicker');
    const brightnessSelect = document.getElementById('brightnessSelect');
    const radioA = document.getElementById('radioA');
    const radioB = document.getElementById('radioB');
    const saveBtn = document.getElementById('saveBtn');
    const loadBtn = document.getElementById('loadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusText = document.getElementById('statusText');

    const STORAGE_KEY = 'laptopCompareState';

    const scene = new THREE.Scene();
    scene.background = null;
    scene.fog = new THREE.Fog(0x16213e, 12, 28);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;
    controls.minDistance = 4;
    controls.maxDistance = 20;
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const warmLight = new THREE.DirectionalLight(0xfff5e6, 0.8);
    warmLight.position.set(5, 10, 5);
    scene.add(warmLight);

    const coolLight = new THREE.DirectionalLight(0xe6f0ff, 0.3);
    coolLight.position.set(-5, 5, -5);
    scene.add(coolLight);

    const gridCanvas = document.createElement('canvas');
    gridCanvas.width = 512;
    gridCanvas.height = 512;
    const gctx = gridCanvas.getContext('2d');
    gctx.fillStyle = '#1a2238';
    gctx.fillRect(0, 0, 512, 512);
    gctx.strokeStyle = 'rgba(200,220,255,0.10)';
    gctx.lineWidth = 1;
    for (let i = 0; i <= 16; i++) {
      const p = (512 / 16) * i;
      gctx.beginPath(); gctx.moveTo(p, 0); gctx.lineTo(p, 512); gctx.stroke();
      gctx.beginPath(); gctx.moveTo(0, p); gctx.lineTo(512, p); gctx.stroke();
    }
    const gridTexture = new THREE.CanvasTexture(gridCanvas);
    gridTexture.wrapS = gridTexture.wrapT = THREE.RepeatWrapping;
    gridTexture.repeat.set(8, 8);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({
        color: 0x1b2336,
        map: gridTexture,
        roughness: 0.95,
        metalness: 0.05
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const brightnessMap = {
      Low: 0.1,
      Medium: 0.3,
      High: 0.6
    };

    function clampAngle(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return 110;
      return Math.max(0, Math.min(180, n));
    }

    function safeHex(hex, fallback = '#333333') {
      if (typeof hex !== 'string') return fallback;
      const ok = /^#([0-9a-fA-F]{6})$/.test(hex);
      return ok ? hex.toLowerCase() : fallback;
    }

    function safeBrightness(v) {
      return brightnessMap[v] !== undefined ? v : 'Medium';
    }

    function setStatus(text, action = '') {
      statusText.textContent = text;
      window.__3D_STATE__.lastAction = action || text;
      window.__3D_STATE__.savedStateExists = !!localStorage.getItem(STORAGE_KEY);
    }

    function createLaptop(config) {
      const group = new THREE.Group();
      group.position.set(config.x, 0, 0);

      const baseMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(config.baseColor),
        roughness: 0.55,
        metalness: config.name === 'B' ? 0.45 : 0.15
      });

      const screenMat = new THREE.MeshStandardMaterial({
        color: 0x111111,
        emissive: new THREE.Color('#1a1a3e'),
        emissiveIntensity: brightnessMap[config.brightness],
        roughness: 0.35,
        metalness: 0.1
      });

      const base = new THREE.Mesh(
        new THREE.BoxGeometry(config.baseW, config.baseH, config.baseD),
        baseMat
      );
      base.position.y = config.baseH / 2;
      base.castShadow = false;
      base.receiveShadow = true;
      group.add(base);

      const hinge = new THREE.Group();
      hinge.position.set(0, config.baseH / 2, -config.baseD / 2);
      group.add(hinge);

      const screen = new THREE.Mesh(
        new THREE.BoxGeometry(config.screenW, config.screenH, config.screenT),
        screenMat
      );
      screen.position.set(0, config.screenH / 2, -config.screenT / 2);
      hinge.add(screen);

      const keyboard = new THREE.Mesh(
        new THREE.BoxGeometry(config.baseW * 0.82, 0.01, config.baseD * 0.55),
        new THREE.MeshStandardMaterial({
          color: config.name === 'B' ? 0x9a9a9a : 0x222222,
          roughness: 0.8,
          metalness: 0.05
        })
      );
      keyboard.position.set(0, config.baseH / 2 + 0.006, 0.15);
      group.add(keyboard);

      const trackpad = new THREE.Mesh(
        new THREE.BoxGeometry(config.baseW * 0.26, 0.008, config.baseD * 0.18),
        new THREE.MeshStandardMaterial({
          color: config.name === 'B' ? 0xaaaaaa : 0x444444,
          roughness: 0.6
        })
      );
      trackpad.position.set(0, config.baseH / 2 + 0.007, 0.58);
      group.add(trackpad);

      const highlight = new THREE.Mesh(
        new THREE.BoxGeometry(config.baseW + 0.06, config.baseH + 0.04, config.baseD + 0.06),
        new THREE.MeshBasicMaterial({
          color: 0x6ea8ff,
          wireframe: true,
          transparent: true,
          opacity: 0
        })
      );
      highlight.position.copy(base.position);
      group.add(highlight);

      base.userData.laptopId = config.name;
      screen.userData.laptopId = config.name;
      keyboard.userData.laptopId = config.name;
      trackpad.userData.laptopId = config.name;

      const laptop = {
        id: config.name,
        group,
        base,
        screen,
        hinge,
        highlight,
        currentAngle: clampAngle(config.angle),
        targetAngle: clampAngle(config.angle),
        baseColor: safeHex(config.baseColor, '#333333'),
        brightness: safeBrightness(config.brightness),
        defaultBaseColor: safeHex(config.baseColor, '#333333'),
        defaultAngle: clampAngle(config.angle),
        defaultBrightness: safeBrightness(config.brightness)
      };

      updateLaptopVisuals(laptop);
      return laptop;
    }

    function angleDegToRadForHinge(angleDeg) {
      const a = clampAngle(angleDeg);
      return THREE.MathUtils.degToRad(180 - a);
    }

    function updateLaptopVisuals(laptop) {
      laptop.base.material.color.set(laptop.baseColor);
      laptop.screen.material.emissive.set('#1a1a3e');
      laptop.screen.material.emissiveIntensity = brightnessMap[laptop.brightness];
      laptop.hinge.rotation.x = angleDegToRadForHinge(laptop.currentAngle);
    }

    const laptopA = createLaptop({
      name: 'A',
      x: -2.5,
      baseW: 3,
      baseH: 0.15,
      baseD: 2,
      screenW: 2.8,
      screenH: 1.8,
      screenT: 0.05,
      baseColor: '#333333',
      angle: 110,
      brightness: 'Medium'
    });

    const laptopB = createLaptop({
      name: 'B',
      x: 2.5,
      baseW: 3.2,
      baseH: 0.12,
      baseD: 2.1,
      screenW: 3.0,
      screenH: 1.9,
      screenT: 0.04,
      baseColor: '#c0c0c0',
      angle: 110,
      brightness: 'Medium'
    });

    scene.add(laptopA.group);
    scene.add(laptopB.group);

    let mascot = null;
    let mascotPivot = new THREE.Group();
    mascotPivot.position.set(0, 0, -2);
    scene.add(mascotPivot);

    const loader = new GLTFLoader();
    loader.load(
      'stork.glb',
      (gltf) => {
        mascot = gltf.scene;
        const box = new THREE.Box3().setFromObject(mascot);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 0.5 / maxDim;
        mascot.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(mascot);
        const center = new THREE.Vector3();
        box2.getCenter(center);
        mascot.position.sub(center);

        const box3 = new THREE.Box3().setFromObject(mascot);
        const minY = box3.min.y;
        mascot.position.y -= minY;

        mascotPivot.add(mascot);
        window.__3D_STATE__.mascotLoaded = true;
        setStatus('Mascot loaded.', 'mascot_loaded');
      },
      undefined,
      () => {
        window.__3D_STATE__.mascotLoaded = false;
        setStatus('Mascot failed to load.', 'mascot_failed');
      }
    );

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const defaults = {
      selectedLaptop: 'A',
      A: { angle: 110, baseColor: '#333333', brightness: 'Medium' },
      B: { angle: 110, baseColor: '#c0c0c0', brightness: 'Medium' }
    };

    window.__3D_STATE__ = {
      selectedLaptop: 'A',
      laptopA_screenAngle: 110,
      laptopB_screenAngle: 110,
      laptopA_baseColor: '#333333',
      laptopB_baseColor: '#c0c0c0',
      laptopA_brightness: 'Medium',
      laptopB_brightness: 'Medium',
      savedStateExists: !!localStorage.getItem(STORAGE_KEY),
      lastAction: 'initialized',
      mascotLoaded: false,
      mascotRotationY: 0,
      cameraDistance: Number(camera.position.length()) || 0
    };

    function getLaptop(id) {
      return id === 'B' ? laptopB : laptopA;
    }

    function syncState() {
      window.__3D_STATE__.selectedLaptop = radioB.checked ? 'B' : 'A';
      window.__3D_STATE__.laptopA_screenAngle = Number.isFinite(laptopA.targetAngle) ? laptopA.targetAngle : 110;
      window.__3D_STATE__.laptopB_screenAngle = Number.isFinite(laptopB.targetAngle) ? laptopB.targetAngle : 110;
      window.__3D_STATE__.laptopA_baseColor = safeHex(laptopA.baseColor, '#333333');
      window.__3D_STATE__.laptopB_baseColor = safeHex(laptopB.baseColor, '#c0c0c0');
      window.__3D_STATE__.laptopA_brightness = safeBrightness(laptopA.brightness);
      window.__3D_STATE__.laptopB_brightness = safeBrightness(laptopB.brightness);
      window.__3D_STATE__.savedStateExists = !!localStorage.getItem(STORAGE_KEY);
      window.__3D_STATE__.mascotRotationY = Number.isFinite(mascotPivot.rotation.y) ? mascotPivot.rotation.y : 0;
      window.__3D_STATE__.cameraDistance = Number.isFinite(camera.position.distanceTo(new THREE.Vector3(0,0,0)))
        ? camera.position.distanceTo(new THREE.Vector3(0,0,0))
        : 0;
    }

    function updateUIForSelectedLaptop() {
      const selected = getLaptop(window.__3D_STATE__.selectedLaptop);
      angleSlider.value = String(clampAngle(selected.targetAngle));
      angleValue.textContent = String(clampAngle(selected.targetAngle));
      colorPicker.value = safeHex(selected.baseColor, '#333333');
      brightnessSelect.value = safeBrightness(selected.brightness);
    }

    function selectLaptop(id) {
      const targetId = id === 'B' ? 'B' : 'A';
      radioA.checked = targetId === 'A';
      radioB.checked = targetId === 'B';
      window.__3D_STATE__.selectedLaptop = targetId;
      updateUIForSelectedLaptop();
      syncState();
    }

    function applySelectedAngle(value) {
      const selected = getLaptop(window.__3D_STATE__.selectedLaptop);
      selected.targetAngle = clampAngle(value);
      angleSlider.value = String(selected.targetAngle);
      angleValue.textContent = String(selected.targetAngle);
      setStatus(`Angle changed for Laptop ${selected.id}.`, 'angle_changed');
      syncState();
    }

    function applySelectedColor(value) {
      const selected = getLaptop(window.__3D_STATE__.selectedLaptop);
      selected.baseColor = safeHex(value, selected.id === 'A' ? '#333333' : '#c0c0c0');
      selected.base.material.color.set(selected.baseColor);
      setStatus(`Color changed for Laptop ${selected.id}.`, 'color_changed');
      syncState();
    }

    function applySelectedBrightness(value) {
      const selected = getLaptop(window.__3D_STATE__.selectedLaptop);
      selected.brightness = safeBrightness(value);
      selected.screen.material.emissiveIntensity = brightnessMap[selected.brightness];
      setStatus(`Brightness changed for Laptop ${selected.id}.`, 'brightness_changed');
      syncState();
    }

    function serializeState() {
      return {
        selectedLaptop: window.__3D_STATE__.selectedLaptop,
        laptopA_screenAngle: clampAngle(laptopA.targetAngle),
        laptopB_screenAngle: clampAngle(laptopB.targetAngle),
        laptopA_baseColor: safeHex(laptopA.baseColor, '#333333'),
        laptopB_baseColor: safeHex(laptopB.baseColor, '#c0c0c0'),
        laptopA_brightness: safeBrightness(laptopA.brightness),
        laptopB_brightness: safeBrightness(laptopB.brightness)
      };
    }

    function applyState(data, actionName = 'loaded') {
      const selectedLaptop = data.selectedLaptop === 'B' ? 'B' : 'A';

      laptopA.targetAngle = clampAngle(data.laptopA_screenAngle);
      laptopB.targetAngle = clampAngle(data.laptopB_screenAngle);

      laptopA.baseColor = safeHex(data.laptopA_baseColor, '#333333');
      laptopB.baseColor = safeHex(data.laptopB_baseColor, '#c0c0c0');

      laptopA.brightness = safeBrightness(data.laptopA_brightness);
      laptopB.brightness = safeBrightness(data.laptopB_brightness);

      updateLaptopVisuals(laptopA);
      updateLaptopVisuals(laptopB);

      selectLaptop(selectedLaptop);
      syncState();
      window.__3D_STATE__.lastAction = actionName;
    }

    function resetState() {
      applyState({
        selectedLaptop: defaults.selectedLaptop,
        laptopA_screenAngle: defaults.A.angle,
        laptopB_screenAngle: defaults.B.angle,
        laptopA_baseColor: defaults.A.baseColor,
        laptopB_baseColor: defaults.B.baseColor,
        laptopA_brightness: defaults.A.brightness,
        laptopB_brightness: defaults.B.brightness
      }, 'reset');
      setStatus('Reset to defaults.', 'reset');
    }

    radioA.addEventListener('change', () => {
      if (radioA.checked) {
        selectLaptop('A');
        setStatus('Selected Laptop A.', 'selected_A');
      }
    });

    radioB.addEventListener('change', () => {
      if (radioB.checked) {
        selectLaptop('B');
        setStatus('Selected Laptop B.', 'selected_B');
      }
    });

    angleSlider.addEventListener('input', (e) => {
      applySelectedAngle(e.target.value);
    });

    colorPicker.addEventListener('input', (e) => {
      applySelectedColor(e.target.value);
    });

    brightnessSelect.addEventListener('change', (e) => {
      applySelectedBrightness(e.target.value);
    });

    saveBtn.addEventListener('click', () => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeState()));
        syncState();
        setStatus('State saved.', 'saved');
      } catch (err) {
        setStatus('Save failed.', 'save_failed');
      }
    });

    loadBtn.addEventListener('click', () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          setStatus('No saved state found.', 'load_missing');
          syncState();
          return;
        }
        const parsed = JSON.parse(raw);
        applyState(parsed, 'loaded');
        setStatus('State loaded.', 'loaded');
      } catch (err) {
        setStatus('Load failed.', 'load_failed');
      }
    });

    resetBtn.addEventListener('click', () => {
      resetState();
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects([laptopA.group, laptopB.group], true);

      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj) {
          if (obj.userData && obj.userData.laptopId) {
            selectLaptop(obj.userData.laptopId);
            setStatus(`Selected Laptop ${obj.userData.laptopId} from scene.`, `selected_${obj.userData.laptopId}`);
            break;
          }
          obj = obj.parent;
        }
      }
    });

    function updateHighlights(time) {
      const pulse = 0.18 + 0.10 * (0.5 + 0.5 * Math.sin(time * 3.0));
      laptopA.highlight.material.opacity = window.__3D_STATE__.selectedLaptop === 'A' ? pulse : 0.0;
      laptopB.highlight.material.opacity = window.__3D_STATE__.selectedLaptop === 'B' ? pulse : 0.0;

      laptopA.screen.material.emissiveIntensity = brightnessMap[laptopA.brightness] + (window.__3D_STATE__.selectedLaptop === 'A' ? 0.04 : 0);
      laptopB.screen.material.emissiveIntensity = brightnessMap[laptopB.brightness] + (window.__3D_STATE__.selectedLaptop === 'B' ? 0.04 : 0);
    }

    function animateScreen(laptop, dt) {
      const speed = 1 - Math.exp(-dt / 0.3);
      laptop.currentAngle = THREE.MathUtils.lerp(laptop.currentAngle, laptop.targetAngle, speed);
      laptop.currentAngle = clampAngle(laptop.currentAngle);
      laptop.hinge.rotation.x = angleDegToRadForHinge(laptop.currentAngle);
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.max(0.0001, clock.getDelta());
      const elapsed = clock.elapsedTime;

      controls.update();

      animateScreen(laptopA, dt);
      animateScreen(laptopB, dt);

      mascotPivot.rotation.y += 0.5 * dt;
      if (!Number.isFinite(mascotPivot.rotation.y)) mascotPivot.rotation.y = 0;

      updateHighlights(elapsed);
      syncState();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    selectLaptop('A');
    updateLaptopVisuals(laptopA);
    updateLaptopVisuals(laptopB);
    syncState();
    setStatus('Ready.', 'ready');
    animate();
  </script>
</body>
</html>
