<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Comparator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        #webgl-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(5px);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #e6f0ff;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 0.85rem;
            color: #aaaaaa;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .radio-group label {
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        input[type="color"] {
            width: 100%;
            height: 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }
        select {
            width: 100%;
            padding: 5px;
            background: #2a2a3e;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
        }
        button {
            padding: 8px 12px;
            background: #3a3a5e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #4a4a7e;
        }
        #saveBtn { background: #2e7d32; }
        #saveBtn:hover { background: #388e3c; }
        #loadBtn { background: #1565c0; }
        #loadBtn:hover { background: #1e88e5; }
        #resetBtn { background: #c62828; }
        #resetBtn:hover { background: #d32f2f; }
        
        #statusText {
            margin-top: auto;
            font-size: 0.8rem;
            color: #88ff88;
            min-height: 1.2em;
            text-align: center;
        }
        .value-display {
            float: right;
            color: #fff;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-panel">
        <h2>Laptop Comparator</h2>
        
        <div class="radio-group">
            <label><input type="radio" name="laptopSelect" value="A" checked> Laptop A</label>
            <label><input type="radio" name="laptopSelect" value="B"> Laptop B</label>
        </div>

        <div class="control-group">
            <label>Screen Angle <span id="angleVal" class="value-display">110°</span></label>
            <input type="range" id="angleSlider" min="0" max="180" value="110">
        </div>

        <div class="control-group">
            <label>Base Color</label>
            <input type="color" id="colorPicker" value="#333333">
        </div>

        <div class="control-group">
            <label>Screen Brightness</label>
            <select id="brightnessSelect">
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <hr style="border-color: rgba(255,255,255,0.1); width: 100%; margin: 10px 0;">

        <button id="saveBtn">Save State</button>
        <button id="loadBtn">Load State</button>
        <button id="resetBtn">Reset</button>

        <div id="statusText"></div>
    </div>

    <canvas id="webgl-canvas"></canvas>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        const DEFAULT_STATE = {
            selectedLaptop: 'A',
            laptopA_screenAngle: 110,
            laptopB_screenAngle: 110,
            laptopA_baseColor: '#333333',
            laptopB_baseColor: '#c0c0c0',
            laptopA_brightness: 'Medium',
            laptopB_brightness: 'Medium',
            savedStateExists: localStorage.getItem('laptopCompareState') !== null,
            lastAction: 'initialized',
            mascotLoaded: false,
            mascotRotationY: 0,
            cameraDistance: 8
        };

        window.__3D_STATE__ = { ...DEFAULT_STATE };

        // --- SCENE SETUP ---
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xfff5e6, 0.8);
        dirLight1.position.set(5, 10, 5);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xe6f0ff, 0.3);
        dirLight2.position.set(-5, 5, -5);
        scene.add(dirLight2);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111, depthWrite: false });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- LAPTOP CREATION ---
        const laptops = {};

        function createLaptop(id, x, baseW, baseH, baseD, screenW, screenH, screenD) {
            const group = new THREE.Group();
            group.position.set(x, 0, 0);
            group.userData.isLaptop = true;
            group.userData.id = id;

            // Base
            const baseGeo = new THREE.BoxGeometry(baseW, baseH, baseD);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = baseH / 2;
            group.add(base);

            // Pivot (Hinge)
            const pivot = new THREE.Group();
            pivot.position.set(0, baseH, -baseD / 2);
            group.add(pivot);

            // Screen
            const screenGeo = new THREE.BoxGeometry(screenW, screenH, screenD);
            const screenMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const screenFrontMat = new THREE.MeshStandardMaterial({ 
                color: 0x000000, 
                emissive: 0x1a1a3e, 
                emissiveIntensity: 0.3 
            });
            // Materials: right, left, top, bottom, front(+z), back(-z)
            const materials = [screenMat, screenMat, screenMat, screenMat, screenFrontMat, screenMat];
            const screen = new THREE.Mesh(screenGeo, materials);
            // Position screen so its bottom edge is at pivot
            screen.position.set(0, screenH / 2, screenD / 2);
            pivot.add(screen);

            // Highlight Edges
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2, transparent: true, opacity: 0.8 });
            const baseEdges = new THREE.LineSegments(new THREE.EdgesGeometry(baseGeo), edgeMat);
            base.add(baseEdges);
            const screenEdges = new THREE.LineSegments(new THREE.EdgesGeometry(screenGeo), edgeMat);
            screen.add(screenEdges);
            baseEdges.visible = false;
            screenEdges.visible = false;

            scene.add(group);

            return {
                group, base, pivot, screen, baseEdges, screenEdges,
                targetAngle: 110,
                currentAngle: 110,
                setHighlight: function(active) {
                    this.baseEdges.visible = active;
                    this.screenEdges.visible = active;
                },
                setColor: function(hex) {
                    this.base.material.color.set(hex);
                    this.screen.material[0].color.set(hex);
                    this.screen.material[1].color.set(hex);
                    this.screen.material[2].color.set(hex);
                    this.screen.material[3].color.set(hex);
                    this.screen.material[5].color.set(hex);
                },
                setBrightness: function(level) {
                    const intensity = level === 'Low' ? 0.1 : level === 'High' ? 0.6 : 0.3;
                    this.screen.material[4].emissiveIntensity = intensity;
                },
                updateRotation: function() {
                    // Angle 0 = closed (rotation.x = PI/2)
                    // Angle 180 = flat (rotation.x = -PI/2)
                    this.pivot.rotation.x = (90 - this.currentAngle) * Math.PI / 180;
                }
            };
        }

        laptops['A'] = createLaptop('A', -2.5, 3, 0.15, 2, 2.8, 1.8, 0.05);
        laptops['B'] = createLaptop('B', 2.5, 3.2, 0.12, 2.1, 3.0, 1.9, 0.04);

        // --- BRAND MASCOT ---
        let mascot;
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Stork.glb', (gltf) => {
            mascot = gltf.scene;
            
            // Calculate bounding box to scale to ~0.5 units tall
            const box = new THREE.Box3().setFromObject(mascot);
            const size = box.getSize(new THREE.Vector3());
            const scale = 0.5 / size.y;
            mascot.scale.set(scale, scale, scale);
            
            // Center and position
            mascot.position.set(0, 0, -2);
            
            // Adjust materials for better look
            mascot.traverse((child) => {
                if (child.isMesh) {
                    child.material.side = THREE.DoubleSide;
                }
            });

            scene.add(mascot);
            window.__3D_STATE__.mascotLoaded = true;
        });

        // --- UI & INTERACTION LOGIC ---
        const ui = {
            radios: document.querySelectorAll('input[name="laptopSelect"]'),
            angleSlider: document.getElementById('angleSlider'),
            angleVal: document.getElementById('angleVal'),
            colorPicker: document.getElementById('colorPicker'),
            brightnessSelect: document.getElementById('brightnessSelect'),
            saveBtn: document.getElementById('saveBtn'),
            loadBtn: document.getElementById('loadBtn'),
            resetBtn: document.getElementById('resetBtn'),
            statusText: document.getElementById('statusText')
        };

        let statusTimeout;
        function setStatus(msg) {
            ui.statusText.textContent = msg;
            window.__3D_STATE__.lastAction = msg;
            clearTimeout(statusTimeout);
            statusTimeout = setTimeout(() => { ui.statusText.textContent = ''; }, 3000);
        }

        function applyStateToModels() {
            const state = window.__3D_STATE__;
            
            laptops['A'].targetAngle = state.laptopA_screenAngle;
            laptops['A'].setColor(state.laptopA_baseColor);
            laptops['A'].setBrightness(state.laptopA_brightness);
            
            laptops['B'].targetAngle = state.laptopB_screenAngle;
            laptops['B'].setColor(state.laptopB_baseColor);
            laptops['B'].setBrightness(state.laptopB_brightness);

            laptops['A'].setHighlight(state.selectedLaptop === 'A');
            laptops['B'].setHighlight(state.selectedLaptop === 'B');
        }

        function updateUIFromState() {
            const state = window.__3D_STATE__;
            const sel = state.selectedLaptop;
            
            ui.radios.forEach(r => r.checked = (r.value === sel));
            
            const angle = state[`laptop${sel}_screenAngle`];
            ui.angleSlider.value = angle;
            ui.angleVal.textContent = angle + '°';
            
            ui.colorPicker.value = state[`laptop${sel}_baseColor`];
            ui.brightnessSelect.value = state[`laptop${sel}_brightness`];

            ui.loadBtn.disabled = !state.savedStateExists;
            ui.loadBtn.style.opacity = state.savedStateExists ? '1' : '0.5';
        }

        function handleSelectionChange(id) {
            window.__3D_STATE__.selectedLaptop = id;
            updateUIFromState();
            applyStateToModels();
            setStatus(`Selected Laptop ${id}`);
        }

        // UI Event Listeners
        ui.radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                handleSelectionChange(e.target.value);
            });
        });

        ui.angleSlider.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value);
            if (isNaN(val)) val = 110;
            val = Math.max(0, Math.min(180, val)); // Clamp
            
            const sel = window.__3D_STATE__.selectedLaptop;
            window.__3D_STATE__[`laptop${sel}_screenAngle`] = val;
            ui.angleVal.textContent = val + '°';
            laptops[sel].targetAngle = val;
            window.__3D_STATE__.lastAction = 'angle_changed';
        });

        ui.colorPicker.addEventListener('input', (e) => {
            const val = e.target.value;
            const sel = window.__3D_STATE__.selectedLaptop;
            window.__3D_STATE__[`laptop${sel}_baseColor`] = val;
            laptops[sel].setColor(val);
            window.__3D_STATE__.lastAction = 'color_changed';
        });

        ui.brightnessSelect.addEventListener('change', (e) => {
            const val = e.target.value;
            const sel = window.__3D_STATE__.selectedLaptop;
            window.__3D_STATE__[`laptop${sel}_brightness`] = val;
            laptops[sel].setBrightness(val);
            window.__3D_STATE__.lastAction = 'brightness_changed';
        });

        ui.saveBtn.addEventListener('click', () => {
            const stateToSave = {
                laptopA_screenAngle: window.__3D_STATE__.laptopA_screenAngle,
                laptopB_screenAngle: window.__3D_STATE__.laptopB_screenAngle,
                laptopA_baseColor: window.__3D_STATE__.laptopA_baseColor,
                laptopB_baseColor: window.__3D_STATE__.laptopB_baseColor,
                laptopA_brightness: window.__3D_STATE__.laptopA_brightness,
                laptopB_brightness: window.__3D_STATE__.laptopB_brightness
            };
            localStorage.setItem('laptopCompareState', JSON.stringify(stateToSave));
            window.__3D_STATE__.savedStateExists = true;
            updateUIFromState();
            setStatus('State Saved');
        });

        ui.loadBtn.addEventListener('click', () => {
            const saved = localStorage.getItem('laptopCompareState');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    Object.assign(window.__3D_STATE__, parsed);
                    updateUIFromState();
                    applyStateToModels();
                    setStatus('State Loaded');
                } catch (e) {
                    setStatus('Error loading state');
                }
            }
        });

        ui.resetBtn.addEventListener('click', () => {
            Object.assign(window.__3D_STATE__, {
                laptopA_screenAngle: DEFAULT_STATE.laptopA_screenAngle,
                laptopB_screenAngle: DEFAULT_STATE.laptopB_screenAngle,
                laptopA_baseColor: DEFAULT_STATE.laptopA_baseColor,
                laptopB_baseColor: DEFAULT_STATE.laptopB_baseColor,
                laptopA_brightness: DEFAULT_STATE.laptopA_brightness,
                laptopB_brightness: DEFAULT_STATE.laptopB_brightness
            });
            updateUIFromState();
            applyStateToModels();
            setStatus('Reset to Defaults');
        });

        // Raycasting for selection
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI panel
            if (event.clientX < 250) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            const intersectableObjects = [laptops['A'].group, laptops['B'].group];
            const intersects = raycaster.intersectObjects(intersectableObjects, true);

            if (intersects.length > 0) {
                // Find root laptop group
                let object = intersects[0].object;
                while (object.parent && !object.userData.isLaptop) {
                    object = object.parent;
                }
                if (object.userData.isLaptop) {
                    handleSelectionChange(object.userData.id);
                }
            }
        });

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- INITIALIZATION ---
        applyStateToModels();
        updateUIFromState();

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            // Animate Mascot
            if (mascot) {
                mascot.rotation.y += 0.5 * delta;
                window.__3D_STATE__.mascotRotationY = mascot.rotation.y;
            }

            // Lerp Laptop Screens
            ['A', 'B'].forEach(id => {
                const laptop = laptops[id];
                // Smooth lerp: current += (target - current) * factor
                laptop.currentAngle += (laptop.targetAngle - laptop.currentAngle) * 10 * delta;
                laptop.updateRotation();
            });

            controls.update();
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
