<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Mini-Golf</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            z-index: 10;
        }
        .hud-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        #power-container {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }
        #powerBar {
            width: 30px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
        }
        #powerFill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, green, yellow, red);
            transition: height 0.1s;
        }
        #powerDisplay {
            color: white;
            text-shadow: 1px 1px 2px black;
            font-weight: bold;
            margin-top: 10px;
        }
        #resetBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #resetBtn:hover {
            background-color: #cc0000;
        }
        #messageOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 8px black;
            display: none;
            z-index: 20;
            text-align: center;
        }
        #controlsHelp {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div id="strokeDisplay" class="hud-text">Stroke: 0</div>
        <div id="scoreDisplay" class="hud-text">Score: 0/3</div>
    </div>

    <div id="power-container">
        <div id="powerBar">
            <div id="powerFill"></div>
        </div>
        <div id="powerDisplay">Power: 50%</div>
    </div>

    <button id="resetBtn">Reset Game</button>

    <div id="messageOverlay"></div>

    <div id="controlsHelp">
        Left/Right: Aim | Up/Down: Power | Space: Putt
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            ballPosition: { x: 0, y: 0.1, z: 5 },
            ballVelocity: { x: 0, y: 0, z: 0 },
            aimAngle: 0,
            power: 50,
            strokeCount: 0,
            score: 0,
            holesPlayed: 0,
            ballMoving: false,
            gameOver: false,
            obstacleLoaded: false,
            holeSunk: false
        };

        const state = window.__3D_STATE__;
        let isResetting = false;

        // --- DOM Elements ---
        const strokeDisplay = document.getElementById('strokeDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const powerDisplay = document.getElementById('powerDisplay');
        const powerFill = document.getElementById('powerFill');
        const messageOverlay = document.getElementById('messageOverlay');
        const resetBtn = document.getElementById('resetBtn');

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- Objects ---
        // Ground
        const groundGeo = new THREE.PlaneGeometry(6, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4e });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Walls
        const wallGeo = new THREE.BoxGeometry(0.1, 0.3, 20);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        
        const leftWall = new THREE.Mesh(wallGeo, wallMat);
        leftWall.position.set(-3, 0.15, 0);
        leftWall.castShadow = true;
        leftWall.receiveShadow = true;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(wallGeo, wallMat);
        rightWall.position.set(3, 0.15, 0);
        rightWall.castShadow = true;
        rightWall.receiveShadow = true;
        scene.add(rightWall);

        // Hole
        const holeGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.05, 32);
        const holeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const hole = new THREE.Mesh(holeGeo, holeMat);
        hole.position.set(0, 0.01, -7);
        scene.add(hole);

        // Ball
        const ballRadius = 0.1;
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.set(0, ballRadius, 5);
        ball.castShadow = true;
        scene.add(ball);

        // Aim Arrow
        const arrowDir = new THREE.Vector3(0, 0, -1);
        const arrowOrigin = ball.position.clone();
        const arrowLength = 1.5;
        const arrowColor = 0xffff00;
        const arrowHelper = new THREE.ArrowHelper(arrowDir, arrowOrigin, arrowLength, arrowColor);
        scene.add(arrowHelper);

        // Obstacle
        const obstaclePos = new THREE.Vector3(2, 0, -3);
        const obstacleRadius = 0.6;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/MosquitoInAmber/glTF-Binary/MosquitoInAmber.glb',
            function (gltf) {
                const model = gltf.scene;
                model.scale.set(0.5, 0.5, 0.5);
                model.position.copy(obstaclePos);
                
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                scene.add(model);
                state.obstacleLoaded = true;
            },
            undefined,
            function (error) {
                console.error('Error loading model:', error);
                // Fallback obstacle if loading fails
                const fbGeo = new THREE.SphereGeometry(obstacleRadius, 16, 16);
                const fbMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
                const fbMesh = new THREE.Mesh(fbGeo, fbMat);
                fbMesh.position.copy(obstaclePos);
                fbMesh.castShadow = true;
                scene.add(fbMesh);
                state.obstacleLoaded = true;
            }
        );

        // --- Input Handling ---
        const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };

        window.addEventListener('keydown', (e) => {
            if (state.gameOver || isResetting) return;

            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = true;
            }

            if (e.code === 'Space' && !state.ballMoving) {
                launchBall();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = false;
            }
        });

        function handleContinuousInput() {
            if (state.gameOver || isResetting || state.ballMoving) return;

            if (keys.ArrowLeft) state.aimAngle += 2;
            if (keys.ArrowRight) state.aimAngle -= 2;
            
            if (keys.ArrowUp) {
                state.power = Math.min(100, state.power + 2);
                updatePowerUI();
            }
            if (keys.ArrowDown) {
                state.power = Math.max(0, state.power - 2);
                updatePowerUI();
            }
        }

        function updatePowerUI() {
            powerFill.style.height = `${state.power}%`;
            powerDisplay.innerText = `Power: ${Math.floor(state.power)}%`;
        }

        function launchBall() {
            state.ballMoving = true;
            state.strokeCount++;
            strokeDisplay.innerText = `Stroke: ${state.strokeCount}`;
            
            const rad = state.aimAngle * Math.PI / 180;
            const dirX = -Math.sin(rad);
            const dirZ = -Math.cos(rad);
            
            const maxSpeed = 0.3;
            const speed = (state.power / 100) * maxSpeed;
            
            state.ballVelocity.x = dirX * speed;
            state.ballVelocity.z = dirZ * speed;
            state.ballVelocity.y = 0;
            
            arrowHelper.visible = false;
        }

        // --- Game Logic ---
        function resetBall() {
            ball.position.set(0, ballRadius, 5);
            state.ballVelocity = { x: 0, y: 0, z: 0 };
            state.ballMoving = false;
            state.aimAngle = 0;
            arrowHelper.visible = true;
            updateArrow();
        }

        function resetGame() {
            state.strokeCount = 0;
            state.score = 0;
            state.holesPlayed = 0;
            state.gameOver = false;
            state.holeSunk = false;
            state.power = 50;
            isResetting = false;
            
            strokeDisplay.innerText = `Stroke: 0`;
            scoreDisplay.innerText = `Score: 0/3`;
            updatePowerUI();
            messageOverlay.style.display = 'none';
            
            resetBall();
        }

        resetBtn.addEventListener('click', resetGame);

        function updateArrow() {
            if (!state.ballMoving) {
                const rad = state.aimAngle * Math.PI / 180;
                arrowDir.set(-Math.sin(rad), 0, -Math.cos(rad)).normalize();
                arrowHelper.position.copy(ball.position);
                arrowHelper.setDirection(arrowDir);
            }
        }

        function handlePhysics() {
            if (!state.ballMoving) return;

            // Apply velocity
            ball.position.x += state.ballVelocity.x;
            ball.position.z += state.ballVelocity.z;

            // Apply friction
            state.ballVelocity.x *= 0.985;
            state.ballVelocity.z *= 0.985;

            const speedSq = state.ballVelocity.x ** 2 + state.ballVelocity.z ** 2;

            // Stop condition
            if (speedSq < 0.002 ** 2) {
                state.ballVelocity.x = 0;
                state.ballVelocity.z = 0;
                state.ballMoving = false;
                arrowHelper.visible = true;
                updateArrow();
            }

            // Wall Collision
            const wallLimit = 3 - 0.05 - ballRadius; // 2.85
            if (ball.position.x > wallLimit) {
                ball.position.x = wallLimit;
                state.ballVelocity.x *= -0.7;
            } else if (ball.position.x < -wallLimit) {
                ball.position.x = -wallLimit;
                state.ballVelocity.x *= -0.7;
            }

            // Obstacle Collision
            const dx = ball.position.x - obstaclePos.x;
            const dz = ball.position.z - obstaclePos.z;
            const distSq = dx * dx + dz * dz;
            const collisionDist = obstacleRadius + ballRadius; // 0.7

            if (distSq < collisionDist * collisionDist) {
                const dist = Math.sqrt(distSq);
                const nx = dx / dist;
                const nz = dz / dist;

                // Reflect velocity
                const dot = state.ballVelocity.x * nx + state.ballVelocity.z * nz;
                state.ballVelocity.x = (state.ballVelocity.x - 2 * dot * nx) * 0.7;
                state.ballVelocity.z = (state.ballVelocity.z - 2 * dot * nz) * 0.7;

                // Push out to prevent sticking
                ball.position.x = obstaclePos.x + nx * (collisionDist + 0.01);
                ball.position.z = obstaclePos.z + nz * (collisionDist + 0.01);
            }

            // Out of Bounds
            if (ball.position.z < -10 || ball.position.z > 10) {
                resetBall();
            }

            // Hole Collision
            const hx = ball.position.x - hole.position.x;
            const hz = ball.position.z - hole.position.z;
            const hDistSq = hx * hx + hz * hz;

            if (hDistSq < 0.25 * 0.25 && !isResetting) {
                sinkBall();
            }
        }

        function sinkBall() {
            isResetting = true;
            state.ballMoving = false;
            state.ballVelocity = { x: 0, y: 0, z: 0 };
            state.holeSunk = true;
            state.score++;
            
            // Visual sink effect
            ball.position.x = hole.position.x;
            ball.position.z = hole.position.z;
            ball.position.y = -0.05;

            messageOverlay.innerText = "Hole In!";
            messageOverlay.style.display = "block";

            setTimeout(() => {
                state.holesPlayed++;
                scoreDisplay.innerText = `Score: ${state.score}/3`;
                state.holeSunk = false;
                
                if (state.holesPlayed >= 3) {
                    state.gameOver = true;
                    messageOverlay.innerHTML = `Game Over<br>Final Score: ${state.score}<br>Strokes: ${state.strokeCount}`;
                } else {
                    messageOverlay.style.display = "none";
                    isResetting = false;
                    resetBall();
                }
            }, 2000);
        }

        function updateStateObject() {
            state.ballPosition.x = ball.position.x;
            state.ballPosition.y = ball.position.y;
            state.ballPosition.z = ball.position.z;
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            handleContinuousInput();
            handlePhysics();
            updateArrow();
            updateStateObject();

            renderer.render(scene, camera);
        }

        // Initialize UI and start
        updatePowerUI();
        animate();

    </script>
</body>
</html>
