<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Mini Golf</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      z-index: 10;
      text-shadow: 1px 1px 2px black;
    }

    #strokeDisplay, #scoreDisplay, #powerDisplay {
      margin-bottom: 8px;
      font-size: 20px;
    }

    #powerContainer {
      position: absolute;
      left: 10px;
      top: 100px;
      width: 30px;
      height: 200px;
      border: 2px solid white;
      background: rgba(255,255,255,0.15);
      z-index: 10;
    }

    #powerFill {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(to top, #ff3333, #ffff33, #33ff66);
    }

    #powerLabel {
      position: absolute;
      left: 50px;
      top: 180px;
      color: white;
      font-size: 18px;
      z-index: 10;
      text-shadow: 1px 1px 2px black;
    }

    #message {
      position: absolute;
      top: 40%;
      width: 100%;
      text-align: center;
      font-size: 48px;
      color: yellow;
      font-weight: bold;
      z-index: 20;
      text-shadow: 2px 2px 6px black;
      display: none;
    }

    #gameOverOverlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      color: white;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 30;
      text-align: center;
    }

    #gameOverOverlay h1 {
      font-size: 64px;
      margin: 0 0 20px 0;
    }

    #gameOverOverlay p {
      font-size: 28px;
      margin: 0 0 20px 0;
    }

    #resetBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="strokeDisplay">Stroke: 0</div>
    <div id="scoreDisplay">Score: 0/3</div>
  </div>

  <div id="powerContainer">
    <div id="powerFill"></div>
  </div>
  <div id="powerLabel">
    <div id="powerDisplay">Power: 0%</div>
  </div>

  <button id="resetBtn">Reset</button>

  <div id="message">Hole In!</div>

  <div id="gameOverOverlay">
    <h1>Game Over</h1>
    <p id="finalScore">Final Score: 0/3</p>
    <button id="resetBtnOverlay" style="padding:12px 20px;font-size:18px;cursor:pointer;">Play Again</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer;
    let ball, hole, aimArrow, obstacle;
    let leftWall, rightWall;

    const ballStart = new THREE.Vector3(0, 0.1, 5);
    const holePos = new THREE.Vector3(0, 0.01, -7);
    const obstaclePos = new THREE.Vector3(2, 0, -3);
    const obstacleRadius = 0.6;
    const ballRadius = 0.1;

    let ballVelocity = new THREE.Vector3(0, 0, 0);
    let aimAngle = 0;
    let power = 0;
    let strokeCount = 0;
    let score = 0;
    let holesPlayed = 0;
    let ballMoving = false;
    let gameOver = false;
    let obstacleLoaded = false;
    let holeSunk = false;

    const maxSpeed = 0.3;

    const strokeDisplay = document.getElementById('strokeDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const powerDisplay = document.getElementById('powerDisplay');
    const powerFill = document.getElementById('powerFill');
    const message = document.getElementById('message');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScore = document.getElementById('finalScore');
    const resetBtn = document.getElementById('resetBtn');
    const resetBtnOverlay = document.getElementById('resetBtnOverlay');

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 8, 10);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 10, 5);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 1024;
      dirLight.shadow.mapSize.height = 1024;
      scene.add(dirLight);

      const groundGeo = new THREE.PlaneGeometry(6, 20);
      const groundMat = new THREE.MeshStandardMaterial({ color: '#2d8a4e' });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      const holeGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.05, 32);
      const holeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
      hole = new THREE.Mesh(holeGeo, holeMat);
      hole.position.copy(holePos);
      hole.receiveShadow = true;
      scene.add(hole);

      const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
      const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
      ball = new THREE.Mesh(ballGeo, ballMat);
      ball.position.copy(ballStart);
      ball.castShadow = true;
      ball.receiveShadow = true;
      scene.add(ball);

      const wallGeo = new THREE.BoxGeometry(0.1, 0.3, 20);
      const wallMat = new THREE.MeshStandardMaterial({ color: '#8B4513' });

      leftWall = new THREE.Mesh(wallGeo, wallMat);
      leftWall.position.set(-3, 0.15, 0);
      leftWall.castShadow = true;
      leftWall.receiveShadow = true;
      scene.add(leftWall);

      rightWall = new THREE.Mesh(wallGeo, wallMat);
      rightWall.position.set(3, 0.15, 0);
      rightWall.castShadow = true;
      rightWall.receiveShadow = true;
      scene.add(rightWall);

      createAimArrow();
      loadObstacle();
      updateHUD();
      updateAimArrow();
      setupEvents();
      animate();
    }

    function createAimArrow() {
      const arrowGroup = new THREE.Group();

      const shaftGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.8, 8);
      const shaftMat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
      const shaft = new THREE.Mesh(shaftGeo, shaftMat);
      shaft.rotation.z = Math.PI / 2;
      shaft.position.x = 0.4;
      shaft.castShadow = true;

      const headGeo = new THREE.ConeGeometry(0.06, 0.2, 12);
      const headMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
      const head = new THREE.Mesh(headGeo, headMat);
      head.rotation.z = -Math.PI / 2;
      head.position.x = 0.9;
      head.castShadow = true;

      arrowGroup.add(shaft);
      arrowGroup.add(head);
      scene.add(arrowGroup);
      aimArrow = arrowGroup;
    }

    function loadObstacle() {
      const loader = new GLTFLoader();
      loader.load(
        'MosquitoInAmber.glb',
        (gltf) => {
          obstacle = gltf.scene;
          obstacle.scale.set(0.5, 0.5, 0.5);
          obstacle.position.copy(obstaclePos);
          obstacle.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });
          scene.add(obstacle);
          obstacleLoaded = true;
        },
        undefined,
        (error) => {
          console.warn('Failed to load MosquitoInAmber.glb:', error);
          obstacleLoaded = false;
        }
      );
    }

    function setupEvents() {
      window.addEventListener('resize', onWindowResize);

      window.addEventListener('keydown', (e) => {
        if (gameOver) return;

        switch (e.code) {
          case 'ArrowLeft':
            if (!ballMoving) {
              aimAngle += 2;
              updateAimArrow();
            }
            break;
          case 'ArrowRight':
            if (!ballMoving) {
              aimAngle -= 2;
              updateAimArrow();
            }
            break;
          case 'ArrowUp':
            if (!ballMoving) {
              power = Math.min(100, power + 5);
              updateHUD();
            }
            break;
          case 'ArrowDown':
            if (!ballMoving) {
              power = Math.max(0, power - 5);
              updateHUD();
            }
            break;
          case 'Space':
            e.preventDefault();
            launchBall();
            break;
        }
      });

      resetBtn.addEventListener('click', resetGame);
      resetBtnOverlay.addEventListener('click', resetGame);
    }

    function getAimDirection() {
      const rad = THREE.MathUtils.degToRad(aimAngle);
      return new THREE.Vector3(Math.sin(rad), 0, -Math.cos(rad)).normalize();
    }

    function updateAimArrow() {
      if (!aimArrow) return;

      const dir = getAimDirection();
      aimArrow.position.copy(ball.position);
      aimArrow.position.y = ball.position.y + 0.15;
      const yaw = Math.atan2(dir.x, dir.z);
      aimArrow.rotation.y = -yaw + Math.PI / 2;
      aimArrow.visible = !ballMoving && !gameOver;
    }

    function launchBall() {
      if (ballMoving || gameOver || power <= 0) return;

      const dir = getAimDirection();
      const speed = (power / 100) * maxSpeed;
      ballVelocity.copy(dir.multiplyScalar(speed));
      ballMoving = true;
      strokeCount++;
      updateHUD();
    }

    function updateHUD() {
      strokeDisplay.textContent = `Stroke: ${strokeCount}`;
      scoreDisplay.textContent = `Score: ${score}/3`;
      powerDisplay.textContent = `Power: ${power}%`;
      powerFill.style.height = `${power}%`;
    }

    function resetBall() {
      ball.position.copy(ballStart);
      ballVelocity.set(0, 0, 0);
      ballMoving = false;
      power = 0;
      updateHUD();
      updateAimArrow();
    }

    function showHoleMessage() {
      message.style.display = 'block';
      setTimeout(() => {
        message.style.display = 'none';
      }, 2000);
    }

    function sinkBall() {
      if (holeSunk || gameOver) return;

      holeSunk = true;
      score++;
      holesPlayed++;
      showHoleMessage();
      updateHUD();

      setTimeout(() => {
        if (holesPlayed >= 3) {
          gameOver = true;
          finalScore.textContent = `Final Score: ${score}/3`;
          gameOverOverlay.style.display = 'flex';
        } else {
          resetBall();
        }
        holeSunk = false;
      }, 2000);
    }

    function resetGame() {
      strokeCount = 0;
      score = 0;
      holesPlayed = 0;
      aimAngle = 0;
      power = 0;
      ballVelocity.set(0, 0, 0);
      ballMoving = false;
      gameOver = false;
      holeSunk = false;
      ball.position.copy(ballStart);
      message.style.display = 'none';
      gameOverOverlay.style.display = 'none';
      updateHUD();
      updateAimArrow();
    }

    function handlePhysics() {
      if (!ballMoving || holeSunk || gameOver) return;

      ball.position.add(ballVelocity);

      // Friction
      ballVelocity.multiplyScalar(0.985);

      // Wall collisions
      if (ball.position.x - ballRadius <= -2.95 && ballVelocity.x < 0) {
        ball.position.x = -2.95 + ballRadius;
        ballVelocity.x *= -0.7;
      }
      if (ball.position.x + ballRadius >= 2.95 && ballVelocity.x > 0) {
        ball.position.x = 2.95 - ballRadius;
        ballVelocity.x *= -0.7;
      }

      // Obstacle collision
      const obstacleCenter = new THREE.Vector3(obstaclePos.x, ball.position.y, obstaclePos.z);
      const toBall = new THREE.Vector3().subVectors(ball.position, obstacleCenter);
      const minDist = ballRadius + obstacleRadius;
      if (toBall.length() < minDist) {
        const normal = toBall.normalize();
        ball.position.copy(obstacleCenter.clone().add(normal.clone().multiplyScalar(minDist)));
        const dot = ballVelocity.dot(normal);
        ballVelocity.sub(normal.multiplyScalar(2 * dot)).multiplyScalar(0.7);
      }

      // Out of bounds
      if (ball.position.z < -10 || ball.position.z > 10) {
        resetBall();
        return;
      }

      // Stop condition
      if (ballVelocity.length() < 0.002) {
        ballVelocity.set(0, 0, 0);
        ballMoving = false;
      }

      // Hole detection
      const dx = ball.position.x - holePos.x;
      const dz = ball.position.z - holePos.z;
      const distXZ = Math.sqrt(dx * dx + dz * dz);
      if (distXZ <= 0.25) {
        ballVelocity.set(0, 0, 0);
        ballMoving = false;
        sinkBall();
      }

      updateAimArrow();
    }

    function updateState() {
      window.__3D_STATE__ = {
        ballPosition: {
          x: ball.position.x,
          y: ball.position.y,
          z: ball.position.z
        },
        ballVelocity: {
          x: ballVelocity.x,
          y: ballVelocity.y,
          z: ballVelocity.z
        },
        aimAngle: aimAngle,
        power: power,
        strokeCount: strokeCount,
        score: score,
        holesPlayed: holesPlayed,
        ballMoving: ballMoving,
        gameOver: gameOver,
        obstacleLoaded: obstacleLoaded,
        holeSunk: holeSunk
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      handlePhysics();
      updateState();
      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
  </script>
</body>
</html>
