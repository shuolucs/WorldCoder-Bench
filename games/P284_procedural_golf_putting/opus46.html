<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Mini-Golf Putting Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 18px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    z-index: 10;
  }
  #strokeDisplay, #scoreDisplay {
    margin-bottom: 8px;
  }

  #powerBarContainer {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 200px;
    border: 2px solid white;
    background: rgba(0,0,0,0.5);
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  #powerBarFill {
    width: 100%;
    background: linear-gradient(to top, #ff0000, #ffff00, #00ff00);
    transition: height 0.05s;
  }
  #powerDisplay {
    position: absolute;
    left: 20px;
    top: calc(50% + 115px);
    color: white;
    font-size: 14px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    z-index: 10;
    text-align: center;
    width: 70px;
  }

  #resetBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 10px 20px;
    font-size: 16px;
    background: #c0392b;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    z-index: 10;
  }
  #resetBtn:hover { background: #e74c3c; }

  #holeInMessage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 64px;
    color: #FFD700;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
    z-index: 20;
    display: none;
    font-weight: bold;
  }

  #gameOverOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 30;
    color: white;
  }
  #gameOverOverlay h1 { font-size: 64px; margin-bottom: 20px; }
  #gameOverOverlay p { font-size: 28px; margin-bottom: 30px; }
  #gameOverOverlay button {
    padding: 15px 30px;
    font-size: 20px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  #gameOverOverlay button:hover { background: #2ecc71; }

  #instructions {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    text-align: center;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="strokeDisplay">Stroke: 0</div>
  <div id="scoreDisplay">Score: 0/3</div>
</div>

<div id="powerBarContainer">
  <div id="powerBarFill" style="height: 0%;"></div>
</div>
<div id="powerDisplay">Power: 0%</div>

<button id="resetBtn">Reset</button>

<div id="holeInMessage">Hole In!</div>

<div id="gameOverOverlay">
  <h1>Game Over</h1>
  <p id="finalScore">Final Score: 0/3</p>
  <p id="totalStrokes">Total Strokes: 0</p>
  <button id="playAgainBtn">Play Again</button>
</div>

<div id="instructions">← → Aim | ↑ ↓ Power | Space to Putt</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---- State ----
const BALL_START = new THREE.Vector3(0, 0.1, 5);
const HOLE_POS = new THREE.Vector3(0, 0.01, -7);
const MAX_SPEED = 0.3;
const FRICTION = 0.985;
const STOP_THRESHOLD = 0.002;
const WALL_DAMPING = 0.7;
const OBSTACLE_DAMPING = 0.7;
const OBSTACLE_POS = new THREE.Vector3(2, 0, -3);
const OBSTACLE_RADIUS = 0.6;
const BALL_RADIUS = 0.1;
const HOLE_SINK_DIST = 0.25;
const MAX_HOLES = 3;

let aimAngle = 0; // degrees, 0 = toward -Z
let power = 0;
let strokeCount = 0;
let score = 0;
let holesPlayed = 0;
let ballMoving = false;
let gameOver = false;
let obstacleLoaded = false;
let holeSunk = false;

let ballVelocity = new THREE.Vector3(0, 0, 0);

window.__3D_STATE__ = {
  ballPosition: { x: 0, y: 0.1, z: 5 },
  ballVelocity: { x: 0, y: 0, z: 0 },
  aimAngle: 0,
  power: 0,
  strokeCount: 0,
  score: 0,
  holesPlayed: 0,
  ballMoving: false,
  gameOver: false,
  obstacleLoaded: false,
  holeSunk: false
};

// ---- Scene Setup ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Ground / Putting Green
const greenGeom = new THREE.PlaneGeometry(6, 20);
const greenMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4e, roughness: 0.8 });
const greenMesh = new THREE.Mesh(greenGeom, greenMat);
greenMesh.rotation.x = -Math.PI / 2;
greenMesh.position.y = 0;
greenMesh.receiveShadow = true;
scene.add(greenMesh);

// Hole
const holeGeom = new THREE.CylinderGeometry(0.2, 0.2, 0.05, 32);
const holeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
const holeMesh = new THREE.Mesh(holeGeom, holeMat);
holeMesh.position.copy(HOLE_POS);
scene.add(holeMesh);

// Flag pole
const poleGeom = new THREE.CylinderGeometry(0.02, 0.02, 1.5, 8);
const poleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
const poleMesh = new THREE.Mesh(poleGeom, poleMat);
poleMesh.position.set(HOLE_POS.x, 0.75, HOLE_POS.z);
scene.add(poleMesh);

// Flag
const flagGeom = new THREE.PlaneGeometry(0.4, 0.25);
const flagMat = new THREE.MeshStandardMaterial({ color: 0xff0000, side: THREE.DoubleSide });
const flagMesh = new THREE.Mesh(flagGeom, flagMat);
flagMesh.position.set(HOLE_POS.x + 0.2, 1.35, HOLE_POS.z);
scene.add(flagMesh);

// Golf Ball
const ballGeom = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.1 });
const ballMesh = new THREE.Mesh(ballGeom, ballMat);
ballMesh.position.copy(BALL_START);
ballMesh.castShadow = true;
scene.add(ballMesh);

// Wall Bumpers
const wallGeom = new THREE.BoxGeometry(0.1, 0.3, 20);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });

const leftWall = new THREE.Mesh(wallGeom, wallMat);
leftWall.position.set(-3, 0.15, 0);
leftWall.castShadow = true;
leftWall.receiveShadow = true;
scene.add(leftWall);

const rightWall = new THREE.Mesh(wallGeom, wallMat);
rightWall.position.set(3, 0.15, 0);
rightWall.castShadow = true;
rightWall.receiveShadow = true;
scene.add(rightWall);

// Back and front walls
const endWallGeom = new THREE.BoxGeometry(6.2, 0.3, 0.1);
const backWall = new THREE.Mesh(endWallGeom, wallMat);
backWall.position.set(0, 0.15, -10);
scene.add(backWall);

const frontWall = new THREE.Mesh(endWallGeom, wallMat);
frontWall.position.set(0, 0.15, 10);
scene.add(frontWall);

// Aim Arrow
const arrowGroup = new THREE.Group();
const arrowShaftGeom = new THREE.CylinderGeometry(0.02, 0.02, 1.0, 8);
const arrowMat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xff2222, emissiveIntensity: 0.5 });
const arrowShaft = new THREE.Mesh(arrowShaftGeom, arrowMat);
arrowShaft.position.y = 0;
arrowShaft.position.z = -0.5;
arrowShaft.rotation.x = Math.PI / 2;
arrowGroup.add(arrowShaft);

const arrowHeadGeom = new THREE.ConeGeometry(0.08, 0.2, 8);
const arrowHead = new THREE.Mesh(arrowHeadGeom, arrowMat);
arrowHead.position.z = -1.1;
arrowHead.rotation.x = Math.PI;
arrowGroup.add(arrowHead);

arrowGroup.position.copy(BALL_START);
arrowGroup.position.y = 0.15;
scene.add(arrowGroup);

// Load MosquitoInAmber
let obstacleModel = null;
const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/MosquitoInAmber.glb',
  (gltf) => {
    obstacleModel = gltf.scene;
    obstacleModel.scale.set(0.5, 0.5, 0.5);
    obstacleModel.position.copy(OBSTACLE_POS);
    obstacleModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(obstacleModel);
    obstacleLoaded = true;
    console.log('MosquitoInAmber loaded');
  },
  undefined,
  (error) => {
    console.warn('Could not load MosquitoInAmber.glb, using placeholder:', error);
    // Create a placeholder amber-colored sphere
    const placeholderGeom = new THREE.SphereGeometry(0.5, 32, 32);
    const placeholderMat = new THREE.MeshStandardMaterial({
      color: 0xffbf00,
      roughness: 0.2,
      metalness: 0.1,
      transparent: true,
      opacity: 0.8
    });
    obstacleModel = new THREE.Mesh(placeholderGeom, placeholderMat);
    obstacleModel.position.copy(OBSTACLE_POS);
    obstacleModel.castShadow = true;
    scene.add(obstacleModel);
    obstacleLoaded = true;
  }
);

// Obstacle marker (visible ring around obstacle area)
const ringGeom = new THREE.RingGeometry(OBSTACLE_RADIUS - 0.05, OBSTACLE_RADIUS + 0.05, 32);
const ringMat = new THREE.MeshBasicMaterial({ color: 0xffbf00, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
const ringMesh = new THREE.Mesh(ringGeom, ringMat);
ringMesh.rotation.x = -Math.PI / 2;
ringMesh.position.set(OBSTACLE_POS.x, 0.02, OBSTACLE_POS.z);
scene.add(ringMesh);

// ---- DOM References ----
const strokeDisplay = document.getElementById('strokeDisplay');
const scoreDisplay = document.getElementById('scoreDisplay');
const powerBarFill = document.getElementById('powerBarFill');
const powerDisplay = document.getElementById('powerDisplay');
const holeInMessage = document.getElementById('holeInMessage');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const finalScoreEl = document.getElementById('finalScore');
const totalStrokesEl = document.getElementById('totalStrokes');
const resetBtn = document.getElementById('resetBtn');
const playAgainBtn = document.getElementById('playAgainBtn');

// ---- Input ----
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  if (gameOver) return;

  if (e.code === 'Space' && !ballMoving) {
    e.preventDefault();
    launchBall();
  }
});
window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

function launchBall() {
  if (power === 0) return;
  const rad = aimAngle * Math.PI / 180;
  const speed = (power / 100) * MAX_SPEED;
  ballVelocity.set(
    Math.sin(rad) * speed,
    0,
    -Math.cos(rad) * speed
  );
  ballMoving = true;
  strokeCount++;
  updateHUD();
}

// ---- Game Logic ----
function resetBall() {
  ballMesh.position.copy(BALL_START);
  ballVelocity.set(0, 0, 0);
  ballMoving = false;
  aimAngle = 0;
  power = 0;
}

function resetGame() {
  strokeCount = 0;
  score = 0;
  holesPlayed = 0;
  gameOver = false;
  holeSunk = false;
  gameOverOverlay.style.display = 'none';
  holeInMessage.style.display = 'none';
  resetBall();
  updateHUD();
}

function showHoleIn() {
  holeSunk = true;
  holeInMessage.style.display = 'block';
  setTimeout(() => {
    holeInMessage.style.display = 'none';
    holeSunk = false;

    if (holesPlayed >= MAX_HOLES) {
      showGameOver();
    } else {
      resetBall();
      updateHUD();
    }
  }, 2000);
}

function showGameOver() {
  gameOver = true;
  finalScoreEl.textContent = `Final Score: ${score}/${MAX_HOLES}`;
  totalStrokesEl.textContent = `Total Strokes: ${strokeCount}`;
  gameOverOverlay.style.display = 'flex';
}

function updateHUD() {
  strokeDisplay.textContent = `Stroke: ${strokeCount}`;
  scoreDisplay.textContent = `Score: ${score}/${MAX_HOLES}`;
  powerBarFill.style.height = `${power}%`;
  powerDisplay.textContent = `Power: ${power}%`;
}

resetBtn.addEventListener('click', resetGame);
playAgainBtn.addEventListener('click', resetGame);

// ---- Animation Loop ----
function animate() {
  requestAnimationFrame(animate);

  if (!gameOver) {
    // Handle continuous key input for aiming and power
    if (!ballMoving) {
      if (keys['ArrowLeft']) {
        aimAngle += 2;
        keys['ArrowLeft'] = false; // per press
      }
      if (keys['ArrowRight']) {
        aimAngle -= 2;
        keys['ArrowRight'] = false;
      }
      if (keys['ArrowUp']) {
        power = Math.min(100, power + 5);
        keys['ArrowUp'] = false;
        updateHUD();
      }
      if (keys['ArrowDown']) {
        power = Math.max(0, power - 5);
        keys['ArrowDown'] = false;
        updateHUD();
      }
    }

    // Update arrow
    if (!ballMoving) {
      arrowGroup.position.set(ballMesh.position.x, 0.15, ballMesh.position.z);
      arrowGroup.rotation.y = aimAngle * Math.PI / 180;
      arrowGroup.visible = true;
    } else {
      arrowGroup.visible = false;
    }

    // Physics
    if (ballMoving) {
      // Apply velocity
      ballMesh.position.x += ballVelocity.x;
      ballMesh.position.z += ballVelocity.z;

      // Friction
      ballVelocity.x *= FRICTION;
      ballVelocity.z *= FRICTION;

      // Stop check
      const speed = Math.sqrt(ballVelocity.x * ballVelocity.x + ballVelocity.z * ballVelocity.z);
      if (speed < STOP_THRESHOLD) {
        ballVelocity.set(0, 0, 0);
        ballMoving = false;
      }

      // Wall collisions (left wall at x = -3, right wall at x = 3)
      if (ballMesh.position.x - BALL_RADIUS < -3) {
        ballMesh.position.x = -3 + BALL_RADIUS;
        ballVelocity.x = Math.abs(ballVelocity.x) * WALL_DAMPING;
      }
      if (ballMesh.position.x + BALL_RADIUS > 3) {
        ballMesh.position.x = 3 - BALL_RADIUS;
        ballVelocity.x = -Math.abs(ballVelocity.x) * WALL_DAMPING;
      }

      // End wall collisions
      if (ballMesh.position.z - BALL_RADIUS < -10) {
        ballMesh.position.z = -10 + BALL_RADIUS;
        ballVelocity.z = Math.abs(ballVelocity.z) * WALL_DAMPING;
      }
      if (ballMesh.position.z + BALL_RADIUS > 10) {
        ballMesh.position.z = 10 - BALL_RADIUS;
        ballVelocity.z = -Math.abs(ballVelocity.z) * WALL_DAMPING;
      }

      // Obstacle collision
      if (obstacleLoaded) {
        const dx = ballMesh.position.x - OBSTACLE_POS.x;
        const dz = ballMesh.position.z - OBSTACLE_POS.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const minDist = OBSTACLE_RADIUS + BALL_RADIUS;

        if (dist < minDist && dist > 0) {
          // Push ball out
          const nx = dx / dist;
          const nz = dz / dist;
          ballMesh.position.x = OBSTACLE_POS.x + nx * minDist;
          ballMesh.position.z = OBSTACLE_POS.z + nz * minDist;

          // Reflect velocity
          const dot = ballVelocity.x * nx + ballVelocity.z * nz;
          ballVelocity.x = (ballVelocity.x - 2 * dot * nx) * OBSTACLE_DAMPING;
          ballVelocity.z = (ballVelocity.z - 2 * dot * nz) * OBSTACLE_DAMPING;
        }
      }

      // Hole check
      const hx = ballMesh.position.x - HOLE_POS.x;
      const hz = ballMesh.position.z - HOLE_POS.z;
      const holeDist = Math.sqrt(hx * hx + hz * hz);

      if (holeDist < HOLE_SINK_DIST) {
        score++;
        holesPlayed++;
        ballMoving = false;
        ballVelocity.set(0, 0, 0);
        ballMesh.position.copy(HOLE_POS);
        ballMesh.position.y = 0.05;
        updateHUD();
        showHoleIn();
      }
    }

    // Keep ball at correct height
    if (ballMoving) {
      ballMesh.position.y = 0.1;
    }
  }

  // Rotate obstacle model slowly
  if (obstacleModel) {
    obstacleModel.rotation.y += 0.005;
  }

  // Update global state
  window.__3D_STATE__ = {
    ballPosition: { x: ballMesh.position.x, y: ballMesh.position.y, z: ballMesh.position.z },
    ballVelocity: { x: ballVelocity.x, y: ballVelocity.y, z: ballVelocity.z },
    aimAngle: aimAngle,
    power: power,
    strokeCount: strokeCount,
    score: score,
    holesPlayed: holesPlayed,
    ballMoving: ballMoving,
    gameOver: gameOver,
    obstacleLoaded: obstacleLoaded,
    holeSunk: holeSunk
  };

  renderer.render(scene, camera);
}

// ---- Resize ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---- Start ----
updateHUD();
animate();
</script>
</body>
</html>
