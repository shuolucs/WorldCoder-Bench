<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sound-Reactive Sculpture</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a1a;
  }
  canvas {
    display: block;
  }
  #hud {
    position: absolute;
    top: 0;
    left: 0;
    color: white;
    font-family: monospace;
    font-size: 14px;
    padding: 15px;
    background: rgba(0, 0, 0, 0.6);
    pointer-events: none;
    line-height: 1.6;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="hud"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 5, 12);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404060, 0.3);
  scene.add(ambientLight);

  const pointLight1 = new THREE.PointLight(0xffffff, 1.5, 50);
  pointLight1.position.set(5, 10, 5);
  scene.add(pointLight1);

  const pointLight2 = new THREE.PointLight(0xff4488, 1.0, 50);
  pointLight2.position.set(-5, 3, -5);
  scene.add(pointLight2);

  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(30, 30);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.5;
  scene.add(ground);

  // Sculpture group
  const sculptureGroup = new THREE.Group();
  scene.add(sculptureGroup);

  // Bars
  const barCount = 64;
  const sculptureBars = [];
  const barGeometry = new THREE.BoxGeometry(0.15, 1.0, 0.15);

  for (let i = 0; i < barCount; i++) {
    const hue = i / barCount;
    const color = new THREE.Color();
    color.setHSL(hue, 0.8, 0.5);

    const mat = new THREE.MeshStandardMaterial({
      color: color,
      emissive: color.clone(),
      emissiveIntensity: 0,
      metalness: 0.3,
      roughness: 0.4
    });

    const bar = new THREE.Mesh(barGeometry, mat);
    const angle = i * (2 * Math.PI / barCount);
    bar.position.x = Math.cos(angle) * 4;
    bar.position.z = Math.sin(angle) * 4;
    bar.position.y = 0;

    bar.userData.baseColor = color.clone();
    bar.userData.angle = angle;
    bar.userData.index = i;

    sculptureBars.push(bar);
    sculptureGroup.add(bar);
  }

  // Central sphere
  const sphereGeo = new THREE.SphereGeometry(1.0, 32, 32);
  const sphereMat = new THREE.MeshStandardMaterial({
    color: 0x8888ff,
    metalness: 0.9,
    roughness: 0.1
  });
  const centralSphere = new THREE.Mesh(sphereGeo, sphereMat);
  centralSphere.position.y = 0.5;
  sculptureGroup.add(centralSphere);

  // State
  let mode = 'wave';
  let rotationEnabled = true;
  let rotationSpeed = 0.3;
  let currentSensitivity = 4.0;
  let colorScheme = 'rainbow';
  let paused = false;
  let elapsedTime = 0;
  let lastTimestamp = null;
  const frequencyData = new Float64Array(barCount);

  // Color scheme functions
  function applyColorScheme(scheme) {
    colorScheme = scheme;
    for (let i = 0; i < barCount; i++) {
      const bar = sculptureBars[i];
      let color = new THREE.Color();
      if (scheme === 'rainbow') {
        color.setHSL(i / barCount, 0.8, 0.5);
      } else if (scheme === 'monochrome') {
        color.set(0x00ffaa);
      } else if (scheme === 'warm') {
        color.setHSL((i / barCount) * 0.15, 1.0, 0.5);
      }
      bar.material.color.copy(color);
      bar.material.emissive.copy(color);
      bar.userData.baseColor.copy(color);
    }
  }

  // Keyboard controls
  document.addEventListener('keydown', function(e) {
    const key = e.key;

    if (key === '1') {
      mode = 'wave';
    } else if (key === '2') {
      mode = 'pulse';
    } else if (key === '3') {
      mode = 'chaos';
    } else if (key === 'r' || key === 'R') {
      rotationEnabled = !rotationEnabled;
    } else if (key === 'ArrowUp') {
      e.preventDefault();
      rotationSpeed = Math.min(2.0, rotationSpeed + 0.1);
    } else if (key === 'ArrowDown') {
      e.preventDefault();
      rotationSpeed = Math.max(0.0, rotationSpeed - 0.1);
    } else if (key === '+' || key === '=') {
      currentSensitivity = Math.min(10.0, currentSensitivity + 1.0);
    } else if (key === '-') {
      currentSensitivity = Math.max(1.0, currentSensitivity - 1.0);
    } else if (key === 'c' || key === 'C') {
      const schemes = ['rainbow', 'monochrome', 'warm'];
      const idx = (schemes.indexOf(colorScheme) + 1) % schemes.length;
      applyColorScheme(schemes[idx]);
    } else if (key === ' ') {
      e.preventDefault();
      paused = !paused;
    }
  });

  // HUD
  const hudEl = document.getElementById('hud');

  function updateHUD(avgFreq, maxBarHeight) {
    hudEl.innerHTML =
      `Mode: ${mode}\n` +
      `Rotation Speed: ${rotationSpeed.toFixed(1)}\n` +
      `Sensitivity: ${currentSensitivity.toFixed(1)}\n` +
      `Color Scheme: ${colorScheme}\n` +
      `Paused: ${paused ? 'Yes' : 'No'}\n` +
      `Avg Frequency: ${avgFreq.toFixed(2)}\n` +
      `Max Bar Height: ${maxBarHeight.toFixed(2)}`;
    hudEl.style.whiteSpace = 'pre';
  }

  // State exposure
  window.__3D_STATE__ = {
    mode: mode,
    rotationEnabled: rotationEnabled,
    rotationSpeed: rotationSpeed,
    sensitivity: currentSensitivity,
    colorScheme: colorScheme,
    paused: paused,
    averageFrequency: 0,
    maxBarScaleY: 1,
    minBarScaleY: 1,
    sphereScale: 1,
    barCount: barCount,
    sculptureRotationY: 0,
    elapsedTime: 0,
    frequencyData: Array.from(frequencyData)
  };

  // Resize handler
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation loop
  function animate(timestamp) {
    requestAnimationFrame(animate);

    if (lastTimestamp === null) lastTimestamp = timestamp;
    const delta = (timestamp - lastTimestamp) / 1000;
    lastTimestamp = timestamp;

    // Update elapsed time
    if (!paused) {
      elapsedTime += delta;
    }

    const time = elapsedTime;

    // Update frequency data
    if (!paused) {
      for (let i = 0; i < barCount; i++) {
        if (mode === 'wave') {
          frequencyData[i] = 0.5 + 0.5 * Math.sin(time * (1 + i * 0.1) + i * 0.3);
        } else if (mode === 'pulse') {
          frequencyData[i] = Math.pow(Math.sin(time * 2), 2);
        } else if (mode === 'chaos') {
          frequencyData[i] = 0.5 + 0.5 * Math.sin(time * (3 + Math.sin(i * time * 0.01) * 5) + i);
        }
      }
    }

    // Calculate average frequency
    let sum = 0;
    for (let i = 0; i < barCount; i++) {
      sum += frequencyData[i];
    }
    const averageFrequency = sum / barCount;

    // Update bars
    let maxScaleY = -Infinity;
    let minScaleY = Infinity;

    for (let i = 0; i < barCount; i++) {
      const bar = sculptureBars[i];
      const scaleY = 1.0 + frequencyData[i] * currentSensitivity;
      bar.scale.y = scaleY;
      bar.position.y = (scaleY * 0.5) - 0.5;
      bar.material.emissiveIntensity = frequencyData[i];

      if (scaleY > maxScaleY) maxScaleY = scaleY;
      if (scaleY < minScaleY) minScaleY = scaleY;
    }

    // Update sphere
    const sphereScaleVal = 1.0 + averageFrequency * 0.5;
    centralSphere.scale.set(sphereScaleVal, sphereScaleVal, sphereScaleVal);

    // Rotation
    if (rotationEnabled) {
      sculptureGroup.rotation.y += rotationSpeed * delta;
    }

    // Update HUD
    updateHUD(averageFrequency, maxScaleY);

    // Update state
    window.__3D_STATE__.mode = mode;
    window.__3D_STATE__.rotationEnabled = rotationEnabled;
    window.__3D_STATE__.rotationSpeed = rotationSpeed;
    window.__3D_STATE__.sensitivity = currentSensitivity;
    window.__3D_STATE__.colorScheme = colorScheme;
    window.__3D_STATE__.paused = paused;
    window.__3D_STATE__.averageFrequency = averageFrequency;
    window.__3D_STATE__.maxBarScaleY = maxScaleY;
    window.__3D_STATE__.minBarScaleY = minScaleY;
    window.__3D_STATE__.sphereScale = sphereScaleVal;
    window.__3D_STATE__.barCount = barCount;
    window.__3D_STATE__.sculptureRotationY = sculptureGroup.rotation.y;
    window.__3D_STATE__.elapsedTime = elapsedTime;
    window.__3D_STATE__.frequencyData = Array.from(frequencyData);

    renderer.render(scene, camera);
  }

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
