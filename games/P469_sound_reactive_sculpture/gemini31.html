<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sound-Reactive Sculpture</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: monospace;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            color: white;
            font-size: 14px;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            pointer-events: none;
            line-height: 1.5;
            min-width: 200px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="hud"></div>
    <script type="module">
        import * as THREE from 'three';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.3);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0xffffff, 1.5);
        pointLight1.position.set(5, 10, 5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff4488, 1.0);
        pointLight2.position.set(-5, 3, -5);
        scene.add(pointLight2);

        // --- Sculpture Structure ---
        const sculptureGroup = new THREE.Group();
        scene.add(sculptureGroup);

        const barCount = 64;
        const radius = 4;
        const sculptureBars = [];
        const barGeometry = new THREE.BoxGeometry(0.15, 1.0, 0.15);

        for (let i = 0; i < barCount; i++) {
            const material = new THREE.MeshStandardMaterial();
            const bar = new THREE.Mesh(barGeometry, material);
            
            const angle = i * (2 * Math.PI / barCount);
            bar.position.x = Math.cos(angle) * radius;
            bar.position.z = Math.sin(angle) * radius;
            bar.rotation.y = -angle;
            
            sculptureGroup.add(bar);
            sculptureBars.push(bar);
        }

        const sphereGeometry = new THREE.SphereGeometry(1.0, 32, 32);
        const sphereMaterial = new THREE.MeshStandardMaterial({
            color: 0x8888ff,
            metalness: 0.9,
            roughness: 0.1
        });
        const centralSphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        sculptureGroup.add(centralSphere);

        const groundGeometry = new THREE.PlaneGeometry(30, 30);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x111122 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        scene.add(ground);

        // --- State Variables ---
        let mode = 'wave';
        let rotationEnabled = true;
        let rotationSpeed = 0.3;
        let sensitivity = 4.0;
        let colorScheme = 'rainbow';
        let paused = false;
        
        const frequencyData = new Array(barCount).fill(0);
        let simTime = 0;

        // --- Functions ---
        function updateColors() {
            for (let i = 0; i < barCount; i++) {
                const bar = sculptureBars[i];
                const color = new THREE.Color();
                
                if (colorScheme === 'rainbow') {
                    color.setHSL(i / barCount, 0.8, 0.5);
                } else if (colorScheme === 'monochrome') {
                    color.setHex(0x00ffaa);
                } else if (colorScheme === 'warm') {
                    color.setHSL((i / barCount) * 0.15, 1.0, 0.5);
                }
                
                bar.material.color.copy(color);
                bar.material.emissive.copy(color);
            }
        }

        updateColors();

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case '1': mode = 'wave'; break;
                case '2': mode = 'pulse'; break;
                case '3': mode = 'chaos'; break;
                case 'r': 
                case 'R': rotationEnabled = !rotationEnabled; break;
                case 'ArrowUp': rotationSpeed = Math.min(2.0, rotationSpeed + 0.1); break;
                case 'ArrowDown': rotationSpeed = Math.max(0.0, rotationSpeed - 0.1); break;
                case '+':
                case '=': sensitivity = Math.min(10.0, sensitivity + 1.0); break;
                case '-': sensitivity = Math.max(1.0, sensitivity - 1.0); break;
                case 'c':
                case 'C':
                    const schemes = ['rainbow', 'monochrome', 'warm'];
                    colorScheme = schemes[(schemes.indexOf(colorScheme) + 1) % schemes.length];
                    updateColors();
                    break;
                case ' ':
                    paused = !paused;
                    e.preventDefault();
                    break;
            }
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const hudElement = document.getElementById('hud');

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            if (!paused) {
                simTime += delta;
                for (let i = 0; i < barCount; i++) {
                    if (mode === 'wave') {
                        frequencyData[i] = 0.5 + 0.5 * Math.sin(simTime * (1 + i * 0.1) + i * 0.3);
                    } else if (mode === 'pulse') {
                        frequencyData[i] = Math.pow(Math.sin(simTime * 2), 2);
                    } else if (mode === 'chaos') {
                        frequencyData[i] = 0.5 + 0.5 * Math.sin(simTime * (3 + Math.sin(i * simTime * 0.01) * 5) + i);
                    }
                }
            }

            if (rotationEnabled) {
                sculptureGroup.rotation.y += rotationSpeed * delta;
            }

            let sumFreq = 0;
            let maxScaleY = 0;
            let minScaleY = Infinity;

            for (let i = 0; i < barCount; i++) {
                const bar = sculptureBars[i];
                const freq = frequencyData[i];
                sumFreq += freq;

                const scaleY = 1.0 + freq * sensitivity;
                bar.scale.y = scaleY;
                bar.position.y = (scaleY * 0.5) - 0.5;
                bar.material.emissiveIntensity = freq;

                if (scaleY > maxScaleY) maxScaleY = scaleY;
                if (scaleY < minScaleY) minScaleY = scaleY;
            }

            const averageFrequency = sumFreq / barCount;
            const sphereScale = 1.0 + averageFrequency * 0.5;
            centralSphere.scale.set(sphereScale, sphereScale, sphereScale);

            // Update HUD
            hudElement.innerHTML = `
                Mode: ${mode}<br>
                Rotation Speed: ${rotationSpeed.toFixed(1)}<br>
                Sensitivity: ${sensitivity.toFixed(1)}<br>
                Color Scheme: ${colorScheme}<br>
                Paused: ${paused ? 'Yes' : 'No'}<br>
                Avg Frequency: ${averageFrequency.toFixed(2)}<br>
                Max Bar Height: ${maxScaleY.toFixed(2)}
            `;

            // Update State
            window.__3D_STATE__ = {
                mode,
                rotationEnabled,
                rotationSpeed,
                sensitivity,
                colorScheme,
                paused,
                averageFrequency,
                maxBarScaleY,
                minBarScaleY,
                sphereScale,
                barCount,
                sculptureRotationY: sculptureGroup.rotation.y,
                elapsedTime: simTime,
                frequencyData: [...frequencyData]
            };

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
