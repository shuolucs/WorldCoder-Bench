<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sound-Reactive Sculpture</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
      font-size: 14px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.5);
      line-height: 1.5;
      z-index: 10;
      white-space: pre-line;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="hud"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a1a");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight("#404060", 0.3);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight("#ffffff", 1.5);
    pointLight1.position.set(5, 10, 5);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight("#ff4488", 1.0);
    pointLight2.position.set(-5, 3, -5);
    scene.add(pointLight2);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({
        color: "#111122",
        metalness: 0.1,
        roughness: 0.9
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.5;
    scene.add(ground);

    const sculptureGroup = new THREE.Group();
    scene.add(sculptureGroup);

    const sculptureBars = [];
    const barCount = 64;
    const ringRadius = 4;
    const frequencyData = new Array(barCount).fill(0);

    const barGeometry = new THREE.BoxGeometry(0.15, 1.0, 0.15);

    function getBarColor(index, scheme) {
      const color = new THREE.Color();

      if (scheme === "rainbow") {
        color.setHSL(index / barCount, 0.8, 0.5);
      } else if (scheme === "monochrome") {
        color.set("#00ffaa");
      } else if (scheme === "warm") {
        const hue = (index / barCount) * 0.15;
        color.setHSL(hue, 1.0, 0.5);
      }

      return color;
    }

    let colorScheme = "rainbow";

    for (let i = 0; i < barCount; i++) {
      const angle = i * (Math.PI * 2 / barCount);
      const color = getBarColor(i, colorScheme);

      const material = new THREE.MeshStandardMaterial({
        color: color.clone(),
        emissive: color.clone(),
        emissiveIntensity: 0,
        metalness: 0.4,
        roughness: 0.4
      });

      const bar = new THREE.Mesh(barGeometry, material);
      bar.position.set(
        Math.cos(angle) * ringRadius,
        0,
        Math.sin(angle) * ringRadius
      );

      sculptureGroup.add(bar);
      sculptureBars.push(bar);
    }

    const sphereMaterial = new THREE.MeshStandardMaterial({
      color: "#8888ff",
      metalness: 0.9,
      roughness: 0.1
    });

    const centralSphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.0, 32, 32),
      sphereMaterial
    );
    sculptureGroup.add(centralSphere);

    function applyColorScheme() {
      for (let i = 0; i < sculptureBars.length; i++) {
        const color = getBarColor(i, colorScheme);
        sculptureBars[i].material.color.copy(color);
        sculptureBars[i].material.emissive.copy(color);
      }
    }

    let mode = "wave";
    let rotationEnabled = true;
    let rotationSpeed = 0.3;
    let sensitivity = 4.0;
    let paused = false;

    const hud = document.getElementById("hud");

    const clock = new THREE.Clock();
    let simulationElapsed = 0;
    let averageFrequency = 0;
    let maxBarScaleY = 1;
    let minBarScaleY = 1;

    function updateFrequencyData(time) {
      for (let i = 0; i < barCount; i++) {
        if (mode === "wave") {
          frequencyData[i] = 0.5 + 0.5 * Math.sin(time * (1 + i * 0.1) + i * 0.3);
        } else if (mode === "pulse") {
          frequencyData[i] = Math.pow(Math.sin(time * 2), 2);
        } else if (mode === "chaos") {
          frequencyData[i] = 0.5 + 0.5 * Math.sin(
            time * (3 + Math.sin(i * time * 0.01) * 5) + i
          );
        }
      }
    }

    function updateHUD() {
      hud.textContent =
`Mode: ${mode}
Rotation Speed: ${rotationSpeed.toFixed(1)}
Sensitivity: ${sensitivity.toFixed(1)}
Color Scheme: ${colorScheme}
Paused: ${paused ? "Yes" : "No"}
Average Frequency: ${averageFrequency.toFixed(2)}
Max Bar Height: ${maxBarScaleY.toFixed(2)}`;
    }

    function updateState() {
      window.__3D_STATE__ = {
        mode,
        rotationEnabled,
        rotationSpeed,
        sensitivity,
        colorScheme,
        paused,
        averageFrequency,
        maxBarScaleY,
        minBarScaleY,
        sphereScale: centralSphere.scale.x,
        barCount,
        sculptureRotationY: sculptureGroup.rotation.y,
        elapsedTime: simulationElapsed,
        frequencyData: frequencyData.slice()
      };
    }

    window.__3D_STATE__ = {};

    window.addEventListener("keydown", (event) => {
      const key = event.key;

      if (key === "1") mode = "wave";
      if (key === "2") mode = "pulse";
      if (key === "3") mode = "chaos";

      if (key === "r" || key === "R") rotationEnabled = !rotationEnabled;

      if (key === "ArrowUp") {
        rotationSpeed = Math.min(2.0, rotationSpeed + 0.1);
      }

      if (key === "ArrowDown") {
        rotationSpeed = Math.max(0.0, rotationSpeed - 0.1);
      }

      if (key === "+" || key === "=") {
        sensitivity = Math.min(10.0, sensitivity + 1.0);
      }

      if (key === "-") {
        sensitivity = Math.max(1.0, sensitivity - 1.0);
      }

      if (key === "c" || key === "C") {
        const schemes = ["rainbow", "monochrome", "warm"];
        const currentIndex = schemes.indexOf(colorScheme);
        colorScheme = schemes[(currentIndex + 1) % schemes.length];
        applyColorScheme();
      }

      if (key === " " || event.code === "Space") {
        event.preventDefault();
        paused = !paused;
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (!paused) {
        simulationElapsed += delta;
        updateFrequencyData(simulationElapsed);
      }

      let total = 0;
      maxBarScaleY = -Infinity;
      minBarScaleY = Infinity;

      for (let i = 0; i < barCount; i++) {
        const f = frequencyData[i];
        total += f;

        const bar = sculptureBars[i];
        bar.scale.y = 1.0 + f * sensitivity;
        bar.position.y = (bar.scale.y * 0.5) - 0.5;
        bar.material.emissiveIntensity = f;

        if (bar.scale.y > maxBarScaleY) maxBarScaleY = bar.scale.y;
        if (bar.scale.y < minBarScaleY) minBarScaleY = bar.scale.y;
      }

      averageFrequency = total / barCount;

      const sphereScale = 1.0 + averageFrequency * 0.5;
      centralSphere.scale.setScalar(sphereScale);

      if (rotationEnabled) {
        sculptureGroup.rotation.y += rotationSpeed * delta;
      }

      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    applyColorScheme();
    animate();

    window.sculptureBars = sculptureBars;
  </script>
</body>
</html>
