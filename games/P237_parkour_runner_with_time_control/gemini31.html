<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Runner 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            background-color: #000;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }
        .hud-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            position: absolute;
        }
        #score { top: 20px; left: 20px; }
        #distance { top: 20px; left: 50%; transform: translateX(-50%); }
        #speed { top: 20px; right: 20px; }
        
        #energy-container {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 15px;
            border: 2px solid white;
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        #energy-bar {
            width: 100%;
            height: 100%;
            background: #44FF44;
            transition: width 0.1s linear, background-color 0.2s;
        }
        
        #center-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            text-align: center;
            letter-spacing: 2px;
        }
        
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            pointer-events: auto;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #game-over-text {
            color: #FF4444;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 8px black;
            margin-bottom: 30px;
        }
        
        .btn {
            pointer-events: auto;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #44AA44;
            border: 3px solid white;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:hover {
            background: #55CC55;
            transform: scale(1.05);
        }
        .btn:active {
            transform: scale(0.95);
        }
        
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .controls-info {
            color: white;
            margin-top: 30px;
            text-align: center;
            font-size: 18px;
            text-shadow: 1px 1px 2px black;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div id="score" class="hud-text">Score: 0</div>
        <div id="distance" class="hud-text">Distance: 0 m</div>
        <div id="speed" class="hud-text">Speed: 8.0m/s</div>
        
        <div id="energy-container">
            <div id="energy-bar"></div>
        </div>
        
        <div id="center-message"></div>
        
        <div id="start-screen">
            <button id="startBtn" class="btn">Start Game</button>
            <div class="controls-info">
                A / D or Left / Right : Switch Lanes<br>
                SPACE : Jump (Double Jump allowed)<br>
                S or Down : Slide<br>
                SHIFT (Hold) : Slow Motion<br>
                F : Time Freeze
            </div>
        </div>
        
        <div id="game-over-screen">
            <div id="game-over-text">GAME OVER</div>
            <button id="restartBtn" class="btn">Restart</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            runnerX: 0, runnerY: 1.0, runnerZ: 0,
            velocityY: 0, isGrounded: true, isAlive: true, isSliding: false,
            currentLane: 0, score: 0, distance: 0, timeScale: 1.0, timeEnergy: 100,
            isSlowMotion: false, isTimeFrozen: false, freezeCooldown: 0,
            jumpCount: 0, gameStarted: false, platformCount: 0, coinsCollected: 0,
            baseSpeed: 8, effectiveSpeed: 8
        };

        // --- Scene Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB');
        scene.fog = new THREE.Fog('#87CEEB', 50, 150);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);

        const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambLight);

        // --- Runner Character ---
        const runner = new THREE.Group();
        
        const cylGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.2, 16);
        const runnerMat = new THREE.MeshLambertMaterial({ color: 0xFF4444 });
        const bodyMesh = new THREE.Mesh(cylGeo, runnerMat);
        bodyMesh.position.y = 0.6; // Bottom at 0
        runner.add(bodyMesh);

        const headGeo = new THREE.SphereGeometry(0.4, 16, 16);
        const headMesh = new THREE.Mesh(headGeo, runnerMat);
        headMesh.position.y = 1.4;
        runner.add(headMesh);

        scene.add(runner);

        // --- Game Variables ---
        let baseSpeed = 8;
        let gravity = -25;
        let yVel = 0;
        let isGrounded = true;
        let isAlive = true;
        let jumpCount = 0;
        let isSliding = false;
        let slideTimer = 0;
        let currentLane = 0; // -1, 0, 1
        let targetX = 0;
        
        let score = 0;
        let distance = 0;
        let timeEnergy = 100;
        let isSlowMotion = false;
        let isTimeFrozen = false;
        let freezeTimer = 0;
        let freezeCooldown = 0;
        let gameStarted = false;
        let platformCount = 0;
        let coinsCollected = 0;

        // --- World Data ---
        let platforms = [];
        let obstacles = [];
        let coins = [];
        let lastPlatformZ = 0;
        let lastPlatformY = 1.0;

        // --- Input Handling ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            if (!isAlive || !gameStarted) return;
            keys[e.code] = true;

            if (e.code === 'Space') {
                if (jumpCount < 2) {
                    yVel = 10;
                    isGrounded = false;
                    jumpCount++;
                    if (isSliding) endSlide();
                }
            }
            if ((e.code === 'KeyS' || e.code === 'ArrowDown') && !isSliding && isGrounded) {
                startSlide();
            }
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') {
                if (currentLane > -1) currentLane--;
                targetX = currentLane * 2.5;
            }
            if (e.code === 'KeyD' || e.code === 'ArrowRight') {
                if (currentLane < 1) currentLane++;
                targetX = currentLane * 2.5;
            }
            if (e.code === 'KeyF') {
                if (freezeCooldown <= 0 && timeEnergy >= 50 && !isTimeFrozen) {
                    isTimeFrozen = true;
                    freezeTimer = 1.5;
                    timeEnergy -= 50;
                    freezeCooldown = 5.0;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        function startSlide() {
            isSliding = true;
            slideTimer = 0.8;
            bodyMesh.scale.y = 0.166; // 0.2 / 1.2
            bodyMesh.position.y = 0.1;
            headMesh.position.y = 0.4;
        }

        function endSlide() {
            isSliding = false;
            bodyMesh.scale.y = 1;
            bodyMesh.position.y = 0.6;
            headMesh.position.y = 1.4;
        }

        // --- Procedural Generation ---
        const matGreen1 = new THREE.MeshLambertMaterial({ color: 0x44AA44 });
        const matGreen2 = new THREE.MeshLambertMaterial({ color: 0x338833 });
        const matObs = new THREE.MeshLambertMaterial({ color: 0xCC0000 });
        const matCoin = new THREE.MeshLambertMaterial({ color: 0xFFD700 });
        
        const geoObs = new THREE.BoxGeometry(1, 1.5, 0.5);
        const geoCoin = new THREE.TorusGeometry(0.4, 0.1, 8, 16);

        function createInitialPlatform() {
            const length = 30;
            const geo = new THREE.BoxGeometry(4, 0.5, length);
            const mesh = new THREE.Mesh(geo, matGreen1);
            mesh.position.set(0, 0.75, -length/2 + 5); // Top at 1.0
            scene.add(mesh);
            platforms.push({ mesh, top: 1.0, zStart: 5, zEnd: -length + 5 });
            lastPlatformZ = -length + 5;
            lastPlatformY = 1.0;
            platformCount++;
        }

        function spawnPlatform() {
            const length = 4 + Math.random() * 6;
            const gap = 1 + Math.random() * 2;
            const heightDiff = Math.random() > 0.5 ? Math.random() * 2 : 0;
            
            const z = lastPlatformZ - gap - length / 2;
            const y = lastPlatformY + heightDiff;

            const geo = new THREE.BoxGeometry(4, 0.5, length);
            const mat = platformCount % 2 === 0 ? matGreen1 : matGreen2;
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, y - 0.25, z);
            scene.add(mesh);

            platforms.push({ mesh, top: y, zStart: z + length / 2, zEnd: z - length / 2 });

            // Obstacle (every 3rd)
            if (platformCount % 3 === 0) {
                const obs = new THREE.Mesh(geoObs, matObs);
                const lane = Math.floor(Math.random() * 3) - 1;
                // Positioned to allow sliding under (bottom at y + 0.75, top at y + 2.25)
                obs.position.set(lane * 2.5, y + 1.5, z);
                scene.add(obs);
                obstacles.push({ mesh: obs, lane, z, active: true });
            }

            // Coin (every 2nd, not on obstacle platforms)
            if (platformCount % 2 === 0 && platformCount % 3 !== 0) {
                const coin = new THREE.Mesh(geoCoin, matCoin);
                const lane = Math.floor(Math.random() * 3) - 1;
                coin.position.set(lane * 2.5, y + 1.5, z);
                scene.add(coin);
                coins.push({ mesh: coin, lane, z, active: true });
            }

            lastPlatformZ = z - length / 2;
            lastPlatformY = y;
            platformCount++;
        }

        function initWorld() {
            platforms.forEach(p => scene.remove(p.mesh));
            obstacles.forEach(o => scene.remove(o.mesh));
            coins.forEach(c => scene.remove(c.mesh));
            platforms = [];
            obstacles = [];
            coins = [];
            platformCount = 0;
            
            createInitialPlatform();
            for (let i = 0; i < 20; i++) spawnPlatform();
        }

        function resetGame() {
            isAlive = true;
            score = 0;
            distance = 0;
            timeEnergy = 100;
            baseSpeed = 8;
            yVel = 0;
            jumpCount = 0;
            currentLane = 0;
            targetX = 0;
            isGrounded = true;
            freezeCooldown = 0;
            isTimeFrozen = false;
            isSlowMotion = false;
            coinsCollected = 0;
            
            if (isSliding) endSlide();
            
            runner.position.set(0, 1.0, 0);
            camera.position.set(0, 8, 15);
            
            initWorld();
            
            document.getElementById('game-over-screen').style.display = 'none';
        }

        // --- UI Elements ---
        const uiScore = document.getElementById('score');
        const uiDistance = document.getElementById('distance');
        const uiSpeed = document.getElementById('speed');
        const uiEnergyBar = document.getElementById('energy-bar');
        const uiCenterMsg = document.getElementById('center-message');
        
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            initWorld();
            runner.position.set(0, 1.0, 0);
            gameStarted = true;
        });

        document.getElementById('restartBtn').addEventListener('click', resetGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const realDt = Math.min(clock.getDelta(), 0.1);

            if (!gameStarted) {
                renderer.render(scene, camera);
                return;
            }

            // Time Mechanics
            if (freezeCooldown > 0) freezeCooldown -= realDt;

            if (isTimeFrozen) {
                freezeTimer -= realDt;
                if (freezeTimer <= 0) isTimeFrozen = false;
            }

            isSlowMotion = (keys['ShiftLeft'] || keys['ShiftRight']) && !isTimeFrozen;
            
            if (isSlowMotion && timeEnergy > 0) {
                timeEnergy -= 20 * realDt;
                if (timeEnergy <= 0) {
                    timeEnergy = 0;
                    isSlowMotion = false;
                }
            } else if (!isSlowMotion) {
                timeEnergy = Math.min(100, timeEnergy + 10 * realDt);
            }

            let timeScale = 1.0;
            if (isTimeFrozen) timeScale = 0.0;
            else if (isSlowMotion) timeScale = 0.25;

            const dt = realDt * timeScale;

            // Visual Effects
            const targetSky = isSlowMotion ? new THREE.Color('#4A6E8A') : new THREE.Color('#87CEEB');
            scene.background.lerp(targetSky, 0.1);
            scene.fog.color.lerp(targetSky, 0.1);
            dirLight.intensity = THREE.MathUtils.lerp(dirLight.intensity, isSlowMotion ? 0.7 : 1.2, 0.1);

            if (isAlive && !isTimeFrozen) {
                // Movement
                runner.position.z -= baseSpeed * dt;
                distance = Math.max(0, -runner.position.z);
                
                // Lane switching
                runner.position.x = THREE.MathUtils.lerp(runner.position.x, targetX, 0.15);

                // Gravity & Jump
                yVel += gravity * dt;
                runner.position.y += yVel * dt;

                // Sliding
                if (isSliding) {
                    slideTimer -= dt;
                    if (slideTimer <= 0) endSlide();
                }

                // Platform Collision
                isGrounded = false;
                if (yVel <= 0) {
                    for (let p of platforms) {
                        if (runner.position.z <= p.zStart && runner.position.z >= p.zEnd) {
                            if (runner.position.y >= p.top - 0.2 && runner.position.y + yVel * dt <= p.top) {
                                runner.position.y = p.top;
                                yVel = 0;
                                isGrounded = true;
                                jumpCount = 0;
                                break;
                            }
                        }
                    }
                }

                // Death by falling
                if (runner.position.y < -5) isAlive = false;

                // Bounding Boxes for Collision
                const runnerBox = new THREE.Box3().setFromObject(runner);
                runnerBox.expandByScalar(-0.1); // Forgiving hitbox

                // Obstacle Collision
                for (let obs of obstacles) {
                    if (!obs.active) continue;
                    const obsBox = new THREE.Box3().setFromObject(obs.mesh);
                    if (runnerBox.intersectsBox(obsBox)) {
                        isAlive = false;
                    }
                }

                // Coin Collection
                for (let coin of coins) {
                    if (!coin.active) continue;
                    coin.mesh.rotation.y += 2 * dt;
                    if (runner.position.distanceTo(coin.mesh.position) < 1.5) {
                        coin.active = false;
                        coin.mesh.visible = false;
                        score += 100;
                        coinsCollected++;
                    }
                }

                // World Management
                if (runner.position.z - 60 < lastPlatformZ) {
                    spawnPlatform();
                }

                // Cleanup behind camera
                if (platforms.length > 0 && platforms[0].zEnd > runner.position.z + 20) {
                    scene.remove(platforms[0].mesh);
                    platforms.shift();
                }
            }

            // Camera Follow
            const camTargetX = runner.position.x;
            const camTargetY = runner.position.y + 8;
            const camTargetZ = runner.position.z + 15;
            
            camera.position.x = THREE.MathUtils.lerp(camera.position.x, camTargetX, 0.1);
            camera.position.y = THREE.MathUtils.lerp(camera.position.y, camTargetY, 0.1);
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, camTargetZ, 0.1);
            camera.lookAt(runner.position);

            // UI Updates
            uiScore.innerText = `Score: ${score}`;
            uiDistance.innerText = `Distance: ${Math.floor(distance)} m`;
            uiSpeed.innerText = `Speed: ${(baseSpeed * timeScale).toFixed(1)}m/s`;
            
            uiEnergyBar.style.width = `${timeEnergy}%`;
            uiEnergyBar.style.backgroundColor = timeEnergy < 20 ? '#FF4444' : '#44FF44';

            if (isTimeFrozen) {
                uiCenterMsg.innerText = 'TIME FROZEN';
                uiCenterMsg.style.color = '#4444FF';
            } else if (isSlowMotion) {
                uiCenterMsg.innerText = 'SLOW MOTION';
                uiCenterMsg.style.color = '#00FFFF';
            } else {
                uiCenterMsg.innerText = '';
            }

            if (!isAlive && document.getElementById('game-over-screen').style.display !== 'flex') {
                document.getElementById('game-over-screen').style.display = 'flex';
            }

            // State Export
            window.__3D_STATE__ = {
                runnerX: runner.position.x,
                runnerY: runner.position.y,
                runnerZ: runner.position.z,
                velocityY: yVel,
                isGrounded,
                isAlive,
                isSliding,
                currentLane,
                score,
                distance,
                timeScale,
                timeEnergy,
                isSlowMotion,
                isTimeFrozen,
                freezeCooldown,
                jumpCount,
                gameStarted,
                platformCount,
                coinsCollected,
                baseSpeed,
                effectiveSpeed: baseSpeed * timeScale
            };

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
