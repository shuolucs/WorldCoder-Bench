<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parkour Runner - Time Manipulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 10;
}
#score {
    position: absolute;
    top: 15px;
    left: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}
#distance {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}
#speed {
    position: absolute;
    top: 15px;
    right: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}
#energyBarContainer {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 15px;
    border: 2px solid white;
    border-radius: 3px;
    background: rgba(0,0,0,0.4);
}
#energyBarFill {
    width: 100%;
    height: 100%;
    background: #44FF44;
    border-radius: 1px;
    transition: width 0.1s;
}
#energyLabel {
    position: absolute;
    top: 68px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 12px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}
#slowMotionText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: cyan;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 0 0 20px cyan, 0 0 40px cyan;
    display: none;
}
#timeFrozenText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -30px);
    color: #4488FF;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 0 0 20px #4488FF, 0 0 40px #4488FF;
    display: none;
}
#gameOverScreen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.5);
    z-index: 20;
}
#gameOverText {
    color: red;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
    margin-bottom: 10px;
}
#finalScore {
    color: white;
    font-size: 24px;
    margin-bottom: 20px;
}
#restartBtn {
    padding: 15px 40px;
    font-size: 20px;
    background: #FF4444;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    pointer-events: all;
    font-weight: bold;
}
#restartBtn:hover { background: #FF6666; }
#startScreen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.6);
    z-index: 20;
}
#startTitle {
    color: white;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
    margin-bottom: 20px;
}
#controls {
    color: #ccc;
    font-size: 16px;
    text-align: center;
    margin-bottom: 30px;
    line-height: 1.8;
}
#startBtn {
    padding: 15px 50px;
    font-size: 24px;
    background: #44AA44;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    pointer-events: all;
    font-weight: bold;
}
#startBtn:hover { background: #55CC55; }
</style>
</head>
<body>

<div id="hud">
    <div id="score">Score: 0</div>
    <div id="distance">Distance: 0 m</div>
    <div id="speed">Speed: 8m/s</div>
    <div id="energyBarContainer">
        <div id="energyBarFill"></div>
    </div>
    <div id="energyLabel">Time Energy</div>
    <div id="slowMotionText">SLOW MOTION</div>
    <div id="timeFrozenText">TIME FROZEN</div>
</div>

<div id="gameOverScreen">
    <div id="gameOverText">GAME OVER</div>
    <div id="finalScore"></div>
    <button id="restartBtn">Restart</button>
</div>

<div id="startScreen">
    <div id="startTitle">PARKOUR RUNNER</div>
    <div id="controls">
        SPACE - Jump (Double Jump allowed)<br>
        A/D or LEFT/RIGHT - Switch Lanes<br>
        S or DOWN - Slide<br>
        SHIFT (Hold) - Slow Motion<br>
        F - Time Freeze<br>
    </div>
    <button id="startBtn">Start</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============ GAME STATE ============
window.__3D_STATE__ = {
    runnerX: 0, runnerY: 1.0, runnerZ: 0,
    velocityY: 0,
    isGrounded: true,
    isAlive: true,
    isSliding: false,
    currentLane: 0,
    score: 0,
    distance: 0,
    timeScale: 1.0,
    timeEnergy: 100,
    isSlowMotion: false,
    isTimeFrozen: false,
    freezeCooldown: 0,
    jumpCount: 0,
    gameStarted: false,
    platformCount: 0,
    coinsCollected: 0,
    baseSpeed: 8,
    effectiveSpeed: 8
};

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 8, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
directionalLight.position.set(5, 15, 10);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 100;
directionalLight.shadow.camera.left = -30;
directionalLight.shadow.camera.right = 30;
directionalLight.shadow.camera.top = 30;
directionalLight.shadow.camera.bottom = -30;
scene.add(directionalLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const defaultDirIntensity = 1.2;
const defaultAmbIntensity = 0.4;
const defaultBgColor = new THREE.Color(0x87CEEB);
const slowBgColor = new THREE.Color(0x4A6E8A);

// ============ RUNNER ============
const runnerGroup = new THREE.Group();

const bodyGeom = new THREE.CylinderGeometry(0.4, 0.4, 1.2, 16);
const bodyMat = new THREE.MeshPhongMaterial({ color: 0xFF4444 });
const body = new THREE.Mesh(bodyGeom, bodyMat);
body.position.y = 0.6;
body.castShadow = true;
runnerGroup.add(body);

const headGeom = new THREE.SphereGeometry(0.4, 16, 16);
const headMat = new THREE.MeshPhongMaterial({ color: 0xFF4444 });
const head = new THREE.Mesh(headGeom, headMat);
head.position.y = 1.6;
head.castShadow = true;
runnerGroup.add(head);

runnerGroup.position.set(0, 1.0, 0);
scene.add(runnerGroup);

// Runner state
const runner = {
    velocityX: 0,
    velocityY: 0,
    velocityZ: 0,
    isGrounded: true,
    isAlive: true,
    isSliding: false,
    slideTimer: 0,
    currentLane: 0,
    targetLane: 0,
    jumpCount: 0,
    baseSpeed: 8,
    originalBodyScaleY: 1,
    originalBodyPosY: 0.6,
    originalHeadPosY: 1.6
};

const GRAVITY = -25;
const JUMP_VELOCITY = 10;
const LANES = [-2.5, 0, 2.5];

// ============ PLATFORMS & OBSTACLES & COINS ============
const platforms = [];
const obstacles = [];
const coins = [];
const coinCollected = new Set();

function generateCourse() {
    // Clear existing
    platforms.forEach(p => scene.remove(p.mesh));
    obstacles.forEach(o => scene.remove(o.mesh));
    coins.forEach(c => scene.remove(c.mesh));
    platforms.length = 0;
    obstacles.length = 0;
    coins.length = 0;
    coinCollected.clear();

    let currentZ = 0;
    let currentY = 0.25;

    for (let i = 0; i < 200; i++) {
        const length = 4 + Math.random() * 6;
        const width = 4;
        const height = 0.5;

        const color = i % 2 === 0 ? 0x44AA44 : 0x338833;
        const geom = new THREE.BoxGeometry(width, height, length);
        const mat = new THREE.MeshPhongMaterial({ color: color });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.receiveShadow = true;
        mesh.castShadow = true;

        const platZ = currentZ - length / 2;
        mesh.position.set(0, currentY, platZ);
        scene.add(mesh);

        platforms.push({
            mesh: mesh,
            x: 0,
            y: currentY,
            z: platZ,
            width: width,
            height: height,
            length: length,
            minZ: platZ - length / 2,
            maxZ: platZ + length / 2,
            topY: currentY + height / 2
        });

        // Obstacle every 3rd platform (starting from index 2)
        if (i > 0 && i % 3 === 2) {
            const obsGeom = new THREE.BoxGeometry(1, 1.5, 0.5);
            const obsMat = new THREE.MeshPhongMaterial({ color: 0xCC0000 });
            const obsMesh = new THREE.Mesh(obsGeom, obsMat);
            obsMesh.castShadow = true;

            const obsLane = LANES[Math.floor(Math.random() * 3)];
            const obsZ = platZ + (Math.random() - 0.5) * (length * 0.5);
            const obsY = currentY + height / 2 + 0.75;
            obsMesh.position.set(obsLane, obsY, obsZ);
            scene.add(obsMesh);

            obstacles.push({
                mesh: obsMesh,
                x: obsLane,
                y: obsY,
                z: obsZ,
                width: 1,
                height: 1.5,
                depth: 0.5
            });
        }

        // Coin every 2nd platform (starting from index 1)
        if (i > 0 && i % 2 === 1) {
            const coinGeom = new THREE.TorusGeometry(0.3, 0.08, 8, 16);
            const coinMat = new THREE.MeshPhongMaterial({ color: 0xFFD700, emissive: 0x886600 });
            const coinMesh = new THREE.Mesh(coinGeom, coinMat);
            coinMesh.castShadow = true;

            const coinLane = LANES[Math.floor(Math.random() * 3)];
            const coinZ = platZ + (Math.random() - 0.5) * (length * 0.4);
            const coinY = currentY + height / 2 + 1.5;
            coinMesh.position.set(coinLane, coinY, coinZ);
            scene.add(coinMesh);

            coins.push({
                mesh: coinMesh,
                x: coinLane,
                y: coinY,
                z: coinZ,
                collected: false,
                index: coins.length
            });
        }

        currentZ -= length;
        const gap = 1 + Math.random() * 2;
        currentZ -= gap;
        const heightChange = Math.random() < 0.3 ? Math.random() * 2 : 0;
        currentY = Math.max(0.25, currentY + (Math.random() < 0.5 ? heightChange : -heightChange * 0.5));
        if (currentY < 0.25) currentY = 0.25;
    }

    window.__3D_STATE__.platformCount = platforms.length;
}

generateCourse();

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

let jumpPressed = false;
let slidePressed = false;
let freezePressed = false;
let laneLeftPressed = false;
let laneRightPressed = false;

// ============ GAME CONTROL ============
let gameStarted = false;
let gameClock = new THREE.Clock(false);
let lastTime = 0;

const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');

startBtn.addEventListener('click', () => {
    startScreen.style.display = 'none';
    gameStarted = true;
    window.__3D_STATE__.gameStarted = true;
    gameClock.start();
    lastTime = 0;
});

restartBtn.addEventListener('click', () => {
    restartGame();
});

function restartGame() {
    gameOverScreen.style.display = 'none';

    // Reset runner
    runner.velocityX = 0;
    runner.velocityY = 0;
    runner.velocityZ = 0;
    runner.isGrounded = true;
    runner.isAlive = true;
    runner.isSliding = false;
    runner.slideTimer = 0;
    runner.currentLane = 0;
    runner.targetLane = 0;
    runner.jumpCount = 0;

    runnerGroup.position.set(0, 1.0, 0);
    body.scale.y = 1;
    body.position.y = runner.originalBodyPosY;
    head.position.y = runner.originalHeadPosY;

    // Reset state
    window.__3D_STATE__.score = 0;
    window.__3D_STATE__.distance = 0;
    window.__3D_STATE__.coinsCollected = 0;
    window.__3D_STATE__.timeEnergy = 100;
    window.__3D_STATE__.isSlowMotion = false;
    window.__3D_STATE__.isTimeFrozen = false;
    window.__3D_STATE__.freezeCooldown = 0;
    window.__3D_STATE__.timeScale = 1.0;

    // Regenerate course
    generateCourse();

    // Reset visuals
    scene.background.copy(defaultBgColor);
    directionalLight.intensity = defaultDirIntensity;
    ambientLight.intensity = defaultAmbIntensity;

    gameStarted = true;
    window.__3D_STATE__.gameStarted = true;
    gameClock.start();
    lastTime = 0;
}

// ============ TIME CONTROL ============
let timeScale = 1.0;
let timeEnergy = 100;
let isSlowMotion = false;
let isTimeFrozen = false;
let freezeTimer = 0;
let freezeCooldown = 0;

// ============ GAME LOOP ============
function update(realDelta) {
    if (!gameStarted || !runner.isAlive) return;

    const state = window.__3D_STATE__;

    // Handle time freeze cooldown (in real time)
    if (freezeCooldown > 0) {
        freezeCooldown -= realDelta;
        if (freezeCooldown < 0) freezeCooldown = 0;
    }

    // Handle time freeze
    if (isTimeFrozen) {
        freezeTimer -= realDelta;
        if (freezeTimer <= 0) {
            isTimeFrozen = false;
            freezeTimer = 0;
        }
        timeScale = 0.0;
    } else {
        // Handle slow motion
        const shiftHeld = keys['ShiftLeft'] || keys['ShiftRight'];
        if (shiftHeld && timeEnergy > 0 && !isTimeFrozen) {
            isSlowMotion = true;
            timeScale = 0.25;
            timeEnergy -= 20 * realDelta;
            if (timeEnergy <= 0) {
                timeEnergy = 0;
                isSlowMotion = false;
                timeScale = 1.0;
            }
        } else {
            isSlowMotion = false;
            timeScale = 1.0;
            timeEnergy += 10 * realDelta;
            if (timeEnergy > 100) timeEnergy = 100;
        }

        // Time freeze activation
        if (keys['KeyF'] && !freezePressed && !isTimeFrozen && freezeCooldown <= 0 && timeEnergy >= 50) {
            freezePressed = true;
            isTimeFrozen = true;
            freezeTimer = 1.5;
            freezeCooldown = 5.0;
            timeEnergy -= 50;
            timeScale = 0.0;
        }
        if (!keys['KeyF']) freezePressed = false;
    }

    // Visual effects for slow motion / freeze
    if (isSlowMotion || isTimeFrozen) {
        scene.background.copy(slowBgColor);
        directionalLight.intensity = 0.7;
        ambientLight.intensity = 0.3;
    } else {
        scene.background.copy(defaultBgColor);
        directionalLight.intensity = defaultDirIntensity;
        ambientLight.intensity = defaultAmbIntensity;
    }

    const dt = realDelta * timeScale;
    const effectiveSpeed = runner.baseSpeed * timeScale;

    // If time is frozen, skip physics but allow looking
    if (isTimeFrozen) {
        // Update state
        state.timeScale = 0.0;
        state.timeEnergy = timeEnergy;
        state.isSlowMotion = false;
        state.isTimeFrozen = true;
        state.freezeCooldown = freezeCooldown;
        state.effectiveSpeed = 0;

        // Update HUD text
        document.getElementById('slowMotionText').style.display = 'none';
        document.getElementById('timeFrozenText').style.display = 'block';

        updateHUD();
        updateCamera(realDelta);
        return;
    }

    // ---- LANE SWITCHING ----
    if ((keys['KeyA'] || keys['ArrowLeft']) && !laneLeftPressed) {
        laneLeftPressed = true;
        runner.targetLane = Math.max(-1, runner.targetLane - 1);
    }
    if (!keys['KeyA'] && !keys['ArrowLeft']) laneLeftPressed = false;

    if ((keys['KeyD'] || keys['ArrowRight']) && !laneRightPressed) {
        laneRightPressed = true;
        runner.targetLane = Math.min(1, runner.targetLane + 1);
    }
    if (!keys['KeyD'] && !keys['ArrowRight']) laneRightPressed = false;

    runner.currentLane = runner.targetLane;
    const targetX = LANES[runner.targetLane + 1];
    runnerGroup.position.x += (targetX - runnerGroup.position.x) * 0.15;

    // ---- JUMP ----
    if (keys['Space'] && !jumpPressed) {
        jumpPressed = true;
        if (runner.jumpCount < 2) {
            runner.velocityY = JUMP_VELOCITY;
            runner.isGrounded = false;
            runner.jumpCount++;
        }
    }
    if (!keys['Space']) jumpPressed = false;

    // ---- SLIDE ----
    if ((keys['KeyS'] || keys['ArrowDown']) && !slidePressed && runner.isGrounded && !runner.isSliding) {
        slidePressed = true;
        runner.isSliding = true;
        runner.slideTimer = 0.8;
    }
    if (!keys['KeyS'] && !keys['ArrowDown']) slidePressed = false;

    if (runner.isSliding) {
        runner.slideTimer -= realDelta; // Slide duration in real time for responsiveness
        if (runner.slideTimer <= 0) {
            runner.isSliding = false;
        }
    }

    // Slide visual
    if (runner.isSliding) {
        body.scale.y = 0.5;
        body.position.y = 0.3;
        head.position.y = 0.9;
    } else {
        body.scale.y = 1;
        body.position.y = runner.originalBodyPosY;
        head.position.y = runner.originalHeadPosY;
    }

    // ---- GRAVITY & MOVEMENT ----
    if (!runner.isGrounded) {
        runner.velocityY += GRAVITY * dt;
    }

    runnerGroup.position.y += runner.velocityY * dt;
    runnerGroup.position.z -= effectiveSpeed * realDelta; // Forward movement

    // ---- PLATFORM COLLISION ----
    runner.isGrounded = false;
    const runnerX = runnerGroup.position.x;
    const runnerY = runnerGroup.position.y;
    const runnerZ = runnerGroup.position.z;
    const runnerRadius = 0.4;

    for (const plat of platforms) {
        // Check if runner is within platform bounds horizontally
        if (runnerX >= plat.x - plat.width / 2 - runnerRadius &&
            runnerX <= plat.x + plat.width / 2 + runnerRadius &&
            runnerZ >= plat.minZ - runnerRadius &&
            runnerZ <= plat.maxZ + runnerRadius) {

            const platTop = plat.topY;
            // Check if runner is landing on top
            if (runner.velocityY <= 0 &&
                runnerY <= platTop + 1.0 + 0.1 &&
                runnerY >= platTop - 0.5) {
                runnerGroup.position.y = platTop + 1.0;
                runner.velocityY = 0;
                runner.isGrounded = true;
                runner.jumpCount = 0;
                break;
            }
        }
    }

    // ---- OBSTACLE COLLISION ----
    const runnerHeight = runner.isSliding ? 0.6 : 2.0;
    const runnerBottom = runnerGroup.position.y - 1.0;
    const runnerTop = runnerBottom + runnerHeight;

    for (const obs of obstacles) {
        const dx = Math.abs(runnerGroup.position.x - obs.x);
        const dz = Math.abs(runnerGroup.position.z - obs.z);

        if (dx < (0.4 + obs.width / 2) && dz < (0.4 + obs.depth / 2)) {
            const obsBottom = obs.y - obs.height / 2;
            const obsTop = obs.y + obs.height / 2;

            if (runnerTop > obsBottom && runnerBottom < obsTop) {
                runner.isAlive = false;
                break;
            }
        }
    }

    // ---- COIN COLLECTION ----
    for (const coin of coins) {
        if (coin.collected) continue;
        const dx = Math.abs(runnerGroup.position.x - coin.x);
        const dy = Math.abs(runnerGroup.position.y - coin.y);
        const dz = Math.abs(runnerGroup.position.z - coin.z);

        if (dx < 1.0 && dy < 1.5 && dz < 1.0) {
            coin.collected = true;
            coinCollected.add(coin.index);
            coin.mesh.visible = false;
            state.score += 100;
            state.coinsCollected++;
        }
    }

    // ---- COIN ROTATION ----
    for (const coin of coins) {
        if (!coin.collected) {
            coin.mesh.rotation.y += 2 * dt;
            coin.mesh.rotation.x += 0.5 * dt;
        }
    }

    // ---- DEATH CHECK ----
    if (runnerGroup.position.y < -5) {
        runner.isAlive = false;
    }

    // ---- DISTANCE ----
    state.distance = Math.abs(runnerGroup.position.z);

    // ---- UPDATE STATE ----
    state.runnerX = runnerGroup.position.x;
    state.runnerY = runnerGroup.position.y;
    state.runnerZ = runnerGroup.position.z;
    state.velocityY = runner.velocityY;
    state.isGrounded = runner.isGrounded;
    state.isAlive = runner.isAlive;
    state.isSliding = runner.isSliding;
    state.currentLane = runner.currentLane;
    state.timeScale = timeScale;
    state.timeEnergy = timeEnergy;
    state.isSlowMotion = isSlowMotion;
    state.isTimeFrozen = isTimeFrozen;
    state.freezeCooldown = freezeCooldown;
    state.jumpCount = runner.jumpCount;
    state.baseSpeed = runner.baseSpeed;
    state.effectiveSpeed = effectiveSpeed;

    // ---- DEATH ----
    if (!runner.isAlive) {
        gameOverScreen.style.display = 'flex';
        document.getElementById('finalScore').textContent =
            `Score: ${state.score} | Distance: ${Math.floor(state.distance)}m | Coins: ${state.coinsCollected}`;
    }

    // ---- HUD TEXT ----
    document.getElementById('slowMotionText').style.display = isSlowMotion ? 'block' : 'none';
    document.getElementById('timeFrozenText').style.display = 'none';

    updateHUD();
    updateCamera(realDelta);
}

function updateHUD() {
    const state = window.__3D_STATE__;
    document.getElementById('score').textContent = `Score: ${state.score}`;
    document.getElementById('distance').textContent = `Distance: ${Math.floor(state.distance)} m`;
    document.getElementById('speed').textContent = `Speed: ${state.effectiveSpeed.toFixed(1)}m/s`;

    const energyPct = Math.max(0, Math.min(100, state.timeEnergy));
    const fill = document.getElementById('energyBarFill');
    fill.style.width = energyPct + '%';
    if (energyPct > 50) fill.style.background = '#44FF44';
    else if (energyPct > 25) fill.style.background = '#FFAA00';
    else fill.style.background = '#FF4444';
}

function updateCamera(realDelta) {
    const targetCamPos = new THREE.Vector3(
        runnerGroup.position.x,
        runnerGroup.position.y + 7,
        runnerGroup.position.z + 15
    );
    camera.position.lerp(targetCamPos, 0.1);
    camera.lookAt(runnerGroup.position.x, runnerGroup.position.y + 2, runnerGroup.position.z);

    // Update directional light to follow
    directionalLight.position.set(
        runnerGroup.position.x + 5,
        runnerGroup.position.y + 15,
        runnerGroup.position.z + 10
    );
    directionalLight.target.position.copy(runnerGroup.position);
    directionalLight.target.updateMatrixWorld();
}

// ============ ANIMATION LOOP ============
let prevTimestamp = 0;

function animate(timestamp) {
    requestAnimationFrame(animate);

    const realDelta = Math.min((timestamp - prevTimestamp) / 1000, 0.05);
    prevTimestamp = timestamp;

    if (realDelta > 0) {
        update(realDelta);
    }

    renderer.render(scene, camera);
}

prevTimestamp = performance.now();
requestAnimationFrame(animate);

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial camera position
camera.lookAt(0, 2, 0);
</script>
