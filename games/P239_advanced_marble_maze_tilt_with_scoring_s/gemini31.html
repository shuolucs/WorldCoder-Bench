<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Marble Maze Tilt Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            padding: 15px;
            color: white;
            font-size: 18px;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }
        .hud-item {
            margin-bottom: 5px;
        }
        #statusDisplay {
            font-size: 24px;
            font-weight: bold;
            color: #ffdd00;
            margin-top: 10px;
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #4488ff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 20;
            transition: background-color 0.2s;
        }
        #startBtn:hover {
            background-color: #2266dd;
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div class="hud-item">Score: <span id="scoreDisplay">0</span></div>
        <div class="hud-item">Lives: <span id="livesDisplay">3</span></div>
        <div class="hud-item">Time: <span id="timerDisplay">0</span>s</div>
        <div id="statusDisplay"></div>
    </div>
    <button id="startBtn">Start Game</button>
    <div id="instructions">Arrow Keys: Tilt Board | R: Reset Game</div>
    <div id="game-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameStarted: false,
            gameOver: false,
            gameWon: false,
            score: 0,
            lives: 3,
            gemsCollected: 0,
            gemsRemaining: 5,
            marblePosition: { x: -6, y: 0.5, z: -6 },
            marbleVelocity: { x: 0, y: 0, z: 0 },
            boardTiltX: 0,
            boardTiltZ: 0,
            elapsedTime: 0,
            dragonLoaded: false,
            isInvincible: false,
            hazardHits: 0
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Game Objects ---
        const boardGroup = new THREE.Group();
        scene.add(boardGroup);

        // Board Floor
        const floorGeo = new THREE.BoxGeometry(16, 0.3, 16);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x2d4a3e });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -0.15; // Top surface at y=0
        floor.receiveShadow = true;
        boardGroup.add(floor);

        // Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x5a3a1a });
        const walls = [];
        const wallData = [
            // Perimeter
            { x: 0, z: -8.15, w: 16.6, d: 0.3 },
            { x: 0, z: 8.15, w: 16.6, d: 0.3 },
            { x: -8.15, z: 0, w: 0.3, d: 16.6 },
            { x: 8.15, z: 0, w: 0.3, d: 16.6 },
            // Internal Maze Pattern
            { x: -4, z: -4, w: 0.3, d: 8 },
            { x: 4, z: -4, w: 0.3, d: 8 },
            { x: 0, z: 4, w: 8, d: 0.3 },
            { x: -2, z: 0, w: 4, d: 0.3 },
            { x: 2, z: -2, w: 4, d: 0.3 },
            { x: -6, z: 2, w: 4, d: 0.3 },
            { x: 6, z: 2, w: 4, d: 0.3 },
            { x: 0, z: -6, w: 0.3, d: 4 }
        ];

        wallData.forEach(data => {
            const geo = new THREE.BoxGeometry(data.w, 0.5, data.d);
            const mesh = new THREE.Mesh(geo, wallMat);
            mesh.position.set(data.x, 0.25, data.z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            boardGroup.add(mesh);
            walls.push(data);
        });

        // Marble
        const marbleRadius = 0.35;
        const marbleGeo = new THREE.SphereGeometry(marbleRadius, 32, 32);
        const marbleMat = new THREE.MeshStandardMaterial({ 
            color: 0x4488ff, 
            metalness: 0.7, 
            roughness: 0.2 
        });
        const marble = new THREE.Mesh(marbleGeo, marbleMat);
        marble.castShadow = true;
        boardGroup.add(marble);

        // Gems
        const gems = [];
        const gemGeo = new THREE.OctahedronGeometry(0.25);
        const gemMat = new THREE.MeshStandardMaterial({ 
            color: 0xffdd00, 
            emissive: 0xffaa00,
            emissiveIntensity: 0.5
        });
        const gemPositions = [
            { x: -4, z: -2 }, { x: -2, z: 2 }, { x: 2, z: -4 }, { x: 4, z: 0 }, { x: 0, z: 4 }
        ];
        
        gemPositions.forEach(pos => {
            const mesh = new THREE.Mesh(gemGeo, gemMat);
            mesh.position.set(pos.x, 0.4, pos.z);
            mesh.castShadow = true;
            boardGroup.add(mesh);
            gems.push({ mesh, active: true, baseX: pos.x, baseZ: pos.z });
        });

        // Hazards
        const hazards = [];
        const hazardGeo = new THREE.CylinderGeometry(1.0, 1.0, 0.05, 32);
        const hazardMat = new THREE.MeshBasicMaterial({ 
            color: 0xff0000, 
            transparent: true, 
            opacity: 0.5 
        });
        const hazardPositions = [
            { x: 2, z: 2 }, { x: -3, z: 3 }, { x: 4, z: -2 }
        ];

        hazardPositions.forEach(pos => {
            const mesh = new THREE.Mesh(hazardGeo, hazardMat);
            mesh.position.set(pos.x, 0.02, pos.z);
            boardGroup.add(mesh);
            hazards.push({ x: pos.x, z: pos.z });
        });

        // Dragon Trophy
        const loader = new GLTFLoader();
        // Using a reliable raw github URL for the example model
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/DragonAttenuation.glb', (gltf) => {
            const dragon = gltf.scene;
            dragon.scale.set(0.3, 0.3, 0.3);
            dragon.position.set(0, 0.5, 0);
            
            dragon.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            boardGroup.add(dragon);
            state.dragonLoaded = true;
        }, undefined, (error) => {
            console.error('Error loading dragon model:', error);
            // Fallback if model fails to load
            const fallbackGeo = new THREE.ConeGeometry(0.5, 1, 16);
            const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
            const fallback = new THREE.Mesh(fallbackGeo, fallbackMat);
            fallback.position.set(0, 0.5, 0);
            fallback.castShadow = true;
            boardGroup.add(fallback);
            state.dragonLoaded = true;
        });

        // --- Physics & Logic Variables ---
        let posX = -6, posZ = -6;
        let velX = 0, velZ = 0;
        let tiltX = 0, tiltZ = 0;
        const maxTilt = 0.15;
        const tiltSpeedHold = 0.003;
        const tiltSpeedRelease = 0.002;
        const gravity = 9.8;
        const friction = 0.98;
        const restitution = 0.5;
        
        let invincibleTimer = 0;
        let flashTimer = 0;
        const clock = new THREE.Clock();

        // Input State
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        // --- Event Listeners ---
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
            if (e.code === 'KeyR') resetGame();
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            state.gameStarted = true;
            document.getElementById('startBtn').style.display = 'none';
            clock.start();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Game Functions ---
        function resetMarble() {
            posX = -6;
            posZ = -6;
            velX = 0;
            velZ = 0;
            marble.position.set(posX, marbleRadius, posZ);
        }

        function resetGame() {
            state.gameStarted = false;
            state.gameOver = false;
            state.gameWon = false;
            state.score = 0;
            state.lives = 3;
            state.gemsCollected = 0;
            state.gemsRemaining = 5;
            state.elapsedTime = 0;
            state.hazardHits = 0;
            state.isInvincible = false;
            invincibleTimer = 0;
            
            resetMarble();
            
            gems.forEach(g => {
                g.active = true;
                g.mesh.visible = true;
            });
            
            tiltX = 0;
            tiltZ = 0;
            boardGroup.rotation.set(0, 0, 0);
            
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('statusDisplay').innerText = '';
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('scoreDisplay').innerText = state.score;
            document.getElementById('livesDisplay').innerText = state.lives;
            document.getElementById('timerDisplay').innerText = Math.floor(state.elapsedTime);
            
            const statusEl = document.getElementById('statusDisplay');
            if (state.gameWon) {
                statusEl.innerText = 'YOU WIN!';
                statusEl.style.color = '#00ff00';
            } else if (state.gameOver) {
                statusEl.innerText = 'GAME OVER';
                statusEl.style.color = '#ff0000';
            } else {
                statusEl.innerText = '';
            }
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent huge jumps
            const time = clock.getElapsedTime();

            if (state.gameStarted && !state.gameOver && !state.gameWon) {
                state.elapsedTime += dt;

                // 1. Update Board Tilt
                if (keys.ArrowUp) tiltX = Math.max(tiltX - tiltSpeedHold, -maxTilt);
                else if (keys.ArrowDown) tiltX = Math.min(tiltX + tiltSpeedHold, maxTilt);
                else {
                    if (tiltX > 0) tiltX = Math.max(tiltX - tiltSpeedRelease, 0);
                    if (tiltX < 0) tiltX = Math.min(tiltX + tiltSpeedRelease, 0);
                }

                if (keys.ArrowLeft) tiltZ = Math.min(tiltZ + tiltSpeedHold, maxTilt);
                else if (keys.ArrowRight) tiltZ = Math.max(tiltZ - tiltSpeedHold, -maxTilt);
                else {
                    if (tiltZ > 0) tiltZ = Math.max(tiltZ - tiltSpeedRelease, 0);
                    if (tiltZ < 0) tiltZ = Math.min(tiltZ + tiltSpeedRelease, 0);
                }

                boardGroup.rotation.x = tiltX;
                boardGroup.rotation.z = tiltZ;

                // 2. Marble Physics (Local to Board)
                // Acceleration based on tilt
                const accelX = -tiltZ * gravity;
                const accelZ = tiltX * gravity;

                velX += accelX * dt;
                velZ += accelZ * dt;

                velX *= friction;
                velZ *= friction;

                posX += velX * dt;
                posZ += velZ * dt;

                // 3. Wall Collision (AABB)
                walls.forEach(wall => {
                    const hw = wall.w / 2;
                    const hd = wall.d / 2;
                    const minX = wall.x - hw;
                    const maxX = wall.x + hw;
                    const minZ = wall.z - hd;
                    const maxZ = wall.z + hd;

                    const closestX = Math.max(minX, Math.min(posX, maxX));
                    const closestZ = Math.max(minZ, Math.min(posZ, maxZ));

                    const dx = posX - closestX;
                    const dz = posZ - closestZ;
                    const distanceSq = dx * dx + dz * dz;

                    if (distanceSq < marbleRadius * marbleRadius) {
                        const distance = Math.sqrt(distanceSq);
                        let nx = 0, nz = 0;

                        if (distance === 0) {
                            nx = velX > 0 ? -1 : 1;
                            nz = velZ > 0 ? -1 : 1;
                        } else {
                            nx = dx / distance;
                            nz = dz / distance;
                        }

                        const penetration = marbleRadius - distance;
                        posX += nx * penetration;
                        posZ += nz * penetration;

                        const dot = velX * nx + velZ * nz;
                        if (dot < 0) {
                            velX = velX - (1 + restitution) * dot * nx;
                            velZ = velZ - (1 + restitution) * dot * nz;
                        }
                    }
                });

                // Clamp to board bounds just in case
                posX = Math.max(-7.5, Math.min(7.5, posX));
                posZ = Math.max(-7.5, Math.min(7.5, posZ));

                marble.position.set(posX, marbleRadius, posZ);

                // 4. Gem Collection
                gems.forEach(gem => {
                    if (gem.active) {
                        const dx = posX - gem.baseX;
                        const dz = posZ - gem.baseZ;
                        if (Math.sqrt(dx*dx + dz*dz) < 0.7) {
                            gem.active = false;
                            gem.mesh.visible = false;
                            state.score += 100;
                            state.gemsCollected++;
                            state.gemsRemaining--;
                            flashTimer = 0.2;
                        }
                    }
                });

                // 5. Hazards
                if (invincibleTimer > 0) {
                    invincibleTimer -= dt;
                    state.isInvincible = true;
                    marble.material.transparent = true;
                    marble.material.opacity = (Math.sin(time * 20) * 0.5) + 0.5;
                } else {
                    state.isInvincible = false;
                    marble.material.transparent = false;
                    marble.material.opacity = 1.0;

                    hazards.forEach(hazard => {
                        const dx = posX - hazard.x;
                        const dz = posZ - hazard.z;
                        if (Math.sqrt(dx*dx + dz*dz) < 1.0) {
                            state.lives--;
                            state.hazardHits++;
                            if (state.lives <= 0) {
                                state.gameOver = true;
                            } else {
                                resetMarble();
                                invincibleTimer = 2.0;
                            }
                        }
                    });
                }

                // 6. Win Condition (Dragon)
                if (state.gemsCollected === 5) {
                    const dx = posX - 0;
                    const dz = posZ - 0;
                    if (Math.sqrt(dx*dx + dz*dz) < 1.0) {
                        state.gameWon = true;
                    }
                }
            }

            // Animations (always run)
            gems.forEach(gem => {
                if (gem.active) {
                    gem.mesh.rotation.y += 1 * dt;
                    gem.mesh.position.y = 0.4 + Math.sin(time * 2) * 0.1;
                }
            });

            // Flash Effect
            if (flashTimer > 0) {
                flashTimer -= dt;
                floorMat.emissive.setHex(0x335544);
            } else {
                floorMat.emissive.setHex(0x000000);
            }

            // Update State Object
            state.marblePosition.x = posX || 0;
            state.marblePosition.y = marbleRadius;
            state.marblePosition.z = posZ || 0;
            state.marbleVelocity.x = velX || 0;
            state.marbleVelocity.y = 0;
            state.marbleVelocity.z = velZ || 0;
            state.boardTiltX = tiltX || 0;
            state.boardTiltZ = tiltZ || 0;

            updateHUD();
            renderer.render(scene, camera);
        }

        // Start loop
        animate();
    </script>
</body>
</html>
