<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Marble Maze Tilt Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: Arial, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 0;
    left: 0;
    padding: 15px;
    color: white;
    font-size: 18px;
    pointer-events: none;
    z-index: 10;
}
#hud div { margin-bottom: 8px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
#startBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 40px;
    font-size: 24px;
    background: linear-gradient(135deg, #4488ff, #2266cc);
    color: white;
    border: 2px solid #66aaff;
    border-radius: 12px;
    cursor: pointer;
    z-index: 20;
    transition: all 0.3s;
}
#startBtn:hover {
    background: linear-gradient(135deg, #66aaff, #4488ff);
    transform: translate(-50%, -50%) scale(1.05);
}
#flashOverlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.1s;
}
</style>
</head>
<body>

<div id="hud">
    <div>Score: <span id="scoreDisplay">0</span></div>
    <div>Lives: <span id="livesDisplay">3</span></div>
    <div>Time: <span id="timerDisplay">0.0</span>s</div>
    <div id="statusDisplay"></div>
</div>

<button id="startBtn">Start Game</button>
<div id="flashOverlay"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
    gameStarted: false,
    gameOver: false,
    gameWon: false,
    score: 0,
    lives: 3,
    gemsCollected: 0,
    gemsRemaining: 5,
    marblePosition: { x: -6, y: 0.5, z: -6 },
    marbleVelocity: { x: 0, y: 0, z: 0 },
    boardTiltX: 0,
    boardTiltZ: 0,
    elapsedTime: 0,
    dragonLoaded: false,
    isInvincible: false,
    hazardHits: 0
};
window.__3D_STATE__ = state;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x1a1a2e);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Scene
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 8);
camera.lookAt(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -12;
dirLight.shadow.camera.right = 12;
dirLight.shadow.camera.top = 12;
dirLight.shadow.camera.bottom = -12;
scene.add(dirLight);

// Board group (tilts)
const boardGroup = new THREE.Group();
scene.add(boardGroup);

// Board floor
const boardGeo = new THREE.BoxGeometry(16, 0.3, 16);
const boardMat = new THREE.MeshStandardMaterial({ color: 0x2d4a3e });
const board = new THREE.Mesh(boardGeo, boardMat);
board.receiveShadow = true;
board.position.y = 0;
boardGroup.add(board);

// Wall material
const wallMat = new THREE.MeshStandardMaterial({ color: 0x5a3a1a });

// Wall creation helper
function createWall(x, z, width, depth) {
    const geo = new THREE.BoxGeometry(width, 0.5, depth);
    const wall = new THREE.Mesh(geo, wallMat);
    wall.position.set(x, 0.4, z);
    wall.castShadow = true;
    wall.receiveShadow = true;
    boardGroup.add(wall);
    return {
        minX: x - width / 2,
        maxX: x + width / 2,
        minZ: z - depth / 2,
        maxZ: z + depth / 2
    };
}

const walls = [];

// Perimeter walls
walls.push(createWall(0, -8, 16.6, 0.3));   // top
walls.push(createWall(0, 8, 16.6, 0.3));    // bottom
walls.push(createWall(-8, 0, 0.3, 16.6));   // left
walls.push(createWall(8, 0, 0.3, 16.6));    // right

// Internal walls forming maze pattern
// Wall 1: horizontal wall near top-left
walls.push(createWall(-3, -5, 6, 0.3));
// Wall 2: vertical wall from top area
walls.push(createWall(-5, -2.5, 0.3, 5));
// Wall 3: horizontal wall middle-left
walls.push(createWall(-2, -1, 4, 0.3));
// Wall 4: vertical wall center
walls.push(createWall(0, 2, 0.3, 4));
// Wall 5: horizontal wall right side
walls.push(createWall(3, -3, 4, 0.3));
// Wall 6: vertical wall right
walls.push(createWall(5, -0.5, 0.3, 5));
// Wall 7: horizontal wall bottom area
walls.push(createWall(-1, 5, 6, 0.3));
// Wall 8: vertical wall bottom-left
walls.push(createWall(-3, 3, 0.3, 4));
// Wall 9: horizontal near center-right
walls.push(createWall(3, 2, 4, 0.3));
// Wall 10: small wall near dragon
walls.push(createWall(1.5, -1, 0.3, 2));

// Marble
const marbleGeo = new THREE.SphereGeometry(0.35, 32, 32);
const marbleMat = new THREE.MeshStandardMaterial({
    color: 0x4488ff,
    metalness: 0.7,
    roughness: 0.2
});
const marble = new THREE.Mesh(marbleGeo, marbleMat);
marble.castShadow = true;
marble.position.set(-6, 0.5, -6);
boardGroup.add(marble);

// Marble physics
let marbleVel = new THREE.Vector3(0, 0, 0);
const marbleRadius = 0.35;
const BOARD_HALF = 7.65;

// Gems
const gemPositions = [
    new THREE.Vector3(-4, 0.4, -2),
    new THREE.Vector3(-2, 0.4, 2),
    new THREE.Vector3(2, 0.4, -4),
    new THREE.Vector3(4, 0.4, 0),
    new THREE.Vector3(0, 0.4, 4)
];

const gems = [];
const gemMat = new THREE.MeshStandardMaterial({
    color: 0xffdd00,
    emissive: 0xffaa00,
    emissiveIntensity: 0.5
});

gemPositions.forEach(pos => {
    const gemGeo = new THREE.OctahedronGeometry(0.25);
    const gem = new THREE.Mesh(gemGeo, gemMat.clone());
    gem.position.copy(pos);
    gem.castShadow = true;
    gem.userData.baseY = pos.y;
    gem.userData.collected = false;
    boardGroup.add(gem);
    gems.push(gem);
});

// Hazard zones
const hazardPositions = [
    new THREE.Vector3(2, 0.02, 2),
    new THREE.Vector3(-3, 0.02, 3),
    new THREE.Vector3(4, 0.02, -2)
];

const hazards = [];
hazardPositions.forEach(pos => {
    const hazGeo = new THREE.CircleGeometry(1.0, 32);
    const hazMat = new THREE.MeshStandardMaterial({
        color: 0xff0000,
        opacity: 0.5,
        transparent: true,
        side: THREE.DoubleSide
    });
    const haz = new THREE.Mesh(hazGeo, hazMat);
    haz.rotation.x = -Math.PI / 2;
    haz.position.copy(pos);
    boardGroup.add(haz);
    hazards.push({ mesh: haz, center: new THREE.Vector2(pos.x, pos.z) });
});

// Dragon model
let dragonModel = null;
const loader = new GLTFLoader();

// Create a placeholder trophy while dragon loads
const trophyGeo = new THREE.ConeGeometry(0.4, 0.8, 6);
const trophyMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });
const trophy = new THREE.Mesh(trophyGeo, trophyMat);
trophy.position.set(0, 0.6, 0);
trophy.castShadow = true;
boardGroup.add(trophy);

// Goal indicator ring
const ringGeo = new THREE.TorusGeometry(0.8, 0.05, 8, 32);
const ringMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 0.3 });
const goalRing = new THREE.Mesh(ringGeo, ringMat);
goalRing.rotation.x = -Math.PI / 2;
goalRing.position.set(0, 0.2, 0);
boardGroup.add(goalRing);

loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/DragonAttenuation/glTF-Binary/DragonAttenuation.glb',
    (gltf) => {
        dragonModel = gltf.scene;
        dragonModel.scale.set(0.3, 0.3, 0.3);
        dragonModel.position.set(0, 0.5, 0);
        dragonModel.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        boardGroup.add(dragonModel);
        boardGroup.remove(trophy);
        state.dragonLoaded = true;
        console.log('Dragon model loaded');
    },
    undefined,
    (error) => {
        console.warn('Dragon model failed to load, using trophy placeholder:', error);
        state.dragonLoaded = true; // Use trophy as fallback
    }
);

// Particle system for gem collection
const particleGeo = new THREE.BufferGeometry();
const particleCount = 30;
const particlePositions = new Float32Array(particleCount * 3);
const particleVelocities = [];
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xffdd00, size: 0.15, transparent: true, opacity: 1 });
const particles = new THREE.Points(particleGeo, particleMat);
particles.visible = false;
boardGroup.add(particles);
let particleLife = 0;

function spawnParticles(pos) {
    particleVelocities.length = 0;
    for (let i = 0; i < particleCount; i++) {
        particlePositions[i * 3] = pos.x;
        particlePositions[i * 3 + 1] = pos.y;
        particlePositions[i * 3 + 2] = pos.z;
        particleVelocities.push(new THREE.Vector3(
            (Math.random() - 0.5) * 4,
            Math.random() * 3 + 1,
            (Math.random() - 0.5) * 4
        ));
    }
    particleGeo.attributes.position.needsUpdate = true;
    particles.visible = true;
    particleMat.opacity = 1;
    particleLife = 1.0;
}

// Input
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'r' || e.key === 'R') resetGame();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Tilt
let tiltX = 0; // rotation around X axis (forward/back)
let tiltZ = 0; // rotation around Z axis (left/right)
const MAX_TILT = 0.15;
const TILT_SPEED = 0.003;
const TILT_RETURN = 0.002;

// Game timing
let startTime = 0;
let invincibleTimer = 0;
let gameActive = false;

// Flash effect
const flashOverlay = document.getElementById('flashOverlay');
function flashScreen(color) {
    flashOverlay.style.backgroundColor = color;
    flashOverlay.style.opacity = '0.4';
    setTimeout(() => { flashOverlay.style.opacity = '0'; }, 200);
}

// Start button
document.getElementById('startBtn').addEventListener('click', () => {
    state.gameStarted = true;
    gameActive = true;
    startTime = performance.now();
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('statusDisplay').textContent = 'Collect all gems and reach the dragon!';
    setTimeout(() => {
        if (!state.gameOver && !state.gameWon) {
            document.getElementById('statusDisplay').textContent = '';
        }
    }, 3000);
});

function resetMarble() {
    marble.position.set(-6, 0.5, -6);
    marbleVel.set(0, 0, 0);
    invincibleTimer = 2.0;
    state.isInvincible = true;
}

function resetGame() {
    state.gameStarted = false;
    state.gameOver = false;
    state.gameWon = false;
    state.score = 0;
    state.lives = 3;
    state.gemsCollected = 0;
    state.gemsRemaining = 5;
    state.elapsedTime = 0;
    state.isInvincible = false;
    state.hazardHits = 0;
    gameActive = false;
    tiltX = 0;
    tiltZ = 0;
    marble.position.set(-6, 0.5, -6);
    marbleVel.set(0, 0, 0);
    invincibleTimer = 0;

    gems.forEach((gem, i) => {
        gem.visible = true;
        gem.userData.collected = false;
        gem.position.copy(gemPositions[i]);
    });

    document.getElementById('scoreDisplay').textContent = '0';
    document.getElementById('livesDisplay').textContent = '3';
    document.getElementById('timerDisplay').textContent = '0.0';
    document.getElementById('statusDisplay').textContent = '';
    document.getElementById('startBtn').style.display = 'block';
}

// Collision detection
function checkWallCollision(px, pz, vx, vz) {
    let newPx = px;
    let newPz = pz;
    let newVx = vx;
    let newVz = vz;
    const r = marbleRadius;

    for (const wall of walls) {
        const closestX = Math.max(wall.minX, Math.min(newPx, wall.maxX));
        const closestZ = Math.max(wall.minZ, Math.min(newPz, wall.maxZ));
        const dx = newPx - closestX;
        const dz = newPz - closestZ;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < r && dist > 0.0001) {
            const overlap = r - dist;
            const nx = dx / dist;
            const nz = dz / dist;

            newPx += nx * overlap;
            newPz += nz * overlap;

            const dotVN = newVx * nx + newVz * nz;
            if (dotVN < 0) {
                newVx -= (1 + 0.5) * dotVN * nx;
                newVz -= (1 + 0.5) * dotVN * nz;
            }
        } else if (dist < 0.0001) {
            // Marble center is inside wall AABB
            const overlapLeft = newPx - wall.minX + r;
            const overlapRight = wall.maxX - newPx + r;
            const overlapTop = newPz - wall.minZ + r;
            const overlapBottom = wall.maxZ - newPz + r;
            const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

            if (minOverlap === overlapLeft) {
                newPx = wall.minX - r;
                if (newVx > 0) newVx *= -0.5;
            } else if (minOverlap === overlapRight) {
                newPx = wall.maxX + r;
                if (newVx < 0) newVx *= -0.5;
            } else if (minOverlap === overlapTop) {
                newPz = wall.minZ - r;
                if (newVz > 0) newVz *= -0.5;
            } else {
                newPz = wall.maxZ + r;
                if (newVz < 0) newVz *= -0.5;
            }
        }
    }

    return { px: newPx, pz: newPz, vx: newVx, vz: newVz };
}

// Animation
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    const time = clock.getElapsedTime();

    // Update tilt
    if (gameActive && !state.gameOver && !state.gameWon) {
        if (keys['ArrowUp']) tiltX = Math.max(tiltX - TILT_SPEED, -MAX_TILT);
        else if (keys['ArrowDown']) tiltX = Math.min(tiltX + TILT_SPEED, MAX_TILT);
        else {
            if (tiltX > 0) tiltX = Math.max(0, tiltX - TILT_RETURN);
            else if (tiltX < 0) tiltX = Math.min(0, tiltX + TILT_RETURN);
        }

        if (keys['ArrowLeft']) tiltZ = Math.max(tiltZ - TILT_SPEED, -MAX_TILT);
        else if (keys['ArrowRight']) tiltZ = Math.min(tiltZ + TILT_SPEED, MAX_TILT);
        else {
            if (tiltZ > 0) tiltZ = Math.max(0, tiltZ - TILT_RETURN);
            else if (tiltZ < 0) tiltZ = Math.min(0, tiltZ + TILT_RETURN);
        }
    }

    tiltX = Math.max(-MAX_TILT, Math.min(MAX_TILT, tiltX));
    tiltZ = Math.max(-MAX_TILT, Math.min(MAX_TILT, tiltZ));

    boardGroup.rotation.x = tiltX;
    boardGroup.rotation.z = tiltZ;

    // Marble physics
    if (gameActive && !state.gameOver && !state.gameWon) {
        // Gravity based on tilt
        const accelX = Math.sin(tiltZ) * 9.8;
        const accelZ = -Math.sin(tiltX) * 9.8;

        marbleVel.x += accelX * dt;
        marbleVel.z += accelZ * dt;

        // Friction
        marbleVel.x *= 0.98;
        marbleVel.z *= 0.98;

        // Update position
        let newX = marble.position.x + marbleVel.x * dt;
        let newZ = marble.position.z + marbleVel.z * dt;

        // Wall collision
        const result = checkWallCollision(newX, newZ, marbleVel.x, marbleVel.z);
        newX = result.px;
        newZ = result.pz;
        marbleVel.x = result.vx;
        marbleVel.z = result.vz;

        // Clamp to board
        newX = Math.max(-BOARD_HALF, Math.min(BOARD_HALF, newX));
        newZ = Math.max(-BOARD_HALF, Math.min(BOARD_HALF, newZ));

        if (newX <= -BOARD_HALF || newX >= BOARD_HALF) marbleVel.x *= -0.5;
        if (newZ <= -BOARD_HALF || newZ >= BOARD_HALF) marbleVel.z *= -0.5;

        marble.position.x = newX;
        marble.position.z = newZ;
        marble.position.y = 0.5;

        // Marble rotation for rolling effect
        const speed = Math.sqrt(marbleVel.x * marbleVel.x + marbleVel.z * marbleVel.z);
        if (speed > 0.01) {
            const rotAxis = new THREE.Vector3(-marbleVel.z, 0, marbleVel.x).normalize();
            const rotAngle = speed * dt / marbleRadius;
            marble.rotateOnWorldAxis(rotAxis, rotAngle);
        }

        // Invincibility timer
        if (invincibleTimer > 0) {
            invincibleTimer -= dt;
            marble.visible = Math.floor(invincibleTimer * 10) % 2 === 0;
            if (invincibleTimer <= 0) {
                invincibleTimer = 0;
                state.isInvincible = false;
                marble.visible = true;
            }
        }

        // Gem collection
        gems.forEach((gem, i) => {
            if (gem.userData.collected) return;
            const dx = marble.position.x - gemPositions[i].x;
            const dz = marble.position.z - gemPositions[i].z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            if (dist < 0.7) {
                gem.userData.collected = true;
                gem.visible = false;
                state.score += 100;
                state.gemsCollected++;
                state.gemsRemaining--;
                spawnParticles(gem.position.clone());
                flashScreen('#ffdd00');
                document.getElementById('scoreDisplay').textContent = state.score;
            }
        });

        // Hazard check
        if (!state.isInvincible) {
            for (const haz of hazards) {
                const dx = marble.position.x - haz.center.x;
                const dz = marble.position.z - haz.center.y;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < 1.0) {
                    state.lives--;
                    state.hazardHits++;
                    flashScreen('#ff0000');
                    document.getElementById('livesDisplay').textContent = state.lives;
                    if (state.lives <= 0) {
                        state.gameOver = true;
                        gameActive = false;
                        document.getElementById('statusDisplay').textContent = 'GAME OVER';
                        document.getElementById('statusDisplay').style.color = '#ff4444';
                        document.getElementById('statusDisplay').style.fontSize = '28px';
                    } else {
                        resetMarble();
                    }
                    break;
                }
            }
        }

        // Win check
        if (state.gemsCollected >= 5) {
            const dx = marble.position.x;
            const dz = marble.position.z;
            const distToCenter = Math.sqrt(dx * dx + dz * dz);
            if (distToCenter < 1.0) {
                state.gameWon = true;
                gameActive = false;
                document.getElementById('statusDisplay').textContent = 'YOU WIN!';
                document.getElementById('statusDisplay').style.color = '#44ff44';
                document.getElementById('statusDisplay').style.fontSize = '28px';
            }
        }

        // Timer
        state.elapsedTime = parseFloat(((performance.now() - startTime) / 1000).toFixed(1));
        document.getElementById('timerDisplay').textContent = state.elapsedTime.toFixed(1);
    }

    // Animate gems
    gems.forEach(gem => {
        if (gem.userData.collected) return;
        gem.rotation.y += 1.0 * dt;
        gem.position.y = gem.userData.baseY + Math.sin(time * 2) * 0.1;
    });

    // Animate goal ring
    goalRing.rotation.z += 0.5 * dt;

    // Animate dragon/trophy
    if (dragonModel) {
        dragonModel.rotation.y += 0.3 * dt;
    } else {
        trophy.rotation.y += 0.5 * dt;
    }

    // Animate particles
    if (particleLife > 0) {
        particleLife -= dt * 2;
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i * 3] += particleVelocities[i].x * dt;
            particlePositions[i * 3 + 1] += particleVelocities[i].y * dt;
            particlePositions[i * 3 + 2] += particleVelocities[i].z * dt;
            particleVelocities[i].y -= 5 * dt;
        }
        particleGeo.attributes.position.needsUpdate = true;
        particleMat.opacity = Math.max(0, particleLife);
        if (particleLife <= 0) particles.visible = false;
    }

    // Hazard zone pulsing
    hazards.forEach(h => {
        h.mesh.material.opacity = 0.3 + 0.2 * Math.sin(time * 3);
    });

    // Invincible marble blinking color
    if (state.isInvincible) {
        marbleMat.emissive.setHex(Math.floor(time * 10) % 2 === 0 ? 0x4488ff : 0x000000);
        marbleMat.emissiveIntensity = 0.5;
    } else {
        marbleMat.emissive.setHex(0x000000);
        marbleMat.emissiveIntensity = 0;
    }

    // Update state
    state.marblePosition = {
        x: parseFloat(marble.position.x.toFixed(4)) || 0,
        y: parseFloat(marble.position.y.toFixed(4)) || 0,
        z: parseFloat(marble.position.z.toFixed(4)) || 0
    };
    state.marbleVelocity = {
        x: parseFloat(marbleVel.x.toFixed(4)) || 0,
        y: 0,
        z: parseFloat(marbleVel.z.toFixed(4)) || 0
    };
    state.boardTiltX = parseFloat(tiltX.toFixed(6)) || 0;
    state.boardTiltZ = parseFloat(tiltZ.toFixed(6)) || 0;

    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
