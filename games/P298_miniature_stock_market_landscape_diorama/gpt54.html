<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Stock Market Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #87CEEB 0%, #ffffff 100%);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #hud-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
      z-index: 10;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    #hud-panel div {
      margin: 4px 0;
      font-size: 14px;
      color: #222;
    }

    #button-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    #button-bar button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.92);
      color: #222;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      transition: transform 0.15s ease, background 0.15s ease;
    }

    #button-bar button:hover {
      background: #ffffff;
      transform: translateY(-1px);
    }

    #labels-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 9;
    }

    .tower-label {
      position: absolute;
      transform: translate(-50%, -50%);
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.65);
      color: white;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud-panel">
      <div>Mode: <span id="mode-display">stable</span></div>
      <div>Total Market Cap: <span id="cap-display">22.50</span></div>
      <div>Time Step: <span id="time-display">0</span></div>
      <div>Selected: <span id="selected-display">None</span></div>
    </div>

    <div id="labels-container"></div>

    <div id="button-bar">
      <button id="btn-bull">Bull Market</button>
      <button id="btn-bear">Bear Market</button>
      <button id="btn-reset">Reset</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const INITIAL_HEIGHTS = [5, 4, 6, 3, 4.5];
    const STOCKS = ['AAPL', 'GOOG', 'MSFT', 'AMZN', 'TSLA'];
    const STOCK_COLORS = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8'];
    const STOCK_X = [-6, -3, 0, 3, 6];

    window.__3D_STATE__ = {
      sceneReady: false,
      stockHeights: [...INITIAL_HEIGHTS],
      selectedStock: -1,
      marketMode: 'stable',
      animating: false,
      totalMarketCap: 22.5,
      mascotLoaded: false,
      mascotRotationY: 0,
      timeStep: 0,
      hoveredStock: -1,
      mascotModel: null
    };

    const app = document.getElementById('app');
    const labelsContainer = document.getElementById('labels-container');

    const hud = {
      mode: document.getElementById('mode-display'),
      cap: document.getElementById('cap-display'),
      time: document.getElementById('time-display'),
      selected: document.getElementById('selected-display'),
    };

    const scene = new THREE.Scene();

    const createGradientBackground = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 2;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 0, 512);
      grad.addColorStop(0, '#87CEEB');
      grad.addColorStop(1, '#FFFFFF');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 2, 512);
      const texture = new THREE.CanvasTexture(canvas);
      scene.background = texture;
    };
    createGradientBackground();

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 12, 18);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(10, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.6, 20),
      new THREE.MeshStandardMaterial({ color: '#6DBE57', roughness: 0.9 })
    );
    ground.position.set(0, 0.3, 0);
    ground.receiveShadow = true;
    scene.add(ground);

    const edge = new THREE.Mesh(
      new THREE.BoxGeometry(20.5, 0.25, 20.5),
      new THREE.MeshStandardMaterial({ color: '#c8b08a', roughness: 1.0 })
    );
    edge.position.set(0, 0.125, 0);
    edge.receiveShadow = true;
    scene.add(edge);

    const towerGroup = new THREE.Group();
    scene.add(towerGroup);

    const towers = [];
    const labels = [];

    function safeNumber(n, fallback = 0.5) {
      return Number.isFinite(n) && !Number.isNaN(n) ? Math.max(0.5, n) : fallback;
    }

    function recomputeTotalMarketCap() {
      const sum = window.__3D_STATE__.stockHeights.reduce((a, b) => a + safeNumber(b, 0.5), 0);
      window.__3D_STATE__.totalMarketCap = Number(sum.toFixed(4));
    }

    function syncHUD() {
      recomputeTotalMarketCap();
      hud.mode.textContent = window.__3D_STATE__.marketMode;
      hud.cap.textContent = window.__3D_STATE__.totalMarketCap.toFixed(2);
      hud.time.textContent = String(window.__3D_STATE__.timeStep);
      hud.selected.textContent = window.__3D_STATE__.selectedStock >= 0
        ? STOCKS[window.__3D_STATE__.selectedStock]
        : 'None';
    }

    function setSelectedStock(index) {
      window.__3D_STATE__.selectedStock = index;
      towers.forEach((tower, i) => {
        const mat = tower.material;
        if (i === index) {
          mat.emissive = new THREE.Color('#FFFF00');
          mat.emissiveIntensity = 0.3;
        } else {
          mat.emissive = new THREE.Color('#000000');
          mat.emissiveIntensity = 0.0;
        }
      });
      syncHUD();
    }

    function createTowers() {
      for (let i = 0; i < 5; i++) {
        const h = INITIAL_HEIGHTS[i];
        const geom = new THREE.BoxGeometry(1.5, h, 1.5);
        const mat = new THREE.MeshStandardMaterial({
          color: STOCK_COLORS[i],
          roughness: 0.5,
          metalness: 0.15,
          emissive: new THREE.Color('#000000'),
          emissiveIntensity: 0
        });
        const tower = new THREE.Mesh(geom, mat);
        tower.position.set(STOCK_X[i], h / 2, -4);
        tower.castShadow = true;
        tower.receiveShadow = true;
        tower.userData.stockIndex = i;
        towerGroup.add(tower);
        towers.push(tower);

        const label = document.createElement('div');
        label.className = 'tower-label';
        label.textContent = STOCKS[i];
        labelsContainer.appendChild(label);
        labels.push(label);
      }
    }
    createTowers();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function updateMouse(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function performRaycast() {
      raycaster.setFromCamera(mouse, camera);
      return raycaster.intersectObjects(towers, false);
    }

    renderer.domElement.addEventListener('mousemove', (event) => {
      updateMouse(event);
      const hits = performRaycast();
      window.__3D_STATE__.hoveredStock = hits.length ? hits[0].object.userData.stockIndex : -1;
    });

    renderer.domElement.addEventListener('click', (event) => {
      updateMouse(event);
      const hits = performRaycast();
      if (hits.length) {
        const idx = hits[0].object.userData.stockIndex;
        setSelectedStock(idx);
      } else {
        setSelectedStock(-1);
      }
    });

    const activeAnimations = [];
    function animateTowersTo(targetHeights, duration = 500) {
      const sanitized = targetHeights.map((v, i) => safeNumber(v, window.__3D_STATE__.stockHeights[i] || 0.5));
      window.__3D_STATE__.animating = true;

      const startTime = performance.now();
      const fromHeights = [...window.__3D_STATE__.stockHeights];

      activeAnimations.length = 0;
      activeAnimations.push({
        startTime,
        duration,
        fromHeights,
        toHeights: sanitized
      });
    }

    function applyHeights(heights) {
      for (let i = 0; i < towers.length; i++) {
        const h = safeNumber(heights[i], INITIAL_HEIGHTS[i]);
        window.__3D_STATE__.stockHeights[i] = h;

        const oldGeom = towers[i].geometry;
        towers[i].geometry = new THREE.BoxGeometry(1.5, h, 1.5);
        oldGeom.dispose();
        towers[i].position.y = h / 2;
      }
      recomputeTotalMarketCap();
      syncHUD();
    }

    function updateTowerLabels() {
      for (let i = 0; i < towers.length; i++) {
        const worldPos = new THREE.Vector3(
          towers[i].position.x,
          towers[i].position.y + window.__3D_STATE__.stockHeights[i] / 2 + 0.8,
          towers[i].position.z
        );

        worldPos.project(camera);

        const x = (worldPos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-worldPos.y * 0.5 + 0.5) * window.innerHeight;

        labels[i].style.left = `${x}px`;
        labels[i].style.top = `${y}px`;
        labels[i].style.opacity = worldPos.z < 1 ? '1' : '0';
      }
    }

    let mascotBaseY = 0.5;
    const loader = new GLTFLoader();
    loader.load(
      'facecap.glb',
      (gltf) => {
        const model = gltf.scene;
        model.scale.set(2, 2, 2);
        model.position.set(0, 0.5, 0);
        mascotBaseY = 0.5;
        model.rotation.y = 0;
        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        scene.add(model);

        window.__3D_STATE__.mascotModel = model;
        window.__3D_STATE__.mascotLoaded = true;
        window.__3D_STATE__.mascotRotationY = 0;
        window.__3D_STATE__.sceneReady = true;
      },
      undefined,
      (err) => {
        console.warn('Could not load facecap.glb:', err);
        window.__3D_STATE__.mascotLoaded = false;
        window.__3D_STATE__.sceneReady = true;
      }
    );

    function rotateMascotTo(yRot) {
      window.__3D_STATE__.mascotRotationY = yRot;
      if (window.__3D_STATE__.mascotModel) {
        window.__3D_STATE__.mascotModel.rotation.y = yRot;
      }
    }

    function bullMarket() {
      const next = window.__3D_STATE__.stockHeights.map(h => safeNumber(h) + (0.5 + Math.random()));
      window.__3D_STATE__.marketMode = 'bull';
      window.__3D_STATE__.timeStep += 1;
      rotateMascotTo(-Math.PI / 2);
      animateTowersTo(next, 500);
      syncHUD();
    }

    function bearMarket() {
      const next = window.__3D_STATE__.stockHeights.map(h => Math.max(0.5, safeNumber(h) - (0.5 + Math.random())));
      window.__3D_STATE__.marketMode = 'bear';
      window.__3D_STATE__.timeStep += 1;
      rotateMascotTo(Math.PI / 2);
      animateTowersTo(next, 500);
      syncHUD();
    }

    function resetMarket() {
      window.__3D_STATE__.marketMode = 'stable';
      rotateMascotTo(0);
      animateTowersTo([...INITIAL_HEIGHTS], 500);
      syncHUD();
    }

    function boostSelectedStock() {
      const idx = window.__3D_STATE__.selectedStock;
      if (idx < 0) return;
      const next = [...window.__3D_STATE__.stockHeights];
      next[idx] = safeNumber(next[idx]) + 2.0;
      animateTowersTo(next, 500);
      syncHUD();
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'b') bullMarket();
      else if (key === 'r') bearMarket();
      else if (key === 's') resetMarket();
      else if (e.code === 'Space') {
        e.preventDefault();
        boostSelectedStock();
      }
    });

    document.getElementById('btn-bull').addEventListener('click', bullMarket);
    document.getElementById('btn-bear').addEventListener('click', bearMarket);
    document.getElementById('btn-reset').addEventListener('click', resetMarket);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function tick() {
      requestAnimationFrame(tick);

      const elapsed = clock.getElapsedTime();

      if (activeAnimations.length) {
        const anim = activeAnimations[0];
        const now = performance.now();
        const t = Math.min(1, (now - anim.startTime) / anim.duration);
        const eased = t < 0.5
          ? 2 * t * t
          : 1 - Math.pow(-2 * t + 2, 2) / 2;

        const current = anim.fromHeights.map((from, i) =>
          from + (anim.toHeights[i] - from) * eased
        );

        applyHeights(current);

        if (t >= 1) {
          applyHeights(anim.toHeights);
          activeAnimations.shift();
          window.__3D_STATE__.animating = false;
        }
      }

      if (window.__3D_STATE__.mascotModel) {
        const model = window.__3D_STATE__.mascotModel;
        model.position.y = mascotBaseY + Math.sin(elapsed * Math.PI * 2) * 0.2;
        model.rotation.y = window.__3D_STATE__.mascotRotationY;
      }

      controls.update();
      updateTowerLabels();
      syncHUD();
      renderer.render(scene, camera);
    }

    syncHUD();
    tick();
  </script>
</body>
</html>
