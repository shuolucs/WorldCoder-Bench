<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Stock Market Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 20px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 220px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  #hud-panel h2 {
    margin-bottom: 10px;
    font-size: 16px;
    color: #4ECDC4;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 8px;
  }

  #hud-panel .label {
    color: #aaa;
    font-size: 12px;
  }

  #hud-panel .value {
    color: #fff;
    font-weight: bold;
  }

  .mode-bull { color: #4CAF50 !important; }
  .mode-bear { color: #FF5252 !important; }
  .mode-stable { color: #FFC107 !important; }

  #button-bar {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
  }

  #button-bar button {
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  #button-bar button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  #button-bar button:active {
    transform: translateY(0);
  }

  #btn-bull {
    background: linear-gradient(135deg, #4CAF50, #2E7D32);
    color: white;
  }

  #btn-bear {
    background: linear-gradient(135deg, #FF5252, #C62828);
    color: white;
  }

  #btn-reset {
    background: linear-gradient(135deg, #FFC107, #F57F17);
    color: #333;
  }

  #stock-labels {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .stock-label {
    position: absolute;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    text-shadow: 0 0 8px rgba(0,0,0,0.8), 0 2px 4px rgba(0,0,0,0.5);
    pointer-events: none;
    transform: translate(-50%, -100%);
    padding: 4px 10px;
    background: rgba(0,0,0,0.5);
    border-radius: 6px;
    white-space: nowrap;
  }

  .stock-label .price {
    font-size: 11px;
    color: #ccc;
    font-weight: 400;
  }

  #instructions {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    color: #aaa;
    padding: 15px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.6;
    backdrop-filter: blur(10px);
  }

  #instructions kbd {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    color: #fff;
  }
</style>
</head>
<body>

<div id="hud-panel">
  <h2>📊 Market Dashboard</h2>
  <div><span class="label">Mode:</span> <span id="mode-display" class="value mode-stable">STABLE</span></div>
  <div><span class="label">Market Cap:</span> <span id="cap-display" class="value">22.50</span></div>
  <div><span class="label">Time Step:</span> <span id="time-display" class="value">0</span></div>
  <div><span class="label">Selected:</span> <span id="selected-display" class="value">None</span></div>
</div>

<div id="instructions">
  <kbd>B</kbd> Bull Market &nbsp; <kbd>R</kbd> Bear Market<br>
  <kbd>S</kbd> Reset &nbsp; <kbd>Space</kbd> Boost Selected<br>
  Click towers to select
</div>

<div id="stock-labels"></div>

<div id="button-bar">
  <button id="btn-bull">🐂 Bull Market</button>
  <button id="btn-bear">🐻 Bear Market</button>
  <button id="btn-reset">🔄 Reset</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Constants
const STOCK_NAMES = ['AAPL', 'GOOG', 'MSFT', 'AMZN', 'TSLA'];
const STOCK_COLORS = [0xFF6B6B, 0x4ECDC4, 0x45B7D1, 0xFFA07A, 0x98D8C8];
const INITIAL_HEIGHTS = [5, 4, 6, 3, 4.5];
const X_POSITIONS = [-6, -3, 0, 3, 6];
const Z_POS = -4;
const TOWER_WIDTH = 1.5;
const TOWER_DEPTH = 1.5;
const ANIM_DURATION = 500;

// State
window.__3D_STATE__ = {
  sceneReady: false,
  stockHeights: [...INITIAL_HEIGHTS],
  selectedStock: -1,
  marketMode: 'stable',
  animating: false,
  totalMarketCap: INITIAL_HEIGHTS.reduce((a, b) => a + b, 0),
  mascotLoaded: false,
  mascotRotationY: 0,
  timeStep: 0,
  hoveredStock: -1,
  mascotModel: null
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();

// Gradient sky background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#87CEEB');
gradient.addColorStop(1, '#ffffff');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Fog for atmosphere
scene.fog = new THREE.FogExp2(0xc8e6f0, 0.012);

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 18);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 8;
controls.maxDistance = 35;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

// Hemisphere light for softer fill
const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.3);
scene.add(hemiLight);

// Ground plane
const groundGeom = new THREE.BoxGeometry(20, 0.3, 20);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x4a7c59,
  roughness: 0.8,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.position.y = -0.15;
ground.receiveShadow = true;
scene.add(ground);

// Ground edge/border
const borderGeom = new THREE.BoxGeometry(20.4, 0.5, 20.4);
const borderMat = new THREE.MeshStandardMaterial({ color: 0x5C4033, roughness: 0.9 });
const border = new THREE.Mesh(borderGeom, borderMat);
border.position.y = -0.4;
scene.add(border);

// Grid lines on ground for diorama feel
const gridHelper = new THREE.GridHelper(20, 20, 0x3a6c49, 0x3a6c49);
gridHelper.position.y = 0.01;
gridHelper.material.opacity = 0.2;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// Stock towers
const towers = [];
const towerMeshes = [];
const targetHeights = [...INITIAL_HEIGHTS];
const currentHeights = [...INITIAL_HEIGHTS];

for (let i = 0; i < 5; i++) {
  const h = INITIAL_HEIGHTS[i];
  const geom = new THREE.BoxGeometry(TOWER_WIDTH, h, TOWER_DEPTH);
  // Shift geometry so bottom is at y=0
  geom.translate(0, h / 2, 0);

  const mat = new THREE.MeshStandardMaterial({
    color: STOCK_COLORS[i],
    roughness: 0.4,
    metalness: 0.2,
    emissive: 0x000000,
    emissiveIntensity: 0
  });

  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(X_POSITIONS[i], 0, Z_POS);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData.stockIndex = i;

  scene.add(mesh);
  towers.push({ mesh, mat, geom });
  towerMeshes.push(mesh);

  // Add a small platform under each tower
  const platGeom = new THREE.BoxGeometry(TOWER_WIDTH + 0.3, 0.1, TOWER_DEPTH + 0.3);
  const platMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5 });
  const plat = new THREE.Mesh(platGeom, platMat);
  plat.position.set(X_POSITIONS[i], 0.01, Z_POS);
  plat.receiveShadow = true;
  scene.add(plat);
}

// Function to rebuild tower geometry for new height
function updateTowerGeometry(index, newHeight) {
  const tower = towers[index];
  tower.mesh.geometry.dispose();
  const geom = new THREE.BoxGeometry(TOWER_WIDTH, newHeight, TOWER_DEPTH);
  geom.translate(0, newHeight / 2, 0);
  tower.mesh.geometry = geom;
}

// Stock labels (HTML overlay)
const labelsContainer = document.getElementById('stock-labels');
const labelElements = [];
for (let i = 0; i < 5; i++) {
  const label = document.createElement('div');
  label.className = 'stock-label';
  label.innerHTML = `${STOCK_NAMES[i]}<br><span class="price">${INITIAL_HEIGHTS[i].toFixed(1)}</span>`;
  labelsContainer.appendChild(label);
  labelElements.push(label);
}

function updateLabels() {
  for (let i = 0; i < 5; i++) {
    const pos = new THREE.Vector3(X_POSITIONS[i], currentHeights[i] + 0.8, Z_POS);
    pos.project(camera);
    const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
    labelElements[i].style.left = x + 'px';
    labelElements[i].style.top = y + 'px';
    labelElements[i].innerHTML = `${STOCK_NAMES[i]}<br><span class="price">${currentHeights[i].toFixed(1)}</span>`;

    if (pos.z > 1) {
      labelElements[i].style.display = 'none';
    } else {
      labelElements[i].style.display = 'block';
    }
  }
}

// Load mascot model
const loader = new GLTFLoader();
let mascotModel = null;
let mascotMixer = null;
const mascotBaseY = 0.5;

loader.load(
  'https://threejs.org/examples/models/gltf/facecap.glb',
  (gltf) => {
    mascotModel = gltf.scene;
    mascotModel.scale.set(2, 2, 2);
    mascotModel.position.set(0, mascotBaseY, 0);
    mascotModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(mascotModel);

    state.mascotModel = mascotModel;
    state.mascotLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      mascotMixer = new THREE.AnimationMixer(mascotModel);
      const action = mascotMixer.clipAction(gltf.animations[0]);
      action.play();
    }

    checkReady();
  },
  undefined,
  (error) => {
    console.warn('Could not load facecap.glb, creating placeholder mascot:', error);
    // Create a placeholder mascot
    const group = new THREE.Group();

    // Body
    const bodyGeom = new THREE.CylinderGeometry(0.5, 0.6, 1.5, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2196F3, roughness: 0.5 });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.75;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeom = new THREE.SphereGeometry(0.5, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xFFD5B4, roughness: 0.6 });
    const head = new THREE.Mesh(headGeom, headMat);
    head.position.y = 1.9;
    head.castShadow = true;
    group.add(head);

    // Eyes
    const eyeGeom = new THREE.SphereGeometry(0.08, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
    leftEye.position.set(-0.15, 2.0, 0.42);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
    rightEye.position.set(0.15, 2.0, 0.42);
    group.add(rightEye);

    // Hat (trader hat)
    const hatGeom = new THREE.CylinderGeometry(0.35, 0.55, 0.3, 16);
    const hatMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const hat = new THREE.Mesh(hatGeom, hatMat);
    hat.position.y = 2.35;
    hat.castShadow = true;
    group.add(hat);

    const brimGeom = new THREE.CylinderGeometry(0.65, 0.65, 0.05, 16);
    const brim = new THREE.Mesh(brimGeom, hatMat);
    brim.position.y = 2.22;
    group.add(brim);

    group.scale.set(2, 2, 2);
    group.position.set(0, mascotBaseY, 0);
    scene.add(group);

    mascotModel = group;
    state.mascotModel = group;
    state.mascotLoaded = true;
    checkReady();
  }
);

function checkReady() {
  state.sceneReady = true;
}

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(towerMeshes);

  if (intersects.length > 0) {
    const idx = intersects[0].object.userData.stockIndex;
    selectStock(idx);
  } else {
    selectStock(-1);
  }
}

function onMouseMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(towerMeshes);

  if (intersects.length > 0) {
    state.hoveredStock = intersects[0].object.userData.stockIndex;
    renderer.domElement.style.cursor = 'pointer';
  } else {
    state.hoveredStock = -1;
    renderer.domElement.style.cursor = 'default';
  }
}

function selectStock(index) {
  // Deselect previous
  if (state.selectedStock >= 0 && state.selectedStock < 5) {
    const prev = towers[state.selectedStock];
    prev.mat.emissive.setHex(0x000000);
    prev.mat.emissiveIntensity = 0;
  }

  state.selectedStock = index;

  // Select new
  if (index >= 0 && index < 5) {
    const curr = towers[index];
    curr.mat.emissive.setHex(0xFFFF00);
    curr.mat.emissiveIntensity = 0.3;
  }

  updateHUD();
}

// Animation system
let animStartTime = 0;
let animStartHeights = [...INITIAL_HEIGHTS];
let isAnimating = false;

function animateToTargets() {
  animStartTime = performance.now();
  animStartHeights = [...currentHeights];
  isAnimating = true;
  state.animating = true;
}

function updateAnimation(now) {
  if (!isAnimating) return;

  const elapsed = now - animStartTime;
  const t = Math.min(elapsed / ANIM_DURATION, 1);
  // Ease out cubic
  const ease = 1 - Math.pow(1 - t, 3);

  for (let i = 0; i < 5; i++) {
    currentHeights[i] = animStartHeights[i] + (targetHeights[i] - animStartHeights[i]) * ease;
    currentHeights[i] = Math.max(0.5, currentHeights[i]);
    if (isNaN(currentHeights[i])) currentHeights[i] = INITIAL_HEIGHTS[i];
    updateTowerGeometry(i, currentHeights[i]);
  }

  syncState();

  if (t >= 1) {
    isAnimating = false;
    state.animating = false;
    for (let i = 0; i < 5; i++) {
      currentHeights[i] = targetHeights[i];
      if (isNaN(currentHeights[i])) currentHeights[i] = INITIAL_HEIGHTS[i];
      currentHeights[i] = Math.max(0.5, currentHeights[i]);
    }
    syncState();
  }
}

function syncState() {
  for (let i = 0; i < 5; i++) {
    state.stockHeights[i] = Math.max(0.5, currentHeights[i]);
    if (isNaN(state.stockHeights[i])) state.stockHeights[i] = INITIAL_HEIGHTS[i];
  }
  state.totalMarketCap = state.stockHeights.reduce((a, b) => a + b, 0);
  updateHUD();
}

// Market actions
function bullMarket() {
  if (isAnimating) return;
  state.marketMode = 'bull';
  for (let i = 0; i < 5; i++) {
    const increase = 0.5 + Math.random() * 1.0;
    targetHeights[i] = currentHeights[i] + increase;
  }
  state.timeStep++;
  if (mascotModel) {
    state.mascotRotationY = -Math.PI / 2;
  }
  animateToTargets();
}

function bearMarket() {
  if (isAnimating) return;
  state.marketMode = 'bear';
  for (let i = 0; i < 5; i++) {
    const decrease = 0.5 + Math.random() * 1.0;
    targetHeights[i] = Math.max(0.5, currentHeights[i] - decrease);
  }
  state.timeStep++;
  if (mascotModel) {
    state.mascotRotationY = Math.PI / 2;
  }
  animateToTargets();
}

function resetMarket() {
  if (isAnimating) return;
  state.marketMode = 'stable';
  for (let i = 0; i < 5; i++) {
    targetHeights[i] = INITIAL_HEIGHTS[i];
  }
  if (mascotModel) {
    state.mascotRotationY = 0;
  }
  animateToTargets();
}

function boostSelected() {
  if (isAnimating) return;
  if (state.selectedStock < 0 || state.selectedStock >= 5) return;
  const idx = state.selectedStock;
  targetHeights[idx] = currentHeights[idx] + 2.0;
  animateToTargets();
}

// Keyboard
window.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'b') bullMarket();
  else if (key === 'r') bearMarket();
  else if (key === 's') resetMarket();
  else if (key === ' ') { e.preventDefault(); boostSelected(); }
});

// Mouse
window.addEventListener('click', onMouseClick);
window.addEventListener('mousemove', onMouseMove);

// Buttons
document.getElementById('btn-bull').addEventListener('click', (e) => { e.stopPropagation(); bullMarket(); });
document.getElementById('btn-bear').addEventListener('click', (e) => { e.stopPropagation(); bearMarket(); });
document.getElementById('btn-reset').addEventListener('click', (e) => { e.stopPropagation(); resetMarket(); });

// HUD update
function updateHUD() {
  const modeEl = document.getElementById('mode-display');
  modeEl.textContent = state.marketMode.toUpperCase();
  modeEl.className = 'value mode-' + state.marketMode;

  document.getElementById('cap-display').textContent = state.totalMarketCap.toFixed(2);
  document.getElementById('time-display').textContent = state.timeStep;

  const selName = state.selectedStock >= 0 ? STOCK_NAMES[state.selectedStock] : 'None';
  document.getElementById('selected-display').textContent = selName;
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Add some decorative elements to the diorama
// Small trees
function createTree(x, z) {
  const group = new THREE.Group();
  const trunkGeom = new THREE.CylinderGeometry(0.08, 0.12, 0.6, 8);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const trunk = new THREE.Mesh(trunkGeom, trunkMat);
  trunk.position.y = 0.3;
  trunk.castShadow = true;
  group.add(trunk);

  const leavesGeom = new THREE.SphereGeometry(0.35, 8, 8);
  const leavesMat = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.8 });
  const leaves = new THREE.Mesh(leavesGeom, leavesMat);
  leaves.position.y = 0.8;
  leaves.castShadow = true;
  group.add(leaves);

  group.position.set(x, 0, z);
  scene.add(group);
}

createTree(-8, 5);
createTree(-7, 7);
createTree(8, 6);
createTree(9, 4);
createTree(-9, -2);
createTree(8, -6);

// Small bench
function createBench(x, z, rotY) {
  const group = new THREE.Group();
  const seatGeom = new THREE.BoxGeometry(1.2, 0.08, 0.4);
  const woodMat = new THREE.MeshStandardMaterial({ color: 0xA0522D, roughness: 0.7 });
  const seat = new THREE.Mesh(seatGeom, woodMat);
  seat.position.y = 0.35;
  seat.castShadow = true;
  group.add(seat);

  const legGeom = new THREE.BoxGeometry(0.08, 0.35, 0.08);
  const positions = [[-0.5, 0.175, -0.15], [0.5, 0.175, -0.15], [-0.5, 0.175, 0.15], [0.5, 0.175, 0.15]];
  positions.forEach(p => {
    const leg = new THREE.Mesh(legGeom, woodMat);
    leg.position.set(...p);
    group.add(leg);
  });

  group.position.set(x, 0, z);
  group.rotation.y = rotY || 0;
  scene.add(group);
}

createBench(5, 3, Math.PI / 4);
createBench(-5, 4, -Math.PI / 6);

// Animation loop
const clock = new THREE.Clock();
let mascotTargetRotY = 0;

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  controls.update();

  // Update tower animations
  updateAnimation(now);

  // Mascot idle bobbing and rotation
  if (mascotModel) {
    // Smooth rotation
    mascotTargetRotY = state.mascotRotationY;
    const currentRotY = mascotModel.rotation.y;
    mascotModel.rotation.y += (mascotTargetRotY - currentRotY) * 0.05;
    state.mascotRotationY = mascotTargetRotY; // keep target in state

    // Bobbing
    const bob = Math.sin(elapsed * Math.PI * 2) * 0.2;
    mascotModel.position.y = mascotBaseY + bob;

    // Update mixer if exists
    if (mascotMixer) {
      mascotMixer.update(delta);
    }
  }

  // Hover effect on towers
  for (let i = 0; i < 5; i++) {
    const tower = towers[i];
    if (i === state.hoveredStock && i !== state.selectedStock) {
      tower.mat.emissive.setHex(0x444444);
      tower.mat.emissiveIntensity = 0.15;
    } else if (i !== state.selectedStock) {
      tower.mat.emissive.setHex(0x000000);
      tower.mat.emissiveIntensity = 0;
    }
  }

  // Update labels
  updateLabels();

  renderer.render(scene, camera);
}

// Initial sync
syncState();
updateHUD();
animate();

// Mark scene ready after a short delay to ensure everything is set up
setTimeout(() => {
  if (!state.sceneReady) {
    state.sceneReady = true;
  }
}, 100);

</script>
</body>
</html>
