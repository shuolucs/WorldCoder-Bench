<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fractal Tree Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  
  #control-panel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 26, 0.85);
    border: 1px solid rgba(100, 120, 160, 0.3);
    border-radius: 12px;
    padding: 18px;
    color: #c8d0e0;
    min-width: 260px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    z-index: 100;
  }
  
  #control-panel h2 {
    font-size: 16px;
    margin-bottom: 14px;
    color: #88aacc;
    border-bottom: 1px solid rgba(100,120,160,0.3);
    padding-bottom: 8px;
    letter-spacing: 1px;
  }
  
  .control-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 8px;
  }
  
  .control-row label {
    font-size: 12px;
    min-width: 70px;
    color: #8899bb;
  }
  
  .control-row input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(100,120,160,0.3);
    border-radius: 2px;
    outline: none;
  }
  
  .control-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #5588cc;
    cursor: pointer;
    border: 2px solid #88aadd;
  }
  
  .control-row .value-display {
    font-size: 11px;
    min-width: 30px;
    text-align: right;
    color: #aabbdd;
    font-family: monospace;
  }
  
  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  
  .btn-row button {
    flex: 1;
    padding: 7px 12px;
    border: 1px solid rgba(100,120,160,0.4);
    border-radius: 6px;
    background: rgba(40, 50, 80, 0.6);
    color: #aabbdd;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  
  .btn-row button:hover {
    background: rgba(60, 80, 120, 0.7);
    border-color: rgba(120,150,200,0.5);
    color: #ccddff;
  }
  
  .btn-row button.active {
    background: rgba(50, 100, 160, 0.6);
    border-color: #5588cc;
    color: #ddeeff;
  }
  
  #info-display {
    font-size: 11px;
    color: #7788aa;
    line-height: 1.6;
    border-top: 1px solid rgba(100,120,160,0.2);
    padding-top: 10px;
    margin-top: 6px;
    font-family: 'Courier New', monospace;
  }
  
  #info-display span {
    color: #99bbdd;
  }
</style>
</head>
<body>

<div id="control-panel">
  <h2>🌳 FRACTAL TREE</h2>
  
  <div class="btn-row">
    <button id="btn-play">Play</button>
    <button id="btn-reset">Reset</button>
  </div>
  
  <div class="control-row">
    <label>Time</label>
    <input type="range" id="slider-time" min="0" max="100" value="0">
    <div class="value-display" id="val-time">0%</div>
  </div>
  
  <div class="control-row">
    <label>Depth</label>
    <input type="range" id="slider-depth" min="1" max="10" value="7">
    <div class="value-display" id="val-depth">7</div>
  </div>
  
  <div class="control-row">
    <label>Angle</label>
    <input type="range" id="slider-angle" min="10" max="60" value="30">
    <div class="value-display" id="val-angle">30°</div>
  </div>
  
  <div class="control-row">
    <label>Speed</label>
    <input type="range" id="slider-speed" min="1" max="10" value="5">
    <div class="value-display" id="val-speed">1x</div>
  </div>
  
  <div id="info-display">
    Depth: <span>7</span> | Angle: <span>30°</span><br>
    Growth: <span>0.00</span><br>
    Branches: <span>0</span> / <span>127</span><br>
    Leaves: <span>0</span> / <span>64</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function() {
  // State
  const state = {
    growthTime: 0.0,
    isPlaying: false,
    maxDepth: 7,
    branchAngle: 30,
    branchLength: 3.0,
    lengthDecay: 0.7,
    radiusDecay: 0.65,
    totalBranches: 0,
    visibleBranches: 0,
    totalLeaves: 0,
    visibleLeaves: 0,
    animationSpeed: 1.0,
    treeGeneration: 0,
    frameCount: 0
  };
  window.__3D_STATE__ = state;

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.Fog(0x0a0a1a, 30, 80);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 8, 20);
  camera.lookAt(0, 6, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 6, 0);
  controls.update();
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // Lights
  const ambientLight = new THREE.AmbientLight(0x334455, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
  dirLight.position.set(5, 15, 10);
  scene.add(dirLight);

  // Ground
  const groundGeo = new THREE.PlaneGeometry(30, 30);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x1a1a0a });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  scene.add(ground);

  // Tree data structure
  let treeGroup = new THREE.Group();
  scene.add(treeGroup);

  // Branch data: array of { mesh, depth, leafMesh? }
  let branchData = [];

  const branchRadius = 0.15;

  function lerpColor(c1, c2, t) {
    const color1 = new THREE.Color(c1);
    const color2 = new THREE.Color(c2);
    return color1.lerp(color2, t);
  }

  function generateTree() {
    // Clear old tree
    scene.remove(treeGroup);
    treeGroup = new THREE.Group();
    scene.add(treeGroup);
    branchData = [];

    state.treeGeneration++;

    const maxDepth = state.maxDepth;
    const angleRad = THREE.MathUtils.degToRad(state.branchAngle);

    // Recursive tree building
    function buildBranch(parentMatrix, depth, length, radius) {
      if (depth > maxDepth) return;

      const t = maxDepth > 1 ? (depth - 1) / (maxDepth - 1) : 0;
      const color = lerpColor(0x5C3317, 0x22AA44, t);

      const geo = new THREE.CylinderGeometry(radius * state.radiusDecay, radius, length, 8, 1);
      // Shift geometry so bottom is at origin
      geo.translate(0, length / 2, 0);

      const mat = new THREE.MeshLambertMaterial({ color: color });
      const mesh = new THREE.Mesh(geo, mat);

      // Apply parent transform
      mesh.applyMatrix4(parentMatrix);

      treeGroup.add(mesh);

      const entry = { mesh, depth, leafMesh: null };

      // If leaf node, add sphere
      const isLeaf = (depth === maxDepth);
      if (isLeaf) {
        const leafRadius = 0.08;
        const leafGeo = new THREE.SphereGeometry(leafRadius, 6, 6);
        const greenVariation = new THREE.Color(0x33CC55);
        greenVariation.r += (Math.random() - 0.5) * 0.1;
        greenVariation.g += (Math.random() - 0.5) * 0.15;
        greenVariation.b += (Math.random() - 0.5) * 0.1;
        const leafMat = new THREE.MeshLambertMaterial({ color: greenVariation });
        const leafMesh = new THREE.Mesh(leafGeo, leafMat);

        // Position at tip of branch
        const tipLocal = new THREE.Vector3(0, length, 0);
        tipLocal.applyMatrix4(parentMatrix);
        leafMesh.position.copy(tipLocal);

        treeGroup.add(leafMesh);
        entry.leafMesh = leafMesh;
      }

      branchData.push(entry);

      // Store original transforms for scaling
      entry.origPosition = mesh.position.clone();
      entry.origQuaternion = mesh.quaternion.clone();
      entry.origScale = mesh.scale.clone();
      if (entry.leafMesh) {
        entry.leafOrigPosition = entry.leafMesh.position.clone();
        entry.leafOrigScale = entry.leafMesh.scale.clone();
      }

      // We need the tip position and orientation for children
      // Tip is at (0, length, 0) in local space
      if (!isLeaf) {
        const tipTranslation = new THREE.Matrix4().makeTranslation(0, length, 0);
        const tipMatrix = new THREE.Matrix4().copy(parentMatrix).multiply(tipTranslation);

        // Two children: one rotated +angle around Z, one -angle around Z
        // But we also want some rotation around Y for 3D effect
        const yRotations = [0, Math.PI]; // Two branches in opposite directions

        for (let i = 0; i < 2; i++) {
          const rotY = new THREE.Matrix4().makeRotationY(yRotations[i]);
          const rotZ = new THREE.Matrix4().makeRotationZ(angleRad * (i === 0 ? 1 : -1));

          const childMatrix = new THREE.Matrix4().copy(tipMatrix).multiply(rotY).multiply(rotZ);

          buildBranch(childMatrix, depth + 1, length * state.lengthDecay, radius * state.radiusDecay);
        }
      }
    }

    const identity = new THREE.Matrix4();
    buildBranch(identity, 1, state.branchLength, branchRadius);

    // Compute totals
    state.totalBranches = Math.pow(2, maxDepth) - 1;
    state.totalLeaves = Math.pow(2, maxDepth - 1);

    // Store scale origins for animation
    // We need to store the parent matrix info for proper scaling
    // Instead, let's store the base of each branch for scale-from-base animation
    branchData.forEach(entry => {
      // Store the mesh's world matrix components for reconstruction
      entry.baseScale = entry.mesh.scale.clone();
    });

    updateGrowth();
  }

  function updateGrowth() {
    const gt = state.growthTime;
    const maxDepth = state.maxDepth;
    let visibleBranches = 0;
    let visibleLeaves = 0;

    branchData.forEach(entry => {
      const d = entry.depth;
      const depthStart = (d - 1) / maxDepth;
      const depthEnd = d / maxDepth;

      if (gt < depthStart) {
        // Not yet visible
        entry.mesh.visible = false;
        if (entry.leafMesh) entry.leafMesh.visible = false;
      } else {
        entry.mesh.visible = true;
        const localT = Math.min(1, (gt - depthStart) / (depthEnd - depthStart));

        // Scale the branch
        const s = smoothstep(localT);
        entry.mesh.scale.copy(entry.origScale).multiplyScalar(Math.max(0.001, s));

        visibleBranches++;

        if (entry.leafMesh) {
          if (localT >= 0.5) {
            entry.leafMesh.visible = true;
            const leafT = smoothstep((localT - 0.5) * 2);
            entry.leafMesh.scale.copy(entry.leafOrigScale).multiplyScalar(Math.max(0.001, leafT));
            visibleLeaves++;
          } else {
            entry.leafMesh.visible = false;
          }
        }
      }
    });

    state.visibleBranches = visibleBranches;
    state.visibleLeaves = visibleLeaves;
  }

  function smoothstep(t) {
    t = Math.max(0, Math.min(1, t));
    return t * t * (3 - 2 * t);
  }

  // Speed mapping: 1=0.125x, 5=1x, 10=2x
  function getSpeedMultiplier(val) {
    if (val <= 5) {
      // 1->0.125, 5->1.0 (linear interpolation)
      return 0.125 + (val - 1) * (1.0 - 0.125) / (5 - 1);
    } else {
      // 5->1.0, 10->2.0
      return 1.0 + (val - 5) * (2.0 - 1.0) / (10 - 5);
    }
  }

  // UI Elements
  const btnPlay = document.getElementById('btn-play');
  const btnReset = document.getElementById('btn-reset');
  const sliderTime = document.getElementById('slider-time');
  const sliderDepth = document.getElementById('slider-depth');
  const sliderAngle = document.getElementById('slider-angle');
  const sliderSpeed = document.getElementById('slider-speed');
  const valTime = document.getElementById('val-time');
  const valDepth = document.getElementById('val-depth');
  const valAngle = document.getElementById('val-angle');
  const valSpeed = document.getElementById('val-speed');
  const infoDisplay = document.getElementById('info-display');

  function updateUI() {
    sliderTime.value = Math.round(state.growthTime * 100);
    valTime.textContent = Math.round(state.growthTime * 100) + '%';
    sliderDepth.value = state.maxDepth;
    valDepth.textContent = state.maxDepth;
    sliderAngle.value = state.branchAngle;
    valAngle.textContent = state.branchAngle + '°';
    
    const speedVal = parseInt(sliderSpeed.value);
    const mult = getSpeedMultiplier(speedVal);
    valSpeed.textContent = mult.toFixed(2) + 'x';
    
    btnPlay.textContent = state.isPlaying ? 'Pause' : 'Play';
    if (state.isPlaying) {
      btnPlay.classList.add('active');
    } else {
      btnPlay.classList.remove('active');
    }

    infoDisplay.innerHTML = 
      `Depth: <span>${state.maxDepth}</span> | Angle: <span>${state.branchAngle}°</span><br>` +
      `Growth: <span>${state.growthTime.toFixed(2)}</span><br>` +
      `Branches: <span>${state.visibleBranches}</span> / <span>${state.totalBranches}</span><br>` +
      `Leaves: <span>${state.visibleLeaves}</span> / <span>${state.totalLeaves}</span>`;
  }

  // Event handlers
  btnPlay.addEventListener('click', () => {
    state.isPlaying = !state.isPlaying;
    updateUI();
  });

  btnReset.addEventListener('click', () => {
    state.isPlaying = false;
    state.growthTime = 0;
    updateGrowth();
    updateUI();
  });

  sliderTime.addEventListener('input', () => {
    state.isPlaying = false;
    state.growthTime = parseInt(sliderTime.value) / 100;
    updateGrowth();
    updateUI();
  });

  sliderDepth.addEventListener('input', () => {
    state.maxDepth = parseInt(sliderDepth.value);
    generateTree();
    updateUI();
  });

  sliderAngle.addEventListener('input', () => {
    state.branchAngle = parseInt(sliderAngle.value);
    generateTree();
    updateUI();
  });

  sliderSpeed.addEventListener('input', () => {
    const val = parseInt(sliderSpeed.value);
    state.animationSpeed = getSpeedMultiplier(val);
    updateUI();
  });

  // Keyboard controls
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    
    switch(e.code) {
      case 'Space':
        e.preventDefault();
        state.isPlaying = !state.isPlaying;
        updateUI();
        break;
      case 'KeyR':
        state.isPlaying = false;
        state.growthTime = 0;
        updateGrowth();
        updateUI();
        break;
      case 'ArrowUp':
        e.preventDefault();
        if (state.maxDepth < 10) {
          state.maxDepth++;
          generateTree();
          updateUI();
        }
        break;
      case 'ArrowDown':
        e.preventDefault();
        if (state.maxDepth > 1) {
          state.maxDepth--;
          generateTree();
          updateUI();
        }
        break;
      case 'ArrowRight':
        e.preventDefault();
        if (state.branchAngle < 60) {
          state.branchAngle = Math.min(60, state.branchAngle + 5);
          generateTree();
          updateUI();
        }
        break;
      case 'ArrowLeft':
        e.preventDefault();
        if (state.branchAngle > 10) {
          state.branchAngle = Math.max(10, state.branchAngle - 5);
          generateTree();
          updateUI();
        }
        break;
    }
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Initialize
  state.animationSpeed = getSpeedMultiplier(5);
  generateTree();
  updateUI();

  // Animation loop
  let lastTime = performance.now();

  function animate(currentTime) {
    requestAnimationFrame(animate);

    const deltaTime = (currentTime - lastTime) / 1000;
    lastTime = currentTime;

    state.frameCount++;

    if (state.isPlaying) {
      // Growth over 4 seconds at normal speed
      const growthRate = (1.0 / 4.0) * state.animationSpeed;
      state.growthTime += deltaTime * growthRate;

      if (state.growthTime >= 1.0) {
        state.growthTime = 1.0;
        state.isPlaying = false;
      }

      updateGrowth();
      updateUI();
    }

    controls.update();
    renderer.render(scene, camera);
  }

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
