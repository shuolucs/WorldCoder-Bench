<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fractal Tree Generator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            color: #eeeeee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 26, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334455;
            width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        label {
            font-size: 0.9rem;
            width: 100px;
        }
        input[type=range] {
            width: 160px;
            cursor: pointer;
            accent-color: #22AA44;
        }
        .val-display {
            width: 30px;
            text-align: right;
            font-size: 0.85rem;
            color: #88aaff;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            background: #2a3a4a;
            color: white;
            border: 1px solid #4a5a6a;
            padding: 8px 0;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: #3a4a5a;
            border-color: #5a6a7a;
        }
        button:active {
            background: #1a2a3a;
        }
        #btn-play {
            background: #1a5a2a;
            border-color: #2a7a3a;
        }
        #btn-play:hover {
            background: #2a7a3a;
        }
        #info-display {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #334455;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #aaaacc;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
        }
        .info-val {
            color: #ffffff;
            font-weight: bold;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #667788;
            font-size: 0.8rem;
            pointer-events: none;
        }
    </style>
    <!-- Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h2>Fractal Tree</h2>
        
        <div class="btn-group">
            <button id="btn-play">Play</button>
            <button id="btn-reset">Reset</button>
        </div>

        <div class="control-group">
            <label for="slider-time">Growth</label>
            <input type="range" id="slider-time" min="0" max="100" value="0">
            <span class="val-display" id="val-time">0%</span>
        </div>

        <div class="control-group">
            <label for="slider-depth">Max Depth</label>
            <input type="range" id="slider-depth" min="1" max="10" value="7">
            <span class="val-display" id="val-depth">7</span>
        </div>

        <div class="control-group">
            <label for="slider-angle">Angle (°)</label>
            <input type="range" id="slider-angle" min="10" max="60" value="30">
            <span class="val-display" id="val-angle">30</span>
        </div>

        <div class="control-group">
            <label for="slider-speed">Speed</label>
            <input type="range" id="slider-speed" min="1" max="10" value="5">
            <span class="val-display" id="val-speed">1x</span>
        </div>

        <div id="info-display">
            <div class="info-row"><span>Depth:</span> <span class="info-val" id="info-depth">7</span></div>
            <div class="info-row"><span>Angle:</span> <span class="info-val" id="info-angle">30°</span></div>
            <div class="info-row"><span>Growth Time:</span> <span class="info-val" id="info-time">0.00</span></div>
            <div class="info-row"><span>Branches:</span> <span class="info-val" id="info-branches">0 / 0</span></div>
            <div class="info-row"><span>Leaves:</span> <span class="info-val" id="info-leaves">0 / 0</span></div>
        </div>
    </div>

    <div id="instructions">
        Controls: [Space] Play/Pause | [R] Reset | [↑/↓] Depth | [←/→] Angle | Left Click: Rotate | Right Click: Pan | Scroll: Zoom
    </div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            growthTime: 0.0,
            isPlaying: false,
            maxDepth: 7,
            branchAngle: 30,
            branchLength: 3.0,
            lengthDecay: 0.7,
            radiusDecay: 0.65,
            totalBranches: 0,
            visibleBranches: 0,
            totalLeaves: 0,
            visibleLeaves: 0,
            animationSpeed: 1.0,
            treeGeneration: 0,
            frameCount: 0
        };

        const state = window.__3D_STATE__;

        // --- DOM Elements ---
        const btnPlay = document.getElementById('btn-play');
        const btnReset = document.getElementById('btn-reset');
        const sliderTime = document.getElementById('slider-time');
        const sliderDepth = document.getElementById('slider-depth');
        const sliderAngle = document.getElementById('slider-angle');
        const sliderSpeed = document.getElementById('slider-speed');
        
        const valTime = document.getElementById('val-time');
        const valDepth = document.getElementById('val-depth');
        const valAngle = document.getElementById('val-angle');
        const valSpeed = document.getElementById('val-speed');

        const infoDepth = document.getElementById('info-depth');
        const infoAngle = document.getElementById('info-angle');
        const infoTime = document.getElementById('info-time');
        const infoBranches = document.getElementById('info-branches');
        const infoLeaves = document.getElementById('info-leaves');

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.Fog(0x0a0a1a, 30, 80);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 6, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334455, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a0a, 
            roughness: 0.9, 
            metalness: 0.1 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- Tree Generation ---
        const treeGroup = new THREE.Group();
        scene.add(treeGroup);

        const colorTrunk = new THREE.Color(0x5C3317);
        const colorTip = new THREE.Color(0x22AA44);
        const colorLeafBase = new THREE.Color(0x33CC55);

        // Reusable geometries to save memory
        const branchGeometries = {};
        const leafGeometry = new THREE.SphereGeometry(0.08, 8, 8);

        function getBranchGeometry(length, radius) {
            const key = `${length.toFixed(3)}_${radius.toFixed(3)}`;
            if (!branchGeometries[key]) {
                const geo = new THREE.CylinderGeometry(radius * state.radiusDecay, radius, length, 8);
                geo.translate(0, length / 2, 0);
                branchGeometries[key] = geo;
            }
            return branchGeometries[key];
        }

        function generateTree() {
            // Cleanup old tree
            treeGroup.traverse(child => {
                if (child.isMesh && child.material) {
                    child.material.dispose();
                }
            });
            while(treeGroup.children.length > 0){ 
                treeGroup.remove(treeGroup.children[0]); 
            }

            state.totalBranches = 0;
            state.totalLeaves = 0;
            state.treeGeneration++;

            buildBranch(treeGroup, 0, state.maxDepth, state.branchLength, 0.15);
            updateTreeScales();
        }

        function buildBranch(parent, depth, maxDepth, length, radius) {
            const joint = new THREE.Group();
            joint.userData = { depth: depth, isLeaf: false };

            // Branch Mesh
            const geo = getBranchGeometry(length, radius);
            const matColor = colorTrunk.clone().lerp(colorTip, depth / maxDepth);
            const mat = new THREE.MeshStandardMaterial({ color: matColor, roughness: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            joint.add(mesh);

            state.totalBranches++;

            if (depth < maxDepth - 1) {
                const angleRad = THREE.MathUtils.degToRad(state.branchAngle);
                const nextLen = length * state.lengthDecay;
                const nextRad = radius * state.radiusDecay;

                // Child 1
                const c1 = new THREE.Group();
                c1.position.y = length;
                c1.rotation.y = Math.PI / 2; // Rotate split plane 90 deg for 3D effect
                c1.rotation.z = angleRad;
                joint.add(c1);
                buildBranch(c1, depth + 1, maxDepth, nextLen, nextRad);

                // Child 2
                const c2 = new THREE.Group();
                c2.position.y = length;
                c2.rotation.y = Math.PI / 2;
                c2.rotation.z = -angleRad;
                joint.add(c2);
                buildBranch(c2, depth + 1, maxDepth, nextLen, nextRad);
            } else {
                // Leaf Node
                const leafColor = colorLeafBase.clone();
                leafColor.offsetHSL(
                    Math.random() * 0.1 - 0.05, 
                    Math.random() * 0.2 - 0.1, 
                    Math.random() * 0.2 - 0.1
                );
                const leafMat = new THREE.MeshStandardMaterial({ color: leafColor, roughness: 0.6 });
                const leafMesh = new THREE.Mesh(leafGeometry, leafMat);
                leafMesh.position.y = length;
                joint.add(leafMesh);
                joint.userData.isLeaf = true;
                state.totalLeaves++;
            }

            parent.add(joint);
        }

        // --- Animation & Update Logic ---
        function updateTreeScales() {
            let visBranches = 0;
            let visLeaves = 0;
            const maxD = state.maxDepth;

            treeGroup.traverse(node => {
                if (node.userData && node.userData.depth !== undefined) {
                    const d = node.userData.depth;
                    const startTime = d / maxD;
                    const endTime = (d + 1) / maxD;
                    
                    let t = (state.growthTime - startTime) / (endTime - startTime);
                    t = THREE.MathUtils.clamp(t, 0, 1);
                    
                    // Smoothstep easing
                    t = t * t * (3 - 2 * t);

                    node.scale.setScalar(t);

                    if (t > 0) {
                        visBranches++;
                        if (node.userData.isLeaf) visLeaves++;
                    }
                }
            });

            state.visibleBranches = visBranches;
            state.visibleLeaves = visLeaves;
        }

        function calculateSpeed(sliderValue) {
            if (sliderValue <= 5) {
                return 0.125 + (sliderValue - 1) * (1 - 0.125) / 4;
            } else {
                return 1 + (sliderValue - 5) * (2 - 1) / 5;
            }
        }

        function updateUI() {
            btnPlay.innerText = state.isPlaying ? 'Pause' : 'Play';
            
            if (!state.isPlaying) {
                sliderTime.value = state.growthTime * 100;
            }
            
            valTime.innerText = `${(state.growthTime * 100).toFixed(0)}%`;
            valDepth.innerText = state.maxDepth;
            valAngle.innerText = state.branchAngle;
            valSpeed.innerText = `${state.animationSpeed.toFixed(2)}x`;

            infoDepth.innerText = state.maxDepth;
            infoAngle.innerText = `${state.branchAngle}°`;
            infoTime.innerText = state.growthTime.toFixed(3);
            infoBranches.innerText = `${state.visibleBranches} / ${state.totalBranches}`;
            infoLeaves.innerText = `${state.visibleLeaves} / ${state.totalLeaves}`;
        }

        // --- Event Listeners ---
        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            if (state.isPlaying && state.growthTime >= 1.0) {
                state.growthTime = 0.0;
            }
            updateUI();
        }

        function resetTree() {
            state.isPlaying = false;
            state.growthTime = 0.0;
            sliderTime.value = 0;
            updateTreeScales();
            updateUI();
        }

        btnPlay.addEventListener('click', togglePlay);
        btnReset.addEventListener('click', resetTree);

        sliderTime.addEventListener('input', (e) => {
            state.isPlaying = false;
            state.growthTime = parseFloat(e.target.value) / 100;
            updateTreeScales();
            updateUI();
        });

        sliderDepth.addEventListener('input', (e) => {
            state.maxDepth = parseInt(e.target.value);
            generateTree();
            updateUI();
        });

        sliderAngle.addEventListener('input', (e) => {
            state.branchAngle = parseFloat(e.target.value);
            generateTree();
            updateUI();
        });

        sliderSpeed.addEventListener('input', (e) => {
            state.animationSpeed = calculateSpeed(parseInt(e.target.value));
            updateUI();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'KeyR') {
                resetTree();
            } else if (e.code === 'ArrowUp') {
                e.preventDefault();
                if (state.maxDepth < 10) {
                    state.maxDepth++;
                    sliderDepth.value = state.maxDepth;
                    generateTree();
                    updateUI();
                }
            } else if (e.code === 'ArrowDown') {
                e.preventDefault();
                if (state.maxDepth > 1) {
                    state.maxDepth--;
                    sliderDepth.value = state.maxDepth;
                    generateTree();
                    updateUI();
                }
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                if (state.branchAngle > 10) {
                    state.branchAngle -= 5;
                    sliderAngle.value = state.branchAngle;
                    generateTree();
                    updateUI();
                }
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                if (state.branchAngle < 60) {
                    state.branchAngle += 5;
                    sliderAngle.value = state.branchAngle;
                    generateTree();
                    updateUI();
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();
        const BASE_GROWTH_DURATION = 4.0; // seconds

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            state.frameCount++;

            if (state.isPlaying) {
                state.growthTime += (delta / BASE_GROWTH_DURATION) * state.animationSpeed;
                if (state.growthTime >= 1.0) {
                    state.growthTime = 1.0;
                    state.isPlaying = false;
                }
                sliderTime.value = state.growthTime * 100;
                updateTreeScales();
            }

            controls.update();
            updateUI();
            renderer.render(scene, camera);
        }

        // Initialize
        state.animationSpeed = calculateSpeed(parseInt(sliderSpeed.value));
        generateTree();
        updateUI();
        animate();

    </script>
</body>
</html>
