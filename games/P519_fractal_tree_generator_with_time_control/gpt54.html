<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Fractal Tree Generator</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: #e8eefc;
    }

    canvas {
      display: block;
    }

    #ui-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 290px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(12, 16, 28, 0.86);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      z-index: 10;
      user-select: none;
    }

    #ui-panel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
    }

    .row label {
      min-width: 92px;
      font-size: 13px;
      color: #cfd7ea;
    }

    .row input[type="range"] {
      flex: 1;
    }

    .row .value {
      width: 42px;
      text-align: right;
      font-size: 12px;
      color: #9fc1ff;
    }

    button {
      background: #22314d;
      color: #f5f8ff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #2b3f63;
    }

    #info-display {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      line-height: 1.45;
      color: #d8e1f5;
      white-space: pre-line;
    }

    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #94a3c4;
    }
  </style>
</head>
<body>
  <div id="ui-panel">
    <h3>Fractal Tree Controls</h3>

    <div class="row">
      <button id="btn-play">Play</button>
      <button id="btn-reset">Reset</button>
    </div>

    <div class="row">
      <label for="slider-time">Time</label>
      <input id="slider-time" type="range" min="0" max="100" value="0" />
      <div class="value" id="value-time">0%</div>
    </div>

    <div class="row">
      <label for="slider-depth">Depth</label>
      <input id="slider-depth" type="range" min="1" max="10" value="7" />
      <div class="value" id="value-depth">7</div>
    </div>

    <div class="row">
      <label for="slider-angle">Angle</label>
      <input id="slider-angle" type="range" min="10" max="60" value="30" />
      <div class="value" id="value-angle">30°</div>
    </div>

    <div class="row">
      <label for="slider-speed">Speed</label>
      <input id="slider-speed" type="range" min="1" max="10" value="5" />
      <div class="value" id="value-speed">1.00x</div>
    </div>

    <div id="info-display"></div>
    <div class="hint">Keys: Space = Play/Pause, R = Reset, Arrows = Depth/Angle</div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // -----------------------------
    // Scene Setup
    // -----------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.Fog(0x0a0a1a, 30, 80);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 6, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 6, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x334455, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
    dirLight.position.set(5, 15, 10);
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0x1a1a0a })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // -----------------------------
    // Parameters / State
    // -----------------------------
    const params = {
      maxDepth: 7,
      branchLength: 3.0,
      branchRadius: 0.15,
      branchAngle: 30,
      lengthDecay: 0.7,
      radiusDecay: 0.65,
      growthTime: 0,
      isPlaying: false,
      animationSpeed: 1.0,
      growthDuration: 4.0
    };

    let frameCount = 0;
    let treeGeneration = 0;

    window.__3D_STATE__ = {
      growthTime: 0,
      isPlaying: false,
      maxDepth: params.maxDepth,
      branchAngle: params.branchAngle,
      branchLength: params.branchLength,
      lengthDecay: params.lengthDecay,
      radiusDecay: params.radiusDecay,
      totalBranches: 0,
      visibleBranches: 0,
      totalLeaves: 0,
      visibleLeaves: 0,
      animationSpeed: params.animationSpeed,
      treeGeneration: 0,
      frameCount: 0
    };

    // -----------------------------
    // Tree Containers
    // -----------------------------
    const treeGroup = new THREE.Group();
    scene.add(treeGroup);

    const branchNodes = [];
    const leafNodes = [];

    const trunkColor = new THREE.Color(0x5C3317);
    const tipColor = new THREE.Color(0x22AA44);
    const baseLeafColor = new THREE.Color(0x33CC55);

    const tempVec = new THREE.Vector3();
    const yAxis = new THREE.Vector3(0, 1, 0);

    // -----------------------------
    // UI Elements
    // -----------------------------
    const btnPlay = document.getElementById("btn-play");
    const btnReset = document.getElementById("btn-reset");
    const sliderTime = document.getElementById("slider-time");
    const sliderDepth = document.getElementById("slider-depth");
    const sliderAngle = document.getElementById("slider-angle");
    const sliderSpeed = document.getElementById("slider-speed");

    const valueTime = document.getElementById("value-time");
    const valueDepth = document.getElementById("value-depth");
    const valueAngle = document.getElementById("value-angle");
    const valueSpeed = document.getElementById("value-speed");
    const infoDisplay = document.getElementById("info-display");

    // -----------------------------
    // Utility Functions
    // -----------------------------
    function speedFromSlider(v) {
      const t = (Number(v) - 1) / 9; // 0..1
      return 0.125 + t * (2.0 - 0.125); // 1->0.125x, 10->2x
    }

    function updateSpeedDisplay() {
      valueSpeed.textContent = `${params.animationSpeed.toFixed(2)}x`;
    }

    function clearTree() {
      for (const node of branchNodes) {
        node.mesh.geometry.dispose();
        node.mesh.material.dispose();
      }
      for (const leaf of leafNodes) {
        leaf.mesh.geometry.dispose();
        leaf.mesh.material.dispose();
      }
      branchNodes.length = 0;
      leafNodes.length = 0;

      while (treeGroup.children.length > 0) {
        treeGroup.remove(treeGroup.children[0]);
      }
    }

    function createBranchMesh(length, radius, color) {
      const geometry = new THREE.CylinderGeometry(radius * 0.72, radius, length, 8, 1, false);
      geometry.translate(0, length / 2, 0);

      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.82,
        metalness: 0.05
      });

      return new THREE.Mesh(geometry, material);
    }

    function createLeafMesh(color) {
      const geometry = new THREE.SphereGeometry(0.08, 10, 10);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.7,
        metalness: 0.02
      });
      return new THREE.Mesh(geometry, material);
    }

    function orientMeshToDirection(mesh, origin, direction) {
      mesh.position.copy(origin);
      const quat = new THREE.Quaternion().setFromUnitVectors(
        yAxis,
        direction.clone().normalize()
      );
      mesh.quaternion.copy(quat);
    }

    function countTotalBranches(maxDepth) {
      return Math.pow(2, maxDepth) - 1;
    }

    function countTotalLeaves(maxDepth) {
      return Math.pow(2, maxDepth - 1);
    }

    function generateLeafColor() {
      const hsl = { h: 0, s: 0, l: 0 };
      baseLeafColor.getHSL(hsl);
      const c = new THREE.Color();
      c.setHSL(
        hsl.h + (Math.random() - 0.5) * 0.03,
        THREE.MathUtils.clamp(hsl.s + (Math.random() - 0.5) * 0.12, 0, 1),
        THREE.MathUtils.clamp(hsl.l + (Math.random() - 0.5) * 0.12, 0, 1)
      );
      return c;
    }

    // -----------------------------
    // Tree Generation
    // -----------------------------
    function buildTree() {
      clearTree();
      treeGeneration++;

      function recurse(origin, direction, depth, length, radius) {
        const normalizedDepth = params.maxDepth > 1 ? depth / (params.maxDepth - 1) : 1;
        const branchColor = trunkColor.clone().lerp(tipColor, normalizedDepth);

        const branchMesh = createBranchMesh(length, radius, branchColor);
        orientMeshToDirection(branchMesh, origin, direction);
        branchMesh.visible = false;
        branchMesh.scale.y = 0.0001;
        treeGroup.add(branchMesh);

        const tip = origin.clone().add(direction.clone().normalize().multiplyScalar(length));

        branchNodes.push({
          mesh: branchMesh,
          depth,
          startThreshold: depth / params.maxDepth,
          endThreshold: (depth + 1) / params.maxDepth
        });

        if (depth === params.maxDepth - 1) {
          const leafMesh = createLeafMesh(generateLeafColor());
          leafMesh.position.copy(tip);
          leafMesh.visible = false;
          leafMesh.scale.setScalar(0.0001);
          treeGroup.add(leafMesh);

          leafNodes.push({
            mesh: leafMesh,
            depth,
            threshold: (depth + 1) / params.maxDepth
          });
          return;
        }

        const dirNorm = direction.clone().normalize();

        const axis1 = new THREE.Vector3(1, 0, 0).applyQuaternion(
          new THREE.Quaternion().setFromUnitVectors(yAxis, dirNorm)
        ).normalize();

        const axis2 = new THREE.Vector3(0, 0, 1).applyQuaternion(
          new THREE.Quaternion().setFromUnitVectors(yAxis, dirNorm)
        ).normalize();

        const angleRad = THREE.MathUtils.degToRad(params.branchAngle);

        const childDir1 = dirNorm.clone().applyAxisAngle(axis1, angleRad).applyAxisAngle(dirNorm, Math.PI / 6);
        const childDir2 = dirNorm.clone().applyAxisAngle(axis1, -angleRad).applyAxisAngle(dirNorm, -Math.PI / 6);

        recurse(
          tip,
          childDir1.normalize(),
          depth + 1,
          length * params.lengthDecay,
          radius * params.radiusDecay
        );

        recurse(
          tip,
          childDir2.normalize(),
          depth + 1,
          length * params.lengthDecay,
          radius * params.radiusDecay
        );
      }

      recurse(
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 1, 0),
        0,
        params.branchLength,
        params.branchRadius
      );

      updateTreeVisibility();
      updateInfoDisplay();
    }

    // -----------------------------
    // Growth Visibility / Animation
    // -----------------------------
    function smoothStep01(x) {
      x = THREE.MathUtils.clamp(x, 0, 1);
      return x * x * (3 - 2 * x);
    }

    function updateTreeVisibility() {
      let visibleBranches = 0;
      let visibleLeaves = 0;

      for (const node of branchNodes) {
        const localT = (params.growthTime - node.startThreshold) / (node.endThreshold - node.startThreshold);
        const s = smoothStep01(localT);

        if (s <= 0.0001) {
          node.mesh.visible = false;
        } else {
          node.mesh.visible = true;
          node.mesh.scale.y = Math.max(s, 0.0001);
          visibleBranches++;
        }
      }

      for (const leaf of leafNodes) {
        const leafT = (params.growthTime - leaf.depth / params.maxDepth) / (1 / params.maxDepth);
        const s = smoothStep01(leafT);

        if (s <= 0.0001) {
          leaf.mesh.visible = false;
        } else {
          leaf.mesh.visible = true;
          leaf.mesh.scale.setScalar(Math.max(s, 0.0001));
          visibleLeaves++;
        }
      }

      window.__3D_STATE__.visibleBranches = visibleBranches;
      window.__3D_STATE__.visibleLeaves = visibleLeaves;
    }

    // -----------------------------
    // UI Sync
    // -----------------------------
    function updateInfoDisplay() {
      window.__3D_STATE__.totalBranches = countTotalBranches(params.maxDepth);
      window.__3D_STATE__.totalLeaves = countTotalLeaves(params.maxDepth);

      infoDisplay.textContent =
        `Depth: ${params.maxDepth}\n` +
        `Angle: ${params.branchAngle}°\n` +
        `Growth Time: ${params.growthTime.toFixed(2)}\n` +
        `Branches: ${window.__3D_STATE__.visibleBranches}/${window.__3D_STATE__.totalBranches}\n` +
        `Leaves: ${window.__3D_STATE__.visibleLeaves}/${window.__3D_STATE__.totalLeaves}`;
    }

    function syncUIFromParams() {
      sliderTime.value = Math.round(params.growthTime * 100);
      sliderDepth.value = params.maxDepth;
      sliderAngle.value = params.branchAngle;

      valueTime.textContent = `${Math.round(params.growthTime * 100)}%`;
      valueDepth.textContent = `${params.maxDepth}`;
      valueAngle.textContent = `${params.branchAngle}°`;
      updateSpeedDisplay();

      btnPlay.textContent = params.isPlaying ? "Pause" : "Play";
    }

    function updateState() {
      window.__3D_STATE__.growthTime = params.growthTime;
      window.__3D_STATE__.isPlaying = params.isPlaying;
      window.__3D_STATE__.maxDepth = params.maxDepth;
      window.__3D_STATE__.branchAngle = params.branchAngle;
      window.__3D_STATE__.branchLength = params.branchLength;
      window.__3D_STATE__.lengthDecay = params.lengthDecay;
      window.__3D_STATE__.radiusDecay = params.radiusDecay;
      window.__3D_STATE__.totalBranches = countTotalBranches(params.maxDepth);
      window.__3D_STATE__.totalLeaves = countTotalLeaves(params.maxDepth);
      window.__3D_STATE__.animationSpeed = params.animationSpeed;
      window.__3D_STATE__.treeGeneration = treeGeneration;
      window.__3D_STATE__.frameCount = frameCount;
    }

    function regenerateTree() {
      buildTree();
      syncUIFromParams();
      updateState();
    }

    function setPlaying(v) {
      params.isPlaying = v;
      btnPlay.textContent = params.isPlaying ? "Pause" : "Play";
    }

    function resetGrowth() {
      setPlaying(false);
      params.growthTime = 0;
      updateTreeVisibility();
      syncUIFromParams();
      updateInfoDisplay();
      updateState();
    }

    // -----------------------------
    // Event Handlers
    // -----------------------------
    btnPlay.addEventListener("click", () => {
      if (params.growthTime >= 1 && !params.isPlaying) {
        params.growthTime = 0;
      }
      setPlaying(!params.isPlaying);
    });

    btnReset.addEventListener("click", () => {
      resetGrowth();
    });

    sliderTime.addEventListener("input", () => {
      setPlaying(false);
      params.growthTime = Number(sliderTime.value) / 100;
      updateTreeVisibility();
      syncUIFromParams();
      updateInfoDisplay();
      updateState();
    });

    sliderDepth.addEventListener("input", () => {
      params.maxDepth = Number(sliderDepth.value);
      regenerateTree();
    });

    sliderAngle.addEventListener("input", () => {
      params.branchAngle = Number(sliderAngle.value);
      regenerateTree();
    });

    sliderSpeed.addEventListener("input", () => {
      params.animationSpeed = speedFromSlider(sliderSpeed.value);
      updateSpeedDisplay();
      updateState();
      updateInfoDisplay();
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        if (params.growthTime >= 1 && !params.isPlaying) params.growthTime = 0;
        setPlaying(!params.isPlaying);
      }

      if (e.key === "r" || e.key === "R") {
        resetGrowth();
      }

      if (e.key === "ArrowUp") {
        e.preventDefault();
        params.maxDepth = Math.min(10, params.maxDepth + 1);
        regenerateTree();
      }

      if (e.key === "ArrowDown") {
        e.preventDefault();
        params.maxDepth = Math.max(1, params.maxDepth - 1);
        regenerateTree();
      }

      if (e.key === "ArrowLeft") {
        e.preventDefault();
        params.branchAngle = Math.max(10, params.branchAngle - 5);
        regenerateTree();
      }

      if (e.key === "ArrowRight") {
        e.preventDefault();
        params.branchAngle = Math.min(60, params.branchAngle + 5);
        regenerateTree();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // -----------------------------
    // Animation Loop
    // -----------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const delta = clock.getDelta();

      if (params.isPlaying) {
        const baseRate = delta / params.growthDuration;
        params.growthTime += baseRate * params.animationSpeed;

        if (params.growthTime >= 1) {
          params.growthTime = 1;
          setPlaying(false);
        }
      }

      updateTreeVisibility();
      syncUIFromParams();
      updateInfoDisplay();
      updateState();

      controls.update();
      renderer.render(scene, camera);
    }

    // -----------------------------
    // Init
    // -----------------------------
    params.animationSpeed = speedFromSlider(sliderSpeed.value);
    updateSpeedDisplay();
    buildTree();
    syncUIFromParams();
    updateState();
    animate();
  </script>
</body>
</html>
