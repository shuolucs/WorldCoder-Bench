<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Water Wheel Multiplayer Controls</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.6;
      min-width: 260px;
      user-select: none;
    }

    #controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #ffffff;
      color: #222;
      font-weight: bold;
    }

    button:hover {
      background: #eaeaea;
    }

    #help {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Player 1 Flow Rate: <span id="flowRateDisplay">5</span></div>
    <div>Player 2 Brake Status: <span id="brakeDisplay">OFF</span></div>
    <div>Wheel RPM: <span id="rpmDisplay">0.0</span></div>
    <div>Active Particle Count: <span id="particleCountDisplay">0</span></div>
    <div>Simulation Status: <span id="simStatusDisplay">RUNNING</span></div>

    <div id="controls">
      <button id="btnPlayer1Up">Increase Flow</button>
      <button id="btnPlayer2Brake">Toggle Brake</button>
    </div>

    <div id="help">
      P1: Q/W flow down/up<br />
      P2: O/P brake on/off<br />
      Space: pause/resume<br />
      R: reset
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#87CEEB');

    // Camera
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    scene.add(dirLight);

    // Ground
    const groundGeo = new THREE.PlaneGeometry(50, 50);
    const groundMat = new THREE.MeshStandardMaterial({ color: '#6B8E23' });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // Wheel setup
    const wheelGroup = new THREE.Group();
    wheelGroup.position.set(0, 3, 0);
    scene.add(wheelGroup);

    const wheelRadius = 3;
    const wheelDepth = 0.5;
    const paddleCount = 8;
    const wheelInertia = 10;
    const baseDamping = 0.98;
    const brakeDamping = 0.90;

    const wheelMat = new THREE.MeshStandardMaterial({ color: '#5C3A1E' });
    const paddleMat = new THREE.MeshStandardMaterial({ color: '#8B6914' });

    const wheelGeo = new THREE.CylinderGeometry(wheelRadius, wheelRadius, wheelDepth, 32);
    const wheelMesh = new THREE.Mesh(wheelGeo, wheelMat);
    wheelMesh.rotation.x = Math.PI / 2; // orient cylinder along Z-axis
    wheelMesh.castShadow = true;
    wheelMesh.receiveShadow = true;
    wheelGroup.add(wheelMesh);

    const paddleGeo = new THREE.BoxGeometry(0.8, 1.2, 0.4);
    const paddleCentersLocal = [];
    const paddles = [];

    for (let i = 0; i < paddleCount; i++) {
      const angle = (i / paddleCount) * Math.PI * 2;
      const paddle = new THREE.Mesh(paddleGeo, paddleMat);
      const r = wheelRadius;
      paddle.position.set(Math.cos(angle) * r, Math.sin(angle) * r, 0);

      // Orient paddle roughly tangent to wheel
      paddle.rotation.z = angle + Math.PI / 2;
      paddle.castShadow = true;
      paddle.receiveShadow = true;

      wheelGroup.add(paddle);
      paddles.push(paddle);
      paddleCentersLocal.push(new THREE.Vector3(Math.cos(angle) * r, Math.sin(angle) * r, 0));
    }

    // Spout visual
    const spoutPos = new THREE.Vector3(-6, 8, 0);
    const spoutGeo = new THREE.CylinderGeometry(0.15, 0.15, 1.5, 12);
    const spoutMat = new THREE.MeshStandardMaterial({ color: '#777777' });
    const spout = new THREE.Mesh(spoutGeo, spoutMat);
    spout.rotation.z = Math.PI / 2;
    spout.position.copy(spoutPos).add(new THREE.Vector3(-0.5, 0, 0));
    spout.castShadow = true;
    scene.add(spout);

    // Particle system
    const maxParticles = 200;
    const particleRadius = 0.1;
    const gravity = -9.8;
    const particleGeo = new THREE.SphereGeometry(particleRadius, 8, 8);
    const particleMat = new THREE.MeshStandardMaterial({ color: '#2196F3' });
    const particleGroup = new THREE.Group();
    scene.add(particleGroup);

    const particles = [];
    for (let i = 0; i < maxParticles; i++) {
      const mesh = new THREE.Mesh(particleGeo, particleMat);
      mesh.visible = false;
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      particleGroup.add(mesh);

      particles.push({
        mesh,
        active: false,
        position: new THREE.Vector3(),
        velocity: new THREE.Vector3(),
      });
    }

    // State
    let wheelAngularVelocity = 0;
    let wheelRotation = 0;
    let flowRate = 5;
    let brakeOn = false;
    let paused = false;
    let totalCollisions = 0;
    let spawnAccumulator = 0;

    // HUD refs
    const flowRateDisplay = document.getElementById('flowRateDisplay');
    const brakeDisplay = document.getElementById('brakeDisplay');
    const rpmDisplay = document.getElementById('rpmDisplay');
    const particleCountDisplay = document.getElementById('particleCountDisplay');
    const simStatusDisplay = document.getElementById('simStatusDisplay');
    const btnPlayer1Up = document.getElementById('btnPlayer1Up');
    const btnPlayer2Brake = document.getElementById('btnPlayer2Brake');

    function clampFinite(value, min, max, fallback = 0) {
      if (!Number.isFinite(value)) return fallback;
      return Math.max(min, Math.min(max, value));
    }

    function getDampingFactor() {
      return brakeOn ? brakeDamping : baseDamping;
    }

    function getSpawnIntervalMs() {
      return 100 / flowRate;
    }

    function getInitialParticleSpeed() {
      // Player 1 controls horizontal velocity; map flow 1-10 to practical speed
      return 2 + flowRate * 0.8;
    }

    function recycleParticle(p, respawn = false) {
      p.active = false;
      p.mesh.visible = false;
      p.position.set(0, 0, 0);
      p.velocity.set(0, 0, 0);

      if (respawn) {
        spawnParticle();
      }
    }

    function spawnParticle() {
      const particle = particles.find(p => !p.active);
      if (!particle) return;

      particle.active = true;
      particle.mesh.visible = true;
      particle.position.copy(spoutPos);
      particle.velocity.set(getInitialParticleSpeed(), 0, 0);
      particle.mesh.position.copy(particle.position);
    }

    function clearParticles() {
      for (const p of particles) {
        p.active = false;
        p.mesh.visible = false;
        p.position.set(0, 0, 0);
        p.velocity.set(0, 0, 0);
      }
    }

    function resetSimulation() {
      wheelAngularVelocity = 0;
      wheelRotation = 0;
      wheelGroup.rotation.z = 0;
      flowRate = 5;
      brakeOn = false;
      paused = false;
      totalCollisions = 0;
      spawnAccumulator = 0;
      clearParticles();
      updateHUD();
      updateGlobalState();
    }

    function updateHUD() {
      const activeCount = particles.reduce((sum, p) => sum + (p.active ? 1 : 0), 0);
      const rpm = wheelAngularVelocity * 60 / (2 * Math.PI);

      flowRateDisplay.textContent = String(flowRate);
      brakeDisplay.textContent = brakeOn ? 'ON' : 'OFF';
      rpmDisplay.textContent = Number.isFinite(rpm) ? rpm.toFixed(1) : '0.0';
      particleCountDisplay.textContent = String(activeCount);
      simStatusDisplay.textContent = paused ? 'PAUSED' : 'RUNNING';
    }

    function updateGlobalState() {
      const activeCount = particles.reduce((sum, p) => sum + (p.active ? 1 : 0), 0);
      const rpm = wheelAngularVelocity * 60 / (2 * Math.PI);
      window.__3D_STATE__ = {
        wheelAngularVelocity: Number.isFinite(wheelAngularVelocity) ? wheelAngularVelocity : 0,
        wheelRotation: Number.isFinite(wheelRotation) ? wheelRotation : 0,
        flowRate,
        brakeOn,
        activeParticles: activeCount,
        paused,
        wheelRPM: Number.isFinite(rpm) ? Number(rpm.toFixed(1)) : 0,
        totalCollisions,
        dampingFactor: getDampingFactor(),
        particleSpawnInterval: getSpawnIntervalMs()
      };
    }

    function worldPaddleCenter(localCenter) {
      const v = localCenter.clone().applyAxisAngle(new THREE.Vector3(0, 0, 1), wheelRotation);
      v.add(wheelGroup.position);
      return v;
    }

    function applyParticleImpactTorque(particle, paddleCenter) {
      const speed = particle.velocity.length();
      const impulse = speed * 0.05;

      const rx = paddleCenter.x - wheelGroup.position.x;
      const ry = paddleCenter.y - wheelGroup.position.y;
      const fx = particle.velocity.x;
      const fy = particle.velocity.y;

      // 2D z-torque sign from r x F
      const torqueSign = Math.sign(rx * fy - ry * fx) || 1;
      const deltaOmega = (impulse * torqueSign) / wheelInertia;

      wheelAngularVelocity += deltaOmega;
      wheelAngularVelocity = clampFinite(wheelAngularVelocity, -20, 20, 0);
    }

    function physicsStep(dt) {
      if (paused) return;

      // Spawn control
      spawnAccumulator += dt * 1000;
      const spawnInterval = getSpawnIntervalMs();
      while (spawnAccumulator >= spawnInterval) {
        spawnParticle();
        spawnAccumulator -= spawnInterval;
      }

      // Update particles
      for (const p of particles) {
        if (!p.active) continue;

        p.velocity.y += gravity * dt;

        p.position.x += p.velocity.x * dt;
        p.position.y += p.velocity.y * dt;
        p.position.z += p.velocity.z * dt;

        let collided = false;
        for (let i = 0; i < paddleCentersLocal.length; i++) {
          const paddleCenter = worldPaddleCenter(paddleCentersLocal[i]);
          const dist = p.position.distanceTo(paddleCenter);
          if (dist < 0.8) {
            applyParticleImpactTorque(p, paddleCenter);
            totalCollisions++;
            recycleParticle(p, true);
            collided = true;
            break;
          }
        }

        if (collided) continue;

        if (p.position.y < -2) {
          recycleParticle(p, true);
          continue;
        }

        p.mesh.position.copy(p.position);
      }

      // Wheel dynamics
      wheelAngularVelocity *= getDampingFactor();
      wheelAngularVelocity = clampFinite(wheelAngularVelocity, -20, 20, 0);

      wheelRotation += wheelAngularVelocity * dt;
      wheelRotation = Number.isFinite(wheelRotation) ? wheelRotation : 0;
      wheelGroup.rotation.z = wheelRotation;
    }

    // Controls
    function increaseFlow() {
      flowRate = clampFinite(flowRate + 1, 1, 10, 5);
    }

    function decreaseFlow() {
      flowRate = clampFinite(flowRate - 1, 1, 10, 5);
    }

    function setBrake(on) {
      brakeOn = !!on;
    }

    function toggleBrake() {
      brakeOn = !brakeOn;
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'q') decreaseFlow();
      if (key === 'w') increaseFlow();
      if (key === 'o') setBrake(true);
      if (key === 'p') setBrake(false);
      if (key === 'r') resetSimulation();

      if (e.code === 'Space') {
        e.preventDefault();
        paused = !paused;
      }

      updateHUD();
      updateGlobalState();
    });

    btnPlayer1Up.addEventListener('click', () => {
      increaseFlow();
      updateHUD();
      updateGlobalState();
    });

    btnPlayer2Brake.addEventListener('click', () => {
      toggleBrake();
      updateHUD();
      updateGlobalState();
    });

    // Fixed timestep loop
    const fixedDt = 1 / 60;
    let accumulator = 0;
    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);

      let frameTime = (now - lastTime) / 1000;
      lastTime = now;

      if (!Number.isFinite(frameTime) || frameTime < 0) frameTime = 0;
      frameTime = Math.min(frameTime, 0.1);
      accumulator += frameTime;

      while (accumulator >= fixedDt) {
        physicsStep(fixedDt);
        accumulator -= fixedDt;
      }

      updateHUD();
      updateGlobalState();
      renderer.render(scene, camera);
    }

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Init
    resetSimulation();
    animate(performance.now());
  </script>
</body>
</html>
