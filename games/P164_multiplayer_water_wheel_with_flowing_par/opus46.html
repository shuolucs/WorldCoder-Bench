<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Wheel Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 260px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  #hud h3 {
    margin-bottom: 8px;
    color: #87CEEB;
    font-size: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 5px;
  }
  #hud .section {
    margin-bottom: 10px;
  }
  #hud .label {
    color: #aaa;
    font-size: 12px;
  }
  #hud .value {
    color: #fff;
    font-weight: bold;
  }
  .controls {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    align-items: center;
  }
  .controls button {
    padding: 10px 20px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
  }
  .controls button:hover {
    transform: scale(1.05);
  }
  #btnPlayer1Up {
    background: #2196F3;
    color: white;
  }
  #btnPlayer1Down {
    background: #1976D2;
    color: white;
  }
  #btnPlayer2Brake {
    background: #f44336;
    color: white;
  }
  .key-hint {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #ccc;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    text-align: center;
    white-space: nowrap;
  }
  .brake-on { background: #4CAF50 !important; }
  .status-paused { color: #f44336 !important; }
  .status-running { color: #4CAF50 !important; }
</style>
</head>
<body>

<div id="hud">
  <h3>⚙️ Water Wheel Simulation</h3>
  <div class="section">
    <div><span class="label">Player 1 Flow Rate:</span> <span class="value" id="flowRateDisplay">5</span></div>
    <div><span class="label">Player 2 Brake:</span> <span class="value" id="brakeDisplay">OFF</span></div>
  </div>
  <div class="section">
    <div><span class="label">Wheel RPM:</span> <span class="value" id="rpmDisplay">0.0</span></div>
    <div><span class="label">Active Particles:</span> <span class="value" id="particleCountDisplay">0</span></div>
    <div><span class="label">Total Collisions:</span> <span class="value" id="collisionDisplay">0</span></div>
  </div>
  <div>
    <span class="label">Status:</span> <span class="value status-running" id="simStatusDisplay">RUNNING</span>
  </div>
</div>

<div class="key-hint">
  P1: [Q] Flow ↓ &nbsp;[W] Flow ↑ &nbsp;|&nbsp; P2: [O] Brake On &nbsp;[P] Brake Off &nbsp;|&nbsp; [Space] Pause &nbsp;[R] Reset
</div>

<div class="controls">
  <button id="btnPlayer1Down">P1: Flow ↓ (Q)</button>
  <button id="btnPlayer1Up">P1: Flow ↑ (W)</button>
  <button id="btnPlayer2Brake">P2: Toggle Brake (O/P)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // --- State ---
  const state = {
    wheelAngularVelocity: 0,
    wheelRotation: 0,
    flowRate: 5,
    brakeOn: false,
    activeParticles: 0,
    paused: false,
    wheelRPM: 0,
    totalCollisions: 0,
    dampingFactor: 0.98,
    particleSpawnInterval: 20
  };
  window.__3D_STATE__ = state;

  const GRAVITY = -9.8;
  const FIXED_DT = 1 / 60;
  const MAX_PARTICLES = 200;
  const MOMENT_OF_INERTIA = 10;
  const WHEEL_RADIUS = 3;
  const SPOUT_POS = new THREE.Vector3(-6, 8, 0);

  // --- Three.js Setup ---
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 5, 15);
  camera.lookAt(0, 3, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -15;
  dirLight.shadow.camera.right = 15;
  dirLight.shadow.camera.top = 15;
  dirLight.shadow.camera.bottom = -15;
  scene.add(dirLight);

  // Ground
  const groundGeo = new THREE.PlaneGeometry(50, 50);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x5D7A3A, roughness: 0.9 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  ground.receiveShadow = true;
  scene.add(ground);

  // --- Water Wheel ---
  const wheelGroup = new THREE.Group();
  wheelGroup.position.set(0, 3, 0);
  scene.add(wheelGroup);

  // Wheel body (cylinder along Z)
  const wheelGeo = new THREE.CylinderGeometry(WHEEL_RADIUS, WHEEL_RADIUS, 0.5, 32);
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.8 });
  const wheelMesh = new THREE.Mesh(wheelGeo, wheelMat);
  wheelMesh.rotation.x = Math.PI / 2;
  wheelMesh.castShadow = true;
  wheelGroup.add(wheelMesh);

  // Inner ring detail
  const innerRingGeo = new THREE.TorusGeometry(1.5, 0.1, 8, 32);
  const innerRingMat = new THREE.MeshStandardMaterial({ color: 0x4A2E15 });
  const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
  wheelGroup.add(innerRing);

  // Spokes
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const spokeGeo = new THREE.CylinderGeometry(0.05, 0.05, WHEEL_RADIUS - 0.3, 8);
    const spokeMat = new THREE.MeshStandardMaterial({ color: 0x4A2E15 });
    const spoke = new THREE.Mesh(spokeGeo, spokeMat);
    spoke.position.set(
      Math.cos(angle) * (WHEEL_RADIUS / 2),
      Math.sin(angle) * (WHEEL_RADIUS / 2),
      0
    );
    spoke.rotation.z = angle - Math.PI / 2;
    spoke.castShadow = true;
    wheelGroup.add(spoke);
  }

  // Paddles
  const paddles = [];
  const paddleMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.7 });
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const paddleGeo = new THREE.BoxGeometry(0.8, 1.2, 0.4);
    const paddle = new THREE.Mesh(paddleGeo, paddleMat);
    paddle.position.set(
      Math.cos(angle) * WHEEL_RADIUS,
      Math.sin(angle) * WHEEL_RADIUS,
      0
    );
    paddle.rotation.z = angle;
    paddle.castShadow = true;
    paddle.userData.baseAngle = angle;
    wheelGroup.add(paddle);
    paddles.push(paddle);
  }

  // Axle
  const axleGeo = new THREE.CylinderGeometry(0.15, 0.15, 1.5, 16);
  const axleMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });
  const axle = new THREE.Mesh(axleGeo, axleMat);
  axle.rotation.x = Math.PI / 2;
  axle.castShadow = true;
  wheelGroup.add(axle);

  // Support structure
  const supportMat = new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.9 });
  
  // Left support
  const supportGeo = new THREE.BoxGeometry(0.3, 6, 0.3);
  const leftSupport = new THREE.Mesh(supportGeo, supportMat);
  leftSupport.position.set(0, 0, -1);
  leftSupport.castShadow = true;
  scene.add(leftSupport);

  const rightSupport = new THREE.Mesh(supportGeo, supportMat);
  rightSupport.position.set(0, 0, 1);
  rightSupport.castShadow = true;
  scene.add(rightSupport);

  // Cross beam
  const crossGeo = new THREE.BoxGeometry(0.2, 0.2, 2.5);
  const crossBeam = new THREE.Mesh(crossGeo, supportMat);
  crossBeam.position.set(0, 3, 0);
  scene.add(crossBeam);

  // Spout / water channel
  const channelMat = new THREE.MeshStandardMaterial({ color: 0x6B4226, roughness: 0.8 });
  const channelGeo = new THREE.BoxGeometry(4, 0.15, 0.8);
  const channel = new THREE.Mesh(channelGeo, channelMat);
  channel.position.set(-5, 7.5, 0);
  channel.rotation.z = -0.15;
  channel.castShadow = true;
  scene.add(channel);

  // Channel sides
  const sideGeo = new THREE.BoxGeometry(4, 0.4, 0.1);
  const leftSide = new THREE.Mesh(sideGeo, channelMat);
  leftSide.position.set(-5, 7.65, 0.35);
  leftSide.rotation.z = -0.15;
  scene.add(leftSide);
  const rightSide = new THREE.Mesh(sideGeo, channelMat);
  rightSide.position.set(-5, 7.65, -0.35);
  rightSide.rotation.z = -0.15;
  scene.add(rightSide);

  // Water basin at bottom
  const basinGeo = new THREE.BoxGeometry(10, 0.2, 3);
  const basinMat = new THREE.MeshStandardMaterial({ color: 0x2196F3, transparent: true, opacity: 0.4 });
  const basin = new THREE.Mesh(basinGeo, basinMat);
  basin.position.set(0, -0.5, 0);
  scene.add(basin);

  // --- Particles ---
  const particleGeo = new THREE.SphereGeometry(0.1, 8, 8);
  const particleMat = new THREE.MeshStandardMaterial({ color: 0x2196F3, emissive: 0x0D47A1, emissiveIntensity: 0.2 });

  const particles = [];
  for (let i = 0; i < MAX_PARTICLES; i++) {
    const mesh = new THREE.Mesh(particleGeo, particleMat);
    mesh.visible = false;
    mesh.castShadow = false;
    scene.add(mesh);
    particles.push({
      mesh: mesh,
      active: false,
      velocity: new THREE.Vector3(),
      position: new THREE.Vector3()
    });
  }

  let lastSpawnTime = 0;
  let accumulator = 0;
  let lastTime = performance.now();

  // --- Functions ---
  function getSpawnInterval() {
    return 100 / state.flowRate;
  }

  function spawnParticle(time) {
    for (let i = 0; i < particles.length; i++) {
      if (!particles[i].active) {
        const p = particles[i];
        p.active = true;
        p.position.copy(SPOUT_POS);
        p.position.x += (Math.random() - 0.5) * 0.3;
        p.position.z += (Math.random() - 0.5) * 0.3;
        const speed = state.flowRate * 0.6 + Math.random() * 0.5;
        p.velocity.set(speed, Math.random() * 1.0, (Math.random() - 0.5) * 0.2);
        p.mesh.position.copy(p.position);
        p.mesh.visible = true;
        return;
      }
    }
  }

  function recycleParticle(p) {
    p.active = false;
    p.mesh.visible = false;
  }

  function getPaddleWorldPosition(paddleIndex) {
    const angle = paddles[paddleIndex].userData.baseAngle + state.wheelRotation;
    return new THREE.Vector3(
      Math.cos(angle) * WHEEL_RADIUS + wheelGroup.position.x,
      Math.sin(angle) * WHEEL_RADIUS + wheelGroup.position.y,
      wheelGroup.position.z
    );
  }

  function updatePhysics(dt) {
    // Spawn particles
    const spawnInterval = getSpawnInterval();
    state.particleSpawnInterval = spawnInterval;
    lastSpawnTime += dt * 1000;
    while (lastSpawnTime >= spawnInterval) {
      lastSpawnTime -= spawnInterval;
      spawnParticle();
    }

    // Update particles
    let activeCount = 0;
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      if (!p.active) continue;

      // Gravity
      p.velocity.y += GRAVITY * dt;

      // Update position
      p.position.x += p.velocity.x * dt;
      p.position.y += p.velocity.y * dt;
      p.position.z += p.velocity.z * dt;

      // Check collision with paddles
      let collided = false;
      for (let j = 0; j < 8; j++) {
        const paddlePos = getPaddleWorldPosition(j);
        const dx = p.position.x - paddlePos.x;
        const dy = p.position.y - paddlePos.y;
        const dz = p.position.z - paddlePos.z;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

        if (dist < 0.8) {
          // Transfer momentum
          const velMag = p.velocity.length();
          const torqueImpulse = velMag * 0.05;
          
          // Determine direction of torque based on paddle position relative to wheel center
          const paddleAngle = paddles[j].userData.baseAngle + state.wheelRotation;
          // Cross product to determine rotation direction
          const crossZ = Math.cos(paddleAngle) * p.velocity.y - Math.sin(paddleAngle) * p.velocity.x;
          const direction = crossZ > 0 ? 1 : -1;
          
          state.wheelAngularVelocity += (torqueImpulse * direction) / MOMENT_OF_INERTIA;
          state.totalCollisions++;
          collided = true;
          break;
        }
      }

      if (collided || p.position.y < -2 || p.position.x > 15 || p.position.x < -15) {
        recycleParticle(p);
        continue;
      }

      p.mesh.position.copy(p.position);
      activeCount++;
    }
    state.activeParticles = activeCount;

    // Update wheel
    const damping = state.brakeOn ? 0.90 : 0.98;
    state.dampingFactor = damping;

    // Apply damping per frame (at 60fps)
    state.wheelAngularVelocity *= damping;

    // Clamp
    state.wheelAngularVelocity = Math.max(-20, Math.min(20, state.wheelAngularVelocity));

    // Ensure finite
    if (!isFinite(state.wheelAngularVelocity)) state.wheelAngularVelocity = 0;

    state.wheelRotation += state.wheelAngularVelocity * dt;
    if (!isFinite(state.wheelRotation)) state.wheelRotation = 0;

    // Update wheel visual
    wheelGroup.rotation.z = state.wheelRotation;

    // RPM
    state.wheelRPM = parseFloat((Math.abs(state.wheelAngularVelocity) * 60 / (2 * Math.PI)).toFixed(1));
  }

  function updateHUD() {
    document.getElementById('flowRateDisplay').textContent = state.flowRate;
    document.getElementById('brakeDisplay').textContent = state.brakeOn ? 'ON' : 'OFF';
    document.getElementById('brakeDisplay').style.color = state.brakeOn ? '#f44336' : '#4CAF50';
    document.getElementById('rpmDisplay').textContent = state.wheelRPM.toFixed(1);
    document.getElementById('particleCountDisplay').textContent = state.activeParticles;
    document.getElementById('collisionDisplay').textContent = state.totalCollisions;
    
    const statusEl = document.getElementById('simStatusDisplay');
    statusEl.textContent = state.paused ? 'PAUSED' : 'RUNNING';
    statusEl.className = 'value ' + (state.paused ? 'status-paused' : 'status-running');
  }

  function resetScene() {
    state.wheelAngularVelocity = 0;
    state.wheelRotation = 0;
    state.flowRate = 5;
    state.brakeOn = false;
    state.activeParticles = 0;
    state.paused = false;
    state.wheelRPM = 0;
    state.totalCollisions = 0;
    state.dampingFactor = 0.98;
    lastSpawnTime = 0;

    wheelGroup.rotation.z = 0;

    for (let i = 0; i < particles.length; i++) {
      recycleParticle(particles[i]);
    }

    const brakeBtn = document.getElementById('btnPlayer2Brake');
    brakeBtn.textContent = 'P2: Toggle Brake (O/P)';
    brakeBtn.classList.remove('brake-on');
  }

  // --- Input ---
  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'q') {
      state.flowRate = Math.max(1, state.flowRate - 1);
    } else if (key === 'w') {
      state.flowRate = Math.min(10, state.flowRate + 1);
    } else if (key === 'o') {
      state.brakeOn = true;
      updateBrakeButton();
    } else if (key === 'p') {
      state.brakeOn = false;
      updateBrakeButton();
    } else if (key === ' ') {
      e.preventDefault();
      state.paused = !state.paused;
    } else if (key === 'r') {
      resetScene();
    }
  });

  function updateBrakeButton() {
    const brakeBtn = document.getElementById('btnPlayer2Brake');
    if (state.brakeOn) {
      brakeBtn.textContent = 'P2: Brake ON (P to release)';
      brakeBtn.classList.add('brake-on');
    } else {
      brakeBtn.textContent = 'P2: Toggle Brake (O/P)';
      brakeBtn.classList.remove('brake-on');
    }
  }

  document.getElementById('btnPlayer1Up').addEventListener('click', () => {
    state.flowRate = Math.min(10, state.flowRate + 1);
  });

  document.getElementById('btnPlayer1Down').addEventListener('click', () => {
    state.flowRate = Math.max(1, state.flowRate - 1);
  });

  document.getElementById('btnPlayer2Brake').addEventListener('click', () => {
    state.brakeOn = !state.brakeOn;
    updateBrakeButton();
  });

  // --- Animation Loop ---
  function animate(currentTime) {
    requestAnimationFrame(animate);

    const deltaTime = (currentTime - lastTime) / 1000;
    lastTime = currentTime;

    if (!state.paused) {
      accumulator += Math.min(deltaTime, 0.1);
      while (accumulator >= FIXED_DT) {
        updatePhysics(FIXED_DT);
        accumulator -= FIXED_DT;
      }
    }

    updateHUD();
    renderer.render(scene, camera);
  }

  // --- Resize ---
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Add some fog for atmosphere
  scene.fog = new THREE.Fog(0x87CEEB, 30, 60);

  // Start
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
