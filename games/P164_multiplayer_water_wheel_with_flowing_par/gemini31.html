<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Water Wheel</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            min-width: 250px;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #4CAF50;
        }
        .hud-row {
            margin-bottom: 5px;
            font-size: 14px;
        }
        .val {
            color: #FFC107;
            font-weight: bold;
        }
        #controls-help {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid #555;
            padding-top: 10px;
        }
        .btn-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 10;
        }
        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        button:hover {
            background: #1976D2;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.3);
        }
        #btnPlayer2Brake {
            background: #f44336;
        }
        #btnPlayer2Brake:hover {
            background: #d32f2f;
        }
    </style>
</head>
<body>

    <div id="hud">
        <h2>Water Wheel Simulation</h2>
        <div class="hud-row">Status: <span id="simStatusDisplay" class="val">RUNNING</span></div>
        <div class="hud-row">P1 Flow Rate: <span id="flowRateDisplay" class="val">5</span></div>
        <div class="hud-row">P2 Brake: <span id="brakeDisplay" class="val">OFF</span></div>
        <div class="hud-row">Wheel RPM: <span id="rpmDisplay" class="val">0.0</span></div>
        <div class="hud-row">Active Particles: <span id="particleCountDisplay" class="val">0</span></div>
        
        <div id="controls-help">
            [Q/W] Decrease/Increase Flow<br>
            [O/P] Apply/Release Brake<br>
            [Space] Pause/Resume<br>
            [R] Reset Scene
        </div>
    </div>

    <div class="btn-container">
        <button id="btnPlayer1Up">P1: Flow Up (W)</button>
        <button id="btnPlayer2Brake">P2: Toggle Brake (O/P)</button>
    </div>

    <div id="canvas-container"></div>

    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            wheelAngularVelocity: 0,
            wheelRotation: 0,
            flowRate: 5,
            brakeOn: false,
            activeParticles: 0,
            paused: false,
            wheelRPM: 0,
            totalCollisions: 0,
            dampingFactor: 0.98,
            particleSpawnInterval: 20
        };

        const state = window.__3D_STATE__;

        // --- Constants ---
        const GRAVITY = -9.8;
        const FIXED_DT = 1 / 60;
        const MAX_PARTICLES = 200;
        const WHEEL_INERTIA = 10;
        const SPOUT_POS = new THREE.Vector3(-6, 8, 0);
        const WHEEL_POS = new THREE.Vector3(0, 3, 0);

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x556B2F }); // Green-brown
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Water Wheel ---
        const wheelGroup = new THREE.Group();
        wheelGroup.position.copy(WHEEL_POS);
        scene.add(wheelGroup);

        // Main Cylinder
        const wheelGeo = new THREE.CylinderGeometry(3, 3, 0.5, 32);
        const wheelMat = new THREE.MeshLambertMaterial({ color: 0x5C3A1E });
        const wheelMesh = new THREE.Mesh(wheelGeo, wheelMat);
        wheelMesh.rotation.x = Math.PI / 2;
        wheelMesh.castShadow = true;
        wheelMesh.receiveShadow = true;
        wheelGroup.add(wheelMesh);

        // Paddles
        const paddleGeo = new THREE.BoxGeometry(0.8, 1.2, 0.4);
        const paddleMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
        const numPaddles = 8;
        
        for (let i = 0; i < numPaddles; i++) {
            const angle = (i / numPaddles) * Math.PI * 2;
            const paddle = new THREE.Mesh(paddleGeo, paddleMat);
            
            // Position at rim
            paddle.position.x = 3 * Math.cos(angle);
            paddle.position.y = 3 * Math.sin(angle);
            
            // Rotate to align with radius
            paddle.rotation.z = angle;
            
            paddle.castShadow = true;
            paddle.receiveShadow = true;
            wheelGroup.add(paddle);
        }

        // --- Spout (Visual) ---
        const spoutGeo = new THREE.CylinderGeometry(0.3, 0.3, 1, 16);
        const spoutMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
        const spout = new THREE.Mesh(spoutGeo, spoutMat);
        spout.position.copy(SPOUT_POS);
        spout.position.x -= 0.5;
        spout.rotation.z = -Math.PI / 2;
        spout.castShadow = true;
        scene.add(spout);

        // --- Particle System ---
        const particleGeo = new THREE.SphereGeometry(0.1, 8, 8);
        const particleMat = new THREE.MeshLambertMaterial({ color: 0x2196F3 });
        const particles = [];

        for (let i = 0; i < MAX_PARTICLES; i++) {
            const mesh = new THREE.Mesh(particleGeo, particleMat);
            mesh.castShadow = true;
            mesh.visible = false;
            scene.add(mesh);
            
            particles.push({
                mesh: mesh,
                vx: 0,
                vy: 0,
                vz: 0,
                active: false
            });
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'q') {
                state.flowRate = Math.max(1, state.flowRate - 1);
            } else if (key === 'w') {
                state.flowRate = Math.min(10, state.flowRate + 1);
            } else if (key === 'o') {
                state.brakeOn = true;
            } else if (key === 'p') {
                state.brakeOn = false;
            } else if (key === ' ') {
                state.paused = !state.paused;
            } else if (key === 'r') {
                resetSimulation();
            }
        });

        // Button Listeners
        document.getElementById('btnPlayer1Up').addEventListener('click', () => {
            state.flowRate = Math.min(10, state.flowRate + 1);
        });
        
        document.getElementById('btnPlayer2Brake').addEventListener('click', () => {
            state.brakeOn = !state.brakeOn;
        });

        function resetSimulation() {
            state.wheelAngularVelocity = 0;
            state.wheelRotation = 0;
            state.flowRate = 5;
            state.brakeOn = false;
            state.paused = false;
            state.totalCollisions = 0;
            
            particles.forEach(p => {
                p.active = false;
                p.mesh.visible = false;
            });
        }

        // --- Physics & Logic ---
        let spawnTimer = 0;

        function spawnParticle() {
            const p = particles.find(p => !p.active);
            if (p) {
                p.active = true;
                p.mesh.visible = true;
                
                // Add slight randomness to spawn position
                p.mesh.position.set(
                    SPOUT_POS.x + (Math.random() - 0.5) * 0.2,
                    SPOUT_POS.y + (Math.random() - 0.5) * 0.2,
                    SPOUT_POS.z + (Math.random() - 0.5) * 0.2
                );
                
                // Map flow rate (1-10) to horizontal velocity
                p.vx = 2.0 + state.flowRate * 0.4 + (Math.random() - 0.5) * 0.5;
                p.vy = (Math.random() - 0.5) * 0.5;
                p.vz = (Math.random() - 0.5) * 0.2;
            }
        }

        function updatePhysics(dt) {
            if (state.paused) return;

            // Update state variables
            state.dampingFactor = state.brakeOn ? 0.90 : 0.98;
            state.particleSpawnInterval = 100 / state.flowRate;

            // Spawning
            spawnTimer += dt * 1000;
            if (spawnTimer >= state.particleSpawnInterval) {
                spawnParticle();
                spawnTimer = 0;
            }

            let activeCount = 0;

            // Update Particles
            for (let i = 0; i < MAX_PARTICLES; i++) {
                const p = particles[i];
                if (!p.active) continue;
                
                activeCount++;

                // Gravity
                p.vy += GRAVITY * dt;

                // Move
                p.mesh.position.x += p.vx * dt;
                p.mesh.position.y += p.vy * dt;
                p.mesh.position.z += p.vz * dt;

                // Recycle if out of bounds
                if (p.mesh.position.y < -2) {
                    p.active = false;
                    p.mesh.visible = false;
                    continue;
                }

                // Collision Detection with Paddles
                let collided = false;
                for (let j = 0; j < numPaddles; j++) {
                    const angle = (j / numPaddles) * Math.PI * 2 + state.wheelRotation;
                    
                    // Paddle center in world space
                    const cx = WHEEL_POS.x + 3 * Math.cos(angle);
                    const cy = WHEEL_POS.y + 3 * Math.sin(angle);
                    
                    const dx = p.mesh.position.x - cx;
                    const dy = p.mesh.position.y - cy;
                    const distSq = dx * dx + dy * dy;

                    if (distSq < 0.8 * 0.8) {
                        // Collision!
                        const velMag = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                        const impulse = velMag * 0.05;
                        
                        // Calculate torque direction (2D cross product)
                        // Vector from wheel center to particle
                        const rx = p.mesh.position.x - WHEEL_POS.x;
                        const ry = p.mesh.position.y - WHEEL_POS.y;
                        
                        const crossZ = rx * p.vy - ry * p.vx;
                        const direction = Math.sign(crossZ);
                        
                        // Apply torque impulse
                        state.wheelAngularVelocity += (impulse * direction) / WHEEL_INERTIA;
                        
                        state.totalCollisions++;
                        collided = true;
                        break; // Only collide with one paddle per frame
                    }
                }

                if (collided) {
                    p.active = false;
                    p.mesh.visible = false;
                }
            }

            state.activeParticles = activeCount;

            // Update Wheel
            state.wheelAngularVelocity *= state.dampingFactor;
            
            // Clamp angular velocity
            state.wheelAngularVelocity = Math.max(-20, Math.min(20, state.wheelAngularVelocity));
            
            state.wheelRotation += state.wheelAngularVelocity * dt;
            wheelGroup.rotation.z = state.wheelRotation;
            
            // Calculate RPM
            state.wheelRPM = Math.abs(state.wheelAngularVelocity * 60 / (2 * Math.PI));
        }

        // --- UI Update ---
        const uiFlow = document.getElementById('flowRateDisplay');
        const uiBrake = document.getElementById('brakeDisplay');
        const uiRPM = document.getElementById('rpmDisplay');
        const uiParticles = document.getElementById('particleCountDisplay');
        const uiStatus = document.getElementById('simStatusDisplay');

        function updateHUD() {
            uiFlow.innerText = state.flowRate;
            uiBrake.innerText = state.brakeOn ? 'ON' : 'OFF';
            uiBrake.style.color = state.brakeOn ? '#f44336' : '#FFC107';
            uiRPM.innerText = state.wheelRPM.toFixed(1);
            uiParticles.innerText = state.activeParticles;
            uiStatus.innerText = state.paused ? 'PAUSED' : 'RUNNING';
            uiStatus.style.color = state.paused ? '#f44336' : '#4CAF50';
        }

        // --- Main Loop ---
        let lastTime = performance.now();
        let accumulator = 0;

        function animate(currentTime) {
            requestAnimationFrame(animate);

            const frameTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            // Prevent spiral of death
            accumulator += Math.min(frameTime, 0.1);

            while (accumulator >= FIXED_DT) {
                updatePhysics(FIXED_DT);
                accumulator -= FIXED_DT;
            }

            updateHUD();
            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        animate(performance.now());

    </script>
</body>
</html>
