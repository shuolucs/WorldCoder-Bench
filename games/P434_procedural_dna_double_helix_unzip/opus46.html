<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Double Helix - Interactive Unzipping</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a2e; }
canvas { display: block; }

#hudPanel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 150, 255, 0.3);
    border-radius: 12px;
    padding: 18px;
    color: #e0e0ff;
    min-width: 260px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    z-index: 100;
}

#hudPanel h3 {
    margin-bottom: 12px;
    color: #88aaff;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(100,150,255,0.2);
    padding-bottom: 8px;
}

.btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}

button {
    padding: 8px 16px;
    border: 1px solid rgba(100,150,255,0.4);
    border-radius: 6px;
    background: rgba(50, 70, 150, 0.5);
    color: #c0d0ff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
}

button:hover:not(:disabled) {
    background: rgba(70, 100, 200, 0.7);
    border-color: rgba(130, 180, 255, 0.6);
}

button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.slider-row {
    margin-bottom: 12px;
}

.slider-row label {
    display: block;
    margin-bottom: 4px;
    font-size: 12px;
    color: #8899cc;
}

input[type="range"] {
    width: 100%;
    accent-color: #5577ff;
}

#progressBarContainer {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 10px;
}

#progressBar {
    height: 100%;
    width: 0%;
    border-radius: 4px;
    transition: width 0.3s, background-color 0.3s;
    background: #44cc66;
}

#statusText {
    font-size: 13px;
    color: #99aadd;
    margin-bottom: 8px;
}

#tempGauge {
    font-size: 13px;
    color: #ffaa66;
    margin-bottom: 8px;
    padding: 6px 10px;
    background: rgba(255,170,100,0.1);
    border-radius: 6px;
    border: 1px solid rgba(255,170,100,0.2);
}

#basePairInfo {
    font-size: 13px;
    color: #aaddaa;
    min-height: 20px;
    padding: 6px 10px;
    background: rgba(100,220,100,0.08);
    border-radius: 6px;
    border: 1px solid rgba(100,220,100,0.15);
}

#autoIndicator {
    display: none;
    font-size: 12px;
    color: #ffdd44;
    margin-top: 8px;
    animation: blink 1s infinite;
}

#autoIndicator.active { display: block; }

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

.info-hint {
    font-size: 11px;
    color: #667799;
    margin-top: 10px;
    line-height: 1.5;
}
</style>
</head>
<body>

<div id="hudPanel">
    <h3>🧬 DNA Helix Viewer</h3>
    <div class="btn-row">
        <button id="unzipBtn">Unzip Next</button>
        <button id="rezipBtn">Rezip All</button>
    </div>
    <div class="slider-row">
        <label>Unzip Speed: <span id="speedLabel">1</span></label>
        <input type="range" id="speedSlider" min="1" max="5" value="1" step="1">
    </div>
    <div id="progressBarContainer"><div id="progressBar"></div></div>
    <div id="statusText">Zipped: 20/20 | Unzipped: 0/20</div>
    <div id="tempGauge">Temperature: 25.0°C</div>
    <div id="basePairInfo">Click a base pair for info</div>
    <div id="autoIndicator">⚡ Auto-Unzip Active (Space to stop)</div>
    <div class="info-hint">
        🖱️ Click base pairs for info<br>
        ⌨️ Space: toggle auto-unzip<br>
        🔄 Drag to rotate, scroll to zoom
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    // State
    window.__3D_STATE__ = {
        totalBasePairs: 20,
        unzipProgress: 0,
        autoUnzipActive: false,
        speed: 1,
        temperature: 25,
        helicaseY: 0,
        selectedBasePair: null,
        selectedPairType: null,
        selectedPairState: null,
        isAnimating: false,
        basePairStates: new Array(20).fill(false),
        progressPercent: 0
    };

    const state = window.__3D_STATE__;

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 0, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight1.position.set(5, 10, 7);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
    dirLight2.position.set(-5, -10, -3);
    scene.add(dirLight2);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // DNA parameters
    const NUM_PAIRS = 20;
    const HELIX_RADIUS = 3;
    const PITCH = 7;
    const DEG_PER_PAIR = 18;
    const BACKBONE_SPHERE_RADIUS = 0.25;
    const BACKBONE_TUBE_RADIUS = 0.08;
    const RUNG_RADIUS = 0.06;

    // Determine pair type
    function getPairType(index) {
        if (index < 5) return 'AT';
        if (index < 10) return 'GC';
        if (index < 15) return 'AT';
        return 'GC';
    }

    function getPairColor(index) {
        return getPairType(index) === 'AT' ? 0x44cc44 : 0xcccc22;
    }

    // DNA group
    const dnaGroup = new THREE.Group();
    scene.add(dnaGroup);

    // Calculate positions for backbone spheres along each strand
    // We need more backbone spheres than just at base pair positions
    // Base pairs are at specific angles; backbone spheres every 18 degrees
    // With 20 base pairs at 18 degrees each = 360 degrees total = 1 full turn

    // Actually, let's place base pairs at evenly spaced angles
    // Each base pair at angle = index * 18 degrees
    // Total angle span = 19 * 18 = 342 degrees

    // Let's compute Y from angle: y = angle / 360 * pitch
    // Center the helix vertically

    const basePairData = [];
    const totalAngle = (NUM_PAIRS - 1) * DEG_PER_PAIR;
    const totalHeight = totalAngle / 360 * PITCH;
    const yOffset = -totalHeight / 2;

    for (let i = 0; i < NUM_PAIRS; i++) {
        const angleDeg = i * DEG_PER_PAIR;
        const angleRad = angleDeg * Math.PI / 180;
        const y = (angleDeg / 360) * PITCH + yOffset;

        const x1 = HELIX_RADIUS * Math.cos(angleRad);
        const z1 = HELIX_RADIUS * Math.sin(angleRad);

        const x2 = HELIX_RADIUS * Math.cos(angleRad + Math.PI);
        const z2 = HELIX_RADIUS * Math.sin(angleRad + Math.PI);

        basePairData.push({
            index: i,
            y: y,
            angle: angleRad,
            strand1: new THREE.Vector3(x1, y, z1),
            strand2: new THREE.Vector3(x2, y, z2),
            mid: new THREE.Vector3(0, y, 0),
            type: getPairType(i),
            color: getPairColor(i)
        });
    }

    // Create materials
    const strand1Mat = new THREE.MeshPhongMaterial({ color: 0xdd3333 });
    const strand2Mat = new THREE.MeshPhongMaterial({ color: 0x3333dd });

    // Store all animated objects
    const animatedObjects = [];

    // Base pair groups for each pair
    const basePairGroups = [];

    // Backbone spheres and connectors
    const strand1Spheres = [];
    const strand2Spheres = [];
    const strand1Connectors = [];
    const strand2Connectors = [];

    const sphereGeo = new THREE.SphereGeometry(BACKBONE_SPHERE_RADIUS, 12, 12);

    for (let i = 0; i < NUM_PAIRS; i++) {
        const bp = basePairData[i];

        // Strand 1 backbone sphere
        const s1 = new THREE.Mesh(sphereGeo, strand1Mat.clone());
        s1.position.copy(bp.strand1);
        s1.userData = { basePairIndex: i, side: 'left', originalPos: bp.strand1.clone() };
        dnaGroup.add(s1);
        strand1Spheres.push(s1);

        // Strand 2 backbone sphere
        const s2 = new THREE.Mesh(sphereGeo, strand2Mat.clone());
        s2.position.copy(bp.strand2);
        s2.userData = { basePairIndex: i, side: 'right', originalPos: bp.strand2.clone() };
        dnaGroup.add(s2);
        strand2Spheres.push(s2);
    }

    // Create backbone connectors between consecutive spheres
    function createConnector(from, to, material) {
        const dir = new THREE.Vector3().subVectors(to, from);
        const length = dir.length();
        const geo = new THREE.CylinderGeometry(BACKBONE_TUBE_RADIUS, BACKBONE_TUBE_RADIUS, length, 8);
        const mesh = new THREE.Mesh(geo, material.clone());
        const mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);
        mesh.position.copy(mid);
        mesh.lookAt(to);
        mesh.rotateX(Math.PI / 2);
        return mesh;
    }

    for (let i = 0; i < NUM_PAIRS - 1; i++) {
        const c1 = createConnector(basePairData[i].strand1, basePairData[i + 1].strand1, strand1Mat);
        c1.userData = { connectorIndex: i, side: 'left' };
        dnaGroup.add(c1);
        strand1Connectors.push(c1);

        const c2 = createConnector(basePairData[i].strand2, basePairData[i + 1].strand2, strand2Mat);
        c2.userData = { connectorIndex: i, side: 'right' };
        dnaGroup.add(c2);
        strand2Connectors.push(c2);
    }

    // Create base pair rungs
    const rungGeo = new THREE.CylinderGeometry(RUNG_RADIUS, RUNG_RADIUS, 1, 8);

    function createRungHalf(from, to, color) {
        const dir = new THREE.Vector3().subVectors(to, from);
        const length = dir.length();
        const geo = new THREE.CylinderGeometry(RUNG_RADIUS, RUNG_RADIUS, length, 8);
        const mat = new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 1.0 });
        const mesh = new THREE.Mesh(geo, mat);
        const mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);
        mesh.position.copy(mid);
        mesh.lookAt(to);
        mesh.rotateX(Math.PI / 2);
        return mesh;
    }

    const basePairMeshes = [];

    for (let i = 0; i < NUM_PAIRS; i++) {
        const bp = basePairData[i];
        const color = bp.color;

        // Left half: strand1 to mid
        const leftHalf = createRungHalf(bp.strand1, bp.mid, color);
        leftHalf.userData = {
            basePairIndex: i,
            side: 'left',
            type: bp.type,
            originalFrom: bp.strand1.clone(),
            originalTo: bp.mid.clone()
        };
        dnaGroup.add(leftHalf);

        // Right half: mid to strand2
        const rightHalf = createRungHalf(bp.mid, bp.strand2, color);
        rightHalf.userData = {
            basePairIndex: i,
            side: 'right',
            type: bp.type,
            originalFrom: bp.mid.clone(),
            originalTo: bp.strand2.clone()
        };
        dnaGroup.add(rightHalf);

        basePairMeshes.push({ left: leftHalf, right: rightHalf, index: i });
    }

    // Helicase enzyme indicator
    const helicaseGeo = new THREE.SphereGeometry(0.5, 20, 20);
    const helicaseMat = new THREE.MeshPhongMaterial({
        color: 0xffff00,
        emissive: 0xffaa00,
        emissiveIntensity: 0.8,
        transparent: true,
        opacity: 0.9
    });
    const helicase = new THREE.Mesh(helicaseGeo, helicaseMat);
    helicase.position.set(0, basePairData[0].y, 0);
    dnaGroup.add(helicase);

    // Add a point light to helicase for glow effect
    const helicaseLight = new THREE.PointLight(0xffaa00, 1, 5);
    helicase.add(helicaseLight);

    // Animation system
    const tweens = [];

    function addTween(obj, prop, target, duration, onComplete) {
        const start = typeof prop === 'function' ? prop() : getNestedProp(obj, prop);
        tweens.push({
            obj, prop, start, target, duration,
            elapsed: 0,
            onComplete: onComplete || null
        });
    }

    function getNestedProp(obj, prop) {
        const parts = prop.split('.');
        let current = obj;
        for (const p of parts) current = current[p];
        return current;
    }

    function setNestedProp(obj, prop, value) {
        const parts = prop.split('.');
        let current = obj;
        for (let i = 0; i < parts.length - 1; i++) current = current[parts[i]];
        current[parts[parts.length - 1]] = value;
    }

    function lerp(a, b, t) {
        return a + (b - a) * t;
    }

    function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    // Unzip animation for a single base pair
    function animateUnzip(index, callback) {
        const bp = basePairData[index];
        const bpMesh = basePairMeshes[index];
        const s1 = strand1Spheres[index];
        const s2 = strand2Spheres[index];
        const duration = 300; // ms

        const separationRung = 2;
        const separationBackbone = 1.5;

        // Calculate direction for separation (perpendicular to the rung, in XZ plane)
        const rungDir = new THREE.Vector3().subVectors(bp.strand2, bp.strand1).normalize();

        // Target positions for backbone spheres
        const s1Target = bp.strand1.clone().add(rungDir.clone().multiplyScalar(-separationBackbone));
        const s2Target = bp.strand2.clone().add(rungDir.clone().multiplyScalar(separationBackbone));

        // Animate left rung half
        const leftFrom = bp.strand1.clone().add(rungDir.clone().multiplyScalar(-separationRung));
        const leftTo = bp.mid.clone().add(rungDir.clone().multiplyScalar(-separationRung));

        // Animate right rung half
        const rightFrom = bp.mid.clone().add(rungDir.clone().multiplyScalar(separationRung));
        const rightTo = bp.strand2.clone().add(rungDir.clone().multiplyScalar(separationRung));

        state.isAnimating = true;

        const startTime = performance.now();

        const animData = {
            startTime,
            duration,
            index,
            // Original positions
            s1Orig: bp.strand1.clone(),
            s2Orig: bp.strand2.clone(),
            s1Target,
            s2Target,
            leftOrigFrom: bp.strand1.clone(),
            leftOrigTo: bp.mid.clone(),
            leftTargetFrom: leftFrom,
            leftTargetTo: leftTo,
            rightOrigFrom: bp.mid.clone(),
            rightOrigTo: bp.strand2.clone(),
            rightTargetFrom: rightFrom,
            rightTargetTo: rightTo,
            callback,
            done: false,
            direction: 'unzip'
        };

        activeAnimations.push(animData);
    }

    function animateRezip(index, callback) {
        const bp = basePairData[index];
        const bpMesh = basePairMeshes[index];
        const s1 = strand1Spheres[index];
        const s2 = strand2Spheres[index];
        const duration = 300;

        const rungDir = new THREE.Vector3().subVectors(bp.strand2, bp.strand1).normalize();
        const separationRung = 2;
        const separationBackbone = 1.5;

        const s1From = bp.strand1.clone().add(rungDir.clone().multiplyScalar(-separationBackbone));
        const s2From = bp.strand2.clone().add(rungDir.clone().multiplyScalar(separationBackbone));

        const leftCurFrom = bp.strand1.clone().add(rungDir.clone().multiplyScalar(-separationRung));
        const leftCurTo = bp.mid.clone().add(rungDir.clone().multiplyScalar(-separationRung));

        const rightCurFrom = bp.mid.clone().add(rungDir.clone().multiplyScalar(separationRung));
        const rightCurTo = bp.strand2.clone().add(rungDir.clone().multiplyScalar(separationRung));

        state.isAnimating = true;

        const startTime = performance.now();

        const animData = {
            startTime,
            duration,
            index,
            s1Orig: s1From,
            s2Orig: s2From,
            s1Target: bp.strand1.clone(),
            s2Target: bp.strand2.clone(),
            leftOrigFrom: leftCurFrom,
            leftOrigTo: leftCurTo,
            leftTargetFrom: bp.strand1.clone(),
            leftTargetTo: bp.mid.clone(),
            rightOrigFrom: rightCurFrom,
            rightOrigTo: rightCurTo,
            rightTargetFrom: bp.mid.clone(),
            rightTargetTo: bp.strand2.clone(),
            callback,
            done: false,
            direction: 'rezip'
        };

        activeAnimations.push(animData);
    }

    const activeAnimations = [];

    function updateAnimations(now) {
        for (let a = activeAnimations.length - 1; a >= 0; a--) {
            const anim = activeAnimations[a];
            if (anim.done) continue;

            const elapsed = now - anim.startTime;
            let t = Math.min(elapsed / anim.duration, 1);
            t = easeInOutCubic(t);

            const i = anim.index;
            const s1 = strand1Spheres[i];
            const s2 = strand2Spheres[i];
            const bpMesh = basePairMeshes[i];

            // Interpolate backbone sphere positions
            s1.position.lerpVectors(anim.s1Orig, anim.s1Target, t);
            s2.position.lerpVectors(anim.s2Orig, anim.s2Target, t);

            // Interpolate rung positions
            const leftFrom = new THREE.Vector3().lerpVectors(anim.leftOrigFrom, anim.leftTargetFrom, t);
            const leftTo = new THREE.Vector3().lerpVectors(anim.leftOrigTo, anim.leftTargetTo, t);
            const rightFrom = new THREE.Vector3().lerpVectors(anim.rightOrigFrom, anim.rightTargetFrom, t);
            const rightTo = new THREE.Vector3().lerpVectors(anim.rightOrigTo, anim.rightTargetTo, t);

            updateRungMesh(bpMesh.left, leftFrom, leftTo);
            updateRungMesh(bpMesh.right, rightFrom, rightTo);

            // Opacity
            if (anim.direction === 'unzip') {
                const opacity = lerp(1.0, 0.6, t);
                bpMesh.left.material.opacity = opacity;
                bpMesh.right.material.opacity = opacity;
            } else {
                const opacity = lerp(0.6, 1.0, t);
                bpMesh.left.material.opacity = opacity;
                bpMesh.right.material.opacity = opacity;
            }

            if (t >= 1) {
                anim.done = true;
                activeAnimations.splice(a, 1);
                if (anim.callback) anim.callback();
            }
        }

        // Update connectors
        updateAllConnectors();

        if (activeAnimations.length === 0) {
            state.isAnimating = false;
        }
    }

    function updateRungMesh(mesh, from, to) {
        const dir = new THREE.Vector3().subVectors(to, from);
        const length = dir.length();
        const mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);

        mesh.position.copy(mid);
        mesh.scale.y = length;

        // Reset geometry scale - we need to use unit cylinder
        // Actually let's just rebuild orientation
        const up = new THREE.Vector3(0, 1, 0);
        const quat = new THREE.Quaternion();
        const normDir = dir.clone().normalize();
        quat.setFromUnitVectors(up, normDir);
        mesh.quaternion.copy(quat);

        // Scale y to match length (original geo is length 1... no, it was created with specific length)
        // Let's fix: we need consistent geometry. Let me use unit cylinder approach.
    }

    // Recreate rungs with unit geometry for easier scaling
    // Remove old rungs and recreate
    for (let i = 0; i < NUM_PAIRS; i++) {
        dnaGroup.remove(basePairMeshes[i].left);
        dnaGroup.remove(basePairMeshes[i].right);
    }
    basePairMeshes.length = 0;

    const unitRungGeo = new THREE.CylinderGeometry(RUNG_RADIUS, RUNG_RADIUS, 1, 8);

    for (let i = 0; i < NUM_PAIRS; i++) {
        const bp = basePairData[i];
        const color = bp.color;

        const leftMat = new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 1.0 });
        const leftHalf = new THREE.Mesh(unitRungGeo, leftMat);
        positionRung(leftHalf, bp.strand1, bp.mid);
        leftHalf.userData = { basePairIndex: i, side: 'left', type: bp.type, isRung: true };
        dnaGroup.add(leftHalf);

        const rightMat = new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 1.0 });
        const rightHalf = new THREE.Mesh(unitRungGeo, rightMat);
        positionRung(rightHalf, bp.mid, bp.strand2);
        rightHalf.userData = { basePairIndex: i, side: 'right', type: bp.type, isRung: true };
        dnaGroup.add(rightHalf);

        basePairMeshes.push({ left: leftHalf, right: rightHalf, index: i });
    }

    function positionRung(mesh, from, to) {
        const dir = new THREE.Vector3().subVectors(to, from);
        const length = dir.length();
        const mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);
        mesh.position.copy(mid);
        mesh.scale.set(1, length, 1);
        const up = new THREE.Vector3(0, 1, 0);
        const normDir = dir.clone().normalize();
        const quat = new THREE.Quaternion();
        quat.setFromUnitVectors(up, normDir);
        mesh.quaternion.copy(quat);
    }

    // Fix updateRungMesh to use positionRung
    function updateRungMeshFixed(mesh, from, to) {
        positionRung(mesh, from, to);
    }

    // Override in animation update
    // Let me refactor the animation update to use positionRung

    function updateAllConnectors() {
        for (let i = 0; i < NUM_PAIRS - 1; i++) {
            const from1 = strand1Spheres[i].position;
            const to1 = strand1Spheres[i + 1].position;
            updateConnectorMesh(strand1Connectors[i], from1, to1);

            const from2 = strand2Spheres[i].position;
            const to2 = strand2Spheres[i + 1].position;
            updateConnectorMesh(strand2Connectors[i], from2, to2);
        }
    }

    // Recreate connectors with unit geometry too
    for (let i = 0; i < strand1Connectors.length; i++) {
        dnaGroup.remove(strand1Connectors[i]);
        dnaGroup.remove(strand2Connectors[i]);
    }
    strand1Connectors.length = 0;
    strand2Connectors.length = 0;

    const unitConnGeo = new THREE.CylinderGeometry(BACKBONE_TUBE_RADIUS, BACKBONE_TUBE_RADIUS, 1, 8);

    for (let i = 0; i < NUM_PAIRS - 1; i++) {
        const c1 = new THREE.Mesh(unitConnGeo, strand1Mat.clone());
        positionRung(c1, basePairData[i].strand1, basePairData[i + 1].strand1);
        c1.userData = { connectorIndex: i, side: 'left' };
        dnaGroup.add(c1);
        strand1Connectors.push(c1);

        const c2 = new THREE.Mesh(unitConnGeo, strand2Mat.clone());
        positionRung(c2, basePairData[i].strand2, basePairData[i + 1].strand2);
        c2.userData = { connectorIndex: i, side: 'right' };
        dnaGroup.add(c2);
        strand2Connectors.push(c2);
    }

    function updateConnectorMesh(mesh, from, to) {
        positionRung(mesh, from, to);
    }

    // Refactored animation update
    function updateAnimationsRefactored(now) {
        for (let a = activeAnimations.length - 1; a >= 0; a--) {
            const anim = activeAnimations[a];
            if (anim.done) continue;

            const elapsed = now - anim.startTime;
            let t = Math.min(elapsed / anim.duration, 1);
            t = easeInOutCubic(t);

            const i = anim.index;
            const s1 = strand1Spheres[i];
            const s2 = strand2Spheres[i];
            const bpMesh = basePairMeshes[i];

            s1.position.lerpVectors(anim.s1Orig, anim.s1Target, t);
            s2.position.lerpVectors(anim.s2Orig, anim.s2Target, t);

            const leftFrom = new THREE.Vector3().lerpVectors(anim.leftOrigFrom, anim.leftTargetFrom, t);
            const leftTo = new THREE.Vector3().lerpVectors(anim.leftOrigTo, anim.leftTargetTo, t);
            const rightFrom = new THREE.Vector3().lerpVectors(anim.rightOrigFrom, anim.rightTargetFrom, t);
            const rightTo = new THREE.Vector3().lerpVectors(anim.rightOrigTo, anim.rightTargetTo, t);

            positionRung(bpMesh.left, leftFrom, leftTo);
            positionRung(bpMesh.right, rightFrom, rightTo);

            if (anim.direction === 'unzip') {
                const opacity = lerp(1.0, 0.6, t);
                bpMesh.left.material.opacity = opacity;
                bpMesh.right.material.opacity = opacity;
            } else {
                const opacity = lerp(0.6, 1.0, t);
                bpMesh.left.material.opacity = opacity;
                bpMesh.right.material.opacity = opacity;
            }

            if (t >= 1) {
                anim.done = true;
                activeAnimations.splice(a, 1);
                if (anim.callback) anim.callback();
            }
        }

        updateAllConnectors();

        if (activeAnimations.length === 0) {
            state.isAnimating = false;
        }
    }

    // UI update
    function updateUI() {
        const unzipped = state.unzipProgress;
        const zipped = NUM_PAIRS - unzipped;
        state.temperature = 25 + unzipped * 3.5;
        state.progressPercent = (unzipped / NUM_PAIRS) * 100;

        document.getElementById('statusText').textContent = `Zipped: ${zipped}/${NUM_PAIRS} | Unzipped: ${unzipped}/${NUM_PAIRS}`;
        document.getElementById('tempGauge').textContent = `Temperature: ${state.temperature.toFixed(1)}°C`;

        const progressBar = document.getElementById('progressBar');
        progressBar.style.width = state.progressPercent + '%';
        if (state.progressPercent < 50) progressBar.style.backgroundColor = '#44cc66';
        else if (state.progressPercent <= 80) progressBar.style.backgroundColor = '#cccc44';
        else progressBar.style.backgroundColor = '#cc4444';

        document.getElementById('unzipBtn').disabled = state.unzipProgress >= NUM_PAIRS || state.isAnimating;

        // Update helicase position
        let targetY;
        if (state.unzipProgress < NUM_PAIRS) {
            targetY = basePairData[state.unzipProgress].y;
        } else {
            targetY = basePairData[NUM_PAIRS - 1].y + 1;
        }
        state.helicaseY = targetY;

        const autoInd = document.getElementById('autoIndicator');
        if (state.autoUnzipActive) autoInd.classList.add('active');
        else autoInd.classList.remove('active');
    }

    // Unzip logic
    function unzipNext(callback) {
        if (state.unzipProgress >= NUM_PAIRS || state.isAnimating) {
            if (callback) callback();
            return;
        }

        const index = state.unzipProgress;
        state.basePairStates[index] = true;
        state.unzipProgress++;
        updateUI();

        animateUnzip(index, callback);
    }

    function unzipMultiple(count) {
        if (state.isAnimating) return;
        let remaining = Math.min(count, NUM_PAIRS - state.unzipProgress);
        if (remaining <= 0) return;

        let i = 0;
        function doNext() {
            if (i >= remaining) return;
            setTimeout(() => {
                unzipNext(() => {
                    i++;
                    doNext();
                });
            }, i === 0 ? 0 : 150);
        }
        doNext();
    }

    function rezipAll() {
        if (state.isAnimating || state.unzipProgress === 0) return;

        const toRezip = [];
        for (let i = 0; i < NUM_PAIRS; i++) {
            if (state.basePairStates[i]) toRezip.push(i);
        }

        if (toRezip.length === 0) return;

        // Rezip from top to bottom
        toRezip.reverse();

        let i = 0;
        function doNext() {
            if (i >= toRezip.length) {
                state.unzipProgress = 0;
                updateUI();
                return;
            }
            const idx = toRezip[i];
            state.basePairStates[idx] = false;

            // Recalculate unzipProgress
            let newProgress = 0;
            for (let j = 0; j < NUM_PAIRS; j++) {
                if (state.basePairStates[j]) newProgress = j + 1;
            }
            state.unzipProgress = newProgress;
            updateUI();

            animateRezip(idx, () => {
                i++;
                setTimeout(doNext, 50);
            });
        }
        doNext();
    }

    // Highlight selected base pair
    let highlightedMeshes = [];

    function clearHighlight() {
        for (const m of highlightedMeshes) {
            m.material.emissive.setHex(0x000000);
            m.material.emissiveIntensity = 0;
        }
        highlightedMeshes = [];
    }

    function highlightBasePair(index) {
        clearHighlight();
        const bp = basePairMeshes[index];
        bp.left.material.emissive.setHex(0xffffff);
        bp.left.material.emissiveIntensity = 0.4;
        bp.right.material.emissive.setHex(0xffffff);
        bp.right.material.emissiveIntensity = 0.4;
        highlightedMeshes.push(bp.left, bp.right);

        state.selectedBasePair = index;
        state.selectedPairType = basePairData[index].type;
        state.selectedPairState = state.basePairStates[index] ? 'Unzipped' : 'Zipped';

        document.getElementById('basePairInfo').textContent =
            `Base Pair #${index}: ${state.selectedPairType} - ${state.selectedPairState}`;
    }

    // Raycaster for clicking
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (event) => {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        // Collect all rung meshes
        const rungMeshes = [];
        for (const bp of basePairMeshes) {
            rungMeshes.push(bp.left, bp.right);
        }

        const intersects = raycaster.intersectObjects(rungMeshes);
        if (intersects.length > 0) {
            const hit = intersects[0].object;
            if (hit.userData.basePairIndex !== undefined) {
                highlightBasePair(hit.userData.basePairIndex);
            }
        }
    });

    // Button events
    document.getElementById('unzipBtn').addEventListener('click', () => {
        const speed = state.speed;
        unzipMultiple(speed);
    });

    document.getElementById('rezipBtn').addEventListener('click', () => {
        rezipAll();
    });

    document.getElementById('speedSlider').addEventListener('input', (e) => {
        state.speed = parseInt(e.target.value);
        document.getElementById('speedLabel').textContent = state.speed;
    });

    // Keyboard
    let autoUnzipInterval = null;

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            state.autoUnzipActive = !state.autoUnzipActive;

            if (state.autoUnzipActive) {
                autoUnzipInterval = setInterval(() => {
                    if (state.unzipProgress >= NUM_PAIRS || state.isAnimating) {
                        if (state.unzipProgress >= NUM_PAIRS) {
                            state.autoUnzipActive = false;
                            clearInterval(autoUnzipInterval);
                            autoUnzipInterval = null;
                            updateUI();
                        }
                        return;
                    }
                    unzipNext();
                }, 500);
            } else {
                if (autoUnzipInterval) {
                    clearInterval(autoUnzipInterval);
                    autoUnzipInterval = null;
                }
            }
            updateUI();
        }
    });

    // Auto-rotation tracking
    let lastInteractionTime = 0;
    controls.addEventListener('start', () => { lastInteractionTime = performance.now(); });
    controls.addEventListener('end', () => { lastInteractionTime = performance.now(); });

    // Animation loop
    let lastTime = performance.now();

    function animate(now) {
        requestAnimationFrame(animate);

        const delta = (now - lastTime) / 1000;
        lastTime = now;

        // Update animations
        updateAnimationsRefactored(now);

        // Auto-rotate when not interacting
        const timeSinceInteraction = now - lastInteractionTime;
        if (timeSinceInteraction > 2000) {
            dnaGroup.rotation.y += 0.1 * delta;
        }

        // Smooth helicase movement
        const targetHelicaseY = state.helicaseY;
        helicase.position.y += (targetHelicaseY - helicase.position.y) * 0.1;
        helicase.position.x = 0;
        helicase.position.z = 0;

        // Pulse helicase
        const pulse = 1 + 0.1 * Math.sin(now * 0.005);
        helicase.scale.setScalar(pulse);
        helicaseMat.emissiveIntensity = 0.5 + 0.3 * Math.sin(now * 0.003);

        controls.update();
        renderer.render(scene, camera);
    }

    // Handle resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateUI();
    animate(performance.now());
})();
</script>
</body>
