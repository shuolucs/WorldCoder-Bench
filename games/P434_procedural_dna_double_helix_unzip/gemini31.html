<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive DNA Unzipping</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hudPanel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #3a3a6e;
            width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: #4da8da;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            background: #205081;
            color: white;
            border: 1px solid #4da8da;
            padding: 10px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            background: #2a69a8;
            box-shadow: 0 0 8px rgba(77, 168, 218, 0.6);
        }
        button:disabled {
            background: #333;
            border-color: #555;
            color: #888;
            cursor: not-allowed;
        }
        #rezipBtn {
            background: #812020;
            border-color: #da4d4d;
        }
        #rezipBtn:hover {
            background: #a82a2a;
            box-shadow: 0 0 8px rgba(218, 77, 77, 0.6);
        }
        .control-row {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        input[type=range] {
            width: 120px;
            accent-color: #4da8da;
        }
        #progressBarContainer {
            width: 100%;
            height: 12px;
            background: #222;
            border-radius: 6px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #444;
        }
        #progressBar {
            width: 0%;
            height: 100%;
            background: #4CAF50;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        .info-box {
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 14px;
            border-left: 3px solid #4da8da;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .info-row:last-child {
            margin-bottom: 0;
        }
        #basePairInfo {
            color: #a8d0e6;
            font-style: italic;
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
        }
        .hint {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hudPanel">
        <h2>DNA Denaturation</h2>
        
        <div class="btn-group">
            <button id="unzipBtn">Unzip Next</button>
            <button id="rezipBtn">Rezip All</button>
        </div>

        <div class="control-row">
            <label for="speedSlider">Unzip Speed:</label>
            <input type="range" id="speedSlider" min="1" max="5" value="1" step="1">
            <span id="speedVal">1</span>
        </div>

        <div id="progressBarContainer">
            <div id="progressBar"></div>
        </div>

        <div class="info-box">
            <div class="info-row">
                <span>Status:</span>
                <span id="statusText">Zipped: 20/20 | Unzipped: 0/20</span>
            </div>
            <div class="info-row">
                <span>Temp:</span>
                <span id="tempGauge" style="color: #ff7b7b; font-weight: bold;">Temperature: 25.0°C</span>
            </div>
        </div>

        <div id="basePairInfo">Click a base pair to inspect</div>
        
        <div class="hint">Press 'Space' to toggle Auto-Unzip</div>
    </div>

    <!-- Import Three.js as ES module -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            totalBasePairs: 20,
            unzipProgress: 0,
            autoUnzipActive: false,
            speed: 1,
            temperature: 25.0,
            helicaseY: 0,
            selectedBasePair: null,
            selectedPairType: null,
            selectedPairState: null,
            isAnimating: false,
            basePairStates: new Array(20).fill(false),
            progressPercent: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(5, 10, 7);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight2.position.set(-5, -10, -3);
        scene.add(dirLight2);

        // --- DNA Construction ---
        const dnaGroup = new THREE.Group();
        scene.add(dnaGroup);

        const numPairs = 20;
        const radius = 3;
        const pitch = 7;
        const yStep = pitch / numPairs; // 0.35
        const angleStep = Math.PI / 10; // 18 degrees

        // Materials
        const matRed = new THREE.MeshPhongMaterial({ color: 0xff0000, shininess: 80 });
        const matBlue = new THREE.MeshPhongMaterial({ color: 0x0044ff, shininess: 80 });
        
        const getRungMat = (color) => new THREE.MeshPhongMaterial({ 
            color: color, 
            transparent: true, 
            opacity: 1,
            shininess: 50
        });

        // Geometries
        const sphereGeo = new THREE.SphereGeometry(0.25, 32, 32);
        const backboneCylGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 16);
        const rungCylGeo = new THREE.CylinderGeometry(0.06, 0.06, 1, 16);

        // Data structures for animation and interaction
        const lSpheres = [];
        const rSpheres = [];
        const lRungs = [];
        const rRungs = [];
        const lConns = [];
        const rConns = [];
        const rungsForRaycast = [];

        // Build Spheres and Rungs
        for (let i = 0; i < numPairs; i++) {
            const angle = i * angleStep;
            const y = -3.5 + i * yStep;

            const lx = radius * Math.cos(angle);
            const lz = radius * Math.sin(angle);
            const rx = radius * Math.cos(angle + Math.PI);
            const rz = radius * Math.sin(angle + Math.PI);

            const lPos = new THREE.Vector3(lx, y, lz);
            const rPos = new THREE.Vector3(rx, y, rz);
            const midPos = new THREE.Vector3(0, y, 0);

            // Outward normals for unzipping
            const lNormal = new THREE.Vector3(lx, 0, lz).normalize();
            const rNormal = new THREE.Vector3(rx, 0, rz).normalize();

            // Spheres
            const lSphere = new THREE.Mesh(sphereGeo, matRed);
            lSphere.position.copy(lPos);
            dnaGroup.add(lSphere);
            lSpheres.push({
                mesh: lSphere,
                basePos: lPos.clone(),
                unzipPos: lPos.clone().add(lNormal.clone().multiplyScalar(1.5))
            });

            const rSphere = new THREE.Mesh(sphereGeo, matBlue);
            rSphere.position.copy(rPos);
            dnaGroup.add(rSphere);
            rSpheres.push({
                mesh: rSphere,
                basePos: rPos.clone(),
                unzipPos: rPos.clone().add(rNormal.clone().multiplyScalar(1.5))
            });

            // Rungs
            const isAT = (i >= 0 && i <= 4) || (i >= 10 && i <= 14);
            const color = isAT ? 0x00ff00 : 0xffff00;
            const typeStr = isAT ? 'AT' : 'GC';

            const matLeft = getRungMat(color);
            const matRight = getRungMat(color);

            // Left Rung Half
            const lRung = new THREE.Mesh(rungCylGeo, matLeft);
            const lRungLen = lPos.distanceTo(midPos);
            lRung.scale.set(1, lRungLen, 1);
            lRung.position.copy(lPos).lerp(midPos, 0.5);
            lRung.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), midPos.clone().sub(lPos).normalize());
            dnaGroup.add(lRung);
            
            lRung.userData = { index: i, type: typeStr, half: 'left' };
            rungsForRaycast.push(lRung);
            
            lRungs.push({
                mesh: lRung,
                basePos: lRung.position.clone(),
                unzipPos: lRung.position.clone().add(lNormal.clone().multiplyScalar(2.0)),
                mat: matLeft
            });

            // Right Rung Half
            const rRung = new THREE.Mesh(rungCylGeo, matRight);
            const rRungLen = rPos.distanceTo(midPos);
            rRung.scale.set(1, rRungLen, 1);
            rRung.position.copy(midPos).lerp(rPos, 0.5);
            rRung.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), rPos.clone().sub(midPos).normalize());
            dnaGroup.add(rRung);

            rRung.userData = { index: i, type: typeStr, half: 'right' };
            rungsForRaycast.push(rRung);

            rRungs.push({
                mesh: rRung,
                basePos: rRung.position.clone(),
                unzipPos: rRung.position.clone().add(rNormal.clone().multiplyScalar(2.0)),
                mat: matRight
            });
        }

        // Build Connectors (Backbone)
        for (let i = 0; i < numPairs - 1; i++) {
            const lConn = new THREE.Mesh(backboneCylGeo, matRed);
            dnaGroup.add(lConn);
            lConns.push(lConn);

            const rConn = new THREE.Mesh(backboneCylGeo, matBlue);
            dnaGroup.add(rConn);
            rConns.push(rConn);
        }

        // Helper to update cylinder between two points
        function updateCylinderBetween(cylinder, start, end) {
            const dist = start.distanceTo(end);
            cylinder.scale.set(1, dist, 1);
            cylinder.position.copy(start).lerp(end, 0.5);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), end.clone().sub(start).normalize());
        }

        // Initial connector placement
        for (let i = 0; i < numPairs - 1; i++) {
            updateCylinderBetween(lConns[i], lSpheres[i].basePos, lSpheres[i+1].basePos);
            updateCylinderBetween(rConns[i], rSpheres[i].basePos, rSpheres[i+1].basePos);
        }

        // Helicase Enzyme
        const helicaseGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const helicaseMat = new THREE.MeshPhongMaterial({ 
            color: 0xffff00, 
            emissive: 0x666600,
            shininess: 100
        });
        const helicase = new THREE.Mesh(helicaseGeo, helicaseMat);
        helicase.position.set(0, -3.5 - yStep, 0);
        dnaGroup.add(helicase);

        // --- Logic & Interaction ---
        let unzipQueue = 0;
        let lastUnzipTime = 0;
        let autoUnzipInterval = null;

        function updateUI() {
            const state = window.__3D_STATE__;
            const p = state.unzipProgress;
            
            document.getElementById('unzipBtn').disabled = (p === 20);
            document.getElementById('statusText').innerText = `Zipped: ${20 - p}/20 | Unzipped: ${p}/20`;
            document.getElementById('tempGauge').innerText = `Temperature: ${state.temperature.toFixed(1)}°C`;

            const bar = document.getElementById('progressBar');
            const pct = state.progressPercent;
            bar.style.width = pct + '%';
            
            if (pct < 50) bar.style.backgroundColor = '#4CAF50';
            else if (pct <= 80) bar.style.backgroundColor = '#FFEB3B';
            else bar.style.backgroundColor = '#F44336';

            if (state.selectedBasePair !== null) {
                const idx = state.selectedBasePair;
                const pairState = idx < p ? 'Unzipped' : 'Zipped';
                document.getElementById('basePairInfo').innerText = `Base Pair #${idx + 1}: ${state.selectedPairType} - ${pairState}`;
            }
        }

        function setUnzipProgress(newProgress) {
            if (newProgress > 20) newProgress = 20;
            if (newProgress < 0) newProgress = 0;
            
            const state = window.__3D_STATE__;
            state.unzipProgress = newProgress;
            state.temperature = 25 + newProgress * 3.5;
            state.progressPercent = (newProgress / 20) * 100;

            for(let i=0; i<20; i++) {
                state.basePairStates[i] = (i < newProgress);
            }

            if (state.selectedBasePair !== null) {
                state.selectedPairState = state.selectedBasePair < newProgress ? 'Unzipped' : 'Zipped';
            }

            updateUI();
        }

        // DOM Event Listeners
        document.getElementById('unzipBtn').addEventListener('click', () => {
            const speed = window.__3D_STATE__.speed;
            unzipQueue += speed;
        });

        document.getElementById('rezipBtn').addEventListener('click', () => {
            unzipQueue = 0;
            if (window.__3D_STATE__.autoUnzipActive) {
                window.__3D_STATE__.autoUnzipActive = false;
                clearInterval(autoUnzipInterval);
            }
            setUnzipProgress(0);
        });

        document.getElementById('speedSlider').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            window.__3D_STATE__.speed = val;
            document.getElementById('speedVal').innerText = val;
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                const state = window.__3D_STATE__;
                state.autoUnzipActive = !state.autoUnzipActive;
                
                if (state.autoUnzipActive) {
                    autoUnzipInterval = setInterval(() => {
                        if (window.__3D_STATE__.unzipProgress < 20) {
                            setUnzipProgress(window.__3D_STATE__.unzipProgress + 1);
                        } else {
                            clearInterval(autoUnzipInterval);
                            window.__3D_STATE__.autoUnzipActive = false;
                        }
                    }, 500);
                } else {
                    clearInterval(autoUnzipInterval);
                }
            }
        });

        // Raycasting for clicking base pairs
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedMeshes = [];

        window.addEventListener('click', (event) => {
            if (event.target.closest('#hudPanel')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(rungsForRaycast);

            // Reset previous selection
            selectedMeshes.forEach(m => m.material.emissive.setHex(0x000000));
            selectedMeshes = [];

            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                const data = mesh.userData;
                const index = data.index;

                const lHalf = lRungs[index].mesh;
                const rHalf = rRungs[index].mesh;

                lHalf.material.emissive.setHex(0x555555);
                rHalf.material.emissive.setHex(0x555555);
                selectedMeshes.push(lHalf, rHalf);

                const state = window.__3D_STATE__;
                state.selectedBasePair = index;
                state.selectedPairType = data.type;
                state.selectedPairState = index < state.unzipProgress ? 'Unzipped' : 'Zipped';

                updateUI();
            } else {
                window.__3D_STATE__.selectedBasePair = null;
                document.getElementById('basePairInfo').innerText = 'Click a base pair to inspect';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Process Unzip Queue
            if (unzipQueue > 0 && performance.now() - lastUnzipTime > 150) {
                if (window.__3D_STATE__.unzipProgress < 20) {
                    setUnzipProgress(window.__3D_STATE__.unzipProgress + 1);
                    unzipQueue--;
                    lastUnzipTime = performance.now();
                } else {
                    unzipQueue = 0;
                }
            }

            // Rotate DNA slowly
            dnaGroup.rotation.y += 0.1 * delta;

            // Animate components
            const lerpFactor = 10 * delta; // ~0.3s transition
            let isAnimating = false;
            const p = window.__3D_STATE__.unzipProgress;

            for (let i = 0; i < numPairs; i++) {
                const isUnzipped = i < p;

                // Left Sphere
                const ls = lSpheres[i];
                const targetLSPos = isUnzipped ? ls.unzipPos : ls.basePos;
                ls.mesh.position.lerp(targetLSPos, lerpFactor);
                if (ls.mesh.position.distanceTo(targetLSPos) > 0.01) isAnimating = true;

                // Right Sphere
                const rs = rSpheres[i];
                const targetRSPos = isUnzipped ? rs.unzipPos : rs.basePos;
                rs.mesh.position.lerp(targetRSPos, lerpFactor);

                // Left Rung
                const lr = lRungs[i];
                const targetLRPos = isUnzipped ? lr.unzipPos : lr.basePos;
                lr.mesh.position.lerp(targetLRPos, lerpFactor);
                lr.mat.opacity = THREE.MathUtils.lerp(lr.mat.opacity, isUnzipped ? 0.6 : 1.0, lerpFactor);

                // Right Rung
                const rr = rRungs[i];
                const targetRRPos = isUnzipped ? rr.unzipPos : rr.basePos;
                rr.mesh.position.lerp(targetRRPos, lerpFactor);
                rr.mat.opacity = THREE.MathUtils.lerp(rr.mat.opacity, isUnzipped ? 0.6 : 1.0, lerpFactor);
            }

            // Dynamic Connectors
            for (let i = 0; i < numPairs - 1; i++) {
                updateCylinderBetween(lConns[i], lSpheres[i].mesh.position, lSpheres[i+1].mesh.position);
                updateCylinderBetween(rConns[i], rSpheres[i].mesh.position, rSpheres[i+1].mesh.position);
            }

            // Helicase Animation
            const hIndex = Math.min(p, 19);
            const targetHY = p === 0 ? -3.5 - yStep : -3.5 + hIndex * yStep;
            helicase.position.y = THREE.MathUtils.lerp(helicase.position.y, targetHY, lerpFactor);
            
            // Helicase pulsing glow
            helicaseMat.emissiveIntensity = 0.5 + Math.sin(time * 5) * 0.5;

            window.__3D_STATE__.helicaseY = helicase.position.y;
            window.__3D_STATE__.isAnimating = isAnimating;

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize UI and start loop
        updateUI();
        animate();

    </script>
</body>
</html>
