<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNA Double Helix Unzipping - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #hudPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 10, 46, 0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px;
      width: 320px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    #hudPanel h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    button, input[type="range"] {
      cursor: pointer;
    }

    button {
      background: #1e88e5;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
      opacity: 0.7;
    }

    label {
      font-size: 14px;
    }

    #progressOuter {
      width: 100%;
      height: 16px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: #00c853;
      transition: width 0.2s ease, background 0.2s ease;
    }

    #statusText, #tempGauge, #basePairInfo, #speedValue {
      font-size: 14px;
      margin-bottom: 8px;
    }

    #basePairInfo {
      min-height: 20px;
      color: #d7e8ff;
    }

    .hint {
      font-size: 12px;
      color: #c9d3ff;
      opacity: 0.9;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="hudPanel">
    <h2>DNA Unzipping Explorer</h2>

    <div class="row">
      <button id="unzipBtn">Unzip Next</button>
      <button id="rezipBtn">Rezip All</button>
    </div>

    <div class="row">
      <label for="speedSlider">Unzip Speed</label>
      <input id="speedSlider" type="range" min="1" max="5" step="1" value="1" />
      <span id="speedValue">1</span>
    </div>

    <div id="progressOuter">
      <div id="progressBar"></div>
    </div>

    <div id="statusText">Zipped: 20/20 | Unzipped: 0/20</div>
    <div id="tempGauge">Temperature: 25.0°C</div>
    <div id="basePairInfo">Base Pair: none selected</div>
    <div class="hint">Click a base pair to inspect it. Press <b>Space</b> to toggle auto-unzip.</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const TOTAL_BASE_PAIRS = 20;
    const HELIX_RADIUS = 3;
    const PITCH = 7;
    const DEGREES_STEP = 18;
    const RAD_STEP = THREE.MathUtils.degToRad(DEGREES_STEP);
    const TOTAL_VERTICAL_SPAN = ((TOTAL_BASE_PAIRS - 1) * DEGREES_STEP / 360) * PITCH;
    const START_Y = -TOTAL_VERTICAL_SPAN / 2;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a2e");

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dir1.position.set(5, 10, 7);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.4);
    dir2.position.set(-5, -10, -3);
    scene.add(dir2);

    const root = new THREE.Group();
    scene.add(root);

    const dnaGroup = new THREE.Group();
    root.add(dnaGroup);

    const backbone1Group = new THREE.Group();
    const backbone2Group = new THREE.Group();
    const rungsGroup = new THREE.Group();

    dnaGroup.add(backbone1Group, backbone2Group, rungsGroup);

    const redMatBase = new THREE.MeshStandardMaterial({ color: 0xff4040, emissive: 0x220000 });
    const blueMatBase = new THREE.MeshStandardMaterial({ color: 0x4080ff, emissive: 0x000022 });
    const greenMatBase = new THREE.MeshStandardMaterial({ color: 0x40ff80, emissive: 0x002200, transparent: true, opacity: 1 });
    const yellowMatBase = new THREE.MeshStandardMaterial({ color: 0xffe14d, emissive: 0x332200, transparent: true, opacity: 1 });

    const sphereGeo = new THREE.SphereGeometry(0.25, 18, 18);
    const helicaseGeo = new THREE.SphereGeometry(0.5, 24, 24);

    const helicaseMat = new THREE.MeshStandardMaterial({
      color: 0xffee44,
      emissive: 0xffcc00,
      emissiveIntensity: 1.5
    });
    const helicase = new THREE.Mesh(helicaseGeo, helicaseMat);
    scene.add(helicase);

    const backbone1Nodes = [];
    const backbone2Nodes = [];
    const backbone1Connectors = [];
    const backbone2Connectors = [];
    const basePairs = [];
    const pairClickMeshes = [];

    function pairTypeForIndex(i) {
      if (i <= 4) return "AT";
      if (i <= 9) return "GC";
      if (i <= 14) return "AT";
      return "GC";
    }

    function pairColorMat(type) {
      return type === "AT" ? greenMatBase : yellowMatBase;
    }

    function createCylinderBetweenPoints(p1, p2, radius, material) {
      const dir = new THREE.Vector3().subVectors(p2, p1);
      const len = dir.length();
      const geo = new THREE.CylinderGeometry(radius, radius, len, 10, 1, false);
      const mesh = new THREE.Mesh(geo, material.clone());
      const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      mesh.position.copy(mid);

      const up = new THREE.Vector3(0, 1, 0);
      mesh.quaternion.setFromUnitVectors(up, dir.clone().normalize());
      return mesh;
    }

    function updateCylinderBetweenPoints(mesh, p1, p2, radius) {
      const dir = new THREE.Vector3().subVectors(p2, p1);
      const len = dir.length();
      mesh.position.copy(new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5));
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
      mesh.scale.set(1, len / mesh.geometry.parameters.height, 1);
    }

    function getHelixPoint(index, phaseOffset = 0, spreadX = 0) {
      const angle = index * RAD_STEP + phaseOffset;
      const y = START_Y + (index * DEGREES_STEP / 360) * PITCH;
      const x = Math.cos(angle) * HELIX_RADIUS + spreadX;
      const z = Math.sin(angle) * HELIX_RADIUS;
      return new THREE.Vector3(x, y, z);
    }

    function buildDNA() {
      for (let i = 0; i < TOTAL_BASE_PAIRS; i++) {
        const p1 = getHelixPoint(i, 0, 0);
        const p2 = getHelixPoint(i, Math.PI, 0);

        const s1 = new THREE.Mesh(sphereGeo, redMatBase.clone());
        s1.position.copy(p1);
        backbone1Group.add(s1);
        backbone1Nodes.push({
          mesh: s1,
          basePos: p1.clone(),
          currentSpread: 0,
          targetSpread: 0
        });

        const s2 = new THREE.Mesh(sphereGeo, blueMatBase.clone());
        s2.position.copy(p2);
        backbone2Group.add(s2);
        backbone2Nodes.push({
          mesh: s2,
          basePos: p2.clone(),
          currentSpread: 0,
          targetSpread: 0
        });

        const type = pairTypeForIndex(i);
        const leftEnd = p1.clone();
        const rightEnd = p2.clone();
        const center = new THREE.Vector3().addVectors(leftEnd, rightEnd).multiplyScalar(0.5);

        const leftHalf = createCylinderBetweenPoints(leftEnd, center, 0.06, pairColorMat(type));
        const rightHalf = createCylinderBetweenPoints(center, rightEnd, 0.06, pairColorMat(type));
        leftHalf.userData = { basePairIndex: i, pairType: type, side: "left", clickable: true };
        rightHalf.userData = { basePairIndex: i, pairType: type, side: "right", clickable: true };
        rungsGroup.add(leftHalf, rightHalf);

        pairClickMeshes.push(leftHalf, rightHalf);

        basePairs.push({
          index: i,
          type,
          leftHalf,
          rightHalf,
          leftBaseStart: leftEnd.clone(),
          leftBaseEnd: center.clone(),
          rightBaseStart: center.clone(),
          rightBaseEnd: rightEnd.clone(),
          currentOpen: 0,
          targetOpen: 0,
          selected: false
        });
      }

      for (let i = 0; i < TOTAL_BASE_PAIRS - 1; i++) {
        const c1 = createCylinderBetweenPoints(
          backbone1Nodes[i].basePos,
          backbone1Nodes[i + 1].basePos,
          0.08,
          redMatBase
        );
        backbone1Group.add(c1);
        backbone1Connectors.push({ mesh: c1, i1: i, i2: i + 1 });

        const c2 = createCylinderBetweenPoints(
          backbone2Nodes[i].basePos,
          backbone2Nodes[i + 1].basePos,
          0.08,
          blueMatBase
        );
        backbone2Group.add(c2);
        backbone2Connectors.push({ mesh: c2, i1: i, i2: i + 1 });
      }
    }

    buildDNA();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const unzipBtn = document.getElementById("unzipBtn");
    const rezipBtn = document.getElementById("rezipBtn");
    const speedSlider = document.getElementById("speedSlider");
    const speedValue = document.getElementById("speedValue");
    const basePairInfo = document.getElementById("basePairInfo");
    const tempGauge = document.getElementById("tempGauge");
    const progressBar = document.getElementById("progressBar");
    const statusText = document.getElementById("statusText");

    const state = {
      totalBasePairs: TOTAL_BASE_PAIRS,
      unzipProgress: 0,
      autoUnzipActive: false,
      speed: 1,
      temperature: 25,
      helicaseY: 0,
      selectedBasePair: null,
      selectedPairType: null,
      selectedPairState: null,
      isAnimating: false,
      basePairStates: Array(TOTAL_BASE_PAIRS).fill(false),
      progressPercent: 0
    };

    window.__3D_STATE__ = state;

    function basePairY(index) {
      const clamped = Math.max(0, Math.min(TOTAL_BASE_PAIRS - 1, index));
      return START_Y + (clamped * DEGREES_STEP / 360) * PITCH;
    }

    function updateHelicasePosition() {
      const idx = Math.min(state.unzipProgress, TOTAL_BASE_PAIRS - 1);
      helicase.position.set(0, basePairY(idx), 0);
      state.helicaseY = helicase.position.y;
    }

    function updateHUD() {
      state.temperature = 25 + state.unzipProgress * 3.5;
      state.progressPercent = (state.unzipProgress / TOTAL_BASE_PAIRS) * 100;

      tempGauge.textContent = `Temperature: ${state.temperature.toFixed(1)}°C`;
      statusText.textContent = `Zipped: ${TOTAL_BASE_PAIRS - state.unzipProgress}/20 | Unzipped: ${state.unzipProgress}/20`;
      progressBar.style.width = `${state.progressPercent}%`;

      if (state.progressPercent < 50) {
        progressBar.style.background = "#00c853";
      } else if (state.progressPercent <= 80) {
        progressBar.style.background = "#ffd54f";
      } else {
        progressBar.style.background = "#ef5350";
      }

      unzipBtn.disabled = state.unzipProgress >= TOTAL_BASE_PAIRS;
      speedValue.textContent = String(state.speed);

      if (state.selectedBasePair !== null) {
        basePairInfo.textContent =
          `Base Pair #${state.selectedBasePair}: ${state.selectedPairType} - ${state.selectedPairState}`;
      }
    }

    function refreshSelectionInfo(index) {
      if (index === null || index === undefined) {
        state.selectedBasePair = null;
        state.selectedPairType = null;
        state.selectedPairState = null;
        basePairInfo.textContent = "Base Pair: none selected";
        return;
      }

      const bp = basePairs[index];
      state.selectedBasePair = bp.index;
      state.selectedPairType = bp.type;
      state.selectedPairState = state.basePairStates[index] ? "Unzipped" : "Zipped";
      basePairInfo.textContent =
        `Base Pair #${bp.index}: ${bp.type} - ${state.selectedPairState}`;
    }

    function setSelectedPair(index) {
      basePairs.forEach((bp, i) => {
        bp.selected = i === index;
        [bp.leftHalf, bp.rightHalf].forEach(mesh => {
          if (bp.selected) {
            mesh.material.emissive.setHex(0xffffff);
            mesh.material.emissiveIntensity = 0.5;
          } else {
            mesh.material.emissive.setHex(bp.type === "AT" ? 0x002200 : 0x332200);
            mesh.material.emissiveIntensity = 1.0;
          }
        });
      });
      refreshSelectionInfo(index);
    }

    function setPairTarget(index, unzipped) {
      if (index < 0 || index >= TOTAL_BASE_PAIRS) return;
      basePairs[index].targetOpen = unzipped ? 1 : 0;
      state.basePairStates[index] = unzipped;

      backbone1Nodes[index].targetSpread = unzipped ? -1.5 : 0;
      backbone2Nodes[index].targetSpread = unzipped ? 1.5 : 0;
    }

    async function animateUnzipBatch(count) {
      if (state.isAnimating || state.unzipProgress >= TOTAL_BASE_PAIRS) return;
      state.isAnimating = true;

      const actual = Math.min(count, TOTAL_BASE_PAIRS - state.unzipProgress);
      for (let n = 0; n < actual; n++) {
        const idx = state.unzipProgress;
        setPairTarget(idx, true);
        state.unzipProgress++;
        updateHelicasePosition();
        updateHUD();
        refreshSelectionInfo(state.selectedBasePair);

        await delay(150);
      }

      await delay(320);
      state.isAnimating = false;
      updateHUD();
    }

    async function animateRezipAll() {
      if (state.isAnimating) return;
      state.isAnimating = true;
      state.autoUnzipActive = false;

      for (let i = 0; i < TOTAL_BASE_PAIRS; i++) {
        setPairTarget(i, false);
      }

      state.unzipProgress = 0;
      updateHelicasePosition();
      updateHUD();
      refreshSelectionInfo(state.selectedBasePair);

      await delay(400);
      state.isAnimating = false;
      updateHUD();
    }

    function delay(ms) {
      return new Promise(res => setTimeout(res, ms));
    }

    unzipBtn.addEventListener("click", async () => {
      if (state.isAnimating) return;
      await animateUnzipBatch(state.speed);
    });

    rezipBtn.addEventListener("click", async () => {
      await animateRezipAll();
    });

    speedSlider.addEventListener("input", () => {
      state.speed = parseInt(speedSlider.value, 10);
      updateHUD();
    });

    window.addEventListener("keydown", async (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        state.autoUnzipActive = !state.autoUnzipActive;
      }
    });

    renderer.domElement.addEventListener("pointerdown", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(pairClickMeshes, false);

      if (hits.length > 0) {
        const hit = hits[0].object;
        const index = hit.userData.basePairIndex;
        setSelectedPair(index);
        updateHUD();
      }
    });

    function updateDNAVisuals(delta) {
      const alpha = 1 - Math.exp(-delta * 10);

      for (let i = 0; i < TOTAL_BASE_PAIRS; i++) {
        const bp = basePairs[i];
        bp.currentOpen = THREE.MathUtils.lerp(bp.currentOpen, bp.targetOpen, alpha);

        backbone1Nodes[i].currentSpread = THREE.MathUtils.lerp(
          backbone1Nodes[i].currentSpread,
          backbone1Nodes[i].targetSpread,
          alpha
        );

        backbone2Nodes[i].currentSpread = THREE.MathUtils.lerp(
          backbone2Nodes[i].currentSpread,
          backbone2Nodes[i].targetSpread,
          alpha
        );

        const leftNodePos = bp.leftBaseStart.clone().add(new THREE.Vector3(backbone1Nodes[i].currentSpread, 0, 0));
        const rightNodePos = bp.rightBaseEnd.clone().add(new THREE.Vector3(backbone2Nodes[i].currentSpread, 0, 0));

        backbone1Nodes[i].mesh.position.copy(leftNodePos);
        backbone2Nodes[i].mesh.position.copy(rightNodePos);

        const center = new THREE.Vector3().addVectors(leftNodePos, rightNodePos).multiplyScalar(0.5);

        const leftOpenOffset = new THREE.Vector3(-2 * bp.currentOpen, 0, 0);
        const rightOpenOffset = new THREE.Vector3(2 * bp.currentOpen, 0, 0);

        const leftHalfStart = leftNodePos;
        const leftHalfEnd = center.clone().add(leftOpenOffset);

        const rightHalfStart = center.clone().add(rightOpenOffset);
        const rightHalfEnd = rightNodePos;

        updateCylinderBetweenPoints(bp.leftHalf, leftHalfStart, leftHalfEnd, 0.06);
        updateCylinderBetweenPoints(bp.rightHalf, rightHalfStart, rightHalfEnd, 0.06);

        const targetOpacity = 1 - 0.4 * bp.currentOpen;
        bp.leftHalf.material.opacity = targetOpacity;
        bp.rightHalf.material.opacity = targetOpacity;
      }

      for (const conn of backbone1Connectors) {
        const p1 = backbone1Nodes[conn.i1].mesh.position;
        const p2 = backbone1Nodes[conn.i2].mesh.position;
        updateCylinderBetweenPoints(conn.mesh, p1, p2, 0.08);
      }

      for (const conn of backbone2Connectors) {
        const p1 = backbone2Nodes[conn.i1].mesh.position;
        const p2 = backbone2Nodes[conn.i2].mesh.position;
        updateCylinderBetweenPoints(conn.mesh, p1, p2, 0.08);
      }
    }

    let autoTimer = 0;
    const clock = new THREE.Clock();

    updateHelicasePosition();
    updateHUD();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      controls.update();

      if (!controls.dragging && !state.isAnimating) {
        dnaGroup.rotation.y += 0.1 * delta;
      }

      autoTimer += delta;
      if (state.autoUnzipActive && !state.isAnimating && state.unzipProgress < TOTAL_BASE_PAIRS && autoTimer >= 0.5) {
        autoTimer = 0;
        animateUnzipBatch(1);
      }
      if (state.unzipProgress >= TOTAL_BASE_PAIRS) {
        state.autoUnzipActive = false;
      }

      updateDNAVisuals(delta);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
