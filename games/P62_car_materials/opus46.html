<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car PBR Material Showcase</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #ui {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(15, 15, 20, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    width: 280px;
    color: #e0e0e0;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #ui h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 18px;
    color: #fff;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 12px;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 10px;
    margin-top: 16px;
  }

  #paintColor {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }

  .color-btn {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    outline: none;
    position: relative;
  }

  .color-btn:hover {
    transform: scale(1.15);
  }

  .color-btn.active {
    border-color: #fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
  }

  .slider-group {
    margin-bottom: 14px;
  }

  .slider-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    margin-bottom: 6px;
    color: #ccc;
  }

  .slider-group label span {
    color: #fff;
    font-weight: 600;
    font-size: 12px;
    background: rgba(255,255,255,0.1);
    padding: 2px 8px;
    border-radius: 4px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    border: none;
  }

  #title {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #fff;
    z-index: 100;
  }

  #title h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  #title p {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="title">
  <h1>CAR CONFIGURATOR</h1>
  <p>PBR Material Showcase — Procedural Model</p>
</div>

<div id="ui">
  <h2>Paint & Material</h2>

  <div class="section-label">Paint Color</div>
  <div id="paintColor">
    <button class="color-btn active" data-color="#cc0000" style="background:#cc0000" title="Racing Red"></button>
    <button class="color-btn" data-color="#003366" style="background:#003366" title="Deep Blue"></button>
    <button class="color-btn" data-color="#ffffff" style="background:#ffffff" title="Pearl White"></button>
    <button class="color-btn" data-color="#1a1a1a" style="background:#1a1a1a; border: 1px solid #444;" title="Obsidian Black"></button>
    <button class="color-btn" data-color="#8b7355" style="background:#8b7355" title="Champagne Gold"></button>
    <button class="color-btn" data-color="#2e8b57" style="background:#2e8b57" title="British Green"></button>
    <button class="color-btn" data-color="#708090" style="background:#708090" title="Cement Grey"></button>
    <button class="color-btn" data-color="#800020" style="background:#800020" title="Burgundy Red"></button>
  </div>

  <div class="section-label" style="margin-top:20px;">Material Properties</div>

  <div class="slider-group">
    <label>Clearcoat <span id="clearcoatVal">1.00</span></label>
    <input type="range" id="clearcoat" min="0" max="1" step="0.01" value="1.0">
  </div>

  <div class="slider-group">
    <label>Metalness <span id="metalnessVal">0.90</span></label>
    <input type="range" id="metalness" min="0" max="1" step="0.01" value="0.9">
  </div>

  <div class="slider-group">
    <label>Roughness <span id="roughnessVal">0.10</span></label>
    <input type="range" id="roughness" min="0" max="1" step="0.01" value="0.1">
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x111115, 0.015);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6, 3, 6);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.8, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 1.0;
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 4;
controls.maxDistance = 15;
controls.update();

// ============ ENVIRONMENT MAP ============
function createEnvironmentTexture() {
  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  pmremGenerator.compileEquirectangularShader();

  const envScene = new THREE.Scene();

  // Create gradient sky dome
  const skyGeo = new THREE.SphereGeometry(50, 32, 32);
  const skyColors = [];
  const posAttr = skyGeo.getAttribute('position');
  for (let i = 0; i < posAttr.count; i++) {
    const y = posAttr.getY(i);
    const t = (y / 50 + 1) * 0.5;
    const r = THREE.MathUtils.lerp(0.05, 0.6, t);
    const g = THREE.MathUtils.lerp(0.05, 0.65, t);
    const b = THREE.MathUtils.lerp(0.1, 0.9, t);
    skyColors.push(r, g, b);
  }
  skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(skyColors, 3));
  const skyMat = new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.BackSide });
  envScene.add(new THREE.Mesh(skyGeo, skyMat));

  // Add some bright panels to simulate studio lights
  const panelGeo = new THREE.PlaneGeometry(20, 8);
  const panelMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });

  const panel1 = new THREE.Mesh(panelGeo, panelMat);
  panel1.position.set(0, 15, -20);
  panel1.lookAt(0, 0, 0);
  envScene.add(panel1);

  const panel2 = new THREE.Mesh(panelGeo, panelMat);
  panel2.position.set(15, 10, 10);
  panel2.lookAt(0, 0, 0);
  envScene.add(panel2);

  const panel3 = new THREE.Mesh(panelGeo, panelMat);
  panel3.position.set(-15, 10, 10);
  panel3.lookAt(0, 0, 0);
  envScene.add(panel3);

  // Ground reflection panel
  const groundPanel = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.MeshBasicMaterial({ color: 0x333338, side: THREE.DoubleSide })
  );
  groundPanel.rotation.x = -Math.PI / 2;
  groundPanel.position.y = -2;
  envScene.add(groundPanel);

  const envMap = pmremGenerator.fromScene(envScene, 0.04).texture;
  pmremGenerator.dispose();
  return envMap;
}

const envMap = createEnvironmentTexture();
scene.environment = envMap;
scene.background = new THREE.Color(0x111115);

// ============ LIGHTS ============
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = false;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
scene.add(hemiLight);

// Subtle fill light
const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
fillLight.position.set(-5, 5, -5);
scene.add(fillLight);

// ============ GROUND ============
const groundGeo = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshPhysicalMaterial({
  color: 0x555555,
  metalness: 0.0,
  roughness: 0.8,
  clearcoat: 0.3,
  envMap: envMap
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

// ============ CAR MATERIALS ============
let currentPaintColor = '#cc0000';

const bodyMaterial = new THREE.MeshPhysicalMaterial({
  color: new THREE.Color(currentPaintColor),
  metalness: 0.9,
  roughness: 0.1,
  clearcoat: 1.0,
  clearcoatRoughness: 0.03,
  envMap: envMap,
  envMapIntensity: 1.0
});

const glassMaterial = new THREE.MeshPhysicalMaterial({
  color: 0x88aacc,
  metalness: 0.0,
  roughness: 0.05,
  transmission: 0.8,
  ior: 1.5,
  transparent: true,
  opacity: 0.6,
  envMap: envMap
});

const wheelMaterial = new THREE.MeshStandardMaterial({
  color: 0x333333,
  metalness: 0.0,
  roughness: 0.9
});

const chromeMaterial = new THREE.MeshStandardMaterial({
  color: 0xcccccc,
  metalness: 1.0,
  roughness: 0.05,
  envMap: envMap
});

const bumperMaterial = new THREE.MeshStandardMaterial({
  color: 0x222222,
  metalness: 0.3,
  roughness: 0.6
});

const headlightMaterial = new THREE.MeshPhysicalMaterial({
  color: 0xffffee,
  emissive: 0xffffcc,
  emissiveIntensity: 0.5,
  metalness: 0.0,
  roughness: 0.1,
  transmission: 0.5,
  transparent: true
});

const taillightMaterial = new THREE.MeshPhysicalMaterial({
  color: 0xff2222,
  emissive: 0xff0000,
  emissiveIntensity: 0.4,
  metalness: 0.0,
  roughness: 0.2,
  transparent: true,
  opacity: 0.9
});

const hubMaterial = new THREE.MeshStandardMaterial({
  color: 0x999999,
  metalness: 0.8,
  roughness: 0.2,
  envMap: envMap
});

// ============ CAR GROUP ============
const carGroup = new THREE.Group();
const bodyParts = [];

// (1) Body base
const bodyBaseGeo = new THREE.BoxGeometry(4, 0.8, 2);
// Slightly round the bottom edges by adjusting vertices
const bodyBase = new THREE.Mesh(bodyBaseGeo, bodyMaterial);
bodyBase.position.set(0, 0.6, 0);
carGroup.add(bodyBase);
bodyParts.push(bodyBase);

// (2) Body top (cabin)
const bodyTopGeo = new THREE.BoxGeometry(2.5, 0.7, 1.8);
// Taper the top slightly
const topPositions = bodyTopGeo.getAttribute('position');
for (let i = 0; i < topPositions.count; i++) {
  const y = topPositions.getY(i);
  const x = topPositions.getX(i);
  if (y > 0) {
    // Taper inward at top
    topPositions.setX(i, x * 0.88);
    topPositions.setZ(i, topPositions.getZ(i) * 0.92);
  }
}
topPositions.needsUpdate = true;
bodyTopGeo.computeVertexNormals();
const bodyTop = new THREE.Mesh(bodyTopGeo, bodyMaterial);
bodyTop.position.set(-0.3, 1.35, 0);
carGroup.add(bodyTop);
bodyParts.push(bodyTop);

// (3) Hood
const hoodGeo = new THREE.BoxGeometry(1.2, 0.15, 1.8);
const hoodPositions = hoodGeo.getAttribute('position');
for (let i = 0; i < hoodPositions.count; i++) {
  const x = hoodPositions.getX(i);
  const y = hoodPositions.getY(i);
  // Tilt front down slightly
  if (x > 0) {
    hoodPositions.setY(i, y - 0.06);
  }
}
hoodPositions.needsUpdate = true;
hoodGeo.computeVertexNormals();
const hood = new THREE.Mesh(hoodGeo, bodyMaterial);
hood.position.set(1.2, 1.0, 0);
carGroup.add(hood);
bodyParts.push(hood);

// (4) Trunk
const trunkGeo = new THREE.BoxGeometry(0.8, 0.15, 1.8);
const trunkPositions = trunkGeo.getAttribute('position');
for (let i = 0; i < trunkPositions.count; i++) {
  const x = trunkPositions.getX(i);
  const y = trunkPositions.getY(i);
  if (x < 0) {
    trunkPositions.setY(i, y - 0.04);
  }
}
trunkPositions.needsUpdate = true;
trunkGeo.computeVertexNormals();
const trunk = new THREE.Mesh(trunkGeo, bodyMaterial);
trunk.position.set(-1.8, 1.0, 0);
carGroup.add(trunk);
bodyParts.push(trunk);

// (5) Front windshield
const windshieldGeo = new THREE.PlaneGeometry(1.8, 0.8);
const windshield = new THREE.Mesh(windshieldGeo, glassMaterial);
windshield.position.set(0.72, 1.35, 0);
windshield.rotation.y = 0;
windshield.rotation.z = 0;
windshield.rotation.x = 0;
// Tilt back ~30 degrees
windshield.rotation.set(0, 0, 0);
windshield.position.set(0.72, 1.38, 0);
windshield.rotation.y = Math.PI / 2;
windshield.rotation.z = -Math.PI / 6; // 30 degree tilt
carGroup.add(windshield);
bodyParts.push(windshield);

// (6) Rear windshield
const rearWindshieldGeo = new THREE.PlaneGeometry(1.8, 0.7);
const rearWindshield = new THREE.Mesh(rearWindshieldGeo, glassMaterial);
rearWindshield.position.set(-1.32, 1.32, 0);
rearWindshield.rotation.y = -Math.PI / 2;
rearWindshield.rotation.z = Math.PI / 5; // Slight tilt
carGroup.add(rearWindshield);
bodyParts.push(rearWindshield);

// Side windows
const sideWindowGeo = new THREE.PlaneGeometry(2.0, 0.5);
const sideWindowL = new THREE.Mesh(sideWindowGeo, glassMaterial);
sideWindowL.position.set(-0.3, 1.4, 0.91);
carGroup.add(sideWindowL);
bodyParts.push(sideWindowL);

const sideWindowR = new THREE.Mesh(sideWindowGeo, glassMaterial);
sideWindowR.position.set(-0.3, 1.4, -0.91);
sideWindowR.rotation.y = Math.PI;
carGroup.add(sideWindowR);
bodyParts.push(sideWindowR);

// (7) Wheels
const wheels = [];
const wheelPositions = [
  [1.2, 0.35, 1.1],
  [1.2, 0.35, -1.1],
  [-1.2, 0.35, 1.1],
  [-1.2, 0.35, -1.1]
];

wheelPositions.forEach(([wx, wy, wz]) => {
  const wheelGroup = new THREE.Group();

  // Tire
  const tireGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.2, 24);
  const tire = new THREE.Mesh(tireGeo, wheelMaterial);
  tire.rotation.x = Math.PI / 2;
  wheelGroup.add(tire);

  // Hub
  const hubGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.22, 16);
  const hub = new THREE.Mesh(hubGeo, hubMaterial);
  hub.rotation.x = Math.PI / 2;
  wheelGroup.add(hub);

  // Spokes
  for (let s = 0; s < 5; s++) {
    const spokeGeo = new THREE.BoxGeometry(0.03, 0.18, 0.22);
    const spoke = new THREE.Mesh(spokeGeo, hubMaterial);
    const angle = (s / 5) * Math.PI * 2;
    spoke.position.set(Math.cos(angle) * 0.12, Math.sin(angle) * 0.12, 0);
    spoke.rotation.z = angle;
    wheelGroup.add(spoke);
  }

  // Brake disc (inner)
  const discGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.04, 20);
  const discMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.7, roughness: 0.3 });
  const disc = new THREE.Mesh(discGeo, discMat);
  disc.rotation.x = Math.PI / 2;
  wheelGroup.add(disc);

  wheelGroup.position.set(wx, wy, wz);
  carGroup.add(wheelGroup);
  wheels.push(wheelGroup);
});

// (8) Chrome trim strips
const trimGeo = new THREE.BoxGeometry(3.6, 0.04, 0.04);
const trimLeft = new THREE.Mesh(trimGeo, chromeMaterial);
trimLeft.position.set(0, 0.85, 1.02);
carGroup.add(trimLeft);
bodyParts.push(trimLeft);

const trimRight = new THREE.Mesh(trimGeo, chromeMaterial);
trimRight.position.set(0, 0.85, -1.02);
carGroup.add(trimRight);
bodyParts.push(trimRight);

// Window chrome trim
const windowTrimGeo = new THREE.BoxGeometry(2.2, 0.03, 0.03);
const windowTrimL = new THREE.Mesh(windowTrimGeo, chromeMaterial);
windowTrimL.position.set(-0.3, 1.15, 0.92);
carGroup.add(windowTrimL);
bodyParts.push(windowTrimL);

const windowTrimR = new THREE.Mesh(windowTrimGeo, chromeMaterial);
windowTrimR.position.set(-0.3, 1.15, -0.92);
carGroup.add(windowTrimR);
bodyParts.push(windowTrimR);

// (9) Front bumper
const frontBumperGeo = new THREE.BoxGeometry(0.2, 0.35, 2.1);
const frontBumperPositions = frontBumperGeo.getAttribute('position');
for (let i = 0; i < frontBumperPositions.count; i++) {
  const y = frontBumperPositions.getY(i);
  if (y < 0) {
    frontBumperPositions.setX(i, frontBumperPositions.getX(i) * 0.7);
  }
}
frontBumperPositions.needsUpdate = true;
frontBumperGeo.computeVertexNormals();
const frontBumper = new THREE.Mesh(frontBumperGeo, bumperMaterial);
frontBumper.position.set(2.05, 0.4, 0);
carGroup.add(frontBumper);
bodyParts.push(frontBumper);

// Rear bumper
const rearBumperGeo = new THREE.BoxGeometry(0.2, 0.35, 2.1);
const rearBumper = new THREE.Mesh(rearBumperGeo, bumperMaterial);
rearBumper.position.set(-2.15, 0.4, 0);
carGroup.add(rearBumper);
bodyParts.push(rearBumper);

// Front grille
const grilleGeo = new THREE.BoxGeometry(0.05, 0.25, 1.2);
const grille = new THREE.Mesh(grilleGeo, chromeMaterial);
grille.position.set(2.0, 0.55, 0);
carGroup.add(grille);
bodyParts.push(grille);

// Grille slats
for (let i = 0; i < 4; i++) {
  const slatGeo = new THREE.BoxGeometry(0.04, 0.02, 1.1);
  const slat = new THREE.Mesh(slatGeo, chromeMaterial);
  slat.position.set(2.01, 0.45 + i * 0.07, 0);
  carGroup.add(slat);
}

// Headlights
const headlightGeo = new THREE.SphereGeometry(0.12, 12, 12);
const headlightL = new THREE.Mesh(headlightGeo, headlightMaterial);
headlightL.position.set(2.0, 0.65, 0.7);
headlightL.scale.set(0.5, 1, 1);
carGroup.add(headlightL);
bodyParts.push(headlightL);

const headlightR = new THREE.Mesh(headlightGeo, headlightMaterial);
headlightR.position.set(2.0, 0.65, -0.7);
headlightR.scale.set(0.5, 1, 1);
carGroup.add(headlightR);
bodyParts.push(headlightR);

// Taillights
const taillightGeo = new THREE.BoxGeometry(0.05, 0.12, 0.3);
const taillightL = new THREE.Mesh(taillightGeo, taillightMaterial);
taillightL.position.set(-2.15, 0.65, 0.7);
carGroup.add(taillightL);
bodyParts.push(taillightL);

const taillightR = new THREE.Mesh(taillightGeo, taillightMaterial);
taillightR.position.set(-2.15, 0.65, -0.7);
carGroup.add(taillightR);
bodyParts.push(taillightR);

// Side mirrors
const mirrorArmGeo = new THREE.BoxGeometry(0.15, 0.04, 0.04);
const mirrorHeadGeo = new THREE.BoxGeometry(0.08, 0.08, 0.12);

const mirrorLArm = new THREE.Mesh(mirrorArmGeo, bodyMaterial);
mirrorLArm.position.set(0.6, 1.15, 1.05);
carGroup.add(mirrorLArm);
bodyParts.push(mirrorLArm);

const mirrorLHead = new THREE.Mesh(mirrorHeadGeo, bodyMaterial);
mirrorLHead.position.set(0.65, 1.15, 1.14);
carGroup.add(mirrorLHead);
bodyParts.push(mirrorLHead);

const mirrorRArm = new THREE.Mesh(mirrorArmGeo, bodyMaterial);
mirrorRArm.position.set(0.6, 1.15, -1.05);
carGroup.add(mirrorRArm);
bodyParts.push(mirrorRArm);

const mirrorRHead = new THREE.Mesh(mirrorHeadGeo, bodyMaterial);
mirrorRHead.position.set(0.65, 1.15, -1.14);
carGroup.add(mirrorRHead);
bodyParts.push(mirrorRHead);

// Door lines (subtle indentations)
const doorLineGeo = new THREE.BoxGeometry(0.01, 0.5, 0.02);
const doorLineMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5, roughness: 0.5 });

[-0.3, 0.5].forEach(xPos => {
  const dlL = new THREE.Mesh(doorLineGeo, doorLineMat);
  dlL.position.set(xPos, 0.75, 1.01);
  carGroup.add(dlL);

  const dlR = new THREE.Mesh(doorLineGeo, doorLineMat);
  dlR.position.set(xPos, 0.75, -1.01);
  carGroup.add(dlR);
});

// Roof rail accents
const roofRailGeo = new THREE.BoxGeometry(2.0, 0.02, 0.03);
const roofRailL = new THREE.Mesh(roofRailGeo, chromeMaterial);
roofRailL.position.set(-0.3, 1.7, 0.82);
carGroup.add(roofRailL);

const roofRailR = new THREE.Mesh(roofRailGeo, chromeMaterial);
roofRailR.position.set(-0.3, 1.7, -0.82);
carGroup.add(roofRailR);

// Exhaust pipes
const exhaustGeo = new THREE.CylinderGeometry(0.04, 0.05, 0.15, 12);
const exhaustMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.15 });

const exhaustL = new THREE.Mesh(exhaustGeo, exhaustMat);
exhaustL.rotation.x = Math.PI / 2;
exhaustL.position.set(-2.2, 0.25, 0.4);
carGroup.add(exhaustL);

const exhaustR = new THREE.Mesh(exhaustGeo, exhaustMat);
exhaustR.rotation.x = Math.PI / 2;
exhaustR.position.set(-2.2, 0.25, -0.4);
carGroup.add(exhaustR);

// Underbody
const underGeo = new THREE.BoxGeometry(3.8, 0.05, 1.9);
const underMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
const underbody = new THREE.Mesh(underGeo, underMat);
underbody.position.set(0, 0.2, 0);
carGroup.add(underbody);

scene.add(carGroup);

// ============ UI CONTROLS ============
const colorButtons = document.querySelectorAll('.color-btn');
const clearcoatSlider = document.getElementById('clearcoat');
const metalnessSlider = document.getElementById('metalness');
const roughnessSlider = document.getElementById('roughness');
const clearcoatVal = document.getElementById('clearcoatVal');
const metalnessVal = document.getElementById('metalnessVal');
const roughnessVal = document.getElementById('roughnessVal');

colorButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    colorButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPaintColor = btn.dataset.color;
    bodyMaterial.color.set(currentPaintColor);
    updateState();
  });
});

clearcoatSlider.addEventListener('input', () => {
  bodyMaterial.clearcoat = parseFloat(clearcoatSlider.value);
  clearcoatVal.textContent = parseFloat(clearcoatSlider.value).toFixed(2);
  updateState();
});

metalnessSlider.addEventListener('input', () => {
  bodyMaterial.metalness = parseFloat(metalnessSlider.value);
  metalnessVal.textContent = parseFloat(metalnessSlider.value).toFixed(2);
  updateState();
});

roughnessSlider.addEventListener('input', () => {
  bodyMaterial.roughness = parseFloat(roughnessSlider.value);
  roughnessVal.textContent = parseFloat(roughnessSlider.value).toFixed(2);
  updateState();
});

// ============ STATE ============
function updateState() {
  window.__3D_STATE__ = {
    paintColor: currentPaintColor,
    clearcoat: parseFloat(clearcoatSlider.value),
    metalness: parseFloat(metalnessSlider.value),
    roughness: parseFloat(roughnessSlider.value),
    wheelCount: wheels.length,
    bodyPartCount: bodyParts.length
  };
}
updateState();

// ============ ANIMATION ============
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Slowly rotate wheels
  const time = performance.now() * 0.001;
  wheels.forEach(w => {
    w.children[0].rotation.y += 0.02;
    w.children.forEach(child => {
      if (child !== w.children[0]) {
        // Keep hub and spokes rotating with tire
      }
    });
  });

  renderer.render(scene, camera);
  updateState();
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
