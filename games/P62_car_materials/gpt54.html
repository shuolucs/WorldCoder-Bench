<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 程序化 PBR 汽车展示</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 320px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(20, 20, 24, 0.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.08);
    }

    #ui h2 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      color: #cfcfcf;
      margin-bottom: 8px;
      letter-spacing: 0.4px;
    }

    #paintColor {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .color-btn {
      width: 100%;
      height: 34px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      box-sizing: border-box;
    }

    .color-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.55);
    }

    .color-btn.active {
      border-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.25);
    }

    .control {
      margin-bottom: 10px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 13px;
      color: #e6e6e6;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .hint {
      font-size: 12px;
      color: #a8a8a8;
      line-height: 1.5;
      margin-top: 8px;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>汽车 PBR 材质展示</h2>

      <div class="section">
        <div class="section-title">漆面颜色</div>
        <div id="paintColor"></div>
      </div>

      <div class="section">
        <div class="section-title">材质参数</div>

        <div class="control">
          <label for="clearcoat">
            <span>Clearcoat</span>
            <span id="clearcoatValue">1.00</span>
          </label>
          <input id="clearcoat" type="range" min="0" max="1" step="0.01" value="1.0" />
        </div>

        <div class="control">
          <label for="metalness">
            <span>Metalness</span>
            <span id="metalnessValue">0.90</span>
          </label>
          <input id="metalness" type="range" min="0" max="1" step="0.01" value="0.9" />
        </div>

        <div class="control">
          <label for="roughness">
            <span>Roughness</span>
            <span id="roughnessValue">0.10</span>
          </label>
          <input id="roughness" type="range" min="0" max="1" step="0.01" value="0.1" />
        </div>

        <div class="hint">
          鼠标拖拽旋转，滚轮缩放。场景自动缓慢旋转展示。
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101216);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(6, 3, 6);
    camera.lookAt(0, 1, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.8;
    controls.minDistance = 4;
    controls.maxDistance = 16;
    controls.maxPolarAngle = Math.PI * 0.48;

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -12;
    dirLight.shadow.camera.right = 12;
    dirLight.shadow.camera.top = 12;
    dirLight.shadow.camera.bottom = -12;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 30;
    scene.add(dirLight);

    function createGradientEnvironment() {
      const width = 256;
      const height = 128;
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, '#f5f7fb');
      gradient.addColorStop(0.3, '#b8c7d9');
      gradient.addColorStop(0.65, '#556070');
      gradient.addColorStop(1, '#1a1d24');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      for (let i = 0; i < 1200; i++) {
        const x = Math.random() * width;
        const y = Math.random() * height;
        const a = Math.random() * 0.06;
        const r = Math.random() * 2 + 0.5;
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.mapping = THREE.EquirectangularReflectionMapping;
      texture.colorSpace = THREE.SRGBColorSpace;

      const pmrem = new THREE.PMREMGenerator(renderer);
      pmrem.compileEquirectangularShader();
      const envRT = pmrem.fromEquirectangular(texture);

      texture.dispose();
      pmrem.dispose();

      return envRT.texture;
    }

    const envMap = createGradientEnvironment();
    scene.environment = envMap;

    const groundMat = new THREE.MeshPhysicalMaterial({
      color: '#555555',
      metalness: 0.0,
      roughness: 0.8,
      clearcoat: 0.3,
      envMapIntensity: 1.0
    });

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      groundMat
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const carGroup = new THREE.Group();
    scene.add(carGroup);

    const paintMaterial = new THREE.MeshPhysicalMaterial({
      color: '#cc0000',
      metalness: 0.9,
      roughness: 0.1,
      clearcoat: 1.0,
      clearcoatRoughness: 0.05,
      envMapIntensity: 1.5
    });

    const glassMaterial = new THREE.MeshPhysicalMaterial({
      color: new THREE.Color('#dfe8f4'),
      metalness: 0.0,
      roughness: 0.05,
      transmission: 0.8,
      transparent: true,
      opacity: 0.95,
      ior: 1.5,
      thickness: 0.08,
      envMapIntensity: 1.3
    });

    const wheelMaterial = new THREE.MeshStandardMaterial({
      color: '#333333',
      roughness: 0.9,
      metalness: 0.0
    });

    const chromeMaterial = new THREE.MeshStandardMaterial({
      color: '#cccccc',
      metalness: 1.0,
      roughness: 0.05,
      envMapIntensity: 1.6
    });

    const bumperMaterial = new THREE.MeshStandardMaterial({
      color: '#222222',
      metalness: 0.15,
      roughness: 0.55
    });

    const paintMeshes = [];
    const bodyParts = [];
    const wheelMeshes = [];

    function createShearedBoxGeometry(width, height, depth, shearXByY = 0) {
      const geometry = new THREE.BoxGeometry(width, height, depth);
      const pos = geometry.attributes.position;
      const v = new THREE.Vector3();

      for (let i = 0; i < pos.count; i++) {
        v.fromBufferAttribute(pos, i);
        v.x += v.y * shearXByY;
        pos.setXYZ(i, v.x, v.y, v.z);
      }

      pos.needsUpdate = true;
      geometry.computeVertexNormals();
      return geometry;
    }

    function addPaintMesh(geometry, position, rotation = null) {
      const mesh = new THREE.Mesh(geometry, paintMaterial);
      mesh.position.copy(position);
      if (rotation) {
        mesh.rotation.set(rotation.x, rotation.y, rotation.z);
      }
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      carGroup.add(mesh);
      paintMeshes.push(mesh);
      bodyParts.push(mesh);
      return mesh;
    }

    addPaintMesh(
      new THREE.BoxGeometry(4, 0.8, 2),
      new THREE.Vector3(0, 0.6, 0)
    );

    addPaintMesh(
      new THREE.BoxGeometry(2.5, 0.7, 1.8),
      new THREE.Vector3(-0.3, 1.35, 0)
    );

    addPaintMesh(
      createShearedBoxGeometry(1.2, 0.15, 1.8, -0.35),
      new THREE.Vector3(1.2, 1.0, 0)
    );

    addPaintMesh(
      new THREE.BoxGeometry(0.8, 0.15, 1.8),
      new THREE.Vector3(-1.8, 1.0, 0)
    );

    const windshield = new THREE.Mesh(
      new THREE.PlaneGeometry(1.8, 0.8),
      glassMaterial
    );
    windshield.position.set(0.45, 1.35, 0);
    windshield.rotation.set(0, Math.PI / 2, THREE.MathUtils.degToRad(-60));
    windshield.castShadow = false;
    windshield.receiveShadow = false;
    carGroup.add(windshield);
    bodyParts.push(windshield);

    const rearWindshield = new THREE.Mesh(
      new THREE.PlaneGeometry(1.8, 0.8),
      glassMaterial
    );
    rearWindshield.position.set(-1.05, 1.35, 0);
    rearWindshield.rotation.set(0, -Math.PI / 2, THREE.MathUtils.degToRad(-60));
    rearWindshield.castShadow = false;
    rearWindshield.receiveShadow = false;
    carGroup.add(rearWindshield);
    bodyParts.push(rearWindshield);

    const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.2, 32);
    const wheelPositions = [
      [1.2, 0.35, 1.1],
      [1.2, 0.35, -1.1],
      [-1.2, 0.35, 1.1],
      [-1.2, 0.35, -1.1]
    ];

    wheelPositions.forEach(([x, y, z]) => {
      const wheel = new THREE.Mesh(wheelGeo, wheelMaterial);
      wheel.rotation.z = Math.PI / 2;
      wheel.position.set(x, y, z);
      wheel.castShadow = true;
      wheel.receiveShadow = true;
      carGroup.add(wheel);
      wheelMeshes.push(wheel);

      const hub = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12, 0.12, 0.22, 24),
        chromeMaterial
      );
      hub.rotation.z = Math.PI / 2;
      hub.position.set(x, y, z);
      hub.castShadow = true;
      hub.receiveShadow = true;
      carGroup.add(hub);
    });

    const trimLeft = new THREE.Mesh(
      new THREE.BoxGeometry(3.7, 0.05, 0.05),
      chromeMaterial
    );
    trimLeft.position.set(0, 0.9, 1.03);
    trimLeft.castShadow = true;
    trimLeft.receiveShadow = true;
    carGroup.add(trimLeft);
    bodyParts.push(trimLeft);

    const trimRight = new THREE.Mesh(
      new THREE.BoxGeometry(3.7, 0.05, 0.05),
      chromeMaterial
    );
    trimRight.position.set(0, 0.9, -1.03);
    trimRight.castShadow = true;
    trimRight.receiveShadow = true;
    carGroup.add(trimRight);
    bodyParts.push(trimRight);

    const frontBumper = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, 0.25, 2.08),
      bumperMaterial
    );
    frontBumper.position.set(2.08, 0.45, 0);
    frontBumper.castShadow = true;
    frontBumper.receiveShadow = true;
    carGroup.add(frontBumper);
    bodyParts.push(frontBumper);

    const rearBumper = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, 0.25, 2.08),
      bumperMaterial
    );
    rearBumper.position.set(-2.08, 0.45, 0);
    rearBumper.castShadow = true;
    rearBumper.receiveShadow = true;
    carGroup.add(rearBumper);
    bodyParts.push(rearBumper);

    carGroup.position.y = 0.02;

    const colorOptions = [
      '#cc0000',
      '#003366',
      '#ffffff',
      '#1a1a1a',
      '#8b7355',
      '#2e8b57',
      '#708090',
      '#800020'
    ];

    const paintColorContainer = document.getElementById('paintColor');
    const clearcoatInput = document.getElementById('clearcoat');
    const metalnessInput = document.getElementById('metalness');
    const roughnessInput = document.getElementById('roughness');

    const clearcoatValue = document.getElementById('clearcoatValue');
    const metalnessValue = document.getElementById('metalnessValue');
    const roughnessValue = document.getElementById('roughnessValue');

    let currentPaintColor = '#cc0000';

    function updateMaterialUI() {
      clearcoatValue.textContent = Number(clearcoatInput.value).toFixed(2);
      metalnessValue.textContent = Number(metalnessInput.value).toFixed(2);
      roughnessValue.textContent = Number(roughnessInput.value).toFixed(2);
    }

    function applyPaintColor(color) {
      currentPaintColor = color;
      paintMaterial.color.set(color);

      document.querySelectorAll('.color-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.color === color);
      });

      update3DState();
    }

    function applyMaterialParams() {
      paintMaterial.clearcoat = Number(clearcoatInput.value);
      paintMaterial.metalness = Number(metalnessInput.value);
      paintMaterial.roughness = Number(roughnessInput.value);
      paintMaterial.needsUpdate = true;
      updateMaterialUI();
      update3DState();
    }

    colorOptions.forEach(color => {
      const btn = document.createElement('button');
      btn.className = 'color-btn';
      btn.dataset.color = color;
      btn.style.background = color;
      btn.title = color;
      btn.addEventListener('click', () => applyPaintColor(color));
      paintColorContainer.appendChild(btn);
    });

    clearcoatInput.addEventListener('input', applyMaterialParams);
    metalnessInput.addEventListener('input', applyMaterialParams);
    roughnessInput.addEventListener('input', applyMaterialParams);

    function update3DState() {
      window.__3D_STATE__ = {
        paintColor: currentPaintColor,
        clearcoat: Number(clearcoatInput.value),
        metalness: Number(metalnessInput.value),
        roughness: Number(roughnessInput.value),
        wheelCount: wheelMeshes.length,
        bodyPartCount: bodyParts.length
      };
    }

    applyPaintColor('#cc0000');
    applyMaterialParams();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      wheelMeshes.forEach((wheel) => {
        wheel.rotation.x = Math.sin(t * 0.8) * 0.03;
      });

      controls.update();
      update3DState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
