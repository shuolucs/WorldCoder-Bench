<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electromagnetic Wave Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(30, 30, 30, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 280px;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #ccc;
        }
        .control-group input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        .control-group select {
            width: 100%;
            padding: 4px;
            background: #222;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }
        .checkbox-group input {
            margin-right: 8px;
            cursor: pointer;
        }
        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }
        .value-display {
            float: right;
            color: #88ccff;
            font-weight: bold;
        }
        .legend {
            margin-top: 15px;
            font-size: 12px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }
        .color-box {
            width: 12px;
            height: 12px;
            margin-right: 8px;
            border-radius: 2px;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <div class="control-group">
            <label>Wavelength (λ) <span id="wl-val" class="value-display">4.0</span></label>
            <input type="range" id="wavelength" min="1" max="10" step="0.1" value="4">
        </div>
        <div class="control-group">
            <label>Frequency (f) <span id="freq-val" class="value-display">1.0</span></label>
            <input type="range" id="frequency" min="0.5" max="5" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>Polarization</label>
            <select id="polarization">
                <option value="linear">Linear (X-Y)</option>
                <option value="circular">Circular</option>
                <option value="elliptical">Elliptical</option>
            </select>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="showB" checked>
            <label for="showB">Show Magnetic Field (B)</label>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="color-box" style="background: #ff3333;"></div>
                <span>Electric Field (E)</span>
            </div>
            <div class="legend-item">
                <div class="color-box" style="background: #3388ff;"></div>
                <span>Magnetic Field (B)</span>
            </div>
            <div class="legend-item" style="margin-top: 5px; color: #888;">
                Propagation: +Z Axis
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Setup Scene, Camera, Renderer ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 8, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 10);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Helpers ---
        const axesHelper = new THREE.AxesHelper(2);
        scene.add(axesHelper);

        // Z-axis line
        const zAxisGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, 0, -2),
            new THREE.Vector3(0, 0, 22)
        ]);
        const zAxisMat = new THREE.LineBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.5 });
        const zAxisLine = new THREE.Line(zAxisGeo, zAxisMat);
        scene.add(zAxisLine);

        // --- Wave Parameters & Objects ---
        const numPoints = 50;
        const zMax = 20;
        const E0 = 2.5; // Max amplitude
        
        const colorE = 0xff3333;
        const colorB = 0x3388ff;

        const eArrows = [];
        const bArrows = [];

        // Envelope lines
        const eLineGeo = new THREE.BufferGeometry();
        const bLineGeo = new THREE.BufferGeometry();
        const ePositions = new Float32Array(numPoints * 3);
        const bPositions = new Float32Array(numPoints * 3);
        eLineGeo.setAttribute('position', new THREE.BufferAttribute(ePositions, 3));
        bLineGeo.setAttribute('position', new THREE.BufferAttribute(bPositions, 3));
        
        const eLine = new THREE.Line(eLineGeo, new THREE.LineBasicMaterial({ color: colorE, transparent: true, opacity: 0.6 }));
        const bLine = new THREE.Line(bLineGeo, new THREE.LineBasicMaterial({ color: colorB, transparent: true, opacity: 0.6 }));
        scene.add(eLine);
        scene.add(bLine);

        // Initialize Arrows
        for (let i = 0; i < numPoints; i++) {
            const z = (i / (numPoints - 1)) * zMax;
            const origin = new THREE.Vector3(0, 0, z);
            const defaultDir = new THREE.Vector3(1, 0, 0);

            const eArrow = new THREE.ArrowHelper(defaultDir, origin, 0, colorE, 0, 0);
            const bArrow = new THREE.ArrowHelper(defaultDir, origin, 0, colorB, 0, 0);
            
            scene.add(eArrow);
            scene.add(bArrow);
            
            eArrows.push(eArrow);
            bArrows.push(bArrow);
        }

        // --- UI Elements ---
        const elWavelength = document.getElementById('wavelength');
        const elFrequency = document.getElementById('frequency');
        const elPolarization = document.getElementById('polarization');
        const elShowB = document.getElementById('showB');
        
        const valWl = document.getElementById('wl-val');
        const valFreq = document.getElementById('freq-val');

        elWavelength.addEventListener('input', (e) => valWl.textContent = parseFloat(e.target.value).toFixed(1));
        elFrequency.addEventListener('input', (e) => valFreq.textContent = parseFloat(e.target.value).toFixed(1));

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            
            // Read UI state
            const wl = parseFloat(elWavelength.value);
            const freq = parseFloat(elFrequency.value);
            const pol = elPolarization.value;
            const showB = elShowB.checked;

            const k = (2 * Math.PI) / wl;
            const w = 2 * Math.PI * freq;

            for (let i = 0; i < numPoints; i++) {
                const z = (i / (numPoints - 1)) * zMax;
                const phase = k * z - w * time;

                let Ex = 0, Ey = 0;

                if (pol === 'linear') {
                    Ex = E0 * Math.cos(phase);
                    Ey = 0;
                } else if (pol === 'circular') {
                    Ex = E0 * Math.cos(phase);
                    Ey = E0 * Math.sin(phase);
                } else if (pol === 'elliptical') {
                    Ex = E0 * Math.cos(phase);
                    Ey = (E0 * 0.4) * Math.sin(phase);
                }

                // B = z-hat x E = (0, 0, 1) x (Ex, Ey, 0) = (-Ey, Ex, 0)
                let Bx = -Ey;
                let By = Ex;

                // Update E Field
                const eVec = new THREE.Vector3(Ex, Ey, 0);
                const eLen = eVec.length();
                if (eLen > 0.01) {
                    eArrows[i].setDirection(eVec.clone().normalize());
                    eArrows[i].setLength(eLen, eLen * 0.2, eLen * 0.15);
                    eArrows[i].visible = true;
                } else {
                    eArrows[i].visible = false;
                }
                ePositions[i * 3] = Ex;
                ePositions[i * 3 + 1] = Ey;
                ePositions[i * 3 + 2] = z;

                // Update B Field
                const bVec = new THREE.Vector3(Bx, By, 0);
                const bLen = bVec.length();
                if (bLen > 0.01 && showB) {
                    bArrows[i].setDirection(bVec.clone().normalize());
                    bArrows[i].setLength(bLen, bLen * 0.2, bLen * 0.15);
                    bArrows[i].visible = true;
                } else {
                    bArrows[i].visible = false;
                }
                bPositions[i * 3] = Bx;
                bPositions[i * 3 + 1] = By;
                bPositions[i * 3 + 2] = z;
            }

            eLineGeo.attributes.position.needsUpdate = true;
            bLineGeo.attributes.position.needsUpdate = true;
            bLine.visible = showB;

            // Expose State
            window.__3D_STATE__ = {
                wavelength: wl,
                frequency: freq,
                polarization: pol,
                showB: showB,
                simTime: time,
                maxAmplitudeE: E0,
                maxAmplitudeB: E0
            };

            controls.update();
            renderer.render(scene, camera);
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        animate();
    </script>
</body>
</html>
