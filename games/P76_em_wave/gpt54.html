<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 电磁波可视化</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0b1020;
      color: #e8ecff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 14, 28, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 14px;
      backdrop-filter: blur(8px);
      min-width: 260px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #ui h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 700;
    }

    .row {
      display: grid;
      grid-template-columns: 88px 1fr 54px;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 14px;
    }

    .row.checkbox-row {
      grid-template-columns: 88px 1fr;
    }

    .row select,
    .row input[type="range"] {
      width: 100%;
    }

    .value {
      text-align: right;
      color: #8fd3ff;
      font-variant-numeric: tabular-nums;
    }

    .legend {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.6;
      color: #bfc8f0;
    }

    .tag {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 999px;
      margin-right: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .tag.e { background: rgba(255, 90, 90, 0.18); color: #ff8f8f; border: 1px solid rgba(255, 90, 90, 0.35); }
    .tag.b { background: rgba(80, 180, 255, 0.18); color: #84c8ff; border: 1px solid rgba(80, 180, 255, 0.35); }
    .tag.k { background: rgba(130, 255, 150, 0.18); color: #98f3a7; border: 1px solid rgba(130, 255, 150, 0.35); }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #98a7d4;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>电磁波可视化</h2>

      <div class="row">
        <label for="wavelength">波长 λ</label>
        <input id="wavelength" type="range" min="1" max="10" step="0.1" value="4" />
        <div class="value" id="wavelengthValue">4.0</div>
      </div>

      <div class="row">
        <label for="frequency">频率 f</label>
        <input id="frequency" type="range" min="0.5" max="5" step="0.1" value="1" />
        <div class="value" id="frequencyValue">1.0</div>
      </div>

      <div class="row">
        <label for="polarization">偏振</label>
        <select id="polarization">
          <option value="linear">linear</option>
          <option value="circular">circular</option>
          <option value="elliptical">elliptical</option>
        </select>
        <div class="value" id="polarizationValue">linear</div>
      </div>

      <div class="row checkbox-row">
        <label for="showB">显示 B 场</label>
        <input id="showB" type="checkbox" checked />
      </div>

      <div class="legend">
        <span class="tag e">E 场</span>
        <span class="tag b">B 场</span>
        <span class="tag k">传播 +Z</span><br />
        E ⟂ B，且均垂直于传播方向。<br />
        线偏振：E 主要沿 X，B 主要沿 Y。<br />
        圆/椭圆偏振：在 XY 平面合成正交分量。
      </div>

      <div class="hint">
        鼠标拖拽旋转，滚轮缩放。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');

    const wavelengthInput = document.getElementById('wavelength');
    const frequencyInput = document.getElementById('frequency');
    const polarizationInput = document.getElementById('polarization');
    const showBInput = document.getElementById('showB');

    const wavelengthValue = document.getElementById('wavelengthValue');
    const frequencyValue = document.getElementById('frequencyValue');
    const polarizationValue = document.getElementById('polarizationValue');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(12, 10, 22);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(10, 12, 8);
    scene.add(dirLight);

    const axesHelper = new THREE.AxesHelper(5);
    scene.add(axesHelper);

    const gridHelper = new THREE.GridHelper(40, 40, 0x2f4f7f, 0x1c2740);
    gridHelper.rotation.x = Math.PI / 2;
    gridHelper.position.z = 0;
    scene.add(gridHelper);

    // Z 轴传播参考线
    const zAxisMat = new THREE.LineBasicMaterial({ color: 0x98f3a7, transparent: true, opacity: 0.9 });
    const zAxisPts = [
      new THREE.Vector3(0, 0, -10),
      new THREE.Vector3(0, 0, 10)
    ];
    const zAxisGeom = new THREE.BufferGeometry().setFromPoints(zAxisPts);
    const zAxisLine = new THREE.Line(zAxisGeom, zAxisMat);
    scene.add(zAxisLine);

    // 波阵面示意（可选）
    const wavefrontGroup = new THREE.Group();
    scene.add(wavefrontGroup);
    const wavefrontMat = new THREE.MeshBasicMaterial({
      color: 0x66ffcc,
      transparent: true,
      opacity: 0.07,
      side: THREE.DoubleSide
    });
    for (let i = -2; i <= 2; i++) {
      const plane = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), wavefrontMat);
      plane.position.z = i * 4;
      wavefrontGroup.add(plane);
    }

    const arrowScale = 1.6;
    const headLength = 0.35;
    const headWidth = 0.22;
    const minVisualLength = 0.001;

    const sampleCount = 50;
    const zMin = -10;
    const zMax = 10;
    const zStep = (zMax - zMin) / (sampleCount - 1);

    const eColor = 0xff5f5f;
    const bColor = 0x56b7ff;

    const eGroup = new THREE.Group();
    const bGroup = new THREE.Group();
    scene.add(eGroup);
    scene.add(bGroup);

    const eArrows = [];
    const bArrows = [];
    const zPositions = [];

    for (let i = 0; i < sampleCount; i++) {
      const z = zMin + i * zStep;
      zPositions.push(z);

      const eOrigin = new THREE.Vector3(0, 0, z);
      const eArrow = new THREE.ArrowHelper(
        new THREE.Vector3(1, 0, 0),
        eOrigin,
        1,
        eColor,
        headLength,
        headWidth
      );
      eGroup.add(eArrow);
      eArrows.push(eArrow);

      const bOrigin = new THREE.Vector3(0, 0, z + 0.08);
      const bArrow = new THREE.ArrowHelper(
        new THREE.Vector3(0, 1, 0),
        bOrigin,
        1,
        bColor,
        headLength,
        headWidth
      );
      bGroup.add(bArrow);
      bArrows.push(bArrow);
    }

    function updateLabels() {
      wavelengthValue.textContent = Number(wavelengthInput.value).toFixed(1);
      frequencyValue.textContent = Number(frequencyInput.value).toFixed(1);
      polarizationValue.textContent = polarizationInput.value;
    }

    updateLabels();

    wavelengthInput.addEventListener('input', updateLabels);
    frequencyInput.addEventListener('input', updateLabels);
    polarizationInput.addEventListener('change', updateLabels);

    const clock = new THREE.Clock();

    function computeFieldE(z, t, wavelength, frequency, polarization) {
      const k = 2 * Math.PI / wavelength;
      const omega = 2 * Math.PI * frequency;
      const phase = k * z - omega * t;

      let ex = 0;
      let ey = 0;

      if (polarization === 'linear') {
        ex = Math.cos(phase);
        ey = 0;
      } else if (polarization === 'circular') {
        ex = Math.cos(phase);
        ey = Math.sin(phase);
      } else if (polarization === 'elliptical') {
        ex = Math.cos(phase);
        ey = 0.55 * Math.sin(phase + Math.PI / 6);
      } else {
        ex = Math.cos(phase);
        ey = 0;
      }

      return new THREE.Vector3(ex, ey, 0);
    }

    function computeFieldB(eVec) {
      // 对于沿 +Z 传播的平面波，可取 B = k_hat × E
      // k_hat = (0, 0, 1)
      return new THREE.Vector3(-eVec.y, eVec.x, 0);
    }

    function setArrowFromVector(arrow, origin, vec) {
      const mag = vec.length();
      arrow.position.copy(origin);

      if (mag < 1e-6) {
        arrow.setDirection(new THREE.Vector3(1, 0, 0));
        arrow.setLength(minVisualLength, minVisualLength * 0.4, minVisualLength * 0.25);
        return;
      }

      const dir = vec.clone().normalize();
      const len = mag * arrowScale;
      const hl = Math.min(headLength, len * 0.35);
      const hw = Math.min(headWidth, len * 0.25 + 0.02);
      arrow.setDirection(dir);
      arrow.setLength(len, hl, hw);
    }

    function animate() {
      requestAnimationFrame(animate);

      controls.update();

      const simTime = clock.getElapsedTime();
      const wavelength = Number(wavelengthInput.value);
      const frequency = Number(frequencyInput.value);
      const polarization = polarizationInput.value;
      const showB = showBInput.checked;

      bGroup.visible = showB;

      let maxAmplitudeE = 0;
      let maxAmplitudeB = 0;

      for (let i = 0; i < sampleCount; i++) {
        const z = zPositions[i];

        const eVec = computeFieldE(z, simTime, wavelength, frequency, polarization);
        const bVec = computeFieldB(eVec);

        maxAmplitudeE = Math.max(maxAmplitudeE, eVec.length());
        maxAmplitudeB = Math.max(maxAmplitudeB, bVec.length());

        const eOrigin = new THREE.Vector3(0, 0, z);
        const bOrigin = new THREE.Vector3(0, 0, z + 0.08);

        setArrowFromVector(eArrows[i], eOrigin, eVec);
        setArrowFromVector(bArrows[i], bOrigin, bVec);
      }

      // 更新波阵面位置，使其沿 +Z 演示传播
      const speedVisual = wavelength * frequency;
      wavefrontGroup.children.forEach((plane, idx) => {
        const offsetIndex = idx - 2;
        let z = ((simTime * speedVisual + offsetIndex * wavelength) % (wavelength * 5));
        z = z - 2.5 * wavelength;
        plane.position.z = z;
      });

      window.__3D_STATE__ = {
        wavelength,
        frequency,
        polarization,
        showB,
        simTime,
        maxAmplitudeE,
        maxAmplitudeB
      };

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
