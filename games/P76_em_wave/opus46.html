<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electromagnetic Wave Visualization</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, sans-serif; color: #eee; }
  canvas { display: block; }

  #controls {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(10, 10, 30, 0.88);
    border: 1px solid rgba(100, 140, 255, 0.3);
    border-radius: 12px;
    padding: 20px 24px;
    min-width: 300px;
    backdrop-filter: blur(12px);
    z-index: 10;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }

  #controls h2 {
    font-size: 16px;
    margin-bottom: 16px;
    color: #8ab4ff;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(100,140,255,0.2);
    padding-bottom: 8px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .control-row label {
    font-size: 13px;
    color: #aac;
    min-width: 110px;
  }

  .control-row input[type="range"] {
    flex: 1;
    margin: 0 10px;
    accent-color: #5588ff;
  }

  .control-row .val {
    font-size: 13px;
    color: #7af;
    min-width: 36px;
    text-align: right;
    font-family: monospace;
  }

  .control-row select {
    flex: 1;
    margin-left: 10px;
    background: rgba(30,30,60,0.9);
    color: #adf;
    border: 1px solid rgba(100,140,255,0.3);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 13px;
    outline: none;
  }

  .control-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #ff8844;
    cursor: pointer;
  }

  #legend {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 140, 255, 0.2);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 13px;
    backdrop-filter: blur(8px);
    z-index: 10;
  }

  #legend .legend-item {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
  }

  #legend .legend-item:last-child { margin-bottom: 0; }

  #legend .color-box {
    width: 24px;
    height: 6px;
    border-radius: 3px;
    margin-right: 10px;
  }

  #info {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 140, 255, 0.2);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 12px;
    font-family: monospace;
    backdrop-filter: blur(8px);
    z-index: 10;
    color: #8ab4ff;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div id="controls">
  <h2>⚡ EM Wave Controls</h2>
  <div class="control-row">
    <label>Wavelength (λ)</label>
    <input type="range" id="wavelength" min="1" max="10" step="0.1" value="4">
    <span class="val" id="wavelengthVal">4.0</span>
  </div>
  <div class="control-row">
    <label>Frequency (f)</label>
    <input type="range" id="frequency" min="0.5" max="5" step="0.1" value="1">
    <span class="val" id="frequencyVal">1.0</span>
  </div>
  <div class="control-row">
    <label>Polarization</label>
    <select id="polarization">
      <option value="linear">Linear</option>
      <option value="circular">Circular</option>
      <option value="elliptical">Elliptical</option>
    </select>
  </div>
  <div class="control-row">
    <label>Show B Field</label>
    <input type="checkbox" id="showB" checked>
  </div>
</div>

<div id="legend">
  <div class="legend-item">
    <div class="color-box" style="background: linear-gradient(90deg, #ff4444, #ffaa44);"></div>
    <span>E Field (Electric)</span>
  </div>
  <div class="legend-item">
    <div class="color-box" style="background: linear-gradient(90deg, #4488ff, #44ddff);"></div>
    <span>B Field (Magnetic)</span>
  </div>
  <div class="legend-item">
    <div class="color-box" style="background: #888;"></div>
    <span>Propagation → +Z</span>
  </div>
</div>

<div id="info" id="infoPanel">
  <div>simTime: <span id="infoTime">0.00</span>s</div>
  <div>maxE: <span id="infoE">0.00</span></div>
  <div>maxB: <span id="infoB">0.00</span></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1e);
scene.fog = new THREE.FogExp2(0x0a0a1e, 0.012);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(8, 6, 18);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// ============ GRID & AXES ============
const gridHelper = new THREE.GridHelper(40, 40, 0x222244, 0x181830);
gridHelper.position.y = -3;
scene.add(gridHelper);

// Z-axis line (propagation direction)
const zAxisGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0, 0, -20),
  new THREE.Vector3(0, 0, 20)
]);
const zAxisMat = new THREE.LineBasicMaterial({ color: 0x666688, linewidth: 1 });
scene.add(new THREE.Line(zAxisGeo, zAxisMat));

// Axis labels using small spheres
const labelColors = { x: 0xff4444, y: 0x44ff44, z: 0x4488ff };
function addAxisIndicator(dir, color, len) {
  const arrow = new THREE.ArrowHelper(dir, new THREE.Vector3(0,0,0), len, color, 0.3, 0.15);
  scene.add(arrow);
}
addAxisIndicator(new THREE.Vector3(1,0,0), 0xff4444, 2);
addAxisIndicator(new THREE.Vector3(0,1,0), 0x44ff44, 2);
addAxisIndicator(new THREE.Vector3(0,0,1), 0x4488ff, 2);

// Propagation arrow
const propArrow = new THREE.ArrowHelper(
  new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, -2.5, -18), 36, 0x555577, 0.6, 0.3
);
scene.add(propArrow);

// ============ WAVE ENVELOPE CURVES ============
const NUM_CURVE_PTS = 200;

// E-field envelope curve
const eCurveGeo = new THREE.BufferGeometry();
const eCurvePositions = new Float32Array(NUM_CURVE_PTS * 3);
eCurveGeo.setAttribute('position', new THREE.BufferAttribute(eCurvePositions, 3));
const eCurveMat = new THREE.LineBasicMaterial({ color: 0xff6633, transparent: true, opacity: 0.4 });
const eCurveLine = new THREE.Line(eCurveGeo, eCurveMat);
scene.add(eCurveLine);

// E-field secondary curve (for circular/elliptical - shows the Y component)
const eCurve2Geo = new THREE.BufferGeometry();
const eCurve2Positions = new Float32Array(NUM_CURVE_PTS * 3);
eCurve2Geo.setAttribute('position', new THREE.BufferAttribute(eCurve2Positions, 3));
const eCurve2Mat = new THREE.LineBasicMaterial({ color: 0xff9944, transparent: true, opacity: 0.3 });
const eCurve2Line = new THREE.Line(eCurve2Geo, eCurve2Mat);
scene.add(eCurve2Line);

// B-field envelope curve
const bCurveGeo = new THREE.BufferGeometry();
const bCurvePositions = new Float32Array(NUM_CURVE_PTS * 3);
bCurveGeo.setAttribute('position', new THREE.BufferAttribute(bCurvePositions, 3));
const bCurveMat = new THREE.LineBasicMaterial({ color: 0x3388ff, transparent: true, opacity: 0.4 });
const bCurveLine = new THREE.Line(bCurveGeo, bCurveMat);
scene.add(bCurveLine);

// B-field secondary curve
const bCurve2Geo = new THREE.BufferGeometry();
const bCurve2Positions = new Float32Array(NUM_CURVE_PTS * 3);
bCurve2Geo.setAttribute('position', new THREE.BufferAttribute(bCurve2Positions, 3));
const bCurve2Mat = new THREE.LineBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.3 });
const bCurve2Line = new THREE.Line(bCurve2Geo, bCurve2Mat);
scene.add(bCurve2Line);

// ============ ARROW CREATION ============
const NUM_ARROWS = 50;
const Z_MIN = -16;
const Z_MAX = 16;

function createArrowMesh(color) {
  // Custom arrow: cylinder shaft + cone head
  const group = new THREE.Group();

  const shaftGeo = new THREE.CylinderGeometry(0.03, 0.03, 1, 6);
  shaftGeo.translate(0, 0.5, 0);
  const shaftMat = new THREE.MeshPhongMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0.9
  });
  const shaft = new THREE.Mesh(shaftGeo, shaftMat);
  group.add(shaft);

  const headGeo = new THREE.ConeGeometry(0.1, 0.2, 8);
  headGeo.translate(0, 1.1, 0);
  const headMat = new THREE.MeshPhongMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.4,
    transparent: true,
    opacity: 0.95
  });
  const head = new THREE.Mesh(headGeo, headMat);
  group.add(head);

  return group;
}

// E-field arrows (warm colors)
const eArrows = [];
for (let i = 0; i < NUM_ARROWS; i++) {
  const t = i / (NUM_ARROWS - 1);
  const hue = 0.02 + t * 0.06; // red to orange
  const color = new THREE.Color().setHSL(hue, 1.0, 0.55);
  const arrow = createArrowMesh(color);
  scene.add(arrow);
  eArrows.push({
    group: arrow,
    z: Z_MIN + (Z_MAX - Z_MIN) * t,
    index: i
  });
}

// B-field arrows (cool colors)
const bArrows = [];
for (let i = 0; i < NUM_ARROWS; i++) {
  const t = i / (NUM_ARROWS - 1);
  const hue = 0.55 + t * 0.08; // blue to cyan
  const color = new THREE.Color().setHSL(hue, 0.9, 0.55);
  const arrow = createArrowMesh(color);
  scene.add(arrow);
  bArrows.push({
    group: arrow,
    z: Z_MIN + (Z_MAX - Z_MIN) * t,
    index: i
  });
}

// ============ WAVE FRONT PLANES ============
const waveFrontGeo = new THREE.RingGeometry(0.3, 2.5, 32);
const waveFrontMat = new THREE.MeshBasicMaterial({
  color: 0x4466aa,
  transparent: true,
  opacity: 0.06,
  side: THREE.DoubleSide
});
const waveFronts = [];
for (let i = 0; i < 5; i++) {
  const mesh = new THREE.Mesh(waveFrontGeo, waveFrontMat.clone());
  mesh.rotation.x = Math.PI / 2;
  scene.add(mesh);
  waveFronts.push(mesh);
}

// ============ GLOW PARTICLES along Z ============
const particleCount = 300;
const particleGeo = new THREE.BufferGeometry();
const particlePos = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePos[i * 3] = (Math.random() - 0.5) * 0.3;
  particlePos[i * 3 + 1] = (Math.random() - 0.5) * 0.3;
  particlePos[i * 3 + 2] = Z_MIN + Math.random() * (Z_MAX - Z_MIN);
  particleColors[i * 3] = 0.3;
  particleColors[i * 3 + 1] = 0.4;
  particleColors[i * 3 + 2] = 0.8;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
const particleMat = new THREE.PointsMaterial({
  size: 0.08,
  vertexColors: true,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============ CONTROLS ============
const wavelengthSlider = document.getElementById('wavelength');
const frequencySlider = document.getElementById('frequency');
const polarizationSelect = document.getElementById('polarization');
const showBCheckbox = document.getElementById('showB');
const wavelengthVal = document.getElementById('wavelengthVal');
const frequencyVal = document.getElementById('frequencyVal');

wavelengthSlider.addEventListener('input', () => {
  wavelengthVal.textContent = parseFloat(wavelengthSlider.value).toFixed(1);
});
frequencySlider.addEventListener('input', () => {
  frequencyVal.textContent = parseFloat(frequencySlider.value).toFixed(1);
});

// ============ STATE ============
window.__3D_STATE__ = {
  wavelength: 4,
  frequency: 1,
  polarization: 'linear',
  showB: true,
  simTime: 0,
  maxAmplitudeE: 0,
  maxAmplitudeB: 0
};

// ============ HELPER: set arrow direction and length ============
const _dir = new THREE.Vector3();
const _up = new THREE.Vector3(0, 1, 0);
const _quat = new THREE.Quaternion();

function setArrow(arrowData, dx, dy, dz, baseZ) {
  const group = arrowData.group;
  const len = Math.sqrt(dx * dx + dy * dy + dz * dz);

  group.position.set(0, 0, baseZ);

  if (len < 0.001) {
    group.scale.set(0.001, 0.001, 0.001);
    return;
  }

  _dir.set(dx, dy, dz).normalize();

  // Align Y-axis of group to _dir
  _quat.setFromUnitVectors(_up, _dir);
  group.quaternion.copy(_quat);
  group.scale.set(1, len, 1);
}

// ============ ANIMATION ============
const clock = new THREE.Clock();
let simTime = 0;

const E0 = 2.0; // amplitude
const B0 = 2.0;

function getWaveParams() {
  const lambda = parseFloat(wavelengthSlider.value);
  const freq = parseFloat(frequencySlider.value);
  const pol = polarizationSelect.value;
  const showB = showBCheckbox.checked;
  const k = (2 * Math.PI) / lambda;
  const omega = 2 * Math.PI * freq;
  return { lambda, freq, pol, showB, k, omega };
}

function computeEField(z, t, params) {
  const { k, omega, pol } = params;
  const phase = k * z - omega * t;

  let ex = 0, ey = 0;

  if (pol === 'linear') {
    ex = E0 * Math.cos(phase);
    ey = 0;
  } else if (pol === 'circular') {
    ex = E0 * Math.cos(phase);
    ey = E0 * Math.sin(phase); // 90° phase difference, equal amplitude
  } else if (pol === 'elliptical') {
    ex = E0 * Math.cos(phase);
    ey = E0 * 0.5 * Math.sin(phase); // 90° phase, different amplitude
  }

  return { ex, ey };
}

function computeBField(z, t, params) {
  const { k, omega, pol } = params;
  const phase = k * z - omega * t;

  let bx = 0, by = 0;

  // B is perpendicular to E and to Z (propagation direction)
  // If E = (Ex, Ey, 0), then B = (1/c) * k_hat × E = (1/c)(-Ey, Ex, 0) in proper units
  // For visualization, we use same amplitude scale
  if (pol === 'linear') {
    bx = 0;
    by = B0 * Math.cos(phase);
  } else if (pol === 'circular') {
    // B perpendicular to E: if E=(cos, sin), B=(-sin, cos)
    bx = -B0 * Math.sin(phase);
    by = B0 * Math.cos(phase);
  } else if (pol === 'elliptical') {
    bx = -B0 * 0.5 * Math.sin(phase);
    by = B0 * Math.cos(phase);
  }

  return { bx, by };
}

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();
  simTime += dt;

  const params = getWaveParams();
  const { showB } = params;

  let maxE = 0;
  let maxB = 0;

  // Update E arrows
  for (let i = 0; i < NUM_ARROWS; i++) {
    const z = eArrows[i].z;
    const { ex, ey } = computeEField(z, simTime, params);
    // E field: ex along X, ey along Y (for circular/elliptical)
    setArrow(eArrows[i], ex, ey, 0, z);
    const mag = Math.sqrt(ex * ex + ey * ey);
    if (mag > maxE) maxE = mag;
  }

  // Update B arrows
  for (let i = 0; i < NUM_ARROWS; i++) {
    const z = bArrows[i].z;
    const { bx, by } = computeBField(z, simTime, params);
    setArrow(bArrows[i], bx, by, 0, z);
    const mag = Math.sqrt(bx * bx + by * by);
    if (mag > maxB) maxB = mag;
    bArrows[i].group.visible = showB;
  }

  // Update E envelope curve
  const ePosAttr = eCurveGeo.getAttribute('position');
  const ePos2Attr = eCurve2Geo.getAttribute('position');
  const bPosAttr = bCurveGeo.getAttribute('position');
  const bPos2Attr = bCurve2Geo.getAttribute('position');

  for (let i = 0; i < NUM_CURVE_PTS; i++) {
    const t = i / (NUM_CURVE_PTS - 1);
    const z = Z_MIN + (Z_MAX - Z_MIN) * t;

    const eField = computeEField(z, simTime, params);
    ePosAttr.array[i * 3] = eField.ex;
    ePosAttr.array[i * 3 + 1] = eField.ey;
    ePosAttr.array[i * 3 + 2] = z;

    // For non-linear, show the 3D path
    ePos2Attr.array[i * 3] = eField.ex;
    ePos2Attr.array[i * 3 + 1] = 0;
    ePos2Attr.array[i * 3 + 2] = z;

    const bField = computeBField(z, simTime, params);
    bPosAttr.array[i * 3] = bField.bx;
    bPosAttr.array[i * 3 + 1] = bField.by;
    bPosAttr.array[i * 3 + 2] = z;

    bPos2Attr.array[i * 3] = 0;
    bPos2Attr.array[i * 3 + 1] = bField.by;
    bPos2Attr.array[i * 3 + 2] = z;
  }

  ePosAttr.needsUpdate = true;
  ePos2Attr.needsUpdate = true;
  bPosAttr.needsUpdate = true;
  bPos2Attr.needsUpdate = true;

  // Show/hide B curves
  bCurveLine.visible = showB;
  bCurve2Line.visible = showB;

  // For linear, hide secondary curves; for circular/elliptical show them
  const isLinear = params.pol === 'linear';
  eCurve2Line.visible = !isLinear;
  bCurve2Line.visible = showB && !isLinear;

  // Update wave fronts
  for (let i = 0; i < waveFronts.length; i++) {
    const basePhase = (simTime * params.omega) % (2 * Math.PI);
    let z = ((basePhase + i * 2 * Math.PI / waveFronts.length) / params.k) % (Z_MAX - Z_MIN) + Z_MIN;
    if (z > Z_MAX) z -= (Z_MAX - Z_MIN);
    if (z < Z_MIN) z += (Z_MAX - Z_MIN);
    waveFronts[i].position.set(0, 0, z);
  }

  // Update particles
  const pPos = particles.geometry.getAttribute('position');
  for (let i = 0; i < particleCount; i++) {
    pPos.array[i * 3 + 2] += dt * params.omega * 0.3;
    if (pPos.array[i * 3 + 2] > Z_MAX) {
      pPos.array[i * 3 + 2] = Z_MIN;
    }
  }
  pPos.needsUpdate = true;

  // Update info display
  document.getElementById('infoTime').textContent = simTime.toFixed(2);
  document.getElementById('infoE').textContent = maxE.toFixed(2);
  document.getElementById('infoB').textContent = maxB.toFixed(2);

  // Update state
  window.__3D_STATE__ = {
    wavelength: params.lambda,
    frequency: params.freq,
    polarization: params.pol,
    showB: showB,
    simTime: simTime,
    maxAmplitudeE: maxE,
    maxAmplitudeB: maxB
  };

  controls.update();
  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
