<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Category Histogram</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .title {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .stats {
            color: white;
            text-align: right;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 10px 15px;
            border-radius: 8px;
        }
        .indicator {
            color: #f39c12;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }
        .hud-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .legend {
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.5);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
            font-size: 14px;
        }
        .color-box {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }
        .controls-help {
            position: absolute;
            bottom: 80px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
        }
        button {
            pointer-events: auto;
            padding: 10px 20px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover {
            background-color: #c0392b;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div class="title">3D Category Histogram</div>
            <div class="indicator" id="particle-indicator">Particles: ON</div>
            <div class="stats">
                <div id="stat-total">Total: 0</div>
                <div id="stat-avg">Average: 0.00</div>
            </div>
        </div>
        
        <div class="controls-help">
            Click: Select | Hover: Glow & Speed up | R: Randomize | S: Sort | T: Toggle Shape | P: Particles | 1-6: Isolate
        </div>

        <div class="hud-bottom">
            <div class="legend" id="legend-container"></div>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- INITIAL DATA & STATE ---
        const categories = [
            { name: 'Food', value: 85, color: 0xe74c3c },
            { name: 'Tech', value: 142, color: 0x3498db },
            { name: 'Health', value: 67, color: 0x2ecc71 },
            { name: 'Sports', value: 110, color: 0xf39c12 },
            { name: 'Music', value: 95, color: 0x9b59b6 },
            { name: 'Travel', value: 128, color: 0x1abc9c }
        ];

        window.__3D_STATE__ = {
            barValues: [],
            barHeights: [],
            selectedBar: -1,
            hoveredBar: -1,
            particlesVisible: true,
            particleCount: 500,
            totalValue: 0,
            averageValue: 0,
            sorted: false,
            sortOrder: [0, 1, 2, 3, 4, 5],
            cylinderMode: false,
            isolatedBar: -1,
            bottleLoaded: false,
            bottleRotation: 0,
            animating: false,
            barPositionsX: [],
            frameCount: 0
        };

        let currentData = JSON.parse(JSON.stringify(categories));
        const BAR_SPACING = 2.0;
        const START_X = -((categories.length - 1) * BAR_SPACING) / 2;

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(12, 10, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- OBJECT CREATION ---
        const bars = [];
        const valueLabels = [];
        const catLabels = [];
        const boxGeo = new THREE.BoxGeometry(1.2, 1, 1.2);
        const cylGeo = new THREE.CylinderGeometry(0.6, 0.6, 1, 32);
        // Translate geometries so origin is at bottom
        boxGeo.translate(0, 0.5, 0);
        cylGeo.translate(0, 0.5, 0);

        function createTextPlane(text, color, isValue = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color;
            ctx.font = isValue ? 'Bold 60px Arial' : 'Bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 64);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            const material = new THREE.MeshBasicMaterial({ 
                map: texture, 
                transparent: true, 
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 1), material);
            return { mesh: plane, texture: texture, ctx: ctx, canvas: canvas };
        }

        function updateTextPlane(labelObj, text, isValue = false) {
            const ctx = labelObj.ctx;
            ctx.clearRect(0, 0, 256, 128);
            ctx.fillText(text, 128, 64);
            labelObj.texture.needsUpdate = true;
        }

        // Build Legend UI
        const legendContainer = document.getElementById('legend-container');

        currentData.forEach((data, i) => {
            // Legend
            const hexColor = '#' + data.color.toString(16).padStart(6, '0');
            legendContainer.innerHTML += `
                <div class="legend-item">
                    <div class="color-box" style="background-color: ${hexColor}"></div>
                    <span>${data.name}</span>
                </div>
            `;

            // Bar
            const material = new THREE.MeshStandardMaterial({
                color: data.color,
                metalness: 0.3,
                roughness: 0.5,
                transparent: true,
                opacity: 1.0
            });
            const bar = new THREE.Mesh(boxGeo, material);
            bar.castShadow = true;
            bar.receiveShadow = true;
            
            const xPos = START_X + i * BAR_SPACING;
            const height = data.value / 20.0;
            
            bar.position.set(xPos, 0, 0);
            bar.scale.y = height;
            bar.userData = { index: i, baseColor: data.color, currentYOffset: 0 };
            
            scene.add(bar);
            bars.push(bar);

            // Category Label (Below)
            const catLabel = createTextPlane(data.name, '#ffffff');
            catLabel.mesh.position.set(xPos, 0.05, 1.5);
            catLabel.mesh.rotation.x = -Math.PI / 4;
            scene.add(catLabel.mesh);
            catLabels.push(catLabel);

            // Value Label (Above)
            const valLabel = createTextPlane(data.value.toString(), '#ffffff', true);
            valLabel.mesh.position.set(xPos, height + 0.5, 0);
            scene.add(valLabel.mesh);
            valueLabels.push(valLabel);
        });

        // --- WATER BOTTLE MODEL ---
        let waterBottle = null;
        const loader = new GLTFLoader();
        // Using a reliable CDN for the three.js example WaterBottle model
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/WaterBottle/WaterBottle.glb', (gltf) => {
            waterBottle = gltf.scene;
            waterBottle.scale.set(3, 3, 3);
            
            // Fix materials if needed
            waterBottle.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(waterBottle);
            window.__3D_STATE__.bottleLoaded = true;
            updateBottlePosition();
        });

        function updateBottlePosition(animate = false) {
            if (!waterBottle) return;
            
            let maxVal = -1;
            let tallestIdx = -1;
            currentData.forEach((d, i) => {
                if (d.value > maxVal) {
                    maxVal = d.value;
                    tallestIdx = i;
                }
            });

            const targetBar = bars[tallestIdx];
            const targetX = targetBar.position.x;
            const targetY = targetBar.scale.y + targetBar.userData.currentYOffset + 0.5;

            if (animate) {
                gsap.to(waterBottle.position, {
                    x: targetX,
                    y: targetY,
                    z: 0,
                    duration: 1,
                    ease: "power2.inOut"
                });
            } else {
                waterBottle.position.set(targetX, targetY, 0);
            }
        }

        // --- PARTICLE SYSTEM ---
        const particleCount = 500;
        const particlesPerBar = Math.floor(particleCount / bars.length);
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(particleCount * 3);
        const pCol = new Float32Array(particleCount * 3);
        const pData = []; // Store velocity and assigned bar

        const colorObj = new THREE.Color();

        for (let i = 0; i < particleCount; i++) {
            const barIdx = i % bars.length;
            const bar = bars[barIdx];
            const x = bar.position.x + (Math.random() - 0.5) * 1.2;
            const y = Math.random() * bar.scale.y;
            const z = (Math.random() - 0.5) * 1.2;

            pPos[i * 3] = x;
            pPos[i * 3 + 1] = y;
            pPos[i * 3 + 2] = z;

            colorObj.setHex(currentData[barIdx].color);
            pCol[i * 3] = colorObj.r;
            pCol[i * 3 + 1] = colorObj.g;
            pCol[i * 3 + 2] = colorObj.b;

            pData.push({
                barIndex: barIdx,
                velocity: 0.5 + Math.random() * 1.5,
                offsetX: (Math.random() - 0.5) * 1.2,
                offsetZ: (Math.random() - 0.5) * 1.2
            });
        }

        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));

        const pMat = new THREE.PointsMaterial({
            size: 0.08,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(pGeo, pMat);
        scene.add(particleSystem);

        // --- INTERACTION & LOGIC ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateState() {
            let sum = 0;
            window.__3D_STATE__.barValues = [];
            window.__3D_STATE__.barHeights = [];
            window.__3D_STATE__.barPositionsX = [];

            currentData.forEach((d, i) => {
                sum += d.value;
                window.__3D_STATE__.barValues.push(d.value);
                window.__3D_STATE__.barHeights.push(d.value / 20.0);
                window.__3D_STATE__.barPositionsX.push(bars[i].position.x);
            });

            window.__3D_STATE__.totalValue = sum;
            window.__3D_STATE__.averageValue = (sum / currentData.length).toFixed(2);

            document.getElementById('stat-total').innerText = `Total: ${window.__3D_STATE__.totalValue}`;
            document.getElementById('stat-avg').innerText = `Average: ${window.__3D_STATE__.averageValue}`;
        }
        updateState();

        // Hover
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(bars);

            if (intersects.length > 0) {
                const hovered = intersects[0].object;
                const idx = hovered.userData.index;
                if (window.__3D_STATE__.hoveredBar !== idx) {
                    // Reset previous
                    if (window.__3D_STATE__.hoveredBar !== -1) {
                        bars[window.__3D_STATE__.hoveredBar].material.emissive.setHex(0x000000);
                    }
                    window.__3D_STATE__.hoveredBar = idx;
                    hovered.material.emissive.setHex(0x333333);
                    document.body.style.cursor = 'pointer';
                }
            } else {
                if (window.__3D_STATE__.hoveredBar !== -1) {
                    bars[window.__3D_STATE__.hoveredBar].material.emissive.setHex(0x000000);
                    window.__3D_STATE__.hoveredBar = -1;
                    document.body.style.cursor = 'default';
                }
            }
        });

        // Click
        window.addEventListener('click', () => {
            if (window.__3D_STATE__.hoveredBar !== -1) {
                const idx = window.__3D_STATE__.hoveredBar;
                
                // Deselect previous
                if (window.__3D_STATE__.selectedBar !== -1 && window.__3D_STATE__.selectedBar !== idx) {
                    const prevBar = bars[window.__3D_STATE__.selectedBar];
                    prevBar.userData.currentYOffset = 0;
                    gsap.to(prevBar.position, { y: 0, duration: 0.5 });
                    gsap.to(valueLabels[window.__3D_STATE__.selectedBar].mesh.position, { 
                        y: prevBar.scale.y + 0.5, duration: 0.5 
                    });
                }

                // Toggle current
                if (window.__3D_STATE__.selectedBar === idx) {
                    window.__3D_STATE__.selectedBar = -1;
                    bars[idx].userData.currentYOffset = 0;
                    gsap.to(bars[idx].position, { y: 0, duration: 0.5 });
                    gsap.to(valueLabels[idx].mesh.position, { y: bars[idx].scale.y + 0.5, duration: 0.5 });
                } else {
                    window.__3D_STATE__.selectedBar = idx;
                    bars[idx].userData.currentYOffset = 1.0;
                    gsap.to(bars[idx].position, { y: 1.0, duration: 0.5 });
                    gsap.to(valueLabels[idx].mesh.position, { y: bars[idx].scale.y + 1.5, duration: 0.5 });
                }
                updateBottlePosition(true);
            }
        });

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            if (key === 'r') {
                // Randomize
                window.__3D_STATE__.animating = true;
                currentData.forEach((d, i) => {
                    d.value = Math.floor(Math.random() * 101) + 50; // 50-150
                    const newHeight = d.value / 20.0;
                    
                    gsap.to(bars[i].scale, { y: newHeight, duration: 1, ease: "power2.out" });
                    
                    const yOffset = bars[i].userData.currentYOffset;
                    gsap.to(valueLabels[i].mesh.position, { 
                        y: newHeight + yOffset + 0.5, 
                        duration: 1, 
                        ease: "power2.out",
                        onUpdate: () => {
                            // Update text halfway through or continuously
                            updateTextPlane(valueLabels[i], d.value.toString(), true);
                        }
                    });
                });

                setTimeout(() => {
                    updateState();
                    updateBottlePosition(true);
                    window.__3D_STATE__.animating = false;
                }, 1000);
            }
            else if (key === 'p') {
                // Toggle Particles
                window.__3D_STATE__.particlesVisible = !window.__3D_STATE__.particlesVisible;
                particleSystem.visible = window.__3D_STATE__.particlesVisible;
                document.getElementById('particle-indicator').innerText = `Particles: ${window.__3D_STATE__.particlesVisible ? 'ON' : 'OFF'}`;
            }
            else if (key === 's') {
                // Sort
                window.__3D_STATE__.animating = true;
                window.__3D_STATE__.sorted = !window.__3D_STATE__.sorted;
                
                let sortArray = currentData.map((d, i) => ({ ...d, originalIndex: i }));
                
                if (window.__3D_STATE__.sorted) {
                    sortArray.sort((a, b) => a.value - b.value);
                }

                window.__3D_STATE__.sortOrder = sortArray.map(item => item.originalIndex);

                sortArray.forEach((item, newPosIndex) => {
                    const origIdx = item.originalIndex;
                    const targetX = START_X + newPosIndex * BAR_SPACING;
                    
                    gsap.to(bars[origIdx].position, { x: targetX, duration: 1, ease: "power2.inOut" });
                    gsap.to(catLabels[origIdx].mesh.position, { x: targetX, duration: 1, ease: "power2.inOut" });
                    gsap.to(valueLabels[origIdx].mesh.position, { x: targetX, duration: 1, ease: "power2.inOut" });
                });

                setTimeout(() => {
                    updateState();
                    updateBottlePosition(true);
                    window.__3D_STATE__.animating = false;
                }, 1000);
            }
            else if (key === 't') {
                // Toggle Geometry
                window.__3D_STATE__.cylinderMode = !window.__3D_STATE__.cylinderMode;
                const newGeo = window.__3D_STATE__.cylinderMode ? cylGeo : boxGeo;
                bars.forEach(bar => {
                    bar.geometry = newGeo;
                });
            }
            else if (key >= '1' && key <= '6') {
                // Isolate
                const idx = parseInt(key) - 1;
                if (window.__3D_STATE__.isolatedBar === idx) {
                    // Show all
                    window.__3D_STATE__.isolatedBar = -1;
                    bars.forEach(b => b.material.opacity = 1.0);
                } else {
                    window.__3D_STATE__.isolatedBar = idx;
                    bars.forEach((b, i) => {
                        b.material.opacity = (i === idx) ? 1.0 : 0.2;
                    });
                }
            }
        });

        // Reset Button
        document.getElementById('reset-btn').addEventListener('click', () => {
            window.__3D_STATE__.animating = true;
            currentData = JSON.parse(JSON.stringify(categories));
            window.__3D_STATE__.sorted = false;
            window.__3D_STATE__.sortOrder = [0, 1, 2, 3, 4, 5];
            window.__3D_STATE__.isolatedBar = -1;
            window.__3D_STATE__.selectedBar = -1;
            
            if (!window.__3D_STATE__.particlesVisible) {
                window.__3D_STATE__.particlesVisible = true;
                particleSystem.visible = true;
                document.getElementById('particle-indicator').innerText = 'Particles: ON';
            }

            if (window.__3D_STATE__.cylinderMode) {
                window.__3D_STATE__.cylinderMode = false;
                bars.forEach(bar => bar.geometry = boxGeo);
            }

            bars.forEach((bar, i) => {
                bar.material.opacity = 1.0;
                bar.userData.currentYOffset = 0;
                
                const targetX = START_X + i * BAR_SPACING;
                const targetHeight = currentData[i].value / 20.0;

                gsap.to(bar.position, { x: targetX, y: 0, duration: 1, ease: "power2.out" });
                gsap.to(bar.scale, { y: targetHeight, duration: 1, ease: "power2.out" });
                
                gsap.to(catLabels[i].mesh.position, { x: targetX, duration: 1, ease: "power2.out" });
                
                gsap.to(valueLabels[i].mesh.position, { 
                    x: targetX, 
                    y: targetHeight + 0.5, 
                    duration: 1, 
                    ease: "power2.out",
                    onUpdate: () => updateTextPlane(valueLabels[i], currentData[i].value.toString(), true)
                });
            });

            setTimeout(() => {
                updateState();
                updateBottlePosition(true);
                window.__3D_STATE__.animating = false;
            }, 1000);
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            window.__3D_STATE__.frameCount++;

            controls.update();

            // Update WaterBottle Rotation
            if (waterBottle) {
                waterBottle.rotation.y += 1.0 * delta;
                window.__3D_STATE__.bottleRotation = waterBottle.rotation.y;
            }

            // Update Particles
            if (window.__3D_STATE__.particlesVisible) {
                const positions = particleSystem.geometry.attributes.position.array;
                
                for (let i = 0; i < particleCount; i++) {
                    const p = pData[i];
                    const bar = bars[p.barIndex];
                    
                    // Speed multiplier on hover
                    const speedMult = (window.__3D_STATE__.hoveredBar === p.barIndex) ? 3.0 : 1.0;
                    
                    positions[i * 3 + 1] += p.velocity * speedMult * delta;

                    // Reset if too high
                    if (positions[i * 3 + 1] > 12) {
                        positions[i * 3] = bar.position.x + p.offsetX;
                        positions[i * 3 + 1] = bar.position.y + bar.scale.y; // Start at top of bar
                        positions[i * 3 + 2] = bar.position.z + p.offsetZ;
                    } else {
                        // Follow bar X position if it moves (sorting)
                        // Interpolate slightly towards target X to keep particles aligned
                        const targetX = bar.position.x + p.offsetX;
                        positions[i * 3] += (targetX - positions[i * 3]) * 0.1;
                    }
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
            }

            // Make value labels face camera
            valueLabels.forEach(label => {
                label.mesh.quaternion.copy(camera.quaternion);
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
