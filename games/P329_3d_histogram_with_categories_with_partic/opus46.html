<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Category Histogram</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: Arial, sans-serif; }
canvas { display: block; }
#hud-title {
    position: absolute; top: 15px; left: 20px;
    color: white; font-size: 24px; font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
}
#hud-stats {
    position: absolute; top: 15px; right: 20px;
    color: white; font-size: 16px; text-align: right;
    line-height: 1.6;
}
#hud-particles {
    position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
    color: white; font-size: 16px; font-weight: bold;
    background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 5px;
}
#legend {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 15px; background: rgba(0,0,0,0.5);
    padding: 8px 15px; border-radius: 5px;
}
.legend-item {
    display: flex; align-items: center; gap: 5px; color: white; font-size: 13px;
}
.legend-color {
    width: 16px; height: 16px; border-radius: 2px;
}
#reset-btn {
    position: absolute; bottom: 15px; right: 20px;
    padding: 10px 20px; background: #e74c3c; color: white;
    border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold;
}
#reset-btn:hover { background: #c0392b; }
#instructions {
    position: absolute; bottom: 60px; left: 20px; color: rgba(255,255,255,0.5);
    font-size: 11px; line-height: 1.5;
}
</style>
</head>
<body>

<div id="hud-title">3D Category Histogram</div>
<div id="hud-stats">
    <div id="stat-total">Total: 627</div>
    <div id="stat-avg">Average: 104.50</div>
</div>
<div id="hud-particles">Particles: ON</div>
<div id="legend"></div>
<button id="reset-btn">Reset</button>
<div id="instructions">
    R: Randomize | P: Particles | S: Sort | T: Toggle Geometry<br>
    1-6: Isolate Bar | Click: Select | Hover: Highlight
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Constants ---
const CATEGORIES = ['Food', 'Tech', 'Health', 'Sports', 'Music', 'Travel'];
const INITIAL_VALUES = [85, 142, 67, 110, 95, 128];
const BAR_COLORS_HEX = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c'];
const BAR_COLORS = BAR_COLORS_HEX.map(c => new THREE.Color(c));
const BAR_WIDTH = 1.2;
const BAR_DEPTH = 1.2;
const BAR_SPACING = 2.0;
const PARTICLE_COUNT = 500;
const PARTICLES_PER_BAR = Math.floor(PARTICLE_COUNT / 6);
const EXTRA_PARTICLES = PARTICLE_COUNT - PARTICLES_PER_BAR * 6;

// --- State ---
const state = {
    barValues: [...INITIAL_VALUES],
    barHeights: INITIAL_VALUES.map(v => v / 20.0),
    selectedBar: -1,
    hoveredBar: -1,
    particlesVisible: true,
    particleCount: PARTICLE_COUNT,
    totalValue: INITIAL_VALUES.reduce((a, b) => a + b, 0),
    averageValue: parseFloat((INITIAL_VALUES.reduce((a, b) => a + b, 0) / 6).toFixed(2)),
    sorted: false,
    sortOrder: [0, 1, 2, 3, 4, 5],
    cylinderMode: false,
    isolatedBar: -1,
    bottleLoaded: false,
    bottleRotation: 0,
    animating: false,
    barPositionsX: [],
    frameCount: 0
};

// Calculate initial X positions
function getDefaultXPositions() {
    const positions = [];
    const totalWidth = (CATEGORIES.length - 1) * BAR_SPACING;
    const startX = -totalWidth / 2;
    for (let i = 0; i < 6; i++) {
        positions.push(startX + i * BAR_SPACING);
    }
    return positions;
}
state.barPositionsX = getDefaultXPositions();

window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(12, 10, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 15, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// --- Ground Plane ---
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// --- Helper: Create text texture ---
function createTextTexture(text, fontSize, color, bgColor, width, height) {
    const canvas = document.createElement('canvas');
    canvas.width = width || 256;
    canvas.height = height || 64;
    const ctx = canvas.getContext('2d');
    if (bgColor) {
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    ctx.fillStyle = color || 'white';
    ctx.font = `bold ${fontSize || 32}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, canvas.width / 2, canvas.height / 2);
    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
}

// --- Bars ---
const bars = [];
const barMeshes = [];
const categoryLabels = [];
const valueLabels = [];
const barGroups = []; // groups that hold bar + labels

function createBarGeometry(width, height, depth, cylinder) {
    if (cylinder) {
        return new THREE.CylinderGeometry(width / 2, width / 2, height, 32);
    }
    return new THREE.BoxGeometry(width, height, depth);
}

function createBar(index) {
    const group = new THREE.Group();
    const value = state.barValues[index];
    const height = value / 20.0;
    const color = BAR_COLORS[index];

    // Bar mesh
    const geo = createBarGeometry(BAR_WIDTH, height, BAR_DEPTH, state.cylinderMode);
    const mat = new THREE.MeshStandardMaterial({
        color: color,
        metalness: 0.3,
        roughness: 0.5,
        transparent: true,
        opacity: 1.0
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = height / 2;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData.barIndex = index;
    group.add(mesh);

    // Category label below bar
    const catTex = createTextTexture(CATEGORIES[index], 36, 'white', null, 256, 64);
    const catMat = new THREE.MeshBasicMaterial({ map: catTex, transparent: true, side: THREE.DoubleSide });
    const catPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.4), catMat);
    catPlane.rotation.x = -Math.PI / 2;
    catPlane.position.y = 0.01;
    catPlane.position.z = BAR_DEPTH / 2 + 0.5;
    group.add(catPlane);

    // Value label above bar
    const valTex = createTextTexture(String(value), 40, BAR_COLORS_HEX[index], null, 128, 64);
    const valMat = new THREE.MeshBasicMaterial({ map: valTex, transparent: true, side: THREE.DoubleSide });
    const valPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 0.4), valMat);
    valPlane.position.y = height + 0.3;
    valPlane.lookAt(camera.position);
    group.add(valPlane);

    const x = state.barPositionsX[index];
    group.position.x = x;

    scene.add(group);

    return { group, mesh, catPlane, valPlane, mat, targetHeight: height, currentHeight: height, targetX: x, currentX: x, selectOffset: 0, targetSelectOffset: 0 };
}

for (let i = 0; i < 6; i++) {
    const bar = createBar(i);
    bars.push(bar);
    barMeshes.push(bar.mesh);
}

function updateValueLabel(index) {
    const bar = bars[index];
    const value = state.barValues[index];
    const valTex = createTextTexture(String(value), 40, BAR_COLORS_HEX[index], null, 128, 64);
    bar.valPlane.material.map.dispose();
    bar.valPlane.material.map = valTex;
    bar.valPlane.material.needsUpdate = true;
}

function updateBarGeometry(index) {
    const bar = bars[index];
    const height = bar.currentHeight;
    if (height <= 0.01) return;
    const oldGeo = bar.mesh.geometry;
    bar.mesh.geometry = createBarGeometry(BAR_WIDTH, height, BAR_DEPTH, state.cylinderMode);
    oldGeo.dispose();
    bar.mesh.position.y = height / 2 + bar.selectOffset;
    bar.valPlane.position.y = height + 0.3 + bar.selectOffset;
}

// --- Particle System ---
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleColors = new Float32Array(PARTICLE_COUNT * 3);
const particleVelocities = new Float32Array(PARTICLE_COUNT);
const particleBarAssignment = new Int32Array(PARTICLE_COUNT);

function initParticles() {
    let pIdx = 0;
    for (let b = 0; b < 6; b++) {
        const count = b < EXTRA_PARTICLES ? PARTICLES_PER_BAR + 1 : PARTICLES_PER_BAR;
        const barHeight = state.barHeights[b];
        const barX = state.barPositionsX[b];
        const color = BAR_COLORS[b];
        for (let p = 0; p < count; p++) {
            if (pIdx >= PARTICLE_COUNT) break;
            particleBarAssignment[pIdx] = b;
            resetParticle(pIdx, barX, barHeight);
            particleColors[pIdx * 3] = color.r;
            particleColors[pIdx * 3 + 1] = color.g;
            particleColors[pIdx * 3 + 2] = color.b;
            pIdx++;
        }
    }
}

function resetParticle(idx, barX, barHeight) {
    particlePositions[idx * 3] = barX + (Math.random() - 0.5) * BAR_WIDTH;
    particlePositions[idx * 3 + 1] = barHeight + Math.random() * 0.5;
    particlePositions[idx * 3 + 2] = (Math.random() - 0.5) * BAR_DEPTH;
    particleVelocities[idx] = 0.5 + Math.random() * 1.5;
}

initParticles();

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

const particleMat = new THREE.PointsMaterial({
    size: 0.08,
    vertexColors: true,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

const particleSystem = new THREE.Points(particleGeo, particleMat);
scene.add(particleSystem);

// --- WaterBottle Model ---
let bottleModel = null;
let bottleTallestBarIndex = 1; // Tech is tallest initially

function findTallestBarIndex() {
    let maxVal = -1;
    let maxIdx = 0;
    for (let i = 0; i < 6; i++) {
        if (state.barValues[i] > maxVal) {
            maxVal = state.barValues[i];
            maxIdx = i;
        }
    }
    return maxIdx;
}

function updateBottlePosition() {
    if (!bottleModel) return;
    bottleTallestBarIndex = findTallestBarIndex();
    const bar = bars[bottleTallestBarIndex];
    const barHeight = bar.currentHeight;
    const barX = bar.group.position.x;
    bottleModel.position.x = barX;
    bottleModel.position.y = barHeight + 0.5 + bar.selectOffset;
    bottleModel.position.z = 0;
}

const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/WaterBottle/glTF-Binary/WaterBottle.glb',
    (gltf) => {
        bottleModel = gltf.scene;
        bottleModel.scale.set(3, 3, 3);
        bottleModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });
        updateBottlePosition();
        scene.add(bottleModel);
        state.bottleLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load WaterBottle.glb:', error);
        // Create a fallback trophy
        const trophyGeo = new THREE.ConeGeometry(0.3, 0.8, 8);
        const trophyMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });
        bottleModel = new THREE.Mesh(trophyGeo, trophyMat);
        bottleModel.castShadow = true;
        updateBottlePosition();
        scene.add(bottleModel);
        state.bottleLoaded = true;
    }
);

// --- Legend ---
const legendDiv = document.getElementById('legend');
for (let i = 0; i < 6; i++) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const colorBox = document.createElement('div');
    colorBox.className = 'legend-color';
    colorBox.style.backgroundColor = BAR_COLORS_HEX[i];
    const label = document.createElement('span');
    label.textContent = CATEGORIES[i];
    item.appendChild(colorBox);
    item.appendChild(label);
    legendDiv.appendChild(item);
}

// --- Raycasting ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const meshes = bars.map(b => b.mesh);
    const intersects = raycaster.intersectObjects(meshes);

    // Reset previous hover
    if (state.hoveredBar >= 0) {
        bars[state.hoveredBar].mat.emissive.setHex(0x000000);
    }

    if (intersects.length > 0) {
        const idx = intersects[0].object.userData.barIndex;
        state.hoveredBar = idx;
        bars[idx].mat.emissive.setHex(0x333333);
        renderer.domElement.style.cursor = 'pointer';
    } else {
        state.hoveredBar = -1;
        renderer.domElement.style.cursor = 'default';
    }
}

function onClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const meshes = bars.map(b => b.mesh);
    const intersects = raycaster.intersectObjects(meshes);

    if (intersects.length > 0) {
        const idx = intersects[0].object.userData.barIndex;
        if (state.selectedBar === idx) {
            // Deselect
            bars[idx].targetSelectOffset = 0;
            state.selectedBar = -1;
        } else {
            // Deselect previous
            if (state.selectedBar >= 0) {
                bars[state.selectedBar].targetSelectOffset = 0;
            }
            state.selectedBar = idx;
            bars[idx].targetSelectOffset = 1.0;
        }
    }
}

renderer.domElement.addEventListener('mousemove', onMouseMove);
renderer.domElement.addEventListener('click', onClick);

// --- Animations ---
let animations = [];

function animateBarsToTargets(duration) {
    state.animating = true;
    const startTime = performance.now();
    const startHeights = bars.map(b => b.currentHeight);
    const startXs = bars.map(b => b.currentX);
    const targetHeights = bars.map(b => b.targetHeight);
    const targetXs = bars.map(b => b.targetX);

    const anim = {
        update: (now) => {
            const t = Math.min((now - startTime) / (duration * 1000), 1);
            const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; // easeInOut
            for (let i = 0; i < 6; i++) {
                bars[i].currentHeight = startHeights[i] + (targetHeights[i] - startHeights[i]) * ease;
                bars[i].currentX = startXs[i] + (targetXs[i] - startXs[i]) * ease;
                bars[i].group.position.x = bars[i].currentX;
                state.barPositionsX[i] = bars[i].currentX;
                updateBarGeometry(i);
            }
            updateBottlePosition();
            if (t >= 1) {
                state.animating = false;
                return true; // done
            }
            return false;
        }
    };
    animations.push(anim);
}

// --- Keyboard ---
function onKeyDown(event) {
    const key = event.key.toLowerCase();

    if (key === 'r') {
        // Randomize
        for (let i = 0; i < 6; i++) {
            state.barValues[i] = Math.floor(50 + Math.random() * 101);
            state.barHeights[i] = state.barValues[i] / 20.0;
            bars[i].targetHeight = state.barHeights[i];
            updateValueLabel(i);
        }
        updateStats();
        animateBarsToTargets(1.0);
    } else if (key === 'p') {
        state.particlesVisible = !state.particlesVisible;
        particleSystem.visible = state.particlesVisible;
        document.getElementById('hud-particles').textContent = `Particles: ${state.particlesVisible ? 'ON' : 'OFF'}`;
    } else if (key === 's') {
        if (!state.sorted) {
            // Sort ascending by value
            const indices = state.sortOrder.slice();
            indices.sort((a, b) => state.barValues[a] - state.barValues[b]);
            state.sortOrder = indices;
            const defaultX = getDefaultXPositions();
            for (let pos = 0; pos < 6; pos++) {
                const barIdx = indices[pos];
                bars[barIdx].targetX = defaultX[pos];
            }
            state.sorted = true;
        } else {
            // Unsort
            state.sortOrder = [0, 1, 2, 3, 4, 5];
            const defaultX = getDefaultXPositions();
            for (let i = 0; i < 6; i++) {
                bars[i].targetX = defaultX[i];
            }
            state.sorted = false;
        }
        animateBarsToTargets(1.0);
    } else if (key === 't') {
        state.cylinderMode = !state.cylinderMode;
        for (let i = 0; i < 6; i++) {
            updateBarGeometry(i);
        }
    } else if (key >= '1' && key <= '6') {
        const idx = parseInt(key) - 1;
        if (state.isolatedBar === idx) {
            // Show all
            state.isolatedBar = -1;
            for (let i = 0; i < 6; i++) {
                bars[i].mat.opacity = 1.0;
            }
        } else {
            state.isolatedBar = idx;
            for (let i = 0; i < 6; i++) {
                bars[i].mat.opacity = i === idx ? 1.0 : 0.2;
            }
        }
    }
}

document.addEventListener('keydown', onKeyDown);

// --- Reset Button ---
document.getElementById('reset-btn').addEventListener('click', () => {
    // Reset values
    for (let i = 0; i < 6; i++) {
        state.barValues[i] = INITIAL_VALUES[i];
        state.barHeights[i] = INITIAL_VALUES[i] / 20.0;
        bars[i].targetHeight = state.barHeights[i];
        updateValueLabel(i);
    }

    // Deselect
    if (state.selectedBar >= 0) {
        bars[state.selectedBar].targetSelectOffset = 0;
    }
    state.selectedBar = -1;

    // Unsort
    state.sorted = false;
    state.sortOrder = [0, 1, 2, 3, 4, 5];
    const defaultX = getDefaultXPositions();
    for (let i = 0; i < 6; i++) {
        bars[i].targetX = defaultX[i];
    }

    // Show all
    state.isolatedBar = -1;
    for (let i = 0; i < 6; i++) {
        bars[i].mat.opacity = 1.0;
    }

    // Show particles
    state.particlesVisible = true;
    particleSystem.visible = true;
    document.getElementById('hud-particles').textContent = 'Particles: ON';

    // Reset cylinder mode
    if (state.cylinderMode) {
        state.cylinderMode = false;
        for (let i = 0; i < 6; i++) {
            updateBarGeometry(i);
        }
    }

    updateStats();
    animateBarsToTargets(1.0);
});

// --- Stats ---
function updateStats() {
    state.totalValue = state.barValues.reduce((a, b) => a + b, 0);
    state.averageValue = parseFloat((state.totalValue / 6).toFixed(2));
    document.getElementById('stat-total').textContent = `Total: ${state.totalValue}`;
    document.getElementById('stat-avg').textContent = `Average: ${state.averageValue.toFixed(2)}`;
}
updateStats();

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const now = performance.now();
    state.frameCount++;

    controls.update();

    // Process animations
    animations = animations.filter(a => !a.update(now));

    // Smooth select offset
    for (let i = 0; i < 6; i++) {
        const bar = bars[i];
        const diff = bar.targetSelectOffset - bar.selectOffset;
        if (Math.abs(diff) > 0.001) {
            bar.selectOffset += diff * Math.min(delta * 5, 1);
            bar.mesh.position.y = bar.currentHeight / 2 + bar.selectOffset;
            bar.valPlane.position.y = bar.currentHeight + 0.3 + bar.selectOffset;
        }
    }

    // Rotate bottle
    if (bottleModel) {
        bottleModel.rotation.y += 1.0 * delta;
        state.bottleRotation = bottleModel.rotation.y;
        updateBottlePosition();
    }

    // Update particles
    if (state.particlesVisible) {
        const posAttr = particleGeo.getAttribute('position');
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const barIdx = particleBarAssignment[i];
            let speed = particleVelocities[i];
            if (state.hoveredBar === barIdx) {
                speed *= 3;
            }
            particlePositions[i * 3 + 1] += speed * delta;

            // Add slight horizontal drift
            particlePositions[i * 3] += (Math.random() - 0.5) * 0.02;
            particlePositions[i * 3 + 2] += (Math.random() - 0.5) * 0.02;

            if (particlePositions[i * 3 + 1] > 12) {
                const barX = bars[barIdx].group.position.x;
                const barHeight = bars[barIdx].currentHeight;
                resetParticle(i, barX, barHeight);
            }
        }
        posAttr.needsUpdate = true;
    }

    // Billboard value labels
    for (let i = 0; i < 6; i++) {
        bars[i].valPlane.lookAt(camera.position);
    }

    // Update state
    state.barHeights = state.barValues.map(v => v / 20.0);

    renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
