<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Category Histogram</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      color: white;
      pointer-events: none;
      z-index: 10;
      user-select: none;
    }

    #title {
      top: 16px;
      left: 16px;
      font-size: 24px;
      font-weight: bold;
    }

    #stats {
      top: 16px;
      right: 16px;
      text-align: right;
      font-size: 18px;
      line-height: 1.4;
    }

    #particlesIndicator {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: bold;
    }

    #legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      z-index: 10;
      color: white;
      font-size: 14px;
      max-width: calc(100vw - 180px);
      pointer-events: none;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex: 0 0 14px;
    }

    #resetBtn {
      position: absolute;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #e74c3c;
      color: white;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    #resetBtn:hover {
      filter: brightness(1.1);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="title" class="hud">3D Category Histogram</div>
    <div id="particlesIndicator" class="hud">Particles: ON</div>
    <div id="stats" class="hud">
      <div id="totalText">Total: 0</div>
      <div id="avgText">Average: 0.00</div>
    </div>
    <div id="legend"></div>
    <button id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const totalText = document.getElementById('totalText');
    const avgText = document.getElementById('avgText');
    const particlesIndicator = document.getElementById('particlesIndicator');
    const legend = document.getElementById('legend');
    const resetBtn = document.getElementById('resetBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(12, 10, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 50;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: '#444444', metalness: 0.1, roughness: 0.9 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const categories = ['Food', 'Tech', 'Health', 'Sports', 'Music', 'Travel'];
    const initialValues = [85, 142, 67, 110, 95, 128];
    const barColors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c'];
    const barWidth = 1.2;
    const barDepth = 1.2;
    const spacing = 2.0;
    const particleCount = 500;

    function valueToHeight(v) {
      return v / 20.0;
    }

    function makeCanvasLabel(text, width = 256, height = 64, fontSize = 28, bg = 'rgba(0,0,0,0)', color = '#ffffff') {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);
      ctx.font = `bold ${fontSize}px Arial`;
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, width / 2, height / 2);
      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      return tex;
    }

    function createTextPlane(text, w = 1.6, h = 0.4, fontSize = 28) {
      const tex = makeCanvasLabel(text, 512, 128, fontSize);
      const mat = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: true,
        depthWrite: false
      });
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
      mesh.renderOrder = 10;
      mesh.userData.texture = tex;
      return mesh;
    }

    function updateTextPlane(mesh, text, fontSize = 28) {
      const tex = makeCanvasLabel(text, 512, 128, fontSize);
      mesh.material.map.dispose();
      mesh.material.map = tex;
      mesh.material.needsUpdate = true;
      mesh.userData.texture = tex;
    }

    const bars = [];
    const categoryLabels = [];
    const valueLabels = [];

    const baseXPositions = Array.from({ length: 6 }, (_, i) => (i - 2.5) * spacing);

    let barValues = initialValues.slice();
    let sorted = false;
    let sortOrder = [0, 1, 2, 3, 4, 5];
    let selectedBar = -1;
    let hoveredBar = -1;
    let isolatedBar = -1;
    let particlesVisible = true;
    let cylinderMode = false;
    let bottleLoaded = false;
    let bottle = null;
    let bottleRotation = 0;
    let frameCount = 0;
    let animating = false;

    const geometryBox = new THREE.BoxGeometry(barWidth, 1, barDepth);
    const geometryCylinder = new THREE.CylinderGeometry(barWidth * 0.5, barWidth * 0.5, 1, 32);

    function currentOrderX(orderIndex) {
      return (orderIndex - 2.5) * spacing;
    }

    function getMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color,
        metalness: 0.3,
        roughness: 0.5,
        emissive: 0x000000
      });
    }

    for (let i = 0; i < 6; i++) {
      const h = valueToHeight(barValues[i]);
      const mesh = new THREE.Mesh(geometryBox, getMaterial(barColors[i]));
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.scale.y = h;
      mesh.position.set(baseXPositions[i], h / 2, 0);
      mesh.userData = {
        index: i,
        value: barValues[i],
        targetValue: barValues[i],
        height: h,
        targetHeight: h,
        baseLift: 0,
        targetLift: 0,
        currentX: baseXPositions[i],
        targetX: baseXPositions[i],
        animHeightStart: h,
        animHeightEnd: h,
        animHeightTime: 0,
        animHeightDuration: 0,
        animXStart: baseXPositions[i],
        animXEnd: baseXPositions[i],
        animXTime: 0,
        animXDuration: 0,
        animLiftStart: 0,
        animLiftEnd: 0,
        animLiftTime: 0,
        animLiftDuration: 0,
      };
      scene.add(mesh);
      bars.push(mesh);

      const catLabel = createTextPlane(categories[i], 1.8, 0.45, 34);
      catLabel.position.set(baseXPositions[i], 0.25, -1.2);
      scene.add(catLabel);
      categoryLabels.push(catLabel);

      const valLabel = createTextPlane(String(barValues[i]), 1.2, 0.36, 34);
      valLabel.position.set(baseXPositions[i], h + 0.5, 0);
      scene.add(valLabel);
      valueLabels.push(valLabel);
    }

    function refreshLegend() {
      legend.innerHTML = '';
      for (let i = 0; i < categories.length; i++) {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<span class="legend-color" style="background:${barColors[i]}"></span><span>${categories[i]}</span>`;
        legend.appendChild(item);
      }
    }
    refreshLegend();

    function updateHUD() {
      const total = barValues.reduce((a, b) => a + b, 0);
      const avg = total / barValues.length;
      totalText.textContent = `Total: ${total}`;
      avgText.textContent = `Average: ${avg.toFixed(2)}`;
      particlesIndicator.textContent = `Particles: ${particlesVisible ? 'ON' : 'OFF'}`;
    }
    updateHUD();

    function setIsolation(index) {
      isolatedBar = index;
      for (let i = 0; i < bars.length; i++) {
        const visibleAlpha = (isolatedBar === -1 || isolatedBar === i) ? 1.0 : 0.2;
        bars[i].material.transparent = visibleAlpha < 1.0;
        bars[i].material.opacity = visibleAlpha;
        categoryLabels[i].material.opacity = visibleAlpha;
        categoryLabels[i].material.transparent = visibleAlpha < 1.0;
        valueLabels[i].material.opacity = visibleAlpha;
        valueLabels[i].material.transparent = visibleAlpha < 1.0;
      }
    }

    function animateLift(index, targetLift, duration = 0.5) {
      const b = bars[index];
      b.userData.animLiftStart = b.userData.baseLift;
      b.userData.animLiftEnd = targetLift;
      b.userData.animLiftTime = 0;
      b.userData.animLiftDuration = duration;
      b.userData.targetLift = targetLift;
    }

    function animateHeight(index, newValue, duration = 1.0) {
      const b = bars[index];
      const newHeight = valueToHeight(newValue);
      b.userData.value = newValue;
      b.userData.targetValue = newValue;
      b.userData.animHeightStart = b.userData.height;
      b.userData.animHeightEnd = newHeight;
      b.userData.animHeightTime = 0;
      b.userData.animHeightDuration = duration;
      b.userData.targetHeight = newHeight;
      updateTextPlane(valueLabels[index], String(newValue), 34);
    }

    function animateX(index, targetX, duration = 1.0) {
      const b = bars[index];
      b.userData.animXStart = b.userData.currentX;
      b.userData.animXEnd = targetX;
      b.userData.animXTime = 0;
      b.userData.animXDuration = duration;
      b.userData.targetX = targetX;
    }

    function syncLabelPositions(index) {
      const b = bars[index];
      categoryLabels[index].position.x = b.position.x;
      categoryLabels[index].position.y = 0.25 + b.userData.baseLift;
      valueLabels[index].position.x = b.position.x;
      valueLabels[index].position.y = b.userData.height + 0.5 + b.userData.baseLift;
      categoryLabels[index].lookAt(camera.position);
      valueLabels[index].lookAt(camera.position);
    }

    function applyBarGeometry() {
      for (let i = 0; i < bars.length; i++) {
        const oldGeo = bars[i].geometry;
        bars[i].geometry = cylinderMode ? geometryCylinder : geometryBox;
        if (oldGeo !== geometryBox && oldGeo !== geometryCylinder) oldGeo.dispose();
      }
    }

    const particlePositions = new Float32Array(particleCount * 3);
    const particleColors = new Float32Array(particleCount * 3);
    const particleVelocities = new Float32Array(particleCount);
    const particleBarIndex = new Uint8Array(particleCount);

    const colorTmp = new THREE.Color();

    function randomInBar(i, useTop = false) {
      const x = bars[i].position.x + (Math.random() - 0.5) * barWidth * 0.9;
      const z = (Math.random() - 0.5) * barDepth * 0.9;
      const topY = bars[i].userData.height + bars[i].userData.baseLift;
      const y = useTop ? topY + Math.random() * 0.2 : Math.random() * Math.max(topY, 0.1);
      return { x, y, z };
    }

    for (let i = 0; i < particleCount; i++) {
      const barIndex = i % 6;
      particleBarIndex[i] = barIndex;
      const p = randomInBar(barIndex, false);
      particlePositions[i * 3 + 0] = p.x;
      particlePositions[i * 3 + 1] = p.y;
      particlePositions[i * 3 + 2] = p.z;
      particleVelocities[i] = 0.5 + Math.random() * 1.5;
      colorTmp.set(barColors[barIndex]);
      particleColors[i * 3 + 0] = colorTmp.r;
      particleColors[i * 3 + 1] = colorTmp.g;
      particleColors[i * 3 + 2] = colorTmp.b;
    }

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.08,
      vertexColors: true,
      transparent: true,
      opacity: 0.95,
      depthWrite: false
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const loader = new GLTFLoader();
    loader.load(
      'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/WaterBottle/glTF-Binary/WaterBottle.glb',
      (gltf) => {
        bottle = gltf.scene;
        bottle.scale.set(3, 3, 3);
        bottle.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(bottle);
        bottleLoaded = true;
        positionBottle();
      },
      undefined,
      () => {
        bottleLoaded = false;
      }
    );

    function tallestBarIndex() {
      let maxI = 0;
      let maxV = barValues[0];
      for (let i = 1; i < barValues.length; i++) {
        if (barValues[i] > maxV) {
          maxV = barValues[i];
          maxI = i;
        }
      }
      return maxI;
    }

    function positionBottle() {
      if (!bottle) return;
      const idx = 1;
      const b = bars[idx];
      bottle.position.set(b.position.x, b.userData.height + b.userData.baseLift + 0.5, 0);
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onMouseMove(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function updateHover() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(bars, false);
      const newHover = intersects.length ? intersects[0].object.userData.index : -1;
      hoveredBar = newHover;
      for (let i = 0; i < bars.length; i++) {
        bars[i].material.emissive.setHex(i === hoveredBar ? 0x333333 : 0x000000);
      }
    }

    function onClick() {
      updateHover();
      if (hoveredBar === -1) return;
      if (selectedBar === hoveredBar) {
        animateLift(selectedBar, 0, 0.5);
        selectedBar = -1;
      } else {
        if (selectedBar !== -1) animateLift(selectedBar, 0, 0.5);
        selectedBar = hoveredBar;
        animateLift(selectedBar, 1.0, 0.5);
      }
    }

    function randomizeValues() {
      for (let i = 0; i < 6; i++) {
        const v = Math.floor(50 + Math.random() * 101);
        barValues[i] = v;
        animateHeight(i, v, 1.0);
      }
    }

    function sortBarsAscending() {
      const pairs = barValues.map((v, i) => ({ v, i }));
      pairs.sort((a, b) => a.v - b.v);
      sortOrder = pairs.map(p => p.i);
      for (let orderPos = 0; orderPos < sortOrder.length; orderPos++) {
        const barIndex = sortOrder[orderPos];
        animateX(barIndex, currentOrderX(orderPos), 1.0);
      }
      sorted = true;
    }

    function unsortBars() {
      sortOrder = [0, 1, 2, 3, 4, 5];
      for (let i = 0; i < 6; i++) {
        animateX(i, baseXPositions[i], 1.0);
      }
      sorted = false;
    }

    function toggleSort() {
      if (sorted) unsortBars();
      else sortBarsAscending();
    }

    function resetAll() {
      barValues = initialValues.slice();
      for (let i = 0; i < 6; i++) {
        animateHeight(i, initialValues[i], 1.0);
      }
      if (selectedBar !== -1) animateLift(selectedBar, 0, 0.5);
      selectedBar = -1;
      hoveredBar = -1;
      unsortBars();
      setIsolation(-1);
      particlesVisible = true;
      particles.visible = true;
      if (cylinderMode) {
        cylinderMode = false;
        applyBarGeometry();
      }
      updateHUD();
    }

    function handleKey(e) {
      const key = e.key.toLowerCase();
      if (key === 'r') randomizeValues();
      else if (key === 'p') {
        particlesVisible = !particlesVisible;
        particles.visible = particlesVisible;
      } else if (key === 's') {
        toggleSort();
      } else if (key === 't') {
        cylinderMode = !cylinderMode;
        applyBarGeometry();
      } else if (['1','2','3','4','5','6'].includes(key)) {
        const idx = parseInt(key, 10) - 1;
        if (isolatedBar === idx) setIsolation(-1);
        else setIsolation(idx);
      }
      updateHUD();
    }

    renderer.domElement.addEventListener('mousemove', onMouseMove);
    renderer.domElement.addEventListener('click', onClick);
    window.addEventListener('keydown', handleKey);
    resetBtn.addEventListener('click', resetAll);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    window.__3D_STATE__ = {};

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function updateAnimations(dt) {
      let anyAnimating = false;

      for (let i = 0; i < bars.length; i++) {
        const b = bars[i];
        const u = b.userData;

        if (u.animHeightTime < u.animHeightDuration) {
          u.animHeightTime += dt;
          const t = Math.min(u.animHeightTime / u.animHeightDuration, 1);
          const e = easeInOut(t);
          u.height = THREE.MathUtils.lerp(u.animHeightStart, u.animHeightEnd, e);
          b.scale.y = u.height;
          anyAnimating = true;
        }

        if (u.animXTime < u.animXDuration) {
          u.animXTime += dt;
          const t = Math.min(u.animXTime / u.animXDuration, 1);
          const e = easeInOut(t);
          u.currentX = THREE.MathUtils.lerp(u.animXStart, u.animXEnd, e);
          anyAnimating = true;
        }

        if (u.animLiftTime < u.animLiftDuration) {
          u.animLiftTime += dt;
          const t = Math.min(u.animLiftTime / u.animLiftDuration, 1);
          const e = easeInOut(t);
          u.baseLift = THREE.MathUtils.lerp(u.animLiftStart, u.animLiftEnd, e);
          anyAnimating = true;
        }

        b.position.x = u.currentX;
        b.position.y = u.height / 2 + u.baseLift;

        syncLabelPositions(i);
      }

      animating = anyAnimating;
    }

    function updateParticles(dt) {
      if (!particlesVisible) return;

      const pos = particleGeometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const barIndex = particleBarIndex[i];
        const speedMult = hoveredBar === barIndex ? 3.0 : 1.0;
        pos[i * 3 + 1] += particleVelocities[i] * speedMult * dt;

        if (pos[i * 3 + 1] > 12) {
          const p = randomInBar(barIndex, true);
          pos[i * 3 + 0] = p.x;
          pos[i * 3 + 1] = p.y;
          pos[i * 3 + 2] = p.z;
        } else {
          const centerX = bars[barIndex].position.x;
          const halfW = barWidth * 0.45;
          if (pos[i * 3 + 0] < centerX - halfW || pos[i * 3 + 0] > centerX + halfW) {
            pos[i * 3 + 0] = centerX + (Math.random() - 0.5) * barWidth * 0.9;
          }
        }
      }
      particleGeometry.attributes.position.needsUpdate = true;
    }

    function updateBottle(dt) {
      if (!bottle) return;
      bottleRotation += dt * 1.0;
      bottle.rotation.y = bottleRotation;
      positionBottle();
    }

    function updateState() {
      const total = barValues.reduce((a, b) => a + b, 0);
      const avg = total / barValues.length;

      window.__3D_STATE__ = {
        barValues: barValues.slice(),
        barHeights: bars.map(b => Number(b.userData.height.toFixed(3))),
        selectedBar,
        hoveredBar,
        particlesVisible,
        particleCount,
        totalValue: total,
        averageValue: Number(avg.toFixed(2)),
        sorted,
        sortOrder: sortOrder.slice(),
        cylinderMode,
        isolatedBar,
        bottleLoaded,
        bottleRotation,
        animating,
        barPositionsX: bars.map(b => Number(b.position.x.toFixed(3))),
        frameCount
      };
    }

    function updateDisplayedValuesFromBars() {
      for (let i = 0; i < 6; i++) {
        barValues[i] = bars[i].userData.targetValue;
      }
      updateHUD();
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      frameCount++;

      controls.update();
      updateHover();
      updateAnimations(dt);
      updateDisplayedValuesFromBars();
      updateParticles(dt);
      updateBottle(dt);

      renderer.render(scene, camera);
      updateState();
    }

    applyBarGeometry();
    setIsolation(-1);
    updateState();
    animate();
  </script>
</body>
</html>
