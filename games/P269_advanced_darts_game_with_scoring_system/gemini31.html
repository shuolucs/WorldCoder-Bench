<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Darts Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a3a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #hud {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn {
            pointer-events: auto;
            padding: 12px 24px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #2e7d32;
            border: 2px solid #1b5e20;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 50%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #388e3c;
        }
        #crosshair {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 30px;
            font-weight: light;
            transform: translate(-50%, -50%);
            text-shadow: 0 0 4px black;
            pointer-events: none;
        }
        .floating-score {
            position: absolute;
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            transition: transform 1.5s ease-out, opacity 1.5s ease-in;
            opacity: 1;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
        #game-over-text {
            display: none;
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 56px;
            font-weight: bold;
            text-shadow: 3px 3px 6px black;
            text-align: center;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="hud">
            <span id="hud-round">Round: 1/3</span>
            <span id="hud-darts">Darts: 3</span>
            <span id="hud-round-score">Round Score: 0</span>
            <span id="hud-total-score">Total Score: 0</span>
        </div>
        <div id="crosshair">+</div>
        
        <div id="game-over-text">
            Game Over<br>
            <span id="final-score" style="font-size: 36px; color: #ffd700;"></span>
        </div>
        
        <button id="btn-next" class="btn">Next Round</button>
        <button id="btn-new" class="btn" style="top: 55%;">New Game</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentRound: 1,
            dartsRemaining: 3,
            roundScore: 0,
            totalScore: 0,
            lastThrowScore: 0,
            gameOver: false,
            dartsOnBoard: 0,
            modelLoaded: false,
            dartPositions: [],
            phase: 'aiming' // 'aiming', 'throwing', 'roundEnd', 'gameOver'
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a3a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        const origCamPos = new THREE.Vector3(0, 1.5, 4);
        camera.position.copy(origCamPos);
        camera.lookAt(0, 1.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // Fill light for the dartboard
        const fillLight = new THREE.PointLight(0xffffff, 0.3);
        fillLight.position.set(0, 1.5, 0);
        scene.add(fillLight);

        // --- Environment ---
        // Pedestal
        const pedestalGeom = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const pedestal = new THREE.Mesh(pedestalGeom, pedestalMat);
        pedestal.position.set(-2.5, 0.25, -1);
        pedestal.castShadow = true;
        pedestal.receiveShadow = true;
        scene.add(pedestal);

        // Trophy Model
        let trophyModel = null;
        const loader = new GLTFLoader();
        loader.load('._BrainStem.glb', (gltf) => {
            trophyModel = gltf.scene;
            trophyModel.scale.set(0.005, 0.005, 0.005);
            trophyModel.position.set(-2.5, 0.5, -1);
            
            trophyModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(trophyModel);
            state.modelLoaded = true;
        }, undefined, (error) => {
            console.warn('Could not load ._BrainStem.glb, continuing without trophy.', error);
        });

        // --- Dartboard ---
        const boardGroup = new THREE.Group();
        boardGroup.position.set(0, 1.5, -2);
        scene.add(boardGroup);

        // Base cylinder
        const baseGeom = new THREE.CylinderGeometry(0.6, 0.6, 0.05, 64);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const base = new THREE.Mesh(baseGeom, baseMat);
        base.rotation.x = Math.PI / 2;
        base.receiveShadow = true;
        boardGroup.add(base);

        // Helper for rings
        function createRing(inner, outer, color, zOffset, segments = 64) {
            const geom = new THREE.RingGeometry(inner, outer, segments);
            const mat = new THREE.MeshStandardMaterial({ color: color, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.z = zOffset;
            mesh.receiveShadow = true;
            return mesh;
        }

        // Sectors (visual only)
        const sectorZ = 0.026;
        for (let i = 0; i < 20; i++) {
            const color = i % 2 === 0 ? 0x222222 : 0xdddddd;
            const geom = new THREE.RingGeometry(0.1, 0.58, 3, 1, (i * Math.PI * 2) / 20, (Math.PI * 2) / 20);
            const mat = new THREE.MeshStandardMaterial({ color: color, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.z = sectorZ;
            mesh.receiveShadow = true;
            boardGroup.add(mesh);
        }

        // Scoring Rings
        boardGroup.add(createRing(0, 0.04, 0xcc0000, 0.028));       // Bullseye
        boardGroup.add(createRing(0.04, 0.1, 0x00cc00, 0.028));     // Bull
        boardGroup.add(createRing(0.25, 0.30, 0xcc0000, 0.028));    // Triple
        boardGroup.add(createRing(0.52, 0.58, 0xcc0000, 0.028));    // Double

        // --- Dart Mechanics ---
        const thrownDarts = [];
        let flyingDart = null;

        function createDartMesh() {
            const group = new THREE.Group();

            // Body (Cone pointing +Z, tip at origin)
            const bodyGeom = new THREE.ConeGeometry(0.015, 0.15, 16);
            bodyGeom.rotateX(Math.PI / 2);
            bodyGeom.translate(0, 0, -0.075);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.castShadow = true;
            group.add(body);

            // Tail
            const tailGeom = new THREE.ConeGeometry(0.02, 0.05, 4);
            tailGeom.rotateX(Math.PI / 2);
            tailGeom.translate(0, 0, -0.16);
            const tailMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
            const tail = new THREE.Mesh(tailGeom, tailMat);
            tail.castShadow = true;
            group.add(tail);

            return group;
        }

        // --- Interaction & Raycasting ---
        const planeZ = -2;
        const targetPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -planeZ);
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        const crosshairTarget = new THREE.Vector3(0, 1.5, planeZ);

        const crosshairEl = document.getElementById('crosshair');

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(targetPlane, crosshairTarget);

            if (state.phase === 'aiming') {
                const proj = crosshairTarget.clone().project(camera);
                const x = (proj.x * 0.5 + 0.5) * window.innerWidth;
                const y = (proj.y * -0.5 + 0.5) * window.innerHeight;
                crosshairEl.style.left = `${x}px`;
                crosshairEl.style.top = `${y}px`;
                crosshairEl.style.display = 'block';
            } else {
                crosshairEl.style.display = 'none';
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // Left click only
            if (state.phase === 'aiming' && state.dartsRemaining > 0) {
                throwDart();
            }
        });

        function throwDart() {
            state.phase = 'throwing';
            state.dartsRemaining--;
            updateUI();
            crosshairEl.style.display = 'none';

            // Scatter
            const scatterX = (Math.random() - 0.5) * 0.06;
            const scatterY = (Math.random() - 0.5) * 0.06;
            const finalTarget = crosshairTarget.clone();
            finalTarget.x += scatterX;
            finalTarget.y += scatterY;

            const dart = createDartMesh();
            dart.position.copy(camera.position);
            scene.add(dart);

            flyingDart = {
                mesh: dart,
                start: camera.position.clone(),
                end: finalTarget,
                startTime: performance.now(),
                duration: 400
            };
        }

        // --- Scoring & Game Logic ---
        let shakeEndTime = 0;

        function handleHit(point, dartMesh) {
            thrownDarts.push(dartMesh);
            state.dartsOnBoard++;
            state.dartPositions.push({ x: point.x, y: point.y, z: point.z });

            // Calculate score based on distance from center (0, 1.5, -2)
            const dx = point.x - 0;
            const dy = point.y - 1.5;
            const dist = Math.sqrt(dx * dx + dy * dy);

            let score = 0;
            if (dist < 0.04) score = 50;
            else if (dist < 0.10) score = 25;
            else if (dist < 0.25) score = 20;
            else if (dist < 0.30) score = 60;
            else if (dist < 0.52) score = 15;
            else if (dist < 0.58) score = 30;
            else score = 0;

            state.lastThrowScore = score;
            state.roundScore += score;
            state.totalScore += score;

            showFloatingScore(score, point);
            shakeEndTime = performance.now() + 100; // Camera shake

            if (state.dartsRemaining === 0) {
                if (state.currentRound >= 3) {
                    state.phase = 'gameOver';
                    state.gameOver = true;
                } else {
                    state.phase = 'roundEnd';
                }
            } else {
                state.phase = 'aiming';
            }
            updateUI();
        }

        // --- UI Updates ---
        const hudRound = document.getElementById('hud-round');
        const hudDarts = document.getElementById('hud-darts');
        const hudRoundScore = document.getElementById('hud-round-score');
        const hudTotalScore = document.getElementById('hud-total-score');
        const btnNext = document.getElementById('btn-next');
        const btnNew = document.getElementById('btn-new');
        const gameOverText = document.getElementById('game-over-text');
        const finalScoreText = document.getElementById('final-score');
        const uiLayer = document.getElementById('ui-layer');

        function updateUI() {
            hudRound.innerText = `Round: ${state.currentRound}/3`;
            hudDarts.innerText = `Darts: ${state.dartsRemaining}`;
            hudRoundScore.innerText = `Round Score: ${state.roundScore}`;
            hudTotalScore.innerText = `Total Score: ${state.totalScore}`;

            btnNext.style.display = state.phase === 'roundEnd' ? 'block' : 'none';
            
            if (state.phase === 'gameOver') {
                gameOverText.style.display = 'block';
                finalScoreText.innerText = `Score: ${state.totalScore}`;
                btnNew.style.display = 'block';
            } else {
                gameOverText.style.display = 'none';
                btnNew.style.display = 'none';
            }
        }

        function showFloatingScore(score, point) {
            const div = document.createElement('div');
            div.className = 'floating-score';
            div.innerText = score === 0 ? 'Miss' : score;
            uiLayer.appendChild(div);

            const proj = point.clone().project(camera);
            const x = (proj.x * 0.5 + 0.5) * window.innerWidth;
            const y = (proj.y * -0.5 + 0.5) * window.innerHeight;

            div.style.left = `${x}px`;
            div.style.top = `${y}px`;

            requestAnimationFrame(() => {
                div.style.transform = 'translate(-50%, -100px)';
                div.style.opacity = '0';
            });

            setTimeout(() => {
                if (div.parentNode) div.parentNode.removeChild(div);
            }, 1500);
        }

        // --- Buttons & Resets ---
        btnNext.addEventListener('click', () => {
            clearDarts();
            state.currentRound++;
            state.dartsRemaining = 3;
            state.roundScore = 0;
            state.phase = 'aiming';
            updateUI();
        });

        btnNew.addEventListener('click', resetGame);

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') resetGame();
        });

        function clearDarts() {
            thrownDarts.forEach(d => scene.remove(d));
            thrownDarts.length = 0;
            state.dartsOnBoard = 0;
            state.dartPositions = [];
        }

        function resetGame() {
            clearDarts();
            state.currentRound = 1;
            state.dartsRemaining = 3;
            state.roundScore = 0;
            state.totalScore = 0;
            state.lastThrowScore = 0;
            state.gameOver = false;
            state.phase = 'aiming';
            updateUI();
        }

        // --- Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const now = performance.now();

            // Trophy rotation
            if (trophyModel) {
                trophyModel.rotation.y += 0.5 * delta;
            }

            // Dart flight animation
            if (flyingDart) {
                let t = (now - flyingDart.startTime) / flyingDart.duration;
                if (t >= 1) {
                    t = 1;
                    flyingDart.mesh.position.copy(flyingDart.end);
                    handleHit(flyingDart.end, flyingDart.mesh);
                    flyingDart = null;
                } else {
                    const pos = new THREE.Vector3().lerpVectors(flyingDart.start, flyingDart.end, t);
                    // Parabolic arc
                    pos.y += Math.sin(t * Math.PI) * 0.3;
                    flyingDart.mesh.position.copy(pos);

                    // Orientation
                    const nextT = Math.min(1, t + 0.05);
                    const nextPos = new THREE.Vector3().lerpVectors(flyingDart.start, flyingDart.end, nextT);
                    nextPos.y += Math.sin(nextT * Math.PI) * 0.3;
                    flyingDart.mesh.lookAt(nextPos);
                }
            }

            // Camera shake
            if (now < shakeEndTime) {
                camera.position.x = origCamPos.x + (Math.random() - 0.5) * 0.02;
                camera.position.y = origCamPos.y + (Math.random() - 0.5) * 0.02;
            } else {
                camera.position.copy(origCamPos);
            }

            renderer.render(scene, camera);
        }

        // Init
        updateUI();
        animate();
    </script>
</body>
</html>
