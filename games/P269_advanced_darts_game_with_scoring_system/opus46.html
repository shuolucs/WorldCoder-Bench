<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Darts Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a3a1a; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.7);
    color: white;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 18px;
    padding: 12px 30px;
    border-radius: 10px;
    display: flex;
    gap: 30px;
    z-index: 10;
    user-select: none;
}

#hud .stat {
    text-align: center;
}

#hud .stat .label {
    font-size: 12px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#hud .stat .value {
    font-size: 24px;
    font-weight: bold;
    color: #fff;
}

#crosshair {
    position: absolute;
    pointer-events: none;
    color: rgba(255, 255, 0, 0.8);
    font-size: 30px;
    font-weight: bold;
    z-index: 5;
    transform: translate(-50%, -50%);
    text-shadow: 0 0 5px rgba(255,255,0,0.5);
    user-select: none;
}

#actionBtn {
    position: absolute;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: #c0392b;
    color: white;
    border: none;
    padding: 12px 30px;
    font-size: 18px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 10;
    display: none;
    font-weight: bold;
    transition: background 0.2s;
}

#actionBtn:hover {
    background: #e74c3c;
}

#floatingScore {
    position: absolute;
    pointer-events: none;
    color: #ffff00;
    font-size: 28px;
    font-weight: bold;
    z-index: 10;
    text-shadow: 0 0 10px rgba(255,255,0,0.8), 2px 2px 4px rgba(0,0,0,0.8);
    transition: opacity 0.5s, transform 0.5s;
    user-select: none;
}

#gameOverOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 20;
    color: white;
    font-family: 'Segoe UI', Arial, sans-serif;
}

#gameOverOverlay h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

#gameOverOverlay .finalScore {
    font-size: 36px;
    color: #f1c40f;
    margin-bottom: 30px;
}

#gameOverOverlay button {
    background: #27ae60;
    color: white;
    border: none;
    padding: 15px 40px;
    font-size: 22px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

#gameOverOverlay button:hover {
    background: #2ecc71;
}
</style>
</head>
<body>

<div id="hud">
    <div class="stat">
        <div class="label">Round</div>
        <div class="value" id="roundDisplay">1 / 3</div>
    </div>
    <div class="stat">
        <div class="label">Darts Left</div>
        <div class="value" id="dartsDisplay">3</div>
    </div>
    <div class="stat">
        <div class="label">Round Score</div>
        <div class="value" id="roundScoreDisplay">0</div>
    </div>
    <div class="stat">
        <div class="label">Total Score</div>
        <div class="value" id="totalScoreDisplay">0</div>
    </div>
</div>

<div id="crosshair">+</div>
<button id="actionBtn">Next Round</button>
<div id="floatingScore"></div>

<div id="gameOverOverlay">
    <h1>🎯 Game Over!</h1>
    <div class="finalScore" id="finalScoreText">Final Score: 0</div>
    <button id="newGameBtn">New Game</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
    currentRound: 1,
    dartsRemaining: 3,
    roundScore: 0,
    totalScore: 0,
    lastThrowScore: 0,
    gameOver: false,
    dartsOnBoard: 0,
    modelLoaded: false,
    dartPositions: [],
    phase: 'aiming'
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a3a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 4);
camera.lookAt(0, 1.5, -2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Add a subtle point light near the dartboard
const boardLight = new THREE.PointLight(0xffffcc, 0.8, 5);
boardLight.position.set(0, 2.5, -1);
scene.add(boardLight);

// --- Floor ---
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// --- Back Wall ---
const wallGeo = new THREE.PlaneGeometry(20, 10);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.8 });
const wall = new THREE.Mesh(wallGeo, wallMat);
wall.position.set(0, 5, -2.5);
wall.receiveShadow = true;
scene.add(wall);

// --- Pedestal ---
const pedestalGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.5, metalness: 0.3 });
const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
pedestal.position.set(-2.5, 0.25, -1);
pedestal.castShadow = true;
pedestal.receiveShadow = true;
scene.add(pedestal);

// --- Load BrainStem Model ---
let trophyModel = null;
const loader = new GLTFLoader();
loader.load(
    '._BrainStem.glb',
    (gltf) => {
        trophyModel = gltf.scene;
        trophyModel.scale.set(0.005, 0.005, 0.005);
        trophyModel.position.set(-2.5, 0.5, -1);
        trophyModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(trophyModel);
        state.modelLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load BrainStem model, creating placeholder trophy:', error);
        // Create a placeholder trophy
        const trophyGroup = new THREE.Group();
        
        // Cup body
        const cupGeo = new THREE.CylinderGeometry(0.12, 0.08, 0.25, 16);
        const cupMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.8, roughness: 0.2 });
        const cup = new THREE.Mesh(cupGeo, cupMat);
        cup.position.y = 0.2;
        cup.castShadow = true;
        trophyGroup.add(cup);
        
        // Cup stem
        const stemGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.1, 8);
        const stem = new THREE.Mesh(stemGeo, cupMat);
        stem.position.y = 0.05;
        stem.castShadow = true;
        trophyGroup.add(stem);
        
        // Cup base
        const baseGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.03, 16);
        const base = new THREE.Mesh(baseGeo, cupMat);
        base.position.y = 0.015;
        base.castShadow = true;
        trophyGroup.add(base);
        
        // Handles
        const handleGeo = new THREE.TorusGeometry(0.06, 0.015, 8, 16, Math.PI);
        const handleL = new THREE.Mesh(handleGeo, cupMat);
        handleL.position.set(-0.15, 0.22, 0);
        handleL.rotation.z = Math.PI / 2;
        handleL.castShadow = true;
        trophyGroup.add(handleL);
        
        const handleR = new THREE.Mesh(handleGeo, cupMat);
        handleR.position.set(0.15, 0.22, 0);
        handleR.rotation.z = -Math.PI / 2;
        handleR.castShadow = true;
        trophyGroup.add(handleR);
        
        trophyGroup.position.set(-2.5, 0.5, -1);
        scene.add(trophyGroup);
        trophyModel = trophyGroup;
        state.modelLoaded = true;
    }
);

// --- Dartboard ---
const boardGroup = new THREE.Group();
boardGroup.position.set(0, 1.5, -2);
scene.add(boardGroup);

// Main board body
const boardGeo = new THREE.CylinderGeometry(0.62, 0.62, 0.05, 64);
const boardMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
const boardMesh = new THREE.Mesh(boardGeo, boardMat);
boardMesh.rotation.x = Math.PI / 2;
boardMesh.castShadow = true;
boardMesh.receiveShadow = true;
boardGroup.add(boardMesh);

// Board frame/surround
const frameGeo = new THREE.TorusGeometry(0.62, 0.03, 16, 64);
const frameMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5, roughness: 0.3 });
const frame = new THREE.Mesh(frameGeo, frameMat);
frame.position.z = 0.01;
frame.castShadow = true;
boardGroup.add(frame);

// Create dartboard sectors
const sectorValues = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
const sectorAngle = Math.PI * 2 / 20;

function createRingSector(innerR, outerR, startAngle, endAngle, color) {
    const shape = new THREE.Shape();
    const segments = 16;
    
    // Outer arc
    for (let i = 0; i <= segments; i++) {
        const angle = startAngle + (endAngle - startAngle) * (i / segments);
        const x = Math.cos(angle) * outerR;
        const y = Math.sin(angle) * outerR;
        if (i === 0) shape.moveTo(x, y);
        else shape.lineTo(x, y);
    }
    
    // Inner arc (reverse)
    for (let i = segments; i >= 0; i--) {
        const angle = startAngle + (endAngle - startAngle) * (i / segments);
        const x = Math.cos(angle) * innerR;
        const y = Math.sin(angle) * innerR;
        shape.lineTo(x, y);
    }
    
    shape.closePath();
    
    const geo = new THREE.ShapeGeometry(shape);
    const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.z = 0.026;
    return mesh;
}

// Draw sectors
for (let i = 0; i < 20; i++) {
    const startA = -Math.PI / 2 - sectorAngle / 2 + i * sectorAngle;
    const endA = startA + sectorAngle;
    
    const isEven = i % 2 === 0;
    const singleColor1 = isEven ? 0x111111 : 0xf5f0dc;
    const singleColor2 = isEven ? 0xf5f0dc : 0x111111;
    const specialColor1 = isEven ? 0xcc0000 : 0x006600;
    const specialColor2 = isEven ? 0x006600 : 0xcc0000;
    
    // Inner single (0.10 to 0.25)
    boardGroup.add(createRingSector(0.10, 0.25, startA, endA, singleColor1));
    
    // Triple ring (0.25 to 0.30)
    boardGroup.add(createRingSector(0.25, 0.30, startA, endA, specialColor1));
    
    // Outer single (0.30 to 0.52)
    boardGroup.add(createRingSector(0.30, 0.52, startA, endA, singleColor2));
    
    // Double ring (0.52 to 0.58)
    boardGroup.add(createRingSector(0.52, 0.58, startA, endA, specialColor2));
}

// Bull (green ring)
const bullGeo = new THREE.RingGeometry(0.04, 0.10, 32);
const bullMat = new THREE.MeshStandardMaterial({ color: 0x006600, roughness: 0.6, side: THREE.DoubleSide });
const bull = new THREE.Mesh(bullGeo, bullMat);
bull.position.z = 0.027;
boardGroup.add(bull);

// Bullseye (red center)
const bullseyeGeo = new THREE.CircleGeometry(0.04, 32);
const bullseyeMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.6 });
const bullseye = new THREE.Mesh(bullseyeGeo, bullseyeMat);
bullseye.position.z = 0.028;
boardGroup.add(bullseye);

// Wire rings (thin torus for visual separation)
function addWireRing(radius) {
    const wireGeo = new THREE.TorusGeometry(radius, 0.003, 8, 64);
    const wireMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7, roughness: 0.3 });
    const wire = new THREE.Mesh(wireGeo, wireMat);
    wire.position.z = 0.03;
    boardGroup.add(wire);
}

addWireRing(0.04);
addWireRing(0.10);
addWireRing(0.25);
addWireRing(0.30);
addWireRing(0.52);
addWireRing(0.58);

// Wire sector dividers
for (let i = 0; i < 20; i++) {
    const angle = -Math.PI / 2 - sectorAngle / 2 + i * sectorAngle;
    const wireGeo = new THREE.CylinderGeometry(0.003, 0.003, 0.48, 4);
    const wireMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7, roughness: 0.3 });
    const wire = new THREE.Mesh(wireGeo, wireMat);
    wire.rotation.z = angle;
    wire.position.x = Math.cos(angle) * 0.34;
    wire.position.y = Math.sin(angle) * 0.34;
    wire.position.z = 0.03;
    boardGroup.add(wire);
}

// Number labels around the board
const numberPositions = sectorValues;
for (let i = 0; i < 20; i++) {
    const angle = -Math.PI / 2 + i * sectorAngle;
    const radius = 0.68;
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(numberPositions[i].toString(), 32, 32);
    
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius, 0.03);
    sprite.scale.set(0.12, 0.12, 1);
    boardGroup.add(sprite);
}

// --- Dart Creation ---
const dartsOnBoardMeshes = [];

function createDart() {
    const dartGroup = new THREE.Group();
    
    // Dart body (cone - the point)
    const coneGeo = new THREE.ConeGeometry(0.015, 0.15, 8);
    const coneMat = new THREE.MeshStandardMaterial({ color: 0xffdd00, metalness: 0.4, roughness: 0.3 });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.rotation.x = Math.PI / 2;
    cone.position.z = 0.075;
    cone.castShadow = true;
    dartGroup.add(cone);
    
    // Dart barrel
    const barrelGeo = new THREE.CylinderGeometry(0.012, 0.015, 0.06, 8);
    const barrelMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.7, roughness: 0.2 });
    const barrel = new THREE.Mesh(barrelGeo, barrelMat);
    barrel.rotation.x = Math.PI / 2;
    barrel.position.z = 0.18;
    barrel.castShadow = true;
    dartGroup.add(barrel);
    
    // Dart tail/flight
    const tailGeo = new THREE.BoxGeometry(0.04, 0.03, 0.001);
    const tailMat = new THREE.MeshStandardMaterial({ color: 0xff3333, roughness: 0.5 });
    const tail1 = new THREE.Mesh(tailGeo, tailMat);
    tail1.position.z = 0.22;
    tail1.castShadow = true;
    dartGroup.add(tail1);
    
    const tail2 = new THREE.Mesh(tailGeo, tailMat);
    tail2.position.z = 0.22;
    tail2.rotation.z = Math.PI / 2;
    tail2.castShadow = true;
    dartGroup.add(tail2);
    
    return dartGroup;
}

// --- Score Calculation ---
function calculateScore(localX, localY) {
    const distance = Math.sqrt(localX * localX + localY * localY);
    
    // Determine sector
    let angle = Math.atan2(localY, localX);
    angle = angle + Math.PI / 2; // Rotate to match sector layout
    if (angle < 0) angle += Math.PI * 2;
    
    const sectorIndex = Math.floor(angle / sectorAngle);
    const sectorValue = sectorValues[sectorIndex % 20];
    
    if (distance < 0.04) return { score: 50, label: 'BULLSEYE!' };
    if (distance < 0.10) return { score: 25, label: 'Bull! 25' };
    if (distance < 0.25) return { score: sectorValue, label: `${sectorValue}` };
    if (distance < 0.30) return { score: sectorValue * 3, label: `T${sectorValue} (${sectorValue * 3})` };
    if (distance < 0.52) return { score: sectorValue, label: `${sectorValue}` };
    if (distance < 0.58) return { score: sectorValue * 2, label: `D${sectorValue} (${sectorValue * 2})` };
    return { score: 0, label: 'Miss!' };
}

// --- Crosshair & Mouse ---
const crosshairEl = document.getElementById('crosshair');
const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
const boardPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 2); // z = -2 plane
let aimPoint = new THREE.Vector3(0, 1.5, -2);

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    crosshairEl.style.left = event.clientX + 'px';
    crosshairEl.style.top = event.clientY + 'px';
    
    // Raycast to board plane
    raycaster.setFromCamera(mouse, camera);
    const intersectPoint = new THREE.Vector3();
    raycaster.ray.intersectPlane(boardPlane, intersectPoint);
    
    if (intersectPoint) {
        aimPoint.copy(intersectPoint);
    }
}

document.addEventListener('mousemove', onMouseMove);

// --- Dart Throwing ---
let throwingDart = null;
let throwStartTime = 0;
let throwStart = new THREE.Vector3();
let throwEnd = new THREE.Vector3();
const throwDuration = 0.4;

// Camera shake
let shakeTime = 0;
let shakeAmplitude = 0;
const originalCameraPos = camera.position.clone();

function throwDart() {
    if (state.phase !== 'aiming' || state.dartsRemaining <= 0) return;
    
    state.phase = 'throwing';
    
    // Calculate target with scatter
    const scatter = 0.03;
    const targetX = aimPoint.x + (Math.random() * 2 - 1) * scatter;
    const targetY = aimPoint.y + (Math.random() * 2 - 1) * scatter;
    
    const dart = createDart();
    scene.add(dart);
    
    throwingDart = dart;
    throwStart.set(0, 1.5, 3.8);
    throwEnd.set(targetX, targetY, -1.97);
    throwStartTime = performance.now() / 1000;
    
    dart.position.copy(throwStart);
    // Point dart toward board
    dart.lookAt(throwEnd);
}

function onDartHit() {
    if (!throwingDart) return;
    
    const dart = throwingDart;
    throwingDart = null;
    
    // Calculate local position on board
    const localX = throwEnd.x - boardGroup.position.x;
    const localY = throwEnd.y - boardGroup.position.y;
    
    const result = calculateScore(localX, localY);
    
    state.lastThrowScore = result.score;
    state.roundScore += result.score;
    state.totalScore += result.score;
    state.dartsRemaining--;
    state.dartsOnBoard++;
    state.dartPositions.push({ x: throwEnd.x, y: throwEnd.y, z: throwEnd.z });
    
    dartsOnBoardMeshes.push(dart);
    
    // Camera shake
    shakeTime = 0.1;
    shakeAmplitude = 0.01;
    
    // Show floating score
    showFloatingScore(result.label, result.score, throwEnd);
    
    // Update HUD
    updateHUD();
    
    // Check round/game state
    if (state.dartsRemaining <= 0) {
        if (state.currentRound >= 3) {
            state.phase = 'gameOver';
            state.gameOver = true;
            showGameOver();
        } else {
            state.phase = 'roundEnd';
            showActionButton('Next Round');
        }
    } else {
        state.phase = 'aiming';
    }
}

// --- Floating Score ---
const floatingScoreEl = document.getElementById('floatingScore');
let floatingScoreTimeout = null;

function showFloatingScore(label, score, worldPos) {
    // Project world position to screen
    const screenPos = worldPos.clone().project(camera);
    const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
    
    floatingScoreEl.textContent = label;
    floatingScoreEl.style.left = x + 'px';
    floatingScoreEl.style.top = y + 'px';
    floatingScoreEl.style.opacity = '1';
    floatingScoreEl.style.transform = 'translate(-50%, -50%)';
    
    if (score >= 50) {
        floatingScoreEl.style.color = '#ff0000';
        floatingScoreEl.style.fontSize = '36px';
    } else if (score >= 25) {
        floatingScoreEl.style.color = '#00ff00';
        floatingScoreEl.style.fontSize = '32px';
    } else if (score === 0) {
        floatingScoreEl.style.color = '#888888';
        floatingScoreEl.style.fontSize = '24px';
    } else {
        floatingScoreEl.style.color = '#ffff00';
        floatingScoreEl.style.fontSize = '28px';
    }
    
    if (floatingScoreTimeout) clearTimeout(floatingScoreTimeout);
    
    setTimeout(() => {
        floatingScoreEl.style.opacity = '0';
        floatingScoreEl.style.transform = 'translate(-50%, -100%)';
    }, 1000);
    
    floatingScoreTimeout = setTimeout(() => {
        floatingScoreEl.style.opacity = '0';
    }, 1500);
}

// --- HUD Update ---
function updateHUD() {
    document.getElementById('roundDisplay').textContent = `${state.currentRound} / 3`;
    document.getElementById('dartsDisplay').textContent = state.dartsRemaining;
    document.getElementById('roundScoreDisplay').textContent = state.roundScore;
    document.getElementById('totalScoreDisplay').textContent = state.totalScore;
}

// --- Action Button ---
const actionBtn = document.getElementById('actionBtn');

function showActionButton(text) {
    actionBtn.textContent = text;
    actionBtn.style.display = 'block';
}

actionBtn.addEventListener('click', () => {
    if (state.phase === 'roundEnd') {
        nextRound();
    }
    actionBtn.style.display = 'none';
});

function nextRound() {
    state.currentRound++;
    state.dartsRemaining = 3;
    state.roundScore = 0;
    state.phase = 'aiming';
    
    // Clear darts from board
    clearDarts();
    updateHUD();
}

function clearDarts() {
    for (const dart of dartsOnBoardMeshes) {
        scene.remove(dart);
    }
    dartsOnBoardMeshes.length = 0;
    state.dartsOnBoard = 0;
    state.dartPositions = [];
}

// --- Game Over ---
const gameOverOverlay = document.getElementById('gameOverOverlay');
const finalScoreText = document.getElementById('finalScoreText');
const newGameBtn = document.getElementById('newGameBtn');

function showGameOver() {
    finalScoreText.textContent = `Final Score: ${state.totalScore}`;
    gameOverOverlay.style.display = 'flex';
}

function newGame() {
    state.currentRound = 1;
    state.dartsRemaining = 3;
    state.roundScore = 0;
    state.totalScore = 0;
    state.lastThrowScore = 0;
    state.gameOver = false;
    state.phase = 'aiming';
    
    clearDarts();
    gameOverOverlay.style.display = 'none';
    actionBtn.style.display = 'none';
    updateHUD();
}

newGameBtn.addEventListener('click', newGame);

// --- Input ---
document.addEventListener('click', (event) => {
    if (event.target === renderer.domElement || event.target === document.body) {
        throwDart();
    }
});

document.addEventListener('keydown', (event) => {
    if (event.key === 'r' || event.key === 'R') {
        newGame();
    }
});

// --- Window Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const delta = clock.getDelta();
    const time = clock.getElapsedTime();
    
    // Rotate trophy
    if (trophyModel) {
        trophyModel.rotation.y += 0.5 * delta;
    }
    
    // Animate throwing dart
    if (throwingDart) {
        const elapsed = performance.now() / 1000 - throwStartTime;
        const t = Math.min(elapsed / throwDuration, 1);
        
        // Lerp position with parabolic arc
        const easeT = t; // linear for speed feel
        throwingDart.position.lerpVectors(throwStart, throwEnd, easeT);
        
        // Add arc
        const arcHeight = 0.3 * Math.sin(t * Math.PI);
        throwingDart.position.y += arcHeight;
        
        // Point dart toward target
        const lookTarget = throwEnd.clone();
        if (t < 0.9) {
            lookTarget.y += arcHeight * (1 - t);
        }
        throwingDart.lookAt(lookTarget);
        
        if (t >= 1) {
            throwingDart.position.copy(throwEnd);
            throwingDart.lookAt(new THREE.Vector3(throwEnd.x, throwEnd.y, throwEnd.z - 1));
            onDartHit();
        }
    }
    
    // Camera shake
    if (shakeTime > 0) {
        shakeTime -= delta;
        const shakeX = (Math.random() - 0.5) * 2 * shakeAmplitude;
        const shakeY = (Math.random() - 0.5) * 2 * shakeAmplitude;
        camera.position.set(
            originalCameraPos.x + shakeX,
            originalCameraPos.y + shakeY,
            originalCameraPos.z
        );
        
        if (shakeTime <= 0) {
            camera.position.copy(originalCameraPos);
        }
    }
    
    renderer.render(scene, camera);
}

// Initialize
updateHUD();
animate();

</script>
