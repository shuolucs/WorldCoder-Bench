<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Darts Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a3a1a;
      font-family: Arial, sans-serif;
    }

    #gameContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 18px;
      z-index: 10;
      text-align: center;
      min-width: 340px;
      line-height: 1.5;
      pointer-events: none;
    }

    #controls {
      position: absolute;
      top: 95px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 11;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #f0f0f0;
      color: #111;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    button:hover {
      background: #ffffff;
    }

    #crosshair {
      position: absolute;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 12;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 6px rgba(255,255,255,0.6);
    }

    #crosshair::before {
      width: 2px;
      height: 22px;
    }

    #crosshair::after {
      width: 22px;
      height: 2px;
    }

    .floating-score {
      position: absolute;
      color: #ffd54a;
      font-weight: bold;
      font-size: 22px;
      text-shadow: 0 0 8px rgba(0,0,0,0.75);
      pointer-events: none;
      z-index: 15;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="hud">
      <div id="hudRound">Round: 1 / 3</div>
      <div id="hudDarts">Darts Remaining: 3</div>
      <div id="hudRoundScore">Round Score: 0</div>
      <div id="hudTotalScore">Total Score: 0</div>
    </div>

    <div id="controls">
      <button id="nextRoundBtn" style="display:none;">Next Round</button>
      <button id="newGameBtn" style="display:none;">New Game</button>
    </div>

    <div id="crosshair"></div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const container = document.getElementById("gameContainer");
    const hudRound = document.getElementById("hudRound");
    const hudDarts = document.getElementById("hudDarts");
    const hudRoundScore = document.getElementById("hudRoundScore");
    const hudTotalScore = document.getElementById("hudTotalScore");
    const nextRoundBtn = document.getElementById("nextRoundBtn");
    const newGameBtn = document.getElementById("newGameBtn");
    const crosshair = document.getElementById("crosshair");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a3a1a");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.5, 4);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -8;
    dirLight.shadow.camera.right = 8;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -8;
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x244d24, roughness: 0.9 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    // Pedestal for trophy
    const pedestal = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 0.5, 0.5),
      new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.3, roughness: 0.7 })
    );
    pedestal.position.set(-2.5, 0.25, -1);
    pedestal.castShadow = true;
    pedestal.receiveShadow = true;
    scene.add(pedestal);

    let brainStemModel = null;

    const loader = new GLTFLoader();
    loader.load(
      "._BrainStem.glb",
      (gltf) => {
        brainStemModel = gltf.scene;
        brainStemModel.scale.setScalar(0.005);
        brainStemModel.position.set(-2.5, 0.5, -1);
        brainStemModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(brainStemModel);
        state.modelLoaded = true;
        syncState();
      },
      undefined,
      () => {
        state.modelLoaded = false;
        syncState();
      }
    );

    // Dartboard group
    const boardGroup = new THREE.Group();
    boardGroup.position.set(0, 1.5, -2);
    scene.add(boardGroup);

    const boardRadius = 0.6;
    const boardDepth = 0.05;

    const board = new THREE.Mesh(
      new THREE.CylinderGeometry(boardRadius, boardRadius, boardDepth, 64),
      new THREE.MeshStandardMaterial({ color: 0xc9b07a, roughness: 0.85 })
    );
    board.rotation.x = Math.PI / 2;
    board.castShadow = true;
    board.receiveShadow = true;
    boardGroup.add(board);

    function makeDisc(radius, color, z = 0.026) {
      const g = new THREE.CircleGeometry(radius, 64);
      const m = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(g, m);
      mesh.position.z = z;
      return mesh;
    }

    function makeRing(inner, outer, color, z = 0.027) {
      const g = new THREE.RingGeometry(inner, outer, 64);
      const m = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(g, m);
      mesh.position.z = z;
      return mesh;
    }

    // Sector visuals
    const sectorGroup = new THREE.Group();
    const sectorCount = 20;
    const outerSingleInner = 0.30;
    const outerSingleOuter = 0.52;
    const innerSingleInner = 0.10;
    const innerSingleOuter = 0.25;

    function createSectorRing(innerR, outerR, zOffset) {
      const group = new THREE.Group();
      for (let i = 0; i < sectorCount; i++) {
        const shape = new THREE.Shape();
        const a0 = (i / sectorCount) * Math.PI * 2;
        const a1 = ((i + 1) / sectorCount) * Math.PI * 2;

        shape.absarc(0, 0, outerR, a0, a1, false);
        const hole = new THREE.Path();
        hole.absarc(0, 0, innerR, a1, a0, true);
        shape.holes.push(hole);

        const geom = new THREE.ShapeGeometry(shape);
        const color = i % 2 === 0 ? 0x111111 : 0xf0f0f0;
        const mat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.z = zOffset;
        group.add(mesh);
      }
      return group;
    }

    sectorGroup.add(createSectorRing(innerSingleInner, innerSingleOuter, 0.0265));
    sectorGroup.add(createSectorRing(outerSingleInner, outerSingleOuter, 0.0265));
    boardGroup.add(sectorGroup);

    // Scoring rings
    boardGroup.add(makeRing(0.25, 0.30, 0xcc2222, 0.028));
    boardGroup.add(makeRing(0.52, 0.58, 0xcc2222, 0.029));
    boardGroup.add(makeRing(0.04, 0.10, 0x22aa22, 0.030));
    boardGroup.add(makeDisc(0.04, 0xcc2222, 0.031));

    // Wire outline
    const outline = new THREE.Mesh(
      new THREE.RingGeometry(0.58, 0.6, 64),
      new THREE.MeshBasicMaterial({ color: 0x444444, side: THREE.DoubleSide })
    );
    outline.position.z = 0.0275;
    boardGroup.add(outline);

    // Board plane for ray intersection
    const boardPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 2); // z = -2

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let currentAimPoint = new THREE.Vector3(0, 1.5, -1.975);
    let currentAimOnBoardLocal = new THREE.Vector3(0, 0, 0);

    const dartGroup = new THREE.Group();
    scene.add(dartGroup);

    const floatingScores = [];

    const state = {
      currentRound: 1,
      dartsRemaining: 3,
      roundScore: 0,
      totalScore: 0,
      lastThrowScore: 0,
      gameOver: false,
      dartsOnBoard: 0,
      modelLoaded: false,
      dartPositions: [],
      phase: "aiming"
    };

    window.__3D_STATE__ = state;

    function syncState() {
      state.dartsOnBoard = state.dartPositions.length;
      hudRound.textContent = `Round: ${state.currentRound} / 3`;
      hudDarts.textContent = `Darts Remaining: ${state.dartsRemaining}`;
      hudRoundScore.textContent = `Round Score: ${state.roundScore}`;
      hudTotalScore.textContent = `Total Score: ${state.totalScore}`;

      nextRoundBtn.style.display =
        state.phase === "roundEnd" && !state.gameOver ? "inline-block" : "none";
      newGameBtn.style.display =
        state.phase === "gameOver" ? "inline-block" : "none";

      crosshair.style.display = state.phase === "aiming" ? "block" : "none";
    }

    function clampAimToBoard(localPoint) {
      const p = localPoint.clone();
      const d = Math.sqrt(p.x * p.x + p.y * p.y);
      const maxR = 0.6;
      if (d > maxR) {
        p.x = (p.x / d) * maxR;
        p.y = (p.y / d) * maxR;
      }
      p.z = 0.025;
      return p;
    }

    function updateCrosshairScreenPosition(worldPoint) {
      const projected = worldPoint.clone().project(camera);
      const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
      crosshair.style.left = `${x}px`;
      crosshair.style.top = `${y}px`;
    }

    function getScoreFromLocal(local) {
      const d = Math.sqrt(local.x * local.x + local.y * local.y);
      if (d < 0.04) return 50;
      if (d < 0.10) return 25;
      if (d < 0.25) return 20;
      if (d < 0.30) return 60;
      if (d < 0.52) return 15;
      if (d < 0.58) return 30;
      return 0;
    }

    function createDart() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.ConeGeometry(0.015, 0.15, 12),
        new THREE.MeshStandardMaterial({ color: 0xffdd33, metalness: 0.3, roughness: 0.5 })
      );
      body.rotation.x = Math.PI / 2;
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const tail = new THREE.Mesh(
        new THREE.BoxGeometry(0.03, 0.03, 0.02),
        new THREE.MeshStandardMaterial({ color: 0xcc2222 })
      );
      tail.position.set(0, 0, 0.08);
      tail.castShadow = true;
      tail.receiveShadow = true;
      group.add(tail);

      return group;
    }

    function showFloatingScore(score, worldPos) {
      const div = document.createElement("div");
      div.className = "floating-score";
      div.textContent = `+${score}`;
      container.appendChild(div);

      floatingScores.push({
        el: div,
        pos: worldPos.clone(),
        created: performance.now(),
        duration: 1500
      });
    }

    let shakeTime = 0;
    let shakeDuration = 0;
    let shakeAmplitude = 0;
    const baseCameraPos = new THREE.Vector3(0, 1.5, 4);

    function triggerShake(amplitude = 0.01, duration = 100) {
      shakeAmplitude = amplitude;
      shakeDuration = duration;
      shakeTime = duration;
    }

    const activeThrows = [];

    function throwDart() {
      if (state.phase !== "aiming" || state.dartsRemaining <= 0 || state.gameOver) return;

      state.phase = "throwing";
      syncState();

      const scatterX = THREE.MathUtils.randFloat(-0.03, 0.03);
      const scatterY = THREE.MathUtils.randFloat(-0.03, 0.03);

      const localTarget = clampAimToBoard(
        new THREE.Vector3(
          currentAimOnBoardLocal.x + scatterX,
          currentAimOnBoardLocal.y + scatterY,
          0.03
        )
      );

      const finalWorld = boardGroup.localToWorld(localTarget.clone());
      const dart = createDart();
      dart.position.copy(baseCameraPos);
      scene.add(dart);

      const start = baseCameraPos.clone();
      const end = finalWorld.clone().add(new THREE.Vector3(0, 0, 0.06));

      activeThrows.push({
        dart,
        start,
        end,
        impactLocal: localTarget.clone(),
        impactWorld: finalWorld.clone(),
        startTime: performance.now(),
        duration: 400
      });
    }

    function completeThrow(throwObj) {
      const { dart, impactLocal, impactWorld } = throwObj;

      const score = getScoreFromLocal(impactLocal);

      dart.position.copy(impactWorld.clone().add(new THREE.Vector3(0, 0, 0.055)));
      dart.lookAt(impactWorld.clone().add(new THREE.Vector3(0, 0, -1)));
      dart.rotateX(Math.PI / 2);

      dartGroup.add(dart);
      state.dartPositions.push({
        x: dart.position.x,
        y: dart.position.y,
        z: dart.position.z
      });

      state.lastThrowScore = score;
      state.roundScore += score;
      state.totalScore += score;
      state.dartsRemaining -= 1;

      showFloatingScore(score, impactWorld.clone().add(new THREE.Vector3(0, 0.08, 0)));
      triggerShake(0.01, 100);

      if (state.dartsRemaining <= 0) {
        if (state.currentRound >= 3) {
          state.phase = "gameOver";
          state.gameOver = true;
        } else {
          state.phase = "roundEnd";
        }
      } else {
        state.phase = "aiming";
      }

      syncState();
    }

    function clearBoardDarts() {
      while (dartGroup.children.length > 0) {
        const child = dartGroup.children[0];
        dartGroup.remove(child);
      }
      state.dartPositions = [];
      state.dartsOnBoard = 0;
    }

    function nextRound() {
      if (state.phase !== "roundEnd") return;
      state.currentRound += 1;
      state.dartsRemaining = 3;
      state.roundScore = 0;
      state.lastThrowScore = 0;
      state.phase = "aiming";
      clearBoardDarts();
      syncState();
    }

    function newGame() {
      state.currentRound = 1;
      state.dartsRemaining = 3;
      state.roundScore = 0;
      state.totalScore = 0;
      state.lastThrowScore = 0;
      state.gameOver = false;
      state.phase = "aiming";
      clearBoardDarts();

      while (activeThrows.length) {
        const t = activeThrows.pop();
        if (t.dart.parent) t.dart.parent.remove(t.dart);
      }

      floatingScores.forEach(f => f.el.remove());
      floatingScores.length = 0;

      syncState();
    }

    nextRoundBtn.addEventListener("click", nextRound);
    newGameBtn.addEventListener("click", newGame);

    window.addEventListener("keydown", (e) => {
      if (e.key.toLowerCase() === "r") {
        newGame();
      }
    });

    renderer.domElement.addEventListener("mousemove", (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hit = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(boardPlane, hit)) {
        const local = boardGroup.worldToLocal(hit.clone());
        const clamped = clampAimToBoard(new THREE.Vector3(local.x, local.y, 0.025));
        currentAimOnBoardLocal.copy(clamped);
        currentAimPoint.copy(boardGroup.localToWorld(clamped.clone()));
        updateCrosshairScreenPosition(currentAimPoint);
      }
    });

    renderer.domElement.addEventListener("click", () => {
      throwDart();
    });

    // Initial crosshair placement
    updateCrosshairScreenPosition(currentAimPoint);

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now();
      const dt = clock.getDelta();

      if (brainStemModel) {
        brainStemModel.rotation.y += 0.5 * dt;
      }

      for (let i = activeThrows.length - 1; i >= 0; i--) {
        const t = activeThrows[i];
        const elapsed = now - t.startTime;
        const alpha = Math.min(elapsed / t.duration, 1);

        const pos = new THREE.Vector3().lerpVectors(t.start, t.end, alpha);
        const arc = Math.sin(alpha * Math.PI) * 0.3;
        pos.y += arc;
        t.dart.position.copy(pos);

        const nextAlpha = Math.min((elapsed + 16) / t.duration, 1);
        const nextPos = new THREE.Vector3().lerpVectors(t.start, t.end, nextAlpha);
        nextPos.y += Math.sin(nextAlpha * Math.PI) * 0.3;
        t.dart.lookAt(nextPos);
        t.dart.rotateX(Math.PI / 2);

        if (alpha >= 1) {
          activeThrows.splice(i, 1);
          completeThrow(t);
        }
      }

      for (let i = floatingScores.length - 1; i >= 0; i--) {
        const f = floatingScores[i];
        const age = now - f.created;
        const t = age / f.duration;

        if (t >= 1) {
          f.el.remove();
          floatingScores.splice(i, 1);
          continue;
        }

        const wp = f.pos.clone();
        wp.y += t * 0.2;
        const projected = wp.project(camera);
        const sx = (projected.x * 0.5 + 0.5) * window.innerWidth;
        const sy = (-projected.y * 0.5 + 0.5) * window.innerHeight;

        f.el.style.left = `${sx}px`;
        f.el.style.top = `${sy}px`;
        f.el.style.opacity = `${1 - t}`;
      }

      if (shakeTime > 0) {
        shakeTime -= dt * 1000;
        const factor = shakeTime / shakeDuration;
        camera.position.set(
          baseCameraPos.x + (Math.random() - 0.5) * shakeAmplitude * factor,
          baseCameraPos.y + (Math.random() - 0.5) * shakeAmplitude * factor,
          baseCameraPos.z + (Math.random() - 0.5) * shakeAmplitude * factor
        );
      } else {
        camera.position.lerp(baseCameraPos, 0.2);
      }

      camera.lookAt(0, 1.5, 0);

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateCrosshairScreenPosition(currentAimPoint);
    });

    syncState();
    animate();
  </script>
</body>
</html>
