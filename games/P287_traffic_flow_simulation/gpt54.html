<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Avocado Traffic Flow Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px;
      z-index: 10;
      min-width: 240px;
      line-height: 1.5;
      white-space: pre-line;
    }

    #controls {
      position: absolute;
      top: 160px;
      left: 10px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #controls button {
      padding: 8px 12px;
      font-family: monospace;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #888;
      background: #222;
      color: white;
    }

    #controls button:hover {
      background: #333;
    }

    #error {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #ff8080;
      background: rgba(0,0,0,0.6);
      padding: 8px 10px;
      z-index: 10;
      display: none;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <div id="controls">
    <button id="btn-speedup">Speed Up</button>
    <button id="btn-slowdown">Slow Down</button>
    <button id="btn-pause">Toggle Pause</button>
  </div>
  <div id="error"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 40, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 30, 10);
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    function createRoad(length, width, axis) {
      const geom = axis === 'x'
        ? new THREE.PlaneGeometry(length, width)
        : new THREE.PlaneGeometry(width, length);

      const road = new THREE.Mesh(
        geom,
        new THREE.MeshStandardMaterial({ color: 0x555555 })
      );
      road.rotation.x = -Math.PI / 2;
      road.position.y = 0.01;
      scene.add(road);
    }

    createRoad(100, 6, 'x');
    createRoad(100, 6, 'z');

    function createDashedCenterLine(axis) {
      const dashLength = 2;
      const gap = 1.5;
      const total = 100;
      const material = new THREE.MeshStandardMaterial({ color: 0xffff00 });

      let pos = -total / 2 + dashLength / 2;
      while (pos < total / 2) {
        const geom = axis === 'x'
          ? new THREE.BoxGeometry(dashLength, 0.05, 0.2)
          : new THREE.BoxGeometry(0.2, 0.05, dashLength);

        const dash = new THREE.Mesh(geom, material);
        dash.position.set(
          axis === 'x' ? pos : 0,
          0.03,
          axis === 'x' ? 0 : pos
        );
        scene.add(dash);
        pos += dashLength + gap;
      }
    }

    createDashedCenterLine('x');
    createDashedCenterLine('z');

    function createTrafficLight(x, z) {
      const group = new THREE.Group();

      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.3, 8, 12),
        new THREE.MeshStandardMaterial({ color: 0x222222 })
      );
      pole.position.y = 4;
      group.add(pole);

      const box = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 2.8, 1.2),
        new THREE.MeshStandardMaterial({ color: 0x111111 })
      );
      box.position.set(0, 7.2, 0);
      group.add(box);

      const mkLamp = (color, y) => {
        const mat = new THREE.MeshStandardMaterial({
          color,
          emissive: 0x000000,
          emissiveIntensity: 0
        });
        const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), mat);
        lamp.position.set(0, y, 0.65);
        group.add(lamp);
        return lamp;
      };

      const red = mkLamp(0xff0000, 7.9);
      const yellow = mkLamp(0xffff00, 7.2);
      const green = mkLamp(0x00ff00, 6.5);

      group.position.set(x, 0, z);
      scene.add(group);

      return { group, red, yellow, green };
    }

    const xLightVisual = createTrafficLight(5, 5);
    const zLightVisual = createTrafficLight(-5, -5);

    const hud = document.getElementById('hud');
    const errorDiv = document.getElementById('error');

    const state = {
      vehicleCount: 8,
      speedMultiplier: 1,
      paused: false,
      xRoadLight: 'GREEN',
      zRoadLight: 'RED',
      totalWraps: 0,
      simulationTime: 0,
      vehiclePositions: [],
      lightCycleCount: 0,
      avgSpeed: 0
    };

    window.__3D_STATE__ = state;

    const BASE_SPEED = 0.05;
    const ROAD_HALF = 45;
    const STOP_DISTANCE = 12;
    const MIN_GAP = 4;

    let vehicles = [];
    let avocadoTemplate = null;
    let cycleTime = 0;
    let errorMessage = '';

    const startConfigs = [
      { road: 'x', dir: 1, x: -40, z: -1.5, rot: -Math.PI / 2 },
      { road: 'x', dir: 1, x: -20, z: -1.5, rot: -Math.PI / 2 },
      { road: 'x', dir: -1, x: 40, z: 1.5, rot: Math.PI / 2 },
      { road: 'x', dir: -1, x: 20, z: 1.5, rot: Math.PI / 2 },
      { road: 'z', dir: 1, x: 1.5, z: -40, rot: Math.PI },
      { road: 'z', dir: 1, x: 1.5, z: -20, rot: Math.PI },
      { road: 'z', dir: -1, x: -1.5, z: 40, rot: 0 },
      { road: 'z', dir: -1, x: -1.5, z: 20, rot: 0 }
    ];

    function deepCloneGLTFModel(model) {
      return model.clone(true);
    }

    function resetSimulation() {
      cycleTime = 0;
      state.speedMultiplier = 1;
      state.paused = false;
      state.xRoadLight = 'GREEN';
      state.zRoadLight = 'RED';
      state.totalWraps = 0;
      state.simulationTime = 0;
      state.lightCycleCount = 0;
      errorMessage = '';

      vehicles.forEach((v, i) => {
        const cfg = startConfigs[i];
        v.mesh.position.set(cfg.x, 0.8, cfg.z);
        v.mesh.rotation.y = cfg.rot;
        v.speed = BASE_SPEED;
        v.baseTargetSpeed = BASE_SPEED;
      });
    }

    function updateTrafficLightsVisual() {
      function applyVisual(lightObj, stateName) {
        const setLamp = (lamp, active) => {
          lamp.material.emissive.set(active ? lamp.material.color : new THREE.Color(0x111111));
          lamp.material.emissiveIntensity = active ? 1.8 : 0.15;
        };
        setLamp(lightObj.red, stateName === 'RED');
        setLamp(lightObj.yellow, stateName === 'YELLOW');
        setLamp(lightObj.green, stateName === 'GREEN');
      }

      applyVisual(xLightVisual, state.xRoadLight);
      applyVisual(zLightVisual, state.zRoadLight);
    }

    function updateLightState(dt) {
      cycleTime += dt;
      const t = cycleTime % 12;

      if (t < 5) {
        state.xRoadLight = 'GREEN';
        state.zRoadLight = 'RED';
      } else if (t < 6) {
        state.xRoadLight = 'YELLOW';
        state.zRoadLight = 'RED';
      } else if (t < 11) {
        state.xRoadLight = 'RED';
        state.zRoadLight = 'GREEN';
      } else {
        state.xRoadLight = 'RED';
        state.zRoadLight = 'YELLOW';
      }

      const completed = Math.floor(cycleTime / 12);
      state.lightCycleCount = completed;

      const sameNonYellow =
        state.xRoadLight === state.zRoadLight &&
        state.xRoadLight !== 'YELLOW';

      if (sameNonYellow) {
        errorMessage = 'Error: both lights show same non-yellow state.';
      } else {
        errorMessage = '';
      }

      updateTrafficLightsVisual();
    }

    function isApproachingIntersection(v) {
      if (v.road === 'x') {
        return v.dir > 0 ? v.mesh.position.x < 0 : v.mesh.position.x > 0;
      }
      return v.dir > 0 ? v.mesh.position.z < 0 : v.mesh.position.z > 0;
    }

    function distanceToIntersection(v) {
      return v.road === 'x'
        ? Math.abs(v.mesh.position.x)
        : Math.abs(v.mesh.position.z);
    }

    function getRoadLight(road) {
      return road === 'x' ? state.xRoadLight : state.zRoadLight;
    }

    function signedProgress(v) {
      return v.road === 'x' ? v.mesh.position.x * v.dir : v.mesh.position.z * v.dir;
    }

    function updateVehicleTargets() {
      vehicles.forEach(v => {
        let target = BASE_SPEED;

        const roadLight = getRoadLight(v.road);
        const nearIntersection = distanceToIntersection(v) <= STOP_DISTANCE;
        const approaching = isApproachingIntersection(v);

        if ((roadLight === 'RED' || roadLight === 'YELLOW') && nearIntersection && approaching) {
          target = 0;
        }

        v.baseTargetSpeed = target;
      });

      const groups = {};
      vehicles.forEach(v => {
        const key = `${v.road}_${v.dir}`;
        if (!groups[key]) groups[key] = [];
        groups[key].push(v);
      });

      Object.values(groups).forEach(group => {
        group.sort((a, b) => signedProgress(b) - signedProgress(a));

        for (let i = 1; i < group.length; i++) {
          const lead = group[i - 1];
          const trail = group[i];

          let leadPos = lead.road === 'x' ? lead.mesh.position.x : lead.mesh.position.z;
          let trailPos = trail.road === 'x' ? trail.mesh.position.x : trail.mesh.position.z;

          let gap = lead.dir > 0 ? (leadPos - trailPos) : (trailPos - leadPos);

          if (gap < 0) {
            gap += ROAD_HALF * 2;
          }

          if (gap < MIN_GAP) {
            trail.baseTargetSpeed = Math.min(trail.baseTargetSpeed, 0);
          } else if (gap < MIN_GAP + 2) {
            const factor = Math.max(0, (gap - MIN_GAP) / 2);
            trail.baseTargetSpeed = Math.min(trail.baseTargetSpeed, BASE_SPEED * factor);
          }
        }
      });
    }

    function moveVehicles() {
      let speedSum = 0;

      vehicles.forEach(v => {
        v.speed = THREE.MathUtils.lerp(v.speed, v.baseTargetSpeed, 0.05);
        v.speed = THREE.MathUtils.clamp(v.speed, 0, BASE_SPEED);

        const moveAmount = v.speed * state.speedMultiplier;

        if (v.road === 'x') {
          v.mesh.position.x += moveAmount * v.dir;

          if (v.mesh.position.x > ROAD_HALF) {
            v.mesh.position.x = -ROAD_HALF;
            state.totalWraps++;
          } else if (v.mesh.position.x < -ROAD_HALF) {
            v.mesh.position.x = ROAD_HALF;
            state.totalWraps++;
          }
        } else {
          v.mesh.position.z += moveAmount * v.dir;

          if (v.mesh.position.z > ROAD_HALF) {
            v.mesh.position.z = -ROAD_HALF;
            state.totalWraps++;
          } else if (v.mesh.position.z < -ROAD_HALF) {
            v.mesh.position.z = ROAD_HALF;
            state.totalWraps++;
          }
        }

        if (v.road === 'x') {
          v.mesh.position.x = THREE.MathUtils.clamp(v.mesh.position.x, -ROAD_HALF, ROAD_HALF);
        } else {
          v.mesh.position.z = THREE.MathUtils.clamp(v.mesh.position.z, -ROAD_HALF, ROAD_HALF);
        }

        speedSum += v.speed;
      });

      state.avgSpeed = speedSum / vehicles.length;
    }

    function updateHUD() {
      hud.textContent =
`Vehicles: ${state.vehicleCount}
Speed Multiplier: ${state.speedMultiplier}x
X-Road: ${state.xRoadLight}
Z-Road: ${state.zRoadLight}
Total Wraps: ${state.totalWraps}
Simulation Time: ${state.simulationTime.toFixed(1)}s`;

      errorDiv.style.display = errorMessage ? 'block' : 'none';
      errorDiv.textContent = errorMessage;
    }

    function updateStatePositions() {
      state.vehiclePositions = vehicles.map(v => ({
        x: Number(v.mesh.position.x.toFixed(2)),
        z: Number(v.mesh.position.z.toFixed(2))
      }));

      window.__3D_STATE__ = {
        vehicleCount: state.vehicleCount,
        speedMultiplier: state.speedMultiplier,
        paused: state.paused,
        xRoadLight: state.xRoadLight,
        zRoadLight: state.zRoadLight,
        totalWraps: state.totalWraps,
        simulationTime: Number(state.simulationTime.toFixed(3)),
        vehiclePositions: state.vehiclePositions,
        lightCycleCount: state.lightCycleCount,
        avgSpeed: Number(state.avgSpeed.toFixed(4))
      };
    }

    function createFallbackAvocado() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.7, 20, 20),
        new THREE.MeshStandardMaterial({ color: 0x5c8c2b })
      );
      body.scale.set(0.8, 1.1, 0.8);
      body.position.y = 0.7;
      group.add(body);

      const pit = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0x6b3e26 })
      );
      pit.position.set(0, 0.5, 0.45);
      group.add(pit);

      return group;
    }

    function instantiateVehicles() {
      vehicles = [];

      for (let i = 0; i < 8; i++) {
        const cfg = startConfigs[i];
        const mesh = deepCloneGLTFModel(avocadoTemplate);
        mesh.scale.set(15, 15, 15);
        mesh.position.set(cfg.x, 0.8, cfg.z);
        mesh.rotation.y = cfg.rot;
        scene.add(mesh);

        vehicles.push({
          mesh,
          road: cfg.road,
          dir: cfg.dir,
          speed: BASE_SPEED,
          baseTargetSpeed: BASE_SPEED
        });
      }

      state.vehicleCount = vehicles.length;
      updateStatePositions();
    }

    const loader = new GLTFLoader();
    loader.load(
      'Avocado.glb',
      (gltf) => {
        avocadoTemplate = gltf.scene;
        instantiateVehicles();
        resetSimulation();
      },
      undefined,
      () => {
        avocadoTemplate = createFallbackAvocado();
        instantiateVehicles();
        resetSimulation();
      }
    );

    document.getElementById('btn-speedup').addEventListener('click', () => {
      state.speedMultiplier = Math.min(8, state.speedMultiplier * 2);
    });

    document.getElementById('btn-slowdown').addEventListener('click', () => {
      state.speedMultiplier = Math.max(0.25, state.speedMultiplier / 2);
    });

    document.getElementById('btn-pause').addEventListener('click', () => {
      state.paused = !state.paused;
    });

    let radius = Math.sqrt(camera.position.x ** 2 + camera.position.y ** 2 + camera.position.z ** 2);
    let theta = Math.atan2(camera.position.z, camera.position.x);
    let phi = Math.acos(camera.position.y / radius);

    function updateCameraOrbit() {
      phi = THREE.MathUtils.clamp(phi, 0.2, Math.PI / 2 - 0.05);
      camera.position.x = radius * Math.sin(phi) * Math.cos(theta);
      camera.position.y = radius * Math.cos(phi);
      camera.position.z = radius * Math.sin(phi) * Math.sin(theta);
      camera.lookAt(0, 0, 0);
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowUp') {
        phi -= 0.1;
        updateCameraOrbit();
      } else if (e.code === 'ArrowDown') {
        phi += 0.1;
        updateCameraOrbit();
      } else if (e.code === 'Space') {
        e.preventDefault();
        state.paused = !state.paused;
      } else if (e.code === 'KeyR') {
        resetSimulation();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const realDelta = Math.min(clock.getDelta(), 0.05);

      if (vehicles.length > 0 && !state.paused) {
        const simDelta = realDelta * state.speedMultiplier;
        state.simulationTime += simDelta;

        updateLightState(simDelta);
        updateVehicleTargets();
        moveVehicles();
      }

      updateHUD();
      updateStatePositions();
      renderer.render(scene, camera);
    }

    updateTrafficLightsVisual();
    animate();
  </script>
</body>
</html>
