<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sumo Wrestling</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            padding: 15px;
            position: absolute;
        }
        #top-left {
            top: 0;
            left: 0;
        }
        #top-right {
            top: 0;
            right: 0;
            text-align: right;
        }
        #stamina-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 25px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 3px solid white;
            border-radius: 15px;
            overflow: hidden;
        }
        #stamina-bar {
            width: 100%;
            height: 100%;
            background-color: #00ff00;
            transition: width 0.1s linear, background-color 0.2s;
        }
        #stamina-label {
            position: absolute;
            width: 100%;
            text-align: center;
            color: white;
            font-weight: bold;
            line-height: 25px;
            text-shadow: 1px 1px 2px black;
        }
        #center-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
        }
        #round-result {
            font-size: 64px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            display: none;
            margin-bottom: 20px;
        }
        #btn-start {
            padding: 15px 40px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            background-color: #e74c3c;
            border: 4px solid white;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, background-color 0.2s;
        }
        #btn-start:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }
        #btn-start:active {
            transform: scale(0.95);
        }
        #controls-help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="top-left" class="hud-text">
            <div id="hud-round">Round: 1</div>
            <div id="hud-difficulty">Difficulty: 1</div>
        </div>
        <div id="top-right" class="hud-text">
            <div id="hud-score">Player Wins: 0 | AI Wins: 0</div>
        </div>
        
        <div id="stamina-container">
            <div id="stamina-bar"></div>
            <div id="stamina-label">STAMINA</div>
        </div>

        <div id="center-screen">
            <div id="round-result">Player Wins!</div>
            <button id="btn-start">Start Game</button>
        </div>

        <div id="controls-help">
            WASD/Arrows: Move | SPACE: Push Attack | R: Reset Game
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            gameStarted: false,
            gamePaused: false,
            round: 1,
            difficultyLevel: 1,
            playerPos: { x: 0, y: 1.05, z: 3 },
            aiPos: { x: 0, y: 1.05, z: -3 },
            playerVel: { x: 0, z: 0 },
            aiVel: { x: 0, z: 0 },
            playerStamina: 100,
            playerMass: 100,
            aiMass: 90,
            playerWins: 0,
            aiWins: 0,
            playerInRing: true,
            aiInRing: true,
            lastRoundWinner: 'none',
            aiAttackCooldown: 0,
            frameCount: 0,
            collisionOccurring: false,
            playerSpeed: 0,
            aiSpeed: 0
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 30);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // Ground / Ring
        const ringRadius = 5;
        const ringHeight = 0.3;
        
        const ringGeo = new THREE.CylinderGeometry(ringRadius, ringRadius, ringHeight, 64);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xeedd82, roughness: 0.8 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.y = ringHeight / 2; // Base at 0, top at 0.3
        ring.receiveShadow = true;
        scene.add(ring);

        const borderGeo = new THREE.TorusGeometry(ringRadius, 0.05, 16, 64);
        const borderMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
        const border = new THREE.Mesh(borderGeo, borderMat);
        border.rotation.x = Math.PI / 2;
        border.position.y = ringHeight;
        border.receiveShadow = true;
        scene.add(border);

        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x3d2314, roughness: 1 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);

        // Wrestlers
        const capsuleRadius = 0.5;
        const capsuleLength = 0.5; // Total height = length + 2*radius = 1.5
        const capsuleGeo = new THREE.CapsuleGeometry(capsuleRadius, capsuleLength, 4, 16);
        
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x2980b9, roughness: 0.4 });
        const playerMesh = new THREE.Mesh(capsuleGeo, playerMat);
        playerMesh.castShadow = true;
        playerMesh.receiveShadow = true;
        scene.add(playerMesh);

        const aiMat = new THREE.MeshStandardMaterial({ color: 0xc0392b, roughness: 0.4 });
        const aiMesh = new THREE.Mesh(capsuleGeo, aiMat);
        aiMesh.castShadow = true;
        aiMesh.receiveShadow = true;
        scene.add(aiMesh);

        // --- Physics & Game Logic ---
        const player = {
            pos: new THREE.Vector3(0, 1.05, 3),
            vel: new THREE.Vector3(0, 0, 0),
            mass: 100,
            stamina: 100
        };

        const ai = {
            pos: new THREE.Vector3(0, 1.05, -3),
            vel: new THREE.Vector3(0, 0, 0),
            mass: 90,
            cooldown: 0
        };

        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false, ' ': false };
        let spacePressed = false;
        let resetTimer = 0;

        // DOM Elements
        const elRound = document.getElementById('hud-round');
        const elDiff = document.getElementById('hud-difficulty');
        const elScore = document.getElementById('hud-score');
        const elStaminaBar = document.getElementById('stamina-bar');
        const elResult = document.getElementById('round-result');
        const btnStart = document.getElementById('btn-start');

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if (e.key.toLowerCase() === 'r') fullReset();
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
            if (e.key === ' ') spacePressed = false;
        });

        btnStart.addEventListener('click', () => {
            window.__3D_STATE__.gameStarted = true;
            btnStart.style.display = 'none';
            updateDifficultyParams();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateDifficultyParams() {
            const diff = window.__3D_STATE__.difficultyLevel;
            ai.mass = 80 + (diff * 10);
            window.__3D_STATE__.aiMass = ai.mass;
        }

        function resetRoundPositions() {
            player.pos.set(0, 1.05, 3);
            player.vel.set(0, 0, 0);
            player.stamina = 100;
            
            ai.pos.set(0, 1.05, -3);
            ai.vel.set(0, 0, 0);
            ai.cooldown = 180 - (window.__3D_STATE__.difficultyLevel * 25);
            
            window.__3D_STATE__.playerInRing = true;
            window.__3D_STATE__.aiInRing = true;
            window.__3D_STATE__.collisionOccurring = false;
        }

        function fullReset() {
            window.__3D_STATE__.round = 1;
            window.__3D_STATE__.difficultyLevel = 1;
            window.__3D_STATE__.playerWins = 0;
            window.__3D_STATE__.aiWins = 0;
            window.__3D_STATE__.lastRoundWinner = 'none';
            window.__3D_STATE__.gamePaused = false;
            resetTimer = 0;
            elResult.style.display = 'none';
            updateDifficultyParams();
            resetRoundPositions();
            updateHUD();
        }

        function handleRoundEnd(winner) {
            window.__3D_STATE__.gamePaused = true;
            window.__3D_STATE__.lastRoundWinner = winner;
            
            if (winner === 'player') {
                window.__3D_STATE__.playerWins++;
                window.__3D_STATE__.difficultyLevel = Math.min(5, window.__3D_STATE__.difficultyLevel + 1);
                elResult.textContent = 'Player Wins!';
                elResult.style.color = '#3498db';
            } else {
                window.__3D_STATE__.aiWins++;
                window.__3D_STATE__.difficultyLevel = Math.max(1, window.__3D_STATE__.difficultyLevel - 1);
                elResult.textContent = 'AI Wins!';
                elResult.style.color = '#e74c3c';
            }
            
            window.__3D_STATE__.round++;
            elResult.style.display = 'block';
            updateDifficultyParams();
            updateHUD();
            
            resetTimer = 180; // 3 seconds at 60fps
        }

        function updateHUD() {
            elRound.textContent = `Round: ${window.__3D_STATE__.round}`;
            elDiff.textContent = `Difficulty: ${window.__3D_STATE__.difficultyLevel}`;
            elScore.textContent = `Player Wins: ${window.__3D_STATE__.playerWins} | AI Wins: ${window.__3D_STATE__.aiWins}`;
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const state = window.__3D_STATE__;
            state.frameCount++;

            if (state.gameStarted) {
                if (state.gamePaused) {
                    // Handle round reset sequence
                    resetTimer--;
                    if (resetTimer === 60) {
                        // After 2 seconds, reset positions visually
                        resetRoundPositions();
                    } else if (resetTimer <= 0) {
                        // After 3 seconds, resume game
                        state.gamePaused = false;
                        elResult.style.display = 'none';
                    }
                } else {
                    // --- Player Input ---
                    let pAccel = new THREE.Vector3(0, 0, 0);
                    if (keys.w || keys.ArrowUp) pAccel.z -= 1;
                    if (keys.s || keys.ArrowDown) pAccel.z += 1;
                    if (keys.a || keys.ArrowLeft) pAccel.x -= 1;
                    if (keys.d || keys.ArrowRight) pAccel.x += 1;
                    
                    if (pAccel.lengthSq() > 0) {
                        pAccel.normalize().multiplyScalar(0.15);
                        player.vel.add(pAccel);
                    }

                    // Player Attack
                    if (keys[' '] && !spacePressed && player.stamina >= 20) {
                        spacePressed = true;
                        player.stamina -= 20;
                        let attackDir = new THREE.Vector3().subVectors(ai.pos, player.pos);
                        attackDir.y = 0;
                        if (attackDir.lengthSq() > 0) {
                            attackDir.normalize();
                            player.vel.add(attackDir.multiplyScalar(3.0));
                        }
                    }

                    // Stamina Regen
                    if (!keys[' ']) {
                        player.stamina = Math.min(100, player.stamina + 0.5);
                    }

                    // --- AI Logic ---
                    const diff = state.difficultyLevel;
                    const aiAccelBase = 0.05 + (diff * 0.025);
                    const aiPushForce = 2.0 + (diff * 0.5);
                    
                    let aiDir = new THREE.Vector3().subVectors(player.pos, ai.pos);
                    aiDir.y = 0;
                    let distToPlayer = aiDir.length();
                    
                    if (distToPlayer > 0) {
                        aiDir.normalize();
                        ai.vel.add(aiDir.clone().multiplyScalar(aiAccelBase));
                    }

                    // AI Attack
                    ai.cooldown--;
                    if (distToPlayer < 3.0 && ai.cooldown <= 0) {
                        ai.vel.add(aiDir.clone().multiplyScalar(aiPushForce));
                        ai.cooldown = 180 - (diff * 25);
                    }

                    // --- Physics Integration ---
                    player.vel.multiplyScalar(0.92); // Friction
                    ai.vel.multiplyScalar(0.92);

                    player.pos.add(player.vel);
                    ai.pos.add(ai.vel);

                    player.pos.y = 1.05;
                    ai.pos.y = 1.05;

                    // --- Collision Detection & Resolution ---
                    let dist = player.pos.distanceTo(ai.pos);
                    state.collisionOccurring = dist < 1.2;

                    if (state.collisionOccurring) {
                        let normal = new THREE.Vector3().subVectors(player.pos, ai.pos).normalize();
                        let relVel = new THREE.Vector3().subVectors(player.vel, ai.vel);
                        let velAlongNormal = relVel.dot(normal);

                        if (velAlongNormal < 0) {
                            let restitution = 0.2;
                            let j = -(1 + restitution) * velAlongNormal;
                            j /= (1 / player.mass + 1 / ai.mass);

                            let impulse = normal.clone().multiplyScalar(j);
                            player.vel.add(impulse.clone().multiplyScalar(1 / player.mass));
                            ai.vel.sub(impulse.clone().multiplyScalar(1 / ai.mass));
                        }

                        // Positional correction
                        let penetration = 1.2 - dist;
                        const totalMass = player.mass + ai.mass;
                        let pCorr = normal.clone().multiplyScalar(penetration * (ai.mass / totalMass));
                        let aCorr = normal.clone().multiplyScalar(-penetration * (player.mass / totalMass));
                        
                        player.pos.add(pCorr);
                        ai.pos.add(aCorr);
                    }

                    // --- Ring Out Detection ---
                    let pDistFromCenter = Math.sqrt(player.pos.x**2 + player.pos.z**2);
                    let aDistFromCenter = Math.sqrt(ai.pos.x**2 + ai.pos.z**2);

                    state.playerInRing = pDistFromCenter <= 5.0;
                    state.aiInRing = aDistFromCenter <= 5.0;

                    if (!state.playerInRing && state.aiInRing) {
                        handleRoundEnd('ai');
                    } else if (!state.aiInRing && state.playerInRing) {
                        handleRoundEnd('player');
                    } else if (!state.playerInRing && !state.aiInRing) {
                        // Tie, favor player or just reset
                        handleRoundEnd('player'); 
                    }
                }
            }

            // Update Meshes
            playerMesh.position.copy(player.pos);
            aiMesh.position.copy(ai.pos);

            // Update UI
            elStaminaBar.style.width = `${player.stamina}%`;
            if (player.stamina < 20) {
                elStaminaBar.style.backgroundColor = '#e74c3c';
            } else {
                elStaminaBar.style.backgroundColor = '#2ecc71';
            }

            // Update State Object
            state.playerPos = { x: player.pos.x, y: player.pos.y, z: player.pos.z };
            state.aiPos = { x: ai.pos.x, y: ai.pos.y, z: ai.pos.z };
            state.playerVel = { x: player.vel.x, z: player.vel.z };
            state.aiVel = { x: ai.vel.x, z: ai.vel.z };
            state.playerStamina = player.stamina;
            state.aiAttackCooldown = ai.cooldown;
            state.playerSpeed = player.vel.length();
            state.aiSpeed = ai.vel.length();

            renderer.render(scene, camera);
        }

        // Init
        updateHUD();
        animate();
    </script>
</body>
</html>
