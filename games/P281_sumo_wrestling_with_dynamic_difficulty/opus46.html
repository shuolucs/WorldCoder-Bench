<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sumo Wrestling</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
canvas { display: block; }

#hud-round {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #fff;
    font-size: 20px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    z-index: 10;
}

#hud-difficulty {
    position: absolute;
    top: 50px;
    left: 20px;
    color: #ffcc00;
    font-size: 18px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    z-index: 10;
}

#hud-score {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #fff;
    font-size: 20px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    z-index: 10;
    text-align: right;
}

#stamina-container {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 20px;
    background: rgba(0,0,0,0.6);
    border: 2px solid #fff;
    border-radius: 10px;
    overflow: hidden;
    z-index: 10;
}

#stamina-bar {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #00cc00, #00ff00);
    transition: width 0.1s;
    border-radius: 8px;
}

#stamina-label {
    position: absolute;
    bottom: 65px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 14px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    z-index: 10;
}

#round-result {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
    z-index: 20;
    display: none;
    text-align: center;
}

#btn-start {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 60px;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(180deg, #ff4444, #cc0000);
    color: #fff;
    border: 3px solid #fff;
    border-radius: 15px;
    cursor: pointer;
    z-index: 30;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
}

#btn-start:hover {
    transform: translate(-50%, -50%) scale(1.05);
    box-shadow: 0 6px 20px rgba(0,0,0,0.7);
}

#btn-start:active {
    transform: translate(-50%, -50%) scale(0.95);
}

#instructions {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    text-align: center;
    z-index: 10;
    line-height: 1.6;
}
</style>
</head>
<body>

<div id="hud-round">Round: 1</div>
<div id="hud-difficulty">Difficulty: ★</div>
<div id="hud-score">Player Wins: 0 | AI Wins: 0</div>

<div id="stamina-label">STAMINA</div>
<div id="stamina-container">
    <div id="stamina-bar"></div>
</div>

<div id="round-result"></div>

<button id="btn-start">Start Game</button>

<div id="instructions">
    WASD / Arrow Keys: Move | SPACE: Push Attack | R: Restart
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    // ==================== STATE ====================
    const state = {
        gameStarted: false,
        gamePaused: true,
        round: 1,
        difficultyLevel: 1,
        playerPos: { x: 0, y: 1.05, z: 3 },
        aiPos: { x: 0, y: 1.05, z: -3 },
        playerVel: { x: 0, z: 0 },
        aiVel: { x: 0, z: 0 },
        playerStamina: 100,
        playerMass: 100,
        aiMass: 90,
        playerWins: 0,
        aiWins: 0,
        playerInRing: true,
        aiInRing: true,
        lastRoundWinner: 'none',
        aiAttackCooldown: 150,
        frameCount: 0,
        collisionOccurring: false,
        playerSpeed: 0,
        aiSpeed: 0
    };
    window.__3D_STATE__ = state;

    // ==================== THREE.JS SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 20, 50);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(50, 50);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.9 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    // Dohyo (ring)
    const dohyoGeo = new THREE.CylinderGeometry(5, 5, 0.3, 64);
    const dohyoMat = new THREE.MeshStandardMaterial({ color: 0xdaa520, roughness: 0.6 });
    const dohyo = new THREE.Mesh(dohyoGeo, dohyoMat);
    dohyo.position.y = 0.15;
    dohyo.receiveShadow = true;
    dohyo.castShadow = true;
    scene.add(dohyo);

    // Red ring border (torus)
    const torusGeo = new THREE.TorusGeometry(5, 0.12, 16, 64);
    const torusMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.4 });
    const torusRing = new THREE.Mesh(torusGeo, torusMat);
    torusRing.rotation.x = -Math.PI / 2;
    torusRing.position.y = 0.31;
    torusRing.castShadow = true;
    scene.add(torusRing);

    // Inner circle marking on dohyo
    const innerCircleGeo = new THREE.TorusGeometry(3.5, 0.05, 8, 64);
    const innerCircleMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const innerCircle = new THREE.Mesh(innerCircleGeo, innerCircleMat);
    innerCircle.rotation.x = -Math.PI / 2;
    innerCircle.position.y = 0.31;
    scene.add(innerCircle);

    // ==================== WRESTLER CREATION ====================
    function createWrestler(color, x, z) {
        const group = new THREE.Group();

        // Body (capsule)
        const bodyGeo = new THREE.CapsuleGeometry(0.5, 1.5, 8, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ 
            color: color, 
            roughness: 0.3,
            metalness: 0.1
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);

        // Belt
        const beltGeo = new THREE.TorusGeometry(0.52, 0.06, 8, 32);
        const beltMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const belt = new THREE.Mesh(beltGeo, beltMat);
        belt.rotation.x = Math.PI / 2;
        belt.position.y = -0.2;
        group.add(belt);

        // Eyes
        const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const pupilGeo = new THREE.SphereGeometry(0.04, 8, 8);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });

        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.18, 0.55, 0.42);
        group.add(leftEye);
        const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
        leftPupil.position.set(-0.18, 0.55, 0.48);
        group.add(leftPupil);

        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.18, 0.55, 0.42);
        group.add(rightEye);
        const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
        rightPupil.position.set(0.18, 0.55, 0.48);
        group.add(rightPupil);

        group.position.set(x, 1.05, z);
        scene.add(group);
        return group;
    }

    let playerMesh = createWrestler(0x3366ff, 0, 3);
    let aiMesh = createWrestler(0xff3333, 0, -3);

    // Particle system for impacts
    const particleCount = 50;
    const particleGeo = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleVelocities = [];
    const particleLifetimes = [];
    for (let i = 0; i < particleCount; i++) {
        particlePositions[i * 3] = 0;
        particlePositions[i * 3 + 1] = -10;
        particlePositions[i * 3 + 2] = 0;
        particleVelocities.push({ x: 0, y: 0, z: 0 });
        particleLifetimes.push(0);
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0xffff00, size: 0.15, transparent: true, opacity: 0.8 });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);
    let nextParticle = 0;

    function spawnParticles(x, y, z, count) {
        for (let i = 0; i < count; i++) {
            const idx = nextParticle % particleCount;
            particlePositions[idx * 3] = x;
            particlePositions[idx * 3 + 1] = y;
            particlePositions[idx * 3 + 2] = z;
            particleVelocities[idx] = {
                x: (Math.random() - 0.5) * 0.3,
                y: Math.random() * 0.2 + 0.1,
                z: (Math.random() - 0.5) * 0.3
            };
            particleLifetimes[idx] = 30;
            nextParticle++;
        }
        particleGeo.attributes.position.needsUpdate = true;
    }

    function updateParticles() {
        for (let i = 0; i < particleCount; i++) {
            if (particleLifetimes[i] > 0) {
                particlePositions[i * 3] += particleVelocities[i].x;
                particlePositions[i * 3 + 1] += particleVelocities[i].y;
                particlePositions[i * 3 + 2] += particleVelocities[i].z;
                particleVelocities[i].y -= 0.008;
                particleLifetimes[i]--;
                if (particleLifetimes[i] <= 0) {
                    particlePositions[i * 3 + 1] = -10;
                }
            }
        }
        particleGeo.attributes.position.needsUpdate = true;
    }

    // ==================== INPUT ====================
    const keys = {};
    document.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.code === 'KeyR') {
            resetGame();
        }
    });
    document.addEventListener('keyup', (e) => {
        keys[e.code] = false;
    });

    // ==================== UI ELEMENTS ====================
    const hudRound = document.getElementById('hud-round');
    const hudDifficulty = document.getElementById('hud-difficulty');
    const hudScore = document.getElementById('hud-score');
    const staminaBar = document.getElementById('stamina-bar');
    const roundResult = document.getElementById('round-result');
    const btnStart = document.getElementById('btn-start');

    btnStart.addEventListener('click', () => {
        state.gameStarted = true;
        state.gamePaused = false;
        btnStart.style.display = 'none';
    });

    // ==================== GAME LOGIC ====================
    let playerAttacking = false;
    let roundEndTimer = 0;
    let aiAttackTimer = 0;

    function resetPositions() {
        state.playerPos = { x: 0, y: 1.05, z: 3 };
        state.aiPos = { x: 0, y: 1.05, z: -3 };
        state.playerVel = { x: 0, z: 0 };
        state.aiVel = { x: 0, z: 0 };
        state.playerStamina = 100;
        state.playerInRing = true;
        state.aiInRing = true;
        state.collisionOccurring = false;

        playerMesh.position.set(0, 1.05, 3);
        aiMesh.position.set(0, 1.05, -3);
        playerMesh.rotation.set(0, 0, 0);
        aiMesh.rotation.set(0, 0, 0);

        updateAIDifficulty();
        aiAttackTimer = state.aiAttackCooldown;
    }

    function updateAIDifficulty() {
        state.aiMass = 80 + (state.difficultyLevel * 10);
        state.aiAttackCooldown = 180 - state.difficultyLevel * 25;
    }

    function resetGame() {
        state.round = 1;
        state.difficultyLevel = 1;
        state.playerWins = 0;
        state.aiWins = 0;
        state.lastRoundWinner = 'none';
        state.frameCount = 0;
        roundEndTimer = 0;
        state.gamePaused = false;
        roundResult.style.display = 'none';
        resetPositions();
        if (!state.gameStarted) {
            state.gameStarted = true;
            btnStart.style.display = 'none';
        }
    }

    function endRound(winner) {
        state.lastRoundWinner = winner;
        state.gamePaused = true;

        if (winner === 'player') {
            state.playerWins++;
            state.difficultyLevel = Math.min(5, state.difficultyLevel + 1);
            roundResult.textContent = '🏆 Player Wins! 🏆';
            roundResult.style.color = '#66aaff';
        } else {
            state.aiWins++;
            state.difficultyLevel = Math.max(1, state.difficultyLevel - 1);
            roundResult.textContent = '💀 AI Wins! 💀';
            roundResult.style.color = '#ff6666';
        }
        roundResult.style.display = 'block';
        roundEndTimer = 180; // 3 seconds at 60fps
    }

    function handleInput() {
        const accel = 0.15;

        if (keys['KeyW'] || keys['ArrowUp']) {
            state.playerVel.z -= accel;
        }
        if (keys['KeyS'] || keys['ArrowDown']) {
            state.playerVel.z += accel;
        }
        if (keys['KeyA'] || keys['ArrowLeft']) {
            state.playerVel.x -= accel;
        }
        if (keys['KeyD'] || keys['ArrowRight']) {
            state.playerVel.x += accel;
        }

        // Space - push attack
        if (keys['Space'] && state.playerStamina >= 20 && !playerAttacking) {
            playerAttacking = true;
            state.playerStamina -= 20;

            // Direction toward AI
            const dx = state.aiPos.x - state.playerPos.x;
            const dz = state.aiPos.z - state.playerPos.z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            if (dist > 0.01) {
                const nx = dx / dist;
                const nz = dz / dist;
                state.playerVel.x += nx * 3.0;
                state.playerVel.z += nz * 3.0;
            }
        }
        if (!keys['Space']) {
            playerAttacking = false;
        }

        // Stamina regen
        if (!keys['Space']) {
            state.playerStamina = Math.min(100, state.playerStamina + 0.5);
        }
    }

    function updateAI() {
        const aiAccel = 0.05 + (state.difficultyLevel * 0.025);

        // Move toward player
        const dx = state.playerPos.x - state.aiPos.x;
        const dz = state.playerPos.z - state.aiPos.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist > 0.01) {
            const nx = dx / dist;
            const nz = dz / dist;

            state.aiVel.x += nx * aiAccel;
            state.aiVel.z += nz * aiAccel;

            // Try to stay near center when far from player
            const aiDistFromCenter = Math.sqrt(state.aiPos.x * state.aiPos.x + state.aiPos.z * state.aiPos.z);
            if (aiDistFromCenter > 3.5) {
                const cx = -state.aiPos.x / aiDistFromCenter;
                const cz = -state.aiPos.z / aiDistFromCenter;
                state.aiVel.x += cx * aiAccel * 0.3;
                state.aiVel.z += cz * aiAccel * 0.3;
            }
        }

        // AI attack
        aiAttackTimer--;
        if (aiAttackTimer <= 0 && dist < 3.0) {
            const aiPushForce = 2.0 + (state.difficultyLevel * 0.5);
            if (dist > 0.01) {
                const nx = dx / dist;
                const nz = dz / dist;
                // AI pushes toward player
                state.aiVel.x += nx * aiPushForce;
                state.aiVel.z += nz * aiPushForce;
            }
            aiAttackTimer = state.aiAttackCooldown;

            // Visual feedback
            spawnParticles(state.aiPos.x, 1.5, state.aiPos.z, 5);
        }
    }

    function handleCollision() {
        const dx = state.aiPos.x - state.playerPos.x;
        const dz = state.aiPos.z - state.playerPos.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 1.2) {
            state.collisionOccurring = true;

            if (dist < 0.01) return;

            const nx = dx / dist;
            const nz = dz / dist;

            // Separate them
            const overlap = 1.2 - dist;
            const totalMass = state.playerMass + state.aiMass;
            const playerRatio = state.aiMass / totalMass;
            const aiRatio = state.playerMass / totalMass;

            state.playerPos.x -= nx * overlap * playerRatio;
            state.playerPos.z -= nz * overlap * playerRatio;
            state.aiPos.x += nx * overlap * aiRatio;
            state.aiPos.z += nz * overlap * aiRatio;

            // Elastic collision
            const relVelX = state.playerVel.x - state.aiVel.x;
            const relVelZ = state.playerVel.z - state.aiVel.z;
            const relVelDotN = relVelX * nx + relVelZ * nz;

            if (relVelDotN > 0) {
                const restitution = 0.8;
                const j = -(1 + restitution) * relVelDotN / (1 / state.playerMass + 1 / state.aiMass);

                state.playerVel.x += (j / state.playerMass) * nx;
                state.playerVel.z += (j / state.playerMass) * nz;
                state.aiVel.x -= (j / state.aiMass) * nx;
                state.aiVel.z -= (j / state.aiMass) * nz;

                // Spawn particles at collision point
                const midX = (state.playerPos.x + state.aiPos.x) / 2;
                const midZ = (state.playerPos.z + state.aiPos.z) / 2;
                spawnParticles(midX, 1.2, midZ, 8);
            }
        } else {
            state.collisionOccurring = false;
        }
    }

    function updatePhysics() {
        const damping = 0.92;

        // Apply damping
        state.playerVel.x *= damping;
        state.playerVel.z *= damping;
        state.aiVel.x *= damping;
        state.aiVel.z *= damping;

        // Update positions
        state.playerPos.x += state.playerVel.x * 0.16;
        state.playerPos.z += state.playerVel.z * 0.16;
        state.aiPos.x += state.aiVel.x * 0.16;
        state.aiPos.z += state.aiVel.z * 0.16;

        // Clamp Y
        state.playerPos.y = 1.05;
        state.aiPos.y = 1.05;

        // Update speeds
        state.playerSpeed = Math.sqrt(state.playerVel.x * state.playerVel.x + state.playerVel.z * state.playerVel.z);
        state.aiSpeed = Math.sqrt(state.aiVel.x * state.aiVel.x + state.aiVel.z * state.aiVel.z);

        // Ring-out check
        const playerDist = Math.sqrt(state.playerPos.x * state.playerPos.x + state.playerPos.z * state.playerPos.z);
        const aiDist = Math.sqrt(state.aiPos.x * state.aiPos.x + state.aiPos.z * state.aiPos.z);

        state.playerInRing = playerDist <= 5.0;
        state.aiInRing = aiDist <= 5.0;

        if (!state.playerInRing && roundEndTimer === 0) {
            endRound('ai');
        } else if (!state.aiInRing && roundEndTimer === 0) {
            endRound('player');
        }
    }

    function updateMeshes() {
        playerMesh.position.set(state.playerPos.x, state.playerPos.y, state.playerPos.z);
        aiMesh.position.set(state.aiPos.x, state.aiPos.y, state.aiPos.z);

        // Face opponent
        const pAngle = Math.atan2(state.aiPos.x - state.playerPos.x, state.aiPos.z - state.playerPos.z);
        playerMesh.rotation.y = pAngle;

        const aAngle = Math.atan2(state.playerPos.x - state.aiPos.x, state.playerPos.z - state.aiPos.z);
        aiMesh.rotation.y = aAngle;

        // Wobble based on speed
        const pWobble = Math.sin(state.frameCount * 0.3) * state.playerSpeed * 0.05;
        playerMesh.rotation.z = pWobble;

        const aWobble = Math.sin(state.frameCount * 0.3) * state.aiSpeed * 0.05;
        aiMesh.rotation.z = aWobble;

        // Scale pulse on collision
        if (state.collisionOccurring) {
            const pulse = 1 + Math.sin(state.frameCount * 0.5) * 0.05;
            playerMesh.scale.set(pulse, 1, pulse);
            aiMesh.scale.set(pulse, 1, pulse);
        } else {
            playerMesh.scale.set(1, 1, 1);
            aiMesh.scale.set(1, 1, 1);
        }

        // If out of ring, make them fall
        if (!state.playerInRing && state.gamePaused) {
            playerMesh.position.y -= 0.05;
            playerMesh.rotation.x += 0.05;
        }
        if (!state.aiInRing && state.gamePaused) {
            aiMesh.position.y -= 0.05;
            aiMesh.rotation.x += 0.05;
        }
    }

    function updateUI() {
        hudRound.textContent = `Round: ${state.round}`;
        
        let stars = '';
        for (let i = 0; i < state.difficultyLevel; i++) stars += '★';
        for (let i = state.difficultyLevel; i < 5; i++) stars += '☆';
        hudDifficulty.textContent = `Difficulty: ${stars}`;
        
        hudScore.textContent = `Player Wins: ${state.playerWins} | AI Wins: ${state.aiWins}`;
        
        staminaBar.style.width = `${state.playerStamina}%`;
        if (state.playerStamina < 30) {
            staminaBar.style.background = 'linear-gradient(90deg, #cc0000, #ff3333)';
        } else if (state.playerStamina < 60) {
            staminaBar.style.background = 'linear-gradient(90deg, #ccaa00, #ffdd00)';
        } else {
            staminaBar.style.background = 'linear-gradient(90deg, #00cc00, #00ff00)';
        }
    }

    // ==================== GAME LOOP ====================
    function animate() {
        requestAnimationFrame(animate);

        if (state.gameStarted) {
            state.frameCount++;

            if (state.gamePaused) {
                // Round end timer
                if (roundEndTimer > 0) {
                    roundEndTimer--;
                    updateMeshes();
                    if (roundEndTimer === 0) {
                        state.round++;
                        state.gamePaused = false;
                        roundResult.style.display = 'none';
                        resetPositions();
                    }
                }
            } else {
                handleInput();
                updateAI();
                handleCollision();
                updatePhysics();
                updateMeshes();
            }

            updateUI();
        }

        updateParticles();

        // Camera slight movement
        camera.position.x = Math.sin(state.frameCount * 0.002) * 0.5;
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
    }

    // ==================== RESIZE ====================
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initialize
