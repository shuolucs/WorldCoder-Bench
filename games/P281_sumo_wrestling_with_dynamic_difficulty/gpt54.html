<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sumo Wrestling - Three.js</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1b1208;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      padding: 10px 14px;
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      font-size: 18px;
      user-select: none;
      pointer-events: none;
    }

    #hud-round {
      top: 12px;
      left: 12px;
    }

    #hud-difficulty {
      top: 60px;
      left: 12px;
    }

    #hud-score {
      top: 12px;
      right: 12px;
    }

    #round-result {
      position: absolute;
      z-index: 20;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: bold;
      color: #fff7cc;
      text-shadow: 0 0 12px rgba(0,0,0,0.8);
      display: none;
      pointer-events: none;
      user-select: none;
    }

    #btn-start {
      position: absolute;
      z-index: 30;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 28px;
      font-size: 24px;
      border: none;
      border-radius: 10px;
      background: #2f8cff;
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    #btn-start:hover {
      background: #4a9cff;
    }

    #stamina-container {
      position: absolute;
      z-index: 15;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      width: 240px;
      height: 20px;
      background: rgba(0,0,0,0.5);
      border: 2px solid #ffffffaa;
      border-radius: 999px;
      overflow: hidden;
      pointer-events: none;
    }

    #stamina-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #19c33d, #6dff88);
      transition: width 0.05s linear;
    }

    #stamina-label {
      position: absolute;
      z-index: 16;
      left: 50%;
      bottom: 64px;
      transform: translateX(-50%);
      font-size: 15px;
      background: rgba(0,0,0,0.35);
      padding: 4px 8px;
      border-radius: 6px;
      pointer-events: none;
    }

    #controls-tip {
      position: absolute;
      z-index: 10;
      left: 12px;
      bottom: 12px;
      font-size: 14px;
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 8px;
      pointer-events: none;
      user-select: none;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="hud-round" class="hud">Round: 1</div>
  <div id="hud-difficulty" class="hud">Difficulty: 1</div>
  <div id="hud-score" class="hud">Player Wins: 0 | AI Wins: 0</div>

  <div id="round-result">Player Wins!</div>

  <div id="stamina-label">Stamina</div>
  <div id="stamina-container">
    <div id="stamina-bar"></div>
  </div>

  <div id="controls-tip">
    Move: WASD / Arrow Keys<br>
    Push: SPACE<br>
    Restart: R
  </div>

  <button id="btn-start">Start Game</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x3c2816);

    // Camera
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0.8, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    // Floor plane beneath ring at y=0
    const floorGeo = new THREE.PlaneGeometry(40, 40);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x3b2512 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    // Dohyo
    const ringGeo = new THREE.CylinderGeometry(5, 5, 0.3, 64);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0xe2bc52 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.set(0, 0.15, 0);
    ring.receiveShadow = true;
    ring.castShadow = true;
    scene.add(ring);

    // Red border
    const borderGeo = new THREE.TorusGeometry(5, 0.08, 16, 100);
    const borderMat = new THREE.MeshStandardMaterial({ color: 0xcc2222 });
    const border = new THREE.Mesh(borderGeo, borderMat);
    border.rotation.x = Math.PI / 2;
    border.position.y = 0.31;
    border.receiveShadow = true;
    border.castShadow = true;
    scene.add(border);

    // Wrestlers
    const capsuleRadius = 0.5;
    const capsuleLength = 1.5;
    const playerY = 1.05;

    const capsuleGeo = new THREE.CapsuleGeometry(capsuleRadius, capsuleLength, 8, 16);

    const playerMat = new THREE.MeshStandardMaterial({ color: 0x2f6dff });
    const aiMat = new THREE.MeshStandardMaterial({ color: 0xd62f2f });

    const playerMesh = new THREE.Mesh(capsuleGeo, playerMat);
    playerMesh.castShadow = true;
    playerMesh.receiveShadow = true;
    scene.add(playerMesh);

    const aiMesh = new THREE.Mesh(capsuleGeo, aiMat);
    aiMesh.castShadow = true;
    aiMesh.receiveShadow = true;
    scene.add(aiMesh);

    // UI
    const hudRound = document.getElementById("hud-round");
    const hudDifficulty = document.getElementById("hud-difficulty");
    const hudScore = document.getElementById("hud-score");
    const staminaBar = document.getElementById("stamina-bar");
    const roundResult = document.getElementById("round-result");
    const btnStart = document.getElementById("btn-start");

    // Input
    const keys = {};
    let spacePressed = false;

    window.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.code === "Space") {
        e.preventDefault();
        if (!spacePressed) {
          attemptPlayerAttack();
        }
        spacePressed = true;
      }

      if (e.key.toLowerCase() === "r") {
        fullRestart();
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
      if (e.code === "Space") {
        spacePressed = false;
      }
    });

    // Game state
    const initialPlayerMass = 100;
    let player = {
      position: new THREE.Vector3(0, playerY, 3),
      velocity: new THREE.Vector3(0, 0, 0),
      mass: initialPlayerMass,
      stamina: 100
    };

    let ai = {
      position: new THREE.Vector3(0, playerY, -3),
      velocity: new THREE.Vector3(0, 0, 0),
      mass: 80,
      stamina: 100
    };

    let gameStarted = false;
    let gamePaused = true;
    let round = 1;
    let roundsPlayed = 0;
    let difficultyLevel = 1;
    let playerWins = 0;
    let aiWins = 0;
    let lastRoundWinner = "none";
    let aiAttackCooldown = 0;
    let frameCount = 0;
    let collisionOccurring = false;
    let roundEndTimer = 0;

    const ROUND_RESULT_SHOW_FRAMES = 180; // 3 seconds at ~60fps
    const ROUND_TEXT_VISIBLE_FRAMES = 120; // 2 seconds visible

    function resetPositionsOnly() {
      player.position.set(0, playerY, 3);
      player.velocity.set(0, 0, 0);
      player.stamina = 100;

      ai.position.set(0, playerY, -3);
      ai.velocity.set(0, 0, 0);
      ai.mass = 80 + difficultyLevel * 10;
      ai.stamina = 100;

      aiAttackCooldown = Math.max(30, 180 - difficultyLevel * 25);
      collisionOccurring = false;
      syncMeshes();
      updateHUD();
      updateExposedState();
    }

    function fullRestart() {
      gameStarted = false;
      gamePaused = true;
      round = 1;
      roundsPlayed = 0;
      difficultyLevel = 1;
      playerWins = 0;
      aiWins = 0;
      lastRoundWinner = "none";
      roundEndTimer = 0;
      roundResult.style.display = "none";
      btnStart.style.display = "block";
      resetPositionsOnly();
    }

    function startGame() {
      gameStarted = true;
      gamePaused = false;
      btnStart.style.display = "none";
      roundResult.style.display = "none";
      resetPositionsOnly();
    }

    btnStart.addEventListener("click", startGame);

    function updateHUD() {
      hudRound.textContent = `Round: ${round}`;
      hudDifficulty.textContent = `Difficulty: ${difficultyLevel}`;
      hudScore.textContent = `Player Wins: ${playerWins} | AI Wins: ${aiWins}`;
      staminaBar.style.width = `${Math.max(0, Math.min(100, player.stamina))}%`;
    }

    function syncMeshes() {
      playerMesh.position.copy(player.position);
      aiMesh.position.copy(ai.position);

      // Face movement/opponent direction slightly for clarity
      const pDir = new THREE.Vector3().subVectors(ai.position, player.position);
      const aDir = new THREE.Vector3().subVectors(player.position, ai.position);

      if (pDir.lengthSq() > 0.0001) playerMesh.rotation.y = Math.atan2(pDir.x, pDir.z);
      if (aDir.lengthSq() > 0.0001) aiMesh.rotation.y = Math.atan2(aDir.x, aDir.z);
    }

    function clampY() {
      player.position.y = playerY;
      ai.position.y = playerY;
      player.velocity.y = 0;
      ai.velocity.y = 0;
    }

    function getPlayerInputDir() {
      let x = 0;
      let z = 0;

      if (keys["a"] || keys["arrowleft"]) x -= 1;
      if (keys["d"] || keys["arrowright"]) x += 1;
      if (keys["w"] || keys["arrowup"]) z -= 1;
      if (keys["s"] || keys["arrowdown"]) z += 1;

      const dir = new THREE.Vector3(x, 0, z);
      if (dir.lengthSq() > 0) dir.normalize();
      return dir;
    }

    function attemptPlayerAttack() {
      if (!gameStarted || gamePaused) return;
      if (player.stamina < 20) return;

      const dir = new THREE.Vector3().subVectors(ai.position, player.position);
      dir.y = 0;
      if (dir.lengthSq() === 0) return;
      dir.normalize();

      player.velocity.add(dir.multiplyScalar(3.0));
      player.stamina -= 20;
      player.stamina = Math.max(0, player.stamina);
    }

    function attemptAIAttack() {
      if (aiAttackCooldown > 0) return;

      const toPlayer = new THREE.Vector3().subVectors(player.position, ai.position);
      const dist = toPlayer.length();

      if (dist <= 3.0) {
        toPlayer.y = 0;
        if (toPlayer.lengthSq() > 0) {
          toPlayer.normalize();
          const force = 2.0 + difficultyLevel * 0.5;
          ai.velocity.add(toPlayer.multiplyScalar(force));
        }
        aiAttackCooldown = Math.max(30, 180 - difficultyLevel * 25);
      }
    }

    function updatePlayer() {
      const dir = getPlayerInputDir();
      const accel = 0.15;
      player.velocity.x += dir.x * accel;
      player.velocity.z += dir.z * accel;

      if (!spacePressed) {
        player.stamina = Math.min(100, player.stamina + 0.5);
      }

      player.velocity.x *= 0.92;
      player.velocity.z *= 0.92;

      player.position.x += player.velocity.x;
      player.position.z += player.velocity.z;
    }

    function updateAI() {
      const toPlayer = new THREE.Vector3().subVectors(player.position, ai.position);
      toPlayer.y = 0;

      if (toPlayer.lengthSq() > 0) {
        toPlayer.normalize();
      }

      const aiAccel = 0.05 + difficultyLevel * 0.025;
      ai.mass = 80 + difficultyLevel * 10;

      ai.velocity.x += toPlayer.x * aiAccel;
      ai.velocity.z += toPlayer.z * aiAccel;

      ai.velocity.x *= 0.92;
      ai.velocity.z *= 0.92;

      ai.position.x += ai.velocity.x;
      ai.position.z += ai.velocity.z;

      aiAttackCooldown = Math.max(0, aiAttackCooldown - 1);
      attemptAIAttack();
    }

    function handleCollision() {
      const delta = new THREE.Vector3().subVectors(ai.position, player.position);
      delta.y = 0;
      const dist = delta.length();
      const minDist = 1.2;
      collisionOccurring = dist < minDist;

      if (!collisionOccurring) return;

      const normal = dist > 0.0001 ? delta.clone().normalize() : new THREE.Vector3(0, 0, 1);
      const relativeVel = new THREE.Vector3().subVectors(ai.velocity, player.velocity);
      const sepVel = relativeVel.dot(normal);

      const overlap = minDist - dist;
      const positionalCorrection = normal.clone().multiplyScalar(overlap * 0.5 + 0.001);
      ai.position.add(positionalCorrection);
      player.position.sub(positionalCorrection);

      // Elastic-like impulse
      const restitution = 0.9;
      const invMass1 = 1 / player.mass;
      const invMass2 = 1 / ai.mass;

      let impulseMag = -(1 + restitution) * sepVel;
      impulseMag /= (invMass1 + invMass2);

      // Even if sepVel isn't strongly negative, add shove response while overlapping
      impulseMag += overlap * 4.0;

      const impulse = normal.clone().multiplyScalar(impulseMag);

      player.velocity.addScaledVector(impulse, -invMass1);
      ai.velocity.addScaledVector(impulse, invMass2);
    }

    function inRing(pos) {
      return Math.hypot(pos.x, pos.z) <= 5.0;
    }

    function endRound(winner) {
      if (gamePaused) return;

      gamePaused = true;
      roundEndTimer = 0;
      lastRoundWinner = winner;
      roundsPlayed++;

      if (winner === "player") {
        playerWins++;
        difficultyLevel = Math.min(5, difficultyLevel + 1);
        roundResult.textContent = "Player Wins!";
      } else {
        aiWins++;
        difficultyLevel = Math.max(1, difficultyLevel - 1);
        roundResult.textContent = "AI Wins!";
      }

      roundResult.style.display = "block";
      updateHUD();
    }

    function updateRoundTransition() {
      if (!gamePaused) return;

      roundEndTimer++;

      if (lastRoundWinner !== "none") {
        if (roundEndTimer <= ROUND_TEXT_VISIBLE_FRAMES) {
          roundResult.style.display = "block";
        } else {
          roundResult.style.display = "none";
        }

        if (roundEndTimer >= ROUND_RESULT_SHOW_FRAMES) {
          round++;
          resetPositionsOnly();
          gamePaused = false;
          lastRoundWinner = "none";
          roundEndTimer = 0;
          roundResult.style.display = "none";
        }
      }
    }

    function updateExposedState() {
      const playerInRing = inRing(player.position);
      const aiInRing = inRing(ai.position);
      const playerSpeed = Math.hypot(player.velocity.x, player.velocity.z);
      const aiSpeed = Math.hypot(ai.velocity.x, ai.velocity.z);

      window.__3D_STATE__ = {
        gameStarted,
        gamePaused,
        round,
        difficultyLevel,
        playerPos: {
          x: player.position.x,
          y: player.position.y,
          z: player.position.z
        },
        aiPos: {
          x: ai.position.x,
          y: ai.position.y,
          z: ai.position.z
        },
        playerVel: {
          x: player.velocity.x,
          z: player.velocity.z
        },
        aiVel: {
          x: ai.velocity.x,
          z: ai.velocity.z
        },
        playerStamina: player.stamina,
        playerMass: player.mass,
        aiMass: ai.mass,
        playerWins,
        aiWins,
        playerInRing,
        aiInRing,
        lastRoundWinner,
        aiAttackCooldown,
        frameCount,
        collisionOccurring,
        playerSpeed,
        aiSpeed
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      if (gameStarted) {
        if (!gamePaused) {
          updatePlayer();
          updateAI();
          handleCollision();
          clampY();

          const playerInRing = inRing(player.position);
          const aiInRing = inRing(ai.position);

          if (!playerInRing && aiInRing) {
            endRound("ai");
          } else if (!aiInRing && playerInRing) {
            endRound("player");
          } else if (!playerInRing && !aiInRing) {
            // If both leave, award to the one closer to center as a simple tiebreaker
            const pDist = Math.hypot(player.position.x, player.position.z);
            const aDist = Math.hypot(ai.position.x, ai.position.z);
            endRound(pDist < aDist ? "player" : "ai");
          }
        } else {
          updateRoundTransition();
        }
      }

      syncMeshes();
      updateHUD();
      updateExposedState();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetPositionsOnly();
    updateExposedState();
    animate();
  </script>
</body>
</html>
