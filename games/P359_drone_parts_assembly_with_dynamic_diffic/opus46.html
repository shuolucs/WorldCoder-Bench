<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Drone Assembly Experience</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud-panel {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(0, 10, 30, 0.85);
  border: 1px solid rgba(0, 170, 255, 0.4);
  border-radius: 12px;
  padding: 20px;
  color: #e0e0e0;
  min-width: 260px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0, 170, 255, 0.15);
}

#hud-panel h2 {
  color: #00aaff;
  font-size: 16px;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  border-bottom: 1px solid rgba(0, 170, 255, 0.3);
  padding-bottom: 8px;
}

.hud-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 13px;
}

.hud-label { color: #888; }
.hud-value { color: #fff; font-weight: bold; }

#difficulty-display {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
}

.diff-easy { background: #2a5a2a; color: #44ff44; }
.diff-medium { background: #5a5a2a; color: #ffff44; }
.diff-hard { background: #5a2a2a; color: #ff4444; }

#progress-container {
  margin-top: 12px;
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  height: 12px;
  overflow: hidden;
}

#progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00aaff, #00ff88);
  border-radius: 6px;
  transition: width 0.5s ease;
}

.btn-group {
  margin-top: 15px;
  display: flex;
  gap: 8px;
}

.hud-btn {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid rgba(0, 170, 255, 0.5);
  background: rgba(0, 170, 255, 0.1);
  color: #00aaff;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.3s;
}

.hud-btn:hover:not(:disabled) {
  background: rgba(0, 170, 255, 0.3);
  box-shadow: 0 0 10px rgba(0, 170, 255, 0.3);
}

.hud-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

#selected-part {
  color: #00ff88;
}

#error-count {
  color: #ff4444;
}

#instruction-text {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 10, 30, 0.8);
  border: 1px solid rgba(0, 170, 255, 0.3);
  border-radius: 8px;
  padding: 10px 20px;
  color: #aaa;
  font-size: 13px;
  text-align: center;
  pointer-events: none;
}

#notification {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 20, 40, 0.95);
  border: 2px solid #00aaff;
  border-radius: 12px;
  padding: 20px 40px;
  color: #fff;
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 100;
}
</style>
</head>
<body>

<div id="hud-panel">
  <h2>🛸 Drone Assembly</h2>
  <div class="hud-row">
    <span class="hud-label">Difficulty:</span>
    <span id="difficulty-display" class="hud-value diff-easy">EASY</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Parts Placed:</span>
    <span id="parts-placed" class="hud-value">0 / 8</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Errors:</span>
    <span id="error-count" class="hud-value">0</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Selected:</span>
    <span id="selected-part" class="hud-value">None</span>
  </div>
  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>
  <div class="btn-group">
    <button id="reset-btn" class="hud-btn">Reset</button>
    <button id="test-flight-btn" class="hud-btn" disabled>Test Flight</button>
  </div>
</div>

<div id="instruction-text">
  Click a part to select it, then click the assembly platform to place it. Assemble all 8 parts to unlock Test Flight!
</div>

<div id="notification"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
  partsPlaced: 0,
  difficulty: 1,
  errorCount: 0,
  selectedPart: null,
  assemblyComplete: false,
  testFlightActive: false,
  droneY: 0.5,
  foxLoaded: false,
  partStates: {},
  progressPercent: 0,
  snapTolerance: 999
};

window.__3D_STATE__ = state;

function updateState() {
  state.progressPercent = Math.round((state.partsPlaced / 8) * 100);
  if (state.partsPlaced >= 6) {
    state.difficulty = 3;
    state.snapTolerance = 0.8;
  } else if (state.partsPlaced >= 3) {
    state.difficulty = 2;
    state.snapTolerance = 1.5;
  } else {
    state.difficulty = 1;
    state.snapTolerance = 999;
  }
  state.assemblyComplete = state.partsPlaced >= 8;

  // Sanitize
  for (const key of ['partsPlaced', 'difficulty', 'errorCount', 'droneY', 'progressPercent', 'snapTolerance']) {
    if (typeof state[key] !== 'number' || isNaN(state[key])) {
      state[key] = 0;
    }
  }

  updateHUD();
}

function updateHUD() {
  document.getElementById('parts-placed').textContent = `${state.partsPlaced} / 8`;
  document.getElementById('error-count').textContent = state.errorCount;
  document.getElementById('selected-part').textContent = state.selectedPart || 'None';
  document.getElementById('progress-bar').style.width = state.progressPercent + '%';

  const diffEl = document.getElementById('difficulty-display');
  if (state.difficulty === 1) {
    diffEl.textContent = 'EASY';
    diffEl.className = 'hud-value diff-easy';
  } else if (state.difficulty === 2) {
    diffEl.textContent = 'MEDIUM';
    diffEl.className = 'hud-value diff-medium';
  } else {
    diffEl.textContent = 'HARD';
    diffEl.className = 'hud-value diff-hard';
  }

  document.getElementById('test-flight-btn').disabled = !state.assemblyComplete || state.testFlightActive;
}

function showNotification(text, duration = 1500) {
  const el = document.getElementById('notification');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, duration);
}

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);
scene.fog = new THREE.Fog(0x111122, 15, 30);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 3;
controls.maxDistance = 20;

// Lights
const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x00aaff, 0.5, 20);
pointLight.position.set(-3, 4, -3);
scene.add(pointLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8, metalness: 0.2 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const grid = new THREE.GridHelper(20, 40, 0x222244, 0x222244);
grid.position.y = 0.01;
scene.add(grid);

// ============ ASSEMBLY PLATFORM ============
const platformGroup = new THREE.Group();
platformGroup.position.set(0, 0.01, 0);

const platformGeo = new THREE.CircleGeometry(2, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x112211,
  emissive: 0x003300,
  emissiveIntensity: 0.3,
  roughness: 0.5,
  metalness: 0.3,
  transparent: true,
  opacity: 0.8
});
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.rotation.x = -Math.PI / 2;
platform.receiveShadow = true;
platformGroup.add(platform);

// Glowing ring
const ringGeo = new THREE.RingGeometry(1.9, 2.05, 64);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0x00ff44,
  transparent: true,
  opacity: 0.6,
  side: THREE.DoubleSide
});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.02;
platformGroup.add(ring);

// Inner ring
const innerRingGeo = new THREE.RingGeometry(0.95, 1.0, 64);
const innerRing = new THREE.Mesh(innerRingGeo, ringMat.clone());
innerRing.rotation.x = -Math.PI / 2;
innerRing.position.y = 0.02;
innerRing.material.opacity = 0.3;
platformGroup.add(innerRing);

scene.add(platformGroup);

// ============ DRONE PARTS ============
const partDefinitions = [
  {
    name: 'Frame',
    geometry: new THREE.BoxGeometry(1.5, 0.15, 1.5),
    color: 0x333333,
    spawnPos: new THREE.Vector3(-4, 0.5, 0),
    targetPos: new THREE.Vector3(0, 0.5, 0),
    order: 0
  },
  {
    name: 'Motor A',
    geometry: new THREE.CylinderGeometry(0.15, 0.15, 0.3, 16),
    color: 0xcc0000,
    spawnPos: new THREE.Vector3(-4, 0.5, 2),
    targetPos: new THREE.Vector3(-0.6, 0.65, -0.6),
    order: 1
  },
  {
    name: 'Motor B',
    geometry: new THREE.CylinderGeometry(0.15, 0.15, 0.3, 16),
    color: 0x00cc00,
    spawnPos: new THREE.Vector3(-2, 0.5, 2),
    targetPos: new THREE.Vector3(0.6, 0.65, -0.6),
    order: 1
  },
  {
    name: 'Motor C',
    geometry: new THREE.CylinderGeometry(0.15, 0.15, 0.3, 16),
    color: 0x0000cc,
    spawnPos: new THREE.Vector3(-4, 0.5, 4),
    targetPos: new THREE.Vector3(-0.6, 0.65, 0.6),
    order: 1
  },
  {
    name: 'Motor D',
    geometry: new THREE.CylinderGeometry(0.15, 0.15, 0.3, 16),
    color: 0xcccc00,
    spawnPos: new THREE.Vector3(-2, 0.5, 4),
    targetPos: new THREE.Vector3(0.6, 0.65, 0.6),
    order: 1
  },
  {
    name: 'Battery',
    geometry: new THREE.BoxGeometry(0.4, 0.15, 0.6),
    color: 0xff8800,
    spawnPos: new THREE.Vector3(0, 0.5, 3),
    targetPos: new THREE.Vector3(0, 0.58, 0),
    order: 2
  },
  {
    name: 'Camera Module',
    geometry: new THREE.SphereGeometry(0.15, 16, 16),
    color: 0xffffff,
    spawnPos: new THREE.Vector3(0, 0.5, 5),
    targetPos: new THREE.Vector3(0, 0.35, -0.75),
    order: 3
  },
  {
    name: 'Propeller Pack',
    geometry: new THREE.BoxGeometry(0.8, 0.02, 0.2),
    color: 0x88ffff,
    spawnPos: new THREE.Vector3(2, 0.5, 3),
    targetPos: new THREE.Vector3(0, 0.75, 0),
    order: 4
  }
];

const parts = [];
const partMeshes = [];
const droneGroup = new THREE.Group();
scene.add(droneGroup);

// Create label sprites
function createLabel(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.roundRect(0, 0, 256, 64, 8);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 24px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);

  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.8 });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(1.2, 0.3, 1);
  return sprite;
}

partDefinitions.forEach((def, i) => {
  const mat = new THREE.MeshStandardMaterial({
    color: def.color,
    roughness: 0.4,
    metalness: 0.6,
    emissive: def.color,
    emissiveIntensity: 0.05
  });
  const mesh = new THREE.Mesh(def.geometry, mat);
  mesh.position.copy(def.spawnPos);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = {
    name: def.name,
    index: i,
    spawnPos: def.spawnPos.clone(),
    targetPos: def.targetPos.clone(),
    order: def.order,
    placed: false,
    selected: false,
    originalColor: def.color,
    animating: false,
    animStart: 0,
    animFrom: new THREE.Vector3(),
    errorFlash: 0,
    wobble: 0
  };

  // Label
  const label = createLabel(def.name);
  label.position.y = 0.5;
  mesh.add(label);

  scene.add(mesh);
  parts.push(mesh);
  partMeshes.push(mesh);

  state.partStates[def.name] = 'unplaced';
});

// Target position indicators (ghost outlines)
const ghostMeshes = [];
partDefinitions.forEach((def) => {
  const ghostMat = new THREE.MeshBasicMaterial({
    color: 0x00ff44,
    transparent: true,
    opacity: 0.08,
    wireframe: true
  });
  const ghost = new THREE.Mesh(def.geometry.clone(), ghostMat);
  ghost.position.copy(def.targetPos);
  ghost.visible = true;
  scene.add(ghost);
  ghostMeshes.push(ghost);
});

// Propellers (created when propeller pack is placed)
const propellers = [];
function createPropellers() {
  const motorPositions = [
    new THREE.Vector3(-0.6, 0.85, -0.6),
    new THREE.Vector3(0.6, 0.85, -0.6),
    new THREE.Vector3(-0.6, 0.85, 0.6),
    new THREE.Vector3(0.6, 0.85, 0.6)
  ];

  motorPositions.forEach((pos) => {
    const propGeo = new THREE.BoxGeometry(0.6, 0.01, 0.06);
    const propMat = new THREE.MeshStandardMaterial({
      color: 0x88ffff,
      transparent: true,
      opacity: 0.7,
      metalness: 0.8,
      roughness: 0.2
    });
    const prop = new THREE.Mesh(propGeo, propMat);
    prop.position.copy(pos);
    prop.castShadow = true;
    droneGroup.add(prop);
    propellers.push(prop);

    // Second blade perpendicular
    const prop2 = new THREE.Mesh(propGeo.clone(), propMat.clone());
    prop2.position.copy(pos);
    prop2.rotation.y = Math.PI / 2;
    prop2.castShadow = true;
    droneGroup.add(prop2);
    propellers.push(prop2);
  });
}

// ============ FOX MASCOT ============
let foxModel = null;
let foxMixer = null;
let foxActions = [];

const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Fox/glTF-Binary/Fox.glb',
  (gltf) => {
    foxModel = gltf.scene;
    foxModel.scale.set(0.02, 0.02, 0.02);
    foxModel.position.set(5, 0, 5);
    foxModel.rotation.y = -Math.PI / 4;
    foxModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(foxModel);
    state.foxLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      foxMixer = new THREE.AnimationMixer(foxModel);
      gltf.animations.forEach((clip) => {
        const action = foxMixer.clipAction(clip);
        foxActions.push({ action, name: clip.name });
      });
      // Play first animation (idle/survey)
      if (foxActions.length > 0) {
        foxActions[0].action.play();
      }
    }
  },
  undefined,
  (error) => {
    console.warn('Fox model failed to load:', error);
    // Create placeholder
    const foxPlaceholder = new THREE.Group();
    const body = new THREE.Mesh(
      new THREE.ConeGeometry(0.3, 0.6, 8),
      new THREE.MeshStandardMaterial({ color: 0xff6600 })
    );
    body.position.y = 0.3;
    foxPlaceholder.add(body);
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.2, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0xff8833 })
    );
    head.position.set(0, 0.7, 0);
    foxPlaceholder.add(head);
    foxPlaceholder.position.set(5, 0, 5);
    scene.add(foxPlaceholder);
    foxModel = foxPlaceholder;
    state.foxLoaded = true;
  }
);

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedPart = null;

function selectPart(mesh) {
  // Deselect previous
  if (selectedPart) {
    selectedPart.userData.selected = false;
    selectedPart.material.emissiveIntensity = 0.05;
  }

  if (mesh && !mesh.userData.placed) {
    selectedPart = mesh;
    selectedPart.userData.selected = true;
    selectedPart.material.emissiveIntensity = 0.4;
    state.selectedPart = mesh.userData.name;
  } else {
    selectedPart = null;
    state.selectedPart = null;
  }
  updateHUD();
}

function getRequiredOrder() {
  // Returns the minimum order value that should be placed next
  if (state.difficulty === 1) return -1; // any order

  // Find the minimum order among unplaced parts
  let minUnplacedOrder = Infinity;
  parts.forEach(p => {
    if (!p.userData.placed && p.userData.order < minUnplacedOrder) {
      minUnplacedOrder = p.userData.order;
    }
  });
  return minUnplacedOrder;
}

function canPlace(part) {
  if (state.difficulty === 1) return true;

  const requiredOrder = getRequiredOrder();
  return part.userData.order <= requiredOrder;
}

function tryPlacePart(clickPoint) {
  if (!selectedPart || selectedPart.userData.placed) return;

  const part = selectedPart;
  const target = part.userData.targetPos;

  // Check order
  if (!canPlace(part)) {
    triggerError(part, 'Wrong order! Place required parts first.');
    return;
  }

  // Check snap tolerance
  const dist = clickPoint.distanceTo(target);
  if (dist > state.snapTolerance) {
    triggerError(part, 'Too far from target position!');
    return;
  }

  // Place the part
  placePart(part);
}

function triggerError(part, message) {
  state.errorCount++;
  state.partStates[part.userData.name] = 'error';
  part.userData.errorFlash = 1.0;

  if (state.difficulty >= 3) {
    part.userData.wobble = 1.0;
  }

  showNotification('❌ ' + message, 1200);
  updateState();

  // Reset error state after a moment
  setTimeout(() => {
    if (!part.userData.placed) {
      state.partStates[part.userData.name] = 'unplaced';
    }
  }, 500);
}

function placePart(part) {
  part.userData.placed = true;
  part.userData.selected = false;
  part.userData.animating = true;
  part.userData.animStart = performance.now();
  part.userData.animFrom.copy(part.position);

  state.partStates[part.userData.name] = 'placed';
  state.partsPlaced++;

  // Remove from scene, add to droneGroup after animation
  selectPart(null);

  showNotification('✅ ' + part.userData.name + ' placed!', 1000);

  // Check if propeller pack
  if (part.userData.name === 'Propeller Pack') {
    setTimeout(() => createPropellers(), 350);
  }

  updateState();
}

// Click handler
renderer.domElement.addEventListener('click', (event) => {
  if (state.testFlightActive) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check parts first
  const partIntersects = raycaster.intersectObjects(partMeshes);
  if (partIntersects.length > 0) {
    const hitPart = partIntersects[0].object;
    if (!hitPart.userData.placed) {
      selectPart(hitPart);
      return;
    }
  }

  // Check platform click for placement
  if (selectedPart) {
    const platformIntersects = raycaster.intersectObject(platform, true);
    const groundIntersects = raycaster.intersectObject(ground);

    let clickPoint = null;
    if (platformIntersects.length > 0) {
      clickPoint = platformIntersects[0].point;
    } else if (groundIntersects.length > 0) {
      const gp = groundIntersects[0].point;
      // Check if near platform
      if (Math.sqrt(gp.x * gp.x + gp.z * gp.z) < 3) {
        clickPoint = gp;
      }
    }

    if (clickPoint) {
      tryPlacePart(clickPoint);
    }
  }
});

// ============ RESET ============
document.getElementById('reset-btn').addEventListener('click', () => {
  // Reset all parts
  parts.forEach((part) => {
    part.userData.placed = false;
    part.userData.selected = false;
    part.userData.animating = false;
    part.userData.errorFlash = 0;
    part.userData.wobble = 0;
    part.position.copy(part.userData.spawnPos);
    part.material.emissiveIntensity = 0.05;
    part.material.emissive.setHex(part.userData.originalColor);
    part.visible = true;
    state.partStates[part.userData.name] = 'unplaced';

    if (part.parent !== scene) {
      part.parent?.remove(part);
      scene.add(part);
    }
  });

  // Remove propellers
  propellers.forEach(p => droneGroup.remove(p));
  propellers.length = 0;

  // Reset drone group
  droneGroup.position.set(0, 0, 0);
  droneGroup.rotation.set(0, 0, 0);

  // Reset state
  state.partsPlaced = 0;
  state.difficulty = 1;
  state.errorCount = 0;
  state.selectedPart = null;
  state.assemblyComplete = false;
  state.testFlightActive = false;
  state.droneY = 0.5;
  state.progressPercent = 0;
  state.snapTolerance = 999;

  selectedPart = null;

  // Reset fox animation
  if (foxMixer && foxActions.length > 0) {
    foxActions.forEach(a => a.action.stop());
    foxActions[0].action.play();
  }

  showNotification('🔄 Assembly Reset', 1000);
  updateHUD();
});

// ============ TEST FLIGHT ============
let testFlightStartTime = 0;

document.getElementById('test-flight-btn').addEventListener('click', () => {
  if (!state.assemblyComplete || state.testFlightActive) return;

  state.testFlightActive = true;
  testFlightStartTime = performance.now();

  showNotification('🚀 Test Flight Initiated!', 2000);

  // Switch fox to run animation if available
  if (foxMixer && foxActions.length > 1) {
    foxActions[0].action.fadeOut(0.3);
    const runAction = foxActions.length > 2 ? foxActions[2] : foxActions[1];
    runAction.action.reset().fadeIn(0.3).play();
  }

  updateHUD();
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const time = performance.now() * 0.001;

  controls.update();

  // Fox animation
  if (foxMixer) {
    foxMixer.update(delta);
  }

  // Fox idle bob if no animation
  if (foxModel && !foxMixer) {
    foxModel.position.y = Math.sin(time * 2) * 0.05;
  }

  // Platform glow pulse
  ringMat.opacity = 0.4 + Math.sin(time * 3) * 0.2;
  platformMat.emissiveIntensity = 0.2 + Math.sin(time * 2) * 0.1;

  // Part animations
  parts.forEach((part) => {
    if (part.userData.animating) {
      const elapsed = (performance.now() - part.userData.animStart) / 300; // 0.3s
      if (elapsed >= 1) {
        part.position.copy(part.userData.targetPos);
        part.userData.animating = false;

        // Move to drone group
        scene.remove(part);
        const worldPos = part.userData.targetPos.clone();
        droneGroup.add(part);
        part.position.copy(worldPos);

        // Hide label
        part.children.forEach(c => { if (c.isSprite) c.visible = false; });
      } else {
        const t = elapsed * elapsed * (3 - 2 * elapsed); // smoothstep
        part.position.lerpVectors(part.userData.animFrom, part.userData.targetPos, t);
        // Add a little arc
        part.position.y += Math.sin(t * Math.PI) * 0.3;
      }
    } else if (!part.userData.placed) {
      // Hover animation for unplaced parts
      part.position.y = part.userData.spawnPos.y + Math.sin(time * 2 + part.userData.index) * 0.05;

      // Selection glow pulse
      if (part.userData.selected) {
        part.material.emissiveIntensity = 0.3 + Math.sin(time * 5) * 0.15;
      }

      // Error flash
      if (part.userData.errorFlash > 0) {
        part.userData.errorFlash -= delta * 3;
        if (part.userData.errorFlash <= 0) {
          part.userData.errorFlash = 0;
          part.material.emissive.setHex(part.userData.originalColor);
        } else {
          const flash = Math.sin(part.userData.errorFlash * Math.PI * 6) > 0;
          part.material.emissive.setHex(flash ? 0xff0000 : part.userData.originalColor);
        }
      }

      // Wobble for hard difficulty errors
      if (part.userData.wobble > 0) {
        part.userData.wobble -= delta * 2;
        if (part.userData.wobble <= 0) {
          part.userData.wobble = 0;
          part.rotation.set(0, 0, 0);
        } else {
          part.rotation.z = Math.sin(time * 30) * 0.15 * part.userData.wobble;
          part.rotation.x = Math.cos(time * 25) * 0.1 * part.userData.wobble;
        }
      }
    }
  });

  // Ghost target visibility
  ghostMeshes.forEach((ghost, i) => {
    const part = parts[i];
    ghost.visible = !part.userData.placed;
    if (ghost.visible) {
      ghost.material.opacity = 0.05 + Math.sin(time * 2) * 0.03;
    }
  });

  // Propeller spin
  propellers.forEach((prop, i) => {
    prop.rotation.y += delta * (state.testFlightActive ? 40 : 8);
  });

  // Test flight animation
  if (state.testFlightActive) {
    const flightElapsed = (performance.now() - testFlightStartTime) / 2000; // 2 seconds
    if (flightElapsed < 1) {
      const t = flightElapsed * flightElapsed * (3 - 2 * flightElapsed);
      droneGroup.position.y = t * 3.5;
      droneGroup.rotation.y += delta * 1.5;
      state.droneY = 0.5 + droneGroup.position.y;
    } else {
      // Hover at top
      droneGroup.position.y = 3.5 + Math.sin(time * 1.5) * 0.1;
      droneGroup.rotation.y += delta * 0.8;
      state.droneY = 0.5 + droneGroup.position.y;
    }
  }

  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
updateState();
animate();
</script>
