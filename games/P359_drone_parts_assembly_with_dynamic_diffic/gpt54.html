<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Drone Assembly Experience</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #hud-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 280px;
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid rgba(0, 255, 180, 0.35);
      border-radius: 10px;
      padding: 14px;
      z-index: 10;
      box-shadow: 0 0 20px rgba(0, 255, 180, 0.15);
      backdrop-filter: blur(4px);
    }

    #hud-panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #88ffff;
    }

    .hud-row {
      margin: 8px 0;
      font-size: 14px;
    }

    .label {
      color: #aaa;
    }

    .value {
      color: #fff;
      font-weight: bold;
    }

    .progress-wrap {
      margin-top: 10px;
      width: 100%;
      height: 16px;
      background: #222;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #555;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00c853, #88ffff);
      transition: width 0.2s ease;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: #1e88e5;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s ease, opacity 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: #666;
    }

    #reset-btn {
      background: #ef5350;
    }

    #test-flight-btn {
      background: #43a047;
    }

    #instructions {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,0.65);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: #ddd;
      max-width: 420px;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div id="hud-panel">
    <h2>Drone Assembly HUD</h2>
    <div class="hud-row"><span class="label">Difficulty:</span> <span class="value" id="difficulty-display">1</span></div>
    <div class="hud-row"><span class="label">Parts placed:</span> <span class="value" id="parts-placed">0 / 8</span></div>
    <div class="hud-row"><span class="label">Errors:</span> <span class="value" id="error-count">0</span></div>
    <div class="hud-row"><span class="label">Selected part:</span> <span class="value" id="selected-part">None</span></div>
    <div class="hud-row"><span class="label">Assembly Progress:</span></div>
    <div class="progress-wrap"><div id="progress-bar"></div></div>
    <div class="btn-row">
      <button id="reset-btn">Reset Assembly</button>
      <button id="test-flight-btn" disabled>Test Flight</button>
    </div>
  </div>

  <div id="instructions">
    Click a part to select it. Click the glowing assembly platform to place it.
    Difficulty increases automatically as you assemble the drone.
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101418);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const pointLight = new THREE.PointLight(0x00aaff, 0.5);
    pointLight.position.set(-3, 4, -3);
    scene.add(pointLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x444444 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const workbenchGrid = new THREE.GridHelper(20, 20, 0x666666, 0x333333);
    workbenchGrid.position.y = 0.001;
    scene.add(workbenchGrid);

    const assemblyZoneGroup = new THREE.Group();
    scene.add(assemblyZoneGroup);

    const zoneBase = new THREE.Mesh(
      new THREE.CircleGeometry(2, 64),
      new THREE.MeshStandardMaterial({
        color: 0x0d2d12,
        emissive: 0x113d1a,
        emissiveIntensity: 0.6,
        transparent: true,
        opacity: 0.95
      })
    );
    zoneBase.rotation.x = -Math.PI / 2;
    zoneBase.position.set(0, 0.01, 0);
    zoneBase.receiveShadow = true;
    zoneBase.userData.isAssemblyZone = true;
    assemblyZoneGroup.add(zoneBase);

    const zoneRing = new THREE.Mesh(
      new THREE.RingGeometry(1.85, 2.0, 64),
      new THREE.MeshBasicMaterial({
        color: 0x66ff99,
        transparent: true,
        opacity: 0.9,
        side: THREE.DoubleSide
      })
    );
    zoneRing.rotation.x = -Math.PI / 2;
    zoneRing.position.set(0, 0.012, 0);
    zoneRing.userData.isAssemblyZone = true;
    assemblyZoneGroup.add(zoneRing);

    const droneAssemblyRoot = new THREE.Group();
    droneAssemblyRoot.position.set(0, 0, 0);
    scene.add(droneAssemblyRoot);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const hud = {
      difficulty: document.getElementById('difficulty-display'),
      partsPlaced: document.getElementById('parts-placed'),
      errorCount: document.getElementById('error-count'),
      selectedPart: document.getElementById('selected-part'),
      progressBar: document.getElementById('progress-bar'),
      resetBtn: document.getElementById('reset-btn'),
      testFlightBtn: document.getElementById('test-flight-btn')
    };

    const partOrder = [
      'Frame',
      'Motor A',
      'Motor B',
      'Motor C',
      'Motor D',
      'Battery',
      'Camera Module',
      'Propeller Pack'
    ];

    const targetPositions = {
      'Frame': new THREE.Vector3(0, 0.5, 0),
      'Motor A': new THREE.Vector3(-0.6, 0.65, -0.6),
      'Motor B': new THREE.Vector3(0.6, 0.65, -0.6),
      'Motor C': new THREE.Vector3(-0.6, 0.65, 0.6),
      'Motor D': new THREE.Vector3(0.6, 0.65, 0.6),
      'Battery': new THREE.Vector3(0, 0.58, 0),
      'Camera Module': new THREE.Vector3(0, 0.35, -0.75),
      'Propeller Pack': new THREE.Vector3(0, 0.75, 0)
    };

    const spawnPositions = {
      'Frame': new THREE.Vector3(-4, 0.5, 0),
      'Motor A': new THREE.Vector3(-4, 0.5, 2),
      'Motor B': new THREE.Vector3(-2, 0.5, 2),
      'Motor C': new THREE.Vector3(-4, 0.5, 4),
      'Motor D': new THREE.Vector3(-2, 0.5, 4),
      'Battery': new THREE.Vector3(0, 0.5, 3),
      'Camera Module': new THREE.Vector3(0, 0.5, 5),
      'Propeller Pack': new THREE.Vector3(2, 0.5, 3)
    };

    const parts = {};
    const mixers = [];
    let fox = null;
    let foxMixer = null;
    let foxActions = [];
    let foxLoaded = false;
    let foxIdleBob = 0;
    let propellersSpawned = false;

    const state = {
      partsPlaced: 0,
      difficulty: 1,
      errorCount: 0,
      selectedPart: null,
      assemblyComplete: false,
      testFlightActive: false,
      droneY: 0.5,
      foxLoaded: false,
      partStates: {},
      progressPercent: 0,
      snapTolerance: 999
    };

    window.__3D_STATE__ = state;

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function getSnapTolerance() {
      if (state.difficulty === 1) return 999;
      if (state.difficulty === 2) return 1.5;
      return 0.8;
    }

    function updateDifficulty() {
      if (state.partsPlaced >= 6) state.difficulty = 3;
      else if (state.partsPlaced >= 3) state.difficulty = 2;
      else state.difficulty = 1;
      state.snapTolerance = getSnapTolerance();
    }

    function updateState() {
      state.partsPlaced = safeNumber(Object.values(parts).filter(p => p.userData.placed).length, 0);
      updateDifficulty();
      state.assemblyComplete = state.partsPlaced === 8;
      state.progressPercent = safeNumber((state.partsPlaced / 8) * 100, 0);
      state.droneY = safeNumber(droneAssemblyRoot.position.y + 0.5, 0.5);
      state.foxLoaded = !!foxLoaded;
      state.selectedPart = state.selectedPart || null;

      for (const name in parts) {
        const p = parts[name];
        if (!p) continue;
        if (p.userData.errorFlashTime > 0) state.partStates[name] = 'error';
        else state.partStates[name] = p.userData.placed ? 'placed' : 'unplaced';
      }

      hud.difficulty.textContent = String(safeNumber(state.difficulty, 1));
      hud.partsPlaced.textContent = `${safeNumber(state.partsPlaced, 0)} / 8`;
      hud.errorCount.textContent = String(safeNumber(state.errorCount, 0));
      hud.selectedPart.textContent = state.selectedPart || 'None';
      hud.progressBar.style.width = `${Math.max(0, Math.min(100, safeNumber(state.progressPercent, 0)))}%`;
      hud.testFlightBtn.disabled = !state.assemblyComplete || state.testFlightActive;
    }

    function setSelectedPart(part) {
      for (const name in parts) {
        const mesh = parts[name];
        mesh.userData.selected = false;
        updatePartMaterial(mesh);
      }

      if (part && !part.userData.placed) {
        part.userData.selected = true;
        state.selectedPart = part.userData.name;
        updatePartMaterial(part);
      } else {
        state.selectedPart = null;
      }
      updateState();
    }

    function updatePartMaterial(part) {
      const mat = part.material;
      if (!mat) return;

      const baseColor = part.userData.baseColor;

      if (part.userData.errorFlashTime > 0) {
        mat.color.set(0xff2222);
        if ('emissive' in mat) {
          mat.emissive.set(0x550000);
          mat.emissiveIntensity = 0.8;
        }
      } else if (part.userData.selected) {
        mat.color.set(baseColor);
        if ('emissive' in mat) {
          mat.emissive.set(0x88ffff);
          mat.emissiveIntensity = 0.8;
        }
      } else if (part.userData.placed) {
        mat.color.set(baseColor);
        if ('emissive' in mat) {
          mat.emissive.set(0x22ff66);
          mat.emissiveIntensity = 0.35;
        }
      } else {
        mat.color.set(baseColor);
        if ('emissive' in mat) {
          mat.emissive.set(0x000000);
          mat.emissiveIntensity = 0;
        }
      }
    }

    function createPart(name, geometry, color, spawnPos, rotation = null) {
      const material = new THREE.MeshStandardMaterial({
        color,
        emissive: 0x000000,
        emissiveIntensity: 0
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.copy(spawnPos);
      if (rotation) mesh.rotation.set(rotation.x, rotation.y, rotation.z);

      mesh.userData = {
        name,
        selectable: true,
        placed: false,
        selected: false,
        baseColor: new THREE.Color(color),
        spawnPosition: spawnPos.clone(),
        targetPosition: targetPositions[name].clone(),
        animatingToTarget: false,
        animationStart: 0,
        animationDuration: 0.3,
        animationFrom: spawnPos.clone(),
        animationTo: targetPositions[name].clone(),
        hoverPhase: Math.random() * Math.PI * 2,
        errorFlashTime: 0,
        wobbleTime: 0,
        wobbleStrength: 0
      };

      parts[name] = mesh;
      scene.add(mesh);
      state.partStates[name] = 'unplaced';
      return mesh;
    }

    createPart('Frame', new THREE.BoxGeometry(1.5, 0.15, 1.5), 0x333333, spawnPositions['Frame']);
    createPart('Motor A', new THREE.CylinderGeometry(0.15, 0.15, 0.3, 24), 0xcc0000, spawnPositions['Motor A']);
    createPart('Motor B', new THREE.CylinderGeometry(0.15, 0.15, 0.3, 24), 0x00cc00, spawnPositions['Motor B']);
    createPart('Motor C', new THREE.CylinderGeometry(0.15, 0.15, 0.3, 24), 0x0000cc, spawnPositions['Motor C']);
    createPart('Motor D', new THREE.CylinderGeometry(0.15, 0.15, 0.3, 24), 0xcccc00, spawnPositions['Motor D']);
    createPart('Battery', new THREE.BoxGeometry(0.4, 0.15, 0.6), 0xff8800, spawnPositions['Battery']);
    createPart('Camera Module', new THREE.SphereGeometry(0.15, 24, 24), 0xffffff, spawnPositions['Camera Module']);
    createPart('Propeller Pack', new THREE.BoxGeometry(0.8, 0.02, 0.2), 0x88ffff, spawnPositions['Propeller Pack']);

    function expectedPartForCurrentDifficulty() {
      if (state.difficulty === 1) return null;
      for (const name of partOrder) {
        if (!parts[name].userData.placed) return name;
      }
      return null;
    }

    function triggerError(part) {
      state.errorCount = safeNumber(state.errorCount, 0) + 1;
      part.userData.errorFlashTime = 0.35;
      if (state.difficulty === 3) {
        part.userData.wobbleTime = 0.45;
        part.userData.wobbleStrength = 0.12;
      }
      updatePartMaterial(part);
      updateState();
    }

    function placeSelectedPart() {
      if (!state.selectedPart) return;

      const part = parts[state.selectedPart];
      if (!part || part.userData.placed) return;

      const expected = expectedPartForCurrentDifficulty();
      const inCorrectOrder = state.difficulty === 1 || expected === part.userData.name;

      const target = part.userData.targetPosition.clone();
      const distance = part.position.distanceTo(target);
      const tolerance = getSnapTolerance();
      const withinTolerance = distance <= tolerance;

      if (inCorrectOrder && withinTolerance) {
        part.userData.animatingToTarget = true;
        part.userData.animationStart = clock.getElapsedTime();
        part.userData.animationFrom = part.position.clone();
        part.userData.animationTo = target.clone();
        part.userData.placed = true;
        part.userData.selected = false;

        droneAssemblyRoot.add(part);
        part.position.copy(droneAssemblyRoot.worldToLocal(part.getWorldPosition(new THREE.Vector3())));
        part.userData.animationFrom = part.position.clone();
        part.userData.animationTo = droneAssemblyRoot.worldToLocal(target.clone());
        updatePartMaterial(part);

        if (part.userData.name === 'Propeller Pack' && !propellersSpawned) {
          spawnPropellers();
        }

        state.selectedPart = null;
        updateState();
      } else {
        triggerError(part);
      }
    }

    function spawnPropellers() {
      propellersSpawned = true;
      const propPositions = [
        new THREE.Vector3(-0.6, 0.82, -0.6),
        new THREE.Vector3(0.6, 0.82, -0.6),
        new THREE.Vector3(-0.6, 0.82, 0.6),
        new THREE.Vector3(0.6, 0.82, 0.6)
      ];

      propPositions.forEach((pos, i) => {
        const blade = new THREE.Mesh(
          new THREE.BoxGeometry(0.55, 0.02, 0.08),
          new THREE.MeshStandardMaterial({
            color: 0xbbeeff,
            emissive: 0x225577,
            emissiveIntensity: 0.3
          })
        );
        blade.position.copy(pos);
        blade.rotation.y = (i % 2) * Math.PI * 0.5;
        blade.castShadow = true;
        blade.userData.propeller = true;
        droneAssemblyRoot.add(blade);
      });
    }

    function removePropellers() {
      const toRemove = [];
      droneAssemblyRoot.traverse(obj => {
        if (obj.userData && obj.userData.propeller) toRemove.push(obj);
      });
      toRemove.forEach(obj => obj.parent.remove(obj));
      propellersSpawned = false;
    }

    function resetAssembly() {
      state.selectedPart = null;
      state.errorCount = 0;
      state.testFlightActive = false;
      droneAssemblyRoot.position.set(0, 0, 0);
      droneAssemblyRoot.rotation.set(0, 0, 0);

      removePropellers();

      for (const name in parts) {
        const part = parts[name];
        scene.add(part);
        part.position.copy(part.userData.spawnPosition);
        part.rotation.set(0, 0, 0);
        part.userData.placed = false;
        part.userData.selected = false;
        part.userData.animatingToTarget = false;
        part.userData.errorFlashTime = 0;
        part.userData.wobbleTime = 0;
        part.userData.wobbleStrength = 0;
        if (name.includes('Motor')) {
          part.rotation.set(0, 0, 0);
        }
        updatePartMaterial(part);
      }

      updateState();
    }

    hud.resetBtn.addEventListener('click', resetAssembly);

    function startTestFlight() {
      if (!state.assemblyComplete || state.testFlightActive) return;
      state.testFlightActive = true;

      if (foxMixer && foxActions.length > 1) {
        foxActions.forEach((a, idx) => {
          if (idx === 1) {
            a.reset().fadeIn(0.3).play();
          } else {
            a.fadeOut(0.3);
          }
        });
      }
      updateState();
    }

    hud.testFlightBtn.addEventListener('click', startTestFlight);

    renderer.domElement.addEventListener('pointerdown', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const selectableObjects = [...Object.values(parts), zoneBase, zoneRing];
      const intersects = raycaster.intersectObjects(selectableObjects, false);

      if (!intersects.length) return;

      const hit = intersects[0].object;

      if (hit.userData.isAssemblyZone) {
        placeSelectedPart();
        return;
      }

      const part = Object.values(parts).find(p => p === hit);
      if (part) {
        setSelectedPart(part);
      }
    });

    const loader = new GLTFLoader();
    loader.load(
      'Fox.glb',
      (gltf) => {
        fox = gltf.scene;
        fox.scale.setScalar(0.02);
        fox.position.set(5, 0, 5);
        fox.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(fox);

        if (gltf.animations && gltf.animations.length > 0) {
          foxMixer = new THREE.AnimationMixer(fox);
          mixers.push(foxMixer);
          foxActions = gltf.animations.map(clip => foxMixer.clipAction(clip));
          foxActions[0].play();
        }

        foxLoaded = true;
        updateState();
      },
      undefined,
      () => {
        foxLoaded = false;
        updateState();
      }
    );

    function animatePartToTarget(part, elapsed) {
      const t = (elapsed - part.userData.animationStart) / part.userData.animationDuration;
      const clamped = THREE.MathUtils.clamp(t, 0, 1);
      part.position.lerpVectors(part.userData.animationFrom, part.userData.animationTo, clamped);

      if (clamped >= 1) {
        part.position.copy(part.userData.animationTo);
        part.userData.animatingToTarget = false;
        updatePartMaterial(part);
        updateState();
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      controls.update();

      mixers.forEach(m => m.update(dt));

      zoneRing.material.opacity = 0.65 + Math.sin(elapsed * 2.5) * 0.2;
      zoneBase.material.emissiveIntensity = 0.45 + Math.sin(elapsed * 2.5) * 0.15;

      for (const name in parts) {
        const part = parts[name];

        if (!part.userData.placed && !part.userData.animatingToTarget) {
          const base = part.userData.spawnPosition;
          part.position.y = base.y + Math.sin(elapsed * 2 + part.userData.hoverPhase) * 0.05;
        }

        if (part.userData.animatingToTarget) {
          animatePartToTarget(part, elapsed);
        }

        if (part.userData.errorFlashTime > 0) {
          part.userData.errorFlashTime = Math.max(0, part.userData.errorFlashTime - dt);
          if (part.userData.errorFlashTime === 0) updatePartMaterial(part);
        }

        if (part.userData.wobbleTime > 0) {
          part.userData.wobbleTime = Math.max(0, part.userData.wobbleTime - dt);
          const wobble = Math.sin(elapsed * 40) * part.userData.wobbleStrength;
          part.rotation.z = wobble;
          if (part.userData.wobbleTime === 0) {
            part.rotation.z = 0;
          }
        }
      }

      if (fox && (!foxMixer || foxActions.length === 0)) {
        foxIdleBob += dt;
        fox.position.y = Math.sin(foxIdleBob * 2) * 0.05;
      }

      if (state.testFlightActive) {
        droneAssemblyRoot.position.y = Math.min(3.5, droneAssemblyRoot.position.y + dt * 1.75);
        droneAssemblyRoot.rotation.y += dt * 0.8;

        droneAssemblyRoot.traverse(obj => {
          if (obj.userData && obj.userData.propeller) {
            obj.rotation.y += dt * 18;
          }
        });
      }

      state.droneY = safeNumber(droneAssemblyRoot.position.y + 0.5, 0.5);
      state.snapTolerance = safeNumber(getSnapTolerance(), 999);
      updateState();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateState();
    animate();
  </script>
</body>
</html>
