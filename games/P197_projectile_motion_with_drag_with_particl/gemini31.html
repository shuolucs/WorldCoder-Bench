<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectile Motion Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            user-select: none;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #hud-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            min-width: 250px;
            z-index: 10;
        }
        .hud-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .hud-label { color: #aaa; }
        .hud-value { font-weight: bold; color: #0f0; }
        
        #control-panel {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            z-index: 10;
            width: 90%;
            max-width: 800px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .control-group label {
            margin-bottom: 5px;
            font-size: 12px;
            color: #ccc;
        }
        input[type="range"] {
            width: 120px;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #666;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            transition: background 0.2s;
        }
        button:hover { background: #555; }
        button:active { background: #222; }
        .btn-launch { background: #800; border-color: #f00; font-weight: bold; }
        .btn-launch:hover { background: #a00; }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #ccc;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 20;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="loading">Loading Littlest Tokyo...</div>
    <div id="canvas-container"></div>
    
    <div id="hud-panel">
        <div class="hud-line"><span class="hud-label">Status:</span> <span class="hud-value" id="hud-status">READY</span></div>
        <hr style="border-color: #333; margin: 8px 0;">
        <div class="hud-line"><span class="hud-label">Flight Time:</span> <span class="hud-value" id="hud-time">0.00 s</span></div>
        <div class="hud-line"><span class="hud-label">Distance:</span> <span class="hud-value" id="hud-dist">0.00 m</span></div>
        <div class="hud-line"><span class="hud-label">Max Height:</span> <span class="hud-value" id="hud-maxh">0.00 m</span></div>
        <div class="hud-line"><span class="hud-label">Speed:</span> <span class="hud-value" id="hud-speed">0.00 m/s</span></div>
        <hr style="border-color: #333; margin: 8px 0;">
        <div class="hud-line"><span class="hud-label">Kinetic Energy:</span> <span class="hud-value" id="hud-ke">0.00 J</span></div>
        <div class="hud-line"><span class="hud-label">Potential Energy:</span> <span class="hud-value" id="hud-pe">0.00 J</span></div>
        <div class="hud-line"><span class="hud-label">Total Energy:</span> <span class="hud-value" id="hud-te">0.00 J</span></div>
    </div>

    <div id="control-panel">
        <div class="control-group">
            <label id="lbl-speed">Speed: 50 m/s</label>
            <input type="range" id="speed-slider" min="20" max="100" value="50" step="1">
        </div>
        <div class="control-group">
            <label id="lbl-angle">Elevation: 45°</label>
            <input type="range" id="angle-slider" min="10" max="80" value="45" step="1">
        </div>
        <div class="control-group">
            <label id="lbl-azimuth">Azimuth: 0°</label>
            <input type="range" id="azimuth-slider" min="-180" max="180" value="0" step="1">
        </div>
        
        <button id="launch-btn" class="btn-launch">Launch (Space)</button>
        <button id="reset-btn">Reset (R)</button>
        <button id="drag-toggle-btn">Drag: ON (D)</button>
        
        <div class="checkbox-group">
            <input type="checkbox" id="slow-motion-cb">
            <label for="slow-motion-cb">Slowmo 0.25x</label>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            status: 'ready', // 'ready', 'flying', 'landed'
            launchSpeed: 50,
            launchAngle: 45,
            launchAzimuth: 0,
            dragEnabled: true,
            slowMotion: false,
            flightTime: 0,
            maxHeight: 0,
            distanceTraveled: 0,
            currentSpeed: 0,
            kineticEnergy: 0,
            potentialEnergy: 0,
            totalEnergy: 0,
            projectilePosition: { x: -60, y: 10, z: 0 },
            projectileVelocity: { x: 0, y: 0, z: 0 },
            impactPosition: null,
            activeTrailParticles: 0,
            impactParticlesActive: false,
            predictionLineVisible: true,
            launchCount: 0,
            energyLostToDrag: 0,
            trailVisible: true
        };

        // --- Physics Constants ---
        const GRAVITY = -9.81;
        const MASS = 2.0;
        const RADIUS = 0.5;
        const AREA = Math.PI * RADIUS * RADIUS;
        const RHO = 1.225;
        const CD = 0.47;
        const DT = 1 / 60;
        const LAUNCH_ORIGIN = new THREE.Vector3(-60, 10, 0);

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 50, 150);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        // Ground Plane
        const groundGeo = new THREE.PlaneGeometry(2000, 2000);
        const groundMat = new THREE.MeshBasicMaterial({ 
            color: 0x228B22, 
            transparent: true, 
            opacity: 0.5,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        // --- Load Model ---
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        const gltfLoader = new GLTFLoader();
        gltfLoader.setDRACOLoader(dracoLoader);

        gltfLoader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/LittlestTokyo.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.02, 0.02, 0.02);
                model.position.set(0, 0, 0);
                scene.add(model);
                window.__3D_STATE__.modelLoaded = true;
                document.getElementById('loading').style.display = 'none';
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // --- Projectile ---
        const projGeo = new THREE.SphereGeometry(1, 32, 32);
        const projMat = new THREE.MeshStandardMaterial({ 
            color: 0xff0000, 
            emissive: 0xaa0000,
            emissiveIntensity: 0.5
        });
        const projectile = new THREE.Mesh(projGeo, projMat);
        projectile.position.copy(LAUNCH_ORIGIN);
        scene.add(projectile);

        // --- Particle System ---
        const MAX_PARTICLES = 1500;
        const particleGeo = new THREE.BufferGeometry();
        const pPositions = new Float32Array(MAX_PARTICLES * 3);
        const pColors = new Float32Array(MAX_PARTICLES * 3);
        const pSizes = new Float32Array(MAX_PARTICLES);
        const pAlphas = new Float32Array(MAX_PARTICLES);

        particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
        particleGeo.setAttribute('customColor', new THREE.BufferAttribute(pColors, 3));
        particleGeo.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));
        particleGeo.setAttribute('alpha', new THREE.BufferAttribute(pAlphas, 1));

        const particleShaderMat = new THREE.ShaderMaterial({
            vertexShader: `
                attribute vec3 customColor;
                attribute float size;
                attribute float alpha;
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    vColor = customColor;
                    vAlpha = alpha;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    float dist = length(gl_PointCoord - vec2(0.5));
                    if (dist > 0.5) discard;
                    gl_FragColor = vec4(vColor, vAlpha * (1.0 - dist * 2.0));
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(particleGeo, particleShaderMat);
        scene.add(particleSystem);

        let particles = [];

        function emitTrailParticle(pos) {
            if (!window.__3D_STATE__.trailVisible) return;
            let trailCount = particles.filter(p => p.type === 'trail').length;
            if (trailCount >= 1000) {
                let oldestIdx = particles.findIndex(p => p.type === 'trail');
                if (oldestIdx !== -1) particles.splice(oldestIdx, 1);
            }
            
            particles.push({
                type: 'trail',
                pos: pos.clone(),
                vel: new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2),
                life: 2.0,
                maxLife: 2.0,
                size: 0.3,
                colorStart: new THREE.Color(0xffa500),
                colorEnd: new THREE.Color(0x888888)
            });
        }

        function triggerExplosion(pos) {
            window.__3D_STATE__.impactParticlesActive = true;
            for (let i = 0; i < 50; i++) {
                let phi = Math.acos(Math.random()); // Hemisphere
                let theta = Math.random() * Math.PI * 2;
                let speed = 5 + Math.random() * 15;
                let vx = speed * Math.sin(phi) * Math.cos(theta);
                let vy = speed * Math.cos(phi);
                let vz = speed * Math.sin(phi) * Math.sin(theta);
                
                particles.push({
                    type: 'explosion',
                    pos: pos.clone(),
                    vel: new THREE.Vector3(vx, vy, vz),
                    life: 1.5 + Math.random() * 0.5,
                    maxLife: 2.0,
                    size: 0.8 + Math.random() * 0.5,
                    colorStart: new THREE.Color(0xffff00),
                    colorEnd: new THREE.Color(0xff0000)
                });
            }
        }

        function updateParticles(dt) {
            let activeTrail = 0;
            let activeExplosion = 0;
            
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.life -= dt;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                p.pos.addScaledVector(p.vel, dt);
                if (p.type === 'explosion') {
                    p.vel.y += GRAVITY * dt; // Gravity affects explosion
                    if (p.pos.y < 0) {
                        p.pos.y = 0;
                        p.vel.y *= -0.3; // Bounce
                    }
                    activeExplosion++;
                } else {
                    activeTrail++;
                }
            }

            window.__3D_STATE__.activeTrailParticles = activeTrail;
            window.__3D_STATE__.impactParticlesActive = activeExplosion > 0;

            const positions = particleGeo.attributes.position.array;
            const colors = particleGeo.attributes.customColor.array;
            const sizes = particleGeo.attributes.size.array;
            const alphas = particleGeo.attributes.alpha.array;

            for (let i = 0; i < MAX_PARTICLES; i++) {
                if (i < particles.length) {
                    let p = particles[i];
                    positions[i*3] = p.pos.x;
                    positions[i*3+1] = p.pos.y;
                    positions[i*3+2] = p.pos.z;
                    
                    let t = 1.0 - (p.life / p.maxLife);
                    let c = p.colorStart.clone().lerp(p.colorEnd, t);
                    colors[i*3] = c.r;
                    colors[i*3+1] = c.g;
                    colors[i*3+2] = c.b;
                    
                    sizes[i] = p.size * (1.0 - t * 0.5);
                    alphas[i] = 1.0 - t;
                } else {
                    alphas[i] = 0; // Hide unused
                }
            }
            
            particleGeo.attributes.position.needsUpdate = true;
            particleGeo.attributes.customColor.needsUpdate = true;
            particleGeo.attributes.size.needsUpdate = true;
            particleGeo.attributes.alpha.needsUpdate = true;
        }

        // --- Prediction Line ---
        const lineGeo = new THREE.BufferGeometry();
        const lineMat = new THREE.LineDashedMaterial({
            color: 0x00ffff,
            dashSize: 2,
            gapSize: 2,
            linewidth: 1
        });
        const predictionLine = new THREE.Line(lineGeo, lineMat);
        scene.add(predictionLine);

        function getLaunchVelocity() {
            const speed = window.__3D_STATE__.launchSpeed;
            const el = THREE.MathUtils.degToRad(window.__3D_STATE__.launchAngle);
            const az = THREE.MathUtils.degToRad(window.__3D_STATE__.launchAzimuth);
            
            const vx = speed * Math.cos(el) * Math.cos(az);
            const vy = speed * Math.sin(el);
            const vz = speed * Math.cos(el) * Math.sin(az);
            return new THREE.Vector3(vx, vy, vz);
        }

        function updatePredictionLine() {
            if (window.__3D_STATE__.status !== 'ready') {
                predictionLine.visible = false;
                window.__3D_STATE__.predictionLineVisible = false;
                return;
            }
            
            predictionLine.visible = true;
            window.__3D_STATE__.predictionLineVisible = true;
            
            let p = LAUNCH_ORIGIN.clone();
            let v = getLaunchVelocity();
            let pts = [p.clone()];
            
            let dt = DT;
            let m = MASS;
            let Fg = new THREE.Vector3(0, GRAVITY * m, 0);
            
            for (let i = 0; i < 500; i++) {
                let Fd = new THREE.Vector3(0, 0, 0);
                let speed = v.length();
                if (window.__3D_STATE__.dragEnabled && speed > 0) {
                    let dragMag = 0.5 * CD * RHO * AREA * speed * speed;
                    Fd.copy(v).normalize().multiplyScalar(-dragMag);
                }
                
                let a = new THREE.Vector3().addVectors(Fg, Fd).divideScalar(m);
                v.addScaledVector(a, dt);
                p.addScaledVector(v, dt);
                
                pts.push(p.clone());
                
                if (p.y <= 0) {
                    let prev = pts[pts.length - 2];
                    let t = prev.y / (prev.y - p.y);
                    let hit = new THREE.Vector3().lerpVectors(prev, p, t);
                    pts[pts.length - 1] = hit;
                    break;
                }
            }
            
            lineGeo.setFromPoints(pts);
            predictionLine.computeLineDistances();
        }

        // --- Physics Engine ---
        let pos = LAUNCH_ORIGIN.clone();
        let vel = new THREE.Vector3();
        let flightTime = 0;
        let distanceTraveled = 0;
        let maxHeight = LAUNCH_ORIGIN.y;
        let energyLostToDrag = 0;

        function resetSimulation() {
            window.__3D_STATE__.status = 'ready';
            pos.copy(LAUNCH_ORIGIN);
            vel.set(0,0,0);
            flightTime = 0;
            distanceTraveled = 0;
            maxHeight = LAUNCH_ORIGIN.y;
            energyLostToDrag = 0;
            window.__3D_STATE__.impactPosition = null;
            projectile.position.copy(pos);
            particles = [];
            updatePredictionLine();
            updateState();
        }

        function launch() {
            if (window.__3D_STATE__.status !== 'ready') return;
            window.__3D_STATE__.status = 'flying';
            window.__3D_STATE__.launchCount++;
            vel = getLaunchVelocity();
            updatePredictionLine();
        }

        function stepPhysics(dt) {
            if (window.__3D_STATE__.status !== 'flying') return;

            let speed = vel.length();
            let Fg = new THREE.Vector3(0, GRAVITY * MASS, 0);
            let Fd = new THREE.Vector3(0, 0, 0);

            if (window.__3D_STATE__.dragEnabled && speed > 0) {
                let dragMag = 0.5 * CD * RHO * AREA * speed * speed;
                Fd.copy(vel).normalize().multiplyScalar(-dragMag);
            }

            let Fnet = new THREE.Vector3().addVectors(Fg, Fd);
            let acc = Fnet.divideScalar(MASS);

            let prevPos = pos.clone();
            
            // Semi-implicit Euler
            vel.addScaledVector(acc, dt);
            pos.addScaledVector(vel, dt);

            // Bounds check
            pos.x = THREE.MathUtils.clamp(pos.x, -500, 500);
            pos.z = THREE.MathUtils.clamp(pos.z, -500, 500);
            pos.y = Math.min(pos.y, 500);

            if (isNaN(vel.x) || !isFinite(vel.x)) vel.set(0,0,0);

            if (window.__3D_STATE__.dragEnabled) {
                let distStep = prevPos.distanceTo(pos);
                energyLostToDrag += Fd.length() * distStep;
            }

            distanceTraveled += prevPos.distanceTo(pos);
            if (pos.y > maxHeight) maxHeight = pos.y;
            flightTime += dt;

            if (pos.y <= 0) {
                let t = prevPos.y / (prevPos.y - pos.y);
                pos.lerpVectors(prevPos, pos, t);
                vel.lerpVectors(vel, vel, t);
                flightTime -= dt * (1 - t);
                
                window.__3D_STATE__.status = 'landed';
                window.__3D_STATE__.impactPosition = { x: Number(pos.x.toFixed(2)), y: Number(pos.y.toFixed(2)), z: Number(pos.z.toFixed(2)) };
                triggerExplosion(pos);
            }

            projectile.position.copy(pos);
            
            for(let i=0; i<5; i++) {
                emitTrailParticle(prevPos.clone().lerp(pos, i/5));
            }
        }

        // --- UI & State Updates ---
        const uiSpeed = document.getElementById('speed-slider');
        const uiAngle = document.getElementById('angle-slider');
        const uiAzimuth = document.getElementById('azimuth-slider');
        const lblSpeed = document.getElementById('lbl-speed');
        const lblAngle = document.getElementById('lbl-angle');
        const lblAzimuth = document.getElementById('lbl-azimuth');
        const btnLaunch = document.getElementById('launch-btn');
        const btnReset = document.getElementById('reset-btn');
        const btnDrag = document.getElementById('drag-toggle-btn');
        const cbSlowmo = document.getElementById('slow-motion-cb');

        function syncUI() {
            window.__3D_STATE__.launchSpeed = parseFloat(uiSpeed.value);
            window.__3D_STATE__.launchAngle = parseFloat(uiAngle.value);
            window.__3D_STATE__.launchAzimuth = parseFloat(uiAzimuth.value);
            window.__3D_STATE__.slowMotion = cbSlowmo.checked;
            
            lblSpeed.innerText = `Speed: ${uiSpeed.value} m/s`;
            lblAngle.innerText = `Elevation: ${uiAngle.value}°`;
            lblAzimuth.innerText = `Azimuth: ${uiAzimuth.value}°`;
            
            updatePredictionLine();
        }

        uiSpeed.addEventListener('input', syncUI);
        uiAngle.addEventListener('input', syncUI);
        uiAzimuth.addEventListener('input', syncUI);
        cbSlowmo.addEventListener('change', syncUI);

        btnLaunch.addEventListener('click', launch);
        btnReset.addEventListener('click', resetSimulation);
        btnDrag.addEventListener('click', () => {
            window.__3D_STATE__.dragEnabled = !window.__3D_STATE__.dragEnabled;
            btnDrag.innerText = `Drag: ${window.__3D_STATE__.dragEnabled ? 'ON' : 'OFF'} (D)`;
            updatePredictionLine();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); launch(); }
            if (e.code === 'KeyR') resetSimulation();
            if (e.code === 'KeyD') btnDrag.click();
            if (e.code === 'KeyT') {
                window.__3D_STATE__.trailVisible = !window.__3D_STATE__.trailVisible;
                particleSystem.visible = window.__3D_STATE__.trailVisible;
            }
        });

        function updateState() {
            let speed = vel.length();
            let ke = 0.5 * MASS * speed * speed;
            let pe = MASS * Math.abs(GRAVITY) * Math.max(0, pos.y);
            let te = ke + pe;

            if (window.__3D_STATE__.status === 'ready') {
                let v0 = getLaunchVelocity();
                speed = v0.length();
                ke = 0.5 * MASS * speed * speed;
                pe = MASS * Math.abs(GRAVITY) * LAUNCH_ORIGIN.y;
                te = ke + pe;
            }

            const s = window.__3D_STATE__;
            s.flightTime = Number(flightTime.toFixed(2));
            s.maxHeight = Number(maxHeight.toFixed(2));
            s.distanceTraveled = Number(distanceTraveled.toFixed(2));
            s.currentSpeed = Number(speed.toFixed(2));
            s.kineticEnergy = Number(ke.toFixed(2));
            s.potentialEnergy = Number(pe.toFixed(2));
            s.totalEnergy = Number(te.toFixed(2));
            s.projectilePosition = { x: Number(pos.x.toFixed(2)), y: Number(pos.y.toFixed(2)), z: Number(pos.z.toFixed(2)) };
            s.projectileVelocity = { x: Number(vel.x.toFixed(2)), y: Number(vel.y.toFixed(2)), z: Number(vel.z.toFixed(2)) };
            s.energyLostToDrag = Number(energyLostToDrag.toFixed(2));

            // Update HUD DOM
            document.getElementById('hud-status').innerText = s.status.toUpperCase();
            document.getElementById('hud-status').style.color = s.status === 'ready' ? '#0f0' : (s.status === 'flying' ? '#ff0' : '#f00');
            document.getElementById('hud-time').innerText = s.flightTime.toFixed(2) + ' s';
            document.getElementById('hud-dist').innerText = s.distanceTraveled.toFixed(2) + ' m';
            document.getElementById('hud-maxh').innerText = s.maxHeight.toFixed(2) + ' m';
            document.getElementById('hud-speed').innerText = s.currentSpeed.toFixed(2) + ' m/s';
            document.getElementById('hud-ke').innerText = s.kineticEnergy.toFixed(2) + ' J';
            document.getElementById('hud-pe').innerText = s.potentialEnergy.toFixed(2) + ' J';
            document.getElementById('hud-te').innerText = s.totalEnergy.toFixed(2) + ' J';
        }

        // --- Main Loop ---
        let lastTime = performance.now();
        let accumulator = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            let currentTime = performance.now();
            let frameTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            if (frameTime > 0.1) frameTime = 0.1; // Prevent spiral of death
            
            let timeScale = window.__3D_STATE__.slowMotion ? 0.25 : 1.0;
            accumulator += frameTime * timeScale;

            while (accumulator >= DT) {
                stepPhysics(DT);
                accumulator -= DT;
            }

            updateParticles(frameTime * timeScale);
            updateState();
            
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Init
        syncUI();
        updatePredictionLine();
        animate();

    </script>
</body>
</html>
