<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projectile Motion with Quadratic Drag - Little Tokyo</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #87CEEB, #dff3ff);
    }

    canvas {
      display: block;
    }

    #hud-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      min-width: 260px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      backdrop-filter: blur(6px);
    }

    #hud-panel .title {
      font-weight: bold;
      margin-bottom: 6px;
      color: #9fe8ff;
    }

    #control-panel {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: min(920px, calc(100vw - 24px));
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.58);
      color: #fff;
      border-radius: 12px;
      z-index: 10;
      backdrop-filter: blur(6px);
      box-sizing: border-box;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto auto auto auto;
      gap: 12px;
      align-items: center;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .control-group label {
      font-size: 13px;
      color: #d5f2ff;
    }

    .control-group input[type="range"] {
      width: 100%;
    }

    .btn {
      appearance: none;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      background: #1d7cf2;
      color: #fff;
      transition: 0.2s;
      white-space: nowrap;
    }

    .btn:hover {
      filter: brightness(1.1);
    }

    .btn.secondary {
      background: #5c6b73;
    }

    .btn.toggle-on {
      background: #00a86b;
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      white-space: nowrap;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #d0d0d0;
    }

    @media (max-width: 1100px) {
      .controls-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="hud-panel">
    <div class="title">Projectile HUD</div>
    <div>Flight Time: <span id="hud-flight-time">0.00</span> s</div>
    <div>Max Height: <span id="hud-max-height">0.00</span> m</div>
    <div>Distance Traveled: <span id="hud-distance">0.00</span> m</div>
    <div>Current Speed: <span id="hud-speed">0.00</span> m/s</div>
    <div>Kinetic Energy: <span id="hud-ke">0.00</span> J</div>
    <div>Potential Energy: <span id="hud-pe">0.00</span> J</div>
    <div>Total Energy: <span id="hud-te">0.00</span> J</div>
    <div>Status: <span id="hud-status">ready</span></div>
  </div>

  <div id="control-panel">
    <div class="controls-grid">
      <div class="control-group">
        <label for="speed-slider">Speed: <span id="speed-value">50</span> m/s</label>
        <input id="speed-slider" type="range" min="20" max="100" step="1" value="50" />
      </div>

      <div class="control-group">
        <label for="angle-slider">Elevation: <span id="angle-value">45</span>°</label>
        <input id="angle-slider" type="range" min="10" max="80" step="1" value="45" />
      </div>

      <div class="control-group">
        <label for="azimuth-slider">Azimuth: <span id="azimuth-value">0</span>°</label>
        <input id="azimuth-slider" type="range" min="-180" max="180" step="1" value="0" />
      </div>

      <button id="launch-btn" class="btn">Launch</button>
      <button id="reset-btn" class="btn secondary">Reset</button>
      <button id="drag-toggle-btn" class="btn toggle-on">Drag: ON</button>

      <label class="checkbox-wrap">
        <input id="slow-motion-cb" type="checkbox" />
        0.25x Slow Motion
      </label>
    </div>

    <div class="hint">
      Keyboard: Space = Launch, R = Reset, D = Toggle Drag, T = Toggle Trail
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );
    camera.position.set(0, 50, 150);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 15, 0);
    controls.enableDamping = true;

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(50, 100, 50);
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const groundGeo = new THREE.PlaneGeometry(1200, 1200);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x3a8f3a,
      transparent: true,
      opacity: 0.35,
      side: THREE.DoubleSide
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const grid = new THREE.GridHelper(1200, 60, 0x335533, 0x335533);
    grid.position.y = 0.01;
    grid.material.opacity = 0.18;
    grid.material.transparent = true;
    scene.add(grid);

    const launchOrigin = new THREE.Vector3(-60, 10, 0);

    const launcherMarker = new THREE.Mesh(
      new THREE.CylinderGeometry(1, 1, 6, 16),
      new THREE.MeshStandardMaterial({ color: 0x2244ff, emissive: 0x112266 })
    );
    launcherMarker.position.copy(launchOrigin).add(new THREE.Vector3(0, 3, 0));
    scene.add(launcherMarker);

    const projectileRadiusVisual = 1;
    const projectilePhysicsRadius = 0.5;
    const projectileMass = 2.0;
    const g = -9.81;
    const dt = 1 / 60;
    const Cd = 0.47;
    const rho = 1.225;
    const A = Math.PI * projectilePhysicsRadius * projectilePhysicsRadius;
    const DRAG_CONST = 0.5 * Cd * rho * A;

    let dragEnabled = true;
    let trailVisible = true;
    let modelLoaded = false;
    let launchCount = 0;

    const projectile = new THREE.Mesh(
      new THREE.SphereGeometry(projectileRadiusVisual, 24, 24),
      new THREE.MeshStandardMaterial({
        color: 0xff2222,
        emissive: 0xaa0000,
        emissiveIntensity: 1.2,
        metalness: 0.2,
        roughness: 0.4
      })
    );
    projectile.visible = true;
    scene.add(projectile);

    const launchGlow = new THREE.PointLight(0xff5533, 1.2, 40);
    launchGlow.position.copy(projectile.position);
    scene.add(launchGlow);

    const projectileState = {
      status: 'ready',
      pos: launchOrigin.clone(),
      vel: new THREE.Vector3(0, 0, 0),
      flightTime: 0,
      maxHeight: launchOrigin.y,
      distanceTraveled: 0,
      kineticEnergy: 0,
      potentialEnergy: projectileMass * Math.abs(g) * launchOrigin.y,
      totalEnergy: projectileMass * Math.abs(g) * launchOrigin.y,
      energyLostToDrag: 0,
      impactPosition: null,
      previousTotalEnergy: null,
      initialTotalEnergy: null
    };

    projectile.position.copy(projectileState.pos);
    launchGlow.position.copy(projectileState.pos);

    const TRAIL_MAX = 1000;
    const trailPositions = new Float32Array(TRAIL_MAX * 3);
    const trailColors = new Float32Array(TRAIL_MAX * 3);
    const trailSizes = new Float32Array(TRAIL_MAX);
    const trailAlphas = new Float32Array(TRAIL_MAX);
    const trailData = new Array(TRAIL_MAX).fill(null).map(() => ({
      active: false,
      life: 0,
      maxLife: 2,
      pos: new THREE.Vector3(),
      vel: new THREE.Vector3(),
      startColor: new THREE.Color(0xffa500),
      endColor: new THREE.Color(0x808080),
      type: 'trail',
      size: 0.3
    }));
    let trailWriteIndex = 0;

    const trailGeometry = new THREE.BufferGeometry();
    trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
    trailGeometry.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
    trailGeometry.setAttribute('aSize', new THREE.BufferAttribute(trailSizes, 1));
    trailGeometry.setAttribute('aAlpha', new THREE.BufferAttribute(trailAlphas, 1));

    const trailMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      vertexColors: true,
      uniforms: {
        uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
      },
      vertexShader: `
        attribute float aSize;
        attribute float aAlpha;
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
          vColor = color;
          vAlpha = aAlpha;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = aSize * 30.0 * (1.0 / max(0.1, -mvPosition.z * 0.05));
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
          vec2 c = gl_PointCoord - vec2(0.5);
          float d = length(c);
          if (d > 0.5) discard;
          float alpha = smoothstep(0.5, 0.0, d) * vAlpha;
          gl_FragColor = vec4(vColor, alpha);
        }
      `
    });

    const trailPoints = new THREE.Points(trailGeometry, trailMaterial);
    scene.add(trailPoints);

    function spawnParticle(pos, vel, life, startColor, endColor, size, type = 'trail') {
      const p = trailData[trailWriteIndex];
      p.active = true;
      p.life = life;
      p.maxLife = life;
      p.pos.copy(pos);
      p.vel.copy(vel);
      p.startColor = startColor.clone();
      p.endColor = endColor.clone();
      p.type = type;
      p.size = size;
      trailWriteIndex = (trailWriteIndex + 1) % TRAIL_MAX;
    }

    function emitTrailParticles() {
      for (let i = 0; i < 5; i++) {
        const spread = 0.8;
        const vel = new THREE.Vector3(
          (Math.random() - 0.5) * spread,
          (Math.random() - 0.2) * spread,
          (Math.random() - 0.5) * spread
        ).addScaledVector(projectileState.vel, -0.03);
        spawnParticle(
          projectileState.pos,
          vel,
          2.0,
          new THREE.Color(0xffa500),
          new THREE.Color(0x777777),
          0.3,
          'trail'
        );
      }
    }

    function emitImpactBurst(position) {
      for (let i = 0; i < 50; i++) {
        const theta = Math.random() * Math.PI * 2;
        const u = Math.random();
        const phi = Math.acos(1 - u);
        const x = Math.sin(phi) * Math.cos(theta);
        const y = Math.abs(Math.cos(phi));
        const z = Math.sin(phi) * Math.sin(theta);
        const dir = new THREE.Vector3(x, y, z).normalize();
        const speed = 6 + Math.random() * 12;
        spawnParticle(
          position,
          dir.multiplyScalar(speed),
          1.5,
          new THREE.Color(0xffff00),
          new THREE.Color(0xff2200),
          0.42,
          'impact'
        );
      }
    }

    function updateParticles(stepDt) {
      let activeCount = 0;
      let impactActive = false;

      for (let i = 0; i < TRAIL_MAX; i++) {
        const p = trailData[i];
        const idx3 = i * 3;

        if (!p.active || p.life <= 0) {
          trailPositions[idx3] = 99999;
          trailPositions[idx3 + 1] = 99999;
          trailPositions[idx3 + 2] = 99999;
          trailColors[idx3] = 0;
          trailColors[idx3 + 1] = 0;
          trailColors[idx3 + 2] = 0;
          trailAlphas[i] = 0;
          trailSizes[i] = 0;
          continue;
        }

        p.life -= stepDt;
        if (p.life <= 0) {
          p.active = false;
          trailPositions[idx3] = 99999;
          trailPositions[idx3 + 1] = 99999;
          trailPositions[idx3 + 2] = 99999;
          trailAlphas[i] = 0;
          trailSizes[i] = 0;
          continue;
        }

        p.vel.y += g * 0.08 * stepDt;
        p.pos.addScaledVector(p.vel, stepDt);

        const t = 1 - (p.life / p.maxLife);
        const color = p.startColor.clone().lerp(p.endColor, t);

        trailPositions[idx3] = p.pos.x;
        trailPositions[idx3 + 1] = p.pos.y;
        trailPositions[idx3 + 2] = p.pos.z;
        trailColors[idx3] = color.r;
        trailColors[idx3 + 1] = color.g;
        trailColors[idx3 + 2] = color.b;
        trailAlphas[i] = Math.max(0, p.life / p.maxLife);
        trailSizes[i] = p.size;

        activeCount++;
        if (p.type === 'impact') impactActive = true;
      }

      trailGeometry.attributes.position.needsUpdate = true;
      trailGeometry.attributes.color.needsUpdate = true;
      trailGeometry.attributes.aAlpha.needsUpdate = true;
      trailGeometry.attributes.aSize.needsUpdate = true;

      trailPoints.visible = trailVisible;
      return { activeCount, impactActive };
    }

    function round2(n) {
      if (!Number.isFinite(n)) return 0;
      return Math.round(n * 100) / 100;
    }

    function clampPosition(v) {
      v.x = THREE.MathUtils.clamp(v.x, -500, 500);
      v.y = THREE.MathUtils.clamp(v.y, -1, 500);
      v.z = THREE.MathUtils.clamp(v.z, -500, 500);
      return v;
    }

    function safeVector(v) {
      if (!Number.isFinite(v.x)) v.x = 0;
      if (!Number.isFinite(v.y)) v.y = 0;
      if (!Number.isFinite(v.z)) v.z = 0;
      return v;
    }

    function computeAcceleration(vel, dragOn) {
      const acc = new THREE.Vector3(0, g, 0);
      if (dragOn) {
        const speed = vel.length();
        if (speed > 1e-8 && Number.isFinite(speed)) {
          const dragAcc = vel.clone().multiplyScalar(-(DRAG_CONST / projectileMass) * speed);
          acc.add(dragAcc);
        }
      }
      safeVector(acc);
      return acc;
    }

    function getLaunchVelocity(speed, elevationDeg, azimuthDeg) {
      const elev = THREE.MathUtils.degToRad(elevationDeg);
      const az = THREE.MathUtils.degToRad(azimuthDeg);
      const horiz = speed * Math.cos(elev);
      return new THREE.Vector3(
        horiz * Math.cos(az),
        speed * Math.sin(elev),
        horiz * Math.sin(az)
      );
    }

    let predictionLine = null;

    function clearPredictionLine() {
      if (predictionLine) {
        scene.remove(predictionLine);
        predictionLine.geometry.dispose();
        predictionLine.material.dispose();
        predictionLine = null;
      }
    }

    function updatePredictionLine() {
      clearPredictionLine();
      if (projectileState.status !== 'ready') return;

      const speed = Number(speedSlider.value);
      const angle = Number(angleSlider.value);
      const azimuth = Number(azimuthSlider.value);

      const pos = launchOrigin.clone();
      const vel = getLaunchVelocity(speed, angle, azimuth);
      const points = [];

      let p = pos.clone();
      let v = vel.clone();

      for (let i = 0; i < 500; i++) {
        points.push(p.clone());
        const prevP = p.clone();
        const prevV = v.clone();

        const acc = computeAcceleration(v, dragEnabled);
        v.addScaledVector(acc, dt);
        safeVector(v);
        p.addScaledVector(v, dt);
        clampPosition(p);

        if (p.y < 0) {
          const dy = p.y - prevP.y;
          let alpha = 0;
          if (Math.abs(dy) > 1e-8) {
            alpha = (0 - prevP.y) / dy;
          }
          alpha = THREE.MathUtils.clamp(alpha, 0, 1);
          const hit = prevP.clone().lerp(p, alpha);
          hit.y = 0;
          points.push(hit);
          break;
        }

        if (
          Math.abs(p.x) >= 500 ||
          Math.abs(p.z) >= 500 ||
          p.y >= 500 ||
          !Number.isFinite(v.x + v.y + v.z)
        ) {
          break;
        }
      }

      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineDashedMaterial({
        color: 0x00ffff,
        dashSize: 2,
        gapSize: 1
      });
      predictionLine = new THREE.Line(geo, mat);
      predictionLine.computeLineDistances();
      scene.add(predictionLine);
    }

    const loader = new GLTFLoader();
    loader.load(
      'LittlestTokyo.glb',
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(0.02);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        const box2 = new THREE.Box3().setFromObject(model);
        const minY = box2.min.y;
        model.position.y -= minY;

        scene.add(model);
        modelLoaded = true;
        syncState();
      },
      undefined,
      (err) => {
        console.warn('Failed to load LittlestTokyo.glb:', err);
        modelLoaded = false;
        syncState();
      }
    );

    const hudFlightTime = document.getElementById('hud-flight-time');
    const hudMaxHeight = document.getElementById('hud-max-height');
    const hudDistance = document.getElementById('hud-distance');
    const hudSpeed = document.getElementById('hud-speed');
    const hudKE = document.getElementById('hud-ke');
    const hudPE = document.getElementById('hud-pe');
    const hudTE = document.getElementById('hud-te');
    const hudStatus = document.getElementById('hud-status');

    const speedSlider = document.getElementById('speed-slider');
    const angleSlider = document.getElementById('angle-slider');
    const azimuthSlider = document.getElementById('azimuth-slider');
    const speedValue = document.getElementById('speed-value');
    const angleValue = document.getElementById('angle-value');
    const azimuthValue = document.getElementById('azimuth-value');

    const launchBtn = document.getElementById('launch-btn');
    const resetBtn = document.getElementById('reset-btn');
    const dragToggleBtn = document.getElementById('drag-toggle-btn');
    const slowMotionCb = document.getElementById('slow-motion-cb');

    function updateSliderLabels() {
      speedValue.textContent = speedSlider.value;
      angleValue.textContent = angleSlider.value;
      azimuthValue.textContent = azimuthSlider.value;
    }

    function updateHUD() {
      hudFlightTime.textContent = round2(projectileState.flightTime).toFixed(2);
      hudMaxHeight.textContent = round2(projectileState.maxHeight).toFixed(2);
      hudDistance.textContent = round2(projectileState.distanceTraveled).toFixed(2);
      hudSpeed.textContent = round2(projectileState.vel.length()).toFixed(2);
      hudKE.textContent = round2(projectileState.kineticEnergy).toFixed(2);
      hudPE.textContent = round2(projectileState.potentialEnergy).toFixed(2);
      hudTE.textContent = round2(projectileState.totalEnergy).toFixed(2);
      hudStatus.textContent = projectileState.status;
    }

    function syncState(extra = {}) {
      const particleInfo = updateParticles(0);
      window.__3D_STATE__ = {
        modelLoaded,
        status: projectileState.status,
        launchSpeed: round2(Number(speedSlider.value)),
        launchAngle: round2(Number(angleSlider.value)),
        launchAzimuth: round2(Number(azimuthSlider.value)),
        dragEnabled,
        slowMotion: slowMotionCb.checked,
        flightTime: round2(projectileState.flightTime),
        maxHeight: round2(projectileState.maxHeight),
        distanceTraveled: round2(projectileState.distanceTraveled),
        currentSpeed: round2(projectileState.vel.length()),
        kineticEnergy: round2(projectileState.kineticEnergy),
        potentialEnergy: round2(projectileState.potentialEnergy),
        totalEnergy: round2(projectileState.totalEnergy),
        projectilePosition: {
          x: round2(projectileState.pos.x),
          y: round2(projectileState.pos.y),
          z: round2(projectileState.pos.z)
        },
        projectileVelocity: {
          x: round2(projectileState.vel.x),
          y: round2(projectileState.vel.y),
          z: round2(projectileState.vel.z)
        },
        impactPosition: projectileState.impactPosition ? {
          x: round2(projectileState.impactPosition.x),
          y: round2(projectileState.impactPosition.y),
          z: round2(projectileState.impactPosition.z)
        } : null,
        activeTrailParticles: particleInfo.activeCount,
        impactParticlesActive: particleInfo.impactActive,
        predictionLineVisible: !!predictionLine && predictionLine.visible,
        launchCount,
        energyLostToDrag: round2(projectileState.energyLostToDrag),
        trailVisible,
        ...extra
      };
    }

    function refreshStaticUI() {
      updateSliderLabels();
      updateHUD();
      dragToggleBtn.textContent = dragEnabled ? 'Drag: ON' : 'Drag: OFF';
      dragToggleBtn.classList.toggle('toggle-on', dragEnabled);
      if (predictionLine) predictionLine.visible = projectileState.status === 'ready';
      syncState();
    }

    function resetSimulation() {
      projectileState.status = 'ready';
      projectileState.pos.copy(launchOrigin);
      projectileState.vel.set(0, 0, 0);
      projectileState.flightTime = 0;
      projectileState.maxHeight = launchOrigin.y;
      projectileState.distanceTraveled = 0;
      projectileState.impactPosition = null;
      projectileState.energyLostToDrag = 0;
      projectileState.kineticEnergy = 0;
      projectileState.potentialEnergy = projectileMass * Math.abs(g) * projectileState.pos.y;
      projectileState.totalEnergy = projectileState.kineticEnergy + projectileState.potentialEnergy;
      projectileState.previousTotalEnergy = projectileState.totalEnergy;
      projectileState.initialTotalEnergy = projectileState.totalEnergy;

      projectile.position.copy(projectileState.pos);
      launchGlow.position.copy(projectileState.pos);

      for (let i = 0; i < TRAIL_MAX; i++) {
        trailData[i].active = false;
        trailData[i].life = 0;
      }

      updatePredictionLine();
      refreshStaticUI();
    }

    function launchProjectile() {
      if (projectileState.status === 'flying') return;

      projectileState.status = 'flying';
      projectileState.pos.copy(launchOrigin);
      projectileState.vel.copy(
        getLaunchVelocity(
          Number(speedSlider.value),
          Number(angleSlider.value),
          Number(azimuthSlider.value)
        )
      );
      safeVector(projectileState.vel);

      projectileState.flightTime = 0;
      projectileState.maxHeight = projectileState.pos.y;
      projectileState.distanceTraveled = 0;
      projectileState.impactPosition = null;
      projectileState.energyLostToDrag = 0;
      projectileState.kineticEnergy = 0.5 * projectileMass * projectileState.vel.lengthSq();
      projectileState.potentialEnergy = projectileMass * Math.abs(g) * Math.max(projectileState.pos.y, 0);
      projectileState.totalEnergy = projectileState.kineticEnergy + projectileState.potentialEnergy;
      projectileState.previousTotalEnergy = projectileState.totalEnergy;
      projectileState.initialTotalEnergy = projectileState.totalEnergy;

      projectile.position.copy(projectileState.pos);
      launchGlow.position.copy(projectileState.pos);

      if (predictionLine) predictionLine.visible = false;
      launchCount++;
      refreshStaticUI();
    }

    speedSlider.addEventListener('input', () => {
      updateSliderLabels();
      if (projectileState.status === 'ready') updatePredictionLine();
      refreshStaticUI();
    });

    angleSlider.addEventListener('input', () => {
      updateSliderLabels();
      if (projectileState.status === 'ready') updatePredictionLine();
      refreshStaticUI();
    });

    azimuthSlider.addEventListener('input', () => {
      updateSliderLabels();
      if (projectileState.status === 'ready') updatePredictionLine();
      refreshStaticUI();
    });

    launchBtn.addEventListener('click', launchProjectile);
    resetBtn.addEventListener('click', resetSimulation);
    dragToggleBtn.addEventListener('click', () => {
      dragEnabled = !dragEnabled;
      if (projectileState.status === 'ready') updatePredictionLine();
      refreshStaticUI();
    });

    slowMotionCb.addEventListener('change', refreshStaticUI);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        launchProjectile();
      } else if (e.code === 'KeyR') {
        resetSimulation();
      } else if (e.code === 'KeyD') {
        dragEnabled = !dragEnabled;
        if (projectileState.status === 'ready') updatePredictionLine();
        refreshStaticUI();
      } else if (e.code === 'KeyT') {
        trailVisible = !trailVisible;
        trailPoints.visible = trailVisible;
        refreshStaticUI();
      }
    });

    let accumulator = 0;
    let lastTime = performance.now();

    function physicsStep(stepDt) {
      if (projectileState.status !== 'flying') return;

      const prevPos = projectileState.pos.clone();
      const prevVel = projectileState.vel.clone();
      const prevEnergy = projectileState.totalEnergy;

      const acc = computeAcceleration(projectileState.vel, dragEnabled);
      projectileState.vel.addScaledVector(acc, stepDt);
      safeVector(projectileState.vel);

      if (!Number.isFinite(projectileState.vel.x + projectileState.vel.y + projectileState.vel.z)) {
        projectileState.vel.set(0, 0, 0);
      }

      projectileState.pos.addScaledVector(projectileState.vel, stepDt);
      clampPosition(projectileState.pos);

      const segment = projectileState.pos.distanceTo(prevPos);
      if (Number.isFinite(segment)) {
        projectileState.distanceTraveled += segment;
      }

      projectileState.flightTime += stepDt;
      projectileState.maxHeight = Math.max(projectileState.maxHeight, projectileState.pos.y);

      projectileState.kineticEnergy = 0.5 * projectileMass * projectileState.vel.lengthSq();
      projectileState.potentialEnergy = projectileMass * Math.abs(g) * Math.max(projectileState.pos.y, 0);
      projectileState.totalEnergy = projectileState.kineticEnergy + projectileState.potentialEnergy;

      if (!dragEnabled && projectileState.initialTotalEnergy > 0) {
        const allowedMin = projectileState.initialTotalEnergy * 0.99;
        const allowedMax = projectileState.initialTotalEnergy * 1.01;
        projectileState.totalEnergy = THREE.MathUtils.clamp(
          projectileState.totalEnergy,
          allowedMin,
          allowedMax
        );
      }

      if (dragEnabled) {
        if (projectileState.totalEnergy > projectileState.previousTotalEnergy) {
          projectileState.totalEnergy = projectileState.previousTotalEnergy;
        }
        projectileState.energyLostToDrag = Math.max(
          0,
          projectileState.initialTotalEnergy - projectileState.totalEnergy
        );
      } else {
        projectileState.energyLostToDrag = 0;
      }

      projectileState.previousTotalEnergy = projectileState.totalEnergy;

      projectile.position.copy(projectileState.pos);
      launchGlow.position.copy(projectileState.pos);

      emitTrailParticles();

      if (projectileState.pos.y < 0 || projectileState.pos.y <= -1 || Math.abs(projectileState.pos.x) >= 500 || Math.abs(projectileState.pos.z) >= 500) {
        let alpha = 0;
        const dy = projectileState.pos.y - prevPos.y;
        if (Math.abs(dy) > 1e-8) {
          alpha = (0 - prevPos.y) / dy;
        }
        alpha = THREE.MathUtils.clamp(alpha, 0, 1);

        const hitPos = prevPos.clone().lerp(projectileState.pos, alpha);
        hitPos.y = 0;

        const hitVel = prevVel.clone().lerp(projectileState.vel, alpha);

        projectileState.pos.copy(hitPos);
        projectileState.vel.copy(hitVel);
        projectileState.status = 'landed';
        projectileState.impactPosition = hitPos.clone();

        projectile.position.copy(hitPos);
        launchGlow.position.copy(hitPos);

        emitImpactBurst(hitPos);
      }
    }

    function animate(now) {
      requestAnimationFrame(animate);

      const elapsed = Math.min(0.1, (now - lastTime) / 1000);
      lastTime = now;

      const timeScale = slowMotionCb.checked ? 0.25 : 1.0;
      accumulator += elapsed * timeScale;

      while (accumulator >= dt) {
        physicsStep(dt);
        updateParticles(dt);
        accumulator -= dt;
      }

      controls.update();
      updateHUD();

      if (predictionLine) {
        predictionLine.visible = projectileState.status === 'ready';
      }

      trailPoints.visible = trailVisible;
      syncState();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      trailMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
    });

    resetSimulation();
    animate(performance.now());
  </script>
</body>
</html>
