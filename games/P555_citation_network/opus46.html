<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Citation Network - Force-Directed Graph</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1e; font-family: 'Segoe UI', Tahoma, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #aaccff;
    background: rgba(10, 10, 30, 0.85);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    border: 1px solid rgba(100, 150, 255, 0.2);
    pointer-events: none;
    min-width: 200px;
}
#hud span { color: #ffffff; font-weight: bold; }

#controls {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #aaccff;
    background: rgba(10, 10, 30, 0.85);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    border: 1px solid rgba(100, 150, 255, 0.2);
}
#controls label {
    display: block;
    margin-bottom: 6px;
}
#controls input[type="range"] {
    width: 180px;
    vertical-align: middle;
    margin-left: 8px;
}
#controls .keys {
    margin-top: 8px;
    font-size: 11px;
    color: #7799bb;
    line-height: 1.5;
}
#controls .keys kbd {
    background: rgba(100,150,255,0.15);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid rgba(100,150,255,0.3);
    color: #aaccff;
}

.node-label {
    color: #ffffff;
    background: rgba(10, 10, 30, 0.9);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    pointer-events: none;
    white-space: nowrap;
    border: 1px solid rgba(100, 150, 255, 0.4);
}
</style>
</head>
<body>

<div id="hud">
    Nodes: <span id="hud-nodes">40</span><br>
    Edges: <span id="hud-edges">60</span><br>
    Avg Velocity: <span id="hud-velocity">0.000</span><br>
    Converged: <span id="hud-converged">No</span><br>
    Filter: <span id="hud-filter">All</span><br>
    Pinned: <span id="hud-pinned">0</span>
</div>

<div id="controls">
    <label>Spring Stiffness: <span id="spring-val">0.50</span>
        <input type="range" id="slider-spring" min="0.1" max="2.0" step="0.05" value="0.5">
    </label>
    <label>Repulsion: <span id="repulsion-val">50</span>
        <input type="range" id="slider-repulsion" min="10" max="200" step="10" value="50">
    </label>
    <div class="keys">
        <kbd>R</kbd> Re-randomize &nbsp; <kbd>Space</kbd> Pause/Play &nbsp; <kbd>F</kbd> Filter fields
    </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ---- State ----
window.__3D_STATE__ = {
    nodeCount: 40,
    edgeCount: 60,
    avgVelocity: 0,
    isConverged: false,
    isPaused: false,
    springK: 0.5,
    repulsionK: 50,
    fieldFilter: 'All',
    pinnedCount: 0,
    frameCount: 0,
    nodesValid: true,
    totalKE: 0
};

const FIELDS = ['AI', 'Physics', 'Biology', 'Math', 'CS'];
const FIELD_COLORS = {
    'AI': 0xff4444,
    'Physics': 0x4488ff,
    'Biology': 0x44ff44,
    'Math': 0xffaa44,
    'CS': 0xff44ff
};
const FILTER_CYCLE = ['All', ...FIELDS];

let springK = 0.5;
let repulsionK = 50;
let isPaused = false;
let fieldFilter = 'All';
let frameCount = 0;

// ---- Scene Setup ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 0, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;

const ambientLight = new THREE.AmbientLight(0x334455, 0.4);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1.0);
pointLight.position.set(0, 0, 30);
scene.add(pointLight);

// ---- Generate Graph Data ----
const nodes = [];
const edges = [];

function generateNodes() {
    for (let i = 0; i < 40; i++) {
        nodes.push({
            id: i,
            title: `Paper_${String(i).padStart(2, '0')}`,
            year: 2015 + Math.floor(Math.random() * 10),
            citations: Math.floor(Math.random() * 51),
            field: FIELDS[Math.floor(Math.random() * FIELDS.length)],
            position: new THREE.Vector3(),
            velocity: new THREE.Vector3(),
            pinned: false,
            mesh: null,
            ring: null
        });
    }
}

function generateEdges() {
    edges.length = 0;
    let attempts = 0;
    const edgeSet = new Set();
    while (edges.length < 60 && attempts < 5000) {
        attempts++;
        const src = Math.floor(Math.random() * 40);
        const tgt = Math.floor(Math.random() * 40);
        if (src === tgt) continue;
        // Source cites target: target must be from earlier or same year
        if (nodes[tgt].year > nodes[src].year) continue;
        const key = `${src}-${tgt}`;
        if (edgeSet.has(key)) continue;
        edgeSet.add(key);
        edges.push({ source: src, target: tgt });
    }
    // Fill remaining if needed
    while (edges.length < 60) {
        const src = Math.floor(Math.random() * 40);
        const tgt = Math.floor(Math.random() * 40);
        if (src === tgt) continue;
        const key = `${src}-${tgt}`;
        if (edgeSet.has(key)) continue;
        edgeSet.add(key);
        edges.push({ source: src, target: tgt });
    }
}

generateNodes();
generateEdges();

// ---- Randomize Positions ----
function randomizePositions() {
    for (const node of nodes) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = Math.random() * 15;
        node.position.set(
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.sin(phi) * Math.sin(theta),
            r * Math.cos(phi)
        );
        node.velocity.set(0, 0, 0);
    }
}
randomizePositions();

// ---- Create 3D Objects ----
const nodeMeshes = [];
const nodeGroup = new THREE.Group();
scene.add(nodeGroup);

const edgeGroup = new THREE.Group();
scene.add(edgeGroup);

// Node meshes
for (const node of nodes) {
    const radius = 0.3 + node.citations * 0.02;
    const geometry = new THREE.SphereGeometry(radius, 16, 12);
    const color = FIELD_COLORS[node.field];
    const material = new THREE.MeshPhongMaterial({
        color: color,
        emissive: new THREE.Color(color).multiplyScalar(0.3),
        transparent: true,
        opacity: 1.0
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.copy(node.position);
    mesh.userData = { nodeId: node.id };
    nodeGroup.add(mesh);
    node.mesh = mesh;
    nodeMeshes.push(mesh);

    // Pin ring (hidden by default)
    const ringGeo = new THREE.RingGeometry(radius + 0.15, radius + 0.3, 24);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.visible = false;
    mesh.add(ring);
    node.ring = ring;
}

// Edge lines
const edgeLines = [];
for (const edge of edges) {
    const srcNode = nodes[edge.source];
    const points = [srcNode.position.clone(), nodes[edge.target].position.clone()];
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const color = FIELD_COLORS[srcNode.field];
    const material = new THREE.LineBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.3
    });
    const line = new THREE.Line(geometry, material);
    line.userData = { source: edge.source, target: edge.target, baseOpacity: 0.3 };
    edgeGroup.add(line);
    edgeLines.push(line);
}

// ---- CSS2D Label ----
const labelDiv = document.createElement('div');
labelDiv.className = 'node-label';
labelDiv.style.display = 'none';
const label = new CSS2DObject(labelDiv);
scene.add(label);

// ---- Raycaster ----
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredNode = null;
let draggedNode = null;
let dragPlane = new THREE.Plane();
let dragOffset = new THREE.Vector3();

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    if (draggedNode !== null) {
        const intersection = new THREE.Vector3();
        raycaster.setFromCamera(mouse, camera);
        raycaster.ray.intersectPlane(dragPlane, intersection);
        if (intersection) {
            nodes[draggedNode].position.copy(intersection.sub(dragOffset).add(nodes[draggedNode].mesh.position).sub(nodes[draggedNode].mesh.position));
            // Simpler: set position directly
            raycaster.ray.intersectPlane(dragPlane, intersection.copy(new THREE.Vector3()));
            // Recalculate
            const intPt = new THREE.Vector3();
            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(dragPlane, intPt);
            if (intPt) {
                nodes[draggedNode].position.copy(intPt);
                nodes[draggedNode].velocity.set(0, 0, 0);
            }
        }
        return;
    }
}

function onMouseDown(event) {
    if (event.button !== 0) return;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodeMeshes);
    if (intersects.length > 0) {
        const nodeId = intersects[0].object.userData.nodeId;
        draggedNode = nodeId;
        controls.enabled = false;

        // Create drag plane facing camera through the node
        const cameraDir = new THREE.Vector3();
        camera.getWorldDirection(cameraDir);
        dragPlane.setFromNormalAndCoplanarPoint(cameraDir.negate(), nodes[nodeId].position);
        dragOffset.set(0, 0, 0);
    }
}

function onMouseUp(event) {
    if (draggedNode !== null) {
        // Check if it was a click (minimal movement)
        controls.enabled = true;
        draggedNode = null;
    }
}

function onClick(event) {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodeMeshes);
    if (intersects.length > 0) {
        const nodeId = intersects[0].object.userData.nodeId;
        const node = nodes[nodeId];
        node.pinned = !node.pinned;
        node.ring.visible = node.pinned;
        if (node.pinned) {
            node.velocity.set(0, 0, 0);
        }
    }
}

// Use pointer events for drag
let pointerDownPos = new THREE.Vector2();
let isDragging = false;

renderer.domElement.addEventListener('pointermove', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    if (draggedNode !== null) {
        isDragging = true;
        const intPt = new THREE.Vector3();
        raycaster.setFromCamera(mouse, camera);
        if (raycaster.ray.intersectPlane(dragPlane, intPt)) {
            nodes[draggedNode].position.copy(intPt);
            nodes[draggedNode].velocity.set(0, 0, 0);
        }
    }
});

renderer.domElement.addEventListener('pointerdown', (event) => {
    if (event.button !== 0) return;
    pointerDownPos.set(event.clientX, event.clientY);
    isDragging = false;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodeMeshes);
    if (intersects.length > 0) {
        const nodeId = intersects[0].object.userData.nodeId;
        draggedNode = nodeId;
        controls.enabled = false;

        const cameraDir = new THREE.Vector3();
        camera.getWorldDirection(cameraDir);
        dragPlane.setFromNormalAndCoplanarPoint(cameraDir, nodes[nodeId].position.clone());
    }
});

renderer.domElement.addEventListener('pointerup', (event) => {
    if (draggedNode !== null) {
        const dist = pointerDownPos.distanceTo(new THREE.Vector2(event.clientX, event.clientY));
        if (dist < 5) {
            // It's a click - toggle pin
            const node = nodes[draggedNode];
            node.pinned = !node.pinned;
            node.ring.visible = node.pinned;
            if (node.pinned) {
                node.velocity.set(0, 0, 0);
            }
        }
        controls.enabled = true;
        draggedNode = null;
    }
});

// ---- Keyboard ----
document.addEventListener('keydown', (event) => {
    if (event.code === 'KeyR') {
        randomizePositions();
    } else if (event.code === 'Space') {
        event.preventDefault();
        isPaused = !isPaused;
    } else if (event.code === 'KeyF') {
        const currentIdx = FILTER_CYCLE.indexOf(fieldFilter);
        fieldFilter = FILTER_CYCLE[(currentIdx + 1) % FILTER_CYCLE.length];
        applyFilter();
    }
});

function applyFilter() {
    for (const node of nodes) {
        if (fieldFilter === 'All' || node.field === fieldFilter) {
            node.mesh.material.opacity = 1.0;
            node.mesh.material.transparent = true;
        } else {
            node.mesh.material.opacity = 0.08;
            node.mesh.material.transparent = true;
        }
    }
    for (const line of edgeLines) {
        const srcField = nodes[line.userData.source].field;
        const tgtField = nodes[line.userData.target].field;
        if (fieldFilter === 'All' || (srcField === fieldFilter || tgtField === fieldFilter)) {
            line.material.opacity = line.userData.baseOpacity;
        } else {
            line.material.opacity = 0.02;
        }
    }
}

// ---- Sliders ----
const sliderSpring = document.getElementById('slider-spring');
const sliderRepulsion = document.getElementById('slider-repulsion');
const springValEl = document.getElementById('spring-val');
const repulsionValEl = document.getElementById('repulsion-val');

sliderSpring.addEventListener('input', () => {
    springK = parseFloat(sliderSpring.value);
    springValEl.textContent = springK.toFixed(2);
});
sliderRepulsion.addEventListener('input', () => {
    repulsionK = parseFloat(sliderRepulsion.value);
    repulsionValEl.textContent = repulsionK.toFixed(0);
});

// ---- Build adjacency for hover highlight ----
function getConnectedEdges(nodeId) {
    const result = [];
    for (let i = 0; i < edges.length; i++) {
        if (edges[i].source === nodeId || edges[i].target === nodeId) {
            result.push(i);
        }
    }
    return result;
}

function getConnectedNodes(nodeId) {
    const result = new Set();
    for (const edge of edges) {
        if (edge.source === nodeId) result.add(edge.target);
        if (edge.target === nodeId) result.add(edge.source);
    }
    return result;
}

// ---- Physics ----
const tempForce = new THREE.Vector3();
const diff = new THREE.Vector3();

function simulateStep(dt) {
    // Reset forces
    const forces = [];
    for (let i = 0; i < nodes.length; i++) {
        forces.push(new THREE.Vector3());
    }

    // Spring forces (edges)
    for (const edge of edges) {
        const a = nodes[edge.source];
        const b = nodes[edge.target];
        diff.subVectors(b.position, a.position);
        const dist = diff.length();
        if (dist < 0.001) continue;
        const displacement = dist - 5; // rest_length = 5
        const forceMag = springK * displacement;
        tempForce.copy(diff).normalize().multiplyScalar(forceMag);
        forces[edge.source].add(tempForce);
        forces[edge.target].sub(tempForce);
    }

    // Repulsion forces (all pairs)
    for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
            diff.subVectors(nodes[j].position, nodes[i].position);
            const dist = diff.length();
            if (dist < 0.01 || dist > 20) continue;
            const forceMag = repulsionK / (dist * dist);
            tempForce.copy(diff).normalize().multiplyScalar(forceMag);
            forces[i].sub(tempForce);
            forces[j].add(tempForce);
        }
    }

    // Centering force + integration
    for (let i = 0; i < nodes.length; i++) {
        const node = nodes[i];
        if (node.pinned || i === draggedNode) continue;

        // Centering
        forces[i].add(node.position.clone().multiplyScalar(-0.01));

        // Euler integration
        node.velocity.add(forces[i].multiplyScalar(dt));
        node.velocity.multiplyScalar(0.92);
        node.position.add(node.velocity.clone().multiplyScalar(dt));
    }
}

// ---- Hover detection ----
function updateHover() {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodeMeshes);

    // Reset previous hover
    if (hoveredNode !== null) {
        for (const line of edgeLines) {
            const baseOp = (fieldFilter === 'All' ||
                nodes[line.userData.source].field === fieldFilter ||
                nodes[line.userData.target].field === fieldFilter) ? 0.3 : 0.02;
            line.material.opacity = baseOp;
            line.userData.baseOpacity = 0.3;
        }
        hoveredNode = null;
        labelDiv.style.display = 'none';
    }

    if (intersects.length > 0 && draggedNode === null) {
        const nodeId = intersects[0].object.userData.nodeId;
        hoveredNode = nodeId;
        const node = nodes[nodeId];

        // Show label
        labelDiv.textContent = `${node.title} (Citations: ${node.citations})`;
        labelDiv.style.display = 'block';
        label.position.copy(node.position);
        label.position.y += (0.3 + node.citations * 0.02) + 0.5;

        // Highlight connected edges
        const connEdges = getConnectedEdges(nodeId);
        for (const idx of connEdges) {
            edgeLines[idx].material.opacity = 1.0;
        }
    }
}

// ---- Update visuals ----
function updateVisuals() {
    for (const node of nodes) {
        node.mesh.position.copy(node.position);
        // Make ring face camera
        if (node.ring.visible) {
            node.ring.lookAt(camera.position);
        }
    }

    // Update edge lines
    for (let i = 0; i < edgeLines.length; i++) {
        const line = edgeLines[i];
        const src = nodes[edges[i].source].position;
        const tgt = nodes[edges[i].target].position;
        const positions = line.geometry.attributes.position;
        positions.setXYZ(0, src.x, src.y, src.z);
        positions.setXYZ(1, tgt.x, tgt.y, tgt.z);
        positions.needsUpdate = true;
    }

    // Update label position if hovering
    if (hoveredNode !== null) {
        const node = nodes[hoveredNode];
        label.position.copy(node.position);
        label.position.y += (0.3 + node.citations * 0.02) + 0.5;
    }
}

// ---- HUD ----
const hudNodes = document.getElementById('hud-nodes');
const hudEdges = document.getElementById('hud-edges');
const hudVelocity = document.getElementById('hud-velocity');
const hudConverged = document.getElementById('hud-converged');
const hudFilter = document.getElementById('hud-filter');
const hudPinned = document.getElementById('hud-pinned');

function updateHUD(avgVel, converged, pinnedCount) {
    hudNodes.textContent = nodes.length;
    hudEdges.textContent = edges.length;
    hudVelocity.textContent = avgVel.toFixed(3);
    hudConverged.textContent = converged ? 'Yes' : 'No';
    hudFilter.textContent = fieldFilter;
    hudPinned.textContent = pinnedCount;
}

// ---- Resize ----
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// ---- Animation Loop ----
function animate() {
    requestAnimationFrame(animate);

    frameCount++;

    // Physics substeps
    if (!isPaused) {
        for (let s = 0; s < 3; s++) {
            simulateStep(0.1);
        }
    }

    // Compute stats
    let totalVel = 0;
    let totalKE = 0;
    let nodesValid = true;
    let pinnedCount = 0;

    for (const node of nodes) {
        const vel = node.velocity.length();
        totalVel += vel;
        totalKE += 0.5 * vel * vel;
        if (isNaN(node.position.x) || isNaN(node.position.y) || isNaN(node.position.z)) {
            nodesValid = false;
        }
        if (node.pinned) pinnedCount++;
    }

    const avgVelocity = totalVel / nodes.length;
    const isConverged = avgVelocity < 0.05;

    // Update state
    window.__3D_STATE__ = {
        nodeCount: nodes.length,
        edgeCount: edges.length,
        avgVelocity: parseFloat(avgVelocity.toFixed(4)),
        isConverged: isConverged,
        isPaused: isPaused,
        springK: springK,
        repulsionK: repulsionK,
        fieldFilter: fieldFilter,
        pinnedCount: pinnedCount,
        frameCount: frameCount,
        nodesValid: nodesValid,
        totalKE: parseFloat(totalKE.toFixed(3))
    };

    updateHover();
    updateVisuals();
    updateHUD(avgVelocity, isConverged, pinnedCount);

    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
