<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Citation Network Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #css2d-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Let mouse events pass through to WebGL */
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none; /* Only interactive elements will catch events */
        }
        .panel {
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid rgba(100, 100, 150, 0.5);
            border-radius: 8px;
            padding: 15px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 250px;
        }
        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
        }
        h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 16px;
            color: #aaccff;
            border-bottom: 1px solid rgba(100, 100, 150, 0.5);
            padding-bottom: 5px;
        }
        .control-group {
            margin-bottom: 10px;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .hud-value {
            font-weight: bold;
            color: #44ffaa;
        }
        .instructions {
            margin-top: 15px;
            font-size: 11px;
            color: #aaaaaa;
            line-height: 1.4;
        }
        .key {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            color: #fff;
            font-family: monospace;
        }
        .node-label {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #555;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            white-space: nowrap;
            transform: translate(-50%, -150%);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .node-label .title {
            font-weight: bold;
            color: #aaccff;
            margin-bottom: 3px;
        }
        .node-label .stats {
            font-size: 10px;
            color: #ccc;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="webgl-container"></div>
    <div id="css2d-container"></div>
    
    <div id="ui-layer">
        <div id="controls" class="panel">
            <h3>Physics Controls</h3>
            <div class="control-group">
                <label><span>Spring Stiffness</span> <span id="val-spring">0.5</span></label>
                <input type="range" id="slider-spring" min="0.1" max="2.0" step="0.05" value="0.5">
            </div>
            <div class="control-group">
                <label><span>Repulsion Strength</span> <span id="val-repulsion">50</span></label>
                <input type="range" id="slider-repulsion" min="10" max="200" step="10" value="50">
            </div>
            <div class="instructions">
                <span class="key">Hover</span> Info & Highlight<br>
                <span class="key">Click</span> Pin / Unpin node<br>
                <span class="key">Drag</span> Move node<br>
                <span class="key">Space</span> Pause / Play<br>
                <span class="key">R</span> Re-randomize layout<br>
                <span class="key">F</span> Toggle Field Filter
            </div>
        </div>

        <div id="hud" class="panel">
            <h3>Network Stats</h3>
            <div class="hud-row"><span>Nodes:</span> <span id="hud-nodes" class="hud-value">0</span></div>
            <div class="hud-row"><span>Edges:</span> <span id="hud-edges" class="hud-value">0</span></div>
            <div class="hud-row"><span>Avg Velocity:</span> <span id="hud-velocity" class="hud-value">0.000</span></div>
            <div class="hud-row"><span>Converged:</span> <span id="hud-converged" class="hud-value">No</span></div>
            <div class="hud-row"><span>Filter:</span> <span id="hud-filter" class="hud-value" style="color:#fff">All</span></div>
            <div class="hud-row"><span>Pinned:</span> <span id="hud-pinned" class="hud-value">0</span></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Global State & Configuration ---
        window.__3D_STATE__ = {
            nodeCount: 40,
            edgeCount: 60,
            avgVelocity: 0,
            isConverged: false,
            isPaused: false,
            springK: 0.5,
            repulsionK: 50,
            fieldFilter: 'All',
            pinnedCount: 0,
            frameCount: 0,
            nodesValid: true,
            totalKE: 0
        };

        const FIELDS = ['AI', 'Physics', 'Biology', 'Math', 'CS'];
        const FIELD_COLORS = {
            'AI': 0xff4444,
            'Physics': 0x4488ff,
            'Biology': 0x44ff44,
            'Math': 0xffaa44,
            'CS': 0xff44ff
        };
        const FILTERS = ['All', ...FIELDS];
        let currentFilterIndex = 0;

        const PHYSICS = {
            restLength: 5,
            damping: 0.92,
            dt: 0.1,
            substeps: 3,
            centerForce: -0.01,
            maxRepelDist: 20
        };

        // --- Data Structures ---
        const nodesData = [];
        const edgesData = [];
        const interactableMeshes = [];

        // --- Scene Setup ---
        const container = document.getElementById('webgl-container');
        const cssContainer = document.getElementById('css2d-container');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        cssContainer.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        scene.add(new THREE.AmbientLight(0x334455, 0.4));
        const pointLight = new THREE.PointLight(0xffffff, 1.0);
        pointLight.position.set(0, 0, 30);
        scene.add(pointLight);

        // --- Graph Generation ---
        function generateGraph() {
            // Generate Nodes
            const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
            const ringGeo = new THREE.TorusGeometry(1.2, 0.05, 8, 24);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

            for (let i = 0; i < window.__3D_STATE__.nodeCount; i++) {
                const citations = Math.floor(Math.random() * 51);
                const field = FIELDS[Math.floor(Math.random() * FIELDS.length)];
                const radius = 0.3 + citations * 0.02;
                
                const material = new THREE.MeshStandardMaterial({
                    color: FIELD_COLORS[field],
                    roughness: 0.4,
                    metalness: 0.1
                });
                
                const mesh = new THREE.Mesh(sphereGeo, material);
                mesh.scale.setScalar(radius);
                
                // Random initial position in sphere radius 15
                const pos = new THREE.Vector3(
                    Math.random() - 0.5,
                    Math.random() - 0.5,
                    Math.random() - 0.5
                ).normalize().multiplyScalar(Math.random() * 15);
                
                mesh.position.copy(pos);
                scene.add(mesh);
                interactableMeshes.push(mesh);

                const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                ringMesh.scale.setScalar(radius);
                ringMesh.visible = false;
                scene.add(ringMesh);

                const node = {
                    id: i,
                    title: `Paper_${i.toString().padStart(2, '0')}`,
                    year: 2015 + Math.floor(Math.random() * 10),
                    citations: citations,
                    field: field,
                    pos: pos,
                    vel: new THREE.Vector3(),
                    force: new THREE.Vector3(),
                    pinned: false,
                    mesh: mesh,
                    ringMesh: ringMesh,
                    radius: radius
                };
                mesh.userData.node = node;
                nodesData.push(node);
            }

            // Generate Edges
            let edgesCreated = 0;
            const edgeSet = new Set();

            while (edgesCreated < window.__3D_STATE__.edgeCount) {
                const sourceIdx = Math.floor(Math.random() * nodesData.length);
                const targetIdx = Math.floor(Math.random() * nodesData.length);
                
                if (sourceIdx === targetIdx) continue;
                
                const source = nodesData[sourceIdx];
                const target = nodesData[targetIdx];
                
                // Constraint: cite earlier or same year
                if (source.year < target.year) continue;
                
                const edgeKey = `${sourceIdx}-${targetIdx}`;
                if (edgeSet.has(edgeKey)) continue;
                
                edgeSet.add(edgeKey);
                
                const lineGeo = new THREE.BufferGeometry();
                const positions = new Float32Array(6);
                lineGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                
                const lineMat = new THREE.LineBasicMaterial({
                    color: FIELD_COLORS[source.field],
                    transparent: true,
                    opacity: 0.3,
                    depthWrite: false
                });
                
                const lineMesh = new THREE.Line(lineGeo, lineMat);
                scene.add(lineMesh);
                
                edgesData.push({
                    source: source,
                    target: target,
                    lineMesh: lineMesh
                });
                
                edgesCreated++;
            }
        }

        generateGraph();

        // --- CSS2D Label Setup ---
        const labelDiv = document.createElement('div');
        labelDiv.className = 'node-label';
        labelDiv.innerHTML = '<div class="title"></div><div class="stats"></div>';
        const labelObject = new CSS2DObject(labelDiv);
        labelObject.visible = false;
        scene.add(labelObject);

        // --- Interaction State ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredNode = null;
        let draggedNode = null;
        let isDragging = false;
        let mouseDownPos = new THREE.Vector2();
        const dragPlane = new THREE.Plane();
        const planeNormal = new THREE.Vector3();
        const intersectionPoint = new THREE.Vector3();

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (draggedNode) {
                isDragging = true;
                raycaster.setFromCamera(mouse, camera);
                if (raycaster.ray.intersectPlane(dragPlane, intersectionPoint)) {
                    draggedNode.pos.copy(intersectionPoint);
                    draggedNode.vel.set(0, 0, 0);
                }
            }
        });

        document.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.closest('.panel')) return;
            
            mouseDownPos.copy(mouse);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableMeshes);
            
            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                const node = mesh.userData.node;
                
                // Only interact if visible (filtered)
                if (mesh.visible) {
                    draggedNode = node;
                    controls.enabled = false;
                    
                    // Setup drag plane facing camera
                    camera.getWorldDirection(planeNormal);
                    planeNormal.negate();
                    dragPlane.setFromNormalAndCoplanarPoint(planeNormal, draggedNode.pos);
                }
            }
        });

        document.addEventListener('mouseup', (e) => {
            if (draggedNode) {
                // If didn't move much, treat as click (pin/unpin)
                if (!isDragging || mouseDownPos.distanceTo(mouse) < 0.01) {
                    draggedNode.pinned = !draggedNode.pinned;
                    draggedNode.ringMesh.visible = draggedNode.pinned;
                    draggedNode.vel.set(0, 0, 0);
                }
                draggedNode = null;
                isDragging = false;
                controls.enabled = true;
            }
        });

        // UI Controls
        const sliderSpring = document.getElementById('slider-spring');
        const valSpring = document.getElementById('val-spring');
        sliderSpring.addEventListener('input', (e) => {
            window.__3D_STATE__.springK = parseFloat(e.target.value);
            valSpring.textContent = window.__3D_STATE__.springK.toFixed(2);
        });

        const sliderRepulsion = document.getElementById('slider-repulsion');
        const valRepulsion = document.getElementById('val-repulsion');
        sliderRepulsion.addEventListener('input', (e) => {
            window.__3D_STATE__.repulsionK = parseFloat(e.target.value);
            valRepulsion.textContent = window.__3D_STATE__.repulsionK;
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            } else if (e.code === 'KeyR') {
                // Re-randomize
                nodesData.forEach(n => {
                    n.pos.set(
                        Math.random() - 0.5,
                        Math.random() - 0.5,
                        Math.random() - 0.5
                    ).normalize().multiplyScalar(Math.random() * 15);
                    n.vel.set(0, 0, 0);
                });
            } else if (e.code === 'KeyF') {
                currentFilterIndex = (currentFilterIndex + 1) % FILTERS.length;
                window.__3D_STATE__.fieldFilter = FILTERS[currentFilterIndex];
                document.getElementById('hud-filter').textContent = window.__3D_STATE__.fieldFilter;
                document.getElementById('hud-filter').style.color = 
                    window.__3D_STATE__.fieldFilter === 'All' ? '#fff' : '#' + FIELD_COLORS[window.__3D_STATE__.fieldFilter].toString(16).padStart(6, '0');
            }
        });

        // --- Physics Engine ---
        function stepPhysics() {
            if (window.__3D_STATE__.isPaused) return;

            const { springK, repulsionK } = window.__3D_STATE__;
            const { restLength, damping, dt, substeps, centerForce, maxRepelDist } = PHYSICS;
            const subDt = dt / substeps;

            for (let step = 0; step < substeps; step++) {
                // 1. Reset forces
                for (let i = 0; i < nodesData.length; i++) {
                    nodesData[i].force.set(0, 0, 0);
                }

                // 2. Repulsion (O(N^2) is fine for N=40)
                const dir = new THREE.Vector3();
                for (let i = 0; i < nodesData.length; i++) {
                    const n1 = nodesData[i];
                    for (let j = i + 1; j < nodesData.length; j++) {
                        const n2 = nodesData[j];
                        dir.subVectors(n1.pos, n2.pos);
                        const distSq = dir.lengthSq();
                        
                        if (distSq > 0.01 && distSq < maxRepelDist * maxRepelDist) {
                            const dist = Math.sqrt(distSq);
                            const f = repulsionK / distSq;
                            dir.normalize().multiplyScalar(f);
                            n1.force.add(dir);
                            n2.force.sub(dir);
                        }
                    }
                }

                // 3. Springs
                for (let i = 0; i < edgesData.length; i++) {
                    const e = edgesData[i];
                    dir.subVectors(e.source.pos, e.target.pos);
                    const dist = dir.length();
                    if (dist > 0.01) {
                        const f = springK * (dist - restLength);
                        dir.normalize().multiplyScalar(f);
                        e.source.force.sub(dir);
                        e.target.force.add(dir);
                    }
                }

                // 4. Center Force & Integration
                for (let i = 0; i < nodesData.length; i++) {
                    const n = nodesData[i];
                    
                    // Center force
                    n.force.addScaledVector(n.pos, centerForce);

                    if (!n.pinned && n !== draggedNode) {
                        // Euler integration (mass = 1)
                        n.vel.addScaledVector(n.force, subDt);
                        n.vel.multiplyScalar(damping);
                        n.pos.addScaledVector(n.vel, subDt);
                    } else {
                        n.vel.set(0, 0, 0);
                    }
                }
            }
        }

        // --- Visual Updates ---
        function updateVisuals() {
            // Update Hover State
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableMeshes.filter(m => m.visible));
            
            if (intersects.length > 0 && !draggedNode) {
                const newHovered = intersects[0].object.userData.node;
                if (hoveredNode !== newHovered) {
                    hoveredNode = newHovered;
                    labelDiv.querySelector('.title').textContent = hoveredNode.title;
                    labelDiv.querySelector('.stats').textContent = `Year: ${hoveredNode.year} | Citations: ${hoveredNode.citations} | Field: ${hoveredNode.field}`;
                    labelObject.visible = true;
                }
                // Attach label to hovered node
                labelObject.position.copy(hoveredNode.pos);
            } else {
                hoveredNode = null;
                labelObject.visible = false;
            }

            const filter = window.__3D_STATE__.fieldFilter;

            // Update Nodes
            for (let i = 0; i < nodesData.length; i++) {
                const n = nodesData[i];
                n.mesh.position.copy(n.pos);
                n.ringMesh.position.copy(n.pos);
                
                // Visibility based on filter
                const isVisible = filter === 'All' || n.field === filter;
                n.mesh.visible = isVisible;
                n.ringMesh.visible = isVisible && n.pinned;

                // Hover highlight
                if (hoveredNode) {
                    if (n === hoveredNode) {
                        n.mesh.material.emissive.setHex(0x444444);
                    } else {
                        n.mesh.material.emissive.setHex(0x000000);
                    }
                } else {
                    n.mesh.material.emissive.setHex(0x000000);
                }
            }

            // Update Edges
            for (let i = 0; i < edgesData.length; i++) {
                const e = edgesData[i];
                const positions = e.lineMesh.geometry.attributes.position.array;
                
                positions[0] = e.source.pos.x;
                positions[1] = e.source.pos.y;
                positions[2] = e.source.pos.z;
                positions[3] = e.target.pos.x;
                positions[4] = e.target.pos.y;
                positions[5] = e.target.pos.z;
                
                e.lineMesh.geometry.attributes.position.needsUpdate = true;

                // Visibility based on source node filter
                const isVisible = filter === 'All' || e.source.field === filter;
                e.lineMesh.visible = isVisible;

                // Hover highlight
                if (isVisible) {
                    if (hoveredNode) {
                        if (e.source === hoveredNode || e.target === hoveredNode) {
                            e.lineMesh.material.opacity = 1.0;
                        } else {
                            e.lineMesh.material.opacity = 0.1;
                        }
                    } else {
                        e.lineMesh.material.opacity = 0.3;
                    }
                }
            }
        }

        // --- State Management & HUD ---
        function updateStateAndHUD() {
            let totalVel = 0;
            let totalKE = 0;
            let pinnedCount = 0;
            let nodesValid = true;

            for (let i = 0; i < nodesData.length; i++) {
                const n = nodesData[i];
                const vSq = n.vel.lengthSq();
                totalVel += Math.sqrt(vSq);
                totalKE += 0.5 * vSq; // mass = 1
                if (n.pinned) pinnedCount++;
                if (isNaN(n.pos.x) || isNaN(n.pos.y) || isNaN(n.pos.z)) {
                    nodesValid = false;
                }
            }

            const avgVel = totalVel / nodesData.length;
            const isConverged = avgVel < 0.05;

            // Update State Object
            window.__3D_STATE__.avgVelocity = parseFloat(avgVel.toFixed(4));
            window.__3D_STATE__.isConverged = isConverged;
            window.__3D_STATE__.pinnedCount = pinnedCount;
            window.__3D_STATE__.frameCount++;
            window.__3D_STATE__.nodesValid = nodesValid;
            window.__3D_STATE__.totalKE = parseFloat(totalKE.toFixed(3));

            // Update HUD DOM
            if (window.__3D_STATE__.frameCount % 5 === 0) { // Throttle DOM updates slightly
                document.getElementById('hud-nodes').textContent = window.__3D_STATE__.nodeCount;
                document.getElementById('hud-edges').textContent = window.__3D_STATE__.edgeCount;
                document.getElementById('hud-velocity').textContent = avgVel.toFixed(3);
                
                const convEl = document.getElementById('hud-converged');
                convEl.textContent = isConverged ? 'Yes' : 'No';
                convEl.style.color = isConverged ? '#44ffaa' : '#ffaa44';
                
                document.getElementById('hud-pinned').textContent = pinnedCount;
            }
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            stepPhysics();
            updateVisuals();
            controls.update();
            updateStateAndHUD();

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        // Initialize HUD values
        document.getElementById('hud-nodes').textContent = window.__3D_STATE__.nodeCount;
        document.getElementById('hud-edges').textContent = window.__3D_STATE__.edgeCount;

        animate();
    </script>
</body>
</html>
