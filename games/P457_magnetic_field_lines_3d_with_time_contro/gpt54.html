<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Magnetic Dipole Field Lines - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(20, 20, 35, 0.5);
      padding: 12px 16px;
      border-radius: 14px;
      backdrop-filter: blur(6px);
      display: flex;
      flex-wrap: wrap;
      gap: 10px 12px;
      align-items: center;
      justify-content: center;
      z-index: 10;
      min-width: 720px;
      max-width: 92vw;
      box-shadow: 0 0 20px rgba(0,0,0,0.25);
    }

    .btn, select, input[type="range"] {
      background: rgba(40, 40, 70, 0.75);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 14px;
    }

    .btn {
      cursor: pointer;
    }

    .btn:hover, select:hover {
      background: rgba(60, 60, 100, 0.85);
    }

    label {
      font-size: 14px;
      opacity: 0.95;
    }

    #timeSlider {
      width: 220px;
      accent-color: #9d7cff;
    }

    #topInfo {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(20,20,35,0.45);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.45;
      backdrop-filter: blur(4px);
    }

    #fieldStrengthDisplay {
      min-width: 180px;
      text-align: center;
      padding: 8px 12px;
      background: rgba(40, 40, 70, 0.75);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 14px;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
  </style>
</head>
<body>
  <div id="topInfo">
    <div><strong>Magnetic Dipole Field Visualization</strong></div>
    <div>Mouse: orbit / zoom</div>
    <div>Space: play/pause | R: reset | F: field lines</div>
    <div>←/→: step time | 1/2/3/4: speed</div>
  </div>

  <div id="ui">
    <button id="playPauseBtn" class="btn">▶</button>
    <label>Time</label>
    <input id="timeSlider" type="range" min="0" max="1" step="0.001" value="0" />
    <select id="speedSelect">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="2">2x</option>
      <option value="4">4x</option>
    </select>
    <button id="resetBtn" class="btn">Reset</button>
    <button id="togglePolarityBtn" class="btn">Toggle Polarity</button>
    <button id="toggleFieldBtn" class="btn">Hide Field Lines</button>
    <div id="fieldStrengthDisplay">|B| midpoint: <span class="mono">0.000</span></div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // ------------------------------------------------------------
    // Global state initialization (required before first frame)
    // ------------------------------------------------------------
    window.__3D_STATE__ = {
      time: 0,
      isPlaying: false,
      speedMultiplier: 1,
      fieldLinesVisible: true,
      polarityMode: 'attracting',
      magnet1Position: { x: -3, y: 0.25, z: 0 },
      magnet2Position: { x: 3, y: 0.25, z: 0 },
      midpointFieldStrength: 0,
      testChargeCount: 6,
      fieldLineCount: 0,
      testChargePositions: Array.from({ length: 6 }, () => ({ x: 0, y: 0, z: 0 })),
      cameraDistance: Math.sqrt(0*0 + 8*8 + 15*15),
      frameCount: 0,
      magnetSeparation: 6
    };

    // ------------------------------------------------------------
    // Scene setup
    // ------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.5, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    const grid = new THREE.GridHelper(20, 20, 0x6688aa, 0x446688);
    grid.position.y = 0;
    grid.material.transparent = true;
    grid.material.opacity = 0.28;
    scene.add(grid);

    // ------------------------------------------------------------
    // Helpers
    // ------------------------------------------------------------
    function createTextSprite(text, color = "#ffffff") {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, 256, 256);
      ctx.fillStyle = "rgba(0,0,0,0)";
      ctx.fillRect(0, 0, 256, 256);
      ctx.font = "bold 160px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = color;
      ctx.strokeStyle = "rgba(0,0,0,0.6)";
      ctx.lineWidth = 10;
      ctx.strokeText(text, 128, 138);
      ctx.fillText(text, 128, 138);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true
      });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(0.55, 0.55, 0.55);
      return sprite;
    }

    function lerpColor(c1, c2, t) {
      return new THREE.Color(c1).lerp(new THREE.Color(c2), t);
    }

    function vecToObj(v) {
      return { x: v.x, y: v.y, z: v.z };
    }

    // ------------------------------------------------------------
    // Magnets
    // ------------------------------------------------------------
    function createBarMagnet(name, northOnPositiveX = true) {
      const group = new THREE.Group();
      group.name = name;

      const halfGeom = new THREE.BoxGeometry(0.5, 0.5, 0.5);
      const northMat = new THREE.MeshPhongMaterial({ color: 0xff3333 });
      const southMat = new THREE.MeshPhongMaterial({ color: 0x3366ff });

      const leftHalf = new THREE.Mesh(halfGeom, northOnPositiveX ? southMat : northMat);
      const rightHalf = new THREE.Mesh(halfGeom, northOnPositiveX ? northMat : southMat);

      leftHalf.position.x = -0.25;
      rightHalf.position.x = 0.25;

      group.add(leftHalf, rightHalf);

      const outlineMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.12
      });
      const outline = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 0.5), outlineMat);
      group.add(outline);

      const northLabel = createTextSprite("N", "#ffffff");
      const southLabel = createTextSprite("S", "#ffffff");
      northLabel.position.set(northOnPositiveX ? 0.42 : -0.42, 0.42, 0);
      southLabel.position.set(northOnPositiveX ? -0.42 : 0.42, 0.42, 0);
      group.add(northLabel, southLabel);

      group.userData = {
        northOnPositiveX,
        leftHalf,
        rightHalf,
        northLabel,
        southLabel,
        northMat,
        southMat
      };

      return group;
    }

    function setMagnetOrientation(group, northOnPositiveX) {
      group.userData.northOnPositiveX = northOnPositiveX;
      group.userData.leftHalf.material = northOnPositiveX ? group.userData.southMat : group.userData.northMat;
      group.userData.rightHalf.material = northOnPositiveX ? group.userData.northMat : group.userData.southMat;
      group.userData.northLabel.position.set(northOnPositiveX ? 0.42 : -0.42, 0.42, 0);
      group.userData.southLabel.position.set(northOnPositiveX ? -0.42 : 0.42, 0.42, 0);
    }

    const magnet1 = createBarMagnet("Magnet1", true);
    magnet1.position.set(-3, 0.25, 0);

    const magnet2 = createBarMagnet("Magnet2", false); // attracting initially
    magnet2.position.set(3, 0.25, 0);

    scene.add(magnet1, magnet2);

    function getMagnetData(group) {
      const pos = group.position.clone();
      const northDir = new THREE.Vector3(group.userData.northOnPositiveX ? 1 : -1, 0, 0);
      const southDir = northDir.clone().multiplyScalar(-1);
      const northPole = pos.clone().add(northDir.clone().multiplyScalar(0.5));
      const southPole = pos.clone().add(southDir.clone().multiplyScalar(0.5));
      const moment = northDir.clone().multiplyScalar(2.0); // simplified dipole moment
      return { pos, northDir, southDir, northPole, southPole, moment };
    }

    // ------------------------------------------------------------
    // Magnetic field model
    // ------------------------------------------------------------
    const MU = 1.0; // simplified scalar factor

    function dipoleFieldAt(point, dipolePos, moment) {
      const r = point.clone().sub(dipolePos);
      const rLen = r.length();
      const eps = 0.12;
      const rr = Math.max(rLen, eps);

      const rHat = r.clone().normalize();
      const mdotr = moment.dot(rHat);

      const term1 = rHat.clone().multiplyScalar(3 * mdotr);
      const B = term1.sub(moment).multiplyScalar(MU / Math.pow(rr, 3));
      return B;
    }

    function totalFieldAt(point) {
      const d1 = getMagnetData(magnet1);
      const d2 = getMagnetData(magnet2);
      return dipoleFieldAt(point, d1.pos, d1.moment).add(
             dipoleFieldAt(point, d2.pos, d2.moment));
    }

    function rk4Step(position, h) {
      function dir(p) {
        const b = totalFieldAt(p);
        const len = b.length();
        if (len < 1e-8) return new THREE.Vector3(0, 0, 0);
        return b.divideScalar(len);
      }

      const k1 = dir(position).multiplyScalar(h);
      const k2 = dir(position.clone().add(k1.clone().multiplyScalar(0.5))).multiplyScalar(h);
      const k3 = dir(position.clone().add(k2.clone().multiplyScalar(0.5))).multiplyScalar(h);
      const k4 = dir(position.clone().add(k3)).multiplyScalar(h);

      return position.clone().add(
        k1.clone().add(k2.clone().multiplyScalar(2)).add(k3.clone().multiplyScalar(2)).add(k4).multiplyScalar(1 / 6)
      );
    }

    // ------------------------------------------------------------
    // Field line generation
    // ------------------------------------------------------------
    const fieldLineGroup = new THREE.Group();
    scene.add(fieldLineGroup);

    let fieldLineData = [];

    function isNearSouthPole(point) {
      const m1 = getMagnetData(magnet1);
      const m2 = getMagnetData(magnet2);
      return point.distanceTo(m1.southPole) < 0.38 || point.distanceTo(m2.southPole) < 0.38;
    }

    function isInsideMagnet(point, magnetGroup) {
      const local = point.clone().sub(magnetGroup.position);
      return Math.abs(local.x) <= 0.52 && Math.abs(local.y) <= 0.27 && Math.abs(local.z) <= 0.27;
    }

    function buildFieldLine(seed) {
      const points = [];
      const strengths = [];
      let p = seed.clone();

      for (let i = 0; i < 200; i++) {
        points.push(p.clone());
        strengths.push(totalFieldAt(p).length());

        const next = rk4Step(p, 0.05);
        if (!isFinite(next.x) || !isFinite(next.y) || !isFinite(next.z)) break;
        if (next.length() > 30) break;
        if (isNearSouthPole(next)) {
          points.push(next.clone());
          strengths.push(totalFieldAt(next).length());
          break;
        }
        if ((isInsideMagnet(next, magnet1) || isInsideMagnet(next, magnet2)) && i > 3) {
          points.push(next.clone());
          strengths.push(totalFieldAt(next).length());
          break;
        }
        p = next;
      }

      return { points, strengths };
    }

    function createSeedPointsForMagnet(magnetGroup) {
      const data = getMagnetData(magnetGroup);
      const seeds = [];
      const center = data.northPole.clone().add(data.northDir.clone().multiplyScalar(0.04));
      const up = new THREE.Vector3(0, 1, 0);
      const forward = new THREE.Vector3(0, 0, 1);

      for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2;
        const offset = up.clone().multiplyScalar(Math.cos(a) * 0.3).add(
          forward.clone().multiplyScalar(Math.sin(a) * 0.3)
        );
        seeds.push(center.clone().add(offset));
      }
      return seeds;
    }

    function makeColoredLine(points, strengths) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);

      let minS = Infinity, maxS = -Infinity;
      for (const s of strengths) {
        minS = Math.min(minS, s);
        maxS = Math.max(maxS, s);
      }
      if (maxS - minS < 1e-6) maxS = minS + 1e-6;

      const colors = [];
      for (const s of strengths) {
        const t = THREE.MathUtils.clamp((s - minS) / (maxS - minS), 0, 1);
        const c = lerpColor(0x00ffff, 0xff00ff, t);
        colors.push(c.r, c.g, c.b);
      }
      geometry.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));

      const material = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.95
      });

      return new THREE.Line(geometry, material);
    }

    function clearFieldLines() {
      while (fieldLineGroup.children.length) {
        const obj = fieldLineGroup.children.pop();
        obj.geometry?.dispose?.();
        obj.material?.dispose?.();
      }
      fieldLineData = [];
    }

    function computeArcLengthData(points, strengths) {
      const cum = [0];
      let total = 0;
      const avgStrengths = [];

      for (let i = 1; i < points.length; i++) {
        const segLen = points[i].distanceTo(points[i - 1]);
        total += segLen;
        cum.push(total);
        avgStrengths.push((strengths[i] + strengths[i - 1]) * 0.5);
      }

      let weightTotal = 0;
      const weighted = [0];
      for (let i = 1; i < points.length; i++) {
        const segLen = points[i].distanceTo(points[i - 1]);
        const s = Math.max(avgStrengths[i - 1], 0.0001);
        const w = segLen / (0.15 + s * 0.6); // stronger field -> faster traversal
        weightTotal += w;
        weighted.push(weightTotal);
      }

      return { cumulativeLengths: cum, totalLength: total, weightedTimes: weighted, totalWeighted: weightTotal };
    }

    function regenerateFieldLines() {
      clearFieldLines();

      const seeds = [
        ...createSeedPointsForMagnet(magnet1),
        ...createSeedPointsForMagnet(magnet2)
      ];

      for (const seed of seeds) {
        const line = buildFieldLine(seed);
        if (line.points.length > 3) {
          const obj = makeColoredLine(line.points, line.strengths);
          fieldLineGroup.add(obj);
          fieldLineData.push({
            points: line.points,
            strengths: line.strengths,
            arc: computeArcLengthData(line.points, line.strengths),
            object: obj
          });
        }
      }

      fieldLineGroup.visible = window.__3D_STATE__.fieldLinesVisible;
      window.__3D_STATE__.fieldLineCount = fieldLineData.length;
    }

    regenerateFieldLines();

    // ------------------------------------------------------------
    // Test charges
    // ------------------------------------------------------------
    const testCharges = [];
    const chargeGeom = new THREE.SphereGeometry(0.1, 18, 18);
    const chargeMat = new THREE.MeshPhongMaterial({
      color: 0xffff00,
      emissive: 0xffff00,
      emissiveIntensity: 0.9,
      shininess: 80
    });

    for (let i = 0; i < 6; i++) {
      const charge = new THREE.Mesh(chargeGeom, chargeMat.clone());
      scene.add(charge);
      testCharges.push(charge);
    }

    function interpolateAlongWeighted(points, weightedTimes, totalWeighted, t) {
      if (points.length === 0) return new THREE.Vector3();
      if (points.length === 1 || totalWeighted <= 1e-8) return points[0].clone();

      const target = t * totalWeighted;
      let idx = 1;
      while (idx < weightedTimes.length && weightedTimes[idx] < target) idx++;

      if (idx >= weightedTimes.length) return points[points.length - 1].clone();

      const t0 = weightedTimes[idx - 1];
      const t1 = weightedTimes[idx];
      const alpha = (target - t0) / Math.max(t1 - t0, 1e-8);

      return points[idx - 1].clone().lerp(points[idx], alpha);
    }

    function updateTestCharges(globalT) {
      const positions = [];
      const usableLines = fieldLineData.filter(f => f.points.length > 2);

      for (let i = 0; i < testCharges.length; i++) {
        const line = usableLines[i % Math.max(usableLines.length, 1)];
        let pos = new THREE.Vector3();

        if (line) {
          const offset = (i / testCharges.length) * 0.95;
          const localT = (globalT + offset) % 1;
          pos = interpolateAlongWeighted(
            line.points,
            line.arc.weightedTimes,
            line.arc.totalWeighted,
            localT
          );
        }

        testCharges[i].position.copy(pos);
        positions.push(vecToObj(pos));
      }

      window.__3D_STATE__.testChargePositions = positions;
    }

    // ------------------------------------------------------------
    // UI and controls
    // ------------------------------------------------------------
    let t = 0;
    let isPlaying = false;
    let speedMultiplier = 1;
    let fieldLinesVisible = true;

    const timeSlider = document.getElementById("timeSlider");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const speedSelect = document.getElementById("speedSelect");
    const resetBtn = document.getElementById("resetBtn");
    const togglePolarityBtn = document.getElementById("togglePolarityBtn");
    const toggleFieldBtn = document.getElementById("toggleFieldBtn");
    const fieldStrengthDisplay = document.querySelector("#fieldStrengthDisplay span");

    function currentPolarityMode() {
      return magnet2.userData.northOnPositiveX ? 'repelling' : 'attracting';
    }

    function syncUI() {
      timeSlider.value = t.toFixed(3);
      playPauseBtn.textContent = isPlaying ? "⏸" : "▶";
      toggleFieldBtn.textContent = fieldLinesVisible ? "Hide Field Lines" : "Show Field Lines";
      speedSelect.value = String(speedMultiplier);
    }

    function updateMidpointFieldStrength() {
      const midpoint = magnet1.position.clone().lerp(magnet2.position.clone(), 0.5);
      const strength = totalFieldAt(midpoint).length();
      fieldStrengthDisplay.textContent = strength.toFixed(3);
      window.__3D_STATE__.midpointFieldStrength = strength;
    }

    function updateState() {
      window.__3D_STATE__.time = t;
      window.__3D_STATE__.isPlaying = isPlaying;
      window.__3D_STATE__.speedMultiplier = speedMultiplier;
      window.__3D_STATE__.fieldLinesVisible = fieldLinesVisible;
      window.__3D_STATE__.polarityMode = currentPolarityMode();
      window.__3D_STATE__.magnet1Position = vecToObj(magnet1.position);
      window.__3D_STATE__.magnet2Position = vecToObj(magnet2.position);
      window.__3D_STATE__.testChargeCount = testCharges.length;
      window.__3D_STATE__.fieldLineCount = fieldLineData.length;
      window.__3D_STATE__.cameraDistance = camera.position.length();
      window.__3D_STATE__.magnetSeparation = magnet1.position.distanceTo(magnet2.position);
    }

    function resetAnimation() {
      t = 0;
      isPlaying = false;
      syncUI();
    }

    playPauseBtn.addEventListener("click", () => {
      isPlaying = !isPlaying;
      syncUI();
    });

    timeSlider.addEventListener("input", (e) => {
      t = parseFloat(e.target.value);
      isPlaying = false;
      syncUI();
    });

    speedSelect.addEventListener("change", (e) => {
      speedMultiplier = parseFloat(e.target.value);
      syncUI();
    });

    resetBtn.addEventListener("click", () => {
      resetAnimation();
    });

    toggleFieldBtn.addEventListener("click", () => {
      fieldLinesVisible = !fieldLinesVisible;
      fieldLineGroup.visible = fieldLinesVisible;
      syncUI();
    });

    togglePolarityBtn.addEventListener("click", () => {
      const newNorthPositiveX = !magnet2.userData.northOnPositiveX;
      setMagnetOrientation(magnet2, newNorthPositiveX);
      magnet2.rotation.y += Math.PI;
      regenerateFieldLines();
      resetAnimation();
      updateMidpointFieldStrength();
      updateState();
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        isPlaying = !isPlaying;
      } else if (e.key.toLowerCase() === "r") {
        resetAnimation();
      } else if (e.key.toLowerCase() === "f") {
        fieldLinesVisible = !fieldLinesVisible;
        fieldLineGroup.visible = fieldLinesVisible;
      } else if (e.code === "ArrowLeft" && !isPlaying) {
        t = Math.max(0, t - 0.01);
      } else if (e.code === "ArrowRight" && !isPlaying) {
        t = Math.min(1, t + 0.01);
      } else if (e.key === "1") {
        speedMultiplier = 0.5;
      } else if (e.key === "2") {
        speedMultiplier = 1;
      } else if (e.key === "3") {
        speedMultiplier = 2;
      } else if (e.key === "4") {
        speedMultiplier = 4;
      }
      syncUI();
    });

    // ------------------------------------------------------------
    // Initial state update before first render
    // ------------------------------------------------------------
    updateMidpointFieldStrength();
    updateTestCharges(t);
    updateState();
    syncUI();

    // ------------------------------------------------------------
    // Animation loop
    // ------------------------------------------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();

      if (isPlaying) {
        t += dt * 0.2 * speedMultiplier;
        if (t > 1) t -= 1;
      }

      controls.update();
      fieldLineGroup.visible = fieldLinesVisible;

      updateMidpointFieldStrength();
      updateTestCharges(t);
      updateState();

      window.__3D_STATE__.frameCount += 1;

      renderer.render(scene, camera);
      syncUI();
    }

    animate();

    // ------------------------------------------------------------
    // Resize
    // ------------------------------------------------------------
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
