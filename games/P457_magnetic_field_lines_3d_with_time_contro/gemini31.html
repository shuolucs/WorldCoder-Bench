<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Field Lines Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 26, 0.8);
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 600px;
        }
        .controls-row {
            display: flex;
            gap: 15px;
            align-items: center;
            width: 100%;
            justify-content: center;
        }
        button, select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover, select:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 26, 0.8);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }
        .info-value {
            font-weight: bold;
            color: #00ffff;
        }
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 26, 0.8);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="instructions">
        <b>Keyboard Controls:</b><br>
        Space: Play/Pause<br>
        R: Reset Time<br>
        F: Toggle Field Lines<br>
        Left/Right: Step Time<br>
        1/2/3/4: Speed (0.5x/1x/2x/4x)
    </div>

    <div id="info-panel">
        Midpoint Field Strength |B|: <br>
        <span id="field-strength" class="info-value">0.000</span>
    </div>

    <div id="ui-container">
        <div class="slider-container">
            <label for="time-slider">Time</label>
            <input type="range" id="time-slider" min="0" max="1" step="0.001" value="0">
            <span id="time-display">0.000</span>
        </div>
        <div class="controls-row">
            <button id="btn-play">▶ Play</button>
            <button id="btn-reset">Reset</button>
            <select id="speed-select">
                <option value="0.5">0.5x Speed</option>
                <option value="1" selected>1x Speed</option>
                <option value="2">2x Speed</option>
                <option value="4">4x Speed</option>
            </select>
            <button id="btn-polarity">Toggle Polarity</button>
            <button id="btn-visibility">Hide Field Lines</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Global State ---
        let globalTime = 0;
        let isPlaying = false;
        let speedMultiplier = 1;
        let fieldLinesVisible = true;
        let polarityMode = 'attracting'; // 'attracting' or 'repelling'
        let frameCount = 0;

        window.__3D_STATE__ = {
            time: 0,
            isPlaying: false,
            speedMultiplier: 1,
            fieldLinesVisible: true,
            polarityMode: 'attracting',
            magnet1Position: {x: -3, y: 0.25, z: 0},
            magnet2Position: {x: 3, y: 0.25, z: 0},
            midpointFieldStrength: 0,
            testChargeCount: 6,
            fieldLineCount: 24,
            testChargePositions: [],
            cameraDistance: 15,
            frameCount: 0,
            magnetSeparation: 6
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // Ground Plane
        const gridHelper = new THREE.GridHelper(20, 20, 0xffffff, 0xffffff);
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.2;
        scene.add(gridHelper);

        // --- Magnets ---
        function createMagnetTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            // Left half Blue (S), Right half Red (N)
            ctx.fillStyle = '#0044ff';
            ctx.fillRect(0, 0, 256, 256);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(256, 0, 256, 256);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 120px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('S', 128, 128);
            ctx.fillText('N', 384, 128);
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        const magnetGeo = new THREE.BoxGeometry(1, 0.5, 0.5);
        const magTex = createMagnetTexture();
        
        const matSide = new THREE.MeshPhongMaterial({ map: magTex });
        const matN = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const matS = new THREE.MeshPhongMaterial({ color: 0x0044ff });
        
        // BoxGeometry faces: +x, -x, +y, -y, +z, -z
        // +x is Right (N), -x is Left (S)
        const magMaterials = [matN, matS, matSide, matSide, matSide, matSide];

        const mag1 = new THREE.Mesh(magnetGeo, magMaterials);
        mag1.position.set(-3, 0.25, 0);
        scene.add(mag1);

        const mag2 = new THREE.Mesh(magnetGeo, magMaterials);
        mag2.position.set(3, 0.25, 0);
        // Initially attracting: Mag 2 N faces -x
        mag2.rotation.y = Math.PI; 
        scene.add(mag2);

        // --- Physics & Field Lines ---
        const DIPOLE_MOMENT_MAGNITUDE = 5.0;
        const lineGroup = new THREE.Group();
        scene.add(lineGroup);
        
        let linesData = []; // Stores { points: [], times: [] } for each line

        function getDipoleMoment(mesh) {
            // N pole is on +x face in local coordinates
            return new THREE.Vector3(1, 0, 0).applyQuaternion(mesh.quaternion).normalize().multiplyScalar(DIPOLE_MOMENT_MAGNITUDE);
        }

        function getBField(pos) {
            const m1 = getDipoleMoment(mag1);
            const m2 = getDipoleMoment(mag2);

            const calcB = (p, mPos, mVec) => {
                const r = new THREE.Vector3().subVectors(p, mPos);
                const rMag = r.length();
                if (rMag < 0.1) return new THREE.Vector3(0,0,0);
                const rHat = r.clone().normalize();
                const dot = mVec.dot(rHat);
                const term1 = rHat.clone().multiplyScalar(3 * dot);
                return term1.sub(mVec).multiplyScalar(1 / Math.pow(rMag, 3));
            };

            const b1 = calcB(pos, mag1.position, m1);
            const b2 = calcB(pos, mag2.position, m2);
            return b1.add(b2);
        }

        function generateFieldLines() {
            lineGroup.clear();
            linesData = [];

            const seeds = [];
            const radius = 0.3;
            const numSeedsPerPole = 12;

            // Helper to get N pole center
            const getNPoleCenter = (mesh) => {
                return mesh.position.clone().add(new THREE.Vector3(0.5, 0, 0).applyQuaternion(mesh.quaternion));
            };

            const n1Center = getNPoleCenter(mag1);
            const n2Center = getNPoleCenter(mag2);

            // Generate seeds for Mag 1 N pole
            for (let i = 0; i < numSeedsPerPole; i++) {
                const angle = (i / numSeedsPerPole) * Math.PI * 2;
                const offset = new THREE.Vector3(0, radius * Math.cos(angle), radius * Math.sin(angle)).applyQuaternion(mag1.quaternion);
                seeds.push(n1Center.clone().add(offset));
            }

            // Generate seeds for Mag 2 N pole
            for (let i = 0; i < numSeedsPerPole; i++) {
                const angle = (i / numSeedsPerPole) * Math.PI * 2;
                const offset = new THREE.Vector3(0, radius * Math.cos(angle), radius * Math.sin(angle)).applyQuaternion(mag2.quaternion);
                seeds.push(n2Center.clone().add(offset));
            }

            const h = 0.05;
            const maxSteps = 200;
            const colorCyan = new THREE.Color(0x00ffff);
            const colorMagenta = new THREE.Color(0xff00ff);

            seeds.forEach(seed => {
                const points = [seed.clone()];
                const times = [0];
                let currentPos = seed.clone();
                let totalTime = 0;

                for (let step = 0; step < maxSteps; step++) {
                    const B = getBField(currentPos);
                    const bMag = B.length();
                    if (bMag < 0.00001) break;

                    const dir = B.clone().normalize();

                    // RK4 Integration
                    const getDir = (p) => {
                        const b = getBField(p);
                        return b.lengthSq() > 0 ? b.normalize() : new THREE.Vector3();
                    };

                    const k1 = dir;
                    const k2 = getDir(currentPos.clone().add(k1.clone().multiplyScalar(h / 2)));
                    const k3 = getDir(currentPos.clone().add(k2.clone().multiplyScalar(h / 2)));
                    const k4 = getDir(currentPos.clone().add(k3.clone().multiplyScalar(h)));

                    const move = k1.clone().add(k2.multiplyScalar(2)).add(k3.multiplyScalar(2)).add(k4).multiplyScalar(h / 6);
                    currentPos.add(move);
                    points.push(currentPos.clone());

                    // Time calculation for test charges: dt = ds / |B|
                    // Add small epsilon to prevent infinite time in weak fields
                    const dt = h / (bMag + 0.01);
                    totalTime += dt;
                    times.push(totalTime);

                    // Stop if hitting a magnet (approximate bounding sphere)
                    if (currentPos.distanceTo(mag1.position) < 0.55 || currentPos.distanceTo(mag2.position) < 0.55) {
                        break;
                    }
                }

                // Normalize times to [0, 1]
                if (totalTime > 0) {
                    for (let i = 0; i < times.length; i++) {
                        times[i] /= totalTime;
                    }
                }

                linesData.push({ points, times });

                // Create Line Geometry
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const colors = [];

                points.forEach(p => {
                    const bMag = getBField(p).length();
                    // Map field strength to color gradient (log scale)
                    // Min expected ~0.01, Max expected ~10
                    let t = (Math.log10(bMag) - Math.log10(0.01)) / (Math.log10(10) - Math.log10(0.01));
                    t = Math.max(0, Math.min(1, t));
                    const c = colorCyan.clone().lerp(colorMagenta, t);
                    colors.push(c.r, c.g, c.b);
                });

                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                const material = new THREE.LineBasicMaterial({ vertexColors: true, linewidth: 1 });
                const line = new THREE.Line(geometry, material);
                lineGroup.add(line);
            });
        }

        // --- Test Charges ---
        const testCharges = [];
        const chargeGeo = new THREE.SphereGeometry(0.1, 16, 16);
        const chargeMat = new THREE.MeshBasicMaterial({ color: 0xffff00 }); // Emissive look

        for (let i = 0; i < 6; i++) {
            const mesh = new THREE.Mesh(chargeGeo, chargeMat);
            scene.add(mesh);
            testCharges.push(mesh);
        }

        function updateTestCharges() {
            // Select 6 distinct lines to host the charges
            const lineIndices = [0, 4, 8, 12, 16, 20];
            
            for (let i = 0; i < 6; i++) {
                const lineIdx = lineIndices[i];
                if (!linesData[lineIdx] || linesData[lineIdx].points.length < 2) {
                    testCharges[i].visible = false;
                    continue;
                }
                
                testCharges[i].visible = fieldLinesVisible;
                const data = linesData[lineIdx];
                const pts = data.points;
                const times = data.times;

                // Find segment based on globalTime
                let idx = 0;
                for (let j = 0; j < times.length - 1; j++) {
                    if (globalTime >= times[j] && globalTime <= times[j+1]) {
                        idx = j;
                        break;
                    }
                }
                if (globalTime >= 1.0) idx = times.length - 2;

                const t0 = times[idx];
                const t1 = times[idx+1];
                let localT = (t1 > t0) ? (globalTime - t0) / (t1 - t0) : 0;
                localT = Math.max(0, Math.min(1, localT));

                testCharges[i].position.lerpVectors(pts[idx], pts[idx+1], localT);
            }
        }

        // --- UI & Interaction ---
        const uiTimeSlider = document.getElementById('time-slider');
        const uiTimeDisplay = document.getElementById('time-display');
        const btnPlay = document.getElementById('btn-play');
        const btnReset = document.getElementById('btn-reset');
        const speedSelect = document.getElementById('speed-select');
        const btnPolarity = document.getElementById('btn-polarity');
        const btnVisibility = document.getElementById('btn-visibility');
        const uiFieldStrength = document.getElementById('field-strength');

        function updateUI() {
            uiTimeSlider.value = globalTime;
            uiTimeDisplay.textContent = globalTime.toFixed(3);
            btnPlay.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
            btnVisibility.textContent = fieldLinesVisible ? 'Hide Field Lines' : 'Show Field Lines';
            
            const midpointB = getBField(new THREE.Vector3(0, 0.25, 0)).length();
            uiFieldStrength.textContent = midpointB.toFixed(3);
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            updateUI();
        }

        function resetTime() {
            globalTime = 0;
            isPlaying = false;
            updateUI();
            updateTestCharges();
        }

        function togglePolarity() {
            polarityMode = polarityMode === 'attracting' ? 'repelling' : 'attracting';
            mag2.rotation.y = polarityMode === 'attracting' ? Math.PI : 0;
            generateFieldLines();
            resetTime();
        }

        function toggleVisibility() {
            fieldLinesVisible = !fieldLinesVisible;
            lineGroup.visible = fieldLinesVisible;
            updateUI();
        }

        uiTimeSlider.addEventListener('input', (e) => {
            globalTime = parseFloat(e.target.value);
            updateTestCharges();
            updateUI();
        });

        btnPlay.addEventListener('click', togglePlay);
        btnReset.addEventListener('click', resetTime);
        speedSelect.addEventListener('change', (e) => { speedMultiplier = parseFloat(e.target.value); });
        btnPolarity.addEventListener('click', togglePolarity);
        btnVisibility.addEventListener('click', toggleVisibility);

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'KeyR':
                    resetTime();
                    break;
                case 'KeyF':
                    toggleVisibility();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (!isPlaying) {
                        globalTime = Math.max(0, globalTime - 0.01);
                        updateTestCharges();
                        updateUI();
                    }
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (!isPlaying) {
                        globalTime = Math.min(1, globalTime + 0.01);
                        updateTestCharges();
                        updateUI();
                    }
                    break;
                case 'Digit1': speedSelect.value = "0.5"; speedMultiplier = 0.5; break;
                case 'Digit2': speedSelect.value = "1"; speedMultiplier = 1; break;
                case 'Digit3': speedSelect.value = "2"; speedMultiplier = 2; break;
                case 'Digit4': speedSelect.value = "4"; speedMultiplier = 4; break;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        generateFieldLines();
        updateUI();
        updateTestCharges();

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            frameCount++;

            if (isPlaying) {
                globalTime += 0.2 * delta * speedMultiplier;
                if (globalTime > 1.0) {
                    globalTime = 0; // Loop
                }
                updateUI();
            }

            updateTestCharges();
            controls.update();
            renderer.render(scene, camera);

            // Update State Object
            window.__3D_STATE__.time = globalTime;
            window.__3D_STATE__.isPlaying = isPlaying;
            window.__3D_STATE__.speedMultiplier = speedMultiplier;
            window.__3D_STATE__.fieldLinesVisible = fieldLinesVisible;
            window.__3D_STATE__.polarityMode = polarityMode;
            window.__3D_STATE__.magnet1Position = { x: mag1.position.x, y: mag1.position.y, z: mag1.position.z };
            window.__3D_STATE__.magnet2Position = { x: mag2.position.x, y: mag2.position.y, z: mag2.position.z };
            window.__3D_STATE__.midpointFieldStrength = getBField(new THREE.Vector3(0, 0.25, 0)).length();
            window.__3D_STATE__.testChargeCount = 6;
            window.__3D_STATE__.fieldLineCount = linesData.length;
            window.__3D_STATE__.testChargePositions = testCharges.map(tc => ({ x: tc.position.x, y: tc.position.y, z: tc.position.z }));
            window.__3D_STATE__.cameraDistance = camera.position.length();
            window.__3D_STATE__.frameCount = frameCount;
            window.__3D_STATE__.magnetSeparation = mag1.position.distanceTo(mag2.position);
        }

        animate();
    </script>
</body>
</html>
