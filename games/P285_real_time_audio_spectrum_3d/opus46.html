<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Audio Spectrum Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  
  #controls {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 26, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0ff;
    min-width: 260px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
  }
  
  #controls h3 {
    margin-bottom: 15px;
    color: #8888ff;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(100, 100, 255, 0.2);
    padding-bottom: 8px;
  }
  
  .control-group {
    margin-bottom: 12px;
  }
  
  .control-group label {
    display: block;
    font-size: 12px;
    color: #9999cc;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  button {
    width: 100%;
    padding: 10px;
    border: 1px solid rgba(100, 100, 255, 0.4);
    border-radius: 6px;
    background: rgba(60, 60, 180, 0.3);
    color: #ccccff;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 8px;
  }
  
  button:hover {
    background: rgba(80, 80, 220, 0.5);
    border-color: rgba(120, 120, 255, 0.6);
  }
  
  button.active {
    background: rgba(255, 60, 60, 0.4);
    border-color: rgba(255, 100, 100, 0.5);
  }
  
  select, input[type="range"] {
    width: 100%;
    padding: 6px;
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 4px;
    background: rgba(20, 20, 50, 0.8);
    color: #ccccff;
    font-size: 13px;
  }
  
  input[type="range"] {
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: rgba(60, 60, 180, 0.4);
    outline: none;
    padding: 0;
    cursor: pointer;
  }
  
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #6666ff;
    cursor: pointer;
  }
  
  select {
    cursor: pointer;
  }
  
  select option {
    background: #1a1a3a;
  }
  
  #statsPanel {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(10, 10, 26, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0ff;
    min-width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    font-size: 13px;
  }
  
  #statsPanel h3 {
    margin-bottom: 12px;
    color: #8888ff;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(100, 100, 255, 0.2);
    padding-bottom: 8px;
  }
  
  .stat-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    padding: 3px 0;
  }
  
  .stat-label {
    color: #8888bb;
  }
  
  .stat-value {
    color: #aaaaff;
    font-weight: bold;
    font-family: 'Courier New', monospace;
  }
  
  .value-display {
    font-size: 12px;
    color: #8888cc;
    margin-top: 2px;
    text-align: right;
  }
</style>
</head>
<body>

<div id="controls">
  <h3>🎵 Controls</h3>
  
  <div class="control-group">
    <button id="toggleAudio">Start Audio</button>
  </div>
  
  <div class="control-group">
    <label>Waveform</label>
    <select id="waveformSelect">
      <option value="sine">Sine</option>
      <option value="square">Square</option>
      <option value="sawtooth">Sawtooth</option>
      <option value="triangle">Triangle</option>
    </select>
  </div>
  
  <div class="control-group">
    <label>Frequency</label>
    <input type="range" id="frequencySlider" min="100" max="2000" value="440">
    <div class="value-display" id="freqLabel">440 Hz</div>
  </div>
  
  <div class="control-group">
    <label>Gain</label>
    <input type="range" id="gainSlider" min="0" max="100" value="30">
    <div class="value-display" id="gainLabel">0.30</div>
  </div>
  
  <div class="control-group">
    <button id="toggleView">Switch View (Front)</button>
  </div>
</div>

<div id="statsPanel">
  <h3>📊 Stats</h3>
  <div class="stat-row"><span class="stat-label">Avg Amplitude:</span><span class="stat-value" id="statAvgAmp">0.0</span></div>
  <div class="stat-row"><span class="stat-label">Peak Bin Index:</span><span class="stat-value" id="statPeakIdx">0</span></div>
  <div class="stat-row"><span class="stat-label">Peak Bin Value:</span><span class="stat-value" id="statPeakVal">0</span></div>
  <div class="stat-row"><span class="stat-label">FPS:</span><span class="stat-value" id="statFPS">0</span></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
window.__3D_STATE__ = {
  audioPlaying: false,
  waveform: 'sine',
  frequency: 440,
  gain: 0.30,
  barCount: 128,
  averageAmplitude: 0,
  peakBinIndex: 0,
  peakBinValue: 0,
  currentView: 0,
  maxBarHeight: 0,
  fps: 0,
  barsInitialized: false
};

// --- Three.js Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 30, 60);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 5, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 40, 20);
scene.add(directionalLight);

// Ground plane (subtle grid)
const gridHelper = new THREE.GridHelper(80, 40, 0x222244, 0x111133);
scene.add(gridHelper);

// --- Create Bars ---
const COLS = 16;
const ROWS = 8;
const TOTAL_BARS = COLS * ROWS; // 128
const SPACING = 2.5;
const bars = [];

const barGeometry = new THREE.BoxGeometry(1.5, 1, 1.5);

for (let z = 0; z < ROWS; z++) {
  for (let x = 0; x < COLS; x++) {
    const material = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0.7, 1.0, 0.5),
      metalness: 0.3,
      roughness: 0.4
    });
    const mesh = new THREE.Mesh(barGeometry, material);
    
    const posX = (x - (COLS - 1) / 2) * SPACING;
    const posZ = (z - (ROWS - 1) / 2) * SPACING;
    mesh.position.set(posX, 0.05, posZ);
    mesh.scale.y = 0.1;
    
    scene.add(mesh);
    bars.push(mesh);
  }
}

window.__3D_STATE__.barsInitialized = true;

// --- Audio Setup ---
let audioContext = null;
let analyser = null;
let oscillator = null;
let gainNode = null;
let dataArray = null;
let audioPlaying = false;

function initAudio() {
  if (audioContext) return;
  
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.8;
  
  gainNode = audioContext.createGain();
  gainNode.gain.value = parseFloat(document.getElementById('gainSlider').value) / 100;
  
  gainNode.connect(analyser);
  analyser.connect(audioContext.destination);
  
  dataArray = new Uint8Array(analyser.frequencyBinCount); // 128
}

function startAudio() {
  if (!audioContext) initAudio();
  if (audioContext.state === 'suspended') audioContext.resume();
  
  if (oscillator) {
    try { oscillator.stop(); } catch(e) {}
    oscillator.disconnect();
  }
  
  oscillator = audioContext.createOscillator();
  oscillator.type = document.getElementById('waveformSelect').value;
  oscillator.frequency.value = parseFloat(document.getElementById('frequencySlider').value);
  oscillator.connect(gainNode);
  oscillator.start();
  
  audioPlaying = true;
  window.__3D_STATE__.audioPlaying = true;
}

function stopAudio() {
  if (oscillator) {
    try { oscillator.stop(); } catch(e) {}
    oscillator.disconnect();
    oscillator = null;
  }
  audioPlaying = false;
  window.__3D_STATE__.audioPlaying = false;
}

// --- UI Event Handlers ---
const toggleAudioBtn = document.getElementById('toggleAudio');
toggleAudioBtn.addEventListener('click', () => {
  if (!audioPlaying) {
    startAudio();
    toggleAudioBtn.textContent = 'Stop Audio';
    toggleAudioBtn.classList.add('active');
  } else {
    stopAudio();
    toggleAudioBtn.textContent = 'Start Audio';
    toggleAudioBtn.classList.remove('active');
  }
});

document.getElementById('waveformSelect').addEventListener('change', (e) => {
  window.__3D_STATE__.waveform = e.target.value;
  if (oscillator) {
    oscillator.type = e.target.value;
  }
});

document.getElementById('frequencySlider').addEventListener('input', (e) => {
  const freq = parseFloat(e.target.value);
  document.getElementById('freqLabel').textContent = freq + ' Hz';
  window.__3D_STATE__.frequency = freq;
  if (oscillator) {
    oscillator.frequency.setValueAtTime(freq, audioContext.currentTime);
  }
});

document.getElementById('gainSlider').addEventListener('input', (e) => {
  const g = parseFloat(e.target.value) / 100;
  document.getElementById('gainLabel').textContent = g.toFixed(2);
  window.__3D_STATE__.gain = parseFloat(g.toFixed(2));
  if (gainNode) {
    gainNode.gain.setValueAtTime(g, audioContext.currentTime);
  }
});

const viewPositions = [
  { pos: [0, 30, 60], label: 'Front' },
  { pos: [0, 70, 0.1], label: 'Top-Down' },
  { pos: [60, 20, 0], label: 'Side' }
];
let currentView = 0;

document.getElementById('toggleView').addEventListener('click', () => {
  currentView = (currentView + 1) % 3;
  const view = viewPositions[currentView];
  camera.position.set(view.pos[0], view.pos[1], view.pos[2]);
  camera.lookAt(0, 0, 0);
  controls.target.set(0, 5, 0);
  controls.update();
  document.getElementById('toggleView').textContent = `Switch View (${view.label})`;
  window.__3D_STATE__.currentView = currentView;
});

// --- FPS Tracking ---
let frameCount = 0;
let lastFPSTime = performance.now();
let currentFPS = 0;

// --- Animation Loop ---
const color = new THREE.Color();

function animate() {
  requestAnimationFrame(animate);
  
  // FPS calculation
  frameCount++;
  const now = performance.now();
  if (now - lastFPSTime >= 1000) {
    currentFPS = Math.round(frameCount * 1000 / (now - lastFPSTime));
    frameCount = 0;
    lastFPSTime = now;
  }
  
  // Read frequency data
  let avgAmplitude = 0;
  let peakIndex = 0;
  let peakValue = 0;
  let maxBarHeight = 0.1;
  
  if (analyser && audioPlaying) {
    analyser.getByteFrequencyData(dataArray);
  }
  
  for (let i = 0; i < TOTAL_BARS; i++) {
    const bar = bars[i];
    let value = 0;
    
    if (dataArray && audioPlaying) {
      value = dataArray[i];
    }
    
    // Map 0-255 to 0.1-20.0
    const scaleY = 0.1 + (value / 255) * 19.9;
    bar.scale.y = scaleY;
    
    // Position base at Y=0
    bar.position.y = scaleY / 2;
    
    // Color based on height
    const hue = (scaleY / 20) * 0.7;
    color.setHSL(hue, 1.0, 0.5);
    bar.material.color.copy(color);
    bar.material.emissive.copy(color).multiplyScalar(0.15);
    
    // Stats tracking
    avgAmplitude += value;
    if (value > peakValue) {
      peakValue = value;
      peakIndex = i;
    }
    if (scaleY > maxBarHeight) {
      maxBarHeight = scaleY;
    }
  }
  
  avgAmplitude = avgAmplitude / TOTAL_BARS;
  
  // Update state
  const state = window.__3D_STATE__;
  state.averageAmplitude = parseFloat(avgAmplitude.toFixed(1));
  state.peakBinIndex = peakIndex;
  state.peakBinValue = peakValue;
  state.maxBarHeight = parseFloat(maxBarHeight.toFixed(2));
  state.fps = currentFPS;
  
  // Update stats panel
  document.getElementById('statAvgAmp').textContent = state.averageAmplitude.toFixed(1);
  document.getElementById('statPeakIdx').textContent = peakIndex;
  document.getElementById('statPeakVal').textContent = peakValue;
  document.getElementById('statFPS').textContent = currentFPS;
  
  controls.update();
  renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
