<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Audio Spectrum Visualizer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 10, 26, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px;
      min-width: 260px;
      backdrop-filter: blur(6px);
    }

    #ui h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
    }

    .control-group {
      margin-bottom: 10px;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button, select, input[type="range"] {
      width: 100%;
    }

    button, select {
      background: #1e2240;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }

    button:hover, select:hover {
      background: #2a2f55;
    }

    input[type="range"] {
      accent-color: #6aa6ff;
    }

    #statsPanel {
      margin-top: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .value {
      color: #8ec5ff;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>3D Audio Spectrum</h2>

      <div class="control-group">
        <button id="toggleAudio">Start Audio</button>
      </div>

      <div class="control-group">
        <label for="waveformSelect">Waveform</label>
        <select id="waveformSelect">
          <option value="sine" selected>sine</option>
          <option value="square">square</option>
          <option value="sawtooth">sawtooth</option>
          <option value="triangle">triangle</option>
        </select>
      </div>

      <div class="control-group">
        <label for="frequencySlider">Frequency: <span id="freqLabel" class="value">440 Hz</span></label>
        <input id="frequencySlider" type="range" min="100" max="2000" value="440" />
      </div>

      <div class="control-group">
        <label for="gainSlider">Gain: <span id="gainLabel" class="value">0.30</span></label>
        <input id="gainSlider" type="range" min="0" max="100" value="30" />
      </div>

      <div class="control-group">
        <button id="toggleView">Change View</button>
      </div>

      <div id="statsPanel">Initializing...</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const toggleAudioBtn = document.getElementById('toggleAudio');
    const waveformSelect = document.getElementById('waveformSelect');
    const frequencySlider = document.getElementById('frequencySlider');
    const gainSlider = document.getElementById('gainSlider');
    const freqLabel = document.getElementById('freqLabel');
    const gainLabel = document.getElementById('gainLabel');
    const toggleViewBtn = document.getElementById('toggleView');
    const statsPanel = document.getElementById('statsPanel');

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0a0a1a');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 30, 60);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 40, 20);
    scene.add(directionalLight);

    // Optional subtle ground/grid feel
    const gridHelper = new THREE.GridHelper(60, 24, 0x334466, 0x223344);
    gridHelper.position.y = 0;
    scene.add(gridHelper);

    // Audio
    let audioContext = null;
    let analyser = null;
    let oscillator = null;
    let gainNode = null;
    let frequencyData = null;
    let audioPlaying = false;

    const FFT_SIZE = 256;
    const BIN_COUNT = 128;

    function setupAudioIfNeeded() {
      if (audioContext) return;

      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      audioContext = new AudioCtx();

      analyser = audioContext.createAnalyser();
      analyser.fftSize = FFT_SIZE;
      analyser.smoothingTimeConstant = 0.8;

      gainNode = audioContext.createGain();
      gainNode.gain.value = 0.3;

      oscillator = audioContext.createOscillator();
      oscillator.type = 'sine';
      oscillator.frequency.value = 440;

      oscillator.connect(gainNode);
      gainNode.connect(analyser);
      analyser.connect(audioContext.destination);

      frequencyData = new Uint8Array(analyser.frequencyBinCount);
      oscillator.start();
    }

    // Bars
    const bars = [];
    const cols = 16;
    const rows = 8;
    const spacing = 2.5;

    const barGeometry = new THREE.BoxGeometry(1.5, 1, 1.5);

    function createBars() {
      const offsetX = ((cols - 1) * spacing) / 2;
      const offsetZ = ((rows - 1) * spacing) / 2;

      for (let z = 0; z < rows; z++) {
        for (let x = 0; x < cols; x++) {
          const material = new THREE.MeshStandardMaterial({
            color: new THREE.Color().setHSL(0.45, 1.0, 0.5)
          });

          const bar = new THREE.Mesh(barGeometry, material);
          bar.position.x = x * spacing - offsetX;
          bar.position.z = z * spacing - offsetZ;
          bar.position.y = 0.05;
          bar.scale.y = 0.1;
          scene.add(bar);
          bars.push(bar);
        }
      }
    }

    createBars();

    // Camera views
    const cameraViews = [
      new THREE.Vector3(0, 30, 60),
      new THREE.Vector3(0, 70, 0.1),
      new THREE.Vector3(60, 20, 0)
    ];
    let currentView = 0;

    function setCameraView(index) {
      currentView = index % cameraViews.length;
      camera.position.copy(cameraViews[currentView]);
      camera.lookAt(0, 0, 0);
      controls.target.set(0, 0, 0);
      controls.update();
    }

    // State
    window.__3D_STATE__ = {
      audioPlaying: false,
      waveform: waveformSelect.value,
      frequency: Number(frequencySlider.value),
      gain: Number((Number(gainSlider.value) / 100).toFixed(2)),
      barCount: bars.length,
      averageAmplitude: 0.0,
      peakBinIndex: 0,
      peakBinValue: 0,
      currentView: currentView,
      maxBarHeight: 0.10,
      fps: 0,
      barsInitialized: bars.length === 128
    };

    // UI events
    toggleAudioBtn.addEventListener('click', async () => {
      setupAudioIfNeeded();

      if (!audioPlaying) {
        await audioContext.resume();
        audioPlaying = true;
        toggleAudioBtn.textContent = 'Stop Audio';
      } else {
        await audioContext.suspend();
        audioPlaying = false;
        toggleAudioBtn.textContent = 'Start Audio';
      }
    });

    waveformSelect.addEventListener('change', () => {
      if (oscillator) oscillator.type = waveformSelect.value;
    });

    frequencySlider.addEventListener('input', () => {
      const freq = Number(frequencySlider.value);
      freqLabel.textContent = `${freq} Hz`;
      if (oscillator) oscillator.frequency.setValueAtTime(freq, audioContext.currentTime);
    });

    gainSlider.addEventListener('input', () => {
      const gain = Number(gainSlider.value) / 100;
      gainLabel.textContent = gain.toFixed(2);
      if (gainNode && audioContext) {
        gainNode.gain.setValueAtTime(gain, audioContext.currentTime);
      }
    });

    toggleViewBtn.addEventListener('click', () => {
      setCameraView((currentView + 1) % cameraViews.length);
    });

    // Initial labels
    freqLabel.textContent = `${frequencySlider.value} Hz`;
    gainLabel.textContent = (Number(gainSlider.value) / 100).toFixed(2);

    // Animation / stats
    let lastTime = performance.now();
    let fps = 0;

    function animate(now) {
      requestAnimationFrame(animate);

      const delta = now - lastTime;
      lastTime = now;
      fps = delta > 0 ? 1000 / delta : 0;

      controls.update();

      let avgAmplitude = 0;
      let peakBinIndex = 0;
      let peakBinValue = 0;
      let maxBarHeight = 0.1;

      if (analyser && frequencyData) {
        analyser.getByteFrequencyData(frequencyData);

        for (let i = 0; i < BIN_COUNT; i++) {
          const value = frequencyData[i];
          avgAmplitude += value;

          if (value > peakBinValue) {
            peakBinValue = value;
            peakBinIndex = i;
          }

          const barHeight = THREE.MathUtils.mapLinear(value, 0, 255, 0.1, 20.0);
          maxBarHeight = Math.max(maxBarHeight, barHeight);

          const bar = bars[i];
          bar.scale.y = barHeight;
          bar.position.y = barHeight / 2;

          const hue = (barHeight / 20) * 0.7;
          bar.material.color.setHSL(hue, 1.0, 0.5);
        }

        avgAmplitude /= BIN_COUNT;
      } else {
        // Keep bars at minimum height before audio is started
        for (let i = 0; i < bars.length; i++) {
          const bar = bars[i];
          bar.scale.y = 0.1;
          bar.position.y = 0.05;
          bar.material.color.setHSL((0.1 / 20) * 0.7, 1.0, 0.5);
        }
      }

      window.__3D_STATE__.audioPlaying = audioPlaying;
      window.__3D_STATE__.waveform = waveformSelect.value;
      window.__3D_STATE__.frequency = Number(frequencySlider.value);
      window.__3D_STATE__.gain = Number((Number(gainSlider.value) / 100).toFixed(2));
      window.__3D_STATE__.barCount = bars.length;
      window.__3D_STATE__.averageAmplitude = Number(avgAmplitude.toFixed(1));
      window.__3D_STATE__.peakBinIndex = peakBinIndex;
      window.__3D_STATE__.peakBinValue = peakBinValue;
      window.__3D_STATE__.currentView = currentView;
      window.__3D_STATE__.maxBarHeight = Number(maxBarHeight.toFixed(2));
      window.__3D_STATE__.fps = Math.round(fps);
      window.__3D_STATE__.barsInitialized = bars.length === 128;

      statsPanel.textContent =
        `Average Amplitude: ${window.__3D_STATE__.averageAmplitude}\n` +
        `Peak Bin Index: ${window.__3D_STATE__.peakBinIndex}\n` +
        `Peak Bin Value: ${window.__3D_STATE__.peakBinValue}\n` +
        `Current FPS: ${window.__3D_STATE__.fps}`;

      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
