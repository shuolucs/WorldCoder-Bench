<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Audio Spectrum Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 26, 0.85);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 300px;
            backdrop-filter: blur(5px);
        }
        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #aaa;
        }
        select, input[type="range"], button {
            width: 100%;
            box-sizing: border-box;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            outline: none;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 10px;
        }
        button:hover {
            background: #45a049;
        }
        button#toggleAudio {
            background: #e91e63;
        }
        button#toggleAudio.playing {
            background: #f44336;
        }
        button#toggleView {
            background: #2196F3;
        }
        button#toggleView:hover {
            background: #1976D2;
        }
        .value-label {
            float: right;
            color: #fff;
        }
        #statsPanel {
            margin-top: 20px;
            background: #111;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #333;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .stat-row:last-child {
            margin-bottom: 0;
        }
        .stat-label {
            color: #888;
        }
        .stat-value {
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h2>Audio Visualizer Controls</h2>
        
        <button id="toggleAudio">Start Audio</button>
        
        <div class="control-group">
            <label for="waveformSelect">Waveform</label>
            <select id="waveformSelect">
                <option value="sine">Sine</option>
                <option value="square">Square</option>
                <option value="sawtooth">Sawtooth</option>
                <option value="triangle">Triangle</option>
            </select>
        </div>

        <div class="control-group">
            <label for="frequencySlider">Frequency <span id="freqLabel" class="value-label">440 Hz</span></label>
            <input type="range" id="frequencySlider" min="100" max="2000" value="440">
        </div>

        <div class="control-group">
            <label for="gainSlider">Gain <span id="gainLabel" class="value-label">30</span></label>
            <input type="range" id="gainSlider" min="0" max="100" value="30">
        </div>

        <button id="toggleView">Cycle Camera View</button>

        <div id="statsPanel">
            <div class="stat-row"><span class="stat-label">Avg Amplitude:</span> <span id="statAvg" class="stat-value">0.0</span></div>
            <div class="stat-row"><span class="stat-label">Peak Bin Index:</span> <span id="statPeakIdx" class="stat-value">0</span></div>
            <div class="stat-row"><span class="stat-label">Peak Bin Value:</span> <span id="statPeakVal" class="stat-value">0</span></div>
            <div class="stat-row"><span class="stat-label">FPS:</span> <span id="statFps" class="stat-value">0</span></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <!-- Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            audioPlaying: false,
            waveform: 'sine',
            frequency: 440,
            gain: 0.3,
            barCount: 128,
            averageAmplitude: 0,
            peakBinIndex: 0,
            peakBinValue: 0,
            currentView: 0,
            maxBarHeight: 0.1,
            fps: 0,
            barsInitialized: false
        };

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0a0a1a');

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 60);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 40, 20);
        scene.add(directionalLight);

        // --- 3D Spectrum Bars ---
        const bars = [];
        const cols = 16;
        const rows = 8;
        const spacing = 2.5;
        const geometry = new THREE.BoxGeometry(1.5, 1, 1.5);
        
        // Calculate offsets to center the grid
        const offsetX = (cols - 1) * spacing / 2;
        const offsetZ = (rows - 1) * spacing / 2;

        for (let i = 0; i < window.__3D_STATE__.barCount; i++) {
            const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const mesh = new THREE.Mesh(geometry, material);
            
            const col = i % cols;
            const row = Math.floor(i / cols);
            
            mesh.position.x = (col * spacing) - offsetX;
            mesh.position.z = (row * spacing) - offsetZ;
            
            // Initial scale and position
            mesh.scale.y = 0.1;
            mesh.position.y = 0.05; // Base at Y=0
            
            // Initial color
            mesh.material.color.setHSL((0.1 / 20) * 0.7, 1.0, 0.5);
            
            scene.add(mesh);
            bars.push(mesh);
        }
        window.__3D_STATE__.barsInitialized = true;

        // --- Audio System ---
        let audioCtx;
        let analyser;
        let oscillator;
        let gainNode;
        let dataArray;

        function initAudio() {
            if (audioCtx) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256; // Gives 128 frequency bins
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            gainNode = audioCtx.createGain();
            gainNode.gain.value = window.__3D_STATE__.gain;
            
            gainNode.connect(analyser);
            analyser.connect(audioCtx.destination);
        }

        function startOscillator() {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            oscillator = audioCtx.createOscillator();
            oscillator.type = window.__3D_STATE__.waveform;
            oscillator.frequency.value = window.__3D_STATE__.frequency;
            
            oscillator.connect(gainNode);
            oscillator.start();
            
            window.__3D_STATE__.audioPlaying = true;
            const btn = document.getElementById('toggleAudio');
            btn.innerText = 'Stop Audio';
            btn.classList.add('playing');
        }

        function stopOscillator() {
            if (oscillator) {
                oscillator.stop();
                oscillator.disconnect();
                oscillator = null;
            }
            window.__3D_STATE__.audioPlaying = false;
            const btn = document.getElementById('toggleAudio');
            btn.innerText = 'Start Audio';
            btn.classList.remove('playing');
            
            // Reset bars
            for (let i = 0; i < bars.length; i++) {
                bars[i].scale.y = 0.1;
                bars[i].position.y = 0.05;
                bars[i].material.color.setHSL((0.1 / 20) * 0.7, 1.0, 0.5);
            }
            window.__3D_STATE__.averageAmplitude = 0;
            window.__3D_STATE__.peakBinIndex = 0;
            window.__3D_STATE__.peakBinValue = 0;
            window.__3D_STATE__.maxBarHeight = 0.1;
        }

        // --- UI Event Listeners ---
        document.getElementById('toggleAudio').addEventListener('click', () => {
            if (window.__3D_STATE__.audioPlaying) {
                stopOscillator();
            } else {
                startOscillator();
            }
        });

        document.getElementById('waveformSelect').addEventListener('change', (e) => {
            window.__3D_STATE__.waveform = e.target.value;
            if (oscillator) oscillator.type = window.__3D_STATE__.waveform;
        });

        document.getElementById('frequencySlider').addEventListener('input', (e) => {
            const freq = parseFloat(e.target.value);
            window.__3D_STATE__.frequency = freq;
            document.getElementById('freqLabel').innerText = `${freq} Hz`;
            if (oscillator) oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
        });

        document.getElementById('gainSlider').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            const gainVal = val / 100;
            window.__3D_STATE__.gain = parseFloat(gainVal.toFixed(2));
            document.getElementById('gainLabel').innerText = val;
            if (gainNode) gainNode.gain.setValueAtTime(gainVal, audioCtx.currentTime);
        });

        const cameraViews = [
            { pos: [0, 30, 60], target: [0, 0, 0] },     // Front
            { pos: [0, 70, 0.1], target: [0, 0, 0] },    // Top-down (0.1 z to avoid gimbal lock)
            { pos: [60, 20, 0], target: [0, 0, 0] }      // Side
        ];

        document.getElementById('toggleView').addEventListener('click', () => {
            window.__3D_STATE__.currentView = (window.__3D_STATE__.currentView + 1) % 3;
            const view = cameraViews[window.__3D_STATE__.currentView];
            camera.position.set(...view.pos);
            controls.target.set(...view.target);
            controls.update();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        let lastTime = performance.now();
        let frameCount = 0;
        let lastFpsTime = lastTime;

        // DOM elements for stats
        const elStatAvg = document.getElementById('statAvg');
        const elStatPeakIdx = document.getElementById('statPeakIdx');
        const elStatPeakVal = document.getElementById('statPeakVal');
        const elStatFps = document.getElementById('statFps');

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            frameCount++;
            
            // Calculate FPS every second
            if (now - lastFpsTime >= 1000) {
                window.__3D_STATE__.fps = Math.round((frameCount * 1000) / (now - lastFpsTime));
                frameCount = 0;
                lastFpsTime = now;
            }

            if (window.__3D_STATE__.audioPlaying && analyser) {
                analyser.getByteFrequencyData(dataArray);
                
                let sum = 0;
                let peakVal = 0;
                let peakIdx = 0;
                let maxH = 0.1;

                for (let i = 0; i < window.__3D_STATE__.barCount; i++) {
                    const val = dataArray[i];
                    sum += val;
                    
                    if (val > peakVal) {
                        peakVal = val;
                        peakIdx = i;
                    }

                    // Map 0-255 to 0.1-20.0
                    const height = 0.1 + (val / 255) * 19.9;
                    if (height > maxH) maxH = height;

                    const bar = bars[i];
                    bar.scale.y = height;
                    bar.position.y = height / 2; // Keep base at Y=0

                    // Color mapping: hue = (height / 20) * 0.7
                    const hue = (height / 20.0) * 0.7;
                    bar.material.color.setHSL(hue, 1.0, 0.5);
                }

                window.__3D_STATE__.averageAmplitude = parseFloat((sum / window.__3D_STATE__.barCount).toFixed(1));
                window.__3D_STATE__.peakBinIndex = peakIdx;
                window.__3D_STATE__.peakBinValue = peakVal;
                window.__3D_STATE__.maxBarHeight = parseFloat(maxH.toFixed(2));
            }

            // Update UI Stats
            elStatAvg.innerText = window.__3D_STATE__.averageAmplitude.toFixed(1);
            elStatPeakIdx.innerText = window.__3D_STATE__.peakBinIndex;
            elStatPeakVal.innerText = window.__3D_STATE__.peakBinValue;
            elStatFps.innerText = window.__3D_STATE__.fps;

            controls.update();
            renderer.render(scene, camera);
        }

        // Start loop
        animate();
    </script>
</body>
</html>
