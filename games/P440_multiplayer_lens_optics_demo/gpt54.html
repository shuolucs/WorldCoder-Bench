<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thin Lens Optics Split-Screen Demo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0f1020;
      font-family: Arial, sans-serif;
      color: white;
    }
    #ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: rgba(10, 10, 20, 0.92);
      border-bottom: 1px solid rgba(255,255,255,0.12);
      padding: 8px 12px;
      box-sizing: border-box;
    }
    #hud {
      font-size: 15px;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    label, select, input, button {
      font-size: 14px;
    }
    button, select, input[type="range"] {
      cursor: pointer;
    }
    #container {
      position: fixed;
      left: 0;
      right: 0;
      top: 68px;
      bottom: 0;
    }
    #help {
      position: fixed;
      bottom: 8px;
      left: 8px;
      z-index: 30;
      background: rgba(0,0,0,0.45);
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 6px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="hud">Loading...</div>
    <div id="controls">
      <label for="lensType">Lens Type:</label>
      <select id="lensType">
        <option value="convex" selected>Convex</option>
        <option value="concave">Concave</option>
      </select>

      <label for="focalSlider" id="focalLabel">Focal Length: 3.0</label>
      <input id="focalSlider" type="range" min="1.0" max="8.0" step="0.1" value="3.0" />

      <button id="resetBtn">Reset All</button>
      <button id="swapBtn">Swap Objects</button>
    </div>
  </div>

  <div id="container"></div>

  <div id="help">
    P1: A / D &nbsp;&nbsp;|&nbsp;&nbsp; P2: ← / →
  </div>

  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    const container = document.getElementById('container');
    const hud = document.getElementById('hud');
    const lensTypeEl = document.getElementById('lensType');
    const focalSliderEl = document.getElementById('focalSlider');
    const focalLabelEl = document.getElementById('focalLabel');
    const resetBtn = document.getElementById('resetBtn');
    const swapBtn = document.getElementById('swapBtn');

    const BG_COLOR = 0x1a1a2e;
    const WORLD = {
      left: -14,
      right: 14,
      top: 8,
      bottom: -8
    };

    const OBJECT_HEIGHT = 2;
    const MIN_X = -12;
    const MAX_X = -0.5;
    const MOVE_STEP = 0.5;
    const EPS = 1e-6;

    const state = {
      p1_obj_x: -8,
      p2_obj_x: -6,
      lens_type: 'convex',
      focal_abs: 3.0
    };

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setScissorTest(true);
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const cameraLeft = new THREE.OrthographicCamera(
      WORLD.left, WORLD.right, WORLD.top, WORLD.bottom, 0.1, 100
    );
    cameraLeft.position.set(0, 0, 10);
    cameraLeft.lookAt(0, 0, 0);

    const cameraRight = new THREE.OrthographicCamera(
      WORLD.left, WORLD.right, WORLD.top, WORLD.bottom, 0.1, 100
    );
    cameraRight.position.set(0, 0, 10);
    cameraRight.lookAt(0, 0, 0);

    function makeLine(points, color, dashed = false, opacity = 1, dashSize = 0.35, gapSize = 0.2) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      let material;
      let line;
      if (dashed) {
        material = new THREE.LineDashedMaterial({
          color,
          transparent: opacity < 1,
          opacity,
          dashSize,
          gapSize
        });
        line = new THREE.Line(geometry, material);
        line.computeLineDistances();
      } else {
        material = new THREE.LineBasicMaterial({
          color,
          transparent: opacity < 1,
          opacity
        });
        line = new THREE.Line(geometry, material);
      }
      return line;
    }

    function createArrowGroup(color) {
      const g = new THREE.Group();
      g.userData.color = color;
      return g;
    }

    function rebuildArrow(group, x, height, color, dashed = false, opacity = 1) {
      while (group.children.length) {
        const c = group.children.pop();
        if (c.geometry) c.geometry.dispose();
        if (c.material) c.material.dispose();
      }

      const y0 = 0;
      const y1 = height;
      const headSize = Math.max(0.25, Math.min(0.5, Math.abs(height) * 0.25));
      const sign = height >= 0 ? 1 : -1;

      const shaftTop = y1 - sign * headSize;

      const shaft = makeLine(
        [new THREE.Vector3(x, y0, 0), new THREE.Vector3(x, shaftTop, 0)],
        color,
        dashed,
        opacity
      );
      group.add(shaft);

      const head1 = makeLine(
        [new THREE.Vector3(x, y1, 0), new THREE.Vector3(x - 0.25, y1 - sign * headSize, 0)],
        color,
        dashed,
        opacity
      );
      const head2 = makeLine(
        [new THREE.Vector3(x, y1, 0), new THREE.Vector3(x + 0.25, y1 - sign * headSize, 0)],
        color,
        dashed,
        opacity
      );
      group.add(head1, head2);

      group.userData.tip = new THREE.Vector3(x, y1, 0);
      group.userData.base = new THREE.Vector3(x, y0, 0);
      group.userData.height = height;
    }

    function createLensGroup() {
      const g = new THREE.Group();
      return g;
    }

    function rebuildLens(group, lensType) {
      while (group.children.length) {
        const c = group.children.pop();
        if (c.geometry) c.geometry.dispose();
        if (c.material) c.material.dispose();
      }

      const color = 0x00ffff;

      if (lensType === 'convex') {
        group.add(makeLine([
          new THREE.Vector3(0, -3.2, 0),
          new THREE.Vector3(0.55, -2.5, 0),
          new THREE.Vector3(0.7, 0, 0),
          new THREE.Vector3(0.55, 2.5, 0),
          new THREE.Vector3(0, 3.2, 0)
        ], color, false, 1));

        group.add(makeLine([
          new THREE.Vector3(0, -3.2, 0),
          new THREE.Vector3(-0.55, -2.5, 0),
          new THREE.Vector3(-0.7, 0, 0),
          new THREE.Vector3(-0.55, 2.5, 0),
          new THREE.Vector3(0, 3.2, 0)
        ], color, false, 1));

        group.add(makeLine([
          new THREE.Vector3(-0.22, 3.55, 0),
          new THREE.Vector3(0, 3.95, 0),
          new THREE.Vector3(0.22, 3.55, 0)
        ], color));
        group.add(makeLine([
          new THREE.Vector3(-0.22, -3.55, 0),
          new THREE.Vector3(0, -3.95, 0),
          new THREE.Vector3(0.22, -3.55, 0)
        ], color));
      } else {
        group.add(makeLine([
          new THREE.Vector3(-0.75, -3.2, 0),
          new THREE.Vector3(-0.2, -2.2, 0),
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(-0.2, 2.2, 0),
          new THREE.Vector3(-0.75, 3.2, 0)
        ], color, false, 1));

        group.add(makeLine([
          new THREE.Vector3(0.75, -3.2, 0),
          new THREE.Vector3(0.2, -2.2, 0),
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(0.2, 2.2, 0),
          new THREE.Vector3(0.75, 3.2, 0)
        ], color, false, 1));

        group.add(makeLine([
          new THREE.Vector3(-0.22, 3.55, 0),
          new THREE.Vector3(0, 3.95, 0),
          new THREE.Vector3(0.22, 3.55, 0)
        ], color));
        group.add(makeLine([
          new THREE.Vector3(-0.22, -3.55, 0),
          new THREE.Vector3(0, -3.95, 0),
          new THREE.Vector3(0.22, -3.55, 0)
        ], color));
      }
    }

    function createFocalMarker(color = 0xffffff) {
      const g = new THREE.Group();
      const size = 0.22;
      g.add(makeLine([
        new THREE.Vector3(-size, 0, 0),
        new THREE.Vector3(0, size, 0),
        new THREE.Vector3(size, 0, 0),
        new THREE.Vector3(0, -size, 0),
        new THREE.Vector3(-size, 0, 0)
      ], color));
      return g;
    }

    function createBenchGroup() {
      const g = new THREE.Group();
      const axis = makeLine(
        [new THREE.Vector3(WORLD.left, 0, 0), new THREE.Vector3(WORLD.right, 0, 0)],
        0xffffff,
        true,
        0.95,
        0.45,
        0.25
      );
      g.add(axis);
      return g;
    }

    const leftRoot = new THREE.Group();
    leftRoot.position.x = 0;
    scene.add(leftRoot);

    const rightRoot = new THREE.Group();
    rightRoot.position.x = 0;
    scene.add(rightRoot);

    function createViewportObjects(root, objectColor, imageColor) {
      const bench = createBenchGroup();
      const lens = createLensGroup();
      const objectArrow = createArrowGroup(objectColor);
      const imageArrow = createArrowGroup(imageColor);
      const rays = new THREE.Group();
      const f1 = createFocalMarker(0xffffff);
      const f2 = createFocalMarker(0xffffff);

      root.add(bench, lens, objectArrow, imageArrow, rays, f1, f2);

      return { bench, lens, objectArrow, imageArrow, rays, f1, f2 };
    }

    const p1 = createViewportObjects(leftRoot, 0xff3333, 0x3388ff);
    const p2 = createViewportObjects(rightRoot, 0x33dd66, 0xffdd33);

    function signedFocal() {
      const absf = Math.max(1, parseFloat(focalSliderEl.value) || 3);
      return lensTypeEl.value === 'convex' ? absf : -absf;
    }

    function computeImage(objectX, f) {
      const doVal = Math.abs(objectX);
      let di;

      const invf = 1 / f;
      const invdo = 1 / doVal;
      const denom = invf - invdo;

      if (Math.abs(denom) < EPS) {
        di = denom >= 0 ? 1e6 : -1e6;
      } else {
        di = 1 / denom;
      }

      if (!Number.isFinite(di)) di = di >= 0 ? 1e6 : -1e6;

      let m = -di / doVal;
      if (!Number.isFinite(m)) m = 0;

      const hi = m * OBJECT_HEIGHT;
      return {
        doVal,
        di,
        m,
        hi,
        real: di > 0
      };
    }

    function clearGroup(group) {
      while (group.children.length) {
        const c = group.children.pop();
        if (c.geometry) c.geometry.dispose();
        if (c.material) c.material.dispose();
      }
    }

    function lensIntersectionY(objX, objTipY) {
      const x1 = objX;
      const y1 = objTipY;
      const x2 = 0;
      if (Math.abs(x2 - x1) < EPS) return y1;
      return y1 + (0 - x1) * (0 - y1) / (0 - x1); // simplifies to y1, but keep form consistent
    }

    function lineYAtX(x1, y1, x2, y2, x) {
      const dx = x2 - x1;
      if (Math.abs(dx) < EPS) return y2;
      const t = (x - x1) / dx;
      return y1 + t * (y2 - y1);
    }

    function addRaySegment(group, a, b, color, dashed=false, opacity=0.6) {
      group.add(makeLine([a, b], color, dashed, opacity, 0.28, 0.18));
    }

    function buildRays(rayGroup, objX, objH, imgX, imgH, f, objectColor, isReal) {
      clearGroup(rayGroup);

      const objTip = new THREE.Vector3(objX, objH, 0);
      const lensCenter = new THREE.Vector3(0, 0, 0);
      const imageTip = new THREE.Vector3(imgX, imgH, 0);

      const xFarFocus = f;
      const xNearFocus = -f;

      // Ray 1: parallel to axis, then through far focal point / diverges as from far focal point
      const yLens1 = objH;
      const hit1 = new THREE.Vector3(0, yLens1, 0);
      addRaySegment(rayGroup, objTip, hit1, objectColor, false, 0.65);

      if (isReal) {
        const endX = Math.min(WORLD.right, Math.max(imgX, 8));
        const endY = lineYAtX(hit1.x, hit1.y, xFarFocus, 0, endX);
        addRaySegment(rayGroup, hit1, new THREE.Vector3(endX, endY, 0), objectColor, false, 0.65);
      } else {
        const endX = WORLD.right;
        const endY = lineYAtX(hit1.x, hit1.y, xFarFocus, 0, endX);
        addRaySegment(rayGroup, hit1, new THREE.Vector3(endX, endY, 0), objectColor, false, 0.65);

        const backX = Math.max(WORLD.left, imgX - 2);
        const backY = lineYAtX(hit1.x, hit1.y, xFarFocus, 0, backX);
        addRaySegment(rayGroup, hit1, new THREE.Vector3(backX, backY, 0), objectColor, true, 0.35);
      }

      // Ray 2: aimed through near focal point before lens, emerges parallel
      const hit2Y = lineYAtX(objX, objH, xNearFocus, 0, 0);
      const hit2 = new THREE.Vector3(0, hit2Y, 0);
      addRaySegment(rayGroup, objTip, hit2, objectColor, false, 0.65);

      if (isReal) {
        addRaySegment(rayGroup, hit2, new THREE.Vector3(WORLD.right, hit2Y, 0), objectColor, false, 0.65);
      } else {
        addRaySegment(rayGroup, hit2, new THREE.Vector3(WORLD.right, hit2Y, 0), objectColor, false, 0.65);
        addRaySegment(rayGroup, hit2, new THREE.Vector3(WORLD.left, hit2Y, 0), objectColor, true, 0.35);
      }

      // Ray 3: through center, undeviated
      if (isReal) {
        const endX = Math.min(WORLD.right, Math.max(imgX, 8));
        const endY = lineYAtX(objX, objH, 0, 0, endX);
        addRaySegment(rayGroup, objTip, new THREE.Vector3(endX, endY, 0), objectColor, false, 0.65);
      } else {
        addRaySegment(rayGroup, objTip, new THREE.Vector3(WORLD.right, lineYAtX(objX, objH, 0, 0, WORLD.right), 0), objectColor, false, 0.65);
        addRaySegment(rayGroup, lensCenter, new THREE.Vector3(WORLD.left, lineYAtX(objX, objH, 0, 0, WORLD.left), 0), objectColor, true, 0.35);
      }
    }

    function updateViewport(view, objX, objectColor, imageColor) {
      const f = signedFocal();
      const result = computeImage(objX, f);

      rebuildLens(view.lens, lensTypeEl.value);

      view.f1.position.set(f, 0, 0);
      view.f2.position.set(-f, 0, 0);

      rebuildArrow(view.objectArrow, objX, OBJECT_HEIGHT, objectColor, false, 1);

      const virtualStyle = result.di < 0;
      rebuildArrow(
        view.imageArrow,
        result.di,
        result.hi,
        imageColor,
        virtualStyle,
        virtualStyle ? 0.45 : 1
      );

      buildRays(view.rays, objX, OBJECT_HEIGHT, result.di, result.hi, f, objectColor, result.real);

      return result;
    }

    function updateAll() {
      state.lens_type = lensTypeEl.value;
      state.focal_abs = parseFloat(focalSliderEl.value) || 3;
      focalLabelEl.textContent = `Focal Length: ${state.focal_abs.toFixed(1)}`;

      const p1Res = updateViewport(p1, state.p1_obj_x, 0xff3333, 0x3388ff);
      const p2Res = updateViewport(p2, state.p2_obj_x, 0x33dd66, 0xffdd33);

      hud.textContent =
        `Player 1: do=${p1Res.doVal.toFixed(2)}, di=${p1Res.di.toFixed(2)}, m=${p1Res.m.toFixed(2)} | ` +
        `Player 2: do=${p2Res.doVal.toFixed(2)}, di=${p2Res.di.toFixed(2)}, m=${p2Res.m.toFixed(2)}`;

      window.__3D_STATE__ = {
        p1_do: +p1Res.doVal.toFixed(6),
        p1_di: +p1Res.di.toFixed(6),
        p1_mag: +p1Res.m.toFixed(6),
        p1_obj_x: +state.p1_obj_x.toFixed(6),
        p2_do: +p2Res.doVal.toFixed(6),
        p2_di: +p2Res.di.toFixed(6),
        p2_mag: +p2Res.m.toFixed(6),
        p2_obj_x: +state.p2_obj_x.toFixed(6),
        focal_length: +(signedFocal().toFixed(6)),
        lens_type: state.lens_type,
        p1_image_real: !!p1Res.real,
        p2_image_real: !!p2Res.real,
        ray_count_p1: 3,
        ray_count_p2: 3,
        p1_image_height: +p1Res.hi.toFixed(6),
        p2_image_height: +p2Res.hi.toFixed(6)
      };
    }

    function resetAll() {
      state.p1_obj_x = -8;
      state.p2_obj_x = -6;
      lensTypeEl.value = 'convex';
      focalSliderEl.value = '3.0';
      updateAll();
    }

    function swapObjects() {
      const t = state.p1_obj_x;
      state.p1_obj_x = state.p2_obj_x;
      state.p2_obj_x = t;
      updateAll();
    }

    function clampObjX(x) {
      return Math.max(MIN_X, Math.min(MAX_X, x));
    }

    window.addEventListener('keydown', (e) => {
      let handled = true;
      switch (e.key) {
        case 'a':
        case 'A':
          state.p1_obj_x = clampObjX(state.p1_obj_x - MOVE_STEP);
          break;
        case 'd':
        case 'D':
          state.p1_obj_x = clampObjX(state.p1_obj_x + MOVE_STEP);
          break;
        case 'ArrowLeft':
          state.p2_obj_x = clampObjX(state.p2_obj_x - MOVE_STEP);
          break;
        case 'ArrowRight':
          state.p2_obj_x = clampObjX(state.p2_obj_x + MOVE_STEP);
          break;
        default:
          handled = false;
      }
      if (handled) {
        e.preventDefault();
        updateAll();
      }
    }, { passive: false });

    lensTypeEl.addEventListener('change', updateAll);
    focalSliderEl.addEventListener('input', updateAll);
    resetBtn.addEventListener('click', resetAll);
    swapBtn.addEventListener('click', swapObjects);

    function resize() {
      const width = window.innerWidth;
      const topUI = document.getElementById('ui').offsetHeight;
      const height = window.innerHeight - topUI;
      container.style.top = topUI + 'px';

      renderer.setSize(width, height);

      cameraLeft.left = WORLD.left;
      cameraLeft.right = WORLD.right;
      cameraLeft.top = WORLD.top;
      cameraLeft.bottom = WORLD.bottom;
      cameraLeft.updateProjectionMatrix();

      cameraRight.left = WORLD.left;
      cameraRight.right = WORLD.right;
      cameraRight.top = WORLD.top;
      cameraRight.bottom = WORLD.bottom;
      cameraRight.updateProjectionMatrix();
    }

    function render() {
      requestAnimationFrame(render);

      const width = renderer.domElement.width;
      const height = renderer.domElement.height;
      const cssWidth = renderer.domElement.clientWidth;
      const cssHeight = renderer.domElement.clientHeight;
      const halfCssW = Math.floor(cssWidth / 2);

      renderer.setClearColor(BG_COLOR, 1);
      renderer.clear();

      // LEFT viewport
      leftRoot.visible = true;
      rightRoot.visible = false;
      renderer.setViewport(0, 0, Math.floor(width / 2), height);
      renderer.setScissor(0, 0, Math.floor(width / 2), height);
      renderer.render(scene, cameraLeft);

      // RIGHT viewport
      leftRoot.visible = false;
      rightRoot.visible = true;
      renderer.setViewport(Math.floor(width / 2), 0, Math.ceil(width / 2), height);
      renderer.setScissor(Math.floor(width / 2), 0, Math.ceil(width / 2), height);
      renderer.render(scene, cameraRight);

      leftRoot.visible = true;
      rightRoot.visible = true;

      // Divider overlay via canvas clear is omitted; use DOM border-like visual:
      // optional separator line drawn in screen space not needed for correctness.
    }

    window.addEventListener('resize', resize);

    resize();
    resetAll();
    render();
  </script>
</body>
</html>
