<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thin Lens Optics Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: rgba(15, 15, 30, 0.85);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #333;
        }
        #hud {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            letter-spacing: 0.5px;
        }
        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        select, input[type="range"], button {
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            background: #2a2a4e;
            color: white;
            border: 1px solid #555;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover, select:hover {
            background: #3a3a6e;
        }
        input[type="range"] {
            vertical-align: middle;
            cursor: ew-resize;
        }
        .instructions {
            font-size: 12px;
            color: #aaa;
            margin-top: -5px;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #divider {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #333;
            z-index: 5;
            transform: translateX(-50%);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="ui-container">
    <div id="hud">Player 1: do=0.00, di=0.00, m=0.00 | Player 2: do=0.00, di=0.00, m=0.00</div>
    <div class="controls">
        <select id="lensType">
            <option value="convex">Convex</option>
            <option value="concave">Concave</option>
        </select>
        <label>
            <span id="focalLabel">Focal Length: 3.0</span>
            <input type="range" id="focalSlider" min="1.0" max="8.0" step="0.1" value="3.0">
        </label>
        <button id="resetBtn">Reset All</button>
        <button id="swapBtn">Swap Objects</button>
    </div>
    <div class="instructions">P1 (Left): 'A' / 'D' keys to move | P2 (Right): Left / Right Arrow keys to move</div>
</div>

<div id="divider"></div>
<div id="canvas-container"></div>

<script>
    // --- State Management ---
    window.__3D_STATE__ = {
        p1_do: 8, p1_di: 0, p1_mag: 0, p1_obj_x: -8,
        p2_do: 6, p2_di: 0, p2_mag: 0, p2_obj_x: -6,
        focal_length: 3.0,
        lens_type: 'convex',
        p1_image_real: true, p2_image_real: true,
        ray_count_p1: 3, ray_count_p2: 3,
        p1_image_height: 0, p2_image_height: 0
    };

    const OBJ_HEIGHT = 2.0;
    const COLOR_P1_OBJ = 0xff4444; // Red
    const COLOR_P1_IMG = 0x4444ff; // Blue
    const COLOR_P2_OBJ = 0x44ff44; // Green
    const COLOR_P2_IMG = 0xffff44; // Yellow
    const COLOR_LENS = 0x00ffff;   // Cyan
    const COLOR_AXIS = 0xffffff;

    // --- Three.js Setup ---
    const container = document.getElementById('canvas-container');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x1a1a2e);
    renderer.setScissorTest(true);
    container.appendChild(renderer.domElement);

    const scene1 = new THREE.Scene();
    const scene2 = new THREE.Scene();

    // Cameras: Fixed horizontal view range [-14, 14] to ensure objects are visible
    const viewSizeX = 28; 
    let aspect = (window.innerWidth / 2) / window.innerHeight;
    let viewSizeY = viewSizeX / aspect;

    const camera1 = new THREE.OrthographicCamera(-viewSizeX/2, viewSizeX/2, viewSizeY/2, -viewSizeY/2, 0.1, 100);
    camera1.position.z = 10;
    const camera2 = new THREE.OrthographicCamera(-viewSizeX/2, viewSizeX/2, viewSizeY/2, -viewSizeY/2, 0.1, 100);
    camera2.position.z = 10;

    // Groups for dynamic content
    const dynamicGroup1 = new THREE.Group();
    const dynamicGroup2 = new THREE.Group();
    scene1.add(dynamicGroup1);
    scene2.add(dynamicGroup2);

    // Static Elements (Axis)
    function createAxis() {
        const geo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-20, 0, 0), new THREE.Vector3(20, 0, 0)
        ]);
        const mat = new THREE.LineDashedMaterial({ color: COLOR_AXIS, dashSize: 0.5, gapSize: 0.5 });
        const line = new THREE.Line(geo, mat);
        line.computeLineDistances();
        return line;
    }
    scene1.add(createAxis());
    scene2.add(createAxis());

    // --- Geometry Helpers ---
    function createLine(x1, y1, x2, y2, color, isDashed = false, opacity = 1.0) {
        const geo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(x1, y1, 0), new THREE.Vector3(x2, y2, 0)
        ]);
        const mat = isDashed 
            ? new THREE.LineDashedMaterial({ color, dashSize: 0.3, gapSize: 0.3, transparent: opacity < 1, opacity })
            : new THREE.LineBasicMaterial({ color, transparent: opacity < 1, opacity });
        const line = new THREE.Line(geo, mat);
        if (isDashed) line.computeLineDistances();
        return line;
    }

    function createArrow(x, y_base, y_tip, color, isDashed = false) {
        const group = new THREE.Group();
        group.add(createLine(x, y_base, x, y_tip, color, isDashed));
        
        const headSize = 0.6;
        const sign = Math.sign(y_tip - y_base) || 1;
        const headGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(x, y_tip, 0),
            new THREE.Vector3(x - headSize/2, y_tip - sign*headSize, 0),
            new THREE.Vector3(x + headSize/2, y_tip - sign*headSize, 0),
            new THREE.Vector3(x, y_tip, 0)
        ]);
        const headMat = new THREE.LineBasicMaterial({ color, transparent: isDashed, opacity: isDashed ? 0.5 : 1.0 });
        group.add(new THREE.Line(headGeo, headMat));
        return group;
    }

    function createLensMarker(f) {
        const group = new THREE.Group();
        const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const geo = new THREE.CircleGeometry(0.15, 16);
        
        const f1 = new THREE.Mesh(geo, mat); f1.position.set(f, 0, 0);
        const f2 = new THREE.Mesh(geo, mat); f2.position.set(-f, 0, 0);
        group.add(f1, f2);

        // Lens body
        group.add(createLine(0, -6, 0, 6, COLOR_LENS));
        
        // Lens arrows
        const isConvex = f > 0;
        const dir = isConvex ? -1 : 1;
        const arrowMat = new THREE.LineBasicMaterial({ color: COLOR_LENS });
        
        const topArrow = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0.5 * dir, 5.5, 0), new THREE.Vector3(0, 6, 0), new THREE.Vector3(-0.5 * dir, 5.5, 0)
        ]);
        const botArrow = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0.5 * dir, -5.5, 0), new THREE.Vector3(0, -6, 0), new THREE.Vector3(-0.5 * dir, -5.5, 0)
        ]);
        
        group.add(new THREE.Line(topArrow, arrowMat));
        group.add(new THREE.Line(botArrow, arrowMat));

        return group;
    }

    // --- Physics & Rendering Logic ---
    function updateSimulation() {
        const state = window.__3D_STATE__;
        const f = state.lens_type === 'convex' ? state.focal_length : -state.focal_length;
        
        // Calculate Physics
        const calcPhysics = (x_obj) => {
            const do_val = Math.abs(x_obj);
            let di_val, m_val;
            
            if (Math.abs(do_val - f) < 0.001) {
                di_val = 10000 * Math.sign(f); // Avoid Infinity/NaN for rendering
                m_val = -di_val / do_val;
            } else {
                di_val = (f * do_val) / (do_val - f);
                m_val = -di_val / do_val;
            }
            return { do: do_val, di: di_val, m: m_val, h_img: m_val * OBJ_HEIGHT, isReal: di_val > 0 };
        };

        const p1 = calcPhysics(state.p1_obj_x);
        const p2 = calcPhysics(state.p2_obj_x);

        // Update State
        state.p1_do = p1.do; state.p1_di = p1.di; state.p1_mag = p1.m; 
        state.p1_image_real = p1.isReal; state.p1_image_height = p1.h_img;
        
        state.p2_do = p2.do; state.p2_di = p2.di; state.p2_mag = p2.m;
        state.p2_image_real = p2.isReal; state.p2_image_height = p2.h_img;

        // Update HUD
        const format = (val) => Math.abs(val) > 1000 ? '∞' : val.toFixed(2);
        document.getElementById('hud').innerText = 
            `Player 1: do=${format(state.p1_do)}, di=${format(state.p1_di)}, m=${format(state.p1_mag)} | ` +
            `Player 2: do=${format(state.p2_do)}, di=${format(state.p2_di)}, m=${format(state.p2_mag)}`;

        // Rebuild Scenes
        buildScene(dynamicGroup1, state.p1_obj_x, p1, f, COLOR_P1_OBJ, COLOR_P1_IMG);
        buildScene(dynamicGroup2, state.p2_obj_x, p2, f, COLOR_P2_OBJ, COLOR_P2_IMG);
    }

    function buildScene(group, x_obj, phys, f, colorObj, colorImg) {
        // Clear old
        while(group.children.length > 0){ 
            const child = group.children[0];
            group.remove(child); 
            if(child.geometry) child.geometry.dispose();
            if(child.material) child.material.dispose();
        }

        // Add Lens & Focal points
        group.add(createLensMarker(f));

        // Add Object
        group.add(createArrow(x_obj, 0, OBJ_HEIGHT, colorObj, false));

        // Add Image
        if (Math.abs(phys.di) < 1000) {
            group.add(createArrow(phys.di, 0, phys.h_img, colorImg, !phys.isReal));
        }

        // Draw Rays
        const rayOpacity = 0.5;
        const extX = 20; // Extrapolation distance

        // Ray 1: Parallel -> Focal
        group.add(createLine(x_obj, OBJ_HEIGHT, 0, OBJ_HEIGHT, colorObj, false, rayOpacity));
        const m1 = -OBJ_HEIGHT / f;
        group.add(createLine(0, OBJ_HEIGHT, extX, m1 * extX + OBJ_HEIGHT, colorObj, false, rayOpacity));
        if (!phys.isReal && Math.abs(phys.di) < 1000) {
            group.add(createLine(0, OBJ_HEIGHT, phys.di, phys.h_img, colorObj, true, rayOpacity));
        }

        // Ray 2: Focal -> Parallel
        const m2 = OBJ_HEIGHT / (f + x_obj);
        const y_lens2 = OBJ_HEIGHT - m2 * x_obj;
        group.add(createLine(x_obj, OBJ_HEIGHT, 0, y_lens2, colorObj, false, rayOpacity));
        group.add(createLine(0, y_lens2, extX, y_lens2, colorObj, false, rayOpacity));
        if (!phys.isReal && Math.abs(phys.di) < 1000) {
            group.add(createLine(0, y_lens2, phys.di, phys.h_img, colorObj, true, rayOpacity));
        }

        // Ray 3: Center
        const m3 = OBJ_HEIGHT / x_obj;
        group.add(createLine(x_obj, OBJ_HEIGHT, 0, 0, colorObj, false, rayOpacity));
        group.add(createLine(0, 0, extX, m3 * extX, colorObj, false, rayOpacity));
        if (!phys.isReal && Math.abs(phys.di) < 1000) {
            group.add(createLine(0, 0, phys.di, phys.h_img, colorObj, true, rayOpacity));
        }
    }

    // --- UI & Interactions ---
    const uiLensType = document.getElementById('lensType');
    const uiFocalSlider = document.getElementById('focalSlider');
    const uiFocalLabel = document.getElementById('focalLabel');

    uiLensType.addEventListener('change', (e) => {
        window.__3D_STATE__.lens_type = e.target.value;
        if (e.target.value === 'concave' && window.__3D_STATE__.focal_length > 0) {
            // Keep magnitude, logic handles sign
        }
        updateSimulation();
    });

    uiFocalSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        window.__3D_STATE__.focal_length = val;
        uiFocalLabel.innerText = `Focal Length: ${val.toFixed(1)}`;
        updateSimulation();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        window.__3D_STATE__.p1_obj_x = -8;
        window.__3D_STATE__.p2_obj_x = -6;
        window.__3D_STATE__.lens_type = 'convex';
        window.__3D_STATE__.focal_length = 3.0;
        uiLensType.value = 'convex';
        uiFocalSlider.value = 3.0;
        uiFocalLabel.innerText = `Focal Length: 3.0`;
        updateSimulation();
    });

    document.getElementById('swapBtn').addEventListener('click', () => {
        const temp = window.__3D_STATE__.p1_obj_x;
        window.__3D_STATE__.p1_obj_x = window.__3D_STATE__.p2_obj_x;
        window.__3D_STATE__.p2_obj_x = temp;
        updateSimulation();
    });

    window.addEventListener('keydown', (e) => {
        const state = window.__3D_STATE__;
        const step = 0.5;
        let changed = false;

        if (e.key === 'a' || e.key === 'A') { state.p1_obj_x = Math.max(-12, state.p1_obj_x - step); changed = true; }
        if (e.key === 'd' || e.key === 'D') { state.p1_obj_x = Math.min(-0.5, state.p1_obj_x + step); changed = true; }
        
        if (e.key === 'ArrowLeft') { state.p2_obj_x = Math.max(-12, state.p2_obj_x - step); changed = true; }
        if (e.key === 'ArrowRight') { state.p2_obj_x = Math.min(-0.5, state.p2_obj_x + step); changed = true; }

        if (changed) updateSimulation();
    });

    window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        renderer.setSize(w, h);
        
        aspect = (w / 2) / h;
        viewSizeY = viewSizeX / aspect;
        
        camera1.left = -viewSizeX / 2; camera1.right = viewSizeX / 2;
        camera1.top = viewSizeY / 2; camera1.bottom = -viewSizeY / 2;
        camera1.updateProjectionMatrix();
        
        camera2.left = -viewSizeX / 2; camera2.right = viewSizeX / 2;
        camera2.top = viewSizeY / 2; camera2.bottom = -viewSizeY / 2;
        camera2.updateProjectionMatrix();
    });

    // --- Render Loop ---
    function animate() {
        requestAnimationFrame(animate);
        
        const w = window.innerWidth;
        const h = window.innerHeight;
        const halfW = Math.floor(w / 2);

        // Render Player 1 (Left)
        renderer.setViewport(0, 0, halfW, h);
        renderer.setScissor(0, 0, halfW, h);
        renderer.render(scene1, camera1);

        // Render Player 2 (Right)
        renderer.setViewport(halfW, 0, w - halfW, h);
        renderer.setScissor(halfW, 0, w - halfW, h);
        renderer.render(scene2, camera2);
    }

    // Initialize
    updateSimulation();
    animate();

</script>
</body>
</html>
