<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Magnetic Field Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(26, 26, 46, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: auto;
            user-select: none;
            min-width: 200px;
        }
        .ui-row {
            margin-bottom: 8px;
            font-size: 14px;
        }
        .btn-group {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        button {
            background: #2a2a4a;
            color: white;
            border: 1px solid #4a4a7a;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        button:hover {
            background: #3a3a6a;
        }
        button:active {
            background: #1a1a3a;
        }
        .controls-help {
            margin-top: 15px;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #444;
            padding-top: 8px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel">
        <div class="ui-row">Magnets: <span id="magnetCount">1</span>/5</div>
        <div class="ui-row">History: <span id="historyCount">0</span> actions</div>
        <div class="ui-row">Selected: <span id="selectedInfo">none</span></div>
        <div class="ui-row">Field Lines: <span id="fieldStatus">visible</span></div>
        
        <div class="btn-group">
            <button id="addMagnetBtn">Add Magnet</button>
            <button id="undoBtn">Undo</button>
            <button id="redoBtn">Redo</button>
            <button id="toggleFieldBtn">Toggle Field Lines</button>
        </div>

        <div class="controls-help">
            Click: Select<br>
            WASD: Move selected<br>
            Left/Right: Rotate selected<br>
            Del/Backspace: Remove selected<br>
            Ctrl+Z/Y: Undo/Redo
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Grid
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // --- App State ---
        let magnets = [];
        let selectedMagnet = null;
        let magnetIdCounter = 1;
        let fieldLinesVisible = true;
        const fieldLinesGroup = new THREE.Group();
        scene.add(fieldLinesGroup);

        let undoStack = [];
        let redoStack = [];
        let lastActionString = 'none';

        // --- Magnet Creation ---
        const magnetGeo = new THREE.BoxGeometry(0.75, 0.5, 0.5);
        const northMat = new THREE.MeshLambertMaterial({ color: 0xff3333 });
        const southMat = new THREE.MeshLambertMaterial({ color: 0x3333ff });
        const outlineGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.5, 0.5, 0.5));
        const outlineMat = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 2 });

        function createMagnet(x, z, rotY) {
            const group = new THREE.Group();
            
            const north = new THREE.Mesh(magnetGeo, northMat);
            north.position.set(0.375, 0, 0);
            
            const south = new THREE.Mesh(magnetGeo, southMat);
            south.position.set(-0.375, 0, 0);
            
            const outline = new THREE.LineSegments(outlineGeo, outlineMat);
            outline.visible = false;
            outline.raycast = function() {}; // Ignore raycasting on outline

            group.add(north);
            group.add(south);
            group.add(outline);

            group.position.set(x, 0.25, z);
            group.rotation.y = rotY;
            
            group.userData = { 
                id: magnetIdCounter++, 
                isMagnet: true,
                outline: outline
            };

            return group;
        }

        // Initialize first magnet
        const initialMagnet = createMagnet(0, 0, 0);
        scene.add(initialMagnet);
        magnets.push(initialMagnet);

        // --- Field Line Calculation ---
        function calculateB(p) {
            let B = new THREE.Vector3(0, 0, 0);
            for (let mag of magnets) {
                let m = new THREE.Vector3(1, 0, 0);
                m.applyQuaternion(mag.quaternion);

                let r_vec = new THREE.Vector3().subVectors(p, mag.position);
                let r = r_vec.length();
                if (r < 0.1) continue;

                let r_hat = r_vec.clone().normalize();
                let dotProduct = m.dot(r_hat);

                let term1 = r_hat.clone().multiplyScalar(3 * dotProduct);
                let b_mag = term1.sub(m).divideScalar(Math.pow(r, 3));
                B.add(b_mag);
            }
            return B;
        }

        function updateFieldLines() {
            // Clear existing lines
            while(fieldLinesGroup.children.length > 0){ 
                const child = fieldLinesGroup.children[0];
                fieldLinesGroup.remove(child); 
                child.geometry.dispose();
                child.material.dispose();
            }

            if (!fieldLinesVisible || magnets.length === 0) {
                updateGlobalState();
                return;
            }

            const stepSize = 0.3;
            const maxSteps = 100;

            const startPointsLocal = [
                new THREE.Vector3(0.75, 0.2, 0.2),
                new THREE.Vector3(0.75, 0.2, -0.2),
                new THREE.Vector3(0.75, -0.2, 0.2),
                new THREE.Vector3(0.75, -0.2, -0.2),
                new THREE.Vector3(0.75, 0.2, 0),
                new THREE.Vector3(0.75, -0.2, 0),
                new THREE.Vector3(0.75, 0, 0.2),
                new THREE.Vector3(0.75, 0, -0.2)
            ];

            magnets.forEach(mag => {
                startPointsLocal.forEach(localPt => {
                    let p = localPt.clone();
                    p.applyMatrix4(mag.matrixWorld);

                    let points = [p.clone()];
                    let colors = [1, 0, 0]; // Start Red

                    for (let i = 0; i < maxSteps; i++) {
                        let B = calculateB(p);
                        if (B.lengthSq() < 1e-8) break;

                        let dir = B.normalize();
                        p.add(dir.multiplyScalar(stepSize));
                        points.push(p.clone());

                        let t = (i + 1) / maxSteps;
                        colors.push(1 - t, 0, t); // Gradient to Blue

                        // Stop if near any south pole
                        let nearSouth = false;
                        for (let m of magnets) {
                            let southPos = new THREE.Vector3(-0.75, 0, 0);
                            southPos.applyMatrix4(m.matrixWorld);
                            if (p.distanceTo(southPos) < 0.4) {
                                nearSouth = true;
                                break;
                            }
                        }
                        if (nearSouth) break;
                    }

                    if (points.length > 1) {
                        const geo = new THREE.BufferGeometry().setFromPoints(points);
                        geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                        const mat = new THREE.LineBasicMaterial({ 
                            vertexColors: true, 
                            transparent: true, 
                            opacity: 0.6 
                        });
                        const line = new THREE.Line(geo, mat);
                        fieldLinesGroup.add(line);
                    }
                });
            });
            updateGlobalState();
        }

        // --- Interaction & State Logic ---
        function selectMagnet(magnet) {
            if (selectedMagnet) {
                selectedMagnet.userData.outline.visible = false;
            }
            selectedMagnet = magnet;
            if (selectedMagnet) {
                selectedMagnet.userData.outline.visible = true;
            }
            updateGlobalState();
        }

        function commitAction(type, magnet, oldState, newState) {
            undoStack.push({ type, magnet, oldState, newState });
            redoStack = [];
            lastActionString = type;
            updateFieldLines();
        }

        function applyState(magnet, state) {
            magnet.position.set(state.x, 0.25, state.z);
            magnet.rotation.y = state.rot;
        }

        function getState(magnet) {
            return { x: magnet.position.x, z: magnet.position.z, rot: magnet.rotation.y };
        }

        function performUndo() {
            if (undoStack.length === 0) return;
            const action = undoStack.pop();
            
            if (action.type === 'add') {
                scene.remove(action.magnet);
                magnets = magnets.filter(m => m !== action.magnet);
                if (selectedMagnet === action.magnet) selectMagnet(null);
            } else if (action.type === 'delete') {
                scene.add(action.magnet);
                magnets.push(action.magnet);
            } else if (action.type === 'move' || action.type === 'rotate') {
                applyState(action.magnet, action.oldState);
            }

            redoStack.push(action);
            lastActionString = 'undo';
            updateFieldLines();
        }

        function performRedo() {
            if (redoStack.length === 0) return;
            const action = redoStack.pop();

            if (action.type === 'add') {
                scene.add(action.magnet);
                magnets.push(action.magnet);
            } else if (action.type === 'delete') {
                scene.remove(action.magnet);
                magnets = magnets.filter(m => m !== action.magnet);
                if (selectedMagnet === action.magnet) selectMagnet(null);
            } else if (action.type === 'move' || action.type === 'rotate') {
                applyState(action.magnet, action.newState);
            }

            undoStack.push(action);
            lastActionString = 'redo';
            updateFieldLines();
        }

        // --- Event Listeners ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName === 'BUTTON') return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(magnets, true);

            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while (obj.parent && !obj.userData.isMagnet) {
                    obj = obj.parent;
                }
                if (obj.userData.isMagnet) {
                    selectMagnet(obj);
                }
            } else {
                selectMagnet(null);
            }
        });

        window.addEventListener('keydown', (event) => {
            // Undo/Redo
            if (event.ctrlKey || event.metaKey) {
                if (event.key === 'z' || event.key === 'Z') {
                    performUndo();
                    return;
                }
                if (event.key === 'y' || event.key === 'Y') {
                    performRedo();
                    return;
                }
            }

            if (!selectedMagnet) return;

            const oldState = getState(selectedMagnet);
            let changed = false;
            let type = 'move';

            switch(event.key) {
                case 'w': case 'W': selectedMagnet.position.z -= 1; changed = true; break;
                case 's': case 'S': selectedMagnet.position.z += 1; changed = true; break;
                case 'a': case 'A': selectedMagnet.position.x -= 1; changed = true; break;
                case 'd': case 'D': selectedMagnet.position.x += 1; changed = true; break;
                case 'ArrowLeft': 
                    selectedMagnet.rotation.y += Math.PI / 12; 
                    changed = true; 
                    type = 'rotate';
                    break;
                case 'ArrowRight': 
                    selectedMagnet.rotation.y -= Math.PI / 12; 
                    changed = true; 
                    type = 'rotate';
                    break;
                case 'Delete': case 'Backspace':
                    if (magnets.length > 1) {
                        const magToDelete = selectedMagnet;
                        scene.remove(magToDelete);
                        magnets = magnets.filter(m => m !== magToDelete);
                        selectMagnet(null);
                        commitAction('delete', magToDelete, null, null);
                    }
                    return;
            }

            if (changed) {
                const newState = getState(selectedMagnet);
                commitAction(type, selectedMagnet, oldState, newState);
            }
        });

        document.getElementById('addMagnetBtn').addEventListener('click', () => {
            if (magnets.length >= 5) return;
            const x = (Math.random() - 0.5) * 10;
            const z = (Math.random() - 0.5) * 10;
            const newMag = createMagnet(x, z, 0);
            scene.add(newMag);
            magnets.push(newMag);
            selectMagnet(newMag);
            commitAction('add', newMag, null, null);
        });

        document.getElementById('undoBtn').addEventListener('click', performUndo);
        document.getElementById('redoBtn').addEventListener('click', performRedo);
        
        document.getElementById('toggleFieldBtn').addEventListener('click', () => {
            fieldLinesVisible = !fieldLinesVisible;
            fieldLinesGroup.visible = fieldLinesVisible;
            lastActionString = 'none';
            updateFieldLines();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- State Management & UI Sync ---
        function updateGlobalState() {
            window.__3D_STATE__ = {
                magnetCount: magnets.length,
                selectedMagnetId: selectedMagnet ? selectedMagnet.userData.id : -1,
                undoStackSize: undoStack.length,
                redoStackSize: redoStack.length,
                fieldLinesVisible: fieldLinesVisible,
                magnets: magnets.map(m => ({
                    id: m.userData.id,
                    x: Number(m.position.x.toFixed(2)),
                    y: Number(m.position.y.toFixed(2)),
                    z: Number(m.position.z.toFixed(2)),
                    rotationY: Number(m.rotation.y.toFixed(2))
                })),
                fieldLineCount: fieldLinesGroup.children.length,
                lastAction: lastActionString
            };

            // Update DOM UI
            document.getElementById('magnetCount').innerText = window.__3D_STATE__.magnetCount;
            document.getElementById('historyCount').innerText = window.__3D_STATE__.undoStackSize;
            document.getElementById('selectedInfo').innerText = selectedMagnet ? `Magnet-${selectedMagnet.userData.id}` : 'none';
            document.getElementById('fieldStatus').innerText = fieldLinesVisible ? 'visible' : 'hidden';
            
            document.getElementById('addMagnetBtn').disabled = magnets.length >= 5;
            document.getElementById('undoBtn').disabled = undoStack.length === 0;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        // Initial calculation
        updateFieldLines();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
