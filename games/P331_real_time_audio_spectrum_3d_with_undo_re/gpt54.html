<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D Audio Spectrum Visualizer with Undo/Redo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(10, 10, 20, 0.78);
      color: #ffffff;
      padding: 15px;
      border-radius: 10px;
      min-width: 250px;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      user-select: none;
    }

    #hud h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    #hud .row {
      margin: 8px 0;
      line-height: 1.4;
    }

    #hud button {
      margin: 4px 4px 4px 0;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      background: #2e3a59;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }

    #hud button:hover {
      background: #41527d;
    }

    #hud .label {
      color: #bfc7ff;
    }

    #hud .value {
      color: #ffffff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="hud">
    <h3>Visualizer Controls</h3>

    <div class="row">
      <span class="label">Color Scheme: </span>
      <span id="label-color-scheme" class="value">rainbow</span>
    </div>

    <div class="row">
      <span class="label">Height Multiplier: </span>
      <span id="label-height" class="value">5.0</span>
    </div>

    <div class="row">
      <span class="label">Undo Stack: </span>
      <span id="label-undo-count" class="value">0</span>
      &nbsp;|&nbsp;
      <span class="label">Redo Stack: </span>
      <span id="label-redo-count" class="value">0</span>
    </div>

    <div class="row">
      <button id="btn-increase-height">Increase Height</button>
      <button id="btn-decrease-height">Decrease Height</button>
    </div>

    <div class="row">
      <button id="btn-cycle-color">Cycle Color</button>
      <button id="btn-toggle-sim">Toggle Simulation</button>
    </div>

    <div class="row">
      <button id="btn-undo">Undo</button>
      <button id="btn-redo">Redo</button>
    </div>

    <div class="row" style="font-size:12px; opacity:0.85;">
      Ctrl+Z = Undo, Ctrl+Y = Redo, Space = Toggle Simulation
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const config = {
      heightMultiplier: 5.0,
      fishRotationSpeed: 0.5,
      colorScheme: "rainbow",
      barCount: 32,
      simulationActive: true
    };

    const undoStack = [];
    const redoStack = [];
    const MAX_HISTORY = 20;

    function cloneConfig(cfg) {
      return {
        heightMultiplier: cfg.heightMultiplier,
        fishRotationSpeed: cfg.fishRotationSpeed,
        colorScheme: cfg.colorScheme,
        barCount: cfg.barCount,
        simulationActive: cfg.simulationActive
      };
    }

    function pushUndoState() {
      undoStack.push(cloneConfig(config));
      if (undoStack.length > MAX_HISTORY) undoStack.shift();
      redoStack.length = 0;
    }

    function applyConfigState(newState) {
      config.heightMultiplier = newState.heightMultiplier;
      config.fishRotationSpeed = newState.fishRotationSpeed;
      config.colorScheme = newState.colorScheme;
      config.barCount = newState.barCount;
      config.simulationActive = newState.simulationActive;

      if (bars.length !== config.barCount) {
        rebuildBars(config.barCount);
      }

      applyBarColors();
      updateHUD();
    }

    function setConfigProperty(key, value) {
      if (config[key] === value) return;
      pushUndoState();
      config[key] = value;

      if (key === "barCount") {
        rebuildBars(config.barCount);
      }
      if (key === "colorScheme" || key === "barCount") {
        applyBarColors();
      }

      updateHUD();
    }

    function undo() {
      if (undoStack.length === 0) return;
      redoStack.push(cloneConfig(config));
      const previous = undoStack.pop();
      applyConfigState(previous);
    }

    function redo() {
      if (redoStack.length === 0) return;
      undoStack.push(cloneConfig(config));
      const next = redoStack.pop();
      applyConfigState(next);
    }

    const bars = [];
    const barGroup = new THREE.Group();
    scene.add(barGroup);

    function getHueRange(scheme) {
      switch (scheme) {
        case "cool":
          return [0.5, 0.75];
        case "warm":
          return [0.0, 0.15];
        case "rainbow":
        default:
          return [0.66, 0.0];
      }
    }

    function createBarMaterial(index, total) {
      const [h1, h2] = getHueRange(config.colorScheme);
      const t = total <= 1 ? 0 : index / (total - 1);
      const hue = THREE.MathUtils.lerp(h1, h2, t);
      const color = new THREE.Color().setHSL(hue, 0.9, 0.55);
      return new THREE.MeshStandardMaterial({
        color,
        roughness: 0.35,
        metalness: 0.15
      });
    }

    function rebuildBars(count) {
      while (barGroup.children.length > 0) {
        const child = barGroup.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      }
      bars.length = 0;

      const startX = -8;
      const endX = 8;
      const baseHeight = 0.1;
      const spacing = count > 1 ? (endX - startX) / (count - 1) : 0;

      for (let i = 0; i < count; i++) {
        const geometry = new THREE.BoxGeometry(0.4, 1, 0.4);
        const material = createBarMaterial(i, count);
        const bar = new THREE.Mesh(geometry, material);

        const x = startX + spacing * i;
        bar.position.set(x, baseHeight * 0.5, 0);
        bar.scale.set(1, baseHeight, 1);

        barGroup.add(bar);
        bars.push(bar);
      }
    }

    function applyBarColors() {
      for (let i = 0; i < bars.length; i++) {
        const [h1, h2] = getHueRange(config.colorScheme);
        const t = bars.length <= 1 ? 0 : i / (bars.length - 1);
        const hue = THREE.MathUtils.lerp(h1, h2, t);
        const color = new THREE.Color().setHSL(hue, 0.9, 0.55);
        bars[i].material.color.copy(color);
      }
    }

    rebuildBars(config.barCount);

    function simulateAudioData() {
      const time = performance.now() * 0.001;
      const data = [];
      for (let i = 0; i < config.barCount; i++) {
        data.push(Math.abs(Math.sin(time * (i + 1) * 0.1)));
      }
      return data;
    }

    let fishModel = null;
    let fishModelLoaded = false;
    const loader = new GLTFLoader();

    loader.load(
      "._BarramundiFish.glb",
      (gltf) => {
        fishModel = gltf.scene;
        fishModel.position.set(0, 3, 0);
        fishModel.scale.set(2, 2, 2);
        scene.add(fishModel);
        fishModelLoaded = true;
        window.__3D_STATE__.sceneReady = true;
        window.__3D_STATE__.fishModelLoaded = true;
      },
      undefined,
      (error) => {
        console.warn("Failed to load fish model:", error);
        fishModelLoaded = false;
        window.__3D_STATE__.sceneReady = true;
        window.__3D_STATE__.fishModelLoaded = false;
      }
    );

    const labelColorScheme = document.getElementById("label-color-scheme");
    const labelHeight = document.getElementById("label-height");
    const labelUndoCount = document.getElementById("label-undo-count");
    const labelRedoCount = document.getElementById("label-redo-count");

    document.getElementById("btn-increase-height").addEventListener("click", () => {
      const next = Math.min(10.0, config.heightMultiplier + 1.0);
      setConfigProperty("heightMultiplier", next);
    });

    document.getElementById("btn-decrease-height").addEventListener("click", () => {
      const next = Math.max(1.0, config.heightMultiplier - 1.0);
      setConfigProperty("heightMultiplier", next);
    });

    document.getElementById("btn-cycle-color").addEventListener("click", () => {
      const order = ["rainbow", "cool", "warm"];
      const idx = order.indexOf(config.colorScheme);
      const next = order[(idx + 1) % order.length];
      setConfigProperty("colorScheme", next);
    });

    document.getElementById("btn-toggle-sim").addEventListener("click", () => {
      setConfigProperty("simulationActive", !config.simulationActive);
    });

    document.getElementById("btn-undo").addEventListener("click", undo);
    document.getElementById("btn-redo").addEventListener("click", redo);

    window.addEventListener("keydown", (e) => {
      if (e.ctrlKey && (e.key === "z" || e.key === "Z")) {
        e.preventDefault();
        undo();
      } else if (e.ctrlKey && (e.key === "y" || e.key === "Y")) {
        e.preventDefault();
        redo();
      } else if (e.code === "Space") {
        e.preventDefault();
        setConfigProperty("simulationActive", !config.simulationActive);
      }
    });

    function updateHUD() {
      labelColorScheme.textContent = config.colorScheme;
      labelHeight.textContent = config.heightMultiplier.toFixed(1);
      labelUndoCount.textContent = String(undoStack.length);
      labelRedoCount.textContent = String(redoStack.length);
    }

    window.__3D_STATE__ = {
      sceneReady: false,
      barCount: config.barCount,
      heightMultiplier: config.heightMultiplier,
      fishRotationSpeed: config.fishRotationSpeed,
      colorScheme: config.colorScheme,
      simulationActive: config.simulationActive,
      undoStackSize: undoStack.length,
      redoStackSize: redoStack.length,
      fishY: 3,
      avgAmplitude: 0,
      fishModelLoaded: false,
      frameCount: 0,
      maxBarHeight: 0.1
    };

    updateHUD();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    let frozenAudioData = new Array(config.barCount).fill(0);

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      controls.update();

      let audioData;
      if (config.simulationActive) {
        audioData = simulateAudioData();
        frozenAudioData = audioData.slice();
      } else {
        if (frozenAudioData.length !== config.barCount) {
          frozenAudioData = new Array(config.barCount).fill(0);
        }
        audioData = frozenAudioData;
      }

      let sum = 0;
      let maxBarHeight = 0.1;
      const baseHeight = 0.1;

      for (let i = 0; i < bars.length; i++) {
        const audioValue = audioData[i] ?? 0;
        sum += audioValue;

        const scaleY = baseHeight + audioValue * config.heightMultiplier;
        bars[i].scale.y = scaleY;
        bars[i].position.y = scaleY * 0.5;
        if (scaleY > maxBarHeight) maxBarHeight = scaleY;
      }

      const avgAmplitude = bars.length > 0 ? sum / bars.length : 0;

      if (fishModel) {
        fishModel.rotation.y += config.fishRotationSpeed * dt;
        fishModel.position.y = 3 + avgAmplitude * 2;
      }

      window.__3D_STATE__.sceneReady = true;
      window.__3D_STATE__.barCount = config.barCount;
      window.__3D_STATE__.heightMultiplier = config.heightMultiplier;
      window.__3D_STATE__.fishRotationSpeed = config.fishRotationSpeed;
      window.__3D_STATE__.colorScheme = config.colorScheme;
      window.__3D_STATE__.simulationActive = config.simulationActive;
      window.__3D_STATE__.undoStackSize = undoStack.length;
      window.__3D_STATE__.redoStackSize = redoStack.length;
      window.__3D_STATE__.fishY = fishModel ? fishModel.position.y : 3;
      window.__3D_STATE__.avgAmplitude = avgAmplitude;
      window.__3D_STATE__.fishModelLoaded = fishModelLoaded;
      window.__3D_STATE__.frameCount += 1;
      window.__3D_STATE__.maxBarHeight = maxBarHeight;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
