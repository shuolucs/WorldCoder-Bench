<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Network Topology Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #aaccff;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(68, 136, 255, 0.3);
    border-radius: 12px;
    padding: 18px 22px;
    font-size: 14px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    min-width: 220px;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #hud h3 {
    color: #4488ff;
    margin-bottom: 8px;
    font-size: 16px;
    letter-spacing: 1px;
  }
  #hud .label {
    color: #667799;
    font-size: 12px;
  }
  #hud .value {
    color: #ffffff;
    font-weight: bold;
  }
  #resetBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 10px 22px;
    background: rgba(68, 136, 255, 0.2);
    border: 1px solid rgba(68, 136, 255, 0.5);
    color: #aaccff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.3s;
    z-index: 10;
    backdrop-filter: blur(10px);
  }
  #resetBtn:hover {
    background: rgba(68, 136, 255, 0.4);
    color: #ffffff;
    border-color: #4488ff;
    box-shadow: 0 0 15px rgba(68, 136, 255, 0.3);
  }
  #controls-help {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #556688;
    font-size: 12px;
    text-align: center;
    z-index: 10;
  }
  #controls-help span {
    margin: 0 10px;
    padding: 2px 8px;
    background: rgba(68, 136, 255, 0.1);
    border-radius: 4px;
    border: 1px solid rgba(68, 136, 255, 0.2);
  }
</style>
</head>
<body>

<div id="hud">
  <h3>⬡ NETWORK TOPOLOGY</h3>
  <div><span class="label">Topology:</span> <span class="value" id="hud-topology">STAR</span></div>
  <div><span class="label">Selected:</span> <span class="value" id="hud-selected">None</span></div>
  <div><span class="label">Total Nodes:</span> <span class="value" id="hud-nodes">9</span></div>
  <div><span class="label">Total Edges:</span> <span class="value" id="hud-edges">8</span></div>
</div>

<button id="resetBtn">⟲ Reset View</button>

<div id="controls-help">
  <span>P - Ping</span>
  <span>T - Toggle Topology</span>
  <span>L - Toggle Labels</span>
  <span>Click - Select Node</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  nodeCount: 9,
  edgeCount: 8,
  selectedNode: -1,
  hoveredNode: -1,
  topology: 'star',
  labelsVisible: true,
  pingActive: false,
  cameraDistance: 0,
  hubModelLoaded: false
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Grid helper (subtle)
const gridHelper = new THREE.GridHelper(20, 20, 0x112233, 0x0a1122);
scene.add(gridHelper);

// Node colors
const nodeColors = [0x00ff88, 0xff4488, 0x4488ff, 0xffaa00, 0xaa44ff, 0x44ffaa, 0xff8844, 0x88aaff];
const nodeNames = ['Hub', 'Node 1', 'Node 2', 'Node 3', 'Node 4', 'Node 5', 'Node 6', 'Node 7', 'Node 8'];

// Store nodes, edges, labels
const nodes = []; // index 0 = hub, 1-8 = outer nodes
const nodePositions = [];
const labels = [];
const edgeLines = [];
const edgeGroup = new THREE.Group();
scene.add(edgeGroup);

// Ping animation spheres
const pingGroup = new THREE.Group();
scene.add(pingGroup);
let pingAnimations = [];

// Calculate node positions
nodePositions.push(new THREE.Vector3(0, 0, 0)); // Hub at center
for (let i = 0; i < 8; i++) {
  const angle = (i / 8) * Math.PI * 2;
  const x = Math.cos(angle) * 6;
  const z = Math.sin(angle) * 6;
  nodePositions.push(new THREE.Vector3(x, 0, z));
}

// Create hub placeholder (sphere until model loads)
const hubGeom = new THREE.SphereGeometry(0.6, 32, 32);
const hubMat = new THREE.MeshStandardMaterial({
  color: 0x4488ff,
  emissive: 0x112244,
  metalness: 0.5,
  roughness: 0.3
});
const hubMesh = new THREE.Mesh(hubGeom, hubMat);
hubMesh.position.copy(nodePositions[0]);
hubMesh.userData = { nodeIndex: 0, originalScale: 1.0 };
scene.add(hubMesh);
nodes.push(hubMesh);

// Load coffeemat.glb model
const gltfLoader = new GLTFLoader();
gltfLoader.load(
  'coffeemat.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.5, 0.5, 0.5);
    model.position.copy(nodePositions[0]);
    model.userData = { nodeIndex: 0, originalScale: 0.5 };
    
    // Replace hub mesh with model
    scene.remove(hubMesh);
    scene.add(model);
    nodes[0] = model;
    
    // Add a bounding sphere for raycasting
    const bbox = new THREE.Box3().setFromObject(model);
    const center = new THREE.Vector3();
    bbox.getCenter(center);
    const size = new THREE.Vector3();
    bbox.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    
    // Create invisible sphere for raycasting
    const hitSphere = new THREE.Mesh(
      new THREE.SphereGeometry(maxDim * 0.6, 8, 8),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    hitSphere.position.copy(nodePositions[0]);
    hitSphere.userData = { nodeIndex: 0, isHitbox: true, model: model };
    scene.add(hitSphere);
    nodes[0] = { mesh: model, hitbox: hitSphere, isModel: true, userData: { nodeIndex: 0, originalScale: 0.5 } };
    
    state.hubModelLoaded = true;
    console.log('coffeemat.glb loaded successfully');
  },
  undefined,
  (error) => {
    console.warn('Could not load coffeemat.glb, using placeholder sphere:', error);
    // Keep the placeholder sphere
  }
);

// Create outer nodes
for (let i = 0; i < 8; i++) {
  const geom = new THREE.SphereGeometry(0.4, 32, 32);
  const mat = new THREE.MeshStandardMaterial({
    color: nodeColors[i],
    emissive: new THREE.Color(nodeColors[i]).multiplyScalar(0.2),
    metalness: 0.3,
    roughness: 0.4
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.copy(nodePositions[i + 1]);
  mesh.userData = { nodeIndex: i + 1, originalScale: 1.0, originalColor: nodeColors[i] };
  scene.add(mesh);
  nodes.push(mesh);

  // Glow effect
  const glowGeom = new THREE.SphereGeometry(0.55, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: nodeColors[i],
    transparent: true,
    opacity: 0.15,
    side: THREE.BackSide
  });
  const glow = new THREE.Mesh(glowGeom, glowMat);
  mesh.add(glow);
}

// Create text sprite labels
function createTextSprite(text, color = '#aaccff') {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 28px Segoe UI, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 6;
  ctx.fillStyle = color;
  ctx.fillText(text, 128, 32);
  
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(2, 0.5, 1);
  return sprite;
}

for (let i = 0; i < 9; i++) {
  const label = createTextSprite(nodeNames[i], i === 0 ? '#4488ff' : '#' + new THREE.Color(nodeColors[i > 0 ? i - 1 : 0]).getHexString());
  label.position.copy(nodePositions[i]);
  label.position.y += 1.2;
  scene.add(label);
  labels.push(label);
}

// Edge definitions per topology
function getEdges(topology) {
  const edges = [];
  // Hub connections (always in star and ring, all in mesh)
  for (let i = 1; i <= 8; i++) {
    edges.push([0, i]);
  }
  
  if (topology === 'star') {
    // Only hub connections - already added
  } else if (topology === 'ring') {
    // Ring connections between outer nodes
    for (let i = 1; i <= 8; i++) {
      const next = i === 8 ? 1 : i + 1;
      edges.push([i, next]);
    }
  } else if (topology === 'mesh') {
    // All outer nodes connected to each other
    for (let i = 1; i <= 8; i++) {
      for (let j = i + 1; j <= 8; j++) {
        edges.push([i, j]);
      }
    }
  }
  
  return edges;
}

function getDefaultEdges() {
  // Star + peer connections
  const edges = [];
  for (let i = 1; i <= 8; i++) {
    edges.push([0, i]);
  }
  // Peer connections: 1-2, 3-4, 5-6, 7-8
  edges.push([1, 2], [3, 4], [5, 6], [7, 8]);
  return edges;
}

let currentEdges = [];

function buildEdges() {
  // Clear existing edges
  while (edgeGroup.children.length > 0) {
    const child = edgeGroup.children[0];
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
    edgeGroup.remove(child);
  }
  edgeLines.length = 0;
  
  let edges;
  if (state.topology === 'star') {
    edges = [];
    for (let i = 1; i <= 8; i++) edges.push([0, i]);
  } else if (state.topology === 'ring') {
    edges = [];
    for (let i = 1; i <= 8; i++) edges.push([0, i]);
    for (let i = 1; i <= 8; i++) {
      const next = i === 8 ? 1 : i + 1;
      edges.push([i, next]);
    }
  } else if (state.topology === 'mesh') {
    edges = [];
    for (let i = 1; i <= 8; i++) edges.push([0, i]);
    for (let i = 1; i <= 8; i++) {
      for (let j = i + 1; j <= 8; j++) {
        edges.push([i, j]);
      }
    }
  }
  
  currentEdges = edges;
  
  for (const [a, b] of edges) {
    const points = [nodePositions[a].clone(), nodePositions[b].clone()];
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.6 });
    const line = new THREE.Line(geometry, material);
    line.userData = { from: a, to: b };
    edgeGroup.add(line);
    edgeLines.push(line);
  }
  
  state.edgeCount = edges.length;
  updateHUD();
}

buildEdges();

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let previousHovered = -1;

function getNodeMesh(nodeIndex) {
  const node = nodes[nodeIndex];
  if (!node) return null;
  if (node.isModel) return node.hitbox;
  if (node.isMesh || node.isGroup) return node;
  return node;
}

function getNodeObject(nodeIndex) {
  const node = nodes[nodeIndex];
  if (!node) return null;
  if (node.isModel) return node.mesh;
  return node;
}

function getRaycastTargets() {
  const targets = [];
  for (let i = 0; i < nodes.length; i++) {
    const node = nodes[i];
    if (!node) continue;
    if (node.isModel) {
      targets.push(node.hitbox);
    } else if (node.isMesh) {
      targets.push(node);
    }
  }
  return targets;
}

function onMouseMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function onMouseClick(event) {
  raycaster.setFromCamera(mouse, camera);
  const targets = getRaycastTargets();
  const intersects = raycaster.intersectObjects(targets, true);
  
  if (intersects.length > 0) {
    let nodeIndex = -1;
    for (const intersect of intersects) {
      let obj = intersect.object;
      while (obj) {
        if (obj.userData && obj.userData.nodeIndex !== undefined) {
          nodeIndex = obj.userData.nodeIndex;
          break;
        }
        obj = obj.parent;
      }
      if (nodeIndex >= 0) break;
    }
    
    if (nodeIndex >= 0) {
      selectNode(nodeIndex);
      return;
    }
  }
  
  // Clicked empty space
  deselectAll();
}

function selectNode(index) {
  deselectAll();
  state.selectedNode = index;
  
  // Highlight connected edges
  for (const line of edgeLines) {
    if (line.userData.from === index || line.userData.to === index) {
      line.material.color.setHex(0x00ff00);
      line.material.opacity = 1.0;
    }
  }
  
  // Make selected node emissive white
  const node = nodes[index];
  if (node && node.isMesh && node.material) {
    node.material.emissive.setHex(0xffffff);
    node.material.emissiveIntensity = 0.5;
  } else if (node && node.isModel) {
    node.mesh.traverse(child => {
      if (child.isMesh && child.material) {
        child.material.emissive = new THREE.Color(0xffffff);
        child.material.emissiveIntensity = 0.5;
      }
    });
  }
  
  updateHUD();
}

function deselectAll() {
  state.selectedNode = -1;
  
  // Reset edges
  for (const line of edgeLines) {
    line.material.color.setHex(0x334466);
    line.material.opacity = 0.6;
  }
  
  // Reset node materials
  for (let i = 0; i < nodes.length; i++) {
    const node = nodes[i];
    if (!node) continue;
    if (node.isMesh && node.material) {
      if (i === 0) {
        node.material.emissive.setHex(0x112244);
        node.material.emissiveIntensity = 1.0;
      } else {
        const origColor = node.userData.originalColor;
        node.material.emissive.set(new THREE.Color(origColor).multiplyScalar(0.2));
        node.material.emissiveIntensity = 1.0;
      }
    } else if (node.isModel) {
      node.mesh.traverse(child => {
        if (child.isMesh && child.material) {
          child.material.emissiveIntensity = 0;
        }
      });
    }
  }
  
  updateHUD();
}

// Ping animation
function startPing(fromIndex) {
  if (state.pingActive) return;
  state.pingActive = true;
  
  const connectedEdges = currentEdges.filter(([a, b]) => a === fromIndex || b === fromIndex);
  
  if (connectedEdges.length === 0) {
    state.pingActive = false;
    return;
  }
  
  pingAnimations = [];
  
  for (const [a, b] of connectedEdges) {
    const target = a === fromIndex ? b : a;
    const startPos = nodePositions[fromIndex].clone();
    const endPos = nodePositions[target].clone();
    
    const geom = new THREE.SphereGeometry(0.15, 16, 16);
    const mat = new THREE.MeshBasicMaterial({ color: 0x00ffaa, transparent: true, opacity: 1.0 });
    const sphere = new THREE.Mesh(geom, mat);
    sphere.position.copy(startPos);
    pingGroup.add(sphere);
    
    // Glow
    const glowGeom = new THREE.SphereGeometry(0.3, 8, 8);
    const glowMat = new THREE.MeshBasicMaterial({ color: 0x00ffaa, transparent: true, opacity: 0.3, side: THREE.BackSide });
    const glow = new THREE.Mesh(glowGeom, glowMat);
    sphere.add(glow);
    
    pingAnimations.push({
      sphere,
      startPos,
      endPos,
      progress: 0,
      speed: 1.5
    });
  }
}

// Keyboard
function onKeyDown(event) {
  const key = event.key.toLowerCase();
  
  if (key === 'p') {
    if (state.selectedNode >= 0 && !state.pingActive) {
      startPing(state.selectedNode);
    }
  } else if (key === 't') {
    const topologies = ['star', 'ring', 'mesh'];
    const currentIndex = topologies.indexOf(state.topology);
    state.topology = topologies[(currentIndex + 1) % topologies.length];
    buildEdges();
    // Re-highlight if a node is selected
    if (state.selectedNode >= 0) {
      const sel = state.selectedNode;
      deselectAll();
      selectNode(sel);
    }
  } else if (key === 'l') {
    state.labelsVisible = !state.labelsVisible;
    for (const label of labels) {
      label.visible = state.labelsVisible;
    }
  }
}

// Reset button
document.getElementById('resetBtn').addEventListener('click', () => {
  camera.position.set(0, 8, 15);
  controls.target.set(0, 0, 0);
  controls.update();
  deselectAll();
});

// Event listeners
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onMouseClick);
window.addEventListener('keydown', onKeyDown);
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// HUD update
function updateHUD() {
  document.getElementById('hud-topology').textContent = state.topology.toUpperCase();
  document.getElementById('hud-selected').textContent = state.selectedNode >= 0 ? nodeNames[state.selectedNode] : 'None';
  document.getElementById('hud-nodes').textContent = state.nodeCount;
  document.getElementById('hud-edges').textContent = state.edgeCount;
}

// Add particle background
function createStarfield() {
  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  for (let i = 0; i < 500; i++) {
    vertices.push(
      (Math.random() - 0.5) * 60,
      (Math.random() - 0.5) * 60,
      (Math.random() - 0.5) * 60
    );
  }
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  const material = new THREE.PointsMaterial({ color: 0x334466, size: 0.05, transparent: true, opacity: 0.6 });
  const points = new THREE.Points(geometry, material);
  scene.add(points);
  return points;
}
const starfield = createStarfield();

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  const time = clock.getElapsedTime();
  
  controls.update();
  
  // Update camera distance
  state.cameraDistance = camera.position.length();
  
  // Node hover animation
  for (let i = 1; i < nodes.length; i++) {
    const node = nodes[i];
    if (!node || !node.isMesh) continue;
    // Subtle float animation
    node.position.y = Math.sin(time * 0.8 + i * 0.7) * 0.15;
    // Update label position
    if (labels[i]) {
      labels[i].position.y = node.position.y + 1.2;
    }
  }
  
  // Update hub label
  if (labels[0]) {
    labels[0].position.y = Math.sin(time * 0.8) * 0.15 + 1.5;
  }
  
  // Raycasting for hover
  raycaster.setFromCamera(mouse, camera);
  const targets = getRaycastTargets();
  const intersects = raycaster.intersectObjects(targets, true);
  
  let hoveredIndex = -1;
  if (intersects.length > 0) {
    for (const intersect of intersects) {
      let obj = intersect.object;
      while (obj) {
        if (obj.userData && obj.userData.nodeIndex !== undefined) {
          hoveredIndex = obj.userData.nodeIndex;
          break;
        }
        obj = obj.parent;
      }
      if (hoveredIndex >= 0) break;
    }
  }
  
  // Handle hover state changes
  if (hoveredIndex !== previousHovered) {
    // Unhover previous
    if (previousHovered >= 0) {
      const prevNode = nodes[previousHovered];
      if (prevNode && prevNode.isMesh) {
        prevNode.scale.setScalar(prevNode.userData.originalScale || 1.0);
      } else if (prevNode && prevNode.isModel) {
        const s = prevNode.userData.originalScale || 0.5;
        prevNode.mesh.scale.setScalar(s);
      }
    }
    
    // Hover new
    if (hoveredIndex >= 0) {
      const newNode = nodes[hoveredIndex];
      if (newNode && newNode.isMesh) {
        newNode.scale.setScalar((newNode.userData.originalScale || 1.0) * 1.5);
      } else if (newNode && newNode.isModel) {
        const s = newNode.userData.originalScale || 0.5;
        newNode.mesh.scale.setScalar(s * 1.5);
      }
      document.body.style.cursor = 'pointer';
    } else {
      document.body.style.cursor = 'default';
    }
    
    previousHovered = hoveredIndex;
    state.hoveredNode = hoveredIndex;
  }
  
  // Ping animations
  if (pingAnimations.length > 0) {
    let allDone = true;
    for (const ping of pingAnimations) {
      ping.progress += delta * ping.speed;
      if (ping.progress >= 1.0) {
        ping.progress = 1.0;
      } else {
        allDone = false;
      }
      
      ping.sphere.position.lerpVectors(ping.startPos, ping.endPos, ping.progress);
      // Adjust Y for floating nodes
      const fromIdx = currentEdges.find(e => 
        nodePositions[e[0]].equals(ping.startPos) || nodePositions[e[1]].equals(ping.startPos)
      );
      
      ping.sphere.material.opacity = ping.progress < 0.8 ? 1.0 : 1.0 - (ping.progress - 0.8) / 0.2;
    }
    
    if (allDone) {
      for (const ping of pingAnimations) {
        pingGroup.remove(ping.sphere);
        ping.sphere.geometry.dispose();
        ping.sphere.material.dispose();
      }
      pingAnimations = [];
      state.pingActive = false;
    }
  }
  
  // Edge pulse animation for selected
  if (state.selectedNode >= 0) {
    const pulse = (Math.sin(time * 4) + 1) * 0.5;
    for (const line of edgeLines) {
      if (line.userData.from === state.selectedNode || line.userData.to === state.selectedNode) {
        const g = 0.6 + pulse * 0.4;
        line.material.color.setRGB(0, g, 0);
      }
    }
  }
  
  // Rotate starfield slowly
  starfield.rotation.y += delta * 0.01;
  
  // Update edge positions to match floating nodes
  for (const line of edgeLines) {
    const fromNode = nodes[line.userData.from];
    const toNode = nodes[line.userData.to];
    if (!fromNode || !toNode) continue;
    
    let fromPos, toPos;
    if (fromNode.isModel) {
      fromPos = fromNode.mesh.position;
    } else if (fromNode.isMesh) {
      fromPos = fromNode.position;
    } else {
      fromPos = nodePositions[line.userData.from];
    }
    
    if (toNode.isModel) {
      toPos = toNode.mesh.position;
    } else if (toNode.isMesh) {
      toPos = toNode.position;
    } else {
      toPos = nodePositions[line.userData.to];
    }
    
    const positions = line.geometry.attributes.position;
    positions.setXYZ(0, fromPos.x, fromPos.y, fromPos.z);
    positions.setXYZ(1, toPos.x, toPos.y, toPos.z);
    positions.needsUpdate = true;
  }
  
  renderer.render(scene, camera);
}

animate();
updateHUD();
</script>
</body>
