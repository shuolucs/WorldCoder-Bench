<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Network Topology</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            background: rgba(10, 10, 26, 0.8);
            padding: 15px;
            border: 1px solid #334466;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #hud div {
            margin-bottom: 5px;
            font-size: 14px;
        }
        #hud div:last-child {
            margin-bottom: 0;
        }
        #hud span {
            font-weight: bold;
            color: #4488ff;
        }
        #resetBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #334466;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
            transition: background 0.2s;
        }
        #resetBtn:hover {
            background: #4488ff;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #88aaff;
            background: rgba(10, 10, 26, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            text-align: center;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div>Topology: <span id="hud-topo">STAR</span></div>
        <div>Selected: <span id="hud-sel">None</span></div>
        <div>Total nodes: <span id="hud-nodes">9</span></div>
        <div>Total edges: <span id="hud-edges">8</span></div>
    </div>
    <button id="resetBtn">Reset View</button>
    <div id="instructions">Click to select | Hover to highlight | 'P' to Ping | 'T' to Toggle Topology | 'L' to Toggle Labels</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            nodeCount: 9,
            edgeCount: 8,
            selectedNode: -1,
            hoveredNode: -1,
            topology: 'star',
            labelsVisible: true,
            pingActive: false,
            cameraDistance: 0,
            hubModelLoaded: false
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Data Structures
        const nodes = []; // { id, mesh, name, color, labelSprite }
        let edges = []; // { source, target, lineMesh }
        const raycastTargets = [];
        const pings = [];

        // Materials
        const edgeMatDefault = new THREE.LineBasicMaterial({ color: 0x334466 });
        const edgeMatHighlight = new THREE.LineBasicMaterial({ color: 0x00ff00 });
        const nodeColors = [0x00ff88, 0xff4488, 0x4488ff, 0xffaa00, 0xaa44ff, 0x44ffaa, 0xff8844, 0x88aaff];

        // Helper: Create Text Sprite
        function createLabel(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 28px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4;
            ctx.strokeText(text, 128, 32);
            ctx.fillText(text, 128, 32);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(3, 0.75, 1);
            sprite.position.y = 1.2;
            return sprite;
        }

        // 1. Create Hub (Node 0)
        const hubGroup = new THREE.Group();
        scene.add(hubGroup);
        
        // Invisible hit sphere for raycasting the hub
        const hubHitMesh = new THREE.Mesh(
            new THREE.SphereGeometry(0.8, 16, 16),
            new THREE.MeshBasicMaterial({ visible: false })
        );
        hubGroup.add(hubHitMesh);
        raycastTargets.push(hubHitMesh);

        const hubLabel = createLabel('Hub');
        hubGroup.add(hubLabel);

        nodes.push({ id: 0, mesh: hubGroup, name: 'Hub', color: 0xffffff, labelSprite: hubLabel });

        // Load GLTF
        const loader = new GLTFLoader();
        loader.load('coffeemat.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            
            // Ensure materials can be emissive
            model.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.material = child.material.clone();
                    child.userData.origEmissive = child.material.emissive.clone();
                }
            });
            
            hubGroup.add(model);
            window.__3D_STATE__.hubModelLoaded = true;
        }, undefined, (error) => {
            // Fallback if model fails to load
            const fallbackGeo = new THREE.BoxGeometry(1, 1, 1);
            const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
            const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
            fallbackMesh.userData.origEmissive = new THREE.Color(0x000000);
            hubGroup.add(fallbackMesh);
        });

        // 2. Create Outer Nodes (1-8)
        const radius = 6;
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;

            const geo = new THREE.SphereGeometry(0.4, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ color: nodeColors[i] });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0, z);
            
            const label = createLabel(`Node ${i + 1}`);
            mesh.add(label);

            scene.add(mesh);
            raycastTargets.push(mesh);
            nodes.push({ id: i + 1, mesh: mesh, name: `Node ${i + 1}`, color: nodeColors[i], labelSprite: label });
        }

        // 3. Edges & Topology
        function addEdge(sourceId, targetId) {
            const p1 = nodes[sourceId].mesh.position;
            const p2 = nodes[targetId].mesh.position;
            const geo = new THREE.BufferGeometry().setFromPoints([p1, p2]);
            const line = new THREE.Line(geo, edgeMatDefault);
            scene.add(line);
            edges.push({ source: sourceId, target: targetId, lineMesh: line });
        }

        function buildTopology() {
            // Clear existing
            edges.forEach(e => scene.remove(e.lineMesh));
            edges = [];

            const topo = window.__3D_STATE__.topology;

            // Star connections (always present in these topologies)
            for (let i = 1; i <= 8; i++) {
                addEdge(0, i);
            }

            if (topo === 'ring') {
                for (let i = 1; i <= 8; i++) {
                    addEdge(i, (i % 8) + 1);
                }
            } else if (topo === 'mesh') {
                for (let i = 1; i <= 8; i++) {
                    for (let j = i + 1; j <= 8; j++) {
                        addEdge(i, j);
                    }
                }
            }

            window.__3D_STATE__.edgeCount = edges.length;
            updateVisuals();
            updateHUD();
        }

        // 4. Interaction Logic
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateVisuals() {
            const state = window.__3D_STATE__;

            // Update Nodes
            nodes.forEach((node, idx) => {
                const isHovered = (idx === state.hoveredNode);
                const isSelected = (idx === state.selectedNode);

                // Scale
                const targetScale = isHovered ? 1.5 : 1.0;
                if (idx === 0) {
                    // Hub scale is handled on the group, but we don't want to scale the hit mesh
                    hubGroup.children.forEach(c => {
                        if (c !== hubHitMesh && c !== hubLabel) c.scale.setScalar(targetScale * (c.isMesh && !c.userData.origEmissive ? 1 : 0.5));
                    });
                } else {
                    node.mesh.scale.setScalar(targetScale);
                }

                // Emissive
                let emColor = 0x000000;
                let emInt = 0;
                if (isSelected) {
                    emColor = 0xffffff;
                    emInt = 0.6;
                } else if (isHovered) {
                    emColor = node.color;
                    emInt = 0.4;
                }

                if (idx === 0) {
                    hubGroup.traverse(c => {
                        if (c.isMesh && c.material && c !== hubHitMesh) {
                            c.material.emissive.setHex(emColor);
                            c.material.emissiveIntensity = emInt;
                        }
                    });
                } else {
                    node.mesh.material.emissive.setHex(emColor);
                    node.mesh.material.emissiveIntensity = emInt;
                }

                // Labels
                node.labelSprite.visible = state.labelsVisible;
            });

            // Update Edges
            edges.forEach(e => {
                if (state.selectedNode !== -1 && (e.source === state.selectedNode || e.target === state.selectedNode)) {
                    e.lineMesh.material = edgeMatHighlight;
                } else {
                    e.lineMesh.material = edgeMatDefault;
                }
            });
        }

        function onPointerMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(raycastTargets);

            let newHover = -1;
            if (intersects.length > 0) {
                newHover = raycastTargets.indexOf(intersects[0].object);
            }

            if (newHover !== window.__3D_STATE__.hoveredNode) {
                window.__3D_STATE__.hoveredNode = newHover;
                updateVisuals();
            }
        }

        function onClick(event) {
            if (window.__3D_STATE__.hoveredNode !== -1) {
                window.__3D_STATE__.selectedNode = window.__3D_STATE__.hoveredNode;
            } else {
                window.__3D_STATE__.selectedNode = -1;
            }
            updateVisuals();
            updateHUD();
        }

        function triggerPing() {
            const sel = window.__3D_STATE__.selectedNode;
            if (sel === -1) return;

            window.__3D_STATE__.pingActive = true;

            // Find connected neighbors
            const neighbors = [];
            edges.forEach(e => {
                if (e.source === sel) neighbors.push(e.target);
                if (e.target === sel) neighbors.push(e.source);
            });

            const startPos = nodes[sel].mesh.position.clone();

            neighbors.forEach(targetId => {
                const pingMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.15, 16, 16),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                pingMesh.position.copy(startPos);
                scene.add(pingMesh);

                pings.push({
                    mesh: pingMesh,
                    start: startPos,
                    end: nodes[targetId].mesh.position.clone(),
                    progress: 0
                });
            });
        }

        function onKeyDown(event) {
            const key = event.key.toLowerCase();
            const state = window.__3D_STATE__;

            if (key === 'p') {
                triggerPing();
            } else if (key === 't') {
                const topos = ['star', 'ring', 'mesh'];
                const idx = topos.indexOf(state.topology);
                state.topology = topos[(idx + 1) % topos.length];
                buildTopology();
            } else if (key === 'l') {
                state.labelsVisible = !state.labelsVisible;
                updateVisuals();
            }
        }

        // UI Updates
        function updateHUD() {
            const state = window.__3D_STATE__;
            document.getElementById('hud-topo').innerText = state.topology.toUpperCase();
            document.getElementById('hud-sel').innerText = state.selectedNode === -1 ? 'None' : nodes[state.selectedNode].name;
            document.getElementById('hud-nodes').innerText = state.nodeCount;
            document.getElementById('hud-edges').innerText = state.edgeCount;
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            camera.position.set(0, 8, 15);
            controls.target.set(0, 0, 0);
            window.__3D_STATE__.selectedNode = -1;
            updateVisuals();
            updateHUD();
        });

        // Event Listeners
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('click', onClick);
        window.addEventListener('keydown', onKeyDown);

        // Initialization
        buildTopology();

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            controls.update();
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            // Handle Pings
            for (let i = pings.length - 1; i >= 0; i--) {
                const p = pings[i];
                p.progress += delta * 2; // Speed

                if (p.progress >= 1) {
                    scene.remove(p.mesh);
                    pings.splice(i, 1);
                } else {
                    p.mesh.position.lerpVectors(p.start, p.end, p.progress);
                }
            }

            if (pings.length === 0 && window.__3D_STATE__.pingActive) {
                window.__3D_STATE__.pingActive = false;
            }

            // Make labels face camera
            nodes.forEach(n => {
                if (n.labelSprite.visible) {
                    n.labelSprite.quaternion.copy(camera.quaternion);
                }
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
