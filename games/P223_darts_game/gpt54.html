<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Darts Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.6;
      min-width: 180px;
    }

    #controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #e94560;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: #ff5c77;
    }

    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      color: white;
      font-size: 28px;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 8px rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="roundDisplay">Round: 1</div>
    <div id="dartsDisplay">Darts Remaining: 3</div>
    <div id="lastScoreDisplay">Last Throw: 0</div>
    <div id="totalScoreDisplay">Total Score: 0</div>
  </div>

  <div id="controls">
    <button id="newRoundBtn">New Round</button>
    <button id="resetBtn">Reset Game</button>
  </div>

  <div id="crosshair">+</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.5, 4);
    camera.lookAt(0, 1.5, -3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const boardCenter = new THREE.Vector3(0, 1.7, -3);

    // Decorative lamp
    let lampLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      "IridescenceLamp.glb",
      (gltf) => {
        gltf.scene.position.set(-2.5, 0, -2);
        gltf.scene.scale.set(0.5, 0.5, 0.5);
        scene.add(gltf.scene);
        lampLoaded = true;
      },
      undefined,
      () => {
        lampLoaded = false;
      }
    );

    // Wall behind dartboard
    const wall = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 4),
      new THREE.MeshStandardMaterial({ color: 0x2b2d42 })
    );
    wall.position.set(0, 1.7, -3.1);
    scene.add(wall);

    // Dartboard base cylinder
    const boardBase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.6, 0.6, 0.05, 64),
      new THREE.MeshStandardMaterial({ color: 0x111111 })
    );
    boardBase.position.copy(boardCenter);
    boardBase.rotation.x = Math.PI / 2; // face camera along +Z
    scene.add(boardBase);

    // Board face segments/rings
    const boardGroup = new THREE.Group();
    boardGroup.position.copy(boardCenter);
    boardGroup.rotation.x = Math.PI / 2;

    function createRing(innerR, outerR, segments, colorA, colorB) {
      const group = new THREE.Group();
      for (let i = 0; i < segments; i++) {
        const thetaStart = (i / segments) * Math.PI * 2;
        const thetaLength = (Math.PI * 2) / segments;
        const shape = new THREE.Shape();
        shape.absarc(0, 0, outerR, thetaStart, thetaStart + thetaLength, false);
        const hole = new THREE.Path();
        hole.absarc(0, 0, innerR, thetaStart + thetaLength, thetaStart, true);
        shape.holes.push(hole);

        const geom = new THREE.ShapeGeometry(shape);
        const mat = new THREE.MeshStandardMaterial({
          color: i % 2 === 0 ? colorA : colorB,
          side: THREE.DoubleSide
        });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.z = 0.026;
        group.add(mesh);
      }
      return group;
    }

    // Bulls
    const bullseye = new THREE.Mesh(
      new THREE.CircleGeometry(0.06, 32),
      new THREE.MeshStandardMaterial({ color: 0xff0000, side: THREE.DoubleSide })
    );
    bullseye.position.z = 0.026;
    boardGroup.add(bullseye);

    const innerBullRing = new THREE.Mesh(
      new THREE.RingGeometry(0.06, 0.12, 32),
      new THREE.MeshStandardMaterial({ color: 0x00aa00, side: THREE.DoubleSide })
    );
    innerBullRing.position.z = 0.026;
    boardGroup.add(innerBullRing);

    boardGroup.add(createRing(0.12, 0.30, 20, 0xf5f5dc, 0x222222));
    boardGroup.add(createRing(0.30, 0.36, 20, 0xff0000, 0x00aa00));
    boardGroup.add(createRing(0.36, 0.54, 20, 0xf5f5dc, 0x222222));
    boardGroup.add(createRing(0.54, 0.60, 20, 0x00aa00, 0xff0000));

    scene.add(boardGroup);

    // Aim marker
    const aimMarker = new THREE.Mesh(
      new THREE.SphereGeometry(0.03, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xff0000 })
    );
    aimMarker.position.set(0, 1.7, -2.95);
    scene.add(aimMarker);

    // Dart
    const dartGeometry = new THREE.ConeGeometry(0.02, 0.15, 12);
    const dartMaterial = new THREE.MeshStandardMaterial({ color: 0xffff00 });
    const dart = new THREE.Mesh(dartGeometry, dartMaterial);
    dart.position.set(0, 1.7, 3.5);
    dart.rotation.x = -Math.PI / 2;
    scene.add(dart);

    // Floor
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 12),
      new THREE.MeshStandardMaterial({ color: 0x16213e, roughness: 0.9 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    scene.add(floor);

    // Game state
    let aimX = 0;
    let aimY = 1.7;
    let dartsThrown = 0;
    let totalScore = 0;
    let lastScore = 0;
    let roundNumber = 1;

    let isThrown = false;
    let dartOnBoard = false;

    let throwStartTime = 0;
    const throwDuration = 0.5;
    let throwStartPos = new THREE.Vector3();
    let throwTargetPos = new THREE.Vector3();

    function updateHUD() {
      document.getElementById("roundDisplay").textContent = `Round: ${roundNumber}`;
      document.getElementById("dartsDisplay").textContent = `Darts Remaining: ${Math.max(0, 3 - dartsThrown)}`;
      document.getElementById("lastScoreDisplay").textContent = `Last Throw: ${lastScore}`;
      document.getElementById("totalScoreDisplay").textContent = `Total Score: ${totalScore}`;
    }

    function resetActiveDart() {
      dart.position.set(0, 1.7, 3.5);
      dart.rotation.x = -Math.PI / 2;
      dart.rotation.y = 0;
      dart.rotation.z = 0;
      isThrown = false;
      dartOnBoard = false;
    }

    function calculateScore(hitX, hitY) {
      const dx = hitX - boardCenter.x;
      const dy = hitY - boardCenter.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 0.06) return 50;
      if (dist < 0.12) return 25;
      if (dist < 0.24) return 20;
      if (dist < 0.36) return dist >= 0.30 ? 45 : 15;
      if (dist < 0.48) return 10;
      if (dist < 0.60) return dist >= 0.54 ? 10 : 5;
      return 0;
    }

    function throwDart() {
      if (isThrown || dartsThrown >= 3) return;

      isThrown = true;
      dartOnBoard = false;
      throwStartTime = performance.now();
      throwStartPos.copy(dart.position);
      throwTargetPos.set(aimX, aimY, -2.95);

      const dir = new THREE.Vector3().subVectors(throwTargetPos, throwStartPos).normalize();
      const quat = new THREE.Quaternion().setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        dir
      );
      dart.quaternion.copy(quat);
    }

    function finishThrow() {
      dart.position.copy(throwTargetPos);
      dartOnBoard = true;
      dartsThrown++;

      lastScore = calculateScore(dart.position.x, dart.position.y);
      totalScore += lastScore;

      updateHUD();
    }

    document.addEventListener("keydown", (e) => {
      const step = 0.03;

      if (!isThrown) {
        if (e.key === "ArrowLeft") aimX -= step;
        if (e.key === "ArrowRight") aimX += step;
        if (e.key === "ArrowUp") aimY += step;
        if (e.key === "ArrowDown") aimY -= step;
      }

      aimX = THREE.MathUtils.clamp(aimX, -0.8, 0.8);
      aimY = THREE.MathUtils.clamp(aimY, 0.9, 2.5);
      aimMarker.position.set(aimX, aimY, -2.95);

      if (e.code === "Space") {
        e.preventDefault();
        throwDart();
      }
    });

    document.getElementById("newRoundBtn").addEventListener("click", () => {
      dartsThrown = 0;
      roundNumber += 1;
      lastScore = 0;
      resetActiveDart();
      updateHUD();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      aimX = 0;
      aimY = 1.7;
      dartsThrown = 0;
      totalScore = 0;
      lastScore = 0;
      roundNumber = 1;
      aimMarker.position.set(aimX, aimY, -2.95);
      resetActiveDart();
      updateHUD();
    });

    window.__3D_STATE__ = {
      dartPositionZ: dart.position.z,
      aimX,
      aimY,
      dartsThrown,
      totalScore,
      lastScore,
      roundNumber,
      isThrown,
      lampLoaded,
      dartOnBoard
    };

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      if (isThrown && !dartOnBoard) {
        const elapsed = (performance.now() - throwStartTime) / 1000;
        const t = Math.min(elapsed / throwDuration, 1);
        dart.position.lerpVectors(throwStartPos, throwTargetPos, t);

        if (t >= 1) {
          finishThrow();
        }
      }

      // If dart has landed and player still has darts left, allow next throw by resetting dart
      if (dartOnBoard && dartsThrown < 3) {
        // Keep the dart visible briefly only if wanted; here reset immediately on next idle frame
        resetActiveDart();
      }

      updateHUD();

      window.__3D_STATE__.dartPositionZ = dart.position.z;
      window.__3D_STATE__.aimX = aimX;
      window.__3D_STATE__.aimY = aimY;
      window.__3D_STATE__.dartsThrown = dartsThrown;
      window.__3D_STATE__.totalScore = totalScore;
      window.__3D_STATE__.lastScore = lastScore;
      window.__3D_STATE__.roundNumber = roundNumber;
      window.__3D_STATE__.isThrown = isThrown;
      window.__3D_STATE__.lampLoaded = lampLoaded;
      window.__3D_STATE__.dartOnBoard = dartOnBoard;

      renderer.render(scene, camera);
    }

    updateHUD();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
