<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Darts Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 18px;
            line-height: 1.5;
            pointer-events: none;
        }
        #hud span {
            font-weight: bold;
            color: #ffd700;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: #4a4e69;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #9a8c98;
        }
        button:active {
            background: #22223b;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            text-align: right;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div>Round: <span id="roundDisplay">1</span></div>
        <div>Darts Remaining: <span id="dartsDisplay">3</span></div>
        <div>Last Score: <span id="lastScoreDisplay">0</span></div>
        <div>Total Score: <span id="totalScoreDisplay">0</span></div>
    </div>
    
    <div id="controls">
        <button id="newRoundBtn">New Round</button>
        <button id="resetBtn">Reset Game</button>
    </div>

    <div id="crosshair">+</div>

    <div id="instructions">
        Use <b>Arrow Keys</b> to aim<br>
        Press <b>SPACE</b> to throw
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            dartPositionZ: 3.5,
            aimX: 0,
            aimY: 1.7,
            dartsThrown: 0,
            totalScore: 0,
            lastScore: 0,
            roundNumber: 1,
            isThrown: false,
            lampLoaded: false,
            dartOnBoard: false
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 4);
        camera.lookAt(0, 1.5, -3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // --- Load Model ---
        const loader = new GLTFLoader();
        loader.load('IridescenceLamp.glb', (gltf) => {
            const lamp = gltf.scene;
            lamp.position.set(-2.5, 0, -2);
            lamp.scale.set(0.5, 0.5, 0.5);
            scene.add(lamp);
            window.__3D_STATE__.lampLoaded = true;
        }, undefined, (error) => {
            console.warn('Could not load IridescenceLamp.glb. Proceeding without it.', error);
        });

        // --- Dartboard ---
        const boardGroup = new THREE.Group();
        boardGroup.position.set(0, 1.7, -3);

        // Base Cylinder
        const baseGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.05, 64);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const baseMesh = new THREE.Mesh(baseGeo, baseMat);
        baseMesh.rotation.x = Math.PI / 2; // Face +Z
        boardGroup.add(baseMesh);

        // Scoring Rings
        const ringData = [
            { inner: 0, outer: 0.06, color: 0xcc0000 },    // Bullseye
            { inner: 0.06, outer: 0.12, color: 0x009900 }, // Inner bull
            { inner: 0.12, outer: 0.24, color: 0xcc0000 }, // Standard inner
            { inner: 0.24, outer: 0.30, color: 0x009900 }, // Standard mid-inner
            { inner: 0.30, outer: 0.36, color: 0xcc0000 }, // Triple ring
            { inner: 0.36, outer: 0.48, color: 0x009900 }, // Standard mid-outer
            { inner: 0.48, outer: 0.54, color: 0xcc0000 }, // Standard outer
            { inner: 0.54, outer: 0.60, color: 0x009900 }  // Double ring
        ];

        ringData.forEach(data => {
            const geo = new THREE.RingGeometry(data.inner, data.outer, 64);
            const mat = new THREE.MeshStandardMaterial({ color: data.color, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.z = 0.026; // Slightly in front of base cylinder face
            boardGroup.add(mesh);
        });

        scene.add(boardGroup);

        // --- Aim Visualizer ---
        const aimGeo = new THREE.SphereGeometry(0.03, 16, 16);
        const aimMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const aimMarker = new THREE.Mesh(aimGeo, aimMat);
        aimMarker.position.set(0, 1.7, -2.95);
        scene.add(aimMarker);

        // --- Darts ---
        const darts = [];
        const startPos = new THREE.Vector3(0, 1.7, 3.5);

        for (let i = 0; i < 3; i++) {
            const dartGeo = new THREE.ConeGeometry(0.02, 0.15, 16);
            const dartMat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
            const dartMesh = new THREE.Mesh(dartGeo, dartMat);
            dartMesh.rotation.x = -Math.PI / 2; // Point towards -Z
            dartMesh.position.copy(startPos);
            dartMesh.visible = false;
            scene.add(dartMesh);
            darts.push(dartMesh);
        }

        darts[0].visible = true; // Show first dart

        // --- Input Handling ---
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
            if (e.code === 'Space') {
                if (!isAnimating && window.__3D_STATE__.dartsThrown < 3) {
                    startThrow();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        // --- Game Logic ---
        let isAnimating = false;
        let throwProgress = 0;
        const throwDuration = 0.5;
        let targetPos = new THREE.Vector3();

        function startThrow() {
            isAnimating = true;
            throwProgress = 0;
            targetPos.set(window.__3D_STATE__.aimX, window.__3D_STATE__.aimY, -2.95);
            
            window.__3D_STATE__.isThrown = true;
            window.__3D_STATE__.dartOnBoard = false;
        }

        function handleHit() {
            const dist = Math.sqrt(Math.pow(targetPos.x - 0, 2) + Math.pow(targetPos.y - 1.7, 2));
            let score = 0;

            if (dist < 0.06) score = 50;
            else if (dist < 0.12) score = 25;
            else if (dist < 0.24) score = 20;
            else if (dist < 0.36) {
                score = 15;
                if (dist >= 0.30) score *= 3;
            }
            else if (dist < 0.48) score = 10;
            else if (dist < 0.60) {
                score = 5;
                if (dist >= 0.54) score *= 2;
            }

            window.__3D_STATE__.lastScore = score;
            window.__3D_STATE__.totalScore += score;
            window.__3D_STATE__.dartsThrown++;

            updateHUD();

            if (window.__3D_STATE__.dartsThrown < 3) {
                // Prepare next dart
                darts[window.__3D_STATE__.dartsThrown].position.copy(startPos);
                darts[window.__3D_STATE__.dartsThrown].visible = true;
                window.__3D_STATE__.isThrown = false;
            } else {
                window.__3D_STATE__.isThrown = true; // Round over, darts stay on board
            }
        }

        function updateHUD() {
            document.getElementById('roundDisplay').innerText = window.__3D_STATE__.roundNumber;
            document.getElementById('dartsDisplay').innerText = 3 - window.__3D_STATE__.dartsThrown;
            document.getElementById('lastScoreDisplay').innerText = window.__3D_STATE__.lastScore;
            document.getElementById('totalScoreDisplay').innerText = window.__3D_STATE__.totalScore;
        }

        // --- Buttons ---
        document.getElementById('newRoundBtn').addEventListener('click', () => {
            window.__3D_STATE__.roundNumber++;
            window.__3D_STATE__.dartsThrown = 0;
            window.__3D_STATE__.isThrown = false;
            window.__3D_STATE__.dartOnBoard = false;

            darts.forEach(d => d.visible = false);
            darts[0].position.copy(startPos);
            darts[0].visible = true;

            updateHUD();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            window.__3D_STATE__.roundNumber = 1;
            window.__3D_STATE__.totalScore = 0;
            window.__3D_STATE__.lastScore = 0;
            window.__3D_STATE__.dartsThrown = 0;
            window.__3D_STATE__.isThrown = false;
            window.__3D_STATE__.dartOnBoard = false;
            window.__3D_STATE__.aimX = 0;
            window.__3D_STATE__.aimY = 1.7;

            darts.forEach(d => d.visible = false);
            darts[0].position.copy(startPos);
            darts[0].visible = true;

            updateHUD();
        });

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Aiming
            if (!isAnimating && window.__3D_STATE__.dartsThrown < 3) {
                const aimSpeed = 1.5 * delta;
                if (keys.ArrowUp) window.__3D_STATE__.aimY += aimSpeed;
                if (keys.ArrowDown) window.__3D_STATE__.aimY -= aimSpeed;
                if (keys.ArrowLeft) window.__3D_STATE__.aimX -= aimSpeed;
                if (keys.ArrowRight) window.__3D_STATE__.aimX += aimSpeed;

                // Clamp aim
                window.__3D_STATE__.aimX = Math.max(-0.8, Math.min(0.8, window.__3D_STATE__.aimX));
                window.__3D_STATE__.aimY = Math.max(0.9, Math.min(2.5, window.__3D_STATE__.aimY));
            }

            aimMarker.position.set(window.__3D_STATE__.aimX, window.__3D_STATE__.aimY, -2.95);

            // Throw Animation
            if (isAnimating) {
                throwProgress += delta / throwDuration;
                const currentDart = darts[window.__3D_STATE__.dartsThrown];

                if (throwProgress >= 1.0) {
                    throwProgress = 1.0;
                    isAnimating = false;
                    currentDart.position.lerpVectors(startPos, targetPos, 1.0);
                    window.__3D_STATE__.dartPositionZ = currentDart.position.z;
                    window.__3D_STATE__.dartOnBoard = true;
                    handleHit();
                } else {
                    currentDart.position.lerpVectors(startPos, targetPos, throwProgress);
                    window.__3D_STATE__.dartPositionZ = currentDart.position.z;
                }
            } else if (window.__3D_STATE__.dartsThrown < 3) {
                window.__3D_STATE__.dartPositionZ = darts[window.__3D_STATE__.dartsThrown].position.z;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
