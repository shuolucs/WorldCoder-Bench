<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Darts Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: Arial, sans-serif; }
  canvas { display: block; }
  
  #crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 30px;
    pointer-events: none;
    z-index: 10;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }
  
  #hud {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #fff;
    font-size: 16px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 15px 20px;
    border-radius: 10px;
    line-height: 1.8;
  }
  
  #hud div { margin-bottom: 2px; }
  
  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 15px;
  }
  
  #controls button {
    padding: 10px 24px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }
  
  #newRoundBtn {
    background: #4CAF50;
    color: white;
  }
  #newRoundBtn:hover { background: #45a049; }
  
  #resetBtn {
    background: #f44336;
    color: white;
  }
  #resetBtn:hover { background: #d32f2f; }
  
  #instructions {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-size: 14px;
    z-index: 10;
    text-align: center;
  }
  
  #throwMessage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFD700;
    font-size: 48px;
    font-weight: bold;
    z-index: 20;
    pointer-events: none;
    text-shadow: 0 0 10px rgba(255,215,0,0.8);
    opacity: 0;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<div id="crosshair">+</div>

<div id="hud">
  <div>Round: <span id="roundDisplay">1</span></div>
  <div>Darts Remaining: <span id="dartsDisplay">3</span></div>
  <div>Last Throw: <span id="lastScoreDisplay">0</span></div>
  <div>Total Score: <span id="totalScoreDisplay">0</span></div>
</div>

<div id="instructions">Arrow Keys: Aim | Space: Throw</div>

<div id="controls">
  <button id="newRoundBtn">New Round</button>
  <button id="resetBtn">Reset Game</button>
</div>

<div id="throwMessage"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
window.__3D_STATE__ = {
  dartPositionZ: 3.5,
  aimX: 0,
  aimY: 1.7,
  dartsThrown: 0,
  totalScore: 0,
  lastScore: 0,
  roundNumber: 1,
  isThrown: false,
  lampLoaded: false,
  dartOnBoard: false
};

const state = window.__3D_STATE__;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 4);
camera.lookAt(0, 1.5, -3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// ============ FLOOR & WALL ============
const floorGeo = new THREE.PlaneGeometry(10, 10);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const wallGeo = new THREE.PlaneGeometry(10, 6);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x3a3a4e });
const wall = new THREE.Mesh(wallGeo, wallMat);
wall.position.set(0, 3, -3.05);
wall.receiveShadow = true;
scene.add(wall);

// ============ DARTBOARD ============
function createDartboard() {
  const boardGroup = new THREE.Group();
  
  // Back board (wooden frame)
  const backGeo = new THREE.CylinderGeometry(0.65, 0.65, 0.06, 64);
  const backMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a });
  const backMesh = new THREE.Mesh(backGeo, backMat);
  backMesh.rotation.x = Math.PI / 2;
  boardGroup.add(backMesh);
  
  // Create dartboard face using canvas texture
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 512;
  const ctx = canvas.getContext('2d');
  
  const cx = 256, cy = 256;
  const maxR = 256;
  
  // Scoring segments (20 segments)
  const segmentScores = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
  const segAngle = (Math.PI * 2) / 20;
  
  // Radii as fractions of maxR
  const bullseyeR = 0.1 * maxR;
  const innerBullR = 0.2 * maxR;
  const innerTripleR = 0.5 * maxR;
  const outerTripleR = 0.6 * maxR;
  const innerDoubleR = 0.9 * maxR;
  const outerDoubleR = 1.0 * maxR;
  
  // Draw black background
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, 512, 512);
  
  // Draw segments
  for (let i = 0; i < 20; i++) {
    const startAngle = -Math.PI / 2 + i * segAngle - segAngle / 2;
    const endAngle = startAngle + segAngle;
    
    const isEven = i % 2 === 0;
    const lightColor = isEven ? '#e8d5b5' : '#1a1a1a';
    const darkColor = isEven ? '#d4342a' : '#1a8a3a';
    
    // Outer double ring
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, outerDoubleR, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = darkColor;
    ctx.fill();
    
    // Between double and triple
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, innerDoubleR, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = lightColor;
    ctx.fill();
    
    // Triple ring
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, outerTripleR, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = darkColor;
    ctx.fill();
    
    // Inner area
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, innerTripleR, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = lightColor;
    ctx.fill();
  }
  
  // Inner bull (green)
  ctx.beginPath();
  ctx.arc(cx, cy, innerBullR, 0, Math.PI * 2);
  ctx.fillStyle = '#1a8a3a';
  ctx.fill();
  
  // Bullseye (red)
  ctx.beginPath();
  ctx.arc(cx, cy, bullseyeR, 0, Math.PI * 2);
  ctx.fillStyle = '#d4342a';
  ctx.fill();
  
  // Wire lines
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  
  // Radial wires
  for (let i = 0; i < 20; i++) {
    const angle = -Math.PI / 2 + i * segAngle - segAngle / 2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * innerBullR, cy + Math.sin(angle) * innerBullR);
    ctx.lineTo(cx + Math.cos(angle) * outerDoubleR, cy + Math.sin(angle) * outerDoubleR);
    ctx.stroke();
  }
  
  // Ring wires
  [innerBullR, bullseyeR, innerTripleR, outerTripleR, innerDoubleR, outerDoubleR].forEach(r => {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  });
  
  const texture = new THREE.CanvasTexture(canvas);
  
  const faceGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.01, 64);
  const faceMat = new THREE.MeshStandardMaterial({ map: texture });
  const faceMesh = new THREE.Mesh(faceGeo, faceMat);
  faceMesh.rotation.x = Math.PI / 2;
  faceMesh.position.z = 0.03;
  boardGroup.add(faceMesh);
  
  boardGroup.position.set(0, 1.7, -3);
  
  return boardGroup;
}

const dartboard = createDartboard();
scene.add(dartboard);

// ============ DART ============
function createDart() {
  const dartGroup = new THREE.Group();
  
  // Dart body (cone)
  const coneGeo = new THREE.ConeGeometry(0.02, 0.15, 8);
  const coneMat = new THREE.MeshStandardMaterial({ color: 0xFFDD00 });
  const cone = new THREE.Mesh(coneGeo, coneMat);
  cone.rotation.x = Math.PI / 2;
  dartGroup.add(cone);
  
  // Dart tip
  const tipGeo = new THREE.ConeGeometry(0.005, 0.04, 8);
  const tipMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 });
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.rotation.x = Math.PI / 2;
  tip.position.z = -0.095;
  dartGroup.add(tip);
  
  // Flights (fins)
  const flightGeo = new THREE.PlaneGeometry(0.04, 0.06);
  const flightMat = new THREE.MeshStandardMaterial({ color: 0xff4444, side: THREE.DoubleSide });
  
  const flight1 = new THREE.Mesh(flightGeo, flightMat);
  flight1.position.z = 0.06;
  dartGroup.add(flight1);
  
  const flight2 = new THREE.Mesh(flightGeo, flightMat);
  flight2.position.z = 0.06;
  flight2.rotation.z = Math.PI / 2;
  dartGroup.add(flight2);
  
  dartGroup.position.set(0, 1.7, 3.5);
  
  return dartGroup;
}

let activeDart = createDart();
scene.add(activeDart);

// Landed darts collection
let landedDarts = [];

// ============ AIM INDICATOR ============
const aimGeo = new THREE.SphereGeometry(0.03, 16, 16);
const aimMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 });
const aimSphere = new THREE.Mesh(aimGeo, aimMat);
aimSphere.position.set(0, 1.7, -2.95);
scene.add(aimSphere);

// ============ LOAD GLB MODEL ============
const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/IridescenceLamp.glb',
  (gltf) => {
    const model = gltf.scene;
    model.position.set(-2.5, 0, -2);
    model.scale.set(0.5, 0.5, 0.5);
    scene.add(model);
    state.lampLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Could not load GLB model:', error);
    // Create a placeholder lamp
    const lampGroup = new THREE.Group();
    
    const baseGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.05, 16);
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.position.y = 0.025;
    lampGroup.add(base);
    
    const poleGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.8, 8);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.9 });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.y = 0.45;
    lampGroup.add(pole);
    
    const shadeGeo = new THREE.ConeGeometry(0.2, 0.2, 16, 1, true);
    const shadeMat = new THREE.MeshStandardMaterial({ color: 0xddaa44, side: THREE.DoubleSide });
    const shade = new THREE.Mesh(shadeGeo, shadeMat);
    shade.position.y = 0.9;
    lampGroup.add(shade);
    
    const bulbGeo = new THREE.SphereGeometry(0.06, 16, 16);
    const bulbMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 1 });
    const bulb = new THREE.Mesh(bulbGeo, bulbMat);
    bulb.position.y = 0.85;
    lampGroup.add(bulb);
    
    const lampLight = new THREE.PointLight(0xffffaa, 0.5, 3);
    lampLight.position.y = 0.85;
    lampGroup.add(lampLight);
    
    lampGroup.position.set(-2.5, 0, -2);
    lampGroup.scale.set(0.5, 0.5, 0.5);
    scene.add(lampGroup);
    state.lampLoaded = true;
  }
);

// ============ GAME VARIABLES ============
let aimX = 0;
let aimY = 1.7;
let throwAnimation = null;
let keysPressed = {};

// ============ INPUT HANDLING ============
document.addEventListener('keydown', (e) => {
  keysPressed[e.code] = true;
  
  if (e.code === 'Space') {
    e.preventDefault();
    throwDart();
  }
});

document.addEventListener('keyup', (e) => {
  keysPressed[e.code] = false;
});

function throwDart() {
  if (state.isThrown) return;
  if (state.dartsThrown >= 3) return;
  
  state.isThrown = true;
  state.dartOnBoard = false;
  
  const startPos = { x: aimX, y: aimY, z: 3.5 };
  const endPos = { x: aimX, y: aimY, z: -2.95 };
  const startTime = performance.now();
  const duration = 500; // 0.5 seconds
  
  throwAnimation = {
    startPos,
    endPos,
    startTime,
    duration
  };
}

function calculateScore(hitX, hitY) {
  const boardCenterX = 0;
  const boardCenterY = 1.7;
  
  const dx = hitX - boardCenterX;
  const dy = hitY - boardCenterY;
  const distance = Math.sqrt(dx * dx + dy * dy);
  
  if (distance >= 0.60) return 0;
  if (distance < 0.06) return 50;
  if (distance < 0.12) return 25;
  if (distance < 0.24) return 20;
  if (distance < 0.36) {
    // Check triple ring (0.30-0.36)
    if (distance >= 0.30) return 45; // 15 * 3
    return 15;
  }
  if (distance < 0.48) return 10;
  if (distance < 0.60) {
    // Check double ring (0.54-0.60)
    if (distance >= 0.54) return 10; // 5 * 2
    return 5;
  }
  return 0;
}

function showThrowMessage(score) {
  const msgEl = document.getElementById('throwMessage');
  if (score === 50) {
    msgEl.textContent = 'BULLSEYE! 50';
    msgEl.style.color = '#FF0000';
  } else if (score === 45) {
    msgEl.textContent = 'TRIPLE! ' + score;
    msgEl.style.color = '#00FF00';
  } else if (score === 25) {
    msgEl.textContent = 'INNER BULL! 25';
    msgEl.style.color = '#FFD700';
  } else if (score === 0) {
    msgEl.textContent = 'MISS!';
    msgEl.style.color = '#FF4444';
  } else {
    msgEl.textContent = score + ' pts';
    msgEl.style.color = '#FFD700';
  }
  
  msgEl.style.opacity = '1';
  setTimeout(() => {
    msgEl.style.opacity = '0';
  }, 1000);
}

function onDartLanded() {
  const score = calculateScore(aimX, aimY);
  state.lastScore = score;
  state.totalScore += score;
  state.dartsThrown++;
  state.dartOnBoard = true;
  
  showThrowMessage(score);
  updateHUD();
  
  // Keep the landed dart on the board
  const landedDart = activeDart.clone();
  scene.add(landedDart);
  landedDarts.push(landedDart);
  
  // Reset for next throw if darts remain
  if (state.dartsThrown < 3) {
    setTimeout(() => {
      activeDart.position.set(0, 1.7, 3.5);
      state.isThrown = false;
      state.dartOnBoard = false;
      throwAnimation = null;
    }, 500);
  } else {
    // Hide active dart
    activeDart.visible = false;
  }
}

// ============ HUD UPDATE ============
function updateHUD() {
  document.getElementById('roundDisplay').textContent = state.roundNumber;
  document.getElementById('dartsDisplay').textContent = 3 - state.dartsThrown;
  document.getElementById('lastScoreDisplay').textContent = state.lastScore;
  document.getElementById('totalScoreDisplay').textContent = state.totalScore;
}

// ============ BUTTONS ============
document.getElementById('newRoundBtn').addEventListener('click', () => {
  state.dartsThrown = 0;
  state.roundNumber++;
  state.isThrown = false;
  state.dartOnBoard = false;
  state.lastScore = 0;
  throwAnimation = null;
  
  // Remove landed darts
  landedDarts.forEach(d => scene.remove(d));
  landedDarts = [];
  
  // Reset active dart
  activeDart.visible = true;
  activeDart.position.set(0, 1.7, 3.5);
  
  updateHUD();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  state.dartsThrown = 0;
  state.totalScore = 0;
  state.lastScore = 0;
  state.roundNumber = 1;
  state.isThrown = false;
  state.dartOnBoard = false;
  throwAnimation = null;
  aimX = 0;
  aimY = 1.7;
  
  // Remove landed darts
  landedDarts.forEach(d => scene.remove(d));
  landedDarts = [];
  
  // Reset active dart
  activeDart.visible = true;
  activeDart.position.set(0, 1.7, 3.5);
  
  updateHUD();
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  const aimSpeed = 1.0;
  
  // Handle aiming
  if (!state.isThrown) {
    if (keysPressed['ArrowLeft']) aimX -= aimSpeed * delta;
    if (keysPressed['ArrowRight']) aimX += aimSpeed * delta;
    if (keysPressed['ArrowUp']) aimY += aimSpeed * delta;
    if (keysPressed['ArrowDown']) aimY -= aimSpeed * delta;
    
    // Clamp aim
    aimX = Math.max(-0.8, Math.min(0.8, aimX));
    aimY = Math.max(0.9, Math.min(2.5, aimY));
  }
  
  // Update aim sphere
  aimSphere.position.set(aimX, aimY, -2.95);
  aimSphere.visible = !state.isThrown || state.dartsThrown >= 3;
  
  // Handle throw animation
  if (throwAnimation) {
    const now = performance.now();
    const elapsed = now - throwAnimation.startTime;
    let t = Math.min(elapsed / throwAnimation.duration, 1);
    
    // Ease out
    t = 1 - Math.pow(1 - t, 3);
    
    const currentX = throwAnimation.startPos.x + (throwAnimation.endPos.x - throwAnimation.startPos.x) * t;
    const currentY = throwAnimation.startPos.y + (throwAnimation.endPos.y - throwAnimation.startPos.y) * t;
    const currentZ = throwAnimation.startPos.z + (throwAnimation.endPos.z - throwAnimation.startPos.z) * t;
    
    activeDart.position.set(currentX, currentY, currentZ);
    
    if (t >= 1 && !state.dartOnBoard) {
      onDartLanded();
    }
  }
  
  // Update state
  state.dartPositionZ = activeDart.position.z;
  state.aimX = aimX;
  state.aimY = aimY;
  
  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
updateHUD();
animate();

</script>
</body>
</html>
