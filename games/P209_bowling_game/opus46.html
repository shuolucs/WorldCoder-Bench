<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Bowling Game - Lantern Pins</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
}

#score-display {
    position: absolute;
    top: 20px; left: 20px;
    color: #FFD700;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#phase-display {
    position: absolute;
    top: 20px; right: 20px;
    color: #00BFFF;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    text-transform: uppercase;
}

#power-bar-container {
    position: absolute;
    top: 70px; left: 20px;
    width: 200px; height: 24px;
    background: rgba(0,0,0,0.6);
    border: 2px solid #FFD700;
    border-radius: 12px;
    overflow: hidden;
}

#power-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00FF00, #FFFF00, #FF4500);
    border-radius: 10px;
    transition: width 0.05s linear;
}

#power-label {
    position: absolute;
    top: 73px; left: 230px;
    color: #FFF;
    font-size: 16px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}

#instructions {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #FFF;
    font-size: 16px;
    text-align: center;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.5);
    padding: 10px 25px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
}

#message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFD700;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
    display: none;
    text-align: center;
}
</style>
</head>
<body>

<div id="hud">
    <div id="score-display">Score: 0/10</div>
    <div id="phase-display">Phase: Aiming</div>
    <div id="power-bar-container">
        <div id="power-bar"></div>
    </div>
    <div id="power-label">Power: 0%</div>
    <div id="instructions">Press SPACE to bowl | Arrows to aim | R to reset</div>
    <div id="message"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
window.__3D_STATE__ = {
    phase: 'aiming',
    ballPosition: { x: 0, y: 0.5, z: 12 },
    ballVelocity: { x: 0, y: 0, z: 0 },
    ballAimX: 0,
    pinsDown: 0,
    pinsStatus: new Array(10).fill(true),
    score: 0,
    power: 0.0,
    launched: false,
    totalPins: 10,
    resetCount: 0
};

const state = window.__3D_STATE__;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 60);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 18);
camera.lookAt(0, 0, -20);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Extra warm point lights for atmosphere
const warmLight1 = new THREE.PointLight(0xFF8C00, 0.6, 30);
warmLight1.position.set(0, 5, -25);
scene.add(warmLight1);

const warmLight2 = new THREE.PointLight(0xFF6347, 0.4, 20);
warmLight2.position.set(0, 3, -28);
scene.add(warmLight2);

// ============ BOWLING LANE ============
const laneMaterial = new THREE.MeshStandardMaterial({ color: 0xC4A36E, roughness: 0.6, metalness: 0.1 });
const laneGeometry = new THREE.BoxGeometry(4, 0.2, 40);
const lane = new THREE.Mesh(laneGeometry, laneMaterial);
lane.position.set(0, -0.1, -10);
lane.receiveShadow = true;
scene.add(lane);

// Lane lines
const lineGeometry = new THREE.BoxGeometry(0.05, 0.21, 40);
const lineMaterial = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
for (let i = -3; i <= 3; i++) {
    if (i === 0) continue;
    const line = new THREE.Mesh(lineGeometry, lineMaterial);
    line.position.set(i * 0.5, -0.1, -10);
    line.receiveShadow = true;
    scene.add(line);
}

// Foul line
const foulLineGeo = new THREE.BoxGeometry(4, 0.22, 0.05);
const foulLineMat = new THREE.MeshStandardMaterial({ color: 0xFF0000, emissive: 0x330000 });
const foulLine = new THREE.Mesh(foulLineGeo, foulLineMat);
foulLine.position.set(0, -0.1, 5);
scene.add(foulLine);

// Gutters
const gutterMaterial = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.8 });
const gutterGeometry = new THREE.BoxGeometry(0.8, 0.15, 40);

const leftGutter = new THREE.Mesh(gutterGeometry, gutterMaterial);
leftGutter.position.set(-2.4, -0.15, -10);
leftGutter.receiveShadow = true;
scene.add(leftGutter);

const rightGutter = new THREE.Mesh(gutterGeometry, gutterMaterial);
rightGutter.position.set(2.4, -0.15, -10);
rightGutter.receiveShadow = true;
scene.add(rightGutter);

// Side walls
const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.9 });
const wallGeometry = new THREE.BoxGeometry(0.2, 1.5, 40);

const leftWall = new THREE.Mesh(wallGeometry, wallMaterial);
leftWall.position.set(-3.0, 0.5, -10);
scene.add(leftWall);

const rightWall = new THREE.Mesh(wallGeometry, wallMaterial);
rightWall.position.set(3.0, 0.5, -10);
scene.add(rightWall);

// Back wall
const backWallGeo = new THREE.BoxGeometry(6.2, 2, 0.3);
const backWall = new THREE.Mesh(backWallGeo, wallMaterial);
backWall.position.set(0, 0.8, -30.5);
scene.add(backWall);

// Floor beyond lane
const floorGeo = new THREE.PlaneGeometry(50, 50);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.25;
floor.receiveShadow = true;
scene.add(floor);

// ============ BOWLING BALL ============
const ballGeometry = new THREE.SphereGeometry(0.5, 32, 32);
const ballMaterial = new THREE.MeshStandardMaterial({
    color: 0x222244,
    metalness: 0.7,
    roughness: 0.3
});
const ball = new THREE.Mesh(ballGeometry, ballMaterial);
ball.position.set(0, 0.5, 12);
ball.castShadow = true;
scene.add(ball);

// Ball finger holes
const holeGeo = new THREE.CircleGeometry(0.08, 16);
const holeMat = new THREE.MeshStandardMaterial({ color: 0x111122 });
for (let i = 0; i < 3; i++) {
    const hole = new THREE.Mesh(holeGeo, holeMat);
    const angle = (i / 3) * Math.PI * 0.6 - 0.3;
    hole.position.set(Math.sin(angle) * 0.25, 0.48 + Math.cos(angle) * 0.1, -0.05);
    hole.rotation.x = -0.3;
    ball.add(hole);
}

// ============ AIM LINE ============
const aimLineMaterial = new THREE.LineDashedMaterial({
    color: 0xFFFF00,
    dashSize: 0.5,
    gapSize: 0.3,
    linewidth: 1
});
const aimLineGeometry = new THREE.BufferGeometry();
const aimLinePoints = [];
for (let i = 0; i < 30; i++) {
    aimLinePoints.push(0, 0.05, 12 - i * 1.5);
}
aimLineGeometry.setAttribute('position', new THREE.Float32BufferAttribute(aimLinePoints, 3));
const aimLine = new THREE.Line(aimLineGeometry, aimLineMaterial);
aimLine.computeLineDistances();
scene.add(aimLine);

// ============ LANTERN PINS ============
const PIN_POSITIONS = [];
// Row 1: 1 pin at z=-25
PIN_POSITIONS.push({ x: 0, z: -25 });
// Row 2: 2 pins at z=-26.5
PIN_POSITIONS.push({ x: -0.6, z: -26.5 });
PIN_POSITIONS.push({ x: 0.6, z: -26.5 });
// Row 3: 3 pins at z=-28
PIN_POSITIONS.push({ x: -1.2, z: -28 });
PIN_POSITIONS.push({ x: 0, z: -28 });
PIN_POSITIONS.push({ x: 1.2, z: -28 });
// Row 4: 4 pins at z=-29.5
PIN_POSITIONS.push({ x: -1.8, z: -29.5 });
PIN_POSITIONS.push({ x: -0.6, z: -29.5 });
PIN_POSITIONS.push({ x: 0.6, z: -29.5 });
PIN_POSITIONS.push({ x: 1.8, z: -29.5 });

const pins = [];
const pinFallAnimations = [];
let lanternModel = null;
let lanternLoaded = false;

// Create lantern-shaped pins procedurally (as fallback and primary)
function createLanternPin() {
    const group = new THREE.Group();

    // Base
    const baseGeo = new THREE.CylinderGeometry(0.12, 0.15, 0.1, 8);
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, metalness: 0.6, roughness: 0.4 });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.position.y = 0.05;
    base.castShadow = true;
    group.add(base);

    // Bottom cap
    const bottomCapGeo = new THREE.CylinderGeometry(0.18, 0.12, 0.05, 8);
    const metalMat = new THREE.MeshStandardMaterial({ color: 0xB8860B, metalness: 0.8, roughness: 0.2 });
    const bottomCap = new THREE.Mesh(bottomCapGeo, metalMat);
    bottomCap.position.y = 0.12;
    bottomCap.castShadow = true;
    group.add(bottomCap);

    // Lantern body (translucent)
    const bodyGeo = new THREE.CylinderGeometry(0.15, 0.18, 0.45, 8);
    const bodyMat = new THREE.MeshStandardMaterial({
        color: 0xFF4500,
        emissive: 0xFF2200,
        emissiveIntensity: 0.3,
        transparent: true,
        opacity: 0.85,
        roughness: 0.5,
        metalness: 0.1
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.37;
    body.castShadow = true;
    group.add(body);

    // Inner glow
    const glowGeo = new THREE.SphereGeometry(0.1, 16, 16);
    const glowMat = new THREE.MeshStandardMaterial({
        color: 0xFFAA00,
        emissive: 0xFFAA00,
        emissiveIntensity: 1.5,
        transparent: true,
        opacity: 0.6
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.y = 0.37;
    group.add(glow);

    // Ribs (vertical bars)
    const ribGeo = new THREE.BoxGeometry(0.02, 0.45, 0.02);
    const ribMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, metalness: 0.5, roughness: 0.4 });
    for (let i = 0; i < 8; i++) {
        const rib = new THREE.Mesh(ribGeo, ribMat);
        const angle = (i / 8) * Math.PI * 2;
        rib.position.set(Math.cos(angle) * 0.17, 0.37, Math.sin(angle) * 0.17);
        rib.castShadow = true;
        group.add(rib);
    }

    // Top cap
    const topCapGeo = new THREE.CylinderGeometry(0.08, 0.15, 0.05, 8);
    const topCap = new THREE.Mesh(topCapGeo, metalMat);
    topCap.position.y = 0.62;
    topCap.castShadow = true;
    group.add(topCap);

    // Top knob
    const knobGeo = new THREE.SphereGeometry(0.06, 8, 8);
    const knob = new THREE.Mesh(knobGeo, metalMat);
    knob.position.y = 0.7;
    knob.castShadow = true;
    group.add(knob);

    // Hook
    const hookGeo = new THREE.TorusGeometry(0.04, 0.015, 8, 8, Math.PI);
    const hook = new THREE.Mesh(hookGeo, metalMat);
    hook.position.y = 0.78;
    hook.rotation.x = Math.PI;
    group.add(hook);

    // Point light inside lantern
    const pinLight = new THREE.PointLight(0xFF6600, 0.3, 3);
    pinLight.position.y = 0.37;
    group.add(pinLight);

    return group;
}

function setupPins() {
    // Clear existing pins
    pins.forEach(p => {
        if (p.mesh) scene.remove(p.mesh);
    });
    pins.length = 0;
    pinFallAnimations.length = 0;

    for (let i = 0; i < 10; i++) {
        const pinMesh = createLanternPin();
        pinMesh.position.set(PIN_POSITIONS[i].x, 0, PIN_POSITIONS[i].z);
        pinMesh.castShadow = true;
        scene.add(pinMesh);

        pins.push({
            mesh: pinMesh,
            originalPosition: { x: PIN_POSITIONS[i].x, y: 0, z: PIN_POSITIONS[i].z },
            standing: true,
            falling: false,
            fallProgress: 0,
            fallDirection: new THREE.Vector3(0, 0, -1),
            index: i
        });
    }
}

// Try loading GLB model, but use procedural pins as primary
setupPins();

// Also try to load Lantern.glb (will gracefully fail)
try {
    const loader = new GLTFLoader();
    loader.load(
        'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF-Binary/Lantern.glb',
        (gltf) => {
            lanternModel = gltf.scene;
            lanternModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            // Replace procedural pins with loaded model
            for (let i = 0; i < 10; i++) {
                scene.remove(pins[i].mesh);
                const clone = lanternModel.clone();

                // Scale to roughly 0.8 units tall
                const box = new THREE.Box3().setFromObject(clone);
                const height = box.max.y - box.min.y;
                const scale = 0.8 / height;
                clone.scale.set(scale, scale, scale);

                clone.position.set(PIN_POSITIONS[i].x, 0, PIN_POSITIONS[i].z);
                scene.add(clone);
                pins[i].mesh = clone;
            }
            lanternLoaded = true;
        },
        undefined,
        (error) => {
            console.log('GLB load failed, using procedural lantern pins');
        }
    );
} catch (e) {
    console.log('Using procedural lantern pins');
}

// ============ INPUT HANDLING ============
const keys = {};
let spaceHeld = false;
let spaceHoldStart = 0;

document.addEventListener('keydown', (e) => {
    keys[e.code] = true;

    if (e.code === 'Space' && state.phase === 'aiming' && !spaceHeld) {
        spaceHeld = true;
        spaceHoldStart = performance.now();
        e.preventDefault();
    }

    if (e.code === 'KeyR') {
        resetGame();
    }

    e.preventDefault();
});

document.addEventListener('keyup', (e) => {
    keys[e.code] = false;

    if (e.code === 'Space' && spaceHeld && state.phase === 'aiming') {
        launchBall();
        spaceHeld = false;
        e.preventDefault();
    }
});

function launchBall() {
    const holdDuration = (performance.now() - spaceHoldStart) / 1000;
    const powerFraction = Math.min(holdDuration / 2.0, 1.0);
    const speed = 0.2 + powerFraction * 0.4; // 0.2 to 0.6

    state.ballVelocity = { x: 0, y: 0, z: -speed };
    state.phase = 'rolling';
    state.launched = true;
    state.power = powerFraction;

    aimLine.visible = false;

    updateHUD();
}

function resetGame() {
    state.resetCount++;
    state.phase = 'aiming';
    state.ballPosition = { x: 0, y: 0.5, z: 12 };
    state.ballVelocity = { x: 0, y: 0, z: 0 };
    state.ballAimX = 0;
    state.pinsDown = 0;
    state.pinsStatus = new Array(10).fill(true);
    state.score = 0;
    state.power = 0;
    state.launched = false;

    ball.position.set(0, 0.5, 12);

    // Reset pins
    for (let i = 0; i < pins.length; i++) {
        const pin = pins[i];
        pin.standing = true;
        pin.falling = false;
        pin.fallProgress = 0;
        pin.mesh.position.set(pin.originalPosition.x, pin.originalPosition.y, pin.originalPosition.z);
        pin.mesh.rotation.set(0, 0, 0);
        pin.mesh.quaternion.identity();
    }

    aimLine.visible = true;
    spaceHeld = false;

    const msg = document.getElementById('message');
    msg.style.display = 'none';

    updateHUD();
}

// ============ HUD UPDATE ============
function updateHUD() {
    document.getElementById('score-display').textContent = `Score: ${state.score}/10`;
    document.getElementById('phase-display').textContent = `Phase: ${state.phase.charAt(0).toUpperCase() + state.phase.slice(1)}`;

    const powerPercent = Math.round(state.power * 100);
    document.getElementById('power-bar').style.width = `${powerPercent}%`;
    document.getElementById('power-label').textContent = `Power: ${powerPercent}%`;
}

// ============ PIN COLLISION & FALL ============
function checkBallPinCollision() {
    const ballPos = new THREE.Vector2(ball.position.x, ball.position.z);

    for (let i = 0; i < pins.length; i++) {
        const pin = pins[i];
        if (!pin.standing) continue;

        const pinPos = new THREE.Vector2(pin.mesh.position.x, pin.mesh.position.z);
        const dist = ballPos.distanceTo(pinPos);

        if (dist < 1.2) {
            knockDownPin(i, ball.position);
        }
    }
}

function knockDownPin(index, impactSource) {
    const pin = pins[index];
    if (!pin.standing) return;

    pin.standing = false;
    pin.falling = true;
    pin.fallProgress = 0;

    // Calculate fall direction away from impact
    const dir = new THREE.Vector3(
        pin.mesh.position.x - impactSource.x,
        0,
        pin.mesh.position.z - impactSource.z
    );
    if (dir.length() < 0.01) {
        dir.set(0, 0, -1);
    }
    dir.normalize();
    pin.fallDirection = dir;

    state.pinsStatus[index] = false;
    state.pinsDown = state.pinsStatus.filter(s => !s).length;
    state.score = state.pinsDown;

    updateHUD();

    // Chain reaction - check adjacent pins
    setTimeout(() => {
        for (let j = 0; j < pins.length; j++) {
            if (j === index || !pins[j].standing) continue;

            const dist = new THREE.Vector2(
                pins[j].mesh.position.x - pin.mesh.position.x,
                pins[j].mesh.position.z - pin.mesh.position.z
            ).length();

            if (dist < 1.5) {
                knockDownPin(j, pin.mesh.position);
            }
        }
    }, 100);
}

function updatePinAnimations(delta) {
    for (let i = 0; i < pins.length; i++) {
        const pin = pins[i];
        if (!pin.falling) continue;

        pin.fallProgress += delta / 0.3; // 0.3 seconds to fall

        if (pin.fallProgress >= 1.0) {
            pin.fallProgress = 1.0;
            pin.falling = false;
        }

        const angle = (Math.PI / 2) * Math.min(pin.fallProgress, 1.0);

        // Determine rotation axis (perpendicular to fall direction)
        const rotAxis = new THREE.Vector3(-pin.fallDirection.z, 0, pin.fallDirection.x).normalize();

        const quaternion = new THREE.Quaternion();
        quaternion.setFromAxisAngle(rotAxis, angle);
        pin.mesh.quaternion.copy(quaternion);

        // Move pin slightly in fall direction and down
        const fallOffset = pin.fallProgress * 0.3;
        pin.mesh.position.x = pin.originalPosition.x + pin.fallDirection.x * fallOffset;
        pin.mesh.position.y = pin.originalPosition.y - pin.fallProgress * 0.2;
        pin.mesh.position.z = pin.originalPosition.z + pin.fallDirection.z * fallOffset;
    }
}

// ============ AIM LINE UPDATE ============
function updateAimLine() {
    if (state.phase !== 'aiming') return;

    const positions = aimLine.geometry.attributes.position.array;
    for (let i = 0; i < 30; i++) {
        positions[i * 3] = state.ballAimX;
        positions[i * 3 + 1] = 0.05;
        positions[i * 3 + 2] = 12 - i * 1.5;
    }
    aimLine.geometry.attributes.position.needsUpdate = true;
    aimLine.computeLineDistances();
}

// ============ GAME LOOP ============
let lastTime = performance.now();

function gameLoop(currentTime) {
    requestAnimationFrame(gameLoop);

    const delta = Math.min((currentTime - lastTime) / 1000, 0.05);
    lastTime = currentTime;

    // Aiming phase
    if (state.phase === 'aiming') {
        if (keys['ArrowLeft']) {
            state.ballAimX = Math.max(state.ballAimX - 3 * delta, -1.5);
        }
        if (keys['ArrowRight']) {
            state.ballAimX = Math.min(state.ballAimX + 3 * delta, 1.5);
        }

        ball.position.x = state.ballAimX;
        ball.position.y = 0.5;
        ball.position.z = 12;

        // Power charging
        if (spaceHeld) {
            const holdDuration = (performance.now() - spaceHoldStart) / 1000;
            state.power = Math.min(holdDuration / 2.0, 1.0);
        } else {
            state.power = 0;
        }

        updateAimLine();
    }

    // Rolling phase
    if (state.phase === 'rolling') {
        // Apply velocity
        ball.position.x += state.ballVelocity.x;
        ball.position.y = 0.5; // Keep on lane
        ball.position.z += state.ballVelocity.z;

        // Friction
        state.ballVelocity.x *= 0.995;
        state.ballVelocity.z *= 0.995;

        // Ball rotation for visual effect
        const speed = Math.sqrt(state.ballVelocity.x ** 2 + state.ballVelocity.z ** 2);
        ball.rotation.x -= speed * 2;

        // Update state
        state.ballPosition.x = ball.position.x;
        state.ballPosition.y = ball.position.y;
        state.ballPosition.z = ball.position.z;

        // Check collisions
        checkBallPinCollision();

        // Check if ball passed end or all pins down
        if (ball.position.z < -32 || state.pinsDown === 10) {
            setTimeout(() => {
                if (state.phase === 'rolling') {
                    state.phase = 'finished';
                    updateHUD();
                    showFinishMessage();
                }
            }, state.pinsDown === 10 ? 500 : 200);
        }

        // Ball out of bounds (gutters)
        if (Math.abs(ball.position.x) > 2.0) {
            // Ball in gutter, let it keep rolling but it won't hit pins
        }
    }

    // Update pin fall animations
    updatePinAnimations(delta);

    // Update state object
    state.ballPosition.x = ball.position.x;
    state.ballPosition.y = ball.position.y;
    state.ballPosition.z = ball.position.z;

    // Update power bar continuously
    const powerPercent = Math.round(state.power * 100);
    document.getElementById('power-bar').style.width = `${powerPercent}%`;
    document.getElementById('power-label').textContent = `Power: ${powerPercent}%`;

    // Animate pin lights (flickering)
    const time = currentTime * 0.001;
    pins.forEach((pin, i) => {
        if (pin.standing) {
            pin.mesh.children.forEach(child => {
                if (child.isPointLight) {
                    child.intensity = 0.3 + Math.sin(time * 3 + i) * 0.1;
                }
            });
        }
    });

    // Camera follow during rolling
    if (state.phase === 'rolling') {
        const targetCamZ = Math.max(ball.position.z + 8, -5);
        camera.position.z += (targetCamZ - camera.position.z) * 0.03;
        camera.lookAt(ball.position.x * 0.5, 0, ball.position.z - 10);
    } else if (state.phase === 'aiming') {
        camera.position.set(0, 8, 18);
        camera.lookAt(0, 0, -20);
    }

    renderer.render(scene, camera);
}

function showFinishMessage() {
    const msg = document.getElementById('message');
    if (state.pinsDown === 10) {
        msg.textContent = '🎳 STRIKE! 🎳\nPress R to play again';
    } else if (state.pinsDown >= 7) {
        msg.textContent = `Great! ${state.pinsDown}/10 pins!\nPress R to play again`;
    } else if (state.pinsDown > 0) {
        msg.textContent = `${state.pinsDown}/10 pins down\nPress R to play again`;
    } else {
        msg.textContent = 'Gutter ball!\nPress R to try again';
    }
    msg.style.display = 'block';
    msg.style.whiteSpace = 'pre-line';
}

// ============ WINDOW RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
updateHUD();
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
