<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Bowling with Lantern Pins</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      z-index: 10;
    }

    #score-display {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 24px;
      font-weight: bold;
    }

    #phase-display {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 24px;
      font-weight: bold;
      text-transform: capitalize;
    }

    #power-bar-container {
      position: absolute;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 20px;
      border: 2px solid white;
      background: rgba(255,255,255,0.1);
    }

    #power-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4caf50, #ffc107, #f44336);
    }

    #instructions {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      text-align: center;
      background: rgba(0,0,0,0.35);
      padding: 8px 14px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score-display">Score: 0/10</div>
    <div id="phase-display">Phase: aiming</div>
    <div id="power-bar-container">
      <div id="power-bar"></div>
    </div>
    <div id="instructions">Press SPACE to bowl | Arrows to aim | R to reset</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20252f);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 18);
    camera.lookAt(0, 0, -20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 80;
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    scene.add(dirLight);

    const laneGroup = new THREE.Group();
    scene.add(laneGroup);

    const laneMat = new THREE.MeshStandardMaterial({ color: '#C4A36E' });
    const gutterMat = new THREE.MeshStandardMaterial({ color: '#5a4a35' });

    const lane = new THREE.Mesh(
      new THREE.BoxGeometry(4, 0.2, 40),
      laneMat
    );
    lane.position.set(0, -0.1, -10);
    lane.receiveShadow = true;
    lane.castShadow = false;
    laneGroup.add(lane);

    const leftGutter = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 0.3, 40),
      gutterMat
    );
    leftGutter.position.set(-2.4, -0.15, -10);
    leftGutter.receiveShadow = true;
    laneGroup.add(leftGutter);

    const rightGutter = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 0.3, 40),
      gutterMat
    );
    rightGutter.position.set(2.4, -0.15, -10);
    rightGutter.receiveShadow = true;
    laneGroup.add(rightGutter);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(80, 80),
      new THREE.MeshStandardMaterial({ color: 0x2c2c2c, roughness: 0.9 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.21;
    floor.receiveShadow = true;
    scene.add(floor);

    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 32, 32),
      new THREE.MeshStandardMaterial({
        color: '#222244',
        metalness: 0.7,
        roughness: 0.3
      })
    );
    ball.position.set(0, 0.5, 12);
    ball.castShadow = true;
    ball.receiveShadow = true;
    scene.add(ball);

    const aimLineMaterial = new THREE.LineDashedMaterial({
      color: 0xffffff,
      dashSize: 0.5,
      gapSize: 0.3,
      transparent: true,
      opacity: 0.9
    });
    const aimLineGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0.51, 12),
      new THREE.Vector3(0, 0.51, -30)
    ]);
    const aimLine = new THREE.Line(aimLineGeometry, aimLineMaterial);
    aimLine.computeLineDistances();
    scene.add(aimLine);

    const scoreDisplay = document.getElementById('score-display');
    const phaseDisplay = document.getElementById('phase-display');
    const powerBar = document.getElementById('power-bar');

    const clock = new THREE.Clock();

    const game = {
      phase: 'aiming',
      ballVelocity: new THREE.Vector3(0, 0, 0),
      ballAimX: 0,
      pinsDown: 0,
      score: 0,
      power: 0,
      launched: false,
      totalPins: 10,
      resetCount: 0,
      charging: false,
      chargeStartTime: 0,
      pins: [],
      pinBasePositions: [],
      modelLoaded: false
    };

    window.__3D_STATE__ = {
      phase: 'aiming',
      ballPosition: { x: 0, y: 0.5, z: 12 },
      ballVelocity: { x: 0, y: 0, z: 0 },
      ballAimX: 0,
      pinsDown: 0,
      pinsStatus: new Array(10).fill(true),
      score: 0,
      power: 0,
      launched: false,
      totalPins: 10,
      resetCount: 0
    };

    function syncState() {
      window.__3D_STATE__.phase = game.phase;
      window.__3D_STATE__.ballPosition = {
        x: ball.position.x,
        y: ball.position.y,
        z: ball.position.z
      };
      window.__3D_STATE__.ballVelocity = {
        x: game.ballVelocity.x,
        y: game.ballVelocity.y,
        z: game.ballVelocity.z
      };
      window.__3D_STATE__.ballAimX = game.ballAimX;
      window.__3D_STATE__.pinsDown = game.pinsDown;
      window.__3D_STATE__.pinsStatus = game.pins.map(p => !p.fallen);
      window.__3D_STATE__.score = game.score;
      window.__3D_STATE__.power = game.power;
      window.__3D_STATE__.launched = game.launched;
      window.__3D_STATE__.totalPins = game.totalPins;
      window.__3D_STATE__.resetCount = game.resetCount;
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${game.score}/10`;
      phaseDisplay.textContent = `Phase: ${game.phase}`;
      powerBar.style.width = `${Math.max(0, Math.min(1, game.power)) * 100}%`;
    }

    function updateAimLine() {
      const points = [
        new THREE.Vector3(ball.position.x, 0.51, ball.position.z),
        new THREE.Vector3(ball.position.x, 0.51, -30)
      ];
      aimLine.geometry.dispose();
      aimLine.geometry = new THREE.BufferGeometry().setFromPoints(points);
      aimLine.computeLineDistances();
      aimLine.visible = game.phase === 'aiming';
    }

    function createFallbackLantern() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.22, 0.28, 0.55, 16),
        new THREE.MeshStandardMaterial({ color: 0xd8a84b, metalness: 0.2, roughness: 0.7 })
      );
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const top = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.22, 0.12, 16),
        new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.4 })
      );
      top.position.y = 0.34;
      top.castShadow = true;
      group.add(top);

      const bottom = new THREE.Mesh(
        new THREE.CylinderGeometry(0.16, 0.2, 0.08, 16),
        new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.4 })
      );
      bottom.position.y = -0.32;
      bottom.castShadow = true;
      group.add(bottom);

      const handle = new THREE.Mesh(
        new THREE.TorusGeometry(0.13, 0.02, 8, 24, Math.PI),
        new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.7, roughness: 0.3 })
      );
      handle.rotation.z = Math.PI;
      handle.position.y = 0.47;
      handle.castShadow = true;
      group.add(handle);

      return group;
    }

    function getPinPositions() {
      const positions = [];
      const spacing = 1.2;

      const rows = [
        { count: 1, z: -25 },
        { count: 2, z: -26.5 },
        { count: 3, z: -28 },
        { count: 4, z: -29.5 }
      ];

      for (const row of rows) {
        const offsetStart = -((row.count - 1) * spacing) / 2;
        for (let i = 0; i < row.count; i++) {
          positions.push(new THREE.Vector3(offsetStart + i * spacing, 0, row.z));
        }
      }

      return positions;
    }

    function normalizeModelToHeight(root, targetHeight = 0.8) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const currentHeight = size.y || 1;
      const scale = targetHeight / currentHeight;
      root.scale.setScalar(scale);

      const box2 = new THREE.Box3().setFromObject(root);
      const minY = box2.min.y;
      root.position.y -= minY;
    }

    function buildPins(pinTemplate) {
      game.pins.forEach(pin => scene.remove(pin.root));
      game.pins = [];
      game.pinBasePositions = [];

      const positions = getPinPositions();

      positions.forEach((pos, index) => {
        const pinRoot = pinTemplate.clone(true);
        pinRoot.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        pinRoot.position.set(pos.x, 0, pos.z);
        scene.add(pinRoot);

        game.pins.push({
          index,
          root: pinRoot,
          standingPos: pos.clone(),
          fallen: false,
          isAnimatingFall: false,
          fallProgress: 0,
          startRotX: 0,
          targetRotX: Math.PI / 2
        });

        game.pinBasePositions.push(pos.clone());
      });

      game.modelLoaded = true;
      syncState();
      updateHUD();
    }

    const loader = new GLTFLoader();
    loader.load(
      'Lantern.glb',
      (gltf) => {
        const template = gltf.scene;
        normalizeModelToHeight(template, 0.8);
        buildPins(template);
      },
      undefined,
      () => {
        const fallback = createFallbackLantern();
        normalizeModelToHeight(fallback, 0.8);
        buildPins(fallback);
      }
    );

    function knockDownPin(index) {
      const pin = game.pins[index];
      if (!pin || pin.fallen) return;

      pin.fallen = true;
      pin.isAnimatingFall = true;
      pin.fallProgress = 0;
      pin.startRotX = pin.root.rotation.x;
      pin.targetRotX = pin.startRotX + Math.PI / 2;

      game.pinsDown += 1;
      game.score = game.pinsDown;

      const origin = pin.root.position.clone();

      for (let i = 0; i < game.pins.length; i++) {
        if (i === index) continue;
        const other = game.pins[i];
        if (other.fallen) continue;

        const dx = other.root.position.x - origin.x;
        const dz = other.root.position.z - origin.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist <= 1.5) {
          setTimeout(() => {
            knockDownPin(i);
          }, 80);
        }
      }
    }

    function resetGame() {
      game.phase = 'aiming';
      game.ballVelocity.set(0, 0, 0);
      game.ballAimX = 0;
      game.pinsDown = 0;
      game.score = 0;
      game.power = 0;
      game.launched = false;
      game.charging = false;
      game.chargeStartTime = 0;
      game.resetCount += 1;

      ball.position.set(0, 0.5, 12);
      ball.rotation.set(0, 0, 0);

      game.pins.forEach((pin, i) => {
        pin.fallen = false;
        pin.isAnimatingFall = false;
        pin.fallProgress = 0;
        pin.root.rotation.set(0, 0, 0);
        pin.root.position.copy(game.pinBasePositions[i]);
      });

      updateAimLine();
      updateHUD();
      syncState();
    }

    let spaceHeld = false;

    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft' && game.phase === 'aiming') {
        game.ballAimX = Math.max(-1.5, game.ballAimX - 0.15);
        ball.position.x = game.ballAimX;
        updateAimLine();
      }

      if (e.code === 'ArrowRight' && game.phase === 'aiming') {
        game.ballAimX = Math.min(1.5, game.ballAimX + 0.15);
        ball.position.x = game.ballAimX;
        updateAimLine();
      }

      if (e.code === 'Space' && game.phase === 'aiming' && !spaceHeld) {
        e.preventDefault();
        spaceHeld = true;
        game.charging = true;
        game.chargeStartTime = performance.now();
      }

      if (e.code === 'KeyR') {
        resetGame();
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space' && game.phase === 'aiming' && spaceHeld) {
        e.preventDefault();
        spaceHeld = false;
        game.charging = false;

        const launchSpeed = 0.2 + game.power * 0.4;
        game.ballVelocity.set(0, 0, -launchSpeed);
        game.phase = 'rolling';
        game.launched = true;
        aimLine.visible = false;
      }
    });

    function updateCharging(now) {
      if (game.charging && game.phase === 'aiming') {
        const elapsed = (now - game.chargeStartTime) / 1000;
        game.power = Math.min(elapsed / 2, 1);
      } else if (game.phase === 'aiming' && !spaceHeld) {
        game.power = 0;
      }
    }

    function updateBall() {
      if (game.phase !== 'rolling') return;

      ball.position.add(game.ballVelocity);
      game.ballVelocity.multiplyScalar(0.995);

      const laneMinX = -1.9;
      const laneMaxX = 1.9;
      ball.position.x = THREE.MathUtils.clamp(ball.position.x, laneMinX, laneMaxX);

      ball.rotation.x -= game.ballVelocity.z * 0.8;
      ball.rotation.z += game.ballVelocity.x * 0.8;

      for (let i = 0; i < game.pins.length; i++) {
        const pin = game.pins[i];
        if (pin.fallen) continue;

        const dx = ball.position.x - pin.root.position.x;
        const dz = ball.position.z - pin.root.position.z;
        const distXZ = Math.sqrt(dx * dx + dz * dz);

        if (distXZ < 1.2) {
          knockDownPin(i);
        }
      }

      if (game.pinsDown >= game.totalPins || ball.position.z < -32) {
        game.phase = 'finished';
        game.ballVelocity.set(0, 0, 0);
      }
    }

    function updatePins(delta) {
      for (const pin of game.pins) {
        if (pin.isAnimatingFall) {
          pin.fallProgress += delta / 0.3;
          const t = Math.min(pin.fallProgress, 1);
          const eased = 1 - Math.pow(1 - t, 3);
          pin.root.rotation.x = THREE.MathUtils.lerp(pin.startRotX, pin.targetRotX, eased);

          if (t >= 1) {
            pin.isAnimatingFall = false;
          }
        }
      }
    }

    function animate(now) {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      updateCharging(now);
      updateBall();
      updatePins(delta);
      updateHUD();
      syncState();

      renderer.render(scene, camera);
    }

    updateAimLine();
    updateHUD();
    syncState();
    animate(performance.now());

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
