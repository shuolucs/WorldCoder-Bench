<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Fractal Tree Generator</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0f1020;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #controlPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 10, 20, 0.75);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px;
      min-width: 220px;
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #controlPanel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
    }

    .row {
      margin: 8px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .label {
      min-width: 180px;
      font-size: 14px;
    }

    button {
      background: #2d3a66;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #3e4f8c;
    }

    #info {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 10, 20, 0.65);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: #d7defa;
    }
  </style>
</head>
<body>
  <div id="controlPanel">
    <h3>Fractal Tree Controls</h3>

    <div class="row">
      <div class="label" id="depthLabel">Recursion Depth: 3</div>
      <button id="btnDecreaseDepth">-</button>
      <button id="btnIncreaseDepth">+</button>
    </div>

    <div class="row">
      <div class="label" id="angleLabel">Spread Angle: 30deg</div>
      <button id="btnDecreaseAngle">-</button>
      <button id="btnIncreaseAngle">+</button>
    </div>

    <div class="row">
      <button id="btnToggleLeaves">Toggle Leaves</button>
      <button id="btnRandomize">Randomize Colors</button>
    </div>

    <div class="row">
      <button id="btnReset">Reset</button>
    </div>

    <div class="row">
      <div class="label" id="branchCount">Total Branches: 0</div>
    </div>
  </div>

  <div id="info">
    ArrowUp / ArrowDown = depth, L = leaves, R = reset
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

    // -----------------------------
    // Scene Setup
    // -----------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 5, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 80;
    dirLight.shadow.camera.left = -30;
    dirLight.shadow.camera.right = 30;
    dirLight.shadow.camera.top = 30;
    dirLight.shadow.camera.bottom = -30;
    scene.add(dirLight);

    const groundGeo = new THREE.PlaneGeometry(50, 50);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // -----------------------------
    // State
    // -----------------------------
    const DEFAULTS = {
      recursionDepth: 3,
      spreadAngle: 30,
      leavesVisible: true
    };

    let recursionDepth = DEFAULTS.recursionDepth;
    let spreadAngle = DEFAULTS.spreadAngle;
    let leavesVisible = DEFAULTS.leavesVisible;
    let colorsRandomized = false;

    let totalBranches = 0;
    let totalLeaves = 0;
    let treeHeight = 0;

    const treeGroup = new THREE.Group();
    scene.add(treeGroup);

    const branchMeshes = [];
    const leafMeshes = [];

    let highestBranchTip = new THREE.Vector3(0, 4, 0);

    const branchMaterialBaseColor = new THREE.Color(0x8B4513);
    let branchMaterialColor = branchMaterialBaseColor.clone();
    const leafMaterialColor = new THREE.Color(0x228B22);

    const clock = new THREE.Clock();
    let mixer = null;
    let parrot = null;
    let parrotLoaded = false;
    let isAnimating = false;

    window.__3D_STATE__ = {
      recursionDepth,
      spreadAngle,
      totalBranches,
      totalLeaves,
      leavesVisible,
      parrotLoaded,
      parrotPosition: { x: 0, y: 0, z: 0 },
      colorsRandomized,
      treeHeight,
      isAnimating
    };

    // -----------------------------
    // UI Elements
    // -----------------------------
    const depthLabel = document.getElementById('depthLabel');
    const angleLabel = document.getElementById('angleLabel');
    const branchCountLabel = document.getElementById('branchCount');

    const btnIncreaseDepth = document.getElementById('btnIncreaseDepth');
    const btnDecreaseDepth = document.getElementById('btnDecreaseDepth');
    const btnIncreaseAngle = document.getElementById('btnIncreaseAngle');
    const btnDecreaseAngle = document.getElementById('btnDecreaseAngle');
    const btnToggleLeaves = document.getElementById('btnToggleLeaves');
    const btnRandomize = document.getElementById('btnRandomize');
    const btnReset = document.getElementById('btnReset');

    function updateUI() {
      depthLabel.textContent = `Recursion Depth: ${recursionDepth}`;
      angleLabel.textContent = `Spread Angle: ${spreadAngle}deg`;
      branchCountLabel.textContent = `Total Branches: ${totalBranches}`;
    }

    function updateState() {
      let parrotPos = { x: 0, y: 0, z: 0 };
      if (parrot) {
        const wp = new THREE.Vector3();
        parrot.getWorldPosition(wp);
        parrotPos = {
          x: Number(wp.x.toFixed(3)),
          y: Number(wp.y.toFixed(3)),
          z: Number(wp.z.toFixed(3))
        };
      }

      window.__3D_STATE__ = {
        recursionDepth,
        spreadAngle,
        totalBranches,
        totalLeaves,
        leavesVisible,
        parrotLoaded,
        parrotPosition: parrotPos,
        colorsRandomized,
        treeHeight,
        isAnimating
      };
    }

    // -----------------------------
    // Tree Generation
    // -----------------------------
    const tempQuat = new THREE.Quaternion();
    const worldUp = new THREE.Vector3(0, 1, 0);

    function clearTree() {
      while (treeGroup.children.length > 0) {
        const child = treeGroup.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) {
            child.material.forEach(m => m.dispose());
          } else {
            child.material.dispose();
          }
        }
      }

      branchMeshes.length = 0;
      leafMeshes.length = 0;
      totalBranches = 0;
      totalLeaves = 0;
      treeHeight = 0;
      highestBranchTip.set(0, 4, 0);
    }

    function createBranch(start, direction, length, radius, level) {
      totalBranches++;

      const end = start.clone().add(direction.clone().multiplyScalar(length));

      const geometry = new THREE.CylinderGeometry(radius * 0.6, radius, length, 8);
      const color = colorsRandomized
        ? new THREE.Color().setHSL(Math.random(), 0.55, 0.35)
        : branchMaterialColor.clone();

      const material = new THREE.MeshStandardMaterial({ color });
      const branch = new THREE.Mesh(geometry, material);
      branch.castShadow = true;
      branch.receiveShadow = true;

      const mid = start.clone().add(end).multiplyScalar(0.5);
      branch.position.copy(mid);

      tempQuat.setFromUnitVectors(worldUp, direction.clone().normalize());
      branch.quaternion.copy(tempQuat);

      treeGroup.add(branch);
      branchMeshes.push(branch);

      if (end.y > highestBranchTip.y) {
        highestBranchTip.copy(end);
      }
      if (end.y > treeHeight) {
        treeHeight = end.y;
      }

      if (level >= recursionDepth) {
        if (leavesVisible) {
          const leafGeo = new THREE.SphereGeometry(0.3, 10, 10);
          const leafMat = new THREE.MeshStandardMaterial({ color: leafMaterialColor });
          const leaf = new THREE.Mesh(leafGeo, leafMat);
          leaf.position.copy(end);
          leaf.castShadow = true;
          leaf.receiveShadow = true;
          treeGroup.add(leaf);
          leafMeshes.push(leaf);
          totalLeaves++;
        }
        return;
      }

      const childCount = Math.random() < 0.5 ? 2 : 3;
      const spreadRad = THREE.MathUtils.degToRad(spreadAngle);

      for (let i = 0; i < childCount; i++) {
        const childDir = direction.clone().normalize();

        const axis1 = new THREE.Vector3(
          Math.random() * 2 - 1,
          Math.random() * 0.3,
          Math.random() * 2 - 1
        ).normalize();

        const axis2 = direction.clone().normalize();
        const twist = ((i / childCount) * Math.PI * 2) + (Math.random() - 0.5) * 0.5;

        childDir.applyAxisAngle(axis1, spreadRad);
        childDir.applyAxisAngle(axis2, twist);
        childDir.normalize();

        createBranch(
          end,
          childDir,
          length * 0.7,
          radius * 0.6,
          level + 1
        );
      }
    }

    function regenerateTree() {
      clearTree();

      createBranch(
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 1, 0),
        4.0,
        0.5,
        1
      );

      leafMeshes.forEach(leaf => {
        leaf.visible = leavesVisible;
      });

      placeParrot();
      updateUI();
      updateState();
    }

    // -----------------------------
    // Parrot Loading / Placement
    // -----------------------------
    const loader = new GLTFLoader();

    loader.load(
      'Parrot.glb',
      (gltf) => {
        parrot = gltf.scene;
        parrot.scale.set(0.03, 0.03, 0.03);
        parrot.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(parrot);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(parrot);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
          isAnimating = true;
        } else {
          isAnimating = false;
        }

        parrotLoaded = true;
        placeParrot();
        updateState();
      },
      undefined,
      (err) => {
        console.warn('Failed to load Parrot.glb:', err);
        parrotLoaded = false;
        isAnimating = false;
        updateState();
      }
    );

    function placeParrot() {
      if (!parrot) return;

      parrot.position.copy(highestBranchTip);
      parrot.position.y += 0.15;
      parrot.lookAt(
        highestBranchTip.x + 1,
        highestBranchTip.y,
        highestBranchTip.z
      );
      updateState();
    }

    // -----------------------------
    // Controls
    // -----------------------------
    function increaseDepth() {
      recursionDepth = Math.min(7, recursionDepth + 1);
      regenerateTree();
    }

    function decreaseDepth() {
      recursionDepth = Math.max(1, recursionDepth - 1);
      regenerateTree();
    }

    function increaseAngle() {
      spreadAngle = Math.min(60, spreadAngle + 5);
      regenerateTree();
    }

    function decreaseAngle() {
      spreadAngle = Math.max(10, spreadAngle - 5);
      regenerateTree();
    }

    function toggleLeaves() {
      leavesVisible = !leavesVisible;
      leafMeshes.forEach(leaf => leaf.visible = leavesVisible);
      updateState();
    }

    function randomizeColors() {
      colorsRandomized = true;
      regenerateTree();
    }

    function resetAll() {
      recursionDepth = DEFAULTS.recursionDepth;
      spreadAngle = DEFAULTS.spreadAngle;
      leavesVisible = DEFAULTS.leavesVisible;
      colorsRandomized = false;
      branchMaterialColor = branchMaterialBaseColor.clone();
      regenerateTree();
    }

    btnIncreaseDepth.addEventListener('click', increaseDepth);
    btnDecreaseDepth.addEventListener('click', decreaseDepth);
    btnIncreaseAngle.addEventListener('click', increaseAngle);
    btnDecreaseAngle.addEventListener('click', decreaseAngle);
    btnToggleLeaves.addEventListener('click', toggleLeaves);
    btnRandomize.addEventListener('click', randomizeColors);
    btnReset.addEventListener('click', resetAll);

    window.addEventListener('keydown', (event) => {
      switch (event.key) {
        case 'ArrowUp':
          increaseDepth();
          break;
        case 'ArrowDown':
          decreaseDepth();
          break;
        case 'l':
        case 'L':
          toggleLeaves();
          break;
        case 'r':
        case 'R':
          resetAll();
          break;
      }
    });

    // -----------------------------
    // Resize
    // -----------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // -----------------------------
    // Initial Build
    // -----------------------------
    regenerateTree();

    // -----------------------------
    // Animation Loop
    // -----------------------------
    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (mixer) {
        mixer.update(delta);
        isAnimating = true;
      } else {
        isAnimating = false;
      }

      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
