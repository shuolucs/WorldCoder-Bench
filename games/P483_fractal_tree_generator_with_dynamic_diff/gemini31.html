<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fractal Tree Generator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #controlPanel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(15, 15, 25, 0.85);
            color: #e0e0e0;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #3a3a5a;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .control-group {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .control-label {
            display: inline-block;
            width: 170px;
            font-size: 14px;
        }
        button {
            background: #3a3a5a;
            color: white;
            border: 1px solid #5a5a7a;
            border-radius: 4px;
            padding: 4px 10px;
            margin-right: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #4a4a6a;
        }
        button:active {
            background: #2a2a4a;
        }
        .action-btn {
            margin-top: 5px;
            width: 100%;
            margin-right: 0;
            margin-bottom: 5px;
        }
        #branchCount {
            margin-top: 15px;
            font-size: 13px;
            color: #aaa;
            border-top: 1px solid #3a3a5a;
            padding-top: 10px;
        }
        .instructions {
            font-size: 11px;
            color: #888;
            margin-top: 10px;
            line-height: 1.4;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="controlPanel">
        <div class="control-group">
            <span class="control-label" id="depthLabel">Recursion Depth: 3</span>
            <button id="btnDecreaseDepth">-</button>
            <button id="btnIncreaseDepth">+</button>
        </div>
        <div class="control-group">
            <span class="control-label" id="angleLabel">Spread Angle: 30deg</span>
            <button id="btnDecreaseAngle">-</button>
            <button id="btnIncreaseAngle">+</button>
        </div>
        <button class="action-btn" id="btnToggleLeaves">Toggle Leaves (L)</button>
        <button class="action-btn" id="btnRandomize">Randomize Colors</button>
        <button class="action-btn" id="btnReset">Reset (R)</button>
        
        <div id="branchCount">Branches: 0 | Leaves: 0</div>
        
        <div class="instructions">
            Controls: Left Click to Rotate, Right Click to Pan, Scroll to Zoom.<br>
            Keyboard: Up/Down Arrows for Depth.
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            recursionDepth: 3,
            spreadAngle: 30,
            totalBranches: 0,
            totalLeaves: 0,
            leavesVisible: true,
            parrotLoaded: false,
            parrotPosition: { x: 0, y: 0, z: 0 },
            colorsRandomized: false,
            treeHeight: 0,
            isAnimating: false
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 5, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 25;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x2d5a27,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Tree Generation ---
        const treeGroup = new THREE.Group();
        scene.add(treeGroup);

        const matBrown = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
        const matGreen = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.7 });
        const leafGeo = new THREE.SphereGeometry(0.3, 8, 8);

        let highestPos = new THREE.Vector3();

        function clearTree() {
            treeGroup.traverse((child) => {
                if (child.isMesh) {
                    child.geometry.dispose();
                    if (child.material !== matBrown && child.material !== matGreen) {
                        child.material.dispose();
                    }
                }
            });
            treeGroup.clear();
        }

        function buildBranch(parent, level, length, radius, angle, randomize) {
            window.__3D_STATE__.totalBranches++;
            
            const geo = new THREE.CylinderGeometry(radius * 0.6, radius, length, 8);
            geo.translate(0, length / 2, 0);
            
            let mat = matBrown;
            if (randomize) {
                mat = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color().setHSL(Math.random(), 0.7, 0.4),
                    roughness: 0.9
                });
            }

            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            parent.add(mesh);

            if (level > 0) {
                const splitGroup = new THREE.Group();
                splitGroup.position.y = length;
                splitGroup.rotation.y = Math.PI / 2; // Twist to make it 3D
                mesh.add(splitGroup);

                const child1 = new THREE.Group();
                child1.rotation.z = angle;
                splitGroup.add(child1);
                buildBranch(child1, level - 1, length * 0.7, radius * 0.6, angle, randomize);

                const child2 = new THREE.Group();
                child2.rotation.z = -angle;
                splitGroup.add(child2);
                buildBranch(child2, level - 1, length * 0.7, radius * 0.6, angle, randomize);
            } else {
                if (window.__3D_STATE__.leavesVisible) {
                    window.__3D_STATE__.totalLeaves++;
                    const leaf = new THREE.Mesh(leafGeo, matGreen);
                    leaf.position.y = length;
                    leaf.castShadow = true;
                    mesh.add(leaf);
                }
            }
        }

        function findHighestPoint() {
            let maxWorldY = -Infinity;
            highestPos.set(0, 0, 0);
            
            treeGroup.updateMatrixWorld(true);
            
            treeGroup.traverse((child) => {
                if (child.isMesh && child.geometry.type === 'CylinderGeometry') {
                    const len = child.geometry.parameters.height;
                    const pos = new THREE.Vector3(0, len, 0);
                    child.localToWorld(pos);
                    if (pos.y > maxWorldY) {
                        maxWorldY = pos.y;
                        highestPos.copy(pos);
                    }
                }
            });
            window.__3D_STATE__.treeHeight = maxWorldY;
        }

        function generateTree() {
            clearTree();
            window.__3D_STATE__.totalBranches = 0;
            window.__3D_STATE__.totalLeaves = 0;

            const depth = window.__3D_STATE__.recursionDepth;
            const angle = THREE.MathUtils.degToRad(window.__3D_STATE__.spreadAngle);
            const randomize = window.__3D_STATE__.colorsRandomized;

            buildBranch(treeGroup, depth, 4.0, 0.5, angle, randomize);
            
            findHighestPoint();
            updateParrotPosition();
            updateUI();
        }

        // --- Parrot ---
        let parrot, mixer;
        const loader = new GLTFLoader();
        loader.load('https://cdn.jsdelivr.net/npm/three@0.163.0/examples/models/gltf/Parrot.glb', (gltf) => {
            parrot = gltf.scene;
            parrot.scale.set(0.03, 0.03, 0.03);
            
            parrot.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(parrot);
            
            mixer = new THREE.AnimationMixer(parrot);
            if (gltf.animations && gltf.animations.length > 0) {
                mixer.clipAction(gltf.animations[0]).play();
                window.__3D_STATE__.isAnimating = true;
            }
            
            window.__3D_STATE__.parrotLoaded = true;
            updateParrotPosition();
        });

        function updateParrotPosition() {
            if (parrot && highestPos) {
                parrot.position.copy(highestPos);
                window.__3D_STATE__.parrotPosition = { x: highestPos.x, y: highestPos.y, z: highestPos.z };
            }
        }

        // --- UI & Interaction ---
        const depthLabel = document.getElementById('depthLabel');
        const angleLabel = document.getElementById('angleLabel');
        const branchCountLabel = document.getElementById('branchCount');

        function updateUI() {
            depthLabel.innerText = `Recursion Depth: ${window.__3D_STATE__.recursionDepth}`;
            angleLabel.innerText = `Spread Angle: ${window.__3D_STATE__.spreadAngle}deg`;
            branchCountLabel.innerText = `Branches: ${window.__3D_STATE__.totalBranches} | Leaves: ${window.__3D_STATE__.totalLeaves}`;
        }

        function setDepth(val) {
            window.__3D_STATE__.recursionDepth = THREE.MathUtils.clamp(val, 1, 7);
            generateTree();
        }

        function setAngle(val) {
            window.__3D_STATE__.spreadAngle = THREE.MathUtils.clamp(val, 10, 60);
            generateTree();
        }

        document.getElementById('btnIncreaseDepth').addEventListener('click', () => setDepth(window.__3D_STATE__.recursionDepth + 1));
        document.getElementById('btnDecreaseDepth').addEventListener('click', () => setDepth(window.__3D_STATE__.recursionDepth - 1));
        
        document.getElementById('btnIncreaseAngle').addEventListener('click', () => setAngle(window.__3D_STATE__.spreadAngle + 5));
        document.getElementById('btnDecreaseAngle').addEventListener('click', () => setAngle(window.__3D_STATE__.spreadAngle - 5));

        document.getElementById('btnToggleLeaves').addEventListener('click', () => {
            window.__3D_STATE__.leavesVisible = !window.__3D_STATE__.leavesVisible;
            generateTree();
        });

        document.getElementById('btnRandomize').addEventListener('click', () => {
            window.__3D_STATE__.colorsRandomized = !window.__3D_STATE__.colorsRandomized;
            generateTree();
        });

        function resetParams() {
            window.__3D_STATE__.recursionDepth = 3;
            window.__3D_STATE__.spreadAngle = 30;
            window.__3D_STATE__.leavesVisible = true;
            window.__3D_STATE__.colorsRandomized = false;
            generateTree();
        }
        document.getElementById('btnReset').addEventListener('click', resetParams);

        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': setDepth(window.__3D_STATE__.recursionDepth + 1); break;
                case 'ArrowDown': setDepth(window.__3D_STATE__.recursionDepth - 1); break;
                case 'l': case 'L': 
                    window.__3D_STATE__.leavesVisible = !window.__3D_STATE__.leavesVisible;
                    generateTree();
                    break;
                case 'r': case 'R': resetParams(); break;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization & Loop ---
        generateTree();

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            
            controls.update();

            if (parrot) {
                window.__3D_STATE__.parrotPosition.x = parrot.position.x;
                window.__3D_STATE__.parrotPosition.y = parrot.position.y;
                window.__3D_STATE__.parrotPosition.z = parrot.position.z;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
