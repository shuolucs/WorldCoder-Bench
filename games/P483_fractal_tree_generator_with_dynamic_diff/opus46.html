<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fractal Tree Generator</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
canvas { display: block; }
#controlPanel {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    padding: 15px;
    border-radius: 10px;
    min-width: 220px;
    z-index: 100;
}
#controlPanel h3 {
    margin: 0 0 10px 0;
    text-align: center;
    color: #88ccff;
}
.control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 8px 0;
}
.control-row label {
    font-size: 13px;
    flex: 1;
}
.control-row button {
    width: 30px;
    height: 30px;
    margin: 0 2px;
    border: none;
    border-radius: 5px;
    background: #445;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
}
.control-row button:hover { background: #667; }
.action-btn {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
    border: none;
    border-radius: 5px;
    background: #336;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
}
.action-btn:hover { background: #558; }
#branchCount {
    font-size: 12px;
    color: #aaa;
    margin-top: 10px;
    text-align: center;
}
</style>
</head>
<body>

<div id="controlPanel">
    <h3>🌳 Fractal Tree</h3>
    <div class="control-row">
        <label id="depthLabel">Recursion Depth: 3</label>
        <button id="btnDecreaseDepth">-</button>
        <button id="btnIncreaseDepth">+</button>
    </div>
    <div class="control-row">
        <label id="angleLabel">Spread Angle: 30°</label>
        <button id="btnDecreaseAngle">-</button>
        <button id="btnIncreaseAngle">+</button>
    </div>
    <button class="action-btn" id="btnToggleLeaves">Toggle Leaves</button>
    <button class="action-btn" id="btnRandomize">Randomize Colors</button>
    <button class="action-btn" id="btnReset">Reset</button>
    <div id="branchCount">Branches: 0 | Leaves: 0</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    recursionDepth: 3,
    spreadAngle: 30,
    totalBranches: 0,
    totalLeaves: 0,
    leavesVisible: true,
    parrotLoaded: false,
    parrotPosition: { x: 0, y: 0, z: 0 },
    colorsRandomized: false,
    treeHeight: 0,
    isAnimating: false
};

let recursionDepth = 3;
let spreadAngle = 30;
let leavesVisible = true;
let colorsRandomized = false;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 8, 20);
camera.lookAt(0, 5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 5, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

// Ground
const groundGeom = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x2d5a27 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Tree group
let treeGroup = new THREE.Group();
scene.add(treeGroup);

// Track branches and leaves
let branchMeshes = [];
let leafMeshes = [];
let highestPoint = { x: 0, y: 0, z: 0 };
let maxY = 0;

// Default materials
const defaultBranchColor = 0x8B4513;
const defaultLeafColor = 0x228B22;

function createBranchMaterial(color) {
    return new THREE.MeshLambertMaterial({ color: color || defaultBranchColor });
}

function createLeafMaterial(color) {
    return new THREE.MeshLambertMaterial({ color: color || defaultLeafColor });
}

function generateTree() {
    // Clear old tree
    scene.remove(treeGroup);
    treeGroup = new THREE.Group();
    scene.add(treeGroup);
    branchMeshes = [];
    leafMeshes = [];
    maxY = 0;
    highestPoint = { x: 0, y: 0, z: 0 };

    // Start recursive generation
    const startPos = new THREE.Vector3(0, 0, 0);
    const startDir = new THREE.Vector3(0, 1, 0);
    buildBranch(startPos, startDir, 4.0, 0.5, recursionDepth);

    // Update state
    window.__3D_STATE__.totalBranches = branchMeshes.length;
    window.__3D_STATE__.totalLeaves = leafMeshes.length;
    window.__3D_STATE__.treeHeight = maxY;

    updateBranchCountDisplay();
    updateParrotPosition();
}

function buildBranch(startPos, direction, length, radius, depth) {
    // Create cylinder for this branch
    const branchGeom = new THREE.CylinderGeometry(radius * 0.7, radius, length, 8);
    let branchColor = defaultBranchColor;
    if (colorsRandomized) {
        const hue = Math.random();
        const color = new THREE.Color();
        color.setHSL(hue, 0.7, 0.4);
        branchColor = color;
    }
    const branchMat = new THREE.MeshLambertMaterial({ color: branchColor });
    const branch = new THREE.Mesh(branchGeom, branchMat);
    branch.castShadow = true;
    branch.receiveShadow = true;

    // Position and orient the branch
    const dir = direction.clone().normalize();
    const endPos = startPos.clone().add(dir.clone().multiplyScalar(length));

    // Midpoint for cylinder placement
    const midPos = startPos.clone().add(endPos).multiplyScalar(0.5);
    branch.position.copy(midPos);

    // Orient cylinder to point along direction
    const up = new THREE.Vector3(0, 1, 0);
    const quat = new THREE.Quaternion();
    quat.setFromUnitVectors(up, dir);
    branch.quaternion.copy(quat);

    treeGroup.add(branch);
    branchMeshes.push(branch);

    // Track highest point
    if (endPos.y > maxY) {
        maxY = endPos.y;
        highestPoint = { x: endPos.x, y: endPos.y, z: endPos.z };
    }

    if (depth <= 1) {
        // Terminal branch - add leaf
        const leafGeom = new THREE.SphereGeometry(0.3, 8, 8);
        const leafMat = new THREE.MeshLambertMaterial({ color: defaultLeafColor });
        const leaf = new THREE.Mesh(leafGeom, leafMat);
        leaf.position.copy(endPos);
        leaf.castShadow = true;
        leaf.visible = leavesVisible;
        treeGroup.add(leaf);
        leafMeshes.push(leaf);
        return;
    }

    // Generate child branches (2-3)
    const numChildren = depth > 2 ? 3 : 2;
    const angleRad = (spreadAngle * Math.PI) / 180;

    for (let i = 0; i < numChildren; i++) {
        const newLength = length * 0.7;
        const newRadius = radius * 0.6;

        // Create a rotation for the child branch
        let childDir = dir.clone();

        // Create perpendicular vectors for rotation
        let perp = new THREE.Vector3();
        if (Math.abs(dir.y) < 0.99) {
            perp.crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();
        } else {
            perp.crossVectors(dir, new THREE.Vector3(1, 0, 0)).normalize();
        }

        // Rotate around the branch direction for azimuthal distribution
        const azimuth = (i / numChildren) * Math.PI * 2 + (Math.random() * 0.3 - 0.15);
        const rotQuat = new THREE.Quaternion();
        rotQuat.setFromAxisAngle(dir, azimuth);
        perp.applyQuaternion(rotQuat);

        // Tilt away from parent direction
        const tiltAngle = angleRad + (Math.random() * 0.15 - 0.075);
        const tiltQuat = new THREE.Quaternion();
        tiltQuat.setFromAxisAngle(perp, tiltAngle);
        childDir.applyQuaternion(tiltQuat);
        childDir.normalize();

        buildBranch(endPos.clone(), childDir, newLength, newRadius, depth - 1);
    }
}

function updateBranchCountDisplay() {
    document.getElementById('branchCount').textContent =
        `Branches: ${branchMeshes.length} | Leaves: ${leafMeshes.length}`;
}

// Parrot
let parrotModel = null;
let parrotMixer = null;
const clock = new THREE.Clock();

function loadParrot() {
    const loader = new GLTFLoader();
    loader.load(
        'https://threejs.org/examples/models/gltf/Parrot.glb',
        (gltf) => {
            parrotModel = gltf.scene;
            parrotModel.scale.set(0.03, 0.03, 0.03);
            parrotModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                }
            });
            scene.add(parrotModel);

            // Play animation if available
            if (gltf.animations && gltf.animations.length > 0) {
                parrotMixer = new THREE.AnimationMixer(parrotModel);
                const action = parrotMixer.clipAction(gltf.animations[0]);
                action.play();
                window.__3D_STATE__.isAnimating = true;
            }

            window.__3D_STATE__.parrotLoaded = true;
            updateParrotPosition();
        },
        undefined,
        (error) => {
            console.warn('Could not load Parrot.glb:', error);
        }
    );
}

function updateParrotPosition() {
    if (!parrotModel) return;
    parrotModel.position.set(highestPoint.x, highestPoint.y, highestPoint.z);
    window.__3D_STATE__.parrotPosition = {
        x: highestPoint.x,
        y: highestPoint.y,
        z: highestPoint.z
    };
}

// UI Updates
function updateLabels() {
    document.getElementById('depthLabel').textContent = `Recursion Depth: ${recursionDepth}`;
    document.getElementById('angleLabel').textContent = `Spread Angle: ${spreadAngle}°`;
}

function updateState() {
    window.__3D_STATE__.recursionDepth = recursionDepth;
    window.__3D_STATE__.spreadAngle = spreadAngle;
    window.__3D_STATE__.totalBranches = branchMeshes.length;
    window.__3D_STATE__.totalLeaves = leafMeshes.length;
    window.__3D_STATE__.leavesVisible = leavesVisible;
    window.__3D_STATE__.colorsRandomized = colorsRandomized;
    window.__3D_STATE__.treeHeight = maxY;
    if (parrotModel) {
        window.__3D_STATE__.parrotPosition = {
            x: parrotModel.position.x,
            y: parrotModel.position.y,
            z: parrotModel.position.z
        };
    }
}

// Button handlers
document.getElementById('btnIncreaseDepth').addEventListener('click', () => {
    if (recursionDepth < 7) {
        recursionDepth++;
        updateLabels();
        generateTree();
        updateState();
    }
});

document.getElementById('btnDecreaseDepth').addEventListener('click', () => {
    if (recursionDepth > 1) {
        recursionDepth--;
        updateLabels();
        generateTree();
        updateState();
    }
});

document.getElementById('btnIncreaseAngle').addEventListener('click', () => {
    if (spreadAngle < 60) {
        spreadAngle += 5;
        updateLabels();
        generateTree();
        updateState();
    }
});

document.getElementById('btnDecreaseAngle').addEventListener('click', () => {
    if (spreadAngle > 10) {
        spreadAngle -= 5;
        updateLabels();
        generateTree();
        updateState();
    }
});

document.getElementById('btnToggleLeaves').addEventListener('click', () => {
    leavesVisible = !leavesVisible;
    leafMeshes.forEach(leaf => leaf.visible = leavesVisible);
    updateState();
});

document.getElementById('btnRandomize').addEventListener('click', () => {
    colorsRandomized = true;
    generateTree();
    updateState();
});

document.getElementById('btnReset').addEventListener('click', () => {
    recursionDepth = 3;
    spreadAngle = 30;
    leavesVisible = true;
    colorsRandomized = false;
    updateLabels();
    generateTree();
    updateState();
});

// Keyboard controls
document.addEventListener('keydown', (e) => {
    switch (e.key) {
        case 'ArrowUp':
            if (recursionDepth < 7) {
                recursionDepth++;
                updateLabels();
                generateTree();
                updateState();
            }
            break;
        case 'ArrowDown':
            if (recursionDepth > 1) {
                recursionDepth--;
                updateLabels();
                generateTree();
                updateState();
            }
            break;
        case 'l':
        case 'L':
            leavesVisible = !leavesVisible;
            leafMeshes.forEach(leaf => leaf.visible = leavesVisible);
            updateState();
            break;
        case 'r':
        case 'R':
            recursionDepth = 3;
            spreadAngle = 30;
            leavesVisible = true;
            colorsRandomized = false;
            updateLabels();
            generateTree();
            updateState();
            break;
    }
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    if (parrotMixer) {
        parrotMixer.update(delta);
    }

    controls.update();
    updateState();
    renderer.render(scene, camera);
}

// Initialize
generateTree();
loadParrot();
updateLabels();
updateState();
animate();
</script>
</body>
</html>
