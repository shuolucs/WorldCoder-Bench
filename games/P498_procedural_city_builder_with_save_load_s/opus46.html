<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural City Builder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 8px 14px;
    background: #333;
    color: #fff;
    border: 2px solid #666;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }
  .btn:hover { background: #555; }
  .btn.selected { border: 3px solid yellow; }
  .action-btn {
    padding: 8px 14px;
    background: #1a5276;
    color: #fff;
    border: 2px solid #2980b9;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  .action-btn:hover { background: #2980b9; }
  #info-panel {
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="hud">
  <div class="btn-row">
    <button class="btn selected" id="btn-house" data-type="house">🏠 House</button>
    <button class="btn" id="btn-tower" data-type="tower">🏢 Tower</button>
    <button class="btn" id="btn-park" data-type="park">🌳 Park</button>
    <button class="btn" id="btn-horse" data-type="horse">🐴 Horse</button>
  </div>
  <div class="btn-row">
    <button class="action-btn" id="btn-save">💾 Save (S)</button>
    <button class="action-btn" id="btn-load">📂 Load (L)</button>
    <button class="action-btn" id="btn-clear">🗑️ Clear (C)</button>
  </div>
  <div id="info-panel">
    <div id="building-count">Buildings: 0</div>
    <div id="selected-type">Selected: house</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 40, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(15, 20, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lighting
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x556B2F, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
ground.name = 'ground';
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 10, 0x000000, 0x444444);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// --- Horse Model ---
let horseModel = null;
let horseModelLoaded = false;
const gltfLoader = new GLTFLoader();

try {
  gltfLoader.load('._horse.glb',
    (gltf) => {
      horseModel = gltf.scene;
      const box = new THREE.Box3().setFromObject(horseModel);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 1.5 / maxDim;
      horseModel.scale.set(scale, scale, scale);
      horseModelLoaded = true;
      updateState();
    },
    undefined,
    (err) => {
      console.warn('Horse model failed to load, creating placeholder:', err);
      horseModel = createHorsePlaceholder();
      horseModelLoaded = true;
      updateState();
    }
  );
} catch (e) {
  console.warn('Horse model load exception, creating placeholder');
  horseModel = createHorsePlaceholder();
  horseModelLoaded = true;
}

function createHorsePlaceholder() {
  const group = new THREE.Group();
  // Body
  const bodyGeo = new THREE.BoxGeometry(1.2, 0.6, 0.5);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B6914 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.8;
  body.castShadow = true;
  group.add(body);
  // Head
  const headGeo = new THREE.BoxGeometry(0.3, 0.5, 0.3);
  const head = new THREE.Mesh(headGeo, bodyMat);
  head.position.set(0.7, 1.2, 0);
  head.castShadow = true;
  group.add(head);
  // Neck
  const neckGeo = new THREE.BoxGeometry(0.2, 0.4, 0.2);
  const neck = new THREE.Mesh(neckGeo, bodyMat);
  neck.position.set(0.55, 1.05, 0);
  neck.rotation.z = -0.3;
  neck.castShadow = true;
  group.add(neck);
  // Legs
  const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.5);
  const legMat = new THREE.MeshStandardMaterial({ color: 0x6B4F14 });
  const legPositions = [
    [-0.4, 0.25, 0.15], [-0.4, 0.25, -0.15],
    [0.4, 0.25, 0.15], [0.4, 0.25, -0.15]
  ];
  legPositions.forEach(pos => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(...pos);
    leg.castShadow = true;
    group.add(leg);
  });
  // Pedestal
  const pedGeo = new THREE.CylinderGeometry(0.6, 0.7, 0.15, 8);
  const pedMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
  const pedestal = new THREE.Mesh(pedGeo, pedMat);
  pedestal.position.y = 0.075;
  pedestal.castShadow = true;
  group.add(pedestal);

  // Scale to 1.5 units tall
  const box = new THREE.Box3().setFromObject(group);
  const h = box.getSize(new THREE.Vector3()).y;
  const s = 1.5 / h;
  group.scale.set(s, s, s);

  return group;
}

// --- State ---
let selectedType = 'house';
let gridOccupancy = {}; // key: 'x_z', value: { type, mesh }
let lastPlacedType = null;
let lastPlacedPosition = null;
let cleared = false;
const buildingsGroup = new THREE.Group();
buildingsGroup.name = 'buildings';
scene.add(buildingsGroup);

// Valid grid positions: -8, -6, -4, -2, 0, 2, 4, 6, 8 (10 positions per axis)
const GRID_POSITIONS = [-8, -6, -4, -2, 0, 2, 4, 6, 8];

function snapToGrid(val) {
  let best = GRID_POSITIONS[0];
  let bestDist = Math.abs(val - best);
  for (let i = 1; i < GRID_POSITIONS.length; i++) {
    const d = Math.abs(val - GRID_POSITIONS[i]);
    if (d < bestDist) {
      bestDist = d;
      best = GRID_POSITIONS[i];
    }
  }
  return best;
}

function isValidGridPos(x, z) {
  return GRID_POSITIONS.includes(x) && GRID_POSITIONS.includes(z);
}

function getKey(x, z) {
  return `${x}_${z}`;
}

// --- Building Creators ---
function createHouse() {
  const group = new THREE.Group();
  const boxGeo = new THREE.BoxGeometry(1.5, 2, 1.5);
  const boxMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const box = new THREE.Mesh(boxGeo, boxMat);
  box.position.y = 1;
  box.castShadow = true;
  box.receiveShadow = true;
  group.add(box);

  const coneGeo = new THREE.ConeGeometry(1.2, 1.0, 4);
  const coneMat = new THREE.MeshStandardMaterial({ color: 0xCC0000 });
  const cone = new THREE.Mesh(coneGeo, coneMat);
  cone.position.y = 2.5;
  cone.rotation.y = Math.PI / 4;
  cone.castShadow = true;
  group.add(cone);

  return group;
}

function createTower() {
  const group = new THREE.Group();
  const boxGeo = new THREE.BoxGeometry(1.0, 5, 1.0);
  const boxMat = new THREE.MeshStandardMaterial({ color: 0x4169E1 });
  const box = new THREE.Mesh(boxGeo, boxMat);
  box.position.y = 2.5;
  box.castShadow = true;
  box.receiveShadow = true;
  group.add(box);
  return group;
}

function createPark() {
  const group = new THREE.Group();
  const planeGeo = new THREE.PlaneGeometry(1.8, 1.8);
  const planeMat = new THREE.MeshStandardMaterial({ color: 0x228B22, side: THREE.DoubleSide });
  const plane = new THREE.Mesh(planeGeo, planeMat);
  plane.rotation.x = -Math.PI / 2;
  plane.position.y = 0.02;
  plane.receiveShadow = true;
  group.add(plane);

  const sphereGeo = new THREE.SphereGeometry(0.5, 16, 16);
  const sphereMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  sphere.position.y = 0.8;
  sphere.castShadow = true;
  group.add(sphere);

  // Trunk
  const trunkGeo = new THREE.CylinderGeometry(0.08, 0.1, 0.5);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 0.3;
  trunk.castShadow = true;
  group.add(trunk);

  return group;
}

function createHorseStatue() {
  if (horseModel) {
    const clone = horseModel.clone();
    clone.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    return clone;
  }
  // Fallback if not loaded yet
  const group = new THREE.Group();
  const geo = new THREE.BoxGeometry(0.8, 1.5, 0.4);
  const mat = new THREE.MeshStandardMaterial({ color: 0x888888 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = 0.75;
  mesh.castShadow = true;
  group.add(mesh);
  return group;
}

function createBuilding(type) {
  switch (type) {
    case 'house': return createHouse();
    case 'tower': return createTower();
    case 'park': return createPark();
    case 'horse': return createHorseStatue();
    default: return createHouse();
  }
}

function placeBuilding(type, gx, gz) {
  const key = getKey(gx, gz);
  if (gridOccupancy[key]) return false;
  if (!isValidGridPos(gx, gz)) return false;

  const mesh = createBuilding(type);
  mesh.position.set(gx, 0, gz);
  mesh.userData.buildingType = type;
  mesh.userData.gridX = gx;
  mesh.userData.gridZ = gz;
  mesh.userData.gridKey = key;
  buildingsGroup.add(mesh);

  gridOccupancy[key] = { type, mesh };
  lastPlacedType = type;
  lastPlacedPosition = { x: gx, z: gz };
  cleared = false;
  updateUI();
  updateState();
  return true;
}

function removeBuilding(key) {
  if (!gridOccupancy[key]) return false;
  const { mesh } = gridOccupancy[key];
  buildingsGroup.remove(mesh);
  // Dispose geometry/material
  mesh.traverse(child => {
    if (child.isMesh) {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(m => m.dispose());
        } else {
          child.material.dispose();
        }
      }
    }
  });
  delete gridOccupancy[key];
  updateUI();
  updateState();
  return true;
}

function clearAll() {
  const keys = Object.keys(gridOccupancy);
  keys.forEach(key => removeBuilding(key));
  gridOccupancy = {};
  cleared = true;
  updateUI();
  updateState();
}

function saveState() {
  const data = {};
  for (const [key, val] of Object.entries(gridOccupancy)) {
    data[key] = val.type;
  }
  localStorage.setItem('cityBuilderState', JSON.stringify(data));
  updateState();
}

function loadState() {
  const raw = localStorage.getItem('cityBuilderState');
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    clearAll();
    cleared = false;
    for (const [key, type] of Object.entries(data)) {
      const parts = key.split('_');
      const gx = parseInt(parts[0]);
      const gz = parseInt(parts[1]);
      if (isFinite(gx) && isFinite(gz)) {
        placeBuilding(type, gx, gz);
      }
    }
    updateUI();
    updateState();
  } catch (e) {
    console.error('Failed to load state:', e);
  }
}

function getBuildingCount() {
  return Object.keys(gridOccupancy).length;
}

function countType(type) {
  return Object.values(gridOccupancy).filter(v => v.type === type).length;
}

function updateUI() {
  document.getElementById('building-count').textContent = `Buildings: ${getBuildingCount()}`;
  document.getElementById('selected-type').textContent = `Selected: ${selectedType}`;

  document.querySelectorAll('.btn[data-type]').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.type === selectedType);
  });
}

function updateState() {
  const occupancySimple = {};
  for (const [key, val] of Object.entries(gridOccupancy)) {
    occupancySimple[key] = val.type;
  }

  window.__3D_STATE__ = {
    buildingCount: getBuildingCount(),
    selectedType: selectedType,
    gridOccupancy: occupancySimple,
    lastPlacedType: lastPlacedType,
    lastPlacedPosition: lastPlacedPosition,
    savedStateExists: localStorage.getItem('cityBuilderState') !== null,
    horseModelLoaded: horseModelLoaded,
    totalHouses: countType('house'),
    totalTowers: countType('tower'),
    totalParks: countType('park'),
    totalHorses: countType('horse'),
    cleared: cleared
  };
}

// --- Raycasting ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getGroundIntersection(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(ground);
  if (intersects.length > 0) {
    return intersects[0].point;
  }
  return null;
}

function getBuildingAtMouse(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const allMeshes = [];
  buildingsGroup.traverse(child => {
    if (child.isMesh) allMeshes.push(child);
  });
  const intersects = raycaster.intersectObjects(allMeshes, false);
  if (intersects.length > 0) {
    // Walk up to find the group with gridKey
    let obj = intersects[0].object;
    while (obj && !obj.userData.gridKey) {
      obj = obj.parent;
    }
    if (obj && obj.userData.gridKey) {
      return obj.userData.gridKey;
    }
  }
  return null;
}

// --- Event Listeners ---
renderer.domElement.addEventListener('click', (event) => {
  if (event.button !== 0) return;
  const point = getGroundIntersection(event);
  if (!point) return;

  const gx = snapToGrid(point.x);
  const gz = snapToGrid(point.z);

  if (isFinite(gx) && isFinite(gz)) {
    placeBuilding(selectedType, gx, gz);
  }
});

renderer.domElement.addEventListener('contextmenu', (event) => {
  event.preventDefault();
  const key = getBuildingAtMouse(event);
  if (key) {
    removeBuilding(key);
  } else {
    // Try ground intersection to find building at that cell
    const point = getGroundIntersection(event);
    if (point) {
      const gx = snapToGrid(point.x);
      const gz = snapToGrid(point.z);
      const k = getKey(gx, gz);
      if (gridOccupancy[k]) {
        removeBuilding(k);
      }
    }
  }
});

// Building type buttons
document.querySelectorAll('.btn[data-type]').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedType = btn.dataset.type;
    updateUI();
    updateState();
  });
});

document.getElementById('btn-save').addEventListener('click', saveState);
document.getElementById('btn-load').addEventListener('click', loadState);
document.getElementById('btn-clear').addEventListener('click', clearAll);

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const key = e.key.toUpperCase();
  if (key === 'S') { e.preventDefault(); saveState(); }
  if (key === 'L') { e.preventDefault(); loadState(); }
  if (key === 'C') { e.preventDefault(); clearAll(); }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Initialize ---
updateUI();
updateState();

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
