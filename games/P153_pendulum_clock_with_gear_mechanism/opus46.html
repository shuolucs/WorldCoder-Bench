<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Pendulum Clock Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  
  #controls {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    padding: 15px;
    border-radius: 10px;
    color: #fff;
    z-index: 10;
    min-width: 200px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  
  #controls button {
    display: block;
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 8px;
    background: #2c3e50;
    color: #ecf0f1;
    border: 1px solid #4a6785;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
  }
  
  #controls button:hover {
    background: #3d5a80;
  }
  
  #controls label {
    display: block;
    margin-bottom: 5px;
    font-size: 13px;
    color: #bdc3c7;
  }
  
  #controls input[type="range"] {
    width: 100%;
    margin-bottom: 5px;
  }
  
  #speedValue {
    font-size: 12px;
    color: #95a5a6;
  }
  
  #hud {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0, 0, 0, 0.75);
    padding: 15px;
    border-radius: 10px;
    color: #ecf0f1;
    font-size: 13px;
    line-height: 1.8;
    z-index: 10;
    min-width: 240px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  
  #hud .label {
    color: #95a5a6;
    font-size: 11px;
  }
  
  #hud .value {
    color: #f39c12;
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="controls">
  <button id="toggleBtn">Start</button>
  <button id="dampingBtn">Damping: OFF</button>
  <button id="resetBtn">Reset</button>
  <label for="speedSlider">Speed Multiplier:</label>
  <input type="range" id="speedSlider" min="1" max="20" value="6">
  <span id="speedValue">6x</span>
</div>

<div id="hud">
  <div><span class="label">Pendulum Angle: </span><span class="value" id="hudAngle">0.00°</span></div>
  <div><span class="label">Amplitude: </span><span class="value" id="hudAmplitude">0.400 rad</span></div>
  <div><span class="label">Swing Count: </span><span class="value" id="hudSwings">0</span></div>
  <div><span class="label">Gear 1 Rotation: </span><span class="value" id="hudGear1">0.00°</span></div>
  <div><span class="label">Sim Speed: </span><span class="value" id="hudSpeed">6x</span></div>
  <div><span class="label">Elapsed Time: </span><span class="value" id="hudTime">0.00s</span></div>
  <div><span class="label">Energy: </span><span class="value" id="hudEnergy">0.000</span></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
  running: false,
  dampingEnabled: false,
  pendulumAngle: 0,
  pendulumAmplitude: 0.4,
  pendulumOmega: Math.sqrt(9.81 / 1.5),
  swingCount: 0,
  gear1Rotation: 0,
  gear2Rotation: 0,
  gear3Rotation: 0,
  minuteHandAngle: 0,
  hourHandAngle: 0,
  simulationSpeed: 6,
  gearsVisible: true,
  assetLoaded: false,
  elapsedTime: 0,
  pendulumEnergy: 0
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// --- Ground Plane (procedural wood) ---
const groundCanvas = document.createElement('canvas');
groundCanvas.width = 512;
groundCanvas.height = 512;
const gctx = groundCanvas.getContext('2d');
gctx.fillStyle = '#8B6914';
gctx.fillRect(0, 0, 512, 512);
for (let i = 0; i < 200; i++) {
  gctx.strokeStyle = `rgba(${60 + Math.random()*40}, ${30 + Math.random()*30}, ${10 + Math.random()*10}, ${0.1 + Math.random()*0.15})`;
  gctx.lineWidth = 1 + Math.random() * 3;
  gctx.beginPath();
  const y = Math.random() * 512;
  gctx.moveTo(0, y + Math.random()*10);
  gctx.bezierCurveTo(128, y + Math.random()*20 - 10, 384, y + Math.random()*20 - 10, 512, y + Math.random()*10);
  gctx.stroke();
}
const groundTexture = new THREE.CanvasTexture(groundCanvas);
groundTexture.wrapS = THREE.RepeatWrapping;
groundTexture.wrapT = THREE.RepeatWrapping;
groundTexture.repeat.set(4, 4);

const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ map: groundTexture, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// --- Clock Body ---
const clockBodyGeo = new THREE.BoxGeometry(1.2, 4, 0.6);
const clockBodyMat = new THREE.MeshStandardMaterial({ color: 0x3e2723, roughness: 0.7, metalness: 0.1 });
const clockBody = new THREE.Mesh(clockBodyGeo, clockBodyMat);
clockBody.position.set(0, 2, 0);
clockBody.castShadow = true;
clockBody.receiveShadow = true;
scene.add(clockBody);

// Clock body trim
const trimGeo = new THREE.BoxGeometry(1.3, 0.1, 0.7);
const trimMat = new THREE.MeshStandardMaterial({ color: 0x2c1e0f, roughness: 0.6 });
const topTrim = new THREE.Mesh(trimGeo, trimMat);
topTrim.position.set(0, 4.05, 0);
topTrim.castShadow = true;
scene.add(topTrim);
const bottomTrim = new THREE.Mesh(trimGeo, trimMat);
bottomTrim.position.set(0, 0.0, 0);
bottomTrim.castShadow = true;
scene.add(bottomTrim);

// --- Glass Panel (for gears) ---
const glassGeo = new THREE.PlaneGeometry(0.9, 1.2);
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff,
  transparent: true,
  opacity: 0.15,
  roughness: 0.05,
  metalness: 0.0,
  transmission: 0.9,
  side: THREE.DoubleSide
});
const glassPanel = new THREE.Mesh(glassGeo, glassMat);
glassPanel.position.set(0, 2.4, 0.305);
scene.add(glassPanel);

// --- Clock Face ---
const clockFaceGeo = new THREE.CircleGeometry(0.45, 64);
const clockFaceMat = new THREE.MeshStandardMaterial({ color: 0xfff8e7, roughness: 0.3 });
const clockFace = new THREE.Mesh(clockFaceGeo, clockFaceMat);
clockFace.position.set(0, 3.2, 0.31);
scene.add(clockFace);

// Clock face rim
const rimGeo = new THREE.TorusGeometry(0.45, 0.03, 16, 64);
const rimMat = new THREE.MeshStandardMaterial({ color: 0xb8860b, metalness: 0.8, roughness: 0.2 });
const rim = new THREE.Mesh(rimGeo, rimMat);
rim.position.set(0, 3.2, 0.31);
scene.add(rim);

// --- Hour Markers ---
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2;
  const markerGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.06, 8);
  const markerMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
  const marker = new THREE.Mesh(markerGeo, markerMat);
  const r = 0.38;
  marker.position.set(
    Math.sin(angle) * r,
    3.2 + Math.cos(angle) * r,
    0.32
  );
  marker.rotation.z = -angle;
  scene.add(marker);
}

// --- Clock Hands ---
const handPivot = new THREE.Group();
handPivot.position.set(0, 3.2, 0.32);
scene.add(handPivot);

// Minute hand
const minuteHandGeo = new THREE.BoxGeometry(0.02, 0.35, 0.01);
minuteHandGeo.translate(0, 0.175, 0);
const minuteHandMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const minuteHand = new THREE.Mesh(minuteHandGeo, minuteHandMat);
handPivot.add(minuteHand);

// Hour hand
const hourHandGeo = new THREE.BoxGeometry(0.025, 0.25, 0.01);
hourHandGeo.translate(0, 0.125, 0);
const hourHandMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
const hourHand = new THREE.Mesh(hourHandGeo, hourHandMat);
hourHand.position.z = 0.01;
handPivot.add(hourHand);

// Center cap
const capGeo = new THREE.SphereGeometry(0.025, 16, 16);
const capMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.5 });
const cap = new THREE.Mesh(capGeo, capMat);
cap.position.z = 0.02;
handPivot.add(cap);

// --- Gear Creation Function ---
function createGear(innerRadius, outerRadius, teeth, thickness, color) {
  const group = new THREE.Group();
  
  // Base disc
  const discGeo = new THREE.CylinderGeometry(innerRadius, innerRadius, thickness, 32);
  const gearMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.3 });
  const disc = new THREE.Mesh(discGeo, gearMat);
  disc.rotation.x = Math.PI / 2;
  group.add(disc);
  
  // Teeth
  const toothWidth = (2 * Math.PI * innerRadius) / (teeth * 2.5);
  const toothHeight = outerRadius - innerRadius;
  for (let i = 0; i < teeth; i++) {
    const angle = (i / teeth) * Math.PI * 2;
    const toothGeo = new THREE.BoxGeometry(toothWidth, thickness, toothHeight);
    const tooth = new THREE.Mesh(toothGeo, gearMat);
    const tr = innerRadius + toothHeight / 2;
    tooth.position.set(Math.cos(angle) * tr, 0, Math.sin(angle) * tr);
    tooth.rotation.y = -angle;
    group.add(tooth);
  }
  
  // Center hole
  const holeGeo = new THREE.CylinderGeometry(innerRadius * 0.15, innerRadius * 0.15, thickness * 1.5, 16);
  const holeMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.2 });
  const hole = new THREE.Mesh(holeGeo, holeMat);
  hole.rotation.x = Math.PI / 2;
  group.add(hole);
  
  // Spokes
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const spokeGeo = new THREE.BoxGeometry(innerRadius * 0.8, thickness * 0.5, 0.015);
    const spoke = new THREE.Mesh(spokeGeo, holeMat);
    spoke.position.set(Math.cos(angle) * innerRadius * 0.4, 0, Math.sin(angle) * innerRadius * 0.4);
    spoke.rotation.y = -angle;
    group.add(spoke);
  }
  
  return group;
}

// --- Gears ---
const gearsGroup = new THREE.Group();

const gear1 = createGear(0.25, 0.3, 20, 0.04, 0x888888);
gear1.position.set(0, 2.5, 0.15);
gearsGroup.add(gear1);

const gear2 = createGear(0.14, 0.18, 12, 0.04, 0x999999);
// Position gear2 so it meshes with gear1
const g1g2dist = 0.3 + 0.18;
gear2.position.set(0.3 + 0.14, 2.5, 0.15);
gearsGroup.add(gear2);

const gear3 = createGear(0.38, 0.45, 30, 0.04, 0x777777);
// Position gear3 so it meshes with gear2
gear3.position.set(0.3 + 0.14, 2.5 - (0.18 + 0.45), 0.15);
gearsGroup.add(gear3);

scene.add(gearsGroup);

// --- Pendulum ---
const pendulumPivot = new THREE.Group();
pendulumPivot.position.set(0, 1.8, 0.31);
scene.add(pendulumPivot);

const rodGeo = new THREE.CylinderGeometry(0.015, 0.015, 1.5, 8);
rodGeo.translate(0, -0.75, 0);
const rodMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, metalness: 0.3, roughness: 0.5 });
const rod = new THREE.Mesh(rodGeo, rodMat);
rod.castShadow = true;
pendulumPivot.add(rod);

const bobGeo = new THREE.SphereGeometry(0.12, 32, 32);
const bobMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });
const bob = new THREE.Mesh(bobGeo, bobMat);
bob.position.y = -1.5;
bob.castShadow = true;
pendulumPivot.add(bob);

// Pivot decoration
const pivotDecGeo = new THREE.SphereGeometry(0.03, 16, 16);
const pivotDecMat = new THREE.MeshStandardMaterial({ color: 0xb8860b, metalness: 0.7, roughness: 0.3 });
const pivotDec = new THREE.Mesh(pivotDecGeo, pivotDecMat);
pendulumPivot.add(pivotDec);

// --- Shelf and Coffee Machine ---
const shelfGeo = new THREE.BoxGeometry(1, 0.05, 0.5);
const shelfMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.7 });
const shelf = new THREE.Mesh(shelfGeo, shelfMat);
shelf.position.set(2.5, 0.95, 0);
shelf.castShadow = true;
shelf.receiveShadow = true;
scene.add(shelf);

// Shelf brackets
const bracketGeo = new THREE.BoxGeometry(0.05, 0.3, 0.04);
const bracketMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5 });
const bracket1 = new THREE.Mesh(bracketGeo, bracketMat);
bracket1.position.set(2.2, 0.8, 0.2);
scene.add(bracket1);
const bracket2 = new THREE.Mesh(bracketGeo, bracketMat);
bracket2.position.set(2.8, 0.8, 0.2);
scene.add(bracket2);

// Load GLB
const loader = new GLTFLoader();
loader.load('coffeemat.glb', (gltf) => {
  const model = gltf.scene;
  model.position.set(2.5, 1.0, 0);
  model.scale.set(0.5, 0.5, 0.5);
  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  scene.add(model);
  state.assetLoaded = true;
}, undefined, (error) => {
  console.warn('Could not load coffeemat.glb:', error);
  // Create placeholder coffee machine
  const placeholderGroup = new THREE.Group();
  
  const bodyGeo = new THREE.BoxGeometry(0.4, 0.6, 0.3);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2c2c2c, metalness: 0.3, roughness: 0.5 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.3;
  placeholderGroup.add(body);
  
  const topGeo = new THREE.CylinderGeometry(0.12, 0.15, 0.15, 16);
  const topMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5 });
  const top = new THREE.Mesh(topGeo, topMat);
  top.position.y = 0.68;
  placeholderGroup.add(top);
  
  const screenGeo = new THREE.PlaneGeometry(0.2, 0.1);
  const screenMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.3 });
  const screen = new THREE.Mesh(screenGeo, screenMat);
  screen.position.set(0, 0.45, 0.16);
  placeholderGroup.add(screen);
  
  placeholderGroup.position.set(2.5, 1.0, 0);
  placeholderGroup.scale.set(0.5, 0.5, 0.5);
  scene.add(placeholderGroup);
  state.assetLoaded = true;
});

// --- Wall behind clock ---
const wallGeo = new THREE.PlaneGeometry(20, 10);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.9 });
const wall = new THREE.Mesh(wallGeo, wallMat);
wall.position.set(0, 5, -1);
wall.receiveShadow = true;
scene.add(wall);

// --- Simulation Variables ---
let simTime = 0;
let amplitude = 0.4;
const omega = Math.sqrt(9.81 / 1.5);
let prevAngle = 0;
let swingCount = 0;
let gear1TotalRotation = 0;
let gear2TotalRotation = 0;
let gear3TotalRotation = 0;
let lastPendulumSign = 0;
let prevClock = performance.now() / 1000;

// --- Raycaster for click ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(bob, true);
  if (intersects.length > 0) {
    amplitude = Math.min(amplitude + 0.1, 0.8);
  }
});

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'g' || e.key === 'G') {
    state.gearsVisible = !state.gearsVisible;
    gearsGroup.visible = state.gearsVisible;
  }
});

// --- UI Controls ---
const toggleBtn = document.getElementById('toggleBtn');
const dampingBtn = document.getElementById('dampingBtn');
const resetBtn = document.getElementById('resetBtn');
const speedSlider = document.getElementById('speedSlider');
const speedValue = document.getElementById('speedValue');

toggleBtn.addEventListener('click', () => {
  state.running = !state.running;
  toggleBtn.textContent = state.running ? 'Stop' : 'Start';
  if (state.running) {
    prevClock = performance.now() / 1000;
  }
});

dampingBtn.addEventListener('click', () => {
  state.dampingEnabled = !state.dampingEnabled;
  dampingBtn.textContent = state.dampingEnabled ? 'Damping: ON' : 'Damping: OFF';
});

resetBtn.addEventListener('click', () => {
  simTime = 0;
  amplitude = 0.4;
  swingCount = 0;
  gear1TotalRotation = 0;
  gear2TotalRotation = 0;
  gear3TotalRotation = 0;
  lastPendulumSign = 0;
  prevClock = performance.now() / 1000;
  
  pendulumPivot.rotation.z = 0;
  minuteHand.rotation.z = 0;
  hourHand.rotation.z = 0;
  gear1.rotation.y = 0;
  gear2.rotation.y = 0;
  gear3.rotation.y = 0;
});

speedSlider.addEventListener('input', () => {
  state.simulationSpeed = parseInt(speedSlider.value);
  speedValue.textContent = state.simulationSpeed + 'x';
});

// --- HUD Elements ---
const hudAngle = document.getElementById('hudAngle');
const hudAmplitude = document.getElementById('hudAmplitude');
const hudSwings = document.getElementById('hudSwings');
const hudGear1 = document.getElementById('hudGear1');
const hudSpeed = document.getElementById('hudSpeed');
const hudTime = document.getElementById('hudTime');
const hudEnergy = document.getElementById('hudEnergy');

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);
  
  const now = performance.now() / 1000;
  const realDt = Math.min(now - prevClock, 0.05);
  prevClock = now;
  
  if (state.running) {
    const dt = realDt * state.simulationSpeed;
    simTime += dt;
    
    // Damping
    if (state.dampingEnabled) {
      amplitude *= Math.pow(0.995, dt);
    }
    
    // Pendulum angle
    const currentAngle = amplitude * Math.cos(omega * simTime);
    
    // Count swings (zero crossings)
    const currentSign = Math.sign(currentAngle);
    if (lastPendulumSign !== 0 && currentSign !== 0 && currentSign !== lastPendulumSign) {
      swingCount++;
      
      // Advance gear1 by one tooth
      const gear1Step = (2 * Math.PI / 20);
      gear1TotalRotation += gear1Step;
      gear2TotalRotation += gear1Step * (20 / 12);
      gear3TotalRotation += gear1Step * (20 / 12) * (12 / 30);
    }
    if (currentSign !== 0) lastPendulumSign = currentSign;
    
    // Apply pendulum rotation (swing in XZ plane = rotation around Z axis)
    pendulumPivot.rotation.z = currentAngle;
    
    // Gear visual rotations
    gear1.rotation.y = gear1TotalRotation;
    gear2.rotation.y = -gear2TotalRotation;
    gear3.rotation.y = gear3TotalRotation;
    
    // Clock hands - minute hand: 1 rev per 60/speed sim seconds
    // Using gear3 rotation to drive minute hand
    const minuteAngle = -gear3TotalRotation;
    const hourAngle = minuteAngle / 12;
    
    minuteHand.rotation.z = minuteAngle;
    hourHand.rotation.z = hourAngle;
    
    // Update state
    state.pendulumAngle = currentAngle;
    state.pendulumAmplitude = amplitude;
    state.pendulumOmega = omega;
    state.swingCount = swingCount;
    state.gear1Rotation = gear1TotalRotation;
    state.gear2Rotation = gear2TotalRotation;
    state.gear3Rotation = gear3TotalRotation;
    state.minuteHandAngle = minuteAngle;
    state.hourHandAngle = hourAngle;
    state.elapsedTime = simTime;
    state.pendulumEnergy = 0.5 * 1 * (1.5 * 1.5) * (omega * omega) * (amplitude * amplitude);
    
    prevAngle = currentAngle;
  }
  
  state.simulationSpeed = parseInt(speedSlider.value);
  
  // Update HUD
  hudAngle.textContent = ((state.pendulumAngle * 180 / Math.PI) || 0).toFixed(2) + '°';
  hudAmplitude.textContent = (state.pendulumAmplitude || 0).toFixed(3) + ' rad';
  hudSwings.textContent = state.swingCount;
  hudGear1.textContent = ((state.gear1Rotation * 180 / Math.PI) || 0).toFixed(2) + '°';
  hudSpeed.textContent = state.simulationSpeed + 'x';
  hudTime.textContent = (state.elapsedTime || 0).toFixed(2) + 's';
  hudEnergy.textContent = (state.pendulumEnergy || 0).toFixed(3);
  
  controls.update();
  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
