<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fire Escape Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d0d12;
            font-family: monospace;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #444;
            border-radius: 5px;
            pointer-events: none;
            min-width: 200px;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #ff8844;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #444;
            border-radius: 5px;
        }
        .control-row {
            margin-bottom: 10px;
        }
        .control-row label {
            display: inline-block;
            width: 120px;
        }
        .instructions {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
        #message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #00ff44;
            text-shadow: 0 0 10px #00ff44, 0 0 20px #000;
            display: none;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h2>Simulation Status</h2>
        <div class="hud-row"><span>Status:</span> <span id="hud-status">Idle</span></div>
        <div class="hud-row"><span>Health:</span> <span id="hud-health">100</span></div>
        <div class="hud-row"><span>Fire Cells:</span> <span id="hud-fire">0</span></div>
        <div class="hud-row"><span>Path Length:</span> <span id="hud-path">0</span></div>
        <div class="hud-row"><span>Dist to Exit:</span> <span id="hud-dist">0.0</span></div>
        <div class="hud-row"><span>Model Loaded:</span> <span id="hud-model">No</span></div>
    </div>

    <div id="controls">
        <div class="control-row">
            <label for="slider-fire-speed">Fire Speed:</label>
            <input type="range" id="slider-fire-speed" min="0.1" max="1.0" step="0.05" value="0.3">
            <span id="val-fire-speed">0.3</span>
        </div>
        <div class="control-row">
            <label for="slider-agent-speed">Agent Speed:</label>
            <input type="range" id="slider-agent-speed" min="1" max="10" step="0.5" value="4">
            <span id="val-agent-speed">4.0</span>
        </div>
        <div class="instructions">
            [G] Start/Restart | [Space] Pause/Play | [R] Reset
        </div>
    </div>

    <div id="message-overlay">ESCAPED!</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            status: 'Idle', // 'Idle', 'Running', 'Escaped', 'Dead'
            health: 100,
            fireCellCount: 0,
            pathLength: 0,
            distToExit: 0,
            agentPosition: { x: 5, y: 0.3, z: 5 },
            modelLoaded: false,
            isPaused: false,
            fireSpeed: 0.3,
            agentSpeed: 4,
            frameCount: 0,
            agentValid: true
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d0d12);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x332211, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xff8844, 0.6);
        dirLight.position.set(10, 20, 5);
        scene.add(dirLight);

        // --- Entities ---
        // Agent
        const agentGeometry = new THREE.SphereGeometry(0.3, 16, 16);
        const agentMaterial = new THREE.MeshStandardMaterial({ color: 0x44ff44 });
        const agent = new THREE.Mesh(agentGeometry, agentMaterial);
        const startPos = new THREE.Vector3(5, 0.3, 5);
        agent.position.copy(startPos);
        scene.add(agent);

        // Exit
        const exitGeometry = new THREE.TorusGeometry(0.8, 0.1, 16, 32);
        const exitMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x00ff44, 
            emissive: 0x00ff44, 
            emissiveIntensity: 0.8,
            transparent: true,
            opacity: 0.8
        });
        const exit = new THREE.Mesh(exitGeometry, exitMaterial);
        const exitPos = new THREE.Vector3(-6, 0.1, 8);
        exit.position.copy(exitPos);
        exit.rotation.x = Math.PI / 2;
        scene.add(exit);

        // Fire Visuals
        const fireGroup = new THREE.Group();
        scene.add(fireGroup);
        
        const fireParticles = new THREE.Group();
        const particleGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
        const particleMat = new THREE.MeshBasicMaterial({ color: 0xff3300, transparent: true, opacity: 0.8 });
        for(let i=0; i<3; i++) {
            const p = new THREE.Mesh(particleGeo, particleMat);
            p.userData = { 
                offset: new THREE.Vector3((Math.random()-0.5)*0.5, 0, (Math.random()-0.5)*0.5),
                phase: Math.random() * Math.PI * 2,
                speed: 2 + Math.random()
            };
            fireParticles.add(p);
        }
        scene.add(fireParticles);
        const fireStartPos = new THREE.Vector3(-3, 0, -3);
        fireParticles.position.copy(fireStartPos);
        fireParticles.visible = false;

        // Path Visualizer
        const pathMaterial = new THREE.LineBasicMaterial({ color: 0x44ff44, opacity: 0.5, transparent: true });
        let pathLine = new THREE.Line(new THREE.BufferGeometry(), pathMaterial);
        scene.add(pathLine);

        // --- Grid & Pathfinding ---
        const gridSize = 0.5;
        let gridMinX = -15, gridMaxX = 15, gridMinZ = -15, gridMaxZ = 15;
        let gridCols = 60, gridRows = 60;
        let grid = []; // 0: walkable, 1: wall, 2: fire
        let currentPath = [];
        let activeFireCells = [];
        let fireTimer = 0;

        function initFallbackGrid() {
            gridCols = Math.ceil((gridMaxX - gridMinX) / gridSize);
            gridRows = Math.ceil((gridMaxZ - gridMinZ) / gridSize);
            grid = new Array(gridCols).fill(0).map(() => new Array(gridRows).fill(0));
            // Add some dummy walls
            for(let i=20; i<40; i++) {
                if(i<gridCols && 30<gridRows) grid[i][30] = 1;
            }
        }
        initFallbackGrid();

        function worldToGrid(x, z) {
            const i = Math.floor((x - gridMinX) / gridSize);
            const j = Math.floor((z - gridMinZ) / gridSize);
            return { i, j };
        }

        function gridToWorld(i, j) {
            const x = gridMinX + i * gridSize + gridSize / 2;
            const z = gridMinZ + j * gridSize + gridSize / 2;
            return { x, z };
        }

        class Node {
            constructor(i, j) {
                this.i = i; this.j = j;
                this.g = 0; this.h = 0; this.f = 0;
                this.parent = null;
            }
        }

        function findPath(startX, startZ, endX, endZ) {
            const start = worldToGrid(startX, startZ);
            const end = worldToGrid(endX, endZ);

            if (start.i < 0 || start.i >= gridCols || start.j < 0 || start.j >= gridRows) return null;
            if (end.i < 0 || end.i >= gridCols || end.j < 0 || end.j >= gridRows) return null;

            let openSet = [];
            let closedSet = new Set();
            let startNode = new Node(start.i, start.j);
            let endNode = new Node(end.i, end.j);
            openSet.push(startNode);

            while (openSet.length > 0) {
                let lowestIndex = 0;
                for (let i = 1; i < openSet.length; i++) {
                    if (openSet[i].f < openSet[lowestIndex].f) lowestIndex = i;
                }
                let current = openSet[lowestIndex];

                if (current.i === endNode.i && current.j === endNode.j) {
                    let path = [];
                    let temp = current;
                    while (temp) {
                        path.push({ i: temp.i, j: temp.j });
                        temp = temp.parent;
                    }
                    return path.reverse();
                }

                openSet.splice(lowestIndex, 1);
                closedSet.add(`${current.i},${current.j}`);

                let neighbors = [
                    { i: current.i + 1, j: current.j }, { i: current.i - 1, j: current.j },
                    { i: current.i, j: current.j + 1 }, { i: current.i, j: current.j - 1 }
                ];

                for (let neighbor of neighbors) {
                    if (neighbor.i < 0 || neighbor.i >= gridCols || neighbor.j < 0 || neighbor.j >= gridRows) continue;
                    if (grid[neighbor.i][neighbor.j] !== 0) continue; // Blocked by wall or fire
                    if (closedSet.has(`${neighbor.i},${neighbor.j}`)) continue;

                    let gScore = current.g + 1;
                    let gScoreIsBest = false;
                    let neighborNode = openSet.find(n => n.i === neighbor.i && n.j === neighbor.j);

                    if (!neighborNode) {
                        neighborNode = new Node(neighbor.i, neighbor.j);
                        openSet.push(neighborNode);
                        gScoreIsBest = true;
                    } else if (gScore < neighborNode.g) {
                        gScoreIsBest = true;
                    }

                    if (gScoreIsBest) {
                        neighborNode.parent = current;
                        neighborNode.g = gScore;
                        neighborNode.h = Math.abs(neighborNode.i - endNode.i) + Math.abs(neighborNode.j - endNode.j);
                        neighborNode.f = neighborNode.g + neighborNode.h;
                    }
                }
            }
            return null;
        }

        function updatePathVisual() {
            if (!currentPath || currentPath.length === 0) {
                pathLine.geometry.setFromPoints([]);
                return;
            }
            const points = [];
            points.push(new THREE.Vector3(agent.position.x, 0.1, agent.position.z));
            for (let i = 1; i < currentPath.length; i++) {
                const w = gridToWorld(currentPath[i].i, currentPath[i].j);
                points.push(new THREE.Vector3(w.x, 0.1, w.z));
            }
            pathLine.geometry.setFromPoints(points);
        }

        // --- Environment Loading ---
        const loader = new GLTFLoader();
        loader.load('collision-world.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            
            // Center X/Z, floor at Y=0
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.x = -center.x;
            model.position.z = -center.z;
            model.position.y = -box.min.y;
            
            scene.add(model);

            // Generate Grid via Raycasting
            const newBox = new THREE.Box3().setFromObject(model);
            gridMinX = Math.floor(newBox.min.x);
            gridMaxX = Math.ceil(newBox.max.x);
            gridMinZ = Math.floor(newBox.min.z);
            gridMaxZ = Math.ceil(newBox.max.z);
            gridCols = Math.ceil((gridMaxX - gridMinX) / gridSize);
            gridRows = Math.ceil((gridMaxZ - gridMinZ) / gridSize);

            grid = new Array(gridCols).fill(0).map(() => new Array(gridRows).fill(1)); // Default blocked

            const raycaster = new THREE.Raycaster();
            const down = new THREE.Vector3(0, -1, 0);

            // Find lowest floor point
            let lowestY = Infinity;
            for (let i = 0; i < gridCols; i++) {
                for (let j = 0; j < gridRows; j++) {
                    const x = gridMinX + i * gridSize + gridSize / 2;
                    const z = gridMinZ + j * gridSize + gridSize / 2;
                    raycaster.set(new THREE.Vector3(x, 10, z), down);
                    const intersects = raycaster.intersectObject(model, true);
                    if (intersects.length > 0 && intersects[0].point.y < lowestY) {
                        lowestY = intersects[0].point.y;
                    }
                }
            }

            // Mark walkable
            for (let i = 0; i < gridCols; i++) {
                for (let j = 0; j < gridRows; j++) {
                    const x = gridMinX + i * gridSize + gridSize / 2;
                    const z = gridMinZ + j * gridSize + gridSize / 2;
                    raycaster.set(new THREE.Vector3(x, 10, z), down);
                    const intersects = raycaster.intersectObject(model, true);
                    if (intersects.length > 0) {
                        if (intersects[0].point.y <= lowestY + 0.5) {
                            grid[i][j] = 0; // Walkable
                        }
                    }
                }
            }

            state.modelLoaded = true;
            resetSimulation();
        }, undefined, (error) => {
            console.error("Failed to load model, using fallback grid.", error);
            state.modelLoaded = false;
        });

        // --- Fire Logic ---
        const firePlaneGeo = new THREE.PlaneGeometry(gridSize, gridSize);
        const firePlaneMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.5 });

        function addFireVisual(i, j) {
            const w = gridToWorld(i, j);
            const plane = new THREE.Mesh(firePlaneGeo, firePlaneMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.set(w.x, 0.05, w.z);
            fireGroup.add(plane);
        }

        function startFire() {
            const start = worldToGrid(fireStartPos.x, fireStartPos.z);
            if (start.i >= 0 && start.i < gridCols && start.j >= 0 && start.j < gridRows) {
                grid[start.i][start.j] = 2;
                activeFireCells.push(start);
                addFireVisual(start.i, start.j);
                fireParticles.visible = true;
            }
        }

        function spreadFire() {
            let newFireCells = [];
            for (let cell of activeFireCells) {
                let neighbors = [
                    { i: cell.i + 1, j: cell.j }, { i: cell.i - 1, j: cell.j },
                    { i: cell.i, j: cell.j + 1 }, { i: cell.i, j: cell.j - 1 }
                ];
                for (let n of neighbors) {
                    if (n.i >= 0 && n.i < gridCols && n.j >= 0 && n.j < gridRows) {
                        if (grid[n.i][n.j] === 0) { // Walkable, no fire
                            grid[n.i][n.j] = 2;
                            newFireCells.push(n);
                            addFireVisual(n.i, n.j);
                        }
                    }
                }
            }
            activeFireCells.push(...newFireCells);
            state.fireCellCount = activeFireCells.length;
            return newFireCells.length > 0;
        }

        function isPathCompromised() {
            if (!currentPath) return false;
            for (let node of currentPath) {
                if (grid[node.i][node.j] === 2) return true;
            }
            return false;
        }

        // --- Simulation Control ---
        function resetSimulation() {
            state.status = 'Idle';
            state.health = 100;
            state.isPaused = false;
            agent.position.copy(startPos);
            
            // Clear fire
            while(fireGroup.children.length > 0){ 
                fireGroup.remove(fireGroup.children[0]); 
            }
            for(let cell of activeFireCells) {
                if(grid[cell.i] && grid[cell.i][cell.j] === 2) grid[cell.i][cell.j] = 0;
            }
            activeFireCells = [];
            state.fireCellCount = 0;
            fireParticles.visible = false;
            fireTimer = 0;

            currentPath = [];
            updatePathVisual();
            document.getElementById('message-overlay').style.display = 'none';
        }

        function startSimulation() {
            resetSimulation();
            state.status = 'Running';
            startFire();
            currentPath = findPath(agent.position.x, agent.position.z, exitPos.x, exitPos.z);
            updatePathVisual();
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'g') startSimulation();
            if (e.key === ' ') state.isPaused = !state.isPaused;
            if (e.key.toLowerCase() === 'r') resetSimulation();
        });

        document.getElementById('slider-fire-speed').addEventListener('input', (e) => {
            state.fireSpeed = parseFloat(e.target.value);
            document.getElementById('val-fire-speed').innerText = state.fireSpeed.toFixed(2);
        });

        document.getElementById('slider-agent-speed').addEventListener('input', (e) => {
            state.agentSpeed = parseFloat(e.target.value);
            document.getElementById('val-agent-speed').innerText = state.agentSpeed.toFixed(1);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function updateHUD() {
            document.getElementById('hud-status').innerText = state.status;
            document.getElementById('hud-health').innerText = Math.floor(state.health);
            document.getElementById('hud-fire').innerText = state.fireCellCount;
            document.getElementById('hud-path').innerText = state.pathLength;
            document.getElementById('hud-dist').innerText = state.distToExit.toFixed(1);
            document.getElementById('hud-model').innerText = state.modelLoaded ? 'Yes' : 'No';
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            state.frameCount++;

            // Animate Exit
            exitMaterial.opacity = 0.5 + 0.3 * Math.sin(time * 5);
            
            // Animate Fire Particles
            if (fireParticles.visible) {
                fireParticles.children.forEach(p => {
                    p.position.y = (time * p.userData.speed + p.userData.phase) % 1.5;
                    p.position.x = fireStartPos.x + p.userData.offset.x + Math.sin(time*10 + p.userData.phase)*0.1;
                    p.position.z = fireStartPos.z + p.userData.offset.z + Math.cos(time*10 + p.userData.phase)*0.1;
                    p.scale.setScalar(1 - (p.position.y / 1.5));
                });
            }

            if (state.status === 'Running' && !state.isPaused) {
                // Fire Spread
                fireTimer += dt;
                const spreadInterval = 0.5 / state.fireSpeed; // Time to cross 1 cell
                if (fireTimer >= spreadInterval) {
                    fireTimer = 0;
                    if (spreadFire()) {
                        if (isPathCompromised()) {
                            currentPath = findPath(agent.position.x, agent.position.z, exitPos.x, exitPos.z);
                            updatePathVisual();
                        }
                    }
                }

                // Agent Movement
                if (currentPath && currentPath.length > 0) {
                    const targetNode = currentPath[0];
                    const targetWorld = gridToWorld(targetNode.i, targetNode.j);
                    const dx = targetWorld.x - agent.position.x;
                    const dz = targetWorld.z - agent.position.z;
                    const dist = Math.sqrt(dx*dx + dz*dz);

                    if (dist < 0.1) {
                        currentPath.shift();
                        updatePathVisual();
                    } else {
                        let moveDist = state.agentSpeed * dt;
                        if (moveDist > dist) moveDist = dist;
                        agent.position.x += (dx / dist) * moveDist;
                        agent.position.z += (dz / dist) * moveDist;
                    }
                }

                // Damage Check
                const agentGrid = worldToGrid(agent.position.x, agent.position.z);
                if (agentGrid.i >= 0 && agentGrid.i < gridCols && agentGrid.j >= 0 && agentGrid.j < gridRows) {
                    if (grid[agentGrid.i][agentGrid.j] === 2) {
                        state.health -= 10 * dt;
                        if (state.health <= 0) {
                            state.health = 0;
                            state.status = 'Dead';
                        }
                    }
                }

                // Exit Check
                const distToExit = agent.position.distanceTo(exitPos);
                if (distToExit < 1.0) {
                    state.status = 'Escaped';
                    document.getElementById('message-overlay').style.display = 'block';
                }
            }

            // Update State Object
            state.distToExit = agent.position.distanceTo(exitPos);
            state.pathLength = currentPath ? currentPath.length : 0;
            state.agentPosition.x = agent.position.x;
            state.agentPosition.y = agent.position.y;
            state.agentPosition.z = agent.position.z;
            state.agentValid = !isNaN(agent.position.x) && !isNaN(agent.position.y) && !isNaN(agent.position.z);

            updateHUD();
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
