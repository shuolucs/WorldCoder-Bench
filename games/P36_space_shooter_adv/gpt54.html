<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 俯视太空射击</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #030712;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }
    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      line-height: 1.8;
      backdrop-filter: blur(4px);
      user-select: none;
    }
    #help {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      line-height: 1.6;
      color: #cbd5e1;
      font-size: 13px;
      user-select: none;
    }
    #gameover {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      text-align: center;
    }
    #gameover .panel {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 24px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    #gameover h1 {
      margin: 0 0 10px;
      font-size: 36px;
      color: #f87171;
    }
    #gameover p {
      margin: 0;
      color: #e2e8f0;
    }
    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="ui">
    <div>得分: <span id="score">0</span></div>
    <div>生命: <span id="lives">3</span></div>
    <div>波次: <span id="wave">1</span></div>
  </div>

  <div id="help">
    A / D：移动飞船<br />
    Space：发射激光
  </div>

  <div id="gameover">
    <div class="panel">
      <h1>游戏结束</h1>
      <p>生命耗尽，输入已冻结。刷新页面重新开始。</p>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030712);
    scene.fog = new THREE.Fog(0x030712, 40, 95);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 俯视相机：从 +Y 向下看向 XZ 平面
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(0, 34, 18);
    camera.lookAt(0, 0, 10);

    // 灯光
    const ambient = new THREE.AmbientLight(0xffffff, 0.9);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xa5f3fc, 1.0);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // 游戏空间：X 横向，Z 纵向
    const WORLD = {
      left: -14,
      right: 14,
      bottom: 0,
      top: 34,
      shipZ: 3.2
    };

    // 星空背景
    function createStars() {
      const count = 900;
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        positions[i * 3 + 0] = THREE.MathUtils.randFloatSpread(120);
        positions[i * 3 + 1] = THREE.MathUtils.randFloat(8, 70);
        positions[i * 3 + 2] = THREE.MathUtils.randFloatSpread(120);
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.22,
        transparent: true,
        opacity: 0.9
      });
      const stars = new THREE.Points(geo, mat);
      scene.add(stars);
    }
    createStars();

    // 地面网格辅助，增强俯视感
    const grid = new THREE.GridHelper(34, 17, 0x1e3a8a, 0x0f172a);
    grid.position.set(0, -0.01, 17);
    scene.add(grid);

    // 玩家飞船
    function createShip() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.ConeGeometry(0.85, 2.4, 8),
        new THREE.MeshStandardMaterial({
          color: 0x60a5fa,
          emissive: 0x1d4ed8,
          emissiveIntensity: 0.7,
          metalness: 0.2,
          roughness: 0.4
        })
      );
      body.rotation.x = Math.PI / 2;
      group.add(body);

      const wingMat = new THREE.MeshStandardMaterial({
        color: 0xcbd5e1,
        emissive: 0x334155,
        emissiveIntensity: 0.6
      });

      const leftWing = new THREE.Mesh(
        new THREE.BoxGeometry(1.8, 0.25, 0.9),
        wingMat
      );
      leftWing.position.set(-0.9, 0, -0.1);
      group.add(leftWing);

      const rightWing = leftWing.clone();
      rightWing.position.x = 0.9;
      group.add(rightWing);

      const cockpit = new THREE.Mesh(
        new THREE.SphereGeometry(0.35, 12, 12),
        new THREE.MeshStandardMaterial({
          color: 0x93c5fd,
          emissive: 0x0ea5e9,
          emissiveIntensity: 0.8
        })
      );
      cockpit.position.set(0, 0.25, 0.15);
      group.add(cockpit);

      group.position.set(0, 0.35, WORLD.shipZ);
      return group;
    }

    const ship = createShip();
    scene.add(ship);

    // 容器
    const enemies = [];
    const lasers = [];
    const explosions = [];

    // 状态
    let score = 0;
    let lives = 3;
    let waveNum = 1;
    let shotsFired = 0;
    let gameOver = false;
    let fireCooldown = 0;

    // UI
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const waveEl = document.getElementById('wave');
    const gameOverEl = document.getElementById('gameover');

    function updateUI() {
      scoreEl.textContent = String(score);
      livesEl.textContent = String(lives);
      waveEl.textContent = String(waveNum);
    }

    // 输入
    const keys = {
      a: false,
      d: false,
      space: false
    };

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyA') keys.a = true;
      if (e.code === 'KeyD') keys.d = true;
      if (e.code === 'Space') {
        keys.space = true;
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'KeyA') keys.a = false;
      if (e.code === 'KeyD') keys.d = false;
      if (e.code === 'Space') keys.space = false;
    });

    // 激光
    function fireLaser() {
      const laser = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.12, 1.8),
        new THREE.MeshBasicMaterial({
          color: 0x22d3ee
        })
      );
      laser.position.set(ship.position.x, 0.35, ship.position.z + 1.4);
      scene.add(laser);
      lasers.push({
        mesh: laser,
        speed: 28
      });
      shotsFired++;
    }

    // 敌机
    function createEnemy(x, z, speed) {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.8, 0),
        new THREE.MeshStandardMaterial({
          color: 0xf87171,
          emissive: 0x7f1d1d,
          emissiveIntensity: 0.8,
          metalness: 0.1,
          roughness: 0.5
        })
      );
      body.rotation.z = Math.PI / 4;
      group.add(body);

      const wing = new THREE.Mesh(
        new THREE.BoxGeometry(1.7, 0.2, 0.55),
        new THREE.MeshStandardMaterial({
          color: 0xfca5a5,
          emissive: 0x991b1b,
          emissiveIntensity: 0.5
        })
      );
      group.add(wing);

      group.position.set(x, 0.3, z);
      scene.add(group);

      return {
        mesh: group,
        speed,
        radius: 0.8
      };
    }

    function spawnWave() {
      const count = 10;
      const speedBase = 2.4 + (waveNum - 1) * 0.45;
      const rows = 2;
      const cols = 5;
      const xSpacing = 5.4 - Math.min((waveNum - 1) * 0.15, 1.2);
      const zSpacing = 2.6;
      const startZ = WORLD.top + 3;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const jitterX = THREE.MathUtils.randFloat(-0.5, 0.5);
          const jitterZ = THREE.MathUtils.randFloat(-0.3, 0.3);
          const x = -((cols - 1) * xSpacing) / 2 + c * xSpacing + jitterX;
          const z = startZ + r * zSpacing + jitterZ;
          enemies.push(createEnemy(x, z, speedBase + THREE.MathUtils.randFloat(0, 0.8)));
        }
      }
      updateUI();
    }

    // 粒子爆炸
    function createExplosion(position, color = 0xffaa66) {
      const count = 22;
      const positions = new Float32Array(count * 3);
      const velocities = [];
      for (let i = 0; i < count; i++) {
        positions[i * 3 + 0] = position.x;
        positions[i * 3 + 1] = 0.4;
        positions[i * 3 + 2] = position.z;

        velocities.push(new THREE.Vector3(
          THREE.MathUtils.randFloatSpread(6),
          THREE.MathUtils.randFloat(0.5, 3.0),
          THREE.MathUtils.randFloatSpread(6)
        ));
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({
        color,
        size: 0.26,
        transparent: true,
        opacity: 1,
        depthWrite: false
      });
      const points = new THREE.Points(geo, mat);
      scene.add(points);

      explosions.push({
        points,
        velocities,
        life: 0.7,
        maxLife: 0.7
      });
    }

    function removeEnemyAtIndex(index, awardScore = true) {
      const enemy = enemies[index];
      if (!enemy) return;
      createExplosion(enemy.mesh.position, 0xff9966);
      scene.remove(enemy.mesh);
      if (enemy.mesh.geometry) enemy.mesh.geometry.dispose?.();
      if (enemy.mesh.material) enemy.mesh.material.dispose?.();
      enemies.splice(index, 1);
      if (awardScore) {
        score += 100;
      }
      updateUI();
    }

    // 生命规则固定：
    // 1) 敌机到达底部（Z <= WORLD.bottom）时，玩家失去 1 条生命
    // 2) 敌机与飞船碰撞时，玩家失去 1 条生命
    // 两种情况都会销毁该敌机并产生粒子效果
    function damagePlayer() {
      if (gameOver) return;
      lives = Math.max(0, lives - 1);
      createExplosion(ship.position, 0x66ccff);
      updateUI();

      if (lives <= 0) {
        gameOver = true;
        keys.a = keys.d = keys.space = false;
        gameOverEl.style.display = 'flex';
      }
    }

    // 评测辅助接口
    window.__ICG_destroyOneEnemy__ = function () {
      if (enemies.length > 0) {
        removeEnemyAtIndex(0, true);
      }
    };

    window.__ICG_damagePlayer__ = function () {
      damagePlayer();
    };

    // 初始化首波
    spawnWave();
    updateUI();

    const clock = new THREE.Clock();

    function updateShip(dt) {
      if (gameOver) return;

      const moveSpeed = 14;
      if (keys.a) ship.position.x -= moveSpeed * dt;
      if (keys.d) ship.position.x += moveSpeed * dt;

      ship.position.x = THREE.MathUtils.clamp(ship.position.x, WORLD.left + 1.2, WORLD.right - 1.2);

      fireCooldown -= dt;
      if (keys.space && fireCooldown <= 0) {
        fireLaser();
        fireCooldown = 0.16;
      }
    }

    function updateLasers(dt) {
      for (let i = lasers.length - 1; i >= 0; i--) {
        const laser = lasers[i];
        laser.mesh.position.z += laser.speed * dt;

        if (laser.mesh.position.z > WORLD.top + 8) {
          scene.remove(laser.mesh);
          lasers.splice(i, 1);
        }
      }
    }

    function updateEnemies(dt) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        enemy.mesh.position.z -= enemy.speed * dt;
        enemy.mesh.rotation.y += dt * 2.0;

        // 到达底部：失去 1 命，并移除敌机
        if (enemy.mesh.position.z <= WORLD.bottom) {
          createExplosion(enemy.mesh.position, 0xff7744);
          scene.remove(enemy.mesh);
          enemies.splice(i, 1);
          damagePlayer();
          continue;
        }

        // 与玩家碰撞：失去 1 命，并移除敌机
        const dx = enemy.mesh.position.x - ship.position.x;
        const dz = enemy.mesh.position.z - ship.position.z;
        const distSq = dx * dx + dz * dz;
        if (!gameOver && distSq < 1.6 * 1.6) {
          createExplosion(enemy.mesh.position, 0xff5544);
          scene.remove(enemy.mesh);
          enemies.splice(i, 1);
          damagePlayer();
        }
      }

      if (!gameOver && enemies.length === 0) {
        waveNum++;
        updateUI();
        spawnWave();
      }
    }

    function handleCollisions() {
      for (let li = lasers.length - 1; li >= 0; li--) {
        const laser = lasers[li];
        let hit = false;

        for (let ei = enemies.length - 1; ei >= 0; ei--) {
          const enemy = enemies[ei];
          const dx = laser.mesh.position.x - enemy.mesh.position.x;
          const dz = laser.mesh.position.z - enemy.mesh.position.z;
          const distSq = dx * dx + dz * dz;

          // 激光一击必杀
          if (distSq < 0.95 * 0.95) {
            scene.remove(laser.mesh);
            lasers.splice(li, 1);
            removeEnemyAtIndex(ei, true);
            hit = true;
            break;
          }
        }

        if (hit) continue;
      }
    }

    function updateExplosions(dt) {
      for (let i = explosions.length - 1; i >= 0; i--) {
        const exp = explosions[i];
        exp.life -= dt;

        const attr = exp.points.geometry.getAttribute('position');
        for (let p = 0; p < exp.velocities.length; p++) {
          const v = exp.velocities[p];
          attr.array[p * 3 + 0] += v.x * dt;
          attr.array[p * 3 + 1] += v.y * dt;
          attr.array[p * 3 + 2] += v.z * dt;

          v.multiplyScalar(0.985);
          v.y -= 2.2 * dt;
        }
        attr.needsUpdate = true;
        exp.points.material.opacity = Math.max(0, exp.life / exp.maxLife);

        if (exp.life <= 0) {
          scene.remove(exp.points);
          exp.points.geometry.dispose();
          exp.points.material.dispose();
          explosions.splice(i, 1);
        }
      }
    }

    function updateStateExposure() {
      window.__3D_STATE__ = {
        score,
        lives,
        waveNum,
        enemiesAlive: enemies.length,
        shipPos: {
          x: ship.position.x,
          y: ship.position.y,
          z: ship.position.z
        },
        shotsFired
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);

      updateShip(dt);
      updateLasers(dt);
      updateEnemies(dt);
      handleCollisions();
      updateExplosions(dt);

      updateStateExposure();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
