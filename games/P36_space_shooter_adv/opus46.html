<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Shooter - Top Down</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 10px; left: 10px; color: #0ff;
    font-size: 18px; z-index: 10; text-shadow: 0 0 8px #0ff;
  }
  #ui div { margin-bottom: 6px; }
  #game-over {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #f44; font-size: 48px; font-weight: bold; display: none; z-index: 20;
    text-shadow: 0 0 20px #f00; text-align: center;
  }
  #game-over .sub { font-size: 20px; color: #fff; margin-top: 10px; }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="ui">
  <div>SCORE: <span id="score">0</span></div>
  <div>LIVES: <span id="lives">3</span></div>
  <div>WAVE: <span id="wave">1</span></div>
</div>
<div id="game-over">GAME OVER<div class="sub">Press R to restart</div></div>

<script type="module">
import * as THREE from 'three';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.Fog(0x050510, 80, 120);

const aspect = window.innerWidth / window.innerHeight;
const frustumSize = 50;
const camera = new THREE.OrthographicCamera(
  -frustumSize * aspect / 2, frustumSize * aspect / 2,
  frustumSize / 2, -frustumSize / 2, 0.1, 200
);
// Camera looking down from +Y axis onto XZ plane
camera.position.set(0, 80, 0);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 20, 5);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x00aaff, 1, 60);
pointLight.position.set(0, 10, 0);
scene.add(pointLight);

// ============ STARFIELD ============
const starCount = 600;
const starGeo = new THREE.BufferGeometry();
const starPositions = new Float32Array(starCount * 3);
const starColors = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPositions[i * 3] = (Math.random() - 0.5) * 120;
  starPositions[i * 3 + 1] = -1;
  starPositions[i * 3 + 2] = (Math.random() - 0.5) * 80;
  const brightness = 0.3 + Math.random() * 0.7;
  starColors[i * 3] = brightness;
  starColors[i * 3 + 1] = brightness;
  starColors[i * 3 + 2] = brightness;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
const starMat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, opacity: 0.8 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ============ GAME STATE ============
let score = 0;
let lives = 3;
let waveNum = 1;
let shotsFired = 0;
let gameOver = false;
let enemiesAlive = 0;

const PLAY_AREA_X = frustumSize * aspect / 2 - 2;
const PLAY_AREA_TOP = -frustumSize / 2 + 2;   // top of screen in Z (negative Z)
const PLAY_AREA_BOTTOM = frustumSize / 2 - 2;  // bottom of screen in Z (positive Z)
const SHIP_Z = PLAY_AREA_BOTTOM - 2;           // ship near bottom

const keys = {};
const lasers = [];
const enemies = [];
const explosions = [];

// ============ PLAYER SHIP ============
function createShip() {
  const group = new THREE.Group();

  // Main body
  const bodyShape = new THREE.Shape();
  bodyShape.moveTo(0, -1.5);
  bodyShape.lineTo(-1.2, 1.2);
  bodyShape.lineTo(-0.3, 0.6);
  bodyShape.lineTo(0, 0.8);
  bodyShape.lineTo(0.3, 0.6);
  bodyShape.lineTo(1.2, 1.2);
  bodyShape.closePath();

  const extrudeSettings = { depth: 0.4, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.1, bevelSegments: 2 };
  const bodyGeo = new THREE.ExtrudeGeometry(bodyShape, extrudeSettings);
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0x00aaff, emissive: 0x003366, shininess: 80 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.rotation.x = -Math.PI / 2;
  body.position.y = 0.2;
  group.add(body);

  // Engine glow
  const engineGeo = new THREE.SphereGeometry(0.3, 8, 8);
  const engineMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
  const engine = new THREE.Mesh(engineGeo, engineMat);
  engine.position.set(0, 0.3, 0.8);
  engine.scale.set(1, 0.5, 1.5);
  group.add(engine);

  // Engine light
  const engineLight = new THREE.PointLight(0x00ffff, 0.5, 5);
  engineLight.position.set(0, 0.3, 1.2);
  group.add(engineLight);

  return group;
}

const ship = createShip();
ship.position.set(0, 0, SHIP_Z);
scene.add(ship);

// ============ ENEMY CREATION ============
function createEnemyMesh() {
  const group = new THREE.Group();

  // Body - angular shape
  const bodyGeo = new THREE.OctahedronGeometry(0.8, 0);
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff3333, emissive: 0x440000, shininess: 60 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.scale.set(1.2, 0.4, 1);
  body.position.y = 0.3;
  group.add(body);

  // Wings
  const wingGeo = new THREE.BoxGeometry(2.4, 0.1, 0.6);
  const wingMat = new THREE.MeshPhongMaterial({ color: 0xcc2222, emissive: 0x330000 });
  const wings = new THREE.Mesh(wingGeo, wingMat);
  wings.position.y = 0.3;
  group.add(wings);

  // Cockpit glow
  const cockpitGeo = new THREE.SphereGeometry(0.25, 8, 8);
  const cockpitMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
  const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
  cockpit.position.set(0, 0.5, -0.2);
  group.add(cockpit);

  return group;
}

// ============ LASER CREATION ============
function createLaser() {
  const geo = new THREE.BoxGeometry(0.12, 0.3, 1.8);
  const mat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
  const laser = new THREE.Mesh(geo, mat);

  // Glow effect
  const glowGeo = new THREE.BoxGeometry(0.3, 0.3, 2.2);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.3 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  laser.add(glow);

  return laser;
}

// ============ EXPLOSION PARTICLES ============
function createExplosion(position) {
  const particleCount = 30;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  const colors = new Float32Array(particleCount * 3);
  const velocities = [];

  for (let i = 0; i < particleCount; i++) {
    positions[i * 3] = position.x;
    positions[i * 3 + 1] = position.y;
    positions[i * 3 + 2] = position.z;

    velocities.push(new THREE.Vector3(
      (Math.random() - 0.5) * 20,
      (Math.random() - 0.5) * 10,
      (Math.random() - 0.5) * 20
    ));

    // Orange to yellow colors
    colors[i * 3] = 1;
    colors[i * 3 + 1] = 0.3 + Math.random() * 0.7;
    colors[i * 3 + 2] = Math.random() * 0.3;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 0.5,
    vertexColors: true,
    transparent: true,
    opacity: 1,
    blending: THREE.AdditiveBlending
  });

  const points = new THREE.Points(geo, mat);
  scene.add(points);

  // Also add small mesh debris
  const debrisGroup = new THREE.Group();
  for (let i = 0; i < 6; i++) {
    const debrisGeo = new THREE.TetrahedronGeometry(0.15 + Math.random() * 0.2);
    const debrisMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(1, 0.5 + Math.random() * 0.5, 0) });
    const debris = new THREE.Mesh(debrisGeo, debrisMat);
    debris.position.copy(position);
    debris.userData.velocity = new THREE.Vector3(
      (Math.random() - 0.5) * 15,
      Math.random() * 8,
      (Math.random() - 0.5) * 15
    );
    debrisGroup.add(debris);
  }
  scene.add(debrisGroup);

  // Flash light
  const flash = new THREE.PointLight(0xff8800, 3, 15);
  flash.position.copy(position);
  flash.position.y = 2;
  scene.add(flash);

  return { points, geo, mat, velocities, debrisGroup, flash, life: 1.0 };
}

// ============ WAVE SPAWNING ============
function spawnWave() {
  const count = 10;
  const spacing = 4;
  const cols = 5;
  const rows = Math.ceil(count / cols);
  const startX = -(cols - 1) * spacing / 2;
  const startZ = PLAY_AREA_TOP - 5;

  const speed = 4 + waveNum * 0.8; // Increases with wave

  for (let i = 0; i < count; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const enemy = createEnemyMesh();
    const x = startX + col * spacing + (Math.random() - 0.5) * 1.5;
    const z = startZ - row * 3 - Math.random() * 2;
    enemy.position.set(x, 0, z);
    enemy.userData.speed = speed + Math.random() * 1.5;
    enemy.userData.alive = true;
    enemy.userData.wobbleOffset = Math.random() * Math.PI * 2;
    enemy.userData.wobbleSpeed = 1 + Math.random() * 2;
    enemy.userData.wobbleAmp = 0.5 + Math.random() * 1;
    scene.add(enemy);
    enemies.push(enemy);
  }
  enemiesAlive = enemies.filter(e => e.userData.alive).length;
}

// ============ SHOOTING ============
let shootCooldown = 0;
const SHOOT_COOLDOWN = 0.15; // seconds between shots

function shootLaser() {
  if (gameOver) return;
  if (shootCooldown > 0) return;

  const laser = createLaser();
  laser.position.set(ship.position.x, 0.5, ship.position.z - 1);
  laser.userData.speed = 60;
  scene.add(laser);
  lasers.push(laser);
  shotsFired++;
  shootCooldown = SHOOT_COOLDOWN;
}

// ============ DESTROY ENEMY ============
function destroyEnemy(enemy) {
  if (!enemy.userData.alive) return;
  enemy.userData.alive = false;
  const explosion = createExplosion(enemy.position.clone());
  explosions.push(explosion);
  scene.remove(enemy);
  score += 100;
  enemiesAlive = enemies.filter(e => e.userData.alive).length;
  updateUI();
}

// Rule: lives decrease by 1 when an enemy reaches the bottom edge or collides with the player ship
function damagePlayer() {
  if (gameOver) return;
  lives--;
  updateUI();

  // Flash effect on ship
  ship.children.forEach(c => {
    if (c.material) {
      const origColor = c.material.color.clone();
      c.material.color.set(0xff0000);
      setTimeout(() => { if (c.material) c.material.color.copy(origColor); }, 200);
    }
  });

  if (lives <= 0) {
    gameOver = true;
    document.getElementById('game-over').style.display = 'block';
  }
}

// ============ UI UPDATE ============
function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('wave').textContent = waveNum;
}

// ============ INPUT ============
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    shootLaser();
  }
  if (e.code === 'KeyR' && gameOver) {
    restartGame();
  }
});
window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// ============ RESTART ============
function restartGame() {
  score = 0;
  lives = 3;
  waveNum = 1;
  shotsFired = 0;
  gameOver = false;
  enemiesAlive = 0;

  // Remove all enemies
  enemies.forEach(e => scene.remove(e));
  enemies.length = 0;

  // Remove all lasers
  lasers.forEach(l => scene.remove(l));
  lasers.length = 0;

  // Remove all explosions
  explosions.forEach(exp => {
    scene.remove(exp.points);
    scene.remove(exp.debrisGroup);
    scene.remove(exp.flash);
    exp.geo.dispose();
    exp.mat.dispose();
  });
  explosions.length = 0;

  ship.position.set(0, 0, SHIP_Z);
  document.getElementById('game-over').style.display = 'none';
  updateUI();
  spawnWave();
}

// ============ COLLISION DETECTION ============
function checkCollisions() {
  // Laser vs Enemy
  for (let li = lasers.length - 1; li >= 0; li--) {
    const laser = lasers[li];
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const enemy = enemies[ei];
      if (!enemy.userData.alive) continue;

      const dx = laser.position.x - enemy.position.x;
      const dz = laser.position.z - enemy.position.z;
      const dist = Math.sqrt(dx * dx + dz * dz);

      if (dist < 1.5) {
        // Hit! Destroy enemy
        destroyEnemy(enemy);
        // Remove laser
        scene.remove(laser);
        lasers.splice(li, 1);
        break;
      }
    }
  }

  // Enemy vs Player ship collision
  for (let ei = 0; ei < enemies.length; ei++) {
    const enemy = enemies[ei];
    if (!enemy.userData.alive) continue;

    const dx = ship.position.x - enemy.position.x;
    const dz = ship.position.z - enemy.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);

    if (dist < 1.8) {
      // Enemy collides with ship: destroy enemy and damage player
      destroyEnemy(enemy);
      damagePlayer();
    }
  }
}

// ============ EXPOSE HELPERS ============
window.__ICG_destroyOneEnemy__ = function() {
  const alive = enemies.find(e => e.userData.alive);
  if (alive) destroyEnemy(alive);
};

window.__ICG_damagePlayer__ = function() {
  damagePlayer();
};

// ============ GAME LOOP ============
const clock = new THREE.Clock();
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  time += dt;

  // ---- Shoot cooldown ----
  if (shootCooldown > 0) shootCooldown -= dt;

  // ---- Continuous shooting while space held ----
  if (keys['Space'] && !gameOver) {
    shootLaser();
  }

  if (!gameOver) {
    // ---- Player movement ----
    const shipSpeed = 25;
    if (keys['KeyA'] || keys['ArrowLeft']) {
      ship.position.x -= shipSpeed * dt;
    }
    if (keys['KeyD'] || keys['ArrowRight']) {
      ship.position.x += shipSpeed * dt;
    }
    // Clamp ship position
    ship.position.x = THREE.MathUtils.clamp(ship.position.x, -PLAY_AREA_X, PLAY_AREA_X);

    // Ship slight tilt based on movement
    const targetRotZ = (keys['KeyA'] || keys['ArrowLeft']) ? 0.2 : (keys['KeyD'] || keys['ArrowRight']) ? -0.2 : 0;
    ship.rotation.y = THREE.MathUtils.lerp(ship.rotation.y, targetRotZ, 5 * dt);

    // ---- Move lasers (toward -Z = upward on screen) ----
    for (let i = lasers.length - 1; i >= 0; i--) {
      const laser = lasers[i];
      laser.position.z -= laser.userData.speed * dt;
      if (laser.position.z < PLAY_AREA_TOP - 10) {
        scene.remove(laser);
        lasers.splice(i, 1);
      }
    }

    // ---- Move enemies (toward +Z = downward on screen) ----
    for (let i = enemies.length - 1; i >= 0; i--) {
      const enemy = enemies[i];
      if (!enemy.userData.alive) continue;

      enemy.position.z += enemy.userData.speed * dt;

      // Wobble side to side
      enemy.position.x += Math.sin(time * enemy.userData.wobbleSpeed + enemy.userData.wobbleOffset) * enemy.userData.wobbleAmp * dt;

      // Slight rotation animation
      enemy.rotation.y = Math.sin(time * 2 + enemy.userData.wobbleOffset) * 0.3;

      // Enemy reaches bottom: damage player and remove
      if (enemy.position.z > PLAY_AREA_BOTTOM + 2) {
        enemy.userData.alive = false;
        scene.remove(enemy);
        damagePlayer();
        enemiesAlive = enemies.filter(e => e.userData.alive).length;
      }
    }

    // ---- Check collisions ----
    checkCollisions();

    // ---- Check wave complete ----
    enemiesAlive = enemies.filter(e => e.userData.alive).length;
    if (enemiesAlive === 0 && enemies.length > 0) {
      // Clean up dead enemies from array
      enemies.length = 0;
      waveNum++;
      updateUI();
      // Small delay before next wave
      setTimeout(() => {
        if (!gameOver) spawnWave();
      }, 1000);
    }
  }

  // ---- Update explosions ----
  for (let i = explosions.length - 1; i >= 0; i--) {
    const exp = explosions[i];
    exp.life -= dt * 2;

    if (exp.life <= 0) {
      scene.remove(exp.points);
      scene.remove(exp.debrisGroup);
      scene.remove(exp.flash);
      exp.geo.dispose();
      exp.mat.dispose();
      explosions.splice(i, 1);
      continue;
    }

    // Update particle positions
    const posArr = exp.geo.attributes.position.array;
    for (let j = 0; j < posArr.length / 3; j++) {
      posArr[j * 3] += exp.velocities[j].x * dt;
      posArr[j * 3 + 1] += exp.velocities[j].y * dt;
      posArr[j * 3 + 2] += exp.velocities[j].z * dt;
    }
    exp.geo.attributes.position.needsUpdate = true;
    exp.mat.opacity = exp.life;
    exp.mat.size = 0.5 * exp.life;

    // Update debris
    exp.debrisGroup.children.forEach(d => {
      d.position.x += d.userData.velocity.x * dt;
      d.position.y += d.userData.velocity.y * dt;
      d.position.z += d.userData.velocity.z * dt;
      d.userData.velocity.y -= 15 * dt; // gravity
      d.rotation.x += dt * 5;
      d.rotation.z += dt * 3;
      if (d.material) d.material.opacity = exp.life;
    });

    // Fade flash
    exp.flash.intensity = exp.life * 3;
  }

  // ---- Animate stars (subtle scroll) ----
  const starPos = starGeo.attributes.position.array;
  for (let i = 0; i < starCount; i++) {
    starPos[i * 3 + 2] += dt * 3;
    if (starPos[i * 3 + 2] > 40) {
      starPos[i * 3 + 2] = -40;
      starPos[i * 3] = (Math.random() - 0.5) * 120;
    }
  }
  starGeo.attributes.position.needsUpdate = true;

  // ---- Engine glow pulse ----
  if (ship.children[1]) {
    ship.children[1].scale.z = 1.5 + Math.sin(time * 15) * 0.3;
  }

  // ---- Update state ----
  window.__3D_STATE__ = {
    score,
    lives,
    waveNum,
    enemiesAlive,
    shipPos: { x: ship.position.x, y: ship.position.y, z: ship.position.z },
    shotsFired
  };

  renderer.render(scene, camera);
}

// ============ WINDOW RESIZE ============
window.addEventListener('resize', () => {
  const newAspect = window.innerWidth / window.innerHeight;
  camera.left = -frustumSize * newAspect / 2;
  camera.right = frustumSize * newAspect / 2;
  camera.top = frustumSize / 2;
  camera.bottom = -frustumSize / 2;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
updateUI();
spawnWave();
animate();

</script>
</body>
</html>
