<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Histogram Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    padding: 20px;
    border-radius: 12px;
    min-width: 220px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  #hud-panel h2 {
    font-size: 18px;
    margin-bottom: 12px;
    color: #f0f0f0;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 8px;
  }
  #hud-panel .stat {
    margin-bottom: 8px;
    font-size: 14px;
  }
  #hud-panel .stat label {
    color: #aaa;
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #hud-panel .stat span {
    font-size: 22px;
    font-weight: bold;
  }

  #category-buttons {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  #category-buttons button {
    padding: 10px 20px;
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    transition: all 0.3s;
    min-width: 100px;
  }
  #category-buttons button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  #category-buttons button.selected {
    border-color: #fff;
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
  }
  #btn-sales { background: #e74c3c; }
  #btn-marketing { background: #2ecc71; }
  #btn-engineering { background: #3498db; }
  #btn-support { background: #f39c12; }
  #btn-boost { background: #9b59b6; }
  #btn-reset { background: #555; }
  #btn-sort { background: #1abc9c; }

  .score-labels {
    position: absolute;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="hud-panel">
  <h2>📊 Histogram Stats</h2>
  <div class="stat">
    <label>Total Score</label>
    <span id="total-score">100</span>
  </div>
  <div class="stat">
    <label>Selected Category</label>
    <span id="selected-category">None</span>
  </div>
  <div class="stat">
    <label>Selected Score</label>
    <span id="selected-score">0</span>
  </div>
</div>

<div id="category-buttons">
  <button id="btn-sales">Sales (1)</button>
  <button id="btn-marketing">Marketing (2)</button>
  <button id="btn-engineering">Engineering (3)</button>
  <button id="btn-support">Support (4)</button>
  <button id="btn-boost">⚡ Boost (B)</button>
  <button id="btn-sort">⇅ Sort</button>
  <button id="btn-reset">↺ Reset</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // --- Constants ---
  const CATEGORIES = ['Sales', 'Marketing', 'Engineering', 'Support'];
  const QUARTERS = ['Q1', 'Q2', 'Q3'];
  const COLORS = {
    Sales: 0xe74c3c,
    Marketing: 0x2ecc71,
    Engineering: 0x3498db,
    Support: 0xf39c12
  };
  const OPACITIES = [1.0, 0.8, 0.6];
  const INITIAL_DATA = {
    Sales: [3, 5, 4],
    Marketing: [2, 4, 6],
    Engineering: [7, 3, 5],
    Support: [1, 6, 2]
  };
  const WEIGHTS = [1, 2, 3];
  const BAR_WIDTH = 0.6;
  const BAR_DEPTH = 0.6;
  const CATEGORY_SPACING = 2.5;
  const QUARTER_SPACING = 0.8;
  const ANIM_FRAMES = 30;

  // --- Deep clone initial data ---
  function cloneData(data) {
    const c = {};
    for (const k in data) c[k] = [...data[k]];
    return c;
  }

  // --- Scene Setup ---
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(8, 6, 8);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  scene.add(dirLight);

  // Grid
  const gridHelper = new THREE.GridHelper(12, 12, 0x444466, 0x333355);
  scene.add(gridHelper);

  // OrbitControls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.target.set(0, 1.5, 0);

  // --- State ---
  let barData = cloneData(INITIAL_DATA);
  let selectedCategory = null;
  let isSorted = false;
  let boostCount = 0;

  // Bar meshes: barMeshes[category][quarterIndex]
  const barMeshes = {};
  // Target heights for animation
  const targetHeights = {};
  // Current animated heights
  const currentHeights = {};
  // Category groups
  const categoryGroups = {};
  // Original X positions
  const originalXPositions = {};
  // Current X positions
  const currentXPositions = {};
  // Target X positions
  const targetXPositions = {};

  // Labels
  const labelSprites = {};

  // Highlight ring
  let highlightRing = null;
  let highlightRingTargetX = 0;
  let highlightRingCurrentX = 0;

  // --- Create text sprite ---
  function createTextSprite(text, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.font = 'bold 28px Segoe UI, sans-serif';
    ctx.fillStyle = color || '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 128, 32);
    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(material);
    sprite.scale.set(2, 0.5, 1);
    return sprite;
  }

  // --- Compute category X position (original order) ---
  function getOriginalX(catIndex) {
    return (catIndex - 1.5) * CATEGORY_SPACING;
  }

  // --- Initialize bars ---
  function initBars() {
    CATEGORIES.forEach((cat, ci) => {
      const group = new THREE.Group();
      const xPos = getOriginalX(ci);
      group.position.x = xPos;
      originalXPositions[cat] = xPos;
      currentXPositions[cat] = xPos;
      targetXPositions[cat] = xPos;

      barMeshes[cat] = [];
      targetHeights[cat] = [];
      currentHeights[cat] = [];

      QUARTERS.forEach((q, qi) => {
        const h = barData[cat][qi];
        const geometry = new THREE.BoxGeometry(BAR_WIDTH, 1, BAR_DEPTH);
        // Shift geometry so bottom is at y=0
        geometry.translate(0, 0.5, 0);

        const material = new THREE.MeshPhongMaterial({
          color: COLORS[cat],
          transparent: true,
          opacity: OPACITIES[qi],
          emissive: 0x000000,
          emissiveIntensity: 0
        });

        const mesh = new THREE.Mesh(geometry, material);
        const zPos = (qi - 1) * QUARTER_SPACING;
        mesh.position.set(0, 0, zPos);
        mesh.scale.y = h;
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        group.add(mesh);
        barMeshes[cat].push(mesh);
        targetHeights[cat].push(h);
        currentHeights[cat].push(h);
      });

      // Category label
      const colorHex = '#' + new THREE.Color(COLORS[cat]).getHexString();
      const label = createTextSprite(cat, colorHex);
      label.position.set(0, -0.5, 0);
      group.add(label);
      labelSprites[cat] = label;

      scene.add(group);
      categoryGroups[cat] = group;
    });

    // Quarter labels along Z
    QUARTERS.forEach((q, qi) => {
      const label = createTextSprite(q, '#888888');
      label.position.set(getOriginalX(0) - CATEGORY_SPACING, 0, (qi - 1) * QUARTER_SPACING);
      label.scale.set(1.2, 0.3, 1);
      scene.add(label);
    });
  }

  // --- Highlight Ring ---
  function createHighlightRing() {
    const geometry = new THREE.TorusGeometry(0.8, 0.08, 16, 32);
    const material = new THREE.MeshPhongMaterial({
      color: 0xffd700,
      emissive: 0xffd700,
      emissiveIntensity: 0.5,
      transparent: true,
      opacity: 0.9
    });
    highlightRing = new THREE.Mesh(geometry, material);
    highlightRing.rotation.x = Math.PI / 2;
    scene.add(highlightRing);
  }

  // --- Score Calculation ---
  function calcScore(cat) {
    return barData[cat][0] * WEIGHTS[0] + barData[cat][1] * WEIGHTS[1] + barData[cat][2] * WEIGHTS[2];
  }

  function calcScores() {
    const scores = {};
    CATEGORIES.forEach(cat => {
      scores[cat] = calcScore(cat);
    });
    return scores;
  }

  function calcTotalScore(scores) {
    return Object.values(scores).reduce((a, b) => a + b, 0);
  }

  function getTopCategory(scores) {
    let top = null;
    let maxScore = -Infinity;
    CATEGORIES.forEach(cat => {
      if (scores[cat] > maxScore) {
        maxScore = scores[cat];
        top = cat;
      }
    });
    return top;
  }

  // --- Update HUD ---
  function updateHUD() {
    const scores = calcScores();
    const total = calcTotalScore(scores);
    document.getElementById('total-score').textContent = total;
    document.getElementById('selected-category').textContent = selectedCategory || 'None';
    document.getElementById('selected-score').textContent = selectedCategory ? scores[selectedCategory] : '0';

    // Update button selection
    CATEGORIES.forEach(cat => {
      const btnId = '#btn-' + cat.toLowerCase();
      const btn = document.querySelector(btnId);
      if (btn) {
        btn.classList.toggle('selected', selectedCategory === cat);
      }
    });
  }

  // --- Update highlight ring position ---
  function updateHighlightRing() {
    const scores = calcScores();
    const topCat = getTopCategory(scores);
    if (topCat && highlightRing) {
      const maxH = Math.max(...barData[topCat]);
      highlightRing.visible = true;
      highlightRingTargetX = targetXPositions[topCat];
      highlightRing.position.z = 0;
      // Y will be set in animation
    }
  }

  // --- Set target heights from barData ---
  function syncTargetHeights() {
    CATEGORIES.forEach(cat => {
      QUARTERS.forEach((q, qi) => {
        targetHeights[cat][qi] = barData[cat][qi];
      });
    });
  }

  // --- Set emissive for selection ---
  function updateBarEmissive() {
    CATEGORIES.forEach(cat => {
      barMeshes[cat].forEach((mesh, qi) => {
        if (selectedCategory === cat) {
          mesh.material.emissive.setHex(COLORS[cat]);
          mesh.material.emissiveIntensity = 0.3;
        } else {
          mesh.material.emissive.setHex(0x000000);
          mesh.material.emissiveIntensity = 0;
        }
      });
    });
  }

  // --- Select Category ---
  function selectCategory(cat) {
    if (cat && !CATEGORIES.includes(cat)) return;
    selectedCategory = cat;
    updateBarEmissive();
    updateHUD();
  }

  // --- Boost ---
  function boost() {
    if (!selectedCategory) return;
    boostCount++;
    barData[selectedCategory] = barData[selectedCategory].map(v => v + 2);
    syncTargetHeights();
    updateHUD();
    updateHighlightRing();
    if (isSorted) {
      applySortPositions();
    }
  }

  // --- Reset ---
  function resetAll() {
    barData = cloneData(INITIAL_DATA);
    selectedCategory = null;
    boostCount = 0;
    isSorted = false;
    syncTargetHeights();
    // Reset positions to original
    CATEGORIES.forEach((cat, ci) => {
      targetXPositions[cat] = getOriginalX(ci);
    });
    updateBarEmissive();
    updateHUD();
    updateHighlightRing();
  }

  // --- Sort ---
  function applySortPositions() {
    const scores = calcScores();
    const sorted = [...CATEGORIES].sort((a, b) => scores[b] - scores[a]);
    sorted.forEach((cat, i) => {
      targetXPositions[cat] = getOriginalX(i);
    });
  }

  function toggleSort() {
    isSorted = !isSorted;
    if (isSorted) {
      applySortPositions();
    } else {
      CATEGORIES.forEach((cat, ci) => {
        targetXPositions[cat] = getOriginalX(ci);
      });
    }
  }

  // --- Initialize ---
  initBars();
  createHighlightRing();
  updateHUD();
  updateHighlightRing();

  // --- State object ---
  window.__3D_STATE__ = {
    barData: cloneData(barData),
    scores: calcScores(),
    totalScore: 100,
    selectedCategory: null,
    topCategory: 'Sales',
    isSorted: false,
    boostCount: 0,
    barPositions: {},
    highlightRingY: 0
  };

  // --- Event Listeners ---
  document.getElementById('btn-sales').addEventListener('click', () => selectCategory('Sales'));
  document.getElementById('btn-marketing').addEventListener('click', () => selectCategory('Marketing'));
  document.getElementById('btn-engineering').addEventListener('click', () => selectCategory('Engineering'));
  document.getElementById('btn-support').addEventListener('click', () => selectCategory('Support'));
  document.getElementById('btn-boost').addEventListener('click', boost);
  document.getElementById('btn-reset').addEventListener('click', resetAll);
  document.getElementById('btn-sort').addEventListener('click', toggleSort);

  document.addEventListener('keydown', (e) => {
    if (e.key === '1') selectCategory('Sales');
    else if (e.key === '2') selectCategory('Marketing');
    else if (e.key === '3') selectCategory('Engineering');
    else if (e.key === '4') selectCategory('Support');
    else if (e.key === 'b' || e.key === 'B') boost();
  });

  // --- Animation Loop ---
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const lerpFactor = 0.08;

    // Animate bar heights
    CATEGORIES.forEach(cat => {
      QUARTERS.forEach((q, qi) => {
        const target = targetHeights[cat][qi];
        const current = currentHeights[cat][qi];
        const newH = THREE.MathUtils.lerp(current, target, lerpFactor);
        currentHeights[cat][qi] = newH;
        barMeshes[cat][qi].scale.y = Math.max(newH, 0.01);
      });
    });

    // Animate group X positions
    CATEGORIES.forEach(cat => {
      const target = targetXPositions[cat];
      const current = currentXPositions[cat];
      const newX = THREE.MathUtils.lerp(current, target, lerpFactor);
      currentXPositions[cat] = newX;
      categoryGroups[cat].position.x = newX;
    });

    // Animate highlight ring
    if (highlightRing) {
      const scores = calcScores();
      const topCat = getTopCategory(scores);
      if (topCat) {
        const maxH = Math.max(...currentHeights[topCat]);
        const targetY = maxH + 0.8;
        highlightRing.position.y = THREE.MathUtils.lerp(highlightRing.position.y, targetY, lerpFactor);
        highlightRingCurrentX = THREE.MathUtils.lerp(highlightRingCurrentX, currentXPositions[topCat], lerpFactor);
        highlightRing.position.x = highlightRingCurrentX;
        highlightRing.rotation.z += dt * 2;
      }
    }

    // Update state
    const scores = calcScores();
    const topCat = getTopCategory(scores);
    const barPositions = {};
    CATEGORIES.forEach(cat => {
      barPositions[cat] = currentXPositions[cat];
    });

    window.__3D_STATE__ = {
      barData: cloneData(barData),
      scores: scores,
      totalScore: calcTotalScore(scores),
      selectedCategory: selectedCategory,
      topCategory: topCat,
      isSorted: isSorted,
      boostCount: boostCount,
      barPositions: barPositions,
      highlightRingY: highlightRing ? highlightRing.position.y : 0
    };

    controls.update();
    renderer.render(scene, camera);
  }

  animate();

  // --- Resize ---
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
