<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D Histogram</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #hud-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      min-width: 220px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #hud-panel div {
      margin: 6px 0;
      font-size: 14px;
    }

    #category-buttons {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 10;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2d4059;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.15s, background 0.2s;
    }

    button:hover {
      background: #3a5375;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    .category-btn.selected {
      outline: 2px solid #ffd166;
      background: #4a6488;
    }

    #hint {
      position: absolute;
      right: 16px;
      top: 16px;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 10;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="hud-panel">
    <div><strong>Total Score:</strong> <span id="total-score">100</span></div>
    <div><strong>Selected Category:</strong> <span id="selected-category">None</span></div>
    <div><strong>Selected Score:</strong> <span id="selected-score">0</span></div>
  </div>

  <div id="hint">
    Keys: 1-4 select category, <b>B</b> boosts selected
  </div>

  <div id="category-buttons">
    <button id="btn-sales" class="category-btn">Sales</button>
    <button id="btn-marketing" class="category-btn">Marketing</button>
    <button id="btn-engineering" class="category-btn">Engineering</button>
    <button id="btn-support" class="category-btn">Support</button>
    <button id="btn-boost">Boost</button>
    <button id="btn-reset">Reset</button>
    <button id="btn-sort">Sort</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(8, 6, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(12, 12, 0x8888aa, 0x444466);
    grid.position.y = 0.001;
    scene.add(grid);

    const categories = ["Sales", "Marketing", "Engineering", "Support"];
    const quarters = ["Q1", "Q2", "Q3"];
    const categoryColors = {
      Sales: "#e74c3c",
      Marketing: "#2ecc71",
      Engineering: "#3498db",
      Support: "#f39c12"
    };
    const quarterOpacities = [1.0, 0.8, 0.6];

    const initialBarData = {
      Sales: [3, 5, 4],
      Marketing: [2, 4, 6],
      Engineering: [7, 3, 5],
      Support: [1, 6, 2]
    };

    const barData = JSON.parse(JSON.stringify(initialBarData));
    const groups = {};
    const bars = {};
    const labels = {};
    let selectedCategory = null;
    let isSorted = false;
    let boostCount = 0;

    const baseXPositions = {
      Sales: -4.5,
      Marketing: -1.5,
      Engineering: 1.5,
      Support: 4.5
    };

    const currentXTargets = { ...baseXPositions };
    const currentXActuals = { ...baseXPositions };

    const zPositions = [-1.0, 0, 1.0];

    function computeScore(values) {
      return values[0] * 1 + values[1] * 2 + values[2] * 3;
    }

    function computeScores() {
      const scores = {};
      let total = 0;
      let topCategory = categories[0];
      let topScore = -Infinity;

      for (const cat of categories) {
        scores[cat] = computeScore(barData[cat]);
        total += scores[cat];
        if (scores[cat] > topScore) {
          topScore = scores[cat];
          topCategory = cat;
        }
      }
      return { scores, total, topCategory };
    }

    function createTextSprite(text, color = "#ffffff") {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = 256;
      canvas.height = 64;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = "28px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = color;
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);
      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(1.8, 0.45, 1);
      return sprite;
    }

    for (const cat of categories) {
      const group = new THREE.Group();
      group.position.x = baseXPositions[cat];
      scene.add(group);
      groups[cat] = group;
      bars[cat] = [];

      for (let i = 0; i < 3; i++) {
        const h = barData[cat][i];
        const geometry = new THREE.BoxGeometry(0.6, 1, 0.6);
        geometry.translate(0, 0.5, 0);

        const material = new THREE.MeshStandardMaterial({
          color: categoryColors[cat],
          transparent: true,
          opacity: quarterOpacities[i],
          emissive: 0x000000,
          emissiveIntensity: 0
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.scale.y = h;
        mesh.position.set(0, 0, zPositions[i]);
        mesh.userData = {
          category: cat,
          quarter: quarters[i],
          targetHeight: h,
          currentHeight: h
        };

        group.add(mesh);
        bars[cat].push(mesh);
      }

      const label = createTextSprite(cat);
      label.position.set(0, 0.35, 2.0);
      group.add(label);
      labels[cat] = label;
    }

    const ringGeometry = new THREE.TorusGeometry(1.25, 0.08, 16, 64);
    const ringMaterial = new THREE.MeshStandardMaterial({
      color: 0xffd700,
      emissive: 0xaa8800,
      emissiveIntensity: 0.8,
      metalness: 0.7,
      roughness: 0.25
    });
    const highlightRing = new THREE.Mesh(ringGeometry, ringMaterial);
    highlightRing.rotation.x = Math.PI / 2;
    scene.add(highlightRing);

    function getCategoryMaxHeight(cat) {
      return Math.max(...barData[cat]);
    }

    function updateRingPosition(topCategory) {
      const y = getCategoryMaxHeight(topCategory) + 1.0;
      highlightRing.position.set(currentXActuals[topCategory], y, 0);
    }

    function setSelection(category) {
      selectedCategory = category;

      document.getElementById("selected-category").textContent = category || "None";
      const { scores } = computeScores();
      document.getElementById("selected-score").textContent = category ? scores[category] : "0";

      document.querySelectorAll(".category-btn").forEach(btn => btn.classList.remove("selected"));

      for (const cat of categories) {
        const active = cat === category;
        for (const bar of bars[cat]) {
          bar.material.emissive.setHex(active ? 0xffffff : 0x000000);
          bar.material.emissiveIntensity = active ? 0.35 : 0;
        }
      }

      if (category) {
        document.getElementById(`btn-${category.toLowerCase()}`).classList.add("selected");
      }
    }

    function updateHUD() {
      const { scores, total } = computeScores();
      document.getElementById("total-score").textContent = total;
      document.getElementById("selected-category").textContent = selectedCategory || "None";
      document.getElementById("selected-score").textContent = selectedCategory ? scores[selectedCategory] : "0";
    }

    function setCategoryTargets() {
      let ordered;
      if (isSorted) {
        const { scores } = computeScores();
        ordered = [...categories].sort((a, b) => scores[b] - scores[a] || categories.indexOf(a) - categories.indexOf(b));
      } else {
        ordered = [...categories];
      }

      const xs = [-4.5, -1.5, 1.5, 4.5];
      ordered.forEach((cat, i) => {
        currentXTargets[cat] = xs[i];
      });
    }

    function boostSelected() {
      if (!selectedCategory) return;
      for (let i = 0; i < 3; i++) {
        barData[selectedCategory][i] += 2;
        bars[selectedCategory][i].userData.targetHeight = barData[selectedCategory][i];
      }
      boostCount++;
      setCategoryTargets();
      updateHUD();
    }

    function resetAll() {
      for (const cat of categories) {
        for (let i = 0; i < 3; i++) {
          barData[cat][i] = initialBarData[cat][i];
          bars[cat][i].userData.targetHeight = barData[cat][i];
        }
      }
      selectedCategory = null;
      isSorted = false;
      boostCount = 0;
      setSelection(null);
      setCategoryTargets();
      updateHUD();
    }

    document.getElementById("btn-sales").addEventListener("click", () => setSelection("Sales"));
    document.getElementById("btn-marketing").addEventListener("click", () => setSelection("Marketing"));
    document.getElementById("btn-engineering").addEventListener("click", () => setSelection("Engineering"));
    document.getElementById("btn-support").addEventListener("click", () => setSelection("Support"));
    document.getElementById("btn-boost").addEventListener("click", boostSelected);
    document.getElementById("btn-reset").addEventListener("click", resetAll);
    document.getElementById("btn-sort").addEventListener("click", () => {
      isSorted = !isSorted;
      setCategoryTargets();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "1") setSelection("Sales");
      if (e.key === "2") setSelection("Marketing");
      if (e.key === "3") setSelection("Engineering");
      if (e.key === "4") setSelection("Support");
      if (e.key.toLowerCase() === "b") boostSelected();
    });

    window.__3D_STATE__ = {
      barData: {},
      scores: {},
      totalScore: 0,
      selectedCategory: null,
      topCategory: "",
      isSorted: false,
      boostCount: 0,
      barPositions: {},
      highlightRingY: 0
    };

    setCategoryTargets();
    updateHUD();
    updateRingPosition(computeScores().topCategory);

    function updateStateFrame() {
      const { scores, total, topCategory } = computeScores();
      window.__3D_STATE__.barData = JSON.parse(JSON.stringify(barData));
      window.__3D_STATE__.scores = { ...scores };
      window.__3D_STATE__.totalScore = total;
      window.__3D_STATE__.selectedCategory = selectedCategory;
      window.__3D_STATE__.topCategory = topCategory;
      window.__3D_STATE__.isSorted = isSorted;
      window.__3D_STATE__.boostCount = boostCount;
      window.__3D_STATE__.barPositions = { ...currentXActuals };
      window.__3D_STATE__.highlightRingY = highlightRing.position.y;
    }

    function animate() {
      requestAnimationFrame(animate);

      controls.update();

      for (const cat of categories) {
        currentXActuals[cat] += (currentXTargets[cat] - currentXActuals[cat]) * 0.12;
        groups[cat].position.x = currentXActuals[cat];

        for (const mesh of bars[cat]) {
          mesh.userData.currentHeight += (mesh.userData.targetHeight - mesh.userData.currentHeight) * 0.12;
          mesh.scale.y = Math.max(0.001, mesh.userData.currentHeight);
        }
      }

      const { topCategory } = computeScores();
      const targetRingY = getCategoryMaxHeight(topCategory) + 1.0;
      highlightRing.position.x += (currentXActuals[topCategory] - highlightRing.position.x) * 0.12;
      highlightRing.position.y += (targetRingY - highlightRing.position.y) * 0.12;
      highlightRing.position.z += (0 - highlightRing.position.z) * 0.12;
      highlightRing.rotation.z += 0.02;

      updateHUD();
      updateStateFrame();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
