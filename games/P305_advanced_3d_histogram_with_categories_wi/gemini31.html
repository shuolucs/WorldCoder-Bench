<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Histogram Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.8);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #hud-panel h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #a8b2d1;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .stat-value {
            font-weight: bold;
            color: #64ffda;
        }
        #controls-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }
        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }
        button.active {
            background: rgba(100, 255, 218, 0.2);
            border-color: #64ffda;
            color: #64ffda;
        }
        .action-btn {
            background: rgba(100, 100, 255, 0.2);
            border-color: rgba(100, 100, 255, 0.5);
        }
        .action-btn:hover {
            background: rgba(100, 100, 255, 0.4);
        }
        #btn-sales { border-bottom: 3px solid #e74c3c; }
        #btn-marketing { border-bottom: 3px solid #2ecc71; }
        #btn-engineering { border-bottom: 3px solid #3498db; }
        #btn-support { border-bottom: 3px solid #f39c12; }
    </style>
    <!-- Three.js and Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud-panel">
        <h2>Dashboard</h2>
        <div class="stat-row">
            <span>Total Score:</span>
            <span id="total-score" class="stat-value">0</span>
        </div>
        <div class="stat-row">
            <span>Selected:</span>
            <span id="selected-category" class="stat-value" style="color: #fff;">None</span>
        </div>
        <div class="stat-row">
            <span>Category Score:</span>
            <span id="selected-score" class="stat-value">0</span>
        </div>
    </div>

    <div id="controls-container">
        <div class="button-row" id="category-buttons">
            <button id="btn-sales" data-cat="Sales">Sales (1)</button>
            <button id="btn-marketing" data-cat="Marketing">Marketing (2)</button>
            <button id="btn-engineering" data-cat="Engineering">Engineering (3)</button>
            <button id="btn-support" data-cat="Support">Support (4)</button>
        </div>
        <div class="button-row">
            <button id="btn-boost" class="action-btn">Boost (+2) [B]</button>
            <button id="btn-sort" class="action-btn">Toggle Sort</button>
            <button id="btn-reset" class="action-btn">Reset</button>
        </div>
    </div>

    <script>
        // --- Configuration & Initial Data ---
        const CATEGORIES = ['Sales', 'Marketing', 'Engineering', 'Support'];
        const INITIAL_DATA = {
            Sales: { color: 0xe74c3c, values: [3, 5, 4] },
            Marketing: { color: 0x2ecc71, values: [2, 4, 6] },
            Engineering: { color: 0x3498db, values: [7, 3, 5] },
            Support: { color: 0xf39c12, values: [1, 6, 2] }
        };
        const BASE_X_POSITIONS = [-4.5, -1.5, 1.5, 4.5];
        const Z_POSITIONS = [-1, 0, 1];
        const OPACITIES = [1.0, 0.8, 0.6];
        const WEIGHTS = [1, 2, 3];

        // --- State ---
        let currentData = JSON.parse(JSON.stringify(INITIAL_DATA));
        let scores = {};
        let totalScore = 0;
        let selectedCategory = null;
        let topCategory = null;
        let isSorted = false;
        let boostCount = 0;
        let categoryXPositions = { ...BASE_X_POSITIONS }; // Map index to X pos

        // Store mesh references: meshes[category][subIndex]
        const meshes = { Sales: [], Marketing: [], Engineering: [], Support: [] };
        let highlightRing;

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ground
        const gridHelper = new THREE.GridHelper(12, 12, 0x444444, 0x222222);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // --- Object Creation ---
        function createSceneObjects() {
            // Base geometry with height 1, translated so origin is at bottom
            const geometry = new THREE.BoxGeometry(0.6, 1, 0.6);
            geometry.translate(0, 0.5, 0);

            CATEGORIES.forEach((cat, catIndex) => {
                const xPos = BASE_X_POSITIONS[catIndex];
                categoryXPositions[cat] = xPos;

                for (let i = 0; i < 3; i++) {
                    const material = new THREE.MeshLambertMaterial({
                        color: currentData[cat].color,
                        transparent: true,
                        opacity: OPACITIES[i],
                        emissive: 0x000000
                    });

                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(xPos, 0, Z_POSITIONS[i]);
                    mesh.scale.y = currentData[cat].values[i];
                    
                    scene.add(mesh);
                    meshes[cat].push(mesh);
                }
            });

            // Highlight Ring
            const ringGeo = new THREE.TorusGeometry(1.2, 0.08, 16, 64);
            const ringMat = new THREE.MeshStandardMaterial({ 
                color: 0xffd700, 
                emissive: 0xffaa00,
                emissiveIntensity: 0.5,
                metalness: 0.8,
                roughness: 0.2
            });
            highlightRing = new THREE.Mesh(ringGeo, ringMat);
            highlightRing.rotation.x = Math.PI / 2;
            scene.add(highlightRing);
        }

        // --- Logic & Updates ---
        function calculateScores() {
            totalScore = 0;
            let maxScore = -1;
            
            CATEGORIES.forEach(cat => {
                const vals = currentData[cat].values;
                const score = vals[0]*WEIGHTS[0] + vals[1]*WEIGHTS[1] + vals[2]*WEIGHTS[2];
                scores[cat] = score;
                totalScore += score;

                if (score > maxScore) {
                    maxScore = score;
                    topCategory = cat;
                }
            });
        }

        function updateUI() {
            document.getElementById('total-score').innerText = totalScore;
            
            const catEl = document.getElementById('selected-category');
            const scoreEl = document.getElementById('selected-score');
            
            if (selectedCategory) {
                catEl.innerText = selectedCategory;
                catEl.style.color = '#' + currentData[selectedCategory].color.toString(16).padStart(6, '0');
                scoreEl.innerText = scores[selectedCategory];
            } else {
                catEl.innerText = 'None';
                catEl.style.color = '#fff';
                scoreEl.innerText = '0';
            }

            // Update button styles
            CATEGORIES.forEach(cat => {
                const btn = document.getElementById(`btn-${cat.toLowerCase()}`);
                if (cat === selectedCategory) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function updateHighlightRing(animate = true) {
            if (!topCategory) return;
            
            const targetX = categoryXPositions[topCategory];
            const maxVal = Math.max(...currentData[topCategory].values);
            const targetY = maxVal + 1.5;

            if (animate) {
                new TWEEN.Tween(highlightRing.position)
                    .to({ x: targetX, y: targetY }, 500)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
            } else {
                highlightRing.position.set(targetX, targetY, 0);
            }
        }

        function selectCategory(cat) {
            selectedCategory = selectedCategory === cat ? null : cat;
            
            CATEGORIES.forEach(c => {
                const isSelected = c === selectedCategory;
                meshes[c].forEach(mesh => {
                    // Emissive glow for selected
                    mesh.material.emissive.setHex(isSelected ? 0x444444 : 0x000000);
                });
            });
            
            updateUI();
        }

        function applyBoost() {
            if (!selectedCategory) return;
            
            boostCount++;
            const vals = currentData[selectedCategory].values;
            
            for (let i = 0; i < 3; i++) {
                vals[i] += 2;
                
                // Animate scale
                new TWEEN.Tween(meshes[selectedCategory][i].scale)
                    .to({ y: vals[i] }, 500)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();
            }
            
            calculateScores();
            updateUI();
            updateHighlightRing(true);
            if(isSorted) applySort(true); // Re-sort if values changed
        }

        function resetData() {
            currentData = JSON.parse(JSON.stringify(INITIAL_DATA));
            selectedCategory = null;
            isSorted = false;
            boostCount = 0;
            
            CATEGORIES.forEach((cat, index) => {
                categoryXPositions[cat] = BASE_X_POSITIONS[index];
                
                for (let i = 0; i < 3; i++) {
                    const mesh = meshes[cat][i];
                    mesh.material.emissive.setHex(0x000000);
                    
                    // Animate scale back
                    new TWEEN.Tween(mesh.scale)
                        .to({ y: currentData[cat].values[i] }, 500)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .start();
                        
                    // Animate position back
                    new TWEEN.Tween(mesh.position)
                        .to({ x: BASE_X_POSITIONS[index] }, 500)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .start();
                }
            });
            
            calculateScores();
            updateUI();
            updateHighlightRing(true);
        }

        function applySort(force = false) {
            if (!force) isSorted = !isSorted;
            
            let sortedCats = [...CATEGORIES];
            if (isSorted) {
                sortedCats.sort((a, b) => scores[b] - scores[a]);
            }
            
            sortedCats.forEach((cat, index) => {
                const targetX = BASE_X_POSITIONS[index];
                categoryXPositions[cat] = targetX;
                
                meshes[cat].forEach(mesh => {
                    new TWEEN.Tween(mesh.position)
                        .to({ x: targetX }, 500)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .start();
                });
            });
            
            updateHighlightRing(true);
        }

        // --- Event Listeners ---
        CATEGORIES.forEach(cat => {
            document.getElementById(`btn-${cat.toLowerCase()}`).addEventListener('click', () => selectCategory(cat));
        });

        document.getElementById('btn-boost').addEventListener('click', applyBoost);
        document.getElementById('btn-reset').addEventListener('click', resetData);
        document.getElementById('btn-sort').addEventListener('click', () => applySort(false));

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === '1') selectCategory('Sales');
            if (key === '2') selectCategory('Marketing');
            if (key === '3') selectCategory('Engineering');
            if (key === '4') selectCategory('Support');
            if (key === 'b') applyBoost();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        createSceneObjects();
        calculateScores();
        updateUI();
        updateHighlightRing(false);

        // --- Global State Exposure ---
        window.__3D_STATE__ = {};

        function updateGlobalState() {
            const barDataExport = {};
            CATEGORIES.forEach(cat => barDataExport[cat] = [...currentData[cat].values]);

            window.__3D_STATE__ = {
                barData: barDataExport,
                scores: { ...scores },
                totalScore: totalScore,
                selectedCategory: selectedCategory,
                topCategory: topCategory,
                isSorted: isSorted,
                boostCount: boostCount,
                barPositions: { ...categoryXPositions },
                highlightRingY: highlightRing ? highlightRing.position.y : 0
            };
        }

        // --- Animation Loop ---
        function animate(time) {
            requestAnimationFrame(animate);
            
            TWEEN.update(time);
            controls.update();
            
            if (highlightRing) {
                highlightRing.rotation.z += 0.02;
            }
            
            updateGlobalState();
            
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
