<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Archery Target Practice</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }

#crosshair {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 10;
}
#crosshair .h-line {
  position: absolute;
  width: 30px;
  height: 2px;
  background: rgba(255,255,255,0.7);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
#crosshair .v-line {
  position: absolute;
  width: 2px;
  height: 30px;
  background: rgba(255,255,255,0.7);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

#hud-score {
  position: fixed;
  top: 20px;
  left: 20px;
  color: white;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  z-index: 10;
}

#hud-wind {
  position: fixed;
  top: 55px;
  left: 20px;
  color: #aaddff;
  font-size: 18px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  z-index: 10;
}

#hud-last-hit {
  position: fixed;
  top: 85px;
  left: 20px;
  color: #ffdd44;
  font-size: 18px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  z-index: 10;
}

#hud-arrows {
  position: fixed;
  top: 20px;
  right: 20px;
  color: white;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  z-index: 10;
}

#power-bar-container {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 20px;
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 10px;
  overflow: hidden;
  z-index: 10;
}

#power-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(to right, #00ff00, #ff0000);
  transition: none;
  border-radius: 8px;
}

#power-label {
  position: fixed;
  bottom: 65px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 14px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  z-index: 10;
}

#btn-new-round {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 15px 40px;
  font-size: 24px;
  font-weight: bold;
  background: #ff6600;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  z-index: 20;
  display: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}
#btn-new-round:hover {
  background: #ff8833;
}

#hit-popup {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ffdd00;
  font-size: 48px;
  font-weight: bold;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
  z-index: 15;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
</style>
</head>
<body>

<div id="crosshair">
  <div class="h-line"></div>
  <div class="v-line"></div>
</div>

<div id="hud-score">Score: 0</div>
<div id="hud-wind">Wind: 0.0, 0.0</div>
<div id="hud-last-hit">Last Hit: --</div>
<div id="hud-arrows">Arrows: 10</div>

<div id="power-label">Hold SPACE to charge, release to fire</div>
<div id="power-bar-container">
  <div id="power-bar"></div>
</div>

<button id="btn-new-round">New Round</button>
<div id="hit-popup"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
  score: 0,
  arrowsLeft: 10,
  arrowsFired: 0,
  power: 0,
  isCharging: false,
  isFlying: false,
  lastHitScore: 0,
  lastHitDistance: 0,
  windX: 0,
  windZ: 0,
  roundOver: false,
  targetHits: 0,
  bonusHits: 0,
  arrowPosX: null,
  arrowPosY: null,
  arrowPosZ: null,
  boxAnimationPlaying: false
};
window.__3D_STATE__ = state;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 2, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x3a7d3a });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Sky backdrop
const skyGeo = new THREE.PlaneGeometry(100, 30);
const skyMat = new THREE.MeshBasicMaterial({ color: 0x6699cc, side: THREE.DoubleSide });
const sky = new THREE.Mesh(skyGeo, skyMat);
sky.position.set(0, 15, -50);
scene.add(sky);

// ============ TARGET ============
const targetGroup = new THREE.Group();
targetGroup.position.set(0, 2.5, -15);

const ringRadii = [2.0, 1.6, 1.2, 0.8, 0.4];
const ringColors = [0xffffff, 0x222222, 0x0044cc, 0xcc0000, 0xffd700];
const ringScores = [1, 2, 3, 4, 5];

for (let i = 0; i < ringRadii.length; i++) {
  const geo = new THREE.CylinderGeometry(ringRadii[i], ringRadii[i], 0.05, 64);
  const mat = new THREE.MeshLambertMaterial({ color: ringColors[i] });
  const ring = new THREE.Mesh(geo, mat);
  ring.rotation.x = Math.PI / 2;
  ring.position.z = i * 0.01; // slight offset to prevent z-fighting
  ring.castShadow = true;
  ring.receiveShadow = true;
  targetGroup.add(ring);
}

// Target backing (wooden board)
const backGeo = new THREE.BoxGeometry(4.5, 4.5, 0.2);
const backMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
const backing = new THREE.Mesh(backGeo, backMat);
backing.position.z = -0.15;
backing.castShadow = true;
backing.receiveShadow = true;
targetGroup.add(backing);

// Target stand legs
const legGeo = new THREE.CylinderGeometry(0.05, 0.08, 3, 8);
const legMat = new THREE.MeshLambertMaterial({ color: 0x654321 });
const leg1 = new THREE.Mesh(legGeo, legMat);
leg1.position.set(-1.5, -2.5, -0.1);
leg1.rotation.z = 0.1;
leg1.castShadow = true;
targetGroup.add(leg1);
const leg2 = new THREE.Mesh(legGeo, legMat);
leg2.position.set(1.5, -2.5, -0.1);
leg2.rotation.z = -0.1;
leg2.castShadow = true;
targetGroup.add(leg2);

scene.add(targetGroup);

// ============ ARROW ============
const arrowGroup = new THREE.Group();

const shaftGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 8);
const shaftMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
const shaft = new THREE.Mesh(shaftGeo, shaftMat);
shaft.position.y = 0;
arrowGroup.add(shaft);

const tipGeo = new THREE.ConeGeometry(0.06, 0.2, 8);
const tipMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
const tip = new THREE.Mesh(tipGeo, tipMat);
tip.position.y = 0.85;
arrowGroup.add(tip);

// Fletching
const fletchGeo = new THREE.PlaneGeometry(0.15, 0.3);
const fletchMat = new THREE.MeshLambertMaterial({ color: 0xcc2222, side: THREE.DoubleSide });
for (let i = 0; i < 3; i++) {
  const fletch = new THREE.Mesh(fletchGeo, fletchMat);
  fletch.position.y = -0.6;
  fletch.rotation.y = (i * Math.PI * 2) / 3;
  fletch.position.x = Math.sin(fletch.rotation.y) * 0.05;
  fletch.position.z = Math.cos(fletch.rotation.y) * 0.05;
  arrowGroup.add(fletch);
}

arrowGroup.visible = false;
arrowGroup.castShadow = true;
scene.add(arrowGroup);

// Stuck arrows collection
const stuckArrows = [];

// ============ BOX ANIMATED MODEL ============
let boxModel = null;
let boxMixer = null;
let boxBoundingBox = new THREE.Box3();
const boxPosition = new THREE.Vector3(3, 0, -14);

const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BoxAnimated/glTF-Binary/BoxAnimated.glb',
  (gltf) => {
    boxModel = gltf.scene;
    boxModel.position.copy(boxPosition);
    boxModel.scale.set(0.8, 0.8, 0.8);
    boxModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(boxModel);

    if (gltf.animations && gltf.animations.length > 0) {
      boxMixer = new THREE.AnimationMixer(boxModel);
      const action = boxMixer.clipAction(gltf.animations[0]);
      action.play();
      state.boxAnimationPlaying = true;
    }
  },
  undefined,
  (error) => {
    console.warn('Could not load BoxAnimated.glb:', error);
    // Create a fallback animated box
    const fallbackGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
    const fallbackMat = new THREE.MeshLambertMaterial({ color: 0xff6600 });
    boxModel = new THREE.Mesh(fallbackGeo, fallbackMat);
    boxModel.position.set(3, 0.8, -14);
    boxModel.castShadow = true;
    scene.add(boxModel);
    state.boxAnimationPlaying = false;
  }
);

// ============ AIMING ============
let aimX = 0;
let aimY = 0;
const baseLookAt = new THREE.Vector3(0, 2, -20);
const currentLookAt = new THREE.Vector3();

document.addEventListener('mousemove', (e) => {
  aimX = (e.clientX / window.innerWidth) * 2 - 1;
  aimY = -(e.clientY / window.innerHeight) * 2 + 1;
});

// ============ WIND ============
function generateWind() {
  state.windX = (Math.random() * 4 - 2);
  state.windZ = (Math.random() * 2 - 1);
  state.windX = Math.round(state.windX * 10) / 10;
  state.windZ = Math.round(state.windZ * 10) / 10;
  document.getElementById('hud-wind').textContent = `Wind: ${state.windX.toFixed(1)}, ${state.windZ.toFixed(1)}`;
}
generateWind();

// ============ ARROW PHYSICS ============
let arrowVelocity = new THREE.Vector3();
const gravity = -9.8;

function fireArrow() {
  if (state.isFlying || state.arrowsLeft <= 0) return;

  const finalSpeed = 15 + 25 * state.power;

  // Calculate aim direction
  const aimTarget = new THREE.Vector3(
    baseLookAt.x + aimX * 6,
    baseLookAt.y + aimY * 4,
    baseLookAt.z
  );

  const direction = new THREE.Vector3();
  direction.subVectors(aimTarget, camera.position).normalize();

  arrowVelocity.copy(direction).multiplyScalar(finalSpeed);

  arrowGroup.position.copy(camera.position);
  arrowGroup.visible = true;
  state.isFlying = true;
  state.arrowsLeft--;
  state.arrowsFired++;
  state.power = 0;

  document.getElementById('hud-arrows').textContent = `Arrows: ${state.arrowsLeft}`;
  document.getElementById('power-bar').style.width = '0%';
}

function checkCollisions() {
  const arrowPos = arrowGroup.position;

  // Check target hit (target at z=-15, face toward +Z)
  if (arrowPos.z <= -14.5) {
    const dx = arrowPos.x - targetGroup.position.x;
    const dy = arrowPos.y - targetGroup.position.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    state.lastHitDistance = dist;

    let hitScore = 0;
    // Check from innermost to outermost
    for (let i = ringRadii.length - 1; i >= 0; i--) {
      if (dist <= ringRadii[i]) {
        hitScore = ringScores[i];
        break;
      }
    }

    if (hitScore > 0) {
      state.score += hitScore;
      state.lastHitScore = hitScore;
      state.targetHits++;
      showHitPopup(`+${hitScore}`, ringColors[ringScores.indexOf(hitScore)]);
      document.getElementById('hud-last-hit').textContent = `Last Hit: Ring ${hitScore} (dist: ${dist.toFixed(2)})`;

      // Create stuck arrow
      createStuckArrow(arrowPos.clone());
    } else {
      state.lastHitScore = 0;
      document.getElementById('hud-last-hit').textContent = `Last Hit: Miss!`;
      showHitPopup('Miss!', 0xff4444);
    }

    document.getElementById('hud-score').textContent = `Score: ${state.score}`;
    endArrowFlight();
    return true;
  }

  // Check box model hit
  if (boxModel) {
    const box3 = new THREE.Box3().setFromObject(boxModel);
    if (box3.containsPoint(arrowPos)) {
      state.score += 10;
      state.lastHitScore = 10;
      state.bonusHits++;
      state.lastHitDistance = 0;
      showHitPopup('+10 BONUS!', 0xff6600);
      document.getElementById('hud-last-hit').textContent = `Last Hit: BONUS BOX! +10`;
      document.getElementById('hud-score').textContent = `Score: ${state.score}`;
      createStuckArrow(arrowPos.clone());
      endArrowFlight();
      return true;
    }
  }

  // Check ground hit
  if (arrowPos.y <= 0) {
    state.lastHitScore = 0;
    state.lastHitDistance = 999;
    document.getElementById('hud-last-hit').textContent = `Last Hit: Ground!`;
    showHitPopup('Miss!', 0xff4444);
    createStuckArrow(arrowPos.clone());
    endArrowFlight();
    return true;
  }

  // Check too far
  if (arrowPos.z < -25 || arrowPos.y > 30 || Math.abs(arrowPos.x) > 30) {
    state.lastHitScore = 0;
    state.lastHitDistance = 999;
    document.getElementById('hud-last-hit').textContent = `Last Hit: Out of bounds!`;
    showHitPopup('Miss!', 0xff4444);
    endArrowFlight();
    return true;
  }

  return false;
}

function createStuckArrow(pos) {
  const stuckArrow = arrowGroup.clone();
  stuckArrow.position.copy(pos);
  stuckArrow.visible = true;
  stuckArrow.rotation.copy(arrowGroup.rotation);
  scene.add(stuckArrow);
  stuckArrows.push(stuckArrow);
}

function endArrowFlight() {
  state.isFlying = false;
  arrowGroup.visible = false;
  state.arrowPosX = null;
  state.arrowPosY = null;
  state.arrowPosZ = null;

  if (state.arrowsLeft <= 0) {
    state.roundOver = true;
    document.getElementById('btn-new-round').style.display = 'block';
  }
}

function showHitPopup(text, color) {
  const popup = document.getElementById('hit-popup');
  popup.textContent = text;
  if (typeof color === 'number') {
    popup.style.color = '#' + color.toString(16).padStart(6, '0');
  } else {
    popup.style.color = '#ffdd00';
  }
  popup.style.opacity = '1';
  setTimeout(() => {
    popup.style.opacity = '0';
  }, 1200);
}

// ============ INPUT ============
let spaceDown = false;
let chargeStartTime = 0;

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    if (!state.isFlying && state.arrowsLeft > 0 && !state.roundOver) {
      spaceDown = true;
      state.isCharging = true;
      chargeStartTime = performance.now();
    }
  }
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (spaceDown && state.isCharging) {
      spaceDown = false;
      state.isCharging = false;
      fireArrow();
    }
  }
});

// New Round button
document.getElementById('btn-new-round').addEventListener('click', () => {
  state.score = 0;
  state.arrowsLeft = 10;
  state.arrowsFired = 0;
  state.power = 0;
  state.isCharging = false;
  state.isFlying = false;
  state.lastHitScore = 0;
  state.lastHitDistance = 0;
  state.roundOver = false;
  state.targetHits = 0;
  state.bonusHits = 0;
  state.arrowPosX = null;
  state.arrowPosY = null;
  state.arrowPosZ = null;

  // Remove stuck arrows
  stuckArrows.forEach(a => scene.remove(a));
  stuckArrows.length = 0;

  generateWind();

  document.getElementById('hud-score').textContent = 'Score: 0';
  document.getElementById('hud-arrows').textContent = 'Arrows: 10';
  document.getElementById('hud-last-hit').textContent = 'Last Hit: --';
  document.getElementById('power-bar').style.width = '0%';
  document.getElementById('btn-new-round').style.display = 'none';
});

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ DECORATIONS ============
// Some trees
function createTree(x, z) {
  const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 2, 8);
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x654321 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.set(x, 1, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const leavesGeo = new THREE.SphereGeometry(1.2, 8, 8);
  const leavesMat = new THREE.MeshLambertMaterial({ color: 0x2d5a1e });
  const leaves = new THREE.Mesh(leavesGeo, leavesMat);
  leaves.position.set(x, 2.8, z);
  leaves.castShadow = true;
  scene.add(leaves);
}

createTree(-8, -10);
createTree(-10, -18);
createTree(8, -8);
createTree(10, -16);
createTree(-6, -22);
createTree(7, -22);

// Fence posts
for (let i = -15; i <= 15; i += 3) {
  const postGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 6);
  const postMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
  const post = new THREE.Mesh(postGeo, postMat);
  post.position.set(i, 0.5, -5);
  post.castShadow = true;
  scene.add(post);
}
// Fence rail
const railGeo = new THREE.CylinderGeometry(0.03, 0.03, 30, 6);
const railMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
const rail = new THREE.Mesh(railGeo, railMat);
rail.rotation.z = Math.PI / 2;
rail.position.set(0, 0.8, -5);
scene.add(rail);

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  // Update box animation
  if (boxMixer) {
    boxMixer.update(delta);
    state.boxAnimationPlaying = true;
  }

  // Update box bounding box
  if (boxModel) {
    boxBoundingBox.setFromObject(boxModel);
  }

  // Charging
  if (state.isCharging) {
    const elapsed = (performance.now() - chargeStartTime) / 1000;
    state.power = Math.min(elapsed / 2, 1);
    const pct = state.power * 100;
    document.getElementById('power-bar').style.width = pct + '%';
  }

  // Camera aim
  currentLookAt.set(
    baseLookAt.x + aimX * 6,
    baseLookAt.y + aimY * 4,
    baseLookAt.z
  );
  camera.lookAt(currentLookAt);

  // Arrow flight
  if (state.isFlying) {
    // Apply gravity
    arrowVelocity.y += gravity * delta;

    // Apply wind
    arrowVelocity.x += state.windX * delta;
    arrowVelocity.z += state.windZ * delta;

    // Move arrow
    arrowGroup.position.x += arrowVelocity.x * delta;
    arrowGroup.position.y += arrowVelocity.y * delta;
    arrowGroup.position.z += arrowVelocity.z * delta;

    // Orient arrow along velocity
    const velDir = arrowVelocity.clone().normalize();
    const up = new THREE.Vector3(0, 1, 0);
    const quat = new THREE.Quaternion();
    const rotAxis = new THREE.Vector3().crossVectors(up, velDir).normalize();
    const angle = Math.acos(Math.min(1, Math.max(-1, up.dot(velDir))));
    if (rotAxis.length() > 0.001) {
      quat.setFromAxisAngle(rotAxis, angle);
      arrowGroup.quaternion.copy(quat);
    }

    // Update state
    state.arrowPosX = arrowGroup.position.x;
    state.arrowPosY = arrowGroup.position.y;
    state.arrowPosZ = arrowGroup.position.z;

    // Check collisions
    checkCollisions();
  }

  // Update global state
  state.roundOver = state.arrowsLeft === 0 && !state.isFlying;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
