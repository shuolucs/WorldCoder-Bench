<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Archery Target Practice</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87b7ff;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud-score, #hud-arrows, #hud-wind, #hud-last-hit {
      position: absolute;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      font-size: 20px;
      z-index: 10;
      user-select: none;
    }

    #hud-score { top: 16px; left: 16px; }
    #hud-wind { top: 46px; left: 16px; font-size: 18px; }
    #hud-arrows { top: 16px; right: 16px; }
    #hud-last-hit {
      top: 76px;
      left: 16px;
      font-size: 18px;
    }

    #power-container {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: 280px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.25);
      z-index: 10;
      border-radius: 10px;
      overflow: hidden;
    }

    #power-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
      transition: width 0.03s linear;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%);
      z-index: 20;
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.85);
      box-shadow: 0 0 4px rgba(0,0,0,0.6);
    }

    #crosshair::before {
      left: 11px;
      top: 0;
      width: 2px;
      height: 24px;
    }

    #crosshair::after {
      top: 11px;
      left: 0;
      width: 24px;
      height: 2px;
    }

    #instructions {
      position: absolute;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 8px 14px;
      border-radius: 8px;
      z-index: 10;
      font-size: 14px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      user-select: none;
    }

    #btn-new-round {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 24px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ffffff;
      color: #222;
      z-index: 30;
      display: none;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>
  <div id="instructions">Move mouse to aim • Hold SPACE to charge • Release SPACE to shoot</div>
  <div id="hud-score">Score: 0</div>
  <div id="hud-wind">Wind: 0.0, 0.0</div>
  <div id="hud-last-hit">Last Hit: None</div>
  <div id="hud-arrows">Arrows: 10</div>

  <div id="power-container">
    <div id="power-bar"></div>
  </div>

  <div id="crosshair"></div>
  <button id="btn-new-round">New Round</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87b7ff);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(0, 2, 8);
    camera.lookAt(0, 2, -20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const groundGeo = new THREE.PlaneGeometry(100, 100);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x3a7d3a });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const targetGroup = new THREE.Group();
    targetGroup.position.set(0, 2.5, -15);
    targetGroup.rotation.x = Math.PI / 2;

    const ringRadii = [2.0, 1.6, 1.2, 0.8, 0.4];
    const ringColors = [0xffffff, 0x111111, 0x1e5cff, 0xdd2222, 0xffd700];
    const ringScores = [1, 2, 3, 4, 5];

    for (let i = 0; i < ringRadii.length; i++) {
      const geo = new THREE.CylinderGeometry(ringRadii[i], ringRadii[i], 0.06, 64);
      const mat = new THREE.MeshStandardMaterial({
        color: ringColors[i],
        roughness: 0.8,
        metalness: 0.1
      });
      const ring = new THREE.Mesh(geo, mat);
      ring.position.z = i * 0.01;
      ring.castShadow = true;
      ring.receiveShadow = true;
      targetGroup.add(ring);
    }

    scene.add(targetGroup);

    const targetStandGeo = new THREE.BoxGeometry(0.15, 3, 0.15);
    const targetStandMat = new THREE.MeshStandardMaterial({ color: 0x6b4f2a });
    const leftStand = new THREE.Mesh(targetStandGeo, targetStandMat);
    leftStand.position.set(-1.4, 1.5, -15.2);
    const rightStand = new THREE.Mesh(targetStandGeo, targetStandMat);
    rightStand.position.set(1.4, 1.5, -15.2);
    scene.add(leftStand, rightStand);

    let mixer = null;
    let boxModel = null;
    let boxBounding = new THREE.Box3();
    let boxAnimationPlaying = false;

    const loader = new GLTFLoader();
    loader.load(
      "BoxAnimated.glb",
      (gltf) => {
        boxModel = gltf.scene;
        boxModel.position.set(3, 0, -14);
        boxModel.scale.set(0.8, 0.8, 0.8);
        boxModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(boxModel);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(boxModel);
          gltf.animations.forEach((clip) => {
            mixer.clipAction(clip).play();
          });
          boxAnimationPlaying = true;
        }
      },
      undefined,
      (err) => {
        console.warn("Failed to load BoxAnimated.glb:", err);
      }
    );

    const arrowGroup = new THREE.Group();
    const shaftGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 12);
    const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const shaft = new THREE.Mesh(shaftGeo, shaftMat);
    shaft.rotation.z = Math.PI / 2;
    shaft.castShadow = true;

    const tipGeo = new THREE.ConeGeometry(0.07, 0.25, 12);
    const tipMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const tip = new THREE.Mesh(tipGeo, tipMat);
    tip.rotation.z = -Math.PI / 2;
    tip.position.x = 0.875;
    tip.castShadow = true;

    arrowGroup.add(shaft);
    arrowGroup.add(tip);
    arrowGroup.visible = false;
    scene.add(arrowGroup);

    const hudScore = document.getElementById("hud-score");
    const hudArrows = document.getElementById("hud-arrows");
    const hudWind = document.getElementById("hud-wind");
    const hudLastHit = document.getElementById("hud-last-hit");
    const powerBar = document.getElementById("power-bar");
    const btnNewRound = document.getElementById("btn-new-round");

    const clock = new THREE.Clock();

    let aimX = 0;
    let aimY = 0;

    let score = 0;
    let arrowsLeft = 10;
    let arrowsFired = 0;
    let isCharging = false;
    let chargeStartTime = 0;
    let power = 0;
    let isFlying = false;
    let lastHitScore = 0;
    let lastHitDistance = null;
    let targetHits = 0;
    let bonusHits = 0;
    let roundOver = false;

    let windX = 0;
    let windZ = 0;

    const arrowVelocity = new THREE.Vector3();
    const arrowPosition = new THREE.Vector3();
    const gravity = new THREE.Vector3(0, -9.8, 0);

    function generateWind() {
      windX = THREE.MathUtils.randFloat(-2, 2);
      windZ = THREE.MathUtils.randFloat(-1, 1);
    }

    generateWind();

    function resetRound() {
      score = 0;
      arrowsLeft = 10;
      arrowsFired = 0;
      isCharging = false;
      power = 0;
      isFlying = false;
      lastHitScore = 0;
      lastHitDistance = null;
      targetHits = 0;
      bonusHits = 0;
      roundOver = false;
      arrowGroup.visible = false;
      generateWind();
      btnNewRound.style.display = "none";
      updateHUD();
    }

    function updateHUD() {
      hudScore.textContent = `Score: ${score}`;
      hudArrows.textContent = `Arrows: ${arrowsLeft}`;
      hudWind.textContent = `Wind: ${windX.toFixed(1)}, ${windZ.toFixed(1)}`;
      hudLastHit.textContent =
        lastHitDistance === null
          ? `Last Hit: ${lastHitScore === 10 ? "Bonus Target (10)" : lastHitScore > 0 ? `Target (${lastHitScore})` : "None"}`
          : `Last Hit: score ${lastHitScore}, dist ${lastHitDistance.toFixed(2)}`;
      powerBar.style.width = `${Math.max(0, Math.min(1, power)) * 100}%`;
    }

    function getAimDirection() {
      const baseTarget = new THREE.Vector3(
        aimX * 3.0,
        2 + aimY * 2.0,
        -20
      );
      return baseTarget.sub(camera.position).normalize();
    }

    function fireArrow() {
      if (arrowsLeft <= 0 || isFlying) return;

      isFlying = true;
      isCharging = false;
      arrowsLeft--;
      arrowsFired++;

      arrowGroup.visible = true;
      arrowPosition.copy(camera.position);
      arrowGroup.position.copy(arrowPosition);

      const dir = getAimDirection();
      const finalSpeed = 15 + 25 * power;
      arrowVelocity.copy(dir.multiplyScalar(finalSpeed));

      orientArrowToVelocity();
      updateHUD();
    }

    function orientArrowToVelocity() {
      const dir = arrowVelocity.clone().normalize();
      const quat = new THREE.Quaternion();
      quat.setFromUnitVectors(new THREE.Vector3(1, 0, 0), dir);
      arrowGroup.quaternion.copy(quat);
    }

    function handleTargetHit() {
      const dx = arrowPosition.x - targetGroup.position.x;
      const dy = arrowPosition.y - targetGroup.position.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      lastHitDistance = dist;

      let scored = 0;
      if (dist <= ringRadii[4]) scored = ringScores[4];
      else if (dist <= ringRadii[3]) scored = ringScores[3];
      else if (dist <= ringRadii[2]) scored = ringScores[2];
      else if (dist <= ringRadii[1]) scored = ringScores[1];
      else if (dist <= ringRadii[0]) scored = ringScores[0];

      if (scored > 0) {
        score += scored;
        targetHits++;
      }

      lastHitScore = scored;
      endArrowFlight();
    }

    function handleBonusHit() {
      score += 10;
      lastHitScore = 10;
      lastHitDistance = null;
      bonusHits++;
      endArrowFlight();
    }

    function handleMiss() {
      lastHitScore = 0;
      lastHitDistance = null;
      endArrowFlight();
    }

    function endArrowFlight() {
      isFlying = false;
      arrowGroup.visible = false;
      power = 0;

      if (arrowsLeft === 0) {
        roundOver = true;
        btnNewRound.style.display = "block";
      }
      updateHUD();
    }

    window.addEventListener("mousemove", (e) => {
      aimX = (e.clientX / window.innerWidth) * 2 - 1;
      aimY = -((e.clientY / window.innerHeight) * 2 - 1);
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        if (!isCharging && !isFlying && arrowsLeft > 0) {
          isCharging = true;
          chargeStartTime = performance.now();
        }
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        if (isCharging && !isFlying && arrowsLeft > 0) {
          const elapsed = (performance.now() - chargeStartTime) / 1000;
          power = Math.min(1, elapsed / 2);
          fireArrow();
        }
      }
    });

    btnNewRound.addEventListener("click", resetRound);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.__3D_STATE__ = {
      score: 0,
      arrowsLeft: 10,
      arrowsFired: 0,
      power: 0,
      isCharging: false,
      isFlying: false,
      lastHitScore: 0,
      lastHitDistance: null,
      windX: 0,
      windZ: 0,
      roundOver: false,
      targetHits: 0,
      bonusHits: 0,
      arrowPosX: null,
      arrowPosY: null,
      arrowPosZ: null,
      boxAnimationPlaying: false
    };

    function updateState() {
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.arrowsLeft = arrowsLeft;
      window.__3D_STATE__.arrowsFired = arrowsFired;
      window.__3D_STATE__.power = power;
      window.__3D_STATE__.isCharging = isCharging;
      window.__3D_STATE__.isFlying = isFlying;
      window.__3D_STATE__.lastHitScore = lastHitScore;
      window.__3D_STATE__.lastHitDistance = lastHitDistance;
      window.__3D_STATE__.windX = windX;
      window.__3D_STATE__.windZ = windZ;
      window.__3D_STATE__.roundOver = roundOver;
      window.__3D_STATE__.targetHits = targetHits;
      window.__3D_STATE__.bonusHits = bonusHits;
      window.__3D_STATE__.arrowPosX = isFlying ? arrowPosition.x : null;
      window.__3D_STATE__.arrowPosY = isFlying ? arrowPosition.y : null;
      window.__3D_STATE__.arrowPosZ = isFlying ? arrowPosition.z : null;
      window.__3D_STATE__.boxAnimationPlaying = boxAnimationPlaying;
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      if (isCharging) {
        const elapsed = (performance.now() - chargeStartTime) / 1000;
        power = Math.min(1, elapsed / 2);
      } else if (!isFlying) {
        power = 0;
      }

      const lookTarget = new THREE.Vector3(
        aimX * 3.0,
        2 + aimY * 2.0,
        -20
      );
      camera.lookAt(lookTarget);

      if (mixer) {
        mixer.update(dt);
        boxBounding.setFromObject(boxModel);
      }

      if (isFlying) {
        arrowVelocity.y += gravity.y * dt;
        arrowVelocity.x += windX * dt;
        arrowVelocity.z += windZ * dt;

        arrowPosition.addScaledVector(arrowVelocity, dt);
        arrowGroup.position.copy(arrowPosition);
        orientArrowToVelocity();

        if (boxModel && boxBounding.containsPoint(arrowPosition)) {
          handleBonusHit();
        } else if (arrowPosition.z <= -14.5) {
          handleTargetHit();
        } else if (arrowPosition.y <= 0 || arrowPosition.z <= -20 || Math.abs(arrowPosition.x) > 50) {
          handleMiss();
        }
      }

      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    updateHUD();
    updateState();
    animate();
  </script>
</body>
</html>
