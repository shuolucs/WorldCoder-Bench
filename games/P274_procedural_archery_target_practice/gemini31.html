<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Archery Target Practice</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue fallback */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-text {
            position: absolute;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            padding: 15px;
        }
        #hud-score { top: 10px; left: 10px; }
        #hud-wind { top: 50px; left: 10px; font-size: 18px; color: #add8e6; }
        #hud-last-hit { top: 80px; left: 10px; font-size: 18px; color: #ffd700; }
        #hud-arrows { top: 10px; right: 10px; }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            opacity: 0.7;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
            box-shadow: 0 0 2px black;
        }
        #crosshair::before { top: 14px; left: 0; width: 30px; height: 2px; }
        #crosshair::after { top: 0; left: 14px; width: 2px; height: 30px; }

        #power-bar-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 12px;
            overflow: hidden;
        }
        #power-bar {
            width: 0%;
            height: 100%;
            background: hsl(120, 100%, 50%);
        }

        #btn-new-round {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #4CAF50;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
            display: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: background-color 0.2s;
        }
        #btn-new-round:hover {
            background-color: #45a049;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="hud-score" class="hud-text">Score: 0</div>
        <div id="hud-wind" class="hud-text">Wind: 0.0, 0.0</div>
        <div id="hud-last-hit" class="hud-text"></div>
        <div id="hud-arrows" class="hud-text">Arrows: 10</div>
        <div id="crosshair"></div>
        <div id="power-bar-container">
            <div id="power-bar"></div>
        </div>
        <button id="btn-new-round">New Round</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            score: 0,
            arrowsLeft: 10,
            arrowsFired: 0,
            power: 0,
            isCharging: false,
            isFlying: false,
            lastHitScore: 0,
            lastHitDistance: 0,
            windX: 0,
            windZ: 0,
            roundOver: false,
            targetHits: 0,
            bonusHits: 0,
            arrowPosX: null,
            arrowPosY: null,
            arrowPosZ: null,
            boxAnimationPlaying: false
        };
        const state = window.__3D_STATE__;

        // --- DOM Elements ---
        const elScore = document.getElementById('hud-score');
        const elArrows = document.getElementById('hud-arrows');
        const elWind = document.getElementById('hud-wind');
        const elLastHit = document.getElementById('hud-last-hit');
        const elPowerBar = document.getElementById('power-bar');
        const btnNewRound = document.getElementById('btn-new-round');

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        // --- Environment ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7d3a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Procedural Target ---
        const targetGroup = new THREE.Group();
        const targetZ = -15;
        const targetY = 2.5;
        const radii = [2.0, 1.6, 1.2, 0.8, 0.4];
        const colors = [0xffffff, 0x000000, 0x0000ff, 0xff0000, 0xffd700];
        const scores = [1, 2, 3, 4, 5];

        for (let i = 0; i < 5; i++) {
            const geo = new THREE.CylinderGeometry(radii[i], radii[i], 0.05, 32);
            const mat = new THREE.MeshStandardMaterial({ color: colors[i], roughness: 0.5 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = Math.PI / 2; // Face +Z
            mesh.position.z = i * 0.01; // Prevent z-fighting
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            targetGroup.add(mesh);
        }
        
        // Target Stand
        const standGeo = new THREE.CylinderGeometry(0.1, 0.1, targetY);
        const standMat = new THREE.MeshStandardMaterial({ color: 0x5c4033 });
        const stand = new THREE.Mesh(standGeo, standMat);
        stand.position.y = -targetY / 2;
        stand.castShadow = true;
        targetGroup.add(stand);

        targetGroup.position.set(0, targetY, targetZ);
        scene.add(targetGroup);

        // --- Bonus Target (GLTF) ---
        let mixer;
        let bonusModel;
        let bonusBox = new THREE.Box3();
        const loader = new GLTFLoader();
        
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxAnimated/glTF/BoxAnimated.gltf', (gltf) => {
            bonusModel = gltf.scene;
            bonusModel.position.set(3, 0, -14);
            bonusModel.scale.set(0.8, 0.8, 0.8);
            
            bonusModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(bonusModel);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(bonusModel);
                mixer.clipAction(gltf.animations[0]).play();
                state.boxAnimationPlaying = true;
            }
        });

        // --- Arrow ---
        const arrowGroup = new THREE.Group();
        
        const shaftGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5);
        const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const shaft = new THREE.Mesh(shaftGeo, shaftMat);
        shaft.rotation.x = Math.PI / 2; // Align along Z axis
        shaft.castShadow = true;

        const tipGeo = new THREE.ConeGeometry(0.06, 0.2);
        const tipMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const tip = new THREE.Mesh(tipGeo, tipMat);
        tip.rotation.x = Math.PI / 2;
        tip.position.z = 0.75 + 0.1; // Position at the front end of shaft
        tip.castShadow = true;

        const fletchingGeo = new THREE.BoxGeometry(0.02, 0.15, 0.3);
        const fletchingMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const fletch1 = new THREE.Mesh(fletchingGeo, fletchingMat);
        fletch1.position.z = -0.65;
        const fletch2 = fletch1.clone();
        fletch2.rotation.z = Math.PI / 2;

        arrowGroup.add(shaft, tip, fletch1, fletch2);
        arrowGroup.visible = false;
        scene.add(arrowGroup);

        // --- Input & Aiming ---
        let aimX = 0;
        let aimY = 0;
        let arrowVelocity = new THREE.Vector3();
        const clock = new THREE.Clock();

        window.addEventListener('mousemove', (e) => {
            aimX = (e.clientX / window.innerWidth) * 2 - 1;
            aimY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !state.isFlying && state.arrowsLeft > 0 && !state.roundOver) {
                state.isCharging = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && state.isCharging) {
                fireArrow();
            }
        });

        btnNewRound.addEventListener('click', startNewRound);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Game Logic ---
        function generateWind() {
            state.windX = (Math.random() * 4 - 2); // [-2, 2]
            state.windZ = (Math.random() * 2 - 1); // [-1, 1]
            elWind.innerText = `Wind: ${state.windX.toFixed(1)}, ${state.windZ.toFixed(1)}`;
        }

        function startNewRound() {
            state.score = 0;
            state.arrowsLeft = 10;
            state.arrowsFired = 0;
            state.roundOver = false;
            state.targetHits = 0;
            state.bonusHits = 0;
            state.lastHitScore = 0;
            state.lastHitDistance = 0;
            
            elScore.innerText = `Score: ${state.score}`;
            elArrows.innerText = `Arrows: ${state.arrowsLeft}`;
            elLastHit.innerText = '';
            btnNewRound.style.display = 'none';
            arrowGroup.visible = false;
            
            generateWind();
        }

        function fireArrow() {
            state.isCharging = false;
            state.isFlying = true;
            state.arrowsLeft--;
            state.arrowsFired++;
            elArrows.innerText = `Arrows: ${state.arrowsLeft}`;

            arrowGroup.position.copy(camera.position);
            arrowGroup.visible = true;

            // Calculate direction based on camera lookAt
            const targetPoint = new THREE.Vector3(aimX * 10, 2 + aimY * 10, -20);
            const direction = targetPoint.clone().sub(camera.position).normalize();
            
            const speed = 15 + 25 * state.power;
            arrowVelocity.copy(direction).multiplyScalar(speed);
            
            arrowGroup.lookAt(arrowGroup.position.clone().add(arrowVelocity));
            
            state.power = 0;
            updatePowerBarUI();
        }

        function handleHit(score, distance, hitType = 'Miss') {
            state.isFlying = false;
            state.lastHitScore = score;
            state.lastHitDistance = distance || 0;
            state.score += score;
            
            elScore.innerText = `Score: ${state.score}`;
            
            if (score > 0) {
                if (hitType === 'Target') {
                    state.targetHits++;
                    elLastHit.style.color = '#00ff00';
                    elLastHit.innerText = `Hit! Ring ${score} (Dist: ${distance.toFixed(2)})`;
                } else if (hitType === 'Bonus') {
                    state.bonusHits++;
                    elLastHit.style.color = '#ffd700';
                    elLastHit.innerText = `Bonus Hit! +10`;
                }
            } else {
                elLastHit.style.color = '#ff0000';
                elLastHit.innerText = 'Miss!';
            }

            if (state.arrowsLeft === 0) {
                state.roundOver = true;
                btnNewRound.style.display = 'block';
            }
        }

        function updatePowerBarUI() {
            elPowerBar.style.width = `${state.power * 100}%`;
            elPowerBar.style.backgroundColor = `hsl(${120 - state.power * 120}, 100%, 50%)`;
        }

        // Initialize first round
        generateWind();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent huge jumps

            // Update Animation
            if (mixer) mixer.update(dt);
            if (bonusModel) {
                bonusBox.setFromObject(bonusModel);
            }

            // Camera Aiming
            const lookAtX = aimX * 10;
            const lookAtY = 2 + aimY * 10;
            camera.lookAt(lookAtX, lookAtY, -20);

            // Charging
            if (state.isCharging) {
                state.power = Math.min(1.0, state.power + dt / 2.0); // 0 to 1 over 2 seconds
                updatePowerBarUI();
            }

            // Arrow Flight Physics & Collision
            if (state.isFlying) {
                const prevPos = arrowGroup.position.clone();

                // Apply forces
                arrowVelocity.y -= 9.8 * dt; // Gravity
                arrowVelocity.x += state.windX * dt; // Wind X
                arrowVelocity.z += state.windZ * dt; // Wind Z

                // Move arrow
                arrowGroup.position.addScaledVector(arrowVelocity, dt);
                
                // Orient arrow to velocity
                if (arrowVelocity.lengthSq() > 0.1) {
                    arrowGroup.lookAt(arrowGroup.position.clone().add(arrowVelocity));
                }

                // Update state positions
                state.arrowPosX = arrowGroup.position.x;
                state.arrowPosY = arrowGroup.position.y;
                state.arrowPosZ = arrowGroup.position.z;

                // Collision Detection
                let hitRegistered = false;

                // 1. Ground Collision
                if (arrowGroup.position.y <= 0) {
                    arrowGroup.position.y = 0;
                    handleHit(0, null, 'Ground');
                    hitRegistered = true;
                }
                
                // 2. Past Target Area (Miss)
                else if (arrowGroup.position.z <= -20) {
                    handleHit(0, null, 'Out of bounds');
                    hitRegistered = true;
                }

                // 3. Main Target Collision (Plane at z = targetZ)
                else if (prevPos.z > targetZ && arrowGroup.position.z <= targetZ) {
                    // Calculate exact intersection point on the z=targetZ plane
                    const t = (targetZ - prevPos.z) / (arrowGroup.position.z - prevPos.z);
                    const hitX = prevPos.x + t * (arrowGroup.position.x - prevPos.x);
                    const hitY = prevPos.y + t * (arrowGroup.position.y - prevPos.y);
                    
                    // Snap arrow to target face
                    arrowGroup.position.set(hitX, hitY, targetZ);

                    // Calculate distance from target center (0, targetY)
                    const dx = hitX - 0;
                    const dy = hitY - targetY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    let score = 0;
                    if (dist <= radii[4]) score = 5;
                    else if (dist <= radii[3]) score = 4;
                    else if (dist <= radii[2]) score = 3;
                    else if (dist <= radii[1]) score = 2;
                    else if (dist <= radii[0]) score = 1;

                    handleHit(score, dist, score > 0 ? 'Target' : 'Target Stand/Miss');
                    hitRegistered = true;
                }

                // 4. Bonus Target Collision
                if (!hitRegistered && bonusModel) {
                    // Raycast from prevPos to current pos against bounding box
                    const rayDir = arrowGroup.position.clone().sub(prevPos).normalize();
                    const rayLength = prevPos.distanceTo(arrowGroup.position);
                    const ray = new THREE.Ray(prevPos, rayDir);
                    const intersectPoint = new THREE.Vector3();
                    
                    if (ray.intersectBox(bonusBox, intersectPoint)) {
                        if (prevPos.distanceTo(intersectPoint) <= rayLength) {
                            arrowGroup.position.copy(intersectPoint);
                            handleHit(10, null, 'Bonus');
                        }
                    }
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
