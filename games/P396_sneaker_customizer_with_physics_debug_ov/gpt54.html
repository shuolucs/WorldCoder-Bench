<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Sneaker Customizer with Physics Debug</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
    }

    canvas {
      display: block;
    }

    #controlPanel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 220px;
      padding: 16px;
      background: rgba(10, 10, 20, 0.75);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      z-index: 10;
      box-sizing: border-box;
    }

    #controlPanel h2 {
      margin: 0 0 14px 0;
      font-size: 18px;
    }

    .section {
      margin-bottom: 18px;
    }

    .section label,
    .section .section-title {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: bold;
    }

    .color-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-btn {
      padding: 8px 10px;
      border: 2px solid transparent;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      transition: 0.2s ease;
      font-size: 13px;
    }

    .color-btn.active {
      border-color: #ffd166;
      box-shadow: 0 0 0 2px rgba(255, 209, 102, 0.2);
    }

    .color-btn.red { background: #ff3333; }
    .color-btn.blue { background: #3333ff; }
    .color-btn.green { background: #33aa33; }

    input[type="range"] {
      width: 100%;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #debugOverlay {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 250px;
      padding: 14px;
      background: rgba(0, 0, 0, 0.75);
      color: #8cffb0;
      border: 1px solid rgba(140,255,176,0.3);
      border-radius: 10px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-line;
      z-index: 10;
      display: none;
    }

    #instructions {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="controlPanel">
      <h2>Sneaker Customizer</h2>

      <div class="section">
        <div class="section-title">Color Picker</div>
        <div class="color-buttons">
          <button class="color-btn red active" data-color="#ff3333">Red</button>
          <button class="color-btn blue" data-color="#3333ff">Blue</button>
          <button class="color-btn green" data-color="#33ff33">Green</button>
        </div>
      </div>

      <div class="section">
        <label for="scaleSlider">Scale</label>
        <input id="scaleSlider" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
      </div>

      <div class="section">
        <div class="checkbox-row">
          <input id="wireframeToggle" type="checkbox" />
          <label for="wireframeToggle">Wireframe</label>
        </div>
      </div>

      <div class="section">
        <label for="rotationSlider">Rotation Speed</label>
        <input id="rotationSlider" type="range" min="0" max="5" step="0.5" value="0" />
      </div>
    </div>

    <div id="debugOverlay"></div>

    <div id="instructions">
      Keys: <b>D</b> drop sneaker, <b>R</b> reset sneaker, <b>P</b> toggle physics debug
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById('app');
    const debugOverlay = document.getElementById('debugOverlay');
    const scaleSlider = document.getElementById('scaleSlider');
    const wireframeToggle = document.getElementById('wireframeToggle');
    const rotationSlider = document.getElementById('rotationSlider');
    const colorButtons = document.querySelectorAll('.color-btn');

    const scene = new THREE.Scene();

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 2;
    controls.maxDistance = 10;
    controls.target.set(0, 1, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -8;
    dirLight.shadow.camera.right = 8;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -8;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    scene.add(dirLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.5);
    pointLight.position.set(-3, 3, -3);
    scene.add(pointLight);

    // Ground plane with subtle grid material
    const groundGroup = new THREE.Group();

    const groundPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(10, 10),
      new THREE.MeshStandardMaterial({
        color: 0x1b263b,
        roughness: 0.95,
        metalness: 0.05
      })
    );
    groundPlane.rotation.x = -Math.PI / 2;
    groundPlane.position.y = 0;
    groundPlane.receiveShadow = true;
    groundGroup.add(groundPlane);

    const grid = new THREE.GridHelper(10, 20, 0x3a506b, 0x2f4158);
    grid.position.y = 0.001;
    grid.material.transparent = true;
    grid.material.opacity = 0.35;
    groundGroup.add(grid);

    scene.add(groundGroup);

    // State
    let sneaker = null;
    let boundingBoxHelper = null;
    let baseFitScale = 1;
    let modelHalfHeight = 0.75;
    let currentColor = '#ff3333';
    let modelScale = 1.0;
    let wireframeEnabled = false;
    let rotationSpeed = 0;
    let debugVisible = false;

    const physics = {
      gravity: 9.81,
      active: false,
      velocity: new THREE.Vector3(0, 0, 0),
      bounceCount: 0,
      grounded: false,
      restitution: 0.4,
      contactDamping: 0.98
    };

    window.__3D_STATE__ = {
      modelLoaded: false,
      currentColor,
      modelScale,
      wireframeEnabled,
      rotationSpeed,
      physicsActive: false,
      positionY: 0,
      velocityY: 0,
      bounceCount: 0,
      isGrounded: false,
      debugVisible,
      fps: 0
    };

    function applyColorToModel(colorHex) {
      if (!sneaker) return;
      sneaker.traverse((child) => {
        if (child.isMesh) {
          if (Array.isArray(child.material)) {
            child.material.forEach(mat => {
              if (mat && 'color' in mat) mat.color.set(colorHex);
              mat.wireframe = wireframeEnabled;
              mat.needsUpdate = true;
            });
          } else if (child.material) {
            if ('color' in child.material) child.material.color.set(colorHex);
            child.material.wireframe = wireframeEnabled;
            child.material.needsUpdate = true;
          }
        }
      });
    }

    function applyWireframe(enabled) {
      if (!sneaker) return;
      sneaker.traverse((child) => {
        if (child.isMesh) {
          if (Array.isArray(child.material)) {
            child.material.forEach(mat => {
              mat.wireframe = enabled;
              mat.needsUpdate = true;
            });
          } else if (child.material) {
            child.material.wireframe = enabled;
            child.material.needsUpdate = true;
          }
        }
      });
    }

    function updateModelScale() {
      if (!sneaker) return;
      sneaker.scale.setScalar(baseFitScale * modelScale);
      updateModelMetrics();
      if (!physics.active && physics.grounded) {
        sneaker.position.y = modelHalfHeight;
      }
      updateBoundingHelper();
    }

    function updateModelMetrics() {
      if (!sneaker) return;
      const box = new THREE.Box3().setFromObject(sneaker);
      const size = new THREE.Vector3();
      box.getSize(size);
      modelHalfHeight = size.y * 0.5;
    }

    function updateBoundingHelper() {
      if (!sneaker || !boundingBoxHelper) return;
      boundingBoxHelper.update();
      boundingBoxHelper.visible = debugVisible;
    }

    function setColorButtonActive(selectedHex) {
      colorButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.color.toLowerCase() === selectedHex.toLowerCase());
      });
    }

    colorButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        currentColor = btn.dataset.color;
        setColorButtonActive(currentColor);
        applyColorToModel(currentColor);
      });
    });

    scaleSlider.addEventListener('input', () => {
      modelScale = parseFloat(scaleSlider.value);
      updateModelScale();
    });

    wireframeToggle.addEventListener('change', () => {
      wireframeEnabled = wireframeToggle.checked;
      applyWireframe(wireframeEnabled);
    });

    rotationSlider.addEventListener('input', () => {
      rotationSpeed = parseFloat(rotationSlider.value);
    });

    // Loader
    const loader = new GLTFLoader();
    loader.load(
      'PrimaryIonDrive.glb',
      (gltf) => {
        sneaker = gltf.scene;

        sneaker.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        scene.add(sneaker);

        // Normalize size to fit within 1.5 unit bounding box
        const initialBox = new THREE.Box3().setFromObject(sneaker);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        initialBox.getSize(size);
        initialBox.getCenter(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        baseFitScale = 1.5 / maxDim;
        sneaker.scale.setScalar(baseFitScale);

        // Recompute after scaling
        let scaledBox = new THREE.Box3().setFromObject(sneaker);
        let scaledCenter = new THREE.Vector3();
        let scaledSize = new THREE.Vector3();
        scaledBox.getCenter(scaledCenter);
        scaledBox.getSize(scaledSize);

        // Center model horizontally and vertically around origin first
        sneaker.position.set(
          -scaledCenter.x,
          -scaledBox.min.y,
          -scaledCenter.z
        );

        // Place at y = 1.0 above ground
        sneaker.position.y = 1.0;

        updateModelMetrics();
        physics.velocity.set(0, 0, 0);
        physics.active = false;
        physics.grounded = false;

        applyColorToModel(currentColor);
        applyWireframe(wireframeEnabled);
        updateModelScale();

        boundingBoxHelper = new THREE.BoxHelper(sneaker, 0x00ff00);
        boundingBoxHelper.visible = debugVisible;
        scene.add(boundingBoxHelper);

        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (error) => {
        console.error('Failed to load PrimaryIonDrive.glb:', error);
      }
    );

    function dropSneaker() {
      if (!sneaker) return;
      physics.active = true;
      physics.grounded = false;
      physics.bounceCount = 0;
      physics.velocity.set(0, 0, 0);
    }

    function resetSneaker() {
      if (!sneaker) return;
      if (!physics.grounded && physics.active) return;
      physics.active = false;
      physics.grounded = false;
      physics.bounceCount = 0;
      physics.velocity.set(0, 0, 0);
      sneaker.position.y = 1.0;
      updateBoundingHelper();
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'd') {
        dropSneaker();
      } else if (key === 'r') {
        resetSneaker();
      } else if (key === 'p') {
        debugVisible = !debugVisible;
        debugOverlay.style.display = debugVisible ? 'block' : 'none';
        if (boundingBoxHelper) boundingBoxHelper.visible = debugVisible;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    let fps = 0;
    let fpsAccumulator = 0;
    let fpsFrames = 0;

    function updatePhysics(delta) {
      if (!sneaker || !physics.active) return;

      const groundY = modelHalfHeight;

      physics.velocity.y -= physics.gravity * delta;
      sneaker.position.y += physics.velocity.y * delta;

      if (sneaker.position.y <= groundY) {
        sneaker.position.y = groundY;

        if (Math.abs(physics.velocity.y) > 0.15) {
          physics.velocity.y = -physics.velocity.y * physics.restitution;
          physics.bounceCount++;
          physics.grounded = false;
        } else {
          physics.velocity.y = 0;
          physics.velocity.multiplyScalar(physics.contactDamping);
          physics.grounded = true;
          physics.active = false;
        }
      } else {
        physics.grounded = false;
      }

      updateBoundingHelper();
    }

    function updateDebugOverlay() {
      if (!sneaker) return;
      const pos = sneaker.position;
      const vel = physics.velocity;
      debugOverlay.textContent =
`Position: x=${pos.x.toFixed(2)} y=${pos.y.toFixed(2)} z=${pos.z.toFixed(2)}
Velocity: vx=${vel.x.toFixed(2)} vy=${vel.y.toFixed(2)} vz=${vel.z.toFixed(2)}
Bounce Count: ${physics.bounceCount}
Is Grounded: ${physics.grounded}
FPS: ${fps.toFixed(0)}
Physics Active: ${physics.active}`;
    }

    function syncState() {
      window.__3D_STATE__ = {
        modelLoaded: !!sneaker,
        currentColor,
        modelScale,
        wireframeEnabled,
        rotationSpeed,
        physicsActive: physics.active,
        positionY: sneaker ? sneaker.position.y : 0,
        velocityY: physics.velocity.y,
        bounceCount: physics.bounceCount,
        isGrounded: physics.grounded,
        debugVisible,
        fps
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);

      fpsAccumulator += delta;
      fpsFrames++;
      if (fpsAccumulator >= 0.5) {
        fps = fpsFrames / fpsAccumulator;
        fpsAccumulator = 0;
        fpsFrames = 0;
      }

      if (sneaker) {
        if (rotationSpeed !== 0) {
          sneaker.rotation.y += rotationSpeed * delta;
        }
        updatePhysics(delta);
      }

      controls.update();

      if (debugVisible) {
        updateDebugOverlay();
      }

      syncState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
