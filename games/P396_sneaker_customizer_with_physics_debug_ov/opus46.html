<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneaker Customizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }

  #control-panel {
    position: fixed;
    left: 0;
    top: 0;
    width: 220px;
    height: 100vh;
    background: rgba(20, 20, 40, 0.85);
    color: #eee;
    padding: 20px 15px;
    z-index: 10;
    overflow-y: auto;
    backdrop-filter: blur(10px);
    border-right: 1px solid rgba(255,255,255,0.1);
  }

  #control-panel h2 {
    font-size: 16px;
    margin-bottom: 15px;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 8px;
  }

  .section {
    margin-bottom: 20px;
  }

  .section h3 {
    font-size: 12px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .color-buttons {
    display: flex;
    gap: 8px;
  }

  .color-btn {
    flex: 1;
    padding: 8px 4px;
    border: 2px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: bold;
    color: #fff;
    transition: all 0.2s;
  }

  .color-btn:hover {
    transform: scale(1.05);
  }

  .color-btn.active {
    border-color: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.3);
  }

  .color-btn.red { background: #ff3333; }
  .color-btn.blue { background: #3333ff; }
  .color-btn.green { background: #33ff33; color: #222; }

  .slider-group {
    margin-bottom: 12px;
  }

  .slider-group label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 5px;
    color: #ccc;
  }

  .slider-group input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    outline: none;
  }

  .slider-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    cursor: pointer;
  }

  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    cursor: pointer;
  }

  .checkbox-group input {
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .instructions {
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid rgba(255,255,255,0.15);
    font-size: 11px;
    color: #888;
    line-height: 1.6;
  }

  .instructions kbd {
    background: rgba(255,255,255,0.15);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: monospace;
  }

  #debug-overlay {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 250px;
    background: rgba(0, 0, 0, 0.8);
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid rgba(0, 255, 0, 0.3);
    z-index: 10;
    display: none;
    backdrop-filter: blur(5px);
  }

  #debug-overlay h3 {
    color: #0f0;
    font-size: 13px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(0,255,0,0.3);
    padding-bottom: 5px;
  }

  .debug-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    padding: 2px 0;
  }

  .debug-label { color: #0a0; }
  .debug-value { color: #0f0; }

  #loading-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    color: #fff;
    font-size: 18px;
    flex-direction: column;
    gap: 15px;
    transition: opacity 0.5s;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <div>Loading Sneaker Model...</div>
</div>

<div id="control-panel">
  <h2>Customizer</h2>

  <div class="section">
    <h3>Color</h3>
    <div class="color-buttons">
      <button class="color-btn red" data-color="#ff3333" onclick="setColor('#ff3333', this)">Red</button>
      <button class="color-btn blue" data-color="#3333ff" onclick="setColor('#3333ff', this)">Blue</button>
      <button class="color-btn green" data-color="#33ff33" onclick="setColor('#33ff33', this)">Green</button>
    </div>
  </div>

  <div class="section">
    <h3>Scale</h3>
    <div class="slider-group">
      <label><span>Size</span><span id="scale-value">1.0</span></label>
      <input type="range" id="scale-slider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="setScale(this.value)">
    </div>
  </div>

  <div class="section">
    <h3>Display</h3>
    <label class="checkbox-group">
      <input type="checkbox" id="wireframe-toggle" onchange="toggleWireframe(this.checked)">
      Wireframe
    </label>
  </div>

  <div class="section">
    <h3>Auto Rotation</h3>
    <div class="slider-group">
      <label><span>Speed</span><span id="rotation-value">0</span></label>
      <input type="range" id="rotation-slider" min="0" max="5" step="0.5" value="0" oninput="setRotationSpeed(this.value)">
    </div>
  </div>

  <div class="instructions">
    <kbd>D</kbd> Drop sneaker<br>
    <kbd>R</kbd> Reset position<br>
    <kbd>P</kbd> Toggle debug
  </div>
</div>

<div id="debug-overlay">
  <h3>Physics Debug</h3>
  <div class="debug-row"><span class="debug-label">Position:</span><span class="debug-value" id="dbg-pos">0, 0, 0</span></div>
  <div class="debug-row"><span class="debug-label">Velocity:</span><span class="debug-value" id="dbg-vel">0, 0, 0</span></div>
  <div class="debug-row"><span class="debug-label">Bounce Count:</span><span class="debug-value" id="dbg-bounce">0</span></div>
  <div class="debug-row"><span class="debug-label">Is Grounded:</span><span class="debug-value" id="dbg-grounded">false</span></div>
  <div class="debug-row"><span class="debug-label">FPS:</span><span class="debug-value" id="dbg-fps">0</span></div>
  <div class="debug-row"><span class="debug-label">Physics Active:</span><span class="debug-value" id="dbg-physics">false</span></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
  modelLoaded: false,
  currentColor: '#ff3333',
  modelScale: 1.0,
  wireframeEnabled: false,
  rotationSpeed: 0,
  physicsActive: false,
  positionY: 1.0,
  velocityY: 0,
  bounceCount: 0,
  isGrounded: false,
  debugVisible: false,
  fps: 0
};
window.__3D_STATE__ = state;

// Physics state
const physics = {
  velocity: new THREE.Vector3(0, 0, 0),
  gravity: 9.81,
  restitution: 0.4,
  damping: 0.98,
  active: false,
  grounded: false,
  bounceCount: 0,
  modelHalfHeight: 0.5
};

// Scene
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#16213e');
gradient.addColorStop(1, '#1a1a2e');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 2;
controls.maxDistance = 10;
controls.target.set(0, 1, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0xffffff, 0.5);
pointLight.position.set(-3, 3, -3);
scene.add(pointLight);

// Ground plane with grid
const groundGeom = new THREE.PlaneGeometry(10, 10);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x222233,
  roughness: 0.8,
  metalness: 0.2
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

const gridHelper = new THREE.GridHelper(10, 20, 0x444466, 0x333355);
gridHelper.position.y = 0.001;
scene.add(gridHelper);

// Model
let sneakerModel = null;
let sneakerMaterials = [];
let boundingBoxHelper = null;
let baseScale = 1.0;

const loader = new GLTFLoader();
loader.load(
  'PrimaryIonDrive.glb',
  (gltf) => {
    sneakerModel = gltf.scene;

    // Compute bounding box and scale to fit within 1.5 units
    const box = new THREE.Box3().setFromObject(sneakerModel);
    const size = new THREE.Vector3();
    box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    baseScale = 1.5 / maxDim;
    sneakerModel.scale.setScalar(baseScale);

    // Center the model
    const boxAfterScale = new THREE.Box3().setFromObject(sneakerModel);
    const center = new THREE.Vector3();
    boxAfterScale.getCenter(center);
    sneakerModel.position.sub(center);
    sneakerModel.position.y = 1.0;

    // Recalculate half height after positioning
    const finalBox = new THREE.Box3().setFromObject(sneakerModel);
    const finalSize = new THREE.Vector3();
    finalBox.getSize(finalSize);
    physics.modelHalfHeight = finalSize.y / 2;

    // Enable shadows and collect materials
    sneakerModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        if (child.material) {
          if (Array.isArray(child.material)) {
            sneakerMaterials.push(...child.material);
          } else {
            sneakerMaterials.push(child.material);
          }
        }
      }
    });

    scene.add(sneakerModel);

    // Bounding box helper
    boundingBoxHelper = new THREE.Box3Helper(new THREE.Box3(), 0x00ff00);
    boundingBoxHelper.visible = false;
    scene.add(boundingBoxHelper);

    state.modelLoaded = true;

    // Apply initial color
    setColor('#ff3333', document.querySelector('.color-btn.red'));

    // Hide loading screen
    const loadingScreen = document.getElementById('loading-screen');
    loadingScreen.style.opacity = '0';
    setTimeout(() => loadingScreen.style.display = 'none', 500);
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.error('Error loading model:', error);
    const loadingScreen = document.getElementById('loading-screen');
    loadingScreen.innerHTML = '<div style="color:#f55">Failed to load model.<br>Make sure PrimaryIonDrive.glb is in the same directory.</div>';
  }
);

// Customization functions
window.setColor = function(color, btn) {
  state.currentColor = color;
  const threeColor = new THREE.Color(color);

  if (sneakerMaterials.length > 0) {
    sneakerMaterials.forEach(mat => {
      mat.color.copy(threeColor);
    });
  }

  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
};

window.setScale = function(value) {
  const v = parseFloat(value);
  state.modelScale = v;
  document.getElementById('scale-value').textContent = v.toFixed(1);

  if (sneakerModel) {
    sneakerModel.scale.setScalar(baseScale * v);

    // Recalculate half height
    const box = new THREE.Box3().setFromObject(sneakerModel);
    const size = new THREE.Vector3();
    box.getSize(size);
    physics.modelHalfHeight = size.y / 2;
  }
};

window.toggleWireframe = function(enabled) {
  state.wireframeEnabled = enabled;
  sneakerMaterials.forEach(mat => {
    mat.wireframe = enabled;
  });
};

window.setRotationSpeed = function(value) {
  const v = parseFloat(value);
  state.rotationSpeed = v;
  document.getElementById('rotation-value').textContent = v.toFixed(1);
};

// Keyboard controls
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === 'd' && sneakerModel && !physics.active) {
    // Drop
    physics.active = true;
    physics.grounded = false;
    physics.bounceCount = 0;
    physics.velocity.set(0, 0, 0);
    state.physicsActive = true;
    state.isGrounded = false;
    state.bounceCount = 0;
  }

  if (key === 'r' && sneakerModel) {
    // Reset
    physics.active = false;
    physics.grounded = false;
    physics.bounceCount = 0;
    physics.velocity.set(0, 0, 0);
    sneakerModel.position.y = 1.0;
    state.physicsActive = false;
    state.isGrounded = false;
    state.bounceCount = 0;
    state.positionY = 1.0;
    state.velocityY = 0;
  }

  if (key === 'p') {
    state.debugVisible = !state.debugVisible;
    const overlay = document.getElementById('debug-overlay');
    overlay.style.display = state.debugVisible ? 'block' : 'none';
    if (boundingBoxHelper) {
      boundingBoxHelper.visible = state.debugVisible;
    }
  }
});

// FPS tracking
let frameCount = 0;
let fpsTime = 0;
let currentFPS = 60;

// Clock
const clock = new THREE.Clock();

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // FPS calculation
  frameCount++;
  fpsTime += delta;
  if (fpsTime >= 1.0) {
    currentFPS = Math.round(frameCount / fpsTime);
    frameCount = 0;
    fpsTime = 0;
  }
  state.fps = currentFPS;

  // Auto rotation
  if (sneakerModel && state.rotationSpeed > 0) {
    sneakerModel.rotation.y += state.rotationSpeed * delta;
  }

  // Physics update
  if (sneakerModel && physics.active) {
    const dt = Math.min(delta, 1 / 30); // Cap delta

    // Apply gravity
    physics.velocity.y -= physics.gravity * dt;

    // Update position
    sneakerModel.position.y += physics.velocity.y * dt;

    // Ground collision
    const groundLevel = physics.modelHalfHeight;

    if (sneakerModel.position.y <= groundLevel) {
      sneakerModel.position.y = groundLevel;

      if (physics.velocity.y < 0) {
        // Bounce
        physics.velocity.y = -physics.velocity.y * physics.restitution;
        physics.bounceCount++;
        state.bounceCount = physics.bounceCount;

        // Check if velocity is small enough to stop
        if (Math.abs(physics.velocity.y) < 0.05) {
          physics.velocity.y = 0;
          physics.active = false;
          physics.grounded = true;
          state.physicsActive = false;
          state.isGrounded = true;
        }
      }

      // Apply damping when in contact
      physics.velocity.y *= physics.damping;
    }
  }

  // Update bounding box helper
  if (boundingBoxHelper && sneakerModel && state.debugVisible) {
    const box = new THREE.Box3().setFromObject(sneakerModel);
    boundingBoxHelper.box.copy(box);
    boundingBoxHelper.updateMatrixWorld(true);
  }

  // Update state
  if (sneakerModel) {
    state.positionY = sneakerModel.position.y;
    state.velocityY = physics.velocity.y;
  }

  // Update debug overlay
  if (state.debugVisible) {
    const pos = sneakerModel ? sneakerModel.position : new THREE.Vector3();
    document.getElementById('dbg-pos').textContent =
      `${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)}`;
    document.getElementById('dbg-vel').textContent =
      `${physics.velocity.x.toFixed(2)}, ${physics.velocity.y.toFixed(2)}, ${physics.velocity.z.toFixed(2)}`;
    document.getElementById('dbg-bounce').textContent = physics.bounceCount;
    document.getElementById('dbg-grounded').textContent = physics.grounded;
    document.getElementById('dbg-fps').textContent = currentFPS;
    document.getElementById('dbg-physics').textContent = physics.active;
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
