<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sneaker Customizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #ui-panel {
            position: absolute;
            left: 0;
            top: 0;
            width: 220px;
            height: 100vh;
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(5px);
            z-index: 2;
            padding: 20px;
            box-sizing: border-box;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        .section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-size: 0.9rem;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }
        .color-btns {
            display: flex;
            gap: 10px;
        }
        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .color-btn:hover {
            transform: scale(1.1);
        }
        .color-btn.active {
            border-color: #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #fff;
        }
        .instructions {
            margin-top: auto;
            font-size: 0.8rem;
            color: #888;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
        }
        .instructions p {
            margin: 5px 0;
        }
        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            color: #fff;
            font-family: monospace;
        }
        #debug-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 250px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444;
            z-index: 2;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            color: #0f0;
            display: none;
            box-sizing: border-box;
            pointer-events: none;
        }
        .debug-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .debug-label {
            color: #aaa;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h3>Customizer</h3>
        
        <div class="section">
            <label>Primary Color</label>
            <div class="color-btns">
                <button class="color-btn" data-color="#ff3333" style="background-color: #ff3333;" title="Red"></button>
                <button class="color-btn" data-color="#3333ff" style="background-color: #3333ff;" title="Blue"></button>
                <button class="color-btn" data-color="#33ff33" style="background-color: #33ff33;" title="Green"></button>
            </div>
        </div>

        <div class="section">
            <label>Scale <span id="scale-val">1.0</span></label>
            <input type="range" id="scale-slider" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>

        <div class="section">
            <label class="checkbox-label">
                <input type="checkbox" id="wireframe-toggle"> Wireframe
            </label>
        </div>

        <div class="section">
            <label>Auto-Rotate <span id="rot-val">0.0</span></label>
            <input type="range" id="rot-slider" min="0" max="5" step="0.5" value="0">
        </div>

        <div class="instructions">
            <p><span class="key">D</span> Drop Sneaker</p>
            <p><span class="key">R</span> Reset Position</p>
            <p><span class="key">P</span> Toggle Debug</p>
        </div>
    </div>

    <div id="debug-panel">
        <div style="border-bottom: 1px solid #444; margin-bottom: 10px; padding-bottom: 5px; color: #fff;">PHYSICS DEBUG</div>
        <div class="debug-row"><span class="debug-label">Position:</span> <span id="dbg-pos">0.00, 0.00, 0.00</span></div>
        <div class="debug-row"><span class="debug-label">Velocity:</span> <span id="dbg-vel">0.00, 0.00, 0.00</span></div>
        <div class="debug-row"><span class="debug-label">Bounces:</span> <span id="dbg-bounces">0</span></div>
        <div class="debug-row"><span class="debug-label">Grounded:</span> <span id="dbg-grounded">false</span></div>
        <div class="debug-row"><span class="debug-label">Active:</span> <span id="dbg-physics">false</span></div>
        <div class="debug-row"><span class="debug-label">FPS:</span> <span id="dbg-fps">0</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            currentColor: '#ffffff',
            modelScale: 1.0,
            wireframeEnabled: false,
            rotationSpeed: 0,
            physicsActive: false,
            positionY: 1.0,
            velocityY: 0,
            bounceCount: 0,
            isGrounded: false,
            debugVisible: false,
            fps: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 10;
        controls.target.set(0, 0.5, 0);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 20;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(-3, 3, -3);
        scene.add(pointLight);

        // --- Ground ---
        const planeGeo = new THREE.PlaneGeometry(10, 10);
        const planeMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a1a,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(planeGeo, planeMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(10, 20, 0x444444, 0x222222);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- Model Loading & Variables ---
        let modelGroup = new THREE.Group();
        scene.add(modelGroup);
        let sneakerMesh = null;
        let boxHelper = null;
        let halfHeight = 0;
        let originalMaterials = new Map();

        const loader = new GLTFLoader();
        
        // Fallback procedural model in case external GLB fails to load
        function createFallbackModel() {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const sole = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 2.2), mat);
            sole.position.y = 0.1;
            const upper = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.6, 1.4), mat);
            upper.position.set(0, 0.5, -0.2);
            group.add(sole);
            group.add(upper);
            return group;
        }

        function processModel(model) {
            sneakerMesh = model;
            
            // Calculate bounding box and scale to fit 1.5 units
            const box = new THREE.Box3().setFromObject(sneakerMesh);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const scaleFactor = 1.5 / maxDim;
            sneakerMesh.scale.setScalar(scaleFactor);
            
            // Center the mesh
            sneakerMesh.position.sub(center.multiplyScalar(scaleFactor));
            
            modelGroup.add(sneakerMesh);
            modelGroup.position.y = 1.0;

            // Setup shadows and materials
            sneakerMesh.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    if (child.material) {
                        child.material = child.material.clone();
                        originalMaterials.set(child.uuid, child.material);
                    }
                }
            });

            updateHalfHeight();

            boxHelper = new THREE.BoxHelper(modelGroup, 0x00ff00);
            boxHelper.visible = window.__3D_STATE__.debugVisible;
            scene.add(boxHelper);

            window.__3D_STATE__.modelLoaded = true;
        }

        loader.load(
            'PrimaryIonDrive.glb',
            (gltf) => processModel(gltf.scene),
            undefined,
            (error) => {
                console.warn("Could not load 'PrimaryIonDrive.glb'. Using fallback model.");
                processModel(createFallbackModel());
            }
        );

        function updateHalfHeight() {
            if (!modelGroup) return;
            const box = new THREE.Box3().setFromObject(modelGroup);
            halfHeight = (box.max.y - box.min.y) / 2;
        }

        // --- Physics System ---
        const gravity = -9.81;
        const restitution = 0.4;
        const damping = 0.98;

        function updatePhysics(dt) {
            const state = window.__3D_STATE__;
            if (!state.physicsActive || !modelGroup) return;

            state.velocityY += gravity * dt;
            modelGroup.position.y += state.velocityY * dt;

            // Collision detection with ground
            if (modelGroup.position.y - halfHeight <= 0) {
                modelGroup.position.y = halfHeight;
                state.velocityY *= -restitution;
                state.bounceCount++;

                // Apply damping when in contact
                state.velocityY *= damping;

                // Settle condition
                if (Math.abs(state.velocityY) < 0.2) {
                    state.velocityY = 0;
                    state.physicsActive = false;
                    state.isGrounded = true;
                }
            }
        }

        // --- UI Interactions ---
        
        // Colors
        const colorBtns = document.querySelectorAll('.color-btn');
        colorBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const colorHex = e.target.dataset.color;
                window.__3D_STATE__.currentColor = colorHex;
                
                colorBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');

                if (sneakerMesh) {
                    const newColor = new THREE.Color(colorHex);
                    sneakerMesh.traverse((child) => {
                        if (child.isMesh && child.material) {
                            child.material.color.copy(newColor);
                        }
                    });
                }
            });
        });

        // Scale
        const scaleSlider = document.getElementById('scale-slider');
        const scaleVal = document.getElementById('scale-val');
        scaleSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            scaleVal.innerText = val.toFixed(1);
            window.__3D_STATE__.modelScale = val;
            
            if (modelGroup) {
                modelGroup.scale.setScalar(val);
                updateHalfHeight();
                // Prevent clipping through ground when scaling up
                if (modelGroup.position.y - halfHeight < 0) {
                    modelGroup.position.y = halfHeight;
                }
            }
        });

        // Wireframe
        const wireframeToggle = document.getElementById('wireframe-toggle');
        wireframeToggle.addEventListener('change', (e) => {
            const isWireframe = e.target.checked;
            window.__3D_STATE__.wireframeEnabled = isWireframe;
            
            if (sneakerMesh) {
                sneakerMesh.traverse((child) => {
                    if (child.isMesh && child.material) {
                        child.material.wireframe = isWireframe;
                    }
                });
            }
        });

        // Rotation
        const rotSlider = document.getElementById('rot-slider');
        const rotVal = document.getElementById('rot-val');
        rotSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            rotVal.innerText = val.toFixed(1);
            window.__3D_STATE__.rotationSpeed = val;
        });

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const state = window.__3D_STATE__;

            if (key === 'd' && modelGroup && !state.physicsActive && !state.isGrounded) {
                state.physicsActive = true;
            }
            
            if (key === 'r' && modelGroup) {
                modelGroup.position.y = 1.0;
                state.velocityY = 0;
                state.physicsActive = false;
                state.isGrounded = false;
                state.bounceCount = 0;
            }

            if (key === 'p') {
                state.debugVisible = !state.debugVisible;
                document.getElementById('debug-panel').style.display = state.debugVisible ? 'block' : 'none';
                if (boxHelper) boxHelper.visible = state.debugVisible;
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let frameCount = 0;
        let lastFpsTime = performance.now();

        function updateDebugUI() {
            const state = window.__3D_STATE__;
            if (!state.debugVisible) return;

            if (modelGroup) {
                document.getElementById('dbg-pos').innerText = `${modelGroup.position.x.toFixed(2)}, ${modelGroup.position.y.toFixed(2)}, ${modelGroup.position.z.toFixed(2)}`;
            }
            document.getElementById('dbg-vel').innerText = `0.00, ${state.velocityY.toFixed(2)}, 0.00`;
            document.getElementById('dbg-bounces').innerText = state.bounceCount;
            document.getElementById('dbg-grounded').innerText = state.isGrounded;
            document.getElementById('dbg-physics').innerText = state.physicsActive;
            document.getElementById('dbg-fps').innerText = state.fps;
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const now = performance.now();

            // FPS Calculation
            frameCount++;
            if (now >= lastFpsTime + 1000) {
                window.__3D_STATE__.fps = Math.round((frameCount * 1000) / (now - lastFpsTime));
                frameCount = 0;
                lastFpsTime = now;
            }

            if (modelGroup && window.__3D_STATE__.modelLoaded) {
                // Auto Rotation
                modelGroup.rotation.y += window.__3D_STATE__.rotationSpeed * dt;

                // Physics
                updatePhysics(dt);

                // Sync state position
                window.__3D_STATE__.positionY = modelGroup.position.y;

                if (boxHelper && window.__3D_STATE__.debugVisible) {
                    boxHelper.update();
                }
            }

            controls.update();
            updateDebugUI();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
