<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Kaleidoscope</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    pointer-events: none;
    z-index: 100;
    line-height: 1.8;
  }
  #hud span { color: #0ff; }
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    z-index: 200;
  }
  #controls {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: rgba(255,255,255,0.5);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    pointer-events: none;
    z-index: 100;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="hud">
  Speed: <span id="hud-speed">0.30</span> rad/s<br>
  Theme: <span id="hud-theme">rainbow</span><br>
  Paused: <span id="hud-paused">false</span><br>
  Bursts: <span id="hud-bursts">0</span><br>
  Mirror: <span id="hud-mirror">false</span><br>
  Foxes: <span id="hud-fox-count">0</span>
</div>

<div id="loading">Loading Fox model...</div>

<div id="controls">
  [P] Pause &nbsp; [↑↓] Speed &nbsp; [C] Color &nbsp; [Click] Burst &nbsp; [R] Reset &nbsp; [M] Mirror
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
  foxLoaded: false,
  foxCount: 0,
  rotationSpeed: 0.3,
  particleCount: 500,
  colorTheme: 'rainbow',
  isPaused: false,
  burstCount: 0,
  mirrorMode: false,
  kaleidoscopeAngle: 0,
  elapsedTime: 0
};
window.__3D_STATE__ = state;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.PointLight(0xffaa44, 1.5, 50);
warmLight.position.set(10, 10, 10);
scene.add(warmLight);

const coolLight = new THREE.PointLight(0x4488ff, 1.5, 50);
coolLight.position.set(-10, -10, -10);
scene.add(coolLight);

// Groups
const kaleidoscopeGroup = new THREE.Group();
scene.add(kaleidoscopeGroup);

// Mixers
const mixers = [];
let foxAnimations = [];

// Particle system
const particleCount = 500;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
const particleAngles = new Float32Array(particleCount);
const particleRadii = new Float32Array(particleCount);
const particleHeights = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = Math.random() * 12;

  particleAngles[i] = theta;
  particleRadii[i] = r * Math.sin(phi);
  particleHeights[i] = r * Math.cos(phi);

  particlePositions[i * 3] = particleRadii[i] * Math.cos(theta);
  particlePositions[i * 3 + 1] = particleHeights[i];
  particlePositions[i * 3 + 2] = particleRadii[i] * Math.sin(theta);
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

function getParticleColor(angle, theme) {
  const normalizedAngle = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const t = normalizedAngle / (Math.PI * 2);
  const color = new THREE.Color();

  if (theme === 'rainbow') {
    color.setHSL(t, 1.0, 0.6);
  } else if (theme === 'fire') {
    color.setHSL(0.05 * (1 - t) + 0.0 * t, 1.0, 0.3 + 0.4 * t);
  } else if (theme === 'ice') {
    color.setHSL(0.55 + 0.1 * t, 0.6 + 0.4 * (1 - t), 0.5 + 0.4 * t);
  }
  return color;
}

function updateParticleColors() {
  for (let i = 0; i < particleCount; i++) {
    const color = getParticleColor(particleAngles[i], state.colorTheme);
    particleColors[i * 3] = color.r;
    particleColors[i * 3 + 1] = color.g;
    particleColors[i * 3 + 2] = color.b;
  }
  particleGeometry.attributes.color.needsUpdate = true;
}

updateParticleColors();

const particleMaterial = new THREE.PointsMaterial({
  size: 0.15,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  transparent: true,
  depthWrite: false,
  sizeAttenuation: true
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// Burst particles tracking
const burstSystems = [];

// Load Fox
const loader = new GLTFLoader();
const FOX_URL = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Fox/glTF-Binary/Fox.glb';

loader.load(FOX_URL, (gltf) => {
  document.getElementById('loading').style.display = 'none';

  const foxModel = gltf.scene;
  foxAnimations = gltf.animations;

  // Calculate bounding box to scale to ~3 units tall
  const box = new THREE.Box3().setFromObject(foxModel);
  const size = new THREE.Vector3();
  box.getSize(size);
  const scaleFactor = 3 / size.y;
  foxModel.scale.setScalar(scaleFactor);

  // Recalculate after scaling to center
  const box2 = new THREE.Box3().setFromObject(foxModel);
  const center = new THREE.Vector3();
  box2.getCenter(center);

  const numFoxes = 6;
  const radius = 5;

  for (let i = 0; i < numFoxes; i++) {
    const angle = (i / numFoxes) * Math.PI * 2;
    const clone = foxModel.clone();

    // Position in radial pattern
    clone.position.set(
      Math.cos(angle) * radius,
      -center.y,
      Math.sin(angle) * radius
    );

    // Rotate to face outward
    clone.rotation.y = angle + Math.PI / 2;

    // Mirror every other clone
    if (i % 2 === 1) {
      clone.scale.x *= -1;
    }

    // Store original index for mirror toggling
    clone.userData.index = i;
    clone.userData.baseScaleX = clone.scale.x;

    kaleidoscopeGroup.add(clone);

    // Animation
    if (foxAnimations.length > 0) {
      const mixer = new THREE.AnimationMixer(clone);
      const action = mixer.clipAction(foxAnimations[0]);
      action.play();
      mixers.push(mixer);
    }
  }

  state.foxLoaded = true;
  state.foxCount = numFoxes;
  updateHUD();
}, undefined, (error) => {
  console.error('Error loading Fox model:', error);
  document.getElementById('loading').textContent = 'Error loading model. Check console.';
});

// HUD update
function updateHUD() {
  document.getElementById('hud-speed').textContent = state.rotationSpeed.toFixed(2);
  document.getElementById('hud-theme').textContent = state.colorTheme;
  document.getElementById('hud-paused').textContent = state.isPaused.toString();
  document.getElementById('hud-bursts').textContent = state.burstCount.toString();
  document.getElementById('hud-mirror').textContent = state.mirrorMode.toString();
  document.getElementById('hud-fox-count').textContent = state.foxCount.toString();
}

// Apply mirror mode
function applyMirrorMode() {
  kaleidoscopeGroup.children.forEach((child) => {
    const idx = child.userData.index;
    const baseScale = Math.abs(child.scale.x);
    if (state.mirrorMode) {
      child.scale.x = -baseScale;
    } else {
      // Alternating: even normal, odd mirrored
      child.scale.x = (idx % 2 === 1) ? -baseScale : baseScale;
    }
  });
}

// Keyboard events
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === 'p') {
    state.isPaused = !state.isPaused;
    mixers.forEach(mixer => {
      mixer.timeScale = state.isPaused ? 0 : 1;
    });
    updateHUD();
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    state.rotationSpeed = Math.min(2.0, state.rotationSpeed + 0.1);
    updateHUD();
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    state.rotationSpeed = Math.max(0.1, state.rotationSpeed - 0.1);
    updateHUD();
  }

  if (key === 'c') {
    const themes = ['rainbow', 'fire', 'ice'];
    const currentIdx = themes.indexOf(state.colorTheme);
    state.colorTheme = themes[(currentIdx + 1) % themes.length];
    updateParticleColors();
    updateHUD();
  }

  if (key === 'r') {
    // Reset
    state.rotationSpeed = 0.3;
    state.colorTheme = 'rainbow';
    state.isPaused = false;
    state.burstCount = 0;
    state.mirrorMode = false;
    state.kaleidoscopeAngle = 0;
    state.elapsedTime = 0;

    kaleidoscopeGroup.rotation.y = 0;
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    applyMirrorMode();
    updateParticleColors();

    mixers.forEach(mixer => {
      mixer.timeScale = 1;
    });

    // Remove burst systems
    burstSystems.forEach(bs => {
      scene.remove(bs.points);
      bs.geometry.dispose();
      bs.material.dispose();
    });
    burstSystems.length = 0;

    updateHUD();
  }

  if (key === 'm') {
    state.mirrorMode = !state.mirrorMode;
    applyMirrorMode();
    updateHUD();
  }
});

// Click burst
renderer.domElement.addEventListener('click', () => {
  state.burstCount++;

  const burstCount = 50;
  const burstGeo = new THREE.BufferGeometry();
  const burstPos = new Float32Array(burstCount * 3);
  const burstCol = new Float32Array(burstCount * 3);

  // Random center within radius 8
  const cAngle = Math.random() * Math.PI * 2;
  const cR = Math.random() * 8;
  const cx = Math.cos(cAngle) * cR;
  const cy = (Math.random() - 0.5) * 8;
  const cz = Math.sin(cAngle) * cR;

  for (let i = 0; i < burstCount; i++) {
    burstPos[i * 3] = cx + (Math.random() - 0.5) * 2;
    burstPos[i * 3 + 1] = cy + (Math.random() - 0.5) * 2;
    burstPos[i * 3 + 2] = cz + (Math.random() - 0.5) * 2;

    const color = getParticleColor(Math.random() * Math.PI * 2, state.colorTheme);
    burstCol[i * 3] = color.r;
    burstCol[i * 3 + 1] = color.g;
    burstCol[i * 3 + 2] = color.b;
  }

  burstGeo.setAttribute('position', new THREE.BufferAttribute(burstPos, 3));
  burstGeo.setAttribute('color', new THREE.BufferAttribute(burstCol, 3));

  const burstMat = new THREE.PointsMaterial({
    size: 0.2,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    transparent: true,
    opacity: 1.0,
    depthWrite: false,
    sizeAttenuation: true
  });

  const burstPoints = new THREE.Points(burstGeo, burstMat);
  scene.add(burstPoints);

  burstSystems.push({
    points: burstPoints,
    geometry: burstGeo,
    material: burstMat,
    life: 2.0,
    maxLife: 2.0,
    velocities: Array.from({ length: burstCount }, () => ({
      x: (Math.random() - 0.5) * 3,
      y: (Math.random() - 0.5) * 3,
      z: (Math.random() - 0.5) * 3
    }))
  });

  updateHUD();
});

// Animation loop
const clock = new THREE.Clock();
let particleTime = 0;

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  if (!state.isPaused) {
    state.elapsedTime += delta;
    particleTime += delta;

    // Rotate kaleidoscope
    kaleidoscopeGroup.rotation.y += state.rotationSpeed * delta;
    state.kaleidoscopeAngle = kaleidoscopeGroup.rotation.y;

    // Update particle positions
    const positions = particleGeometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
      particleAngles[i] -= 0.5 * delta; // Opposite direction

      const verticalOscillation = Math.sin(particleTime * (0.5 + (i % 10) * 0.1) + i * 0.1) * 2;

      positions[i * 3] = particleRadii[i] * Math.cos(particleAngles[i]);
      positions[i * 3 + 1] = particleHeights[i] + verticalOscillation;
      positions[i * 3 + 2] = particleRadii[i] * Math.sin(particleAngles[i]);
    }
    particleGeometry.attributes.position.needsUpdate = true;

    // Update mixers
    mixers.forEach(mixer => mixer.update(delta));
  }

  // Update burst particles (always update even when paused so they fade)
  for (let i = burstSystems.length - 1; i >= 0; i--) {
    const bs = burstSystems[i];
    bs.life -= delta;

    if (bs.life <= 0) {
      scene.remove(bs.points);
      bs.geometry.dispose();
      bs.material.dispose();
      burstSystems.splice(i, 1);
      continue;
    }

    bs.material.opacity = bs.life / bs.maxLife;

    // Move burst particles outward
    const bPositions = bs.geometry.attributes.position.array;
    const count = bPositions.length / 3;
    for (let j = 0; j < count; j++) {
      bPositions[j * 3] += bs.velocities[j].x * delta;
      bPositions[j * 3 + 1] += bs.velocities[j].y * delta;
      bPositions[j * 3 + 2] += bs.velocities[j].z * delta;
    }
    bs.geometry.attributes.position.needsUpdate = true;
  }

  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

updateHUD();
</script>
</body>
</html>
