<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Fox Kaleidoscope</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: monospace;
            color: #ffffff;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #444;
            border-radius: 5px;
            pointer-events: none;
            line-height: 1.5;
        }
        .hud-item {
            margin-bottom: 5px;
        }
        .key {
            color: #ffaa00;
            font-weight: bold;
        }
        #controls-help {
            margin-top: 15px;
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="hud">
        <div class="hud-item">Speed: <span id="hud-speed">0.3</span> rad/s</div>
        <div class="hud-item">Theme: <span id="hud-theme">rainbow</span></div>
        <div class="hud-item">Paused: <span id="hud-paused">false</span></div>
        <div class="hud-item">Bursts: <span id="hud-bursts">0</span></div>
        <div class="hud-item">Mirror: <span id="hud-mirror">false</span></div>
        <div class="hud-item">Foxes: <span id="hud-fox-count">0</span></div>
        
        <div id="controls-help">
            <span class="key">P</span>: Pause/Resume<br>
            <span class="key">↑/↓</span>: Speed +/-<br>
            <span class="key">C</span>: Cycle Theme<br>
            <span class="key">M</span>: Toggle Mirror<br>
            <span class="key">R</span>: Reset<br>
            <span class="key">Click</span>: Particle Burst
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            foxLoaded: false,
            foxCount: 6,
            rotationSpeed: 0.3,
            particleCount: 500,
            colorTheme: 'rainbow',
            isPaused: false,
            burstCount: 0,
            mirrorMode: false,
            kaleidoscopeAngle: 0,
            elapsedTime: 0
        };

        const state = window.__3D_STATE__;

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const warmLight = new THREE.PointLight(0xffaa00, 1000, 100);
        warmLight.position.set(10, 10, 10);
        scene.add(warmLight);

        const coolLight = new THREE.PointLight(0x00aaff, 1000, 100);
        coolLight.position.set(-10, -10, -10);
        scene.add(coolLight);

        // Groups
        const foxGroup = new THREE.Group();
        scene.add(foxGroup);

        const particleGroup = new THREE.Group();
        scene.add(particleGroup);

        // --- FOX LOADING & KALEIDOSCOPE ---
        const mixers = [];
        const foxClones = [];
        let baseFoxScale = 1;

        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb', (gltf) => {
            const model = gltf.scene;
            
            // Calculate scale to make it roughly 3 units tall
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            baseFoxScale = 3 / size.y;
            model.scale.setScalar(baseFoxScale);

            const animation = gltf.animations[0];

            for (let i = 0; i < state.foxCount; i++) {
                const clone = SkeletonUtils.clone(model);
                
                // Radial placement
                const angle = (i / state.foxCount) * Math.PI * 2;
                const radius = 5;
                clone.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
                
                // Face outward
                clone.lookAt(0, 0, 0);
                clone.rotateY(Math.PI);

                // Mirroring
                if (!state.mirrorMode && i % 2 !== 0) {
                    clone.scale.x = -baseFoxScale;
                }

                foxGroup.add(clone);
                foxClones.push(clone);

                // Animation
                if (animation) {
                    const mixer = new THREE.AnimationMixer(clone);
                    const action = mixer.clipAction(animation);
                    action.play();
                    mixers.push(mixer);
                }
            }

            state.foxLoaded = true;
            updateHUD();
        });

        // --- PARTICLES ---
        let particleSystem;
        const initialYs = new Float32Array(state.particleCount);
        const freqs = new Float32Array(state.particleCount);

        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(state.particleCount * 3);
            const colors = new Float32Array(state.particleCount * 3);

            for (let i = 0; i < state.particleCount; i++) {
                // Random point in sphere radius 12
                const r = 12 * Math.cbrt(Math.random());
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2 * Math.random() - 1);

                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                initialYs[i] = y;
                freqs[i] = 0.5 + Math.random() * 2.0; // Random frequency for oscillation
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, material);
            particleGroup.add(particleSystem);
            
            updateParticleColors();
        }

        function updateParticleColors() {
            if (!particleSystem) return;
            const colors = particleSystem.geometry.attributes.color.array;
            const positions = particleSystem.geometry.attributes.position.array;
            const color = new THREE.Color();

            for (let i = 0; i < state.particleCount; i++) {
                const x = positions[i * 3];
                const z = positions[i * 3 + 2];
                const angle = Math.atan2(z, x);

                if (state.colorTheme === 'rainbow') {
                    color.setHSL((angle + Math.PI) / (Math.PI * 2), 1.0, 0.5);
                } else if (state.colorTheme === 'fire') {
                    color.setRGB(1.0, Math.random() * 0.6, 0.0);
                } else if (state.colorTheme === 'ice') {
                    color.setRGB(Math.random() * 0.2, 0.5 + Math.random() * 0.5, 1.0);
                }

                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }
            particleSystem.geometry.attributes.color.needsUpdate = true;
        }

        createParticles();

        // --- BURST PARTICLES ---
        const bursts = [];

        function createBurst() {
            const burstCount = 50;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(burstCount * 3);
            const colors = new Float32Array(burstCount * 3);
            
            // Random center within radius 8
            const rCenter = Math.random() * 8;
            const thetaCenter = Math.random() * 2 * Math.PI;
            const cx = rCenter * Math.cos(thetaCenter);
            const cy = (Math.random() - 0.5) * 8;
            const cz = rCenter * Math.sin(thetaCenter);

            const color = new THREE.Color();
            if (state.colorTheme === 'rainbow') color.setHSL(Math.random(), 1, 0.5);
            else if (state.colorTheme === 'fire') color.setRGB(1, 0.5, 0);
            else color.setRGB(0.5, 0.8, 1);

            for (let i = 0; i < burstCount; i++) {
                // Small sphere around center
                const r = Math.random() * 2;
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i * 3] = cx + r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = cy + r * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = cz + r * Math.cos(phi);

                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.2,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 1,
                depthWrite: false
            });

            const points = new THREE.Points(geometry, material);
            scene.add(points);
            
            bursts.push({ points, age: 0 });
            state.burstCount++;
            updateHUD();
        }

        // --- INTERACTIONS ---
        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'p':
                case 'P':
                    state.isPaused = !state.isPaused;
                    break;
                case 'ArrowUp':
                    state.rotationSpeed = Math.min(2.0, state.rotationSpeed + 0.1);
                    break;
                case 'ArrowDown':
                    state.rotationSpeed = Math.max(0.1, state.rotationSpeed - 0.1);
                    break;
                case 'c':
                case 'C':
                    const themes = ['rainbow', 'fire', 'ice'];
                    const idx = themes.indexOf(state.colorTheme);
                    state.colorTheme = themes[(idx + 1) % themes.length];
                    updateParticleColors();
                    break;
                case 'm':
                case 'M':
                    state.mirrorMode = !state.mirrorMode;
                    updateMirrors();
                    break;
                case 'r':
                case 'R':
                    resetState();
                    break;
            }
            updateHUD();
        });

        window.addEventListener('click', () => {
            createBurst();
        });

        function updateMirrors() {
            foxClones.forEach((clone, i) => {
                if (state.mirrorMode) {
                    clone.scale.x = -baseFoxScale;
                } else {
                    clone.scale.x = (i % 2 === 0) ? baseFoxScale : -baseFoxScale;
                }
            });
        }

        function resetState() {
            state.rotationSpeed = 0.3;
            state.colorTheme = 'rainbow';
            state.isPaused = false;
            state.mirrorMode = false;
            
            camera.position.set(0, 5, 15);
            camera.lookAt(0, 0, 0);
            
            updateParticleColors();
            updateMirrors();
            updateHUD();
        }

        // --- HUD UPDATE ---
        const elSpeed = document.getElementById('hud-speed');
        const elTheme = document.getElementById('hud-theme');
        const elPaused = document.getElementById('hud-paused');
        const elBursts = document.getElementById('hud-bursts');
        const elMirror = document.getElementById('hud-mirror');
        const elFoxCount = document.getElementById('hud-fox-count');

        function updateHUD() {
            elSpeed.textContent = state.rotationSpeed.toFixed(1);
            elTheme.textContent = state.colorTheme;
            elPaused.textContent = state.isPaused;
            elBursts.textContent = state.burstCount;
            elMirror.textContent = state.mirrorMode;
            elFoxCount.textContent = state.foxLoaded ? state.foxCount : 0;
        }

        // --- RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            
            if (!state.isPaused) {
                state.elapsedTime += delta;
                
                // Rotations
                const rotStep = state.rotationSpeed * delta;
                foxGroup.rotation.y += rotStep;
                state.kaleidoscopeAngle = foxGroup.rotation.y;
                
                particleGroup.rotation.y -= 0.5 * delta;

                // Particle Oscillation
                if (particleSystem) {
                    const positions = particleSystem.geometry.attributes.position.array;
                    for (let i = 0; i < state.particleCount; i++) {
                        positions[i * 3 + 1] = initialYs[i] + Math.sin(state.elapsedTime * freqs[i]) * 2;
                    }
                    particleSystem.geometry.attributes.position.needsUpdate = true;
                }

                // Fox Animations
                mixers.forEach(mixer => mixer.update(delta));
            }

            // Burst Updates (always update so they fade even if paused, or tie to pause? Let's tie to pause for consistency)
            if (!state.isPaused) {
                for (let i = bursts.length - 1; i >= 0; i--) {
                    const burst = bursts[i];
                    burst.age += delta;
                    
                    if (burst.age >= 2.0) {
                        scene.remove(burst.points);
                        burst.points.geometry.dispose();
                        burst.points.material.dispose();
                        bursts.splice(i, 1);
                    } else {
                        burst.points.material.opacity = 1.0 - (burst.age / 2.0);
                        // Expand slightly
                        const scale = 1.0 + burst.age * 0.5;
                        burst.points.scale.setScalar(scale);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        updateHUD();
        animate();

    </script>
</body>
</html>
