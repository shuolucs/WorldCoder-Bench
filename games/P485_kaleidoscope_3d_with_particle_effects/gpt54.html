<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Fox Kaleidoscope</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      user-select: none;
      backdrop-filter: blur(4px);
    }

    #hud strong {
      color: #9fe7ff;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      padding: 8px 10px;
      background: rgba(0,0,0,0.35);
      color: rgba(255,255,255,0.85);
      border-radius: 8px;
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Speed: <strong id="hud-speed">0.3</strong></div>
    <div>Theme: <strong id="hud-theme">rainbow</strong></div>
    <div>Paused: <strong id="hud-paused">false</strong></div>
    <div>Bursts: <strong id="hud-bursts">0</strong></div>
    <div>Mirror: <strong id="hud-mirror">alternating</strong></div>
    <div>Fox Count: <strong id="hud-fox-count">6</strong></div>
  </div>

  <div id="help">
    P pause | ↑/↓ speed | C theme | Click burst | R reset | M mirror
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#000000');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const warmLight = new THREE.PointLight(0xffb26b, 2.2, 100);
    warmLight.position.set(10, 10, 10);
    scene.add(warmLight);

    const coolLight = new THREE.PointLight(0x66aaff, 2.2, 100);
    coolLight.position.set(-10, -10, -10);
    scene.add(coolLight);

    // Groups
    const kaleidoscopeGroup = new THREE.Group();
    scene.add(kaleidoscopeGroup);

    const particlesGroup = new THREE.Group();
    scene.add(particlesGroup);

    // State
    const INITIAL_CAMERA_POS = new THREE.Vector3(0, 5, 15);
    const INITIAL_ROTATION_SPEED = 0.3;
    const BASE_PARTICLE_COUNT = 500;
    const FOX_COUNT = 6;
    const THEMES = ['rainbow', 'fire', 'ice'];

    let rotationSpeed = INITIAL_ROTATION_SPEED;
    let currentTheme = 'rainbow';
    let isPaused = false;
    let burstCount = 0;
    let mirrorMode = false;
    let elapsedTime = 0;
    let kaleidoscopeAngle = 0;

    let foxLoaded = false;
    let foxRoot = null;
    let foxAnimations = [];
    let foxMixers = [];
    let foxInstances = [];

    // Exposed state
    window.__3D_STATE__ = {
      foxLoaded: false,
      foxCount: FOX_COUNT,
      rotationSpeed,
      particleCount: BASE_PARTICLE_COUNT,
      colorTheme: currentTheme,
      isPaused,
      burstCount,
      mirrorMode,
      kaleidoscopeAngle,
      elapsedTime
    };

    // HUD refs
    const hudSpeed = document.getElementById('hud-speed');
    const hudTheme = document.getElementById('hud-theme');
    const hudPaused = document.getElementById('hud-paused');
    const hudBursts = document.getElementById('hud-bursts');
    const hudMirror = document.getElementById('hud-mirror');
    const hudFoxCount = document.getElementById('hud-fox-count');

    function updateHUD() {
      hudSpeed.textContent = rotationSpeed.toFixed(1);
      hudTheme.textContent = currentTheme;
      hudPaused.textContent = String(isPaused);
      hudBursts.textContent = String(burstCount);
      hudMirror.textContent = mirrorMode ? 'all mirrored' : 'alternating';
      hudFoxCount.textContent = String(FOX_COUNT);

      window.__3D_STATE__.foxLoaded = foxLoaded;
      window.__3D_STATE__.foxCount = FOX_COUNT;
      window.__3D_STATE__.rotationSpeed = rotationSpeed;
      window.__3D_STATE__.particleCount = BASE_PARTICLE_COUNT;
      window.__3D_STATE__.colorTheme = currentTheme;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.burstCount = burstCount;
      window.__3D_STATE__.mirrorMode = mirrorMode;
      window.__3D_STATE__.kaleidoscopeAngle = kaleidoscopeAngle;
      window.__3D_STATE__.elapsedTime = elapsedTime;
    }

    // Base particles
    const particlePositionsBase = new Float32Array(BASE_PARTICLE_COUNT * 3);
    const particleColors = new Float32Array(BASE_PARTICLE_COUNT * 3);
    const particleMeta = [];

    function randomPointInSphere(radius) {
      const u = Math.random();
      const v = Math.random();
      const theta = u * Math.PI * 2;
      const phi = Math.acos(2 * v - 1);
      const r = radius * Math.cbrt(Math.random());

      return new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta)
      );
    }

    function themeColor(theme, angleNorm, yNorm = 0.5) {
      const color = new THREE.Color();

      if (theme === 'rainbow') {
        color.setHSL(angleNorm, 1.0, 0.6);
      } else if (theme === 'fire') {
        const hue = 0.02 + 0.10 * angleNorm; // red to orange/yellow
        const lightness = 0.45 + 0.2 * yNorm;
        color.setHSL(hue, 1.0, lightness);
      } else if (theme === 'ice') {
        const hue = 0.52 + 0.08 * angleNorm; // cyan to blue
        const sat = 0.55 - 0.2 * yNorm;
        const lightness = 0.65 + 0.25 * yNorm;
        color.setHSL(hue, Math.max(0.15, sat), Math.min(0.92, lightness));
      }

      return color;
    }

    for (let i = 0; i < BASE_PARTICLE_COUNT; i++) {
      const p = randomPointInSphere(12);
      particlePositionsBase[i * 3 + 0] = p.x;
      particlePositionsBase[i * 3 + 1] = p.y;
      particlePositionsBase[i * 3 + 2] = p.z;

      particleMeta.push({
        radiusXZ: Math.sqrt(p.x * p.x + p.z * p.z),
        angle: Math.atan2(p.z, p.x),
        baseY: p.y,
        freq: 0.8 + (i % 25) * 0.08
      });
    }

    const particleGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particlePositionsBase.length);
    particlePositions.set(particlePositionsBase);

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.15,
      vertexColors: true,
      transparent: true,
      opacity: 0.95,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
    particlesGroup.add(particleSystem);

    function updateParticleColors(theme) {
      const colorsAttr = particleGeometry.attributes.color;
      for (let i = 0; i < BASE_PARTICLE_COUNT; i++) {
        const x = particlePositionsBase[i * 3 + 0];
        const y = particlePositionsBase[i * 3 + 1];
        const z = particlePositionsBase[i * 3 + 2];
        const angle = Math.atan2(z, x);
        const angleNorm = (angle + Math.PI) / (Math.PI * 2);
        const yNorm = THREE.MathUtils.clamp((y + 12) / 24, 0, 1);
        const c = themeColor(theme, angleNorm, yNorm);

        particleColors[i * 3 + 0] = c.r;
        particleColors[i * 3 + 1] = c.g;
        particleColors[i * 3 + 2] = c.b;
      }
      colorsAttr.needsUpdate = true;
    }

    updateParticleColors(currentTheme);

    // Burst particles
    const burstParticles = [];

    function createBurst(at) {
      const count = 50;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const velocities = [];

      for (let i = 0; i < count; i++) {
        positions[i * 3 + 0] = at.x;
        positions[i * 3 + 1] = at.y;
        positions[i * 3 + 2] = at.z;

        const dir = new THREE.Vector3(
          Math.random() * 2 - 1,
          Math.random() * 2 - 1,
          Math.random() * 2 - 1
        ).normalize();

        const speed = 1.5 + Math.random() * 4.0;
        velocities.push(dir.multiplyScalar(speed));

        const angleNorm = i / count;
        const c = themeColor(currentTheme, angleNorm, 0.7);
        colors[i * 3 + 0] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const material = new THREE.PointsMaterial({
        size: 0.18,
        vertexColors: true,
        transparent: true,
        opacity: 1,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      const points = new THREE.Points(geometry, material);
      scene.add(points);

      burstParticles.push({
        points,
        geometry,
        material,
        velocities,
        age: 0,
        life: 2
      });

      burstCount++;
      updateHUD();
    }

    function randomBurstPosition(radius = 8) {
      return randomPointInSphere(radius);
    }

    renderer.domElement.addEventListener('click', () => {
      createBurst(randomBurstPosition(8));
    });

    // Load fox
    const loader = new GLTFLoader();
    loader.load(
      'https://rawcdn.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb',
      (gltf) => {
        foxRoot = gltf.scene;
        foxAnimations = gltf.animations || [];

        // normalize size to ~3 units tall
        const box = new THREE.Box3().setFromObject(foxRoot);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const targetHeight = 3;
        const scaleFactor = targetHeight / Math.max(size.y, 0.0001);
        foxRoot.scale.setScalar(scaleFactor);

        // recompute after scale
        const scaledBox = new THREE.Box3().setFromObject(foxRoot);
        const scaledCenter = new THREE.Vector3();
        const scaledSize = new THREE.Vector3();
        scaledBox.getCenter(scaledCenter);
        scaledBox.getSize(scaledSize);

        foxRoot.position.sub(scaledCenter);
        foxRoot.position.y += scaledSize.y / 2;

        for (let i = 0; i < FOX_COUNT; i++) {
          const foxInstance = foxRoot.clone(true);
          const holder = new THREE.Group();

          const angle = i * (Math.PI / 3);
          const radius = 5;

          if (i === 0) {
            holder.position.set(0, 0, 0);
          } else {
            holder.position.set(
              Math.cos(angle) * radius,
              0,
              Math.sin(angle) * radius
            );
          }

          const faceAngle = Math.atan2(holder.position.x, holder.position.z);
          if (i === 0) {
            holder.rotation.y = 0;
          } else {
            holder.rotation.y = angle + Math.PI / 2;
          }

          holder.add(foxInstance);
          kaleidoscopeGroup.add(holder);
          foxInstances.push({ holder, model: foxInstance, index: i });

          const mixer = new THREE.AnimationMixer(foxInstance);
          if (foxAnimations.length > 0) {
            const action = mixer.clipAction(foxAnimations[0]);
            action.play();
          }
          foxMixers.push(mixer);
        }

        applyMirrorMode();
        foxLoaded = true;
        updateHUD();
      },
      undefined,
      (err) => {
        console.error('Failed to load Fox.glb:', err);
      }
    );

    function applyMirrorMode() {
      for (const fox of foxInstances) {
        const currentY = Math.abs(fox.model.scale.y) || 1;
        const currentZ = Math.abs(fox.model.scale.z) || 1;
        if (mirrorMode) {
          fox.model.scale.x = -Math.abs(fox.model.scale.x);
        } else {
          fox.model.scale.x = (fox.index % 2 === 1) ? -Math.abs(fox.model.scale.x) : Math.abs(fox.model.scale.x);
        }
        fox.model.scale.y = currentY;
        fox.model.scale.z = currentZ;
      }
      updateHUD();
    }

    function cycleTheme() {
      const idx = THEMES.indexOf(currentTheme);
      currentTheme = THEMES[(idx + 1) % THEMES.length];
      updateParticleColors(currentTheme);

      // update existing burst particle colors too
      for (const burst of burstParticles) {
        const colors = burst.geometry.attributes.color.array;
        const count = colors.length / 3;
        for (let i = 0; i < count; i++) {
          const c = themeColor(currentTheme, i / count, 0.7);
          colors[i * 3 + 0] = c.r;
          colors[i * 3 + 1] = c.g;
          colors[i * 3 + 2] = c.b;
        }
        burst.geometry.attributes.color.needsUpdate = true;
      }

      updateHUD();
    }

    function resetSceneState() {
      rotationSpeed = INITIAL_ROTATION_SPEED;
      currentTheme = 'rainbow';
      isPaused = false;
      mirrorMode = false;
      burstCount = 0;
      elapsedTime = 0;
      kaleidoscopeAngle = 0;

      camera.position.copy(INITIAL_CAMERA_POS);
      camera.lookAt(0, 0, 0);

      kaleidoscopeGroup.rotation.set(0, 0, 0);
      particlesGroup.rotation.set(0, 0, 0);

      updateParticleColors(currentTheme);
      applyMirrorMode();

      for (const mixer of foxMixers) {
        mixer.timeScale = 1;
        if (foxAnimations.length > 0) {
          const action = mixer.clipAction(foxAnimations[0]);
          action.reset();
          action.play();
        }
      }

      for (const burst of burstParticles) {
        scene.remove(burst.points);
        burst.geometry.dispose();
        burst.material.dispose();
      }
      burstParticles.length = 0;

      updateHUD();
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'p' || e.key === 'P') {
        isPaused = !isPaused;
        for (const mixer of foxMixers) {
          mixer.timeScale = isPaused ? 0 : 1;
        }
        updateHUD();
      } else if (e.key === 'ArrowUp') {
        rotationSpeed = THREE.MathUtils.clamp(rotationSpeed + 0.1, 0.1, 2.0);
        updateHUD();
      } else if (e.key === 'ArrowDown') {
        rotationSpeed = THREE.MathUtils.clamp(rotationSpeed - 0.1, 0.1, 2.0);
        updateHUD();
      } else if (e.key === 'c' || e.key === 'C') {
        cycleTheme();
      } else if (e.key === 'r' || e.key === 'R') {
        resetSceneState();
      } else if (e.key === 'm' || e.key === 'M') {
        mirrorMode = !mirrorMode;
        applyMirrorMode();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();

      if (!isPaused) {
        elapsedTime += dt;
        kaleidoscopeAngle += rotationSpeed * dt;
        kaleidoscopeGroup.rotation.y = kaleidoscopeAngle;

        particlesGroup.rotation.y -= 0.5 * dt;

        const posAttr = particleGeometry.attributes.position;
        const arr = posAttr.array;

        for (let i = 0; i < BASE_PARTICLE_COUNT; i++) {
          const meta = particleMeta[i];
          const a = meta.angle - elapsedTime * 0.5;
          const x = Math.cos(a) * meta.radiusXZ;
          const z = Math.sin(a) * meta.radiusXZ;
          const y = meta.baseY + Math.sin(elapsedTime * meta.freq + i * 0.15) * 2.0;

          arr[i * 3 + 0] = x;
          arr[i * 3 + 1] = y;
          arr[i * 3 + 2] = z;
        }
        posAttr.needsUpdate = true;

        for (const mixer of foxMixers) {
          mixer.update(dt);
        }

        for (let i = burstParticles.length - 1; i >= 0; i--) {
          const burst = burstParticles[i];
          burst.age += dt;

          const t = burst.age / burst.life;
          burst.material.opacity = Math.max(0, 1 - t);

          const positions = burst.geometry.attributes.position.array;
          for (let j = 0; j < burst.velocities.length; j++) {
            const v = burst.velocities[j];
            positions[j * 3 + 0] += v.x * dt;
            positions[j * 3 + 1] += v.y * dt;
            positions[j * 3 + 2] += v.z * dt;
          }
          burst.geometry.attributes.position.needsUpdate = true;

          if (burst.age >= burst.life) {
            scene.remove(burst.points);
            burst.geometry.dispose();
            burst.material.dispose();
            burstParticles.splice(i, 1);
          }
        }
      }

      updateHUD();
      renderer.render(scene, camera);
    }

    updateHUD();
    animate();
  </script>
</body>
</html>
