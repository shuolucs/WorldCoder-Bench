<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Weather Radar Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid #00ff44;
            border-radius: 8px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 68, 0.2);
            z-index: 10;
        }
        button {
            background: #003300;
            color: #00ff44;
            border: 1px solid #00ff44;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: #00ff44;
            color: #0a0a1a;
        }
        input[type=range] {
            accent-color: #00ff44;
            width: 150px;
        }
        #timeLabel {
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }
        #legendPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid #00ff44;
            border-radius: 8px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .color-box {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 26, 0.6);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="instructions">
        Controls:<br>
        Left Click + Drag: Rotate<br>
        Right Click + Drag: Pan<br>
        Scroll: Zoom<br><br>
        Keyboard:<br>
        [R] Reset Camera<br>
        [L] Toggle Legend<br>
        [G] Toggle Grid
    </div>

    <div id="legendPanel">
        <div style="font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 5px;">Precipitation</div>
        <div class="legend-item"><div class="color-box" style="background: #ff0000;"></div> Heavy (High)</div>
        <div class="legend-item"><div class="color-box" style="background: #ffff00;"></div> Moderate (Med)</div>
        <div class="legend-item"><div class="color-box" style="background: #0044ff;"></div> Light (Low)</div>
    </div>

    <div id="ui-panel">
        <button id="prevBtn">Prev</button>
        <button id="playPauseBtn">Play</button>
        <button id="nextBtn">Next</button>
        <input type="range" id="timeSlider" min="0" max="5" step="1" value="0">
        <span id="timeLabel">Time: 0</span>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentTimeStep: 0,
            isPlaying: false,
            particleCount: 200,
            radarSweepAngle: 0,
            cameraPosition: { x: 0, y: 60, z: 80 },
            gridVisible: true,
            legendVisible: false,
            modelLoaded: false,
            stormCenterX: -20,
            stormCenterZ: -20
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 60, 80);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 50, 10);
        scene.add(directionalLight);

        // --- Environment ---
        // Grid
        const gridGeometry = new THREE.PlaneGeometry(100, 100, 50, 50);
        const gridMaterial = new THREE.MeshBasicMaterial({
            color: 0x003300,
            transparent: true,
            opacity: 0.4,
            wireframe: true
        });
        const gridPlane = new THREE.Mesh(gridGeometry, gridMaterial);
        gridPlane.rotation.x = -Math.PI / 2;
        scene.add(gridPlane);

        // Concentric Rings
        const ringRadii = [10, 25, 40, 55];
        const ringMaterial = new THREE.LineBasicMaterial({ color: 0x00ff44, transparent: true, opacity: 0.6 });
        ringRadii.forEach(radius => {
            const points = [];
            for (let i = 0; i <= 64; i++) {
                const theta = (i / 64) * Math.PI * 2;
                points.push(new THREE.Vector3(Math.cos(theta) * radius, 0.1, Math.sin(theta) * radius));
            }
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const ring = new THREE.LineLoop(geometry, ringMaterial);
            scene.add(ring);
        });

        // Radar Sweep Line
        const sweepGroup = new THREE.Group();
        const sweepPoints = [new THREE.Vector3(0, 0.2, 0), new THREE.Vector3(55, 0.2, 0)];
        const sweepGeometry = new THREE.BufferGeometry().setFromPoints(sweepPoints);
        const sweepMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
        const sweepLine = new THREE.Line(sweepGeometry, sweepMaterial);
        sweepGroup.add(sweepLine);
        scene.add(sweepGroup);

        // Load Model
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/facecap.glb', (gltf) => {
            const model = gltf.scene;
            model.position.set(0, -5, 0);
            model.scale.set(8, 8, 8);
            
            // Apply a dark green tint to fit the radar theme
            model.traverse((child) => {
                if (child.isMesh) {
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0x005500,
                        roughness: 0.7,
                        metalness: 0.2
                    });
                }
            });
            
            scene.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.error('Error loading model:', error);
        });

        // --- Weather Data Generation ---
        const numSteps = 6;
        const particlesPerStep = 200;
        const weatherData = [];

        for (let step = 0; step < numSteps; step++) {
            const stepData = [];
            const cx = -20 + step * 8;
            const cz = -20 + step * 8;

            for (let i = 0; i < particlesPerStep; i++) {
                let px, py, pz;
                // Generate within radius 50 of origin
                do {
                    px = cx + (Math.random() - 0.5) * 30;
                    pz = cz + (Math.random() - 0.5) * 30;
                } while (Math.sqrt(px * px + pz * pz) > 50);
                
                py = 1 + Math.random() * 24;

                const intensity = Math.random();
                const color = new THREE.Color();
                if (intensity <= 0.33) color.setHex(0x0044ff); // Blue
                else if (intensity <= 0.66) color.setHex(0xffff00); // Yellow
                else color.setHex(0xff0000); // Red

                stepData.push({
                    position: new THREE.Vector3(px, py, pz),
                    color: color
                });
            }
            weatherData.push(stepData);
        }

        // Instanced Mesh for Particles
        const particleGeometry = new THREE.SphereGeometry(0.3, 8, 8);
        const particleMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            roughness: 0.4,
            metalness: 0.1
        });
        const instancedMesh = new THREE.InstancedMesh(particleGeometry, particleMaterial, particlesPerStep);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        
        const colorArray = new Float32Array(particlesPerStep * 3);
        instancedMesh.instanceColor = new THREE.InstancedBufferAttribute(colorArray, 3);
        scene.add(instancedMesh);

        const dummy = new THREE.Object3D();

        function updateParticles(step) {
            const data = weatherData[step];
            for (let i = 0; i < particlesPerStep; i++) {
                dummy.position.copy(data[i].position);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
                instancedMesh.setColorAt(i, data[i].color);
            }
            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMesh.instanceColor.needsUpdate = true;
            
            window.__3D_STATE__.stormCenterX = -20 + step * 8;
            window.__3D_STATE__.stormCenterZ = -20 + step * 8;
        }

        // Initialize first step
        updateParticles(0);

        // --- UI & Controls Logic ---
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const timeSlider = document.getElementById('timeSlider');
        const timeLabel = document.getElementById('timeLabel');
        const legendPanel = document.getElementById('legendPanel');

        function setTimeStep(step) {
            let s = Math.max(0, Math.min(5, parseInt(step)));
            window.__3D_STATE__.currentTimeStep = s;
            timeSlider.value = s;
            timeLabel.innerText = `Time: ${s}`;
            updateParticles(s);
        }

        playPauseBtn.addEventListener('click', () => {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            playPauseBtn.innerText = window.__3D_STATE__.isPlaying ? 'Pause' : 'Play';
            if (window.__3D_STATE__.isPlaying) {
                lastAutoTime = performance.now();
            }
        });

        prevBtn.addEventListener('click', () => {
            let next = window.__3D_STATE__.currentTimeStep - 1;
            if (next < 0) next = 5;
            setTimeStep(next);
        });

        nextBtn.addEventListener('click', () => {
            let next = window.__3D_STATE__.currentTimeStep + 1;
            if (next > 5) next = 0;
            setTimeStep(next);
        });

        timeSlider.addEventListener('input', (e) => {
            setTimeStep(e.target.value);
        });

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'r':
                    camera.position.set(0, 60, 80);
                    camera.lookAt(0, 0, 0);
                    controls.target.set(0, 0, 0);
                    break;
                case 'l':
                    window.__3D_STATE__.legendVisible = !window.__3D_STATE__.legendVisible;
                    legendPanel.style.display = window.__3D_STATE__.legendVisible ? 'flex' : 'none';
                    break;
                case 'g':
                    window.__3D_STATE__.gridVisible = !window.__3D_STATE__.gridVisible;
                    gridPlane.visible = window.__3D_STATE__.gridVisible;
                    break;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let lastAutoTime = performance.now();

        function animate(currentTime) {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Radar Sweep Rotation (1 rad/sec)
            sweepGroup.rotation.y -= delta * 1.0;
            
            // Normalize angle to 0 - 2PI
            let angle = sweepGroup.rotation.y % (Math.PI * 2);
            if (angle < 0) angle += Math.PI * 2;
            window.__3D_STATE__.radarSweepAngle = angle || 0;

            // Auto Advance Time
            if (window.__3D_STATE__.isPlaying && (currentTime - lastAutoTime > 2000)) {
                let next = window.__3D_STATE__.currentTimeStep + 1;
                if (next > 5) next = 0;
                setTimeStep(next);
                lastAutoTime = currentTime;
            }

            controls.update();
            
            // Update State Camera Position
            window.__3D_STATE__.cameraPosition.x = camera.position.x || 0;
            window.__3D_STATE__.cameraPosition.y = camera.position.y || 0;
            window.__3D_STATE__.cameraPosition.z = camera.position.z || 0;

            renderer.render(scene, camera);
        }

        animate(performance.now());
    </script>
</body>
</html>
