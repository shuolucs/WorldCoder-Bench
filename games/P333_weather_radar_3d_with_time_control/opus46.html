<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Weather Radar Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #controlPanel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 26, 0.9);
    border: 1px solid rgba(0, 255, 68, 0.4);
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 255, 68, 0.15);
  }

  #controlPanel button {
    background: rgba(0, 255, 68, 0.15);
    border: 1px solid rgba(0, 255, 68, 0.5);
    color: #00ff44;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    min-width: 60px;
  }

  #controlPanel button:hover {
    background: rgba(0, 255, 68, 0.3);
    box-shadow: 0 0 10px rgba(0, 255, 68, 0.3);
  }

  #controlPanel button:active {
    transform: scale(0.95);
  }

  #timeSlider {
    width: 200px;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: rgba(0, 255, 68, 0.2);
    border-radius: 3px;
    outline: none;
  }

  #timeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #00ff44;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0, 255, 68, 0.6);
  }

  #timeSlider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #00ff44;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px rgba(0, 255, 68, 0.6);
  }

  #timeLabel {
    color: #00ff44;
    font-size: 14px;
    font-weight: 600;
    min-width: 70px;
    text-align: center;
    text-shadow: 0 0 8px rgba(0, 255, 68, 0.5);
  }

  #legendPanel {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 26, 0.92);
    border: 1px solid rgba(0, 255, 68, 0.4);
    border-radius: 10px;
    padding: 16px 20px;
    z-index: 100;
    display: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 255, 68, 0.15);
  }

  #legendPanel h3 {
    color: #00ff44;
    margin-bottom: 12px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    color: #ccc;
    font-size: 13px;
  }

  .legend-color {
    width: 24px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  #infoPanel {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(0, 255, 68, 0.7);
    font-size: 12px;
    z-index: 100;
    line-height: 1.8;
  }

  #infoPanel kbd {
    background: rgba(0, 255, 68, 0.15);
    border: 1px solid rgba(0, 255, 68, 0.3);
    border-radius: 3px;
    padding: 1px 6px;
    font-family: monospace;
    font-size: 11px;
  }
</style>
</head>
<body>

<div id="infoPanel">
  <kbd>R</kbd> Reset Camera &nbsp; <kbd>L</kbd> Toggle Legend &nbsp; <kbd>G</kbd> Toggle Grid
</div>

<div id="legendPanel">
  <h3>Precipitation Intensity</h3>
  <div class="legend-item">
    <div class="legend-color" style="background: #0044ff;"></div>
    <span>Light (0.0 - 0.33)</span>
  </div>
  <div class="legend-item">
    <div class="legend-color" style="background: #ffff00;"></div>
    <span>Moderate (0.34 - 0.66)</span>
  </div>
  <div class="legend-item">
    <div class="legend-color" style="background: #ff0000;"></div>
    <span>Heavy (0.67 - 1.0)</span>
  </div>
</div>

<div id="controlPanel">
  <button id="prevBtn">◀ Prev</button>
  <button id="playPauseBtn">▶ Play</button>
  <button id="nextBtn">Next ▶</button>
  <input type="range" id="timeSlider" min="0" max="5" step="1" value="0">
  <span id="timeLabel">Time: 0</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
window.__3D_STATE__ = {
  currentTimeStep: 0,
  isPlaying: false,
  particleCount: 0,
  radarSweepAngle: 0,
  cameraPosition: { x: 0, y: 60, z: 80 },
  gridVisible: true,
  legendVisible: false,
  modelLoaded: false,
  stormCenterX: -20,
  stormCenterZ: -20
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.005);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 60, 80);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 5, 0);
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 50, 10);
dirLight.castShadow = true;
scene.add(dirLight);

// --- Load GLTF Model ---
const gltfLoader = new GLTFLoader();
gltfLoader.load(
  'https://cdn.jsdelivr.net/npm/three@0.157.0/examples/models/gltf/facecap.glb',
  (gltf) => {
    const model = gltf.scene;
    model.position.set(0, -5, 0);
    model.scale.set(8, 8, 8);
    model.traverse((child) => {
      if (child.isMesh) {
        child.material = new THREE.MeshStandardMaterial({
          color: 0x224422,
          metalness: 0.3,
          roughness: 0.7,
          transparent: true,
          opacity: 0.6
        });
      }
    });
    scene.add(model);
    window.__3D_STATE__.modelLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Model load failed:', error);
    // Add a placeholder
    const geo = new THREE.ConeGeometry(4, 8, 6);
    const mat = new THREE.MeshStandardMaterial({ color: 0x224422, transparent: true, opacity: 0.6 });
    const placeholder = new THREE.Mesh(geo, mat);
    placeholder.position.set(0, -1, 0);
    scene.add(placeholder);
    window.__3D_STATE__.modelLoaded = true;
  }
);

// --- Ground Grid Plane ---
const gridGeometry = new THREE.PlaneGeometry(100, 100, 50, 50);
const gridMaterial = new THREE.MeshStandardMaterial({
  color: 0x003300,
  transparent: true,
  opacity: 0.4,
  side: THREE.DoubleSide,
  wireframe: false
});
const gridPlane = new THREE.Mesh(gridGeometry, gridMaterial);
gridPlane.rotation.x = -Math.PI / 2;
gridPlane.position.y = 0;
gridPlane.receiveShadow = true;
scene.add(gridPlane);

// Grid wireframe overlay
const gridHelper = new THREE.GridHelper(100, 50, 0x004400, 0x002200);
gridHelper.position.y = 0.05;
scene.add(gridHelper);

const gridGroup = new THREE.Group();
gridGroup.add(gridPlane);
gridGroup.add(gridHelper);
scene.add(gridGroup);
// Actually we added them to scene already, let's manage visibility differently
const gridObjects = [gridPlane, gridHelper];

// --- Radar Range Rings ---
const ringRadii = [10, 25, 40, 55];
const ringGroup = new THREE.Group();
ringRadii.forEach(radius => {
  const segments = 128;
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2;
    points.push(new THREE.Vector3(Math.cos(angle) * radius, 0.1, Math.sin(angle) * radius));
  }
  const ringGeo = new THREE.BufferGeometry().setFromPoints(points);
  const ringMat = new THREE.LineBasicMaterial({ color: 0x00ff44, transparent: true, opacity: 0.5 });
  const ring = new THREE.LineLoop(ringGeo, ringMat);
  ringGroup.add(ring);

  // Add radius label
});
scene.add(ringGroup);

// --- Radar Sweep Line ---
const sweepGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0, 0.2, 0),
  new THREE.Vector3(55, 0.2, 0)
]);
const sweepMat = new THREE.LineBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 });
const sweepLine = new THREE.Line(sweepGeo, sweepMat);
scene.add(sweepLine);

// Sweep trail (fading effect)
const sweepTrailGeo = new THREE.BufferGeometry();
const trailPoints = [];
const trailSegments = 30;
for (let i = 0; i < trailSegments; i++) {
  trailPoints.push(new THREE.Vector3(0, 0.15, 0));
  const r = 55;
  trailPoints.push(new THREE.Vector3(r, 0.15, 0));
}
sweepTrailGeo.setFromPoints(trailPoints);
const trailColors = new Float32Array(trailSegments * 2 * 3);
sweepTrailGeo.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
const sweepTrailMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.3 });
const sweepTrail = new THREE.LineSegments(sweepTrailGeo, sweepTrailMat);
scene.add(sweepTrail);

// --- Weather Data Generation ---
const stormCenters = [
  { x: -20, z: -20 },
  { x: -12, z: -12 },
  { x: -4, z: -4 },
  { x: 4, z: 4 },
  { x: 12, z: 12 },
  { x: 20, z: 20 }
];

function getParticleColor(intensity) {
  if (intensity <= 0.33) return new THREE.Color(0x0044ff);
  if (intensity <= 0.66) return new THREE.Color(0xffff00);
  return new THREE.Color(0xff0000);
}

// Pre-generate weather data for each time step
const timeStepData = [];
for (let t = 0; t < 6; t++) {
  const particles = [];
  const center = stormCenters[t];
  for (let i = 0; i < 200; i++) {
    // Gaussian-ish distribution around center
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 20 + Math.random() * 10;
    const x = center.x + Math.cos(angle) * dist;
    const z = center.z + Math.sin(angle) * dist;

    // Clamp within radius 50
    const r = Math.sqrt(x * x + z * z);
    const clampedX = r > 50 ? x * (50 / r) : x;
    const clampedZ = r > 50 ? z * (50 / r) : z;

    const y = 1 + Math.random() * 24;

    // Intensity based on distance from center (closer = more intense)
    const distFromCenter = Math.sqrt((clampedX - center.x) ** 2 + (clampedZ - center.z) ** 2);
    const intensity = Math.max(0, Math.min(1, 1 - distFromCenter / 25 + Math.random() * 0.3));

    particles.push({
      x: clampedX,
      y: y,
      z: clampedZ,
      intensity: intensity
    });
  }
  timeStepData.push(particles);
}

// --- Create Particle Meshes using InstancedMesh ---
const particleGeometry = new THREE.SphereGeometry(0.3, 8, 6);
const particleMaterial = new THREE.MeshStandardMaterial({
  transparent: true,
  opacity: 0.85,
  emissiveIntensity: 0.5
});

// We'll use individual meshes grouped for simplicity with color per particle
const particleGroups = [];
const dummy = new THREE.Object3D();

for (let t = 0; t < 6; t++) {
  const group = new THREE.Group();
  const data = timeStepData[t];

  for (let i = 0; i < data.length; i++) {
    const p = data[i];
    const color = getParticleColor(p.intensity);
    const mat = new THREE.MeshStandardMaterial({
      color: color,
      emissive: color,
      emissiveIntensity: 0.4,
      transparent: true,
      opacity: 0.8
    });
    const mesh = new THREE.Mesh(particleGeometry, mat);
    mesh.position.set(p.x, p.y, p.z);
    mesh.scale.setScalar(0.5 + p.intensity * 1.0);
    group.add(mesh);
  }

  group.visible = (t === 0);
  scene.add(group);
  particleGroups.push(group);
}

// --- Glow columns for high intensity areas ---
for (let t = 0; t < 6; t++) {
  const center = stormCenters[t];
  // Add a volumetric column glow at storm center
  const columnGeo = new THREE.CylinderGeometry(3, 5, 25, 16, 1, true);
  const columnMat = new THREE.MeshBasicMaterial({
    color: 0xff4400,
    transparent: true,
    opacity: 0.08,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const column = new THREE.Mesh(columnGeo, columnMat);
  column.position.set(center.x, 12.5, center.z);
  particleGroups[t].add(column);
}

// --- Time Control ---
let currentTimeStep = 0;
let isPlaying = false;
let playInterval = null;

const playPauseBtn = document.getElementById('playPauseBtn');
const timeSlider = document.getElementById('timeSlider');
const timeLabel = document.getElementById('timeLabel');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const legendPanel = document.getElementById('legendPanel');

function setTimeStep(step) {
  step = Math.max(0, Math.min(5, step));
  particleGroups[currentTimeStep].visible = false;
  currentTimeStep = step;
  particleGroups[currentTimeStep].visible = true;
  timeSlider.value = step;
  timeLabel.textContent = `Time: ${step}`;

  window.__3D_STATE__.currentTimeStep = step;
  window.__3D_STATE__.particleCount = timeStepData[step].length;
  window.__3D_STATE__.stormCenterX = stormCenters[step].x;
  window.__3D_STATE__.stormCenterZ = stormCenters[step].z;
}

function startPlaying() {
  isPlaying = true;
  window.__3D_STATE__.isPlaying = true;
  playPauseBtn.textContent = '⏸ Pause';
  playInterval = setInterval(() => {
    let next = currentTimeStep + 1;
    if (next > 5) next = 0;
    setTimeStep(next);
  }, 2000);
}

function stopPlaying() {
  isPlaying = false;
  window.__3D_STATE__.isPlaying = false;
  playPauseBtn.textContent = '▶ Play';
  if (playInterval) {
    clearInterval(playInterval);
    playInterval = null;
  }
}

playPauseBtn.addEventListener('click', () => {
  if (isPlaying) stopPlaying();
  else startPlaying();
});

timeSlider.addEventListener('input', () => {
  stopPlaying();
  setTimeStep(parseInt(timeSlider.value));
});

prevBtn.addEventListener('click', () => {
  stopPlaying();
  setTimeStep(currentTimeStep - 1);
});

nextBtn.addEventListener('click', () => {
  stopPlaying();
  setTimeStep(currentTimeStep + 1);
});

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
  const key = e.key.toUpperCase();

  if (key === 'R') {
    camera.position.set(0, 60, 80);
    controls.target.set(0, 5, 0);
    controls.update();
  }

  if (key === 'L') {
    const visible = legendPanel.style.display !== 'block';
    legendPanel.style.display = visible ? 'block' : 'none';
    window.__3D_STATE__.legendVisible = visible;
  }

  if (key === 'G') {
    const newVisible = !gridObjects[0].visible;
    gridObjects.forEach(obj => obj.visible = newVisible);
    ringGroup.visible = newVisible;
    window.__3D_STATE__.gridVisible = newVisible;
  }
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation ---
const clock = new THREE.Clock();
let sweepAngle = 0;
const sweepHistory = [];

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Rotate radar sweep
  sweepAngle += delta * 1.0; // 1 radian/sec
  if (sweepAngle > Math.PI * 2) sweepAngle -= Math.PI * 2;

  sweepLine.rotation.y = sweepAngle;

  // Update sweep trail
  sweepHistory.push(sweepAngle);
  if (sweepHistory.length > trailSegments) sweepHistory.shift();

  const trailPositions = sweepTrailGeo.attributes.position.array;
  const trailColorArr = sweepTrailGeo.attributes.color.array;

  for (let i = 0; i < trailSegments; i++) {
    const idx = i * 6; // 2 points * 3 coords
    const colorIdx = i * 6; // 2 points * 3 color components
    if (i < sweepHistory.length) {
      const a = sweepHistory[sweepHistory.length - 1 - i];
      const r = 55;
      trailPositions[idx] = 0;
      trailPositions[idx + 1] = 0.15;
      trailPositions[idx + 2] = 0;
      trailPositions[idx + 3] = Math.cos(a) * r;
      trailPositions[idx + 4] = 0.15;
      trailPositions[idx + 5] = Math.sin(a) * r;

      const fade = 1 - i / trailSegments;
      trailColorArr[colorIdx] = 0;
      trailColorArr[colorIdx + 1] = fade * 0.8;
      trailColorArr[colorIdx + 2] = 0;
      trailColorArr[colorIdx + 3] = 0;
      trailColorArr[colorIdx + 4] = fade * 0.8;
      trailColorArr[colorIdx + 5] = 0;
    } else {
      for (let j = 0; j < 6; j++) {
        trailPositions[idx + j] = 0;
        trailColorArr[colorIdx + j] = 0;
      }
    }
  }
  sweepTrailGeo.attributes.position.needsUpdate = true;
  sweepTrailGeo.attributes.color.needsUpdate = true;

  // Animate particles - gentle floating
  if (particleGroups[currentTimeStep]) {
    const group = particleGroups[currentTimeStep];
    group.children.forEach((child, i) => {
      if (child.isMesh && child.geometry.type === 'SphereGeometry') {
        const baseY = timeStepData[currentTimeStep][i] ? timeStepData[currentTimeStep][i].y : child.position.y;
        child.position.y = baseY + Math.sin(elapsed * 0.5 + i * 0.1) * 0.3;
      }
    });
  }

  controls.update();

  // Update state
  const state = window.__3D_STATE__;
  state.currentTimeStep = currentTimeStep;
  state.isPlaying = isPlaying;
  state.particleCount = timeStepData[currentTimeStep] ? timeStepData[currentTimeStep].length : 0;
  state.radarSweepAngle = parseFloat(sweepAngle.toFixed(4)) || 0;
  state.cameraPosition = {
    x: parseFloat(camera.position.x.toFixed(4)) || 0,
    y: parseFloat(camera.position.y.toFixed(4)) || 0,
    z: parseFloat(camera.position.z.toFixed(4)) || 0
  };
  state.gridVisible = gridObjects[0].visible;
  state.stormCenterX = stormCenters[currentTimeStep].x;
  state.stormCenterZ = stormCenters[currentTimeStep].z;

  renderer.render(scene, camera);
}

// Initialize
setTimeStep(0);
animate();
</script>
</body>
</html>
