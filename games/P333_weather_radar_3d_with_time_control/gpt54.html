<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Weather Radar Visualization</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: white;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #controlPanel {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0, 255, 100, 0.35);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    #legendPanel {
      position: absolute;
      top: 16px;
      right: 16px;
      display: none;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(0, 255, 100, 0.35);
      border-radius: 10px;
      z-index: 10;
      min-width: 180px;
    }

    #legendPanel h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #9cffb1;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      font-size: 13px;
    }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.2);
      flex: 0 0 16px;
    }

    button, input[type="range"] {
      cursor: pointer;
    }

    button {
      background: #103820;
      color: #d7ffe1;
      border: 1px solid #2fd66f;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
    }

    button:hover {
      background: #145229;
    }

    #timeLabel {
      min-width: 64px;
      text-align: center;
      font-weight: bold;
      color: #9cffb1;
    }

    #hintPanel {
      position: absolute;
      left: 16px;
      top: 16px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      z-index: 10;
      color: #d9d9e6;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hintPanel">
      <div><b>Keys:</b> R = Reset Camera</div>
      <div>L = Toggle Legend</div>
      <div>G = Toggle Grid</div>
    </div>

    <div id="legendPanel">
      <h3>Precipitation Intensity</h3>
      <div class="legend-row"><span class="swatch" style="background:#0044ff"></span> Blue = Light</div>
      <div class="legend-row"><span class="swatch" style="background:#ffff00"></span> Yellow = Moderate</div>
      <div class="legend-row"><span class="swatch" style="background:#ff0000"></span> Red = Heavy</div>
    </div>

    <div id="controlPanel">
      <button id="prevBtn">Prev</button>
      <button id="playPauseBtn">Play</button>
      <button id="nextBtn">Next</button>
      <input id="timeSlider" type="range" min="0" max="5" step="1" value="0" />
      <span id="timeLabel">Time: 0</span>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const timeSlider = document.getElementById('timeSlider');
    const timeLabel = document.getElementById('timeLabel');
    const legendPanel = document.getElementById('legendPanel');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    const initialCameraPosition = new THREE.Vector3(0, 60, 80);
    camera.position.copy(initialCameraPosition);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 50, 10);
    scene.add(directionalLight);

    const gridGroup = new THREE.Group();
    scene.add(gridGroup);

    const groundGeo = new THREE.PlaneGeometry(100, 100, 50, 50);
    const groundMat = new THREE.MeshPhongMaterial({
      color: 0x003300,
      transparent: true,
      opacity: 0.4,
      side: THREE.DoubleSide,
      wireframe: false
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    gridGroup.add(ground);

    const helper = new THREE.GridHelper(100, 50, 0x00aa44, 0x005522);
    helper.position.y = 0.01;
    helper.material.transparent = true;
    helper.material.opacity = 0.35;
    gridGroup.add(helper);

    function createRing(radius, color = 0x00ff44, segments = 128) {
      const points = [];
      for (let i = 0; i < segments; i++) {
        const a = (i / segments) * Math.PI * 2;
        points.push(new THREE.Vector3(Math.cos(a) * radius, 0.05, Math.sin(a) * radius));
      }
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ color });
      const ring = new THREE.LineLoop(geometry, material);
      return ring;
    }

    [10, 25, 40, 55].forEach(r => {
      const ring = createRing(r);
      gridGroup.add(ring);
    });

    const sweepGroup = new THREE.Group();
    scene.add(sweepGroup);

    const sweepPoints = [
      new THREE.Vector3(0, 0.2, 0),
      new THREE.Vector3(55, 0.2, 0)
    ];
    const sweepGeo = new THREE.BufferGeometry().setFromPoints(sweepPoints);
    const sweepMat = new THREE.LineBasicMaterial({ color: 0x00ff00 });
    const sweepLine = new THREE.Line(sweepGeo, sweepMat);
    sweepGroup.add(sweepLine);

    const sweepConeGeo = new THREE.CircleGeometry(55, 64, 0, Math.PI / 12);
    const sweepConeMat = new THREE.MeshBasicMaterial({
      color: 0x00ff00,
      transparent: true,
      opacity: 0.08,
      side: THREE.DoubleSide
    });
    const sweepCone = new THREE.Mesh(sweepConeGeo, sweepConeMat);
    sweepCone.rotation.x = -Math.PI / 2;
    sweepCone.rotation.z = 0;
    sweepCone.position.y = 0.03;
    sweepGroup.add(sweepCone);

    let modelLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      'facecap.glb',
      (gltf) => {
        const model = gltf.scene;
        model.position.set(0, -5, 0);
        model.scale.set(8, 8, 8);
        scene.add(model);
        modelLoaded = true;
      },
      undefined,
      () => {
        modelLoaded = false;
      }
    );

    const weatherGroup = new THREE.Group();
    scene.add(weatherGroup);

    const particleGeometry = new THREE.SphereGeometry(0.3, 10, 10);
    const particleMaterials = {
      low: new THREE.MeshBasicMaterial({ color: 0x0044ff }),
      med: new THREE.MeshBasicMaterial({ color: 0xffff00 }),
      high: new THREE.MeshBasicMaterial({ color: 0xff0000 })
    };

    const stormCenters = [
      { x: -20, z: -20 },
      { x: -12, z: -12 },
      { x: -4, z: -4 },
      { x: 4, z: 4 },
      { x: 12, z: 12 },
      { x: 20, z: 20 }
    ];

    const timeStepParticles = [];

    function safeNumber(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function randomPointInCircle(radius) {
      const t = Math.random() * Math.PI * 2;
      const r = Math.sqrt(Math.random()) * radius;
      return {
        x: Math.cos(t) * r,
        z: Math.sin(t) * r
      };
    }

    function clampToRadius(x, z, maxRadius) {
      const len = Math.sqrt(x * x + z * z);
      if (!Number.isFinite(len) || len === 0 || len <= maxRadius) return { x, z };
      const s = maxRadius / len;
      return { x: x * s, z: z * s };
    }

    for (let step = 0; step < 6; step++) {
      const particles = [];
      const center = stormCenters[step];

      for (let i = 0; i < 200; i++) {
        const local = randomPointInCircle(18);
        let x = center.x + local.x;
        let z = center.z + local.z;
        const clamped = clampToRadius(x, z, 50);
        x = clamped.x;
        z = clamped.z;

        const y = 1 + Math.random() * 24;
        const intensity = Math.random();

        particles.push({
          x: safeNumber(x),
          y: safeNumber(y),
          z: safeNumber(z),
          intensity: safeNumber(intensity)
        });
      }

      timeStepParticles.push(particles);
    }

    let currentParticleMeshes = [];

    function clearParticles() {
      for (const mesh of currentParticleMeshes) {
        weatherGroup.remove(mesh);
      }
      currentParticleMeshes = [];
    }

    function materialForIntensity(intensity) {
      if (intensity <= 0.33) return particleMaterials.low;
      if (intensity <= 0.66) return particleMaterials.med;
      return particleMaterials.high;
    }

    function renderTimeStep(step) {
      const idx = Math.max(0, Math.min(5, step | 0));
      clearParticles();

      const particles = timeStepParticles[idx];
      for (const p of particles) {
        const mesh = new THREE.Mesh(particleGeometry, materialForIntensity(p.intensity));
        mesh.position.set(
          safeNumber(p.x),
          safeNumber(p.y),
          safeNumber(p.z)
        );
        weatherGroup.add(mesh);
        currentParticleMeshes.push(mesh);
      }

      timeSlider.value = String(idx);
      timeLabel.textContent = `Time: ${idx}`;
      currentTimeStep = idx;
    }

    let currentTimeStep = 0;
    let isPlaying = false;
    let playAccumulator = 0;
    let gridVisible = true;
    let legendVisible = false;
    let radarSweepAngle = 0;

    renderTimeStep(0);

    function nextTimeStep() {
      renderTimeStep((currentTimeStep + 1) % 6);
    }

    function prevTimeStep() {
      renderTimeStep((currentTimeStep + 5) % 6);
    }

    playPauseBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      playPauseBtn.textContent = isPlaying ? 'Pause' : 'Play';
    });

    prevBtn.addEventListener('click', () => {
      prevTimeStep();
    });

    nextBtn.addEventListener('click', () => {
      nextTimeStep();
    });

    timeSlider.addEventListener('input', (e) => {
      const val = parseInt(e.target.value, 10);
      renderTimeStep(Number.isFinite(val) ? val : 0);
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'r') {
        camera.position.copy(initialCameraPosition);
        controls.target.set(0, 0, 0);
        controls.update();
      }

      if (key === 'l') {
        legendVisible = !legendVisible;
        legendPanel.style.display = legendVisible ? 'block' : 'none';
      }

      if (key === 'g') {
        gridVisible = !gridVisible;
        gridGroup.visible = gridVisible;
      }
    });

    window.__3D_STATE__ = {
      currentTimeStep: 0,
      isPlaying: false,
      particleCount: 200,
      radarSweepAngle: 0,
      cameraPosition: { x: 0, y: 60, z: 80 },
      gridVisible: true,
      legendVisible: false,
      modelLoaded: false,
      stormCenterX: stormCenters[0].x,
      stormCenterZ: stormCenters[0].z
    };

    const clock = new THREE.Clock();

    function updateState() {
      const center = stormCenters[currentTimeStep] || { x: 0, z: 0 };
      window.__3D_STATE__ = {
        currentTimeStep: safeNumber(currentTimeStep, 0),
        isPlaying: !!isPlaying,
        particleCount: safeNumber(currentParticleMeshes.length, 0),
        radarSweepAngle: safeNumber(radarSweepAngle % (Math.PI * 2), 0),
        cameraPosition: {
          x: safeNumber(camera.position.x, 0),
          y: safeNumber(camera.position.y, 0),
          z: safeNumber(camera.position.z, 0)
        },
        gridVisible: !!gridVisible,
        legendVisible: !!legendVisible,
        modelLoaded: !!modelLoaded,
        stormCenterX: safeNumber(center.x, 0),
        stormCenterZ: safeNumber(center.z, 0)
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = safeNumber(clock.getDelta(), 0.016);

      radarSweepAngle += delta * 1.0;
      if (!Number.isFinite(radarSweepAngle)) radarSweepAngle = 0;
      radarSweepAngle = radarSweepAngle % (Math.PI * 2);
      sweepGroup.rotation.y = radarSweepAngle;

      if (isPlaying) {
        playAccumulator += delta;
        if (!Number.isFinite(playAccumulator)) playAccumulator = 0;
        if (playAccumulator >= 2.0) {
          playAccumulator = 0;
          nextTimeStep();
        }
      }

      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
