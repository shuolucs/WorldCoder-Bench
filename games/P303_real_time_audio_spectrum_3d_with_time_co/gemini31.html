<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Audio Spectrum Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            color: #fff;
            user-select: none;
        }
        #hud-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: auto;
            min-width: 150px;
        }
        #hud-panel div {
            margin-bottom: 8px;
            font-size: 14px;
        }
        #slider-container {
            margin-top: 15px;
        }
        #slider-time {
            width: 100%;
            cursor: pointer;
        }
        #bottom-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        button {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #444;
        }
        button:active {
            background: #666;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud-panel">
        <div id="hud-time">Time: 0.0</div>
        <div id="hud-rate">Rate: 1.00x</div>
        <div id="hud-state">PLAYING</div>
        <div id="hud-orbit">Orbit: OFF</div>
        <div id="slider-container">
            <input type="range" id="slider-time" min="0" max="100" step="0.1" value="0">
        </div>
    </div>

    <div id="bottom-controls">
        <button id="btn-slower">Slower</button>
        <button id="btn-playpause">Pause</button>
        <button id="btn-faster">Faster</button>
        <button id="btn-reset">Reset</button>
    </div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            isPlaying: true,
            playbackRate: 1.0,
            simTime: 0,
            orbitEnabled: false,
            barCount: 64,
            maxBarHeight: 0,
            avgBarHeight: 0,
            gridRows: 8,
            gridCols: 8,
            cameraDistance: 0,
            frameCount: 0
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // --- Ground Plane ---
        const gridHelper = new THREE.GridHelper(80, 20, 0x444444, 0x222222);
        scene.add(gridHelper);

        // --- Spectrum Bars ---
        const bars = [];
        const gridRows = 8;
        const gridCols = 8;
        const spacing = 2.5;
        const maxHeight = 15;
        
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        geometry.translate(0, 0.5, 0); // Pivot at the bottom

        const offsetZ = (gridRows - 1) * spacing / 2;
        const offsetX = (gridCols - 1) * spacing / 2;

        for (let row = 0; row < gridRows; row++) {
            for (let col = 0; col < gridCols; col++) {
                const material = new THREE.MeshStandardMaterial({ color: 0x0044ff });
                const mesh = new THREE.Mesh(geometry, material);
                
                mesh.position.x = col * spacing - offsetX;
                mesh.position.z = row * spacing - offsetZ;
                
                scene.add(mesh);
                bars.push({ mesh, row, col });
            }
        }

        // --- Color Interpolation ---
        const colorLow = new THREE.Color(0x0044ff);
        const colorMid = new THREE.Color(0x00ff44);
        const colorHigh = new THREE.Color(0xff4400);

        function getBarColor(normalizedHeight) {
            const color = new THREE.Color();
            if (normalizedHeight < 0.5) {
                color.lerpColors(colorLow, colorMid, normalizedHeight * 2);
            } else {
                color.lerpColors(colorMid, colorHigh, (normalizedHeight - 0.5) * 2);
            }
            return color;
        }

        // --- UI Elements ---
        const elTime = document.getElementById('hud-time');
        const elRate = document.getElementById('hud-rate');
        const elState = document.getElementById('hud-state');
        const elOrbit = document.getElementById('hud-orbit');
        const sliderTime = document.getElementById('slider-time');
        
        const btnPlayPause = document.getElementById('btn-playpause');
        const btnSlower = document.getElementById('btn-slower');
        const btnFaster = document.getElementById('btn-faster');
        const btnReset = document.getElementById('btn-reset');

        // --- Time Control Logic ---
        function togglePlayPause() {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            updateUI();
        }

        function updateUI() {
            elState.innerText = window.__3D_STATE__.isPlaying ? 'PLAYING' : 'PAUSED';
            btnPlayPause.innerText = window.__3D_STATE__.isPlaying ? 'Pause' : 'Play';
            elRate.innerText = `Rate: ${window.__3D_STATE__.playbackRate.toFixed(2)}x`;
            elOrbit.innerText = `Orbit: ${window.__3D_STATE__.orbitEnabled ? 'ON' : 'OFF'}`;
        }

        btnPlayPause.addEventListener('click', togglePlayPause);
        
        btnSlower.addEventListener('click', () => {
            window.__3D_STATE__.playbackRate = Math.max(0.25, window.__3D_STATE__.playbackRate - 0.25);
            updateUI();
        });

        btnFaster.addEventListener('click', () => {
            window.__3D_STATE__.playbackRate = Math.min(3.0, window.__3D_STATE__.playbackRate + 0.25);
            updateUI();
        });

        btnReset.addEventListener('click', () => {
            window.__3D_STATE__.simTime = 0;
            window.__3D_STATE__.playbackRate = 1.0;
            window.__3D_STATE__.isPlaying = true;
            sliderTime.value = 0;
            updateUI();
        });

        sliderTime.addEventListener('input', (e) => {
            window.__3D_STATE__.isPlaying = false;
            window.__3D_STATE__.simTime = parseFloat(e.target.value);
            updateUI();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlayPause();
            } else if (e.key === 'o' || e.key === 'O') {
                window.__3D_STATE__.orbitEnabled = !window.__3D_STATE__.orbitEnabled;
                updateUI();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let orbitAngle = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const state = window.__3D_STATE__;

            if (state.isPlaying) {
                state.simTime += delta * state.playbackRate;
                if (state.simTime >= 100) {
                    state.simTime %= 100;
                }
                sliderTime.value = state.simTime;
            }

            elTime.innerText = `Time: ${state.simTime.toFixed(1)}`;

            // Update Bars
            let currentMaxHeight = 0;
            let totalHeight = 0;

            for (let i = 0; i < bars.length; i++) {
                const { mesh, row, col } = bars[i];
                
                // Procedural formula
                const amplitude = Math.abs(
                    Math.sin(state.simTime + col * 0.5) * 
                    Math.cos(state.simTime * 0.7 + row * 0.3)
                ) * maxHeight;

                const h = Math.max(0.01, amplitude);
                mesh.scale.y = h;
                
                const normalizedH = Math.min(1.0, h / maxHeight);
                mesh.material.color = getBarColor(normalizedH);

                if (h > currentMaxHeight) currentMaxHeight = h;
                totalHeight += h;
            }

            // Camera Orbit
            if (state.orbitEnabled) {
                orbitAngle += delta * 0.3;
                camera.position.x = Math.sin(orbitAngle) * 50;
                camera.position.z = Math.cos(orbitAngle) * 50;
                camera.position.y = 30;
                camera.lookAt(0, 0, 0);
            } else {
                // Keep orbitAngle synced with current position if disabled so it doesn't snap when re-enabled
                orbitAngle = Math.atan2(camera.position.x, camera.position.z);
            }

            // Update State Object
            state.maxBarHeight = currentMaxHeight;
            state.avgBarHeight = totalHeight / state.barCount;
            state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
            state.frameCount++;

            renderer.render(scene, camera);
        }

        updateUI();
        animate();
    </script>
</body>
</html>
