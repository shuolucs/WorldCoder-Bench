<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D Audio Spectrum Visualizer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #05070c;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #hud-panel {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      z-index: 10;
      min-width: 170px;
      line-height: 1.6;
      backdrop-filter: blur(4px);
    }

    #slider-container {
      position: fixed;
      left: 12px;
      top: 140px;
      z-index: 10;
      width: min(420px, calc(100vw - 24px));
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
    }

    #slider-time {
      width: 100%;
    }

    #controls {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      padding: 10px 14px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }

    button {
      background: #1c2433;
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #293247;
    }

    .hint {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hud-panel">
    <div id="hud-time">Time: 0.0</div>
    <div id="hud-rate">Rate: 1.00x</div>
    <div id="hud-state">PLAYING</div>
    <div id="hud-orbit">Orbit: OFF</div>
    <div class="hint">SPACE: Play/Pause · O: Orbit</div>
  </div>

  <div id="slider-container">
    <input id="slider-time" type="range" min="0" max="100" step="0.1" value="0" />
  </div>

  <div id="controls">
    <button id="btn-slower">Slower</button>
    <button id="btn-playpause">Play/Pause</button>
    <button id="btn-faster">Faster</button>
    <button id="btn-reset">Reset</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    // ---------------------------
    // Basic setup
    // ---------------------------
    const app = document.getElementById("app");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05070c);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    // ---------------------------
    // Lights
    // ---------------------------
    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    // ---------------------------
    // Ground grid
    // ---------------------------
    const grid = new THREE.GridHelper(80, 20, 0x222222, 0x111111);
    scene.add(grid);

    // ---------------------------
    // Spectrum bars
    // ---------------------------
    const GRID_ROWS = 8;
    const GRID_COLS = 8;
    const BAR_SPACING = 2.5;
    const BAR_BASE = 1;
    const MAX_HEIGHT = 15;

    const barGeometry = new THREE.BoxGeometry(BAR_BASE, 1, BAR_BASE);
    const bars = [];
    const spectrumData = [];

    const lowColor = new THREE.Color(0x0044ff);
    const midColor = new THREE.Color(0x00ff44);
    const highColor = new THREE.Color(0xff4400);

    function amplitudeToColor(amplitude) {
      const t = THREE.MathUtils.clamp(amplitude / MAX_HEIGHT, 0, 1);
      const color = new THREE.Color();

      if (t < 0.5) {
        color.copy(lowColor).lerp(midColor, t / 0.5);
      } else {
        color.copy(midColor).lerp(highColor, (t - 0.5) / 0.5);
      }

      return color;
    }

    const totalWidth = (GRID_COLS - 1) * BAR_SPACING;
    const totalDepth = (GRID_ROWS - 1) * BAR_SPACING;
    const startX = -totalWidth / 2;
    const startZ = -totalDepth / 2;

    for (let row = 0; row < GRID_ROWS; row++) {
      spectrumData[row] = [];
      for (let col = 0; col < GRID_COLS; col++) {
        const material = new THREE.MeshStandardMaterial({
          color: amplitudeToColor(0)
        });

        const bar = new THREE.Mesh(barGeometry, material);
        bar.position.set(startX + col * BAR_SPACING, 0.5, startZ + row * BAR_SPACING);
        scene.add(bar);

        bars.push({ mesh: bar, row, col });
        spectrumData[row][col] = 0;
      }
    }

    // ---------------------------
    // UI elements
    // ---------------------------
    const hudTime = document.getElementById("hud-time");
    const hudRate = document.getElementById("hud-rate");
    const hudState = document.getElementById("hud-state");
    const hudOrbit = document.getElementById("hud-orbit");

    const btnSlower = document.getElementById("btn-slower");
    const btnPlayPause = document.getElementById("btn-playpause");
    const btnFaster = document.getElementById("btn-faster");
    const btnReset = document.getElementById("btn-reset");
    const sliderTime = document.getElementById("slider-time");

    // ---------------------------
    // State
    // ---------------------------
    let isPlaying = true;
    let playbackRate = 1.0;
    let simTime = 0;
    let orbitEnabled = false;
    let frameCount = 0;

    let currentOrbitAngle = Math.atan2(camera.position.x, camera.position.z);
    const orbitRadius = 50;
    const orbitHeight = 30;
    const orbitSpeed = 0.3;

    window.__3D_STATE__ = {
      isPlaying,
      playbackRate,
      simTime,
      orbitEnabled,
      barCount: GRID_ROWS * GRID_COLS,
      maxBarHeight: 0,
      avgBarHeight: 0,
      gridRows: GRID_ROWS,
      gridCols: GRID_COLS,
      cameraDistance: camera.position.distanceTo(new THREE.Vector3(0, 0, 0)),
      frameCount
    };

    function updateHUD() {
      hudTime.textContent = `Time: ${simTime.toFixed(1)}`;
      hudRate.textContent = `Rate: ${playbackRate.toFixed(2)}x`;
      hudState.textContent = isPlaying ? "PLAYING" : "PAUSED";
      hudOrbit.textContent = `Orbit: ${orbitEnabled ? "ON" : "OFF"}`;
    }

    function updateSpectrum(timeValue) {
      let maxBarHeight = 0;
      let totalBarHeight = 0;

      for (let row = 0; row < GRID_ROWS; row++) {
        for (let col = 0; col < GRID_COLS; col++) {
          const amplitude =
            Math.abs(
              Math.sin(timeValue * playbackRate + col * 0.5) *
              Math.cos(timeValue * playbackRate * 0.7 + row * 0.3)
            ) * MAX_HEIGHT;

          spectrumData[row][col] = amplitude;

          const index = row * GRID_COLS + col;
          const bar = bars[index].mesh;

          bar.scale.y = Math.max(amplitude, 0.001);
          bar.position.y = (bar.scale.y * 1) / 2;

          bar.material.color.copy(amplitudeToColor(amplitude));

          if (amplitude > maxBarHeight) maxBarHeight = amplitude;
          totalBarHeight += amplitude;
        }
      }

      const avgBarHeight = totalBarHeight / (GRID_ROWS * GRID_COLS);

      window.__3D_STATE__.maxBarHeight = maxBarHeight;
      window.__3D_STATE__.avgBarHeight = avgBarHeight;
    }

    function syncSliderFromTime() {
      sliderTime.value = (simTime % 100).toFixed(1);
    }

    function updateGlobalState() {
      window.__3D_STATE__.isPlaying = isPlaying;
      window.__3D_STATE__.playbackRate = playbackRate;
      window.__3D_STATE__.simTime = simTime;
      window.__3D_STATE__.orbitEnabled = orbitEnabled;
      window.__3D_STATE__.barCount = GRID_ROWS * GRID_COLS;
      window.__3D_STATE__.gridRows = GRID_ROWS;
      window.__3D_STATE__.gridCols = GRID_COLS;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.frameCount = frameCount;
    }

    function togglePlayPause() {
      isPlaying = !isPlaying;
      updateHUD();
    }

    function setPlaybackRate(rate) {
      playbackRate = THREE.MathUtils.clamp(rate, 0.25, 3.0);
      updateHUD();
    }

    function resetSimulation() {
      simTime = 0;
      playbackRate = 1.0;
      isPlaying = true;
      syncSliderFromTime();
      updateHUD();
    }

    btnPlayPause.addEventListener("click", togglePlayPause);
    btnSlower.addEventListener("click", () => setPlaybackRate(playbackRate - 0.25));
    btnFaster.addEventListener("click", () => setPlaybackRate(playbackRate + 0.25));
    btnReset.addEventListener("click", resetSimulation);

    sliderTime.addEventListener("input", (e) => {
      isPlaying = false;
      simTime = parseFloat(e.target.value);
      updateHUD();
      updateSpectrum(simTime);
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        togglePlayPause();
      }

      if (e.code === "KeyO") {
        orbitEnabled = !orbitEnabled;
        if (!orbitEnabled) {
          currentOrbitAngle = Math.atan2(camera.position.x, camera.position.z);
        }
        updateHUD();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    // ---------------------------
    // Animation loop
    // ---------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const deltaTime = clock.getDelta();
      frameCount++;

      if (isPlaying) {
        simTime += deltaTime * playbackRate;
        if (simTime >= 100) {
          simTime = simTime % 100;
        }
        syncSliderFromTime();
      }

      if (orbitEnabled) {
        currentOrbitAngle += orbitSpeed * deltaTime;
        camera.position.x = Math.sin(currentOrbitAngle) * orbitRadius;
        camera.position.z = Math.cos(currentOrbitAngle) * orbitRadius;
        camera.position.y = orbitHeight;
      }

      camera.lookAt(0, 0, 0);

      updateSpectrum(simTime);
      updateHUD();
      updateGlobalState();

      renderer.render(scene, camera);
    }

    updateSpectrum(simTime);
    updateHUD();
    syncSliderFromTime();
    animate();
  </script>
</body>
</html>
