<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fire Tornado</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #050505; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #ff9900;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #ff660055;
    line-height: 1.8;
    pointer-events: none;
    z-index: 100;
    text-shadow: 0 0 5px #ff660088;
}
#hud .label { color: #ffaa44; }
#hud .value { color: #ffffff; }
#controls {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #888;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    background: rgba(0, 0, 0, 0.5);
    padding: 10px;
    border-radius: 6px;
    pointer-events: none;
    z-index: 100;
    line-height: 1.6;
}
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">Wind Speed:</span> <span class="value" id="hud-wind">3.0 rad/s</span></div>
    <div><span class="label">Active Particles:</span> <span class="value" id="hud-particles">3000</span></div>
    <div><span class="label">Color Theme:</span> <span class="value" id="hud-theme">fire</span></div>
    <div><span class="label">Ember Mode:</span> <span class="value" id="hud-ember">OFF</span></div>
    <div><span class="label">Paused:</span> <span class="value" id="hud-paused">NO</span></div>
    <div><span class="label">Helmet Visible:</span> <span class="value" id="hud-helmet">YES</span></div>
    <div><span class="label">Burst Count:</span> <span class="value" id="hud-burst">0</span></div>
</div>

<div id="controls">
    W/S: Wind Speed ↑↓ | E: Ember Mode | R: Reset | Space: Pause<br>
    T: Toggle Helmet | C: Cycle Colors | Click: Particle Burst
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
    windSpeed: 3.0,
    particleCount: 3000,
    colorTheme: 'fire',
    emberMode: false,
    paused: false,
    helmetVisible: true,
    helmetRotationY: 0,
    tornadoBaseRadius: 2.0,
    tornadoTopRadius: 0.3,
    tornadoHeight: 10.0,
    burstCount: 0,
    elapsedTime: 0,
    maxParticleY: 0,
    fps: 0
};
window.__3D_STATE__ = state;

// ============ COLOR THEMES ============
const colorThemes = {
    fire: {
        base: new THREE.Color(0xffff00),
        mid: new THREE.Color(0xff4400),
        top: new THREE.Color(0xff0000),
        dead: new THREE.Color(0x330000),
        light: 0xff6600
    },
    ice: {
        base: new THREE.Color(0xffffff),
        mid: new THREE.Color(0x00ffff),
        top: new THREE.Color(0x0044ff),
        dead: new THREE.Color(0x000033),
        light: 0x0088ff
    },
    toxic: {
        base: new THREE.Color(0xaaff00),
        mid: new THREE.Color(0x00ff44),
        top: new THREE.Color(0x8800ff),
        dead: new THREE.Color(0x110022),
        light: 0x44ff00
    }
};
const themeNames = ['fire', 'ice', 'toxic'];
let themeIndex = 0;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xff6600, 2.0, 50);
pointLight.position.set(0, 3, 0);
scene.add(pointLight);

// ============ HELMET ============
let helmetModel = null;
const loader = new GLTFLoader();
loader.load(
    '._DamagedHelmet.glb',
    (gltf) => {
        helmetModel = gltf.scene;
        const box = new THREE.Box3().setFromObject(helmetModel);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.0 / maxDim;
        helmetModel.scale.setScalar(scale);
        helmetModel.position.set(0, 0, 0);
        scene.add(helmetModel);
    },
    undefined,
    (error) => {
        console.warn('Could not load DamagedHelmet.glb, creating placeholder:', error);
        const geo = new THREE.IcosahedronGeometry(1, 2);
        const mat = new THREE.MeshStandardMaterial({
            color: 0x888888,
            metalness: 0.8,
            roughness: 0.3
        });
        helmetModel = new THREE.Mesh(geo, mat);
        helmetModel.position.set(0, 0, 0);
        scene.add(helmetModel);
    }
);

// ============ PARTICLE TEXTURE ============
function createParticleTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
    gradient.addColorStop(0.7, 'rgba(255,200,100,0.3)');
    gradient.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 64, 64);
    const texture = new THREE.CanvasTexture(canvas);
    return texture;
}

const particleTexture = createParticleTexture();

// ============ MAIN TORNADO PARTICLES ============
const MAIN_COUNT = 3000;
const EMBER_COUNT = 500;
const BURST_SIZE = 100;
const MAX_BURSTS = 20;
const TOTAL_MAX = MAIN_COUNT + EMBER_COUNT + BURST_SIZE * MAX_BURSTS;

// Allocate max possible particles
const positions = new Float32Array(TOTAL_MAX * 3);
const colors = new Float32Array(TOTAL_MAX * 3);
const sizes = new Float32Array(TOTAL_MAX);
const alphas = new Float32Array(TOTAL_MAX);

// Per-particle data
const particleData = [];
for (let i = 0; i < TOTAL_MAX; i++) {
    particleData.push({
        active: false,
        type: 'none', // 'main', 'ember', 'burst'
        angle: 0,
        radius: 0,
        y: 0,
        lifetime: 0,
        maxLifetime: 3.0,
        riseSpeed: 0,
        angularVelocity: 0,
        // ember specific
        outwardSpeed: 0,
        // burst specific
        vx: 0, vy: 0, vz: 0
    });
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

const shaderMaterial = new THREE.ShaderMaterial({
    uniforms: {
        pointTexture: { value: particleTexture }
    },
    vertexShader: `
        attribute float size;
        attribute float alpha;
        attribute vec3 color;
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
            vColor = color;
            vAlpha = alpha;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = size * (200.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    `,
    fragmentShader: `
        uniform sampler2D pointTexture;
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
            vec4 texColor = texture2D(pointTexture, gl_PointCoord);
            gl_FragColor = vec4(vColor * texColor.rgb, texColor.a * vAlpha);
        }
    `,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    vertexColors: true
});

const particleSystem = new THREE.Points(geometry, shaderMaterial);
scene.add(particleSystem);

// ============ INIT MAIN PARTICLES ============
function initMainParticle(i) {
    const p = particleData[i];
    p.active = true;
    p.type = 'main';
    p.angle = Math.random() * Math.PI * 2;
    p.radius = state.tornadoBaseRadius;
    p.y = Math.random() * 0.5; // slight random start
    p.lifetime = Math.random() * 3.0; // stagger
    p.maxLifetime = 3.0;
    p.riseSpeed = 2.0 + Math.random() * 2.0;
    p.angularVelocity = state.windSpeed;

    const idx = i * 3;
    positions[idx] = Math.cos(p.angle) * p.radius;
    positions[idx + 1] = p.y;
    positions[idx + 2] = Math.sin(p.angle) * p.radius;
    sizes[i] = 0.3 + Math.random() * 0.3;
    alphas[i] = 1.0;
}

for (let i = 0; i < MAIN_COUNT; i++) {
    initMainParticle(i);
}

// ============ EMBER PARTICLES ============
let emberStartIndex = MAIN_COUNT;
let embersActive = false;

function initEmberParticle(i) {
    const p = particleData[i];
    p.active = true;
    p.type = 'ember';
    const spawnY = Math.random() * state.tornadoHeight;
    const t = spawnY / state.tornadoHeight;
    const spawnRadius = THREE.MathUtils.lerp(state.tornadoBaseRadius, state.tornadoTopRadius, t);
    p.angle = Math.random() * Math.PI * 2;
    p.radius = spawnRadius;
    p.y = spawnY;
    p.lifetime = Math.random() * 2.0;
    p.maxLifetime = 2.0;
    p.riseSpeed = 1.0 + Math.random() * 2.0;
    p.angularVelocity = state.windSpeed * 0.5;
    p.outwardSpeed = 1.0 + Math.random() * 3.0;

    const idx = i * 3;
    positions[idx] = Math.cos(p.angle) * p.radius;
    positions[idx + 1] = p.y;
    positions[idx + 2] = Math.sin(p.angle) * p.radius;
    sizes[i] = 0.15 + Math.random() * 0.15;
    alphas[i] = 0.8;
}

function activateEmbers() {
    for (let i = emberStartIndex; i < emberStartIndex + EMBER_COUNT; i++) {
        initEmberParticle(i);
    }
    embersActive = true;
}

function deactivateEmbers() {
    for (let i = emberStartIndex; i < emberStartIndex + EMBER_COUNT; i++) {
        particleData[i].active = false;
        alphas[i] = 0;
    }
    embersActive = false;
}

// ============ BURST PARTICLES ============
let burstStartIndex = MAIN_COUNT + EMBER_COUNT;
let nextBurstSlot = 0;

function spawnBurst(worldX, worldZ) {
    const baseIdx = burstStartIndex + nextBurstSlot * BURST_SIZE;
    for (let j = 0; j < BURST_SIZE; j++) {
        const i = baseIdx + j;
        if (i >= TOTAL_MAX) break;
        const p = particleData[i];
        p.active = true;
        p.type = 'burst';
        p.lifetime = 0;
        p.maxLifetime = 1.5 + Math.random() * 1.0;
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.0 + Math.random() * 4.0;
        p.vx = Math.cos(angle) * speed * 0.5;
        p.vy = 2.0 + Math.random() * 5.0;
        p.vz = Math.sin(angle) * speed * 0.5;
        p.y = 0;

        const idx = i * 3;
        positions[idx] = worldX + (Math.random() - 0.5) * 0.5;
        positions[idx + 1] = 0;
        positions[idx + 2] = worldZ + (Math.random() - 0.5) * 0.5;
        sizes[i] = 0.2 + Math.random() * 0.3;
        alphas[i] = 1.0;
    }
    nextBurstSlot = (nextBurstSlot + 1) % MAX_BURSTS;
    state.burstCount++;
}

// ============ COLOR HELPERS ============
const tmpColor = new THREE.Color();
const tmpColor2 = new THREE.Color();

function getParticleColor(lifeRatio, theme) {
    const t = colorThemes[theme];
    if (lifeRatio < 0.3) {
        tmpColor.copy(t.base).lerp(t.mid, lifeRatio / 0.3);
    } else if (lifeRatio < 0.7) {
        tmpColor.copy(t.mid).lerp(t.top, (lifeRatio - 0.3) / 0.4);
    } else {
        tmpColor.copy(t.top).lerp(t.dead, (lifeRatio - 0.7) / 0.3);
    }
    return tmpColor;
}

// ============ UPDATE ============
let lastTime = performance.now();
let fpsFrames = 0;
let fpsTime = 0;

function update(now) {
    const rawDt = (now - lastTime) / 1000;
    lastTime = now;
    const dt = state.paused ? 0 : Math.min(rawDt, 0.05);

    // FPS
    fpsFrames++;
    fpsTime += rawDt;
    if (fpsTime >= 0.5) {
        state.fps = Math.round(fpsFrames / fpsTime);
        fpsFrames = 0;
        fpsTime = 0;
    }

    if (!state.paused) {
        state.elapsedTime += dt;
    }

    // Helmet rotation
    if (helmetModel && !state.paused) {
        state.helmetRotationY += 0.3 * dt;
        helmetModel.rotation.y = state.helmetRotationY;
    }
    if (helmetModel) {
        helmetModel.visible = state.helmetVisible;
    }

    // Update point light color
    pointLight.color.setHex(colorThemes[state.colorTheme].light);

    let activeCount = 0;
    let maxY = 0;

    // Update main particles
    for (let i = 0; i < MAIN_COUNT; i++) {
        const p = particleData[i];
        if (!p.active) continue;

        if (!state.paused) {
            p.lifetime += dt;
            if (p.lifetime >= p.maxLifetime) {
                // Reset
                p.angle = Math.random() * Math.PI * 2;
                p.radius = state.tornadoBaseRadius;
                p.y = 0;
                p.lifetime = 0;
                p.riseSpeed = 2.0 + Math.random() * 2.0;
            }

            const lifeRatio = p.lifetime / p.maxLifetime;
            p.y += p.riseSpeed * dt;
            p.angle += state.windSpeed * dt;

            // Tornado radius based on height
            const heightRatio = Math.min(p.y / state.tornadoHeight, 1.0);
            const targetRadius = THREE.MathUtils.lerp(state.tornadoBaseRadius, state.tornadoTopRadius, heightRatio);
            p.radius += (targetRadius - p.radius) * dt * 5.0;

            // Add some turbulence
            const turbulence = Math.sin(p.angle * 3 + state.elapsedTime * 2) * 0.1;
            const currentRadius = p.radius + turbulence;

            const idx = i * 3;
            positions[idx] = Math.cos(p.angle) * currentRadius;
            positions[idx + 1] = p.y;
            positions[idx + 2] = Math.sin(p.angle) * currentRadius;

            // Color
            const col = getParticleColor(lifeRatio, state.colorTheme);
            colors[idx] = col.r;
            colors[idx + 1] = col.g;
            colors[idx + 2] = col.b;

            // Alpha fade at end of life
            alphas[i] = lifeRatio > 0.8 ? 1.0 - (lifeRatio - 0.8) / 0.2 : 1.0;
            // Size variation
            sizes[i] = (0.3 + Math.random() * 0.1) * (1.0 - lifeRatio * 0.5);
        }

        if (p.y > maxY) maxY = p.y;
        activeCount++;
    }

    // Update ember particles
    if (embersActive || state.emberMode) {
        if (state.emberMode && !embersActive) activateEmbers();
        if (!state.emberMode && embersActive) deactivateEmbers();
    }

    if (embersActive) {
        for (let i = emberStartIndex; i < emberStartIndex + EMBER_COUNT; i++) {
            const p = particleData[i];
            if (!p.active) continue;

            if (!state.paused) {
                p.lifetime += dt;
                if (p.lifetime >= p.maxLifetime) {
                    initEmberParticle(i);
                    p.lifetime = 0;
                }

                const lifeRatio = p.lifetime / p.maxLifetime;
                p.y += p.riseSpeed * dt;
                p.angle += p.angularVelocity * dt;
                p.radius += p.outwardSpeed * dt;

                const idx = i * 3;
                positions[idx] = Math.cos(p.angle) * p.radius;
                positions[idx + 1] = p.y;
                positions[idx + 2] = Math.sin(p.angle) * p.radius;

                const col = getParticleColor(lifeRatio, state.colorTheme);
                colors[idx] = col.r;
                colors[idx + 1] = col.g;
                colors[idx + 2] = col.b;

                alphas[i] = (1.0 - lifeRatio) * 0.6;
                sizes[i] = 0.1 + 0.1 * (1.0 - lifeRatio);
            }

            if (p.y > maxY) maxY = p.y;
            activeCount++;
        }
    }

    // Update burst particles
    for (let b = 0; b < MAX_BURSTS; b++) {
        const baseIdx = burstStartIndex + b * BURST_SIZE;
        for (let j = 0; j < BURST_SIZE; j++) {
            const i = baseIdx + j;
            if (i >= TOTAL_MAX) break;
            const p = particleData[i];
            if (!p.active) continue;

            if (!state.paused) {
                p.lifetime += dt;
                if (p.lifetime >= p.maxLifetime) {
                    p.active = false;
                    alphas[i] = 0;
                    continue;
                }

                const lifeRatio = p.lifetime / p.maxLifetime;
                p.vy -= 3.0 * dt; // gravity

                const idx = i * 3;
                positions[idx] += p.vx * dt;
                positions[idx + 1] += p.vy * dt;
                positions[idx + 2] += p.vz * dt;

                // Don't go below ground
                if (positions[idx + 1] < 0) {
                    positions[idx + 1] = 0;
                    p.vy *= -0.3;
                }

                const col = getParticleColor(lifeRatio, state.colorTheme);
                colors[idx] = col.r;
                colors[idx + 1] = col.g;
                colors[idx + 2] = col.b;

                alphas[i] = (1.0 - lifeRatio);
                sizes[i] = 0.25 * (1.0 - lifeRatio * 0.5);
            }

            if (positions[i * 3 + 1] > maxY) maxY = positions[i * 3 + 1];
            if (p.active) activeCount++;
        }
    }

    // Update geometry
    geometry.attributes.position.needsUpdate = true;
    geometry.attributes.color.needsUpdate = true;
    geometry.attributes.size.needsUpdate = true;
    geometry.attributes.alpha.needsUpdate = true;

    // Set draw range to only active area
    const drawCount = MAIN_COUNT + (embersActive ? EMBER_COUNT : 0) + MAX_BURSTS * BURST_SIZE;
    geometry.setDrawRange(0, drawCount);

    // Update state
    state.particleCount = activeCount;
    state.maxParticleY = maxY;

    // Update HUD
    updateHUD();
}

// ============ HUD ============
function updateHUD() {
    document.getElementById('hud-wind').textContent = state.windSpeed.toFixed(1) + ' rad/s';
    document.getElementById('hud-particles').textContent = state.particleCount;
    document.getElementById('hud-theme').textContent = state.colorTheme;
    document.getElementById('hud-ember').textContent = state.emberMode ? 'ON' : 'OFF';
    document.getElementById('hud-paused').textContent = state.paused ? 'YES' : 'NO';
    document.getElementById('hud-helmet').textContent = state.helmetVisible ? 'YES' : 'NO';
    document.getElementById('hud-burst').textContent = state.burstCount;
}

// ============ INPUT ============
document.addEventListener('keydown', (e) => {
    switch (e.key.toLowerCase()) {
        case 'w':
            state.windSpeed = Math.min(state.windSpeed + 1.0, 10.0);
            break;
        case 's':
            state.windSpeed = Math.max(state.windSpeed - 1.0, 1.0);
            break;
        case 'e':
            state.emberMode = !state.emberMode;
            break;
        case 'r':
            state.windSpeed = 3.0;
            state.colorTheme = 'fire';
            themeIndex = 0;
            state.emberMode = false;
            state.paused = false;
            state.helmetVisible = true;
            if (embersActive) deactivateEmbers();
            break;
        case 't':
            state.helmetVisible = !state.helmetVisible;
            break;
        case 'c':
            themeIndex = (themeIndex + 1) % themeNames.length;
            state.colorTheme = themeNames[themeIndex];
            break;
        case ' ':
            e.preventDefault();
            state.paused = !state.paused;
            break;
    }
});

// Mouse click -> burst
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const intersectPoint = new THREE.Vector3();

renderer.domElement.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    raycaster.ray.intersectPlane(groundPlane, intersectPoint);
    if (intersectPoint) {
        spawnBurst(intersectPoint.x, intersectPoint.z);
    }
});

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ GROUND GLOW ============
const groundGeo = new THREE.CircleGeometry(4, 64);
const groundMat = new THREE.ShaderMaterial({
    uniforms: {
        glowColor: { value: new THREE.Color(0xff4400) },
        time: { value: 0 }
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform vec3 glowColor;
        uniform float time;
        varying vec2 vUv;
        void main() {
            float dist = length(vUv - 0.5) * 2.0;
            float glow = smoothstep(1.0, 0.0, dist) * 0.4;
            glow *= 0.8 + 0.2 * sin(time * 3.0 + dist * 5.0);
            gl_FragColor = vec4(glowColor * glow, glow);
        }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
});
const groundGlow = new THREE.Mesh(groundGeo, groundMat);
groundGlow.rotation.x = -Math.PI / 2;
groundGlow.position.y = 0.01;
scene.add(groundGlow);

// ============ ANIMATION LOOP ============
function animate(now) {
    requestAnimationFrame(animate);
    update(now);

    // Update ground glow color
    groundMat.uniforms.glowColor.value.setHex(colorThemes[state.colorTheme].light);
    groundMat.uniforms.time.value = state.elapsedTime;

    renderer.render(scene, camera);
}

lastTime = performance.now();
requestAnimationFrame(animate);
</script>
</body>
</html>
