<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Fire Tornado - Three.js</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.45;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      z-index: 10;
      pointer-events: none;
      white-space: pre-line;
    }
    #help {
      position: fixed;
      bottom: 12px;
      left: 12px;
      color: #ddd;
      background: rgba(0, 0, 0, 0.35);
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 8px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <div id="help">
    W/S: wind &nbsp; E: ember mode &nbsp; R: reset &nbsp; Space: pause &nbsp; T: helmet &nbsp; C: theme &nbsp; Click: burst
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xff6600, 2.0, 50);
    pointLight.position.set(0, 3, 0);
    scene.add(pointLight);

    const clock = new THREE.Clock();

    const DEFAULTS = {
      windSpeed: 3.0,
      emberMode: false,
      paused: false,
      helmetVisible: true,
      tornadoBaseRadius: 2.0,
      tornadoTopRadius: 0.3,
      tornadoHeight: 10.0,
      particleLifetime: 3.0,
      baseParticleCount: 3000,
      emberExtraCount: 500,
      burstParticleCount: 100
    };

    const THEMES = {
      fire: {
        base: new THREE.Color(0xffff00),
        mid: new THREE.Color(0xff0000),
        death: new THREE.Color(0x330000)
      },
      ice: {
        base: new THREE.Color(0x99ffff),
        mid: new THREE.Color(0x00aaff),
        death: new THREE.Color(0x001133)
      },
      toxic: {
        base: new THREE.Color(0x66ff00),
        mid: new THREE.Color(0x9933ff),
        death: new THREE.Color(0x220022)
      }
    };

    const themeNames = ['fire', 'ice', 'toxic'];
    let currentTheme = 'fire';

    const hud = document.getElementById('hud');

    window.__3D_STATE__ = {
      windSpeed: DEFAULTS.windSpeed,
      particleCount: DEFAULTS.baseParticleCount,
      colorTheme: currentTheme,
      emberMode: DEFAULTS.emberMode,
      paused: DEFAULTS.paused,
      helmetVisible: DEFAULTS.helmetVisible,
      helmetRotationY: 0,
      tornadoBaseRadius: DEFAULTS.tornadoBaseRadius,
      tornadoTopRadius: DEFAULTS.tornadoTopRadius,
      tornadoHeight: DEFAULTS.tornadoHeight,
      burstCount: 0,
      elapsedTime: 0,
      maxParticleY: 0,
      fps: 0
    };

    let helmet = null;
    const helmetAnchor = new THREE.Group();
    scene.add(helmetAnchor);

    const loader = new GLTFLoader();
    loader.load(
      '._DamagedHelmet.glb',
      (gltf) => {
        helmet = gltf.scene;
        const box = new THREE.Box3().setFromObject(helmet);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 2 / maxDim;
        helmet.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(helmet);
        const center = new THREE.Vector3();
        box2.getCenter(center);
        helmet.position.sub(center);

        helmet.position.set(0, 0, 0);
        helmet.visible = window.__3D_STATE__.helmetVisible;
        helmetAnchor.add(helmet);
      },
      undefined,
      () => {
        const fallback = new THREE.Mesh(
          new THREE.IcosahedronGeometry(1, 1),
          new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.7, roughness: 0.35 })
        );
        fallback.position.set(0, 0, 0);
        helmet = fallback;
        helmet.visible = window.__3D_STATE__.helmetVisible;
        helmetAnchor.add(helmet);
      }
    );

    function makeSpriteTexture() {
      const size = 128;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      grad.addColorStop(0.0, 'rgba(255,255,255,1)');
      grad.addColorStop(0.2, 'rgba(255,220,180,1)');
      grad.addColorStop(0.5, 'rgba(255,140,50,0.5)');
      grad.addColorStop(1.0, 'rgba(0,0,0,0)');

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      return tex;
    }

    const particleTexture = makeSpriteTexture();

    class ParticleSystem {
      constructor(count, mode = 'tornado') {
        this.count = count;
        this.mode = mode;
        this.geometry = new THREE.BufferGeometry();

        this.positions = new Float32Array(count * 3);
        this.colors = new Float32Array(count * 3);
        this.sizes = new Float32Array(count);

        this.age = new Float32Array(count);
        this.lifetime = new Float32Array(count);
        this.radius = new Float32Array(count);
        this.angle = new Float32Array(count);
        this.y = new Float32Array(count);
        this.riseSpeed = new Float32Array(count);
        this.outwardSpeed = new Float32Array(count);
        this.vx = new Float32Array(count);
        this.vy = new Float32Array(count);
        this.vz = new Float32Array(count);
        this.active = new Uint8Array(count);

        this.geometry.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
        this.geometry.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));
        this.geometry.setAttribute('size', new THREE.BufferAttribute(this.sizes, 1));

        this.material = new THREE.PointsMaterial({
          size: 0.22,
          map: particleTexture,
          transparent: true,
          opacity: 0.95,
          vertexColors: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          sizeAttenuation: true
        });

        this.points = new THREE.Points(this.geometry, this.material);
        scene.add(this.points);

        for (let i = 0; i < count; i++) {
          this.resetParticle(i, true);
        }
        this.updateGeometry();
      }

      setVisible(v) {
        this.points.visible = v;
      }

      resetParticle(i, initial = false, burstOrigin = null) {
        this.age[i] = initial ? Math.random() * DEFAULTS.particleLifetime : 0;

        if (this.mode === 'tornado') {
          this.lifetime[i] = DEFAULTS.particleLifetime;
          this.angle[i] = Math.random() * Math.PI * 2;
          this.y[i] = initial ? Math.random() * DEFAULTS.tornadoHeight : 0;
          const t = this.y[i] / DEFAULTS.tornadoHeight;
          this.radius[i] = THREE.MathUtils.lerp(DEFAULTS.tornadoBaseRadius, DEFAULTS.tornadoTopRadius, t) + (Math.random() - 0.5) * 0.15;
          this.riseSpeed[i] = THREE.MathUtils.lerp(2.0, 4.0, Math.random());
          this.outwardSpeed[i] = 0;
          this.active[i] = 1;
        } else if (this.mode === 'ember') {
          this.lifetime[i] = 1.5 + Math.random() * 1.8;
          const a = Math.random() * Math.PI * 2;
          const r = 0.5 + Math.random() * 2.2;
          const py = Math.random() * 6.0;
          this.positions[i * 3 + 0] = Math.cos(a) * r;
          this.positions[i * 3 + 1] = py;
          this.positions[i * 3 + 2] = Math.sin(a) * r;
          this.vx[i] = Math.cos(a) * (1.5 + Math.random() * 2.5);
          this.vy[i] = 1.0 + Math.random() * 2.0;
          this.vz[i] = Math.sin(a) * (1.5 + Math.random() * 2.5);
          this.sizes[i] = 0.12 + Math.random() * 0.16;
          this.active[i] = 1;
          this.applyColor(i, 0);
          return;
        } else if (this.mode === 'burst') {
          if (burstOrigin) {
            this.positions[i * 3 + 0] = burstOrigin.x;
            this.positions[i * 3 + 1] = burstOrigin.y;
            this.positions[i * 3 + 2] = burstOrigin.z;
          } else {
            this.positions[i * 3 + 0] = 0;
            this.positions[i * 3 + 1] = 0;
            this.positions[i * 3 + 2] = 0;
          }

          const a = Math.random() * Math.PI * 2;
          const elev = Math.random() * Math.PI * 0.45;
          const speed = 2.0 + Math.random() * 4.0;
          const planar = Math.cos(elev) * speed;
          this.vx[i] = Math.cos(a) * planar;
          this.vy[i] = 1.0 + Math.sin(elev) * speed + Math.random() * 1.2;
          this.vz[i] = Math.sin(a) * planar;
          this.lifetime[i] = 1.2 + Math.random() * 1.0;
          this.sizes[i] = 0.16 + Math.random() * 0.18;
          this.active[i] = 1;
          this.applyColor(i, 0);
          return;
        }

        const idx = i * 3;
        this.positions[idx] = Math.cos(this.angle[i]) * this.radius[i];
        this.positions[idx + 1] = this.y[i];
        this.positions[idx + 2] = Math.sin(this.angle[i]) * this.radius[i];
        this.sizes[i] = 0.15 + Math.random() * 0.2;
        this.applyColor(i, this.age[i] / this.lifetime[i]);
      }

      applyColor(i, lifeNorm) {
        const theme = THEMES[currentTheme];
        const c = new THREE.Color();

        if (lifeNorm < 0.7) {
          const yNorm = THREE.MathUtils.clamp(
            this.positions[i * 3 + 1] / DEFAULTS.tornadoHeight,
            0, 1
          );
          c.copy(theme.base).lerp(theme.mid, yNorm);
        } else {
          c.copy(theme.mid).lerp(theme.death, (lifeNorm - 0.7) / 0.3);
        }

        const idx = i * 3;
        this.colors[idx] = c.r;
        this.colors[idx + 1] = c.g;
        this.colors[idx + 2] = c.b;
      }

      update(dt) {
        let maxY = 0;
        let activeCount = 0;

        for (let i = 0; i < this.count; i++) {
          if (!this.active[i]) continue;
          activeCount++;
          const idx = i * 3;

          this.age[i] += dt;

          if (this.age[i] >= this.lifetime[i]) {
            if (this.mode === 'tornado' || this.mode === 'ember') {
              this.resetParticle(i, false);
            } else if (this.mode === 'burst') {
              this.active[i] = 0;
              this.positions[idx] = 9999;
              this.positions[idx + 1] = 9999;
              this.positions[idx + 2] = 9999;
              continue;
            }
          }

          const lifeNorm = this.age[i] / this.lifetime[i];

          if (this.mode === 'tornado') {
            this.y[i] += this.riseSpeed[i] * dt;
            if (this.y[i] > DEFAULTS.tornadoHeight) {
              this.resetParticle(i, false);
              continue;
            }

            this.angle[i] += window.__3D_STATE__.windSpeed * dt;
            const t = this.y[i] / DEFAULTS.tornadoHeight;
            const targetRadius = THREE.MathUtils.lerp(DEFAULTS.tornadoBaseRadius, DEFAULTS.tornadoTopRadius, t);
            const wobble = 0.15 * Math.sin(this.age[i] * 8.0 + i * 0.1);
            this.radius[i] = targetRadius + wobble * (1.0 - t) * 0.6;

            this.positions[idx] = Math.cos(this.angle[i]) * this.radius[i];
            this.positions[idx + 1] = this.y[i];
            this.positions[idx + 2] = Math.sin(this.angle[i]) * this.radius[i];
          } else if (this.mode === 'ember') {
            this.positions[idx] += this.vx[i] * dt;
            this.positions[idx + 1] += this.vy[i] * dt;
            this.positions[idx + 2] += this.vz[i] * dt;
            this.vy[i] += 0.4 * dt;
          } else if (this.mode === 'burst') {
            this.positions[idx] += this.vx[i] * dt;
            this.positions[idx + 1] += this.vy[i] * dt;
            this.positions[idx + 2] += this.vz[i] * dt;
            this.vy[i] -= 2.0 * dt;
          }

          maxY = Math.max(maxY, this.positions[idx + 1]);
          this.applyColor(i, lifeNorm);
        }

        this.geometry.attributes.position.needsUpdate = true;
        this.geometry.attributes.color.needsUpdate = true;
        this.geometry.attributes.size.needsUpdate = true;
        return { activeCount, maxY };
      }

      updateGeometry() {
        this.geometry.attributes.position.needsUpdate = true;
        this.geometry.attributes.color.needsUpdate = true;
        this.geometry.attributes.size.needsUpdate = true;
      }

      dispose() {
        scene.remove(this.points);
        this.geometry.dispose();
        this.material.dispose();
      }
    }

    const tornadoSystem = new ParticleSystem(DEFAULTS.baseParticleCount, 'tornado');

    let emberSystem = null;
    let burstSystems = [];

    function enableEmberMode() {
      if (!emberSystem) {
        emberSystem = new ParticleSystem(DEFAULTS.emberExtraCount, 'ember');
      }
      emberSystem.setVisible(true);
      window.__3D_STATE__.emberMode = true;
    }

    function disableEmberMode() {
      if (emberSystem) emberSystem.setVisible(false);
      window.__3D_STATE__.emberMode = false;
    }

    function toggleEmberMode() {
      if (window.__3D_STATE__.emberMode) disableEmberMode();
      else enableEmberMode();
    }

    function spawnBurst(worldPos) {
      const burst = new ParticleSystem(DEFAULTS.burstParticleCount, 'burst');
      for (let i = 0; i < burst.count; i++) {
        burst.resetParticle(i, false, worldPos);
      }
      burst.updateGeometry();
      burstSystems.push(burst);
      window.__3D_STATE__.burstCount++;
    }

    function cycleTheme() {
      const idx = themeNames.indexOf(currentTheme);
      currentTheme = themeNames[(idx + 1) % themeNames.length];
      window.__3D_STATE__.colorTheme = currentTheme;
    }

    function resetAll() {
      window.__3D_STATE__.windSpeed = DEFAULTS.windSpeed;
      currentTheme = 'fire';
      window.__3D_STATE__.colorTheme = currentTheme;
      window.__3D_STATE__.paused = false;
      window.__3D_STATE__.helmetVisible = true;
      window.__3D_STATE__.burstCount = 0;
      if (helmet) helmet.visible = true;

      disableEmberMode();

      for (const b of burstSystems) b.dispose();
      burstSystems = [];

      for (let i = 0; i < tornadoSystem.count; i++) tornadoSystem.resetParticle(i, true);
      tornadoSystem.updateGeometry();
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const point = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(groundPlane, point)) {
        spawnBurst(point);
      }
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'w') {
        window.__3D_STATE__.windSpeed = Math.min(10.0, window.__3D_STATE__.windSpeed + 1.0);
      } else if (key === 's') {
        window.__3D_STATE__.windSpeed = Math.max(1.0, window.__3D_STATE__.windSpeed - 1.0);
      } else if (key === 'e') {
        toggleEmberMode();
      } else if (key === 'r') {
        resetAll();
      } else if (e.code === 'Space') {
        e.preventDefault();
        window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
      } else if (key === 't') {
        window.__3D_STATE__.helmetVisible = !window.__3D_STATE__.helmetVisible;
        if (helmet) helmet.visible = window.__3D_STATE__.helmetVisible;
      } else if (key === 'c') {
        cycleTheme();
      }
    });

    function updateHUD() {
      hud.textContent =
`Wind Speed: ${window.__3D_STATE__.windSpeed.toFixed(1)} rad/s
Active Particles: ${window.__3D_STATE__.particleCount}
Color Theme: ${window.__3D_STATE__.colorTheme}
Ember Mode: ${window.__3D_STATE__.emberMode ? 'ON' : 'OFF'}
Paused: ${window.__3D_STATE__.paused ? 'YES' : 'NO'}
Helmet Visible: ${window.__3D_STATE__.helmetVisible ? 'YES' : 'NO'}
Burst Count: ${window.__3D_STATE__.burstCount}`;
    }

    let fpsAccumulator = 0;
    let fpsFrames = 0;

    function animate() {
      requestAnimationFrame(animate);

      let dt = clock.getDelta();
      dt = Math.min(dt, 0.05);

      fpsAccumulator += dt;
      fpsFrames++;
      if (fpsAccumulator >= 0.5) {
        window.__3D_STATE__.fps = fpsFrames / fpsAccumulator;
        fpsAccumulator = 0;
        fpsFrames = 0;
      }

      let maxY = 0;
      let totalParticles = DEFAULTS.baseParticleCount;

      if (!window.__3D_STATE__.paused) {
        window.__3D_STATE__.elapsedTime += dt;

        if (helmet) {
          helmet.rotation.y += 0.3 * dt;
          window.__3D_STATE__.helmetRotationY = helmet.rotation.y;
        }

        const tornadoInfo = tornadoSystem.update(dt);
        maxY = Math.max(maxY, tornadoInfo.maxY);

        if (window.__3D_STATE__.emberMode && emberSystem) {
          const emberInfo = emberSystem.update(dt);
          maxY = Math.max(maxY, emberInfo.maxY);
          totalParticles += DEFAULTS.emberExtraCount;
        }

        for (let i = burstSystems.length - 1; i >= 0; i--) {
          const burst = burstSystems[i];
          const info = burst.update(dt);
          maxY = Math.max(maxY, info.maxY);
          totalParticles += info.activeCount;

          if (info.activeCount === 0) {
            burst.dispose();
            burstSystems.splice(i, 1);
          }
        }
      } else if (helmet) {
        window.__3D_STATE__.helmetRotationY = helmet.rotation.y;
        if (window.__3D_STATE__.emberMode && emberSystem) totalParticles += DEFAULTS.emberExtraCount;
        totalParticles += burstSystems.reduce((sum, b) => {
          let c = 0;
          for (let i = 0; i < b.count; i++) if (b.active[i]) c++;
          return sum + c;
        }, 0);
      }

      if (!helmet) window.__3D_STATE__.helmetRotationY = 0;

      window.__3D_STATE__.particleCount = totalParticles;
      window.__3D_STATE__.maxParticleY = maxY;
      window.__3D_STATE__.colorTheme = currentTheme;
      window.__3D_STATE__.helmetVisible = helmet ? helmet.visible : window.__3D_STATE__.helmetVisible;

      updateHUD();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    animate();
  </script>
</body>
</html>
