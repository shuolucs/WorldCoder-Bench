<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Weather Radar Visualization</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud-panel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 15, 30, 0.85);
    border: 1px solid rgba(0, 255, 136, 0.3);
    border-radius: 8px;
    padding: 16px 20px;
    color: #c0d0e0;
    font-size: 13px;
    min-width: 240px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
}

#hud-panel h2 {
    color: #00ff88;
    font-size: 15px;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(0, 255, 136, 0.2);
    padding-bottom: 8px;
}

.hud-row {
    margin: 6px 0;
    display: flex;
    justify-content: space-between;
}

.hud-label { color: #7a8a9a; }
.hud-value { color: #e0f0ff; font-weight: bold; }

.btn-row {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
}

.hud-btn {
    background: rgba(0, 255, 136, 0.1);
    border: 1px solid rgba(0, 255, 136, 0.4);
    color: #00ff88;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    transition: all 0.2s;
}

.hud-btn:hover {
    background: rgba(0, 255, 136, 0.25);
    border-color: #00ff88;
}

.hud-btn.active {
    background: rgba(0, 255, 136, 0.3);
    border-color: #00ff88;
    box-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
}

.hud-btn.inactive {
    background: rgba(255, 50, 50, 0.1);
    border-color: rgba(255, 50, 50, 0.4);
    color: #ff5555;
}

.separator {
    border-top: 1px solid rgba(0, 255, 136, 0.15);
    margin: 10px 0;
}
</style>
</head>
<body>

<div id="hud-panel">
    <h2>☁ Weather Radar</h2>
    <div class="hud-row">
        <span class="hud-label">Radar Mode:</span>
        <span class="hud-value" id="mode-display">Reflectivity</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Active Layers:</span>
        <span class="hud-value" id="layer-count">3/3</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Sweep Angle:</span>
        <span class="hud-value" id="sweep-angle">0°</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Timestamp:</span>
        <span class="hud-value" id="timestamp">2024-03-15 14:00 UTC</span>
    </div>
    <div class="separator"></div>
    <div class="btn-row">
        <button class="hud-btn active" id="btn-layer0" onclick="toggleLayer(0)">Low</button>
        <button class="hud-btn active" id="btn-layer1" onclick="toggleLayer(1)">Mid</button>
        <button class="hud-btn active" id="btn-layer2" onclick="toggleLayer(2)">High</button>
    </div>
    <div class="btn-row">
        <button class="hud-btn" id="btn-mode" onclick="cycleMode()">Cycle Mode</button>
        <button class="hud-btn" id="btn-pause" onclick="togglePause()">Pause</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ============ STATE ============
window.__3D_STATE__ = {
    sweepAngle: 0,
    isPaused: false,
    mode: 'Reflectivity',
    modeIndex: 0,
    layerVisible: [true, true, true],
    activeLayerCount: 3,
    totalPrecipitationBoxes: 62,
    sweepSpeed: 1.0,
    layerHeights: [5, 15, 25],
    cameraDistance: 0,
    frameCount: 0
};

const state = window.__3D_STATE__;
const modes = ['Reflectivity', 'Velocity', 'Composite'];

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 80, 120);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
directionalLight.position.set(50, 100, 50);
scene.add(directionalLight);

// ============ GROUND DISC ============
const groundGeom = new THREE.CircleGeometry(80, 64);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x1a2a1a, side: THREE.DoubleSide });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

// ============ CONCENTRIC RINGS ============
[20, 40, 60, 80].forEach(radius => {
    const segments = 64;
    const points = [];
    for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        points.push(new THREE.Vector3(Math.cos(angle) * radius, 0.05, Math.sin(angle) * radius));
    }
    const ringGeom = new THREE.BufferGeometry().setFromPoints(points);
    const ringMat = new THREE.LineBasicMaterial({ color: 0x2a3a2a });
    const ring = new THREE.LineLoop(ringGeom, ringMat);
    scene.add(ring);
});

// ============ CARDINAL LABELS ============
function createTextSprite(text, position) {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 40px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 32, 32);

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.copy(position);
    sprite.scale.set(6, 6, 1);
    return sprite;
}

scene.add(createTextSprite('N', new THREE.Vector3(0, 1, -85)));
scene.add(createTextSprite('S', new THREE.Vector3(0, 1, 85)));
scene.add(createTextSprite('E', new THREE.Vector3(85, 1, 0)));
scene.add(createTextSprite('W', new THREE.Vector3(-85, 1, 0)));

// ============ COLOR UTILITIES ============
function lerpColor(c1, c2, t) {
    const color1 = new THREE.Color(c1);
    const color2 = new THREE.Color(c2);
    return color1.lerp(color2, Math.min(1, Math.max(0, t)));
}

function getReflectivityColor(layerIndex, distRatio) {
    if (layerIndex === 0) return lerpColor(0x00ff00, 0xffff00, distRatio);
    if (layerIndex === 1) return lerpColor(0xffff00, 0xff8800, distRatio);
    return lerpColor(0xff8800, 0xff0000, distRatio);
}

function getVelocityColor(distRatio) {
    return lerpColor(0x0044ff, 0x00ffff, distRatio);
}

function getCompositeColor(distRatio) {
    const hue = distRatio * 0.8;
    const color = new THREE.Color();
    color.setHSL(hue, 1.0, 0.5);
    return color;
}

// ============ PRECIPITATION LAYERS ============
const layers = [];
const allBoxes = [];
const boxData = []; // store metadata for each box

function createPrecipitationLayer(layerIndex, count, maxRadius, minSize, maxSize, yPos, opacity) {
    const group = new THREE.Group();
    group.name = 'layer' + layerIndex;

    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * maxRadius;
        const size = minSize + Math.random() * (maxSize - minSize);
        const distRatio = dist / maxRadius;

        const geom = new THREE.BoxGeometry(size, size * 0.5, size);
        const color = getReflectivityColor(layerIndex, distRatio);

        const mat = new THREE.MeshPhongMaterial({
            color: color.clone(),
            transparent: true,
            opacity: opacity,
            emissive: new THREE.Color(0x000000),
            emissiveIntensity: 0
        });

        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.set(
            Math.cos(angle) * dist,
            yPos + (Math.random() - 0.5) * 2,
            Math.sin(angle) * dist
        );
        mesh.rotation.y = Math.random() * Math.PI;

        group.add(mesh);
        allBoxes.push(mesh);
        boxData.push({
            layerIndex: layerIndex,
            distRatio: distRatio,
            baseOpacity: opacity,
            pulseTime: 0,
            angle: Math.atan2(mesh.position.z, mesh.position.x),
            dist: Math.sqrt(mesh.position.x * mesh.position.x + mesh.position.z * mesh.position.z)
        });
    }

    scene.add(group);
    layers.push(group);
    return group;
}

createPrecipitationLayer(0, 30, 60, 3, 5, 5, 0.6);
createPrecipitationLayer(1, 20, 45, 4, 7, 15, 0.5);
createPrecipitationLayer(2, 12, 30, 5, 9, 25, 0.4);

// ============ RADAR SWEEP ============
function createSweepMesh() {
    const sweepAngle = 5 * (Math.PI / 180);
    const radius = 80;
    const segments = 16;
    const vertices = [0, 0, 0];
    const indices = [];

    for (let i = 0; i <= segments; i++) {
        const a = -sweepAngle / 2 + (i / segments) * sweepAngle;
        vertices.push(Math.cos(a) * radius, 0, Math.sin(a) * radius);
    }

    const vArray = new Float32Array(vertices);
    for (let i = 0; i < segments; i++) {
        indices.push(0, i + 1, i + 2);
    }

    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(vArray, 3));
    geom.setIndex(indices);
    geom.computeVertexNormals();

    const mat = new THREE.MeshBasicMaterial({
        color: 0x00ff88,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide,
        depthWrite: false
    });

    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.y = 0.5;
    return mesh;
}

const sweepMesh = createSweepMesh();
scene.add(sweepMesh);

// ============ UPDATE COLORS BASED ON MODE ============
function updateBoxColors() {
    for (let i = 0; i < allBoxes.length; i++) {
        const box = allBoxes[i];
        const data = boxData[i];
        let color;

        if (state.mode === 'Reflectivity') {
            color = getReflectivityColor(data.layerIndex, data.distRatio);
        } else if (state.mode === 'Velocity') {
            color = getVelocityColor(data.distRatio);
        } else {
            color = getCompositeColor(data.distRatio);
        }

        box.material.color.copy(color);
    }
}

// ============ UI FUNCTIONS ============
function toggleLayer(index) {
    state.layerVisible[index] = !state.layerVisible[index];
    layers[index].visible = state.layerVisible[index];

    const btn = document.getElementById('btn-layer' + index);
    if (state.layerVisible[index]) {
        btn.classList.add('active');
        btn.classList.remove('inactive');
    } else {
        btn.classList.remove('active');
        btn.classList.add('inactive');
    }

    state.activeLayerCount = state.layerVisible.filter(v => v).length;
    document.getElementById('layer-count').textContent = state.activeLayerCount + '/3';
}

function cycleMode() {
    state.modeIndex = (state.modeIndex + 1) % 3;
    state.mode = modes[state.modeIndex];
    document.getElementById('mode-display').textContent = state.mode;
    updateBoxColors();
}

function togglePause() {
    state.isPaused = !state.isPaused;
    document.getElementById('btn-pause').textContent = state.isPaused ? 'Resume' : 'Pause';
}

// Make functions globally accessible
window.toggleLayer = toggleLayer;
window.cycleMode = cycleMode;
window.togglePause = togglePause;

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
    if (e.key === '1') toggleLayer(0);
    else if (e.key === '2') toggleLayer(1);
    else if (e.key === '3') toggleLayer(2);
    else if (e.key === 'm' || e.key === 'M') cycleMode();
    else if (e.key === ' ') { e.preventDefault(); togglePause(); }
});

// ============ ANIMATION ============
const clock = new THREE.Clock();
let sweepAngleRad = 0;

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    state.frameCount++;

    // Update controls
    controls.update();

    // Camera distance
    state.cameraDistance = camera.position.length();

    // Sweep rotation
    if (!state.isPaused) {
        sweepAngleRad += state.sweepSpeed * delta;
        if (sweepAngleRad > Math.PI * 2) sweepAngleRad -= Math.PI * 2;
        sweepMesh.rotation.y = sweepAngleRad;
    }

    // Update sweep angle in degrees
    let angleDeg = (sweepAngleRad * 180 / Math.PI) % 360;
    if (angleDeg < 0) angleDeg += 360;
    state.sweepAngle = Math.round(angleDeg * 10) / 10;
    document.getElementById('sweep-angle').textContent = Math.round(state.sweepAngle) + '°';

    // Sweep detection and pulse
    const sweepHalfAngle = 2.5 * (Math.PI / 180);
    const currentSweepAngle = sweepAngleRad;

    for (let i = 0; i < allBoxes.length; i++) {
        const box = allBoxes[i];
        const data = boxData[i];

        // Check if sweep passes over this box
        let boxAngle = data.angle;
        if (boxAngle < 0) boxAngle += Math.PI * 2;

        let sweepNorm = currentSweepAngle % (Math.PI * 2);
        if (sweepNorm < 0) sweepNorm += Math.PI * 2;

        let diff = Math.abs(boxAngle - sweepNorm);
        if (diff > Math.PI) diff = Math.PI * 2 - diff;

        if (diff < sweepHalfAngle && !state.isPaused && data.dist <= 80) {
            data.pulseTime = 0.3;
        }

        // Update pulse
        if (data.pulseTime > 0) {
            data.pulseTime -= delta;
            const pulseIntensity = Math.max(0, data.pulseTime / 0.3);
            box.material.emissive.setHex(0xffffff);
            box.material.emissiveIntensity = pulseIntensity * 0.5;
        } else {
            box.material.emissiveIntensity = 0;
        }
    }

    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
animate();
</script>
</body>
</html>
