<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Weather Radar Visualization</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: #d8f0ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #hud-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      padding: 12px 14px;
      background: rgba(10, 16, 28, 0.78);
      border: 1px solid rgba(120, 180, 220, 0.25);
      border-radius: 10px;
      min-width: 240px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
    }

    #hud-panel .line {
      margin: 4px 0;
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    #hud-panel .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    #hud-panel button {
      background: rgba(30, 60, 90, 0.85);
      color: #e8f8ff;
      border: 1px solid rgba(150, 220, 255, 0.25);
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s ease, transform 0.1s ease, opacity 0.2s ease;
    }

    #hud-panel button:hover {
      background: rgba(45, 90, 130, 0.95);
    }

    #hud-panel button:active {
      transform: scale(0.98);
    }

    #hud-panel button.inactive {
      opacity: 0.45;
      background: rgba(55, 55, 70, 0.8);
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud-panel">
      <div class="line">Radar Mode: <span id="mode-display">Reflectivity</span></div>
      <div class="line">Active Layers: <span id="layer-count">3/3</span></div>
      <div class="line">Sweep Angle: <span id="sweep-angle">0°</span></div>
      <div class="line">Timestamp: <span id="timestamp">2024-03-15 14:00 UTC</span></div>
      <div class="buttons">
        <button id="btn-layer0">Low</button>
        <button id="btn-layer1">Mid</button>
        <button id="btn-layer2">High</button>
      </div>
      <div class="buttons">
        <button id="btn-mode">Cycle Mode</button>
        <button id="btn-pause">Pause</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const app = document.getElementById('app');

    const modeDisplay = document.getElementById('mode-display');
    const layerCountEl = document.getElementById('layer-count');
    const sweepAngleEl = document.getElementById('sweep-angle');
    const timestampEl = document.getElementById('timestamp');
    const btnLayer0 = document.getElementById('btn-layer0');
    const btnLayer1 = document.getElementById('btn-layer1');
    const btnLayer2 = document.getElementById('btn-layer2');
    const btnMode = document.getElementById('btn-mode');
    const btnPause = document.getElementById('btn-pause');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 80, 120);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
    directionalLight.position.set(50, 100, 50);
    scene.add(directionalLight);

    const groundRadius = 80;

    // Ground disc
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(groundRadius, 96),
      new THREE.MeshPhongMaterial({ color: 0x1a2a1a, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // Ring outlines
    [20, 40, 60, 80].forEach(r => {
      const points = [];
      const segs = 128;
      for (let i = 0; i < segs; i++) {
        const a = (i / segs) * Math.PI * 2;
        points.push(new THREE.Vector3(Math.cos(a) * r, 0.05, Math.sin(a) * r));
      }
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.LineLoop(
        geo,
        new THREE.LineBasicMaterial({ color: 0x2a3a2a })
      );
      scene.add(line);
    });

    // Cardinal labels
    function makeTextSprite(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = 'bold 120px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#bfe8ff';
      ctx.strokeStyle = 'rgba(10,20,30,0.9)';
      ctx.lineWidth = 10;
      ctx.strokeText(text, canvas.width / 2, canvas.height / 2);
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(10, 10, 1);
      return sprite;
    }

    const cardinalData = [
      { text: 'N', pos: new THREE.Vector3(0, 3, -groundRadius - 3) },
      { text: 'S', pos: new THREE.Vector3(0, 3, groundRadius + 3) },
      { text: 'E', pos: new THREE.Vector3(groundRadius + 3, 3, 0) },
      { text: 'W', pos: new THREE.Vector3(-groundRadius - 3, 3, 0) },
    ];

    cardinalData.forEach(d => {
      const sprite = makeTextSprite(d.text);
      sprite.position.copy(d.pos);
      scene.add(sprite);
    });

    // State
    const layerHeights = [5, 15, 25];
    const modes = ['Reflectivity', 'Velocity', 'Composite'];

    const state = {
      sweepAngle: 0,
      isPaused: false,
      mode: 'Reflectivity',
      modeIndex: 0,
      layerVisible: [true, true, true],
      activeLayerCount: 3,
      totalPrecipitationBoxes: 62,
      sweepSpeed: 1.0,
      layerHeights: [...layerHeights],
      cameraDistance: camera.position.length(),
      frameCount: 0
    };

    window.__3D_STATE__ = state;

    // Utility
    function lerpColor(hex1, hex2, t) {
      const c1 = new THREE.Color(hex1);
      const c2 = new THREE.Color(hex2);
      return c1.lerp(c2, THREE.MathUtils.clamp(t, 0, 1));
    }

    function rainbowColor(t) {
      const color = new THREE.Color();
      color.setHSL((0.75 - 0.75 * THREE.MathUtils.clamp(t, 0, 1)), 1.0, 0.5);
      return color;
    }

    function velocityColor(t) {
      return lerpColor(0x2255ff, 0x00ffff, t);
    }

    function reflectivityColorForLayer(layerIndex, t) {
      if (layerIndex === 0) return lerpColor(0x00ff00, 0xffff00, t);
      if (layerIndex === 1) return lerpColor(0xffff00, 0xff8800, t);
      return lerpColor(0xff8800, 0xff0000, t);
    }

    const precipitationBoxes = [];
    const layerGroups = [];

    function randomPointInCircle(maxRadius) {
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.sqrt(Math.random()) * maxRadius;
      return {
        x: Math.cos(angle) * radius,
        z: Math.sin(angle) * radius,
        r: radius
      };
    }

    function createLayer(layerIndex, count, y, minSize, maxSize, maxRadius, opacity) {
      const group = new THREE.Group();
      group.name = `layer${layerIndex}`;

      for (let i = 0; i < count; i++) {
        const size = THREE.MathUtils.randFloat(minSize, maxSize);
        const geometry = new THREE.BoxGeometry(size, size * THREE.MathUtils.randFloat(0.7, 1.4), size);
        const p = randomPointInCircle(maxRadius);
        const t = p.r / maxRadius;

        const baseColor = reflectivityColorForLayer(layerIndex, t);
        const material = new THREE.MeshPhongMaterial({
          color: baseColor.clone(),
          transparent: true,
          opacity,
          emissive: baseColor.clone().multiplyScalar(0.12),
          emissiveIntensity: 1.0
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(
          p.x,
          y + THREE.MathUtils.randFloat(-1.2, 1.2),
          p.z
        );
        mesh.rotation.y = Math.random() * Math.PI * 2;
        mesh.rotation.x = THREE.MathUtils.randFloat(-0.2, 0.2);
        mesh.rotation.z = THREE.MathUtils.randFloat(-0.2, 0.2);

        mesh.userData = {
          layerIndex,
          radialT: t,
          pulseUntil: 0,
          defaultEmissiveIntensity: 1.0,
          pulseIntensity: 2.8
        };

        group.add(mesh);
        precipitationBoxes.push(mesh);
      }

      scene.add(group);
      layerGroups.push(group);
      return group;
    }

    createLayer(0, 30, 5, 3, 5, 60, 0.6);
    createLayer(1, 20, 15, 4, 7, 45, 0.5);
    createLayer(2, 12, 25, 5, 9, 30, 0.4);

    function applyModeColors() {
      precipitationBoxes.forEach(mesh => {
        const { layerIndex, radialT } = mesh.userData;
        let c;

        if (state.mode === 'Reflectivity') {
          c = reflectivityColorForLayer(layerIndex, radialT);
        } else if (state.mode === 'Velocity') {
          c = velocityColor(radialT);
        } else {
          c = rainbowColor(radialT);
        }

        mesh.material.color.copy(c);
        mesh.material.emissive.copy(c).multiplyScalar(0.12);
      });

      modeDisplay.textContent = state.mode;
    }

    // Radar sweep
    const sweepGroup = new THREE.Group();
    const sweepAngleWidth = THREE.MathUtils.degToRad(5);

    const sweepShape = new THREE.Shape();
    sweepShape.moveTo(0, 0);
    const arcSegments = 24;
    for (let i = 0; i <= arcSegments; i++) {
      const a = -sweepAngleWidth / 2 + (i / arcSegments) * sweepAngleWidth;
      sweepShape.lineTo(Math.cos(a) * groundRadius, Math.sin(a) * groundRadius);
    }
    sweepShape.lineTo(0, 0);

    const sweepGeometry = new THREE.ShapeGeometry(sweepShape);
    const sweepMaterial = new THREE.MeshBasicMaterial({
      color: 0x00ff88,
      transparent: true,
      opacity: 0.3,
      side: THREE.DoubleSide,
      depthWrite: false
    });

    const sweepMesh = new THREE.Mesh(sweepGeometry, sweepMaterial);
    sweepMesh.rotation.x = -Math.PI / 2;
    sweepMesh.position.y = 0.5;
    sweepGroup.add(sweepMesh);
    scene.add(sweepGroup);

    const clock = new THREE.Clock();

    function normalizeAngleRad(a) {
      a = a % (Math.PI * 2);
      if (a < 0) a += Math.PI * 2;
      return a;
    }

    function shortestAngleDiff(a, b) {
      let diff = normalizeAngleRad(a) - normalizeAngleRad(b);
      if (diff > Math.PI) diff -= Math.PI * 2;
      if (diff < -Math.PI) diff += Math.PI * 2;
      return diff;
    }

    function triggerSweepPulses(nowSec) {
      const sweepHeading = normalizeAngleRad(sweepGroup.rotation.y);
      const halfWidth = sweepAngleWidth * 0.8;

      for (const mesh of precipitationBoxes) {
        if (!layerGroups[mesh.userData.layerIndex].visible) continue;

        const angle = normalizeAngleRad(Math.atan2(mesh.position.z, mesh.position.x));
        const diff = Math.abs(shortestAngleDiff(angle, sweepHeading));
        if (diff <= halfWidth) {
          mesh.userData.pulseUntil = Math.max(mesh.userData.pulseUntil, nowSec + 0.3);
        }
      }
    }

    function updatePulses(nowSec) {
      precipitationBoxes.forEach(mesh => {
        const active = nowSec < mesh.userData.pulseUntil;
        mesh.material.emissiveIntensity = active
          ? mesh.userData.pulseIntensity
          : mesh.userData.defaultEmissiveIntensity;
      });
    }

    function updateLayerCount() {
      state.activeLayerCount = state.layerVisible.filter(Boolean).length;
      layerCountEl.textContent = `${state.activeLayerCount}/3`;
    }

    function syncLayerButtons() {
      [btnLayer0, btnLayer1, btnLayer2].forEach((btn, i) => {
        btn.classList.toggle('inactive', !state.layerVisible[i]);
      });
    }

    function setLayerVisible(index, visible) {
      state.layerVisible[index] = visible;
      layerGroups[index].visible = visible;
      updateLayerCount();
      syncLayerButtons();
    }

    function toggleLayer(index) {
      setLayerVisible(index, !state.layerVisible[index]);
    }

    function cycleMode() {
      state.modeIndex = (state.modeIndex + 1) % modes.length;
      state.mode = modes[state.modeIndex];
      applyModeColors();
    }

    function togglePause() {
      state.isPaused = !state.isPaused;
      btnPause.textContent = state.isPaused ? 'Resume' : 'Pause';
    }

    btnLayer0.addEventListener('click', () => toggleLayer(0));
    btnLayer1.addEventListener('click', () => toggleLayer(1));
    btnLayer2.addEventListener('click', () => toggleLayer(2));
    btnMode.addEventListener('click', cycleMode);
    btnPause.addEventListener('click', togglePause);

    window.addEventListener('keydown', (e) => {
      if (e.key === '1') toggleLayer(0);
      if (e.key === '2') toggleLayer(1);
      if (e.key === '3') toggleLayer(2);
      if (e.key.toLowerCase() === 'm') cycleMode();
      if (e.code === 'Space') {
        e.preventDefault();
        togglePause();
      }
    });

    function updateHUD() {
      sweepAngleEl.textContent = `${Math.round(state.sweepAngle)}°`;
      modeDisplay.textContent = state.mode;
      timestampEl.textContent = '2024-03-15 14:00 UTC';
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      const elapsed = clock.elapsedTime;

      if (!state.isPaused) {
        sweepGroup.rotation.y += state.sweepSpeed * dt;
        sweepGroup.rotation.y = normalizeAngleRad(sweepGroup.rotation.y);
        triggerSweepPulses(elapsed);
      }

      updatePulses(elapsed);
      controls.update();

      state.sweepAngle = (THREE.MathUtils.radToDeg(normalizeAngleRad(sweepGroup.rotation.y)) + 360) % 360;
      state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      state.frameCount += 1;
      state.activeLayerCount = state.layerVisible.filter(Boolean).length;

      updateHUD();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Init sync
    applyModeColors();
    updateLayerCount();
    syncLayerButtons();
    updateHUD();

    animate();
  </script>
</body>
</html>
