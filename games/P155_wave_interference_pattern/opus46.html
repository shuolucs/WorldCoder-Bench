<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Wave Interference Pattern</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #111122; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #controlPanel {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(10, 10, 30, 0.85);
    padding: 16px 20px;
    border-radius: 10px;
    color: #ccd;
    font-size: 13px;
    min-width: 280px;
    border: 1px solid rgba(100, 120, 200, 0.3);
    backdrop-filter: blur(5px);
    max-height: 95vh;
    overflow-y: auto;
  }

  #controlPanel h2 {
    margin-bottom: 12px;
    color: #88aaff;
    font-size: 16px;
    border-bottom: 1px solid rgba(100, 120, 200, 0.3);
    padding-bottom: 8px;
  }

  .control-group {
    margin-bottom: 10px;
  }

  .control-group label {
    display: block;
    margin-bottom: 3px;
    color: #99aabb;
    font-size: 12px;
  }

  .control-group .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-group input[type="range"] {
    flex: 1;
    accent-color: #4488ff;
    cursor: pointer;
  }

  .control-group .value-display {
    min-width: 40px;
    text-align: right;
    color: #88ccff;
    font-weight: bold;
    font-size: 13px;
  }

  .btn {
    padding: 6px 14px;
    border: 1px solid rgba(100, 120, 200, 0.5);
    background: rgba(40, 50, 100, 0.6);
    color: #aabbee;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    margin-right: 6px;
    margin-top: 4px;
    transition: background 0.2s;
  }

  .btn:hover {
    background: rgba(60, 80, 160, 0.8);
    color: #fff;
  }

  .readout {
    margin-top: 10px;
    padding: 8px 10px;
    background: rgba(0, 0, 20, 0.5);
    border-radius: 5px;
    font-size: 12px;
    line-height: 1.8;
  }

  .readout span {
    color: #88ccff;
    font-weight: bold;
  }

  .info-text {
    margin-top: 8px;
    font-size: 11px;
    color: #667;
    font-style: italic;
  }
</style>
</head>
<body>

<div id="controlPanel">
  <h2>🌊 Wave Interference</h2>

  <div class="control-group">
    <label>Frequency (cycles/s)</label>
    <div class="slider-row">
      <input type="range" id="frequencySlider" min="0.5" max="3.0" step="0.1" value="1.0">
      <span class="value-display" id="frequencyValue">1.0</span>
    </div>
  </div>

  <div class="control-group">
    <label>Wavelength</label>
    <div class="slider-row">
      <input type="range" id="wavelengthSlider" min="3.0" max="15.0" step="0.5" value="8.0">
      <span class="value-display" id="wavelengthValue">8.0</span>
    </div>
  </div>

  <div class="control-group">
    <label>Amplitude</label>
    <div class="slider-row">
      <input type="range" id="amplitudeSlider" min="0.5" max="4.0" step="0.1" value="2.0">
      <span class="value-display" id="amplitudeValue">2.0</span>
    </div>
  </div>

  <div class="control-group">
    <label>Source Separation</label>
    <div class="slider-row">
      <input type="range" id="separationSlider" min="4.0" max="30.0" step="1.0" value="20.0">
      <span class="value-display" id="separationValue">20.0</span>
    </div>
  </div>

  <div style="margin-top: 10px;">
    <button class="btn" id="toggleSource2">Disable Source 2</button>
    <button class="btn" id="resetBtn">Reset</button>
  </div>

  <div class="readout">
    Time: <span id="timeDisplay">0.0</span> s<br>
    Max Displacement: <span id="maxDisplacement">0.00</span><br>
    Min Displacement: <span id="minDisplacement">0.00</span>
  </div>

  <div class="info-text">
    Spacebar: Pause/Resume | Mouse: Orbit/Zoom
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// --- State ---
let frequency = 1.0;
let wavelength = 8.0;
let amplitude = 2.0;
let separation = 20.0;
let source2Active = true;
let paused = false;
let elapsedTime = 0.0;
let maxY = 0;
let minY = 0;

// Expose state
window.__3D_STATE__ = {
  frequency, wavelength, amplitude, separation,
  source2Active, paused, elapsedTime,
  maxY: 0, minY: 0,
  source1Pos: { x: -10, y: 0, z: 0 },
  source2Pos: { x: 10, y: 0, z: 0 },
  vertexCount: 0
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 30, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// Wave surface
const gridSize = 80;
const segments = 200;
const geometry = new THREE.PlaneGeometry(gridSize, gridSize, segments, segments);
geometry.rotateX(-Math.PI / 2); // lay flat in XZ plane

const material = new THREE.MeshPhongMaterial({
  color: 0x2266aa,
  side: THREE.DoubleSide,
  flatShading: false,
  shininess: 60,
  specular: 0x224466
});

const waveMesh = new THREE.Mesh(geometry, material);
scene.add(waveMesh);

const vertexCount = geometry.attributes.position.count;
window.__3D_STATE__.vertexCount = vertexCount;

// Store original XZ positions
const posAttr = geometry.attributes.position;
const origX = new Float32Array(vertexCount);
const origZ = new Float32Array(vertexCount);
for (let i = 0; i < vertexCount; i++) {
  origX[i] = posAttr.getX(i);
  origZ[i] = posAttr.getZ(i);
}

// Source markers
const markerGeo = new THREE.SphereGeometry(0.5, 16, 16);
const markerMat = new THREE.MeshPhongMaterial({ color: 0xff3333, emissive: 0x661111 });

const source1Marker = new THREE.Mesh(markerGeo, markerMat);
source1Marker.name = 'source1Marker';
scene.add(source1Marker);

const source2Marker = new THREE.Mesh(markerGeo, markerMat);
source2Marker.name = 'source2Marker';
scene.add(source2Marker);

function updateSourcePositions() {
  const half = separation / 2;
  source1Marker.position.set(-half, 0.5, 0);
  source2Marker.position.set(half, 0.5, 0);
  source2Marker.visible = source2Active;

  window.__3D_STATE__.source1Pos = { x: -half, y: 0, z: 0 };
  window.__3D_STATE__.source2Pos = { x: half, y: 0, z: 0 };
}
updateSourcePositions();

// --- UI Bindings ---
const frequencySlider = document.getElementById('frequencySlider');
const wavelengthSlider = document.getElementById('wavelengthSlider');
const amplitudeSlider = document.getElementById('amplitudeSlider');
const separationSlider = document.getElementById('separationSlider');
const toggleSource2Btn = document.getElementById('toggleSource2');
const resetBtn = document.getElementById('resetBtn');

const frequencyValue = document.getElementById('frequencyValue');
const wavelengthValue = document.getElementById('wavelengthValue');
const amplitudeValue = document.getElementById('amplitudeValue');
const separationValue = document.getElementById('separationValue');
const timeDisplay = document.getElementById('timeDisplay');
const maxDisplacementEl = document.getElementById('maxDisplacement');
const minDisplacementEl = document.getElementById('minDisplacement');

frequencySlider.addEventListener('input', () => {
  frequency = parseFloat(frequencySlider.value);
  frequencyValue.textContent = frequency.toFixed(1);
});

wavelengthSlider.addEventListener('input', () => {
  wavelength = parseFloat(wavelengthSlider.value);
  wavelengthValue.textContent = wavelength.toFixed(1);
});

amplitudeSlider.addEventListener('input', () => {
  amplitude = parseFloat(amplitudeSlider.value);
  amplitudeValue.textContent = amplitude.toFixed(1);
});

separationSlider.addEventListener('input', () => {
  separation = parseFloat(separationSlider.value);
  separationValue.textContent = separation.toFixed(1);
  updateSourcePositions();
});

toggleSource2Btn.addEventListener('click', () => {
  source2Active = !source2Active;
  toggleSource2Btn.textContent = source2Active ? 'Disable Source 2' : 'Enable Source 2';
  updateSourcePositions();
});

resetBtn.addEventListener('click', () => {
  frequency = 1.0; frequencySlider.value = 1.0; frequencyValue.textContent = '1.0';
  wavelength = 8.0; wavelengthSlider.value = 8.0; wavelengthValue.textContent = '8.0';
  amplitude = 2.0; amplitudeSlider.value = 2.0; amplitudeValue.textContent = '2.0';
  separation = 20.0; separationSlider.value = 20.0; separationValue.textContent = '20.0';
  source2Active = true;
  toggleSource2Btn.textContent = 'Disable Source 2';
  paused = false;
  elapsedTime = 0;
  updateSourcePositions();
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    paused = !paused;
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation ---
let lastTimestamp = null;

function animate(timestamp) {
  requestAnimationFrame(animate);

  if (lastTimestamp === null) lastTimestamp = timestamp;
  const dt = (timestamp - lastTimestamp) / 1000;
  lastTimestamp = timestamp;

  if (!paused) {
    elapsedTime += dt;
  }

  // Wave parameters
  const k = (2 * Math.PI) / wavelength;
  const omega = 2 * Math.PI * frequency;
  const halfSep = separation / 2;
  const s1x = -halfSep;
  const s1z = 0;
  const s2x = halfSep;
  const s2z = 0;

  let frameMaxY = -Infinity;
  let frameMinY = Infinity;

  for (let i = 0; i < vertexCount; i++) {
    const vx = origX[i];
    const vz = origZ[i];

    // Distance from source 1
    const dx1 = vx - s1x;
    const dz1 = vz - s1z;
    const dist1 = Math.sqrt(dx1 * dx1 + dz1 * dz1);
    const atten1 = 1.0 / (1.0 + 0.05 * dist1);
    let y = amplitude * atten1 * Math.sin(k * dist1 - omega * elapsedTime);

    // Source 2
    if (source2Active) {
      const dx2 = vx - s2x;
      const dz2 = vz - s2z;
      const dist2 = Math.sqrt(dx2 * dx2 + dz2 * dz2);
      const atten2 = 1.0 / (1.0 + 0.05 * dist2);
      y += amplitude * atten2 * Math.sin(k * dist2 - omega * elapsedTime);
    }

    posAttr.setY(i, y);

    if (y > frameMaxY) frameMaxY = y;
    if (y < frameMinY) frameMinY = y;
  }

  posAttr.needsUpdate = true;
  geometry.computeVertexNormals();

  maxY = frameMaxY;
  minY = frameMinY;

  // Update source marker Y to sit on surface
  source1Marker.position.y = 0.5;
  source2Marker.position.y = 0.5;

  // Update HUD
  timeDisplay.textContent = elapsedTime.toFixed(1);
  maxDisplacementEl.textContent = maxY.toFixed(2);
  minDisplacementEl.textContent = minY.toFixed(2);

  // Update global state
  const st = window.__3D_STATE__;
  st.frequency = frequency;
  st.wavelength = wavelength;
  st.amplitude = amplitude;
  st.separation = separation;
  st.source2Active = source2Active;
  st.paused = paused;
  st.elapsedTime = elapsedTime;
  st.maxY = maxY;
  st.minY = minY;
  st.source1Pos = { x: -halfSep, y: 0, z: 0 };
  st.source2Pos = { x: halfSep, y: 0, z: 0 };
  st.vertexCount = vertexCount;

  controls.update();
  renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
