<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Wave Interference Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111122;
            font-family: sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #controlPanel {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(17, 17, 34, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            width: 320px;
            box-sizing: border-box;
            z-index: 10;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 14px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            background-color: #2266aa;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #3388cc;
        }
        .readout {
            font-size: 14px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }
        .readout div {
            margin-bottom: 4px;
        }
        .instructions {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
            text-align: center;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="controlPanel">
        <div class="control-group">
            <label>Frequency (Hz) <span id="freqVal">1.0</span></label>
            <input type="range" id="frequencySlider" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>Wavelength <span id="waveVal">8.0</span></label>
            <input type="range" id="wavelengthSlider" min="3.0" max="15.0" step="0.5" value="8.0">
        </div>
        <div class="control-group">
            <label>Amplitude <span id="ampVal">2.0</span></label>
            <input type="range" id="amplitudeSlider" min="0.5" max="4.0" step="0.1" value="2.0">
        </div>
        <div class="control-group">
            <label>Source Separation <span id="sepVal">20.0</span></label>
            <input type="range" id="separationSlider" min="4.0" max="30.0" step="1.0" value="20.0">
        </div>
        <button id="toggleSource2">Disable Source 2</button>
        <button id="resetBtn">Reset Parameters</button>
        
        <div class="readout">
            <div>Max Displacement: <span id="maxDisplacement">0.00</span></div>
            <div>Time: <span id="timeDisplay">0.0</span> s</div>
        </div>
        <div class="instructions">
            Spacebar: Pause/Resume<br>
            Left Click: Rotate | Right Click: Pan | Scroll: Zoom
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        const state = {
            frequency: 1.0,
            wavelength: 8.0,
            amplitude: 2.0,
            separation: 20.0,
            source2Active: true,
            paused: false,
            elapsedTime: 0,
            maxY: 0,
            minY: 0,
            source1Pos: { x: -10, y: 0, z: 0 },
            source2Pos: { x: 10, y: 0, z: 0 },
            vertexCount: 0
        };
        window.__3D_STATE__ = state;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#111122');

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // --- Geometry & Material ---
        const segments = 200;
        const size = 80;
        const geometry = new THREE.PlaneGeometry(size, size, segments, segments);
        geometry.rotateX(-Math.PI / 2); // Lay flat on XZ plane
        
        state.vertexCount = geometry.attributes.position.count;

        // Store base positions for calculations
        const basePositions = new Float32Array(state.vertexCount * 2); // Store x and z
        const posAttr = geometry.attributes.position;
        for (let i = 0; i < state.vertexCount; i++) {
            basePositions[i * 2] = posAttr.getX(i);
            basePositions[i * 2 + 1] = posAttr.getZ(i);
        }

        const material = new THREE.MeshPhongMaterial({
            color: 0x2266aa,
            side: THREE.DoubleSide,
            flatShading: false,
            shininess: 60,
            specular: 0x444444
        });

        const waveMesh = new THREE.Mesh(geometry, material);
        scene.add(waveMesh);

        // --- Source Markers ---
        const markerGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const markerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        
        const source1Marker = new THREE.Mesh(markerGeo, markerMat);
        source1Marker.name = 'source1Marker';
        scene.add(source1Marker);

        const source2Marker = new THREE.Mesh(markerGeo, markerMat);
        source2Marker.name = 'source2Marker';
        scene.add(source2Marker);

        function updateMarkerPositions() {
            const halfSep = state.separation / 2;
            state.source1Pos.x = -halfSep;
            state.source2Pos.x = halfSep;
            
            source1Marker.position.set(state.source1Pos.x, state.source1Pos.y, state.source1Pos.z);
            source2Marker.position.set(state.source2Pos.x, state.source2Pos.y, state.source2Pos.z);
        }
        updateMarkerPositions();

        // --- UI Elements & Event Listeners ---
        const freqSlider = document.getElementById('frequencySlider');
        const waveSlider = document.getElementById('wavelengthSlider');
        const ampSlider = document.getElementById('amplitudeSlider');
        const sepSlider = document.getElementById('separationSlider');
        const toggleBtn = document.getElementById('toggleSource2');
        const resetBtn = document.getElementById('resetBtn');
        
        const freqVal = document.getElementById('freqVal');
        const waveVal = document.getElementById('waveVal');
        const ampVal = document.getElementById('ampVal');
        const sepVal = document.getElementById('sepVal');
        
        const maxDispUI = document.getElementById('maxDisplacement');
        const timeUI = document.getElementById('timeDisplay');

        freqSlider.addEventListener('input', (e) => {
            state.frequency = parseFloat(e.target.value);
            freqVal.textContent = state.frequency.toFixed(1);
        });

        waveSlider.addEventListener('input', (e) => {
            state.wavelength = parseFloat(e.target.value);
            waveVal.textContent = state.wavelength.toFixed(1);
        });

        ampSlider.addEventListener('input', (e) => {
            state.amplitude = parseFloat(e.target.value);
            ampVal.textContent = state.amplitude.toFixed(1);
        });

        sepSlider.addEventListener('input', (e) => {
            state.separation = parseFloat(e.target.value);
            sepVal.textContent = state.separation.toFixed(1);
            updateMarkerPositions();
        });

        toggleBtn.addEventListener('click', () => {
            state.source2Active = !state.source2Active;
            toggleBtn.textContent = state.source2Active ? 'Disable Source 2' : 'Enable Source 2';
            source2Marker.visible = state.source2Active;
        });

        resetBtn.addEventListener('click', () => {
            state.frequency = 1.0;
            state.wavelength = 8.0;
            state.amplitude = 2.0;
            state.separation = 20.0;
            state.source2Active = true;
            state.paused = false;
            
            freqSlider.value = state.frequency;
            waveSlider.value = state.wavelength;
            ampSlider.value = state.amplitude;
            sepSlider.value = state.separation;
            
            freqVal.textContent = state.frequency.toFixed(1);
            waveVal.textContent = state.wavelength.toFixed(1);
            ampVal.textContent = state.amplitude.toFixed(1);
            sepVal.textContent = state.separation.toFixed(1);
            
            toggleBtn.textContent = 'Disable Source 2';
            source2Marker.visible = true;
            
            updateMarkerPositions();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                state.paused = !state.paused;
                e.preventDefault();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const currentTime = performance.now();
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            if (!state.paused) {
                state.elapsedTime += deltaTime;
            }

            // Physics / Wave Calculation
            const k = (2 * Math.PI) / state.wavelength;
            const omega = 2 * Math.PI * state.frequency;
            const t = state.elapsedTime;
            const A = state.amplitude;
            
            const s1x = state.source1Pos.x;
            const s1z = state.source1Pos.z;
            const s2x = state.source2Pos.x;
            const s2z = state.source2Pos.z;
            const s2Active = state.source2Active;

            let currentMaxY = -Infinity;
            let currentMinY = Infinity;

            const positions = geometry.attributes.position.array;

            for (let i = 0; i < state.vertexCount; i++) {
                const x = basePositions[i * 2];
                const z = basePositions[i * 2 + 1];

                // Source 1
                const dx1 = x - s1x;
                const dz1 = z - s1z;
                const dist1 = Math.sqrt(dx1 * dx1 + dz1 * dz1);
                const atten1 = A / (1 + 0.05 * dist1);
                let y = atten1 * Math.sin(k * dist1 - omega * t);

                // Source 2
                if (s2Active) {
                    const dx2 = x - s2x;
                    const dz2 = z - s2z;
                    const dist2 = Math.sqrt(dx2 * dx2 + dz2 * dz2);
                    const atten2 = A / (1 + 0.05 * dist2);
                    y += atten2 * Math.sin(k * dist2 - omega * t);
                }

                // Update Y position (array index: x=0, y=1, z=2)
                positions[i * 3 + 1] = y;

                if (y > currentMaxY) currentMaxY = y;
                if (y < currentMinY) currentMinY = y;
            }

            geometry.attributes.position.needsUpdate = true;
            geometry.computeVertexNormals();

            // Update State & UI
            state.maxY = currentMaxY;
            state.minY = currentMinY;
            
            maxDispUI.textContent = currentMaxY.toFixed(2);
            timeUI.textContent = state.elapsedTime.toFixed(1);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
