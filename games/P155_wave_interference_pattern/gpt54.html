<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Wave Interference Pattern - Three.js</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111122;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #controlPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 310px;
      padding: 14px;
      background: rgba(10, 10, 20, 0.75);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #controlPanel h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .value-label {
      color: #9fd3ff;
      font-weight: bold;
      margin-left: 6px;
    }

    input[type="range"] {
      width: 100%;
    }

    button {
      margin-top: 6px;
      margin-right: 8px;
      padding: 8px 10px;
      background: #2b4c6f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #3b6797;
    }

    .readout {
      margin-top: 8px;
      font-size: 14px;
      color: #d9ecff;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #aabbd0;
    }
  </style>
</head>
<body>
  <div id="controlPanel">
    <h2>Wave Interference Controls</h2>

    <div class="control-group">
      <label>
        Frequency:
        <span id="frequencyValue" class="value-label">1.0</span>
      </label>
      <input id="frequencySlider" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
    </div>

    <div class="control-group">
      <label>
        Wavelength:
        <span id="wavelengthValue" class="value-label">8.0</span>
      </label>
      <input id="wavelengthSlider" type="range" min="3.0" max="15.0" step="0.5" value="8.0" />
    </div>

    <div class="control-group">
      <label>
        Amplitude:
        <span id="amplitudeValue" class="value-label">2.0</span>
      </label>
      <input id="amplitudeSlider" type="range" min="0.5" max="4.0" step="0.1" value="2.0" />
    </div>

    <div class="control-group">
      <label>
        Source Separation:
        <span id="separationValue" class="value-label">20.0</span>
      </label>
      <input id="separationSlider" type="range" min="4.0" max="30.0" step="1.0" value="20.0" />
    </div>

    <div class="control-group">
      <button id="toggleSource2">Disable Source 2</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="readout" id="maxDisplacement">Max displacement: 0.00</div>
    <div class="readout" id="timeDisplay">Elapsed time: 0.0 s</div>
    <div class="hint">Press <b>Space</b> to pause/resume.</div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#111122");

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 30, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    const planeSize = 80;
    const segments = 200;
    const geometry = new THREE.PlaneGeometry(planeSize, planeSize, segments, segments);
    geometry.rotateX(-Math.PI / 2);

    const positionAttr = geometry.attributes.position;
    const basePositions = new Float32Array(positionAttr.array.length);
    basePositions.set(positionAttr.array);

    const material = new THREE.MeshPhongMaterial({
      color: "#2266aa",
      side: THREE.DoubleSide,
      flatShading: false,
      shininess: 70
    });

    const waveMesh = new THREE.Mesh(geometry, material);
    scene.add(waveMesh);

    const markerGeometry = new THREE.SphereGeometry(0.5, 20, 20);
    const markerMaterial = new THREE.MeshPhongMaterial({ color: 0xff3333 });

    const source1Marker = new THREE.Mesh(markerGeometry, markerMaterial);
    source1Marker.name = "source1Marker";
    scene.add(source1Marker);

    const source2Marker = new THREE.Mesh(markerGeometry, markerMaterial);
    source2Marker.name = "source2Marker";
    scene.add(source2Marker);

    const defaults = {
      amplitude: 2.0,
      wavelength: 8.0,
      frequency: 1.0,
      separation: 20.0,
      source2Active: true
    };

    let amplitude = defaults.amplitude;
    let wavelength = defaults.wavelength;
    let frequency = defaults.frequency;
    let separation = defaults.separation;
    let source2Active = defaults.source2Active;
    let paused = false;
    let elapsedTime = 0;

    const frequencySlider = document.getElementById("frequencySlider");
    const wavelengthSlider = document.getElementById("wavelengthSlider");
    const amplitudeSlider = document.getElementById("amplitudeSlider");
    const separationSlider = document.getElementById("separationSlider");
    const toggleSource2Btn = document.getElementById("toggleSource2");
    const resetBtn = document.getElementById("resetBtn");

    const frequencyValue = document.getElementById("frequencyValue");
    const wavelengthValue = document.getElementById("wavelengthValue");
    const amplitudeValue = document.getElementById("amplitudeValue");
    const separationValue = document.getElementById("separationValue");
    const maxDisplacementReadout = document.getElementById("maxDisplacement");
    const timeDisplay = document.getElementById("timeDisplay");

    function updateSourceMarkers() {
      const halfSep = separation / 2;
      source1Marker.position.set(-halfSep, 0.5, 0);
      source2Marker.position.set(halfSep, 0.5, 0);
      source2Marker.visible = source2Active;
    }

    function updateUIButtonLabels() {
      frequencyValue.textContent = frequency.toFixed(1);
      wavelengthValue.textContent = wavelength.toFixed(1);
      amplitudeValue.textContent = amplitude.toFixed(1);
      separationValue.textContent = separation.toFixed(1);
      toggleSource2Btn.textContent = source2Active ? "Disable Source 2" : "Enable Source 2";
    }

    function resetControls() {
      amplitude = defaults.amplitude;
      wavelength = defaults.wavelength;
      frequency = defaults.frequency;
      separation = defaults.separation;
      source2Active = true;
      paused = false;
      elapsedTime = 0;

      amplitudeSlider.value = amplitude.toFixed(1);
      wavelengthSlider.value = wavelength.toFixed(1);
      frequencySlider.value = frequency.toFixed(1);
      separationSlider.value = separation.toFixed(1);

      updateSourceMarkers();
      updateUIButtonLabels();
    }

    frequencySlider.addEventListener("input", (e) => {
      frequency = parseFloat(e.target.value);
      updateUIButtonLabels();
    });

    wavelengthSlider.addEventListener("input", (e) => {
      wavelength = parseFloat(e.target.value);
      updateUIButtonLabels();
    });

    amplitudeSlider.addEventListener("input", (e) => {
      amplitude = parseFloat(e.target.value);
      updateUIButtonLabels();
    });

    separationSlider.addEventListener("input", (e) => {
      separation = parseFloat(e.target.value);
      updateSourceMarkers();
      updateUIButtonLabels();
    });

    toggleSource2Btn.addEventListener("click", () => {
      source2Active = !source2Active;
      updateSourceMarkers();
      updateUIButtonLabels();
    });

    resetBtn.addEventListener("click", () => {
      resetControls();
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        paused = !paused;
      }
    });

    updateSourceMarkers();
    updateUIButtonLabels();

    const clock = new THREE.Clock();
    let lastMaxY = 0;
    let lastMinY = 0;

    function updateWaveSurface(time) {
      const positions = positionAttr.array;
      const k = (2 * Math.PI) / wavelength;
      const omega = 2 * Math.PI * frequency;

      const source1X = -separation / 2;
      const source2X = separation / 2;
      const sourceZ = 0;

      let maxY = -Infinity;
      let minY = Infinity;

      for (let i = 0; i < positions.length; i += 3) {
        const x = basePositions[i];
        const z = basePositions[i + 2];

        const dx1 = x - source1X;
        const dz1 = z - sourceZ;
        const d1 = Math.sqrt(dx1 * dx1 + dz1 * dz1);
        const atten1 = amplitude / (1 + 0.05 * d1);
        const y1 = atten1 * Math.sin(k * d1 - omega * time);

        let totalY = y1;

        if (source2Active) {
          const dx2 = x - source2X;
          const dz2 = z - sourceZ;
          const d2 = Math.sqrt(dx2 * dx2 + dz2 * dz2);
          const atten2 = amplitude / (1 + 0.05 * d2);
          const y2 = atten2 * Math.sin(k * d2 - omega * time);
          totalY += y2;
        }

        positions[i + 1] = totalY;

        if (totalY > maxY) maxY = totalY;
        if (totalY < minY) minY = totalY;
      }

      positionAttr.needsUpdate = true;
      geometry.computeVertexNormals();

      lastMaxY = maxY;
      lastMinY = minY;

      maxDisplacementReadout.textContent = `Max displacement: ${maxY.toFixed(2)}`;
      timeDisplay.textContent = `Elapsed time: ${elapsedTime.toFixed(1)} s`;

      window.__3D_STATE__ = {
        frequency,
        wavelength,
        amplitude,
        separation,
        source2Active,
        paused,
        elapsedTime,
        maxY: maxY,
        minY: minY,
        source1Pos: { x: source1X, y: 0, z: 0 },
        source2Pos: { x: source2X, y: 0, z: 0 },
        vertexCount: positionAttr.count
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      if (!paused) {
        elapsedTime += delta;
      }

      updateWaveSurface(elapsedTime);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.__3D_STATE__ = {
      frequency,
      wavelength,
      amplitude,
      separation,
      source2Active,
      paused,
      elapsedTime,
      maxY: lastMaxY,
      minY: lastMinY,
      source1Pos: { x: -separation / 2, y: 0, z: 0 },
      source2Pos: { x: separation / 2, y: 0, z: 0 },
      vertexCount: positionAttr.count
    };
  </script>
</body>
</html>
