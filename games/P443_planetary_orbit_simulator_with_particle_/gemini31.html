<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetary Orbit Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(10, 15, 30, 0.75);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            font-size: 14px;
            line-height: 1.6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #hud-panel div {
            margin-bottom: 5px;
        }
        #hud-panel span {
            font-weight: bold;
            color: #4da6ff;
        }
        #planet-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 15, 30, 0.85);
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #4da6ff;
            pointer-events: none;
            display: none;
            text-align: center;
            min-width: 250px;
            box-shadow: 0 0 15px rgba(77, 166, 255, 0.3);
        }
        #planet-info h2 {
            margin: 0 0 10px 0;
            color: #ffaa00;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 20px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .info-label {
            color: #aaa;
        }
        .info-value {
            font-weight: bold;
            font-family: monospace;
            font-size: 15px;
        }
        #controls-help {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(10, 15, 30, 0.6);
            color: #ccc;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            text-align: right;
            line-height: 1.5;
        }
        kbd {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            color: #fff;
            font-family: monospace;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud-panel">
        <div>Speed: <span id="speed-display">1.00x</span></div>
        <div>Status: <span id="status-display">Running</span></div>
        <div>Trails: <span id="trails-display">ON</span></div>
        <div>Gravity Lines: <span id="gravity-display">OFF</span></div>
    </div>

    <div id="controls-help">
        <kbd>Space</kbd> Pause/Resume<br>
        <kbd>↑</kbd> / <kbd>↓</kbd> Adjust Speed<br>
        <kbd>Click</kbd> Select Planet<br>
        <kbd>R</kbd> Reset<br>
        <kbd>T</kbd> Toggle Trails<br>
        <kbd>G</kbd> Toggle Gravity
    </div>

    <div id="planet-info">
        <h2 id="pi-name">Planet Name</h2>
        <div class="info-row"><span class="info-label">Orbital Radius:</span> <span class="info-value" id="pi-radius">0</span></div>
        <div class="info-row"><span class="info-label">Orbital Period:</span> <span class="info-value" id="pi-period">0</span></div>
        <div class="info-row"><span class="info-label">Current Angle:</span> <span class="info-value" id="pi-angle">0°</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            paused: false,
            speedMultiplier: 1.0,
            trailsEnabled: true,
            gravityLinesEnabled: false,
            selectedPlanet: null,
            planetAngles: { mercury: 0, earth: 0, mars: 0 },
            planetPositions: { 
                mercury: {x:0, y:0, z:0}, 
                earth: {x:0, y:0, z:0}, 
                mars: {x:0, y:0, z:0} 
            },
            robotLoaded: false,
            planetCount: 3,
            frameCount: 0,
            trailParticleCounts: { mercury: 0, earth: 0, mars: 0 }
        };

        // --- DOM Elements ---
        const uiSpeed = document.getElementById('speed-display');
        const uiStatus = document.getElementById('status-display');
        const uiTrails = document.getElementById('trails-display');
        const uiGravity = document.getElementById('gravity-display');
        const uiPlanetInfo = document.getElementById('planet-info');
        const uiPiName = document.getElementById('pi-name');
        const uiPiRadius = document.getElementById('pi-radius');
        const uiPiPeriod = document.getElementById('pi-period');
        const uiPiAngle = document.getElementById('pi-angle');

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 80);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 2.0, 300);
        pointLight.position.set(0, 0, 0);
        scene.add(pointLight);

        // --- Starfield Background ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 500;
        const starPos = new Float32Array(starCount * 3);
        for(let i=0; i<starCount; i++) {
            // Random point in sphere r=300
            const r = 300 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starPos[i*3+2] = r * Math.cos(phi);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, sizeAttenuation: true });
        const starMesh = new THREE.Points(starGeo, starMat);
        scene.add(starMesh);

        // --- Central Star ---
        const sunGeo = new THREE.SphereGeometry(5, 32, 32);
        const sunMat = new THREE.MeshStandardMaterial({ 
            color: 0xffaa00, 
            emissive: 0xffaa00,
            emissiveIntensity: 1
        });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        // Sun Glow Sprite
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
        gradient.addColorStop(0, 'rgba(255, 170, 0, 1)');
        gradient.addColorStop(0.3, 'rgba(255, 100, 0, 0.5)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 256, 256);
        const glowTexture = new THREE.CanvasTexture(canvas);
        const glowMat = new THREE.SpriteMaterial({ 
            map: glowTexture, 
            color: 0xffffff, 
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false
        });
        const glowSprite = new THREE.Sprite(glowMat);
        glowSprite.scale.set(25, 25, 1);
        sun.add(glowSprite);

        // --- Planets Setup ---
        const planetDefs = [
            { id: 'mercury', name: 'Mercury', radius: 1, color: 0xaaaaaa, orbitR: 15, speed: 0.02 },
            { id: 'earth', name: 'Earth', radius: 1.5, color: 0x3366ff, orbitR: 30, speed: 0.012 },
            { id: 'mars', name: 'Mars', radius: 1.2, color: 0xff4422, orbitR: 45, speed: 0.008 }
        ];

        const planets = [];
        const interactableObjects = [];
        const MAX_TRAIL_POINTS = 200;

        // Custom Shader for Trails (handles per-vertex alpha)
        const trailVertexShader = `
            attribute float alpha;
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
                vColor = color;
                vAlpha = alpha;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 4.0 * (100.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        const trailFragmentShader = `
            varying vec3 vColor;
            varying float vAlpha;
            void main() {
                vec2 coord = gl_PointCoord - vec2(0.5);
                if(length(coord) > 0.5) discard;
                gl_FragColor = vec4(vColor, vAlpha);
            }
        `;

        planetDefs.forEach(def => {
            // Planet Mesh
            const geo = new THREE.SphereGeometry(def.radius, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ color: def.color, roughness: 0.7, metalness: 0.2 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.userData = { ...def, currentAngle: 0 };
            scene.add(mesh);
            interactableObjects.push(mesh);

            // Highlight Wireframe (hidden by default)
            const wireGeo = new THREE.SphereGeometry(def.radius * 1.1, 16, 16);
            const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.5 });
            const wireMesh = new THREE.Mesh(wireGeo, wireMat);
            wireMesh.visible = false;
            mesh.add(wireMesh);
            mesh.userData.highlight = wireMesh;

            // Trail Setup
            const trailGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(MAX_TRAIL_POINTS * 3);
            const colors = new Float32Array(MAX_TRAIL_POINTS * 3);
            const alphas = new Float32Array(MAX_TRAIL_POINTS);
            
            const c = new THREE.Color(def.color);
            for(let i=0; i<MAX_TRAIL_POINTS; i++) {
                colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
                alphas[i] = 0; // Initially invisible
            }

            trailGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            trailGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            trailGeo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

            const trailMat = new THREE.ShaderMaterial({
                vertexShader: trailVertexShader,
                fragmentShader: trailFragmentShader,
                transparent: true,
                depthWrite: false,
                vertexColors: true
            });

            const trail = new THREE.Points(trailGeo, trailMat);
            scene.add(trail);

            // Gravity Line Setup
            const lineGeo = new THREE.BufferGeometry();
            lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
            const lineMat = new THREE.LineDashedMaterial({
                color: def.color,
                linewidth: 1,
                scale: 1,
                dashSize: 1,
                gapSize: 1,
                transparent: true,
                opacity: 0.5
            });
            const gravityLine = new THREE.Line(lineGeo, lineMat);
            gravityLine.visible = false;
            scene.add(gravityLine);

            planets.push({
                mesh,
                trail,
                gravityLine,
                trailPositions: [], // Store history of Vector3
                def
            });
        });

        // --- Robot Assistant ---
        const loader = new GLTFLoader();
        loader.load('robot.glb', (gltf) => {
            const robot = gltf.scene;
            robot.position.set(60, 0, 0);
            robot.scale.set(3, 3, 3);
            
            // Add a subtle floating animation to the robot
            robot.userData.startY = robot.position.y;
            robot.userData.timeOffset = Math.random() * 100;
            
            scene.add(robot);
            window.__3D_STATE__.robotLoaded = true;
            
            // Store reference for animation
            planets.robot = robot;
        }, undefined, (error) => {
            // Silently fail if model not found, as per instructions to not break
            window.__3D_STATE__.robotLoaded = false;
        });

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateHUD() {
            uiSpeed.textContent = window.__3D_STATE__.speedMultiplier.toFixed(2) + 'x';
            uiStatus.textContent = window.__3D_STATE__.paused ? 'Paused' : 'Running';
            uiStatus.style.color = window.__3D_STATE__.paused ? '#ff5555' : '#4da6ff';
            uiTrails.textContent = window.__3D_STATE__.trailsEnabled ? 'ON' : 'OFF';
            uiGravity.textContent = window.__3D_STATE__.gravityLinesEnabled ? 'ON' : 'OFF';

            const selId = window.__3D_STATE__.selectedPlanet;
            if (selId) {
                const p = planets.find(p => p.def.id === selId);
                if (p) {
                    uiPlanetInfo.style.display = 'block';
                    uiPiName.textContent = p.def.name;
                    uiPiName.style.color = '#' + p.def.color.toString(16).padStart(6, '0');
                    uiPiRadius.textContent = p.def.orbitR;
                    
                    const periodFrames = (2 * Math.PI) / p.def.speed;
                    uiPiPeriod.textContent = periodFrames.toFixed(0) + ' frames';
                    
                    let deg = (p.mesh.userData.currentAngle * 180 / Math.PI) % 360;
                    if (deg < 0) deg += 360;
                    uiPiAngle.textContent = deg.toFixed(1) + '°';
                }
            } else {
                uiPlanetInfo.style.display = 'none';
            }
        }

        function selectPlanet(mesh) {
            // Deselect all
            planets.forEach(p => p.mesh.userData.highlight.visible = false);
            
            if (mesh) {
                mesh.userData.highlight.visible = true;
                window.__3D_STATE__.selectedPlanet = mesh.userData.id;
            } else {
                window.__3D_STATE__.selectedPlanet = null;
            }
            updateHUD();
        }

        window.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableObjects);

            if (intersects.length > 0) {
                selectPlanet(intersects[0].object);
            } else {
                selectPlanet(null);
            }
        });

        window.addEventListener('keydown', (event) => {
            const state = window.__3D_STATE__;
            switch(event.code) {
                case 'Space':
                    state.paused = !state.paused;
                    break;
                case 'ArrowUp':
                    state.speedMultiplier = Math.min(4.0, state.speedMultiplier + 0.25);
                    break;
                case 'ArrowDown':
                    state.speedMultiplier = Math.max(0.25, state.speedMultiplier - 0.25);
                    break;
                case 'KeyR':
                    // Reset
                    state.paused = false;
                    state.speedMultiplier = 1.0;
                    selectPlanet(null);
                    planets.forEach(p => {
                        p.mesh.userData.currentAngle = 0;
                        p.trailPositions = [];
                        const alphas = p.trail.geometry.attributes.alpha.array;
                        for(let i=0; i<MAX_TRAIL_POINTS; i++) alphas[i] = 0;
                        p.trail.geometry.attributes.alpha.needsUpdate = true;
                    });
                    break;
                case 'KeyT':
                    state.trailsEnabled = !state.trailsEnabled;
                    planets.forEach(p => p.trail.visible = state.trailsEnabled);
                    break;
                case 'KeyG':
                    state.gravityLinesEnabled = !state.gravityLinesEnabled;
                    planets.forEach(p => p.gravityLine.visible = state.gravityLinesEnabled);
                    break;
            }
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const state = window.__3D_STATE__;
            state.frameCount++;

            controls.update();

            // Animate Robot if loaded
            if (planets.robot) {
                planets.robot.position.y = planets.robot.userData.startY + Math.sin(state.frameCount * 0.02 + planets.robot.userData.timeOffset) * 2;
                planets.robot.rotation.y += 0.005;
            }

            planets.forEach(p => {
                const ud = p.mesh.userData;
                
                // Physics Update
                if (!state.paused) {
                    ud.currentAngle += ud.speed * state.speedMultiplier;
                }

                const x = ud.orbitR * Math.cos(ud.currentAngle);
                const z = ud.orbitR * Math.sin(ud.currentAngle);
                p.mesh.position.set(x, 0, z);
                p.mesh.rotation.y += 0.01; // Self rotation

                // Update State Object
                state.planetAngles[ud.id] = ud.currentAngle;
                state.planetPositions[ud.id].x = x;
                state.planetPositions[ud.id].y = 0;
                state.planetPositions[ud.id].z = z;

                // Trail Update
                if (!state.paused) {
                    p.trailPositions.unshift(p.mesh.position.clone());
                    if (p.trailPositions.length > MAX_TRAIL_POINTS) {
                        p.trailPositions.pop();
                    }
                }

                state.trailParticleCounts[ud.id] = p.trailPositions.length;

                if (state.trailsEnabled) {
                    const posAttr = p.trail.geometry.attributes.position;
                    const alphaAttr = p.trail.geometry.attributes.alpha;
                    
                    for (let i = 0; i < MAX_TRAIL_POINTS; i++) {
                        if (i < p.trailPositions.length) {
                            posAttr.setXYZ(i, p.trailPositions[i].x, p.trailPositions[i].y, p.trailPositions[i].z);
                            // Fade out based on index
                            alphaAttr.setX(i, 1.0 - (i / MAX_TRAIL_POINTS));
                        } else {
                            alphaAttr.setX(i, 0);
                        }
                    }
                    posAttr.needsUpdate = true;
                    alphaAttr.needsUpdate = true;
                }

                // Gravity Line Update
                if (state.gravityLinesEnabled) {
                    const linePos = p.gravityLine.geometry.attributes.position;
                    linePos.setXYZ(0, 0, 0, 0); // Star
                    linePos.setXYZ(1, x, 0, z); // Planet
                    linePos.needsUpdate = true;
                    p.gravityLine.computeLineDistances();
                }
            });

            // Update HUD if a planet is selected (to update angle in real-time)
            if (state.selectedPlanet && !state.paused) {
                updateHUD();
            }

            renderer.render(scene, camera);
        }

        // Initialize HUD and start
        updateHUD();
        animate();
    </script>
</body>
</html>
