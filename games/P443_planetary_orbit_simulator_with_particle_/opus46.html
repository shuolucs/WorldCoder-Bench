<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planetary Orbit Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 16px 22px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    z-index: 10;
    min-width: 220px;
  }

  #hud-panel .label {
    color: #888;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #hud-panel .value {
    color: #fff;
    font-weight: bold;
  }

  #planet-info {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.8);
    color: #e0e0e0;
    padding: 16px 28px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(255, 170, 0, 0.4);
    backdrop-filter: blur(10px);
    z-index: 10;
    display: none;
    text-align: center;
    min-width: 300px;
  }

  #planet-info .planet-name {
    font-size: 18px;
    font-weight: bold;
    color: #ffaa00;
    margin-bottom: 4px;
  }

  #controls-help {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.6);
    color: #888;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.7;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.1);
  }

  #controls-help kbd {
    background: rgba(255,255,255,0.15);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: monospace;
    color: #ccc;
  }
</style>
</head>
<body>

<div id="hud-panel">
  <div><span class="label">Speed: </span><span class="value" id="speed-display">1.0x</span></div>
  <div><span class="label">Status: </span><span class="value" id="status-display">Running</span></div>
  <div><span class="label">Trails: </span><span class="value" id="trails-display">ON</span></div>
  <div><span class="label">Gravity Lines: </span><span class="value" id="gravity-display">OFF</span></div>
</div>

<div id="planet-info">
  <div class="planet-name" id="info-name"></div>
  <div id="info-details"></div>
</div>

<div id="controls-help">
  <kbd>Space</kbd> Pause/Resume<br>
  <kbd>↑</kbd><kbd>↓</kbd> Speed ±0.25x<br>
  <kbd>Click</kbd> Select planet<br>
  <kbd>R</kbd> Reset<br>
  <kbd>T</kbd> Toggle trails<br>
  <kbd>G</kbd> Toggle gravity lines
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── State ───
window.__3D_STATE__ = {
  paused: false,
  speedMultiplier: 1.0,
  trailsEnabled: true,
  gravityLinesEnabled: false,
  selectedPlanet: null,
  planetAngles: { mercury: 0, earth: 0, mars: 0 },
  planetPositions: {
    mercury: { x: 0, y: 0, z: 0 },
    earth: { x: 0, y: 0, z: 0 },
    mars: { x: 0, y: 0, z: 0 }
  },
  robotLoaded: false,
  planetCount: 3,
  frameCount: 0,
  trailParticleCounts: { mercury: 0, earth: 0, mars: 0 }
};

const state = window.__3D_STATE__;

// ─── Renderer ───
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ─── Scene ───
const scene = new THREE.Scene();

// ─── Camera ───
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 50, 80);
camera.lookAt(0, 0, 0);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 20;
controls.maxDistance = 250;

// ─── Lighting ───
const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 2.0, 300);
pointLight.position.set(0, 0, 0);
scene.add(pointLight);

// ─── Central Star ───
const starGeometry = new THREE.SphereGeometry(5, 64, 64);
const starMaterial = new THREE.MeshStandardMaterial({
  color: 0xffaa00,
  emissive: 0xffaa00,
  emissiveIntensity: 2.0,
  roughness: 0.2,
  metalness: 0.0
});
const star = new THREE.Mesh(starGeometry, starMaterial);
scene.add(star);

// Star glow sprite
const glowCanvas = document.createElement('canvas');
glowCanvas.width = 256;
glowCanvas.height = 256;
const glowCtx = glowCanvas.getContext('2d');
const gradient = glowCtx.createRadialGradient(128, 128, 0, 128, 128, 128);
gradient.addColorStop(0, 'rgba(255, 200, 50, 1.0)');
gradient.addColorStop(0.2, 'rgba(255, 170, 0, 0.6)');
gradient.addColorStop(0.5, 'rgba(255, 100, 0, 0.2)');
gradient.addColorStop(1, 'rgba(255, 50, 0, 0.0)');
glowCtx.fillStyle = gradient;
glowCtx.fillRect(0, 0, 256, 256);

const glowTexture = new THREE.CanvasTexture(glowCanvas);
const glowMaterial = new THREE.SpriteMaterial({
  map: glowTexture,
  color: 0xffaa00,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  opacity: 0.8
});
const glowSprite = new THREE.Sprite(glowMaterial);
glowSprite.scale.set(30, 30, 1);
scene.add(glowSprite);

// ─── Starfield Background ───
const starfieldCount = 500;
const starfieldPositions = new Float32Array(starfieldCount * 3);
for (let i = 0; i < starfieldCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 150 + Math.random() * 150;
  starfieldPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  starfieldPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  starfieldPositions[i * 3 + 2] = r * Math.cos(phi);
}
const starfieldGeometry = new THREE.BufferGeometry();
starfieldGeometry.setAttribute('position', new THREE.BufferAttribute(starfieldPositions, 3));
const starfieldMaterial = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.8,
  sizeAttenuation: true,
  transparent: true,
  opacity: 0.9
});
const starfield = new THREE.Points(starfieldGeometry, starfieldMaterial);
scene.add(starfield);

// ─── Orbital Rings (visual guides) ───
function createOrbitRing(radius) {
  const segments = 128;
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const angle = (i / segments) * Math.PI * 2;
    points.push(new THREE.Vector3(radius * Math.cos(angle), 0, radius * Math.sin(angle)));
  }
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({ color: 0x333344, transparent: true, opacity: 0.3 });
  return new THREE.Line(geometry, material);
}

scene.add(createOrbitRing(15));
scene.add(createOrbitRing(30));
scene.add(createOrbitRing(45));

// ─── Planets ───
const TRAIL_MAX = 200;

const planetDefs = [
  { name: 'Mercury', key: 'mercury', radius: 1, color: 0xaaaaaa, orbitalRadius: 15, orbitalSpeed: 0.02 },
  { name: 'Earth', key: 'earth', radius: 1.5, color: 0x3366ff, orbitalRadius: 30, orbitalSpeed: 0.012 },
  { name: 'Mars', key: 'mars', radius: 1.2, color: 0xff4422, orbitalRadius: 45, orbitalSpeed: 0.008 }
];

const planets = [];
const raycasterTargets = [];

planetDefs.forEach(def => {
  // Planet mesh
  const geo = new THREE.SphereGeometry(def.radius, 32, 32);
  const mat = new THREE.MeshStandardMaterial({
    color: def.color,
    roughness: 0.6,
    metalness: 0.3
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData.planetKey = def.key;
  mesh.userData.planetName = def.name;
  scene.add(mesh);
  raycasterTargets.push(mesh);

  // Wireframe overlay (for selection)
  const wireGeo = new THREE.SphereGeometry(def.radius * 1.15, 16, 16);
  const wireMat = new THREE.MeshBasicMaterial({
    color: 0xffff00,
    wireframe: true,
    transparent: true,
    opacity: 0.7
  });
  const wireframe = new THREE.Mesh(wireGeo, wireMat);
  wireframe.visible = false;
  mesh.add(wireframe);

  // Trail
  const trailPositions = new Float32Array(TRAIL_MAX * 3);
  const trailOpacities = new Float32Array(TRAIL_MAX);
  const trailGeo = new THREE.BufferGeometry();
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
  trailGeo.setAttribute('opacity', new THREE.BufferAttribute(trailOpacities, 1));

  const trailMat = new THREE.ShaderMaterial({
    uniforms: {
      uColor: { value: new THREE.Color(def.color) }
    },
    vertexShader: `
      attribute float opacity;
      varying float vOpacity;
      void main() {
        vOpacity = opacity;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = max(1.0, 3.0 * (100.0 / -mvPosition.z));
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      varying float vOpacity;
      void main() {
        float dist = length(gl_PointCoord - vec2(0.5));
        if (dist > 0.5) discard;
        float alpha = vOpacity * (1.0 - dist * 2.0);
        gl_FragColor = vec4(uColor, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const trailPoints = new THREE.Points(trailGeo, trailMat);
  scene.add(trailPoints);

  // Gravity line
  const gravLineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, 0, 0)
  ]);
  const gravLineMat = new THREE.LineDashedMaterial({
    color: def.color,
    dashSize: 2,
    gapSize: 1,
    transparent: true,
    opacity: 0.5
  });
  const gravLine = new THREE.Line(gravLineGeo, gravLineMat);
  gravLine.visible = false;
  scene.add(gravLine);

  planets.push({
    ...def,
    mesh,
    wireframe,
    angle: 0,
    trailPoints,
    trailGeo,
    trailPositions,
    trailOpacities,
    trailIndex: 0,
    trailCount: 0,
    gravLine,
    gravLineGeo
  });
});

// ─── Robot Assistant ───
const gltfLoader = new GLTFLoader();
let robotModel = null;

gltfLoader.load(
  'robot.glb',
  (gltf) => {
    robotModel = gltf.scene;
    robotModel.position.set(60, 0, 0);
    robotModel.scale.set(3, 3, 3);
    scene.add(robotModel);
    state.robotLoaded = true;
    console.log('Robot model loaded successfully');
  },
  undefined,
  (error) => {
    console.warn('Could not load robot.glb:', error.message || error);
    state.robotLoaded = false;

    // Create a placeholder robot
    const robotGroup = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(3, 4, 2);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x5588cc, metalness: 0.7, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 2;
    robotGroup.add(body);

    // Head
    const headGeo = new THREE.BoxGeometry(2.5, 2.5, 2);
    const headMat = new THREE.MeshStandardMaterial({ color: 0x6699dd, metalness: 0.7, roughness: 0.3 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 5.5;
    robotGroup.add(head);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.35, 16, 16);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 1.5 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.6, 5.7, 1.05);
    robotGroup.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.6, 5.7, 1.05);
    robotGroup.add(rightEye);

    // Antenna
    const antennaGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.5, 8);
    const antennaMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
    const antenna = new THREE.Mesh(antennaGeo, antennaMat);
    antenna.position.set(0, 7.5, 0);
    robotGroup.add(antenna);

    const antennaTipGeo = new THREE.SphereGeometry(0.25, 16, 16);
    const antennaTipMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff3333, emissiveIntensity: 1.0 });
    const antennaTip = new THREE.Mesh(antennaTipGeo, antennaTipMat);
    antennaTip.position.set(0, 8.3, 0);
    robotGroup.add(antennaTip);

    // Arms
    const armGeo = new THREE.BoxGeometry(0.6, 3, 0.6);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x5588cc, metalness: 0.6, roughness: 0.4 });
    const leftArm = new THREE.Mesh(armGeo, armMat);
    leftArm.position.set(-2.3, 2, 0);
    robotGroup.add(leftArm);
    const rightArm = new THREE.Mesh(armGeo, armMat);
    rightArm.position.set(2.3, 2, 0);
    robotGroup.add(rightArm);

    // Legs
    const legGeo = new THREE.BoxGeometry(0.8, 2.5, 0.8);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x4477bb, metalness: 0.6, roughness: 0.4 });
    const leftLeg = new THREE.Mesh(legGeo, legMat);
    leftLeg.position.set(-0.8, -1.25, 0);
    robotGroup.add(leftLeg);
    const rightLeg = new THREE.Mesh(legGeo, legMat);
    rightLeg.position.set(0.8, -1.25, 0);
    robotGroup.add(rightLeg);

    robotGroup.position.set(60, 0, 0);
    robotGroup.scale.set(1, 1, 1);
    scene.add(robotGroup);
    robotModel = robotGroup;
  }
);

// ─── Raycaster ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(raycasterTargets);

  // Deselect all
  planets.forEach(p => p.wireframe.visible = false);
  state.selectedPlanet = null;
  document.getElementById('planet-info').style.display = 'none';

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const key = hit.userData.planetKey;
    if (key) {
      const planet = planets.find(p => p.key === key);
      if (planet) {
        planet.wireframe.visible = true;
        state.selectedPlanet = planet.name;
        updatePlanetInfo(planet);
        document.getElementById('planet-info').style.display = 'block';
      }
    }
  }
});

function updatePlanetInfo(planet) {
  const period = (2 * Math.PI / planet.orbitalSpeed).toFixed(1);
  const angleDeg = ((planet.angle * 180 / Math.PI) % 360).toFixed(1);
  document.getElementById('info-name').textContent = planet.name;
  document.getElementById('info-details').innerHTML =
    `Orbital Radius: <strong>${planet.orbitalRadius}</strong> AU &nbsp;|&nbsp; ` +
    `Period: <strong>${period}</strong> frames &nbsp;|&nbsp; ` +
    `Angle: <strong>${angleDeg}°</strong>`;
}

// ─── Keyboard Controls ───
document.addEventListener('keydown', (event) => {
  const key = event.code;

  if (key === 'Space') {
    event.preventDefault();
    state.paused = !state.paused;
  }

  if (key === 'ArrowUp') {
    event.preventDefault();
    state.speedMultiplier = Math.min(4.0, state.speedMultiplier + 0.25);
  }

  if (key === 'ArrowDown') {
    event.preventDefault();
    state.speedMultiplier = Math.max(0.25, state.speedMultiplier - 0.25);
  }

  if (key === 'KeyR') {
    // Reset
    planets.forEach(p => {
      p.angle = 0;
      p.trailCount = 0;
      p.trailIndex = 0;
      p.trailPositions.fill(0);
      p.trailOpacities.fill(0);
      p.trailGeo.attributes.position.needsUpdate = true;
      p.trailGeo.attributes.opacity.needsUpdate = true;
      p.wireframe.visible = false;
    });
    state.speedMultiplier = 1.0;
    state.selectedPlanet = null;
    state.paused = false;
    document.getElementById('planet-info').style.display = 'none';
  }

  if (key === 'KeyT') {
    state.trailsEnabled = !state.trailsEnabled;
    planets.forEach(p => p.trailPoints.visible = state.trailsEnabled);
  }

  if (key === 'KeyG') {
    state.gravityLinesEnabled = !state.gravityLinesEnabled;
    planets.forEach(p => p.gravLine.visible = state.gravityLinesEnabled);
  }
});

// ─── HUD Update ───
function updateHUD() {
  document.getElementById('speed-display').textContent = state.speedMultiplier.toFixed(2) + 'x';
  document.getElementById('status-display').textContent = state.paused ? 'Paused' : 'Running';
  document.getElementById('status-display').style.color = state.paused ? '#ff6666' : '#66ff66';
  document.getElementById('trails-display').textContent = state.trailsEnabled ? 'ON' : 'OFF';
  document.getElementById('trails-display').style.color = state.trailsEnabled ? '#66ff66' : '#ff6666';
  document.getElementById('gravity-display').textContent = state.gravityLinesEnabled ? 'ON' : 'OFF';
  document.getElementById('gravity-display').style.color = state.gravityLinesEnabled ? '#66ff66' : '#ff6666';

  // Update selected planet info
  if (state.selectedPlanet) {
    const planet = planets.find(p => p.name === state.selectedPlanet);
    if (planet) {
      updatePlanetInfo(planet);
    }
  }
}

// ─── Animation Loop ───
function animate() {
  requestAnimationFrame(animate);

  state.frameCount++;
  controls.update();

  // Star subtle rotation
  star.rotation.y += 0.002;

  // Robot bobbing
  if (robotModel) {
    robotModel.position.y = Math.sin(state.frameCount * 0.02) * 1.5 + 2;
    robotModel.rotation.y += 0.005;
  }

  // Update planets
  planets.forEach(planet => {
    if (!state.paused) {
      planet.angle += planet.orbitalSpeed * state.speedMultiplier;
    }

    const x = planet.orbitalRadius * Math.cos(planet.angle);
    const z = planet.orbitalRadius * Math.sin(planet.angle);
    planet.mesh.position.set(x, 0, z);
    planet.mesh.rotation.y += 0.01;

    // Update state
    state.planetAngles[planet.key] = planet.angle;
    state.planetPositions[planet.key] = { x, y: 0, z };

    // Trail
    if (!state.paused && state.trailsEnabled) {
      const idx = planet.trailIndex;
      planet.trailPositions[idx * 3] = x;
      planet.trailPositions[idx * 3 + 1] = 0;
      planet.trailPositions[idx * 3 + 2] = z;
      planet.trailOpacities[idx] = 1.0;

      planet.trailIndex = (planet.trailIndex + 1) % TRAIL_MAX;
      if (planet.trailCount < TRAIL_MAX) planet.trailCount++;
    }

    // Fade trail opacities
    for (let i = 0; i < TRAIL_MAX; i++) {
      if (planet.trailOpacities[i] > 0) {
        planet.trailOpacities[i] = Math.max(0, planet.trailOpacities[i] - 0.004);
      }
    }

    planet.trailGeo.attributes.position.needsUpdate = true;
    planet.trailGeo.attributes.opacity.needsUpdate = true;
    planet.trailGeo.setDrawRange(0, planet.trailCount);

    state.trailParticleCounts[planet.key] = planet.trailCount;

    // Gravity line
    if (state.gravityLinesEnabled) {
      const positions = planet.gravLineGeo.attributes.position;
      positions.setXYZ(0, 0, 0, 0);
      positions.setXYZ(1, x, 0, z);
      positions.needsUpdate = true;
      planet.gravLine.computeLineDistances();
      planet.gravLine.visible = true;
    } else {
      planet.gravLine.visible = false;
    }
  });

  updateHUD();
  renderer.render(scene, camera);
}

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
