<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Planetary Orbit Simulator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #hud-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      line-height: 1.6;
      font-size: 14px;
      z-index: 10;
      min-width: 220px;
    }

    #planet-info {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      z-index: 10;
      display: none;
      min-width: 260px;
    }

    #help {
      position: absolute;
      right: 12px;
      top: 12px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      z-index: 10;
      max-width: 260px;
    }
  </style>
</head>
<body>
  <div id="hud-panel">
    <div>Speed: <span id="speed-display">1.00x</span></div>
    <div>Status: <span id="status-display">Running</span></div>
    <div>Trails: <span id="trails-display">ON</span></div>
    <div>Gravity Lines: <span id="gravity-display">OFF</span></div>
  </div>

  <div id="planet-info"></div>

  <div id="help">
    <strong>Controls</strong><br>
    Space: Pause/Resume<br>
    ↑ / ↓: Speed +/-<br>
    R: Reset<br>
    T: Toggle Trails<br>
    G: Toggle Gravity Lines<br>
    Click planet: Select/Deselect<br>
    Mouse: Orbit / Zoom
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 50, 80);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const starLight = new THREE.PointLight(0xffffff, 2.0, 0, 2);
    starLight.position.set(0, 0, 0);
    scene.add(starLight);

    const starGeometry = new THREE.SphereGeometry(5, 32, 32);
    const starMaterial = new THREE.MeshStandardMaterial({
      color: 0xffcc55,
      emissive: 0xffaa00,
      emissiveIntensity: 2.0
    });
    const star = new THREE.Mesh(starGeometry, starMaterial);
    scene.add(star);

    function createGlowSprite() {
      const size = 128;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      const gradient = ctx.createRadialGradient(
        size / 2, size / 2, 0,
        size / 2, size / 2, size / 2
      );
      gradient.addColorStop(0.0, "rgba(255, 220, 120, 1)");
      gradient.addColorStop(0.25, "rgba(255, 180, 50, 0.7)");
      gradient.addColorStop(0.6, "rgba(255, 120, 20, 0.25)");
      gradient.addColorStop(1.0, "rgba(255, 120, 20, 0)");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({
        map: texture,
        color: 0xffffff,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(18, 18, 1);
      return sprite;
    }

    const glow = createGlowSprite();
    star.add(glow);

    function createStarfield() {
      const count = 500;
      const positions = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        const r = 300 * Math.cbrt(Math.random());
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.cos(phi);
        positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

      const material = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 1.2,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.9
      });

      const stars = new THREE.Points(geometry, material);
      scene.add(stars);
    }

    createStarfield();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const speedDisplay = document.getElementById("speed-display");
    const statusDisplay = document.getElementById("status-display");
    const trailsDisplay = document.getElementById("trails-display");
    const gravityDisplay = document.getElementById("gravity-display");
    const planetInfo = document.getElementById("planet-info");

    const MAX_TRAIL_POINTS = 200;

    function hexToRgbNorm(hex) {
      return {
        r: ((hex >> 16) & 255) / 255,
        g: ((hex >> 8) & 255) / 255,
        b: (hex & 255) / 255
      };
    }

    function createTrail(colorHex) {
      const positions = new Float32Array(MAX_TRAIL_POINTS * 3);
      const colors = new Float32Array(MAX_TRAIL_POINTS * 3);
      const alphas = new Float32Array(MAX_TRAIL_POINTS);
      const rgb = hexToRgbNorm(colorHex);

      for (let i = 0; i < MAX_TRAIL_POINTS; i++) {
        colors[i * 3] = rgb.r;
        colors[i * 3 + 1] = rgb.g;
        colors[i * 3 + 2] = rgb.b;
        alphas[i] = 0;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute("alpha", new THREE.BufferAttribute(alphas, 1));

      const material = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true,
        uniforms: {
          pointSize: { value: 4.0 }
        },
        vertexShader: `
          attribute float alpha;
          varying vec3 vColor;
          varying float vAlpha;
          uniform float pointSize;
          void main() {
            vColor = color;
            vAlpha = alpha;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = pointSize * (300.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          varying float vAlpha;
          void main() {
            float d = length(gl_PointCoord - vec2(0.5));
            if (d > 0.5) discard;
            float falloff = 1.0 - smoothstep(0.0, 0.5, d);
            gl_FragColor = vec4(vColor, vAlpha * falloff);
          }
        `
      });

      const points = new THREE.Points(geometry, material);
      scene.add(points);

      return {
        points,
        positions,
        colors,
        alphas,
        history: []
      };
    }

    function createGravityLine(colorHex) {
      const geometry = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 0, 0)
      ]);

      const material = new THREE.LineDashedMaterial({
        color: colorHex,
        dashSize: 1.2,
        gapSize: 0.8,
        transparent: true,
        opacity: 0.8
      });

      const line = new THREE.Line(geometry, material);
      line.visible = false;
      scene.add(line);
      return line;
    }

    const planetDefs = [
      {
        key: "mercury",
        name: "Mercury",
        radius: 1,
        color: 0xaaaaaa,
        orbitalRadius: 15,
        orbitalSpeed: 0.02
      },
      {
        key: "earth",
        name: "Earth",
        radius: 1.5,
        color: 0x3366ff,
        orbitalRadius: 30,
        orbitalSpeed: 0.012
      },
      {
        key: "mars",
        name: "Mars",
        radius: 1.2,
        color: 0xff4422,
        orbitalRadius: 45,
        orbitalSpeed: 0.008
      }
    ];

    const planets = [];
    const selectableMeshes = [];

    for (const def of planetDefs) {
      const geometry = new THREE.SphereGeometry(def.radius, 24, 24);
      const material = new THREE.MeshStandardMaterial({
        color: def.color,
        roughness: 0.9,
        metalness: 0.1
      });
      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      const wireGeometry = new THREE.SphereGeometry(def.radius * 1.12, 16, 16);
      const wireMaterial = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.9
      });
      const wire = new THREE.Mesh(wireGeometry, wireMaterial);
      wire.visible = false;
      mesh.add(wire);

      const orbitRing = new THREE.LineLoop(
        new THREE.BufferGeometry().setFromPoints(
          Array.from({ length: 128 }, (_, i) => {
            const a = (i / 128) * Math.PI * 2;
            return new THREE.Vector3(
              def.orbitalRadius * Math.cos(a),
              0,
              def.orbitalRadius * Math.sin(a)
            );
          })
        ),
        new THREE.LineBasicMaterial({
          color: 0x444444,
          transparent: true,
          opacity: 0.5
        })
      );
      scene.add(orbitRing);

      const trail = createTrail(def.color);
      const gravityLine = createGravityLine(def.color);

      const planet = {
        ...def,
        angle: 0,
        mesh,
        wire,
        trail,
        gravityLine
      };

      mesh.userData.planetKey = def.key;
      selectableMeshes.push(mesh);
      planets.push(planet);
    }

    const loader = new GLTFLoader();
    let robotLoaded = false;

    loader.load(
      "robot.glb",
      (gltf) => {
        const robot = gltf.scene;
        robot.position.set(60, 0, 0);
        robot.scale.set(3, 3, 3);
        scene.add(robot);
        robotLoaded = true;
      },
      undefined,
      (error) => {
        console.warn("Failed to load robot.glb:", error);
        robotLoaded = false;

        const fallback = new THREE.Group();

        const body = new THREE.Mesh(
          new THREE.BoxGeometry(4, 6, 3),
          new THREE.MeshStandardMaterial({ color: 0x88ccff })
        );
        body.position.y = 4;
        fallback.add(body);

        const head = new THREE.Mesh(
          new THREE.BoxGeometry(3, 3, 3),
          new THREE.MeshStandardMaterial({ color: 0xbbeeff })
        );
        head.position.y = 8.5;
        fallback.add(head);

        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const eye1 = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), eyeMat);
        const eye2 = eye1.clone();
        eye1.position.set(-0.6, 8.7, 1.55);
        eye2.position.set(0.6, 8.7, 1.55);
        fallback.add(eye1, eye2);

        fallback.position.set(60, 0, 0);
        fallback.scale.set(0.5, 0.5, 0.5);
        scene.add(fallback);
      }
    );

    const state = {
      paused: false,
      speedMultiplier: 1.0,
      trailsEnabled: true,
      gravityLinesEnabled: false,
      selectedPlanet: null,
      frameCount: 0
    };

    function setPlanetPosition(planet) {
      planet.mesh.position.set(
        planet.orbitalRadius * Math.cos(planet.angle),
        0,
        planet.orbitalRadius * Math.sin(planet.angle)
      );
    }

    function clearTrail(planet) {
      planet.trail.history = [];
      for (let i = 0; i < MAX_TRAIL_POINTS; i++) {
        planet.trail.positions[i * 3] = 0;
        planet.trail.positions[i * 3 + 1] = 0;
        planet.trail.positions[i * 3 + 2] = 0;
        planet.trail.alphas[i] = 0;
      }
      planet.trail.points.geometry.attributes.position.needsUpdate = true;
      planet.trail.points.geometry.attributes.alpha.needsUpdate = true;
    }

    function updateTrail(planet) {
      const trail = planet.trail;

      trail.history.unshift(planet.mesh.position.clone());
      if (trail.history.length > MAX_TRAIL_POINTS) {
        trail.history.pop();
      }

      for (let i = 0; i < MAX_TRAIL_POINTS; i++) {
        const p = trail.history[i];
        if (p) {
          trail.positions[i * 3] = p.x;
          trail.positions[i * 3 + 1] = p.y;
          trail.positions[i * 3 + 2] = p.z;
          trail.alphas[i] = Math.max(0, 1 - i / MAX_TRAIL_POINTS);
        } else {
          trail.positions[i * 3] = 0;
          trail.positions[i * 3 + 1] = 0;
          trail.positions[i * 3 + 2] = 0;
          trail.alphas[i] = 0;
        }
      }

      trail.points.visible = state.trailsEnabled;
      trail.points.geometry.attributes.position.needsUpdate = true;
      trail.points.geometry.attributes.alpha.needsUpdate = true;
    }

    function updateGravityLine(planet) {
      const positions = planet.gravityLine.geometry.attributes.position.array;
      positions[0] = 0;
      positions[1] = 0;
      positions[2] = 0;
      positions[3] = planet.mesh.position.x;
      positions[4] = planet.mesh.position.y;
      positions[5] = planet.mesh.position.z;
      planet.gravityLine.geometry.attributes.position.needsUpdate = true;
      planet.gravityLine.computeLineDistances();
      planet.gravityLine.visible = state.gravityLinesEnabled;
    }

    function selectPlanetByKey(key) {
      state.selectedPlanet = key;
      for (const p of planets) {
        p.wire.visible = p.key === key;
      }
      updatePlanetInfo();
    }

    function deselectPlanet() {
      state.selectedPlanet = null;
      for (const p of planets) {
        p.wire.visible = false;
      }
      updatePlanetInfo();
    }

    function updateHUD() {
      speedDisplay.textContent = `${state.speedMultiplier.toFixed(2)}x`;
      statusDisplay.textContent = state.paused ? "Paused" : "Running";
      trailsDisplay.textContent = state.trailsEnabled ? "ON" : "OFF";
      gravityDisplay.textContent = state.gravityLinesEnabled ? "ON" : "OFF";
    }

    function updatePlanetInfo() {
      if (!state.selectedPlanet) {
        planetInfo.style.display = "none";
        planetInfo.innerHTML = "";
        return;
      }

      const p = planets.find(pl => pl.key === state.selectedPlanet);
      if (!p) return;

      const orbitalPeriod = (2 * Math.PI) / p.orbitalSpeed;
      const angleDeg = ((p.angle * 180 / Math.PI) % 360 + 360) % 360;

      planetInfo.style.display = "block";
      planetInfo.innerHTML = `
        <strong>${p.name}</strong><br>
        Orbital Radius: ${p.orbitalRadius.toFixed(1)}<br>
        Orbital Period: ${orbitalPeriod.toFixed(2)} frames @ 1x<br>
        Current Angle: ${angleDeg.toFixed(1)}°
      `;
    }

    function resetSimulation() {
      state.paused = false;
      state.speedMultiplier = 1.0;
      state.selectedPlanet = null;

      for (const p of planets) {
        p.angle = 0;
        setPlanetPosition(p);
        clearTrail(p);
        p.wire.visible = false;
      }

      updateHUD();
      updatePlanetInfo();
    }

    for (const planet of planets) {
      setPlanetPosition(planet);
      updateGravityLine(planet);
    }

    updateHUD();

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        state.paused = !state.paused;
      } else if (event.code === "ArrowUp") {
        event.preventDefault();
        state.speedMultiplier = Math.min(4.0, state.speedMultiplier + 0.25);
      } else if (event.code === "ArrowDown") {
        event.preventDefault();
        state.speedMultiplier = Math.max(0.25, state.speedMultiplier - 0.25);
      } else if (event.code === "KeyR") {
        resetSimulation();
      } else if (event.code === "KeyT") {
        state.trailsEnabled = !state.trailsEnabled;
      } else if (event.code === "KeyG") {
        state.gravityLinesEnabled = !state.gravityLinesEnabled;
      }

      updateHUD();
    });

    window.addEventListener("click", (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(selectableMeshes, false);

      if (intersects.length > 0) {
        const key = intersects[0].object.userData.planetKey;
        selectPlanetByKey(key);
      } else {
        deselectPlanet();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateGlobalState() {
      window.__3D_STATE__ = {
        paused: state.paused,
        speedMultiplier: state.speedMultiplier,
        trailsEnabled: state.trailsEnabled,
        gravityLinesEnabled: state.gravityLinesEnabled,
        selectedPlanet: state.selectedPlanet,
        planetAngles: {
          mercury: planets.find(p => p.key === "mercury").angle,
          earth: planets.find(p => p.key === "earth").angle,
          mars: planets.find(p => p.key === "mars").angle
        },
        planetPositions: {
          mercury: {
            x: planets.find(p => p.key === "mercury").mesh.position.x,
            y: planets.find(p => p.key === "mercury").mesh.position.y,
            z: planets.find(p => p.key === "mercury").mesh.position.z
          },
          earth: {
            x: planets.find(p => p.key === "earth").mesh.position.x,
            y: planets.find(p => p.key === "earth").mesh.position.y,
            z: planets.find(p => p.key === "earth").mesh.position.z
          },
          mars: {
            x: planets.find(p => p.key === "mars").mesh.position.x,
            y: planets.find(p => p.key === "mars").mesh.position.y,
            z: planets.find(p => p.key === "mars").mesh.position.z
          }
        },
        robotLoaded,
        planetCount: 3,
        frameCount: state.frameCount,
        trailParticleCounts: {
          mercury: planets.find(p => p.key === "mercury").trail.history.length,
          earth: planets.find(p => p.key === "earth").trail.history.length,
          mars: planets.find(p => p.key === "mars").trail.history.length
        }
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      state.frameCount++;

      if (!state.paused) {
        for (const p of planets) {
          p.angle += p.orbitalSpeed * state.speedMultiplier;
          setPlanetPosition(p);
          if (state.trailsEnabled) {
            updateTrail(p);
          } else {
            p.trail.points.visible = false;
          }
          updateGravityLine(p);
        }
      } else {
        for (const p of planets) {
          p.trail.points.visible = state.trailsEnabled;
          p.gravityLine.visible = state.gravityLinesEnabled;
        }
      }

      updateHUD();
      updatePlanetInfo();
      updateGlobalState();

      controls.update();
      renderer.render(scene, camera);
    }

    resetSimulation();
    animate();
  </script>
</body>
</html>
