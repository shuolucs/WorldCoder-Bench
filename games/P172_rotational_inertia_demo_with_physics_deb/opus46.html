<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotational Inertia Demonstration</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        background: #000;
    }
    canvas {
        display: block;
    }
    #toggleDebugBtn {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 100;
        padding: 8px 16px;
        background: #333;
        color: #0f0;
        border: 1px solid #0f0;
        cursor: pointer;
        font-family: 'Courier New', monospace;
        font-size: 13px;
    }
    #toggleDebugBtn:hover {
        background: #0f0;
        color: #000;
    }
    #debugOverlay {
        position: fixed;
        top: 10px;
        right: 10px;
        width: 300px;
        background: rgba(0, 0, 0, 0.8);
        color: #0f0;
        padding: 15px;
        border: 1px solid #0f0;
        border-radius: 5px;
        z-index: 100;
        font-size: 13px;
        line-height: 1.6;
    }
    #debugOverlay h3 {
        margin: 0 0 10px 0;
        color: #0ff;
        border-bottom: 1px solid #0ff;
        padding-bottom: 5px;
    }
    #debugOverlay .label {
        color: #aaa;
    }
    #debugOverlay .value {
        color: #0f0;
        float: right;
    }
    #debugOverlay .row {
        clear: both;
        overflow: hidden;
    }
    #controls-info {
        position: fixed;
        bottom: 10px;
        left: 10px;
        background: rgba(0,0,0,0.7);
        color: #ccc;
        padding: 10px 15px;
        border-radius: 5px;
        font-size: 12px;
        z-index: 100;
        line-height: 1.5;
    }
    #controls-info span {
        color: #ff0;
    }
</style>
</head>
<body>

<button id="toggleDebugBtn">Toggle Debug Overlay</button>

<div id="debugOverlay">
    <h3>⚙ Physics Debug</h3>
    <div class="row"><span class="label">ω (rad/s):</span><span class="value" id="dbg-omega">0.000</span></div>
    <div class="row"><span class="label">α (rad/s²):</span><span class="value" id="dbg-alpha">0.000</span></div>
    <div class="row"><span class="label">θ (rad):</span><span class="value" id="dbg-theta">0.00</span></div>
    <div class="row"><span class="label">Torque (N·m):</span><span class="value" id="dbg-torque">0</span></div>
    <div class="row"><span class="label">I (kg·m²):</span><span class="value" id="dbg-I">2.0</span></div>
    <div class="row"><span class="label">Friction:</span><span class="value" id="dbg-friction">0.05</span></div>
    <div class="row"><span class="label">KE (J):</span><span class="value" id="dbg-ke">0.00</span></div>
    <div class="row"><span class="label">L (kg·m²/s):</span><span class="value" id="dbg-L">0.00</span></div>
    <div class="row"><span class="label">Mass Config:</span><span class="value" id="dbg-config">compact</span></div>
    <div class="row"><span class="label">Brake:</span><span class="value" id="dbg-brake">OFF</span></div>
    <div class="row"><span class="label">Frame:</span><span class="value" id="dbg-frame">0</span></div>
    <div class="row"><span class="label">ω Clamped:</span><span class="value" id="dbg-clamped">false</span></div>
</div>

<div id="controls-info">
    <span>A</span> / <span>D</span> — Apply torque CW/CCW &nbsp;|&nbsp;
    <span>1</span> / <span>2</span> — Compact/Spread mass &nbsp;|&nbsp;
    <span>B</span> — Toggle brake &nbsp;|&nbsp;
    <span>R</span> — Reset
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
const state = {
    modelLoaded: false,
    omega: 0,
    alpha: 0,
    theta: 0,
    torque: 0,
    momentOfInertia: 2.0,
    frictionCoeff: 0.05,
    kineticEnergy: 0,
    angularMomentum: 0,
    massConfig: 'compact',
    brakeActive: false,
    debugOverlayVisible: true,
    turntableColorHex: '#4444ff',
    frameCount: 0,
    omegaClamped: false
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
scene.add(dirLight);

// --- Ground Plane ---
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// --- Turntable Group ---
const turntableGroup = new THREE.Group();
scene.add(turntableGroup);

// Turntable disc
const discGeo = new THREE.CylinderGeometry(2, 2, 0.1, 64);
const discMat = new THREE.MeshStandardMaterial({ color: 0x4444ff, metalness: 0.3, roughness: 0.5 });
const disc = new THREE.Mesh(discGeo, discMat);
disc.position.y = 0.05;
disc.castShadow = true;
disc.receiveShadow = true;
turntableGroup.add(disc);

// --- Load Model ---
let coffeeModel = null;
let baseScale = new THREE.Vector3(1, 1, 1);

const loader = new GLTFLoader();
loader.load(
    'coffeemat.glb',
    (gltf) => {
        coffeeModel = gltf.scene;

        // Compute bounding box and scale to fit within 2 units
        const box = new THREE.Box3().setFromObject(coffeeModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scaleFactor = 2.0 / maxDim;

        coffeeModel.scale.set(scaleFactor, scaleFactor, scaleFactor);
        baseScale.set(scaleFactor, scaleFactor, scaleFactor);

        // Recompute box after scaling to center it
        const box2 = new THREE.Box3().setFromObject(coffeeModel);
        const center = new THREE.Vector3();
        box2.getCenter(center);

        coffeeModel.position.x = -center.x;
        coffeeModel.position.z = -center.z;
        coffeeModel.position.y = -box2.min.y + 0.1; // sit on top of disc

        coffeeModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        turntableGroup.add(coffeeModel);
        state.modelLoaded = true;
        console.log('coffeemat.glb loaded successfully');
    },
    (progress) => {
        console.log('Loading...', (progress.loaded / (progress.total || 1) * 100).toFixed(1) + '%');
    },
    (error) => {
        console.warn('Could not load coffeemat.glb, creating placeholder:', error);
        // Create a placeholder
        const placeholderGeo = new THREE.BoxGeometry(1.2, 1.5, 0.8);
        const placeholderMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6 });
        const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
        placeholder.position.y = 0.85;
        placeholder.castShadow = true;
        coffeeModel = placeholder;
        baseScale.set(1, 1, 1);
        turntableGroup.add(placeholder);
        state.modelLoaded = true;
    }
);

// --- Physics Variables ---
let omega = 0;
let alpha = 0;
let theta = 0;
let torque = 0;
let I = 2.0;
let frictionCoeff = 0.05;
let brakeActive = false;
let massConfig = 'compact';

// --- Input ---
const keys = {};

document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    keys[key] = true;

    if (key === 'r') {
        // Reset
        omega = 0;
        theta = 0;
        torque = 0;
        I = 2.0;
        massConfig = 'compact';
        brakeActive = false;
        frictionCoeff = 0.05;
        discMat.color.setHex(0x4444ff);
        state.turntableColorHex = '#4444ff';
        if (coffeeModel) {
            coffeeModel.scale.copy(baseScale);
        }
    }

    if (key === '1' && massConfig !== 'compact') {
        const oldL = I * omega;
        I = 2.0;
        omega = I !== 0 ? oldL / I : 0;
        massConfig = 'compact';
        if (coffeeModel) {
            coffeeModel.scale.set(baseScale.x * 1, baseScale.y * 1, baseScale.z * 1);
        }
    }

    if (key === '2' && massConfig !== 'spread') {
        const oldL = I * omega;
        I = 6.0;
        omega = I !== 0 ? oldL / I : 0;
        massConfig = 'spread';
        if (coffeeModel) {
            coffeeModel.scale.set(baseScale.x * 1.8, baseScale.y * 0.6, baseScale.z * 1.8);
        }
    }

    if (key === 'b') {
        brakeActive = !brakeActive;
        frictionCoeff = brakeActive ? 0.5 : 0.05;
        if (brakeActive) {
            discMat.color.setHex(0xff0000);
            state.turntableColorHex = '#ff0000';
        } else {
            discMat.color.setHex(0x4444ff);
            state.turntableColorHex = '#4444ff';
        }
    }
});

document.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    keys[key] = false;
});

// --- Debug Toggle ---
const debugOverlay = document.getElementById('debugOverlay');
const toggleBtn = document.getElementById('toggleDebugBtn');
toggleBtn.addEventListener('click', () => {
    state.debugOverlayVisible = !state.debugOverlayVisible;
    debugOverlay.style.display = state.debugOverlayVisible ? 'block' : 'none';
});

// --- Sanitize number ---
function sanitize(val) {
    if (!isFinite(val) || isNaN(val)) return 0;
    return val;
}

// --- Animation Loop ---
const clock = new THREE.Clock();
let frameCount = 0;

function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.05); // cap dt

    // Determine torque from input
    torque = 0;
    if (keys['a']) torque += 3.0;
    if (keys['d']) torque -= 3.0;

    // Physics update
    alpha = torque / I - frictionCoeff * omega;
    alpha = sanitize(alpha);

    omega += alpha * dt;
    omega = sanitize(omega);

    // Clamp omega
    let omegaClamped = false;
    if (omega > 20) { omega = 20; omegaClamped = true; }
    if (omega < -20) { omega = -20; omegaClamped = true; }

    theta += omega * dt;
    theta = sanitize(theta);

    // Apply rotation
    turntableGroup.rotation.y = theta;

    // Compute derived quantities
    const KE = sanitize(0.5 * I * omega * omega);
    const L = sanitize(I * omega);

    // Update state
    frameCount++;
    state.omega = sanitize(omega);
    state.alpha = sanitize(alpha);
    state.theta = sanitize(theta);
    state.torque = sanitize(torque);
    state.momentOfInertia = sanitize(I);
    state.frictionCoeff = sanitize(frictionCoeff);
    state.kineticEnergy = KE;
    state.angularMomentum = L;
    state.massConfig = massConfig;
    state.brakeActive = brakeActive;
    state.omegaClamped = omegaClamped;
    state.frameCount = frameCount;

    // Update debug overlay
    if (state.debugOverlayVisible) {
        document.getElementById('dbg-omega').textContent = omega.toFixed(3);
        document.getElementById('dbg-alpha').textContent = alpha.toFixed(3);
        document.getElementById('dbg-theta').textContent = theta.toFixed(2);
        document.getElementById('dbg-torque').textContent = torque.toFixed(1);
        document.getElementById('dbg-I').textContent = I.toFixed(1);
        document.getElementById('dbg-friction').textContent = frictionCoeff.toFixed(2);
        document.getElementById('dbg-ke').textContent = KE.toFixed(2);
        document.getElementById('dbg-L').textContent = L.toFixed(2);
        document.getElementById('dbg-config').textContent = massConfig;
        document.getElementById('dbg-brake').textContent = brakeActive ? 'ON' : 'OFF';
        document.getElementById('dbg-brake').style.color = brakeActive ? '#f00' : '#0f0';
        document.getElementById('dbg-frame').textContent = frameCount;
        document.getElementById('dbg-clamped').textContent = omegaClamped.toString();
    }

    controls.update();
    renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
