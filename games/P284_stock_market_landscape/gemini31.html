<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Stock Market Landscape</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud-panel {
            position: absolute;
            background: rgba(10, 10, 26, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        #top-left { top: 20px; left: 20px; }
        #top-right { top: 20px; right: 20px; text-align: right; }
        #bottom-center { 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%);
            text-align: center;
        }
        .hud-title { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .hud-value { font-size: 24px; font-weight: bold; }
        
        #controls {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        button {
            background: rgba(30, 30, 50, 0.8);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover { background: rgba(60, 60, 90, 0.9); }
        button.active { background: rgba(100, 100, 150, 0.9); border-color: white; }

        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid white;
            padding: 10px;
            border-radius: 4px;
            pointer-events: none;
            display: none;
            z-index: 100;
            transform: translate(-50%, -100%);
            margin-top: -10px;
        }
        
        .status-live { color: #00ff88; }
        .status-paused { color: #ff4444; }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #888;
            pointer-events: none;
            line-height: 1.5;
        }
        kbd {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            color: #fff;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="controls">
        <button data-sector="All" class="active">All</button>
        <button data-sector="Technology" style="border-bottom: 3px solid #00ff88;">Technology</button>
        <button data-sector="Finance" style="border-bottom: 3px solid #ff4444;">Finance</button>
        <button data-sector="Healthcare" style="border-bottom: 3px solid #4488ff;">Healthcare</button>
        <button data-sector="Energy" style="border-bottom: 3px solid #ffaa00;">Energy</button>
        <button data-sector="Consumer" style="border-bottom: 3px solid #ff44ff;">Consumer</button>
    </div>

    <div id="top-left" class="hud-panel">
        <div class="hud-title">Market Index</div>
        <div id="market-index" class="hud-value">0.00</div>
    </div>

    <div id="top-right" class="hud-panel">
        <div class="hud-title">Filter: <span id="filter-display" style="color: white;">All</span></div>
        <div class="hud-title" style="margin-top: 10px;">Time: <span id="time-display" style="color: white;">Day</span></div>
    </div>

    <div id="bottom-center" class="hud-panel">
        <div class="hud-title">Simulation Status</div>
        <div id="sim-status" class="hud-value status-paused">PAUSED</div>
    </div>

    <div id="instructions">
        <kbd>SPACE</kbd> Toggle Sim | <kbd>C</kbd> Crash | <kbd>R</kbd> Recover<br>
        <kbd>1</kbd> Top View | <kbd>2</kbd> Side View | <kbd>3</kbd> Default View<br>
        <kbd>T</kbd> Time of Day
    </div>

    <div id="tooltip">
        <div id="tt-sector" style="font-weight: bold; margin-bottom: 5px;"></div>
        <div>Price: <span id="tt-price"></span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            totalBars: 100,
            activeFilter: 'All',
            simulationRunning: false,
            crashTriggered: false,
            recovered: false,
            hoveredBarIndex: -1,
            currentView: 'default',
            timeOfDay: 'day',
            marketIndex: 0,
            barHeights: [],
            sectorCounts: { Technology: 20, Finance: 20, Healthcare: 20, Energy: 20, Consumer: 20 }
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 30);
        let targetCameraPos = new THREE.Vector3(0, 15, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const lightingModes = {
            day: { dir: 0xffffff, dirInt: 0.8, amb: 0x334466, ambInt: 0.5, bg: 0x0a0a1a },
            sunset: { dir: 0xff6633, dirInt: 1.0, amb: 0x442222, ambInt: 0.6, bg: 0x1a0a0a },
            night: { dir: 0x2233aa, dirInt: 0.3, amb: 0x0a0a1a, ambInt: 0.2, bg: 0x000000 }
        };

        // --- 3D TERRAIN (STOCK LANDSCAPE) ---
        const sectors = [
            { name: 'Technology', color: 0x00ff88 },
            { name: 'Finance', color: 0xff4444 },
            { name: 'Healthcare', color: 0x4488ff },
            { name: 'Energy', color: 0xffaa00 },
            { name: 'Consumer', color: 0xff44ff }
        ];

        // Prepare exactly 20 of each sector
        let sectorDistribution = [];
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j < 20; j++) {
                sectorDistribution.push(i);
            }
        }
        // Shuffle
        for (let i = sectorDistribution.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [sectorDistribution[i], sectorDistribution[j]] = [sectorDistribution[j], sectorDistribution[i]];
        }

        const bars = [];
        const barGeometry = new THREE.BoxGeometry(1.5, 1, 1.5);
        // Translate geometry so origin is at bottom
        barGeometry.translate(0, 0.5, 0); 

        let barIndex = 0;
        for (let x = -9; x <= 9; x += 2) {
            for (let z = -9; z <= 9; z += 2) {
                const sIdx = sectorDistribution[barIndex];
                const sector = sectors[sIdx];
                const height = 1 + Math.random() * 11;

                const material = new THREE.MeshStandardMaterial({
                    color: sector.color,
                    transparent: true,
                    opacity: 1,
                    roughness: 0.2,
                    metalness: 0.1
                });

                const mesh = new THREE.Mesh(barGeometry, material);
                mesh.position.set(x, 0, z);
                mesh.scale.y = height;

                mesh.userData = {
                    index: barIndex,
                    sectorIndex: sIdx,
                    sectorName: sector.name,
                    baseHeight: height,
                    currentHeight: height,
                    targetHeight: height
                };

                scene.add(mesh);
                bars.push(mesh);
                barIndex++;
            }
        }

        // Grid Helper
        const gridHelper = new THREE.GridHelper(22, 11, 0x333333, 0x111111);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);

        // --- LOAD 3D ASSET ---
        const loader = new GLTFLoader();
        loader.load(
            'https://threejs.org/examples/models/gltf/facecap.glb',
            function (gltf) {
                const model = gltf.scene;
                model.position.set(0, 0, -22);
                model.scale.set(3, 3, 3);
                
                // Fix materials if needed
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.material.side = THREE.DoubleSide;
                    }
                });

                scene.add(model);
                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            function (error) {
                console.error('Error loading model:', error);
            }
        );

        // --- INTERACTION LOGIC ---
        
        // 1. Sector Filter
        const buttons = document.querySelectorAll('#controls button');
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                buttons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                const filter = e.target.dataset.sector;
                window.__3D_STATE__.activeFilter = filter;
                document.getElementById('filter-display').innerText = filter;

                bars.forEach(bar => {
                    if (filter === 'All' || bar.userData.sectorName === filter) {
                        bar.material.opacity = 1;
                    } else {
                        bar.material.opacity = 0.2;
                    }
                });
            });
        });

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            // 2. Market Simulation
            if (key === ' ') {
                window.__3D_STATE__.simulationRunning = !window.__3D_STATE__.simulationRunning;
                const statusEl = document.getElementById('sim-status');
                if (window.__3D_STATE__.simulationRunning) {
                    statusEl.innerText = 'LIVE';
                    statusEl.className = 'hud-value status-live';
                } else {
                    statusEl.innerText = 'PAUSED';
                    statusEl.className = 'hud-value status-paused';
                }
            }
            
            // 3. Market Crash
            if (key === 'c') {
                window.__3D_STATE__.crashTriggered = true;
                window.__3D_STATE__.recovered = false;
                bars.forEach(bar => {
                    bar.userData.targetHeight = 0.5;
                });
            }

            // 4. Market Recovery
            if (key === 'r') {
                window.__3D_STATE__.recovered = true;
                window.__3D_STATE__.crashTriggered = false;
                bars.forEach(bar => {
                    bar.userData.targetHeight = bar.userData.baseHeight;
                });
            }

            // 6. Camera Presets
            if (key === '1') {
                targetCameraPos.set(0, 40, 0);
                window.__3D_STATE__.currentView = 'top';
            }
            if (key === '2') {
                targetCameraPos.set(40, 10, 0);
                window.__3D_STATE__.currentView = 'side';
            }
            if (key === '3') {
                targetCameraPos.set(0, 15, 30);
                window.__3D_STATE__.currentView = 'default';
            }

            // 7. Time of Day
            if (key === 't') {
                const modes = ['day', 'sunset', 'night'];
                let idx = modes.indexOf(window.__3D_STATE__.timeOfDay);
                idx = (idx + 1) % modes.length;
                const newMode = modes[idx];
                window.__3D_STATE__.timeOfDay = newMode;
                
                const settings = lightingModes[newMode];
                dirLight.color.setHex(settings.dir);
                dirLight.intensity = settings.dirInt;
                ambientLight.color.setHex(settings.amb);
                ambientLight.intensity = settings.ambInt;
                scene.background.setHex(settings.bg);
                scene.fog.color.setHex(settings.bg);
                
                document.getElementById('time-display').innerText = newMode.charAt(0).toUpperCase() + newMode.slice(1);
            }
        });

        // 5. Hover Tooltip (Raycasting)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        const ttSector = document.getElementById('tt-sector');
        const ttPrice = document.getElementById('tt-price');

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(bars);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                
                // Only show tooltip if bar is fully visible (not filtered out)
                if (object.material.opacity === 1) {
                    window.__3D_STATE__.hoveredBarIndex = object.userData.index;
                    
                    ttSector.innerText = object.userData.sectorName;
                    ttSector.style.color = '#' + sectors[object.userData.sectorIndex].color.toString(16).padStart(6, '0');
                    ttPrice.innerText = object.userData.currentHeight.toFixed(1);
                    
                    tooltip.style.display = 'block';
                    tooltip.style.left = event.clientX + 'px';
                    tooltip.style.top = event.clientY + 'px';
                    
                    // Highlight effect
                    document.body.style.cursor = 'pointer';
                } else {
                    hideTooltip();
                }
            } else {
                hideTooltip();
            }
        });

        function hideTooltip() {
            tooltip.style.display = 'none';
            document.body.style.cursor = 'default';
            window.__3D_STATE__.hoveredBarIndex = -1;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            // Camera Lerp
            camera.position.lerp(targetCameraPos, 0.05);
            controls.update();

            // Simulation Logic
            if (window.__3D_STATE__.simulationRunning && !window.__3D_STATE__.crashTriggered) {
                bars.forEach(bar => {
                    const drift = (Math.random() - 0.5) * 0.1; // +/- 0.05 per frame approx
                    bar.userData.targetHeight = Math.max(0.5, Math.min(15, bar.userData.targetHeight + drift));
                });
            }

            // Update Heights & Calculate Index
            let totalVisibleHeight = 0;
            let visibleCount = 0;
            window.__3D_STATE__.barHeights = [];

            bars.forEach(bar => {
                // Lerp current height to target height
                bar.userData.currentHeight += (bar.userData.targetHeight - bar.userData.currentHeight) * 0.1;
                
                // Apply to mesh
                bar.scale.y = bar.userData.currentHeight;
                
                // Update state array
                window.__3D_STATE__.barHeights.push(bar.userData.currentHeight);

                // Calculate index for visible bars
                if (bar.material.opacity === 1) {
                    totalVisibleHeight += bar.userData.currentHeight;
                    visibleCount++;
                }
            });

            // Update HUD
            if (visibleCount > 0) {
                window.__3D_STATE__.marketIndex = totalVisibleHeight / visibleCount;
                document.getElementById('market-index').innerText = window.__3D_STATE__.marketIndex.toFixed(2);
            } else {
                window.__3D_STATE__.marketIndex = 0;
                document.getElementById('market-index').innerText = "0.00";
            }

            // Update tooltip if visible
            if (window.__3D_STATE__.hoveredBarIndex !== -1) {
                const hoveredBar = bars[window.__3D_STATE__.hoveredBarIndex];
                ttPrice.innerText = hoveredBar.userData.currentHeight.toFixed(1);
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
