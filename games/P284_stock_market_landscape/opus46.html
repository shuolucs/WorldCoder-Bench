<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Stock Market Landscape</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#sector-buttons {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
}

#sector-buttons button {
    padding: 8px 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    background: rgba(10, 10, 26, 0.8);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}

#sector-buttons button:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.6);
}

#sector-buttons button.active {
    background: rgba(255,255,255,0.2);
    border-color: #fff;
    box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

#hud-top-left {
    position: absolute;
    top: 70px;
    left: 20px;
    background: rgba(10, 10, 26, 0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 15px 20px;
    color: #fff;
    z-index: 10;
    backdrop-filter: blur(10px);
    min-width: 200px;
}

#hud-top-left h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 5px;
}

#market-index-value {
    font-size: 32px;
    font-weight: 700;
    color: #00ff88;
}

#hud-top-right {
    position: absolute;
    top: 70px;
    right: 20px;
    background: rgba(10, 10, 26, 0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 15px 20px;
    color: #fff;
    z-index: 10;
    backdrop-filter: blur(10px);
    text-align: right;
    min-width: 180px;
}

#hud-top-right .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 3px;
}

#hud-top-right .value {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 10px;
}

#hud-bottom {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 26, 0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 25px;
    padding: 10px 30px;
    color: #fff;
    z-index: 10;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 15px;
}

#sim-status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ff4444;
    box-shadow: 0 0 10px #ff4444;
}

#sim-status-dot.live {
    background: #00ff88;
    box-shadow: 0 0 10px #00ff88;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

#sim-status-text {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
}

#tooltip {
    position: absolute;
    display: none;
    background: rgba(10, 10, 26, 0.95);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 10px;
    padding: 10px 15px;
    color: #fff;
    z-index: 20;
    pointer-events: none;
    backdrop-filter: blur(10px);
    font-size: 13px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

#tooltip .sector-name {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
}

#tooltip .height-value {
    color: rgba(255,255,255,0.7);
}

#controls-help {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    z-index: 10;
    text-align: center;
    letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div id="sector-buttons">
    <button class="active" data-sector="All">All</button>
    <button data-sector="Technology">Technology</button>
    <button data-sector="Finance">Finance</button>
    <button data-sector="Healthcare">Healthcare</button>
    <button data-sector="Energy">Energy</button>
    <button data-sector="Consumer">Consumer</button>
</div>

<div id="hud-top-left">
    <h3>Market Index</h3>
    <div id="market-index-value">0.0</div>
</div>

<div id="hud-top-right">
    <div class="label">Sector Filter</div>
    <div class="value" id="filter-display">All</div>
    <div class="label">Time of Day</div>
    <div class="value" id="time-display">Day</div>
</div>

<div id="hud-bottom">
    <div id="sim-status-dot"></div>
    <div id="sim-status-text" style="color: #ff4444;">PAUSED</div>
</div>

<div id="controls-help">
    SPACE: Toggle Simulation &nbsp;|&nbsp; C: Market Crash &nbsp;|&nbsp; R: Recovery &nbsp;|&nbsp; T: Time of Day &nbsp;|&nbsp; 1/2/3: Camera Views
</div>

<div id="tooltip">
    <div class="sector-name" id="tooltip-sector"></div>
    <div class="height-value" id="tooltip-height"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const sectorNames = ['Technology', 'Finance', 'Healthcare', 'Energy', 'Consumer'];
const sectorColors = [0x00ff88, 0xff4444, 0x4488ff, 0xffaa00, 0xff44ff];

window.__3D_STATE__ = {
    modelLoaded: false,
    totalBars: 100,
    activeFilter: 'All',
    simulationRunning: false,
    crashTriggered: false,
    recovered: false,
    hoveredBarIndex: -1,
    currentView: 'default',
    timeOfDay: 'day',
    marketIndex: 0,
    barHeights: [],
    sectorCounts: { Technology: 20, Finance: 20, Healthcare: 20, Energy: 20, Consumer: 20 }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x0a0a1a, 30, 70);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 20, 10);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
scene.add(directionalLight);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 10;
controls.maxDistance = 80;

// Ground plane
const groundGeo = new THREE.PlaneGeometry(60, 60);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x0a0a1a,
    roughness: 0.9,
    metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(50, 50, 0x1a1a3a, 0x1a1a3a);
gridHelper.position.y = 0;
scene.add(gridHelper);

// Bar data
const bars = [];
const barMeshes = [];
const GRID_SIZE = 10;
const SPACING = 2;
const TOTAL_BARS = 100;

// Create sector assignments: 20 bars per sector
const sectorAssignments = [];
for (let s = 0; s < 5; s++) {
    for (let i = 0; i < 20; i++) {
        sectorAssignments.push(s);
    }
}
// Shuffle
for (let i = sectorAssignments.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [sectorAssignments[i], sectorAssignments[j]] = [sectorAssignments[j], sectorAssignments[i]];
}

for (let i = 0; i < GRID_SIZE; i++) {
    for (let j = 0; j < GRID_SIZE; j++) {
        const idx = i * GRID_SIZE + j;
        const sectorIndex = sectorAssignments[idx];
        const baseHeight = 1 + Math.random() * 11;

        const x = (j - (GRID_SIZE - 1) / 2) * SPACING;
        const z = (i - (GRID_SIZE - 1) / 2) * SPACING;

        const geometry = new THREE.BoxGeometry(1.4, 1, 1.4);
        const color = new THREE.Color(sectorColors[sectorIndex]);
        const material = new THREE.MeshStandardMaterial({
            color: color,
            roughness: 0.4,
            metalness: 0.6,
            transparent: true,
            opacity: 1.0,
            emissive: color,
            emissiveIntensity: 0.15
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, baseHeight / 2, z);
        mesh.scale.y = baseHeight;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData = { barIndex: idx };
        scene.add(mesh);

        barMeshes.push(mesh);
        bars.push({
            sectorIndex,
            baseHeight,
            currentHeight: baseHeight,
            targetHeight: baseHeight,
            mesh,
            x, z
        });

        window.__3D_STATE__.barHeights.push(baseHeight);
    }
}

// Load GLB model
const loader = new GLTFLoader();
loader.load(
    'facecap.glb',
    (gltf) => {
        const model = gltf.scene;
        model.position.set(0, 0, -22);
        model.scale.set(3, 3, 3);
        scene.add(model);
        window.__3D_STATE__.modelLoaded = true;
        console.log('Model loaded successfully');
    },
    undefined,
    (error) => {
        console.warn('Could not load facecap.glb:', error.message);
        // Create a placeholder avatar
        const headGeo = new THREE.SphereGeometry(2, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ color: 0x6644aa, emissive: 0x332266, emissiveIntensity: 0.3 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.set(0, 3, -22);
        scene.add(head);

        const bodyGeo = new THREE.CylinderGeometry(1.5, 2, 4, 16);
        const body = new THREE.Mesh(bodyGeo, headMat);
        body.position.set(0, -0.5, -22);
        scene.add(body);

        window.__3D_STATE__.modelLoaded = true;
    }
);

// Raycaster for hover
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
const tooltipSector = document.getElementById('tooltip-sector');
const tooltipHeight = document.getElementById('tooltip-height');

document.addEventListener('mousemove', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(barMeshes);

    if (intersects.length > 0) {
        const barIndex = intersects[0].object.userData.barIndex;
        const bar = bars[barIndex];
        window.__3D_STATE__.hoveredBarIndex = barIndex;

        tooltipSector.textContent = sectorNames[bar.sectorIndex];
        tooltipSector.style.color = '#' + sectorColors[bar.sectorIndex].toString(16).padStart(6, '0');
        tooltipHeight.textContent = 'Price: $' + bar.currentHeight.toFixed(1);

        tooltip.style.display = 'block';
        tooltip.style.left = (event.clientX + 15) + 'px';
        tooltip.style.top = (event.clientY - 10) + 'px';

        // Highlight hovered bar
        intersects[0].object.material.emissiveIntensity = 0.5;
    } else {
        window.__3D_STATE__.hoveredBarIndex = -1;
        tooltip.style.display = 'none';
        barMeshes.forEach((m, i) => {
            m.material.emissiveIntensity = 0.15;
        });
    }
});

// Sector filter buttons
const buttons = document.querySelectorAll('#sector-buttons button');
buttons.forEach(btn => {
    btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const sector = btn.dataset.sector;
        window.__3D_STATE__.activeFilter = sector;
        document.getElementById('filter-display').textContent = sector;

        bars.forEach((bar, i) => {
            if (sector === 'All') {
                bar.mesh.material.opacity = 1.0;
            } else {
                const sIdx = sectorNames.indexOf(sector);
                bar.mesh.material.opacity = (bar.sectorIndex === sIdx) ? 1.0 : 0.2;
            }
        });
    });
});

// Camera animation
let cameraTarget = new THREE.Vector3(0, 15, 30);
let cameraLookTarget = new THREE.Vector3(0, 0, 0);
let animatingCamera = false;

function setCameraPreset(preset) {
    animatingCamera = true;
    switch (preset) {
        case '1':
            cameraTarget.set(0, 40, 0.01);
            window.__3D_STATE__.currentView = 'top';
            break;
        case '2':
            cameraTarget.set(40, 10, 0);
            window.__3D_STATE__.currentView = 'side';
            break;
        case '3':
            cameraTarget.set(0, 15, 30);
            window.__3D_STATE__.currentView = 'default';
            break;
    }
}

// Crash/Recovery animation
let crashAnimating = false;
let recoverAnimating = false;
let animStartTime = 0;

// Keyboard controls
document.addEventListener('keydown', (event) => {
    switch (event.code) {
        case 'Space':
            event.preventDefault();
            window.__3D_STATE__.simulationRunning = !window.__3D_STATE__.simulationRunning;
            updateSimStatus();
            break;
        case 'KeyC':
            if (!crashAnimating) {
                crashAnimating = true;
                recoverAnimating = false;
                animStartTime = performance.now();
                bars.forEach(bar => {
                    bar.targetHeight = 0.5;
                });
                window.__3D_STATE__.crashTriggered = true;
            }
            break;
        case 'KeyR':
            if (!recoverAnimating) {
                recoverAnimating = true;
                crashAnimating = false;
                animStartTime = performance.now();
                bars.forEach(bar => {
                    bar.targetHeight = bar.baseHeight;
                });
                window.__3D_STATE__.recovered = true;
            }
            break;
        case 'KeyT':
            cycleTOD();
            break;
        case 'Digit1':
            setCameraPreset('1');
            break;
        case 'Digit2':
            setCameraPreset('2');
            break;
        case 'Digit3':
            setCameraPreset('3');
            break;
    }
});

function updateSimStatus() {
    const dot = document.getElementById('sim-status-dot');
    const text = document.getElementById('sim-status-text');
    if (window.__3D_STATE__.simulationRunning) {
        dot.classList.add('live');
        text.textContent = 'LIVE';
        text.style.color = '#00ff88';
    } else {
        dot.classList.remove('live');
        text.textContent = 'PAUSED';
        text.style.color = '#ff4444';
    }
}

const todModes = ['day', 'sunset', 'night'];
let todIndex = 0;

function cycleTOD() {
    todIndex = (todIndex + 1) % 3;
    const mode = todModes[todIndex];
    window.__3D_STATE__.timeOfDay = mode;

    switch (mode) {
        case 'day':
            directionalLight.color.set(0xffffff);
            directionalLight.intensity = 0.8;
            ambientLight.color.set(0x334466);
            ambientLight.intensity = 0.5;
            scene.background.set(0x0a0a1a);
            scene.fog.color.set(0x0a0a1a);
            document.getElementById('time-display').textContent = 'Day';
            break;
        case 'sunset':
            directionalLight.color.set(0xff6633);
            directionalLight.intensity = 1.0;
            ambientLight.color.set(0x553322);
            ambientLight.intensity = 0.6;
            scene.background.set(0x1a0a0a);
            scene.fog.color.set(0x1a0a0a);
            document.getElementById('time-display').textContent = 'Sunset';
            break;
        case 'night':
            directionalLight.color.set(0x2233aa);
            directionalLight.intensity = 0.4;
            ambientLight.color.set(0x111133);
            ambientLight.intensity = 0.3;
            scene.background.set(0x050510);
            scene.fog.color.set(0x050510);
            document.getElementById('time-display').textContent = 'Night';
            break;
    }
}

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();

    // Market simulation
    if (window.__3D_STATE__.simulationRunning && !crashAnimating && !recoverAnimating) {
        bars.forEach(bar => {
            bar.currentHeight += (Math.random() - 0.5) * 0.1;
            bar.currentHeight = Math.max(0.5, Math.min(15, bar.currentHeight));
        });
    }

    // Crash/Recovery animation
    if (crashAnimating || recoverAnimating) {
        const elapsed = (now - animStartTime) / 1000;
        const t = Math.min(elapsed / 1.0, 1.0);
        const eased = 1 - Math.pow(1 - t, 3); // ease out cubic

        bars.forEach(bar => {
            const startH = crashAnimating ?
                (bar.currentHeight) :
                (bar.currentHeight);

            if (t < 1) {
                // Lerp toward target
                bar.currentHeight = bar.currentHeight + (bar.targetHeight - bar.currentHeight) * 0.05;
            } else {
                bar.currentHeight = bar.targetHeight;
                crashAnimating = false;
                recoverAnimating = false;
            }
        });
    }

    // Update bar meshes
    let totalHeight = 0;
    let visibleCount = 0;
    bars.forEach((bar, i) => {
        const h = Math.max(0.1, bar.currentHeight);
        bar.mesh.scale.y = h;
        bar.mesh.position.y = h / 2;
        window.__3D_STATE__.barHeights[i] = bar.currentHeight;

        if (bar.mesh.material.opacity > 0.5) {
            totalHeight += bar.currentHeight;
            visibleCount++;
        }
    });

    const avgHeight = visibleCount > 0 ? totalHeight / visibleCount : 0;
    window.__3D_STATE__.marketIndex = avgHeight;
    document.getElementById('market-index-value').textContent = avgHeight.toFixed(1);

    // Color market index based on value
    const indexEl = document.getElementById('market-index-value');
    if (avgHeight > 6) {
        indexEl.style.color = '#00ff88';
    } else if (avgHeight > 3) {
        indexEl.style.color = '#ffaa00';
    } else {
        indexEl.style.color = '#ff4444';
    }

    // Camera animation
    if (animatingCamera) {
        camera.position.lerp(cameraTarget, 0.03);
        if (camera.position.distanceTo(cameraTarget) < 0.1) {
            animatingCamera = false;
        }
        controls.target.lerp(cameraLookTarget, 0.03);
    }

    controls.update();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
