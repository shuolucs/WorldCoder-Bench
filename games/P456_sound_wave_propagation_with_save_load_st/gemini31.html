<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Wave Propagation 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: monospace;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 46, 0.8);
            border: 1px solid #404060;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        .controls-info {
            margin-top: 15px;
            font-size: 12px;
            color: #aaaaaa;
            border-top: 1px solid #404060;
            padding-top: 10px;
        }
        .btn-container {
            margin-top: 15px;
            pointer-events: auto;
        }
        button {
            background: #222244;
            color: white;
            border: 1px solid #00ffff;
            padding: 5px 10px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
            margin-right: 5px;
            transition: background 0.2s;
        }
        button:hover {
            background: #00ffff;
            color: #0a0a2e;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #00ffff;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud-panel">
        <div id="hud-speed" class="hud-line">Wave Speed: 3.0</div>
        <div id="hud-frequency" class="hud-line">Frequency: 1.00 Hz</div>
        <div id="hud-wavelength" class="hud-line">Wavelength: 3.00</div>
        <div id="hud-wave-count" class="hud-line">Waves Active: 0</div>
        <div id="hud-emitting" class="hud-line">Emitting: ON</div>
        
        <div class="btn-container">
            <button id="btn-save">Save State</button>
            <button id="btn-load">Load State</button>
        </div>

        <div class="controls-info">
            [Space] Toggle Emission<br>
            [Up/Down] Adjust Speed<br>
            [Left/Right] Adjust Frequency<br>
            [R] Reset Waves
        </div>
    </div>
    <div id="loading">Loading Model...</div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            waveSpeed: 3.0,
            frequency: 1.0,
            wavelength: 3.0,
            isEmitting: true,
            activeWaveCount: 0,
            detectorStates: [false, false, false],
            helmetLoaded: false,
            helmetRotationY: 0,
            totalWavesEmitted: 0,
            stateSaved: false,
            stateLoaded: false,
            maxWaveRadius: 15,
            waveRings: []
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(10, 15, 10);
        scene.add(pointLight);

        // --- Grid ---
        const gridHelper = new THREE.GridHelper(40, 40, 0x222244, 0x222244);
        gridHelper.position.y = -2;
        scene.add(gridHelper);

        // --- Objects ---
        let helmet;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
            (gltf) => {
                helmet = gltf.scene;
                helmet.scale.set(1.5, 1.5, 1.5);
                helmet.position.set(0, 0, 0);
                scene.add(helmet);
                window.__3D_STATE__.helmetLoaded = true;
                document.getElementById('loading').style.display = 'none';
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // --- Detectors ---
        const detectors = [];
        const detectorDistances = [5, 10, 15];
        const sphereGeo = new THREE.SphereGeometry(0.3, 16, 16);
        
        detectorDistances.forEach((dist, index) => {
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x444444, 
                emissive: 0x000000 
            });
            const mesh = new THREE.Mesh(sphereGeo, mat);
            mesh.position.set(dist, 0, 0);
            scene.add(mesh);
            detectors.push({
                mesh: mesh,
                distance: dist,
                fadeTimer: 0,
                index: index
            });
        });

        // --- Wave Management ---
        let rings = [];
        let timeSinceLastWave = 0;

        function createRing(initialRadius = 0.5) {
            const geo = new THREE.TorusGeometry(initialRadius, 0.05, 8, 64);
            const mat = new THREE.MeshBasicMaterial({ 
                color: 0x00ffff, 
                transparent: true, 
                opacity: 1.0 - (initialRadius / window.__3D_STATE__.maxWaveRadius)
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = Math.PI / 2;
            scene.add(mesh);
            rings.push({ mesh: mesh, radius: initialRadius });
            window.__3D_STATE__.totalWavesEmitted++;
        }

        function resetWaves() {
            rings.forEach(r => {
                scene.remove(r.mesh);
                r.mesh.geometry.dispose();
                r.mesh.material.dispose();
            });
            rings = [];
            detectors.forEach(d => {
                d.fadeTimer = 0;
                d.mesh.material.emissive.setHex(0x000000);
                window.__3D_STATE__.detectorStates[d.index] = false;
            });
            timeSinceLastWave = 0;
        }

        // --- Interactions ---
        window.addEventListener('keydown', (e) => {
            const state = window.__3D_STATE__;
            switch(e.code) {
                case 'Space':
                    state.isEmitting = !state.isEmitting;
                    break;
                case 'ArrowUp':
                    state.waveSpeed = Math.min(10.0, state.waveSpeed + 0.5);
                    break;
                case 'ArrowDown':
                    state.waveSpeed = Math.max(0.5, state.waveSpeed - 0.5);
                    break;
                case 'ArrowLeft':
                    state.frequency = Math.max(0.25, state.frequency - 0.25);
                    break;
                case 'ArrowRight':
                    state.frequency = Math.min(4.0, state.frequency + 0.25);
                    break;
                case 'KeyR':
                    resetWaves();
                    break;
            }
        });

        document.getElementById('btn-save').addEventListener('click', () => {
            const state = window.__3D_STATE__;
            const saveData = {
                waveSpeed: state.waveSpeed,
                frequency: state.frequency,
                isEmitting: state.isEmitting,
                helmetRotationY: helmet ? helmet.rotation.y : 0,
                totalWavesEmitted: state.totalWavesEmitted,
                rings: rings.map(r => ({ radius: r.radius }))
            };
            window.__3D_SAVED_STATE__ = JSON.stringify(saveData);
            state.stateSaved = true;
            state.stateLoaded = false;
        });

        document.getElementById('btn-load').addEventListener('click', () => {
            if (!window.__3D_SAVED_STATE__) return;
            const data = JSON.parse(window.__3D_SAVED_STATE__);
            const state = window.__3D_STATE__;
            
            state.waveSpeed = data.waveSpeed;
            state.frequency = data.frequency;
            state.isEmitting = data.isEmitting;
            state.totalWavesEmitted = data.totalWavesEmitted;
            if (helmet) helmet.rotation.y = data.helmetRotationY;

            resetWaves();
            data.rings.forEach(rData => {
                createRing(rData.radius);
            });

            state.stateLoaded = true;
            state.stateSaved = false;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const state = window.__3D_STATE__;

            controls.update();

            // Helmet Animation
            if (state.isEmitting && helmet) {
                helmet.rotation.y += 0.3 * delta;
            }

            // Wave Spawning
            if (state.isEmitting) {
                timeSinceLastWave += delta;
                const interval = 1.0 / state.frequency;
                if (timeSinceLastWave >= interval) {
                    createRing(0.5);
                    timeSinceLastWave %= interval;
                }
            }

            // Wave Updating
            for (let i = rings.length - 1; i >= 0; i--) {
                const ring = rings[i];
                ring.radius += state.waveSpeed * delta;

                if (ring.radius > state.maxWaveRadius) {
                    scene.remove(ring.mesh);
                    ring.mesh.geometry.dispose();
                    ring.mesh.material.dispose();
                    rings.splice(i, 1);
                } else {
                    // Recreate geometry to maintain constant tube thickness
                    ring.mesh.geometry.dispose();
                    ring.mesh.geometry = new THREE.TorusGeometry(ring.radius, 0.05, 8, 64);
                    ring.mesh.material.opacity = 1.0 - (ring.radius / state.maxWaveRadius);
                }
            }

            // Detector Logic
            detectors.forEach(det => {
                let hit = false;
                rings.forEach(r => {
                    if (Math.abs(r.radius - det.distance) < 0.5) hit = true;
                });

                if (hit) {
                    det.fadeTimer = 0.5;
                    det.mesh.material.emissive.setHex(0xffff00);
                    state.detectorStates[det.index] = true;
                } else {
                    if (det.fadeTimer > 0) {
                        det.fadeTimer -= delta;
                        const t = Math.max(0, det.fadeTimer / 0.5);
                        det.mesh.material.emissive.setHex(0xffff00).multiplyScalar(t);
                        state.detectorStates[det.index] = true;
                    } else {
                        det.mesh.material.emissive.setHex(0x000000);
                        state.detectorStates[det.index] = false;
                    }
                }
            });

            // Update State Object
            state.wavelength = state.waveSpeed / state.frequency;
            state.activeWaveCount = rings.length;
            state.helmetRotationY = helmet ? helmet.rotation.y : 0;
            state.waveRings = rings.map(r => ({ radius: r.radius, opacity: r.mesh.material.opacity }));

            // Update HUD
            document.getElementById('hud-speed').innerText = `Wave Speed: ${state.waveSpeed.toFixed(1)}`;
            document.getElementById('hud-frequency').innerText = `Frequency: ${state.frequency.toFixed(2)} Hz`;
            document.getElementById('hud-wavelength').innerText = `Wavelength: ${state.wavelength.toFixed(2)}`;
            document.getElementById('hud-wave-count').innerText = `Waves Active: ${state.activeWaveCount}`;
            document.getElementById('hud-emitting').innerText = `Emitting: ${state.isEmitting ? 'ON' : 'OFF'}`;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
