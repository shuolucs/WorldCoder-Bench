<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sound Wave Propagation - Three.js</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #e8f6ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #hud-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(10, 16, 40, 0.82);
      border: 1px solid rgba(120, 180, 255, 0.25);
      border-radius: 10px;
      min-width: 220px;
      z-index: 10;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }

    #hud-panel .row {
      margin: 4px 0;
      font-size: 14px;
      line-height: 1.3;
    }

    .button-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    button {
      background: #12335d;
      color: #e8f6ff;
      border: 1px solid #4c7ab8;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #18477f;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 16, 40, 0.72);
      border: 1px solid rgba(120, 180, 255, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #cfe7ff;
      max-width: 420px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud-panel">
      <div class="row" id="hud-speed">Wave Speed: 3.0</div>
      <div class="row" id="hud-frequency">Frequency: 1.00 Hz</div>
      <div class="row" id="hud-wave-count">Waves Active: 0</div>
      <div class="row" id="hud-emitting">Emitting: ON</div>
      <div class="row" id="hud-wavelength">Wavelength: 3.00</div>
      <div class="button-row">
        <button id="btn-save">Save State</button>
        <button id="btn-load">Load State</button>
      </div>
    </div>

    <div id="help">
      <strong>Controls:</strong><br>
      Space: toggle emission<br>
      ↑/↓: increase/decrease wave speed<br>
      ←/→: increase/decrease frequency<br>
      R: reset waves and detectors<br>
      Mouse: orbit / zoom / pan
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const hudSpeed = document.getElementById("hud-speed");
    const hudFrequency = document.getElementById("hud-frequency");
    const hudWaveCount = document.getElementById("hud-wave-count");
    const hudEmitting = document.getElementById("hud-emitting");
    const hudWavelength = document.getElementById("hud-wavelength");
    const btnSave = document.getElementById("btn-save");
    const btnLoad = document.getElementById("btn-load");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.5);
    pointLight.position.set(10, 15, 10);
    scene.add(pointLight);

    const grid = new THREE.GridHelper(40, 40, 0x222244, 0x222244);
    grid.position.y = -2;
    scene.add(grid);

    let helmet = null;
    let helmetLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      "https://threejs.org/examples/models/gltf/DamagedHelmet/glTF-Binary/DamagedHelmet.glb",
      (gltf) => {
        helmet = gltf.scene;
        helmet.scale.set(1.5, 1.5, 1.5);
        helmet.position.set(0, 0, 0);
        scene.add(helmet);
        helmetLoaded = true;
      },
      undefined,
      (err) => {
        console.error("Failed to load DamagedHelmet.glb:", err);
      }
    );

    const detectorDistances = [5, 10, 15];
    const detectors = [];
    const detectorBaseColor = new THREE.Color(0x666666);
    const detectorBaseEmissive = new THREE.Color(0x444444);
    const detectorActiveEmissive = new THREE.Color(0xffff00);

    const detectorGeometry = new THREE.SphereGeometry(0.3, 24, 24);

    detectorDistances.forEach((dist) => {
      const material = new THREE.MeshStandardMaterial({
        color: detectorBaseColor.clone(),
        emissive: detectorBaseEmissive.clone(),
        emissiveIntensity: 1.5,
        roughness: 0.4,
        metalness: 0.1
      });
      const sphere = new THREE.Mesh(detectorGeometry, material);
      sphere.position.set(dist, 0, 0);
      scene.add(sphere);
      detectors.push({
        mesh: sphere,
        distance: dist,
        glowTimer: 0
      });
    });

    const waveGroup = new THREE.Group();
    scene.add(waveGroup);

    const initialRadius = 0.5;
    const maxWaveRadius = 15;
    const ringTubeRadius = 0.06;
    const ringRadialSegments = 16;
    const ringTubularSegments = 96;
    const detectorActivationThreshold = 0.5;

    let waveSpeed = 3.0;
    let frequency = 1.0;
    let isEmitting = true;
    let emitAccumulator = 0;
    let totalWavesEmitted = 0;

    const waves = [];

    function finiteNumber(value, fallback = 0) {
      return Number.isFinite(value) ? value : fallback;
    }

    function clamp(value, min, max) {
      value = finiteNumber(value, min);
      return Math.min(max, Math.max(min, value));
    }

    function wavelength() {
      const f = clamp(frequency, 0.25, 4.0);
      const s = clamp(waveSpeed, 0.5, 10.0);
      return finiteNumber(s / f, 0);
    }

    function createWave(radius = initialRadius) {
      radius = clamp(radius, 0, maxWaveRadius);
      const geometry = new THREE.TorusGeometry(
        Math.max(radius, 0.001),
        ringTubeRadius,
        ringRadialSegments,
        ringTubularSegments
      );
      const opacity = clamp(1 - radius / maxWaveRadius, 0, 1);
      const material = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        transparent: true,
        opacity,
        depthWrite: false
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.rotation.x = Math.PI / 2;
      mesh.position.set(0, 0, 0);
      waveGroup.add(mesh);

      const wave = { mesh, radius, opacity };
      waves.push(wave);
      totalWavesEmitted++;
      return wave;
    }

    function disposeWave(wave) {
      waveGroup.remove(wave.mesh);
      wave.mesh.geometry.dispose();
      wave.mesh.material.dispose();
    }

    function clearWaves() {
      while (waves.length > 0) {
        disposeWave(waves.pop());
      }
    }

    function resetDetectors() {
      detectors.forEach((d) => {
        d.glowTimer = 0;
        d.mesh.material.emissive.copy(detectorBaseEmissive);
      });
    }

    function resetSceneState() {
      clearWaves();
      resetDetectors();
      emitAccumulator = 0;
      totalWavesEmitted = 0;
    }

    function rebuildWaveGeometry(wave) {
      const safeRadius = clamp(wave.radius, 0.001, maxWaveRadius);
      const newGeometry = new THREE.TorusGeometry(
        safeRadius,
        ringTubeRadius,
        ringRadialSegments,
        ringTubularSegments
      );
      wave.mesh.geometry.dispose();
      wave.mesh.geometry = newGeometry;
      wave.mesh.rotation.x = Math.PI / 2;
    }

    function updateWaveVisual(wave) {
      wave.radius = clamp(wave.radius, 0, maxWaveRadius + 1);
      wave.opacity = clamp(1 - wave.radius / maxWaveRadius, 0, 1);
      rebuildWaveGeometry(wave);
      wave.mesh.material.opacity = wave.opacity;
    }

    function updateDetectors(dt) {
      detectors.forEach((d) => {
        let activeNow = false;

        for (const wave of waves) {
          if (Math.abs(wave.radius - d.distance) < detectorActivationThreshold) {
            d.glowTimer = 0.5;
            activeNow = true;
            break;
          }
        }

        if (!activeNow) {
          d.glowTimer = Math.max(0, finiteNumber(d.glowTimer - dt, 0));
        }

        const t = clamp(d.glowTimer / 0.5, 0, 1);
        const emissive = detectorBaseEmissive.clone().lerp(detectorActiveEmissive, t);
        d.mesh.material.emissive.copy(emissive);
      });
    }

    function updateHUD() {
      hudSpeed.textContent = `Wave Speed: ${waveSpeed.toFixed(1)}`;
      hudFrequency.textContent = `Frequency: ${frequency.toFixed(2)} Hz`;
      hudWaveCount.textContent = `Waves Active: ${waves.length}`;
      hudEmitting.textContent = `Emitting: ${isEmitting ? "ON" : "OFF"}`;
      hudWavelength.textContent = `Wavelength: ${wavelength().toFixed(2)}`;
    }

    function updateExposedState() {
      window.__3D_STATE__ = {
        waveSpeed: finiteNumber(waveSpeed, 3.0),
        frequency: finiteNumber(frequency, 1.0),
        wavelength: finiteNumber(wavelength(), 3.0),
        isEmitting: !!isEmitting,
        activeWaveCount: waves.length,
        detectorStates: detectors.map(d => d.glowTimer > 0),
        helmetLoaded: !!helmetLoaded,
        helmetRotationY: helmet ? finiteNumber(helmet.rotation.y, 0) : 0,
        totalWavesEmitted: finiteNumber(totalWavesEmitted, 0),
        stateSaved: !!window.__3D_STATE__?.stateSaved,
        stateLoaded: !!window.__3D_STATE__?.stateLoaded,
        maxWaveRadius: 15,
        waveRings: waves.map(w => ({
          radius: finiteNumber(w.radius, initialRadius),
          opacity: finiteNumber(w.opacity, 1)
        }))
      };
    }

    function saveState() {
      const state = {
        waveSpeed: finiteNumber(waveSpeed, 3.0),
        frequency: finiteNumber(frequency, 1.0),
        isEmitting: !!isEmitting,
        emitAccumulator: finiteNumber(emitAccumulator, 0),
        totalWavesEmitted: finiteNumber(totalWavesEmitted, 0),
        helmetRotationY: helmet ? finiteNumber(helmet.rotation.y, 0) : 0,
        detectorGlowTimers: detectors.map(d => finiteNumber(d.glowTimer, 0)),
        waveRings: waves.map(w => ({
          radius: finiteNumber(w.radius, initialRadius),
          opacity: finiteNumber(w.opacity, 1)
        }))
      };

      window.__3D_SAVED_STATE__ = JSON.stringify(state);

      if (!window.__3D_STATE__) updateExposedState();
      window.__3D_STATE__.stateSaved = true;
      window.__3D_STATE__.stateLoaded = false;
    }

    function loadState() {
      if (!window.__3D_SAVED_STATE__) return;

      try {
        const state = JSON.parse(window.__3D_SAVED_STATE__);

        waveSpeed = clamp(state.waveSpeed, 0.5, 10.0);
        frequency = clamp(state.frequency, 0.25, 4.0);
        isEmitting = !!state.isEmitting;
        emitAccumulator = clamp(state.emitAccumulator ?? 0, 0, 1000);
        totalWavesEmitted = Math.max(0, finiteNumber(state.totalWavesEmitted, 0));

        clearWaves();

        if (Array.isArray(state.waveRings)) {
          state.waveRings.forEach((wr) => {
            const r = clamp(wr.radius, 0, maxWaveRadius);
            const wave = createWave(r);
            wave.opacity = clamp(
              Number.isFinite(wr.opacity) ? wr.opacity : (1 - r / maxWaveRadius),
              0,
              1
            );
            wave.mesh.material.opacity = wave.opacity;
          });

          totalWavesEmitted = Math.max(
            totalWavesEmitted,
            state.totalWavesEmitted ?? waves.length
          );
        }

        if (Array.isArray(state.detectorGlowTimers)) {
          detectors.forEach((d, i) => {
            d.glowTimer = clamp(state.detectorGlowTimers[i] ?? 0, 0, 0.5);
          });
        } else {
          resetDetectors();
        }

        if (helmet) {
          helmet.rotation.y = finiteNumber(state.helmetRotationY, helmet.rotation.y);
        }

        if (!window.__3D_STATE__) updateExposedState();
        window.__3D_STATE__.stateLoaded = true;
        window.__3D_STATE__.stateSaved = !!window.__3D_STATE__.stateSaved;
      } catch (e) {
        console.error("Failed to load saved state:", e);
      }
    }

    btnSave.addEventListener("click", saveState);
    btnLoad.addEventListener("click", loadState);

    window.__3D_SAVED_STATE__ = window.__3D_SAVED_STATE__ || null;
    window.__3D_STATE__ = {
      waveSpeed,
      frequency,
      wavelength: wavelength(),
      isEmitting,
      activeWaveCount: 0,
      detectorStates: [false, false, false],
      helmetLoaded: false,
      helmetRotationY: 0,
      totalWavesEmitted: 0,
      stateSaved: false,
      stateLoaded: false,
      maxWaveRadius: 15,
      waveRings: []
    };

    window.addEventListener("keydown", (e) => {
      switch (e.code) {
        case "Space":
          e.preventDefault();
          isEmitting = !isEmitting;
          break;
        case "ArrowUp":
          e.preventDefault();
          waveSpeed = clamp(waveSpeed + 0.5, 0.5, 10.0);
          break;
        case "ArrowDown":
          e.preventDefault();
          waveSpeed = clamp(waveSpeed - 0.5, 0.5, 10.0);
          break;
        case "ArrowLeft":
          e.preventDefault();
          frequency = clamp(frequency - 0.25, 0.25, 4.0);
          break;
        case "ArrowRight":
          e.preventDefault();
          frequency = clamp(frequency + 0.25, 0.25, 4.0);
          break;
        case "KeyR":
          e.preventDefault();
          resetSceneState();
          break;
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = clamp(clock.getDelta(), 0, 0.1);

      if (isEmitting) {
        const interval = 1 / clamp(frequency, 0.25, 4.0);
        emitAccumulator += dt;

        while (emitAccumulator >= interval) {
          createWave(initialRadius);
          emitAccumulator -= interval;
        }
      }

      for (let i = waves.length - 1; i >= 0; i--) {
        const wave = waves[i];
        wave.radius = finiteNumber(wave.radius + waveSpeed * dt, wave.radius);
        wave.opacity = clamp(1 - wave.radius / maxWaveRadius, 0, 1);

        if (!Number.isFinite(wave.radius) || wave.radius > maxWaveRadius) {
          disposeWave(wave);
          waves.splice(i, 1);
          continue;
        }

        updateWaveVisual(wave);
      }

      updateDetectors(dt);

      if (helmet && isEmitting) {
        helmet.rotation.y += 0.3 * dt;
      }

      controls.update();
      updateHUD();
      updateExposedState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
