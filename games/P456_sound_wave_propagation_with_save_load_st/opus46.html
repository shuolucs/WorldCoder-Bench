<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sound Wave Propagation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0ff;
    font-size: 14px;
    min-width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
}

#hud-panel h3 {
    color: #00ffff;
    margin-bottom: 12px;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(0, 255, 255, 0.2);
    padding-bottom: 8px;
}

.hud-row {
    margin: 8px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.hud-label {
    color: #8888bb;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.hud-value {
    color: #00ffff;
    font-weight: bold;
    font-size: 14px;
}

#hud-emitting .hud-value.on { color: #00ff88; }
#hud-emitting .hud-value.off { color: #ff4466; }

.btn-container {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.btn-container button {
    flex: 1;
    padding: 10px 15px;
    border: 1px solid rgba(0, 255, 255, 0.4);
    background: rgba(0, 255, 255, 0.1);
    color: #00ffff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s ease;
}

.btn-container button:hover {
    background: rgba(0, 255, 255, 0.25);
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
}

.btn-container button:active {
    transform: scale(0.95);
}

#controls-help {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 46, 0.8);
    border: 1px solid rgba(0, 255, 255, 0.2);
    border-radius: 10px;
    padding: 12px 24px;
    color: #8888bb;
    font-size: 12px;
    text-align: center;
    backdrop-filter: blur(10px);
}

#controls-help span {
    color: #00ffff;
    font-weight: bold;
}

#notification {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 255, 255, 0.15);
    border: 1px solid rgba(0, 255, 255, 0.5);
    border-radius: 10px;
    padding: 15px 30px;
    color: #00ffff;
    font-size: 18px;
    font-weight: bold;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(10px);
}

#notification.show {
    opacity: 1;
}
</style>
</head>
<body>

<div id="hud-panel">
    <h3>🔊 Wave Lab</h3>
    <div class="hud-row">
        <span class="hud-label">Speed</span>
        <span class="hud-value" id="hud-speed">3.0</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Frequency</span>
        <span class="hud-value" id="hud-frequency">1.00 Hz</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Wavelength</span>
        <span class="hud-value" id="hud-wavelength">3.00</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Active Waves</span>
        <span class="hud-value" id="hud-wave-count">0</span>
    </div>
    <div class="hud-row" id="hud-emitting">
        <span class="hud-label">Emitting</span>
        <span class="hud-value on" id="hud-emitting-value">ON</span>
    </div>
    <div class="btn-container">
        <button id="btn-save">💾 Save</button>
        <button id="btn-load">📂 Load</button>
    </div>
</div>

<div id="controls-help">
    <span>Space</span> Toggle Emit &nbsp;|&nbsp;
    <span>↑↓</span> Speed &nbsp;|&nbsp;
    <span>←→</span> Frequency &nbsp;|&nbsp;
    <span>R</span> Reset
</div>

<div id="notification"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 5;
controls.maxDistance = 40;

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1.5);
pointLight.position.set(10, 15, 10);
scene.add(pointLight);

// Add a subtle blue point light at origin for atmosphere
const emitterLight = new THREE.PointLight(0x00ffff, 0.5, 10);
emitterLight.position.set(0, 0, 0);
scene.add(emitterLight);

// Grid
const gridHelper = new THREE.GridHelper(40, 40, 0x222244, 0x222244);
gridHelper.position.y = -2;
scene.add(gridHelper);

// State variables
let waveSpeed = 3.0;
let frequency = 1.0;
let isEmitting = true;
let totalWavesEmitted = 0;
let stateSaved = false;
let stateLoaded = false;
const maxWaveRadius = 15;
const waveRings = [];
let timeSinceLastWave = 0;
let helmet = null;
let helmetLoaded = false;

// Detectors
const detectorDistances = [5, 10, 15];
const detectors = [];
const detectorActivation = [0, 0, 0]; // activation timer

detectorDistances.forEach((dist, i) => {
    const geo = new THREE.SphereGeometry(0.3, 16, 16);
    const mat = new THREE.MeshStandardMaterial({
        color: 0x444444,
        emissive: 0x000000,
        emissiveIntensity: 1.0,
        metalness: 0.5,
        roughness: 0.3
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(dist, 0, 0);
    scene.add(mesh);

    // Add a small label ring around detector
    const ringGeo = new THREE.TorusGeometry(0.5, 0.02, 8, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x444466 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(mesh.position);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);

    detectors.push(mesh);
});

// Load helmet model
const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
    (gltf) => {
        helmet = gltf.scene;
        helmet.scale.set(1.5, 1.5, 1.5);
        helmet.position.set(0, 0, 0);
        scene.add(helmet);
        helmetLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load DamagedHelmet.glb, creating placeholder:', error);
        // Create a placeholder
        const geo = new THREE.IcosahedronGeometry(1, 2);
        const mat = new THREE.MeshStandardMaterial({
            color: 0x888888,
            metalness: 0.8,
            roughness: 0.2,
            wireframe: false
        });
        helmet = new THREE.Mesh(geo, mat);
        helmet.scale.set(1.5, 1.5, 1.5);
        helmet.position.set(0, 0, 0);
        scene.add(helmet);
        helmetLoaded = true;
    }
);

// Create emitter glow effect
const glowGeo = new THREE.SphereGeometry(2, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({
    color: 0x00ffff,
    transparent: true,
    opacity: 0.05,
    side: THREE.BackSide
});
const glowMesh = new THREE.Mesh(glowGeo, glowMat);
scene.add(glowMesh);

// Wave ring creation
function createWaveRing(initialRadius = 0.5, initialOpacity = 1.0) {
    const geo = new THREE.TorusGeometry(initialRadius, 0.03, 8, 128);
    const mat = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        transparent: true,
        opacity: initialOpacity,
        side: THREE.DoubleSide
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = Math.PI / 2;
    scene.add(mesh);

    return {
        mesh,
        radius: initialRadius,
        opacity: initialOpacity,
        initialRadius: initialRadius,
        birthTime: performance.now() / 1000
    };
}

function removeWaveRing(ring) {
    scene.remove(ring.mesh);
    ring.mesh.geometry.dispose();
    ring.mesh.material.dispose();
}

function updateWaveRingGeometry(ring, newRadius) {
    ring.mesh.geometry.dispose();
    ring.mesh.geometry = new THREE.TorusGeometry(newRadius, 0.03 + 0.01 * (newRadius / maxWaveRadius), 8, 128);
    ring.radius = newRadius;
}

// Notification
function showNotification(text) {
    const el = document.getElementById('notification');
    el.textContent = text;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
}

// Keyboard input
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    switch (e.code) {
        case 'Space':
            e.preventDefault();
            isEmitting = !isEmitting;
            showNotification(isEmitting ? '🔊 Emitting ON' : '🔇 Emitting OFF');
            break;
        case 'ArrowUp':
            e.preventDefault();
            waveSpeed = Math.min(10.0, waveSpeed + 0.5);
            showNotification(`Speed: ${waveSpeed.toFixed(1)}`);
            break;
        case 'ArrowDown':
            e.preventDefault();
            waveSpeed = Math.max(0.5, waveSpeed - 0.5);
            showNotification(`Speed: ${waveSpeed.toFixed(1)}`);
            break;
        case 'ArrowRight':
            e.preventDefault();
            frequency = Math.min(4.0, frequency + 0.25);
            showNotification(`Frequency: ${frequency.toFixed(2)} Hz`);
            break;
        case 'ArrowLeft':
            e.preventDefault();
            frequency = Math.max(0.25, frequency - 0.25);
            showNotification(`Frequency: ${frequency.toFixed(2)} Hz`);
            break;
        case 'KeyR':
            e.preventDefault();
            // Reset all waves
            while (waveRings.length > 0) {
                removeWaveRing(waveRings.pop());
            }
            totalWavesEmitted = 0;
            timeSinceLastWave = 0;
            detectorActivation.fill(0);
            detectors.forEach(d => {
                d.material.emissive.setHex(0x000000);
                d.material.color.setHex(0x444444);
            });
            showNotification('🔄 Reset');
            break;
    }
});

// Save/Load
document.getElementById('btn-save').addEventListener('click', () => {
    const state = {
        waveSpeed,
        frequency,
        isEmitting,
        totalWavesEmitted,
        helmetRotationY: helmet ? helmet.rotation.y : 0,
        waveRingsData: waveRings.map(r => ({
            radius: r.radius,
            opacity: r.opacity,
            initialRadius: r.initialRadius
        })),
        detectorActivation: [...detectorActivation],
        cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
        cameraTarget: { x: controls.target.x, y: controls.target.y, z: controls.target.z }
    };
    window.__3D_SAVED_STATE__ = JSON.stringify(state);
    stateSaved = true;
    stateLoaded = false;
    showNotification('💾 State Saved');
});

document.getElementById('btn-load').addEventListener('click', () => {
    if (!window.__3D_SAVED_STATE__) {
        showNotification('⚠️ No saved state');
        return;
    }

    try {
        const state = JSON.parse(window.__3D_SAVED_STATE__);

        waveSpeed = state.waveSpeed;
        frequency = state.frequency;
        isEmitting = state.isEmitting;
        totalWavesEmitted = state.totalWavesEmitted;
        timeSinceLastWave = 0;

        if (helmet && state.helmetRotationY !== undefined) {
            helmet.rotation.y = state.helmetRotationY;
        }

        // Remove existing rings
        while (waveRings.length > 0) {
            removeWaveRing(waveRings.pop());
        }

        // Recreate rings
        if (state.waveRingsData) {
            state.waveRingsData.forEach(rd => {
                const ring = createWaveRing(rd.radius, rd.opacity);
                ring.initialRadius = rd.initialRadius;
                waveRings.push(ring);
            });
        }

        // Restore detector activation
        if (state.detectorActivation) {
            state.detectorActivation.forEach((v, i) => {
                detectorActivation[i] = v;
            });
        }

        // Restore camera
        if (state.cameraPosition) {
            camera.position.set(state.cameraPosition.x, state.cameraPosition.y, state.cameraPosition.z);
        }
        if (state.cameraTarget) {
            controls.target.set(state.cameraTarget.x, state.cameraTarget.y, state.cameraTarget.z);
        }

        stateLoaded = true;
        showNotification('📂 State Loaded');
    } catch (err) {
        showNotification('⚠️ Load failed');
        console.error(err);
    }
});

// Initialize global state
window.__3D_STATE__ = {
    waveSpeed: 3.0,
    frequency: 1.0,
    wavelength: 3.0,
    isEmitting: true,
    activeWaveCount: 0,
    detectorStates: [false, false, false],
    helmetLoaded: false,
    helmetRotationY: 0,
    totalWavesEmitted: 0,
    stateSaved: false,
    stateLoaded: false,
    maxWaveRadius: 15,
    waveRings: []
};

// Animation
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // Clamp delta to avoid huge jumps
    const dt = Math.min(delta, 0.1);

    // Helmet rotation
    if (helmet && isEmitting) {
        helmet.rotation.y += 0.3 * dt;
    }

    // Emitter glow pulse
    glowMat.opacity = 0.03 + 0.03 * Math.sin(elapsed * 3);
    emitterLight.intensity = isEmitting ? 0.5 + 0.3 * Math.sin(elapsed * frequency * Math.PI * 2) : 0.2;

    // Wave emission
    if (isEmitting) {
        timeSinceLastWave += dt;
        const interval = 1.0 / frequency;
        if (timeSinceLastWave >= interval) {
            timeSinceLastWave -= interval;
            const ring = createWaveRing(0.5, 1.0);
            waveRings.push(ring);
            totalWavesEmitted++;
        }
    }

    // Update wave rings
    for (let i = waveRings.length - 1; i >= 0; i--) {
        const ring = waveRings[i];
        const newRadius = ring.radius + waveSpeed * dt;
        const newOpacity = Math.max(0, 1.0 - (newRadius / maxWaveRadius));

        if (newRadius > maxWaveRadius) {
            removeWaveRing(ring);
            waveRings.splice(i, 1);
            continue;
        }

        updateWaveRingGeometry(ring, newRadius);
        ring.opacity = newOpacity;
        ring.mesh.material.opacity = newOpacity;

        // Color shift as wave expands
        const hue = 0.5 + 0.1 * (newRadius / maxWaveRadius);
        ring.mesh.material.color.setHSL(hue, 1.0, 0.5);
    }

    // Update detectors
    const detectorStates = [false, false, false];
    detectors.forEach((det, i) => {
        const dist = detectorDistances[i];

        // Check if any wave is passing through
        let activated = false;
        for (const ring of waveRings) {
            if (Math.abs(ring.radius - dist) < 0.5) {
                activated = true;
                break;
            }
        }

        if (activated) {
            detectorActivation[i] = 0.5; // 0.5 seconds fade
            detectorStates[i] = true;
        }

        if (detectorActivation[i] > 0) {
            detectorActivation[i] = Math.max(0, detectorActivation[i] - dt);
            const t = detectorActivation[i] / 0.5;
            det.material.emissive.setHex(0xffff00);
            det.material.emissiveIntensity = t;
            det.material.color.lerpColors(
                new THREE.Color(0x444444),
                new THREE.Color(0xffff00),
                t
            );
            if (detectorActivation[i] > 0) {
                detectorStates[i] = true;
            }
        } else {
            det.material.emissive.setHex(0x000000);
            det.material.emissiveIntensity = 0;
            det.material.color.setHex(0x444444);
        }
    });

    // Update HUD
    const wavelength = waveSpeed / frequency;
    document.getElementById('hud-speed').textContent = waveSpeed.toFixed(1);
    document.getElementById('hud-frequency').textContent = frequency.toFixed(2) + ' Hz';
    document.getElementById('hud-wavelength').textContent = wavelength.toFixed(2);
    document.getElementById('hud-wave-count').textContent = waveRings.length;

    const emitEl = document.getElementById('hud-emitting-value');
    emitEl.textContent = isEmitting ? 'ON' : 'OFF';
    emitEl.className = 'hud-value ' + (isEmitting ? 'on' : 'off');

    // Update global state
    window.__3D_STATE__ = {
        waveSpeed,
        frequency,
        wavelength: isFinite(wavelength) ? wavelength : 0,
        isEmitting,
        activeWaveCount: waveRings.length,
        detectorStates,
        helmetLoaded,
        helmetRotationY: helmet ? helmet.rotation.y : 0,
        totalWavesEmitted,
        stateSaved,
        stateLoaded,
        maxWaveRadius,
        waveRings: waveRings.map(r => ({
            radius: isFinite(r.radius) ? r.radius : 0,
            opacity: isFinite(r.opacity) ? r.opacity : 0
        }))
    };

    controls.update();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
