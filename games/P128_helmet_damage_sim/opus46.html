<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helmet Impact Damage Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #fff;
    background: rgba(0, 0, 0, 0.75);
    padding: 20px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 2;
    min-width: 260px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  
  #hud h2 {
    margin-bottom: 10px;
    font-size: 16px;
    color: #ff6b35;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 8px;
  }
  
  #hud .stat-label {
    color: #aaa;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  #hud .stat-value {
    font-weight: bold;
    font-size: 18px;
    color: #4fc3f7;
  }
  
  #integrityBar {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    margin-top: 4px;
    overflow: hidden;
  }
  
  #integrityBarFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #4caf50, #8bc34a);
    border-radius: 4px;
    transition: width 0.5s ease, background 0.5s ease;
  }
  
  #warning {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff1744;
    font-size: 48px;
    font-weight: bold;
    text-align: center;
    text-shadow: 0 0 30px rgba(255, 23, 68, 0.8), 0 0 60px rgba(255, 23, 68, 0.4);
    animation: pulse 0.8s ease-in-out infinite alternate;
    z-index: 20;
    pointer-events: none;
  }
  
  @keyframes pulse {
    from { opacity: 0.6; transform: translate(-50%, -50%) scale(0.95); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
  }
  
  #instructions {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    background: rgba(0,0,0,0.5);
    padding: 10px 20px;
    border-radius: 20px;
    pointer-events: none;
    z-index: 10;
  }
  
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 20px;
    z-index: 30;
  }
  
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #ff6b35;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 15px;
  }
  
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Loading Helmet Model...</div>
</div>

<div id="hud">
  <h2>⚠ Impact Damage Analysis</h2>
  <div>
    <span class="stat-label">Impact Count</span><br>
    <span class="stat-value" id="impactCount">0</span>
  </div>
  <div style="margin-top:8px;">
    <span class="stat-label">Structural Integrity</span><br>
    <span class="stat-value" id="integrity">100%</span>
    <div id="integrityBar"><div id="integrityBarFill"></div></div>
  </div>
  <div style="margin-top:8px;">
    <span class="stat-label">Surface Roughness</span><br>
    <span class="stat-value" id="roughness">0.00</span>
  </div>
</div>

<div id="warning">⚠ STRUCTURAL FAILURE ⚠<br><span style="font-size:24px;">Helmet Compromised</span></div>

<div id="instructions">🖱 Click on helmet to simulate impact | Scroll to zoom | Drag to rotate</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// State
let impactCount = 0;
let integrity = 100;
let currentRoughness = 0;
let lastImpactPos = { x: 0, y: 0, z: 0 };
let helmetModel = null;
let helmetMeshes = [];
let originalMaterials = new Map();
let baseRoughness = new Map();
let baseMetalness = new Map();

window.__3D_STATE__ = {
  modelLoaded: false,
  impactCount: 0,
  integrity: 100,
  roughness: 0,
  lastImpactPos: { x: 0, y: 0, z: 0 }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.5, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.5;
controls.maxDistance = 6;
controls.target.set(0, 0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.0);
dirLight1.position.set(5, 5, 5);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x8888ff, 1.0);
dirLight2.position.set(-3, 3, -3);
scene.add(dirLight2);

const dirLight3 = new THREE.DirectionalLight(0xff8844, 0.5);
dirLight3.position.set(0, -3, 2);
scene.add(dirLight3);

// Environment map for PBR
const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();

// Create a simple environment
const envScene = new THREE.Scene();
envScene.background = new THREE.Color(0x333344);
const envLight = new THREE.AmbientLight(0xffffff, 1);
envScene.add(envLight);
const envTexture = pmremGenerator.fromScene(envScene).texture;
scene.environment = envTexture;

// Impact markers group
const impactMarkers = new THREE.Group();
scene.add(impactMarkers);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Impact decal data - store impact points for shader-based deformation
const impactPoints = [];

// Custom shader chunk for displacement
const displacementData = {
  impacts: [],
  maxImpacts: 50
};

// Load model
const loader = new GLTFLoader();
loader.load(
  'assets/DamagedHelmet.glb',
  (gltf) => {
    helmetModel = gltf.scene;
    
    // Center the model
    const box = new THREE.Box3().setFromObject(helmetModel);
    const center = box.getCenter(new THREE.Vector3());
    helmetModel.position.sub(center);
    
    // Collect meshes and store original materials
    helmetModel.traverse((child) => {
      if (child.isMesh) {
        helmetMeshes.push(child);
        
        // Clone material so we can modify it
        if (child.material) {
          const origMat = child.material.clone();
          originalMaterials.set(child, origMat);
          baseRoughness.set(child, child.material.roughness || 0.5);
          baseMetalness.set(child, child.material.metalness || 0.5);
          currentRoughness = child.material.roughness || 0.5;
        }
      }
    });
    
    scene.add(helmetModel);
    
    document.getElementById('loading').style.display = 'none';
    window.__3D_STATE__.modelLoaded = true;
    
    updateHUD();
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.error('Error loading model:', error);
    document.getElementById('loading').innerHTML = 
      '<div style="color:#ff4444;">Failed to load model.<br>Ensure assets/DamagedHelmet.glb exists.</div>';
  }
);

// Impact effect function
function createImpact(point, normal, face) {
  impactCount++;
  
  // Random damage between 10-15%
  const damage = 10 + Math.random() * 5;
  integrity = Math.max(0, integrity - damage);
  
  lastImpactPos = { x: point.x, y: point.y, z: point.z };
  
  // Create impact marker (red sphere)
  const markerGeom = new THREE.SphereGeometry(0.02, 16, 16);
  const markerMat = new THREE.MeshStandardMaterial({
    color: 0xff0000,
    emissive: 0xff2200,
    emissiveIntensity: 2,
    roughness: 0.2,
    metalness: 0.8
  });
  const marker = new THREE.Mesh(markerGeom, markerMat);
  marker.position.copy(point);
  impactMarkers.add(marker);
  
  // Create impact ring effect
  const ringGeom = new THREE.RingGeometry(0.01, 0.06, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xff4400,
    transparent: true,
    opacity: 0.8,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.position.copy(point);
  if (normal) {
    ring.lookAt(point.clone().add(normal));
  }
  ring.position.add(normal.clone().multiplyScalar(0.005));
  impactMarkers.add(ring);
  
  // Create crack lines radiating from impact
  const crackCount = 3 + Math.floor(Math.random() * 4);
  for (let i = 0; i < crackCount; i++) {
    const angle = (Math.PI * 2 / crackCount) * i + Math.random() * 0.5;
    const length = 0.05 + Math.random() * 0.15;
    
    // Create a tangent direction
    const tangent = new THREE.Vector3(
      Math.cos(angle),
      Math.sin(angle),
      0
    );
    
    // Project tangent onto the surface plane
    const up = normal.clone();
    const right = new THREE.Vector3().crossVectors(up, new THREE.Vector3(0, 1, 0)).normalize();
    if (right.length() < 0.01) {
      right.crossVectors(up, new THREE.Vector3(1, 0, 0)).normalize();
    }
    const forward = new THREE.Vector3().crossVectors(right, up).normalize();
    
    const dir = right.clone().multiplyScalar(Math.cos(angle)).add(forward.clone().multiplyScalar(Math.sin(angle)));
    
    const crackPoints = [
      point.clone().add(normal.clone().multiplyScalar(0.003)),
      point.clone().add(dir.multiplyScalar(length)).add(normal.clone().multiplyScalar(0.003))
    ];
    
    const crackGeom = new THREE.BufferGeometry().setFromPoints(crackPoints);
    const crackMat = new THREE.LineBasicMaterial({
      color: 0xff2200,
      transparent: true,
      opacity: 0.9
    });
    const crackLine = new THREE.Line(crackGeom, crackMat);
    impactMarkers.add(crackLine);
  }
  
  // Create dent visualization - deformed disc
  const dentGeom = new THREE.CircleGeometry(0.08, 32);
  // Deform the geometry to look like a dent
  const dentPositions = dentGeom.attributes.position;
  for (let i = 0; i < dentPositions.count; i++) {
    const x = dentPositions.getX(i);
    const y = dentPositions.getY(i);
    const dist = Math.sqrt(x * x + y * y);
    const maxR = 0.08;
    const depth = -0.015 * Math.max(0, 1 - (dist / maxR) * (dist / maxR));
    dentPositions.setZ(i, depth);
  }
  dentGeom.computeVertexNormals();
  
  const dentMat = new THREE.MeshStandardMaterial({
    color: 0x444444,
    roughness: 0.9,
    metalness: 0.3,
    transparent: true,
    opacity: 0.7,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const dent = new THREE.Mesh(dentGeom, dentMat);
  dent.position.copy(point);
  if (normal) {
    dent.lookAt(point.clone().add(normal));
  }
  dent.position.add(normal.clone().multiplyScalar(-0.001));
  impactMarkers.add(dent);
  
  // Store impact for vertex displacement
  impactPoints.push({
    position: point.clone(),
    radius: 0.3,
    strength: 0.02,
    time: Date.now()
  });
  
  // Apply vertex displacement to helmet meshes
  applyVertexDisplacement(point, 0.3);
  
  // Material degradation
  applyMaterialDegradation(point);
  
  // Flash effect
  createImpactFlash(point, normal);
  
  // Particle burst
  createParticleBurst(point, normal);
  
  // Update integrity visuals
  updateIntegrityVisuals();
  
  // Update HUD
  updateHUD();
  
  // Update global state
  window.__3D_STATE__.impactCount = impactCount;
  window.__3D_STATE__.integrity = integrity;
  window.__3D_STATE__.roughness = currentRoughness;
  window.__3D_STATE__.lastImpactPos = lastImpactPos;
}

// Apply vertex displacement to simulate dent
function applyVertexDisplacement(impactPoint, radius) {
  helmetMeshes.forEach((mesh) => {
    const geometry = mesh.geometry;
    if (!geometry.attributes.position) return;
    
    // Clone geometry if not already cloned
    if (!mesh._originalPositions) {
      mesh._originalPositions = geometry.attributes.position.array.slice();
    }
    
    const positions = geometry.attributes.position;
    const worldMatrix = mesh.matrixWorld;
    const inverseMatrix = new THREE.Matrix4().copy(worldMatrix).invert();
    
    // Transform impact point to local space
    const localImpact = impactPoint.clone().applyMatrix4(inverseMatrix);
    
    for (let i = 0; i < positions.count; i++) {
      const vx = positions.getX(i);
      const vy = positions.getY(i);
      const vz = positions.getZ(i);
      
      const vertex = new THREE.Vector3(vx, vy, vz);
      const dist = vertex.distanceTo(localImpact);
      
      if (dist < radius) {
        // Gaussian falloff
        const factor = Math.exp(-(dist * dist) / (2 * (radius * 0.3) * (radius * 0.3)));
        const displacement = factor * 0.02;
        
        // Push vertex inward (toward center)
        const direction = vertex.clone().normalize();
        positions.setX(i, vx - direction.x * displacement);
        positions.setY(i, vy - direction.y * displacement);
        positions.setZ(i, vz - direction.z * displacement);
      }
    }
    
    positions.needsUpdate = true;
    geometry.computeVertexNormals();
  });
}

// Material degradation
function applyMaterialDegradation(impactPoint) {
  helmetMeshes.forEach((mesh) => {
    if (!mesh.material) return;
    const mat = mesh.material;
    
    // Every 3 impacts, increase roughness by 0.2
    if (impactCount % 3 === 0) {
      const baseR = baseRoughness.get(mesh) || 0.5;
      const roughnessIncrease = Math.floor(impactCount / 3) * 0.2;
      mat.roughness = Math.min(1.0, baseR + roughnessIncrease);
      currentRoughness = mat.roughness;
    }
    
    // Metalness change per impact in impact area
    const baseMet = baseMetalness.get(mesh) || 0.5;
    // Reduce metalness slightly to simulate surface damage
    mat.metalness = Math.max(0.1, baseMet - impactCount * 0.03);
    
    mat.needsUpdate = true;
  });
}

// Impact flash effect
function createImpactFlash(point, normal) {
  const flashGeom = new THREE.SphereGeometry(0.1, 16, 16);
  const flashMat = new THREE.MeshBasicMaterial({
    color: 0xffaa00,
    transparent: true,
    opacity: 1.0
  });
  const flash = new THREE.Mesh(flashGeom, flashMat);
  flash.position.copy(point);
  flash._startTime = Date.now();
  flash._duration = 300;
  scene.add(flash);
  
  // Animate and remove
  const animateFlash = () => {
    const elapsed = Date.now() - flash._startTime;
    const t = elapsed / flash._duration;
    if (t >= 1) {
      scene.remove(flash);
      flashGeom.dispose();
      flashMat.dispose();
      return;
    }
    flash.scale.setScalar(1 + t * 3);
    flashMat.opacity = 1 - t;
    requestAnimationFrame(animateFlash);
  };
  animateFlash();
}

// Particle burst on impact
function createParticleBurst(point, normal) {
  const particleCount = 20;
  const particles = [];
  
  for (let i = 0; i < particleCount; i++) {
    const pGeom = new THREE.SphereGeometry(0.005, 4, 4);
    const pMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().lerpColors(
        new THREE.Color(0xff4400),
        new THREE.Color(0xffaa00),
        Math.random()
      ),
      transparent: true,
      opacity: 1
    });
    const p = new THREE.Mesh(pGeom, pMat);
    p.position.copy(point);
    
    // Random velocity
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 0.05,
      (Math.random() - 0.5) * 0.05,
      (Math.random() - 0.5) * 0.05
    );
    if (normal) {
      vel.add(normal.clone().multiplyScalar(0.03 + Math.random() * 0.03));
    }
    
    p._velocity = vel;
    p._startTime = Date.now();
    p._duration = 500 + Math.random() * 500;
    
    scene.add(p);
    particles.push(p);
  }
  
  const animateParticles = () => {
    let allDone = true;
    particles.forEach((p) => {
      const elapsed = Date.now() - p._startTime;
      const t = elapsed / p._duration;
      if (t >= 1) {
        if (p.parent) {
          scene.remove(p);
          p.geometry.dispose();
          p.material.dispose();
        }
        return;
      }
      allDone = false;
      p.position.add(p._velocity);
      p._velocity.y -= 0.0005; // gravity
      p.material.opacity = 1 - t;
      p.scale.setScalar(1 - t * 0.5);
    });
    if (!allDone) {
      requestAnimationFrame(animateParticles);
    }
  };
  animateParticles();
}

// Update integrity visuals
function updateIntegrityVisuals() {
  if (integrity <= 30 && integrity > 0) {
    // Red warning tint
    helmetMeshes.forEach((mesh) => {
      if (mesh.material) {
        const warningIntensity = (30 - integrity) / 30;
        mesh.material.emissive = new THREE.Color(0xff0000);
        mesh.material.emissiveIntensity = warningIntensity * 0.5;
        mesh.material.needsUpdate = true;
      }
    });
  }
  
  if (integrity <= 0) {
    // Structural failure
    document.getElementById('warning').style.display = 'block';
    helmetMeshes.forEach((mesh) => {
      if (mesh.material) {
        mesh.material.emissive = new THREE.Color(0xff0000);
        mesh.material.emissiveIntensity = 0.8;
        mesh.material.needsUpdate = true;
      }
    });
  }
}

// Update HUD
function updateHUD() {
  document.getElementById('impactCount').textContent = impactCount;
  document.getElementById('integrity').textContent = Math.max(0, Math.round(integrity)) + '%';
  document.getElementById('roughness').textContent = currentRoughness.toFixed(2);
  
  // Update integrity bar
  const barFill = document.getElementById('integrityBarFill');
  barFill.style.width = Math.max(0, integrity) + '%';
  
  if (integrity > 60) {
    barFill.style.background = 'linear-gradient(90deg, #4caf50, #8bc34a)';
  } else if (integrity > 30) {
    barFill.style.background = 'linear-gradient(90deg, #ff9800, #ffc107)';
  } else {
    barFill.style.background = 'linear-gradient(90deg, #f44336, #ff5722)';
  }
  
  // Update integrity text color
  const integrityEl = document.getElementById('integrity');
  if (integrity > 60) {
    integrityEl.style.color = '#4fc3f7';
  } else if (integrity > 30) {
    integrityEl.style.color = '#ffc107';
  } else {
    integrityEl.style.color = '#ff1744';
  }
}

// Click handler
function onMouseClick(event) {
  if (!helmetModel) return;
  
  // Calculate mouse position
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  const intersects = raycaster.intersectObjects(helmetMeshes, true);
  
  if (intersects.length > 0) {
    const hit = intersects[0];
    const point = hit.point;
    const normal = hit.face ? hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize() : new THREE.Vector3(0, 1, 0);
    
    createImpact(point, normal, hit.face);
  }
}

renderer.domElement.addEventListener('click', onMouseClick);

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  
  controls.update();
  
  // Subtle helmet rotation when idle
  if (helmetModel && impactCount === 0) {
    // Very subtle idle animation
  }
  
  // Shake effect when integrity is low
  if (helmetModel && integrity <= 30 && integrity > 0) {
    const shakeIntensity = (30 - integrity) / 30 * 0.003;
    helmetModel.rotation.x = (Math.random() - 0.5) * shakeIntensity;
    helmetModel.rotation.z = (Math.random() - 0.5) * shakeIntensity;
  }
  
  // Pulsing red for critical state
  if (integrity <= 30 && integrity > 0) {
    const pulse = (Math.sin(Date.now() * 0.005) + 1) * 0.5;
    helmetMeshes.forEach((mesh) => {
      if (mesh.material && mesh.material.emissive) {
        mesh.material.emissiveIntensity = 0.2 + pulse * 0.4;
      }
    });
  }
  
  // Update global state
  window.__3D_STATE__ = {
    modelLoaded: helmetModel !== null,
    impactCount: impactCount,
    integrity: Math.max(0, Math.round(integrity * 100) / 100),
    roughness: Math.round(currentRoughness * 100) / 100,
    lastImpactPos: lastImpactPos
  };
  
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
