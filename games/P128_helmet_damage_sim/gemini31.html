<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helmet Impact Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #444;
            border-radius: 5px;
            pointer-events: none;
        }
        #hud div {
            margin-bottom: 5px;
        }
        #failure-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ff0000;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0000;
            display: none;
            pointer-events: none;
            z-index: 100;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="hud">
        <div>撞击次数: <span id="impactCount">0</span></div>
        <div>结构完整性: <span id="integrity">100</span>%</div>
        <div>表面粗糙度: <span id="roughness">0.00</span></div>
    </div>
    <div id="failure-warning">结构失效</div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DecalGeometry } from 'three/addons/geometries/DecalGeometry.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // State
        window.__3D_STATE__ = {
            modelLoaded: false,
            impactCount: 0,
            integrity: 100,
            roughness: 0,
            lastImpactPos: { x: 0, y: 0, z: 0 }
        };

        // DOM Elements
        const elImpactCount = document.getElementById('impactCount');
        const elIntegrity = document.getElementById('integrity');
        const elRoughness = document.getElementById('roughness');
        const elFailureWarning = document.getElementById('failure-warning');

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        // Environment Lighting
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 1;
        controls.maxDistance = 10;

        // Variables
        let helmetMesh = null;
        let helmetMaterial = null;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Load Model
        const loader = new GLTFLoader();
        loader.load('assets/DamagedHelmet.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);

            scene.add(model);

            // Find mesh and material
            model.traverse((child) => {
                if (child.isMesh) {
                    helmetMesh = child;
                    helmetMaterial = child.material;
                    window.__3D_STATE__.roughness = helmetMaterial.roughness;
                    updateHUD();
                }
            });

            window.__3D_STATE__.modelLoaded = true;
        });

        // Interaction
        window.addEventListener('click', (event) => {
            if (!helmetMesh || window.__3D_STATE__.integrity <= 0) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(helmetMesh, false);

            if (intersects.length > 0) {
                handleImpact(intersects[0]);
            }
        });

        function handleImpact(hit) {
            // 1. Update State
            window.__3D_STATE__.impactCount++;
            const damage = 10 + Math.random() * 5; // 10-15%
            window.__3D_STATE__.integrity = Math.max(0, window.__3D_STATE__.integrity - damage);
            window.__3D_STATE__.lastImpactPos = { x: hit.point.x, y: hit.point.y, z: hit.point.z };

            // 2. Red Marker (radius 0.02)
            const markerGeo = new THREE.SphereGeometry(0.02, 16, 16);
            const markerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.copy(hit.point);
            scene.add(marker);

            // 3. Dent/Damage Decal (radius ~0.3)
            const position = hit.point.clone();
            const normal = hit.face.normal.clone();
            normal.transformDirection(helmetMesh.matrixWorld);
            
            const orientation = new THREE.Euler();
            const m = new THREE.Matrix4();
            m.lookAt(position, position.clone().add(normal), new THREE.Vector3(0, 1, 0));
            orientation.setFromRotationMatrix(m);
            
            // Randomize rotation around normal slightly
            orientation.z = Math.random() * 2 * Math.PI;

            const size = new THREE.Vector3(0.3, 0.3, 0.3);
            const decalGeo = new DecalGeometry(helmetMesh, position, orientation, size);
            
            // Material simulating exposed metal/damage
            const decalMat = new THREE.MeshStandardMaterial({
                color: 0x111111,
                roughness: 0.2,
                metalness: 1.0, // Increase metalness in impact area
                polygonOffset: true,
                polygonOffsetFactor: -4,
                transparent: true,
                opacity: 0.9
            });
            
            const decal = new THREE.Mesh(decalGeo, decalMat);
            scene.add(decal);

            // 4. Material Degradation (every 3 impacts)
            if (window.__3D_STATE__.impactCount % 3 === 0) {
                helmetMaterial.roughness = Math.min(1.0, helmetMaterial.roughness + 0.2);
                window.__3D_STATE__.roughness = helmetMaterial.roughness;
            }

            // 5. Structural Integrity Visuals
            if (window.__3D_STATE__.integrity <= 0) {
                helmetMaterial.color.setHex(0x550000);
                elFailureWarning.style.display = 'block';
            } else if (window.__3D_STATE__.integrity <= 30) {
                helmetMaterial.color.setHex(0xffaaaa); // Red warning tint
            }

            updateHUD();
        }

        function updateHUD() {
            elImpactCount.textContent = window.__3D_STATE__.impactCount;
            elIntegrity.textContent = window.__3D_STATE__.integrity.toFixed(1);
            elRoughness.textContent = window.__3D_STATE__.roughness.toFixed(2);
        }

        // Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            
            // State is updated synchronously during interactions, 
            // but we ensure HUD is always in sync if state was modified externally
            updateHUD();
        }

        animate();
    </script>
</body>
</html>
