<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Water Wheel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 16px;
    z-index: 10;
    backdrop-filter: blur(4px);
  }
  #p1-stats, #p2-stats {
    flex: 1;
    font-weight: bold;
  }
  #p1-stats { text-align: left; color: #66bbff; }
  #p2-stats { text-align: right; color: #ff9966; }
  #flow-indicator {
    flex: 1;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: #4499ff;
  }
  #pause-indicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 64px;
    font-weight: bold;
    color: rgba(255,255,255,0.7);
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
    z-index: 20;
    display: none;
    pointer-events: none;
  }
  #controls {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  #controls button {
    padding: 10px 24px;
    font-size: 14px;
    font-weight: bold;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.2s;
  }
  #controls button:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.6);
  }
  #instructions {
    position: absolute;
    bottom: 65px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="p1-stats">P1 Score: 0 | P1 Speed: 0.00</div>
  <div id="flow-indicator">Flow: LEFT ←</div>
  <div id="p2-stats">P2 Score: 0 | P2 Speed: 0.00</div>
</div>

<div id="pause-indicator">PAUSED</div>

<div id="instructions">
  P1: A (boost) / D (brake) | P2: ← (boost) / → (brake) | F: Toggle Flow | Space: Pause | R: Reset
</div>

<div id="controls">
  <button id="btn-reset">Reset (R)</button>
  <button id="btn-toggle-flow">Toggle Flow (F)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // State
  window.__3D_STATE__ = {
    wheel1Angle: 0,
    wheel1AngularVelocity: 0,
    wheel1Score: 0,
    wheel2Angle: 0,
    wheel2AngularVelocity: 0,
    wheel2Score: 0,
    activeParticleCount: 0,
    flowDirection: 'left',
    isPaused: false,
    totalParticleResets: 0,
    frameCount: 0
  };

  const state = window.__3D_STATE__;

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a2a3a);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 5, 15);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Lights
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  scene.add(dirLight);

  const ambLight = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambLight);

  // Ground
  const groundGeo = new THREE.PlaneGeometry(30, 30);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a4a2a });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -3;
  ground.receiveShadow = true;
  scene.add(ground);

  // Water wheel builder
  function createWaterWheel(x) {
    const group = new THREE.Group();
    group.position.set(x, 1, 0);

    // Hub (cylinder along Z)
    const hubGeo = new THREE.CylinderGeometry(2.5, 2.5, 0.3, 32);
    const hubMat = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
    const hub = new THREE.Mesh(hubGeo, hubMat);
    hub.rotation.x = Math.PI / 2;
    hub.castShadow = true;
    group.add(hub);

    // Inner ring for visual
    const innerGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.35, 16);
    const innerMat = new THREE.MeshStandardMaterial({ color: 0x6B4226 });
    const inner = new THREE.Mesh(innerGeo, innerMat);
    inner.rotation.x = Math.PI / 2;
    group.add(inner);

    // Spokes
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const spokeGeo = new THREE.BoxGeometry(0.08, 2.2, 0.1);
      const spokeMat = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
      const spoke = new THREE.Mesh(spokeGeo, spokeMat);
      spoke.position.set(Math.cos(angle) * 1.1, Math.sin(angle) * 1.1, 0);
      spoke.rotation.z = angle;
      group.add(spoke);
    }

    // Paddles
    const paddles = [];
    const paddleMat = new THREE.MeshStandardMaterial({ color: 0x6B4226 });
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const paddleGeo = new THREE.BoxGeometry(0.15, 1.0, 0.8);
      const paddle = new THREE.Mesh(paddleGeo, paddleMat);
      // Position at rim
      const r = 2.5;
      paddle.position.set(Math.cos(angle) * (r - 0.5), Math.sin(angle) * (r - 0.5), 0);
      paddle.rotation.z = angle;
      paddle.castShadow = true;
      group.add(paddle);
      paddles.push({ mesh: paddle, baseAngle: angle });
    }

    // Axle
    const axleGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.5, 8);
    const axleMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
    const axle = new THREE.Mesh(axleGeo, axleMat);
    axle.rotation.x = Math.PI / 2;
    group.add(axle);

    // Axle supports
    const supportMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
    for (let zOff of [-0.6, 0.6]) {
      const supportGeo = new THREE.BoxGeometry(0.15, 4, 0.15);
      const support = new THREE.Mesh(supportGeo, supportMat);
      support.position.set(0, -1, zOff);
      scene.add(support);
      support.position.x = x;
    }

    scene.add(group);

    return { group, paddles, angularVelocity: 0, angle: 0, score: 0, centerX: x, centerY: 1 };
  }

  const wheel1 = createWaterWheel(-4);
  const wheel2 = createWaterWheel(4);

  // Water spout visual
  const spoutGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.6, 8);
  const spoutMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
  const spout = new THREE.Mesh(spoutGeo, spoutMat);
  spout.position.set(0, 6, 0);
  scene.add(spout);

  // Spout pipe
  const pipeGeo = new THREE.CylinderGeometry(0.08, 0.08, 2, 8);
  const pipeMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
  const pipe = new THREE.Mesh(pipeGeo, pipeMat);
  pipe.position.set(0, 7.3, 0);
  scene.add(pipe);

  // Particle system
  const MAX_PARTICLES = 200;
  const particleGeo = new THREE.SphereGeometry(0.08, 6, 6);
  const particleMat = new THREE.MeshStandardMaterial({
    color: 0x4499ff,
    transparent: true,
    opacity: 0.7
  });

  const particles = [];
  for (let i = 0; i < MAX_PARTICLES; i++) {
    const mesh = new THREE.Mesh(particleGeo, particleMat);
    mesh.visible = false;
    scene.add(mesh);
    particles.push({
      mesh,
      active: false,
      vx: 0, vy: 0, vz: 0,
      life: 0
    });
  }

  let flowDirection = -1; // -1 = left, +1 = right
  let spawnTimer = 0;
  const spawnInterval = 0.03; // seconds between spawns

  function resetParticle(p) {
    p.mesh.position.set(0, 6, 0);
    const xDir = flowDirection;
    p.vx = xDir * 3 + (Math.random() - 0.5) * 0.5;
    p.vy = 0;
    p.vz = (Math.random() - 0.5) * 0.6;
    p.active = true;
    p.mesh.visible = true;
    p.life = 0;
  }

  function deactivateParticle(p) {
    p.active = false;
    p.mesh.visible = false;
    state.totalParticleResets++;
  }

  // Collision check: get world positions of paddles
  function getPaddleWorldPositions(wheel) {
    const positions = [];
    const cx = wheel.centerX;
    const cy = wheel.centerY;
    const r = 2.0; // effective paddle distance from center
    for (let i = 0; i < 8; i++) {
      const angle = wheel.angle + (i / 8) * Math.PI * 2;
      positions.push({
        x: cx + Math.cos(angle) * r,
        y: cy + Math.sin(angle) * r,
        angle: angle
      });
    }
    return positions;
  }

  function checkWheelCollision(p, wheel) {
    const paddles = getPaddleWorldPositions(wheel);
    const px = p.mesh.position.x;
    const py = p.mesh.position.y;
    const pz = p.mesh.position.z;

    for (let paddle of paddles) {
      const dx = px - paddle.x;
      const dy = py - paddle.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 0.6 && Math.abs(pz) < 0.8) {
        // Hit!
        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy + p.vz * p.vz);
        wheel.angularVelocity += 0.02 * (speed / 3);
        wheel.score++;
        return true;
      }
    }
    return false;
  }

  // Input
  const keys = {};
  window.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === 'f' || e.key === 'F') toggleFlow();
    if (e.key === 'r' || e.key === 'R') resetAll();
    if (e.key === ' ') { e.preventDefault(); togglePause(); }
  });
  window.addEventListener('keyup', (e) => {
    keys[e.key] = false;
  });

  function toggleFlow() {
    flowDirection *= -1;
    state.flowDirection = flowDirection < 0 ? 'left' : 'right';
  }

  function togglePause() {
    state.isPaused = !state.isPaused;
    document.getElementById('pause-indicator').style.display = state.isPaused ? 'block' : 'none';
  }

  function resetAll() {
    wheel1.angularVelocity = 0;
    wheel1.angle = 0;
    wheel1.score = 0;
    wheel2.angularVelocity = 0;
    wheel2.angle = 0;
    wheel2.score = 0;
    for (let p of particles) {
      p.active = false;
      p.mesh.visible = false;
    }
    state.wheel1Score = 0;
    state.wheel2Score = 0;
  }

  document.getElementById('btn-reset').addEventListener('click', resetAll);
  document.getElementById('btn-toggle-flow').addEventListener('click', toggleFlow);

  // HUD elements
  const p1StatsEl = document.getElementById('p1-stats');
  const p2StatsEl = document.getElementById('p2-stats');
  const flowEl = document.getElementById('flow-indicator');

  // Animation
  let lastTime = performance.now();
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    dt = Math.min(dt, 0.05); // cap

    state.frameCount++;

    if (!state.isPaused) {
      // Player controls
      if (keys['a'] || keys['A']) {
        wheel1.angularVelocity += 0.05;
      }
      if (keys['d'] || keys['D']) {
        wheel1.angularVelocity = Math.max(0, wheel1.angularVelocity - 0.1);
      }
      if (keys['ArrowLeft']) {
        wheel2.angularVelocity += 0.05;
      }
      if (keys['ArrowRight']) {
        wheel2.angularVelocity = Math.max(0, wheel2.angularVelocity - 0.1);
      }

      // Friction
      wheel1.angularVelocity *= 0.998;
      wheel2.angularVelocity *= 0.998;

      // Update wheel rotations
      wheel1.angle += wheel1.angularVelocity * dt;
      wheel2.angle += wheel2.angularVelocity * dt;

      wheel1.group.rotation.z = wheel1.angle;
      wheel2.group.rotation.z = wheel2.angle;

      // Spawn particles
      spawnTimer += dt;
      while (spawnTimer >= spawnInterval) {
        spawnTimer -= spawnInterval;
        // Find inactive particle
        for (let p of particles) {
          if (!p.active) {
            resetParticle(p);
            break;
          }
        }
      }

      // Update particles
      let activeCount = 0;
      for (let p of particles) {
        if (!p.active) continue;
        activeCount++;

        // Gravity
        p.vy -= 9.8 * dt;

        // Move
        p.mesh.position.x += p.vx * dt;
        p.mesh.position.y += p.vy * dt;
        p.mesh.position.z += p.vz * dt;

        p.life += dt;

        // Check ground
        if (p.mesh.position.y < -3) {
          deactivateParticle(p);
          continue;
        }

        // Check out of bounds
        if (Math.abs(p.mesh.position.x) > 15 || p.life > 10) {
          deactivateParticle(p);
          continue;
        }

        // Check collision with wheels
        if (checkWheelCollision(p, wheel1)) {
          deactivateParticle(p);
          continue;
        }
        if (checkWheelCollision(p, wheel2)) {
          deactivateParticle(p);
          continue;
        }
      }

      state.activeParticleCount = activeCount;
    }

    // Update state
    state.wheel1Angle = wheel1.angle;
    state.wheel1AngularVelocity = wheel1.angularVelocity;
    state.wheel1Score = wheel1.score;
    state.wheel2Angle = wheel2.angle;
    state.wheel2AngularVelocity = wheel2.angularVelocity;
    state.wheel2Score = wheel2.score;

    // Sanitize NaN
    for (let key of Object.keys(state)) {
      if (typeof state[key] === 'number' && isNaN(state[key])) {
        state[key] = 0;
      }
    }

    // Update HUD
    p1StatsEl.textContent = `P1 Score: ${wheel1.score} | P1 Speed: ${Math.abs(wheel1.angularVelocity).toFixed(2)}`;
    p2StatsEl.textContent = `P2 Score: ${wheel2.score} | P2 Speed: ${Math.abs(wheel2.angularVelocity).toFixed(2)}`;
    const flowText = flowDirection < 0 ? 'LEFT ←' : 'RIGHT →';
    flowEl.textContent = `Flow: ${flowText}`;
    flowEl.style.color = flowDirection < 0 ? '#66bbff' : '#ff9966';

    renderer.render(scene, camera);
  }

  animate();

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
