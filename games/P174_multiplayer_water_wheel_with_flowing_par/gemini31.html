<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Water Wheel Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a2a3a;
            color: white;
            font-family: monospace;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            min-width: 200px;
            text-align: center;
            border: 1px solid #334455;
        }
        #center-hud {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #pause-indicator {
            color: #ff4444;
            font-weight: bold;
            font-size: 1.2em;
            display: none;
            letter-spacing: 2px;
        }
        .stats {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 8px;
        }
        button {
            background: #4499ff;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            margin: 0 5px;
            transition: background 0.2s;
        }
        button:hover {
            background: #66b3ff;
        }
        button:active {
            background: #2277dd;
        }
        .controls-help {
            font-size: 0.85em;
            color: #aaaaaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="hud-panel">
            <div id="p1-stats" class="stats">P1 Score: 0 | P1 Speed: 0.00</div>
            <div class="controls-help">Controls: A (Boost), D (Brake)</div>
        </div>
        <div id="center-hud" class="hud-panel">
            <div id="flow-indicator" class="stats">Flow: LEFT</div>
            <div id="pause-indicator">PAUSED</div>
            <div>
                <button id="btn-toggle-flow">Toggle Flow (F)</button>
                <button id="btn-reset">Reset (R)</button>
            </div>
            <div class="controls-help">Space: Pause/Resume</div>
        </div>
        <div class="hud-panel">
            <div id="p2-stats" class="stats">P2 Score: 0 | P2 Speed: 0.00</div>
            <div class="controls-help">Controls: &larr; (Boost), &rarr; (Brake)</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Initialize State
        window.__3D_STATE__ = {
            wheel1Angle: 0,
            wheel1AngularVelocity: 0,
            wheel1Score: 0,
            wheel2Angle: 0,
            wheel2AngularVelocity: 0,
            wheel2Score: 0,
            activeParticleCount: 0,
            flowDirection: 'left',
            isPaused: false,
            totalParticleResets: 0,
            frameCount: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2a3a);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const ambLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x2a4a2a });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -3;
        scene.add(ground);

        // Wheel Construction
        function createWheel(x, y, z) {
            const group = new THREE.Group();
            group.position.set(x, y, z);

            // Hub
            const hubGeo = new THREE.CylinderGeometry(2.5, 2.5, 0.3, 32);
            hubGeo.rotation.x = Math.PI / 2;
            const hubMat = new THREE.MeshLambertMaterial({ color: 0x8B7355 });
            const hub = new THREE.Mesh(hubGeo, hubMat);
            group.add(hub);

            // Axle
            const axleGeo = new THREE.CylinderGeometry(0.15, 0.15, 1.5, 16);
            axleGeo.rotation.x = Math.PI / 2;
            const axleMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
            const axle = new THREE.Mesh(axleGeo, axleMat);
            group.add(axle);

            // Paddles
            const paddleGeo = new THREE.BoxGeometry(1.0, 0.15, 0.8);
            const paddleMat = new THREE.MeshLambertMaterial({ color: 0x6B4226 });
            
            for (let i = 0; i < 8; i++) {
                const paddle = new THREE.Mesh(paddleGeo, paddleMat);
                const angle = (i / 8) * Math.PI * 2;
                const distance = 3.0; // 2.5 (hub radius) + 0.5 (half paddle length)
                paddle.position.set(Math.cos(angle) * distance, Math.sin(angle) * distance, 0);
                paddle.rotation.z = angle;
                group.add(paddle);
            }

            scene.add(group);
            return { group, angularVelocity: 0, score: 0 };
        }

        const w1 = createWheel(-4, 1, 0);
        const w2 = createWheel(4, 1, 0);

        // Particle System
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const particleMat = new THREE.MeshLambertMaterial({ 
            color: 0x4499ff, 
            transparent: true, 
            opacity: 0.8 
        });

        for (let i = 0; i < 200; i++) {
            const mesh = new THREE.Mesh(particleGeo, particleMat);
            mesh.visible = false;
            scene.add(mesh);
            particles.push({ mesh, vx: 0, vy: 0, vz: 0, active: false });
        }

        function spawnParticle() {
            const p = particles.find(p => !p.active);
            if (p) {
                p.active = true;
                p.mesh.visible = true;
                p.mesh.position.set(0, 6, 0);
                
                const dir = window.__3D_STATE__.flowDirection === 'left' ? -1 : 1;
                p.vx = dir * 3 + (Math.random() - 0.5) * 0.4;
                p.vy = 0;
                p.vz = (Math.random() - 0.5) * 0.6;
                
                window.__3D_STATE__.activeParticleCount++;
            }
        }

        function resetParticle(p) {
            if (!p.active) return;
            p.active = false;
            p.mesh.visible = false;
            window.__3D_STATE__.activeParticleCount--;
            window.__3D_STATE__.totalParticleResets++;
        }

        // Controls & Logic
        function toggleFlow() {
            window.__3D_STATE__.flowDirection = window.__3D_STATE__.flowDirection === 'left' ? 'right' : 'left';
            updateHUD();
        }

        function resetAll() {
            w1.angularVelocity = 0;
            w2.angularVelocity = 0;
            w1.score = 0;
            w2.score = 0;
            particles.forEach(p => resetParticle(p));
            updateHUD();
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA') {
                w1.angularVelocity += 0.05;
            }
            if (e.code === 'KeyD') {
                w1.angularVelocity = Math.max(0, w1.angularVelocity - 0.1);
            }
            if (e.code === 'ArrowLeft') {
                w2.angularVelocity += 0.05;
            }
            if (e.code === 'ArrowRight') {
                w2.angularVelocity = Math.max(0, w2.angularVelocity - 0.1);
            }
            if (e.code === 'KeyF' || e.key === 'f') {
                toggleFlow();
            }
            if (e.code === 'KeyR' || e.key === 'r') {
                resetAll();
            }
            if (e.code === 'Space') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
                updateHUD();
            }
        });

        document.getElementById('btn-toggle-flow').addEventListener('click', toggleFlow);
        document.getElementById('btn-reset').addEventListener('click', resetAll);

        // HUD Update
        function updateHUD() {
            document.getElementById('p1-stats').innerText = `P1 Score: ${w1.score} | P1 Speed: ${w1.angularVelocity.toFixed(2)}`;
            document.getElementById('p2-stats').innerText = `P2 Score: ${w2.score} | P2 Speed: ${w2.angularVelocity.toFixed(2)}`;
            document.getElementById('flow-indicator').innerText = `Flow: ${window.__3D_STATE__.flowDirection.toUpperCase()}`;
            document.getElementById('pause-indicator').style.display = window.__3D_STATE__.isPaused ? 'block' : 'none';
        }

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            
            const now = performance.now();
            let dt = (now - lastTime) / 1000;
            lastTime = now;
            if (dt > 0.1) dt = 0.1; // Cap delta time

            if (!window.__3D_STATE__.isPaused) {
                // Spawn particles
                if (window.__3D_STATE__.activeParticleCount < 200) {
                    spawnParticle();
                    spawnParticle(); // Spawn multiple to maintain flow
                }

                // Update particles & check collisions
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    if (!p.active) continue;

                    // Apply gravity and velocity
                    p.vy -= 9.8 * dt;
                    p.mesh.position.x += p.vx * dt;
                    p.mesh.position.y += p.vy * dt;
                    p.mesh.position.z += p.vz * dt;

                    // Ground reset
                    if (p.mesh.position.y < -3) {
                        resetParticle(p);
                        continue;
                    }

                    // Collision detection with wheels
                    let hit = false;
                    const wheels = [w1, w2];
                    
                    for (let wIdx = 0; wIdx < wheels.length; wIdx++) {
                        const w = wheels[wIdx];
                        const wPos = w.group.position;
                        
                        // Broad phase bounding box check
                        if (Math.abs(p.mesh.position.x - wPos.x) < 4.0 && Math.abs(p.mesh.position.y - wPos.y) < 4.0) {
                            // Narrow phase paddle check
                            for (let j = 0; j < 8; j++) {
                                const angle = w.group.rotation.z + (j * Math.PI / 4);
                                const px = wPos.x + 3.0 * Math.cos(angle);
                                const py = wPos.y + 3.0 * Math.sin(angle);
                                
                                const distSq = (p.mesh.position.x - px)**2 + 
                                               (p.mesh.position.y - py)**2 + 
                                               (p.mesh.position.z - wPos.z)**2;
                                
                                if (distSq < 0.36) { // Hit radius ~0.6
                                    hit = true;
                                    w.angularVelocity += 0.02;
                                    w.score++;
                                    break;
                                }
                            }
                        }
                        if (hit) break;
                    }
                    
                    if (hit) {
                        resetParticle(p);
                    }
                }

                // Update Wheels (Rotation and Friction)
                w1.group.rotation.z += w1.angularVelocity * dt;
                w1.angularVelocity *= 0.998;
                
                w2.group.rotation.z += w2.angularVelocity * dt;
                w2.angularVelocity *= 0.998;

                window.__3D_STATE__.frameCount++;
                
                // Sync State
                window.__3D_STATE__.wheel1Angle = w1.group.rotation.z || 0;
                window.__3D_STATE__.wheel1AngularVelocity = w1.angularVelocity || 0;
                window.__3D_STATE__.wheel1Score = w1.score || 0;
                window.__3D_STATE__.wheel2Angle = w2.group.rotation.z || 0;
                window.__3D_STATE__.wheel2AngularVelocity = w2.angularVelocity || 0;
                window.__3D_STATE__.wheel2Score = w2.score || 0;

                updateHUD();
            }

            renderer.render(scene, camera);
        }

        // Initial calls
        updateHUD();
        animate();
    </script>
</body>
</html>
