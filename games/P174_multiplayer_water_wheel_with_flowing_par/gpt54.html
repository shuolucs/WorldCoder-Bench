<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Multiplayer Water Wheel</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a2a3a;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      box-sizing: border-box;
      padding: 12px 16px;
      pointer-events: none;
      z-index: 10;
    }

    #hud-top {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    #p1-stats { text-align: left; }
    #flow-indicator { text-align: center; }
    #p2-stats { text-align: right; }

    #pause-indicator {
      margin-top: 8px;
      text-align: center;
      color: #ffcc66;
      font-size: 24px;
      display: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    #controls {
      position: fixed;
      top: 70px;
      left: 16px;
      z-index: 11;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #2f4f6f;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #42698f;
    }

    #help {
      position: fixed;
      bottom: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-top">
      <div id="p1-stats">P1 Score: 0 | P1 Speed: 0.00</div>
      <div id="flow-indicator">Flow: LEFT</div>
      <div id="p2-stats">P2 Score: 0 | P2 Speed: 0.00</div>
    </div>
    <div id="pause-indicator">PAUSED</div>
  </div>

  <div id="controls">
    <button id="btn-reset">Reset</button>
    <button id="btn-toggle-flow">Toggle Flow</button>
  </div>

  <div id="help">
    A = P1 Boost, D = P1 Brake<br>
    ← = P2 Boost, → = P2 Brake<br>
    F = Toggle Flow, R = Reset, Space = Pause
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a2a3a');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ambLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambLight);

    const groundGeo = new THREE.PlaneGeometry(30, 30);
    const groundMat = new THREE.MeshLambertMaterial({ color: '#2a4a2a' });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -3;
    scene.add(ground);

    const spoutGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.8, 12);
    const spoutMat = new THREE.MeshLambertMaterial({ color: '#888888' });
    const spout = new THREE.Mesh(spoutGeo, spoutMat);
    spout.rotation.z = Math.PI / 2;
    spout.position.set(0, 6, 0);
    scene.add(spout);

    const wheelRadius = 2.5;
    const wheelCenterY = 1;
    const paddleCount = 8;
    const paddleLength = 1.0;
    const paddleThickness = 0.15;
    const paddleWidth = 0.8;
    const hubDepth = 0.3;

    function createWheel(x) {
      const group = new THREE.Group();
      group.position.set(x, wheelCenterY, 0);

      const hubGeo = new THREE.CylinderGeometry(wheelRadius, wheelRadius, hubDepth, 32);
      const hubMat = new THREE.MeshLambertMaterial({ color: '#8B7355' });
      const hub = new THREE.Mesh(hubGeo, hubMat);
      hub.rotation.x = Math.PI / 2;
      group.add(hub);

      const axleGeo = new THREE.CylinderGeometry(0.12, 0.12, 1.2, 16);
      const axleMat = new THREE.MeshLambertMaterial({ color: '#555555' });
      const axle = new THREE.Mesh(axleGeo, axleMat);
      axle.rotation.z = Math.PI / 2;
      group.add(axle);

      const paddleGeo = new THREE.BoxGeometry(paddleThickness, paddleLength, paddleWidth);
      const paddleMat = new THREE.MeshLambertMaterial({ color: '#6B4226' });

      const paddles = [];
      const paddleRadius = wheelRadius - 0.3;

      for (let i = 0; i < paddleCount; i++) {
        const angle = (i / paddleCount) * Math.PI * 2;
        const paddle = new THREE.Mesh(paddleGeo, paddleMat);

        paddle.position.set(
          Math.cos(angle) * paddleRadius,
          Math.sin(angle) * paddleRadius,
          0
        );

        paddle.rotation.z = angle;
        group.add(paddle);
        paddles.push({ mesh: paddle, baseAngle: angle });
      }

      scene.add(group);

      return {
        group,
        paddles,
        angle: 0,
        angularVelocity: 0,
        score: 0,
        x
      };
    }

    const wheel1 = createWheel(-4);
    const wheel2 = createWheel(4);

    const particleGroup = new THREE.Group();
    scene.add(particleGroup);

    const MAX_PARTICLES = 200;
    const particleRadius = 0.08;
    const particleGeo = new THREE.SphereGeometry(particleRadius, 8, 8);
    const particleMat = new THREE.MeshLambertMaterial({
      color: '#4499ff',
      transparent: true,
      opacity: 0.7
    });

    const particles = [];
    let totalParticleResets = 0;
    let flowDirection = 'left';
    let isPaused = false;
    let frameCount = 0;

    function safeNumber(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function resetParticle(particle) {
      particle.position.set(0, 6, 0);
      particle.velocity.set(
        flowDirection === 'left' ? -3 : 3,
        0,
        THREE.MathUtils.randFloat(-0.3, 0.3)
      );
      particle.mesh.position.copy(particle.position);
      totalParticleResets++;
    }

    for (let i = 0; i < MAX_PARTICLES; i++) {
      const mesh = new THREE.Mesh(particleGeo, particleMat);
      particleGroup.add(mesh);

      const particle = {
        mesh,
        position: new THREE.Vector3(),
        velocity: new THREE.Vector3(),
        active: true
      };

      particles.push(particle);
      resetParticle(particle);
    }

    function toggleFlow() {
      flowDirection = flowDirection === 'left' ? 'right' : 'left';
      updateHUD();
    }

    function resetSimulation() {
      wheel1.angle = 0;
      wheel1.angularVelocity = 0;
      wheel1.score = 0;
      wheel2.angle = 0;
      wheel2.angularVelocity = 0;
      wheel2.score = 0;

      wheel1.group.rotation.z = 0;
      wheel2.group.rotation.z = 0;

      for (const p of particles) {
        resetParticle(p);
      }

      updateHUD();
    }

    function updateHUD() {
      document.getElementById('p1-stats').textContent =
        `P1 Score: ${wheel1.score} | P1 Speed: ${safeNumber(wheel1.angularVelocity).toFixed(2)}`;
      document.getElementById('p2-stats').textContent =
        `P2 Score: ${wheel2.score} | P2 Speed: ${safeNumber(wheel2.angularVelocity).toFixed(2)}`;
      document.getElementById('flow-indicator').textContent =
        `Flow: ${flowDirection.toUpperCase()}`;
      document.getElementById('pause-indicator').style.display = isPaused ? 'block' : 'none';
    }

    function updateState() {
      window.__3D_STATE__ = {
        wheel1Angle: safeNumber(wheel1.angle),
        wheel1AngularVelocity: safeNumber(wheel1.angularVelocity),
        wheel1Score: wheel1.score | 0,
        wheel2Angle: safeNumber(wheel2.angle),
        wheel2AngularVelocity: safeNumber(wheel2.angularVelocity),
        wheel2Score: wheel2.score | 0,
        activeParticleCount: particles.filter(p => p.active && p.mesh.visible !== false).length,
        flowDirection,
        isPaused,
        totalParticleResets: totalParticleResets | 0,
        frameCount: frameCount | 0
      };
    }

    document.getElementById('btn-reset').addEventListener('click', resetSimulation);
    document.getElementById('btn-toggle-flow').addEventListener('click', toggleFlow);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
        updateHUD();
        return;
      }

      switch (e.code) {
        case 'KeyA':
          wheel1.angularVelocity = safeNumber(wheel1.angularVelocity) + 0.05;
          break;
        case 'KeyD':
          wheel1.angularVelocity = Math.max(0, safeNumber(wheel1.angularVelocity) - 0.1);
          break;
        case 'ArrowLeft':
          wheel2.angularVelocity = safeNumber(wheel2.angularVelocity) + 0.05;
          break;
        case 'ArrowRight':
          wheel2.angularVelocity = Math.max(0, safeNumber(wheel2.angularVelocity) - 0.1);
          break;
        case 'KeyF':
          toggleFlow();
          break;
        case 'KeyR':
          resetSimulation();
          break;
      }

      updateHUD();
    });

    function getPaddleWorldPositions(wheel) {
      const result = [];
      for (const paddle of wheel.paddles) {
        const angle = wheel.angle + paddle.baseAngle;
        const r = wheelRadius - 0.3;
        result.push({
          x: wheel.x + Math.cos(angle) * r,
          y: wheelCenterY + Math.sin(angle) * r,
          z: 0
        });
      }
      return result;
    }

    const gravity = -9.8;
    let previousTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);

      const rawDelta = (now - previousTime) / 1000;
      previousTime = now;
      const dt = Math.min(rawDelta || 0.016, 0.033);

      frameCount++;

      if (!isPaused) {
        const wheel1Paddles = getPaddleWorldPositions(wheel1);
        const wheel2Paddles = getPaddleWorldPositions(wheel2);
        const collisionThreshold = 0.55;

        for (const p of particles) {
          p.velocity.y += gravity * dt;

          p.position.x += p.velocity.x * dt;
          p.position.y += p.velocity.y * dt;
          p.position.z += p.velocity.z * dt;

          let hit = false;

          for (const pos of wheel1Paddles) {
            const dx = p.position.x - pos.x;
            const dy = p.position.y - pos.y;
            const dz = p.position.z - pos.z;
            const distSq = dx * dx + dy * dy + dz * dz;
            if (distSq < collisionThreshold * collisionThreshold) {
              wheel1.angularVelocity = safeNumber(wheel1.angularVelocity) + 0.02;
              wheel1.score++;
              resetParticle(p);
              hit = true;
              break;
            }
          }

          if (!hit) {
            for (const pos of wheel2Paddles) {
              const dx = p.position.x - pos.x;
              const dy = p.position.y - pos.y;
              const dz = p.position.z - pos.z;
              const distSq = dx * dx + dy * dy + dz * dz;
              if (distSq < collisionThreshold * collisionThreshold) {
                wheel2.angularVelocity = safeNumber(wheel2.angularVelocity) + 0.02;
                wheel2.score++;
                resetParticle(p);
                hit = true;
                break;
              }
            }
          }

          if (!hit && p.position.y < -3) {
            resetParticle(p);
          }

          p.mesh.position.copy(p.position);
        }

        wheel1.angularVelocity = Math.max(0, safeNumber(wheel1.angularVelocity) * 0.998);
        wheel2.angularVelocity = Math.max(0, safeNumber(wheel2.angularVelocity) * 0.998);

        wheel1.angle = safeNumber(wheel1.angle) + wheel1.angularVelocity * dt * 60;
        wheel2.angle = safeNumber(wheel2.angle) + wheel2.angularVelocity * dt * 60;

        wheel1.group.rotation.z = wheel1.angle;
        wheel2.group.rotation.z = wheel2.angle;

        if (!Number.isFinite(wheel1.angle)) wheel1.angle = 0;
        if (!Number.isFinite(wheel2.angle)) wheel2.angle = 0;
        if (!Number.isFinite(wheel1.angularVelocity)) wheel1.angularVelocity = 0;
        if (!Number.isFinite(wheel2.angularVelocity)) wheel2.angularVelocity = 0;
      }

      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    updateHUD();
    updateState();
    animate(performance.now());

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
