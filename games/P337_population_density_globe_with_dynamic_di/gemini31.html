<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Population Density Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            padding: 15px;
            pointer-events: none;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            z-index: 10;
        }
        #hud-tl { top: 0; left: 0; font-size: 18px; font-weight: bold; }
        #hud-tr { top: 0; right: 0; text-align: right; }
        #hud-bl { bottom: 0; left: 0; }
        #hud-bc { bottom: 0; left: 50%; transform: translateX(-50%); text-align: center; }
        #hud-br { bottom: 0; right: 0; text-align: right; }
        .controls-help {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
        #tooltip {
            position: absolute;
            background: rgba(10, 10, 26, 0.85);
            border: 1px solid #00ffff;
            padding: 10px;
            border-radius: 5px;
            display: none;
            pointer-events: none;
            font-size: 14px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            z-index: 20;
            backdrop-filter: blur(4px);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud-tl" class="hud">Difficulty: 1/5</div>
    <div id="hud-tr" class="hud">
        <div id="points-visible">Points Visible: 40</div>
        <div class="controls-help">D: Difficulty | R: Reset | P: Auto-Rotate<br>H: Heatmap | S: Sort Anim | Click: Info</div>
    </div>
    <div id="hud-bl" class="hud">Auto-Rotate: ON</div>
    <div id="hud-bc" class="hud">Heatmap: OFF</div>
    <div id="hud-br" class="hud">FPS: 0</div>
    
    <div id="tooltip"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            difficultyLevel: 1,
            visibleBars: 40,
            totalBars: 250,
            autoRotate: true,
            heatmapMode: false,
            sortingActive: false,
            cameraDistance: 3.5,
            selectedBar: null,
            rotationSpeed: 0.002,
            globeRadius: 1.0,
            fps: 0,
            barWidthCurrent: 0.02,
            particlesActive: false,
            frameCount: 0
        };
        const state = window.__3D_STATE__;

        const diffSettings = {
            1: { count: 40, width: 0.02, rot: 0.002, particles: false, glow: false },
            2: { count: 80, width: 0.015, rot: 0.004, particles: false, glow: false },
            3: { count: 120, width: 0.01, rot: 0.006, particles: false, glow: false },
            4: { count: 160, width: 0.008, rot: 0.008, particles: true, glow: false },
            5: { count: 250, width: 0.005, rot: 0.010, particles: true, glow: true }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 3.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2.0;
        controls.maxDistance = 6.0;
        controls.enablePan = false;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 3, 5);
        scene.add(dirLight);

        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // --- Globe & Wireframe ---
        const globeGeo = new THREE.SphereGeometry(state.globeRadius, 64, 64);
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0x1a1a3e,
            transparent: true,
            opacity: 0.9,
            shininess: 10
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        globeGroup.add(globe);

        const wireGeo = new THREE.WireframeGeometry(globeGeo);
        const wireMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.15 });
        const wireframe = new THREE.LineSegments(wireGeo, wireMat);
        globeGroup.add(wireframe);

        // --- Data Generation ---
        const barsData = [];
        for (let i = 0; i < state.totalBars; i++) {
            const lat = (Math.random() - 0.5) * 160; 
            const lng = (Math.random() - 0.5) * 360;
            const density = 0.02 + Math.pow(Math.random(), 2) * 0.48;
            barsData.push({ lat, lng, density });
        }
        barsData.sort((a, b) => b.density - a.density);

        function latLngToVector3(lat, lng, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -(radius * Math.sin(phi) * Math.cos(theta)),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        const cLow = new THREE.Color(0x00ff88);
        const cMed = new THREE.Color(0xffff00);
        const cHigh = new THREE.Color(0xff3333);

        function getDensityColor(density) {
            const t = Math.max(0, Math.min(1, (density - 0.02) / 0.48));
            const c = new THREE.Color();
            if (t < 0.5) c.lerpColors(cLow, cMed, t * 2);
            else c.lerpColors(cMed, cHigh, (t - 0.5) * 2);
            return c;
        }

        const barGeom = new THREE.BoxGeometry(1, 1, 1);
        barGeom.translate(0, 0, 0.5);

        barsData.forEach((data, index) => {
            const color = getDensityColor(data.density);
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const mesh = new THREE.Mesh(barGeom, mat);
            
            const pos = latLngToVector3(data.lat, data.lng, state.globeRadius);
            mesh.position.copy(pos);
            mesh.lookAt(0, 0, 0);
            
            mesh.userData = { 
                index, lat: data.lat, lng: data.lng, density: data.density,
                origColor: color.clone(), origPos: pos.clone(), origQuat: mesh.quaternion.clone()
            };
            
            globeGroup.add(mesh);
            data.mesh = mesh;
            data.pos = pos;
        });

        // --- Particle System ---
        const maxParticles = 600;
        const pGeom = new THREE.BufferGeometry();
        const pPos = new Float32Array(maxParticles * 3);
        pGeom.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        const pMat = new THREE.PointsMaterial({
            color: 0xffaa00, size: 0.015, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending
        });
        const particleSystem = new THREE.Points(pGeom, pMat);
        globeGroup.add(particleSystem);

        const particlesData = Array.from({length: maxParticles}, () => ({
            life: 0, pos: new THREE.Vector3(), vel: new THREE.Vector3()
        }));
        let pIdx = 0;

        // --- Logic Functions ---
        function updateDifficulty() {
            const s = diffSettings[state.difficultyLevel];
            state.visibleBars = s.count;
            state.barWidthCurrent = s.width;
            state.rotationSpeed = s.rot;
            state.particlesActive = s.particles;

            barsData.forEach((data, i) => {
                const isVisible = i < state.visibleBars;
                data.mesh.visible = isVisible;
                if (isVisible) {
                    data.mesh.scale.set(s.width, s.width, data.density);
                    if (s.glow) {
                        data.mesh.material.emissive.copy(data.mesh.material.color).multiplyScalar(0.4);
                    } else {
                        data.mesh.material.emissive.setHex(0x000000);
                    }
                }
            });

            document.getElementById('hud-tl').innerText = `Difficulty: ${state.difficultyLevel}/5`;
            document.getElementById('points-visible').innerText = `Points Visible: ${state.visibleBars}`;
            
            if (state.heatmapMode) updateHeatmap();
        }

        function updateHeatmap() {
            if (state.heatmapMode) {
                const posAttr = globeGeo.attributes.position;
                const colors = new Float32Array(posAttr.count * 3);
                const v = new THREE.Vector3();
                const baseC = new THREE.Color(0x1a1a3e);

                for (let i = 0; i < posAttr.count; i++) {
                    v.fromBufferAttribute(posAttr, i);
                    let heat = 0;
                    for (let j = 0; j < state.visibleBars; j++) {
                        const dist = v.distanceTo(barsData[j].pos);
                        if (dist < 0.35) {
                            heat += barsData[j].density * (1 - dist / 0.35) * 1.5;
                        }
                    }
                    const c = baseC.clone();
                    if (heat > 0) {
                        const hColor = getDensityColor(Math.min(heat, 0.5));
                        c.lerp(hColor, Math.min(heat, 1.0));
                    }
                    colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
                }
                globeGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                globeMat.vertexColors = true;
                globeMat.color.setHex(0xffffff);
            } else {
                globeMat.vertexColors = false;
                globeMat.color.setHex(0x1a1a3e);
            }
            globeMat.needsUpdate = true;
        }

        function getSpiralPosition(index, total) {
            const y = 1 - (index / (total - 1)) * 2;
            const radiusAtY = Math.sqrt(1 - y * y);
            const theta = index * Math.PI * (3 - Math.sqrt(5));
            return new THREE.Vector3(
                Math.cos(theta) * radiusAtY,
                y,
                Math.sin(theta) * radiusAtY
            );
        }

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        window.addEventListener('pointerdown', (e) => {
            if (e.button !== 0) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const visibleMeshes = barsData.slice(0, state.visibleBars).map(d => d.mesh);
            const intersects = raycaster.intersectObjects(visibleMeshes);

            if (state.selectedBar) {
                const prevData = barsData[state.selectedBar.index];
                prevData.mesh.material.color.copy(prevData.origColor);
                state.selectedBar = null;
                tooltip.style.display = 'none';
            }

            if (intersects.length > 0) {
                const object = intersects[0].object;
                const data = object.userData;
                object.material.color.setHex(0xffffff);
                state.selectedBar = { index: data.index, density: data.density, lat: data.lat, lng: data.lng };
                
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                tooltip.innerHTML = `<b>Region ${data.index + 1}</b><br>Density: ${data.density.toFixed(3)}<br>Lat: ${data.lat.toFixed(2)}&deg;<br>Lng: ${data.lng.toFixed(2)}&deg;`;
            }
        });

        let sortProgress = 0;
        let sortDirection = 0;

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'd') {
                state.difficultyLevel = (state.difficultyLevel % 5) + 1;
                updateDifficulty();
            } else if (key === 'r') {
                camera.position.set(0, 0, 3.5);
                controls.target.set(0, 0, 0);
                globeGroup.rotation.set(0, 0, 0);
            } else if (key === 'p') {
                state.autoRotate = !state.autoRotate;
                document.getElementById('hud-bl').innerText = `Auto-Rotate: ${state.autoRotate ? 'ON' : 'OFF'}`;
            } else if (key === 'h') {
                state.heatmapMode = !state.heatmapMode;
                document.getElementById('hud-bc').innerText = `Heatmap: ${state.heatmapMode ? 'ON' : 'OFF'}`;
                updateHeatmap();
            } else if (key === 's') {
                if (sortDirection === 0) {
                    sortDirection = state.sortingActive ? -1 : 1;
                    state.sortingActive = true;
                } else {
                    sortDirection *= -1;
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        updateDifficulty();

        // --- Animation Loop ---
        let lastTime = performance.now();
        let frames = 0;
        let lastFpsTime = lastTime;

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - lastTime) * 0.001;
            lastTime = time;
            state.frameCount++;

            // FPS Calculation
            frames++;
            if (time - lastFpsTime >= 500) {
                state.fps = Math.round((frames * 1000) / (time - lastFpsTime));
                document.getElementById('hud-br').innerText = `FPS: ${state.fps}`;
                frames = 0;
                lastFpsTime = time;
            }

            controls.update();
            state.cameraDistance = camera.position.distanceTo(controls.target);

            if (state.autoRotate && !state.sortingActive) {
                globeGroup.rotation.y += state.rotationSpeed;
            }

            // Pulsing Animation (Level 3+)
            if (state.difficultyLevel >= 3 && !state.sortingActive && sortDirection === 0) {
                const t = time * 0.003;
                for (let i = 0; i < state.visibleBars; i++) {
                    const b = barsData[i];
                    const pulse = 1 + Math.sin(t + i) * 0.1;
                    b.mesh.scale.z = b.density * pulse;
                }
            }

            // Sorting Animation
            if (sortDirection !== 0) {
                sortProgress += sortDirection * delta * 1.5;
                if (sortProgress >= 1) { sortProgress = 1; sortDirection = 0; }
                if (sortProgress <= 0) { sortProgress = 0; sortDirection = 0; state.sortingActive = false; }

                const ease = sortProgress < 0.5 ? 2 * sortProgress * sortProgress : -1 + (4 - 2 * sortProgress) * sortProgress;
                const dummy = new THREE.Object3D();

                for (let i = 0; i < state.visibleBars; i++) {
                    const b = barsData[i];
                    const spiralPos = getSpiralPosition(i, state.visibleBars);
                    dummy.position.copy(spiralPos);
                    dummy.lookAt(0, 0, 0);

                    b.mesh.position.lerpVectors(b.origPos, spiralPos, ease);
                    b.mesh.quaternion.slerpQuaternions(b.origQuat, dummy.quaternion, ease);
                    
                    // Reset scale during sort
                    if (sortDirection !== 0) b.mesh.scale.z = b.density;
                }
            }

            // Particle Animation
            if (state.particlesActive && !state.sortingActive) {
                particleSystem.visible = true;
                const positions = particleSystem.geometry.attributes.position.array;
                
                // Emit
                for (let i = 0; i < state.visibleBars; i++) {
                    const b = barsData[i];
                    if (b.density > 0.3 && Math.random() < 0.08) {
                        const p = particlesData[pIdx];
                        p.life = 1.0;
                        p.pos.copy(b.mesh.position).normalize().multiplyScalar(state.globeRadius + b.mesh.scale.z);
                        p.vel.copy(b.mesh.position).normalize().multiplyScalar(0.005);
                        p.vel.x += (Math.random() - 0.5) * 0.004;
                        p.vel.y += (Math.random() - 0.5) * 0.004;
                        p.vel.z += (Math.random() - 0.5) * 0.004;
                        pIdx = (pIdx + 1) % maxParticles;
                    }
                }

                // Update
                for (let i = 0; i < maxParticles; i++) {
                    const p = particlesData[i];
                    if (p.life > 0) {
                        p.life -= delta * 1.5;
                        p.pos.add(p.vel);
                        positions[i*3] = p.pos.x;
                        positions[i*3+1] = p.pos.y;
                        positions[i*3+2] = p.pos.z;
                    } else {
                        positions[i*3] = 0; positions[i*3+1] = 0; positions[i*3+2] = 0;
                    }
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
            } else {
                particleSystem.visible = false;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
