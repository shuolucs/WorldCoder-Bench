<script>
// OrbitControls inline (minimal implementation)
THREE.OrbitControls = function(camera, domElement) {
    this.camera = camera;
    this.domElement = domElement;
    this.enabled = true;
    this.enableDamping = true;
    this.dampingFactor = 0.05;
    this.minDistance = 2.0;
    this.maxDistance = 6.0;
    this.autoRotate = false;
    this.autoRotateSpeed = 1.0;
    this.enablePan = false;
    
    var scope = this;
    var spherical = { theta: 0, phi: Math.PI / 2, radius: 3.5 };
    var sphericalDelta = { theta: 0, phi: 0 };
    var scale = 1;
    var rotateStart = { x: 0, y: 0 };
    var isMouseDown = false;
    var EPS = 0.000001;
    
    this.target = new THREE.Vector3(0, 0, 0);
    
    function getSphericalFromCamera() {
        var offset = new THREE.Vector3().copy(camera.position).sub(scope.target);
        spherical.radius = offset.length();
        spherical.theta = Math.atan2(offset.x, offset.z);
        spherical.phi = Math.acos(Math.max(-1, Math.min(1, offset.y / spherical.radius)));
    }
    
    getSphericalFromCamera();
    
    this.reset = function() {
        spherical.theta = 0;
        spherical.phi = Math.PI / 2;
        spherical.radius = 3.5;
        sphericalDelta.theta = 0;
        sphericalDelta.phi = 0;
        scale = 1;
        this.update();
    };
    
    this.update = function() {
        if (scope.enableDamping) {
            spherical.theta += sphericalDelta.theta * scope.dampingFactor;
            spherical.phi += sphericalDelta.phi * scope.dampingFactor;
            sphericalDelta.theta *= (1 - scope.dampingFactor);
            sphericalDelta.phi *= (1 - scope.dampingFactor);
        } else {
            spherical.theta += sphericalDelta.theta;
            spherical.phi += sphericalDelta.phi;
            sphericalDelta.theta = 0;
            sphericalDelta.phi = 0;
        }
        
        if (scope.autoRotate) {
            spherical.theta += scope.autoRotateSpeed * 0.001;
        }
        
        spherical.phi = Math.max(EPS, Math.min(Math.PI - EPS, spherical.phi));
        spherical.radius *= scale;
        spherical.radius = Math.max(scope.minDistance, Math.min(scope.maxDistance, spherical.radius));
        scale = 1;
        
        var sinPhiRadius = Math.sin(spherical.phi) * spherical.radius;
        camera.position.set(
            sinPhiRadius * Math.sin(spherical.theta) + scope.target.x,
            Math.cos(spherical.phi) * spherical.radius + scope.target.y,
            sinPhiRadius * Math.cos(spherical.theta) + scope.target.z
        );
        camera.lookAt(scope.target);
    };
    
    function onMouseDown(event) {
        if (!scope.enabled) return;
        isMouseDown = true;
        rotateStart.x = event.clientX;
        rotateStart.y = event.clientY;
    }
    
    function onMouseMove(event) {
        if (!scope.enabled || !isMouseDown) return;
        var deltaX = event.clientX - rotateStart.x;
        var deltaY = event.clientY - rotateStart.y;
        sphericalDelta.theta -= deltaX * 0.005;
        sphericalDelta.phi -= deltaY * 0.005;
        rotateStart.x = event.clientX;
        rotateStart.y = event.clientY;
    }
    
    function onMouseUp() {
        isMouseDown = false;
    }
    
    function onWheel(event) {
        if (!scope.enabled) return;
        if (event.deltaY > 0) {
            scale *= 1.05;
        } else {
            scale /= 1.05;
        }
    }
    
    domElement.addEventListener('mousedown', onMouseDown, false);
    domElement.addEventListener('mousemove', onMouseMove, false);
    domElement.addEventListener('mouseup', onMouseUp, false);
    domElement.addEventListener('mouseleave', onMouseUp, false);
    domElement.addEventListener('wheel', onWheel, false);
    
    // Touch support
    var touchStart = { x: 0, y: 0 };
    var lastTouchDist = 0;
    domElement.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) {
            isMouseDown = true;
            rotateStart.x = e.touches[0].clientX;
            rotateStart.y = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            var dx = e.touches[0].clientX - e.touches[1].clientX;
            var dy = e.touches[0].clientY - e.touches[1].clientY;
            lastTouchDist = Math.sqrt(dx*dx + dy*dy);
        }
    }, false);
    domElement.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (e.touches.length === 1 && isMouseDown) {
            var deltaX = e.touches[0].clientX - rotateStart.x;
            var deltaY = e.touches[0].clientY - rotateStart.y;
            sphericalDelta.theta -= deltaX * 0.005;
            sphericalDelta.phi -= deltaY * 0.005;
            rotateStart.x = e.touches[0].clientX;
            rotateStart.y = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            var dx = e.touches[0].clientX - e.touches[1].clientX;
            var dy = e.touches[0].clientY - e.touches[1].clientY;
            var dist = Math.sqrt(dx*dx + dy*dy);
            if (lastTouchDist > 0) {
                scale *= lastTouchDist / dist;
            }
            lastTouchDist = dist;
        }
    }, { passive: false });
    domElement.addEventListener('touchend', function() {
        isMouseDown = false;
        lastTouchDist = 0;
    }, false);
    
    this.getDistance = function() {
        return spherical.radius;
    };
};

// Globe group
const globeGroup = new THREE.Group();
scene.add(globeGroup);

// Globe sphere

// ============ POPULATION DATA GENERATION ============

// Major cities and regions with approximate coordinates and density values

// Generate additional points procedurally
const regionNames = [
    "North Plains", "East Valley", "South Ridge", "West Basin", "Central Hub",
    "Highland Zone", "Coastal Strip", "River Delta", "Mountain Pass", "Desert Edge",
    "Forest Region", "Lake District", "Prairie Zone", "Tundra Belt", "Savanna",
    "Steppe Region", "Marsh Area", "Canyon Zone", "Peninsula Tip", "Island Chain",
    "Plateau Region", "Fjord Area", "Archipelago", "Oasis Zone", "Volcanic Belt"
];

function seededRandom(seed) {
    var x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

const allDataPoints = [];

// Add major cities
majorCities.forEach((city, i) => {
    allDataPoints.push({
        name: city.name,
        lat: city.lat,
        lng: city.lng,
        density: city.density,
        barMesh: null,
        originalPos: null,
        sortedPos: null,
        index: i
    });
});

// Generate additional procedural points to reach 250+
const numAdditional = 200;
for (let i = 0; i < numAdditional; i++) {
    const seed = i * 137.508;
    const lat = (seededRandom(seed + 1) * 140 - 70); // -70 to 70
    const lng = (seededRandom(seed + 2) * 360 - 180); // -180 to 180
    
    // Higher density near known population centers
    let baseDensity = seededRandom(seed + 3) * 0.5;
    
    // Boost density near equatorial/temperate zones
    const absLat = Math.abs(lat);
    if (absLat < 40) baseDensity += 0.15;
    if (absLat < 25) baseDensity += 0.1;
    
    // Boost near certain longitudes (Asia, Europe)
    if (lng > 60 && lng < 140) baseDensity += 0.15;
    if (lng > -10 && lng < 40) baseDensity += 0.1;
    if (lng > -80 && lng < -35) baseDensity += 0.08;
    
    baseDensity = Math.min(baseDensity, 0.98);
    baseDensity = Math.max(baseDensity, 0.05);
    
    const regionIdx = Math.floor(seededRandom(seed + 4) * regionNames.length);
    const regionNum = Math.floor(seededRandom(seed + 5) * 999) + 1;
    
    allDataPoints.push({
        name: regionNames[regionIdx] + " " + regionNum,
        lat: lat,
        lng: lng,
        density: baseDensity,
        barMesh: null,
        originalPos: null,
        sortedPos: null,
        index: majorCities.length + i
    });
}

// Sort all by density descending for difficulty filtering
allDataPoints.sort((a, b) => b.density - a.density);
allDataPoints.forEach((p, i) => p.index = i);

state.totalBars = allDataPoints.length;

// ============ HELPER FUNCTIONS ============

function latLngToVector3(lat, lng, radius) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lng + 180) * (Math.PI / 180);
    const x = -radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.cos(phi);
    const z = radius * Math.sin(phi) * Math.sin(theta);
    return new THREE.Vector3(x, y, z);
}

function getDensityColor(density) {
    // Green -> Yellow -> Red
    let r, g, b;
    if (density < 0.5) {
        const t = density / 0.5;
        r = t;
        g = 1.0;
        b = (1 - t) * 0.53;
    } else {
        const t = (density - 0.5) / 0.5;
        r = 1.0;
        g = 1.0 - t * 0.8;
        b = (1 - t) * 0.0 + t * 0.2;
    }
    return new THREE.Color(r, g, b);
}

function getBarWidth(level) {
    const widths = [0.02, 0.015, 0.01, 0.008, 0.005];
    return widths[level - 1];
}

function getVisibleCount(level) {
    const counts = [40, 80, 120, 160, allDataPoints.length];
    return counts[level - 1];
}

function getRotationSpeed(level) {
    return 0.002 * level;
}

// ============ CREATE BARS ============

const barsGroup = new THREE.Group();
globeGroup.add(barsGroup);

const barGeometries = {};
const barMeshes = [];

function createBar(dataPoint, width) {
    const height = 0.02 + dataPoint.density * 0.48; // 0.02 to 0.5
    const geo = new THREE.BoxGeometry(width, height, width);
    geo.translate(0, height / 2, 0);
    
    const color = getDensityColor(dataPoint.density);
    const mat = new THREE.MeshPhongMaterial({
        color: color,
        emissive: color.clone().multiplyScalar(0.3),
        transparent: true,
        opacity: 0.9,
        shininess: 50
    });
    
    const mesh = new THREE.Mesh(geo, mat);
    
    const pos = latLngToVector3(dataPoint.lat, dataPoint.lng, 1.0);
    mesh.position.copy(pos);
    mesh.lookAt(pos.clone().multiplyScalar(2));
    
    mesh.userData = {
        dataIndex: dataPoint.index,
        density: dataPoint.density,
        lat: dataPoint.lat,
        lng: dataPoint.lng,
        name: dataPoint.name,
        baseHeight: height,
        originalPosition: pos.clone(),
        originalQuaternion: mesh.quaternion.clone()
    };
    
    dataPoint.barMesh = mesh;
    dataPoint.originalPos = pos.clone();
    
    return mesh;
}

function rebuildBars() {
    // Remove all existing bars
    while (barsGroup.children.length > 0) {
        const child = barsGroup.children[0];
        barsGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
    }
    barMeshes.length = 0;
    
    const level = state.difficultyLevel;
    const width = getBarWidth(level);
    const count = getVisibleCount(level);
    
    state.barWidthCurrent = width;
    
    for (let i = 0; i < Math.min(count, allDataPoints.length); i++) {
        const mesh = createBar(allDataPoints[i], width);
        barsGroup.add(mesh);
        barMeshes.push(mesh);
    }
    
    state.visibleBars = barMeshes.length;
    
    // Compute sorted positions (spiral from north pole)
    computeSortedPositions();
}

function computeSortedPositions() {
    const count = barMeshes.length;
    for (let i = 0; i < count; i++) {
        const t = i / Math.max(count - 1, 1);
        const lat = 90 - t * 160; // from 90 to -70
        const spirals = 12;
        const lng = (t * spirals * 360) % 360 - 180;
        const pos = latLngToVector3(lat, lng, 1.0);
        allDataPoints[i].sortedPos = pos.clone();
    }
}

rebuildBars();

// ============ PARTICLES ============

let particleSystem = null;
let particlePositions = null;
let particleVelocities = null;
const MAX_PARTICLES = 500;

function createParticles() {
    if (particleSystem) {
        globeGroup.remove(particleSystem);
        particleSystem.geometry.dispose();
        particleSystem.material.dispose();
    }
    
    const geometry = new THREE.BufferGeometry();
    particlePositions = new Float32Array(MAX_PARTICLES * 3);
    particleVelocities = new Float32Array(MAX_PARTICLES * 3);
    const colors = new Float32Array(MAX_PARTICLES * 3);
    
    // Initialize particles near high-density bars
    const highDensityBars = barMeshes.filter(m => m.userData.density > 0.7);
    
    for (let i = 0; i < MAX_PARTICLES; i++) {
        const bar = highDensityBars.length > 0 
            ? highDensityBars[Math.floor(Math.random() * highDensityBars.length)]
            : barMeshes[Math.floor(Math.random() * barMeshes.length)];
        
        if (bar) {
            const pos = bar.userData.originalPosition;
            const normal = pos.clone().normalize();
            const offset = normal.clone().multiplyScalar(bar.userData.baseHeight * (0.5 + Math.random() * 0.5));
            
            particlePositions[i * 3] = pos.x + offset.x + (Math.random() - 0.5) * 0.05;
            particlePositions[i * 3 + 1] = pos.y + offset.y + (Math.random() - 0.5) * 0.05;
            particlePositions[i * 3 + 2] = pos.z + offset.z + (Math.random() - 0.5) * 0.05;
            
            particleVelocities[i * 3] = normal.x * 0.002 * (0.5 + Math.random());
            particleVelocities[i * 3 + 1] = normal.y * 0.002 * (0.5 + Math.random());
            particleVelocities[i * 3 + 2] = normal.z * 0.002 * (0.5 + Math.random());
        } else {
            particlePositions[i * 3] = 0;
            particlePositions[i * 3 + 1] = 0;
            particlePositions[i * 3 + 2] = 0;
            particleVelocities[i * 3] = 0;
            particleVelocities[i * 3 + 1] = 0.002;
            particleVelocities[i * 3 + 2] = 0;
        }
        
        const color = getDensityColor(bar ? bar.userData.density : 0.5);
        colors[i * 3] = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;
    }
    
    geometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    
    const material = new THREE.PointsMaterial({
        size: 0.008,
        vertexColors: true,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    
    particleSystem = new THREE.Points(geometry, material);
    globeGroup.add(particleSystem);
}

function updateParticles() {
    if (!particleSystem || !particlePositions) return;
    
    const highDensityBars = barMeshes.filter(m => m.userData.density > 0.7);
    
    for (let i = 0; i < MAX_PARTICLES; i++) {
        particlePositions[i * 3] += particleVelocities[i * 3];
        particlePositions[i * 3 + 1] += particleVelocities[i * 3 + 1];
        particlePositions[i * 3 + 2] += particleVelocities[i * 3 + 2];
        
        // Check if particle is too far from globe
        const x = particlePositions[i * 3];
        const y = particlePositions[i * 3 + 1];
        const z = particlePositions[i * 3 + 2];
        const dist = Math.sqrt(x * x + y * y + z * z);
        
        if (dist > 1.8 || dist < 0.9) {
            // Reset particle
            const bar = highDensityBars.length > 0
                ? highDensityBars[Math.floor(Math.random() * highDensityBars.length)]
                : barMeshes[Math.floor(Math.random() * barMeshes.length)];
            
            if (bar) {
                const pos = bar.userData.originalPosition;
                const normal = pos.clone().normalize();
                const offset = normal.clone().multiplyScalar(bar.userData.baseHeight * 0.3);
                
                particlePositions[i * 3] = pos.x + offset.x + (Math.random() - 0.5) * 0.03;
                particlePositions[i * 3 + 1] = pos.y + offset.y + (Math.random() - 0.5) * 0.03;
                particlePositions[i * 3 + 2] = pos.z + offset.z + (Math.random() - 0.5) * 0.03;
                
                particleVelocities[i * 3] = normal.x * 0.002 * (0.5 + Math.random());
                particleVelocities[i * 3 + 1] = normal.y * 0.002 * (0.5 + Math.random());
                particleVelocities[i * 3 + 2] = normal.z * 0.002 * (0.5 + Math.random());
            }
        }
    }
    
    particleSystem.geometry.attributes.position.needsUpdate = true;
}

function removeParticles() {
    if (particleSystem) {
        globeGroup.remove(particleSystem);
        particleSystem.geometry.dispose();
        particleSystem.material.dispose();
        particleSystem = null;
        particlePositions = null;
        particleVelocities = null;
    }
}

// ============ HEATMAP ============

function applyHeatmap() {
    const geo = globe.geometry;
    const posAttr = geo.attributes.position;
    const count = posAttr.count;
    
    const colors = new Float32Array(count * 3);
    
    for (let i = 0; i < count; i++) {
        const x = posAttr.getX(i);
        const y = posAttr.getY(i);
        const z = posAttr.getZ(i);
        const vertex = new THREE.Vector3(x, y, z);
        
        // Calculate heat from nearby bars
        let heat = 0;
        const visibleCount = getVisibleCount(state.difficultyLevel);
        for (let j = 0; j < Math.min(visibleCount, allDataPoints.length); j++) {
            const dp = allDataPoints[j];
            if (dp.originalPos) {
                const dist = vertex.distanceTo(dp.originalPos);
                if (dist < 0.5) {
                    heat += dp.density * (1 - dist / 0.5) * 0.5;
                }
            }
        }
        
        heat = Math.min(heat, 1.0);
        
        // Color: dark blue -> cyan -> yellow -> red
        let r, g, b;
        if (heat < 0.25) {
            const t = heat / 0.25;
            r = 0.1;
            g = t * 0.5;
            b = 0.2 + t * 0.6;
        } else if (heat < 0.5) {
            const t = (heat - 0.25) / 0.25;
            r = t * 0.8;
            g = 0.5 + t * 0.5;
            b = 0.8 - t * 0.6;
        } else if (heat < 0.75) {
            const t = (heat - 0.5) / 0.25;
            r = 0.8 + t * 0.2;
            g = 1.0 - t * 0.3;
            b = 0.2 - t * 0.2;
        } else {
            const t = (heat - 0.75) / 0.25;
            r = 1.0;
            g = 0.7 - t * 0.5;
            b = t * 0.1;
        }
        
        colors[i * 3] = r;
        colors[i * 3 + 1] = g;
        colors[i * 3 + 2] = b;
    }
    
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    globe.material = heatmapMaterial;
    globe.material.needsUpdate = true;
}

function removeHeatmap() {
    globe.material = globeMaterial;
    globe.material.needsUpdate = true;
}

// ============ SORTING ANIMATION ============

let sortAnimationProgress = 0;
let sortAnimationDirection = 0; // 0=none, 1=sorting, -1=unsorting
let sortAnimationStartTime = 0;
const SORT_DURATION = 2000; // ms

function startSortAnimation() {
    if (state.sortingActive) {
        // Already sorting, toggle back
        sortAnimationDirection = -1;
        sortAnimationStartTime = performance.now();
        sortAnimationProgress = 1;
    } else {
        sortAnimationDirection = 1;
        sortAnimationStartTime = performance.now();
        sortAnimationProgress = 0;
        state.sortingActive = true;
    }
}

function updateSortAnimation(time) {
    if (sortAnimationDirection === 0) return;
    
    const elapsed = time - sortAnimationStartTime;
    let t = Math.min(elapsed / SORT_DURATION, 1.0);
    
    // Ease in-out
    t = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    
    if (sortAnimationDirection === 1) {
        sortAnimationProgress = t;
    } else {
        sortAnimationProgress = 1 - t;
    }
    
    // Interpolate bar positions
    for (let i = 0; i < barMeshes.length; i++) {
        const mesh = barMeshes[i];
        const dp = allDataPoints[i];
        
        if (dp.originalPos && dp.sortedPos) {
            const pos = new THREE.Vector3().lerpVectors(dp.originalPos, dp.sortedPos, sortAnimationProgress);
            mesh.position.copy(pos);
            mesh.lookAt(pos.clone().multiplyScalar(2));
        }
    }
    
    if (elapsed >= SORT_DURATION) {
        if (sortAnimationDirection === -1) {
            state.sortingActive = false;
            // Ensure bars are at original positions
            for (let i = 0; i < barMeshes.length; i++) {
                const mesh = barMeshes[i];
                const dp = allDataPoints[i];
                if (dp.originalPos) {
                    mesh.position.copy(dp.originalPos);
                    mesh.lookAt(dp.originalPos.clone().multiplyScalar(2));
                }
            }
        }
        sortAnimationDirection = 0;
    }
}

// ============ RAYCASTING / CLICK ============

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let highlightedBar = null;

function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(barMeshes);
    
    // Reset previous highlight
    if (highlightedBar) {
        const prevData = highlightedBar.userData;
        const prevColor = getDensityColor(prevData.density);
        highlightedBar.material.color.copy(prevColor);
        highlightedBar.material.emissive.copy(prevColor.clone().multiplyScalar(0.3));
        highlightedBar = null;
    }
    
    const tooltip = document.getElementById('tooltip');
    
    if (intersects.length > 0) {
        const mesh = intersects[0].object;
        highlightedBar = mesh;
        
        // Highlight white
        mesh.material.color.set(0xffffff);
        mesh.material.emissive.set(0x444444);
        
        const data = mesh.userData;
        
        // Update tooltip
        document.getElementById('tt-region').textContent = data.name;
        document.getElementById('tt-density').textContent = data.density.toFixed(3);
        document.getElementById('tt-lat').textContent = data.lat.toFixed(2) + '°';
        document.getElementById('tt-lng').textContent = data.lng.toFixed(2) + '°';
        
        tooltip.style.display = 'block';
        tooltip.style.left = (event.clientX + 15) + 'px';
        tooltip.style.top = (event.clientY - 10) + 'px';
        
        // Clamp tooltip to viewport
        const rect = tooltip.getBoundingClientRect();
        if (rect.right > window.innerWidth) {
            tooltip.style.left = (event.clientX - rect.width - 15) + 'px';
        }
        if (rect.bottom > window.innerHeight) {
            tooltip.style.top = (event.clientY - rect.height - 10) + 'px';
        }
        
        state.selectedBar = {
            index: data.dataIndex,
            density: data.density,
            lat: data.lat,
            lng: data.lng
        };
    } else {
        tooltip.style.display = 'none';
        state.selectedBar = null;
    }
}

renderer.domElement.addEventListener('click', onMouseClick, false);

// ============ KEYBOARD CONTROLS ============

document.addEventListener('keydown', function(event) {
    const key = event.key.toUpperCase();
    
    switch (key) {
        case 'D':
            state.difficultyLevel = (state.difficultyLevel % 5) + 1;
            state.rotationSpeed = getRotationSpeed(state.difficultyLevel);
            controls.autoRotateSpeed = state.rotationSpeed * 1000;
            
            // Handle particles
            if (state.difficultyLevel >= 4) {
                state.particlesActive = true;
            } else {
                state.particlesActive = false;
                removeParticles();
            }
            
            rebuildBars();
            
            if (state.particlesActive) {
                createParticles();
            }
            
            if (state.heatmapMode) {
                applyHeatmap();
            }
            
            updateHUD();
            break;
            
        case 'R':
            controls.reset();
            break;
            
        case 'P':
            state.autoRotate = !state.autoRotate;
            controls.autoRotate = state.autoRotate;
            updateHUD();
            break;
            
        case 'H':
            state.heatmapMode = !state.heatmapMode;
            if (state.heatmapMode) {
                applyHeatmap();
            } else {
                removeHeatmap();
            }
            updateHUD();
            break;
            
        case 'S':
            startSortAnimation();
            break;
    }
});

// ============ HUD UPDATE ============

function updateHUD() {
    document.getElementById('difficulty').textContent = 'Difficulty: ' + state.difficultyLevel + '/5';
    document.getElementById('points-visible').textContent = 'Points Visible: ' + state.visibleBars;
    document.getElementById('auto-rotate').textContent = 'Auto-Rotate: ' + (state.autoRotate ? 'ON' : 'OFF');
    document.getElementById('heatmap-status').textContent = 'Heatmap: ' + (state.heatmapMode ? 'ON' : 'OFF');
}

// ============ FPS COUNTER ============

let fpsFrames = 0;
let fpsLastTime = performance.now();

function updateFPS(time) {
    fpsFrames++;
    if (time - fpsLastTime >= 500) {
        state.fps = Math.round(fpsFrames / ((time - fpsLastTime) / 1000));
        document.getElementById('fps-counter').textContent = 'FPS: ' + state.fps;
        fpsFrames = 0;
        fpsLastTime = time;
    }
}

// ============ WINDOW RESIZE ============

window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============

// Initialize
state.rotationSpeed = getRotationSpeed(state.difficultyLevel);
controls.autoRotateSpeed = state.rotationSpeed * 1000;
updateHUD();

function animate(time) {
    requestAnimationFrame(animate);
    
    state.frameCount++;
    
    // Update controls
    controls.update();
    state.cameraDistance = controls.getDistance();
    
    // Pulsing animation for level 3+
    if (state.difficultyLevel >= 3) {
        const pulseTime = time * 0.001;
        for (let i = 0; i < barMeshes.length; i++) {
            const mesh = barMeshes[i];
            const phase = i * 0.1;
            const pulseFactor = 1.0 + 0.1 * Math.sin(pulseTime * Math.PI + phase);
            mesh.scale.y = pulseFactor;
        }
    } else {
        // Reset scale
        for (let i = 0; i < barMeshes.length; i++) {
            barMeshes[i].scale.y = 1.0;
        }
    }
    
    // Glow effect for level 5
    if (state.difficultyLevel >= 5) {
        const glowTime = time * 0.002;
        for (let i = 0; i < barMeshes.length; i++) {
            const mesh = barMeshes[i];
            const density = mesh.userData.density;
            const glowIntensity = 0.3 + 0.2 * Math.sin(glowTime + i * 0.05);
            const baseColor = getDensityColor(density);
            mesh.material.emissive.copy(baseColor.clone().multiplyScalar(glowIntensity));
            
            // Skip if highlighted
            if (mesh === highlightedBar) {
                mesh.material.color.set(0xffffff);
                mesh.material.emissive.set(0x444444);
            }
        }
    }
    
    // Particles
    if (state.particlesActive && particleSystem) {
        updateParticles();
    }
    
    // Sort animation
    if (sortAnimationDirection !== 0) {
        updateSortAnimation(time);
    }
    
    // FPS
    updateFPS(time);
    
    // Render
    renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
