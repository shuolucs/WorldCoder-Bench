<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 产品检视工具</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #222; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #hud {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.75);
    color: #eee;
    padding: 16px 22px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.8;
    z-index: 100;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 200px;
  }
  #hud .label {
    color: #999;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #hud .value {
    color: #fff;
    font-weight: 600;
    font-size: 15px;
  }
  #hud .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  #hud .row:last-child { border-bottom: none; }
  #hud h3 {
    margin-bottom: 10px;
    font-size: 16px;
    color: #ff6b6b;
    letter-spacing: 1px;
  }

  #infoPanel {
    position: fixed;
    top: 50%;
    right: 30px;
    transform: translateY(-50%);
    width: 300px;
    background: rgba(10, 10, 10, 0.9);
    color: #eee;
    padding: 0;
    border-radius: 16px;
    z-index: 100;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.4s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  #infoPanel.visible {
    opacity: 1;
    pointer-events: auto;
  }
  #infoPanel .panel-header {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    padding: 20px 24px;
    position: relative;
  }
  #infoPanel .panel-header .hotspot-badge {
    display: inline-block;
    background: rgba(255,255,255,0.25);
    color: #fff;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #infoPanel .panel-header h2 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin: 0;
  }
  #infoPanel .panel-body {
    padding: 20px 24px;
  }
  #infoPanel .panel-body p {
    font-size: 14px;
    line-height: 1.7;
    color: #bbb;
  }
  #infoPanel .close-btn {
    position: absolute;
    top: 14px;
    right: 16px;
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  #infoPanel .close-btn:hover {
    background: rgba(255,255,255,0.35);
  }
  #infoPanel .panel-body .coord-info {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 12px;
    color: #666;
    font-family: monospace;
  }

  #loadingOverlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.6s ease;
  }
  #loadingOverlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #ff6b6b;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    color: #999;
    margin-top: 20px;
    font-size: 14px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">加载模型中...</div>
</div>

<div id="hud">
  <h3>📊 检视面板</h3>
  <div class="row">
    <span class="label">加载状态</span>
    <span class="value" id="loadStatus">加载中...</span>
  </div>
  <div class="row">
    <span class="label">热点总数</span>
    <span class="value" id="hotspotCount">0</span>
  </div>
  <div class="row">
    <span class="label">已选热点</span>
    <span class="value" id="selectedId">无</span>
  </div>
</div>

<div id="infoPanel">
  <div class="panel-header">
    <span class="hotspot-badge" id="panelBadge">热点 #0</span>
    <button class="close-btn" id="closePanel">✕</button>
    <h2 id="panelTitle">标题</h2>
  </div>
  <div class="panel-body">
    <p id="panelDesc">描述内容</p>
    <div class="coord-info" id="panelCoord">位置: (0, 0, 0)</div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// Global state
window.__3D_STATE__ = {
  modelLoaded: false,
  selectedHotspot: -1,
  hotspotCount: 4,
  cameraDistance: 3,
  hotspotPositions: [],
  highlightActive: false
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.5, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1;
controls.maxDistance = 10;
controls.target.set(0, 0, 0);
controls.update();

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight1.position.set(5, 5, 5);
dirLight1.castShadow = false;
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x8888ff, 0.6);
dirLight2.position.set(-3, 3, -3);
scene.add(dirLight2);

const dirLight3 = new THREE.DirectionalLight(0xff8866, 0.4);
dirLight3.position.set(0, -3, 2);
scene.add(dirLight3);

// Environment map for metallic reflections
const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();

// Create a simple environment using a small scene
const envScene = new THREE.Scene();
const envGeo = new THREE.SphereGeometry(5, 32, 32);
const envColors = [
  new THREE.Color(0x334455),
  new THREE.Color(0x556677),
  new THREE.Color(0x445566)
];
const envMat = new THREE.MeshBasicMaterial({ 
  color: 0x445566, 
  side: THREE.BackSide 
});
const envMesh = new THREE.Mesh(envGeo, envMat);
envScene.add(envMesh);

// Add some colored lights to env scene for reflections
const envLight1 = new THREE.PointLight(0xffffff, 50, 10);
envLight1.position.set(2, 2, 2);
envScene.add(envLight1);
const envLight2 = new THREE.PointLight(0x8888ff, 30, 10);
envLight2.position.set(-2, 1, -2);
envScene.add(envLight2);

const envMap = pmremGenerator.fromScene(envScene, 0.04).texture;
scene.environment = envMap;
pmremGenerator.dispose();

// Hotspot data
const hotspotsData = [
  { position: new THREE.Vector3(0.3, 0.3, 0.5), title: "前额损伤", desc: "头盔前额区域有明显的撞击痕迹" },
  { position: new THREE.Vector3(-0.4, 0.1, 0.3), title: "左侧裂纹", desc: "左侧面罩出现细长裂纹" },
  { position: new THREE.Vector3(0.0, -0.3, 0.5), title: "下颚护板", desc: "下颚护板轻微变形但结构完整" },
  { position: new THREE.Vector3(0.0, 0.4, -0.3), title: "后部凹陷", desc: "后部区域有轻微凹陷" }
];

// Create hotspot meshes
const hotspotMeshes = [];
const hotspotGroup = new THREE.Group();

const redColor = new THREE.Color(0xff3333);
const yellowColor = new THREE.Color(0xffff00);

hotspotsData.forEach((data, index) => {
  // Outer glow sphere
  const glowGeo = new THREE.SphereGeometry(0.07, 24, 24);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xff3333,
    transparent: true,
    opacity: 0.25
  });
  const glowMesh = new THREE.Mesh(glowGeo, glowMat);
  glowMesh.position.copy(data.position);

  // Inner solid sphere
  const geo = new THREE.SphereGeometry(0.05, 24, 24);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xff3333,
    emissive: 0xff3333,
    emissiveIntensity: 0.8,
    roughness: 0.2,
    metalness: 0.3
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(data.position);
  mesh.userData = { hotspotIndex: index, glowMesh: glowMesh };

  hotspotGroup.add(glowMesh);
  hotspotGroup.add(mesh);
  hotspotMeshes.push(mesh);

  window.__3D_STATE__.hotspotPositions.push({
    x: data.position.x,
    y: data.position.y,
    z: data.position.z
  });
});

scene.add(hotspotGroup);

// DOM references
const infoPanel = document.getElementById('infoPanel');
const panelTitle = document.getElementById('panelTitle');
const panelDesc = document.getElementById('panelDesc');
const panelBadge = document.getElementById('panelBadge');
const panelCoord = document.getElementById('panelCoord');
const closePanel = document.getElementById('closePanel');
const selectedIdEl = document.getElementById('selectedId');
const loadStatusEl = document.getElementById('loadStatus');
const hotspotCountEl = document.getElementById('hotspotCount');
const loadingOverlay = document.getElementById('loadingOverlay');

hotspotCountEl.textContent = '4';

// Load model
const loader = new GLTFLoader();
let model = null;

loader.load(
  'assets/DamagedHelmet.glb',
  (gltf) => {
    model = gltf.scene;

    // Center the model
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 1.5 / maxDim;
    model.scale.setScalar(scale);

    // Recalculate after scale
    box.setFromObject(model);
    const newCenter = box.getCenter(new THREE.Vector3());
    model.position.sub(newCenter);

    scene.add(model);

    // Update hotspot positions relative to model scale
    // The model is roughly unit-sized, hotspots are placed in world coords

    window.__3D_STATE__.modelLoaded = true;
    loadStatusEl.textContent = '✅ 已加载';
    loadStatusEl.style.color = '#4ecdc4';

    // Hide loading overlay
    setTimeout(() => {
      loadingOverlay.classList.add('hidden');
    }, 300);
  },
  (progress) => {
    if (progress.total > 0) {
      const pct = Math.round((progress.loaded / progress.total) * 100);
      document.querySelector('.loading-text').textContent = `加载模型中... ${pct}%`;
    }
  },
  (error) => {
    console.error('模型加载失败:', error);
    loadStatusEl.textContent = '❌ 加载失败';
    loadStatusEl.style.color = '#ff6b6b';
    document.querySelector('.loading-text').textContent = '加载失败，请检查模型路径';
  }
);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function selectHotspot(index) {
  window.__3D_STATE__.selectedHotspot = index;
  window.__3D_STATE__.highlightActive = true;

  // Update hotspot visuals
  hotspotMeshes.forEach((mesh, i) => {
    const glowMesh = mesh.userData.glowMesh;
    if (i === index) {
      mesh.material.color.copy(yellowColor);
      mesh.material.emissive.copy(yellowColor);
      mesh.material.emissiveIntensity = 1.5;
      glowMesh.material.color.set(0xffff00);
      glowMesh.material.opacity = 0.4;
      mesh.scale.setScalar(1.3);
      glowMesh.scale.setScalar(1.5);
    } else {
      mesh.material.color.copy(redColor);
      mesh.material.emissive.copy(redColor);
      mesh.material.emissiveIntensity = 0.8;
      glowMesh.material.color.set(0xff3333);
      glowMesh.material.opacity = 0.25;
      mesh.scale.setScalar(1.0);
      glowMesh.scale.setScalar(1.0);
    }
  });

  // Show info panel
  const data = hotspotsData[index];
  panelBadge.textContent = `热点 #${index}`;
  panelTitle.textContent = data.title;
  panelDesc.textContent = data.desc;
  panelCoord.textContent = `位置: (${data.position.x.toFixed(2)}, ${data.position.y.toFixed(2)}, ${data.position.z.toFixed(2)})`;
  infoPanel.classList.add('visible');

  // Update HUD
  selectedIdEl.textContent = index.toString();
  selectedIdEl.style.color = '#ffff00';
}

function deselectHotspot() {
  window.__3D_STATE__.selectedHotspot = -1;
  window.__3D_STATE__.highlightActive = false;

  hotspotMeshes.forEach((mesh) => {
    const glowMesh = mesh.userData.glowMesh;
    mesh.material.color.copy(redColor);
    mesh.material.emissive.copy(redColor);
    mesh.material.emissiveIntensity = 0.8;
    glowMesh.material.color.set(0xff3333);
    glowMesh.material.opacity = 0.25;
    mesh.scale.setScalar(1.0);
    glowMesh.scale.setScalar(1.0);
  });

  infoPanel.classList.remove('visible');
  selectedIdEl.textContent = '无';
  selectedIdEl.style.color = '#eee';
}

// Click handler
renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(hotspotMeshes, false);

  if (intersects.length > 0) {
    const hitMesh = intersects[0].object;
    const index = hitMesh.userData.hotspotIndex;
    if (index !== undefined) {
      selectHotspot(index);
    }
  } else {
    deselectHotspot();
  }
});

// Close panel button
closePanel.addEventListener('click', (e) => {
  e.stopPropagation();
  deselectHotspot();
});

// Hover effect
renderer.domElement.addEventListener('mousemove', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(hotspotMeshes, false);

  renderer.domElement.style.cursor = intersects.length > 0 ? 'pointer' : 'default';
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();

  // Animate hotspot glow pulsing
  hotspotMeshes.forEach((mesh, i) => {
    const glowMesh = mesh.userData.glowMesh;
    const pulse = 1.0 + 0.15 * Math.sin(elapsed * 3 + i * 1.5);
    
    if (window.__3D_STATE__.selectedHotspot === i) {
      glowMesh.scale.setScalar(1.5 * pulse);
      mesh.scale.setScalar(1.3);
    } else {
      glowMesh.scale.setScalar(pulse);
      mesh.scale.setScalar(1.0);
    }

    // Slight floating animation
    const floatOffset = Math.sin(elapsed * 2 + i * 2) * 0.005;
    mesh.position.y = hotspotsData[i].position.y + floatOffset;
    glowMesh.position.y = hotspotsData[i].position.y + floatOffset;
  });

  controls.update();

  // Update state
  window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
