<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 产品检视工具</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #222;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 180px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      font-size: 14px;
      line-height: 1.8;
    }

    #infoPanel {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      width: 280px;
      color: #fff;
      background: rgba(20, 20, 20, 0.88);
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      display: none;
    }

    #infoPanel h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    #infoPanel p {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: #ddd;
    }

    #loading {
      position: absolute;
      inset: 0;
      z-index: 9;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      background: rgba(0,0,0,0.25);
      pointer-events: none;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>已选热点编号：<span id="selectedId">无</span></div>
      <div>模型加载状态：<span id="loadStatus">未加载</span></div>
      <div>热点总数：<span id="hotspotCount">4</span></div>
    </div>

    <div id="infoPanel">
      <h3 id="infoTitle"></h3>
      <p id="infoDesc"></p>
    </div>

    <div id="loading">模型加载中...</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('app');
    const infoPanel = document.getElementById('infoPanel');
    const infoTitle = document.getElementById('infoTitle');
    const infoDesc = document.getElementById('infoDesc');
    const selectedIdEl = document.getElementById('selectedId');
    const loadStatusEl = document.getElementById('loadStatus');
    const hotspotCountEl = document.getElementById('hotspotCount');
    const loadingEl = document.getElementById('loading');

    window.__3D_STATE__ = {
      modelLoaded: false,
      selectedHotspot: -1,
      hotspotCount: 4,
      cameraDistance: 0,
      hotspotPositions: [],
      highlightActive: false
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.2, 3.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 1;
    controls.maxDistance = 10;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 2.0);
    directionalLight.position.set(3, 4, 5);
    scene.add(directionalLight);

    const directionalLight2 = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight2.position.set(-4, 2, -3);
    scene.add(directionalLight2);

    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    const envScene = new THREE.Scene();
    envScene.background = new THREE.Color(0x444444);
    const envLight1 = new THREE.DirectionalLight(0xffffff, 2.5);
    envLight1.position.set(5, 5, 5);
    const envLight2 = new THREE.DirectionalLight(0xffffff, 1.5);
    envLight2.position.set(-5, 3, -5);
    const envAmbient = new THREE.AmbientLight(0xffffff, 0.8);
    envScene.add(envLight1, envLight2, envAmbient);
    const envMap = pmremGenerator.fromScene(envScene, 0.04).texture;
    scene.environment = envMap;

    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    const hotspotData = [
      {
        position: new THREE.Vector3(0.3, 0.3, 0.5),
        title: '前额损伤',
        desc: '头盔前额区域有明显的撞击痕迹'
      },
      {
        position: new THREE.Vector3(-0.4, 0.1, 0.3),
        title: '左侧裂纹',
        desc: '左侧面罩出现细长裂纹'
      },
      {
        position: new THREE.Vector3(0.0, -0.3, 0.5),
        title: '下颚护板',
        desc: '下颚护板轻微变形但结构完整'
      },
      {
        position: new THREE.Vector3(0.0, 0.4, -0.3),
        title: '后部凹陷',
        desc: '后部区域有轻微凹陷'
      }
    ];

    const hotspotMeshes = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const hotspotGeometry = new THREE.SphereGeometry(0.05, 24, 24);

    function createHotspots() {
      hotspotData.forEach((item, index) => {
        const material = new THREE.MeshStandardMaterial({
          color: 0xff2222,
          emissive: 0xaa0000,
          emissiveIntensity: 1.8,
          metalness: 0.2,
          roughness: 0.4
        });

        const mesh = new THREE.Mesh(hotspotGeometry, material);
        mesh.position.copy(item.position);
        mesh.userData = { hotspotIndex: index };
        modelGroup.add(mesh);
        hotspotMeshes.push(mesh);
      });

      hotspotCountEl.textContent = hotspotMeshes.length.toString();
    }

    function setSelectedHotspot(index) {
      window.__3D_STATE__.selectedHotspot = index;
      window.__3D_STATE__.highlightActive = index !== -1;
      selectedIdEl.textContent = index === -1 ? '无' : String(index);

      hotspotMeshes.forEach((mesh, i) => {
        if (i === index) {
          mesh.material.color.set(0xffff00);
          mesh.material.emissive.set(0xffff00);
          mesh.material.emissiveIntensity = 2.2;
          mesh.scale.setScalar(1.2);
        } else {
          mesh.material.color.set(0xff2222);
          mesh.material.emissive.set(0xaa0000);
          mesh.material.emissiveIntensity = 1.8;
          mesh.scale.setScalar(1.0);
        }
      });

      if (index === -1) {
        infoPanel.style.display = 'none';
      } else {
        infoTitle.textContent = hotspotData[index].title;
        infoDesc.textContent = hotspotData[index].desc;
        infoPanel.style.display = 'block';
      }
    }

    function updateState() {
      window.__3D_STATE__.modelLoaded = window.__3D_STATE__.modelLoaded === true;
      window.__3D_STATE__.hotspotCount = hotspotMeshes.length;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.hotspotPositions = hotspotMeshes.map(mesh => {
        const wp = new THREE.Vector3();
        mesh.getWorldPosition(wp);
        return { x: wp.x, y: wp.y, z: wp.z };
      });

      loadStatusEl.textContent = window.__3D_STATE__.modelLoaded ? '已加载' : '未加载';
    }

    createHotspots();
    setSelectedHotspot(-1);

    const loader = new GLTFLoader();
    loader.load(
      'assets/DamagedHelmet.glb',
      (gltf) => {
        const model = gltf.scene;
        modelGroup.add(model);

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        model.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z);
        const targetSize = 1.8;
        const scale = targetSize / maxDim;
        model.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(model);
        const scaledCenter = new THREE.Vector3();
        scaledBox.getCenter(scaledCenter);
        model.position.sub(scaledCenter);

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;

            if (child.material) {
              child.material.envMapIntensity = 1.0;
              child.material.needsUpdate = true;
            }
          }
        });

        window.__3D_STATE__.modelLoaded = true;
        loadingEl.style.display = 'none';
        loadStatusEl.textContent = '已加载';
      },
      undefined,
      (err) => {
        console.error('模型加载失败:', err);
        loadingEl.textContent = '模型加载失败，请检查 assets/DamagedHelmet.glb';
      }
    );

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(hotspotMeshes, false);

      if (intersects.length > 0) {
        const picked = intersects[0].object;
        const index = picked.userData.hotspotIndex;
        setSelectedHotspot(index);
      } else {
        setSelectedHotspot(-1);
      }
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const tempOrigin = new THREE.Vector3(0, 0, 0);

    function animate() {
      requestAnimationFrame(animate);

      controls.update();

      hotspotMeshes.forEach((mesh, i) => {
        const t = performance.now() * 0.002 + i * 0.7;
        const pulse = 1 + Math.sin(t) * 0.05;
        if (window.__3D_STATE__.selectedHotspot !== i) {
          mesh.scale.setScalar(pulse);
        }
      });

      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(tempOrigin);
      window.__3D_STATE__.hotspotCount = hotspotMeshes.length;
      window.__3D_STATE__.hotspotPositions = hotspotMeshes.map(mesh => {
        const wp = new THREE.Vector3();
        mesh.getWorldPosition(wp);
        return { x: wp.x, y: wp.y, z: wp.z };
      });
      window.__3D_STATE__.highlightActive = window.__3D_STATE__.selectedHotspot !== -1;
      loadStatusEl.textContent = window.__3D_STATE__.modelLoaded ? '已加载' : '未加载';

      renderer.render(scene, camera);
    }

    updateState();
    animate();
  </script>
</body>
</html>
