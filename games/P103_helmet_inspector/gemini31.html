<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 产品检视工具</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222222;
            font-family: sans-serif;
        }
        #container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.8;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #hud span {
            font-weight: bold;
            color: #4da6ff;
        }
        #infoPanel {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 280px;
            background: rgba(30, 30, 30, 0.85);
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #infoPanel h3 {
            margin: 0 0 10px 0;
            color: #ffff00;
            font-size: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
        }
        #infoPanel p {
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
            color: #cccccc;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="container"></div>
    
    <div id="hud">
        <div>已选热点: <span id="selectedId">无</span></div>
        <div>加载状态: <span id="loadStatus" style="color: #ffaa00;">加载中...</span></div>
        <div>热点总数: <span id="hotspotCount">4</span></div>
    </div>

    <div id="infoPanel">
        <h3 id="infoTitle">标题</h3>
        <p id="infoDesc">描述</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // 初始化全局状态
        window.__3D_STATE__ = {
            modelLoaded: false,
            selectedHotspot: -1,
            hotspotCount: 4,
            cameraDistance: 0,
            hotspotPositions: [],
            highlightActive: false
        };

        // 场景设置
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        // 摄像机设置
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 3);

        // 渲染器设置
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        // 环境光与灯光 (使用 RoomEnvironment 增强金属质感)
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // 控制器设置
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 1;
        controls.maxDistance = 10;

        // 热点数据
        const hotspotsData = [
            { pos: [0.3, 0.3, 0.5], title: "前额损伤", desc: "头盔前额区域有明显的撞击痕迹" },
            { pos: [-0.4, 0.1, 0.3], title: "左侧裂纹", desc: "左侧面罩出现细长裂纹" },
            { pos: [0.0, -0.3, 0.5], title: "下颚护板", desc: "下颚护板轻微变形但结构完整" },
            { pos: [0.0, 0.4, -0.3], title: "后部凹陷", desc: "后部区域有轻微凹陷" }
        ];

        const hotspotMeshes = [];
        const sphereGeometry = new THREE.SphereGeometry(0.05, 32, 32);
        
        // 创建热点
        hotspotsData.forEach((data, index) => {
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xff0000, 
                emissive: 0xff0000, 
                emissiveIntensity: 0.6,
                roughness: 0.2,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(sphereGeometry, material);
            mesh.position.set(...data.pos);
            mesh.userData = { index, title: data.title, desc: data.desc };
            scene.add(mesh);
            hotspotMeshes.push(mesh);
            
            window.__3D_STATE__.hotspotPositions.push({ x: data.pos[0], y: data.pos[1], z: data.pos[2] });
        });

        // 加载模型
        const loader = new GLTFLoader();
        loader.load('assets/DamagedHelmet.glb', (gltf) => {
            const model = gltf.scene;
            
            // 居中模型
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            
            scene.add(model);

            // 更新状态与UI
            window.__3D_STATE__.modelLoaded = true;
            const loadStatusEl = document.getElementById('loadStatus');
            loadStatusEl.innerText = '已加载';
            loadStatusEl.style.color = '#00ff00';
        }, undefined, (error) => {
            console.error('模型加载失败:', error);
            const loadStatusEl = document.getElementById('loadStatus');
            loadStatusEl.innerText = '加载失败';
            loadStatusEl.style.color = '#ff0000';
        });

        // 交互逻辑
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const infoPanel = document.getElementById('infoPanel');
        const infoTitle = document.getElementById('infoTitle');
        const infoDesc = document.getElementById('infoDesc');
        const selectedIdEl = document.getElementById('selectedId');

        window.addEventListener('pointerdown', (event) => {
            // 计算鼠标 NDC 坐标
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(hotspotMeshes);

            // 重置所有热点颜色
            hotspotMeshes.forEach(mesh => {
                mesh.material.color.setHex(0xff0000);
                mesh.material.emissive.setHex(0xff0000);
            });

            if (intersects.length > 0) {
                // 击中热点
                const hitMesh = intersects[0].object;
                hitMesh.material.color.setHex(0xffff00);
                hitMesh.material.emissive.setHex(0xffff00);

                const data = hitMesh.userData;
                window.__3D_STATE__.selectedHotspot = data.index;
                window.__3D_STATE__.highlightActive = true;

                // 更新面板
                infoTitle.innerText = data.title;
                infoDesc.innerText = data.desc;
                infoPanel.style.display = 'block';
            } else {
                // 点击空白区域
                window.__3D_STATE__.selectedHotspot = -1;
                window.__3D_STATE__.highlightActive = false;
                infoPanel.style.display = 'none';
            }
        });

        // 窗口缩放适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // 每帧更新状态
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);
            
            // 更新 HUD
            selectedIdEl.innerText = window.__3D_STATE__.selectedHotspot !== -1 ? window.__3D_STATE__.selectedHotspot : '无';

            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
