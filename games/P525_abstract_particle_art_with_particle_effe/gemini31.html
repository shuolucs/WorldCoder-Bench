<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Abstract Particle Art</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            pointer-events: none;
            user-select: none;
            border-radius: 5px;
            line-height: 1.5;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud"></div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            particleCount: 2000,
            currentMode: 0,
            currentModeName: 'ORBIT',
            currentTheme: 0,
            currentThemeName: 'NEON',
            sizeMultiplier: 1.0,
            dragonRotationSpeed: 0.5,
            isPaused: false,
            burstCount: 0,
            activeburstParticles: 0,
            elapsedTime: 0,
            dragonOpacity: 0.4,
            dragonScale: 1.0,
            cameraDistance: 8.0
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // --- Texture Generation ---
        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const context = canvas.getContext('2d');
        const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        context.fillStyle = gradient;
        context.fillRect(0, 0, 32, 32);
        const particleTexture = new THREE.CanvasTexture(canvas);

        // --- Shaders ---
        const vertexShader = `
            attribute float size;
            attribute vec3 customColor;
            attribute float life;
            varying vec3 vColor;
            varying float vLife;
            uniform float sizeMultiplier;
            void main() {
                vColor = customColor;
                vLife = life;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * sizeMultiplier * (300.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            uniform sampler2D pointTexture;
            varying vec3 vColor;
            varying float vLife;
            void main() {
                gl_FragColor = vec4(vColor, vLife) * texture2D(pointTexture, gl_PointCoord);
            }
        `;

        // --- Main Particle System ---
        const pCount = state.particleCount;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(pCount * 3);
        const basePositions = new Float32Array(pCount * 3);
        const velocities = new Float32Array(pCount * 3);
        const colors = new Float32Array(pCount * 3);
        const sizes = new Float32Array(pCount);
        const lives = new Float32Array(pCount);

        for (let i = 0; i < pCount; i++) {
            // Random point in sphere radius 5
            const u = Math.random();
            const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            const r = Math.cbrt(Math.random()) * 5.0;
            
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);

            positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
            basePositions[i*3] = x; basePositions[i*3+1] = y; basePositions[i*3+2] = z;
            velocities[i*3] = 0; velocities[i*3+1] = 0; velocities[i*3+2] = 0;
            sizes[i] = 0.02 + Math.random() * 0.06;
            lives[i] = 1.0;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        geometry.setAttribute('life', new THREE.BufferAttribute(lives, 1));

        const material = new THREE.ShaderMaterial({
            uniforms: {
                pointTexture: { value: particleTexture },
                sizeMultiplier: { value: state.sizeMultiplier }
            },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            blending: THREE.AdditiveBlending,
            depthTest: false,
            transparent: true
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- Burst Particle System ---
        const MAX_BURSTS = 5000;
        const burstGeo = new THREE.BufferGeometry();
        const bPositions = new Float32Array(MAX_BURSTS * 3);
        const bColors = new Float32Array(MAX_BURSTS * 3);
        const bSizes = new Float32Array(MAX_BURSTS);
        const bLives = new Float32Array(MAX_BURSTS);
        
        burstGeo.setAttribute('position', new THREE.BufferAttribute(bPositions, 3));
        burstGeo.setAttribute('customColor', new THREE.BufferAttribute(bColors, 3));
        burstGeo.setAttribute('size', new THREE.BufferAttribute(bSizes, 1));
        burstGeo.setAttribute('life', new THREE.BufferAttribute(bLives, 1));
        burstGeo.setDrawRange(0, 0);

        const burstSystem = new THREE.Points(burstGeo, material);
        scene.add(burstSystem);
        let activeBursts = [];

        // --- Model Loading ---
        const dragonGroup = new THREE.Group();
        scene.add(dragonGroup);
        const loader = new GLTFLoader();
        
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DragonAttenuation/glTF-Binary/DragonAttenuation.glb', (gltf) => {
            const model = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 3.0 / maxDim;
            
            model.position.sub(center.multiplyScalar(scale));
            model.scale.setScalar(scale);
            state.dragonScale = scale;

            model.traverse((child) => {
                if (child.isMesh) {
                    child.material.transparent = true;
                    child.material.opacity = state.dragonOpacity;
                    child.material.depthWrite = false;
                    
                    const wireMat = new THREE.MeshBasicMaterial({
                        color: 0xffffff,
                        wireframe: true,
                        transparent: true,
                        opacity: 0.15
                    });
                    const wireMesh = new THREE.Mesh(child.geometry, wireMat);
                    child.add(wireMesh);
                }
            });

            dragonGroup.add(model);
            state.modelLoaded = true;
        });

        // --- Logic Functions ---
        function applyTheme() {
            const colArray = geometry.attributes.customColor.array;
            for (let i = 0; i < pCount; i++) {
                const color = new THREE.Color();
                switch (state.currentTheme) {
                    case 0: color.setHSL(i / pCount, 0.8, 0.6); break; // NEON
                    case 1: color.setHSL(Math.random() * 0.1, 0.8, 0.6); break; // FIRE
                    case 2: color.setHSL(0.5 + Math.random() * 0.2, 0.8, 0.6); break; // ICE
                    case 3: color.setHSL(0, 0, 0.2 + Math.random() * 0.8); break; // MONO
                }
                colArray[i*3] = color.r; colArray[i*3+1] = color.g; colArray[i*3+2] = color.b;
            }
            geometry.attributes.customColor.needsUpdate = true;
        }

        function setMode(m) {
            state.currentMode = m;
            const modes = ['ORBIT', 'EXPLODE', 'ATTRACT', 'WAVE'];
            state.currentModeName = modes[m];

            if (m === 1) { // EXPLODE init
                for (let i = 0; i < pCount; i++) {
                    const dir = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
                    const speed = 2.0 + Math.random() * 3.0;
                    velocities[i*3] = dir.x * speed;
                    velocities[i*3+1] = dir.y * speed;
                    velocities[i*3+2] = dir.z * speed;
                }
            }
        }

        function resetParticles() {
            for (let i = 0; i < pCount; i++) {
                positions[i*3] = basePositions[i*3];
                positions[i*3+1] = basePositions[i*3+1];
                positions[i*3+2] = basePositions[i*3+2];
                velocities[i*3] = 0; velocities[i*3+1] = 0; velocities[i*3+2] = 0;
            }
            geometry.attributes.position.needsUpdate = true;
            setMode(0);
            state.currentTheme = 0;
            state.currentThemeName = 'NEON';
            applyTheme();
        }

        function createBurst(target) {
            for (let i = 0; i < 50; i++) {
                const color = new THREE.Color().setHSL(Math.random(), 1.0, 0.6);
                activeBursts.push({
                    pos: target.clone(),
                    vel: new THREE.Vector3((Math.random()-0.5)*4, (Math.random()-0.5)*4, (Math.random()-0.5)*4),
                    life: 1.0,
                    color: color,
                    size: 0.05 + Math.random() * 0.05
                });
            }
        }

        // --- Event Listeners ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const planeZ0 = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(planeZ0, target)) {
                state.burstCount++;
                createBurst(target);
            }
        });

        window.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'm': setMode((state.currentMode + 1) % 4); break;
                case 'c': 
                    state.currentTheme = (state.currentTheme + 1) % 4;
                    const themes = ['NEON', 'FIRE', 'ICE', 'MONO'];
                    state.currentThemeName = themes[state.currentTheme];
                    applyTheme();
                    break;
                case 'r': resetParticles(); break;
                case ' ': state.isPaused = !state.isPaused; break;
                case 'arrowup': state.sizeMultiplier = Math.min(3.0, state.sizeMultiplier + 0.25); break;
                case 'arrowdown': state.sizeMultiplier = Math.max(0.5, state.sizeMultiplier - 0.25); break;
                case 'arrowleft': state.dragonRotationSpeed = Math.max(0.0, state.dragonRotationSpeed - 0.1); break;
                case 'arrowright': state.dragonRotationSpeed = Math.min(2.0, state.dragonRotationSpeed + 0.1); break;
            }
            material.uniforms.sizeMultiplier.value = state.sizeMultiplier;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        applyTheme();
        setMode(0);

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let frames = 0;
        let lastFpsTime = 0;
        let fps = 0;
        const hud = document.getElementById('hud');

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            frames++;
            if (time - lastFpsTime >= 1.0) {
                fps = frames;
                frames = 0;
                lastFpsTime = time;
            }

            if (!state.isPaused) {
                state.elapsedTime += dt;
                dragonGroup.rotation.y += state.dragonRotationSpeed * dt;

                const posArray = geometry.attributes.position.array;
                const up = new THREE.Vector3(0, 1, 0);

                for (let i = 0; i < pCount; i++) {
                    const idx = i * 3;
                    const p = new THREE.Vector3(posArray[idx], posArray[idx+1], posArray[idx+2]);
                    const v = new THREE.Vector3(velocities[idx], velocities[idx+1], velocities[idx+2]);

                    if (state.currentMode === 0) { // ORBIT
                        const tangent = new THREE.Vector3().crossVectors(p, up).normalize();
                        const dist = p.length();
                        const pull = p.clone().normalize().multiplyScalar(1.5 - dist).multiplyScalar(0.5);
                        const force = tangent.multiplyScalar(2.0).add(pull);
                        v.add(force.multiplyScalar(dt));
                        v.multiplyScalar(0.95);
                        p.add(v.clone().multiplyScalar(dt));
                    } 
                    else if (state.currentMode === 1) { // EXPLODE
                        v.multiplyScalar(0.98);
                        p.add(v.clone().multiplyScalar(dt));
                    }
                    else if (state.currentMode === 2) { // ATTRACT
                        const dir = p.clone().negate().normalize();
                        v.add(dir.multiplyScalar(3.0 * dt));
                        v.multiplyScalar(0.9);
                        p.add(v.clone().multiplyScalar(dt));
                    }
                    else if (state.currentMode === 3) { // WAVE
                        const x = basePositions[idx];
                        p.x = x;
                        p.y = 2.0 * Math.sin(x * 0.5 + state.elapsedTime);
                        p.z = 2.0 * Math.cos(x * 0.5 + state.elapsedTime);
                    }

                    posArray[idx] = p.x; posArray[idx+1] = p.y; posArray[idx+2] = p.z;
                    velocities[idx] = v.x; velocities[idx+1] = v.y; velocities[idx+2] = v.z;
                }
                geometry.attributes.position.needsUpdate = true;

                // Update Bursts
                let nextBursts = [];
                let bIdx = 0;
                for (let i = 0; i < activeBursts.length; i++) {
                    const b = activeBursts[i];
                    b.life -= dt * 0.5; // Fade over 2s
                    if (b.life > 0 && bIdx < MAX_BURSTS) {
                        b.pos.add(b.vel.clone().multiplyScalar(dt));
                        
                        bPositions[bIdx*3] = b.pos.x; bPositions[bIdx*3+1] = b.pos.y; bPositions[bIdx*3+2] = b.pos.z;
                        bColors[bIdx*3] = b.color.r; bColors[bIdx*3+1] = b.color.g; bColors[bIdx*3+2] = b.color.b;
                        bSizes[bIdx] = b.size;
                        bLives[bIdx] = b.life;
                        
                        nextBursts.push(b);
                        bIdx++;
                    }
                }
                activeBursts = nextBursts;
                state.activeburstParticles = activeBursts.length;
                
                burstGeo.setDrawRange(0, bIdx);
                burstGeo.attributes.position.needsUpdate = true;
                burstGeo.attributes.customColor.needsUpdate = true;
                burstGeo.attributes.size.needsUpdate = true;
                burstGeo.attributes.life.needsUpdate = true;
            }

            // Update HUD
            hud.innerHTML = `
Mode: ${state.currentModeName} (M)<br>
Theme: ${state.currentThemeName} (C)<br>
Particles: ${state.particleCount} + ${state.activeburstParticles}<br>
Size Mult: ${state.sizeMultiplier.toFixed(2)} (Up/Dn)<br>
Rot Speed: ${state.dragonRotationSpeed.toFixed(1)} (L/R)<br>
FPS: ${fps}<br>
Paused: ${state.isPaused} (Space)<br>
Reset: (R) | Burst: (Click)
            `;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
