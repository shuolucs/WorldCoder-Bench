<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Dragon Particle Art</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      width: 100%;
      height: 100%;
      font-family: monospace;
    }
    canvas {
      display: block;
    }
    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-line;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">Loading...</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const MODE_NAMES = ['ORBIT', 'EXPLODE', 'ATTRACT', 'WAVE'];
    const THEME_NAMES = ['NEON', 'FIRE', 'ICE', 'MONO'];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0x222244, 0.3);
    scene.add(ambient);

    const pointLight = new THREE.PointLight(0xffffff, 1.5);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    const hud = document.getElementById('hud');

    const state = {
      modelLoaded: false,
      particleCount: 2000,
      currentMode: 0,
      currentModeName: MODE_NAMES[0],
      currentTheme: 0,
      currentThemeName: THEME_NAMES[0],
      sizeMultiplier: 1.0,
      dragonRotationSpeed: 0.5,
      isPaused: false,
      burstCount: 0,
      activeburstParticles: 0,
      elapsedTime: 0,
      dragonOpacity: 0.4,
      dragonScale: 1,
      cameraDistance: camera.position.length()
    };
    window.__3D_STATE__ = state;

    let dragonGroup = new THREE.Group();
    scene.add(dragonGroup);

    let dragonSurfaceRadius = 1.5;

    function centerAndScaleModel(root, targetLongestAxis = 3) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const longest = Math.max(size.x, size.y, size.z) || 1;
      const scale = targetLongestAxis / longest;

      root.position.sub(center);
      root.scale.setScalar(scale);
      root.updateMatrixWorld(true);

      const scaledBox = new THREE.Box3().setFromObject(root);
      const scaledSize = new THREE.Vector3();
      scaledBox.getSize(scaledSize);
      dragonSurfaceRadius = Math.max(scaledSize.x, scaledSize.y, scaledSize.z) * 0.5;

      state.dragonScale = scale;
      return scale;
    }

    function applyDragonMaterials(root) {
      root.traverse((child) => {
        if (child.isMesh) {
          const baseMat = new THREE.MeshPhysicalMaterial({
            color: 0x88aaff,
            transparent: true,
            opacity: state.dragonOpacity,
            roughness: 0.5,
            metalness: 0.2,
            side: THREE.DoubleSide
          });
          child.material = baseMat;

          const wire = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.35
          });

          const overlay = new THREE.Mesh(child.geometry, wire);
          overlay.position.copy(child.position);
          overlay.rotation.copy(child.rotation);
          overlay.scale.copy(child.scale);
          child.add(overlay);
        }
      });
    }

    const loader = new GLTFLoader();
    loader.load(
      'DragonAttenuation.glb',
      (gltf) => {
        const model = gltf.scene;
        centerAndScaleModel(model, 3);
        applyDragonMaterials(model);
        dragonGroup.add(model);
        state.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Failed to load DragonAttenuation.glb', err);
      }
    );

    function createCircleTexture() {
      const size = 64;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const grad = ctx.createRadialGradient(
        size / 2, size / 2, 0,
        size / 2, size / 2, size / 2
      );
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(0.2, 'rgba(255,255,255,0.95)');
      grad.addColorStop(0.5, 'rgba(255,255,255,0.35)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      return tex;
    }

    const particleTexture = createCircleTexture();

    const PARTICLE_COUNT = 2000;
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const sizes = new Float32Array(PARTICLE_COUNT);
    const initialPositions = new Float32Array(PARTICLE_COUNT * 3);
    const velocities = new Float32Array(PARTICLE_COUNT * 3);
    const waveX = new Float32Array(PARTICLE_COUNT);

    const tempVec = new THREE.Vector3();
    const tempVec2 = new THREE.Vector3();
    const color = new THREE.Color();

    function randomPointInSphere(radius = 5) {
      let x, y, z;
      do {
        x = (Math.random() * 2 - 1) * radius;
        y = (Math.random() * 2 - 1) * radius;
        z = (Math.random() * 2 - 1) * radius;
      } while (x*x + y*y + z*z > radius*radius);
      return [x, y, z];
    }

    function setThemeColors(theme) {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        let h = 0, s = 0.8, l = 0.6;
        if (theme === 0) {
          h = i / PARTICLE_COUNT;
          s = 0.8; l = 0.6;
          color.setHSL(h, s, l);
        } else if (theme === 1) {
          h = Math.random() * 0.1;
          color.setHSL(h, 0.95, 0.6);
        } else if (theme === 2) {
          h = 0.5 + Math.random() * 0.2;
          color.setHSL(h, 0.85, 0.65);
        } else {
          const b = 0.5 + Math.random() * 0.5;
          color.setRGB(b, b, b);
        }
        colors[i * 3] = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;
      }
      particleGeometry.attributes.color.needsUpdate = true;
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const [x, y, z] = randomPointInSphere(5);
      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;

      initialPositions[i * 3] = x;
      initialPositions[i * 3 + 1] = y;
      initialPositions[i * 3 + 2] = z;

      velocities[i * 3] = 0;
      velocities[i * 3 + 1] = 0;
      velocities[i * 3 + 2] = 0;

      sizes[i] = 0.02 + Math.random() * 0.06;
      waveX[i] = -6 + (12 * i) / (PARTICLE_COUNT - 1);
    }

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    particleGeometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

    const particleMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true,
      uniforms: {
        uTexture: { value: particleTexture },
        uSizeMultiplier: { value: state.sizeMultiplier },
        uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
      },
      vertexShader: `
        attribute float aSize;
        varying vec3 vColor;
        uniform float uSizeMultiplier;
        uniform float uPixelRatio;
        void main() {
          vColor = color;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = aSize * uSizeMultiplier * 900.0 * uPixelRatio / max(1.0, -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        uniform sampler2D uTexture;
        void main() {
          vec4 tex = texture2D(uTexture, gl_PointCoord);
          gl_FragColor = vec4(vColor, 1.0) * tex;
        }
      `
    });

    setThemeColors(0);

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const burstTexture = particleTexture;
    const burstSystems = [];

    function createBurst(position) {
      const count = 50;
      const burstPositions = new Float32Array(count * 3);
      const burstColors = new Float32Array(count * 3);
      const burstSizes = new Float32Array(count);
      const burstVelocities = [];

      for (let i = 0; i < count; i++) {
        burstPositions[i * 3] = position.x;
        burstPositions[i * 3 + 1] = position.y;
        burstPositions[i * 3 + 2] = position.z;

        const dir = new THREE.Vector3(
          Math.random() * 2 - 1,
          Math.random() * 2 - 1,
          Math.random() * 2 - 1
        ).normalize().multiplyScalar(1 + Math.random() * 2);

        burstVelocities.push(dir);

        const c = new THREE.Color().setHSL(Math.random(), 0.9, 0.7);
        burstColors[i * 3] = c.r;
        burstColors[i * 3 + 1] = c.g;
        burstColors[i * 3 + 2] = c.b;

        burstSizes[i] = 0.04 + Math.random() * 0.08;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(burstPositions, 3));
      geo.setAttribute('color', new THREE.BufferAttribute(burstColors, 3));
      geo.setAttribute('aSize', new THREE.BufferAttribute(burstSizes, 1));

      const mat = particleMaterial.clone();
      mat.uniforms = THREE.UniformsUtils.clone(particleMaterial.uniforms);
      mat.transparent = true;
      mat.depthWrite = false;
      mat.blending = THREE.AdditiveBlending;

      const pts = new THREE.Points(geo, mat);
      scene.add(pts);

      burstSystems.push({
        points: pts,
        geometry: geo,
        material: mat,
        velocities: burstVelocities,
        startTime: clock.getElapsedTime(),
        life: 2.0,
        count
      });

      state.burstCount++;
    }

    function resetParticles() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        positions[i * 3] = initialPositions[i * 3];
        positions[i * 3 + 1] = initialPositions[i * 3 + 1];
        positions[i * 3 + 2] = initialPositions[i * 3 + 2];

        velocities[i * 3] = 0;
        velocities[i * 3 + 1] = 0;
        velocities[i * 3 + 2] = 0;
      }
      state.currentMode = 0;
      state.currentTheme = 0;
      state.currentModeName = MODE_NAMES[0];
      state.currentThemeName = THEME_NAMES[0];
      state.sizeMultiplier = 1.0;
      state.dragonRotationSpeed = 0.5;
      particleMaterial.uniforms.uSizeMultiplier.value = state.sizeMultiplier;
      setThemeColors(0);
      particleGeometry.attributes.position.needsUpdate = true;
    }

    function triggerExplode() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        tempVec.set(
          positions[i * 3],
          positions[i * 3 + 1],
          positions[i * 3 + 2]
        );
        if (tempVec.lengthSq() < 0.0001) {
          tempVec.set(
            Math.random() * 2 - 1,
            Math.random() * 2 - 1,
            Math.random() * 2 - 1
          );
        }
        tempVec.normalize().multiplyScalar(2 + Math.random() * 3);
        velocities[i * 3] = tempVec.x;
        velocities[i * 3 + 1] = tempVec.y;
        velocities[i * 3 + 2] = tempVec.z;
      }
    }

    function setMode(nextMode) {
      state.currentMode = nextMode % 4;
      state.currentModeName = MODE_NAMES[state.currentMode];
      if (state.currentMode === 1) triggerExplode();
    }

    function setTheme(nextTheme) {
      state.currentTheme = nextTheme % 4;
      state.currentThemeName = THEME_NAMES[state.currentTheme];
      setThemeColors(state.currentTheme);
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clickPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    const clickPoint = new THREE.Vector3();

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      if (raycaster.ray.intersectPlane(clickPlane, clickPoint)) {
        createBurst(clickPoint.clone());
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyM') {
        setMode((state.currentMode + 1) % 4);
      } else if (e.code === 'KeyC') {
        setTheme((state.currentTheme + 1) % 4);
      } else if (e.code === 'KeyR') {
        resetParticles();
      } else if (e.code === 'Space') {
        e.preventDefault();
        state.isPaused = !state.isPaused;
      } else if (e.code === 'ArrowUp') {
        e.preventDefault();
        state.sizeMultiplier = Math.min(3.0, state.sizeMultiplier + 0.25);
        particleMaterial.uniforms.uSizeMultiplier.value = state.sizeMultiplier;
      } else if (e.code === 'ArrowDown') {
        e.preventDefault();
        state.sizeMultiplier = Math.max(0.5, state.sizeMultiplier - 0.25);
        particleMaterial.uniforms.uSizeMultiplier.value = state.sizeMultiplier;
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        state.dragonRotationSpeed = Math.min(2.0, state.dragonRotationSpeed + 0.1);
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        state.dragonRotationSpeed = Math.max(0.0, state.dragonRotationSpeed - 0.1);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      particleMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
    });

    let fps = 0;
    let fpsAccum = 0;
    let fpsFrames = 0;
    const clock = new THREE.Clock();
    let lastElapsed = 0;

    function updateMainParticles(dt, t) {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const idx = i * 3;
        let x = positions[idx];
        let y = positions[idx + 1];
        let z = positions[idx + 2];

        let vx = velocities[idx];
        let vy = velocities[idx + 1];
        let vz = velocities[idx + 2];

        if (state.currentMode === 0) {
          tempVec.set(x, y, z);
          const r = Math.max(0.001, tempVec.length());

          const swirl = new THREE.Vector3(-z, 0.35 * Math.sin(t + i * 0.01), x)
            .normalize()
            .multiplyScalar(0.7);

          const targetRadius = Math.max(0.8, dragonSurfaceRadius + 0.8);
          const radialPull = tempVec.clone().normalize().multiplyScalar(-(r - targetRadius) * 0.6);

          vx += (swirl.x + radialPull.x) * dt;
          vy += (swirl.y + radialPull.y) * dt;
          vz += (swirl.z + radialPull.z) * dt;

          vx *= 0.985;
          vy *= 0.985;
          vz *= 0.985;

          x += vx * dt;
          y += vy * dt;
          z += vz * dt;
        } else if (state.currentMode === 1) {
          vx *= 0.98;
          vy *= 0.98;
          vz *= 0.98;

          x += vx * dt;
          y += vy * dt;
          z += vz * dt;
        } else if (state.currentMode === 2) {
          tempVec.set(-x, -y, -z);
          const dist = Math.max(0.05, tempVec.length());
          tempVec.normalize().multiplyScalar(3.0);

          vx += tempVec.x * dt;
          vy += tempVec.y * dt;
          vz += tempVec.z * dt;

          const damping = dist < 0.5 ? 0.88 : 0.94;
          vx *= damping;
          vy *= damping;
          vz *= damping;

          x += vx * dt;
          y += vy * dt;
          z += vz * dt;
        } else if (state.currentMode === 3) {
          const tx = waveX[i];
          const ty = 2 * Math.sin(tx * 0.5 + t);
          const tz = 2 * Math.cos(tx * 0.5 + t);

          x += (tx - x) * Math.min(1, dt * 4.0);
          y += (ty - y) * Math.min(1, dt * 4.0);
          z += (tz - z) * Math.min(1, dt * 4.0);

          vx = vy = vz = 0;
        }

        positions[idx] = x;
        positions[idx + 1] = y;
        positions[idx + 2] = z;
        velocities[idx] = vx;
        velocities[idx + 1] = vy;
        velocities[idx + 2] = vz;
      }

      particleGeometry.attributes.position.needsUpdate = true;
    }

    function updateBursts(now, dt) {
      let activeParticles = 0;

      for (let b = burstSystems.length - 1; b >= 0; b--) {
        const burst = burstSystems[b];
        const age = now - burst.startTime;
        const lifeRatio = 1 - age / burst.life;

        if (age >= burst.life) {
          scene.remove(burst.points);
          burst.geometry.dispose();
          burst.material.dispose();
          burstSystems.splice(b, 1);
          continue;
        }

        const arr = burst.geometry.attributes.position.array;
        for (let i = 0; i < burst.count; i++) {
          const v = burst.velocities[i];
          arr[i * 3] += v.x * dt;
          arr[i * 3 + 1] += v.y * dt;
          arr[i * 3 + 2] += v.z * dt;
          v.multiplyScalar(0.96);
        }
        burst.geometry.attributes.position.needsUpdate = true;
        burst.material.opacity = Math.max(0, lifeRatio);
        activeParticles += burst.count;
      }

      state.activeburstParticles = activeParticles;
    }

    function updateHUD() {
      hud.textContent =
`Mode: ${state.currentModeName}
Theme: ${state.currentThemeName}
Particle Count: ${state.particleCount + state.activeburstParticles} (${state.particleCount} + ${state.activeburstParticles})
Size Multiplier: ${state.sizeMultiplier.toFixed(2)}
Dragon Rotation Speed: ${state.dragonRotationSpeed.toFixed(2)}
FPS: ${fps.toFixed(1)}
Paused: ${state.isPaused ? 'YES' : 'NO'}`;
    }

    function updateState() {
      state.currentModeName = MODE_NAMES[state.currentMode];
      state.currentThemeName = THEME_NAMES[state.currentTheme];
      state.cameraDistance = camera.position.length();
      window.__3D_STATE__ = state;
    }

    function animate() {
      requestAnimationFrame(animate);

      const rawElapsed = clock.getElapsedTime();
      let dt = rawElapsed - lastElapsed;
      lastElapsed = rawElapsed;
      dt = Math.min(dt, 0.05);

      fpsAccum += dt;
      fpsFrames++;
      if (fpsAccum >= 0.5) {
        fps = fpsFrames / fpsAccum;
        fpsAccum = 0;
        fpsFrames = 0;
      }

      if (!state.isPaused) {
        state.elapsedTime += dt;
        updateMainParticles(dt, state.elapsedTime);

        dragonGroup.rotation.y += state.dragonRotationSpeed * dt;

        updateBursts(rawElapsed, dt);
      }

      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    resetParticles();
    animate();
  </script>
</body>
</html>
