<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Tectonic Plate Movement Visualization</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    #uiPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px 14px;
      background: rgba(20, 20, 30, 0.75);
      color: white;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
    }

    button, select {
      background: #2d3250;
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover, select:hover {
      background: #3a4064;
    }

    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="uiPanel">
    <button id="btnPlayPause">Play</button>
    <label for="selectSpeed" class="label">Speed</label>
    <select id="selectSpeed">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="2">2x</option>
      <option value="4">4x</option>
    </select>
    <button id="btnReset">Reset</button>
    <div id="timeDisplay">Time: 0.0 MY</div>
    <div id="statusDisplay">Paused</div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 40, 60);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 30, 10);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(120, 120),
      new THREE.MeshPhongMaterial({ color: 0x223344, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.55;
    scene.add(ground);

    const initialPositions = {
      plateA: new THREE.Vector3(-12, 0, -8),
      plateB: new THREE.Vector3(12, 0, -8),
      plateC: new THREE.Vector3(-12, 0, 10),
      plateD: new THREE.Vector3(12, 0, 10),
    };

    const movementPerMY = {
      plateA: new THREE.Vector3(0.15, 0, 0.05),
      plateB: new THREE.Vector3(-0.1, 0, 0.08),
      plateC: new THREE.Vector3(0.1, 0, -0.12),
      plateD: new THREE.Vector3(-0.12, 0, -0.06),
    };

    function createPlate(name, width, height, depth, color, position, markerColor) {
      const group = new THREE.Group();
      group.name = name;

      const geom = new THREE.BoxGeometry(width, height, depth);
      const mat = new THREE.MeshPhongMaterial({ color });
      const plateMesh = new THREE.Mesh(geom, mat);
      group.add(plateMesh);

      const edges = new THREE.EdgesGeometry(geom);
      const wire = new THREE.LineSegments(
        edges,
        new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 })
      );
      group.add(wire);

      const marker = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 16, 16),
        new THREE.MeshPhongMaterial({ color: markerColor })
      );
      marker.position.set(0, 1.1, 0);
      group.add(marker);

      group.position.copy(position);
      scene.add(group);

      return group;
    }

    const plateA = createPlate("plateA", 20, 1, 15, "#8B4513", initialPositions.plateA, "red");
    const plateB = createPlate("plateB", 18, 1, 15, "#A0522D", initialPositions.plateB, "blue");
    const plateC = createPlate("plateC", 20, 1, 12, "#6B3A2A", initialPositions.plateC, "green");
    const plateD = createPlate("plateD", 18, 1, 12, "#CD853F", initialPositions.plateD, "yellow");

    const loader = new GLTFLoader();
    let soldierModel = null;

    loader.load(
      "soldier.glb",
      (gltf) => {
        soldierModel = gltf.scene;
        soldierModel.name = "soldierModel";
        soldierModel.scale.set(2, 2, 2);
        soldierModel.position.set(0, 1, 0);
        plateA.add(soldierModel);
        state.soldierLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load soldier.glb", err);
      }
    );

    const btnPlayPause = document.getElementById("btnPlayPause");
    const btnReset = document.getElementById("btnReset");
    const selectSpeed = document.getElementById("selectSpeed");
    const timeDisplay = document.getElementById("timeDisplay");
    const statusDisplay = document.getElementById("statusDisplay");

    const state = {
      simulationTime: 0,
      isPlaying: false,
      speed: 1.0,
      plateAPos: { x: initialPositions.plateA.x, y: initialPositions.plateA.y, z: initialPositions.plateA.z },
      plateBPos: { x: initialPositions.plateB.x, y: initialPositions.plateB.y, z: initialPositions.plateB.z },
      plateCPos: { x: initialPositions.plateC.x, y: initialPositions.plateC.y, z: initialPositions.plateC.z },
      plateDPos: { x: initialPositions.plateD.x, y: initialPositions.plateD.y, z: initialPositions.plateD.z },
      convergentActive: false,
      soldierLoaded: false,
      soldierPos: { x: -12, y: 1, z: -8 },
      plateCount: 4
    };

    window.__3D_STATE__ = state;

    function updateUI() {
      timeDisplay.textContent = `Time: ${state.simulationTime.toFixed(1)} MY`;
      statusDisplay.textContent = state.isPlaying ? "Running" : "Paused";
      btnPlayPause.textContent = state.isPlaying ? "Pause" : "Play";
    }

    function resetSimulation() {
      state.simulationTime = 0;
      state.isPlaying = false;
      state.speed = parseFloat(selectSpeed.value);
      state.convergentActive = false;

      plateA.position.copy(initialPositions.plateA);
      plateB.position.copy(initialPositions.plateB);
      plateC.position.copy(initialPositions.plateC);
      plateD.position.copy(initialPositions.plateD);

      if (soldierModel) {
        soldierModel.position.set(0, 1, 0);
      }

      updateUI();
      updateState();
    }

    btnPlayPause.addEventListener("click", () => {
      state.isPlaying = !state.isPlaying;
      updateUI();
    });

    btnReset.addEventListener("click", resetSimulation);

    selectSpeed.addEventListener("change", () => {
      state.speed = parseFloat(selectSpeed.value);
    });

    function updateState() {
      state.plateAPos = {
        x: plateA.position.x,
        y: plateA.position.y,
        z: plateA.position.z
      };
      state.plateBPos = {
        x: plateB.position.x,
        y: plateB.position.y,
        z: plateB.position.z
      };
      state.plateCPos = {
        x: plateC.position.x,
        y: plateC.position.y,
        z: plateC.position.z
      };
      state.plateDPos = {
        x: plateD.position.x,
        y: plateD.position.y,
        z: plateD.position.z
      };

      if (soldierModel) {
        const worldPos = new THREE.Vector3();
        soldierModel.getWorldPosition(worldPos);
        state.soldierPos = {
          x: worldPos.x,
          y: worldPos.y,
          z: worldPos.z
        };
      } else {
        state.soldierPos = {
          x: plateA.position.x,
          y: plateA.position.y + 1,
          z: plateA.position.z
        };
      }

      window.__3D_STATE__ = state;
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const deltaSeconds = clock.getDelta();

      if (state.isPlaying) {
        const myDelta = (deltaSeconds / 2) * state.speed;
        state.simulationTime += myDelta;

        const xDistanceAB = Math.abs(plateA.position.x - plateB.position.x);

        if (!state.convergentActive && xDistanceAB <= 2.0) {
          state.convergentActive = true;
        }

        if (!state.convergentActive) {
          plateA.position.addScaledVector(movementPerMY.plateA, myDelta);
          plateB.position.addScaledVector(movementPerMY.plateB, myDelta);
        } else {
          plateA.position.z += movementPerMY.plateA.z * myDelta;
          plateB.position.z += movementPerMY.plateB.z * myDelta;
          plateA.position.y += 0.05 * myDelta;
        }

        plateC.position.addScaledVector(movementPerMY.plateC, myDelta);
        plateD.position.addScaledVector(movementPerMY.plateD, myDelta);
      }

      controls.update();
      updateUI();
      updateState();
      renderer.render(scene, camera);
    }

    updateUI();
    updateState();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
