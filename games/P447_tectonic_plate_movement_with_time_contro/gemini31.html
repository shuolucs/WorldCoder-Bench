<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tectonic Plate Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(26, 26, 46, 0.85);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        button, select {
            background-color: #4a4e69;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        button:hover, select:hover {
            background-color: #9a8c98;
        }
        .display-text {
            font-size: 16px;
            font-weight: bold;
            min-width: 120px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel">
        <button id="btnPlayPause">Play</button>
        <select id="selectSpeed">
            <option value="0.5">0.5x Speed</option>
            <option value="1" selected>1x Speed</option>
            <option value="2">2x Speed</option>
            <option value="4">4x Speed</option>
        </select>
        <button id="btnReset">Reset</button>
        <span id="timeDisplay" class="display-text">Time: 0.0 MY</span>
        <span id="statusDisplay" class="display-text" style="color: #ff9f1c;">Paused</span>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            simulationTime: 0,
            isPlaying: false,
            speed: 1.0,
            plateAPos: { x: -12, y: 0, z: -8 },
            plateBPos: { x: 12, y: 0, z: -8 },
            plateCPos: { x: -12, y: 0, z: 10 },
            plateDPos: { x: 12, y: 0, z: 10 },
            convergentActive: false,
            soldierLoaded: false,
            soldierPos: { x: -12, y: 1, z: -8 },
            plateCount: 4
        };

        const initialPositions = {
            A: { x: -12, y: 0, z: -8 },
            B: { x: 12, y: 0, z: -8 },
            C: { x: -12, y: 0, z: 10 },
            D: { x: 12, y: 0, z: 10 }
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 60);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 30, 10);
        scene.add(dirLight);

        // Helper function to create plates
        function createPlate(name, width, depth, color, initPos, markerColor) {
            const group = new THREE.Group();
            group.name = name;
            group.position.set(initPos.x, initPos.y, initPos.z);

            // Main Box
            const geometry = new THREE.BoxGeometry(width, 1, depth);
            const material = new THREE.MeshStandardMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            group.add(mesh);

            // Wireframe
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 }));
            group.add(line);

            // Marker
            const markerGeo = new THREE.SphereGeometry(0.5, 16, 16);
            const markerMat = new THREE.MeshBasicMaterial({ color: markerColor });
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.set(0, 0.5, 0); // Top center
            group.add(marker);

            scene.add(group);
            return group;
        }

        // Create Plates
        const plateA = createPlate('plateA', 20, 15, 0x8B4513, initialPositions.A, 0xff0000);
        const plateB = createPlate('plateB', 18, 15, 0xA0522D, initialPositions.B, 0x0000ff);
        const plateC = createPlate('plateC', 20, 12, 0x6B3A2A, initialPositions.C, 0x00ff00);
        const plateD = createPlate('plateD', 18, 12, 0xCD853F, initialPositions.D, 0xffff00);

        // Load Soldier Model
        let soldierModel = null;
        const loader = new GLTFLoader();
        // Using a reliable public URL for the standard Three.js soldier model to ensure it runs
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb', (gltf) => {
            soldierModel = gltf.scene;
            soldierModel.name = 'soldierModel';
            soldierModel.scale.set(2, 2, 2);
            
            // Parent to Plate A. Local Y=1 puts it on top of the plate (plate height is 1, centered at 0, so top is 0.5. Soldier origin is at feet).
            soldierModel.position.set(0, 0.5, 0); 
            plateA.add(soldierModel);
            
            window.__3D_STATE__.soldierLoaded = true;
        }, undefined, (error) => {
            console.error('Error loading soldier model:', error);
        });

        // UI Elements
        const btnPlayPause = document.getElementById('btnPlayPause');
        const selectSpeed = document.getElementById('selectSpeed');
        const btnReset = document.getElementById('btnReset');
        const timeDisplay = document.getElementById('timeDisplay');
        const statusDisplay = document.getElementById('statusDisplay');

        // UI Event Listeners
        btnPlayPause.addEventListener('click', () => {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            if (window.__3D_STATE__.isPlaying) {
                btnPlayPause.textContent = 'Pause';
                statusDisplay.textContent = 'Running';
                statusDisplay.style.color = '#2ec4b6';
            } else {
                btnPlayPause.textContent = 'Play';
                statusDisplay.textContent = 'Paused';
                statusDisplay.style.color = '#ff9f1c';
            }
        });

        selectSpeed.addEventListener('change', (e) => {
            window.__3D_STATE__.speed = parseFloat(e.target.value);
        });

        btnReset.addEventListener('click', () => {
            window.__3D_STATE__.isPlaying = false;
            window.__3D_STATE__.simulationTime = 0;
            window.__3D_STATE__.convergentActive = false;
            
            btnPlayPause.textContent = 'Play';
            statusDisplay.textContent = 'Paused';
            statusDisplay.style.color = '#ff9f1c';
            timeDisplay.textContent = 'Time: 0.0 MY';

            plateA.position.set(initialPositions.A.x, initialPositions.A.y, initialPositions.A.z);
            plateB.position.set(initialPositions.B.x, initialPositions.B.y, initialPositions.B.z);
            plateC.position.set(initialPositions.C.x, initialPositions.C.y, initialPositions.C.z);
            plateD.position.set(initialPositions.D.x, initialPositions.D.y, initialPositions.D.z);
        });

        // Animation Loop
        const clock = new THREE.Clock();
        const soldierWorldPos = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            const deltaRealTime = clock.getDelta();

            if (window.__3D_STATE__.isPlaying) {
                // 1 MY = 2 seconds real time at 1x speed
                const deltaMY = (deltaRealTime / 2) * window.__3D_STATE__.speed;
                window.__3D_STATE__.simulationTime += deltaMY;

                // Check Convergent Boundary (A & B)
                const distAB = Math.abs(plateA.position.x - plateB.position.x);
                if (distAB <= 2.0) {
                    window.__3D_STATE__.convergentActive = true;
                }

                // Plate Movement Logic
                if (!window.__3D_STATE__.convergentActive) {
                    plateA.position.x += 0.15 * deltaMY;
                    plateB.position.x -= 0.10 * deltaMY;
                } else {
                    // Mountain building
                    plateA.position.y += 0.05 * deltaMY;
                }

                plateA.position.z += 0.05 * deltaMY;
                plateB.position.z += 0.08 * deltaMY;

                plateC.position.x += 0.10 * deltaMY;
                plateC.position.z -= 0.12 * deltaMY;

                plateD.position.x -= 0.12 * deltaMY;
                plateD.position.z -= 0.06 * deltaMY;

                // Update UI Time
                timeDisplay.textContent = `Time: ${window.__3D_STATE__.simulationTime.toFixed(1)} MY`;
            }

            // Update State Object
            window.__3D_STATE__.plateAPos = { x: plateA.position.x, y: plateA.position.y, z: plateA.position.z };
            window.__3D_STATE__.plateBPos = { x: plateB.position.x, y: plateB.position.y, z: plateB.position.z };
            window.__3D_STATE__.plateCPos = { x: plateC.position.x, y: plateC.position.y, z: plateC.position.z };
            window.__3D_STATE__.plateDPos = { x: plateD.position.x, y: plateD.position.y, z: plateD.position.z };

            if (soldierModel) {
                soldierModel.getWorldPosition(soldierWorldPos);
                window.__3D_STATE__.soldierPos = { x: soldierWorldPos.x, y: soldierWorldPos.y, z: soldierWorldPos.z };
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
