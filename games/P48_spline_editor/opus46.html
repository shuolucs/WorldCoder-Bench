<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spline Curve Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #ui-panel {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(15, 15, 35, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(100, 140, 255, 0.25);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0f0;
    width: 280px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    z-index: 100;
  }

  #ui-panel h2 {
    font-size: 16px;
    margin-bottom: 16px;
    color: #88aaff;
    border-bottom: 1px solid rgba(100, 140, 255, 0.2);
    padding-bottom: 10px;
    letter-spacing: 1px;
  }

  .control-group {
    margin-bottom: 14px;
  }

  .control-group label {
    display: block;
    font-size: 12px;
    color: #99aabb;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .control-group input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(100, 140, 255, 0.2);
    border-radius: 3px;
    outline: none;
  }

  .control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #4488ff;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(68, 136, 255, 0.5);
  }

  .control-group select {
    width: 100%;
    padding: 6px 10px;
    background: rgba(30, 30, 60, 0.9);
    color: #e0e0f0;
    border: 1px solid rgba(100, 140, 255, 0.3);
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  .control-group select:focus {
    border-color: #4488ff;
  }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .btn {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid rgba(100, 140, 255, 0.3);
    border-radius: 6px;
    background: rgba(30, 30, 60, 0.8);
    color: #c0d0ff;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .btn:hover {
    background: rgba(68, 136, 255, 0.3);
    border-color: #4488ff;
    color: #fff;
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn.export {
    background: rgba(68, 136, 255, 0.2);
    border-color: rgba(68, 136, 255, 0.5);
  }

  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .checkbox-group input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: #4488ff;
    cursor: pointer;
  }

  .checkbox-group label {
    font-size: 13px;
    color: #c0d0e0;
    cursor: pointer;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-top: 1px solid rgba(100, 140, 255, 0.1);
    font-size: 12px;
  }

  .info-row .label {
    color: #8899aa;
  }

  .info-row .value {
    color: #88ccff;
    font-weight: 600;
    font-family: 'Courier New', monospace;
  }

  .range-value {
    float: right;
    font-size: 12px;
    color: #88ccff;
    font-family: 'Courier New', monospace;
  }

  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(68, 136, 255, 0.9);
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    transition: transform 0.3s ease;
    z-index: 200;
    pointer-events: none;
  }

  #toast.show {
    transform: translateX(-50%) translateY(0);
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="ui-panel">
  <h2>🎨 Spline Curve Editor</h2>

  <div class="control-group">
    <label>Tube Radius <span class="range-value" id="radiusValue">0.20</span></label>
    <input type="range" id="tubeRadius" min="0.05" max="1.0" step="0.05" value="0.2">
  </div>

  <div class="control-group">
    <label>Curve Type</label>
    <select id="curveType">
      <option value="catmullrom">CatmullRom</option>
      <option value="bezier">Cubic Bezier</option>
    </select>
  </div>

  <div class="checkbox-group">
    <input type="checkbox" id="showPolygon" checked>
    <label for="showPolygon">Show Control Polygon</label>
  </div>

  <div class="btn-row">
    <button class="btn" id="addPoint">+ Add Point</button>
    <button class="btn" id="removePoint">− Remove</button>
  </div>

  <button class="btn export" id="exportBtn" style="width:100%; margin-bottom: 14px;">📋 Export Points to Clipboard</button>

  <div class="info-row">
    <span class="label">Points</span>
    <span class="value" id="pointCountDisplay">6</span>
  </div>
  <div class="info-row">
    <span class="label">Curve Length</span>
    <span class="value" id="curveLength">0.00</span>
  </div>
</div>

<div id="toast">Copied to clipboard!</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(8, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x002244, 0.3);
scene.add(hemiLight);

// Grid
const gridHelper = new THREE.GridHelper(10, 10, 0x334466, 0x222244);
scene.add(gridHelper);

// OrbitControls
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.08;

// TransformControls
const transformControls = new TransformControls(camera, renderer.domElement);
transformControls.setSize(0.7);
scene.add(transformControls);

transformControls.addEventListener('dragging-changed', (event) => {
  orbitControls.enabled = !event.value;
});

transformControls.addEventListener('change', () => {
  updateCurve();
});

// Control points
const controlPointPositions = [
  new THREE.Vector3(-5, 0, 0),
  new THREE.Vector3(-3, 3, 2),
  new THREE.Vector3(-1, -2, -1),
  new THREE.Vector3(1, 4, 1),
  new THREE.Vector3(3, -1, -2),
  new THREE.Vector3(5, 2, 0),
];

const sphereGeometry = new THREE.SphereGeometry(0.3, 16, 16);
const sphereMaterial = new THREE.MeshStandardMaterial({
  color: 0xff3344,
  metalness: 0.4,
  roughness: 0.3,
  emissive: 0x441111,
  emissiveIntensity: 0.3,
});

const controlPointMeshes = [];

function createControlPointMesh(position) {
  const mesh = new THREE.Mesh(sphereGeometry, sphereMaterial.clone());
  mesh.position.copy(position);
  mesh.userData.isControlPoint = true;
  scene.add(mesh);
  controlPointMeshes.push(mesh);
  return mesh;
}

controlPointPositions.forEach(pos => createControlPointMesh(pos));

// Tube mesh
const tubeMaterial = new THREE.MeshStandardMaterial({
  color: 0x4488ff,
  metalness: 0.3,
  roughness: 0.5,
  side: THREE.DoubleSide,
});

let tubeMesh = null;

// Control polygon line
const polygonMaterial = new THREE.LineBasicMaterial({ color: 0xffaa33, linewidth: 1, transparent: true, opacity: 0.7 });
let polygonLine = null;

// State
let currentCurveType = 'catmullrom';
let currentTubeRadius = 0.2;
let currentShowPolygon = true;
let currentCurve = null;

function buildCurve() {
  const points = controlPointMeshes.map(m => m.position.clone());

  if (points.length < 2) return null;

  if (currentCurveType === 'catmullrom') {
    return new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.5);
  } else {
    // Bezier: groups of 4 points (3n+1 pattern)
    // First point + groups of 3
    const curves = [];
    let i = 0;
    while (i + 3 < points.length) {
      curves.push(new THREE.CubicBezierCurve3(
        points[i], points[i + 1], points[i + 2], points[i + 3]
      ));
      i += 3;
    }

    if (curves.length === 0) {
      // Not enough points for bezier, fall back to a simple line
      if (points.length >= 2) {
        return new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.5);
      }
      return null;
    }

    // Combine bezier curves into one CurvePath
    const curvePath = new THREE.CurvePath();
    curves.forEach(c => curvePath.add(c));
    return curvePath;
  }
}

function updateCurve() {
  currentCurve = buildCurve();

  // Remove old tube
  if (tubeMesh) {
    scene.remove(tubeMesh);
    tubeMesh.geometry.dispose();
    tubeMesh = null;
  }

  // Remove old polygon line
  if (polygonLine) {
    scene.remove(polygonLine);
    polygonLine.geometry.dispose();
    polygonLine = null;
  }

  if (currentCurve) {
    // Create tube
    const tubeGeometry = new THREE.TubeGeometry(currentCurve, 200, currentTubeRadius, 12, false);
    tubeMesh = new THREE.Mesh(tubeGeometry, tubeMaterial);
    scene.add(tubeMesh);
  }

  // Control polygon
  if (currentShowPolygon && controlPointMeshes.length >= 2) {
    const polyPoints = controlPointMeshes.map(m => m.position.clone());
    const polyGeometry = new THREE.BufferGeometry().setFromPoints(polyPoints);
    polygonLine = new THREE.Line(polyGeometry, polygonMaterial);
    scene.add(polygonLine);
  }

  // Update UI
  const lengthEl = document.getElementById('curveLength');
  let curveLen = 0;
  if (currentCurve) {
    curveLen = currentCurve.getLength ? currentCurve.getLength() : (currentCurve.getLength ? currentCurve.getLength() : 0);
  }
  lengthEl.textContent = curveLen.toFixed(2);

  document.getElementById('pointCountDisplay').textContent = controlPointMeshes.length;

  // Update state
  updateState(curveLen);
}

function updateState(curveLen) {
  if (curveLen === undefined) {
    curveLen = currentCurve ? (currentCurve.getLength ? currentCurve.getLength() : 0) : 0;
  }
  window.__3D_STATE__ = {
    pointCount: controlPointMeshes.length,
    points: controlPointMeshes.map(m => ({
      x: parseFloat(m.position.x.toFixed(2)),
      y: parseFloat(m.position.y.toFixed(2)),
      z: parseFloat(m.position.z.toFixed(2)),
    })),
    curveType: currentCurveType,
    tubeRadius: currentTubeRadius,
    curveLength: parseFloat(curveLen.toFixed(2)),
    showPolygon: currentShowPolygon,
  };
}

// Raycaster for picking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedMesh = null;

renderer.domElement.addEventListener('pointerdown', (event) => {
  // Ignore if transform controls are being used
  if (transformControls.dragging) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(controlPointMeshes);

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData.isControlPoint) {
      if (selectedMesh) {
        selectedMesh.material.emissiveIntensity = 0.3;
      }
      selectedMesh = obj;
      selectedMesh.material.emissiveIntensity = 0.8;
      transformControls.attach(obj);
    }
  }
});

// UI event handlers
document.getElementById('tubeRadius').addEventListener('input', (e) => {
  currentTubeRadius = parseFloat(e.target.value);
  document.getElementById('radiusValue').textContent = currentTubeRadius.toFixed(2);
  updateCurve();
});

document.getElementById('curveType').addEventListener('change', (e) => {
  currentCurveType = e.target.value;
  updateCurve();
});

document.getElementById('showPolygon').addEventListener('change', (e) => {
  currentShowPolygon = e.target.checked;
  updateCurve();
});

document.getElementById('addPoint').addEventListener('click', () => {
  if (!currentCurve) return;

  let midPoint;
  if (currentCurve.getPointAt) {
    midPoint = currentCurve.getPointAt(0.5);
  } else if (currentCurve.getPoint) {
    midPoint = currentCurve.getPoint(0.5);
  } else {
    return;
  }

  // Add slight offset so it's visible
  midPoint.y += 0.1;

  // Insert at middle index
  const midIndex = Math.floor(controlPointMeshes.length / 2);
  const mesh = new THREE.Mesh(sphereGeometry, sphereMaterial.clone());
  mesh.position.copy(midPoint);
  mesh.userData.isControlPoint = true;
  scene.add(mesh);
  controlPointMeshes.splice(midIndex, 0, mesh);

  updateCurve();
});

document.getElementById('removePoint').addEventListener('click', () => {
  if (controlPointMeshes.length <= 2) return;

  const mesh = controlPointMeshes.pop();

  // If this mesh is currently selected, detach transform controls
  if (selectedMesh === mesh) {
    transformControls.detach();
    selectedMesh = null;
  }

  scene.remove(mesh);
  mesh.geometry.dispose && mesh.geometry.dispose();
  mesh.material.dispose && mesh.material.dispose();

  updateCurve();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const points = controlPointMeshes.map(m => ({
    x: parseFloat(m.position.x.toFixed(2)),
    y: parseFloat(m.position.y.toFixed(2)),
    z: parseFloat(m.position.z.toFixed(2)),
  }));

  const json = JSON.stringify(points, null, 2);

  navigator.clipboard.writeText(json).then(() => {
    showToast('Copied to clipboard!');
  }).catch(() => {
    showToast('Copy failed - check permissions');
  });
});

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial build
updateCurve();

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  orbitControls.update();

  // Pulse effect on control points
  const time = Date.now() * 0.003;
  controlPointMeshes.forEach((mesh, i) => {
    const scale = 1.0 + 0.1 * Math.sin(time + i * 0.8);
    mesh.scale.setScalar(scale);
  });

  // Update state every frame
  updateState();

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
