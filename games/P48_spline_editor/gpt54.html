<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 交互式样条曲线编辑器</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: #eee;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: 320px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(20, 20, 28, 0.88);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
    }

    #ui h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 9px 0;
      flex-wrap: wrap;
    }

    .row label {
      min-width: 92px;
      font-size: 14px;
      color: #ddd;
    }

    input[type="range"] {
      flex: 1;
    }

    select, button, input[type="checkbox"] {
      cursor: pointer;
    }

    select, button {
      background: #262b3a;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 7px 10px;
    }

    button:hover, select:hover {
      background: #30384c;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .value {
      min-width: 48px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #8fd3ff;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.5;
      color: #b9c0d0;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>样条曲线编辑器</h2>

      <div class="row">
        <label for="curveType">曲线类型</label>
        <select id="curveType">
          <option value="catmullrom" selected>CatmullRomCurve3</option>
          <option value="bezier">Bezier（分段三次）</option>
        </select>
      </div>

      <div class="row">
        <label for="tubeRadius">管道半径</label>
        <input id="tubeRadius" type="range" min="0.05" max="1.0" step="0.05" value="0.2" />
        <span id="tubeRadiusValue" class="value">0.20</span>
      </div>

      <div class="row">
        <label for="showPolygon">控制多边形</label>
        <input id="showPolygon" type="checkbox" checked />
      </div>

      <div class="row">
        <label>曲线长度</label>
        <span id="curveLength" class="value">0.00</span>
      </div>

      <div class="row">
        <button id="addPoint">添加控制点</button>
        <button id="removePoint">删除最后一点</button>
        <button id="exportBtn">导出 JSON</button>
      </div>

      <div class="hint">
        点击红色控制点后可使用 TransformControls 拖拽。<br />
        拖拽期间会自动禁用 OrbitControls，释放后恢复。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    const container = document.getElementById('app');

    const ui = {
      tubeRadius: document.getElementById('tubeRadius'),
      tubeRadiusValue: document.getElementById('tubeRadiusValue'),
      addPoint: document.getElementById('addPoint'),
      removePoint: document.getElementById('removePoint'),
      curveType: document.getElementById('curveType'),
      showPolygon: document.getElementById('showPolygon'),
      curveLength: document.getElementById('curveLength'),
      exportBtn: document.getElementById('exportBtn'),
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(8, 8, 14);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const orbit = new OrbitControls(camera, renderer.domElement);
    orbit.enableDamping = true;
    orbit.dampingFactor = 0.08;

    const transform = new TransformControls(camera, renderer.domElement);
    transform.setMode('translate');
    scene.add(transform);

    transform.addEventListener('dragging-changed', (event) => {
      orbit.enabled = !event.value;
    });

    transform.addEventListener('objectChange', () => {
      rebuildFromControlPoints();
    });

    scene.add(new THREE.GridHelper(10, 10, 0x666666, 0x333333));

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const pointGroup = new THREE.Group();
    scene.add(pointGroup);

    const curveGroup = new THREE.Group();
    scene.add(curveGroup);

    const pointMaterial = new THREE.MeshStandardMaterial({ color: 0xff3333 });
    const pointGeometry = new THREE.SphereGeometry(0.3, 24, 16);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    let controlPointMeshes = [];
    let currentCurve = null;
    let tubeMesh = null;
    let curveLine = null;
    let polygonLine = null;

    const state = {
      curveType: 'catmullrom',
      tubeRadius: 0.2,
      showPolygon: true,
    };

    const initialPoints = [
      new THREE.Vector3(-5, 0, 0),
      new THREE.Vector3(-3, 3, 2),
      new THREE.Vector3(-1, -2, -1),
      new THREE.Vector3(1, 4, 1),
      new THREE.Vector3(3, -1, -2),
      new THREE.Vector3(5, 2, 0),
    ];

    function createControlPoint(position) {
      const mesh = new THREE.Mesh(pointGeometry, pointMaterial.clone());
      mesh.position.copy(position);
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      mesh.userData.isControlPoint = true;
      pointGroup.add(mesh);
      controlPointMeshes.push(mesh);
      return mesh;
    }

    function getControlPoints() {
      return controlPointMeshes.map(mesh => mesh.position.clone());
    }

    function clearCurveObjects() {
      if (tubeMesh) {
        tubeMesh.geometry.dispose();
        tubeMesh.material.dispose();
        curveGroup.remove(tubeMesh);
        tubeMesh = null;
      }

      if (curveLine) {
        curveLine.geometry.dispose();
        curveLine.material.dispose();
        curveGroup.remove(curveLine);
        curveLine = null;
      }

      if (polygonLine) {
        polygonLine.geometry.dispose();
        polygonLine.material.dispose();
        curveGroup.remove(polygonLine);
        polygonLine = null;
      }
    }

    function buildBezierCompositeCurve(points) {
      const validSegmentPointCount = Math.floor((points.length - 1) / 3) * 3 + 1;

      if (validSegmentPointCount < 4) {
        return null;
      }

      const curves = [];
      for (let i = 0; i + 3 < validSegmentPointCount; i += 3) {
        curves.push(
          new THREE.CubicBezierCurve3(
            points[i].clone(),
            points[i + 1].clone(),
            points[i + 2].clone(),
            points[i + 3].clone()
          )
        );
      }

      return new THREE.CurvePath().add(...curves);
    }

    function buildCurve(points) {
      if (points.length < 2) return null;

      if (state.curveType === 'bezier') {
        const bezierPath = buildBezierCompositeCurve(points);
        if (bezierPath) return bezierPath;
        return new THREE.LineCurve3(points[0].clone(), points[points.length - 1].clone());
      }

      return new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.5);
    }

    function createCurveLine(curve) {
      const sampled = curve.getPoints(300);
      const geometry = new THREE.BufferGeometry().setFromPoints(sampled);
      const material = new THREE.LineBasicMaterial({ color: 0xffff66 });
      return new THREE.Line(geometry, material);
    }

    function createPolygonLine(points) {
      if (points.length < 2) return null;
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0x66ffcc,
        transparent: true,
        opacity: 0.9,
      });
      return new THREE.LineLoop(geometry, material);
    }

    function createTubeMesh(curve) {
      const geometry = new THREE.TubeGeometry(
        curve,
        200,
        state.tubeRadius,
        12,
        false
      );

      const material = new THREE.MeshStandardMaterial({
        color: 0x4488ff,
        metalness: 0.3,
        roughness: 0.5,
      });

      return new THREE.Mesh(geometry, material);
    }

    function updateRemoveButtonState() {
      ui.removePoint.disabled = controlPointMeshes.length <= 2;
    }

    function rebuildFromControlPoints() {
      const points = getControlPoints();
      currentCurve = buildCurve(points);

      clearCurveObjects();

      if (!currentCurve) {
        ui.curveLength.textContent = '0.00';
        update3DState();
        return;
      }

      curveLine = createCurveLine(currentCurve);
      curveGroup.add(curveLine);

      tubeMesh = createTubeMesh(currentCurve);
      curveGroup.add(tubeMesh);

      polygonLine = createPolygonLine(points);
      if (polygonLine) {
        polygonLine.visible = state.showPolygon;
        curveGroup.add(polygonLine);
      }

      const length = currentCurve.getLength();
      ui.curveLength.textContent = length.toFixed(2);

      updateRemoveButtonState();
      update3DState();
    }

    function update3DState() {
      const points = controlPointMeshes.map(mesh => ({
        x: Number(mesh.position.x.toFixed(2)),
        y: Number(mesh.position.y.toFixed(2)),
        z: Number(mesh.position.z.toFixed(2)),
      }));

      window.__3D_STATE__ = {
        pointCount: points.length,
        points,
        curveType: state.curveType,
        tubeRadius: state.tubeRadius,
        curveLength: currentCurve ? Number(currentCurve.getLength().toFixed(2)) : 0,
        showPolygon: state.showPolygon,
      };
    }

    function setPointerFromEvent(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function selectControlPointFromEvent(event) {
      if (transform.dragging) return;
      setPointerFromEvent(event);
      raycaster.setFromCamera(pointer, camera);

      const intersects = raycaster.intersectObjects(controlPointMeshes, false);
      if (intersects.length > 0) {
        transform.attach(intersects[0].object);
      }
    }

    renderer.domElement.addEventListener('pointerdown', selectControlPointFromEvent);

    ui.tubeRadius.addEventListener('input', () => {
      state.tubeRadius = parseFloat(ui.tubeRadius.value);
      ui.tubeRadiusValue.textContent = state.tubeRadius.toFixed(2);
      rebuildFromControlPoints();
    });

    ui.curveType.addEventListener('change', () => {
      state.curveType = ui.curveType.value;
      rebuildFromControlPoints();
    });

    ui.showPolygon.addEventListener('change', () => {
      state.showPolygon = ui.showPolygon.checked;
      if (polygonLine) polygonLine.visible = state.showPolygon;
      update3DState();
    });

    ui.addPoint.addEventListener('click', () => {
      const points = getControlPoints();
      const curve = buildCurve(points);
      const newPos = curve ? curve.getPointAt(0.5) : new THREE.Vector3();
      const mesh = createControlPoint(newPos);
      transform.attach(mesh);
      rebuildFromControlPoints();
    });

    ui.removePoint.addEventListener('click', () => {
      if (controlPointMeshes.length <= 2) return;

      const last = controlPointMeshes.pop();
      if (transform.object === last) {
        transform.detach();
      }

      pointGroup.remove(last);
      last.geometry.dispose();
      last.material.dispose();

      rebuildFromControlPoints();
    });

    ui.exportBtn.addEventListener('click', async () => {
      const data = controlPointMeshes.map(mesh => ({
        x: Number(mesh.position.x.toFixed(2)),
        y: Number(mesh.position.y.toFixed(2)),
        z: Number(mesh.position.z.toFixed(2)),
      }));

      const json = JSON.stringify(data, null, 2);

      try {
        await navigator.clipboard.writeText(json);
        ui.exportBtn.textContent = '已复制';
        setTimeout(() => {
          ui.exportBtn.textContent = '导出 JSON';
        }, 1200);
      } catch (e) {
        console.warn('复制到剪贴板失败，下面是 JSON：\n', json);
        ui.exportBtn.textContent = '复制失败';
        setTimeout(() => {
          ui.exportBtn.textContent = '导出 JSON';
        }, 1200);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    initialPoints.forEach(p => createControlPoint(p));
    updateRemoveButtonState();
    rebuildFromControlPoints();

    function animate() {
      requestAnimationFrame(animate);
      orbit.update();
      update3DState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
