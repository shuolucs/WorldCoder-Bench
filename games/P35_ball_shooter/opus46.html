<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Person Ball Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #hud {
    position: fixed; top: 0; left: 0; width: 100%; padding: 15px 25px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; z-index: 10;
  }
  .hud-panel {
    background: rgba(0,0,0,0.6); border: 1px solid rgba(0,200,255,0.3);
    border-radius: 8px; padding: 10px 18px; color: #fff;
    backdrop-filter: blur(5px);
  }
  .hud-panel .label { font-size: 11px; color: rgba(0,200,255,0.7); text-transform: uppercase; letter-spacing: 1px; }
  .hud-panel .value { font-size: 28px; font-weight: bold; color: #0cf; }
  .hud-left { display: flex; gap: 15px; }
  .hud-right { display: flex; gap: 15px; }

  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 24px; height: 24px; pointer-events: none; z-index: 10;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.8);
  }
  #crosshair::before { width: 2px; height: 24px; left: 11px; top: 0; }
  #crosshair::after { width: 24px; height: 2px; top: 11px; left: 0; }

  #reloadBtn {
    position: fixed; bottom: 30px; right: 30px; z-index: 10;
    padding: 12px 28px; font-size: 16px; font-weight: bold;
    background: linear-gradient(135deg, #0a4a6e, #0cf); color: #fff;
    border: none; border-radius: 6px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 2px;
    transition: all 0.2s;
  }
  #reloadBtn:hover { background: linear-gradient(135deg, #0cf, #0a4a6e); transform: scale(1.05); }

  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
    justify-content: center; align-items: center; z-index: 20; color: #fff;
  }
  #overlay h1 { font-size: 48px; color: #0cf; margin-bottom: 15px; }
  #overlay p { font-size: 18px; color: #aaa; margin-bottom: 5px; }
  #overlay .start-hint { margin-top: 30px; font-size: 22px; color: #fff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  #gameOver {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); display: none; flex-direction: column;
    justify-content: center; align-items: center; z-index: 20; color: #fff;
  }
  #gameOver h1 { font-size: 48px; color: #f44; margin-bottom: 15px; }
  #gameOver .final-score { font-size: 64px; color: #0cf; font-weight: bold; }
  #gameOver p { font-size: 18px; color: #aaa; margin-top: 10px; }

  #hitMarker {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 36px; color: #ff0; pointer-events: none; z-index: 15;
    opacity: 0; transition: opacity 0.1s;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="overlay">
  <h1>🎯 Ball Shooter</h1>
  <p>Shoot floating cubes with bouncing balls!</p>
  <p>WASD to move • Mouse to aim • Click to shoot</p>
  <p>Each target needs 2 hits to destroy</p>
  <p class="start-hint">Click anywhere to start</p>
</div>

<div id="gameOver">
  <h1>TIME'S UP!</h1>
  <div class="final-score" id="finalScore">0</div>
  <p>Targets Destroyed: <span id="finalDestroyed">0</span>/20</p>
  <p>Shots Fired: <span id="finalShots">0</span></p>
</div>

<div id="hud">
  <div class="hud-left">
    <div class="hud-panel"><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div class="hud-panel"><div class="label">Ammo</div><div class="value" id="ammo">50</div></div>
  </div>
  <div class="hud-right">
    <div class="hud-panel"><div class="label">Time</div><div class="value" id="timeLeft">60.0</div></div>
    <div class="hud-panel"><div class="label">Targets</div><div class="value" id="targetsLeft">20</div></div>
  </div>
</div>

<div id="crosshair"></div>
<div id="hitMarker">✕</div>

<button id="reloadBtn">⟳ Reload [R]</button>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ============================================================
// SCORING RULES (comment):
// - Each hit on a target: +10 points
// - When a target is destroyed (2nd hit): +10 for the hit AND +50 bonus = +60 total on that shot
// - So score increments: first hit = +10, second hit (destroy) = +10 + +50 = +60
// - targetsRemaining decreases by 1 on destroy
// ============================================================

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);

const pointLight1 = new THREE.PointLight(0x0088ff, 1.5, 40);
pointLight1.position.set(-10, 10, -10);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff4400, 1.0, 40);
pointLight2.position.set(10, 8, 10);
scene.add(pointLight2);

// --- Arena (30 x 20 x 30) ---
const ARENA = { x: 30, y: 20, z: 30 };
const halfX = ARENA.x / 2, halfY = ARENA.y / 2, halfZ = ARENA.z / 2;

// Floor
const floorGeo = new THREE.PlaneGeometry(ARENA.x, ARENA.z);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x111122, roughness: 0.8, metalness: 0.2
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Grid on floor
const gridHelper = new THREE.GridHelper(30, 30, 0x003366, 0x001133);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Walls
function createWall(w, h, px, py, pz, rx, ry, rz) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x0a0a2a, transparent: true, opacity: 0.3,
    side: THREE.DoubleSide, roughness: 0.9
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(px, py, pz);
  mesh.rotation.set(rx || 0, ry || 0, rz || 0);
  scene.add(mesh);

  // Add wireframe edges
  const edges = new THREE.EdgesGeometry(geo);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x003366, transparent: true, opacity: 0.5 });
  const line = new THREE.LineSegments(edges, lineMat);
  line.position.copy(mesh.position);
  line.rotation.copy(mesh.rotation);
  scene.add(line);
}

// Back wall
createWall(ARENA.x, ARENA.y, 0, halfY, -halfZ, 0, 0, 0);
// Front wall
createWall(ARENA.x, ARENA.y, 0, halfY, halfZ, 0, Math.PI, 0);
// Left wall
createWall(ARENA.z, ARENA.y, -halfX, halfY, 0, 0, Math.PI / 2, 0);
// Right wall
createWall(ARENA.z, ARENA.y, halfX, halfY, 0, 0, -Math.PI / 2, 0);
// Ceiling
createWall(ARENA.x, ARENA.z, 0, ARENA.y, 0, Math.PI / 2, 0, 0);

// --- Controls ---
const controls = new PointerLockControls(camera, document.body);

const overlay = document.getElementById('overlay');
const gameOverScreen = document.getElementById('gameOver');

overlay.addEventListener('click', () => {
  controls.lock();
});

controls.addEventListener('lock', () => {
  overlay.style.display = 'none';
  if (!gameStarted) {
    gameStarted = true;
    startTime = performance.now();
  }
});

controls.addEventListener('unlock', () => {
  if (!gameEnded) {
    // Don't show overlay if game is running, just re-show if needed
    // Actually let's show it so they can re-lock
    if (!gameEnded) overlay.style.display = 'flex';
  }
});

// --- Movement ---
const moveState = { forward: false, backward: false, left: false, right: false };
const MOVE_SPEED = 6;

document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'KeyW': moveState.forward = true; break;
    case 'KeyS': moveState.backward = true; break;
    case 'KeyA': moveState.left = true; break;
    case 'KeyD': moveState.right = true; break;
    case 'KeyR': doReload(); break;
  }
});

document.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW': moveState.forward = false; break;
    case 'KeyS': moveState.backward = false; break;
    case 'KeyA': moveState.left = false; break;
    case 'KeyD': moveState.right = false; break;
  }
});

// --- Game State ---
let gameStarted = false;
let gameEnded = false;
let startTime = 0;

const state = {
  score: 0,
  ammo: 50,
  targetsRemaining: 20,
  shotsFired: 0,
  timeLeft: 60.0,
  playerPos: { x: 0, y: 2, z: 0 }
};

window.__3D_STATE__ = state;

// --- Targets ---
const targets = [];
const TARGET_COUNT = 20;

const targetColors = [
  0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff,
  0x44ffff, 0xff8800, 0x8800ff, 0x00ff88, 0xff0088
];

for (let i = 0; i < TARGET_COUNT; i++) {
  const size = 0.8 + Math.random() * 0.6;
  const geo = new THREE.BoxGeometry(size, size, size);
  const color = targetColors[i % targetColors.length];
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.3,
    metalness: 0.6,
    emissive: 0x000000,
    emissiveIntensity: 0
  });
  const mesh = new THREE.Mesh(geo, mat);

  // Random position within arena bounds (with margin)
  const margin = 2;
  mesh.position.set(
    (Math.random() - 0.5) * (ARENA.x - margin * 2),
    1.5 + Math.random() * (ARENA.y - 4),
    (Math.random() - 0.5) * (ARENA.z - margin * 2)
  );
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Edge glow
  const edgesGeo = new THREE.EdgesGeometry(geo);
  const edgeMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.6 });
  const edgeLine = new THREE.LineSegments(edgesGeo, edgeMat);
  mesh.add(edgeLine);

  targets.push({
    mesh: mesh,
    hp: 2,
    alive: true,
    size: size,
    baseY: mesh.position.y,
    floatPhase: Math.random() * Math.PI * 2,
    floatSpeed: 0.5 + Math.random() * 1.0,
    floatAmp: 0.3 + Math.random() * 0.5,
    rotSpeed: (Math.random() - 0.5) * 2,
    originalColor: color,
    hitFlashTime: 0
  });
}

// --- Projectiles ---
const projectiles = [];
const PROJECTILE_SPEED = 15;
const GRAVITY = -9.8;
const PROJECTILE_RADIUS = 0.15;

function createProjectile(origin, direction) {
  const geo = new THREE.SphereGeometry(PROJECTILE_RADIUS, 12, 12);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x00ffff,
    emissive: 0x00aaff,
    emissiveIntensity: 1.0,
    roughness: 0.1,
    metalness: 0.8
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(origin);
  mesh.castShadow = true;
  scene.add(mesh);

  // Trail light
  const light = new THREE.PointLight(0x00ccff, 0.5, 5);
  mesh.add(light);

  const vel = direction.clone().multiplyScalar(PROJECTILE_SPEED);

  projectiles.push({
    mesh: mesh,
    velocity: vel,
    age: 0
  });
}

function shoot() {
  if (gameEnded || !gameStarted) return;
  if (state.ammo <= 0) return;
  if (state.timeLeft <= 0) return;

  state.ammo--;
  state.shotsFired++;

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);

  const origin = camera.position.clone().add(dir.clone().multiplyScalar(0.5));
  createProjectile(origin, dir);

  updateHUD();
}

// Expose for testing
window.__ICG_shoot__ = function() {
  if (state.ammo <= 0) return;
  if (gameEnded) return;
  if (state.timeLeft <= 0) return;

  state.ammo--;
  state.shotsFired++;

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  const origin = camera.position.clone().add(dir.clone().multiplyScalar(0.5));
  createProjectile(origin, dir);
  updateHUD();
};

// --- Shooting via click ---
document.addEventListener('mousedown', (e) => {
  if (e.button === 0 && controls.isLocked) {
    shoot();
  }
});

// --- Reload ---
function doReload() {
  state.ammo = 50;
  updateHUD();
}

document.getElementById('reloadBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  doReload();
});

// --- Collision Detection ---
function sphereAABBCollision(spherePos, sphereRadius, box) {
  // box is a THREE.Mesh with BoxGeometry
  const boxPos = box.position;
  const geo = box.geometry;
  const params = geo.parameters;
  const halfW = params.width / 2;
  const halfH = params.height / 2;
  const halfD = params.depth / 2;

  // Closest point on AABB to sphere center
  const closestX = Math.max(boxPos.x - halfW, Math.min(spherePos.x, boxPos.x + halfW));
  const closestY = Math.max(boxPos.y - halfH, Math.min(spherePos.y, boxPos.y + halfH));
  const closestZ = Math.max(boxPos.z - halfD, Math.min(spherePos.z, boxPos.z + halfD));

  const dx = spherePos.x - closestX;
  const dy = spherePos.y - closestY;
  const dz = spherePos.z - closestZ;
  const distSq = dx * dx + dy * dy + dz * dz;

  return distSq <= sphereRadius * sphereRadius;
}

// --- Hit marker ---
const hitMarkerEl = document.getElementById('hitMarker');
let hitMarkerTimeout = null;

function showHitMarker(destroy) {
  hitMarkerEl.textContent = destroy ? '💥' : '✕';
  hitMarkerEl.style.opacity = '1';
  hitMarkerEl.style.color = destroy ? '#ff4400' : '#ffff00';
  hitMarkerEl.style.fontSize = destroy ? '48px' : '36px';
  if (hitMarkerTimeout) clearTimeout(hitMarkerTimeout);
  hitMarkerTimeout = setTimeout(() => {
    hitMarkerEl.style.opacity = '0';
  }, 200);
}

// --- Particle effects ---
const particles = [];

function spawnParticles(position, color, count) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.05 + Math.random() * 0.08, 6, 6);
    const mat = new THREE.MeshBasicMaterial({ color: color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    scene.add(mesh);

    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 8,
      Math.random() * 6,
      (Math.random() - 0.5) * 8
    );

    particles.push({ mesh, velocity: vel, age: 0, maxAge: 0.5 + Math.random() * 0.5 });
  }
}

// --- Score popup ---
function createScorePopup(position, text) {
  // Using a sprite
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 36px Arial';
  ctx.fillStyle = '#ffff00';
  ctx.textAlign = 'center';
  ctx.fillText(text, 64, 42);

  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.copy(position);
  sprite.scale.set(2, 1, 1);
  scene.add(sprite);

  particles.push({
    mesh: sprite,
    velocity: new THREE.Vector3(0, 2, 0),
    age: 0,
    maxAge: 1.0,
    isPopup: true
  });
}

// --- HUD Update ---
function updateHUD() {
  document.getElementById('score').textContent = state.score;
  document.getElementById('ammo').textContent = state.ammo;
  document.getElementById('timeLeft').textContent = state.timeLeft.toFixed(1);
  document.getElementById('targetsLeft').textContent = state.targetsRemaining;
}

// --- Game Over ---
function endGame() {
  gameEnded = true;
  document.getElementById('finalScore').textContent = state.score;
  document.getElementById('finalDestroyed').textContent = (20 - state.targetsRemaining);
  document.getElementById('finalShots').textContent = state.shotsFired;
  gameOverScreen.style.display = 'flex';
  controls.unlock();
}

// --- Animation Loop ---
const clock = new THREE.Clock();
const moveDir = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.getElapsedTime();

  // Timer
  if (gameStarted && !gameEnded) {
    const timePassed = (performance.now() - startTime) / 1000;
    state.timeLeft = Math.max(0, 60 - timePassed);
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      endGame();
    }
  }

  // Check win condition
  if (state.targetsRemaining <= 0 && !gameEnded) {
    endGame();
  }

  // Movement
  if (controls.isLocked && !gameEnded) {
    moveDir.set(0, 0, 0);
    if (moveState.forward) moveDir.z -= 1;
    if (moveState.backward) moveDir.z += 1;
    if (moveState.left) moveDir.x -= 1;
    if (moveState.right) moveDir.x += 1;

    if (moveDir.lengthSq() > 0) {
      moveDir.normalize();
      controls.moveRight(moveDir.x * MOVE_SPEED * delta);
      controls.moveForward(-moveDir.z * MOVE_SPEED * delta);
    }

    // Clamp player position within arena
    const margin = 0.5;
    camera.position.x = Math.max(-halfX + margin, Math.min(halfX - margin, camera.position.x));
    camera.position.z = Math.max(-halfZ + margin, Math.min(halfZ - margin, camera.position.z));
    camera.position.y = 2; // Fixed height
  }

  // Update player pos
  state.playerPos.x = parseFloat(camera.position.x.toFixed(2));
  state.playerPos.y = parseFloat(camera.position.y.toFixed(2));
  state.playerPos.z = parseFloat(camera.position.z.toFixed(2));

  // Update targets (floating animation)
  for (const target of targets) {
    if (!target.alive) continue;
    target.mesh.position.y = target.baseY + Math.sin(elapsed * target.floatSpeed + target.floatPhase) * target.floatAmp;
    target.mesh.rotation.y += target.rotSpeed * delta;
    target.mesh.rotation.x += target.rotSpeed * 0.3 * delta;

    // Hit flash decay
    if (target.hitFlashTime > 0) {
      target.hitFlashTime -= delta;
      const intensity = Math.max(0, target.hitFlashTime / 0.3);
      target.mesh.material.emissive.setHex(target.originalColor);
      target.mesh.material.emissiveIntensity = intensity * 2;
    } else {
      // Subtle glow for damaged targets
      if (target.hp === 1) {
        target.mesh.material.emissive.setHex(target.originalColor);
        target.mesh.material.emissiveIntensity = 0.3 + Math.sin(elapsed * 4) * 0.15;
      }
    }
  }

  // Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const proj = projectiles[i];
    proj.velocity.y += GRAVITY * delta;
    proj.mesh.position.add(proj.velocity.clone().multiplyScalar(delta));
    proj.age += delta;

    let hit = false;

    // Check collision with targets
    for (const target of targets) {
      if (!target.alive) continue;
      if (sphereAABBCollision(proj.mesh.position, PROJECTILE_RADIUS, target.mesh)) {
        // Hit!
        target.hp--;
        state.score += 10; // +10 for each hit
        target.hitFlashTime = 0.3;

        spawnParticles(proj.mesh.position, target.originalColor, 8);

        if (target.hp <= 0) {
          // Destroyed! +50 bonus
          state.score += 50;
          target.alive = false;
          state.targetsRemaining--;

          spawnParticles(target.mesh.position, target.originalColor, 20);
          createScorePopup(target.mesh.position.clone(), '+60');

          scene.remove(target.mesh);
          showHitMarker(true);
        } else {
          // First hit - show damage
          createScorePopup(proj.mesh.position.clone(), '+10');
          showHitMarker(false);

          // Scale down slightly to show damage
          target.mesh.scale.setScalar(0.85);
        }

        hit = true;
        break;
      }
    }

    // Remove if hit, out of bounds, or too old
    const outOfBounds =
      Math.abs(proj.mesh.position.x) > halfX + 2 ||
      proj.mesh.position.y < -2 || proj.mesh.position.y > ARENA.y + 2 ||
      Math.abs(proj.mesh.position.z) > halfZ + 2;

    if (hit || outOfBounds || proj.age > 5) {
      scene.remove(proj.mesh);
      if (proj.mesh.children.length > 0) {
        proj.mesh.children.forEach(c => {
          if (c.dispose) c.dispose();
        });
      }
      projectiles.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += delta;

    if (p.isPopup) {
      p.mesh.position.add(p.velocity.clone().multiplyScalar(delta));
      p.mesh.material.opacity = 1 - (p.age / p.maxAge);
    } else {
      p.velocity.y += GRAVITY * 0.5 * delta;
      p.mesh.position.add(p.velocity.clone().multiplyScalar(delta));
      const scale = 1 - (p.age / p.maxAge);
      p.mesh.scale.setScalar(Math.max(0.01, scale));
    }

    if (p.age >= p.maxAge) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }

  // Animate lights
  pointLight1.position.x = Math.sin(elapsed * 0.3) * 12;
  pointLight1.position.z = Math.cos(elapsed * 0.3) * 12;
  pointLight2.position.x = Math.cos(elapsed * 0.2) * 10;
  pointLight2.position.z = Math.sin(elapsed * 0.2) * 10;

  // Update HUD
  updateHUD();

  // Update global state
  window.__3D_STATE__ = state;

  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
updateHUD();
