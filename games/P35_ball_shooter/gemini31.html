<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Person Bouncing Ball Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            user-select: none;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
        }
        .hud-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 24px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        
        #instructions {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: auto;
            cursor: pointer;
            z-index: 10;
        }
        #reloadBtn {
            pointer-events: auto;
            padding: 10px 20px;
            font-size: 18px;
            background: #444;
            color: white;
            border: 2px solid #fff;
            cursor: pointer;
            font-family: monospace;
        }
        #reloadBtn:hover { background: #666; }
        .game-over { color: #ff5555; font-weight: bold; }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div class="hud-top">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="timeLeft">60.0</span>s</div>
        </div>
        <div id="crosshair"></div>
        <div class="hud-bottom">
            <div>Ammo: <span id="ammo">50</span></div>
            <button id="reloadBtn">RELOAD (R)</button>
        </div>
    </div>
    <div id="instructions">
        <h1 style="font-size: 48px; margin-bottom: 10px;">Click to Play</h1>
        <p style="font-size: 20px;">Look: Mouse | Shoot: Left Click | Reload: R or Button</p>
        <p style="font-size: 16px; color: #aaa;">Hit targets twice to destroy. Gravity affects bullets.</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Game State ---
        window.__3D_STATE__ = {
            score: 0,
            ammo: 50,
            targetsRemaining: 20,
            shotsFired: 0,
            timeLeft: 60.0,
            playerPos: { x: 0, y: 2, z: 0 }
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.Fog(0x111122, 10, 50);

        const camera = new THREE.Camera(); // Will be replaced by PerspectiveCamera
        const perspectiveCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        perspectiveCamera.position.set(0, 2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Controls ---
        const controls = new PointerLockControls(perspectiveCamera, document.body);
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', () => {
            if (window.__3D_STATE__.timeLeft > 0) controls.lock();
        });

        controls.addEventListener('lock', () => { instructions.style.display = 'none'; });
        controls.addEventListener('unlock', () => { 
            if(window.__3D_STATE__.timeLeft > 0) instructions.style.display = 'flex'; 
        });

        scene.add(controls.getObject());

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- Arena (30x20x30) ---
        // Floor
        const floorGeo = new THREE.PlaneGeometry(30, 30);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Grid Helper for visual scale
        const grid = new THREE.GridHelper(30, 30, 0x555566, 0x222233);
        grid.position.y = 0.01;
        scene.add(grid);

        // Walls (Box with BackSide)
        const arenaGeo = new THREE.BoxGeometry(30, 20, 30);
        const arenaMat = new THREE.MeshStandardMaterial({ 
            color: 0x222233, 
            side: THREE.BackSide,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const arena = new THREE.Mesh(arenaGeo, arenaMat);
        arena.position.y = 10;
        scene.add(arena);

        // --- Targets ---
        const targets = [];
        const targetGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        
        for (let i = 0; i < 20; i++) {
            const targetMat = new THREE.MeshStandardMaterial({ 
                color: 0x00aaff, 
                roughness: 0.4,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(targetGeo, targetMat);
            
            // Random position within arena bounds (avoiding edges)
            mesh.position.set(
                (Math.random() - 0.5) * 26,
                Math.random() * 14 + 3, // y: 3 to 17
                (Math.random() - 0.5) * 26
            );
            mesh.castShadow = true;
            scene.add(mesh);

            targets.push({
                mesh: mesh,
                health: 2,
                baseY: mesh.position.y,
                phase: Math.random() * Math.PI * 2,
                speed: 1 + Math.random()
            });
        }

        // --- Projectiles ---
        const bullets = [];
        const bulletGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const bulletMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xaa5500 });

        function shoot() {
            if (window.__3D_STATE__.timeLeft <= 0 || window.__3D_STATE__.ammo <= 0) return;

            window.__3D_STATE__.ammo--;
            window.__3D_STATE__.shotsFired++;

            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            
            // Start at camera position
            bullet.position.copy(controls.getObject().position);
            scene.add(bullet);

            // Calculate forward velocity
            const direction = new THREE.Vector3();
            controls.getDirection(direction);
            const velocity = direction.multiplyScalar(15); // 15 units/s

            bullets.push({
                mesh: bullet,
                velocity: velocity,
                sphere: new THREE.Sphere(bullet.position, 0.2)
            });
        }

        // Expose shoot function
        window.__ICG_shoot__ = shoot;

        // Input listeners
        document.addEventListener('mousedown', (e) => {
            if (controls.isLocked && e.button === 0) {
                shoot();
            }
        });

        const reloadBtn = document.getElementById('reloadBtn');
        function reload() {
            if (window.__3D_STATE__.timeLeft > 0) {
                window.__3D_STATE__.ammo = 50;
            }
        }
        reloadBtn.addEventListener('click', reload);
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') reload();
        });

        // --- Game Loop ---
        const clock = new THREE.Clock();
        const uiScore = document.getElementById('score');
        const uiAmmo = document.getElementById('ammo');
        const uiTimeLeft = document.getElementById('timeLeft');

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent huge jumps
            const time = clock.getElapsedTime();

            // Update Timer
            if (window.__3D_STATE__.timeLeft > 0) {
                window.__3D_STATE__.timeLeft -= dt;
                if (window.__3D_STATE__.timeLeft <= 0) {
                    window.__3D_STATE__.timeLeft = 0;
                    controls.unlock();
                    instructions.innerHTML = `<h1 class="game-over">TIME UP</h1><p style="font-size:24px">Final Score: ${window.__3D_STATE__.score}</p>`;
                    instructions.style.display = 'flex';
                }
            }

            const isPlaying = window.__3D_STATE__.timeLeft > 0;

            // Update Targets (Floating)
            targets.forEach(t => {
                t.mesh.position.y = t.baseY + Math.sin(time * t.speed + t.phase) * 0.8;
                t.mesh.rotation.x += 0.5 * dt;
                t.mesh.rotation.y += 0.5 * dt;
            });

            // Update Bullets & Physics
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                
                // Apply Gravity (ay = -9.8)
                b.velocity.y -= 9.8 * dt;
                
                // Move bullet
                b.mesh.position.addScaledVector(b.velocity, dt);
                b.sphere.center.copy(b.mesh.position);

                // Bounds Check (Arena 30x20x30, centered at x=0, z=0, y=0..20)
                if (b.mesh.position.y < 0 || b.mesh.position.y > 20 || 
                    Math.abs(b.mesh.position.x) > 15 || Math.abs(b.mesh.position.z) > 15) {
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                    continue;
                }

                // Collision Detection (Sphere vs AABB)
                let hit = false;
                for (let j = targets.length - 1; j >= 0; j--) {
                    const t = targets[j];
                    const targetBox = new THREE.Box3().setFromObject(t.mesh);
                    
                    if (targetBox.intersectsSphere(b.sphere)) {
                        hit = true;
                        t.health--;
                        
                        // Scoring Rule: +10 per hit. If destroyed, additional +50.
                        window.__3D_STATE__.score += 10; 

                        if (t.health === 1) {
                            // First hit: Glow
                            t.mesh.material.emissive.setHex(0xff5500);
                            t.mesh.material.color.setHex(0xffaaaa);
                        } else if (t.health <= 0) {
                            // Second hit: Destroy
                            window.__3D_STATE__.score += 50;
                            window.__3D_STATE__.targetsRemaining--;
                            scene.remove(t.mesh);
                            targets.splice(j, 1);
                        }
                        break; // Bullet consumed
                    }
                }

                if (hit) {
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                }
            }

            // Update State Object
            const camPos = controls.getObject().position;
            window.__3D_STATE__.playerPos.x = camPos.x;
            window.__3D_STATE__.playerPos.y = camPos.y;
            window.__3D_STATE__.playerPos.z = camPos.z;

            // Update UI
            uiScore.innerText = window.__3D_STATE__.score;
            uiAmmo.innerText = window.__3D_STATE__.ammo;
            uiTimeLeft.innerText = window.__3D_STATE__.timeLeft.toFixed(1);
            if(window.__3D_STATE__.ammo === 0 && isPlaying) {
                uiAmmo.style.color = '#ff5555';
            } else {
                uiAmmo.style.color = '#fff';
            }

            renderer.render(scene, perspectiveCamera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            perspectiveCamera.aspect = window.innerWidth / window.innerHeight;
            perspectiveCamera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start Loop
        animate();
    </script>
</body>
</html>
