<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 第一人称弹球射击</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      color: #fff;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.8;
      user-select: none;
      min-width: 180px;
    }

    #hud b {
      display: inline-block;
      min-width: 72px;
    }

    #reloadBtn {
      margin-top: 8px;
      width: 100%;
      padding: 8px 10px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      background: #2f7cff;
      color: #fff;
      font-size: 14px;
    }

    #reloadBtn:hover {
      background: #1f6df6;
    }

    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 16px;
      height: 16px;
      margin-left: -8px;
      margin-top: -8px;
      z-index: 15;
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 6px rgba(255,255,255,0.8);
    }

    #crosshair::before {
      left: 7px;
      top: 0;
      width: 2px;
      height: 16px;
    }

    #crosshair::after {
      left: 0;
      top: 7px;
      width: 16px;
      height: 2px;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background: rgba(0,0,0,0.45);
      text-align: center;
      padding: 20px;
    }

    #overlay .panel {
      background: rgba(20, 20, 20, 0.75);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 20px 24px;
      max-width: 520px;
    }

    #overlay h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    #overlay p {
      margin: 8px 0;
      color: #ddd;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div><b>Score:</b> <span id="score">0</span></div>
    <div><b>Ammo:</b> <span id="ammo">50</span></div>
    <div><b>Time:</b> <span id="timeLeft">60.0</span></div>
    <button id="reloadBtn">Reload (重装填)</button>
  </div>

  <div id="crosshair"></div>

  <div id="overlay">
    <div class="panel">
      <h1>第一人称弹球射击</h1>
      <p>点击页面锁定鼠标，使用第一人称视角。</p>
      <p>左键发射受重力影响的球体，击中漂浮立方体目标。</p>
      <p>每个目标需要命中 2 次：每次命中 +10，第二次摧毁时额外 +50。</p>
      <p>W/A/S/D 移动，空格上升，Shift 下降。</p>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    const app = document.getElementById('app');
    const scoreEl = document.getElementById('score');
    const ammoEl = document.getElementById('ammo');
    const timeLeftEl = document.getElementById('timeLeft');
    const reloadBtn = document.getElementById('reloadBtn');
    const overlay = document.getElementById('overlay');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1117);
    scene.fog = new THREE.Fog(0x0d1117, 20, 60);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 2, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new PointerLockControls(camera, document.body);

    overlay.addEventListener('click', () => {
      controls.lock();
    });

    controls.addEventListener('lock', () => {
      overlay.style.display = 'none';
    });

    controls.addEventListener('unlock', () => {
      overlay.style.display = 'flex';
    });

    scene.add(new THREE.AmbientLight(0xffffff, 0.45));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(8, 14, 6);
    scene.add(dirLight);

    const arena = {
      width: 30,
      height: 20,
      depth: 30,
      minX: -15,
      maxX: 15,
      minY: 0,
      maxY: 20,
      minZ: -15,
      maxZ: 15
    };

    const floorGeo = new THREE.PlaneGeometry(arena.width, arena.depth);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x223344, roughness: 0.9, metalness: 0.05 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    scene.add(floor);

    const ceiling = new THREE.Mesh(
      new THREE.PlaneGeometry(arena.width, arena.depth),
      new THREE.MeshStandardMaterial({ color: 0x18212b, side: THREE.DoubleSide, transparent: true, opacity: 0.4 })
    );
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = arena.maxY;
    scene.add(ceiling);

    const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a3340, side: THREE.DoubleSide, transparent: true, opacity: 0.55 });

    const wall1 = new THREE.Mesh(new THREE.PlaneGeometry(arena.width, arena.height), wallMat);
    wall1.position.set(0, arena.height / 2, arena.minZ);
    scene.add(wall1);

    const wall2 = new THREE.Mesh(new THREE.PlaneGeometry(arena.width, arena.height), wallMat);
    wall2.rotation.y = Math.PI;
    wall2.position.set(0, arena.height / 2, arena.maxZ);
    scene.add(wall2);

    const wall3 = new THREE.Mesh(new THREE.PlaneGeometry(arena.depth, arena.height), wallMat);
    wall3.rotation.y = Math.PI / 2;
    wall3.position.set(arena.minX, arena.height / 2, 0);
    scene.add(wall3);

    const wall4 = new THREE.Mesh(new THREE.PlaneGeometry(arena.depth, arena.height), wallMat);
    wall4.rotation.y = -Math.PI / 2;
    wall4.position.set(arena.maxX, arena.height / 2, 0);
    scene.add(wall4);

    const grid = new THREE.GridHelper(30, 30, 0x88aaff, 0x445566);
    grid.position.y = 0.01;
    scene.add(grid);

    const move = {
      forward: false,
      backward: false,
      left: false,
      right: false,
      up: false,
      down: false
    };

    document.addEventListener('keydown', (e) => {
      switch (e.code) {
        case 'KeyW': move.forward = true; break;
        case 'KeyS': move.backward = true; break;
        case 'KeyA': move.left = true; break;
        case 'KeyD': move.right = true; break;
        case 'Space': move.up = true; break;
        case 'ShiftLeft':
        case 'ShiftRight': move.down = true; break;
      }
    });

    document.addEventListener('keyup', (e) => {
      switch (e.code) {
        case 'KeyW': move.forward = false; break;
        case 'KeyS': move.backward = false; break;
        case 'KeyA': move.left = false; break;
        case 'KeyD': move.right = false; break;
        case 'Space': move.up = false; break;
        case 'ShiftLeft':
        case 'ShiftRight': move.down = false; break;
      }
    });

    let score = 0;
    let ammo = 50;
    let shotsFired = 0;
    let targetsRemaining = 20;
    let timeLeft = 60.0;
    let gameOver = false;

    const projectileGeometry = new THREE.SphereGeometry(0.18, 16, 16);
    const projectileMaterial = new THREE.MeshStandardMaterial({
      color: 0xffcc66,
      emissive: 0x442200,
      roughness: 0.5,
      metalness: 0.1
    });

    const projectiles = [];
    const gravity = new THREE.Vector3(0, -9.8, 0);
    const shootSpeed = 15;

    const targetGeometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
    const targets = [];
    const targetGroup = new THREE.Group();
    scene.add(targetGroup);

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createTargets() {
      for (let i = 0; i < 20; i++) {
        const material = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(rand(0, 1), 0.7, 0.55),
          emissive: 0x000000,
          roughness: 0.45,
          metalness: 0.15
        });

        const mesh = new THREE.Mesh(targetGeometry, material);
        const basePos = new THREE.Vector3(
          rand(arena.minX + 2, arena.maxX - 2),
          rand(3, arena.maxY - 3),
          rand(arena.minZ + 2, arena.maxZ - 2)
        );

        mesh.position.copy(basePos);
        targetGroup.add(mesh);

        targets.push({
          mesh,
          basePos: basePos.clone(),
          floatPhase: rand(0, Math.PI * 2),
          hits: 0,
          destroyed: false,
          halfSize: new THREE.Vector3(0.6, 0.6, 0.6),
          flashTime: 0
        });
      }
    }

    createTargets();

    function updateHUD() {
      scoreEl.textContent = String(score);
      ammoEl.textContent = String(ammo);
      timeLeftEl.textContent = Math.max(0, timeLeft).toFixed(1);
    }

    function update3DState() {
      window.__3D_STATE__ = {
        score,
        ammo,
        targetsRemaining,
        shotsFired,
        timeLeft: Math.max(0, timeLeft),
        playerPos: {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        }
      };
    }

    function spawnProjectile() {
      if (!controls.isLocked || gameOver || ammo <= 0) return false;

      const mesh = new THREE.Mesh(projectileGeometry, projectileMaterial.clone());
      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir).normalize();

      const start = camera.position.clone().add(dir.clone().multiplyScalar(0.8));
      mesh.position.copy(start);
      scene.add(mesh);

      projectiles.push({
        mesh,
        velocity: dir.multiplyScalar(shootSpeed),
        radius: 0.18,
        age: 0
      });

      ammo -= 1;
      shotsFired += 1;
      updateHUD();
      return true;
    }

    // 评测辅助：等价一次合法发射（会正确 ammo-1、shotsFired+1、生成弹丸）
    window.__ICG_shoot__ = () => spawnProjectile();

    document.addEventListener('mousedown', (e) => {
      if (e.button === 0 && controls.isLocked) {
        spawnProjectile();
      }
    });

    reloadBtn.addEventListener('click', () => {
      ammo = 50;
      updateHUD();
    });

    function clampPlayerToArena() {
      camera.position.x = THREE.MathUtils.clamp(camera.position.x, arena.minX + 0.5, arena.maxX - 0.5);
      camera.position.y = THREE.MathUtils.clamp(camera.position.y, 1.0, arena.maxY - 0.8);
      camera.position.z = THREE.MathUtils.clamp(camera.position.z, arena.minZ + 0.5, arena.maxZ - 0.5);
    }

    function updatePlayer(delta) {
      const speed = 7;
      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);
      forward.y = 0;
      if (forward.lengthSq() > 0) forward.normalize();

      const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();

      if (move.forward) camera.position.addScaledVector(forward, speed * delta);
      if (move.backward) camera.position.addScaledVector(forward, -speed * delta);
      if (move.left) camera.position.addScaledVector(right, -speed * delta);
      if (move.right) camera.position.addScaledVector(right, speed * delta);
      if (move.up) camera.position.y += speed * delta;
      if (move.down) camera.position.y -= speed * delta;

      clampPlayerToArena();
    }

    function sphereAABBCollision(center, radius, boxCenter, halfSize) {
      const min = boxCenter.clone().sub(halfSize);
      const max = boxCenter.clone().add(halfSize);

      const closest = new THREE.Vector3(
        THREE.MathUtils.clamp(center.x, min.x, max.x),
        THREE.MathUtils.clamp(center.y, min.y, max.y),
        THREE.MathUtils.clamp(center.z, min.z, max.z)
      );

      return closest.distanceToSquared(center) <= radius * radius;
    }

    function hitTarget(target) {
      if (target.destroyed) return;

      target.hits += 1;
      target.flashTime = 0.2;
      target.mesh.material.emissive.setHex(0xffff66);

      // 规则：
      // 每次命中 +10；
      // 若这是第 2 次命中并完全摧毁，再额外 +50；
      // 因此第二次命中总共体现为 +10 +50。
      score += 10;

      if (target.hits >= 2) {
        score += 50;
        target.destroyed = true;
        targetGroup.remove(target.mesh);
        target.mesh.geometry.dispose();
        target.mesh.material.dispose();
        targetsRemaining -= 1;
      }

      updateHUD();
    }

    function updateTargets(elapsed, delta) {
      for (const target of targets) {
        if (target.destroyed) continue;

        target.mesh.position.x = target.basePos.x;
        target.mesh.position.z = target.basePos.z;
        target.mesh.position.y = target.basePos.y + Math.sin(elapsed * 1.6 + target.floatPhase) * 0.35;

        if (target.flashTime > 0) {
          target.flashTime -= delta;
          if (target.flashTime <= 0) {
            target.mesh.material.emissive.setHex(0x000000);
          }
        }
      }
    }

    function updateProjectiles(delta) {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.age += delta;
        p.velocity.addScaledVector(gravity, delta);
        p.mesh.position.addScaledVector(p.velocity, delta);

        let remove = false;

        if (
          p.mesh.position.y < arena.minY ||
          p.mesh.position.y > arena.maxY ||
          p.mesh.position.x < arena.minX ||
          p.mesh.position.x > arena.maxX ||
          p.mesh.position.z < arena.minZ ||
          p.mesh.position.z > arena.maxZ ||
          p.age > 8
        ) {
          remove = true;
        }

        if (!remove) {
          for (const target of targets) {
            if (target.destroyed) continue;
            if (sphereAABBCollision(p.mesh.position, p.radius, target.mesh.position, target.halfSize)) {
              hitTarget(target);
              remove = true;
              break;
            }
          }
        }

        if (remove) {
          scene.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          projectiles.splice(i, 1);
        }
      }
    }

    const clock = new THREE.Clock();

    updateHUD();
    update3DState();

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.elapsedTime;

      if (!gameOver) {
        timeLeft -= delta;
        if (timeLeft <= 0) {
          timeLeft = 0;
          gameOver = true;
        }
      }

      updatePlayer(delta);
      updateTargets(elapsed, delta);
      updateProjectiles(delta);
      updateHUD();
      update3DState();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
