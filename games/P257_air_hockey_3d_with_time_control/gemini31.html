<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Air Hockey</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #score-board {
            flex-grow: 1;
            text-align: center;
        }
        #time-scale {
            text-align: right;
            min-width: 120px;
        }
        #status-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            text-align: center;
            display: none;
        }
        .hud-bottom {
            display: flex;
            justify-content: center;
            padding: 20px;
            pointer-events: auto;
        }
        #resetBtn {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #e63946;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        #resetBtn:hover {
            background-color: #d62828;
        }
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="hud-top">
            <div style="min-width: 120px;"></div>
            <div id="score-board">Player: 0 | Opponent: 0</div>
            <div id="time-scale">Time: 1.0x</div>
        </div>
        <div id="status-message"></div>
        <div id="controls-help">
            Mouse: Move Paddle<br>
            1-4: Time Scale (0.25x - 2.0x)<br>
            R: Reset Game
        </div>
        <div class="hud-bottom">
            <button id="resetBtn">Reset Game</button>
        </div>
    </div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            playerScore: 0,
            opponentScore: 0,
            puckPosition: { x: 0, y: 0, z: 0 },
            puckVelocity: { x: 0, y: 0, z: 0 },
            puckSpeed: 0,
            playerPaddleX: 0,
            aiPaddleX: 0,
            timeScale: 1.0,
            gameStatus: 'playing',
            dragonLoaded: false,
            dragonGlowing: false,
            isPaused: false,
            totalGoals: 0,
            frameCount: 0,
            puckOnTable: true
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- Air Hockey Table ---
        const tableGroup = new THREE.Group();
        scene.add(tableGroup);

        // Base
        const tableGeo = new THREE.BoxGeometry(8, 0.3, 12);
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x2d6a4f });
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.receiveShadow = true;
        tableGroup.add(table);

        // Center Line
        const lineGeo = new THREE.PlaneGeometry(8, 0.1);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const centerLine = new THREE.Mesh(lineGeo, lineMat);
        centerLine.rotation.x = -Math.PI / 2;
        centerLine.position.y = 0.16;
        tableGroup.add(centerLine);

        // Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const wallHeight = 0.4;
        const wallThickness = 0.2;
        const goalWidth = 2.5;

        // Side walls
        const sideWallGeo = new THREE.BoxGeometry(wallThickness, wallHeight, 12);
        const leftWall = new THREE.Mesh(sideWallGeo, wallMat);
        leftWall.position.set(-4 + wallThickness/2, wallHeight/2, 0);
        leftWall.castShadow = true;
        const rightWall = new THREE.Mesh(sideWallGeo, wallMat);
        rightWall.position.set(4 - wallThickness/2, wallHeight/2, 0);
        rightWall.castShadow = true;
        tableGroup.add(leftWall, rightWall);

        // End walls (with goals)
        const endWallWidth = (8 - goalWidth) / 2;
        const endWallGeo = new THREE.BoxGeometry(endWallWidth, wallHeight, wallThickness);
        
        const topWallLeft = new THREE.Mesh(endWallGeo, wallMat);
        topWallLeft.position.set(-4 + endWallWidth/2, wallHeight/2, -6 + wallThickness/2);
        const topWallRight = new THREE.Mesh(endWallGeo, wallMat);
        topWallRight.position.set(4 - endWallWidth/2, wallHeight/2, -6 + wallThickness/2);
        
        const bottomWallLeft = new THREE.Mesh(endWallGeo, wallMat);
        bottomWallLeft.position.set(-4 + endWallWidth/2, wallHeight/2, 6 - wallThickness/2);
        const bottomWallRight = new THREE.Mesh(endWallGeo, wallMat);
        bottomWallRight.position.set(4 - endWallWidth/2, wallHeight/2, 6 - wallThickness/2);

        tableGroup.add(topWallLeft, topWallRight, bottomWallLeft, bottomWallRight);

        // --- Game Objects ---
        // Puck
        const puckRadius = 0.3;
        const puckGeo = new THREE.CylinderGeometry(puckRadius, puckRadius, 0.15, 32);
        const puckMat = new THREE.MeshStandardMaterial({ color: 0xe63946 });
        const puck = new THREE.Mesh(puckGeo, puckMat);
        puck.position.set(0, 0.375, 0);
        puck.castShadow = true;
        scene.add(puck);

        // Player Paddle
        const paddleRadius = 0.5;
        const paddleGeo = new THREE.CylinderGeometry(paddleRadius, paddleRadius, 0.2, 32);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x457b9d });
        const playerPaddle = new THREE.Mesh(paddleGeo, playerMat);
        playerPaddle.position.set(0, 0.4, 4);
        playerPaddle.castShadow = true;
        scene.add(playerPaddle);

        // AI Paddle
        const aiMat = new THREE.MeshStandardMaterial({ color: 0x7b2d8e });
        const aiPaddle = new THREE.Mesh(paddleGeo, aiMat);
        aiPaddle.position.set(0, 0.4, -4);
        aiPaddle.castShadow = true;
        scene.add(aiPaddle);

        // --- Dragon Trophy ---
        let dragonModel = null;
        const loader = new GLTFLoader();
        // Using a reliable raw github link for the requested model
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DragonAttenuation/glTF-Binary/DragonAttenuation.glb',
            (gltf) => {
                dragonModel = gltf.scene;
                
                // Scale to roughly 1.5 units tall
                const box = new THREE.Box3().setFromObject(dragonModel);
                const size = box.getSize(new THREE.Vector3());
                const scale = 1.5 / size.y;
                dragonModel.scale.set(scale, scale, scale);
                
                // Position beside table
                dragonModel.position.set(5, 1.5, 0);
                
                // Enable shadows
                dragonModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        // Store original emissive for reset
                        child.userData.origEmissive = child.material.emissive ? child.material.emissive.clone() : new THREE.Color(0x000000);
                    }
                });
                
                scene.add(dragonModel);
                window.__3D_STATE__.dragonLoaded = true;
            },
            undefined,
            (error) => {
                console.error('Error loading dragon model:', error);
            }
        );

        // --- Physics & Logic Variables ---
        const puckVelocity = new THREE.Vector3(0, 0, 0);
        const clock = new THREE.Clock();
        
        // Mouse tracking
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0.4);
        const target = new THREE.Vector3();

        // UI Elements
        const scoreBoard = document.getElementById('score-board');
        const timeScaleUI = document.getElementById('time-scale');
        const statusMsg = document.getElementById('status-message');
        const resetBtn = document.getElementById('resetBtn');

        // --- Input Handling ---
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case '1': window.__3D_STATE__.timeScale = 0.25; break;
                case '2': window.__3D_STATE__.timeScale = 0.5; break;
                case '3': window.__3D_STATE__.timeScale = 1.0; break;
                case '4': window.__3D_STATE__.timeScale = 2.0; break;
                case 'r': 
                case 'R': resetGame(); break;
            }
            updateUI();
        });

        resetBtn.addEventListener('click', resetGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Game Logic Functions ---
        function updateUI() {
            scoreBoard.innerText = `Player: ${window.__3D_STATE__.playerScore} | Opponent: ${window.__3D_STATE__.opponentScore}`;
            timeScaleUI.innerText = `Time: ${window.__3D_STATE__.timeScale}x`;
            
            if (window.__3D_STATE__.gameStatus === 'playing') {
                statusMsg.style.display = 'none';
            } else {
                statusMsg.style.display = 'block';
                if (window.__3D_STATE__.gameStatus === 'goal') statusMsg.innerText = 'Goal!';
                else if (window.__3D_STATE__.gameStatus === 'playerWin') statusMsg.innerText = 'YOU WIN!';
                else if (window.__3D_STATE__.gameStatus === 'opponentWin') statusMsg.innerText = 'YOU LOSE!';
            }
        }

        function setDragonGlow(glow) {
            if (!dragonModel) return;
            window.__3D_STATE__.dragonGlowing = glow;
            dragonModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (glow) {
                        child.material.emissive.setHex(0xffd700);
                        child.material.emissiveIntensity = 1;
                    } else {
                        if (child.userData.origEmissive) {
                            child.material.emissive.copy(child.userData.origEmissive);
                        } else {
                            child.material.emissive.setHex(0x000000);
                        }
                    }
                }
            });
        }

        function resetPuck() {
            puck.position.set(0, 0.375, 0);
            puckVelocity.set(0, 0, 0);
            window.__3D_STATE__.isPaused = false;
            if (window.__3D_STATE__.playerScore < 3 && window.__3D_STATE__.opponentScore < 3) {
                window.__3D_STATE__.gameStatus = 'playing';
                updateUI();
            }
        }

        function handleGoal(scorer) {
            if (window.__3D_STATE__.gameStatus !== 'playing') return;
            
            window.__3D_STATE__.isPaused = true;
            window.__3D_STATE__.gameStatus = 'goal';
            
            if (scorer === 'player') window.__3D_STATE__.playerScore++;
            else window.__3D_STATE__.opponentScore++;
            
            window.__3D_STATE__.totalGoals = window.__3D_STATE__.playerScore + window.__3D_STATE__.opponentScore;

            if (window.__3D_STATE__.playerScore >= 3) {
                window.__3D_STATE__.gameStatus = 'playerWin';
                setDragonGlow(true);
            } else if (window.__3D_STATE__.opponentScore >= 3) {
                window.__3D_STATE__.gameStatus = 'opponentWin';
            } else {
                setTimeout(resetPuck, 1000);
            }
            updateUI();
        }

        function resetGame() {
            window.__3D_STATE__.playerScore = 0;
            window.__3D_STATE__.opponentScore = 0;
            window.__3D_STATE__.totalGoals = 0;
            window.__3D_STATE__.gameStatus = 'playing';
            window.__3D_STATE__.timeScale = 1.0;
            setDragonGlow(false);
            resetPuck();
            playerPaddle.position.set(0, 0.4, 4);
            aiPaddle.position.set(0, 0.4, -4);
            updateUI();
        }

        function checkPaddleCollision(paddle, isPlayer) {
            const dx = puck.position.x - paddle.position.x;
            const dz = puck.position.z - paddle.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            const minDist = paddleRadius + puckRadius;

            if (dist < minDist) {
                // Normal vector
                const nx = dx / dist;
                const nz = dz / dist;

                // Push puck out to prevent sticking
                const overlap = minDist - dist;
                puck.position.x += nx * overlap;
                puck.position.z += nz * overlap;

                // Reflect velocity
                const dot = puckVelocity.x * nx + puckVelocity.z * nz;
                
                // Only reflect if moving towards paddle
                if (dot < 0) {
                    puckVelocity.x -= 2 * dot * nx;
                    puckVelocity.z -= 2 * dot * nz;
                }

                // Add paddle influence (simulate hit)
                const hitStrength = isPlayer ? 8 : 6;
                puckVelocity.x += nx * hitStrength;
                puckVelocity.z += nz * hitStrength;
            }
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const rawDelta = clock.getDelta();
            const ts = window.__3D_STATE__.timeScale;
            const delta = rawDelta * ts;
            
            window.__3D_STATE__.frameCount++;

            // Dragon Animation
            if (dragonModel) {
                dragonModel.rotation.y += 0.5 * rawDelta; // Keep dragon rotation independent of game time scale or not? Prompt says "0.5 rad/s". Let's make it real time.
            }

            if (!window.__3D_STATE__.isPaused && window.__3D_STATE__.gameStatus === 'playing') {
                
                // Player Paddle Movement
                raycaster.setFromCamera(mouse, camera);
                raycaster.ray.intersectPlane(plane, target);
                
                // Constrain Player
                let px = target.x;
                let pz = target.z;
                px = Math.max(-3.5, Math.min(3.5, px));
                pz = Math.max(1, Math.min(5.5, pz));
                
                // Smooth movement for player paddle to avoid teleporting through puck
                playerPaddle.position.x += (px - playerPaddle.position.x) * 0.5;
                playerPaddle.position.z += (pz - playerPaddle.position.z) * 0.5;

                // AI Paddle Movement
                let targetAiX = puck.position.x;
                targetAiX = Math.max(-3.5, Math.min(3.5, targetAiX));
                // AI tracks puck X with slight delay, affected by timeScale
                aiPaddle.position.x += (targetAiX - aiPaddle.position.x) * 0.03 * ts;
                
                // Constrain AI Z (static for simplicity, or slight movement)
                aiPaddle.position.z = -4;

                // Puck Physics
                // Friction
                puckVelocity.multiplyScalar(Math.pow(0.998, ts));

                // Speed Cap
                if (puckVelocity.length() > 15) {
                    puckVelocity.setLength(15);
                }

                // Move Puck
                puck.position.x += puckVelocity.x * delta;
                puck.position.z += puckVelocity.z * delta;

                // Wall Collisions
                const boundX = 4 - wallThickness/2 - puckRadius;
                if (puck.position.x > boundX) {
                    puck.position.x = boundX;
                    puckVelocity.x *= -0.9;
                } else if (puck.position.x < -boundX) {
                    puck.position.x = -boundX;
                    puckVelocity.x *= -0.9;
                }

                const boundZ = 6 - wallThickness/2 - puckRadius;
                const inGoalX = Math.abs(puck.position.x) < goalWidth / 2;

                if (puck.position.z > boundZ) {
                    if (inGoalX) {
                        if (puck.position.z > 6.5) handleGoal('opponent');
                    } else {
                        puck.position.z = boundZ;
                        puckVelocity.z *= -0.9;
                    }
                } else if (puck.position.z < -boundZ) {
                    if (inGoalX) {
                        if (puck.position.z < -6.5) handleGoal('player');
                    } else {
                        puck.position.z = -boundZ;
                        puckVelocity.z *= -0.9;
                    }
                }

                // Paddle Collisions
                checkPaddleCollision(playerPaddle, true);
                checkPaddleCollision(aiPaddle, false);
            }

            // Update State Object
            window.__3D_STATE__.puckPosition.x = puck.position.x;
            window.__3D_STATE__.puckPosition.y = puck.position.y;
            window.__3D_STATE__.puckPosition.z = puck.position.z;
            window.__3D_STATE__.puckVelocity.x = puckVelocity.x;
            window.__3D_STATE__.puckVelocity.y = puckVelocity.y;
            window.__3D_STATE__.puckVelocity.z = puckVelocity.z;
            window.__3D_STATE__.puckSpeed = puckVelocity.length();
            window.__3D_STATE__.playerPaddleX = playerPaddle.position.x;
            window.__3D_STATE__.aiPaddleX = aiPaddle.position.x;
            window.__3D_STATE__.puckOnTable = Math.abs(puck.position.x) <= 4 && Math.abs(puck.position.z) <= 6;

            renderer.render(scene, camera);
        }

        // Init
        updateUI();
        animate();

    </script>
</body>
</html>
