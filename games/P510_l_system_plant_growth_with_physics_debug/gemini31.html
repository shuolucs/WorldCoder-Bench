<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D L-System Plant Growth Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: monospace;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        button {
            background-color: rgba(20, 30, 40, 0.8);
            color: white;
            border: 1px solid #445566;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: rgba(40, 60, 80, 0.9);
        }
        button:active {
            background-color: rgba(60, 80, 100, 1);
        }
        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: none;
            display: none;
            z-index: 10;
            min-width: 250px;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .hud-label {
            color: #aaa;
        }
        .hud-value {
            font-weight: bold;
            color: #fff;
        }
    </style>
    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="hud">
        <div class="hud-row"><span class="hud-label">FPS:</span><span class="hud-value" id="hud-fps">0</span></div>
        <div class="hud-row"><span class="hud-label">Generation:</span><span class="hud-value" id="hud-gen">0</span></div>
        <div class="hud-row"><span class="hud-label">Branches:</span><span class="hud-value" id="hud-branches">0</span></div>
        <div class="hud-row"><span class="hud-label">Leaves:</span><span class="hud-value" id="hud-leaves">0</span></div>
        <div class="hud-row"><span class="hud-label">Total Meshes:</span><span class="hud-value" id="hud-meshes">0</span></div>
        <div class="hud-row"><span class="hud-label">Bounds (WxHxD):</span><span class="hud-value" id="hud-bounds">0 x 0 x 0</span></div>
        <div class="hud-row"><span class="hud-label">Center of Mass:</span><span class="hud-value" id="hud-com">0, 0, 0</span></div>
        <div class="hud-row"><span class="hud-label">Wind Strength:</span><span class="hud-value" id="hud-wind">0</span></div>
        <div class="hud-row"><span class="hud-label">Color Mode:</span><span class="hud-value" id="hud-color">natural</span></div>
    </div>

    <div id="ui-container">
        <button id="btn-grow">Grow (G)</button>
        <button id="btn-reset">Reset (R)</button>
        <button id="btn-debug">Debug (D)</button>
        <button id="btn-wind">Wind (W)</button>
        <button id="btn-color">Color (C)</button>
    </div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            generation: 0,
            maxGeneration: 5,
            branchCount: 0,
            leafCount: 0,
            totalMeshCount: 0,
            debugOverlayActive: false,
            windStrength: 0,
            windActive: false,
            colorMode: 'natural', // 'natural', 'depth', 'stress'
            isGrowing: false,
            boundingBox: { width: 0, height: 0, depth: 0 },
            centerOfMass: { x: 0, y: 0, z: 0 },
            fps: 0,
            plantPosition: { x: 0, y: 0, z: 0 },
            lsystemString: 'F'
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 3, 0);
        controls.update();

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334455, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffeedd, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Ground & Grid
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(20, 20, 0x445566, 0x223344);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- L-System Logic ---
        const axiom = 'F';
        const rules = { 'F': 'FF+[+F-F-F]-[-F+F+F]' };
        const angle = 25 * Math.PI / 180;
        const segmentLength = 0.4;

        function generateLSystemString(gen) {
            let str = axiom;
            for (let i = 0; i < gen; i++) {
                let nextStr = '';
                for (let char of str) {
                    nextStr += rules[char] || char;
                }
                str = nextStr;
            }
            return str;
        }

        let treeData = { branches: [], leaves: [], maxDist: 0, maxDepth: 0 };

        function parseLSystem(str) {
            let pos = new THREE.Vector3(0, 0, 0);
            let dir = new THREE.Vector3(0, 1, 0);
            const zAxis = new THREE.Vector3(0, 0, 1);
            let stack = [];
            let branches = [];
            let leaves = [];
            let currentDist = 0;
            let depth = 0;
            let maxDist = 0;
            let maxDepth = 0;

            for (let i = 0; i < str.length; i++) {
                const char = str[i];
                if (char === 'F') {
                    let end = pos.clone().add(dir.clone().multiplyScalar(segmentLength));
                    let radius = 0.05 * Math.max(0.1, (1 - depth / 8));
                    
                    branches.push({
                        start: pos.clone(),
                        dir: dir.clone(),
                        length: segmentLength,
                        radius: radius,
                        depth: depth,
                        dist: currentDist
                    });
                    
                    pos.copy(end);
                    currentDist += segmentLength;
                    if (currentDist > maxDist) maxDist = currentDist;

                    // Leaf placement logic: at tips
                    let isTip = (i === str.length - 1) || (str[i+1] === ']' && str[i+2] !== 'F');
                    if (isTip) {
                        leaves.push({
                            pos: end.clone(),
                            radius: 0.08,
                            depth: depth,
                            dist: currentDist
                        });
                    }
                } else if (char === '+') {
                    dir.applyAxisAngle(zAxis, angle);
                } else if (char === '-') {
                    dir.applyAxisAngle(zAxis, -angle);
                } else if (char === '[') {
                    stack.push({ pos: pos.clone(), dir: dir.clone(), dist: currentDist, depth: depth });
                    depth++;
                    if (depth > maxDepth) maxDepth = depth;
                } else if (char === ']') {
                    let state = stack.pop();
                    pos.copy(state.pos);
                    dir.copy(state.dir);
                    currentDist = state.dist;
                    depth = state.depth;
                }
            }
            return { branches, leaves, maxDist, maxDepth };
        }

        // --- 3D Rendering Setup (InstancedMesh) ---
        const plantGroup = new THREE.Group();
        scene.add(plantGroup);

        const debugGroup = new THREE.Group();
        scene.add(debugGroup);
        debugGroup.visible = false;

        // Geometries
        const branchGeo = new THREE.CylinderGeometry(1, 1, 1, 8, 1);
        branchGeo.translate(0, 0.5, 0); // Base at origin
        const leafGeo = new THREE.IcosahedronGeometry(1, 0);
        
        // Debug Geometries
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        boxGeo.translate(0, 0.5, 0);
        const leafBoxGeo = new THREE.BoxGeometry(1, 1, 1);
        const velocityGeo = new THREE.CylinderGeometry(0.01, 0.01, 1, 4);
        velocityGeo.translate(0, 0.5, 0);

        // Wind Shader Injection
        const windUniforms = {
            uTime: { value: 0 },
            uWindStrength: { value: 0 }
        };

        function addWindShader(material, isLeaf) {
            material.onBeforeCompile = (shader) => {
                shader.uniforms.uTime = windUniforms.uTime;
                shader.uniforms.uWindStrength = windUniforms.uWindStrength;
                shader.uniforms.uSwayMultiplier = { value: isLeaf ? 1.5 : 1.0 };

                shader.vertexShader = `
                    uniform float uTime;
                    uniform float uWindStrength;
                    uniform float uSwayMultiplier;
                ` + shader.vertexShader;

                shader.vertexShader = shader.vertexShader.replace(
                    '#include <project_vertex>',
                    `
                    vec4 mvPosition = vec4( transformed, 1.0 );
                    #ifdef USE_INSTANCING
                        mvPosition = instanceMatrix * mvPosition;
                    #endif

                    vec4 worldPosition = modelMatrix * mvPosition;
                    float height = worldPosition.y;
                    float dx = sin(uTime * 2.0 + height) * 0.1 * uWindStrength * uSwayMultiplier;
                    worldPosition.x += dx;

                    mvPosition = viewMatrix * worldPosition;
                    gl_Position = projectionMatrix * mvPosition;
                    `
                );
            };
        }

        const branchMat = new THREE.MeshStandardMaterial({ roughness: 0.9, metalness: 0.1 });
        addWindShader(branchMat, false);
        
        const leafMat = new THREE.MeshStandardMaterial({ roughness: 0.8, metalness: 0.1 });
        addWindShader(leafMat, true);

        const debugBoxMat = new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true });
        const velocityMat = new THREE.MeshBasicMaterial({ color: 0x0000ff });

        let branchMesh, leafMesh;
        let debugBranchBoxes, debugLeafBoxes, velocityVectors;
        
        // Center of Mass Line
        const comMat = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 });
        const comGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,1,0)]);
        const comLine = new THREE.Line(comGeo, comMat);
        debugGroup.add(comLine);

        const dummy = new THREE.Object3D();
        const colorHelper = new THREE.Color();

        function updateColors() {
            if (!branchMesh || !leafMesh) return;
            const mode = window.__3D_STATE__.colorMode;
            
            for (let i = 0; i < treeData.branches.length; i++) {
                const b = treeData.branches[i];
                if (mode === 'natural') {
                    colorHelper.lerpColors(new THREE.Color(0x8B4513), new THREE.Color(0x228B22), b.depth / Math.max(1, treeData.maxDepth));
                } else if (mode === 'depth') {
                    colorHelper.setHSL(b.depth / Math.max(1, treeData.maxDepth), 1.0, 0.5);
                } else if (mode === 'stress') {
                    colorHelper.lerpColors(new THREE.Color(0xff0000), new THREE.Color(0x0000ff), b.dist / Math.max(0.1, treeData.maxDist));
                }
                branchMesh.setColorAt(i, colorHelper);
            }
            branchMesh.instanceColor.needsUpdate = true;

            for (let i = 0; i < treeData.leaves.length; i++) {
                const l = treeData.leaves[i];
                if (mode === 'natural') {
                    colorHelper.setHex(0x44cc44);
                } else if (mode === 'depth') {
                    colorHelper.setHSL(l.depth / Math.max(1, treeData.maxDepth), 1.0, 0.5);
                } else if (mode === 'stress') {
                    colorHelper.lerpColors(new THREE.Color(0xff0000), new THREE.Color(0x0000ff), l.dist / Math.max(0.1, treeData.maxDist));
                }
                leafMesh.setColorAt(i, colorHelper);
            }
            leafMesh.instanceColor.needsUpdate = true;
        }

        function buildMeshes() {
            // Cleanup old meshes
            plantGroup.clear();
            debugGroup.remove(debugBranchBoxes, debugLeafBoxes, velocityVectors);

            const bCount = treeData.branches.length;
            const lCount = treeData.leaves.length;

            window.__3D_STATE__.branchCount = bCount;
            window.__3D_STATE__.leafCount = lCount;
            window.__3D_STATE__.totalMeshCount = bCount + lCount;

            if (bCount > 0) {
                branchMesh = new THREE.InstancedMesh(branchGeo, branchMat, bCount);
                branchMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                plantGroup.add(branchMesh);

                debugBranchBoxes = new THREE.InstancedMesh(boxGeo, debugBoxMat, bCount);
                debugBranchBoxes.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                debugGroup.add(debugBranchBoxes);

                velocityVectors = new THREE.InstancedMesh(velocityGeo, velocityMat, bCount);
                velocityVectors.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                debugGroup.add(velocityVectors);
            }

            if (lCount > 0) {
                leafMesh = new THREE.InstancedMesh(leafGeo, leafMat, lCount);
                leafMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                plantGroup.add(leafMesh);

                debugLeafBoxes = new THREE.InstancedMesh(leafBoxGeo, debugBoxMat, lCount);
                debugLeafBoxes.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                debugGroup.add(debugLeafBoxes);
            }

            updateColors();
        }

        // --- Animation & Growth Logic ---
        let growthTimer = 0;
        const growthDuration = 2.0;
        let startFrontDist = 0;
        let endFrontDist = 0;

        function triggerGrowth() {
            const state = window.__3D_STATE__;
            if (state.isGrowing || state.generation >= state.maxGeneration) return;

            startFrontDist = treeData.maxDist;
            state.generation++;
            state.lsystemString = generateLSystemString(state.generation);
            treeData = parseLSystem(state.lsystemString);
            endFrontDist = treeData.maxDist;

            buildMeshes();
            state.isGrowing = true;
            growthTimer = 0;
        }

        function resetPlant() {
            const state = window.__3D_STATE__;
            state.generation = 0;
            state.isGrowing = false;
            startFrontDist = 0;
            state.lsystemString = generateLSystemString(state.generation);
            treeData = parseLSystem(state.lsystemString);
            endFrontDist = treeData.maxDist;
            buildMeshes();
            
            // Force full scale immediately
            startFrontDist = endFrontDist;
            updateInstances(1.0);
        }

        function updateInstances(progress) {
            if (!branchMesh) return;

            const currentFrontDist = THREE.MathUtils.lerp(startFrontDist, endFrontDist, progress);
            
            let minX = Infinity, minY = Infinity, minZ = Infinity;
            let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
            
            let totalWeight = 0;
            let comSum = new THREE.Vector3();

            const up = new THREE.Vector3(0, 1, 0);

            // Update Branches
            for (let i = 0; i < treeData.branches.length; i++) {
                const b = treeData.branches[i];
                let scaleY = 0;
                
                if (b.dist < startFrontDist) {
                    scaleY = 1.0; // Old branch, fully grown
                } else {
                    // New branch, growing
                    scaleY = THREE.MathUtils.clamp((currentFrontDist - b.dist) / b.length, 0, 1);
                }

                if (scaleY > 0) {
                    dummy.position.copy(b.start);
                    dummy.quaternion.setFromUnitVectors(up, b.dir);
                    dummy.scale.set(b.radius, b.length * scaleY, b.radius);
                    dummy.updateMatrix();
                    branchMesh.setMatrixAt(i, dummy.matrix);

                    // Debug Box
                    if (window.__3D_STATE__.debugOverlayActive) {
                        dummy.scale.set(b.radius * 2, b.length * scaleY, b.radius * 2);
                        dummy.updateMatrix();
                        debugBranchBoxes.setMatrixAt(i, dummy.matrix);

                        // Velocity Vector
                        if (window.__3D_STATE__.isGrowing) {
                            dummy.scale.set(1, b.length * scaleY, 1);
                            dummy.updateMatrix();
                            velocityVectors.setMatrixAt(i, dummy.matrix);
                        } else {
                            dummy.scale.set(0,0,0);
                            dummy.updateMatrix();
                            velocityVectors.setMatrixAt(i, dummy.matrix);
                        }
                    }

                    // Bounds & CoM
                    const endPos = b.start.clone().add(b.dir.clone().multiplyScalar(b.length * scaleY));
                    minX = Math.min(minX, b.start.x, endPos.x);
                    minY = Math.min(minY, b.start.y, endPos.y);
                    minZ = Math.min(minZ, b.start.z, endPos.z);
                    maxX = Math.max(maxX, b.start.x, endPos.x);
                    maxY = Math.max(maxY, b.start.y, endPos.y);
                    maxZ = Math.max(maxZ, b.start.z, endPos.z);

                    const center = b.start.clone().add(b.dir.clone().multiplyScalar(b.length * scaleY / 2));
                    const weight = b.length * scaleY;
                    comSum.add(center.multiplyScalar(weight));
                    totalWeight += weight;
                } else {
                    dummy.scale.set(0,0,0);
                    dummy.updateMatrix();
                    branchMesh.setMatrixAt(i, dummy.matrix);
                    if (debugBranchBoxes) debugBranchBoxes.setMatrixAt(i, dummy.matrix);
                    if (velocityVectors) velocityVectors.setMatrixAt(i, dummy.matrix);
                }
            }
            branchMesh.instanceMatrix.needsUpdate = true;
            if (debugBranchBoxes) debugBranchBoxes.instanceMatrix.needsUpdate = true;
            if (velocityVectors) velocityVectors.instanceMatrix.needsUpdate = true;

            // Update Leaves
            if (leafMesh) {
                for (let i = 0; i < treeData.leaves.length; i++) {
                    const l = treeData.leaves[i];
                    let scale = 0;
                    
                    if (l.dist <= currentFrontDist) {
                        // Leaf appears when front reaches it
                        scale = THREE.MathUtils.clamp((currentFrontDist - l.dist) / 0.2, 0, 1);
                    }

                    if (scale > 0) {
                        dummy.position.copy(l.pos);
                        dummy.quaternion.identity();
                        dummy.scale.setScalar(l.radius * scale);
                        dummy.updateMatrix();
                        leafMesh.setMatrixAt(i, dummy.matrix);

                        if (window.__3D_STATE__.debugOverlayActive) {
                            dummy.scale.setScalar(l.radius * scale * 2);
                            dummy.updateMatrix();
                            debugLeafBoxes.setMatrixAt(i, dummy.matrix);
                        }

                        minX = Math.min(minX, l.pos.x - l.radius);
                        minY = Math.min(minY, l.pos.y - l.radius);
                        minZ = Math.min(minZ, l.pos.z - l.radius);
                        maxX = Math.max(maxX, l.pos.x + l.radius);
                        maxY = Math.max(maxY, l.pos.y + l.radius);
                        maxZ = Math.max(maxZ, l.pos.z + l.radius);

                        const weight = 0.1 * scale;
                        comSum.add(l.pos.clone().multiplyScalar(weight));
                        totalWeight += weight;
                    } else {
                        dummy.scale.set(0,0,0);
                        dummy.updateMatrix();
                        leafMesh.setMatrixAt(i, dummy.matrix);
                        if (debugLeafBoxes) debugLeafBoxes.setMatrixAt(i, dummy.matrix);
                    }
                }
                leafMesh.instanceMatrix.needsUpdate = true;
                if (debugLeafBoxes) debugLeafBoxes.instanceMatrix.needsUpdate = true;
            }

            // Update State Bounds & CoM
            if (totalWeight > 0) {
                const com = comSum.divideScalar(totalWeight);
                window.__3D_STATE__.centerOfMass = { x: com.x, y: com.y, z: com.z };
                
                if (window.__3D_STATE__.debugOverlayActive) {
                    comGeo.setFromPoints([new THREE.Vector3(0,0,0), com]);
                }

                window.__3D_STATE__.boundingBox = {
                    width: Math.max(0, maxX - minX),
                    height: Math.max(0, maxY - minY),
                    depth: Math.max(0, maxZ - minZ)
                };
            }
        }

        // --- Input Handling ---
        function toggleDebug() {
            const state = window.__3D_STATE__;
            state.debugOverlayActive = !state.debugOverlayActive;
            debugGroup.visible = state.debugOverlayActive;
            document.getElementById('hud').style.display = state.debugOverlayActive ? 'block' : 'none';
            // Force update to show/hide boxes correctly based on current scale
            updateInstances(state.isGrowing ? growthTimer / growthDuration : 1.0);
        }

        function toggleWind() {
            const state = window.__3D_STATE__;
            if (state.windStrength === 0) state.windStrength = 0.5;
            else if (state.windStrength === 0.5) state.windStrength = 1.0;
            else state.windStrength = 0;
            state.windActive = state.windStrength > 0;
        }

        function cycleColor() {
            const state = window.__3D_STATE__;
            const modes = ['natural', 'depth', 'stress'];
            let idx = modes.indexOf(state.colorMode);
            state.colorMode = modes[(idx + 1) % modes.length];
            updateColors();
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'g') triggerGrowth();
            if (key === 'r') resetPlant();
            if (key === 'd') toggleDebug();
            if (key === 'w') toggleWind();
            if (key === 'c') cycleColor();
        });

        document.getElementById('btn-grow').addEventListener('click', triggerGrowth);
        document.getElementById('btn-reset').addEventListener('click', resetPlant);
        document.getElementById('btn-debug').addEventListener('click', toggleDebug);
        document.getElementById('btn-wind').addEventListener('click', toggleWind);
        document.getElementById('btn-color').addEventListener('click', cycleColor);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();
        let frames = 0;
        let prevTime = performance.now();

        // Initialize Gen 0
        resetPlant();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const state = window.__3D_STATE__;

            // FPS Calculation
            frames++;
            const currTime = performance.now();
            if (currTime >= prevTime + 1000) {
                state.fps = Math.round((frames * 1000) / (currTime - prevTime));
                frames = 0;
                prevTime = currTime;
            }

            // Wind Update
            windUniforms.uTime.value = time;
            windUniforms.uWindStrength.value = state.windStrength;

            // Growth Animation
            if (state.isGrowing) {
                growthTimer += delta;
                let progress = growthTimer / growthDuration;
                if (progress >= 1.0) {
                    progress = 1.0;
                    state.isGrowing = false;
                }
                updateInstances(progress);
            } else if (state.debugOverlayActive) {
                // Keep updating instances in debug mode to ensure velocity vectors hide
                updateInstances(1.0);
            }

            // Update HUD
            if (state.debugOverlayActive) {
                document.getElementById('hud-fps').innerText = state.fps;
                document.getElementById('hud-gen').innerText = `${state.generation} / ${state.maxGeneration}`;
                document.getElementById('hud-branches').innerText = state.branchCount;
                document.getElementById('hud-leaves').innerText = state.leafCount;
                document.getElementById('hud-meshes').innerText = state.totalMeshCount;
                document.getElementById('hud-bounds').innerText = `${state.boundingBox.width.toFixed(2)} x ${state.boundingBox.height.toFixed(2)} x ${state.boundingBox.depth.toFixed(2)}`;
                document.getElementById('hud-com').innerText = `${state.centerOfMass.x.toFixed(2)}, ${state.centerOfMass.y.toFixed(2)}, ${state.centerOfMass.z.toFixed(2)}`;
                document.getElementById('hud-wind').innerText = state.windStrength.toFixed(1);
                document.getElementById('hud-color').innerText = state.colorMode;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
