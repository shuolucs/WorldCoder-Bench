<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D L-System Plant Growth Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Courier New', monospace; }
canvas { display: block; }
#hud {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0, 0, 0, 0.75);
    color: #00ff88;
    padding: 15px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.8;
    min-width: 260px;
    border: 1px solid rgba(0, 255, 136, 0.3);
    display: none;
    z-index: 100;
}
#hud .label { color: #88aacc; }
#hud .value { color: #00ff88; font-weight: bold; }
#buttons {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 100;
}
#buttons button {
    background: rgba(0, 0, 0, 0.7);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    transition: all 0.2s;
}
#buttons button:hover {
    background: rgba(50, 50, 80, 0.8);
    border-color: rgba(255, 255, 255, 0.6);
}
#buttons button:active {
    background: rgba(80, 80, 120, 0.9);
}
#info {
    position: fixed;
    top: 10px;
    left: 10px;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    z-index: 100;
}
</style>
</head>
<body>
<div id="info">L-System Plant Growth Simulator</div>
<div id="hud">
    <div><span class="label">Generation: </span><span class="value" id="hud-gen">0</span></div>
    <div><span class="label">Branch Count: </span><span class="value" id="hud-branches">0</span></div>
    <div><span class="label">Leaf Count: </span><span class="value" id="hud-leaves">0</span></div>
    <div><span class="label">Total Meshes: </span><span class="value" id="hud-meshes">0</span></div>
    <div><span class="label">Bounding Box: </span><span class="value" id="hud-bbox">0 x 0 x 0</span></div>
    <div><span class="label">Center of Mass: </span><span class="value" id="hud-com">(0, 0, 0)</span></div>
    <div><span class="label">Wind Strength: </span><span class="value" id="hud-wind">0</span></div>
    <div><span class="label">Color Mode: </span><span class="value" id="hud-color">natural</span></div>
    <div><span class="label">Growing: </span><span class="value" id="hud-growing">false</span></div>
    <div><span class="label">FPS: </span><span class="value" id="hud-fps">0</span></div>
</div>
<div id="buttons">
    <button onclick="growPlant()">Grow (G)</button>
    <button onclick="resetPlant()">Reset (R)</button>
    <button onclick="toggleDebug()">Debug (D)</button>
    <button onclick="toggleWind()">Wind (W)</button>
    <button onclick="cycleColor()">Color (C)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 3, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x334455, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x1a3a1a });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 20, 0x2a4a2a, 0x1a3a1a);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ============ ORBIT CONTROLS (simple) ============
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 3, radius: 12 };
let target = new THREE.Vector3(0, 3, 0);

function updateCamera() {
    camera.position.x = target.x + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
    camera.position.y = target.y + spherical.radius * Math.cos(spherical.phi);
    camera.position.z = target.z + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
    camera.lookAt(target);
}

renderer.domElement.addEventListener('mousedown', (e) => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi + dy * 0.005));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCamera();
});
renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
renderer.domElement.addEventListener('wheel', (e) => {
    spherical.radius = Math.max(3, Math.min(30, spherical.radius + e.deltaY * 0.01));
    updateCamera();
});
updateCamera();

// ============ L-SYSTEM ============
const lsystemRules = { 'F': 'FF+[+F-F-F]-[-F+F+F]' };
const angle = 25 * Math.PI / 180;
const branchHeight = 0.4;

let currentGeneration = 0;
let currentString = 'F';
let maxGeneration = 5;

function generateLSystem(axiom, rules, generations) {
    let str = axiom;
    for (let i = 0; i < generations; i++) {
        let next = '';
        for (let ch of str) {
            next += rules[ch] || ch;
        }
        str = next;
    }
    return str;
}

// ============ PLANT GROUP ============
const plantGroup = new THREE.Group();
scene.add(plantGroup);

const debugGroup = new THREE.Group();
debugGroup.visible = false;
scene.add(debugGroup);

// Branch and leaf data
let branches = [];
let leaves = [];
let branchMeshes = [];
let leafMeshes = [];
let debugMeshes = [];
let centerOfMassLine = null;
let velocityArrows = [];

// Growth animation
let isGrowing = false;
let growthStartTime = 0;
let growthDuration = 2000;
let growthTargets = []; // { mesh, startScale, endScale, startPos, endPos }

// Wind
let windStrength = 0;
let windStates = [0, 0.5, 1.0, 0];
let windIndex = 0;

// Color mode
let colorMode = 'natural';
let colorModes = ['natural', 'depth', 'stress'];
let colorIndex = 0;

// Debug
let debugOverlayActive = false;

// FPS
let fps = 0;
let frameCount = 0;
let lastFpsTime = performance.now();

// ============ STATE ============
window.__3D_STATE__ = {
    generation: 0,
    branchCount: 0,
    leafCount: 0,
    totalMeshCount: 0,
    debugOverlayActive: false,
    windStrength: 0,
    windActive: false,
    colorMode: 'natural',
    isGrowing: false,
    boundingBox: { width: 0, height: 0, depth: 0 },
    centerOfMass: { x: 0, y: 0, z: 0 },
    fps: 0,
    plantPosition: { x: 0, y: 0, z: 0 },
    lsystemString: 'F',
    maxGeneration: 5
};

// ============ PLANT BUILDING ============
function interpretLSystem(str, animate = false) {
    // Clear previous
    while (plantGroup.children.length > 0) plantGroup.remove(plantGroup.children[0]);
    branches = [];
    leaves = [];
    branchMeshes = [];
    leafMeshes = [];
    growthTargets = [];

    const stack = [];
    let pos = new THREE.Vector3(0, 0, 0);
    let dir = new THREE.Vector3(0, 1, 0);
    let right = new THREE.Vector3(1, 0, 0);
    let depth = 0;
    let maxDepth = 0;

    // First pass to find max depth
    {
        let d = 0;
        for (let ch of str) {
            if (ch === '[') d++;
            if (ch === ']') d--;
            if (d > maxDepth) maxDepth = d;
        }
    }
    if (maxDepth === 0) maxDepth = 1;

    let allPositions = [];

    for (let i = 0; i < str.length; i++) {
        const ch = str[i];

        if (ch === 'F') {
            const startPos = pos.clone();
            const endPos = pos.clone().add(dir.clone().multiplyScalar(branchHeight));

            // Branch thickness based on depth
            const radiusScale = Math.max(0.02, 0.05 * (1 - depth / (maxDepth + 1)) + 0.01);
            const geo = new THREE.CylinderGeometry(radiusScale * 0.7, radiusScale, branchHeight, 6, 1);

            // Color based on mode
            const mat = new THREE.MeshLambertMaterial({ color: getBranchColor(depth, maxDepth, startPos) });

            const mesh = new THREE.Mesh(geo, mat);

            // Position and orient the cylinder
            const midPos = startPos.clone().add(endPos).multiplyScalar(0.5);
            mesh.position.copy(midPos);

            // Orient cylinder along direction
            const quaternion = new THREE.Quaternion();
            quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
            mesh.quaternion.copy(quaternion);

            mesh.castShadow = true;
            mesh.userData = { type: 'branch', depth: depth, startPos: startPos.clone(), endPos: endPos.clone(), dir: dir.clone(), originalPos: midPos.clone(), height: midPos.y };

            if (animate) {
                mesh.scale.y = 0.01;
                mesh.scale.x = 0.01;
                mesh.scale.z = 0.01;
                growthTargets.push({
                    mesh: mesh,
                    targetScaleX: 1,
                    targetScaleY: 1,
                    targetScaleZ: 1,
                    targetPos: midPos.clone(),
                    startPos: startPos.clone(),
                    dir: dir.clone()
                });
            }

            plantGroup.add(mesh);
            branchMeshes.push(mesh);
            branches.push({ start: startPos.clone(), end: endPos.clone(), depth: depth, mesh: mesh });
            allPositions.push(midPos.clone());

            pos = endPos.clone();

            // Check if next char is not 'F' or end - add leaf
            const nextCh = i + 1 < str.length ? str[i + 1] : '';
            if (nextCh !== 'F' && (nextCh === ']' || nextCh === '' || nextCh === '+' || nextCh === '-')) {
                // Potential leaf position - add leaf at tips
                if (depth > 0 || str.length < 5) {
                    addLeaf(endPos.clone(), depth, maxDepth, animate);
                }
            }
        } else if (ch === '+') {
            // Rotate around Z axis (or a random axis for 3D effect)
            const axis = new THREE.Vector3(0, 0, 1).applyQuaternion(
                new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize())
            );
            // Add slight random 3D rotation
            const rotAxis = new THREE.Vector3(
                Math.sin(i * 0.7) * 0.3,
                0,
                1
            ).normalize();
            dir.applyAxisAngle(rotAxis, angle);
            dir.normalize();
        } else if (ch === '-') {
            const rotAxis = new THREE.Vector3(
                Math.sin(i * 0.7) * 0.3,
                0,
                1
            ).normalize();
            dir.applyAxisAngle(rotAxis, -angle);
            dir.normalize();
        } else if (ch === '[') {
            stack.push({ pos: pos.clone(), dir: dir.clone(), depth: depth });
            depth++;
        } else if (ch === ']') {
            if (stack.length > 0) {
                // Add leaf at tip before popping
                addLeaf(pos.clone(), depth, maxDepth, animate);

                const state = stack.pop();
                pos = state.pos;
                dir = state.dir;
                depth = state.depth;
            }
        }
    }

    // Add leaf at final position
    if (str.includes('F')) {
        addLeaf(pos.clone(), depth, maxDepth, animate);
    }
}

function addLeaf(position, depth, maxDepth, animate) {
    const geo = new THREE.IcosahedronGeometry(0.08, 0);
    const mat = new THREE.MeshLambertMaterial({ color: getLeafColor(depth, maxDepth, position) });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    mesh.userData = { type: 'leaf', depth: depth, originalPos: position.clone(), height: position.y };
    mesh.castShadow = true;

    if (animate) {
        mesh.scale.set(0.01, 0.01, 0.01);
        growthTargets.push({
            mesh: mesh,
            targetScaleX: 1,
            targetScaleY: 1,
            targetScaleZ: 1,
            targetPos: position.clone(),
            startPos: position.clone(),
            dir: new THREE.Vector3(0, 1, 0)
        });
    }

    plantGroup.add(mesh);
    leafMeshes.push(mesh);
    leaves.push({ pos: position.clone(), depth: depth, mesh: mesh });
}

function getBranchColor(depth, maxDepth, position) {
    if (colorMode === 'natural') {
        const t = depth / Math.max(maxDepth, 1);
        const brown = new THREE.Color(0x8B4513);
        const green = new THREE.Color(0x228B22);
        return brown.clone().lerp(green, t);
    } else if (colorMode === 'depth') {
        const hue = (depth / Math.max(maxDepth, 1)) * 0.8;
        return new THREE.Color().setHSL(hue, 0.8, 0.5);
    } else if (colorMode === 'stress') {
        const dist = position.length();
        const maxDist = 5;
        const t = Math.min(dist / maxDist, 1);
        const red = new THREE.Color(0xff0000);
        const blue = new THREE.Color(0x0000ff);
        return red.clone().lerp(blue, t);
    }
    return new THREE.Color(0x8B4513);
}

function getLeafColor(depth, maxDepth, position) {
    if (colorMode === 'natural') {
        return new THREE.Color(0x44cc44);
    } else if (colorMode === 'depth') {
        const hue = (depth / Math.max(maxDepth, 1)) * 0.8;
        return new THREE.Color().setHSL(hue, 0.9, 0.6);
    } else if (colorMode === 'stress') {
        const dist = position.length();
        const maxDist = 5;
        const t = Math.min(dist / maxDist, 1);
        return new THREE.Color().setHSL(0.6 * t, 0.8, 0.5);
    }
    return new THREE.Color(0x44cc44);
}

function updateColors() {
    let maxDepth = 0;
    branchMeshes.forEach(m => { if (m.userData.depth > maxDepth) maxDepth = m.userData.depth; });
    if (maxDepth === 0) maxDepth = 1;

    branchMeshes.forEach(mesh => {
        mesh.material.color.copy(getBranchColor(mesh.userData.depth, maxDepth, mesh.userData.originalPos || mesh.position));
    });
    leafMeshes.forEach(mesh => {
        mesh.material.color.copy(getLeafColor(mesh.userData.depth, maxDepth, mesh.userData.originalPos || mesh.position));
    });
}

// ============ DEBUG OVERLAY ============
function updateDebugOverlay() {
    // Clear previous debug meshes
    while (debugGroup.children.length > 0) debugGroup.remove(debugGroup.children[0]);
    debugMeshes = [];
    velocityArrows = [];

    if (!debugOverlayActive) return;

    const bbMaterial = new THREE.LineBasicMaterial({ color: 0xffff00 });

    // Bounding boxes for branches and leaves
    plantGroup.children.forEach(mesh => {
        if (!mesh.geometry) return;
        mesh.geometry.computeBoundingBox();
        const bb = mesh.geometry.boundingBox.clone();

        // Create wireframe box
        const size = new THREE.Vector3();
        bb.getSize(size);
        const boxGeo = new THREE.BoxGeometry(size.x, size.y, size.z);
        const edges = new THREE.EdgesGeometry(boxGeo);
        const wireframe = new THREE.LineSegments(edges, bbMaterial);

        const center = new THREE.Vector3();
        bb.getCenter(center);
        wireframe.position.copy(center);
        wireframe.quaternion.copy(mesh.quaternion);
        wireframe.position.copy(mesh.position);

        debugGroup.add(wireframe);
        debugMeshes.push(wireframe);
    });

    // Center of mass line
    if (branchMeshes.length > 0 || leafMeshes.length > 0) {
        const com = computeCenterOfMass();
        const comMaterial = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 2 });
        const points = [
            new THREE.Vector3(0, 0, 0),
            new THREE.Vector3(com.x, com.y, com.z)
        ];
        const comGeo = new THREE.BufferGeometry().setFromPoints(points);
        const comLine = new THREE.Line(comGeo, comMaterial);
        debugGroup.add(comLine);
        centerOfMassLine = comLine;

        // COM marker
        const markerGeo = new THREE.SphereGeometry(0.1, 8, 8);
        const markerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.position.set(com.x, com.y, com.z);
        debugGroup.add(marker);
    }

    // Velocity arrows during growth
    if (isGrowing) {
        const velMaterial = new THREE.LineBasicMaterial({ color: 0x0000ff });
        branchMeshes.forEach(mesh => {
            if (mesh.userData.dir) {
                const start = mesh.position.clone();
                const end = start.clone().add(mesh.userData.dir.clone().multiplyScalar(0.3));
                const points = [start, end];
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geo, velMaterial);
                debugGroup.add(line);
                velocityArrows.push(line);

                // Arrow head
                const arrowGeo = new THREE.ConeGeometry(0.03, 0.1, 4);
                const arrowMat = new THREE.MeshBasicMaterial({ color: 0x0000ff });
                const arrow = new THREE.Mesh(arrowGeo, arrowMat);
                arrow.position.copy(end);
                const q = new THREE.Quaternion();
                q.setFromUnitVectors(new THREE.Vector3(0, 1, 0), mesh.userData.dir.clone().normalize());
                arrow.quaternion.copy(q);
                debugGroup.add(arrow);
            }
        });
    }
}

function computeCenterOfMass() {
    let totalMass = 0;
    let weightedPos = new THREE.Vector3(0, 0, 0);

    branchMeshes.forEach(mesh => {
        const mass = 1;
        weightedPos.add(mesh.position.clone().multiplyScalar(mass));
        totalMass += mass;
    });

    leafMeshes.forEach(mesh => {
        const mass = 0.5;
        weightedPos.add(mesh.position.clone().multiplyScalar(mass));
        totalMass += mass;
    });

    if (totalMass > 0) {
        weightedPos.divideScalar(totalMass);
    }

    return weightedPos;
}

function computeBoundingBox() {
    if (plantGroup.children.length === 0) return { width: 0, height: 0, depth: 0 };

    const box = new THREE.Box3();
    plantGroup.children.forEach(child => {
        if (child.geometry) {
            child.geometry.computeBoundingBox();
            const childBox = child.geometry.boundingBox.clone();
            childBox.applyMatrix4(child.matrixWorld);
            box.union(childBox);
        }
    });

    if (box.isEmpty()) return { width: 0, height: 0, depth: 0 };

    const size = new THREE.Vector3();
    box.getSize(size);
    return { width: parseFloat(size.x.toFixed(2)), height: parseFloat(size.y.toFixed(2)), depth: parseFloat(size.z.toFixed(2)) };
}

// ============ ACTIONS ============
function growPlant() {
    if (isGrowing || currentGeneration >= maxGeneration) return;

    currentGeneration++;
    currentString = generateLSystem('F', lsystemRules, currentGeneration);

    isGrowing = true;
    growthStartTime = performance.now();

    interpretLSystem(currentString, true);
    updateDebugOverlay();
}

function resetPlant() {
    currentGeneration = 0;
    currentString = 'F';
    isGrowing = false;
    growthTargets = [];

    interpretLSystem(currentString, false);
    updateDebugOverlay();
}

function toggleDebug() {
    debugOverlayActive = !debugOverlayActive;
    debugGroup.visible = debugOverlayActive;
    document.getElementById('hud').style.display = debugOverlayActive ? 'block' : 'none';
    updateDebugOverlay();
}

function toggleWind() {
    windIndex = (windIndex + 1) % windStates.length;
    windStrength = windStates[windIndex];
}

function cycleColor() {
    colorIndex = (colorIndex + 1) % colorModes.length;
    colorMode = colorModes[colorIndex];
    updateColors();
    updateDebugOverlay();
}

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'g') growPlant();
    else if (key === 'r') resetPlant();
    else if (key === 'd') toggleDebug();
    else if (key === 'w') toggleWind();
    else if (key === 'c') cycleColor();
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const time = clock.getElapsedTime();

    // FPS calculation
    frameCount++;
    if (now - lastFpsTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastFpsTime = now;
    }

    // Growth animation
    if (isGrowing) {
        const elapsed = now - growthStartTime;
        const progress = Math.min(elapsed / growthDuration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease out cubic

        growthTargets.forEach(target => {
            target.mesh.scale.x = 0.01 + (target.targetScaleX - 0.01) * eased;
            target.mesh.scale.y = 0.01 + (target.targetScaleY - 0.01) * eased;
            target.mesh.scale.z = 0.01 + (target.targetScaleZ - 0.01) * eased;
        });

        if (progress >= 1) {
            isGrowing = false;
            growthTargets = [];
        }

        if (debugOverlayActive) {
            updateDebugOverlay();
        }
    }

    // Wind simulation
    if (windStrength > 0) {
        branchMeshes.forEach(mesh => {
            if (mesh.userData.originalPos) {
                const h = mesh.userData.height || 0;
                const dx = Math.sin(time * 2 + h) * 0.1 * windStrength;
                const dz = Math.sin(time * 1.5 + h * 0.7) * 0.05 * windStrength;
                mesh.position.x = mesh.userData.originalPos.x + dx;
                mesh.position.z = mesh.userData.originalPos.z + dz;
            }
        });

        leafMeshes.forEach(mesh => {
            if (mesh.userData.originalPos) {
                const h = mesh.userData.height || 0;
                const multiplier = 1.5;
                const dx = Math.sin(time * 2 + h) * 0.1 * windStrength * multiplier;
                const dz = Math.sin(time * 1.5 + h * 0.7) * 0.05 * windStrength * multiplier;
                const dy = Math.sin(time * 3 + h * 1.3) * 0.02 * windStrength * multiplier;
                mesh.position.x = mesh.userData.originalPos.x + dx;
                mesh.position.y = mesh.userData.originalPos.y + dy;
                mesh.position.z = mesh.userData.originalPos.z + dz;
            }
        });

        if (debugOverlayActive) {
            updateDebugOverlay();
        }
    } else {
        // Reset positions when wind is off
        branchMeshes.forEach(mesh => {
            if (mesh.userData.originalPos) {
                mesh.position.copy(mesh.userData.originalPos);
            }
        });
        leafMeshes.forEach(mesh => {
            if (mesh.userData.originalPos) {
                mesh.position.copy(mesh.userData.originalPos);
            }
        });
    }

    // Update state
    const bbox = computeBoundingBox();
    const com = computeCenterOfMass();

    window.__3D_STATE__ = {
        generation: currentGeneration,
        branchCount: branchMeshes.length,
        leafCount: leafMeshes.length,
        totalMeshCount: plantGroup.children.length,
        debugOverlayActive: debugOverlayActive,
        windStrength: windStrength,
        windActive: windStrength > 0,
        colorMode: colorMode,
        isGrowing: isGrowing,
        boundingBox: bbox,
        centerOfMass: { x: parseFloat(com.x.toFixed(3)), y: parseFloat(com.y.toFixed(3)), z: parseFloat(com.z.toFixed(3)) },
        fps: fps,
        plantPosition: { x: 0, y: 0, z: 0 },
        lsystemString: currentString,
        maxGeneration: maxGeneration
    };

    // Update HUD
    if (debugOverlayActive) {
        document.getElementById('hud-gen').textContent = currentGeneration;
        document.getElementById('hud-branches').textContent = branchMeshes.length;
        document.getElementById('hud-leaves').textContent = leafMeshes.length;
        document.getElementById('hud-meshes').textContent = plantGroup.children.length;
        document.getElementById('hud-bbox').textContent = `${bbox.width} x ${bbox.height} x ${bbox.depth}`;
        document.getElementById('hud-com').textContent = `(${com.x.toFixed(2)}, ${com.y.toFixed(2)}, ${com.z.toFixed(2)})`;
        document.getElementById('hud-wind').textContent = windStrength;
        document.getElementById('hud-color').textContent = colorMode;
        document.getElementById('hud-growing').textContent = isGrowing;
        document.getElementById('hud-fps').textContent = fps;
    }

    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
interpretLSystem(currentString, false);
animate();
</script>
</body>
</html>
