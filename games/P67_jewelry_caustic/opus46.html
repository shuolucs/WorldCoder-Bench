<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring Jewelry Showcase</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  
  #controls {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(15, 15, 15, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 12px;
    padding: 20px;
    color: #e0d0b0;
    width: 260px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  
  #controls h2 {
    font-size: 16px;
    margin-bottom: 16px;
    color: #ffd700;
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    padding-bottom: 10px;
  }
  
  .control-group {
    margin-bottom: 14px;
  }
  
  .control-group label {
    display: block;
    font-size: 12px;
    margin-bottom: 6px;
    color: #b0a080;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  
  select, input[type="range"] {
    width: 100%;
    background: rgba(30, 30, 30, 0.8);
    border: 1px solid rgba(255, 215, 0, 0.15);
    color: #e0d0b0;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  
  select:hover, input[type="range"]:hover {
    border-color: rgba(255, 215, 0, 0.4);
  }
  
  select option {
    background: #1a1a1a;
    color: #e0d0b0;
  }
  
  input[type="range"] {
    -webkit-appearance: none;
    height: 6px;
    padding: 0;
    border-radius: 3px;
    background: linear-gradient(90deg, rgba(255,215,0,0.2), rgba(255,215,0,0.5));
  }
  
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #ffd700;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(255,215,0,0.5);
  }
  
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .checkbox-group input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: #ffd700;
    cursor: pointer;
  }
  
  .checkbox-group label {
    margin: 0;
    cursor: pointer;
  }
  
  #angleValue {
    color: #ffd700;
    font-size: 12px;
    float: right;
  }
  
  #info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 215, 0, 0.4);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="controls">
  <h2>💎 Ring Showcase</h2>
  
  <div class="control-group">
    <label>Gem Preset</label>
    <select id="presetSelect">
      <option value="diamond">Diamond</option>
      <option value="ruby">Ruby</option>
      <option value="sapphire">Sapphire</option>
      <option value="emerald">Emerald</option>
    </select>
  </div>
  
  <div class="control-group">
    <label>Light Angle <span id="angleValue">0°</span></label>
    <input type="range" id="lightAngle" min="0" max="360" value="0" step="1">
  </div>
  
  <div class="control-group checkbox-group">
    <input type="checkbox" id="autoRotateToggle" checked>
    <label for="autoRotateToggle">Auto Rotate</label>
  </div>
</div>

<div id="info">Drag to rotate • Scroll to zoom</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// ============================================================
// CHROMATIC ABERRATION SHADER
// This simulates color dispersion (chromatic aberration) by
// sampling the rendered image at slightly offset UV coordinates
// for each RGB channel. Real dispersion in gems like diamond
// splits white light into spectral colors due to wavelength-
// dependent refractive indices. Here we approximate this as a
// post-process radial chromatic aberration effect.
// ============================================================
const ChromaticAberrationShader = {
  uniforms: {
    tDiffuse: { value: null },
    strength: { value: 0.003 },
    resolution: { value: new THREE.Vector2(1, 1) }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float strength;
    uniform vec2 resolution;
    varying vec2 vUv;
    
    void main() {
      vec2 center = vec2(0.5);
      vec2 dir = vUv - center;
      float dist = length(dir);
      
      // Radial chromatic aberration: offset R and B channels
      vec2 offsetR = dir * strength * dist;
      vec2 offsetB = -dir * strength * dist;
      
      float r = texture2D(tDiffuse, vUv + offsetR).r;
      float g = texture2D(tDiffuse, vUv).g;
      float b = texture2D(tDiffuse, vUv + offsetB).b;
      
      gl_FragColor = vec4(r, g, b, 1.0);
    }
  `
};

// ============================================================
// GEM PRESETS
// ior values approximate real gemstones:
//   Diamond ~2.42, Ruby ~1.77, Sapphire ~1.77, Emerald ~1.58
// ============================================================
const GEM_PRESETS = {
  diamond: {
    color: new THREE.Color(0xffffff),
    ior: 2.42,
    transmission: 0.98,
    thickness: 1.5,
    roughness: 0.0,
    attenuationColor: new THREE.Color(0xffffff),
    attenuationDistance: 5.0,
    dispersion: 0.005,
    specularIntensity: 1.0,
    clearcoat: 1.0,
    label: 'Diamond'
  },
  ruby: {
    color: new THREE.Color(0xff1040),
    ior: 1.77,
    transmission: 0.85,
    thickness: 2.0,
    roughness: 0.05,
    attenuationColor: new THREE.Color(0xff0030),
    attenuationDistance: 1.5,
    dispersion: 0.003,
    specularIntensity: 0.9,
    clearcoat: 0.8,
    label: 'Ruby'
  },
  sapphire: {
    color: new THREE.Color(0x1040ff),
    ior: 1.77,
    transmission: 0.88,
    thickness: 2.0,
    roughness: 0.04,
    attenuationColor: new THREE.Color(0x0020ff),
    attenuationDistance: 1.8,
    dispersion: 0.003,
    specularIntensity: 0.9,
    clearcoat: 0.8,
    label: 'Sapphire'
  },
  emerald: {
    color: new THREE.Color(0x10ff50),
    ior: 1.58,
    transmission: 0.82,
    thickness: 2.5,
    roughness: 0.06,
    attenuationColor: new THREE.Color(0x00cc30),
    attenuationDistance: 1.2,
    dispersion: 0.002,
    specularIntensity: 0.85,
    clearcoat: 0.7,
    label: 'Emerald'
  }
};

// ============================================================
// SCENE SETUP
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2.5, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ============================================================
// POST-PROCESSING (Chromatic Aberration for dispersion)
// ============================================================
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const chromaticPass = new ShaderPass(ChromaticAberrationShader);
chromaticPass.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
composer.addPass(chromaticPass);

// ============================================================
// ENVIRONMENT MAP (procedural gradient for reflections)
// ============================================================
const pmremGenerator = new THREE.PMREMGenerator(renderer);

function createStudioEnvironment() {
  const envScene = new THREE.Scene();
  
  // Create a gradient sphere for environment
  const envGeo = new THREE.SphereGeometry(10, 64, 32);
  const envMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor: { value: new THREE.Color(0x222233) },
      bottomColor: { value: new THREE.Color(0x111111) },
      highlightColor: { value: new THREE.Color(0xffffff) }
    },
    vertexShader: `
      varying vec3 vWorldPos;
      void main() {
        vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 bottomColor;
      uniform vec3 highlightColor;
      varying vec3 vWorldPos;
      void main() {
        float y = normalize(vWorldPos).y;
        vec3 col = mix(bottomColor, topColor, y * 0.5 + 0.5);
        
        // Add bright spots for reflections
        float h1 = smoothstep(0.95, 1.0, dot(normalize(vWorldPos), normalize(vec3(2.0, 3.0, 1.0))));
        float h2 = smoothstep(0.95, 1.0, dot(normalize(vWorldPos), normalize(vec3(-1.5, 2.0, -2.0))));
        float h3 = smoothstep(0.93, 1.0, dot(normalize(vWorldPos), normalize(vec3(0.0, 1.0, 3.0))));
        col += highlightColor * (h1 * 3.0 + h2 * 2.5 + h3 * 2.0);
        
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  
  envScene.add(new THREE.Mesh(envGeo, envMat));
  
  // Add bright area lights to env
  const lightGeo = new THREE.PlaneGeometry(4, 4);
  const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
  
  const l1 = new THREE.Mesh(lightGeo, lightMat.clone());
  l1.material.color.setHex(0xffffff);
  l1.position.set(3, 4, 2);
  l1.lookAt(0, 0, 0);
  envScene.add(l1);
  
  const l2 = new THREE.Mesh(lightGeo, lightMat.clone());
  l2.material.color.setHex(0xccccff);
  l2.position.set(-3, 3, -2);
  l2.lookAt(0, 0, 0);
  envScene.add(l2);
  
  const l3 = new THREE.Mesh(lightGeo, lightMat.clone());
  l3.material.color.setHex(0xffffcc);
  l3.position.set(0, 2, 4);
  l3.lookAt(0, 0, 0);
  envScene.add(l3);
  
  const envMap = pmremGenerator.fromScene(envScene, 0.04).texture;
  envScene.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  });
  
  return envMap;
}

const envMap = createStudioEnvironment();
scene.environment = envMap;

// ============================================================
// RING GROUP
// ============================================================
const ringGroup = new THREE.Group();
scene.add(ringGroup);

// -- Ring Band (Torus) --
const bandGeometry = new THREE.TorusGeometry(1.0, 0.15, 64, 128);
const bandMaterial = new THREE.MeshStandardMaterial({
  color: 0xffd700,
  metalness: 0.95,
  roughness: 0.08,
  envMap: envMap,
  envMapIntensity: 1.5
});
const band = new THREE.Mesh(bandGeometry, bandMaterial);
band.rotation.x = Math.PI / 2;
band.castShadow = true;
band.receiveShadow = true;
ringGroup.add(band);

// -- Prong base (small cylinders to hold the gem) --
const prongMaterial = new THREE.MeshStandardMaterial({
  color: 0xffd700,
  metalness: 0.95,
  roughness: 0.08,
  envMap: envMap,
  envMapIntensity: 1.5
});

function createProng(angle) {
  const group = new THREE.Group();
  
  // Vertical prong
  const prongGeo = new THREE.CylinderGeometry(0.025, 0.035, 0.5, 12);
  const prong = new THREE.Mesh(prongGeo, prongMaterial);
  prong.position.y = 0.25;
  prong.castShadow = true;
  group.add(prong);
  
  // Small tip
  const tipGeo = new THREE.SphereGeometry(0.03, 8, 8);
  const tip = new THREE.Mesh(tipGeo, prongMaterial);
  tip.position.y = 0.48;
  group.add(tip);
  
  const radius = 0.18;
  group.position.set(
    Math.cos(angle) * radius,
    0.15,
    Math.sin(angle) * radius
  );
  
  // Slight tilt outward
  const tiltAngle = 0.15;
  group.rotation.x = Math.sin(angle) * tiltAngle;
  group.rotation.z = -Math.cos(angle) * tiltAngle;
  
  return group;
}

// 4 prongs
const prongHolder = new THREE.Group();
prongHolder.position.y = 0;
for (let i = 0; i < 4; i++) {
  prongHolder.add(createProng((i / 4) * Math.PI * 2));
}
ringGroup.add(prongHolder);

// -- Setting base --
const settingGeo = new THREE.CylinderGeometry(0.22, 0.15, 0.15, 32);
const setting = new THREE.Mesh(settingGeo, prongMaterial);
setting.position.y = 0.15;
setting.castShadow = true;
ringGroup.add(setting);

// -- Gem (Octahedron) --
const gemGeometry = new THREE.OctahedronGeometry(0.35, 2);
const gemMaterial = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0.0,
  roughness: 0.0,
  transmission: 0.98,
  thickness: 1.5,
  ior: 2.42,
  envMap: envMap,
  envMapIntensity: 2.0,
  clearcoat: 1.0,
  clearcoatRoughness: 0.0,
  specularIntensity: 1.0,
  specularColor: new THREE.Color(0xffffff),
  attenuationColor: new THREE.Color(0xffffff),
  attenuationDistance: 5.0,
  transparent: true,
  opacity: 1.0,
  side: THREE.DoubleSide,
  depthWrite: true
});

const gem = new THREE.Mesh(gemGeometry, gemMaterial);
gem.position.y = 0.55;
gem.castShadow = true;
gem.receiveShadow = true;
ringGroup.add(gem);

// Tilt ring slightly for better viewing angle
ringGroup.rotation.x = -0.3;

// ============================================================
// STUDIO THREE-POINT LIGHTING
// ============================================================

// Key light (main)
const keyLight = new THREE.DirectionalLight(0xffffff, 3.0);
keyLight.position.set(3, 4, 2);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 20;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);

// Fill light
const fillLight = new THREE.DirectionalLight(0x8888ff, 1.5);
fillLight.position.set(-3, 2, -1);
scene.add(fillLight);

// Rim/back light
const rimLight = new THREE.DirectionalLight(0xffffcc, 2.0);
rimLight.position.set(0, 3, -3);
scene.add(rimLight);

// Additional point lights for sparkle
const sparkleLight1 = new THREE.PointLight(0xffffff, 2.0, 10);
sparkleLight1.position.set(1, 2, 2);
scene.add(sparkleLight1);

const sparkleLight2 = new THREE.PointLight(0xccccff, 1.5, 10);
sparkleLight2.position.set(-2, 1, -1);
scene.add(sparkleLight2);

// Ambient for base illumination
const ambientLight = new THREE.AmbientLight(0x222233, 0.5);
scene.add(ambientLight);

// ============================================================
// FLOOR / PLATFORM
// ============================================================
const floorGeo = new THREE.CylinderGeometry(3, 3, 0.05, 64);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x111115,
  metalness: 0.8,
  roughness: 0.2,
  envMap: envMap
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.position.y = -1.05;
floor.receiveShadow = true;
scene.add(floor);

// ============================================================
// ORBIT CONTROLS
// ============================================================
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0.2, 0);
controls.minDistance = 2;
controls.maxDistance = 12;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// ============================================================
// STATE
// ============================================================
let currentPreset = 'diamond';
let currentLightAngle = 0;
let autoRotate = true;

window.__3D_STATE__ = {
  preset: currentPreset,
  ior: GEM_PRESETS[currentPreset].ior,
  transmission: GEM_PRESETS[currentPreset].transmission,
  lightAngle: currentLightAngle,
  autoRotate: autoRotate,
  bandColor: '#ffd700',
  gemColor: '#ffffff'
};

function updateState() {
  const preset = GEM_PRESETS[currentPreset];
  window.__3D_STATE__.preset = currentPreset;
  window.__3D_STATE__.ior = gemMaterial.ior;
  window.__3D_STATE__.transmission = gemMaterial.transmission;
  window.__3D_STATE__.lightAngle = currentLightAngle;
  window.__3D_STATE__.autoRotate = autoRotate;
  window.__3D_STATE__.bandColor = '#' + bandMaterial.color.getHexString();
  window.__3D_STATE__.gemColor = '#' + gemMaterial.color.getHexString();
}

// ============================================================
// APPLY GEM PRESET
// ============================================================
function applyPreset(presetName) {
  const preset = GEM_PRESETS[presetName];
  if (!preset) return;
  
  currentPreset = presetName;
  
  gemMaterial.color.copy(preset.color);
  gemMaterial.ior = preset.ior;
  gemMaterial.transmission = preset.transmission;
  gemMaterial.thickness = preset.thickness;
  gemMaterial.roughness = preset.roughness;
  gemMaterial.attenuationColor.copy(preset.attenuationColor);
  gemMaterial.attenuationDistance = preset.attenuationDistance;
  gemMaterial.specularIntensity = preset.specularIntensity;
  gemMaterial.clearcoat = preset.clearcoat;
  gemMaterial.needsUpdate = true;
  
  // Adjust chromatic aberration strength based on dispersion
  chromaticPass.uniforms.strength.value = preset.dispersion;
  
  updateState();
}

// ============================================================
// LIGHT ANGLE CONTROL
// ============================================================
function updateLightAngle(angleDeg) {
  currentLightAngle = angleDeg;
  const angleRad = THREE.MathUtils.degToRad(angleDeg);
  const radius = 4;
  const height = 4;
  
  keyLight.position.set(
    Math.cos(angleRad) * radius,
    height,
    Math.sin(angleRad) * radius
  );
  
  // Move sparkle lights relative to key light
  sparkleLight1.position.set(
    Math.cos(angleRad + 0.5) * 2,
    2,
    Math.sin(angleRad + 0.5) * 2
  );
  
  updateState();
}

// ============================================================
// UI EVENT LISTENERS
// ============================================================
const presetSelect = document.getElementById('presetSelect');
const lightAngleSlider = document.getElementById('lightAngle');
const angleValueDisplay = document.getElementById('angleValue');
const autoRotateToggle = document.getElementById('autoRotateToggle');

presetSelect.addEventListener('change', (e) => {
  applyPreset(e.target.value);
});

lightAngleSlider.addEventListener('input', (e) => {
  const val = parseFloat(e.target.value);
  angleValueDisplay.textContent = val + '°';
  updateLightAngle(val);
});

autoRotateToggle.addEventListener('change', (e) => {
  autoRotate = e.target.checked;
  updateState();
});

// ============================================================
// RESIZE HANDLER
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  chromaticPass.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
});

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();
  
  // Auto rotation
  if (autoRotate) {
    ringGroup.rotation.y += delta * 0.3;
  }
  
  // Subtle gem sparkle animation - slight wobble
  gem.rotation.y = Math.sin(elapsed * 0.5) * 0.05;
  
  controls.update();
  
  // Use composer for post-processing (chromatic aberration)
  composer.render();
}

// Initialize
applyPreset('diamond');
updateLightAngle(0);
updateState();
animate();

</script>
</body>
</html>
