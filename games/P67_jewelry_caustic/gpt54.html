<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 戒指珠宝展示</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 30%, #1b1f2a 0%, #0c0f16 55%, #05070b 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .ui {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: 300px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(10, 12, 18, 0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .ui h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .row.inline {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }

    label {
      font-size: 13px;
      color: #d9deea;
    }

    input[type="range"],
    select {
      width: 100%;
    }

    .hint {
      font-size: 12px;
      line-height: 1.4;
      color: rgba(255,255,255,0.7);
      margin-top: 8px;
    }

    .value {
      font-size: 12px;
      color: #8fd3ff;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div class="ui">
      <h2>戒指珠宝展示</h2>

      <div class="row">
        <label for="presetSelect">宝石预设</label>
        <select id="presetSelect">
          <option value="diamond">diamond</option>
          <option value="ruby">ruby</option>
          <option value="sapphire">sapphire</option>
          <option value="emerald">emerald</option>
        </select>
      </div>

      <div class="row">
        <label for="lightAngle">主光角度 <span id="lightAngleValue" class="value">45°</span></label>
        <input id="lightAngle" type="range" min="0" max="360" step="1" value="45" />
      </div>

      <div class="row inline">
        <label for="autoRotateToggle">模型自动旋转</label>
        <input id="autoRotateToggle" type="checkbox" checked />
      </div>

      <div class="hint">
        说明：宝石使用 MeshPhysicalMaterial 的 transmission / thickness / ior 模拟高透材质。<br/>
        色散效果这里采用近似思路：通过不同颜色高光、环境反射与材质参数营造观感；若需更强色散，可追加后处理 RGB 轻微偏移（chromatic aberration）通道。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const lightAngleInput = document.getElementById('lightAngle');
    const lightAngleValue = document.getElementById('lightAngleValue');
    const presetSelect = document.getElementById('presetSelect');
    const autoRotateToggle = document.getElementById('autoRotateToggle');

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2.6, 7.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.7, 0);

    // 背景与地面
    scene.background = new THREE.Color(0x0b0f17);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(12, 128),
      new THREE.MeshStandardMaterial({
        color: 0x11161f,
        roughness: 0.25,
        metalness: 0.05
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.45;
    scene.add(floor);

    // 柔和环境光
    const ambient = new THREE.AmbientLight(0xffffff, 0.45);
    scene.add(ambient);

    // 三点光布局
    const keyLight = new THREE.DirectionalLight(0xffffff, 2.8);
    const fillLight = new THREE.DirectionalLight(0xbfd7ff, 1.35);
    const rimLight = new THREE.DirectionalLight(0xfff1d6, 1.9);

    scene.add(keyLight, fillLight, rimLight);

    fillLight.position.set(-4, 2.5, 3.5);
    rimLight.position.set(3.5, 4.5, -4);

    // 增加几盏点光提升宝石高光层次
    const sparkle1 = new THREE.PointLight(0xffffff, 18, 20, 2);
    const sparkle2 = new THREE.PointLight(0x88bbff, 10, 18, 2);
    sparkle1.position.set(0, 3, 3.5);
    sparkle2.position.set(-2.8, 1.5, -2.5);
    scene.add(sparkle1, sparkle2);

    const ringGroup = new THREE.Group();
    scene.add(ringGroup);

    // 戒圈
    const bandGeometry = new THREE.TorusGeometry(1.5, 0.28, 36, 180);
    const bandMaterial = new THREE.MeshStandardMaterial({
      color: 0xd4af37,
      metalness: 1.0,
      roughness: 0.16,
      envMapIntensity: 1.8
    });
    const band = new THREE.Mesh(bandGeometry, bandMaterial);
    band.rotation.x = Math.PI / 2;
    ringGroup.add(band);

    // 宝石托底
    const prongBase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.34, 0.42, 0.18, 6),
      new THREE.MeshStandardMaterial({
        color: 0xd4af37,
        metalness: 1.0,
        roughness: 0.18
      })
    );
    prongBase.position.set(0, 1.55, 0);
    ringGroup.add(prongBase);

    // 简单爪镶
    const prongMaterial = new THREE.MeshStandardMaterial({
      color: 0xd4af37,
      metalness: 1.0,
      roughness: 0.14
    });

    for (let i = 0; i < 4; i++) {
      const prong = new THREE.Mesh(
        new THREE.CylinderGeometry(0.035, 0.05, 0.42, 12),
        prongMaterial
      );
      const angle = (i / 4) * Math.PI * 2 + Math.PI / 4;
      prong.position.set(Math.cos(angle) * 0.34, 1.78, Math.sin(angle) * 0.34);
      prong.rotation.z = Math.sin(angle) * 0.12;
      prong.rotation.x = Math.cos(angle) * 0.12;
      ringGroup.add(prong);
    }

    // 宝石
    const gemGeometry = new THREE.OctahedronGeometry(0.62, 1);
    const gemMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      roughness: 0.02,
      metalness: 0.0,
      transmission: 1.0,
      thickness: 1.3,
      ior: 2.42,
      reflectivity: 1.0,
      transparent: true,
      opacity: 1.0,
      envMapIntensity: 2.2,
      clearcoat: 1.0,
      clearcoatRoughness: 0.02,
      attenuationColor: new THREE.Color(0xffffff),
      attenuationDistance: 0.9,
      specularIntensity: 1.0
    });

    const gem = new THREE.Mesh(gemGeometry, gemMaterial);
    gem.position.set(0, 2.12, 0);
    gem.rotation.y = Math.PI / 4;
    ringGroup.add(gem);

    ringGroup.position.y = -0.15;

    const presets = {
      diamond: {
        gemColor: '#ffffff',
        attenuationColor: '#f8fbff',
        ior: 2.42,
        transmission: 1.0,
        thickness: 1.35
      },
      ruby: {
        gemColor: '#d81b60',
        attenuationColor: '#ff4b6e',
        ior: 1.77,
        transmission: 0.92,
        thickness: 1.2
      },
      sapphire: {
        gemColor: '#2962ff',
        attenuationColor: '#4a7bff',
        ior: 1.77,
        transmission: 0.94,
        thickness: 1.25
      },
      emerald: {
        gemColor: '#00a86b',
        attenuationColor: '#39d98a',
        ior: 1.58,
        transmission: 0.9,
        thickness: 1.15
      }
    };

    window.__3D_STATE__ = {
      preset: 'diamond',
      ior: 2.42,
      transmission: 1.0,
      lightAngle: Number(lightAngleInput.value),
      autoRotate: autoRotateToggle.checked,
      bandColor: '#d4af37',
      gemColor: '#ffffff'
    };

    function updateKeyLight(angleDeg) {
      const angle = THREE.MathUtils.degToRad(angleDeg);
      const radius = 5.5;
      keyLight.position.set(
        Math.cos(angle) * radius,
        4.2,
        Math.sin(angle) * radius
      );
      keyLight.target.position.set(0, 1.2, 0);
      scene.add(keyLight.target);

      window.__3D_STATE__.lightAngle = angleDeg;
      lightAngleValue.textContent = `${angleDeg}°`;
    }

    function applyPreset(name) {
      const preset = presets[name] || presets.diamond;

      gemMaterial.color.set(preset.gemColor);
      gemMaterial.attenuationColor = new THREE.Color(preset.attenuationColor);
      gemMaterial.ior = preset.ior;
      gemMaterial.transmission = preset.transmission;
      gemMaterial.thickness = preset.thickness;
      gemMaterial.needsUpdate = true;

      // 为不同宝石稍微调整灯光色调，近似强化色散/折射观感
      if (name === 'diamond') {
        sparkle1.color.set(0xffffff);
        sparkle2.color.set(0x88bbff);
      } else if (name === 'ruby') {
        sparkle1.color.set(0xffd6e0);
        sparkle2.color.set(0xff6a88);
      } else if (name === 'sapphire') {
        sparkle1.color.set(0xdde8ff);
        sparkle2.color.set(0x5a8dff);
      } else if (name === 'emerald') {
        sparkle1.color.set(0xe2fff0);
        sparkle2.color.set(0x54d69a);
      }

      window.__3D_STATE__.preset = name;
      window.__3D_STATE__.ior = preset.ior;
      window.__3D_STATE__.transmission = preset.transmission;
      window.__3D_STATE__.bandColor = '#d4af37';
      window.__3D_STATE__.gemColor = preset.gemColor;
    }

    lightAngleInput.addEventListener('input', (e) => {
      updateKeyLight(Number(e.target.value));
    });

    presetSelect.addEventListener('change', (e) => {
      applyPreset(e.target.value);
    });

    autoRotateToggle.addEventListener('change', (e) => {
      window.__3D_STATE__.autoRotate = e.target.checked;
    });

    updateKeyLight(Number(lightAngleInput.value));
    applyPreset(presetSelect.value);

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();

      if (window.__3D_STATE__.autoRotate) {
        ringGroup.rotation.y += dt * 0.45;
      }

      // 宝石自身轻微旋转，增强切面闪烁
      gem.rotation.y += dt * 0.3;
      gem.rotation.x = Math.sin(clock.elapsedTime * 0.8) * 0.08;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
