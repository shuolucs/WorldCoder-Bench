<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Jewelry Showcase</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 20, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            width: 280px;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        .control-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        .control-group.row {
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
        }
        label {
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #ccc;
        }
        select, input[type="range"] {
            width: 100%;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px;
            border-radius: 4px;
            outline: none;
        }
        input[type="range"] {
            -webkit-appearance: none;
            height: 4px;
            background: #555;
            margin-top: 8px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
    
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h2>Jewelry Controls</h2>
        
        <div class="control-group">
            <label for="presetSelect">Gemstone Preset</label>
            <select id="presetSelect">
                <option value="diamond" selected>Diamond</option>
                <option value="ruby">Ruby</option>
                <option value="sapphire">Sapphire</option>
                <option value="emerald">Emerald</option>
            </select>
        </div>

        <div class="control-group">
            <label for="lightAngle">Main Light Angle (Y-Axis)</label>
            <input type="range" id="lightAngle" min="0" max="360" value="45">
        </div>

        <div class="control-group row">
            <label for="autoRotateToggle">Auto Rotate Model</label>
            <input type="checkbox" id="autoRotateToggle">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            preset: 'diamond',
            ior: 2.42,
            transmission: 1.0,
            lightAngle: 45,
            autoRotate: false,
            bandColor: '#ffd700',
            gemColor: '#ffffff'
        };

        const presets = {
            diamond:  { color: 0xffffff, ior: 2.42, transmission: 1.00, dispersion: 0.025 },
            ruby:     { color: 0xff0033, ior: 1.76, transmission: 0.85, dispersion: 0.018 },
            sapphire: { color: 0x0033ff, ior: 1.76, transmission: 0.90, dispersion: 0.018 },
            emerald:  { color: 0x00ff44, ior: 1.57, transmission: 0.85, dispersion: 0.014 }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Environment for realistic reflections and refractions
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 10;
        controls.target.set(0, 0.5, 0);

        // --- Lighting (Studio 3-Point Setup) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        // Main Key Light
        const mainLight = new THREE.DirectionalLight(0xffffff, 3.0);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.bias = -0.0001;
        scene.add(mainLight);

        // Fill Light (Cooler, lower intensity)
        const fillLight = new THREE.DirectionalLight(0xaaccff, 1.5);
        fillLight.position.set(-5, 3, -5);
        scene.add(fillLight);

        // Rim Light (Warm, high intensity from behind)
        const rimLight = new THREE.DirectionalLight(0xffddaa, 4.0);
        rimLight.position.set(0, 4, -6);
        scene.add(rimLight);

        // --- Models ---
        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        // 1. Band (Metal)
        const bandGeometry = new THREE.TorusGeometry(1.0, 0.12, 64, 128);
        const bandMaterial = new THREE.MeshStandardMaterial({
            color: new THREE.Color(window.__3D_STATE__.bandColor),
            metalness: 1.0,
            roughness: 0.08,
            envMapIntensity: 1.5
        });
        const band = new THREE.Mesh(bandGeometry, bandMaterial);
        band.rotation.x = Math.PI / 2;
        band.castShadow = true;
        band.receiveShadow = true;
        ringGroup.add(band);

        // 2. Gemstone (Physical Material with Dispersion & Transmission)
        // Using Octahedron, scaled to look like a cut gem
        const gemGeometry = new THREE.OctahedronGeometry(0.5, 1);
        gemGeometry.scale(1, 0.8, 1); 
        
        const gemMaterial = new THREE.MeshPhysicalMaterial({
            color: new THREE.Color(window.__3D_STATE__.gemColor),
            metalness: 0.0,
            roughness: 0.0,
            ior: window.__3D_STATE__.ior,
            transmission: window.__3D_STATE__.transmission,
            thickness: 0.8,
            dispersion: presets.diamond.dispersion, // Native dispersion in r170
            clearcoat: 1.0,
            clearcoatRoughness: 0.0,
            envMapIntensity: 2.0
        });
        
        const gem = new THREE.Mesh(gemGeometry, gemMaterial);
        gem.position.y = 1.15;
        gem.castShadow = true;
        ringGroup.add(gem);

        // Prongs to hold the gem
        const prongGeo = new THREE.CylinderGeometry(0.02, 0.015, 0.4, 16);
        for (let i = 0; i < 4; i++) {
            const prong = new THREE.Mesh(prongGeo, bandMaterial);
            const angle = (i * Math.PI) / 2 + Math.PI / 4;
            const radius = 0.35;
            prong.position.set(Math.cos(angle) * radius, 1.0, Math.sin(angle) * radius);
            prong.lookAt(0, 1.3, 0);
            prong.rotateX(Math.PI / 2);
            prong.castShadow = true;
            ringGroup.add(prong);
        }

        // --- UI Event Listeners ---
        document.getElementById('presetSelect').addEventListener('change', (e) => {
            const presetName = e.target.value;
            const config = presets[presetName];
            
            window.__3D_STATE__.preset = presetName;
            window.__3D_STATE__.gemColor = '#' + config.color.toString(16).padStart(6, '0');
            window.__3D_STATE__.ior = config.ior;
            window.__3D_STATE__.transmission = config.transmission;

            gemMaterial.color.setHex(config.color);
            gemMaterial.ior = config.ior;
            gemMaterial.transmission = config.transmission;
            gemMaterial.dispersion = config.dispersion;
            gemMaterial.needsUpdate = true;
        });

        document.getElementById('lightAngle').addEventListener('input', (e) => {
            window.__3D_STATE__.lightAngle = parseFloat(e.target.value);
        });

        document.getElementById('autoRotateToggle').addEventListener('change', (e) => {
            window.__3D_STATE__.autoRotate = e.target.checked;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const lightRadius = 6;

        function animate() {
            requestAnimationFrame(animate);

            // Handle Auto Rotate
            if (window.__3D_STATE__.autoRotate) {
                ringGroup.rotation.y += 0.005;
            }

            // Handle Light Angle
            const angleRad = window.__3D_STATE__.lightAngle * (Math.PI / 180);
            mainLight.position.x = Math.cos(angleRad) * lightRadius;
            mainLight.position.z = Math.sin(angleRad) * lightRadius;
            mainLight.position.y = 4; // Keep it slightly above

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
