<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendulum Wave Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111122;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            pointer-events: none;
            line-height: 1.5;
            z-index: 100;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Initialize State
        window.__3D_STATE__ = {
            elapsedTime: 0,
            paused: false,
            amplitude: 0.8,
            particlesEnabled: true,
            selectedPendulum: -1,
            pendulumCount: 15,
            pendulumAngles: new Array(15).fill(0),
            pendulumBobPositions: new Array(15).fill({x: 0, y: 0, z: 0}),
            nefertitiLoaded: false,
            fps: 0,
            totalParticleCount: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.update();

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        // Ground Plane
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8, metalness: 0.2 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        // Load Nefertiti Model
        const loader = new GLTFLoader();
        loader.load('Nefertiti.glb', (gltf) => {
            const model = gltf.scene;
            
            const goldMaterial = new THREE.MeshStandardMaterial({
                color: 0xFFD700,
                metalness: 0.8,
                roughness: 0.2
            });

            model.traverse((child) => {
                if (child.isMesh) {
                    child.material = goldMaterial;
                }
            });

            // Scale to roughly 3 units tall
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const scale = 3 / size.y;
            model.scale.setScalar(scale);

            // Center and position at (0, 1.5, -5)
            const boxScaled = new THREE.Box3().setFromObject(model);
            const centerScaled = boxScaled.getCenter(new THREE.Vector3());
            
            model.position.x += (0 - centerScaled.x);
            model.position.y += (1.5 - boxScaled.min.y);
            model.position.z += (-5 - centerScaled.z);

            scene.add(model);
            window.__3D_STATE__.nefertitiLoaded = true;
        }, undefined, (error) => {
            console.warn("Nefertiti.glb could not be loaded. Ensure the file exists in the same directory.", error);
        });

        // Pendulum Wave System
        const pendulums = [];
        const bobs = [];
        const rodGeo = new THREE.CylinderGeometry(0.03, 0.03, 6);
        rodGeo.translate(0, -3, 0); // Move origin to top
        const bobGeo = new THREE.SphereGeometry(0.25, 32, 32);

        for (let i = 0; i < 15; i++) {
            const group = new THREE.Group();
            const xPos = -7 + i * (14 / 14);
            group.position.set(xPos, 10, 0);

            const color = new THREE.Color().setHSL(i / 15, 0.9, 0.5);
            const material = new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.4 });

            const rod = new THREE.Mesh(rodGeo, material);
            const bob = new THREE.Mesh(bobGeo, material);
            bob.position.set(0, -6, 0);
            bob.userData = { index: i };

            group.add(rod);
            group.add(bob);
            scene.add(group);

            pendulums.push(group);
            bobs.push(bob);
        }

        // Particle Trail Effects
        const particleSystems = [];
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        for (let i = 0; i < 15; i++) {
            const geo = new THREE.BufferGeometry();
            const maxParticles = 50;
            const positions = new Float32Array(maxParticles * 3);
            const colors = new Float32Array(maxParticles * 4);
            const spawnTimes = new Float32Array(maxParticles).fill(-999);

            const baseColor = new THREE.Color().setHSL(i / 15, 0.9, 0.5);

            for (let j = 0; j < maxParticles; j++) {
                colors[j * 4] = baseColor.r;
                colors[j * 4 + 1] = baseColor.g;
                colors[j * 4 + 2] = baseColor.b;
                colors[j * 4 + 3] = 0; // Alpha
            }

            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 4));

            const points = new THREE.Points(geo, particleMaterial);
            scene.add(points);

            particleSystems.push({
                points: points,
                positions: positions,
                colors: colors,
                spawnTimes: spawnTimes,
                cursor: 0
            });
        }

        // User Interactions
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(bobs);

            if (intersects.length > 0) {
                const clickedIndex = intersects[0].object.userData.index;
                const state = window.__3D_STATE__;

                if (state.selectedPendulum === clickedIndex) {
                    bobs[clickedIndex].scale.set(1, 1, 1);
                    state.selectedPendulum = -1;
                } else {
                    if (state.selectedPendulum !== -1) {
                        bobs[state.selectedPendulum].scale.set(1, 1, 1);
                    }
                    bobs[clickedIndex].scale.set(1.5, 1.5, 1.5);
                    state.selectedPendulum = clickedIndex;
                }
            } else {
                if (window.__3D_STATE__.selectedPendulum !== -1) {
                    bobs[window.__3D_STATE__.selectedPendulum].scale.set(1, 1, 1);
                    window.__3D_STATE__.selectedPendulum = -1;
                }
            }
        });

        window.addEventListener('keydown', (event) => {
            const state = window.__3D_STATE__;
            switch(event.key) {
                case ' ':
                    state.paused = !state.paused;
                    break;
                case 'r':
                case 'R':
                    state.elapsedTime = 0;
                    particleSystems.forEach(ps => ps.spawnTimes.fill(-999));
                    break;
                case 'p':
                case 'P':
                    state.particlesEnabled = !state.particlesEnabled;
                    break;
                case 'ArrowUp':
                    state.amplitude = Math.min(1.5, state.amplitude + 0.1);
                    break;
                case 'ArrowDown':
                    state.amplitude = Math.max(0.1, state.amplitude - 0.1);
                    break;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // HUD Update
        const hudElement = document.getElementById('hud');
        function updateHUD() {
            const s = window.__3D_STATE__;
            hudElement.innerHTML = `
                Time: ${s.elapsedTime.toFixed(1)}s<br>
                Amplitude: ${s.amplitude.toFixed(1)} rad<br>
                Particles: ${s.particlesEnabled ? 'ON' : 'OFF'}<br>
                Paused: ${s.paused ? 'YES' : 'NO'}<br>
                Selected: ${s.selectedPendulum !== -1 ? 'Pendulum ' + s.selectedPendulum : 'None'}
            `;
        }

        // Animation Loop
        let lastTime = performance.now();
        let frameCount = 0;
        let lastFpsTime = lastTime;

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            lastTime = now;

            frameCount++;
            if (now - lastFpsTime >= 1000) {
                window.__3D_STATE__.fps = frameCount;
                frameCount = 0;
                lastFpsTime = now;
            }

            const state = window.__3D_STATE__;

            if (!state.paused) {
                state.elapsedTime += delta;
            }

            const t = state.elapsedTime;
            const A = state.amplitude;
            let activeParticles = 0;

            for (let i = 0; i < 15; i++) {
                // Physics
                const period = 2.0 - i * 0.04;
                const omega = 2 * Math.PI / period;
                const angle = A * Math.sin(omega * t);

                pendulums[i].rotation.z = angle;
                state.pendulumAngles[i] = angle;

                const bobWorldPos = new THREE.Vector3();
                bobs[i].getWorldPosition(bobWorldPos);
                state.pendulumBobPositions[i] = { x: bobWorldPos.x, y: bobWorldPos.y, z: bobWorldPos.z };

                // Particles
                const ps = particleSystems[i];
                if (!state.paused && state.particlesEnabled) {
                    const c = ps.cursor;
                    ps.positions[c * 3] = bobWorldPos.x + (Math.random() - 0.5) * 0.1;
                    ps.positions[c * 3 + 1] = bobWorldPos.y + (Math.random() - 0.5) * 0.1;
                    ps.positions[c * 3 + 2] = bobWorldPos.z + (Math.random() - 0.5) * 0.1;
                    ps.spawnTimes[c] = t;
                    ps.cursor = (c + 1) % 50;
                }

                for (let j = 0; j < 50; j++) {
                    const age = t - ps.spawnTimes[j];
                    if (state.particlesEnabled && age >= 0 && age < 1.5) {
                        ps.colors[j * 4 + 3] = 1.0 - (age / 1.5);
                        activeParticles++;
                    } else {
                        ps.colors[j * 4 + 3] = 0;
                    }
                }

                ps.points.geometry.attributes.position.needsUpdate = true;
                ps.points.geometry.attributes.color.needsUpdate = true;
            }

            state.totalParticleCount = activeParticles;

            updateHUD();
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
