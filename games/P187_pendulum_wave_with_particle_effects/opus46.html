<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendulum Wave Simulation</title>
<style>
  body { margin: 0; overflow: hidden; background: #111122; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px;
    font: 14px monospace;
    line-height: 1.6;
    pointer-events: none;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div id="hud"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
  elapsedTime: 0,
  paused: false,
  amplitude: 0.8,
  particlesEnabled: true,
  selectedPendulum: -1,
  pendulumCount: 15,
  pendulumAngles: new Array(15).fill(0),
  pendulumBobPositions: Array.from({ length: 15 }, () => ({ x: 0, y: 0, z: 0 })),
  nefertitiLoaded: false,
  fps: 0,
  totalParticleCount: 0
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 15, 10);
scene.add(dirLight);

// --- Ground Plane ---
const groundGeo = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x222233 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

// --- Load Nefertiti ---
const loader = new GLTFLoader();
loader.load(
  'Nefertiti.glb',
  (gltf) => {
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const size = new THREE.Vector3();
    box.getSize(size);
    const scale = 3.0 / size.y;
    model.scale.set(scale, scale, scale);

    const center = new THREE.Vector3();
    new THREE.Box3().setFromObject(model).getCenter(center);
    model.position.sub(center);
    model.position.set(0, 1.5, -5);

    const goldMat = new THREE.MeshStandardMaterial({
      color: 0xFFD700,
      metalness: 0.8,
      roughness: 0.2
    });
    model.traverse((child) => {
      if (child.isMesh) {
        child.material = goldMat;
      }
    });

    scene.add(model);
    state.nefertitiLoaded = true;
  },
  undefined,
  (err) => {
    console.warn('Could not load Nefertiti.glb:', err);
  }
);

// --- Pendulum System ---
const PENDULUM_COUNT = 15;
const PIVOT_Y = 10;
const ROD_LENGTH = 6;
const pendulums = [];
const bobMeshes = [];

// Support bar
const barGeo = new THREE.CylinderGeometry(0.05, 0.05, 16, 8);
const barMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.5, roughness: 0.3 });
const bar = new THREE.Mesh(barGeo, barMat);
bar.rotation.z = Math.PI / 2;
bar.position.set(0, PIVOT_Y, 0);
scene.add(bar);

for (let i = 0; i < PENDULUM_COUNT; i++) {
  const x = -7 + (14 / (PENDULUM_COUNT - 1)) * i;
  const hue = i / PENDULUM_COUNT;
  const color = new THREE.Color().setHSL(hue, 0.9, 0.5);

  // Pivot group
  const pivotGroup = new THREE.Group();
  pivotGroup.position.set(x, PIVOT_Y, 0);
  scene.add(pivotGroup);

  // Rod
  const rodGeo = new THREE.CylinderGeometry(0.03, 0.03, ROD_LENGTH, 8);
  const rodMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.3, roughness: 0.5 });
  const rod = new THREE.Mesh(rodGeo, rodMat);
  rod.position.y = -ROD_LENGTH / 2;
  pivotGroup.add(rod);

  // Bob
  const bobGeo = new THREE.SphereGeometry(0.25, 16, 16);
  const bobMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.4, roughness: 0.3, emissive: color.clone().multiplyScalar(0.2) });
  const bob = new THREE.Mesh(bobGeo, bobMat);
  bob.position.y = -ROD_LENGTH;
  pivotGroup.add(bob);
  bob.userData.pendulumIndex = i;
  bobMeshes.push(bob);

  // Period and omega
  const period = 2.0 - i * 0.04;
  const omega = (2 * Math.PI) / period;

  pendulums.push({
    pivotGroup,
    rod,
    bob,
    x,
    period,
    omega,
    color: color.clone(),
    originalScale: 1.0
  });
}

// --- Particle System ---
const MAX_PARTICLES_PER_PENDULUM = 50;
const PARTICLE_LIFETIME = 1.5;

const particleSystems = [];

// Create a circular particle texture
const particleCanvas = document.createElement('canvas');
particleCanvas.width = 32;
particleCanvas.height = 32;
const pCtx = particleCanvas.getContext('2d');
const gradient = pCtx.createRadialGradient(16, 16, 0, 16, 16, 16);
gradient.addColorStop(0, 'rgba(255,255,255,1)');
gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
gradient.addColorStop(1, 'rgba(255,255,255,0)');
pCtx.fillStyle = gradient;
pCtx.fillRect(0, 0, 32, 32);
const particleTexture = new THREE.CanvasTexture(particleCanvas);

for (let i = 0; i < PENDULUM_COUNT; i++) {
  const maxP = MAX_PARTICLES_PER_PENDULUM;
  const positions = new Float32Array(maxP * 3);
  const opacities = new Float32Array(maxP);
  const ages = new Float32Array(maxP);

  for (let j = 0; j < maxP; j++) {
    positions[j * 3] = 0;
    positions[j * 3 + 1] = -1000; // offscreen
    positions[j * 3 + 2] = 0;
    opacities[j] = 0;
    ages[j] = PARTICLE_LIFETIME + 1; // dead
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('opacity', new THREE.BufferAttribute(opacities, 1));

  const color = pendulums[i].color;
  const material = new THREE.PointsMaterial({
    color: color,
    size: 0.15,
    map: particleTexture,
    transparent: true,
    opacity: 1.0,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true
  });

  // Custom shader to use per-particle opacity
  material.onBeforeCompile = (shader) => {
    shader.vertexShader = shader.vertexShader.replace(
      'void main() {',
      'attribute float opacity;\nvarying float vOpacity;\nvoid main() {\nvOpacity = opacity;'
    );
    shader.fragmentShader = shader.fragmentShader.replace(
      'void main() {',
      'varying float vOpacity;\nvoid main() {'
    );
    shader.fragmentShader = shader.fragmentShader.replace(
      'gl_FragColor = vec4( outgoingLight, diffuseColor.a );',
      'gl_FragColor = vec4( outgoingLight, diffuseColor.a * vOpacity );'
    );
  };

  const points = new THREE.Points(geometry, material);
  points.frustumCulled = false;
  scene.add(points);

  particleSystems.push({
    points,
    geometry,
    positions,
    opacities,
    ages,
    nextIndex: 0,
    activeCount: 0
  });
}

// --- Raycaster for click ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(bobMeshes);

  if (intersects.length > 0) {
    const idx = intersects[0].object.userData.pendulumIndex;
    if (state.selectedPendulum === idx) {
      // Deselect
      pendulums[idx].bob.scale.setScalar(1.0);
      state.selectedPendulum = -1;
    } else {
      // Deselect previous
      if (state.selectedPendulum >= 0) {
        pendulums[state.selectedPendulum].bob.scale.setScalar(1.0);
      }
      // Select new
      pendulums[idx].bob.scale.setScalar(1.5);
      state.selectedPendulum = idx;
    }
  } else {
    // Deselect
    if (state.selectedPendulum >= 0) {
      pendulums[state.selectedPendulum].bob.scale.setScalar(1.0);
      state.selectedPendulum = -1;
    }
  }
});

// --- Keyboard ---
document.addEventListener('keydown', (event) => {
  switch (event.code) {
    case 'Space':
      event.preventDefault();
      state.paused = !state.paused;
      break;
    case 'KeyR':
      state.elapsedTime = 0;
      // Reset particles
      for (const ps of particleSystems) {
        for (let j = 0; j < MAX_PARTICLES_PER_PENDULUM; j++) {
          ps.ages[j] = PARTICLE_LIFETIME + 1;
          ps.opacities[j] = 0;
          ps.positions[j * 3 + 1] = -1000;
        }
        ps.nextIndex = 0;
        ps.geometry.attributes.position.needsUpdate = true;
        ps.geometry.attributes.opacity.needsUpdate = true;
      }
      break;
    case 'KeyP':
      state.particlesEnabled = !state.particlesEnabled;
      for (const ps of particleSystems) {
        ps.points.visible = state.particlesEnabled;
      }
      break;
    case 'ArrowUp':
      event.preventDefault();
      state.amplitude = Math.min(1.5, state.amplitude + 0.1);
      break;
    case 'ArrowDown':
      event.preventDefault();
      state.amplitude = Math.max(0.1, state.amplitude - 0.1);
      break;
  }
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- HUD ---
const hudEl = document.getElementById('hud');
function updateHUD() {
  const lines = [
    `Time: ${state.elapsedTime.toFixed(1)}s`,
    `Amplitude: ${state.amplitude.toFixed(1)} rad`,
    `Particles: ${state.particlesEnabled ? 'ON' : 'OFF'}`,
    `Paused: ${state.paused ? 'YES' : 'NO'}`,
    `Selected: ${state.selectedPendulum >= 0 ? 'Pendulum ' + state.selectedPendulum : 'None'}`
  ];
  hudEl.textContent = lines.join('\n');
}

// --- Animation Loop ---
let lastTime = performance.now();
let frameCount = 0;
let fpsTimer = 0;

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const rawDt = (now - lastTime) / 1000;
  lastTime = now;

  // FPS
  frameCount++;
  fpsTimer += rawDt;
  if (fpsTimer >= 1.0) {
    state.fps = Math.round(frameCount / fpsTimer);
    frameCount = 0;
    fpsTimer = 0;
  }

  const dt = state.paused ? 0 : rawDt;
  state.elapsedTime += dt;

  let totalParticles = 0;

  // Update pendulums
  for (let i = 0; i < PENDULUM_COUNT; i++) {
    const p = pendulums[i];
    const angle = state.amplitude * Math.sin(p.omega * state.elapsedTime);
    state.pendulumAngles[i] = angle;

    p.pivotGroup.rotation.z = angle;

    // Get bob world position
    const worldPos = new THREE.Vector3();
    p.bob.getWorldPosition(worldPos);
    state.pendulumBobPositions[i] = { x: worldPos.x, y: worldPos.y, z: worldPos.z };

    // Update particles
    const ps = particleSystems[i];

    if (!state.paused) {
      // Age existing particles
      for (let j = 0; j < MAX_PARTICLES_PER_PENDULUM; j++) {
        if (ps.ages[j] <= PARTICLE_LIFETIME) {
          ps.ages[j] += dt;
          const life = 1.0 - ps.ages[j] / PARTICLE_LIFETIME;
          ps.opacities[j] = Math.max(0, life);
          if (ps.ages[j] > PARTICLE_LIFETIME) {
            ps.positions[j * 3 + 1] = -1000;
            ps.opacities[j] = 0;
          }
        }
      }

      // Spawn new particle
      if (state.particlesEnabled) {
        const idx = ps.nextIndex;
        ps.positions[idx * 3] = worldPos.x + (Math.random() - 0.5) * 0.1;
        ps.positions[idx * 3 + 1] = worldPos.y + (Math.random() - 0.5) * 0.1;
        ps.positions[idx * 3 + 2] = worldPos.z + (Math.random() - 0.5) * 0.1;
        ps.opacities[idx] = 1.0;
        ps.ages[idx] = 0;
        ps.nextIndex = (ps.nextIndex + 1) % MAX_PARTICLES_PER_PENDULUM;
      }
    }

    // Count active
    let active = 0;
    for (let j = 0; j < MAX_PARTICLES_PER_PENDULUM; j++) {
      if (ps.ages[j] <= PARTICLE_LIFETIME) active++;
    }
    totalParticles += active;

    ps.geometry.attributes.position.needsUpdate = true;
    ps.geometry.attributes.opacity.needsUpdate = true;
  }

  state.totalParticleCount = totalParticles;

  updateHUD();
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
