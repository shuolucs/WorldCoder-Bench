<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pendulum Wave with Nefertiti</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111122;
      font-family: monospace;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      font: 14px monospace;
      white-space: pre-line;
      z-index: 10;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="hud">Loading...</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111122);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 4, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(10, 15, 10);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x222233, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const hud = document.getElementById('hud');
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const PENDULUM_COUNT = 15;
    const PIVOT_Y = 10;
    const ROD_LENGTH = 6;
    const BOB_RADIUS = 0.25;
    const MAX_PARTICLES = 50;
    const PARTICLE_LIFE = 1.5;

    const pendulums = [];
    const bobMeshes = [];
    const particleSystems = [];

    let nefertitiLoaded = false;
    let paused = false;
    let amplitude = 0.8;
    let particlesEnabled = true;
    let selectedPendulum = -1;
    let elapsedTime = 0;
    let fps = 0;
    let fpsSmoothing = 0;

    window.__3D_STATE__ = {
      elapsedTime: 0,
      paused: false,
      amplitude: 0.8,
      particlesEnabled: true,
      selectedPendulum: -1,
      pendulumCount: PENDULUM_COUNT,
      pendulumAngles: new Array(PENDULUM_COUNT).fill(0),
      pendulumBobPositions: new Array(PENDULUM_COUNT).fill(0).map(() => ({ x: 0, y: 0, z: 0 })),
      nefertitiLoaded: false,
      fps: 0,
      totalParticleCount: 0
    };

    function createPendulum(index, x) {
      const group = new THREE.Group();
      group.position.set(x, PIVOT_Y, 0);
      scene.add(group);

      const pivotMarker = new THREE.Mesh(
        new THREE.SphereGeometry(0.05, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x888899 })
      );
      group.add(pivotMarker);

      const rodMaterial = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.4, roughness: 0.5 });
      const rod = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.03, ROD_LENGTH, 10),
        rodMaterial
      );
      rod.position.y = -ROD_LENGTH / 2;
      group.add(rod);

      const bobColor = new THREE.Color().setHSL(index / PENDULUM_COUNT, 0.9, 0.5);
      const bobMaterial = new THREE.MeshStandardMaterial({
        color: bobColor,
        emissive: bobColor.clone().multiplyScalar(0.15),
        metalness: 0.3,
        roughness: 0.4
      });
      const bob = new THREE.Mesh(
        new THREE.SphereGeometry(BOB_RADIUS, 24, 24),
        bobMaterial
      );
      bob.position.y = -ROD_LENGTH;
      bob.userData.pendulumIndex = index;
      group.add(bob);

      const T = 2.0 - index * 0.04;
      const omega = (2 * Math.PI) / T;

      const positions = new Float32Array(MAX_PARTICLES * 3);
      const colors = new Float32Array(MAX_PARTICLES * 3);
      const alphas = new Float32Array(MAX_PARTICLES);
      const lifetimes = new Float32Array(MAX_PARTICLES);
      const active = new Array(MAX_PARTICLES).fill(false);

      for (let i = 0; i < MAX_PARTICLES; i++) {
        positions[i * 3 + 0] = 9999;
        positions[i * 3 + 1] = 9999;
        positions[i * 3 + 2] = 9999;
        colors[i * 3 + 0] = bobColor.r;
        colors[i * 3 + 1] = bobColor.g;
        colors[i * 3 + 2] = bobColor.b;
        alphas[i] = 0;
        lifetimes[i] = 0;
      }

      const particleGeometry = new THREE.BufferGeometry();
      particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      particleGeometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

      const particleMaterial = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true,
        uniforms: {
          pointSize: { value: 8.0 }
        },
        vertexShader: `
          attribute float alpha;
          varying vec3 vColor;
          varying float vAlpha;
          uniform float pointSize;
          void main() {
            vColor = color;
            vAlpha = alpha;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = pointSize * (300.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          varying float vAlpha;
          void main() {
            vec2 c = gl_PointCoord - vec2(0.5);
            float d = length(c);
            if (d > 0.5) discard;
            float falloff = 1.0 - smoothstep(0.0, 0.5, d);
            gl_FragColor = vec4(vColor, vAlpha * falloff);
          }
        `
      });

      const points = new THREE.Points(particleGeometry, particleMaterial);
      scene.add(points);

      const data = {
        index,
        group,
        rod,
        bob,
        bobColor,
        T,
        omega,
        angle: 0,
        particle: {
          geometry: particleGeometry,
          material: particleMaterial,
          points,
          positions,
          colors,
          alphas,
          lifetimes,
          active,
          spawnCursor: 0
        }
      };

      pendulums.push(data);
      bobMeshes.push(bob);
      particleSystems.push(points);
    }

    for (let i = 0; i < PENDULUM_COUNT; i++) {
      const x = THREE.MathUtils.lerp(-7, 7, i / (PENDULUM_COUNT - 1));
      createPendulum(i, x);
    }

    function updatePendulumTransforms(time) {
      for (const p of pendulums) {
        const angle = amplitude * Math.sin(p.omega * time);
        p.angle = angle;
        p.group.rotation.z = angle;
      }
    }

    function spawnParticle(pendulum, worldPos) {
      const ps = pendulum.particle;
      const i = ps.spawnCursor;

      ps.positions[i * 3 + 0] = worldPos.x + (Math.random() - 0.5) * 0.1;
      ps.positions[i * 3 + 1] = worldPos.y + (Math.random() - 0.5) * 0.1;
      ps.positions[i * 3 + 2] = worldPos.z + (Math.random() - 0.5) * 0.1;
      ps.alphas[i] = 1.0;
      ps.lifetimes[i] = PARTICLE_LIFE;
      ps.active[i] = true;

      ps.spawnCursor = (ps.spawnCursor + 1) % MAX_PARTICLES;
    }

    function updateParticles(delta) {
      let totalActive = 0;

      for (const p of pendulums) {
        const ps = p.particle;
        const worldPos = new THREE.Vector3();
        p.bob.getWorldPosition(worldPos);

        if (particlesEnabled && !paused) {
          spawnParticle(p, worldPos);
        }

        for (let i = 0; i < MAX_PARTICLES; i++) {
          if (!ps.active[i]) continue;

          if (!paused) {
            ps.lifetimes[i] -= delta;
          }

          if (ps.lifetimes[i] <= 0) {
            ps.active[i] = false;
            ps.alphas[i] = 0;
            ps.positions[i * 3 + 0] = 9999;
            ps.positions[i * 3 + 1] = 9999;
            ps.positions[i * 3 + 2] = 9999;
          } else {
            ps.alphas[i] = ps.lifetimes[i] / PARTICLE_LIFE;
            totalActive++;
          }
        }

        ps.geometry.attributes.position.needsUpdate = true;
        ps.geometry.attributes.alpha.needsUpdate = true;
        ps.points.visible = particlesEnabled;
      }

      return totalActive;
    }

    function resetSimulation() {
      elapsedTime = 0;
      for (const p of pendulums) {
        p.angle = 0;
        p.group.rotation.z = 0;
        const ps = p.particle;
        ps.spawnCursor = 0;
        for (let i = 0; i < MAX_PARTICLES; i++) {
          ps.active[i] = false;
          ps.lifetimes[i] = 0;
          ps.alphas[i] = 0;
          ps.positions[i * 3 + 0] = 9999;
          ps.positions[i * 3 + 1] = 9999;
          ps.positions[i * 3 + 2] = 9999;
        }
        ps.geometry.attributes.position.needsUpdate = true;
        ps.geometry.attributes.alpha.needsUpdate = true;
      }
    }

    function setSelectedPendulum(index) {
      if (selectedPendulum >= 0 && pendulums[selectedPendulum]) {
        pendulums[selectedPendulum].bob.scale.setScalar(1);
      }

      if (selectedPendulum === index) {
        selectedPendulum = -1;
      } else {
        selectedPendulum = index;
        if (selectedPendulum >= 0) {
          pendulums[selectedPendulum].bob.scale.setScalar(1.5);
        }
      }
    }

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(bobMeshes, false);

      if (intersects.length > 0) {
        const idx = intersects[0].object.userData.pendulumIndex;
        setSelectedPendulum(idx);
      } else {
        setSelectedPendulum(-1);
      }
    });

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();

      if (event.code === 'Space') {
        event.preventDefault();
        paused = !paused;
      } else if (key === 'r') {
        resetSimulation();
      } else if (key === 'p') {
        particlesEnabled = !particlesEnabled;
      } else if (event.key === 'ArrowUp') {
        amplitude = Math.min(1.5, amplitude + 0.1);
      } else if (event.key === 'ArrowDown') {
        amplitude = Math.max(0.1, amplitude - 0.1);
      }
    });

    const loader = new GLTFLoader();
    loader.load(
      'Nefertiti.glb',
      (gltf) => {
        const model = gltf.scene;

        const goldMaterial = new THREE.MeshStandardMaterial({
          color: 0xFFD700,
          metalness: 0.8,
          roughness: 0.2
        });

        model.traverse((child) => {
          if (child.isMesh) {
            child.material = goldMaterial;
            child.castShadow = false;
            child.receiveShadow = true;
          }
        });

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const targetHeight = 3;
        const scale = targetHeight / Math.max(size.y, 0.0001);
        model.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(model);
        const center2 = new THREE.Vector3();
        const size2 = new THREE.Vector3();
        box2.getCenter(center2);
        box2.getSize(size2);

        model.position.set(
          0 - center2.x,
          1.5 - (box2.min.y),
          -5 - center2.z
        );

        scene.add(model);
        nefertitiLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Could not load Nefertiti.glb:', err);
      }
    );

    function updateHUD(totalParticleCount) {
      hud.textContent =
        `Time: ${elapsedTime.toFixed(1)}s\n` +
        `Amplitude: ${amplitude.toFixed(1)} rad\n` +
        `Particles: ${particlesEnabled ? 'ON' : 'OFF'}\n` +
        `Paused: ${paused ? 'YES' : 'NO'}\n` +
        `Selected: ${selectedPendulum >= 0 ? `Pendulum ${selectedPendulum}` : 'None'}`;
    }

    function updateState(totalParticleCount) {
      const state = window.__3D_STATE__;
      state.elapsedTime = elapsedTime;
      state.paused = paused;
      state.amplitude = amplitude;
      state.particlesEnabled = particlesEnabled;
      state.selectedPendulum = selectedPendulum;
      state.pendulumCount = PENDULUM_COUNT;
      state.nefertitiLoaded = nefertitiLoaded;
      state.fps = fps;
      state.totalParticleCount = totalParticleCount;

      for (let i = 0; i < PENDULUM_COUNT; i++) {
        const p = pendulums[i];
        state.pendulumAngles[i] = p.angle;
        const wp = new THREE.Vector3();
        p.bob.getWorldPosition(wp);
        state.pendulumBobPositions[i] = { x: wp.x, y: wp.y, z: wp.z };
      }
    }

    let lastFrameTime = performance.now();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const now = performance.now();
      const dtMs = now - lastFrameTime;
      lastFrameTime = now;
      const currentFPS = dtMs > 0 ? 1000 / dtMs : 0;
      fpsSmoothing = fpsSmoothing === 0 ? currentFPS : THREE.MathUtils.lerp(fpsSmoothing, currentFPS, 0.1);
      fps = fpsSmoothing;

      if (!paused) {
        elapsedTime += delta;
      }

      updatePendulumTransforms(elapsedTime);
      const totalParticleCount = updateParticles(delta);
      updateHUD(totalParticleCount);
      updateState(totalParticleCount);

      controls.update();
      renderer.render(scene, camera);
    }

    updatePendulumTransforms(0);
    updateHUD(0);
    updateState(0);
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
