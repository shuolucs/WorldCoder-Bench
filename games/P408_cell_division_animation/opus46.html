<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Cell Division - Mitosis Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#ui-overlay {
    position: absolute;
    top: 0;
    right: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    z-index: 10;
    pointer-events: none;
}

#ui-overlay > * {
    pointer-events: auto;
}

#phase-label {
    color: #ffffff;
    font-size: 22px;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(68, 170, 136, 0.8);
    background: rgba(10, 10, 46, 0.7);
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid rgba(68, 170, 136, 0.3);
}

.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    min-width: 120px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#btn-next {
    background: linear-gradient(135deg, #44aa88, #2d8a6e);
    color: white;
}
#btn-next:hover:not(:disabled) { background: linear-gradient(135deg, #55bb99, #44aa88); transform: scale(1.05); }
#btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

#btn-reset {
    background: linear-gradient(135deg, #aa4444, #8a2d2d);
    color: white;
}
#btn-reset:hover { background: linear-gradient(135deg, #bb5555, #aa4444); transform: scale(1.05); }

#btn-play-all {
    background: linear-gradient(135deg, #4488aa, #2d6e8a);
    color: white;
}
#btn-play-all:hover { background: linear-gradient(135deg, #5599bb, #4488aa); transform: scale(1.05); }

#progress-container {
    width: 200px;
    height: 8px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    overflow: hidden;
}

#progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #44aa88, #88ddbb);
    border-radius: 4px;
    transition: width 0.5s ease;
}

.slider-container {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #aaccbb;
    font-size: 13px;
    background: rgba(10, 10, 46, 0.7);
    padding: 8px 12px;
    border-radius: 6px;
}

#speed-slider {
    width: 100px;
    accent-color: #44aa88;
}

.btn-row {
    display: flex;
    gap: 8px;
}

#info-panel {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    line-height: 1.6;
    z-index: 10;
}
</style>
</head>
<body>

<div id="ui-overlay">
    <div id="phase-label">Phase 0: Interphase</div>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div class="btn-row">
        <button class="btn" id="btn-next">Next Phase</button>
        <button class="btn" id="btn-reset">Reset</button>
    </div>
    <button class="btn" id="btn-play-all">Play All</button>
    <div class="slider-container">
        <label for="speed-slider">Speed:</label>
        <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
        <span id="speed-value">1.0x</span>
    </div>
</div>

<div id="info-panel">
    Arrow Keys: Navigate Phases | Space: Play/Pause | R: Reset
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    // Phase names
    const PHASE_NAMES = [
        'Interphase', 'Prophase', 'Metaphase', 'Anaphase', 'Telophase', 'Cytokinesis'
    ];

    // State
    window.__3D_STATE__ = {
        currentPhase: 0,
        phaseName: 'Interphase',
        cellCount: 1,
        nucleusCount: 1,
        chromosomeColor: '0x2266cc',
        cellScaleX: 1.0,
        cellScaleY: 1.0,
        cellRadius: 2.0,
        nucleusOpacity: 1.0,
        spindleVisible: false,
        isAutoPlaying: false,
        speedMultiplier: 1.0,
        progressPercent: 0,
        chromosomesAligned: false,
        daughterCellPositions: []
    };

    const state = window.__3D_STATE__;

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    // Grid reference plane
    const gridHelper = new THREE.GridHelper(20, 20, 0x1a1a4e, 0x0f0f3a);
    gridHelper.position.y = -3;
    scene.add(gridHelper);

    // Main group for rotation
    const mainGroup = new THREE.Group();
    scene.add(mainGroup);

    // ---- Cell components ----

    // Cell membrane (parent)
    const cellGeometry = new THREE.SphereGeometry(2.0, 64, 64);
    const cellMaterial = new THREE.MeshPhongMaterial({
        color: 0x44aa88,
        transparent: true,
        opacity: 0.4,
        side: THREE.DoubleSide,
        shininess: 80,
        specular: 0x226644
    });
    const cellMembrane = new THREE.Mesh(cellGeometry, cellMaterial);
    mainGroup.add(cellMembrane);

    // Glow effect (slightly larger sphere)
    const glowGeometry = new THREE.SphereGeometry(2.15, 32, 32);
    const glowMaterial = new THREE.MeshBasicMaterial({
        color: 0x44aa88,
        transparent: true,
        opacity: 0.08,
        side: THREE.BackSide
    });
    const glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
    mainGroup.add(glowMesh);

    // Nucleus
    const nucleusGeometry = new THREE.SphereGeometry(0.7, 32, 32);
    const nucleusMaterial = new THREE.MeshPhongMaterial({
        color: 0x8844aa,
        transparent: true,
        opacity: 1.0,
        shininess: 60
    });
    const nucleus = new THREE.Mesh(nucleusGeometry, nucleusMaterial);
    mainGroup.add(nucleus);

    // Organelles (mitochondria)
    const organelles = [];
    const organellePositions = [
        new THREE.Vector3(0.8, 0.5, 0.3),
        new THREE.Vector3(-0.6, -0.4, 0.7),
        new THREE.Vector3(0.3, -0.8, -0.5),
        new THREE.Vector3(-0.9, 0.3, -0.4)
    ];
    for (let i = 0; i < 4; i++) {
        const orgGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const orgMat = new THREE.MeshPhongMaterial({ color: 0xffaa00, shininess: 40 });
        const org = new THREE.Mesh(orgGeo, orgMat);
        org.position.copy(organellePositions[i]);
        mainGroup.add(org);
        organelles.push(org);
    }

    // Chromosomes (4 line segments inside nucleus)
    const chromosomes = [];
    const chromosomeInitialPositions = [
        { start: new THREE.Vector3(-0.2, 0.15, 0.05), end: new THREE.Vector3(0.15, -0.1, 0.1) },
        { start: new THREE.Vector3(0.1, 0.2, -0.1), end: new THREE.Vector3(-0.1, -0.15, -0.05) },
        { start: new THREE.Vector3(-0.15, 0.05, 0.15), end: new THREE.Vector3(0.2, 0.1, -0.1) },
        { start: new THREE.Vector3(0.05, -0.1, 0.12), end: new THREE.Vector3(-0.18, 0.18, -0.08) }
    ];

    for (let i = 0; i < 4; i++) {
        const points = [chromosomeInitialPositions[i].start, chromosomeInitialPositions[i].end];
        const chromGeo = new THREE.BufferGeometry().setFromPoints(points);
        const chromMat = new THREE.LineBasicMaterial({ color: 0x2266cc, linewidth: 2 });
        const chromLine = new THREE.Line(chromGeo, chromMat);
        mainGroup.add(chromLine);
        chromosomes.push({
            line: chromLine,
            material: chromMat,
            initialStart: chromosomeInitialPositions[i].start.clone(),
            initialEnd: chromosomeInitialPositions[i].end.clone(),
            currentStart: chromosomeInitialPositions[i].start.clone(),
            currentEnd: chromosomeInitialPositions[i].end.clone()
        });
    }

    // Chromosome thick representations (cylinders for condensed state)
    const chromosomeThick = [];
    for (let i = 0; i < 4; i++) {
        const cylGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.3, 8);
        const cylMat = new THREE.MeshPhongMaterial({ color: 0x2266cc, transparent: true, opacity: 0 });
        const cyl = new THREE.Mesh(cylGeo, cylMat);
        cyl.visible = false;
        mainGroup.add(cyl);
        chromosomeThick.push(cyl);
    }

    // Spindle apparatus
    const spindleGroup = new THREE.Group();
    spindleGroup.visible = false;
    mainGroup.add(spindleGroup);

    const spindleConeGeo = new THREE.ConeGeometry(0.8, 2.0, 12, 1, true);
    const spindleMat = new THREE.MeshBasicMaterial({
        color: 0x88aaff,
        wireframe: true,
        transparent: true,
        opacity: 0.4
    });
    const spindleLeft = new THREE.Mesh(spindleConeGeo, spindleMat.clone());
    spindleLeft.position.x = -1.8;
    spindleLeft.rotation.z = Math.PI / 2;
    spindleGroup.add(spindleLeft);

    const spindleRight = new THREE.Mesh(spindleConeGeo, spindleMat.clone());
    spindleRight.position.x = 1.8;
    spindleRight.rotation.z = -Math.PI / 2;
    spindleGroup.add(spindleRight);

    // Spindle fibers
    const fiberMaterial = new THREE.LineBasicMaterial({ color: 0x6688cc, transparent: true, opacity: 0.3 });
    const fibers = [];
    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const y = Math.sin(angle) * 0.3;
        const z = Math.cos(angle) * 0.3;
        const fiberGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-2.5, y, z),
            new THREE.Vector3(0, y * 0.1, z * 0.1),
            new THREE.Vector3(2.5, y, z)
        ]);
        const fiber = new THREE.Line(fiberGeo, fiberMaterial.clone());
        spindleGroup.add(fiber);
        fibers.push(fiber);
    }

    // Daughter cell components (initially hidden)
    const daughterGroup = new THREE.Group();
    daughterGroup.visible = false;
    scene.add(daughterGroup);

    // Daughter cell 1
    const daughter1Membrane = new THREE.Mesh(
        new THREE.SphereGeometry(1.4, 48, 48),
        new THREE.MeshPhongMaterial({ color: 0x44aa88, transparent: true, opacity: 0.4, side: THREE.DoubleSide, shininess: 80 })
    );
    daughter1Membrane.position.x = -2.5;
    daughterGroup.add(daughter1Membrane);

    const daughter1Glow = new THREE.Mesh(
        new THREE.SphereGeometry(1.5, 32, 32),
        new THREE.MeshBasicMaterial({ color: 0x44aa88, transparent: true, opacity: 0.08, side: THREE.BackSide })
    );
    daughter1Glow.position.x = -2.5;
    daughterGroup.add(daughter1Glow);

    const daughter1Nucleus = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 24, 24),
        new THREE.MeshPhongMaterial({ color: 0x8844aa, shininess: 60 })
    );
    daughter1Nucleus.position.x = -2.5;
    daughterGroup.add(daughter1Nucleus);

    // Daughter cell 2
    const daughter2Membrane = new THREE.Mesh(
        new THREE.SphereGeometry(1.4, 48, 48),
        new THREE.MeshPhongMaterial({ color: 0x44aa88, transparent: true, opacity: 0.4, side: THREE.DoubleSide, shininess: 80 })
    );
    daughter2Membrane.position.x = 2.5;
    daughterGroup.add(daughter2Membrane);

    const daughter2Glow = new THREE.Mesh(
        new THREE.SphereGeometry(1.5, 32, 32),
        new THREE.MeshBasicMaterial({ color: 0x44aa88, transparent: true, opacity: 0.08, side: THREE.BackSide })
    );
    daughter2Glow.position.x = 2.5;
    daughterGroup.add(daughter2Glow);

    const daughter2Nucleus = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 24, 24),
        new THREE.MeshPhongMaterial({ color: 0x8844aa, shininess: 60 })
    );
    daughter2Nucleus.position.x = 2.5;
    daughterGroup.add(daughter2Nucleus);

    // Daughter organelles
    const daughterOrganelles = [];
    const dOrgPositions = [
        new THREE.Vector3(-2.5 + 0.5, 0.3, 0.2),
        new THREE.Vector3(-2.5 - 0.4, -0.3, 0.4),
        new THREE.Vector3(2.5 + 0.5, 0.3, -0.2),
        new THREE.Vector3(2.5 - 0.4, -0.3, -0.4)
    ];
    for (let i = 0; i < 4; i++) {
        const dOrg = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 12, 12),
            new THREE.MeshPhongMaterial({ color: 0xffaa00, shininess: 40 })
        );
        dOrg.position.copy(dOrgPositions[i]);
        daughterGroup.add(dOrg);
        daughterOrganelles.push(dOrg);
    }

    // Daughter chromosomes
    const daughterChromosomes = [];
    for (let i = 0; i < 4; i++) {
        const cx = i < 2 ? -2.5 : 2.5;
        const offset = (i % 2 === 0) ? 0.15 : -0.15;
        const dChromGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(cx + offset, 0.1, 0.05),
            new THREE.Vector3(cx - offset, -0.1, -0.05)
        ]);
        const dChromLine = new THREE.Line(dChromGeo, new THREE.LineBasicMaterial({ color: 0x2266cc, linewidth: 2 }));
        daughterGroup.add(dChromLine);
        daughterChromosomes.push(dChromLine);
    }

    // Telophase nuclei (inside main group)
    const teloNucleus1 = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 24, 24),
        new THREE.MeshPhongMaterial({ color: 0x8844aa, transparent: true, opacity: 0, shininess: 60 })
    );
    teloNucleus1.position.set(-1.5, 0, 0);
    teloNucleus1.visible = false;
    mainGroup.add(teloNucleus1);

    const teloNucleus2 = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 24, 24),
        new THREE.MeshPhongMaterial({ color: 0x8844aa, transparent: true, opacity: 0, shininess: 60 })
    );
    teloNucleus2.position.set(1.5, 0, 0);
    teloNucleus2.visible = false;
    mainGroup.add(teloNucleus2);

    // Cleavage furrow ring
    const furrowGeometry = new THREE.TorusGeometry(2.0, 0.05, 8, 32);
    const furrowMaterial = new THREE.MeshBasicMaterial({ color: 0x44aa88, transparent: true, opacity: 0 });
    const furrowRing = new THREE.Mesh(furrowGeometry, furrowMaterial);
    furrowRing.rotation.y = Math.PI / 2;
    furrowRing.visible = false;
    mainGroup.add(furrowRing);

    // ---- Animation system ----
    let animationProgress = 1.0; // 1.0 = complete
    let animatingToPhase = 0;
    let autoPlayInterval = null;
    let clock = new THREE.Clock();

    function lerp(a, b, t) {
        return a + (b - a) * Math.max(0, Math.min(1, t));
    }

    function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function updateChromosomeGeometry(chromo, start, end) {
        // Ensure NaN-free
        if (isNaN(start.x) || isNaN(start.y) || isNaN(start.z) ||
            isNaN(end.x) || isNaN(end.y) || isNaN(end.z)) return;
        const positions = chromo.line.geometry.attributes.position;
        positions.setXYZ(0, start.x, start.y, start.z);
        positions.setXYZ(1, end.x, end.y, end.z);
        positions.needsUpdate = true;
    }

    // Phase target states
    function getPhaseTargets(phase) {
        switch(phase) {
            case 0: return {
                cellScaleX: 1.0, cellScaleY: 1.0, cellScaleZ: 1.0,
                cellRadius: 2.0,
                nucleusOpacity: 1.0,
                chromosomeColor: new THREE.Color(0x2266cc),
                chromosomeCondensed: false,
                chromosomesAligned: false,
                chromosomeSplit: false,
                spindleVisible: false,
                spindleOpacity: 0,
                teloNucleiOpacity: 0,
                furrowOpacity: 0,
                furrowScale: 1.0,
                showDaughters: false,
                showMain: true
            };
            case 1: return {
                cellScaleX: 1.1, cellScaleY: 1.0, cellScaleZ: 1.0,
                cellRadius: 2.2,
                nucleusOpacity: 0.15,
                chromosomeColor: new THREE.Color(0xff4444),
                chromosomeCondensed: true,
                chromosomesAligned: false,
                chromosomeSplit: false,
                spindleVisible: false,
                spindleOpacity: 0,
                teloNucleiOpacity: 0,
                furrowOpacity: 0,
                furrowScale: 1.0,
                showDaughters: false,
                showMain: true
            };
            case 2: return {
                cellScaleX: 1.1, cellScaleY: 1.0, cellScaleZ: 1.0,
                cellRadius: 2.2,
                nucleusOpacity: 0.0,
                chromosomeColor: new THREE.Color(0xff4444),
                chromosomeCondensed: true,
                chromosomesAligned: true,
                chromosomeSplit: false,
                spindleVisible: true,
                spindleOpacity: 0.4,
                teloNucleiOpacity: 0,
                furrowOpacity: 0,
                furrowScale: 1.0,
                showDaughters: false,
                showMain: true
            };
            case 3: return {
                cellScaleX: 1.5, cellScaleY: 0.75, cellScaleZ: 0.85,
                cellRadius: 2.2,
                nucleusOpacity: 0.0,
                chromosomeColor: new THREE.Color(0xff4444),
                chromosomeCondensed: true,
                chromosomesAligned: true,
                chromosomeSplit: true,
                spindleVisible: true,
                spindleOpacity: 0.3,
                teloNucleiOpacity: 0,
                furrowOpacity: 0,
                furrowScale: 1.0,
                showDaughters: false,
                showMain: true
            };
            case 4: return {
                cellScaleX: 1.6, cellScaleY: 0.7, cellScaleZ: 0.8,
                cellRadius: 2.2,
                nucleusOpacity: 0.0,
                chromosomeColor: new THREE.Color(0x2266cc),
                chromosomeCondensed: false,
                chromosomesAligned: true,
                chromosomeSplit: true,
                spindleVisible: true,
                spindleOpacity: 0.15,
                teloNucleiOpacity: 1.0,
                furrowOpacity: 0.6,
                furrowScale: 0.35,
                showDaughters: false,
                showMain: true
            };
            case 5: return {
                cellScaleX: 1.0, cellScaleY: 1.0, cellScaleZ: 1.0,
                cellRadius: 2.0,
                nucleusOpacity: 0.0,
                chromosomeColor: new THREE.Color(0x2266cc),
                chromosomeCondensed: false,
                chromosomesAligned: false,
                chromosomeSplit: false,
                spindleVisible: false,
                spindleOpacity: 0,
                teloNucleiOpacity: 0,
                furrowOpacity: 0,
                furrowScale: 0.1,
                showDaughters: true,
                showMain: false
            };
        }
    }

    let prevTargets = getPhaseTargets(0);
    let currTargets = getPhaseTargets(0);

    function applyState(t) {
        const e = easeInOutCubic(t);
        const prev = prevTargets;
        const curr = currTargets;

        // Cell membrane scale
        const sx = lerp(prev.cellScaleX, curr.cellScaleX, e);
        const sy = lerp(prev.cellScaleY, curr.cellScaleY, e);
        const sz = lerp(prev.cellScaleZ, curr.cellScaleZ, e);
        cellMembrane.scale.set(sx, sy, sz);
        glowMesh.scale.set(sx * 1.07, sy * 1.07, sz * 1.07);

        state.cellScaleX = sx;
        state.cellScaleY = sy;
        state.cellRadius = lerp(prev.cellRadius, curr.cellRadius, e);

        // Nucleus opacity
        const nOp = lerp(prev.nucleusOpacity, curr.nucleusOpacity, e);
        nucleusMaterial.opacity = nOp;
        nucleus.visible = nOp > 0.01;
        state.nucleusOpacity = nOp;

        // Chromosome color
        const chromColor = new THREE.Color().copy(prev.chromosomeColor).lerp(curr.chromosomeColor, e);
        chromosomes.forEach(c => c.material.color.copy(chromColor));
        chromosomeThick.forEach(c => c.material.color.copy(chromColor));
        state.chromosomeColor = '0x' + chromColor.getHexString();

        // Chromosome condensation (thickness)
        const condensed = e > 0.5 ? curr.chromosomeCondensed : prev.chromosomeCondensed;
        const condenseT = curr.chromosomeCondensed ? e : (1 - e);
        chromosomeThick.forEach((cyl, i) => {
            if (curr.chromosomeCondensed || prev.chromosomeCondensed) {
                cyl.visible = true;
                cyl.material.opacity = curr.chromosomeCondensed ? e * 0.9 : (1 - e) * 0.9;
                cyl.material.color.copy(chromColor);
            } else {
                cyl.visible = false;
            }
        });

        // Chromosome positions
        const aligned = curr.chromosomesAligned;
        const split = curr.chromosomeSplit;

        for (let i = 0; i < 4; i++) {
            let targetStart, targetEnd;
            const init = chromosomeInitialPositions[i];

            if (split) {
                // Anaphase: split chromosomes to poles
                const poleX = i < 2 ? -1.2 : 1.2;
                const yOff = (i % 2 === 0) ? 0.15 : -0.15;
                targetStart = new THREE.Vector3(poleX - 0.1, yOff, 0.05);
                targetEnd = new THREE.Vector3(poleX + 0.1, -yOff, -0.05);
            } else if (aligned) {
                // Metaphase: align at center
                const yOff = (i - 1.5) * 0.2;
                targetStart = new THREE.Vector3(-0.15, yOff, 0.05);
                targetEnd = new THREE.Vector3(0.15, yOff, -0.05);
            } else {
                targetStart = init.start.clone();
                targetEnd = init.end.clone();
            }

            let prevStart, prevEnd;
            if (prev.chromosomeSplit) {
                const poleX = i < 2 ? -1.2 : 1.2;
                const yOff = (i % 2 === 0) ? 0.15 : -0.15;
                prevStart = new THREE.Vector3(poleX - 0.1, yOff, 0.05);
                prevEnd = new THREE.Vector3(poleX + 0.1, -yOff, -0.05);
            } else if (prev.chromosomesAligned) {
                const yOff = (i - 1.5) * 0.2;
                prevStart = new THREE.Vector3(-0.15, yOff, 0.05);
                prevEnd = new THREE.Vector3(0.15, yOff, -0.05);
            } else {
                prevStart = init.start.clone();
                prevEnd = init.end.clone();
            }

            const s = new THREE.Vector3().lerpVectors(prevStart, targetStart, e);
            const en = new THREE.Vector3().lerpVectors(prevEnd, targetEnd, e);

            updateChromosomeGeometry(chromosomes[i], s, en);

            // Update thick chromosome position
            if (chromosomeThick[i].visible) {
                const mid = new THREE.Vector3().addVectors(s, en).multiplyScalar(0.5);
                chromosomeThick[i].position.copy(mid);
                const dir = new THREE.Vector3().subVectors(en, s);
                chromosomeThick[i].scale.y = dir.length() / 0.3;
                if (dir.length() > 0.001) {
                    chromosomeThick[i].lookAt(en);
                    chromosomeThick[i].rotateX(Math.PI / 2);
                }
            }
        }

        state.chromosomesAligned = aligned;

        // Spindle
        const spindleOp = lerp(prev.spindleOpacity, curr.spindleOpacity, e);
        spindleGroup.visible = spindleOp > 0.01;
        spindleLeft.material.opacity = spindleOp;
        spindleRight.material.opacity = spindleOp;
        fibers.forEach(f => f.material.opacity = spindleOp * 0.75);
        state.spindleVisible = spindleGroup.visible;

        // Stretch spindle in anaphase
        if (curr.chromosomeSplit) {
            const stretch = lerp(1.0, 1.3, e);
            spindleLeft.position.x = lerp(-1.8, -2.2, e);
            spindleRight.position.x = lerp(1.8, 2.2, e);
        } else {
            spindleLeft.position.x = -1.8;
            spindleRight.position.x = 1.8;
        }

        // Telophase nuclei
        const teloOp = lerp(prev.teloNucleiOpacity, curr.teloNucleiOpacity, e);
        teloNucleus1.visible = teloOp > 0.01;
        teloNucleus2.visible = teloOp > 0.01;
        teloNucleus1.material.opacity = teloOp;
        teloNucleus2.material.opacity = teloOp;

        // Furrow
        const furrowOp = lerp(prev.furrowOpacity, curr.furrowOpacity, e);
        const furrowSc = lerp(prev.furrowScale, curr.furrowScale, e);
        furrowRing.visible = furrowOp > 0.01;
        furrowMaterial.opacity = furrowOp;
        furrowRing.scale.set(furrowSc, furrowSc, 1);

        // Organelle constraint - keep within cell
        const effectiveRadiusX = state.cellRadius * sx * 0.7;
        const effectiveRadiusY = state.cellRadius * sy * 0.7;
        const effectiveRadiusZ = state.cellRadius * sz * 0.7;
        organelles.forEach((org, i) => {
            const p = org.position;
            const dx = p.x / effectiveRadiusX;
            const dy = p.y / effectiveRadiusY;
            const dz = p.z / effectiveRadiusZ;
            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
            if (dist > 1.0) {
                p.x /= dist;
                p.y /= dist;
                p.z /= dist;
            }
        });

        // Show/hide main vs daughters
        const showMain = curr.showMain || t < 1.0;
        const showDaughters = curr.showDaughters && t > 0.3;

        if (curr.showDaughters) {
            const fadeT = Math.max(0, (e - 0.3) / 0.7);
            mainGroup.visible = fadeT < 0.95;
            if (mainGroup.visible) {
                cellMaterial.opacity = 0.4 * (1 - fadeT);
            }
            daughterGroup.visible = fadeT > 0.05;
            daughter1Membrane.material.opacity = 0.4 * fadeT;
            daughter2Membrane.material.opacity = 0.4 * fadeT;
            daughter1Glow.material.opacity = 0.08 * fadeT;
            daughter2Glow.material.opacity = 0.08 * fadeT;
        } else {
            mainGroup.visible = true;
            daughterGroup.visible = false;
        }

        // Update nucleus count
        if (state.currentPhase <= 1) state.nucleusCount = 1;
        else if (state.currentPhase <= 3) state.nucleusCount = 0;
        else state.nucleusCount = 2;

        // Cell count
        state.cellCount = (state.currentPhase === 5 && e > 0.5) ? 2 : 1;

        // Daughter cell positions
        if (state.currentPhase === 5) {
            state.daughterCellPositions = [
                { x: -2.5, y: 0, z: 0 },
                { x: 2.5, y: 0, z: 0 }
            ];
        } else {
            state.daughterCellPositions = [];
        }
    }

    function goToPhase(phase) {
        if (phase < 0 || phase > 5) return;
        if (animationProgress < 1.0 && phase !== 0) return; // Don't interrupt

        prevTargets = getPhaseTargets(state.currentPhase);
        currTargets = getPhaseTargets(phase);
        state.currentPhase = phase;
        state.phaseName = PHASE_NAMES[phase];
        animatingToPhase = phase;
        animationProgress = 0;

        updateUI();
    }

    function resetToPhase0() {
        stopAutoPlay();
        state.currentPhase = 0;
        state.phaseName = PHASE_NAMES[0];
        prevTargets = getPhaseTargets(0);
        currTargets = getPhaseTargets(0);
        animationProgress = 1.0;
        animatingToPhase = 0;

        // Reset transforms
        mainGroup.visible = true;
        mainGroup.rotation.y = 0;
        daughterGroup.visible = false;
        cellMaterial.opacity = 0.4;

        applyState(1.0);
        updateUI();
    }

    function nextPhase() {
        if (state.currentPhase < 5 && animationProgress >= 0.99) {
            goToPhase(state.currentPhase + 1);
        }
    }

    function prevPhase() {
        if (state.currentPhase > 0 && animationProgress >= 0.99) {
            goToPhase(state.currentPhase - 1);
        }
    }

    // Auto play
    function startAutoPlay() {
        if (state.isAutoPlaying) return;
        state.isAutoPlaying = true;
        document.getElementById('btn-play-all').textContent = 'Pause';
        autoPlayTick();
    }

    function stopAutoPlay() {
        state.isAutoPlaying = false;
        document.getElementById('btn-play-all').textContent = 'Play All';
        if (autoPlayInterval) {
            clearTimeout(autoPlayInterval);
            autoPlayInterval = null;
        }
    }

    function autoPlayTick() {
        if (!state.isAutoPlaying) return;
        if (state.currentPhase >= 5 && animationProgress >= 0.99) {
            stopAutoPlay();
            return;
        }
        if (animationProgress >= 0.99) {
            nextPhase();
        }
        autoPlayInterval = setTimeout(autoPlayTick, 2000 / state.speedMultiplier);
    }

    function toggleAutoPlay() {
        if (state.isAutoPlaying) {
            stopAutoPlay();
        } else {
            if (state.currentPhase >= 5) {
                resetToPhase0();
            }
            startAutoPlay();
        }
    }

    // UI
    function updateUI() {
        document.getElementById('phase-label').textContent = `Phase ${state.currentPhase}: ${state.phaseName}`;
        document.getElementById('btn-next').disabled = state.currentPhase >= 5;
        state.progressPercent = (state.currentPhase / 5) * 100;
        document.getElementById('progress-bar').style.width = state.progressPercent + '%';
    }

    // Event listeners
    document.getElementById('btn-next').addEventListener('click', nextPhase);
    document.getElementById('btn-reset').addEventListener('click', resetToPhase0);
    document.getElementById('btn-play-all').addEventListener('click', toggleAutoPlay);

    document.getElementById('speed-slider').addEventListener('input', function() {
        state.speedMultiplier = parseFloat(this.value);
        document.getElementById('speed-value').textContent = state.speedMultiplier.toFixed(1) + 'x';
    });

    document.addEventListener('keydown', function(e) {
        switch(e.code) {
            case 'ArrowRight': e.preventDefault(); nextPhase(); break;
            case 'ArrowLeft': e.preventDefault(); prevPhase(); break;
            case 'Space': e.preventDefault(); toggleAutoPlay(); break;
            case 'KeyR': e.preventDefault(); resetToPhase0(); break;
        }
    });

    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Simple mouse orbit
    let isDragging = false;
    let prevMouse = { x: 0, y: 0 };
    let cameraTheta = 0;
    let cameraPhi = 0;
    let cameraDistance = 12;

    renderer.domElement.addEventListener('mousedown', (e) => {
        isDragging = true;
        prevMouse.x = e.clientX;
        prevMouse.y = e.clientY;
    });

    renderer.domElement.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - prevMouse.x;
        const dy = e.clientY - prevMouse.y;
        cameraTheta -= dx * 0.005;
        cameraPhi = Math.max(-Math.PI/3, Math.min(Math.PI/3, cameraPhi - dy * 0.005));
        prevMouse.x = e.clientX;
        prevMouse.y = e.clientY;
    });

    renderer.domElement.addEventListener('mouseup', () => isDragging = false);
    renderer.domElement.addEventListener('mouseleave', () => isDragging = false);

    renderer.domElement.addEventListener('wheel', (e) => {
        cameraDistance = Math.max(6, Math.min(25, cameraDistance + e.deltaY * 0.01));
    });

    // Animation loop
    let time = 0;

    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();
        time += delta;

        // Update animation progress
        if (animationProgress < 1.0) {
            const speed = state.speedMultiplier;
            animationProgress = Math.min(1.0, animationProgress + delta * speed);
            applyState(animationProgress);
        }

        // Gentle rotation when not auto-playing
        if (!state.isAutoPlaying && !isDragging) {
            cameraTheta += 0.2 * delta;
        }

        // Camera orbit
        camera.position.x = cameraDistance * Math.sin(cameraTheta) * Math.cos(cameraPhi);
        camera.position.y = cameraDistance * Math.sin(cameraPhi);
        camera.position.z = cameraDistance * Math.cos(cameraTheta) * Math.cos(cameraPhi);
        camera.lookAt(0, 0, 0);

        // Pulsing glow
        const pulse = 0.06 + Math.sin(time * 2.0) * 0.03;
        glowMaterial.opacity = pulse;
        if (daughter1Glow.material) daughter1Glow.material.opacity = pulse;
        if (daughter2Glow.material) daughter2Glow.material.opacity = pulse;

        // Organelle gentle movement
        organelles.forEach((org, i) => {
            org.position.x += Math.sin(time * 0.5 + i * 1.5) * 0.002;
            org.position.y += Math.cos(time * 0.4 + i * 2.0) * 0.002;
            org.position.z += Math.sin(time * 0.3 + i * 0.8) * 0.002;

            // Constrain to cell
            const maxR = state.cellRadius * 0.65;
            const dist = org.position.length();
            if (dist > maxR) {
                org.position.multiplyScalar(maxR / dist);
            }
        });

        // Daughter group gentle rotation
        if (daughterGroup.visible) {
            daughterGroup.rotation.y = Math.sin(time * 0.3) * 0.1;
        }

        renderer.render(scene, camera);
    }

    // Initialize
    applyState(1.0);
    updateUI();
    animate();
})();
</script>
</body>
</html>
