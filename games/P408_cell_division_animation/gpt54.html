<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Mitosis Animation - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #0a0a2e;
      color: #fff;
    }

    body {
      background: radial-gradient(circle at top, #16204a 0%, #0a0a2e 65%, #050515 100%);
    }

    #ui {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 280px;
      background: rgba(10, 14, 40, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #phase-label {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #d8e3ff;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #2f6fff;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover { background: #4a83ff; }
    button:active { transform: scale(0.98); }
    button:disabled {
      background: #5c657f;
      cursor: not-allowed;
      opacity: 0.7;
    }

    #btn-reset { background: #7a4dff; }
    #btn-reset:hover { background: #8a63ff; }

    #btn-play-all { background: #17a673; }
    #btn-play-all:hover { background: #21bb84; }

    .label {
      font-size: 13px;
      margin-bottom: 4px;
      color: #c7d2ff;
    }

    #progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    #progress-inner {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #47c7ff, #7a7cff, #b96cff);
      transition: width 0.3s ease;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #speed-slider {
      flex: 1;
    }

    #speed-value {
      width: 42px;
      text-align: right;
      font-size: 13px;
      color: #dfe7ff;
    }

    #help {
      position: absolute;
      left: 16px;
      bottom: 16px;
      background: rgba(10, 14, 40, 0.58);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
      color: #dbe3ff;
      z-index: 10;
    }

    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="phase-label">Phase 0: Interphase</div>

    <div class="btn-row">
      <button id="btn-next">Next Phase</button>
      <button id="btn-reset">Reset</button>
      <button id="btn-play-all">Play All</button>
    </div>

    <div class="label">Progress</div>
    <div id="progress-bar"><div id="progress-inner"></div></div>

    <div class="label">Animation Speed</div>
    <div class="slider-row">
      <input id="speed-slider" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
      <div id="speed-value">1.0x</div>
    </div>
  </div>

  <div id="help">
    <strong>Keyboard:</strong><br>
    Right Arrow = Next phase<br>
    Left Arrow = Previous phase<br>
    Space = Play/Pause auto-play<br>
    R = Reset
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    // --------------------------
    // Basic scene setup
    // --------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    // --------------------------
    // Reference plane / grid
    // --------------------------
    const grid = new THREE.GridHelper(20, 20, 0x335577, 0x22334a);
    grid.position.y = -3;
    grid.material.transparent = true;
    grid.material.opacity = 0.18;
    scene.add(grid);

    const planeGeo = new THREE.PlaneGeometry(20, 20);
    const planeMat = new THREE.MeshBasicMaterial({
      color: 0x112244,
      transparent: true,
      opacity: 0.08,
      side: THREE.DoubleSide
    });
    const plane = new THREE.Mesh(planeGeo, planeMat);
    plane.rotation.x = -Math.PI / 2;
    plane.position.y = -3.01;
    scene.add(plane);

    // --------------------------
    // Root groups
    // --------------------------
    const root = new THREE.Group();
    scene.add(root);

    const parentCellGroup = new THREE.Group();
    root.add(parentCellGroup);

    const daughterGroup = new THREE.Group();
    daughterGroup.visible = false;
    root.add(daughterGroup);

    // --------------------------
    // Parent cell
    // --------------------------
    const membraneGeo = new THREE.SphereGeometry(2.0, 64, 64);
    const membraneMat = new THREE.MeshPhongMaterial({
      color: 0x44aa88,
      transparent: true,
      opacity: 0.4,
      shininess: 80,
      side: THREE.DoubleSide
    });
    const parentMembrane = new THREE.Mesh(membraneGeo, membraneMat);
    parentCellGroup.add(parentMembrane);

    const nucleusGeo = new THREE.SphereGeometry(0.7, 32, 32);
    const nucleusMat = new THREE.MeshPhongMaterial({
      color: 0x8844aa,
      transparent: true,
      opacity: 1.0
    });
    const nucleus = new THREE.Mesh(nucleusGeo, nucleusMat);
    parentCellGroup.add(nucleus);

    // Organelles
    const organelles = [];
    const organellePositions = [];
    const organelleGeo = new THREE.SphereGeometry(0.15, 16, 16);
    const organelleMat = new THREE.MeshPhongMaterial({ color: 0xffaa00 });

    function randomPointInSphere(maxRadius) {
      let v = new THREE.Vector3();
      do {
        v.set(
          THREE.MathUtils.randFloatSpread(2 * maxRadius),
          THREE.MathUtils.randFloatSpread(2 * maxRadius),
          THREE.MathUtils.randFloatSpread(2 * maxRadius)
        );
      } while (v.length() > maxRadius);
      return v;
    }

    for (let i = 0; i < 4; i++) {
      const m = new THREE.Mesh(organelleGeo, organelleMat.clone());
      const p = randomPointInSphere(1.6);
      organellePositions.push(p.clone());
      m.position.copy(p);
      organelles.push(m);
      parentCellGroup.add(m);
    }

    // Chromosomes
    const chromosomes = [];
    const chromosomeData = [];
    const looseColor = 0x2266cc;
    const condensedColor = 0xff4444;

    function createChromosome(index) {
      const height = 0.45;
      const geo = new THREE.CylinderGeometry(0.03, 0.03, height, 8);
      const mat = new THREE.MeshPhongMaterial({
        color: looseColor,
        emissive: 0x000000
      });
      const mesh = new THREE.Mesh(geo, mat);

      const angle = (index / 4) * Math.PI * 2;
      const radius = 0.22;
      const pos = new THREE.Vector3(
        Math.cos(angle) * radius,
        Math.sin(angle) * 0.22,
        Math.sin(angle) * radius * 0.6
      );

      mesh.position.copy(pos);
      mesh.rotation.z = Math.PI / 2 - angle * 0.4;
      nucleus.add(mesh);

      chromosomes.push(mesh);
      chromosomeData.push({
        loosePos: pos.clone(),
        metaPos: new THREE.Vector3(0, -0.45 + index * 0.3, 0),
        anaPos: index < 2
          ? new THREE.Vector3(-1.2, -0.25 + index * 0.45, 0)
          : new THREE.Vector3(1.2, -0.25 + (index - 2) * 0.45, 0),
        looseRotZ: mesh.rotation.z
      });
    }

    for (let i = 0; i < 4; i++) createChromosome(i);

    // Spindle apparatus
    const spindleGroup = new THREE.Group();
    spindleGroup.visible = false;
    parentCellGroup.add(spindleGroup);

    const spindleMat = new THREE.MeshBasicMaterial({
      color: 0xaad6ff,
      wireframe: true,
      transparent: true,
      opacity: 0.5
    });

    const coneGeo = new THREE.ConeGeometry(0.8, 2.2, 18, 1, true);
    const leftCone = new THREE.Mesh(coneGeo, spindleMat);
    leftCone.rotation.z = -Math.PI / 2;
    leftCone.position.set(-2.2, 0, 0);

    const rightCone = new THREE.Mesh(coneGeo, spindleMat);
    rightCone.rotation.z = Math.PI / 2;
    rightCone.position.set(2.2, 0, 0);

    spindleGroup.add(leftCone, rightCone);

    const spindleFibers = [];
    const spindleFiberMaterial = new THREE.LineBasicMaterial({
      color: 0x88ccff,
      transparent: true,
      opacity: 0.65
    });

    for (let i = 0; i < 4; i++) {
      const geometry = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-2.2, 0, 0),
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(2.2, 0, 0)
      ]);
      const line = new THREE.Line(geometry, spindleFiberMaterial.clone());
      spindleFibers.push(line);
      spindleGroup.add(line);
    }

    // Daughter cells
    const daughterCells = [];
    function createDaughterCell(x, organelleOffsets) {
      const group = new THREE.Group();
      group.position.set(x, 0, 0);

      const mem = new THREE.Mesh(
        new THREE.SphereGeometry(1.4, 48, 48),
        new THREE.MeshPhongMaterial({
          color: 0x44aa88,
          transparent: true,
          opacity: 0.42,
          shininess: 70
        })
      );

      const nuc = new THREE.Mesh(
        new THREE.SphereGeometry(0.48, 28, 28),
        new THREE.MeshPhongMaterial({
          color: 0x8844aa
        })
      );

      group.add(mem, nuc);

      const ogs = [];
      organelleOffsets.forEach(offset => {
        const o = new THREE.Mesh(organelleGeo, organelleMat.clone());
        o.position.copy(offset);
        ogs.push(o);
        group.add(o);
      });

      daughterGroup.add(group);
      daughterCells.push({ group, membrane: mem, nucleus: nuc, organelles: ogs });
    }

    createDaughterCell(-2.5, [
      new THREE.Vector3(-0.3, 0.15, 0.1),
      new THREE.Vector3(0.25, -0.2, -0.15)
    ]);

    createDaughterCell(2.5, [
      new THREE.Vector3(-0.2, -0.15, 0.12),
      new THREE.Vector3(0.28, 0.18, -0.08)
    ]);

    // Constraint checks
    function validateConstraints() {
      // Organelles within parent cell radius
      organelles.forEach(o => {
        const p = o.position.clone();
        if (!Number.isFinite(p.x) || !Number.isFinite(p.y) || !Number.isFinite(p.z)) {
          o.position.set(0, 0, 0);
        }
        const maxR = 1.8;
        if (p.length() > maxR) {
          p.setLength(maxR);
          o.position.copy(p);
        }
      });

      // Chromosome positions NaN-free
      chromosomes.forEach(ch => {
        if (!Number.isFinite(ch.position.x) || !Number.isFinite(ch.position.y) || !Number.isFinite(ch.position.z)) {
          ch.position.set(0, 0, 0);
        }
      });

      // Daughter cells non-overlapping
      const a = daughterCells[0].group.position;
      const b = daughterCells[1].group.position;
      const dist = a.distanceTo(b);
      const minDist = 2.8;
      if (dist <= minDist) {
        daughterCells[0].group.position.x = -2.5;
        daughterCells[1].group.position.x = 2.5;
      }

      // Approx volume conservation
      const parentVolume = (4 / 3) * Math.PI * Math.pow(2.0, 3);
      const daughterVolume = 2 * (4 / 3) * Math.PI * Math.pow(1.4, 3);
      const ratio = daughterVolume / parentVolume;
      if (ratio < 0.8 || ratio > 1.2) {
        console.warn('Volume conservation outside 20% tolerance:', ratio);
      }
    }
    validateConstraints();

    // --------------------------
    // UI + state
    // --------------------------
    const phaseNames = [
      'Interphase',
      'Prophase',
      'Metaphase',
      'Anaphase',
      'Telophase',
      'Cytokinesis'
    ];

    const btnNext = document.getElementById('btn-next');
    const btnReset = document.getElementById('btn-reset');
    const btnPlayAll = document.getElementById('btn-play-all');
    const phaseLabel = document.getElementById('phase-label');
    const progressInner = document.getElementById('progress-inner');
    const speedSlider = document.getElementById('speed-slider');
    const speedValue = document.getElementById('speed-value');

    let currentPhase = 0;
    let isAutoPlaying = false;
    let autoPlayTimer = null;
    let speedMultiplier = parseFloat(speedSlider.value);

    window.__3D_STATE__ = {};

    function hexString(v) {
      return '0x' + v.toString(16).padStart(6, '0');
    }

    function updateState() {
      const chromosomeColor = currentPhase >= 1 && currentPhase <= 3 ? condensedColor : looseColor;
      const nucleusCount = currentPhase <= 1 ? 1 : (currentPhase <= 3 ? 0 : 2);

      window.__3D_STATE__ = {
        currentPhase,
        phaseName: phaseNames[currentPhase],
        cellCount: currentPhase === 5 ? 2 : 1,
        nucleusCount,
        chromosomeColor: hexString(chromosomeColor),
        cellScaleX: currentValues.parentScaleX,
        cellScaleY: currentValues.parentScaleY,
        cellRadius: currentValues.parentRadius,
        nucleusOpacity: currentValues.nucleusOpacity,
        spindleVisible: currentValues.spindleVisible > 0.5,
        isAutoPlaying,
        speedMultiplier,
        progressPercent: Math.round((currentPhase / 5) * 100),
        chromosomesAligned: currentPhase >= 2,
        daughterCellPositions: currentPhase === 5
          ? daughterCells.map(d => ({
              x: d.group.position.x,
              y: d.group.position.y,
              z: d.group.position.z
            }))
          : []
      };
    }

    function updateUI() {
      phaseLabel.textContent = `Phase ${currentPhase}: ${phaseNames[currentPhase]}`;
      progressInner.style.width = `${(currentPhase / 5) * 100}%`;
      btnNext.disabled = currentPhase >= 5;
      btnPlayAll.textContent = isAutoPlaying ? 'Pause' : 'Play All';
      speedValue.textContent = `${speedMultiplier.toFixed(1)}x`;
      updateState();
    }

    // --------------------------
    // Animation targets
    // --------------------------
    const currentValues = {
      parentRadius: 2.0,
      parentScaleX: 1.0,
      parentScaleY: 1.0,
      parentScaleZ: 1.0,
      nucleusOpacity: 1.0,
      nucleusScale: 1.0,
      chromosomeThickness: 0.03,
      chromosomeColor: looseColor,
      chromosomeEmissive: 0x000000,
      spindleVisible: 0,
      spindleStretch: 1.0,
      parentVisible: 1,
      daughterVisible: 0,
      furrowScaleY: 1.0,
      furrowScaleZ: 1.0
    };

    let startValues = { ...currentValues };
    let targetValues = { ...currentValues };
    let transitionStart = 0;
    let transitionDuration = 1.0;
    let transitioning = false;

    function setPhase(phase) {
      phase = THREE.MathUtils.clamp(phase, 0, 5);
      currentPhase = phase;

      startValues = { ...currentValues };
      targetValues = getTargetForPhase(phase);
      transitionStart = performance.now() / 1000;
      transitionDuration = 1.0 / speedMultiplier;
      transitioning = true;

      updateUI();
    }

    function getTargetForPhase(phase) {
      const t = {
        parentRadius: 2.0,
        parentScaleX: 1.0,
        parentScaleY: 1.0,
        parentScaleZ: 1.0,
        nucleusOpacity: 1.0,
        nucleusScale: 1.0,
        chromosomeThickness: 0.03,
        chromosomeColor: looseColor,
        chromosomeEmissive: 0x000000,
        spindleVisible: 0,
        spindleStretch: 1.0,
        parentVisible: 1,
        daughterVisible: 0,
        furrowScaleY: 1.0,
        furrowScaleZ: 1.0
      };

      switch (phase) {
        case 0: // Interphase
          break;
        case 1: // Prophase
          t.parentRadius = 2.2;
          t.nucleusOpacity = 0.15;
          t.chromosomeThickness = 0.08;
          t.chromosomeColor = condensedColor;
          t.chromosomeEmissive = 0x441111;
          break;
        case 2: // Metaphase
          t.parentRadius = 2.2;
          t.nucleusOpacity = 0.0;
          t.chromosomeThickness = 0.09;
          t.chromosomeColor = condensedColor;
          t.chromosomeEmissive = 0x662222;
          t.spindleVisible = 1;
          break;
        case 3: // Anaphase
          t.parentRadius = 2.2;
          t.nucleusOpacity = 0.0;
          t.chromosomeThickness = 0.09;
          t.chromosomeColor = condensedColor;
          t.chromosomeEmissive = 0x662222;
          t.spindleVisible = 1;
          t.spindleStretch = 1.35;
          t.parentScaleX = 1.5;
          t.parentScaleY = 0.75;
          t.parentScaleZ = 1.0;
          break;
        case 4: // Telophase
          t.parentRadius = 2.2;
          t.nucleusOpacity = 0.0;
          t.chromosomeThickness = 0.04;
          t.chromosomeColor = looseColor;
          t.chromosomeEmissive = 0x000000;
          t.spindleVisible = 1;
          t.spindleStretch = 1.1;
          t.parentScaleX = 1.45;
          t.parentScaleY = 0.65;
          t.parentScaleZ = 0.78;
          t.furrowScaleY = 0.65;
          t.furrowScaleZ = 0.78;
          break;
        case 5: // Cytokinesis
          t.parentVisible = 0;
          t.daughterVisible = 1;
          t.spindleVisible = 0;
          t.nucleusOpacity = 0.0;
          break;
      }
      return t;
    }

    function lerpColor(a, b, t) {
      const c1 = new THREE.Color(a);
      const c2 = new THREE.Color(b);
      return c1.lerp(c2, t);
    }

    function smoothstep(t) {
      return t * t * (3 - 2 * t);
    }

    function applyInterpolatedValues(alphaRaw) {
      const alpha = smoothstep(THREE.MathUtils.clamp(alphaRaw, 0, 1));

      for (const key of Object.keys(currentValues)) {
        if (typeof currentValues[key] === 'number' && key !== 'chromosomeColor' && key !== 'chromosomeEmissive') {
          currentValues[key] = THREE.MathUtils.lerp(startValues[key], targetValues[key], alpha);
        }
      }

      // Parent visibility
      parentCellGroup.visible = currentValues.parentVisible > 0.02;
      daughterGroup.visible = currentValues.daughterVisible > 0.02;

      // Membrane pulse
      const time = performance.now() * 0.001;
      const pulse = 1.0 + Math.sin(time * 2.4) * 0.02;
      parentMembrane.scale.set(
        currentValues.parentScaleX * pulse,
        currentValues.parentScaleY * currentValues.furrowScaleY * pulse,
        currentValues.parentScaleZ * currentValues.furrowScaleZ * pulse
      );

      // Radius by geometry scale
      const baseRadiusScale = currentValues.parentRadius / 2.0;
      parentMembrane.scale.multiplyScalar(baseRadiusScale);

      membraneMat.opacity = 0.32 + 0.08 * pulse;
      membraneMat.emissive = new THREE.Color(0x0f2f28).multiplyScalar(0.3 + 0.25 * (pulse - 0.98) * 15);

      nucleus.material.opacity = currentValues.nucleusOpacity;
      nucleus.scale.setScalar(currentValues.nucleusScale);
      nucleus.visible = currentValues.nucleusOpacity > 0.01;

      // Spindle
      spindleGroup.visible = currentValues.spindleVisible > 0.02;
      spindleGroup.children.forEach(obj => {
        if (obj.material && 'opacity' in obj.material) {
          obj.material.opacity = 0.5 * currentValues.spindleVisible;
        }
      });
      leftCone.position.x = -2.2 * currentValues.spindleStretch;
      rightCone.position.x = 2.2 * currentValues.spindleStretch;

      // Chromosome color interpolation
      const c = lerpColor(startValues.chromosomeColor, targetValues.chromosomeColor, alpha);
      const emissive = lerpColor(startValues.chromosomeEmissive, targetValues.chromosomeEmissive, alpha);

      chromosomes.forEach((ch, i) => {
        const thickness = THREE.MathUtils.lerp(startValues.chromosomeThickness, targetValues.chromosomeThickness, alpha);
        ch.scale.set(
          Math.max(thickness / 0.03, 0.1),
          1,
          Math.max(thickness / 0.03, 0.1)
        );
        ch.material.color.copy(c);
        ch.material.emissive.copy(emissive);
      });

      applyChromosomePhasePositions(alpha);

      // Telophase nuclei
      updateTelophaseNuclei(alpha);

      // Daughter fade-in
      daughterCells.forEach(d => {
        d.membrane.material.opacity = 0.42 * currentValues.daughterVisible;
        d.nucleus.material.opacity = currentValues.daughterVisible;
        d.group.visible = currentValues.daughterVisible > 0.02;
      });

      updateState();
    }

    // Telophase temporary nuclei
    let telophaseNuclei = null;
    function ensureTelophaseNuclei() {
      if (telophaseNuclei) return;
      telophaseNuclei = [
        new THREE.Mesh(
          new THREE.SphereGeometry(0.5, 24, 24),
          new THREE.MeshPhongMaterial({ color: 0x8844aa, transparent: true, opacity: 0 })
        ),
        new THREE.Mesh(
          new THREE.SphereGeometry(0.5, 24, 24),
          new THREE.MeshPhongMaterial({ color: 0x8844aa, transparent: true, opacity: 0 })
        )
      ];
      telophaseNuclei[0].position.set(-1.5, 0, 0);
      telophaseNuclei[1].position.set(1.5, 0, 0);
      parentCellGroup.add(telophaseNuclei[0], telophaseNuclei[1]);
    }

    function updateTelophaseNuclei(alpha) {
      ensureTelophaseNuclei();
      const visible = currentPhase === 4 ? 1 : 0;
      const fade = visible ? alpha : 0;
      telophaseNuclei.forEach(n => {
        n.visible = visible > 0;
        n.material.opacity = 0.9 * fade;
      });
    }

    function applyChromosomePhasePositions(alpha) {
      const phase = currentPhase;
      chromosomes.forEach((ch, i) => {
        const data = chromosomeData[i];
        let pos = new THREE.Vector3();

        if (phase === 0) {
          pos.copy(data.loosePos);
          ch.rotation.z = data.looseRotZ;
          nucleus.add(ch);
        } else if (phase === 1) {
          pos.copy(data.loosePos);
          ch.rotation.z = data.looseRotZ * 0.4;
          nucleus.add(ch);
        } else if (phase === 2) {
          pos.copy(data.metaPos);
          ch.rotation.z = Math.PI / 2;
          parentCellGroup.add(ch);
        } else if (phase === 3) {
          pos.copy(data.anaPos);
          ch.rotation.z = Math.PI / 2;
          parentCellGroup.add(ch);
        } else if (phase === 4) {
          pos.copy(data.anaPos.clone().multiplyScalar(0.92));
          ch.rotation.z = Math.PI / 2 + (i % 2 === 0 ? 0.35 : -0.35);
          parentCellGroup.add(ch);
        } else {
          ch.visible = false;
          return;
        }

        ch.visible = true;

        if (phase === 2 && transitioning) {
          const prev = data.loosePos.clone();
          pos = prev.lerp(data.metaPos, smoothstep(alpha));
        }

        if (phase === 3 && transitioning) {
          const prev = data.metaPos.clone();
          pos = prev.lerp(data.anaPos, smoothstep(alpha));
        }

        if (phase === 4 && transitioning) {
          const prev = data.anaPos.clone();
          const next = data.anaPos.clone().multiplyScalar(0.92);
          pos = prev.lerp(next, smoothstep(alpha));
        }

        if (phase <= 1) {
          ch.position.copy(pos);
        } else {
          ch.position.copy(pos);
        }
      });

      // Spindle fibers follow chromosomes
      spindleFibers.forEach((line, i) => {
        const ch = chromosomes[i];
        if (!ch.visible) return;
        const cp = ch.getWorldPosition(new THREE.Vector3());
        const local = parentCellGroup.worldToLocal(cp.clone());
        const pts = [
          new THREE.Vector3(-2.2 * currentValues.spindleStretch, 0, 0),
          local,
          new THREE.Vector3(2.2 * currentValues.spindleStretch, 0, 0)
        ];
        line.geometry.setFromPoints(pts);
      });
    }

    // --------------------------
    // Controls
    // --------------------------
    function nextPhase() {
      if (currentPhase < 5) setPhase(currentPhase + 1);
      if (currentPhase >= 5) stopAutoPlay();
    }

    function prevPhase() {
      if (currentPhase > 0) setPhase(currentPhase - 1);
    }

    function resetAll() {
      stopAutoPlay();
      currentPhase = 0;
      startValues = { ...currentValues };
      targetValues = getTargetForPhase(0);
      Object.assign(currentValues, targetValues);
      transitioning = false;

      chromosomes.forEach((ch, i) => {
        ch.visible = true;
        ch.material.color.set(looseColor);
        ch.position.copy(chromosomeData[i].loosePos);
        ch.scale.set(1, 1, 1);
        nucleus.add(ch);
      });

      parentCellGroup.visible = true;
      daughterGroup.visible = false;
      setPhase(0);
      applyInterpolatedValues(1);
      updateUI();
    }

    function stopAutoPlay() {
      isAutoPlaying = false;
      if (autoPlayTimer) {
        clearInterval(autoPlayTimer);
        autoPlayTimer = null;
      }
      updateUI();
    }

    function startAutoPlay() {
      if (currentPhase >= 5) resetAll();
      isAutoPlaying = true;
      updateUI();

      if (autoPlayTimer) clearInterval(autoPlayTimer);
      autoPlayTimer = setInterval(() => {
        if (!isAutoPlaying) return;
        if (currentPhase < 5) {
          nextPhase();
        } else {
          stopAutoPlay();
        }
      }, 2000);
    }

    function toggleAutoPlay() {
      if (isAutoPlaying) stopAutoPlay();
      else startAutoPlay();
    }

    btnNext.addEventListener('click', nextPhase);
    btnReset.addEventListener('click', resetAll);
    btnPlayAll.addEventListener('click', toggleAutoPlay);

    speedSlider.addEventListener('input', () => {
      speedMultiplier = parseFloat(speedSlider.value);
      speedValue.textContent = `${speedMultiplier.toFixed(1)}x`;
      updateState();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowRight') nextPhase();
      else if (e.code === 'ArrowLeft') prevPhase();
      else if (e.code === 'Space') {
        e.preventDefault();
        toggleAutoPlay();
      } else if (e.code === 'KeyR') resetAll();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --------------------------
    // Init phase
    // --------------------------
    Object.assign(currentValues, getTargetForPhase(0));
    applyInterpolatedValues(1);
    updateUI();

    // --------------------------
    // Render loop
    // --------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      if (!isAutoPlaying) {
        root.rotation.y += 0.2 * clock.getDelta();
      } else {
        clock.getDelta();
      }

      if (transitioning) {
        const now = performance.now() / 1000;
        const t = (now - transitionStart) / transitionDuration;
        applyInterpolatedValues(t);
        if (t >= 1) {
          transitioning = false;
          applyInterpolatedValues(1);
        }
      } else {
        applyInterpolatedValues(1);
      }

      // subtle daughter pulse in phase 5
      if (currentPhase === 5) {
        const pulse = 1 + Math.sin(elapsed * 2.2) * 0.015;
        daughterCells.forEach(d => d.membrane.scale.setScalar(pulse));
      }

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
