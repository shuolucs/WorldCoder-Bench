<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cell Division (Mitosis) Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .panel {
            background: rgba(10, 10, 46, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px 20px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        button {
            background: #2266cc;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #3377dd; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555555; color: #888; cursor: not-allowed; transform: none; }
        
        #phase-label {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #progress-container {
            width: 300px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #44aa88, #2266cc);
            transition: width 0.3s ease-out;
        }
        .bottom-bar {
            display: flex;
            justify-content: center;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 400px;
        }
        input[type=range] {
            flex-grow: 1;
            accent-color: #2266cc;
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-align: right;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div class="top-bar">
            <div class="panel">
                <h2 id="phase-label">Phase 0: Interphase</h2>
                <div id="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>
            <div class="controls panel">
                <button id="btn-reset" title="Shortcut: R">Reset</button>
                <button id="btn-play-all" title="Shortcut: Space">Play All</button>
                <button id="btn-next" title="Shortcut: Right Arrow">Next Phase &rarr;</button>
            </div>
        </div>
        
        <div class="bottom-bar">
            <div class="panel slider-group">
                <label for="speed-slider">Animation Speed:</label>
                <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
                <span id="speed-value">1.0x</span>
            </div>
        </div>
        
        <div class="instructions">
            Keyboard Controls:<br>
            &rarr; Next Phase | &larr; Prev Phase<br>
            Space: Play/Pause | R: Reset
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // Reference Grid
        const gridHelper = new THREE.GridHelper(30, 30, 0x444444, 0x222244);
        gridHelper.position.y = -3;
        scene.add(gridHelper);

        // --- Materials & Geometries ---
        const matMembrane = new THREE.MeshPhongMaterial({ 
            color: 0x44aa88, transparent: true, opacity: 0.4, shininess: 80, 
            emissive: 0x44aa88, emissiveIntensity: 0.2, side: THREE.DoubleSide 
        });
        const matNucleus = new THREE.MeshPhongMaterial({ color: 0x8844aa, transparent: true, opacity: 1.0, shininess: 50 });
        const matOrganelle = new THREE.MeshPhongMaterial({ color: 0xffaa00, shininess: 100 });
        const matChromosome = new THREE.MeshPhongMaterial({ color: 0x2266cc, shininess: 30 });
        const matSpindle = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0 });

        const geoMembrane = new THREE.SphereGeometry(2.0, 64, 64);
        const baseMembranePositions = geoMembrane.attributes.position.clone(); // For cleavage furrow
        const geoNucleus = new THREE.SphereGeometry(0.7, 32, 32);
        const geoOrganelle = new THREE.SphereGeometry(0.15, 16, 16);
        const geoChromosome = new THREE.CylinderGeometry(0.06, 0.06, 0.5, 8);
        const geoSpindle = new THREE.ConeGeometry(1.2, 3, 16);
        geoSpindle.translate(0, 1.5, 0);
        geoSpindle.rotateZ(-Math.PI / 2);

        // --- Object Creation ---
        const cellGroup = new THREE.Group();
        scene.add(cellGroup);

        const membrane = new THREE.Mesh(geoMembrane, matMembrane);
        cellGroup.add(membrane);

        const nucleus = new THREE.Mesh(geoNucleus, matNucleus);
        cellGroup.add(nucleus);

        // Organelles
        const organelles = [];
        const baseOrganellePos = [];
        for (let i = 0; i < 4; i++) {
            const org = new THREE.Mesh(geoOrganelle, matOrganelle);
            const pos = new THREE.Vector3((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2);
            org.position.copy(pos);
            baseOrganellePos.push(pos.clone());
            cellGroup.add(org);
            organelles.push(org);
        }

        // Chromosomes (8 total to allow splitting, overlapping initially)
        const chromosomes = [];
        const baseChromoPos = [
            new THREE.Vector3(-0.2, 0.3, 0.1), new THREE.Vector3(0.3, -0.2, -0.1),
            new THREE.Vector3(-0.1, -0.3, 0.2), new THREE.Vector3(0.2, 0.2, -0.2)
        ];
        const baseChromoRot = [];
        for (let i = 0; i < 8; i++) {
            const chromo = new THREE.Mesh(geoChromosome, matChromosome);
            chromo.position.copy(baseChromoPos[i % 4]);
            const rot = new THREE.Euler(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            chromo.rotation.copy(rot);
            if(i < 4) baseChromoRot.push(rot.clone());
            cellGroup.add(chromo);
            chromosomes.push(chromo);
        }

        // Spindle
        const spindleGroup = new THREE.Group();
        const spindleL = new THREE.Mesh(geoSpindle, matSpindle);
        spindleL.position.set(-1.5, 0, 0);
        const spindleR = new THREE.Mesh(geoSpindle, matSpindle);
        spindleR.position.set(1.5, 0, 0);
        spindleR.rotation.y = Math.PI;
        spindleGroup.add(spindleL, spindleR);
        spindleGroup.visible = false;
        cellGroup.add(spindleGroup);

        // New Nuclei (Phase 4)
        const newNucleusL = new THREE.Mesh(geoNucleus, matNucleus);
        newNucleusL.position.set(-1.5, 0, 0);
        newNucleusL.scale.setScalar(0.001);
        const newNucleusR = new THREE.Mesh(geoNucleus, matNucleus);
        newNucleusR.position.set(1.5, 0, 0);
        newNucleusR.scale.setScalar(0.001);
        cellGroup.add(newNucleusL, newNucleusR);

        // Daughter Cells (Phase 5)
        const daughterGroup = new THREE.Group();
        daughterGroup.visible = false;
        scene.add(daughterGroup);

        function createDaughterCell(xPos) {
            const group = new THREE.Group();
            group.position.x = xPos;
            const mem = new THREE.Mesh(new THREE.SphereGeometry(1.4, 32, 32), matMembrane);
            const nuc = new THREE.Mesh(geoNucleus, matNucleus);
            group.add(mem, nuc);
            for (let i = 0; i < 2; i++) {
                const org = new THREE.Mesh(geoOrganelle, matOrganelle);
                org.position.set((Math.random() - 0.5) * 1.2, (Math.random() - 0.5) * 1.2, (Math.random() - 0.5) * 1.2);
                group.add(org);
            }
            for (let i = 0; i < 4; i++) {
                const chromo = new THREE.Mesh(geoChromosome, matChromosome);
                chromo.position.set((Math.random() - 0.5) * 0.5, (Math.random() - 0.5) * 0.5, (Math.random() - 0.5) * 0.5);
                chromo.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                group.add(chromo);
            }
            return group;
        }
        const daughter1 = createDaughterCell(-2.5);
        const daughter2 = createDaughterCell(2.5);
        daughterGroup.add(daughter1, daughter2);

        // --- State & Animation Management ---
        const phaseNames = [
            "Phase 0: Interphase", "Phase 1: Prophase", "Phase 2: Metaphase",
            "Phase 3: Anaphase", "Phase 4: Telophase", "Phase 5: Cytokinesis"
        ];

        let currentPhase = 0;
        let isAutoPlaying = false;
        let speedMultiplier = 1.0;
        let autoPlayTimer = 0;
        let currentPinch = 0;

        const tweens = [];

        function tweenValue(start, end, duration, onUpdate) {
            const t = { start, end, duration, time: 0, onUpdate };
            tweens.push(t);
            return t;
        }

        function updateTweens(dt) {
            for (let i = tweens.length - 1; i >= 0; i--) {
                const t = tweens[i];
                t.time += dt;
                const p = Math.min(t.time / t.duration, 1);
                const ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; // EaseInOutQuad

                if (t.start instanceof THREE.Color) {
                    t.onUpdate(t.start.clone().lerp(t.end, ease), ease);
                } else if (t.start instanceof THREE.Vector3) {
                    t.onUpdate(t.start.clone().lerp(t.end, ease), ease);
                } else {
                    t.onUpdate(t.start + (t.end - t.start) * ease, ease);
                }

                if (p >= 1) tweens.splice(i, 1);
            }
        }

        function setPhase(p) {
            if (p < 0 || p > 5) return;
            currentPhase = p;
            tweens.length = 0; // Clear active tweens
            const duration = 1.0 / speedMultiplier;

            // UI Updates
            document.getElementById('phase-label').innerText = phaseNames[currentPhase];
            document.getElementById('progress-bar').style.width = `${(currentPhase / 5) * 100}%`;
            document.getElementById('btn-next').disabled = currentPhase === 5;

            // Transition Logic
            switch (currentPhase) {
                case 0: // Interphase
                    cellGroup.visible = true; daughterGroup.visible = false;
                    tweenValue(cellGroup.scale, new THREE.Vector3(1, 1, 1), duration, v => cellGroup.scale.copy(v));
                    tweenValue(currentPinch, 0, duration, v => currentPinch = v);
                    tweenValue(matNucleus.opacity, 1.0, duration, v => matNucleus.opacity = v);
                    tweenValue(matChromosome.color, new THREE.Color(0x2266cc), duration, v => matChromosome.color.copy(v));
                    chromosomes.forEach((c, i) => {
                        tweenValue(c.scale, new THREE.Vector3(1, 1, 1), duration, v => c.scale.copy(v));
                        tweenValue(c.position, baseChromoPos[i % 4], duration, v => c.position.copy(v));
                        tweenValue(new THREE.Vector3().setFromEuler(c.rotation), new THREE.Vector3().setFromEuler(baseChromoRot[i%4]), duration, v => c.rotation.setFromVector3(v));
                    });
                    organelles.forEach((o, i) => tweenValue(o.position, baseOrganellePos[i], duration, v => o.position.copy(v)));
                    tweenValue(matSpindle.opacity, 0, duration, v => { matSpindle.opacity = v; if (v === 0) spindleGroup.visible = false; });
                    tweenValue(newNucleusL.scale, new THREE.Vector3(0.001, 0.001, 0.001), duration, v => newNucleusL.scale.copy(v));
                    tweenValue(newNucleusR.scale, new THREE.Vector3(0.001, 0.001, 0.001), duration, v => newNucleusR.scale.copy(v));
                    break;

                case 1: // Prophase
                    cellGroup.visible = true; daughterGroup.visible = false;
                    tweenValue(cellGroup.scale, new THREE.Vector3(1.1, 1.1, 1.1), duration, v => cellGroup.scale.copy(v));
                    tweenValue(currentPinch, 0, duration, v => currentPinch = v);
                    tweenValue(matNucleus.opacity, 0.15, duration, v => matNucleus.opacity = v);
                    tweenValue(matChromosome.color, new THREE.Color(0xff4444), duration, v => matChromosome.color.copy(v));
                    chromosomes.forEach((c, i) => {
                        tweenValue(c.scale, new THREE.Vector3(2, 2, 2), duration, v => c.scale.copy(v));
                        tweenValue(c.position, baseChromoPos[i % 4], duration, v => c.position.copy(v));
                    });
                    tweenValue(matSpindle.opacity, 0, duration, v => { matSpindle.opacity = v; if (v === 0) spindleGroup.visible = false; });
                    break;

                case 2: // Metaphase
                    cellGroup.visible = true; daughterGroup.visible = false;
                    tweenValue(cellGroup.scale, new THREE.Vector3(1.1, 1.1, 1.1), duration, v => cellGroup.scale.copy(v));
                    tweenValue(currentPinch, 0, duration, v => currentPinch = v);
                    tweenValue(matNucleus.opacity, 0, duration, v => matNucleus.opacity = v);
                    chromosomes.forEach((c, i) => {
                        const targetPos = new THREE.Vector3(0, ((i % 4) - 1.5) * 0.3, 0);
                        tweenValue(c.position, targetPos, duration, v => c.position.copy(v));
                        tweenValue(new THREE.Vector3().setFromEuler(c.rotation), new THREE.Vector3(0, 0, Math.PI / 2), duration, v => c.rotation.setFromVector3(v));
                    });
                    spindleGroup.visible = true;
                    tweenValue(matSpindle.opacity, 0.5, duration, v => matSpindle.opacity = v);
                    tweenValue(spindleGroup.scale, new THREE.Vector3(1, 1, 1), duration, v => spindleGroup.scale.copy(v));
                    break;

                case 3: // Anaphase
                    cellGroup.visible = true; daughterGroup.visible = false;
                    tweenValue(cellGroup.scale, new THREE.Vector3(1.5, 0.75, 0.75), duration, v => cellGroup.scale.copy(v));
                    tweenValue(currentPinch, 0, duration, v => currentPinch = v);
                    chromosomes.forEach((c, i) => {
                        const targetPos = new THREE.Vector3(i < 4 ? -1.2 : 1.2, ((i % 4) - 1.5) * 0.3, 0);
                        tweenValue(c.position, targetPos, duration, v => c.position.copy(v));
                    });
                    tweenValue(spindleGroup.scale, new THREE.Vector3(1.5, 1, 1), duration, v => spindleGroup.scale.copy(v));
                    organelles.forEach((o, i) => {
                        const targetPos = new THREE.Vector3(i < 2 ? -1.0 : 1.0, o.position.y * 0.5, o.position.z * 0.5);
                        tweenValue(o.position, targetPos, duration, v => o.position.copy(v));
                    });
                    tweenValue(newNucleusL.scale, new THREE.Vector3(0.001, 0.001, 0.001), duration, v => newNucleusL.scale.copy(v));
                    tweenValue(newNucleusR.scale, new THREE.Vector3(0.001, 0.001, 0.001), duration, v => newNucleusR.scale.copy(v));
                    break;

                case 4: // Telophase
                    cellGroup.visible = true; daughterGroup.visible = false;
                    tweenValue(cellGroup.scale, new THREE.Vector3(1.5, 0.75, 0.75), duration, v => cellGroup.scale.copy(v));
                    tweenValue(currentPinch, 0.8, duration, v => currentPinch = v);
                    tweenValue(matChromosome.color, new THREE.Color(0x2266cc), duration, v => matChromosome.color.copy(v));
                    chromosomes.forEach((c, i) => {
                        const targetPos = new THREE.Vector3(i < 4 ? -1.5 : 1.5, (Math.random() - 0.5) * 0.4, (Math.random() - 0.5) * 0.4);
                        tweenValue(c.position, targetPos, duration, v => c.position.copy(v));
                        tweenValue(c.scale, new THREE.Vector3(1, 1, 1), duration, v => c.scale.copy(v));
                    });
                    tweenValue(matSpindle.opacity, 0, duration, v => matSpindle.opacity = v);
                    // Inverse scale to keep nuclei spherical inside scaled parent
                    const invScale = new THREE.Vector3(1/1.5 * 0.71, 1/0.75 * 0.71, 1/0.75 * 0.71); 
                    tweenValue(newNucleusL.scale, invScale, duration, v => newNucleusL.scale.copy(v));
                    tweenValue(newNucleusR.scale, invScale, duration, v => newNucleusR.scale.copy(v));
                    break;

                case 5: // Cytokinesis
                    cellGroup.visible = false; daughterGroup.visible = true;
                    daughter1.position.set(-1.5, 0, 0); daughter1.scale.setScalar(0.8);
                    daughter2.position.set(1.5, 0, 0); daughter2.scale.setScalar(0.8);
                    tweenValue(daughter1.position, new THREE.Vector3(-2.5, 0, 0), duration, v => daughter1.position.copy(v));
                    tweenValue(daughter2.position, new THREE.Vector3(2.5, 0, 0), duration, v => daughter2.position.copy(v));
                    tweenValue(daughter1.scale, new THREE.Vector3(1, 1, 1), duration, v => daughter1.scale.copy(v));
                    tweenValue(daughter2.scale, new THREE.Vector3(1, 1, 1), duration, v => daughter2.scale.copy(v));
                    break;
            }
        }

        // --- UI Events ---
        document.getElementById('btn-next').addEventListener('click', () => setPhase(currentPhase + 1));
        document.getElementById('btn-reset').addEventListener('click', () => { isAutoPlaying = false; document.getElementById('btn-play-all').innerText = "Play All"; setPhase(0); });
        document.getElementById('btn-play-all').addEventListener('click', () => {
            isAutoPlaying = !isAutoPlaying;
            document.getElementById('btn-play-all').innerText = isAutoPlaying ? "Pause" : "Play All";
            if (isAutoPlaying && currentPhase === 5) setPhase(0);
        });
        document.getElementById('speed-slider').addEventListener('input', (e) => {
            speedMultiplier = parseFloat(e.target.value);
            document.getElementById('speed-value').innerText = speedMultiplier.toFixed(1) + 'x';
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') setPhase(currentPhase + 1);
            if (e.key === 'ArrowLeft') setPhase(currentPhase - 1);
            if (e.key === ' ') { e.preventDefault(); document.getElementById('btn-play-all').click(); }
            if (e.key.toLowerCase() === 'r') document.getElementById('btn-reset').click();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Render Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            updateTweens(dt * speedMultiplier);

            // Auto-play logic
            if (isAutoPlaying && currentPhase < 5) {
                autoPlayTimer += dt * speedMultiplier;
                if (autoPlayTimer >= 2.0) {
                    setPhase(currentPhase + 1);
                    autoPlayTimer = 0;
                }
            } else if (currentPhase === 5 && isAutoPlaying) {
                isAutoPlaying = false;
                document.getElementById('btn-play-all').innerText = "Play All";
            }

            // Gentle Rotation
            if (!isAutoPlaying) {
                cellGroup.rotation.y += 0.2 * dt;
                daughterGroup.rotation.y += 0.2 * dt;
            }

            // Pulsing Glow
            matMembrane.emissiveIntensity = 0.15 + Math.sin(time * 3) * 0.1;

            // Cleavage Furrow (Vertex Manipulation)
            if (cellGroup.visible) {
                const pos = geoMembrane.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    const x = baseMembranePositions.getX(i);
                    const y = baseMembranePositions.getY(i);
                    const z = baseMembranePositions.getZ(i);

                    const dist = Math.abs(x);
                    let pinchEffect = Math.max(0, 1 - dist / 1.5);
                    pinchEffect = pinchEffect * pinchEffect * (3 - 2 * pinchEffect); // Smoothstep
                    const factor = 1 - (pinchEffect * currentPinch * 0.75);

                    pos.setY(i, y * factor);
                    pos.setZ(i, z * factor);
                }
                pos.needsUpdate = true;
                geoMembrane.computeVertexNormals();
            }

            // State Management Export
            window.__3D_STATE__ = {
                currentPhase: currentPhase,
                phaseName: phaseNames[currentPhase],
                cellCount: currentPhase === 5 ? 2 : 1,
                nucleusCount: currentPhase < 2 ? 1 : (currentPhase > 3 ? 2 : 0),
                chromosomeColor: '0x' + matChromosome.color.getHexString(),
                cellScaleX: cellGroup.scale.x,
                cellScaleY: cellGroup.scale.y,
                cellRadius: 2.0,
                nucleusOpacity: matNucleus.opacity,
                spindleVisible: spindleGroup.visible && matSpindle.opacity > 0,
                isAutoPlaying: isAutoPlaying,
                speedMultiplier: speedMultiplier,
                progressPercent: (currentPhase / 5) * 100,
                chromosomesAligned: currentPhase >= 2 && currentPhase <= 4,
                daughterCellPositions: currentPhase === 5 ? [
                    { x: daughter1.position.x, y: daughter1.position.y, z: daughter1.position.z },
                    { x: daughter2.position.x, y: daughter2.position.y, z: daughter2.position.z }
                ] : []
            };

            renderer.render(scene, camera);
        }

        // Initialize
        setPhase(0);
        animate();
    </script>
</body>
</html>
