<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Unzipping Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .hud-center-top {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .player-score {
            font-size: 18px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #p1-score { color: #00ffff; text-shadow: 0 0 5px #00ffff; }
        #p2-score { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
        
        .hud-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .legend {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }
        .color-box {
            width: 12px;
            height: 12px;
            margin-right: 8px;
            border-radius: 2px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }
        .instructions {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
        }
        .key {
            display: inline-block;
            background: #333;
            border: 1px solid #666;
            border-radius: 4px;
            padding: 2px 6px;
            color: white;
            font-family: monospace;
            margin: 0 4px;
        }
    </style>
    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div class="hud-top">
            <div id="p1-score" class="player-score">Player 1 (Cyan): Base 0/20 unzipped</div>
            <div id="p2-score" class="player-score">Player 2 (Magenta): Base 0/20 unzipped</div>
        </div>
        
        <div id="total-score" class="hud-center-top">Total Unzipped: 0/20</div>
        
        <div class="instructions">
            Player 1: Press <span class="key">W</span> to advance up<br>
            Player 2: Press <span class="key">↑</span> to advance down
        </div>

        <div class="hud-bottom">
            <div class="legend">
                <div>Base Pair Legend</div>
                <div class="legend-item"><div class="color-box" style="background: #33ff66;"></div> G-C Pair</div>
                <div class="legend-item"><div class="color-box" style="background: #ffff33;"></div> A-T Pair</div>
            </div>
            
            <div class="controls">
                <button id="btn-speed">Speed: Normal</button>
                <button id="btn-reset">Reset Simulation</button>
            </div>
            
            <div style="width: 120px;"></div> <!-- Spacer for balance -->
        </div>
    </div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            totalBasePairs: 20,
            player1Index: -1,
            player2Index: 20,
            player1Unzipped: 0,
            player2Unzipped: 0,
            totalUnzipped: 0,
            unzippedPairs: new Array(20).fill(false),
            player1Animating: false,
            player2Animating: false,
            fullyUnzipped: false,
            speedMode: 'normal',
            helixRotationPerPair: 36,
            verticalSpacing: 0.34,
            player1Position: { x: 0, y: 0, z: 0 },
            player2Position: { x: 0, y: 0, z: 0 },
            resetCount: 0,
            basePairTypes: []
        };

        const state = window.__3D_STATE__;
        
        // Speed configurations
        const speeds = {
            normal: { unzip: 500, cooldown: 300 },
            fast: { unzip: 250, cooldown: 150 },
            slow: { unzip: 1000, cooldown: 600 }
        };

        // Internal animation state
        const animState = {
            p1: { active: false, start: 0, fromY: 0, toY: 0, targetIdx: -1 },
            p2: { active: false, start: 0, fromY: 0, toY: 0, targetIdx: -1 },
            p1CooldownEnd: 0,
            p2CooldownEnd: 0
        };

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);
        scene.fog = new THREE.FogExp2(0x0a0a2e, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 10;
        controls.maxDistance = 40;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x4466aa, 0.3);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(-10, 10, 10);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight2.position.set(10, 10, -10);
        scene.add(dirLight2);

        // --- Environment (Stars) ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 1000;
        const posArray = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMaterial = new THREE.PointsMaterial({
            size: 0.1,
            color: 0x88aaff,
            transparent: true,
            opacity: 0.8
        });
        const starMesh = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starMesh);

        // --- DNA Construction ---
        const dnaGroup = new THREE.Group();
        scene.add(dnaGroup);

        // Materials
        const matStrandA = new THREE.MeshPhongMaterial({ color: 0x3366ff, shininess: 100 });
        const matStrandB = new THREE.MeshPhongMaterial({ color: 0xff3366, shininess: 100 });
        const matGC = new THREE.MeshPhongMaterial({ color: 0x33ff66 });
        const matAT = new THREE.MeshPhongMaterial({ color: 0xffff33 });
        const matBackbone = new THREE.MeshPhongMaterial({ color: 0xaaaaaa });

        // Geometries
        const sphereGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const cylGeo = new THREE.CylinderGeometry(1, 1, 1, 16); // Unit cylinder for scaling
        cylGeo.translate(0, 0.5, 0); // Move origin to bottom for easier stretching

        // Data structures to hold mesh references
        let spheresA = [];
        let spheresB = [];
        let bpCylinders = [];
        let bbCylindersA = [];
        let bbCylindersB = [];
        
        // Store base positions for oscillation calculations
        let basePositionsA = [];
        let basePositionsB = [];
        let outwardVectorsA = [];
        let outwardVectorsB = [];

        const helixRadius = 1.5;
        const totalHeight = (state.totalBasePairs - 1) * state.verticalSpacing;
        const startY = -totalHeight / 2;

        function buildDNA() {
            // Clear existing
            while(dnaGroup.children.length > 0){ 
                const child = dnaGroup.children[0];
                dnaGroup.remove(child); 
            }
            spheresA = []; spheresB = []; bpCylinders = []; bbCylindersA = []; bbCylindersB = [];
            basePositionsA = []; basePositionsB = []; outwardVectorsA = []; outwardVectorsB = [];
            state.basePairTypes = [];

            for (let i = 0; i < state.totalBasePairs; i++) {
                const type = Math.random() > 0.5 ? 'GC' : 'AT';
                state.basePairTypes.push(type);

                const y = startY + i * state.verticalSpacing;
                const angle = i * state.helixRotationPerPair * (Math.PI / 180);

                const xA = Math.cos(angle) * helixRadius;
                const zA = Math.sin(angle) * helixRadius;
                const xB = Math.cos(angle + Math.PI) * helixRadius;
                const zB = Math.sin(angle + Math.PI) * helixRadius;

                const posA = new THREE.Vector3(xA, y, zA);
                const posB = new THREE.Vector3(xB, y, zB);

                basePositionsA.push(posA.clone());
                basePositionsB.push(posB.clone());
                
                // Outward vectors for unzipping
                outwardVectorsA.push(new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle)).normalize());
                outwardVectorsB.push(new THREE.Vector3(Math.cos(angle + Math.PI), 0, Math.sin(angle + Math.PI)).normalize());

                // Spheres
                const sphereA = new THREE.Mesh(sphereGeo, matStrandA.clone());
                sphereA.position.copy(posA);
                dnaGroup.add(sphereA);
                spheresA.push(sphereA);

                const sphereB = new THREE.Mesh(sphereGeo, matStrandB.clone());
                sphereB.position.copy(posB);
                dnaGroup.add(sphereB);
                spheresB.push(sphereB);

                // Base Pair Cylinder
                const bpCyl = new THREE.Mesh(cylGeo, type === 'GC' ? matGC : matAT);
                dnaGroup.add(bpCyl);
                bpCylinders.push(bpCyl);
                updateCylinder(bpCyl, posA, posB, 0.08);

                // Backbone Cylinders
                if (i > 0) {
                    const bbA = new THREE.Mesh(cylGeo, matBackbone);
                    dnaGroup.add(bbA);
                    bbCylindersA.push(bbA);
                    updateCylinder(bbA, basePositionsA[i-1], posA, 0.05);

                    const bbB = new THREE.Mesh(cylGeo, matBackbone);
                    dnaGroup.add(bbB);
                    bbCylindersB.push(bbB);
                    updateCylinder(bbB, basePositionsB[i-1], posB, 0.05);
                }
            }
        }

        // Helper to stretch and orient cylinder between two points
        function updateCylinder(mesh, p1, p2, radius) {
            const distance = p1.distanceTo(p2);
            if (distance === 0) return;
            
            mesh.position.copy(p1);
            mesh.scale.set(radius, distance, radius);
            
            const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
        }

        // --- Helicases ---
        const torusGeo = new THREE.TorusGeometry(0.8, 0.2, 16, 50);
        
        const matHelicase1 = new THREE.MeshStandardMaterial({ 
            color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.5 
        });
        const helicase1 = new THREE.Mesh(torusGeo, matHelicase1);
        helicase1.rotation.x = Math.PI / 2;
        scene.add(helicase1);
        
        const light1 = new THREE.PointLight(0x00ffff, 1, 5);
        helicase1.add(light1);

        const matHelicase2 = new THREE.MeshStandardMaterial({ 
            color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 0.5 
        });
        const helicase2 = new THREE.Mesh(torusGeo, matHelicase2);
        helicase2.rotation.x = Math.PI / 2;
        scene.add(helicase2);

        const light2 = new THREE.PointLight(0xff00ff, 1, 5);
        helicase2.add(light2);

        function getHelicaseY(index) {
            return startY + index * state.verticalSpacing;
        }

        function resetHelicases() {
            helicase1.position.set(0, getHelicaseY(-1), 0);
            helicase2.position.set(0, getHelicaseY(20), 0);
            state.player1Position = { x: 0, y: helicase1.position.y, z: 0 };
            state.player2Position = { x: 0, y: helicase2.position.y, z: 0 };
        }

        // --- Celebration Particles ---
        let particles;
        let particleVelocities = [];
        function createCelebration(yPos) {
            if (particles) scene.remove(particles);
            
            const pGeo = new THREE.BufferGeometry();
            const pCount = 200;
            const pPos = new Float32Array(pCount * 3);
            particleVelocities = [];

            for(let i=0; i<pCount; i++) {
                pPos[i*3] = 0;
                pPos[i*3+1] = yPos;
                pPos[i*3+2] = 0;
                
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const speed = 0.05 + Math.random() * 0.1;
                
                particleVelocities.push(new THREE.Vector3(
                    Math.sin(phi) * Math.cos(theta) * speed,
                    Math.cos(phi) * speed,
                    Math.sin(phi) * Math.sin(theta) * speed
                ));
            }
            
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            const pMat = new THREE.PointsMaterial({
                color: 0xffffff, size: 0.2, transparent: true, opacity: 1,
                blending: THREE.AdditiveBlending
            });
            
            particles = new THREE.Points(pGeo, pMat);
            scene.add(particles);

            // Make strands glow
            spheresA.forEach(s => { s.material.emissive.setHex(0x3366ff); s.material.emissiveIntensity = 0.5; });
            spheresB.forEach(s => { s.material.emissive.setHex(0xff3366); s.material.emissiveIntensity = 0.5; });
        }

        // --- Input & Logic ---
        window.addEventListener('keydown', (e) => {
            if (state.fullyUnzipped) return;
            const now = Date.now();
            const config = speeds[state.speedMode];

            // Player 1 (W)
            if (e.key.toLowerCase() === 'w') {
                if (state.player1Animating || now < animState.p1CooldownEnd) return;
                const targetIdx = state.player1Index + 1;
                
                // Collision check
                if (targetIdx >= state.player2Index) {
                    checkMeet();
                    return;
                }

                state.player1Animating = true;
                animState.p1 = {
                    active: true,
                    start: now,
                    fromY: helicase1.position.y,
                    toY: getHelicaseY(targetIdx),
                    targetIdx: targetIdx
                };
            }

            // Player 2 (ArrowUp)
            if (e.key === 'ArrowUp') {
                if (state.player2Animating || now < animState.p2CooldownEnd) return;
                const targetIdx = state.player2Index - 1;
                
                // Collision check
                if (targetIdx <= state.player1Index) {
                    checkMeet();
                    return;
                }

                state.player2Animating = true;
                animState.p2 = {
                    active: true,
                    start: now,
                    fromY: helicase2.position.y,
                    toY: getHelicaseY(targetIdx),
                    targetIdx: targetIdx
                };
            }
        });

        function checkMeet() {
            if (state.player1Index >= state.player2Index - 1 && !state.fullyUnzipped) {
                state.fullyUnzipped = true;
                const meetY = (helicase1.position.y + helicase2.position.y) / 2;
                createCelebration(meetY);
            }
        }

        // --- UI Updates ---
        const elP1Score = document.getElementById('p1-score');
        const elP2Score = document.getElementById('p2-score');
        const elTotalScore = document.getElementById('total-score');
        const btnSpeed = document.getElementById('btn-speed');
        const btnReset = document.getElementById('btn-reset');

        function updateHUD() {
            elP1Score.innerText = `Player 1 (Cyan): Base ${state.player1Unzipped}/20 unzipped`;
            elP2Score.innerText = `Player 2 (Magenta): Base ${state.player2Unzipped}/20 unzipped`;
            elTotalScore.innerText = `Total Unzipped: ${state.totalUnzipped}/20`;
            
            if (state.fullyUnzipped) {
                elTotalScore.innerText = "DNA FULLY UNZIPPED!";
                elTotalScore.style.color = "#ffff00";
            } else {
                elTotalScore.style.color = "white";
            }
        }

        btnSpeed.addEventListener('click', () => {
            if (state.speedMode === 'normal') state.speedMode = 'fast';
            else if (state.speedMode === 'fast') state.speedMode = 'slow';
            else state.speedMode = 'normal';
            
            btnSpeed.innerText = `Speed: ${state.speedMode.charAt(0).toUpperCase() + state.speedMode.slice(1)}`;
        });

        btnReset.addEventListener('click', () => {
            state.resetCount++;
            state.player1Index = -1;
            state.player2Index = 20;
            state.player1Unzipped = 0;
            state.player2Unzipped = 0;
            state.totalUnzipped = 0;
            state.unzippedPairs.fill(false);
            state.player1Animating = false;
            state.player2Animating = false;
            state.fullyUnzipped = false;
            
            animState.p1.active = false;
            animState.p2.active = false;
            animState.p1CooldownEnd = 0;
            animState.p2CooldownEnd = 0;

            if (particles) {
                scene.remove(particles);
                particles = null;
            }

            buildDNA();
            resetHelicases();
            updateHUD();
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            const now = Date.now();
            const config = speeds[state.speedMode];

            controls.update();

            // Rotate intact DNA
            dnaGroup.rotation.y += 0.2 * 0.016; // approx 0.2 rad/s

            // Spin helicases
            helicase1.rotation.z += 1 * 0.016;
            helicase2.rotation.z -= 1 * 0.016;

            // Handle Unzip Animations
            ['p1', 'p2'].forEach(player => {
                const anim = animState[player];
                if (anim.active) {
                    let t = (now - anim.start) / config.unzip;
                    if (t >= 1) t = 1;

                    const idx = anim.targetIdx;
                    
                    // Move helicase
                    const currentY = anim.fromY + (anim.toY - anim.fromY) * t;
                    if (player === 'p1') {
                        helicase1.position.y = currentY;
                        state.player1Position.y = currentY;
                    } else {
                        helicase2.position.y = currentY;
                        state.player2Position.y = currentY;
                    }

                    // Animate Base Pair
                    if (idx >= 0 && idx < 20) {
                        // Move spheres apart
                        const moveDist = t * 2;
                        spheresA[idx].position.copy(basePositionsA[idx]).add(outwardVectorsA[idx].clone().multiplyScalar(moveDist));
                        spheresB[idx].position.copy(basePositionsB[idx]).add(outwardVectorsB[idx].clone().multiplyScalar(moveDist));
                        
                        // Scale down BP cylinder thickness
                        const bpCyl = bpCylinders[idx];
                        if (bpCyl.visible) {
                            updateCylinder(bpCyl, spheresA[idx].position, spheresB[idx].position, 0.08 * (1 - t));
                        }
                    }

                    // Finish animation
                    if (t === 1) {
                        anim.active = false;
                        if (player === 'p1') {
                            state.player1Animating = false;
                            state.player1Index = idx;
                            animState.p1CooldownEnd = now + config.cooldown;
                            if (idx >= 0 && idx < 20 && !state.unzippedPairs[idx]) {
                                state.unzippedPairs[idx] = true;
                                state.player1Unzipped++;
                                state.totalUnzipped++;
                                bpCylinders[idx].visible = false;
                            }
                        } else {
                            state.player2Animating = false;
                            state.player2Index = idx;
                            animState.p2CooldownEnd = now + config.cooldown;
                            if (idx >= 0 && idx < 20 && !state.unzippedPairs[idx]) {
                                state.unzippedPairs[idx] = true;
                                state.player2Unzipped++;
                                state.totalUnzipped++;
                                bpCylinders[idx].visible = false;
                            }
                        }
                        updateHUD();
                        checkMeet();
                    }
                }
            });

            // Apply Oscillation to unzipped strands and update backbones
            for (let i = 0; i < 20; i++) {
                if (state.unzippedPairs[i] && (!animState.p1.active || animState.p1.targetIdx !== i) && (!animState.p2.active || animState.p2.targetIdx !== i)) {
                    // Oscillate on Y axis
                    const offset = Math.sin(time * Math.PI * 2 * 1 + i) * 0.3;
                    
                    // Base unzipped position
                    const unzippedPosA = basePositionsA[i].clone().add(outwardVectorsA[i].clone().multiplyScalar(2));
                    const unzippedPosB = basePositionsB[i].clone().add(outwardVectorsB[i].clone().multiplyScalar(2));
                    
                    spheresA[i].position.copy(unzippedPosA).add(new THREE.Vector3(0, offset, 0));
                    spheresB[i].position.copy(unzippedPosB).add(new THREE.Vector3(0, offset, 0));
                }

                // Update backbones
                if (i > 0) {
                    updateCylinder(bbCylindersA[i-1], spheresA[i-1].position, spheresA[i].position, 0.05);
                    updateCylinder(bbCylindersB[i-1], spheresB[i-1].position, spheresB[i].position, 0.05);
                }
            }

            // Update Particles
            if (particles) {
                const positions = particles.geometry.attributes.position.array;
                for(let i=0; i<particleVelocities.length; i++) {
                    positions[i*3] += particleVelocities[i].x;
                    positions[i*3+1] += particleVelocities[i].y;
                    positions[i*3+2] += particleVelocities[i].z;
                }
                particles.geometry.attributes.position.needsUpdate = true;
                particles.material.opacity -= 0.005;
                if (particles.material.opacity <= 0) {
                    scene.remove(particles);
                    particles = null;
                }
            }

            renderer.render(scene, camera);
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        buildDNA();
        resetHelicases();
        updateHUD();
        animate();

    </script>
</body>
</html>
