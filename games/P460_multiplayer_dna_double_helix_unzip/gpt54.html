<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNA Double Helix Unzipping - Two Player Educational Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      position: absolute;
      padding: 10px 14px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 14px rgba(0,0,0,0.25);
      user-select: none;
    }

    #p1hud { top: 12px; left: 12px; color: #00ffff; }
    #p2hud { top: 12px; right: 12px; color: #ff00ff; text-align: right; }
    #totalHud {
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
      color: #ffffff;
      text-align: center;
      min-width: 240px;
    }
    #legend {
      bottom: 12px;
      left: 12px;
      color: #ffffff;
      line-height: 1.6;
    }

    #controlsBar {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    button {
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.16);
      transform: translateY(-1px);
    }

    .swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      vertical-align: middle;
      margin-right: 8px;
    }

    #help {
      position: absolute;
      right: 12px;
      bottom: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      font-size: 13px;
      color: #d6dbff;
      line-height: 1.5;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="p1hud" class="panel">Player 1 (Cyan): Base 0/20 unzipped</div>
    <div id="p2hud" class="panel">Player 2 (Magenta): Base 0/20 unzipped</div>
    <div id="totalHud" class="panel">Total Unzipped: 0/20</div>

    <div id="legend" class="panel">
      <div><strong>Base Pair Legend</strong></div>
      <div><span class="swatch" style="background:#33ff66;"></span>G-C pair</div>
      <div><span class="swatch" style="background:#ffff33;"></span>A-T pair</div>
    </div>

    <div id="controlsBar">
      <button id="resetBtn">Reset</button>
      <button id="speedBtn">Speed: Normal</button>
    </div>

    <div id="help">
      <div><strong>Controls</strong></div>
      <div>Player 1: <b>W</b> moves upward</div>
      <div>Player 2: <b>↑</b> moves downward</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/controls/OrbitControls.js';

    const TOTAL_BASE_PAIRS = 20;
    const HELIX_ROTATION_PER_PAIR_DEG = 36;
    const HELIX_ROTATION_PER_PAIR_RAD = THREE.MathUtils.degToRad(HELIX_ROTATION_PER_PAIR_DEG);
    const VERTICAL_SPACING = 0.34;
    const HELIX_RADIUS = 1.4;
    const STRAND_SPHERE_RADIUS = 0.3;
    const STRAND_OPEN_OFFSET = 2.0;

    const BG_COLOR = 0x0a0a2e;

    const speedModes = {
      normal: { label: 'Normal', unzipMs: 500 },
      fast: { label: 'Fast', unzipMs: 250 },
      slow: { label: 'Slow', unzipMs: 1000 }
    };
    const speedOrder = ['normal', 'fast', 'slow'];

    let scene, camera, renderer, controls, clock;
    let dnaRoot, intactRoot, openedRoot, stars;
    let celebrationParticles = [];
    let strandGlowPulse = 0;

    const p1Hud = document.getElementById('p1hud');
    const p2Hud = document.getElementById('p2hud');
    const totalHud = document.getElementById('totalHud');
    const resetBtn = document.getElementById('resetBtn');
    const speedBtn = document.getElementById('speedBtn');

    const dnaPairs = [];
    const animations = [];
    const pendingCooldowns = { p1: 0, p2: 0 };
    const keyLatch = { KeyW: false, ArrowUp: false };

    const materials = {
      strandA: new THREE.MeshStandardMaterial({
        color: 0x3366ff,
        emissive: 0x112266,
        roughness: 0.35,
        metalness: 0.15
      }),
      strandB: new THREE.MeshStandardMaterial({
        color: 0xff3366,
        emissive: 0x330011,
        roughness: 0.35,
        metalness: 0.15
      }),
      backbone: new THREE.MeshStandardMaterial({
        color: 0xb8c7ff,
        emissive: 0x111122,
        roughness: 0.45,
        metalness: 0.1
      }),
      gc: new THREE.MeshStandardMaterial({
        color: 0x33ff66,
        emissive: 0x0b2c16,
        roughness: 0.25,
        metalness: 0.1
      }),
      at: new THREE.MeshStandardMaterial({
        color: 0xffff33,
        emissive: 0x2c2c08,
        roughness: 0.25,
        metalness: 0.1
      }),
      p1: new THREE.MeshStandardMaterial({
        color: 0x00ffff,
        emissive: 0x00aaaa,
        emissiveIntensity: 1.5,
        roughness: 0.2,
        metalness: 0.5
      }),
      p2: new THREE.MeshStandardMaterial({
        color: 0xff00ff,
        emissive: 0xaa00aa,
        emissiveIntensity: 1.5,
        roughness: 0.2,
        metalness: 0.5
      })
    };

    const state = {
      totalBasePairs: TOTAL_BASE_PAIRS,
      player1Index: -1,
      player2Index: 20,
      player1Unzipped: 0,
      player2Unzipped: 0,
      totalUnzipped: 0,
      unzippedPairs: new Array(TOTAL_BASE_PAIRS).fill(false),
      player1Animating: false,
      player2Animating: false,
      fullyUnzipped: false,
      speedMode: 'normal',
      helixRotationPerPair: HELIX_ROTATION_PER_PAIR_DEG,
      verticalSpacing: VERTICAL_SPACING,
      player1Position: { x: 0, y: 0, z: 0 },
      player2Position: { x: 0, y: 0, z: 0 },
      resetCount: 0,
      basePairTypes: []
    };

    window.__3D_STATE__ = state;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(BG_COLOR);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 5, 20);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.minDistance = 10;
      controls.maxDistance = 40;
      controls.target.set(0, 0, 0);

      clock = new THREE.Clock();

      setupLights();
      createStars();
      createDNASystem();
      setupEvents();
      updateHUD();
      updateStatePositions();
    }

    function setupLights() {
      const ambient = new THREE.AmbientLight(0x4466aa, 0.3);
      scene.add(ambient);

      const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
      dir1.position.set(-10, 10, 8);
      scene.add(dir1);

      const dir2 = new THREE.DirectionalLight(0xffffff, 0.8);
      dir2.position.set(10, 10, 8);
      scene.add(dir2);
    }

    function createStars() {
      const starCount = 350;
      const positions = new Float32Array(starCount * 3);

      for (let i = 0; i < starCount; i++) {
        positions[i * 3 + 0] = (Math.random() - 0.5) * 80;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 60;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 80;
      }

      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const mat = new THREE.PointsMaterial({
        color: 0x88aaff,
        size: 0.12,
        transparent: true,
        opacity: 0.7
      });

      stars = new THREE.Points(geom, mat);
      scene.add(stars);
    }

    function createDNASystem() {
      dnaRoot = new THREE.Group();
      intactRoot = new THREE.Group();
      openedRoot = new THREE.Group();

      dnaRoot.add(intactRoot);
      dnaRoot.add(openedRoot);
      scene.add(dnaRoot);

      state.basePairTypes = Array.from({ length: TOTAL_BASE_PAIRS }, () => Math.random() < 0.5 ? 'GC' : 'AT');

      const sphereGeom = new THREE.SphereGeometry(STRAND_SPHERE_RADIUS, 20, 20);
      const baseCylinderGeom = new THREE.CylinderGeometry(0.08, 0.08, 1, 16);
      const backboneCylinderGeom = new THREE.CylinderGeometry(0.06, 0.06, 1, 12);
      const torusGeom = new THREE.TorusGeometry(0.8, 0.2, 16, 40);

      for (let i = 0; i < TOTAL_BASE_PAIRS; i++) {
        const pairGroup = new THREE.Group();
        intactRoot.add(pairGroup);

        const angle = i * HELIX_ROTATION_PER_PAIR_RAD;
        const y = getYForIndex(i);

        const leftPos = new THREE.Vector3(
          Math.cos(angle) * HELIX_RADIUS,
          y,
          Math.sin(angle) * HELIX_RADIUS
        );

        const rightPos = new THREE.Vector3(
          Math.cos(angle + Math.PI) * HELIX_RADIUS,
          y,
          Math.sin(angle + Math.PI) * HELIX_RADIUS
        );

        const leftSphere = new THREE.Mesh(sphereGeom, materials.strandA.clone());
        leftSphere.position.copy(leftPos);

        const rightSphere = new THREE.Mesh(sphereGeom, materials.strandB.clone());
        rightSphere.position.copy(rightPos);

        pairGroup.add(leftSphere, rightSphere);

        const pairMat = state.basePairTypes[i] === 'GC' ? materials.gc.clone() : materials.at.clone();
        const pairBond = new THREE.Mesh(baseCylinderGeom, pairMat);
        pairGroup.add(pairBond);

        updateCylinderBetween(pairBond, leftSphere.position, rightSphere.position, 0.08);

        let backboneA = null;
        let backboneB = null;

        if (i < TOTAL_BASE_PAIRS - 1) {
          backboneA = new THREE.Mesh(backboneCylinderGeom, materials.backbone.clone());
          backboneB = new THREE.Mesh(backboneCylinderGeom, materials.backbone.clone());
          pairGroup.add(backboneA, backboneB);

          const nextAngle = (i + 1) * HELIX_ROTATION_PER_PAIR_RAD;
          const nextY = getYForIndex(i + 1);

          const nextLeftPos = new THREE.Vector3(
            Math.cos(nextAngle) * HELIX_RADIUS,
            nextY,
            Math.sin(nextAngle) * HELIX_RADIUS
          );
          const nextRightPos = new THREE.Vector3(
            Math.cos(nextAngle + Math.PI) * HELIX_RADIUS,
            nextY,
            Math.sin(nextAngle + Math.PI) * HELIX_RADIUS
          );

          updateCylinderBetween(backboneA, leftSphere.position, nextLeftPos, 0.06);
          updateCylinderBetween(backboneB, rightSphere.position, nextRightPos, 0.06);
        }

        dnaPairs.push({
          index: i,
          angle,
          y,
          group: pairGroup,
          leftSphere,
          rightSphere,
          pairBond,
          backboneA,
          backboneB,
          leftBasePos: leftPos.clone(),
          rightBasePos: rightPos.clone(),
          leftCurrentOpenX: 0,
          rightCurrentOpenX: 0
        });
      }

      state.p1Mesh = new THREE.Mesh(torusGeom, materials.p1);
      state.p2Mesh = new THREE.Mesh(torusGeom, materials.p2);

      state.p1Mesh.rotation.x = Math.PI / 2;
      state.p2Mesh.rotation.x = Math.PI / 2;

      scene.add(state.p1Mesh, state.p2Mesh);

      positionHelicases();
    }

    function getYForIndex(i) {
      return (i - (TOTAL_BASE_PAIRS - 1) / 2) * VERTICAL_SPACING;
    }

    function updateCylinderBetween(mesh, start, end, radius = 0.06) {
      if (!mesh || !start || !end) return;

      const dir = new THREE.Vector3().subVectors(end, start);
      const len = dir.length();

      if (!isFinite(len) || len <= 0.000001) {
        mesh.visible = false;
        return;
      }

      mesh.visible = true;
      mesh.position.copy(start).add(end).multiplyScalar(0.5);
      mesh.scale.set(1, len, 1);

      const axis = new THREE.Vector3(0, 1, 0);
      mesh.quaternion.setFromUnitVectors(axis, dir.clone().normalize());
    }

    function positionHelicases() {
      const p1TargetIndex = Math.max(0, state.player1Index + 1);
      const p2TargetIndex = Math.min(TOTAL_BASE_PAIRS - 1, state.player2Index - 1);

      const p1Y = getYForIndex(p1TargetIndex);
      const p2Y = getYForIndex(p2TargetIndex);

      state.p1Mesh.position.set(0, p1Y, 0);
      state.p2Mesh.position.set(0, p2Y, 0);

      safeVec3(state.p1Mesh.position);
      safeVec3(state.p2Mesh.position);
    }

    function setupEvents() {
      window.addEventListener('resize', onResize);

      window.addEventListener('keydown', (e) => {
        if (e.code === 'KeyW') {
          if (!keyLatch.KeyW) attemptMovePlayer1();
          keyLatch.KeyW = true;
        }
        if (e.code === 'ArrowUp') {
          if (!keyLatch.ArrowUp) attemptMovePlayer2();
          keyLatch.ArrowUp = true;
          e.preventDefault();
        }
      });

      window.addEventListener('keyup', (e) => {
        if (e.code === 'KeyW') keyLatch.KeyW = false;
        if (e.code === 'ArrowUp') keyLatch.ArrowUp = false;
      });

      resetBtn.addEventListener('click', resetSimulation);
      speedBtn.addEventListener('click', cycleSpeedMode);
    }

    function attemptMovePlayer1() {
      if (state.player1Animating || pendingCooldowns.p1 > 0 || state.fullyUnzipped) return;

      const target = state.player1Index + 1;
      if (target < 0 || target >= TOTAL_BASE_PAIRS) return;
      if (state.player1Index >= state.player2Index - 1) {
        triggerCelebrationIfMeet();
        return;
      }
      if (target >= state.player2Index) {
        triggerCelebrationIfMeet();
        return;
      }
      if (state.unzippedPairs[target]) return;

      startUnzip('p1', target);
    }

    function attemptMovePlayer2() {
      if (state.player2Animating || pendingCooldowns.p2 > 0 || state.fullyUnzipped) return;

      const target = state.player2Index - 1;
      if (target < 0 || target >= TOTAL_BASE_PAIRS) return;
      if (state.player1Index >= state.player2Index - 1) {
        triggerCelebrationIfMeet();
        return;
      }
      if (target <= state.player1Index) {
        triggerCelebrationIfMeet();
        return;
      }
      if (state.unzippedPairs[target]) return;

      startUnzip('p2', target);
    }

    function startUnzip(player, targetIndex) {
      const pair = dnaPairs[targetIndex];
      if (!pair) return;

      const duration = speedModes[state.speedMode].unzipMs;
      const startTime = performance.now();

      if (player === 'p1') {
        state.player1Animating = true;
        state.player1Index = targetIndex;
      } else {
        state.player2Animating = true;
        state.player2Index = targetIndex;
      }

      moveHelicaseToIndex(player, targetIndex);

      animations.push({
        type: 'unzip',
        player,
        pairIndex: targetIndex,
        startTime,
        duration,
        done: false
      });

      updateHUD();
      updateStatePositions();
    }

    function moveHelicaseToIndex(player, index) {
      const y = getYForIndex(index);
      if (player === 'p1') {
        state.p1Mesh.position.y = y;
      } else {
        state.p2Mesh.position.y = y;
      }
      safeVec3(state.p1Mesh.position);
      safeVec3(state.p2Mesh.position);
    }

    function completeUnzip(player, pairIndex) {
      if (state.unzippedPairs[pairIndex]) return;

      state.unzippedPairs[pairIndex] = true;
      state.totalUnzipped++;

      if (player === 'p1') {
        state.player1Unzipped++;
        state.player1Animating = false;
        pendingCooldowns.p1 = 300;
      } else {
        state.player2Unzipped++;
        state.player2Animating = false;
        pendingCooldowns.p2 = 300;
      }

      const pair = dnaPairs[pairIndex];
      if (pair && pair.pairBond) {
        pair.pairBond.visible = false;
      }

      updateHUD();
      triggerCelebrationIfMeet();
    }

    function triggerCelebrationIfMeet() {
      if (state.fullyUnzipped) return;

      if (state.player1Index >= state.player2Index - 1) {
        state.fullyUnzipped = true;
        strandGlowPulse = 1.5;
        burstParticles(getMeetingPoint());
        updateHUD();
      }
    }

    function getMeetingPoint() {
      let y;
      if (state.player1Index < 0 && state.player2Index > TOTAL_BASE_PAIRS - 1) {
        y = 0;
      } else {
        const a = Math.max(0, Math.min(TOTAL_BASE_PAIRS - 1, state.player1Index + 1));
        const b = Math.max(0, Math.min(TOTAL_BASE_PAIRS - 1, state.player2Index - 1));
        y = (getYForIndex(a) + getYForIndex(b)) * 0.5;
      }
      return new THREE.Vector3(0, y, 0);
    }

    function burstParticles(origin) {
      const count = 120;
      const positions = new Float32Array(count * 3);
      const velocities = [];
      const colors = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        positions[i * 3 + 0] = origin.x;
        positions[i * 3 + 1] = origin.y;
        positions[i * 3 + 2] = origin.z;

        const dir = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.1) * 2,
          (Math.random() - 0.5) * 2
        ).normalize().multiplyScalar(0.04 + Math.random() * 0.06);

        velocities.push(dir);

        const c = i % 2 === 0 ? new THREE.Color(0x00ffff) : new THREE.Color(0xff00ff);
        colors[i * 3 + 0] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
      }

      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const mat = new THREE.PointsMaterial({
        size: 0.16,
        vertexColors: true,
        transparent: true,
        opacity: 1
      });

      const points = new THREE.Points(geom, mat);
      scene.add(points);

      celebrationParticles.push({
        points,
        velocities,
        age: 0,
        life: 1.4
      });
    }

    function updateAnimations(now) {
      for (let i = animations.length - 1; i >= 0; i--) {
        const anim = animations[i];
        if (anim.type !== 'unzip' || anim.done) continue;

        const t = THREE.MathUtils.clamp((now - anim.startTime) / anim.duration, 0, 1);
        const ease = easeInOutCubic(t);
        const pair = dnaPairs[anim.pairIndex];
        if (!pair) continue;

        if (pair.pairBond) {
          pair.pairBond.scale.x = Math.max(0.0001, 1 - ease);
        }

        pair.leftCurrentOpenX = -STRAND_OPEN_OFFSET * ease;
        pair.rightCurrentOpenX = STRAND_OPEN_OFFSET * ease;

        pair.leftSphere.position.set(
          pair.leftBasePos.x + pair.leftCurrentOpenX,
          pair.leftBasePos.y,
          pair.leftBasePos.z
        );
        pair.rightSphere.position.set(
          pair.rightBasePos.x + pair.rightCurrentOpenX,
          pair.rightBasePos.y,
          pair.rightBasePos.z
        );

        if (t >= 1) {
          anim.done = true;
          completeUnzip(anim.player, anim.pairIndex);
          animations.splice(i, 1);
        }
      }
    }

    function updateBackbones(timeSec) {
      for (let i = 0; i < dnaPairs.length; i++) {
        const pair = dnaPairs[i];
        const oscillate = state.unzippedPairs[i] ? Math.sin(timeSec * Math.PI * 2 + i * 0.35) * 0.3 : 0;

        if (state.unzippedPairs[i]) {
          pair.leftSphere.position.x = pair.leftBasePos.x + pair.leftCurrentOpenX + oscillate * 0.4;
          pair.rightSphere.position.x = pair.rightBasePos.x + pair.rightCurrentOpenX - oscillate * 0.4;
        }

        if (i < dnaPairs.length - 1) {
          const next = dnaPairs[i + 1];
          if (pair.backboneA) updateCylinderBetween(pair.backboneA, pair.leftSphere.position, next.leftSphere.position, 0.06);
          if (pair.backboneB) updateCylinderBetween(pair.backboneB, pair.rightSphere.position, next.rightSphere.position, 0.06);
        }

        if (!state.unzippedPairs[i] && pair.pairBond && pair.pairBond.visible) {
          updateCylinderBetween(pair.pairBond, pair.leftSphere.position, pair.rightSphere.position, 0.08);
          pair.pairBond.scale.x = Math.max(pair.pairBond.scale.x, 0.0001);
        }
      }
    }

    function updateHelicases(delta) {
      state.p1Mesh.rotation.z += delta * 1.0;
      state.p2Mesh.rotation.z += delta * 1.0;
    }

    function updateRootRotation(delta) {
      dnaRoot.rotation.y += delta * 0.2;
    }

    function updateCooldowns(deltaMs) {
      pendingCooldowns.p1 = Math.max(0, pendingCooldowns.p1 - deltaMs);
      pendingCooldowns.p2 = Math.max(0, pendingCooldowns.p2 - deltaMs);
    }

    function updateCelebrationGlow(delta) {
      if (state.fullyUnzipped) {
        strandGlowPulse += delta * 2.5;
      }

      for (const pair of dnaPairs) {
        const boost = state.fullyUnzipped ? (0.35 + 0.25 * Math.sin(strandGlowPulse)) : 0;
        pair.leftSphere.material.emissiveIntensity = 1 + boost;
        pair.rightSphere.material.emissiveIntensity = 1 + boost;
      }
    }

    function updateParticles(delta) {
      for (let i = celebrationParticles.length - 1; i >= 0; i--) {
        const p = celebrationParticles[i];
        p.age += delta;

        const pos = p.points.geometry.attributes.position.array;
        for (let j = 0; j < p.velocities.length; j++) {
          pos[j * 3 + 0] += p.velocities[j].x;
          pos[j * 3 + 1] += p.velocities[j].y;
          pos[j * 3 + 2] += p.velocities[j].z;

          p.velocities[j].y -= 0.0008;
        }
        p.points.geometry.attributes.position.needsUpdate = true;
        p.points.material.opacity = Math.max(0, 1 - p.age / p.life);

        if (p.age >= p.life) {
          scene.remove(p.points);
          p.points.geometry.dispose();
          p.points.material.dispose();
          celebrationParticles.splice(i, 1);
        }
      }
    }

    function updateHUD() {
      p1Hud.textContent = `Player 1 (Cyan): Base ${state.player1Unzipped}/20 unzipped`;
      p2Hud.textContent = `Player 2 (Magenta): Base ${state.player2Unzipped}/20 unzipped`;
      totalHud.textContent = state.fullyUnzipped
        ? `Total Unzipped: ${state.totalUnzipped}/20 — Fully Unzipped!`
        : `Total Unzipped: ${state.totalUnzipped}/20`;

      speedBtn.textContent = `Speed: ${speedModes[state.speedMode].label}`;
    }

    function updateStatePositions() {
      state.player1Position = {
        x: safeNumber(state.p1Mesh.position.x),
        y: safeNumber(state.p1Mesh.position.y),
        z: safeNumber(state.p1Mesh.position.z)
      };
      state.player2Position = {
        x: safeNumber(state.p2Mesh.position.x),
        y: safeNumber(state.p2Mesh.position.y),
        z: safeNumber(state.p2Mesh.position.z)
      };
    }

    function cycleSpeedMode() {
      const idx = speedOrder.indexOf(state.speedMode);
      state.speedMode = speedOrder[(idx + 1) % speedOrder.length];
      updateHUD();
    }

    function resetSimulation() {
      state.resetCount++;

      while (animations.length) animations.pop();

      for (let i = celebrationParticles.length - 1; i >= 0; i--) {
        scene.remove(celebrationParticles[i].points);
        celebrationParticles[i].points.geometry.dispose();
        celebrationParticles[i].points.material.dispose();
      }
      celebrationParticles = [];

      state.player1Index = -1;
      state.player2Index = 20;
      state.player1Unzipped = 0;
      state.player2Unzipped = 0;
      state.totalUnzipped = 0;
      state.unzippedPairs = new Array(TOTAL_BASE_PAIRS).fill(false);
      state.player1Animating = false;
      state.player2Animating = false;
      state.fullyUnzipped = false;
      pendingCooldowns.p1 = 0;
      pendingCooldowns.p2 = 0;
      strandGlowPulse = 0;

      state.basePairTypes = Array.from({ length: TOTAL_BASE_PAIRS }, () => Math.random() < 0.5 ? 'GC' : 'AT');

      for (let i = 0; i < dnaPairs.length; i++) {
        const pair = dnaPairs[i];
        pair.leftCurrentOpenX = 0;
        pair.rightCurrentOpenX = 0;

        pair.leftSphere.position.copy(pair.leftBasePos);
        pair.rightSphere.position.copy(pair.rightBasePos);

        if (pair.pairBond) {
          pair.pairBond.visible = true;
          pair.pairBond.scale.set(1, pair.pairBond.scale.y || 1, 1);
          pair.pairBond.material.color.set(state.basePairTypes[i] === 'GC' ? 0x33ff66 : 0xffff33);
          pair.pairBond.material.emissive.set(state.basePairTypes[i] === 'GC' ? 0x0b2c16 : 0x2c2c08);
          updateCylinderBetween(pair.pairBond, pair.leftSphere.position, pair.rightSphere.position, 0.08);
        }

        pair.leftSphere.material.emissiveIntensity = 1;
        pair.rightSphere.material.emissiveIntensity = 1;
      }

      positionHelicases();
      updateBackbones(0);
      updateHUD();
      updateStatePositions();
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const now = performance.now();
      const elapsed = clock.elapsedTime;
      const deltaMs = delta * 1000;

      updateAnimations(now);
      updateCooldowns(deltaMs);
      updateBackbones(elapsed);
      updateHelicases(delta);
      updateRootRotation(delta);
      updateCelebrationGlow(delta);
      updateParticles(delta);
      controls.update();
      updateStatePositions();

      renderer.render(scene, camera);
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function safeNumber(n) {
      return Number.isFinite(n) ? n : 0;
    }

    function safeVec3(v) {
      v.x = safeNumber(v.x);
      v.y = safeNumber(v.y);
      v.z = safeNumber(v.z);
      return v;
    }
  </script>
</body>
</html>
