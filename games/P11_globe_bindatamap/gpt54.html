<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 地球 + 城市数据柱状图</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #06131f;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #e8f3ff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(8, 20, 36, 0.78);
      border: 1px solid rgba(140, 190, 255, 0.28);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 250px;
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.25);
    }

    #hud h2 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .row {
      margin: 8px 0;
      font-size: 14px;
      line-height: 1.4;
    }

    .label {
      display: inline-block;
      width: 110px;
      color: #9fc3ef;
    }

    select, button {
      background: #0d2338;
      color: #e8f3ff;
      border: 1px solid #3a5f85;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover, select:hover {
      border-color: #6ca7e8;
    }

    #tooltip {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      min-width: 220px;
      max-width: 320px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(10, 18, 30, 0.85);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    #legend {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(8, 20, 36, 0.78);
      border: 1px solid rgba(140, 190, 255, 0.28);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      color: #d4e8ff;
    }

    .grad {
      width: 180px;
      height: 12px;
      border-radius: 999px;
      margin-top: 6px;
      background: linear-gradient(90deg, #2a6fff 0%, #ff3c3c 100%);
      border: 1px solid rgba(255,255,255,0.2);
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <h2>3D 地球 + 城市柱状图</h2>
      <div class="row"><span class="label">数据模式</span>
        <select id="sortBy">
          <option value="gdp">gdp</option>
          <option value="population">population</option>
        </select>
      </div>
      <div class="row"><span class="label">柱状图数量</span><span id="barCount">0</span></div>
      <div class="row"><span class="label">当前选中城市</span><span id="selectedCity">—</span></div>
      <div class="row"><span class="label">相机距离</span><span id="camDistance">0</span></div>
      <div class="row">
        <button id="resetCam">重置相机</button>
      </div>
    </div>

    <div id="tooltip">点击柱体查看城市数据</div>

    <div id="legend">
      颜色映射：低值 → 高值
      <div class="grad"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const tooltip = document.getElementById('tooltip');
    const barCountEl = document.getElementById('barCount');
    const selectedCityEl = document.getElementById('selectedCity');
    const camDistanceEl = document.getElementById('camDistance');
    const sortByEl = document.getElementById('sortBy');
    const resetCamBtn = document.getElementById('resetCam');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x06131f);
    scene.fog = new THREE.Fog(0x06131f, 20, 40);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);
    controls.minDistance = 8;
    controls.maxDistance = 30;

    const DEFAULT_CAMERA_POS = new THREE.Vector3(0, 4.5, 14.309088021254185); // 与 target 距离严格为 15
    const DEFAULT_TARGET = new THREE.Vector3(0, 0, 0);

    function resetCamera() {
      camera.position.copy(DEFAULT_CAMERA_POS);
      controls.target.copy(DEFAULT_TARGET);
      controls.update();
      updateCameraDistance();
    }

    resetCamera();

    scene.add(new THREE.AmbientLight(0xffffff, 1.15));

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight1.position.set(10, 6, 8);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0x88aaff, 0.8);
    dirLight2.position.set(-8, -3, -6);
    scene.add(dirLight2);

    const stars = new THREE.Points(
      new THREE.BufferGeometry(),
      new THREE.PointsMaterial({ color: 0xbfd7ff, size: 0.06, transparent: true, opacity: 0.9 })
    );
    {
      const count = 2000;
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const r = 60 + Math.random() * 80;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.cos(phi);
        positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      }
      stars.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    }
    scene.add(stars);

    function createEarthTexture(size = 1024) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size / 2;
      const ctx = canvas.getContext('2d');

      const w = canvas.width;
      const h = canvas.height;

      const oceanGrad = ctx.createLinearGradient(0, 0, 0, h);
      oceanGrad.addColorStop(0, '#184b8f');
      oceanGrad.addColorStop(0.5, '#0c3568');
      oceanGrad.addColorStop(1, '#082848');
      ctx.fillStyle = oceanGrad;
      ctx.fillRect(0, 0, w, h);

      function pseudoNoise(x, y) {
        return (
          0.55 * Math.sin(x * 0.018) * Math.cos(y * 0.028) +
          0.25 * Math.sin((x + y) * 0.035) +
          0.15 * Math.cos((x - y) * 0.022) +
          0.12 * Math.sin(x * 0.09) * Math.sin(y * 0.07)
        );
      }

      const img = ctx.getImageData(0, 0, w, h);
      const data = img.data;

      for (let y = 0; y < h; y++) {
        const v = y / h;
        for (let x = 0; x < w; x++) {
          const u = x / w;

          const latInfluence = Math.cos((v - 0.5) * Math.PI);
          let n = pseudoNoise(x, y);
          n += 0.35 * Math.sin(u * Math.PI * 6.0) * latInfluence;
          n += 0.25 * Math.cos((u * 9.0 - v * 4.0) * Math.PI);
          n += 0.15 * Math.sin((u * 15.0 + v * 7.0) * Math.PI);

          const idx = (y * w + x) * 4;
          const ocean = [16, 58, 110];
          const land = [64, 136, 82];
          const land2 = [114, 160, 98];

          const threshold = 0.33 - 0.15 * latInfluence;
          const isLand = n > threshold;

          if (isLand) {
            const mix = Math.min(1, Math.max(0, (n - threshold) * 1.8));
            data[idx + 0] = land[0] * (1 - mix) + land2[0] * mix;
            data[idx + 1] = land[1] * (1 - mix) + land2[1] * mix;
            data[idx + 2] = land[2] * (1 - mix) + land2[2] * mix;
          } else {
            const deep = Math.min(1, Math.max(0, (threshold - n) * 2.0));
            data[idx + 0] = ocean[0] * (1 - deep) + 7 * deep;
            data[idx + 1] = ocean[1] * (1 - deep) + 34 * deep;
            data[idx + 2] = ocean[2] * (1 - deep) + 74 * deep;
          }

          data[idx + 3] = 255;
        }
      }

      ctx.putImageData(img, 0, 0);

      ctx.strokeStyle = 'rgba(210,240,220,0.18)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 24; i++) {
        ctx.beginPath();
        const y = (i / 24) * h;
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.needsUpdate = true;
      return texture;
    }

    const earthRadius = 5;
    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    const earthTexture = createEarthTexture(1024);
    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(earthRadius, 96, 96),
      new THREE.MeshPhongMaterial({
        map: earthTexture,
        shininess: 12,
        specular: new THREE.Color(0x335577)
      })
    );
    earthGroup.add(earth);

    const wire = new THREE.Mesh(
      new THREE.SphereGeometry(earthRadius * 1.002, 48, 48),
      new THREE.MeshBasicMaterial({
        color: 0x99c8ff,
        wireframe: true,
        transparent: true,
        opacity: 0.08
      })
    );
    earthGroup.add(wire);

    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(earthRadius * 1.05, 64, 64),
      new THREE.MeshPhongMaterial({
        color: 0x58a6ff,
        transparent: true,
        opacity: 0.10,
        side: THREE.DoubleSide
      })
    );
    earthGroup.add(atmosphere);

    const cityData = [
      { city: 'Tokyo', lat: 35.6762, lng: 139.6503, gdp: 1650, population: 37.4 },
      { city: 'New York', lat: 40.7128, lng: -74.0060, gdp: 1860, population: 19.6 },
      { city: 'London', lat: 51.5074, lng: -0.1278, gdp: 950, population: 14.8 },
      { city: 'Paris', lat: 48.8566, lng: 2.3522, gdp: 850, population: 11.1 },
      { city: 'Beijing', lat: 39.9042, lng: 116.4074, gdp: 930, population: 21.9 },
      { city: 'Shanghai', lat: 31.2304, lng: 121.4737, gdp: 980, population: 24.9 },
      { city: 'Singapore', lat: 1.3521, lng: 103.8198, gdp: 397, population: 5.9 },
      { city: 'Sydney', lat: -33.8688, lng: 151.2093, gdp: 356, population: 5.3 },
      { city: 'Moscow', lat: 55.7558, lng: 37.6173, gdp: 420, population: 12.6 },
      { city: 'Dubai', lat: 25.2048, lng: 55.2708, gdp: 108, population: 3.6 },
      { city: 'Mumbai', lat: 19.0760, lng: 72.8777, gdp: 368, population: 20.7 },
      { city: 'São Paulo', lat: -23.5558, lng: -46.6396, gdp: 430, population: 22.6 },
      { city: 'Mexico City', lat: 19.4326, lng: -99.1332, gdp: 411, population: 22.3 },
      { city: 'Los Angeles', lat: 34.0522, lng: -118.2437, gdp: 1040, population: 13.2 },
      { city: 'Toronto', lat: 43.6532, lng: -79.3832, gdp: 367, population: 6.7 },
      { city: 'Berlin', lat: 52.5200, lng: 13.4050, gdp: 210, population: 3.8 },
      { city: 'Seoul', lat: 37.5665, lng: 126.9780, gdp: 779, population: 9.9 },
      { city: 'Bangkok', lat: 13.7563, lng: 100.5018, gdp: 174, population: 10.7 },
      { city: 'Cairo', lat: 30.0444, lng: 31.2357, gdp: 180, population: 20.5 },
      { city: 'Johannesburg', lat: -26.2041, lng: 28.0473, gdp: 131, population: 5.9 }
    ];

    const barsGroup = new THREE.Group();
    earthGroup.add(barsGroup);

    const barMeshes = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let selectedCity = '';

    function latLngToVector3(lat, lng, radius) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = (lng + 180) * Math.PI / 180;

      const x = -radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.cos(phi);
      const z = radius * Math.sin(phi) * Math.sin(theta);

      return new THREE.Vector3(x, y, z);
    }

    function valueToColor(value, min, max) {
      const t = max > min ? (value - min) / (max - min) : 0.5;
      const c1 = new THREE.Color(0x2a6fff);
      const c2 = new THREE.Color(0xff3c3c);
      return c1.lerp(c2, THREE.MathUtils.clamp(t, 0, 1));
    }

    function formatValue(mode, value) {
      if (mode === 'gdp') return `${value.toFixed(1)} B USD`;
      return `${value.toFixed(1)} M`;
    }

    function createBars() {
      while (barsGroup.children.length) {
        const obj = barsGroup.children.pop();
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) obj.material.dispose();
      }
      barMeshes.length = 0;

      const mode = sortByEl.value;
      const values = cityData.map(d => d[mode]);
      const min = Math.min(...values);
      const max = Math.max(...values);

      cityData.forEach((d) => {
        const value = d[mode];
        const height = 0.6 + (max > min ? ((value - min) / (max - min)) : 0.5) * 4.2;
        const color = valueToColor(value, min, max);

        const geometry = new THREE.CylinderGeometry(0.09, 0.09, height, 12, 1, false);
        const material = new THREE.MeshPhongMaterial({
          color: color.clone(),
          emissive: color.clone().multiplyScalar(0.18),
          shininess: 30
        });

        const bar = new THREE.Mesh(geometry, material);

        const normal = latLngToVector3(d.lat, d.lng, 1).normalize();
        const center = normal.clone().multiplyScalar(earthRadius + height / 2 + 0.02);

        bar.position.copy(center);
        bar.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);

        bar.userData = {
          city: d.city,
          lat: d.lat,
          lng: d.lng,
          value,
          height,
          color: `#${color.getHexString()}`
        };

        const anchor = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 10, 10),
          new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        anchor.position.copy(normal.clone().multiplyScalar(earthRadius + 0.03));
        barsGroup.add(anchor);

        barsGroup.add(bar);
        barMeshes.push(bar);
      });

      updateHUD();
      update3DState();
    }

    function updateBars() {
      const mode = sortByEl.value;
      const values = cityData.map(d => d[mode]);
      const min = Math.min(...values);
      const max = Math.max(...values);

      barMeshes.forEach((bar, i) => {
        const d = cityData[i];
        const value = d[mode];
        const height = 0.6 + (max > min ? ((value - min) / (max - min)) : 0.5) * 4.2;
        const color = valueToColor(value, min, max);
        const normal = latLngToVector3(d.lat, d.lng, 1).normalize();
        const center = normal.clone().multiplyScalar(earthRadius + height / 2 + 0.02);

        bar.geometry.dispose();
        bar.geometry = new THREE.CylinderGeometry(0.09, 0.09, height, 12, 1, false);
        bar.material.color.copy(color);
        bar.material.emissive.copy(color).multiplyScalar(0.18);
        bar.position.copy(center);
        bar.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);

        bar.userData.value = value;
        bar.userData.height = height;
        bar.userData.color = `#${color.getHexString()}`;
      });

      if (selectedCity) {
        const selectedBar = barMeshes.find(m => m.userData.city === selectedCity);
        if (selectedBar) {
          tooltip.textContent = `${selectedBar.userData.city}\n${mode}: ${formatValue(mode, selectedBar.userData.value)}`;
        }
      }

      updateHUD();
      update3DState();
    }

    function updateCameraDistance() {
      const dist = camera.position.distanceTo(controls.target);
      const safeDist = Number.isFinite(dist) ? dist : 0;
      camDistanceEl.textContent = safeDist.toFixed(3);
      return safeDist;
    }

    function updateHUD() {
      barCountEl.textContent = String(barMeshes.length);
      selectedCityEl.textContent = selectedCity || '—';
      updateCameraDistance();
    }

    function update3DState() {
      const cameraDistance = updateCameraDistance();
      window.__3D_STATE__ = {
        barCount: barMeshes.length,
        bars: barMeshes.map(bar => ({
          city: String(bar.userData.city),
          lat: Number(bar.userData.lat),
          lng: Number(bar.userData.lng),
          value: Number(bar.userData.value),
          height: Number(bar.userData.height),
          color: String(bar.userData.color)
        })),
        selectedCity: selectedCity || '',
        cameraDistance: Number(cameraDistance),
        dataMode: sortByEl.value === 'population' ? 'population' : 'gdp'
      };
    }

    function onPointerClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(barMeshes, false);

      if (intersects.length > 0) {
        const bar = intersects[0].object;
        selectedCity = bar.userData.city;
        selectedCityEl.textContent = selectedCity;
        tooltip.textContent = `${bar.userData.city}\n${sortByEl.value}: ${formatValue(sortByEl.value, bar.userData.value)}`;
      } else {
        selectedCity = '';
        selectedCityEl.textContent = '—';
        tooltip.textContent = '点击柱体查看城市数据';
      }

      update3DState();
    }

    renderer.domElement.addEventListener('click', onPointerClick);

    sortByEl.addEventListener('change', () => {
      updateBars();
    });

    resetCamBtn.addEventListener('click', () => {
      resetCamera();
      updateHUD();
      update3DState();
    });

    controls.addEventListener('change', () => {
      updateHUD();
      update3DState();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateHUD();
      update3DState();
    });

    createBars();

    function animate() {
      requestAnimationFrame(animate);
      earth.rotation.y += 0.0012;
      wire.rotation.y += 0.0015;
      controls.update();
      update3DState();
      renderer.render(scene, camera);
    }

    updateHUD();
    update3DState();
    animate();
  </script>
</body>
</html>
