<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Globe + City Bar Chart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; }
  canvas { display: block; }

  #hud {
    position: absolute; top: 16px; left: 16px;
    background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 16px 20px; min-width: 220px;
    backdrop-filter: blur(8px);
  }
  #hud h2 { font-size: 14px; margin-bottom: 10px; color: #8cf; letter-spacing: 1px; }
  #hud .row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; font-size: 13px; }
  #hud .row label { color: #aaa; }
  #hud .row span, #hud .row select { color: #fff; font-weight: bold; }
  #hud select {
    background: #222; color: #fff; border: 1px solid #555; border-radius: 4px;
    padding: 2px 6px; font-size: 13px; cursor: pointer;
  }
  #hud button {
    margin-top: 10px; width: 100%; padding: 6px 0; background: #1a6; color: #fff;
    border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold;
  }
  #hud button:hover { background: #2b8; }

  #tooltip {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 12px 24px; font-size: 15px;
    pointer-events: none; white-space: nowrap; display: none;
    backdrop-filter: blur(6px);
  }
  #tooltip.visible { display: block; }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="hud">
  <h2>🌍 GLOBE DATA VIS</h2>
  <div class="row"><label>Bar Count:</label><span id="barCount">0</span></div>
  <div class="row"><label>Selected:</label><span id="selectedCity">—</span></div>
  <div class="row"><label>Cam Dist:</label><span id="camDistance">15.00</span></div>
  <div class="row">
    <label>Sort By:</label>
    <select id="sortBy">
      <option value="gdp">GDP</option>
      <option value="population">Population</option>
    </select>
  </div>
  <button id="resetCam">Reset Camera</button>
</div>

<div id="tooltip"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── City Data (20 cities) ───
const cities = [
  { city: "New York",    lat: 40.7128,  lng: -74.0060,  gdp: 1700, population: 8336 },
  { city: "London",      lat: 51.5074,  lng: -0.1278,   gdp: 1200, population: 8982 },
  { city: "Tokyo",       lat: 35.6762,  lng: 139.6503,  gdp: 1920, population: 13960 },
  { city: "Shanghai",    lat: 31.2304,  lng: 121.4737,  gdp: 680,  population: 24870 },
  { city: "Mumbai",      lat: 19.0760,  lng: 72.8777,   gdp: 310,  population: 20411 },
  { city: "São Paulo",   lat: -23.5505, lng: -46.6333,  gdp: 430,  population: 12325 },
  { city: "Paris",       lat: 48.8566,  lng: 2.3522,    gdp: 850,  population: 2161 },
  { city: "Beijing",     lat: 39.9042,  lng: 116.4074,  gdp: 610,  population: 21540 },
  { city: "Moscow",      lat: 55.7558,  lng: 37.6173,   gdp: 420,  population: 12506 },
  { city: "Dubai",       lat: 25.2048,  lng: 55.2708,   gdp: 380,  population: 3331 },
  { city: "Singapore",   lat: 1.3521,   lng: 103.8198,  gdp: 397,  population: 5686 },
  { city: "Sydney",      lat: -33.8688, lng: 151.2093,  gdp: 440,  population: 5312 },
  { city: "Los Angeles", lat: 34.0522,  lng: -118.2437, gdp: 1000, population: 3979 },
  { city: "Berlin",      lat: 52.5200,  lng: 13.4050,   gdp: 380,  population: 3645 },
  { city: "Seoul",       lat: 37.5665,  lng: 126.9780,  gdp: 950,  population: 9776 },
  { city: "Mexico City", lat: 19.4326,  lng: -99.1332,  gdp: 290,  population: 9209 },
  { city: "Cairo",       lat: 30.0444,  lng: 31.2357,   gdp: 130,  population: 9540 },
  { city: "Lagos",       lat: 6.5244,   lng: 3.3792,    gdp: 90,   population: 15388 },
  { city: "Toronto",     lat: 43.6532,  lng: -79.3832,  gdp: 380,  population: 2930 },
  { city: "Istanbul",    lat: 41.0082,  lng: 28.9784,   gdp: 240,  population: 15460 },
];

// ─── Scene Setup ───
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const DEFAULT_DISTANCE = 15;
const DEFAULT_POSITION = new THREE.Vector3(0, 5, DEFAULT_DISTANCE * Math.cos(Math.asin(5/15)));
// Compute so that distance = 15
const dxz = Math.sqrt(DEFAULT_DISTANCE * DEFAULT_DISTANCE - 5 * 5);
DEFAULT_POSITION.set(0, 5, dxz);

camera.position.copy(DEFAULT_POSITION);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 7;
controls.maxDistance = 40;
controls.update();

// ─── Lighting ───
scene.add(new THREE.AmbientLight(0x445566, 1.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
dirLight.position.set(10, 10, 10);
scene.add(dirLight);
const dirLight2 = new THREE.DirectionalLight(0x6688cc, 0.6);
dirLight2.position.set(-10, -5, -10);
scene.add(dirLight2);

// ─── Stars ───
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 3000; i++) {
  const r = 80 + Math.random() * 120;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starVerts.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 })));

// ─── Earth ───
const EARTH_RADIUS = 4;

// Procedural earth texture using noise
function createEarthTexture() {
  const size = 1024;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size / 2;
  const ctx = canvas.getContext('2d');

  // Simple seeded pseudo-random for noise
  function seededRandom(x, y) {
    const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
    return n - Math.floor(n);
  }

  // Multi-octave value noise
  function noise2D(px, py) {
    const ix = Math.floor(px);
    const iy = Math.floor(py);
    const fx = px - ix;
    const fy = py - iy;
    const sx = fx * fx * (3 - 2 * fx);
    const sy = fy * fy * (3 - 2 * fy);
    const n00 = seededRandom(ix, iy);
    const n10 = seededRandom(ix + 1, iy);
    const n01 = seededRandom(ix, iy + 1);
    const n11 = seededRandom(ix + 1, iy + 1);
    const nx0 = n00 + (n10 - n00) * sx;
    const nx1 = n01 + (n11 - n01) * sx;
    return nx0 + (nx1 - nx0) * sy;
  }

  function fbm(x, y) {
    let val = 0, amp = 0.5, freq = 1;
    for (let i = 0; i < 6; i++) {
      val += amp * noise2D(x * freq, y * freq);
      amp *= 0.5;
      freq *= 2.1;
    }
    return val;
  }

  // Draw ocean base
  const oceanGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  oceanGrad.addColorStop(0, '#1a3a5c');
  oceanGrad.addColorStop(0.3, '#0d2b4a');
  oceanGrad.addColorStop(0.5, '#0a2540');
  oceanGrad.addColorStop(0.7, '#0d2b4a');
  oceanGrad.addColorStop(1, '#1a3a5c');
  ctx.fillStyle = oceanGrad;
  ctx.fillRect(0, 0, size, canvas.height);

  // Draw continents using noise
  const imgData = ctx.getImageData(0, 0, size, canvas.height);
  const data = imgData.data;

  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < size; x++) {
      const u = x / size;
      const v = y / canvas.height;
      const lat = (0.5 - v) * Math.PI;
      const lng = (u - 0.5) * 2 * Math.PI;

      // Spherical coordinates for seamless noise
      const nx = Math.cos(lat) * Math.cos(lng);
      const ny = Math.sin(lat);
      const nz = Math.cos(lat) * Math.sin(lng);

      const n = fbm(nx * 3.0 + 5.0, ny * 3.0 + 3.0) * 0.6 +
                fbm(nz * 2.5 + 7.0, nx * 2.5 + 1.0) * 0.4;

      // Polar ice
      const polarFactor = Math.abs(lat) / (Math.PI / 2);

      const idx = (y * size + x) * 4;

      if (polarFactor > 0.82) {
        // Ice caps
        const ice = Math.min(1, (polarFactor - 0.82) / 0.15);
        data[idx] = Math.floor(200 + 55 * ice);
        data[idx + 1] = Math.floor(210 + 45 * ice);
        data[idx + 2] = Math.floor(220 + 35 * ice);
      } else if (n > 0.42) {
        // Land
        const landN = (n - 0.42) / 0.58;
        if (landN > 0.6) {
          // Mountains
          const m = (landN - 0.6) / 0.4;
          data[idx] = Math.floor(100 + 80 * m);
          data[idx + 1] = Math.floor(80 + 60 * m);
          data[idx + 2] = Math.floor(50 + 40 * m);
        } else if (landN > 0.15) {
          // Green land
          const g = (landN - 0.15) / 0.45;
          data[idx] = Math.floor(30 + 40 * g);
          data[idx + 1] = Math.floor(90 + 50 * (1 - g));
          data[idx + 2] = Math.floor(20 + 20 * g);
        } else {
          // Coastal / low land
          data[idx] = 50;
          data[idx + 1] = 120;
          data[idx + 2] = 40;
        }
        // Desert near equator with specific noise
        if (Math.abs(lat) < 0.5 && n > 0.55) {
          const desert = Math.min(1, (n - 0.55) / 0.15);
          data[idx] = Math.floor(data[idx] * (1 - desert) + 180 * desert);
          data[idx + 1] = Math.floor(data[idx + 1] * (1 - desert) + 160 * desert);
          data[idx + 2] = Math.floor(data[idx + 2] * (1 - desert) + 100 * desert);
        }
      }
      // else keep ocean color
    }
  }

  ctx.putImageData(imgData, 0, 0);

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  return tex;
}

const earthTexture = createEarthTexture();
const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 64, 48);
const earthMat = new THREE.MeshPhongMaterial({
  map: earthTexture,
  specular: 0x222244,
  shininess: 15,
});
const earthMesh = new THREE.Mesh(earthGeo, earthMat);
scene.add(earthMesh);

// Atmosphere glow
const atmosGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.02, 64, 48);
const atmosMat = new THREE.MeshPhongMaterial({
  color: 0x4488ff,
  transparent: true,
  opacity: 0.08,
  side: THREE.FrontSide,
});
scene.add(new THREE.Mesh(atmosGeo, atmosMat));

// Wireframe overlay
const wireGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.003, 32, 24);
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x3366aa,
  wireframe: true,
  transparent: true,
  opacity: 0.06,
});
scene.add(new THREE.Mesh(wireGeo, wireMat));

// ─── Lat/Lng to 3D Position ───
function latLngToPos(lat, lng, radius) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lng + 180) * (Math.PI / 180);
  const x = -radius * Math.sin(phi) * Math.cos(theta);
  const y = radius * Math.cos(phi);
  const z = radius * Math.sin(phi) * Math.sin(theta);
  return new THREE.Vector3(x, y, z);
}

// ─── Color Interpolation ───
function valueToColor(t) {
  // t in [0,1], blue(0) -> cyan -> yellow -> red(1)
  t = Math.max(0, Math.min(1, t));
  const r = Math.floor(Math.min(255, t * 2 * 255));
  const g = Math.floor(t < 0.5 ? t * 2 * 255 : (1 - t) * 2 * 255);
  const b = Math.floor(Math.max(0, (1 - t * 2) * 255));
  return new THREE.Color(r / 255, g / 255, b / 255);
}

function colorToHex(color) {
  return '#' + color.getHexString();
}

// ─── Bars ───
const barsGroup = new THREE.Group();
scene.add(barsGroup);

const barMeshes = [];
const barData = [];

const MAX_BAR_HEIGHT = 3.5;
const BAR_RADIUS = 0.08;

function getDataRange(mode) {
  const key = mode === 'gdp' ? 'gdp' : 'population';
  let min = Infinity, max = -Infinity;
  for (const c of cities) {
    if (c[key] < min) min = c[key];
    if (c[key] > max) max = c[key];
  }
  return { min, max, key };
}

function createBars(mode) {
  // Clear existing
  for (const m of barMeshes) {
    barsGroup.remove(m.bar);
    barsGroup.remove(m.dot);
    m.bar.geometry.dispose();
    m.bar.material.dispose();
    m.dot.geometry.dispose();
    m.dot.material.dispose();
  }
  barMeshes.length = 0;
  barData.length = 0;

  const { min, max, key } = getDataRange(mode);
  const range = max - min || 1;

  for (let i = 0; i < cities.length; i++) {
    const c = cities[i];
    const value = c[key];
    const t = (value - min) / range;
    const height = 0.3 + t * MAX_BAR_HEIGHT;
    const color = valueToColor(t);

    const surfacePos = latLngToPos(c.lat, c.lng, EARTH_RADIUS);
    const normal = surfacePos.clone().normalize();

    // Bar
    const barGeo = new THREE.CylinderGeometry(BAR_RADIUS, BAR_RADIUS, height, 8);
    barGeo.translate(0, height / 2, 0);
    const barMat = new THREE.MeshPhongMaterial({
      color: color,
      emissive: color.clone().multiplyScalar(0.3),
      transparent: true,
      opacity: 0.88,
    });
    const barMesh = new THREE.Mesh(barGeo, barMat);

    // Position at surface
    barMesh.position.copy(surfacePos);

    // Orient along normal
    const up = new THREE.Vector3(0, 1, 0);
    const quat = new THREE.Quaternion().setFromUnitVectors(up, normal);
    barMesh.quaternion.copy(quat);

    barsGroup.add(barMesh);

    // Dot at base
    const dotGeo = new THREE.SphereGeometry(0.12, 8, 8);
    const dotMat = new THREE.MeshBasicMaterial({ color: color });
    const dotMesh = new THREE.Mesh(dotGeo, dotMat);
    dotMesh.position.copy(surfacePos.clone().add(normal.clone().multiplyScalar(0.05)));
    barsGroup.add(dotMesh);

    barMeshes.push({ bar: barMesh, dot: dotMesh, index: i });
    barData.push({
      city: c.city,
      lat: c.lat,
      lng: c.lng,
      value: value,
      height: parseFloat(height.toFixed(4)),
      color: colorToHex(color),
    });
  }
}

let currentMode = 'gdp';
createBars(currentMode);

// ─── State ───
let selectedCity = '';

window.__3D_STATE__ = {
  barCount: 20,
  bars: [],
  selectedCity: '',
  cameraDistance: DEFAULT_DISTANCE,
  dataMode: currentMode,
};

function updateState() {
  const dist = camera.position.distanceTo(controls.target);
  window.__3D_STATE__ = {
    barCount: barData.length,
    bars: barData.map(b => ({ ...b })),
    selectedCity: selectedCity,
    cameraDistance: parseFloat(dist.toFixed(4)),
    dataMode: currentMode,
  };

  document.getElementById('barCount').textContent = barData.length;
  document.getElementById('selectedCity').textContent = selectedCity || '—';
  document.getElementById('camDistance').textContent = dist.toFixed(2);
}

// ─── Sort By ───
document.getElementById('sortBy').addEventListener('change', (e) => {
  currentMode = e.target.value;
  createBars(currentMode);
  // If a city was selected, update tooltip
  if (selectedCity) {
    const found = barData.find(b => b.city === selectedCity);
    if (found) {
      showTooltip(found.city, found.value);
    }
  }
  updateState();
});

// ─── Reset Camera ───
document.getElementById('resetCam').addEventListener('click', () => {
  controls.target.set(0, 0, 0);
  camera.position.copy(DEFAULT_POSITION);
  controls.update();
  updateState();
});

// ─── Tooltip ───
const tooltipEl = document.getElementById('tooltip');

function showTooltip(city, value) {
  const modeLabel = currentMode === 'gdp' ? 'GDP' : 'Population';
  const unit = currentMode === 'gdp' ? 'B USD' : 'K';
  tooltipEl.innerHTML = `<strong>${city}</strong> — ${modeLabel}: ${value} ${unit}`;
  tooltipEl.classList.add('visible');
}

function hideTooltip() {
  tooltipEl.classList.remove('visible');
}

// ─── Raycaster ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let highlightedBar = null;

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const barObjects = barMeshes.map(b => b.bar);
  const intersects = raycaster.intersectObjects(barObjects);

  // Reset previous highlight
  if (highlightedBar !== null) {
    const prev = barMeshes[highlightedBar];
    const prevData = barData[highlightedBar];
    const prevColor = new THREE.Color(prevData.color);
    prev.bar.material.emissive.copy(prevColor.clone().multiplyScalar(0.3));
    prev.bar.material.opacity = 0.88;
    prev.bar.scale.set(1, 1, 1);
  }

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const idx = barMeshes.findIndex(b => b.bar === hit);
    if (idx >= 0) {
      highlightedBar = idx;
      selectedCity = barData[idx].city;

      // Highlight
      hit.material.emissive.set(0xffffff);
      hit.material.opacity = 1.0;
      hit.scale.set(1.5, 1, 1.5);

      showTooltip(barData[idx].city, barData[idx].value);
    }
  } else {
    highlightedBar = null;
    selectedCity = '';
    hideTooltip();
  }

  updateState();
});

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animate ───
function animate() {
  requestAnimationFrame(animate);

  // Slow earth rotation
  earthMesh.rotation.y += 0.001;
  barsGroup.rotation.y += 0.001;

  controls.update();
  updateState();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
