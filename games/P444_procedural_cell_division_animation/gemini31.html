<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cell Division (Mitosis) Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .hud-panel {
            position: absolute;
            background: rgba(10, 10, 46, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        #top-left { top: 20px; left: 20px; }
        #top-right { top: 20px; right: 20px; text-align: right; }
        #bottom-center { 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #bottom-left { bottom: 20px; left: 20px; }
        
        h1, h2, h3, p { margin: 0 0 5px 0; }
        h1 { font-size: 1.5rem; color: #44cc88; }
        h2 { font-size: 1.2rem; color: #88ffaa; }
        
        .key-binding {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            margin: 0 2px;
            color: #ffddaa;
        }

        #progress-container {
            width: 300px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #44cc88;
            transition: width 0.1s linear;
        }

        #labels-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .floating-label {
            position: absolute;
            background: rgba(0,0,0,0.6);
            border: 1px solid #88ffaa;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        #selected-info {
            margin-top: 10px;
            color: #ffff44;
            font-weight: bold;
            display: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="labels-container"></div>

    <div id="top-left" class="hud-panel">
        <h1 id="phase-display">Phase 0: Interphase</h1>
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="top-right" class="hud-panel">
        <h2 id="cell-count">Cells: 1</h2>
        <p id="chromosome-count">Chromosomes: 4</p>
        <p id="autoplay-status" style="color: #aaaaaa;">Auto-Play: OFF</p>
        <div id="selected-info">Selected: Daughter Cell</div>
    </div>

    <div id="bottom-left" class="hud-panel">
        <h2 id="timer">Time: 0s</h2>
    </div>

    <div id="bottom-center" class="hud-panel">
        <p>
            <span class="key-binding">1</span> Prophase | 
            <span class="key-binding">2</span> Metaphase | 
            <span class="key-binding">3</span> Anaphase | 
            <span class="key-binding">4</span> Telophase | 
            <span class="key-binding">5</span> Cytokinesis
        </p>
        <p>
            <span class="key-binding">Space</span> Auto-Play | 
            <span class="key-binding">R</span> Reset | 
            <span class="key-binding">L</span> Toggle Labels | 
            <span class="key-binding">Click</span> Select Cell (Phase 5)
        </p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            modelLoaded: false,
            currentPhase: 0,
            phaseName: 'Interphase',
            chromosomeCount: 4,
            cellCount: 1,
            nucleusOpacity: 0.8,
            cellScaleY: 1.0,
            autoPlayActive: false,
            labelsVisible: false,
            phaseComplete: true,
            elapsedTime: 0,
            selectedCell: null,
            cleavageFurrowRadius: 1.5,
            daughterCellPositions: [],
            progressPercent: 0
        };

        const state = window.__3D_STATE__;
        const phaseNames = ['Interphase', 'Prophase', 'Metaphase', 'Anaphase', 'Telophase', 'Cytokinesis'];

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const warmLight = new THREE.DirectionalLight(0xffddaa, 1.0);
        warmLight.position.set(5, 10, 5);
        scene.add(warmLight);
        const coolLight = new THREE.DirectionalLight(0xaaddff, 0.8);
        coolLight.position.set(-5, 8, -3);
        scene.add(coolLight);

        // Load Background Model
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/LittlestTokyo.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.setScalar(0.002);
            model.position.set(8, -2, -5);
            scene.add(model);
            state.modelLoaded = true;
        });

        // Cell Objects
        const cellGroup = new THREE.Group();
        scene.add(cellGroup);

        const parentCellMat = new THREE.MeshPhongMaterial({ color: 0x44cc88, transparent: true, opacity: 0.5, shininess: 100 });
        const parentCell = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), parentCellMat);
        
        const nucleusMat = new THREE.MeshPhongMaterial({ color: 0x8844cc, transparent: true, opacity: 0.8 });
        const nucleus = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), nucleusMat);
        
        const membrane = new THREE.Mesh(new THREE.TorusGeometry(1.5, 0.03, 16, 100), new THREE.MeshPhongMaterial({ color: 0x88ffaa }));
        membrane.rotation.x = Math.PI / 2;

        cellGroup.add(parentCell, nucleus, membrane);

        let chromosomes = [];
        let chromosomes2 = [];
        let daughterCells = [];
        let newNuclei = [];
        let furrow = null;

        const chromoGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.3, 8);
        const chromoMat = new THREE.MeshPhongMaterial({ color: 0xff4444 });

        function createInitialChromosomes() {
            for (let i = 0; i < 4; i++) {
                const c = new THREE.Mesh(chromoGeo, chromoMat);
                c.position.set((Math.random() - 0.5) * 0.6, (Math.random() - 0.5) * 0.6, (Math.random() - 0.5) * 0.6);
                c.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                chromosomes.push(c);
                cellGroup.add(c);
            }
        }
        createInitialChromosomes();

        // Animation System
        let anim = { active: false, t: 0, duration: 1, onUpdate: null, onComplete: null };

        function startAnim(duration, onUpdate, onComplete) {
            anim.active = true;
            anim.t = 0;
            anim.duration = duration;
            anim.onUpdate = onUpdate;
            anim.onComplete = onComplete;
            state.phaseComplete = false;
        }

        // Phase Triggers
        function triggerPhase(phase) {
            if (!state.phaseComplete || phase !== state.currentPhase + 1) return;
            
            state.currentPhase = phase;
            state.phaseName = phaseNames[phase];
            state.selectedCell = null;
            document.getElementById('selected-info').style.display = 'none';

            if (phase === 1) { // Prophase
                const startPos = chromosomes.map(c => c.position.clone());
                startAnim(1.5, (t) => {
                    const easeT = t * t * (3 - 2 * t);
                    nucleus.material.opacity = THREE.MathUtils.lerp(0.8, 0.1, easeT);
                    state.nucleusOpacity = nucleus.material.opacity;
                    
                    const scaleT = Math.min(t * 1.5, 1.0);
                    const easeScale = scaleT * scaleT * (3 - 2 * scaleT);
                    chromosomes.forEach((c, i) => {
                        c.scale.setScalar(THREE.MathUtils.lerp(1, 2, easeScale));
                        c.position.lerpVectors(startPos[i], startPos[i].clone().multiplyScalar(1.2), easeT);
                    });
                }, () => { state.phaseComplete = true; });
            } 
            else if (phase === 2) { // Metaphase
                const startPos = chromosomes.map(c => c.position.clone());
                const startRot = chromosomes.map(c => c.rotation.clone());
                const targetPos = [
                    new THREE.Vector3(0.4, 0, 0), new THREE.Vector3(-0.4, 0, 0),
                    new THREE.Vector3(0, 0, 0.4), new THREE.Vector3(0, 0, -0.4)
                ];
                startAnim(1.0, (t) => {
                    const easeT = t * t * (3 - 2 * t);
                    chromosomes.forEach((c, i) => {
                        c.position.lerpVectors(startPos[i], targetPos[i], easeT);
                        c.rotation.x = THREE.MathUtils.lerp(startRot[i].x, Math.PI / 2, easeT);
                        c.rotation.y = THREE.MathUtils.lerp(startRot[i].y, 0, easeT);
                        c.rotation.z = THREE.MathUtils.lerp(startRot[i].z, 0, easeT);
                    });
                }, () => { state.phaseComplete = true; });
            }
            else if (phase === 3) { // Anaphase
                chromosomes2 = chromosomes.map(c => {
                    const clone = c.clone();
                    cellGroup.add(clone);
                    return clone;
                });
                state.chromosomeCount = 8;
                const startPos1 = chromosomes.map(c => c.position.clone());
                const startPos2 = chromosomes2.map(c => c.position.clone());
                
                startAnim(1.5, (t) => {
                    const easeT = t * t * (3 - 2 * t);
                    parentCell.scale.y = THREE.MathUtils.lerp(1, 1.5, easeT);
                    membrane.scale.y = THREE.MathUtils.lerp(1, 1.5, easeT);
                    state.cellScaleY = parentCell.scale.y;
                    
                    chromosomes.forEach((c, i) => { c.position.y = THREE.MathUtils.lerp(startPos1[i].y, 1.0, easeT); });
                    chromosomes2.forEach((c, i) => { c.position.y = THREE.MathUtils.lerp(startPos2[i].y, -1.0, easeT); });
                }, () => { state.phaseComplete = true; });
            }
            else if (phase === 4) { // Telophase
                const n1 = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), nucleusMat.clone());
                n1.material.opacity = 0; n1.position.y = 1.0;
                const n2 = n1.clone(); n2.position.y = -1.0;
                newNuclei = [n1, n2];
                cellGroup.add(n1, n2);

                furrow = new THREE.Mesh(new THREE.TorusGeometry(1.5, 0.05, 16, 100), new THREE.MeshPhongMaterial({ color: 0x88ffaa }));
                furrow.rotation.x = Math.PI / 2;
                cellGroup.add(furrow);

                startAnim(1.5, (t) => {
                    const easeT = t * t * (3 - 2 * t);
                    n1.material.opacity = THREE.MathUtils.lerp(0, 0.8, easeT);
                    n2.material.opacity = THREE.MathUtils.lerp(0, 0.8, easeT);
                    const fScale = THREE.MathUtils.lerp(1, 0.1, easeT);
                    furrow.scale.set(fScale, fScale, 1);
                    state.cleavageFurrowRadius = 1.5 * fScale;
                }, () => { state.phaseComplete = true; });
            }
            else if (phase === 5) { // Cytokinesis
                parentCell.visible = false;
                membrane.visible = false;
                furrow.visible = false;
                nucleus.visible = false;

                const dc1 = new THREE.Mesh(new THREE.SphereGeometry(1.0, 32, 32), parentCellMat.clone());
                const dc2 = dc1.clone();
                dc1.position.y = 1.0; dc2.position.y = -1.0;
                daughterCells = [dc1, dc2];
                cellGroup.add(dc1, dc2);
                state.cellCount = 2;

                startAnim(1.5, (t) => {
                    const easeT = t * t * (3 - 2 * t);
                    const yPos = THREE.MathUtils.lerp(1.0, 2.0, easeT);
                    dc1.position.y = yPos;
                    dc2.position.y = -yPos;
                    newNuclei[0].position.y = yPos;
                    newNuclei[1].position.y = -yPos;
                    chromosomes.forEach(c => c.position.y = yPos);
                    chromosomes2.forEach(c => c.position.y = -yPos);
                    state.daughterCellPositions = [yPos, -yPos];
                }, () => { state.phaseComplete = true; });
            }
        }

        function resetSimulation() {
            if (anim.active) return;
            
            chromosomes2.forEach(c => cellGroup.remove(c)); chromosomes2 = [];
            newNuclei.forEach(n => cellGroup.remove(n)); newNuclei = [];
            daughterCells.forEach(d => cellGroup.remove(d)); daughterCells = [];
            if (furrow) cellGroup.remove(furrow); furrow = null;

            parentCell.visible = true; parentCell.scale.setScalar(1);
            membrane.visible = true; membrane.scale.setScalar(1);
            nucleus.visible = true; nucleus.material.opacity = 0.8;

            chromosomes.forEach(c => {
                c.scale.setScalar(1);
                c.position.set((Math.random() - 0.5) * 0.6, (Math.random() - 0.5) * 0.6, (Math.random() - 0.5) * 0.6);
                c.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            });

            state.currentPhase = 0;
            state.phaseName = phaseNames[0];
            state.chromosomeCount = 4;
            state.cellCount = 1;
            state.nucleusOpacity = 0.8;
            state.cellScaleY = 1.0;
            state.phaseComplete = true;
            state.selectedCell = null;
            state.cleavageFurrowRadius = 1.5;
            state.daughterCellPositions = [];
            state.progressPercent = 0;
            
            document.getElementById('selected-info').style.display = 'none';
        }

        // Input Handling
        let lastAutoPlayTime = 0;
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') resetSimulation();
            if (key === ' ') {
                state.autoPlayActive = !state.autoPlayActive;
                lastAutoPlayTime = clock.getElapsedTime();
            }
            if (key === 'l') state.labelsVisible = !state.labelsVisible;
            
            if (!state.phaseComplete) return;
            if (key === '1' && state.currentPhase === 0) triggerPhase(1);
            if (key === '2' && state.currentPhase === 1) triggerPhase(2);
            if (key === '3' && state.currentPhase === 2) triggerPhase(3);
            if (key === '4' && state.currentPhase === 3) triggerPhase(4);
            if (key === '5' && state.currentPhase === 4) triggerPhase(5);
        });

        // Raycasting
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (e) => {
            if (state.currentPhase !== 5) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(daughterCells);
            
            daughterCells.forEach(d => d.material.color.setHex(0x44cc88));
            state.selectedCell = null;
            document.getElementById('selected-info').style.display = 'none';

            if (intersects.length > 0) {
                intersects[0].object.material.color.setHex(0xffff44);
                state.selectedCell = daughterCells.indexOf(intersects[0].object);
                const info = document.getElementById('selected-info');
                info.style.display = 'block';
                info.innerText = `Selected: Daughter Cell ${state.selectedCell + 1}`;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // UI and Render Loop
        const clock = new THREE.Clock();
        const labelsContainer = document.getElementById('labels-container');

        function createLabel(text, pos3D) {
            const vector = pos3D.clone();
            vector.project(camera);
            if (vector.z > 1) return; // behind camera
            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
            const div = document.createElement('div');
            div.className = 'floating-label';
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;
            div.innerText = text;
            labelsContainer.appendChild(div);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            state.elapsedTime = time;

            controls.update();

            // Animation Logic
            if (anim.active) {
                anim.t += delta / anim.duration;
                if (anim.t >= 1) {
                    anim.t = 1;
                    anim.active = false;
                    if (anim.onUpdate) anim.onUpdate(1);
                    if (anim.onComplete) anim.onComplete();
                } else {
                    if (anim.onUpdate) anim.onUpdate(anim.t);
                }
                state.progressPercent = anim.t * 100;
            } else {
                state.progressPercent = 0;
            }

            // Auto-play Logic
            if (state.autoPlayActive && state.phaseComplete) {
                if (time - lastAutoPlayTime > 3) {
                    if (state.currentPhase < 5) {
                        triggerPhase(state.currentPhase + 1);
                    } else {
                        resetSimulation();
                    }
                    lastAutoPlayTime = time;
                }
            } else if (!state.autoPlayActive) {
                lastAutoPlayTime = time;
            }

            // Update UI
            document.getElementById('phase-display').innerText = `Phase ${state.currentPhase}: ${state.phaseName}`;
            document.getElementById('cell-count').innerText = `Cells: ${state.cellCount}`;
            document.getElementById('chromosome-count').innerText = `Chromosomes: ${state.chromosomeCount}`;
            document.getElementById('timer').innerText = `Time: ${Math.floor(state.elapsedTime)}s`;
            document.getElementById('progress-bar').style.width = `${state.progressPercent}%`;
            
            const apStatus = document.getElementById('autoplay-status');
            apStatus.innerText = state.autoPlayActive ? 'Auto-Play: ON' : 'Auto-Play: OFF';
            apStatus.style.color = state.autoPlayActive ? '#44ff44' : '#aaaaaa';

            // Update Labels
            labelsContainer.innerHTML = '';
            if (state.labelsVisible) {
                if (state.currentPhase < 5) {
                    createLabel('Parent Cell', new THREE.Vector3(1.6, 0, 0));
                    if (state.currentPhase < 4) createLabel('Nucleus', new THREE.Vector3(0.6, 0.6, 0));
                } else {
                    createLabel('Daughter Cell 1', new THREE.Vector3(1.2, state.daughterCellPositions[0], 0));
                    createLabel('Daughter Cell 2', new THREE.Vector3(1.2, state.daughterCellPositions[1], 0));
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
