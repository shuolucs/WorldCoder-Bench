<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Mitosis Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 14px;
      line-height: 1.35;
    }

    #phase-display {
      top: 12px;
      left: 12px;
    }

    #cell-count {
      top: 12px;
      right: 12px;
      text-align: right;
    }

    #timer {
      left: 12px;
      bottom: 12px;
    }

    #instructions {
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      text-align: center;
      max-width: 760px;
    }

    #progress-container {
      position: absolute;
      top: 62px;
      left: 12px;
      width: 280px;
      height: 12px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.18);
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #44cc88, #88ffaa);
      transition: width 0.08s linear;
    }

    .label {
      position: absolute;
      z-index: 11;
      padding: 4px 8px;
      font-size: 12px;
      background: rgba(20,20,40,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      pointer-events: none;
      white-space: nowrap;
      transform: translate(-50%, -50%);
    }

    #info-box {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      min-width: 220px;
    }
  </style>
</head>
<body>
  <div id="phase-display" class="hud">Phase 0: Interphase</div>
  <div id="cell-count" class="hud">Cell Count: 1</div>
  <div id="timer" class="hud">Time: 0.0s</div>
  <div id="instructions" class="hud">
    Keys: [1] Prophase [2] Metaphase [3] Anaphase [4] Telophase [5] Cytokinesis [R] Reset [Space] Auto-play [L] Labels
  </div>
  <div id="progress-container"><div id="progress-bar"></div></div>
  <div id="info-box">Selected Cell: None</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const PHASES = [
      'Interphase',
      'Prophase',
      'Metaphase',
      'Anaphase',
      'Telophase',
      'Cytokinesis'
    ];

    window.__3D_STATE__ = {
      modelLoaded: false,
      currentPhase: 0,
      phaseName: PHASES[0],
      chromosomeCount: 4,
      cellCount: 1,
      nucleusOpacity: 1.0,
      cellScaleY: 1.0,
      autoPlayActive: false,
      labelsVisible: false,
      phaseComplete: true,
      elapsedTime: 0,
      selectedCell: null,
      cleavageFurrowRadius: 1.5,
      daughterCellPositions: [],
      progressPercent: 0
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const warmLight = new THREE.DirectionalLight(0xffddaa, 1.0);
    warmLight.position.set(5, 10, 5);
    scene.add(warmLight);

    const coolLight = new THREE.DirectionalLight(0xaaccff, 0.8);
    coolLight.position.set(-5, 8, -3);
    scene.add(coolLight);

    const loader = new GLTFLoader();
    loader.load(
      'LittlestTokyo.glb',
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(0.002);
        model.position.set(8, -2, -5);
        scene.add(model);
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Could not load LittlestTokyo.glb', err);
      }
    );

    const rootGroup = new THREE.Group();
    scene.add(rootGroup);

    let parentCell, nucleus, membrane, cleavageFurrow;
    let telophaseNuclei = [];
    let chromosomes = [];
    let daughterCells = [];
    let daughterChromosomes = [];
    let labels = [];

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const phaseDisplay = document.getElementById('phase-display');
    const cellCountDisplay = document.getElementById('cell-count');
    const timerDisplay = document.getElementById('timer');
    const progressBar = document.getElementById('progress-bar');
    const infoBox = document.getElementById('info-box');

    const clock = new THREE.Clock();
    const simulationStart = performance.now();

    let currentTransition = null;
    let autoPlayTimer = null;

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function clampInsideSphere(vec, radius) {
      const len = vec.length();
      if (len > radius) {
        vec.normalize().multiplyScalar(radius);
      }
      vec.x = safeNumber(vec.x);
      vec.y = safeNumber(vec.y);
      vec.z = safeNumber(vec.z);
      return vec;
    }

    function createCell(position = new THREE.Vector3(0,0,0), radius = 1.5, color = 0x44cc88, opacity = 0.5) {
      const group = new THREE.Group();
      group.position.copy(position);

      const cellGeo = new THREE.SphereGeometry(radius, 48, 48);
      const cellMat = new THREE.MeshPhongMaterial({
        color,
        transparent: true,
        opacity,
        shininess: 80,
        side: THREE.DoubleSide
      });
      const cellMesh = new THREE.Mesh(cellGeo, cellMat);

      const membraneGeo = new THREE.TorusGeometry(radius, 0.03, 16, 100);
      const membraneMat = new THREE.MeshBasicMaterial({ color: 0x88ffaa });
      const membraneMesh = new THREE.Mesh(membraneGeo, membraneMat);
      membraneMesh.rotation.x = Math.PI / 2;

      group.add(cellMesh);
      group.add(membraneMesh);

      return { group, cellMesh, membraneMesh, radius };
    }

    function createNucleus(radius = 0.5, color = 0x8844cc, opacity = 0.8, position = new THREE.Vector3()) {
      const geo = new THREE.SphereGeometry(radius, 32, 32);
      const mat = new THREE.MeshPhongMaterial({
        color,
        transparent: true,
        opacity
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(position);
      return mesh;
    }

    function createChromosome(color = 0xff4444) {
      const geo = new THREE.CylinderGeometry(0.05, 0.05, 0.3, 12);
      const mat = new THREE.MeshPhongMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.z = Math.PI / 2;
      return mesh;
    }

    function randomInsideNucleus(radius = 0.38) {
      const v = new THREE.Vector3(
        (Math.random() * 2 - 1),
        (Math.random() * 2 - 1),
        (Math.random() * 2 - 1)
      );
      if (v.length() === 0) v.set(0.1, 0.1, 0.1);
      v.normalize().multiplyScalar(Math.random() * radius);
      return clampInsideSphere(v, radius);
    }

    function clearLabels() {
      labels.forEach(l => l.remove());
      labels = [];
    }

    function addLabel(text, getPosition) {
      const div = document.createElement('div');
      div.className = 'label';
      div.textContent = text;
      div.style.display = window.__3D_STATE__.labelsVisible ? 'block' : 'none';
      document.body.appendChild(div);
      labels.push({ div, getPosition });
    }

    function updateLabels() {
      labels.forEach(({ div, getPosition }) => {
        div.style.display = window.__3D_STATE__.labelsVisible ? 'block' : 'none';
        if (!window.__3D_STATE__.labelsVisible) return;

        const pos = getPosition();
        const projected = pos.clone().project(camera);
        const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
        div.style.left = `${x}px`;
        div.style.top = `${y}px`;
      });
    }

    function updateHUD() {
      const s = window.__3D_STATE__;
      phaseDisplay.textContent = `Phase ${s.currentPhase}: ${s.phaseName}`;
      cellCountDisplay.textContent = `Cell Count: ${s.cellCount}`;
      timerDisplay.textContent = `Time: ${s.elapsedTime.toFixed(1)}s`;
      progressBar.style.width = `${s.progressPercent}%`;

      let selectedText = 'Selected Cell: None';
      if (s.selectedCell !== null) {
        selectedText = `Selected Cell: Daughter ${s.selectedCell + 1}<br>Phase: ${s.phaseName}<br>Chromosomes: 4`;
      }
      infoBox.innerHTML = selectedText;
    }

    function updateStateFromScene() {
      const s = window.__3D_STATE__;
      s.phaseName = PHASES[s.currentPhase];
      s.nucleusOpacity = nucleus && nucleus.material ? safeNumber(nucleus.material.opacity, 0) : 0;
      s.cellScaleY = parentCell ? safeNumber(parentCell.group.scale.y, 1) : 1;
      s.chromosomeCount = chromosomes.length + daughterChromosomes.length;
      s.progressPercent = safeNumber(s.progressPercent, 0);
      s.cleavageFurrowRadius = cleavageFurrow ? safeNumber(cleavageFurrow.geometry.parameters.radius, s.cleavageFurrowRadius) : s.cleavageFurrowRadius;
    }

    function clearSimulationObjects() {
      rootGroup.clear();
      telophaseNuclei = [];
      chromosomes = [];
      daughterCells = [];
      daughterChromosomes = [];
      parentCell = null;
      nucleus = null;
      membrane = null;
      cleavageFurrow = null;
      currentTransition = null;
      clearLabels();
    }

    function createInitialScene() {
      clearSimulationObjects();

      const cell = createCell(new THREE.Vector3(0,0,0), 1.5, 0x44cc88, 0.5);
      parentCell = cell;
      membrane = cell.membraneMesh;
      rootGroup.add(cell.group);

      nucleus = createNucleus(0.5, 0x8844cc, 0.8, new THREE.Vector3(0,0,0));
      parentCell.group.add(nucleus);

      for (let i = 0; i < 4; i++) {
        const c = createChromosome();
        c.position.copy(randomInsideNucleus(0.35));
        c.userData.basePos = c.position.clone();
        c.userData.originalScale = new THREE.Vector3(1,1,1);
        c.userData.target = c.position.clone();
        nucleus.add(c);
        chromosomes.push(c);
      }

      addLabel('Parent Cell', () => parentCell.group.getWorldPosition(new THREE.Vector3()));
      addLabel('Nucleus', () => nucleus.getWorldPosition(new THREE.Vector3()));

      window.__3D_STATE__.currentPhase = 0;
      window.__3D_STATE__.phaseName = PHASES[0];
      window.__3D_STATE__.chromosomeCount = 4;
      window.__3D_STATE__.cellCount = 1;
      window.__3D_STATE__.nucleusOpacity = 1.0;
      window.__3D_STATE__.cellScaleY = 1.0;
      window.__3D_STATE__.phaseComplete = true;
      window.__3D_STATE__.selectedCell = null;
      window.__3D_STATE__.cleavageFurrowRadius = 1.5;
      window.__3D_STATE__.daughterCellPositions = [];
      window.__3D_STATE__.progressPercent = 0;
    }

    function startTransition(targetPhase, duration, onUpdate, onComplete) {
      currentTransition = {
        fromPhase: window.__3D_STATE__.currentPhase,
        targetPhase,
        duration,
        elapsed: 0,
        onUpdate,
        onComplete
      };
      window.__3D_STATE__.phaseComplete = false;
      window.__3D_STATE__.progressPercent = 0;
    }

    function goToPhase1() {
      if (window.__3D_STATE__.currentPhase !== 0 || !window.__3D_STATE__.phaseComplete) return;

      const initialChromosomeData = chromosomes.map(c => ({
        scale: c.scale.clone(),
        pos: c.position.clone()
      }));
      const targetPositions = initialChromosomeData.map(d => clampInsideSphere(d.pos.clone().multiplyScalar(1.6), 0.75));

      startTransition(1, 1.5, (t) => {
        const ease = 1 - Math.pow(1 - t, 3);

        chromosomes.forEach((c, i) => {
          c.scale.setScalar(1 + ease);
          c.position.lerpVectors(initialChromosomeData[i].pos, targetPositions[i], ease);
          clampInsideSphere(c.position, 0.95);
        });

        nucleus.material.opacity = THREE.MathUtils.lerp(0.8, 0.1, Math.min(t / 1.0, 1));
      }, () => {
        window.__3D_STATE__.currentPhase = 1;
        window.__3D_STATE__.phaseComplete = true;
        window.__3D_STATE__.progressPercent = 100;
      });
    }

    function goToPhase2() {
      if (window.__3D_STATE__.currentPhase !== 1 || !window.__3D_STATE__.phaseComplete) return;

      const startPositions = chromosomes.map(c => c.position.clone());
      const targets = chromosomes.map((c, i) => {
        const x = -0.6 + i * 0.4;
        const z = (i % 2 === 0 ? -0.15 : 0.15);
        return new THREE.Vector3(x, 0, z);
      });

      startTransition(2, 1.0, (t) => {
        const ease = t * t * (3 - 2 * t);
        chromosomes.forEach((c, i) => {
          c.position.lerpVectors(startPositions[i], targets[i], ease);
          clampInsideSphere(c.position, 1.1);
        });
      }, () => {
        window.__3D_STATE__.currentPhase = 2;
        window.__3D_STATE__.phaseComplete = true;
        window.__3D_STATE__.progressPercent = 100;
      });
    }

    function goToPhase3() {
      if (window.__3D_STATE__.currentPhase !== 2 || !window.__3D_STATE__.phaseComplete) return;

      const oldChromosomes = [...chromosomes];
      const splitSet = [];

      oldChromosomes.forEach(c => {
        const clone = c.clone();
        clone.material = c.material.clone();
        if (c.parent) c.parent.add(clone);
        splitSet.push(clone);
      });

      chromosomes = [];
      oldChromosomes.forEach(c => chromosomes.push(c));
      splitSet.forEach(c => chromosomes.push(c));

      const starts = chromosomes.map(c => c.position.clone());
      const targets = chromosomes.map((c, i) => {
        const originalIndex = i % 4;
        const x = -0.6 + originalIndex * 0.4;
        const z = (originalIndex % 2 === 0 ? -0.15 : 0.15);
        const y = i < 4 ? 1.0 : -1.0;
        return new THREE.Vector3(x, y, z);
      });

      const startScaleY = parentCell.group.scale.y;
      const endScaleY = 1.5;

      startTransition(3, 1.5, (t) => {
        const ease = 1 - Math.pow(1 - t, 2);

        chromosomes.forEach((c, i) => {
          c.position.lerpVectors(starts[i], targets[i], ease);
          clampInsideSphere(c.position, 1.25);
        });

        parentCell.group.scale.y = THREE.MathUtils.lerp(startScaleY, endScaleY, ease);
      }, () => {
        window.__3D_STATE__.currentPhase = 3;
        window.__3D_STATE__.phaseComplete = true;
        window.__3D_STATE__.progressPercent = 100;
      });
    }

    function rebuildCleavageFurrow(radius) {
      if (cleavageFurrow) {
        parentCell.group.remove(cleavageFurrow);
      }
      const geo = new THREE.TorusGeometry(radius, 0.04, 16, 100);
      const mat = new THREE.MeshBasicMaterial({ color: 0xffffaa });
      cleavageFurrow = new THREE.Mesh(geo, mat);
      cleavageFurrow.rotation.x = Math.PI / 2;
      cleavageFurrow.position.y = 0;
      parentCell.group.add(cleavageFurrow);
    }

    function goToPhase4() {
      if (window.__3D_STATE__.currentPhase !== 3 || !window.__3D_STATE__.phaseComplete) return;

      telophaseNuclei = [
        createNucleus(0.4, 0x8844cc, 0.0, new THREE.Vector3(0, 1.0, 0)),
        createNucleus(0.4, 0x8844cc, 0.0, new THREE.Vector3(0, -1.0, 0))
      ];
      telophaseNuclei.forEach(n => parentCell.group.add(n));

      rebuildCleavageFurrow(1.5);
      const furrowStart = 1.5;
      const furrowEnd = 0.6;

      startTransition(4, 1.5, (t) => {
        const ease = t * t * (3 - 2 * t);

        telophaseNuclei.forEach(n => {
          n.material.opacity = THREE.MathUtils.lerp(0, 0.85, ease);
        });

        const r = THREE.MathUtils.lerp(furrowStart, furrowEnd, ease);
        rebuildCleavageFurrow(r);
        window.__3D_STATE__.cleavageFurrowRadius = r;
      }, () => {
        window.__3D_STATE__.currentPhase = 4;
        window.__3D_STATE__.phaseComplete = true;
        window.__3D_STATE__.progressPercent = 100;
      });
    }

    function createDaughterCell(index, yPos) {
      const daughter = createCell(new THREE.Vector3(0, yPos, 0), 1.0, 0x44cc88, 0.55);
      daughter.group.userData.isDaughterCell = true;
      daughter.group.userData.index = index;

      const n = createNucleus(0.32, 0x8844cc, 0.85, new THREE.Vector3(0, 0, 0));
      daughter.group.add(n);

      const localChroms = [];
      for (let i = 0; i < 4; i++) {
        const c = createChromosome();
        c.scale.setScalar(1.5);
        c.position.copy(randomInsideNucleus(0.22));
        n.add(c);
        localChroms.push(c);
      }

      rootGroup.add(daughter.group);
      return { ...daughter, nucleus: n, chromosomes: localChroms };
    }

    function goToPhase5() {
      if (window.__3D_STATE__.currentPhase !== 4 || !window.__3D_STATE__.phaseComplete) return;

      startTransition(5, 1.2, (t) => {
        const ease = 1 - Math.pow(1 - t, 3);

        if (parentCell) {
          parentCell.group.visible = true;
          parentCell.group.scale.x = THREE.MathUtils.lerp(1, 0.01, ease);
          parentCell.group.scale.z = THREE.MathUtils.lerp(1, 0.01, ease);
          parentCell.group.scale.y = THREE.MathUtils.lerp(parentCell.group.scale.y, 0.01, ease);
        }
      }, () => {
        if (parentCell) rootGroup.remove(parentCell.group);

        daughterCells = [
          createDaughterCell(0, 2.0),
          createDaughterCell(1, -2.0)
        ];

        daughterChromosomes = [
          ...daughterCells[0].chromosomes,
          ...daughterCells[1].chromosomes
        ];

        addLabel('Daughter Cell 1', () => daughterCells[0].group.getWorldPosition(new THREE.Vector3()));
        addLabel('Daughter Cell 2', () => daughterCells[1].group.getWorldPosition(new THREE.Vector3()));

        window.__3D_STATE__.currentPhase = 5;
        window.__3D_STATE__.cellCount = 2;
        window.__3D_STATE__.daughterCellPositions = [2.0, -2.0];
        window.__3D_STATE__.phaseComplete = true;
        window.__3D_STATE__.progressPercent = 100;
      });
    }

    function resetSimulation() {
      if (autoPlayTimer) {
        clearInterval(autoPlayTimer);
        autoPlayTimer = null;
      }
      window.__3D_STATE__.autoPlayActive = false;
      createInitialScene();
      updateStateFromScene();
      updateHUD();
    }

    function toggleAutoPlay() {
      window.__3D_STATE__.autoPlayActive = !window.__3D_STATE__.autoPlayActive;

      if (!window.__3D_STATE__.autoPlayActive) {
        if (autoPlayTimer) clearInterval(autoPlayTimer);
        autoPlayTimer = null;
        return;
      }

      if (autoPlayTimer) clearInterval(autoPlayTimer);

      autoPlayTimer = setInterval(() => {
        if (!window.__3D_STATE__.phaseComplete) return;

        const p = window.__3D_STATE__.currentPhase;
        if (p === 0) goToPhase1();
        else if (p === 1) goToPhase2();
        else if (p === 2) goToPhase3();
        else if (p === 3) goToPhase4();
        else if (p === 4) goToPhase5();
        else {
          clearInterval(autoPlayTimer);
          autoPlayTimer = null;
          window.__3D_STATE__.autoPlayActive = false;
        }
      }, 3000);
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === '1') goToPhase1();
      if (key === '2') goToPhase2();
      if (key === '3') goToPhase3();
      if (key === '4') goToPhase4();
      if (key === '5') goToPhase5();
      if (key === 'r') resetSimulation();
      if (key === 'l') {
        window.__3D_STATE__.labelsVisible = !window.__3D_STATE__.labelsVisible;
      }
      if (e.code === 'Space') {
        e.preventDefault();
        toggleAutoPlay();
      }
    });

    renderer.domElement.addEventListener('click', (event) => {
      if (window.__3D_STATE__.currentPhase !== 5 || daughterCells.length < 2) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(daughterCells.map(d => d.cellMesh), true);
      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const idx = daughterCells.findIndex(d => d.cellMesh === hit || d.group === hit.parent || d.group.children.includes(hit));
        if (idx !== -1) {
          daughterCells.forEach((d, i) => {
            d.cellMesh.material.color.setHex(i === idx ? 0xffff44 : 0x44cc88);
          });
          window.__3D_STATE__.selectedCell = idx;
        }
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    createInitialScene();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const elapsed = (performance.now() - simulationStart) / 1000;
      window.__3D_STATE__.elapsedTime = elapsed;

      if (currentTransition) {
        currentTransition.elapsed += delta;
        const t = Math.min(currentTransition.elapsed / currentTransition.duration, 1);
        window.__3D_STATE__.progressPercent = t * 100;

        currentTransition.onUpdate(t);

        if (t >= 1) {
          const done = currentTransition;
          currentTransition = null;
          done.onComplete();
        }
      }

      updateStateFromScene();
      updateHUD();
      updateLabels();
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
