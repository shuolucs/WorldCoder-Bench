<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitosis 3D Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a2e; }
canvas { display: block; }

#phase-display {
    position: absolute; top: 20px; left: 20px;
    color: #44cc88; font-size: 24px; font-weight: bold;
    text-shadow: 0 0 10px rgba(68,204,136,0.5);
    background: rgba(0,0,0,0.6); padding: 12px 20px; border-radius: 10px;
    border: 1px solid rgba(68,204,136,0.3);
}

#cell-count {
    position: absolute; top: 20px; right: 20px;
    color: #88aaff; font-size: 20px; font-weight: bold;
    background: rgba(0,0,0,0.6); padding: 12px 20px; border-radius: 10px;
    border: 1px solid rgba(136,170,255,0.3);
}

#instructions {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #aabbcc; font-size: 13px; text-align: center;
    background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 10px;
    border: 1px solid rgba(170,187,204,0.2); max-width: 700px;
    line-height: 1.6;
}
#instructions span { color: #ffcc44; font-weight: bold; }

#timer {
    position: absolute; bottom: 20px; left: 20px;
    color: #cccccc; font-size: 16px;
    background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 8px;
    border: 1px solid rgba(204,204,204,0.2);
}

#progress-bar-container {
    position: absolute; top: 80px; left: 20px; width: 250px; height: 8px;
    background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;
}
#progress-bar {
    height: 100%; width: 0%; background: linear-gradient(90deg, #44cc88, #88ffaa);
    border-radius: 4px; transition: width 0.1s;
}

#auto-play-indicator {
    position: absolute; top: 100px; left: 20px;
    color: #ffcc44; font-size: 14px; display: none;
    background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 6px;
}

.label-3d {
    position: absolute; color: #ffffff; font-size: 12px;
    background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 4px;
    pointer-events: none; white-space: nowrap; display: none;
    border: 1px solid rgba(255,255,255,0.2);
}

#cell-info {
    position: absolute; top: 50%; right: 20px; transform: translateY(-50%);
    color: #ffff88; font-size: 14px; display: none;
    background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 10px;
    border: 1px solid rgba(255,255,68,0.3);
}
</style>
</head>
<body>

<div id="phase-display">Phase 0: Interphase</div>
<div id="cell-count">Cells: 1</div>
<div id="timer">Time: 0.0s</div>
<div id="progress-bar-container"><div id="progress-bar"></div></div>
<div id="auto-play-indicator">▶ AUTO-PLAY</div>
<div id="instructions">
    <span>1-5</span> Advance phases | <span>R</span> Reset | <span>Space</span> Auto-play | <span>L</span> Toggle labels | <span>Click</span> daughter cells
</div>
<div id="cell-info"></div>

<div class="label-3d" id="label-cell">Parent Cell</div>
<div class="label-3d" id="label-nucleus">Nucleus</div>
<div class="label-3d" id="label-chromosomes">Chromosomes</div>
<div class="label-3d" id="label-phase">Current Phase</div>
<div class="label-3d" id="label-daughter1">Daughter Cell 1</div>
<div class="label-3d" id="label-daughter2">Daughter Cell 2</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    modelLoaded: false,
    currentPhase: 0,
    phaseName: 'Interphase',
    chromosomeCount: 4,
    cellCount: 1,
    nucleusOpacity: 0.8,
    cellScaleY: 1.0,
    autoPlayActive: false,
    labelsVisible: false,
    phaseComplete: true,
    elapsedTime: 0,
    selectedCell: null,
    cleavageFurrowRadius: 1.5,
    daughterCellPositions: [],
    progressPercent: 0
};

const state = window.__3D_STATE__;
const phaseNames = ['Interphase', 'Prophase', 'Metaphase', 'Anaphase', 'Telophase', 'Cytokinesis'];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.DirectionalLight(0xffddaa, 0.8);
warmLight.position.set(5, 10, 5);
scene.add(warmLight);

const coolLight = new THREE.DirectionalLight(0xaaddff, 0.6);
coolLight.position.set(-5, 8, -3);
scene.add(coolLight);

// Load GLTF model
const gltfLoader = new GLTFLoader();
gltfLoader.load(
    'https://threejs.org/examples/models/gltf/LittlestTokyo.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.002, 0.002, 0.002);
        model.position.set(8, -2, -5);
        scene.add(model);
        state.modelLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('GLTF load failed (non-critical):', error);
        // Create a placeholder
        const placeholder = new THREE.Mesh(
            new THREE.BoxGeometry(2, 3, 2),
            new THREE.MeshStandardMaterial({ color: 0x334455, wireframe: true })
        );
        placeholder.position.set(8, -2, -5);
        scene.add(placeholder);
        state.modelLoaded = true;
    }
);

// Cell components group
const cellGroup = new THREE.Group();
scene.add(cellGroup);

// Parent cell
const cellGeometry = new THREE.SphereGeometry(1.5, 64, 64);
const cellMaterial = new THREE.MeshPhysicalMaterial({
    color: 0x44cc88, transparent: true, opacity: 0.5,
    roughness: 0.1, transmission: 0.3, side: THREE.DoubleSide
});
const parentCell = new THREE.Mesh(cellGeometry, cellMaterial);
cellGroup.add(parentCell);

// Cell membrane ring
const membraneGeometry = new THREE.TorusGeometry(1.5, 0.03, 16, 100);
const membraneMaterial = new THREE.MeshStandardMaterial({ color: 0x88ffaa, emissive: 0x88ffaa, emissiveIntensity: 0.3 });
const membraneRing = new THREE.Mesh(membraneGeometry, membraneMaterial);
membraneRing.rotation.x = Math.PI / 2;
cellGroup.add(membraneRing);

// Nucleus
const nucleusGeometry = new THREE.SphereGeometry(0.5, 32, 32);
const nucleusMaterial = new THREE.MeshPhysicalMaterial({
    color: 0x8844cc, transparent: true, opacity: 0.8,
    roughness: 0.2, emissive: 0x8844cc, emissiveIntensity: 0.2
});
const nucleus = new THREE.Mesh(nucleusGeometry, nucleusMaterial);
cellGroup.add(nucleus);

// Chromosomes
const chromosomes = [];
const chromosomeGroup = new THREE.Group();
cellGroup.add(chromosomeGroup);

function createChromosome(position) {
    const chrGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.3, 8);
    const chrMat = new THREE.MeshStandardMaterial({
        color: 0xff4444, emissive: 0xff2222, emissiveIntensity: 0.3
    });
    const chr = new THREE.Mesh(chrGeo, chrMat);
    chr.position.copy(position);
    chr.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    chr.userData.originalPosition = position.clone();
    chr.userData.originalScale = new THREE.Vector3(1, 1, 1);
    return chr;
}

const chrPositions = [
    new THREE.Vector3(0.1, 0.1, 0.05),
    new THREE.Vector3(-0.1, 0.05, -0.1),
    new THREE.Vector3(0.05, -0.1, 0.1),
    new THREE.Vector3(-0.05, -0.05, -0.05)
];

for (let i = 0; i < 4; i++) {
    const chr = createChromosome(chrPositions[i]);
    chromosomes.push(chr);
    chromosomeGroup.add(chr);
}

// Cleavage furrow (created but invisible initially)
const cleavageGeometry = new THREE.TorusGeometry(1.5, 0.05, 16, 64);
const cleavageMaterial = new THREE.MeshStandardMaterial({
    color: 0xffaa44, emissive: 0xffaa44, emissiveIntensity: 0.5,
    transparent: true, opacity: 0
});
const cleavageFurrow = new THREE.Mesh(cleavageGeometry, cleavageMaterial);
cleavageFurrow.rotation.x = Math.PI / 2;
cellGroup.add(cleavageFurrow);

// Daughter cell containers
let daughterCells = [];
let daughterNuclei = [];
let newNuclei = []; // For telophase

// Animation system
let animations = [];
const clock = new THREE.Clock();
let startTime = Date.now();

function lerp(a, b, t) {
    return a + (b - a) * t;
}

function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

class Animation {
    constructor(duration, updateFn, completeFn) {
        this.duration = duration;
        this.elapsed = 0;
        this.updateFn = updateFn;
        this.completeFn = completeFn || (() => {});
        this.done = false;
    }
    update(dt) {
        if (this.done) return;
        this.elapsed += dt;
        const rawT = Math.min(this.elapsed / this.duration, 1);
        const t = easeInOutCubic(rawT);
        this.updateFn(t, rawT);
        if (rawT >= 1) {
            this.done = true;
            this.completeFn();
        }
    }
}

function clearAnimations() {
    animations = [];
}

function addAnimation(duration, updateFn, completeFn) {
    const anim = new Animation(duration, updateFn, completeFn);
    animations.push(anim);
    return anim;
}

// Phase transitions
let phaseAnimationsComplete = 0;
let phaseAnimationsTotal = 0;

function setPhaseStart(count) {
    phaseAnimationsComplete = 0;
    phaseAnimationsTotal = count;
    state.phaseComplete = false;
    state.progressPercent = 0;
}

function onPhaseAnimDone() {
    phaseAnimationsComplete++;
    if (phaseAnimationsComplete >= phaseAnimationsTotal) {
        state.phaseComplete = true;
        state.progressPercent = 100;
    }
}

// Phase 1: Prophase
function startProphase() {
    if (state.currentPhase !== 0 || !state.phaseComplete) return;
    state.currentPhase = 1;
    state.phaseName = 'Prophase';
    clearAnimations();
    setPhaseStart(2);

    // Chromosomes condense (scale up 2x) and move slightly outward
    addAnimation(1.0, (t) => {
        chromosomes.forEach((chr, i) => {
            const s = lerp(1, 2, t);
            chr.scale.set(s, s, s);
            const orig = chr.userData.originalPosition;
            chr.position.set(
                lerp(orig.x, orig.x * 2.5, t),
                lerp(orig.y, orig.y * 2.5, t),
                lerp(orig.z, orig.z * 2.5, t)
            );
        });
        state.progressPercent = t * 50;
    }, onPhaseAnimDone);

    // Nucleus dissolves
    addAnimation(1.5, (t) => {
        const op = lerp(0.8, 0.1, t);
        nucleusMaterial.opacity = op;
        state.nucleusOpacity = op;
        state.progressPercent = 50 + t * 50;
    }, onPhaseAnimDone);

    updateHUD();
}

// Phase 2: Metaphase
function startMetaphase() {
    if (state.currentPhase !== 1 || !state.phaseComplete) return;
    state.currentPhase = 2;
    state.phaseName = 'Metaphase';
    clearAnimations();
    setPhaseStart(1);

    const startPositions = chromosomes.map(c => c.position.clone());

    addAnimation(1.0, (t) => {
        chromosomes.forEach((chr, i) => {
            const sp = startPositions[i];
            const targetX = (i - 1.5) * 0.3;
            chr.position.set(
                lerp(sp.x, targetX, t),
                lerp(sp.y, 0, t),
                lerp(sp.z, 0, t)
            );
        });
        state.progressPercent = t * 100;
    }, onPhaseAnimDone);

    updateHUD();
}

// Phase 3: Anaphase
function startAnaphase() {
    if (state.currentPhase !== 2 || !state.phaseComplete) return;
    state.currentPhase = 3;
    state.phaseName = 'Anaphase';
    clearAnimations();
    setPhaseStart(2);

    // Duplicate chromosomes
    const newChromosomes = [];
    chromosomes.forEach((chr) => {
        const clone = chr.clone();
        clone.material = chr.material.clone();
        clone.userData.originalPosition = chr.position.clone();
        chromosomeGroup.add(clone);
        newChromosomes.push(clone);
    });

    const origStartPos = chromosomes.map(c => c.position.clone());
    const cloneStartPos = newChromosomes.map(c => c.position.clone());

    // Move original set up, clones down
    addAnimation(1.5, (t) => {
        chromosomes.forEach((chr, i) => {
            chr.position.y = lerp(origStartPos[i].y, 1.0, t);
        });
        newChromosomes.forEach((chr, i) => {
            chr.position.y = lerp(cloneStartPos[i].y, -1.0, t);
        });
        state.progressPercent = t * 70;
    }, () => {
        chromosomes.push(...newChromosomes);
        state.chromosomeCount = chromosomes.length;
        onPhaseAnimDone();
    });

    // Cell elongates
    addAnimation(1.5, (t) => {
        const sy = lerp(1.0, 1.5, t);
        parentCell.scale.y = sy;
        state.cellScaleY = sy;
        state.progressPercent = 70 + t * 30;
    }, onPhaseAnimDone);

    updateHUD();
}

// Phase 4: Telophase
function startTelophase() {
    if (state.currentPhase !== 3 || !state.phaseComplete) return;
    state.currentPhase = 4;
    state.phaseName = 'Telophase';
    clearAnimations();
    setPhaseStart(2);

    // Create two new nuclei
    const nuc1Geo = new THREE.SphereGeometry(0.4, 32, 32);
    const nuc1Mat = new THREE.MeshPhysicalMaterial({
        color: 0x8844cc, transparent: true, opacity: 0,
        roughness: 0.2, emissive: 0x8844cc, emissiveIntensity: 0.2
    });
    const nuc1 = new THREE.Mesh(nuc1Geo, nuc1Mat);
    nuc1.position.set(0, 1.0, 0);
    cellGroup.add(nuc1);

    const nuc2Geo = new THREE.SphereGeometry(0.4, 32, 32);
    const nuc2Mat = new THREE.MeshPhysicalMaterial({
        color: 0x8844cc, transparent: true, opacity: 0,
        roughness: 0.2, emissive: 0x8844cc, emissiveIntensity: 0.2
    });
    const nuc2 = new THREE.Mesh(nuc2Geo, nuc2Mat);
    nuc2.position.set(0, -1.0, 0);
    cellGroup.add(nuc2);

    newNuclei = [nuc1, nuc2];

    // Fade in nuclei
    addAnimation(1.5, (t) => {
        nuc1Mat.opacity = lerp(0, 0.8, t);
        nuc2Mat.opacity = lerp(0, 0.8, t);
        state.progressPercent = t * 50;
    }, onPhaseAnimDone);

    // Cleavage furrow
    cleavageMaterial.opacity = 1;
    addAnimation(1.5, (t) => {
        const r = lerp(1.5, 0.3, t);
        cleavageFurrow.geometry.dispose();
        cleavageFurrow.geometry = new THREE.TorusGeometry(r, 0.05, 16, 64);
        state.cleavageFurrowRadius = r;
        state.progressPercent = 50 + t * 50;
    }, onPhaseAnimDone);

    updateHUD();
}

// Phase 5: Cytokinesis
function startCytokinesis() {
    if (state.currentPhase !== 4 || !state.phaseComplete) return;
    state.currentPhase = 5;
    state.phaseName = 'Cytokinesis';
    clearAnimations();
    setPhaseStart(1);

    // Volume conservation: original radius 1.5, V = 4/3 * pi * 1.5^3 ≈ 14.14
    // Each daughter: V/2 ≈ 7.07, r = (V*3/(4*pi))^(1/3) ≈ 1.19 ~ use 1.0 for visual clarity
    const daughterRadius = 1.0;

    addAnimation(2.0, (t) => {
        // Fade out original cell
        cellMaterial.opacity = lerp(0.5, 0, t);
        membraneMaterial.opacity = lerp(1, 0, t);
        cleavageMaterial.opacity = lerp(1, 0, t);
        nucleusMaterial.opacity = lerp(0.1, 0, t);

        // Move chromosome groups apart
        chromosomes.forEach((chr, i) => {
            if (i < 4) {
                chr.position.y = lerp(1.0, 2.0, t);
            } else {
                chr.position.y = lerp(-1.0, -2.0, t);
            }
        });

        // Move new nuclei
        if (newNuclei[0]) newNuclei[0].position.y = lerp(1.0, 2.0, t);
        if (newNuclei[1]) newNuclei[1].position.y = lerp(-1.0, -2.0, t);

        state.progressPercent = t * 100;
    }, () => {
        // Hide original cell components
        parentCell.visible = false;
        membraneRing.visible = false;
        cleavageFurrow.visible = false;
        nucleus.visible = false;

        // Create daughter cells
        for (let d = 0; d < 2; d++) {
            const yPos = d === 0 ? 2.0 : -2.0;

            const dCellGeo = new THREE.SphereGeometry(daughterRadius, 64, 64);
            const dCellMat = new THREE.MeshPhysicalMaterial({
                color: 0x44cc88, transparent: true, opacity: 0.5,
                roughness: 0.1, transmission: 0.3, side: THREE.DoubleSide
            });
            const dCell = new THREE.Mesh(dCellGeo, dCellMat);
            dCell.position.set(0, yPos, 0);
            dCell.userData.index = d;
            dCell.userData.isDaughterCell = true;
            cellGroup.add(dCell);
            daughterCells.push(dCell);

            // Membrane ring for daughter
            const dMemGeo = new THREE.TorusGeometry(daughterRadius, 0.02, 16, 64);
            const dMemMat = new THREE.MeshStandardMaterial({
                color: 0x88ffaa, emissive: 0x88ffaa, emissiveIntensity: 0.3
            });
            const dMem = new THREE.Mesh(dMemGeo, dMemMat);
            dMem.rotation.x = Math.PI / 2;
            dMem.position.set(0, yPos, 0);
            cellGroup.add(dMem);
        }

        state.cellCount = 2;
        state.daughterCellPositions = [2.0, -2.0];
        onPhaseAnimDone();
        updateHUD();
    });

    updateHUD();
}

// Reset
function resetSimulation() {
    clearAnimations();

    // Remove daughter cells and extra objects
    const toRemove = [];
    cellGroup.children.forEach(child => {
        if (child !== parentCell && child !== membraneRing && child !== nucleus &&
            child !== chromosomeGroup && child !== cleavageFurrow) {
            toRemove.push(child);
        }
    });
    toRemove.forEach(obj => {
        cellGroup.remove(obj);
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) obj.material.dispose();
    });

    // Clear chromosomes
    while (chromosomeGroup.children.length > 0) {
        const c = chromosomeGroup.children[0];
        chromosomeGroup.remove(c);
        if (c.geometry) c.geometry.dispose();
        if (c.material) c.material.dispose();
    }
    chromosomes.length = 0;

    // Recreate chromosomes
    for (let i = 0; i < 4; i++) {
        const chr = createChromosome(chrPositions[i]);
        chromosomes.push(chr);
        chromosomeGroup.add(chr);
    }

    // Reset parent cell
    parentCell.visible = true;
    parentCell.scale.set(1, 1, 1);
    cellMaterial.opacity = 0.5;

    membraneRing.visible = true;
    membraneMaterial.opacity = 1;

    nucleus.visible = true;
    nucleusMaterial.opacity = 0.8;

    cleavageFurrow.visible = true;
    cleavageMaterial.opacity = 0;
    cleavageFurrow.geometry.dispose();
    cleavageFurrow.geometry = new THREE.TorusGeometry(1.5, 0.05, 16, 64);

    daughterCells = [];
    daughterNuclei = [];
    newNuclei = [];

    // Reset state
    state.currentPhase = 0;
    state.phaseName = 'Interphase';
    state.chromosomeCount = 4;
    state.cellCount = 1;
    state.nucleusOpacity = 0.8;
    state.cellScaleY = 1.0;
    state.phaseComplete = true;
    state.selectedCell = null;
    state.cleavageFurrowRadius = 1.5;
    state.daughterCellPositions = [];
    state.progressPercent = 0;

    startTime = Date.now();
    state.elapsedTime = 0;

    updateHUD();
}

// Auto-play
let autoPlayTimer = 0;
const AUTO_PLAY_INTERVAL = 3.0;

function updateAutoPlay(dt) {
    if (!state.autoPlayActive) return;
    if (!state.phaseComplete) return;

    autoPlayTimer += dt;
    if (autoPlayTimer >= AUTO_PLAY_INTERVAL) {
        autoPlayTimer = 0;
        const next = state.currentPhase + 1;
        if (next <= 5) {
            triggerPhase(next);
        } else {
            state.autoPlayActive = false;
            document.getElementById('auto-play-indicator').style.display = 'none';
        }
    }
}

function triggerPhase(n) {
    switch (n) {
        case 1: startProphase(); break;
        case 2: startMetaphase(); break;
        case 3: startAnaphase(); break;
        case 4: startTelophase(); break;
        case 5: startCytokinesis(); break;
    }
}

// HUD update
function updateHUD() {
    document.getElementById('phase-display').textContent =
        `Phase ${state.currentPhase}: ${state.phaseName}`;
    document.getElementById('cell-count').textContent = `Cells: ${state.cellCount}`;
}

// Labels
function updateLabels() {
    if (!state.labelsVisible) {
        document.querySelectorAll('.label-3d').forEach(el => el.style.display = 'none');
        return;
    }

    function projectToScreen(pos) {
        const v = pos.clone().project(camera);
        return {
            x: (v.x * 0.5 + 0.5) * window.innerWidth,
            y: (-v.y * 0.5 + 0.5) * window.innerHeight
        };
    }

    function positionLabel(id, worldPos, visible) {
        const el = document.getElementById(id);
        if (!visible || !el) { if (el) el.style.display = 'none'; return; }
        const sp = projectToScreen(worldPos);
        el.style.display = 'block';
        el.style.left = sp.x + 'px';
        el.style.top = sp.y + 'px';
    }

    const showOriginal = state.currentPhase < 5;
    positionLabel('label-cell', new THREE.Vector3(0, 2, 0), showOriginal);
    positionLabel('label-nucleus', new THREE.Vector3(0, 0.8, 0), showOriginal && state.currentPhase < 1);
    positionLabel('label-chromosomes', new THREE.Vector3(0.5, 0.5, 0), showOriginal);
    positionLabel('label-phase', new THREE.Vector3(0, -2.5, 0), true);

    const showDaughters = state.currentPhase === 5 && state.phaseComplete;
    positionLabel('label-daughter1', new THREE.Vector3(0, 3.2, 0), showDaughters);
    positionLabel('label-daughter2', new THREE.Vector3(0, -0.8, 0), showDaughters);

    document.getElementById('label-phase').textContent = `${state.phaseName}`;
}

// Raycasting for click
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    if (state.currentPhase !== 5 || !state.phaseComplete) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(daughterCells);

    if (intersects.length > 0) {
        const cell = intersects[0].object;
        const idx = cell.userData.index;

        // Reset previous selection
        daughterCells.forEach(dc => {
            dc.material.color.setHex(0x44cc88);
            dc.material.emissive = new THREE.Color(0x000000);
        });

        // Highlight selected
        cell.material.color.setHex(0xffff44);
        cell.material.emissive = new THREE.Color(0xffff44);
        cell.material.emissiveIntensity = 0.2;

        state.selectedCell = idx;

        const info = document.getElementById('cell-info');
        info.style.display = 'block';
        info.innerHTML = `
            <strong>Daughter Cell ${idx + 1}</strong><br>
            Position: y = ${state.daughterCellPositions[idx].toFixed(1)}<br>
            Chromosomes: 4<br>
            Radius: 1.0<br>
            Status: Complete
        `;
    }
});

// Keyboard
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === '1') triggerPhase(1);
    else if (key === '2') triggerPhase(2);
    else if (key === '3') triggerPhase(3);
    else if (key === '4') triggerPhase(4);
    else if (key === '5') triggerPhase(5);
    else if (key === 'r') resetSimulation();
    else if (key === ' ') {
        e.preventDefault();
        state.autoPlayActive = !state.autoPlayActive;
        autoPlayTimer = 0;
        document.getElementById('auto-play-indicator').style.display =
            state.autoPlayActive ? 'block' : 'none';
    }
    else if (key === 'l') {
        state.labelsVisible = !state.labelsVisible;
    }
});

// Particles for atmosphere
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 20;
    particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 20;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 20;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
    color: 0x88aacc, size: 0.05, transparent: true, opacity: 0.4
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Grid helper (subtle)
const gridHelper = new THREE.GridHelper(20, 20, 0x112244, 0x0a0a2e);
gridHelper.position.y = -3;
scene.add(gridHelper);

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    state.elapsedTime = (Date.now() - startTime) / 1000;

    // Update animations
    animations = animations.filter(a => !a.done);
    animations.forEach(a => a.update(dt));

    // Update progress
    if (!state.phaseComplete && phaseAnimationsTotal > 0) {
        let maxProgress = 0;
        animations.forEach(a => {
            const p = Math.min(a.elapsed / a.duration, 1) * 100;
            if (p > maxProgress) maxProgress = p;
        });
        if (animations.length === 0 && !state.phaseComplete) {
            state.progressPercent = 100;
            state.phaseComplete = true;
        }
    }

    // Auto-play
    updateAutoPlay(dt);

    // Gentle rotation for chromosomes
    chromosomes.forEach((chr, i) => {
        chr.rotation.z += dt * 0.3 * (i % 2 === 0 ? 1 : -1);
    });

    // Particle drift
    const positions = particleGeo.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += Math.sin(state.elapsedTime + i) * 0.001;
    }
    particleGeo.attributes.position.needsUpdate = true;

    // Cell membrane pulse
    if (parentCell.visible) {
        const pulse = 1 + Math.sin(state.elapsedTime * 2) * 0.01;
        membraneRing.scale.set(pulse, pulse, pulse);
    }

    // Update HUD
    document.getElementById('timer').textContent = `Time: ${state.elapsedTime.toFixed(1)}s`;
    document.getElementById('progress-bar').style.width = `${state.progressPercent}%`;

    // Labels
    updateLabels();

    controls.update();
    renderer.render(scene, camera);
}

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

updateHUD();
animate();
</script>
</body>
