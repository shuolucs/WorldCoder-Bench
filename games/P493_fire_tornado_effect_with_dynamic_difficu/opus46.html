<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fire Tornado</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a0a; }
canvas { display: block; }
#hud {
    position: fixed;
    top: 15px;
    left: 15px;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 20px;
    border-radius: 8px;
    border: 1px solid rgba(255, 68, 0, 0.3);
    line-height: 1.8;
    pointer-events: none;
    z-index: 100;
    min-width: 280px;
}
#hud .label { color: #ff8844; }
#hud .value { color: #ffffff; font-weight: bold; }
#hud .controls {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.2);
    font-size: 11px;
    color: #888888;
    line-height: 1.6;
}
#burst-indicator {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff4400;
    font-family: 'Courier New', monospace;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 0 0 20px #ff4400, 0 0 40px #ff2200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 101;
}
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">Difficulty: </span><span class="value" id="difficulty-display">1</span></div>
    <div><span class="label">Particles: </span><span class="value" id="particle-count">0</span></div>
    <div><span class="label">Height:    </span><span class="value" id="tornado-height">0.0</span></div>
    <div><span class="label">Status:    </span><span class="value" id="pause-indicator">RUNNING</span></div>
    <div><span class="label">Color:     </span><span class="value" id="color-mode">fire</span></div>
    <div class="controls">
        [1-5] Set Difficulty | [U/D] Inc/Dec Difficulty<br>
        [P] Pause/Resume | [R] Reset | [C] Toggle Color<br>
        [Click] Burst Effect | [Drag] Orbit Camera
    </div>
</div>

<div id="burst-indicator">BURST!</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);
scene.fog = new THREE.FogExp2(0x0a0a0a, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 5, 0);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x331100, 0.3);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xff4400, 2, 50);
pointLight.position.set(0, 10, 0);
scene.add(pointLight);

const groundLight = new THREE.PointLight(0xff2200, 1, 20);
groundLight.position.set(0, 1, 0);
scene.add(groundLight);

// --- Ground plane ---
const groundGeo = new THREE.CircleGeometry(15, 64);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x111111,
    roughness: 0.9,
    metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
scene.add(ground);

// --- State ---
let state = {
    difficulty: 1,
    targetDifficulty: 1,
    currentDifficultySmooth: 1,
    particleCount: 0,
    tornadoHeight: 10,
    targetTornadoHeight: 10,
    rotationSpeed: 1,
    targetRotationSpeed: 1,
    isPaused: false,
    colorMode: 'fire',
    burstActive: false,
    burstTimer: 0,
    modelLoaded: false,
    modelRotationY: 0,
    elapsedTime: 0,
    lightIntensity: 2,
    particleLifetime: 2.7,
    targetParticleLifetime: 2.7,
    targetRadius: 3,
    currentRadius: 3,
    targetActiveCount: 400,
    currentActiveCount: 400,
    targetBuoyancy: 3.5,
    currentBuoyancy: 3.5,
    transitionSpeed: 2.0 // for 0.5s transition
};

window.__3D_STATE__ = {};

function updateGlobalState() {
    window.__3D_STATE__ = {
        difficulty: state.difficulty,
        particleCount: state.particleCount,
        tornadoHeight: state.tornadoHeight,
        rotationSpeed: state.rotationSpeed,
        isPaused: state.isPaused,
        colorMode: state.colorMode,
        burstActive: state.burstActive,
        modelLoaded: state.modelLoaded,
        modelRotationY: state.modelRotationY,
        elapsedTime: state.elapsedTime,
        lightIntensity: state.lightIntensity,
        particleLifetime: state.particleLifetime
    };
}

function setDifficulty(level) {
    level = Math.max(1, Math.min(5, Math.round(level)));
    state.difficulty = level;
    state.targetDifficulty = level;
    state.targetRotationSpeed = level * 1.0;
    state.targetTornadoHeight = 10 + (level - 1) * 5; // 10, 15, 20, 25, 30
    state.targetRadius = 3 + (level - 1) * 0.75; // 3, 3.75, 4.5, 5.25, 6
    state.targetActiveCount = 400 + (level - 1) * 400; // 400, 800, 1200, 1600, 2000
    state.targetBuoyancy = 2.0 + level * 1.5;
    state.targetParticleLifetime = 3.0 - level * 0.3;
}

// --- Particle System ---
const PARTICLE_COUNT = 2000;

const particleGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);
const alphas = new Float32Array(PARTICLE_COUNT);

// Custom attributes for simulation
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const lifetimes = new Float32Array(PARTICLE_COUNT);
const maxLifetimes = new Float32Array(PARTICLE_COUNT);
const angles = new Float32Array(PARTICLE_COUNT);
const radii = new Float32Array(PARTICLE_COUNT);
const particleActive = new Uint8Array(PARTICLE_COUNT);

function initParticle(i) {
    const angle = Math.random() * Math.PI * 2;
    const radius = 2 + Math.random() * 2;
    positions[i * 3] = Math.cos(angle) * radius;
    positions[i * 3 + 1] = Math.random() * 0.5;
    positions[i * 3 + 2] = Math.sin(angle) * radius;

    velocities[i * 3] = 0;
    velocities[i * 3 + 1] = 0;
    velocities[i * 3 + 2] = 0;

    lifetimes[i] = 0;
    maxLifetimes[i] = state.particleLifetime * (0.7 + Math.random() * 0.6);
    angles[i] = angle;
    radii[i] = radius;
    sizes[i] = 1.5 + Math.random() * 2.0;
    alphas[i] = 1.0;
    particleActive[i] = 0;
}

for (let i = 0; i < PARTICLE_COUNT; i++) {
    initParticle(i);
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
particleGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
particleGeometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

const particleVertexShader = `
    attribute float size;
    attribute float alpha;
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
        vColor = color;
        vAlpha = alpha;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (200.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
    }
`;

const particleFragmentShader = `
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
        float dist = length(gl_PointCoord - vec2(0.5));
        if (dist > 0.5) discard;
        float strength = 1.0 - (dist * 2.0);
        strength = pow(strength, 1.5);
        gl_FragColor = vec4(vColor * strength * 1.5, vAlpha * strength);
    }
`;

const particleMaterial = new THREE.ShaderMaterial({
    vertexShader: particleVertexShader,
    fragmentShader: particleFragmentShader,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexColors: true
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// --- Color Palettes ---
const fireColors = {
    bottom: new THREE.Color(0xffff00),
    middle: new THREE.Color(0xff4400),
    top: new THREE.Color(0x880000)
};

const iceColors = {
    bottom: new THREE.Color(0x00ffff),
    middle: new THREE.Color(0x0044ff),
    top: new THREE.Color(0x000088)
};

function getParticleColor(heightRatio, mode) {
    const palette = mode === 'fire' ? fireColors : iceColors;
    const color = new THREE.Color();
    if (heightRatio < 0.5) {
        color.copy(palette.bottom).lerp(palette.middle, heightRatio * 2);
    } else {
        color.copy(palette.middle).lerp(palette.top, (heightRatio - 0.5) * 2);
    }
    return color;
}

// --- Load GLB Model ---
let glbModel = null;
const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/TextureTransformMultiTest/glTF-Binary/TextureTransformMultiTest.glb',
    (gltf) => {
        glbModel = gltf.scene;
        glbModel.position.set(0, 0, 0);
        glbModel.scale.set(2, 2, 2);
        scene.add(glbModel);
        state.modelLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('GLB load failed, creating placeholder:', error);
        // Create a placeholder
        const geo = new THREE.TorusKnotGeometry(1, 0.3, 64, 16);
        const mat = new THREE.MeshStandardMaterial({
            color: 0xff4400,
            emissive: 0x441100,
            roughness: 0.4,
            metalness: 0.6
        });
        glbModel = new THREE.Mesh(geo, mat);
        glbModel.position.set(0, 1, 0);
        glbModel.scale.set(2, 2, 2);
        scene.add(glbModel);
        state.modelLoaded = true;
    }
);

// --- Glow ring at base ---
const ringGeo = new THREE.TorusGeometry(3, 0.15, 16, 64);
const ringMat = new THREE.MeshBasicMaterial({
    color: 0xff4400,
    transparent: true,
    opacity: 0.5
});
const glowRing = new THREE.Mesh(ringGeo, ringMat);
glowRing.rotation.x = -Math.PI / 2;
glowRing.position.y = 0.1;
scene.add(glowRing);

// --- HUD Elements ---
const difficultyDisplay = document.getElementById('difficulty-display');
const particleCountDisplay = document.getElementById('particle-count');
const tornadoHeightDisplay = document.getElementById('tornado-height');
const pauseIndicator = document.getElementById('pause-indicator');
const colorModeDisplay = document.getElementById('color-mode');
const burstIndicator = document.getElementById('burst-indicator');

// --- Input Handling ---
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key >= '1' && key <= '5') {
        setDifficulty(parseInt(key));
    } else if (key === 'u') {
        setDifficulty(state.difficulty + 1);
    } else if (key === 'd') {
        setDifficulty(state.difficulty - 1);
    } else if (key === 'p') {
        state.isPaused = !state.isPaused;
    } else if (key === 'r') {
        resetParticles();
    } else if (key === 'c') {
        state.colorMode = state.colorMode === 'fire' ? 'ice' : 'fire';
        // Update lights for color mode
        if (state.colorMode === 'ice') {
            pointLight.color.set(0x0088ff);
            groundLight.color.set(0x0044ff);
            ambientLight.color.set(0x001133);
            ringMat.color.set(0x0088ff);
        } else {
            pointLight.color.set(0xff4400);
            groundLight.color.set(0xff2200);
            ambientLight.color.set(0x331100);
            ringMat.color.set(0xff4400);
        }
    }
});

renderer.domElement.addEventListener('click', (e) => {
    if (!state.burstActive) {
        state.burstActive = true;
        state.burstTimer = 1.0;
        burstIndicator.style.opacity = '1';
        if (state.colorMode === 'ice') {
            burstIndicator.style.color = '#00aaff';
            burstIndicator.style.textShadow = '0 0 20px #0088ff, 0 0 40px #0044ff';
        } else {
            burstIndicator.style.color = '#ff4400';
            burstIndicator.style.textShadow = '0 0 20px #ff4400, 0 0 40px #ff2200';
        }
    }
});

function resetParticles() {
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        initParticle(i);
    }
}

// --- Smooth lerp helper ---
function lerpValue(current, target, speed, dt) {
    return current + (target - current) * Math.min(1, speed * dt);
}

// --- Animation Loop ---
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.05); // cap delta

    if (!state.isPaused) {
        state.elapsedTime += dt;

        // Smooth transitions
        state.currentDifficultySmooth = lerpValue(state.currentDifficultySmooth, state.targetDifficulty, state.transitionSpeed, dt);
        state.rotationSpeed = lerpValue(state.rotationSpeed, state.targetRotationSpeed, state.transitionSpeed, dt);
        state.tornadoHeight = lerpValue(state.tornadoHeight, state.targetTornadoHeight, state.transitionSpeed, dt);
        state.currentRadius = lerpValue(state.currentRadius, state.targetRadius, state.transitionSpeed, dt);
        state.currentActiveCount = lerpValue(state.currentActiveCount, state.targetActiveCount, state.transitionSpeed, dt);
        state.currentBuoyancy = lerpValue(state.currentBuoyancy, state.targetBuoyancy, state.transitionSpeed, dt);
        state.particleLifetime = lerpValue(state.particleLifetime, state.targetParticleLifetime, state.transitionSpeed, dt);

        // Burst timer
        if (state.burstActive) {
            state.burstTimer -= dt;
            if (state.burstTimer <= 0) {
                state.burstActive = false;
                burstIndicator.style.opacity = '0';
            }
        }

        // Light intensity based on difficulty
        const targetLightIntensity = 2 + (state.currentDifficultySmooth - 1) * 1.0;
        state.lightIntensity = lerpValue(state.lightIntensity, targetLightIntensity, state.transitionSpeed, dt);
        pointLight.intensity = state.lightIntensity;
        groundLight.intensity = state.lightIntensity * 0.5;

        // Model rotation and glow
        if (glbModel) {
            glbModel.rotation.y += 0.5 * dt;
            state.modelRotationY = glbModel.rotation.y;

            // Increase emissive on model materials
            glbModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    const mats = Array.isArray(child.material) ? child.material : [child.material];
                    mats.forEach(mat => {
                        if (mat.emissive) {
                            const emissiveIntensity = 0.1 + (state.currentDifficultySmooth - 1) * 0.2;
                            if (state.colorMode === 'fire') {
                                mat.emissive.set(0xff4400);
                            } else {
                                mat.emissive.set(0x0044ff);
                            }
                            mat.emissiveIntensity = emissiveIntensity;
                        }
                    });
                }
            });
        }

        // Glow ring animation
        const ringScale = state.currentRadius / 3;
        glowRing.scale.set(ringScale, ringScale, 1);
        ringMat.opacity = 0.3 + 0.15 * Math.sin(state.elapsedTime * 3);

        // Update particles
        const activeCount = Math.floor(state.currentActiveCount);
        const burstMultiplier = state.burstActive ? 2.0 : 1.0;
        const turbulenceAmount = 0.3 * state.currentDifficultySmooth;
        let aliveCount = 0;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            if (i >= activeCount) {
                // Deactivate excess particles
                alphas[i] = 0;
                particleActive[i] = 0;
                continue;
            }

            // Activate if needed
            if (!particleActive[i]) {
                initParticle(i);
                particleActive[i] = 1;
                maxLifetimes[i] = state.particleLifetime * (0.7 + Math.random() * 0.6);
            }

            lifetimes[i] += dt;

            if (lifetimes[i] >= maxLifetimes[i] || positions[i * 3 + 1] >= state.tornadoHeight) {
                // Respawn
                const angle = Math.random() * Math.PI * 2;
                const spawnRadius = 2 + Math.random() * 2;
                positions[i * 3] = Math.cos(angle) * spawnRadius;
                positions[i * 3 + 1] = Math.random() * 0.5;
                positions[i * 3 + 2] = Math.sin(angle) * spawnRadius;
                velocities[i * 3] = 0;
                velocities[i * 3 + 1] = 0;
                velocities[i * 3 + 2] = 0;
                lifetimes[i] = 0;
                maxLifetimes[i] = state.particleLifetime * (0.7 + Math.random() * 0.6);
                angles[i] = angle;
                radii[i] = spawnRadius;
            }

            const px = positions[i * 3];
            const py = positions[i * 3 + 1];
            const pz = positions[i * 3 + 2];

            const heightRatio = Math.min(py / state.tornadoHeight, 1.0);
            const lifeRatio = lifetimes[i] / maxLifetimes[i];

            // Tornado radius varies with height
            const targetRadius = (state.currentRadius * 0.3) + (state.currentRadius * 0.7) * heightRatio;

            // Current angle and radius from center
            const currentAngle = Math.atan2(pz, px);
            const currentRadius = Math.sqrt(px * px + pz * pz);

            // Angular velocity
            const angularVel = state.rotationSpeed * burstMultiplier;
            const newAngle = currentAngle + angularVel * dt;

            // Lerp radius toward target
            const newRadius = currentRadius + (targetRadius - currentRadius) * 2.0 * dt;

            // Buoyancy
            const buoyancy = state.currentBuoyancy * burstMultiplier;

            // Turbulence
            const turbX = (Math.random() - 0.5) * turbulenceAmount * dt * 60;
            const turbY = (Math.random() - 0.5) * turbulenceAmount * dt * 30;
            const turbZ = (Math.random() - 0.5) * turbulenceAmount * dt * 60;

            // Update position
            positions[i * 3] = Math.cos(newAngle) * newRadius + turbX;
            positions[i * 3 + 1] = py + buoyancy * dt + turbY;
            positions[i * 3 + 2] = Math.sin(newAngle) * newRadius + turbZ;

            // Color based on height
            const color = getParticleColor(heightRatio, state.colorMode);
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;

            // Alpha fades with lifetime
            alphas[i] = Math.max(0, 1.0 - lifeRatio);

            // Size varies
            sizes[i] = (1.5 + Math.random() * 0.5) * (1.0 + heightRatio * 0.5) * (state.burstActive ? 1.5 : 1.0);

            aliveCount++;
        }

        state.particleCount = aliveCount;

        particleGeometry.attributes.position.needsUpdate = true;
        particleGeometry.attributes.color.needsUpdate = true;
        particleGeometry.attributes.size.needsUpdate = true;
        particleGeometry.attributes.alpha.needsUpdate = true;
    }

    // Update HUD
    difficultyDisplay.textContent = state.difficulty;
    particleCountDisplay.textContent = state.particleCount;
    tornadoHeightDisplay.textContent = state.tornadoHeight.toFixed(1);
    pauseIndicator.textContent = state.isPaused ? 'PAUSED' : 'RUNNING';
    pauseIndicator.style.color = state.isPaused ? '#ff4444' : '#44ff44';
    colorModeDisplay.textContent = state.colorMode;
    colorModeDisplay.style.color = state.colorMode === 'fire' ? '#ff6622' : '#22aaff';

    // Update global state
    updateGlobalState();

    controls.update();
    renderer.render(scene, camera);
}

// --- Handle Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Initialize ---
setDifficulty(1);
updateGlobalState();
animate();
</script>
</body>
</html>
