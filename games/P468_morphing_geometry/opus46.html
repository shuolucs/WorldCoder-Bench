<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Morphing Geometry Playground</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #1a1a2e;
  }
  canvas {
    display: block;
  }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #ffffff;
    padding: 15px;
    font-family: monospace;
    font-size: 13px;
    line-height: 1.6;
    border-radius: 8px;
    pointer-events: none;
    z-index: 100;
    min-width: 250px;
  }
  #controls-help {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #aaaaaa;
    padding: 12px 15px;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.5;
    border-radius: 8px;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="hud">
  <div>Current Shape: <span id="hud-shape">Sphere</span></div>
  <div>Display Mode: <span id="hud-display">0</span></div>
  <div>Wireframe: <span id="hud-wireframe">off</span></div>
  <div>Auto-Rotate: <span id="hud-rotate">off</span></div>
  <div>Color: <span id="hud-color">0</span></div>
  <div>Morph Progress: <span id="hud-morph">1.00</span></div>
</div>

<div id="controls-help">
  [1-4] Morph Shape &nbsp; [D] Display Mode &nbsp; [W] Wireframe<br>
  [R] Auto-Rotate &nbsp; [C] Cycle Color &nbsp; [Space] Reset
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 4);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
scene.add(directionalLight);

const pointLight = new THREE.PointLight(0x00ffcc, 0.5);
pointLight.position.set(-3, 2, -3);
scene.add(pointLight);

// Parent group
const parentGroup = new THREE.Group();
scene.add(parentGroup);

// State
const shapeNames = ['Sphere', 'Torus', 'Icosahedron', 'TorusKnot'];
const colors = [0x00ffcc, 0xff006e, 0xffd166, 0x06d6a0];

let currentShape = 0;
let displayMode = 0;
let wireframe = false;
let autoRotate = false;
let colorIndex = 0;
let morphProgress = 1.0;
let isMorphing = false;
let helmetLoaded = false;

let morphStartTime = 0;
const morphDuration = 1.5;
let targetShapeIndex = 0;

// Geometry creation functions
function createSphereGeometry() {
  return new THREE.SphereGeometry(1, 32, 32);
}
function createTorusGeometry() {
  return new THREE.TorusGeometry(0.8, 0.3, 32, 16);
}
function createIcosahedronGeometry() {
  return new THREE.IcosahedronGeometry(1, 1);
}
function createTorusKnotGeometry() {
  return new THREE.TorusKnotGeometry(0.7, 0.25, 64, 8);
}

function createGeometryByIndex(index) {
  switch(index) {
    case 0: return createSphereGeometry();
    case 1: return createTorusGeometry();
    case 2: return createIcosahedronGeometry();
    case 3: return createTorusKnotGeometry();
    default: return createSphereGeometry();
  }
}

// Morph mesh
const morphMaterial = new THREE.MeshStandardMaterial({
  color: colors[0],
  metalness: 0.6,
  roughness: 0.3,
  wireframe: false,
  transparent: true,
  opacity: 1.0
});

const morphMesh = new THREE.Mesh(createSphereGeometry(), morphMaterial);
morphMesh.position.set(0, 0, 0);
morphMesh.visible = false; // displayMode 0: helmet visible, morph hidden
parentGroup.add(morphMesh);

// Helmet
let helmetModel = null;
let helmetMeshes = [];

const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
  function(gltf) {
    helmetModel = gltf.scene;
    helmetModel.position.set(0, 0, 0);
    parentGroup.add(helmetModel);

    helmetModel.traverse((child) => {
      if (child.isMesh) {
        helmetMeshes.push(child);
        child.material = child.material.clone();
      }
    });

    helmetLoaded = true;
    updateDisplayMode();
  },
  undefined,
  function(error) {
    console.error('Error loading helmet:', error);
    // Still mark as loaded so the app works
    helmetLoaded = true;
  }
);

// Display mode management
function updateDisplayMode() {
  if (displayMode === 0) {
    // Helmet visible, morph hidden
    if (helmetModel) {
      helmetModel.visible = true;
      helmetMeshes.forEach(m => {
        m.material.transparent = false;
        m.material.opacity = 1.0;
      });
    }
    morphMesh.visible = false;
  } else if (displayMode === 1) {
    // Helmet hidden, morph visible
    if (helmetModel) helmetModel.visible = false;
    morphMesh.visible = true;
    morphMaterial.opacity = 1.0;
  } else if (displayMode === 2) {
    // Both visible, helmet semi-transparent
    if (helmetModel) {
      helmetModel.visible = true;
      helmetMeshes.forEach(m => {
        m.material.transparent = true;
        m.material.opacity = 0.4;
      });
    }
    morphMesh.visible = true;
    morphMaterial.opacity = 1.0;
  }
}

// Morph animation
function startMorph(targetIndex) {
  if (isMorphing) return;
  if (targetIndex === currentShape) return;
  if (displayMode === 0) return;

  targetShapeIndex = targetIndex;
  isMorphing = true;
  morphProgress = 0.0;
  morphStartTime = performance.now() / 1000;

  // Set new geometry immediately and animate scale
  const newGeom = createGeometryByIndex(targetIndex);
  morphMesh.geometry.dispose();
  morphMesh.geometry = newGeom;
  morphMesh.scale.set(0.01, 0.01, 0.01);

  currentShape = targetIndex;
}

function updateMorph() {
  if (!isMorphing) return;

  const elapsed = (performance.now() / 1000) - morphStartTime;
  morphProgress = Math.min(elapsed / morphDuration, 1.0);

  // Ease in-out
  const t = morphProgress < 0.5
    ? 2 * morphProgress * morphProgress
    : 1 - Math.pow(-2 * morphProgress + 2, 2) / 2;

  const scale = 0.01 + (1.0 - 0.01) * t;
  morphMesh.scale.set(scale, scale, scale);

  if (morphProgress >= 1.0) {
    morphProgress = 1.0;
    isMorphing = false;
    morphMesh.scale.set(1, 1, 1);
  }
}

// Reset
function resetAll() {
  displayMode = 0;
  wireframe = false;
  autoRotate = false;
  colorIndex = 0;

  // Reset morph
  isMorphing = false;
  morphProgress = 1.0;
  currentShape = 0;
  targetShapeIndex = 0;

  morphMesh.geometry.dispose();
  morphMesh.geometry = createSphereGeometry();
  morphMesh.scale.set(1, 1, 1);

  morphMaterial.wireframe = false;
  morphMaterial.color.setHex(colors[0]);

  parentGroup.rotation.y = 0;

  updateDisplayMode();
}

// Key handling
window.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === '1') startMorph(0);
  else if (key === '2') startMorph(1);
  else if (key === '3') startMorph(2);
  else if (key === '4') startMorph(3);
  else if (key === 'w') {
    wireframe = !wireframe;
    morphMaterial.wireframe = wireframe;
  }
  else if (key === 'd') {
    displayMode = (displayMode + 1) % 3;
    updateDisplayMode();
  }
  else if (key === 'r') {
    autoRotate = !autoRotate;
  }
  else if (key === 'c') {
    colorIndex = (colorIndex + 1) % colors.length;
    morphMaterial.color.setHex(colors[colorIndex]);
  }
  else if (key === ' ') {
    e.preventDefault();
    resetAll();
  }
});

// HUD elements
const hudShape = document.getElementById('hud-shape');
const hudDisplay = document.getElementById('hud-display');
const hudWireframe = document.getElementById('hud-wireframe');
const hudRotate = document.getElementById('hud-rotate');
const hudColor = document.getElementById('hud-color');
const hudMorph = document.getElementById('hud-morph');

// State object
window.__3D_STATE__ = {
  helmetLoaded: false,
  currentShape: 0,
  currentShapeName: 'Sphere',
  displayMode: 0,
  wireframe: false,
  autoRotate: false,
  colorIndex: 0,
  morphProgress: 1.0,
  isMorphing: false,
  helmetVisible: true,
  morphMeshVisible: false,
  rotationY: 0,
  meshScaleX: 1
};

function updateState() {
  const s = window.__3D_STATE__;
  s.helmetLoaded = helmetLoaded;
  s.currentShape = currentShape;
  s.currentShapeName = shapeNames[currentShape];
  s.displayMode = displayMode;
  s.wireframe = wireframe;
  s.autoRotate = autoRotate;
  s.colorIndex = colorIndex;
  s.morphProgress = parseFloat(morphProgress.toFixed(4));
  s.isMorphing = isMorphing;
  s.helmetVisible = helmetModel ? helmetModel.visible : false;
  s.morphMeshVisible = morphMesh.visible;
  s.rotationY = parentGroup.rotation.y;
  s.meshScaleX = morphMesh.scale.x;
}

function updateHUD() {
  hudShape.textContent = shapeNames[currentShape];
  hudDisplay.textContent = displayMode;
  hudWireframe.textContent = wireframe ? 'on' : 'off';
  hudRotate.textContent = autoRotate ? 'on' : 'off';
  hudColor.textContent = colorIndex;
  hudMorph.textContent = morphProgress.toFixed(2);
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  if (autoRotate) {
    parentGroup.rotation.y += 0.01;
  }

  updateMorph();
  controls.update();
  updateState();
  updateHUD();

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
