<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Morphing Geometry Playground</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            pointer-events: none;
            border-radius: 5px;
            user-select: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            helmetLoaded: false,
            currentShape: 0,
            currentShapeName: 'Sphere',
            displayMode: 0,
            wireframe: false,
            autoRotate: false,
            colorIndex: 0,
            morphProgress: 1.0,
            isMorphing: false,
            helmetVisible: true,
            morphMeshVisible: false,
            rotationY: 0,
            meshScaleX: 1.0
        };

        const shapeNames = ['Sphere', 'Torus', 'Icosahedron', 'TorusKnot'];
        const colors = [0x00ffcc, 0xff006e, 0xffd166, 0x06d6a0];

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 4);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0x00ffcc, 0.5);
        pointLight.position.set(-3, 2, -3);
        scene.add(pointLight);

        // Parent Group for rotation
        const parentGroup = new THREE.Group();
        scene.add(parentGroup);

        // --- Geometries & Morph Mesh ---
        const geometries = [
            new THREE.SphereGeometry(1, 32, 16),
            new THREE.TorusGeometry(0.8, 0.3, 32, 16),
            new THREE.IcosahedronGeometry(1, 1),
            new THREE.TorusKnotGeometry(0.7, 0.25, 64, 8)
        ];

        const morphMaterial = new THREE.MeshStandardMaterial({
            color: colors[0],
            metalness: 0.6,
            roughness: 0.3,
            wireframe: false
        });

        const morphMesh = new THREE.Mesh(geometries[0], morphMaterial);
        morphMesh.position.set(0, 0, 0);
        parentGroup.add(morphMesh);

        // --- GLTF Model ---
        let helmetMesh = null;
        const loader = new GLTFLoader();
        // Using a reliable raw github link for the standard DamagedHelmet model
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
            (gltf) => {
                helmetMesh = gltf.scene;
                helmetMesh.position.set(0, 0, 0);
                parentGroup.add(helmetMesh);
                window.__3D_STATE__.helmetLoaded = true;
                applyDisplayMode();
            },
            undefined,
            (error) => console.error('An error happened loading the helmet:', error)
        );

        // --- Logic Functions ---
        function setHelmetOpacity(opacity, transparent) {
            if (!helmetMesh) return;
            helmetMesh.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.material.transparent = transparent;
                    child.material.opacity = opacity;
                    child.material.needsUpdate = true;
                }
            });
        }

        function applyDisplayMode() {
            const mode = window.__3D_STATE__.displayMode;
            if (mode === 0) {
                if (helmetMesh) helmetMesh.visible = true;
                morphMesh.visible = false;
                setHelmetOpacity(1.0, false);
            } else if (mode === 1) {
                if (helmetMesh) helmetMesh.visible = false;
                morphMesh.visible = true;
            } else if (mode === 2) {
                if (helmetMesh) helmetMesh.visible = true;
                morphMesh.visible = true;
                setHelmetOpacity(0.4, true);
            }
            window.__3D_STATE__.helmetVisible = helmetMesh ? helmetMesh.visible : false;
            window.__3D_STATE__.morphMeshVisible = morphMesh.visible;
        }

        function startMorph(targetIndex) {
            if (window.__3D_STATE__.isMorphing || window.__3D_STATE__.displayMode === 0 || targetIndex === window.__3D_STATE__.currentShape) return;
            
            window.__3D_STATE__.isMorphing = true;
            window.__3D_STATE__.morphProgress = 0.0;
            window.__3D_STATE__.currentShape = targetIndex;
            window.__3D_STATE__.currentShapeName = shapeNames[targetIndex];
            
            morphMesh.geometry = geometries[targetIndex];
            morphMesh.scale.set(0.01, 0.01, 0.01);
        }

        function resetState() {
            window.__3D_STATE__.displayMode = 0;
            window.__3D_STATE__.currentShape = 0;
            window.__3D_STATE__.currentShapeName = shapeNames[0];
            window.__3D_STATE__.wireframe = false;
            window.__3D_STATE__.autoRotate = false;
            window.__3D_STATE__.colorIndex = 0;
            window.__3D_STATE__.morphProgress = 1.0;
            window.__3D_STATE__.isMorphing = false;

            morphMesh.geometry = geometries[0];
            morphMaterial.wireframe = false;
            morphMaterial.color.setHex(colors[0]);
            morphMesh.scale.set(1, 1, 1);
            parentGroup.rotation.y = 0;

            applyDisplayMode();
        }

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            
            if (['1', '2', '3', '4'].includes(key)) {
                startMorph(parseInt(key) - 1);
            } else if (key === 'w') {
                window.__3D_STATE__.wireframe = !window.__3D_STATE__.wireframe;
                morphMaterial.wireframe = window.__3D_STATE__.wireframe;
            } else if (key === 'd') {
                window.__3D_STATE__.displayMode = (window.__3D_STATE__.displayMode + 1) % 3;
                applyDisplayMode();
            } else if (key === 'r') {
                window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            } else if (key === 'c') {
                window.__3D_STATE__.colorIndex = (window.__3D_STATE__.colorIndex + 1) % colors.length;
                morphMaterial.color.setHex(colors[window.__3D_STATE__.colorIndex]);
            } else if (event.code === 'Space') {
                resetState();
            }
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const hudElement = document.getElementById('hud');

        function updateHUD() {
            const s = window.__3D_STATE__;
            hudElement.innerHTML = `
Current Shape: ${s.currentShapeName}
Display Mode: ${s.displayMode}
Wireframe: ${s.wireframe ? 'on' : 'off'}
Auto-Rotate: ${s.autoRotate ? 'on' : 'off'}
Color: ${s.colorIndex}
Morph Progress: ${s.morphProgress.toFixed(2)}
            `.trim().replace(/\n/g, '<br>');
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            // Handle Morph Animation
            if (window.__3D_STATE__.isMorphing) {
                window.__3D_STATE__.morphProgress += delta / 1.5; // 1.5 seconds duration
                
                if (window.__3D_STATE__.morphProgress >= 1.0) {
                    window.__3D_STATE__.morphProgress = 1.0;
                    window.__3D_STATE__.isMorphing = false;
                }
                
                const scale = 0.01 + (1.0 - 0.01) * window.__3D_STATE__.morphProgress;
                morphMesh.scale.set(scale, scale, scale);
            }

            // Handle Auto Rotation
            if (window.__3D_STATE__.autoRotate) {
                parentGroup.rotation.y += 0.01;
            }

            // Update State
            window.__3D_STATE__.rotationY = parentGroup.rotation.y;
            window.__3D_STATE__.meshScaleX = morphMesh.scale.x;

            controls.update();
            updateHUD();
            renderer.render(scene, camera);
        }

        // Initialize
        applyDisplayMode();
        animate();

    </script>
</body>
</html>
