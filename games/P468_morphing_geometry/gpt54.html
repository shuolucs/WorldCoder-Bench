<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Morphing Geometry Playground</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      padding: 15px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-line;
      user-select: none;
      pointer-events: none;
      min-width: 240px;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.35);
      color: #ddd;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <div id="help">
    1-4: Morph Shape |
    W: Wireframe |
    D: Display Mode |
    R: Auto-Rotate |
    C: Color Cycle |
    Space: Reset
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.5, 4);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0x00ffcc, 0.5);
    pointLight.position.set(-3, 2, -3);
    scene.add(pointLight);

    const rootGroup = new THREE.Group();
    scene.add(rootGroup);

    const shapeNames = ['Sphere', 'Torus', 'Icosahedron', 'TorusKnot'];
    const colors = [0x00ffcc, 0xff006e, 0xffd166, 0x06d6a0];

    const geometries = [
      new THREE.SphereGeometry(1, 32, 32),
      new THREE.TorusGeometry(0.8, 0.3, 16, 32),
      new THREE.IcosahedronGeometry(1, 1),
      new THREE.TorusKnotGeometry(0.7, 0.25, 64, 8)
    ];

    const morphMaterial = new THREE.MeshStandardMaterial({
      color: colors[0],
      metalness: 0.6,
      roughness: 0.3,
      wireframe: false
    });

    const morphMesh = new THREE.Mesh(geometries[0], morphMaterial);
    morphMesh.position.set(0, 0, 0);
    morphMesh.visible = false;
    rootGroup.add(morphMesh);

    let helmetGroup = null;
    let helmetMesh = null;
    let helmetLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      'https://threejs.org/examples/models/gltf/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
      (gltf) => {
        helmetGroup = gltf.scene;
        helmetGroup.position.set(0, 0, 0);
        helmetGroup.scale.setScalar(1.5);
        rootGroup.add(helmetGroup);

        helmetGroup.traverse((child) => {
          if (child.isMesh && !helmetMesh) {
            helmetMesh = child;
          }
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (Array.isArray(child.material)) {
              child.material = child.material.map((mat) => mat.clone());
            } else if (child.material) {
              child.material = child.material.clone();
            }
          }
        });

        helmetLoaded = true;
        applyDisplayMode();
      },
      undefined,
      (err) => {
        console.error('Failed to load helmet:', err);
      }
    );

    let currentShape = 0;
    let displayMode = 0;
    let isMorphing = false;
    let morphProgress = 1.0;
    let autoRotate = false;
    let colorIndex = 0;

    let morphStartTime = 0;
    const morphDuration = 1500;
    let targetShape = 0;

    const hud = document.getElementById('hud');

    function setHelmetOpacity(opacity) {
      if (!helmetGroup) return;
      helmetGroup.traverse((child) => {
        if (!child.isMesh || !child.material) return;

        const materials = Array.isArray(child.material) ? child.material : [child.material];
        materials.forEach((mat) => {
          mat.transparent = opacity < 1.0;
          mat.opacity = opacity;
          mat.needsUpdate = true;
        });
      });
    }

    function applyDisplayMode() {
      const helmetVisible = displayMode === 0 || displayMode === 2;
      const morphVisible = displayMode === 1 || displayMode === 2;

      if (helmetGroup) helmetGroup.visible = helmetVisible;
      morphMesh.visible = morphVisible;

      if (displayMode === 2) {
        setHelmetOpacity(0.4);
      } else {
        setHelmetOpacity(1.0);
      }
    }

    function startMorph(shapeIndex) {
      if (isMorphing) return;
      if (displayMode === 0) return;
      if (shapeIndex === currentShape) return;

      isMorphing = true;
      morphProgress = 0.0;
      morphStartTime = performance.now();
      targetShape = shapeIndex;

      morphMesh.geometry = geometries[targetShape];
      morphMesh.scale.setScalar(0.01);
    }

    function cycleDisplayMode() {
      displayMode = (displayMode + 1) % 3;
      applyDisplayMode();
    }

    function cycleColor() {
      colorIndex = (colorIndex + 1) % colors.length;
      morphMaterial.color.setHex(colors[colorIndex]);
    }

    function resetState() {
      currentShape = 0;
      displayMode = 0;
      isMorphing = false;
      morphProgress = 1.0;
      autoRotate = false;
      colorIndex = 0;
      rootGroup.rotation.y = 0;

      morphMesh.geometry = geometries[0];
      morphMesh.scale.set(1, 1, 1);
      morphMaterial.wireframe = false;
      morphMaterial.color.setHex(colors[0]);

      applyDisplayMode();
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === '1') startMorph(0);
      if (key === '2') startMorph(1);
      if (key === '3') startMorph(2);
      if (key === '4') startMorph(3);

      if (key === 'w') {
        morphMaterial.wireframe = !morphMaterial.wireframe;
      }

      if (key === 'd') {
        cycleDisplayMode();
      }

      if (key === 'r') {
        autoRotate = !autoRotate;
      }

      if (key === 'c') {
        cycleColor();
      }

      if (e.code === 'Space') {
        e.preventDefault();
        resetState();
      }
    });

    window.__3D_STATE__ = {
      helmetLoaded: false,
      currentShape: 0,
      currentShapeName: 'Sphere',
      displayMode: 0,
      wireframe: false,
      autoRotate: false,
      colorIndex: 0,
      morphProgress: 1.0,
      isMorphing: false,
      helmetVisible: true,
      morphMeshVisible: false,
      rotationY: 0,
      meshScaleX: 1
    };

    function updateHUD() {
      hud.textContent =
`Current Shape: ${shapeNames[currentShape]}
Display Mode: ${displayMode}
Wireframe: ${morphMaterial.wireframe ? 'on' : 'off'}
Auto-Rotate: ${autoRotate ? 'on' : 'off'}
Color: ${colorIndex}
Morph Progress: ${morphProgress.toFixed(2)}`;
    }

    function updateState() {
      window.__3D_STATE__.helmetLoaded = helmetLoaded;
      window.__3D_STATE__.currentShape = currentShape;
      window.__3D_STATE__.currentShapeName = shapeNames[currentShape];
      window.__3D_STATE__.displayMode = displayMode;
      window.__3D_STATE__.wireframe = morphMaterial.wireframe;
      window.__3D_STATE__.autoRotate = autoRotate;
      window.__3D_STATE__.colorIndex = colorIndex;
      window.__3D_STATE__.morphProgress = morphProgress;
      window.__3D_STATE__.isMorphing = isMorphing;
      window.__3D_STATE__.helmetVisible = helmetGroup ? helmetGroup.visible : false;
      window.__3D_STATE__.morphMeshVisible = morphMesh.visible;
      window.__3D_STATE__.rotationY = rootGroup.rotation.y;
      window.__3D_STATE__.meshScaleX = morphMesh.scale.x;
    }

    function animate(now) {
      requestAnimationFrame(animate);

      if (isMorphing) {
        const elapsed = now - morphStartTime;
        morphProgress = Math.min(elapsed / morphDuration, 1.0);

        const eased = THREE.MathUtils.lerp(0.01, 1.0, morphProgress);
        morphMesh.scale.setScalar(eased);

        if (morphProgress >= 1.0) {
          isMorphing = false;
          currentShape = targetShape;
          morphProgress = 1.0;
          morphMesh.scale.setScalar(1.0);
        }
      }

      if (autoRotate) {
        rootGroup.rotation.y += 0.01;
      }

      controls.update();
      updateState();
      updateHUD();
      renderer.render(scene, camera);
    }

    applyDisplayMode();
    resetState();
    animate(performance.now());

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
