<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Phone Case Designer Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #d8d8d8;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 220px;
      padding: 16px;
      background: rgba(255,255,255,0.92);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      z-index: 10;
      user-select: none;
    }

    #ui h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      gap: 10px;
      margin-bottom: 12px;
    }

    .swatch {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .swatch:hover {
      transform: scale(1.08);
    }

    .swatch.active {
      border-color: #111;
    }

    .label {
      margin: 8px 0 14px;
      font-size: 14px;
      color: #222;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    button, select {
      border: 1px solid #aaa;
      background: white;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    button.active {
      border: 2px solid #2a6cff;
      padding: 7px 9px;
      box-shadow: 0 0 0 2px rgba(42,108,255,0.15);
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #555;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h2>Case Designer</h2>

    <div class="swatches" id="swatches"></div>
    <div class="label" id="colorLabel">Color: Red</div>

    <div class="button-row" id="materialButtons">
      <button data-material="matte" class="active">Matte</button>
      <button data-material="glossy">Glossy</button>
      <button data-material="metallic">Metallic</button>
    </div>

    <div style="margin-bottom: 8px; font-size: 14px;">Pattern</div>
    <select id="patternSelect">
      <option value="none">None</option>
      <option value="stripes">Stripes</option>
      <option value="dots">Dots</option>
      <option value="gradient">Gradient</option>
    </select>

    <div style="margin-top: 14px;">
      <button id="explodeBtn">Explode View</button>
    </div>

    <div class="hint">
      Keys:<br>
      R = toggle auto-rotate<br>
      F = flip front/back
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe7e3dc);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minPolarAngle = 0;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.target.set(0, 1.0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(3, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    const grid = new THREE.GridHelper(12, 24, 0x999999, 0xcccccc);
    grid.position.y = -0.16;
    scene.add(grid);

    const workbenchGeo = new THREE.BoxGeometry(6, 0.3, 4);
    const workbenchMat = new THREE.MeshStandardMaterial({
      color: "#8B6914",
      roughness: 0.85,
      metalness: 0.05
    });
    const workbench = new THREE.Mesh(workbenchGeo, workbenchMat);
    workbench.position.y = 0;
    workbench.receiveShadow = true;
    workbench.castShadow = true;
    scene.add(workbench);

    const phoneGroup = new THREE.Group();
    phoneGroup.position.set(0, 0.16, 0);
    scene.add(phoneGroup);

    const phoneTilt = THREE.MathUtils.degToRad(-10);
    const modelGroup = new THREE.Group();
    modelGroup.position.set(0, 1.5, 0);
    modelGroup.rotation.x = phoneTilt;
    phoneGroup.add(modelGroup);

    const phoneGeo = new THREE.BoxGeometry(1.2, 2.4, 0.1);
    const phoneMat = new THREE.MeshStandardMaterial({
      color: "#1a1a1a",
      roughness: 0.5,
      metalness: 0.2
    });
    const phoneMesh = new THREE.Mesh(phoneGeo, phoneMat);
    phoneMesh.castShadow = true;
    phoneMesh.receiveShadow = true;
    modelGroup.add(phoneMesh);

    const screenGeo = new THREE.PlaneGeometry(1.05, 2.2);
    const screenMat = new THREE.MeshStandardMaterial({
      color: "#2233aa",
      roughness: 0.2,
      metalness: 0.05,
      emissive: "#0b1244",
      emissiveIntensity: 0.3
    });
    const screen = new THREE.Mesh(screenGeo, screenMat);
    screen.position.z = 0.051;
    modelGroup.add(screen);

    const caseGroup = new THREE.Group();
    modelGroup.add(caseGroup);

    const caseGeo = new THREE.BoxGeometry(1.4, 2.6, 0.15);

    let caseColor = "#ff4444";
    let currentMaterialType = "matte";
    let currentPattern = "none";

    function createPatternTexture(hexColor, pattern) {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 1024;
      const ctx = canvas.getContext("2d");

      const base = new THREE.Color(hexColor);
      const darker = base.clone().multiplyScalar(0.7);
      const lighter = base.clone().lerp(new THREE.Color("#ffffff"), 0.6);

      if (pattern === "none") {
        ctx.fillStyle = hexColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else if (pattern === "stripes") {
        const stripeH = 70;
        for (let y = 0; y < canvas.height; y += stripeH) {
          ctx.fillStyle = (Math.floor(y / stripeH) % 2 === 0)
            ? `#${base.getHexString()}`
            : `#${darker.getHexString()}`;
          ctx.fillRect(0, y, canvas.width, stripeH);
        }
      } else if (pattern === "dots") {
        ctx.fillStyle = `#${base.getHexString()}`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.35)";
        for (let y = 40; y < canvas.height; y += 110) {
          for (let x = 40; x < canvas.width; x += 110) {
            ctx.beginPath();
            ctx.arc(x, y, 22, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      } else if (pattern === "gradient") {
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, `#${lighter.getHexString()}`);
        grad.addColorStop(1, `#${base.getHexString()}`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.needsUpdate = true;
      return tex;
    }

    function materialProps(type) {
      if (type === "matte") return { roughness: 0.9, metalness: 0.0 };
      if (type === "glossy") return { roughness: 0.15, metalness: 0.1 };
      return { roughness: 0.3, metalness: 0.85 };
    }

    function buildCaseMaterial() {
      const props = materialProps(currentMaterialType);
      const mat = new THREE.MeshStandardMaterial({
        color: caseColor,
        roughness: props.roughness,
        metalness: props.metalness
      });

      if (currentPattern !== "none") {
        mat.map = createPatternTexture(caseColor, currentPattern);
      } else {
        mat.map = null;
      }

      return mat;
    }

    let caseMaterial = buildCaseMaterial();
    const caseMesh = new THREE.Mesh(caseGeo, caseMaterial);
    caseMesh.castShadow = true;
    caseMesh.receiveShadow = true;
    caseGroup.add(caseMesh);

    const cutoutGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.02, 32);
    const cutoutMat = new THREE.MeshStandardMaterial({
      color: "#111111",
      roughness: 0.7,
      metalness: 0.1
    });
    const cutout = new THREE.Mesh(cutoutGeo, cutoutMat);
    cutout.rotation.x = Math.PI / 2;
    cutout.position.set(-0.38, 0.9, -0.076);
    caseGroup.add(cutout);

    const shadowPlane = new THREE.Mesh(
      new THREE.CircleGeometry(1.1, 32),
      new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.10 })
    );
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.position.set(0, 0.161, 0.2);
    scene.add(shadowPlane);

    const colors = [
      { name: "Red", hex: "#ff4444" },
      { name: "Blue", hex: "#4444ff" },
      { name: "Green", hex: "#44bb44" },
      { name: "Yellow", hex: "#ffcc00" },
      { name: "Pink", hex: "#ff66cc" },
      { name: "Black", hex: "#222222" }
    ];

    const swatchesEl = document.getElementById("swatches");
    const colorLabel = document.getElementById("colorLabel");
    const materialButtons = [...document.querySelectorAll("#materialButtons button")];
    const patternSelect = document.getElementById("patternSelect");
    const explodeBtn = document.getElementById("explodeBtn");

    function updateCaseMaterial() {
      const oldMat = caseMesh.material;
      caseMesh.material = buildCaseMaterial();
      if (oldMat.map) oldMat.map.dispose();
      oldMat.dispose();
    }

    function setActiveSwatch() {
      [...swatchesEl.children].forEach(btn => {
        btn.classList.toggle("active", btn.dataset.hex.toLowerCase() === caseColor.toLowerCase());
      });
      const entry = colors.find(c => c.hex.toLowerCase() === caseColor.toLowerCase());
      colorLabel.textContent = `Color: ${entry ? entry.name : caseColor}`;
    }

    colors.forEach(c => {
      const div = document.createElement("div");
      div.className = "swatch";
      div.style.background = c.hex;
      div.dataset.hex = c.hex;
      div.title = c.name;
      div.addEventListener("click", () => {
        caseColor = c.hex;
        updateCaseMaterial();
        setActiveSwatch();
      });
      swatchesEl.appendChild(div);
    });

    setActiveSwatch();

    materialButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        currentMaterialType = btn.dataset.material;
        materialButtons.forEach(b => b.classList.toggle("active", b === btn));
        updateCaseMaterial();
      });
    });

    patternSelect.addEventListener("change", () => {
      currentPattern = patternSelect.value;
      updateCaseMaterial();
    });

    let autoRotating = false;
    let exploded = false;
    let flipCount = 0;

    let flipAnim = {
      active: false,
      start: 0,
      from: 0,
      to: 0,
      duration: 500
    };

    let explodeAnim = {
      active: false,
      start: 0,
      from: 0,
      to: 0,
      duration: 500
    };

    explodeBtn.addEventListener("click", () => {
      exploded = !exploded;
      explodeAnim.active = true;
      explodeAnim.start = performance.now();
      explodeAnim.from = caseGroup.position.z;
      explodeAnim.to = exploded ? 0.5 : 0.0;
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "r") {
        autoRotating = !autoRotating;
      }
      if (key === "f") {
        flipCount++;
        flipAnim.active = true;
        flipAnim.start = performance.now();
        flipAnim.from = phoneGroup.rotation.y;
        flipAnim.to = phoneGroup.rotation.y + Math.PI;
      }
    });

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    window.__3D_STATE__ = {
      caseColor,
      caseMaterial: currentMaterialType,
      pattern: currentPattern,
      autoRotating,
      exploded,
      phoneGroupRotationY: phoneGroup.rotation.y,
      casePositionZ: caseGroup.position.z,
      flipCount
    };

    function animate(now = 0) {
      requestAnimationFrame(animate);

      controls.update();

      if (autoRotating && !flipAnim.active) {
        phoneGroup.rotation.y += 0.02;
      }

      if (flipAnim.active) {
        const t = Math.min((now - flipAnim.start) / flipAnim.duration, 1);
        phoneGroup.rotation.y = THREE.MathUtils.lerp(
          flipAnim.from,
          flipAnim.to,
          easeInOutCubic(t)
        );
        if (t >= 1) flipAnim.active = false;
      }

      if (explodeAnim.active) {
        const t = Math.min((now - explodeAnim.start) / explodeAnim.duration, 1);
        caseGroup.position.z = THREE.MathUtils.lerp(
          explodeAnim.from,
          explodeAnim.to,
          easeInOutCubic(t)
        );
        if (t >= 1) explodeAnim.active = false;
      }

      window.__3D_STATE__ = {
        caseColor,
        caseMaterial: currentMaterialType,
        pattern: currentPattern,
        autoRotating,
        exploded,
        phoneGroupRotationY: phoneGroup.rotation.y,
        casePositionZ: caseGroup.position.z,
        flipCount
      };

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
