<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phone Case Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }
        h1 {
            margin: 0 0 15px 0;
            font-size: 1.4rem;
            color: #333;
        }
        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
            margin: 15px 0 8px 0;
        }
        .swatch-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 5px;
        }
        .swatch {
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s, border-color 0.2s;
        }
        .swatch:hover {
            transform: scale(1.05);
        }
        .swatch.active {
            border-color: #333;
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.5);
        }
        #color-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 15px;
        }
        .btn-group {
            display: flex;
            gap: 5px;
        }
        .btn {
            flex: 1;
            padding: 8px 0;
            background: #eee;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #444;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #e4e4e4;
        }
        .btn.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }
        select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: #fff;
            font-size: 0.9rem;
            color: #333;
            cursor: pointer;
        }
        #explode-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        #explode-btn:hover {
            background: #1d4ed8;
        }
        .instructions {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #777;
            line-height: 1.4;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
        }
        kbd {
            background: #ddd;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
            color: #333;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <h1>Case Designer</h1>
        
        <div class="section-title">Color</div>
        <div class="swatch-grid" id="swatch-container"></div>
        <div id="color-label">Color: Red</div>

        <div class="section-title">Finish</div>
        <div class="btn-group" id="material-group">
            <button class="btn active" data-mat="matte">Matte</button>
            <button class="btn" data-mat="glossy">Glossy</button>
            <button class="btn" data-mat="metallic">Metallic</button>
        </div>

        <div class="section-title">Pattern</div>
        <select id="pattern-select">
            <option value="none">None</option>
            <option value="stripes">Stripes</option>
            <option value="dots">Dots</option>
            <option value="gradient">Gradient</option>
        </select>

        <button id="explode-btn">Explode View</button>

        <div class="instructions">
            Controls:<br>
            Left Click + Drag to rotate view.<br>
            <kbd>R</kbd> Toggle auto-rotation<br>
            <kbd>F</kbd> Flip phone 180&deg;
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            caseColor: '#ff4444',
            caseMaterial: 'matte',
            pattern: 'none',
            autoRotating: false,
            exploded: false,
            phoneGroupRotationY: 0,
            casePositionZ: 0,
            flipCount: 0
        };
        const state = window.__3D_STATE__;

        const colors = [
            { name: 'Red', hex: '#ff4444' },
            { name: 'Blue', hex: '#4444ff' },
            { name: 'Green', hex: '#44bb44' },
            { name: 'Yellow', hex: '#ffcc00' },
            { name: 'Pink', hex: '#ff66cc' },
            { name: 'Black', hex: '#222222' }
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minPolarAngle = 0;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.target.set(0, 1, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(3, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 20;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- Environment ---
        const benchGeo = new THREE.BoxGeometry(6, 0.3, 4);
        const benchMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.9 });
        const bench = new THREE.Mesh(benchGeo, benchMat);
        bench.position.y = 0;
        bench.receiveShadow = true;
        scene.add(bench);

        const gridHelper = new THREE.GridHelper(10, 20, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.15;
        gridHelper.material.transparent = true;
        gridHelper.position.y = -0.14;
        scene.add(gridHelper);

        // --- Objects ---
        const phoneGroup = new THREE.Group();
        phoneGroup.position.set(0, 1.5, 0);
        phoneGroup.rotation.x = -10 * (Math.PI / 180);
        scene.add(phoneGroup);

        // Phone
        const phoneGeo = new THREE.BoxGeometry(1.2, 2.4, 0.1);
        const phoneMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4, metalness: 0.6 });
        const phone = new THREE.Mesh(phoneGeo, phoneMat);
        phone.position.z = 0.05; 
        phone.castShadow = true;
        phoneGroup.add(phone);

        // Screen
        const screenGeo = new THREE.PlaneGeometry(1.1, 2.3);
        const screenMat = new THREE.MeshBasicMaterial({ color: 0x2233aa });
        const screen = new THREE.Mesh(screenGeo, screenMat);
        screen.position.z = 0.051;
        phone.add(screen);

        // Case
        const caseGeo = new THREE.BoxGeometry(1.4, 2.6, 0.15);
        const caseMat = new THREE.MeshStandardMaterial({ 
            color: state.caseColor, 
            roughness: 0.9, 
            metalness: 0.0 
        });
        const phoneCase = new THREE.Mesh(caseGeo, caseMat);
        phoneCase.castShadow = true;
        phoneGroup.add(phoneCase);

        // Camera Cutout
        const cutoutGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.16, 32);
        const cutoutMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 });
        const cutout = new THREE.Mesh(cutoutGeo, cutoutMat);
        cutout.rotation.x = Math.PI / 2;
        cutout.position.set(-0.35, 0.9, -0.05);
        phoneCase.add(cutout);

        // --- Texture Generation ---
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        const caseTexture = new THREE.CanvasTexture(canvas);
        caseTexture.wrapS = THREE.RepeatWrapping;
        caseTexture.wrapT = THREE.RepeatWrapping;

        function updateMaterial() {
            caseMat.color.set(state.caseColor);

            switch(state.caseMaterial) {
                case 'matte':
                    caseMat.roughness = 0.9;
                    caseMat.metalness = 0.0;
                    break;
                case 'glossy':
                    caseMat.roughness = 0.15;
                    caseMat.metalness = 0.1;
                    break;
                case 'metallic':
                    caseMat.roughness = 0.3;
                    caseMat.metalness = 0.85;
                    break;
            }

            if (state.pattern === 'none') {
                caseMat.map = null;
            } else {
                ctx.fillStyle = state.caseColor;
                ctx.fillRect(0, 0, 512, 512);

                if (state.pattern === 'stripes') {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                    for (let i = 0; i < 512; i += 64) {
                        ctx.fillRect(i, 0, 32, 512);
                    }
                } else if (state.pattern === 'dots') {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    for (let x = 32; x < 512; x += 64) {
                        for (let y = 32; y < 512; y += 64) {
                            ctx.beginPath();
                            ctx.arc(x, y, 16, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                } else if (state.pattern === 'gradient') {
                    const grd = ctx.createLinearGradient(0, 0, 0, 512);
                    grd.addColorStop(0, state.caseColor);
                    grd.addColorStop(1, '#ffffff');
                    ctx.fillStyle = grd;
                    ctx.fillRect(0, 0, 512, 512);
                }
                
                caseTexture.needsUpdate = true;
                caseMat.map = caseTexture;
            }
            caseMat.needsUpdate = true;
        }

        // --- UI Setup & Events ---
        const swatchContainer = document.getElementById('swatch-container');
        const colorLabel = document.getElementById('color-label');
        
        colors.forEach((c, index) => {
            const div = document.createElement('div');
            div.className = `swatch ${index === 0 ? 'active' : ''}`;
            div.style.backgroundColor = c.hex;
            div.onclick = () => {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                div.classList.add('active');
                state.caseColor = c.hex;
                colorLabel.textContent = `Color: ${c.name}`;
                updateMaterial();
            };
            swatchContainer.appendChild(div);
        });

        document.querySelectorAll('#material-group .btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('#material-group .btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.caseMaterial = e.target.dataset.mat;
                updateMaterial();
            };
        });

        document.getElementById('pattern-select').onchange = (e) => {
            state.pattern = e.target.value;
            updateMaterial();
        };

        const explodeBtn = document.getElementById('explode-btn');
        explodeBtn.onclick = () => {
            state.exploded = !state.exploded;
            animateValue(phoneCase.position, 'z', state.exploded ? 0.5 : 0, 0.5);
            explodeBtn.textContent = state.exploded ? 'Assemble View' : 'Explode View';
        };

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                state.autoRotating = !state.autoRotating;
            }
            if (e.key.toLowerCase() === 'f') {
                state.flipCount++;
                animateValue(phoneGroup.rotation, 'y', state.flipCount * Math.PI, 0.5);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation System ---
        const activeAnimations = [];
        function animateValue(obj, prop, target, duration) {
            const existingIdx = activeAnimations.findIndex(a => a.obj === obj && a.prop === prop);
            if (existingIdx > -1) activeAnimations.splice(existingIdx, 1);

            activeAnimations.push({
                obj, prop, start: obj[prop], target,
                startTime: performance.now(), duration
            });
        }

        function processAnimations(time) {
            for (let i = activeAnimations.length - 1; i >= 0; i--) {
                const a = activeAnimations[i];
                let t = (time - a.startTime) / (a.duration * 1000);
                if (t >= 1) {
                    a.obj[a.prop] = a.target;
                    activeAnimations.splice(i, 1);
                } else {
                    // easeInOutQuad
                    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                    a.obj[a.prop] = a.start + (a.target - a.start) * ease;
                }
            }
        }

        // --- Render Loop ---
        function animate(time) {
            requestAnimationFrame(animate);
            
            controls.update();
            processAnimations(time);

            if (state.autoRotating) {
                phoneGroup.rotation.y += 0.02;
                state.flipCount = Math.round(phoneGroup.rotation.y / Math.PI);
            }

            // Update global state
            state.phoneGroupRotationY = phoneGroup.rotation.y;
            state.casePositionZ = phoneCase.position.z;

            renderer.render(scene, camera);
        }

        updateMaterial();
        animate(performance.now());
    </script>
</body>
</html>
