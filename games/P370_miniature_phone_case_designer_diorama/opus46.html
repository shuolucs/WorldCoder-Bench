<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Case Designer Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #ui-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(20, 20, 40, 0.92);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 20px;
    color: #eee;
    width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    user-select: none;
  }

  #ui-panel h2 {
    font-size: 18px;
    margin-bottom: 4px;
    color: #fff;
    letter-spacing: 1px;
  }

  #ui-panel .subtitle {
    font-size: 11px;
    color: #888;
    margin-bottom: 16px;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #999;
    margin-bottom: 8px;
    margin-top: 14px;
  }

  #color-swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 6px;
  }

  .swatch {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
  }

  .swatch:hover { transform: scale(1.1); }
  .swatch.active { border-color: #fff; }

  #color-label {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
  }

  #material-buttons {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
  }

  .mat-btn {
    flex: 1;
    padding: 8px 4px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: #ccc;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .mat-btn:hover { background: rgba(255,255,255,0.1); }
  .mat-btn.active { border-color: #66aaff; color: #fff; background: rgba(102,170,255,0.15); }

  #pattern-select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #eee;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 4px;
  }

  #pattern-select option { background: #222; color: #eee; }

  #explode-btn {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #ccc;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  #explode-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.35); }
  #explode-btn.active { border-color: #ff6644; color: #ff6644; background: rgba(255,102,68,0.1); }

  .hotkeys {
    font-size: 10px;
    color: #666;
    margin-top: 14px;
    line-height: 1.6;
  }

  .hotkeys kbd {
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    color: #aaa;
  }
</style>
</head>
<body>

<div id="ui-panel">
  <h2>🎨 Case Designer</h2>
  <div class="subtitle">Design your perfect phone case</div>

  <div class="section-label">Color</div>
  <div id="color-swatches"></div>
  <div id="color-label">Color: Red</div>

  <div class="section-label">Material</div>
  <div id="material-buttons">
    <div class="mat-btn active" data-mat="matte">Matte</div>
    <div class="mat-btn" data-mat="glossy">Glossy</div>
    <div class="mat-btn" data-mat="metallic">Metallic</div>
  </div>

  <div class="section-label">Pattern</div>
  <select id="pattern-select">
    <option value="none">None</option>
    <option value="stripes">Stripes</option>
    <option value="dots">Dots</option>
    <option value="gradient">Gradient</option>
  </select>

  <div class="section-label">View</div>
  <button id="explode-btn">💥 Explode View</button>

  <div class="hotkeys">
    <kbd>R</kbd> Toggle auto-rotation<br>
    <kbd>F</kbd> Flip phone (front/back)
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {

// State
window.__3D_STATE__ = {
  caseColor: '#ff4444',
  caseMaterial: 'matte',
  pattern: 'none',
  autoRotating: false,
  exploded: false,
  phoneGroupRotationY: 0,
  casePositionZ: 0,
  flipCount: 0
};

const colors = [
  { name: 'Red', hex: '#ff4444' },
  { name: 'Blue', hex: '#4444ff' },
  { name: 'Green', hex: '#44bb44' },
  { name: 'Yellow', hex: '#ffcc00' },
  { name: 'Pink', hex: '#ff66cc' },
  { name: 'Black', hex: '#222222' }
];

let currentColorIndex = 0;
let currentMaterial = 'matte';
let currentPattern = 'none';
let autoRotating = false;
let exploded = false;
let flipCount = 0;

// Animation targets
let targetCaseZ = 0;
let targetGroupRotY = 0;
let isFlipping = false;
let flipStartTime = 0;
let flipStartAngle = 0;
let flipTargetAngle = 0;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 25);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minPolarAngle = 0;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 4;
controls.maxDistance = 16;
controls.target.set(0, 1, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(3, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

// Soft fill light
const fillLight = new THREE.DirectionalLight(0x4466aa, 0.3);
fillLight.position.set(-3, 4, -2);
scene.add(fillLight);

// Point light for warmth
const warmLight = new THREE.PointLight(0xffaa44, 0.3, 10);
warmLight.position.set(2, 3, 2);
scene.add(warmLight);

// Floor grid
const gridHelper = new THREE.GridHelper(12, 24, 0x333355, 0x222244);
gridHelper.position.y = -0.16;
scene.add(gridHelper);

// Floor plane
const floorGeo = new THREE.PlaneGeometry(14, 14);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.17;
floor.receiveShadow = true;
scene.add(floor);

// Workbench
const benchGeo = new THREE.BoxGeometry(6, 0.3, 4);
const benchMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.7, metalness: 0.05 });
const bench = new THREE.Mesh(benchGeo, benchMat);
bench.position.y = 0;
bench.castShadow = true;
bench.receiveShadow = true;
scene.add(bench);

// Bench edge detail
const edgeGeo = new THREE.BoxGeometry(6.1, 0.06, 4.1);
const edgeMat = new THREE.MeshStandardMaterial({ color: 0x6B4F10, roughness: 0.8 });
const edge = new THREE.Mesh(edgeGeo, edgeMat);
edge.position.y = -0.12;
scene.add(edge);

// Bench legs
const legGeo = new THREE.BoxGeometry(0.2, 0.5, 0.2);
const legMat = new THREE.MeshStandardMaterial({ color: 0x6B4F10, roughness: 0.8 });
const legPositions = [[-2.7, -0.4, -1.7], [2.7, -0.4, -1.7], [-2.7, -0.4, 1.7], [2.7, -0.4, 1.7]];
legPositions.forEach(pos => {
  const leg = new THREE.Mesh(legGeo, legMat);
  leg.position.set(...pos);
  leg.castShadow = true;
  scene.add(leg);
});

// Small decorative items on bench
// Pencil
const pencilGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.2, 8);
const pencilMat = new THREE.MeshStandardMaterial({ color: 0xddaa22, roughness: 0.6 });
const pencil = new THREE.Mesh(pencilGeo, pencilMat);
pencil.position.set(-2.2, 0.25, 0.8);
pencil.rotation.z = Math.PI / 2;
pencil.rotation.y = 0.3;
pencil.castShadow = true;
scene.add(pencil);

// Small color palette (decorative)
const paletteGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.05, 16);
const paletteMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.5 });
const palette = new THREE.Mesh(paletteGeo, paletteMat);
palette.position.set(2.2, 0.18, -1.0);
palette.castShadow = true;
scene.add(palette);

// Small color dots on palette
const dotColors = [0xff4444, 0x4444ff, 0x44bb44, 0xffcc00, 0xff66cc];
dotColors.forEach((c, i) => {
  const dotGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.02, 8);
  const dotMat = new THREE.MeshStandardMaterial({ color: c, roughness: 0.4 });
  const dot = new THREE.Mesh(dotGeo, dotMat);
  const angle = (i / dotColors.length) * Math.PI * 2;
  dot.position.set(2.2 + Math.cos(angle) * 0.2, 0.22, -1.0 + Math.sin(angle) * 0.2);
  scene.add(dot);
});

// Phone group
const phoneGroup = new THREE.Group();
phoneGroup.position.set(0, 1.5, 0);
phoneGroup.rotation.x = -10 * Math.PI / 180;
scene.add(phoneGroup);

// Phone body
const phoneGeo = new THREE.BoxGeometry(1.2, 2.4, 0.1);
// Round the edges slightly by using bevel (we'll just use box for simplicity)
const phoneMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4, metalness: 0.3 });
const phone = new THREE.Mesh(phoneGeo, phoneMat);
phone.castShadow = true;
phone.receiveShadow = true;
phoneGroup.add(phone);

// Phone screen
const screenGeo = new THREE.PlaneGeometry(1.0, 2.1);
const screenMat = new THREE.MeshStandardMaterial({ 
  color: 0x2233aa, 
  roughness: 0.1, 
  metalness: 0.2,
  emissive: 0x112255,
  emissiveIntensity: 0.3
});
const screen = new THREE.Mesh(screenGeo, screenMat);
screen.position.z = 0.051;
phoneGroup.add(screen);

// Screen content - subtle UI elements
const screenCanvas = document.createElement('canvas');
screenCanvas.width = 256;
screenCanvas.height = 512;
const sctx = screenCanvas.getContext('2d');
sctx.fillStyle = '#2233aa';
sctx.fillRect(0, 0, 256, 512);
sctx.fillStyle = '#3344cc';
sctx.fillRect(20, 40, 216, 30);
sctx.fillRect(20, 90, 216, 80);
sctx.fillRect(20, 190, 100, 100);
sctx.fillRect(136, 190, 100, 100);
sctx.fillStyle = '#4455dd';
sctx.fillRect(20, 310, 216, 40);
sctx.fillRect(20, 370, 216, 40);
const screenTex = new THREE.CanvasTexture(screenCanvas);
screenMat.map = screenTex;
screenMat.emissiveMap = screenTex;
screenMat.needsUpdate = true;

// Phone case
const caseGeo = new THREE.BoxGeometry(1.4, 2.6, 0.15);
let caseMat = createCaseMaterial('matte', '#ff4444', 'none');
const phoneCaseMesh = new THREE.Mesh(caseGeo, caseMat);
phoneCaseMesh.position.z = -0.02;
phoneCaseMesh.castShadow = true;
phoneCaseMesh.receiveShadow = true;
phoneGroup.add(phoneCaseMesh);

// Case side panels for more realistic look
const sideMats = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.9 });
// Left side
const sideGeoLR = new THREE.BoxGeometry(0.06, 2.6, 0.15);
const leftSide = new THREE.Mesh(sideGeoLR, sideMats.clone());
leftSide.position.set(-0.67, 0, -0.02);
phoneGroup.add(leftSide);
const rightSide = new THREE.Mesh(sideGeoLR, sideMats.clone());
rightSide.position.set(0.67, 0, -0.02);
phoneGroup.add(rightSide);

const sideGeoTB = new THREE.BoxGeometry(1.4, 0.06, 0.15);
const topSide = new THREE.Mesh(sideGeoTB, sideMats.clone());
topSide.position.set(0, 1.27, -0.02);
phoneGroup.add(topSide);
const bottomSide = new THREE.Mesh(sideGeoTB, sideMats.clone());
bottomSide.position.set(0, -1.27, -0.02);
phoneGroup.add(bottomSide);

const caseSideParts = [leftSide, rightSide, topSide, bottomSide];

// Camera cutout on back of case
const cutoutGeo = new THREE.CircleGeometry(0.12, 24);
const cutoutMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3, metalness: 0.5 });
const cutout = new THREE.Mesh(cutoutGeo, cutoutMat);
cutout.position.set(0.3, 0.9, -0.096);
cutout.rotation.y = Math.PI;
phoneGroup.add(cutout);

// Camera lens ring
const ringGeo = new THREE.RingGeometry(0.1, 0.14, 24);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.2, metalness: 0.8 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.position.set(0.3, 0.9, -0.097);
ring.rotation.y = Math.PI;
phoneGroup.add(ring);

// Second camera lens
const cutout2 = new THREE.Mesh(cutoutGeo.clone(), cutoutMat.clone());
cutout2.position.set(0.3, 0.55, -0.096);
cutout2.rotation.y = Math.PI;
phoneGroup.add(cutout2);
const ring2 = new THREE.Mesh(ringGeo.clone(), ringMat.clone());
ring2.position.set(0.3, 0.55, -0.097);
ring2.rotation.y = Math.PI;
phoneGroup.add(ring2);

// Helper function to create case material
function createCaseMaterial(type, colorHex, pattern) {
  const props = {};
  switch(type) {
    case 'matte':
      props.roughness = 0.9;
      props.metalness = 0.0;
      break;
    case 'glossy':
      props.roughness = 0.15;
      props.metalness = 0.1;
      break;
    case 'metallic':
      props.roughness = 0.3;
      props.metalness = 0.85;
      break;
  }

  const color = new THREE.Color(colorHex);
  props.color = color;

  // Generate pattern texture
  if (pattern && pattern !== 'none') {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');

    const r = Math.round(color.r * 255);
    const g = Math.round(color.g * 255);
    const b = Math.round(color.b * 255);
    const baseColor = `rgb(${r},${g},${b})`;
    const darkColor = `rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`;

    ctx.fillStyle = baseColor;
    ctx.fillRect(0, 0, 256, 512);

    if (pattern === 'stripes') {
      const stripeWidth = 24;
      ctx.fillStyle = darkColor;
      for (let i = 0; i < 512; i += stripeWidth * 2) {
        ctx.fillRect(0, i, 256, stripeWidth);
      }
    } else if (pattern === 'dots') {
      ctx.fillStyle = darkColor;
      const dotRadius = 12;
      const spacing = 40;
      for (let y = spacing / 2; y < 512; y += spacing) {
        for (let x = spacing / 2; x < 256; x += spacing) {
          const offsetX = (Math.floor(y / spacing) % 2 === 0) ? 0 : spacing / 2;
          ctx.beginPath();
          ctx.arc(x + offsetX, y, dotRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    } else if (pattern === 'gradient') {
      const grad = ctx.createLinearGradient(0, 0, 0, 512);
      grad.addColorStop(0, baseColor);
      grad.addColorStop(1, '#ffffff');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 512);
    }

    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    props.map = texture;
    // For patterns, set color to white so texture shows properly
    props.color = new THREE.Color(0xffffff);
  }

  return new THREE.MeshStandardMaterial(props);
}

function updateCaseMaterial() {
  const colorHex = colors[currentColorIndex].hex;
  const newMat = createCaseMaterial(currentMaterial, colorHex, currentPattern);
  phoneCaseMesh.material.dispose();
  phoneCaseMesh.material = newMat;

  // Update side parts color
  const sideColor = new THREE.Color(colorHex);
  caseSideParts.forEach(part => {
    part.material.color.set(sideColor);
    switch(currentMaterial) {
      case 'matte': part.material.roughness = 0.9; part.material.metalness = 0.0; break;
      case 'glossy': part.material.roughness = 0.15; part.material.metalness = 0.1; break;
      case 'metallic': part.material.roughness = 0.3; part.material.metalness = 0.85; break;
    }
  });

  window.__3D_STATE__.caseColor = colorHex;
  window.__3D_STATE__.caseMaterial = currentMaterial;
  window.__3D_STATE__.pattern = currentPattern;
}

// UI Setup
const swatchContainer = document.getElementById('color-swatches');
colors.forEach((c, i) => {
  const swatch = document.createElement('div');
  swatch.className = 'swatch' + (i === 0 ? ' active' : '');
  swatch.style.backgroundColor = c.hex;
  swatch.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    swatch.classList.add('active');
    currentColorIndex = i;
    document.getElementById('color-label').textContent = 'Color: ' + c.name;
    updateCaseMaterial();
  });
  swatchContainer.appendChild(swatch);
});

// Material buttons
document.querySelectorAll('.mat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMaterial = btn.dataset.mat;
    updateCaseMaterial();
  });
});

// Pattern select
document.getElementById('pattern-select').addEventListener('change', (e) => {
  currentPattern = e.target.value;
  updateCaseMaterial();
});

// Explode button
const explodeBtn = document.getElementById('explode-btn');
explodeBtn.addEventListener('click', () => {
  exploded = !exploded;
  targetCaseZ = exploded ? 0.5 : -0.02;
  explodeBtn.classList.toggle('active', exploded);
  explodeBtn.textContent = exploded ? '🔧 Reassemble' : '💥 Explode View';
  window.__3D_STATE__.exploded = exploded;
});

// Keyboard controls
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    autoRotating = !autoRotating;
    window.__3D_STATE__.autoRotating = autoRotating;
  }
  if (e.key === 'f' || e.key === 'F') {
    if (!isFlipping) {
      isFlipping = true;
      flipStartTime = performance.now();
      flipStartAngle = phoneGroup.rotation.y;
      flipTargetAngle = flipStartAngle + Math.PI;
      flipCount++;
      window.__3D_STATE__.flipCount = flipCount;
    }
  }
});

// Animation
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function animate() {
  requestAnimationFrame(animate);

  // Auto rotation
  if (autoRotating && !isFlipping) {
    phoneGroup.rotation.y += 0.02;
  }

  // Flip animation
  if (isFlipping) {
    const elapsed = (performance.now() - flipStartTime) / 500; // 0.5 seconds
    if (elapsed >= 1) {
      phoneGroup.rotation.y = flipTargetAngle;
      isFlipping = false;
    } else {
      const t = easeInOutCubic(elapsed);
      phoneGroup.rotation.y = flipStartAngle + (flipTargetAngle - flipStartAngle) * t;
    }
  }

  // Smooth case Z position (explode/reassemble)
  const currentZ = phoneCaseMesh.position.z;
  const diff = targetCaseZ - currentZ;
  if (Math.abs(diff) > 0.001) {
    phoneCaseMesh.position.z += diff * 0.08;
    // Also move side parts
    caseSideParts.forEach(part => {
      part.position.z += diff * 0.08;
    });
    cutout.position.z = phoneCaseMesh.position.z - 0.076;
    ring.position.z = phoneCaseMesh.position.z - 0.077;
    cutout2.position.z = phoneCaseMesh.position.z - 0.076;
    ring2.position.z = phoneCaseMesh.position.z - 0.077;
  }

  // Update state
  window.__3D_STATE__.phoneGroupRotationY = phoneGroup.rotation.y;
  window.__3D_STATE__.casePositionZ = phoneCaseMesh.position.z;
  window.__3D_STATE__.autoRotating = autoRotating;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

})();
</script>
</body>
</html>
