<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Backpack Feature Explorer</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #score-hud {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      z-index: 10;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    #controls-ui {
      position: absolute;
      top: 70px;
      left: 16px;
      display: flex;
      gap: 10px;
      z-index: 10;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    #completion-badge {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: linear-gradient(135deg, #f9ca24, #f0932b);
      color: #1a1a2e;
      font-weight: bold;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(249, 202, 36, 0.35);
      z-index: 10;
      display: none;
    }

    #info-panel {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      width: 320px;
      background: rgba(10, 15, 35, 0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 20px;
      z-index: 10;
      display: none;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    #info-panel h2 {
      margin: 0 0 10px;
      font-size: 24px;
      color: #ffffff;
    }

    #feature-description {
      margin: 0 0 14px;
      line-height: 1.5;
      color: #dbe4ff;
    }

    .section-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.75;
      margin-bottom: 8px;
    }

    #feature-rating-display,
    #rating-stars {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .star {
      font-size: 24px;
      color: rgba(255,255,255,0.25);
      user-select: none;
    }

    .star.filled {
      color: #f9ca24;
      text-shadow: 0 0 8px rgba(249, 202, 36, 0.4);
    }

    .star-btn {
      background: rgba(255,255,255,0.08);
      padding: 8px 10px;
      min-width: 42px;
      border-radius: 10px;
    }

    .helper-text {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 8px;
    }

    #loading-label {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 10;
      padding: 10px 14px;
      background: rgba(0,0,0,0.35);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 13px;
    }

    @media (max-width: 768px) {
      #info-panel {
        width: calc(100% - 24px);
        right: 12px;
        left: 12px;
        top: auto;
        bottom: 12px;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="score-hud">Score: 0 / 100</div>

    <div id="controls-ui">
      <button id="auto-rotate-btn">Auto-Rotate: OFF</button>
      <button id="reset-btn">Reset</button>
    </div>

    <div id="completion-badge">Explorer Badge Earned!</div>

    <div id="info-panel">
      <h2 id="feature-title">Feature</h2>
      <p id="feature-description"></p>

      <div class="section-label">Current Rating</div>
      <div id="feature-rating-display"></div>

      <div class="section-label">Rate This Feature</div>
      <div id="rating-stars">
        <button class="star-btn" id="star-1">★ 1</button>
        <button class="star-btn" id="star-2">★ 2</button>
        <button class="star-btn" id="star-3">★ 3</button>
        <button class="star-btn" id="star-4">★ 4</button>
        <button class="star-btn" id="star-5">★ 5</button>
      </div>

      <div class="helper-text">Click glowing hotspots around the mascot to explore backpack features.</div>
    </div>

    <div id="loading-label">Loading robot.glb...</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const scoreHud = document.getElementById("score-hud");
    const infoPanel = document.getElementById("info-panel");
    const featureTitle = document.getElementById("feature-title");
    const featureDescription = document.getElementById("feature-description");
    const featureRatingDisplay = document.getElementById("feature-rating-display");
    const completionBadge = document.getElementById("completion-badge");
    const resetBtn = document.getElementById("reset-btn");
    const autoRotateBtn = document.getElementById("auto-rotate-btn");
    const loadingLabel = document.getElementById("loading-label");

    const starButtons = [1,2,3,4,5].map(i => document.getElementById(`star-${i}`));

    const featureData = [
      {
        name: "Ergonomic Straps",
        description: "Padded mesh straps with load distribution",
        position: new THREE.Vector3(-0.5, 1.5, 0.3),
        color: "#ff6b6b"
      },
      {
        name: "Waterproof Pocket",
        description: "IPX7 rated sealed compartment",
        position: new THREE.Vector3(0.4, 1.0, 0.4),
        color: "#4ecdc4"
      },
      {
        name: "Laptop Compartment",
        description: "Fits up to 17 inch laptops with padding",
        position: new THREE.Vector3(0, 0.8, -0.3),
        color: "#45b7d1"
      },
      {
        name: "USB Charging Port",
        description: "Built-in 10000mAh power bank connection",
        position: new THREE.Vector3(0.5, 1.3, 0.2),
        color: "#f9ca24"
      },
      {
        name: "Anti-Theft Zipper",
        description: "Hidden reverse coil zippers",
        position: new THREE.Vector3(-0.3, 0.5, 0.4),
        color: "#a55eea"
      }
    ];

    const state = {
      modelLoaded: false,
      featuresDiscovered: 0,
      discoveredFeatures: [],
      currentFeature: null,
      score: 0,
      ratings: {},
      totalRatings: 0,
      autoRotate: false,
      allDiscovered: false,
      panelVisible: false,
      hotspotCount: 5,
      cameraDistance: 0
    };

    window.__3D_STATE__ = { ...state };

    function syncState() {
      state.featuresDiscovered = state.discoveredFeatures.length;
      state.score = Math.min(state.featuresDiscovered * 20, 100);
      state.totalRatings = Object.keys(state.ratings).length;
      state.allDiscovered = state.featuresDiscovered === 5;
      state.panelVisible = infoPanel.style.display !== "none";
      state.hotspotCount = 5;
      state.cameraDistance = camera.position.length();
      window.__3D_STATE__ = {
        modelLoaded: state.modelLoaded,
        featuresDiscovered: state.featuresDiscovered,
        discoveredFeatures: [...state.discoveredFeatures],
        currentFeature: state.currentFeature,
        score: state.score,
        ratings: { ...state.ratings },
        totalRatings: state.totalRatings,
        autoRotate: state.autoRotate,
        allDiscovered: state.allDiscovered,
        panelVisible: state.panelVisible,
        hotspotCount: state.hotspotCount,
        cameraDistance: state.cameraDistance
      };
    }

    const scene = new THREE.Scene();

    const bgCanvas = document.createElement("canvas");
    bgCanvas.width = 2;
    bgCanvas.height = 512;
    const bgCtx = bgCanvas.getContext("2d");
    const gradient = bgCtx.createLinearGradient(0, 0, 0, 512);
    gradient.addColorStop(0, "#1a1a2e");
    gradient.addColorStop(1, "#16213e");
    bgCtx.fillStyle = gradient;
    bgCtx.fillRect(0, 0, 2, 512);
    const bgTexture = new THREE.CanvasTexture(bgCanvas);
    scene.background = bgTexture;

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 1.4;
    controls.minDistance = 3;
    controls.maxDistance = 8;
    controls.target.set(0, 1, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight1.position.set(5, 5, 5);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
    dirLight2.position.set(-3, 3, -3);
    scene.add(dirLight2);

    const rotatingGroup = new THREE.Group();
    scene.add(rotatingGroup);

    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(2, 2, 0.1, 64),
      new THREE.MeshStandardMaterial({
        color: "#2a2a4a",
        metalness: 0.8,
        roughness: 0.3
      })
    );
    platform.position.set(0, -0.05, 0);
    rotatingGroup.add(platform);

    const robotAnchor = new THREE.Group();
    robotAnchor.position.set(0, 0, 0);
    rotatingGroup.add(robotAnchor);

    const loader = new GLTFLoader();
    loader.load(
      "robot.glb",
      (gltf) => {
        const model = gltf.scene;
        model.position.set(0, 0, 0);
        model.scale.set(1, 1, 1);

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
          }
        });

        robotAnchor.add(model);
        state.modelLoaded = true;
        loadingLabel.textContent = "Robot loaded";
        setTimeout(() => loadingLabel.style.display = "none", 1200);
        syncState();
      },
      undefined,
      () => {
        loadingLabel.textContent = "Failed to load robot.glb";
        state.modelLoaded = false;
        syncState();
      }
    );

    const hotspotGroup = new THREE.Group();
    rotatingGroup.add(hotspotGroup);

    const hotspots = [];
    featureData.forEach((feature, index) => {
      const material = new THREE.MeshStandardMaterial({
        color: feature.color,
        emissive: new THREE.Color(feature.color),
        emissiveIntensity: 0.8,
        metalness: 0.2,
        roughness: 0.3
      });

      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 24, 24),
        material
      );

      sphere.position.copy(feature.position);
      sphere.userData = {
        featureName: feature.name,
        description: feature.description,
        color: feature.color,
        baseScale: 1,
        pulseOffset: index * 0.8
      };

      hotspotGroup.add(sphere);
      hotspots.push(sphere);

      const glow = new THREE.PointLight(feature.color, 0.8, 1.8);
      glow.position.copy(feature.position);
      hotspotGroup.add(glow);
    });

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function renderRatingStars(rating = 0) {
      featureRatingDisplay.innerHTML = "";
      for (let i = 1; i <= 5; i++) {
        const span = document.createElement("span");
        span.className = "star" + (i <= rating ? " filled" : "");
        span.textContent = "★";
        featureRatingDisplay.appendChild(span);
      }
    }

    function updateHUD() {
      scoreHud.textContent = `Score: ${state.score} / 100`;
      completionBadge.style.display = state.allDiscovered ? "block" : "none";
      autoRotateBtn.textContent = `Auto-Rotate: ${state.autoRotate ? "ON" : "OFF"}`;
      syncState();
    }

    function showFeature(featureName) {
      const feature = featureData.find(f => f.name === featureName);
      if (!feature) return;

      if (!state.discoveredFeatures.includes(feature.name)) {
        state.discoveredFeatures.push(feature.name);
      }

      state.currentFeature = feature.name;
      featureTitle.textContent = feature.name;
      featureDescription.textContent = feature.description;
      infoPanel.style.display = "block";

      const currentRating = state.ratings[feature.name] || 0;
      renderRatingStars(currentRating);

      updateStarButtonStyles(currentRating);
      updateHUD();
      syncState();
    }

    function updateStarButtonStyles(activeRating) {
      starButtons.forEach((btn, index) => {
        btn.style.background = (index + 1) <= activeRating
          ? "rgba(249, 202, 36, 0.25)"
          : "rgba(255,255,255,0.08)";
        btn.style.borderColor = (index + 1) <= activeRating
          ? "rgba(249, 202, 36, 0.6)"
          : "rgba(255,255,255,0.15)";
      });
    }

    function setRating(value) {
      if (!state.currentFeature) return;
      state.ratings[state.currentFeature] = value;
      renderRatingStars(value);
      updateStarButtonStyles(value);
      updateHUD();
      syncState();
    }

    starButtons.forEach((btn, index) => {
      btn.addEventListener("click", () => {
        setRating(index + 1);
      });
    });

    function onPointerClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(hotspots, false);

      if (intersects.length > 0) {
        const hit = intersects[0].object;
        showFeature(hit.userData.featureName);
      }
      syncState();
    }

    renderer.domElement.addEventListener("click", onPointerClick);

    autoRotateBtn.addEventListener("click", () => {
      state.autoRotate = !state.autoRotate;
      updateHUD();
      syncState();
    });

    resetBtn.addEventListener("click", () => {
      state.featuresDiscovered = 0;
      state.discoveredFeatures = [];
      state.currentFeature = null;
      state.score = 0;
      state.ratings = {};
      state.totalRatings = 0;
      state.autoRotate = false;
      state.allDiscovered = false;
      state.panelVisible = false;

      infoPanel.style.display = "none";
      completionBadge.style.display = "none";
      renderRatingStars(0);
      updateStarButtonStyles(0);
      updateHUD();
      syncState();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      hotspots.forEach((hotspot) => {
        const pulse = 1 + 0.2 * Math.sin(elapsed * 3 + hotspot.userData.pulseOffset);
        hotspot.scale.setScalar(pulse);
      });

      if (state.autoRotate) {
        rotatingGroup.rotation.y += 0.01;
      }

      controls.update();
      state.cameraDistance = camera.position.length();
      syncState();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      syncState();
    });

    renderRatingStars(0);
    updateStarButtonStyles(0);
    updateHUD();
    syncState();
    animate();
  </script>
</body>
</html>
