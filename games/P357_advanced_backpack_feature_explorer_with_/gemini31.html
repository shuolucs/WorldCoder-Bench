<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Backpack Feature Explorer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .ui-layer {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }
        .interactive {
            pointer-events: auto;
        }
        #score-hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }
        #completion-badge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #f9ca24, #f0932b);
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            color: #000;
            box-shadow: 0 4px 15px rgba(249, 202, 36, 0.4);
            display: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -20px) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        }
        #info-panel {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(20, 20, 35, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            display: none;
            backdrop-filter: blur(8px);
            box-shadow: -5px 5px 20px rgba(0,0,0,0.5);
        }
        #info-title {
            margin: 0 0 10px 0;
            color: #4ecdc4;
            font-size: 22px;
        }
        #info-desc {
            font-size: 14px;
            line-height: 1.5;
            color: #cccccc;
            margin-bottom: 20px;
        }
        .rating-section {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }
        .rating-section p {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .stars {
            display: flex;
            gap: 5px;
        }
        .star {
            cursor: pointer;
            font-size: 24px;
            color: #555;
            transition: color 0.2s;
        }
        .star:hover, .star.active {
            color: #f9ca24;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        button.active {
            background: #4ecdc4;
            color: #000;
            border-color: #4ecdc4;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-layer">
        <div id="score-hud" class="interactive">Score: 0 / 100</div>
        <div id="completion-badge">Explorer Badge Earned!</div>
        
        <div id="info-panel" class="interactive">
            <h2 id="info-title">Feature Name</h2>
            <p id="info-desc">Feature description goes here.</p>
            <div class="rating-section">
                <p>Rate This Feature:</p>
                <div class="stars">
                    <span class="star" id="star-1" data-val="1">★</span>
                    <span class="star" id="star-2" data-val="2">★</span>
                    <span class="star" id="star-3" data-val="3">★</span>
                    <span class="star" id="star-4" data-val="4">★</span>
                    <span class="star" id="star-5" data-val="5">★</span>
                </div>
            </div>
        </div>

        <div id="controls" class="interactive">
            <button id="auto-rotate-btn">Auto-Rotate: OFF</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            modelLoaded: false,
            featuresDiscovered: 0,
            discoveredFeatures: [],
            currentFeature: null,
            score: 0,
            ratings: {},
            totalRatings: 0,
            autoRotate: false,
            allDiscovered: false,
            panelVisible: false,
            hotspotCount: 5,
            cameraDistance: 5
        };

        const featureData = [
            { id: 'f1', name: 'Ergonomic Straps', pos: [-0.5, 1.5, 0.3], color: 0xff6b6b, desc: 'Padded mesh straps with load distribution' },
            { id: 'f2', name: 'Waterproof Pocket', pos: [0.4, 1.0, 0.4], color: 0x4ecdc4, desc: 'IPX7 rated sealed compartment' },
            { id: 'f3', name: 'Laptop Compartment', pos: [0, 0.8, -0.3], color: 0x45b7d1, desc: 'Fits up to 17 inch laptops with padding' },
            { id: 'f4', name: 'USB Charging Port', pos: [0.5, 1.3, 0.2], color: 0xf9ca24, desc: 'Built-in 10000mAh power bank connection' },
            { id: 'f5', name: 'Anti-Theft Zipper', pos: [-0.3, 0.5, 0.4], color: 0xa55eea, desc: 'Hidden reverse coil zippers' }
        ];

        // DOM Elements
        const scoreHud = document.getElementById('score-hud');
        const badge = document.getElementById('completion-badge');
        const infoPanel = document.getElementById('info-panel');
        const infoTitle = document.getElementById('info-title');
        const infoDesc = document.getElementById('info-desc');
        const stars = document.querySelectorAll('.star');
        const autoRotateBtn = document.getElementById('auto-rotate-btn');
        const resetBtn = document.getElementById('reset-btn');

        // Three.js Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minPolarAngle = 0.3;
        controls.maxPolarAngle = 1.4;
        controls.minDistance = 3;
        controls.maxDistance = 8;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(5, 5, 5);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight2.position.set(-3, 3, -3);
        scene.add(dirLight2);

        // Group for rotation
        const rotatableGroup = new THREE.Group();
        scene.add(rotatableGroup);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(2, 2, 0.1, 32);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x2a2a4a,
            metalness: 0.8,
            roughness: 0.2
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.05;
        rotatableGroup.add(platform);

        // Load Model
        const loader = new GLTFLoader();
        loader.load('robot.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(1, 1, 1);
            model.position.set(0, 0, 0);
            rotatableGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.warn('Robot model could not be loaded. Scene will continue with hotspots.', error);
        });

        // Hotspots
        const hotspotMeshes = [];
        const sphereGeo = new THREE.SphereGeometry(0.12, 32, 32);

        featureData.forEach(data => {
            const mat = new THREE.MeshStandardMaterial({ 
                color: data.color,
                emissive: data.color,
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.8
            });
            const mesh = new THREE.Mesh(sphereGeo, mat);
            mesh.position.set(...data.pos);
            mesh.userData = data;
            rotatableGroup.add(mesh);
            hotspotMeshes.push(mesh);
        });

        // Raycasting
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI
            if(event.target.closest('.interactive')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(hotspotMeshes);

            if (intersects.length > 0) {
                handleHotspotClick(intersects[0].object.userData);
            }
        });

        function handleHotspotClick(data) {
            const state = window.__3D_STATE__;
            
            if (!state.discoveredFeatures.includes(data.name)) {
                state.discoveredFeatures.push(data.name);
                state.featuresDiscovered++;
                state.score += 20;
                
                if (state.featuresDiscovered === state.hotspotCount) {
                    state.allDiscovered = true;
                    badge.style.display = 'block';
                }
            }

            state.currentFeature = data.name;
            state.panelVisible = true;

            // Update UI
            scoreHud.innerText = `Score: ${state.score} / 100`;
            infoTitle.innerText = data.name;
            infoTitle.style.color = '#' + data.color.toString(16).padStart(6, '0');
            infoDesc.innerText = data.desc;
            infoPanel.style.display = 'block';

            updateStarsUI();
        }

        // Star Rating Logic
        stars.forEach(star => {
            star.addEventListener('click', (e) => {
                const val = parseInt(e.target.getAttribute('data-val'));
                const state = window.__3D_STATE__;
                
                if (state.currentFeature) {
                    if (!state.ratings[state.currentFeature]) {
                        state.totalRatings++;
                    }
                    state.ratings[state.currentFeature] = val;
                    updateStarsUI();
                }
            });
        });

        function updateStarsUI() {
            const state = window.__3D_STATE__;
            const currentRating = state.ratings[state.currentFeature] || 0;
            
            stars.forEach(star => {
                const val = parseInt(star.getAttribute('data-val'));
                if (val <= currentRating) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        // Controls Logic
        autoRotateBtn.addEventListener('click', () => {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            if (window.__3D_STATE__.autoRotate) {
                autoRotateBtn.innerText = 'Auto-Rotate: ON';
                autoRotateBtn.classList.add('active');
            } else {
                autoRotateBtn.innerText = 'Auto-Rotate: OFF';
                autoRotateBtn.classList.remove('active');
            }
        });

        resetBtn.addEventListener('click', () => {
            const state = window.__3D_STATE__;
            state.featuresDiscovered = 0;
            state.discoveredFeatures = [];
            state.currentFeature = null;
            state.score = 0;
            state.ratings = {};
            state.totalRatings = 0;
            state.allDiscovered = false;
            state.panelVisible = false;

            scoreHud.innerText = `Score: 0 / 100`;
            badge.style.display = 'none';
            infoPanel.style.display = 'none';
            
            // Reset rotation
            rotatableGroup.rotation.y = 0;
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            const state = window.__3D_STATE__;

            controls.update();
            state.cameraDistance = camera.position.distanceTo(scene.position);

            // Pulse hotspots
            const scale = 1.0 + 0.2 * Math.sin(time * 5);
            hotspotMeshes.forEach(mesh => {
                mesh.scale.set(scale, scale, scale);
            });

            // Auto rotate
            if (state.autoRotate) {
                rotatableGroup.rotation.y += 0.01;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
