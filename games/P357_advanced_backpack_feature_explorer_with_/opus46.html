<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Backpack Feature Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #score-hud {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(26, 26, 46, 0.9);
    border: 1px solid rgba(78, 205, 196, 0.3);
    border-radius: 12px;
    padding: 15px 25px;
    color: #e0e0e0;
    font-size: 18px;
    font-weight: 600;
    z-index: 100;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  #score-hud .score-value { color: #4ecdc4; font-size: 24px; }
  #score-hud .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
  }
  #score-hud .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4ecdc4, #45b7d1);
    border-radius: 3px;
    transition: width 0.5s ease;
    width: 0%;
  }

  #info-panel {
    position: fixed;
    top: 50%;
    right: 30px;
    transform: translateY(-50%);
    width: 320px;
    background: rgba(26, 26, 46, 0.95);
    border: 1px solid rgba(78, 205, 196, 0.3);
    border-radius: 16px;
    padding: 30px;
    color: #e0e0e0;
    z-index: 100;
    display: none;
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-50%) translateX(30px); }
    to { opacity: 1; transform: translateY(-50%) translateX(0); }
  }
  #info-panel .feature-icon {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 15px;
  }
  #info-panel .feature-name {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
    color: #fff;
  }
  #info-panel .feature-desc {
    font-size: 14px;
    line-height: 1.6;
    color: #b0b0c0;
    margin-bottom: 20px;
  }
  #info-panel .rating-section {
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 15px;
  }
  #info-panel .rating-label {
    font-size: 13px;
    color: #888;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #info-panel .stars {
    display: flex;
    gap: 8px;
  }
  #info-panel .stars button {
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    color: #555;
    transition: color 0.2s, transform 0.2s;
    padding: 0;
  }
  #info-panel .stars button:hover { transform: scale(1.2); }
  #info-panel .stars button.active { color: #f9ca24; }
  #info-panel .close-btn {
    position: absolute;
    top: 12px;
    right: 15px;
    background: none;
    border: none;
    color: #888;
    font-size: 20px;
    cursor: pointer;
    transition: color 0.2s;
  }
  #info-panel .close-btn:hover { color: #fff; }

  #completion-badge {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: linear-gradient(135deg, #4ecdc4, #45b7d1);
    color: #fff;
    padding: 30px 50px;
    border-radius: 20px;
    font-size: 24px;
    font-weight: 700;
    z-index: 200;
    text-align: center;
    box-shadow: 0 10px 40px rgba(78, 205, 196, 0.4);
    display: none;
    animation: badgePop 0.6s ease forwards;
  }
  @keyframes badgePop {
    0% { transform: translate(-50%, -50%) scale(0); }
    50% { transform: translate(-50%, -50%) scale(1.1); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }
  #completion-badge .badge-icon { font-size: 48px; margin-bottom: 10px; }
  #completion-badge .badge-sub { font-size: 14px; font-weight: 400; opacity: 0.8; margin-top: 5px; }

  .controls-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 100;
  }
  .controls-bar button {
    padding: 12px 24px;
    border: 1px solid rgba(78, 205, 196, 0.3);
    border-radius: 10px;
    background: rgba(26, 26, 46, 0.9);
    color: #e0e0e0;
    font-size: 14px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
    font-weight: 500;
  }
  .controls-bar button:hover {
    background: rgba(78, 205, 196, 0.2);
    border-color: rgba(78, 205, 196, 0.6);
  }
  .controls-bar button.active {
    background: rgba(78, 205, 196, 0.3);
    border-color: #4ecdc4;
    color: #4ecdc4;
  }

  .loading-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 500;
    transition: opacity 0.5s;
  }
  .loading-screen .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(78, 205, 196, 0.2);
    border-top-color: #4ecdc4;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen p { color: #888; margin-top: 20px; font-size: 14px; }

  .tooltip {
    position: fixed;
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    z-index: 150;
    display: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <p>Loading 3D Explorer...</p>
</div>

<div id="score-hud">
  <div>Score: <span class="score-value" id="score-value">0</span> / 100</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div id="info-panel">
  <button class="close-btn" id="close-panel">&times;</button>
  <div class="feature-icon" id="feature-icon">🎒</div>
  <div class="feature-name" id="feature-name"></div>
  <div class="feature-desc" id="feature-desc"></div>
  <div class="rating-section">
    <div class="rating-label">Rate This Feature</div>
    <div class="stars">
      <button id="star-1">★</button>
      <button id="star-2">★</button>
      <button id="star-3">★</button>
      <button id="star-4">★</button>
      <button id="star-5">★</button>
    </div>
  </div>
</div>

<div id="completion-badge">
  <div class="badge-icon">🏆</div>
  Explorer Badge Earned!
  <div class="badge-sub">You discovered all 5 features!</div>
</div>

<div class="controls-bar">
  <button id="auto-rotate-btn">🔄 Auto Rotate: OFF</button>
  <button id="reset-btn">🔃 Reset</button>
</div>

<div class="tooltip" id="tooltip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  modelLoaded: false,
  featuresDiscovered: 0,
  discoveredFeatures: [],
  currentFeature: null,
  score: 0,
  ratings: {},
  totalRatings: 0,
  autoRotate: false,
  allDiscovered: false,
  panelVisible: false,
  hotspotCount: 5,
  cameraDistance: 5
};

// Feature data
const features = [
  { name: 'Ergonomic Straps', position: new THREE.Vector3(-0.5, 1.5, 0.3), color: '#ff6b6b', icon: '🎒', desc: 'Padded mesh straps with load distribution' },
  { name: 'Waterproof Pocket', position: new THREE.Vector3(0.4, 1.0, 0.4), color: '#4ecdc4', icon: '💧', desc: 'IPX7 rated sealed compartment' },
  { name: 'Laptop Compartment', position: new THREE.Vector3(0, 0.8, -0.3), color: '#45b7d1', icon: '💻', desc: 'Fits up to 17 inch laptops with padding' },
  { name: 'USB Charging Port', position: new THREE.Vector3(0.5, 1.3, 0.2), color: '#f9ca24', icon: '🔌', desc: 'Built-in 10000mAh power bank connection' },
  { name: 'Anti-Theft Zipper', position: new THREE.Vector3(-0.3, 0.5, 0.4), color: '#a55eea', icon: '🔒', desc: 'Hidden reverse coil zippers' }
];

// Scene setup
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx2d = canvas2d.getContext('2d');
const gradient = ctx2d.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
ctx2d.fillStyle = gradient;
ctx2d.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minPolarAngle = 0.3;
controls.maxPolarAngle = 1.4;
controls.minDistance = 3;
controls.maxDistance = 8;
controls.target.set(0, 0.8, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight1.position.set(5, 5, 5);
dirLight1.castShadow = true;
dirLight1.shadow.mapSize.set(1024, 1024);
dirLight1.shadow.camera.near = 0.1;
dirLight1.shadow.camera.far = 20;
dirLight1.shadow.camera.left = -5;
dirLight1.shadow.camera.right = 5;
dirLight1.shadow.camera.top = 5;
dirLight1.shadow.camera.bottom = -5;
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xaabbff, 0.4);
dirLight2.position.set(-3, 3, -3);
scene.add(dirLight2);

// Add a subtle point light for rim effect
const rimLight = new THREE.PointLight(0x4ecdc4, 0.3, 10);
rimLight.position.set(0, 3, -3);
scene.add(rimLight);

// Platform
const platformGeom = new THREE.CylinderGeometry(2, 2, 0.1, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x2a2a4a,
  metalness: 0.8,
  roughness: 0.3
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = -0.05;
platform.receiveShadow = true;
scene.add(platform);

// Platform ring glow
const ringGeom = new THREE.TorusGeometry(2, 0.02, 16, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x4ecdc4, transparent: true, opacity: 0.5 });
const ring = new THREE.Mesh(ringGeom, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.01;
scene.add(ring);

// Rotation group for auto-rotate
const rotationGroup = new THREE.Group();
scene.add(rotationGroup);

// Hotspots
const hotspots = [];
const hotspotMeshes = [];
const discoveredSet = new Set();

features.forEach((feature, index) => {
  // Outer glow sphere
  const glowGeom = new THREE.SphereGeometry(0.18, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(feature.color),
    transparent: true,
    opacity: 0.15
  });
  const glowMesh = new THREE.Mesh(glowGeom, glowMat);

  // Inner sphere
  const sphereGeom = new THREE.SphereGeometry(0.12, 32, 32);
  const sphereMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(feature.color),
    emissive: new THREE.Color(feature.color),
    emissiveIntensity: 0.5,
    metalness: 0.3,
    roughness: 0.4
  });
  const sphere = new THREE.Mesh(sphereGeom, sphereMat);

  const group = new THREE.Group();
  group.add(glowMesh);
  group.add(sphere);
  group.position.copy(feature.position);
  group.userData = { featureIndex: index, featureName: feature.name };

  rotationGroup.add(group);
  hotspots.push(group);
  hotspotMeshes.push(sphere);
  hotspotMeshes.push(glowMesh);
});

// Load robot model
const loader = new GLTFLoader();
let robotModel = null;

// Create a fallback robot if model fails to load
function createFallbackRobot() {
  const robot = new THREE.Group();

  // Body
  const bodyGeom = new THREE.BoxGeometry(0.6, 0.8, 0.4);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a90d9, metalness: 0.6, roughness: 0.3 });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.position.y = 0.8;
  body.castShadow = true;
  robot.add(body);

  // Head
  const headGeom = new THREE.BoxGeometry(0.5, 0.45, 0.4);
  const headMat = new THREE.MeshStandardMaterial({ color: 0x5aa0e9, metalness: 0.6, roughness: 0.3 });
  const head = new THREE.Mesh(headGeom, headMat);
  head.position.y = 1.45;
  head.castShadow = true;
  robot.add(head);

  // Eyes
  const eyeGeom = new THREE.SphereGeometry(0.06, 16, 16);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x4ecdc4, emissive: 0x4ecdc4, emissiveIntensity: 0.8 });
  const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
  leftEye.position.set(-0.12, 1.5, 0.2);
  robot.add(leftEye);
  const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
  rightEye.position.set(0.12, 1.5, 0.2);
  robot.add(rightEye);

  // Antenna
  const antennaGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.2, 8);
  const antennaMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
  const antenna = new THREE.Mesh(antennaGeom, antennaMat);
  antenna.position.set(0, 1.78, 0);
  robot.add(antenna);

  const antennaBallGeom = new THREE.SphereGeometry(0.05, 16, 16);
  const antennaBallMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b, emissive: 0xff6b6b, emissiveIntensity: 0.5 });
  const antennaBall = new THREE.Mesh(antennaBallGeom, antennaBallMat);
  antennaBall.position.set(0, 1.9, 0);
  robot.add(antennaBall);

  // Arms
  const armGeom = new THREE.BoxGeometry(0.15, 0.5, 0.15);
  const armMat = new THREE.MeshStandardMaterial({ color: 0x4a90d9, metalness: 0.6, roughness: 0.3 });
  const leftArm = new THREE.Mesh(armGeom, armMat);
  leftArm.position.set(-0.45, 0.8, 0);
  leftArm.castShadow = true;
  robot.add(leftArm);
  const rightArm = new THREE.Mesh(armGeom, armMat);
  rightArm.position.set(0.45, 0.8, 0);
  rightArm.castShadow = true;
  robot.add(rightArm);

  // Legs
  const legGeom = new THREE.BoxGeometry(0.18, 0.4, 0.18);
  const legMat = new THREE.MeshStandardMaterial({ color: 0x3a70b9, metalness: 0.6, roughness: 0.3 });
  const leftLeg = new THREE.Mesh(legGeom, legMat);
  leftLeg.position.set(-0.15, 0.2, 0);
  leftLeg.castShadow = true;
  robot.add(leftLeg);
  const rightLeg = new THREE.Mesh(legGeom, legMat);
  rightLeg.position.set(0.15, 0.2, 0);
  rightLeg.castShadow = true;
  robot.add(rightLeg);

  // Backpack on the robot
  const bpGeom = new THREE.BoxGeometry(0.5, 0.7, 0.25);
  const bpMat = new THREE.MeshStandardMaterial({ color: 0x2d2d5e, metalness: 0.3, roughness: 0.6 });
  const backpack = new THREE.Mesh(bpGeom, bpMat);
  backpack.position.set(0, 0.85, -0.3);
  backpack.castShadow = true;
  robot.add(backpack);

  // Mouth / visor
  const visorGeom = new THREE.BoxGeometry(0.3, 0.06, 0.05);
  const visorMat = new THREE.MeshStandardMaterial({ color: 0x4ecdc4, emissive: 0x4ecdc4, emissiveIntensity: 0.3 });
  const visor = new THREE.Mesh(visorGeom, visorMat);
  visor.position.set(0, 1.35, 0.2);
  robot.add(visor);

  return robot;
}

function onModelReady() {
  window.__3D_STATE__.modelLoaded = true;
  const loadingScreen = document.getElementById('loading-screen');
  loadingScreen.style.opacity = '0';
  setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
}

loader.load(
  'robot.glb',
  (gltf) => {
    robotModel = gltf.scene;
    robotModel.scale.set(1.0, 1.0, 1.0);
    robotModel.position.set(0, 0, 0);
    robotModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    rotationGroup.add(robotModel);
    onModelReady();
  },
  undefined,
  (error) => {
    console.warn('Could not load robot.glb, using fallback robot:', error);
    robotModel = createFallbackRobot();
    rotationGroup.add(robotModel);
    onModelReady();
  }
);

// Add some particles for atmosphere
const particleCount = 100;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 10;
  particlePositions[i * 3 + 1] = Math.random() * 5;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 10;
}
particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x4ecdc4, size: 0.02, transparent: true, opacity: 0.4 });
const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// DOM elements
const infoPanel = document.getElementById('info-panel');
const featureNameEl = document.getElementById('feature-name');
const featureDescEl = document.getElementById('feature-desc');
const featureIconEl = document.getElementById('feature-icon');
const scoreValueEl = document.getElementById('score-value');
const progressFill = document.getElementById('progress-fill');
const completionBadge = document.getElementById('completion-badge');
const autoRotateBtn = document.getElementById('auto-rotate-btn');
const resetBtn = document.getElementById('reset-btn');
const closePanel = document.getElementById('close-panel');
const tooltip = document.getElementById('tooltip');

function updateState() {
  const state = window.__3D_STATE__;
  state.featuresDiscovered = discoveredSet.size;
  state.discoveredFeatures = Array.from(discoveredSet);
  state.score = discoveredSet.size * 20;
  state.allDiscovered = discoveredSet.size === 5;
  state.totalRatings = Object.keys(state.ratings).length;
  state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
  state.panelVisible = infoPanel.style.display !== 'none';

  scoreValueEl.textContent = state.score;
  progressFill.style.width = (state.score) + '%';
}

function showFeature(index) {
  const feature = features[index];
  const state = window.__3D_STATE__;

  // Add to discovered
  if (!discoveredSet.has(feature.name)) {
    discoveredSet.add(feature.name);
  }

  state.currentFeature = feature.name;

  // Update panel
  featureNameEl.textContent = feature.name;
  featureDescEl.textContent = feature.desc;
  featureIconEl.textContent = feature.icon;
  featureIconEl.style.background = feature.color + '22';
  featureIconEl.style.border = `2px solid ${feature.color}`;

  // Update stars
  const currentRating = state.ratings[feature.name] || 0;
  updateStarDisplay(currentRating);

  infoPanel.style.display = 'block';
  // Re-trigger animation
  infoPanel.style.animation = 'none';
  infoPanel.offsetHeight; // reflow
  infoPanel.style.animation = 'slideIn 0.3s ease';

  updateState();

  // Check completion
  if (discoveredSet.size === 5 && !state._badgeShown) {
    state._badgeShown = true;
    setTimeout(() => {
      completionBadge.style.display = 'block';
      setTimeout(() => {
        completionBadge.style.display = 'none';
      }, 4000);
    }, 500);
  }
}

function updateStarDisplay(rating) {
  for (let i = 1; i <= 5; i++) {
    const starBtn = document.getElementById(`star-${i}`);
    if (i <= rating) {
      starBtn.classList.add('active');
    } else {
      starBtn.classList.remove('active');
    }
  }
}

// Star click handlers
for (let i = 1; i <= 5; i++) {
  document.getElementById(`star-${i}`).addEventListener('click', () => {
    const state = window.__3D_STATE__;
    if (state.currentFeature) {
      state.ratings[state.currentFeature] = i;
      updateStarDisplay(i);
      updateState();
    }
  });
}

// Close panel
closePanel.addEventListener('click', () => {
  infoPanel.style.display = 'none';
  window.__3D_STATE__.currentFeature = null;
  window.__3D_STATE__.panelVisible = false;
});

// Auto rotate toggle
autoRotateBtn.addEventListener('click', () => {
  const state = window.__3D_STATE__;
  state.autoRotate = !state.autoRotate;
  autoRotateBtn.textContent = `🔄 Auto Rotate: ${state.autoRotate ? 'ON' : 'OFF'}`;
  if (state.autoRotate) {
    autoRotateBtn.classList.add('active');
  } else {
    autoRotateBtn.classList.remove('active');
  }
});

// Reset button
resetBtn.addEventListener('click', () => {
  const state = window.__3D_STATE__;
  discoveredSet.clear();
  state.ratings = {};
  state.currentFeature = null;
  state.score = 0;
  state.allDiscovered = false;
  state._badgeShown = false;
  infoPanel.style.display = 'none';
  completionBadge.style.display = 'none';
  updateState();
});

// Click handler
renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const allHotspotMeshes = [];
  hotspots.forEach(group => {
    group.children.forEach(child => allHotspotMeshes.push(child));
  });

  const intersects = raycaster.intersectObjects(allHotspotMeshes, false);
  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const parentGroup = hit.parent;
    if (parentGroup && parentGroup.userData.featureIndex !== undefined) {
      showFeature(parentGroup.userData.featureIndex);
    }
  }
});

// Hover tooltip
renderer.domElement.addEventListener('mousemove', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const allHotspotMeshes = [];
  hotspots.forEach(group => {
    group.children.forEach(child => allHotspotMeshes.push(child));
  });

  const intersects = raycaster.intersectObjects(allHotspotMeshes, false);
  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const parentGroup = hit.parent;
    if (parentGroup && parentGroup.userData.featureName) {
      tooltip.style.display = 'block';
      tooltip.textContent = parentGroup.userData.featureName;
      tooltip.style.left = (event.clientX + 15) + 'px';
      tooltip.style.top = (event.clientY - 10) + 'px';
      renderer.domElement.style.cursor = 'pointer';
    }
  } else {
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();

  // Pulse hotspots
  hotspots.forEach((group, i) => {
    const scale = 0.8 + 0.4 * (0.5 + 0.5 * Math.sin(elapsed * 3 + i * 1.2));
    group.scale.setScalar(scale);

    // Also bob slightly
    group.position.y = features[i].position.y + Math.sin(elapsed * 2 + i) * 0.03;
  });

  // Auto rotate
  if (window.__3D_STATE__.autoRotate) {
    rotationGroup.rotation.y += 0.01;
  }

  // Animate ring
  ring.material.opacity = 0.3 + 0.2 * Math.sin(elapsed * 2);

  // Animate particles
  const positions = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3 + 1] += 0.002;
    if (positions[i * 3 + 1] > 5) positions[i * 3 + 1] = 0;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  controls.update();
  updateState();
  renderer.render(scene, camera);
}

animate();
</script>
