<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Tectonic Plate Movement Simulator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #001133;
      color: #fff;
    }

    body {
      position: relative;
    }

    #bgGradient {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 20%, #113366 0%, #001133 70%, #000814 100%);
      z-index: -2;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 10, 30, 0.7);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      width: 320px;
    }

    #ui label, #ui select, #ui button, #ui input {
      display: block;
      margin: 6px 0;
      width: 100%;
      box-sizing: border-box;
    }

    #ui button, #ui select, #ui input[type="range"] {
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    #ui button {
      background: #1d5fa7;
      color: white;
      cursor: pointer;
    }

    #ui button:hover {
      background: #2776cd;
    }

    #hud {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(0, 10, 30, 0.7);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      min-width: 280px;
      line-height: 1.5;
      font-size: 14px;
    }

    #infoPanel {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      width: 360px;
      max-width: calc(100vw - 24px);
      background: rgba(0, 10, 30, 0.82);
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      display: none;
      line-height: 1.45;
      font-size: 14px;
    }

    .small {
      font-size: 12px;
      opacity: 0.9;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="bgGradient"></div>

  <div id="ui">
    <label for="boundaryType">Boundary Type</label>
    <select id="boundaryType">
      <option value="convergent" selected>convergent</option>
      <option value="divergent">divergent</option>
      <option value="transform">transform</option>
    </select>

    <button id="startBtn">Start Simulation</button>
    <button id="resetBtn">Reset</button>

    <label for="speedSlider">Speed: <span id="speedValue">1.0</span></label>
    <input id="speedSlider" type="range" min="0.1" max="3.0" step="0.1" value="1.0" />

    <button id="stepBtn">Time Step</button>
    <button id="infoToggle">Toggle Educational Info</button>
    <div class="small">Each discrete step = 0.5 units of simulation timing.</div>
  </div>

  <div id="hud">
    <div><strong>Boundary:</strong> <span id="boundaryDisplay">convergent</span></div>
    <div><strong>Distance:</strong> <span id="distanceDisplay">22.00</span></div>
    <div><strong>Plate A:</strong> <span id="plateAPos">(-11.00, 0.00, 0.00)</span></div>
    <div><strong>Plate B:</strong> <span id="plateBPos">(11.00, 0.00, 0.00)</span></div>
    <div><strong>Step Count:</strong> <span id="stepCount">0</span></div>
    <div><strong>Plate B Elevation:</strong> <span id="elevationDisplay">0.00</span></div>
    <div><strong>Earthquakes:</strong> <span id="quakeCount">0</span></div>
  </div>

  <div id="infoPanel"></div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const INITIALS = {
      plateA: { x: -11, y: 0, z: 0 },
      plateB: { x: 11, y: 0, z: 0 }
    };

    const ui = {
      boundaryType: document.getElementById("boundaryType"),
      startBtn: document.getElementById("startBtn"),
      resetBtn: document.getElementById("resetBtn"),
      speedSlider: document.getElementById("speedSlider"),
      speedValue: document.getElementById("speedValue"),
      stepBtn: document.getElementById("stepBtn"),
      infoToggle: document.getElementById("infoToggle"),
      infoPanel: document.getElementById("infoPanel"),
      boundaryDisplay: document.getElementById("boundaryDisplay"),
      distanceDisplay: document.getElementById("distanceDisplay"),
      plateAPos: document.getElementById("plateAPos"),
      plateBPos: document.getElementById("plateBPos"),
      stepCount: document.getElementById("stepCount"),
      elevationDisplay: document.getElementById("elevationDisplay"),
      quakeCount: document.getElementById("quakeCount")
    };

    const infoText = {
      convergent: `
        <h3>Convergent Boundary</h3>
        <p>Convergent boundaries form where two tectonic plates move toward one another.</p>
        <p>When plates collide, one plate may dive beneath the other in a process called <strong>subduction</strong>, or both can crumple upward to form mountains.</p>
        <p>These regions often produce volcanoes, deep ocean trenches, and powerful earthquakes.</p>
      `,
      divergent: `
        <h3>Divergent Boundary</h3>
        <p>Divergent boundaries form where tectonic plates move apart.</p>
        <p>As the plates separate, magma rises from below and cools to create new crust, often forming mid-ocean ridges.</p>
        <p>This process is a major driver of seafloor spreading.</p>
      `,
      transform: `
        <h3>Transform Boundary</h3>
        <p>Transform boundaries form where plates slide horizontally past each other.</p>
        <p>These boundaries do not usually create or destroy crust, but friction can cause stress to build up.</p>
        <p>When that stress is released, earthquakes can occur suddenly.</p>
      `
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#001133");
    scene.fog = new THREE.Fog("#001133", 80, 180);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(10, 30, 10);
    scene.add(directionalLight);

    const baseCameraPos = new THREE.Vector3(0, 30, 50);
    let shakeUntil = 0;

    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      plateA_x: INITIALS.plateA.x,
      plateA_z: INITIALS.plateA.z,
      plateB_x: INITIALS.plateB.x,
      plateB_z: INITIALS.plateB.z,
      plateB_y: INITIALS.plateB.y,
      plateA_rotZ: 0,
      boundaryType: "convergent",
      isRunning: false,
      speed: 1.0,
      stepCount: 0,
      distance: 22.00,
      ridgeHeight: 0,
      earthquakeCount: 0,
      foxLoaded: false,
      foxPosition: { x: 8, y: 1.5, z: 0 },
      infoPanelVisible: false,
      collisionDetected: false,
      magmaVisible: true
    };

    function safeNum(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function fmt(n) {
      return safeNum(n).toFixed(2);
    }

    const plateGroup = new THREE.Group();
    scene.add(plateGroup);

    function createTerrainPlate(colorHex) {
      const group = new THREE.Group();

      const plateMat = new THREE.MeshStandardMaterial({
        color: colorHex,
        roughness: 0.95,
        metalness: 0.05
      });

      const plate = new THREE.Mesh(
        new THREE.BoxGeometry(20, 2, 20),
        plateMat
      );
      plate.castShadow = false;
      plate.receiveShadow = true;
      group.add(plate);

      const bumpMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(colorHex).offsetHSL(0, 0, 0.07),
        roughness: 1
      });

      for (let i = 0; i < 40; i++) {
        const w = 0.8 + Math.random() * 1.4;
        const h = 0.2 + Math.random() * 1.2;
        const d = 0.8 + Math.random() * 1.4;
        const bump = new THREE.Mesh(
          new THREE.BoxGeometry(w, h, d),
          bumpMat
        );
        bump.position.set(
          -8 + Math.random() * 16,
          1 + h / 2,
          -8 + Math.random() * 16
        );
        group.add(bump);
      }

      return group;
    }

    const plateA = createTerrainPlate("#2a3d5c");
    plateA.position.set(INITIALS.plateA.x, INITIALS.plateA.y, INITIALS.plateA.z);
    plateGroup.add(plateA);

    const plateB = createTerrainPlate("#8B6914");
    plateB.position.set(INITIALS.plateB.x, INITIALS.plateB.y, INITIALS.plateB.z);
    plateGroup.add(plateB);

    const magmaTexture = new THREE.CanvasTexture(createMagmaCanvas());
    magmaTexture.wrapS = THREE.RepeatWrapping;
    magmaTexture.wrapT = THREE.RepeatWrapping;
    magmaTexture.repeat.set(6, 6);

    function createMagmaCanvas() {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");

      const grad = ctx.createLinearGradient(0, 0, 256, 256);
      grad.addColorStop(0, "#ff3300");
      grad.addColorStop(0.5, "#ff8800");
      grad.addColorStop(1, "#660000");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 256);

      for (let i = 0; i < 60; i++) {
        ctx.fillStyle = `rgba(255, ${80 + Math.random() * 120}, 0, ${0.15 + Math.random() * 0.3})`;
        ctx.beginPath();
        ctx.arc(Math.random() * 256, Math.random() * 256, 8 + Math.random() * 20, 0, Math.PI * 2);
        ctx.fill();
      }
      return canvas;
    }

    const magmaMat = new THREE.MeshStandardMaterial({
      map: magmaTexture,
      emissive: new THREE.Color("#ff4400"),
      emissiveIntensity: 1.2,
      side: THREE.DoubleSide
    });

    const magmaLayer = new THREE.Mesh(
      new THREE.PlaneGeometry(80, 40, 1, 1),
      magmaMat
    );
    magmaLayer.rotation.x = -Math.PI / 2;
    magmaLayer.position.set(0, -3, 0);
    scene.add(magmaLayer);

    const ridge = new THREE.Mesh(
      new THREE.BoxGeometry(2, 0.2, 18),
      new THREE.MeshStandardMaterial({
        color: "#ff3300",
        emissive: "#ff2200",
        emissiveIntensity: 1.5
      })
    );
    ridge.position.set(0, -1.9, 0);
    ridge.visible = false;
    scene.add(ridge);

    const boundaryMarker = new THREE.Mesh(
      new THREE.BoxGeometry(0.4, 0.2, 20),
      new THREE.MeshBasicMaterial({ color: "#ffff66", transparent: true, opacity: 0.35 })
    );
    boundaryMarker.position.set(0, 1.1, 0);
    scene.add(boundaryMarker);

    const groundGrid = new THREE.GridHelper(120, 60, 0x335577, 0x223344);
    groundGrid.position.y = -3.1;
    scene.add(groundGrid);

    const sparkGroup = new THREE.Group();
    scene.add(sparkGroup);
    const sparks = [];
    function triggerSparks() {
      for (let i = 0; i < 20; i++) {
        const m = new THREE.Mesh(
          new THREE.SphereGeometry(0.12, 8, 8),
          new THREE.MeshBasicMaterial({ color: "#ff9900", transparent: true })
        );
        m.position.set((Math.random() - 0.5) * 1.5, 1 + Math.random() * 2, (Math.random() - 0.5) * 6);
        m.userData.vel = new THREE.Vector3(
          (Math.random() - 0.5) * 0.15,
          0.05 + Math.random() * 0.12,
          (Math.random() - 0.5) * 0.15
        );
        m.userData.life = 1.0;
        sparkGroup.add(m);
        sparks.push(m);
      }
    }

    const shockwaveGroup = new THREE.Group();
    scene.add(shockwaveGroup);
    const shockwaves = [];
    function triggerShockwave() {
      const geo = new THREE.RingGeometry(0.8, 1.2, 32);
      const mat = new THREE.MeshBasicMaterial({
        color: "#99ddff",
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.8
      });
      const ring = new THREE.Mesh(geo, mat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.set(0, 1.2, 0);
      ring.userData.life = 1.0;
      shockwaveGroup.add(ring);
      shockwaves.push(ring);
    }

    let fox = null;
    let mixer = null;
    const loader = new GLTFLoader();
    loader.load(
      "https://raw.githubusercontent.com/AlaricBaraworWorWorWorWorWorWorWorWorWorWorWorWor/assets/main/Fox.glb",
      (gltf) => {
        fox = gltf.scene;
        fox.scale.set(0.03, 0.03, 0.03);
        fox.position.set(8, 1.5, 0);
        fox.rotation.y = -Math.PI / 2;
        plateB.add(fox);

        if (gltf.animations && gltf.animations.length) {
          mixer = new THREE.AnimationMixer(fox);
          const clip = gltf.animations[0];
          mixer.clipAction(clip).play();
        }

        window.__3D_STATE__.foxLoaded = true;
        updateFoxState();
      },
      undefined,
      () => {
        window.__3D_STATE__.foxLoaded = false;
      }
    );

    let isRunning = false;
    let accumulator = 0;
    let stepCount = 0;
    let earthquakeCount = 0;
    let ridgeHeight = 0;
    let collisionDetected = false;

    function getBoundaryType() {
      return ui.boundaryType.value || "convergent";
    }

    function getDistance() {
      const dx = safeNum(plateB.position.x) - safeNum(plateA.position.x);
      const dz = safeNum(plateB.position.z) - safeNum(plateA.position.z);
      return Math.sqrt(dx * dx + dz * dz);
    }

    function getEdgeGapX() {
      const rightEdgeA = plateA.position.x + 10;
      const leftEdgeB = plateB.position.x - 10;
      return leftEdgeB - rightEdgeA;
    }

    function setInfoPanelText() {
      const type = getBoundaryType();
      ui.infoPanel.innerHTML = infoText[type] || "";
    }

    function updateFoxState() {
      if (fox) {
        const wp = new THREE.Vector3();
        fox.getWorldPosition(wp);
        window.__3D_STATE__.foxPosition = {
          x: safeNum(wp.x),
          y: safeNum(wp.y),
          z: safeNum(wp.z)
        };
      } else {
        window.__3D_STATE__.foxPosition = { x: 8, y: 1.5, z: 0 };
      }
    }

    function updateHUD() {
      const distance = getDistance();
      ui.boundaryDisplay.textContent = getBoundaryType();
      ui.distanceDisplay.textContent = fmt(distance);
      ui.plateAPos.textContent = `(${fmt(plateA.position.x)}, ${fmt(plateA.position.y)}, ${fmt(plateA.position.z)})`;
      ui.plateBPos.textContent = `(${fmt(plateB.position.x)}, ${fmt(plateB.position.y)}, ${fmt(plateB.position.z)})`;
      ui.stepCount.textContent = String(stepCount);
      ui.elevationDisplay.textContent = fmt(plateB.position.y);
      ui.quakeCount.textContent = String(earthquakeCount);
      ui.speedValue.textContent = Number(ui.speedSlider.value).toFixed(1);
    }

    function updateState() {
      const distance = Number(fmt(getDistance()));
      window.__3D_STATE__.plateA_x = safeNum(plateA.position.x, INITIALS.plateA.x);
      window.__3D_STATE__.plateA_z = safeNum(plateA.position.z, INITIALS.plateA.z);
      window.__3D_STATE__.plateB_x = safeNum(plateB.position.x, INITIALS.plateB.x);
      window.__3D_STATE__.plateB_z = safeNum(plateB.position.z, INITIALS.plateB.z);
      window.__3D_STATE__.plateB_y = safeNum(plateB.position.y, INITIALS.plateB.y);
      window.__3D_STATE__.plateA_rotZ = safeNum(THREE.MathUtils.radToDeg(plateA.rotation.z), 0);
      window.__3D_STATE__.boundaryType = getBoundaryType();
      window.__3D_STATE__.isRunning = !!isRunning;
      window.__3D_STATE__.speed = safeNum(Number(ui.speedSlider.value), 1);
      window.__3D_STATE__.stepCount = safeNum(stepCount, 0);
      window.__3D_STATE__.distance = safeNum(distance, 0);
      window.__3D_STATE__.ridgeHeight = safeNum(ridgeHeight, 0);
      window.__3D_STATE__.earthquakeCount = safeNum(earthquakeCount, 0);
      window.__3D_STATE__.infoPanelVisible = ui.infoPanel.style.display !== "none";
      window.__3D_STATE__.collisionDetected = !!collisionDetected;
      window.__3D_STATE__.magmaVisible = !!magmaLayer.visible;
      if (!window.__3D_STATE__.foxLoaded) {
        window.__3D_STATE__.foxLoaded = false;
      }
      updateFoxState();
    }

    function resetSimulation() {
      isRunning = false;
      accumulator = 0;
      stepCount = 0;
      earthquakeCount = 0;
      ridgeHeight = 0;
      collisionDetected = false;

      plateA.position.set(INITIALS.plateA.x, INITIALS.plateA.y, INITIALS.plateA.z);
      plateA.rotation.set(0, 0, 0);

      plateB.position.set(INITIALS.plateB.x, INITIALS.plateB.y, INITIALS.plateB.z);
      plateB.rotation.set(0, 0, 0);

      ridge.scale.set(1, 1, 1);
      ridge.position.set(0, -1.9, 0);
      ridge.visible = getBoundaryType() === "divergent";

      sparks.splice(0).forEach(s => {
        sparkGroup.remove(s);
        s.geometry.dispose();
        s.material.dispose();
      });

      shockwaves.splice(0).forEach(r => {
        shockwaveGroup.remove(r);
        r.geometry.dispose();
        r.material.dispose();
      });

      updateHUD();
      updateState();
    }

    function simulationStep() {
      const type = getBoundaryType();
      stepCount += 1;
      collisionDetected = false;

      if (type === "convergent") {
        const gap = getEdgeGapX();

        if (gap > 0.5) {
          plateA.position.x += 0.5;
          plateB.position.x -= 0.5;
        } else {
          collisionDetected = true;
          plateB.position.y += 0.3;
          plateA.rotation.z -= THREE.MathUtils.degToRad(2);
          triggerSparks();
        }

        ridge.visible = false;
      }

      if (type === "divergent") {
        plateA.position.x -= 0.5;
        plateB.position.x += 0.5;
        ridgeHeight += 0.4;
        ridge.visible = true;
        ridge.scale.y = Math.max(0.1, ridgeHeight);
        ridge.position.y = -2 + (ridgeHeight / 2);
      }

      if (type === "transform") {
        plateA.position.z += 0.5;
        plateB.position.z -= 0.5;
        ridge.visible = false;

        if (stepCount % 3 === 0) {
          earthquakeCount += 1;
          shakeUntil = performance.now() + 500;
          triggerShockwave();
        }
      }

      updateHUD();
      updateState();
    }

    ui.startBtn.addEventListener("click", () => {
      isRunning = true;
      updateState();
    });

    ui.resetBtn.addEventListener("click", resetSimulation);

    ui.stepBtn.addEventListener("click", () => {
      simulationStep();
    });

    ui.speedSlider.addEventListener("input", () => {
      ui.speedValue.textContent = Number(ui.speedSlider.value).toFixed(1);
      updateState();
    });

    ui.boundaryType.addEventListener("change", () => {
      setInfoPanelText();
      resetSimulation();
      updateHUD();
      updateState();
    });

    ui.infoToggle.addEventListener("click", () => {
      const visible = ui.infoPanel.style.display !== "none";
      ui.infoPanel.style.display = visible ? "none" : "block";
      setInfoPanelText();
      updateState();
    });

    setInfoPanelText();
    resetSimulation();

    function animateEffects(delta) {
      magmaTexture.offset.x += 0.03 * delta;
      magmaTexture.offset.y += 0.015 * delta;
      magmaMat.emissiveIntensity = 1.0 + 0.25 * Math.sin(performance.now() * 0.002);

      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.position.add(s.userData.vel);
        s.userData.vel.y -= 0.003;
        s.userData.life -= 0.025;
        s.material.opacity = Math.max(0, s.userData.life);
        if (s.userData.life <= 0) {
          sparkGroup.remove(s);
          s.geometry.dispose();
          s.material.dispose();
          sparks.splice(i, 1);
        }
      }

      for (let i = shockwaves.length - 1; i >= 0; i--) {
        const r = shockwaves[i];
        r.scale.multiplyScalar(1.05);
        r.userData.life -= 0.025;
        r.material.opacity = Math.max(0, r.userData.life * 0.8);
        if (r.userData.life <= 0) {
          shockwaveGroup.remove(r);
          r.geometry.dispose();
          r.material.dispose();
          shockwaves.splice(i, 1);
        }
      }
    }

    function updateCameraShake() {
      const now = performance.now();
      if (now < shakeUntil) {
        camera.position.set(
          baseCameraPos.x + (Math.random() - 0.5) * 0.8,
          baseCameraPos.y + (Math.random() - 0.5) * 0.8,
          baseCameraPos.z + (Math.random() - 0.5) * 0.8
        );
      } else {
        camera.position.lerp(baseCameraPos, 0.1);
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (mixer) mixer.update(delta);

      if (isRunning) {
        const speed = safeNum(Number(ui.speedSlider.value), 1);
        accumulator += delta * speed;
        const stepInterval = 0.5;

        while (accumulator >= stepInterval) {
          simulationStep();
          accumulator -= stepInterval;
        }
      }

      animateEffects(delta);
      updateCameraShake();
      controls.update();
      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
