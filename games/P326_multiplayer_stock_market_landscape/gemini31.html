<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Stock Market Landscape</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(10, 10, 46, 0.8);
            border: 1px solid #334466;
            padding: 15px;
            color: #ffffff;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            min-width: 250px;
        }
        .hud-row {
            margin-bottom: 8px;
            font-size: 14px;
        }
        .hud-title {
            color: #88aaff;
            font-weight: bold;
            margin-bottom: 5px;
            border-bottom: 1px solid #334466;
            padding-bottom: 2px;
        }
        .stock-price { color: #00ff88; }
        .status-running { color: #00ff88; font-weight: bold; }
        .status-paused { color: #ff4444; font-weight: bold; }
        
        #speed-btn {
            pointer-events: auto;
            background: #334466;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            margin-top: 10px;
            width: 100%;
        }
        #speed-btn:hover { background: #445577; }

        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            border: 1px solid #88aaff;
            border-radius: 4px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -100%);
            z-index: 20;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(136, 170, 255, 0.5);
        }
        
        #controls-help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div class="hud-title">MARKET STATUS</div>
        <div class="hud-row">Status: <span id="hud-status" class="status-running">RUNNING</span></div>
        <div class="hud-row">Tick: <span id="hud-tick">0</span></div>
        
        <div class="hud-title" style="margin-top: 10px;">STOCKS</div>
        <div id="hud-stocks"></div>
        
        <div class="hud-title" style="margin-top: 10px;">TRADERS</div>
        <div id="hud-traders"></div>
        
        <button id="speed-btn">Speed: 2000ms</button>
    </div>

    <div id="tooltip">
        <div id="tt-name" style="color:#88aaff"></div>
        <div id="tt-price" style="color:#00ff88; font-size: 1.2em;"></div>
    </div>

    <div id="controls-help">
        [Orbit] Mouse | [P] Pause | [1-5] Highlight | [Click] Tooltip | [R] Reset | [T] Camera
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            tickCount: 0,
            paused: false,
            stockPrices: { AAPL: 150, GOOG: 120, MSFT: 80, AMZN: 200, TSLA: 100 },
            stockHeights: [15, 12, 8, 20, 10],
            traderPortfolios: [10000, 10000, 10000, 10000],
            selectedStock: null,
            tooltipVisible: false,
            tooltipStock: null,
            cameraMode: 'orbit',
            tickInterval: 2000,
            lanternCount: 0,
            lanternIntensities: [2, 2, 2, 2],
            totalMarketCap: 650,
            resetCount: 0
        };
        const state = window.__3D_STATE__;

        // --- Data Structures ---
        const stockData = [
            { name: 'AAPL', color: 0x00ff88, initPrice: 150, x: -20 },
            { name: 'GOOG', color: 0xff4444, initPrice: 120, x: -10 },
            { name: 'MSFT', color: 0x4488ff, initPrice: 80,  x: 0 },
            { name: 'AMZN', color: 0xffaa00, initPrice: 200, x: 10 },
            { name: 'TSLA', color: 0xaa44ff, initPrice: 100, x: 20 }
        ];

        const traderData = [
            { pos: new THREE.Vector3(-30, 0, -30) },
            { pos: new THREE.Vector3(30, 0, -30) },
            { pos: new THREE.Vector3(-30, 0, 30) },
            { pos: new THREE.Vector3(30, 0, 30) }
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x050515, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(100, 50, 0x223355, 0x111122);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- Objects ---
        const stockMeshes = [];
        const boxGeo = new THREE.BoxGeometry(4, 1, 4);
        boxGeo.translate(0, 0.5, 0); // Pivot at bottom

        stockData.forEach((data, index) => {
            const mat = new THREE.MeshStandardMaterial({ 
                color: data.color,
                roughness: 0.4,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(boxGeo, mat);
            mesh.position.set(data.x, 0, 0);
            
            // Init height
            const initHeight = data.initPrice / 10;
            mesh.scale.y = initHeight;
            state.stockHeights[index] = initHeight;
            
            mesh.userData = { index: index, name: data.name, color: data.color };
            scene.add(mesh);
            stockMeshes.push(mesh);
        });

        // Lanterns & Traders
        const traderLights = [];
        const gltfLoader = new GLTFLoader();
        // Using a reliable raw github link for the Khronos sample model
        const lanternUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF/Lantern.gltf';

        gltfLoader.load(lanternUrl, (gltf) => {
            traderData.forEach((data, index) => {
                const model = gltf.scene.clone();
                model.position.copy(data.pos);
                model.scale.set(3, 3, 3);
                scene.add(model);
                state.lanternCount++;

                const pLight = new THREE.PointLight(0xffaa44, 2, 25);
                pLight.position.copy(data.pos);
                pLight.position.y = 8;
                scene.add(pLight);
                traderLights.push(pLight);
            });
        }, undefined, (error) => {
            console.error("Error loading lantern model, falling back to basic lights.", error);
            // Fallback if model fails to load
            traderData.forEach((data, index) => {
                const pLight = new THREE.PointLight(0xffaa44, 2, 25);
                pLight.position.copy(data.pos);
                pLight.position.y = 8;
                scene.add(pLight);
                traderLights.push(pLight);
                
                // Simple placeholder mesh
                const ph = new THREE.Mesh(new THREE.CylinderGeometry(1,1,4), new THREE.MeshStandardMaterial({color:0x555555}));
                ph.position.copy(data.pos);
                ph.position.y = 2;
                scene.add(ph);
            });
        });

        // --- UI Elements ---
        const hudStatus = document.getElementById('hud-status');
        const hudTick = document.getElementById('hud-tick');
        const hudStocks = document.getElementById('hud-stocks');
        const hudTraders = document.getElementById('hud-traders');
        const speedBtn = document.getElementById('speed-btn');
        const tooltip = document.getElementById('tooltip');
        const ttName = document.getElementById('tt-name');
        const ttPrice = document.getElementById('tt-price');

        function updateHUD() {
            hudTick.innerText = state.tickCount;
            hudStatus.innerText = state.paused ? "PAUSED" : "RUNNING";
            hudStatus.className = state.paused ? "status-paused" : "status-running";
            
            let stocksHtml = '';
            stockData.forEach((s, i) => {
                let price = state.stockPrices[s.name].toFixed(2);
                let colorStr = '#' + s.color.toString(16).padStart(6, '0');
                let bg = state.selectedStock === i ? 'rgba(255,255,255,0.2)' : 'transparent';
                stocksHtml += `<div class="hud-row" style="background:${bg}; padding:2px;">
                    <span style="color:${colorStr}; display:inline-block; width:40px;">${s.name}</span>: 
                    <span class="stock-price">${price}</span>
                </div>`;
            });
            hudStocks.innerHTML = stocksHtml;

            let tradersHtml = '';
            state.traderPortfolios.forEach((p, i) => {
                tradersHtml += `<div class="hud-row">Player${i+1}: $${p.toFixed(0)}</div>`;
            });
            hudTraders.innerHTML = tradersHtml;
        }
        updateHUD();

        // --- Simulation Logic ---
        let tickTimer;
        function marketTick() {
            if (state.paused) {
                tickTimer = setTimeout(marketTick, state.tickInterval);
                return;
            }

            state.tickCount++;
            let totalCap = 0;
            const priceChanges = [];

            // Update Stocks
            stockData.forEach((s, i) => {
                let currentPrice = state.stockPrices[s.name];
                let change = (Math.random() * 16) - 8; // -8 to +8
                let newPrice = currentPrice + change;
                
                // Clamp
                newPrice = Math.max(10, Math.min(300, newPrice));
                priceChanges.push(newPrice - currentPrice);
                
                state.stockPrices[s.name] = newPrice;
                totalCap += newPrice;
            });
            state.totalMarketCap = totalCap;

            // Update Traders
            state.traderPortfolios.forEach((portfolio, i) => {
                let stockIdx = Math.floor(Math.random() * 5);
                let qty = Math.floor(Math.random() * 5) + 1; // 1 to 5
                let isBuy = Math.random() > 0.5;
                
                let pChange = priceChanges[stockIdx] * qty;
                if (!isBuy) pChange = -pChange; // Short selling logic
                
                let newPortfolio = portfolio + pChange;
                state.traderPortfolios[i] = Math.max(0, newPortfolio);
            });

            updateHUD();
            tickTimer = setTimeout(marketTick, state.tickInterval);
        }
        tickTimer = setTimeout(marketTick, state.tickInterval);

        // --- Interactions ---
        
        // Speed Button
        speedBtn.addEventListener('click', () => {
            if (state.tickInterval === 2000) state.tickInterval = 1000;
            else if (state.tickInterval === 1000) state.tickInterval = 500;
            else state.tickInterval = 2000;
            speedBtn.innerText = `Speed: ${state.tickInterval}ms`;
        });

        // Keyboard
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            // Pause
            if (key === 'p') {
                state.paused = !state.paused;
                updateHUD();
            }
            
            // Highlight 1-5
            if (['1','2','3','4','5'].includes(key)) {
                const idx = parseInt(key) - 1;
                if (state.selectedStock === idx) {
                    state.selectedStock = null; // deselect
                } else {
                    state.selectedStock = idx;
                }
                updateHUD();
            }

            // Reset
            if (key === 'r') {
                state.resetCount++;
                stockData.forEach((s, i) => {
                    state.stockPrices[s.name] = s.initPrice;
                });
                state.traderPortfolios = [10000, 10000, 10000, 10000];
                updateHUD();
            }

            // Camera Toggle
            if (key === 't') {
                if (state.cameraMode === 'orbit') {
                    state.cameraMode = 'topdown';
                    camera.position.set(0, 80, 0);
                    camera.lookAt(0, 0, 0);
                } else {
                    state.cameraMode = 'orbit';
                    camera.position.set(0, 30, 50);
                    camera.lookAt(0, 0, 0);
                }
                controls.target.set(0,0,0);
                controls.update();
            }
        });

        // Raycasting for Tooltip
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            // Ignore clicks on HUD
            if(e.target.closest('#hud')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(stockMeshes);

            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                const data = mesh.userData;
                state.tooltipVisible = true;
                state.tooltipStock = data.name;
                
                ttName.innerText = data.name;
                ttPrice.innerText = '$' + state.stockPrices[data.name].toFixed(2);
                tooltip.style.display = 'block';
            } else {
                state.tooltipVisible = false;
                state.tooltipStock = null;
                tooltip.style.display = 'none';
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Animate Stocks
            stockMeshes.forEach((mesh, i) => {
                const name = stockData[i].name;
                const targetHeight = state.stockPrices[name] / 10;
                
                // Lerp height
                mesh.scale.y += (targetHeight - mesh.scale.y) * 10 * delta;
                state.stockHeights[i] = mesh.scale.y;

                // Highlight logic
                const isSelected = state.selectedStock === i;
                const targetXZ = isSelected ? 1.3 : 1.0;
                mesh.scale.x += (targetXZ - mesh.scale.x) * 15 * delta;
                mesh.scale.z += (targetXZ - mesh.scale.z) * 15 * delta;

                if (isSelected) {
                    mesh.material.emissive.setHex(stockData[i].color).multiplyScalar(0.4);
                } else {
                    mesh.material.emissive.setHex(0x000000);
                }
            });

            // Animate Lantern Lights
            traderLights.forEach((light, i) => {
                const portfolio = state.traderPortfolios[i];
                let targetInt = portfolio / 5000;
                targetInt = Math.max(0.2, Math.min(4.0, targetInt));
                
                light.intensity += (targetInt - light.intensity) * 5 * delta;
                state.lanternIntensities[i] = light.intensity;
            });

            // Update Tooltip Position
            if (state.tooltipVisible && state.tooltipStock) {
                const idx = stockData.findIndex(s => s.name === state.tooltipStock);
                if (idx !== -1) {
                    const mesh = stockMeshes[idx];
                    const pos = new THREE.Vector3();
                    pos.setFromMatrixPosition(mesh.matrixWorld);
                    pos.y += mesh.scale.y; // Top of the bar
                    
                    pos.project(camera);
                    
                    const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (pos.y * -0.5 + 0.5) * window.innerHeight;
                    
                    tooltip.style.left = `${x}px`;
                    tooltip.style.top = `${y - 15}px`;
                    
                    // Update price dynamically while visible
                    ttPrice.innerText = '$' + state.stockPrices[state.tooltipStock].toFixed(2);
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
