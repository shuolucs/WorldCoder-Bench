<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Multiplayer Stock Market Landscape</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(10, 14, 30, 0.78);
      border: 1px solid rgba(120, 180, 255, 0.25);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 320px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
      line-height: 1.4;
    }

    #hud .title {
      font-weight: bold;
      color: #8fd3ff;
      margin-bottom: 8px;
      font-size: 15px;
    }

    #hud .row {
      margin: 6px 0;
      font-size: 14px;
    }

    #hud .green {
      color: #7CFF9E;
    }

    #hud .stocks,
    #hud .portfolios {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 4px;
    }

    #hud .chip {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 13px;
      white-space: nowrap;
    }

    #speedBtn {
      margin-top: 8px;
      background: #183153;
      color: #fff;
      border: 1px solid rgba(143, 211, 255, 0.35);
      border-radius: 6px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    #speedBtn:hover {
      background: #21436f;
    }

    #tooltip {
      position: fixed;
      z-index: 30;
      pointer-events: none;
      transform: translate(-50%, -120%);
      background: rgba(18, 20, 35, 0.92);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      display: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      white-space: nowrap;
    }

    #help {
      position: fixed;
      bottom: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(10, 14, 30, 0.7);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #b8c8ff;
      border: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div class="title">3D Stock Market HUD</div>
    <div class="row">Tick: <span id="tickCount" class="green">0</span></div>
    <div class="row">Status: <span id="status" class="green">RUNNING</span></div>
    <div class="row">Camera: <span id="cameraMode">orbit</span></div>
    <div class="row">Tick Interval: <span id="tickInterval">2000</span> ms</div>
    <div class="row">Market Cap: <span id="marketCap" class="green">650.00</span></div>

    <div class="row">Stocks:</div>
    <div id="stocksRow" class="stocks"></div>

    <div class="row">Traders:</div>
    <div id="portfoliosRow" class="portfolios"></div>

    <button id="speedBtn">Speed: 2000ms</button>
  </div>

  <div id="tooltip"></div>

  <div id="help">
    Keys: P pause, R reset, T top view, 1-5 highlight stock
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const tooltip = document.getElementById("tooltip");

    const tickCountEl = document.getElementById("tickCount");
    const statusEl = document.getElementById("status");
    const cameraModeEl = document.getElementById("cameraMode");
    const tickIntervalEl = document.getElementById("tickInterval");
    const marketCapEl = document.getElementById("marketCap");
    const stocksRowEl = document.getElementById("stocksRow");
    const portfoliosRowEl = document.getElementById("portfoliosRow");
    const speedBtn = document.getElementById("speedBtn");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );
    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 8, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(20, 40, 20);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshStandardMaterial({
        color: 0x111827,
        metalness: 0.2,
        roughness: 0.85
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(100, 20, 0x335577, 0x223344);
    grid.position.y = 0.02;
    scene.add(grid);

    // Stock data
    const stockNames = ["AAPL", "GOOG", "MSFT", "AMZN", "TSLA"];
    const stockColors = [0x00ff88, 0xff4444, 0x4488ff, 0xffaa00, 0xaa44ff];
    const stockPositions = [-20, -10, 0, 10, 20];
    const initialBarHeights = [10, 15, 8, 20, 12];
    const initialStockPrices = {
      AAPL: 150,
      GOOG: 120,
      MSFT: 80,
      AMZN: 200,
      TSLA: 100
    };

    let stockPrices = { ...initialStockPrices };
    let previousStockPrices = { ...initialStockPrices };
    let tickCount = 0;
    let paused = false;
    let selectedStock = null;
    let tooltipVisible = false;
    let tooltipStock = null;
    let cameraMode = "orbit";
    let tickInterval = 2000;
    let resetCount = 0;

    const barMeshes = [];
    const targetHeights = [...initialBarHeights];

    const barGroup = new THREE.Group();
    scene.add(barGroup);

    stockNames.forEach((name, i) => {
      const h = initialBarHeights[i];
      const geometry = new THREE.BoxGeometry(4, 1, 4);
      const material = new THREE.MeshStandardMaterial({
        color: stockColors[i],
        emissive: 0x000000,
        emissiveIntensity: 0
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.set(stockPositions[i], h / 2, 0);
      mesh.scale.y = h;
      mesh.userData = { stockIndex: i, stockName: name };
      barGroup.add(mesh);
      barMeshes.push(mesh);
    });

    // Lantern traders
    const traderPositions = [
      new THREE.Vector3(-30, 0, -30),
      new THREE.Vector3(30, 0, -30),
      new THREE.Vector3(-30, 0, 30),
      new THREE.Vector3(30, 0, 30)
    ];

    let traderPortfolios = [10000, 10000, 10000, 10000];
    const traderNames = ["Player1", "Player2", "Player3", "Player4"];
    const lanternLights = [];
    const lanternRoots = [];
    let lanternCount = 0;

    const warmColor = 0xffaa44;

    function addFallbackLantern(position) {
      const group = new THREE.Group();

      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.3, 6, 12),
        new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5, roughness: 0.4 })
      );
      pole.position.y = 3;
      group.add(pole);

      const lamp = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 16, 16),
        new THREE.MeshStandardMaterial({
          color: 0xffcc66,
          emissive: 0xaa5500,
          emissiveIntensity: 0.8
        })
      );
      lamp.position.y = 7;
      group.add(lamp);

      group.position.copy(position);
      group.scale.set(3, 3, 3);
      scene.add(group);
      lanternRoots.push(group);
      lanternCount++;
    }

    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      "Lantern.glb",
      (gltf) => {
        traderPositions.forEach((pos) => {
          const instance = gltf.scene.clone(true);
          instance.position.copy(pos);
          instance.scale.set(3, 3, 3);
          instance.traverse((obj) => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
            }
          });
          scene.add(instance);
          lanternRoots.push(instance);
          lanternCount++;
        });
        syncState();
      },
      undefined,
      () => {
        traderPositions.forEach((pos) => addFallbackLantern(pos));
        syncState();
      }
    );

    traderPositions.forEach((pos) => {
      const light = new THREE.PointLight(warmColor, 2, 25);
      light.position.set(pos.x, 8, pos.z);
      scene.add(light);
      lanternLights.push(light);
    });

    // Decorative points
    const starGeo = new THREE.BufferGeometry();
    const starCount = 300;
    const starPositions = [];
    for (let i = 0; i < starCount; i++) {
      starPositions.push((Math.random() - 0.5) * 250);
      starPositions.push(Math.random() * 120 + 20);
      starPositions.push((Math.random() - 0.5) * 250);
    }
    starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starPositions, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ color: 0x88aaff, size: 0.6 })
    );
    scene.add(stars);

    // Raycasting
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let tooltipTargetMesh = null;

    function formatMoney(n) {
      return Number(n).toFixed(2);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function totalMarketCap() {
      return stockNames.reduce((sum, name) => sum + stockPrices[name], 0);
    }

    function updateHUD() {
      tickCountEl.textContent = tickCount;
      statusEl.textContent = paused ? "PAUSED" : "RUNNING";
      statusEl.className = paused ? "" : "green";
      cameraModeEl.textContent = cameraMode;
      tickIntervalEl.textContent = tickInterval;
      marketCapEl.textContent = formatMoney(totalMarketCap());

      stocksRowEl.innerHTML = "";
      stockNames.forEach((name, i) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.style.color = "#" + new THREE.Color(stockColors[i]).getHexString();
        chip.textContent = `${name}: ${formatMoney(stockPrices[name])}`;
        stocksRowEl.appendChild(chip);
      });

      portfoliosRowEl.innerHTML = "";
      traderNames.forEach((name, i) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = `${name}: ${formatMoney(traderPortfolios[i])}`;
        portfoliosRowEl.appendChild(chip);
      });

      speedBtn.textContent = `Speed: ${tickInterval}ms`;
    }

    function syncState() {
      window.__3D_STATE__ = {
        tickCount,
        paused,
        stockPrices: { ...stockPrices },
        stockHeights: barMeshes.map((m) => m.scale.y),
        traderPortfolios: [...traderPortfolios],
        selectedStock,
        tooltipVisible,
        tooltipStock,
        cameraMode,
        tickInterval,
        lanternCount,
        lanternIntensities: lanternLights.map((l) => l.intensity),
        totalMarketCap: totalMarketCap(),
        resetCount
      };
    }

    function setTooltipForMesh(mesh) {
      tooltipTargetMesh = mesh;
      const name = mesh.userData.stockName;
      tooltip.innerHTML = `<strong>${name}</strong><br>Price: ${formatMoney(stockPrices[name])}`;
      tooltip.style.display = "block";
      tooltipVisible = true;
      tooltipStock = name;
      syncState();
    }

    function hideTooltip() {
      tooltip.style.display = "none";
      tooltipTargetMesh = null;
      tooltipVisible = false;
      tooltipStock = null;
      syncState();
    }

    function updateTooltipPosition() {
      if (!tooltipTargetMesh || !tooltipVisible) return;

      const worldPos = new THREE.Vector3();
      tooltipTargetMesh.getWorldPosition(worldPos);
      worldPos.y += (tooltipTargetMesh.scale.y * 0.5) + 2;

      const projected = worldPos.project(camera);
      const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
      tooltip.innerHTML = `<strong>${tooltipTargetMesh.userData.stockName}</strong><br>Price: ${formatMoney(stockPrices[tooltipTargetMesh.userData.stockName])}`;
    }

    function setSelectedStock(index) {
      if (selectedStock === index) {
        selectedStock = null;
      } else {
        selectedStock = index;
      }

      barMeshes.forEach((mesh, i) => {
        if (selectedStock === i) {
          mesh.scale.x = 1.3;
          mesh.scale.z = 1.3;
          mesh.material.emissive.setHex(stockColors[i]);
          mesh.material.emissiveIntensity = 0.6;
        } else {
          mesh.scale.x = 1;
          mesh.scale.z = 1;
          mesh.material.emissive.setHex(0x000000);
          mesh.material.emissiveIntensity = 0;
        }
      });

      syncState();
    }

    function applyMarketTick() {
      if (paused) return;

      tickCount++;
      previousStockPrices = { ...stockPrices };

      stockNames.forEach((name, i) => {
        const delta = (Math.random() * 16) - 8;
        stockPrices[name] = clamp(stockPrices[name] + delta, 10, 300);
        targetHeights[i] = stockPrices[name] / 10;
      });

      traderPortfolios = traderPortfolios.map((portfolio) => {
        let nextPortfolio = portfolio;

        for (let stockAction = 0; stockAction < 1; stockAction++) {
          const stockIndex = Math.floor(Math.random() * stockNames.length);
          const stockName = stockNames[stockIndex];
          const quantity = Math.floor(Math.random() * 5) + 1;
          const action = Math.random() < 0.5 ? -1 : 1;
          const priceChange = stockPrices[stockName] - previousStockPrices[stockName];
          nextPortfolio += action * priceChange * quantity;
        }

        return Math.max(0, nextPortfolio);
      });

      traderPortfolios.forEach((p, i) => {
        lanternLights[i].intensity = clamp(p / 5000, 0.2, 4.0);
      });

      updateHUD();
      syncState();
    }

    function resetSimulation() {
      stockPrices = { ...initialStockPrices };
      previousStockPrices = { ...initialStockPrices };
      traderPortfolios = [10000, 10000, 10000, 10000];
      tickCount = 0;
      targetHeights.length = 0;
      stockNames.forEach((name) => targetHeights.push(stockPrices[name] / 10));

      lanternLights.forEach((light) => {
        light.intensity = clamp(10000 / 5000, 0.2, 4.0);
      });

      resetCount++;
      updateHUD();
      syncState();
    }

    let tickTimer = null;
    function restartTickLoop() {
      if (tickTimer) clearInterval(tickTimer);
      tickTimer = setInterval(() => {
        applyMarketTick();
      }, tickInterval);
    }

    speedBtn.addEventListener("click", () => {
      if (tickInterval === 2000) tickInterval = 1000;
      else if (tickInterval === 1000) tickInterval = 500;
      else tickInterval = 2000;

      restartTickLoop();
      updateHUD();
      syncState();
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "p") {
        paused = !paused;
        updateHUD();
        syncState();
      }

      if (key >= "1" && key <= "5") {
        setSelectedStock(parseInt(key, 10) - 1);
      }

      if (key === "r") {
        resetSimulation();
      }

      if (key === "t") {
        if (cameraMode === "orbit") {
          cameraMode = "topdown";
          camera.position.set(0, 80, 0.001);
          camera.lookAt(0, 0, 0);
          controls.enabled = false;
        } else {
          cameraMode = "orbit";
          camera.position.set(0, 30, 50);
          camera.lookAt(0, 0, 0);
          controls.enabled = true;
          controls.target.set(0, 8, 0);
        }
        updateHUD();
        syncState();
      }
    });

    renderer.domElement.addEventListener("click", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(barMeshes, false);

      if (intersects.length > 0) {
        setTooltipForMesh(intersects[0].object);
      } else {
        hideTooltip();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      barMeshes.forEach((mesh, i) => {
        const currentHeight = mesh.scale.y;
        const nextHeight = THREE.MathUtils.lerp(currentHeight, targetHeights[i], Math.min(1, dt * 4));
        mesh.scale.y = nextHeight;
        mesh.position.y = nextHeight / 2;
      });

      updateTooltipPosition();

      if (controls.enabled) controls.update();

      renderer.render(scene, camera);
      syncState();
    }

    // Initial light intensities and target heights based on price
    stockNames.forEach((name, i) => {
      targetHeights[i] = stockPrices[name] / 10;
      barMeshes[i].scale.y = targetHeights[i];
      barMeshes[i].position.y = targetHeights[i] / 2;
    });

    lanternLights.forEach((light, i) => {
      light.intensity = clamp(traderPortfolios[i] / 5000, 0.2, 4.0);
    });

    updateHUD();
    syncState();
    restartTickLoop();
    animate();
  </script>
</body>
</html>
