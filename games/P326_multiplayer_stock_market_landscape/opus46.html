<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Stock Market Landscape</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(0, 255, 136, 0.3);
    border-radius: 8px;
    padding: 15px;
    color: #ffffff;
    font-size: 13px;
    z-index: 100;
    min-width: 320px;
    backdrop-filter: blur(5px);
}

#hud h2 {
    color: #00ff88;
    font-size: 16px;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(0, 255, 136, 0.3);
    padding-bottom: 5px;
}

.hud-section {
    margin-bottom: 10px;
}

.hud-section-title {
    color: #88aacc;
    font-size: 11px;
    text-transform: uppercase;
    margin-bottom: 4px;
}

.stock-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.stock-item {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
}

.trader-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.trader-item {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    background: rgba(255, 255, 255, 0.1);
}

.status-running { color: #00ff88; }
.status-paused { color: #ff4444; }

#speed-btn {
    background: rgba(0, 255, 136, 0.2);
    border: 1px solid #00ff88;
    color: #00ff88;
    padding: 5px 15px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    margin-top: 5px;
}

#speed-btn:hover {
    background: rgba(0, 255, 136, 0.4);
}

#tooltip {
    position: fixed;
    background: rgba(10, 10, 46, 0.95);
    border: 1px solid #00ff88;
    border-radius: 6px;
    padding: 10px 15px;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    z-index: 200;
    pointer-events: none;
    display: none;
    backdrop-filter: blur(5px);
}

#tooltip .tooltip-name {
    color: #00ff88;
    font-weight: bold;
    font-size: 16px;
}

#tooltip .tooltip-price {
    color: #ffffff;
    margin-top: 4px;
}

#controls-help {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: rgba(10, 10, 46, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    padding: 10px;
    color: #667788;
    font-size: 11px;
    z-index: 100;
}
</style>
</head>
<body>

<div id="hud">
    <h2>📈 STOCK MARKET 3D</h2>
    <div class="hud-section">
        <div class="hud-section-title">Tick Count</div>
        <div id="tick-count">0</div>
    </div>
    <div class="hud-section">
        <div class="hud-section-title">Stocks</div>
        <div class="stock-row" id="stock-display"></div>
    </div>
    <div class="hud-section">
        <div class="hud-section-title">Traders</div>
        <div class="trader-row" id="trader-display"></div>
    </div>
    <div class="hud-section">
        <div class="hud-section-title">Status</div>
        <span id="sim-status" class="status-running">RUNNING</span>
        <span style="margin-left: 15px; color: #88aacc;">Interval: <span id="interval-display">2000ms</span></span>
    </div>
    <button id="speed-btn">⚡ Speed: 2000ms</button>
</div>

<div id="tooltip">
    <div class="tooltip-name" id="tooltip-name"></div>
    <div class="tooltip-price" id="tooltip-price"></div>
</div>

<div id="controls-help">
    Controls: Orbit=Mouse | P=Pause | 1-5=Highlight Stock | R=Reset | T=Top View | Click Bar=Info
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ CONFIGURATION ============
const STOCK_NAMES = ['AAPL', 'GOOG', 'MSFT', 'AMZN', 'TSLA'];
const STOCK_COLORS = [0x00ff88, 0xff4444, 0x4488ff, 0xffaa00, 0xaa44ff];
const STOCK_COLOR_HEX = ['#00ff88', '#ff4444', '#4488ff', '#ffaa00', '#aa44ff'];
const INITIAL_PRICES = [150, 120, 80, 200, 100];
const INITIAL_HEIGHTS = [10, 15, 8, 20, 12];
const BAR_POSITIONS_X = [-20, -10, 0, 10, 20];
const LANTERN_POSITIONS = [
    new THREE.Vector3(-30, 0, -30),
    new THREE.Vector3(30, 0, -30),
    new THREE.Vector3(-30, 0, 30),
    new THREE.Vector3(30, 0, 30)
];
const TRADER_NAMES = ['Player1', 'Player2', 'Player3', 'Player4'];
const SPEED_OPTIONS = [2000, 1000, 500];

// ============ STATE ============
let stockPrices = [...INITIAL_PRICES];
let targetBarHeights = INITIAL_HEIGHTS.map(h => h);
let currentBarHeights = [...INITIAL_HEIGHTS];
let traderPortfolios = [10000, 10000, 10000, 10000];
let tickCount = 0;
let paused = false;
let selectedStock = null;
let tooltipVisible = false;
let tooltipStock = null;
let cameraMode = 'orbit';
let tickInterval = 2000;
let speedIndex = 0;
let lanternCount = 0;
let resetCount = 0;
let lastTickTime = 0;
let lanternIntensities = [2, 2, 2, 2];

// Saved orbit camera state
let savedCameraPos = new THREE.Vector3(0, 30, 50);
let savedCameraTarget = new THREE.Vector3(0, 0, 0);

// ============ EXPOSE STATE ============
window.__3D_STATE__ = {};
function updateExposedState() {
    window.__3D_STATE__ = {
        tickCount,
        paused,
        stockPrices: {
            AAPL: stockPrices[0],
            GOOG: stockPrices[1],
            MSFT: stockPrices[2],
            AMZN: stockPrices[3],
            TSLA: stockPrices[4]
        },
        stockHeights: currentBarHeights.map(h => h),
        traderPortfolios: [...traderPortfolios],
        selectedStock,
        tooltipVisible,
        tooltipStock,
        cameraMode,
        tickInterval,
        lanternCount,
        lanternIntensities: [...lanternIntensities],
        totalMarketCap: stockPrices.reduce((a, b) => a + b, 0),
        resetCount
    };
}

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 30, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(20, 40, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 150;
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
scene.add(dirLight);

// ============ CONTROLS ============
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);
controls.update();

// ============ GROUND PLANE ============
const groundGeom = new THREE.PlaneGeometry(100, 100, 50, 50);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x111133,
    roughness: 0.9,
    metalness: 0.1,
    wireframe: false
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(100, 50, 0x223355, 0x1a1a44);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ============ STOCK BARS ============
const stockBars = [];
const stockBarMeshes = [];

for (let i = 0; i < 5; i++) {
    const height = INITIAL_HEIGHTS[i];
    const geom = new THREE.BoxGeometry(4, 1, 4);
    const mat = new THREE.MeshStandardMaterial({
        color: STOCK_COLORS[i],
        roughness: 0.3,
        metalness: 0.6,
        emissive: STOCK_COLORS[i],
        emissiveIntensity: 0.1
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(BAR_POSITIONS_X[i], height / 2, 0);
    mesh.scale.set(1, height, 1);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData = { stockIndex: i, stockName: STOCK_NAMES[i] };
    scene.add(mesh);
    stockBars.push(mesh);
    stockBarMeshes.push(mesh);

    // Label above bar
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 128;
    labelCanvas.height = 64;
    const ctx = labelCanvas.getContext('2d');
    ctx.fillStyle = STOCK_COLOR_HEX[i];
    ctx.font = 'bold 28px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(STOCK_NAMES[i], 64, 40);
    const labelTexture = new THREE.CanvasTexture(labelCanvas);
    const labelMat = new THREE.SpriteMaterial({ map: labelTexture, transparent: true });
    const label = new THREE.Sprite(labelMat);
    label.scale.set(6, 3, 1);
    label.position.set(BAR_POSITIONS_X[i], height + 3, 0);
    label.userData = { isLabel: true, stockIndex: i };
    scene.add(label);
    mesh.userData.label = label;
}

// ============ LANTERNS ============
const lanternLights = [];
const lanternModels = [];

for (let i = 0; i < 4; i++) {
    const pos = LANTERN_POSITIONS[i];
    const pointLight = new THREE.PointLight(0xffaa44, 2, 25);
    pointLight.position.set(pos.x, 8, pos.z);
    pointLight.castShadow = true;
    scene.add(pointLight);
    lanternLights.push(pointLight);

    // Placeholder glowing sphere for lantern
    const sphereGeom = new THREE.SphereGeometry(0.8, 16, 16);
    const sphereMat = new THREE.MeshStandardMaterial({
        color: 0xffaa44,
        emissive: 0xffaa44,
        emissiveIntensity: 1.5,
        roughness: 0.2,
        metalness: 0.8
    });
    const sphere = new THREE.Mesh(sphereGeom, sphereMat);
    sphere.position.set(pos.x, 5, pos.z);
    scene.add(sphere);

    // Trader name label
    const tCanvas = document.createElement('canvas');
    tCanvas.width = 256;
    tCanvas.height = 64;
    const tCtx = tCanvas.getContext('2d');
    tCtx.fillStyle = '#ffaa44';
    tCtx.font = 'bold 24px Courier New';
    tCtx.textAlign = 'center';
    tCtx.fillText(TRADER_NAMES[i], 128, 40);
    const tTexture = new THREE.CanvasTexture(tCanvas);
    const tMat = new THREE.SpriteMaterial({ map: tTexture, transparent: true });
    const tLabel = new THREE.Sprite(tMat);
    tLabel.scale.set(8, 2, 1);
    tLabel.position.set(pos.x, 10, pos.z);
    scene.add(tLabel);
}

// Load GLTF lantern model
const gltfLoader = new GLTFLoader();
const lanternUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Lantern/glTF-Binary/Lantern.glb';

gltfLoader.load(lanternUrl, (gltf) => {
    const lanternModel = gltf.scene;
    for (let i = 0; i < 4; i++) {
        const pos = LANTERN_POSITIONS[i];
        const clone = lanternModel.clone();
        clone.scale.set(3, 3, 3);
        clone.position.set(pos.x, 0, pos.z);
        clone.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(clone);
        lanternModels.push(clone);
        lanternCount++;
    }
    updateExposedState();
}, undefined, (error) => {
    console.warn('Could not load Lantern.glb:', error);
    // Lanterns remain as placeholder spheres
});

// ============ PARTICLES (ambient) ============
const particleCount = 500;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSpeeds = new Float32Array(particleCount);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 100;
    particlePositions[i * 3 + 1] = Math.random() * 40 + 2;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 100;
    particleSpeeds[i] = Math.random() * 0.02 + 0.005;
}
particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
    color: 0x4488ff,
    size: 0.3,
    transparent: true,
    opacity: 0.4,
    blending: THREE.AdditiveBlending
});
const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

// ============ RAYCASTER ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// ============ STOCK SIMULATION ============
function marketTick() {
    if (paused) return;

    tickCount++;

    // Update stock prices
    for (let i = 0; i < 5; i++) {
        const change = (Math.random() * 16) - 8;
        stockPrices[i] = Math.max(10, Math.min(300, stockPrices[i] + change));
        targetBarHeights[i] = stockPrices[i] / 10;
    }

    // Trader simulation
    for (let t = 0; t < 4; t++) {
        const stockIdx = Math.floor(Math.random() * 5);
        const quantity = Math.floor(Math.random() * 5) + 1;
        const buyOrSell = Math.random() < 0.5 ? 1 : -1;
        const priceChange = (Math.random() * 16) - 8;
        const portfolioChange = priceChange * quantity * buyOrSell;
        traderPortfolios[t] = Math.max(0, traderPortfolios[t] + portfolioChange);
    }

    // Update lantern intensities
    for (let i = 0; i < 4; i++) {
        const intensity = Math.max(0.2, Math.min(4.0, traderPortfolios[i] / 5000));
        lanternIntensities[i] = intensity;
        lanternLights[i].intensity = intensity;
    }

    updateHUD();
    updateExposedState();
}

// ============ ANIMATION ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // Smooth bar height animation
    for (let i = 0; i < 5; i++) {
        currentBarHeights[i] += (targetBarHeights[i] - currentBarHeights[i]) * 0.05;
        const h = Math.max(0.1, currentBarHeights[i]);
        stockBars[i].scale.y = h;
        stockBars[i].position.y = h / 2;

        // Update label position
        if (stockBars[i].userData.label) {
            stockBars[i].userData.label.position.y = h + 3;
        }
    }

    // Animate particles
    const positions = particles.geometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += particleSpeeds[i];
        if (positions[i * 3 + 1] > 45) {
            positions[i * 3 + 1] = 2;
        }
    }
    particles.geometry.attributes.position.needsUpdate = true;

    // Pulse selected stock
    if (selectedStock !== null) {
        const bar = stockBars[selectedStock];
        const pulse = 1.3 + Math.sin(elapsed * 4) * 0.1;
        bar.scale.x = pulse;
        bar.scale.z = pulse;
        bar.material.emissiveIntensity = 0.3 + Math.sin(elapsed * 6) * 0.2;
    }

    // Market tick timing
    if (!paused) {
        const now = performance.now();
        if (now - lastTickTime >= tickInterval) {
            marketTick();
            lastTickTime = now;
        }
    }

    controls.update();
    renderer.render(scene, camera);
}

// ============ HUD UPDATE ============
function updateHUD() {
    document.getElementById('tick-count').textContent = tickCount;

    let stockHTML = '';
    for (let i = 0; i < 5; i++) {
        stockHTML += `<div class="stock-item" style="background:${STOCK_COLOR_HEX[i]}22; color:${STOCK_COLOR_HEX[i]}; border:1px solid ${STOCK_COLOR_HEX[i]}44;">${STOCK_NAMES[i]}: $${stockPrices[i].toFixed(1)}</div>`;
    }
    document.getElementById('stock-display').innerHTML = stockHTML;

    let traderHTML = '';
    for (let i = 0; i < 4; i++) {
        const color = traderPortfolios[i] >= 10000 ? '#00ff88' : '#ff4444';
        traderHTML += `<div class="trader-item" style="color:${color};">${TRADER_NAMES[i]}: $${traderPortfolios[i].toFixed(0)}</div>`;
    }
    document.getElementById('trader-display').innerHTML = traderHTML;

    const statusEl = document.getElementById('sim-status');
    statusEl.textContent = paused ? 'PAUSED' : 'RUNNING';
    statusEl.className = paused ? 'status-paused' : 'status-running';

    document.getElementById('interval-display').textContent = tickInterval + 'ms';
    document.getElementById('speed-btn').textContent = `⚡ Speed: ${tickInterval}ms`;
}

// ============ TOOLTIP ============
const tooltipEl = document.getElementById('tooltip');
const tooltipNameEl = document.getElementById('tooltip-name');
const tooltipPriceEl = document.getElementById('tooltip-price');

function showTooltip(stockIndex, screenX, screenY) {
    tooltipVisible = true;
    tooltipStock = STOCK_NAMES[stockIndex];
    tooltipNameEl.textContent = STOCK_NAMES[stockIndex];
    tooltipNameEl.style.color = STOCK_COLOR_HEX[stockIndex];
    tooltipPriceEl.textContent = `Price: $${stockPrices[stockIndex].toFixed(2)}`;
    tooltipEl.style.display = 'block';
    tooltipEl.style.left = (screenX + 15) + 'px';
    tooltipEl.style.top = (screenY - 30) + 'px';
    updateExposedState();
}

function hideTooltip() {
    tooltipVisible = false;
    tooltipStock = null;
    tooltipEl.style.display = 'none';
    updateExposedState();
}

// ============ EVENT HANDLERS ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

window.addEventListener('click', (event) => {
    // Ignore clicks on HUD
    if (event.target.closest('#hud') || event.target.closest('#speed-btn')) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(stockBarMeshes);

    if (intersects.length > 0) {
        const hit = intersects[0].object;
        const idx = hit.userData.stockIndex;
        if (idx !== undefined) {
            // Project bar position to screen
            const barWorldPos = new THREE.Vector3();
            hit.getWorldPosition(barWorldPos);
            barWorldPos.y = currentBarHeights[idx] + 2;
            const screenPos = barWorldPos.clone().project(camera);
            const sx = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
            const sy = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;
            showTooltip(idx, sx, sy);
        }
    } else {
        hideTooltip();
    }
});

window.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();

    if (key === 'p') {
        paused = !paused;
        updateHUD();
        updateExposedState();
    }

    if (key >= '1' && key <= '5') {
        const idx = parseInt(key) - 1;

        // Deselect previous
        if (selectedStock !== null) {
            stockBars[selectedStock].scale.x = 1;
            stockBars[selectedStock].scale.z = 1;
            stockBars[selectedStock].material.emissiveIntensity = 0.1;
        }

        if (selectedStock === idx) {
            selectedStock = null;
        } else {
            selectedStock = idx;
        }
        updateExposedState();
    }

    if (key === 'r') {
        // Reset
        stockPrices = [...INITIAL_PRICES];
        targetBarHeights = INITIAL_PRICES.map(p => p / 10);
        traderPortfolios = [10000, 10000, 10000, 10000];
        tickCount = 0;
        resetCount++;

        for (let i = 0; i < 4; i++) {
            lanternIntensities[i] = 2;
            lanternLights[i].intensity = 2;
        }

        updateHUD();
        updateExposedState();
    }

    if (key === 't') {
        if (cameraMode === 'orbit') {
            // Save current camera state
            savedCameraPos.copy(camera.position);
            savedCameraTarget.copy(controls.target);

            // Switch to top-down
            cameraMode = 'topdown';
            camera.position.set(0, 80, 0.01);
            controls.target.set(0, 0, 0);
            controls.update();
        } else {
            // Restore orbit view
            cameraMode = 'orbit';
            camera.position.copy(savedCameraPos);
            controls.target.copy(savedCameraTarget);
            controls.update();
        }
        updateExposedState();
    }
});

document.getElementById('speed-btn').addEventListener('click', () => {
    speedIndex = (speedIndex + 1) % SPEED_OPTIONS.length;
    tickInterval = SPEED_OPTIONS[speedIndex];
    updateHUD();
    updateExposedState();
});

// ============ INIT ============
lastTickTime = performance.now();
updateHUD();
updateExposedState();
animate();

</script>
</body>
</html>
