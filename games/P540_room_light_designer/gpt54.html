<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>3D Room Lighting Designer</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 320px;
      background: rgba(10, 10, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px;
      backdrop-filter: blur(4px);
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #ui h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .row {
      margin-bottom: 10px;
    }

    .row label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #d8d8e8;
    }

    .buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #4d6bff;
      color: white;
      font-weight: bold;
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
      opacity: 0.7;
    }

    input[type="range"] {
      width: 100%;
    }

    #hud {
      position: absolute;
      right: 12px;
      top: 12px;
      width: 250px;
      background: rgba(10, 10, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px;
      z-index: 10;
      line-height: 1.6;
      font-size: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #help {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(10, 10, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 12px;
      z-index: 10;
      font-size: 13px;
      color: #ddd;
      max-width: 360px;
    }

    .small {
      color: #aab;
      font-size: 12px;
    }

    .selected-indicator {
      color: #ffd166;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>Room Lighting Designer</h2>

      <div class="buttons">
        <button id="btn-add-light">Add Light</button>
        <button id="btn-remove-light">Remove Light</button>
      </div>

      <div class="row">
        <label for="slider-intensity">Selected Light Intensity</label>
        <input id="slider-intensity" type="range" min="0.1" max="5.0" step="0.1" value="2.0" />
      </div>

      <div class="row">
        <label for="slider-color-temp">Selected Light Color Temperature</label>
        <input id="slider-color-temp" type="range" min="2000" max="8000" step="100" value="4000" />
      </div>

      <div class="row">
        <label for="slider-height">Selected Light Height</label>
        <input id="slider-height" type="range" min="0.5" max="4.5" step="0.1" value="3.0" />
      </div>

      <div class="small">
        Keys: <span class="selected-indicator">1-5</span> select light,
        <span class="selected-indicator">T</span> toggle shadows
      </div>
    </div>

    <div id="hud">
      <div><strong>HUD</strong></div>
      <div>Light count: <span id="hud-lights">0</span></div>
      <div>Selected light: <span id="hud-selected">None</span></div>
      <div>Selected intensity: <span id="hud-intensity">0.0</span></div>
      <div>Shadow mode: <span id="hud-shadows">ON</span></div>
      <div>Models loaded: <span id="hud-models">0</span></div>
      <div>FPS: <span id="hud-fps">0</span></div>
    </div>

    <div id="help">
      Drag with mouse to orbit. Scroll to zoom.  
      Click a glowing sphere to select a light, then use sliders to configure it.
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const app = document.getElementById('app');

    const btnAddLight = document.getElementById('btn-add-light');
    const btnRemoveLight = document.getElementById('btn-remove-light');
    const sliderIntensity = document.getElementById('slider-intensity');
    const sliderColorTemp = document.getElementById('slider-color-temp');
    const sliderHeight = document.getElementById('slider-height');

    const hudLights = document.getElementById('hud-lights');
    const hudSelected = document.getElementById('hud-selected');
    const hudIntensity = document.getElementById('hud-intensity');
    const hudShadows = document.getElementById('hud-shadows');
    const hudModels = document.getElementById('hud-models');
    const hudFps = document.getElementById('hud-fps');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(8, 6, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x202030, 0.1);
    scene.add(ambient);

    const textureLoader = new THREE.TextureLoader();
    const floorTexture = textureLoader.load('hardwood2_diffuse.jpg');
    floorTexture.wrapS = THREE.RepeatWrapping;
    floorTexture.wrapT = THREE.RepeatWrapping;
    floorTexture.repeat.set(4, 4);
    floorTexture.colorSpace = THREE.SRGBColorSpace;

    const roomGroup = new THREE.Group();
    scene.add(roomGroup);

    const floorMat = new THREE.MeshStandardMaterial({ map: floorTexture, roughness: 0.8, metalness: 0.1 });
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xccccaa, roughness: 0.95 });
    const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.9 });

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(15, 15), floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    roomGroup.add(floor);

    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(15, 15), ceilingMat);
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = 5;
    ceiling.receiveShadow = true;
    roomGroup.add(ceiling);

    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(15, 5), wallMat);
    backWall.position.set(0, 2.5, -7.5);
    backWall.receiveShadow = true;
    roomGroup.add(backWall);

    const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(15, 5), wallMat);
    frontWall.rotation.y = Math.PI;
    frontWall.position.set(0, 2.5, 7.5);
    frontWall.receiveShadow = true;
    roomGroup.add(frontWall);

    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(15, 5), wallMat);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.set(-7.5, 2.5, 0);
    leftWall.receiveShadow = true;
    roomGroup.add(leftWall);

    const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(15, 5), wallMat);
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.set(7.5, 2.5, 0);
    rightWall.receiveShadow = true;
    roomGroup.add(rightWall);

    const loader = new GLTFLoader();
    let modelsLoaded = 0;

    function fitModelToHeight(object, targetHeight) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      box.getSize(size);
      const currentHeight = Math.max(size.y, 0.0001);
      const scale = targetHeight / currentHeight;
      object.scale.setScalar(scale);

      const box2 = new THREE.Box3().setFromObject(object);
      const minY = box2.min.y;
      object.position.y += -minY;
    }

    function enableShadows(object) {
      object.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material.needsUpdate = true;
          }
        }
      });
    }

    function loadModel(url, targetHeight, position) {
      loader.load(
        url,
        (gltf) => {
          const model = gltf.scene;
          scene.add(model);
          fitModelToHeight(model, targetHeight);
          model.position.x = position.x;
          model.position.z = position.z;

          const box = new THREE.Box3().setFromObject(model);
          const minY = box.min.y;
          model.position.y += -minY;

          enableShadows(model);
          modelsLoaded++;
        },
        undefined,
        (err) => {
          console.warn(`Failed to load ${url}`, err);
        }
      );
    }

    loadModel('Lantern.glb', 0.8, new THREE.Vector3(3, 0, 2));
    loadModel('SheenChair.glb', 1.2, new THREE.Vector3(-3, 0, -2));
    loadModel('coffeemat.glb', 1.0, new THREE.Vector3(0, 0, 0));

    const lights = [];
    let selectedLightIndex = -1;
    let shadowsEnabled = true;

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function colorTemperatureToColor(kelvin) {
      let temp = kelvin / 100;
      let red, green, blue;

      if (temp <= 66) {
        red = 255;
        green = 99.4708025861 * Math.log(temp) - 161.1195681661;
        blue = temp <= 19 ? 0 : 138.5177312231 * Math.log(temp - 10) - 305.0447927307;
      } else {
        red = 329.698727446 * Math.pow(temp - 60, -0.1332047592);
        green = 288.1221695283 * Math.pow(temp - 60, -0.0755148492);
        blue = 255;
      }

      red = THREE.MathUtils.clamp(red, 0, 255);
      green = THREE.MathUtils.clamp(green, 0, 255);
      blue = THREE.MathUtils.clamp(blue, 0, 255);

      return new THREE.Color(red / 255, green / 255, blue / 255);
    }

    function createLight(color = 0xffaa44, intensity = 2.0, position = new THREE.Vector3(0, 3, 0), colorTemp = 4000) {
      if (lights.length >= 5) return;

      const light = new THREE.PointLight(color, intensity, 20, 2);
      light.position.copy(position);
      light.castShadow = shadowsEnabled;
      light.shadow.mapSize.width = 1024;
      light.shadow.mapSize.height = 1024;
      light.shadow.bias = -0.0005;

      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 16, 16),
        new THREE.MeshBasicMaterial({ color })
      );
      sphere.position.copy(position);
      sphere.userData.lightIndex = lights.length;

      const helper = new THREE.PointLightHelper(light, 0.35, color);

      scene.add(light);
      scene.add(sphere);
      scene.add(helper);

      lights.push({
        light,
        sphere,
        helper,
        colorTemp
      });

      refreshLightIndices();
      selectLight(lights.length - 1);
      updateButtons();
    }

    function removeLastLight() {
      if (lights.length === 0) return;

      const entry = lights.pop();
      scene.remove(entry.light);
      scene.remove(entry.sphere);
      scene.remove(entry.helper);

      if (selectedLightIndex >= lights.length) {
        selectedLightIndex = lights.length - 1;
      }

      refreshLightIndices();

      if (selectedLightIndex >= 0) {
        selectLight(selectedLightIndex);
      } else {
        updateSliderUI();
      }

      updateButtons();
    }

    function refreshLightIndices() {
      lights.forEach((entry, i) => {
        entry.sphere.userData.lightIndex = i;
      });
    }

    function selectLight(index) {
      if (index < 0 || index >= lights.length) {
        selectedLightIndex = -1;
        updateSliderUI();
        return;
      }

      selectedLightIndex = index;
      updateSelectionVisuals();
      updateSliderUI();
    }

    function updateSelectionVisuals() {
      lights.forEach((entry, i) => {
        const isSelected = i === selectedLightIndex;
        entry.sphere.scale.setScalar(isSelected ? 1.5 : 1.0);
      });
    }

    function updateSliderUI() {
      if (selectedLightIndex < 0 || selectedLightIndex >= lights.length) return;
      const entry = lights[selectedLightIndex];
      sliderIntensity.value = entry.light.intensity.toFixed(1);
      sliderHeight.value = entry.light.position.y.toFixed(1);
      sliderColorTemp.value = String(entry.colorTemp || 4000);
    }

    function updateButtons() {
      btnAddLight.disabled = lights.length >= 5;
      btnRemoveLight.disabled = lights.length === 0;
    }

    function applyLightProperties(index) {
      if (index < 0 || index >= lights.length) return;
      const entry = lights[index];
      entry.sphere.position.copy(entry.light.position);
      entry.sphere.material.color.copy(entry.light.color);
      entry.helper.color = entry.light.color;
      entry.helper.update();
    }

    sliderIntensity.addEventListener('input', () => {
      if (selectedLightIndex < 0) return;
      const value = parseFloat(sliderIntensity.value);
      lights[selectedLightIndex].light.intensity = value;
      applyLightProperties(selectedLightIndex);
    });

    sliderHeight.addEventListener('input', () => {
      if (selectedLightIndex < 0) return;
      const value = parseFloat(sliderHeight.value);
      lights[selectedLightIndex].light.position.y = value;
      applyLightProperties(selectedLightIndex);
    });

    sliderColorTemp.addEventListener('input', () => {
      if (selectedLightIndex < 0) return;
      const value = parseInt(sliderColorTemp.value, 10);
      const color = colorTemperatureToColor(value);
      lights[selectedLightIndex].colorTemp = value;
      lights[selectedLightIndex].light.color.copy(color);
      applyLightProperties(selectedLightIndex);
    });

    btnAddLight.addEventListener('click', () => {
      if (lights.length >= 5) return;
      const x = THREE.MathUtils.randFloat(-5, 5);
      const y = THREE.MathUtils.randFloat(1, 4);
      const z = THREE.MathUtils.randFloat(-5, 5);
      const temp = 4000;
      const color = colorTemperatureToColor(temp);
      createLight(color, 2.0, new THREE.Vector3(x, y, z), temp);
    });

    btnRemoveLight.addEventListener('click', () => {
      removeLastLight();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '5') {
        const idx = parseInt(e.key, 10) - 1;
        if (idx < lights.length) {
          selectLight(idx);
        }
      }

      if (e.key === 't' || e.key === 'T') {
        shadowsEnabled = !shadowsEnabled;
        renderer.shadowMap.enabled = shadowsEnabled;
        lights.forEach(entry => {
          entry.light.castShadow = shadowsEnabled;
        });
      }
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(lights.map(l => l.sphere), false);

      if (intersects.length > 0) {
        const idx = intersects[0].object.userData.lightIndex;
        selectLight(idx);
      }
    });

    createLight(new THREE.Color(0xffaa44), 2.0, new THREE.Vector3(0, 3, 0), 4000);

    const clock = new THREE.Clock();
    let fpsAccumulator = 0;
    let fpsFrames = 0;
    let fpsValue = 0;
    let frameCount = 0;

    window.__3D_STATE__ = {
      lightCount: 0,
      selectedLight: -1,
      selectedIntensity: 0,
      selectedHeight: 0,
      colorTemp: 4000,
      shadowsEnabled: true,
      modelsLoaded: 0,
      frameCount: 0,
      totalLightIntensity: 0,
      lightsValid: true
    };

    function updateHUD() {
      hudLights.textContent = String(lights.length);
      hudSelected.textContent = selectedLightIndex >= 0 ? String(selectedLightIndex + 1) : 'None';
      hudIntensity.textContent =
        selectedLightIndex >= 0 ? lights[selectedLightIndex].light.intensity.toFixed(1) : '0.0';
      hudShadows.textContent = shadowsEnabled ? 'ON' : 'OFF';
      hudModels.textContent = String(modelsLoaded);
      hudFps.textContent = String(fpsValue);
    }

    function updateState() {
      const selected = selectedLightIndex >= 0 ? lights[selectedLightIndex] : null;
      const totalLightIntensity = lights.reduce((sum, l) => sum + l.light.intensity, 0);
      const lightsValid = lights.every(l =>
        Number.isFinite(l.light.position.x) &&
        Number.isFinite(l.light.position.y) &&
        Number.isFinite(l.light.position.z)
      );

      window.__3D_STATE__ = {
        lightCount: lights.length,
        selectedLight: selectedLightIndex,
        selectedIntensity: selected ? Number(selected.light.intensity.toFixed(1)) : 0,
        selectedHeight: selected ? Number(selected.light.position.y.toFixed(1)) : 0,
        colorTemp: selected ? (selected.colorTemp || 4000) : 4000,
        shadowsEnabled,
        modelsLoaded,
        frameCount,
        totalLightIntensity: Number(totalLightIntensity.toFixed(1)),
        lightsValid
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const delta = clock.getDelta();
      fpsAccumulator += delta;
      fpsFrames++;

      if (fpsAccumulator >= 0.5) {
        fpsValue = Math.round(fpsFrames / fpsAccumulator);
        fpsAccumulator = 0;
        fpsFrames = 0;
      }

      controls.update();

      for (let i = 0; i < lights.length; i++) {
        applyLightProperties(i);
      }

      updateSelectionVisuals();
      updateHUD();
      updateState(); // must happen before rendering each frame
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateButtons();
    updateSliderUI();
    animate();
  </script>
</body>
</html>
