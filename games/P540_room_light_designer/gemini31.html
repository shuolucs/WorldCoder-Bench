<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Room Lighting Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 280px;
            background: rgba(26, 26, 46, 0.85);
            border: 1px solid #445;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 220px;
            background: rgba(26, 26, 46, 0.85);
            border: 1px solid #445;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            border-bottom: 1px solid #445;
            padding-bottom: 5px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 5px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #ffaa44;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #3a3a5c;
            color: #fff;
            border: 1px solid #556;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) {
            background: #4a4a7c;
        }
        button:disabled {
            background: #2a2a3c;
            color: #666;
            border-color: #334;
            cursor: not-allowed;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .hud-val {
            font-weight: bold;
            color: #ffaa44;
        }
        .instructions {
            font-size: 11px;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <div id="ui-panel">
        <h2>Light Controls</h2>
        <button id="btn-add-light">Add Light</button>
        <button id="btn-remove-light">Remove Light</button>
        
        <div class="control-group">
            <label>Intensity <span id="val-intensity">2.0</span></label>
            <input type="range" id="slider-intensity" min="0.1" max="5.0" step="0.1" value="2.0">
        </div>
        <div class="control-group">
            <label>Color Temp (K) <span id="val-color-temp">4000</span></label>
            <input type="range" id="slider-color-temp" min="2000" max="8000" step="100" value="4000">
        </div>
        <div class="control-group">
            <label>Height (Y) <span id="val-height">3.0</span></label>
            <input type="range" id="slider-height" min="0.5" max="4.5" step="0.1" value="3.0">
        </div>

        <div class="instructions">
            • Press <b>1-5</b> to select a light.<br>
            • Press <b>T</b> to toggle shadows.<br>
            • Drag to rotate, scroll to zoom.
        </div>
    </div>

    <div id="hud">
        <h2>Scene Info</h2>
        <div class="hud-row"><span>Lights:</span> <span class="hud-val" id="hud-lights">0</span></div>
        <div class="hud-row"><span>Selected:</span> <span class="hud-val" id="hud-selected">None</span></div>
        <div class="hud-row"><span>Intensity:</span> <span class="hud-val" id="hud-intensity">0.0</span></div>
        <div class="hud-row"><span>Shadows:</span> <span class="hud-val" id="hud-shadows">ON</span></div>
        <div class="hud-row"><span>Models:</span> <span class="hud-val" id="hud-models">0</span></div>
        <div class="hud-row"><span>FPS:</span> <span class="hud-val" id="hud-fps">0</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            lightCount: 0,
            selectedLight: -1,
            selectedIntensity: 0.0,
            selectedHeight: 0.0,
            colorTemp: 4000,
            shadowsEnabled: true,
            modelsLoaded: 0,
            frameCount: 0,
            totalLightIntensity: 0.0,
            lightsValid: true
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(8, 6, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.5, 0);

        // Ambient Light
        const ambientLight = new THREE.AmbientLight(0x202030, 0.1);
        scene.add(ambientLight);

        // --- Room Construction ---
        const roomGroup = new THREE.Group();
        scene.add(roomGroup);

        // Floor
        const floorGeo = new THREE.PlaneGeometry(15, 15);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        roomGroup.add(floor);

        const texLoader = new THREE.TextureLoader();
        texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/hardwood2_diffuse.jpg', (texture) => {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(4, 4);
            floorMat.map = texture;
            floorMat.needsUpdate = true;
        });

        // Ceiling
        const ceilGeo = new THREE.PlaneGeometry(15, 15);
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
        const ceil = new THREE.Mesh(ceilGeo, ceilMat);
        ceil.rotation.x = Math.PI / 2;
        ceil.position.y = 5;
        ceil.receiveShadow = true;
        roomGroup.add(ceil);

        // Walls
        const wallGeo = new THREE.PlaneGeometry(15, 5);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xccccaa });

        const wallPositions = [
            { pos: [0, 2.5, -7.5], rot: [0, 0, 0] },
            { pos: [0, 2.5, 7.5], rot: [0, Math.PI, 0] },
            { pos: [-7.5, 2.5, 0], rot: [0, Math.PI / 2, 0] },
            { pos: [7.5, 2.5, 0], rot: [0, -Math.PI / 2, 0] }
        ];

        wallPositions.forEach(wp => {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(...wp.pos);
            wall.rotation.set(...wp.rot);
            wall.receiveShadow = true;
            roomGroup.add(wall);
        });

        // --- Asset Loading ---
        const gltfLoader = new GLTFLoader();

        function loadModel(url, x, y, z, targetSize, scaleByHeight = true) {
            gltfLoader.load(url, (gltf) => {
                const model = gltf.scene;
                scene.add(model);

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());

                let scale = 1;
                if (scaleByHeight && size.y > 0.001) {
                    scale = targetSize / size.y;
                } else {
                    const maxDim = Math.max(size.x, size.y, size.z);
                    if (maxDim > 0.001) scale = targetSize / maxDim;
                }
                model.scale.setScalar(scale);

                const box2 = new THREE.Box3().setFromObject(model);
                model.position.set(x, y - box2.min.y, z);

                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                window.__3D_STATE__.modelsLoaded++;
            }, undefined, (err) => console.error("Error loading model:", err));
        }

        loadModel('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF-Binary/Lantern.glb', 3, 0, 2, 0.8, true);
        loadModel('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/SheenChair.glb', -3, 0, -2, 1.2, true);
        loadModel('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/coffeemat.glb', 0, 0, 0, 1.0, false);

        // --- Light Management ---
        const lights = [];
        let selectedLightIndex = -1;

        function colorTemperatureToRGB(kelvin) {
            let temp = kelvin / 100;
            let r, g, b;

            if (temp <= 66) {
                r = 255;
                g = temp;
                g = 99.4708025861 * Math.log(g) - 161.1195681661;
                if (temp <= 19) {
                    b = 0;
                } else {
                    b = temp - 10;
                    b = 138.5177312231 * Math.log(b) - 305.0447927307;
                }
            } else {
                r = temp - 60;
                r = 329.698727446 * Math.pow(r, -0.1332047592);
                g = temp - 60;
                g = 288.1221695283 * Math.pow(g, -0.0755148492);
                b = 255;
            }

            return new THREE.Color(
                Math.min(255, Math.max(0, r)) / 255,
                Math.min(255, Math.max(0, g)) / 255,
                Math.min(255, Math.max(0, b)) / 255
            );
        }

        function createLight(x, y, z, color, intensity, colorTemp) {
            const group = new THREE.Group();
            group.position.set(x, y, z);

            const light = new THREE.PointLight(color, intensity, 20);
            light.castShadow = true;
            light.shadow.bias = -0.001;
            light.shadow.mapSize.width = 1024;
            light.shadow.mapSize.height = 1024;
            group.add(light);

            const sphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const sphereMat = new THREE.MeshBasicMaterial({ color: color });
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            group.add(sphere);

            const helper = new THREE.PointLightHelper(light, 0.5);
            group.add(helper);

            scene.add(group);
            lights.push({ group, light, sphere, helper, colorTemp });
            
            document.getElementById('btn-add-light').disabled = lights.length >= 5;
            document.getElementById('btn-remove-light').disabled = lights.length === 0;
        }

        function selectLight(index) {
            if (index >= 0 && index < lights.length) {
                selectedLightIndex = index;
                const sel = lights[selectedLightIndex];
                
                document.getElementById('slider-intensity').value = sel.light.intensity;
                document.getElementById('val-intensity').innerText = sel.light.intensity.toFixed(1);
                
                document.getElementById('slider-color-temp').value = sel.colorTemp;
                document.getElementById('val-color-temp').innerText = sel.colorTemp;
                
                document.getElementById('slider-height').value = sel.group.position.y;
                document.getElementById('val-height').innerText = sel.group.position.y.toFixed(1);

                lights.forEach((l, i) => {
                    if (i === selectedLightIndex) {
                        l.sphere.scale.set(1.4, 1.4, 1.4);
                        l.sphere.material.wireframe = true;
                    } else {
                        l.sphere.scale.set(1, 1, 1);
                        l.sphere.material.wireframe = false;
                    }
                });
            } else {
                selectedLightIndex = -1;
                lights.forEach(l => {
                    l.sphere.scale.set(1, 1, 1);
                    l.sphere.material.wireframe = false;
                });
            }
        }

        // Initialize Default Light
        createLight(0, 3, 0, new THREE.Color(0xffaa44), 2.0, 3000);
        selectLight(0);

        // --- UI Event Listeners ---
        document.getElementById('btn-add-light').addEventListener('click', () => {
            if (lights.length >= 5) return;
            const x = (Math.random() - 0.5) * 10;
            const y = Math.random() * 3 + 1;
            const z = (Math.random() - 0.5) * 10;
            const temp = 4000;
            const color = colorTemperatureToRGB(temp);
            createLight(x, y, z, color, 2.0, temp);
            selectLight(lights.length - 1);
        });

        document.getElementById('btn-remove-light').addEventListener('click', () => {
            if (lights.length === 0) return;
            const last = lights.pop();
            scene.remove(last.group);
            last.light.dispose();
            last.sphere.geometry.dispose();
            last.sphere.material.dispose();
            last.helper.dispose();

            document.getElementById('btn-add-light').disabled = false;
            document.getElementById('btn-remove-light').disabled = lights.length === 0;

            if (selectedLightIndex >= lights.length) {
                selectLight(lights.length - 1);
            } else {
                selectLight(selectedLightIndex);
            }
        });

        document.getElementById('slider-intensity').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('val-intensity').innerText = val.toFixed(1);
            if (selectedLightIndex >= 0) {
                lights[selectedLightIndex].light.intensity = val;
            }
        });

        document.getElementById('slider-color-temp').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('val-color-temp').innerText = val;
            if (selectedLightIndex >= 0) {
                const sel = lights[selectedLightIndex];
                sel.colorTemp = val;
                const color = colorTemperatureToRGB(val);
                sel.light.color.copy(color);
                sel.sphere.material.color.copy(color);
                sel.helper.update();
            }
        });

        document.getElementById('slider-height').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('val-height').innerText = val.toFixed(1);
            if (selectedLightIndex >= 0) {
                lights[selectedLightIndex].group.position.y = val;
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 't') {
                renderer.shadowMap.enabled = !renderer.shadowMap.enabled;
                scene.traverse(child => {
                    if (child.material) child.material.needsUpdate = true;
                });
            }
            const num = parseInt(e.key);
            if (!isNaN(num) && num >= 1 && num <= 5) {
                selectLight(num - 1);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        let lastTime = performance.now();
        let frames = 0;
        let currentFps = 0;

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            frames++;
            if (now >= lastTime + 1000) {
                currentFps = Math.round((frames * 1000) / (now - lastTime));
                frames = 0;
                lastTime = now;
            }

            // Update State
            window.__3D_STATE__.frameCount++;
            window.__3D_STATE__.lightCount = lights.length;
            window.__3D_STATE__.selectedLight = selectedLightIndex;
            window.__3D_STATE__.shadowsEnabled = renderer.shadowMap.enabled;

            let totalInt = 0;
            let valid = true;
            lights.forEach(l => {
                totalInt += l.light.intensity;
                if (!Number.isFinite(l.group.position.x) || !Number.isFinite(l.group.position.y) || !Number.isFinite(l.group.position.z)) {
                    valid = false;
                }
            });
            window.__3D_STATE__.totalLightIntensity = Math.round(totalInt * 10) / 10;
            window.__3D_STATE__.lightsValid = valid;

            if (selectedLightIndex >= 0 && selectedLightIndex < lights.length) {
                const sel = lights[selectedLightIndex];
                window.__3D_STATE__.selectedIntensity = Math.round(sel.light.intensity * 10) / 10;
                window.__3D_STATE__.selectedHeight = Math.round(sel.group.position.y * 10) / 10;
                window.__3D_STATE__.colorTemp = sel.colorTemp;
            } else {
                window.__3D_STATE__.selectedIntensity = 0;
                window.__3D_STATE__.selectedHeight = 0;
                window.__3D_STATE__.colorTemp = 4000;
            }

            // Update HUD DOM
            document.getElementById('hud-lights').innerText = window.__3D_STATE__.lightCount;
            document.getElementById('hud-selected').innerText = window.__3D_STATE__.selectedLight >= 0 ? window.__3D_STATE__.selectedLight + 1 : 'None';
            document.getElementById('hud-intensity').innerText = window.__3D_STATE__.selectedIntensity.toFixed(1);
            document.getElementById('hud-shadows').innerText = window.__3D_STATE__.shadowsEnabled ? 'ON' : 'OFF';
            document.getElementById('hud-models').innerText = window.__3D_STATE__.modelsLoaded;
            document.getElementById('hud-fps').innerText = currentFps;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
