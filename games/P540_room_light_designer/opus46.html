<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Room Lighting Designer</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, sans-serif; }
canvas { display: block; }

#controls {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(20, 20, 40, 0.92);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 16px;
    color: #e0e0e0;
    z-index: 100;
    width: 260px;
    backdrop-filter: blur(10px);
}

#controls h3 {
    margin-bottom: 12px;
    color: #ffaa44;
    font-size: 16px;
    border-bottom: 1px solid rgba(255,170,68,0.3);
    padding-bottom: 8px;
}

.btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}

button {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
}

#btn-add-light {
    background: linear-gradient(135deg, #ffaa44, #ff8800);
    color: #1a1a2e;
}
#btn-add-light:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,170,68,0.4); }
#btn-add-light:disabled { opacity: 0.4; cursor: not-allowed; }

#btn-remove-light {
    background: linear-gradient(135deg, #ff4466, #cc2244);
    color: white;
}
#btn-remove-light:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,68,102,0.4); }
#btn-remove-light:disabled { opacity: 0.4; cursor: not-allowed; }

.slider-group {
    margin-bottom: 10px;
}

.slider-group label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
    color: #aaa;
}

.slider-group label span {
    color: #ffaa44;
    font-weight: 600;
}

input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    outline: none;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #ffaa44;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(255,170,68,0.5);
}

.key-hint {
    font-size: 11px;
    color: #888;
    margin-top: 10px;
    line-height: 1.6;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 8px;
}

.key-hint kbd {
    background: rgba(255,255,255,0.1);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 11px;
    border: 1px solid rgba(255,255,255,0.2);
}

#hud {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(20, 20, 40, 0.92);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 16px;
    color: #e0e0e0;
    z-index: 100;
    min-width: 200px;
    backdrop-filter: blur(10px);
    font-size: 13px;
}

#hud h3 {
    margin-bottom: 10px;
    color: #44aaff;
    font-size: 14px;
    border-bottom: 1px solid rgba(68,170,255,0.3);
    padding-bottom: 6px;
}

.hud-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
}

.hud-row .label { color: #999; }
.hud-row .value { color: #fff; font-weight: 600; }

#light-indicators {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.light-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
}

.light-dot.selected {
    border-color: white;
    transform: scale(1.2);
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
}
</style>
</head>
<body>

<div id="controls">
    <h3>💡 Lighting Designer</h3>
    <div class="btn-row">
        <button id="btn-add-light">+ Add Light</button>
        <button id="btn-remove-light">− Remove</button>
    </div>
    <div class="slider-group">
        <label>Intensity <span id="val-intensity">2.0</span></label>
        <input type="range" id="slider-intensity" min="0.1" max="5.0" step="0.1" value="2.0">
    </div>
    <div class="slider-group">
        <label>Color Temp <span id="val-color-temp">4000K</span></label>
        <input type="range" id="slider-color-temp" min="2000" max="8000" step="100" value="4000">
    </div>
    <div class="slider-group">
        <label>Height <span id="val-height">3.0</span></label>
        <input type="range" id="slider-height" min="0.5" max="4.5" step="0.1" value="3.0">
    </div>
    <div class="key-hint">
        <kbd>1</kbd>-<kbd>5</kbd> Select light &nbsp; <kbd>T</kbd> Toggle shadows
    </div>
</div>

<div id="hud">
    <h3>📊 Scene Info</h3>
    <div class="hud-row"><span class="label">Lights:</span><span class="value" id="hud-lights">1</span></div>
    <div class="hud-row"><span class="label">Selected:</span><span class="value" id="hud-selected">1</span></div>
    <div class="hud-row"><span class="label">Intensity:</span><span class="value" id="hud-intensity">2.0</span></div>
    <div class="hud-row"><span class="label">Shadows:</span><span class="value" id="hud-shadows">ON</span></div>
    <div class="hud-row"><span class="label">Models:</span><span class="value" id="hud-models">0</span></div>
    <div class="hud-row"><span class="label">FPS:</span><span class="value" id="hud-fps">0</span></div>
    <div id="light-indicators"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const lights = [];
let selectedLightIndex = 0;
let shadowsEnabled = true;
let modelsLoaded = 0;
let frameCount = 0;

// FPS tracking
let fpsFrames = 0;
let fpsTime = performance.now();
let currentFPS = 0;

window.__3D_STATE__ = {
    lightCount: 0,
    selectedLight: -1,
    selectedIntensity: 0,
    selectedHeight: 0,
    colorTemp: 4000,
    shadowsEnabled: true,
    modelsLoaded: 0,
    frameCount: 0,
    totalLightIntensity: 0,
    lightsValid: true
};

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(8, 6, 8);
camera.lookAt(0, 0, 0);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1, 0);

// Ambient light (very dim)
const ambientLight = new THREE.AmbientLight(0x202030, 0.1);
scene.add(ambientLight);

// ---- Room Construction ----

// Floor
const floorGeom = new THREE.PlaneGeometry(15, 15);
const floorMat = new THREE.MeshStandardMaterial({
    color: 0x8B7355,
    roughness: 0.7,
    metalness: 0.0
});

// Try to load hardwood texture
const textureLoader = new THREE.TextureLoader();
textureLoader.load(
    'https://threejs.org/examples/textures/hardwood2_diffuse.jpg',
    (texture) => {
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(4, 4);
        floorMat.map = texture;
        floorMat.needsUpdate = true;
    },
    undefined,
    () => {
        // Fallback: create a procedural wood-like pattern
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#8B7355';
        ctx.fillRect(0, 0, 512, 512);
        for (let i = 0; i < 512; i += 32) {
            ctx.fillStyle = i % 64 === 0 ? '#7A6548' : '#9B8365';
            ctx.fillRect(0, i, 512, 16);
        }
        for (let i = 0; i < 200; i++) {
            ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.05})`;
            ctx.fillRect(Math.random() * 512, Math.random() * 512, Math.random() * 100, 1);
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(4, 4);
        floorMat.map = tex;
        floorMat.needsUpdate = true;
    }
);

const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Walls
const wallMat = new THREE.MeshStandardMaterial({ color: 0xccccaa, roughness: 0.9, metalness: 0.0, side: THREE.DoubleSide });

function createWall(width, height, px, py, pz, ry) {
    const geom = new THREE.PlaneGeometry(width, height);
    const wall = new THREE.Mesh(geom, wallMat);
    wall.position.set(px, py, pz);
    wall.rotation.y = ry;
    wall.receiveShadow = true;
    wall.castShadow = false;
    scene.add(wall);
    return wall;
}

// 4 walls
createWall(15, 5, 0, 2.5, -7.5, 0);           // back wall
createWall(15, 5, 0, 2.5, 7.5, Math.PI);       // front wall
createWall(15, 5, -7.5, 2.5, 0, Math.PI / 2);  // left wall
createWall(15, 5, 7.5, 2.5, 0, -Math.PI / 2);  // right wall

// Ceiling
const ceilingGeom = new THREE.PlaneGeometry(15, 15);
const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.9, metalness: 0.0, side: THREE.DoubleSide });
const ceiling = new THREE.Mesh(ceilingGeom, ceilingMat);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = 5;
ceiling.receiveShadow = true;
scene.add(ceiling);

// ---- Furniture placeholder creation (in case GLB fails) ----
function createFurniturePlaceholder(name, width, height, depth, color, px, py, pz) {
    const group = new THREE.Group();
    const geom = new THREE.BoxGeometry(width, height, depth);
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.1 });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.y = height / 2;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
    group.position.set(px, py, pz);
    group.userData.name = name;
    return group;
}

// ---- GLB Loading ----
const loader = new GLTFLoader();
const modelBaseURL = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/';

function enableShadows(object) {
    object.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
        }
    });
}

function fitModelToHeight(model, targetHeight) {
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = targetHeight / maxDim;
    model.scale.multiplyScalar(scale);
    // Recompute box after scaling
    const newBox = new THREE.Box3().setFromObject(model);
    // Place on floor
    model.position.y -= newBox.min.y;
}

// Load Lantern
loader.load(
    modelBaseURL + 'Lantern/glTF-Binary/Lantern.glb',
    (gltf) => {
        const model = gltf.scene;
        fitModelToHeight(model, 0.8);
        model.position.x = 3;
        model.position.z = 2;
        enableShadows(model);
        scene.add(model);
        modelsLoaded++;
    },
    undefined,
    () => {
        // Fallback: create lantern placeholder
        const placeholder = createFurniturePlaceholder('Lantern', 0.3, 0.8, 0.3, 0xcc8833, 3, 0, 2);
        // Add a small light-like top
        const topGeom = new THREE.SphereGeometry(0.12, 8, 8);
        const topMat = new THREE.MeshStandardMaterial({ color: 0xffdd88, emissive: 0xffaa44, emissiveIntensity: 0.3 });
        const top = new THREE.Mesh(topGeom, topMat);
        top.position.y = 0.85;
        top.castShadow = true;
        placeholder.add(top);
        scene.add(placeholder);
        modelsLoaded++;
    }
);

// Load SheenChair
loader.load(
    modelBaseURL + 'SheenChair/glTF-Binary/SheenChair.glb',
    (gltf) => {
        const model = gltf.scene;
        fitModelToHeight(model, 1.2);
        model.position.x = -3;
        model.position.z = -2;
        enableShadows(model);
        scene.add(model);
        modelsLoaded++;
    },
    undefined,
    () => {
        // Fallback chair
        const group = new THREE.Group();
        const seatMat = new THREE.MeshStandardMaterial({ color: 0x884422, roughness: 0.5 });
        // Seat
        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.08, 0.8), seatMat);
        seat.position.y = 0.55;
        seat.castShadow = true; seat.receiveShadow = true;
        group.add(seat);
        // Back
        const back = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.65, 0.08), seatMat);
        back.position.set(0, 0.9, -0.36);
        back.castShadow = true; back.receiveShadow = true;
        group.add(back);
        // Legs
        for (let dx of [-0.3, 0.3]) {
            for (let dz of [-0.3, 0.3]) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.55), seatMat);
                leg.position.set(dx, 0.275, dz);
                leg.castShadow = true; leg.receiveShadow = true;
                group.add(leg);
            }
        }
        // Cushion
        const cushion = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.1, 0.7),
            new THREE.MeshStandardMaterial({ color: 0xcc6644, roughness: 0.8 }));
        cushion.position.y = 0.64;
        cushion.castShadow = true; cushion.receiveShadow = true;
        group.add(cushion);
        group.position.set(-3, 0, -2);
        scene.add(group);
        modelsLoaded++;
    }
);

// Load CoffeeMat (try ToyCar as alternative since coffeemat might not exist)
loader.load(
    modelBaseURL + 'CoffeeDesk/glTF-Binary/CoffeeDesk.glb',
    (gltf) => {
        const model = gltf.scene;
        fitModelToHeight(model, 1.0);
        model.position.set(0, 0, 0);
        enableShadows(model);
        scene.add(model);
        modelsLoaded++;
    },
    undefined,
    () => {
        // Try coffeemat
        loader.load(
            modelBaseURL + 'IridescenceSuzanne/glTF-Binary/IridescenceSuzanne.glb',
            (gltf) => {
                const model = gltf.scene;
                fitModelToHeight(model, 1.0);
                model.position.set(0, 0, 0);
                enableShadows(model);
                scene.add(model);
                modelsLoaded++;
            },
            undefined,
            () => {
                // Fallback: coffee table
                const group = new THREE.Group();
                const tableMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.6, metalness: 0.05 });
                // Table top
                const top = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.06, 0.8), tableMat);
                top.position.y = 0.5;
                top.castShadow = true; top.receiveShadow = true;
                group.add(top);
                // Legs
                for (let dx of [-0.6, 0.6]) {
                    for (let dz of [-0.3, 0.3]) {
                        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5), tableMat);
                        leg.position.set(dx, 0.25, dz);
                        leg.castShadow = true; leg.receiveShadow = true;
                        group.add(leg);
                    }
                }
                // Coffee cup
                const cupMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
                const cup = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.1, 16), cupMat);
                cup.position.set(0.3, 0.58, 0);
                cup.castShadow = true; cup.receiveShadow = true;
                group.add(cup);
                // Book
                const bookMat = new THREE.MeshStandardMaterial({ color: 0x2244aa, roughness: 0.8 });
                const book = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.04, 0.2), bookMat);
                book.position.set(-0.2, 0.55, 0.1);
                book.rotation.y = 0.3;
                book.castShadow = true; book.receiveShadow = true;
                group.add(book);
                group.position.set(0, 0, 0);
                scene.add(group);
                modelsLoaded++;
            }
        );
    }
);

// ---- Color Temperature to RGB ----
function colorTempToRGB(kelvin) {
    let temp = kelvin / 100;
    let r, g, b;

    if (temp <= 66) {
        r = 255;
        g = Math.max(0, Math.min(255, 99.4708025861 * Math.log(temp) - 161.1195681661));
    } else {
        r = Math.max(0, Math.min(255, 329.698727446 * Math.pow(temp - 60, -0.1332047592)));
        g = Math.max(0, Math.min(255, 288.1221695283 * Math.pow(temp - 60, -0.0755148492)));
    }

    if (temp >= 66) {
        b = 255;
    } else if (temp <= 19) {
        b = 0;
    } else {
        b = Math.max(0, Math.min(255, 138.5177312231 * Math.log(temp - 10) - 305.0447927307));
    }

    return new THREE.Color(r / 255, g / 255, b / 255);
}

// ---- Light Management ----
function createLight(x, y, z, color, intensity) {
    const light = new THREE.PointLight(color, intensity, 20, 1);
    light.position.set(x, y, z);
    light.castShadow = shadowsEnabled;
    light.shadow.mapSize.width = 1024;
    light.shadow.mapSize.height = 1024;
    light.shadow.camera.near = 0.1;
    light.shadow.camera.far = 20;
    light.shadow.bias = -0.002;

    // Visible sphere helper
    const sphereGeom = new THREE.SphereGeometry(0.15, 16, 16);
    const sphereMat = new THREE.MeshBasicMaterial({ color: color });
    const sphere = new THREE.Mesh(sphereGeom, sphereMat);
    light.add(sphere);

    // PointLightHelper
    const helper = new THREE.PointLightHelper(light, 0.3);

    scene.add(light);
    scene.add(helper);

    return { light, sphere, sphereMat, helper, colorTemp: 4000 };
}

// Add default light
const defaultColor = colorTempToRGB(4000);
lights.push(createLight(0, 3, 0, defaultColor, 2.0));
lights[0].colorTemp = 4000;

// ---- UI Elements ----
const btnAdd = document.getElementById('btn-add-light');
const btnRemove = document.getElementById('btn-remove-light');
const sliderIntensity = document.getElementById('slider-intensity');
const sliderColorTemp = document.getElementById('slider-color-temp');
const sliderHeight = document.getElementById('slider-height');
const valIntensity = document.getElementById('val-intensity');
const valColorTemp = document.getElementById('val-color-temp');
const valHeight = document.getElementById('val-height');

function updateUI() {
    btnAdd.disabled = lights.length >= 5;
    btnRemove.disabled = lights.length === 0;

    if (selectedLightIndex >= 0 && selectedLightIndex < lights.length) {
        const sel = lights[selectedLightIndex];
        sliderIntensity.value = sel.light.intensity;
        sliderColorTemp.value = sel.colorTemp;
        sliderHeight.value = sel.light.position.y;
        valIntensity.textContent = sel.light.intensity.toFixed(1);
        valColorTemp.textContent = sel.colorTemp + 'K';
        valHeight.textContent = sel.light.position.y.toFixed(1);
    }

    // Update light indicators
    const indicatorDiv = document.getElementById('light-indicators');
    indicatorDiv.innerHTML = '';
    lights.forEach((l, i) => {
        const dot = document.createElement('div');
        dot.className = 'light-dot' + (i === selectedLightIndex ? ' selected' : '');
        const c = l.light.color;
        dot.style.background = `rgb(${Math.round(c.r*255)},${Math.round(c.g*255)},${Math.round(c.b*255)})`;
        dot.textContent = (i + 1);
        dot.style.color = '#000';
        dot.addEventListener('click', () => {
            selectedLightIndex = i;
            updateUI();
        });
        indicatorDiv.appendChild(dot);
    });
}

btnAdd.addEventListener('click', () => {
    if (lights.length >= 5) return;
    const x = (Math.random() * 10) - 5;
    const y = 1 + Math.random() * 3;
    const z = (Math.random() * 10) - 5;
    const color = colorTempToRGB(4000);
    const newLight = createLight(x, y, z, color, 2.0);
    newLight.colorTemp = 4000;
    lights.push(newLight);
    selectedLightIndex = lights.length - 1;
    updateUI();
});

btnRemove.addEventListener('click', () => {
    if (lights.length === 0) return;
    const removed = lights.pop();
    scene.remove(removed.light);
    scene.remove(removed.helper);
    if (selectedLightIndex >= lights.length) {
        selectedLightIndex = lights.length - 1;
    }
    updateUI();
});

sliderIntensity.addEventListener('input', (e) => {
    if (selectedLightIndex >= 0 && selectedLightIndex < lights.length) {
        const val = parseFloat(e.target.value);
        lights[selectedLightIndex].light.intensity = val;
        valIntensity.textContent = val.toFixed(1);
    }
});

sliderColorTemp.addEventListener('input', (e) => {
    if (selectedLightIndex >= 0 && selectedLightIndex < lights.length) {
        const temp = parseInt(e.target.value);
        const color = colorTempToRGB(temp);
        lights[selectedLightIndex].light.color.copy(color);
        lights[selectedLightIndex].sphereMat.color.copy(color);
        lights[selectedLightIndex].colorTemp = temp;
        lights[selectedLightIndex].helper.update();
        valColorTemp.textContent = temp + 'K';
    }
});

sliderHeight.addEventListener('input', (e) => {
    if (selectedLightIndex >= 0 && selectedLightIndex < lights.length) {
        const val = parseFloat(e.target.value);
        lights[selectedLightIndex].light.position.y = val;
        valHeight.textContent = val.toFixed(1);
    }
});

// Keyboard
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key >= '1' && key <= '5') {
        const idx = parseInt(key) - 1;
        if (idx < lights.length) {
            selectedLightIndex = idx;
            updateUI();
        }
    }
    if (key === 't') {
        shadowsEnabled = !shadowsEnabled;
        lights.forEach(l => {
            l.light.castShadow = shadowsEnabled;
        });
    }
});

// ---- Add some extra room detail ----
// Baseboard
const baseboardMat = new THREE.MeshStandardMaterial({ color: 0xddddcc, roughness: 0.8 });
function addBaseboard(x, z, rotY, length) {
    const geom = new THREE.BoxGeometry(length, 0.15, 0.05);
    const mesh = new THREE.Mesh(geom, baseboardMat);
    mesh.position.set(x, 0.075, z);
    mesh.rotation.y = rotY;
    mesh.receiveShadow = true;
    scene.add(mesh);
}
addBaseboard(0, -7.45, 0, 15);
addBaseboard(0, 7.45, 0, 15);
addBaseboard(-7.45, 0, Math.PI/2, 15);
addBaseboard(7.45, 0, Math.PI/2, 15);

// ---- Rug on floor ----
const rugGeom = new THREE.CircleGeometry(2.5, 32);
const rugMat = new THREE.MeshStandardMaterial({ color: 0x663344, roughness: 0.95, metalness: 0 });
const rug = new THREE.Mesh(rugGeom, rugMat);
rug.rotation.x = -Math.PI / 2;
rug.position.y = 0.005;
rug.receiveShadow = true;
scene.add(rug);

// Initial UI
updateUI();

// ---- Animation Loop ----
function animate() {
    requestAnimationFrame(animate);

    frameCount++;
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime >= 1000) {
        currentFPS = Math.round(fpsFrames * 1000 / (now - fpsTime));
        fpsFrames = 0;
        fpsTime = now;
    }

    controls.update();

    // Gentle light sphere pulsing
    lights.forEach((l, i) => {
        if (l.sphere) {
            const s = 1 + 0.1 * Math.sin(now * 0.003 + i * 1.5);
            l.sphere.scale.setScalar(s);
        }
    });

    // Update HUD
    const selIdx = (selectedLightIndex >= 0 && selectedLightIndex < lights.length) ? selectedLightIndex : -1;
    const selLight = selIdx >= 0 ? lights[selIdx] : null;

    document.getElementById('hud-lights').textContent = lights.length;
    document.getElementById('hud-selected').textContent = selIdx >= 0 ? (selIdx + 1) : 'None';
    document.getElementById('hud-intensity').textContent = selLight ? selLight.light.intensity.toFixed(1) : '-';
    document.getElementById('hud-shadows').textContent = shadowsEnabled ? 'ON' : 'OFF';
    document.getElementById('hud-models').textContent = modelsLoaded;
    document.getElementById('hud-fps').textContent = currentFPS;

    // Compute total intensity
    let totalIntensity = 0;
    let allValid = true;
    lights.forEach(l => {
        totalIntensity += l.light.intensity;
        const p = l.light.position;
        if (!isFinite(p.x) || !isFinite(p.y) || !isFinite(p.z)) allValid = false;
        if (isNaN(p.x) || isNaN(p.y) || isNaN(p.z)) allValid = false;
    });

    // Update __3D_STATE__
    window.__3D_STATE__ = {
        lightCount: lights.length,
        selectedLight: selIdx,
        selectedIntensity: selLight ? parseFloat(selLight.light.intensity.toFixed(1)) : 0,
        selectedHeight: selLight ? parseFloat(selLight.light.position.y.toFixed(1)) : 0,
        colorTemp: selLight ? selLight.colorTemp : 4000,
        shadowsEnabled: shadowsEnabled,
        modelsLoaded: modelsLoaded,
        frameCount: frameCount,
        totalLightIntensity: parseFloat(totalIntensity.toFixed(1)),
        lightsValid: allValid
    };

    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
