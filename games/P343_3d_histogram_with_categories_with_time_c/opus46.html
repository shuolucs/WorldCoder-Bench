<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Histogram Visualization</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  canvas { display: block; }

  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.7);
    padding: 12px 20px;
    border-radius: 8px;
    z-index: 100;
  }
  #controls button {
    background: #2c3e50;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  #controls button:hover {
    background: #34495e;
  }
  #timeLabel {
    color: white;
    font-size: 16px;
    font-weight: bold;
    min-width: 40px;
    text-align: center;
  }
  #speedSlider {
    width: 100px;
  }
  .speed-label {
    color: #aaa;
    font-size: 12px;
  }

  #categoryPanel {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 8px;
    z-index: 100;
  }
  #categoryPanel h3 {
    color: white;
    margin: 0 0 10px 0;
    font-size: 14px;
  }
  .category-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    color: white;
    font-size: 13px;
    cursor: pointer;
  }
  .category-toggle input {
    cursor: pointer;
  }
  .color-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
  }

  #tooltip {
    position: fixed;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    pointer-events: none;
    display: none;
    z-index: 200;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="categoryPanel">
  <h3>Categories</h3>
</div>

<div id="controls">
  <button id="prevBtn">⏮ Prev</button>
  <button id="playPauseBtn">▶ Play</button>
  <button id="nextBtn">Next ⏭</button>
  <span id="timeLabel">Jan</span>
  <span class="speed-label">Speed:</span>
  <input type="range" id="speedSlider" min="500" max="3000" value="1000" step="100">
</div>

<div id="tooltip"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Data
const categories = ['Food', 'Transport', 'Energy', 'Water', 'Waste'];
const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
const data = [
  [3.2, 4.1, 3.8, 5.0, 4.5, 4.8],
  [2.5, 2.8, 3.1, 2.9, 3.5, 3.2],
  [5.0, 4.5, 4.0, 3.5, 3.0, 2.8],
  [1.8, 2.0, 2.5, 3.0, 3.5, 4.0],
  [1.0, 1.2, 1.5, 1.3, 1.8, 2.0]
];
const categoryColors = ['#e74c3c', '#3498db', '#f39c12', '#2ecc71', '#9b59b6'];

// State
window.__3D_STATE__ = {
  currentTimeStep: 0,
  currentMonth: 'Jan',
  isPlaying: false,
  barHeights: [3.2, 2.5, 5.0, 1.8, 1.0],
  visibleCategories: [true, true, true, true, true],
  hoveredCategory: null,
  totalVisibleBars: 5,
  animationSpeed: 1000,
  waterBottleLoaded: false,
  cameraDistance: 0,
  sumVisibleHeights: 0
};

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(12, 10, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 15, 5);
scene.add(dirLight);

// Grid
const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x333355);
scene.add(gridHelper);

// Bars
const bars = [];
const barTargetHeights = [];
const barCurrentHeights = [];

for (let i = 0; i < 5; i++) {
  const color = new THREE.Color(categoryColors[i]);
  const geometry = new THREE.BoxGeometry(0.8, 1, 0.8);
  // Shift geometry so bottom is at y=0
  geometry.translate(0, 0.5, 0);
  const material = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.05,
    roughness: 0.4,
    metalness: 0.2
  });
  const mesh = new THREE.Mesh(geometry, material);

  const xPos = (i - 2) * 1.5;
  mesh.position.set(xPos, 0, 0);

  const h = data[i][0];
  mesh.scale.set(1, h, 1);

  mesh.userData = { categoryIndex: i, categoryName: categories[i] };

  scene.add(mesh);
  bars.push(mesh);
  barTargetHeights.push(h);
  barCurrentHeights.push(h);

  // Add label
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 32;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(categories[i], 64, 22);
  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(xPos, -0.5, 1.2);
  sprite.scale.set(2, 0.5, 1);
  scene.add(sprite);
}

// Load WaterBottle
const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/WaterBottle/glTF-Binary/WaterBottle.glb',
  (gltf) => {
    const model = gltf.scene;
    model.position.set(8, 0, -6);
    model.scale.set(5, 5, 5);
    scene.add(model);
    window.__3D_STATE__.waterBottleLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('WaterBottle load error, trying alternate URL...', error);
    // Try alternate CDN
    loader.load(
      'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/WaterBottle/glTF-Binary/WaterBottle.glb',
      (gltf) => {
        const model = gltf.scene;
        model.position.set(8, 0, -6);
        model.scale.set(5, 5, 5);
        scene.add(model);
        window.__3D_STATE__.waterBottleLoaded = true;
      },
      undefined,
      (err2) => {
        console.warn('WaterBottle failed to load from alternate URL too.', err2);
      }
    );
  }
);

// Category toggles
const categoryPanel = document.getElementById('categoryPanel');
for (let i = 0; i < 5; i++) {
  const label = document.createElement('label');
  label.className = 'category-toggle';

  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.checked = true;
  checkbox.id = `toggle_${i}`;

  const dot = document.createElement('span');
  dot.className = 'color-dot';
  dot.style.backgroundColor = categoryColors[i];

  const text = document.createTextNode(categories[i]);

  label.appendChild(checkbox);
  label.appendChild(dot);
  label.appendChild(text);
  categoryPanel.appendChild(label);

  checkbox.addEventListener('change', () => {
    window.__3D_STATE__.visibleCategories[i] = checkbox.checked;
    if (checkbox.checked) {
      barTargetHeights[i] = data[i][window.__3D_STATE__.currentTimeStep];
      bars[i].visible = true;
    } else {
      barTargetHeights[i] = 0;
    }
  });
}

// Time controls
let playInterval = null;
const playPauseBtn = document.getElementById('playPauseBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const timeLabel = document.getElementById('timeLabel');
const speedSlider = document.getElementById('speedSlider');

function setTimeStep(step) {
  window.__3D_STATE__.currentTimeStep = step;
  window.__3D_STATE__.currentMonth = months[step];
  timeLabel.textContent = months[step];

  for (let i = 0; i < 5; i++) {
    if (window.__3D_STATE__.visibleCategories[i]) {
      barTargetHeights[i] = data[i][step];
    } else {
      barTargetHeights[i] = 0;
    }
  }
}

function nextStep() {
  const next = (window.__3D_STATE__.currentTimeStep + 1) % 6;
  setTimeStep(next);
}

function prevStep() {
  const prev = (window.__3D_STATE__.currentTimeStep - 1 + 6) % 6;
  setTimeStep(prev);
}

function startPlaying() {
  if (playInterval) clearInterval(playInterval);
  window.__3D_STATE__.isPlaying = true;
  playPauseBtn.textContent = '⏸ Pause';
  playInterval = setInterval(() => {
    nextStep();
  }, parseInt(speedSlider.value));
}

function stopPlaying() {
  if (playInterval) clearInterval(playInterval);
  playInterval = null;
  window.__3D_STATE__.isPlaying = false;
  playPauseBtn.textContent = '▶ Play';
}

function togglePlayPause() {
  if (window.__3D_STATE__.isPlaying) {
    stopPlaying();
  } else {
    startPlaying();
  }
}

playPauseBtn.addEventListener('click', togglePlayPause);
prevBtn.addEventListener('click', prevStep);
nextBtn.addEventListener('click', nextStep);

speedSlider.addEventListener('input', () => {
  window.__3D_STATE__.animationSpeed = parseInt(speedSlider.value);
  if (window.__3D_STATE__.isPlaying) {
    startPlaying(); // restart with new speed
  }
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowRight') {
    nextStep();
  } else if (e.code === 'ArrowLeft') {
    prevStep();
  } else if (e.code === 'Space') {
    e.preventDefault();
    togglePlayPause();
  } else if (e.code === 'KeyR') {
    stopPlaying();
    setTimeStep(0);
  }
});

// Raycasting / Hover
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
let hoveredBar = null;

document.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(bars);

  // Reset previous hover
  if (hoveredBar) {
    const col = new THREE.Color(categoryColors[hoveredBar.userData.categoryIndex]);
    hoveredBar.material.emissiveIntensity = 0.05;
    hoveredBar = null;
    window.__3D_STATE__.hoveredCategory = null;
  }

  if (intersects.length > 0) {
    const bar = intersects[0].object;
    if (bar.visible && window.__3D_STATE__.visibleCategories[bar.userData.categoryIndex]) {
      hoveredBar = bar;
      bar.material.emissiveIntensity = 0.4;
      window.__3D_STATE__.hoveredCategory = bar.userData.categoryName;

      const catIdx = bar.userData.categoryIndex;
      const val = data[catIdx][window.__3D_STATE__.currentTimeStep];
      tooltip.textContent = `${bar.userData.categoryName}: ${val} units`;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  } else {
    tooltip.style.display = 'none';
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const lerpSpeed = 0.1; // per-frame lerp factor for ~300ms transition at 60fps

function animate() {
  requestAnimationFrame(animate);

  // Animate bar heights
  for (let i = 0; i < 5; i++) {
    const target = barTargetHeights[i];
    const current = barCurrentHeights[i];
    const diff = target - current;

    if (Math.abs(diff) > 0.001) {
      barCurrentHeights[i] = current + diff * lerpSpeed;
    } else {
      barCurrentHeights[i] = target;
    }

    const h = Math.max(barCurrentHeights[i], 0.001);
    bars[i].scale.set(1, h, 1);

    if (!window.__3D_STATE__.visibleCategories[i] && barCurrentHeights[i] < 0.01) {
      bars[i].visible = false;
    }
  }

  // Update state
  window.__3D_STATE__.barHeights = barCurrentHeights.map(h => Math.round(h * 100) / 100);
  window.__3D_STATE__.animationSpeed = parseInt(speedSlider.value);

  let totalVisible = 0;
  let sumHeights = 0;
  for (let i = 0; i < 5; i++) {
    if (window.__3D_STATE__.visibleCategories[i]) {
      totalVisible++;
      sumHeights += barCurrentHeights[i];
    }
  }
  window.__3D_STATE__.totalVisibleBars = totalVisible;
  window.__3D_STATE__.sumVisibleHeights = Math.round(sumHeights * 100) / 100;

  const camDist = camera.position.length();
  window.__3D_STATE__.cameraDistance = Math.round(camDist * 10) / 10;

  controls.update();
  renderer.render(scene, camera);
}

// Initialize
setTimeStep(0);
animate();

</script>
</body>
</html>
