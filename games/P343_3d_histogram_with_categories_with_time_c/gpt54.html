<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Histogram with Time Controls</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #1a1a2e;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .panel {
      position: absolute;
      z-index: 10;
      background: rgba(20, 20, 35, 0.88);
      color: white;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 12px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    }

    #categoryPanel {
      top: 16px;
      left: 16px;
      min-width: 180px;
    }

    #controlsPanel {
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: #2c3e50;
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      filter: brightness(1.1);
    }

    #timeLabel {
      min-width: 48px;
      text-align: center;
      font-weight: bold;
      color: #f1f1f1;
    }

    .cat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      user-select: none;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      flex: 0 0 12px;
    }

    #tooltip {
      position: absolute;
      z-index: 20;
      pointer-events: none;
      display: none;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .speed-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: white;
      font-size: 13px;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="categoryPanel" class="panel">
      <div class="title">Categories</div>
      <label class="cat-row">
        <input type="checkbox" id="toggle_0" checked />
        <span class="dot" style="background:#e74c3c;"></span>
        <span>Food</span>
      </label>
      <label class="cat-row">
        <input type="checkbox" id="toggle_1" checked />
        <span class="dot" style="background:#3498db;"></span>
        <span>Transport</span>
      </label>
      <label class="cat-row">
        <input type="checkbox" id="toggle_2" checked />
        <span class="dot" style="background:#f39c12;"></span>
        <span>Energy</span>
      </label>
      <label class="cat-row">
        <input type="checkbox" id="toggle_3" checked />
        <span class="dot" style="background:#2ecc71;"></span>
        <span>Water</span>
      </label>
      <label class="cat-row">
        <input type="checkbox" id="toggle_4" checked />
        <span class="dot" style="background:#9b59b6;"></span>
        <span>Waste</span>
      </label>
    </div>

    <div id="controlsPanel" class="panel">
      <button id="playPauseBtn">▶ Play</button>
      <button id="prevBtn">Previous</button>
      <button id="nextBtn">Next</button>
      <div id="timeLabel">Jan</div>
      <div class="speed-wrap">
        <span>Speed</span>
        <input id="speedSlider" type="range" min="500" max="3000" value="1000" step="100" />
      </div>
    </div>

    <div id="tooltip"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const container = document.getElementById('app');
    const tooltip = document.getElementById('tooltip');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const timeLabel = document.getElementById('timeLabel');
    const speedSlider = document.getElementById('speedSlider');

    const categories = ['Food', 'Transport', 'Energy', 'Water', 'Waste'];
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
    const colors = ['#e74c3c', '#3498db', '#f39c12', '#2ecc71', '#9b59b6'];

    const data = [
      [3.2, 4.1, 3.8, 5.0, 4.5, 4.8], // Food
      [2.5, 2.8, 3.1, 2.9, 3.5, 3.2], // Transport
      [5.0, 4.5, 4.0, 3.5, 3.0, 2.8], // Energy
      [1.8, 2.0, 2.5, 3.0, 3.5, 4.0], // Water
      [1.0, 1.2, 1.5, 1.3, 1.8, 2.0], // Waste
    ];

    window.__3D_STATE__ = {
      currentTimeStep: 0,
      currentMonth: 'Jan',
      isPlaying: false,
      barHeights: [3.2, 2.5, 5.0, 1.8, 1.0],
      visibleCategories: [true, true, true, true, true],
      hoveredCategory: null,
      totalVisibleBars: 5,
      animationSpeed: Number(speedSlider.value),
      waterBottleLoaded: false,
      cameraDistance: 0,
      sumVisibleHeights: 13.5
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(12, 10, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 15, 5);
    scene.add(directionalLight);

    const gridHelper = new THREE.GridHelper(20, 20, 0x666666, 0x444444);
    gridHelper.position.y = 0;
    scene.add(gridHelper);

    const barGroup = new THREE.Group();
    scene.add(barGroup);

    const boxGeometry = new THREE.BoxGeometry(0.8, 1, 0.8);
    const spacing = 1.5;
    const xStart = -((categories.length - 1) * spacing) / 2;

    const bars = [];
    const visibleCategories = [true, true, true, true, true];
    let currentTimeStep = 0;
    let isPlaying = false;
    let playAccumulator = 0;
    let hoveredBar = null;
    let mouse = new THREE.Vector2();
    const raycaster = new THREE.Raycaster();

    function createBars() {
      for (let i = 0; i < categories.length; i++) {
        const material = new THREE.MeshStandardMaterial({
          color: colors[i],
          emissive: new THREE.Color(colors[i]),
          emissiveIntensity: 0.0,
          metalness: 0.15,
          roughness: 0.6
        });

        const mesh = new THREE.Mesh(boxGeometry, material);
        mesh.position.x = xStart + i * spacing;
        mesh.position.z = 0;
        mesh.position.y = 0.5;
        mesh.scale.y = data[i][0];
        mesh.userData = {
          categoryIndex: i,
          categoryName: categories[i],
          targetHeight: data[i][0],
          startHeight: data[i][0],
          currentHeight: data[i][0],
          animStart: performance.now(),
          animDuration: 300
        };
        mesh.position.y = mesh.scale.y / 2;
        barGroup.add(mesh);
        bars.push(mesh);
      }
    }

    createBars();

    function setBarTarget(index, targetHeight) {
      const bar = bars[index];
      bar.userData.startHeight = bar.userData.currentHeight;
      bar.userData.targetHeight = targetHeight;
      bar.userData.animStart = performance.now();
      bar.userData.animDuration = 300;
      if (targetHeight > 0) {
        bar.visible = true;
      }
    }

    function applyTimeStep(step) {
      currentTimeStep = (step + months.length) % months.length;
      timeLabel.textContent = months[currentTimeStep];
      for (let i = 0; i < bars.length; i++) {
        const target = visibleCategories[i] ? data[i][currentTimeStep] : 0;
        setBarTarget(i, target);
      }
    }

    function nextStep() {
      applyTimeStep(currentTimeStep + 1);
    }

    function prevStep() {
      applyTimeStep(currentTimeStep - 1);
    }

    function setPlaying(value) {
      isPlaying = value;
      playPauseBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
      playAccumulator = 0;
    }

    playPauseBtn.addEventListener('click', () => {
      setPlaying(!isPlaying);
    });

    prevBtn.addEventListener('click', () => {
      prevStep();
    });

    nextBtn.addEventListener('click', () => {
      nextStep();
    });

    speedSlider.addEventListener('input', () => {
      window.__3D_STATE__.animationSpeed = Number(speedSlider.value);
      playAccumulator = 0;
    });

    for (let i = 0; i < categories.length; i++) {
      const cb = document.getElementById(`toggle_${i}`);
      cb.addEventListener('change', () => {
        visibleCategories[i] = cb.checked;
        const target = cb.checked ? data[i][currentTimeStep] : 0;
        setBarTarget(i, target);
      });
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowRight') {
        nextStep();
      } else if (e.code === 'ArrowLeft') {
        prevStep();
      } else if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(!isPlaying);
      } else if (e.key === 'r' || e.key === 'R') {
        setPlaying(false);
        applyTimeStep(0);
      }
    });

    renderer.domElement.addEventListener('mousemove', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      tooltip.style.left = event.clientX + 12 + 'px';
      tooltip.style.top = event.clientY + 12 + 'px';
    });

    const loader = new GLTFLoader();
    loader.load(
      'WaterBottle.glb',
      (gltf) => {
        const model = gltf.scene;
        model.position.set(8, 0, -6);
        model.scale.set(5, 5, 5);
        scene.add(model);
        window.__3D_STATE__.waterBottleLoaded = true;
      },
      undefined,
      () => {
        window.__3D_STATE__.waterBottleLoaded = false;
      }
    );

    function updateBarAnimations(now) {
      for (const bar of bars) {
        const ud = bar.userData;
        const t = Math.min((now - ud.animStart) / ud.animDuration, 1);
        const eased = t < 1 ? (1 - Math.pow(1 - t, 3)) : 1;
        const height = THREE.MathUtils.lerp(ud.startHeight, ud.targetHeight, eased);
        ud.currentHeight = height;

        bar.scale.y = Math.max(height, 0.0001);
        bar.position.y = Math.max(height, 0.0001) / 2;

        if (ud.targetHeight <= 0.001 && height <= 0.02) {
          bar.visible = false;
        }
      }
    }

    function updateHover() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(bars.filter(b => b.visible), false);

      if (hoveredBar && (!intersects.length || hoveredBar !== intersects[0].object)) {
        hoveredBar.material.emissiveIntensity = 0.0;
        hoveredBar = null;
        tooltip.style.display = 'none';
      }

      if (intersects.length) {
        const hit = intersects[0].object;
        if (hoveredBar !== hit) {
          if (hoveredBar) hoveredBar.material.emissiveIntensity = 0.0;
          hoveredBar = hit;
          hoveredBar.material.emissiveIntensity = 0.8;
        }

        const idx = hit.userData.categoryIndex;
        const val = visibleCategories[idx] ? data[idx][currentTimeStep] : 0;
        tooltip.textContent = `${categories[idx]}: ${val} units`;
        tooltip.style.display = 'block';
      } else {
        window.__3D_STATE__.hoveredCategory = null;
      }
    }

    function updateState() {
      const barHeights = bars.map((b, i) => visibleCategories[i] ? Number(b.userData.currentHeight.toFixed(2)) : 0);
      const totalVisibleBars = visibleCategories.filter(Boolean).length;
      const sumVisibleHeights = Number(
        bars.reduce((sum, b, i) => sum + (visibleCategories[i] ? b.userData.currentHeight : 0), 0).toFixed(2)
      );
      const camDist = Number(camera.position.distanceTo(new THREE.Vector3(0, 0, 0)).toFixed(1));

      window.__3D_STATE__.currentTimeStep = currentTimeStep;
      window.__3D_STATE__.currentMonth = months[currentTimeStep];
      window.__3D_STATE__.isPlaying = isPlaying;
      window.__3D_STATE__.barHeights = barHeights;
      window.__3D_STATE__.visibleCategories = [...visibleCategories];
      window.__3D_STATE__.hoveredCategory = hoveredBar ? hoveredBar.userData.categoryName : null;
      window.__3D_STATE__.totalVisibleBars = totalVisibleBars;
      window.__3D_STATE__.animationSpeed = Number(speedSlider.value);
      window.__3D_STATE__.cameraDistance = camDist;
      window.__3D_STATE__.sumVisibleHeights = sumVisibleHeights;
    }

    const clock = new THREE.Clock();

    function animate(now) {
      requestAnimationFrame(animate);

      const delta = clock.getDelta() * 1000;

      if (isPlaying) {
        playAccumulator += delta;
        const interval = Number(speedSlider.value);
        if (playAccumulator >= interval) {
          playAccumulator = 0;
          nextStep();
        }
      }

      updateBarAnimations(now || performance.now());
      updateHover();
      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    applyTimeStep(0);
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
