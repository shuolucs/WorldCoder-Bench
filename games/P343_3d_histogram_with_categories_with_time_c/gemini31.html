<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Histogram</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        
        /* UI Panels */
        .panel {
            position: absolute;
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(4px);
        }

        /* Top Left: Category Toggles */
        #category-panel {
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toggle-row {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            display: inline-block;
        }
        input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        /* Bottom Center: Time Controls */
        #time-panel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        button {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #34495e;
        }
        #timeLabel {
            font-size: 1.2rem;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }
        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
        }
        input[type="range"] {
            width: 100px;
            cursor: pointer;
        }

        /* Tooltip */
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            transform: translate(-50%, -100%);
            margin-top: -10px;
            font-size: 14px;
            z-index: 100;
            white-space: nowrap;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="category-panel" class="panel">
        <div style="margin-bottom: 5px; font-weight: bold; border-bottom: 1px solid #555; padding-bottom: 5px;">Categories</div>
        <!-- Checkboxes injected via JS -->
    </div>

    <div id="time-panel" class="panel">
        <button id="prevBtn">⏮ Prev</button>
        <button id="playPauseBtn">▶ Play</button>
        <button id="nextBtn">Next ⏭</button>
        <div id="timeLabel">Jan</div>
        <div class="slider-container">
            <label for="speedSlider">Speed (ms)</label>
            <input type="range" id="speedSlider" min="500" max="3000" value="1000" step="100">
        </div>
    </div>

    <div id="tooltip"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Data & Configuration ---
        const categories = ['Food', 'Transport', 'Energy', 'Water', 'Waste'];
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
        const colors = [0xe74c3c, 0x3498db, 0xf39c12, 0x2ecc71, 0x9b59b6];
        const dataMatrix = [
            [3.2, 4.1, 3.8, 5.0, 4.5, 4.8], // Food
            [2.5, 2.8, 3.1, 2.9, 3.5, 3.2], // Transport
            [5.0, 4.5, 4.0, 3.5, 3.0, 2.8], // Energy
            [1.8, 2.0, 2.5, 3.0, 3.5, 4.0], // Water
            [1.0, 1.2, 1.5, 1.3, 1.8, 2.0]  // Waste
        ];

        // --- State Management ---
        window.__3D_STATE__ = {
            currentTimeStep: 0,
            currentMonth: months[0],
            isPlaying: false,
            barHeights: [0, 0, 0, 0, 0],
            visibleCategories: [true, true, true, true, true],
            hoveredCategory: null,
            totalVisibleBars: 5,
            animationSpeed: 1000,
            waterBottleLoaded: false,
            cameraDistance: 0,
            sumVisibleHeights: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 10, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 5);
        scene.add(dirLight);

        // Ground Plane
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        scene.add(gridHelper);

        // --- GLTF Model ---
        const loader = new GLTFLoader();
        // Using a reliable CDN for the Khronos sample model
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/WaterBottle/glTF-Binary/WaterBottle.glb',
            (gltf) => {
                const model = gltf.scene;
                model.position.set(8, 0, -6);
                model.scale.set(5, 5, 5);
                scene.add(model);
                window.__3D_STATE__.waterBottleLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading WaterBottle:', error)
        );

        // --- 3D Histogram Bars ---
        const bars = [];
        const barGroup = new THREE.Group();
        scene.add(barGroup);

        // Base geometry with origin at bottom
        const geometry = new THREE.BoxGeometry(0.8, 1, 0.8);
        geometry.translate(0, 0.5, 0); 

        for (let i = 0; i < categories.length; i++) {
            const material = new THREE.MeshStandardMaterial({ 
                color: colors[i],
                roughness: 0.4,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(geometry, material);
            
            // Position: 5x1 grid, spaced 1.5, centered at x=0
            mesh.position.x = (i - 2) * 1.5;
            mesh.position.y = 0;
            mesh.position.z = 0;
            
            // Initial scale based on time step 0
            mesh.scale.y = dataMatrix[i][0];

            mesh.userData = {
                categoryIndex: i,
                categoryName: categories[i],
                baseColor: new THREE.Color(colors[i])
            };

            bars.push(mesh);
            barGroup.add(mesh);
        }

        // --- UI Setup & Logic ---
        
        // Category Toggles
        const categoryPanel = document.getElementById('category-panel');
        categories.forEach((cat, i) => {
            const label = document.createElement('label');
            label.className = 'toggle-row';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = `toggle_${i}`;
            checkbox.checked = true;
            
            checkbox.addEventListener('change', (e) => {
                window.__3D_STATE__.visibleCategories[i] = e.target.checked;
            });

            const dot = document.createElement('span');
            dot.className = 'color-dot';
            dot.style.backgroundColor = '#' + colors[i].toString(16).padStart(6, '0');

            const text = document.createTextNode(cat);

            label.appendChild(checkbox);
            label.appendChild(dot);
            label.appendChild(text);
            categoryPanel.appendChild(label);
        });

        // Time Controls
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const timeLabel = document.getElementById('timeLabel');
        const speedSlider = document.getElementById('speedSlider');

        function setTimeStep(step) {
            let newStep = step;
            if (newStep >= months.length) newStep = 0;
            if (newStep < 0) newStep = months.length - 1;
            
            window.__3D_STATE__.currentTimeStep = newStep;
            window.__3D_STATE__.currentMonth = months[newStep];
            timeLabel.innerText = months[newStep];
        }

        function togglePlay() {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            playPauseBtn.innerText = window.__3D_STATE__.isPlaying ? '⏸ Pause' : '▶ Play';
        }

        playPauseBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', () => setTimeStep(window.__3D_STATE__.currentTimeStep - 1));
        nextBtn.addEventListener('click', () => setTimeStep(window.__3D_STATE__.currentTimeStep + 1));
        
        speedSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.animationSpeed = parseInt(e.target.value);
        });

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowRight':
                    setTimeStep(window.__3D_STATE__.currentTimeStep + 1);
                    break;
                case 'ArrowLeft':
                    setTimeStep(window.__3D_STATE__.currentTimeStep - 1);
                    break;
                case ' ':
                    e.preventDefault(); // Prevent page scroll
                    togglePlay();
                    break;
                case 'r':
                case 'R':
                    setTimeStep(0);
                    if (window.__3D_STATE__.isPlaying) togglePlay();
                    break;
            }
        });

        // --- Hover Interaction (Raycaster) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        let hoveredMesh = null;

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            tooltip.style.left = event.clientX + 'px';
            tooltip.style.top = event.clientY + 'px';
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let timeSinceLastAdvance = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            
            // Auto-advance time
            if (window.__3D_STATE__.isPlaying) {
                timeSinceLastAdvance += delta * 1000; // convert to ms
                if (timeSinceLastAdvance >= window.__3D_STATE__.animationSpeed) {
                    setTimeStep(window.__3D_STATE__.currentTimeStep + 1);
                    timeSinceLastAdvance = 0;
                }
            } else {
                timeSinceLastAdvance = 0;
            }

            // Update Bars (Lerp Heights & Visibility)
            let sumHeights = 0;
            let visibleCount = 0;
            const lerpFactor = 1 - Math.exp(-10 * delta); // Smooth frame-rate independent lerp (~300ms feel)

            for (let i = 0; i < bars.length; i++) {
                const bar = bars[i];
                const isVisible = window.__3D_STATE__.visibleCategories[i];
                const targetHeight = isVisible ? dataMatrix[i][window.__3D_STATE__.currentTimeStep] : 0;

                // Lerp scale Y
                bar.scale.y += (targetHeight - bar.scale.y) * lerpFactor;

                // Handle visibility threshold
                if (bar.scale.y < 0.01 && !isVisible) {
                    bar.scale.y = 0.001; // Prevent matrix inversion issues
                    bar.visible = false;
                } else {
                    bar.visible = true;
                }

                // Update State arrays
                const currentHeight = parseFloat(bar.scale.y.toFixed(2));
                window.__3D_STATE__.barHeights[i] = currentHeight;
                
                if (isVisible) {
                    sumHeights += currentHeight;
                    visibleCount++;
                }
            }

            // Raycasting for Hover
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(barGroup.children).filter(hit => hit.object.visible);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (hoveredMesh !== object) {
                    // Reset previous
                    if (hoveredMesh) hoveredMesh.material.emissive.setHex(0x000000);
                    
                    hoveredMesh = object;
                    // Highlight
                    hoveredMesh.material.emissive.copy(hoveredMesh.userData.baseColor).multiplyScalar(0.5);
                    
                    const catIdx = hoveredMesh.userData.categoryIndex;
                    const val = dataMatrix[catIdx][window.__3D_STATE__.currentTimeStep];
                    tooltip.innerText = `${hoveredMesh.userData.categoryName}: ${val} units`;
                    tooltip.style.opacity = 1;
                    window.__3D_STATE__.hoveredCategory = hoveredMesh.userData.categoryName;
                }
            } else {
                if (hoveredMesh) {
                    hoveredMesh.material.emissive.setHex(0x000000);
                    hoveredMesh = null;
                    tooltip.style.opacity = 0;
                    window.__3D_STATE__.hoveredCategory = null;
                }
            }

            // Update remaining state fields
            window.__3D_STATE__.totalVisibleBars = visibleCount;
            window.__3D_STATE__.sumVisibleHeights = parseFloat(sumHeights.toFixed(2));
            window.__3D_STATE__.cameraDistance = parseFloat(camera.position.distanceTo(new THREE.Vector3(0,0,0)).toFixed(1));

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
