<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Water Surface Rendering</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #controls {
    position: absolute; top: 15px; right: 15px;
    background: rgba(0,0,0,0.75); color: #ddd;
    padding: 18px 22px; border-radius: 10px;
    min-width: 260px; backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  #controls h3 { margin-bottom: 12px; color: #7ec8e3; font-size: 15px; letter-spacing: 1px; }
  .ctrl-row { margin-bottom: 10px; }
  .ctrl-row label { display: block; font-size: 12px; margin-bottom: 3px; color: #aaa; }
  .ctrl-row input[type="range"] { width: 100%; cursor: pointer; }
  .ctrl-row input[type="color"] { width: 50px; height: 28px; border: none; cursor: pointer; background: none; }
  .ctrl-row .val { float: right; font-size: 12px; color: #7ec8e3; }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="controls">
  <h3>🌊 Ocean Controls</h3>
  <div class="ctrl-row">
    <label>Wind Direction <span class="val" id="windDirVal">45°</span></label>
    <input type="range" id="windDir" min="0" max="360" step="1" value="45">
  </div>
  <div class="ctrl-row">
    <label>Wave Height <span class="val" id="waveHeightVal">1.0</span></label>
    <input type="range" id="waveHeight" min="0.1" max="3.0" step="0.1" value="1.0">
  </div>
  <div class="ctrl-row">
    <label>Wave Frequency <span class="val" id="waveFreqVal">1.0</span></label>
    <input type="range" id="waveFreq" min="0.5" max="5.0" step="0.1" value="1.0">
  </div>
  <div class="ctrl-row">
    <label>Choppiness <span class="val" id="choppinessVal">1.0</span></label>
    <input type="range" id="choppiness" min="0" max="2.0" step="0.1" value="1.0">
  </div>
  <div class="ctrl-row">
    <label>Water Color</label>
    <input type="color" id="waterColor" value="#001e0f">
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(50, 40, 80);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI * 0.48;
controls.minDistance = 10;
controls.maxDistance = 500;

// ============ SKY CUBEMAP ============
function generateSkyCubeTexture() {
  const size = 256;
  const faces = [];
  
  for (let f = 0; f < 6; f++) {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    
    const gradient = ctx.createLinearGradient(0, 0, 0, size);
    
    if (f === 2) { // top
      gradient.addColorStop(0, '#1a3a5c');
      gradient.addColorStop(1, '#4a8ab5');
    } else if (f === 3) { // bottom
      gradient.addColorStop(0, '#0a1520');
      gradient.addColorStop(1, '#0a1520');
    } else {
      gradient.addColorStop(0, '#1a3a5c');
      gradient.addColorStop(0.3, '#3a6a8c');
      gradient.addColorStop(0.5, '#6a9ab5');
      gradient.addColorStop(0.7, '#a5c5d5');
      gradient.addColorStop(0.85, '#d5a570');
      gradient.addColorStop(1.0, '#e8c090');
    }
    
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, size, size);
    faces.push(canvas);
  }
  
  const cubeTexture = new THREE.CubeTexture(faces);
  cubeTexture.needsUpdate = true;
  return cubeTexture;
}

const skyCubeTexture = generateSkyCubeTexture();
scene.background = skyCubeTexture;

// ============ LIGHTING ============
const sunDirection = new THREE.Vector3(0.5, 0.6, 0.3).normalize();
const sunLight = new THREE.DirectionalLight(0xffeedd, 2.0);
sunLight.position.copy(sunDirection.clone().multiplyScalar(500));
scene.add(sunLight);

const ambientLight = new THREE.AmbientLight(0x304060, 0.5);
scene.add(ambientLight);

// ============ WAVE PARAMETERS ============
const WAVE_COUNT = 8;

function computeWaveParams(windDirDeg, waveHeight, waveFreq) {
  const windRad = (windDirDeg * Math.PI) / 180.0;
  const waves = [];
  
  for (let i = 0; i < WAVE_COUNT; i++) {
    const angleOffset = ((Math.random() - 0.5) * 2.0 * 60.0 * Math.PI) / 180.0;
    const angle = windRad + angleOffset;
    
    const cascadeFactor = Math.pow(0.7, i);
    const amplitude = waveHeight * cascadeFactor * (0.5 + Math.random() * 0.5);
    const frequency = waveFreq * (1.0 + i * 0.6) * (0.8 + Math.random() * 0.4);
    const speed = Math.sqrt(9.81 / frequency) * (0.8 + Math.random() * 0.4);
    const phase = Math.random() * Math.PI * 2.0;
    
    waves.push({
      direction: [Math.cos(angle), Math.sin(angle)],
      amplitude: amplitude,
      frequency: frequency,
      speed: speed,
      phase: phase
    });
  }
  
  return waves;
}

// Flatten wave params for uniforms
function flattenWaveParams(waves) {
  const dirs = [];
  const amps = [];
  const freqs = [];
  const speeds = [];
  const phases = [];
  
  for (let i = 0; i < WAVE_COUNT; i++) {
    const w = waves[i];
    dirs.push(new THREE.Vector2(w.direction[0], w.direction[1]));
    amps.push(w.amplitude);
    freqs.push(w.frequency);
    speeds.push(w.speed);
    phases.push(w.phase);
  }
  
  return { dirs, amps, freqs, speeds, phases };
}

// ============ SHADER CODE ============
const vertexShader = `
  precision highp float;
  
  uniform float uTime;
  uniform float uChoppiness;
  uniform vec2 uWaveDirs[${WAVE_COUNT}];
  uniform float uWaveAmps[${WAVE_COUNT}];
  uniform float uWaveFreqs[${WAVE_COUNT}];
  uniform float uWaveSpeeds[${WAVE_COUNT}];
  uniform float uWavePhases[${WAVE_COUNT}];
  
  varying vec3 vWorldPosition;
  varying vec3 vNormal;
  varying float vDisplacement;
  varying float vFoamFactor;
  varying vec2 vUv;
  
  void main() {
    vec3 pos = position;
    
    float totalDy = 0.0;
    float totalDx = 0.0;
    float totalDz = 0.0;
    
    // Derivatives for normal calculation
    float dydx = 0.0;
    float dydz = 0.0;
    float ddx_dx = 0.0;
    float ddx_dz = 0.0;
    float ddz_dx = 0.0;
    float ddz_dz = 0.0;
    
    for (int i = 0; i < ${WAVE_COUNT}; i++) {
      vec2 dir = uWaveDirs[i];
      float amp = uWaveAmps[i];
      float freq = uWaveFreqs[i];
      float spd = uWaveSpeeds[i];
      float ph = uWavePhases[i];
      
      float dotVal = dot(dir, pos.xz) * freq + uTime * spd + ph;
      float cosVal = cos(dotVal);
      float sinVal = sin(dotVal);
      
      // Gerstner wave displacement
      totalDx += -uChoppiness * amp * dir.x * sinVal;
      totalDz += -uChoppiness * amp * dir.y * sinVal;
      totalDy += amp * cosVal;
      
      // Analytical derivatives for normal
      float dPhase_dx = dir.x * freq;
      float dPhase_dz = dir.y * freq;
      
      dydx += -amp * sinVal * dPhase_dx;
      dydz += -amp * sinVal * dPhase_dz;
      
      ddx_dx += -uChoppiness * amp * dir.x * cosVal * dPhase_dx;
      ddx_dz += -uChoppiness * amp * dir.x * cosVal * dPhase_dz;
      ddz_dx += -uChoppiness * amp * dir.y * cosVal * dPhase_dx;
      ddz_dz += -uChoppiness * amp * dir.y * cosVal * dPhase_dz;
    }
    
    pos.x += totalDx;
    pos.z += totalDz;
    pos.y += totalDy;
    
    // Compute normal from Jacobian
    // Tangent in x: T_x = (1 + ddx_dx, dydx, ddz_dx)
    // Tangent in z: T_z = (ddx_dz, dydz, 1 + ddz_dz)
    vec3 tangentX = vec3(1.0 + ddx_dx, dydx, ddz_dx);
    vec3 tangentZ = vec3(ddx_dz, dydz, 1.0 + ddz_dz);
    vec3 normal = normalize(cross(tangentZ, tangentX));
    
    // Jacobian determinant for foam
    float J = (1.0 + ddx_dx) * (1.0 + ddz_dz) - ddx_dz * ddz_dx;
    
    vWorldPosition = (modelMatrix * vec4(pos, 1.0)).xyz;
    vNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
    vDisplacement = totalDy;
    vFoamFactor = max(0.0, 1.0 - J) + max(0.0, totalDy - 0.6) * 0.8;
    vUv = uv;
    
    gl_Position = projectionMatrix * viewMatrix * modelMatrix * vec4(pos, 1.0);
  }
`;

const fragmentShader = `
  precision highp float;
  
  uniform float uTime;
  uniform vec3 uWaterColor;
  uniform vec3 uSunDirection;
  uniform vec3 uCameraPosition;
  uniform samplerCube uEnvMap;
  
  varying vec3 vWorldPosition;
  varying vec3 vNormal;
  varying float vDisplacement;
  varying float vFoamFactor;
  varying vec2 vUv;
  
  // Schlick Fresnel
  float fresnelSchlick(float cosTheta) {
    float f0 = 0.02;
    return f0 + (1.0 - f0) * pow(clamp(1.0 - cosTheta, 0.0, 1.0), 5.0);
  }
  
  void main() {
    vec3 normal = normalize(vNormal);
    vec3 viewDir = normalize(uCameraPosition - vWorldPosition);
    
    // Ensure normal faces up generally
    if (normal.y < 0.0) normal = -normal;
    
    float NdotV = max(dot(normal, viewDir), 0.0);
    
    // Fresnel
    float fresnel = fresnelSchlick(NdotV);
    
    // Reflection
    vec3 reflectDir = reflect(-viewDir, normal);
    vec3 reflectionColor = textureCube(uEnvMap, reflectDir).rgb;
    reflectionColor *= 1.2;
    
    // Refraction (simplified - deep water color with depth-based absorption)
    vec3 refractDir = refract(-viewDir, normal, 1.0 / 1.33);
    vec3 deepColor = uWaterColor * 0.3;
    vec3 shallowColor = uWaterColor * 1.5 + vec3(0.0, 0.05, 0.05);
    float depthFactor = clamp(pow(NdotV, 0.5), 0.0, 1.0);
    vec3 refractionColor = mix(deepColor, shallowColor, depthFactor);
    
    // Add some subsurface scattering approximation
    float sss = max(0.0, dot(viewDir, -uSunDirection + normal * 0.5)) * 0.3;
    refractionColor += vec3(0.0, 0.15, 0.1) * sss;
    
    // Combine reflection and refraction
    vec3 color = mix(refractionColor, reflectionColor, fresnel);
    
    // Sun specular (GGX-like)
    vec3 halfDir = normalize(viewDir + uSunDirection);
    float NdotH = max(dot(normal, halfDir), 0.0);
    float roughness = 0.15;
    float alpha = roughness * roughness;
    float alpha2 = alpha * alpha;
    float denom = NdotH * NdotH * (alpha2 - 1.0) + 1.0;
    float D = alpha2 / (3.14159265 * denom * denom);
    float specular = D * max(dot(normal, uSunDirection), 0.0) * 2.0;
    vec3 sunColor = vec3(1.0, 0.9, 0.7);
    color += sunColor * specular * 0.5;
    
    // Secondary broader specular
    float specBroad = pow(NdotH, 50.0) * 0.3;
    color += sunColor * specBroad;
    
    // Foam
    float foam = clamp(vFoamFactor, 0.0, 1.0);
    // Add noise-like variation to foam
    float foamNoise = fract(sin(dot(vWorldPosition.xz * 0.5, vec2(12.9898, 78.233))) * 43758.5453);
    foam *= 0.7 + 0.3 * foamNoise;
    foam = smoothstep(0.1, 0.6, foam);
    vec3 foamColor = vec3(0.9, 0.95, 1.0);
    color = mix(color, foamColor, foam * 0.7);
    
    // Slight distance fog
    float dist = length(uCameraPosition - vWorldPosition);
    float fogFactor = 1.0 - exp(-dist * 0.0008);
    vec3 fogColor = vec3(0.4, 0.5, 0.6);
    color = mix(color, fogColor, fogFactor);
    
    gl_FragColor = vec4(color, 1.0);
  }
`;

// ============ OCEAN MESH ============
const oceanGeometry = new THREE.PlaneGeometry(1000, 1000, 256, 256);
oceanGeometry.rotateX(-Math.PI / 2);

let currentWindDir = 45;
let currentWaveHeight = 1.0;
let currentWaveFreq = 1.0;
let currentChoppiness = 1.0;
let currentWaterColor = '#001e0f';

let waves = computeWaveParams(currentWindDir, currentWaveHeight, currentWaveFreq);
let flatWaves = flattenWaveParams(waves);

const oceanUniforms = {
  uTime: { value: 0.0 },
  uChoppiness: { value: currentChoppiness },
  uWaveDirs: { value: flatWaves.dirs },
  uWaveAmps: { value: flatWaves.amps },
  uWaveFreqs: { value: flatWaves.freqs },
  uWaveSpeeds: { value: flatWaves.speeds },
  uWavePhases: { value: flatWaves.phases },
  uWaterColor: { value: new THREE.Color(currentWaterColor) },
  uSunDirection: { value: sunDirection.clone() },
  uCameraPosition: { value: camera.position.clone() },
  uEnvMap: { value: skyCubeTexture }
};

const oceanMaterial = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  uniforms: oceanUniforms,
  side: THREE.DoubleSide
});

const oceanMesh = new THREE.Mesh(oceanGeometry, oceanMaterial);
scene.add(oceanMesh);

// ============ CONTROLS ============
const windDirSlider = document.getElementById('windDir');
const waveHeightSlider = document.getElementById('waveHeight');
const waveFreqSlider = document.getElementById('waveFreq');
const choppinessSlider = document.getElementById('choppiness');
const waterColorPicker = document.getElementById('waterColor');

const windDirVal = document.getElementById('windDirVal');
const waveHeightVal = document.getElementById('waveHeightVal');
const waveFreqVal = document.getElementById('waveFreqVal');
const choppinessVal = document.getElementById('choppinessVal');

function updateWaves() {
  waves = computeWaveParams(currentWindDir, currentWaveHeight, currentWaveFreq);
  const flat = flattenWaveParams(waves);
  oceanUniforms.uWaveDirs.value = flat.dirs;
  oceanUniforms.uWaveAmps.value = flat.amps;
  oceanUniforms.uWaveFreqs.value = flat.freqs;
  oceanUniforms.uWaveSpeeds.value = flat.speeds;
  oceanUniforms.uWavePhases.value = flat.phases;
}

windDirSlider.addEventListener('input', (e) => {
  currentWindDir = parseFloat(e.target.value);
  windDirVal.textContent = currentWindDir + '°';
  updateWaves();
});

waveHeightSlider.addEventListener('input', (e) => {
  currentWaveHeight = parseFloat(e.target.value);
  waveHeightVal.textContent = currentWaveHeight.toFixed(1);
  updateWaves();
});

waveFreqSlider.addEventListener('input', (e) => {
  currentWaveFreq = parseFloat(e.target.value);
  waveFreqVal.textContent = currentWaveFreq.toFixed(1);
  updateWaves();
});

choppinessSlider.addEventListener('input', (e) => {
  currentChoppiness = parseFloat(e.target.value);
  choppinessVal.textContent = currentChoppiness.toFixed(1);
  oceanUniforms.uChoppiness.value = currentChoppiness;
});

waterColorPicker.addEventListener('input', (e) => {
  currentWaterColor = e.target.value;
  oceanUniforms.uWaterColor.value.set(currentWaterColor);
});

// ============ MAX DISPLACEMENT CALCULATION ============
function computeMaxDisplacement(time) {
  // Compute analytically: max possible displacement is sum of all amplitudes
  // For actual current max, sample a few points
  let maxDisp = 0;
  const sampleCount = 50;
  
  for (let si = 0; si < sampleCount; si++) {
    const sx = (Math.random() - 0.5) * 500;
    const sz = (Math.random() - 0.5) * 500;
    let dy = 0;
    
    for (let i = 0; i < WAVE_COUNT; i++) {
      const w = waves[i];
      const dotVal = (w.direction[0] * sx + w.direction[1] * sz) * w.frequency + time * w.speed + w.phase;
      dy += w.amplitude * Math.cos(dotVal);
    }
    
    maxDisp = Math.max(maxDisp, Math.abs(dy));
  }
  
  return maxDisp;
}

// ============ STATE ============
window.__3D_STATE__ = {
  windDir: currentWindDir,
  waveHeight: currentWaveHeight,
  waveFreq: currentWaveFreq,
  choppiness: currentChoppiness,
  waterColor: currentWaterColor,
  waveCount: WAVE_COUNT,
  simTime: 0,
  maxDisplacement: 0
};

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const elapsed = clock.getElapsedTime();
  
  oceanUniforms.uTime.value = elapsed;
  oceanUniforms.uCameraPosition.value.copy(camera.position);
  
  controls.update();
  
  // Compute max displacement
  const maxDisp = computeMaxDisplacement(elapsed);
  
  // Update state
  window.__3D_STATE__ = {
    windDir: currentWindDir,
    waveHeight: currentWaveHeight,
    waveFreq: currentWaveFreq,
    choppiness: currentChoppiness,
    waterColor: currentWaterColor,
    waveCount: WAVE_COUNT,
    simTime: parseFloat(elapsed.toFixed(2)),
    maxDisplacement: parseFloat(maxDisp.toFixed(3))
  };
  
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
