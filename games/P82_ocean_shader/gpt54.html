<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Ocean - Sine + Gerstner Waves</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #87b9ff;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 18, 28, 0.68);
      color: #fff;
      padding: 12px 14px;
      border-radius: 10px;
      backdrop-filter: blur(8px);
      min-width: 260px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    #ui h3 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 600;
    }

    .row {
      display: grid;
      grid-template-columns: 90px 1fr 48px;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
      font-size: 13px;
    }

    .row input[type="range"] {
      width: 100%;
    }

    .row input[type="color"] {
      width: 100%;
      height: 28px;
      border: none;
      background: transparent;
      padding: 0;
    }

    #hint {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.85;
      line-height: 1.4;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h3>海洋参数控制</h3>

      <div class="row">
        <label for="windDir">风向</label>
        <input id="windDir" type="range" min="0" max="360" step="1" value="45" />
        <span id="windDirVal">45</span>
      </div>

      <div class="row">
        <label for="waveHeight">波高</label>
        <input id="waveHeight" type="range" min="0.1" max="3.0" step="0.1" value="1.0" />
        <span id="waveHeightVal">1.0</span>
      </div>

      <div class="row">
        <label for="waveFreq">波频</label>
        <input id="waveFreq" type="range" min="0.5" max="5.0" step="0.1" value="1.0" />
        <span id="waveFreqVal">1.0</span>
      </div>

      <div class="row">
        <label for="choppiness">尖锐度</label>
        <input id="choppiness" type="range" min="0" max="2.0" step="0.1" value="1.0" />
        <span id="choppinessVal">1.0</span>
      </div>

      <div class="row">
        <label for="waterColor">水色</label>
        <input id="waterColor" type="color" value="#001e0f" />
        <span id="waterColorVal">#001e0f</span>
      </div>

      <div id="hint">
        鼠标拖动旋转视角，滚轮缩放。<br>
        使用 8 组波叠加 + Gerstner 位移 + 菲涅尔反射/折射 + 泡沫。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');

    const scene = new THREE.Scene();

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 5000);
    camera.position.set(80, 55, 120);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 10, 0);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI * 0.48;
    controls.minDistance = 20;
    controls.maxDistance = 500;

    // --- Sky background ---
    function createSkyTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');

      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0.0, '#9ed0ff');
      grad.addColorStop(0.35, '#b9dcff');
      grad.addColorStop(0.68, '#dceeff');
      grad.addColorStop(1.0, '#f5fbff');

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.needsUpdate = true;
      return tex;
    }

    scene.background = createSkyTexture();

    // --- Simple environment cubemap generated from canvases ---
    function makeFaceCanvas(topColor, bottomColor, sun = false) {
      const c = document.createElement('canvas');
      c.width = 256;
      c.height = 256;
      const ctx = c.getContext('2d');

      const g = ctx.createLinearGradient(0, 0, 0, 256);
      g.addColorStop(0, topColor);
      g.addColorStop(1, bottomColor);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 256, 256);

      if (sun) {
        const rg = ctx.createRadialGradient(128, 90, 4, 128, 90, 55);
        rg.addColorStop(0.0, 'rgba(255,255,240,1.0)');
        rg.addColorStop(0.15, 'rgba(255,245,210,0.95)');
        rg.addColorStop(0.4, 'rgba(255,220,140,0.35)');
        rg.addColorStop(1.0, 'rgba(255,220,140,0.0)');
        ctx.fillStyle = rg;
        ctx.beginPath();
        ctx.arc(128, 90, 55, 0, Math.PI * 2);
        ctx.fill();
      }

      return c;
    }

    const cubeTexture = new THREE.CubeTexture([
      makeFaceCanvas('#9ed0ff', '#dff1ff'),
      makeFaceCanvas('#9ed0ff', '#dff1ff'),
      makeFaceCanvas('#6caef5', '#cfe8ff', true),
      makeFaceCanvas('#154060', '#2a5b80'),
      makeFaceCanvas('#9ed0ff', '#eaf6ff'),
      makeFaceCanvas('#9ed0ff', '#eaf6ff')
    ]);
    cubeTexture.needsUpdate = true;
    cubeTexture.colorSpace = THREE.SRGBColorSpace;

    // --- Sun light ---
    const sunDirection = new THREE.Vector3(0.4, 0.85, 0.3).normalize();

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.2);
    dirLight.position.copy(sunDirection.clone().multiplyScalar(300));
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0x88aacc, 0.35);
    scene.add(ambientLight);

    // --- Ocean geometry ---
    const geometry = new THREE.PlaneGeometry(1000, 1000, 256, 256);
    geometry.rotateX(-Math.PI / 2);

    const WAVE_COUNT = 8;

    const ui = {
      windDir: document.getElementById('windDir'),
      waveHeight: document.getElementById('waveHeight'),
      waveFreq: document.getElementById('waveFreq'),
      choppiness: document.getElementById('choppiness'),
      waterColor: document.getElementById('waterColor'),

      windDirVal: document.getElementById('windDirVal'),
      waveHeightVal: document.getElementById('waveHeightVal'),
      waveFreqVal: document.getElementById('waveFreqVal'),
      choppinessVal: document.getElementById('choppinessVal'),
      waterColorVal: document.getElementById('waterColorVal')
    };

    function updateUILabels() {
      ui.windDirVal.textContent = ui.windDir.value;
      ui.waveHeightVal.textContent = Number(ui.waveHeight.value).toFixed(1);
      ui.waveFreqVal.textContent = Number(ui.waveFreq.value).toFixed(1);
      ui.choppinessVal.textContent = Number(ui.choppiness.value).toFixed(1);
      ui.waterColorVal.textContent = ui.waterColor.value;
    }
    updateUILabels();

    ['input', 'change'].forEach(evt => {
      ui.windDir.addEventListener(evt, updateUILabels);
      ui.waveHeight.addEventListener(evt, updateUILabels);
      ui.waveFreq.addEventListener(evt, updateUILabels);
      ui.choppiness.addEventListener(evt, updateUILabels);
      ui.waterColor.addEventListener(evt, updateUILabels);
    });

    function seededRandom(seed) {
      let x = Math.sin(seed) * 10000;
      return x - Math.floor(x);
    }

    function buildWaveParams() {
      const windDeg = Number(ui.windDir.value);
      const windRad = THREE.MathUtils.degToRad(windDeg);
      const baseDir = new THREE.Vector2(Math.cos(windRad), Math.sin(windRad)).normalize();

      const waveHeight = Number(ui.waveHeight.value);
      const waveFreq = Number(ui.waveFreq.value);

      const directions = [];
      const amplitudes = [];
      const frequencies = [];
      const phases = [];
      const speeds = [];

      for (let i = 0; i < WAVE_COUNT; i++) {
        const t = i / Math.max(WAVE_COUNT - 1, 1);

        const spreadDeg = -60 + seededRandom(i * 13.17 + windDeg * 0.123) * 120;
        const spreadRad = THREE.MathUtils.degToRad(spreadDeg);
        const dirAngle = windRad + spreadRad;

        const dir = new THREE.Vector2(Math.cos(dirAngle), Math.sin(dirAngle)).normalize();

        // 级联衰减：高频波振幅更小
        const amp = waveHeight * (0.42 * Math.pow(0.72, i)) * (0.85 + 0.3 * seededRandom(i * 9.91 + 2.7));
        const freq = waveFreq * (0.55 + i * 0.45) * (0.9 + 0.25 * seededRandom(i * 3.17 + 8.2));
        const phase = seededRandom(i * 21.73 + 1.5) * Math.PI * 2.0;
        const speed = 0.6 + freq * 1.25 + t * 0.45;

        directions.push(dir);
        amplitudes.push(amp);
        frequencies.push(freq * 0.06); // 缩放到适合世界尺寸
        phases.push(phase);
        speeds.push(speed);
      }

      return { baseDir, directions, amplitudes, frequencies, phases, speeds };
    }

    const initialWaveData = buildWaveParams();

    const uniforms = {
      time: { value: 0 },
      windDir: { value: initialWaveData.baseDir.clone() },
      waveHeight: { value: Number(ui.waveHeight.value) },
      waveFreq: { value: Number(ui.waveFreq.value) },
      choppiness: { value: Number(ui.choppiness.value) },
      waterColor: { value: new THREE.Color(ui.waterColor.value) },
      sunDirection: { value: sunDirection.clone() },
      envMap: { value: cubeTexture },

      waveDirections: { value: initialWaveData.directions.map(v => v.clone()) },
      waveAmplitudes: { value: initialWaveData.amplitudes.slice() },
      waveFrequencies: { value: initialWaveData.frequencies.slice() },
      wavePhases: { value: initialWaveData.phases.slice() },
      waveSpeeds: { value: initialWaveData.speeds.slice() }
    };

    const vertexShader = `
      #define WAVE_COUNT 8

      uniform float time;
      uniform float choppiness;

      uniform vec2 waveDirections[WAVE_COUNT];
      uniform float waveAmplitudes[WAVE_COUNT];
      uniform float waveFrequencies[WAVE_COUNT];
      uniform float wavePhases[WAVE_COUNT];
      uniform float waveSpeeds[WAVE_COUNT];

      varying vec3 vWorldPosition;
      varying vec3 vNormalW;
      varying float vHeight;
      varying float vFoamFactor;

      vec3 gerstnerDisplacement(vec2 xz) {
        vec3 disp = vec3(0.0);
        for (int i = 0; i < WAVE_COUNT; i++) {
          vec2 d = normalize(waveDirections[i]);
          float a = waveAmplitudes[i];
          float f = waveFrequencies[i];
          float ph = wavePhases[i];
          float sp = waveSpeeds[i];

          float theta = dot(d, xz) * f + time * sp + ph;
          float s = sin(theta);
          float c = cos(theta);

          disp.x += -choppiness * a * d.x * s;
          disp.y += a * c;
          disp.z += -choppiness * a * d.y * s;
        }
        return disp;
      }

      float waveHeightAt(vec2 xz) {
        float h = 0.0;
        for (int i = 0; i < WAVE_COUNT; i++) {
          vec2 d = normalize(waveDirections[i]);
          float a = waveAmplitudes[i];
          float f = waveFrequencies[i];
          float ph = wavePhases[i];
          float sp = waveSpeeds[i];

          float theta = dot(d, xz) * f + time * sp + ph;
          h += a * cos(theta);
        }
        return h;
      }

      void main() {
        vec3 pos = position;

        vec3 disp = gerstnerDisplacement(pos.xz);
        pos += disp;

        // 差分法线
        float eps = 0.75;
        vec3 px1 = vec3(position.x + eps, position.y, position.z) + gerstnerDisplacement(vec2(position.x + eps, position.z));
        vec3 px0 = vec3(position.x - eps, position.y, position.z) + gerstnerDisplacement(vec2(position.x - eps, position.z));
        vec3 pz1 = vec3(position.x, position.y, position.z + eps) + gerstnerDisplacement(vec2(position.x, position.z + eps));
        vec3 pz0 = vec3(position.x, position.y, position.z - eps) + gerstnerDisplacement(vec2(position.x, position.z - eps));

        vec3 tangentX = px1 - px0;
        vec3 tangentZ = pz1 - pz0;
        vec3 n = normalize(cross(tangentZ, tangentX));

        // 泡沫因子：波峰 + 坡度
        float slope = 1.0 - max(n.y, 0.0);
        float crest = smoothstep(0.35, 1.25, disp.y);
        float foam = clamp(crest * 0.75 + slope * 1.2, 0.0, 1.0);

        vec4 worldPos = modelMatrix * vec4(pos, 1.0);
        vWorldPosition = worldPos.xyz;
        vNormalW = normalize(mat3(modelMatrix) * n);
        vHeight = disp.y;
        vFoamFactor = foam;

        gl_Position = projectionMatrix * viewMatrix * worldPos;
      }
    `;

    const fragmentShader = `
      #define WAVE_COUNT 8

      uniform vec3 waterColor;
      uniform vec3 sunDirection;
      uniform samplerCube envMap;

      varying vec3 vWorldPosition;
      varying vec3 vNormalW;
      varying float vHeight;
      varying float vFoamFactor;

      void main() {
        vec3 N = normalize(vNormalW);
        vec3 V = normalize(cameraPosition - vWorldPosition);
        vec3 L = normalize(sunDirection);

        // 反射
        vec3 R = reflect(-V, N);
        vec3 reflection = textureCube(envMap, R).rgb;

        // 折射：简化为深浅渐变 + 法线扰动
        float refractAmount = 0.75 - 0.35 * N.y;
        vec3 shallowColor = waterColor * 1.4 + vec3(0.02, 0.08, 0.08);
        vec3 deepColor = waterColor * 0.55 + vec3(0.0, 0.01, 0.02);
        float depthMix = clamp(0.5 + vHeight * 0.18 + refractAmount, 0.0, 1.0);
        vec3 refraction = mix(shallowColor, deepColor, depthMix);

        // 菲涅尔
        float fresnel = pow(1.0 - max(dot(V, N), 0.0), 5.0);
        fresnel = clamp(0.04 + fresnel * 0.96, 0.0, 1.0);

        // 太阳高光（Blinn-Phong）
        vec3 H = normalize(V + L);
        float spec = pow(max(dot(N, H), 0.0), 180.0) * 1.8;
        float sunMask = max(dot(N, L), 0.0);
        vec3 specular = vec3(1.0, 0.92, 0.78) * spec * sunMask;

        // 泡沫
        float foamMask = smoothstep(0.45, 0.95, vFoamFactor);
        vec3 foam = vec3(1.0) * foamMask * 0.85;

        vec3 color = mix(refraction, reflection, fresnel);
        color += specular;
        color = mix(color, vec3(1.0), foamMask * 0.45);
        color += foam * 0.35;

        // 轻微太阳散射染色
        color += vec3(0.08, 0.06, 0.03) * pow(max(dot(R, L), 0.0), 8.0) * 0.2;

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const material = new THREE.ShaderMaterial({
      uniforms,
      vertexShader,
      fragmentShader,
      side: THREE.DoubleSide
    });

    const ocean = new THREE.Mesh(geometry, material);
    ocean.position.y = 0;
    scene.add(ocean);

    // --- Helper for wave update ---
    function refreshWaveUniforms() {
      const data = buildWaveParams();

      uniforms.windDir.value.copy(data.baseDir);
      uniforms.waveHeight.value = Number(ui.waveHeight.value);
      uniforms.waveFreq.value = Number(ui.waveFreq.value);
      uniforms.choppiness.value = Number(ui.choppiness.value);
      uniforms.waterColor.value.set(ui.waterColor.value);

      for (let i = 0; i < WAVE_COUNT; i++) {
        uniforms.waveDirections.value[i].copy(data.directions[i]);
        uniforms.waveAmplitudes.value[i] = data.amplitudes[i];
        uniforms.waveFrequencies.value[i] = data.frequencies[i];
        uniforms.wavePhases.value[i] = data.phases[i];
        uniforms.waveSpeeds.value[i] = data.speeds[i];
      }
    }

    ui.windDir.addEventListener('input', refreshWaveUniforms);
    ui.waveHeight.addEventListener('input', refreshWaveUniforms);
    ui.waveFreq.addEventListener('input', refreshWaveUniforms);
    ui.choppiness.addEventListener('input', refreshWaveUniforms);
    ui.waterColor.addEventListener('input', refreshWaveUniforms);

    refreshWaveUniforms();

    // --- CPU side max displacement calculation ---
    const positionAttr = geometry.attributes.position;
    const basePositions = new Float32Array(positionAttr.array);

    function computeHeightAt(x, z, timeSec) {
      let y = 0;
      const dirs = uniforms.waveDirections.value;
      const amps = uniforms.waveAmplitudes.value;
      const freqs = uniforms.waveFrequencies.value;
      const phases = uniforms.wavePhases.value;
      const speeds = uniforms.waveSpeeds.value;

      for (let i = 0; i < WAVE_COUNT; i++) {
        const d = dirs[i];
        const theta = (d.x * x + d.y * z) * freqs[i] + timeSec * speeds[i] + phases[i];
        y += amps[i] * Math.cos(theta);
      }
      return y;
    }

    let maxDisplacement = 0;

    function updateMaxDisplacement(timeSec) {
      let maxAbs = 0;
      const arr = basePositions;
      const sampleStep = 24; // 降低 CPU 开销，仍足够反映当前帧波峰

      for (let i = 0; i < arr.length; i += 3 * sampleStep) {
        const x = arr[i];
        const z = arr[i + 2];
        const y = computeHeightAt(x, z, timeSec);
        const ay = Math.abs(y);
        if (ay > maxAbs) maxAbs = ay;
      }

      maxDisplacement = maxAbs;
    }

    // --- state exposure ---
    window.__3D_STATE__ = {
      windDir: Number(ui.windDir.value),
      waveHeight: Number(ui.waveHeight.value),
      waveFreq: Number(ui.waveFreq.value),
      choppiness: Number(ui.choppiness.value),
      waterColor: ui.waterColor.value,
      waveCount: WAVE_COUNT,
      simTime: 0,
      maxDisplacement: 0
    };

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();
      uniforms.time.value = t;

      controls.update();

      updateMaxDisplacement(t);

      window.__3D_STATE__ = {
        windDir: Number(ui.windDir.value),
        waveHeight: Number(ui.waveHeight.value),
        waveFreq: Number(ui.waveFreq.value),
        choppiness: Number(ui.choppiness.value),
        waterColor: ui.waterColor.value,
        waveCount: WAVE_COUNT,
        simTime: t,
        maxDisplacement: maxDisplacement
      };

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
