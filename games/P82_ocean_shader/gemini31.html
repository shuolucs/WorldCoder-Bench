<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Gerstner Ocean</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            width: 250px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }
        input[type=range] {
            width: 100%;
        }
        input[type=color] {
            width: 100%;
            height: 30px;
            border: none;
            padding: 0;
            background: none;
            cursor: pointer;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-panel">
        <div class="control-group">
            <label>Wind Direction <span id="val-windDir">45°</span></label>
            <input type="range" id="windDir" min="0" max="360" step="1" value="45">
        </div>
        <div class="control-group">
            <label>Wave Height <span id="val-waveHeight">1.0</span></label>
            <input type="range" id="waveHeight" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>Wave Frequency <span id="val-waveFreq">1.0</span></label>
            <input type="range" id="waveFreq" min="0.5" max="5.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>Choppiness <span id="val-choppiness">1.0</span></label>
            <input type="range" id="choppiness" min="0" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>Water Color</label>
            <input type="color" id="waterColor" value="#001e0f">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            windDir: 45,
            waveHeight: 1.0,
            waveFreq: 1.0,
            choppiness: 1.0,
            waterColor: '#001e0f',
            waveCount: 8,
            simTime: 0,
            maxDisplacement: 0
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
        camera.position.set(0, 30, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;

        // --- Environment Map (Skybox) ---
        function createEnvironmentMap() {
            const faces = [];
            for (let i = 0; i < 6; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                
                if (i === 2) { // Top
                    ctx.fillStyle = '#87CEEB';
                    ctx.fillRect(0, 0, 512, 512);
                } else if (i === 3) { // Bottom
                    ctx.fillStyle = '#001e0f';
                    ctx.fillRect(0, 0, 512, 512);
                } else { // Sides
                    const grad = ctx.createLinearGradient(0, 0, 0, 512);
                    grad.addColorStop(0, '#87CEEB');
                    grad.addColorStop(0.45, '#b0e0e6');
                    grad.addColorStop(0.5, '#4682B4');
                    grad.addColorStop(1, '#001e0f');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 512, 512);
                }
                faces.push(canvas);
            }
            const cubeTexture = new THREE.CubeTexture(faces);
            cubeTexture.needsUpdate = true;
            return cubeTexture;
        }
        const envMap = createEnvironmentMap();
        scene.background = envMap;

        // --- Lighting ---
        const sunDirection = new THREE.Vector3(1, 0.5, -1).normalize();
        const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
        sunLight.position.copy(sunDirection).multiplyScalar(500);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x404040, 1.0));

        // --- Wave Data Generation ---
        const NUM_WAVES = 8;
        const wavesData = [];
        const randomOffsets = [];
        const randomPhases = [];
        
        for (let i = 0; i < NUM_WAVES; i++) {
            wavesData.push({
                direction: new THREE.Vector2(),
                amplitude: 0,
                frequency: 0,
                speed: 0,
                phase: 0
            });
            // Random spread between -60 and +60 degrees
            randomOffsets.push((Math.random() * 120 - 60) * Math.PI / 180);
            randomPhases.push(Math.random() * Math.PI * 2);
        }

        function updateWaveParameters() {
            const windAngle = window.__3D_STATE__.windDir * Math.PI / 180;
            const baseHeight = window.__3D_STATE__.waveHeight;
            const baseFreq = window.__3D_STATE__.waveFreq;

            let currentAmp = baseHeight * 0.5;
            let currentFreq = baseFreq * 0.2;

            for (let i = 0; i < NUM_WAVES; i++) {
                const angle = windAngle + randomOffsets[i];
                wavesData[i].direction.set(Math.cos(angle), Math.sin(angle));
                wavesData[i].amplitude = currentAmp;
                wavesData[i].frequency = currentFreq;
                // Empirical speed formula
                wavesData[i].speed = Math.sqrt(9.8 * 2.0 * Math.PI / currentFreq) * 0.05;
                wavesData[i].phase = randomPhases[i];

                // Cascade attenuation
                currentFreq *= 1.18;
                currentAmp *= 0.82;
            }
        }

        // --- Water Material ---
        const waterUniforms = {
            time: { value: 0 },
            windDir: { value: 45 },
            waveHeight: { value: 1.0 },
            waveFreq: { value: 1.0 },
            choppiness: { value: 1.0 },
            waterColor: { value: new THREE.Color('#001e0f') },
            sunDirection: { value: sunDirection },
            envMap: { value: envMap },
            waves: { value: wavesData }
        };

        const vertexShader = `
            #define NUM_WAVES 8

            struct Wave {
                vec2 direction;
                float amplitude;
                float frequency;
                float speed;
                float phase;
            };

            uniform Wave waves[NUM_WAVES];
            uniform float time;
            uniform float choppiness;

            varying vec3 vWorldPosition;
            varying vec3 vNormal;

            void main() {
                vec3 p = position;
                vec3 tangent = vec3(1.0, 0.0, 0.0);
                vec3 binormal = vec3(0.0, 0.0, 1.0);
                vec3 displacement = vec3(0.0);

                for (int i = 0; i < NUM_WAVES; i++) {
                    Wave w = waves[i];
                    float d = dot(w.direction, p.xz);
                    float arg = d * w.frequency + time * w.speed + w.phase;
                    float sinA = sin(arg);
                    float cosA = cos(arg);

                    // Gerstner displacement
                    displacement.x -= choppiness * w.amplitude * w.direction.x * sinA;
                    displacement.y += w.amplitude * cosA;
                    displacement.z -= choppiness * w.amplitude * w.direction.y * sinA;

                    // Analytical derivatives for normal
                    float wa = w.frequency * w.amplitude;
                    float cosWa = cosA * wa;
                    float sinWa = sinA * wa;

                    tangent.x -= choppiness * w.direction.x * w.direction.x * cosWa;
                    tangent.y -= w.direction.x * sinWa;
                    tangent.z -= choppiness * w.direction.x * w.direction.y * cosWa;

                    binormal.x -= choppiness * w.direction.x * w.direction.y * cosWa;
                    binormal.y -= w.direction.y * sinWa;
                    binormal.z -= choppiness * w.direction.y * w.direction.y * cosWa;
                }

                p += displacement;
                vWorldPosition = (modelMatrix * vec4(p, 1.0)).xyz;

                vec3 normal = normalize(cross(binormal, tangent));
                if (normal.y < 0.0) normal = -normal;
                vNormal = normalMatrix * normal;

                gl_Position = projectionMatrix * viewMatrix * vec4(vWorldPosition, 1.0);
            }
        `;

        const fragmentShader = `
            uniform samplerCube envMap;
            uniform vec3 waterColor;
            uniform vec3 sunDirection;
            uniform float waveHeight;

            varying vec3 vWorldPosition;
            varying vec3 vNormal;

            void main() {
                vec3 N = normalize(vNormal);
                vec3 V = normalize(cameraPosition - vWorldPosition);

                // Fresnel
                float fresnelTerm = pow(1.0 - max(dot(V, N), 0.0), 5.0);
                float fresnel = mix(0.02, 1.0, fresnelTerm);

                // Reflection
                vec3 R = reflect(-V, N);
                vec3 reflection = textureCube(envMap, R).rgb;

                // Refraction (Simplified deep water gradient)
                vec3 refraction = waterColor * (0.2 + 0.8 * max(N.y, 0.0));

                // Specular (Sun)
                vec3 L = normalize(sunDirection);
                vec3 H = normalize(V + L);
                float spec = pow(max(dot(N, H), 0.0), 250.0) * 2.0;

                // Foam (Based on height threshold relative to waveHeight)
                float foamThreshold = waveHeight * 0.45;
                float foam = smoothstep(foamThreshold, foamThreshold + 0.3, vWorldPosition.y);

                // Final Mix
                vec3 finalColor = mix(refraction, reflection, fresnel) + vec3(spec) + vec3(foam);

                // Basic Tone Mapping & Gamma
                finalColor = finalColor / (finalColor + vec3(1.0));
                finalColor = pow(finalColor, vec3(1.0 / 2.2));

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const waterMaterial = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: waterUniforms,
            side: THREE.FrontSide
        });

        // --- Geometry ---
        const waterGeometry = new THREE.PlaneGeometry(1000, 1000, 256, 256);
        waterGeometry.rotateX(-Math.PI / 2);
        const waterMesh = new THREE.Mesh(waterGeometry, waterMaterial);
        scene.add(waterMesh);

        // --- UI Event Listeners ---
        const uiElements = {
            windDir: document.getElementById('windDir'),
            waveHeight: document.getElementById('waveHeight'),
            waveFreq: document.getElementById('waveFreq'),
            choppiness: document.getElementById('choppiness'),
            waterColor: document.getElementById('waterColor')
        };

        function updateUIAndState() {
            window.__3D_STATE__.windDir = parseFloat(uiElements.windDir.value);
            window.__3D_STATE__.waveHeight = parseFloat(uiElements.waveHeight.value);
            window.__3D_STATE__.waveFreq = parseFloat(uiElements.waveFreq.value);
            window.__3D_STATE__.choppiness = parseFloat(uiElements.choppiness.value);
            window.__3D_STATE__.waterColor = uiElements.waterColor.value;

            document.getElementById('val-windDir').innerText = window.__3D_STATE__.windDir + '°';
            document.getElementById('val-waveHeight').innerText = window.__3D_STATE__.waveHeight.toFixed(1);
            document.getElementById('val-waveFreq').innerText = window.__3D_STATE__.waveFreq.toFixed(1);
            document.getElementById('val-choppiness').innerText = window.__3D_STATE__.choppiness.toFixed(1);

            waterUniforms.windDir.value = window.__3D_STATE__.windDir;
            waterUniforms.waveHeight.value = window.__3D_STATE__.waveHeight;
            waterUniforms.waveFreq.value = window.__3D_STATE__.waveFreq;
            waterUniforms.choppiness.value = window.__3D_STATE__.choppiness;
            waterUniforms.waterColor.value.set(window.__3D_STATE__.waterColor);

            updateWaveParameters();
        }

        Object.values(uiElements).forEach(el => {
            el.addEventListener('input', updateUIAndState);
        });

        // Initial setup
        updateUIAndState();

        // --- Max Displacement Calculation ---
        function calculateMaxDisplacement(time) {
            let maxDisp = 0;
            // Sample a small grid to approximate max displacement for current frame
            for (let x = -50; x <= 50; x += 25) {
                for (let z = -50; z <= 50; z += 25) {
                    let y = 0;
                    for (let i = 0; i < NUM_WAVES; i++) {
                        const w = wavesData[i];
                        const d = w.direction.x * x + w.direction.y * z;
                        y += w.amplitude * Math.cos(d * w.frequency + time * w.speed + w.phase);
                    }
                    if (Math.abs(y) > maxDisp) maxDisp = Math.abs(y);
                }
            }
            return maxDisp;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();
            
            waterUniforms.time.value = elapsedTime;
            controls.update();

            // Update State
            window.__3D_STATE__.simTime = elapsedTime;
            window.__3D_STATE__.maxDisplacement = calculateMaxDisplacement(elapsedTime);

            renderer.render(scene, camera);
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
