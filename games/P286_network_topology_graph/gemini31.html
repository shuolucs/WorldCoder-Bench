<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Network Topology</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.75);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #4ecdc4;
        }
        #hud p {
            margin: 5px 0;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(15, 15, 25, 0.75);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }
        button:active {
            transform: scale(0.95);
        }
        #labels-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .node-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            transform: translate(-50%, -150%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: opacity 0.3s;
        }
        .hidden {
            opacity: 0 !important;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h2>Network Status</h2>
        <p id="hud-nodes">Nodes: 7</p>
        <p id="hud-edges">Edges: 12</p>
        <p id="hud-selected">Selected: None</p>
    </div>

    <div id="controls">
        <button id="toggleLabels">Toggle Labels</button>
        <button id="resetView">Reset View</button>
        <button id="pulseNetwork">Pulse Network</button>
    </div>

    <div id="labels-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            nodeCount: 7,
            edgeCount: 12,
            selectedNode: null,
            labelsVisible: true,
            cameraPosition: { x: 0, y: 15, z: 25 },
            modelLoaded: false,
            pulsing: false,
            nodesData: []
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // Groups
        const networkGroup = new THREE.Group();
        scene.add(networkGroup);
        
        let centerModel = null;

        // Load GLB Model
        const loader = new GLTFLoader();
        const glbUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/ABeautifulGame/glTF-Binary/ABeautifulGame.glb';
        
        loader.load(glbUrl, (gltf) => {
            centerModel = gltf.scene;
            centerModel.scale.set(0.5, 0.5, 0.5);
            centerModel.position.set(0, 0, 0);
            scene.add(centerModel);
            window.__3D_STATE__.modelLoaded = true;
        });

        // Network Nodes Data
        const nodeDefinitions = [
            { color: 0xff6b6b, name: 'Web Server' },
            { color: 0x4ecdc4, name: 'Database' },
            { color: 0x45b7d1, name: 'Load Balancer' },
            { color: 0x96ceb4, name: 'Cache Server' },
            { color: 0xfeca57, name: 'API Gateway' },
            { color: 0xff9ff3, name: 'Auth Service' }
        ];

        const nodeMeshes = [];
        const labels = [];
        const labelsContainer = document.getElementById('labels-container');
        const radius = 10;

        // Create Nodes and Labels
        const sphereGeo = new THREE.SphereGeometry(0.6, 32, 32);

        nodeDefinitions.forEach((def, index) => {
            const angle = (index / 6) * Math.PI * 2;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;

            // Mesh
            const material = new THREE.MeshStandardMaterial({ 
                color: def.color,
                roughness: 0.4,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(sphereGeo, material);
            mesh.position.set(x, 0, z);
            mesh.userData = { name: def.name, originalColor: def.color };
            networkGroup.add(mesh);
            nodeMeshes.push(mesh);

            // State Data
            window.__3D_STATE__.nodesData.push({ name: def.name, x, y: 0, z });

            // HTML Label
            const labelDiv = document.createElement('div');
            labelDiv.className = 'node-label';
            labelDiv.textContent = def.name;
            labelDiv.style.color = '#' + def.color.toString(16).padStart(6, '0');
            labelsContainer.appendChild(labelDiv);
            labels.push({ element: labelDiv, mesh: mesh });
        });

        // Create Edges
        const lineMaterial = new THREE.LineBasicMaterial({ 
            color: 0xffffff, 
            transparent: true, 
            opacity: 0.5 
        });

        // Center to nodes
        nodeMeshes.forEach(mesh => {
            const points = [new THREE.Vector3(0, 0, 0), mesh.position];
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geo, lineMaterial);
            networkGroup.add(line);
        });

        // Ring connections
        for (let i = 0; i < 6; i++) {
            const nextIndex = (i + 1) % 6;
            const points = [nodeMeshes[i].position, nodeMeshes[nextIndex].position];
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geo, lineMaterial);
            networkGroup.add(line);
        }

        // Interaction - Raycasting
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedMesh = null;

        window.addEventListener('click', (event) => {
            if (event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodeMeshes);

            if (intersects.length > 0) {
                if (selectedMesh) {
                    selectedMesh.material.emissive.setHex(0x000000);
                }
                selectedMesh = intersects[0].object;
                selectedMesh.material.emissive.setHex(0xffffff);
                selectedMesh.material.emissiveIntensity = 0.5;
                
                const nodeName = selectedMesh.userData.name;
                window.__3D_STATE__.selectedNode = nodeName;
                document.getElementById('hud-selected').textContent = `Selected: ${nodeName}`;
            } else {
                if (selectedMesh) {
                    selectedMesh.material.emissive.setHex(0x000000);
                    selectedMesh = null;
                    window.__3D_STATE__.selectedNode = null;
                    document.getElementById('hud-selected').textContent = 'Selected: None';
                }
            }
        });

        // UI Buttons
        document.getElementById('toggleLabels').addEventListener('click', () => {
            window.__3D_STATE__.labelsVisible = !window.__3D_STATE__.labelsVisible;
            labels.forEach(label => {
                if (window.__3D_STATE__.labelsVisible) {
                    label.element.classList.remove('hidden');
                } else {
                    label.element.classList.add('hidden');
                }
            });
        });

        document.getElementById('resetView').addEventListener('click', () => {
            camera.position.set(0, 15, 25);
            controls.target.set(0, 0, 0);
            controls.update();
        });

        let pulseTimeout;
        document.getElementById('pulseNetwork').addEventListener('click', () => {
            window.__3D_STATE__.pulsing = true;
            lineMaterial.color.setHex(0x00ff00);
            lineMaterial.opacity = 0.8;
            
            clearTimeout(pulseTimeout);
            pulseTimeout = setTimeout(() => {
                lineMaterial.color.setHex(0xffffff);
                lineMaterial.opacity = 0.5;
                window.__3D_STATE__.pulsing = false;
            }, 1000);
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const tempV = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            // Rotations
            networkGroup.rotation.y += 0.002;
            if (centerModel) {
                centerModel.rotation.y += 0.01;
            }

            controls.update();

            // Update State Camera Position
            window.__3D_STATE__.cameraPosition.x = camera.position.x;
            window.__3D_STATE__.cameraPosition.y = camera.position.y;
            window.__3D_STATE__.cameraPosition.z = camera.position.z;

            // Update Labels Position
            if (window.__3D_STATE__.labelsVisible) {
                labels.forEach(label => {
                    label.mesh.getWorldPosition(tempV);
                    tempV.project(camera);
                    
                    const x = (tempV.x * .5 + .5) * window.innerWidth;
                    const y = (tempV.y * -.5 + .5) * window.innerHeight;
                    
                    // Hide label if behind camera
                    if (tempV.z > 1) {
                        label.element.style.display = 'none';
                    } else {
                        label.element.style.display = 'block';
                        label.element.style.left = `${x}px`;
                        label.element.style.top = `${y}px`;
                    }
                });
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
