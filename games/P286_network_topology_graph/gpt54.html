<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Network Topology Graph</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 8px;
      z-index: 20;
      min-width: 170px;
      line-height: 1.5;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #controlsPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 20;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.16);
    }

    button:active {
      transform: scale(0.98);
    }

    .label {
      position: absolute;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 13px;
      white-space: nowrap;
      pointer-events: none;
      background: rgba(0,0,0,0.45);
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div id="hudNodes">Nodes: 7</div>
      <div id="hudEdges">Edges: 12</div>
      <div id="hudSelected">Selected: None</div>
    </div>

    <div id="controlsPanel">
      <button id="toggleLabels">Toggle Labels</button>
      <button id="resetView">Reset View</button>
      <button id="pulseNetwork">Pulse Network</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 15, 25);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    const nodeGroup = new THREE.Group();
    scene.add(nodeGroup);

    const centerGroup = new THREE.Group();
    centerGroup.position.set(0, 0, 0);
    scene.add(centerGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const hudSelected = document.getElementById("hudSelected");
    const toggleLabelsBtn = document.getElementById("toggleLabels");
    const resetViewBtn = document.getElementById("resetView");
    const pulseNetworkBtn = document.getElementById("pulseNetwork");

    let selectedNode = null;
    let coreServerModel = null;
    let pulseTimeout = null;

    const nodeRadius = 10;
    const sphereGeometry = new THREE.SphereGeometry(0.6, 32, 32);

    const nodes = [];
    const labels = [];
    const edgeMaterials = [];

    const nodeDefinitions = [
      { color: "#ff6b6b", name: "Web Server" },
      { color: "#4ecdc4", name: "Database" },
      { color: "#45b7d1", name: "Load Balancer" },
      { color: "#96ceb4", name: "Cache Server" },
      { color: "#feca57", name: "API Gateway" },
      { color: "#ff9ff3", name: "Auth Service" }
    ];

    window.__3D_STATE__ = {
      nodeCount: 7,
      edgeCount: 12,
      selectedNode: null,
      labelsVisible: true,
      cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
      modelLoaded: false,
      pulsing: false,
      nodesData: []
    };

    function createLabel(text) {
      const div = document.createElement("div");
      div.className = "label";
      div.textContent = text;
      app.appendChild(div);
      return div;
    }

    function createEdge(start, end) {
      const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
      const material = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.5
      });
      const line = new THREE.Line(geometry, material);
      nodeGroup.add(line);
      edgeMaterials.push(material);
      return line;
    }

    nodeDefinitions.forEach((def, i) => {
      const angle = (i / nodeDefinitions.length) * Math.PI * 2;
      const x = Math.cos(angle) * nodeRadius;
      const y = 0;
      const z = Math.sin(angle) * nodeRadius;

      const material = new THREE.MeshStandardMaterial({
        color: def.color,
        emissive: 0x000000,
        emissiveIntensity: 0.5,
        metalness: 0.2,
        roughness: 0.4
      });

      const sphere = new THREE.Mesh(sphereGeometry, material);
      sphere.position.set(x, y, z);
      sphere.userData = {
        index: i,
        name: def.name,
        defaultEmissive: new THREE.Color(0x000000)
      };

      nodeGroup.add(sphere);
      nodes.push(sphere);

      const label = createLabel(def.name);
      labels.push({ element: label, object: sphere });

      window.__3D_STATE__.nodesData.push({ name: def.name, x, y, z });
    });

    const centerPoint = new THREE.Vector3(0, 0, 0);

    nodes.forEach((node) => {
      createEdge(centerPoint.clone(), node.position.clone());
    });

    for (let i = 0; i < nodes.length; i++) {
      const current = nodes[i];
      const next = nodes[(i + 1) % nodes.length];
      createEdge(current.position.clone(), next.position.clone());
    }

    function updateSelected(name) {
      window.__3D_STATE__.selectedNode = name;
      hudSelected.textContent = `Selected: ${name ?? "None"}`;
    }

    function selectNode(node) {
      if (selectedNode === node) return;

      if (selectedNode) {
        selectedNode.material.emissive.setHex(0x000000);
      }

      selectedNode = node;

      if (selectedNode) {
        selectedNode.material.emissive.setHex(0xffffff);
        selectedNode.material.emissiveIntensity = 0.5;
        updateSelected(selectedNode.userData.name);
      } else {
        updateSelected(null);
      }
    }

    renderer.domElement.addEventListener("click", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodes, false);

      if (intersects.length > 0) {
        selectNode(intersects[0].object);
      }
    });

    toggleLabelsBtn.addEventListener("click", () => {
      window.__3D_STATE__.labelsVisible = !window.__3D_STATE__.labelsVisible;
      labels.forEach(({ element }) => {
        element.style.display = window.__3D_STATE__.labelsVisible ? "block" : "none";
      });
    });

    resetViewBtn.addEventListener("click", () => {
      camera.position.set(0, 15, 25);
      controls.target.set(0, 0, 0);
      controls.update();
    });

    pulseNetworkBtn.addEventListener("click", () => {
      if (pulseTimeout) clearTimeout(pulseTimeout);

      window.__3D_STATE__.pulsing = true;
      edgeMaterials.forEach((mat) => mat.color.set("#00ff00"));

      pulseTimeout = setTimeout(() => {
        edgeMaterials.forEach((mat) => mat.color.set("#ffffff"));
        window.__3D_STATE__.pulsing = false;
      }, 1000);
    });

    const loader = new GLTFLoader();
    loader.load(
      "https://threejs.org/examples/models/gltf/ABeautifulGame.glb",
      (gltf) => {
        coreServerModel = gltf.scene;
        coreServerModel.scale.setScalar(0.5);
        coreServerModel.position.set(0, 0, 0);
        centerGroup.add(coreServerModel);
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (error) => {
        console.warn("Failed to load ABeautifulGame.glb:", error);
      }
    );

    const tempVec = new THREE.Vector3();

    function updateLabels() {
      labels.forEach(({ element, object }) => {
        tempVec.copy(object.position);
        nodeGroup.localToWorld(tempVec);
        tempVec.y += 1.2;
        tempVec.project(camera);

        const x = (tempVec.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-tempVec.y * 0.5 + 0.5) * window.innerHeight;

        const visible = tempVec.z < 1;
        element.style.display = window.__3D_STATE__.labelsVisible && visible ? "block" : "none";
        if (window.__3D_STATE__.labelsVisible && visible) {
          element.style.left = `${x}px`;
          element.style.top = `${y}px`;
        }
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      nodeGroup.rotation.y += 0.002;

      if (coreServerModel) {
        coreServerModel.rotation.y += 0.01;
      }

      controls.update();

      window.__3D_STATE__.cameraPosition.x = camera.position.x;
      window.__3D_STATE__.cameraPosition.y = camera.position.y;
      window.__3D_STATE__.cameraPosition.z = camera.position.z;

      updateLabels();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateLabels();
    });
  </script>
</body>
</html>
