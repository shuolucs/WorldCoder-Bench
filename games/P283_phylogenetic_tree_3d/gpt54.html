<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Phylogenetic Tree</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #btn-rotate {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #2c3e50;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    #btn-rotate:hover {
      background: #3d566e;
    }

    #info-panel {
      min-width: 260px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(20, 20, 35, 0.85);
      border: 1px solid rgba(255,255,255,0.12);
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="btn-rotate">Rotate Tree</button>
    <div id="info-panel">Loading...</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 6, 0);

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 15, 10);
    scene.add(directionalLight);

    const treeGroup = new THREE.Group();
    treeGroup.name = 'treeGroup';
    scene.add(treeGroup);

    const nodeColors = {
      0: 0xff4444,
      1: 0xff8844,
      2: 0x44bb44,
      3: 0x4488ff
    };

    const state = {
      totalNodes: 22,
      leafCount: 12,
      maxDepth: 3,
      selectedNode: null,
      hoveredNode: null,
      labelsVisible: true,
      isCollapsed: false,
      isAutoRotating: false,
      nodePositions: {},
      highlightedPath: [],
      sceneReady: false,
      depthFilter: 'All'
    };

    window.__3D_STATE__ = state;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const nodes = [];
    const nodeMap = new Map();
    const labels = [];
    const edges = [];

    const sphereGeometry = new THREE.SphereGeometry(0.3, 24, 24);

    function createNodeMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color,
        emissive: 0x000000,
        emissiveIntensity: 0.8,
        roughness: 0.35,
        metalness: 0.1
      });
    }

    function createLabelSprite(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(10,10,26,0.75)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.strokeRect(0, 0, canvas.width, canvas.height);

      ctx.font = '28px Arial';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(2.8, 0.7, 1);
      return sprite;
    }

    function createEdge(parentPos, childPos) {
      const dir = new THREE.Vector3().subVectors(childPos, parentPos);
      const length = dir.length();
      const geometry = new THREE.CylinderGeometry(0.06, 0.06, length, 8);
      const material = new THREE.MeshStandardMaterial({
        color: 0xcccccc,
        emissive: 0x111111,
        roughness: 0.5,
        metalness: 0.2
      });
      const cylinder = new THREE.Mesh(geometry, material);

      const midpoint = new THREE.Vector3().addVectors(parentPos, childPos).multiplyScalar(0.5);
      cylinder.position.copy(midpoint);

      const up = new THREE.Vector3(0, 1, 0);
      const axis = new THREE.Vector3().crossVectors(up, dir.clone().normalize());
      const angle = Math.acos(THREE.MathUtils.clamp(up.dot(dir.clone().normalize()), -1, 1));

      if (axis.lengthSq() > 0.000001) {
        cylinder.quaternion.setFromAxisAngle(axis.normalize(), angle);
      }

      return cylinder;
    }

    function addNode({ id, name, depth, position, parentId = null, isLeaf = false, labelText = null }) {
      const material = createNodeMaterial(nodeColors[depth]);
      const mesh = new THREE.Mesh(sphereGeometry, material);
      mesh.position.copy(position);
      mesh.userData = {
        id,
        name,
        depth,
        parentId,
        children: [],
        originalColor: nodeColors[depth],
        isLeaf
      };

      treeGroup.add(mesh);
      nodes.push(mesh);
      nodeMap.set(id, mesh);

      if (parentId) {
        const parentNode = nodeMap.get(parentId);
        parentNode.userData.children.push(id);

        const edge = createEdge(parentNode.position.clone(), mesh.position.clone());
        edge.userData = { parentId, childId: id };
        treeGroup.add(edge);
        edges.push(edge);
      }

      if (isLeaf && labelText) {
        const label = createLabelSprite(labelText);
        label.position.set(position.x + 0.75, position.y + 0.35, position.z);
        label.visible = state.labelsVisible;
        label.userData = { nodeId: id };
        treeGroup.add(label);
        labels.push(label);
        mesh.userData.label = label;
      }

      mesh.userData.originalPosition = position.clone();
      mesh.userData.targetPosition = position.clone();

      state.nodePositions[id] = { x: position.x, y: position.y, z: position.z };
    }

    // Root
    addNode({
      id: 'node_0',
      name: 'node_0',
      depth: 0,
      position: new THREE.Vector3(0, 0, 0)
    });

    // Depth 1: 3 nodes
    const depth1Positions = [
      new THREE.Vector3(-4, 4, -2),
      new THREE.Vector3(0, 4, 3),
      new THREE.Vector3(4, 4, -2)
    ];

    depth1Positions.forEach((pos, i) => {
      addNode({
        id: `node_1_${i + 1}`,
        name: `node_1_${i + 1}`,
        depth: 1,
        position: pos,
        parentId: 'node_0'
      });
    });

    // Depth 2: 6 nodes
    let depth2Counter = 1;
    const depth1Ids = ['node_1_1', 'node_1_2', 'node_1_3'];
    const depth2Ids = [];

    depth1Ids.forEach((parentId, pi) => {
      const parentPos = nodeMap.get(parentId).position.clone();
      const offsets = [
        new THREE.Vector3(-2.2, 4, -1.8),
        new THREE.Vector3(2.2, 4, 1.8)
      ];

      offsets.forEach((offset) => {
        const pos = parentPos.clone().add(offset);
        const id = `node_2_${depth2Counter++}`;
        depth2Ids.push(id);
        addNode({
          id,
          name: id,
          depth: 2,
          position: pos,
          parentId
        });
      });
    });

    // Depth 3: 12 leaves
    let leafCounter = 1;
    depth2Ids.forEach((parentId, index) => {
      const parentPos = nodeMap.get(parentId).position.clone();
      const sign = index % 2 === 0 ? 1 : -1;
      const offsets = [
        new THREE.Vector3(-1.5 * sign, 4, -1.7),
        new THREE.Vector3(1.5 * sign, 4, 1.7)
      ];

      offsets.forEach((offset) => {
        const pos = parentPos.clone().add(offset);
        const id = `leaf_${leafCounter}`;
        addNode({
          id,
          name: id,
          depth: 3,
          position: pos,
          parentId,
          isLeaf: true,
          labelText: `Species_${leafCounter}`
        });
        leafCounter++;
      });
    });

    function updateEdge(edge) {
      const parent = nodeMap.get(edge.userData.parentId);
      const child = nodeMap.get(edge.userData.childId);
      if (!parent || !child) return;

      const parentPos = parent.position.clone();
      const childPos = child.position.clone();
      const dir = new THREE.Vector3().subVectors(childPos, parentPos);
      const length = dir.length();

      edge.position.copy(new THREE.Vector3().addVectors(parentPos, childPos).multiplyScalar(0.5));
      edge.scale.set(1, length / edge.geometry.parameters.height, 1);

      const up = new THREE.Vector3(0, 1, 0);
      const normDir = dir.clone().normalize();
      const axis = new THREE.Vector3().crossVectors(up, normDir);
      const angle = Math.acos(THREE.MathUtils.clamp(up.dot(normDir), -1, 1));
      edge.quaternion.identity();

      if (axis.lengthSq() > 0.000001) {
        edge.quaternion.setFromAxisAngle(axis.normalize(), angle);
      }
    }

    function getAncestorPath(nodeId) {
      const path = [];
      let currentId = nodeId;
      while (currentId) {
        path.push(currentId);
        const node = nodeMap.get(currentId);
        currentId = node?.userData.parentId || null;
      }
      return path;
    }

    function applyNodeVisuals() {
      nodes.forEach(node => {
        const id = node.userData.id;
        const originalColor = node.userData.originalColor;

        let color = originalColor;
        let emissive = 0x000000;
        let scale = 1;

        if (state.highlightedPath.includes(id)) {
          color = 0xffff00;
          emissive = 0x665500;
        }

        if (state.hoveredNode === id) {
          scale = 1.8;
          emissive = 0x3366ff;
        }

        if (state.selectedNode === id) {
          color = 0xffff00;
          emissive = 0x886600;
        }

        node.material.color.setHex(color);
        node.material.emissive.setHex(emissive);
        node.scale.setScalar(scale);
      });
    }

    function updateInfoPanel() {
      const panel = document.getElementById('info-panel');
      panel.textContent =
`Total Nodes: ${state.totalNodes}
Selected Node: ${state.selectedNode || 'None'}
Current Depth Filter: ${state.depthFilter}
Labels Visible: ${state.labelsVisible ? 'Yes' : 'No'}`;
    }

    function resetSelection() {
      state.selectedNode = null;
      state.highlightedPath = [];
      applyNodeVisuals();
      updateInfoPanel();
    }

    function toggleLabels() {
      state.labelsVisible = !state.labelsVisible;
      labels.forEach(label => label.visible = state.labelsVisible);
      updateInfoPanel();
    }

    function setCollapseTargets(collapsed) {
      nodes.forEach(node => {
        const depth = node.userData.depth;
        if (depth < 2) {
          node.userData.targetPosition.copy(node.userData.originalPosition);
          return;
        }

        if (collapsed) {
          const parent = nodeMap.get(node.userData.parentId);
          node.userData.targetPosition.copy(parent.position.clone());
        } else {
          node.userData.targetPosition.copy(node.userData.originalPosition);
        }
      });
    }

    function updateLabels() {
      nodes.forEach(node => {
        if (node.userData.isLeaf && node.userData.label) {
          node.userData.label.position.set(
            node.position.x + 0.75,
            node.position.y + 0.35,
            node.position.z
          );
        }
      });
    }

    function updateStatePositions() {
      nodes.forEach(node => {
        const p = node.position;
        state.nodePositions[node.userData.id] = { x: p.x, y: p.y, z: p.z };
      });
    }

    function onPointerMove(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function handleHover() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodes);

      const hovered = intersects.length > 0 ? intersects[0].object.userData.id : null;
      if (hovered !== state.hoveredNode) {
        state.hoveredNode = hovered;
        applyNodeVisuals();
        updateInfoPanel();
      }
    }

    function onClick() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodes);

      if (intersects.length > 0) {
        const node = intersects[0].object;
        const id = node.userData.id;
        state.selectedNode = id;
        state.highlightedPath = getAncestorPath(id);
        applyNodeVisuals();
        updateInfoPanel();
      }
    }

    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('click', onClick);

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();
      if (key === 'r') {
        resetSelection();
      } else if (key === 't') {
        toggleLabels();
      } else if (key === 'e') {
        state.isCollapsed = !state.isCollapsed;
        setCollapseTargets(state.isCollapsed);
      }
    });

    document.getElementById('btn-rotate').addEventListener('click', () => {
      state.isAutoRotating = !state.isAutoRotating;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateInfoPanel();
    state.sceneReady = true;

    function animate() {
      requestAnimationFrame(animate);

      controls.update();
      handleHover();

      if (state.isAutoRotating) {
        treeGroup.rotation.y += 0.01;
      }

      nodes.forEach(node => {
        if (node.userData.depth >= 2) {
          node.position.lerp(node.userData.targetPosition, 0.12);
        }
      });

      updateLabels();
      edges.forEach(updateEdge);
      updateStatePositions();
      applyNodeVisuals();

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
