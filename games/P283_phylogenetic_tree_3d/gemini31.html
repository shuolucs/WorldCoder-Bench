<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phylogenetic Tree</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #info-panel {
            background: rgba(10, 10, 26, 0.85);
            border: 1px solid #404060;
            padding: 15px 20px;
            border-radius: 8px;
            pointer-events: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            min-width: 200px;
        }
        #info-panel div {
            margin-bottom: 8px;
            font-size: 14px;
        }
        #info-panel span {
            font-weight: bold;
            color: #4488ff;
        }
        button {
            background: #4488ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            pointer-events: auto;
            font-weight: bold;
            transition: background 0.2s;
            width: fit-content;
        }
        button:hover {
            background: #66aaff;
        }
        .instructions {
            background: rgba(10, 10, 26, 0.85);
            border: 1px solid #404060;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.6;
            color: #cccccc;
        }
        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="info-panel">
            <div>Total Nodes: <span id="ui-total">0</span></div>
            <div>Selected: <span id="ui-selected">None</span></div>
            <div>Max Depth: <span id="ui-depth">3</span></div>
            <div>Labels Visible: <span id="ui-labels">Yes</span></div>
        </div>
        <button id="btn-rotate">Rotate Tree</button>
        <div class="instructions">
            <strong>Interactions:</strong><br>
            • Hover to highlight node<br>
            • Click to select lineage<br>
            • <span class="key">R</span> Reset selection<br>
            • <span class="key">T</span> Toggle labels<br>
            • <span class="key">E</span> Expand / Collapse<br>
            • Drag to rotate camera
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            totalNodes: 22,
            leafCount: 12,
            maxDepth: 3,
            selectedNode: null,
            hoveredNode: null,
            labelsVisible: true,
            isCollapsed: false,
            isAutoRotating: false,
            nodePositions: {},
            highlightedPath: [],
            sceneReady: false
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        const treeGroup = new THREE.Group();
        scene.add(treeGroup);

        // --- Tree Data & Generation ---
        const nodes = [];
        const nodeMap = new Map();
        const depthColors = [0xff4444, 0xff8844, 0x44bb44, 0x4488ff];
        const nodeGeometry = new THREE.SphereGeometry(0.3, 32, 32);

        function createLabel(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 28px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4;
            ctx.strokeText(text, 128, 32);
            ctx.fillText(text, 128, 32);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(3, 0.75, 1);
            sprite.renderOrder = 1;
            return sprite;
        }

        function createNode(id, depth, parent, position, angle) {
            const material = new THREE.MeshLambertMaterial({ 
                color: depthColors[depth],
                emissive: depthColors[depth],
                emissiveIntensity: 0
            });
            const mesh = new THREE.Mesh(nodeGeometry, material);
            mesh.position.copy(position);
            
            mesh.userData = { 
                id, depth, parentId: parent ? parent.id : null, 
                originalPos: position.clone(), 
                targetPos: position.clone(),
                baseColor: depthColors[depth],
                angle: angle
            };
            
            treeGroup.add(mesh);

            const nodeObj = { id, depth, parent, mesh, children: [], line: null, label: null };
            
            if (parent) {
                parent.children.push(nodeObj);
                const lineGeo = new THREE.BufferGeometry().setFromPoints([parent.mesh.position, mesh.position]);
                const lineMat = new THREE.LineBasicMaterial({ color: 0xcccccc, transparent: true, opacity: 0.6 });
                const line = new THREE.Line(lineGeo, lineMat);
                treeGroup.add(line);
                nodeObj.line = line;
            }

            nodes.push(nodeObj);
            nodeMap.set(id, nodeObj);
            return nodeObj;
        }

        function buildTree() {
            // Depth 0 (Root)
            const root = createNode('node_0', 0, null, new THREE.Vector3(0, 0, 0), 0);

            // Depth 1
            for (let i = 0; i < 3; i++) {
                const angle1 = i * ((Math.PI * 2) / 3);
                const pos1 = new THREE.Vector3(4 * Math.cos(angle1), 4, 4 * Math.sin(angle1));
                const n1 = createNode(`node_1_${i}`, 1, root, pos1, angle1);

                // Depth 2
                for (let j = 0; j < 2; j++) {
                    const angle2 = angle1 + (j === 0 ? -0.5 : 0.5);
                    const pos2 = new THREE.Vector3(8 * Math.cos(angle2), 8, 8 * Math.sin(angle2));
                    const n2 = createNode(`node_2_${i}_${j}`, 2, n1, pos2, angle2);

                    // Depth 3 (Leaves)
                    for (let k = 0; k < 2; k++) {
                        const angle3 = angle2 + (k === 0 ? -0.25 : 0.25);
                        const pos3 = new THREE.Vector3(12 * Math.cos(angle3), 12, 12 * Math.sin(angle3));
                        const leafId = `leaf_${(i * 4) + (j * 2) + k + 1}`;
                        const n3 = createNode(leafId, 3, n2, pos3, angle3);
                        
                        n3.label = createLabel(`Species_${(i * 4) + (j * 2) + k + 1}`);
                        n3.label.position.copy(pos3).add(new THREE.Vector3(0, 0.6, 0));
                        treeGroup.add(n3.label);
                    }
                }
            }
        }

        buildTree();
        state.sceneReady = true;

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let currentHoveredMesh = null;

        function updateColors() {
            nodes.forEach(n => {
                const isSelectedPath = state.highlightedPath.includes(n.id);
                const targetColor = isSelectedPath ? 0xffff00 : n.mesh.userData.baseColor;
                n.mesh.material.color.setHex(targetColor);
                
                if (n.line) {
                    n.line.material.color.setHex(isSelectedPath ? 0xffff00 : 0xcccccc);
                    n.line.material.opacity = isSelectedPath ? 1.0 : 0.6;
                }
            });
        }

        function selectNode(id) {
            state.selectedNode = id;
            state.highlightedPath = [];
            let curr = nodeMap.get(id);
            while (curr) {
                state.highlightedPath.push(curr.id);
                curr = curr.parent;
            }
            updateColors();
            updateUI();
        }

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes.map(n => n.mesh));

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (currentHoveredMesh !== object) {
                    if (currentHoveredMesh) {
                        currentHoveredMesh.scale.set(1, 1, 1);
                        currentHoveredMesh.material.emissiveIntensity = 0;
                    }
                    currentHoveredMesh = object;
                    currentHoveredMesh.scale.set(1.8, 1.8, 1.8);
                    currentHoveredMesh.material.emissiveIntensity = 0.6;
                    state.hoveredNode = currentHoveredMesh.userData.id;
                }
                document.body.style.cursor = 'pointer';
            } else {
                if (currentHoveredMesh) {
                    currentHoveredMesh.scale.set(1, 1, 1);
                    currentHoveredMesh.material.emissiveIntensity = 0;
                    currentHoveredMesh = null;
                    state.hoveredNode = null;
                }
                document.body.style.cursor = 'default';
            }
        });

        window.addEventListener('click', () => {
            if (state.hoveredNode) {
                selectNode(state.hoveredNode);
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === 'r') {
                state.selectedNode = null;
                state.highlightedPath = [];
                updateColors();
                updateUI();
            } else if (key === 't') {
                state.labelsVisible = !state.labelsVisible;
                nodes.forEach(n => {
                    if (n.label) n.label.visible = state.labelsVisible;
                });
                updateUI();
            } else if (key === 'e') {
                state.isCollapsed = !state.isCollapsed;
                nodes.forEach(n => {
                    if (state.isCollapsed) {
                        if (n.depth === 2 || n.depth === 3) {
                            n.mesh.userData.targetPos.copy(n.parent.mesh.userData.originalPos);
                        }
                    } else {
                        n.mesh.userData.targetPos.copy(n.mesh.userData.originalPos);
                    }
                });
            }
        });

        document.getElementById('btn-rotate').addEventListener('click', () => {
            state.isAutoRotating = !state.isAutoRotating;
        });

        // --- UI Update ---
        const uiTotal = document.getElementById('ui-total');
        const uiSelected = document.getElementById('ui-selected');
        const uiLabels = document.getElementById('ui-labels');

        function updateUI() {
            uiTotal.textContent = state.totalNodes;
            uiSelected.textContent = state.selectedNode ? state.selectedNode.replace('node_', 'Node ').replace('leaf_', 'Species ') : 'None';
            uiLabels.textContent = state.labelsVisible ? 'Yes' : 'No';
        }
        updateUI();

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            controls.update();

            if (state.isAutoRotating) {
                treeGroup.rotation.y += 0.01;
            }

            // Animate positions (Expand/Collapse)
            nodes.forEach(n => {
                n.mesh.position.lerp(n.mesh.userData.targetPos, 0.1);
                
                if (n.line) {
                    const positions = n.line.geometry.attributes.position.array;
                    positions[0] = n.parent.mesh.position.x;
                    positions[1] = n.parent.mesh.position.y;
                    positions[2] = n.parent.mesh.position.z;
                    positions[3] = n.mesh.position.x;
                    positions[4] = n.mesh.position.y;
                    positions[5] = n.mesh.position.z;
                    n.line.geometry.attributes.position.needsUpdate = true;
                }

                if (n.label) {
                    n.label.position.copy(n.mesh.position).add(new THREE.Vector3(0, 0.6, 0));
                }

                state.nodePositions[n.id] = { 
                    x: n.mesh.position.x, 
                    y: n.mesh.position.y, 
                    z: n.mesh.position.z 
                };
            });

            // Smooth scale animation for hover
            nodes.forEach(n => {
                const targetScale = (n.mesh === currentHoveredMesh) ? 1.8 : 1.0;
                n.mesh.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.2);
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
