<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Phylogenetic Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  
  #btn-rotate {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 12px 24px;
    background: linear-gradient(135deg, #2a2a4a, #3a3a6a);
    color: #fff;
    border: 1px solid #5566aa;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    z-index: 100;
  }
  #btn-rotate:hover {
    background: linear-gradient(135deg, #3a3a6a, #4a4a8a);
    border-color: #7788cc;
    box-shadow: 0 0 15px rgba(85, 102, 170, 0.4);
  }
  
  #info-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 20px;
    background: rgba(10, 10, 30, 0.9);
    border: 1px solid #334;
    border-radius: 12px;
    color: #ccd;
    font-size: 13px;
    min-width: 240px;
    backdrop-filter: blur(10px);
    z-index: 100;
  }
  #info-panel h3 {
    margin-bottom: 12px;
    color: #88aaff;
    font-size: 16px;
    border-bottom: 1px solid #334;
    padding-bottom: 8px;
  }
  #info-panel .info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    padding: 4px 0;
  }
  #info-panel .info-label {
    color: #889;
  }
  #info-panel .info-value {
    color: #aabbff;
    font-weight: 600;
  }
  
  #controls-help {
    position: fixed;
    bottom: 20px;
    left: 20px;
    padding: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid #334;
    border-radius: 10px;
    color: #889;
    font-size: 12px;
    z-index: 100;
  }
  #controls-help kbd {
    background: #2a2a4a;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid #445;
    color: #aab;
    font-family: monospace;
  }
</style>
</head>
<body>

<button id="btn-rotate">🔄 Rotate Tree</button>

<div id="info-panel">
  <h3>🧬 Phylogenetic Tree</h3>
  <div class="info-row">
    <span class="info-label">Total Nodes:</span>
    <span class="info-value" id="info-total">22</span>
  </div>
  <div class="info-row">
    <span class="info-label">Selected Node:</span>
    <span class="info-value" id="info-selected">None</span>
  </div>
  <div class="info-row">
    <span class="info-label">Hovered Node:</span>
    <span class="info-value" id="info-hovered">None</span>
  </div>
  <div class="info-row">
    <span class="info-label">Max Depth:</span>
    <span class="info-value" id="info-depth">3</span>
  </div>
  <div class="info-row">
    <span class="info-label">Labels Visible:</span>
    <span class="info-value" id="info-labels">Yes</span>
  </div>
  <div class="info-row">
    <span class="info-label">Collapsed:</span>
    <span class="info-value" id="info-collapsed">No</span>
  </div>
  <div class="info-row">
    <span class="info-label">Auto-Rotating:</span>
    <span class="info-value" id="info-rotating">No</span>
  </div>
</div>

<div id="controls-help">
  <div><kbd>R</kbd> Reset selection</div>
  <div><kbd>T</kbd> Toggle labels</div>
  <div><kbd>E</kbd> Expand/Collapse</div>
  <div>Click node to select</div>
  <div>Hover to highlight</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // State
  const STATE = {
    totalNodes: 22,
    leafCount: 12,
    maxDepth: 3,
    selectedNode: null,
    hoveredNode: null,
    labelsVisible: true,
    isCollapsed: false,
    isAutoRotating: false,
    nodePositions: {},
    highlightedPath: [],
    sceneReady: false
  };
  window.__3D_STATE__ = STATE;

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 5, 20);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 15, 10);
  scene.add(dirLight);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // Tree group
  const treeGroup = new THREE.Group();
  treeGroup.name = 'treeGroup';
  scene.add(treeGroup);

  // Depth colors
  const depthColors = {
    0: 0xff4444,
    1: 0xff8844,
    2: 0x44bb44,
    3: 0x4488ff
  };

  // Node data structure
  const nodes = [];
  const edges = [];
  const nodeMeshes = [];
  const edgeObjects = [];
  const labelSprites = [];
  let leafCounter = 0;

  // Build tree data
  function buildTree() {
    // Root
    const root = {
      id: 'node_0',
      depth: 0,
      position: new THREE.Vector3(0, 0, 0),
      originalPosition: new THREE.Vector3(0, 0, 0),
      targetPosition: new THREE.Vector3(0, 0, 0),
      children: [],
      parent: null,
      isLeaf: false,
      leafIndex: -1
    };
    nodes.push(root);

    // Depth 1: 3 children spread in XZ at y=4
    const depth1Angles = [0, (2 * Math.PI) / 3, (4 * Math.PI) / 3];
    const depth1Radius = 4;

    for (let i = 0; i < 3; i++) {
      const angle = depth1Angles[i];
      const x = Math.cos(angle) * depth1Radius;
      const z = Math.sin(angle) * depth1Radius;
      const pos = new THREE.Vector3(x, 4, z);
      const node = {
        id: `node_${nodes.length}`,
        depth: 1,
        position: pos.clone(),
        originalPosition: pos.clone(),
        targetPosition: pos.clone(),
        children: [],
        parent: root,
        isLeaf: false,
        leafIndex: -1
      };
      root.children.push(node);
      nodes.push(node);
      edges.push({ parent: root, child: node });

      // Depth 2: 2 children each, at y=8
      for (let j = 0; j < 2; j++) {
        const spreadAngle = angle + (j === 0 ? -0.4 : 0.4);
        const depth2Radius = depth1Radius + 2.5;
        const x2 = Math.cos(spreadAngle) * depth2Radius;
        const z2 = Math.sin(spreadAngle) * depth2Radius;
        const pos2 = new THREE.Vector3(x2, 8, z2);
        const node2 = {
          id: `node_${nodes.length}`,
          depth: 2,
          position: pos2.clone(),
          originalPosition: pos2.clone(),
          targetPosition: pos2.clone(),
          children: [],
          parent: node,
          isLeaf: false,
          leafIndex: -1
        };
        node.children.push(node2);
        nodes.push(node2);
        edges.push({ parent: node, child: node2 });

        // Depth 3 (leaves): 2 children each, at y=12
        for (let k = 0; k < 2; k++) {
          leafCounter++;
          const leafAngle = spreadAngle + (k === 0 ? -0.25 : 0.25);
          const depth3Radius = depth2Radius + 2;
          const x3 = Math.cos(leafAngle) * depth3Radius;
          const z3 = Math.sin(leafAngle) * depth3Radius;
          const pos3 = new THREE.Vector3(x3, 12, z3);
          const node3 = {
            id: `leaf_${leafCounter}`,
            depth: 3,
            position: pos3.clone(),
            originalPosition: pos3.clone(),
            targetPosition: pos3.clone(),
            children: [],
            parent: node2,
            isLeaf: true,
            leafIndex: leafCounter
          };
          node2.children.push(node3);
          nodes.push(node3);
          edges.push({ parent: node2, child: node3 });
        }
      }
    }
  }

  buildTree();

  // Create node meshes
  function createNodeMesh(node) {
    const geometry = new THREE.SphereGeometry(0.3, 24, 24);
    const material = new THREE.MeshPhongMaterial({
      color: depthColors[node.depth],
      emissive: 0x000000,
      shininess: 80,
      specular: 0x444444
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.copy(node.position);
    mesh.userData = {
      nodeId: node.id,
      depth: node.depth,
      originalColor: depthColors[node.depth],
      originalScale: 1.0,
      node: node
    };
    treeGroup.add(mesh);
    nodeMeshes.push(mesh);
    node.mesh = mesh;

    STATE.nodePositions[node.id] = {
      x: node.position.x,
      y: node.position.y,
      z: node.position.z
    };
  }

  // Create text sprite for labels
  function createLabel(node) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.fillRect(0, 0, 256, 64);
    ctx.font = 'bold 28px Segoe UI, Arial, sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`Species_${node.leafIndex}`, 128, 32);

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    const spriteMaterial = new THREE.SpriteMaterial({
      map: texture,
      transparent: true,
      depthTest: false
    });
    const sprite = new THREE.Sprite(spriteMaterial);
    sprite.position.copy(node.position);
    sprite.position.y += 0.7;
    sprite.scale.set(3, 0.75, 1);
    sprite.userData = { nodeId: node.id, node: node };
    treeGroup.add(sprite);
    labelSprites.push(sprite);
    node.label = sprite;
  }

  // Create edge between parent and child
  function createEdge(parent, child) {
    const material = new THREE.LineBasicMaterial({ color: 0xcccccc, transparent: true, opacity: 0.6 });
    const geometry = new THREE.BufferGeometry().setFromPoints([
      parent.position.clone(),
      child.position.clone()
    ]);
    const line = new THREE.Line(geometry, material);
    line.userData = { parentNode: parent, childNode: child };
    treeGroup.add(line);
    edgeObjects.push(line);
    return line;
  }

  // Build visual elements
  nodes.forEach(node => createNodeMesh(node));
  nodes.forEach(node => {
    if (node.isLeaf) createLabel(node);
  });
  const edgeLines = edges.map(e => createEdge(e.parent, e.child));

  // Raycasting
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let hoveredMesh = null;

  function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  }

  function getAncestorPath(node) {
    const path = [];
    let current = node;
    while (current) {
      path.push(current.id);
      current = current.parent;
    }
    return path;
  }

  function setNodeColor(mesh, color, emissive) {
    mesh.material.color.setHex(color);
    mesh.material.emissive.setHex(emissive || 0x000000);
  }

  function resetAllColors() {
    nodeMeshes.forEach(mesh => {
      setNodeColor(mesh, mesh.userData.originalColor, 0x000000);
      mesh.scale.set(1, 1, 1);
    });
  }

  function highlightSelection() {
    if (!STATE.selectedNode) {
      STATE.highlightedPath = [];
      resetAllColors();
      return;
    }
    const selectedNodeData = nodes.find(n => n.id === STATE.selectedNode);
    if (!selectedNodeData) return;

    const path = getAncestorPath(selectedNodeData);
    STATE.highlightedPath = path;

    // Reset all first
    nodeMeshes.forEach(mesh => {
      setNodeColor(mesh, mesh.userData.originalColor, 0x000000);
    });

    // Highlight path
    path.forEach(nodeId => {
      const nd = nodes.find(n => n.id === nodeId);
      if (nd && nd.mesh) {
        setNodeColor(nd.mesh, 0xffff00, 0x444400);
      }
    });
  }

  function onClick(event) {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodeMeshes);
    if (intersects.length > 0) {
      const mesh = intersects[0].object;
      STATE.selectedNode = mesh.userData.nodeId;
      highlightSelection();
    }
    updateInfoPanel();
  }

  function onKeyDown(event) {
    const key = event.key.toUpperCase();
    if (key === 'R') {
      STATE.selectedNode = null;
      STATE.highlightedPath = [];
      resetAllColors();
      updateInfoPanel();
    } else if (key === 'T') {
      STATE.labelsVisible = !STATE.labelsVisible;
      labelSprites.forEach(sprite => {
        sprite.visible = STATE.labelsVisible;
      });
      updateInfoPanel();
    } else if (key === 'E') {
      STATE.isCollapsed = !STATE.isCollapsed;
      if (STATE.isCollapsed) {
        // Set targets to parent positions for depth 2 and 3
        nodes.forEach(node => {
          if (node.depth >= 2 && node.parent) {
            // Find the depth 1 ancestor
            let ancestor = node.parent;
            while (ancestor.depth > 1) {
              ancestor = ancestor.parent;
            }
            node.targetPosition.copy(ancestor.position);
          }
        });
      } else {
        // Restore original positions
        nodes.forEach(node => {
          node.targetPosition.copy(node.originalPosition);
        });
      }
      updateInfoPanel();
    }
  }

  // Rotate button
  document.getElementById('btn-rotate').addEventListener('click', () => {
    STATE.isAutoRotating = !STATE.isAutoRotating;
    updateInfoPanel();
  });

  // Update info panel
  function updateInfoPanel() {
    document.getElementById('info-total').textContent = STATE.totalNodes;
    document.getElementById('info-selected').textContent = STATE.selectedNode || 'None';
    document.getElementById('info-hovered').textContent = STATE.hoveredNode || 'None';
    document.getElementById('info-depth').textContent = STATE.maxDepth;
    document.getElementById('info-labels').textContent = STATE.labelsVisible ? 'Yes' : 'No';
    document.getElementById('info-collapsed').textContent = STATE.isCollapsed ? 'Yes' : 'No';
    document.getElementById('info-rotating').textContent = STATE.isAutoRotating ? 'Yes' : 'No';
  }

  // Update edge positions
  function updateEdges() {
    edgeObjects.forEach((line, i) => {
      const parentNode = line.userData.parentNode;
      const childNode = line.userData.childNode;
      const positions = line.geometry.attributes.position;
      positions.setXYZ(0, parentNode.position.x, parentNode.position.y, parentNode.position.z);
      positions.setXYZ(1, childNode.position.x, childNode.position.y, childNode.position.z);
      positions.needsUpdate = true;
    });
  }

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);

    // Smooth collapse/expand
    let needsEdgeUpdate = false;
    nodes.forEach(node => {
      if (node.depth >= 2) {
        const dx = node.targetPosition.x - node.position.x;
        const dy = node.targetPosition.y - node.position.y;
        const dz = node.targetPosition.z - node.position.z;
        if (Math.abs(dx) > 0.001 || Math.abs(dy) > 0.001 || Math.abs(dz) > 0.001) {
          const lerpFactor = 0.08;
          node.position.x += dx * lerpFactor;
          node.position.y += dy * lerpFactor;
          node.position.z += dz * lerpFactor;
          node.mesh.position.copy(node.position);
          if (node.label) {
            node.label.position.copy(node.position);
            node.label.position.y += 0.7;
          }
          STATE.nodePositions[node.id] = {
            x: node.position.x,
            y: node.position.y,
            z: node.position.z
          };
          needsEdgeUpdate = true;
        }
      }
    });

    if (needsEdgeUpdate) {
      updateEdges();
    }

    // Auto rotation
    if (STATE.isAutoRotating) {
      treeGroup.rotation.y += 0.01;
    }

    // Hover raycasting
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodeMeshes);

    // Reset previous hover
    if (hoveredMesh) {
      const prevNode = hoveredMesh.userData.node;
      // Only reset if not in highlighted path
      if (!STATE.highlightedPath.includes(prevNode.id)) {
        setNodeColor(hoveredMesh, hoveredMesh.userData.originalColor, 0x000000);
      }
      hoveredMesh.scale.set(1, 1, 1);
      hoveredMesh = null;
      STATE.hoveredNode = null;
    }

    if (intersects.length > 0) {
      const mesh = intersects[0].object;
      hoveredMesh = mesh;
      STATE.hoveredNode = mesh.userData.nodeId;

      // Scale up
      mesh.scale.set(1.8, 1.8, 1.8);

      // Glow emissive
      const currentColor = mesh.material.color.getHex();
      mesh.material.emissive.setHex(currentColor);
      mesh.material.emissive.multiplyScalar(0.5);

      document.body.style.cursor = 'pointer';
    } else {
      document.body.style.cursor = 'default';
    }

    updateInfoPanel();
    controls.update();
    renderer.render(scene, camera);
  }

  // Event listeners
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('click', onClick);
  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Add some fog for atmosphere
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

  // Add a subtle grid
  const gridHelper = new THREE.GridHelper(30, 30, 0x222244, 0x111133);
  gridHelper.position.y = -0.5;
  scene.add(gridHelper);

  // Mark scene as ready
  STATE.sceneReady = true;
  updateInfoPanel();

  // Start animation
  animate();
})();
</script>
</body>
</html>
