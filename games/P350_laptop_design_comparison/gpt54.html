<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Laptop Design Comparison Showcase</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #ffffff 0%, #dff1ff 100%);
    }

    canvas {
      display: block;
    }

    #selection-label {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 10px;
      font-weight: bold;
      color: #333;
      z-index: 10;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }

    #toolbar {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 10;
    }

    #toolbar button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.95);
      color: #222;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
      transition: transform 0.15s ease, background 0.15s ease;
    }

    #toolbar button:hover {
      transform: translateY(-1px);
      background: #fff7df;
    }

    #specs-panel {
      position: absolute;
      left: 20px;
      top: 80px;
      width: 280px;
      padding: 16px;
      background: rgba(255,255,255,0.94);
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      z-index: 10;
      color: #222;
      display: none;
    }

    #specs-panel h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    #specs-panel .spec-block {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ddd;
    }

    #specs-panel .spec-block:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div id="selection-label">None Selected</div>

  <div id="toolbar">
    <button id="btn-compare">Compare Side by Side</button>
    <button id="btn-reset">Reset Positions</button>
    <button id="btn-specs">Toggle Specs</button>
    <button id="btn-color">Switch Color</button>
  </div>

  <div id="specs-panel">
    <h3>Laptop Specs</h3>
    <div class="spec-block">
      <strong>ProBook Ultra</strong><br>
      15.6", 2.1kg, i7, 16GB RAM
    </div>
    <div class="spec-block">
      <strong>AirSlim Max</strong><br>
      14", 1.3kg, M2, 8GB RAM
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, raycaster, mouse, clock;
    let humanModel = null;

    const selectionLabel = document.getElementById('selection-label');
    const specsPanel = document.getElementById('specs-panel');

    const colorVariants = ['#C0C0C0', '#4A4A4A', '#191970'];

    window.__3D_STATE__ = {
      selectedLaptop: null,
      laptopA_screenAngle: 110,
      laptopB_screenAngle: 110,
      laptopA_yRotation: 0,
      laptopB_yRotation: 0,
      compareMode: false,
      specsVisible: false,
      laptopA_colorIndex: 0,
      laptopB_colorIndex: 0,
      modelLoaded: false,
      laptopA_position: { x: -2, y: 1, z: 0 },
      laptopB_position: { x: 2, y: 1, z: 0 }
    };

    const animTargets = {
      A: null,
      B: null
    };

    const laptops = {};

    init();
    animate();

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 3, 8);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();
      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      setupLights();
      setupEnvironment();
      createDisplayTable();
      createLaptops();
      loadHumanModel();
      setupEvents();
    }

    function setupLights() {
      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);

      const dirLeft = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLeft.position.set(-5, 8, 5);
      dirLeft.castShadow = true;
      scene.add(dirLeft);

      const dirRight = new THREE.DirectionalLight(0xffffff, 0.6);
      dirRight.position.set(5, 8, 5);
      scene.add(dirRight);
    }

    function setupEnvironment() {
      const floorGeo = new THREE.PlaneGeometry(50, 50);
      const floorMat = new THREE.MeshStandardMaterial({
        color: 0xdddddd,
        roughness: 0.95,
        metalness: 0.05
      });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      floor.receiveShadow = true;
      scene.add(floor);
    }

    function createDisplayTable() {
      const geo = new THREE.BoxGeometry(6, 1, 2);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.4,
        metalness: 0.1
      });
      const table = new THREE.Mesh(geo, mat);
      table.position.set(0, 0.5, 0);
      table.castShadow = true;
      table.receiveShadow = true;
      scene.add(table);
    }

    function makeGradientTexture(topColor, bottomColor) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, 0, 256);
      gradient.addColorStop(0, topColor);
      gradient.addColorStop(1, bottomColor);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 256, 256);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function createLaptop({
      id,
      name,
      position,
      baseSize,
      screenSize,
      baseColor,
      screenGradient
    }) {
      const root = new THREE.Group();
      root.position.copy(position);

      const selectableMeshes = [];

      const body = new THREE.Group();
      root.add(body);

      const baseGeo = new THREE.BoxGeometry(baseSize.x, baseSize.y, baseSize.z);
      const baseMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(baseColor),
        roughness: 0.35,
        metalness: 0.8,
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
      });
      const baseMesh = new THREE.Mesh(baseGeo, baseMat);
      baseMesh.castShadow = true;
      baseMesh.receiveShadow = true;
      body.add(baseMesh);
      selectableMeshes.push(baseMesh);

      const hinge = new THREE.Group();
      hinge.position.set(0, baseSize.y / 2, -baseSize.z / 2);
      body.add(hinge);

      const screenPivot = new THREE.Group();
      hinge.add(screenPivot);

      const screenGroup = new THREE.Group();
      screenGroup.position.set(0, screenSize.y / 2, screenSize.z / 2);
      screenPivot.add(screenGroup);

      const screenBackGeo = new THREE.BoxGeometry(screenSize.x, screenSize.y, screenSize.z);
      const screenMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(baseColor),
        roughness: 0.3,
        metalness: 0.75,
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
      });
      const screenBack = new THREE.Mesh(screenBackGeo, screenMat);
      screenBack.castShadow = true;
      screenBack.receiveShadow = true;
      screenGroup.add(screenBack);
      selectableMeshes.push(screenBack);

      const displayGeo = new THREE.PlaneGeometry(screenSize.x * 0.9, screenSize.y * 0.86);
      const displayMat = new THREE.MeshBasicMaterial({
        map: makeGradientTexture(screenGradient.top, screenGradient.bottom)
      });
      const display = new THREE.Mesh(displayGeo, displayMat);
      display.position.set(0, 0, screenSize.z / 2 + 0.001);
      screenGroup.add(display);
      selectableMeshes.push(display);

      const keyboardGeo = new THREE.PlaneGeometry(baseSize.x * 0.88, baseSize.z * 0.72);
      const keyboardMat = new THREE.MeshStandardMaterial({
        color: 0x2a2a2a,
        roughness: 0.7,
        metalness: 0.1
      });
      const keyboard = new THREE.Mesh(keyboardGeo, keyboardMat);
      keyboard.rotation.x = -Math.PI / 2;
      keyboard.position.set(0, baseSize.y / 2 + 0.002, 0.05);
      body.add(keyboard);

      const trackpadGeo = new THREE.PlaneGeometry(baseSize.x * 0.22, baseSize.z * 0.18);
      const trackpadMat = new THREE.MeshStandardMaterial({
        color: 0x777777,
        roughness: 0.6,
        metalness: 0.15
      });
      const trackpad = new THREE.Mesh(trackpadGeo, trackpadMat);
      trackpad.rotation.x = -Math.PI / 2;
      trackpad.position.set(0, baseSize.y / 2 + 0.003, baseSize.z * 0.22);
      body.add(trackpad);

      scene.add(root);

      const laptop = {
        id,
        name,
        root,
        body,
        hinge,
        screenPivot,
        screenGroup,
        baseMesh,
        screenBack,
        display,
        selectableMeshes,
        baseMat,
        screenMat,
        currentScreenAngle: 110,
        currentYRotation: 0,
        colorIndex: id === 'A' ? 0 : 1,
        originalPosition: position.clone(),
        comparePosition: id === 'A'
          ? new THREE.Vector3(-1.5, 1, 1)
          : new THREE.Vector3(1.5, 1, 1),
      };

      setLaptopColor(laptop, laptop.colorIndex);
      setLaptopScreenAngle(laptop, 110);
      setLaptopYRotation(laptop, 0);

      selectableMeshes.forEach(mesh => {
        mesh.userData.laptopId = id;
      });

      return laptop;
    }

    function createLaptops() {
      laptops.A = createLaptop({
        id: 'A',
        name: 'ProBook Ultra',
        position: new THREE.Vector3(-2, 1, 0),
        baseSize: new THREE.Vector3(2.4, 0.08, 1.6),
        screenSize: new THREE.Vector3(2.4, 1.6, 0.04),
        baseColor: '#666666',
        screenGradient: { top: '#77aaff', bottom: '#1144aa' }
      });

      laptops.B = createLaptop({
        id: 'B',
        name: 'AirSlim Max',
        position: new THREE.Vector3(2, 1, 0),
        baseSize: new THREE.Vector3(2.2, 0.05, 1.4),
        screenSize: new THREE.Vector3(2.2, 1.4, 0.03),
        baseColor: '#4A4A4A',
        screenGradient: { top: '#8df0b2', bottom: '#0d8b4e' }
      });

      updateStatePositions();
    }

    function loadHumanModel() {
      const loader = new GLTFLoader();
      loader.load(
        'Michelle.glb',
        (gltf) => {
          humanModel = gltf.scene;

          const box = new THREE.Box3().setFromObject(humanModel);
          const size = new THREE.Vector3();
          box.getSize(size);
          const height = size.y || 1;
          const scale = 2 / height;
          humanModel.scale.setScalar(scale);

          const scaledBox = new THREE.Box3().setFromObject(humanModel);
          const center = new THREE.Vector3();
          const scaledSize = new THREE.Vector3();
          scaledBox.getCenter(center);
          scaledBox.getSize(scaledSize);

          humanModel.position.set(0, 0, -2);

          const finalBox = new THREE.Box3().setFromObject(humanModel);
          humanModel.position.y -= finalBox.min.y;

          humanModel.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          scene.add(humanModel);
          window.__3D_STATE__.modelLoaded = true;
        },
        undefined,
        (error) => {
          console.error('Failed to load Michelle.glb:', error);
        }
      );
    }

    function setupEvents() {
      window.addEventListener('resize', onWindowResize);
      window.addEventListener('pointerdown', onPointerDown);
      window.addEventListener('keydown', onKeyDown);

      document.getElementById('btn-compare').addEventListener('click', () => {
        window.__3D_STATE__.compareMode = true;
        animateLaptopTo(laptops.A, laptops.A.comparePosition, 0);
        animateLaptopTo(laptops.B, laptops.B.comparePosition, 0);
      });

      document.getElementById('btn-reset').addEventListener('click', () => {
        window.__3D_STATE__.compareMode = false;
        animateLaptopTo(laptops.A, laptops.A.originalPosition, window.__3D_STATE__.laptopA_yRotation);
        animateLaptopTo(laptops.B, laptops.B.originalPosition, window.__3D_STATE__.laptopB_yRotation);
      });

      document.getElementById('btn-specs').addEventListener('click', () => {
        window.__3D_STATE__.specsVisible = !window.__3D_STATE__.specsVisible;
        specsPanel.style.display = window.__3D_STATE__.specsVisible ? 'block' : 'none';
      });

      document.getElementById('btn-color').addEventListener('click', () => {
        const selected = window.__3D_STATE__.selectedLaptop;
        if (!selected) return;
        const laptop = laptops[selected];
        laptop.colorIndex = (laptop.colorIndex + 1) % colorVariants.length;
        setLaptopColor(laptop, laptop.colorIndex);

        if (selected === 'A') {
          window.__3D_STATE__.laptopA_colorIndex = laptop.colorIndex;
        } else {
          window.__3D_STATE__.laptopB_colorIndex = laptop.colorIndex;
        }
      });
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onPointerDown(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const allSelectable = [
        ...laptops.A.selectableMeshes,
        ...laptops.B.selectableMeshes
      ];

      const intersects = raycaster.intersectObjects(allSelectable, false);

      if (intersects.length > 0) {
        const id = intersects[0].object.userData.laptopId;
        selectLaptop(id);
      } else {
        selectLaptop(null);
      }
    }

    function onKeyDown(event) {
      const selected = window.__3D_STATE__.selectedLaptop;
      if (!selected) return;

      const laptop = laptops[selected];

      switch (event.key) {
        case 'ArrowUp':
          setLaptopScreenAngle(laptop, laptop.currentScreenAngle + 10);
          break;
        case 'ArrowDown':
          setLaptopScreenAngle(laptop, laptop.currentScreenAngle - 10);
          break;
        case 'ArrowLeft':
          setLaptopYRotation(laptop, laptop.currentYRotation + 15);
          break;
        case 'ArrowRight':
          setLaptopYRotation(laptop, laptop.currentYRotation - 15);
          break;
      }
    }

    function selectLaptop(id) {
      window.__3D_STATE__.selectedLaptop = id;

      [laptops.A, laptops.B].forEach(laptop => {
        const selected = laptop.id === id;
        const intensity = selected ? 0.3 : 0.0;
        laptop.baseMat.emissive.set(selected ? 0xFFD700 : 0x000000);
        laptop.baseMat.emissiveIntensity = intensity;
        laptop.screenMat.emissive.set(selected ? 0xFFD700 : 0x000000);
        laptop.screenMat.emissiveIntensity = intensity;
      });

      if (id === 'A') {
        selectionLabel.textContent = 'Selected: ProBook Ultra';
      } else if (id === 'B') {
        selectionLabel.textContent = 'Selected: AirSlim Max';
      } else {
        selectionLabel.textContent = 'None Selected';
      }
    }

    function setLaptopScreenAngle(laptop, degrees) {
      const clamped = THREE.MathUtils.clamp(degrees, 0, 170);
      laptop.currentScreenAngle = clamped;

      // 0 degrees = fully closed
      // Rotate backward around hinge
      laptop.screenPivot.rotation.x = THREE.MathUtils.degToRad(180 - clamped);

      if (laptop.id === 'A') {
        window.__3D_STATE__.laptopA_screenAngle = clamped;
      } else {
        window.__3D_STATE__.laptopB_screenAngle = clamped;
      }
    }

    function setLaptopYRotation(laptop, degrees) {
      laptop.currentYRotation = degrees;
      laptop.root.rotation.y = THREE.MathUtils.degToRad(degrees);

      if (laptop.id === 'A') {
        window.__3D_STATE__.laptopA_yRotation = degrees;
      } else {
        window.__3D_STATE__.laptopB_yRotation = degrees;
      }
    }

    function setLaptopColor(laptop, index) {
      const color = new THREE.Color(colorVariants[index]);
      laptop.baseMat.color.copy(color);
      laptop.screenMat.color.copy(color);

      if (laptop.id === 'A') {
        window.__3D_STATE__.laptopA_colorIndex = index;
      } else {
        window.__3D_STATE__.laptopB_colorIndex = index;
      }
    }

    function animateLaptopTo(laptop, targetPos, targetYDeg) {
      animTargets[laptop.id] = {
        startTime: performance.now(),
        duration: 1000,
        fromPos: laptop.root.position.clone(),
        toPos: targetPos.clone(),
        fromRot: laptop.currentYRotation,
        toRot: targetYDeg
      };
    }

    function updateAnimations() {
      const now = performance.now();

      ['A', 'B'].forEach(id => {
        const anim = animTargets[id];
        const laptop = laptops[id];
        if (!anim) return;

        let t = (now - anim.startTime) / anim.duration;
        if (t >= 1) t = 1;

        const eased = easeInOutCubic(t);

        laptop.root.position.lerpVectors(anim.fromPos, anim.toPos, eased);
        const rot = THREE.MathUtils.lerp(anim.fromRot, anim.toRot, eased);
        laptop.root.rotation.y = THREE.MathUtils.degToRad(rot);

        laptop.currentYRotation = rot;

        if (id === 'A') {
          window.__3D_STATE__.laptopA_yRotation = rot;
        } else {
          window.__3D_STATE__.laptopB_yRotation = rot;
        }

        if (t === 1) {
          animTargets[id] = null;
        }
      });

      updateStatePositions();
    }

    function updateStatePositions() {
      window.__3D_STATE__.laptopA_position = {
        x: laptops.A.root.position.x,
        y: laptops.A.root.position.y,
        z: laptops.A.root.position.z
      };

      window.__3D_STATE__.laptopB_position = {
        x: laptops.B.root.position.x,
        y: laptops.B.root.position.y,
        z: laptops.B.root.position.z
      };
    }

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function animate() {
      requestAnimationFrame(animate);
      updateAnimations();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
