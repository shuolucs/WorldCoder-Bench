<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D DNA Double Helix Visualization</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #infoPanel {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.6;
      min-width: 200px;
      z-index: 10;
    }

    #controlPanel {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 16px;
      border-radius: 12px;
      z-index: 10;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #4b83e8;
    }

    label {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      width: 140px;
    }

    #saveStatus {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="infoPanel">
    <div>Base Pairs: 20</div>
    <div id="unzippedInfo">Unzipped: 0/20</div>
    <div id="rotationInfo">Rotation: 0.0°</div>
    <div id="speedInfo">Speed: 1.0x</div>
  </div>

  <div id="saveStatus"></div>

  <div id="controlPanel">
    <button id="unzipBtn">Unzip DNA</button>
    <button id="rezipBtn">Re-zip DNA</button>
    <button id="saveBtn">Save State</button>
    <button id="loadBtn">Load State</button>
    <label for="speedSlider">
      Rotation Speed
      <input id="speedSlider" type="range" min="0.1" max="2.0" step="0.1" value="1.0" />
    </label>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

    const BASE_PAIR_COUNT = 20;
    const UNZIP_INTERVAL = 300;
    const BASE_ROTATION_SPEED = 0.3; // rad/s

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    const dnaGroup = new THREE.Group();
    dnaGroup.name = 'dnaGroup';
    scene.add(dnaGroup);

    const strandAColor = new THREE.Color('#ff4444');
    const strandBColor = new THREE.Color('#4444ff');
    const bondColor = new THREE.Color('#44ff44');

    const sphereGeometry = new THREE.SphereGeometry(0.3, 24, 24);

    const strandAMaterial = new THREE.MeshStandardMaterial({ color: strandAColor });
    const strandBMaterial = new THREE.MeshStandardMaterial({ color: strandBColor });

    const basePairs = [];

    function getBasePositionA(i) {
      return new THREE.Vector3(
        2 * Math.cos(i * 0.6),
        i * 1.2 - 12,
        2 * Math.sin(i * 0.6)
      );
    }

    function getBasePositionB(i) {
      return new THREE.Vector3(
        2 * Math.cos(i * 0.6 + Math.PI),
        i * 1.2 - 12,
        2 * Math.sin(i * 0.6 + Math.PI)
      );
    }

    function createBondBetween(start, end) {
      const direction = new THREE.Vector3().subVectors(end, start);
      const length = direction.length();
      const geometry = new THREE.CylinderGeometry(0.1, 0.1, length, 16, 1);
      const material = new THREE.MeshStandardMaterial({
        color: bondColor,
        transparent: true,
        opacity: 1
      });
      const cylinder = new THREE.Mesh(geometry, material);

      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      cylinder.position.copy(midpoint);

      const up = new THREE.Vector3(0, 1, 0);
      cylinder.quaternion.setFromUnitVectors(up, direction.clone().normalize());

      return cylinder;
    }

    function updateBondMesh(pair) {
      const start = pair.sphereA.position;
      const end = pair.sphereB.position;
      const direction = new THREE.Vector3().subVectors(end, start);
      const length = direction.length();
      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);

      pair.bond.position.copy(midpoint);
      pair.bond.scale.set(1, length / pair.originalBondLength, 1);
      pair.bond.quaternion.setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        direction.clone().normalize()
      );
    }

    for (let i = 0; i < BASE_PAIR_COUNT; i++) {
      const originalA = getBasePositionA(i);
      const originalB = getBasePositionB(i);

      const sphereA = new THREE.Mesh(sphereGeometry, strandAMaterial.clone());
      sphereA.position.copy(originalA);

      const sphereB = new THREE.Mesh(sphereGeometry, strandBMaterial.clone());
      sphereB.position.copy(originalB);

      const bond = createBondBetween(originalA, originalB);

      dnaGroup.add(sphereA);
      dnaGroup.add(sphereB);
      dnaGroup.add(bond);

      basePairs.push({
        index: i,
        originalA: originalA.clone(),
        originalB: originalB.clone(),
        sphereA,
        sphereB,
        bond,
        originalBondLength: originalA.distanceTo(originalB),
        unzipped: false
      });
    }

    const loader = new GLTFLoader();
    let modelLoaded = false;

    loader.load(
      'collision-world.glb',
      (gltf) => {
        gltf.scene.scale.setScalar(0.05);
        gltf.scene.position.set(0, -12, 0);
        scene.add(gltf.scene);
        modelLoaded = true;
      },
      undefined,
      (error) => {
        console.warn('Failed to load collision-world.glb:', error);
      }
    );

    const unzipBtn = document.getElementById('unzipBtn');
    const rezipBtn = document.getElementById('rezipBtn');
    const saveBtn = document.getElementById('saveBtn');
    const loadBtn = document.getElementById('loadBtn');
    const speedSlider = document.getElementById('speedSlider');
    const saveStatus = document.getElementById('saveStatus');

    const unzippedInfo = document.getElementById('unzippedInfo');
    const rotationInfo = document.getElementById('rotationInfo');
    const speedInfo = document.getElementById('speedInfo');

    let unzipProgress = 0;
    let isUnzipping = false;
    let isRezipping = false;
    let animationTimer = null;

    window.__3D_STATE__ = {
      basePairCount: BASE_PAIR_COUNT,
      unzipProgress: 0,
      isUnzipping: false,
      isRezipping: false,
      rotationAngle: 0,
      rotationSpeed: parseFloat(speedSlider.value),
      savedState: null,
      modelLoaded: false,
      strandAPositions: [],
      strandBPositions: [],
      bondOpacities: []
    };

    function applyPairState(index, unzipped) {
      const pair = basePairs[index];
      pair.unzipped = unzipped;

      const offsetA = new THREE.Vector3(-4, 0, 0);
      const offsetB = new THREE.Vector3(4, 0, 0);

      pair.sphereA.position.copy(pair.originalA).add(unzipped ? offsetA : new THREE.Vector3());
      pair.sphereB.position.copy(pair.originalB).add(unzipped ? offsetB : new THREE.Vector3());

      pair.bond.material.opacity = unzipped ? 0 : 1;
      pair.bond.visible = true;

      updateBondMesh(pair);
    }

    function applyVisualStateFromProgress(progress) {
      for (let i = 0; i < BASE_PAIR_COUNT; i++) {
        const shouldBeUnzipped = i >= BASE_PAIR_COUNT - progress;
        applyPairState(i, shouldBeUnzipped);
      }
      unzipProgress = progress;
    }

    function showStatus(text) {
      saveStatus.textContent = text;
      saveStatus.style.opacity = '1';
      clearTimeout(showStatus._timer);
      showStatus._timer = setTimeout(() => {
        saveStatus.style.opacity = '0';
      }, 2000);
    }

    function stopCurrentAnimation() {
      if (animationTimer) {
        clearInterval(animationTimer);
        animationTimer = null;
      }
      isUnzipping = false;
      isRezipping = false;
    }

    function startUnzip() {
      if (isUnzipping || isRezipping || unzipProgress >= BASE_PAIR_COUNT) return;
      stopCurrentAnimation();
      isUnzipping = true;

      animationTimer = setInterval(() => {
        if (unzipProgress >= BASE_PAIR_COUNT) {
          stopCurrentAnimation();
          return;
        }
        const pairIndex = BASE_PAIR_COUNT - 1 - unzipProgress;
        applyPairState(pairIndex, true);
        unzipProgress++;

        if (unzipProgress >= BASE_PAIR_COUNT) {
          stopCurrentAnimation();
        }
      }, UNZIP_INTERVAL);
    }

    function startRezip() {
      if (isUnzipping || isRezipping || unzipProgress <= 0) return;
      stopCurrentAnimation();
      isRezipping = true;

      animationTimer = setInterval(() => {
        if (unzipProgress <= 0) {
          stopCurrentAnimation();
          return;
        }
        const pairIndex = BASE_PAIR_COUNT - unzipProgress;
        applyPairState(pairIndex, false);
        unzipProgress--;

        if (unzipProgress <= 0) {
          stopCurrentAnimation();
        }
      }, UNZIP_INTERVAL);
    }

    function saveState() {
      const state = {
        unzipProgress,
        rotationAngle: dnaGroup.rotation.y,
        animating: isUnzipping || isRezipping
      };
      localStorage.setItem('dna_save_state', JSON.stringify(state));
      window.__3D_STATE__.savedState = state;
      showStatus('State Saved!');
    }

    function loadState() {
      const raw = localStorage.getItem('dna_save_state');
      if (!raw) return;

      try {
        const state = JSON.parse(raw);
        stopCurrentAnimation();

        const progress = Math.max(0, Math.min(BASE_PAIR_COUNT, Number(state.unzipProgress) || 0));
        const angle = Number(state.rotationAngle) || 0;

        applyVisualStateFromProgress(progress);
        dnaGroup.rotation.y = angle;

        window.__3D_STATE__.savedState = state;
        showStatus('State Loaded!');
      } catch (e) {
        console.warn('Failed to load saved state:', e);
      }
    }

    unzipBtn.addEventListener('click', startUnzip);
    rezipBtn.addEventListener('click', startRezip);
    saveBtn.addEventListener('click', saveState);
    loadBtn.addEventListener('click', loadState);

    speedSlider.addEventListener('input', () => {
      speedInfo.textContent = `Speed: ${parseFloat(speedSlider.value).toFixed(1)}x`;
    });

    applyVisualStateFromProgress(0);

    const clock = new THREE.Clock();

    function updateInfoPanel() {
      unzippedInfo.textContent = `Unzipped: ${unzipProgress}/20`;
      rotationInfo.textContent = `Rotation: ${(THREE.MathUtils.radToDeg(dnaGroup.rotation.y) % 360).toFixed(1)}°`;
      speedInfo.textContent = `Speed: ${parseFloat(speedSlider.value).toFixed(1)}x`;
    }

    function update3DState() {
      window.__3D_STATE__.basePairCount = BASE_PAIR_COUNT;
      window.__3D_STATE__.unzipProgress = unzipProgress;
      window.__3D_STATE__.isUnzipping = isUnzipping;
      window.__3D_STATE__.isRezipping = isRezipping;
      window.__3D_STATE__.rotationAngle = dnaGroup.rotation.y;
      window.__3D_STATE__.rotationSpeed = parseFloat(speedSlider.value);
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.strandAPositions = basePairs.map(pair => ({
        x: pair.sphereA.position.x,
        y: pair.sphereA.position.y,
        z: pair.sphereA.position.z
      }));
      window.__3D_STATE__.strandBPositions = basePairs.map(pair => ({
        x: pair.sphereB.position.x,
        y: pair.sphereB.position.y,
        z: pair.sphereB.position.z
      }));
      window.__3D_STATE__.bondOpacities = basePairs.map(pair => pair.bond.material.opacity);
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (!isUnzipping && !isRezipping) {
        dnaGroup.rotation.y += BASE_ROTATION_SPEED * parseFloat(speedSlider.value) * delta;
      }

      controls.update();
      updateInfoPanel();
      update3DState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
