<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D DNA Double Helix</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #infoPanel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            line-height: 1.5;
        }
        #controlPanel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            background: #4444ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #6666ff;
        }
        button:active {
            background: #2222cc;
        }
        #saveStatus {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(68, 255, 68, 0.8);
            color: black;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            transition: opacity 0.3s;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 4px;
        }
        input[type=range] {
            cursor: pointer;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="infoPanel">
        <div id="infoPairs">Base Pairs: 20</div>
        <div id="infoUnzipped">Unzipped: 0/20</div>
        <div id="infoRotation">Rotation: 0.0°</div>
        <div id="infoSpeed">Speed: 1.0x</div>
    </div>
    
    <div id="saveStatus"></div>

    <div id="controlPanel">
        <button id="unzipBtn">Unzip DNA</button>
        <button id="rezipBtn">Re-zip DNA</button>
        <button id="saveBtn">Save State</button>
        <button id="loadBtn">Load State</button>
        <div class="slider-container">
            <label for="speedSlider">Rotation Speed</label>
            <input type="range" id="speedSlider" min="0.1" max="2.0" step="0.1" value="1.0">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Initialize Global State
        window.__3D_STATE__ = {
            basePairCount: 20,
            unzipProgress: 0,
            isUnzipping: false,
            isRezipping: false,
            rotationAngle: 0,
            rotationSpeed: 1.0,
            savedState: null,
            modelLoaded: false,
            strandAPositions: [],
            strandBPositions: [],
            bondOpacities: []
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Load Environment Model
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/collision-world.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.05, 0.05, 0.05);
                model.position.set(0, -12, 0);
                
                // Darken the environment slightly to make DNA pop
                model.traverse((child) => {
                    if (child.isMesh && child.material) {
                        child.material.color.multiplyScalar(0.5);
                    }
                });
                
                scene.add(model);
                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load collision-world.glb, using fallback platform.', error);
                const geo = new THREE.CylinderGeometry(15, 15, 1, 32);
                const mat = new THREE.MeshStandardMaterial({ color: 0x2a2a4e });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(0, -12.5, 0);
                scene.add(mesh);
                window.__3D_STATE__.modelLoaded = true;
            }
        );

        // DNA Construction
        const dnaGroup = new THREE.Group();
        scene.add(dnaGroup);

        const numPairs = 20;
        const sphereGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const matA = new THREE.MeshStandardMaterial({ color: 0xff4444 });
        const matB = new THREE.MeshStandardMaterial({ color: 0x4444ff });
        const bondGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 8);

        const pairsData = [];

        for (let i = 0; i < numPairs; i++) {
            const y = i * 1.2 - 12;
            const angleA = i * 0.6;
            const angleB = i * 0.6 + Math.PI;

            const posA = new THREE.Vector3(2 * Math.cos(angleA), y, 2 * Math.sin(angleA));
            const posB = new THREE.Vector3(2 * Math.cos(angleB), y, 2 * Math.sin(angleB));

            const meshA = new THREE.Mesh(sphereGeo, matA);
            meshA.position.copy(posA);
            dnaGroup.add(meshA);

            const meshB = new THREE.Mesh(sphereGeo, matB);
            meshB.position.copy(posB);
            dnaGroup.add(meshB);

            const bondMat = new THREE.MeshStandardMaterial({ 
                color: 0x44ff44, 
                transparent: true, 
                opacity: 1.0 
            });
            const bond = new THREE.Mesh(bondGeo, bondMat);

            const distance = posA.distanceTo(posB);
            bond.scale.y = distance;
            bond.position.copy(posA).lerp(posB, 0.5);
            bond.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), posB.clone().sub(posA).normalize());
            dnaGroup.add(bond);

            const center = new THREE.Vector3(0, y, 0);
            const dirA = posA.clone().sub(center).normalize();
            const dirB = posB.clone().sub(center).normalize();

            pairsData.push({
                origA: posA,
                origB: posB,
                dirA: dirA,
                dirB: dirB,
                meshA: meshA,
                meshB: meshB,
                bond: bond,
                bondMat: bondMat,
                factor: 0 
            });
        }

        // UI Interactions
        const clock = new THREE.Clock();

        document.getElementById('unzipBtn').addEventListener('click', () => {
            window.__3D_STATE__.isUnzipping = true;
            window.__3D_STATE__.isRezipping = false;
        });

        document.getElementById('rezipBtn').addEventListener('click', () => {
            window.__3D_STATE__.isRezipping = true;
            window.__3D_STATE__.isUnzipping = false;
        });

        const speedSlider = document.getElementById('speedSlider');
        speedSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.rotationSpeed = parseFloat(e.target.value);
            document.getElementById('infoSpeed').innerText = `Speed: ${window.__3D_STATE__.rotationSpeed.toFixed(1)}x`;
        });

        function showStatus(msg) {
            const el = document.getElementById('saveStatus');
            el.innerText = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 2000);
        }

        document.getElementById('saveBtn').addEventListener('click', () => {
            const stateToSave = {
                unzipProgress: window.__3D_STATE__.unzipProgress,
                rotationAngle: dnaGroup.rotation.y,
                factors: pairsData.map(p => p.factor)
            };
            const json = JSON.stringify(stateToSave);
            localStorage.setItem('dna_save_state', json);
            window.__3D_STATE__.savedState = stateToSave;
            showStatus('State Saved!');
        });

        document.getElementById('loadBtn').addEventListener('click', () => {
            const json = localStorage.getItem('dna_save_state');
            if (json) {
                const loadedState = JSON.parse(json);
                dnaGroup.rotation.y = loadedState.rotationAngle;
                window.__3D_STATE__.isUnzipping = false;
                window.__3D_STATE__.isRezipping = false;
                
                for(let i = 0; i < numPairs; i++) {
                    pairsData[i].factor = loadedState.factors[i];
                }
                
                applyPositions();
                updateStateObject();
                showStatus('State Loaded!');
            }
        });

        // Core Logic
        function applyPositions() {
            let unzippedCount = 0;
            for (let i = 0; i < numPairs; i++) {
                const pd = pairsData[i];
                const f = pd.factor;
                
                if (f === 1) unzippedCount++;

                pd.meshA.position.copy(pd.origA).addScaledVector(pd.dirA, 4 * f);
                pd.meshB.position.copy(pd.origB).addScaledVector(pd.dirB, 4 * f);
                pd.bondMat.opacity = 1.0 - f;
            }
            
            window.__3D_STATE__.unzipProgress = unzippedCount;
            document.getElementById('infoUnzipped').innerText = `Unzipped: ${unzippedCount}/20`;
        }

        function updateStateObject() {
            const state = window.__3D_STATE__;
            state.rotationAngle = dnaGroup.rotation.y;

            state.strandAPositions = pairsData.map(p => ({x: p.meshA.position.x, y: p.meshA.position.y, z: p.meshA.position.z}));
            state.strandBPositions = pairsData.map(p => ({x: p.meshB.position.x, y: p.meshB.position.y, z: p.meshB.position.z}));
            state.bondOpacities = pairsData.map(p => p.bondMat.opacity);

            let deg = (dnaGroup.rotation.y * 180 / Math.PI) % 360;
            if (deg < 0) deg += 360;
            document.getElementById('infoRotation').innerText = `Rotation: ${deg.toFixed(1)}°`;
        }

        // Render Loop
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const state = window.__3D_STATE__;

            if (!state.isUnzipping && !state.isRezipping) {
                dnaGroup.rotation.y += 0.3 * state.rotationSpeed * delta;
            } else {
                const rate = delta / 0.3; // 300ms per pair
                
                if (state.isUnzipping) {
                    let found = false;
                    // Unzip from top (index 19) down to 0
                    for (let i = numPairs - 1; i >= 0; i--) {
                        if (pairsData[i].factor < 1) {
                            pairsData[i].factor += rate;
                            if (pairsData[i].factor >= 1) {
                                pairsData[i].factor = 1;
                            }
                            found = true;
                            break; 
                        }
                    }
                    if (!found) state.isUnzipping = false;
                } else if (state.isRezipping) {
                    let found = false;
                    // Rezip from bottom of unzipped section upwards
                    for (let i = 0; i < numPairs; i++) {
                        if (pairsData[i].factor > 0) {
                            pairsData[i].factor -= rate;
                            if (pairsData[i].factor <= 0) {
                                pairsData[i].factor = 0;
                            }
                            found = true;
                            break;
                        }
                    }
                    if (!found) state.isRezipping = false;
                }
            }

            applyPositions();
            updateStateObject();

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        applyPositions();
        updateStateObject();
        animate();
    </script>
</body>
</html>
