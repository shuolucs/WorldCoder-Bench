<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D DNA Double Helix Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #infoPanel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    color: #e0e0e0;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    min-width: 220px;
  }

  #infoPanel div {
    display: flex;
    justify-content: space-between;
  }

  #infoPanel .label {
    color: #aaa;
  }

  #infoPanel .value {
    color: #fff;
    font-weight: bold;
  }

  #controlPanel {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0, 0, 0, 0.7);
    padding: 14px 24px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    flex-wrap: wrap;
    justify-content: center;
  }

  #controlPanel button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    color: #fff;
  }

  #unzipBtn {
    background: linear-gradient(135deg, #ff4444, #cc2222);
  }
  #unzipBtn:hover { background: linear-gradient(135deg, #ff6666, #dd3333); }

  #rezipBtn {
    background: linear-gradient(135deg, #4444ff, #2222cc);
  }
  #rezipBtn:hover { background: linear-gradient(135deg, #6666ff, #3333dd); }

  #saveBtn {
    background: linear-gradient(135deg, #44aa44, #228822);
  }
  #saveBtn:hover { background: linear-gradient(135deg, #55cc55, #33aa33); }

  #loadBtn {
    background: linear-gradient(135deg, #aa8800, #886600);
  }
  #loadBtn:hover { background: linear-gradient(135deg, #ccaa22, #aa8800); }

  .slider-container {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #ccc;
    font-size: 13px;
  }

  #speedSlider {
    width: 100px;
    accent-color: #44ff44;
  }

  #saveStatus {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    color: #44ff44;
    font-size: 14px;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.3s;
    background: rgba(0, 0, 0, 0.7);
    padding: 8px 20px;
    border-radius: 6px;
  }

  #saveStatus.visible {
    opacity: 1;
  }
</style>
</head>
<body>

<div id="infoPanel">
  <div><span class="label">Base Pairs:</span><span class="value" id="infoBP">20</span></div>
  <div><span class="label">Unzipped:</span><span class="value" id="infoUnzip">0/20</span></div>
  <div><span class="label">Rotation:</span><span class="value" id="infoRotation">0.0°</span></div>
  <div><span class="label">Speed:</span><span class="value" id="infoSpeed">1.0x</span></div>
</div>

<div id="controlPanel">
  <button id="unzipBtn">Unzip DNA</button>
  <button id="rezipBtn">Re-zip DNA</button>
  <button id="saveBtn">Save State</button>
  <button id="loadBtn">Load State</button>
  <div class="slider-container">
    <label for="speedSlider">Rotation Speed</label>
    <input type="range" id="speedSlider" min="0.1" max="2.0" step="0.1" value="1.0">
  </div>
</div>

<div id="saveStatus"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  // State management
  window.__3D_STATE__ = {
    basePairCount: 20,
    unzipProgress: 0,
    isUnzipping: false,
    isRezipping: false,
    rotationAngle: 0,
    rotationSpeed: 1.0,
    savedState: null,
    modelLoaded: false,
    strandAPositions: [],
    strandBPositions: [],
    bondOpacities: []
  };

  // Initialize arrays
  for (let i = 0; i < 20; i++) {
    window.__3D_STATE__.strandAPositions.push({ x: 0, y: 0, z: 0 });
    window.__3D_STATE__.strandBPositions.push({ x: 0, y: 0, z: 0 });
    window.__3D_STATE__.bondOpacities.push(1.0);
  }

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 10, 30);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
  directionalLight.position.set(10, 20, 10);
  directionalLight.castShadow = true;
  scene.add(directionalLight);

  // Load GLTF model
  const loader = new THREE.GLTFLoader();
  loader.load('collision-world.glb', function(gltf) {
    const model = gltf.scene;
    model.scale.set(0.05, 0.05, 0.05);
    model.position.set(0, -12, 0);
    scene.add(model);
    window.__3D_STATE__.modelLoaded = true;
  }, undefined, function(error) {
    console.log('GLTF model not found, adding placeholder platform');
    // Add a placeholder platform
    const platformGeom = new THREE.CylinderGeometry(8, 8, 0.5, 32);
    const platformMat = new THREE.MeshPhongMaterial({ color: 0x333355, transparent: true, opacity: 0.6 });
    const platform = new THREE.Mesh(platformGeom, platformMat);
    platform.position.set(0, -13, 0);
    scene.add(platform);
    window.__3D_STATE__.modelLoaded = true;
  });

  // DNA Construction
  const dnaGroup = new THREE.Group();
  scene.add(dnaGroup);

  const NUM_PAIRS = 20;

  // Store references for each base pair
  const basePairs = [];

  for (let i = 0; i < NUM_PAIRS; i++) {
    const angle = i * 0.6;
    const y = i * 1.2 - 12;

    // Original positions
    const ax = 2 * Math.cos(angle);
    const az = 2 * Math.sin(angle);
    const bx = 2 * Math.cos(angle + Math.PI);
    const bz = 2 * Math.sin(angle + Math.PI);

    // Strand A backbone sphere
    const sphereGeomA = new THREE.SphereGeometry(0.3, 16, 16);
    const sphereMatA = new THREE.MeshPhongMaterial({ color: 0xff4444, emissive: 0x331111 });
    const sphereA = new THREE.Mesh(sphereGeomA, sphereMatA);
    sphereA.position.set(ax, y, az);

    // Strand B backbone sphere
    const sphereGeomB = new THREE.SphereGeometry(0.3, 16, 16);
    const sphereMatB = new THREE.MeshPhongMaterial({ color: 0x4444ff, emissive: 0x111133 });
    const sphereB = new THREE.Mesh(sphereGeomB, sphereMatB);
    sphereB.position.set(bx, y, bz);

    // Bond cylinder connecting the two
    const midX = (ax + bx) / 2;
    const midZ = (az + bz) / 2;
    const dist = Math.sqrt((bx - ax) * (bx - ax) + (bz - az) * (bz - az));

    const bondGeom = new THREE.CylinderGeometry(0.08, 0.08, dist, 8);
    const bondMat = new THREE.MeshPhongMaterial({
      color: 0x44ff44,
      emissive: 0x113311,
      transparent: true,
      opacity: 1.0
    });
    const bond = new THREE.Mesh(bondGeom, bondMat);

    // Position and orient the bond
    bond.position.set(midX, y, midZ);

    // Rotate cylinder to connect A and B
    const direction = new THREE.Vector3(bx - ax, 0, bz - az).normalize();
    const up = new THREE.Vector3(0, 1, 0);
    const quaternion = new THREE.Quaternion().setFromUnitVectors(up, direction);
    bond.quaternion.copy(quaternion);

    dnaGroup.add(sphereA);
    dnaGroup.add(sphereB);
    dnaGroup.add(bond);

    // Store backbone connectors (tubes between consecutive backbone spheres)
    basePairs.push({
      index: i,
      sphereA: sphereA,
      sphereB: sphereB,
      bond: bond,
      bondMat: bondMat,
      origA: { x: ax, y: y, z: az },
      origB: { x: bx, y: y, z: bz },
      unzipped: false,
      unzipFactor: 0 // 0 = zipped, 1 = fully unzipped
    });
  }

  // Add backbone connectors (tubes along each strand)
  for (let i = 0; i < NUM_PAIRS - 1; i++) {
    const pairCurr = basePairs[i];
    const pairNext = basePairs[i + 1];

    // Strand A connector
    const createConnector = (p1, p2, color) => {
      const mid = new THREE.Vector3(
        (p1.x + p2.x) / 2,
        (p1.y + p2.y) / 2,
        (p1.z + p2.z) / 2
      );
      const d = Math.sqrt(
        (p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2 + (p2.z - p1.z) ** 2
      );
      const geom = new THREE.CylinderGeometry(0.1, 0.1, d, 8);
      const mat = new THREE.MeshPhongMaterial({ color: color, emissive: 0x111111 });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.copy(mid);

      const dir = new THREE.Vector3(p2.x - p1.x, p2.y - p1.y, p2.z - p1.z).normalize();
      const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
      mesh.quaternion.copy(quat);

      return mesh;
    };

    const connA = createConnector(pairCurr.origA, pairNext.origA, 0xff4444);
    const connB = createConnector(pairCurr.origB, pairNext.origB, 0x4444ff);
    dnaGroup.add(connA);
    dnaGroup.add(connB);

    // Store connectors for updating during unzip
    if (!basePairs[i].connectorsA) basePairs[i].connectorsA = [];
    basePairs[i].connectorAMesh = connA;
    basePairs[i].connectorBMesh = connB;
    basePairs[i].connectorANext = i + 1;
    basePairs[i].connectorBNext = i + 1;
  }

  // Unzip/Rezip state
  let unzipProgress = 0;
  let isUnzipping = false;
  let isRezipping = false;
  let unzipTimer = null;
  let rotationAngle = 0;

  // Compute unzipped position for a strand
  function getUnzippedPosition(orig, strand) {
    // Move apart along the radial direction from center
    const radialDir = new THREE.Vector2(orig.x, orig.z).normalize();
    const offset = strand === 'A' ? 4 : 4;
    return {
      x: orig.x + radialDir.x * offset * (strand === 'A' ? 1 : 1),
      y: orig.y,
      z: orig.z + radialDir.y * offset * (strand === 'A' ? 1 : 1)
    };
  }

  function updateBasePairVisuals(pair, factor) {
    // factor: 0 = zipped, 1 = unzipped
    pair.unzipFactor = factor;

    // Compute radial directions for separation
    const radDirA = new THREE.Vector2(pair.origA.x, pair.origA.z).normalize();
    const radDirB = new THREE.Vector2(pair.origB.x, pair.origB.z).normalize();

    const newAx = pair.origA.x + radDirA.x * 4 * factor;
    const newAz = pair.origA.z + radDirA.y * 4 * factor;
    const newBx = pair.origB.x + radDirB.x * 4 * factor;
    const newBz = pair.origB.z + radDirB.y * 4 * factor;

    pair.sphereA.position.set(newAx, pair.origA.y, newAz);
    pair.sphereB.position.set(newBx, pair.origB.y, newBz);

    // Bond opacity
    pair.bondMat.opacity = 1.0 - factor;
    pair.bond.visible = factor < 1.0;

    // Update bond position and scale
    if (factor < 1.0) {
      const midX = (newAx + newBx) / 2;
      const midZ = (newAz + newBz) / 2;
      const dist = Math.sqrt((newBx - newAx) ** 2 + (newBz - newAz) ** 2);
      pair.bond.position.set(midX, pair.origA.y, midZ);

      const direction = new THREE.Vector3(newBx - newAx, 0, newBz - newAz).normalize();
      const up = new THREE.Vector3(0, 1, 0);
      const quaternion = new THREE.Quaternion().setFromUnitVectors(up, direction);
      pair.bond.quaternion.copy(quaternion);
      pair.bond.scale.set(1, dist / 4, 1); // original dist is ~4
    }
  }

  function updateConnectors() {
    for (let i = 0; i < NUM_PAIRS - 1; i++) {
      const pair = basePairs[i];
      if (!pair.connectorAMesh) continue;

      const nextPair = basePairs[i + 1];
      const p1A = pair.sphereA.position;
      const p2A = nextPair.sphereA.position;
      const p1B = pair.sphereB.position;
      const p2B = nextPair.sphereB.position;

      // Update connector A
      const midA = new THREE.Vector3().addVectors(p1A, p2A).multiplyScalar(0.5);
      const dA = p1A.distanceTo(p2A);
      pair.connectorAMesh.position.copy(midA);
      const dirA = new THREE.Vector3().subVectors(p2A, p1A).normalize();
      const quatA = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dirA);
      pair.connectorAMesh.quaternion.copy(quatA);
      pair.connectorAMesh.scale.set(1, dA / pair.connectorAMesh.geometry.parameters.height, 1);

      // Update connector B
      const midB = new THREE.Vector3().addVectors(p1B, p2B).multiplyScalar(0.5);
      const dB = p1B.distanceTo(p2B);
      pair.connectorBMesh.position.copy(midB);
      const dirB = new THREE.Vector3().subVectors(p2B, p1B).normalize();
      const quatB = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dirB);
      pair.connectorBMesh.quaternion.copy(quatB);
      pair.connectorBMesh.scale.set(1, dB / pair.connectorBMesh.geometry.parameters.height, 1);
    }
  }

  // Unzip button
  document.getElementById('unzipBtn').addEventListener('click', function() {
    if (isUnzipping || isRezipping) return;
    if (unzipProgress >= NUM_PAIRS) return;

    isUnzipping = true;
    window.__3D_STATE__.isUnzipping = true;

    let currentIndex = NUM_PAIRS - 1 - unzipProgress;

    unzipTimer = setInterval(function() {
      if (currentIndex < 0) {
        clearInterval(unzipTimer);
        isUnzipping = false;
        window.__3D_STATE__.isUnzipping = false;
        return;
      }

      const pair = basePairs[currentIndex];
      // Animate to unzipped
      animateUnzip(pair, 0, 1, 200);
      unzipProgress++;
      window.__3D_STATE__.unzipProgress = unzipProgress;
      currentIndex--;

      if (unzipProgress >= NUM_PAIRS) {
        clearInterval(unzipTimer);
        setTimeout(() => {
          isUnzipping = false;
          window.__3D_STATE__.isUnzipping = false;
        }, 200);
      }
    }, 300);
  });

  // Rezip button
  document.getElementById('rezipBtn').addEventListener('click', function() {
    if (isUnzipping || isRezipping) return;
    if (unzipProgress <= 0) return;

    isRezipping = true;
    window.__3D_STATE__.isRezipping = true;

    let currentIndex = NUM_PAIRS - unzipProgress;

    unzipTimer = setInterval(function() {
      if (currentIndex >= NUM_PAIRS) {
        clearInterval(unzipTimer);
        isRezipping = false;
        window.__3D_STATE__.isRezipping = false;
        return;
      }

      const pair = basePairs[currentIndex];
      animateUnzip(pair, 1, 0, 200);
      unzipProgress--;
      window.__3D_STATE__.unzipProgress = unzipProgress;
      currentIndex++;

      if (unzipProgress <= 0) {
        clearInterval(unzipTimer);
        setTimeout(() => {
          isRezipping = false;
          window.__3D_STATE__.isRezipping = false;
        }, 200);
      }
    }, 300);
  });

  function animateUnzip(pair, fromFactor, toFactor, duration) {
    const startTime = performance.now();
    function step(time) {
      const elapsed = time - startTime;
      const t = Math.min(elapsed / duration, 1);
      const eased = t * t * (3 - 2 * t); // smoothstep
      const factor = fromFactor + (toFactor - fromFactor) * eased;
      updateBasePairVisuals(pair, factor);
      updateConnectors();
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // Speed slider
  const speedSlider = document.getElementById('speedSlider');
  speedSlider.addEventListener('input', function() {
    window.__3D_STATE__.rotationSpeed = parseFloat(this.value);
  });

  // Save state
  document.getElementById('saveBtn').addEventListener('click', function() {
    const state = {
      unzipProgress: unzipProgress,
      rotationAngle: rotationAngle,
      isAnimating: isUnzipping || isRezipping
    };
    const json = JSON.stringify(state);
    localStorage.setItem('dna_save_state', json);
    window.__3D_STATE__.savedState = state;

    const status = document.getElementById('saveStatus');
    status.textContent = 'State Saved!';
    status.classList.add('visible');
    setTimeout(() => status.classList.remove('visible'), 2000);
  });

  // Load state
  document.getElementById('loadBtn').addEventListener('click', function() {
    const json = localStorage.getItem('dna_save_state');
    if (!json) return;

    const state = JSON.parse(json);

    // Stop any ongoing animations
    if (unzipTimer) {
      clearInterval(unzipTimer);
      isUnzipping = false;
      isRezipping = false;
      window.__3D_STATE__.isUnzipping = false;
      window.__3D_STATE__.isRezipping = false;
    }

    // Restore rotation
    rotationAngle = state.rotationAngle;
    dnaGroup.rotation.y = rotationAngle;

    // Restore unzip progress
    unzipProgress = state.unzipProgress;
    window.__3D_STATE__.unzipProgress = unzipProgress;

    // Update all base pairs instantly
    for (let i = 0; i < NUM_PAIRS; i++) {
      const pair = basePairs[i];
      // Pairs from index (NUM_PAIRS - unzipProgress) to (NUM_PAIRS - 1) are unzipped
      const unzipStartIndex = NUM_PAIRS - unzipProgress;
      if (i >= unzipStartIndex) {
        updateBasePairVisuals(pair, 1);
      } else {
        updateBasePairVisuals(pair, 0);
      }
    }
    updateConnectors();

    const status = document.getElementById('saveStatus');
    status.textContent = 'State Loaded!';
    status.classList.add('visible');
    setTimeout(() => status.classList.remove('visible'), 2000);
  });

  // Add some particles for atmosphere
  const particleCount = 200;
  const particleGeom = new THREE.BufferGeometry();
  const particlePositions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 60;
    particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 40;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
  }
  particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
  const particleMat = new THREE.PointsMaterial({
    color: 0x6666aa,
    size: 0.15,
    transparent: true,
    opacity: 0.6
  });
  const particles = new THREE.Points(particleGeom, particleMat);
  scene.add(particles);

  // Animation loop
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const speed = parseFloat(speedSlider.value);

    // Rotate DNA if not unzipping/rezipping
    if (!isUnzipping && !isRezipping) {
      rotationAngle += 0.3 * speed * delta;
      dnaGroup.rotation.y = rotationAngle;
    }

    // Rotate particles slowly
    particles.rotation.y += 0.02 * delta;

    controls.update();

    // Update state
    window.__3D_STATE__.rotationAngle = rotationAngle;
    window.__3D_STATE__.rotationSpeed = speed;
    window.__3D_STATE__.unzipProgress = unzipProgress;
    window.__3D_STATE__.isUnzipping = isUnzipping;
    window.__3D_STATE__.isRezipping = isRezipping;

    // Update strand positions and bond opacities in state
    for (let i = 0; i < NUM_PAIRS; i++) {
      const pair = basePairs[i];

      // Get world positions
      const worldPosA = new THREE.Vector3();
      pair.sphereA.getWorldPosition(worldPosA);
      window.__3D_STATE__.strandAPositions[i] = { x: worldPosA.x, y: worldPosA.y, z: worldPosA.z };

      const worldPosB = new THREE.Vector3();
      pair.sphereB.getWorldPosition(worldPosB);
      window.__3D_STATE__.strandBPositions[i] = { x: worldPosB.x, y: worldPosB.y, z: worldPosB.z };

      window.__3D_STATE__.bondOpacities[i] = pair.bondMat.opacity;
    }

    // Update HUD
    document.getElementById('infoUnzip').textContent = unzipProgress + '/20';
    document.getElementById('infoRotation').textContent = (rotationAngle * 180 / Math.PI % 360).toFixed(1) + '°';
    document.getElementById('infoSpeed').textContent = speed.toFixed(1) + 'x';

    renderer.render(scene, camera);
  }

  animate();

  // Handle resize
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
