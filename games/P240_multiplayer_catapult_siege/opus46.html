<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Catapult Siege Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }
canvas { display: block; }

#hud-top-left {
    position: absolute; top: 15px; left: 15px;
    color: #fff; font-size: 18px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 8px;
}
#hud-top-right {
    position: absolute; top: 15px; right: 15px;
    text-align: right; font-size: 18px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 8px;
}
#hud-bottom {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 16px; text-align: center;
    background: rgba(0,0,0,0.6); padding: 12px 20px; border-radius: 8px;
    display: flex; gap: 20px; align-items: center;
}
.hp-bar-container {
    width: 150px; height: 14px; background: #333; border-radius: 7px; overflow: hidden; margin-top: 4px;
}
.hp-bar {
    height: 100%; border-radius: 7px; transition: width 0.5s ease;
}
.hp-bar-a { background: linear-gradient(90deg, #2244aa, #4488ff); }
.hp-bar-b { background: linear-gradient(90deg, #aa2244, #ff4488); }

#fire-btn {
    padding: 8px 24px; font-size: 18px; font-weight: bold;
    background: linear-gradient(180deg, #ff6600, #cc4400); color: #fff;
    border: 2px solid #ff8800; border-radius: 8px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 2px;
}
#fire-btn:hover { background: linear-gradient(180deg, #ff8800, #ee5500); }
#fire-btn:disabled { background: #666; border-color: #888; cursor: not-allowed; }

#reset-btn {
    position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
    padding: 6px 16px; font-size: 14px; background: #555; color: #fff;
    border: 1px solid #888; border-radius: 6px; cursor: pointer;
}
#reset-btn:hover { background: #777; }

#game-over-overlay {
    display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75); justify-content: center; align-items: center;
    flex-direction: column; z-index: 100;
}
#game-over-overlay.show { display: flex; }
#game-over-overlay h1 { font-size: 48px; color: #ffd700; margin-bottom: 20px; text-shadow: 2px 2px 6px #000; }
#game-over-overlay p { font-size: 24px; color: #fff; margin-bottom: 30px; }
#game-over-overlay button {
    padding: 12px 30px; font-size: 20px; background: #ff6600; color: #fff;
    border: none; border-radius: 8px; cursor: pointer;
}

#shot-result {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 36px; font-weight: bold; color: #fff; text-shadow: 2px 2px 6px #000;
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
#shot-result.show { opacity: 1; }

.control-item { display: flex; flex-direction: column; align-items: center; }
.control-label { font-size: 12px; color: #aaa; margin-bottom: 2px; }
.control-value { font-size: 20px; font-weight: bold; }
.control-keys { font-size: 11px; color: #888; margin-top: 2px; }
</style>
</head>
<body>

<div id="hud-top-left">
    <div id="turn-display">Turn: Player 1</div>
    <div id="round-display">Round: 1</div>
    <div id="shots-display" style="font-size:13px;color:#aaa;margin-top:4px;">Shots: 0</div>
</div>

<div id="hud-top-right">
    <div style="color:#4488ff;margin-bottom:6px;">
        Castle A HP: <span id="hp-a">100</span>
        <div class="hp-bar-container"><div class="hp-bar hp-bar-a" id="hp-bar-a" style="width:100%"></div></div>
    </div>
    <div style="color:#ff4488;">
        Castle B HP: <span id="hp-b">100</span>
        <div class="hp-bar-container"><div class="hp-bar hp-bar-b" id="hp-bar-b" style="width:100%"></div></div>
    </div>
</div>

<div id="hud-bottom">
    <div class="control-item">
        <span class="control-label">Angle</span>
        <span class="control-value" id="angle-display">45°</span>
        <span class="control-keys">[A/D]</span>
    </div>
    <div class="control-item">
        <span class="control-label">Power</span>
        <span class="control-value" id="power-display">30</span>
        <span class="control-keys">[W/S]</span>
    </div>
    <div class="control-item">
        <span class="control-label">Lateral</span>
        <span class="control-value" id="lateral-display">0</span>
        <span class="control-keys">[Q/E]</span>
    </div>
    <button id="fire-btn">FIRE</button>
</div>

<button id="reset-btn">Reset Game</button>

<div id="game-over-overlay">
    <h1 id="winner-text">Player 1 Wins!</h1>
    <p id="winner-sub">The castle has been destroyed!</p>
    <button onclick="resetGame()">Play Again</button>
</div>

<div id="shot-result"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ STATE ============
const catapultAPos = { x: -20, y: 0, z: 0 };
const catapultBPos = { x: 20, y: 0, z: 0 };
const castleAPos = { x: -30, y: 3, z: 0 };
const castleBPos = { x: 30, y: 3, z: 0 };

window.__3D_STATE__ = {
    currentPlayer: 1,
    round: 1,
    castleAHP: 100,
    castleBHP: 100,
    angle: 45,
    power: 30,
    lateral: 0,
    projectileInFlight: false,
    lastShotResult: 'none',
    lastDamage: 0,
    totalShotsFired: 0,
    gameOver: false,
    winner: 0,
    projectilePosition: null,
    catapultAPosition: { ...catapultAPos },
    catapultBPosition: { ...catapultBPos },
    castleAPosition: { ...castleAPos },
    castleBPosition: { ...castleBPos },
    modelLoaded: false
};

const state = window.__3D_STATE__;

// ============ SCENE ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 60, 120);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 10;
controls.maxDistance = 80;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 80;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a7d2c });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// ============ CASTLES ============
function createCastle(x, color) {
    const group = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color });

    // Main wall
    const wallGeo = new THREE.BoxGeometry(8, 6, 3);
    const wall = new THREE.Mesh(wallGeo, mat);
    wall.position.set(0, 3, 0);
    wall.castShadow = true;
    wall.receiveShadow = true;
    group.add(wall);

    // Towers
    const towerGeo = new THREE.BoxGeometry(2, 8, 2);
    const tower1 = new THREE.Mesh(towerGeo, mat);
    tower1.position.set(-5, 4, 0);
    tower1.castShadow = true;
    tower1.receiveShadow = true;
    group.add(tower1);

    const tower2 = new THREE.Mesh(towerGeo, mat);
    tower2.position.set(5, 4, 0);
    tower2.castShadow = true;
    tower2.receiveShadow = true;
    group.add(tower2);

    // Battlements on towers
    const battGeo = new THREE.BoxGeometry(2.5, 1, 2.5);
    const batt1 = new THREE.Mesh(battGeo, mat);
    batt1.position.set(-5, 8.5, 0);
    batt1.castShadow = true;
    group.add(batt1);

    const batt2 = new THREE.Mesh(battGeo, mat);
    batt2.position.set(5, 8.5, 0);
    batt2.castShadow = true;
    group.add(batt2);

    // Flag pole
    const poleGeo = new THREE.CylinderGeometry(0.05, 0.05, 3);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.set(0, 7.5, 0);
    group.add(pole);

    // Flag
    const flagGeo = new THREE.PlaneGeometry(1.5, 1);
    const flagMat = new THREE.MeshStandardMaterial({ color, side: THREE.DoubleSide });
    const flag = new THREE.Mesh(flagGeo, flagMat);
    flag.position.set(0.75, 8.5, 0);
    group.add(flag);

    group.position.set(x, 0, 0);
    scene.add(group);
    return group;
}

const castleA = createCastle(-30, 0x2244aa);
const castleB = createCastle(30, 0xaa2244);

// ============ CATAPULTS ============
function createCatapult(x) {
    const group = new THREE.Group();

    // Base
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const baseGeo = new THREE.BoxGeometry(2, 1, 2);
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.position.set(0, 0.5, 0);
    base.castShadow = true;
    group.add(base);

    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.2, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
    for (let wz of [-1.1, 1.1]) {
        for (let wx of [-0.7, 0.7]) {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.x = Math.PI / 2;
            wheel.position.set(wx, 0.4, wz);
            group.add(wheel);
        }
    }

    // Pivot point
    const pivotGeo = new THREE.CylinderGeometry(0.15, 0.15, 2.2, 8);
    const pivotMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
    const pivot = new THREE.Mesh(pivotGeo, pivotMat);
    pivot.rotation.x = Math.PI / 2;
    pivot.position.set(0, 1.2, 0);
    group.add(pivot);

    // Arm (pivoting)
    const armGroup = new THREE.Group();
    armGroup.position.set(0, 1.2, 0);

    const armGeo = new THREE.CylinderGeometry(0.15, 0.15, 4, 8);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const arm = new THREE.Mesh(armGeo, armMat);
    arm.position.set(0, 2, 0);
    arm.castShadow = true;
    armGroup.add(arm);

    // Bucket at the tip
    const bucketGeo = new THREE.BoxGeometry(0.6, 0.3, 0.6);
    const bucketMat = new THREE.MeshStandardMaterial({ color: 0x654321 });
    const bucket = new THREE.Mesh(bucketGeo, bucketMat);
    bucket.position.set(0, 4, 0);
    armGroup.add(bucket);

    group.add(armGroup);
    group.position.set(x, 0, 0);
    scene.add(group);

    return { group, armGroup };
}

const catapultA = createCatapult(-20);
const catapultB = createCatapult(20);

// ============ LOAD MODEL ============
let coffeematModel = null;
const loader = new GLTFLoader();

loader.load('coffeemat.glb', (gltf) => {
    coffeematModel = gltf.scene;
    coffeematModel.scale.set(0.5, 0.5, 0.5);
    coffeematModel.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
        }
    });
    state.modelLoaded = true;
    console.log('coffeemat.glb loaded successfully');
}, undefined, (error) => {
    console.warn('Could not load coffeemat.glb, using fallback sphere:', error);
    // Create fallback
    const fallbackGeo = new THREE.SphereGeometry(0.4, 16, 16);
    const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x6F4E37 });
    coffeematModel = new THREE.Mesh(fallbackGeo, fallbackMat);
    coffeematModel.castShadow = true;
    state.modelLoaded = true;
});

// ============ PROJECTILE ============
let activeProjectile = null;
let projVelocity = { x: 0, y: 0, z: 0 };
const GRAVITY = 9.8;
const DT = 0.016;

function getCatapultTip(playerNum) {
    const catapult = playerNum === 1 ? catapultA : catapultB;
    const angle = state.angle * Math.PI / 180;
    const direction = playerNum === 1 ? 1 : -1;
    const baseX = playerNum === 1 ? -20 : 20;
    const tipLength = 4;
    return {
        x: baseX + Math.cos(angle) * tipLength * direction * 0.3,
        y: 1.2 + Math.sin(angle) * tipLength,
        z: 0
    };
}

function fireProjectile() {
    if (state.projectileInFlight || state.gameOver || !coffeematModel) return;

    state.projectileInFlight = true;
    state.totalShotsFired++;

    const tip = getCatapultTip(state.currentPlayer);
    const direction = state.currentPlayer === 1 ? 1 : -1;
    const angleRad = state.angle * Math.PI / 180;

    projVelocity.x = state.power * Math.cos(angleRad) * direction;
    projVelocity.y = state.power * Math.sin(angleRad);
    projVelocity.z = state.lateral * 0.5;

    // Clone model
    if (coffeematModel.isGroup || coffeematModel.isObject3D) {
        activeProjectile = coffeematModel.clone();
    } else {
        activeProjectile = coffeematModel.clone();
    }
    activeProjectile.position.set(tip.x, tip.y, tip.z);
    scene.add(activeProjectile);

    state.projectilePosition = { x: tip.x, y: tip.y, z: tip.z };

    // Add trail
    trailPoints = [];

    updateHUD();
}

// Trail
let trailPoints = [];
let trailLine = null;

function updateTrail(pos) {
    trailPoints.push(new THREE.Vector3(pos.x, pos.y, pos.z));
    if (trailPoints.length > 200) trailPoints.shift();

    if (trailLine) scene.remove(trailLine);
    if (trailPoints.length > 1) {
        const geo = new THREE.BufferGeometry().setFromPoints(trailPoints);
        const mat = new THREE.LineBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.6 });
        trailLine = new THREE.Line(geo, mat);
        scene.add(trailLine);
    }
}

function clearTrail() {
    if (trailLine) {
        scene.remove(trailLine);
        trailLine = null;
    }
    trailPoints = [];
}

// ============ COLLISION ============
function checkCollision(pos) {
    const targetCastle = state.currentPlayer === 1 ? castleBPos : castleAPos;
    const dx = pos.x - targetCastle.x;
    const dy = pos.y - targetCastle.y;
    const dz = pos.z - targetCastle.z;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    return dist < 4;
}

function onHit() {
    const damage = Math.floor(state.power * 0.6);
    state.lastDamage = damage;
    state.lastShotResult = 'hit';

    if (state.currentPlayer === 1) {
        state.castleBHP = Math.max(0, state.castleBHP - damage);
    } else {
        state.castleAHP = Math.max(0, state.castleAHP - damage);
    }

    showShotResult(`HIT! -${damage} HP`, '#ff4444');
    createExplosion(activeProjectile.position.clone());

    // Check game over
    if (state.castleAHP <= 0) {
        state.gameOver = true;
        state.winner = 2;
    } else if (state.castleBHP <= 0) {
        state.gameOver = true;
        state.winner = 1;
    }

    endTurn();
}

function onMiss() {
    state.lastShotResult = 'miss';
    state.lastDamage = 0;
    showShotResult('MISS!', '#ffaa00');
    createDustPuff(activeProjectile.position.clone());
    endTurn();
}

function endTurn() {
    if (activeProjectile) {
        scene.remove(activeProjectile);
        activeProjectile = null;
    }
    state.projectileInFlight = false;
    state.projectilePosition = null;

    setTimeout(() => {
        clearTrail();
    }, 1000);

    if (state.gameOver) {
        showGameOver();
        return;
    }

    // Switch player
    if (state.currentPlayer === 1) {
        state.currentPlayer = 2;
    } else {
        state.currentPlayer = 1;
        state.round++;
    }

    // Reset controls for new player
    state.angle = 45;
    state.power = 30;
    state.lateral = 0;

    updateHUD();
}

// ============ PARTICLES ============
let particles = [];

function createExplosion(pos) {
    const count = 30;
    for (let i = 0; i < count; i++) {
        const geo = new THREE.SphereGeometry(0.15, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(0.05 + Math.random() * 0.1, 1, 0.5) });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(pos);
        scene.add(mesh);
        particles.push({
            mesh,
            vel: new THREE.Vector3((Math.random() - 0.5) * 8, Math.random() * 8, (Math.random() - 0.5) * 8),
            life: 1.0
        });
    }
}

function createDustPuff(pos) {
    const count = 15;
    for (let i = 0; i < count; i++) {
        const geo = new THREE.SphereGeometry(0.2, 6, 6);
        const mat = new THREE.MeshBasicMaterial({ color: 0x886644, transparent: true });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(pos);
        mesh.position.y = Math.max(0.2, mesh.position.y);
        scene.add(mesh);
        particles.push({
            mesh,
            vel: new THREE.Vector3((Math.random() - 0.5) * 3, Math.random() * 3, (Math.random() - 0.5) * 3),
            life: 0.8
        });
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        if (p.life <= 0) {
            scene.remove(p.mesh);
            particles.splice(i, 1);
            continue;
        }
        p.vel.y -= 9.8 * dt;
        p.mesh.position.addScaledVector(p.vel, dt);
        p.mesh.material.opacity = p.life;
        p.mesh.scale.setScalar(p.life);
    }
}

// ============ HUD ============
function updateHUD() {
    document.getElementById('turn-display').textContent = `Turn: Player ${state.currentPlayer}`;
    document.getElementById('turn-display').style.color = state.currentPlayer === 1 ? '#4488ff' : '#ff4488';
    document.getElementById('round-display').textContent = `Round: ${state.round}`;
    document.getElementById('shots-display').textContent = `Shots: ${state.totalShotsFired}`;

    document.getElementById('hp-a').textContent = state.castleAHP;
    document.getElementById('hp-b').textContent = state.castleBHP;
    document.getElementById('hp-bar-a').style.width = `${state.castleAHP}%`;
    document.getElementById('hp-bar-b').style.width = `${state.castleBHP}%`;

    document.getElementById('angle-display').textContent = `${state.angle}°`;
    document.getElementById('power-display').textContent = state.power;
    document.getElementById('lateral-display').textContent = state.lateral;

    document.getElementById('fire-btn').disabled = state.projectileInFlight || state.gameOver;
}

function showShotResult(text, color) {
    const el = document.getElementById('shot-result');
    el.textContent = text;
    el.style.color = color;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
}

function showGameOver() {
    const overlay = document.getElementById('game-over-overlay');
    overlay.classList.add('show');
    const winnerColor = state.winner === 1 ? '#4488ff' : '#ff4488';
    document.getElementById('winner-text').textContent = `Player ${state.winner} Wins!`;
    document.getElementById('winner-text').style.color = winnerColor;
    document.getElementById('winner-sub').textContent = `Castle ${state.winner === 1 ? 'B' : 'A'} has been destroyed!`;
}

// ============ RESET ============
window.resetGame = function() {
    state.currentPlayer = 1;
    state.round = 1;
    state.castleAHP = 100;
    state.castleBHP = 100;
    state.angle = 45;
    state.power = 30;
    state.lateral = 0;
    state.projectileInFlight = false;
    state.lastShotResult = 'none';
    state.lastDamage = 0;
    state.totalShotsFired = 0;
    state.gameOver = false;
    state.winner = 0;
    state.projectilePosition = null;

    if (activeProjectile) {
        scene.remove(activeProjectile);
        activeProjectile = null;
    }
    clearTrail();

    // Clear particles
    particles.forEach(p => scene.remove(p.mesh));
    particles = [];

    document.getElementById('game-over-overlay').classList.remove('show');
    updateHUD();
};

// ============ CONTROLS ============
document.addEventListener('keydown', (e) => {
    if (state.projectileInFlight || state.gameOver) return;

    switch (e.key.toLowerCase()) {
        case 'a':
            state.angle = Math.max(20, state.angle - 1);
            break;
        case 'd':
            state.angle = Math.min(75, state.angle + 1);
            break;
        case 'w':
            state.power = Math.min(50, state.power + 2);
            break;
        case 's':
            state.power = Math.max(10, state.power - 2);
            break;
        case 'q':
            state.lateral = Math.max(-10, state.lateral - 1);
            break;
        case 'e':
            state.lateral = Math.min(10, state.lateral + 1);
            break;
        case ' ':
            e.preventDefault();
            fireProjectile();
            break;
    }
    updateHUD();
});

document.getElementById('fire-btn').addEventListener('click', fireProjectile);
document.getElementById('reset-btn').addEventListener('click', window.resetGame);

// ============ CATAPULT ARM ANIMATION ============
function updateCatapultArms() {
    const activeAngleRad = state.angle * Math.PI / 180;
    const restAngle = 10 * Math.PI / 180;

    // Player 1 catapult
    if (state.currentPlayer === 1 && !state.projectileInFlight) {
        catapultA.armGroup.rotation.z = -(Math.PI / 2 - activeAngleRad);
    } else {
        catapultA.armGroup.rotation.z = -(Math.PI / 2 - restAngle);
    }

    // Player 2 catapult
    if (state.currentPlayer === 2 && !state.projectileInFlight) {
        catapultB.armGroup.rotation.z = (Math.PI / 2 - activeAngleRad);
    } else {
        catapultB.armGroup.rotation.z = (Math.PI / 2 - restAngle);
    }

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    controls.update();

    // Update projectile
    if (state.projectileInFlight && activeProjectile) {
        projVelocity.y -= GRAVITY * DT;
        activeProjectile.position.x += projVelocity.x * DT;
        activeProjectile.position.y += projVelocity.y * DT;
        activeProjectile.position.z += projVelocity.z * DT;

        // Rotate projectile for visual effect
        activeProjectile.rotation.x += dt * 3;
        activeProjectile.rotation.z += dt * 2;

        state.projectilePosition = {
            x: activeProjectile.position.x,
            y: activeProjectile.position.y,
            z: activeProjectile.position.z
        };

        updateTrail(activeProjectile.position);

        // Check collision with enemy castle
        if (checkCollision(activeProjectile.position)) {
            onHit();
        }
        // Check if landed
        else if (activeProjectile.position.y <= 0) {
            onMiss();
        }
        // Check if out of bounds
        else if (Math.abs(activeProjectile.position.x) > 60 || Math.abs(activeProjectile.position.z) > 60) {
            onMiss();
        }
    }

    // Update catapult arms
    updateCatapultArms();

    // Update particles
    updateParticles(dt);

    // Animate active player indicator
    const time = clock.elapsedTime;
    const bobY = Math.sin(time * 3) * 0.3;
    indicatorA.position.y = 5 + bobY;
    indicatorB.position.y = 5 + bobY;
    indicatorA.visible = state.currentPlayer === 1 && !state.gameOver;
    indicatorB.visible = state.currentPlayer === 2 && !state.gameOver;

    // Castle damage visual (darken based on damage)
    const aDamageRatio = 1 - state.castleAHP / 100;
    const bDamageRatio = 1 - state.castleBHP / 100;

        if (child.material && child.material.color) {

        }
    });

    renderer.render(scene, camera);
}
