<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer Catapult Siege</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            pointer-events: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .top-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .bottom-hud {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
        }
        .stats-group {
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .hp-blue { color: #6688ff; }
        .hp-red { color: #ff6688; }
        .controls-info {
            font-size: 14px;
            color: #ccc;
            margin-top: 10px;
        }
        .btn {
            background: #f39c12;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
            transition: background 0.2s;
        }
        .btn:hover { background: #e67e22; }
        .btn:active { background: #d35400; }
        .btn:disabled { background: #7f8c8d; cursor: not-allowed; }
        
        #game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            pointer-events: auto;
        }
        #winner-text {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div class="top-hud">
            <div class="hud-panel">
                <div id="turn-display" style="font-size: 24px; font-weight: bold; margin-bottom: 5px;">Turn: Player 1</div>
                <div id="round-display" style="font-size: 18px;">Round: 1</div>
                <div class="controls-info">
                    A/D: Angle | W/S: Power | Q/E: Lateral<br>Space: Fire
                </div>
            </div>
            <div class="hud-panel">
                <div style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">Castle HP</div>
                <div class="stats-group">
                    <div id="hp-a" class="hp-blue">Castle A: 100</div>
                    <div id="hp-b" class="hp-red">Castle B: 100</div>
                </div>
                <div style="margin-top: 15px; text-align: right;">
                    <button id="reset-btn" class="btn" style="background: #e74c3c; font-size: 14px;">Reset Game</button>
                </div>
            </div>
        </div>
        
        <div class="bottom-hud">
            <div class="hud-panel stats-group">
                <div id="angle-display">Angle: 45°</div>
                <div id="power-display">Power: 30</div>
                <div id="lateral-display">Lateral: 0</div>
            </div>
            <button id="fire-btn" class="btn">FIRE</button>
        </div>
    </div>

    <div id="game-over-overlay">
        <div id="winner-text">Player X Wins!</div>
        <button id="overlay-reset-btn" class="btn">Play Again</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentPlayer: 1,
            round: 1,
            castleAHP: 100,
            castleBHP: 100,
            angle: 45,
            power: 30,
            lateral: 0,
            projectileInFlight: false,
            lastShotResult: 'none',
            lastDamage: 0,
            totalShotsFired: 0,
            gameOver: false,
            winner: 0,
            projectilePosition: null,
            catapultAPosition: { x: -20, y: 0, z: 0 },
            catapultBPosition: { x: 20, y: 0, z: 0 },
            castleAPosition: { x: -30, y: 3, z: 0 },
            castleBPosition: { x: 30, y: 3, z: 0 },
            modelLoaded: false
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 40, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x3a7d2c });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Object Creation ---
        function createCastle(color, xPos) {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: color });

            // Main Wall (width=8, height=6, depth=3)
            const wallGeo = new THREE.BoxGeometry(8, 6, 3);
            const wall = new THREE.Mesh(wallGeo, mat);
            wall.position.y = 3;
            wall.castShadow = true;
            wall.receiveShadow = true;
            group.add(wall);

            // Towers (width=2, height=8, depth=2)
            const towerGeo = new THREE.BoxGeometry(2, 8, 2);
            
            const tower1 = new THREE.Mesh(towerGeo, mat);
            tower1.position.set(0, 4, 2.5);
            tower1.castShadow = true;
            tower1.receiveShadow = true;
            group.add(tower1);

            const tower2 = new THREE.Mesh(towerGeo, mat);
            tower2.position.set(0, 4, -2.5);
            tower2.castShadow = true;
            tower2.receiveShadow = true;
            group.add(tower2);

            group.position.set(xPos, 0, 0);
            scene.add(group);
            return group;
        }

        const castleA = createCastle(0x2244aa, state.castleAPosition.x);
        const castleB = createCastle(0xaa2244, state.castleBPosition.x);

        function createCatapult(xPos) {
            const group = new THREE.Group();

            // Base (2x1x2)
            const baseGeo = new THREE.BoxGeometry(2, 1, 2);
            const baseMat = new THREE.MeshLambertMaterial({ color: 0x5c4033 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 0.5;
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);

            // Arm Pivot Group
            const armGroup = new THREE.Group();
            armGroup.position.y = 1; // Top of base
            armGroup.name = 'armGroup';

            // Arm (cylinder radius=0.15 length=4)
            const armGeo = new THREE.CylinderGeometry(0.15, 0.15, 4);
            const armMat = new THREE.MeshLambertMaterial({ color: 0x8b5a2b });
            const arm = new THREE.Mesh(armGeo, armMat);
            arm.position.y = 2; // Shift up so pivot is at bottom
            arm.castShadow = true;
            armGroup.add(arm);

            // Tip marker (invisible, used for spawn pos)
            const tip = new THREE.Object3D();
            tip.position.y = 4;
            tip.name = 'tip';
            armGroup.add(tip);

            group.add(armGroup);
            group.position.set(xPos, 0, 0);
            scene.add(group);
            return group;
        }

        const catapultA = createCatapult(state.catapultAPosition.x);
        const catapultB = createCatapult(state.catapultBPosition.x);

        // --- Asset Loading ---
        let projectileModel = null;
        const loader = new GLTFLoader();
        
        // Fallback geometry in case loading fails
        const fallbackGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const fallbackMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
        projectileModel = new THREE.Mesh(fallbackGeo, fallbackMat);
        projectileModel.castShadow = true;

        loader.load('coffeemat.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            
            // Enable shadows for all meshes in the model
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            projectileModel = model;
            state.modelLoaded = true;
            console.log('coffeemat.glb loaded successfully.');
        }, undefined, (error) => {
            console.warn('Failed to load coffeemat.glb, using fallback sphere.', error);
            state.modelLoaded = true; // Set true anyway to allow gameplay
        });

        // --- Game Logic & Physics ---
        let activeProjectile = null;
        let projVelocity = new THREE.Vector3();
        const gravity = 9.8;
        const dt = 0.016; // Fixed timestep for physics

        function updateCatapultArms() {
            const armA = catapultA.getObjectByName('armGroup');
            const armB = catapultB.getObjectByName('armGroup');

            // Reset to default vertical
            armA.rotation.z = 0;
            armB.rotation.z = 0;

            if (state.currentPlayer === 1) {
                // P1 shoots +x. Angle 0 is horizontal (+x). Angle 90 is vertical (+y).
                armA.rotation.z = -THREE.MathUtils.degToRad(90 - state.angle);
            } else {
                // P2 shoots -x. Angle 0 is horizontal (-x). Angle 90 is vertical (+y).
                armB.rotation.z = THREE.MathUtils.degToRad(90 - state.angle);
            }
        }

        function updateUI() {
            document.getElementById('turn-display').innerText = `Turn: Player ${state.currentPlayer}`;
            document.getElementById('turn-display').style.color = state.currentPlayer === 1 ? '#6688ff' : '#ff6688';
            document.getElementById('round-display').innerText = `Round: ${state.round}`;
            
            document.getElementById('hp-a').innerText = `Castle A: ${state.castleAHP}`;
            document.getElementById('hp-b').innerText = `Castle B: ${state.castleBHP}`;
            
            document.getElementById('angle-display').innerText = `Angle: ${state.angle}°`;
            document.getElementById('power-display').innerText = `Power: ${state.power}`;
            document.getElementById('lateral-display').innerText = `Lateral: ${state.lateral}`;

            const fireBtn = document.getElementById('fire-btn');
            if (state.projectileInFlight || state.gameOver) {
                fireBtn.disabled = true;
            } else {
                fireBtn.disabled = false;
            }

            if (state.gameOver) {
                const overlay = document.getElementById('game-over-overlay');
                overlay.style.display = 'flex';
                const winnerText = document.getElementById('winner-text');
                winnerText.innerText = `Player ${state.winner} Wins!`;
                winnerText.style.color = state.winner === 1 ? '#6688ff' : '#ff6688';
            } else {
                document.getElementById('game-over-overlay').style.display = 'none';
            }
        }

        function fire() {
            if (state.projectileInFlight || state.gameOver) return;

            state.projectileInFlight = true;
            state.totalShotsFired++;
            state.lastShotResult = 'none';
            state.lastDamage = 0;

            // Clone projectile
            activeProjectile = projectileModel.clone();
            scene.add(activeProjectile);

            // Set initial position to catapult tip
            const activeCatapult = state.currentPlayer === 1 ? catapultA : catapultB;
            const armGroup = activeCatapult.getObjectByName('armGroup');
            const tip = armGroup.getObjectByName('tip');
            
            const spawnPos = new THREE.Vector3();
            tip.getWorldPosition(spawnPos);
            activeProjectile.position.copy(spawnPos);
            state.projectilePosition = { x: spawnPos.x, y: spawnPos.y, z: spawnPos.z };

            // Calculate velocity
            const dir = state.currentPlayer === 1 ? 1 : -1;
            const rad = THREE.MathUtils.degToRad(state.angle);
            
            projVelocity.x = state.power * Math.cos(rad) * dir;
            projVelocity.y = state.power * Math.sin(rad);
            projVelocity.z = state.lateral * 0.5;

            updateUI();
        }

        function endTurn(result, damage) {
            state.lastShotResult = result;
            state.lastDamage = damage;

            if (activeProjectile) {
                scene.remove(activeProjectile);
                activeProjectile = null;
            }

            state.projectileInFlight = false;
            state.projectilePosition = null;

            // Apply damage
            if (result === 'hit') {
                if (state.currentPlayer === 1) {
                    state.castleBHP = Math.max(0, state.castleBHP - damage);
                } else {
                    state.castleAHP = Math.max(0, state.castleAHP - damage);
                }
            }

            // Check win condition
            if (state.castleAHP <= 0) {
                state.gameOver = true;
                state.winner = 2;
            } else if (state.castleBHP <= 0) {
                state.gameOver = true;
                state.winner = 1;
            }

            if (!state.gameOver) {
                // Switch turn
                if (state.currentPlayer === 1) {
                    state.currentPlayer = 2;
                } else {
                    state.currentPlayer = 1;
                    state.round++;
                }

                // Reset aim
                state.angle = 45;
                state.power = 30;
                state.lateral = 0;
                updateCatapultArms();
            }

            updateUI();
        }

        function resetGame() {
            state.currentPlayer = 1;
            state.round = 1;
            state.castleAHP = 100;
            state.castleBHP = 100;
            state.angle = 45;
            state.power = 30;
            state.lateral = 0;
            state.projectileInFlight = false;
            state.lastShotResult = 'none';
            state.lastDamage = 0;
            state.totalShotsFired = 0;
            state.gameOver = false;
            state.winner = 0;
            state.projectilePosition = null;

            if (activeProjectile) {
                scene.remove(activeProjectile);
                activeProjectile = null;
            }

            updateCatapultArms();
            updateUI();
        }

        // --- Controls ---
        window.addEventListener('keydown', (e) => {
            if (state.projectileInFlight || state.gameOver) return;

            let changed = false;
            switch (e.key.toLowerCase()) {
                case 'a':
                    state.angle = Math.max(20, state.angle - 1);
                    changed = true;
                    break;
                case 'd':
                    state.angle = Math.min(75, state.angle + 1);
                    changed = true;
                    break;
                case 's':
                    state.power = Math.max(10, state.power - 2);
                    changed = true;
                    break;
                case 'w':
                    state.power = Math.min(50, state.power + 2);
                    changed = true;
                    break;
                case 'q':
                    state.lateral = Math.max(-10, state.lateral - 1);
                    changed = true;
                    break;
                case 'e':
                    state.lateral = Math.min(10, state.lateral + 1);
                    changed = true;
                    break;
                case ' ':
                    fire();
                    break;
            }

            if (changed) {
                updateCatapultArms();
                updateUI();
            }
        });

        document.getElementById('fire-btn').addEventListener('click', fire);
        document.getElementById('reset-btn').addEventListener('click', resetGame);
        document.getElementById('overlay-reset-btn').addEventListener('click', resetGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        updateCatapultArms();
        updateUI();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (state.projectileInFlight && activeProjectile) {
                // Physics update
                activeProjectile.position.x += projVelocity.x * dt;
                activeProjectile.position.y += projVelocity.y * dt;
                activeProjectile.position.z += projVelocity.z * dt;
                
                projVelocity.y -= gravity * dt;

                // Add some rotation to projectile for visual effect
                activeProjectile.rotation.x += 0.1;
                activeProjectile.rotation.y += 0.1;

                state.projectilePosition = { 
                    x: activeProjectile.position.x, 
                    y: activeProjectile.position.y, 
                    z: activeProjectile.position.z 
                };

                // Collision Detection
                const targetPos = state.currentPlayer === 1 ? state.castleBPosition : state.castleAPosition;
                const targetCenter = new THREE.Vector3(targetPos.x, targetPos.y, targetPos.z);
                
                const dist = activeProjectile.position.distanceTo(targetCenter);

                if (dist < 4) {
                    // Hit
                    const damage = Math.floor(state.power * 0.6);
                    endTurn('hit', damage);
                } else if (activeProjectile.position.y <= 0) {
                    // Miss (hit ground)
                    endTurn('miss', 0);
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
