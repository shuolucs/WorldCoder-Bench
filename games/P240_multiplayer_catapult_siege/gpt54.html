<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Multiplayer Catapult Siege</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #hud-top-left, #hud-top-right, #hud-bottom-center {
      position: absolute;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 10px 14px;
      border-radius: 8px;
      user-select: none;
    }

    #hud-top-left {
      top: 12px;
      left: 12px;
    }

    #hud-top-right {
      top: 12px;
      right: 12px;
      text-align: right;
    }

    #hud-bottom-center {
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      min-width: 260px;
    }

    #controls-bar {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #f0b400;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      filter: brightness(1.08);
    }

    #reset-btn {
      background: #dddddd;
    }

    #status-line {
      margin-top: 6px;
      font-size: 14px;
      opacity: 0.95;
    }

    #instructions {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
      max-width: 340px;
    }

    #game-over-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      flex-direction: column;
      text-align: center;
    }

    #game-over-text {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .blue {
      color: #66a3ff;
    }

    .red {
      color: #ff6688;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud-top-left"></div>
    <div id="hud-top-right"></div>

    <div id="controls-bar">
      <button id="fire-btn">FIRE</button>
      <button id="reset-btn">Reset Game</button>
    </div>

    <div id="hud-bottom-center"></div>

    <div id="instructions">
      <strong>Controls (active player only):</strong><br>
      A / D = Angle down/up<br>
      W / S = Power up/down<br>
      Q / E = Lateral aim left/right<br>
      Space = Fire
    </div>

    <div id="game-over-overlay">
      <div id="game-over-text">Player 1 Wins!</div>
      <button id="overlay-reset-btn">Play Again</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const container = document.getElementById('game-container');
    const hudTopLeft = document.getElementById('hud-top-left');
    const hudTopRight = document.getElementById('hud-top-right');
    const hudBottomCenter = document.getElementById('hud-bottom-center');
    const fireBtn = document.getElementById('fire-btn');
    const resetBtn = document.getElementById('reset-btn');
    const overlayResetBtn = document.getElementById('overlay-reset-btn');
    const gameOverOverlay = document.getElementById('game-over-overlay');
    const gameOverText = document.getElementById('game-over-text');

    const GRAVITY = 9.8;
    const DT = 0.016;
    const MIN_ANGLE = 20;
    const MAX_ANGLE = 75;
    const MIN_POWER = 10;
    const MAX_POWER = 50;
    const MIN_LATERAL = -10;
    const MAX_LATERAL = 10;

    let scene, camera, renderer, clock;
    let castleA, castleB;
    let catapultA, catapultB;
    let armA, armB;
    let projectileTemplate = null;
    let activeProjectile = null;
    let projectileVelocity = null;

    const castleAPosition = new THREE.Vector3(-30, 3, 0);
    const castleBPosition = new THREE.Vector3(30, 3, 0);
    const catapultAPosition = new THREE.Vector3(-20, 0.5, 0);
    const catapultBPosition = new THREE.Vector3(20, 0.5, 0);

    const gameState = {
      currentPlayer: 1,
      round: 1,
      castleAHP: 100,
      castleBHP: 100,
      angle: 45,
      power: 30,
      lateral: 0,
      projectileInFlight: false,
      lastShotResult: 'none',
      lastDamage: 0,
      totalShotsFired: 0,
      gameOver: false,
      winner: 0,
      projectilePosition: null,
      catapultAPosition: { x: catapultAPosition.x, y: catapultAPosition.y, z: catapultAPosition.z },
      catapultBPosition: { x: catapultBPosition.x, y: catapultBPosition.y, z: catapultBPosition.z },
      castleAPosition: { x: castleAPosition.x, y: castleAPosition.y, z: castleAPosition.z },
      castleBPosition: { x: castleBPosition.x, y: castleBPosition.y, z: castleBPosition.z },
      modelLoaded: false
    };

    window.__3D_STATE__ = gameState;

    function syncState() {
      gameState.projectilePosition = activeProjectile
        ? {
            x: activeProjectile.position.x,
            y: activeProjectile.position.y,
            z: activeProjectile.position.z
          }
        : null;

      window.__3D_STATE__ = {
        ...gameState,
        catapultAPosition: { ...gameState.catapultAPosition },
        catapultBPosition: { ...gameState.catapultBPosition },
        castleAPosition: { ...gameState.castleAPosition },
        castleBPosition: { ...gameState.castleBPosition },
        projectilePosition: gameState.projectilePosition ? { ...gameState.projectilePosition } : null
      };
    }

    function createRenderer() {
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      container.appendChild(renderer.domElement);
    }

    function createScene() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87b8e6);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
      camera.position.set(0, 15, 30);
      camera.lookAt(0, 0, 0);

      clock = new THREE.Clock();

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(10, 20, 10);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(2048, 2048);
      dirLight.shadow.camera.left = -60;
      dirLight.shadow.camera.right = 60;
      dirLight.shadow.camera.top = 60;
      dirLight.shadow.camera.bottom = -60;
      dirLight.shadow.camera.near = 1;
      dirLight.shadow.camera.far = 100;
      scene.add(dirLight);

      const groundGeo = new THREE.PlaneGeometry(100, 100);
      const groundMat = new THREE.MeshStandardMaterial({ color: '#3a7d2c' });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      ground.receiveShadow = true;
      scene.add(ground);

      castleA = createCastle(0x2244aa);
      castleA.position.set(-30, 0, 0);
      scene.add(castleA);

      castleB = createCastle(0xaa2244);
      castleB.position.set(30, 0, 0);
      scene.add(castleB);

      const catapultGroupA = createCatapult(0x2244aa, 1);
      catapultA = catapultGroupA.group;
      armA = catapultGroupA.arm;
      catapultA.position.copy(catapultAPosition);
      scene.add(catapultA);

      const catapultGroupB = createCatapult(0xaa2244, -1);
      catapultB = catapultGroupB.group;
      armB = catapultGroupB.arm;
      catapultB.position.copy(catapultBPosition);
      scene.add(catapultB);

      updateCatapultVisuals();
    }

    function createCastle(color) {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color });

      const wall = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 3), mat);
      wall.position.set(0, 3, 0);
      wall.castShadow = true;
      wall.receiveShadow = true;
      group.add(wall);

      const towerLeft = new THREE.Mesh(new THREE.BoxGeometry(2, 8, 2), mat);
      towerLeft.position.set(-4.5, 4, 0);
      towerLeft.castShadow = true;
      towerLeft.receiveShadow = true;
      group.add(towerLeft);

      const towerRight = new THREE.Mesh(new THREE.BoxGeometry(2, 8, 2), mat);
      towerRight.position.set(4.5, 4, 0);
      towerRight.castShadow = true;
      towerRight.receiveShadow = true;
      group.add(towerRight);

      return group;
    }

    function createCatapult(color, facingDirection) {
      const group = new THREE.Group();

      const woodMat = new THREE.MeshStandardMaterial({ color: 0x6b4f2a });
      const accentMat = new THREE.MeshStandardMaterial({ color });

      const base = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 2), woodMat);
      base.position.set(0, 0, 0);
      base.castShadow = true;
      base.receiveShadow = true;
      group.add(base);

      const side1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, 2), accentMat);
      side1.position.set(-0.8, 0.6, 0);
      side1.castShadow = true;
      group.add(side1);

      const side2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, 2), accentMat);
      side2.position.set(0.8, 0.6, 0);
      side2.castShadow = true;
      group.add(side2);

      const armPivot = new THREE.Group();
      armPivot.position.set(0, 0.8, 0);

      const arm = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, 4, 12),
        woodMat
      );
      arm.rotation.z = Math.PI / 2;
      arm.position.x = facingDirection * 1.7;
      arm.castShadow = true;
      arm.receiveShadow = true;
      armPivot.add(arm);

      const cup = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 12), accentMat);
      cup.scale.set(1.2, 0.5, 1.2);
      cup.position.set(facingDirection * 3.4, 0, 0);
      cup.castShadow = true;
      armPivot.add(cup);

      group.add(armPivot);

      group.userData = {
        armPivot,
        facingDirection
      };

      return { group, arm: armPivot };
    }

    function loadProjectileModel() {
      const loader = new GLTFLoader();
      loader.load(
        'coffeemat.glb',
        (gltf) => {
          projectileTemplate = gltf.scene;
          projectileTemplate.scale.set(0.5, 0.5, 0.5);
          projectileTemplate.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });
          gameState.modelLoaded = true;
          syncState();
        },
        undefined,
        () => {
          const fallback = new THREE.Mesh(
            new THREE.SphereGeometry(0.5, 16, 16),
            new THREE.MeshStandardMaterial({ color: 0x8b4513 })
          );
          fallback.castShadow = true;
          fallback.receiveShadow = true;
          projectileTemplate = fallback;
          projectileTemplate.scale.set(0.5, 0.5, 0.5);
          gameState.modelLoaded = false;
          syncState();
        }
      );
    }

    function getCurrentCatapult() {
      return gameState.currentPlayer === 1 ? catapultA : catapultB;
    }

    function getCurrentArm() {
      return gameState.currentPlayer === 1 ? armA : armB;
    }

    function getCurrentDirection() {
      return gameState.currentPlayer === 1 ? 1 : -1;
    }

    function getEnemyCastleCenter() {
      return gameState.currentPlayer === 1 ? castleBPosition : castleAPosition;
    }

    function getProjectileSpawnPosition() {
      const catapult = getCurrentCatapult();
      const dir = getCurrentDirection();
      const localTip = new THREE.Vector3(dir * 3.4, 0.8 + Math.sin(THREE.MathUtils.degToRad(gameState.angle)) * 0.2, gameState.lateral * 0.05);
      return catapult.localToWorld(localTip.clone());
    }

    function updateCatapultVisuals() {
      const angleRad = THREE.MathUtils.degToRad(gameState.angle);
      const activeArm = getCurrentArm();

      armA.rotation.z = 0;
      armB.rotation.z = 0;

      if (gameState.currentPlayer === 1) {
        activeArm.rotation.z = angleRad;
      } else {
        activeArm.rotation.z = Math.PI - angleRad;
      }
    }

    function updateHUD() {
      hudTopLeft.innerHTML = `
        <div><strong>Turn:</strong> Player ${gameState.currentPlayer}</div>
        <div><strong>Round:</strong> ${gameState.round}</div>
        <div id="status-line"><strong>Last Shot:</strong> ${gameState.lastShotResult.toUpperCase()} ${gameState.lastDamage > 0 ? `(${gameState.lastDamage} dmg)` : ''}</div>
      `;

      hudTopRight.innerHTML = `
        <div class="blue"><strong>Castle A HP:</strong> ${gameState.castleAHP}</div>
        <div class="red"><strong>Castle B HP:</strong> ${gameState.castleBHP}</div>
      `;

      hudBottomCenter.innerHTML = `
        <div><strong>Angle:</strong> ${gameState.angle}° &nbsp;&nbsp; <strong>Power:</strong> ${gameState.power} &nbsp;&nbsp; <strong>Lateral:</strong> ${gameState.lateral}</div>
      `;

      fireBtn.disabled = gameState.projectileInFlight || gameState.gameOver;
    }

    function cloneProjectileModel() {
      if (!projectileTemplate) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.5, 16, 16),
          new THREE.MeshStandardMaterial({ color: 0xffffff })
        );
        mesh.castShadow = true;
        return mesh;
      }
      const clone = projectileTemplate.clone(true);
      clone.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      return clone;
    }

    function fireProjectile() {
      if (gameState.projectileInFlight || gameState.gameOver) return;

      activeProjectile = cloneProjectileModel();
      const spawnPos = getProjectileSpawnPosition();
      activeProjectile.position.copy(spawnPos);
      scene.add(activeProjectile);

      const angleRad = THREE.MathUtils.degToRad(gameState.angle);
      const direction = getCurrentDirection();

      projectileVelocity = new THREE.Vector3(
        gameState.power * Math.cos(angleRad) * direction,
        gameState.power * Math.sin(angleRad),
        gameState.lateral * 0.5
      );

      gameState.projectileInFlight = true;
      gameState.totalShotsFired += 1;
      gameState.lastShotResult = 'none';
      gameState.lastDamage = 0;
      syncState();
      updateHUD();
    }

    function resolveShot(result, damage = 0) {
      gameState.lastShotResult = result;
      gameState.lastDamage = damage;

      if (result === 'hit') {
        if (gameState.currentPlayer === 1) {
          gameState.castleBHP = Math.max(0, gameState.castleBHP - damage);
          if (gameState.castleBHP <= 0) {
            gameState.gameOver = true;
            gameState.winner = 1;
          }
        } else {
          gameState.castleAHP = Math.max(0, gameState.castleAHP - damage);
          if (gameState.castleAHP <= 0) {
            gameState.gameOver = true;
            gameState.winner = 2;
          }
        }
      }

      if (activeProjectile) {
        scene.remove(activeProjectile);
        activeProjectile = null;
      }
      projectileVelocity = null;
      gameState.projectileInFlight = false;

      if (gameState.gameOver) {
        showGameOver();
      } else {
        advanceTurn();
      }

      syncState();
      updateHUD();
    }

    function advanceTurn() {
      const previousPlayer = gameState.currentPlayer;
      gameState.currentPlayer = previousPlayer === 1 ? 2 : 1;

      if (previousPlayer === 2) {
        gameState.round += 1;
      }

      gameState.angle = 45;
      gameState.power = 30;
      gameState.lateral = 0;
      updateCatapultVisuals();
    }

    function showGameOver() {
      gameOverText.textContent = `Player ${gameState.winner} Wins!`;
      gameOverOverlay.style.display = 'flex';
    }

    function hideGameOver() {
      gameOverOverlay.style.display = 'none';
    }

    function resetGame() {
      if (activeProjectile) {
        scene.remove(activeProjectile);
        activeProjectile = null;
      }

      projectileVelocity = null;

      gameState.currentPlayer = 1;
      gameState.round = 1;
      gameState.castleAHP = 100;
      gameState.castleBHP = 100;
      gameState.angle = 45;
      gameState.power = 30;
      gameState.lateral = 0;
      gameState.projectileInFlight = false;
      gameState.lastShotResult = 'none';
      gameState.lastDamage = 0;
      gameState.totalShotsFired = 0;
      gameState.gameOver = false;
      gameState.winner = 0;
      gameState.projectilePosition = null;

      hideGameOver();
      updateCatapultVisuals();
      syncState();
      updateHUD();
    }

    function handleKeyDown(e) {
      if (gameState.projectileInFlight || gameState.gameOver) return;

      const key = e.key.toLowerCase();
      let changed = false;

      switch (key) {
        case 'a':
          gameState.angle = Math.max(MIN_ANGLE, gameState.angle - 1);
          changed = true;
          break;
        case 'd':
          gameState.angle = Math.min(MAX_ANGLE, gameState.angle + 1);
          changed = true;
          break;
        case 'w':
          gameState.power = Math.min(MAX_POWER, gameState.power + 2);
          changed = true;
          break;
        case 's':
          gameState.power = Math.max(MIN_POWER, gameState.power - 2);
          changed = true;
          break;
        case 'q':
          gameState.lateral = Math.max(MIN_LATERAL, gameState.lateral - 1);
          changed = true;
          break;
        case 'e':
          gameState.lateral = Math.min(MAX_LATERAL, gameState.lateral + 1);
          changed = true;
          break;
        case ' ':
        case 'space':
          e.preventDefault();
          fireProjectile();
          return;
      }

      if (changed) {
        updateCatapultVisuals();
        syncState();
        updateHUD();
      }
    }

    function updateProjectile() {
      if (!activeProjectile || !projectileVelocity) return;

      projectileVelocity.y -= GRAVITY * DT;
      activeProjectile.position.x += projectileVelocity.x * DT;
      activeProjectile.position.y += projectileVelocity.y * DT;
      activeProjectile.position.z += projectileVelocity.z * DT;

      activeProjectile.rotation.x += 0.08;
      activeProjectile.rotation.y += 0.1;

      const enemyCenter = getEnemyCastleCenter();
      const dist = activeProjectile.position.distanceTo(enemyCenter);

      if (dist <= 4) {
        const damage = Math.floor(gameState.power * 0.6);
        resolveShot('hit', damage);
        return;
      }

      if (activeProjectile.position.y <= 0) {
        resolveShot('miss', 0);
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      updateProjectile();
      syncState();
      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    fireBtn.addEventListener('click', fireProjectile);
    resetBtn.addEventListener('click', resetGame);
    overlayResetBtn.addEventListener('click', resetGame);
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('resize', onResize);

    createRenderer();
    createScene();
    loadProjectileModel();
    syncState();
    updateHUD();
    animate();
  </script>
</body>
</html>
