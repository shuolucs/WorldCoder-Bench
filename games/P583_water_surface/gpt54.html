<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Water Ripple Simulation</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #87CEEB;
      font-family: sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 280px;
      background: rgba(0, 0, 0, 0.45);
      color: white;
      padding: 12px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      z-index: 10;
      font-size: 14px;
    }

    #ui h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .control {
      margin-bottom: 10px;
    }

    .control label {
      display: block;
      margin-bottom: 4px;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      background: #1f4f66;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }

    button:hover {
      background: #2d6b88;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.5);
      padding: 12px;
      color: white;
      font-family: monospace;
      font-size: 14px;
      border-radius: 10px;
      z-index: 10;
      line-height: 1.5;
      min-width: 220px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div id="hud-maxheight">Max Height: 0.000</div>
      <div id="hud-ducks">Ducks: 0</div>
      <div id="hud-rain">Rain: OFF</div>
      <div id="hud-wavespeed">Wave Speed: 8.0</div>
      <div id="hud-damping">Damping: 0.020</div>
      <div id="hud-ripples">Ripples: 0</div>
    </div>

    <div id="ui">
      <h3>Water Controls</h3>

      <div class="control">
        <label for="slider-ripple">Ripple Strength: <span id="label-ripple">1.5</span></label>
        <input id="slider-ripple" type="range" min="0.5" max="5.0" step="0.1" value="1.5" />
      </div>

      <div class="control">
        <label for="slider-wavespeed">Wave Speed: <span id="label-wavespeed">8.0</span></label>
        <input id="slider-wavespeed" type="range" min="2.0" max="15.0" step="0.5" value="8.0" />
      </div>

      <div class="control">
        <label for="slider-damping">Damping: <span id="label-damping">0.020</span></label>
        <input id="slider-damping" type="range" min="0.005" max="0.1" step="0.005" value="0.02" />
      </div>

      <div class="buttons">
        <button id="btn-add-duck">Add Duck</button>
        <button id="btn-rain">Toggle Rain</button>
        <button id="btn-reset">Reset</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    scene.add(dirLight);

    const hemi = new THREE.HemisphereLight(0xbfe8ff, 0x4b6b5a, 0.55);
    scene.add(hemi);

    const skyGeo = new THREE.SphereGeometry(80, 32, 16);
    const skyMat = new THREE.MeshBasicMaterial({
      color: 0x9fd8ff,
      side: THREE.BackSide
    });
    const skyDome = new THREE.Mesh(skyGeo, skyMat);
    scene.add(skyDome);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(40, 64),
      new THREE.MeshPhongMaterial({ color: 0x6ea86c, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.4;
    ground.receiveShadow = true;
    scene.add(ground);

    const SIZE = 20;
    const SEGMENTS = 128;
    const GRID = SEGMENTS + 1;
    const DX = SIZE / SEGMENTS;
    const DT = 1 / 60;

    let waveSpeed = 8.0;
    let dampingFactor = 0.02;
    let rippleStrength = 1.5;
    let totalRipples = 0;
    let rainMode = false;
    let isPaused = false;
    let frameCount = 0;
    let rainInterval = null;

    function create2DArray(n, val = 0) {
      const arr = new Array(n);
      for (let i = 0; i < n; i++) {
        arr[i] = new Float32Array(n);
        if (val !== 0) arr[i].fill(val);
      }
      return arr;
    }

    let h_previous = create2DArray(GRID, 0);
    let h_current = create2DArray(GRID, 0);
    let h_new = create2DArray(GRID, 0);

    const waterGeometry = new THREE.PlaneGeometry(SIZE, SIZE, SEGMENTS, SEGMENTS);
    waterGeometry.rotateX(-Math.PI / 2);

    const posAttr = waterGeometry.attributes.position;
    const normalMap = new THREE.TextureLoader().load('./water_normals.jpg');
    normalMap.wrapS = normalMap.wrapT = THREE.RepeatWrapping;
    normalMap.repeat.set(8, 8);

    const waterMaterial = new THREE.MeshPhongMaterial({
      color: 0x006994,
      transparent: true,
      opacity: 0.8,
      normalMap,
      normalScale: new THREE.Vector2(0.5, 0.5),
      shininess: 100,
      side: THREE.DoubleSide
    });

    const waterMesh = new THREE.Mesh(waterGeometry, waterMaterial);
    waterMesh.receiveShadow = true;
    waterMesh.castShadow = false;
    scene.add(waterMesh);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function gridIndex(i, j) {
      return i * GRID + j;
    }

    function worldToGrid(x, z) {
      const half = SIZE / 2;
      const gx = (x + half) / SIZE * SEGMENTS;
      const gz = (z + half) / SIZE * SEGMENTS;
      return {
        i: Math.round(gz),
        j: Math.round(gx)
      };
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function addRippleAtCell(ci, cj, strength = rippleStrength, radius = 3) {
      for (let i = ci - radius; i <= ci + radius; i++) {
        for (let j = cj - radius; j <= cj + radius; j++) {
          if (i < 1 || j < 1 || i >= GRID - 1 || j >= GRID - 1) continue;
          const di = i - ci;
          const dj = j - cj;
          const d = Math.sqrt(di * di + dj * dj);
          if (d <= radius) {
            const falloff = 1.0 - d / radius;
            h_current[i][j] = -strength * falloff;
          }
        }
      }
      totalRipples++;
    }

    function addRippleAtWorld(x, z, strength = rippleStrength, radius = 3) {
      const g = worldToGrid(x, z);
      addRippleAtCell(clamp(g.i, 1, GRID - 2), clamp(g.j, 1, GRID - 2), strength, radius);
    }

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(waterMesh);
      if (hits.length > 0) {
        const p = hits[0].point;
        addRippleAtWorld(p.x, p.z, rippleStrength, 3);
      }
    });

    function sampleHeight(x, z) {
      const half = SIZE / 2;
      const fx = (x + half) / SIZE * SEGMENTS;
      const fz = (z + half) / SIZE * SEGMENTS;

      if (fx < 0 || fx > SEGMENTS || fz < 0 || fz > SEGMENTS) return 0;

      const x0 = Math.floor(fx);
      const z0 = Math.floor(fz);
      const x1 = Math.min(x0 + 1, SEGMENTS);
      const z1 = Math.min(z0 + 1, SEGMENTS);

      const tx = fx - x0;
      const tz = fz - z0;

      const h00 = h_current[z0][x0];
      const h10 = h_current[z0][x1];
      const h01 = h_current[z1][x0];
      const h11 = h_current[z1][x1];

      const h0 = h00 * (1 - tx) + h10 * tx;
      const h1 = h01 * (1 - tx) + h11 * tx;

      return h0 * (1 - tz) + h1 * tz;
    }

    function sampleGradient(x, z) {
      const eps = DX * 1.5;
      const hL = sampleHeight(x - eps, z);
      const hR = sampleHeight(x + eps, z);
      const hD = sampleHeight(x, z - eps);
      const hU = sampleHeight(x, z + eps);
      return {
        dx: (hR - hL) / (2 * eps),
        dz: (hU - hD) / (2 * eps)
      };
    }

    function updateWaterGeometry() {
      let ptr = 0;
      for (let i = 0; i < GRID; i++) {
        for (let j = 0; j < GRID; j++) {
          posAttr.setY(ptr, h_current[i][j]);
          ptr++;
        }
      }
      posAttr.needsUpdate = true;
      waterGeometry.computeVertexNormals();
    }

    function stepSimulation() {
      const c2dt2 = waveSpeed * waveSpeed * DT * DT;
      const invDx2 = 1 / (DX * DX);

      for (let i = 1; i < GRID - 1; i++) {
        for (let j = 1; j < GRID - 1; j++) {
          const lap =
            (h_current[i + 1][j] + h_current[i - 1][j] + h_current[i][j + 1] + h_current[i][j - 1] - 4 * h_current[i][j]) * invDx2;

          h_new[i][j] =
            2 * h_current[i][j] -
            h_previous[i][j] +
            c2dt2 * lap -
            dampingFactor * (h_current[i][j] - h_previous[i][j]);
        }
      }

      for (let i = 0; i < GRID; i++) {
        h_new[0][i] = 0;
        h_new[GRID - 1][i] = 0;
        h_new[i][0] = 0;
        h_new[i][GRID - 1] = 0;
      }

      const temp = h_previous;
      h_previous = h_current;
      h_current = h_new;
      h_new = temp;
    }

    const gltfLoader = new GLTFLoader();
    let duckSource = null;
    const ducks = [];
    const MAX_DUCKS = 5;

    function createFallbackDuck() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.35, 24, 16),
        new THREE.MeshStandardMaterial({ color: 0xffde59, roughness: 0.6, metalness: 0.05 })
      );
      body.scale.set(1.1, 0.75, 1.4);
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 20, 16),
        new THREE.MeshStandardMaterial({ color: 0xffde59, roughness: 0.6, metalness: 0.05 })
      );
      head.position.set(0.18, 0.22, 0.28);
      head.castShadow = true;
      group.add(head);

      const beak = new THREE.Mesh(
        new THREE.ConeGeometry(0.07, 0.18, 12),
        new THREE.MeshStandardMaterial({ color: 0xff8c42, roughness: 0.8 })
      );
      beak.rotation.x = Math.PI / 2;
      beak.position.set(0.18, 0.18, 0.48);
      beak.castShadow = true;
      group.add(beak);

      return group;
    }

    function randomDuckPosition() {
      return new THREE.Vector3(
        THREE.MathUtils.randFloat(-7, 7),
        0,
        THREE.MathUtils.randFloat(-7, 7)
      );
    }

    function addDuck() {
      if (ducks.length >= MAX_DUCKS) return;

      let duck;
      if (duckSource) {
        duck = duckSource.clone(true);
      } else {
        duck = createFallbackDuck();
      }

      duck.scale.setScalar(0.5);
      duck.traverse((obj) => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });

      const pos = randomDuckPosition();
      duck.position.copy(pos);

      scene.add(duck);

      const angle = Math.random() * Math.PI * 2;
      const velocity = new THREE.Vector2(Math.cos(angle), Math.sin(angle)).multiplyScalar(0.3);

      ducks.push({
        object: duck,
        velocity
      });
    }

    function resetWater() {
      for (let i = 0; i < GRID; i++) {
        h_previous[i].fill(0);
        h_current[i].fill(0);
        h_new[i].fill(0);
      }
      updateWaterGeometry();
    }

    function setRainMode(enabled) {
      rainMode = enabled;
      if (rainInterval) {
        clearInterval(rainInterval);
        rainInterval = null;
      }

      if (rainMode) {
        rainInterval = setInterval(() => {
          const x = THREE.MathUtils.randFloat(-9, 9);
          const z = THREE.MathUtils.randFloat(-9, 9);
          addRippleAtWorld(x, z, 0.5, 2);
        }, 200);
      }

      document.getElementById('hud-rain').textContent = `Rain: ${rainMode ? 'ON' : 'OFF'}`;
    }

    function resetScene() {
      resetWater();
      setRainMode(false);
      while (ducks.length > 1) {
        const d = ducks.pop();
        scene.remove(d.object);
      }
      if (ducks[0]) {
        ducks[0].object.position.copy(randomDuckPosition());
        const angle = Math.random() * Math.PI * 2;
        ducks[0].velocity.set(Math.cos(angle), Math.sin(angle)).multiplyScalar(0.3);
      }
    }

    gltfLoader.load(
      './Duck.glb',
      (gltf) => {
        duckSource = gltf.scene;
        if (ducks.length === 0) addDuck();
      },
      undefined,
      () => {
        if (ducks.length === 0) addDuck();
      }
    );

    setTimeout(() => {
      if (ducks.length === 0) addDuck();
    }, 1000);

    const sliderRipple = document.getElementById('slider-ripple');
    const sliderWave = document.getElementById('slider-wavespeed');
    const sliderDamping = document.getElementById('slider-damping');

    sliderRipple.addEventListener('input', () => {
      rippleStrength = parseFloat(sliderRipple.value);
      document.getElementById('label-ripple').textContent = rippleStrength.toFixed(1);
    });

    sliderWave.addEventListener('input', () => {
      waveSpeed = parseFloat(sliderWave.value);
      document.getElementById('label-wavespeed').textContent = waveSpeed.toFixed(1);
    });

    sliderDamping.addEventListener('input', () => {
      dampingFactor = parseFloat(sliderDamping.value);
      document.getElementById('label-damping').textContent = dampingFactor.toFixed(3);
    });

    document.getElementById('btn-add-duck').addEventListener('click', addDuck);
    document.getElementById('btn-rain').addEventListener('click', () => setRainMode(!rainMode));
    document.getElementById('btn-reset').addEventListener('click', resetScene);

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'p') {
        isPaused = !isPaused;
      } else if (e.key.toLowerCase() === 'r') {
        setRainMode(!rainMode);
      }
    });

    function updateDucks(dt) {
      for (const duck of ducks) {
        duck.object.position.x += duck.velocity.x * dt;
        duck.object.position.z += duck.velocity.y * dt;

        if (Math.abs(duck.object.position.x) > 9) {
          duck.velocity.x *= -1;
          duck.object.position.x = clamp(duck.object.position.x, -9, 9);
        }
        if (Math.abs(duck.object.position.z) > 9) {
          duck.velocity.y *= -1;
          duck.object.position.z = clamp(duck.object.position.z, -9, 9);
        }

        const x = duck.object.position.x;
        const z = duck.object.position.z;
        const y = sampleHeight(x, z);
        const grad = sampleGradient(x, z);

        duck.object.position.y = y + 0.16;

        const targetRotX = grad.dz * 0.8;
        const targetRotZ = -grad.dx * 0.8;

        duck.object.rotation.x = THREE.MathUtils.lerp(duck.object.rotation.x, targetRotX, 0.12);
        duck.object.rotation.z = THREE.MathUtils.lerp(duck.object.rotation.z, targetRotZ, 0.12);

        const heading = Math.atan2(duck.velocity.x, duck.velocity.y);
        duck.object.rotation.y = THREE.MathUtils.lerp(duck.object.rotation.y, heading, 0.05);
      }
    }

    function updateHUD(stats) {
      document.getElementById('hud-maxheight').textContent = `Max Height: ${stats.maxAbs.toFixed(3)}`;
      document.getElementById('hud-ducks').textContent = `Ducks: ${ducks.length}`;
      document.getElementById('hud-rain').textContent = `Rain: ${rainMode ? 'ON' : 'OFF'}`;
      document.getElementById('hud-wavespeed').textContent = `Wave Speed: ${waveSpeed.toFixed(1)}`;
      document.getElementById('hud-damping').textContent = `Damping: ${dampingFactor.toFixed(3)}`;
      document.getElementById('hud-ripples').textContent = `Ripples: ${totalRipples}`;
    }

    function computeStats() {
      let maxAbs = 0;
      let minH = Infinity;
      let maxH = -Infinity;
      let sum = 0;
      const count = GRID * GRID;

      for (let i = 0; i < GRID; i++) {
        for (let j = 0; j < GRID; j++) {
          const h = h_current[i][j];
          if (Math.abs(h) > maxAbs) maxAbs = Math.abs(h);
          if (h < minH) minH = h;
          if (h > maxH) maxH = h;
          sum += h;
        }
      }

      return {
        maxAbs,
        minH,
        maxH,
        avgH: sum / count
      };
    }

    window.__3D_STATE__ = {};

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const dtFrame = Math.min(clock.getDelta(), 0.05);

      if (!isPaused) {
        stepSimulation();
        updateWaterGeometry();
        updateDucks(dtFrame);
      }

      normalMap.offset.x += 0.0008;
      normalMap.offset.y += 0.0005;

      controls.update();

      const stats = computeStats();
      updateHUD(stats);

      window.__3D_STATE__ = {
        frameCount,
        maxWaterHeight: stats.maxH,
        minWaterHeight: stats.minH,
        avgWaterHeight: stats.avgH,
        duckCount: ducks.length,
        duckPositions: ducks.map(d => {
          const p = d.object.getWorldPosition(new THREE.Vector3());
          return { x: p.x, y: p.y, z: p.z };
        }),
        waveSpeed,
        dampingFactor,
        rippleStrength,
        totalRipples,
        rainMode,
        waterValid: Number.isFinite(stats.maxAbs) && stats.maxAbs < 10 && ducks.length >= 1,
        isPaused
      };

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateWaterGeometry();
    animate();
  </script>
</body>
</html>
