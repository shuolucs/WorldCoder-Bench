<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Water Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            min-width: 200px;
        }
        #hud div {
            margin-bottom: 4px;
        }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 250px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        input[type="range"] {
            width: 100%;
        }
        button {
            background: #006994;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
        }
        button:hover {
            background: #008bba;
        }
        button.active {
            background: #ff4500;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="hud">
        <div>Max Height: <span id="hud-maxheight">0.00</span></div>
        <div>Ducks: <span id="hud-ducks">0</span></div>
        <div>Rain Mode: <span id="hud-rain">OFF</span></div>
        <div>Wave Speed: <span id="hud-wavespeed">8.0</span></div>
        <div>Damping: <span id="hud-damping">0.020</span></div>
        <div>Total Ripples: <span id="hud-ripples">0</span></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label><span>Ripple Strength</span> <span id="val-ripple">1.5</span></label>
            <input type="range" id="slider-ripple" min="0.5" max="5.0" step="0.1" value="1.5">
        </div>
        <div class="control-group">
            <label><span>Wave Speed (c)</span> <span id="val-wavespeed">8.0</span></label>
            <input type="range" id="slider-wavespeed" min="2.0" max="15.0" step="0.5" value="8.0">
        </div>
        <div class="control-group">
            <label><span>Damping</span> <span id="val-damping">0.020</span></label>
            <input type="range" id="slider-damping" min="0.005" max="0.1" step="0.005" value="0.02">
        </div>
        <button id="btn-add-duck">Add Duck</button>
        <button id="btn-rain">Toggle Rain</button>
        <button id="btn-reset">Reset Simulation</button>
        <div style="font-size: 12px; color: #aaa; margin-top: 5px;">Keys: 'P' to Pause, 'R' for Rain</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            frameCount: 0,
            maxWaterHeight: 0,
            minWaterHeight: 0,
            avgWaterHeight: 0,
            duckCount: 0,
            duckPositions: [],
            waveSpeed: 8.0,
            dampingFactor: 0.02,
            rippleStrength: 1.5,
            totalRipples: 0,
            rainMode: false,
            waterValid: true,
            isPaused: false
        };

        const params = {
            waveSpeed: 8.0,
            damping: 0.02,
            rippleStrength: 1.5,
            rainMode: false,
            isPaused: false,
            totalRipples: 0
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        // --- Water Simulation Setup ---
        const GRID_SIZE = 20;
        const RESOLUTION = 128;
        const N = RESOLUTION + 1; // 129 vertices
        const dx = GRID_SIZE / RESOLUTION;
        const dt = 1 / 60;

        let h_prev = new Float32Array(N * N);
        let h_curr = new Float32Array(N * N);
        let h_new = new Float32Array(N * N);

        const waterGeometry = new THREE.PlaneGeometry(GRID_SIZE, GRID_SIZE, RESOLUTION, RESOLUTION);
        waterGeometry.rotateX(-Math.PI / 2); // Orient horizontally

        const textureLoader = new THREE.TextureLoader();
        const normalMap = textureLoader.load('./water_normals.jpg', (tex) => {
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        }, undefined, () => {
            console.warn("Normal map not found, using default normals.");
        });

        const waterMaterial = new THREE.MeshStandardMaterial({
            color: 0x006994,
            transparent: true,
            opacity: 0.8,
            metalness: 0.1,
            roughness: 0.2,
            side: THREE.DoubleSide,
            normalMap: normalMap,
            normalScale: new THREE.Vector2(0.5, 0.5)
        });

        const waterMesh = new THREE.Mesh(waterGeometry, waterMaterial);
        waterMesh.receiveShadow = true;
        scene.add(waterMesh);

        // --- Duck Setup ---
        let duckModel = null;
        const ducks = [];
        const gltfLoader = new GLTFLoader();
        
        gltfLoader.load('./Duck.glb', (gltf) => {
            duckModel = gltf.scene;
            duckModel.scale.set(0.5, 0.5, 0.5);
            duckModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            addDuck();
        }, undefined, (err) => {
            console.warn("Failed to load Duck.glb, using fallback box.", err);
            const geom = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const mat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
            duckModel = new THREE.Mesh(geom, mat);
            duckModel.castShadow = true;
            addDuck();
        });

        function addDuck() {
            if (ducks.length >= 5 || !duckModel) return;
            const duck = duckModel.clone();
            scene.add(duck);
            
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.3;
            
            ducks.push({
                mesh: duck,
                x: (Math.random() - 0.5) * 16,
                z: (Math.random() - 0.5) * 16,
                vx: Math.cos(angle) * speed,
                vz: Math.sin(angle) * speed
            });
            updateUI();
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        
        function createRipple(x, z, strength) {
            const gridX = Math.round((x + GRID_SIZE/2) / GRID_SIZE * RESOLUTION);
            const gridZ = Math.round((z + GRID_SIZE/2) / GRID_SIZE * RESOLUTION);
            const radius = 3;

            for (let i = -radius; i <= radius; i++) {
                for (let j = -radius; j <= radius; j++) {
                    if (i*i + j*j <= radius*radius) {
                        const gi = gridX + i;
                        const gj = gridZ + j;
                        if (gi > 0 && gi < RESOLUTION && gj > 0 && gj < RESOLUTION) {
                            const dist = Math.sqrt(i*i + j*j);
                            const factor = Math.cos((dist / radius) * Math.PI / 2);
                            h_curr[gi * N + gj] -= strength * factor;
                        }
                    }
                }
            }
            params.totalRipples++;
        }

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName !== 'CANVAS') return;
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
            const intersects = raycaster.intersectObject(waterMesh);
            
            if (intersects.length > 0) {
                const pt = intersects[0].point;
                createRipple(pt.x, pt.z, params.rippleStrength);
            }
        });

        // --- UI Controls ---
        const sliderRipple = document.getElementById('slider-ripple');
        const sliderWaveSpeed = document.getElementById('slider-wavespeed');
        const sliderDamping = document.getElementById('slider-damping');
        const btnAddDuck = document.getElementById('btn-add-duck');
        const btnRain = document.getElementById('btn-rain');
        const btnReset = document.getElementById('btn-reset');

        sliderRipple.addEventListener('input', (e) => {
            params.rippleStrength = parseFloat(e.target.value);
            document.getElementById('val-ripple').innerText = params.rippleStrength.toFixed(1);
        });

        sliderWaveSpeed.addEventListener('input', (e) => {
            params.waveSpeed = parseFloat(e.target.value);
            document.getElementById('val-wavespeed').innerText = params.waveSpeed.toFixed(1);
        });

        sliderDamping.addEventListener('input', (e) => {
            params.damping = parseFloat(e.target.value);
            document.getElementById('val-damping').innerText = params.damping.toFixed(3);
        });

        btnAddDuck.addEventListener('click', addDuck);

        btnRain.addEventListener('click', () => {
            params.rainMode = !params.rainMode;
            updateUI();
        });

        btnReset.addEventListener('click', () => {
            h_curr.fill(0);
            h_prev.fill(0);
            h_new.fill(0);
            ducks.forEach(d => scene.remove(d.mesh));
            ducks.length = 0;
            params.rainMode = false;
            params.totalRipples = 0;
            if (duckModel) addDuck();
            updateUI();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'p') {
                params.isPaused = !params.isPaused;
            }
            if (e.key.toLowerCase() === 'r') {
                params.rainMode = !params.rainMode;
                updateUI();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateUI() {
            document.getElementById('hud-ducks').innerText = ducks.length;
            document.getElementById('hud-rain').innerText = params.rainMode ? 'ON' : 'OFF';
            document.getElementById('hud-wavespeed').innerText = params.waveSpeed.toFixed(1);
            document.getElementById('hud-damping').innerText = params.damping.toFixed(3);
            document.getElementById('hud-ripples').innerText = params.totalRipples;
            
            if (params.rainMode) btnRain.classList.add('active');
            else btnRain.classList.remove('active');
        }

        // --- Main Loop ---
        let lastRainTime = 0;

        function animate(time) {
            requestAnimationFrame(animate);

            if (!params.isPaused) {
                // 1. Water Simulation
                const c = params.waveSpeed;
                const damping = params.damping;
                const A = (c * c * dt * dt) / (dx * dx);
                const MAX_HEIGHT = 8.0; // Prevent extreme explosion

                for (let ix = 1; ix < N - 1; ix++) {
                    for (let iy = 1; iy < N - 1; iy++) {
                        const idx = ix * N + iy;
                        const laplacian = h_curr[idx + 1] + h_curr[idx - 1] + h_curr[idx + N] + h_curr[idx - N] - 4 * h_curr[idx];
                        
                        let h = 2 * h_curr[idx] - h_prev[idx] + A * laplacian - damping * (h_curr[idx] - h_prev[idx]);
                        
                        // Clamp to prevent numerical explosion at high wave speeds
                        if (h > MAX_HEIGHT) h = MAX_HEIGHT;
                        if (h < -MAX_HEIGHT) h = -MAX_HEIGHT;
                        
                        h_new[idx] = h;
                    }
                }

                // Swap buffers
                let temp = h_prev;
                h_prev = h_curr;
                h_curr = h_new;
                h_new = temp;

                // Update Geometry
                const positions = waterMesh.geometry.attributes.position.array;
                let maxH = -Infinity, minH = Infinity, sumH = 0;

                for (let ix = 0; ix < N; ix++) {
                    for (let iy = 0; iy < N; iy++) {
                        const idx = ix * N + iy;
                        const h = h_curr[idx];
                        
                        // PlaneGeometry vertex mapping: iy is outer loop (Z), ix is inner loop (X)
                        const vIdx = (iy * N + ix) * 3;
                        positions[vIdx + 1] = h; // Local Y becomes World Y after rotateX(-PI/2)

                        if (h > maxH) maxH = h;
                        if (h < minH) minH = h;
                        sumH += h;
                    }
                }
                
                waterMesh.geometry.attributes.position.needsUpdate = true;
                waterMesh.geometry.computeVertexNormals();

                // 2. Rain Mode
                if (params.rainMode && time - lastRainTime > 200) {
                    const rx = (Math.random() - 0.5) * 18;
                    const rz = (Math.random() - 0.5) * 18;
                    createRipple(rx, rz, 0.5);
                    lastRainTime = time;
                    updateUI();
                }

                // 3. Duck Update
                ducks.forEach(d => {
                    // Move
                    d.x += d.vx * dt * 60; // Normalize speed to frame rate
                    d.z += d.vz * dt * 60;
                    
                    // Bounce
                    if (Math.abs(d.x) > 9) { d.vx *= -1; d.x = Math.sign(d.x) * 9; }
                    if (Math.abs(d.z) > 9) { d.vz *= -1; d.z = Math.sign(d.z) * 9; }

                    // Sample height and gradient
                    const gridX = (d.x + GRID_SIZE/2) / GRID_SIZE * RESOLUTION;
                    const gridZ = (d.z + GRID_SIZE/2) / GRID_SIZE * RESOLUTION;
                    const ix = Math.floor(gridX);
                    const iy = Math.floor(gridZ);

                    if (ix >= 0 && ix < RESOLUTION && iy >= 0 && iy < RESOLUTION) {
                        const u = gridX - ix;
                        const v = gridZ - iy;
                        
                        const h00 = h_curr[ix * N + iy];
                        const h10 = h_curr[(ix+1) * N + iy];
                        const h01 = h_curr[ix * N + (iy+1)];
                        const h11 = h_curr[(ix+1) * N + (iy+1)];

                        // Bilinear height
                        const h0 = h00 * (1 - u) + h10 * u;
                        const h1 = h01 * (1 - u) + h11 * u;
                        const height = h0 * (1 - v) + h1 * v;

                        d.mesh.position.set(d.x, height + 0.05, d.z);

                        // Gradient for tilt (central difference where possible)
                        let gradX = 0, gradZ = 0;
                        if (ix > 0 && ix < RESOLUTION-1 && iy > 0 && iy < RESOLUTION-1) {
                            gradX = (h_curr[(ix+1)*N + iy] - h_curr[(ix-1)*N + iy]) / (2 * dx);
                            gradZ = (h_curr[ix*N + iy+1] - h_curr[ix*N + iy-1]) / (2 * dx);
                        }

                        const normal = new THREE.Vector3(-gradX, 1, -gradZ).normalize();
                        const forward = new THREE.Vector3(d.vx, 0, d.vz).normalize();
                        if (forward.lengthSq() < 0.01) forward.set(0, 0, 1);
                        
                        const right = new THREE.Vector3().crossVectors(forward, normal).normalize();
                        const trueForward = new THREE.Vector3().crossVectors(normal, right).normalize();

                        const mat = new THREE.Matrix4().makeBasis(right, normal, trueForward);
                        d.mesh.quaternion.setFromRotationMatrix(mat);
                    }
                });

                // 4. Update State & HUD
                window.__3D_STATE__.frameCount++;
                window.__3D_STATE__.maxWaterHeight = maxH === -Infinity ? 0 : maxH;
                window.__3D_STATE__.minWaterHeight = minH === Infinity ? 0 : minH;
                window.__3D_STATE__.avgWaterHeight = sumH / (N * N);
                window.__3D_STATE__.duckCount = ducks.length;
                window.__3D_STATE__.duckPositions = ducks.map(d => ({x: d.mesh.position.x, y: d.mesh.position.y, z: d.mesh.position.z}));
                window.__3D_STATE__.waveSpeed = params.waveSpeed;
                window.__3D_STATE__.dampingFactor = params.damping;
                window.__3D_STATE__.rippleStrength = params.rippleStrength;
                window.__3D_STATE__.totalRipples = params.totalRipples;
                window.__3D_STATE__.rainMode = params.rainMode;
                window.__3D_STATE__.isPaused = params.isPaused;
                
                const validH = isFinite(maxH) && Math.abs(maxH) < 10;
                window.__3D_STATE__.waterValid = validH && ducks.length >= 1;

                document.getElementById('hud-maxheight').innerText = (maxH === -Infinity ? 0 : maxH).toFixed(2);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        updateUI();
        animate(0);
    </script>
</body>
</html>
