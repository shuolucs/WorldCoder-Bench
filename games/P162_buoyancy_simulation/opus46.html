<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three.js Buoyancy Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #control-panel {
    position: absolute;
    top: 15px;
    left: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }

  #control-panel button {
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(30, 30, 60, 0.85);
    color: #e0e0e0;
    font-size: 13px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.2s ease;
    text-align: left;
    white-space: nowrap;
  }

  #control-panel button:hover {
    background: rgba(50, 50, 100, 0.9);
    border-color: rgba(100, 150, 255, 0.5);
    transform: translateX(3px);
  }

  #control-panel button:active {
    transform: translateX(1px);
    background: rgba(70, 70, 130, 0.9);
  }

  #hud {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(20, 20, 50, 0.88);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 16px 20px;
    color: #d0d0e0;
    font-size: 13px;
    line-height: 1.8;
    z-index: 10;
    backdrop-filter: blur(10px);
    min-width: 280px;
  }

  #hud .hud-title {
    font-size: 15px;
    font-weight: bold;
    color: #82b1ff;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 6px;
  }

  #hud .hud-row {
    display: flex;
    justify-content: space-between;
  }

  #hud .hud-label {
    color: #9e9eb8;
  }

  #hud .hud-value {
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-weight: bold;
  }

  #hud .state-floating { color: #4caf50; }
  #hud .state-sinking { color: #ff9800; }
  #hud .state-resting { color: #f44336; }
  #hud .state-falling { color: #2196f3; }

  .btn-action { border-color: rgba(100, 200, 255, 0.3) !important; }
  .btn-danger { border-color: rgba(255, 100, 100, 0.3) !important; }
</style>
</head>
<body>

<div id="control-panel">
  <button id="btn-decrease-density">▼ Decrease Object Density -50</button>
  <button id="btn-increase-density">▲ Increase Object Density +50</button>
  <button id="btn-decrease-fluid">▼ Decrease Fluid Density -100</button>
  <button id="btn-increase-fluid">▲ Increase Fluid Density +100</button>
  <button id="btn-drop" class="btn-action">⟳ Drop Object</button>
  <button id="btn-reset" class="btn-danger">✕ Reset All</button>
</div>

<div id="hud">
  <div class="hud-title">Buoyancy Simulation</div>
  <div class="hud-row"><span class="hud-label">Object Density:</span><span class="hud-value" id="hud-obj-density">800 kg/m³</span></div>
  <div class="hud-row"><span class="hud-label">Fluid Density:</span><span class="hud-value" id="hud-fluid-density">1000 kg/m³</span></div>
  <div class="hud-row"><span class="hud-label">Object Y:</span><span class="hud-value" id="hud-obj-y">2.00</span></div>
  <div class="hud-row"><span class="hud-label">Velocity Y:</span><span class="hud-value" id="hud-vel-y">0.000</span></div>
  <div class="hud-row"><span class="hud-label">Buoyant Force:</span><span class="hud-value" id="hud-buoyant">0.00 N</span></div>
  <div class="hud-row"><span class="hud-label">Weight:</span><span class="hud-value" id="hud-weight">0.00 N</span></div>
  <div class="hud-row"><span class="hud-label">Net Force:</span><span class="hud-value" id="hud-net">0.00 N</span></div>
  <div class="hud-row"><span class="hud-label">Submerged:</span><span class="hud-value" id="hud-submerged">0.00</span></div>
  <div class="hud-row"><span class="hud-label">State:</span><span class="hud-value" id="hud-state">falling</span></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

// Water Tank (transparent box)
const tankGeom = new THREE.BoxGeometry(6, 5, 4);
const tankMat = new THREE.MeshPhysicalMaterial({
  color: 0x2196F3,
  opacity: 0.25,
  transparent: true,
  transmission: 0.5,
  roughness: 0.1,
  metalness: 0,
  side: THREE.DoubleSide,
  depthWrite: false
});
const tank = new THREE.Mesh(tankGeom, tankMat);
tank.position.set(0, 0, 0);
scene.add(tank);

// Tank wireframe edges for visibility
const tankEdges = new THREE.EdgesGeometry(tankGeom);
const tankLine = new THREE.LineSegments(tankEdges, new THREE.LineBasicMaterial({ color: 0x64b5f6, opacity: 0.5, transparent: true }));
scene.add(tankLine);

// Water surface plane
const waterLevel = 1.0;
const waterGeom = new THREE.PlaneGeometry(5.9, 3.9);
const waterMat = new THREE.MeshBasicMaterial({
  color: 0x1976D2,
  opacity: 0.4,
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false
});
const waterPlane = new THREE.Mesh(waterGeom, waterMat);
waterPlane.rotation.x = -Math.PI / 2;
waterPlane.position.y = waterLevel;
scene.add(waterPlane);

// Ground plane (bottom of tank)
const groundGeom = new THREE.PlaneGeometry(5.9, 3.9);
const groundMat = new THREE.MeshBasicMaterial({ color: 0x333355, side: THREE.DoubleSide });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.5;
scene.add(ground);

// --- Physics State ---
const DEFAULTS = {
  objectDensity: 800,
  fluidDensity: 1000,
  gravity: 9.81,
  objectVolume: 0.5,
  dampingFactor: 0.95,
  objectY: 2.0,
  velocityY: 0,
  waterLevel: 1.0,
  objectHeight: 1.5
};

let objectDensity = DEFAULTS.objectDensity;
let fluidDensity = DEFAULTS.fluidDensity;
const gravity = DEFAULTS.gravity;
const objectVolume = DEFAULTS.objectVolume;
const dampingFactor = DEFAULTS.dampingFactor;
let objectMass = objectDensity * objectVolume;
let velocityY = DEFAULTS.velocityY;
let objectY = DEFAULTS.objectY;
const objectHeight = DEFAULTS.objectHeight;

let buoyantForce = 0;
let weight = 0;
let netForce = 0;
let submergedFraction = 0;
let simState = 'falling';
let modelLoaded = false;
let startTime = performance.now();

// --- 3D State ---
window.__3D_STATE__ = {
  objectDensity,
  fluidDensity,
  objectY: parseFloat(objectY.toFixed(2)),
  velocityY: parseFloat(velocityY.toFixed(3)),
  buoyantForce: 0,
  weight: 0,
  netForce: 0,
  submergedFraction: 0,
  waterLevel: DEFAULTS.waterLevel,
  simState: 'falling',
  modelLoaded: false,
  timeElapsed: 0,
  dampingFactor: DEFAULTS.dampingFactor,
  objectVolume: DEFAULTS.objectVolume
};

// --- Load Model ---
let model = null;
const loader = new GLTFLoader();

// Try loading the model, fall back to a placeholder if not found
function createPlaceholder() {
  const group = new THREE.Group();
  // Create a simple capsule/brain-like shape as placeholder
  const bodyGeom = new THREE.SphereGeometry(0.5, 32, 24);
  const bodyMat = new THREE.MeshPhysicalMaterial({
    color: 0xffaa88,
    roughness: 0.4,
    metalness: 0.1
  });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  
  const stemGeom = new THREE.CylinderGeometry(0.15, 0.2, 0.6, 16);
  const stem = new THREE.Mesh(stemGeom, bodyMat);
  stem.position.y = -0.55;
  
  group.add(body);
  group.add(stem);
  return group;
}

function setupModel(obj) {
  model = obj;
  
  // Compute bounding box and scale to ~1.5 units tall
  const box = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 1.5 / maxDim;
  model.scale.set(scale, scale, scale);
  
  // Re-center
  const box2 = new THREE.Box3().setFromObject(model);
  const center = new THREE.Vector3();
  box2.getCenter(center);
  model.position.sub(center);
  model.position.y = objectY;
  
  scene.add(model);
  modelLoaded = true;
  window.__3D_STATE__.modelLoaded = true;
}

loader.load(
  '._BrainStem.glb',
  (gltf) => {
    setupModel(gltf.scene);
  },
  undefined,
  (error) => {
    console.warn('Could not load BrainStem.glb, using placeholder:', error);
    const placeholder = createPlaceholder();
    setupModel(placeholder);
  }
);

// --- NaN Safety ---
function safeNum(val, fallback = 0) {
  if (isNaN(val) || !isFinite(val)) return fallback;
  return val;
}

function resetToDefaults() {
  objectDensity = DEFAULTS.objectDensity;
  fluidDensity = DEFAULTS.fluidDensity;
  objectMass = objectDensity * objectVolume;
  velocityY = DEFAULTS.velocityY;
  objectY = DEFAULTS.objectY;
  buoyantForce = 0;
  weight = 0;
  netForce = 0;
  submergedFraction = 0;
  simState = 'falling';
  startTime = performance.now();
}

// --- Button Handlers ---
document.getElementById('btn-increase-density').addEventListener('click', () => {
  objectDensity += 50;
  objectMass = objectDensity * objectVolume;
});

document.getElementById('btn-decrease-density').addEventListener('click', () => {
  objectDensity = Math.max(100, objectDensity - 50);
  objectMass = objectDensity * objectVolume;
});

document.getElementById('btn-increase-fluid').addEventListener('click', () => {
  fluidDensity = Math.min(2000, fluidDensity + 100);
});

document.getElementById('btn-decrease-fluid').addEventListener('click', () => {
  fluidDensity = Math.max(500, fluidDensity - 100);
});

document.getElementById('btn-drop').addEventListener('click', () => {
  objectY = 3.0;
  velocityY = 0;
});

document.getElementById('btn-reset').addEventListener('click', () => {
  resetToDefaults();
});

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') {
    fluidDensity = Math.min(2000, fluidDensity + 100);
  } else if (e.key === 'ArrowDown') {
    fluidDensity = Math.max(500, fluidDensity - 100);
  } else if (e.key === 'r' || e.key === 'R') {
    resetToDefaults();
  }
});

// --- Physics Update ---
const dt = 1 / 60;
const bottomLimit = -2.0;
const topLimit = 3.0;

function updatePhysics() {
  objectMass = safeNum(objectDensity * objectVolume, 400);
  weight = safeNum(objectMass * gravity, 0);

  // Object bottom and top (assuming object centered at objectY, height = objectHeight)
  const objectBottom = objectY - objectHeight / 2;
  const objectTop = objectY + objectHeight / 2;

  // Calculate submerged fraction
  if (objectBottom >= waterLevel) {
    // Fully above water
    submergedFraction = 0;
  } else if (objectTop <= waterLevel) {
    // Fully submerged
    submergedFraction = 1;
  } else {
    // Partially submerged
    const submergedDepth = waterLevel - objectBottom;
    submergedFraction = Math.max(0, Math.min(1, submergedDepth / objectHeight));
  }

  submergedFraction = safeNum(submergedFraction, 0);
  const submergedVolume = submergedFraction * objectVolume;

  buoyantForce = safeNum(fluidDensity * gravity * submergedVolume, 0);
  netForce = safeNum(buoyantForce - weight, 0);

  // Acceleration
  const acceleration = safeNum(netForce / objectMass, 0);

  velocityY += acceleration * dt;
  velocityY *= dampingFactor;
  velocityY = safeNum(velocityY, 0);

  objectY += velocityY * dt;
  objectY = safeNum(objectY, 0);

  // Clamp
  if (objectY < bottomLimit) {
    objectY = bottomLimit;
    velocityY = 0;
  }
  if (objectY > topLimit) {
    objectY = topLimit;
    velocityY = 0;
  }

  // Determine sim state
  const objectBottomNow = objectY - objectHeight / 2;
  if (objectY <= bottomLimit + 0.01) {
    simState = 'resting';
  } else if (objectBottomNow >= waterLevel) {
    simState = 'falling';
  } else if (submergedFraction > 0 && Math.abs(velocityY) < 0.01) {
    simState = 'floating';
  } else if (submergedFraction > 0 && netForce < 0) {
    simState = 'sinking';
  } else if (submergedFraction > 0) {
    simState = 'floating';
  } else {
    simState = 'falling';
  }

  // Update model position
  if (model) {
    model.position.y = objectY;
  }
}

// --- HUD Update ---
function updateHUD() {
  document.getElementById('hud-obj-density').textContent = objectDensity + ' kg/m³';
  document.getElementById('hud-fluid-density').textContent = fluidDensity + ' kg/m³';
  document.getElementById('hud-obj-y').textContent = objectY.toFixed(2);
  document.getElementById('hud-vel-y').textContent = velocityY.toFixed(3);
  document.getElementById('hud-buoyant').textContent = buoyantForce.toFixed(2) + ' N';
  document.getElementById('hud-weight').textContent = weight.toFixed(2) + ' N';
  document.getElementById('hud-net').textContent = netForce.toFixed(2) + ' N';
  document.getElementById('hud-submerged').textContent = submergedFraction.toFixed(2);
  
  const stateEl = document.getElementById('hud-state');
  stateEl.textContent = simState;
  stateEl.className = 'hud-value state-' + simState;
}

// --- Update Global State ---
function updateGlobalState() {
  const elapsed = (performance.now() - startTime) / 1000;
  window.__3D_STATE__ = {
    objectDensity: objectDensity,
    fluidDensity: fluidDensity,
    objectY: parseFloat(objectY.toFixed(2)),
    velocityY: parseFloat(velocityY.toFixed(3)),
    buoyantForce: parseFloat(buoyantForce.toFixed(2)),
    weight: parseFloat(weight.toFixed(2)),
    netForce: parseFloat(netForce.toFixed(2)),
    submergedFraction: parseFloat(submergedFraction.toFixed(2)),
    waterLevel: DEFAULTS.waterLevel,
    simState: simState,
    modelLoaded: modelLoaded,
    timeElapsed: parseFloat(elapsed.toFixed(2)),
    dampingFactor: DEFAULTS.dampingFactor,
    objectVolume: DEFAULTS.objectVolume
  };
}

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);
  
  updatePhysics();
  updateHUD();
  updateGlobalState();
  
  // Gentle water surface animation
  waterPlane.position.y = waterLevel + Math.sin(performance.now() * 0.001) * 0.02;
  
  // Slight model rotation for visual interest
  if (model && submergedFraction > 0 && simState !== 'resting') {
    model.rotation.y += 0.003;
  }
  
  controls.update();
  renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
