<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buoyancy Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: monospace;
            color: #ffffff;
            user-select: none;
        }
        #control-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }
        button {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            text-align: left;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1976D2;
        }
        button:active {
            background-color: #0D47A1;
        }
        #hud {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #333;
            z-index: 10;
            pointer-events: none;
            min-width: 250px;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .hud-label {
            color: #aaa;
        }
        .hud-value {
            font-weight: bold;
            color: #4CAF50;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="control-panel">
        <button id="btn-increase-density">Increase Object Density +50</button>
        <button id="btn-decrease-density">Decrease Object Density -50</button>
        <button id="btn-increase-fluid">Increase Fluid Density +100</button>
        <button id="btn-decrease-fluid">Decrease Fluid Density -100</button>
        <button id="btn-drop">Drop Object</button>
        <button id="btn-reset" style="background-color: #f44336;">Reset All</button>
    </div>

    <div id="hud">
        <div class="hud-row"><span class="hud-label">Object Density:</span><span class="hud-value" id="hud-obj-density"></span></div>
        <div class="hud-row"><span class="hud-label">Fluid Density:</span><span class="hud-value" id="hud-fluid-density"></span></div>
        <div class="hud-row"><span class="hud-label">Object Y:</span><span class="hud-value" id="hud-obj-y"></span></div>
        <div class="hud-row"><span class="hud-label">Velocity Y:</span><span class="hud-value" id="hud-vel-y"></span></div>
        <div class="hud-row"><span class="hud-label">Buoyant Force:</span><span class="hud-value" id="hud-buoyancy"></span></div>
        <div class="hud-row"><span class="hud-label">Weight:</span><span class="hud-value" id="hud-weight"></span></div>
        <div class="hud-row"><span class="hud-label">Net Force:</span><span class="hud-value" id="hud-net-force"></span></div>
        <div class="hud-row"><span class="hud-label">Submerged Frac:</span><span class="hud-value" id="hud-submerged"></span></div>
        <div class="hud-row"><span class="hud-label">State:</span><span class="hud-value" id="hud-state" style="color: #FFC107;"></span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Physics & State Variables ---
        const INITIAL_STATE = {
            objectDensity: 800,
            fluidDensity: 1000,
            objectY: 2.0,
            velocityY: 0
        };

        let objectDensity = INITIAL_STATE.objectDensity;
        let fluidDensity = INITIAL_STATE.fluidDensity;
        let objectY = INITIAL_STATE.objectY;
        let velocityY = INITIAL_STATE.velocityY;

        const gravity = 9.81;
        const objectVolume = 0.5;
        const waterLevel = 1.0;
        const dampingFactor = 0.95;
        const dt = 1 / 60;
        const objectHeight = 1.5;
        const halfHeight = objectHeight / 2;

        let buoyantForce = 0;
        let weight = 0;
        let netForce = 0;
        let submergedFraction = 0;
        let simState = 'falling';
        let modelLoaded = false;
        let timeElapsed = 0;

        // --- Global State Object ---
        window.__3D_STATE__ = {
            objectDensity, fluidDensity, objectY, velocityY,
            buoyantForce, weight, netForce, submergedFraction,
            waterLevel, simState, modelLoaded, timeElapsed,
            dampingFactor, objectVolume
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Environment Objects ---
        // Tank
        const tankGeo = new THREE.BoxGeometry(6, 5, 4);
        const tankMat = new THREE.MeshPhysicalMaterial({
            color: 0x2196F3,
            transparent: true,
            opacity: 0.25,
            transmission: 0.5,
            roughness: 0.1,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const tank = new THREE.Mesh(tankGeo, tankMat);
        scene.add(tank);

        // Tank Edges
        const edges = new THREE.EdgesGeometry(tankGeo);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x4fc3f7, opacity: 0.5, transparent: true }));
        scene.add(line);

        // Water Surface
        const waterGeo = new THREE.PlaneGeometry(5.98, 3.98);
        const waterMat = new THREE.MeshBasicMaterial({
            color: 0x1976D2,
            transparent: true,
            opacity: 0.4,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.position.y = waterLevel;
        scene.add(water);

        // Ground (Tank Bottom)
        const groundGeo = new THREE.PlaneGeometry(5.98, 3.98);
        const groundMat = new THREE.MeshBasicMaterial({ color: 0x333344 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -2.49;
        scene.add(ground);

        // --- Model Loading ---
        const modelGroup = new THREE.Group();
        scene.add(modelGroup);

        const loader = new GLTFLoader();
        loader.load(
            '._BrainStem.glb',
            (gltf) => {
                const model = gltf.scene;
                
                // Center and scale model
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                const scale = objectHeight / size.y;
                model.scale.setScalar(scale);
                model.position.sub(center.multiplyScalar(scale));
                
                modelGroup.add(model);
                modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn("Failed to load '._BrainStem.glb', using fallback mesh.", error);
                // Fallback mesh if file not found
                const fallbackGeo = new THREE.CylinderGeometry(0.4, 0.4, objectHeight, 16);
                const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xff5722 });
                const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
                modelGroup.add(fallbackMesh);
                modelLoaded = true;
            }
        );

        // --- UI Interactions ---
        document.getElementById('btn-increase-density').addEventListener('click', () => {
            objectDensity += 50;
        });
        document.getElementById('btn-decrease-density').addEventListener('click', () => {
            objectDensity = Math.max(100, objectDensity - 50);
        });
        document.getElementById('btn-increase-fluid').addEventListener('click', () => {
            fluidDensity = Math.min(2000, fluidDensity + 100);
        });
        document.getElementById('btn-decrease-fluid').addEventListener('click', () => {
            fluidDensity = Math.max(500, fluidDensity - 100);
        });
        document.getElementById('btn-drop').addEventListener('click', () => {
            objectY = 3.0;
            velocityY = 0;
        });
        
        const resetSim = () => {
            objectDensity = INITIAL_STATE.objectDensity;
            fluidDensity = INITIAL_STATE.fluidDensity;
            objectY = INITIAL_STATE.objectY;
            velocityY = INITIAL_STATE.velocityY;
        };
        document.getElementById('btn-reset').addEventListener('click', resetSim);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') fluidDensity = Math.min(2000, fluidDensity + 100);
            if (e.key === 'ArrowDown') fluidDensity = Math.max(500, fluidDensity - 100);
            if (e.key === 'r' || e.key === 'R') resetSim();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics & Render Loop ---
        function updatePhysics() {
            // NaN checks
            if (isNaN(objectY)) objectY = 2.0;
            if (isNaN(velocityY)) velocityY = 0;
            if (isNaN(objectDensity)) objectDensity = 800;
            if (isNaN(fluidDensity)) fluidDensity = 1000;

            const objectMass = objectDensity * objectVolume;
            weight = objectMass * gravity;

            const objBottom = objectY - halfHeight;
            const objTop = objectY + halfHeight;

            if (objBottom >= waterLevel) {
                submergedFraction = 0;
            } else if (objTop <= waterLevel) {
                submergedFraction = 1;
            } else {
                submergedFraction = (waterLevel - objBottom) / objectHeight;
            }
            
            // Clamp
            submergedFraction = Math.max(0, Math.min(1, submergedFraction));

            const submergedVol = submergedFraction * objectVolume;
            buoyantForce = fluidDensity * gravity * submergedVol;
            
            netForce = buoyantForce - weight;

            let acceleration = netForce / objectMass;
            if (isNaN(acceleration)) acceleration = 0;

            velocityY += acceleration * dt;
            velocityY *= dampingFactor;
            objectY += velocityY * dt;

            // Collision with boundaries
            if (objectY <= -2.0) {
                objectY = -2.0;
                velocityY = 0;
            } else if (objectY >= 3.0) {
                objectY = 3.0;
                velocityY = 0;
            }

            // Determine State
            if (objectY <= -2.0) {
                simState = 'resting';
            } else if (submergedFraction === 0 && velocityY < 0) {
                simState = 'falling';
            } else if (submergedFraction > 0 && netForce < 0 && objectY > -2.0) {
                simState = 'sinking';
            } else if (submergedFraction > 0 && Math.abs(velocityY) < 0.01 && objectY > -2.0) {
                simState = 'floating';
            } else if (submergedFraction > 0 && netForce >= 0) {
                simState = 'floating'; // Bobbing up
            } else {
                simState = 'falling'; // Fallback
            }

            // Update Mesh
            modelGroup.position.y = objectY;

            // Update Global State
            timeElapsed += dt;
            window.__3D_STATE__.objectDensity = objectDensity;
            window.__3D_STATE__.fluidDensity = fluidDensity;
            window.__3D_STATE__.objectY = Number(objectY.toFixed(2));
            window.__3D_STATE__.velocityY = Number(velocityY.toFixed(3));
            window.__3D_STATE__.buoyantForce = Number(buoyantForce.toFixed(2));
            window.__3D_STATE__.weight = Number(weight.toFixed(2));
            window.__3D_STATE__.netForce = Number(netForce.toFixed(2));
            window.__3D_STATE__.submergedFraction = Number(submergedFraction.toFixed(2));
            window.__3D_STATE__.simState = simState;
            window.__3D_STATE__.modelLoaded = modelLoaded;
            window.__3D_STATE__.timeElapsed = timeElapsed;
        }

        function updateHUD() {
            document.getElementById('hud-obj-density').innerText = `${objectDensity} kg/m³`;
            document.getElementById('hud-fluid-density').innerText = `${fluidDensity} kg/m³`;
            document.getElementById('hud-obj-y').innerText = objectY.toFixed(2);
            document.getElementById('hud-vel-y').innerText = velocityY.toFixed(3);
            document.getElementById('hud-buoyancy').innerText = buoyantForce.toFixed(2) + ' N';
            document.getElementById('hud-weight').innerText = weight.toFixed(2) + ' N';
            document.getElementById('hud-net-force').innerText = netForce.toFixed(2) + ' N';
            document.getElementById('hud-submerged').innerText = submergedFraction.toFixed(2);
            document.getElementById('hud-state').innerText = simState.toUpperCase();
            
            // Color code state
            const stateEl = document.getElementById('hud-state');
            if (simState === 'floating') stateEl.style.color = '#4CAF50';
            else if (simState === 'sinking') stateEl.style.color = '#F44336';
            else if (simState === 'resting') stateEl.style.color = '#9E9E9E';
            else stateEl.style.color = '#FFC107';
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
