<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Archery Target Practice</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before {
            top: 9px;
            left: 0;
            width: 20px;
            height: 2px;
        }
        #crosshair::after {
            top: 0;
            left: 9px;
            width: 2px;
            height: 20px;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        #arrows-remaining {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            text-align: center;
        }
        #round-over-msg {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #FFD700;
            display: none;
            text-align: center;
            text-shadow: 2px 2px 4px #000;
        }
        #debug-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            border-radius: 5px;
            display: none;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            min-width: 200px;
        }
        #pause-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: bold;
            color: white;
            display: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="crosshair"></div>
    <div id="hud">
        <div id="score-display">Score: 0</div>
        <div id="arrows-remaining">Arrows: 5/5</div>
        <div id="instructions">Move Mouse to Aim | Left Click to Fire<br>R: Reset | D: Debug | P: Pause</div>
        <div id="round-over-msg">Round Over!<br><span style="font-size: 24px;">Press R to restart</span></div>
        <div id="pause-msg">PAUSED</div>
    </div>
    <div id="debug-overlay"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            score: 0,
            arrowsRemaining: 5,
            arrowsFired: 0,
            isPaused: false,
            debugOverlayVisible: false,
            lastHitScore: 0,
            lastHitDistance: 0,
            arrowInFlight: false,
            arrowPosition: null,
            arrowVelocity: null,
            chairLoaded: false,
            roundOver: false,
            targetPosition: { x: 0, y: 3, z: -15 }
        };

        const state = window.__3D_STATE__;

        // DOM Elements
        const scoreDisplay = document.getElementById('score-display');
        const arrowsDisplay = document.getElementById('arrows-remaining');
        const roundOverMsg = document.getElementById('round-over-msg');
        const debugOverlay = document.getElementById('debug-overlay');
        const pauseMsg = document.getElementById('pause-msg');

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x556B2F });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Archery Target
        const targetGroup = new THREE.Group();
        targetGroup.position.set(state.targetPosition.x, state.targetPosition.y, state.targetPosition.z);

        const rings = [
            { radius: 1.8, color: 0xFFFFFF, zOffset: 0 },
            { radius: 1.2, color: 0x0000FF, zOffset: 0.05 },
            { radius: 0.7, color: 0xFFFF00, zOffset: 0.10 },
            { radius: 0.3, color: 0xFF0000, zOffset: 0.15 }
        ];

        rings.forEach(ring => {
            const geo = new THREE.CylinderGeometry(ring.radius, ring.radius, 0.05, 32);
            const mat = new THREE.MeshStandardMaterial({ color: ring.color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = Math.PI / 2;
            mesh.position.z = ring.zOffset;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            targetGroup.add(mesh);
        });
        
        // Target Stand
        const standGeo = new THREE.CylinderGeometry(0.1, 0.1, 3);
        const standMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const stand = new THREE.Mesh(standGeo, standMat);
        stand.position.set(0, -1.5, 0);
        stand.castShadow = true;
        targetGroup.add(stand);

        scene.add(targetGroup);

        // Load Chair
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/SheenChair/glTF-Binary/SheenChair.glb',
            (gltf) => {
                const chair = gltf.scene;
                chair.position.set(-4, 0, 5);
                chair.scale.set(2, 2, 2);
                chair.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                scene.add(chair);
                state.chairLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading chair:', error)
        );

        // Arrow Mechanics
        let activeArrow = null;
        let arrowVelocity = new THREE.Vector3();
        const stuckArrows = [];
        const GRAVITY = 9.8;
        const INITIAL_SPEED = 30;

        function createArrowMesh() {
            const group = new THREE.Group();
            
            // Shaft
            const shaftGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 8);
            const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const shaft = new THREE.Mesh(shaftGeo, shaftMat);
            shaft.rotation.x = Math.PI / 2;
            shaft.castShadow = true;
            group.add(shaft);

            // Tip
            const tipGeo = new THREE.ConeGeometry(0.06, 0.2, 8);
            const tipMat = new THREE.MeshStandardMaterial({ color: 0xC0C0C0 });
            const tip = new THREE.Mesh(tipGeo, tipMat);
            tip.rotation.x = -Math.PI / 2;
            tip.position.z = -0.85; // 1.5/2 + 0.1
            tip.castShadow = true;
            group.add(tip);

            // Fletching
            const fletchGeo = new THREE.BoxGeometry(0.02, 0.15, 0.3);
            const fletchMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const fletch1 = new THREE.Mesh(fletchGeo, fletchMat);
            fletch1.position.z = 0.6;
            fletch1.position.y = 0.08;
            const fletch2 = new THREE.Mesh(fletchGeo, fletchMat);
            fletch2.position.z = 0.6;
            fletch2.position.y = -0.08;
            const fletch3 = new THREE.Mesh(fletchGeo, fletchMat);
            fletch3.position.z = 0.6;
            fletch3.position.x = 0.08;
            fletch3.rotation.z = Math.PI / 2;
            const fletch4 = new THREE.Mesh(fletchGeo, fletchMat);
            fletch4.position.z = 0.6;
            fletch4.position.x = -0.08;
            fletch4.rotation.z = Math.PI / 2;
            
            group.add(fletch1, fletch2, fletch3, fletch4);

            return group;
        }

        // Input Handling
        let mouseX = 0;
        let mouseY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('mousedown', (e) => {
            if (e.button !== 0 || state.roundOver || state.isPaused || state.arrowInFlight) return;

            activeArrow = createArrowMesh();
            activeArrow.position.set(0, 3, 8);
            scene.add(activeArrow);

            // Map mouse to angles: max ±5 deg horizontal, ±3 deg vertical
            const yaw = -mouseX * 5 * THREE.MathUtils.DEG2RAD;
            const pitch = mouseY * 3 * THREE.MathUtils.DEG2RAD;

            arrowVelocity.set(0, 0, -INITIAL_SPEED);
            arrowVelocity.applyAxisAngle(new THREE.Vector3(1, 0, 0), pitch);
            arrowVelocity.applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);

            state.arrowInFlight = true;
            state.arrowPosition = { x: activeArrow.position.x, y: activeArrow.position.y, z: activeArrow.position.z };
            state.arrowVelocity = { x: arrowVelocity.x, y: arrowVelocity.y, z: arrowVelocity.z };
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                resetRound();
            } else if (key === 'd') {
                state.debugOverlayVisible = !state.debugOverlayVisible;
                debugOverlay.style.display = state.debugOverlayVisible ? 'block' : 'none';
            } else if (key === 'p') {
                state.isPaused = !state.isPaused;
                pauseMsg.style.display = state.isPaused ? 'block' : 'none';
            }
        });

        function resetRound() {
            stuckArrows.forEach(arrow => scene.remove(arrow));
            stuckArrows.length = 0;
            if (activeArrow) {
                scene.remove(activeArrow);
                activeArrow = null;
            }
            
            state.score = 0;
            state.arrowsRemaining = 5;
            state.arrowsFired = 0;
            state.roundOver = false;
            state.arrowInFlight = false;
            state.arrowPosition = null;
            state.arrowVelocity = null;
            state.lastHitScore = 0;
            state.lastHitDistance = 0;
            
            roundOverMsg.style.display = 'none';
            updateHUD();
        }

        function updateHUD() {
            scoreDisplay.innerText = `Score: ${state.score}`;
            arrowsDisplay.innerText = `Arrows: ${state.arrowsRemaining}/5`;
            if (state.roundOver) {
                roundOverMsg.style.display = 'block';
            }
        }

        // FPS Calculation
        let frameCount = 0;
        let lastTime = performance.now();
        let fps = 0;

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            const now = performance.now();
            frameCount++;
            if (now - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = now;
            }

            if (!state.isPaused) {
                if (state.arrowInFlight && activeArrow) {
                    // Physics update
                    arrowVelocity.y -= GRAVITY * dt;
                    
                    // Store previous position for collision detection
                    const prevZ = activeArrow.position.z;
                    
                    activeArrow.position.addScaledVector(arrowVelocity, dt);

                    // Align arrow to velocity
                    const lookAtPt = activeArrow.position.clone().add(arrowVelocity);
                    activeArrow.lookAt(lookAtPt);

                    state.arrowPosition = { x: activeArrow.position.x, y: activeArrow.position.y, z: activeArrow.position.z };
                    state.arrowVelocity = { x: arrowVelocity.x, y: arrowVelocity.y, z: arrowVelocity.z };

                    // Collision detection with target plane (Z = -15)
                    if (prevZ > -15 && activeArrow.position.z <= -15) {
                        // Interpolate exact hit position
                        const dz = activeArrow.position.z - (-15);
                        const tBack = dz / arrowVelocity.z;
                        activeArrow.position.addScaledVector(arrowVelocity, -tBack);

                        state.arrowInFlight = false;
                        state.arrowsRemaining--;
                        state.arrowsFired++;

                        // Calculate score
                        const dx = activeArrow.position.x - state.targetPosition.x;
                        const dy = activeArrow.position.y - state.targetPosition.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        state.lastHitDistance = distance;

                        let score = 0;
                        if (distance <= 0.3) score = 100;
                        else if (distance <= 0.7) score = 75;
                        else if (distance <= 1.2) score = 50;
                        else if (distance <= 1.8) score = 25;

                        state.lastHitScore = score;
                        state.score += score;

                        stuckArrows.push(activeArrow);
                        activeArrow = null;

                        if (state.arrowsRemaining <= 0) {
                            state.roundOver = true;
                        }

                        updateHUD();
                    }
                }
            }

            // Update Debug Overlay
            if (state.debugOverlayVisible) {
                const vel = state.arrowVelocity;
                const pos = state.arrowPosition;
                debugOverlay.innerHTML = `
                    FPS: ${fps}<br>
                    Velocity: ${vel ? `${vel.x.toFixed(2)}, ${vel.y.toFixed(2)}, ${vel.z.toFixed(2)}` : 'N/A'}<br>
                    Position: ${pos ? `${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)}` : 'N/A'}<br>
                    Gravity: ${GRAVITY.toFixed(1)} m/s²<br>
                    Last Hit Dist: ${state.lastHitDistance.toFixed(3)}
                `;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateHUD();
        animate();
    </script>
</body>
</html>
