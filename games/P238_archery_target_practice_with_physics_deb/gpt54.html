<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Archery Target Practice</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #87CEEB;
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #score-display,
    #arrows-remaining,
    #instructions,
    #round-over-msg,
    #debug-overlay {
      position: absolute;
      color: white;
      z-index: 10;
      user-select: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }

    #score-display {
      top: 12px;
      left: 12px;
      font-size: 24px;
      font-weight: bold;
    }

    #arrows-remaining {
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
    }

    #instructions {
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      text-align: center;
      white-space: nowrap;
    }

    #round-over-msg {
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: bold;
      color: #ffe082;
      display: none;
    }

    #debug-overlay {
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      color: #00ff66;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.4;
      padding: 10px 12px;
      border: 1px solid rgba(0,255,100,0.35);
      min-width: 250px;
      display: none;
      white-space: pre-line;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: white;
      box-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    #crosshair::before {
      left: 50%;
      top: 0;
      width: 2px;
      height: 24px;
      transform: translateX(-50%);
    }

    #crosshair::after {
      top: 50%;
      left: 0;
      width: 24px;
      height: 2px;
      transform: translateY(-50%);
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <div id="score-display">Score: 0</div>
    <div id="arrows-remaining">Arrows: 5/5</div>
    <div id="round-over-msg">Round Over! Press R to restart</div>
    <div id="instructions">Move mouse to aim • Left Click to fire • R reset • D debug • P pause</div>
    <div id="debug-overlay"></div>
    <div id="crosshair"></div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const scoreDisplay = document.getElementById("score-display");
    const arrowsRemainingDisplay = document.getElementById("arrows-remaining");
    const roundOverMsg = document.getElementById("round-over-msg");
    const debugOverlay = document.getElementById("debug-overlay");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 3, 10);
    camera.lookAt(0, 3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 60;
    dirLight.shadow.camera.left = -25;
    dirLight.shadow.camera.right = 25;
    dirLight.shadow.camera.top = 25;
    dirLight.shadow.camera.bottom = -25;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x556B2F })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const targetPosition = new THREE.Vector3(0, 3, -15);
    const targetGroup = new THREE.Group();
    targetGroup.position.copy(targetPosition);

    function makeRing(radius, color, zOffset) {
      const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, 0.05, 64),
        new THREE.MeshStandardMaterial({ color })
      );
      mesh.rotation.x = Math.PI / 2;
      mesh.position.z = zOffset;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    targetGroup.add(makeRing(1.8, 0xffffff, 0.00));
    targetGroup.add(makeRing(1.2, 0x0000ff, 0.03));
    targetGroup.add(makeRing(0.7, 0xffff00, 0.06));
    targetGroup.add(makeRing(0.3, 0xff0000, 0.09));

    const targetStand = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.08, 3, 16),
      new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
    );
    targetStand.position.set(0, -1.5, -0.1);
    targetStand.castShadow = true;
    targetStand.receiveShadow = true;
    targetGroup.add(targetStand);

    scene.add(targetGroup);

    const loader = new GLTFLoader();
    let chairLoaded = false;
    loader.load(
      "SheenChair.glb",
      (gltf) => {
        const chair = gltf.scene;
        chair.position.set(-4, 0, 5);
        chair.scale.set(2, 2, 2);
        chair.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(chair);
        chairLoaded = true;
      },
      undefined,
      () => {
        chairLoaded = false;
        const fallbackChair = new THREE.Group();

        const seat = new THREE.Mesh(
          new THREE.BoxGeometry(1, 0.2, 1),
          new THREE.MeshStandardMaterial({ color: 0x6d4c41 })
        );
        seat.position.y = 1;
        fallbackChair.add(seat);

        const back = new THREE.Mesh(
          new THREE.BoxGeometry(1, 1.2, 0.2),
          new THREE.MeshStandardMaterial({ color: 0x795548 })
        );
        back.position.set(0, 1.6, -0.4);
        fallbackChair.add(back);

        const legGeo = new THREE.CylinderGeometry(0.06, 0.06, 1, 8);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x4e342e });
        const legPositions = [
          [-0.4, 0.5, -0.4],
          [0.4, 0.5, -0.4],
          [-0.4, 0.5, 0.4],
          [0.4, 0.5, 0.4]
        ];
        for (const [x, y, z] of legPositions) {
          const leg = new THREE.Mesh(legGeo, legMat);
          leg.position.set(x, y, z);
          fallbackChair.add(leg);
        }

        fallbackChair.position.set(-4, 0, 5);
        fallbackChair.scale.set(2, 2, 2);
        fallbackChair.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(fallbackChair);
      }
    );

    function createArrowMesh() {
      const group = new THREE.Group();

      const shaft = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.03, 1.5, 12),
        new THREE.MeshStandardMaterial({ color: 0x8B4513 })
      );
      shaft.rotation.x = Math.PI / 2;
      shaft.castShadow = true;
      shaft.receiveShadow = true;
      group.add(shaft);

      const tip = new THREE.Mesh(
        new THREE.ConeGeometry(0.07, 0.25, 12),
        new THREE.MeshStandardMaterial({ color: 0xC0C0C0 })
      );
      tip.rotation.x = -Math.PI / 2;
      tip.position.z = -0.875;
      tip.castShadow = true;
      tip.receiveShadow = true;
      group.add(tip);

      const fletchingMat = new THREE.MeshStandardMaterial({ color: 0xff1744 });
      for (let i = 0; i < 3; i++) {
        const fin = new THREE.Mesh(
          new THREE.BoxGeometry(0.02, 0.18, 0.12),
          fletchingMat
        );
        fin.position.z = 0.68;
        fin.rotation.z = (Math.PI * 2 / 3) * i;
        group.add(fin);
      }

      return group;
    }

    const GRAVITY = 9.8;
    const MAX_ARROWS = 5;
    const arrowStart = new THREE.Vector3(0, 3, 8);

    let score = 0;
    let arrowsFired = 0;
    let arrowsRemaining = MAX_ARROWS;
    let isPaused = false;
    let debugOverlayVisible = false;
    let arrowInFlight = false;
    let currentArrow = null;
    let currentVelocity = null;
    let lastHitScore = 0;
    let lastHitDistance = 0;
    let roundOver = false;

    let aimYaw = 0;
    let aimPitch = 0;

    const activeArrows = [];

    window.__3D_STATE__ = {
      score: 0,
      arrowsRemaining: MAX_ARROWS,
      arrowsFired: 0,
      isPaused: false,
      debugOverlayVisible: false,
      lastHitScore: 0,
      lastHitDistance: 0,
      arrowInFlight: false,
      arrowPosition: null,
      arrowVelocity: null,
      chairLoaded: false,
      roundOver: false,
      targetPosition: { x: targetPosition.x, y: targetPosition.y, z: targetPosition.z }
    };

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${score}`;
      arrowsRemainingDisplay.textContent = `Arrows: ${arrowsRemaining}/${MAX_ARROWS}`;
      roundOverMsg.style.display = roundOver ? "block" : "none";
      debugOverlay.style.display = debugOverlayVisible ? "block" : "none";
    }

    function scoreFromDistance(d) {
      if (d <= 0.3) return 100;
      if (d <= 0.7) return 75;
      if (d <= 1.2) return 50;
      if (d <= 1.8) return 25;
      return 0;
    }

    function fireArrow() {
      if (isPaused || roundOver || arrowInFlight || arrowsRemaining <= 0) return;

      currentArrow = createArrowMesh();
      currentArrow.position.copy(arrowStart);
      scene.add(currentArrow);

      const speed = 30;
      const dir = new THREE.Vector3(0, 0, -1);
      dir.applyEuler(new THREE.Euler(aimPitch, aimYaw, 0, "YXZ")).normalize();

      currentVelocity = dir.multiplyScalar(speed);
      currentArrow.lookAt(currentArrow.position.clone().add(currentVelocity));

      activeArrows.push(currentArrow);
      arrowInFlight = true;
      arrowsFired += 1;
      arrowsRemaining = MAX_ARROWS - arrowsFired;

      if (arrowsFired >= MAX_ARROWS) {
        roundOver = true;
      }

      updateHUD();
    }

    function resetRound() {
      for (const arrow of activeArrows) {
        scene.remove(arrow);
      }
      activeArrows.length = 0;
      score = 0;
      arrowsFired = 0;
      arrowsRemaining = MAX_ARROWS;
      isPaused = false;
      arrowInFlight = false;
      currentArrow = null;
      currentVelocity = null;
      lastHitScore = 0;
      lastHitDistance = 0;
      roundOver = false;
      updateHUD();
    }

    window.addEventListener("mousemove", (event) => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (event.clientX - cx) / cx;
      const dy = (event.clientY - cy) / cy;

      const maxYaw = THREE.MathUtils.degToRad(5);
      const maxPitch = THREE.MathUtils.degToRad(3);

      aimYaw = THREE.MathUtils.clamp(dx * maxYaw, -maxYaw, maxYaw);
      aimPitch = THREE.MathUtils.clamp(-dy * maxPitch, -maxPitch, maxPitch);
    });

    window.addEventListener("mousedown", (event) => {
      if (event.button === 0) fireArrow();
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (key === "r") {
        resetRound();
      } else if (key === "d") {
        debugOverlayVisible = !debugOverlayVisible;
        updateHUD();
      } else if (key === "p") {
        isPaused = !isPaused;
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let lastTime = performance.now();
    let fps = 0;
    let fpsFrames = 0;
    let fpsAccum = 0;

    function updateDebugOverlay() {
      const pos = currentArrow ? currentArrow.position : null;
      const vel = currentVelocity;

      debugOverlay.textContent =
`Velocity: ${vel ? `${vel.x.toFixed(2)}, ${vel.y.toFixed(2)}, ${vel.z.toFixed(2)}` : "null"}
Position: ${pos ? `${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)}` : "null"}
Gravity: ${GRAVITY.toFixed(2)}
FPS: ${fps.toFixed(1)}
Last Hit Distance: ${lastHitDistance.toFixed(3)}`;
    }

    function updateState() {
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.arrowsRemaining = arrowsRemaining;
      window.__3D_STATE__.arrowsFired = arrowsFired;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.debugOverlayVisible = debugOverlayVisible;
      window.__3D_STATE__.lastHitScore = lastHitScore;
      window.__3D_STATE__.lastHitDistance = lastHitDistance;
      window.__3D_STATE__.arrowInFlight = arrowInFlight;
      window.__3D_STATE__.arrowPosition = currentArrow
        ? {
            x: currentArrow.position.x,
            y: currentArrow.position.y,
            z: currentArrow.position.z
          }
        : null;
      window.__3D_STATE__.arrowVelocity = currentVelocity
        ? {
            x: currentVelocity.x,
            y: currentVelocity.y,
            z: currentVelocity.z
          }
        : null;
      window.__3D_STATE__.chairLoaded = chairLoaded;
      window.__3D_STATE__.roundOver = roundOver;
      window.__3D_STATE__.targetPosition = {
        x: targetPosition.x,
        y: targetPosition.y,
        z: targetPosition.z
      };
    }

    function animate(now) {
      requestAnimationFrame(animate);

      const dtRaw = (now - lastTime) / 1000;
      lastTime = now;
      const dt = Math.min(dtRaw || 0, 0.05);

      fpsFrames++;
      fpsAccum += dt;
      if (fpsAccum >= 0.25) {
        fps = fpsFrames / fpsAccum;
        fpsFrames = 0;
        fpsAccum = 0;
      }

      if (!isPaused && arrowInFlight && currentArrow && currentVelocity) {
        const prevPos = currentArrow.position.clone();

        currentVelocity.y -= GRAVITY * dt;
        currentArrow.position.x += currentVelocity.x * dt;
        currentArrow.position.y += currentVelocity.y * dt;
        currentArrow.position.z += currentVelocity.z * dt;

        const lookDir = currentVelocity.clone().normalize();
        currentArrow.lookAt(currentArrow.position.clone().add(lookDir));

        if (prevPos.z > targetPosition.z && currentArrow.position.z <= targetPosition.z) {
          const t = (targetPosition.z - prevPos.z) / (currentArrow.position.z - prevPos.z);
          const hitX = THREE.MathUtils.lerp(prevPos.x, currentArrow.position.x, t);
          const hitY = THREE.MathUtils.lerp(prevPos.y, currentArrow.position.y, t);
          const dx = hitX - targetPosition.x;
          const dy = hitY - targetPosition.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          lastHitDistance = dist;
          lastHitScore = scoreFromDistance(dist);
          score += lastHitScore;

          currentArrow.position.set(hitX, hitY, targetPosition.z + 0.15);
          currentVelocity = null;
          arrowInFlight = false;
          currentArrow = null;

          updateHUD();
        } else if (currentArrow.position.y <= 0 || currentArrow.position.z < -40) {
          lastHitDistance = 999;
          lastHitScore = 0;
          currentVelocity = null;
          arrowInFlight = false;
          currentArrow = null;
          updateHUD();
        }
      }

      if (debugOverlayVisible) {
        updateDebugOverlay();
      }

      updateState();
      renderer.render(scene, camera);
    }

    updateHUD();
    updateState();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
