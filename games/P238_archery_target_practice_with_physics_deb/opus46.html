<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Archery Target Practice</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }

  #crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
  }
  #crosshair .h-line {
    position: absolute;
    width: 30px;
    height: 2px;
    background: white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  #crosshair .v-line {
    position: absolute;
    width: 2px;
    height: 30px;
    background: white;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  #score-display {
    position: fixed;
    top: 15px;
    left: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    z-index: 10;
  }

  #arrows-remaining {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    z-index: 10;
  }

  #instructions {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 14px;
    text-align: center;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    z-index: 10;
    background: rgba(0,0,0,0.4);
    padding: 8px 16px;
    border-radius: 8px;
  }

  #round-over-msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFD700;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
    z-index: 20;
    display: none;
    text-align: center;
    background: rgba(0,0,0,0.6);
    padding: 20px 40px;
    border-radius: 12px;
    border: 2px solid #FFD700;
  }

  #debug-overlay {
    position: fixed;
    top: 15px;
    right: 15px;
    background: rgba(0,0,0,0.7);
    color: #00FF00;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 15px;
    border-radius: 8px;
    z-index: 15;
    display: none;
    min-width: 280px;
    line-height: 1.6;
    border: 1px solid #00FF00;
  }

  #hit-feedback {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFD700;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
    z-index: 15;
    display: none;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="crosshair">
  <div class="h-line"></div>
  <div class="v-line"></div>
</div>

<div id="score-display">Score: 0</div>
<div id="arrows-remaining">Arrows: 5/5</div>
<div id="instructions">Mouse: Aim | Click: Fire | R: Reset | D: Debug | P: Pause</div>
<div id="round-over-msg">Round Over!<br>Press R to restart</div>

<div id="debug-overlay">
  <div><strong>=== PHYSICS DEBUG ===</strong></div>
  <div id="dbg-vel">Velocity: -</div>
  <div id="dbg-pos">Position: -</div>
  <div id="dbg-grav">Gravity: 9.8 m/s²</div>
  <div id="dbg-fps">FPS: 0</div>
  <div id="dbg-hit">Last Hit Dist: -</div>
</div>

<div id="hit-feedback"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
  score: 0,
  arrowsRemaining: 5,
  arrowsFired: 0,
  isPaused: false,
  debugOverlayVisible: false,
  lastHitScore: 0,
  lastHitDistance: 0,
  arrowInFlight: false,
  arrowPosition: null,
  arrowVelocity: null,
  chairLoaded: false,
  roundOver: false,
  targetPosition: { x: 0, y: 3, z: -15 }
};
window.__3D_STATE__ = state;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 3, 10);
camera.lookAt(0, 3, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x556B2F });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// ============ TARGET ============
const targetGroup = new THREE.Group();
targetGroup.position.set(0, 3, -15);

const rings = [
  { radius: 1.8, color: 0xFFFFFF, points: 25, zOff: 0 },
  { radius: 1.2, color: 0x0000FF, points: 50, zOff: 0.01 },
  { radius: 0.7, color: 0xFFFF00, points: 75, zOff: 0.02 },
  { radius: 0.3, color: 0xFF0000, points: 100, zOff: 0.03 },
];

rings.forEach(r => {
  const geo = new THREE.CylinderGeometry(r.radius, r.radius, 0.05, 64);
  const mat = new THREE.MeshStandardMaterial({ color: r.color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = Math.PI / 2;
  mesh.position.z = r.zOff;
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  targetGroup.add(mesh);
});

// Target backing
const backGeo = new THREE.CylinderGeometry(2.0, 2.0, 0.15, 64);
const backMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
const backing = new THREE.Mesh(backGeo, backMat);
backing.rotation.x = Math.PI / 2;
backing.position.z = -0.05;
backing.castShadow = true;
backing.receiveShadow = true;
targetGroup.add(backing);

// Target stand
const standGeo = new THREE.BoxGeometry(0.15, 3, 0.15);
const standMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
const standL = new THREE.Mesh(standGeo, standMat);
standL.position.set(-1.5, -1.5, -0.1);
standL.castShadow = true;
targetGroup.add(standL);
const standR = standL.clone();
standR.position.set(1.5, -1.5, -0.1);
targetGroup.add(standR);

scene.add(targetGroup);

// ============ LOAD CHAIR ============
const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/SheenChair.glb',
  (gltf) => {
    const chair = gltf.scene;
    chair.position.set(-4, 0, 5);
    chair.scale.set(2, 2, 2);
    chair.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(chair);
    state.chairLoaded = true;
  },
  undefined,
  (err) => {
    console.warn('Chair load failed:', err);
    // Create placeholder
    const boxGeo = new THREE.BoxGeometry(1, 1.5, 1);
    const boxMat = new THREE.MeshStandardMaterial({ color: 0x654321 });
    const box = new THREE.Mesh(boxGeo, boxMat);
    box.position.set(-4, 0.75, 5);
    box.castShadow = true;
    scene.add(box);
    state.chairLoaded = true;
  }
);

// ============ ARROW CREATION ============
function createArrow() {
  const arrowGroup = new THREE.Group();

  // Shaft
  const shaftGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 8);
  const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const shaft = new THREE.Mesh(shaftGeo, shaftMat);
  shaft.rotation.x = Math.PI / 2;
  shaft.castShadow = true;
  arrowGroup.add(shaft);

  // Tip (cone)
  const tipGeo = new THREE.ConeGeometry(0.06, 0.2, 8);
  const tipMat = new THREE.MeshStandardMaterial({ color: 0xC0C0C0 });
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.rotation.x = -Math.PI / 2;
  tip.position.z = -0.85;
  tip.castShadow = true;
  arrowGroup.add(tip);

  // Fletching
  const fletchGeo = new THREE.PlaneGeometry(0.15, 0.3);
  const fletchMat = new THREE.MeshStandardMaterial({ color: 0xFF4444, side: THREE.DoubleSide });
  for (let i = 0; i < 3; i++) {
    const fletch = new THREE.Mesh(fletchGeo, fletchMat);
    fletch.position.z = 0.65;
    fletch.position.y = 0.07;
    fletch.rotation.z = (i * Math.PI * 2) / 3;
    arrowGroup.add(fletch);
  }

  arrowGroup.position.set(0, 3, 8);
  return arrowGroup;
}

let currentArrow = createArrow();
scene.add(currentArrow);

const stuckArrows = [];
let arrowVelocity = new THREE.Vector3();
const gravity = 9.8;

// ============ AIM ============
let mouseX = 0, mouseY = 0;
const maxAngleH = 5 * (Math.PI / 180);
const maxAngleV = 3 * (Math.PI / 180);

document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = -(e.clientY / window.innerHeight - 0.5) * 2;
});

// ============ FIRE ============
function fireArrow() {
  if (state.arrowInFlight || state.roundOver || state.arrowsRemaining <= 0 || state.isPaused) return;

  state.arrowInFlight = true;
  state.arrowsFired++;
  state.arrowsRemaining--;

  const angleH = mouseX * maxAngleH;
  const angleV = mouseY * maxAngleV;

  const speed = 30;
  arrowVelocity.set(
    Math.sin(angleH) * speed,
    Math.sin(angleV) * speed,
    -Math.cos(angleH) * speed
  );

  currentArrow.position.set(0, 3, 8);

  updateHUD();
}

document.addEventListener('click', () => {
  fireArrow();
});

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === 'r') {
    resetRound();
  } else if (key === 'd') {
    state.debugOverlayVisible = !state.debugOverlayVisible;
    document.getElementById('debug-overlay').style.display = state.debugOverlayVisible ? 'block' : 'none';
  } else if (key === 'p') {
    state.isPaused = !state.isPaused;
  }
});

// ============ RESET ============
function resetRound() {
  state.score = 0;
  state.arrowsRemaining = 5;
  state.arrowsFired = 0;
  state.arrowInFlight = false;
  state.lastHitScore = 0;
  state.lastHitDistance = 0;
  state.roundOver = false;
  state.arrowPosition = null;
  state.arrowVelocity = null;

  // Remove stuck arrows
  stuckArrows.forEach(a => scene.remove(a));
  stuckArrows.length = 0;

  // Remove and recreate current arrow
  scene.remove(currentArrow);
  currentArrow = createArrow();
  scene.add(currentArrow);

  arrowVelocity.set(0, 0, 0);

  document.getElementById('round-over-msg').style.display = 'none';
  document.getElementById('hit-feedback').style.display = 'none';
  updateHUD();
}

// ============ HUD ============
function updateHUD() {
  document.getElementById('score-display').textContent = `Score: ${state.score}`;
  document.getElementById('arrows-remaining').textContent = `Arrows: ${state.arrowsRemaining}/5`;
}

// ============ HIT FEEDBACK ============
let feedbackTimer = 0;
function showHitFeedback(points) {
  const el = document.getElementById('hit-feedback');
  if (points > 0) {
    el.textContent = `+${points}`;
    el.style.color = points === 100 ? '#FF0000' : points === 75 ? '#FFD700' : points === 50 ? '#4444FF' : '#FFFFFF';
  } else {
    el.textContent = 'MISS!';
    el.style.color = '#888888';
  }
  el.style.display = 'block';
  feedbackTimer = 1.5;
}

// ============ SCORE CALCULATION ============
function calculateScore(hitX, hitY) {
  const dx = hitX - 0;
  const dy = hitY - 3;
  const dist = Math.sqrt(dx * dx + dy * dy);

  state.lastHitDistance = dist;

  let points = 0;
  if (dist <= 0.3) points = 100;
  else if (dist <= 0.7) points = 75;
  else if (dist <= 1.2) points = 50;
  else if (dist <= 1.8) points = 25;
  else points = 0;

  state.lastHitScore = points;
  return { points, dist, hitX, hitY };
}

// ============ DEBUG UPDATE ============
let frameCount = 0;
let fpsTime = 0;
let currentFPS = 0;

function updateDebug(dt) {
  frameCount++;
  fpsTime += dt;
  if (fpsTime >= 1.0) {
    currentFPS = Math.round(frameCount / fpsTime);
    frameCount = 0;
    fpsTime = 0;
  }

  if (!state.debugOverlayVisible) return;

  const vel = state.arrowVelocity;
  const pos = state.arrowPosition;

  document.getElementById('dbg-vel').textContent = vel
    ? `Velocity: (${vel.x.toFixed(2)}, ${vel.y.toFixed(2)}, ${vel.z.toFixed(2)})`
    : 'Velocity: -';
  document.getElementById('dbg-pos').textContent = pos
    ? `Position: (${pos.x.toFixed(2)}, ${pos.y.toFixed(2)}, ${pos.z.toFixed(2)})`
    : 'Position: -';
  document.getElementById('dbg-grav').textContent = `Gravity: ${gravity} m/s²`;
  document.getElementById('dbg-fps').textContent = `FPS: ${currentFPS}`;
  document.getElementById('dbg-hit').textContent = `Last Hit Dist: ${state.lastHitDistance > 0 ? state.lastHitDistance.toFixed(3) : '-'}`;
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();

  updateDebug(dt);

  if (state.isPaused) {
    renderer.render(scene, camera);
    return;
  }

  // Feedback timer
  if (feedbackTimer > 0) {
    feedbackTimer -= dt;
    if (feedbackTimer <= 0) {
      document.getElementById('hit-feedback').style.display = 'none';
    }
  }

  // Arrow in flight physics
  if (state.arrowInFlight) {
    // Apply gravity
    arrowVelocity.y -= gravity * dt;

    // Update position
    currentArrow.position.x += arrowVelocity.x * dt;
    currentArrow.position.y += arrowVelocity.y * dt;
    currentArrow.position.z += arrowVelocity.z * dt;

    // Orient arrow along velocity
    const dir = arrowVelocity.clone().normalize();
    const axis = new THREE.Vector3(0, 0, -1);
    const quat = new THREE.Quaternion();
    quat.setFromUnitVectors(axis, dir);
    currentArrow.quaternion.copy(quat);

    // Update state
    state.arrowPosition = {
      x: currentArrow.position.x,
      y: currentArrow.position.y,
      z: currentArrow.position.z
    };
    state.arrowVelocity = {
      x: arrowVelocity.x,
      y: arrowVelocity.y,
      z: arrowVelocity.z
    };

    // Check if arrow reached target plane
    if (currentArrow.position.z <= -15) {
      state.arrowInFlight = false;

      const result = calculateScore(currentArrow.position.x, currentArrow.position.y);
      state.score += result.points;

      showHitFeedback(result.points);

      // Stick arrow at target
      currentArrow.position.z = -14.9;
      const stuckArrow = currentArrow;
      stuckArrows.push(stuckArrow);

      // Check round over
      if (state.arrowsRemaining <= 0) {
        state.roundOver = true;
        document.getElementById('round-over-msg').style.display = 'block';
        state.arrowPosition = null;
        state.arrowVelocity = null;
      } else {
        // Create new arrow
        currentArrow = createArrow();
        scene.add(currentArrow);
        state.arrowPosition = null;
        state.arrowVelocity = null;
      }

      updateHUD();
    }

    // Check if arrow hit ground or went too far
    if (currentArrow.position.y < 0 || currentArrow.position.z < -20) {
      state.arrowInFlight = false;
      state.lastHitScore = 0;
      state.lastHitDistance = 999;

      showHitFeedback(0);

      scene.remove(currentArrow);

      if (state.arrowsRemaining <= 0) {
        state.roundOver = true;
        document.getElementById('round-over-msg').style.display = 'block';
        state.arrowPosition = null;
        state.arrowVelocity = null;
      } else {
        currentArrow = createArrow();
        scene.add(currentArrow);
        state.arrowPosition = null;
        state.arrowVelocity = null;
      }

      updateHUD();
    }
  } else if (!state.roundOver) {
    // Aim preview - slightly move arrow based on mouse
    const angleH = mouseX * maxAngleH;
    const angleV = mouseY * maxAngleV;
    currentArrow.position.set(0, 3, 8);

    // Slight rotation to show aim direction
    const aimDir = new THREE.Vector3(
      Math.sin(angleH),
      Math.sin(angleV),
      -Math.cos(angleH)
    ).normalize();
    const axis = new THREE.Vector3(0, 0, -1);
    const quat = new THREE.Quaternion();
    quat.setFromUnitVectors(axis, aimDir);
    currentArrow.quaternion.copy(quat);
  }

  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
updateHUD();
animate();

</script>
</body>
</html>
