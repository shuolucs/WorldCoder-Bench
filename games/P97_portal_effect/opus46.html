<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual Portal Rendering</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #controls {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 16px 20px; color: #eee;
    backdrop-filter: blur(10px); min-width: 240px;
  }
  #controls h3 { margin-bottom: 12px; font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  .ctrl-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .ctrl-row label { font-size: 13px; }
  .ctrl-row input[type="range"] { width: 120px; accent-color: #0088ff; }
  .ctrl-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: #ff4400; }
  .ctrl-row .val { font-size: 12px; color: #aaa; min-width: 30px; text-align: right; }
  #fpsDisplay { position: fixed; top: 16px; right: 16px; z-index: 100;
    background: rgba(0,0,0,0.7); color: #0f0; padding: 8px 14px;
    border-radius: 8px; font-size: 13px; font-family: monospace; }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="controls">
  <h3>Portal Controls</h3>
  <div class="ctrl-row">
    <label for="portalToggle">Portals Enabled</label>
    <input type="checkbox" id="portalToggle" checked>
  </div>
  <div class="ctrl-row">
    <label for="portalSize">Portal Size</label>
    <input type="range" id="portalSize" min="1" max="4" step="0.1" value="2">
    <span class="val" id="sizeVal">2.0</span>
  </div>
</div>
<div id="fpsDisplay">FPS: --</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Renderer ───
const renderer = new THREE.WebGLRenderer({ antialias: true, stencil: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

// ─── Scene ───
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x111111, 0.012);

// ─── Main Camera ───
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);

// ─── OrbitControls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// ─── Room ───
const roomGeo = new THREE.BoxGeometry(30, 10, 30);
// Assign different colors per face: +x(right/red), -x(left/blue), +y(ceiling), -y(floor), +z, -z
const roomMats = [
  new THREE.MeshStandardMaterial({ color: 0x992222, side: THREE.BackSide }), // +x right wall (red)
  new THREE.MeshStandardMaterial({ color: 0x223388, side: THREE.BackSide }), // -x left wall (blue)
  new THREE.MeshStandardMaterial({ color: 0xbbbbbb, side: THREE.BackSide }), // +y ceiling
  new THREE.MeshStandardMaterial({ color: 0x555555, side: THREE.BackSide }), // -y floor
  new THREE.MeshStandardMaterial({ color: 0x666666, side: THREE.BackSide }), // +z back wall
  new THREE.MeshStandardMaterial({ color: 0x666666, side: THREE.BackSide }), // -z front wall
];
const room = new THREE.Mesh(roomGeo, roomMats);
room.position.set(0, 5, 0);
scene.add(room);

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
scene.add(ambientLight);

const leftLight = new THREE.PointLight(0x4488ff, 40, 25);
leftLight.position.set(-8, 6, 0);
scene.add(leftLight);

const rightLight = new THREE.PointLight(0xff4444, 40, 25);
rightLight.position.set(8, 6, 0);
scene.add(rightLight);

// ─── Marker Objects ───
// Left area: 3 blue/cyan cubes
const leftMarkers = [];
const cubePositions = [
  new THREE.Vector3(-10, 1, -5),
  new THREE.Vector3(-8, 2.5, 4),
  new THREE.Vector3(-6, 1, -1),
];
const cubeColors = [0x0066ff, 0x00cccc, 0x3399ff];
cubePositions.forEach((pos, i) => {
  const size = 1 + Math.random() * 0.8;
  const geo = new THREE.BoxGeometry(size, size, size);
  const mat = new THREE.MeshStandardMaterial({ color: cubeColors[i], roughness: 0.4, metalness: 0.3 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  mesh.rotation.y = Math.random() * Math.PI;
  scene.add(mesh);
  leftMarkers.push(mesh);
});

// Right area: 3 red/orange spheres
const rightMarkers = [];
const spherePositions = [
  new THREE.Vector3(10, 1.5, -4),
  new THREE.Vector3(7, 1, 5),
  new THREE.Vector3(9, 2, 1),
];
const sphereColors = [0xff2200, 0xff6600, 0xff4422];
spherePositions.forEach((pos, i) => {
  const radius = 0.6 + Math.random() * 0.5;
  const geo = new THREE.SphereGeometry(radius, 24, 24);
  const mat = new THREE.MeshStandardMaterial({ color: sphereColors[i], roughness: 0.3, metalness: 0.4 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  scene.add(mesh);
  rightMarkers.push(mesh);
});

// Center: yellow cylinder
const cylGeo = new THREE.CylinderGeometry(1.2, 1.2, 4, 32);
const cylMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.3, metalness: 0.5 });
const cylinder = new THREE.Mesh(cylGeo, cylMat);
cylinder.position.set(0, 2, 0);
scene.add(cylinder);

// ─── Portal Setup ───
let currentPortalSize = 2;

// Render targets
const rtSize = 1024;
const renderTarget1 = new THREE.WebGLRenderTarget(rtSize, rtSize, {
  minFilter: THREE.LinearFilter,
  magFilter: THREE.LinearFilter,
  format: THREE.RGBAFormat,
});
const renderTarget2 = new THREE.WebGLRenderTarget(rtSize, rtSize, {
  minFilter: THREE.LinearFilter,
  magFilter: THREE.LinearFilter,
  format: THREE.RGBAFormat,
});

// Portal cameras
const portalCamera1 = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
const portalCamera2 = new THREE.PerspectiveCamera(60, 1, 0.1, 100);

// Portal groups
const portal1Group = new THREE.Group();
const portal2Group = new THREE.Group();

// Portal 1: left wall, facing +x
portal1Group.position.set(-14.9, 4, 0);
portal1Group.rotation.y = 0; // facing +x

// Portal 2: right wall, facing -x
portal2Group.position.set(14.9, 4, 0);
portal2Group.rotation.y = Math.PI; // facing -x

scene.add(portal1Group);
scene.add(portal2Group);

// Portal frame and surface creation
let portal1Frame, portal1Surface, portal2Frame, portal2Surface;
let portal1SurfaceMat, portal2SurfaceMat;
let portal1DisabledMat, portal2DisabledMat;

function createPortalComponents(size) {
  // Remove old
  while (portal1Group.children.length) portal1Group.remove(portal1Group.children[0]);
  while (portal2Group.children.length) portal2Group.remove(portal2Group.children[0]);

  // Portal 1 frame
  const frameGeo1 = new THREE.TorusGeometry(size, 0.3, 16, 64);
  const frameMat1 = new THREE.MeshStandardMaterial({
    color: 0x004488,
    emissive: 0x0088ff,
    emissiveIntensity: 1.5,
    roughness: 0.2,
    metalness: 0.8,
  });
  portal1Frame = new THREE.Mesh(frameGeo1, frameMat1);
  portal1Group.add(portal1Frame);

  // Portal 1 surface
  const surfGeo1 = new THREE.CircleGeometry(size, 64);
  portal1SurfaceMat = new THREE.MeshBasicMaterial({
    map: renderTarget1.texture,
    side: THREE.FrontSide,
  });
  portal1DisabledMat = new THREE.MeshBasicMaterial({
    color: 0x0044aa,
    side: THREE.FrontSide,
    opacity: 0.8,
    transparent: true,
  });
  portal1Surface = new THREE.Mesh(surfGeo1, portal1SurfaceMat);
  portal1Surface.position.z = 0.01;
  portal1Group.add(portal1Surface);

  // Portal 2 frame
  const frameGeo2 = new THREE.TorusGeometry(size, 0.3, 16, 64);
  const frameMat2 = new THREE.MeshStandardMaterial({
    color: 0x882200,
    emissive: 0xff4400,
    emissiveIntensity: 1.5,
    roughness: 0.2,
    metalness: 0.8,
  });
  portal2Frame = new THREE.Mesh(frameGeo2, frameMat2);
  portal2Group.add(portal2Frame);

  // Portal 2 surface
  const surfGeo2 = new THREE.CircleGeometry(size, 64);
  portal2SurfaceMat = new THREE.MeshBasicMaterial({
    map: renderTarget2.texture,
    side: THREE.FrontSide,
  });
  portal2DisabledMat = new THREE.MeshBasicMaterial({
    color: 0xaa4400,
    side: THREE.FrontSide,
    opacity: 0.8,
    transparent: true,
  });
  portal2Surface = new THREE.Mesh(surfGeo2, portal2SurfaceMat);
  portal2Surface.position.z = 0.01;
  portal2Group.add(portal2Surface);
}

createPortalComponents(currentPortalSize);

// ─── Portal Camera Transform ───
// The idea: if you look into portal2, you should see what portalCamera1 sees from portal1's perspective.
// portalCamera position relative to portal1 = mainCamera position relative to portal2
// So: portalCamera1.worldMatrix = portal1.worldMatrix * inverse(portal2.worldMatrix) * mainCamera.worldMatrix
// And renderTarget1 texture goes on portal2's surface (you see through portal2 what's at portal1)
// Wait, let me re-read the requirements:
// "portalCamera1.position = portal1.worldMatrix * inverse(portal2.worldMatrix) * mainCamera.position"
// "渲染 portalCamera1 视图到 renderTarget1，贴在传送门 1 的门面上"
// So renderTarget1 is on portal1's surface. portalCamera1 shows what you'd see from portal1 
// as if you were looking from the equivalent position at portal2.
// Actually the standard portal logic:
// Portal1 surface shows what portalCamera2 sees (the view from portal2's side)
// Let me re-read: "从传送门 1 看出去就是传送门 2 处的视角"
// So portal1 surface shows the view from portal2's location = portalCamera1 is placed at portal2's equivalent position
// portalCamera1 = portal2.worldMatrix * inverse(portal1.worldMatrix) * mainCamera... no wait.
// 
// Let me follow the spec exactly:
// portalCamera1.position = portal1.worldMatrix * inverse(portal2.worldMatrix) * mainCamera.position
// renderTarget1 goes on portal1's surface
// This means: the camera for portal1's texture is positioned by transforming the main camera 
// from portal2's space to portal1's space... That doesn't sound right for standard portals.
//
// Standard portal rendering:
// Portal A shows what's on the other side of Portal B.
// Camera for Portal A's texture = PortalB.worldMatrix * inverse(PortalA.worldMatrix) * mainCamera
// 
// But the spec says the opposite. Let me just follow the spec literally:
// portalCamera1 = portal1.world * inv(portal2.world) * mainCamera → renders to renderTarget1 → on portal1 surface
// This would mean: standing in front of portal1, you see yourself transformed... 
// Actually, let me think about it differently. The spec says:
// "模拟「从传送门 1 看出去就是传送门 2 处的视角」"
// So looking into portal1, you see what's at portal2. That's standard.
// For that: portalCamera for portal1's texture should be at portal2's side.
// camera_for_portal1 = portal2.world * inv(portal1.world) * mainCamera
// But spec formula says: portalCamera1 = portal1.world * inv(portal2.world) * mainCamera
// 
// I'll implement the CORRECT portal logic (which achieves the described visual effect),
// even if the formula in the spec might have the matrices swapped.
// Correct: portalCameraForPortal1 = portal2.world * inv(portal1.world) * mainCamera
// This camera renders to renderTarget1, which is displayed on portal1's surface.

const _portalMatrix = new THREE.Matrix4();
const _inverseMatrix = new THREE.Matrix4();
const _cameraWorldMatrix = new THREE.Matrix4();

function updatePortalCamera(portalCam, srcPortal, dstPortal, mainCam) {
  // portalCam will be placed such that:
  // portalCam.worldMatrix = dstPortal.matrixWorld * inverse(srcPortal.matrixWorld) * mainCam.matrixWorld
  // But we need a 180° rotation because portals face each other
  
  srcPortal.updateMatrixWorld(true);
  dstPortal.updateMatrixWorld(true);
  mainCam.updateMatrixWorld(true);

  // We need to flip 180 around Y because when you walk through a portal, 
  // you come out the other side facing the opposite direction relative to the portal normal
  const flipMatrix = new THREE.Matrix4().makeRotationY(Math.PI);

  _inverseMatrix.copy(srcPortal.matrixWorld).invert();
  _portalMatrix.copy(dstPortal.matrixWorld).multiply(flipMatrix).multiply(_inverseMatrix).multiply(mainCam.matrixWorld);

  portalCam.matrixAutoUpdate = false;
  portalCam.matrix.copy(_portalMatrix);
  portalCam.matrixWorld.copy(_portalMatrix);
  portalCam.matrixWorldInverse.copy(_portalMatrix).invert();

  // Extract position and quaternion for potential use
  portalCam.matrix.decompose(portalCam.position, portalCam.quaternion, portalCam.scale);
}

// ─── Controls ───
const portalToggle = document.getElementById('portalToggle');
const portalSizeSlider = document.getElementById('portalSize');
const sizeValDisplay = document.getElementById('sizeVal');
const fpsDisplay = document.getElementById('fpsDisplay');

let portalEnabled = true;

portalToggle.addEventListener('change', () => {
  portalEnabled = portalToggle.checked;
  if (!portalEnabled) {
    portal1Surface.material = portal1DisabledMat;
    portal2Surface.material = portal2DisabledMat;
  } else {
    portal1Surface.material = portal1SurfaceMat;
    portal2Surface.material = portal2SurfaceMat;
  }
});

portalSizeSlider.addEventListener('input', () => {
  currentPortalSize = parseFloat(portalSizeSlider.value);
  sizeValDisplay.textContent = currentPortalSize.toFixed(1);
  createPortalComponents(currentPortalSize);
  if (!portalEnabled) {
    portal1Surface.material = portal1DisabledMat;
    portal2Surface.material = portal2DisabledMat;
  }
});

// ─── FPS Counter ───
let frameCount = 0;
let lastFpsTime = performance.now();
let currentFps = 0;

// ─── State ───
window.__3D_STATE__ = {
  portalEnabled: true,
  portalSize: 2,
  cameraPos: { x: 0, y: 5, z: 12 },
  portalPositions: [
    { x: -14.9, y: 4, z: 0 },
    { x: 14.9, y: 4, z: 0 },
  ],
  fps: 0,
};

// ─── Animation particles (portal glow effect) ───
function createPortalParticles(color, parent) {
  const count = 60;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const velocities = [];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = currentPortalSize * (0.5 + Math.random() * 0.5);
    positions[i * 3] = Math.cos(angle) * r;
    positions[i * 3 + 1] = Math.sin(angle) * r;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 0.5;
    velocities.push({
      angle: angle,
      speed: 0.3 + Math.random() * 0.5,
      r: r,
      offset: Math.random() * Math.PI * 2,
    });
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: color,
    size: 0.1,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const points = new THREE.Points(geo, mat);
  parent.add(points);
  return { points, velocities, geo };
}

const particles1 = createPortalParticles(0x0088ff, portal1Group);
const particles2 = createPortalParticles(0xff4400, portal2Group);

function updateParticles(particleData, time) {
  const pos = particleData.geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const v = particleData.velocities[i];
    const angle = v.angle + time * v.speed;
    const r = v.r + Math.sin(time * 2 + v.offset) * 0.3;
    pos.array[i * 3] = Math.cos(angle) * r;
    pos.array[i * 3 + 1] = Math.sin(angle) * r;
    pos.array[i * 3 + 2] = Math.sin(time * 3 + v.offset) * 0.3;
  }
  pos.needsUpdate = true;
}

// ─── Animate ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const time = clock.getElapsedTime();
  const delta = clock.getDelta();

  controls.update();

  // Animate objects
  cylinder.rotation.y = time * 0.5;
  leftMarkers.forEach((m, i) => {
    m.rotation.y = time * (0.3 + i * 0.1);
    m.position.y = 1 + Math.sin(time * 1.5 + i) * 0.3;
  });
  rightMarkers.forEach((m, i) => {
    m.position.y = 1.5 + Math.sin(time * 1.2 + i * 1.5) * 0.4;
  });

  // Update particles
  updateParticles(particles1, time);
  updateParticles(particles2, time);

  // Portal frame glow pulsing
  if (portal1Frame) {
    portal1Frame.material.emissiveIntensity = 1.2 + Math.sin(time * 3) * 0.5;
  }
  if (portal2Frame) {
    portal2Frame.material.emissiveIntensity = 1.2 + Math.sin(time * 3 + Math.PI) * 0.5;
  }

  renderer.clear();

  if (portalEnabled) {
    // ─── Render Portal 1 view (what you see looking into portal1 = view from portal2's side) ───
    updatePortalCamera(portalCamera1, portal1Group, portal2Group, camera);

    // Hide portal1 surface to avoid recursion
    portal1Surface.visible = false;
    // Also hide portal2 surface to avoid seeing the render target recursively
    portal2Surface.visible = false;

    renderer.setRenderTarget(renderTarget1);
    renderer.clear();
    renderer.render(scene, portalCamera1);

    portal1Surface.visible = true;
    portal2Surface.visible = true;

    // ─── Render Portal 2 view (what you see looking into portal2 = view from portal1's side) ───
    updatePortalCamera(portalCamera2, portal2Group, portal1Group, camera);

    portal1Surface.visible = false;
    portal2Surface.visible = false;

    renderer.setRenderTarget(renderTarget2);
    renderer.clear();
    renderer.render(scene, portalCamera2);

    portal1Surface.visible = true;
    portal2Surface.visible = true;

    renderer.setRenderTarget(null);
  }

  // ─── Main render ───
  renderer.clear();
  renderer.render(scene, camera);

  // ─── FPS ───
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    frameCount = 0;
    lastFpsTime = now;
    fpsDisplay.textContent = `FPS: ${currentFps}`;
  }

  // ─── State ───
  const p1Pos = new THREE.Vector3();
  const p2Pos = new THREE.Vector3();
  portal1Group.getWorldPosition(p1Pos);
  portal2Group.getWorldPosition(p2Pos);

  window.__3D_STATE__ = {
    portalEnabled: portalEnabled,
    portalSize: currentPortalSize,
    cameraPos: {
      x: parseFloat(camera.position.x.toFixed(3)),
      y: parseFloat(camera.position.y.toFixed(3)),
      z: parseFloat(camera.position.z.toFixed(3)),
    },
    portalPositions: [
      { x: parseFloat(p1Pos.x.toFixed(3)), y: parseFloat(p1Pos.y.toFixed(3)), z: parseFloat(p1Pos.z.toFixed(3)) },
      { x: parseFloat(p2Pos.x.toFixed(3)), y: parseFloat(p2Pos.y.toFixed(3)), z: parseFloat(p2Pos.z.toFixed(3)) },
    ],
    fps: currentFps,
  };
}

animate();

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
