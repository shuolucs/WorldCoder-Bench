<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 双传送门渲染</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            user-select: none;
            pointer-events: auto;
            z-index: 10;
        }
        .control-group { margin-bottom: 10px; }
        label { cursor: pointer; }
        input[type="range"] { vertical-align: middle; }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="control-group">
            <label>
                <input type="checkbox" id="portalToggle" checked> 启用传送门
            </label>
        </div>
        <div class="control-group">
            <label>
                传送门尺寸: <span id="sizeValue">2.0</span><br>
                <input type="range" id="portalSize" min="1" max="4" step="0.1" value="2">
            </label>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 状态初始化 ---
        window.__3D_STATE__ = {
            portalEnabled: true,
            portalSize: 2,
            cameraPos: { x: 0, y: 0, z: 0 },
            portalPositions: [
                { x: -14.8, y: 5, z: 0 },
                { x: 14.8, y: 5, z: 0 }
            ],
            fps: 0
        };

        // --- 基础场景设置 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);
        controls.enableDamping = true;

        // --- 房间构建 (使用单面材质，利用背面剔除实现虚拟相机透视) ---
        const roomGroup = new THREE.Group();
        scene.add(roomGroup);

        const wallMatLeft = new THREE.MeshStandardMaterial({ color: 0x4444aa, roughness: 0.8 });
        const wallMatRight = new THREE.MeshStandardMaterial({ color: 0xaa4444, roughness: 0.8 });
        const wallMatGray = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
        const ceilMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 1.0 });

        const planeGeo = new THREE.PlaneGeometry(30, 30);
        const wallGeo = new THREE.PlaneGeometry(30, 10);

        // 地板
        const floor = new THREE.Mesh(planeGeo, wallMatGray);
        floor.rotation.x = -Math.PI / 2;
        roomGroup.add(floor);

        // 天花板
        const ceiling = new THREE.Mesh(planeGeo, ceilMat);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = 10;
        roomGroup.add(ceiling);

        // 后墙
        const backWall = new THREE.Mesh(wallGeo, wallMatGray);
        backWall.position.set(0, 5, -15);
        roomGroup.add(backWall);

        // 前墙
        const frontWall = new THREE.Mesh(wallGeo, wallMatGray);
        frontWall.rotation.y = Math.PI;
        frontWall.position.set(0, 5, 15);
        roomGroup.add(frontWall);

        // 左墙 (偏蓝)
        const leftWall = new THREE.Mesh(wallGeo, wallMatLeft);
        leftWall.rotation.y = Math.PI / 2;
        leftWall.position.set(-15, 5, 0);
        roomGroup.add(leftWall);

        // 右墙 (偏红)
        const rightWall = new THREE.Mesh(wallGeo, wallMatRight);
        rightWall.rotation.y = -Math.PI / 2;
        rightWall.position.set(15, 5, 0);
        roomGroup.add(rightWall);

        // --- 场景物体 ---
        // 左区：3个蓝色/青色方块
        const boxGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const boxColors = [0x00ffff, 0x00aaff, 0x0055ff];
        for (let i = 0; i < 3; i++) {
            const mat = new THREE.MeshStandardMaterial({ color: boxColors[i], roughness: 0.4, metalness: 0.2 });
            const box = new THREE.Mesh(boxGeo, mat);
            box.position.set(-10 + Math.random() * 6, 0.75, -8 + Math.random() * 16);
            box.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            scene.add(box);
        }

        // 右区：3个红色/橙色球体
        const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
        const sphereColors = [0xff0000, 0xff5500, 0xffaa00];
        for (let i = 0; i < 3; i++) {
            const mat = new THREE.MeshStandardMaterial({ color: sphereColors[i], roughness: 0.3, metalness: 0.3 });
            const sphere = new THREE.Mesh(sphereGeo, mat);
            sphere.position.set(4 + Math.random() * 6, 1, -8 + Math.random() * 16);
            scene.add(sphere);
        }

        // 中央：黄色大圆柱体
        const cylGeo = new THREE.CylinderGeometry(1.5, 1.5, 4, 32);
        const cylMat = new THREE.MeshStandardMaterial({ color: 0xffdd00, roughness: 0.5 });
        const cylinder = new THREE.Mesh(cylGeo, cylMat);
        cylinder.position.set(0, 2, 0);
        scene.add(cylinder);

        // --- 灯光 ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        
        const leftLight = new THREE.PointLight(0x0088ff, 2, 25);
        leftLight.position.set(-7.5, 8, 0);
        scene.add(leftLight);

        const rightLight = new THREE.PointLight(0xff4400, 2, 25);
        rightLight.position.set(7.5, 8, 0);
        scene.add(rightLight);

        // --- 传送门设置 ---
        // 渲染目标 (尺寸与屏幕一致以保证屏幕空间UV映射正确)
        const renderTarget1 = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
        const renderTarget2 = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);

        // 虚拟相机
        const portalCamera1 = new THREE.PerspectiveCamera();
        const portalCamera2 = new THREE.PerspectiveCamera();

        // 传送门屏幕空间 Shader
        const portalVertexShader = `
            varying vec4 vScreenPos;
            void main() {
                vScreenPos = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                gl_Position = vScreenPos;
            }
        `;
        const portalFragmentShader = `
            uniform sampler2D tDiffuse;
            varying vec4 vScreenPos;
            void main() {
                vec2 uv = (vScreenPos.xy / vScreenPos.w) * 0.5 + 0.5;
                gl_FragColor = texture2D(tDiffuse, uv);
            }
        `;

        const portalMat1 = new THREE.ShaderMaterial({
            uniforms: { tDiffuse: { value: renderTarget1.texture } },
            vertexShader: portalVertexShader,
            fragmentShader: portalFragmentShader
        });

        const portalMat2 = new THREE.ShaderMaterial({
            uniforms: { tDiffuse: { value: renderTarget2.texture } },
            vertexShader: portalVertexShader,
            fragmentShader: portalFragmentShader
        });

        const disabledMat = new THREE.MeshBasicMaterial({ color: 0x222222 });

        // 传送门几何体 (基础尺寸为1，通过scale控制实际尺寸)
        const frameGeo = new THREE.TorusGeometry(1, 0.15, 16, 64);
        const surfaceGeo = new THREE.CircleGeometry(1, 64);

        // 传送门 1 (左侧)
        const portalGroup1 = new THREE.Group();
        portalGroup1.position.set(-14.8, 5, 0);
        portalGroup1.rotation.y = Math.PI / 2; // 面向 +x
        
        const frame1 = new THREE.Mesh(frameGeo, new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x0088ff, emissiveIntensity: 2 }));
        const surface1 = new THREE.Mesh(surfaceGeo, portalMat1);
        portalGroup1.add(frame1);
        portalGroup1.add(surface1);
        scene.add(portalGroup1);

        // 传送门 2 (右侧)
        const portalGroup2 = new THREE.Group();
        portalGroup2.position.set(14.8, 5, 0);
        portalGroup2.rotation.y = -Math.PI / 2; // 面向 -x
        
        const frame2 = new THREE.Mesh(frameGeo, new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xff4400, emissiveIntensity: 2 }));
        const surface2 = new THREE.Mesh(surfaceGeo, portalMat2);
        portalGroup2.add(frame2);
        portalGroup2.add(surface2);
        scene.add(portalGroup2);

        // 初始缩放
        portalGroup1.scale.setScalar(window.__3D_STATE__.portalSize);
        portalGroup2.scale.setScalar(window.__3D_STATE__.portalSize);

        // --- UI 交互 ---
        const toggleInput = document.getElementById('portalToggle');
        const sizeInput = document.getElementById('portalSize');
        const sizeValue = document.getElementById('sizeValue');

        toggleInput.addEventListener('change', (e) => {
            window.__3D_STATE__.portalEnabled = e.target.checked;
            surface1.material = window.__3D_STATE__.portalEnabled ? portalMat1 : disabledMat;
            surface2.material = window.__3D_STATE__.portalEnabled ? portalMat2 : disabledMat;
        });

        sizeInput.addEventListener('input', (e) => {
            const size = parseFloat(e.target.value);
            window.__3D_STATE__.portalSize = size;
            sizeValue.textContent = size.toFixed(1);
            portalGroup1.scale.setScalar(size);
            portalGroup2.scale.setScalar(size);
        });

        // --- 窗口缩放 ---
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            renderTarget1.setSize(w, h);
            renderTarget2.setSize(w, h);
        });

        // --- 核心渲染逻辑 ---
        function updateVirtualCamera(mainCam, srcPortal, destPortal, virtualCam) {
            // 计算从源传送门到目标传送门的变换矩阵
            // 包含一个180度的Y轴旋转，模拟穿过传送门的方向反转
            const srcToDest = new THREE.Matrix4()
                .copy(destPortal.matrixWorld)
                .multiply(new THREE.Matrix4().makeRotationY(Math.PI))
                .multiply(new THREE.Matrix4().copy(srcPortal.matrixWorld).invert());

            virtualCam.matrixAutoUpdate = false;
            virtualCam.matrixWorld.copy(srcToDest).multiply(mainCam.matrixWorld);
            virtualCam.projectionMatrix.copy(mainCam.projectionMatrix);
        }

        let frames = 0;
        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // 更新状态暴露
            window.__3D_STATE__.cameraPos.x = camera.position.x;
            window.__3D_STATE__.cameraPos.y = camera.position.y;
            window.__3D_STATE__.cameraPos.z = camera.position.z;

            frames++;
            const time = performance.now();
            if (time >= lastTime + 1000) {
                window.__3D_STATE__.fps = Math.round((frames * 1000) / (time - lastTime));
                frames = 0;
                lastTime = time;
            }

            if (window.__3D_STATE__.portalEnabled) {
                // 渲染传送门视图时，隐藏两个传送门组，避免递归渲染和看到背面的门框
                // 依赖房间墙壁的背面剔除(Backface Culling)来透视墙体
                portalGroup1.visible = false;
                portalGroup2.visible = false;

                // 1. 渲染传送门 1 的视图 (从传送门 2 看出)
                updateVirtualCamera(camera, portalGroup1, portalGroup2, portalCamera1);
                renderer.setRenderTarget(renderTarget1);
                renderer.clear();
                renderer.render(scene, portalCamera1);

                // 2. 渲染传送门 2 的视图 (从传送门 1 看出)
                updateVirtualCamera(camera, portalGroup2, portalGroup1, portalCamera2);
                renderer.setRenderTarget(renderTarget2);
                renderer.clear();
                renderer.render(scene, portalCamera2);

                // 恢复传送门可见性
                portalGroup1.visible = true;
                portalGroup2.visible = true;
            }

            // 3. 渲染主场景
            renderer.setRenderTarget(null);
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
