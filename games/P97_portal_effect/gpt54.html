<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 双传送门渲染</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: block;
    }

    .ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 14px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
      min-width: 220px;
    }

    .ui h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
      font-weight: 700;
    }

    .ui .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      font-size: 14px;
    }

    .ui label {
      flex: 1;
    }

    .ui input[type="range"] {
      width: 120px;
    }

    .value {
      width: 42px;
      text-align: right;
      display: inline-block;
      color: #ffd36e;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.4;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div class="ui">
    <h3>双传送门控制</h3>
    <div class="row">
      <label for="portalToggle">启用传送门视图</label>
      <input id="portalToggle" type="checkbox" checked />
    </div>
    <div class="row">
      <label for="portalSize">传送门尺寸</label>
      <input id="portalSize" type="range" min="1" max="4" step="0.1" value="2" />
      <span class="value" id="portalSizeValue">2.0</span>
    </div>
    <div class="hint">
      鼠标左键旋转 / 右键平移 / 滚轮缩放
    </div>
  </div>

  <canvas id="app"></canvas>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const canvas = document.getElementById('app');
    const portalToggle = document.getElementById('portalToggle');
    const portalSizeSlider = document.getElementById('portalSize');
    const portalSizeValue = document.getElementById('portalSizeValue');

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false,
      stencil: true
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = false;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101218);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 5, 12);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 4;
    controls.maxDistance = 40;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
    scene.add(ambientLight);

    const leftLight = new THREE.PointLight(0x4aa3ff, 30, 30, 2);
    leftLight.position.set(-10, 5, 0);
    scene.add(leftLight);

    const rightLight = new THREE.PointLight(0xff6644, 30, 30, 2);
    rightLight.position.set(10, 5, 0);
    scene.add(rightLight);

    const room = new THREE.Group();
    scene.add(room);

    const roomSize = { w: 30, h: 10, d: 30 };

    const roomShell = new THREE.Mesh(
      new THREE.BoxGeometry(roomSize.w, roomSize.h, roomSize.d),
      new THREE.MeshStandardMaterial({
        color: 0xffffff,
        side: THREE.BackSide,
        roughness: 0.95,
        metalness: 0.02,
        vertexColors: true
      })
    );

    {
      const geom = roomShell.geometry;
      const pos = geom.attributes.position;
      const colors = [];
      const temp = new THREE.Vector3();

      for (let i = 0; i < pos.count; i++) {
        temp.fromBufferAttribute(pos, i);

        let color = new THREE.Color(0xb8b8b8);

        if (Math.abs(temp.y + roomSize.h / 2) < 0.01) {
          color.set(0x6c6c6c);
        } else if (Math.abs(temp.y - roomSize.h / 2) < 0.01) {
          color.set(0xd9d9d9);
        } else if (Math.abs(temp.x + roomSize.w / 2) < 0.01) {
          color.set(0x567aa8);
        } else if (Math.abs(temp.x - roomSize.w / 2) < 0.01) {
          color.set(0xa85e5e);
        } else {
          color.set(temp.x < 0 ? 0x7d8ea4 : 0xa07b7b);
        }

        colors.push(color.r, color.g, color.b);
      }

      geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    }

    room.add(roomShell);

    const centerCylinder = new THREE.Mesh(
      new THREE.CylinderGeometry(1.2, 1.2, 4.5, 32),
      new THREE.MeshStandardMaterial({
        color: 0xffdd33,
        emissive: 0x6a5600,
        roughness: 0.35,
        metalness: 0.2
      })
    );
    centerCylinder.position.set(0, 2.25, 0);
    scene.add(centerCylinder);

    function randomInRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function createMarkerObjects() {
      const leftGroup = new THREE.Group();
      const rightGroup = new THREE.Group();

      const leftColors = [0x2f7fff, 0x00bcd4, 0x66ccff];
      for (let i = 0; i < 3; i++) {
        const box = new THREE.Mesh(
          new THREE.BoxGeometry(randomInRange(0.9, 1.4), randomInRange(0.9, 1.8), randomInRange(0.9, 1.4)),
          new THREE.MeshStandardMaterial({
            color: leftColors[i % leftColors.length],
            emissive: leftColors[i % leftColors.length],
            emissiveIntensity: 0.15,
            roughness: 0.45,
            metalness: 0.15
          })
        );
        box.position.set(
          randomInRange(-11.5, -3.5),
          randomInRange(0.8, 2.2),
          randomInRange(-10, 10)
        );
        box.rotation.set(
          randomInRange(0, Math.PI),
          randomInRange(0, Math.PI),
          randomInRange(0, Math.PI)
        );
        leftGroup.add(box);
      }

      const rightColors = [0xff5533, 0xff8844, 0xff3333];
      for (let i = 0; i < 3; i++) {
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(randomInRange(0.55, 0.95), 32, 24),
          new THREE.MeshStandardMaterial({
            color: rightColors[i % rightColors.length],
            emissive: rightColors[i % rightColors.length],
            emissiveIntensity: 0.12,
            roughness: 0.4,
            metalness: 0.18
          })
        );
        sphere.position.set(
          randomInRange(3.5, 11.5),
          randomInRange(1.0, 2.8),
          randomInRange(-10, 10)
        );
        rightGroup.add(sphere);
      }

      scene.add(leftGroup, rightGroup);
    }

    createMarkerObjects();

    const rtSize = 1024;
    const renderTarget1 = new THREE.WebGLRenderTarget(rtSize, rtSize, {
      minFilter: THREE.LinearFilter,
      magFilter: THREE.LinearFilter,
      format: THREE.RGBAFormat,
      depthBuffer: true,
      stencilBuffer: true
    });
    const renderTarget2 = new THREE.WebGLRenderTarget(rtSize, rtSize, {
      minFilter: THREE.LinearFilter,
      magFilter: THREE.LinearFilter,
      format: THREE.RGBAFormat,
      depthBuffer: true,
      stencilBuffer: true
    });

    renderTarget1.texture.colorSpace = THREE.SRGBColorSpace;
    renderTarget2.texture.colorSpace = THREE.SRGBColorSpace;

    const portalCamera1 = new THREE.PerspectiveCamera(60, 1, 0.1, 200);
    const portalCamera2 = new THREE.PerspectiveCamera(60, 1, 0.1, 200);

    const tempMatA = new THREE.Matrix4();
    const tempMatB = new THREE.Matrix4();
    const rotY180 = new THREE.Matrix4().makeRotationY(Math.PI);
    const tempPos = new THREE.Vector3();
    const tempQuat = new THREE.Quaternion();
    const tempScale = new THREE.Vector3();

    function createPortal(portalColor, fallbackColor) {
      const group = new THREE.Group();

      const frameMaterial = new THREE.MeshStandardMaterial({
        color: 0x222222,
        emissive: portalColor,
        emissiveIntensity: 1.8,
        roughness: 0.25,
        metalness: 0.6
      });

      const frame = new THREE.Mesh(
        new THREE.TorusGeometry(2, 0.3, 16, 64),
        frameMaterial
      );

      const portalMaterial = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        side: THREE.DoubleSide,
        transparent: false
      });

      const fallbackMaterial = new THREE.MeshBasicMaterial({
        color: fallbackColor,
        side: THREE.DoubleSide
      });

      const surface = new THREE.Mesh(
        new THREE.CircleGeometry(2, 64),
        portalMaterial
      );
      surface.position.z = 0.01;

      group.add(frame);
      group.add(surface);

      return {
        group,
        frame,
        surface,
        portalMaterial,
        fallbackMaterial,
        frameMaterial
      };
    }

    const portal1 = createPortal(0x0088ff, 0x1b4f8a);
    const portal2 = createPortal(0xff4400, 0x8a3b1b);

    portal1.portalMaterial.map = renderTarget1.texture;
    portal2.portalMaterial.map = renderTarget2.texture;

    portal1.group.position.set(-14, 3, 0);
    portal2.group.position.set(14, 3, 0);

    portal1.group.lookAt(portal1.group.position.clone().add(new THREE.Vector3(1, 0, 0)));
    portal2.group.lookAt(portal2.group.position.clone().add(new THREE.Vector3(-1, 0, 0)));

    scene.add(portal1.group, portal2.group);

    let portalSize = parseFloat(portalSizeSlider.value);
    let portalEnabled = portalToggle.checked;

    function updatePortalScale() {
      portal1.frame.geometry.dispose();
      portal2.frame.geometry.dispose();
      portal1.surface.geometry.dispose();
      portal2.surface.geometry.dispose();

      portal1.frame.geometry = new THREE.TorusGeometry(portalSize, 0.3, 16, 64);
      portal2.frame.geometry = new THREE.TorusGeometry(portalSize, 0.3, 16, 64);
      portal1.surface.geometry = new THREE.CircleGeometry(portalSize, 64);
      portal2.surface.geometry = new THREE.CircleGeometry(portalSize, 64);

      portal1.surface.position.z = 0.01;
      portal2.surface.position.z = 0.01;

      portalSizeValue.textContent = portalSize.toFixed(1);
    }

    function updatePortalMaterials() {
      portal1.surface.material = portalEnabled ? portal1.portalMaterial : portal1.fallbackMaterial;
      portal2.surface.material = portalEnabled ? portal2.portalMaterial : portal2.fallbackMaterial;
    }

    portalSizeSlider.addEventListener('input', () => {
      portalSize = parseFloat(portalSizeSlider.value);
      updatePortalScale();
    });

    portalToggle.addEventListener('change', () => {
      portalEnabled = portalToggle.checked;
      updatePortalMaterials();
    });

    updatePortalScale();
    updatePortalMaterials();

    function copyProjectionFromMainCamera(dst, src) {
      dst.fov = src.fov;
      dst.aspect = 1;
      dst.near = src.near;
      dst.far = src.far;
      dst.updateProjectionMatrix();
    }

    function updatePortalCamera(mainCamera, fromPortal, toPortal, outCamera) {
      fromPortal.group.updateMatrixWorld(true);
      toPortal.group.updateMatrixWorld(true);
      mainCamera.updateMatrixWorld(true);

      tempMatA.copy(fromPortal.group.matrixWorld).invert();
      tempMatB.multiplyMatrices(toPortal.group.matrixWorld, rotY180);
      tempMatB.multiply(tempMatA);
      tempMatB.multiply(mainCamera.matrixWorld);

      tempMatB.decompose(tempPos, tempQuat, tempScale);
      outCamera.position.copy(tempPos);
      outCamera.quaternion.copy(tempQuat);
      outCamera.updateMatrixWorld(true);
    }

    const clock = new THREE.Clock();

    let fpsFrameCount = 0;
    let fpsAccum = 0;
    let fpsValue = 0;

    function updateStats(delta) {
      fpsFrameCount++;
      fpsAccum += delta;
      if (fpsAccum >= 1.0) {
        fpsValue = fpsFrameCount / fpsAccum;
        fpsFrameCount = 0;
        fpsAccum = 0;
      }
    }

    function updateState() {
      const p1 = portal1.group.getWorldPosition(new THREE.Vector3());
      const p2 = portal2.group.getWorldPosition(new THREE.Vector3());

      window.__3D_STATE__ = {
        portalEnabled,
        portalSize,
        cameraPos: {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        },
        portalPositions: [
          { x: p1.x, y: p1.y, z: p1.z },
          { x: p2.x, y: p2.y, z: p2.z }
        ],
        fps: Number(fpsValue.toFixed(2))
      };
    }

    function renderPortalViews() {
      if (!portalEnabled) return;

      copyProjectionFromMainCamera(portalCamera1, camera);
      copyProjectionFromMainCamera(portalCamera2, camera);

      updatePortalCamera(camera, portal2, portal1, portalCamera1);
      updatePortalCamera(camera, portal1, portal2, portalCamera2);

      const currentTarget = renderer.getRenderTarget();
      const prevAutoClear = renderer.autoClear;
      renderer.autoClear = true;

      portal1.surface.visible = false;
      renderer.setRenderTarget(renderTarget1);
      renderer.clear(true, true, true);
      renderer.render(scene, portalCamera1);
      portal1.surface.visible = true;

      portal2.surface.visible = false;
      renderer.setRenderTarget(renderTarget2);
      renderer.clear(true, true, true);
      renderer.render(scene, portalCamera2);
      portal2.surface.visible = true;

      renderer.setRenderTarget(currentTarget);
      renderer.autoClear = prevAutoClear;
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      updateStats(delta);

      centerCylinder.rotation.y += delta * 0.35;

      controls.update();

      renderPortalViews();

      renderer.setRenderTarget(null);
      renderer.render(scene, camera);

      updateState();
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateState();
    animate();
  </script>
</body>
</html>
