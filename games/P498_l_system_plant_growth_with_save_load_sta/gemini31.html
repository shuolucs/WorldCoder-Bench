<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D L-System Plant Growth Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #hud-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 8px;
            pointer-events: none;
            min-width: 150px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #hud-panel div {
            margin-bottom: 5px;
            font-size: 14px;
        }
        #save-status {
            color: #4CAF50;
            font-weight: bold;
            height: 20px;
            margin-top: 10px !important;
            margin-bottom: 0 !important;
        }
        #controls-panel {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 10px;
        }
        button {
            padding: 10px 18px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            border: none;
            background: #2d5a27;
            color: white;
            transition: background 0.2s, transform 0.1s;
            font-size: 14px;
        }
        button:hover:not(:disabled) {
            background: #3a7533;
            transform: translateY(-2px);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud-panel">
        <div id="gen-display">Generation: 0</div>
        <div id="branch-display">Branches: 1</div>
        <div id="leaf-display">Leaves: 0</div>
        <div id="save-status"></div>
    </div>
    <div id="controls-panel">
        <button id="btn-grow">Grow (G)</button>
        <button id="btn-reset">Reset (R)</button>
        <button id="btn-save">Save State (S)</button>
        <button id="btn-load">Load State (L)</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Initialize State
        window.__3D_STATE__ = {
            generation: 0,
            branchCount: 1,
            leafCount: 0,
            isAnimating: false,
            maxGeneration: 5,
            savedData: null,
            plantHeight: 0,
            totalSegmentLength: 0,
            canGrow: true
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 2, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshPhongMaterial({ 
            color: 0x2d5a27, 
            transparent: true, 
            opacity: 0.7,
            side: THREE.DoubleSide
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // L-System Pre-calculation
        const stringsByGen = [];
        let currentTokens = [{ type: 'F', gen: 0 }];
        stringsByGen.push(currentTokens);

        for (let g = 1; g <= 5; g++) {
            let nextTokens = [];
            for (let token of currentTokens) {
                if (token.type === 'F') {
                    let oldG = token.gen;
                    let newG = g;
                    nextTokens.push({ type: 'F', gen: oldG });
                    nextTokens.push({ type: 'F', gen: newG });
                    nextTokens.push({ type: '+' });
                    nextTokens.push({ type: '[' });
                    nextTokens.push({ type: '+' });
                    nextTokens.push({ type: 'F', gen: newG });
                    nextTokens.push({ type: '-' });
                    nextTokens.push({ type: 'F', gen: newG });
                    nextTokens.push({ type: '-' });
                    nextTokens.push({ type: 'F', gen: newG });
                    nextTokens.push({ type: ']' });
                    nextTokens.push({ type: '-' });
                    nextTokens.push({ type: '[' });
                    nextTokens.push({ type: '-' });
                    nextTokens.push({ type: 'F', gen: newG });
                    nextTokens.push({ type: '+' });
                    nextTokens.push({ type: 'F', gen: newG });
                    nextTokens.push({ type: '+' });
                    nextTokens.push({ type: 'F', gen: newG });
                    nextTokens.push({ type: ']' });
                } else {
                    nextTokens.push(token);
                }
            }
            stringsByGen.push(nextTokens);
            currentTokens = nextTokens;
        }

        // Geometries & Materials
        const cylinderGeo = new THREE.CylinderGeometry(1, 1, 1, 8);
        cylinderGeo.translate(0, 0.5, 0); // Base at origin
        const branchMat = new THREE.MeshPhongMaterial({ color: 0xffffff });

        const sphereGeo = new THREE.SphereGeometry(0.1, 8, 8);
        const leafMat = new THREE.MeshPhongMaterial({ color: 0x32CD32 });

        let branchMesh = null;
        let leafMesh = null;
        let branchInstances = [];
        let leafPositions = [];
        let animStartTime = 0;

        function getPosKey(v) {
            return `${Math.round(v.x * 10000)},${Math.round(v.y * 10000)},${Math.round(v.z * 10000)}`;
        }

        function buildPlant(targetGen, animate) {
            if (branchMesh) { scene.remove(branchMesh); branchMesh.dispose(); }
            if (leafMesh) { scene.remove(leafMesh); leafMesh.dispose(); }

            const tokens = stringsByGen[targetGen];
            
            let pos = new THREE.Vector3(0, 0, 0);
            let quaternion = new THREE.Quaternion();
            let depth = 0;
            let stack = [];
            
            branchInstances = [];
            leafPositions = [];
            let startPositions = new Set();
            let endPositions = [];
            
            let maxDepth = 0;
            let totalLen = 0;
            let maxY = 0;

            const angleRad = 25 * Math.PI / 180;
            const qPlus = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -angleRad);
            const qMinus = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), angleRad);

            for (let token of tokens) {
                if (token.type === 'F') {
                    let length = 1.0 * Math.pow(0.7, token.gen);
                    let radius = Math.max(0.02, 0.15 * (1 - depth * 0.15));
                    let endPos = pos.clone().add(new THREE.Vector3(0, length, 0).applyQuaternion(quaternion));
                    
                    branchInstances.push({
                        position: pos.clone(),
                        quaternion: quaternion.clone(),
                        scale: new THREE.Vector3(radius, length, radius),
                        depth: depth,
                        isNew: token.gen === targetGen,
                        endPos: endPos.clone()
                    });

                    startPositions.add(getPosKey(pos));
                    endPositions.push(endPos);
                    
                    totalLen += length;
                    if (endPos.y > maxY) maxY = endPos.y;
                    if (depth > maxDepth) maxDepth = depth;

                    pos.copy(endPos);
                    depth++;
                } else if (token.type === '+') {
                    quaternion.multiply(qPlus);
                } else if (token.type === '-') {
                    quaternion.multiply(qMinus);
                } else if (token.type === '[') {
                    stack.push({ pos: pos.clone(), quaternion: quaternion.clone(), depth: depth });
                } else if (token.type === ']') {
                    let state = stack.pop();
                    pos.copy(state.pos);
                    quaternion.copy(state.quaternion);
                    depth = state.depth;
                }
            }

            // Find leaves
            if (targetGen >= 2) {
                for (let ep of endPositions) {
                    if (!startPositions.has(getPosKey(ep))) {
                        leafPositions.push(ep);
                    }
                }
            }

            // Update State
            window.__3D_STATE__.branchCount = branchInstances.length;
            window.__3D_STATE__.leafCount = leafPositions.length;
            window.__3D_STATE__.plantHeight = maxY;
            window.__3D_STATE__.totalSegmentLength = totalLen;

            // Create Branch Mesh
            branchMesh = new THREE.InstancedMesh(cylinderGeo, branchMat, branchInstances.length);
            const colorBase = new THREE.Color(0x8B4513);
            const colorTip = new THREE.Color(0x228B22);
            const matrix = new THREE.Matrix4();

            for (let i = 0; i < branchInstances.length; i++) {
                let inst = branchInstances[i];
                let t = maxDepth > 0 ? inst.depth / maxDepth : 0;
                let color = colorBase.clone().lerp(colorTip, t);
                
                let scaleY = (inst.isNew && animate) ? 0.001 : inst.scale.y;
                matrix.compose(inst.position, inst.quaternion, new THREE.Vector3(inst.scale.x, scaleY, inst.scale.z));
                
                branchMesh.setMatrixAt(i, matrix);
                branchMesh.setColorAt(i, color);
            }
            branchMesh.instanceMatrix.needsUpdate = true;
            branchMesh.instanceColor.needsUpdate = true;
            scene.add(branchMesh);

            // Create Leaf Mesh
            if (leafPositions.length > 0) {
                leafMesh = new THREE.InstancedMesh(sphereGeo, leafMat, leafPositions.length);
                for (let i = 0; i < leafPositions.length; i++) {
                    let scale = animate ? 0.001 : 1;
                    matrix.compose(leafPositions[i], new THREE.Quaternion(), new THREE.Vector3(scale, scale, scale));
                    leafMesh.setMatrixAt(i, matrix);
                }
                leafMesh.instanceMatrix.needsUpdate = true;
                scene.add(leafMesh);
            }

            if (animate) {
                window.__3D_STATE__.isAnimating = true;
                window.__3D_STATE__.canGrow = false;
                animStartTime = performance.now();
            } else {
                window.__3D_STATE__.isAnimating = false;
                window.__3D_STATE__.canGrow = targetGen < 5;
            }
            
            updateUI();
        }

        // UI Updates
        const genDisplay = document.getElementById('gen-display');
        const branchDisplay = document.getElementById('branch-display');
        const leafDisplay = document.getElementById('leaf-display');
        const btnGrow = document.getElementById('btn-grow');
        const saveStatus = document.getElementById('save-status');

        function updateUI() {
            const state = window.__3D_STATE__;
            genDisplay.textContent = `Generation: ${state.generation}`;
            branchDisplay.textContent = `Branches: ${state.branchCount}`;
            leafDisplay.textContent = `Leaves: ${state.leafCount}`;
            btnGrow.disabled = !state.canGrow;
        }

        // Actions
        function grow() {
            const state = window.__3D_STATE__;
            if (state.generation < 5 && !state.isAnimating) {
                state.generation++;
                buildPlant(state.generation, true);
            }
        }

        function reset() {
            if (window.__3D_STATE__.isAnimating) return;
            window.__3D_STATE__.generation = 0;
            buildPlant(0, false);
        }

        function saveState() {
            const stateToSave = {
                generation: window.__3D_STATE__.generation,
                cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
                timestamp: Date.now()
            };
            const jsonStr = JSON.stringify(stateToSave);
            localStorage.setItem('lsystem_save', jsonStr);
            window.__3D_STATE__.savedData = stateToSave;
            
            saveStatus.textContent = 'Saved!';
            setTimeout(() => { saveStatus.textContent = ''; }, 2000);
        }

        function loadState() {
            if (window.__3D_STATE__.isAnimating) return;
            const saved = localStorage.getItem('lsystem_save');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    camera.position.set(data.cameraPosition.x, data.cameraPosition.y, data.cameraPosition.z);
                    controls.update();
                    window.__3D_STATE__.generation = data.generation;
                    buildPlant(data.generation, false);
                } catch (e) {
                    console.error("Failed to load state", e);
                }
            }
        }

        // Event Listeners
        document.getElementById('btn-grow').addEventListener('click', grow);
        document.getElementById('btn-reset').addEventListener('click', reset);
        document.getElementById('btn-save').addEventListener('click', saveState);
        document.getElementById('btn-load').addEventListener('click', loadState);

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'g') grow();
            if (key === 'r') reset();
            if (key === 's') saveState();
            if (key === 'l') loadState();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initial Build
        buildPlant(0, false);

        // Animation Loop
        const matrix = new THREE.Matrix4();
        
        function animateLoop() {
            requestAnimationFrame(animateLoop);
            controls.update();

            if (window.__3D_STATE__.isAnimating) {
                let now = performance.now();
                let progress = (now - animStartTime) / 1500;
                
                if (progress >= 1.0) {
                    progress = 1.0;
                    window.__3D_STATE__.isAnimating = false;
                    window.__3D_STATE__.canGrow = window.__3D_STATE__.generation < 5;
                    updateUI();
                }

                if (branchMesh) {
                    for (let i = 0; i < branchInstances.length; i++) {
                        let inst = branchInstances[i];
                        if (inst.isNew) {
                            let currentScaleY = Math.max(0.001, inst.scale.y * progress);
                            matrix.compose(inst.position, inst.quaternion, new THREE.Vector3(inst.scale.x, currentScaleY, inst.scale.z));
                            branchMesh.setMatrixAt(i, matrix);
                        }
                    }
                    branchMesh.instanceMatrix.needsUpdate = true;
                }

                if (leafMesh && leafPositions.length > 0) {
                    for (let i = 0; i < leafPositions.length; i++) {
                        let scale = Math.max(0.001, progress);
                        matrix.compose(leafPositions[i], new THREE.Quaternion(), new THREE.Vector3(scale, scale, scale));
                        leafMesh.setMatrixAt(i, matrix);
                    }
                    leafMesh.instanceMatrix.needsUpdate = true;
                }
            }

            renderer.render(scene, camera);
        }

        animateLoop();
    </script>
</body>
</html>
