<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D L-System Plant Growth Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    color: #e0e0e0;
    padding: 20px;
    border-radius: 10px;
    min-width: 200px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  #hud-panel h2 {
    color: #4ecca3;
    margin-bottom: 15px;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  #hud-panel .stat {
    margin: 8px 0;
    font-size: 14px;
  }

  #hud-panel .stat span {
    color: #4ecca3;
    font-weight: bold;
  }

  #save-status {
    color: #4ecca3;
    font-weight: bold;
    margin-top: 10px;
    min-height: 20px;
    font-size: 14px;
  }

  #controls-panel {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }

  #controls-panel button {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #btn-grow {
    background: linear-gradient(135deg, #228B22, #32CD32);
    color: white;
  }
  #btn-grow:hover:not(:disabled) {
    background: linear-gradient(135deg, #32CD32, #44ff44);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(50, 205, 50, 0.4);
  }
  #btn-grow:disabled {
    background: #555;
    color: #888;
    cursor: not-allowed;
  }

  #btn-reset {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: white;
  }
  #btn-reset:hover {
    background: linear-gradient(135deg, #e74c3c, #ff6b6b);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
  }

  #btn-save {
    background: linear-gradient(135deg, #2980b9, #3498db);
    color: white;
  }
  #btn-save:hover {
    background: linear-gradient(135deg, #3498db, #5dade2);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
  }

  #btn-load {
    background: linear-gradient(135deg, #8e44ad, #9b59b6);
    color: white;
  }
  #btn-load:hover {
    background: linear-gradient(135deg, #9b59b6, #bb77d6);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
  }
</style>
</head>
<body>

<div id="hud-panel">
  <h2>🌿 L-System Plant</h2>
  <div class="stat" id="gen-display">Generation: 0</div>
  <div class="stat" id="branch-display">Branches: 1</div>
  <div class="stat" id="leaf-display">Leaves: 0</div>
  <div id="save-status"></div>
</div>

<div id="controls-panel">
  <button id="btn-grow">Grow (G)</button>
  <button id="btn-reset">Reset (R)</button>
  <button id="btn-save">Save State (S)</button>
  <button id="btn-load">Load State (L)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // Initialize state
  window.__3D_STATE__ = {
    generation: 0,
    branchCount: 1,
    leafCount: 0,
    isAnimating: false,
    maxGeneration: 5,
    savedData: null,
    plantHeight: 0,
    totalSegmentLength: 0,
    canGrow: true
  };

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 5, 15);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.target.set(0, 3, 0);
  controls.update();

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 5);
  scene.add(dirLight);

  // Ground plane
  const groundGeom = new THREE.PlaneGeometry(20, 20);
  const groundMat = new THREE.MeshLambertMaterial({
    color: 0x2d5a27,
    transparent: true,
    opacity: 0.7,
    side: THREE.DoubleSide
  });
  const ground = new THREE.Mesh(groundGeom, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  scene.add(ground);

  // Plant group
  const plantGroup = new THREE.Group();
  scene.add(plantGroup);

  // L-System
  const ANGLE = 25 * (Math.PI / 180);
  const AXIOM = 'F';
  const RULES = { 'F': 'FF+[+F-F-F]-[-F+F+F]' };

  function generateLString(axiom, rules, generations) {
    let current = axiom;
    for (let i = 0; i < generations; i++) {
      let next = '';
      for (let ch of current) {
        next += rules[ch] || ch;
      }
      current = next;
    }
    return current;
  }

  function getDepthAtIndex(lstring, index) {
    let depth = 0;
    for (let i = 0; i < index; i++) {
      if (lstring[i] === '[') depth++;
      else if (lstring[i] === ']') depth--;
    }
    return depth;
  }

  // Build plant from L-string
  function buildPlant(generation, animate = false) {
    // Clear existing plant
    while (plantGroup.children.length > 0) {
      const child = plantGroup.children[0];
      plantGroup.remove(child);
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    }

    if (generation === 0) {
      // Just the axiom: single stem
      const segLen = 1.0;
      const radius = 0.15;
      const geom = new THREE.CylinderGeometry(radius * 0.8, radius, segLen, 8);
      const mat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(0, segLen / 2, 0);
      plantGroup.add(mesh);

      if (animate) {
        mesh.scale.y = 0;
        mesh.userData.targetScaleY = 1;
        mesh.userData.animating = true;
      }

      window.__3D_STATE__.branchCount = 1;
      window.__3D_STATE__.leafCount = 0;
      window.__3D_STATE__.plantHeight = segLen;
      window.__3D_STATE__.totalSegmentLength = segLen;
      updateHUD();
      return;
    }

    const lstring = generateLString(AXIOM, RULES, generation);
    const segLength = 1.0 * Math.pow(0.7, generation);

    let branchCount = 0;
    let leafCount = 0;
    let maxY = 0;
    let totalLength = 0;

    // Turtle state
    let posX = 0, posY = 0;
    let angle = Math.PI / 2; // pointing up
    const stack = [];

    // Track max depth for color interpolation
    let maxDepth = 0;
    {
      let d = 0;
      for (let ch of lstring) {
        if (ch === '[') d++;
        else if (ch === ']') d--;
        if (d > maxDepth) maxDepth = d;
      }
    }
    if (maxDepth === 0) maxDepth = 1;

    let currentDepth = 0;
    const terminalPositions = [];

    // First pass: identify terminal F positions (F not followed by F before a ] or end)
    // We'll track this during building

    const branches = [];
    const branchData = [];

    for (let i = 0; i < lstring.length; i++) {
      const ch = lstring[i];

      if (ch === 'F') {
        const startX = posX;
        const startY = posY;
        const endX = posX + Math.cos(angle) * segLength;
        const endY = posY + Math.sin(angle) * segLength;

        const depthRatio = currentDepth / maxDepth;
        const radius = Math.max(0.02, 0.15 * (1 - currentDepth * 0.15));

        // Color interpolation: brown at base to green at tips
        const brown = new THREE.Color(0x8B4513);
        const green = new THREE.Color(0x228B22);
        const color = brown.clone().lerp(green, depthRatio);

        const dx = endX - startX;
        const dy = endY - startY;
        const len = Math.sqrt(dx * dx + dy * dy);

        const geom = new THREE.CylinderGeometry(radius * 0.7, radius, len, 6);
        const mat = new THREE.MeshLambertMaterial({ color: color });
        const mesh = new THREE.Mesh(geom, mat);

        // Position at midpoint
        const midX = (startX + endX) / 2;
        const midY = (startY + endY) / 2;

        // We project 2D to 3D: X -> X, Y -> Y, Z stays 0 with slight random offset for depth
        const zOffset = (Math.random() - 0.5) * 0.3 * depthRatio;
        mesh.position.set(midX, midY, zOffset);

        // Rotate cylinder to align with direction
        const angleFromUp = Math.atan2(dx, dy);
        mesh.rotation.z = -angleFromUp;

        if (animate) {
          mesh.scale.y = 0;
          mesh.userData.targetScaleY = 1;
          mesh.userData.animating = true;
          mesh.userData.animDelay = depthRatio * 0.5; // deeper branches animate later
        }

        plantGroup.add(mesh);
        branchCount++;
        totalLength += len;

        if (endY > maxY) maxY = endY;

        posX = endX;
        posY = endY;

        // Check if this is a terminal F
        let isTerminal = true;
        for (let j = i + 1; j < lstring.length; j++) {
          if (lstring[j] === 'F') { isTerminal = false; break; }
          if (lstring[j] === ']' || lstring[j] === '[') break;
        }
        if (isTerminal && generation >= 2) {
          terminalPositions.push({ x: endX, y: endY, z: zOffset });
        }

      } else if (ch === '+') {
        angle -= ANGLE;
      } else if (ch === '-') {
        angle += ANGLE;
      } else if (ch === '[') {
        stack.push({ posX, posY, angle, depth: currentDepth });
        currentDepth++;
      } else if (ch === ']') {
        const state = stack.pop();
        posX = state.posX;
        posY = state.posY;
        angle = state.angle;
        currentDepth = state.depth;
      }
    }

    // Add leaves at terminal positions
    if (generation >= 2) {
      for (const pos of terminalPositions) {
        const leafGeom = new THREE.SphereGeometry(0.1, 8, 8);
        const leafMat = new THREE.MeshLambertMaterial({ color: 0x32CD32 });
        const leaf = new THREE.Mesh(leafGeom, leafMat);
        leaf.position.set(pos.x, pos.y, pos.z);
        leaf.userData.isLeaf = true;

        if (animate) {
          leaf.scale.set(0, 0, 0);
          leaf.userData.targetScale = 1;
          leaf.userData.animatingLeaf = true;
        }

        plantGroup.add(leaf);
        leafCount++;
      }
    }

    window.__3D_STATE__.branchCount = branchCount;
    window.__3D_STATE__.leafCount = leafCount;
    window.__3D_STATE__.plantHeight = maxY;
    window.__3D_STATE__.totalSegmentLength = totalLength;
    updateHUD();
  }

  function updateHUD() {
    document.getElementById('gen-display').textContent = 'Generation: ' + window.__3D_STATE__.generation;
    document.getElementById('branch-display').textContent = 'Branches: ' + window.__3D_STATE__.branchCount;
    document.getElementById('leaf-display').textContent = 'Leaves: ' + window.__3D_STATE__.leafCount;

    const btnGrow = document.getElementById('btn-grow');
    btnGrow.disabled = !window.__3D_STATE__.canGrow;
  }

  function updateCanGrow() {
    window.__3D_STATE__.canGrow = window.__3D_STATE__.generation < window.__3D_STATE__.maxGeneration && !window.__3D_STATE__.isAnimating;
    document.getElementById('btn-grow').disabled = !window.__3D_STATE__.canGrow;
  }

  // Growth animation
  let animationStartTime = 0;
  const ANIM_DURATION = 1.5;

  function startGrowAnimation() {
    if (!window.__3D_STATE__.canGrow) return;

    window.__3D_STATE__.generation++;
    window.__3D_STATE__.isAnimating = true;
    updateCanGrow();

    buildPlant(window.__3D_STATE__.generation, true);
    animationStartTime = performance.now() / 1000;
  }

  function updateAnimation() {
    if (!window.__3D_STATE__.isAnimating) return;

    const elapsed = (performance.now() / 1000) - animationStartTime;
    const progress = Math.min(elapsed / ANIM_DURATION, 1);

    // Ease function
    const eased = 1 - Math.pow(1 - progress, 3);

    plantGroup.children.forEach(child => {
      if (child.userData.animating) {
        const delay = child.userData.animDelay || 0;
        const localProgress = Math.max(0, Math.min(1, (eased - delay * 0.5) / (1 - delay * 0.5)));
        child.scale.y = localProgress * child.userData.targetScaleY;
      }
      if (child.userData.animatingLeaf) {
        const leafProgress = Math.max(0, (eased - 0.5) / 0.5);
        const s = leafProgress * child.userData.targetScale;
        child.scale.set(s, s, s);
      }
    });

    if (progress >= 1) {
      window.__3D_STATE__.isAnimating = false;
      updateCanGrow();
      // Ensure all scales are exactly 1
      plantGroup.children.forEach(child => {
        if (child.userData.animating) {
          child.scale.y = child.userData.targetScaleY;
          child.userData.animating = false;
        }
        if (child.userData.animatingLeaf) {
          child.scale.set(child.userData.targetScale, child.userData.targetScale, child.userData.targetScale);
          child.userData.animatingLeaf = false;
        }
      });
    }
  }

  // Actions
  function doGrow() {
    if (window.__3D_STATE__.canGrow) {
      startGrowAnimation();
    }
  }

  function doReset() {
    window.__3D_STATE__.generation = 0;
    window.__3D_STATE__.isAnimating = false;
    buildPlant(0, false);
    updateCanGrow();
    updateHUD();
  }

  function doSave() {
    const saveData = {
      generation: window.__3D_STATE__.generation,
      cameraPosition: {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      },
      timestamp: Date.now()
    };
    const jsonStr = JSON.stringify(saveData);
    localStorage.setItem('lsystem_save', jsonStr);
    window.__3D_STATE__.savedData = saveData;

    const statusEl = document.getElementById('save-status');
    statusEl.textContent = 'Saved!';
    setTimeout(() => { statusEl.textContent = ''; }, 2000);
  }

  function doLoad() {
    const jsonStr = localStorage.getItem('lsystem_save');
    if (!jsonStr) return;

    try {
      const saveData = JSON.parse(jsonStr);
      window.__3D_STATE__.generation = saveData.generation;
      window.__3D_STATE__.isAnimating = false;
      window.__3D_STATE__.savedData = saveData;

      // Restore camera
      if (saveData.cameraPosition) {
        camera.position.set(saveData.cameraPosition.x, saveData.cameraPosition.y, saveData.cameraPosition.z);
        controls.update();
      }

      // Rebuild plant instantly
      buildPlant(saveData.generation, false);
      updateCanGrow();
      updateHUD();
    } catch (e) {
      console.error('Failed to load state:', e);
    }
  }

  // Button handlers
  document.getElementById('btn-grow').addEventListener('click', doGrow);
  document.getElementById('btn-reset').addEventListener('click', doReset);
  document.getElementById('btn-save').addEventListener('click', doSave);
  document.getElementById('btn-load').addEventListener('click', doLoad);

  // Keyboard controls
  document.addEventListener('keydown', (e) => {
    const key = e.key.toUpperCase();
    if (key === 'G') doGrow();
    else if (key === 'R') doReset();
    else if (key === 'S') doSave();
    else if (key === 'L') doLoad();
  });

  // Window resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Build initial plant (generation 0)
  buildPlant(0, false);
  updateCanGrow();

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);
    updateAnimation();
    controls.update();
    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
