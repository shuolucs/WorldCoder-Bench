<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Planetary Orbit Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: sans-serif;
            color: white;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 10;
            align-items: center;
        }
        #hudPanel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 10;
            pointer-events: none;
            line-height: 1.5;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) {
            background: #444;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        input[type="range"] {
            cursor: pointer;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-container">
        <button id="addPlanetBtn">Add Planet</button>
        <button id="removeLastBtn">Remove Last</button>
        <button id="undoBtn" disabled>Undo</button>
        <button id="redoBtn" disabled>Redo</button>
        <button id="pauseBtn">Pause</button>
        <div class="slider-container">
            <label for="speedSlider">Speed:</label>
            <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
        </div>
    </div>

    <div id="hudPanel">
        <div>Planets: <span id="planetCount">1</span></div>
        <div>Speed: <span id="speedDisplay">1.0</span>x</div>
        <div>Status: <span id="simStatus">Running</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffdd44, 2, 0, 0);
        scene.add(pointLight);

        // --- Sun ---
        const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        // --- Starfield ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 500;
        const posArray = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            const r = 200 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            posArray[i] = r * Math.sin(phi) * Math.cos(theta);
            posArray[i + 1] = r * Math.sin(phi) * Math.sin(theta);
            posArray[i + 2] = r * Math.cos(phi);
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
        const starfield = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starfield);

        // --- GLTF Model (Space Station) ---
        let stationMesh = null;
        let stationLoaded = false;
        let stationOrbitAngle = 0;
        const loader = new GLTFLoader();
        
        loader.load('ABeautifulGame.glb', (gltf) => {
            stationMesh = gltf.scene;
            stationMesh.scale.set(0.02, 0.02, 0.02);
            stationMesh.position.set(20, 0, 0);
            scene.add(stationMesh);
            stationLoaded = true;
        }, undefined, (error) => {
            console.warn('Could not load ABeautifulGame.glb, continuing without it.', error);
            // Set to true anyway to satisfy state requirements if file is missing
            stationLoaded = true; 
        });

        // --- Planets Logic ---
        let planets = [];
        let planetCounter = 0;

        function createOrbitLine(radius) {
            const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, 2 * Math.PI, false, 0);
            const points = curve.getPoints(64);
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            geometry.rotateX(Math.PI / 2);
            const material = new THREE.LineDashedMaterial({ 
                color: 0xffffff, 
                dashSize: 0.5, 
                gapSize: 0.5, 
                transparent: true, 
                opacity: 0.3 
            });
            const line = new THREE.Line(geometry, material);
            line.computeLineDistances();
            return line;
        }

        function createPlanet(color, radius, orbitalRadius, angularSpeed) {
            planetCounter++;
            const geometry = new THREE.SphereGeometry(radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(orbitalRadius, 0, 0);

            const orbitLine = createOrbitLine(orbitalRadius);

            return {
                name: `Planet_${planetCounter}`,
                color: color,
                radius: radius,
                orbitalRadius: orbitalRadius,
                angularSpeed: angularSpeed,
                angle: 0,
                mesh: mesh,
                orbitLine: orbitLine
            };
        }

        function addPlanetToScene(p) {
            scene.add(p.mesh);
            scene.add(p.orbitLine);
            planets.push(p);
        }

        function removePlanetFromScene(p) {
            scene.remove(p.mesh);
            scene.remove(p.orbitLine);
            planets = planets.filter(pl => pl !== p);
        }

        // Default Planet
        const defaultPlanet = createPlanet(0x0000ff, 1, 15, 0.01);
        addPlanetToScene(defaultPlanet);

        // --- State & Undo/Redo System ---
        let isPaused = false;
        let speedMultiplier = 1;
        let historyStack = [];
        let redoStack = [];

        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');

        function updateButtons() {
            undoBtn.disabled = historyStack.length === 0;
            redoBtn.disabled = redoStack.length === 0;
        }

        function recordAction(type, planet) {
            historyStack.push({ type, planet });
            redoStack = [];
            updateButtons();
        }

        // --- Event Listeners ---
        document.getElementById('addPlanetBtn').addEventListener('click', () => {
            const color = Math.random() * 0xffffff;
            const orbitalRadius = 8 + Math.random() * 32;
            const angularSpeed = 0.003 + Math.random() * 0.017;
            const radius = 0.5 + Math.random() * 1.0;
            
            const p = createPlanet(color, radius, orbitalRadius, angularSpeed);
            addPlanetToScene(p);
            recordAction('add', p);
        });

        document.getElementById('removeLastBtn').addEventListener('click', () => {
            if (planets.length === 0) return;
            const p = planets[planets.length - 1];
            removePlanetFromScene(p);
            recordAction('remove', p);
        });

        undoBtn.addEventListener('click', () => {
            if (historyStack.length === 0) return;
            const action = historyStack.pop();
            if (action.type === 'add') {
                removePlanetFromScene(action.planet);
            } else if (action.type === 'remove') {
                addPlanetToScene(action.planet);
            }
            redoStack.push(action);
            updateButtons();
        });

        redoBtn.addEventListener('click', () => {
            if (redoStack.length === 0) return;
            const action = redoStack.pop();
            if (action.type === 'add') {
                addPlanetToScene(action.planet);
            } else if (action.type === 'remove') {
                removePlanetFromScene(action.planet);
            }
            historyStack.push(action);
            updateButtons();
        });

        const pauseBtn = document.getElementById('pauseBtn');
        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
        });

        document.getElementById('speedSlider').addEventListener('input', (e) => {
            speedMultiplier = parseFloat(e.target.value);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Global State Object ---
        window.__3D_STATE__ = {};

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isPaused) {
                // Update Station
                if (stationLoaded && stationMesh) {
                    stationOrbitAngle += 0.003 * speedMultiplier;
                    stationMesh.position.x = 20 * Math.cos(stationOrbitAngle);
                    stationMesh.position.z = 20 * Math.sin(stationOrbitAngle);
                }

                // Update Planets
                planets.forEach(p => {
                    p.angle += p.angularSpeed * speedMultiplier;
                    p.mesh.position.x = p.orbitalRadius * Math.cos(p.angle);
                    p.mesh.position.z = p.orbitalRadius * Math.sin(p.angle);
                });
            }

            controls.update();
            renderer.render(scene, camera);

            // Update Global State
            window.__3D_STATE__ = {
                planetCount: planets.length,
                isPaused: isPaused,
                speedMultiplier: speedMultiplier,
                historyLength: historyStack.length,
                redoLength: redoStack.length,
                undoBtnDisabled: undoBtn.disabled,
                redoBtnDisabled: redoBtn.disabled,
                stationLoaded: stationLoaded,
                stationOrbitAngle: stationOrbitAngle,
                planets: planets.map(p => ({
                    name: p.name,
                    orbitalRadius: p.orbitalRadius,
                    angularSpeed: p.angularSpeed,
                    angle: p.angle
                }))
            };

            // Update HUD
            document.getElementById('planetCount').textContent = planets.length;
            document.getElementById('speedDisplay').textContent = speedMultiplier.toFixed(1);
            document.getElementById('simStatus').textContent = isPaused ? 'Paused' : 'Running';
        }

        animate();
    </script>
</body>
</html>
