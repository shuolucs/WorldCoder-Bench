<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Planetary Orbit Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #050510; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #uiContainer {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: rgba(5, 5, 16, 0.8);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 10;
    flex-wrap: wrap;
  }

  #uiContainer button {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  #uiContainer button:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.2);
    border-color: rgba(255, 255, 255, 0.4);
  }

  #uiContainer button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .slider-container {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #aaa;
    font-size: 13px;
  }

  #speedSlider {
    width: 100px;
    accent-color: #ffdd44;
  }

  #hudPanel {
    position: absolute;
    top: 65px;
    left: 15px;
    background: rgba(5, 5, 16, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 14px 18px;
    color: #ccc;
    font-size: 13px;
    line-height: 1.8;
    z-index: 10;
    min-width: 180px;
  }

  #hudPanel .label {
    color: #888;
  }

  #hudPanel .value {
    color: #fff;
    font-weight: 600;
  }

  #simStatus.running { color: #44ff88; }
  #simStatus.paused { color: #ff8844; }
</style>
</head>
<body>

<div id="uiContainer">
  <button id="addPlanetBtn">+ Add Planet</button>
  <button id="removeLastBtn">- Remove Last</button>
  <button id="undoBtn" disabled>Undo</button>
  <button id="redoBtn" disabled>Redo</button>
  <button id="pauseBtn">Pause</button>
  <div class="slider-container">
    <span>Speed:</span>
    <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
    <span id="sliderVal">1.0x</span>
  </div>
</div>

<div id="hudPanel">
  <div><span class="label">Planets: </span><span class="value" id="planetCount">0</span></div>
  <div><span class="label">Speed: </span><span class="value" id="speedDisplay">1.0x</span></div>
  <div><span class="label">Status: </span><span class="value running" id="simStatus">Running</span></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffdd44, 2, 300);
pointLight.position.set(0, 0, 0);
scene.add(pointLight);

// --- Sun ---
const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
const sun = new THREE.Mesh(sunGeometry, sunMaterial);
scene.add(sun);

// Sun glow
const glowGeometry = new THREE.SphereGeometry(3.5, 32, 32);
const glowMaterial = new THREE.MeshBasicMaterial({
  color: 0xffaa00,
  transparent: true,
  opacity: 0.15,
});
const sunGlow = new THREE.Mesh(glowGeometry, glowMaterial);
scene.add(sunGlow);

// --- Starfield ---
const starCount = 500;
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 200 * Math.cbrt(Math.random());
  starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  starPositions[i * 3 + 2] = r * Math.cos(phi);
}
const starGeometry = new THREE.BufferGeometry();
starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, sizeAttenuation: true });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// --- State ---
let planets = [];
let isPaused = false;
let speedMultiplier = 1;
let historyStack = [];
let redoStack = [];
let planetCounter = 0;

// Space station
let stationModel = null;
let stationLoaded = false;
let stationOrbitAngle = 0;
const stationOrbitRadius = 20;
const stationAngularSpeed = 0.003;

// --- GLB Loader ---
const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/ABeautifulGame.glb',
  (gltf) => {
    stationModel = gltf.scene;
    stationModel.scale.set(0.02, 0.02, 0.02);
    stationModel.position.set(20, 0, 0);
    scene.add(stationModel);
    stationLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Could not load GLB model:', error);
    // Create a fallback station
    const fallbackGeo = new THREE.OctahedronGeometry(1, 0);
    const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
    stationModel = new THREE.Mesh(fallbackGeo, fallbackMat);
    stationModel.position.set(20, 0, 0);
    scene.add(stationModel);
    stationLoaded = true;
  }
);

// --- Planet Functions ---
function createOrbitLine(orbitalRadius) {
  const segments = 128;
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const theta = (i / segments) * Math.PI * 2;
    points.push(new THREE.Vector3(
      orbitalRadius * Math.cos(theta),
      0,
      orbitalRadius * Math.sin(theta)
    ));
  }
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineDashedMaterial({
    color: 0x444466,
    dashSize: 1,
    gapSize: 0.5,
    transparent: true,
    opacity: 0.4,
  });
  const line = new THREE.Line(geometry, material);
  line.computeLineDistances();
  return line;
}

function createPlanet(options = {}) {
  const name = options.name || `Planet-${++planetCounter}`;
  const color = options.color || new THREE.Color(Math.random(), Math.random(), Math.random());
  const radius = options.radius || (0.5 + Math.random() * 1.0);
  const orbitalRadius = options.orbitalRadius || (8 + Math.random() * 32);
  const angularSpeed = options.angularSpeed || (0.003 + Math.random() * 0.017);
  const angle = options.angle || 0;

  const geometry = new THREE.SphereGeometry(radius, 24, 24);
  const material = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.6,
    metalness: 0.3,
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(
    orbitalRadius * Math.cos(angle),
    0,
    orbitalRadius * Math.sin(angle)
  );
  scene.add(mesh);

  const orbitLine = createOrbitLine(orbitalRadius);
  scene.add(orbitLine);

  const planet = {
    name,
    color: color instanceof THREE.Color ? color : new THREE.Color(color),
    radius,
    orbitalRadius,
    angularSpeed,
    angle,
    mesh,
    orbitLine,
  };

  return planet;
}

function addPlanetToScene(planet) {
  if (!planet.mesh.parent) scene.add(planet.mesh);
  if (!planet.orbitLine.parent) scene.add(planet.orbitLine);
  if (!planets.includes(planet)) planets.push(planet);
}

function removePlanetFromScene(planet) {
  scene.remove(planet.mesh);
  scene.remove(planet.orbitLine);
  const idx = planets.indexOf(planet);
  if (idx !== -1) planets.splice(idx, 1);
}

// --- DOM Elements ---
const addPlanetBtn = document.getElementById('addPlanetBtn');
const removeLastBtn = document.getElementById('removeLastBtn');
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const pauseBtn = document.getElementById('pauseBtn');
const speedSlider = document.getElementById('speedSlider');
const sliderVal = document.getElementById('sliderVal');
const planetCountEl = document.getElementById('planetCount');
const speedDisplayEl = document.getElementById('speedDisplay');
const simStatusEl = document.getElementById('simStatus');

function updateButtons() {
  undoBtn.disabled = historyStack.length === 0;
  redoBtn.disabled = redoStack.length === 0;
}

// --- Add default planet ---
const defaultPlanet = createPlanet({
  name: 'Planet-1',
  color: new THREE.Color(0x4488ff),
  radius: 1,
  orbitalRadius: 15,
  angularSpeed: 0.01,
  angle: 0,
});
planets.push(defaultPlanet);
historyStack.push({ type: 'add', planet: defaultPlanet });
updateButtons();

// --- Event Handlers ---
addPlanetBtn.addEventListener('click', () => {
  const planet = createPlanet();
  planets.push(planet);
  historyStack.push({ type: 'add', planet });
  redoStack.length = 0;
  updateButtons();
});

removeLastBtn.addEventListener('click', () => {
  if (planets.length === 0) return;
  const planet = planets[planets.length - 1];
  removePlanetFromScene(planet);
  historyStack.push({ type: 'remove', planet });
  redoStack.length = 0;
  updateButtons();
});

undoBtn.addEventListener('click', () => {
  if (historyStack.length === 0) return;
  const action = historyStack.pop();
  if (action.type === 'add') {
    removePlanetFromScene(action.planet);
    redoStack.push(action);
  } else if (action.type === 'remove') {
    addPlanetToScene(action.planet);
    redoStack.push(action);
  }
  updateButtons();
});

redoBtn.addEventListener('click', () => {
  if (redoStack.length === 0) return;
  const action = redoStack.pop();
  if (action.type === 'add') {
    addPlanetToScene(action.planet);
    historyStack.push(action);
  } else if (action.type === 'remove') {
    removePlanetFromScene(action.planet);
    historyStack.push(action);
  }
  updateButtons();
});

pauseBtn.addEventListener('click', () => {
  isPaused = !isPaused;
  pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
});

speedSlider.addEventListener('input', () => {
  speedMultiplier = parseFloat(speedSlider.value);
  sliderVal.textContent = speedMultiplier.toFixed(1) + 'x';
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Global State ---
window.__3D_STATE__ = {
  planetCount: 0,
  isPaused: false,
  speedMultiplier: 1,
  historyLength: 0,
  redoLength: 0,
  undoBtnDisabled: true,
  redoBtnDisabled: true,
  stationLoaded: false,
  stationOrbitAngle: 0,
  planets: [],
};

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);

  if (!isPaused) {
    // Update planets
    for (const planet of planets) {
      planet.angle += planet.angularSpeed * speedMultiplier;
      planet.mesh.position.x = planet.orbitalRadius * Math.cos(planet.angle);
      planet.mesh.position.z = planet.orbitalRadius * Math.sin(planet.angle);
      planet.mesh.position.y = 0;
    }

    // Update station
    if (stationModel) {
      stationOrbitAngle += stationAngularSpeed * speedMultiplier;
      stationModel.position.x = stationOrbitRadius * Math.cos(stationOrbitAngle);
      stationModel.position.z = stationOrbitRadius * Math.sin(stationOrbitAngle);
      stationModel.position.y = 0;
      stationModel.rotation.y += 0.01 * speedMultiplier;
    }
  }

  // Sun glow pulse
  const t = Date.now() * 0.001;
  sunGlow.scale.setScalar(1 + 0.05 * Math.sin(t * 2));

  // Update HUD
  planetCountEl.textContent = planets.length;
  speedDisplayEl.textContent = speedMultiplier.toFixed(1) + 'x';
  simStatusEl.textContent = isPaused ? 'Paused' : 'Running';
  simStatusEl.className = 'value ' + (isPaused ? 'paused' : 'running');

  // Update global state
  window.__3D_STATE__.planetCount = planets.length;
  window.__3D_STATE__.isPaused = isPaused;
  window.__3D_STATE__.speedMultiplier = speedMultiplier;
  window.__3D_STATE__.historyLength = historyStack.length;
  window.__3D_STATE__.redoLength = redoStack.length;
  window.__3D_STATE__.undoBtnDisabled = undoBtn.disabled;
  window.__3D_STATE__.redoBtnDisabled = redoBtn.disabled;
  window.__3D_STATE__.stationLoaded = stationLoaded;
  window.__3D_STATE__.stationOrbitAngle = stationOrbitAngle;
  window.__3D_STATE__.planets = planets.map(p => ({
    name: p.name,
    orbitalRadius: p.orbitalRadius,
    angularSpeed: p.angularSpeed,
    angle: p.angle,
  }));

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
