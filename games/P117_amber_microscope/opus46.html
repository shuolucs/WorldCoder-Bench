<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虚拟显微镜 - 琥珀蚊子标本</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  #canvas-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  canvas { display: block; }

  /* Top toolbar */
  #toolbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 20px;
    background: linear-gradient(180deg, rgba(10,10,10,0.92) 0%, rgba(10,10,10,0.6) 80%, transparent 100%);
    flex-wrap: wrap;
  }
  #toolbar .group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 4px 6px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  #toolbar .group-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #888;
    padding: 0 8px;
    white-space: nowrap;
  }
  .btn {
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07);
    color: #ccc;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.25s ease;
    user-select: none;
    backdrop-filter: blur(4px);
  }
  .btn:hover {
    background: rgba(255,255,255,0.14);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }
  .btn.active {
    background: linear-gradient(135deg, #00b4d8, #0077b6);
    color: #fff;
    border-color: #00b4d8;
    box-shadow: 0 0 16px rgba(0,180,216,0.35);
  }
  .btn.measure-active {
    background: linear-gradient(135deg, #e63946, #d62828);
    color: #fff;
    border-color: #e63946;
    box-shadow: 0 0 16px rgba(230,57,70,0.4);
    animation: pulse-measure 1.5s ease-in-out infinite;
  }
  .btn.uv-active {
    background: linear-gradient(135deg, #7700ff, #5500cc);
    color: #fff;
    border-color: #7700ff;
    box-shadow: 0 0 16px rgba(119,0,255,0.4);
  }
  @keyframes pulse-measure {
    0%, 100% { box-shadow: 0 0 16px rgba(230,57,70,0.4); }
    50% { box-shadow: 0 0 28px rgba(230,57,70,0.7); }
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 80px;
    left: 20px;
    z-index: 10;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 16px 20px;
    backdrop-filter: blur(12px);
    min-width: 200px;
  }
  #hud h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #666;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding-bottom: 8px;
  }
  .hud-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .hud-row:last-child { margin-bottom: 0; }
  .hud-label { color: #888; }
  .hud-value {
    color: #00d4ff;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .hud-value.uv-glow { color: #aa66ff; }

  /* Crosshair for measure mode */
  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 24px; height: 24px;
    pointer-events: none;
    z-index: 15;
    display: none;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(230,57,70,0.7);
  }
  #crosshair::before {
    top: 0; left: 50%;
    width: 1px; height: 100%;
    transform: translateX(-50%);
  }
  #crosshair::after {
    top: 50%; left: 0;
    width: 100%; height: 1px;
    transform: translateY(-50%);
  }

  /* Loading overlay */
  #loading {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 100;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s ease;
  }
  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .loader-ring {
    width: 60px; height: 60px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #00b4d8;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p {
    margin-top: 20px;
    color: #888;
    font-size: 14px;
  }

  /* Measure info tooltip */
  .measure-label {
    position: absolute;
    pointer-events: none;
    z-index: 20;
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.2);
    white-space: nowrap;
    transform: translate(-50%, -100%);
  }

  /* Vignette */
  #vignette {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 5;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  }

  /* Microscope frame overlay */
  #scope-frame {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 4;
    border-radius: 0;
    box-shadow: inset 0 0 120px 40px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <p>正在加载琥珀标本...</p>
</div>

<div id="canvas-container"></div>
<div id="scope-frame"></div>
<div id="vignette"></div>
<div id="crosshair"></div>

<div id="toolbar">
  <div class="group">
    <span class="group-label">缩放</span>
    <button class="btn active" id="zoom1x">1x</button>
    <button class="btn" id="zoom2x">2x</button>
    <button class="btn" id="zoom5x">5x</button>
    <button class="btn" id="zoom10x">10x</button>
  </div>
  <div class="group">
    <span class="group-label">工具</span>
    <button class="btn" id="measureBtn">📏 测量</button>
  </div>
  <div class="group">
    <span class="group-label">灯光</span>
    <button class="btn active" id="lightVisible">☀️ 可见光</button>
    <button class="btn" id="lightUV">🔮 UV 光</button>
  </div>
</div>

<div id="hud">
  <h3>显微镜状态</h3>
  <div class="hud-row">
    <span class="hud-label">缩放倍率</span>
    <span class="hud-value" id="zoomLevel">1</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">测量次数</span>
    <span class="hud-value" id="measureCount">0</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">灯光模式</span>
    <span class="hud-value" id="lightMode">visible</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">相机距离</span>
    <span class="hud-value" id="camDist">5.000</span>
  </div>
</div>

<div class="measure-label" id="measureLabel" style="display:none;"></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── State ───
const state = {
  modelLoaded: false,
  zoomLevel: 1,
  measureCount: 0,
  lightMode: 'visible',
  cameraDistance: 5,
  measureActive: false
};
window.__3D_STATE__ = { ...state };

// ─── Scene setup ───
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

// Add subtle fog
scene.fog = new THREE.FogExp2(0x111111, 0.08);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 2, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.2;
controls.maxDistance = 8;
controls.target.set(0, 0, 0);

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(3, 5, 4);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
dirLight2.position.set(-3, 2, -2);
scene.add(dirLight2);

const pointLight = new THREE.PointLight(0xffeedd, 0.6, 20);
pointLight.position.set(0, 3, 0);
scene.add(pointLight);

// Store original light settings
const originalLights = {
  ambient: { color: 0xffffff, intensity: 0.5 },
  dir: { color: 0xffffff, intensity: 1.2 },
  dir2: { color: 0xffffff, intensity: 0.4 },
  point: { color: 0xffeedd, intensity: 0.6 },
  bg: 0x111111
};

// ─── Model ───
let model = null;
let modelCenter = new THREE.Vector3();
let originalMaterials = new Map();

const loader = new GLTFLoader();
loader.load(
  'assets/MosquitoInAmber.glb',
  (gltf) => {
    model = gltf.scene;

    // Compute bounding box and center
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);

    // Scale to fit ~2 units
    const targetSize = 2;
    const scaleFactor = targetSize / maxDim;
    model.scale.setScalar(scaleFactor);

    // Recenter
    model.position.sub(center.multiplyScalar(scaleFactor));

    // Recompute center after transform
    const box2 = new THREE.Box3().setFromObject(model);
    modelCenter = box2.getCenter(new THREE.Vector3());
    controls.target.copy(modelCenter);

    // Store original materials
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        if (child.material) {
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(m => {
            if (!originalMaterials.has(m.uuid)) {
              originalMaterials.set(m.uuid, {
                emissive: m.emissive ? m.emissive.clone() : new THREE.Color(0x000000),
                emissiveIntensity: m.emissiveIntensity || 0
              });
            }
          });
        }
      }
    });

    scene.add(model);
    state.modelLoaded = true;

    // Position camera
    camera.position.set(modelCenter.x, modelCenter.y + 1.5, modelCenter.z + 5);
    controls.update();

    // Hide loading
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
    }, 400);
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.error('Model load error:', error);
    document.getElementById('loading').innerHTML = `
      <p style="color:#e63946;">模型加载失败</p>
      <p style="color:#888;font-size:12px;margin-top:8px;">请确保 assets/MosquitoInAmber.glb 存在</p>
    `;
  }
);

// ─── Ground plane (subtle) ───
const groundGeo = new THREE.CircleGeometry(8, 64);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x111111,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.5;
ground.receiveShadow = true;
scene.add(ground);

// ─── Zoom System ───
const zoomDistances = { 1: 5, 2: 2.5, 5: 1.0, 10: 0.5 };
let targetDistance = 5;
let zoomAnimating = false;
let zoomStartTime = 0;
let zoomStartDistance = 5;
const ZOOM_DURATION = 0.8;

function setZoom(level) {
  state.zoomLevel = level;
  targetDistance = zoomDistances[level];
  zoomStartDistance = camera.position.distanceTo(controls.target);
  zoomStartTime = performance.now() / 1000;
  zoomAnimating = true;

  // Update buttons
  document.querySelectorAll('#zoom1x,#zoom2x,#zoom5x,#zoom10x').forEach(b => b.classList.remove('active'));
  document.getElementById(`zoom${level}x`).classList.add('active');

  // Adjust light intensity for high zoom
  updateLightForZoom(level);

  // Update HUD
  document.getElementById('zoomLevel').textContent = level;
}

function updateLightForZoom(level) {
  const boost = level >= 5 ? 1.5 + (level - 5) * 0.15 : 1.0;
  if (state.lightMode === 'visible') {
    ambientLight.intensity = originalLights.ambient.intensity * boost;
    dirLight.intensity = originalLights.dir.intensity * boost;
    dirLight2.intensity = originalLights.dir2.intensity * boost;
    pointLight.intensity = originalLights.point.intensity * boost;
  } else {
    ambientLight.intensity = 0.3 * boost;
    dirLight.intensity = 0.8 * boost;
  }
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function updateZoomAnimation() {
  if (!zoomAnimating) return;
  const now = performance.now() / 1000;
  let t = (now - zoomStartTime) / ZOOM_DURATION;
  if (t >= 1) {
    t = 1;
    zoomAnimating = false;
  }
  const eased = easeInOutCubic(t);
  const currentDist = zoomStartDistance + (targetDistance - zoomStartDistance) * eased;

  // Move camera along its current direction from target
  const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
  camera.position.copy(controls.target).addScaledVector(dir, currentDist);
}

document.getElementById('zoom1x').addEventListener('click', () => setZoom(1));
document.getElementById('zoom2x').addEventListener('click', () => setZoom(2));
document.getElementById('zoom5x').addEventListener('click', () => setZoom(5));
document.getElementById('zoom10x').addEventListener('click', () => setZoom(10));

// ─── Measurement System ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let measurePoints = [];
let measureMarkers = [];
let measureLine = null;
let measureLabelSprite = null;
const measureLabelDiv = document.getElementById('measureLabel');

function enterMeasureMode() {
  state.measureActive = true;
  measurePoints = [];
  document.getElementById('measureBtn').classList.add('measure-active');
  document.getElementById('crosshair').style.display = 'block';
  renderer.domElement.style.cursor = 'crosshair';
}

function exitMeasureMode() {
  state.measureActive = false;
  document.getElementById('measureBtn').classList.remove('measure-active');
  document.getElementById('crosshair').style.display = 'none';
  renderer.domElement.style.cursor = 'default';
}

function clearMeasurement() {
  measureMarkers.forEach(m => scene.remove(m));
  measureMarkers = [];
  if (measureLine) { scene.remove(measureLine); measureLine = null; }
  if (measureLabelSprite) { scene.remove(measureLabelSprite); measureLabelSprite = null; }
  measureLabelDiv.style.display = 'none';
}

function addMeasurePoint(point) {
  const geo = new THREE.SphereGeometry(0.02, 16, 16);
  const mat = new THREE.MeshBasicMaterial({ color: 0xff2244, depthTest: false });
  const sphere = new THREE.Mesh(geo, mat);
  sphere.renderOrder = 999;
  sphere.position.copy(point);
  scene.add(sphere);
  measureMarkers.push(sphere);
}

function createMeasureLine(p1, p2) {
  const geo = new THREE.BufferGeometry().setFromPoints([p1, p2]);
  const mat = new THREE.LineBasicMaterial({ color: 0xffffff, depthTest: false, linewidth: 2 });
  measureLine = new THREE.Line(geo, mat);
  measureLine.renderOrder = 999;
  scene.add(measureLine);
}

function createDistanceLabel(p1, p2) {
  const dist = p1.distanceTo(p2);
  const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
  mid.y += 0.08;

  // Create sprite
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.roundRect(0, 0, 256, 64, 10);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.roundRect(0, 0, 256, 64, 10);
  ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${dist.toFixed(3)} units`, 128, 32);

  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false, transparent: true });
  measureLabelSprite = new THREE.Sprite(spriteMat);
  measureLabelSprite.position.copy(mid);
  measureLabelSprite.scale.set(0.5, 0.125, 1);
  measureLabelSprite.renderOrder = 1000;
  scene.add(measureLabelSprite);
}

function onMeasureClick(event) {
  if (!state.measureActive || !model) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(model, true);

  if (intersects.length > 0) {
    const point = intersects[0].point.clone();
    measurePoints.push(point);

    if (measurePoints.length === 1) {
      clearMeasurement();
      addMeasurePoint(point);
    } else if (measurePoints.length === 2) {
      addMeasurePoint(point);
      createMeasureLine(measurePoints[0], measurePoints[1]);
      createDistanceLabel(measurePoints[0], measurePoints[1]);
      state.measureCount++;
      document.getElementById('measureCount').textContent = state.measureCount;
      exitMeasureMode();
      measurePoints = [];
    }
  }
}

document.getElementById('measureBtn').addEventListener('click', () => {
  if (state.measureActive) {
    exitMeasureMode();
    measurePoints = [];
  } else {
    enterMeasureMode();
  }
});

renderer.domElement.addEventListener('click', onMeasureClick);

// ─── Light Mode ───
function setLightMode(mode) {
  state.lightMode = mode;

  if (mode === 'visible') {
    scene.background = new THREE.Color(originalLights.bg);
    scene.fog = new THREE.FogExp2(0x111111, 0.08);
    ambientLight.color.set(originalLights.ambient.color);
    ambientLight.intensity = originalLights.ambient.intensity;
    dirLight.color.set(originalLights.dir.color);
    dirLight.intensity = originalLights.dir.intensity;
    dirLight2.color.set(originalLights.dir2.color);
    dirLight2.intensity = originalLights.dir2.intensity;
    pointLight.color.set(originalLights.point.color);
    pointLight.intensity = originalLights.point.intensity;

    // Restore materials
    if (model) {
      model.traverse((child) => {
        if (child.isMesh && child.material) {
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(m => {
            const orig = originalMaterials.get(m.uuid);
            if (orig && m.emissive) {
              m.emissive.copy(orig.emissive);
              m.emissiveIntensity = orig.emissiveIntensity;
            }
          });
        }
      });
    }

    ground.material.color.set(0x111111);

    document.getElementById('lightVisible').classList.add('active');
    document.getElementById('lightUV').classList.remove('uv-active');
    document.getElementById('lightMode').textContent = 'visible';
    document.getElementById('lightMode').classList.remove('uv-glow');

  } else if (mode === 'uv') {
    scene.background = new THREE.Color(0x1a0033);
    scene.fog = new THREE.FogExp2(0x1a0033, 0.08);
    ambientLight.color.set(0x7700ff);
    ambientLight.intensity = 0.3;
    dirLight.color.set(0x7700ff);
    dirLight.intensity = 0.8;
    dirLight2.color.set(0x5500aa);
    dirLight2.intensity = 0.3;
    pointLight.color.set(0x9933ff);
    pointLight.intensity = 0.8;

    // Set emissive on model materials
    if (model) {
      model.traverse((child) => {
        if (child.isMesh && child.material) {
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(m => {
            if (m.emissive) {
              m.emissive.set(0x00ffaa);
              m.emissiveIntensity = 0.4;
            }
          });
        }
      });
    }

    ground.material.color.set(0x0d001a);

    document.getElementById('lightVisible').classList.remove('active');
    document.getElementById('lightUV').classList.add('uv-active');
    document.getElementById('lightMode').textContent = 'uv';
    document.getElementById('lightMode').classList.add('uv-glow');
  }

  // Re-apply zoom light boost
  updateLightForZoom(state.zoomLevel);
}

document.getElementById('lightVisible').addEventListener('click', () => setLightMode('visible'));
document.getElementById('lightUV').addEventListener('click', () => setLightMode('uv'));

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation Loop ───
function animate() {
  requestAnimationFrame(animate);

  updateZoomAnimation();
  controls.update();

  // Update state
  state.cameraDistance = camera.position.distanceTo(controls.target);
  document.getElementById('camDist').textContent = state.cameraDistance.toFixed(3);

  // Expose state
  window.__3D_STATE__ = {
    modelLoaded: state.modelLoaded,
    zoomLevel: state.zoomLevel,
    measureCount: state.measureCount,
    lightMode: state.lightMode,
    cameraDistance: parseFloat(state.cameraDistance.toFixed(4)),
    measureActive: state.measureActive
  };

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
