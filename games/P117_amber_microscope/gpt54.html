<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟显微镜 - 琥珀中的蚊子标本</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0f1115;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #toolbar {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      backdrop-filter: blur(8px);
    }

    .group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      border: none;
      outline: none;
      cursor: pointer;
      color: #fff;
      background: #2a2f3a;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    }

    button:hover {
      background: #3b4352;
    }

    button:active {
      transform: scale(0.97);
    }

    button.active {
      background: #0d8cff;
      box-shadow: 0 0 0 2px rgba(13, 140, 255, 0.25) inset;
    }

    button.measure-active {
      background: #d64545;
    }

    button.uv-active {
      background: #7b2cff;
    }

    #hud {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 20;
      min-width: 180px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      line-height: 1.8;
      font-size: 14px;
    }

    #hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      font-size: 13px;
      color: #d8dde7;
      pointer-events: none;
    }

    #measureLabel {
      position: absolute;
      z-index: 25;
      color: #fff;
      font-size: 13px;
      padding: 4px 8px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      white-space: nowrap;
      display: none;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>缩放倍率: <span id="zoomLevel">1</span>x</div>
      <div>测量次数: <span id="measureCount">0</span></div>
      <div>灯光模式: <span id="lightMode">visible</span></div>
    </div>

    <div id="toolbar">
      <div class="group">
        <button id="zoom1x" class="active">1x</button>
        <button id="zoom2x">2x</button>
        <button id="zoom5x">5x</button>
        <button id="zoom10x">10x</button>
      </div>
      <div class="group">
        <button id="measureBtn">测量</button>
      </div>
      <div class="group">
        <button id="lightVisible" class="active">可见光</button>
        <button id="lightUV">UV 光</button>
      </div>
    </div>

    <div id="hint">左键旋转模型；顶部按钮切换放大倍率、测量与灯光模式</div>
    <div id="measureLabel"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');

    const zoomLevelEl = document.getElementById('zoomLevel');
    const measureCountEl = document.getElementById('measureCount');
    const lightModeEl = document.getElementById('lightMode');

    const zoomButtons = {
      1: document.getElementById('zoom1x'),
      2: document.getElementById('zoom2x'),
      5: document.getElementById('zoom5x'),
      10: document.getElementById('zoom10x'),
    };

    const measureBtn = document.getElementById('measureBtn');
    const lightVisibleBtn = document.getElementById('lightVisible');
    const lightUVBtn = document.getElementById('lightUV');
    const measureLabel = document.getElementById('measureLabel');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x10141c);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0.6, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 2.2);
    directionalLight.position.set(3, 4, 5);
    scene.add(directionalLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
    fillLight.position.set(-3, 2, -4);
    scene.add(fillLight);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    let modelRoot = null;
    let modelLoaded = false;
    let modelCenter = new THREE.Vector3(0, 0, 0);
    let modelRadius = 1;
    let modelMaterials = [];

    let currentZoom = 1;
    let targetDistance = 5;

    let zoomAnim = null;

    let measureActive = false;
    let measureCount = 0;
    let measurePoints = [];
    let measureMarkers = [];
    let measureLine = null;
    let measureDistanceValue = null;
    let measureLabelPosition = new THREE.Vector3();

    let lightMode = 'visible';

    const zoomDistanceMap = {
      1: 5,
      2: 2.5,
      5: 1.0,
      10: 0.5
    };

    function updateHUD() {
      zoomLevelEl.textContent = String(currentZoom);
      measureCountEl.textContent = String(measureCount);
      lightModeEl.textContent = lightMode;
    }

    function setActiveZoomButton(level) {
      Object.entries(zoomButtons).forEach(([key, btn]) => {
        btn.classList.toggle('active', Number(key) === level);
      });
    }

    function clearMeasurement() {
      measurePoints = [];

      measureMarkers.forEach(marker => scene.remove(marker));
      measureMarkers = [];

      if (measureLine) {
        scene.remove(measureLine);
        measureLine.geometry.dispose();
        measureLine.material.dispose();
        measureLine = null;
      }

      measureDistanceValue = null;
      measureLabel.style.display = 'none';
    }

    function setMeasureMode(active) {
      measureActive = active;
      measureBtn.classList.toggle('measure-active', active);
    }

    function createMarker(position) {
      const marker = new THREE.Mesh(
        new THREE.SphereGeometry(0.03, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xff3333 })
      );
      marker.position.copy(position);
      scene.add(marker);
      measureMarkers.push(marker);
    }

    function finalizeMeasurement() {
      if (measurePoints.length !== 2) return;

      const [p1, p2] = measurePoints;
      const geometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
      const material = new THREE.LineBasicMaterial({ color: 0xffffff });
      measureLine = new THREE.Line(geometry, material);
      scene.add(measureLine);

      measureDistanceValue = p1.distanceTo(p2);
      measureLabelPosition.copy(p1).lerp(p2, 0.5).add(new THREE.Vector3(0, 0.05, 0));
      measureLabel.textContent = `${measureDistanceValue.toFixed(3)} units`;
      measureLabel.style.display = 'block';

      measureCount += 1;
      updateHUD();
      setMeasureMode(false);
    }

    function worldToScreen(worldPos) {
      const projected = worldPos.clone().project(camera);
      const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
      return { x, y, visible: projected.z >= -1 && projected.z <= 1 };
    }

    function updateMeasureLabel() {
      if (!measureDistanceValue) return;
      const screen = worldToScreen(measureLabelPosition);
      if (screen.visible) {
        measureLabel.style.left = `${screen.x}px`;
        measureLabel.style.top = `${screen.y}px`;
        measureLabel.style.display = 'block';
      } else {
        measureLabel.style.display = 'none';
      }
    }

    function adjustLightForZoom() {
      const boost = (currentZoom === 5 || currentZoom === 10) ? 1.45 : 1.0;

      if (lightMode === 'visible') {
        ambientLight.intensity = 1.2 * boost;
        directionalLight.intensity = 2.2 * boost;
        fillLight.intensity = 0.8 * boost;
      } else {
        ambientLight.intensity = 0.6 * boost;
        directionalLight.intensity = 1.8 * boost;
        fillLight.intensity = 0.45 * boost;
      }
    }

    function applyVisibleMode() {
      lightMode = 'visible';
      scene.background = new THREE.Color(0x10141c);

      ambientLight.color.set(0xffffff);
      directionalLight.color.set(0xffffff);
      fillLight.color.set(0xffffff);

      modelMaterials.forEach(mat => {
        if ('emissive' in mat) {
          mat.emissive.set(0x000000);
          mat.emissiveIntensity = 0;
        }
        mat.needsUpdate = true;
      });

      lightVisibleBtn.classList.add('active');
      lightUVBtn.classList.remove('active', 'uv-active');

      adjustLightForZoom();
      updateHUD();
    }

    function applyUVMode() {
      lightMode = 'uv';
      scene.background = new THREE.Color(0x1a0033);

      ambientLight.color.set(0x7700ff);
      directionalLight.color.set(0x7700ff);
      fillLight.color.set(0x5522aa);

      modelMaterials.forEach(mat => {
        if ('emissive' in mat) {
          mat.emissive.set(0x00ffaa);
          mat.emissiveIntensity = 0.4;
        }
        mat.needsUpdate = true;
      });

      lightVisibleBtn.classList.remove('active');
      lightUVBtn.classList.add('active', 'uv-active');

      adjustLightForZoom();
      updateHUD();
    }

    function animateCameraToDistance(distance, duration = 800) {
      const startTime = performance.now();
      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();
      const endTarget = modelCenter.clone();

      const currentDir = camera.position.clone().sub(controls.target);
      let direction = currentDir.lengthSq() > 0.000001
        ? currentDir.clone().normalize()
        : new THREE.Vector3(0, 0.12, 1).normalize();

      const endPos = endTarget.clone().add(direction.multiplyScalar(distance));

      zoomAnim = { startTime, duration, startPos, endPos, startTarget, endTarget };
      targetDistance = distance;
    }

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function setZoom(level) {
      currentZoom = level;
      setActiveZoomButton(level);
      updateHUD();
      animateCameraToDistance(zoomDistanceMap[level], 800);
      adjustLightForZoom();
    }

    function handlePointerDown(event) {
      if (!measureActive || !modelRoot) return;

      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObject(modelRoot, true);

      if (intersects.length > 0) {
        const hitPoint = intersects[0].point.clone();

        if (measurePoints.length === 0) {
          clearMeasurement();
        }

        measurePoints.push(hitPoint);
        createMarker(hitPoint);

        if (measurePoints.length === 2) {
          finalizeMeasurement();
        }
      }
    }

    renderer.domElement.addEventListener('pointerdown', handlePointerDown);

    Object.entries(zoomButtons).forEach(([level, btn]) => {
      btn.addEventListener('click', () => setZoom(Number(level)));
    });

    measureBtn.addEventListener('click', () => {
      const next = !measureActive;
      clearMeasurement();
      setMeasureMode(next);
    });

    lightVisibleBtn.addEventListener('click', applyVisibleMode);
    lightUVBtn.addEventListener('click', applyUVMode);

    const loader = new GLTFLoader();
    loader.load(
      'assets/MosquitoInAmber.glb',
      (gltf) => {
        modelRoot = gltf.scene;

        const box = new THREE.Box3().setFromObject(modelRoot);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;

        modelRoot.position.sub(center);

        const desiredSize = 2.2;
        const scale = desiredSize / maxDim;
        modelRoot.scale.setScalar(scale);

        scene.add(modelRoot);

        const scaledBox = new THREE.Box3().setFromObject(modelRoot);
        modelCenter = scaledBox.getCenter(new THREE.Vector3());
        modelRadius = scaledBox.getBoundingSphere(new THREE.Sphere()).radius;

        controls.target.copy(modelCenter);

        camera.position.copy(modelCenter.clone().add(new THREE.Vector3(0, modelRadius * 0.2, zoomDistanceMap[currentZoom])));
        controls.update();

        modelMaterials = [];
        modelRoot.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;

            const materials = Array.isArray(child.material) ? child.material : [child.material];
            materials.forEach((mat) => {
              if (mat && !modelMaterials.includes(mat)) {
                if ('emissive' in mat && mat.emissiveIntensity === undefined) {
                  mat.emissiveIntensity = 0;
                }
                modelMaterials.push(mat);
              }
            });
          }
        });

        modelLoaded = true;
        adjustLightForZoom();
        if (lightMode === 'uv') {
          applyUVMode();
        } else {
          applyVisibleMode();
        }
      },
      undefined,
      (error) => {
        console.error('模型加载失败:', error);
      }
    );

    function update3DState() {
      const cameraDistance = camera.position.distanceTo(controls.target);
      window.__3D_STATE__ = {
        modelLoaded,
        zoomLevel: currentZoom,
        measureCount,
        lightMode,
        cameraDistance,
        measureActive
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      if (zoomAnim) {
        const elapsed = performance.now() - zoomAnim.startTime;
        const t = Math.min(elapsed / zoomAnim.duration, 1);
        const k = easeInOutCubic(t);

        camera.position.lerpVectors(zoomAnim.startPos, zoomAnim.endPos, k);
        controls.target.lerpVectors(zoomAnim.startTarget, zoomAnim.endTarget, k);

        if (t >= 1) {
          zoomAnim = null;
        }
      }

      controls.update();
      updateMeasureLabel();
      update3DState();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    update3DState();
    animate();
  </script>
</body>
</html>
