<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Spring System Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
            min-width: 250px;
        }
        .hud-row {
            margin-bottom: 5px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 10px;
            pointer-events: auto;
        }
        button {
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px 15px;
            margin-right: 10px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 3px;
        }
        button:hover {
            background: #0f0;
            color: #000;
        }
        button:active {
            background: #0a0;
        }
        #instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ccc;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #555;
            border-radius: 5px;
            pointer-events: none;
            font-size: 12px;
            text-align: right;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div class="hud-row">State: <span id="ui-state">PAUSED</span></div>
        <div class="hud-row">Mass A (y): <span id="ui-posA">0.00</span></div>
        <div class="hud-row">Mass B (y): <span id="ui-posB">0.00</span></div>
        <div class="hud-row">Total Energy: <span id="ui-energy">0.00</span></div>
        <div class="hud-row">History: <span id="ui-history">0 / 0</span></div>
        <div class="hud-row">Drag Mode: <span id="ui-drag">OFF</span></div>
        <div class="hud-row">k1: <span id="ui-k1">20</span> | k2: <span id="ui-k2">15</span></div>
    </div>

    <div id="controls">
        <button id="undoBtn">Undo (Ctrl+Z)</button>
        <button id="redoBtn">Redo (Ctrl+Y)</button>
    </div>

    <div id="instructions">
        <b>Controls:</b><br>
        Space: Play/Pause<br>
        R: Reset<br>
        D: Toggle Drag Mode<br>
        G: Impulse to Mass B<br>
        1: Set k1 = 10<br>
        2: Set k1 = 30<br>
        Drag: Click & move masses (when paused)
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            simRunning: false,
            massA_pos: { x: 0, y: 3.5, z: 0 },
            massB_pos: { x: 0, y: 2.0, z: 0 },
            massA_vel: { x: 0, y: 0, z: 0 },
            massB_vel: { x: 0, y: 0, z: 0 },
            k1: 20,
            k2: 15,
            totalEnergy: 0,
            historyIndex: 0,
            historyLength: 0,
            dragMode: false,
            brainStemLoaded: false,
            stepCount: 0,
            massA_grounded: false,
            massB_grounded: false
        };

        // --- Physics Constants & Variables ---
        const dt = 0.016;
        const g = 9.81;
        const mass = 1.0;
        const restLength1 = 1.0;
        const restLength2 = 1.0;
        const damping = 0.5;
        const massRadius = 0.3;

        let posAnchor = new THREE.Vector3(0, 5, 0);
        let posA = new THREE.Vector3(0, 3.5, 0);
        let posB = new THREE.Vector3(0, 2.0, 0);
        let velA = new THREE.Vector3(0, 0, 0);
        let velB = new THREE.Vector3(0, 0, 0);
        let k1 = 20;
        let k2 = 15;

        // --- History System ---
        let history = [];
        let historyIndex = -1;
        const MAX_HISTORY = 50;

        function saveState() {
            history = history.slice(0, historyIndex + 1);
            history.push({
                posA: posA.clone(),
                posB: posB.clone(),
                velA: velA.clone(),
                velB: velB.clone(),
                k1: k1,
                k2: k2
            });
            if (history.length > MAX_HISTORY) {
                history.shift();
            }
            historyIndex = history.length - 1;
            updateStateObject();
        }

        function loadState(index) {
            if (index >= 0 && index < history.length) {
                const state = history[index];
                posA.copy(state.posA);
                posB.copy(state.posB);
                velA.copy(state.velA);
                velB.copy(state.velB);
                k1 = state.k1;
                k2 = state.k2;
                historyIndex = index;
                updateVisuals();
                updateStateObject();
            }
        }

        function undo() {
            if (historyIndex > 0) {
                loadState(historyIndex - 1);
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                loadState(historyIndex + 1);
            }
        }

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ground & Grid
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(50, 50);
        scene.add(gridHelper);

        // GLTF Model
        const loader = new GLTFLoader();
        loader.load('._BrainStem.glb', (gltf) => {
            const model = gltf.scene;
            model.position.set(0, 3, -3);
            model.scale.set(0.5, 0.5, 0.5);
            scene.add(model);
            window.__3D_STATE__.brainStemLoaded = true;
        }, undefined, (error) => {
            console.warn("Could not load ._BrainStem.glb. This is expected if the file is not present.", error);
        });

        // Physics Objects
        const anchorGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const anchorMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const anchorMesh = new THREE.Mesh(anchorGeo, anchorMat);
        anchorMesh.position.copy(posAnchor);
        scene.add(anchorMesh);

        const massGeo = new THREE.SphereGeometry(massRadius, 32, 32);
        const matA = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        const meshA = new THREE.Mesh(massGeo, matA);
        scene.add(meshA);

        const matB = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        const meshB = new THREE.Mesh(massGeo, matB);
        scene.add(meshB);

        // Springs (Lines)
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
        
        const geoSpring1 = new THREE.BufferGeometry().setFromPoints([posAnchor, posA]);
        const lineSpring1 = new THREE.Line(geoSpring1, lineMat);
        scene.add(lineSpring1);

        const geoSpring2 = new THREE.BufferGeometry().setFromPoints([posA, posB]);
        const lineSpring2 = new THREE.Line(geoSpring2, lineMat);
        scene.add(lineSpring2);

        // --- Interaction & Dragging ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        let draggedMesh = null;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.simRunning = !window.__3D_STATE__.simRunning;
            } else if (e.code === 'KeyR') {
                posA.set(0, 3.5, 0);
                posB.set(0, 2.0, 0);
                velA.set(0, 0, 0);
                velB.set(0, 0, 0);
                k1 = 20;
                k2 = 15;
                saveState();
            } else if (e.code === 'KeyD') {
                window.__3D_STATE__.dragMode = !window.__3D_STATE__.dragMode;
            } else if (e.code === 'KeyG') {
                velB.y -= 5;
                saveState();
            } else if (e.code === 'Digit1') {
                k1 = 10;
                saveState();
            } else if (e.code === 'Digit2') {
                k1 = 30;
                saveState();
            } else if (e.ctrlKey && e.code === 'KeyZ') {
                undo();
            } else if (e.ctrlKey && e.code === 'KeyY') {
                redo();
            }
        });

        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('redoBtn').addEventListener('click', redo);

        renderer.domElement.addEventListener('mousedown', (e) => {
            if (!window.__3D_STATE__.dragMode || window.__3D_STATE__.simRunning) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects([meshA, meshB]);
            if (intersects.length > 0) {
                draggedMesh = intersects[0].object;
            }
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            if (!draggedMesh) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, intersectPoint);

            if (intersectPoint) {
                intersectPoint.y = Math.max(massRadius, intersectPoint.y); // Clamp to ground
                
                if (draggedMesh === meshA) {
                    posA.copy(intersectPoint);
                    velA.set(0, 0, 0);
                } else if (draggedMesh === meshB) {
                    posB.copy(intersectPoint);
                    velB.set(0, 0, 0);
                }
                updateVisuals();
            }
        });

        renderer.domElement.addEventListener('mouseup', () => {
            if (draggedMesh) {
                draggedMesh = null;
                saveState();
            }
        });

        // --- Physics Engine ---
        function physicsStep() {
            if (!window.__3D_STATE__.simRunning) return;
            window.__3D_STATE__.stepCount++;

            // Gravity
            const FgA = new THREE.Vector3(0, -mass * g, 0);
            const FgB = new THREE.Vector3(0, -mass * g, 0);

            // Spring 1 (Anchor to A)
            const dir1 = new THREE.Vector3().subVectors(posA, posAnchor);
            const len1 = dir1.length();
            dir1.normalize();
            const Fs1_spring = dir1.clone().multiplyScalar(-k1 * (len1 - restLength1));
            const Fs1_damp = velA.clone().multiplyScalar(-damping);
            const Fs1 = new THREE.Vector3().addVectors(Fs1_spring, Fs1_damp);

            // Spring 2 (A to B)
            const dir2 = new THREE.Vector3().subVectors(posB, posA);
            const len2 = dir2.length();
            dir2.normalize();
            const relVel = new THREE.Vector3().subVectors(velB, velA);
            const Fs2_spring = dir2.clone().multiplyScalar(-k2 * (len2 - restLength2));
            const Fs2_damp = relVel.clone().multiplyScalar(-damping);
            const Fs2 = new THREE.Vector3().addVectors(Fs2_spring, Fs2_damp);

            // Total Forces
            const forceA = new THREE.Vector3().add(FgA).add(Fs1).sub(Fs2);
            const forceB = new THREE.Vector3().add(FgB).add(Fs2);

            // Integration (Euler)
            velA.add(forceA.multiplyScalar(dt / mass));
            velB.add(forceB.multiplyScalar(dt / mass));

            posA.add(velA.clone().multiplyScalar(dt));
            posB.add(velB.clone().multiplyScalar(dt));

            // Ground Constraints
            if (posA.y < massRadius) {
                posA.y = massRadius;
                velA.y = 0;
                velA.x *= 0.9; velA.z *= 0.9; // Friction
            }
            if (posB.y < massRadius) {
                posB.y = massRadius;
                velB.y = 0;
                velB.x *= 0.9; velB.z *= 0.9;
            }
        }

        function calculateEnergy() {
            const keA = 0.5 * mass * velA.lengthSq();
            const keB = 0.5 * mass * velB.lengthSq();
            const peGA = mass * g * posA.y;
            const peGB = mass * g * posB.y;
            
            const stretch1 = posA.distanceTo(posAnchor) - restLength1;
            const peS1 = 0.5 * k1 * stretch1 * stretch1;
            
            const stretch2 = posB.distanceTo(posA) - restLength2;
            const peS2 = 0.5 * k2 * stretch2 * stretch2;

            return keA + keB + peGA + peGB + peS1 + peS2;
        }

        // --- Updates ---
        function updateVisuals() {
            meshA.position.copy(posA);
            meshB.position.copy(posB);

            const positions1 = lineSpring1.geometry.attributes.position.array;
            positions1[0] = posAnchor.x; positions1[1] = posAnchor.y; positions1[2] = posAnchor.z;
            positions1[3] = posA.x;      positions1[4] = posA.y;      positions1[5] = posA.z;
            lineSpring1.geometry.attributes.position.needsUpdate = true;

            const positions2 = lineSpring2.geometry.attributes.position.array;
            positions2[0] = posA.x; positions2[1] = posA.y; positions2[2] = posA.z;
            positions2[3] = posB.x; positions2[4] = posB.y; positions2[5] = posB.z;
            lineSpring2.geometry.attributes.position.needsUpdate = true;
        }

        function updateStateObject() {
            const state = window.__3D_STATE__;
            state.massA_pos = { x: posA.x, y: posA.y, z: posA.z };
            state.massB_pos = { x: posB.x, y: posB.y, z: posB.z };
            state.massA_vel = { x: velA.x, y: velA.y, z: velA.z };
            state.massB_vel = { x: velB.x, y: velB.y, z: velB.z };
            state.k1 = k1;
            state.k2 = k2;
            state.totalEnergy = calculateEnergy();
            state.historyIndex = historyIndex;
            state.historyLength = history.length;
            state.massA_grounded = posA.y <= massRadius + 0.01;
            state.massB_grounded = posB.y <= massRadius + 0.01;
        }

        function updateHUD() {
            const state = window.__3D_STATE__;
            document.getElementById('ui-state').innerText = state.simRunning ? 'RUNNING' : 'PAUSED';
            document.getElementById('ui-state').style.color = state.simRunning ? '#0f0' : '#ff0';
            document.getElementById('ui-posA').innerText = state.massA_pos.y.toFixed(2);
            document.getElementById('ui-posB').innerText = state.massB_pos.y.toFixed(2);
            document.getElementById('ui-energy').innerText = state.totalEnergy.toFixed(2);
            document.getElementById('ui-history').innerText = `${state.historyIndex + 1} / ${state.historyLength}`;
            document.getElementById('ui-drag').innerText = state.dragMode ? 'ON' : 'OFF';
            document.getElementById('ui-drag').style.color = state.dragMode ? '#0f0' : '#ccc';
            document.getElementById('ui-k1').innerText = state.k1;
            document.getElementById('ui-k2').innerText = state.k2;
        }

        // --- Main Loop ---
        saveState(); // Initial state

        function animate() {
            requestAnimationFrame(animate);
            
            physicsStep();
            updateVisuals();
            updateStateObject();
            updateHUD();

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
