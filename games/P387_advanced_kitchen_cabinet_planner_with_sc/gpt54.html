<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Kitchen Cabinet Planner</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #dcd6cc;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      z-index: 10;
      background: rgba(255,255,255,0.88);
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }

    button {
      padding: 10px 14px;
      border: 2px solid #999;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #f3f3f3;
    }

    button.active {
      border: 3px solid #ff6600;
    }

    #hud {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 170px;
      line-height: 1.6;
      font-size: 14px;
    }

    #hint {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      color: #222;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button id="btn-base">Base Cabinet</button>
      <button id="btn-wall">Wall Cabinet</button>
      <button id="btn-tall">Tall Cabinet</button>
      <button id="btn-clear">Clear All</button>
      <button id="btn-doors">Toggle Doors</button>
    </div>

    <div id="hud">
      <div id="hud-count">Cabinets: 0/10</div>
      <div id="hud-score">Score: 0</div>
      <div id="hud-layout">Layout: Incomplete</div>
    </div>

    <div id="hint">
      Left-click to place cabinets. Press 1/2/3 for themes.
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const app = document.getElementById("app");
    const hudCount = document.getElementById("hud-count");
    const hudScore = document.getElementById("hud-score");
    const hudLayout = document.getElementById("hud-layout");

    const buttons = {
      base: document.getElementById("btn-base"),
      wall: document.getElementById("btn-wall"),
      tall: document.getElementById("btn-tall"),
      clear: document.getElementById("btn-clear"),
      doors: document.getElementById("btn-doors"),
    };

    const MAX_CABINETS = 10;

    const cabinetDefs = {
      base: {
        type: "base",
        w: 0.9, h: 0.9, d: 0.6,
        y: 0.45,
        colorClassic: "#8B6914",
        colorModern: "#555555",
        colorBold: "#1a5276"
      },
      wall: {
        type: "wall",
        w: 0.9, h: 0.6, d: 0.35,
        y: 2.5,
        colorClassic: "#A0522D",
        colorModern: "#777777",
        colorBold: "#922b21"
      },
      tall: {
        type: "tall",
        w: 0.6, h: 2.0, d: 0.6,
        y: 1.0,
        colorClassic: "#DEB887",
        colorModern: "#999999",
        colorBold: "#196f3d"
      }
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xcfc8be);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, -2.5);
    controls.minPolarAngle = 0.2;
    controls.maxPolarAngle = 1.4;
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 8),
      new THREE.MeshStandardMaterial({ color: "#e8e0d0" })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const backWall = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 4),
      new THREE.MeshStandardMaterial({ color: "#f5f0e8", side: THREE.DoubleSide })
    );
    backWall.position.set(0, 2, -4);
    backWall.receiveShadow = true;
    scene.add(backWall);

    const leftWall = new THREE.Mesh(
      new THREE.PlaneGeometry(8, 4),
      new THREE.MeshStandardMaterial({ color: "#f5f0e8", side: THREE.DoubleSide })
    );
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.set(-6, 2, 0);
    leftWall.receiveShadow = true;
    scene.add(leftWall);

    const roomGrid = new THREE.GridHelper(12, 12, 0x999999, 0xcccccc);
    roomGrid.position.y = 0.001;
    scene.add(roomGrid);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const placementPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 3.7);

    const cabinets = [];
    let selectedType = null;
    let theme = "classic";
    let doorsOpen = false;
    let ghost = null;
    let doorAnimations = [];
    let flashRedUntil = 0;

    function colorForType(type) {
      const def = cabinetDefs[type];
      if (theme === "modern") return def.colorModern;
      if (theme === "bold") return def.colorBold;
      return def.colorClassic;
    }

    function createCabinet(type, x, z, isGhost = false) {
      const def = cabinetDefs[type];
      const group = new THREE.Group();

      const material = new THREE.MeshStandardMaterial({
        color: colorForType(type),
        transparent: isGhost,
        opacity: isGhost ? 0.3 : 1.0
      });

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(def.w, def.h, def.d),
        material
      );
      body.castShadow = !isGhost;
      body.receiveShadow = true;
      body.position.y = def.y;
      group.add(body);

      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(def.w, def.h, def.d)),
        new THREE.LineBasicMaterial({ color: 0x222222, transparent: isGhost, opacity: isGhost ? 0.5 : 1 })
      );
      edges.position.y = def.y;
      group.add(edges);

      let door = null;
      if (type === "base" || type === "wall") {
        const doorThickness = 0.03;
        const doorGeo = new THREE.BoxGeometry(def.w * 0.48, def.h * 0.92, doorThickness);
        const doorMat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(colorForType(type)).multiplyScalar(1.08),
          transparent: isGhost,
          opacity: isGhost ? 0.3 : 1.0
        });

        const pivot = new THREE.Group();
        const panel = new THREE.Mesh(doorGeo, doorMat);
        panel.castShadow = !isGhost;
        panel.receiveShadow = true;

        const hingeX = -def.w * 0.25;
        pivot.position.set(hingeX, def.y, def.d / 2 + doorThickness / 2 + 0.001);
        panel.position.set(def.w * 0.24, 0, 0);
        pivot.add(panel);
        group.add(pivot);

        door = {
          pivot,
          panel,
          openAngle: 0,
          targetAngle: 0
        };
      }

      group.position.set(x, 0, z);
      group.userData = {
        type,
        x,
        y: def.y,
        z,
        def,
        body,
        edges,
        door,
        isGhost
      };

      return group;
    }

    function setGhost(type) {
      if (ghost) {
        scene.remove(ghost);
        ghost = null;
      }
      if (!type) return;
      ghost = createCabinet(type, 0, -3.7, true);
      scene.add(ghost);
    }

    function updateButtonStates() {
      buttons.base.classList.toggle("active", selectedType === "base");
      buttons.wall.classList.toggle("active", selectedType === "wall");
      buttons.tall.classList.toggle("active", selectedType === "tall");
    }

    function snapX(x) {
      return Math.round(x / 1.0) * 1.0;
    }

    function getBounding(type, x, z) {
      const d = cabinetDefs[type];
      return {
        minX: x - d.w / 2,
        maxX: x + d.w / 2,
        minY: d.y - d.h / 2,
        maxY: d.y + d.h / 2,
        minZ: z - d.d / 2,
        maxZ: z + d.d / 2
      };
    }

    function boxesOverlap(a, b) {
      return (
        a.minX < b.maxX && a.maxX > b.minX &&
        a.minY < b.maxY && a.maxY > b.minY &&
        a.minZ < b.maxZ && a.maxZ > b.minZ
      );
    }

    function canPlace(type, x, z) {
      const a = getBounding(type, x, z);
      for (const cab of cabinets) {
        const b = getBounding(cab.userData.type, cab.userData.x, cab.userData.z);
        if (boxesOverlap(a, b)) return false;
      }
      return cabinets.length < MAX_CABINETS;
    }

    function flashGhostRed() {
      flashRedUntil = performance.now() + 250;
    }

    function placeCabinet(type, x, z) {
      if (!canPlace(type, x, z)) {
        flashGhostRed();
        return;
      }
      const cab = createCabinet(type, x, z, false);
      if (cab.userData.door) {
        cab.userData.door.openAngle = doorsOpen ? Math.PI / 2 : 0;
        cab.userData.door.targetAngle = cab.userData.door.openAngle;
        cab.userData.door.pivot.rotation.y = -cab.userData.door.openAngle;
      }
      cabinets.push(cab);
      scene.add(cab);
      applyThemeToCabinets();
      updateScore();
      syncState();
    }

    function clearAll() {
      for (const cab of cabinets) {
        scene.remove(cab);
      }
      cabinets.length = 0;
      doorAnimations = [];
      doorsOpen = false;
      updateScore();
      syncState();
    }

    function toggleDoors() {
      doorsOpen = !doorsOpen;
      const now = performance.now();
      doorAnimations = [];
      for (const cab of cabinets) {
        const door = cab.userData.door;
        if (!door) continue;
        doorAnimations.push({
          door,
          start: door.openAngle,
          end: doorsOpen ? Math.PI / 2 : 0,
          startTime: now,
          duration: 300
        });
        door.targetAngle = doorsOpen ? Math.PI / 2 : 0;
      }
      syncState();
    }

    function applyThemeToCabinets() {
      for (const cab of cabinets) {
        const type = cab.userData.type;
        cab.userData.body.material.color.set(colorForType(type));
        if (cab.userData.door) {
          cab.userData.door.panel.material.color.set(new THREE.Color(colorForType(type)).multiplyScalar(1.08));
        }
      }
      if (ghost) {
        ghost.userData.body.material.color.set(colorForType(ghost.userData.type));
        if (ghost.userData.door) {
          ghost.userData.door.panel.material.color.set(new THREE.Color(colorForType(ghost.userData.type)).multiplyScalar(1.08));
        }
      }
      syncState();
    }

    function computeScoreData() {
      const count = cabinets.length;

      const typesUsed = new Set(cabinets.map(c => c.userData.type));
      const varietyCount = typesUsed.size;

      const coverageScore = (count / 10) * 40;
      const varietyBonus = varietyCount === 3 ? 20 : varietyCount === 2 ? 10 : 0;

      const baseXs = cabinets
        .filter(c => c.userData.type === "base")
        .map(c => c.userData.x)
        .sort((a, b) => a - b);

      let alignmentBonus = 0;
      if (baseXs.length <= 1) {
        alignmentBonus = baseXs.length === 1 ? 20 : 0;
      } else {
        let contiguousPairs = 0;
        for (let i = 1; i < baseXs.length; i++) {
          if (Math.abs((baseXs[i] - baseXs[i - 1]) - 1.0) < 0.01) contiguousPairs++;
        }
        alignmentBonus = (contiguousPairs / (baseXs.length - 1)) * 20;
      }

      const xs = cabinets.map(c => c.userData.x);
      let symmetryBonus = 0;
      if (xs.length === 0) {
        symmetryBonus = 0;
      } else {
        let matched = 0;
        const used = new Array(xs.length).fill(false);

        for (let i = 0; i < xs.length; i++) {
          if (used[i]) continue;
          const xi = xs[i];
          let found = false;

          if (Math.abs(xi) <= 0.5) {
            used[i] = true;
            matched++;
            continue;
          }

          for (let j = i + 1; j < xs.length; j++) {
            if (used[j]) continue;
            if (Math.abs(xs[j] + xi) <= 0.5) {
              used[i] = true;
              used[j] = true;
              matched += 2;
              found = true;
              break;
            }
          }
          if (!found && !used[i]) {
            // unmatched
          }
        }

        symmetryBonus = (matched / xs.length) * 20;
      }

      const score = Math.round(Math.max(0, Math.min(100,
        coverageScore + varietyBonus + alignmentBonus + symmetryBonus
      )));

      const layoutRating = score < 30 ? "Incomplete" : score < 70 ? "Good" : "Excellent";

      return {
        cabinetCount: count,
        score,
        layoutRating,
        varietyCount,
        coverageScore: Math.round(coverageScore * 100) / 100,
        varietyBonus: Math.round(varietyBonus * 100) / 100,
        alignmentBonus: Math.round(alignmentBonus * 100) / 100,
        symmetryBonus: Math.round(symmetryBonus * 100) / 100
      };
    }

    function updateScore() {
      const s = computeScoreData();
      hudCount.textContent = `Cabinets: ${s.cabinetCount}/10`;
      hudScore.textContent = `Score: ${s.score}`;
      hudLayout.textContent = `Layout: ${s.layoutRating}`;
    }

    function syncState() {
      const s = computeScoreData();
      window.__3D_STATE__ = {
        cabinetCount: s.cabinetCount,
        selectedType: selectedType,
        score: s.score,
        layoutRating: s.layoutRating,
        varietyCount: s.varietyCount,
        doorsOpen: doorsOpen,
        theme: theme,
        cabinets: cabinets.map(c => ({
          type: c.userData.type,
          x: c.userData.x,
          y: c.userData.y,
          z: c.userData.z
        })),
        maxCabinets: MAX_CABINETS,
        coverageScore: s.coverageScore,
        varietyBonus: s.varietyBonus,
        alignmentBonus: s.alignmentBonus,
        symmetryBonus: s.symmetryBonus
      };
      hudCount.textContent = `Cabinets: ${s.cabinetCount}/10`;
      hudScore.textContent = `Score: ${s.score}`;
      hudLayout.textContent = `Layout: ${s.layoutRating}`;
    }

    function updateGhostFromMouse(event) {
      if (!ghost || !selectedType) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const point = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(placementPlane, point)) {
        let x = THREE.MathUtils.clamp(snapX(point.x), -5, 5);
        const z = -3.7;
        ghost.position.set(x, 0, z);
        ghost.userData.x = x;
        ghost.userData.z = z;

        const valid = canPlace(selectedType, x, z);
        const now = performance.now();
        const flashing = now < flashRedUntil;

        const color = flashing
          ? "#ff3333"
          : colorForType(selectedType);

        ghost.userData.body.material.color.set(color);
        ghost.userData.body.material.opacity = 0.3;

        if (ghost.userData.door) {
          ghost.userData.door.panel.material.color.set(flashing ? "#ff6666" : new THREE.Color(colorForType(selectedType)).multiplyScalar(1.08));
          ghost.userData.door.panel.material.opacity = 0.3;
        }

        if (!flashing) {
          ghost.userData.body.material.color.set(valid ? colorForType(selectedType) : "#cc4444");
          if (ghost.userData.door) {
            ghost.userData.door.panel.material.color.set(valid ? new THREE.Color(colorForType(selectedType)).multiplyScalar(1.08) : "#dd6666");
          }
        }
      }
    }

    renderer.domElement.addEventListener("mousemove", updateGhostFromMouse);

    renderer.domElement.addEventListener("pointerdown", (event) => {
      if (event.button !== 0 || !selectedType || !ghost) return;
      placeCabinet(selectedType, ghost.userData.x, ghost.userData.z);
    });

    buttons.base.addEventListener("click", () => {
      selectedType = "base";
      updateButtonStates();
      setGhost(selectedType);
      syncState();
    });

    buttons.wall.addEventListener("click", () => {
      selectedType = "wall";
      updateButtonStates();
      setGhost(selectedType);
      syncState();
    });

    buttons.tall.addEventListener("click", () => {
      selectedType = "tall";
      updateButtonStates();
      setGhost(selectedType);
      syncState();
    });

    buttons.clear.addEventListener("click", () => {
      clearAll();
    });

    buttons.doors.addEventListener("click", () => {
      toggleDoors();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "1") {
        theme = "modern";
        applyThemeToCabinets();
      } else if (e.key === "2") {
        theme = "classic";
        applyThemeToCabinets();
      } else if (e.key === "3") {
        theme = "bold";
        applyThemeToCabinets();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate(now) {
      requestAnimationFrame(animate);

      controls.update();

      if (doorAnimations.length) {
        doorAnimations = doorAnimations.filter(anim => {
          const t = Math.min(1, (now - anim.startTime) / anim.duration);
          const eased = 1 - Math.pow(1 - t, 3);
          const angle = THREE.MathUtils.lerp(anim.start, anim.end, eased);
          anim.door.openAngle = angle;
          anim.door.pivot.rotation.y = -angle;
          return t < 1;
        });
      }

      if (ghost && selectedType) {
        const nowTime = performance.now();
        if (nowTime < flashRedUntil) {
          ghost.userData.body.material.color.set("#ff3333");
          if (ghost.userData.door) ghost.userData.door.panel.material.color.set("#ff6666");
        }
      }

      renderer.render(scene, camera);
    }

    updateButtonStates();
    updateScore();
    syncState();
    animate();
  </script>
</body>
</html>
