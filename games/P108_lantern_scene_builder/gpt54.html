<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 场景搭建工具</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #dfe7dc;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #toolbar {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      backdrop-filter: blur(6px);
    }

    #toolbar button {
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      background: #4f7f63;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    #toolbar button:hover {
      background: #3f6b53;
    }

    #toolbar button.active {
      background: #bb5a3c;
    }

    #toolbar button:disabled {
      background: #9aa5a0;
      cursor: not-allowed;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      min-width: 250px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border-radius: 10px;
      line-height: 1.7;
      font-size: 14px;
      white-space: pre-line;
    }

    #hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 10px 14px;
      background: rgba(255,255,255,0.92);
      color: #1f2a23;
      border-radius: 10px;
      font-size: 14px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      pointer-events: none;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button id="placeLanternBtn">放置灯笼</button>
      <button id="placeChairBtn">放置椅子</button>
    </div>

    <div id="hud">
      <div>已放置物体数量：<span id="objectCount">0</span></div>
      <div>当前模式：<span id="currentMode">browse</span></div>
      <div>选中物体：<span id="selectedInfo">无</span></div>
    </div>

    <div id="hint">正在加载模型...</div>
    <div id="canvas-container"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('canvas-container');
    const placeLanternBtn = document.getElementById('placeLanternBtn');
    const placeChairBtn = document.getElementById('placeChairBtn');
    const objectCountEl = document.getElementById('objectCount');
    const currentModeEl = document.getElementById('currentMode');
    const selectedInfoEl = document.getElementById('selectedInfo');
    const hintEl = document.getElementById('hint');

    window.__3D_STATE__ = {
      modelLoaded: false,
      objectCount: 0,
      currentMode: 'browse',
      selectedObject: null,
      lanternCount: 0,
      chairCount: 0
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe7dc);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(10, 12, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2.05;
    controls.minDistance = 5;
    controls.maxDistance = 40;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(8, 15, 10);
    directionalLight.castShadow = true;
    scene.add(directionalLight);

    const hemisphereLight = new THREE.HemisphereLight(0x87bfff, 0x8fb08b, 1.0);
    scene.add(hemisphereLight);

    const groundGeometry = new THREE.PlaneGeometry(20, 20);
    const groundMaterial = new THREE.MeshStandardMaterial({
      color: 0xC8D6C0,
      side: THREE.DoubleSide
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    ground.name = 'ground';
    scene.add(ground);

    const grid = new THREE.GridHelper(20, 20, 0x888888, 0xaaaaaa);
    grid.position.y = 0.01;
    scene.add(grid);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const loader = new GLTFLoader();
    const modelCache = {
      lantern: null,
      chair: null
    };

    const placedObjects = [];

    let currentMode = 'browse';
    let selectedObject = null;

    placeLanternBtn.disabled = true;
    placeChairBtn.disabled = true;

    function updateHUD() {
      objectCountEl.textContent = String(window.__3D_STATE__.objectCount);
      currentModeEl.textContent = currentMode;

      if (selectedObject) {
        const p = selectedObject.position;
        const type = selectedObject.userData.type || 'unknown';
        selectedInfoEl.textContent = `${type} (${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)})`;
      } else {
        selectedInfoEl.textContent = '无';
      }

      placeLanternBtn.classList.toggle('active', currentMode === 'place_lantern');
      placeChairBtn.classList.toggle('active', currentMode === 'place_chair');

      if (!window.__3D_STATE__.modelLoaded) {
        hintEl.textContent = '正在加载模型...';
      } else if (currentMode === 'place_lantern') {
        hintEl.textContent = '放置模式：点击地面放置灯笼，按 Esc 取消';
      } else if (currentMode === 'place_chair') {
        hintEl.textContent = '放置模式：点击地面放置椅子，按 Esc 取消';
      } else if (selectedObject) {
        hintEl.textContent = '已选中物体：方向键移动，Delete 删除，点击空白取消选择';
      } else {
        hintEl.textContent = '浏览模式：点击物体选中；使用顶部按钮进入放置模式';
      }
    }

    function syncState() {
      window.__3D_STATE__.modelLoaded = !!(modelCache.lantern && modelCache.chair);
      window.__3D_STATE__.objectCount = placedObjects.length;
      window.__3D_STATE__.currentMode = currentMode;
      window.__3D_STATE__.lanternCount = placedObjects.filter(obj => obj.userData.type === 'Lantern').length;
      window.__3D_STATE__.chairCount = placedObjects.filter(obj => obj.userData.type === 'SheenChair').length;

      if (selectedObject) {
        window.__3D_STATE__.selectedObject = {
          type: selectedObject.userData.type,
          position: {
            x: Number(selectedObject.position.x.toFixed(3)),
            y: Number(selectedObject.position.y.toFixed(3)),
            z: Number(selectedObject.position.z.toFixed(3))
          }
        };
      } else {
        window.__3D_STATE__.selectedObject = null;
      }
    }

    function setMode(mode) {
      currentMode = mode;
      document.body.style.cursor = mode === 'browse' ? 'default' : 'crosshair';
      currentModeEl.textContent = mode;
      updateHUD();
      syncState();
    }

    function clearHighlight(object) {
      if (!object) return;
      object.traverse(child => {
        if (child.isMesh && child.material) {
          const materials = Array.isArray(child.material) ? child.material : [child.material];
          materials.forEach(mat => {
            if (mat.emissive && child.userData.originalEmissive !== undefined) {
              mat.emissive.copy(child.userData.originalEmissive);
            }
          });
        }
      });
    }

    function applyHighlight(object) {
      if (!object) return;
      object.traverse(child => {
        if (child.isMesh && child.material) {
          const materials = Array.isArray(child.material) ? child.material : [child.material];
          materials.forEach(mat => {
            if (mat.emissive) {
              if (child.userData.originalEmissive === undefined) {
                child.userData.originalEmissive = mat.emissive.clone();
              }
              mat.emissive.setHex(0x3366ff);
            }
          });
        }
      });
    }

    function selectObject(object) {
      if (selectedObject === object) return;

      if (selectedObject) clearHighlight(selectedObject);
      selectedObject = object;

      if (selectedObject) applyHighlight(selectedObject);

      updateHUD();
      syncState();
    }

    function cloneModel(type) {
      let source = null;
      if (type === 'Lantern') source = modelCache.lantern;
      if (type === 'SheenChair') source = modelCache.chair;
      if (!source) return null;

      const clone = source.clone(true);
      clone.userData.type = type;

      clone.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            if (Array.isArray(child.material)) {
              child.material = child.material.map(mat => mat.clone());
            } else {
              child.material = child.material.clone();
            }
          }
        }
      });

      return clone;
    }

    function placeObject(type, point) {
      const obj = cloneModel(type);
      if (!obj) return;

      if (type === 'Lantern') {
        obj.scale.setScalar(0.02);
      } else if (type === 'SheenChair') {
        obj.scale.setScalar(3);
      }

      obj.position.copy(point);
      obj.position.y = 0;
      obj.userData.type = type;

      scene.add(obj);
      placedObjects.push(obj);

      selectObject(obj);
      setMode('browse');
      updateHUD();
      syncState();
    }

    function getPlacedRootObject(object) {
      let current = object;
      while (current) {
        if (placedObjects.includes(current)) return current;
        current = current.parent;
      }
      return null;
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      if (currentMode === 'place_lantern' || currentMode === 'place_chair') {
        const groundHits = raycaster.intersectObject(ground, false);
        if (groundHits.length > 0) {
          const hitPoint = groundHits[0].point.clone();
          const type = currentMode === 'place_lantern' ? 'Lantern' : 'SheenChair';
          placeObject(type, hitPoint);
        }
        return;
      }

      const intersects = raycaster.intersectObjects(placedObjects, true);
      if (intersects.length > 0) {
        const root = getPlacedRootObject(intersects[0].object);
        selectObject(root);
      } else {
        selectObject(null);
      }
    }

    function onKeyDown(event) {
      if (event.key === 'Escape') {
        if (currentMode !== 'browse') {
          setMode('browse');
        }
        return;
      }

      if (!selectedObject) return;

      let moved = false;
      const step = 0.5;

      switch (event.key) {
        case 'ArrowUp':
          selectedObject.position.z -= step;
          moved = true;
          break;
        case 'ArrowDown':
          selectedObject.position.z += step;
          moved = true;
          break;
        case 'ArrowLeft':
          selectedObject.position.x -= step;
          moved = true;
          break;
        case 'ArrowRight':
          selectedObject.position.x += step;
          moved = true;
          break;
        case 'Delete':
          clearHighlight(selectedObject);
          scene.remove(selectedObject);
          {
            const index = placedObjects.indexOf(selectedObject);
            if (index !== -1) placedObjects.splice(index, 1);
          }
          selectedObject = null;
          updateHUD();
          syncState();
          return;
      }

      if (moved) {
        event.preventDefault();
        selectedObject.position.x = Math.max(-10, Math.min(10, selectedObject.position.x));
        selectedObject.position.z = Math.max(-10, Math.min(10, selectedObject.position.z));
        selectedObject.position.y = 0;
        updateHUD();
        syncState();
      }
    }

    function loadGLTF(url) {
      return new Promise((resolve, reject) => {
        loader.load(url, gltf => resolve(gltf), undefined, err => reject(err));
      });
    }

    async function preloadModels() {
      try {
        const [lanternGLTF, chairGLTF] = await Promise.all([
          loadGLTF('assets/Lantern.glb'),
          loadGLTF('assets/SheenChair.glb')
        ]);

        modelCache.lantern = lanternGLTF.scene;
        modelCache.chair = chairGLTF.scene;

        window.__3D_STATE__.modelLoaded = true;
        placeLanternBtn.disabled = false;
        placeChairBtn.disabled = false;
        updateHUD();
        syncState();
      } catch (error) {
        console.error('模型加载失败：', error);
        hintEl.textContent = '模型加载失败，请检查 assets 目录与本地 HTTP 服务。';
      }
    }

    placeLanternBtn.addEventListener('click', () => {
      if (!window.__3D_STATE__.modelLoaded) return;
      if (currentMode === 'place_lantern') {
        setMode('browse');
      } else {
        selectObject(null);
        setMode('place_lantern');
      }
    });

    placeChairBtn.addEventListener('click', () => {
      if (!window.__3D_STATE__.modelLoaded) return;
      if (currentMode === 'place_chair') {
        setMode('browse');
      } else {
        selectObject(null);
        setMode('place_chair');
      }
    });

    renderer.domElement.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('keydown', onKeyDown);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      syncState();
      renderer.render(scene, camera);
    }

    updateHUD();
    syncState();
    preloadModels();
    animate();
  </script>
</body>
</html>
