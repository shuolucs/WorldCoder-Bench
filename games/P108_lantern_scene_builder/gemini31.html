<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Scene Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            user-select: none;
        }
        #toolbar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            background: #f0f0f0;
        }
        button:disabled {
            cursor: not-allowed;
            color: #999;
        }
        button.active {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            line-height: 1.6;
        }
        #hud span {
            font-weight: bold;
            color: #4CAF50;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="toolbar">
        <button id="placeLanternBtn" disabled>加载模型中...</button>
        <button id="placeChairBtn" disabled>加载模型中...</button>
    </div>
    <div id="hud">
        <div>已放置物体: <span id="objectCount">0</span></div>
        <div>当前模式: <span id="currentMode">browse</span></div>
        <div>选中物体: <span id="selectedInfo">无</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Initialize State
        window.__3D_STATE__ = {
            modelLoaded: false,
            objectCount: 0,
            currentMode: 'browse',
            selectedObject: null,
            lanternCount: 0,
            chairCount: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.update();

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x228B22, 0.5);
        scene.add(hemiLight);

        // Ground & Grid
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0xC8D6C0, depthWrite: true });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(20, 20, 0x888888, 0x888888);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // Variables
        const models = { lantern: null, chair: null };
        const placedObjects = [];
        let selectedMesh = null;
        const selectionBox = new THREE.BoxHelper(undefined, 0xff0000);
        selectionBox.visible = false;
        scene.add(selectionBox);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let pointerDownPos = new THREE.Vector2();

        // Load Models
        const loader = new GLTFLoader();
        Promise.all([
            new Promise(resolve => {
                loader.load('assets/Lantern.glb', (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(0.02, 0.02, 0.02);
                    model.traverse(child => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    model.userData.type = 'Lantern';
                    models.lantern = model;
                    resolve();
                });
            }),
            new Promise(resolve => {
                loader.load('assets/SheenChair.glb', (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(3, 3, 3);
                    model.traverse(child => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    model.userData.type = 'SheenChair';
                    models.chair = model;
                    resolve();
                });
            })
        ]).then(() => {
            window.__3D_STATE__.modelLoaded = true;
            const btnL = document.getElementById('placeLanternBtn');
            const btnC = document.getElementById('placeChairBtn');
            btnL.disabled = false;
            btnL.innerText = '放置灯笼';
            btnC.disabled = false;
            btnC.innerText = '放置椅子';
        });

        // UI Logic
        function setMode(mode) {
            window.__3D_STATE__.currentMode = mode;
            document.getElementById('placeLanternBtn').classList.toggle('active', mode === 'place_lantern');
            document.getElementById('placeChairBtn').classList.toggle('active', mode === 'place_chair');
            document.body.style.cursor = mode === 'browse' ? 'default' : 'crosshair';
            if (mode !== 'browse') selectObject(null);
        }

        document.getElementById('placeLanternBtn').addEventListener('click', () => {
            setMode(window.__3D_STATE__.currentMode === 'place_lantern' ? 'browse' : 'place_lantern');
        });

        document.getElementById('placeChairBtn').addEventListener('click', () => {
            setMode(window.__3D_STATE__.currentMode === 'place_chair' ? 'browse' : 'place_chair');
        });

        function selectObject(obj) {
            selectedMesh = obj;
            if (obj) {
                selectionBox.setFromObject(obj);
                selectionBox.visible = true;
            } else {
                selectionBox.visible = false;
            }
        }

        // Interaction Logic
        renderer.domElement.addEventListener('pointerdown', (e) => {
            pointerDownPos.set(e.clientX, e.clientY);
        });

        renderer.domElement.addEventListener('pointerup', (e) => {
            if (pointerDownPos.distanceTo(new THREE.Vector2(e.clientX, e.clientY)) > 5) return; // Dragged

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const mode = window.__3D_STATE__.currentMode;

            if (mode === 'place_lantern' || mode === 'place_chair') {
                const intersects = raycaster.intersectObject(ground);
                if (intersects.length > 0) {
                    const point = intersects[0].point;
                    let clone;
                    if (mode === 'place_lantern') {
                        clone = models.lantern.clone();
                        window.__3D_STATE__.lanternCount++;
                    } else {
                        clone = models.chair.clone();
                        window.__3D_STATE__.chairCount++;
                    }
                    clone.position.copy(point);
                    scene.add(clone);
                    placedObjects.push(clone);
                    window.__3D_STATE__.objectCount++;
                    setMode('browse');
                }
            } else if (mode === 'browse') {
                const intersects = raycaster.intersectObjects(placedObjects, true);
                if (intersects.length > 0) {
                    let obj = intersects[0].object;
                    while (obj && !placedObjects.includes(obj)) {
                        obj = obj.parent;
                    }
                    if (obj) selectObject(obj);
                } else {
                    selectObject(null);
                }
            }
        });

        // Keyboard Logic
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                setMode('browse');
                return;
            }

            if (!selectedMesh || window.__3D_STATE__.currentMode !== 'browse') return;

            const step = 0.5;
            let moved = false;

            switch (e.key) {
                case 'ArrowUp': selectedMesh.position.z -= step; moved = true; break;
                case 'ArrowDown': selectedMesh.position.z += step; moved = true; break;
                case 'ArrowLeft': selectedMesh.position.x -= step; moved = true; break;
                case 'ArrowRight': selectedMesh.position.x += step; moved = true; break;
                case 'Delete':
                    scene.remove(selectedMesh);
                    placedObjects.splice(placedObjects.indexOf(selectedMesh), 1);
                    if (selectedMesh.userData.type === 'Lantern') window.__3D_STATE__.lanternCount--;
                    if (selectedMesh.userData.type === 'SheenChair') window.__3D_STATE__.chairCount--;
                    window.__3D_STATE__.objectCount--;
                    selectObject(null);
                    break;
            }

            if (moved && selectedMesh) {
                selectionBox.update();
            }
        });

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Render Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Update State
            if (selectedMesh) {
                window.__3D_STATE__.selectedObject = {
                    type: selectedMesh.userData.type,
                    position: { 
                        x: selectedMesh.position.x, 
                        y: selectedMesh.position.y, 
                        z: selectedMesh.position.z 
                    }
                };
            } else {
                window.__3D_STATE__.selectedObject = null;
            }

            // Update HUD
            document.getElementById('objectCount').innerText = window.__3D_STATE__.objectCount;
            document.getElementById('currentMode').innerText = window.__3D_STATE__.currentMode;
            
            const selInfo = window.__3D_STATE__.selectedObject;
            if (selInfo) {
                document.getElementById('selectedInfo').innerText = 
                    `${selInfo.type} (${selInfo.position.x.toFixed(1)}, ${selInfo.position.y.toFixed(1)}, ${selInfo.position.z.toFixed(1)})`;
            } else {
                document.getElementById('selectedInfo').innerText = '无';
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
