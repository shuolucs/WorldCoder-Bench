<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 场景搭建工具</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; }
  
  #canvas-container { width: 100vw; height: 100vh; }
  canvas { display: block; }

  #toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  #toolbar .title {
    color: #e0e0e0;
    font-size: 16px;
    font-weight: 600;
    margin-right: 20px;
    letter-spacing: 0.5px;
  }

  #toolbar .divider {
    width: 1px;
    height: 30px;
    background: rgba(255,255,255,0.15);
    margin: 0 8px;
  }

  .tool-btn {
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: #ccc;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tool-btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
    transform: translateY(-1px);
  }

  .tool-btn.active {
    background: linear-gradient(135deg, #4a6cf7 0%, #6366f1 100%);
    border-color: #4a6cf7;
    color: #fff;
    box-shadow: 0 2px 12px rgba(74,108,247,0.4);
  }

  .tool-btn .icon { font-size: 16px; }

  #hud {
    position: fixed;
    top: 72px;
    left: 16px;
    background: rgba(26, 26, 46, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 20px;
    color: #ccc;
    font-size: 13px;
    z-index: 100;
    min-width: 220px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  #hud .hud-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    margin-bottom: 12px;
    font-weight: 600;
  }

  #hud .hud-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  #hud .hud-row:last-child { border-bottom: none; }

  #hud .hud-label {
    color: #888;
    font-size: 12px;
  }

  #hud .hud-value {
    color: #e0e0e0;
    font-weight: 500;
    font-size: 12px;
  }

  .mode-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .mode-browse { background: rgba(34,197,94,0.2); color: #4ade80; }
  .mode-place { background: rgba(74,108,247,0.2); color: #818cf8; }

  #instructions {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26, 26, 46, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 20px;
    color: #999;
    font-size: 12px;
    z-index: 100;
    text-align: center;
    transition: all 0.3s ease;
  }

  #instructions.placing {
    background: rgba(74,108,247,0.15);
    border-color: rgba(74,108,247,0.3);
    color: #818cf8;
  }

  #loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s ease;
  }

  #loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loader-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #4a6cf7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    color: #888;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loader-spinner"></div>
  <div class="loader-text">加载模型中...</div>
</div>

<div id="toolbar">
  <span class="title">🏗️ 场景搭建</span>
  <div class="divider"></div>
  <button id="placeLanternBtn" class="tool-btn">
    <span class="icon">🏮</span> 放置灯笼
  </button>
  <button id="placeChairBtn" class="tool-btn">
    <span class="icon">🪑</span> 放置椅子
  </button>
</div>

<div id="hud">
  <div class="hud-title">场景信息</div>
  <div class="hud-row">
    <span class="hud-label">物体数量</span>
    <span class="hud-value" id="objectCount">0</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">当前模式</span>
    <span class="hud-value"><span id="currentMode" class="mode-badge mode-browse">browse</span></span>
  </div>
  <div class="hud-row">
    <span class="hud-label">选中物体</span>
    <span class="hud-value" id="selectedInfo">无</span>
  </div>
</div>

<div id="instructions">方向键移动选中物体 · Delete 删除 · Esc 取消</div>

<div id="canvas-container"></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
window.__3D_STATE__ = {
  modelLoaded: false,
  objectCount: 0,
  currentMode: 'browse',
  selectedObject: null,
  lanternCount: 0,
  chairCount: 0
};

let currentMode = 'browse';
let selectedObject = null;
let objectCount = 0;
let lanternCount = 0;
let chairCount = 0;
const placedObjects = [];

// Cached models
let lanternModel = null;
let chairModel = null;

// Three.js setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(8, 12, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 3;
controls.maxDistance = 30;
controls.target.set(0, 0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(8, 15, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x4a7c59, 0.4);
scene.add(hemiLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0xC8D6C0,
  roughness: 0.9,
  metalness: 0.0
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
ground.name = 'ground';
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(20, 20, 0x888888, 0x555555);
gridHelper.position.y = 0.005;
gridHelper.material.opacity = 0.3;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Load models
const loader = new GLTFLoader();
let modelsToLoad = 2;
let modelsLoaded = 0;

function checkAllLoaded() {
  modelsLoaded++;
  if (modelsLoaded >= modelsToLoad) {
    window.__3D_STATE__.modelLoaded = true;
    const overlay = document.getElementById('loading-overlay');
    overlay.classList.add('hidden');
    setTimeout(() => overlay.style.display = 'none', 500);
  }
}

loader.load('assets/Lantern.glb', (gltf) => {
  lanternModel = gltf.scene;
  lanternModel.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  checkAllLoaded();
}, undefined, (err) => {
  console.error('Failed to load Lantern:', err);
  // Create fallback lantern
  lanternModel = createFallbackLantern();
  checkAllLoaded();
});

loader.load('assets/SheenChair.glb', (gltf) => {
  chairModel = gltf.scene;
  chairModel.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  checkAllLoaded();
}, undefined, (err) => {
  console.error('Failed to load SheenChair:', err);
  // Create fallback chair
  chairModel = createFallbackChair();
  checkAllLoaded();
});

function createFallbackLantern() {
  const group = new THREE.Group();
  // Base
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6 });
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.2, 8), baseMat);
  base.position.y = 0.1;
  base.castShadow = true;
  group.add(base);
  // Body
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.4, emissive: 0x331111 });
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.8, 8), bodyMat);
  body.position.y = 0.6;
  body.castShadow = true;
  group.add(body);
  // Top
  const top = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.3, 8), baseMat);
  top.position.y = 1.15;
  top.castShadow = true;
  group.add(top);
  // Light
  const light = new THREE.PointLight(0xff6600, 0.5, 3);
  light.position.y = 0.6;
  group.add(light);
  return group;
}

function createFallbackChair() {
  const group = new THREE.Group();
  const woodMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.7 });
  // Seat
  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.5), woodMat);
  seat.position.y = 0.45;
  seat.castShadow = true;
  group.add(seat);
  // Back
  const back = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.05), woodMat);
  back.position.set(0, 0.72, -0.225);
  back.castShadow = true;
  group.add(back);
  // Legs
  const legGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.45, 6);
  const positions = [
    [0.2, 0.225, 0.2],
    [-0.2, 0.225, 0.2],
    [0.2, 0.225, -0.2],
    [-0.2, 0.225, -0.2]
  ];
  positions.forEach(pos => {
    const leg = new THREE.Mesh(legGeo, woodMat);
    leg.position.set(...pos);
    leg.castShadow = true;
    group.add(leg);
  });
  return group;
}

// UI references
const placeLanternBtn = document.getElementById('placeLanternBtn');
const placeChairBtn = document.getElementById('placeChairBtn');
const objectCountEl = document.getElementById('objectCount');
const currentModeEl = document.getElementById('currentMode');
const selectedInfoEl = document.getElementById('selectedInfo');
const instructionsEl = document.getElementById('instructions');

function setMode(mode) {
  currentMode = mode;
  window.__3D_STATE__.currentMode = mode;

  placeLanternBtn.classList.toggle('active', mode === 'place_lantern');
  placeChairBtn.classList.toggle('active', mode === 'place_chair');

  if (mode === 'browse') {
    renderer.domElement.style.cursor = 'default';
    currentModeEl.className = 'mode-badge mode-browse';
    currentModeEl.textContent = 'browse';
    instructionsEl.classList.remove('placing');
    instructionsEl.textContent = '方向键移动选中物体 · Delete 删除 · Esc 取消';
    controls.enabled = true;
  } else {
    renderer.domElement.style.cursor = 'crosshair';
    currentModeEl.className = 'mode-badge mode-place';
    currentModeEl.textContent = mode;
    instructionsEl.classList.add('placing');
    const typeName = mode === 'place_lantern' ? '灯笼' : '椅子';
    instructionsEl.textContent = `点击地面放置${typeName} · 按 Esc 或再次点击按钮取消`;
    controls.enabled = true;
    deselectObject();
  }
}

placeLanternBtn.addEventListener('click', () => {
  if (currentMode === 'place_lantern') {
    setMode('browse');
  } else {
    setMode('place_lantern');
  }
});

placeChairBtn.addEventListener('click', () => {
  if (currentMode === 'place_chair') {
    setMode('browse');
  } else {
    setMode('place_chair');
  }
});

// Selection highlight
let originalMaterials = new Map();

function highlightObject(obj) {
  obj.traverse((child) => {
    if (child.isMesh && child.material) {
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      const originals = [];
      const highlighted = [];
      mats.forEach(mat => {
        originals.push(mat);
        const cloned = mat.clone();
        if (cloned.emissive) {
          cloned.emissive = new THREE.Color(0x4a6cf7);
          cloned.emissiveIntensity = 0.3;
        }
        highlighted.push(cloned);
      });
      originalMaterials.set(child.uuid, originals);
      child.material = Array.isArray(child.material) ? highlighted : highlighted[0];
    }
  });
}

function unhighlightObject(obj) {
  obj.traverse((child) => {
    if (child.isMesh && originalMaterials.has(child.uuid)) {
      const originals = originalMaterials.get(child.uuid);
      child.material = originals.length === 1 ? originals[0] : originals;
      originalMaterials.delete(child.uuid);
    }
  });
}

function selectObject(obj) {
  if (selectedObject === obj) return;
  deselectObject();
  selectedObject = obj;
  highlightObject(obj);
  updateSelectedInfo();
}

function deselectObject() {
  if (selectedObject) {
    unhighlightObject(selectedObject);
    selectedObject = null;
    updateSelectedInfo();
  }
}

function updateSelectedInfo() {
  if (selectedObject) {
    const type = selectedObject.userData.objectType || 'unknown';
    const pos = selectedObject.position;
    selectedInfoEl.textContent = `${type} (${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)})`;
    window.__3D_STATE__.selectedObject = {
      type: type,
      position: { x: pos.x, y: pos.y, z: pos.z }
    };
  } else {
    selectedInfoEl.textContent = '无';
    window.__3D_STATE__.selectedObject = null;
  }
}

function updateHUD() {
  objectCountEl.textContent = objectCount;
  window.__3D_STATE__.objectCount = objectCount;
  window.__3D_STATE__.lanternCount = lanternCount;
  window.__3D_STATE__.chairCount = chairCount;
  updateSelectedInfo();
}

// Place object
function placeObject(type, position) {
  let model;
  let scale;
  if (type === 'lantern') {
    if (!lanternModel) return;
    model = lanternModel.clone();
    scale = 0.02;
  } else if (type === 'chair') {
    if (!chairModel) return;
    model = chairModel.clone();
    scale = 3;
  }

  model.scale.set(scale, scale, scale);
  model.position.copy(position);
  model.userData.objectType = type;
  model.userData.isPlacedObject = true;

  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  scene.add(model);
  placedObjects.push(model);

  objectCount++;
  if (type === 'lantern') lanternCount++;
  if (type === 'chair') chairCount++;

  updateHUD();
}

// Find the top-level placed object from a clicked mesh
function findPlacedParent(object) {
  let current = object;
  while (current) {
    if (current.userData && current.userData.isPlacedObject) {
      return current;
    }
    current = current.parent;
  }
  return null;
}

// Mouse click handler
function onMouseClick(event) {
  // Ignore clicks on toolbar area
  if (event.target.closest('#toolbar') || event.target.closest('#hud')) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  if (currentMode === 'place_lantern' || currentMode === 'place_chair') {
    // Place mode: check ground intersection
    const groundIntersects = raycaster.intersectObject(ground);
    if (groundIntersects.length > 0) {
      const point = groundIntersects[0].point;
      const type = currentMode === 'place_lantern' ? 'lantern' : 'chair';
      placeObject(type, new THREE.Vector3(point.x, 0, point.z));
      setMode('browse');
    }
  } else {
    // Browse mode: select or deselect
    const allMeshes = [];
    placedObjects.forEach(obj => {
      obj.traverse((child) => {
        if (child.isMesh) allMeshes.push(child);
      });
    });

    const intersects = raycaster.intersectObjects(allMeshes, false);
    if (intersects.length > 0) {
      const placedParent = findPlacedParent(intersects[0].object);
      if (placedParent) {
        selectObject(placedParent);
        return;
      }
    }
    // Clicked on empty/ground
    deselectObject();
  }
}

renderer.domElement.addEventListener('click', onMouseClick);

// Keyboard handler
document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') {
    if (currentMode !== 'browse') {
      setMode('browse');
    } else {
      deselectObject();
    }
    return;
  }

  if (event.key === 'Delete' || event.key === 'Backspace') {
    if (selectedObject) {
      const type = selectedObject.userData.objectType;
      scene.remove(selectedObject);
      const idx = placedObjects.indexOf(selectedObject);
      if (idx > -1) placedObjects.splice(idx, 1);

      objectCount--;
      if (type === 'lantern') lanternCount--;
      if (type === 'chair') chairCount--;

      selectedObject = null;
      updateHUD();
    }
    return;
  }

  // Arrow keys to move selected object
  if (selectedObject) {
    const step = 0.5;
    let moved = false;
    switch (event.key) {
      case 'ArrowUp':
        selectedObject.position.z -= step;
        moved = true;
        break;
      case 'ArrowDown':
        selectedObject.position.z += step;
        moved = true;
        break;
      case 'ArrowLeft':
        selectedObject.position.x -= step;
        moved = true;
        break;
      case 'ArrowRight':
        selectedObject.position.x += step;
        moved = true;
        break;
    }
    if (moved) {
      event.preventDefault();
      updateSelectedInfo();
    }
  }
});

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Update state every frame
  window.__3D_STATE__.objectCount = objectCount;
  window.__3D_STATE__.currentMode = currentMode;
  window.__3D_STATE__.lanternCount = lanternCount;
  window.__3D_STATE__.chairCount = chairCount;

  if (selectedObject) {
    const pos = selectedObject.position;
    window.__3D_STATE__.selectedObject = {
      type: selectedObject.userData.objectType,
      position: { x: pos.x, y: pos.y, z: pos.z }
    };
  } else {
    window.__3D_STATE__.selectedObject = null;
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
