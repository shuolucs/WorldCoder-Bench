<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Brain Connectivity Map</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: monospace;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            padding: 10px;
            background: rgba(10, 10, 26, 0.7);
            border: 1px solid #333;
            border-radius: 5px;
            pointer-events: none;
        }
        #top-left { top: 10px; left: 10px; }
        #top-right { top: 10px; right: 10px; }
        #node-info {
            top: 50px;
            left: 10px;
            display: none;
            color: #00ffff;
        }
        #bottom-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        button {
            background: #1a1a3a;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
            transition: background 0.2s;
        }
        button:hover { background: #2a2a5a; }
        button.active { background: #4444aa; border-color: #8888ff; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="top-left" class="hud">
        Nodes: <span id="val-nodes">12</span> | 
        Connections: <span id="val-conns">20</span> | 
        Mode: <span id="val-mode">Simulation</span>
    </div>
    
    <div id="top-right" class="hud">
        Kinetic Energy: <span id="val-ke">0.00</span>
    </div>

    <div id="node-info" class="hud">
        Region: <span id="info-region">-</span><br>
        Activation: <span id="info-act">-</span><br>
        Connections: <span id="info-conns">-</span>
    </div>

    <div id="bottom-controls">
        <button id="btn-physics" class="active">Toggle Physics</button>
        <button id="btn-reset">Reset Layout</button>
        <button id="btn-highlight">Highlight Region: All</button>
        <button id="btn-debug">Toggle Debug</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            nodeCount: 12,
            connectionCount: 20,
            physicsActive: true,
            debugMode: false,
            totalKineticEnergy: 0,
            selectedNodeIndex: -1,
            highlightedRegion: 'all',
            nodePositions: [],
            nodeActivations: [],
            frameCount: 0,
            maxVelocity: 0,
            signalPulseCount: 20,
            nodesInBounds: true
        };

        const state = window.__3D_STATE__;
        const regions = ['all', 'frontal', 'parietal', 'temporal', 'occipital'];
        let currentRegionIdx = 0;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.0);
        pointLight.position.set(50, 50, 50);
        scene.add(pointLight);

        // --- Data & Geometry ---
        const nodeData = [];
        const connectionData = [];
        
        const regionDefs = {
            'frontal': { color: 0xff4444, bases: [[0, 5, 15], [-8, 0, 12], [8, 0, 12]] },
            'parietal': { color: 0x44ff44, bases: [[0, 12, 0], [-10, 8, 0], [10, 8, 0]] },
            'temporal': { color: 0x4444ff, bases: [[-12, -5, 0], [12, -5, 0], [0, -8, 5]] },
            'occipital': { color: 0xffff44, bases: [[0, 0, -15], [-6, 5, -12], [6, 5, -12]] }
        };

        const nodeGeo = new THREE.SphereGeometry(2, 32, 32);
        const pulseGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const pulseMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });

        // Create Nodes
        let nodeIndex = 0;
        for (const [regName, regData] of Object.entries(regionDefs)) {
            for (const pos of regData.bases) {
                const activation = 0.2 + Math.random() * 0.6;
                const mat = new THREE.MeshPhongMaterial({ 
                    color: regData.color,
                    transparent: true,
                    opacity: 1.0
                });
                const mesh = new THREE.Mesh(nodeGeo, mat);
                
                // Add jitter to initial position
                const initPos = new THREE.Vector3(
                    pos[0] + (Math.random()-0.5)*2,
                    pos[1] + (Math.random()-0.5)*2,
                    pos[2] + (Math.random()-0.5)*2
                );
                mesh.position.copy(initPos);
                scene.add(mesh);

                // Selection outline
                const outlineGeo = new THREE.WireframeGeometry(nodeGeo);
                const outlineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
                const outline = new THREE.LineSegments(outlineGeo, outlineMat);
                mesh.add(outline);

                nodeData.push({
                    id: nodeIndex++,
                    region: regName,
                    mesh: mesh,
                    outline: outline,
                    baseColor: regData.color,
                    activation: activation,
                    originalPos: initPos.clone(),
                    velocity: new THREE.Vector3(),
                    force: new THREE.Vector3(),
                    repulsionForce: new THREE.Vector3(),
                    attractionForce: new THREE.Vector3(),
                    connections: 0
                });
                state.nodeActivations.push(activation);
            }
        }

        // Create Connections
        const connectedPairs = new Set();
        while (connectionData.length < 20) {
            const s = Math.floor(Math.random() * 12);
            let t = Math.floor(Math.random() * 12);
            while (t === s) t = Math.floor(Math.random() * 12);
            
            const pairId = s < t ? `${s}-${t}` : `${t}-${s}`;
            if (!connectedPairs.has(pairId)) {
                connectedPairs.add(pairId);
                const strength = 0.1 + Math.random() * 0.9;
                
                const lineMat = new THREE.LineBasicMaterial({ 
                    color: 0x00ffff, 
                    transparent: true, 
                    opacity: strength * 0.8
                });
                const lineGeo = new THREE.BufferGeometry().setFromPoints([
                    nodeData[s].mesh.position,
                    nodeData[t].mesh.position
                ]);
                const line = new THREE.Line(lineGeo, lineMat);
                scene.add(line);

                const pulse = new THREE.Mesh(pulseGeo, pulseMat);
                scene.add(pulse);

                connectionData.push({
                    source: s,
                    target: t,
                    strength: strength,
                    line: line,
                    pulse: pulse,
                    progress: Math.random(),
                    direction: Math.random() > 0.5 ? 1 : -1
                });

                nodeData[s].connections++;
                nodeData[t].connections++;
            }
        }

        // --- Debug Overlay ---
        const debugGroup = new THREE.Group();
        debugGroup.visible = false;
        scene.add(debugGroup);

        const boundGeo = new THREE.WireframeGeometry(new THREE.SphereGeometry(40, 16, 16));
        const boundMat = new THREE.LineBasicMaterial({ color: 0x555555 });
        const boundingSphere = new THREE.LineSegments(boundGeo, boundMat);
        debugGroup.add(boundingSphere);

        nodeData.forEach(node => {
            node.repelArrow = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), node.mesh.position, 0, 0xff0000);
            node.attractArrow = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), node.mesh.position, 0, 0x00ff00);
            node.velArrow = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), node.mesh.position, 0, 0x0000ff);
            debugGroup.add(node.repelArrow);
            debugGroup.add(node.attractArrow);
            debugGroup.add(node.velArrow);
        });

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName === 'BUTTON') return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodeData.map(n => n.mesh));

            // Deselect previous
            if (state.selectedNodeIndex !== -1) {
                const prevNode = nodeData[state.selectedNodeIndex];
                prevNode.outline.material.opacity = 0;
                prevNode.mesh.material.emissive.setHex(0x000000);
            }

            if (intersects.length > 0) {
                const selectedMesh = intersects[0].object;
                const node = nodeData.find(n => n.mesh === selectedMesh);
                state.selectedNodeIndex = node.id;
                
                node.outline.material.opacity = 1;
                node.mesh.material.emissive.setHex(node.baseColor);
                node.mesh.material.emissiveIntensity = 0.5;

                document.getElementById('node-info').style.display = 'block';
                document.getElementById('info-region').innerText = node.region;
                document.getElementById('info-act').innerText = node.activation.toFixed(2);
                document.getElementById('info-conns').innerText = node.connections;
            } else {
                state.selectedNodeIndex = -1;
                document.getElementById('node-info').style.display = 'none';
            }
        });

        // --- UI Controls ---
        document.getElementById('btn-physics').addEventListener('click', (e) => {
            state.physicsActive = !state.physicsActive;
            e.target.classList.toggle('active', state.physicsActive);
            document.getElementById('val-mode').innerText = state.physicsActive ? 'Simulation' : 'Paused';
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            nodeData.forEach(node => {
                node.mesh.position.copy(node.originalPos);
                node.velocity.set(0,0,0);
            });
        });

        document.getElementById('btn-highlight').addEventListener('click', (e) => {
            currentRegionIdx = (currentRegionIdx + 1) % regions.length;
            state.highlightedRegion = regions[currentRegionIdx];
            e.target.innerText = `Highlight Region: ${state.highlightedRegion.charAt(0).toUpperCase() + state.highlightedRegion.slice(1)}`;
            updateHighlighting();
        });

        function toggleDebug() {
            state.debugMode = !state.debugMode;
            debugGroup.visible = state.debugMode;
            document.getElementById('btn-debug').classList.toggle('active', state.debugMode);
        }

        document.getElementById('btn-debug').addEventListener('click', toggleDebug);
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'd') toggleDebug();
        });

        function updateHighlighting() {
            const hl = state.highlightedRegion;
            nodeData.forEach(node => {
                if (hl === 'all' || node.region === hl) {
                    node.mesh.material.opacity = 1.0;
                } else {
                    node.mesh.material.opacity = 0.2;
                }
            });

            connectionData.forEach(conn => {
                const sNode = nodeData[conn.source];
                const tNode = nodeData[conn.target];
                const sMatch = (hl === 'all' || sNode.region === hl);
                const tMatch = (hl === 'all' || tNode.region === hl);
                
                if (sMatch || tMatch) {
                    conn.line.material.opacity = conn.strength * 0.8;
                    conn.pulse.visible = true;
                } else {
                    conn.line.material.opacity = 0.05;
                    conn.pulse.visible = false;
                }
            });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();
            state.frameCount++;

            // Update Node Scales
            nodeData.forEach(node => {
                const scale = 1.0 + 0.3 * Math.sin(time * node.activation * 3);
                node.mesh.scale.set(scale, scale, scale);
            });

            // Physics Simulation
            if (state.physicsActive) {
                let ke = 0;
                let maxV = 0;
                let allInBounds = true;

                // Reset forces
                nodeData.forEach(n => {
                    n.force.set(0,0,0);
                    n.repulsionForce.set(0,0,0);
                    n.attractionForce.set(0,0,0);
                });

                // Repulsion (all pairs)
                for (let i = 0; i < nodeData.length; i++) {
                    for (let j = i + 1; j < nodeData.length; j++) {
                        const n1 = nodeData[i];
                        const n2 = nodeData[j];
                        const diff = new THREE.Vector3().subVectors(n1.mesh.position, n2.mesh.position);
                        const distSq = diff.lengthSq();
                        if (distSq > 0.1) {
                            const forceMag = 150 / distSq;
                            const dir = diff.normalize().multiplyScalar(forceMag);
                            n1.repulsionForce.add(dir);
                            n2.repulsionForce.sub(dir);
                        }
                    }
                }

                // Attraction (connections)
                connectionData.forEach(conn => {
                    const n1 = nodeData[conn.source];
                    const n2 = nodeData[conn.target];
                    const diff = new THREE.Vector3().subVectors(n2.mesh.position, n1.mesh.position);
                    const dist = diff.length();
                    const restLength = 15;
                    const forceMag = (dist - restLength) * 0.02 * conn.strength;
                    const dir = diff.normalize().multiplyScalar(forceMag);
                    n1.attractionForce.add(dir);
                    n2.attractionForce.sub(dir);
                });

                // Boundary force & Integration
                nodeData.forEach(n => {
                    const pos = n.mesh.position;
                    const distFromCenter = pos.length();
                    
                    if (distFromCenter > 40) {
                        allInBounds = false;
                        const pull = pos.clone().normalize().multiplyScalar((40 - distFromCenter) * 0.1);
                        n.force.add(pull);
                    }

                    n.force.add(n.repulsionForce).add(n.attractionForce);
                    n.velocity.add(n.force);
                    n.velocity.multiplyScalar(0.95); // Damping

                    if (n.velocity.length() > 2.0) {
                        n.velocity.setLength(2.0);
                    }

                    n.mesh.position.add(n.velocity);

                    const vSq = n.velocity.lengthSq();
                    ke += 0.5 * vSq; // mass = 1
                    if (Math.sqrt(vSq) > maxV) maxV = Math.sqrt(vSq);
                });

                state.totalKineticEnergy = ke;
                state.maxVelocity = maxV;
                state.nodesInBounds = allInBounds;
                document.getElementById('val-ke').innerText = ke.toFixed(2);
            }

            // Update Connections & Pulses
            state.nodePositions = [];
            connectionData.forEach(conn => {
                const p1 = nodeData[conn.source].mesh.position;
                const p2 = nodeData[conn.target].mesh.position;
                
                // Update line geometry
                const positions = conn.line.geometry.attributes.position.array;
                positions[0] = p1.x; positions[1] = p1.y; positions[2] = p1.z;
                positions[3] = p2.x; positions[4] = p2.y; positions[5] = p2.z;
                conn.line.geometry.attributes.position.needsUpdate = true;

                // Update pulse
                conn.progress += (dt * 0.5) * conn.direction; // 2 seconds to cross
                if (conn.progress >= 1.0) {
                    conn.progress = 1.0;
                    conn.direction = -1;
                } else if (conn.progress <= 0.0) {
                    conn.progress = 0.0;
                    conn.direction = 1;
                }
                conn.pulse.position.lerpVectors(p1, p2, conn.progress);
            });

            // Update State Positions
            nodeData.forEach(n => {
                state.nodePositions.push({x: n.mesh.position.x, y: n.mesh.position.y, z: n.mesh.position.z});
            });

            // Update Debug Helpers
            if (state.debugMode) {
                nodeData.forEach(n => {
                    n.repelArrow.position.copy(n.mesh.position);
                    if (n.repulsionForce.lengthSq() > 0.001) {
                        n.repelArrow.setDirection(n.repulsionForce.clone().normalize());
                        n.repelArrow.setLength(n.repulsionForce.length() * 5);
                    } else {
                        n.repelArrow.setLength(0);
                    }

                    n.attractArrow.position.copy(n.mesh.position);
                    if (n.attractionForce.lengthSq() > 0.001) {
                        n.attractArrow.setDirection(n.attractionForce.clone().normalize());
                        n.attractArrow.setLength(n.attractionForce.length() * 5);
                    } else {
                        n.attractArrow.setLength(0);
                    }

                    n.velArrow.position.copy(n.mesh.position);
                    if (n.velocity.lengthSq() > 0.001) {
                        n.velArrow.setDirection(n.velocity.clone().normalize());
                        n.velArrow.setLength(n.velocity.length() * 5);
                    } else {
                        n.velArrow.setLength(0);
                    }
                });
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
