<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Brain Connectivity Map</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#hud-top-left {
    position: absolute; top: 15px; left: 15px;
    color: #aaccff; font-size: 14px;
    background: rgba(10,10,26,0.8); padding: 10px 15px;
    border: 1px solid rgba(0,255,255,0.3); border-radius: 8px;
    pointer-events: none;
}
#hud-top-right {
    position: absolute; top: 15px; right: 15px;
    color: #aaccff; font-size: 14px;
    background: rgba(10,10,26,0.8); padding: 10px 15px;
    border: 1px solid rgba(0,255,255,0.3); border-radius: 8px;
    pointer-events: none;
}
#node-info {
    position: absolute; top: 70px; left: 15px;
    color: #ffffff; font-size: 13px;
    background: rgba(10,10,26,0.9); padding: 10px 15px;
    border: 1px solid rgba(255,255,255,0.4); border-radius: 8px;
    display: none; min-width: 220px;
}
#controls {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px;
}
#controls button {
    background: rgba(0,255,255,0.15); color: #00ffff;
    border: 1px solid rgba(0,255,255,0.5); border-radius: 6px;
    padding: 10px 20px; font-size: 13px; cursor: pointer;
    transition: all 0.3s;
}
#controls button:hover {
    background: rgba(0,255,255,0.3); border-color: #00ffff;
}
</style>
</head>
<body>
<div id="hud-top-left">Nodes: 12 | Connections: 20 | Mode: Simulation</div>
<div id="hud-top-right">Kinetic Energy: 0.00</div>
<div id="node-info"></div>
<div id="controls">
    <button id="btn-physics">Toggle Physics</button>
    <button id="btn-reset">Reset Layout</button>
    <button id="btn-highlight">Highlight Region</button>
    <button id="btn-debug">Toggle Debug</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 80);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xffffff, 1.0);
    pointLight.position.set(50, 50, 50);
    scene.add(pointLight);

    // Region definitions
    const regions = {
        frontal: { color: 0xff4444, name: 'Frontal' },
        parietal: { color: 0x44ff44, name: 'Parietal' },
        temporal: { color: 0x4444ff, name: 'Temporal' },
        occipital: { color: 0xffff44, name: 'Occipital' }
    };

    // Node initial positions
    const nodeDefinitions = [
        // Frontal (z > 10)
        { region: 'frontal', pos: new THREE.Vector3(-8, 5, 15) },
        { region: 'frontal', pos: new THREE.Vector3(0, 8, 18) },
        { region: 'frontal', pos: new THREE.Vector3(8, 5, 15) },
        // Parietal (z ~ 0, y > 5)
        { region: 'parietal', pos: new THREE.Vector3(-10, 8, 2) },
        { region: 'parietal', pos: new THREE.Vector3(0, 12, 0) },
        { region: 'parietal', pos: new THREE.Vector3(10, 8, -2) },
        // Temporal (y < -3)
        { region: 'temporal', pos: new THREE.Vector3(-12, -6, 5) },
        { region: 'temporal', pos: new THREE.Vector3(0, -8, 0) },
        { region: 'temporal', pos: new THREE.Vector3(12, -6, -5) },
        // Occipital (z < -10)
        { region: 'occipital', pos: new THREE.Vector3(-6, 3, -15) },
        { region: 'occipital', pos: new THREE.Vector3(0, 6, -18) },
        { region: 'occipital', pos: new THREE.Vector3(6, 3, -15) }
    ];

    // Create nodes
    const nodes = [];
    const nodeGroup = new THREE.Group();
    scene.add(nodeGroup);

    const sphereGeom = new THREE.SphereGeometry(2, 32, 32);

    nodeDefinitions.forEach((def, i) => {
        const regionInfo = regions[def.region];
        const material = new THREE.MeshPhongMaterial({
            color: regionInfo.color,
            transparent: true,
            opacity: 1.0,
            shininess: 80,
            emissive: new THREE.Color(regionInfo.color).multiplyScalar(0.2)
        });
        const mesh = new THREE.Mesh(sphereGeom, material);
        mesh.position.copy(def.pos);
        mesh.userData = {
            index: i,
            region: def.region,
            regionName: regionInfo.name,
            activation: 0.2 + Math.random() * 0.6,
            originalPos: def.pos.clone(),
            velocity: new THREE.Vector3(0, 0, 0),
            baseColor: regionInfo.color
        };
        nodeGroup.add(mesh);
        nodes.push(mesh);
    });

    // Selection outline
    let selectedNode = null;
    const outlineGeom = new THREE.SphereGeometry(2.4, 32, 32);
    const outlineMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.8
    });
    const outlineMesh = new THREE.Mesh(outlineGeom, outlineMat);
    outlineMesh.visible = false;
    scene.add(outlineMesh);

    // Connection definitions (20 connections)
    const connectionDefs = [
        // Frontal internal
        [0, 1], [1, 2], [0, 2],
        // Parietal internal
        [3, 4], [4, 5],
        // Temporal internal
        [6, 7], [7, 8],
        // Occipital internal
        [9, 10], [10, 11], [9, 11],
        // Cross-region
        [0, 3], [2, 5], // Frontal-Parietal
        [1, 4],          // Frontal-Parietal
        [3, 6], [5, 8],  // Parietal-Temporal
        [6, 9], [8, 11], // Temporal-Occipital
        [4, 10],         // Parietal-Occipital
        [7, 10],         // Temporal-Occipital
        [1, 7]           // Frontal-Temporal
    ];

    // Create connections
    const connections = [];
    const connectionGroup = new THREE.Group();
    scene.add(connectionGroup);

    const pulseGroup = new THREE.Group();
    scene.add(pulseGroup);

    const pulseGeom = new THREE.SphereGeometry(0.5, 16, 16);

    connectionDefs.forEach((def, i) => {
        const strength = 0.1 + Math.random() * 0.9;
        const points = [nodes[def[0]].position.clone(), nodes[def[1]].position.clone()];
        const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
        const lineMat = new THREE.LineBasicMaterial({
            color: 0x00ffff,
            transparent: true,
            opacity: strength * 0.6,
            linewidth: 1
        });
        const line = new THREE.Line(lineGeom, lineMat);
        connectionGroup.add(line);

        // Signal pulse
        const pulseMat = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            transparent: true,
            opacity: 0.9
        });
        const pulse = new THREE.Mesh(pulseGeom, pulseMat);
        pulse.visible = true;
        pulseGroup.add(pulse);

        connections.push({
            nodeA: def[0],
            nodeB: def[1],
            strength: strength,
            line: line,
            pulse: pulse,
            pulseT: Math.random(), // random start phase
            pulseDir: 1,
            pulseSpeed: 0.5 // complete trip in ~2 seconds
        });
    });

    // Debug objects
    const debugGroup = new THREE.Group();
    debugGroup.visible = false;
    scene.add(debugGroup);

    // Bounding sphere wireframe
    const boundingSphereGeom = new THREE.SphereGeometry(40, 32, 32);
    const boundingSphereMat = new THREE.MeshBasicMaterial({
        color: 0x444488,
        wireframe: true,
        transparent: true,
        opacity: 0.15
    });
    const boundingSphere = new THREE.Mesh(boundingSphereGeom, boundingSphereMat);
    debugGroup.add(boundingSphere);

    // Debug arrows storage
    let debugArrows = [];

    function clearDebugArrows() {
        debugArrows.forEach(a => debugGroup.remove(a));
        debugArrows = [];
    }

    // State
    const state = {
        nodeCount: 12,
        connectionCount: 20,
        physicsActive: true,
        debugMode: false,
        totalKineticEnergy: 0,
        selectedNodeIndex: -1,
        highlightedRegion: 'all',
        nodePositions: [],
        nodeActivations: [],
        frameCount: 0,
        maxVelocity: 0,
        signalPulseCount: 20,
        nodesInBounds: true
    };
    window.__3D_STATE__ = state;

    // Update state arrays
    function updateStateArrays() {
        state.nodePositions = nodes.map(n => ({ x: n.position.x, y: n.position.y, z: n.position.z }));
        state.nodeActivations = nodes.map(n => n.userData.activation);
    }

    // Highlight region cycling
    const regionCycle = ['frontal', 'parietal', 'temporal', 'occipital', 'all'];
    let highlightIndex = 4; // start at 'all'

    function applyHighlight() {
        const hr = state.highlightedRegion;
        nodes.forEach(node => {
            if (hr === 'all' || node.userData.region === hr) {
                node.material.opacity = 1.0;
                node.material.emissive.set(node.userData.baseColor).multiplyScalar(0.2);
            } else {
                node.material.opacity = 0.2;
                node.material.emissive.set(0x000000);
            }
        });
        connections.forEach(conn => {
            const regionA = nodes[conn.nodeA].userData.region;
            const regionB = nodes[conn.nodeB].userData.region;
            if (hr === 'all' || regionA === hr || regionB === hr) {
                conn.line.material.opacity = conn.strength * 0.6;
                conn.pulse.material.opacity = 0.9;
            } else {
                conn.line.material.opacity = 0.05;
                conn.pulse.material.opacity = 0.1;
            }
        });
    }

    // Physics
    const SPRING_K = 0.005;
    const REPULSION_K = 200;
    const DAMPING = 0.95;
    const MAX_VEL = 2.0;
    const BOUNDARY_RADIUS = 40;
    const BOUNDARY_FORCE = 0.5;

    function simulatePhysics(dt) {
        if (!state.physicsActive) return;

        const forces = nodes.map(() => new THREE.Vector3(0, 0, 0));
        const attractionForces = nodes.map(() => new THREE.Vector3(0, 0, 0));
        const repulsionForces = nodes.map(() => new THREE.Vector3(0, 0, 0));

        // Repulsion between all pairs
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                const diff = new THREE.Vector3().subVectors(nodes[i].position, nodes[j].position);
                const distSq = Math.max(diff.lengthSq(), 1);
                const forceMag = REPULSION_K / distSq;
                const forceDir = diff.normalize().multiplyScalar(forceMag);
                repulsionForces[i].add(forceDir);
                repulsionForces[j].sub(forceDir);
            }
        }

        // Spring attraction for connections
        connections.forEach(conn => {
            const a = conn.nodeA;
            const b = conn.nodeB;
            const diff = new THREE.Vector3().subVectors(nodes[b].position, nodes[a].position);
            const dist = diff.length();
            const restLength = 15;
            const displacement = dist - restLength;
            const forceMag = SPRING_K * displacement * conn.strength;
            const forceDir = diff.normalize().multiplyScalar(forceMag);
            attractionForces[a].add(forceDir);
            attractionForces[b].sub(forceDir);
        });

        // Combine forces
        for (let i = 0; i < nodes.length; i++) {
            forces[i].add(attractionForces[i]).add(repulsionForces[i]);

            // Boundary containment
            const dist = nodes[i].position.length();
            if (dist > BOUNDARY_RADIUS) {
                const pushBack = nodes[i].position.clone().normalize().multiplyScalar(-BOUNDARY_FORCE * (dist - BOUNDARY_RADIUS));
                forces[i].add(pushBack);
            }
        }

        // Update velocities and positions
        let totalKE = 0;
        let maxVel = 0;

        for (let i = 0; i < nodes.length; i++) {
            const vel = nodes[i].userData.velocity;
            vel.add(forces[i]);
            vel.multiplyScalar(DAMPING);

            // Cap velocity
            const speed = vel.length();
            if (speed > MAX_VEL) {
                vel.normalize().multiplyScalar(MAX_VEL);
            }

            nodes[i].position.add(vel);

            const currentSpeed = vel.length();
            totalKE += 0.5 * currentSpeed * currentSpeed;
            if (currentSpeed > maxVel) maxVel = currentSpeed;
        }

        state.totalKineticEnergy = totalKE;
        state.maxVelocity = maxVel;

        // Update debug arrows
        if (state.debugMode) {
            clearDebugArrows();
            for (let i = 0; i < nodes.length; i++) {
                const pos = nodes[i].position;

                // Repulsion arrows (red)
                if (repulsionForces[i].length() > 0.01) {
                    const dir = repulsionForces[i].clone().normalize();
                    const len = Math.min(repulsionForces[i].length() * 5, 10);
                    const arrow = new THREE.ArrowHelper(dir, pos, len, 0xff0000, 1, 0.5);
                    debugGroup.add(arrow);
                    debugArrows.push(arrow);
                }

                // Attraction arrows (green)
                if (attractionForces[i].length() > 0.01) {
                    const dir = attractionForces[i].clone().normalize();
                    const len = Math.min(attractionForces[i].length() * 10, 10);
                    const arrow = new THREE.ArrowHelper(dir, pos, len, 0x00ff00, 1, 0.5);
                    debugGroup.add(arrow);
                    debugArrows.push(arrow);
                }

                // Velocity arrows (blue)
                const vel = nodes[i].userData.velocity;
                if (vel.length() > 0.01) {
                    const dir = vel.clone().normalize();
                    const len = Math.min(vel.length() * 5, 8);
                    const arrow = new THREE.ArrowHelper(dir, pos, len, 0x0088ff, 1, 0.5);
                    debugGroup.add(arrow);
                    debugArrows.push(arrow);
                }
            }
        }
    }

    // Raycaster
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onMouseClick(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(nodes);

        if (intersects.length > 0) {
            const node = intersects[0].object;
            selectNode(node);
        } else {
            deselectNode();
        }
    }

    function selectNode(node) {
        selectedNode = node;
        state.selectedNodeIndex = node.userData.index;

        outlineMesh.visible = true;
        outlineMesh.position.copy(node.position);

        node.material.emissive.set(0xffffff).multiplyScalar(0.4);

        // Count connections
        const connCount = connections.filter(c => c.nodeA === node.userData.index || c.nodeB === node.userData.index).length;

        const infoDiv = document.getElementById('node-info');
        infoDiv.style.display = 'block';
        infoDiv.innerHTML = `<strong>Region:</strong> ${node.userData.regionName} | <strong>Activation:</strong> ${node.userData.activation.toFixed(2)} | <strong>Connections:</strong> ${connCount}`;
    }

    function deselectNode() {
        if (selectedNode) {
            const hr = state.highlightedRegion;
            if (hr === 'all' || selectedNode.userData.region === hr) {
                selectedNode.material.emissive.set(selectedNode.userData.baseColor).multiplyScalar(0.2);
            } else {
                selectedNode.material.emissive.set(0x000000);
            }
        }
        selectedNode = null;
        state.selectedNodeIndex = -1;
        outlineMesh.visible = false;
        document.getElementById('node-info').style.display = 'none';
    }

    renderer.domElement.addEventListener('click', onMouseClick);

    // Keyboard
    document.addEventListener('keydown', (e) => {
        if (e.key === 'd' || e.key === 'D') {
            toggleDebug();
        }
    });

    function toggleDebug() {
        state.debugMode = !state.debugMode;
        debugGroup.visible = state.debugMode;
        if (!state.debugMode) {
            clearDebugArrows();
        }
    }

    // Buttons
    document.getElementById('btn-physics').addEventListener('click', () => {
        state.physicsActive = !state.physicsActive;
        document.getElementById('hud-top-left').textContent =
            `Nodes: 12 | Connections: 20 | Mode: ${state.physicsActive ? 'Simulation' : 'Paused'}`;
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        nodes.forEach(node => {
            node.position.copy(node.userData.originalPos);
            node.userData.velocity.set(0, 0, 0);
        });
        state.totalKineticEnergy = 0;
        state.maxVelocity = 0;
    });

    document.getElementById('btn-highlight').addEventListener('click', () => {
        highlightIndex = (highlightIndex + 1) % regionCycle.length;
        state.highlightedRegion = regionCycle[highlightIndex];
        applyHighlight();
    });

    document.getElementById('btn-debug').addEventListener('click', () => {
        toggleDebug();
    });

    // Window resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation loop
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        const time = clock.getElapsedTime();
        const dt = clock.getDelta();
        state.frameCount++;

        // Physics
        simulatePhysics(dt);

        // Node pulsing
        nodes.forEach(node => {
            const activation = node.userData.activation;
            const scale = 1.0 + 0.3 * Math.sin(time * activation * 3);
            node.scale.setScalar(scale);
        });

        // Update connections
        connections.forEach(conn => {
            const posA = nodes[conn.nodeA].position;
            const posB = nodes[conn.nodeB].position;

            // Update line geometry
            const positions = conn.line.geometry.attributes.position;
            positions.array[0] = posA.x;
            positions.array[1] = posA.y;
            positions.array[2] = posA.z;
            positions.array[3] = posB.x;
            positions.array[4] = posB.y;
            positions.array[5] = posB.z;
            positions.needsUpdate = true;

            // Animate pulse
            conn.pulseT += conn.pulseDir * conn.pulseSpeed * 0.016; // ~60fps
            if (conn.pulseT >= 1.0) {
                conn.pulseT = 1.0;
                conn.pulseDir = -1;
            } else if (conn.pulseT <= 0.0) {
                conn.pulseT = 0.0;
                conn.pulseDir = 1;
            }

            conn.pulse.position.lerpVectors(posA, posB, conn.pulseT);

            // Pulse glow effect
            const glowIntensity = 0.5 + 0.5 * Math.sin(time * 4 + conn.pulseT * Math.PI);
            conn.pulse.scale.setScalar(0.8 + 0.4 * glowIntensity);
        });

        // Update outline position
        if (selectedNode) {
            outlineMesh.position.copy(selectedNode.position);
            const scale = selectedNode.scale.x * 1.2;
            outlineMesh.scale.setScalar(scale);
        }

        // Check bounds
        state.nodesInBounds = nodes.every(n => n.position.length() <= 40);

        // Update state
        updateStateArrays();
        state.signalPulseCount = connections.length;

        // Update HUD
        document.getElementById('hud-top-right').textContent = `Kinetic Energy: ${state.totalKineticEnergy.toFixed(2)}`;

        // Update node info if selected
        if (selectedNode) {
            const node = selectedNode;
            const connCount = connections.filter(c => c.nodeA === node.userData.index || c.nodeB === node.userData.index).length;
            document.getElementById('node-info').innerHTML = `<strong>Region:</strong> ${node.userData.regionName} | <strong>Activation:</strong> ${node.userData.activation.toFixed(2)} | <strong>Connections:</strong> ${connCount}`;
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // Initialize state
    updateStateArrays();
    animate();
})();
</script>
</body>
</html>
