<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Brain Connectivity Map</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: #eaf6ff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #hud-left, #hud-right, #node-info {
      position: absolute;
      z-index: 10;
      padding: 10px 12px;
      background: rgba(10, 12, 30, 0.55);
      border: 1px solid rgba(120, 180, 255, 0.18);
      border-radius: 8px;
      backdrop-filter: blur(4px);
      font-size: 14px;
      letter-spacing: 0.2px;
      user-select: none;
    }

    #hud-left {
      top: 12px;
      left: 12px;
    }

    #hud-right {
      top: 12px;
      right: 12px;
      min-width: 170px;
      text-align: right;
    }

    #node-info {
      left: 12px;
      bottom: 74px;
      min-width: 260px;
    }

    #controls {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px 12px;
      background: rgba(10, 12, 30, 0.45);
      border: 1px solid rgba(120, 180, 255, 0.15);
      border-radius: 12px;
      backdrop-filter: blur(4px);
    }

    button {
      background: #152043;
      color: #eef7ff;
      border: 1px solid #3d6fb3;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    button:hover {
      background: #1c2d61;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud-left">Nodes: 12 | Connections: 20 | Mode: Simulation</div>
    <div id="hud-right">Kinetic Energy: 0.00</div>
    <div id="node-info">Region: None | Activation: -- | Connections: --</div>
    <div id="controls">
      <button id="btn-physics">Toggle Physics</button>
      <button id="btn-reset">Reset Layout</button>
      <button id="btn-highlight">Highlight Region</button>
      <button id="btn-debug">Toggle Debug</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const app = document.getElementById("app");
    const hudLeft = document.getElementById("hud-left");
    const hudRight = document.getElementById("hud-right");
    const nodeInfo = document.getElementById("node-info");
    const btnPhysics = document.getElementById("btn-physics");
    const btnReset = document.getElementById("btn-reset");
    const btnHighlight = document.getElementById("btn-highlight");
    const btnDebug = document.getElementById("btn-debug");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 80);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.3));

    const pointLight = new THREE.PointLight(0xffffff, 1.0);
    pointLight.position.set(50, 50, 50);
    scene.add(pointLight);

    const regionColors = {
      frontal: 0xff4444,
      parietal: 0x44ff44,
      temporal: 0x4444ff,
      occipital: 0xffff44
    };

    const nodes = [];
    const connections = [];
    const connectionAdj = Array.from({ length: 12 }, () => new Set());
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const nodeGroup = new THREE.Group();
    const connectionGroup = new THREE.Group();
    const pulseGroup = new THREE.Group();
    const debugGroup = new THREE.Group();

    scene.add(connectionGroup);
    scene.add(pulseGroup);
    scene.add(nodeGroup);
    scene.add(debugGroup);

    const boundaryRadius = 40;

    let physicsActive = true;
    let debugMode = false;
    let selectedNodeIndex = -1;
    let totalKineticEnergy = 0;
    let frameCount = 0;
    let highlightedRegion = "all";
    let maxVelocity = 0;

    const regionCycle = ["frontal", "parietal", "temporal", "occipital", "all"];
    let regionCycleIndex = 4;

    const clock = new THREE.Clock();

    const nodeGeometry = new THREE.SphereGeometry(2, 24, 24);
    const pulseGeometry = new THREE.SphereGeometry(0.5, 16, 16);

    const frontalPositions = [
      new THREE.Vector3(-12, 6, 18),
      new THREE.Vector3(0, 10, 16),
      new THREE.Vector3(12, 5, 19)
    ];

    const parietalPositions = [
      new THREE.Vector3(-14, 12, 2),
      new THREE.Vector3(0, 15, 0),
      new THREE.Vector3(14, 11, -1)
    ];

    const temporalPositions = [
      new THREE.Vector3(-16, -8, 6),
      new THREE.Vector3(0, -10, 3),
      new THREE.Vector3(16, -7, 5)
    ];

    const occipitalPositions = [
      new THREE.Vector3(-10, 4, -18),
      new THREE.Vector3(0, 8, -20),
      new THREE.Vector3(10, 3, -17)
    ];

    const initialNodeData = [
      ...frontalPositions.map((p, i) => ({ region: "frontal", position: p.clone(), name: `Frontal ${i + 1}` })),
      ...parietalPositions.map((p, i) => ({ region: "parietal", position: p.clone(), name: `Parietal ${i + 1}` })),
      ...temporalPositions.map((p, i) => ({ region: "temporal", position: p.clone(), name: `Temporal ${i + 1}` })),
      ...occipitalPositions.map((p, i) => ({ region: "occipital", position: p.clone(), name: `Occipital ${i + 1}` }))
    ];

    for (let i = 0; i < initialNodeData.length; i++) {
      const data = initialNodeData[i];
      const activation = THREE.MathUtils.randFloat(0.2, 0.8);
      const material = new THREE.MeshPhongMaterial({
        color: regionColors[data.region],
        transparent: true,
        opacity: 1,
        shininess: 80,
        emissive: 0x000000
      });

      const mesh = new THREE.Mesh(nodeGeometry, material);
      mesh.position.copy(data.position);
      mesh.userData.index = i;
      nodeGroup.add(mesh);

      const outline = new THREE.Mesh(
        new THREE.SphereGeometry(2.25, 24, 24),
        new THREE.MeshBasicMaterial({
          color: 0xffffff,
          wireframe: true,
          transparent: true,
          opacity: 0.95
        })
      );
      outline.visible = false;
      mesh.add(outline);

      nodes.push({
        index: i,
        name: data.name,
        region: data.region,
        mesh,
        outline,
        basePosition: data.position.clone(),
        activation,
        velocity: new THREE.Vector3(),
        repulsionForce: new THREE.Vector3(),
        attractionForce: new THREE.Vector3(),
        netForce: new THREE.Vector3(),
        debugArrows: {
          repulsion: null,
          attraction: null,
          velocity: null
        }
      });
    }

    const edgePairs = [
      [0,1],[1,2],[0,3],[1,4],[2,5],
      [3,4],[4,5],[3,6],[4,7],[5,8],
      [6,7],[7,8],[6,9],[7,10],[8,11],
      [9,10],[10,11],[2,8],[0,6],[5,11]
    ];

    function createCylinderBetweenPoints(a, b, radius, material) {
      const dir = new THREE.Vector3().subVectors(b, a);
      const length = dir.length();
      const geometry = new THREE.CylinderGeometry(radius, radius, length, 10, 1, true);
      const mesh = new THREE.Mesh(geometry, material);

      const midpoint = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
      mesh.position.copy(midpoint);

      const axis = new THREE.Vector3(0, 1, 0);
      mesh.quaternion.setFromUnitVectors(axis, dir.clone().normalize());

      return mesh;
    }

    for (let i = 0; i < edgePairs.length; i++) {
      const [aIndex, bIndex] = edgePairs[i];
      const strength = THREE.MathUtils.randFloat(0.1, 1.0);
      const a = nodes[aIndex].mesh.position;
      const b = nodes[bIndex].mesh.position;

      const material = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        transparent: true,
        opacity: 0.15 + strength * 0.55
      });

      const radius = 0.12 + strength * 0.45;
      const mesh = createCylinderBetweenPoints(a, b, radius, material);
      connectionGroup.add(mesh);

      const pulse = new THREE.Mesh(
        pulseGeometry,
        new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.95
        })
      );
      pulseGroup.add(pulse);

      connections.push({
        aIndex,
        bIndex,
        strength,
        mesh,
        radius,
        baseOpacity: 0.15 + strength * 0.55,
        pulse,
        pulseTimeOffset: Math.random() * 2.0
      });

      connectionAdj[aIndex].add(bIndex);
      connectionAdj[bIndex].add(aIndex);
    }

    const boundarySphere = new THREE.Mesh(
      new THREE.SphereGeometry(boundaryRadius, 24, 24),
      new THREE.MeshBasicMaterial({
        color: 0x88aaff,
        wireframe: true,
        transparent: true,
        opacity: 0.22
      })
    );
    boundarySphere.visible = false;
    debugGroup.add(boundarySphere);

    function updateConnectionMesh(conn) {
      if (conn.mesh.geometry) conn.mesh.geometry.dispose();
      const a = nodes[conn.aIndex].mesh.position;
      const b = nodes[conn.bIndex].mesh.position;
      conn.mesh.geometry = new THREE.CylinderGeometry(conn.radius, conn.radius, a.distanceTo(b), 10, 1, true);

      const midpoint = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
      conn.mesh.position.copy(midpoint);

      const dir = new THREE.Vector3().subVectors(b, a).normalize();
      conn.mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    }

    function ensureDebugArrows() {
      nodes.forEach((node) => {
        if (!node.debugArrows.repulsion) {
          const rep = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), node.mesh.position, 0.001, 0xff3333, 1.0, 0.5);
          const att = new THREE.ArrowHelper(new THREE.Vector3(0,1,0), node.mesh.position, 0.001, 0x33ff66, 1.0, 0.5);
          const vel = new THREE.ArrowHelper(new THREE.Vector3(0,0,1), node.mesh.position, 0.001, 0x3388ff, 1.0, 0.5);
          node.debugArrows.repulsion = rep;
          node.debugArrows.attraction = att;
          node.debugArrows.velocity = vel;
          debugGroup.add(rep, att, vel);
        }
      });
    }

    function updateArrow(arrow, origin, vec, scale = 1.0) {
      const len = vec.length();
      arrow.position.copy(origin);
      if (len < 1e-5) {
        arrow.setDirection(new THREE.Vector3(0, 1, 0));
        arrow.setLength(0.001, 0.001, 0.001);
      } else {
        arrow.setDirection(vec.clone().normalize());
        arrow.setLength(Math.min(len * scale, 10), 1.0, 0.5);
      }
    }

    function setDebugMode(v) {
      debugMode = v;
      boundarySphere.visible = debugMode;
      ensureDebugArrows();
      nodes.forEach((node) => {
        node.debugArrows.repulsion.visible = debugMode;
        node.debugArrows.attraction.visible = debugMode;
        node.debugArrows.velocity.visible = debugMode;
      });
    }

    function applyHighlighting() {
      nodes.forEach((node) => {
        const active = highlightedRegion === "all" || node.region === highlightedRegion;
        node.mesh.material.opacity = active ? 1.0 : 0.2;
      });

      connections.forEach((conn) => {
        const aRegion = nodes[conn.aIndex].region;
        const bRegion = nodes[conn.bIndex].region;
        const active = highlightedRegion === "all" || (aRegion === highlightedRegion && bRegion === highlightedRegion);
        conn.mesh.material.opacity = active ? conn.baseOpacity : 0.06;
        conn.pulse.material.opacity = active ? 0.95 : 0.1;
      });
    }

    function setSelectedNode(index) {
      selectedNodeIndex = index;

      nodes.forEach((node, i) => {
        const selected = i === index;
        node.outline.visible = selected;
        node.mesh.material.emissive.setHex(selected ? 0x333333 : 0x000000);
      });

      if (index === -1) {
        nodeInfo.textContent = "Region: None | Activation: -- | Connections: --";
      } else {
        const node = nodes[index];
        nodeInfo.textContent =
          `Region: ${capitalize(node.region)} | Activation: ${node.activation.toFixed(2)} | Connections: ${connectionAdj[index].size}`;
      }
    }

    function capitalize(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function resetLayout() {
      nodes.forEach((node) => {
        node.mesh.position.copy(node.basePosition);
        node.velocity.set(0, 0, 0);
        node.repulsionForce.set(0, 0, 0);
        node.attractionForce.set(0, 0, 0);
        node.netForce.set(0, 0, 0);
      });
      connections.forEach(updateConnectionMesh);
    }

    function cycleHighlight() {
      regionCycleIndex = (regionCycleIndex + 1) % regionCycle.length;
      highlightedRegion = regionCycle[regionCycleIndex];
      applyHighlighting();
    }

    function physicsStep() {
      const repulsionK = 45;
      const springK = 0.0045;
      const restLength = 15;
      const damping = 0.95;

      nodes.forEach((node) => {
        node.repulsionForce.set(0, 0, 0);
        node.attractionForce.set(0, 0, 0);
        node.netForce.set(0, 0, 0);
      });

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const pi = nodes[i].mesh.position;
          const pj = nodes[j].mesh.position;
          const delta = new THREE.Vector3().subVectors(pi, pj);
          const distSq = Math.max(delta.lengthSq(), 1.0);
          const forceMag = repulsionK / distSq;
          const force = delta.normalize().multiplyScalar(forceMag);
          nodes[i].repulsionForce.add(force);
          nodes[j].repulsionForce.sub(force);
        }
      }

      connections.forEach((conn) => {
        const a = nodes[conn.aIndex];
        const b = nodes[conn.bIndex];
        const delta = new THREE.Vector3().subVectors(b.mesh.position, a.mesh.position);
        const dist = Math.max(delta.length(), 0.0001);
        const dir = delta.clone().divideScalar(dist);
        const forceMag = springK * conn.strength * (dist - restLength) * 20.0;
        const force = dir.multiplyScalar(forceMag);
        a.attractionForce.add(force);
        b.attractionForce.sub(force);
      });

      totalKineticEnergy = 0;
      maxVelocity = 0;

      nodes.forEach((node) => {
        node.netForce.copy(node.repulsionForce).add(node.attractionForce);
        node.velocity.add(node.netForce);
        node.velocity.multiplyScalar(damping);

        const speed = node.velocity.length();
        if (speed > 2.0) {
          node.velocity.setLength(2.0);
        }

        node.mesh.position.add(node.velocity);

        const r = node.mesh.position.length();
        if (r > boundaryRadius) {
          const normal = node.mesh.position.clone().normalize();
          node.mesh.position.copy(normal.multiplyScalar(boundaryRadius));
          const radialVel = normal.clone().multiplyScalar(node.velocity.dot(normal));
          node.velocity.sub(radialVel.multiplyScalar(1.5));
        }

        totalKineticEnergy += 0.5 * node.velocity.lengthSq();
        maxVelocity = Math.max(maxVelocity, node.velocity.length());

        if (debugMode) {
          updateArrow(node.debugArrows.repulsion, node.mesh.position, node.repulsionForce, 0.35);
          updateArrow(node.debugArrows.attraction, node.mesh.position, node.attractionForce, 1.2);
          updateArrow(node.debugArrows.velocity, node.mesh.position, node.velocity, 4.0);
        }
      });

      connections.forEach(updateConnectionMesh);
    }

    function updatePulses(elapsed) {
      connections.forEach((conn) => {
        const a = nodes[conn.aIndex].mesh.position;
        const b = nodes[conn.bIndex].mesh.position;
        const t = ((elapsed + conn.pulseTimeOffset) % 4.0);
        const lerpT = t <= 2.0 ? (t / 2.0) : (1.0 - (t - 2.0) / 2.0);
        conn.pulse.position.copy(a).lerp(b, lerpT);
      });
    }

    function updateNodePulses(elapsed) {
      nodes.forEach((node) => {
        const s = 1.0 + 0.3 * Math.sin(elapsed * node.activation * 3.0);
        node.mesh.scale.setScalar(s);
      });
    }

    function updateHUD() {
      hudLeft.textContent = `Nodes: 12 | Connections: 20 | Mode: ${physicsActive ? "Simulation" : "Paused"}`;
      hudRight.textContent = `Kinetic Energy: ${totalKineticEnergy.toFixed(2)}`;
    }

    function updateState() {
      const nodesInBounds = nodes.every((n) => n.mesh.position.length() <= boundaryRadius + 1e-6);

      window.__3D_STATE__ = {
        nodeCount: 12,
        connectionCount: 20,
        physicsActive,
        debugMode,
        totalKineticEnergy,
        selectedNodeIndex,
        highlightedRegion,
        nodePositions: nodes.map((n) => ({
          x: n.mesh.position.x,
          y: n.mesh.position.y,
          z: n.mesh.position.z
        })),
        nodeActivations: nodes.map((n) => n.activation),
        frameCount,
        maxVelocity,
        signalPulseCount: connections.length,
        nodesInBounds
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const elapsed = clock.getElapsedTime();

      controls.update();
      updateNodePulses(elapsed);

      if (physicsActive) {
        physicsStep();
      } else {
        totalKineticEnergy = nodes.reduce((sum, n) => sum + 0.5 * n.velocity.lengthSq(), 0);
        maxVelocity = nodes.reduce((m, n) => Math.max(m, n.velocity.length()), 0);
        if (debugMode) {
          nodes.forEach((node) => {
            updateArrow(node.debugArrows.repulsion, node.mesh.position, node.repulsionForce, 0.35);
            updateArrow(node.debugArrows.attraction, node.mesh.position, node.attractionForce, 1.2);
            updateArrow(node.debugArrows.velocity, node.mesh.position, node.velocity, 4.0);
          });
        }
      }

      updatePulses(elapsed);
      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    function onPointerClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodes.map(n => n.mesh), false);

      if (intersects.length > 0) {
        const index = intersects[0].object.userData.index;
        setSelectedNode(index);
      } else {
        setSelectedNode(-1);
      }
    }

    renderer.domElement.addEventListener("click", onPointerClick);

    btnPhysics.addEventListener("click", () => {
      physicsActive = !physicsActive;
    });

    btnReset.addEventListener("click", () => {
      resetLayout();
    });

    btnHighlight.addEventListener("click", () => {
      cycleHighlight();
    });

    btnDebug.addEventListener("click", () => {
      setDebugMode(!debugMode);
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "d" || e.key === "D") {
        setDebugMode(!debugMode);
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    applyHighlighting();
    setSelectedNode(-1);
    setDebugMode(false);
    resetLayout();
    updateState();
    animate();
  </script>
</body>
</html>
