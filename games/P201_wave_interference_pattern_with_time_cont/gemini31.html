<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Wave Interference</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111122;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(17, 17, 34, 0.8);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(4px);
        }
        #hud {
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        #controls {
            top: 20px;
            right: 20px;
            width: 250px;
        }
        h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 8px;
            background: #2a2a4a;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #3a3a6a;
        }
        .hud-line {
            font-size: 13px;
            margin-bottom: 4px;
            font-family: monospace;
        }
        .val-display {
            color: #88ccff;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud" class="panel">
        <h3>Simulation HUD</h3>
        <div class="hud-line">Time: <span id="hud-time" class="val-display">0.00</span></div>
        <div class="hud-line">State: <span id="hud-state" class="val-display">PLAYING</span></div>
        <div class="hud-line">Sources: <span id="hud-sources" class="val-display">BOTH</span></div>
        <div class="hud-line">Wavelength: <span id="hud-wl" class="val-display">8.0</span></div>
        <div class="hud-line">Amplitude: <span id="hud-amp" class="val-display">3.0</span></div>
        <div class="hud-line">Frequency: <span id="hud-freq" class="val-display">1.0</span></div>
        <div class="hud-line" style="margin-top: 10px; font-size: 11px; color: #aaa;">
            [Space] Play/Pause<br>
            [R] Reset<br>
            [Right Arrow] Step (Paused)
        </div>
    </div>

    <div id="controls" class="panel">
        <h3>Controls</h3>
        <div class="control-group">
            <label><span>Wavelength</span> <span id="lbl-wl" class="val-display">8.0</span></label>
            <input type="range" id="slider-wl" min="2.0" max="20.0" step="0.5" value="8.0">
        </div>
        <div class="control-group">
            <label><span>Amplitude</span> <span id="lbl-amp" class="val-display">3.0</span></label>
            <input type="range" id="slider-amp" min="0.5" max="5.0" step="0.5" value="3.0">
        </div>
        <div class="control-group">
            <label><span>Frequency</span> <span id="lbl-freq" class="val-display">1.0</span></label>
            <input type="range" id="slider-freq" min="0.2" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label><span>Speed</span> <span id="lbl-speed" class="val-display">1.0</span></label>
            <input type="range" id="slider-speed" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
        <button id="btn-toggle">Toggle Sources</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Initialize State
        window.__3D_STATE__ = {
            simTime: 0,
            playState: 'PLAYING',
            speedMultiplier: 1.0,
            wavelength: 8.0,
            amplitude: 3.0,
            frequency: 1.0,
            activeSources: 'BOTH',
            maxDisplacement: 0,
            minDisplacement: 0,
            sourceAPos: { x: -15, y: 0, z: 0 },
            sourceBPos: { x: 15, y: 0, z: 0 },
            vertexCount: 0,
            frameCount: 0
        };

        const state = window.__3D_STATE__;

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Wave Mesh
        const segments = 200;
        const size = 80;
        const geometry = new THREE.PlaneGeometry(size, size, segments, segments);
        geometry.rotateX(-Math.PI / 2);

        const posAttr = geometry.attributes.position;
        state.vertexCount = posAttr.count;
        
        const colors = new Float32Array(state.vertexCount * 3);
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.MeshStandardMaterial({
            vertexColors: true,
            side: THREE.DoubleSide,
            roughness: 0.3,
            metalness: 0.1,
            wireframe: false
        });

        const waveMesh = new THREE.Mesh(geometry, material);
        scene.add(waveMesh);

        // Source Indicators
        const sphereGeo = new THREE.SphereGeometry(0.5, 16, 16);
        
        const matA = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 1 });
        const sourceA = new THREE.Mesh(sphereGeo, matA);
        sourceA.position.set(state.sourceAPos.x, state.sourceAPos.y, state.sourceAPos.z);
        scene.add(sourceA);

        const matB = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xffff00, emissiveIntensity: 1 });
        const sourceB = new THREE.Mesh(sphereGeo, matB);
        sourceB.position.set(state.sourceBPos.x, state.sourceBPos.y, state.sourceBPos.z);
        scene.add(sourceB);

        // Physics Update Function
        function updateWaves() {
            const positions = geometry.attributes.position.array;
            const colorArr = geometry.attributes.color.array;
            
            const k = (2 * Math.PI) / state.wavelength;
            const omega = 2 * Math.PI * state.frequency;
            const t = state.simTime;
            const A = state.amplitude;

            const activeA = state.activeSources === 'BOTH' || state.activeSources === 'SOURCE_A';
            const activeB = state.activeSources === 'BOTH' || state.activeSources === 'SOURCE_B';

            const ax = state.sourceAPos.x, az = state.sourceAPos.z;
            const bx = state.sourceBPos.x, bz = state.sourceBPos.z;

            let maxD = -Infinity;
            let minD = Infinity;

            const colorScale = A * 1.5;

            for (let i = 0; i < state.vertexCount; i++) {
                const idx = i * 3;
                const x = positions[idx];
                const z = positions[idx + 2];

                let y = 0;

                if (activeA) {
                    const dx = x - ax;
                    const dz = z - az;
                    const r = Math.sqrt(dx*dx + dz*dz);
                    y += (A * Math.sin(k * r - omega * t)) / Math.max(1, Math.sqrt(r));
                }

                if (activeB) {
                    const dx = x - bx;
                    const dz = z - bz;
                    const r = Math.sqrt(dx*dx + dz*dz);
                    y += (A * Math.sin(k * r - omega * t)) / Math.max(1, Math.sqrt(r));
                }

                positions[idx + 1] = y;

                if (y > maxD) maxD = y;
                if (y < minD) minD = y;

                // Color mapping: Blue (trough) -> White (node) -> Red (peak)
                let normY = y / colorScale;
                normY = Math.max(-1, Math.min(1, normY));

                if (normY < 0) {
                    colorArr[idx] = 1 + normY;     // R
                    colorArr[idx + 1] = 1 + normY; // G
                    colorArr[idx + 2] = 1;         // B
                } else {
                    colorArr[idx] = 1;             // R
                    colorArr[idx + 1] = 1 - normY; // G
                    colorArr[idx + 2] = 1 - normY; // B
                }
            }

            state.maxDisplacement = maxD === -Infinity ? 0 : maxD;
            state.minDisplacement = minD === Infinity ? 0 : minD;

            geometry.attributes.position.needsUpdate = true;
            geometry.attributes.color.needsUpdate = true;
            geometry.computeVertexNormals();
        }

        // DOM Updates
        function updateDOM() {
            document.getElementById('hud-time').innerText = state.simTime.toFixed(2);
            document.getElementById('hud-state').innerText = state.playState;
            document.getElementById('hud-sources').innerText = state.activeSources;
            document.getElementById('hud-wl').innerText = state.wavelength.toFixed(1);
            document.getElementById('hud-amp').innerText = state.amplitude.toFixed(1);
            document.getElementById('hud-freq').innerText = state.frequency.toFixed(1);

            matA.emissiveIntensity = (state.activeSources === 'BOTH' || state.activeSources === 'SOURCE_A') ? 1 : 0.1;
            matB.emissiveIntensity = (state.activeSources === 'BOTH' || state.activeSources === 'SOURCE_B') ? 1 : 0.1;
        }

        // Event Listeners
        function setupSlider(id, stateKey, lblId) {
            const el = document.getElementById(id);
            const lbl = document.getElementById(lblId);
            el.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                state[stateKey] = val;
                lbl.innerText = val.toFixed(1);
            });
        }

        setupSlider('slider-wl', 'wavelength', 'lbl-wl');
        setupSlider('slider-amp', 'amplitude', 'lbl-amp');
        setupSlider('slider-freq', 'frequency', 'lbl-freq');
        setupSlider('slider-speed', 'speedMultiplier', 'lbl-speed');

        document.getElementById('btn-toggle').addEventListener('click', () => {
            const modes = ['BOTH', 'SOURCE_A', 'SOURCE_B'];
            const idx = modes.indexOf(state.activeSources);
            state.activeSources = modes[(idx + 1) % modes.length];
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                state.playState = state.playState === 'PLAYING' ? 'PAUSED' : 'PLAYING';
            } else if (e.code === 'KeyR') {
                state.simTime = 0;
                state.playState = 'PAUSED';
            } else if (e.code === 'ArrowRight' && state.playState === 'PAUSED') {
                state.simTime += 0.05;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = clock.getDelta();

            if (state.playState === 'PLAYING') {
                state.simTime += dt * state.speedMultiplier;
            }

            updateWaves();
            updateDOM();

            state.frameCount++;
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
