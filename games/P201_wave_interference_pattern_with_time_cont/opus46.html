<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Wave Interference Pattern</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #111122; font-family: 'Consolas', 'Monaco', monospace; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #ccddff;
    font-size: 13px;
    line-height: 1.6;
    background: rgba(10, 10, 30, 0.75);
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid rgba(100, 120, 200, 0.3);
    pointer-events: none;
    min-width: 260px;
  }
  #hud .label { color: #7788bb; }
  #hud .value { color: #eef0ff; font-weight: bold; }
  #hud .state-playing { color: #44ff88; }
  #hud .state-paused { color: #ff8844; }

  #controls {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(10, 10, 30, 0.82);
    padding: 16px 20px;
    border-radius: 8px;
    border: 1px solid rgba(100, 120, 200, 0.3);
    color: #ccddff;
    font-size: 12px;
    min-width: 220px;
  }
  #controls h3 {
    margin-bottom: 10px;
    color: #8899cc;
    font-size: 14px;
    text-align: center;
    border-bottom: 1px solid rgba(100, 120, 200, 0.2);
    padding-bottom: 6px;
  }
  .control-row {
    margin-bottom: 8px;
  }
  .control-row label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 3px;
    font-size: 11px;
  }
  .control-row label .ctrl-label { color: #8899bb; }
  .control-row label .ctrl-value { color: #eef0ff; font-weight: bold; }
  .control-row input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(80, 100, 180, 0.3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .control-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #6688cc;
    cursor: pointer;
  }
  #toggleBtn {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
    background: rgba(60, 80, 150, 0.5);
    border: 1px solid rgba(100, 120, 200, 0.4);
    color: #ccddff;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: background 0.2s;
  }
  #toggleBtn:hover { background: rgba(80, 100, 180, 0.6); }

  .key-hint {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(100, 120, 200, 0.2);
    font-size: 10px;
    color: #667799;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="hud">
  <div><span class="label">Time: </span><span class="value" id="hudTime">0.00</span></div>
  <div><span class="label">State: </span><span class="value" id="hudState">PLAYING</span></div>
  <div><span class="label">Sources: </span><span class="value" id="hudSources">BOTH</span></div>
  <div><span class="label">Wavelength: </span><span class="value" id="hudWavelength">8.0</span></div>
  <div><span class="label">Amplitude: </span><span class="value" id="hudAmplitude">3.0</span></div>
  <div><span class="label">Frequency: </span><span class="value" id="hudFrequency">1.0</span></div>
</div>

<div id="controls">
  <h3>⚙ Wave Parameters</h3>
  <div class="control-row">
    <label><span class="ctrl-label">Wavelength</span><span class="ctrl-value" id="valWavelength">8.0</span></label>
    <input type="range" id="sliderWavelength" min="2" max="20" value="8" step="0.5">
  </div>
  <div class="control-row">
    <label><span class="ctrl-label">Amplitude</span><span class="ctrl-value" id="valAmplitude">3.0</span></label>
    <input type="range" id="sliderAmplitude" min="0.5" max="5" value="3" step="0.5">
  </div>
  <div class="control-row">
    <label><span class="ctrl-label">Frequency</span><span class="ctrl-value" id="valFrequency">1.0</span></label>
    <input type="range" id="sliderFrequency" min="0.2" max="3" value="1" step="0.1">
  </div>
  <div class="control-row">
    <label><span class="ctrl-label">Speed</span><span class="ctrl-value" id="valSpeed">1.0</span></label>
    <input type="range" id="sliderSpeed" min="0.1" max="3" value="1" step="0.1">
  </div>
  <button id="toggleBtn">Toggle Sources: BOTH</button>
  <div class="key-hint">
    SPACE: Play/Pause | R: Reset<br>
    →: Step forward (when paused)<br>
    Mouse: Orbit / Zoom
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // State
  let simTime = 0;
  let playState = 'PLAYING';
  let speedMultiplier = 1.0;
  let wavelength = 8.0;
  let amplitude = 3.0;
  let frequency = 1.0;
  let activeSources = 'BOTH';
  let frameCount = 0;
  let maxDisplacement = 0;
  let minDisplacement = 0;

  const sourceAPos = { x: -15, y: 0, z: 0 };
  const sourceBPos = { x: 15, y: 0, z: 0 };

  const sourceStates = ['BOTH', 'SOURCE_A', 'SOURCE_B'];
  let sourceStateIndex = 0;

  // Expose state
  window.__3D_STATE__ = {};

  function updateGlobalState() {
    window.__3D_STATE__ = {
      simTime,
      playState,
      speedMultiplier,
      wavelength,
      amplitude,
      frequency,
      activeSources,
      maxDisplacement,
      minDisplacement,
      sourceAPos: { ...sourceAPos },
      sourceBPos: { ...sourceBPos },
      vertexCount: planeGeometry ? planeGeometry.attributes.position.count : 0,
      frameCount
    };
  }

  // Three.js setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111122);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 40, 50);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 20, 10);
  scene.add(dirLight);

  // Plane geometry
  const segments = 200;
  const planeGeometry = new THREE.PlaneBufferGeometry(80, 80, segments, segments);
  planeGeometry.rotateX(-Math.PI / 2);

  // Add vertex colors
  const vertexCount = planeGeometry.attributes.position.count;
  const colors = new Float32Array(vertexCount * 3);
  planeGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const planeMaterial = new THREE.MeshPhongMaterial({
    vertexColors: true,
    side: THREE.DoubleSide,
    shininess: 60,
    specular: new THREE.Color(0x222244),
    flatShading: false
  });

  const planeMesh = new THREE.Mesh(planeGeometry, planeMaterial);
  scene.add(planeMesh);

  // Source spheres
  const sourceAGeometry = new THREE.SphereBufferGeometry(0.5, 16, 16);
  const sourceAMaterial = new THREE.MeshPhongMaterial({
    color: 0x00ff66,
    emissive: 0x00ff66,
    emissiveIntensity: 0.8,
    transparent: true
  });
  const sourceASphere = new THREE.Mesh(sourceAGeometry, sourceAMaterial);
  sourceASphere.position.set(sourceAPos.x, 0, sourceAPos.z);
  scene.add(sourceASphere);

  const sourceBGeometry = new THREE.SphereBufferGeometry(0.5, 16, 16);
  const sourceBMaterial = new THREE.MeshPhongMaterial({
    color: 0xffff00,
    emissive: 0xffff00,
    emissiveIntensity: 0.8,
    transparent: true
  });
  const sourceBSphere = new THREE.Mesh(sourceBGeometry, sourceBMaterial);
  sourceBSphere.position.set(sourceBPos.x, 0, sourceBPos.z);
  scene.add(sourceBSphere);

  // Glow effect - point lights at sources
  const sourceALight = new THREE.PointLight(0x00ff66, 0.5, 10);
  sourceALight.position.set(sourceAPos.x, 1, sourceAPos.z);
  scene.add(sourceALight);

  const sourceBLight = new THREE.PointLight(0xffff00, 0.5, 10);
  sourceBLight.position.set(sourceBPos.x, 1, sourceBPos.z);
  scene.add(sourceBLight);

  // OrbitControls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 0, 0);

  // Wave update
  function updateWave() {
    const positions = planeGeometry.attributes.position.array;
    const colorsArr = planeGeometry.attributes.color.array;
    const k = (2 * Math.PI) / wavelength;
    const omega = 2 * Math.PI * frequency;

    let maxY = -Infinity;
    let minY = Infinity;

    const useA = activeSources === 'BOTH' || activeSources === 'SOURCE_A';
    const useB = activeSources === 'BOTH' || activeSources === 'SOURCE_B';

    for (let i = 0; i < vertexCount; i++) {
      const ix = i * 3;
      const iy = i * 3 + 1;
      const iz = i * 3 + 2;

      const vx = positions[ix];
      const vz = positions[iz];

      let y = 0;

      if (useA) {
        const dx = vx - sourceAPos.x;
        const dz = vz - sourceAPos.z;
        const rA = Math.sqrt(dx * dx + dz * dz);
        const decay = Math.max(1, Math.sqrt(rA));
        y += amplitude * Math.sin(k * rA - omega * simTime) / decay;
      }

      if (useB) {
        const dx = vx - sourceBPos.x;
        const dz = vz - sourceBPos.z;
        const rB = Math.sqrt(dx * dx + dz * dz);
        const decay = Math.max(1, Math.sqrt(rB));
        y += amplitude * Math.sin(k * rB - omega * simTime) / decay;
      }

      if (isNaN(y) || !isFinite(y)) y = 0;

      positions[iy] = y;

      if (y > maxY) maxY = y;
      if (y < minY) minY = y;
    }

    maxDisplacement = maxY === -Infinity ? 0 : maxY;
    minDisplacement = minY === Infinity ? 0 : minY;

    // Color vertices
    const range = Math.max(Math.abs(maxDisplacement), Math.abs(minDisplacement), 0.001);

    for (let i = 0; i < vertexCount; i++) {
      const iy = i * 3 + 1;
      const y = positions[iy];
      const t = y / range; // -1 to 1

      let r, g, b;
      if (t > 0) {
        // White to Red
        r = 1.0;
        g = 1.0 - t;
        b = 1.0 - t;
      } else {
        // White to Blue
        const at = -t;
        r = 1.0 - at;
        g = 1.0 - at;
        b = 1.0;
      }

      colorsArr[i * 3] = r;
      colorsArr[i * 3 + 1] = g;
      colorsArr[i * 3 + 2] = b;
    }

    planeGeometry.attributes.position.needsUpdate = true;
    planeGeometry.attributes.color.needsUpdate = true;
    planeGeometry.computeVertexNormals();
  }

  // Update source visuals
  function updateSourceVisuals() {
    const aActive = activeSources === 'BOTH' || activeSources === 'SOURCE_A';
    const bActive = activeSources === 'BOTH' || activeSources === 'SOURCE_B';

    sourceAMaterial.emissiveIntensity = aActive ? 0.8 : 0.1;
    sourceAMaterial.opacity = aActive ? 1.0 : 0.4;
    sourceALight.intensity = aActive ? 0.5 : 0.05;

    sourceBMaterial.emissiveIntensity = bActive ? 0.8 : 0.1;
    sourceBMaterial.opacity = bActive ? 1.0 : 0.4;
    sourceBLight.intensity = bActive ? 0.5 : 0.05;

    // Update source sphere Y to sit on wave surface
    sourceASphere.position.y = aActive ? 1 : 0.5;
    sourceBSphere.position.y = bActive ? 1 : 0.5;
  }

  // HUD update
  function updateHUD() {
    document.getElementById('hudTime').textContent = simTime.toFixed(2);
    const stateEl = document.getElementById('hudState');
    stateEl.textContent = playState;
    stateEl.className = playState === 'PLAYING' ? 'value state-playing' : 'value state-paused';
    document.getElementById('hudSources').textContent = activeSources;
    document.getElementById('hudWavelength').textContent = wavelength.toFixed(1);
    document.getElementById('hudAmplitude').textContent = amplitude.toFixed(1);
    document.getElementById('hudFrequency').textContent = frequency.toFixed(1);
  }

  // Controls
  const sliderWavelength = document.getElementById('sliderWavelength');
  const sliderAmplitude = document.getElementById('sliderAmplitude');
  const sliderFrequency = document.getElementById('sliderFrequency');
  const sliderSpeed = document.getElementById('sliderSpeed');
  const toggleBtn = document.getElementById('toggleBtn');

  sliderWavelength.addEventListener('input', (e) => {
    wavelength = parseFloat(e.target.value);
    document.getElementById('valWavelength').textContent = wavelength.toFixed(1);
  });

  sliderAmplitude.addEventListener('input', (e) => {
    amplitude = parseFloat(e.target.value);
    document.getElementById('valAmplitude').textContent = amplitude.toFixed(1);
  });

  sliderFrequency.addEventListener('input', (e) => {
    frequency = parseFloat(e.target.value);
    document.getElementById('valFrequency').textContent = frequency.toFixed(1);
  });

  sliderSpeed.addEventListener('input', (e) => {
    speedMultiplier = parseFloat(e.target.value);
    document.getElementById('valSpeed').textContent = speedMultiplier.toFixed(1);
  });

  toggleBtn.addEventListener('click', () => {
    sourceStateIndex = (sourceStateIndex + 1) % sourceStates.length;
    activeSources = sourceStates[sourceStateIndex];
    toggleBtn.textContent = 'Toggle Sources: ' + activeSources;
    updateSourceVisuals();
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;

    if (e.code === 'Space') {
      e.preventDefault();
      playState = playState === 'PLAYING' ? 'PAUSED' : 'PLAYING';
    } else if (e.code === 'KeyR') {
      e.preventDefault();
      simTime = 0;
      playState = 'PAUSED';
    } else if (e.code === 'ArrowRight') {
      e.preventDefault();
      if (playState === 'PAUSED') {
        simTime += 0.05;
      }
    }
  });

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation loop
  let lastTime = performance.now();

  function animate(now) {
    requestAnimationFrame(animate);

    const deltaTime = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;

    if (playState === 'PLAYING') {
      simTime += deltaTime * speedMultiplier;
    }

    updateWave();
    updateSourceVisuals();
    updateHUD();

    controls.update();
    renderer.render(scene, camera);

    frameCount++;
    updateGlobalState();
  }

  // Initial update
  updateWave();
  updateSourceVisuals();
  updateHUD();
  updateGlobalState();

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
