<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 2D Wave Interference on 3D Surface</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111122;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
      z-index: 10;
      min-width: 250px;
    }

    #controls {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 280px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #controls h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-group label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .control-group input[type="range"] {
      width: 100%;
    }

    button {
      width: 100%;
      padding: 8px 10px;
      background: #2a2a44;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #3a3a5e;
    }

    #help {
      margin-top: 10px;
      font-size: 12px;
      color: #ccccdd;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="hud"></div>

  <div id="controls">
    <h3>Wave Controls</h3>

    <div class="control-group">
      <label>
        <span>Wavelength</span>
        <span id="wavelengthValue">8.0</span>
      </label>
      <input id="wavelengthSlider" type="range" min="2.0" max="20.0" step="0.5" value="8.0">
    </div>

    <div class="control-group">
      <label>
        <span>Amplitude</span>
        <span id="amplitudeValue">3.0</span>
      </label>
      <input id="amplitudeSlider" type="range" min="0.5" max="5.0" step="0.5" value="3.0">
    </div>

    <div class="control-group">
      <label>
        <span>Frequency</span>
        <span id="frequencyValue">1.0</span>
      </label>
      <input id="frequencySlider" type="range" min="0.2" max="3.0" step="0.1" value="1.0">
    </div>

    <div class="control-group">
      <label>
        <span>Speed</span>
        <span id="speedValue">1.0</span>
      </label>
      <input id="speedSlider" type="range" min="0.1" max="3.0" step="0.1" value="1.0">
    </div>

    <button id="toggleSourcesBtn">Toggle Sources: BOTH</button>

    <div id="help">
      SPACE = Play/Pause<br>
      R = Reset to t=0 and Pause<br>
      Right Arrow = Step +0.05 when Paused
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor("#111122");
    document.body.appendChild(renderer.domElement);

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#111122");

    // Camera
    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );
    camera.position.set(0, 40, 50);
    camera.lookAt(0, 0, 0);

    // Controls
    const orbit = new OrbitControls(camera, renderer.domElement);
    orbit.target.set(0, 0, 0);
    orbit.enableDamping = true;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // Parameters / State
    const SOURCE_A_POS = new THREE.Vector3(-15, 0, 0);
    const SOURCE_B_POS = new THREE.Vector3(15, 0, 0);

    let simTime = 0;
    let playState = "PLAYING";
    let wavelength = 8.0;
    let amplitude = 3.0;
    let frequency = 1.0;
    let speedMultiplier = 1.0;
    let activeSources = "BOTH";
    let frameCount = 0;

    const hud = document.getElementById("hud");
    const wavelengthSlider = document.getElementById("wavelengthSlider");
    const amplitudeSlider = document.getElementById("amplitudeSlider");
    const frequencySlider = document.getElementById("frequencySlider");
    const speedSlider = document.getElementById("speedSlider");

    const wavelengthValue = document.getElementById("wavelengthValue");
    const amplitudeValue = document.getElementById("amplitudeValue");
    const frequencyValue = document.getElementById("frequencyValue");
    const speedValue = document.getElementById("speedValue");
    const toggleSourcesBtn = document.getElementById("toggleSourcesBtn");

    function syncUI() {
      wavelengthValue.textContent = wavelength.toFixed(1);
      amplitudeValue.textContent = amplitude.toFixed(1);
      frequencyValue.textContent = frequency.toFixed(1);
      speedValue.textContent = speedMultiplier.toFixed(1);
      toggleSourcesBtn.textContent = `Toggle Sources: ${activeSources}`;
    }

    wavelengthSlider.addEventListener("input", () => {
      wavelength = parseFloat(wavelengthSlider.value);
      syncUI();
    });

    amplitudeSlider.addEventListener("input", () => {
      amplitude = parseFloat(amplitudeSlider.value);
      syncUI();
    });

    frequencySlider.addEventListener("input", () => {
      frequency = parseFloat(frequencySlider.value);
      syncUI();
    });

    speedSlider.addEventListener("input", () => {
      speedMultiplier = parseFloat(speedSlider.value);
      syncUI();
    });

    toggleSourcesBtn.addEventListener("click", () => {
      if (activeSources === "BOTH") activeSources = "SOURCE_A";
      else if (activeSources === "SOURCE_A") activeSources = "SOURCE_B";
      else activeSources = "BOTH";
      syncUI();
      updateSourceIndicators();
    });

    // Plane mesh
    const planeSize = 80;
    const segments = 200;
    const geometry = new THREE.PlaneGeometry(planeSize, planeSize, segments, segments);
    geometry.rotateX(-Math.PI / 2); // horizontal XZ plane

    const vertexCount = geometry.attributes.position.count;
    const colors = new Float32Array(vertexCount * 3);
    geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    const material = new THREE.MeshStandardMaterial({
      side: THREE.DoubleSide,
      vertexColors: true,
      metalness: 0.05,
      roughness: 0.7
    });

    const waveMesh = new THREE.Mesh(geometry, material);
    scene.add(waveMesh);

    // Source spheres
    function makeSourceSphere(color) {
      const geom = new THREE.SphereGeometry(0.5, 24, 24);
      const mat = new THREE.MeshStandardMaterial({
        color,
        emissive: color,
        emissiveIntensity: 1.5
      });
      return new THREE.Mesh(geom, mat);
    }

    const sourceASphere = makeSourceSphere(0x00ff66);
    sourceASphere.position.copy(SOURCE_A_POS);
    scene.add(sourceASphere);

    const sourceBSphere = makeSourceSphere(0xffee33);
    sourceBSphere.position.copy(SOURCE_B_POS);
    scene.add(sourceBSphere);

    function updateSourceIndicators() {
      const aActive = activeSources === "BOTH" || activeSources === "SOURCE_A";
      const bActive = activeSources === "BOTH" || activeSources === "SOURCE_B";

      sourceASphere.material.emissiveIntensity = aActive ? 1.8 : 0.15;
      sourceASphere.material.opacity = aActive ? 1.0 : 0.5;
      sourceASphere.material.transparent = !aActive;

      sourceBSphere.material.emissiveIntensity = bActive ? 1.8 : 0.15;
      sourceBSphere.material.opacity = bActive ? 1.0 : 0.5;
      sourceBSphere.material.transparent = !bActive;
    }

    updateSourceIndicators();

    // Helpers for color mapping
    const blue = new THREE.Color(0x2255ff);
    const white = new THREE.Color(0xffffff);
    const red = new THREE.Color(0xff3344);
    const tempColor = new THREE.Color();

    function safeWaveContribution(dx, dz, amp, k, omega, t) {
      const r = Math.sqrt(dx * dx + dz * dz);
      const denom = Math.max(1, Math.sqrt(r));
      const value = amp * Math.sin(k * r - omega * t) / denom;
      return Number.isFinite(value) ? value : 0;
    }

    let minDisplacement = 0;
    let maxDisplacement = 0;

    function updateWaveSurface(t) {
      const positions = geometry.attributes.position;
      const colorAttr = geometry.attributes.color;

      const posArray = positions.array;
      const colorArray = colorAttr.array;

      const safeWavelength = Math.max(0.0001, wavelength);
      const safeFrequency = Math.max(0, frequency);
      const safeAmplitude = Math.max(0, amplitude);

      const k = (2 * Math.PI) / safeWavelength;
      const omega = 2 * Math.PI * safeFrequency;

      minDisplacement = Infinity;
      maxDisplacement = -Infinity;

      const aEnabled = activeSources === "BOTH" || activeSources === "SOURCE_A";
      const bEnabled = activeSources === "BOTH" || activeSources === "SOURCE_B";

      for (let i = 0; i < vertexCount; i++) {
        const i3 = i * 3;

        const x = posArray[i3];
        const z = posArray[i3 + 2];

        let yA = 0;
        let yB = 0;

        if (aEnabled) {
          const dxA = x - SOURCE_A_POS.x;
          const dzA = z - SOURCE_A_POS.z;
          yA = safeWaveContribution(dxA, dzA, safeAmplitude, k, omega, t);
        }

        if (bEnabled) {
          const dxB = x - SOURCE_B_POS.x;
          const dzB = z - SOURCE_B_POS.z;
          yB = safeWaveContribution(dxB, dzB, safeAmplitude, k, omega, t);
        }

        let y = yA + yB;
        if (!Number.isFinite(y)) y = 0;

        posArray[i3 + 1] = y;

        if (y < minDisplacement) minDisplacement = y;
        if (y > maxDisplacement) maxDisplacement = y;

        const colorScale = Math.max(0.0001, safeAmplitude * 2.0);
        const normalized = THREE.MathUtils.clamp(y / colorScale, -1, 1);

        if (normalized >= 0) {
          tempColor.copy(white).lerp(red, normalized);
        } else {
          tempColor.copy(white).lerp(blue, -normalized);
        }

        colorArray[i3] = tempColor.r;
        colorArray[i3 + 1] = tempColor.g;
        colorArray[i3 + 2] = tempColor.b;
      }

      positions.needsUpdate = true;
      colorAttr.needsUpdate = true;
      geometry.computeVertexNormals();

      if (!Number.isFinite(minDisplacement)) minDisplacement = 0;
      if (!Number.isFinite(maxDisplacement)) maxDisplacement = 0;
    }

    // HUD + exposed state
    window.__3D_STATE__ = {
      simTime,
      playState,
      speedMultiplier,
      wavelength,
      amplitude,
      frequency,
      activeSources,
      maxDisplacement,
      minDisplacement,
      sourceAPos: { x: SOURCE_A_POS.x, y: SOURCE_A_POS.y, z: SOURCE_A_POS.z },
      sourceBPos: { x: SOURCE_B_POS.x, y: SOURCE_B_POS.y, z: SOURCE_B_POS.z },
      vertexCount,
      frameCount
    };

    function updateHUD() {
      hud.textContent =
`Time: ${simTime.toFixed(2)}
State: ${playState}
Sources: ${activeSources}
Wavelength: ${wavelength.toFixed(1)}
Amplitude: ${amplitude.toFixed(1)}
Frequency: ${frequency.toFixed(1)}`;
    }

    function updateExposedState() {
      window.__3D_STATE__.simTime = simTime;
      window.__3D_STATE__.playState = playState;
      window.__3D_STATE__.speedMultiplier = speedMultiplier;
      window.__3D_STATE__.wavelength = wavelength;
      window.__3D_STATE__.amplitude = amplitude;
      window.__3D_STATE__.frequency = frequency;
      window.__3D_STATE__.activeSources = activeSources;
      window.__3D_STATE__.maxDisplacement = maxDisplacement;
      window.__3D_STATE__.minDisplacement = minDisplacement;
      window.__3D_STATE__.sourceAPos = { x: SOURCE_A_POS.x, y: SOURCE_A_POS.y, z: SOURCE_A_POS.z };
      window.__3D_STATE__.sourceBPos = { x: SOURCE_B_POS.x, y: SOURCE_B_POS.y, z: SOURCE_B_POS.z };
      window.__3D_STATE__.vertexCount = vertexCount;
      window.__3D_STATE__.frameCount = frameCount;
    }

    // Keyboard controls
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        playState = playState === "PLAYING" ? "PAUSED" : "PLAYING";
      } else if (e.code === "KeyR") {
        simTime = 0;
        playState = "PAUSED";
        updateWaveSurface(simTime);
      } else if (e.code === "ArrowRight") {
        if (playState === "PAUSED") {
          simTime += 0.05;
          updateWaveSurface(simTime);
        }
      }
    });

    // Initial sync
    syncUI();
    updateWaveSurface(simTime);
    updateHUD();
    updateExposedState();

    // Animation loop
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const deltaTime = clock.getDelta();

      if (playState === "PLAYING") {
        const dt = deltaTime * speedMultiplier;
        if (Number.isFinite(dt)) simTime += dt;
      }

      updateWaveSurface(simTime);
      updateSourceIndicators();
      updateHUD();
      updateExposedState();

      orbit.update();
      renderer.render(scene, camera);
    }

    animate();

    // Resize
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
