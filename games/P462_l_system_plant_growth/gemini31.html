<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D L-System Plant Growth</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: monospace;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.75);
            padding: 20px;
            border-radius: 8px;
            pointer-events: auto;
            z-index: 10;
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #333;
        }
        .stat {
            margin-bottom: 8px;
            font-size: 14px;
        }
        .stat span {
            font-weight: bold;
            color: #4CAF50;
        }
        hr {
            border: 0;
            border-top: 1px solid #444;
            margin: 15px 0;
        }
        button {
            background: #2E8B57;
            color: white;
            border: none;
            padding: 8px 12px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) {
            background: #3CB371;
        }
        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        #controls-help {
            font-size: 12px;
            margin-top: 15px;
            color: #aaa;
            line-height: 1.5;
        }
        kbd {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            color: #fff;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel">
        <div class="stat">Generation: <span id="genDisplay">0</span> / 4</div>
        <div class="stat">Segments: <span id="segmentDisplay">0</span></div>
        <div class="stat">Angle: <span id="angleDisplay">25</span>°</div>
        <div class="stat">Color Mode: <span id="colorDisplay">natural</span></div>
        <hr>
        <button id="growBtn">Grow (Next Gen)</button>
        <button id="pruneBtn">Prune (Prev Gen)</button>
        <button id="windBtn">Wind: OFF</button>
        <div id="controls-help">
            <kbd>R</kbd> Randomize Angle<br>
            <kbd>C</kbd> Toggle Color Mode<br>
            Drag to rotate camera
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            generation: 0,
            maxGeneration: 4,
            totalSegments: 0,
            leafCount: 0,
            branchAngle: 25,
            colorMode: 'natural',
            windActive: false,
            isAnimating: false,
            plantHeight: 0,
            segmentsPerGeneration: []
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 5, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 25;
        dirLight.shadow.camera.bottom = -5;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x002200, roughness: 0.9 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- L-System Logic ---
        const axiom = 'F';
        const rules = { 'F': 'FF+[+F-F-F]-[-F+F+F]' };

        function getLSystemString(gen) {
            let str = axiom;
            for (let i = 0; i < gen; i++) {
                let nextStr = '';
                for (let char of str) {
                    nextStr += rules[char] || char;
                }
                str = nextStr;
            }
            return str;
        }

        // Precompute segment counts
        for (let i = 0; i <= state.maxGeneration; i++) {
            const str = getLSystemString(i);
            state.segmentsPerGeneration.push((str.match(/F/g) || []).length);
        }

        // --- Plant Rendering ---
        const plantRoot = new THREE.Group();
        scene.add(plantRoot);

        let segments = [];
        let leaves = [];
        let animStartTime = 0;

        const sharedMaterial = new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 0.7,
            metalness: 0.1
        });

        const baseCylGeo = new THREE.CylinderGeometry(1, 1, 1, 6);
        baseCylGeo.translate(0, 0.5, 0);
        const baseSphereGeo = new THREE.SphereGeometry(0.15, 8, 8);

        function clearPlant() {
            plantRoot.children.forEach(child => {
                child.traverse(obj => {
                    if (obj.isMesh) {
                        obj.geometry.dispose();
                    }
                });
            });
            plantRoot.clear();
            segments = [];
            leaves = [];
        }

        function applyColors() {
            segments.forEach((seg, i) => {
                const mesh = seg.children[0];
                const geo = mesh.geometry;
                const color = new THREE.Color();
                
                if (state.colorMode === 'rainbow') {
                    color.setHSL(i / segments.length, 1.0, 0.5);
                } else {
                    color.setHex(seg.userData.depth >= 2 ? 0x228B22 : 0x8B4513);
                }

                const colors = geo.attributes.color.array;
                for (let v = 0; v < colors.length; v += 3) {
                    colors[v] = color.r;
                    colors[v + 1] = color.g;
                    colors[v + 2] = color.b;
                }
                geo.attributes.color.needsUpdate = true;
            });

            leaves.forEach((leaf, i) => {
                const geo = leaf.geometry;
                const color = new THREE.Color();
                
                if (state.colorMode === 'rainbow') {
                    color.setHSL(i / leaves.length, 1.0, 0.5);
                } else {
                    color.setHex(0x228B22);
                }

                const colors = geo.attributes.color.array;
                for (let v = 0; v < colors.length; v += 3) {
                    colors[v] = color.r;
                    colors[v + 1] = color.g;
                    colors[v + 2] = color.b;
                }
                geo.attributes.color.needsUpdate = true;
            });
        }

        function buildPlant() {
            clearPlant();
            const str = getLSystemString(state.generation);
            const angleRad = THREE.MathUtils.degToRad(state.branchAngle);

            let currentGroup = plantRoot;
            let currentRotZ = 0;
            let currentRotY = 0;
            let depth = 0;
            let stack = [];

            for (let i = 0; i < str.length; i++) {
                const char = str[i];

                if (char === 'F') {
                    const radius = 0.05 * Math.pow(0.8, depth);
                    const length = 1.0;

                    const geo = baseCylGeo.clone();
                    geo.scale(radius * 0.8, length, radius);

                    const colorAttr = new Float32Array(geo.attributes.position.count * 3);
                    geo.setAttribute('color', new THREE.BufferAttribute(colorAttr, 3));

                    const mesh = new THREE.Mesh(geo, sharedMaterial);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;

                    const segmentGroup = new THREE.Group();
                    segmentGroup.add(mesh);

                    segmentGroup.rotation.z = currentRotZ;
                    segmentGroup.rotation.y = currentRotY;
                    segmentGroup.userData = {
                        baseRotZ: currentRotZ,
                        depth: depth,
                        index: segments.length
                    };

                    if (currentGroup !== plantRoot) {
                        segmentGroup.position.y = 1.0;
                    }

                    currentGroup.add(segmentGroup);
                    segments.push(segmentGroup);

                    // Add leaf at terminal tips
                    if (i === str.length - 1 || str[i + 1] === ']') {
                        const leafGeo = baseSphereGeo.clone();
                        const leafColorAttr = new Float32Array(leafGeo.attributes.position.count * 3);
                        leafGeo.setAttribute('color', new THREE.BufferAttribute(leafColorAttr, 3));

                        const leafMesh = new THREE.Mesh(leafGeo, sharedMaterial);
                        leafMesh.position.y = length;
                        leafMesh.castShadow = true;
                        segmentGroup.add(leafMesh);
                        leaves.push(leafMesh);
                    }

                    currentGroup = segmentGroup;
                    currentRotZ = 0;
                    currentRotY = 0;

                } else if (char === '+') {
                    currentRotZ -= angleRad;
                } else if (char === '-') {
                    currentRotZ += angleRad;
                } else if (char === '[') {
                    stack.push({ group: currentGroup, rotZ: currentRotZ, rotY: currentRotY, depth: depth });
                    depth++;
                    currentRotY += 2.4; // ~137.5 deg for 3D spread
                } else if (char === ']') {
                    const s = stack.pop();
                    currentGroup = s.group;
                    currentRotZ = s.rotZ;
                    currentRotY = s.rotY;
                    depth = s.depth;
                }
            }

            applyColors();

            // Calculate height
            plantRoot.updateMatrixWorld(true);
            let maxY = 0;
            segments.forEach(seg => {
                const pos = new THREE.Vector3();
                seg.getWorldPosition(pos);
                if (pos.y > maxY) maxY = pos.y;
            });
            state.plantHeight = maxY || 0;
            state.totalSegments = segments.length;
            state.leafCount = leaves.length;

            // Setup animation
            segments.forEach(seg => seg.scale.set(0, 0, 0));
            animStartTime = performance.now();
            state.isAnimating = true;

            updateUI();
        }

        // --- UI & Interactions ---
        const genDisplay = document.getElementById('genDisplay');
        const segmentDisplay = document.getElementById('segmentDisplay');
        const angleDisplay = document.getElementById('angleDisplay');
        const colorDisplay = document.getElementById('colorDisplay');
        const growBtn = document.getElementById('growBtn');
        const pruneBtn = document.getElementById('pruneBtn');
        const windBtn = document.getElementById('windBtn');

        function updateUI() {
            genDisplay.innerText = state.generation;
            segmentDisplay.innerText = state.totalSegments;
            angleDisplay.innerText = Math.round(state.branchAngle);
            colorDisplay.innerText = state.colorMode;

            growBtn.disabled = state.generation >= state.maxGeneration || state.isAnimating;
            pruneBtn.disabled = state.generation <= 0 || state.isAnimating;
            windBtn.innerText = `Wind: ${state.windActive ? 'ON' : 'OFF'}`;
            windBtn.style.background = state.windActive ? '#3CB371' : '#2E8B57';
        }

        growBtn.addEventListener('click', () => {
            if (state.generation < state.maxGeneration && !state.isAnimating) {
                state.generation++;
                buildPlant();
            }
        });

        pruneBtn.addEventListener('click', () => {
            if (state.generation > 0 && !state.isAnimating) {
                state.generation--;
                buildPlant();
            }
        });

        windBtn.addEventListener('click', () => {
            state.windActive = !state.windActive;
            if (!state.windActive) {
                segments.forEach(seg => seg.rotation.z = seg.userData.baseRotZ);
            }
            updateUI();
        });

        window.addEventListener('keydown', (e) => {
            if (state.isAnimating) return;
            const key = e.key.toLowerCase();
            if (key === 'r') {
                state.branchAngle = 15 + Math.random() * 20;
                buildPlant();
            } else if (key === 'c') {
                state.colorMode = state.colorMode === 'natural' ? 'rainbow' : 'natural';
                applyColors();
                updateUI();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            if (state.isAnimating) {
                const elapsed = time - animStartTime;
                const progress = Math.min(elapsed / 2000, 1.0);
                const targetIndexFloat = progress * segments.length;

                for (let i = 0; i < segments.length; i++) {
                    if (i < Math.floor(targetIndexFloat)) {
                        segments[i].scale.set(1, 1, 1);
                    } else if (i === Math.floor(targetIndexFloat)) {
                        const s = targetIndexFloat - i;
                        segments[i].scale.set(s, s, s);
                    } else {
                        segments[i].scale.set(0, 0, 0);
                    }
                }

                if (progress >= 1.0) {
                    state.isAnimating = false;
                    updateUI();
                }
            }

            if (state.windActive) {
                const t = time * 0.002;
                segments.forEach(seg => {
                    const sway = Math.sin(t + seg.userData.depth * 0.5) * 0.087; // ~5 degrees
                    seg.rotation.z = seg.userData.baseRotZ + sway;
                });
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Init
        buildPlant();
        animate();

    </script>
</body>
</html>
