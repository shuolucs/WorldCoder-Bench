<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D L-System Plant Growth</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: monospace;
    }

    #uiPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      padding: 12px;
      border-radius: 8px;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    #uiPanel button {
      font-family: monospace;
      margin: 3px 4px 8px 0;
      padding: 8px 10px;
      background: #2d4059;
      color: white;
      border: 1px solid #4a6572;
      border-radius: 4px;
      cursor: pointer;
    }

    #uiPanel button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #uiPanel .line {
      margin: 4px 0;
    }

    #help {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="uiPanel">
    <div>
      <button id="growBtn">Grow</button>
      <button id="pruneBtn">Prune</button>
      <button id="windBtn">Wind: Off</button>
    </div>
    <div class="line">Generation: <span id="genDisplay">0</span></div>
    <div class="line">Segments: <span id="segmentDisplay">0</span></div>
    <div class="line">Angle: <span id="angleDisplay">25</span>°</div>
    <div class="line">Color: <span id="colorDisplay">natural</span></div>
    <div id="help">Keys: R = randomize angle, C = toggle color</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // ---------------- Scene Setup ----------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 4, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 10);
    scene.add(dirLight);

    const groundGeo = new THREE.PlaneGeometry(30, 30);
    const groundMat = new THREE.MeshPhongMaterial({ color: "#0b3d0b", side: THREE.DoubleSide });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // ---------------- UI ----------------
    const growBtn = document.getElementById("growBtn");
    const pruneBtn = document.getElementById("pruneBtn");
    const windBtn = document.getElementById("windBtn");
    const genDisplay = document.getElementById("genDisplay");
    const segmentDisplay = document.getElementById("segmentDisplay");
    const angleDisplay = document.getElementById("angleDisplay");
    const colorDisplay = document.getElementById("colorDisplay");

    // ---------------- State ----------------
    const MAX_GENERATION = 4;
    const AXIOM = "F";
    const RULE = "FF+[+F-F-F]-[-F+F+F]";
    const BASE_LENGTH = 1.1;
    const BASE_RADIUS = 0.05;
    const TAPER_FACTOR = 0.8;

    const state = {
      generation: 0,
      maxGeneration: MAX_GENERATION,
      totalSegments: 0,
      leafCount: 0,
      branchAngle: 25,
      colorMode: "natural",
      windActive: false,
      isAnimating: false,
      plantHeight: 0,
      segmentsPerGeneration: []
    };
    window.__3D_STATE__ = state;

    // ---------------- Plant Containers ----------------
    const plantGroup = new THREE.Group();
    scene.add(plantGroup);

    let currentVisuals = [];
    let currentLeaves = [];
    let generationStrings = [AXIOM];

    // ---------------- Helpers ----------------
    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function updateStateExposure() {
      state.generation = safeNumber(state.generation, 0);
      state.maxGeneration = safeNumber(state.maxGeneration, 4);
      state.totalSegments = safeNumber(state.totalSegments, 0);
      state.leafCount = safeNumber(state.leafCount, 0);
      state.branchAngle = safeNumber(state.branchAngle, 25);
      state.plantHeight = safeNumber(state.plantHeight, 0);
      state.segmentsPerGeneration = Array.isArray(state.segmentsPerGeneration)
        ? state.segmentsPerGeneration.map(v => safeNumber(v, 0))
        : [];
      state.colorMode = state.colorMode || "natural";
      state.windActive = !!state.windActive;
      state.isAnimating = !!state.isAnimating;
      window.__3D_STATE__ = state;
    }

    function updateHUD() {
      genDisplay.textContent = String(state.generation);
      segmentDisplay.textContent = String(state.totalSegments);
      angleDisplay.textContent = String(Math.round(state.branchAngle));
      colorDisplay.textContent = state.colorMode;
      windBtn.textContent = `Wind: ${state.windActive ? "On" : "Off"}`;

      growBtn.disabled = state.isAnimating || state.generation >= state.maxGeneration;
      pruneBtn.disabled = state.isAnimating || state.generation <= 0;

      updateStateExposure();
    }

    function expandLSystem(prev) {
      return prev.split("").map(ch => (ch === "F" ? RULE : ch)).join("");
    }

    function ensureGenerationString(gen) {
      for (let i = generationStrings.length; i <= gen; i++) {
        generationStrings[i] = expandLSystem(generationStrings[i - 1]);
      }
      return generationStrings[gen];
    }

    function countSegmentsInString(str) {
      let c = 0;
      for (let i = 0; i < str.length; i++) {
        if (str[i] === "F") c++;
      }
      return c;
    }

    function computeSegmentsPerGenerationUpTo(maxGen) {
      const arr = [];
      for (let i = 0; i <= maxGen; i++) {
        const s = ensureGenerationString(i);
        arr.push(countSegmentsInString(s));
      }
      state.segmentsPerGeneration = arr;
    }

    function clearPlant() {
      while (plantGroup.children.length > 0) {
        const obj = plantGroup.children.pop();
        if (obj.geometry) obj.geometry.dispose?.();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose?.());
          else obj.material.dispose?.();
        }
      }
      currentVisuals = [];
      currentLeaves = [];
    }

    function makeMaterial(color) {
      return new THREE.MeshPhongMaterial({
        color,
        transparent: true,
        opacity: 1
      });
    }

    function getSegmentColor(index, depth) {
      if (state.colorMode === "rainbow") {
        const hue = (index * 0.61803398875 * 360) % 360;
        return new THREE.Color(`hsl(${hue}, 85%, 55%)`);
      }
      return new THREE.Color(depth >= 2 ? "#228B22" : "#8B4513");
    }

    function findLeafTipIndices(str) {
      const tips = new Set();
      for (let i = 0; i < str.length; i++) {
        if (str[i] !== "F") continue;

        let isTip = true;
        for (let j = i + 1; j < str.length; j++) {
          const ch = str[j];
          if (ch === "F") {
            isTip = false;
            break;
          }
          if (ch === "]") {
            break;
          }
        }
        if (isTip) tips.add(i);
      }
      return tips;
    }

    function buildPlantData(gen) {
      const str = ensureGenerationString(gen);
      const angleRad = THREE.MathUtils.degToRad(state.branchAngle);
      const stack = [];

      const pos = new THREE.Vector3(0, 0, 0);
      const quat = new THREE.Quaternion();
      quat.setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        new THREE.Vector3(0, 1, 0)
      );

      const segments = [];
      let maxY = 0;
      let currentDepth = 0;
      let segmentIndex = 0;
      const leafTips = findLeafTipIndices(str);

      for (let i = 0; i < str.length; i++) {
        const ch = str[i];

        if (ch === "F") {
          const radius = BASE_RADIUS * Math.pow(TAPER_FACTOR, currentDepth);
          const dir = new THREE.Vector3(0, BASE_LENGTH, 0).applyQuaternion(quat);
          const start = pos.clone();
          const end = pos.clone().add(dir);
          const center = start.clone().add(end).multiplyScalar(0.5);

          maxY = Math.max(maxY, start.y, end.y);

          segments.push({
            index: segmentIndex,
            depth: currentDepth,
            start,
            end,
            center,
            quat: quat.clone(),
            radius,
            length: BASE_LENGTH,
            color: getSegmentColor(segmentIndex, currentDepth),
            addLeaf: leafTips.has(i)
          });

          pos.copy(end);
          segmentIndex++;
        } else if (ch === "+") {
          const q = new THREE.Quaternion().setFromAxisAngle(
            new THREE.Vector3(0, 0, 1),
            -angleRad
          );
          quat.multiply(q);
        } else if (ch === "-") {
          const q = new THREE.Quaternion().setFromAxisAngle(
            new THREE.Vector3(0, 0, 1),
            angleRad
          );
          quat.multiply(q);
        } else if (ch === "[") {
          stack.push({
            pos: pos.clone(),
            quat: quat.clone(),
            depth: currentDepth
          });
          currentDepth++;
        } else if (ch === "]") {
          const popped = stack.pop();
          if (popped) {
            pos.copy(popped.pos);
            quat.copy(popped.quat);
            currentDepth = Math.max(0, popped.depth);
          }
        }
      }

      return {
        segments,
        plantHeight: safeNumber(maxY, 0)
      };
    }

    function instantiatePlantVisuals(segmentsData) {
      clearPlant();

      const cylinderGeoCache = new Map();
      const sphereGeo = new THREE.SphereGeometry(0.15, 12, 12);

      segmentsData.forEach((seg, idx) => {
        const key = `${seg.radius.toFixed(4)}_${seg.length.toFixed(4)}`;
        let geo = cylinderGeoCache.get(key);
        if (!geo) {
          geo = new THREE.CylinderGeometry(seg.radius * 0.8, seg.radius, seg.length, 8, 1);
          cylinderGeoCache.set(key, geo);
        }

        const mat = makeMaterial(seg.color);
        mat.opacity = 0;

        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(seg.center);
        mesh.quaternion.copy(seg.quat);
        mesh.userData.baseQuaternion = seg.quat.clone();
        mesh.userData.depth = seg.depth;
        mesh.userData.index = idx;
        plantGroup.add(mesh);

        currentVisuals.push(mesh);

        if (seg.addLeaf) {
          const leafMat = makeMaterial(state.colorMode === "rainbow" ? getSegmentColor(idx + 999, 3) : new THREE.Color("#228B22"));
          leafMat.opacity = 0;
          const leaf = new THREE.Mesh(sphereGeo, leafMat);
          leaf.position.copy(seg.end);
          leaf.userData.basePosition = seg.end.clone();
          leaf.userData.baseQuaternion = seg.quat.clone();
          leaf.userData.depth = seg.depth + 1;
          leaf.userData.parentIndex = idx;
          plantGroup.add(leaf);
          currentLeaves.push(leaf);
        }
      });

      state.totalSegments = currentVisuals.length;
      state.leafCount = currentLeaves.length;
      state.plantHeight = safeNumber(buildPlantData(state.generation).plantHeight, 0);
      updateHUD();
    }

    function setAllVisibleImmediate() {
      currentVisuals.forEach(m => (m.material.opacity = 1));
      currentLeaves.forEach(l => (l.material.opacity = 1));
    }

    function animateSequentialAppearance(duration = 2000) {
      return new Promise(resolve => {
        state.isAnimating = true;
        updateHUD();

        const items = [
          ...currentVisuals.map(m => ({ obj: m, type: "segment" })),
          ...currentLeaves.map(l => ({ obj: l, type: "leaf" }))
        ];

        const segCount = Math.max(currentVisuals.length, 1);
        const startTime = performance.now();

        function step(now) {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);

          currentVisuals.forEach((mesh, i) => {
            const localStart = i / segCount;
            const localEnd = Math.min(localStart + 0.08, 1);
            let alpha = 0;
            if (progress >= localStart) {
              alpha = THREE.MathUtils.clamp((progress - localStart) / (localEnd - localStart + 1e-6), 0, 1);
            }
            mesh.material.opacity = alpha;
          });

          currentLeaves.forEach((leaf, i) => {
            const parentIndex = safeNumber(leaf.userData.parentIndex, i);
            const localStart = parentIndex / segCount + 0.04;
            const localEnd = Math.min(localStart + 0.08, 1);
            let alpha = 0;
            if (progress >= localStart) {
              alpha = THREE.MathUtils.clamp((progress - localStart) / (localEnd - localStart + 1e-6), 0, 1);
            }
            leaf.material.opacity = alpha;
          });

          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            setAllVisibleImmediate();
            state.isAnimating = false;
            updateHUD();
            resolve();
          }
        }

        requestAnimationFrame(step);
      });
    }

    async function rebuildCurrentGeneration(animated = false) {
      const data = buildPlantData(state.generation);
      instantiatePlantVisuals(data.segments);
      state.plantHeight = safeNumber(data.plantHeight, 0);
      updateHUD();

      if (animated) {
        await animateSequentialAppearance(2000);
      } else {
        setAllVisibleImmediate();
      }
    }

    // ---------------- Actions ----------------
    async function grow() {
      if (state.isAnimating || state.generation >= state.maxGeneration) return;
      state.generation++;
      ensureGenerationString(state.generation);
      computeSegmentsPerGenerationUpTo(state.maxGeneration);
      await rebuildCurrentGeneration(true);
    }

    async function prune() {
      if (state.isAnimating || state.generation <= 0) return;
      state.isAnimating = true;
      updateHUD();

      // Quick fade out current plant before stepping back
      const fadeStart = performance.now();
      const fadeDuration = 350;

      await new Promise(resolve => {
        function step(now) {
          const t = Math.min((now - fadeStart) / fadeDuration, 1);
          const opacity = 1 - t;
          currentVisuals.forEach(m => m.material.opacity = opacity);
          currentLeaves.forEach(l => l.material.opacity = opacity);
          if (t < 1) requestAnimationFrame(step);
          else resolve();
        }
        requestAnimationFrame(step);
      });

      state.generation--;
      ensureGenerationString(state.generation);
      computeSegmentsPerGenerationUpTo(state.maxGeneration);
      state.isAnimating = false;
      await rebuildCurrentGeneration(false);
    }

    async function randomizeAngle() {
      if (state.isAnimating) return;
      state.branchAngle = safeNumber(15 + Math.random() * 20, 25);
      await rebuildCurrentGeneration(false);
    }

    async function toggleColorMode() {
      if (state.isAnimating) return;
      state.colorMode = state.colorMode === "natural" ? "rainbow" : "natural";
      await rebuildCurrentGeneration(false);
    }

    function toggleWind() {
      state.windActive = !state.windActive;
      updateHUD();
    }

    // ---------------- Events ----------------
    growBtn.addEventListener("click", grow);
    pruneBtn.addEventListener("click", prune);
    windBtn.addEventListener("click", toggleWind);

    window.addEventListener("keydown", async (e) => {
      const key = e.key.toLowerCase();
      if (key === "r") {
        await randomizeAngle();
      } else if (key === "c") {
        await toggleColorMode();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ---------------- Init ----------------
    computeSegmentsPerGenerationUpTo(MAX_GENERATION);
    rebuildCurrentGeneration(false);

    // ---------------- Animation Loop ----------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      if (state.windActive) {
        currentVisuals.forEach((mesh, i) => {
          const depth = safeNumber(mesh.userData.depth, 0);
          const influence = THREE.MathUtils.clamp(depth / 4, 0.1, 1.0);
          const sway = Math.sin(t * 1.5 + i * 0.25) * THREE.MathUtils.degToRad(5) * influence;
          const qSway = new THREE.Quaternion().setFromAxisAngle(
            new THREE.Vector3(1, 0, 0),
            sway
          );
          mesh.quaternion.copy(mesh.userData.baseQuaternion).multiply(qSway);
        });

        currentLeaves.forEach((leaf, i) => {
          const depth = safeNumber(leaf.userData.depth, 1);
          const influence = THREE.MathUtils.clamp(depth / 4, 0.15, 1.0);
          const offset = Math.sin(t * 1.8 + i * 0.4) * 0.06 * influence;
          leaf.position.copy(leaf.userData.basePosition);
          leaf.position.x += offset;
          leaf.position.z += offset * 0.4;
        });
      } else {
        currentVisuals.forEach(mesh => {
          mesh.quaternion.copy(mesh.userData.baseQuaternion);
        });
        currentLeaves.forEach(leaf => {
          leaf.position.copy(leaf.userData.basePosition);
        });
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
