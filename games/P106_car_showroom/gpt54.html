<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 汽车展厅</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      min-width: 200px;
      line-height: 1.8;
    }

    #panel {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.92);
      color: #111;
      padding: 16px;
      border-radius: 12px;
      width: 260px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    #panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .row {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
    }

    #hueSlider {
      width: 100%;
    }

    #autoRotateBtn {
      width: 100%;
      border: none;
      background: #1f6feb;
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    #autoRotateBtn:hover {
      background: #1558c0;
    }

    #tip {
      font-size: 12px;
      color: #444;
      margin-top: 10px;
      line-height: 1.5;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>选中车辆：<span id="selectedDisplay">none</span></div>
      <div>当前色相值：<span id="hueValue">0</span></div>
      <div>旋转状态：<span id="rotateStatus">关闭</span></div>
    </div>

    <div id="panel">
      <h2>车辆控制面板</h2>
      <div class="row">
        <span class="label">当前车辆：<strong id="carName">未选择</strong></span>
      </div>
      <div class="row">
        <label class="label" for="hueSlider">色相调整</label>
        <input id="hueSlider" type="range" min="0" max="360" value="0" />
      </div>
      <div class="row">
        <button id="autoRotateBtn">自动旋转：关闭</button>
      </div>
      <div id="tip">
        点击车辆进行选择；点击空白处取消选择。<br />
        选中后可调整颜色并切换自动旋转。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    window.__3D_STATE__ = {
      modelLoaded: false,
      selectedCar: 'none',
      hueValue: 0,
      autoRotate: false,
      ferrariPosition: { x: 0, y: 0, z: 0 },
      toycarPosition: { x: 0, y: 0, z: 0 },
      cameraDistance: 0
    };

    const app = document.getElementById('app');
    const selectedDisplay = document.getElementById('selectedDisplay');
    const hueValueDisplay = document.getElementById('hueValue');
    const rotateStatus = document.getElementById('rotateStatus');
    const carName = document.getElementById('carName');
    const hueSlider = document.getElementById('hueSlider');
    const autoRotateBtn = document.getElementById('autoRotateBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    scene.environment = null;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    app.appendChild(renderer.domElement);

    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    const envScene = new THREE.Scene();
    envScene.background = new THREE.Color(0x202020);
    envScene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const envDir = new THREE.DirectionalLight(0xffffff, 1.2);
    envDir.position.set(5, 10, 7);
    envScene.add(envDir);
    const envRT = pmremGenerator.fromScene(envScene, 0.04);
    scene.environment = envRT.texture;

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 10);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(6, 10, 8);
    scene.add(directionalLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({
        color: 0x333333,
        roughness: 0.75,
        metalness: 0.1
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    function createPedestal(x, z) {
      const pedestal = new THREE.Mesh(
        new THREE.CylinderGeometry(2, 2, 0.3, 48),
        new THREE.MeshStandardMaterial({
          color: 0xeeeeee,
          roughness: 0.35,
          metalness: 0.25,
          envMapIntensity: 0.7
        })
      );
      pedestal.position.set(x, 0.15, z);
      scene.add(pedestal);
      return pedestal;
    }

    createPedestal(-4, 0);
    createPedestal(4, 0);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();
    const loader = new GLTFLoader();

    let ferrariRoot = null;
    let toycarRoot = null;
    let loadedCount = 0;

    let selectedKey = 'none';
    let autoRotate = false;
    let currentHue = 0;

    const carEntries = {
      ferrari: {
        root: null,
        label: 'Ferrari',
        spotlight: null,
        hue: 0,
        materials: []
      },
      toycar: {
        root: null,
        label: 'ToyCar',
        spotlight: null,
        hue: 0,
        materials: []
      }
    };

    function createSelectionSpotlight(x, z) {
      const spot = new THREE.SpotLight(0xffffff, 0, 20, Math.PI / 6, 0.35, 1.2);
      spot.position.set(x, 6, z + 0.5);
      const target = new THREE.Object3D();
      target.position.set(x, 1, z);
      scene.add(target);
      spot.target = target;
      scene.add(spot);
      return spot;
    }

    carEntries.ferrari.spotlight = createSelectionSpotlight(-4, 0);
    carEntries.toycar.spotlight = createSelectionSpotlight(4, 0);

    function cacheMaterials(root, key) {
      const mats = [];
      root.traverse((obj) => {
        if (obj.isMesh && obj.material) {
          const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
          for (const mat of materials) {
            if (mat && mat.isMeshStandardMaterial) {
              if (!mat.userData.__baseHSL) {
                const hsl = { h: 0, s: 0, l: 0 };
                mat.color.getHSL(hsl);
                mat.userData.__baseHSL = { h: hsl.h, s: hsl.s, l: hsl.l };
              }
              mats.push(mat);
              mat.envMapIntensity = 0.8;
            }
          }
        }
      });
      carEntries[key].materials = mats;
    }

    function applyHueToCar(key, hueDeg) {
      const entry = carEntries[key];
      if (!entry.root) return;

      entry.hue = hueDeg;
      const normalizedH = ((hueDeg % 360) + 360) % 360 / 360;

      entry.materials.forEach((mat) => {
        if (!mat.userData.__baseHSL) return;
        const base = mat.userData.__baseHSL;
        mat.color.setHSL(normalizedH, Math.max(base.s, 0.35), base.l);
        mat.needsUpdate = true;
      });
    }

    function updateUI() {
      selectedDisplay.textContent = selectedKey;
      hueValueDisplay.textContent = currentHue;
      rotateStatus.textContent = autoRotate ? '开启' : '关闭';

      if (selectedKey === 'none') {
        carName.textContent = '未选择';
        hueSlider.value = 0;
      } else {
        carName.textContent = carEntries[selectedKey].label;
        hueSlider.value = carEntries[selectedKey].hue;
      }

      autoRotateBtn.textContent = `自动旋转：${autoRotate ? '开启' : '关闭'}`;
    }

    function updateSelectionLights() {
      carEntries.ferrari.spotlight.intensity = selectedKey === 'ferrari' ? 3.5 : 0;
      carEntries.toycar.spotlight.intensity = selectedKey === 'toycar' ? 3.5 : 0;
    }

    function selectCar(key) {
      selectedKey = key;
      if (selectedKey === 'none') {
        autoRotate = false;
        currentHue = 0;
      } else {
        currentHue = carEntries[selectedKey].hue;
      }
      updateSelectionLights();
      updateUI();
    }

    function fitModel(root, desiredWidth, desiredHeight) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);

      const scaleX = desiredWidth / Math.max(size.x, 0.001);
      const scaleY = desiredHeight / Math.max(size.y, 0.001);
      const scaleZ = desiredWidth / Math.max(size.z, 0.001);
      const scale = Math.min(scaleX, scaleY, scaleZ);

      root.scale.setScalar(scale);

      const newBox = new THREE.Box3().setFromObject(root);
      const center = new THREE.Vector3();
      const newSize = new THREE.Vector3();
      newBox.getCenter(center);
      newBox.getSize(newSize);

      root.position.x -= center.x;
      root.position.z -= center.z;

      const alignedBox = new THREE.Box3().setFromObject(root);
      root.position.y -= alignedBox.min.y;
    }

    function setupCar(root, key, platformPos) {
      fitModel(root, 2.6, 1.8);
      root.position.x += platformPos.x;
      root.position.y += 0.3;
      root.position.z += platformPos.z;

      scene.add(root);
      cacheMaterials(root, key);
      carEntries[key].root = root;
      root.userData.carKey = key;
    }

    function onLoaded() {
      loadedCount++;
      if (loadedCount === 2) {
        window.__3D_STATE__.modelLoaded = true;
      }
    }

    loader.load(
      'assets/ferrari.glb',
      (gltf) => {
        ferrariRoot = gltf.scene;
        setupCar(ferrariRoot, 'ferrari', new THREE.Vector3(-4, 0, 0));
        onLoaded();
      },
      undefined,
      (err) => {
        console.error('Ferrari 模型加载失败:', err);
      }
    );

    loader.load(
      'assets/ToyCar.glb',
      (gltf) => {
        toycarRoot = gltf.scene;
        setupCar(toycarRoot, 'toycar', new THREE.Vector3(4, 0, 0));
        onLoaded();
      },
      undefined,
      (err) => {
        console.error('ToyCar 模型加载失败:', err);
      }
    );

    function getRootCarObject(obj) {
      let current = obj;
      while (current) {
        if (current.userData && current.userData.carKey) return current;
        current = current.parent;
      }
      return null;
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const targets = [];
      if (carEntries.ferrari.root) targets.push(carEntries.ferrari.root);
      if (carEntries.toycar.root) targets.push(carEntries.toycar.root);

      const intersects = raycaster.intersectObjects(targets, true);

      if (intersects.length > 0) {
        const carObj = getRootCarObject(intersects[0].object);
        if (carObj) {
          selectCar(carObj.userData.carKey);
          return;
        }
      }

      selectCar('none');
    });

    hueSlider.addEventListener('input', (e) => {
      const value = Number(e.target.value);
      currentHue = value;
      if (selectedKey !== 'none') {
        applyHueToCar(selectedKey, value);
      }
      updateUI();
    });

    autoRotateBtn.addEventListener('click', () => {
      if (selectedKey === 'none') {
        autoRotate = false;
      } else {
        autoRotate = !autoRotate;
      }
      updateUI();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateUI();
    updateSelectionLights();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (autoRotate && selectedKey !== 'none' && carEntries[selectedKey].root) {
        carEntries[selectedKey].root.rotation.y += THREE.MathUtils.degToRad(45) * delta;
      }

      controls.update();

      window.__3D_STATE__.modelLoaded = loadedCount === 2;
      window.__3D_STATE__.selectedCar = selectedKey;
      window.__3D_STATE__.hueValue = currentHue;
      window.__3D_STATE__.autoRotate = autoRotate;

      const fp = carEntries.ferrari.root ? carEntries.ferrari.root.position : new THREE.Vector3();
      const tp = carEntries.toycar.root ? carEntries.toycar.root.position : new THREE.Vector3();

      window.__3D_STATE__.ferrariPosition = { x: fp.x, y: fp.y, z: fp.z };
      window.__3D_STATE__.toycarPosition = { x: tp.x, y: tp.y, z: tp.z };
      window.__3D_STATE__.cameraDistance = camera.position.length();

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
