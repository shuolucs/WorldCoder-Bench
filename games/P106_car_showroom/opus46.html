<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 汽车展厅</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #hud {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(10px);
    color: #fff;
    padding: 20px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 2;
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 220px;
    z-index: 10;
  }
  #hud .label {
    color: #888;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #hud .value {
    color: #4fc3f7;
    font-weight: bold;
  }

  #panel {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(10px);
    color: #fff;
    padding: 24px;
    border-radius: 12px;
    width: 280px;
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
  }
  #panel h2 {
    margin-bottom: 8px;
    font-size: 18px;
    color: #4fc3f7;
  }
  #panel .car-name {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 20px;
    min-height: 32px;
    color: #fff;
  }
  #panel label {
    display: block;
    margin-bottom: 6px;
    color: #aaa;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #panel input[type="range"] {
    width: 100%;
    margin-bottom: 20px;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, 
      hsl(0,100%,50%), hsl(60,100%,50%), hsl(120,100%,50%), 
      hsl(180,100%,50%), hsl(240,100%,50%), hsl(300,100%,50%), hsl(360,100%,50%));
    outline: none;
  }
  #panel input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,0,0,0.5);
  }
  #autoRotateBtn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #1a237e, #4fc3f7);
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  #autoRotateBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(79, 195, 247, 0.4);
  }
  #autoRotateBtn.active {
    background: linear-gradient(135deg, #e65100, #ff9800);
  }

  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    z-index: 10;
    pointer-events: none;
  }

  #loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.5s;
  }
  #loading .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #4fc3f7;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  #loading p {
    color: #fff;
    margin-top: 20px;
    font-size: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>加载展厅中...</p>
</div>

<div id="hud">
  <div><span class="label">选中车辆：</span><span class="value" id="selectedDisplay">无</span></div>
  <div><span class="label">当前色相：</span><span class="value" id="hueValue">0</span>°</div>
  <div><span class="label">旋转状态：</span><span class="value" id="rotateStatus">停止</span></div>
</div>

<div id="panel">
  <h2>🚗 车辆控制</h2>
  <div class="car-name" id="carName">请点击选择车辆</div>
  <label for="hueSlider">色相调整</label>
  <input type="range" id="hueSlider" min="0" max="360" value="0">
  <button id="autoRotateBtn">🔄 自动旋转</button>
</div>

<div class="hint">点击车辆选择 · 拖拽旋转视角 · 滚轮缩放</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
window.__3D_STATE__ = {
  modelLoaded: false,
  selectedCar: "none",
  hueValue: 0,
  autoRotate: false,
  ferrariPosition: { x: 0, y: 0, z: 0 },
  toycarPosition: { x: 0, y: 0, z: 0 },
  cameraDistance: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.035);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 3;
controls.maxDistance = 25;
controls.maxPolarAngle = Math.PI / 2 - 0.05;
controls.target.set(0, 1, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.set(2048, 2048);
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -15;
directionalLight.shadow.camera.right = 15;
directionalLight.shadow.camera.top = 15;
directionalLight.shadow.camera.bottom = -15;
scene.add(directionalLight);

// Subtle fill lights
const fillLight1 = new THREE.PointLight(0x4fc3f7, 0.3, 20);
fillLight1.position.set(-8, 5, -5);
scene.add(fillLight1);

const fillLight2 = new THREE.PointLight(0xff9800, 0.2, 20);
fillLight2.position.set(8, 5, -5);
scene.add(fillLight2);

// Environment reflection (simple)
const envScene = new THREE.Scene();
envScene.background = new THREE.Color(0x2a2a3e);

// Ground
const groundGeom = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x333333,
  roughness: 0.8,
  metalness: 0.2
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper for visual effect
const gridHelper = new THREE.GridHelper(20, 40, 0x444444, 0x222222);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Platforms
function createPlatform(x) {
  const group = new THREE.Group();
  
  const platformGeom = new THREE.CylinderGeometry(2, 2, 0.3, 64);
  const platformMat = new THREE.MeshStandardMaterial({
    color: 0xeeeeee,
    roughness: 0.3,
    metalness: 0.5
  });
  const platform = new THREE.Mesh(platformGeom, platformMat);
  platform.castShadow = true;
  platform.receiveShadow = true;
  group.add(platform);

  // Rim glow ring
  const ringGeom = new THREE.TorusGeometry(2, 0.02, 8, 64);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x4fc3f7 });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.15;
  group.add(ring);

  group.position.set(x, 0.15, 0);
  return group;
}

const leftPlatform = createPlatform(-4);
const rightPlatform = createPlatform(4);
scene.add(leftPlatform);
scene.add(rightPlatform);

// Spotlights for selected cars
const ferrariSpotlight = new THREE.SpotLight(0xffffff, 0, 15, Math.PI / 6, 0.5, 1);
ferrariSpotlight.position.set(-4, 8, 0);
ferrariSpotlight.target.position.set(-4, 0, 0);
ferrariSpotlight.castShadow = true;
scene.add(ferrariSpotlight);
scene.add(ferrariSpotlight.target);

const toycarSpotlight = new THREE.SpotLight(0xffffff, 0, 15, Math.PI / 6, 0.5, 1);
toycarSpotlight.position.set(4, 8, 0);
toycarSpotlight.target.position.set(4, 0, 0);
toycarSpotlight.castShadow = true;
scene.add(toycarSpotlight);
scene.add(toycarSpotlight.target);

// Wall panels for showroom feel
function createWall(x, z, rotY, width) {
  const wallGeom = new THREE.PlaneGeometry(width || 20, 6);
  const wallMat = new THREE.MeshStandardMaterial({
    color: 0x222233,
    roughness: 0.9,
    metalness: 0.1,
    side: THREE.DoubleSide
  });
  const wall = new THREE.Mesh(wallGeom, wallMat);
  wall.position.set(x, 3, z);
  wall.rotation.y = rotY;
  wall.receiveShadow = true;
  return wall;
}

scene.add(createWall(0, -10, 0, 20));
scene.add(createWall(-10, 0, Math.PI / 2, 20));
scene.add(createWall(10, 0, Math.PI / 2, 20));

// Car loading
const loader = new GLTFLoader();
let ferrariModel = null;
let toycarModel = null;
let ferrariGroup = new THREE.Group();
let toycarGroup = new THREE.Group();
ferrariGroup.position.set(-4, 0.3, 0);
toycarGroup.position.set(4, 0.3, 0);
scene.add(ferrariGroup);
scene.add(toycarGroup);

// Store original materials for color adjustment
let ferrariMaterials = [];
let toycarMaterials = [];
let ferrariOriginalColors = [];
let toycarOriginalColors = [];

let loadedCount = 0;

function onModelLoaded() {
  loadedCount++;
  if (loadedCount === 2) {
    window.__3D_STATE__.modelLoaded = true;
    const loadingEl = document.getElementById('loading');
    loadingEl.style.opacity = '0';
    setTimeout(() => loadingEl.style.display = 'none', 500);
  }
}

function collectMaterials(model) {
  const materials = [];
  const originalColors = [];
  model.traverse((child) => {
    if (child.isMesh && child.material) {
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach((mat) => {
        if (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial) {
          if (!materials.includes(mat)) {
            materials.push(mat);
            originalColors.push(mat.color.clone());
          }
        }
      });
    }
  });
  return { materials, originalColors };
}

// Load Ferrari
loader.load('assets/ferrari.glb', (gltf) => {
  ferrariModel = gltf.scene;
  
  // Compute bounding box to scale appropriately
  const box = new THREE.Box3().setFromObject(ferrariModel);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 3 / maxDim;
  ferrariModel.scale.setScalar(scale);
  
  // Center the model
  const boxScaled = new THREE.Box3().setFromObject(ferrariModel);
  const center = boxScaled.getCenter(new THREE.Vector3());
  ferrariModel.position.sub(center);
  ferrariModel.position.y = -boxScaled.min.y;
  
  ferrariModel.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  
  ferrariGroup.add(ferrariModel);
  
  const collected = collectMaterials(ferrariModel);
  ferrariMaterials = collected.materials;
  ferrariOriginalColors = collected.originalColors;
  
  onModelLoaded();
}, undefined, (error) => {
  console.error('Error loading ferrari:', error);
  onModelLoaded();
});

// Load ToyCar
loader.load('assets/ToyCar.glb', (gltf) => {
  toycarModel = gltf.scene;
  
  const box = new THREE.Box3().setFromObject(toycarModel);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 3 / maxDim;
  toycarModel.scale.setScalar(scale);
  
  const boxScaled = new THREE.Box3().setFromObject(toycarModel);
  const center = boxScaled.getCenter(new THREE.Vector3());
  toycarModel.position.sub(center);
  toycarModel.position.y = -boxScaled.min.y;
  
  toycarModel.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  
  toycarGroup.add(toycarModel);
  
  const collected = collectMaterials(toycarModel);
  toycarMaterials = collected.materials;
  toycarOriginalColors = collected.originalColors;
  
  onModelLoaded();
}, undefined, (error) => {
  console.error('Error loading toycar:', error);
  onModelLoaded();
});

// Raycaster for selection
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedCar = "none";
let autoRotating = false;

function selectCar(carName) {
  selectedCar = carName;
  window.__3D_STATE__.selectedCar = carName;
  
  if (carName === "ferrari") {
    ferrariSpotlight.intensity = 50;
    toycarSpotlight.intensity = 2;
    document.getElementById('carName').textContent = 'Ferrari';
    document.getElementById('selectedDisplay').textContent = 'Ferrari';
  } else if (carName === "toycar") {
    ferrariSpotlight.intensity = 2;
    toycarSpotlight.intensity = 50;
    document.getElementById('carName').textContent = 'Toy Car';
    document.getElementById('selectedDisplay').textContent = 'Toy Car';
  } else {
    ferrariSpotlight.intensity = 0;
    toycarSpotlight.intensity = 0;
    document.getElementById('carName').textContent = '请点击选择车辆';
    document.getElementById('selectedDisplay').textContent = '无';
  }
}

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  // Check ferrari
  let hitFerrari = false;
  let hitToycar = false;
  
  if (ferrariModel) {
    const intersects = raycaster.intersectObject(ferrariGroup, true);
    if (intersects.length > 0) hitFerrari = true;
  }
  
  if (toycarModel) {
    const intersects = raycaster.intersectObject(toycarGroup, true);
    if (intersects.length > 0) hitToycar = true;
  }
  
  if (hitFerrari) {
    selectCar("ferrari");
  } else if (hitToycar) {
    selectCar("toycar");
  } else {
    selectCar("none");
  }
});

// Hue slider
const hueSlider = document.getElementById('hueSlider');
hueSlider.addEventListener('input', () => {
  const hue = parseInt(hueSlider.value);
  window.__3D_STATE__.hueValue = hue;
  document.getElementById('hueValue').textContent = hue;
  
  if (selectedCar === "ferrari") {
    applyHue(ferrariMaterials, ferrariOriginalColors, hue);
  } else if (selectedCar === "toycar") {
    applyHue(toycarMaterials, toycarOriginalColors, hue);
  }
});

function applyHue(materials, originalColors, hue) {
  const hueShift = hue / 360;
  materials.forEach((mat, i) => {
    const origHSL = {};
    originalColors[i].getHSL(origHSL);
    mat.color.setHSL(hueShift, origHSL.s, origHSL.l);
    mat.needsUpdate = true;
  });
}

// Auto rotate button
const autoRotateBtn = document.getElementById('autoRotateBtn');
autoRotateBtn.addEventListener('click', () => {
  autoRotating = !autoRotating;
  window.__3D_STATE__.autoRotate = autoRotating;
  
  if (autoRotating) {
    autoRotateBtn.textContent = '⏹ 停止旋转';
    autoRotateBtn.classList.add('active');
    document.getElementById('rotateStatus').textContent = '旋转中';
  } else {
    autoRotateBtn.textContent = '🔄 自动旋转';
    autoRotateBtn.classList.remove('active');
    document.getElementById('rotateStatus').textContent = '停止';
  }
});

// Animation
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  
  controls.update();
  
  // Auto rotation for selected car
  if (autoRotating && selectedCar !== "none") {
    const rotSpeed = THREE.MathUtils.degToRad(45) * delta; // 45 degrees per second
    if (selectedCar === "ferrari") {
      ferrariGroup.rotation.y += rotSpeed;
    } else if (selectedCar === "toycar") {
      toycarGroup.rotation.y += rotSpeed;
    }
  }
  
  // Platform ring glow animation
  const time = clock.getElapsedTime();
  leftPlatform.children[1].material.color.setHSL(0.55, 1, 0.4 + Math.sin(time * 2) * 0.1);
  rightPlatform.children[1].material.color.setHSL(0.55, 1, 0.4 + Math.sin(time * 2 + 1) * 0.1);
  
  // Update state
  window.__3D_STATE__.ferrariPosition = {
    x: ferrariGroup.position.x,
    y: ferrariGroup.position.y,
    z: ferrariGroup.position.z
  };
  window.__3D_STATE__.toycarPosition = {
    x: toycarGroup.position.x,
    y: toycarGroup.position.y,
    z: toycarGroup.position.z
  };
  window.__3D_STATE__.cameraDistance = camera.position.length();
  window.__3D_STATE__.hueValue = parseInt(hueSlider.value);
  
  renderer.render(scene, camera);
}

animate();

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
