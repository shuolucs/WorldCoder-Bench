<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car Showroom</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #webgl-canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #00ffcc;
        }
        #hud p {
            margin: 5px 0;
            font-size: 14px;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 250px;
            background: rgba(20, 20, 20, 0.8);
            color: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #555;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .ui-group {
            margin-bottom: 15px;
        }
        .ui-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }
        #carName {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
            text-transform: capitalize;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        button:hover {
            background: #45a049;
        }
        button.active {
            background: #f44336;
        }
        button.active:hover {
            background: #da190b;
        }
        button:disabled, input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>

    <div id="hud">
        <p>Selected: <span id="selectedDisplay">none</span></p>
        <p>Hue: <span id="hueValue">0</span>°</p>
        <p>Auto Rotate: <span id="rotateStatus">Off</span></p>
    </div>

    <div id="ui-panel">
        <div id="carName">No Car Selected</div>
        
        <div class="ui-group">
            <label for="hueSlider">Color Hue (0-360)</label>
            <input type="range" id="hueSlider" min="0" max="360" value="0" disabled>
        </div>

        <div class="ui-group">
            <button id="autoRotateBtn" disabled>Toggle Auto Rotate</button>
        </div>
    </div>

    <canvas id="webgl-canvas"></canvas>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            selectedCar: "none",
            hueValue: 0,
            autoRotate: false,
            ferrariPosition: { x: 0, y: 0, z: 0 },
            toycarPosition: { x: 0, y: 0, z: 0 },
            cameraDistance: 0
        };

        // --- Scene Setup ---
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.shadowMap.enabled = true;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        // Environment Reflection
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Spotlights for pedestals
        const spotLightIntensityHigh = 200;
        const spotLightIntensityLow = 10;

        const leftSpotLight = new THREE.SpotLight(0xffffff, spotLightIntensityLow);
        leftSpotLight.position.set(-4, 6, 0);
        leftSpotLight.angle = Math.PI / 6;
        leftSpotLight.penumbra = 0.5;
        leftSpotLight.castShadow = true;
        scene.add(leftSpotLight);
        
        const leftTarget = new THREE.Object3D();
        leftTarget.position.set(-4, 0, 0);
        scene.add(leftTarget);
        leftSpotLight.target = leftTarget;

        const rightSpotLight = new THREE.SpotLight(0xffffff, spotLightIntensityLow);
        rightSpotLight.position.set(4, 6, 0);
        rightSpotLight.angle = Math.PI / 6;
        rightSpotLight.penumbra = 0.5;
        rightSpotLight.castShadow = true;
        scene.add(rightSpotLight);

        const rightTarget = new THREE.Object3D();
        rightTarget.position.set(4, 0, 0);
        scene.add(rightTarget);
        rightSpotLight.target = rightTarget;

        // --- Geometry ---
        // Floor
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8, metalness: 0.2 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Pedestals
        const pedestalGeo = new THREE.CylinderGeometry(2, 2, 0.3, 64);
        const pedestalMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.5, metalness: 0.1 });
        
        const leftPedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
        leftPedestal.position.set(-4, 0.15, 0);
        leftPedestal.receiveShadow = true;
        scene.add(leftPedestal);

        const rightPedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
        rightPedestal.position.set(4, 0.15, 0);
        rightPedestal.receiveShadow = true;
        scene.add(rightPedestal);

        // --- Model Loading ---
        const loader = new GLTFLoader();
        let ferrariModel = null;
        let toyCarModel = null;
        let loadedCount = 0;

        function checkAllLoaded() {
            loadedCount++;
            if (loadedCount === 2) {
                window.__3D_STATE__.modelLoaded = true;
            }
        }

        function fitModelToPedestal(model, x, y, z) {
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.z);
            const targetSize = 3.2; // Slightly smaller than pedestal diameter (4)
            const scale = targetSize / maxDim;
            model.scale.setScalar(scale);

            // Adjust Y to sit exactly on pedestal
            const boxAfterScale = new THREE.Box3().setFromObject(model);
            const bottomY = boxAfterScale.min.y;
            model.position.set(x, y + (model.position.y - bottomY), z);

            // Enable shadows
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    // Store original HSL for color shifting
                    if (child.material) {
                        const materials = Array.isArray(child.material) ? child.material : [child.material];
                        materials.forEach(mat => {
                            if (mat.color) {
                                mat.userData.originalHSL = { h: 0, s: 0, l: 0 };
                                mat.color.getHSL(mat.userData.originalHSL);
                            }
                        });
                    }
                }
            });
        }

        loader.load('assets/ferrari.glb', (gltf) => {
            ferrariModel = gltf.scene;
            fitModelToPedestal(ferrariModel, -4, 0.3, 0);
            scene.add(ferrariModel);
            checkAllLoaded();
        }, undefined, (error) => { console.error("Error loading Ferrari:", error); checkAllLoaded(); });

        loader.load('assets/ToyCar.glb', (gltf) => {
            toyCarModel = gltf.scene;
            fitModelToPedestal(toyCarModel, 4, 0.3, 0);
            scene.add(toyCarModel);
            checkAllLoaded();
        }, undefined, (error) => { console.error("Error loading ToyCar:", error); checkAllLoaded(); });


        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const hueSlider = document.getElementById('hueSlider');
        const autoRotateBtn = document.getElementById('autoRotateBtn');
        const carNameUI = document.getElementById('carName');

        function updateSelectionUI() {
            const selected = window.__3D_STATE__.selectedCar;
            
            if (selected === 'none') {
                carNameUI.innerText = "No Car Selected";
                hueSlider.disabled = true;
                autoRotateBtn.disabled = true;
                leftSpotLight.intensity = spotLightIntensityLow;
                rightSpotLight.intensity = spotLightIntensityLow;
            } else {
                carNameUI.innerText = selected === 'ferrari' ? "Ferrari" : "Toy Car";
                hueSlider.disabled = false;
                autoRotateBtn.disabled = false;
                
                if (selected === 'ferrari') {
                    leftSpotLight.intensity = spotLightIntensityHigh;
                    rightSpotLight.intensity = spotLightIntensityLow;
                } else {
                    leftSpotLight.intensity = spotLightIntensityLow;
                    rightSpotLight.intensity = spotLightIntensityHigh;
                }
            }
        }

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI elements
            if (event.target.closest('#ui-panel') || event.target.closest('#hud')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const interactables = [];
            if (ferrariModel) interactables.push(ferrariModel);
            if (toyCarModel) interactables.push(toyCarModel);

            const intersects = raycaster.intersectObjects(interactables, true);

            if (intersects.length > 0) {
                let object = intersects[0].object;
                let rootModel = null;
                
                // Find which main model was clicked
                object.traverseAncestors((ancestor) => {
                    if (ancestor === ferrariModel) rootModel = 'ferrari';
                    if (ancestor === toyCarModel) rootModel = 'toycar';
                });
                if (object === ferrariModel) rootModel = 'ferrari';
                if (object === toyCarModel) rootModel = 'toycar';

                window.__3D_STATE__.selectedCar = rootModel || 'none';
            } else {
                window.__3D_STATE__.selectedCar = 'none';
            }

            updateSelectionUI();
        });

        // Color Adjustment
        hueSlider.addEventListener('input', (e) => {
            const hue = parseInt(e.target.value);
            window.__3D_STATE__.hueValue = hue;
            
            const selected = window.__3D_STATE__.selectedCar;
            const targetModel = selected === 'ferrari' ? ferrariModel : (selected === 'toycar' ? toyCarModel : null);

            if (targetModel) {
                targetModel.traverse((child) => {
                    if (child.isMesh && child.material) {
                        const materials = Array.isArray(child.material) ? child.material : [child.material];
                        materials.forEach(mat => {
                            if (mat.color && mat.userData.originalHSL) {
                                // Only shift hue, keep original saturation and lightness
                                // If original saturation is 0 (grayscale), hue shift won't do much, which is physically correct
                                mat.color.setHSL(hue / 360, mat.userData.originalHSL.s, mat.userData.originalHSL.l);
                            }
                        });
                    }
                });
            }
        });

        // Auto Rotate
        autoRotateBtn.addEventListener('click', () => {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            if (window.__3D_STATE__.autoRotate) {
                autoRotateBtn.classList.add('active');
                autoRotateBtn.innerText = "Stop Auto Rotate";
            } else {
                autoRotateBtn.classList.remove('active');
                autoRotateBtn.innerText = "Toggle Auto Rotate";
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        // HUD Elements
        const hudSelected = document.getElementById('selectedDisplay');
        const hudHue = document.getElementById('hueValue');
        const hudRotate = document.getElementById('rotateStatus');

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Handle Rotation
            if (window.__3D_STATE__.autoRotate && window.__3D_STATE__.selectedCar !== 'none') {
                const targetModel = window.__3D_STATE__.selectedCar === 'ferrari' ? ferrariModel : toyCarModel;
                if (targetModel) {
                    targetModel.rotation.y += (45 * Math.PI / 180) * delta;
                }
            }

            controls.update();

            // Update State Object
            if (ferrariModel) {
                window.__3D_STATE__.ferrariPosition.x = ferrariModel.position.x;
                window.__3D_STATE__.ferrariPosition.y = ferrariModel.position.y;
                window.__3D_STATE__.ferrariPosition.z = ferrariModel.position.z;
            }
            if (toyCarModel) {
                window.__3D_STATE__.toycarPosition.x = toyCarModel.position.x;
                window.__3D_STATE__.toycarPosition.y = toyCarModel.position.y;
                window.__3D_STATE__.toycarPosition.z = toyCarModel.position.z;
            }
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            // Update HUD DOM
            hudSelected.innerText = window.__3D_STATE__.selectedCar;
            hudHue.innerText = window.__3D_STATE__.hueValue;
            hudRotate.innerText = window.__3D_STATE__.autoRotate ? 'On' : 'Off';

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
