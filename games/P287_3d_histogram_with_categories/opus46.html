<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Histogram with City Model</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #hud {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 100;
    min-width: 180px;
  }
  #hud div { margin-bottom: 4px; }
  #hud span { font-weight: bold; color: #4ecdc4; }

  #labels-container {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 100;
  }

  #labels-container button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  #labels-container button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  #labels-container button.active {
    outline: 3px solid #fff;
    outline-offset: 2px;
  }

  #btn-toggle-view {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    background: rgba(108, 92, 231, 0.8);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    z-index: 100;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
  }
  #btn-toggle-view:hover {
    background: rgba(108, 92, 231, 1);
    transform: translateY(-1px);
  }

  #loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26, 26, 46, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    color: #fff;
    font-size: 18px;
    transition: opacity 0.5s ease;
  }
  #loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="loading-overlay">Loading 3D Scene...</div>

<div id="hud">
  <div id="hud-selected">Selected: <span>None</span></div>
  <div id="hud-total">Total: <span>300</span></div>
  <div id="hud-bars">Bars: <span>5</span></div>
</div>

<button id="btn-toggle-view">Toggle Top View</button>

<div id="labels-container">
  <button id="btn-food" style="background-color: #ff6b6b;">Food</button>
  <button id="btn-transport" style="background-color: #4ecdc4;">Transport</button>
  <button id="btn-housing" style="background-color: #45b7d1;">Housing</button>
  <button id="btn-entertainment" style="background-color: #f9ca24; color: #333;">Entertainment</button>
  <button id="btn-savings" style="background-color: #6c5ce7;">Savings</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// State management
window.__3D_STATE__ = {
  modelLoaded: false,
  barCount: 5,
  barValues: [75, 45, 90, 30, 60],
  barHeights: [7.5, 4.5, 9.0, 3.0, 6.0],
  selectedBar: null,
  hoveredBar: null,
  viewMode: 'normal',
  totalValue: 300,
  cameraPosition: { x: 8, y: 6, z: 12 }
};

// Categories data
const categories = [
  { name: 'Food', value: 75, color: 0xff6b6b },
  { name: 'Transport', value: 45, color: 0x4ecdc4 },
  { name: 'Housing', value: 90, color: 0x45b7d1 },
  { name: 'Entertainment', value: 30, color: 0xf9ca24 },
  { name: 'Savings', value: 60, color: 0x6c5ce7 }
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(8, 6, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -15;
directionalLight.shadow.camera.right = 15;
directionalLight.shadow.camera.top = 15;
directionalLight.shadow.camera.bottom = -15;
scene.add(directionalLight);

// Additional subtle lights for atmosphere
const pointLight1 = new THREE.PointLight(0xff6b6b, 0.3, 20);
pointLight1.position.set(-4, 5, 2);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x4ecdc4, 0.3, 20);
pointLight2.position.set(4, 5, -2);
scene.add(pointLight2);

// Ground plane
const groundGeometry = new THREE.PlaneGeometry(20, 20);
const groundMaterial = new THREE.MeshStandardMaterial({
  color: 0x2d2d44,
  roughness: 0.8,
  metalness: 0.2
});
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper for visual appeal
const gridHelper = new THREE.GridHelper(20, 20, 0x3d3d5c, 0x2d2d44);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Create histogram bars
const bars = [];
const barMeshes = [];

categories.forEach((cat, index) => {
  const height = cat.value / 10;
  const geometry = new THREE.BoxGeometry(1.2, height, 1.2);
  const material = new THREE.MeshStandardMaterial({
    color: cat.color,
    roughness: 0.4,
    metalness: 0.3,
    emissive: 0x000000
  });
  const mesh = new THREE.Mesh(geometry, material);

  const xPos = -4 + index * 2.0;
  mesh.position.set(xPos, height / 2, 0);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  mesh.userData = {
    index: index,
    category: cat.name,
    value: cat.value,
    originalColor: cat.color,
    originalScaleX: 1,
    originalScaleZ: 1
  };

  scene.add(mesh);
  bars.push(mesh);
  barMeshes.push(mesh);

  // Add value label on top of bar
  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 128;
  labelCanvas.height = 64;
  const ctx = labelCanvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(cat.value.toString(), 64, 32);

  const labelTexture = new THREE.CanvasTexture(labelCanvas);
  const labelMaterial = new THREE.SpriteMaterial({ map: labelTexture, transparent: true });
  const labelSprite = new THREE.Sprite(labelMaterial);
  labelSprite.position.set(xPos, height + 0.5, 0);
  labelSprite.scale.set(1.2, 0.6, 1);
  scene.add(labelSprite);

  // Add category name below bar
  const nameCanvas = document.createElement('canvas');
  nameCanvas.width = 256;
  nameCanvas.height = 64;
  const nctx = nameCanvas.getContext('2d');
  nctx.fillStyle = '#aaaacc';
  nctx.font = '24px Arial';
  nctx.textAlign = 'center';
  nctx.textBaseline = 'middle';
  nctx.fillText(cat.name, 128, 32);

  const nameTexture = new THREE.CanvasTexture(nameCanvas);
  const nameMaterial = new THREE.SpriteMaterial({ map: nameTexture, transparent: true });
  const nameSprite = new THREE.Sprite(nameMaterial);
  nameSprite.position.set(xPos, -0.5, 1.2);
  nameSprite.scale.set(2, 0.5, 1);
  scene.add(nameSprite);
});

// Load 3D model
const loader = new GLTFLoader();
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/gltf/');
loader.setDRACOLoader(dracoLoader);

loader.load(
  'https://threejs.org/examples/models/gltf/LittlestTokyo.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.002, 0.002, 0.002);
    model.position.set(-6, 0, -4);
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(model);
    window.__3D_STATE__.modelLoaded = true;

    // Start animations if any
    if (gltf.animations && gltf.animations.length > 0) {
      const mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach((clip) => {
        mixer.clipAction(clip).play();
      });
      window._modelMixer = mixer;
    }

    document.getElementById('loading-overlay').classList.add('hidden');
  },
  (progress) => {
    const percent = progress.total ? Math.round((progress.loaded / progress.total) * 100) : '...';
    document.getElementById('loading-overlay').textContent = `Loading 3D Model... ${percent}%`;
  },
  (error) => {
    console.warn('Model loading failed:', error);
    window.__3D_STATE__.modelLoaded = false;
    document.getElementById('loading-overlay').classList.add('hidden');
  }
);

// Raycaster for interactions
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedBarIndex = null;
let hoveredBarIndex = null;

function updateHUD() {
  const selectedName = selectedBarIndex !== null ? categories[selectedBarIndex].name : 'None';
  document.querySelector('#hud-selected span').textContent = selectedName;
}

function selectBar(index) {
  // Deselect previous
  if (selectedBarIndex !== null) {
    const prevBar = bars[selectedBarIndex];
    prevBar.scale.x = 1;
    prevBar.scale.z = 1;
    document.querySelectorAll('#labels-container button').forEach(b => b.classList.remove('active'));
  }

  if (selectedBarIndex === index) {
    selectedBarIndex = null;
    window.__3D_STATE__.selectedBar = null;
  } else {
    selectedBarIndex = index;
    window.__3D_STATE__.selectedBar = index;
    const bar = bars[index];
    bar.scale.x = 1.3;
    bar.scale.z = 1.3;

    const buttons = document.querySelectorAll('#labels-container button');
    buttons[index].classList.add('active');
  }

  updateHUD();
}

// Mouse events
renderer.domElement.addEventListener('mousemove', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
});

renderer.domElement.addEventListener('click', (event) => {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(bars);

  if (intersects.length > 0) {
    const clickedBar = intersects[0].object;
    const index = clickedBar.userData.index;
    selectBar(index);
  }
});

// Category button clicks
const buttonIds = ['btn-food', 'btn-transport', 'btn-housing', 'btn-entertainment', 'btn-savings'];
buttonIds.forEach((id, index) => {
  document.getElementById(id).addEventListener('click', () => {
    selectBar(index);
  });
});

// Toggle view
let viewMode = 'normal';
const normalPos = new THREE.Vector3(8, 6, 12);
const topdownPos = new THREE.Vector3(0, 15, 0);
let targetCameraPos = normalPos.clone();
let isAnimatingCamera = false;

document.getElementById('btn-toggle-view').addEventListener('click', () => {
  if (viewMode === 'normal') {
    viewMode = 'topdown';
    targetCameraPos = topdownPos.clone();
    window.__3D_STATE__.viewMode = 'topdown';
    document.getElementById('btn-toggle-view').textContent = 'Toggle Normal View';
  } else {
    viewMode = 'normal';
    targetCameraPos = normalPos.clone();
    window.__3D_STATE__.viewMode = 'normal';
    document.getElementById('btn-toggle-view').textContent = 'Toggle Top View';
  }
  isAnimatingCamera = true;
});

// Clock for animations
const clock = new THREE.Clock();

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  // Update model mixer
  if (window._modelMixer) {
    window._modelMixer.update(delta);
  }

  // Camera animation
  if (isAnimatingCamera) {
    camera.position.lerp(targetCameraPos, 0.05);
    if (viewMode === 'topdown') {
      controls.target.lerp(new THREE.Vector3(0, 0, 0), 0.05);
    } else {
      controls.target.lerp(new THREE.Vector3(0, 0, 0), 0.05);
    }
    if (camera.position.distanceTo(targetCameraPos) < 0.1) {
      isAnimatingCamera = false;
    }
  }

  controls.update();

  // Raycaster hover
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(bars);

  // Reset all hovers
  const prevHovered = hoveredBarIndex;
  hoveredBarIndex = null;

  bars.forEach((bar, index) => {
    if (index !== selectedBarIndex) {
      bar.material.emissive.setHex(0x000000);
    }
  });

  if (intersects.length > 0) {
    const hoveredBar = intersects[0].object;
    const index = hoveredBar.userData.index;
    hoveredBarIndex = index;
    hoveredBar.material.emissive.setHex(0x333333);
    renderer.domElement.style.cursor = 'pointer';
  } else {
    renderer.domElement.style.cursor = 'default';
  }

  // Keep selected bar emissive
  if (selectedBarIndex !== null) {
    bars[selectedBarIndex].material.emissive.setHex(0x333333);
  }

  // Update state
  window.__3D_STATE__.hoveredBar = hoveredBarIndex;
  window.__3D_STATE__.cameraPosition = {
    x: camera.position.x,
    y: camera.position.y,
    z: camera.position.z
  };

  // Subtle bar animation - gentle floating
  bars.forEach((bar, index) => {
    const time = clock.elapsedTime;
    const baseY = categories[index].value / 10 / 2;
    bar.position.y = baseY + Math.sin(time * 1.5 + index * 0.8) * 0.03;
  });

  renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
