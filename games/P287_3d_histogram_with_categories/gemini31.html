<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Histogram</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #btn-toggle-view {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            padding: 10px 15px;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: background-color 0.3s;
        }
        #btn-toggle-view:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            pointer-events: none;
            min-width: 150px;
        }
        #hud div {
            margin-bottom: 5px;
        }
        #hud div:last-child {
            margin-bottom: 0;
        }
        #labels-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 15px;
            pointer-events: none;
        }
        .category-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, filter 0.2s;
        }
        .category-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .category-btn:active {
            transform: translateY(1px);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <button id="btn-toggle-view">Toggle View</button>
    
    <div id="hud">
        <div id="hud-selected">Selected: None</div>
        <div id="hud-total">Total: 300</div>
        <div id="hud-bars">Bars: 5</div>
    </div>

    <div id="labels-container">
        <button id="btn-food" class="category-btn" style="background-color: #ff6b6b;">Food</button>
        <button id="btn-transport" class="category-btn" style="background-color: #4ecdc4;">Transport</button>
        <button id="btn-housing" class="category-btn" style="background-color: #45b7d1;">Housing</button>
        <button id="btn-entertainment" class="category-btn" style="background-color: #f9ca24;">Entertainment</button>
        <button id="btn-savings" class="category-btn" style="background-color: #6c5ce7;">Savings</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // State Management
        window.__3D_STATE__ = {
            modelLoaded: false,
            barCount: 5,
            barValues: [75, 45, 90, 30, 60],
            barHeights: [7.5, 4.5, 9.0, 3.0, 6.0],
            selectedBar: null,
            hoveredBar: null,
            viewMode: 'normal',
            totalValue: 300,
            cameraPosition: { x: 8, y: 6, z: 12 }
        };

        const categories = [
            { name: 'Food', value: 75, color: 0xff6b6b, id: 'btn-food' },
            { name: 'Transport', value: 45, color: 0x4ecdc4, id: 'btn-transport' },
            { name: 'Housing', value: 90, color: 0x45b7d1, id: 'btn-housing' },
            { name: 'Entertainment', value: 30, color: 0xf9ca24, id: 'btn-entertainment' },
            { name: 'Savings', value: 60, color: 0x6c5ce7, id: 'btn-savings' }
        ];

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Ground Plane
        const groundGeometry = new THREE.PlaneGeometry(20, 20);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2d2d44 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        // Load 3D Model
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/gltf/');
        
        const gltfLoader = new GLTFLoader();
        gltfLoader.setDRACOLoader(dracoLoader);
        
        gltfLoader.load(
            'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/models/gltf/LittlestTokyo.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.002, 0.002, 0.002);
                model.position.set(-6, 0, -4);
                scene.add(model);
                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // Create Histogram Bars
        const bars = [];
        const startX = -4;
        const spacing = 2.0;

        categories.forEach((cat, index) => {
            const height = cat.value / 10;
            const geometry = new THREE.BoxGeometry(1.2, height, 1.2);
            const material = new THREE.MeshStandardMaterial({ 
                color: cat.color,
                roughness: 0.4,
                metalness: 0.1
            });
            const bar = new THREE.Mesh(geometry, material);
            
            bar.position.set(startX + (index * spacing), height / 2, 0);
            bar.userData = { index: index, name: cat.name, originalColor: cat.color };
            
            scene.add(bar);
            bars.push(bar);
        });

        // Interaction Setup
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const hudSelected = document.getElementById('hud-selected');

        function selectBar(index) {
            // Reset all bars
            bars.forEach(bar => {
                bar.scale.set(1, 1, 1);
            });

            if (window.__3D_STATE__.selectedBar === index) {
                // Deselect
                window.__3D_STATE__.selectedBar = null;
                hudSelected.textContent = 'Selected: None';
            } else {
                // Select
                window.__3D_STATE__.selectedBar = index;
                bars[index].scale.set(1.3, 1, 1.3);
                hudSelected.textContent = `Selected: ${categories[index].name} (${categories[index].value})`;
            }
        }

        // Mouse Move (Hover)
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // Click (Select)
        window.addEventListener('click', (event) => {
            // Don't trigger if clicking UI elements
            if (event.target.tagName === 'BUTTON') return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(bars);

            if (intersects.length > 0) {
                const index = intersects[0].object.userData.index;
                selectBar(index);
            } else {
                // Clicked empty space, deselect
                if (window.__3D_STATE__.selectedBar !== null) {
                    selectBar(window.__3D_STATE__.selectedBar); // toggles off
                }
            }
        });

        // Category Buttons
        categories.forEach((cat, index) => {
            document.getElementById(cat.id).addEventListener('click', () => {
                selectBar(index);
            });
        });

        // Toggle View Button
        document.getElementById('btn-toggle-view').addEventListener('click', () => {
            if (window.__3D_STATE__.viewMode === 'normal') {
                camera.position.set(0, 15, 0);
                window.__3D_STATE__.viewMode = 'topdown';
            } else {
                camera.position.set(8, 6, 12);
                window.__3D_STATE__.viewMode = 'normal';
            }
            controls.target.set(0, 0, 0);
            controls.update();
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Handle Hover Raycasting
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(bars);

            // Reset emissive
            bars.forEach(bar => {
                bar.material.emissive.setHex(0x000000);
            });

            if (intersects.length > 0) {
                const hoveredObj = intersects[0].object;
                hoveredObj.material.emissive.setHex(0x333333);
                window.__3D_STATE__.hoveredBar = hoveredObj.userData.index;
                document.body.style.cursor = 'pointer';
            } else {
                window.__3D_STATE__.hoveredBar = null;
                document.body.style.cursor = 'default';
            }

            // Update State Camera Position
            window.__3D_STATE__.cameraPosition.x = camera.position.x;
            window.__3D_STATE__.cameraPosition.y = camera.position.y;
            window.__3D_STATE__.cameraPosition.z = camera.position.z;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
