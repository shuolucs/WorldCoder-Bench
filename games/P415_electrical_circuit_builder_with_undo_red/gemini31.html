<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Electrical Circuit Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(30, 30, 30, 0.9);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        #sidebar {
            top: 60px;
            left: 20px;
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #topbar {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #hud-panel {
            top: 60px;
            right: 20px;
            width: 220px;
        }
        h2, h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #fff;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        button:hover {
            background: #4a4a4a;
            border-color: #777;
        }
        button.active {
            background: #0056b3;
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.5);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #btn-simulate {
            background: #28a745;
            border-color: #218838;
        }
        #btn-simulate:hover {
            background: #218838;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .hud-value {
            font-family: monospace;
            color: #00ffcc;
        }
        .status-valid { color: #28a745; }
        .status-invalid { color: #dc3545; }
        .status-open { color: #ffc107; }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="topbar" class="panel">
        <button id="btn-undo" title="Ctrl+Z">Undo</button>
        <button id="btn-redo" title="Ctrl+Y">Redo</button>
        <div style="width: 20px;"></div>
        <button id="btn-simulate">Simulate</button>
    </div>

    <div id="sidebar" class="panel">
        <h2>Components</h2>
        <button id="btn-battery" class="tool-btn" data-tool="battery">Battery (9V)</button>
        <button id="btn-resistor" class="tool-btn" data-tool="resistor">Resistor (100Ω)</button>
        <button id="btn-led" class="tool-btn" data-tool="led">LED (2V)</button>
        <button id="btn-switch" class="tool-btn" data-tool="switch">Switch</button>
        <button id="btn-wire" class="tool-btn" data-tool="wire">Wire</button>
    </div>

    <div id="hud-panel" class="panel">
        <h2>Circuit Status</h2>
        <div class="hud-row"><span>Status:</span> <span id="hud-status" class="hud-value">Not Simulated</span></div>
        <div class="hud-row"><span>Components:</span> <span id="hud-count" class="hud-value">0</span></div>
        <div class="hud-row"><span>Voltage:</span> <span id="hud-voltage" class="hud-value">0.00 V</span></div>
        <div class="hud-row"><span>Current:</span> <span id="hud-current" class="hud-value">0.00 mA</span></div>
        <div class="hud-row"><span>Power:</span> <span id="hud-power" class="hud-value">0.00 mW</span></div>
    </div>

    <div id="instructions">
        Left Click: Place/Toggle/Wire | Right Click: Remove | Esc: Cancel Tool
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            sceneReady: false,
            componentCount: 0,
            selectedTool: null,
            components: [],
            wireCount: 0,
            switchStates: {},
            undoStackSize: 0,
            redoStackSize: 0,
            lastAction: null,
            circuitValid: false,
            circuitStatus: 'NotSimulated',
            voltage: 0,
            current: 0,
            power: 0,
            ledGlowing: false,
            ferrariGlowing: false,
            ferrariLoaded: false,
            simulationRun: false
        };

        const state = window.__3D_STATE__;
        const undoStack = [];
        const redoStack = [];
        const MAX_HISTORY = 50;

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffaa00, 0.5);
        pointLight.position.set(0, 6, 0);
        scene.add(pointLight);

        // Environment
        const workbenchGeo = new THREE.BoxGeometry(20, 0.3, 14);
        const workbenchMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
        const workbench = new THREE.Mesh(workbenchGeo, workbenchMat);
        workbench.position.y = 0;
        workbench.receiveShadow = true;
        scene.add(workbench);

        const shelfGeo = new THREE.BoxGeometry(6, 0.2, 3);
        const shelfMat = new THREE.MeshStandardMaterial({ color: 0x654321, roughness: 0.9 });
        const shelf = new THREE.Mesh(shelfGeo, shelfMat);
        shelf.position.set(0, 7, -5);
        shelf.castShadow = true;
        shelf.receiveShadow = true;
        scene.add(shelf);

        const gridHelper = new THREE.GridHelper(20, 10, 0x000000, 0x000000);
        gridHelper.position.y = 0.16;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        // Adjust grid to match 14 depth (7 divisions) visually
        gridHelper.scale.set(1, 1, 14/20); 
        scene.add(gridHelper);

        // Raycasting Plane
        const planeGeo = new THREE.PlaneGeometry(20, 14);
        planeGeo.rotateX(-Math.PI / 2);
        const planeMat = new THREE.MeshBasicMaterial({ visible: false });
        const interactPlane = new THREE.Mesh(planeGeo, planeMat);
        interactPlane.position.y = 0.15;
        scene.add(interactPlane);

        // Placement Highlight
        const highlightGeo = new THREE.BoxGeometry(2, 0.1, 2);
        const highlightMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, opacity: 0.3, transparent: true });
        const highlight = new THREE.Mesh(highlightGeo, highlightMat);
        highlight.visible = false;
        scene.add(highlight);

        // --- FERRARI LOADER ---
        window.__ferrari_model__ = null;
        const loader = new GLTFLoader();
        
        // Fallback function to create a mock car if loading fails
        function createMockFerrari() {
            const group = new THREE.Group();
            const bodyGeo = new THREE.BoxGeometry(2.5, 0.6, 1.2);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.4;
            group.add(body);
            
            const topGeo = new THREE.BoxGeometry(1.2, 0.4, 1);
            const topMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.set(-0.2, 0.9, 0);
            group.add(top);

            group.scale.set(0.8, 0.8, 0.8);
            group.position.set(0, 7.2, -5);
            scene.add(group);
            window.__ferrari_model__ = group;
            state.ferrariLoaded = true;
            updateHUD();
        }

        // Try loading a generic free car model, fallback if fails
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/ToyCar/glTF-Binary/ToyCar.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(15, 15, 15); // Adjust scale for ToyCar
                model.position.set(0, 7.1, -5);
                
                // Make it red
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                    }
                });

                scene.add(model);
                window.__ferrari_model__ = model;
                state.ferrariLoaded = true;
                updateHUD();
            },
            undefined,
            (error) => {
                console.warn("Could not load external GLB, using fallback mock model.");
                createMockFerrari();
            }
        );

        // --- COMPONENT FACTORIES ---
        const componentsGroup = new THREE.Group();
        scene.add(componentsGroup);
        const wiresGroup = new THREE.Group();
        scene.add(wiresGroup);

        let nextId = 1;
        const sceneObjects = {}; // id -> mesh
        const wires = []; // {id, fromId, toId, mesh}

        function createTerminal(x, y, z, color) {
            const geo = new THREE.SphereGeometry(0.1);
            const mat = new THREE.MeshBasicMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            mesh.userData.isTerminal = true;
            return mesh;
        }

        function createBattery() {
            const group = new THREE.Group();
            const geo = new THREE.CylinderGeometry(0.3, 0.3, 0.8, 16);
            const mat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.z = Math.PI / 2;
            mesh.position.y = 0.3;
            group.add(mesh);

            const posTerm = createTerminal(0.4, 0.3, 0, 0xff0000);
            const negTerm = createTerminal(-0.4, 0.3, 0, 0x000000);
            group.add(posTerm, negTerm);
            group.userData = { type: 'battery', terminals: [posTerm, negTerm] };
            return group;
        }

        function createResistor() {
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(1.2, 0.3, 0.3);
            const mat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 0.15;
            group.add(mesh);

            // Bands
            const bandGeo = new THREE.BoxGeometry(0.1, 0.31, 0.31);
            const colors = [0x8b4513, 0x000000, 0x8b4513]; // Brown Black Brown (100)
            colors.forEach((c, i) => {
                const bMat = new THREE.MeshBasicMaterial({ color: c });
                const bMesh = new THREE.Mesh(bandGeo, bMat);
                bMesh.position.set(-0.3 + i * 0.3, 0.15, 0);
                group.add(bMesh);
            });

            const t1 = createTerminal(0.6, 0.15, 0, 0xaaaaaa);
            const t2 = createTerminal(-0.6, 0.15, 0, 0xaaaaaa);
            group.add(t1, t2);
            group.userData = { type: 'resistor', terminals: [t1, t2] };
            return group;
        }

        function createLED() {
            const group = new THREE.Group();
            const geo = new THREE.ConeGeometry(0.2, 0.4, 16);
            const mat = new THREE.MeshStandardMaterial({ color: 0xaa0000, emissive: 0x000000 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 0.2;
            group.add(mesh);

            const t1 = createTerminal(0.2, 0.05, 0, 0xaaaaaa);
            const t2 = createTerminal(-0.2, 0.05, 0, 0xaaaaaa);
            group.add(t1, t2);
            group.userData = { type: 'led', terminals: [t1, t2], ledMesh: mesh };
            return group;
        }

        function createSwitch() {
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(0.6, 0.3, 0.6);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff0000 }); // Red = open
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 0.15;
            group.add(mesh);

            const t1 = createTerminal(0.3, 0.15, 0, 0xaaaaaa);
            const t2 = createTerminal(-0.3, 0.15, 0, 0xaaaaaa);
            group.add(t1, t2);
            group.userData = { type: 'switch', terminals: [t1, t2], switchMesh: mesh };
            return group;
        }

        // --- INTERACTION LOGIC ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let wireStartTerminal = null;

        function getGridPos(intersectPoint) {
            const x = Math.round(intersectPoint.x / 2) * 2;
            const z = Math.round(intersectPoint.z / 2) * 2;
            return { x: Math.max(-8, Math.min(8, x)), z: Math.max(-6, Math.min(6, z)) };
        }

        function updateHighlight() {
            if (!state.selectedTool || state.selectedTool === 'wire') {
                highlight.visible = false;
                return;
            }
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(interactPlane);
            if (intersects.length > 0) {
                const pos = getGridPos(intersects[0].point);
                highlight.position.set(pos.x, 0.16, pos.z);
                highlight.visible = true;
            } else {
                highlight.visible = false;
            }
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            updateHighlight();
        });

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.closest('.panel')) return;
            
            raycaster.setFromCamera(mouse, camera);

            if (e.button === 0) { // Left click
                if (state.selectedTool && state.selectedTool !== 'wire') {
                    // Place component
                    const intersects = raycaster.intersectObject(interactPlane);
                    if (intersects.length > 0) {
                        const pos = getGridPos(intersects[0].point);
                        // Check if occupied
                        if (!state.components.some(c => c.gridX === pos.x && c.gridZ === pos.z)) {
                            executeAction({
                                type: 'place',
                                compType: state.selectedTool,
                                x: pos.x,
                                z: pos.z,
                                id: nextId++
                            });
                        }
                    }
                } else if (state.selectedTool === 'wire') {
                    // Wire logic
                    const intersects = raycaster.intersectObjects(componentsGroup.children, true);
                    const termIntersect = intersects.find(i => i.object.userData.isTerminal);
                    
                    if (termIntersect) {
                        const terminal = termIntersect.object;
                        const compGroup = terminal.parent;
                        
                        if (!wireStartTerminal) {
                            wireStartTerminal = { terminal, compId: compGroup.userData.id };
                            terminal.material.color.setHex(0x00ff00); // Highlight
                        } else {
                            if (wireStartTerminal.compId !== compGroup.userData.id) {
                                executeAction({
                                    type: 'wire',
                                    id: nextId++,
                                    fromCompId: wireStartTerminal.compId,
                                    toCompId: compGroup.userData.id,
                                    fromTermUuid: wireStartTerminal.terminal.uuid,
                                    toTermUuid: terminal.uuid
                                });
                            }
                            // Reset
                            wireStartTerminal.terminal.material.color.setHex(wireStartTerminal.terminal.userData.origColor || 0xaaaaaa);
                            wireStartTerminal = null;
                        }
                    }
                } else {
                    // Select mode (toggle switch)
                    const intersects = raycaster.intersectObjects(componentsGroup.children, true);
                    if (intersects.length > 0) {
                        let obj = intersects[0].object;
                        while (obj.parent && obj.parent !== componentsGroup) obj = obj.parent;
                        if (obj.userData.type === 'switch') {
                            executeAction({
                                type: 'toggle',
                                id: obj.userData.id
                            });
                        }
                    }
                }
            } else if (e.button === 2) { // Right click
                const intersects = raycaster.intersectObjects([...componentsGroup.children, ...wiresGroup.children], true);
                if (intersects.length > 0) {
                    let obj = intersects[0].object;
                    while (obj.parent && obj.parent !== componentsGroup && obj.parent !== wiresGroup) obj = obj.parent;
                    
                    if (obj.parent === componentsGroup) {
                        executeAction({ type: 'remove_comp', id: obj.userData.id, data: obj.userData });
                    } else if (obj.parent === wiresGroup) {
                        executeAction({ type: 'remove_wire', id: obj.userData.id, data: obj.userData });
                    }
                }
            }
        });

        window.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                setTool(null);
                if (wireStartTerminal) {
                    wireStartTerminal.terminal.material.color.setHex(0xaaaaaa);
                    wireStartTerminal = null;
                }
            }
            if (e.ctrlKey && e.key === 'z') undo();
            if (e.ctrlKey && e.key === 'y') redo();
        });

        // --- UI LOGIC ---
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tool = e.target.dataset.tool;
                setTool(state.selectedTool === tool ? null : tool);
            });
        });

        document.getElementById('btn-undo').addEventListener('click', undo);
        document.getElementById('btn-redo').addEventListener('click', redo);
        document.getElementById('btn-simulate').addEventListener('click', simulate);

        function setTool(tool) {
            state.selectedTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            if (tool) document.getElementById(`btn-${tool}`).classList.add('active');
            updateHighlight();
            updateHUD();
        }

        // --- ACTION SYSTEM (UNDO/REDO) ---
        function executeAction(action, isRedo = false) {
            if (!isRedo) {
                undoStack.push(action);
                if (undoStack.length > MAX_HISTORY) undoStack.shift();
                redoStack.length = 0;
            }

            state.lastAction = action.type;

            switch (action.type) {
                case 'place':
                    let mesh;
                    if (action.compType === 'battery') mesh = createBattery();
                    if (action.compType === 'resistor') mesh = createResistor();
                    if (action.compType === 'led') mesh = createLED();
                    if (action.compType === 'switch') {
                        mesh = createSwitch();
                        state.switchStates[action.id] = false; // open by default
                    }
                    
                    mesh.position.set(action.x, 0, action.z);
                    mesh.userData.id = action.id;
                    mesh.userData.gridX = action.x;
                    mesh.userData.gridZ = action.z;
                    
                    // Save original terminal colors
                    mesh.userData.terminals.forEach(t => t.userData.origColor = t.material.color.getHex());

                    componentsGroup.add(mesh);
                    sceneObjects[action.id] = mesh;
                    state.components.push({ type: action.compType, gridX: action.x, gridZ: action.z, id: action.id });
                    state.componentCount++;
                    break;

                case 'remove_comp':
                    const compToRemove = sceneObjects[action.id];
                    if (compToRemove) {
                        // Remove connected wires first
                        const wiresToRemove = wires.filter(w => w.fromId === action.id || w.toId === action.id);
                        action.removedWires = wiresToRemove; // Store for undo
                        wiresToRemove.forEach(w => {
                            wiresGroup.remove(w.mesh);
                            wires.splice(wires.indexOf(w), 1);
                            state.wireCount--;
                        });

                        componentsGroup.remove(compToRemove);
                        delete sceneObjects[action.id];
                        state.components = state.components.filter(c => c.id !== action.id);
                        if (action.data.type === 'switch') delete state.switchStates[action.id];
                        state.componentCount--;
                    }
                    break;

                case 'toggle':
                    state.switchStates[action.id] = !state.switchStates[action.id];
                    const swMesh = sceneObjects[action.id].userData.switchMesh;
                    swMesh.material.color.setHex(state.switchStates[action.id] ? 0x00ff00 : 0xff0000);
                    break;

                case 'wire':
                    const c1 = sceneObjects[action.fromCompId];
                    const c2 = sceneObjects[action.toCompId];
                    if (c1 && c2) {
                        const t1 = c1.userData.terminals.find(t => t.uuid === action.fromTermUuid) || c1.userData.terminals[0];
                        const t2 = c2.userData.terminals.find(t => t.uuid === action.toTermUuid) || c2.userData.terminals[0];
                        
                        const p1 = new THREE.Vector3();
                        t1.getWorldPosition(p1);
                        const p2 = new THREE.Vector3();
                        t2.getWorldPosition(p2);

                        const distance = p1.distanceTo(p2);
                        const wireGeo = new THREE.CylinderGeometry(0.05, 0.05, distance, 8);
                        const wireMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
                        const wireMesh = new THREE.Mesh(wireGeo, wireMat);
                        
                        const mid = p1.clone().lerp(p2, 0.5);
                        wireMesh.position.copy(mid);
                        wireMesh.lookAt(p2);
                        wireMesh.rotateX(Math.PI / 2);
                        
                        wireMesh.userData = { id: action.id, type: 'wire', fromId: action.fromCompId, toId: action.toCompId };
                        wiresGroup.add(wireMesh);
                        wires.push({ id: action.id, fromId: action.fromCompId, toId: action.toCompId, mesh: wireMesh });
                        state.wireCount++;
                    }
                    break;

                case 'remove_wire':
                    const wireToRemove = wires.find(w => w.id === action.id);
                    if (wireToRemove) {
                        wiresGroup.remove(wireToRemove.mesh);
                        wires.splice(wires.indexOf(wireToRemove), 1);
                        state.wireCount--;
                    }
                    break;
            }

            // Reset simulation on any change
            resetSimulation();
            updateHUD();
        }

        function undo() {
            if (undoStack.length === 0) return;
            const action = undoStack.pop();
            redoStack.push(action);
            state.lastAction = 'undo';

            switch (action.type) {
                case 'place':
                    const comp = sceneObjects[action.id];
                    componentsGroup.remove(comp);
                    delete sceneObjects[action.id];
                    state.components = state.components.filter(c => c.id !== action.id);
                    if (action.compType === 'switch') delete state.switchStates[action.id];
                    state.componentCount--;
                    break;
                case 'remove_comp':
                    // Re-place component
                    executeAction({ type: 'place', compType: action.data.type, x: action.data.gridX, z: action.data.gridZ, id: action.id }, true);
                    // Re-place wires
                    if (action.removedWires) {
                        action.removedWires.forEach(w => {
                            executeAction({ type: 'wire', id: w.id, fromCompId: w.fromId, toCompId: w.toId }, true);
                        });
                    }
                    break;
                case 'toggle':
                    state.switchStates[action.id] = !state.switchStates[action.id];
                    const swMesh = sceneObjects[action.id].userData.switchMesh;
                    swMesh.material.color.setHex(state.switchStates[action.id] ? 0x00ff00 : 0xff0000);
                    break;
                case 'wire':
                    const wireToRemove = wires.find(w => w.id === action.id);
                    if (wireToRemove) {
                        wiresGroup.remove(wireToRemove.mesh);
                        wires.splice(wires.indexOf(wireToRemove), 1);
                        state.wireCount--;
                    }
                    break;
                case 'remove_wire':
                    executeAction({ type: 'wire', id: action.id, fromCompId: action.data.fromId, toCompId: action.data.toId }, true);
                    break;
            }
            resetSimulation();
            updateHUD();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const action = redoStack.pop();
            executeAction(action, true);
            undoStack.push(action);
            state.lastAction = 'redo';
            updateHUD();
        }

        // --- SIMULATION LOGIC ---
        function resetSimulation() {
            state.simulationRun = false;
            state.circuitValid = false;
            state.circuitStatus = 'NotSimulated';
            state.voltage = 0;
            state.current = 0;
            state.power = 0;
            state.ledGlowing = false;
            state.ferrariGlowing = false;

            // Reset visuals
            state.components.forEach(c => {
                if (c.type === 'led') {
                    const mesh = sceneObjects[c.id].userData.ledMesh;
                    mesh.material.emissive.setHex(0x000000);
                }
            });
            if (window.__ferrari_model__) {
                window.__ferrari_model__.traverse(child => {
                    if (child.isMesh && child.material.emissive) {
                        child.material.emissive.setHex(0x000000);
                    }
                });
            }
        }

        function simulate() {
            resetSimulation();
            state.simulationRun = true;

            const batteries = state.components.filter(c => c.type === 'battery');
            if (batteries.length !== 1) {
                state.circuitStatus = batteries.length === 0 ? 'Invalid (No Battery)' : 'Invalid (Multiple Batteries)';
                updateHUD();
                return;
            }

            const batteryId = batteries[0].id;

            // Build adjacency list (undirected graph of components connected by wires)
            const adj = {};
            state.components.forEach(c => adj[c.id] = []);
            wires.forEach(w => {
                if (adj[w.fromId] && adj[w.toId]) {
                    adj[w.fromId].push(w.toId);
                    adj[w.toId].push(w.fromId);
                }
            });

            // Find a cycle containing the battery using BFS
            let pathFound = false;
            let path = [];
            
            // Simple cycle detection: start from battery, find path back to battery > length 2
            const queue = [[batteryId]];
            const visited = new Set();

            while (queue.length > 0) {
                const currentPath = queue.shift();
                const node = currentPath[currentPath.length - 1];

                if (currentPath.length > 2 && node === batteryId) {
                    pathFound = true;
                    path = currentPath.slice(0, -1); // Remove duplicate battery at end
                    break;
                }

                // To prevent infinite loops in complex graphs, limit path length
                if (currentPath.length > 20) continue;

                for (const neighbor of adj[node]) {
                    // Don't go back immediately
                    if (currentPath.length > 1 && neighbor === currentPath[currentPath.length - 2]) continue;
                    
                    // Only visit nodes once per path (except battery to close loop)
                    if (!currentPath.includes(neighbor) || neighbor === batteryId) {
                        queue.push([...currentPath, neighbor]);
                    }
                }
            }

            if (!pathFound) {
                state.circuitStatus = 'Open Circuit';
                updateHUD();
                return;
            }

            // Analyze path
            let totalResistance = 10; // Base resistance
            let hasOpenSwitch = false;
            let hasLED = false;
            let ledIds = [];

            for (const id of path) {
                const comp = state.components.find(c => c.id === id);
                if (comp.type === 'resistor') totalResistance += 100;
                if (comp.type === 'switch' && !state.switchStates[id]) hasOpenSwitch = true;
                if (comp.type === 'led') {
                    hasLED = true;
                    ledIds.push(id);
                }
            }

            if (hasOpenSwitch) {
                state.circuitStatus = 'Open (Switch)';
                updateHUD();
                return;
            }

            // Calculate Ohm's Law
            state.circuitValid = true;
            state.circuitStatus = 'Closed & Valid';
            state.voltage = 9;
            state.current = state.voltage / totalResistance; // Amps
            state.power = state.voltage * state.current; // Watts

            // Visuals
            if (hasLED && state.current > 0.01) {
                state.ledGlowing = true;
                ledIds.forEach(id => {
                    const mesh = sceneObjects[id].userData.ledMesh;
                    mesh.material.emissive.setHex(0xff0000);
                    mesh.material.emissiveIntensity = Math.min(1, state.current * 20);
                });

                // Reward
                if (window.__ferrari_model__) {
                    state.ferrariGlowing = true;
                    window.__ferrari_model__.traverse(child => {
                        if (child.isMesh) {
                            // Clone material to not affect other objects if shared
                            child.material = child.material.clone();
                            child.material.emissive.setHex(0xff6600);
                            child.material.emissiveIntensity = 0.8;
                        }
                    });
                }
            }

            updateHUD();
        }

        // --- HUD UPDATE ---
        function updateHUD() {
            state.undoStackSize = undoStack.length;
            state.redoStackSize = redoStack.length;

            document.getElementById('btn-undo').disabled = state.undoStackSize === 0;
            document.getElementById('btn-redo').disabled = state.redoStackSize === 0;

            document.getElementById('hud-count').innerText = state.componentCount;
            
            const statusEl = document.getElementById('hud-status');
            statusEl.innerText = state.circuitStatus;
            statusEl.className = 'hud-value';
            if (state.circuitStatus.includes('Valid')) statusEl.classList.add('status-valid');
            else if (state.circuitStatus.includes('Invalid')) statusEl.classList.add('status-invalid');
            else if (state.circuitStatus.includes('Open')) statusEl.classList.add('status-open');

            document.getElementById('hud-voltage').innerText = state.voltage.toFixed(2) + ' V';
            document.getElementById('hud-current').innerText = (state.current * 1000).toFixed(1) + ' mA';
            document.getElementById('hud-power').innerText = (state.power * 1000).toFixed(1) + ' mW';
        }

        // --- RENDER LOOP ---
        state.sceneReady = true;
        updateHUD();

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
