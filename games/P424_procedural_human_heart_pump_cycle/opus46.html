<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive 3D Heart Pump Cycle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a2e; color: #fff; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 18px 22px;
    min-width: 240px;
    backdrop-filter: blur(10px);
    z-index: 10;
}
#hud h2 { font-size: 14px; color: #8888ff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
#hud .hud-row { display: flex; justify-content: space-between; margin: 6px 0; font-size: 14px; }
#hud .hud-label { color: #aaa; }
#hud .hud-value { color: #fff; font-weight: bold; }
#hud .phase-name { color: #ff6666; font-size: 16px; font-weight: bold; }

#infoPanel {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 18px 22px;
    min-width: 220px;
    backdrop-filter: blur(10px);
    z-index: 10;
    display: none;
}
#infoPanel h3 { font-size: 14px; color: #ffcc00; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
#infoPanel .info-row { margin: 6px 0; font-size: 13px; color: #ccc; }
#infoPanel .info-value { color: #fff; font-weight: bold; }

#controls {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 46, 0.9);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 16px;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    backdrop-filter: blur(10px);
    z-index: 10;
}
#controls button {
    background: linear-gradient(135deg, #4444aa, #6666dd);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: bold;
}
#controls button:hover { background: linear-gradient(135deg, #5555bb, #7777ee); transform: scale(1.05); }
#controls button:active { transform: scale(0.95); }
#controls .slider-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
#controls .slider-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
#controls input[type="range"] {
    -webkit-appearance: none;
    width: 140px;
    height: 6px;
    background: rgba(100, 100, 255, 0.3);
    border-radius: 3px;
    outline: none;
}
#controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: #6666dd;
    border-radius: 50%;
    cursor: pointer;
}
#controls .speed-value { font-size: 12px; color: #fff; font-weight: bold; }
</style>
</head>
<body>

<div id="hud">
    <h2>❤️ Heart Monitor</h2>
    <div class="hud-row">
        <span class="hud-label">Phase:</span>
        <span class="hud-value phase-name" id="hudPhase">0 - Diastole</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Cycle Count:</span>
        <span class="hud-value" id="hudCycles">0</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">BPM:</span>
        <span class="hud-value" id="hudBPM">72</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Particles:</span>
        <span class="hud-value" id="hudParticles">0</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Status:</span>
        <span class="hud-value" id="hudStatus">⏸ Paused</span>
    </div>
</div>

<div id="infoPanel">
    <h3>🔍 Chamber Info</h3>
    <div class="info-row">Name: <span class="info-value" id="infoName">-</span></div>
    <div class="info-row">Scale: <span class="info-value" id="infoScale">-</span></div>
    <div class="info-row">Type: <span class="info-value" id="infoType">-</span></div>
</div>

<div id="controls">
    <button id="playPauseBtn">Play</button>
    <button id="stepBtn">Step →</button>
    <div class="slider-group">
        <span class="slider-label">Speed</span>
        <input type="range" id="speedSlider" min="0.5" max="3.0" step="0.1" value="1.0">
        <span class="speed-value" id="speedValue">1.0x</span>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    modelLoaded: false,
    currentPhase: 0,
    phaseName: 'Diastole',
    isPlaying: false,
    speedMultiplier: 1.0,
    cycleCount: 0,
    bpm: 72,
    leftVentricleScale: 1.0,
    rightAtriumScale: 1.0,
    activeParticleCount: 0,
    selectedChamber: null,
    aortaPulseScale: 1.0,
    phaseTime: 0
};

const state = window.__3D_STATE__;

const phaseNames = ['Diastole', 'Atrial Systole', 'Ventricular Systole', 'Isovolumetric Relaxation'];
const phaseDurations = [1.5, 0.8, 0.8, 0.6];

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x0a0a2e);
document.body.appendChild(renderer.domElement);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 6);
camera.lookAt(0, 0, 0);

// Scene
const scene = new THREE.Scene();

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// Add subtle point lights for better heart visibility
const pointLight1 = new THREE.PointLight(0xff4444, 0.3, 10);
pointLight1.position.set(-2, 2, 3);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x4444ff, 0.3, 10);
pointLight2.position.set(2, 2, 3);
scene.add(pointLight2);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0.5, 0);
controls.update();

// Heart group
const heartGroup = new THREE.Group();
scene.add(heartGroup);

// Materials
const redMat = new THREE.MeshPhongMaterial({ color: 0xcc2222, shininess: 60, emissive: 0x220000 });
const blueMat = new THREE.MeshPhongMaterial({ color: 0x2244aa, shininess: 60, emissive: 0x000022 });
const redArteryMat = new THREE.MeshPhongMaterial({ color: 0xdd3333, shininess: 80, emissive: 0x330000 });
const blueArteryMat = new THREE.MeshPhongMaterial({ color: 0x3355cc, shininess: 80, emissive: 0x000033 });
const valveMat = new THREE.MeshPhongMaterial({ color: 0x885533, shininess: 40 });

// Chambers
const chambers = {};

function createChamber(name, geometry, material, position) {
    const mesh = new THREE.Mesh(geometry, material.clone());
    mesh.position.set(...position);
    mesh.userData.name = name;
    mesh.userData.isChamber = true;
    mesh.userData.baseScale = new THREE.Vector3(1, 1, 1);
    heartGroup.add(mesh);
    chambers[name] = mesh;
    return mesh;
}

// Left Atrium
createChamber('Left Atrium', new THREE.SphereGeometry(0.5, 32, 32), redMat, [-0.6, 1.2, 0]);

// Right Atrium
createChamber('Right Atrium', new THREE.SphereGeometry(0.5, 32, 32), blueMat, [0.6, 1.2, 0]);

// Left Ventricle
createChamber('Left Ventricle', new THREE.SphereGeometry(0.7, 32, 32), redMat, [-0.5, -0.2, 0]);

// Right Ventricle
createChamber('Right Ventricle', new THREE.SphereGeometry(0.65, 32, 32), blueMat, [0.5, -0.2, 0]);

// Aorta
createChamber('Aorta', new THREE.CylinderGeometry(0.15, 0.15, 1.5, 16), redArteryMat, [-0.3, 2.5, 0]);

// Pulmonary Artery
createChamber('Pulmonary Artery', new THREE.CylinderGeometry(0.12, 0.12, 1.2, 16), blueArteryMat, [0.3, 2.3, 0]);

// Valves (connecting tubes)
function createValve(name, from, to) {
    const start = new THREE.Vector3(...from);
    const end = new THREE.Vector3(...to);
    const mid = start.clone().add(end).multiplyScalar(0.5);
    const length = start.distanceTo(end);
    const geo = new THREE.CylinderGeometry(0.06, 0.06, length, 8);
    const mesh = new THREE.Mesh(geo, valveMat.clone());
    mesh.position.copy(mid);
    const dir = end.clone().sub(start).normalize();
    const up = new THREE.Vector3(0, 1, 0);
    const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
    mesh.quaternion.copy(quat);
    mesh.userData.name = name;
    mesh.userData.isChamber = true;
    mesh.userData.baseScale = new THREE.Vector3(1, 1, 1);
    heartGroup.add(mesh);
    chambers[name] = mesh;
    return mesh;
}

// Mitral Valve (LA -> LV)
createValve('Mitral Valve', [-0.6, 0.7, 0], [-0.5, 0.3, 0]);

// Tricuspid Valve (RA -> RV)
createValve('Tricuspid Valve', [0.6, 0.7, 0], [0.5, 0.3, 0]);

// Aortic Valve (LV -> Aorta)
createValve('Aortic Valve', [-0.5, 0.5, 0], [-0.3, 1.5, 0]);

// Pulmonary Valve (RV -> PA)
createValve('Pulmonary Valve', [0.5, 0.5, 0], [0.3, 1.5, 0]);

// Blood particles
const particles = [];
const particlePool = [];
const MAX_PARTICLES = 200;

const redParticleMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
const blueParticleMat = new THREE.MeshBasicMaterial({ color: 0x3366ff });
const particleGeo = new THREE.SphereGeometry(0.03, 6, 6);

function getParticle(isRed) {
    let p;
    if (particlePool.length > 0) {
        p = particlePool.pop();
        p.mesh.material = isRed ? redParticleMat : blueParticleMat;
    } else {
        const mesh = new THREE.Mesh(particleGeo, isRed ? redParticleMat : blueParticleMat);
        p = { mesh };
        heartGroup.add(mesh);
    }
    p.mesh.visible = true;
    p.active = true;
    p.progress = 0;
    p.speed = 0.8 + Math.random() * 0.6;
    return p;
}

function releaseParticle(p) {
    p.active = false;
    p.mesh.visible = false;
    particlePool.push(p);
}

// Paths for blood flow
function createPath(points) {
    return points.map(p => new THREE.Vector3(...p));
}

const paths = {
    // LA -> LV (during atrial systole)
    laToLv: createPath([[-0.6, 1.2, 0], [-0.6, 0.7, 0], [-0.5, 0.3, 0], [-0.5, -0.2, 0]]),
    // RA -> RV (during atrial systole)
    raToRv: createPath([[0.6, 1.2, 0], [0.6, 0.7, 0], [0.5, 0.3, 0], [0.5, -0.2, 0]]),
    // LV -> Aorta (during ventricular systole)
    lvToAorta: createPath([[-0.5, -0.2, 0], [-0.5, 0.5, 0], [-0.3, 1.5, 0], [-0.3, 2.5, 0], [-0.3, 3.2, 0]]),
    // RV -> PA (during ventricular systole)
    rvToPa: createPath([[0.5, -0.2, 0], [0.5, 0.5, 0], [0.3, 1.5, 0], [0.3, 2.3, 0], [0.3, 2.9, 0]])
};

function interpolatePath(pathPoints, t) {
    t = Math.max(0, Math.min(1, t));
    const segments = pathPoints.length - 1;
    const segIndex = Math.min(Math.floor(t * segments), segments - 1);
    const segT = (t * segments) - segIndex;
    return pathPoints[segIndex].clone().lerp(pathPoints[segIndex + 1], segT);
}

let particleSpawnTimer = 0;

function spawnParticles(phase, dt) {
    particleSpawnTimer += dt;
    if (particleSpawnTimer < 0.05) return;
    particleSpawnTimer = 0;

    const activeCount = particles.filter(p => p.active).length;
    if (activeCount >= MAX_PARTICLES) return;

    if (phase === 1) {
        // Atrial systole: blood flows from atria to ventricles
        const p1 = getParticle(true);
        p1.pathKey = 'laToLv';
        p1.progress = Math.random() * 0.1;
        particles.push(p1);

        const p2 = getParticle(false);
        p2.pathKey = 'raToRv';
        p2.progress = Math.random() * 0.1;
        particles.push(p2);
    } else if (phase === 2) {
        // Ventricular systole: blood flows from ventricles to arteries
        const p1 = getParticle(true);
        p1.pathKey = 'lvToAorta';
        p1.progress = Math.random() * 0.1;
        particles.push(p1);

        const p2 = getParticle(false);
        p2.pathKey = 'rvToPa';
        p2.progress = Math.random() * 0.1;
        particles.push(p2);
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        if (!p.active) continue;

        p.progress += p.speed * dt;
        if (p.progress >= 1.0) {
            releaseParticle(p);
            particles.splice(i, 1);
            continue;
        }

        const pos = interpolatePath(paths[p.pathKey], p.progress);
        // Add slight random offset for visual variety
        pos.x += (Math.random() - 0.5) * 0.05;
        pos.z += (Math.random() - 0.5) * 0.05;
        p.mesh.position.copy(pos);
    }

    state.activeParticleCount = particles.filter(p => p.active).length;
}

// Load GLTF model
const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/DragonAttenuation/glTF-Binary/DragonAttenuation.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.5, 0.5, 0.5);
        model.position.set(3, -1, 0);
        model.traverse((child) => {
            if (child.isMesh) {
                child.material = child.material.clone();
                child.material.transparent = true;
                child.material.opacity = 0.6;
                child.material.color = new THREE.Color(0xcc4444);
            }
        });
        scene.add(model);
        state.modelLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load DragonAttenuation.glb:', error);
        // Create a placeholder
        const geo = new THREE.TorusKnotGeometry(0.5, 0.15, 64, 16);
        const mat = new THREE.MeshPhongMaterial({ color: 0xcc4444, transparent: true, opacity: 0.6 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.scale.set(0.5, 0.5, 0.5);
        mesh.position.set(3, -1, 0);
        scene.add(mesh);
        state.modelLoaded = true;
    }
);

// Add a grid/floor for reference
const gridHelper = new THREE.GridHelper(10, 20, 0x222255, 0x111133);
gridHelper.position.y = -2;
scene.add(gridHelper);

// Animation state
let phaseTime = 0;
let previousHighlight = null;

// Target scales for each phase
const phaseTargets = {
    0: { // Diastole
        'Left Atrium': [1, 1, 1],
        'Right Atrium': [1, 1, 1],
        'Left Ventricle': [1, 1, 1],
        'Right Ventricle': [1, 1, 1],
        'Aorta': [1, 1, 1],
        'Pulmonary Artery': [1, 1, 1]
    },
    1: { // Atrial Systole
        'Left Atrium': [0.7, 0.7, 0.7],
        'Right Atrium': [0.7, 0.7, 0.7],
        'Left Ventricle': [1.15, 1.15, 1.15],
        'Right Ventricle': [1.15, 1.15, 1.15],
        'Aorta': [1, 1, 1],
        'Pulmonary Artery': [1, 1, 1]
    },
    2: { // Ventricular Systole
        'Left Atrium': [1, 1, 1],
        'Right Atrium': [1, 1, 1],
        'Left Ventricle': [0.65, 0.65, 0.65],
        'Right Ventricle': [0.65, 0.65, 0.65],
        'Aorta': [1.3, 1, 1.3],
        'Pulmonary Artery': [1.3, 1, 1.3]
    },
    3: { // Isovolumetric Relaxation
        'Left Atrium': [1, 1, 1],
        'Right Atrium': [1, 1, 1],
        'Left Ventricle': [1, 1, 1],
        'Right Ventricle': [1, 1, 1],
        'Aorta': [1, 1, 1],
        'Pulmonary Artery': [1, 1, 1]
    }
};

function setPhase(phase) {
    state.currentPhase = phase;
    state.phaseName = phaseNames[phase];
    phaseTime = 0;
    state.phaseTime = 0;
    updateHUD();
}

function lerpScale(mesh, target, t) {
    t = Math.min(1, t);
    const smooth = t * t * (3 - 2 * t); // smoothstep
    mesh.scale.x = THREE.MathUtils.lerp(mesh.scale.x, target[0], smooth * 0.1 + 0.05);
    mesh.scale.y = THREE.MathUtils.lerp(mesh.scale.y, target[1], smooth * 0.1 + 0.05);
    mesh.scale.z = THREE.MathUtils.lerp(mesh.scale.z, target[2], smooth * 0.1 + 0.05);
}

function updateAnimation(dt) {
    if (!state.isPlaying) return;

    const adjustedDt = dt * state.speedMultiplier;
    phaseTime += adjustedDt;
    state.phaseTime = phaseTime;

    const duration = phaseDurations[state.currentPhase];
    const t = Math.min(phaseTime / duration, 1);

    // Animate chambers
    const targets = phaseTargets[state.currentPhase];
    for (const [name, target] of Object.entries(targets)) {
        if (chambers[name]) {
            lerpScale(chambers[name], target, t);
        }
    }

    // Spawn and update particles
    if (state.currentPhase === 1 || state.currentPhase === 2) {
        spawnParticles(state.currentPhase, adjustedDt);
    }
    updateParticles(adjustedDt);

    // Update state tracking
    state.leftVentricleScale = chambers['Left Ventricle'].scale.x;
    state.rightAtriumScale = chambers['Right Atrium'].scale.x;
    state.aortaPulseScale = chambers['Aorta'].scale.x;

    // Phase transition
    if (phaseTime >= duration) {
        const nextPhase = (state.currentPhase + 1) % 4;
        if (nextPhase === 0) {
            state.cycleCount++;
        }
        setPhase(nextPhase);
    }

    updateHUD();
}

function updateHUD() {
    state.bpm = Math.round(72 * state.speedMultiplier);
    document.getElementById('hudPhase').textContent = `${state.currentPhase} - ${state.phaseName}`;
    document.getElementById('hudCycles').textContent = state.cycleCount;
    document.getElementById('hudBPM').textContent = state.bpm;
    document.getElementById('hudParticles').textContent = state.activeParticleCount;
    document.getElementById('hudStatus').textContent = state.isPlaying ? '▶ Playing' : '⏸ Paused';
}

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const heartMeshes = [];
    heartGroup.traverse(child => {
        if (child.isMesh && child.userData.isChamber) {
            heartMeshes.push(child);
        }
    });

    const intersects = raycaster.intersectObjects(heartMeshes);

    // Clear previous highlight
    if (previousHighlight) {
        previousHighlight.material.emissive.set(previousHighlight.userData.originalEmissive || 0x000000);
        previousHighlight = null;
    }

    if (intersects.length > 0) {
        const hit = intersects[0].object;
        const name = hit.userData.name;

        // Store original emissive
        hit.userData.originalEmissive = hit.material.emissive.getHex();
        hit.material.emissive.set(0xffff00);
        previousHighlight = hit;

        state.selectedChamber = name;

        // Show info panel
        const panel = document.getElementById('infoPanel');
        panel.style.display = 'block';
        document.getElementById('infoName').textContent = name;
        document.getElementById('infoScale').textContent = `(${hit.scale.x.toFixed(3)}, ${hit.scale.y.toFixed(3)}, ${hit.scale.z.toFixed(3)})`;

        let type = 'Valve';
        if (name.includes('Atrium')) type = 'Chamber (Atrium)';
        else if (name.includes('Ventricle')) type = 'Chamber (Ventricle)';
        else if (name === 'Aorta' || name === 'Pulmonary Artery') type = 'Artery';
        document.getElementById('infoType').textContent = type;
    } else {
        state.selectedChamber = null;
        document.getElementById('infoPanel').style.display = 'none';
    }
}

renderer.domElement.addEventListener('click', onMouseClick);

// Controls
document.getElementById('playPauseBtn').addEventListener('click', () => {
    state.isPlaying = !state.isPlaying;
    document.getElementById('playPauseBtn').textContent = state.isPlaying ? 'Pause' : 'Play';
    updateHUD();
});

document.getElementById('stepBtn').addEventListener('click', () => {
    if (!state.isPlaying) {
        const nextPhase = (state.currentPhase + 1) % 4;
        if (nextPhase === 0) {
            state.cycleCount++;
        }
        setPhase(nextPhase);

        // Immediately set target scales for the new phase
        const targets = phaseTargets[state.currentPhase];
        for (const [name, target] of Object.entries(targets)) {
            if (chambers[name]) {
                chambers[name].scale.set(target[0], target[1], target[2]);
            }
        }
        state.leftVentricleScale = chambers['Left Ventricle'].scale.x;
        state.rightAtriumScale = chambers['Right Atrium'].scale.x;
        state.aortaPulseScale = chambers['Aorta'].scale.x;
        updateHUD();
    }
});

document.getElementById('speedSlider').addEventListener('input', (e) => {
    state.speedMultiplier = parseFloat(e.target.value);
    document.getElementById('speedValue').textContent = state.speedMultiplier.toFixed(1) + 'x';
    state.bpm = Math.round(72 * state.speedMultiplier);
    updateHUD();
});

// Keyboard
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'r') {
        state.isPlaying = false;
        state.cycleCount = 0;
        document.getElementById('playPauseBtn').textContent = 'Play';
        setPhase(0);
        // Reset all scales
        for (const [name, target] of Object.entries(phaseTargets[0])) {
            if (chambers[name]) {
                chambers[name].scale.set(1, 1, 1);
            }
        }
        // Clear particles
        for (let i = particles.length - 1; i >= 0; i--) {
            releaseParticle(particles[i]);
        }
        particles.length = 0;
        state.leftVentricleScale = 1;
        state.rightAtriumScale = 1;
        state.aortaPulseScale = 1;
        state.activeParticleCount = 0;
        updateHUD();
    } else if (!state.isPlaying) {
        if (key === '1') { setPhase(0); applyPhaseScales(0); updateHUD(); }
        else if (key === '2') { setPhase(1); applyPhaseScales(1); updateHUD(); }
        else if (key === '3') { setPhase(2); applyPhaseScales(2); updateHUD(); }
        else if (key === '4') { setPhase(3); applyPhaseScales(3); updateHUD(); }
    }
});

function applyPhaseScales(phase) {
    const targets = phaseTargets[phase];
    for (const [name, target] of Object.entries(targets)) {
        if (chambers[name]) {
            chambers[name].scale.set(target[0], target[1], target[2]);
        }
    }
    state.leftVentricleScale = chambers['Left Ventricle'].scale.x;
    state.rightAtriumScale = chambers['Right Atrium'].scale.x;
    state.aortaPulseScale = chambers['Aorta'].scale.x;
}

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Add subtle heartbeat glow effect
function addHeartbeatGlow(dt) {
    const pulse = Math.sin(Date.now() * 0.003) * 0.5 + 0.5;
    pointLight1.intensity = 0.2 + pulse * 0.2;
    pointLight2.intensity = 0.2 + pulse * 0.2;
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.1);

    controls.update();
    updateAnimation(dt);
    addHeartbeatGlow(dt);

    // Gentle rotation of heart when idle
    if (!state.isPlaying) {
        heartGroup.rotation.y = Math.sin(Date.now() * 0.0005) * 0.1;
    }

    // Update info panel if chamber selected
    if (previousHighlight && state.selectedChamber) {
        document.getElementById('infoScale').textContent =
            `(${previousHighlight.scale.x.toFixed(3)}, ${previousHighlight.scale.y.toFixed(3)}, ${previousHighlight.scale.z.toFixed(3)})`;
    }

    renderer.render(scene, camera);
}

// Initialize
setPhase(0);
updateHUD();
animate();

</script>
</body>
</html>
