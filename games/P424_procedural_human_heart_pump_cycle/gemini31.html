<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Heart Pump Cycle Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud-panel {
            position: absolute;
            background: rgba(10, 10, 46, 0.8);
            border: 1px solid #404060;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }
        #top-left-hud {
            top: 20px;
            left: 20px;
            min-width: 200px;
        }
        #top-left-hud h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #4da6ff;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .stat-label {
            color: #a0a0c0;
        }
        .stat-value {
            font-weight: bold;
        }
        #bottom-controls {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        button {
            background: #2a2a5a;
            color: white;
            border: 1px solid #4da6ff;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #3a3a7a;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type=range] {
            accent-color: #4da6ff;
        }
        #infoPanel {
            top: 20px;
            right: 20px;
            width: 250px;
            display: none;
        }
        #infoPanel h3 {
            margin: 0 0 10px 0;
            color: #ffff00;
        }
        .instructions {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #8080a0;
            text-align: center;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="top-left-hud" class="hud-panel">
        <h2 id="phaseDisplay">Phase 0: Diastole</h2>
        <div class="stat-row"><span class="stat-label">Cycle Count:</span> <span id="cycleCountDisplay" class="stat-value">0</span></div>
        <div class="stat-row"><span class="stat-label">BPM:</span> <span id="bpmDisplay" class="stat-value">72</span></div>
        <div class="stat-row"><span class="stat-label">Active Particles:</span> <span id="particleCountDisplay" class="stat-value">0</span></div>
        <div class="stat-row"><span class="stat-label">Model Loaded:</span> <span id="modelLoadedDisplay" class="stat-value" style="color:#ff5555">No</span></div>
    </div>

    <div id="infoPanel" class="hud-panel">
        <h3 id="chamberName">Chamber Name</h3>
        <div class="stat-row"><span class="stat-label">Current Scale:</span> <span id="chamberScale" class="stat-value">1.00</span></div>
    </div>

    <div class="instructions">
        Click chambers to inspect | Keys: [R] Reset, [1-4] Jump to Phase (when paused)
    </div>

    <div id="bottom-controls" class="hud-panel">
        <button id="playPauseBtn">Play</button>
        <button id="stepBtn">Step Phase</button>
        <div class="slider-container">
            <label for="speedSlider" class="stat-label">Speed:</label>
            <input type="range" id="speedSlider" min="0.5" max="3.0" step="0.1" value="1.0">
            <span id="speedValue" class="stat-value">1.0x</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            currentPhase: 0,
            phaseName: 'Diastole',
            isPlaying: false,
            speedMultiplier: 1.0,
            cycleCount: 0,
            bpm: 72,
            leftVentricleScale: 1.0,
            rightAtriumScale: 1.0,
            activeParticleCount: 0,
            selectedChamber: null,
            aortaPulseScale: 1.0,
            phaseTime: 0
        };

        const phases = [
            { name: 'Diastole', duration: 1.5, targets: { atria: 1.0, vent: 1.0, art: 1.0 } },
            { name: 'Atrial Systole', duration: 0.8, targets: { atria: 0.7, vent: 1.15, art: 1.0 } },
            { name: 'Ventricular Systole', duration: 0.8, targets: { atria: 1.0, vent: 0.65, art: 1.3 } },
            { name: 'Isovolumetric Relaxation', duration: 0.6, targets: { atria: 1.0, vent: 1.0, art: 1.0 } }
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // --- Load Decorative Model ---
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DragonAttenuation/glTF-Binary/DragonAttenuation.glb',
            (gltf) => {
                const dragon = gltf.scene;
                dragon.scale.set(0.5, 0.5, 0.5);
                dragon.position.set(3, -1, 0);
                
                const redTintMaterial = new THREE.MeshStandardMaterial({
                    color: 0xff4444,
                    transparent: true,
                    opacity: 0.6,
                    roughness: 0.3,
                    metalness: 0.2
                });

                dragon.traverse((child) => {
                    if (child.isMesh) {
                        child.material = redTintMaterial;
                    }
                });
                
                scene.add(dragon);
                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // --- Procedural Heart Model ---
        const heartGroup = new THREE.Group();
        scene.add(heartGroup);
        const interactableObjects = [];

        const matRed = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.4 });
        const matBlue = new THREE.MeshStandardMaterial({ color: 0x0044cc, roughness: 0.4 });
        const matValve = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.2 });

        function createChamber(geometry, material, position, name) {
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(position);
            mesh.userData = { name: name, baseScale: new THREE.Vector3(1,1,1) };
            heartGroup.add(mesh);
            interactableObjects.push(mesh);
            return mesh;
        }

        // Chambers
        const posLA = new THREE.Vector3(-0.6, 1.2, 0);
        const posRA = new THREE.Vector3(0.6, 1.2, 0);
        const posLV = new THREE.Vector3(-0.5, -0.2, 0);
        const posRV = new THREE.Vector3(0.5, -0.2, 0);
        const posAorta = new THREE.Vector3(-0.3, 2.5, 0);
        const posPA = new THREE.Vector3(0.3, 2.3, 0);

        const meshLA = createChamber(new THREE.SphereGeometry(0.5, 32, 32), matRed, posLA, 'Left Atrium');
        const meshRA = createChamber(new THREE.SphereGeometry(0.5, 32, 32), matBlue, posRA, 'Right Atrium');
        const meshLV = createChamber(new THREE.SphereGeometry(0.7, 32, 32), matRed, posLV, 'Left Ventricle');
        const meshRV = createChamber(new THREE.SphereGeometry(0.65, 32, 32), matBlue, posRV, 'Right Ventricle');
        
        const geoAorta = new THREE.CylinderGeometry(0.15, 0.15, 1.5, 16);
        geoAorta.translate(0, 0.75, 0); // Pivot at bottom
        const meshAorta = createChamber(geoAorta, matRed, new THREE.Vector3(-0.3, 1.75, 0), 'Aorta');
        
        const geoPA = new THREE.CylinderGeometry(0.12, 0.12, 1.2, 16);
        geoPA.translate(0, 0.6, 0); // Pivot at bottom
        const meshPA = createChamber(geoPA, matBlue, new THREE.Vector3(0.3, 1.7, 0), 'Pulmonary Artery');

        // Valves (Visual connections)
        function createValve(p1, p2) {
            const distance = p1.distanceTo(p2);
            const geo = new THREE.CylinderGeometry(0.08, 0.08, distance, 8);
            const mesh = new THREE.Mesh(geo, matValve);
            const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
            mesh.position.copy(mid);
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), new THREE.Vector3().subVectors(p2, p1).normalize());
            heartGroup.add(mesh);
        }
        createValve(posLA, posLV);
        createValve(posRA, posRV);
        createValve(posLV, new THREE.Vector3(-0.3, 1.75, 0));
        createValve(posRV, new THREE.Vector3(0.3, 1.7, 0));

        // --- Particle System ---
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.03, 8, 8);
        const particleMatRed = new THREE.MeshBasicMaterial({ color: 0xff3333 });
        const particleMatBlue = new THREE.MeshBasicMaterial({ color: 0x3333ff });

        function spawnParticle(startPos, endPos, isRed) {
            const mesh = new THREE.Mesh(particleGeo, isRed ? particleMatRed : particleMatBlue);
            mesh.position.copy(startPos);
            scene.add(mesh);
            particles.push({
                mesh: mesh,
                start: startPos.clone(),
                end: endPos.clone(),
                progress: 0,
                speed: 1.5 + Math.random() * 0.5
            });
            window.__3D_STATE__.activeParticleCount++;
        }

        function updateParticles(delta) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.progress += p.speed * delta * window.__3D_STATE__.speedMultiplier;
                
                if (p.progress >= 1) {
                    scene.remove(p.mesh);
                    p.mesh.geometry.dispose();
                    particles.splice(i, 1);
                    window.__3D_STATE__.activeParticleCount--;
                } else {
                    p.mesh.position.lerpVectors(p.start, p.end, p.progress);
                }
            }
        }

        // --- Interaction & Raycasting ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedMesh = null;

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName !== 'CANVAS') return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableObjects);

            if (selectedMesh) {
                selectedMesh.material.emissive.setHex(0x000000);
                selectedMesh = null;
                window.__3D_STATE__.selectedChamber = null;
            }

            if (intersects.length > 0) {
                selectedMesh = intersects[0].object;
                selectedMesh.material.emissive.setHex(0xffff00);
                selectedMesh.material.emissiveIntensity = 0.5;
                window.__3D_STATE__.selectedChamber = selectedMesh.userData.name;
            }
        });

        // --- UI Controls ---
        const playPauseBtn = document.getElementById('playPauseBtn');
        const stepBtn = document.getElementById('stepBtn');
        const speedSlider = document.getElementById('speedSlider');

        function setPhase(phaseIndex) {
            window.__3D_STATE__.currentPhase = phaseIndex;
            window.__3D_STATE__.phaseTime = 0;
            window.__3D_STATE__.phaseName = phases[phaseIndex].name;
            updateHeartScales(1.0); // Force to end of previous phase/start of new
        }

        playPauseBtn.addEventListener('click', () => {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            playPauseBtn.textContent = window.__3D_STATE__.isPlaying ? 'Pause' : 'Play';
            stepBtn.disabled = window.__3D_STATE__.isPlaying;
        });

        stepBtn.addEventListener('click', () => {
            if (!window.__3D_STATE__.isPlaying) {
                let nextPhase = (window.__3D_STATE__.currentPhase + 1) % 4;
                if (nextPhase === 0) window.__3D_STATE__.cycleCount++;
                setPhase(nextPhase);
            }
        });

        speedSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.speedMultiplier = val;
            window.__3D_STATE__.bpm = Math.round(72 * val);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                window.__3D_STATE__.isPlaying = false;
                playPauseBtn.textContent = 'Play';
                stepBtn.disabled = false;
                window.__3D_STATE__.cycleCount = 0;
                setPhase(0);
            } else if (['1', '2', '3', '4'].includes(e.key) && !window.__3D_STATE__.isPlaying) {
                setPhase(parseInt(e.key) - 1);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Logic ---
        const clock = new THREE.Clock();

        function updateHeartScales(progress) {
            const currentPhaseData = phases[window.__3D_STATE__.currentPhase];
            const prevPhaseIdx = (window.__3D_STATE__.currentPhase + 3) % 4;
            const prevTargets = phases[prevPhaseIdx].targets;

            const atriaScale = THREE.MathUtils.lerp(prevTargets.atria, currentPhaseData.targets.atria, progress);
            const ventScale = THREE.MathUtils.lerp(prevTargets.vent, currentPhaseData.targets.vent, progress);
            const artScale = THREE.MathUtils.lerp(prevTargets.art, currentPhaseData.targets.art, progress);

            meshLA.scale.setScalar(atriaScale);
            meshRA.scale.setScalar(atriaScale);
            meshLV.scale.setScalar(ventScale);
            meshRV.scale.setScalar(ventScale);
            meshAorta.scale.set(artScale, 1, artScale);
            meshPA.scale.set(artScale, 1, artScale);

            window.__3D_STATE__.leftVentricleScale = ventScale;
            window.__3D_STATE__.rightAtriumScale = atriaScale;
            window.__3D_STATE__.aortaPulseScale = artScale;
        }

        function updateUI() {
            const state = window.__3D_STATE__;
            document.getElementById('phaseDisplay').textContent = `Phase ${state.currentPhase}: ${state.phaseName}`;
            document.getElementById('cycleCountDisplay').textContent = state.cycleCount;
            document.getElementById('bpmDisplay').textContent = state.bpm;
            document.getElementById('particleCountDisplay').textContent = state.activeParticleCount;
            document.getElementById('speedValue').textContent = state.speedMultiplier.toFixed(1) + 'x';
            
            const modelLoadedEl = document.getElementById('modelLoadedDisplay');
            if (state.modelLoaded && modelLoadedEl.textContent === 'No') {
                modelLoadedEl.textContent = 'Yes';
                modelLoadedEl.style.color = '#4dff4d';
            }

            const infoPanel = document.getElementById('infoPanel');
            if (state.selectedChamber) {
                infoPanel.style.display = 'block';
                document.getElementById('chamberName').textContent = state.selectedChamber;
                let scaleVal = 1.0;
                if (state.selectedChamber.includes('Atrium')) scaleVal = state.rightAtriumScale;
                else if (state.selectedChamber.includes('Ventricle')) scaleVal = state.leftVentricleScale;
                else scaleVal = state.aortaPulseScale;
                document.getElementById('chamberScale').textContent = scaleVal.toFixed(2);
            } else {
                infoPanel.style.display = 'none';
            }
        }

        // Initialize scales
        updateHeartScales(1.0);
        stepBtn.disabled = false;

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (window.__3D_STATE__.isPlaying) {
                const state = window.__3D_STATE__;
                const scaledDelta = delta * state.speedMultiplier;
                state.phaseTime += scaledDelta;
                
                let currentPhaseData = phases[state.currentPhase];

                if (state.phaseTime >= currentPhaseData.duration) {
                    state.phaseTime -= currentPhaseData.duration;
                    state.currentPhase = (state.currentPhase + 1) % 4;
                    if (state.currentPhase === 0) state.cycleCount++;
                    currentPhaseData = phases[state.currentPhase];
                    state.phaseName = currentPhaseData.name;
                }

                const progress = Math.min(state.phaseTime / currentPhaseData.duration, 1.0);
                updateHeartScales(progress);

                // Spawn particles based on phase
                if (state.currentPhase === 1) { // Atrial Systole
                    if (Math.random() < 0.3 * state.speedMultiplier) spawnParticle(posLA, posLV, true);
                    if (Math.random() < 0.3 * state.speedMultiplier) spawnParticle(posRA, posRV, false);
                } else if (state.currentPhase === 2) { // Ventricular Systole
                    if (Math.random() < 0.4 * state.speedMultiplier) spawnParticle(posLV, new THREE.Vector3(-0.3, 2.5, 0), true);
                    if (Math.random() < 0.4 * state.speedMultiplier) spawnParticle(posRV, new THREE.Vector3(0.3, 2.3, 0), false);
                }
            }

            updateParticles(delta);
            controls.update();
            updateUI();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
