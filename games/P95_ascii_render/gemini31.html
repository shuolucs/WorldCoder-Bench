<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js ASCII Effect</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: monospace;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #333;
        }
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        label {
            font-size: 12px;
        }
        select, input[type="range"] {
            width: 120px;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui">
        <div class="control-group">
            <label for="charset">Charset:</label>
            <select id="charset">
                <option value="standard">Standard</option>
                <option value="extended">Extended</option>
                <option value="minimal">Minimal</option>
            </select>
        </div>
        <div class="control-group">
            <label for="resolution">Resolution:</label>
            <input type="range" id="resolution" min="0.05" max="0.4" step="0.01" value="0.15">
        </div>
        <div class="control-group">
            <label for="invertToggle">Invert:</label>
            <input type="checkbox" id="invertToggle">
        </div>
        <div class="control-group">
            <label for="colorToggle">Color:</label>
            <input type="checkbox" id="colorToggle" checked>
        </div>
        <div class="control-group">
            <label for="objectSelect">Object:</label>
            <select id="objectSelect">
                <option value="torusKnot">TorusKnot</option>
                <option value="sphere">Sphere</option>
                <option value="cube">Cube</option>
            </select>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { AsciiEffect } from 'three/addons/effects/AsciiEffect.js';

        // Initialize State
        window.__3D_STATE__ = {
            charset: 'standard',
            resolution: 0.15,
            inverted: false,
            colored: true,
            objectType: 'torusKnot',
            fps: 0
        };

        // Charset definitions
        const charsets = {
            standard: ' .:-+*=%@#',
            extended: ' .,:;i1tfLCG08@',
            minimal: ' .#'
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0, 0, 0);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.y = 150;
        camera.position.z = 500;

        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Lights
        const pointLight1 = new THREE.PointLight(0xffffff, 3, 0, 0);
        pointLight1.position.set(500, 500, 500);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xffffff, 1, 0, 0);
        pointLight2.position.set(-500, -500, -500);
        scene.add(pointLight2);

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        // Objects
        const material = new THREE.MeshPhongMaterial({ flatShading: true });
        
        const torusKnot = new THREE.Mesh(new THREE.TorusKnotGeometry(70, 20, 100, 16), material);
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(100, 32, 32), material);
        const cube = new THREE.Mesh(new THREE.BoxGeometry(120, 120, 120), material);

        scene.add(torusKnot);
        scene.add(sphere);
        scene.add(cube);

        let effect;

        function updateObjectVisibility() {
            torusKnot.visible = window.__3D_STATE__.objectType === 'torusKnot';
            sphere.visible = window.__3D_STATE__.objectType === 'sphere';
            cube.visible = window.__3D_STATE__.objectType === 'cube';
        }

        function createEffect() {
            if (effect && effect.domElement.parentNode) {
                effect.domElement.parentNode.removeChild(effect.domElement);
            }

            const chars = charsets[window.__3D_STATE__.charset];
            
            effect = new AsciiEffect(renderer, chars, {
                invert: window.__3D_STATE__.inverted,
                color: window.__3D_STATE__.colored,
                resolution: window.__3D_STATE__.resolution
            });
            
            effect.setSize(window.innerWidth, window.innerHeight);
            effect.domElement.style.color = window.__3D_STATE__.inverted ? 'black' : 'white';
            effect.domElement.style.backgroundColor = window.__3D_STATE__.inverted ? 'white' : 'black';
            
            document.body.appendChild(effect.domElement);
        }

        // UI Elements
        const charsetEl = document.getElementById('charset');
        const resolutionEl = document.getElementById('resolution');
        const invertToggleEl = document.getElementById('invertToggle');
        const colorToggleEl = document.getElementById('colorToggle');
        const objectSelectEl = document.getElementById('objectSelect');

        // Sync UI with initial state
        charsetEl.value = window.__3D_STATE__.charset;
        resolutionEl.value = window.__3D_STATE__.resolution;
        invertToggleEl.checked = window.__3D_STATE__.inverted;
        colorToggleEl.checked = window.__3D_STATE__.colored;
        objectSelectEl.value = window.__3D_STATE__.objectType;

        // Event Listeners
        charsetEl.addEventListener('change', (e) => {
            window.__3D_STATE__.charset = e.target.value;
            createEffect();
        });

        resolutionEl.addEventListener('input', (e) => {
            window.__3D_STATE__.resolution = parseFloat(e.target.value);
            createEffect();
        });

        invertToggleEl.addEventListener('change', (e) => {
            window.__3D_STATE__.inverted = e.target.checked;
            createEffect();
        });

        colorToggleEl.addEventListener('change', (e) => {
            window.__3D_STATE__.colored = e.target.checked;
            createEffect();
        });

        objectSelectEl.addEventListener('change', (e) => {
            window.__3D_STATE__.objectType = e.target.value;
            updateObjectVisibility();
        });

        window.addEventListener('resize', onWindowResize);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (effect) effect.setSize(window.innerWidth, window.innerHeight);
        }

        // Initialization
        updateObjectVisibility();
        createEffect();

        // Animation Loop
        let lastTime = performance.now();
        let frames = 0;

        function animate() {
            requestAnimationFrame(animate);

            const timer = Date.now() * 0.0005;

            const activeMesh = torusKnot.visible ? torusKnot : (sphere.visible ? sphere : cube);
            activeMesh.rotation.x = timer;
            activeMesh.rotation.y = timer * 0.5;

            effect.render(scene, camera);

            // FPS Calculation
            frames++;
            const now = performance.now();
            if (now >= lastTime + 1000) {
                window.__3D_STATE__.fps = Math.round((frames * 1000) / (now - lastTime));
                frames = 0;
                lastTime = now;
            }
        }

        animate();
    </script>
</body>
</html>
