<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js ASCII 3D</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      color: #eee;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #controls {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      backdrop-filter: blur(6px);
      min-width: 260px;
    }

    #controls h1 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 600;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 8px 0;
    }

    .row label {
      font-size: 13px;
      color: #ddd;
      flex: 1;
    }

    .row select,
    .row input[type="range"] {
      flex: 1.2;
    }

    .row input[type="checkbox"] {
      transform: scale(1.1);
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #bbb;
      line-height: 1.4;
    }

    #ascii-container {
      width: 100%;
      height: 100%;
    }

    #ascii-container > div,
    #ascii-container pre {
      margin: 0 !important;
    }

    pre {
      user-select: none;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="controls">
      <h1>ASCII 3D 控制面板</h1>

      <div class="row">
        <label for="objectSelect">物体</label>
        <select id="objectSelect">
          <option value="torusKnot">TorusKnot</option>
          <option value="sphere">Sphere</option>
          <option value="cube">Box</option>
        </select>
      </div>

      <div class="row">
        <label for="charset">字符集</label>
        <select id="charset">
          <option value="standard">standard</option>
          <option value="extended">extended</option>
          <option value="minimal">minimal</option>
        </select>
      </div>

      <div class="row">
        <label for="resolution">分辨率</label>
        <input id="resolution" type="range" min="0.08" max="0.3" step="0.01" value="0.16" />
      </div>

      <div class="row">
        <label for="invertToggle">反相</label>
        <input id="invertToggle" type="checkbox" />
      </div>

      <div class="row">
        <label for="colorToggle">彩色 ASCII</label>
        <input id="colorToggle" type="checkbox" checked />
      </div>

      <div class="hint">
        分辨率数值越大，ASCII 栅格越密，细节越多。
      </div>
    </div>

    <div id="ascii-container"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { AsciiEffect } from 'three/addons/effects/AsciiEffect.js';

    const container = document.getElementById('ascii-container');
    const charsetEl = document.getElementById('charset');
    const resolutionEl = document.getElementById('resolution');
    const invertToggleEl = document.getElementById('invertToggle');
    const colorToggleEl = document.getElementById('colorToggle');
    const objectSelectEl = document.getElementById('objectSelect');

    const CHARSETS = {
      standard: ' .:-+*=%@#',
      extended: ' .,:;i1tfLCG08@',
      minimal: ' .#@'
    };

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0, 7);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.6);
    scene.add(ambientLight);

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.2);
    dirLight1.position.set(4, 5, 6);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0x66aaff, 1.2);
    dirLight2.position.set(-5, -2, 4);
    scene.add(dirLight2);

    let mesh = null;

    function createMaterial() {
      return new THREE.MeshStandardMaterial({
        color: 0xff8844,
        metalness: 0.25,
        roughness: 0.35
      });
    }

    function createGeometry(type) {
      switch (type) {
        case 'sphere':
          return new THREE.SphereGeometry(1.5, 64, 32);
        case 'cube':
          return new THREE.BoxGeometry(2.4, 2.4, 2.4, 4, 4, 4);
        case 'torusKnot':
        default:
          return new THREE.TorusKnotGeometry(1.1, 0.38, 180, 32);
      }
    }

    function rebuildObject(type) {
      if (mesh) {
        scene.remove(mesh);
        mesh.geometry.dispose();
        mesh.material.dispose();
      }
      mesh = new THREE.Mesh(createGeometry(type), createMaterial());
      scene.add(mesh);
    }

    let effect;

    function buildEffect() {
      const oldDom = effect ? effect.domElement : null;
      if (oldDom && oldDom.parentNode) oldDom.parentNode.removeChild(oldDom);

      effect = new AsciiEffect(
        renderer,
        CHARSETS[charsetEl.value],
        {
          invert: invertToggleEl.checked,
          color: colorToggleEl.checked,
          resolution: parseFloat(resolutionEl.value)
        }
      );

      effect.setSize(window.innerWidth, window.innerHeight);
      effect.domElement.style.color = '#ffffff';
      effect.domElement.style.backgroundColor = '#111111';
      effect.domElement.style.width = '100%';
      effect.domElement.style.height = '100%';
      effect.domElement.style.display = 'block';
      effect.domElement.style.overflow = 'hidden';

      container.appendChild(effect.domElement);
    }

    charsetEl.value = 'standard';
    resolutionEl.value = '0.16';
    invertToggleEl.checked = false;
    colorToggleEl.checked = true;
    objectSelectEl.value = 'torusKnot';

    rebuildObject(objectSelectEl.value);
    buildEffect();

    charsetEl.addEventListener('change', buildEffect);
    resolutionEl.addEventListener('input', buildEffect);
    invertToggleEl.addEventListener('change', buildEffect);
    colorToggleEl.addEventListener('change', buildEffect);
    objectSelectEl.addEventListener('change', () => rebuildObject(objectSelectEl.value));

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      effect.setSize(window.innerWidth, window.innerHeight);
    });

    window.__3D_STATE__ = {
      charset: charsetEl.value,
      resolution: parseFloat(resolutionEl.value),
      inverted: invertToggleEl.checked,
      colored: colorToggleEl.checked,
      objectType: objectSelectEl.value,
      fps: 60
    };

    let lastTime = performance.now();
    let fps = 60;

    function animate(now) {
      requestAnimationFrame(animate);

      const delta = Math.max(0.0001, (now - lastTime) / 1000);
      lastTime = now;
      fps = 1 / delta;

      if (mesh) {
        mesh.rotation.x += 0.35 * delta;
        mesh.rotation.y += 0.55 * delta;
      }

      effect.render(scene, camera);

      window.__3D_STATE__ = {
        charset: charsetEl.value,
        resolution: parseFloat(resolutionEl.value),
        inverted: invertToggleEl.checked,
        colored: colorToggleEl.checked,
        objectType: objectSelectEl.value,
        fps: Number.isFinite(fps) && fps > 0 ? fps : 60
      };
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
