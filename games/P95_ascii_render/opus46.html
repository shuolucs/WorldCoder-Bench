<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII 3D Scene</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #controls {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.85);
    border: 1px solid #0f0;
    border-radius: 8px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 220px;
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
  }
  #controls h3 {
    margin: 0 0 5px 0;
    color: #0f0;
    text-align: center;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid #0f033;
    padding-bottom: 8px;
  }
  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .control-row label {
    font-size: 12px;
    color: #0c0;
    white-space: nowrap;
  }
  select, input[type="range"] {
    background: #111;
    color: #0f0;
    border: 1px solid #0a0;
    border-radius: 4px;
    padding: 3px 5px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }
  select { width: 110px; }
  input[type="range"] { width: 100px; }
  input[type="checkbox"] {
    accent-color: #0f0;
    cursor: pointer;
    width: 16px;
    height: 16px;
  }
  #fpsDisplay {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.85);
    border: 1px solid #0f0;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    color: #0f0;
  }
  #ascii-container table {
    margin: 0 auto;
  }
</style>
</head>
<body>

<div id="controls">
  <h3>⬡ ASCII 3D</h3>
  <div class="control-row">
    <label for="objectSelect">Object:</label>
    <select id="objectSelect">
      <option value="torusKnot">Torus Knot</option>
      <option value="sphere">Sphere</option>
      <option value="cube">Cube</option>
    </select>
  </div>
  <div class="control-row">
    <label for="charset">Charset:</label>
    <select id="charset">
      <option value="standard">Standard</option>
      <option value="extended">Extended</option>
      <option value="minimal">Minimal</option>
    </select>
  </div>
  <div class="control-row">
    <label for="resolution">Resolution: <span id="resLabel">0.15</span></label>
    <input type="range" id="resolution" min="0.05" max="0.5" step="0.01" value="0.15">
  </div>
  <div class="control-row">
    <label for="invertToggle">Invert:</label>
    <input type="checkbox" id="invertToggle">
  </div>
  <div class="control-row">
    <label for="colorToggle">Color:</label>
    <input type="checkbox" id="colorToggle" checked>
  </div>
</div>

<div id="fpsDisplay">FPS: 0</div>
<div id="ascii-container"></div>

<script type="module">
import * as THREE from 'three';
import { AsciiEffect } from 'three/addons/effects/AsciiEffect.js';

// --- Charset definitions ---
const charsets = {
  standard: ' .:-+*=%@#',
  extended: ' .\'`^",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$',
  minimal: ' .:*#'
};

// --- State ---
window.__3D_STATE__ = {
  charset: 'standard',
  resolution: 0.15,
  inverted: false,
  colored: true,
  objectType: 'torusKnot',
  fps: 0
};

// --- Scene setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);

// --- Lights ---
const pointLight1 = new THREE.PointLight(0xff8866, 3, 50);
pointLight1.position.set(5, 5, 5);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x6688ff, 2, 50);
pointLight2.position.set(-5, -3, 3);
scene.add(pointLight2);

const ambientLight = new THREE.AmbientLight(0x333333);
scene.add(ambientLight);

// --- Geometries ---
const geometries = {
  torusKnot: new THREE.TorusKnotGeometry(1.2, 0.4, 128, 32),
  sphere: new THREE.SphereGeometry(1.5, 64, 64),
  cube: new THREE.BoxGeometry(2, 2, 2)
};

const material = new THREE.MeshStandardMaterial({
  color: 0x00ff88,
  metalness: 0.3,
  roughness: 0.4
});

let currentMesh = new THREE.Mesh(geometries.torusKnot, material);
scene.add(currentMesh);

// --- ASCII Effect ---
let effect = null;
const container = document.getElementById('ascii-container');

function createEffect() {
  const state = window.__3D_STATE__;
  const charsetStr = charsets[state.charset] || charsets.standard;

  // Remove old effect DOM
  while (container.firstChild) {
    container.removeChild(container.firstChild);
  }

  effect = new AsciiEffect(renderer, charsetStr, {
    invert: state.inverted,
    resolution: state.resolution,
    color: state.colored
  });

  effect.setSize(window.innerWidth, window.innerHeight);
  effect.domElement.style.color = state.colored ? '' : '#0f0';
  effect.domElement.style.backgroundColor = 'black';
  effect.domElement.style.overflow = 'hidden';
  effect.domElement.style.position = 'fixed';
  effect.domElement.style.top = '0';
  effect.domElement.style.left = '0';
  effect.domElement.style.width = '100%';
  effect.domElement.style.height = '100%';
  effect.domElement.style.zIndex = '0';

  container.appendChild(effect.domElement);
}

createEffect();

// --- Controls ---
const charsetSelect = document.getElementById('charset');
const resolutionSlider = document.getElementById('resolution');
const resLabel = document.getElementById('resLabel');
const invertToggle = document.getElementById('invertToggle');
const colorToggle = document.getElementById('colorToggle');
const objectSelect = document.getElementById('objectSelect');
const fpsDisplay = document.getElementById('fpsDisplay');

function rebuildEffect() {
  createEffect();
}

charsetSelect.addEventListener('change', (e) => {
  window.__3D_STATE__.charset = e.target.value;
  rebuildEffect();
});

resolutionSlider.addEventListener('input', (e) => {
  const val = parseFloat(e.target.value);
  window.__3D_STATE__.resolution = val;
  resLabel.textContent = val.toFixed(2);
  rebuildEffect();
});

invertToggle.addEventListener('change', (e) => {
  window.__3D_STATE__.inverted = e.target.checked;
  rebuildEffect();
});

colorToggle.addEventListener('change', (e) => {
  window.__3D_STATE__.colored = e.target.checked;
  rebuildEffect();
});

objectSelect.addEventListener('change', (e) => {
  const type = e.target.value;
  window.__3D_STATE__.objectType = type;

  scene.remove(currentMesh);
  currentMesh.geometry.dispose && false; // keep geometries reusable
  currentMesh = new THREE.Mesh(geometries[type], material);
  scene.add(currentMesh);
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (effect) {
    effect.setSize(window.innerWidth, window.innerHeight);
  }
});

// --- FPS tracking ---
let frameCount = 0;
let lastFpsTime = performance.now();
let currentFps = 0;

// --- Animation loop ---
function animate(time) {
  requestAnimationFrame(animate);

  // Rotate
  currentMesh.rotation.x += 0.005;
  currentMesh.rotation.y += 0.01;
  currentMesh.rotation.z += 0.003;

  // Animate lights slightly
  pointLight1.position.x = 5 * Math.cos(time * 0.001);
  pointLight1.position.y = 5 * Math.sin(time * 0.0007);
  pointLight2.position.x = -5 * Math.sin(time * 0.0008);
  pointLight2.position.z = 3 * Math.cos(time * 0.0006);

  // Render
  if (effect) {
    effect.render(scene, camera);
  }

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    frameCount = 0;
    lastFpsTime = now;
    fpsDisplay.textContent = `FPS: ${currentFps}`;
  }

  // Update state
  window.__3D_STATE__.fps = currentFps > 0 ? currentFps : 60;
}

requestAnimationFrame(animate);
</script>
</body>
</html>
