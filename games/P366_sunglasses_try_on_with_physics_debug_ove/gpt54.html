<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunglasses Virtual Try-On with Physics Debug</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
    }

    #debug-overlay {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 300px;
      background: #000000cc;
      color: white;
      padding: 15px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
      border-radius: 10px;
      z-index: 20;
      white-space: pre-line;
    }

    #controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 20;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      background: rgba(0,0,0,0.45);
      color: white;
      cursor: pointer;
      backdrop-filter: blur(4px);
      font-size: 14px;
    }

    button:hover {
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="debug-overlay">Initializing...</div>

  <div id="controls">
    <button id="btn-tryon">Try On</button>
    <button id="btn-remove">Remove</button>
    <button id="btn-reset">Reset Position</button>
    <button id="toggle-debug">Toggle Debug</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const debugOverlay = document.getElementById("debug-overlay");
    const btnTryOn = document.getElementById("btn-tryon");
    const btnRemove = document.getElementById("btn-remove");
    const btnReset = document.getElementById("btn-reset");
    const btnToggleDebug = document.getElementById("toggle-debug");

    const scene = new THREE.Scene();

    const bgCanvas = document.createElement("canvas");
    bgCanvas.width = 2;
    bgCanvas.height = 256;
    const bgCtx = bgCanvas.getContext("2d");
    const grad = bgCtx.createLinearGradient(0, 0, 0, 256);
    grad.addColorStop(0, "#1a1a2e");
    grad.addColorStop(1, "#16213e");
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, 2, 256);
    const bgTexture = new THREE.CanvasTexture(bgCanvas);
    scene.background = bgTexture;

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.6, 3);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.3, 0);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
    keyLight.position.set(3, 4, 2);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-2, 1, -1);
    scene.add(fillLight);

    const skinMat = new THREE.MeshStandardMaterial({ color: "#e8beac", roughness: 0.7, metalness: 0.05 });

    const headGroup = new THREE.Group();
    scene.add(headGroup);

    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.35, 32, 32),
      skinMat
    );
    head.position.set(0, 1.5, 0);

    const neck = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 0.4, 20),
      skinMat
    );
    neck.position.set(0, 1.1, 0);

    headGroup.add(head, neck);

    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(1.5, 1.5, 0.05, 64),
      new THREE.MeshStandardMaterial({
        color: "#8c95a3",
        metalness: 0.8,
        roughness: 0.25
      })
    );
    platform.position.y = 0;
    scene.add(platform);

    const sunglassesGroup = new THREE.Group();

    const frameMat = new THREE.MeshStandardMaterial({
      color: "#111111",
      metalness: 0.7,
      roughness: 0.3
    });

    const lensTints = [
      { color: "#222222", opacity: 0.7 },
      { color: "#1a3a5c", opacity: 0.6 },
      { color: "#5c1a1a", opacity: 0.6 }
    ];
    let lensTintIndex = 0;

    const lensMat = new THREE.MeshStandardMaterial({
      color: lensTints[0].color,
      transparent: true,
      opacity: lensTints[0].opacity,
      metalness: 0.1,
      roughness: 0.2
    });

    function createLensUnit(x) {
      const unit = new THREE.Group();

      const frame = new THREE.Mesh(
        new THREE.TorusGeometry(0.08, 0.015, 16, 48),
        frameMat
      );
      frame.position.x = x;

      const lens = new THREE.Mesh(
        new THREE.CircleGeometry(0.07, 32),
        lensMat
      );
      lens.position.set(x, 0, 0);
      lens.rotation.y = 0;

      unit.add(frame, lens);
      return { unit, lens };
    }

    const leftLensUnit = createLensUnit(-0.1);
    const rightLensUnit = createLensUnit(0.1);

    const bridge = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 0.012, 0.012),
      frameMat
    );

    const leftTemple = new THREE.Mesh(
      new THREE.CylinderGeometry(0.006, 0.006, 0.22, 12),
      frameMat
    );
    leftTemple.rotation.z = Math.PI / 2;
    leftTemple.rotation.y = 0.2;
    leftTemple.position.set(-0.195, 0, -0.07);

    const rightTemple = new THREE.Mesh(
      new THREE.CylinderGeometry(0.006, 0.006, 0.22, 12),
      frameMat
    );
    rightTemple.rotation.z = Math.PI / 2;
    rightTemple.rotation.y = -0.2;
    rightTemple.position.set(0.195, 0, -0.07);

    sunglassesGroup.add(leftLensUnit.unit, rightLensUnit.unit, bridge, leftTemple, rightTemple);
    scene.add(sunglassesGroup);

    const sunglassesHalfHeight = 0.09;
    const gravity = -9.81;
    const mass = 0.05;
    const bounceCoefficient = 0.3;
    const platformTopY = 0.05 / 2;
    const floorY = platformTopY + sunglassesHalfHeight;

    let velocity = new THREE.Vector3(0, 0, 0);
    let isWorn = false;
    let physicsPaused = false;
    let physicsSteps = 0;
    let collisionCount = 0;
    let debugVisible = true;
    let lanternLoaded = false;
    let headRotationYDeg = 0;
    let fps = 0;

    sunglassesGroup.position.set(0, 2.5, 0.33);

    window.__3D_STATE__ = {
      sunglassesPosition: { x: 0, y: 2.5, z: 0.33 },
      sunglassesVelocity: { x: 0, y: 0, z: 0 },
      isWorn: false,
      debugVisible: true,
      physicsActive: true,
      physicsSteps: 0,
      collisionCount: 0,
      lensTintIndex: 0,
      lanternLoaded: false,
      headRotationY: 0,
      fps: 0,
      bounceCoefficient: 0.3
    };

    function applyLensTint() {
      const tint = lensTints[lensTintIndex];
      lensMat.color.set(tint.color);
      lensMat.opacity = tint.opacity;
      lensMat.needsUpdate = true;
    }

    const loader = new GLTFLoader();
    loader.load(
      "Lantern.glb",
      (gltf) => {
        const lantern = gltf.scene;
        lantern.position.set(-1.5, 0, -1);
        lantern.scale.setScalar(0.5);
        scene.add(lantern);
        lanternLoaded = true;
      },
      undefined,
      () => {
        lanternLoaded = false;
      }
    );

    function getWearTargetWorldPosition() {
      const local = new THREE.Vector3(0, 1.58, 0.33);
      return local.applyAxisAngle(new THREE.Vector3(0, 1, 0), headGroup.rotation.y);
    }

    function updateDebugText() {
      const p = sunglassesGroup.position;
      debugOverlay.textContent =
`Gravity: ${gravity.toFixed(2)} m/s²
Velocity: (${velocity.x.toFixed(3)}, ${velocity.y.toFixed(3)}, ${velocity.z.toFixed(3)})
Position: (${p.x.toFixed(3)}, ${p.y.toFixed(3)}, ${p.z.toFixed(3)})
Mass: ${mass.toFixed(2)} kg
Bounce coefficient: ${bounceCoefficient.toFixed(1)}
Physics steps: ${physicsSteps}
FPS: ${fps.toFixed(1)}
Collision count: ${collisionCount}`;
    }

    function syncState() {
      const p = sunglassesGroup.position;
      window.__3D_STATE__ = {
        sunglassesPosition: {
          x: Number(p.x.toFixed(2)),
          y: Number(p.y.toFixed(2)),
          z: Number(p.z.toFixed(2))
        },
        sunglassesVelocity: {
          x: Number(velocity.x.toFixed(3)),
          y: Number(velocity.y.toFixed(3)),
          z: Number(velocity.z.toFixed(3))
        },
        isWorn,
        debugVisible,
        physicsActive: !isWorn && !physicsPaused,
        physicsSteps,
        collisionCount,
        lensTintIndex,
        lanternLoaded,
        headRotationY: Number(headRotationYDeg.toFixed(2)),
        fps: Number(fps.toFixed(1)),
        bounceCoefficient
      };
    }

    function toggleDebug() {
      debugVisible = !debugVisible;
      debugOverlay.style.display = debugVisible ? "block" : "none";
    }

    btnToggleDebug.addEventListener("click", toggleDebug);

    btnTryOn.addEventListener("click", () => {
      isWorn = true;
      velocity.set(0, 0, 0);
    });

    btnRemove.addEventListener("click", () => {
      isWorn = false;
    });

    btnReset.addEventListener("click", () => {
      sunglassesGroup.position.set(0, 2.5, 0.33);
      velocity.set(0, 0, 0);
      isWorn = false;
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "d") toggleDebug();

      if (key === "l") {
        lensTintIndex = (lensTintIndex + 1) % lensTints.length;
        applyLensTint();
      }

      if (key === "p") {
        physicsPaused = !physicsPaused;
      }

      if (key === "r") {
        headGroup.rotation.y += Math.PI / 4;
        headRotationYDeg += 45;
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    let fpsAccumulator = 0;
    let fpsFrames = 0;
    let fpsTimer = 0;

    function animate() {
      requestAnimationFrame(animate);

      const dtRaw = clock.getDelta();
      const dt = Math.min(dtRaw, 0.033);

      fpsAccumulator += dtRaw;
      fpsFrames++;
      fpsTimer += dtRaw;
      if (fpsTimer >= 0.5) {
        fps = fpsFrames / fpsAccumulator;
        fpsAccumulator = 0;
        fpsFrames = 0;
        fpsTimer = 0;
      }

      controls.update();

      if (isWorn) {
        const target = getWearTargetWorldPosition();
        sunglassesGroup.position.lerp(target, 0.1);
        sunglassesGroup.rotation.y = headGroup.rotation.y;
        velocity.set(0, 0, 0);
      } else if (!physicsPaused) {
        velocity.y += gravity * dt;
        sunglassesGroup.position.addScaledVector(velocity, dt);
        physicsSteps++;

        if (sunglassesGroup.position.y <= floorY) {
          sunglassesGroup.position.y = floorY;
          if (Math.abs(velocity.y) > 0.01) {
            collisionCount++;
          }
          velocity.y *= -bounceCoefficient;
          if (Math.abs(velocity.y) < 0.05) {
            velocity.y = 0;
          }
        }
      }

      updateDebugText();
      syncState();
      renderer.render(scene, camera);
    }

    applyLensTint();
    debugOverlay.style.display = "block";
    updateDebugText();
    syncState();
    animate();
  </script>
</body>
</html>
