<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Platformer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 18px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
        }
        #hud div { margin-bottom: 5px; }
        #hud span { font-weight: bold; color: #ffd700; }
        #victory {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-size: 72px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 4px 4px 10px rgba(0,0,0,0.8);
            display: none;
            pointer-events: none;
            text-align: center;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 14px;
            pointer-events: none;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Deaths: <span id="deaths">0</span></div>
        <div>Grounded: <span id="grounded">false</span></div>
        <div>Platform: <span id="currentPlatform">-1</span></div>
    </div>
    <div id="victory">VICTORY!<br><span style="font-size: 24px; color: white;">Respawning...</span></div>
    <div id="instructions">WASD to Move | SPACE to Jump | Drag Mouse to Rotate Camera</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            playerPos: { x: 0, y: 0, z: 0 },
            playerVel: { x: 0, y: 0, z: 0 },
            grounded: false,
            currentPlatform: -1,
            score: 0,
            deaths: 0,
            animState: 'idle',
            modelLoaded: false
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Abyss ---
        const abyssGeo = new THREE.PlaneGeometry(200, 200);
        const abyssMat = new THREE.MeshBasicMaterial({ color: 0x001133, transparent: true, opacity: 0.8 });
        const abyss = new THREE.Mesh(abyssGeo, abyssMat);
        abyss.rotation.x = -Math.PI / 2;
        abyss.position.y = -8;
        scene.add(abyss);

        // --- Platforms ---
        const platforms = [];
        const platGeo = new THREE.BoxGeometry(4, 0.5, 4);
        const platData = [
            { pos: [0, 0, 0], color: 0x44aa44 },       // 0: Start (Green)
            { pos: [6, 1, 0], color: 0x66bb66 },       // 1: Mid (Light Green)
            { pos: [12, 2.5, 3], color: 0x66bb66 },    // 2: Mid
            { pos: [6, 4, 6], color: 0x66bb66 },       // 3: Mid
            { pos: [0, 5.5, 3], color: 0x66bb66 },     // 4: Mid
            { pos: [6, 7, 0], color: 0xffd700 }        // 5: End (Gold)
        ];

        platData.forEach((data, index) => {
            const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.8 });
            const mesh = new THREE.Mesh(platGeo, mat);
            mesh.position.set(...data.pos);
            mesh.receiveShadow = true;
            mesh.castShadow = true;
            mesh.userData.index = index;
            scene.add(mesh);
            platforms.push(mesh);
        });

        // --- Player Setup ---
        const player = new THREE.Group();
        player.position.set(0, 0.25, 0); // Start on platform 0
        scene.add(player);

        let playerModel = null;
        let mixer = null;
        const actions = {};
        let currentAction = null;

        const loader = new GLTFLoader();
        loader.load('assets/3DGodotRobot.glb', (gltf) => {
            playerModel = gltf.scene;
            playerModel.scale.set(0.6, 0.6, 0.6);
            
            playerModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            player.add(playerModel);

            mixer = new THREE.AnimationMixer(playerModel);
            gltf.animations.forEach(clip => {
                const name = clip.name.toLowerCase();
                if (name.includes('idle')) actions.idle = mixer.clipAction(clip);
                if (name.includes('run')) actions.run = mixer.clipAction(clip);
                if (name.includes('jump')) actions.jump = mixer.clipAction(clip);
                if (name.includes('fall')) actions.fall = mixer.clipAction(clip);
            });

            if (actions.idle) {
                actions.idle.play();
                currentAction = actions.idle;
                window.__3D_STATE__.animState = 'idle';
            }
            window.__3D_STATE__.modelLoaded = true;
        });

        function fadeToAction(name, duration = 0.2) {
            const nextAction = actions[name];
            if (!nextAction || currentAction === nextAction) return;
            
            nextAction.reset().fadeIn(duration).play();
            if (currentAction) currentAction.fadeOut(duration);
            
            currentAction = nextAction;
            window.__3D_STATE__.animState = name;
        }

        // --- Input & Camera Control ---
        const keys = { w: false, a: false, s: false, d: false, space: false };
        let spacePressed = false;

        window.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = true;
            if (k === 'a') keys.a = true;
            if (k === 's') keys.s = true;
            if (k === 'd') keys.d = true;
            if (k === ' ' && !spacePressed) {
                keys.space = true;
                spacePressed = true;
            }
        });

        window.addEventListener('keyup', e => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = false;
            if (k === 'a') keys.a = false;
            if (k === 's') keys.s = false;
            if (k === 'd') keys.d = false;
            if (k === ' ') {
                keys.space = false;
                spacePressed = false;
            }
        });

        let camYaw = Math.PI / 4;
        let camPitch = 0.2;
        let isDragging = false;

        window.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', e => {
            if (isDragging) {
                camYaw -= e.movementX * 0.005;
                camPitch -= e.movementY * 0.005;
                camPitch = Math.max(-Math.PI / 2 + 0.1, Math.min(Math.PI / 2 - 0.1, camPitch));
            }
        });

        // --- Physics & Game Logic ---
        const playerVel = new THREE.Vector3(0, 0, 0);
        let grounded = false;
        let currentPlatform = -1;
        const gravity = 20;
        const jumpSpeed = 8;
        const moveSpeed = 5;
        let score = 0;
        let deaths = 0;
        let isWinning = false;

        const raycaster = new THREE.Raycaster();
        const downVector = new THREE.Vector3(0, -1, 0);
        const playerBox = new THREE.Box3();

        function checkWallCollision(box) {
            for (let plat of platforms) {
                const platBox = new THREE.Box3().setFromObject(plat);
                if (box.intersectsBox(platBox)) {
                    // Only block if player is not above the platform
                    if (player.position.y < plat.position.y + 0.25) {
                        return true;
                    }
                }
            }
            return false;
        }

        function resetPlayer() {
            player.position.set(0, 0.25, 0);
            playerVel.set(0, 0, 0);
            camYaw = Math.PI / 4;
            camPitch = 0.2;
            grounded = true;
        }

        function win() {
            isWinning = true;
            score++;
            document.getElementById('victory').style.display = 'block';
            fadeToAction('idle');
            
            setTimeout(() => {
                isWinning = false;
                document.getElementById('victory').style.display = 'none';
                resetPlayer();
            }, 3000);
        }

        function updatePhysics(dt) {
            if (isWinning || !window.__3D_STATE__.modelLoaded) return;

            // 1. Gravity
            playerVel.y -= gravity * dt;

            // 2. Movement Input
            const moveDir = new THREE.Vector3(0, 0, 0);
            if (keys.w) moveDir.z -= 1;
            if (keys.s) moveDir.z += 1;
            if (keys.a) moveDir.x -= 1;
            if (keys.d) moveDir.x += 1;

            let isMoving = false;
            if (moveDir.lengthSq() > 0) {
                moveDir.normalize();
                moveDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), camYaw);
                isMoving = true;

                // Smooth Rotation
                const targetAngle = Math.atan2(moveDir.x, moveDir.z);
                let diff = targetAngle - player.rotation.y;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                player.rotation.y += diff * 15 * dt;
            }

            const velX = moveDir.x * moveSpeed;
            const velZ = moveDir.z * moveSpeed;

            // 3. Horizontal Collision (AABB)
            // X Axis
            player.position.x += velX * dt;
            playerBox.setFromCenterAndSize(
                new THREE.Vector3(player.position.x, player.position.y + 0.5, player.position.z),
                new THREE.Vector3(0.6, 1.0, 0.6)
            );
            if (checkWallCollision(playerBox)) player.position.x -= velX * dt;

            // Z Axis
            player.position.z += velZ * dt;
            playerBox.setFromCenterAndSize(
                new THREE.Vector3(player.position.x, player.position.y + 0.5, player.position.z),
                new THREE.Vector3(0.6, 1.0, 0.6)
            );
            if (checkWallCollision(playerBox)) player.position.z -= velZ * dt;

            // 4. Vertical Movement & Grounded Check
            player.position.y += playerVel.y * dt;
            
            // Raycast from slightly above player's feet
            raycaster.set(new THREE.Vector3(player.position.x, player.position.y + 0.3, player.position.z), downVector);
            const intersects = raycaster.intersectObjects(platforms);
            
            grounded = false;
            currentPlatform = -1;

            if (playerVel.y <= 0 && intersects.length > 0) {
                const hit = intersects[0];
                if (hit.distance <= 0.31) { // 0.3 (ray start height) + 0.01 (tolerance)
                    grounded = true;
                    playerVel.y = 0;
                    player.position.y = hit.point.y;
                    currentPlatform = hit.object.userData.index;
                }
            }

            // 5. Jump
            if (grounded && keys.space) {
                playerVel.y = jumpSpeed;
                grounded = false;
                keys.space = false; // Prevent holding space to bounce
            }

            // 6. Animation State
            if (!grounded) {
                if (playerVel.y > 0) fadeToAction('jump');
                else fadeToAction('fall');
            } else {
                if (isMoving) fadeToAction('run');
                else fadeToAction('idle');
            }

            // 7. Death Check
            if (player.position.y < -10) {
                deaths++;
                resetPlayer();
            }

            // 8. Win Check
            if (grounded && currentPlatform === 5 && !isWinning) {
                win();
            }
        }

        function updateCamera() {
            const dist = 9;
            const targetY = player.position.y + 1.5; // Look at player's upper body
            
            const camX = player.position.x + dist * Math.sin(camYaw) * Math.cos(camPitch);
            const camY = targetY + dist * Math.sin(camPitch);
            const camZ = player.position.z + dist * Math.cos(camYaw) * Math.cos(camPitch);
            
            camera.position.set(camX, camY, camZ);
            camera.lookAt(player.position.x, targetY, player.position.z);
        }

        function updateHUD() {
            document.getElementById('score').innerText = score;
            document.getElementById('deaths').innerText = deaths;
            document.getElementById('grounded').innerText = grounded;
            document.getElementById('currentPlatform').innerText = currentPlatform;

            window.__3D_STATE__.playerPos = { x: player.position.x, y: player.position.y, z: player.position.z };
            window.__3D_STATE__.playerVel = { x: playerVel.x, y: playerVel.y, z: playerVel.z };
            window.__3D_STATE__.grounded = grounded;
            window.__3D_STATE__.currentPlatform = currentPlatform;
            window.__3D_STATE__.score = score;
            window.__3D_STATE__.deaths = deaths;
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent tunneling
            
            if (mixer) mixer.update(dt);
            
            updatePhysics(dt);
            updateCamera();
            updateHUD();
            
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
