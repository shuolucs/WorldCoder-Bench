<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Platform Jumper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #fff;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 16px;
  background: rgba(0,0,0,0.6);
  padding: 15px 20px;
  border-radius: 10px;
  line-height: 1.8;
  pointer-events: none;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  min-width: 200px;
}
#hud .label { color: #aaa; }
#hud .value { color: #fff; font-weight: bold; }
#victory {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ffd700;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 48px;
  font-weight: bold;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.8), 0 0 30px rgba(255,215,0,0.5);
  display: none;
  pointer-events: none;
  text-align: center;
}
#instructions {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 14px;
  background: rgba(0,0,0,0.5);
  padding: 10px 20px;
  border-radius: 8px;
  pointer-events: none;
  text-align: center;
}
#loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 24px;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="hud">
  <div><span class="label">Score: </span><span class="value" id="score">0</span></div>
  <div><span class="label">Deaths: </span><span class="value" id="deaths">0</span></div>
  <div><span class="label">Grounded: </span><span class="value" id="grounded">false</span></div>
  <div><span class="label">Platform: </span><span class="value" id="currentPlatform">-1</span></div>
</div>
<div id="victory">🏆 Victory! 🏆<br><span style="font-size:24px;">Respawning in 3s...</span></div>
<div id="instructions">WASD - Move | Space - Jump | Mouse - Look Around | Click to capture mouse</div>
<div id="loading">Loading model...</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x6688cc, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x444422, 0.4);
scene.add(hemiLight);

// ============ PLATFORMS ============
const platformData = [
  { pos: new THREE.Vector3(0, 0, 0), color: 0x44aa44, label: 'Start' },
  { pos: new THREE.Vector3(6, 1, 0), color: 0x66bb66 },
  { pos: new THREE.Vector3(12, 2.5, 3), color: 0x66bb66 },
  { pos: new THREE.Vector3(6, 4, 6), color: 0x66bb66 },
  { pos: new THREE.Vector3(0, 5.5, 3), color: 0x66bb66 },
  { pos: new THREE.Vector3(6, 7, 0), color: 0xffd700, label: 'Goal' },
];

const platformSize = { x: 4, y: 0.5, z: 4 };
const platforms = [];
const platformMeshes = [];

platformData.forEach((data, index) => {
  const geo = new THREE.BoxGeometry(platformSize.x, platformSize.y, platformSize.z);
  const mat = new THREE.MeshStandardMaterial({
    color: data.color,
    roughness: 0.6,
    metalness: index === 5 ? 0.5 : 0.1,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(data.pos);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData.platformIndex = index;
  scene.add(mesh);
  platformMeshes.push(mesh);

  // Edge highlight
  const edges = new THREE.EdgesGeometry(geo);
  const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 });
  const line = new THREE.LineSegments(edges, lineMat);
  mesh.add(line);

  // Shadow below platform
  const shadowGeo = new THREE.PlaneGeometry(platformSize.x * 0.9, platformSize.z * 0.9);
  const shadowMat = new THREE.MeshBasicMaterial({
    color: 0x000000,
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide,
  });
  const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
  shadowMesh.rotation.x = -Math.PI / 2;
  shadowMesh.position.set(data.pos.x, data.pos.y - platformSize.y / 2 - 0.01, data.pos.z);
  scene.add(shadowMesh);

  // AABB for collision
  platforms.push({
    index: index,
    mesh: mesh,
    min: new THREE.Vector3(
      data.pos.x - platformSize.x / 2,
      data.pos.y - platformSize.y / 2,
      data.pos.z - platformSize.z / 2
    ),
    max: new THREE.Vector3(
      data.pos.x + platformSize.x / 2,
      data.pos.y + platformSize.y / 2,
      data.pos.z + platformSize.z / 2
    ),
  });
});

// Gold platform glow effect
const goalPlatform = platformMeshes[5];
const glowGeo = new THREE.BoxGeometry(platformSize.x + 0.2, platformSize.y + 0.2, platformSize.z + 0.2);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0xffd700,
  transparent: true,
  opacity: 0.15,
});
const glowMesh = new THREE.Mesh(glowGeo, glowMat);
goalPlatform.add(glowMesh);

// ============ ABYSS PLANE ============
const abyssGeo = new THREE.PlaneGeometry(200, 200);
const abyssMat = new THREE.MeshBasicMaterial({
  color: 0x1a1a3e,
  transparent: true,
  opacity: 0.5,
  side: THREE.DoubleSide,
});
const abyssPlane = new THREE.Mesh(abyssGeo, abyssMat);
abyssPlane.rotation.x = -Math.PI / 2;
abyssPlane.position.y = -15;
scene.add(abyssPlane);

// Decorative particles
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 40;
  particlePositions[i * 3 + 1] = Math.random() * 15 - 5;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.08,
  transparent: true,
  opacity: 0.6,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============ GAME STATE ============
let score = 0;
let deaths = 0;
let grounded = false;
let currentPlatformIndex = -1;
let animState = 'idle';
let modelLoaded = false;
let victoryActive = false;

const playerPos = new THREE.Vector3(0, 1.5, 0);
const playerVel = new THREE.Vector3(0, 0, 0);
const playerRadius = 0.3;
const playerHeight = 1.5;
const moveSpeed = 5;
const jumpSpeed = 8;
const gravity = 20;

const spawnPos = new THREE.Vector3(0, 1.5, 0);

// Camera
let cameraYaw = 0;
const cameraPitch = 0.3;
const cameraDistance = 9;

// Input
const keys = {};
let mouseDown = false;
let pointerLocked = false;

window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

renderer.domElement.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
});

document.addEventListener('mousemove', (e) => {
  if (pointerLocked) {
    cameraYaw -= e.movementX * 0.003;
  }
});

renderer.domElement.addEventListener('mousedown', () => { mouseDown = true; });
renderer.domElement.addEventListener('mouseup', () => { mouseDown = false; });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ STATE EXPOSURE ============
window.__3D_STATE__ = {
  playerPos: { x: 0, y: 0, z: 0 },
  playerVel: { x: 0, y: 0, z: 0 },
  grounded: false,
  currentPlatform: -1,
  score: 0,
  deaths: 0,
  animState: 'idle',
  modelLoaded: false,
};

// ============ LOAD CHARACTER ============
let characterModel = null;
let mixer = null;
const animations = {};
let currentAction = null;

// Placeholder character (capsule) while model loads
const placeholderGeo = new THREE.CapsuleGeometry(playerRadius, playerHeight - playerRadius * 2, 8, 16);
const placeholderMat = new THREE.MeshStandardMaterial({ color: 0x4488ff, roughness: 0.5 });
const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
placeholder.castShadow = true;
placeholder.position.copy(playerPos);
scene.add(placeholder);

const loader = new GLTFLoader();
loader.load(
  'assets/3DGodotRobot.glb',
  (gltf) => {
    characterModel = gltf.scene;
    characterModel.scale.set(0.6, 0.6, 0.6);
    characterModel.castShadow = true;
    characterModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(characterModel);
    scene.remove(placeholder);

    // Setup animation mixer
    mixer = new THREE.AnimationMixer(characterModel);

    // Find animations
    const animNames = ['idle', 'run', 'jump', 'fall'];
    gltf.animations.forEach((clip) => {
      const clipNameLower = clip.name.toLowerCase();
      for (const name of animNames) {
        if (clipNameLower.includes(name)) {
          animations[name] = mixer.clipAction(clip);
          if (name === 'jump' || name === 'fall') {
            animations[name].setLoop(THREE.LoopOnce);
            animations[name].clampWhenFinished = true;
          }
        }
      }
    });

    // Start with idle
    if (animations.idle) {
      currentAction = animations.idle;
      currentAction.play();
    }

    modelLoaded = true;
    document.getElementById('loading').style.display = 'none';
    console.log('Model loaded. Animations found:', Object.keys(animations));
    console.log('All animation clips:', gltf.animations.map(a => a.name));
  },
  (progress) => {
    const pct = progress.total > 0 ? Math.round(progress.loaded / progress.total * 100) : '...';
    document.getElementById('loading').textContent = `Loading model... ${pct}%`;
  },
  (error) => {
    console.error('Error loading model:', error);
    document.getElementById('loading').textContent = 'Model load failed. Using placeholder.';
    modelLoaded = true; // continue with placeholder
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
    }, 2000);
  }
);

function switchAnimation(name) {
  if (animState === name) return;
  animState = name;

  if (!animations[name] || !currentAction) return;

  const newAction = animations[name];
  if (newAction === currentAction) return;

  newAction.reset();
  newAction.play();
  currentAction.crossFadeTo(newAction, 0.2, true);
  currentAction = newAction;
}

// ============ RAYCASTER FOR GROUND CHECK ============
const downRay = new THREE.Raycaster();
const downDir = new THREE.Vector3(0, -1, 0);

function checkGrounded() {
  const footPos = new THREE.Vector3(playerPos.x, playerPos.y - playerHeight / 2 + 0.05, playerPos.z);
  downRay.set(footPos, downDir);
  downRay.far = 0.3;

  const intersects = downRay.intersectObjects(platformMeshes);
  if (intersects.length > 0) {
    const hit = intersects[0];
    // Check if we hit the top face (normal pointing up)
    if (hit.face && hit.face.normal.y > 0.5) {
      const platformIdx = hit.object.userData.platformIndex;
      const platTop = platforms[platformIdx].max.y;
      // Snap to platform top
      if (playerVel.y <= 0.1) {
        playerPos.y = platTop + playerHeight / 2;
        playerVel.y = 0;
        grounded = true;
        currentPlatformIndex = platformIdx;
        return;
      }
    }
  }

  // Additional check: are we very close to standing on a platform?
  for (let i = 0; i < platforms.length; i++) {
    const p = platforms[i];
    const platTop = p.max.y;
    const footY = playerPos.y - playerHeight / 2;

    if (playerPos.x >= p.min.x + playerRadius * 0.5 &&
        playerPos.x <= p.max.x - playerRadius * 0.5 &&
        playerPos.z >= p.min.z + playerRadius * 0.5 &&
        playerPos.z <= p.max.z - playerRadius * 0.5 &&
        footY >= platTop - 0.15 && footY <= platTop + 0.15 &&
        playerVel.y <= 0.1) {
      playerPos.y = platTop + playerHeight / 2;
      playerVel.y = 0;
      grounded = true;
      currentPlatformIndex = i;
      return;
    }
  }

  grounded = false;
  currentPlatformIndex = -1;
}

// ============ HORIZONTAL COLLISION ============
function resolveHorizontalCollision() {
  const halfH = playerHeight / 2;
  const r = playerRadius;

  for (const p of platforms) {
    // Check if player AABB overlaps platform AABB
    const pMinX = playerPos.x - r;
    const pMaxX = playerPos.x + r;
    const pMinY = playerPos.y - halfH;
    const pMaxY = playerPos.y + halfH;
    const pMinZ = playerPos.z - r;
    const pMaxZ = playerPos.z + r;

    if (pMaxX > p.min.x && pMinX < p.max.x &&
        pMaxY > p.min.y && pMinY < p.max.y &&
        pMaxZ > p.min.z && pMinZ < p.max.z) {

      // Calculate overlap on each axis
      const overlapLeft = pMaxX - p.min.x;
      const overlapRight = p.max.x - pMinX;
      const overlapBottom = pMaxY - p.min.y;
      const overlapTop = p.max.y - pMinY;
      const overlapFront = pMaxZ - p.min.z;
      const overlapBack = p.max.z - pMinZ;

      const minOverlapX = Math.min(overlapLeft, overlapRight);
      const minOverlapY = Math.min(overlapBottom, overlapTop);
      const minOverlapZ = Math.min(overlapFront, overlapBack);

      // Push out along the axis with smallest overlap
      if (minOverlapX < minOverlapY && minOverlapX < minOverlapZ) {
        if (overlapLeft < overlapRight) {
          playerPos.x = p.min.x - r;
        } else {
          playerPos.x = p.max.x + r;
        }
        playerVel.x = 0;
      } else if (minOverlapZ < minOverlapY) {
        if (overlapFront < overlapBack) {
          playerPos.z = p.min.z - r;
        } else {
          playerPos.z = p.max.z + r;
        }
        playerVel.z = 0;
      } else {
        // Y axis - handle head bump or landing
        if (overlapBottom < overlapTop) {
          // Hitting bottom of platform (head bump)
          playerPos.y = p.min.y - halfH;
          playerVel.y = Math.min(playerVel.y, 0);
        } else {
          // Landing on top
          playerPos.y = p.max.y + halfH;
          playerVel.y = 0;
          grounded = true;
          currentPlatformIndex = p.index;
        }
      }
    }
  }
}

// ============ RESPAWN ============
function respawn() {
  playerPos.copy(spawnPos);
  playerVel.set(0, 0, 0);
  grounded = true;
  currentPlatformIndex = 0;
}

// ============ VICTORY ============
function triggerVictory() {
  if (victoryActive) return;
  victoryActive = true;
  score++;
  document.getElementById('victory').style.display = 'block';
  setTimeout(() => {
    document.getElementById('victory').style.display = 'none';
    victoryActive = false;
    respawn();
  }, 3000);
}

// ============ GAME LOOP ============
const clock = new THREE.Clock();
let lastTime = 0;

function update() {
  requestAnimationFrame(update);

  let dt = clock.getDelta();
  if (dt > 0.05) dt = 0.05; // Cap delta time

  // Update mixer
  if (mixer) mixer.update(dt);

  // ---- Movement ----
  const forward = new THREE.Vector3(-Math.sin(cameraYaw), 0, -Math.cos(cameraYaw));
  const right = new THREE.Vector3(forward.z, 0, -forward.x);

  let moveDir = new THREE.Vector3(0, 0, 0);
  if (keys['KeyW'] || keys['ArrowUp']) moveDir.add(forward);
  if (keys['KeyS'] || keys['ArrowDown']) moveDir.sub(forward);
  if (keys['KeyA'] || keys['ArrowLeft']) moveDir.sub(right);
  if (keys['KeyD'] || keys['ArrowRight']) moveDir.add(right);

  const isMoving = moveDir.lengthSq() > 0.001;
  if (isMoving) {
    moveDir.normalize();
    playerVel.x = moveDir.x * moveSpeed;
    playerVel.z = moveDir.z * moveSpeed;
  } else {
    playerVel.x = 0;
    playerVel.z = 0;
  }

  // Jump
  if ((keys['Space']) && grounded && !victoryActive) {
    playerVel.y = jumpSpeed;
    grounded = false;
    currentPlatformIndex = -1;
  }

  // Gravity
  if (!grounded) {
    playerVel.y -= gravity * dt;
  }

  // Apply velocity
  playerPos.x += playerVel.x * dt;
  playerPos.y += playerVel.y * dt;
  playerPos.z += playerVel.z * dt;

  // Ground check
  checkGrounded();

  // Horizontal collision
  resolveHorizontalCollision();

  // ---- Death check ----
  if (playerPos.y < -10) {
    deaths++;
    respawn();
  }

  // ---- Victory check ----
  if (grounded && currentPlatformIndex === 5) {
    triggerVictory();
  }

  // ---- Update character model ----
  if (characterModel) {
    characterModel.position.set(playerPos.x, playerPos.y - playerHeight / 2, playerPos.z);

    // Face movement direction
    if (isMoving) {
      const targetAngle = Math.atan2(moveDir.x, moveDir.z);
      let currentAngle = characterModel.rotation.y;
      let diff = targetAngle - currentAngle;
      // Normalize angle difference
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      characterModel.rotation.y += diff * Math.min(1, dt * 15);
    }

    // Animation state
    if (grounded) {
      if (isMoving) {
        switchAnimation('run');
      } else {
        switchAnimation('idle');
      }
    } else {
      if (playerVel.y > 0) {
        switchAnimation('jump');
      } else {
        switchAnimation('fall');
      }
    }
  } else {
    // Update placeholder
    placeholder.position.copy(playerPos);
  }

  // ---- Camera ----
  const camOffset = new THREE.Vector3(
    Math.sin(cameraYaw) * cameraDistance * Math.cos(cameraPitch),
    cameraDistance * Math.sin(cameraPitch) + 2,
    Math.cos(cameraYaw) * cameraDistance * Math.cos(cameraPitch)
  );
  const targetCamPos = new THREE.Vector3().copy(playerPos).add(camOffset);
  camera.position.lerp(targetCamPos, 1 - Math.pow(0.01, dt));

  const lookTarget = new THREE.Vector3(playerPos.x, playerPos.y + 0.5, playerPos.z);
  camera.lookAt(lookTarget);

  // ---- Animate particles ----
  const positions = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3 + 1] += Math.sin(Date.now() * 0.001 + i) * 0.003;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // ---- Animate gold platform glow ----
  glowMat.opacity = 0.1 + Math.sin(Date.now() * 0.003) * 0.08;

  // ---- Update HUD ----
  document.getElementById('score').textContent = score;
  document.getElementById('deaths').textContent = deaths;
  document.getElementById('grounded').textContent = grounded;
  document.getElementById('currentPlatform').textContent = currentPlatformIndex;

  // ---- Update state ----
  window.__3D_STATE__ = {
    playerPos: { x: playerPos.x, y: playerPos.y, z: playerPos.z },
    playerVel: { x: playerVel.x, y: playerVel.y, z: playerVel.z },
    grounded: grounded,
    currentPlatform: currentPlatformIndex,
    score: score,
    deaths: deaths,
    animState: animState,
    modelLoaded: modelLoaded,
  };

  // ---- Render ----
  renderer.render(scene, camera);
}

// Start
update();
</script>
</body>
</html>
