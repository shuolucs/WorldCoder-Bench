<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 平台跳跃</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #87CEEB;
    }

    body {
      position: relative;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.7;
      font-size: 14px;
      backdrop-filter: blur(4px);
      user-select: none;
    }

    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      color: white;
      font-size: 36px;
      font-weight: bold;
      padding: 18px 28px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.35);
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
      display: none;
      pointer-events: none;
    }

    #hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.28);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      user-select: none;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div>得分: <span id="score">0</span></div>
    <div>死亡次数: <span id="deaths">0</span></div>
    <div>grounded: <span id="grounded">false</span></div>
    <div>当前平台: <span id="currentPlatform">-1</span></div>
  </div>

  <div id="message">胜利！</div>
  <div id="hint">WASD 移动，空格跳跃，拖拽鼠标旋转视角</div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );

    const clock = new THREE.Clock();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(10, 20, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -30;
    dirLight.shadow.camera.right = 30;
    dirLight.shadow.camera.top = 30;
    dirLight.shadow.camera.bottom = -30;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 80;
    scene.add(dirLight);

    const abyss = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshPhongMaterial({
        color: 0x223344,
        transparent: true,
        opacity: 0.35,
        side: THREE.DoubleSide
      })
    );
    abyss.rotation.x = -Math.PI / 2;
    abyss.position.y = -12;
    scene.add(abyss);

    const platformPositions = [
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(6, 1, 0),
      new THREE.Vector3(12, 2.5, 3),
      new THREE.Vector3(6, 4, 6),
      new THREE.Vector3(0, 5.5, 3),
      new THREE.Vector3(6, 7, 0)
    ];

    const PLATFORM_SIZE = new THREE.Vector3(4, 0.5, 4);
    const HALF_PLATFORM = new THREE.Vector3(
      PLATFORM_SIZE.x / 2,
      PLATFORM_SIZE.y / 2,
      PLATFORM_SIZE.z / 2
    );

    const platforms = [];
    const platformMeshes = [];

    const platformGeo = new THREE.BoxGeometry(PLATFORM_SIZE.x, PLATFORM_SIZE.y, PLATFORM_SIZE.z);

    function createPlatform(index, position) {
      let color = 0x66bb66;
      if (index === 0) color = 0x44aa44;
      if (index === 5) color = 0xffd700;

      const mat = new THREE.MeshStandardMaterial({ color });
      const mesh = new THREE.Mesh(platformGeo, mat);
      mesh.position.copy(position);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      const shadow = new THREE.Mesh(
        new THREE.PlaneGeometry(4.2, 4.2),
        new THREE.MeshBasicMaterial({
          color: 0x000000,
          transparent: true,
          opacity: 0.14,
          depthWrite: false
        })
      );
      shadow.rotation.x = -Math.PI / 2;
      shadow.position.set(position.x, position.y - HALF_PLATFORM.y - 0.01, position.z);
      scene.add(shadow);

      const box = new THREE.Box3().setFromCenterAndSize(position, PLATFORM_SIZE.clone());

      platforms.push({
        index,
        mesh,
        box,
        topY: position.y + HALF_PLATFORM.y,
        minX: position.x - HALF_PLATFORM.x,
        maxX: position.x + HALF_PLATFORM.x,
        minZ: position.z - HALF_PLATFORM.z,
        maxZ: position.z + HALF_PLATFORM.z
      });

      platformMeshes.push(mesh);
    }

    platformPositions.forEach((pos, i) => createPlatform(i, pos));

    const player = {
      object: new THREE.Group(),
      model: null,
      mixer: null,
      actions: {},
      currentAction: null,
      animState: 'idle',
      velocity: new THREE.Vector3(),
      moveSpeed: 5,
      jumpSpeed: 8,
      gravity: 20,
      radius: 0.45,
      halfHeight: 0.95,
      grounded: true,
      currentPlatform: 0,
      modelLoaded: false
    };

    scene.add(player.object);
    player.object.position.set(0, 1.5, 0);

    const placeholder = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.35, 1.0, 4, 8),
      new THREE.MeshStandardMaterial({ color: 0xdddddd })
    );
    placeholder.castShadow = true;
    placeholder.receiveShadow = true;
    player.object.add(placeholder);

    const loader = new GLTFLoader();
    loader.load(
      'assets/3DGodotRobot.glb',
      (gltf) => {
        player.model = gltf.scene;
        player.model.scale.setScalar(0.65);
        player.model.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        player.object.remove(placeholder);
        player.object.add(player.model);

        player.mixer = new THREE.AnimationMixer(player.model);

        const clips = gltf.animations || [];

        function findClip(keyword) {
          const lower = keyword.toLowerCase();
          return clips.find(c => c.name.toLowerCase().includes(lower));
        }

        const clipMap = {
          idle: findClip('idle'),
          run: findClip('run') || findClip('walk'),
          jump: findClip('jump'),
          fall: findClip('fall')
        };

        for (const key in clipMap) {
          if (clipMap[key]) {
            player.actions[key] = player.mixer.clipAction(clipMap[key]);
            player.actions[key].enabled = true;
            player.actions[key].setLoop(THREE.LoopRepeat);
          }
        }

        if (player.actions.idle) {
          player.currentAction = player.actions.idle;
          player.currentAction.play();
          player.animState = 'idle';
        }

        player.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.error('模型加载失败:', err);
      }
    );

    function setAnimation(name) {
      if (!player.mixer || !player.actions[name]) return;
      const next = player.actions[name];
      if (player.currentAction === next) return;

      next.reset().play();
      if (player.currentAction) {
        player.currentAction.crossFadeTo(next, 0.2, false);
      }
      player.currentAction = next;
      player.animState = name;
    }

    const keys = {};
    let jumpQueued = false;

    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'Space') {
        e.preventDefault();
        jumpQueued = true;
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    let camYaw = Math.PI;
    let camPitch = 0.45;
    let dragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;

    renderer.domElement.addEventListener('mousedown', (e) => {
      dragging = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });

    window.addEventListener('mouseup', () => {
      dragging = false;
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - lastMouseX;
      const dy = e.clientY - lastMouseY;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;

      camYaw -= dx * 0.005;
      camPitch -= dy * 0.003;
      camPitch = THREE.MathUtils.clamp(camPitch, 0.15, 1.1);
    });

    const scoreEl = document.getElementById('score');
    const deathsEl = document.getElementById('deaths');
    const groundedEl = document.getElementById('grounded');
    const currentPlatformEl = document.getElementById('currentPlatform');
    const messageEl = document.getElementById('message');

    let score = 0;
    let deaths = 0;
    let winLock = false;

    const downRay = new THREE.Raycaster();
    const tempVec = new THREE.Vector3();
    const forward = new THREE.Vector3();
    const right = new THREE.Vector3();
    const moveDir = new THREE.Vector3();
    const camTarget = new THREE.Vector3();
    const camPos = new THREE.Vector3();

    function respawn() {
      player.object.position.set(0, 1.5, 0);
      player.velocity.set(0, 0, 0);
      player.grounded = true;
      player.currentPlatform = 0;
    }

    function detectPlatformUnderfoot(maxDistance = 0.3) {
      const origin = player.object.position.clone();
      origin.y -= player.halfHeight - 0.05;

      downRay.set(origin, new THREE.Vector3(0, -1, 0));
      downRay.far = maxDistance;

      const hits = downRay.intersectObjects(platformMeshes, false);
      if (hits.length === 0) return null;

      const hit = hits[0];
      const index = platformMeshes.indexOf(hit.object);
      return index >= 0 ? platforms[index] : null;
    }

    function horizontalCollisions(prevPos, nextPos) {
      for (const p of platforms) {
        const top = p.topY;
        const bottom = p.topY - PLATFORM_SIZE.y;

        const playerBottom = nextPos.y - player.halfHeight;
        const playerTop = nextPos.y + player.halfHeight;

        const verticalOverlap = playerTop > bottom && playerBottom < top;
        if (!verticalOverlap) continue;

        const expandedMinX = p.minX - player.radius;
        const expandedMaxX = p.maxX + player.radius;
        const expandedMinZ = p.minZ - player.radius;
        const expandedMaxZ = p.maxZ + player.radius;

        const insideX = nextPos.x > expandedMinX && nextPos.x < expandedMaxX;
        const insideZ = nextPos.z > expandedMinZ && nextPos.z < expandedMaxZ;

        if (!insideX || !insideZ) continue;

        const prevInsideX = prevPos.x > expandedMinX && prevPos.x < expandedMaxX;
        const prevInsideZ = prevPos.z > expandedMinZ && prevPos.z < expandedMaxZ;

        if (!(prevInsideX && prevInsideZ)) {
          const pushLeft = Math.abs(nextPos.x - expandedMinX);
          const pushRight = Math.abs(expandedMaxX - nextPos.x);
          const pushFront = Math.abs(nextPos.z - expandedMinZ);
          const pushBack = Math.abs(expandedMaxZ - nextPos.z);

          const minPush = Math.min(pushLeft, pushRight, pushFront, pushBack);

          if (minPush === pushLeft) nextPos.x = expandedMinX;
          else if (minPush === pushRight) nextPos.x = expandedMaxX;
          else if (minPush === pushFront) nextPos.z = expandedMinZ;
          else nextPos.z = expandedMaxZ;
        }
      }
    }

    function getCameraBasis() {
      forward.set(Math.sin(camYaw), 0, Math.cos(camYaw)).normalize();
      right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize().negate();
    }

    function updatePlayer(dt) {
      const prevPos = player.object.position.clone();

      getCameraBasis();
      moveDir.set(0, 0, 0);

      if (keys['KeyW']) moveDir.add(forward);
      if (keys['KeyS']) moveDir.sub(forward);
      if (keys['KeyA']) moveDir.sub(right);
      if (keys['KeyD']) moveDir.add(right);

      let hasMoveInput = moveDir.lengthSq() > 0;
      if (hasMoveInput) {
        moveDir.normalize();
      }

      player.velocity.x = hasMoveInput ? moveDir.x * player.moveSpeed : 0;
      player.velocity.z = hasMoveInput ? moveDir.z * player.moveSpeed : 0;

      if (jumpQueued && player.grounded) {
        player.velocity.y = player.jumpSpeed;
        player.grounded = false;
        player.currentPlatform = -1;
      }
      jumpQueued = false;

      if (!player.grounded) {
        player.velocity.y -= player.gravity * dt;
      }

      const nextPos = player.object.position.clone();
      nextPos.x += player.velocity.x * dt;
      nextPos.z += player.velocity.z * dt;

      horizontalCollisions(prevPos, nextPos);

      nextPos.y += player.velocity.y * dt;

      player.object.position.copy(nextPos);

      let landedPlatform = null;

      if (player.velocity.y <= 0) {
        landedPlatform = detectPlatformUnderfoot(0.35 + Math.max(0, -player.velocity.y * dt));
        if (landedPlatform) {
          player.object.position.y = landedPlatform.topY + player.halfHeight;
          player.velocity.y = 0;
          player.grounded = true;
          player.currentPlatform = landedPlatform.index;
        } else {
          player.grounded = false;
          player.currentPlatform = -1;
        }
      } else {
        const under = detectPlatformUnderfoot(0.3);
        if (under && Math.abs((player.object.position.y - player.halfHeight) - under.topY) < 0.08) {
          player.grounded = true;
          player.currentPlatform = under.index;
          player.velocity.y = 0;
          player.object.position.y = under.topY + player.halfHeight;
        } else {
          player.grounded = false;
          player.currentPlatform = -1;
        }
      }

      if (hasMoveInput) {
        const targetYaw = Math.atan2(moveDir.x, moveDir.z);
        player.object.rotation.y = THREE.MathUtils.lerpAngle(player.object.rotation.y, targetYaw, 0.18);
      }

      if (player.object.position.y < -10) {
        deaths++;
        respawn();
      }

      if (player.currentPlatform === 5 && player.grounded && !winLock) {
        winLock = true;
        score++;
        messageEl.style.display = 'block';
        setTimeout(() => {
          messageEl.style.display = 'none';
          respawn();
          winLock = false;
        }, 3000);
      }

      if (player.grounded) {
        if (hasMoveInput) setAnimation('run');
        else setAnimation('idle');
      } else {
        if (player.velocity.y > 0.2) setAnimation('jump');
        else setAnimation('fall');
      }
    }

    function updateCamera(dt) {
      const target = player.object.position.clone();
      target.y += 1.2;
      camTarget.lerp(target, 1 - Math.pow(0.001, dt));

      const dist = 9;
      const horizontalDist = Math.cos(camPitch) * dist;
      const vertical = Math.sin(camPitch) * dist + 1.8;

      camPos.set(
        camTarget.x + Math.sin(camYaw) * horizontalDist,
        camTarget.y + vertical,
        camTarget.z + Math.cos(camYaw) * horizontalDist
      );

      camera.position.lerp(camPos, 1 - Math.pow(0.001, dt));
      camera.lookAt(camTarget);
    }

    function updateHUD() {
      scoreEl.textContent = String(score);
      deathsEl.textContent = String(deaths);
      groundedEl.textContent = String(player.grounded);
      currentPlatformEl.textContent = String(player.currentPlatform);
    }

    function updateStateExpose() {
      window.__3D_STATE__ = {
        playerPos: {
          x: player.object.position.x,
          y: player.object.position.y,
          z: player.object.position.z
        },
        playerVel: {
          x: player.velocity.x,
          y: player.velocity.y,
          z: player.velocity.z
        },
        grounded: player.grounded,
        currentPlatform: player.currentPlatform,
        score,
        deaths,
        animState: player.animState,
        modelLoaded: player.modelLoaded
      };
    }

    respawn();

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.033);

      if (player.mixer) player.mixer.update(dt);

      updatePlayer(dt);
      updateCamera(dt);
      updateHUD();
      updateStateExpose();

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
