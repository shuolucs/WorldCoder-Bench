<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 机器人拆装模拟器</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #0f1020;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 12px 14px;
      background: rgba(10, 16, 30, 0.58);
      border: 1px solid rgba(140, 180, 255, 0.25);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      min-width: 220px;
      z-index: 20;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .hud h3,
    .panel h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #cfe3ff;
      font-weight: 600;
    }

    .hud-row,
    .panel-row {
      margin: 6px 0;
      font-size: 14px;
      line-height: 1.5;
      color: #e8f0ff;
    }

    .controls {
      position: fixed;
      left: 16px;
      bottom: 16px;
      display: flex;
      gap: 10px;
      z-index: 20;
    }

    button {
      border: none;
      outline: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #2f6bff, #5b8cff);
      box-shadow: 0 6px 18px rgba(47, 107, 255, 0.35);
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #partInfoPanel {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 280px;
      min-height: 150px;
      padding: 14px 16px;
      background: rgba(10, 16, 30, 0.62);
      border: 1px solid rgba(140, 180, 255, 0.25);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      z-index: 20;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    #partInfoName {
      font-size: 18px;
      color: #8cc8ff;
      margin-bottom: 8px;
      font-weight: 700;
    }

    #partInfoDesc {
      font-size: 14px;
      color: #e9f2ff;
      line-height: 1.7;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #b9c8e6;
      opacity: 0.9;
    }

    .loading-tip {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 18px;
      background: rgba(0,0,0,0.45);
      border-radius: 10px;
      z-index: 10;
      font-size: 14px;
      color: #dce7ff;
      pointer-events: none;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <h3>HUD 状态</h3>
    <div class="hud-row">组装状态：<span id="assemblyStatus">未加载</span></div>
    <div class="hud-row">当前选中部件：<span id="selectedPartName">无</span></div>
    <div class="hud-row">动画进度：<span id="animProgress">0%</span></div>
    <div class="hud-row">模型加载状态：<span id="loadStatus">加载中...</span></div>
  </div>

  <div class="controls">
    <button id="disassembleBtn" disabled>拆卸</button>
    <button id="assembleBtn" disabled>组装</button>
  </div>

  <div id="partInfoPanel">
    <h3>部件信息</h3>
    <div id="partInfoName">未选中</div>
    <div id="partInfoDesc">请先点击“拆卸”，然后在爆炸视图中单击机器人部件查看说明。</div>
    <div class="hint">支持鼠标拖拽旋转、滚轮缩放查看模型。</div>
  </div>

  <div class="loading-tip" id="loadingTip">正在加载 robot.glb ...</div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    window.__3D_STATE__ = {
      modelLoaded: false,
      assemblyState: 'assembled',
      selectedPart: null,
      animationProgress: 0,
      partCount: 5,
      cameraDistance: 0
    };

    const app = document.getElementById('app');
    const disassembleBtn = document.getElementById('disassembleBtn');
    const assembleBtn = document.getElementById('assembleBtn');
    const assemblyStatusEl = document.getElementById('assemblyStatus');
    const selectedPartNameEl = document.getElementById('selectedPartName');
    const animProgressEl = document.getElementById('animProgress');
    const loadStatusEl = document.getElementById('loadStatus');
    const partInfoNameEl = document.getElementById('partInfoName');
    const partInfoDescEl = document.getElementById('partInfoDesc');
    const loadingTip = document.getElementById('loadingTip');

    const partInfoMap = {
      head: { cn: '头部', desc: '包含视觉传感器和处理单元' },
      torso: { cn: '躯干', desc: '主要结构框架和动力核心' },
      leftArm: { cn: '左臂', desc: '配备精密抓取末端执行器' },
      rightArm: { cn: '右臂', desc: '配备多功能工具接口' },
      legs: { cn: '腿部', desc: '双足行走机构与平衡系统' }
    };

    const scene = new THREE.Scene();
    scene.background = createGradientBackground();

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(4.5, 3.2, 6.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);
    controls.minDistance = 2.5;
    controls.maxDistance = 20;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xb8c6ff, 0.65);
    scene.add(ambientLight);

    const hemiLight = new THREE.HemisphereLight(0xaecbff, 0x1f243a, 1.1);
    hemiLight.position.set(0, 10, 0);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.35);
    dirLight.position.set(5, 8, 6);
    scene.add(dirLight);

    const dirLight2 = new THREE.DirectionalLight(0x7aa2ff, 0.5);
    dirLight2.position.set(-6, 4, -5);
    scene.add(dirLight2);

    const grid = new THREE.GridHelper(20, 20, 0x446688, 0x2a3550);
    grid.position.y = -0.001;
    grid.material.transparent = true;
    grid.material.opacity = 0.35;
    scene.add(grid);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const robotRoot = new THREE.Group();
    scene.add(robotRoot);

    let model = null;
    let animation = null;
    let selectedPart = null;

    const partGroups = {
      head: { name: 'head', nodes: [], group: new THREE.Group(), meshes: [], origin: new THREE.Vector3(), exploded: new THREE.Vector3() },
      torso: { name: 'torso', nodes: [], group: new THREE.Group(), meshes: [], origin: new THREE.Vector3(), exploded: new THREE.Vector3() },
      leftArm: { name: 'leftArm', nodes: [], group: new THREE.Group(), meshes: [], origin: new THREE.Vector3(), exploded: new THREE.Vector3() },
      rightArm: { name: 'rightArm', nodes: [], group: new THREE.Group(), meshes: [], origin: new THREE.Vector3(), exploded: new THREE.Vector3() },
      legs: { name: 'legs', nodes: [], group: new THREE.Group(), meshes: [], origin: new THREE.Vector3(), exploded: new THREE.Vector3() }
    };

    Object.values(partGroups).forEach(part => {
      part.group.name = part.name;
      robotRoot.add(part.group);
    });

    function createGradientBackground() {
      const canvas = document.createElement('canvas');
      canvas.width = 16;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, 0, 512);
      gradient.addColorStop(0, '#1a1a2e');
      gradient.addColorStop(0.45, '#141b34');
      gradient.addColorStop(1, '#0c1224');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function updateHUD() {
      const state = window.__3D_STATE__;
      let statusText = '动画中';
      if (state.assemblyState === 'assembled') statusText = '已组装';
      if (state.assemblyState === 'disassembled') statusText = '已拆卸';

      assemblyStatusEl.textContent = statusText;
      selectedPartNameEl.textContent = state.selectedPart ? partInfoMap[state.selectedPart].cn : '无';
      animProgressEl.textContent = `${Math.round(state.animationProgress * 100)}%`;
      loadStatusEl.textContent = state.modelLoaded ? '已加载' : '加载中...';
    }

    function setPartInfo(partName) {
      if (!partName) {
        partInfoNameEl.textContent = '未选中';
        partInfoDescEl.textContent = '请先点击“拆卸”，然后在爆炸视图中单击机器人部件查看说明。';
        return;
      }
      partInfoNameEl.textContent = `${partInfoMap[partName].cn} (${partName})`;
      partInfoDescEl.textContent = partInfoMap[partName].desc;
    }

    function clearHighlight() {
      if (!selectedPart) return;
      selectedPart.meshes.forEach(mesh => {
        if (!mesh.material) return;
        const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
        mats.forEach(mat => {
          if ('emissive' in mat && mesh.userData.__originalEmissive) {
            mat.emissive.copy(mesh.userData.__originalEmissive);
            mat.emissiveIntensity = mesh.userData.__originalEmissiveIntensity ?? 1;
          }
        });
      });
      selectedPart = null;
      window.__3D_STATE__.selectedPart = null;
      setPartInfo(null);
    }

    function applyHighlight(part) {
      clearHighlight();
      selectedPart = part;
      part.meshes.forEach(mesh => {
        if (!mesh.material) return;
        const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
        mats.forEach(mat => {
          if ('emissive' in mat) {
            if (!mesh.userData.__originalEmissive) {
              mesh.userData.__originalEmissive = mat.emissive.clone();
              mesh.userData.__originalEmissiveIntensity = mat.emissiveIntensity ?? 1;
            }
            mat.emissive.set(0x3399ff);
            mat.emissiveIntensity = 1.2;
          }
        });
      });
      window.__3D_STATE__.selectedPart = part.name;
      setPartInfo(part.name);
    }

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function startAnimation(targetState) {
      if (!model || animation) return;

      clearHighlight();
      const from = {};
      const to = {};

      for (const key in partGroups) {
        from[key] = partGroups[key].group.position.clone();
        to[key] = targetState === 'disassembled'
          ? partGroups[key].exploded.clone()
          : partGroups[key].origin.clone();
      }

      animation = {
        targetState,
        duration: 1000,
        startTime: performance.now(),
        from,
        to
      };

      window.__3D_STATE__.assemblyState = 'animating';
      window.__3D_STATE__.animationProgress = 0;
    }

    function updateAnimation(now) {
      if (!animation) return;

      const elapsed = now - animation.startTime;
      const t = THREE.MathUtils.clamp(elapsed / animation.duration, 0, 1);
      const eased = easeInOutCubic(t);

      for (const key in partGroups) {
        partGroups[key].group.position.lerpVectors(animation.from[key], animation.to[key], eased);
      }

      window.__3D_STATE__.animationProgress = t;

      if (t >= 1) {
        window.__3D_STATE__.assemblyState = animation.targetState;
        window.__3D_STATE__.animationProgress = 1;
        animation = null;
      }
    }

    function classifyPartByName(name) {
      const n = name.toLowerCase();
      if (/(head|skull|face|helmet|sensor)/.test(n)) return 'head';
      if (/(torso|body|spine|chest|core|waist|hip)/.test(n)) return 'torso';
      if (/(leftarm|arm_l|l_arm|left_arm|left arm|larm|shoulder_l|hand_l)/.test(n)) return 'leftArm';
      if (/(rightarm|arm_r|r_arm|right_arm|right arm|rarm|shoulder_r|hand_r)/.test(n)) return 'rightArm';
      if (/(leg|foot|thigh|calf|shin|knee)/.test(n)) return 'legs';
      return null;
    }

    function classifyPartByPosition(object, center) {
      const box = new THREE.Box3().setFromObject(object);
      const c = box.getCenter(new THREE.Vector3());
      const s = box.getSize(new THREE.Vector3());

      if (c.y > center.y + s.y * 0.2) return 'head';
      if (c.y < center.y - s.y * 0.35) return 'legs';
      if (c.x < center.x - s.x * 0.15) return 'leftArm';
      if (c.x > center.x + s.x * 0.15) return 'rightArm';
      return 'torso';
    }

    function resetPartCollections() {
      for (const key in partGroups) {
        partGroups[key].nodes = [];
        partGroups[key].meshes = [];
        partGroups[key].group.clear();
        partGroups[key].group.position.set(0, 0, 0);
      }
    }

    function groupRobotParts(rootModel) {
      resetPartCollections();

      const modelBox = new THREE.Box3().setFromObject(rootModel);
      const center = modelBox.getCenter(new THREE.Vector3());

      const candidates = [];
      rootModel.traverse(obj => {
        if (obj.isMesh) {
          candidates.push(obj);
        }
      });

      candidates.forEach(mesh => {
        let partKey = classifyPartByName(mesh.name || '');
        if (!partKey) partKey = classifyPartByPosition(mesh, center);
        partGroups[partKey].nodes.push(mesh);
      });

      for (const key in partGroups) {
        const group = partGroups[key].group;
        const meshes = partGroups[key].nodes;

        meshes.forEach(mesh => {
          const cloned = mesh.clone();
          cloned.geometry = mesh.geometry;
          if (Array.isArray(mesh.material)) {
            cloned.material = mesh.material.map(m => m.clone());
          } else if (mesh.material) {
            cloned.material = mesh.material.clone();
          }
          cloned.castShadow = true;
          cloned.receiveShadow = true;

          const worldPos = new THREE.Vector3();
          const worldQuat = new THREE.Quaternion();
          const worldScale = new THREE.Vector3();
          mesh.updateWorldMatrix(true, false);
          mesh.matrixWorld.decompose(worldPos, worldQuat, worldScale);

          group.add(cloned);
          cloned.position.copy(worldPos);
          cloned.quaternion.copy(worldQuat);
          cloned.scale.copy(worldScale);
          cloned.userData.partName = key;

          partGroups[key].meshes.push(cloned);
        });
      }

      const allBox = new THREE.Box3().setFromObject(robotRoot);
      const allCenter = allBox.getCenter(new THREE.Vector3());

      robotRoot.children.forEach(group => {
        group.children.forEach(child => {
          child.position.sub(allCenter);
        });
      });

      const finalBox = new THREE.Box3().setFromObject(robotRoot);
      const size = finalBox.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const scale = 3 / maxDim;
      robotRoot.scale.setScalar(scale);

      const scaledBox = new THREE.Box3().setFromObject(robotRoot);
      const scaledCenter = scaledBox.getCenter(new THREE.Vector3());
      robotRoot.position.sub(scaledCenter);

      const distanceBase = 1.2;
      partGroups.head.origin.set(0, 0, 0);
      partGroups.torso.origin.set(0, 0, 0);
      partGroups.leftArm.origin.set(0, 0, 0);
      partGroups.rightArm.origin.set(0, 0, 0);
      partGroups.legs.origin.set(0, 0, 0);

      partGroups.head.exploded.set(0, distanceBase * 1.5, 0);
      partGroups.torso.exploded.set(0, 0, distanceBase * 1.2);
      partGroups.leftArm.exploded.set(-distanceBase * 1.5, 0.15, 0);
      partGroups.rightArm.exploded.set(distanceBase * 1.5, 0.15, 0);
      partGroups.legs.exploded.set(0, -distanceBase * 1.5, 0);

      for (const key in partGroups) {
        partGroups[key].group.position.copy(partGroups[key].origin);
      }
    }

    const loader = new GLTFLoader();
    loader.load(
      'assets/robot.glb',
      gltf => {
        model = gltf.scene;
        groupRobotParts(model);

        window.__3D_STATE__.modelLoaded = true;
        window.__3D_STATE__.assemblyState = 'assembled';
        window.__3D_STATE__.partCount = 5;

        loadStatusEl.textContent = '已加载';
        loadingTip.style.display = 'none';

        disassembleBtn.disabled = false;
        assembleBtn.disabled = false;
      },
      xhr => {
        if (xhr.total) {
          const p = Math.round((xhr.loaded / xhr.total) * 100);
          loadStatusEl.textContent = `加载中 ${p}%`;
          loadingTip.textContent = `正在加载 robot.glb ... ${p}%`;
        }
      },
      err => {
        console.error('模型加载失败:', err);
        loadStatusEl.textContent = '加载失败';
        loadingTip.textContent = '模型加载失败，请确认 assets/robot.glb 存在并通过 HTTP 服务运行。';
      }
    );

    disassembleBtn.addEventListener('click', () => {
      if (!window.__3D_STATE__.modelLoaded) return;
      if (window.__3D_STATE__.assemblyState === 'disassembled') return;
      if (animation) return;
      startAnimation('disassembled');
    });

    assembleBtn.addEventListener('click', () => {
      if (!window.__3D_STATE__.modelLoaded) return;
      if (window.__3D_STATE__.assemblyState === 'assembled') return;
      if (animation) return;
      startAnimation('assembled');
    });

    renderer.domElement.addEventListener('pointerdown', event => {
      if (window.__3D_STATE__.assemblyState !== 'disassembled') return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const clickableMeshes = [];
      for (const key in partGroups) {
        clickableMeshes.push(...partGroups[key].meshes);
      }

      const intersects = raycaster.intersectObjects(clickableMeshes, false);

      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const partName = hit.userData.partName;
        applyHighlight(partGroups[partName]);
      } else {
        clearHighlight();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate(now) {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();
      if (!window.__3D_STATE__.modelLoaded) {
        loadingTip.style.opacity = `${0.75 + Math.sin(t * 2.5) * 0.15}`;
      }

      updateAnimation(now);
      controls.update();

      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

      if (!animation) {
        if (window.__3D_STATE__.assemblyState === 'assembled') {
          window.__3D_STATE__.animationProgress = 0;
        } else if (window.__3D_STATE__.assemblyState === 'disassembled') {
          window.__3D_STATE__.animationProgress = 1;
        }
      }

      updateHUD();
      renderer.render(scene, camera);
    }

    updateHUD();
    setPartInfo(null);
    animate(performance.now());
  </script>
</body>
</html>
