<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器人拆装模拟器</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* HUD 面板 */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 20, 35, 0.8);
            border: 1px solid #3a4a6e;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            min-width: 200px;
        }
        .hud-item {
            margin-bottom: 8px;
            font-size: 14px;
        }
        .hud-label {
            color: #8a9ac0;
            display: inline-block;
            width: 80px;
        }
        .hud-value {
            font-weight: bold;
            color: #00ffcc;
        }
        /* 信息面板 */
        #partInfoPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 20, 35, 0.85);
            border: 1px solid #00ffcc;
            padding: 20px;
            border-radius: 8px;
            width: 250px;
            display: none;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            backdrop-filter: blur(4px);
        }
        #partInfoPanel h3 {
            margin: 0 0 10px 0;
            color: #00ffcc;
            border-bottom: 1px solid #3a4a6e;
            padding-bottom: 5px;
        }
        #partInfoPanel p {
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
            color: #d0d0e0;
        }
        /* 控制按钮 */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }
        button {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            border: 2px solid #2980b9;
            color: white;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            background: linear-gradient(135deg, #34495e, #2980b9);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(41, 128, 185, 0.6);
        }
        button:active {
            transform: translateY(1px);
        }
        button:disabled {
            background: #555;
            border-color: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
    </style>
    
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <div class="hud-item"><span class="hud-label">加载状态:</span> <span id="loadStatus" class="hud-value" style="color:#ffaa00;">加载中...</span></div>
        <div class="hud-item"><span class="hud-label">组装状态:</span> <span id="assemblyStatus" class="hud-value">已组装</span></div>
        <div class="hud-item"><span class="hud-label">选中部件:</span> <span id="selectedPartName" class="hud-value">无</span></div>
        <div class="hud-item"><span class="hud-label">动画进度:</span> <span id="animProgress" class="hud-value">0%</span></div>
    </div>

    <div id="partInfoPanel">
        <h3 id="infoTitle">部件名称</h3>
        <p id="infoDesc">部件描述信息</p>
    </div>

    <div id="controls">
        <button id="disassembleBtn" disabled>拆卸</button>
        <button id="assembleBtn" disabled>组装</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 全局状态 ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            assemblyState: 'assembled', // 'assembled', 'disassembled', 'animating'
            selectedPart: null,
            animationProgress: 0,
            partCount: 5,
            cameraDistance: 0
        };

        // --- 部件配置 ---
        const partsConfig = {
            head: { name: '头部', desc: '包含视觉传感器和处理单元', explodeDir: new THREE.Vector3(0, 1, 0) },
            torso: { name: '躯干', desc: '主要结构框架和动力核心', explodeDir: new THREE.Vector3(0, 0, 1) },
            leftArm: { name: '左臂', desc: '配备精密抓取末端执行器', explodeDir: new THREE.Vector3(1, 0, 0) },
            rightArm: { name: '右臂', desc: '配备多功能工具接口', explodeDir: new THREE.Vector3(-1, 0, 0) },
            legs: { name: '腿部', desc: '双足行走机构与平衡系统', explodeDir: new THREE.Vector3(0, -1, 0) }
        };

        // 存储模型网格及其变换信息
        const partMeshes = { head: [], torso: [], leftArm: [], rightArm: [], legs: [] };
        const transforms = new Map(); // mesh -> { origPos, origQuat, targetPos, targetQuat }

        // --- 场景初始化 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 20;
        controls.minDistance = 2;

        // --- 灯光 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- 辅助网格 ---
        const gridHelper = new THREE.GridHelper(20, 20, 0x445577, 0x223355);
        gridHelper.position.y = -2;
        scene.add(gridHelper);

        // --- 模型加载与处理 ---
        let robotModel = new THREE.Group();
        scene.add(robotModel);

        const loader = new GLTFLoader();
        loader.load(
            'assets/robot.glb',
            (gltf) => {
                processModel(gltf.scene);
            },
            undefined,
            (error) => {
                console.warn("无法加载外部模型，使用程序化生成的机器人作为后备方案。", error);
                createProceduralRobot();
            }
        );

        function processModel(model) {
            // 居中并缩放
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 4 / maxDim; // 标准化大小
            model.scale.setScalar(scale);
            
            model.position.sub(center.multiplyScalar(scale));
            robotModel.add(model);

            // 重新计算包围盒以进行分组
            const scaledBox = new THREE.Box3().setFromObject(robotModel);
            const explodeDistance = scaledBox.getSize(new THREE.Vector3()).length() * 0.6;

            // 遍历并分组
            robotModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    
                    // 克隆材质以便独立高亮
                    if (child.material) {
                        child.material = child.material.clone();
                        child.userData.origEmissive = child.material.emissive ? child.material.emissive.clone() : new THREE.Color(0x000000);
                    }

                    // 启发式分组 (基于名称或位置)
                    let partKey = 'torso';
                    const name = child.name.toLowerCase();
                    const childBox = new THREE.Box3().setFromObject(child);
                    const childCenter = childBox.getCenter(new THREE.Vector3());

                    if (name.includes('head')) partKey = 'head';
                    else if (name.includes('leg') || name.includes('foot')) partKey = 'legs';
                    else if (name.includes('arm') || name.includes('hand')) {
                        partKey = (name.includes('left') || name.includes('l_')) ? 'leftArm' : 'rightArm';
                    } else {
                        // 基于位置的猜测
                        if (childCenter.y > scaledBox.max.y * 0.6) partKey = 'head';
                        else if (childCenter.y < scaledBox.min.y + size.y * scale * 0.3) partKey = 'legs';
                        else if (childCenter.x > scaledBox.max.x * 0.3) partKey = 'leftArm';
                        else if (childCenter.x < scaledBox.min.x * 0.3) partKey = 'rightArm';
                    }

                    child.userData.partKey = partKey;
                    partMeshes[partKey].push(child);

                    // 记录变换信息
                    const origPos = child.position.clone();
                    const origQuat = child.quaternion.clone();
                    
                    // 计算爆炸目标位置 (在世界坐标系下计算偏移，然后转换回局部坐标)
                    const worldOffset = partsConfig[partKey].explodeDir.clone().normalize().multiplyScalar(explodeDistance);
                    const targetPos = origPos.clone().add(worldOffset);

                    transforms.set(child, {
                        origPos: origPos,
                        origQuat: origQuat,
                        targetPos: targetPos,
                        targetQuat: origQuat // 保持旋转不变
                    });
                }
            });

            onModelLoaded();
        }

        function createProceduralRobot() {
            const mat = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.4, metalness: 0.6 });
            
            const createPart = (geom, y, x, key) => {
                const mesh = new THREE.Mesh(geom, mat.clone());
                mesh.position.set(x, y, 0);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData.partKey = key;
                mesh.userData.origEmissive = new THREE.Color(0x000000);
                robotModel.add(mesh);
                partMeshes[key].push(mesh);
                return mesh;
            };

            createPart(new THREE.BoxGeometry(1, 1, 1), 2, 0, 'head');
            createPart(new THREE.BoxGeometry(1.5, 2, 1), 0.2, 0, 'torso');
            createPart(new THREE.CylinderGeometry(0.3, 0.3, 1.8), 0.5, 1.2, 'leftArm');
            createPart(new THREE.CylinderGeometry(0.3, 0.3, 1.8), 0.5, -1.2, 'rightArm');
            
            const leftLeg = createPart(new THREE.CylinderGeometry(0.35, 0.35, 2), -2, 0.5, 'legs');
            const rightLeg = createPart(new THREE.CylinderGeometry(0.35, 0.35, 2), -2, -0.5, 'legs');

            const explodeDistance = 2.5;
            robotModel.traverse((child) => {
                if (child.isMesh) {
                    const key = child.userData.partKey;
                    const origPos = child.position.clone();
                    const targetPos = origPos.clone().add(partsConfig[key].explodeDir.clone().multiplyScalar(explodeDistance));
                    transforms.set(child, {
                        origPos: origPos,
                        origQuat: child.quaternion.clone(),
                        targetPos: targetPos,
                        targetQuat: child.quaternion.clone()
                    });
                }
            });

            onModelLoaded();
        }

        function onModelLoaded() {
            window.__3D_STATE__.modelLoaded = true;
            document.getElementById('loadStatus').innerText = '加载完成';
            document.getElementById('loadStatus').style.color = '#00ffcc';
            document.getElementById('disassembleBtn').disabled = false;
        }

        // --- 动画逻辑 ---
        let animStartTime = 0;
        const animDuration = 1000; // 1秒
        let isAnimating = false;
        let animDirection = 1; // 1: 拆卸, -1: 组装

        function startAnimation(direction) {
            if (isAnimating || !window.__3D_STATE__.modelLoaded) return;
            
            isAnimating = true;
            animDirection = direction;
            animStartTime = performance.now();
            
            window.__3D_STATE__.assemblyState = 'animating';
            
            document.getElementById('disassembleBtn').disabled = true;
            document.getElementById('assembleBtn').disabled = true;
            
            if (direction === -1) {
                clearSelection();
            }
        }

        document.getElementById('disassembleBtn').addEventListener('click', () => startAnimation(1));
        document.getElementById('assembleBtn').addEventListener('click', () => startAnimation(-1));

        // --- 交互逻辑 (射线检测) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let highlightedMeshes = [];

        window.addEventListener('pointerdown', (event) => {
            if (window.__3D_STATE__.assemblyState !== 'disassembled') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(robotModel, true);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (object.userData.partKey) {
                    selectPart(object.userData.partKey);
                }
            } else {
                clearSelection();
            }
        });

        function selectPart(partKey) {
            clearSelection();
            window.__3D_STATE__.selectedPart = partKey;
            
            // 高亮
            partMeshes[partKey].forEach(mesh => {
                if (mesh.material) {
                    mesh.material.emissive.setHex(0x00aaff);
                    mesh.material.emissiveIntensity = 0.8;
                    highlightedMeshes.push(mesh);
                }
            });

            // 更新 UI
            const info = partsConfig[partKey];
            const panel = document.getElementById('partInfoPanel');
            document.getElementById('infoTitle').innerText = info.name;
            document.getElementById('infoDesc').innerText = info.desc;
            panel.style.display = 'block';
        }

        function clearSelection() {
            highlightedMeshes.forEach(mesh => {
                if (mesh.material && mesh.userData.origEmissive) {
                    mesh.material.emissive.copy(mesh.userData.origEmissive);
                    mesh.material.emissiveIntensity = 1;
                }
            });
            highlightedMeshes = [];
            window.__3D_STATE__.selectedPart = null;
            document.getElementById('partInfoPanel').style.display = 'none';
        }

        // --- 窗口自适应 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 渲染循环 ---
        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();

            // 处理动画
            if (isAnimating) {
                let progress = (now - animStartTime) / animDuration;
                if (progress >= 1) {
                    progress = 1;
                    isAnimating = false;
                    window.__3D_STATE__.assemblyState = animDirection === 1 ? 'disassembled' : 'assembled';
                    
                    document.getElementById('disassembleBtn').disabled = (animDirection === 1);
                    document.getElementById('assembleBtn').disabled = (animDirection === -1);
                }

                // 缓动函数 (easeInOutQuad)
                const easeProgress = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                
                // t: 0 -> 1 (0为组装态，1为拆卸态)
                const t = animDirection === 1 ? easeProgress : 1 - easeProgress;
                window.__3D_STATE__.animationProgress = t;

                robotModel.traverse((child) => {
                    if (child.isMesh && transforms.has(child)) {
                        const data = transforms.get(child);
                        child.position.lerpVectors(data.origPos, data.targetPos, t);
                        child.quaternion.slerpQuaternions(data.origQuat, data.targetQuat, t);
                    }
                });
            }

            controls.update();
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

            updateHUD();

            renderer.render(scene, camera);
        }

        function updateHUD() {
            const state = window.__3D_STATE__;
            
            let statusText = "已组装";
            let statusColor = "#00ffcc";
            if (state.assemblyState === 'disassembled') {
                statusText = "已拆卸";
                statusColor = "#ff5555";
            } else if (state.assemblyState === 'animating') {
                statusText = "动画中...";
                statusColor = "#ffaa00";
            }
            
            const statusEl = document.getElementById('assemblyStatus');
            statusEl.innerText = statusText;
            statusEl.style.color = statusColor;

            const partName = state.selectedPart ? partsConfig[state.selectedPart].name : "无";
            document.getElementById('selectedPartName').innerText = partName;

            document.getElementById('animProgress').innerText = Math.round(state.animationProgress * 100) + '%';
        }

        animate();
    </script>
</body>
</html>
