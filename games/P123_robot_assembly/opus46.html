<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机器人拆装模拟器</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #1a1a2e; }
canvas { display: block; }

#hud {
  position: fixed;
  top: 20px;
  left: 20px;
  background: rgba(10, 10, 30, 0.85);
  border: 1px solid rgba(100, 140, 255, 0.3);
  border-radius: 12px;
  padding: 20px;
  color: #c0d0ff;
  font-size: 14px;
  min-width: 240px;
  backdrop-filter: blur(10px);
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
}
#hud h3 {
  color: #7aa2ff;
  margin-bottom: 12px;
  font-size: 16px;
  border-bottom: 1px solid rgba(100, 140, 255, 0.2);
  padding-bottom: 8px;
}
#hud .row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  line-height: 1.6;
}
#hud .label { color: #8899bb; }
#hud .value { color: #e0e8ff; font-weight: 600; }

#controls {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 16px;
  z-index: 100;
}
#controls button {
  padding: 14px 36px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
  letter-spacing: 1px;
}
#disassembleBtn {
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  color: white;
  box-shadow: 0 4px 15px rgba(238, 90, 36, 0.4);
}
#disassembleBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(238, 90, 36, 0.6); }
#disassembleBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

#assembleBtn {
  background: linear-gradient(135deg, #4ecdc4, #44bd32);
  color: white;
  box-shadow: 0 4px 15px rgba(68, 189, 50, 0.4);
}
#assembleBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(68, 189, 50, 0.6); }
#assembleBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

#partInfoPanel {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 280px;
  background: rgba(10, 10, 30, 0.85);
  border: 1px solid rgba(100, 140, 255, 0.3);
  border-radius: 12px;
  padding: 20px;
  color: #c0d0ff;
  backdrop-filter: blur(10px);
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  transition: all 0.3s ease;
}
#partInfoPanel h3 {
  color: #7aa2ff;
  margin-bottom: 12px;
  font-size: 16px;
  border-bottom: 1px solid rgba(100, 140, 255, 0.2);
  padding-bottom: 8px;
}
#partInfoPanel .part-name {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 10px;
}
#partInfoPanel .part-desc {
  font-size: 14px;
  color: #99aabb;
  line-height: 1.7;
}
#partInfoPanel .no-selection {
  color: #556677;
  font-style: italic;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  margin-top: 4px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #4ecdc4, #7aa2ff);
  border-radius: 3px;
  transition: width 0.05s linear;
  width: 0%;
}

#loadingOverlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10, 10, 30, 0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: opacity 0.5s ease;
}
#loadingOverlay .spinner {
  width: 60px; height: 60px;
  border: 4px solid rgba(100, 140, 255, 0.2);
  border-top-color: #7aa2ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loadingOverlay .text { color: #7aa2ff; font-size: 18px; }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="text">正在加载机器人模型...</div>
</div>

<div id="hud">
  <h3>🤖 机器人拆装模拟器</h3>
  <div class="row">
    <span class="label">加载状态：</span>
    <span class="value" id="loadStatus">加载中...</span>
  </div>
  <div class="row">
    <span class="label">组装状态：</span>
    <span class="value" id="assemblyStatus">已组装</span>
  </div>
  <div class="row">
    <span class="label">选中部件：</span>
    <span class="value" id="selectedPartName">无</span>
  </div>
  <div class="row">
    <span class="label">动画进度：</span>
    <span class="value" id="animProgress">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-bar-fill" id="progressBarFill"></div>
  </div>
</div>

<div id="partInfoPanel">

  <div class="no-selection" id="partInfoContent">点击拆卸后的部件查看详情</div>
</div>

<div id="controls">
  <button id="disassembleBtn">🔧 拆卸</button>
  <button id="assembleBtn">🔩 组装</button>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Global state
window.__3D_STATE__ = {
  modelLoaded: false,
  assemblyState: 'assembled',
  selectedPart: null,
  animationProgress: 0,
  partCount: 5,
  cameraDistance: 5
};

// Part info data
const partInfo = {
  head: { name: '头部', desc: '包含视觉传感器和处理单元' },
  torso: { name: '躯干', desc: '主要结构框架和动力核心' },
  leftArm: { name: '左臂', desc: '配备精密抓取末端执行器' },
  rightArm: { name: '右臂', desc: '配备多功能工具接口' },
  legs: { name: '腿部', desc: '双足行走机构与平衡系统' }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(4, 3, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2;
controls.maxDistance = 20;
controls.target.set(0, 1, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0x6688cc, 0x443322, 0.8);
scene.add(hemiLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const dirLight2 = new THREE.DirectionalLight(0x4488ff, 0.5);
dirLight2.position.set(-3, 4, -5);
scene.add(dirLight2);

const pointLight = new THREE.PointLight(0xff6644, 0.3, 20);
pointLight.position.set(-3, 2, 3);
scene.add(pointLight);

// Ground grid
const gridHelper = new THREE.GridHelper(20, 40, 0x2a2a4e, 0x1e1e3a);
scene.add(gridHelper);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a2e,
  roughness: 0.9,
  metalness: 0.1,
  transparent: true,
  opacity: 0.8
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Part groups
const parts = {
  head: { group: new THREE.Group(), originalPos: new THREE.Vector3(), explodeDir: new THREE.Vector3(0, 1.5, 0) },
  torso: { group: new THREE.Group(), originalPos: new THREE.Vector3(), explodeDir: new THREE.Vector3(0, 0, 1.5) },
  leftArm: { group: new THREE.Group(), originalPos: new THREE.Vector3(), explodeDir: new THREE.Vector3(-1.8, 0, 0) },
  rightArm: { group: new THREE.Group(), originalPos: new THREE.Vector3(), explodeDir: new THREE.Vector3(1.8, 0, 0) },
  legs: { group: new THREE.Group(), originalPos: new THREE.Vector3(), explodeDir: new THREE.Vector3(0, -1.2, 0) }
};

let modelGroup = new THREE.Group();
scene.add(modelGroup);

// Animation state
let animating = false;
let animProgress = 0;
let animDirection = 0; // 1 = disassemble, -1 = assemble
let animStartTime = 0;
const ANIM_DURATION = 1.0; // seconds

// Selected part
let selectedPartKey = null;
let selectedMeshes = [];
let originalEmissives = new Map();

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Easing function
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// Classify mesh into part based on name and bounding box position
function classifyNode(node, modelBBox) {
  const name = (node.name || '').toLowerCase();
  
  // Try name-based classification first
  if (name.includes('head') || name.includes('helmet') || name.includes('visor') || name.includes('face') || name.includes('eye') || name.includes('antenna')) {
    return 'head';
  }
  if (name.includes('left') && (name.includes('arm') || name.includes('hand') || name.includes('shoulder') || name.includes('finger'))) {
    return 'leftArm';
  }
  if (name.includes('right') && (name.includes('arm') || name.includes('hand') || name.includes('shoulder') || name.includes('finger'))) {
    return 'rightArm';
  }
  if (name.includes('arm') || name.includes('hand')) {
    // Generic arm - check position
    const bbox = new THREE.Box3().setFromObject(node);
    const center = new THREE.Vector3();
    bbox.getCenter(center);
    if (center.x < 0) return 'leftArm';
    return 'rightArm';
  }
  if (name.includes('leg') || name.includes('foot') || name.includes('feet') || name.includes('knee') || name.includes('hip')) {
    return 'legs';
  }
  if (name.includes('torso') || name.includes('body') || name.includes('chest') || name.includes('spine') || name.includes('back') || name.includes('core')) {
    return 'torso';
  }
  
  // Position-based classification
  const bbox = new THREE.Box3().setFromObject(node);
  const center = new THREE.Vector3();
  bbox.getCenter(center);
  
  const modelCenter = new THREE.Vector3();
  modelBBox.getCenter(modelCenter);
  const modelSize = new THREE.Vector3();
  modelBBox.getSize(modelSize);
  
  const relY = (center.y - modelBBox.min.y) / modelSize.y;
  const relX = (center.x - modelCenter.x) / modelSize.x;
  
  if (relY > 0.75) return 'head';
  if (relY < 0.35) return 'legs';
  if (relX < -0.15) return 'leftArm';
  if (relX > 0.15) return 'rightArm';
  return 'torso';
}

// Load model
const loader = new GLTFLoader();

function createFallbackRobot() {
  // Create a simple robot from primitives
  const material = new THREE.MeshStandardMaterial({ color: 0x6688aa, metalness: 0.7, roughness: 0.3 });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x445566, metalness: 0.8, roughness: 0.2 });
  const accentMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, metalness: 0.5, roughness: 0.3, emissive: 0x112244 });

  // Head
  const headGroup = parts.head.group;
  const headGeo = new THREE.BoxGeometry(0.6, 0.5, 0.5);
  const headMesh = new THREE.Mesh(headGeo, material.clone());
  headMesh.position.y = 2.35;
  headMesh.castShadow = true;
  headGroup.add(headMesh);
  
  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.06, 16, 16);
  const eyeL = new THREE.Mesh(eyeGeo, accentMat.clone());
  eyeL.position.set(-0.15, 2.4, 0.26);
  headGroup.add(eyeL);
  const eyeR = new THREE.Mesh(eyeGeo, accentMat.clone());
  eyeR.position.set(0.15, 2.4, 0.26);
  headGroup.add(eyeR);
  
  // Antenna
  const antGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 8);
  const ant = new THREE.Mesh(antGeo, darkMat.clone());
  ant.position.set(0, 2.75, 0);
  headGroup.add(ant);
  const antTip = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), accentMat.clone());
  antTip.position.set(0, 2.92, 0);
  headGroup.add(antTip);

  // Neck
  const neckGeo = new THREE.CylinderGeometry(0.1, 0.15, 0.2, 12);
  const neck = new THREE.Mesh(neckGeo, darkMat.clone());
  neck.position.y = 2.0;
  headGroup.add(neck);

  // Torso
  const torsoGroup = parts.torso.group;
  const torsoGeo = new THREE.BoxGeometry(0.9, 0.9, 0.5);
  const torsoMesh = new THREE.Mesh(torsoGeo, material.clone());
  torsoMesh.position.y = 1.45;
  torsoMesh.castShadow = true;
  torsoGroup.add(torsoMesh);
  
  // Chest plate
  const chestGeo = new THREE.BoxGeometry(0.5, 0.4, 0.08);
  const chest = new THREE.Mesh(chestGeo, darkMat.clone());
  chest.position.set(0, 1.5, 0.29);
  torsoGroup.add(chest);
  
  // Core light
  const coreGeo = new THREE.SphereGeometry(0.08, 16, 16);
  const core = new THREE.Mesh(coreGeo, accentMat.clone());
  core.position.set(0, 1.5, 0.34);
  torsoGroup.add(core);

  // Left Arm
  const leftArmGroup = parts.leftArm.group;
  // Shoulder
  const shoulderGeo = new THREE.SphereGeometry(0.15, 16, 16);
  const lShoulder = new THREE.Mesh(shoulderGeo, darkMat.clone());
  lShoulder.position.set(-0.6, 1.8, 0);
  leftArmGroup.add(lShoulder);
  // Upper arm
  const upperArmGeo = new THREE.CylinderGeometry(0.1, 0.08, 0.5, 12);
  const lUpperArm = new THREE.Mesh(upperArmGeo, material.clone());
  lUpperArm.position.set(-0.6, 1.45, 0);
  lUpperArm.castShadow = true;
  leftArmGroup.add(lUpperArm);
  // Elbow
  const lElbow = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), darkMat.clone());
  lElbow.position.set(-0.6, 1.15, 0);
  leftArmGroup.add(lElbow);
  // Lower arm
  const lLowerArm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.45, 12), material.clone());
  lLowerArm.position.set(-0.6, 0.85, 0);
  lLowerArm.castShadow = true;
  leftArmGroup.add(lLowerArm);
  // Hand
  const lHand = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.12, 0.1), darkMat.clone());
  lHand.position.set(-0.6, 0.58, 0);
  leftArmGroup.add(lHand);

  // Right Arm
  const rightArmGroup = parts.rightArm.group;
  const rShoulder = new THREE.Mesh(shoulderGeo.clone(), darkMat.clone());
  rShoulder.position.set(0.6, 1.8, 0);
  rightArmGroup.add(rShoulder);
  const rUpperArm = new THREE.Mesh(upperArmGeo.clone(), material.clone());
  rUpperArm.position.set(0.6, 1.45, 0);
  rUpperArm.castShadow = true;
  rightArmGroup.add(rUpperArm);
  const rElbow = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), darkMat.clone());
  rElbow.position.set(0.6, 1.15, 0);
  rightArmGroup.add(rElbow);
  const rLowerArm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.45, 12), material.clone());
  rLowerArm.position.set(0.6, 0.85, 0);
  rLowerArm.castShadow = true;
  rightArmGroup.add(rLowerArm);
  // Tool attachment
  const rTool = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.08, 0.2, 8), accentMat.clone());
  rTool.position.set(0.6, 0.55, 0);
  rightArmGroup.add(rTool);

  // Legs
  const legsGroup = parts.legs.group;
  // Hip
  const hipGeo = new THREE.BoxGeometry(0.7, 0.2, 0.4);
  const hip = new THREE.Mesh(hipGeo, darkMat.clone());
  hip.position.set(0, 0.9, 0);
  legsGroup.add(hip);
  
  // Left leg
  const legGeo = new THREE.CylinderGeometry(0.1, 0.08, 0.5, 12);
  const lUpperLeg = new THREE.Mesh(legGeo, material.clone());
  lUpperLeg.position.set(-0.2, 0.55, 0);
  lUpperLeg.castShadow = true;
  legsGroup.add(lUpperLeg);
  const lKnee = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), darkMat.clone());
  lKnee.position.set(-0.2, 0.25, 0);
  legsGroup.add(lKnee);
  const lLowerLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.45, 12), material.clone());
  lLowerLeg.position.set(-0.2, -0.02, 0);
  lLowerLeg.castShadow = true;
  legsGroup.add(lLowerLeg);
  const lFoot = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.08, 0.28), darkMat.clone());
  lFoot.position.set(-0.2, -0.28, 0.04);
  legsGroup.add(lFoot);

  // Right leg
  const rUpperLeg = new THREE.Mesh(legGeo.clone(), material.clone());
  rUpperLeg.position.set(0.2, 0.55, 0);
  rUpperLeg.castShadow = true;
  legsGroup.add(rUpperLeg);
  const rKnee = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), darkMat.clone());
  rKnee.position.set(0.2, 0.25, 0);
  legsGroup.add(rKnee);
  const rLowerLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.45, 12), material.clone());
  rLowerLeg.position.set(0.2, -0.02, 0);
  rLowerLeg.castShadow = true;
  legsGroup.add(rLowerLeg);
  const rFoot = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.08, 0.28), darkMat.clone());
  rFoot.position.set(0.2, -0.28, 0.04);
  legsGroup.add(rFoot);

  // Add all groups to model
  for (const key in parts) {
    modelGroup.add(parts[key].group);
    parts[key].originalPos.copy(parts[key].group.position);
  }

  // Adjust model position
  modelGroup.position.y = 0.28;
  
  finishLoading();
}

function finishLoading() {
  window.__3D_STATE__.modelLoaded = true;
  document.getElementById('loadStatus').textContent = '已加载';
  document.getElementById('loadStatus').style.color = '#44ff88';
  
  const overlay = document.getElementById('loadingOverlay');
  overlay.style.opacity = '0';
  setTimeout(() => overlay.style.display = 'none', 500);
}

function processLoadedModel(gltf) {
  const model = gltf.scene;
  
  // Compute bounding box and center/scale model
  const bbox = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3();
  bbox.getSize(size);
  const center = new THREE.Vector3();
  bbox.getCenter(center);
  
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 3.0 / maxDim;
  model.scale.setScalar(scale);
  
  // Recompute after scale
  bbox.setFromObject(model);
  bbox.getCenter(center);
  bbox.getSize(size);
  
  model.position.sub(center);
  model.position.y += size.y / 2;
  
  // Update bbox after repositioning
  const finalBBox = new THREE.Box3().setFromObject(model);
  
  // Collect all meshes
  const meshes = [];
  model.traverse(node => {
    if (node.isMesh) {
      node.castShadow = true;
      node.receiveShadow = true;
      meshes.push(node);
    }
  });
  
  if (meshes.length === 0) {
    console.warn('No meshes found in model, using fallback');
    createFallbackRobot();
    return;
  }
  
  // Classify each mesh
  const classified = { head: [], torso: [], leftArm: [], rightArm: [], legs: [] };
  
  meshes.forEach(mesh => {
    const partKey = classifyNode(mesh, finalBBox);
    classified[partKey].push(mesh);
  });
  
  // If some groups are empty, redistribute based on position more aggressively
  // First, add model to scene temporarily to get world positions
  const tempGroup = new THREE.Group();
  tempGroup.add(model);
  scene.add(tempGroup);
  
  // Create part groups
  for (const key in parts) {
    const group = parts[key].group;
    classified[key].forEach(mesh => {
      // Get world position of mesh
      const worldPos = new THREE.Vector3();
      mesh.getWorldPosition(worldPos);
      
      // Clone the mesh and add to part group
      // Instead, we reparent
      const parent = mesh.parent;
      // We need to preserve world transform
      mesh.updateWorldMatrix(true, false);
      const worldMatrix = mesh.matrixWorld.clone();
      
      group.add(mesh);
      mesh.applyMatrix4(group.matrixWorld.clone().invert());
      mesh.applyMatrix4(worldMatrix);
    });
    modelGroup.add(group);
    parts[key].originalPos.copy(group.position);
  }
  
  scene.remove(tempGroup);
  
  // Adjust explode directions based on model size
  const s = Math.max(size.x, size.y, size.z) * 0.6;
  parts.head.explodeDir.set(0, s, 0);
  parts.torso.explodeDir.set(0, 0, s);
  parts.leftArm.explodeDir.set(-s, 0, 0);
  parts.rightArm.explodeDir.set(s, 0, 0);
  parts.legs.explodeDir.set(0, -s * 0.8, 0);
  
  finishLoading();
}

// Try loading the GLB model
loader.load(
  'assets/robot.glb',
  (gltf) => {
    try {
      processLoadedModel(gltf);
    } catch (e) {
      console.error('Error processing model:', e);
      createFallbackRobot();
    }
  },
  (progress) => {
    if (progress.total > 0) {
      const pct = Math.round((progress.loaded / progress.total) * 100);
      document.getElementById('loadStatus').textContent = `加载中 ${pct}%`;
    }
  },
  (error) => {
    console.warn('Failed to load robot.glb, using fallback robot:', error);
    createFallbackRobot();
  }
);

// Disassemble
function disassemble() {
  if (animating || window.__3D_STATE__.assemblyState === 'disassembled') return;
  animating = true;
  animDirection = 1;
  animProgress = 0;
  animStartTime = performance.now();
  window.__3D_STATE__.assemblyState = 'animating';
  document.getElementById('assemblyStatus').textContent = '动画中';
  document.getElementById('assemblyStatus').style.color = '#ffaa44';
  clearSelection();
}

// Assemble
function assemble() {
  if (animating || window.__3D_STATE__.assemblyState === 'assembled') return;
  animating = true;
  animDirection = -1;
  animProgress = 1;
  animStartTime = performance.now();
  window.__3D_STATE__.assemblyState = 'animating';
  document.getElementById('assemblyStatus').textContent = '动画中';
  document.getElementById('assemblyStatus').style.color = '#ffaa44';
  clearSelection();
}

document.getElementById('disassembleBtn').addEventListener('click', disassemble);
document.getElementById('assembleBtn').addEventListener('click', assemble);

// Selection
function clearSelection() {
  // Restore original emissive
  originalEmissives.forEach((emissive, mesh) => {
    if (mesh.material) {
      if (Array.isArray(mesh.material)) {
        mesh.material.forEach((m, i) => {
          if (m.emissive) m.emissive.copy(emissive[i] || new THREE.Color(0));
        });
      } else {
        if (mesh.material.emissive) mesh.material.emissive.copy(emissive);
      }
    }
  });
  originalEmissives.clear();
  selectedMeshes = [];
  selectedPartKey = null;
  window.__3D_STATE__.selectedPart = null;
  document.getElementById('selectedPartName').textContent = '无';
  document.getElementById('partInfoContent').innerHTML = '<span class="no-selection">点击拆卸后的部件查看详情</span>';
}

function selectPart(partKey) {
  clearSelection();
  
  if (!partKey || !parts[partKey]) return;
  
  selectedPartKey = partKey;
  window.__3D_STATE__.selectedPart = partKey;
  
  const info = partInfo[partKey];
  document.getElementById('selectedPartName').textContent = info.name;
  document.getElementById('partInfoContent').innerHTML = `
    <div class="part-name">${info.name}</div>
    <div class="part-desc">${info.desc}</div>
  `;
  
  // Highlight meshes in this group
  parts[partKey].group.traverse(node => {
    if (node.isMesh && node.material) {
      selectedMeshes.push(node);
      if (Array.isArray(node.material)) {
        const emissives = node.material.map(m => m.emissive ? m.emissive.clone() : new THREE.Color(0));
        originalEmissives.set(node, emissives);
        node.material.forEach(m => {
          if (m.emissive) m.emissive.set(0x335588);
        });
      } else {
        const orig = node.material.emissive ? node.material.emissive.clone() : new THREE.Color(0);
        originalEmissives.set(node, orig);
        if (node.material.emissive) {
          node.material.emissive.set(0x335588);
        }
      }
    }
  });
}

// Raycaster click
function onPointerDown(event) {
  if (window.__3D_STATE__.assemblyState !== 'disassembled') return;
  
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  // Collect all meshes from all part groups
  const allMeshes = [];
  for (const key in parts) {
    parts[key].group.traverse(node => {
      if (node.isMesh) {
        node.userData.partKey = key;
        allMeshes.push(node);
      }
    });
  }
  
  const intersects = raycaster.intersectObjects(allMeshes, false);
  
  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const partKey = hit.userData.partKey;
    if (partKey) {
      selectPart(partKey);
    }
  } else {
    clearSelection();
  }
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  // Only handle clicks, not drags
  const startX = e.clientX;
  const startY = e.clientY;
  
  const onUp = (e2) => {
    const dx = e2.clientX - startX;
    const dy = e2.clientY - startY;
    if (Math.sqrt(dx * dx + dy * dy) < 5) {
      onPointerDown(e);
    }
    renderer.domElement.removeEventListener('pointerup', onUp);
  };
  renderer.domElement.addEventListener('pointerup', onUp);
});

// Highlight pulse for selected parts
let pulseTime = 0;

// Animation loop
function animate(time) {
  requestAnimationFrame(animate);
  
  const deltaMs = time - (animate.lastTime || time);
  animate.lastTime = time;
  pulseTime += deltaMs * 0.003;
  
  controls.update();
  
  // Update camera distance
  window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);
  
  // Handle animation
  if (animating) {
    const elapsed = (time - animStartTime) / 1000;
    const t = Math.min(elapsed / ANIM_DURATION, 1);
    
    if (animDirection === 1) {
      animProgress = t;
    } else {
      animProgress = 1 - t;
    }
    
    const easedProgress = easeInOutCubic(animProgress);
    
    // Update part positions
    for (const key in parts) {
      const part = parts[key];
      const targetOffset = part.explodeDir.clone().multiplyScalar(easedProgress);
      part.group.position.copy(part.originalPos).add(targetOffset);
    }
    
    window.__3D_STATE__.animationProgress = t;
    document.getElementById('animProgress').textContent = Math.round(t * 100) + '%';
    document.getElementById('progressBarFill').style.width = Math.round(t * 100) + '%';
    
    if (t >= 1) {
      animating = false;
      if (animDirection === 1) {
        window.__3D_STATE__.assemblyState = 'disassembled';
        document.getElementById('assemblyStatus').textContent = '已拆卸';
        document.getElementById('assemblyStatus').style.color = '#ff6b6b';
      } else {
        window.__3D_STATE__.assemblyState = 'assembled';
        document.getElementById('assemblyStatus').textContent = '已组装';
        document.getElementById('assemblyStatus').style.color = '#44ff88';
      }
      window.__3D_STATE__.animationProgress = animDirection === 1 ? 1 : 0;
    }
  }
  
  // Pulse highlight on selected meshes
  if (selectedMeshes.length > 0) {
    const pulse = 0.3 + 0.2 * Math.sin(pulseTime * 2);
    selectedMeshes.forEach(mesh => {
      if (mesh.material) {
        if (Array.isArray(mesh.material)) {
          mesh.material.forEach(m => {
            if (m.emissive) m.emissive.setScalar(pulse);
          });
        } else {
          if (mesh.material.emissive) {
            mesh.material.emissive.set(
              pulse * 0.4,
              pulse * 0.6,
              pulse * 1.0
            );
          }
        }
      }
    });
  }
  
  // Update button states
  document.getElementById('disassembleBtn').disabled = animating || window.__3D_STATE__.assemblyState === 'disassembled';
  document.getElementById('assembleBtn').disabled = animating || window.__3D_STATE__.assemblyState === 'assembled';
  
  renderer.render(scene, camera);
}

animate(performance.now());

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
