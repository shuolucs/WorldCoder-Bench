<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three.js STL-like Mesh Viewer with Measurement & Annotation</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  #canvas-container { width: 100vw; height: 100vh; position: relative; }
  canvas { display: block; }

  #ui-panel {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(10, 10, 30, 0.88);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(100, 140, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e8ff;
    min-width: 280px;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 100;
  }

  #ui-panel h2 {
    font-size: 16px;
    margin-bottom: 14px;
    color: #8ab4ff;
    border-bottom: 1px solid rgba(100, 140, 255, 0.2);
    padding-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .stat-label { color: #8899bb; }
  .stat-value { color: #c0d8ff; font-weight: 600; font-variant-numeric: tabular-nums; }

  .section-title {
    font-size: 13px;
    color: #6a8ccc;
    margin-top: 14px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  #mode-toggle {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    background: linear-gradient(135deg, #2a4a8a, #3a5aaa);
    border: 1px solid rgba(100, 160, 255, 0.4);
    border-radius: 8px;
    color: #e0f0ff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }

  #mode-toggle:hover { background: linear-gradient(135deg, #3a5aaa, #4a6aca); }
  #mode-toggle.active { background: linear-gradient(135deg, #8a3a3a, #aa4a4a); border-color: rgba(255, 100, 100, 0.4); }

  #clear-btn {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    background: rgba(80, 80, 100, 0.4);
    border: 1px solid rgba(100, 100, 140, 0.3);
    border-radius: 8px;
    color: #99aabb;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #clear-btn:hover { background: rgba(120, 60, 60, 0.5); color: #ffaaaa; }

  #measurements-list {
    max-height: 150px;
    overflow-y: auto;
    margin-top: 8px;
  }

  #measurements-list::-webkit-scrollbar { width: 4px; }
  #measurements-list::-webkit-scrollbar-track { background: transparent; }
  #measurements-list::-webkit-scrollbar-thumb { background: rgba(100,140,255,0.3); border-radius: 2px; }

  .measurement-item {
    font-size: 12px;
    padding: 6px 8px;
    margin-bottom: 4px;
    background: rgba(40, 60, 100, 0.3);
    border-radius: 6px;
    border-left: 3px solid #5a8aff;
    color: #b0c8ee;
  }

  .hint {
    font-size: 11px;
    color: #667799;
    margin-top: 10px;
    line-height: 1.5;
    font-style: italic;
  }

  .css2d-label {
    background: rgba(10, 20, 50, 0.85);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(100, 180, 255, 0.5);
    border-radius: 6px;
    padding: 4px 10px;
    color: #b0d8ff;
    font-size: 12px;
    font-family: 'Segoe UI', monospace;
    white-space: nowrap;
    pointer-events: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .css2d-label.distance-label {
    border-color: rgba(255, 180, 60, 0.6);
    color: #ffd080;
  }

  .point-marker {
    width: 10px;
    height: 10px;
    background: #ff6644;
    border: 2px solid #ffaa88;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 8px rgba(255, 100, 60, 0.6);
  }

  #crosshair {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    display: none;
  }

  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255, 100, 60, 0.6);
  }

  #crosshair::before {
    width: 1px; height: 20px;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
  }

  #crosshair::after {
    width: 20px; height: 1px;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="crosshair"></div>

<div id="ui-panel">
  <h2>⬡ Mesh Inspector</h2>

  <div class="stat-row">
    <span class="stat-label">Faces</span>
    <span class="stat-value" id="face-count">—</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Vertices</span>
    <span class="stat-value" id="vertex-count">—</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Surface Area</span>
    <span class="stat-value" id="surface-area">—</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Volume</span>
    <span class="stat-value" id="volume">—</span>
  </div>

  <div class="section-title">📏 Measurements</div>
  <button id="mode-toggle">Enable Measure Mode</button>
  <button id="clear-btn">Clear All Measurements</button>
  <div id="measurements-list"></div>

  <div class="hint">
    In measure mode, click two points on the mesh surface to measure distance. Orbit is disabled during measurement.
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ============================================================
// State
// ============================================================
window.__3D_STATE__ = {
  faceCount: 0,
  vertexCount: 0,
  measurements: [],
  surfaceArea: 0,
  estimatedVolume: 0,
  annotations: []
};

let measureMode = false;
let firstPoint = null;
let firstPointMarker = null;
let annotationIdCounter = 0;

// ============================================================
// Scene Setup
// ============================================================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(2.5, 2, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const css2DRenderer = new CSS2DRenderer();
css2DRenderer.setSize(window.innerWidth, window.innerHeight);
css2DRenderer.domElement.style.position = 'absolute';
css2DRenderer.domElement.style.top = '0';
css2DRenderer.domElement.style.left = '0';
css2DRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(css2DRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1;
controls.maxDistance = 15;

// ============================================================
// Lighting
// ============================================================
const ambientLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight1.position.set(5, 8, 5);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x6688cc, 0.5);
dirLight2.position.set(-5, 3, -3);
scene.add(dirLight2);

const pointLight = new THREE.PointLight(0xff8844, 0.4, 20);
pointLight.position.set(0, 5, 0);
scene.add(pointLight);

// ============================================================
// Grid & Background
// ============================================================
scene.background = new THREE.Color(0x0a0a1e);
scene.fog = new THREE.FogExp2(0x0a0a1e, 0.08);

const gridHelper = new THREE.GridHelper(10, 20, 0x1a2a4a, 0x111833);
scene.add(gridHelper);

// ============================================================
// Generate Icosahedron with exactly 320 faces
// ============================================================
// IcosahedronGeometry(radius, detail)
// detail=0 → 20 faces, detail=1 → 80, detail=2 → 320, detail=3 → 1280
// detail=2 gives 320 faces ✓
const icoGeo = new THREE.IcosahedronGeometry(1, 2);

// Convert to non-indexed for STL-like triangle mesh (each face has its own vertices)
const nonIndexedGeo = icoGeo.toNonIndexed();
nonIndexedGeo.computeVertexNormals();

// Center and scale
nonIndexedGeo.computeBoundingBox();
const bbox = nonIndexedGeo.boundingBox;
const center = new THREE.Vector3();
bbox.getCenter(center);
nonIndexedGeo.translate(-center.x, -center.y, -center.z);

const posAttr = nonIndexedGeo.getAttribute('position');
const faceCount = posAttr.count / 3;
const vertexCount = posAttr.count;

// ============================================================
// Compute Surface Area & Volume
// ============================================================
let surfaceArea = 0;
let signedVolume = 0;

const vA = new THREE.Vector3();
const vB = new THREE.Vector3();
const vC = new THREE.Vector3();
const cross = new THREE.Vector3();

for (let i = 0; i < faceCount; i++) {
  vA.fromBufferAttribute(posAttr, i * 3);
  vB.fromBufferAttribute(posAttr, i * 3 + 1);
  vC.fromBufferAttribute(posAttr, i * 3 + 2);

  // Surface area: 0.5 * |AB × AC|
  const ab = new THREE.Vector3().subVectors(vB, vA);
  const ac = new THREE.Vector3().subVectors(vC, vA);
  cross.crossVectors(ab, ac);
  surfaceArea += 0.5 * cross.length();

  // Signed volume: (1/6) * a · (b × c)
  const crossBC = new THREE.Vector3().crossVectors(vB, vC);
  signedVolume += vA.dot(crossBC) / 6.0;
}

const estimatedVolume = Math.abs(signedVolume);

// ============================================================
// Mesh Material & Object
// ============================================================
const meshMaterial = new THREE.MeshPhysicalMaterial({
  color: 0x4488cc,
  metalness: 0.15,
  roughness: 0.35,
  clearcoat: 0.3,
  clearcoatRoughness: 0.2,
  side: THREE.DoubleSide,
  flatShading: true,
});

const mesh = new THREE.Mesh(nonIndexedGeo, meshMaterial);
mesh.position.set(0, 1, 0);
scene.add(mesh);

// Wireframe overlay
const wireframeMat = new THREE.MeshBasicMaterial({
  color: 0x88bbff,
  wireframe: true,
  transparent: true,
  opacity: 0.08,
});
const wireframeMesh = new THREE.Mesh(nonIndexedGeo, wireframeMat);
wireframeMesh.position.copy(mesh.position);
scene.add(wireframeMesh);

// ============================================================
// Update State & UI
// ============================================================
function updateState() {
  window.__3D_STATE__.faceCount = faceCount;
  window.__3D_STATE__.vertexCount = vertexCount;
  window.__3D_STATE__.surfaceArea = surfaceArea;
  window.__3D_STATE__.estimatedVolume = estimatedVolume;

  document.getElementById('face-count').textContent = faceCount;
  document.getElementById('vertex-count').textContent = vertexCount;
  document.getElementById('surface-area').textContent = surfaceArea.toFixed(4);
  document.getElementById('volume').textContent = estimatedVolume.toFixed(4);
}

updateState();

// ============================================================
// Raycaster for Measurement
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const crosshair = document.getElementById('crosshair');

function onMouseMove(event) {
  if (measureMode) {
    crosshair.style.display = 'block';
    crosshair.style.left = event.clientX + 'px';
    crosshair.style.top = event.clientY + 'px';
  } else {
    crosshair.style.display = 'none';
  }
}

function createPointMarkerCSS2D(position) {
  const div = document.createElement('div');
  div.className = 'point-marker';
  const label = new CSS2DObject(div);
  label.position.copy(position);
  scene.add(label);
  return label;
}

function createDistanceLabelCSS2D(position, text) {
  const div = document.createElement('div');
  div.className = 'css2d-label distance-label';
  div.textContent = text;
  const label = new CSS2DObject(div);
  label.position.copy(position);
  scene.add(label);
  return label;
}

function createAnnotationCSS2D(position, text) {
  const div = document.createElement('div');
  div.className = 'css2d-label';
  div.textContent = text;
  const label = new CSS2DObject(div);
  label.position.copy(position);
  scene.add(label);
  return label;
}

// Store all visual objects for cleanup
let measurementVisuals = [];

function createLineBetweenPoints(a, b) {
  const material = new THREE.LineBasicMaterial({
    color: 0xffaa44,
    linewidth: 2,
    transparent: true,
    opacity: 0.8,
  });
  const geometry = new THREE.BufferGeometry().setFromPoints([a, b]);
  const line = new THREE.Line(geometry, material);
  scene.add(line);
  return line;
}

function createDashedLineBetweenPoints(a, b) {
  const material = new THREE.LineDashedMaterial({
    color: 0xffaa44,
    dashSize: 0.05,
    gapSize: 0.03,
    transparent: true,
    opacity: 0.6,
  });
  const geometry = new THREE.BufferGeometry().setFromPoints([a, b]);
  const line = new THREE.Line(geometry, material);
  line.computeLineDistances();
  scene.add(line);
  return line;
}

function onClick(event) {
  if (!measureMode) return;

  // Ignore clicks on UI panel
  if (event.target.closest('#ui-panel')) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(mesh);

  if (intersects.length > 0) {
    const point = intersects[0].point.clone();

    if (!firstPoint) {
      // First point
      firstPoint = point;
      firstPointMarker = createPointMarkerCSS2D(point);
      measurementVisuals.push(firstPointMarker);
    } else {
      // Second point - compute distance
      const secondPoint = point;
      const distance = firstPoint.distanceTo(secondPoint);

      // Create visuals
      const marker2 = createPointMarkerCSS2D(secondPoint);
      measurementVisuals.push(marker2);

      const line = createDashedLineBetweenPoints(firstPoint, secondPoint);
      measurementVisuals.push(line);

      const midpoint = new THREE.Vector3().addVectors(firstPoint, secondPoint).multiplyScalar(0.5);
      const distLabel = createDistanceLabelCSS2D(midpoint, `📏 ${distance.toFixed(4)}`);
      measurementVisuals.push(distLabel);

      // Record measurement
      const measurement = {
        type: 'distance',
        value: distance,
        a: { x: firstPoint.x, y: firstPoint.y, z: firstPoint.z },
        b: { x: secondPoint.x, y: secondPoint.y, z: secondPoint.z }
      };
      window.__3D_STATE__.measurements.push(measurement);

      // Record annotations
      const annId1 = annotationIdCounter++;
      const annId2 = annotationIdCounter++;
      const annIdLabel = annotationIdCounter++;

      window.__3D_STATE__.annotations.push(
        { id: annId1, text: 'Point A', position: { x: firstPoint.x, y: firstPoint.y, z: firstPoint.z } },
        { id: annId2, text: 'Point B', position: { x: secondPoint.x, y: secondPoint.y, z: secondPoint.z } },
        { id: annIdLabel, text: `Distance: ${distance.toFixed(4)}`, position: { x: midpoint.x, y: midpoint.y, z: midpoint.z } }
      );

      // Update UI list
      updateMeasurementsList();

      // Reset
      firstPoint = null;
      firstPointMarker = null;
    }
  }
}

function updateMeasurementsList() {
  const listEl = document.getElementById('measurements-list');
  listEl.innerHTML = '';
  window.__3D_STATE__.measurements.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'measurement-item';
    div.textContent = `#${i + 1} Distance: ${m.value.toFixed(4)}`;
    listEl.appendChild(div);
  });
}

function clearMeasurements() {
  // Remove all visual objects
  measurementVisuals.forEach(obj => {
    scene.remove(obj);
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) obj.material.dispose();
    if (obj.element && obj.element.parentNode) {
      obj.element.parentNode.removeChild(obj.element);
    }
  });
  measurementVisuals = [];
  firstPoint = null;
  firstPointMarker = null;

  window.__3D_STATE__.measurements = [];
  window.__3D_STATE__.annotations = [];
  annotationIdCounter = 0;
  updateMeasurementsList();
}

// ============================================================
// Add initial mesh info annotation
// ============================================================
const infoAnnotation = createAnnotationCSS2D(
  new THREE.Vector3(0, 2.4, 0),
  `Icosahedron · ${faceCount} faces`
);
const infoAnnId = annotationIdCounter++;
window.__3D_STATE__.annotations.push({
  id: infoAnnId,
  text: `Icosahedron · ${faceCount} faces`,
  position: { x: 0, y: 2.4, z: 0 }
});

// ============================================================
// UI Event Listeners
// ============================================================
const modeToggle = document.getElementById('mode-toggle');
modeToggle.addEventListener('click', () => {
  measureMode = !measureMode;
  modeToggle.textContent = measureMode ? '🔴 Disable Measure Mode' : 'Enable Measure Mode';
  modeToggle.classList.toggle('active', measureMode);
  controls.enabled = !measureMode;
  renderer.domElement.style.cursor = measureMode ? 'crosshair' : 'grab';
  if (!measureMode) {
    crosshair.style.display = 'none';
    // If we had a first point but no second, clean it up
    if (firstPoint && firstPointMarker) {
      scene.remove(firstPointMarker);
      if (firstPointMarker.element && firstPointMarker.element.parentNode) {
        firstPointMarker.element.parentNode.removeChild(firstPointMarker.element);
      }
      const idx = measurementVisuals.indexOf(firstPointMarker);
      if (idx > -1) measurementVisuals.splice(idx, 1);
      firstPoint = null;
      firstPointMarker = null;
    }
  }
});

document.getElementById('clear-btn').addEventListener('click', clearMeasurements);

window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);

// ============================================================
// Resize
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  css2DRenderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// Animation Loop
// ============================================================
function animate() {
  requestAnimationFrame(animate);

  // Gentle floating animation for the mesh
  const t = performance.now() * 0.001;
  mesh.position.y = 1 + Math.sin(t * 0.5) * 0.05;
  wireframeMesh.position.y = mesh.position.y;
  mesh.rotation.y = t * 0.1;
  wireframeMesh.rotation.y = mesh.rotation.y;

  // Update info annotation position
  infoAnnotation.position.y = mesh.position.y + 1.4;

  controls.update();
  renderer.render(scene, camera);
  css2DRenderer.render(scene, camera);
}

animate();

console.log('__3D_STATE__:', window.__3D_STATE__);
</script>
</body>
</html>
