<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 类 STL 网格测量与标注</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #info {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      width: 320px;
      max-width: calc(100vw - 24px);
      background: rgba(20, 20, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 14px;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      line-height: 1.45;
      font-size: 13px;
    }

    #info h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    #info .row {
      margin: 6px 0;
    }

    #info .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      background: #2b6cff;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      font-size: 12px;
    }

    button.secondary {
      background: #444;
    }

    button:hover {
      filter: brightness(1.08);
    }

    #measurementsList, #annotationsList {
      max-height: 100px;
      overflow: auto;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      padding: 6px 8px;
      margin-top: 6px;
      font-size: 12px;
    }

    .label {
      color: #fff;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      white-space: nowrap;
      user-select: none;
      transform: translate(-50%, -120%);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .hint {
      color: #cfcfcf;
      opacity: 0.9;
      font-size: 12px;
    }

    .dot {
      position: absolute;
      width: 8px;
      height: 8px;
      margin-left: -4px;
      margin-top: -4px;
      border-radius: 50%;
      background: #ffb703;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.45);
      pointer-events: none;
      z-index: 12;
      display: none;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="info">
      <h2>类 STL 三角网格</h2>
      <div class="row">面数: <span id="faceCount">-</span></div>
      <div class="row">顶点数: <span id="vertexCount">-</span></div>
      <div class="row">表面积: <span id="surfaceArea">-</span></div>
      <div class="row">体积: <span id="volume">-</span></div>
      <div class="row hint">左键点击网格：测量模式下两次点击测点距；标注模式下单击添加标签。</div>

      <div class="btns">
        <button id="measureModeBtn">测量模式</button>
        <button id="annotateModeBtn" class="secondary">标注模式</button>
        <button id="clearPendingBtn" class="secondary">清除待测点</button>
        <button id="resetViewBtn" class="secondary">重置视角</button>
      </div>

      <div class="row" style="margin-top:10px;"><strong>测量记录</strong></div>
      <div id="measurementsList"></div>

      <div class="row" style="margin-top:10px;"><strong>标注记录</strong></div>
      <div id="annotationsList"></div>
    </div>
    <div id="pickDot" class="dot"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    const app = document.getElementById('app');
    const faceCountEl = document.getElementById('faceCount');
    const vertexCountEl = document.getElementById('vertexCount');
    const surfaceAreaEl = document.getElementById('surfaceArea');
    const volumeEl = document.getElementById('volume');
    const measurementsListEl = document.getElementById('measurementsList');
    const annotationsListEl = document.getElementById('annotationsList');
    const measureModeBtn = document.getElementById('measureModeBtn');
    const annotateModeBtn = document.getElementById('annotateModeBtn');
    const clearPendingBtn = document.getElementById('clearPendingBtn');
    const resetViewBtn = document.getElementById('resetViewBtn');
    const pickDot = document.getElementById('pickDot');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x15171a);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(2.2, 1.8, 2.6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    app.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const dir1 = new THREE.DirectionalLight(0xffffff, 1.0);
    dir1.position.set(3, 4, 5);
    scene.add(dir1);
    const dir2 = new THREE.DirectionalLight(0xffffff, 0.5);
    dir2.position.set(-4, -2, -3);
    scene.add(dir2);

    const group = new THREE.Group();
    scene.add(group);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const measurements = [];
    const annotations = [];

    window.__3D_STATE__ = {
      faceCount: 0,
      vertexCount: 0,
      measurements,
      surfaceArea: 0,
      estimatedVolume: 0,
      annotations
    };

    let mode = 'measure';
    let pendingMeasurePoints = [];
    let annotationId = 1;
    let mesh, wireframe, edges;
    let highlightMarkers = [];

    function setMode(newMode) {
      mode = newMode;
      if (mode === 'measure') {
        measureModeBtn.classList.remove('secondary');
        annotateModeBtn.classList.add('secondary');
      } else {
        annotateModeBtn.classList.remove('secondary');
        measureModeBtn.classList.add('secondary');
      }
    }

    function createGeometry() {
      // IcosahedronGeometry(detail=2) => 20 * 4^2 = 320 faces
      const geo = new THREE.IcosahedronGeometry(1, 2);

      // 转为非索引几何，便于按三角面累加与射线拾取后的 faceIndex 对应
      let bufferGeo = geo.toNonIndexed();

      // 居中并缩放到单位尺度附近
      bufferGeo.computeBoundingBox();
      const bbox = bufferGeo.boundingBox;
      const center = new THREE.Vector3();
      bbox.getCenter(center);

      const size = new THREE.Vector3();
      bbox.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = maxDim > 0 ? 2.0 / maxDim : 1.0;

      const pos = bufferGeo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        pos.setXYZ(
          i,
          (pos.getX(i) - center.x) * scale,
          (pos.getY(i) - center.y) * scale,
          (pos.getZ(i) - center.z) * scale
        );
      }
      pos.needsUpdate = true;
      bufferGeo.computeVertexNormals();
      bufferGeo.computeBoundingBox();
      bufferGeo.computeBoundingSphere();

      return bufferGeo;
    }

    function computeSurfaceArea(geometry) {
      const pos = geometry.attributes.position;
      const a = new THREE.Vector3();
      const b = new THREE.Vector3();
      const c = new THREE.Vector3();
      const ab = new THREE.Vector3();
      const ac = new THREE.Vector3();
      const cross = new THREE.Vector3();

      let area = 0;
      for (let i = 0; i < pos.count; i += 3) {
        a.fromBufferAttribute(pos, i);
        b.fromBufferAttribute(pos, i + 1);
        c.fromBufferAttribute(pos, i + 2);
        ab.subVectors(b, a);
        ac.subVectors(c, a);
        cross.crossVectors(ab, ac);
        area += 0.5 * cross.length();
      }
      return area;
    }

    function computeVolume(geometry) {
      const pos = geometry.attributes.position;
      const a = new THREE.Vector3();
      const b = new THREE.Vector3();
      const c = new THREE.Vector3();

      let volume = 0;
      for (let i = 0; i < pos.count; i += 3) {
        a.fromBufferAttribute(pos, i);
        b.fromBufferAttribute(pos, i + 1);
        c.fromBufferAttribute(pos, i + 2);
        volume += a.dot(new THREE.Vector3().crossVectors(b, c)) / 6.0;
      }
      return Math.abs(volume);
    }

    function addPointMarker(position, color = 0xffb703, radius = 0.018) {
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(radius, 20, 20),
        new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.35 })
      );
      sphere.position.copy(position);
      scene.add(sphere);
      highlightMarkers.push(sphere);
      return sphere;
    }

    function addDistanceVisual(a, b, value) {
      const lineGeo = new THREE.BufferGeometry().setFromPoints([a, b]);
      const lineMat = new THREE.LineBasicMaterial({ color: 0x00e5ff });
      const line = new THREE.Line(lineGeo, lineMat);
      scene.add(line);
      highlightMarkers.push(line);

      const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
      const div = document.createElement('div');
      div.className = 'label';
      div.textContent = `距离: ${value.toFixed(4)}`;
      const label = new CSS2DObject(div);
      label.position.copy(mid);
      scene.add(label);
      highlightMarkers.push(label);
    }

    function addAnnotation(position, text) {
      const div = document.createElement('div');
      div.className = 'label';
      div.textContent = text;
      const label = new CSS2DObject(div);
      label.position.copy(position);
      scene.add(label);

      addPointMarker(position, 0xff4d6d, 0.014);

      const item = {
        id: annotationId++,
        text,
        position: { x: position.x, y: position.y, z: position.z }
      };
      item._object = label;
      annotations.push(item);
      syncState();
      renderLists();
    }

    function renderLists() {
      measurementsListEl.innerHTML = measurements.length
        ? measurements.map((m, i) =>
            `<div>#${i + 1} ${m.type} = ${m.value.toFixed(6)}</div>`
          ).join('')
        : '<div style="opacity:.7;">暂无测量</div>';

      annotationsListEl.innerHTML = annotations.length
        ? annotations.map(a =>
            `<div>#${a.id} ${escapeHtml(a.text)} @ (${a.position.x.toFixed(3)}, ${a.position.y.toFixed(3)}, ${a.position.z.toFixed(3)})</div>`
          ).join('')
        : '<div style="opacity:.7;">暂无标注</div>';
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, s => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[s]));
    }

    function syncState() {
      const faceCount = mesh.geometry.attributes.position.count / 3;
      const vertexCount = mesh.geometry.attributes.position.count;
      const surfaceArea = computeSurfaceArea(mesh.geometry);
      const estimatedVolume = computeVolume(mesh.geometry);

      window.__3D_STATE__.faceCount = faceCount;
      window.__3D_STATE__.vertexCount = vertexCount;
      window.__3D_STATE__.surfaceArea = surfaceArea;
      window.__3D_STATE__.estimatedVolume = estimatedVolume;
      window.__3D_STATE__.measurements = measurements;
      window.__3D_STATE__.annotations = annotations.map(a => ({
        id: a.id,
        text: a.text,
        position: a.position
      }));

      faceCountEl.textContent = String(faceCount);
      vertexCountEl.textContent = String(vertexCount);
      surfaceAreaEl.textContent = surfaceArea.toFixed(6);
      volumeEl.textContent = estimatedVolume.toFixed(6);
    }

    function buildMesh() {
      const geometry = createGeometry();

      mesh = new THREE.Mesh(
        geometry,
        new THREE.MeshStandardMaterial({
          color: 0x7aa6ff,
          metalness: 0.08,
          roughness: 0.72,
          side: THREE.DoubleSide,
          flatShading: false
        })
      );
      group.add(mesh);

      wireframe = new THREE.Mesh(
        geometry,
        new THREE.MeshBasicMaterial({
          color: 0x000000,
          wireframe: true,
          transparent: true,
          opacity: 0.15
        })
      );
      group.add(wireframe);

      edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(geometry),
        new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.18 })
      );
      group.add(edges);

      syncState();
      renderLists();
    }

    function worldPointToScreen(point) {
      const p = point.clone().project(camera);
      return {
        x: (p.x * 0.5 + 0.5) * window.innerWidth,
        y: (-p.y * 0.5 + 0.5) * window.innerHeight
      };
    }

    function handlePick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObject(mesh, false);
      if (!hits.length) return;

      const hit = hits[0];
      const point = hit.point.clone();

      const screen = worldPointToScreen(point);
      pickDot.style.left = `${screen.x}px`;
      pickDot.style.top = `${screen.y}px`;
      pickDot.style.display = 'block';
      setTimeout(() => pickDot.style.display = 'none', 180);

      if (mode === 'measure') {
        pendingMeasurePoints.push(point);
        addPointMarker(point, 0xffb703, 0.015);

        if (pendingMeasurePoints.length === 2) {
          const a = pendingMeasurePoints[0];
          const b = pendingMeasurePoints[1];
          const value = a.distanceTo(b);

          measurements.push({
            type: 'distance',
            value,
            a: { x: a.x, y: a.y, z: a.z },
            b: { x: b.x, y: b.y, z: b.z }
          });

          addDistanceVisual(a, b, value);
          pendingMeasurePoints = [];
          syncState();
          renderLists();
        }
      } else if (mode === 'annotate') {
        const text = prompt('请输入标注文字：', `标注 ${annotationId}`);
        if (text && text.trim()) {
          addAnnotation(point, text.trim());
        }
      }
    }

    measureModeBtn.addEventListener('click', () => setMode('measure'));
    annotateModeBtn.addEventListener('click', () => setMode('annotate'));
    clearPendingBtn.addEventListener('click', () => {
      pendingMeasurePoints = [];
    });
    resetViewBtn.addEventListener('click', () => {
      camera.position.set(2.2, 1.8, 2.6);
      controls.target.set(0, 0, 0);
      controls.update();
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (event.button !== 0) return;
      handlePick(event);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    buildMesh();
    setMode('measure');

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
