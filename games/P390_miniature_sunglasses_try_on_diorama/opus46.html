<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sunglasses Try-On Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #fff;
  font-size: 14px;
  pointer-events: none;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}
#hud div {
  margin-bottom: 8px;
  background: rgba(0,0,0,0.5);
  padding: 6px 12px;
  border-radius: 6px;
  backdrop-filter: blur(4px);
}

#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}

.control-btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}
.control-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
}
.control-btn:active {
  transform: translateY(0);
}

#lensTintPicker {
  width: 40px;
  height: 36px;
  border: 2px solid #fff;
  border-radius: 6px;
  cursor: pointer;
  background: transparent;
  padding: 2px;
}

#loadingOverlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(26, 26, 46, 0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
  z-index: 100;
  transition: opacity 0.5s ease;
}
#loadingOverlay.hidden {
  opacity: 0;
  pointer-events: none;
}
.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #667eea;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

#tintLabel {
  color: #fff;
  font-size: 12px;
  margin-right: 4px;
}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div>Loading Diorama...</div>
</div>

<div id="hud">
  <div id="selectedLabel">Selected: None</div>
  <div id="tryOnStatus">Try-On: Inactive</div>
  <div id="turntableAngle">Turntable: 0°</div>
</div>

<div id="controls">
  <button class="control-btn" id="btnRotateLeft">⟲ Rotate Left</button>
  <button class="control-btn" id="btnTryOn">Try On</button>
  <button class="control-btn" id="btnReset">Reset</button>
  <button class="control-btn" id="btnRotateRight">Rotate Right ⟳</button>
  <span id="tintLabel">Lens Tint:</span>
  <input type="color" id="lensTintPicker" value="#4A2800">
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// Orbit controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2 + 0.3;
controls.minDistance = 3;
controls.maxDistance = 15;
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x667eea, 0x1a1a2e, 0.3);
scene.add(hemiLight);

// Turntable platform
const turntableGroup = new THREE.Group();
scene.add(turntableGroup);

const platformGeom = new THREE.CylinderGeometry(5, 5, 0.2, 64);
const platformMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.6, metalness: 0.3 });
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = -1.1;
platform.receiveShadow = true;
turntableGroup.add(platform);

// Ring around platform
const ringGeom = new THREE.TorusGeometry(5.1, 0.05, 16, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x667eea, emissive: 0x334477, emissiveIntensity: 0.5 });
const ring = new THREE.Mesh(ringGeom, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = -1.0;
turntableGroup.add(ring);

// Load diorama
let dioramaModel = null;
let modelLoaded = false;
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

let mixer = null;

gltfLoader.load(
  'https://threejs.org/examples/models/gltf/LittlestTokyo.glb',
  (gltf) => {
    dioramaModel = gltf.scene;
    dioramaModel.position.set(0, -1, 0);
    dioramaModel.scale.set(0.01, 0.01, 0.01);
    dioramaModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    turntableGroup.add(dioramaModel);
    modelLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(dioramaModel);
      gltf.animations.forEach((clip) => {
        mixer.clipAction(clip).play();
      });
    }

    document.getElementById('loadingOverlay').classList.add('hidden');
  },
  (progress) => {
    // loading progress
  },
  (error) => {
    console.error('Error loading model:', error);
    document.getElementById('loadingOverlay').innerHTML = '<div>Model loading failed. Scene continues without diorama.</div>';
    setTimeout(() => {
      document.getElementById('loadingOverlay').classList.add('hidden');
    }, 2000);
    modelLoaded = false;
  }
);

// Sunglasses styles
const styles = [
  { name: 'Aviator', frameColor: 0xFFD700, lensColor: 0x333333, lensOpacity: 0.6, frameType: 'aviator' },
  { name: 'Wayfarer', frameColor: 0x111111, lensColor: 0x4A2800, lensOpacity: 0.7, frameType: 'wayfarer' },
  { name: 'Round', frameColor: 0xC0C0C0, lensColor: 0x0044AA, lensOpacity: 0.5, frameType: 'round' },
  { name: 'Sport', frameColor: 0xCC0000, lensColor: 0x88CCFF, lensOpacity: 0.4, frameType: 'sport' },
];

const sunglassesGroups = [];
const originalPositions = [];
const originalScales = [];
const lensMeshes = []; // store lens meshes for tint changing

function createSunglasses(style, index) {
  const group = new THREE.Group();
  const frameMat = new THREE.MeshStandardMaterial({
    color: style.frameColor,
    roughness: 0.3,
    metalness: 0.8,
  });
  const lensMat = new THREE.MeshPhysicalMaterial({
    color: style.lensColor,
    transparent: true,
    opacity: style.lensOpacity,
    roughness: 0.1,
    metalness: 0.2,
    clearcoat: 1.0,
    clearcoatRoughness: 0.1,
    side: THREE.DoubleSide,
  });

  const lensGroup = [];

  if (style.frameType === 'aviator') {
    // Aviator: teardrop-ish shape using torus frames
    for (let side = -1; side <= 1; side += 2) {
      const frameRing = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.025, 16, 32), frameMat);
      frameRing.position.x = side * 0.45;
      frameRing.scale.y = 1.2;
      group.add(frameRing);

      const lens = new THREE.Mesh(new THREE.CircleGeometry(0.33, 32), lensMat);
      lens.position.x = side * 0.45;
      group.add(lens);
      lensGroup.push(lens);
    }
    // Bridge
    const bridge = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.2, 8), frameMat);
    bridge.rotation.z = Math.PI / 2;
    bridge.position.y = 0.1;
    group.add(bridge);
    // Arms
    for (let side = -1; side <= 1; side += 2) {
      const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.012, 1.0, 8), frameMat);
      arm.position.set(side * 0.8, 0, -0.5);
      arm.rotation.x = Math.PI / 2;
      group.add(arm);
    }
  } else if (style.frameType === 'wayfarer') {
    // Wayfarer: rectangular-ish frames
    for (let side = -1; side <= 1; side += 2) {
      const frameShape = new THREE.Shape();
      const w = 0.38, h = 0.3, r = 0.05;
      frameShape.moveTo(-w + r, -h);
      frameShape.lineTo(w - r, -h);
      frameShape.quadraticCurveTo(w, -h, w, -h + r);
      frameShape.lineTo(w, h - r);
      frameShape.quadraticCurveTo(w, h, w - r, h);
      frameShape.lineTo(-w + r, h);
      frameShape.quadraticCurveTo(-w, h, -w, h - r);
      frameShape.lineTo(-w, -h + r);
      frameShape.quadraticCurveTo(-w, -h, -w + r, -h);

      const extrudeSettings = { depth: 0.04, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 3 };
      const frameGeom = new THREE.ExtrudeGeometry(frameShape, extrudeSettings);
      const frame = new THREE.Mesh(frameGeom, frameMat);
      frame.position.set(side * 0.45, 0, -0.02);
      group.add(frame);

      const lens = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.54), lensMat);
      lens.position.set(side * 0.45, 0, 0.01);
      group.add(lens);
      lensGroup.push(lens);
    }
    // Bridge
    const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.06, 0.04), frameMat);
    bridge.position.set(0, 0.12, 0);
    group.add(bridge);
    // Arms
    for (let side = -1; side <= 1; side += 2) {
      const arm = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.03, 1.0), frameMat);
      arm.position.set(side * 0.82, 0.15, -0.5);
      group.add(arm);
    }
  } else if (style.frameType === 'round') {
    // Round: circular frames
    for (let side = -1; side <= 1; side += 2) {
      const frameRing = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.025, 16, 32), frameMat);
      frameRing.position.x = side * 0.4;
      group.add(frameRing);

      const lens = new THREE.Mesh(new THREE.CircleGeometry(0.28, 32), lensMat);
      lens.position.x = side * 0.4;
      group.add(lens);
      lensGroup.push(lens);
    }
    // Bridge
    const bridge = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.02, 8, 16, Math.PI), frameMat);
    bridge.position.y = 0.15;
    bridge.rotation.z = Math.PI;
    group.add(bridge);
    // Arms
    for (let side = -1; side <= 1; side += 2) {
      const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.012, 0.9, 8), frameMat);
      arm.position.set(side * 0.7, 0, -0.45);
      arm.rotation.x = Math.PI / 2;
      group.add(arm);
    }
  } else if (style.frameType === 'sport') {
    // Sport: wrap-around style
    const curvePoints = [];
    for (let i = 0; i <= 20; i++) {
      const t = (i / 20) * Math.PI;
      curvePoints.push(new THREE.Vector3(Math.cos(t) * 0.9, Math.sin(t) * 0.25, -Math.sin(t) * 0.15));
    }
    const curve = new THREE.CatmullRomCurve3(curvePoints);
    const tubeGeom = new THREE.TubeGeometry(curve, 32, 0.025, 8, false);
    const frameTube = new THREE.Mesh(tubeGeom, frameMat);
    group.add(frameTube);

    for (let side = -1; side <= 1; side += 2) {
      const lens = new THREE.Mesh(
        new THREE.SphereGeometry(0.35, 32, 16, 0, Math.PI, 0, Math.PI / 2),
        lensMat
      );
      lens.position.set(side * 0.42, 0, 0);
      lens.scale.set(1, 0.7, 0.3);
      group.add(lens);
      lensGroup.push(lens);
    }
    // Arms
    for (let side = -1; side <= 1; side += 2) {
      const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.015, 1.0, 8), frameMat);
      arm.position.set(side * 0.88, 0.1, -0.5);
      arm.rotation.x = Math.PI / 2;
      group.add(arm);
    }
  }

  lensMeshes.push(lensGroup);

  // Position in arc
  const totalCount = 4;
  const arcSpread = 3.0;
  const xPos = (index - (totalCount - 1) / 2) * (arcSpread / (totalCount - 1)) * 2;
  const yPos = 3.5;
  const zPos = -1 + Math.abs(index - 1.5) * 0.3;

  group.position.set(xPos, yPos, zPos);
  group.userData = { index, style: style.name, originalY: yPos };

  originalPositions.push({ x: xPos, y: yPos, z: zPos });
  originalScales.push(1.0);

  scene.add(group);
  sunglassesGroups.push(group);
}

styles.forEach((style, i) => createSunglasses(style, i));

// State
let selectedIndex = -1;
let tryOnActive = false;
let turntableAngleDeg = 0;
let turntableRotating = false;
let currentLensTint = '#4A2800';

// Animation targets
const animTargets = sunglassesGroups.map((g, i) => ({
  targetY: originalPositions[i].y,
  targetScale: 1.0,
  currentY: originalPositions[i].y,
  currentScale: 1.0,
}));

let turntableTargetAngle = 0;
let turntableAnimating = false;

// State object
window.__3D_STATE__ = {
  selectedIndex: -1,
  selectedName: 'None',
  tryOnActive: false,
  turntableAngleDeg: 0,
  sunglassesPositions: originalPositions.map(p => ({ ...p })),
  sunglassesScales: [1, 1, 1, 1],
  lensTintColor: currentLensTint,
  modelLoaded: false,
  dioramaVisible: true,
  turntableRotating: false,
};

function updateHUD() {
  const name = selectedIndex >= 0 ? styles[selectedIndex].name : 'None';
  document.getElementById('selectedLabel').textContent = `Selected: ${name}`;
  document.getElementById('tryOnStatus').textContent = `Try-On: ${tryOnActive ? 'Active' : 'Inactive'}`;
  document.getElementById('turntableAngle').textContent = `Turntable: ${Math.round(turntableAngleDeg)}°`;
}

function selectSunglasses(index) {
  if (index === selectedIndex) return;

  // Deselect previous
  if (selectedIndex >= 0) {
    animTargets[selectedIndex].targetY = originalPositions[selectedIndex].y;
    animTargets[selectedIndex].targetScale = 1.0;
  }

  if (tryOnActive) {
    tryOnActive = false;
    turntableRotating = false;
  }

  selectedIndex = index;

  if (index >= 0) {
    animTargets[index].targetY = 2.0;
    animTargets[index].targetScale = 1.5;
  }

  updateHUD();
}

function toggleTryOn() {
  if (selectedIndex < 0) return;

  tryOnActive = !tryOnActive;

  if (tryOnActive) {
    animTargets[selectedIndex].targetY = 1.2;
    animTargets[selectedIndex].targetScale = 1.5;
    turntableRotating = true;
  } else {
    animTargets[selectedIndex].targetY = 2.0;
    turntableRotating = false;
  }

  updateHUD();
}

function resetAll() {
  if (selectedIndex >= 0) {
    animTargets[selectedIndex].targetY = originalPositions[selectedIndex].y;
    animTargets[selectedIndex].targetScale = 1.0;
  }
  selectedIndex = -1;
  tryOnActive = false;
  turntableRotating = false;

  // Reset all positions
  sunglassesGroups.forEach((g, i) => {
    animTargets[i].targetY = originalPositions[i].y;
    animTargets[i].targetScale = 1.0;
  });

  updateHUD();
}

function rotateTurntable(degrees) {
  turntableTargetAngle += degrees;
  turntableAnimating = true;
}

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  for (let i = 0; i < sunglassesGroups.length; i++) {
    const intersects = raycaster.intersectObjects(sunglassesGroups[i].children, true);
    if (intersects.length > 0) {
      selectSunglasses(i);
      return;
    }
  }
});

// Button events
document.getElementById('btnTryOn').addEventListener('click', toggleTryOn);
document.getElementById('btnReset').addEventListener('click', resetAll);
document.getElementById('btnRotateLeft').addEventListener('click', () => rotateTurntable(-45));
document.getElementById('btnRotateRight').addEventListener('click', () => rotateTurntable(45));

document.getElementById('lensTintPicker').addEventListener('input', (e) => {
  currentLensTint = e.target.value;
  if (selectedIndex >= 0) {
    const color = new THREE.Color(currentLensTint);
    lensMeshes[selectedIndex].forEach(lens => {
      lens.material.color.copy(color);
    });
  }
});

// Keyboard
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key >= '1' && key <= '4') {
    selectSunglasses(parseInt(key) - 1);
  } else if (key === 't') {
    toggleTryOn();
  } else if (key === 'r') {
    resetAll();
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Update mixer
  if (mixer) mixer.update(delta);

  // Animate sunglasses
  sunglassesGroups.forEach((group, i) => {
    const target = animTargets[i];
    const speed = 4.0;

    target.currentY = lerp(target.currentY, target.targetY, delta * speed);
    target.currentScale = lerp(target.currentScale, target.targetScale, delta * speed);

    // Floating bob
    const bobPhase = i * 1.5;
    const bobAmount = 0.15;
    const bob = Math.sin(elapsed * 2 + bobPhase) * bobAmount;

    group.position.y = target.currentY + bob;
    group.position.x = originalPositions[i].x;
    group.position.z = originalPositions[i].z;

    group.scale.setScalar(target.currentScale);

    // Face camera when in try-on mode
    if (tryOnActive && i === selectedIndex) {
      group.lookAt(camera.position);
    } else {
      // Gentle rotation
      group.rotation.y = Math.sin(elapsed * 0.5 + i) * 0.1;
    }
  });

  // Turntable rotation
  if (turntableRotating) {
    turntableAngleDeg += 20 * delta;
    if (turntableAngleDeg >= 360) turntableAngleDeg -= 360;
    turntableGroup.rotation.y = THREE.MathUtils.degToRad(turntableAngleDeg);
  }

  if (turntableAnimating) {
    const currentDeg = THREE.MathUtils.radToDeg(turntableGroup.rotation.y);
    const diff = turntableTargetAngle - turntableAngleDeg;
    if (Math.abs(diff) < 0.5) {
      turntableAngleDeg = turntableTargetAngle;
      turntableAnimating = false;
    } else {
      turntableAngleDeg = lerp(turntableAngleDeg, turntableTargetAngle, delta * 5);
    }
    // Normalize
    while (turntableAngleDeg < 0) turntableAngleDeg += 360;
    while (turntableAngleDeg >= 360) turntableAngleDeg -= 360;
    turntableGroup.rotation.y = THREE.MathUtils.degToRad(turntableAngleDeg);
  }

  // Update state
  const state = window.__3D_STATE__;
  state.selectedIndex = selectedIndex;
  state.selectedName = selectedIndex >= 0 ? styles[selectedIndex].name : 'None';
  state.tryOnActive = tryOnActive;
  state.turntableAngleDeg = Math.round(turntableAngleDeg);
  state.sunglassesPositions = sunglassesGroups.map(g => ({
    x: parseFloat(g.position.x.toFixed(3)),
    y: parseFloat(g.position.y.toFixed(3)),
    z: parseFloat(g.position.z.toFixed(3)),
  }));
  state.sunglassesScales = sunglassesGroups.map(g => parseFloat(g.scale.x.toFixed(3)));
  state.lensTintColor = currentLensTint;
  state.modelLoaded = modelLoaded;
  state.dioramaVisible = dioramaModel ? dioramaModel.visible : false;
  state.turntableRotating = turntableRotating;

  updateHUD();
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
