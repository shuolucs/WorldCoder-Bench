<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Miniature Sunglasses Try-On Diorama</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #20242c 0%, #0f1116 70%);
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 10;
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 14px;
      backdrop-filter: blur(6px);
      min-width: 220px;
    }

    #ui div {
      margin: 6px 0;
      font-size: 14px;
    }

    #pickerWrap {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #lensTintPicker {
      width: 44px;
      height: 30px;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    #controls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      z-index: 10;
      width: min(90vw, 700px);
    }

    .control-btn {
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      background: rgba(255,255,255,0.12);
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(6px);
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .control-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    .control-btn:active {
      transform: translateY(0);
    }

    #hint {
      position: absolute;
      right: 14px;
      top: 14px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 260px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="selectedLabel">Selected: None</div>
    <div id="tryOnStatus">Try-On: Inactive</div>
    <div id="turntableAngle">Turntable Angle: 0°</div>
    <div id="pickerWrap">
      <label for="lensTintPicker">Lens Tint</label>
      <input id="lensTintPicker" type="color" value="#444444" />
    </div>
  </div>

  <div id="hint">
    Click sunglasses or use keys 1-4.<br />
    T = Try On, R = Reset
  </div>

  <div id="controls">
    <button class="control-btn" id="rotateLeftBtn">Rotate Left</button>
    <button class="control-btn" id="rotateRightBtn">Rotate Right</button>
    <button class="control-btn" id="tryOnBtn">Try On</button>
    <button class="control-btn" id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/DRACOLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101318);
    scene.fog = new THREE.Fog(0x101318, 12, 26);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -12;
    dirLight.shadow.camera.right = 12;
    dirLight.shadow.camera.top = 12;
    dirLight.shadow.camera.bottom = -12;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    const turntable = new THREE.Group();
    scene.add(turntable);

    const platformGeo = new THREE.CylinderGeometry(5, 5, 0.2, 64);
    const platformMat = new THREE.MeshStandardMaterial({
      color: 0x3a3a3a,
      roughness: 0.85,
      metalness: 0.15
    });
    const platform = new THREE.Mesh(platformGeo, platformMat);
    platform.position.set(0, -1.1, 0);
    platform.receiveShadow = true;
    platform.castShadow = true;
    turntable.add(platform);

    const tabletopShadow = new THREE.Mesh(
      new THREE.CircleGeometry(6.2, 64),
      new THREE.MeshBasicMaterial({ color: 0x050505, transparent: true, opacity: 0.25 })
    );
    tabletopShadow.rotation.x = -Math.PI / 2;
    tabletopShadow.position.y = -1.19;
    scene.add(tabletopShadow);

    let diorama = null;
    let modelLoaded = false;
    let dioramaVisible = false;

    const loader = new GLTFLoader();
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
    loader.setDRACOLoader(dracoLoader);

    loader.load(
      'https://threejs.org/examples/models/gltf/LittlestTokyo.glb',
      (gltf) => {
        diorama = gltf.scene;
        diorama.position.set(0, -1, 0);
        diorama.scale.setScalar(0.01);
        diorama.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        turntable.add(diorama);
        modelLoaded = true;
        dioramaVisible = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load LittlestTokyo.glb', err);
      }
    );

    const styles = [
      { name: 'Aviator', frame: '#FFD700', lens: '#444444', opacity: 0.6 },
      { name: 'Wayfarer', frame: '#111111', lens: '#4A2800', opacity: 0.7 },
      { name: 'Round', frame: '#C0C0C0', lens: '#0044AA', opacity: 0.5 },
      { name: 'Sport', frame: '#CC0000', lens: '#88CCFF', opacity: 0.4 }
    ];

    const sunglasses = [];
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const clock = new THREE.Clock();

    function createSunglasses(style, index) {
      const group = new THREE.Group();
      group.userData.index = index;
      group.userData.name = style.name;
      group.userData.baseScale = 1;
      group.userData.floatPhase = index * 0.9;
      group.userData.lensMeshes = [];
      group.userData.baseArcPos = new THREE.Vector3();
      group.userData.anim = {
        posStart: new THREE.Vector3(),
        posEnd: new THREE.Vector3(),
        scaleStart: 1,
        scaleEnd: 1,
        rotStartY: 0,
        rotEndY: 0,
        rotStartX: 0,
        rotEndX: 0,
        startTime: 0,
        duration: 0,
        active: false
      };

      const frameMat = new THREE.MeshStandardMaterial({
        color: style.frame,
        metalness: 0.75,
        roughness: 0.25
      });

      const lensMat = new THREE.MeshStandardMaterial({
        color: style.lens,
        transparent: true,
        opacity: style.opacity,
        metalness: 0.1,
        roughness: 0.15
      });

      const bridgeMat = frameMat;

      const lensWidth = style.name === 'Sport' ? 1.2 : 0.95;
      const lensHeight = style.name === 'Aviator' ? 1.05 : style.name === 'Wayfarer' ? 0.75 : style.name === 'Sport' ? 0.6 : 0.85;
      const lensDepth = 0.08;

      const ringGeo = new THREE.TorusGeometry(
        style.name === 'Aviator' ? 0.56 : style.name === 'Sport' ? 0.6 : 0.5,
        0.045,
        12,
        32
      );

      const leftFrame = new THREE.Mesh(ringGeo, frameMat);
      const rightFrame = new THREE.Mesh(ringGeo, frameMat);

      leftFrame.scale.set(
        style.name === 'Sport' ? 1.2 : style.name === 'Wayfarer' ? 1.15 : 1.0,
        style.name === 'Aviator' ? 1.25 : style.name === 'Wayfarer' ? 0.85 : style.name === 'Sport' ? 0.7 : 1.0,
        1
      );
      rightFrame.scale.copy(leftFrame.scale);

      leftFrame.position.set(-0.62, 0, 0);
      rightFrame.position.set(0.62, 0, 0);

      const leftLens = new THREE.Mesh(
        new THREE.BoxGeometry(lensWidth, lensHeight, lensDepth),
        lensMat.clone()
      );
      const rightLens = new THREE.Mesh(
        new THREE.BoxGeometry(lensWidth, lensHeight, lensDepth),
        lensMat.clone()
      );

      leftLens.position.set(-0.62, 0, 0);
      rightLens.position.set(0.62, 0, 0);
      leftLens.scale.set(0.78, 0.78, 0.55);
      rightLens.scale.copy(leftLens.scale);

      if (style.name === 'Aviator') {
        leftLens.scale.y = 1.0;
        rightLens.scale.y = 1.0;
      }
      if (style.name === 'Sport') {
        leftLens.scale.set(0.95, 0.6, 0.5);
        rightLens.scale.copy(leftLens.scale);
      }

      const bridge = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.03, 0.35, 16),
        bridgeMat
      );
      bridge.rotation.z = Math.PI / 2;
      bridge.position.set(0, 0.12, 0);

      const armGeo = new THREE.CylinderGeometry(0.028, 0.02, 1.2, 12);
      const leftArm = new THREE.Mesh(armGeo, frameMat);
      const rightArm = new THREE.Mesh(armGeo, frameMat);

      leftArm.position.set(-1.2, 0.02, -0.52);
      rightArm.position.set(1.2, 0.02, -0.52);
      leftArm.rotation.z = Math.PI / 2.5;
      rightArm.rotation.z = -Math.PI / 2.5;
      leftArm.rotation.x = Math.PI / 2.9;
      rightArm.rotation.x = Math.PI / 2.9;

      [leftFrame, rightFrame, leftLens, rightLens, bridge, leftArm, rightArm].forEach(m => {
        m.castShadow = true;
        m.receiveShadow = true;
        group.add(m);
      });

      group.userData.lensMeshes.push(leftLens, rightLens);
      return group;
    }

    const arcRadius = 4.2;
    for (let i = 0; i < 4; i++) {
      const sg = createSunglasses(styles[i], i);
      const angle = THREE.MathUtils.degToRad(-40 + i * 26.666);
      const x = Math.sin(angle) * arcRadius;
      const z = Math.cos(angle) * arcRadius * 0.18 - 0.2;
      const y = 3.5;

      sg.position.set(x, y, z);
      sg.rotation.y = -angle * 0.35;
      sg.scale.setScalar(1);

      sg.userData.baseArcPos.set(x, y, z);
      sg.userData.baseRotY = sg.rotation.y;
      scene.add(sg);
      sunglasses.push(sg);
    }

    let selectedIndex = -1;
    let tryOnActive = false;
    let turntableRotating = false;
    let targetTurntableRotation = turntable.rotation.y;

    const selectedLabel = document.getElementById('selectedLabel');
    const tryOnStatus = document.getElementById('tryOnStatus');
    const turntableAngle = document.getElementById('turntableAngle');
    const lensTintPicker = document.getElementById('lensTintPicker');

    function updateLabels() {
      const name = selectedIndex >= 0 ? styles[selectedIndex].name : 'None';
      selectedLabel.textContent = `Selected: ${name}`;
      tryOnStatus.textContent = `Try-On: ${tryOnActive ? 'Active' : 'Inactive'}`;
      let deg = THREE.MathUtils.radToDeg(turntable.rotation.y) % 360;
      if (deg < 0) deg += 360;
      turntableAngle.textContent = `Turntable Angle: ${Math.round(deg)}°`;
    }

    function animateSunglassesTo(index, pos, scale, duration = 0.5, rotY = null, rotX = null) {
      const sg = sunglasses[index];
      const a = sg.userData.anim;
      a.posStart.copy(sg.position);
      a.posEnd.copy(pos);
      a.scaleStart = sg.scale.x;
      a.scaleEnd = scale;
      a.rotStartY = sg.rotation.y;
      a.rotEndY = rotY !== null ? rotY : sg.rotation.y;
      a.rotStartX = sg.rotation.x;
      a.rotEndX = rotX !== null ? rotX : sg.rotation.x;
      a.startTime = performance.now() / 1000;
      a.duration = duration;
      a.active = true;
    }

    function restoreArcPosition(index) {
      const sg = sunglasses[index];
      animateSunglassesTo(
        index,
        sg.userData.baseArcPos.clone(),
        1,
        0.5,
        sg.userData.baseRotY,
        0
      );
    }

    function selectSunglasses(index) {
      if (index < 0 || index > 3) return;
      if (selectedIndex === index && !tryOnActive) return;

      if (selectedIndex !== -1 && selectedIndex !== index) {
        restoreArcPosition(selectedIndex);
      }

      selectedIndex = index;
      const sg = sunglasses[index];
      const target = sg.userData.baseArcPos.clone();
      target.y = 2.0;

      animateSunglassesTo(index, target, 1.5, 0.5, 0, 0);
      lensTintPicker.value = '#' + sg.userData.lensMeshes[0].material.color.getHexString();

      if (tryOnActive) {
        activateTryOn(true);
      }
      updateLabels();
    }

    function activateTryOn(force = false) {
      if (selectedIndex === -1 && !force) return;
      tryOnActive = !force ? !tryOnActive : true;

      if (tryOnActive && selectedIndex !== -1) {
        const sg = sunglasses[selectedIndex];
        const target = new THREE.Vector3(0, 1.2, 2.0);
        animateSunglassesTo(selectedIndex, target, 1.7, 0.5, 0, 0);
        turntableRotating = true;
      } else if (!tryOnActive) {
        turntableRotating = false;
        if (selectedIndex !== -1) {
          const sg = sunglasses[selectedIndex];
          const target = sg.userData.baseArcPos.clone();
          target.y = 2.0;
          animateSunglassesTo(selectedIndex, target, 1.5, 0.5, 0, 0);
        }
      }
      updateLabels();
    }

    function resetAll() {
      tryOnActive = false;
      turntableRotating = false;
      selectedIndex = -1;
      targetTurntableRotation = 0;

      for (let i = 0; i < sunglasses.length; i++) {
        restoreArcPosition(i);
      }

      updateLabels();
    }

    function rotateTurntable(deltaDeg) {
      targetTurntableRotation += THREE.MathUtils.degToRad(deltaDeg);
    }

    function updateLensTint(colorHex) {
      if (selectedIndex === -1) return;
      const sg = sunglasses[selectedIndex];
      sg.userData.lensMeshes.forEach(mesh => {
        mesh.material.color.set(colorHex);
      });
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(sunglasses, true);
      if (hits.length > 0) {
        let obj = hits[0].object;
        while (obj && !sunglasses.includes(obj)) obj = obj.parent;
        if (obj && obj.userData.index !== undefined) {
          selectSunglasses(obj.userData.index);
        }
      }
    });

    document.getElementById('tryOnBtn').addEventListener('click', () => {
      if (selectedIndex !== -1) activateTryOn();
    });

    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('rotateLeftBtn').addEventListener('click', () => rotateTurntable(-45));
    document.getElementById('rotateRightBtn').addEventListener('click', () => rotateTurntable(45));

    lensTintPicker.addEventListener('input', (e) => {
      updateLensTint(e.target.value);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '4') {
        selectSunglasses(parseInt(e.key) - 1);
      } else if (e.key.toLowerCase() === 't') {
        if (selectedIndex !== -1) activateTryOn();
      } else if (e.key.toLowerCase() === 'r') {
        resetAll();
      }
    });

    window.__3D_STATE__ = {
      selectedIndex: -1,
      selectedName: 'None',
      tryOnActive: false,
      turntableAngleDeg: 0,
      sunglassesPositions: [],
      sunglassesScales: [],
      lensTintColor: '#444444',
      modelLoaded: false,
      dioramaVisible: false,
      turntableRotating: false
    };

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function updateAnimations(elapsed) {
      for (let i = 0; i < sunglasses.length; i++) {
        const sg = sunglasses[i];
        const a = sg.userData.anim;

        if (a.active) {
          const t = Math.min((elapsed - a.startTime) / a.duration, 1);
          const k = easeInOutCubic(t);
          sg.position.lerpVectors(a.posStart, a.posEnd, k);
          const s = THREE.MathUtils.lerp(a.scaleStart, a.scaleEnd, k);
          sg.scale.setScalar(s);
          sg.rotation.y = THREE.MathUtils.lerp(a.rotStartY, a.rotEndY, k);
          sg.rotation.x = THREE.MathUtils.lerp(a.rotStartX, a.rotEndX, k);
          if (t >= 1) a.active = false;
        } else {
          const isSelected = i === selectedIndex;
          if (!(tryOnActive && isSelected)) {
            const baseY = isSelected ? 2.0 : sg.userData.baseArcPos.y;
            const bob = Math.sin(elapsed * 2.0 + sg.userData.floatPhase) * 0.15;
            sg.position.y = baseY + bob;
          }
        }

        if (tryOnActive && i === selectedIndex) {
          sg.lookAt(camera.position.x, camera.position.y, camera.position.z);
        }
      }

      if (tryOnActive && turntableRotating) {
        turntable.rotation.y += 0.0035;
      }

      const diff = targetTurntableRotation - turntable.rotation.y;
      if (Math.abs(diff) > 0.001) {
        turntable.rotation.y += diff * 0.08;
      }
    }

    function updateState() {
      let angleDeg = THREE.MathUtils.radToDeg(turntable.rotation.y) % 360;
      if (angleDeg < 0) angleDeg += 360;

      window.__3D_STATE__.selectedIndex = selectedIndex;
      window.__3D_STATE__.selectedName = selectedIndex === -1 ? 'None' : styles[selectedIndex].name;
      window.__3D_STATE__.tryOnActive = tryOnActive;
      window.__3D_STATE__.turntableAngleDeg = Math.round(angleDeg);
      window.__3D_STATE__.sunglassesPositions = sunglasses.map(s => ({
        x: Number(s.position.x.toFixed(3)),
        y: Number(s.position.y.toFixed(3)),
        z: Number(s.position.z.toFixed(3))
      }));
      window.__3D_STATE__.sunglassesScales = sunglasses.map(s => Number(s.scale.x.toFixed(3)));
      window.__3D_STATE__.lensTintColor =
        selectedIndex !== -1
          ? '#' + sunglasses[selectedIndex].userData.lensMeshes[0].material.color.getHexString()
          : lensTintPicker.value;
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.dioramaVisible = dioramaVisible;
      window.__3D_STATE__.turntableRotating = turntableRotating;

      updateLabels();
    }

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = performance.now() / 1000;
      updateAnimations(elapsed);
      updateState();
      renderer.render(scene, camera);
    }

    updateLabels();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
