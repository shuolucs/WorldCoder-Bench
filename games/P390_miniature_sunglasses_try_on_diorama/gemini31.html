<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Miniature Sunglasses Try-On</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            margin: 20px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #top-left-hud {
            align-self: flex-start;
        }
        .hud-text {
            margin: 5px 0;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .hud-value {
            font-weight: bold;
            color: #4da6ff;
        }
        #controls-container {
            align-self: center;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            pointer-events: auto;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .control-btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .control-btn:hover {
            background: #4da6ff;
            border-color: #4da6ff;
            color: #000;
        }
        .control-btn:active {
            transform: scale(0.95);
        }
        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 10px;
            padding-left: 15px;
            border-left: 1px solid #555;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #fff;
            border-radius: 50%;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="top-left-hud" class="hud-panel">
            <div class="hud-text">Status: <span id="selectedLabel" class="hud-value">None</span></div>
            <div class="hud-text"><span id="tryOnStatus" class="hud-value" style="color:#ff9900">Try-On: Inactive</span></div>
            <div class="hud-text">Turntable: <span id="turntableAngle" class="hud-value">0</span>°</div>
        </div>

        <div class="instructions">
            Click glasses to select<br>
            Keys: 1-4 (Select), T (Try-On), R (Reset)
        </div>

        <div id="controls-container">
            <button id="btn-rotate-left" class="control-btn">↶ Rotate</button>
            <button id="btn-try-on" class="control-btn">Try On</button>
            <button id="btn-reset" class="control-btn">Reset</button>
            <button id="btn-rotate-right" class="control-btn">Rotate ↷</button>
            
            <div class="color-picker-container">
                <label for="lensTintPicker" style="font-size: 12px; text-transform: uppercase; font-weight: bold;">Lens Tint</label>
                <input type="color" id="lensTintPicker" value="#000000">
            </div>
        </div>
    </div>

    <div id="loading">Loading Diorama...</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            selectedIndex: -1,
            selectedName: 'None',
            tryOnActive: false,
            turntableAngleDeg: 0,
            sunglassesPositions: [],
            sunglassesScales: [],
            lensTintColor: '#000000',
            modelLoaded: false,
            dioramaVisible: true,
            turntableRotating: false
        };

        const STYLES = [
            { name: 'Aviator', frameColor: 0xFFD700, lensColor: 0x333333, opacity: 0.6 },
            { name: 'Wayfarer', frameColor: 0x111111, lensColor: 0x4A2800, opacity: 0.7 },
            { name: 'Round', frameColor: 0xC0C0C0, lensColor: 0x0044AA, opacity: 0.5 },
            { name: 'Sport', frameColor: 0xCC0000, lensColor: 0x88CCFF, opacity: 0.4 }
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x90b0d0, 0.3);
        fillLight.position.set(-5, 3, -5);
        scene.add(fillLight);

        // --- Turntable & Diorama ---
        const turntableGroup = new THREE.Group();
        scene.add(turntableGroup);

        const platformGeo = new THREE.CylinderGeometry(5, 5, 0.2, 64);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x3a3a3a,
            roughness: 0.8,
            metalness: 0.2
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -1.1; // Slightly below diorama base
        platform.receiveShadow = true;
        turntableGroup.add(platform);

        // Load Model
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
        
        const gltfLoader = new GLTFLoader();
        gltfLoader.setDRACOLoader(dracoLoader);

        let mixer;
        gltfLoader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/LittlestTokyo.glb',
            (gltf) => {
                const model = gltf.scene;
                model.position.set(0, -1, 0);
                model.scale.set(0.01, 0.01, 0.01);
                
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                turntableGroup.add(model);
                
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    mixer.clipAction(gltf.animations[0]).play();
                }

                document.getElementById('loading').style.display = 'none';
                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // --- Sunglasses ---
        const glassesWrappers = [];
        const glassesMaterials = []; // Store lens materials for color picking
        const raycastObjects = [];

        function createGlasses(style, index) {
            const wrapper = new THREE.Group();
            const floater = new THREE.Group();
            wrapper.add(floater);

            const frameMat = new THREE.MeshStandardMaterial({ 
                color: style.frameColor, 
                roughness: 0.2, 
                metalness: 0.8 
            });
            
            const lensMat = new THREE.MeshPhysicalMaterial({
                color: style.lensColor,
                transmission: 1,
                opacity: style.opacity,
                transparent: true,
                roughness: 0.1,
                metalness: 0.1,
                ior: 1.5,
                thickness: 0.05
            });
            glassesMaterials.push(lensMat);

            // Geometry
            const isRound = index === 2;
            const frameGeo = isRound ? new THREE.TorusGeometry(0.25, 0.03, 16, 32) : new THREE.TorusGeometry(0.3, 0.04, 16, 4, Math.PI);
            const lensGeo = isRound ? new THREE.CylinderGeometry(0.23, 0.23, 0.02, 32) : new THREE.BoxGeometry(0.55, 0.35, 0.02);
            
            if (!isRound) {
                frameGeo.rotateZ(Math.PI / 4); // Adjust torus for wayfarer/sport shape
            }

            // Left Eye
            const leftFrame = new THREE.Mesh(frameGeo, frameMat);
            leftFrame.position.x = -0.35;
            leftFrame.castShadow = true;
            const leftLens = new THREE.Mesh(lensGeo, lensMat);
            leftLens.position.x = -0.35;
            if(isRound) leftLens.rotation.x = Math.PI/2;

            // Right Eye
            const rightFrame = new THREE.Mesh(frameGeo, frameMat);
            rightFrame.position.x = 0.35;
            rightFrame.castShadow = true;
            const rightLens = new THREE.Mesh(lensGeo, lensMat);
            rightLens.position.x = 0.35;
            if(isRound) rightLens.rotation.x = Math.PI/2;

            // Bridge
            const bridgeGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.2);
            const bridge = new THREE.Mesh(bridgeGeo, frameMat);
            bridge.rotation.z = Math.PI / 2;
            bridge.castShadow = true;

            // Arms
            const armGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.8);
            const leftArm = new THREE.Mesh(armGeo, frameMat);
            leftArm.position.set(-0.6, 0, -0.4);
            leftArm.rotation.x = Math.PI / 2;
            leftArm.castShadow = true;
            
            const rightArm = new THREE.Mesh(armGeo, frameMat);
            rightArm.position.set(0.6, 0, -0.4);
            rightArm.rotation.x = Math.PI / 2;
            rightArm.castShadow = true;

            floater.add(leftFrame, leftLens, rightFrame, rightLens, bridge, leftArm, rightArm);

            // Hitbox for raycasting
            const hitboxGeo = new THREE.BoxGeometry(1.5, 0.8, 1.0);
            const hitboxMat = new THREE.MeshBasicMaterial({ visible: false });
            const hitbox = new THREE.Mesh(hitboxGeo, hitboxMat);
            hitbox.position.z = -0.2;
            hitbox.userData = { index: index };
            floater.add(hitbox);
            raycastObjects.push(hitbox);

            // Initial Positioning (Arc)
            const angle = (index - 1.5) * (Math.PI / 6); // Spread across arc
            const radius = 3.0;
            const initX = Math.sin(angle) * radius;
            const initZ = Math.cos(angle) * radius - 1.5;
            const initY = 3.5;

            wrapper.position.set(initX, initY, initZ);
            wrapper.lookAt(0, initY, 0); // Face center

            // Store targets for animation
            wrapper.userData = {
                initPos: wrapper.position.clone(),
                initQuat: wrapper.quaternion.clone(),
                initScale: new THREE.Vector3(1, 1, 1),
                targetPos: wrapper.position.clone(),
                targetQuat: wrapper.quaternion.clone(),
                targetScale: new THREE.Vector3(1, 1, 1),
                phaseOffset: index * Math.PI / 2
            };

            scene.add(wrapper);
            glassesWrappers.push(wrapper);
        }

        STYLES.forEach((style, i) => createGlasses(style, i));

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let targetTurntableRotation = 0;

        function updateGlassesTargets() {
            const state = window.__3D_STATE__;
            
            glassesWrappers.forEach((wrapper, i) => {
                const ud = wrapper.userData;
                
                if (state.tryOnActive && state.selectedIndex === i) {
                    // Try-on position
                    ud.targetPos.set(0, 1.2, 5.5);
                    ud.targetScale.set(2.5, 2.5, 2.5);
                    
                    // Face camera
                    const dummy = new THREE.Object3D();
                    dummy.position.copy(ud.targetPos);
                    dummy.lookAt(camera.position);
                    ud.targetQuat.copy(dummy.quaternion);
                } 
                else if (state.selectedIndex === i) {
                    // Selected position
                    ud.targetPos.set(0, 2.0, 2.0);
                    ud.targetScale.set(1.5, 1.5, 1.5);
                    
                    // Face slightly upwards towards camera
                    const dummy = new THREE.Object3D();
                    dummy.position.copy(ud.targetPos);
                    dummy.lookAt(camera.position.x, camera.position.y - 1, camera.position.z);
                    ud.targetQuat.copy(dummy.quaternion);
                } 
                else {
                    // Initial position
                    ud.targetPos.copy(ud.initPos);
                    ud.targetScale.copy(ud.initScale);
                    ud.targetQuat.copy(ud.initQuat);
                }
            });
        }

        function selectGlasses(index) {
            if (index === window.__3D_STATE__.selectedIndex && !window.__3D_STATE__.tryOnActive) return;
            
            window.__3D_STATE__.selectedIndex = index;
            window.__3D_STATE__.selectedName = index >= 0 ? STYLES[index].name : 'None';
            
            if (index >= 0) {
                const hexColor = '#' + glassesMaterials[index].color.getHexString();
                document.getElementById('lensTintPicker').value = hexColor;
                window.__3D_STATE__.lensTintColor = hexColor;
            }

            updateGlassesTargets();
            updateDOM();
        }

        function toggleTryOn() {
            const state = window.__3D_STATE__;
            if (state.selectedIndex === -1) return; // Need selection to try on

            state.tryOnActive = !state.tryOnActive;
            state.turntableRotating = state.tryOnActive;
            
            if (!state.tryOnActive) {
                // Snap target rotation to current to avoid spinning back wildly
                targetTurntableRotation = turntableGroup.rotation.y;
            }

            updateGlassesTargets();
            updateDOM();
        }

        function resetScene() {
            window.__3D_STATE__.selectedIndex = -1;
            window.__3D_STATE__.selectedName = 'None';
            window.__3D_STATE__.tryOnActive = false;
            window.__3D_STATE__.turntableRotating = false;
            
            updateGlassesTargets();
            updateDOM();
        }

        function rotateTurntable(direction) {
            if (window.__3D_STATE__.tryOnActive) return; // Disable manual rotation during try-on
            targetTurntableRotation += direction * (Math.PI / 4);
        }

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('click', (event) => {
            // Ignore clicks on UI
            if (event.target.tagName === 'BUTTON' || event.target.tagName === 'INPUT') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(raycastObjects);

            if (intersects.length > 0) {
                const index = intersects[0].object.userData.index;
                selectGlasses(index);
            }
        });

        document.getElementById('btn-try-on').addEventListener('click', toggleTryOn);
        document.getElementById('btn-reset').addEventListener('click', resetScene);
        document.getElementById('btn-rotate-left').addEventListener('click', () => rotateTurntable(1));
        document.getElementById('btn-rotate-right').addEventListener('click', () => rotateTurntable(-1));

        document.getElementById('lensTintPicker').addEventListener('input', (e) => {
            const state = window.__3D_STATE__;
            if (state.selectedIndex !== -1) {
                const color = new THREE.Color(e.target.value);
                glassesMaterials[state.selectedIndex].color.copy(color);
                state.lensTintColor = e.target.value;
            }
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['1', '2', '3', '4'].includes(key)) {
                selectGlasses(parseInt(key) - 1);
            } else if (key === 't') {
                toggleTryOn();
            } else if (key === 'r') {
                resetScene();
            }
        });

        // --- Update Loop ---
        function updateDOM() {
            const state = window.__3D_STATE__;
            document.getElementById('selectedLabel').textContent = state.selectedName;
            
            const tryOnEl = document.getElementById('tryOnStatus');
            if (state.tryOnActive) {
                tryOnEl.textContent = 'Try-On: Active';
                tryOnEl.style.color = '#00ff00';
            } else {
                tryOnEl.textContent = 'Try-On: Inactive';
                tryOnEl.style.color = '#ff9900';
            }

            // Normalize angle to 0-360
            let deg = Math.round(THREE.MathUtils.radToDeg(turntableGroup.rotation.y)) % 360;
            if (deg < 0) deg += 360;
            document.getElementById('turntableAngle').textContent = deg;
            state.turntableAngleDeg = deg;
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const state = window.__3D_STATE__;

            // Update Animations
            if (mixer) mixer.update(delta);

            // Turntable Rotation
            if (state.turntableRotating) {
                turntableGroup.rotation.y += delta * 0.5;
                targetTurntableRotation = turntableGroup.rotation.y; // Keep target synced
            } else {
                // Smooth damp to target
                turntableGroup.rotation.y = THREE.MathUtils.lerp(turntableGroup.rotation.y, targetTurntableRotation, 5 * delta);
            }

            // Glasses Animation
            state.sunglassesPositions = [];
            state.sunglassesScales = [];

            glassesWrappers.forEach((wrapper, i) => {
                const ud = wrapper.userData;
                const floater = wrapper.children[0];

                // Lerp Wrapper (Position, Scale, Rotation)
                wrapper.position.lerp(ud.targetPos, 8 * delta);
                wrapper.scale.lerp(ud.targetScale, 8 * delta);
                wrapper.quaternion.slerp(ud.targetQuat, 8 * delta);

                // Floating Animation (applied to inner group)
                floater.position.y = Math.sin(time * 2 + ud.phaseOffset) * 0.15;

                // Update State arrays
                const worldPos = new THREE.Vector3();
                wrapper.getWorldPosition(worldPos);
                state.sunglassesPositions.push({ x: worldPos.x, y: worldPos.y + floater.position.y, z: worldPos.z });
                state.sunglassesScales.push(wrapper.scale.x);
            });

            // Continuous DOM update for angle
            if (state.turntableRotating || Math.abs(turntableGroup.rotation.y - targetTurntableRotation) > 0.01) {
                updateDOM();
            }

            renderer.render(scene, camera);
        }

        // Init
        updateDOM();
        animate();

    </script>
</body>
</html>
