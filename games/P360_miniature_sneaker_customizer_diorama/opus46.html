<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneaker Customizer Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#controlPanel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 20px;
    color: #fff;
    width: 260px;
    max-height: 90vh;
    overflow-y: auto;
    z-index: 100;
}

#controlPanel h2 {
    font-size: 16px;
    margin-bottom: 15px;
    text-align: center;
    color: #e0e0ff;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.section-label {
    font-size: 12px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 12px;
    margin-bottom: 6px;
}

.color-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

.color-btn {
    width: 40px;
    height: 40px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.color-btn:hover {
    transform: scale(1.15);
    border-color: #fff;
}

.color-btn.active {
    border-color: #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
}

.toggle-btn {
    width: 100%;
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    margin-bottom: 10px;
}

.toggle-btn:hover {
    background: rgba(255,255,255,0.15);
}

.toggle-btn.active {
    background: rgba(100, 100, 255, 0.3);
    border-color: rgba(100, 100, 255, 0.6);
}

.slider-group {
    margin-bottom: 12px;
}

.slider-group label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #ccc;
    margin-bottom: 4px;
}

.slider-group input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.15);
    outline: none;
}

.slider-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #6c6cff;
    cursor: pointer;
}

#changeCounter {
    text-align: center;
    padding: 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    margin-top: 10px;
    font-size: 14px;
    color: #e0e0ff;
}

#resetBtn {
    width: 100%;
    padding: 10px;
    border: 1px solid rgba(255, 80, 80, 0.4);
    border-radius: 8px;
    background: rgba(255, 80, 80, 0.1);
    color: #ff8080;
    cursor: pointer;
    font-size: 13px;
    margin-top: 10px;
    transition: all 0.2s;
}

#resetBtn:hover {
    background: rgba(255, 80, 80, 0.25);
}

.keyboard-hints {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 11px;
    color: #888;
    line-height: 1.6;
}

.keyboard-hints kbd {
    background: rgba(255,255,255,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: monospace;
}
</style>
</head>
<body>

<div id="controlPanel">
    <h2>🔧 Sneaker Studio</h2>

    <div class="section-label">Sole Color</div>
    <div class="color-row">
        <button class="color-btn active" id="soleBtnWhite" style="background:#FFFFFF;" title="White"></button>
        <button class="color-btn" id="soleBtnRed" style="background:#FF0000;" title="Red"></button>
        <button class="color-btn" id="soleBtnBlue" style="background:#0000FF;" title="Blue"></button>
        <button class="color-btn" id="soleBtnGreen" style="background:#00FF00;" title="Green"></button>
    </div>

    <div class="section-label">Upper Color</div>
    <div class="color-row">
        <button class="color-btn active" id="upperBtnWhite" style="background:#FFFFFF;" title="White"></button>
        <button class="color-btn" id="upperBtnBlack" style="background:#000000; border-color: rgba(255,255,255,0.5);" title="Black"></button>
        <button class="color-btn" id="upperBtnOrange" style="background:#FF8C00;" title="Orange"></button>
        <button class="color-btn" id="upperBtnPurple" style="background:#800080;" title="Purple"></button>
    </div>

    <button class="toggle-btn" id="rotateToggle">⟳ Rotate Platform</button>

    <div class="slider-group">
        <label><span>Spotlight Intensity</span><span id="spotlightVal">60%</span></label>
        <input type="range" id="spotlightSlider" min="0" max="100" value="60">
    </div>

    <div class="slider-group">
        <label><span>Zoom</span><span id="zoomVal">10</span></label>
        <input type="range" id="zoomSlider" min="5" max="20" value="10">
    </div>

    <div class="slider-group">
        <label><span>Scale Sneaker</span><span id="scaleVal">100%</span></label>
        <input type="range" id="scaleSlider" min="50" max="200" value="100">
    </div>

    <div id="changeCounter">Changes: 0</div>

    <button id="resetBtn">↺ Reset All</button>

    <div class="keyboard-hints">
        <kbd>1</kbd> Red sole &nbsp; <kbd>2</kbd> Blue sole &nbsp; <kbd>3</kbd> Green sole<br>
        <kbd>R</kbd> Toggle rotation &nbsp; <kbd>Space</kbd> Snapshot freeze
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
    soleColor: '#ffffff',
    upperColor: '#ffffff',
    isRotating: false,
    rotationAngle: 0,
    spotlightIntensity: 0.6,
    cameraZ: 10,
    sneakerScale: 1.0,
    changeCount: 0,
    flamingoLoaded: false,
    flamingoAnimating: false,
    flamingoPosition: { x: 2.5, y: 0.3, z: -1 },
    sneakerPosition: { x: -1.5, y: 0.7, z: 0 },
    platformRadius: 4,
    frameCount: 0,
    isSnapshotFrozen: false
};
window.__3D_STATE__ = state;

// --- Renderer ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x1a1a2e);
document.body.appendChild(renderer.domElement);

// --- Scene & Camera ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

// --- Pivot Group (everything on the platform) ---
const pivotGroup = new THREE.Group();
scene.add(pivotGroup);

// --- Platform ---
const platformGeom = new THREE.CylinderGeometry(4, 4, 0.3, 64);
const platformMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.7, metalness: 0.1 });
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = 0;
platform.receiveShadow = true;
platform.castShadow = true;
pivotGroup.add(platform);

// --- Sneaker ---
const sneakerGroup = new THREE.Group();
sneakerGroup.position.set(-1.5, 0.7, 0);

const soleGeom = new THREE.BoxGeometry(2, 0.8, 1);
const soleMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.4 });
const soleMesh = new THREE.Mesh(soleGeom, soleMat);
soleMesh.name = 'sole';
soleMesh.castShadow = true;
soleMesh.receiveShadow = true;
sneakerGroup.add(soleMesh);

const upperGeom = new THREE.BoxGeometry(1.8, 0.6, 0.9);
const upperMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.4 });
const upperMesh = new THREE.Mesh(upperGeom, upperMat);
upperMesh.name = 'upper';
upperMesh.position.y = 0.7;
upperMesh.castShadow = true;
upperMesh.receiveShadow = true;
sneakerGroup.add(upperMesh);

pivotGroup.add(sneakerGroup);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
scene.add(dirLight);

const spotlight = new THREE.SpotLight(0xffffff, 0.6, 0, Math.PI / 6);
spotlight.position.set(0, 8, 0);
spotlight.target.position.set(0, 0, 0);
spotlight.castShadow = true;
spotlight.shadow.mapSize.width = 1024;
spotlight.shadow.mapSize.height = 1024;
spotlight.name = 'spotlight';
scene.add(spotlight);
scene.add(spotlight.target);

// --- Flamingo ---
let flamingoMixer = null;
let flamingoAction = null;
let flamingoModel = null;
const clock = new THREE.Clock();

const loader = new GLTFLoader();
loader.load('https://threejs.org/examples/models/gltf/Flamingo.glb', (gltf) => {
    flamingoModel = gltf.scene;
    flamingoModel.scale.set(0.02, 0.02, 0.02);
    flamingoModel.position.set(2.5, 0.3, -1);
    flamingoModel.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
        }
    });
    pivotGroup.add(flamingoModel);
    state.flamingoLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
        flamingoMixer = new THREE.AnimationMixer(flamingoModel);
        flamingoAction = flamingoMixer.clipAction(gltf.animations[0]);
        flamingoAction.play();
        state.flamingoAnimating = true;
    }
}, undefined, (error) => {
    console.error('Error loading flamingo:', error);
});

// --- Helper functions ---
function incrementChange() {
    state.changeCount++;
    document.getElementById('changeCounter').textContent = `Changes: ${state.changeCount}`;
}

function setSoleColor(hex) {
    soleMat.color.set(hex);
    state.soleColor = hex.toLowerCase();
    // Update active button
    document.querySelectorAll('#controlPanel .color-row:first-of-type .color-btn').forEach(b => b.classList.remove('active'));
    // Try to find matching button
    const btnMap = { '#ff0000': 'soleBtnRed', '#0000ff': 'soleBtnBlue', '#00ff00': 'soleBtnGreen', '#ffffff': 'soleBtnWhite' };
    const btnId = btnMap[hex.toLowerCase()];
    if (btnId) document.getElementById(btnId).classList.add('active');
    incrementChange();
}

function setUpperColor(hex) {
    upperMat.color.set(hex);
    state.upperColor = hex.toLowerCase();
    const btnMap = { '#000000': 'upperBtnBlack', '#ff8c00': 'upperBtnOrange', '#800080': 'upperBtnPurple', '#ffffff': 'upperBtnWhite' };
    document.querySelectorAll('.color-row:nth-of-type(2) .color-btn, #upperBtnBlack, #upperBtnOrange, #upperBtnPurple, #upperBtnWhite').forEach(b => b.classList.remove('active'));
    const btnId = btnMap[hex.toLowerCase()];
    if (btnId) document.getElementById(btnId).classList.add('active');
    incrementChange();
}

function toggleRotation() {
    state.isRotating = !state.isRotating;
    const btn = document.getElementById('rotateToggle');
    btn.classList.toggle('active', state.isRotating);
    btn.textContent = state.isRotating ? '⟳ Stop Rotation' : '⟳ Rotate Platform';
    incrementChange();
}

function updateSneakerScale(val) {
    const scale = val / 100;
    state.sneakerScale = scale;
    sneakerGroup.scale.set(scale, scale, scale);
    // Adjust y so sneaker stays on platform surface
    sneakerGroup.position.y = 0.7 * scale;
    state.sneakerPosition = {
        x: sneakerGroup.position.x,
        y: sneakerGroup.position.y,
        z: sneakerGroup.position.z
    };
}

function resetAll() {
    // Sole
    soleMat.color.set(0xFFFFFF);
    state.soleColor = '#ffffff';

    // Upper
    upperMat.color.set(0xFFFFFF);
    state.upperColor = '#ffffff';

    // Rotation
    state.isRotating = false;
    state.rotationAngle = 0;
    pivotGroup.rotation.y = 0;
    document.getElementById('rotateToggle').classList.remove('active');
    document.getElementById('rotateToggle').textContent = '⟳ Rotate Platform';

    // Spotlight
    spotlight.intensity = 0.6;
    state.spotlightIntensity = 0.6;
    document.getElementById('spotlightSlider').value = 60;
    document.getElementById('spotlightVal').textContent = '60%';

    // Zoom
    camera.position.z = 10;
    state.cameraZ = 10;
    document.getElementById('zoomSlider').value = 10;
    document.getElementById('zoomVal').textContent = '10';

    // Scale
    sneakerGroup.scale.set(1, 1, 1);
    sneakerGroup.position.y = 0.7;
    state.sneakerScale = 1.0;
    state.sneakerPosition = { x: -1.5, y: 0.7, z: 0 };
    document.getElementById('scaleSlider').value = 100;
    document.getElementById('scaleVal').textContent = '100%';

    // Change count
    state.changeCount = 0;
    document.getElementById('changeCounter').textContent = 'Changes: 0';

    // Update active buttons
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('soleBtnWhite').classList.add('active');
    document.getElementById('upperBtnWhite').classList.add('active');
}

// --- UI Event Listeners ---
// Sole buttons
document.getElementById('soleBtnRed').addEventListener('click', () => setSoleColor('#ff0000'));
document.getElementById('soleBtnBlue').addEventListener('click', () => setSoleColor('#0000ff'));
document.getElementById('soleBtnGreen').addEventListener('click', () => setSoleColor('#00ff00'));
document.getElementById('soleBtnWhite').addEventListener('click', () => setSoleColor('#ffffff'));

// Upper buttons
document.getElementById('upperBtnBlack').addEventListener('click', () => setUpperColor('#000000'));
document.getElementById('upperBtnOrange').addEventListener('click', () => setUpperColor('#ff8c00'));
document.getElementById('upperBtnPurple').addEventListener('click', () => setUpperColor('#800080'));
document.getElementById('upperBtnWhite').addEventListener('click', () => setUpperColor('#ffffff'));

// Rotate toggle
document.getElementById('rotateToggle').addEventListener('click', toggleRotation);

// Spotlight slider
document.getElementById('spotlightSlider').addEventListener('input', (e) => {
    const val = parseInt(e.target.value);
    const intensity = val / 100;
    spotlight.intensity = intensity;
    state.spotlightIntensity = intensity;
    document.getElementById('spotlightVal').textContent = `${val}%`;
    incrementChange();
});

// Zoom slider
document.getElementById('zoomSlider').addEventListener('input', (e) => {
    const val = parseInt(e.target.value);
    camera.position.z = val;
    state.cameraZ = val;
    document.getElementById('zoomVal').textContent = val;
    incrementChange();
});

// Scale slider
document.getElementById('scaleSlider').addEventListener('input', (e) => {
    const val = parseInt(e.target.value);
    updateSneakerScale(val);
    document.getElementById('scaleVal').textContent = `${val}%`;
    incrementChange();
});

// Reset
document.getElementById('resetBtn').addEventListener('click', resetAll);

// --- Keyboard ---
let snapshotTimeout = null;
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    
    switch (e.key) {
        case '1':
            setSoleColor('#ff0000');
            break;
        case '2':
            setSoleColor('#0000ff');
            break;
        case '3':
            setSoleColor('#00ff00');
            break;
        case 'r':
        case 'R':
            toggleRotation();
            break;
        case ' ':
            e.preventDefault();
            if (!state.isSnapshotFrozen && flamingoAction) {
                state.isSnapshotFrozen = true;
                flamingoAction.paused = true;
                state.flamingoAnimating = false;
                if (snapshotTimeout) clearTimeout(snapshotTimeout);
                snapshotTimeout = setTimeout(() => {
                    flamingoAction.paused = false;
                    state.flamingoAnimating = true;
                    state.isSnapshotFrozen = false;
                }, 2000);
            }
            break;
    }
});

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    // Update flamingo animation
    if (flamingoMixer && !state.isSnapshotFrozen) {
        flamingoMixer.update(delta);
    }

    // Platform rotation
    if (state.isRotating) {
        state.rotationAngle += 0.01;
        state.rotationAngle = state.rotationAngle % (Math.PI * 2);
        pivotGroup.rotation.y = state.rotationAngle;
    }

    // Camera always looks at origin
    camera.lookAt(0, 0, 0);

    // Update flamingo position in state
    if (flamingoModel) {
        const worldPos = new THREE.Vector3();
        flamingoModel.getWorldPosition(worldPos);
        state.flamingoPosition = { x: worldPos.x, y: worldPos.y, z: worldPos.z };
    }

    // Update sneaker position in state
    {
        const worldPos = new THREE.Vector3();
        sneakerGroup.getWorldPosition(worldPos);
        state.sneakerPosition = { x: worldPos.x, y: worldPos.y, z: worldPos.z };
    }

    state.frameCount++;

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
