<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Sneaker Customizer Diorama</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #controlPanel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(20, 20, 30, 0.82);
      color: #fff;
      padding: 14px;
      border-radius: 10px;
      width: 280px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
      font-size: 14px;
      line-height: 1.4;
    }

    #controlPanel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .section {
      margin-bottom: 12px;
    }

    .label {
      margin-bottom: 6px;
      font-weight: bold;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    button.color-btn,
    button.control-btn {
      border: none;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      color: #fff;
      font-weight: bold;
    }

    button.control-btn {
      background: #2e3b55;
    }

    button.control-btn:hover {
      background: #41506f;
    }

    .swatch-red { background: #FF0000; }
    .swatch-blue { background: #0000FF; }
    .swatch-green { background: #00FF00; color: #000 !important; }
    .swatch-white { background: #FFFFFF; color: #000 !important; }
    .swatch-black { background: #000000; }
    .swatch-orange { background: #FF8C00; color: #000 !important; }
    .swatch-purple { background: #800080; }

    .slider-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    input[type="range"] {
      width: 100%;
    }

    #changeCounter {
      font-weight: bold;
      color: #9fe6ff;
    }
  </style>
</head>
<body>
  <div id="controlPanel">
    <h3>Sneaker Diorama Customizer</h3>

    <div class="section">
      <div class="label">SOLE Color</div>
      <div class="btn-row">
        <button id="soleBtnRed" class="color-btn swatch-red">Red</button>
        <button id="soleBtnBlue" class="color-btn swatch-blue">Blue</button>
        <button id="soleBtnGreen" class="color-btn swatch-green">Green</button>
        <button id="soleBtnWhite" class="color-btn swatch-white">White</button>
      </div>
    </div>

    <div class="section">
      <div class="label">UPPER Color</div>
      <div class="btn-row">
        <button id="upperBtnBlack" class="color-btn swatch-black">Black</button>
        <button id="upperBtnOrange" class="color-btn swatch-orange">Orange</button>
        <button id="upperBtnPurple" class="color-btn swatch-purple">Purple</button>
        <button id="upperBtnWhite" class="color-btn swatch-white">White</button>
      </div>
    </div>

    <div class="section">
      <button id="rotateToggle" class="control-btn">Rotate Platform</button>
      <button id="resetBtn" class="control-btn">Reset</button>
    </div>

    <div class="section slider-wrap">
      <label for="spotlightSlider">Spotlight Intensity</label>
      <input id="spotlightSlider" type="range" min="0" max="100" value="60" />
    </div>

    <div class="section slider-wrap">
      <label for="zoomSlider">Zoom</label>
      <input id="zoomSlider" type="range" min="5" max="20" value="10" />
    </div>

    <div class="section slider-wrap">
      <label for="scaleSlider">Scale Sneaker</label>
      <input id="scaleSlider" type="range" min="50" max="200" value="100" />
    </div>

    <div class="section">
      Total Changes: <span id="changeCounter">0</span>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const clock = new THREE.Clock();

    const pivotGroup = new THREE.Group();
    scene.add(pivotGroup);

    const platformRadius = 4;
    const platformHeight = 0.3;

    const platformGeometry = new THREE.CylinderGeometry(platformRadius, platformRadius, platformHeight, 64);
    const platformMaterial = new THREE.MeshStandardMaterial({ color: '#8B6914' });
    const platform = new THREE.Mesh(platformGeometry, platformMaterial);
    platform.position.y = 0;
    platform.receiveShadow = true;
    platform.castShadow = true;
    pivotGroup.add(platform);

    const sneakerGroup = new THREE.Group();
    sneakerGroup.name = 'sneakerGroup';

    const soleGeometry = new THREE.BoxGeometry(2, 0.8, 1);
    const soleMaterial = new THREE.MeshStandardMaterial({ color: '#FFFFFF' });
    const sole = new THREE.Mesh(soleGeometry, soleMaterial);
    sole.name = 'sole';
    sole.castShadow = true;
    sole.receiveShadow = true;
    sole.position.set(0, 0, 0);

    const upperGeometry = new THREE.BoxGeometry(1.8, 0.6, 0.9);
    const upperMaterial = new THREE.MeshStandardMaterial({ color: '#FFFFFF' });
    const upper = new THREE.Mesh(upperGeometry, upperMaterial);
    upper.name = 'upper';
    upper.castShadow = true;
    upper.receiveShadow = true;
    upper.position.set(0, 0.7, 0);

    sneakerGroup.add(sole);
    sneakerGroup.add(upper);
    pivotGroup.add(sneakerGroup);

    let flamingo = null;
    let mixer = null;
    let flamingoAnimating = false;
    let isSnapshotFrozen = false;
    let snapshotTimeout = null;

    const loader = new GLTFLoader();
    loader.load(
      'https://threejs.org/examples/models/gltf/Flamingo.glb',
      (gltf) => {
        flamingo = gltf.scene;
        flamingo.scale.setScalar(0.02);
        flamingo.position.set(2.5, 0.3, -1);
        flamingo.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        pivotGroup.add(flamingo);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(flamingo);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
          flamingoAnimating = true;
        }

        window.__3D_STATE__.flamingoLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Failed to load flamingo model:', err);
      }
    );

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(1024, 1024);
    scene.add(directionalLight);

    const spotlight = new THREE.SpotLight(0xffffff, 0.6, 0, Math.PI / 6, 0.2, 1);
    spotlight.name = 'spotlight';
    spotlight.position.set(0, 8, 0);
    spotlight.castShadow = true;
    spotlight.shadow.mapSize.set(1024, 1024);
    spotlight.target.position.set(0, 0, 0);
    scene.add(spotlight);
    scene.add(spotlight.target);

    function colorToHexString(color) {
      return '#' + color.getHexString();
    }

    function updateSneakerY() {
      const scale = sneakerGroup.scale.y;
      const scaledSoleHeight = 0.8 * scale;
      sneakerGroup.position.set(-1.5, platformHeight / 2 + scaledSoleHeight / 2, 0);
    }

    sneakerGroup.scale.setScalar(1);
    updateSneakerY();

    const changeCounterEl = document.getElementById('changeCounter');
    const rotateToggle = document.getElementById('rotateToggle');
    const spotlightSlider = document.getElementById('spotlightSlider');
    const zoomSlider = document.getElementById('zoomSlider');
    const scaleSlider = document.getElementById('scaleSlider');
    const resetBtn = document.getElementById('resetBtn');

    const state = {
      soleColor: '#ffffff',
      upperColor: '#ffffff',
      isRotating: false,
      rotationAngle: 0,
      spotlightIntensity: 0.6,
      cameraZ: 10,
      sneakerScale: 1.0,
      changeCount: 0,
      flamingoLoaded: false,
      flamingoAnimating: false,
      flamingoPosition: { x: 2.5, y: 0.3, z: -1 },
      sneakerPosition: { x: -1.5, y: sneakerGroup.position.y, z: 0 },
      platformRadius: 4,
      frameCount: 0,
      isSnapshotFrozen: false
    };

    window.__3D_STATE__ = state;

    function incrementChange() {
      state.changeCount++;
      changeCounterEl.textContent = state.changeCount;
    }

    function setSoleColor(hex, countChange = true) {
      sole.material.color.set(hex);
      state.soleColor = hex.toLowerCase();
      if (countChange) incrementChange();
    }

    function setUpperColor(hex, countChange = true) {
      upper.material.color.set(hex);
      state.upperColor = hex.toLowerCase();
      if (countChange) incrementChange();
    }

    function toggleRotation(countChange = true) {
      state.isRotating = !state.isRotating;
      rotateToggle.textContent = state.isRotating ? 'Stop Rotation' : 'Rotate Platform';
      if (countChange) incrementChange();
    }

    function setSpotlightFromSlider(value, countChange = true) {
      const intensity = Number(value) / 100;
      spotlight.intensity = intensity;
      state.spotlightIntensity = intensity;
      spotlightSlider.value = value;
      if (countChange) incrementChange();
    }

    function setZoom(value, countChange = true) {
      const z = Number(value);
      camera.position.z = z;
      state.cameraZ = z;
      zoomSlider.value = value;
      if (countChange) incrementChange();
    }

    function setSneakerScale(value, countChange = true) {
      const scale = Number(value) / 100;
      sneakerGroup.scale.setScalar(scale);
      updateSneakerY();
      state.sneakerScale = scale;
      state.sneakerPosition = {
        x: sneakerGroup.position.x,
        y: sneakerGroup.position.y,
        z: sneakerGroup.position.z
      };
      scaleSlider.value = value;
      if (countChange) incrementChange();
    }

    function resetAll() {
      setSoleColor('#ffffff', false);
      setUpperColor('#ffffff', false);

      if (state.isRotating) {
        state.isRotating = false;
        rotateToggle.textContent = 'Rotate Platform';
      }

      pivotGroup.rotation.y = 0;
      state.rotationAngle = 0;

      setSpotlightFromSlider(60, false);
      setZoom(10, false);
      setSneakerScale(100, false);

      if (mixer && flamingo && !isSnapshotFrozen && !flamingoAnimating) {
        flamingoAnimating = true;
      }

      incrementChange();
    }

    document.getElementById('soleBtnRed').addEventListener('click', () => setSoleColor('#ff0000'));
    document.getElementById('soleBtnBlue').addEventListener('click', () => setSoleColor('#0000ff'));
    document.getElementById('soleBtnGreen').addEventListener('click', () => setSoleColor('#00ff00'));
    document.getElementById('soleBtnWhite').addEventListener('click', () => setSoleColor('#ffffff'));

    document.getElementById('upperBtnBlack').addEventListener('click', () => setUpperColor('#000000'));
    document.getElementById('upperBtnOrange').addEventListener('click', () => setUpperColor('#ff8c00'));
    document.getElementById('upperBtnPurple').addEventListener('click', () => setUpperColor('#800080'));
    document.getElementById('upperBtnWhite').addEventListener('click', () => setUpperColor('#ffffff'));

    rotateToggle.addEventListener('click', () => toggleRotation());
    spotlightSlider.addEventListener('input', (e) => setSpotlightFromSlider(e.target.value));
    zoomSlider.addEventListener('input', (e) => setZoom(e.target.value));
    scaleSlider.addEventListener('input', (e) => setSneakerScale(e.target.value));
    resetBtn.addEventListener('click', resetAll);

    function snapshotFreeze() {
      if (!mixer || !flamingo) return;

      if (snapshotTimeout) clearTimeout(snapshotTimeout);

      isSnapshotFrozen = true;
      flamingoAnimating = false;

      snapshotTimeout = setTimeout(() => {
        isSnapshotFrozen = false;
        flamingoAnimating = true;
      }, 2000);
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === '1') setSoleColor('#ff0000');
      if (key === '2') setSoleColor('#0000ff');
      if (key === '3') setSoleColor('#00ff00');
      if (key === 'r') toggleRotation();

      if (e.code === 'Space') {
        e.preventDefault();
        snapshotFreeze();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (state.isRotating) {
        pivotGroup.rotation.y += 0.01;
      }

      state.rotationAngle = ((pivotGroup.rotation.y % (Math.PI * 2)) + (Math.PI * 2)) % (Math.PI * 2);

      if (mixer && flamingoAnimating && !isSnapshotFrozen) {
        mixer.update(delta);
      }

      camera.lookAt(0, 0, 0);

      state.soleColor = colorToHexString(sole.material.color);
      state.upperColor = colorToHexString(upper.material.color);
      state.isRotating = !!state.isRotating;
      state.spotlightIntensity = spotlight.intensity;
      state.cameraZ = camera.position.z;
      state.sneakerScale = sneakerGroup.scale.x;
      state.flamingoLoaded = !!flamingo;
      state.flamingoAnimating = flamingoAnimating;
      state.flamingoPosition = flamingo
        ? { x: flamingo.position.x, y: flamingo.position.y, z: flamingo.position.z }
        : { x: 2.5, y: 0.3, z: -1 };
      state.sneakerPosition = {
        x: sneakerGroup.position.x,
        y: sneakerGroup.position.y,
        z: sneakerGroup.position.z
      };
      state.platformRadius = 4;
      state.frameCount += 1;
      state.isSnapshotFrozen = isSnapshotFrozen;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
