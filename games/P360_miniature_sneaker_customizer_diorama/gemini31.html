<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniature Sneaker Customizer Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        #controlPanel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(20, 20, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
            backdrop-filter: blur(5px);
        }
        h2 {
            margin-top: 0;
            font-size: 18px;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #ccc;
        }
        .color-picker {
            display: flex;
            gap: 10px;
        }
        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #555;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .color-btn:hover {
            transform: scale(1.1);
            border-color: #fff;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .val-display {
            float: right;
            font-weight: bold;
            color: #fff;
        }
        button.action-btn {
            width: 100%;
            padding: 10px;
            background: #4a4e69;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-top: 5px;
        }
        button.action-btn:hover {
            background: #9a8c98;
        }
        #changeCounterDisplay {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            background: #22223b;
            padding: 8px;
            border-radius: 6px;
        }
        .instructions {
            font-size: 11px;
            color: #888;
            margin-top: 15px;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="controlPanel">
        <h2>Sneaker Customizer</h2>
        
        <div class="control-group">
            <label>Sole Color (Keys: 1, 2, 3)</label>
            <div class="color-picker">
                <div id="soleBtnRed" class="color-btn" style="background-color: #FF0000;" title="Red"></div>
                <div id="soleBtnBlue" class="color-btn" style="background-color: #0000FF;" title="Blue"></div>
                <div id="soleBtnGreen" class="color-btn" style="background-color: #00FF00;" title="Green"></div>
                <div id="soleBtnWhite" class="color-btn" style="background-color: #FFFFFF;" title="White"></div>
            </div>
        </div>

        <div class="control-group">
            <label>Upper Color</label>
            <div class="color-picker">
                <div id="upperBtnBlack" class="color-btn" style="background-color: #000000;" title="Black"></div>
                <div id="upperBtnOrange" class="color-btn" style="background-color: #FF8C00;" title="Orange"></div>
                <div id="upperBtnPurple" class="color-btn" style="background-color: #800080;" title="Purple"></div>
                <div id="upperBtnWhite" class="color-btn" style="background-color: #FFFFFF;" title="White"></div>
            </div>
        </div>

        <div class="control-group">
            <button id="rotateToggle" class="action-btn">Toggle Rotation (R)</button>
        </div>

        <div class="control-group">
            <label>Spotlight Intensity <span id="spotVal" class="val-display">60</span></label>
            <input type="range" id="spotlightSlider" min="0" max="100" value="60">
        </div>

        <div class="control-group">
            <label>Zoom <span id="zoomVal" class="val-display">10</span></label>
            <input type="range" id="zoomSlider" min="5" max="20" value="10">
        </div>

        <div class="control-group">
            <label>Scale Sneaker <span id="scaleVal" class="val-display">100</span></label>
            <input type="range" id="scaleSlider" min="50" max="200" value="100">
        </div>

        <button id="resetBtn" class="action-btn" style="background: #c1121f;">Reset All</button>

        <div id="changeCounterDisplay">
            Total Changes: <span id="changeCounter" style="font-weight: bold; color: #fca311;">0</span>
        </div>

        <div class="instructions">
            Press <b>Space</b> to take a snapshot (freezes animation for 2s).
        </div>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            soleColor: '#ffffff',
            upperColor: '#ffffff',
            isRotating: false,
            rotationAngle: 0,
            spotlightIntensity: 0.6,
            cameraZ: 10,
            sneakerScale: 1.0,
            changeCount: 0,
            flamingoLoaded: false,
            flamingoAnimating: false,
            flamingoPosition: { x: 2.5, y: 0.3, z: -1 },
            sneakerPosition: { x: -1.5, y: 0.7, z: 0 },
            platformRadius: 4,
            frameCount: 0,
            isSnapshotFrozen: false
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Pivot Group for rotation
        const pivotGroup = new THREE.Group();
        scene.add(pivotGroup);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(4, 4, 0.3, 64);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x8B6914,
            roughness: 0.8,
            metalness: 0.1
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = 0;
        platform.receiveShadow = true;
        pivotGroup.add(platform);

        // Sneaker Group
        const sneakerGroup = new THREE.Group();
        sneakerGroup.position.set(-1.5, 0.7, 0);
        pivotGroup.add(sneakerGroup);

        const soleGeo = new THREE.BoxGeometry(2, 0.8, 1);
        const soleMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const sole = new THREE.Mesh(soleGeo, soleMat);
        sole.name = 'sole';
        sole.position.set(0, -0.15, 0); // Local offset so bottom is at -0.55
        sole.castShadow = true;
        sole.receiveShadow = true;
        sneakerGroup.add(sole);

        const upperGeo = new THREE.BoxGeometry(1.8, 0.6, 0.9);
        const upperMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const upper = new THREE.Mesh(upperGeo, upperMat);
        upper.name = 'upper';
        upper.position.set(0, 0.55, 0); // Local offset to sit on sole
        upper.castShadow = true;
        upper.receiveShadow = true;
        sneakerGroup.add(upper);

        // Flamingo
        let mixer;
        const loader = new GLTFLoader();
        loader.load('https://threejs.org/examples/models/gltf/Flamingo.glb', (gltf) => {
            const flamingo = gltf.scene;
            flamingo.scale.set(0.02, 0.02, 0.02);
            flamingo.position.set(2.5, 0.3, -1);
            
            flamingo.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            pivotGroup.add(flamingo);
            window.__3D_STATE__.flamingoLoaded = true;

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(flamingo);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
                window.__3D_STATE__.flamingoAnimating = true;
            }
        });

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const spotLight = new THREE.SpotLight(0xffffff, 0.6);
        spotLight.name = 'spotlight';
        spotLight.position.set(0, 8, 0);
        spotLight.angle = Math.PI / 6;
        spotLight.penumbra = 0.5;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 1024;
        spotLight.shadow.mapSize.height = 1024;
        scene.add(spotLight);

        // UI Interactions
        const updateCounter = () => {
            window.__3D_STATE__.changeCount++;
            document.getElementById('changeCounter').innerText = window.__3D_STATE__.changeCount;
        };

        const setSoleColor = (hex) => {
            sole.material.color.set(hex);
            window.__3D_STATE__.soleColor = hex;
            updateCounter();
        };

        const setUpperColor = (hex) => {
            upper.material.color.set(hex);
            window.__3D_STATE__.upperColor = hex;
            updateCounter();
        };

        document.getElementById('soleBtnRed').addEventListener('click', () => setSoleColor('#FF0000'));
        document.getElementById('soleBtnBlue').addEventListener('click', () => setSoleColor('#0000FF'));
        document.getElementById('soleBtnGreen').addEventListener('click', () => setSoleColor('#00FF00'));
        document.getElementById('soleBtnWhite').addEventListener('click', () => setSoleColor('#FFFFFF'));

        document.getElementById('upperBtnBlack').addEventListener('click', () => setUpperColor('#000000'));
        document.getElementById('upperBtnOrange').addEventListener('click', () => setUpperColor('#FF8C00'));
        document.getElementById('upperBtnPurple').addEventListener('click', () => setUpperColor('#800080'));
        document.getElementById('upperBtnWhite').addEventListener('click', () => setUpperColor('#FFFFFF'));

        document.getElementById('rotateToggle').addEventListener('click', () => {
            window.__3D_STATE__.isRotating = !window.__3D_STATE__.isRotating;
            updateCounter();
        });

        document.getElementById('spotlightSlider').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('spotVal').innerText = val;
            const intensity = val / 100;
            spotLight.intensity = intensity;
            window.__3D_STATE__.spotlightIntensity = intensity;
            updateCounter();
        });

        document.getElementById('zoomSlider').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('zoomVal').innerText = val;
            camera.position.z = val;
            window.__3D_STATE__.cameraZ = val;
            updateCounter();
        });

        document.getElementById('scaleSlider').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('scaleVal').innerText = val;
            const scale = val / 100;
            sneakerGroup.scale.set(scale, scale, scale);
            // Adjust Y to keep bottom of sole on the platform surface (y=0.15)
            sneakerGroup.position.y = 0.15 + 0.55 * scale;
            window.__3D_STATE__.sneakerScale = scale;
            updateCounter();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            setSoleColor('#FFFFFF');
            setUpperColor('#FFFFFF');
            
            window.__3D_STATE__.isRotating = false;
            pivotGroup.rotation.y = 0;
            
            document.getElementById('spotlightSlider').value = 60;
            document.getElementById('spotVal').innerText = 60;
            spotLight.intensity = 0.6;
            window.__3D_STATE__.spotlightIntensity = 0.6;

            document.getElementById('zoomSlider').value = 10;
            document.getElementById('zoomVal').innerText = 10;
            camera.position.z = 10;
            window.__3D_STATE__.cameraZ = 10;

            document.getElementById('scaleSlider').value = 100;
            document.getElementById('scaleVal').innerText = 100;
            sneakerGroup.scale.set(1, 1, 1);
            sneakerGroup.position.y = 0.7;
            window.__3D_STATE__.sneakerScale = 1.0;

            window.__3D_STATE__.changeCount = 0;
            document.getElementById('changeCounter').innerText = 0;
        });

        // Keyboard Interactions
        window.addEventListener('keydown', (e) => {
            if (e.key === '1') setSoleColor('#FF0000');
            if (e.key === '2') setSoleColor('#0000FF');
            if (e.key === '3') setSoleColor('#00FF00');
            if (e.key.toLowerCase() === 'r') {
                window.__3D_STATE__.isRotating = !window.__3D_STATE__.isRotating;
                updateCounter();
            }
            if (e.key === ' ') {
                if (!window.__3D_STATE__.isSnapshotFrozen) {
                    window.__3D_STATE__.isSnapshotFrozen = true;
                    window.__3D_STATE__.flamingoAnimating = false;
                    setTimeout(() => {
                        window.__3D_STATE__.isSnapshotFrozen = false;
                        window.__3D_STATE__.flamingoAnimating = true;
                    }, 2000);
                }
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            window.__3D_STATE__.frameCount++;
            const delta = clock.getDelta();

            if (mixer && !window.__3D_STATE__.isSnapshotFrozen) {
                mixer.update(delta);
            }

            if (window.__3D_STATE__.isRotating) {
                pivotGroup.rotation.y += 0.01;
                window.__3D_STATE__.rotationAngle = pivotGroup.rotation.y % (2 * Math.PI);
            }

            camera.lookAt(0, 0, 0);

            // Update state positions
            const sneakerWorldPos = new THREE.Vector3();
            sneakerGroup.getWorldPosition(sneakerWorldPos);
            window.__3D_STATE__.sneakerPosition = { x: sneakerWorldPos.x, y: sneakerWorldPos.y, z: sneakerWorldPos.z };

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
